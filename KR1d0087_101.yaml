於文已殊聖人别之以異為敬今若以熟食薦太廟恐違禮本又祭義曰祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故礿祠蒸嘗感時致饗此聖人俯就之中制也今園寢每月二祭不為疏也太廟每嵗五享不為數也則人臣執事在疏數之間得盡其忠也若令牲牢俎豆之司更備膳羞盤盂之饌朔日月半將以為常環四時之中雜五享之禮為數既甚黷亦隨之雖曰不然臣不信也夫聖王之制必師於古訓不敢以孝思之極而過於禮不敢以肴膳之多而褻於味伏願陛下遵開元萬代之則省天寶權宜之制園寢之上得極珍羞宗廟之中請依正禮臣等忝司禮職敢罄愚衷上令宣示宰臣等曰此禮已經先帝所定朕未敢遽有改移待更商量期於允當至元和十四年太常丞王涇上疏請去太廟上食曰伏以太廟之饗籩豆牲牢三代之通禮是貴誠之義園寢之奠改用常饌秦漢之權制乃食味之道也今朔望上食於園寢循秦漢故事斯為可矣若朔望上食於太廟豈非用常褻味而貴多品乎且非禮所謂至敬不饗味而貴氣臭也况祭器不設俎豆祭官不命三公執事者唯宫闈令與宗正卿而已謂之上食可也安得以為祭乎且時饗於太廟有司攝事祝文曰孝曽孫皇帝臣某謹遣太尉臣名敢昭告於髙祖神堯皇帝祖妣太穆皇后竇氏時維孟春永懷罔極謹以一元太武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬修時饗以申追慕尚饗此祝詞也前饗七日質明太尉誓百官於尚書省曰某月某日時享於太廟各揚其職不供其事國有常刑凡陪享之官散齊四日致齊三日然後乃可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂為大故下百僚始得詳議臣等以為貞觀開元禮並無太廟上食之禮以禮斷情罷之可也至若陵寢上食採國語禮記日祭月祭之詞因秦漢之制循而存之以廣孝道也如此則經義可據故事不遺大禮既明永息異論中書舍人武儒衡議曰謹案開元禮太廟九室每年惟五饗六告祭用牲牢俎豆而已劉歆祭議曰大禘則終王壇墠則嵗貢二祧則時享曽髙則月祀祖禰則日祭國語云王者日祭月享時類嵗祀此則往古之明徴國朝之顯據蓋日祭者薦新也言物有可薦則薦之不必卜擇時也故叔孫通云古有嘗果今櫻桃方熟可以為獻由是惠帝取以薦宗廟是不卜日矣當叔孫通之言且曰有嘗果足明古禮非漢制也月享者告朔也論語子貢欲去告朔之餼羊孔子以為不可則告朔必具牲牢明矣春秋又譏閏月不告朔猶朝於廟此則月祭殷周已降皆有之也薦園寢者始於秦代漢氏因之而又改人君三年之制以日易月喪紀既以二十七月而除則朔望奠酹不復親執故既葬之後移之園陵又諸陵祠殿月遊衣冠取象平生務從豐潔所以陵寢朔望上食與太廟日祭月享本旨不同今王涇所引太廟同日時設祭以為越禮臣竊謂王涇但宜論太廟陵寢朔望奠祭可廢之旨不當以用日時為議何者漢宗廟園陵一百六十七所郡國祠祝豈不與宗廟同日同時者乎在禮既祭於室又繹於祊蓋廣乎求神者也則宗廟陵寢嘗礿同時理固無害又韓臯引漢官儀古不墓祭臣據周禮冡人之職凡祭墓則為之尸古亦墓祭但與漢家陵寢不同耳安得謂之無哉臣以為陵廟近也親親也朔望奠獻尚潔務豐宜備常膳以廣孝也宗廟逺也尊尊也禘祫時享告朔薦新宜從古制以正禮也唯太廟望祭無所本據蓋異時有司因陵寢有朔祭望祭以為宗廟亦合行之不知宗廟朔祭乃告朔也臣以為宜罷此耳事竟不行蕙田案韋裴議是唐書憲宗本紀元和二年正月庚寅朝享於太廟穆宗本紀長慶元年正月庚子朝享於太廟册府元龜長慶元年正月己亥朔備法駕親薦獻於太清宫遂齋於太廟庚子享太廟至順宗憲宗二室上歔欷流涕侍臣從官皆感動禮畢復齋於郊壇行宫舊唐書音樂志享太廟樂章十四首元宗至道大聖大明孝皇帝室奠獻用廣運之舞一章司徙兼中書令汾陽郡王郭子儀撰於赫皇祖昭明有融惟文之德惟武之功河海靜謐車書混同虔恭孝饗穆穆元風肅宗文明武德大聖大宣孝皇帝室奠獻用惟新之舞一章吏部尚書平章事彭城郡公劉晏撰漢祚惟永神功中興風驅氛祲天覆黎蒸三光再朗庶績其凝重熙纍葉景命是膺皇帝飲福受脤用福和一章福和以下八章張説撰備禮用樂崇親致尊誠通慈降敬徹愛存獻懷稱夀啐感承恩皇帝孝德子孫千億大包天域長亘不極送文舞出迎武舞入用舒和一章六鐘翕協六變成八佾倘佯八風生樂九韶兮人神感美七德兮天地清亞獻終獻行事武舞用凱安四章瑟彼瑶爵亞惟上公室如屏氣門不容躬禮殷其本樂執其中聖皇永慕天地幽通禮匝三獻樂遍九成降循軒陛仰欷皇情福與仁合德因孝明百年神畏四海風行總總干戚填填鼓鐘奮揚增氣望作為容離若鷙鳥合如戰龍萬方觀德肅肅雍雍烈祖順三靈文宗威四海黃鉞誅羣盜朱旗掃多罪戢兵天下安約法人心改大哉干羽意長見風雲在徹豆登歌一章上笙磬徹豆籩廓無響窅八元主在室神在天情餘慕禮罔愆喜黍稷屢豐年送神用永和一章眇嘉樂授靈爽感若來思如往休氣散回風上返寂寞還惚恍懷靈駕結空想代宗睿文孝武皇帝室奠獻用保大之舞一章尚父郭子儀撰於穆文考聖神昭彰簫勺羣慝含光逺方萬物茂遂九夷賓王愔愔雲韶德音不忘德宗神武孝文皇帝室奠獻用文明之舞一章尚書左丞平章事鄭餘慶撰開邸除暴時邁勛尊三元告命四極駿奔金枝翠葉輝燭瑶琨象德億載貽慶湯孫順宗至德大聖大安孝皇帝室奠獻用大順之舞一章中書侍郎平章事鄭絪撰於穆時文受天明命允恭元默化成理定出震嗣德應乾傳聖猗歟緝熙千億流慶憲宗聖神章武孝皇帝室奠獻用象德之舞一章中書侍郎平章事假文昌撰肅肅清廟登顯至德澤周八荒兵定四極生物咸遂羣盜滅息明聖欽承子孫千億郭茂倩樂府唐享太廟樂章穆宗用和寧之舞牛僧孺造湜湜頎頎融昭德輝不紐不舒貫成九圍武烈文經敷施當宜纂堯付啓億萬熙熙武宗用大定之舞李回造受天明命敷佑下土化時以儉衛文以武氛消夷夏俗臻往古億萬斯年形於律吕宣宗舞有舞詞而名不傳夏侯孜造於鑠令主聖祚重昌興起教義申明典章俗尚素朴人皆樂康積德可報流慶無疆懿宗舞有舞詞而名不傳蕭倣造聖祚無疆慶傳樂章金枝繁茂玉葉延長海瀆常晏波濤不揚汪汪美化垂範今王昭宗用咸寧之舞於鑠丕嗣惟帝之光羽籥象德金石薦祥聖系無極景命永昌神降上哲惟天配長唐書敬宗本紀寶歷元年正月庚戌朝享于太廟文宗本紀太和三年十一月癸巳朝享于太廟武宗本紀會昌元年正月庚辰朝享于太廟五年正月庚戌朝享於太廟宣宗本紀大中元年正月癸丑朝享於太廟懿宗本紀咸通元年十一月丙子朝享於太廟僖宗本紀乾符二年正月庚寅朝享於太廟文德元年二月庚寅謁於太廟禮樂志黃巢陷京師焚毁宗廟而僖宗出奔神主法物從行皆為賊所掠巢敗復京師素服哭於廟而後入右唐廟享五代史梁本紀太祖開平三年正月庚寅享於太廟十月享於太廟唐本紀莊宗同光二年正月丁卯朝獻於太微宫戊辰享於太廟明宗長興元年二月甲寅享於太廟周本紀太祖廣順三年十二月乙亥享於太廟右五代廟享五禮通考卷九十一
