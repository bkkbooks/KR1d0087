body:
  text: 五禮通考卷九十一刑部尚書秦蕙田撰吉禮九十一宗廟時享隋書禮儀志髙祖受命置四親廟各以孟月享以太牢髙祖本紀開皇四年春正月已巳有事於太廟七年春正月癸巳有事於太廟八年十月甲子將伐陳有事於太廟十二年十月壬午有事於太廟至太祖神主前上流涕嗚咽悲不自勝十七年九月庚寅上謂侍臣曰禮主於敬皆當盡心黍稷非馨貴在祗肅廟廷設樂本以迎神齋祭之日觸目多感當此之際何可為心在路奏樂禮未為允羣公卿士宜更詳之音樂志故事天子有事於太廟備法駕陳羽葆以入於次禮畢升車而鼓吹並作開皇十七年詔曰五帝異樂三王殊禮皆隨事而有損益因情而立節文仰惟祭享宗廟瞻敬如在罔極之感情深兹日而禮畢升路鼓吹發音還入宫門金石振響斯則哀樂同日心事相違情所不安理實未允宜改兹往式用𢎞禮教自今以後享廟日不須備鼓吹殿庭勿設樂懸隋太廟歌辭迎神歌辭務本興教尊神體國霜露感心享祀陳則官聯式序奔走在庭几筵結慕祼獻惟誠嘉樂載合神其降止永言保之錫以繁祉登歌辭孝熙嚴祖師象敬宗惟皇肅事有來雍雍雕梁霞復繡橑雲重觀德自感奉璋伊恭彛斚盡飾羽綴有容升歌發藻景福來從俎入歌辭郊丘社廟同祭本用初祀由功舉駿奔咸會供神有序明酌盈樽豐犧實俎幽金既薦繢錯維旅享由明德香非稷黍載流嘉慶克固鴻緒皇髙祖太原府君神室歌辭締基發祥肇源興慶乃仁乃哲克明克令庸宣國圖善流人詠開我皇業七百同盛皇曾祖康王神室歌辭皇條俊茂帝系靈長豐功疊軌厚利重光福由善積代以德彰嚴恭盡禮永錫無疆皇祖獻王神室歌辭盛才必達丕基增舊涉渭同符遷邠等構𢎞風邁德義髙道富神鑒孔昭王猷克懋皇考太祖武元皇帝神室歌辭深仁冥著至道潛敷皇矣太祖耀名天衢剪商隆祚奄宅隋區有命既集誕開靈符飲福酒歌辭郊丘社廟同神道正直祀事有融肅雍備禮莊敬在躬羞燔已具奠酹將終降祥惟永受福無窮送神歌辭饗禮具利事成佇旒冕肅簪纓金奏終玉俎撤盡孝敬窮嚴潔人祇分哀樂半降景福慿幽贊右隋廟享舊唐書禮儀志唐四時以孟月享太廟每室用太牢季冬蠟祭之後以辰日臘享於太廟用牲如時祭又時享之日修七祀於太廟西門內之道南唐書太宗本紀貞觀三年正月戊午享於太廟舊唐書音樂志享太廟樂章十三首貞觀中魏徴禇亮等作迎神用永和黃鐘宫三成大吕角二成太簇商二成應鐘羽二成總九變同用於穆烈祖𢎞此丕基永言配命子孫保之百神既洽萬國在兹是用孝享神其格思皇帝行用太和詞同冬至圜丘登歌酌鬯用肅和夾鐘均之黃鐘羽大哉至德允兹明聖格於上下聿遵誠敬喜樂斯登鳴球以詠神其降止式降景命迎俎用雍和崇兹享祀誠敬兼至樂以感靈禮以昭事粢盛豐潔牲牷孔備永言孝思庶幾不匱皇祖宣簡公酌獻用長發無射宫濬哲惟唐長發其祥帝命斯祐王業克昌配天載德就日重光本枝百代申錫無疆皇祖懿王酌獻用長發同前詞黃鐘宫太祖景皇帝酌獻用大基太簇宫猗歟祖業皇矣帝先翦商德厚封唐慶延在姬猶稷方晉踰宣基我鼎運於萬斯年世祖元皇帝酌獻用大成姑洗宫周稱王季晉美帝文明明盛德穆穆齊芬藏用四履屈道三分鏗鏘鐘石載紀鴻勳髙祖大武皇帝酌獻用大明㽔賓宫五紀更運三正遞升勛華既沒禹湯勃興神武命代靈眷是膺望雲彰德察緯告徴上紐天維下安地軸徴師涿野萬國咸服偃伯靈臺九宫允穆殊域委賮懷生介福大禮既飾大樂已和黑章擾囿赤字浮河功宣載籍德被詠歌克昌厥後百祿是荷皇帝飲福用夀和八音斯奏三獻畢陳寶祚惟永暉光日新送文舞出迎武舞入用舒和聖敬通神光七廟靈心薦祚和萬方嚴禋克配鴻基逺明德惟馨鳳歷昌武舞用凱安詞同冬至圜丘徹俎用雍和於穆清廟聿修嚴祀四縣載陳三獻斯止籩豆徹薦人祇介祉神惟格思錫祚不已送神用永和肅肅清祀蒸蒸孝思薦享昭備虔恭在兹雍歌徹俎祝嘏陳辭用光武志永固鴻基唐書髙宗本紀永徽六年十一月已巳皇后見於太廟睿宗本紀先天元年正月辛未享於太廟舊唐書音樂志享太廟樂章五首永徽已後續撰不詳撰者太宗文皇帝酌獻用崇德夷則宫永徽元年造五運改卜千齡啓聖彤雲曉聚黃星夜映葉闡珠囊基開玉鏡後為圖開下臨萬宇上齊七政霧開三象塵清九服海溓星輝逺安邇肅天地交泰華夷輯睦翔泳歸仁中外禔福績踰黜夏勳髙翦商武陳七德刑設三章祥禽巢閣仁獸遊梁卜年惟永景福無疆髙宗天皇大帝酌獻用鈞天黃鐘宫光宅元年造承天撫籙纂聖登皇遐清萬宇仰協三光功成日用道濟時康璇圖載永寶歷斯昌日月揚暉煙雲爛色河嶽修貢神祇效職舜風攸偃堯曦先就睿感通寰孝思浹宙奉揚先德虔遵曩狩展義天局飛英雲岫化逸王表神凝帝先乘雲厭俗馭日登元中宗孝和皇帝酌獻用太和太蔟宫景雲元年造廣樂既備嘉薦既新述先惟德孝饗惟親七獻具舉五齊畢陳錫兹祚福於萬斯春睿宗大聖真皇帝酌獻用景雲黃鐘宫開元四年造惟睿作聖惟聖登皇精感耀魄時膺會昌舜慙大孝堯推讓王能事斯極振古誰方文明履運車書同軌巍巍赫赫盡善盡美衢室凝旒大庭端扆釋負之寄事光復子脫屣髙天登遐上元龍湖超忽象野芊綿遊衣復道薦果初年新廟奕奕明德配天皇祖宣皇帝酌獻用光大無射宫舊樂章宣光二宫同用長發其詞亦同開元十年始定宣帝用光大詞更别造大業龍祉徽音駿尊潛居皇德赫嗣天昆展儀宗祖重誠孝孫春秋無極享奏存存又享太廟樂三首太樂舊有此詞不詳所起迎神黃鐘宫大吕角太簇徴應鐘羽並同此詞七廟觀德百靈攸仰俗荷財成物資含養道光執契化籠提象肅肅雍雍神其來享金奏無射宫次迎神肅肅清廟巍巍盛唐配天立極纍聖重光樂和管磬禮備蒸嘗永為來格降福無疆送神五聲備奏三獻終祠車移鳳輦斾轉紅旗禮用籩豆誠效虔祇皇靈徙蹕簪紳拜辭蕙田案舊唐書此下有則天享清廟樂章十首今特削之人而不仁如樂何中宗孝和皇帝神龍元年享太廟樂章二十首不詳所撰迎神用嚴和黃鐘宫三成大吕角三成太簇徴三成應鐘羽二成同用此詞肅肅清廟赫赫元猷功髙萬古化奄十洲中興丕業上荷天休祇奉先構禮被懷柔皇帝行用升和黃鐘宫顧惟菲薄纂歷應斯中外同軌夷狄來思樂用崇德禮以陳詞夕惕若厲欽奉宏基登歌祼鬯用虔和大吕均之無射羽禮標薦鬯肅事祠庭敬申如在敢託非馨送文舞出迎武舞入用同和太簇同惟聖配天敷盛禮惟天為大闡洪名恭禋展敬光先德蘋藻申虔表志誠武舞用寧和林鐘徴炎馭失天綱土德承天命英猷被寰宇懿躅隆邦政七德已綏邊九夷咸底定景化覃遐邇深仁洽翔泳徹俎用恭和大吕均之無射羽禮周三獻樂闋九成肅承靈福悚惕兼盈送神用通和黃鐘宫祠容既畢仙座爰興停停鳳舉靄靄雲升長隆寶運永錫休徴福覃貽厥恩被黎蒸皇后助享皇后行用正和黃鐘宫詞同貞觀中宫朝會正和登歌奠鬯用昭和大吕均之無射羽道洽二儀交泰時休四宇和平環珮肅於庭實鐘石揚乎頌聲皇后酌獻飲福用誠敬黃鐘宫顧惟菲質忝位椒宫虔奉蘋藻肅事神宗敢申誠潔庶罄深衷晬容有裕靈享無窮徹俎用肅和大吕均之無射羽月禮已周雲和將變爰獻其醑載遷其奠明德逾隆非馨是薦澤霑動植仁覃宇縣送神用昭感黃鐘羽鏗鏘韶濩肅穆神容洪規赫赫祠典雍雍已周三獻將乘六龍虔誠有託懇志無從蕙田案題云二十首今止十二尚缺其八豈十二誤寫為二十耶又案郭茂倩樂府於虔和之後同和之前尚有顔和承光舞延和三章覆檢舊唐書志乃圜丘配享樂章而雜於太廟中此郭氏之誤也然則去此三章亦止得十二章耳此三章前已載入郊丘中特附正其失於此二十兩字不敢遽改為十二者闕疑之意也唐書元宗本紀開元六年十一月辛卯至自東都丙申享於太廟舊唐書禮儀志開元五年元宗將行幸東都而太廟屋壞乃敕有司修太廟明年廟成元宗還京行親祔之禮時有司撰儀注以祔祭之日車駕發宫中元宗謂宋璟蘇頲曰祭必先齋所以齊心也據儀注祭之日發大明宫又以質明行事縱使侵星而發猶是移辰方到質明之禮其可及乎又朕不宿齋宫即安正殿情所不安宜於廟所設齋宫五日赴行宫宿齋六日質明行事庶合於禮璟等稱聖情深至即奉行詔有司改定儀注唐會要開元六年十月有司撰享太廟儀注自大次至殿前施行褥帝不許但履地而行六日上自齋宫步詣太廟十一月丙申親詣太廟舊唐書音樂志元宗開元七年享太廟樂章十六首左丞相燕國公張説作迎神用永和三章肅九室諧八音歌皇慕動神心禮宿設樂妙尋聲明備祼奠臨律迓氣音入元依玉几御黼筵聆愾息僾周旋九韶遍百福傳信工祝永頌聲來祖考聽和平相百辟貢九瀛神休委帝孝成皇帝行用太和一章時文聖后清廟肅雍致誠勤薦在貌思恭玉節肆夏金鏘五鐘繩繩雲步穆穆天容登歌酌瓚用肅和一章天子孝享工歌溥將躬祼鬱鬯乃焚膋薌臭以達隂聲以求陽奉時蒸嘗永代不忘迎俎雍和二章在滌嘉豢麗碑敬牲角握之牡色純之騂火德陽燧水溉隂精太公胖俎傅説和羮俎豆有馥齊盛潔豐亦有和羮既戒既平鼓鐘管磬肅唱和鳴皇皇后祖賚我思成皇帝酌醴齊用文舞一章聖謨九德真言五千慶集昌胄符開帝先髙文杖鉞克配彼天三宗握鏡六合煥然帝其承祀率禮罔愆圖書霧出日月清懸舞形德類詠諗功傳黃龍蜿蟺綵雲蹁蹮五行氣順八佾風宣介此百祿於皇萬年獻祖宣皇帝室奠獻用光大之舞一章肅肅藝祖淹淹濬源有雄玉劍作鎮金門玄王貽緒后稷謀孫肇禋九廟四海來尊懿祖光皇帝室奠獻用長發之舞一章具禮崇德備樂承風魏推幢主周贈司空不行而至無成有終神興王業天歸帝功太祖景皇帝室奠獻用大政之舞一章於赫元命權輿帝文天齊八柱地半三分宗廟觀德笙鏞樂勳封唐之兆成天下君代祖元皇帝室奠獻用大成之舞一章帝舞季歷襲聖生昌后歌有蟜胎炎孕黃天地合德日月齊光肅雍孝享祚我萬方髙祖神堯皇帝室奠獻用大明之舞一章赤精亂德四海困窮黃旗舉義三靈會同旱望春雨雲披大風溥天來祭髙祖之功太宗文武聖皇帝室奠獻用崇德之舞一章皇合一德朝宗百神削平天下大拯生人上帝配食單于入臣戎歌陳舞曄曄震震髙宗天皇大帝室奠獻用鈞天之舞一章髙皇邁道端拱無為化懷獯鬻兵戢勾驪禮尊封禪樂盛來儀合位媧后同稱伏羲中宗孝和皇帝室奠獻用太和之舞一章退居江水鬱起丹陵禮物還舊朝章中興龍圖友及駿命恭膺鳴球香瓚大糦是承睿宗大聖皇帝室奠獻用景雲之舞一章景雲霏爛告我帝符噫帝沖德與天為徒笙鏞遙逺俎豆虛無春秋孝獻回復此都文獻通考唐明皇開元十五年敕享宗廟差左右丞相尚書嗣王郡王攝三公行事若人數不足通取諸司三品已上長官自餘祭享差諸司長官及五品以下清官唐書禮樂志蕭嵩奏起居舍人王仲丘撰定大唐開元禮天子親祠者孟春孟夏孟秋孟冬臘享於太廟開元禮皇帝時享于太廟儀凡一嵗五享謂四孟月及臘宗廟三年一祫以孟冬五年一禘以孟夏及諸享攝事並附齋戒前享有司卜日如常儀皇帝散齋四日於别殿致齋三日於太極殿服通天冠絳紗袍結佩並如圜丘儀應享官齋具序例儀祫禘儀同陳設前享三日尚舍直長施大次於廟東門之外道北南向尚舍奉御鋪御座守宫設文