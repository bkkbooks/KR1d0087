惟後之則太宗皇帝位酌獻韶安御製丕鑠帝宗復受天命羣隂猶黷一戎大定奠鬯斯馨功歌在詠佑啓後人文軌蚤正還位乾安肆類上帝懷柔百神稿秸既設圭幣既陳精誠潛交已事而竣佑我億載基圖日新入小次乾安恭展美報聿修上儀禮樂和節登降適宜德焉斯親神靡不娭海內承福式固邦基文舞退武舞進正安泰元尊臨富媪繁祉於皇祖宗既昭格止奏舞象功靈其有喜永言孝思盡善盡美亞獻正安陽丘其髙神祇並位既奠厥玉既奉厥醴亦有嘉德克相毖祀旨酒載酌以成熙事終獻同上易再酌為三酌出小次位乾安爰熙紫壇天地並貺來燕來寧畢陳鬱鬯承神至尊精意所鄉告靈饗矣祉福其暢詣飲福位乾安帝臨崇壇媪神其從祖宗並歆福祿攸同兵寢刑措時和嵗豐其膺受之將施無窮降壇同上易將作以飲福禧安八音克諧降神出祗風馬雲車陟降在兹錫我純嘏我應受之一人有慶燕及羣黎還位乾安帝出于震孝奏上儀燔燎羶薌神徠燕娭肅若舊典罔或不祗既右饗之翕受蕃釐徹豆熙安燎薌既升焫膋以潔于豆于登焄蒿有飶紫幄熉黃神其安恱將以慶成薄言盍徹送神景安九霄眇邈神不可求何以降之監德之修三獻備成神不可留何以送之保天之休望燎乾安謂天蓋髙陽噓而生日月列宿皆天之神肆求厥類與陽俱升視燎于壇以終其勤望瘞乾安謂地蓋厚隂翕而成社稷羣望皆地之靈肆求厥類與隂俱凝視瘞于坎以終其勤還大次乾安舞具八佾樂備六成大矣孝熙厲志專精已事而竣回軫還衡我應受之以莫不增還內采茨五輅鳴鑾八神警蹕天官景從莫不祗栗祲威盛容昭哉祖述祚我無疆叶氣充溢蕙田案三十一年當郊以金人渝盟而闕五禮通考卷十五
