body:
  text: 五禮通考卷十五刑部尚書秦蕙田撰吉禮十五圜丘祀天宋史髙宗本紀建炎二年冬十一月壬寅冬至祀昊天上帝於圜丘以太祖配大赦禮志建炎二年髙宗至揚州庶事草創築壇於州南門內江都縣之東南詔東京所屬官吏奉祭器大樂儀仗法物赴行在所是嵗冬至祀昊天上帝以太祖配文獻通考髙宗建炎二年詔行郊祀之禮冬至日合祭天地上自常朝殿用細仗千三百有五人詣壇行禮蕙田案建炎以來朝野雜記明云是年獨祭上帝通考既採之於後而此處反言合祭蓋徒見十三年以後俱合祭而不知是年實不合也當以宋史紀志為正樂志髙宗建炎初國步尚難乃詔有司天帝地祇及他大祀先以時舉太常尋奏近已增募樂工干羽簨虡亦備始循舊禮用登歌樂舞其祀昊天上帝降神用景安圜鍾為宮一奏搜講上儀式修毖祀日吉辰良禮成樂備風馭雲旗聿來歆止嘉我馨德介兹繁祉黃鍾為角一奏我將我享涓選休成執事有恪惟寅惟清樂既六變肅雍和鳴髙髙在上庶幾是聽太蔟為徵一奏禮崇禋祀備物薦誠昭格穹昊明德惟馨風馬雲車肸蠁居歆申錫無疆賚我思成姑洗為羽一奏惟天為大物始攸資恭承禋祀以報以祈神不可度日監在兹有馨明德庶其格思皇帝盥洗正安靈承上帝厲意專精設洗於阼罍水以清盥以致潔感通神明無逺弗屆其饗兹誠升壇正安皇矣上帝神格無方一陽肇復典祀有常豆登豐潔薦德馨香棐忱居歆降福穰穰上帝位奠玉幣嘉安治極發聞不瑕有芬嘉玉陳幣神屆欣欣誠心昭著欽恭無文以妥以侑薦祜何垠太祖位奠幣定安茫茫蒼穹孰知其紀精意潛通雖逺而邇量幣薦誠有實斯篚眷然顧之永錫繁祉皇帝還位正安典祀有常昭事上帝奉以告虔逮迄奠幣鐘鼓既設禮儀既備神之格思恭承貺賜捧俎豐安祀事孔明禮文惟楙爰潔犧牲載登俎豆或肆或將無聲無臭精祲潛通永綏我后上帝酌獻嘉安氣萌黃鍾萬物資始欽若髙穹吉蠲時祀神策泰元增授無已羣生熙熙亟蒙繁祉太祖位酌獻英安赫赫翼祖受命于天德邁三代威加八埏陟配上帝明禋告虔流光垂裕于萬斯年文舞退武舞進正安大德曰生隂陽寒暑樂舞形容干戚籥羽一弛一張退旅進旅神安樂之祉錫綿宇亞終獻文安惟聖普臨順皇之德典禮有彞享祀不忒籩豆靜嘉降登肹飭神具醉止景貺咸集徹豆肅安內心齊誠外物蠲潔神來迪嘗俎豆既徹燕及羣生靡或夭閼降福穰穰時萬時億送神景安於赫上帝乘龍御天惟聖克事明饗斯虔薦豆云徹靈猋且旋載錫休祉其惟有年望燎正安靈承上帝精意感通馨香旁達粢盛既豐登降有儀祀備樂終神之聽之福祿來崇髙宗本紀紹興五年冬十一月戊寅郊禮志紹興十二年臣僚言自南巡以來三歲之祀獨於明堂而郊天之禮未舉來嵗乞行大禮詔建圜壇於臨安府行宮東城之外自是凡六郊焉髙宗本紀紹興十三年春二月甲子製郊廟祭器三月丙午築圜丘十一月庚申日南至合祀天地于圜丘太祖太宗並配大赦禮志紹興十三年太常寺言國朝圎壇在國之東南壇側建青城齋宮以備郊宿今宜於臨安府行宮東南修建於是遂詔臨安府及殿前司修建圓壇第一成縱廣七丈第二成縱廣一十二丈第三成縱廣一十七丈第四成縱廣二十二丈一十二陛每陛七十二級每成一十二綴三壝第一壝去壇二十五步中壝去內壝外壝去中壝各半之燎壇方一丈髙一丈二尺開上南出户方六尺三出陛在壇南二十步丙地其青城及望祭殿與行事陪祀官宿齋幕次並令絞縛更不修蓋先是張杓為京兆尹議築齋宮可一勞永逸宇文價曰陛下方經略河南今築青城是無中原也遂罷役輿服志中興後以事天尚質屢詔郊壇不得建齋宮惟設幕屋而已其制架木而以葦為障上下四旁周以幄帟以象宮室謂之幕殿及行事又于壇所設大小次大小次之外又有望祭殿遇雨則行事于中東都時為瓦屋五間周圍重廊中興後惟設葦屋蓋倣清廟茅屋之制也紹興十三年禮部侍郎王賞等言郊祀大禮合依禮經皇帝服大裘被衮行禮據元豐詳定郊廟禮文何洵直議以黑繒創作大裘如衮惟領袖用黑羔乞如洵直議詔有司如祖宗舊制以羔製之禮部又言關西羊羔係天生黑色今有司涅白羔為之不中禮制不如權以繒代又元祐中有司欲為大裘度用百羔哲宗以為害物遂用黑繒請依太常所言從之遂以衮襲裘冕亦十二旒焉蕙田案中興草創尚知議禮以衮襲裘可謂合先王之法服矣文獻通考詔將來郊祀大禮排設大駕鹵簿仗內六引並郊廟合用祭器令禮兵部太常寺討論名件數目據討論國初大駕儀仗總一萬一千二百二十二人今已有黃麾半仗二千四百八十三人玉輅腰小輿大輦逍遙子下一千九人外其金象革木輅芳亭鳳輦屬車寶輿一千二百七十三人天武捧日奉宸隊六千四百五十七人仗內六引鼓吹前後部一千五百人其法物儀仗合用文繡以纈充代并郊祀天地宗廟從祀共七百七十一位用祭器籩豆簠簋樽罍樿杓鐙鉶鼎牛鼎羊鼎摶黍豆毛血盤幣篚匏爵坫盤匜罍洗爵盞坫飲福俎燭臺俎共九千二百五件太廟共五百九十六件內用銅玉者權以陶木代之至十六年始製造如政和之制太常寺言大禮依儀前三日皇帝詣大慶殿宿齋前二日皇帝服通天冠絳紗袍乘玉輅詣景靈宮聖祖天尊大帝前行禮差侍從官分詣元天大聖后并諸殿神御前行禮畢皇帝服通天冠絳紗袍乘玉輅詣太廟宿齋前一日皇帝詣太廟諸室前行禮畢皇帝服通天冠絳紗袍乘玉輅詣青城宿齋冬至日皇帝詣圜壇行禮禮畢擇日恭謝景靈宮遍詣諸殿行禮從之既而禮部侍郎王賞言以行在街道與在京不同其詣景靈太廟權依四孟朝獻禮例服履袍乘輦其後並同此制禮部太常寺言修立郊祀大禮儀注前祀十日質明誓戒有司設行事執事及陪祀文武官位于尚書省左僕射刑部尚書在北南向左僕射在左刑部尚書在右刑部尚書稍却行事左僕射在南吏部户部禮部刑部尚書吏部禮部刑部侍郎押樂太常卿光祿卿押樂太常丞光祿丞功臣獻官在其南凡設光祿丞以下位皆稍却次分獻官次執事官又于其南俱北向西上監察御史位二在西東向北上讀册舉册官奉禮協律郎太祝郊社太官令在東西向北上奉禮郎以下位皆稍却設陪祀文武百官位于行事官之南又設行事執事及陪祀親王宗室位于太廟齋坊右僕射刑部侍郎在北南向右僕射在左刑部侍郎在右刑部侍郎稍却亞終獻在南北向西上親王及行事執事陪祠宗室在東西向北上閣門御史臺太常寺自下分引羣官各就位凡將引行事執事陪祠文武官立班即御史臺引殿中侍御史一員先入就位左僕射讀誓于尚書省刑部尚書涖之右僕射讀誓于太廟齋坊刑部侍郎涖之誓文曰今年十一月某日冬日至皇帝謁款于南郊合祭天地前二日朝獻景靈宮前一日朝享太廟各揚其職其或不恭國有常刑讀訖內執事官奉禮郎以下文官宣教郎以下武官從義郎以下先退餘官並對拜訖退致齋皇帝散齋七日于別殿致齋三日一日于大慶殿一日于太廟一日于青城凡散齋不弔喪問疾作樂有司不奏刑殺文書致齋日前後殿不視事唯行祀事前致齋一日儀鑾司帥其屬鋪御座于大慶殿當中南向設東西房于御座之左右稍北又設西閣及齋室于殿後之左右殿上前楹施簾致齋之日質明有司陳平輦于垂拱殿庭文武百官俱就次各服其服閣門奏請皇帝未後詣齋室宣贊舍人等自下分引知樞密院事以下詣垂拱殿庭立以俟閣門附內侍進班齊牌垂拱殿簾降皇帝乘輦出至殿上少駐輦官迎駕自贊常起居宣輦官上殿簾捲鳴鞭行門禁衛諸班親從迎駕自贊常起居次舍人先贊知內侍省官以下常起居次樞密以下通班常起居贊祗候引駕樞密知客省事以下至簽書閣門官分左右立應奉官祗應通侍大夫以下武功大夫以下並先退次管軍臣僚宣名常起居贊祗候引駕並分左右前導輦降東階垂拱殿門外禁衛諸班親從自贊常起居次行宮御營巡檢一班常起居如通侍大夫以下知客省事以下武功大夫以下知內侍兩省帶御器械官充行宮使御營巡檢各歸本班至大慶殿後閣如步至大慶殿後閣臨時聽旨降輦入西閣大慶殿簾降前導官並就次易朝服詣御榻前分左右侍立知樞密院事簽書樞密院事在東西向北上同知摳密院事在西東向侍中一員在知樞密院事之北贊引閣門官一員又在其北並西向知客省事以下在簽書樞密院事之南稍東西向北上簽書知客省事以下又在其南稍却宣贊舍人等分引行事執事陪祠文武官各綪結佩入詣大慶殿庭立班禮直官舍人引禮部侍郎奏請中嚴少頃又奏外辦符寶郎奉寶陳于御榻之左右皇帝服通天冠絳紗袍綪結佩出西閣乘輿稱警蹕侍衛如常儀由西房至御榻西降輿皇帝即御座南向侍臣夾侍贊拜閣門官于榻前贊樞密以下拜殿之上下應在位官皆再拜閣門官贊拜訖轉身北向隨拜訖面西贊各祗候次禮直官引侍中詣御座前俯伏跪奏稱侍中臣某言請皇帝降座就齋室奏訖俯伏興還侍立凡侍中奏請準此皇帝降座乘輿由東房入齋室侍臣各還所司直衛者如常儀宣贊舍人分引行事執事陪祠文武官以次出三省親王樞密宗室起居問聖體並如閣門儀應行事執事陪祠官及從升者並散齋七日宿于正寢致齋三日各宿于其次凡散齋治事如故唯不弔喪問疾作樂判書刑殺文書決罰罪人及與穢惡致齋之日官給酒饌唯祀事得行其餘悉禁與祀之官已齋而缺者通攝行事奏告前祀二日奏告太祖皇帝太宗皇帝室如常告之儀陳設前祀三日儀鸞司帥其屬設大次于外壝東門之內道北南向小次于午階之東西向又設文武侍臣次于大次之前隨地之宜行事陪祠官宗室及有司次于外壝東門之外設東方南方客使次于文官之後西方北方客使次于武官之後設饌幔于內壝東門之外隨地之宜前祀二日郊社令帥其屬掃除壇之上下積柴于燎壇光祿牽牲詣祠所太常設登歌之樂于壇上稍南北向及設宮架于壇南內壝之外立舞表于酇綴之間前祀一日太常設神位席太史設神位版昊天上帝位皇地祇位于壇上北方南向西上席以藁秸太祖皇帝位太宗皇帝位于壇上東方西向北上席以蒲越天皇大帝五方帝大明夜明北極神州地祇十位于第一龕北斗天一太一帝座五星十二辰河漢等內官五行五嶽神位六十有九于第二龕二十八宿等中官五鎮四海四瀆神位百七十有二于第三龕外官山林川澤邱陵墳衍原隰神位百五十有六于內壝之內衆星神位三百有六十于內壝之外第一龕席以藁秸餘以莞而席皆內向如太史之制昊天上帝皇地祇配帝天皇大帝五方帝大明夜明北極神州地示之座及禮神之玉俟告潔訖權徹其內官中官外官衆星等位皆設定奉禮郎禮直官設皇帝位版于壇下小次前西向飲福位于壇上午階之西北向望燎位于柴壇之北南向望瘞位于瘞坎之南北向設爟火二一于望燎位之東南一于望瘞位之西北東西各二人贊者設亞獻終獻位于小次之南稍東西向大禮使左僕射又于其南行事吏部户部禮部刑部尚書吏部刑部侍郎光祿卿讀册舉册官光祿丞位于大禮使之東光祿丞稍却奉禮郎太祝郊社太官令位于小次之東北俱西向北上監察御史位二一于壇下午階之西南一于子階西北協律郎二一于壇上樂虡西北一于宮架西北俱東向押樂太常丞于登歌樂虡北押樂太常卿于宮架北良醖令于酌樽所俱北向又設陪祠文武官位于執事官之南諸