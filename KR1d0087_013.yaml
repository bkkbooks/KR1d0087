body:
  text: 五禮通考卷三刑部尚書秦蕙田撰吉禮三圜丘祀天周禮春官大宗伯以蒼璧禮天注禮謂始告神時薦于神坐書曰周公植璧秉圭是也禮神者必象其類璧圓象天一疏案爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若謂之環是璧圓也鄭氏鍔曰天圓而運乎上故璧圓以象其體天之蒼蒼其正色也故璧蒼以象其色聶氏三禮圖案玉人云璧好三寸賈釋云古人造璧應圓圓徑九寸其注又引爾雅云肉倍好謂之璧郭璞云肉邉也好孔也然則兩邉肉各三寸與此三寸之好共九寸也阮鄭二圖皆云蒼璧九寸厚寸是據此而言也又玉人璧好三寸之下云璧九寸諸侯以享天子以此而言是有九寸之璧也案崔靈恩三禮義宗云昊天及五精之帝圭璧皆長尺二寸今檢周禮爾雅皆九寸長尺二寸之璧未知崔氏據何文以為說方氏苞曰典瑞職四圭有邸疑即蒼璧也典瑞四圭有邸以祀天注鄭司農云于中央為璧圭著其四面一玉俱成爾雅曰邸本也圭本著于璧故四圭有邸圭未四出故也或說四圭有邸有四角也邸讀為抵欺之抵疏司農云于中央為璧圭著其四面一玉俱成者云于中央為璧謂用一大玉琢出中央為璧形亦肉倍好為之四面各琢出一圭璧之大小圭之長短無文天子以十二為節葢四面圭各尺二寸與鎮圭同其璧為邸葢徑六寸總三尺與大圭長三尺又等故云一玉俱成也云或說四圭有邸有四角也者此說四角角即邸矣以無正文故兩釋之也云邸讀為抵欺之抵音讀之也鄭氏鍔曰邸本也朝宿之邑謂之邸旅者所宿亦謂之邸邸有托宿之義四圭有邸者以璧為邸四面各琢出一圭托于是也璧以為邸以象天之體四圭托于璧以象天由體以致用必用四圭者象天道運行周徧四方神無不在之意考工託玉人四圭尺有二寸以祀天注郊天所以禮其神也典瑞職曰四圭有邸以祀天旅上帝直疏此圭典瑞直言所用禮神不言尺寸故此言之此言尺二寸案典瑞注先鄭云中央為璧圭著其四面一玉俱成又云圭末四出若然此尺二寸者未知璧在中央通兩畔總計為尺二寸未知除璧之外兩畔之圭各有一尺二寸據下祼圭尺有二寸而言則此四圭圭别尺有二寸仍未審以璧為邸邸徑㡬許今既無文不可强說也王氏與之曰鄭氏以大宗伯有蒼璧黄琮之文典瑞無之而云四圭有邸以祀天兩圭有邸以祀地遂以蒼璧所禮者冬至圜丘之祭四圭所禮者夏至郊天之祭黄琮所禮者崑崙之神兩圭所禮者神州之神其說甚誕江都集禮徐乾議曰周禮典瑞四圭有邸以祀天又云蒼璧禮天兩玉不同而並云祀天是有二天可知也徐邈曰璧以禮神圭以自執故曰植璧秉圭非圓丘與郊各有所施鄭氏鍔曰說者謂天地之玉用蒼與黄典瑞又有四圭兩圭之異何也余以為大宗伯之用蒼黄者禮神之玉所謂植璧也典瑞所云祀神之玉所謂秉圭也趙氏溥曰案典瑞注疏則四圭是就璧平出不是柏立起者邸則於璧中琢成寓穴然邸言宿邸歸著處也此圭乃植在神前欲天神降而依憑託宿於其中如人有旅邸相似此是禮神之玉非事神所執之玉書云植璧秉圭是也夫銳首曰圭凡物銳則利用故銳圭以象其用之利必四圭者象天徳之覆無乎不周必尺二寸者又以象天之成數王應電周禮傳典瑞言四圭兩圭為祀天地之玉而大宗伯復有蒼璧元璜等玉以禮天地四方何也書金縢曰植璧秉圭葢周之禮有所以祀神者植于所祀之處若其主然書所謂植璧即典瑞之四圭兩圭也有所以禮神者執之以致禮若其所享然書所謂秉圭即此之六器也楊氏復曰徐邈植璧秉圭之言若足以破注疏二天之說或者又謂璧圓色蒼所以象天天有四時四圭有邸亦所以象天非王所執之圭也伏睹國朝會要禮制局言以蒼璧禮天四圭有邸以祀天蓋蒼璧以象體四圭有邸以象用故於蒼璧言禮于四圭有邸言祀説者謂禮神在求神之初祀神在薦獻之時葢一祭而兩用也此義與徐邈不同姑兩存之陳氏禮書或曰大司樂言樂六變八變然後神示可得而禮又言歌黄鐘太蔟之類以祀天神地示則禮之固在降神之後祀之又在禮之之後璧琮禮天地四圭兩圭祀天地蓋皆一祭兼用之也是不然何則青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方則四方有禮玉無祀玉圭璧以祀日月星辰璋邸射以祀山川則日月星辰山川有祀玉無禮玉周官之書雖或簡畧不應如是之缺也陳氏汲曰宗伯所謂蒼璧黄琮典瑞所謂四圭兩圭也蒼璧黄琮言其色四圭兩圭言其形以此推之凡夏正祈穀孟夏大雩季秋大享若祀天則冬至圜丘用四圭之蒼璧祭地則夏至方澤用兩圭之黄琮祭天地之處則止於圜丘方澤安有郊丘之别崑崙神州之異哉蓋自後漢光武好䜟當時士大夫相承傳之康成最為精於緯書其曰三王之郊一用夏正是月令孟春天子以元日祈穀於上帝者非郊天也蕙田案郊天圭璧分見于大宗伯典瑞之文于是諸儒異說紛起今合而考之康成指為二天緯書妄說固不足信楊說葢猶主之然玉無烟臭本無燔燎降神之理則顯慶禮所言亦未可據也禮書引或説而駁之其言當矣惜其所自為説者乃云四圭有邸非必冬至之祭則又騎牆而入于鄭氏之誤也徐邈鄭鍔以為植璧秉圭一祭兼用其說似為最宻然亦有不可信者六瑞六器並掌宗伯何獨無四圭兩圭典瑞玉人所職尤詳何獨無蒼璧黄琮且典瑞下文言圭璧以祀日月星辰璋邸射以祀山川若以為所奠之玉不應一節之中頓爾異義如盡以為執玉則日月星辰山川俱無奠玉况朝日既云執鎮圭矣何又重言祀日乎求之經文反覆背戾以此知陳及之之説為至確而不可易也至于趙氏王氏推衍徐邈之説而泥于邸字反成植圭秉璧其為紕繆抑又甚矣又案依陳及之説則祀天執玉竟無明文然王氏詳説王氏周禮傳並于朝日之下註云言朝日則郊天可知大宗伯王執鎮圭疏云此王祭祀時所執則同執鎮圭理自無害不必强分四圭兩圭以當之也詩大雅雲漢圭璧既卒箋禮神之玉又已盡矣圭疏春官大宗伯典瑞禮神之器自有多名言圭璧為其總稱以三牲用不可盡故言無愛圭璧少而易竭故言其盡葛氏象烈曰某神合用某璧某璧合祀某神盡如典禮用之無有餘者如是謂之既卒也春官大宗伯皆有牲幣各放其器之色注幣以從爵若人飲酒有酬幣通典幣用繒長丈八尺鄭𤣥注曾子問云制幣長丈八鄭約逸廵狩禮文也王用幣長短皆准此右玉幣祭統天子親耕于南郊以供粢盛祭義天子為藉千畝冕而朱紘躬秉耒以事天地以為醴酪齊盛注藉藉田也周禮天官甸師掌帥其屬而耕耨王藉以時入之以供粢盛蔡氏德晉曰藉藉田也王以孟春躬耕藉田天子三推三公五推卿諸侯九推甸師帥其胥徒耕耨以終之傳所謂王耕一墢班三之庶人終于千畝庶人即此甸師之胥徒也時入若來麥夏熟禾黍秋熟既熟即領之送入地官神倉也禮記月令季秋乃命冢宰農事備収舉五穀之要藏帝藉之収于神倉祗敬必飭注帝藉所耕千畝也藏祭祀之穀為神倉重粢盛之委也田疏帝藉者供上帝之藉田也藉借也借民力所治之也祭義云天子為藉千畝以其供神之物故曰神倉國語周語廩於藉之東南鍾而藏之陳氏禮書天子藉于南方正陽之位也廩于藉東南長生之地也周禮地官舂人祭祀共其齍盛之米注齍盛謂黍稷稻粱之屬可盛以為簠簋實國語楚語天子親舂禘郊之盛天子禘郊之事王后必自舂其粢晉語日入監九御使潔奉郊禘之粢盛春秋桓二年左傳粢食不鑿昭其儉也陳氏禮書祭祀之禮貴于出力以致養故王耕藉后獻種夫人親桑夫婦相成以盡志力而後可以交於鬼神則舂盛固所以自盡也然王耕藉不過三推夫人繅絲不過三盆則舂盛之禮葢亦如此然後舂人卒其事以供之也黍稷曰粢在器曰盛周禮或言齍或言盛或言粢盛大宗伯奉玉粢小宗伯辨六齍逆齍大祝齍號之類此言齍而不及盛也閭師不耕者無盛廩人共接盛饌人共盛之類此言盛而不及齍也甸師共齍盛舂人共粢盛之米小宗伯表粢盛此兼言粢盛也其言各有所當非茍異耳齍盛共之以甸師舂之以舂人􅐪之以􅐪人實之以舍人奉之以大宗伯逆之以宗伯然後立之以表鄭氏曰表為徽識蓋各書其號以辨異之也九嬪贊玉齍者玉敦也大宗伯奉玉齍者玉與齍也廩人之接盛施於大祭祀而已接猶曾子問接祭之接也鄭氏改以為扱非是又曰黍稷别而言之則稷曰粢曲禮稷曰明粢是也合而言之皆曰粢禮凡言粢盛是也禮記表記天子親耕粢盛秬鬯以事上帝疏按小宰注云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬱謂之鬱鬯鬱人所掌是也祭宗廟而灌也若不和鬱謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之芬芳調暢故言秬鬯故得以事上帝王氏應電曰舊說祭天無鬯觀大宗伯祀神鬼示之下總云涖玉鬯司尊彛職云大旅存奠彛表記云天子親耕粢盛秬鬯以事上帝則事天有鬯明矣伹鬯人鬯器不及祭天何也盖祭天用陶匏貴其自然若因此而遂謂祭天無鬯則司尊彛但言宗廟而不及地祗豈祭地無酒乎陳氏禮書生民詩維秬維秠毛曰秬黒黍秠一稃二米正義曰皆爾雅文惟彼穈作􅚂音同耳李廵曰黒黍一名秬郭璞曰秠亦黒黍但中米異耳漢和帝時任城生黒黍或三四實實二米得黍三斛八㪷則秬是黒黍之大名秠是黒黍中之有二米者則别名之為秠故此經異其文而爾雅釋之若言秬秠皆黒黍矣而春官鬯人注云釀秬為酒秬如黒黍一秠二米言如者以黒黍一米者多秬為正稱二米則秬中之異故言如以明秬有二等也秬有二等則一米亦可為酒鬯人之注必言二米者二米嘉異之物鬯酒宜當用之故以二米解鬯其實秬是大名故云釀秬為酒耳爾雅云秠一稃二米鬯人注云一秠二米文不同者鄭志答張逸云秠即皮其稃亦即皮也爾雅重言以曉人然則秠稃古今語之異故鄭引爾雅得以稃為秠詩江漢秬鬯一卣注秬黒黍也鬯香草也築煮合而鬰之曰鬯箋云秬鬯黑黍酒也謂之鬯者芬香條鬯也正義曰禮有鬱者築鬱金之草而煮之以和秬黍之酒使之芬香條暢故謂之鬱鬯鬯非草名而此傳言鬯草者以其可和秬鬯謂之鬯草毛言鬯草葢亦然也言築煑合而鬱之謂築此鬱草久煮之乃與秬鬯之酒合和而鬱積之使氣味相入乃名為鬯言合而鬱積之非草名如毛此意言鬯者必和鬱乃名鬯未和不為鬯與鄭異也箋以毛解鬯其言不明似必和鬱乃名為鬯故辨之明黒黍之酒自明為鬯不待和鬱也春官鬯人注云秬鬯不和鬱者是黒黍之酒即名鬯也和者以鬯人掌秬鬯鬱人掌和鬱鬯明鬯人所掌未和鬱也故孫毓云鬱是草名今之鬱金煮以和酒者也鬯是酒名以黒黍秬一秠二米作之芬香條鬯故名之曰鬯鬯非草名古今書傳香草無稱鬱者用箋説為長又周禮鬱人和鬱鬯注築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煑之鑊中停于祭前鬱為草若蘭正義曰司農云十葉為貫百二十貫為築者未知出何文云以煑之鑊中停于祭前者此似直煮鬱停之無鬯酒者文畧其實和鬯酒也云鬱為草若蘭則蘭芝以其俱是香草故此類言之案王度記云天子以鬯諸侯以薰大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以薰謂未得圭瓚之賜得賜則以鬱耳王度云天子以鬯及禮緯云鬯草生庭皆是鬱金之草以其鬯酒因號為鬯草也又魏畧曰大秦多蘇合薰陸鬱金芸膠十二種香許慎說文曰鬯以秬釀鬱草芬芳攸服以降神也中象米匕所以扱之易曰不䘮匕鬯凡鬯之屬皆從鬯鬱芳草也十葉為貫百二十貫為築以煮之一曰鬱鬯百草之華逺人鬱人所貢芳草合釀之以降神鬱今鬱林郡也開寳本草木部中品鬱香味苦温無毒陳藏器云其香十二葉為百草之英案魏畧云生大秦國二月六月有花狀如紅蘭四月五月採花即香也嘉祐本草圗經云鬱金本經不載所出州土蘇恭云生蜀地及西戎胡人謂之馬茱今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑黄花白質紅末秋出莖心無實根黄赤木部中品有鬱金香云生大秦國二月三月十月有花狀如紅藍其花即香也陳氏云為百草之英乃是草類又與此同名而在木部非也今人不服用亦無辨之者故但附于此耳李氏時珍曰酒和鬱鬯昔人言是大秦國所産鬱金花香惟鄭樵通志言即是此鬱金其大秦三代時未通中國安得有此草羅願爾雅翼亦云是此根和酒令黄如金故謂之黄流其說並通人曰鬱金有二鬱金香是用花此是用根者其苗如薑其根大小如指頭長者寸許體圓有横紋如蟬腹狀外黄内赤陳氏禮書禮或言秬鬯或言鬱鬯葢秬一稃二米土地至和之氣所生謂之鬯以言和氣之條鬯也謂之鬱鬯以其鬻鬱草和之也鄭司農曰鬱十葉為貫百二十貫為築以煑之其言蓋有所受也蕙田案秬鬯即鬱鬯秬黒黍親耕以供鬱鬯之用鬯人釀之鬱人築煮和之先儒因周禮分鬯人鬱人二職遂以鬱鬯為和鬱者秬鬯為不和鬱者考鬱人和鬱鬯實彛而陳之是鬱合鬯也宗廟重祼鬱人専掌祼事故實之陳之皆鬱人大宗伯祭大神涖玉鬯玉鬯即盛鬱鬯之器天地大神至尊不祼故不用鬱人即令鬯人供之也葢秬黍所以為酒必和鬱而後為鬯不得謂鬱人和鬯而鬯人之秬鬯不和鬱也有鬱無鬯固不成酒有鬯無鬱則與五齊同何以謂之秬鬯乎先王謹于祭祀又以釀黍築䰞事各不同故分二職以掌之耳正義于鬱人注云無鬯酒者文畧其實和鬯酒也詩秬鬯一卣正義云禮有鬱者築鬱金之草而煑之以和秬黍之酒使之芬芳條鬯故謂之鬱鬯今考鬱字從鬯則鬱以秬鬯得名而秬酒謂之鬯又以鬱之香得名何元子曰主秬言則謂之秬鬯主鬱言則謂之鬱鬯是也蔡徳晉曰肆師職大祭祀及祼築䰞大賓客築䰞大喪大渳以鬯則築䰞則凡祭祀賔客喪浴無不和鬱明矣注疏謂鬱鬯唯用之于宗廟之祼其餘天地社稷等祀止用秬鬯者非又有以鬱為鬯草及合和而鬱積之等說亦非右親耕粢盛秬鬯周禮天官酒正辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊注泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今恬酒矣盎猶翁也成而翁翁然葸白色如今酇白矣緹者成而紅赤如今下酒矣沈者成而滓沈如今造清矣自醴以上尤濁縮酌者盎以下差清其象類則然古之法式未可盡聞杜子春讀齊皆為粢又禮器曰緹酒之用𤣥酒之尚𤣥謂齊者每有祭祀以度量節作之疏言辨五齊之名者酒正不自造使酒人為之酒正直辨五齊之名知其清濁而已云一曰泛齊者泛讀如泛泛楊舟之泛言泛者謂此齊熟時滓浮在上泛泛然二曰醴齊者醴體也此齊熟時上下一體汁滓相將故名醴酒又此醴齊作時恬于餘齊與酒味稍殊故亦入于大飲三曰盎齊已下其類可知鄭氏鍔曰大古有明水以為醴其後乃有𤣥酒𤣥酒之後又有五齊五齊之後乃有三酒至于酒則其味厚矣味之厚者先于薄味之薄者生于𤣥去古益逺則禮文益變然五齊雖生于𤣥酒而五者之中亦自有厚薄之齊自泛之醴自醴之盎自盎之緹自緹之沈非惟色不同也味亦不同非唯厚薄不同清濁又不同其齊不同則其名不同其名不同則不可以不辨故使酒正辨之葢𤣥一變始有泛齊成而泛泛然而滓則浮而上泛齊一變始有醴齊成而汁滓相將其體則厚而甜醴齊一變始有盎齊成而滃滃然其味得中過此以徃然後有緹齊其色紅赤味已是酒故名曰緹緹言其是酒也禮之近人情者非其至也此泛所以處五齊之先而沈所以處五齊之下凡此皆用以事神記曰𤣥酒在室醴醆在户粢醍在堂澄酒在下是謂承天之祐又曰醴齊在室醍酒在堂澄酒在下示民不淫也醆則盎爾澄則沈爾酒正辨其三酒四漿之物因名然後有實也辨三酒之物一曰事酒二曰昔酒三曰清酒注鄭司農云事酒有事而飲也昔酒無事而飲也清酒祭祀之酒𤣥謂事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬釀接夏而成曰疏一曰事酒者酌有事人飲之故以事上名酒也二昔酒者久釀乃熟故以昔酒為名三曰清酒者此酒更久于昔故以清為號祭祀用之此昔酒清酒皆以酒上為名也事酒冬釀春成以漢之醳酒况之昔亦逺久之義故以漢之酋久白酒况之但昔酒對事酒為清者若對清酒則為白故曰酋久白酒也故晉語云味厚實昔毒酒久則毒也云所謂舊醳者按禮記郊特牲云猶明清與醆酒于舊醳之酒也彼上注云明酌者事酒之上也醆酒盎齊泲于舊醳之酒三酒除事酒清酒則云舊醳是昔酒可知也對事酒為新醳昔酒為舊醳清酒不得醳名中山郡名故魏都賦云醇酎中山沈湎千日鄭氏鍔曰昔之為言宿昔之意謂日久而漸清之酒也記禮曰昔猶明清與醆酒于舊醳之酒所謂舊醳之酒者昔酒也唯其涚而久故謂之舊醳逮其後也遂有清酒其色益清明記禮所謂醆酒涚于清是也醆酒盎齊也盎齊差清又以清酒涚之則知清酒之為大清矣史氏浩曰事者方有事于糟漉昔者熟之而可久清者澄之而可飲郝氏敬曰辨者酒正不自造掌其法以辨之而已齊劑同水米麯相劑和也米將化浮漲曰泛既變成糟曰醴糟發上溢曰盎糟久凝結如緯帛曰緹糟粃盡化其下清汁曰沈此五齊皆糟米泲者泲其糟成酒事酒有事新造者如少牢禮卜吉宰乃命為酒是也昔酒昔所久造者清酒造久澄清者王氏應電曰事酒因事而釀釀畢即漉所謂濁醪也昔酒久釀乃熟其味最厚所謂舊醳也清酒者熟而停久其色清其味醇即詩所謂祭以清酒也陳氏禮書濁莫如五齊清莫如三酒祭祀有五齊以神事之也三酒以人養之也酒正言凡祭祀則天地宗廟社稷諸神之祭皆有五齊三酒禮記郊特牲酒醴之美𤣥酒明水之尚貴五味之本也注明水司烜以隂鑑所取于月之水也祭齊加明水報陰也注齊五齊也五齊加明水則三酒加𤣥酒也明水涚齊貴新也注涚猶清也五齊濁泲之使清謂之涚齊及取明水皆貴新也其謂之明水也由主人之絜著此水也注著猶成也言主人齊絜此水乃成右酒醴商書湯誥敢用𤣥牡集注夏尚黒未變其禮也周書召誥用牲于郊牛二蕙田案牛二説各不同詳見後特牲及享牛求牛條下禮記郊特牲疏郊所以用特牲者天帝至尊無物可稱故用特牲郊與配坐皆特牲故下文云養牲必養二帝牛不吉以為稷牛又召誥云用牲于郊牛二是也蕙田案召誥用牲于郊牛二社于新邑牛一羊一豖一特牲疏云天神尊貴故止一特愚謂天神對地祇人鬼特牲當對羊豖葢不兼羊豖謂之特非必不可有二謂之特也註疏諸家拘泥止用一牛而圜丘祀天燔柴實牲體郊事有全脀用之燔則無以祀用之祀則無以燔于是有分牲體供二處所用之說祭畢燔牲體之說帝牛稷牛之說皆牽鑿也不知雖有二牛一燔一祀不害其為正祭之特也南北郊各用特不害其為更有燔牛瘞牛稷牛也如此則郊祀用牲之說可通矣禮器祭天特牲疏特一也天神尊貴故止一特也周禮地官牧人凡陽祀用騂牲毛之注陽祀祭天于南郊也毛之取純毛也可疏昊天牲用蒼唯郊天不見牲色注此陽祀之中知郊特牲曰郊之祭也牲用騂是南郊用騂也鄭氏鍔曰祭祀用物必有其由其一以禮神其一以祀神祀神之物從其類故陽騂而隂黝禮神之物象其功故天蒼而地黄大宗伯言其禮神者故以禮言牧人言其祀神者故以祀言禮經之文本無牴牾也禮記祭法燔柴于泰壇用騂犢注隂祀用黝牲與天俱用犢連言爾疏按牧人云隂祀用黝牲毛之鄭注云隂祀祭地北郊及社稷也又郊特牲云郊之用犢貴誠也彼文雖主南郊其北郊與天相對故知俱用犢也陳氏澔曰周禮陽祀用騂牲陰祀用黝牲此并言騂犢者以周人尚赤而所謂陰祀者或是他祀與郊特牲牲用騂尚赤也用犢貴誠也注尚赤者周也犢者誠慤未有牝牡之情是以小為貴也楊氏復曰鄭氏謂以蒼璧禮天牲幣各放其方之色則當用蒼犢祭法乃云用騂犢其色不同故以蒼璧蒼犢為祀昊天圜丘所用以騂犢為祀感生帝南郊所用鄭𤣥王肅兩家問難備見郊特牲疏愚竊以理推之天道渾全陰陽五行俱備不比五方各偏主一色逺望則其色蒼純陽則其色赤故說卦曰乾為大赤故周為赤色用騂犢又如夏用𤣥牡殷用白牡亦是天道渾全不偏主一色又何以蒼璧為疑陳氏禮書大宗伯牲幣各放其器之色則天牲以蒼而不以騂地牲以黄而不以黝者葢騂者陽之盛色陽祀以騂為主而不必皆騂黝者陰之盛色陰祀以黝為主而不必皆黝則牧人所言亦其大率而已郊特牲之騂犢閟宮之騂犧此祀天之用騂者也旱麓信南山之騂牡閟宮之騂剛洛誥之騂牛此宗廟之用騂者也爾雅曰黄牛黒唇曰犉詩曰殺時犉牡此社稷之用黝者也詩曰來方禋祀以其騂黒則四方有用騂黒者矣孔子曰犁牛之子騂且角山川其舍諸則山川亦有用騂者矣牲孕弗食也祭帝弗用也注孕任子也陸氏佃曰據此牲孕弗食也祭帝弗用也祭天容或乏少用牝犢也盖今用犢甚少尚患難得其殺時不令母見始能割愛不爾不復食草鳴喚至死乃已傳所謂猶懐老牛䑛犢之愛豈虚言哉經曰天地之牛角繭栗其所謂繭栗與牡正也公羊傳曰魯祭周公何以為牲周公用白牡魯公用騂剛羣公不毛羣公不毛雖曰少貶亦用其騂有不能給由是觀之雖周宗廟亦有通法存焉盖聖人有以見天下之動而觀其㑹通以行其典禮宜如此羅氏泌路史或曰孟春之月山川林澤犧牲無用牝則非孟春非山澤牲用牝矣郊時牲云天子牲孕弗食也祭帝弗用也鄭謂任子曰孕祭帝之牲必孕然後弗用則不孕之牝若可以祭帝矣曰否天地宗廟社稷牲唯牡也敢用𤣥牡此天地之牲也從以騂牡則宗廟之牲而奉時犉牡者社稷之牲也孕者牝牡之為通非特為任子也奔騰之時牲雖牡通孕則非犢矣故弗食于天子弗用于帝盖取所謂貴誠者非用牝王制祭天地之牛角繭栗陸氏佃曰言繭又言栗者言雖如栗亦可徐氏師曾曰如繭如栗也國語楚語郊禘不過繭栗周禮地官牛人凡祭祀共其享牛求牛以授職人而芻之注鄭司農云享牛前祭一日之牛也求牛禱于鬼神所求福之牛也共謂享獻也獻神之牛謂所以祭者求終也終事之牛謂所以繹者也劉氏小傳凡求讀如逑逑配也配神者之牛以郊禮言之享牛所謂帝牛求牛所謂稷牛周書召誥用牲于郊牛二羅氏沁路史享牛者祀神之牛求牛者降神之牛也陳氏禮書牛有卜而後用者有用而不必卜者享牛卜而後用求牛用而不必卜職人充人司門之類是也然則稷牛惟具而先王之牛必卜何也稷祀于郊則屈而不伸故用求牛而與帝牛異先王享于廟則伸而無屈故用享牛而與帝牛同髙氏愈曰享牛饗先王之牛所謂宗廟之牛角握者求捄通角小貌即所謂祭天地之牛角繭栗者蕙田案享牛求牛鄭注專指宗廟之祭疏及劉氏以求牛為郊祀配神之牛即𫝊所云稷牛路史以為燔柴求神之牛髙氏又以享牛為宗廟之牛求牛謂祭天之牛今考經文云凡祭祀夫祭祀言凡則天地宗廟皆有如鄭氏說則専主宗廟劉氏又専指郊祀似俱未妥唯陳氏禮書謂享牛卜而後用求牛用而不卜全不拘泥何祭所用似為得之葢祭祀惟享帝享先王正祭之牛卜而後用餘皆臨時求取公羊𫝊云唯具是視是也况享牛雖既卜吉亦有時而更換註所云遭災是也他如禮天之燔牛配帝之稷牛祭地之瘞牛終事之繹牛牛人不得不多為儲畜以備求取則均謂之求牛可也至羅氏専以為燔牛亦太泥而髙氏則求牛仍是享牛更為臆說又按召誥用牲于郊牛二疏及劉氏謂帝牛稷牛路史謂求神祀神二牛蔡傳謂郊祭天地故用二牛按二牛即特牲也陳用之謂祀天祭地謂之郊同其用特牲亦同説是餘恐附會牧人凡祭祀共其犧牲以授充人繫之疏牧人養牲臨祭前三月授與充人繋養之春官肆師大祭祀展犧牲繋于牢頒于職人注職人謂充人王氏昭禹曰牛人牧人共牲者也共牲然後肆師從而展則職人非牛人牧人凡散祭祀繋于國門則職人非門人矣職人其充人之謂充人而曰職人以職其事故也地官充人掌繫祭祀之牷牲繫于宰芻之三月注牢閑也必有閑者防禽獸觸齧養牛羊曰芻三月一時節氣成疏總養天地宗廟之牲王氏昭禹曰記曰三月繫又曰帝牲必在滌三月傳曰芻豢逺不過三月近不過浹旬在滌三月繋于牢之時也禮記郊特牲帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具所以别事天神與人鬼也注養牲必飬二也滌牢中所溲除處也惟具遭時又選可用也選疏遭時謂帝牲遭災之時既用稷牲其祀稷牲臨時其可用者凡帝牲稷牲初時皆卜取其牲繋于牢芻之三月若臨時有故乃變之也春秋宣三年公羊傳養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在于滌三月于稷者唯具是視注滌宮名飬帝牲三牢之處也謂之滌者取其蕩滌潔清三牢者各主一月取三月一時足以充其天性于稷者視其身體具無災害而已不特飬于滌宫所以降稷尊帝國語楚語楚昭王問于觀射父曰芻豢幾何對曰逺不過三月近不過浹日禮記月令季夏之月命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝之神注四監主山林川澤之官百縣鄉遂之屬馬氏晞孟曰令民無不咸出其力則所謂祭祀者非獨恭也謂民力之普存也以供皇天上帝之神以為民神之主也故帝王先成民而後致力于神仲秋之月乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗注于鳥獸充肥之時宜省羣牲也五者謂所視所案所瞻所察所量也此皆得其正則上帝饗之疏視全具亦宰祝所視也純色曰犧體完曰全食草曰芻食穀曰豢物色騂黝之别也已行故事曰比品物相隨曰類大謂牛羊豕成牲者小謂羔豚之屬長短者謂角繭栗角握之屬上帝天也季冬之月乃命太史次諸侯之列賦之犧牲以供皇天上帝之饗注此所與諸侯共者也列國有大小賦之犧牲大者出多小者出少饗獻也疏列次也來歳祭祀所須犧牲出諸侯之國諸侯同王南面専王之土故命之出牲以與王共事天地也祭義古者天子諸侯必有養獸之官及歲時齊戒沐浴而躬朝之犧牷祭牲必于是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮弁素積朔月月半君廵牲所以致力孝之至也注歲時齊戒沐浴而躬朝之謂將祭祀卜牲君朔月月半廵視之君召牛納而視之更本擇牲意方氏慤曰自養獸之官而下所云即牧人阜蕃其物之時也自君召牛而下所云即充人繋于牢之時也君召牛納而視之所謂展牲是也擇其毛所謂騂牲黝牲是也卜之吉然後養之所謂帝牛不吉以為稷牛是也未卜止謂之牛既卜乃謂之牲召之則未卜故曰牛廵之則卜之矣故曰牲上言祭牲者盖取之將以為祭牲故也陳氏禮書純謂之牷完謂之犧故禮記言毛以告全左傳言雄雞自㫁其尾憚其為犧則牷之純在色犧之完在體也然牷者亦必完犧者亦必純禮凡言牷物其為犧可知也凡言犧牲其為純可知也湯之告天地以𤣥牡用夏禮也揚子雲曰𤣥牛騂白其升于廟乎兼三代之禮言之也先王之于牲以牡為貴而賤其牝以小為貴而賤其大以純為貴而賤其龎以充美為貴而去其疾故書曰敢用𤣥牡詩曰白牡騂剛從以騂牡又曰殺時犉牡此以牡為貴也楚語曰郊禘不過繭栗記曰祭天地之牛角繭栗此以小為貴者也右犧牲周禮天官籩人掌四籩之實其實䵄蕡白黒形鹽膴鮑魚鱐棗栗桃乾䕩榛實菱芡栗脯糗餌粉餈注籩其容實皆四升蕡枲實也鄭司農云麥曰䵄麻曰蕡稻曰白黍曰黒築鹽以為虎形故春秋傳曰鹽虎形𤣥謂形鹽鹽之似虎者膴䐑生魚為大臠鮑者于楅室中糗乾之鱐者析乾之王者備物近者腥之逺者乾之因其宜也乾䕩乾梅也有桃諸梅諸是其乾者榛似栗而小菱芰也芡雞頭也故書餈作芡鄭司農云糗熬大豆與米也粉豆屑也茨字或作餈謂乾餌餅之也𤣥謂此二物皆粉稻米黍米所為也合蒸曰餌餅之曰餈糗者搗粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足蔡氏徳晉曰天子日四飯有四籩四豆祭祀一切陳之䵄熬麥也蕡熬麻子也白熬稻也黒熬黍也鮑魚魚之火焙而乾者魚鱐魚之自暴而乾者餌餅也熬之故曰糗餈糕也磨米成粉而合蒸之因以粉言也醢人掌四豆之實其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麋臡葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢芹菹兔醢深蒲醓醢箈菹雁醢筍菹魚醢酏食糝食注醓肉汁也昌本昌蒲根切之四寸為菹三臡亦醢也作醢及臡者必先膊乾其肉乃後莝之雜以粱麴及鹽漬以美酒塗置瓶中百日則成矣鄭司農云麋臡麋肝髓醢或曰醬也有骨為臡無骨為醢菁菹韭菹鄭大夫讀茆為茅茅菹茅初生或曰茆水草杜子春讀茆為卯𤣥謂菁蔓菁也茆鳬葵也凡菹醢皆以氣味相成其狀未聞蠃䗂蝓蜃大蛤蚳蛾子鄭司農云脾析牛百葉也蠯蛤也鄭大夫杜子春皆以拍為膞謂脇也或曰豚拍肩也芹楚葵也鄭司農云深蒲蒲蒻入水深故曰深蒲或曰深蒲桑耳醓醢肉醬也菭水中魚衣故書雁或為鶉杜子春云當為雁𤣥謂深蒲蒲始生水中子箈箭萌筍竹萌酏􅊡也内則曰取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之稻米二肉一合以為餌煎之蔡氏德晉曰菹有菜有肉全物若䐑為菹其細切者為韲此節不言菹者皆韲也醓醢醢之多汁者茆鳬葵即蓴菜也麋獐也凡菹醢皆以水草獸物氣味相成者為之如韭菹則宜醓醢昌本則宜麋臡也醓醢魚醢獨重見者以醓魚之屬非一故也酏􅊡也以狼膏合稻米煎之為酏牛羊豕肉合稻米煎之為糝二者内羞也禮記郊特牲籩豆之實水土之品也不敢用䙝味而貴多品所以交于旦明之義也注水土之品言非人常所食旦當為神醯醢之美而煎鹽之尚貴天産也疏貴天產也者餘物皆人功和合為之鹽則天產自然故云貴天産也言煎者煎此自然之鹽練治之也言煎鹽之尚者皇氏云設之於醯醢之上故云尚熊云煎鹽祭天所用故云尚義俱通蕙田案籩豆之實郊祭無明證而周禮籩人醢人有供凡祭祀之文則郊祭未必不統之鄭注専謂四時禘祫拘矣地官舎人職凡祭祀共簠簋賈疏祭祀言凡則天地宗廟皆有故云凡以廣之則賈已異于鄭矣郊特牲醯醢煎鹽之尚貫于祭天條下明確可證夫祭必備物記云一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝詎云饗帝之物反不如常祭乎右籩豆之實禮記禮器越席疏越席蒲席也郊特牲蒲越槀鞂之尚明之也注蒲越槀鞂藉神席也明之者神明之也疏凡常居下莞上簟祭天則蒲越槀鞂之尚也明之也者釋所以祭天用蒲越槀鞂之意今禮及隋禮槀鞂為祭天席蒲越為配帝席俱藉神也陳氏禮書徳産之致精微盡天下之物無以稱其徳故特報以内心之誠而已則藉用槀鞂越席槀鞂本于天然越席出于人為人為者不若自然之尤質故大路用焉則越不施于天神可知蕙田案埽地而祭故以槀鞂藉神也器用陶匏以象天地之性也疏陶謂瓦器謂酒尊及豆簋之屬故周禮旊人為簋匏酒爵郊特牲而社稷太牢疏曰祭天之器則用陶匏陶瓦器以薦葅醢之屬故詩生民述后稷郊天云于豆于豋注云木曰豆瓦曰豋是用薦物也匏酌獻酒故詩大雅羙公劉云酌之用匏注云儉以質祭天尚質故酌亦用匏為罇方氏慤曰此主祭天而器之所象乃並言地者葢地道無成而代有終象地之性亦所以歸功于天也通典罇及薦菹醢器並以瓦爵以匏片為之禮器犧尊疏布鼏樿杓注鼏或作冪樿木白理也尊疏祭天既用陶匏盖以瓦為畫犧羽于其上或謂用犧為尊是夏殷禮也疏粗也鼏覆也謂郊天時以麤布為巾以覆尊天地之神尚質也樿白理木也鄭注周禮亦云祭天爵不用玉也陸氏佃曰冪人祭祀以疏布巾冪八尊以畫布巾冪六彛不尊于郊也所謂越席盖亦以此凡木不飾為樿樿櫛樿勺是也盖若龍勺疏勺蒲勺則于杓加飾矣陳氏禮書冪人疏布巾冪八尊畫布巾幂六彛禮曰犧尊疏布冪樿勺以素為貴又曰器用陶匏孔頴逹謂祭天以瓦為尊畫犧于上或曰夏商禮然明堂位曰犧象周尊也非夏商尊其以瓦為之畫犧其上理或然也又曰八尊以獻及于天地故巾疏而不畫六彛以祼施于宗廟故巾畫而不疏冪人言疏布巾則畫用精者可知言畫布巾則疏之不畫可知巾以覆為用象天之體又曰尊巾以疏布而勺無飾以素為貴也樿白理木與喪士素勺異矣勺以挹齊酒明水故其飾如此考工記梓人為飲器勺一升爵一升儀禮加勺于尊皆南枋則勺者北面也毎尊皆加勺則尊不共勺也郊特牲疏布之尚反女功之始也疏禮器云犧尊疏布冪是疏布之尚也方氏慤曰布之精者升多而宻粗者升少而疏女功之作始于粗而後至于精以疏布之尚故曰反女功之始也鼎爼竒而籩豆偶陰陽之義也注牲陽也庶物陰也作疏按宗伯云以天産陰徳注云天産者動物謂六牲之屬動物故為陽也庶物雖出于牲體雜以植物相和非復牲之全體故為陰也附辨鄭氏獻讀犧犧讀沙春官司尊彛其朝踐用兩獻尊鄭司農云獻讀為犧犧尊飾以翡翠疏翡赤翠青為飾魯頌犧尊將將毛傳犧尊有沙飾疏沙羽飾與司農飾以翡翠意同蕙田案此以獻尊為犧尊而飾以翡翠明堂位尊用犧象鄭注犧尊以沙為畫飾婆疏犧讀如沙沙鳯凰也刻畫鳯凰之象於尊其形娑然或作獻宇齊人之聲誤耳婆陸元朗曰刻鳯鳯於尊其形娑然蕙田案此以犧尊為沙尊而畫以鳯凰魯頌疏阮諶禮圖云犧尊飾以牛象尊飾以象於尊腹之上畫為牛象之形蕙田案此以犧尊為羲尊而畫為牛形王氏肅曰太和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊然則象尊尊為象形也孔穎達曰王肅此言以二尊形如牛象而背上負尊皆讀犧為羲與毛鄭異義蕙田案此以犧尊為羲尊形如牛而背上負尊鄭氏鍔曰獻字本戲字誤轉為獻毛詩傳謂之犧尊犧與戲字同音奈何康成讀犧為素何切鑿為之說曰畫為牛形婆娑然甚無理春而耕耕必資牛故春之尊為犧牛之形楊氏簡曰犧尊有沙牛之象嘗官楚東知彼俗以牛之大者為沙牛之為物重遲而順者也人之所以去道逺者以其輕肆放逸故多違也睹犧之象必不萌輕肆之心心不輕肆則道未嘗不在我而陸徳明輒更之曰沙尊葢曰毛詩傳犧尊有沙飾孔疏不知牛之為沙謂為羽飾故讀沙為娑陸承其誤又并改犧為沙差之又差妄謂本之毛鄭受毛鄭誤甚矣太和中魯郡於地中得齊大夫子尾送女器有犧尊為牛形厥騐明著禮經之曰犧尊者不勝其多何得毎更曰娑殊滋後人之惑周禮司尊彛朝踐用兩獻尊鄭司農又讀獻為犧明堂位曰犧尊周尊也為一代之所尚獻必首用之故亦曰獻尊何以改讀為何氏楷曰犧尊之制未詳明堂位云犧象周尊也阮諶禮圖王肅二說未知孰是乃周禮既以犧為獻而漢儒又讀犧為娑故毛傳解犧尊云有沙飾也陸元朗亦云刻鳯凰於尊其羽形婆娑然而鄭司農則謂犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊愚按如此解犧去之更逺顧起元云古者犧通為戲以其字音之相同戲或為獻以其字文之相近婆娑同音犧之為娑亦如皮之為婆儀之為莪犧尊將將之上文享以騂犧叶降福孔多一詩之中具有顯證騂犧尚且音娑則犧尊之犧非緣酒尊而異其音也知犧尊所以音娑則尊當為牛而鳯羽婆娑之說非也又可知象尊為象而象骨飾尊之說非也蔡絛云徽宗崇尚古器遂盡見三代典禮文章而讀先儒解說殆有可哂者其犧象二尊正如王肅所言全作牛象形康成阮諶之說盡臆度耳蕙田案注疏獻讀為犧以為聲誤羲讀為沙以為羽飾阮諶以為畫為牛形王肅以為直作牛形後儒鄭鍔楊簡何楷皆從王肅據此則犧當如字固不必讀為沙也明堂位以犧為周尊是周之獻以犧為首故直曰獻尊獻亦當如字不必讀為犧也鄭何雖正婆娑之非而猶從誤轉之說唯慈湖精核不可易右器用五禮通考卷三
