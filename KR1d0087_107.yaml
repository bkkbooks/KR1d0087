body:
  text: 五禮通考卷九十七刑部尚書秦蕙田撰吉禮九十七禘祫蕙田案周禮大宗伯宗廟六享首重肆獻祼饋食肆獻祼為禘饋食為祫司尊彞四時之間祀追享朝享追享為禘朝享為祫禘則禘其祖之自出以其祖配之見於大傳祫則毁廟與未毁廟之主皆合食於太祖見於公羊傳義本粲如自春秋時魯禮上僭王章下替聖人累書用彰其失漢儒不達凖魯推周各據所聞著為傳記紛淆始矣鄭氏推衍注釋罔有定見先儒譏之更歴後代奉為典章諸儒發難同異蠭起至唐陸氏據大傳以釋禘據公羊以定祫宋儒朱子一遵其説然後康成之蠶叢攘剔無餘而大宗伯之六祭昭如日月矣兹輯禘祫一門先禮經正義次傳記異同凡諸儒辨論以類附從而歴代典禮亦略該備其祭祀儀節已具時享不重出焉周禮春官大宗伯以肆獻祼享先王以饋食享先王注宗廟之祭肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦熟食也獻獻醴謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也祭必先灌乃後薦腥薦熟於祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也趙氏匡采曰肆獻祼饋食在時享之上禘以肆獻祼為主猶生之有饗也祫以饋食為主猶生之有食也蕙田案注以肆獻祼為祫饋食為禘趙氏以肆獻祼為禘饋食為祫夫禘取追逺之義祭始祖所自出自以祼獻為重祫取合食為義毁廟未毁廟之主皆陳焉尤以饋食為重陸氏之説先儒多從之是也司尊彞凡四時之間祀追享朝享祼用虎彞蜼彞皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也注鄭司農云追享朝享謂禘祫也在四時之間故曰間祀疏釋曰此六者皆据宗廟之祭但春夏同陽秋冬同隂其追享朝享又是四時之間祀以類附從故可同尊也黄氏曰先鄭曰追享朝享謂禘祫也在四時之間故曰間祀其説是禘追祭其所自出故為追享祫羣主皆朝於太祖而合食故為朝享記曰䘮之朝也順死者之孝心也此朝之義後鄭亦曰追享追祭遷廟之主而曰有所請禱非常禮也又曰朝享月朔朝廟於義通然月月行之何以謂之間祀山堂考索禘者謂追其祖之所自出故司尊彞又謂之追享禘以祼享先王其祼也猶事生之有享也享以陽為主故禘以夏大宗伯肆獻祼享先王指禘言之也祫者合也所以合聚羣主而食之毁廟之主陳於太祖未毁廟之主皆升合食於太祖以其自三年之䘮畢而朝於廟為始故司尊彞謂之朝享祫以食享先王其食也猶事生之有食食隂也故祫以冬大宗伯饋食之享指祫言之也蕙田案以上禮經禘祫禮記大傳禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省于其君干祫及其髙祖陸氏淳曰禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尋始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其疏逺不敢䙝狎故也其年數或每年一行或三年一行未可知也趙氏匡曰不王不禘明諸侯不得有也所自出謂所系之帝諸侯存五廟惟太廟百世不遷及其太祖言及者逺祀之所及也不言禘者不王不禘無所疑也不言祫者四時皆祭故不言祫也有省謂有功往見省記者也干者逆上之意言逆上及髙祖也據此體勢相連皆説宗廟之事不得謂之祭天祭法載虞夏殷周禘禮所謂禘其祖之所自出蓋禘郊祖宗並叙永世追祀而不廢絶者也禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尋始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之便以始祖配祭也此祭不兼羣廟之主為其䟽逺而不敢䙝狎故也其年數或每年或數年未可知也張子曰禮不王不禘則知諸侯嵗缺一祭為不禘明矣夏殷以禘為時祭知追享之必在夏也欲知禘之説當如趙伯循斷然立義禘也祫也郊也必嵗有之豈容有三年五年之説䘮服小記王者禘其祖之所自出以其祖配之儀禮䘮服傳都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出楊氏復曰大傳及子夏傳二章皆言大夫祭祖諸侯又上及其太祖惟天子禘其祖之所自出所謂禮不王不禘也方氏慤曰禮不王不禘蓋徳愈隆而孝愈廣位愈尊而祭愈逺故也此禘也或謂之間祀或謂之追享或謂之大祭或謂之肆獻祼何也以其非四時之常祀故謂之間祀以其及祖之所自出故謂之追享以其比常祭為特大焉故謂之大祭以其猶是生之有享焉故謂之肆獻祼禮記祭法有虞氏禘黄帝夏后氏亦禘黄帝殷人禘嚳周人禘嚳趙氏匡采曰虞氏禘黄帝蓋舜祖顓頊出於黄帝則所謂禘其祖之所自出也夏后氏禘黄帝義同舜也殷祖契出自嚳故禘嚳周禘嚳義與殷同馬氏端臨曰先王四時之祭則有常禮以常禮為未足以極其追逺之意而又為禘以祭則及其所出之祖禮不王不禘王者禘其祖之所自出以傳考之虞夏者黄帝之所自出也故虞夏禘黄帝商周者嚳之所自出故商周禘帝嚳國語魯語有虞氏禘黄帝夏后氏禘黄帝商人禘舜周人禘嚳陳氏禮書國語言商人禘舜異於祭法者蓋宋禮歟周語禘郊之事則有全烝注烝升也全其牲體而升之也楚語天子禘郊之事必自射其牲禘郊不過繭栗注角如繭栗王氏肅聖證論曰昭王問觀射父祀牲何及對曰禘郊不過繭栗射父自謂天子之禘特用繭栗之牲不以禘為配天也楊氏復曰愚案王肅以禘用繭栗之牲而非祀天此言是矣但王肅又以禘為殷祭則與祫無異而不知所謂禘者禘其祖之所自出亦未為得也愚謂祭天用騂犢天子適諸侯諸侯膳用犢尊尊之義也禘者禘其所自出之帝也尊而且逺亦用繭栗尊之如天也祖考與天本一氣祖考近而親故以人道事之所自出之帝尊而且逺故以天道事之也中庸郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎朱子集註郊祭天社祭地不言后土者省文也禘天子宗廟之大祭追祭太祖之所自出于太廟而以太祖配之也嘗秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也此與論語文大同小異記有詳略耳朱子語録禘只祭始祖及所自出之帝二者而已論語或問禘之説子曰不知也知其説者之于天下也其如示諸斯乎指其掌朱子集註先王報本追逺之意莫深于禘非仁孝誠敬之至不足以與此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子言此而自指其掌言其明且易也蓋知禘之説則理無不明誠無不格而治天下不難矣聖人於此豈真有所不知也哉朱子語録禘是祭之甚大甚逺者若他祭與祫祭止於太祖禘又祭祖之所自出如祭后稷又推稷上一代祭之周人禘嚳是也禘之意最深長如祖考與己身未相遼絶祭禮亦自易理㑹至如郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖已自大段闊逺難盡感格之道矣今又推始祖所自出而祀之茍非察理之精微盡誠之極至安能與於此故知此則治天下不難也此尚明得何况其他此尚感得何况其他自祖宗以來千數百年只是一氣相傳徳厚者流光徳薄者流卑但法有止處所以天子只是七廟然聖人心猶不滿故又推始祖所自出之帝以始祖配之然已是無廟只是附於始祖之廟然又惟天子得如此諸侯以下不與焉故近者易感逺者難格若粗淺之人他誠意如何得到那裏不是大段見得道理分明如何推得聖人報本反始之意如此深逺非是將這事去推那事只是知得此説時則其人見得道理極髙以之處他事自然沛然也爾雅禘大祭也繹又祭也注五年一大祭此疏知非祭天之禘者以文下云繹又祭也為宗廟之祭知此禘大祭亦宗廟之祭也蕙田案禘祭之義傳記及陸氏朱子諸儒論之審矣而祭之名曰禘其説則尚有未盡者漢張純曰禘之為言諦諦諟昭穆尊卑之義杜預左氏傳注三年䘮畢致主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之諦二説大指略同然昭穆尊卑人所共見何須審諦方性夫曰禘之為言逓也月祭及其親廟而不及祧廟特祭及其祧廟而不及毁廟祫祭及其毁廟而不及祖之所自出至於禘然後及焉則所及可謂逓矣此其所以謂之禘也然逓及之説雖有親疏逺近之别而無等級隆殺之分猶未圓也今案禘字從示從帝帝者五帝也禘者享帝之祭也何以言之諸侯不得祖天子大夫不得祖諸侯大夫所祖者公子也公子有宗道而别子為祖故大夫不得祖諸侯則不得祭諸侯也諸侯以始封之君為大祖始封者諸侯也以諸侯為祖而不得祖天子則不得祭天子也惟諸侯而有天下則既為天子矣為天子則可以祭天子而為祖故有虞氏舜諸侯也及為天子則禘黄帝黄帝者顓頊之所自出也不以幕為祖而祖顓頊則可以舉天子之祭禘黄帝也夏后氏諸侯也及為天子乃亦祖顓頊而禘黄帝也殷始封之祖契諸侯也殷以為始祖及為天子乃祖契而禘嚳嚳契之所自出之帝也周始封之祖稷諸侯也周以為始祖及為天子乃祖稷而禘嚳嚳稷之所自出之帝也故曰禘者享帝之祭也此之謂不王不禘不王不禘者不為天子不得祖天子而行祭帝之禘禮也明乎此而大傳小記祭法之文一以貫之明乎此而夫子答或人以不知及治國如指掌之義亦可想見諸儒糾紛之説不攻而自破此蓋以禘之字義合諸經傳求而得之不自知其是與否也宗元案禘字謬解甚多以禘為諦者乃因䘮畢吉禘而轉為諦視昭穆之諦夫昭穆自有常班新主入廟自可循次而升何待諦視而始定且於大禘無渉其解禘為逓者則以為由近而逓及於逺故及於所自出亦未免支離牽附也惟以禘字為从帝从示則字義的確矣而近又以帝為天帝之帝因指為宗祀明堂以配上帝之禮則與康成郊禘皆祭天之説何異哉愚向者竊以為商周始祖皆諸侯而所自出之帝則帝嚳也即虞夏二代之所禘亦黄帝也故禘从帝為近取即是何用他求今得此論而益復豁然乃知理到確鑿處即人有同心而别無二觧也附辨鄭氏三禘之説鄭氏禮記祭法注有虞氏禘黄帝此禘謂祭昊天於圜丘也大傳不王不禘注凡大祭曰禘大祭其先祖所由生謂郊祀天也王者之先祖皆感太微五帝之精以生蒼則靈威仰也赤則赤熛怒黄則含樞紐白則白招拒黒則汁光紀皆用正嵗之正月郊祭之蓋特祭焉孝經曰郊祀后稷以配天配靈威仰也周禮大司樂注曰此三者皆禘大祭也天神則主北辰地祗則主崑崙人鬼則主后稷孔疏案爾雅云禘大祭不辨天神人鬼地祗則皆有禘稱也祭法曰禘黄帝之等皆據祭天于圜丘大傳云王者禘其祖之所自出據夏正郊天論語禘自既灌據祭宗廟是以鄭云三者皆禘大祭也趙氏匡采曰鄭𤣥注祭法云禘謂配祭昊天上帝於圜丘也蓋見祭法所説文在郊上謂為郊之最大者故為此説耳祭法所論禘郊祖宗者謂六廟之外永世不絶者有四種耳非闗祭祀也禘之所及最逺故先言之耳豈闗圜丘哉若實圜丘五經之中何得無一字説出又云祖之所自出謂感生帝靈威仰也此何妖妄之甚此文出自䜟緯始於漢哀平間偽書也故桓譚賈逵蔡邕王肅之徒疾之如仇而鄭𤣥通之於五經其為誣蠧甚矣楊氏復曰大傳所論宗廟之祭隆殺逺近耳于祀天乎何與而孔氏引為祭感生帝大司樂冬至圜丘一章與禘祭絶不相闗而註稱圜丘為禘祭法禘祖宗三條分明説宗廟之祭惟郊一條謂郊祀以祖配天耳而註皆指為祀天同歸於誤其病安在蓋讀祭法不熟而失之也夫祭法歴叙四代禘郊祖宗之禮禘文皆在郊上蓋謂郊止於稷而禘上及乎嚳禘之所及者最逺故先言之耳鄭氏不察謂禘又郊之大者於是以祭法之禘為祀天圜丘以嚳配之以大傳之禘為正月祀感生帝于南郊以稷配之且祭法之禘與大傳之禘其義則一皆言禘其祖之所自出也鄭氏强析而為配天兩意遂分圜丘與郊為兩處昊天上帝與感生帝為兩祀嚳配天與稷配天為兩事隨意穿鑿展轉支蔓何其謬耶幸而王肅諸儒力爭之於前趙伯循與近代大儒辨正之於後大義明白炳如日星而周公制作之意可以復見不然則終于晦蝕而不明矣可勝歎哉又曰禮經惟禘禮為註疏汨壊最甚夫禘王者之大祭王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之見於大傳小記祭法及儀禮子夏傳甚詳且明如此鄭康成見祭法禘又皆在郊上率爾立論謂禘大於郊而以禘為祭天之名既又以地示宗廟亦是大祭復指禘為祭地示祭宗廟之名且於大司樂注中立為三禘之説以實之支離泛濫不可收拾諸儒已辨其謬矣馬氏端臨曰鄭氏注禘其祖之所自出以為王者之先祖皆感太㣲五帝之精以生祖者后稷也祖之所自出者蒼帝靈威仰也遂指禘以為亦祭天之禮混禘于郊捨嚳而言靈威仰其説妖妄支離特甚先儒多攻之蓋祖者后稷也祖之所自出者帝嚳也郊祀只及稷而禘則上及嚳是宗廟之祀莫大於禘故祭法先禘於郊以其所祀之祖最逺故耳于祀天無預也至楊氏引子夏傳以釋祖之所自出其説尤為明暢云附辨鄭氏禘兼羣廟鄭氏司尊彞注追享禘也謂追祭遷廟之主以事有所請禱孔氏安國曰禘祫之禮為序昭穆故毁廟之主及羣廟之主皆合食于太廟程子曰禘其祖之所自出之帝以所出之帝為東向之尊其餘合食于其前是為禘也陸氏淳曰禘於始祖廟祭所出之帝便以祖配不兼羣廟陳祥道曰陸淳謂禘祭不兼羣廟為其䟽逺不敢䙝狎殆未嘗考之于經也詩頌長發大禘而歌𤣥王桓撥相土烈烈則不兼羣廟之説其足信哉趙氏匡曰禘者王之大祭也王者既已立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也朱子曰以始祖配祭而不及羣廟之主不敢䙝也程先生説禘是禘其祖之所自出併羣廟之主皆祭之所謂禘之説恐不然故論語集註中止取趙伯循之説楊氏復曰禘祭不兼羣廟之主此非趙伯循之臆説也大傳云王者禘其祖之所自出以其祖配之則不兼羣廟之主明矣曽子問曰祫祭其太廟祝迎四廟之主又云非祫祭則七廟五廟無虚主公羊傳曰大事者何大祫也毁廟之主陳於太祖未毁廟之主皆升合食于太祖此皆指祫祭而言並無一言説禘為殷祭則禘不兼羣廟之主又明矣是以朱子疑長發為大祫之詩疑雝為武王祭文王而徹爼之詩是蓋以理決之而不為詩序所惑也且詩頌長發大禘但述元王以下而上不及於所自出之帝雝禘太祖無一詞及其嚳稷而皆稱述文王武王則安得謂之禘詩乎詩序之不足信於此尤可見矣附辨鄭氏禘各于其廟鄭氏禘祫志太王王季以上遷主祭于后稷之廟其坐位與祫祭同文武以下遷主若穆之遷主祭于文王之廟文王居室之奥東面文王孫成王居文王之東而北面以下穆王直至親盡之祖以次繼而東皆北靣無昭主若昭之遷主祭于武王之廟武王居室之奥東面其昭孫康王亦居武王之東而南面亦以次繼而東直至親盡之祖無穆主也王氏肅曰如鄭元言各於其廟則無以異四時常祀不得謂之殷祭趙氏匡曰儒者以禘祫俱大祭祫則於太祖列羣廟之主禘則於文武廟各迎昭穆之主夫太廟之有祫祭象生有族食之義列昭穆齒尊卑今乃分昭穆各於一廟集之有何理哉又五經中何得無似是之説若信有此理五廟七廟有虚主曽子問篇中何得不該蓋儒者無以分别禘祫之異强生此義又何怪哉附辨劉歆禘為終王劉氏歆曰春秋外傳曰日祭月祀時享嵗貢終王大禘則終王王氏安石曰大傳不王不禘不王之王與王者之王其義不同不王之王謂終王也王者之王謂天子也國語曰荒服終王韋昭曰終謂世終劉歆曰大禘則終王顔師古曰每一王終新王即位乃來助祭此不王不禘之㫖也吴氏仁傑曰説禮不王不禘王如來王之王四夷之君世見中國一世王者立則彼一番來朝故王者行禘禮以接之彼本國之君一世繼立則亦一番來朝故歸國則亦行禘禮蕙田案大傳不王不禘明諸侯不得通禘耳與終王世見無渉劉歆諸儒悞觧於前安石斗南附㑹於後並不可從觀承案劉歆以外傳有嵗貢終王之文而以終王為大禘殊謬或者以吉禘之禘當之庶㡬稍合蓋新王入廟而行吉禘之禮則是一王終也而介甫乃以不王不禘之王解終王則尤牽合矣不王之王明指王者而言可别解歟又案以上禘春秋文公二年八月丁卯大事于太廟公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖注以言大與有事異毁廟謂親過髙祖毁其廟藏其主於太祖廟中太祖周公之廟陳者就陳列太祖前太祖東向昭南向穆北向其餘孫從王父父曰昭子曰穆敬自外來曰升榖梁傳范注祫祭者皆合祭諸廟已毁未毁者之主於太祖廟中以昭穆為次序父為昭子為穆昭南向穆北向孫從王父坐也祭畢則復還其廟楊氏復曰此謂大合毁廟與未毁廟之主於太祖之廟而祭之也禮記曾子問祫祭於祖則祝迎四廟之主主出廟入廟必蹕疏當祫之年則祝迎髙曽祖禰四廟而于太祖廟祭之天子祫祭則迎六廟之主四廟舉諸侯言也出廟者謂出己廟而往太祖廟入廟謂從太祖廟而反還入己廟當七廟五廟無虚主虚主者惟祫祭於祖為無主耳禮器大饗其王事與注謂祫祭先王來疏孝經云四海之内各以其時助祭故云大享是祫祭也以享中最大故稱大享三牲魚腊四海九州之美味也籩豆之薦四時之和氣也内金示和也束帛加璧尊徳也龜為前列先知也金次之見情也注金照物金有兩義先入後設丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也其出也肆夏而送之蓋重禮也注出謂諸侯之賔也禮畢而出作樂以節之肆夏當為陔夏禮疏大享諸侯則諸侯出入奏肆夏此經其助祭之後畢客醉而後出宜奏陔夏故燕禮大射賔出奏陔夏明不失禮也樂記大饗之禮尚元酒而爼腥魚大羮不和有遺味者矣注大饗祫祭先王以腥魚為爼實不臑熟之大羮肉湆謂不以鹽菜大戴禮大饗尚元尊爼生魚先大羮貴飲食之本也大饗尚元尊而用酒食先黍稷而飯稻粱登躋大羮而飽乎庶羞貴本而親用也附辨張純祫止毁廟張氏純曰舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭蕙田案公羊傳云毁廟之主陳于太祖未毁廟之主皆升合食於太祖漢制祫止毁廟不及存廟未審所據何經附辨王肅祫不及毁廟王氏肅曰禘者毁廟之主皆合於太祖祫者惟未毁之主合而已矣蕙田案一祫祭也割其半以為禘又割其半以為祫禘祫之禮于是胥失又案以上祫附辨賈逵王肅禘祫一祭二名賈逵劉歆曰禘祫一祭二名禮無差降王氏肅曰曽子問惟祫于太祖羣主皆從而不言禘臣以為禘祫殷祭羣主皆合舉祫則禘可知也論語孔子曰禘自既灌而往者吾不欲觀之矣所以特禘者以禘大祭故欲觀其盛也禘祫大祭獨言禘則祫亦可知矣孔穎逹王制疏左氏及杜氏則皆以禘為三年一大祭在太祖之廟傳無祫文然則祫即禘也取其序昭穆謂之禘取其合集羣祖謂之祫後漢書章懷太子賢注禘祫俱是大祭名可通也陳氏禮書漢時以禘祫為一祭故其禮始紊山堂考索大宗伯肆獻祼是禘祭也饋食是祫祭也司尊彞追享是禘祭朝享是祫祭也既有此别而賈逵劉歆以為禘祫一祭二名漢平帝祫祭于明堂而張純以為禘祭章懐太子注云是大祭名可通也周禮既曰肆獻祼又曰饋食既曰追享又曰朝享差别其禘祫也祫則及毁廟之主禘則及於祖之所自出也安得一祭而二名哉附辨胡寅天子有禘無祫胡氏寅曰禘祫皆合食也故君子曰禘其所自出之帝為東向之尊其餘合食于前此之謂禘諸侯無所自出之帝則于太祖廟合羣廟之主而食此之謂祫天子禘諸侯祫上下之殺也魯諸侯何以得禘成王追念周公有大勲勞于天下賜魯以天子禮樂使用諸太廟上祀周公于是乎有禘所以春秋言禘不言祫也孔子曰魯之郊禘非禮也則知諸侯無禘而當祫天子無祫而有禘豈不明白而易知乎馬氏端臨曰以禘祫為共一祭而異名以禘為合祭祖宗審諦昭穆之義漢儒之説也近代諸儒多不以為然獨致堂從之然大傳禮不王不禘王者禘其祖之所自出以其祖配之而即斷之曰諸侯及其太祖大夫士有大事省于其君干祫及其髙祖其文意亦似共只説一祭天子則謂之禘所謂不王不禘而祭則及其祖之所自出諸侯則不可以言禘而所祭止太祖大夫士又不可以言祫必有功勞見之于君許之祫則于祫可及髙祖蓋共是合祭祖宗而以君臣之故所及有逺近故異其名所以魯之禘祭者即祫也若大傳文諸侯之下更有一祫字則其義尤明楊氏復曰漢儒之論混禘於祫皆以為合食於太祖則禘祫無辨矣而又欲勉强穿鑿分别其所以不同此所以紛紛多端而莫之一也混禘于祫而禘之禮遂亡混祫于禘而祫之禮亦紊可不惜哉蕙田案致堂謂天子無祫而有禘正坐悞以禘祫皆合食之故信齋所謂混禘於祫而禘之禮遂亡混祫於禘而祫之禮亦紊正中其弊文獻通考既知鄭氏之為臆説又知混禘祫為一之非而於致堂之説仍有取焉可謂信道不篤者矣近世萬斯同猶述之異哉又案天子宗廟之禘祫當以周禮大宗伯司尊彞二職之文為定而司尊彞之文尤明其言曰春祠夏禴秋嘗冬烝四時之間祀追享朝享祠禴嘗烝四時之正祭也追享即禘祭取追逺之義故名追享朝享即祫祭羣廟之主皆升合食於太祖有朝之義故名朝享以其間於四時正祭之中故名四時之間祀大宗伯之職曰以肆獻祼享先王以饋食享先王肆陳牲也獻獻酒醴也祼以鬰鬯之酒灌地降神也饋食薦黍稷也肆獻祼以禘祭言饋食以祫祭言蓋追始祖所自出尤以祼獻為重祫則陳毁廟之主而合食焉尤以饋食為重也禘祭之禮當以大傳之文為定曰禮不王不禘王者禘其祖之所自出以其祖配之趙伯循謂禘王者之大祭王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也朱子謂禘止祭始祖所自出之帝及始祖二位不及羣廟之主是也故字從示從帝禘者天子享帝之祭也諸侯不敢祖天子惟王者可以追始祖所自出之帝而祭之所祭者帝故曰禘乃天子之禮也祫祭之禮當以公羊傳之文為定曰大事者何大祫也大祫毁廟之祖陳於太祖未毁廟之主皆升合食於太祖蓋毁廟之主藏於太廟之夾室故出而陳之未毁廟之主皆在各廟故祝迎之使升於太祖而合食焉曾子問曰祫祭則祝迎四廟之主諸侯五廟一為太祖廟毁廟之主皆藏焉故惟迎四廟之主也天子則迎六廟之主故曰周旅酬六尸七廟七尸始祖后稷發爵不受旅故旅酬止六尸也祫有時祫有大祫時祫未毁廟之主合食於太祖大祫則合毁廟未毁廟之主皆升合食公羊所云則大祫也天子有禘有祫諸侯無禘而有祫其禘祫之期亦當以周禮司尊彞之文為定其文曰四時之間祀間祀者間於四祭之中四祭嵗嵗有之則間祀亦嵗嵗有之也横渠張子曰禘也祫也郊也必嵗有之豈容有三年五年之説夫天子每嵗必郊每嵗必禘祫可知張子之説為是乃鄭康成從禮緯之説云三年一祫五年一禘夫以三年五年禘祫合計之則第一祫在三年第一禘在五年第二祫在六年第三祫在九年第二禘在十年第四祫在十二年第五祫第三禘俱在十五年此唐太常議所謂或比年頻合或同嵗再序或一禘之後并為再祫或五年之内驟有三殷求於禮經頗為乖失禘祫之紊其由是也若其祭時禘以獻祼為主陽義也祫以饋食為主隂義也漢張純曰禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫以冬十月冬者五榖成熟物備禮成故合序飲食也其義甚精明集禮移在嵗暮於禮意同一揆也又案大司馬職仲夏教茇舍獻禽以享禴仲冬教大閱獻禽以享烝仲春教振旅獻禽以祭社仲秋教治兵致禽以祭祊舉方社而祠嘗可知然則周禮宗廟一嵗蓋六祭仲春而祠孟夏而禘仲夏而禴仲秋而嘗孟冬而祫仲冬而烝所謂四時之間祀蓋不爽也禘祫正義其著於經傳而可據者如此至其異同乖剌之故詳見後方右經傳禘祫正義禮記王制天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝注此蓋夏殷之祭名周則改之春曰祠夏曰礿以禘為殷祭詩小雅曰礿祠烝嘗于公先王此周四時祭宗廟之名祭疏此一節論夏殷天子諸侯大夫四時祭宗廟之事名與周不同故以為夏殷之祭又無文故稱蓋以疑之此云春礿而郊特牲云春禘者鄭彼注云禘宜為禴從此為正祭義曰春禘鄭注直云夏殷禮不破禘字者已見郊特牲注故略之也知以禘為殷祭者公羊傳曰五年而再殷祭又春秋僖八年秋七月禘於太廟是禘為殷祭殷大也謂五年一大祭引詩小雅是文王天保之詩謂文王受命已改殷之祭名以夏祭之禘故名曰礿而詩先礿後祠從便文嘗在烝下以韵句也郊特牲饗禘有樂而食嘗無樂隂陽之義也春禘而秋嘗注此禘當為禴字之悞也王制曰春禴夏禘之疏依禮三代無春禘之文周則春曰祠王制夏殷禮云春曰禴今云春曰禘故知禘當為禴此經所論謂夏殷禮也舉春見夏舉秋見冬祭義君子合諸天道春禘秋嘗禘有樂而嘗無樂注春禘夏殷禮也周以禘為殷祭更名春祭曰祠春疏案王制云春礿夏禘周禮大宗伯春祠夏礿今云禘故鄭曰夏殷禮然王制春曰礿此云春禘禘當為礿于郊特牲已注故此不言也祭統凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也王制天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫注犆猶一也祫合也天子諸侯之䘮畢合先君之主於祖廟而祭之謂之祫後因以為常天子先祫而後時祭諸侯先時祭而後祫凡祫之嵗春一礿而已不祫以物無成者不殷祭周改夏祭曰礿以禘為殷祭也魯禮三年䘮畢而祫於太祖明年春禘於羣廟自爾之後五年而再殷祭一祫一禘也虞夏之制諸侯嵗朝故四時礿禘嘗烝必廢一祭礿犆互明犆礿文也禘一犆一祫下天子也祫嵗不禘疏此一節論夏殷天子諸侯大祭及時祭之事天子之祭當祫之嵗以春物未成不為祫祭惟犆為時祭之礿故云犆礿夏秋冬之時先為祫祭後為時祭故云祫禘祫嘗祫烝也鄭注先祫而後時祭者以經曰祫禘祫嘗祫烝天子位尊故先為大禮也諸侯先時祭而後祫者以下云嘗祫烝祫諸侯位卑取其漸備故先小禮後大禮此等皆殷以前之制但不知㡬年一祫禮緯云三年一祫五年一禘鄭云百王通義則虞夏殷周皆同三年一祫也皇氏以為虞夏祫祭每年皆為又云三時祫者謂夏秋冬或一時得祫則為之不三時俱祫今鄭注云春一礿而已不祫以物無成不殷祭又禘祫志云王制記先王之法祫為大祭祫于秋于夏于冬周公制禮祭不欲數如鄭此言則夏殷三時俱殷祭皇氏之説非也鄭注謂魯禮三年䘮畢而祫于太祖者案文二年八月丁卯大事于太廟公羊傳云大事者何大祫也通僖公死之年為三年也注謂明年春禘于羣廟者案僖公八年禘于太廟宣八年有事于太廟有事禘也皆八年禘者既五年一禘則後禘去前禘五年也前禘當三年今二年而祫故云明年春禘于羣廟案閔二年五月吉禘于莊公昭十五年禘于武宫昭二十五年將禘于襄公禘皆各就廟為之故云羣廟注謂自爾之後五年而再殷祭者公羊傳文自爾謂三年禘羣廟之後每五年之内再為殷祭故鄭禘祫志云閔公之䘮僖三年禘僖六年祫僖八年禘凡三年䘮畢二年為祫三年為禘皆祫在禘前其禘祫大小鄭以公羊傳云大事者何大祫也毁廟之主陳于太祖未毁廟之主皆升合食于太祖故為大事若王肅張融孔晁皆据逸禮以禘為大祫為小鄭不用逸禮又曽子問云七廟五廟無虚主虚主者惟天子崩與祫祭取羣廟之主明禘祭不取羣廟之主可知爾雅云禘大祭也謂比四時為大也若左氏及杜氏則皆以禘為三年一大祭在太祖之廟傳無祫文然則祫即禘也取其序昭穆謂之禘取其合集羣祖謂之祫注謂虞夏之制者雜明諸代不專殷也又春礿注云夏殷則知夏殷春祭俱名礿也虞夏之制諸侯嵗朝皆缺一時之祭此從南方始南方諸侯春礿祭竟夏來朝故缺夏禘故云礿則不禘西方諸侯行夏祭竟而秋來朝故不嘗也北方諸侯行秋祭竟而冬來朝故廢烝東方諸侯行冬祭竟而春來朝故廢礿各廢一時耳餘三時皆祭也今不從東方始而從南方始者欲舉春礿得祭者為始故也礿犆者諸侯降于天子故礿在犆上也欲見先時祭故礿在犆上禘一犆一祫者言諸侯當在夏祭一禘之時不為禘祭惟犆一祫而已缺時祭也不云一禘而云禘一者禘在一前與礿在犆前其義同皆見先時祭也嘗祫烝祫者謂諸侯先作時祭烝嘗然後為大祭之祫也程子曰諸侯亦祭祫只是祠禴嘗烝之祭為廟禮煩故每年于四祭之中三祭合食於祖廟惟春則祭諸廟也張子曰天子犆礿祫禘祫嘗祫烝知天子廟春犆礿於太祖夏禘秋嘗冬烝並祫祭于太祖之廟嘗禘祫則天子必親行祭事故羣廟之主皆在太祖之廟故禮可得而周遍也若時祭則逐廟行禮勢必十數日仍不得各為齋戒以是容有司行事乃可以同日而事畢舊説一日徧祭七廟勢不可及雖於書有文王騂牛一武王騂牛一似一日而祭二廟然恐二王在一廟而祭之牲則各異也又曰天子七廟一日而行則力不給故禮有一犆一祫之説犆則祭一祫則徧祭如春祭髙祖夏祭羣廟秋祭曽冬又祫來春祭祖夏又祫秋祭禰冬又祫楊氏復曰程子之言正觧釋天子犆礿祫禘祫嘗祫烝之義其曰祫合祭也只是禴祠嘗烝之祭為廟禮煩故每年于四祭之中三祭合食于祖廟惟春則祭諸廟此説推明時祭之本意最為明白張子謂禮有一犆一礿之説正觧釋諸侯礿犆禘一犆一祫嘗祫烝祫一章但本文言礿嘗烝三祭皆祫惟禘一犆一祫禮文殘缺指不分明故張子不從其言又别為之説曰春祀髙祖夏禴羣廟秋祭曽冬又祫來春祭祖夏又祫秋祭禰冬又祫雖一犆一祫之説若可通但言犆只祭一廟而遺其餘廟恐于人情亦有所不安不若前程子之言簡而意備也又春祠夏禴秋嘗冬烝周時祭名詩所謂禴祠烝嘗于公先王是也此云礿禘嘗烝乃記禮者之悮也之又曰祫祭有二曽子問曰祫祭于祖則祝迎四廟主王制云天子祫嘗祫烝諸侯嘗祫烝祫此時祭之祫也公羊傳曰毁廟之主陳于太祖未毁廟之主皆升合食于太祖此大祫毁廟未毁廟之主而祭之也祫祭惟有二條此外無餘禮漢儒之論又混禘祫而并言之何其紛紛多端也蕙田案程子張子楊氏三條主時祫之説附辨傳記不同及注疏之説趙氏匡采曰問者曰若禘非時祭之名則禮記諸篇所説其故何也答曰禮記諸篇或孔門後之末流弟子所撰或是漢初諸儒私撰之以求購金漢初以金購遺書故儒者私撰禮篇鬻之皆約春秋為之見春秋禘於莊公遂以為時祭之名若非末流弟子及漢初儒者所著不應差互如此也見春秋唯兩度書禘一春一夏閔二年五月吉禘于莊公今之三月僖公八年七月禘于太廟今之五月也所以或謂之春祭或謂之夏祭各自著書不相扶㑹理可見也而鄭元不達其意故注郊特牲云禘當為礿祭義與郊特牲同鄭遂不注祭統及王制則云此夏殷時禮也且祭統篇末云成王追念周公賜之重祭郊社嘗禘是也何得云夏殷禮哉遂都不注問者曰王制所云礿則不禘禘則不嘗嘗則不烝烝則不礿信如鄭説乎答曰撰此篇者亦縁見春秋中唯有禘烝嘗三祭謂魯唯行此三祭遂云爾若信如鄭注諸侯每嵗皆朝即逺國來往須歴數時何獨廢一時而已又須往來當在道路如何守國理民乎問者曰明堂位云季夏六月以禘禮祀周公于太廟又云夏礿秋嘗冬烝此即以禘為大祭而時祭闕一時義甚明著也答曰禮篇之中夏礿秋嘗冬烝庸淺鄙妄此篇為甚故云四代之官魯兼用之又云君臣未嘗相弑也禮樂刑法未嘗相變也其鄙若此何足徴乎鄭𤣥不能尋本討原但隨文求義觧此禘禮輒有四種其注祭法及小記則云禘是祭天注詩頌則云禘是宗廟之祭小於祫注郊特牲則云禘當為礿注祭統王制則云禘是夏殷之時祭名殊可怪也問曰禘若非圜丘國語云郊禘之牛角繭栗何也答曰凡禘皆及五帝五帝太皥等是也以其功髙歴代兆於四郊以祭之比之次於天帝且郊祀稷牛角猶繭栗則太皥之牛不得不爾何足疑哉意田案此條辨時祭夏殷禮之非觀承案虞夏商周所禘者各禘其一帝耳趙氏此條謂凡禘皆及五帝兆於四郊以祭之則又是祭天之説而混禘於郊矣其與康成何異而難之哉此殊不可觧朱子語録王制特禴祫禘祫嘗祫烝之説此沒理㑹不知漢儒何處得此説來禮家之説大抵自相矛盾如禘之義恐只趙伯循之説為是朱子曰正義所觧亦難曉礿祭以春物未成其禮稍輕須著逐廟各祭祫禘之類又却合為一處則犆反詳而祫反略矣又據正義禘禮是四處各序昭穆而大傳謂禮不王不禘王者禘其祖之所自出以其祖配之若周人禘帝嚳配以后稷是也如此則説禘又不可通矣又云春秋書禘於太廟用致夫人又不知禘於太廟其禮如何太廟是周公之廟先儒有謂魯亦立文王廟左氏載鄭祖厲王諸侯不敢祖天子而當時越禮如此故公廟設於私家皆無理㑹處又諸侯礿則不禘一段是嵗朝天子廢一時祭春秋朝㑹無節豈止一嵗廢一時祭而已哉不然則或有世子或大臣居守豈不可以攝事蕙田案朱子此二條辨祫禘序昭穆及嵗朝廢祭之非胡氏寅曰禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士省于其君干祫及其髙祖是天子禘諸侯大夫士祫之正文也終大傳一篇無舛駁於聖王之教者此孔氏所傳也王制乃漢儒刺經為之出於孝文之世其言舛駁於聖王之教者多矣固非孔氏所傳也王制之文曰春礿夏禘又曰天子祫禘祫嘗祫烝又曰諸侯禘一犆一祫又曰諸侯礿則不禘禘則不嘗其言紛錯淆亂莫可案據鄭氏不能辨正又曲為之説春礿夏禘乃夏殷祭名周則改之以禘為殷祭且王制所載六官之事皆周制也此惑於漢儒而不通禘義之一也又曰天子諸侯之䘮畢合先君主於祖廟而祭之謂之祫此惑於漢儒不通禘義之二也又曰天子先祫而後時祭此惑於漢儒不通禘義之三也又曰魯禮三年䘮畢而祫於太祖明年春禘於羣廟此惑於漢儒不通禘義之四也又曰禘殷祭也五年而再殷祭一祫一禘又自叛其説不曉禘義之五也又曰諸侯祫嵗不禘下天子此又不曉禘義之六也其釋大傳禘祫曰禘其所自出謂郊天也此又斷以己意不曉禘義之七也後世惟王制之信憑鄭氏所釋而不考祭法大傳及孔子之言唐遂至夏禘冬祫始知其數而凟也不亦失之逺乎虙氏曰周禮春祠夏禴秋嘗冬烝此四時之祭名也考之王制則春曰礿夏曰禘祭統亦曰春祭曰礿夏祭曰禘與周禮所言春夏之制相反矣考之郊特牲則曰春禘而秋嘗祭義亦曰君子合諸天道春禘秋嘗又與王制祭統所言春夏之祭相反矣鄭康成之説以春礿夏禘為夏殷之祭周則改之亦無明文可據蓋康成以意揣之也至於郊特牲言春禘鄭康成釋之曰禘當為礿字之悞也意謂王制祭統既言春礿則此不當言春禘故以為礿字之悞然則祭義又言春禘豈有二篇之文皆悞哉此不通之論也蕙田案胡氏二條統論禮記注疏之非文獻通考馬氏曰禘之為時祭則王制天子祫禘諸人侯禘一犆一祫之説左傳烝嘗禘于廟之説所載晉言寡君未禘祀之説皆指時祭而言無縁皆妄蓋禘有二名有大禘之禘大傳所謂禮不王不禘者禘其祖之所自出而以祖配之禮運所謂魯之郊禘非禮也是也有時禘之禘祭義所謂春禘秋嘗王制所謂天子祫禘諸侯禘一犆一祫是也趙伯循必以禘為非時祭之名因不信鄭氏而并詆禮記左傳其意蓋謂禘只是大禘無所謂時禘然禘之名義它不經見魯惟禮記詳言之耳趙氏所言亦是因不王不禘之説郊禘非禮之説見得禘為天子之大祀故不可以名時祭然大傳禮運禮記也王制祭義亦禮記也今所本者大傳禮運所詆者王制祭義是據禮記以攻禮記也至於烝嘗禘於廟一語雖左氏所言然其所載昭公十五年禘於武宫二十五年禘於襄公定公八年禘於僖公襄公十六年晉人曰寡君之未禘祀則皆當時之事今趙氏皆以為左氏見經中有禘於莊公一事故於當時魯國及它國之祭祀皆妄以為禘則其説尤不通矣安有魯國原無此祭晉人原無此言而鑿空妄説乎蓋魯伯禽嘗受郊禘之賜則魯國後來所行之禘其或為大禘或為時禘亦未可知也至於左氏所謂烝嘗禘於廟晉人所謂寡君未禘祀則時禘之通行于天子諸侯者非止魯國行之而已恐難儕之郊望而例以僣目之也蕙田案宗廟一嵗六祭仲春而祠孟夏而禘仲夏而禴仲秋而嘗孟冬而祫仲冬而烝肆獻祼饋食著於大宗伯四時間祀詳於司尊彞不易之説也至王制祭義祭統皆作於漢儒其言宗廟祭祀多與周禮不合如王制云春曰礿夏曰禘礿與禴通則悞以夏祭之禴為春祭又悞以追享之禘為時祭又曰天子犆礿祫禘祫嘗祫烝諸侯祫則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫既悮以禘為時祭祫為春祭又悞以時祭為祫祭趙伯循及朱子胡氏虙氏排之可謂明且切矣馬氏專據禮記左傳為時禘之説據鄭氏以駁趙氏非也又譏趙氏據禮記以駁禮記夫大傳小記雖出戴氏獨不思周禮大宗伯及司尊彞之文豈亦出於戴氏乎時祫之説程子張子亦曽言之義可並存至時禘則終未敢遽信也詩周頌雝序曰禘太祖也箋禘大祭也大於四時而小於祫太祖謂文王疏雝者禘太祖之樂歌也謂周公成王太平之時禘祭太祖之廟詩人以今之太平由此太祖故因其祭述其事而為此歌焉朱子詩序辨周人禘嚳又曰天子七廟三昭三穆及太祖之廟而七周之太祖即后稷也禘嚳於后稷之廟而以后稷配之所謂禘其祖之所自出以其祖配之者也祭法又云周祖文王而春秋家説三年䘮畢致新死者之主於廟亦謂之吉禘是祖一號而二廟禘一名而二祭也今此序云禘太祖則宜為禘嚳於后稷之廟矣而其詩之詞無及於嚳稷者若以為吉禘於文王則與序已不協而詩文亦無此意恐序之悞也此詩但為武王祭文王而徹爼之詩而後通用於他廟耳范氏處義曰周以后稷為太祖祭法曰周人禘嚳此曰禘太祖何也曰禘其祖之所自出則嚳也以其祖配之則后稷也天子七廟三昭三穆與太祖之廟而七禘行於宗廟嚳既無廟故舉其配而言之商頌長發序曰大禘也箋大禘郊祭天也禮記曰王者禘其祖之所自出以其祖配之是謂也朱子集傳序以為此大禘之詩蓋祭其祖之所自出而以其祖配也蘇氏曰大禘之祭所及者逺故其詩歴言商之先后又及其卿士伊尹蓋與祭於禘者也商書曰兹予大享于先王爾祖其從與享之是禮也豈其起於商之世歟今案大禘不及羣廟之主此宜為祫祭之詩然經無明文不可考也馬氏復京曰陸淳云禘於始祖廟祭所出之帝便以祖配不兼羣廟朱子蓋同陸説蕙田案何氏休公羊註禘所以異於祫者功臣皆祭也蓋即據此詩義而言楊信齋謂何休祫祭不及功臣禘則功臣皆祭案祫烝則功臣皆祭即司勲所謂祭於大烝是也誰謂祫祭功臣不與享乎今考禘祭不兼羣廟何縁功臣與享何休之説非矣楊氏引司勲凡有功者祭於大烝為祫祭功臣與享之証然烝亦四時之祭盤庚云兹予大享於先王爾祖其從與享之孔安國曰配食于廟大享烝嘗也此詩序以為大禘朱子楊氏以為大祫據周禮及尚書疏又俱不指禘祫似孔安國之説為長右傳記言禘祫不同春秋閔公二年夏五月乙酉吉禘於莊公左氏傳速也注三年䘮畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公䘮服未闋時别立廟廟成而吉祭又不於太廟故詳書以示譏祀疏僖三十三年傳曰凡君薨卒哭而祔祔而作主特于主烝嘗禘于廟禘祀為吉祭説䘮事而言禘知禘是䘮終而吉祭也襄十五年晉悼公卒十六年傳稱晉人答穆叔云以寡君之未禘祀知三年䘮畢乃為禘也䘮畢而為禘祭知致新死之主於廟也新主入廟則逺主當遷知其遷入祧者祭法云天子七廟有二祧則祧是逺祖廟也周禮守祧守先王先公之廟祧其遺衣服藏焉廟之逺主其廟既遷主無所處固當遷入祧也鄭元以二祧為文王武王之廟遷主入廟當各從其班穆入文祧昭入武祧禮諸侯五廟更無别祧則當為太祖之廟為祧也逺主初始入祧新死之主又當與先君相接故禮因是而為大祭以審序昭穆故謂之禘禘者諦也言使昭穆之次審諦而不亂也莊公以其三十二年八月薨至此年五月惟二十二月故䘮制未闋也公羊傳曰其言于莊公何未可以稱宫廟也曷為未可以稱宫廟在三年之中矣三年之中未得以禮遷廟而特云莊公知為莊公别立廟廟成而吉祭也僖八年禘于太廟文二年大亊於太廟宣八年有事於太廟彼言大亊有事亦禘祭也則禘禮必于太廟今未可以吉祭而為吉祭又不于太廟故詳書以示譏也既云吉禘又云于莊公是其詳也公羊傳其言吉何言吉者未可以吉也曷為未可以吉未三年也三年矣曷為謂之未三年三年之䘮實以二十五月其言于莊公何未可以稱宫廟注時閔公以莊公在三年之中未可以入太廟禘之于新宫故不稱宫廟明皆非也榖梁傳夏五月乙酉吉禘于莊公吉禘者不吉者也䘮事未畢而舉吉祭故非之也疏言禘於莊公即是莊公立宫而不稱宫者莊公廟雖立訖而公服未除至此始二十二月未滿三年故不得稱宫也此䘮服未終舉吉以非之凡祭祀之禮書者皆譏僖公八年秋七月禘于太廟用致夫人注禘三年大祭之名太廟周公廟致者致新死之主于廟而列之昭穆夫人淫而與弑不薨于寢于禮不應致故僖疑其禮歴三禘今果行之異常故書之始疏此致致哀姜也哀姜薨已多年非新死而于今致者傳發凡例夫人不薨于寢則不致哀姜例不應致故僖公疑其禮䘮畢之日不作禘祭之禮以致之既不為哀姜作䘮畢禘祭其禘自從閔公數之二年除閔䘮為禘至五年復禘今八年復禘姜死以來已歴三禘今因禘祭果復行之三年一禘禘自是常不為夫人禘祭因禘而致夫人嫌其異于常禮故史官書之若其不致夫人則此禘得常不書為用致夫人而書之耳左氏傳秋禘而致哀姜焉非禮也凡夫人不薨於寢不殯於廟不赴于同不祔于姑則弗致也公羊傳用者何不宜用也致者何不宜致也禘用致夫人非禮也夫人何以不稱姜氏貶曷為貶譏以妾為妻也其言以妾為妻奈何蓋脅于齊媵女之先至者也榖梁傳秋七月禘於太廟用致夫人用者不宜用者也致者不宜致者也注禮記明堂位曰季夏六月以禘禮祀周公于太廟雜記下曰孟獻子曰七月日至可以有事於祖七月而禘獻子為之案宣九年仲孫蔑如京師于是獻子始見經襄十九年卒然則失禮非獻子所始明矣雜記之云寗所未詳劉向曰夫人成風也致之於太廟立之以為夫人疏范言此者以禮記稱七月而禘獻子為之此時未有獻子亦七月而禘故知失禮非獻子為始也左氏以夫人為哀姜因禘祭而致之於廟公羊以為僖公本取楚女為嫡取齊女為媵齊女先至遂脅公使立之為夫人故因禘祭而見於廟此傳及注意則以夫人為成風致之者謂致之於太廟立之以為夫人與二傳違者若左氏以夫人為哀姜元年為齊所殺何為今日乃致之若公羊以為齊之媵女則僖公是作頌賢君縱為齊所脅豈得以媵妾為夫人乎明知二傳非也今傳云一則以宗廟臨之而後貶焉一則以外之弗夫人而見正焉檢經傳之文符同故知是成風也禮記雜記孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也注記魯失禮所由也獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月耳明堂位曰季夏六月以禘禮祀周公于太廟日疏此一節明魯郊禘之事七月周七月建午之月也至夏至日也有事謂禘祭于祖廟此言非也魯之祭祀猶用夏法禘于孟月孟月于夏家是四月于周為六月獻子以二至相當以天對祖乖失禮意獻子為之記其失所由也案春秋宣九年獻子始見經案僖八年于時未有獻子而七月禘者鄭云以僖公八年正月公㑹王人于洮六月應禘以在㑹未還故至十月乃禘理不合譏為致夫人故書之獻子既七月而禘春秋不書於經以示譏者魯時暫行之此又不云自獻子始是不恒行也陸氏佃曰此言冬日至可以有事于上帝夏日至可以有事于祖七月而禘僖公蓋嘗用此秋七月禘于太廟是也春秋文公二年八月丁卯大事于太廟躋僖公注大事禘也躋升也僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之時未應吉禘而於太廟行之其譏已明徒以逆祀故特大其事異其文則疏昭十五年有事于武宫傳稱禘于武宫有事是禘知大事亦是禘也躋升也釋詀云公羊傳曰躋者何升也禘祭之禮審諦昭穆諸廟已毁未毁之主皆于太祖廟中以昭穆為次序父為昭子為穆太祖東向昭南向穆北向孫從王父以次而下祭畢則復其廟其兄弟相代則昭穆同班近據春秋以來惠公與莊公當同南靣西上隱桓與閔僖亦同北靣西上僖是閔公之庶兄繼閔而立昭穆雖同位次閔下今升在閔上故書而譏之僖公以其三十三年十一月薨至此年十一月䘮服始畢今始八月時未應吉禘而於太廟行之與閔公二年吉禘于莊公其違禮同也彼書吉禘其譏已明則此亦從譏可知不復更譏其速也徒猶空也空以逆祀之故亂國大典故特大其事謂之大事譏逆祀也釋例曰文公二年僖公之䘮未終未應行吉禘之禮而於太廟行之其譏已明徒以躋僖而退閔故特大其祀異其文定八年亦特書順祀皆所以起非常也有事于武宫及順祀𫝊皆稱禘則知大事有事于太廟亦禘也左氏傳秋八月丁卯大事於太廟躋僖公逆祀也于是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪觧享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也注僖是閔兄不得為父子嘗為臣位應在下今居閔上故曰逆祀宗伯掌宗廟昭穆之禮新鬼僖公既為兄死時年又長故鬼閔公死時年少弗忌明言其所見又以僖公為聖賢齊肅也臣繼君猶子繼父鯀禹父契湯十三世祖不窋后稷子帝乙㣲子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之忒差也皇皇美也后帝天也詩頌僖公郊祭上天配以后稷先稱帝也詩邶風也衛女思歸而不得故願致問于姑姊僖親文公父夏父弗忌欲阿附君先其所親故𫝊以此三詩深責其意公羊傳八月丁卯大事於太廟大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖五年而再殷祭注殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審諦無所遺失禮天子特禘特祫諸侯禘則不礿祫則不嘗大夫有賜于君然後祫其髙祖疏欲言大祭無禘祫之文欲言時祭而經書大故執不知問宣八年夏六月辛巳有事于太廟彼是時祭不言大則知此言大者是大祭明矣躋者何升也何言乎升僖公譏何譏爾逆祀也其逆祀奈何先禰而後祖也注升謂西上禮昭穆指父子近取法春秋惠公與莊公當同南靣西上隱桓與閔僖亦當同北靣西上繼閔者在下文公縁僖公與閔公為庶兄置僖公於閔上失先後之義故譏之傳曰後祖者僖公以臣繼閔公猶子繼父故閔公于文公亦猶祖也自先君言之隱桓及閔僖各當為兄弟顧有貴賤耳自繼代言之有父子君臣之道此恩義逆順各有所施也不言吉禘者就十二年不復譏略為下張本言疏閔二年夏五月乙酉吉禘於莊公傳曰其言吉何吉者未可以吉也曷為未可以吉未三年也然則吉禘於莊公在三年之内今此大事亦在三年之内是不須更言吉祫以譏之但略言大事于太廟為下躋僖公張本而已榖梁傳八月丁卯大事於太廟躋僖公大事者何大是事也著祫嘗祫祭者毁廟之主陳於太祖未毁廟之主皆升合祭於太祖躋升也先親而後祖也逆祀也逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也故曰文無天無天者是無天而行也君子不以親親害尊尊此春秋之義也注祖人之始也人之所仰天也尊卑有序不可亂也襄公十六年左氏傳晉人曰以寡君之未禘祀注禘祀三年䘮畢之吉祭祀疏僖三十三年𫝊云凡君薨卒哭而祔袝而作主特于主烝嘗禘于廟如彼𫝊文則既祔之後可以為烝嘗也閔二年五月吉禘于莊公以其時未可吉書吉以譏之此年正月晉已烝于曲沃仍云未得禘祀知其禘祀是三年䘮畢之吉祭也昭公十五年二月癸酉有事於武宫籥入叔弓卒去樂卒事注略書有事為叔弓卒起也武宫魯武公廟成六年復立之疏釋例曰三年之禘自國之常常事不書故惟書此數事祭雖得常亦記仲遂叔弓之非常也是言叔弓之卒非常故書之也釋例亦云凡三年䘮畢然後禘于是遂以三年為節當仍計除䘮即吉之月卜日而後行事無復常月也是以經書禘及大事𫝊惟見莊公之速也無非時之譏也即如例言三年一禘若計襄公之薨則禘當在二年五年八年十一年十四年此年非禘年也若計齊歸之薨則禘當在十三十六年此年亦非禘年也而云祭雖得常者釋例曰禘於太廟禮之常也各于其宫時之為也雖非三年大祭而書禘用禘禮也昭二十五年𫝊曰將禘于襄公亦其義也是言于武宫者時之所為實非禘年用禘禮此實非常但經之書惟譏莊公之速其餘不復譏耳既不以為譏即是得常故云祭雖得常叔弓為非常也左氏傳十五年春將禘於武公戒百官梓慎曰禘之日其有咎乎吾見赤黒之祲非祭祥也䘮氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也注齊戒祲妖氛也蓋見於宗廟故以為非祭祥也氛惡氣也涖臨也大臣卒故為之去樂昭二十五年左氏傳將禘於襄公萬者二人其衆萬于季氏注禘祭也萬舞也于禮公當三十六人也疏季氏私祭家廟與禘同日言將禘是預部分樂人少季氏先使自足故于公萬者惟有二人其衆萬于季氏輕公重已故大夫遂怨臧孫曰此之謂不能庸先君之廟注不能用禮也蓋襄公别立廟公疏杜以襄若以次第毁則廟與先同處禘於襄公亦應兼祭餘廟今特云禘于襄公似與先公異處故云蓋襄公别立廟定公八年從祀先公注從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公公疏𫝊言順祀是從為順也文二年大事於太廟躋僖升僖於閔上閔先為君退在僖下是逆也今升閔在僖上依其先後是順也左氏傳冬十月順祀先公而祈焉辛卯禘于僖公注將作大事欲以順祀取媚辛卯十月二日不於太廟者順祀之義當退僖公懼于僖神故于僖廟行順祀禮記明堂位成王以周公有勲勞於天下命魯公世世祀周公以天子之禮樂季夏六月以禘禮祀周公於太廟牲用白牡尊用犧象山罍鬰尊用黄目灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也君卷冕立於阼夫人副禕立於房中君肉袒迎牲於門夫人薦豆籩卿大夫贊君命婦贊夫人各揚其職百官廢職服大刑而天下大服疏明祀周公之時君與夫人卿大夫命婦行禮之儀尸初入之時君待之於阼夫人立於東房中魯之太廟如天子明堂也此文承上禘祀周公之下知周公之徳宜享此也祭統昔者周公旦有勲勞於天下周公既沒成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至於今不廢所以明周公之徳而又以重其國也禮運孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣蕙田案論魯僭禮詳見郊祀門論語子曰禘自既灌而往者吾不欲觀之矣朱子集註趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勲勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣灌者方祭之始用鬰鬯之酒灌地以降神也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也語錄以始祖配祭而不及羣廟之主不敢䙝也問禘之説諸家多云魯躋僖公昭穆不順故聖人不欲觀如何朱子曰禘是於始祖之廟推所自出之帝設虚位以祀之而以始祖配即不曽序昭穆故周禘帝嚳以后稷配之王者有禘有祫諸侯有祫而無禘此魯所以為失禮也或問禮記大𫝊云禮不王不禘王者禘其祖之所自出以其祖配之又䘮服小記曰王者禘其祖之所自出又下云禮不王不禘與大𫝊同則諸侯不得禘禮明矣然則春秋書魯之禘何也曰成王追寵周公故也祭統云成王追念周公賜之重祭郊社禘嘗是也魯之用禘蓋以周公廟而上及文王即周公之所出故也趙氏匡采曰或問曰春秋書魯之禘何也答曰成王追寵周公故也故祭統云成王追念周公賜之重祭郊社禘嘗是也仲尼燕居云明郊社其義也郊禘天子之禮社與嘗諸侯所自有撰禮者見春秋書嘗社以為郊與禘同遂妄意言耳魯之用禘蓋於周公廟而上及文王即周公之所出故也此祭惟得於周公廟為之閔公時遂僭於莊公廟行之亦猶因周公廟有八佾季氏遂用之於私庭也以其不追配故直言莊公而不言莊宫明用其禮物耳不追配文王也本以夏之孟月為之至孟獻子乃以夏之仲月為之禮雜記云孟獻子曰正月日至可以有亊于上帝七月日至可以有事于祖七月而禘獻子為之也今備引諸經書之文證之于左閔二年五月吉禘于莊公譏其不當吉又不當禘于莊僖八年秋七月禘于太廟用致夫人譏其非時之禘又譏致于夫人也左氏曰烝嘗禘于廟又云禘于武宫僖宫襄宫又晉人以寡君之未禘祀時未終䘮也又云魯有禘樂賔祭用之魯郊多失時又於諸公用禘禮也論語曰禘自既灌而往者吾不欲觀之矣問曰左傳云烝嘗禘於廟何也答曰此謂見春秋經前後祭祀唯有此三種以為祭名盡於此但據經文不識經意所以云爾又見經中禘於莊公以為諸廟合行之故妄云禘於武宫僖宫襄宫皆妄引禘文而説祭爾鄭又見吉禘於莊公禘小於祫見毛詩雝什注儒者通之云三年哀畢小禘於禰五年大祫自此便三年一禘五年一祫若禘不迎羣廟之主何謂之大若迎羣廟之主何得於禰廟迎之又曽子問篇中何得不序引文在下乖謬之甚也且春秋宣八年公羊云大事祫也毁廟之主皆陳於太祖陳者明素皆藏於太祖廟今但出而陳之也未毁廟之主皆升合食於太祖升者明自為本廟而來升也禮記曽子問篇云祫祭于太廟祝迎四廟之主明毁廟之主皆素在太廟故不迎也又云非祫祭則七廟五廟無虚主義與公羊同並無説禘為殷祭處則禘不為殷祭明矣殷重大之義也問曰若禘非三年䘮畢之殷祭則晉人云以寡君之未禘祀何也答曰此左氏之妄也左氏見經文云吉禘於莊公以為䘮畢當禘而不知此本魯禮也不合施於他國左氏亦自云魯有禘樂賔祭用之即明諸國無禘了可知矣是左氏自相違背亦可見矣或曰禘非殷祭則論語云禘自既灌而往者吾不欲觀之矣何也答曰此夫子為大夫時當禘祭而往助祭歎其失禮故云爾也初酌酒灌地以降神之時其禮易行既灌之後至於饋薦則事繁而生懈慢故夫子退而嫌之或人因而問其故夫子不欲指斥君之惡便云不知也言其禮難知也若能知者則於天下大事莫不皆知可如掌中之物言如此者是禘禮至難知以隱其前言非斥之意耳注家不達其意遂妄云既灌之後列尊卑序昭穆為躋僖公故惡之且禘祭之時固當先陳設座位位定之後乃灌以降神郊特牲云既灌然後迎牲明牲至即殺之以獻何得先祼然後設位乎先儒不達經意相㳂致誤皆此類也或難曰夫子所歎若非為逆祀别致虧禮則春秋何不書乎答曰春秋所紀祭祀皆失時及非常變故乃云爾至於懈慢虧失史官如何書乎若如此細故盡書則春秋一年經當數萬言不當如此簡也述祭統者不達此意遂云明乎郊社之義禘嘗之禮治天下其如指諸掌乎此不達聖人掩君惡之意遂云爾假令達於祭祀亦儀表中一事爾若别無理化之徳何能治天下乎此並即文為説不能逺觀大指致此弊耳周禮大宗伯以肆獻祼享先王以饋食享先王司尊彞凡四時之間祀追享朝享夫肆獻祼饋食在時享之上追享朝享間於時享之間則追享禘也禘以肆獻祼為主猶生之有饗也朝享祫也祫以饋食為主猶生之有食也古者䘮除朝廟合羣祖而祭焉故祫謂之朝享以合羣祖為不足明年又禘其祖之所自出故禘謂之追享鄭康成曰魯禮三年䘮畢禘于其廟然後祫於太廟明年春禘於羣廟其言䘮畢之祫明年之禘固合春秋之義其言禘於其廟又禘於羣廟是不知魯之失禮而惑之也左氏曰禘于僖宫武宫襄宫此魯之失孔子曰魯之郊禘非禮也周公其衰矣禘之非禮蓋此類歟儀禮曰學士大夫知尊祖矣諸侯及其太祖天子及其始祖之所自出以其祖配之諸侯及其太祖大夫有事省於其君干祫及其髙祖是學士大夫知尊祖而已有時祭而無祫諸侯及其太祖而已有祫而無禘大夫有事省於其君然後有祫則周公有大勲勞省於成王然後有禘故禮記曰以禘禮祀周公於太廟則禘可施於羣廟哉春秋書吉禘於莊公不特譏吉禘也兼譏禘於莊公也晉之有禘蓋亦僭耳右魯祫禘附辨鄭氏䘮畢有祫祫前有禘鄭氏周禮鬯人注廟用脩者謂始禘時自饋食始孔疏謂始禘時者謂練祭後遷廟時以其宗廟之祭從自始死已來無祭今為遷廟則新死者木主入廟特為此祭故云始禘時也以三年䘮畢明年春禘為終禘故云始也許氏慎曰春秋左氏傳曰終禘終者謂孝子三年䘮終則禘于太廟以致新死者也鄭氏詩元鳥箋古者君䘮三年既畢禘于其廟而後祫祭于太祖明年春禘於羣廟自此之後五年而再殷祭一禘一祫楊氏復曰鄭氏訓王制春官大宗伯及詩殷頌皆云魯禮三年䘮畢而祫於太廟明年春禘於羣廟及註鬯人廟用脩又云始禘自饋食始信如是言則䘮畢而有祫祫之前又有禘自饋食始也以䘮禮考之大祥禫皆有此祭猶是䘮祭也䘮畢則有吉祭未聞䘮畢既有吉祭之祫祫前又有吉祭之禘也自鄭氏註有此説魏晉後唐睿宗之䘮皆禫後有禘䘮畢有祫明年春有禘國朝治平二年同知太常禮院吕夏卿亦建此議謂之小禘後之儒者意在尊信聖經不知經無其文乃鄭氏説也若如疏家謂鄭氏用榖梁練為壊廟之説爾時木主新入廟禘祭之此尤非也禘吉祭也練而遷廟之時遽行吉祭尤無是理附辨鄭氏禘祫皆殷祭鄭氏王制注周改夏祭曰礿以禘為殷祭也魯禮三年䘮畢而祫于太祖明年春禘于羣廟自爾之後五年而再殷祭一祫一禘也周禮大宗伯註同楊氏復曰鄭氏以禘祫同為殷祭抑不知祫者合毁廟未毁廟之主於太祖之廟而祭之方謂之殷祭禘者禘其祖之所自出于始祖之廟而以始祖配之此祭不兼羣廟之主為其尊逺不敢䙝也今乃謂禘為殷祭可乎惟其以禘祫皆為魯禮又以禘祫同為殷祭故後之言禘者皆求之於一祫一禘之中而不求於禘其祖之所自出混禘於祫而遂至於不知有禘遂使二千年來國家大典禮為所汨壊是誰之過歟然義理在人心終不可埋沒唐大歴間趙伯循作春秋纂例獨得其説於大傳小記祭法之中以破鄭氏諸儒註疏之謬學士大夫皆是之又曰禘祫之禮不同王者既立始祖之廟又推始祖所自出之帝而以始祖配之所謂禘也合羣廟之主於始祖之廟而設殷祭所謂祫也先儒皆知祫為殷祭矣而又兼以禘為殷祭其説何從始乎蓋自成王念周公有大勲勞賜以郊禘重祭聖人已歎其非禮然魯之有禘特祭於周公之廟而上及於文王以文王者周公之所出也其後閔公二年僭用禘禮行吉祭不於周公之廟而行之於莊公之宫而禘之禮始紊自僖公八年用禘禮合先祖序昭穆用致夫人于廟而禘禮始與祫混淆而無别春秋常事不書特書閔公僖公兩禘者記失禮之始也文公二年大事於太廟躋僖公公羊傳曰大事者何大祫也謂大合毁廟之主於太祖之廟而祭之也天子有祫諸侯亦有祫于文公乎何譏譏其逆祀躋僖公也鄭康成乃謂禘祫皆為魯禮夫謂祫為魯禮可也魯之有禘行於周公之廟已非禮矣况僭而行之於莊公之宫又禘於太廟以致妾母可以謂之禮乎禘宗廟之大祭也故惟禘禮為盛觀明堂位之言可見閔僖竊禘之盛禮以侈一時之美觀猶周公廟有八佾其後竊而用之于季氏之庭此聖人之所深惡也况三年䘮畢而吉祭此禘禮也閔公䘮未畢竊禘之盛禮以行吉祭合先祖序昭穆此祫禮也僖公竊禘之盛禮以致夫人禘祫之混自此始也鄭氏不能推本尋源以辨禘祫二禮之異正閔僖僭禘之罪以明春秋之意反取春秋之所深譏者以明先王禘祫之正禮又妄稱禘祫皆為殷祭三年一祫五年一禘二禮常相因並行且多為説以文之案鄭注王制及春官大宗伯詩殷頌皆曰魯禮三年䘮畢而祫於太祖明年春禘於羣廟自爾以後五年而再殷祭一祫一禘愚始讀鄭氏三注意其必有昭然可據之實及考其所自來則曰一禘一祫之説出於春秋魯禮及緯書夫溺於緯書之偽而不悟其非此鄭氏之蔽惑不足責也謂出於春秋魯禮者並無事實可証乃專取僖公之禘文公之祫二事穿鑿傅㑹以文致其説而已夫禘祫二事其源各異本不相因僖公之禘未嘗因乎祫文公之祫未嘗關乎禘也今其説曰文公二年既有祫則僖公二年亦必有祫僖公八年既有禘則文公八年亦必有禘事之本無既牽合影射以為有蓋欲明僖公之禘前有祫文公之祫後有禘以証一禘一祫之説而已此其妄一也夫既取僖公之禘文公之祫為証矣又増宣公八年之禘以明之謂僖宣八年皆有禘考於春秋宣公八年有事於太廟未嘗有禘文乃鄭氏駕虛詞以多其証此其妄二也文二年公羊傳云五年而再殷祭所謂五年再殷祭者謂三年一祫五年再祫猶天道三年一閏五年再閏也鄭氏乃引之以為三年一祫五年一禘之証此其妄三也二年至八年相去凡七年與五年再殷祭之數不合也則為之説曰魯禮三年䘮畢而祫於太祖明年春禘於羣廟自爾以後五年而再殷祭夫謂三年䘮畢而祫於太祖可也明年春禘於羣廟何所據而為是説乎强添此事于五年再殷祭之前直欲以掩五年七年不合之數耳後之儒者知其不可則為之説曰䘮畢之祫祫之本明年之禘禘之本此其為説亦巧矣惜乎其似是而實非也此其妄四也且後世之所以信鄭氏者以其所據者春秋也而鄭氏所據者乃是以無為有駕虚為實取閔僖僭竊之禮以明先王禘祫之正禮既三註其説于經又以此説推演為禘祫志註疏盈溢文不勝繁故觀者莫辨諸儒靡然而從之是皆求其説于鄭註之中未嘗以經而考註之真偽也王肅最為不信鄭氏亦以禘為五年殷祭之名不亦悞乎自鄭氏之説立混禘於祫而禘之禮遂亡混祫於禘而祫之禮亦紊夫禮不王不禘王者禘其祖之所自出見於大傳見於小記見於䘮服子夏傳非不甚明祭法首述虞夏殷周四代已行之禮又信而有証固有國家者所當講明而舉行也自漢以來世之儒者皆置之而不論其故何哉蓋後之言禘者皆求其説於三年一祫五年一禘之中而不求之於禘其祖之所自出皆由漢儒混禘於祫而遂至於不知有禘此禘禮之所由亡也可不惜哉蕙田案楊氏之辨極為明暢附辨三年一祫五年一禘禮緯三年一祫五年一禘鄭云百王通義鄭氏大宗伯注魯禮三年䘮畢而祫于太祖明年春禘于羣廟自爾以後率五年而再殷祭一祫一禘孔疏周法三年一祫五年一禘言魯禮者指春秋而言也春秋三年䘮畢而祫於太祖謂若文公二年秋八月大事於太廟而躋僖公僖三十三年薨至文二年秋八月于禮雖少四月猶是三年䘮畢而為祫祭也是魯禮三年䘮畢而祫於太祖太祖謂周公廟中而為祫祭也云明年春禘于羣廟者此明年春禘雖無正文約僖公宣公得知矣案僖公八年及宣公八年皆有禘文則知僖公宣公三年春有禘可知何者以文公二年祫則知僖公宣公二年亦有祫僖公宣公二年既為祫則明年是三年春禘四年五年六年秋祫是三年祫更加七年八年添前為五年禘故僖公宣公八年皆有禘是明年春禘明矣故云明年春禘于羣廟也云自爾以後五年而再殷祭者公羊傳文殷大也除明年春從四年已後四年五年六年七年八年之中四年五年六年為三年祫七年八年添前為五年禘是五年再殷祭也云一祫一禘者是禮䜟文謂五年之中為一禘一祫也林氏之竒曰禘祫之説聚訟久矣其始為私見陋説召諸儒之紛紛者其鄭氏之説與鄭氏之説曰魯禮三年䘮畢而祫於太祖明年春禘于羣廟而自爾以後五年而再殷祭一禘一祫周禮廢絶久矣鄭氏何據而云為之説者曰周禮盡在魯鄭氏據春秋魯禮則周禮可知矣僖公薨文公即位二年秋八月大事於太廟大事祫也推此是䘮畢祫於太祖也明年春禘雖無正文約僖公宣公八年皆有禘文可知蓋以文公二年祫則知僖宣二年亦皆有祫僖宣二年既有祫則明年是三年春禘四年五年六年秋祫是三年祫更加七年八年并前為五年禘故禘於羣廟也自後三年一祫五年一禘嗚呼鄭氏不知春秋固妄為此説後學又不察故為所惑也當春秋時諸侯僭亂無復禮制魯之祭祀皆妄舉也諸侯而郊上帝禘始祖罪也大夫而旅泰山舞八佾罪也春秋常事不書其書者皆悖禮亂常之事故書郊者九書禘者二與夫大事一有事二烝二嘗一之類無非記其非禮何反以為周禮而足法乎使魯之祭祀如周之禮則春秋不書矣據僖公以三十二年冬十二月薨至文公二年秋八月䘮制未畢未可以祫也而乃有事焉一惡也躋僖公二惡也彼有二惡春秋譏之鄭氏乃謂三年䘮畢而祫于太祖者果禮耶又曰明年春禘經無三年禘祭之文何自知之徒約僖公宣公八年皆有禘而云愈謬也魯之設祭何常之有聖人於其常又不書之何得約他公之年以足文公而見三年之禘與五年而再殷祭乎使文公二年不因躋僖公則春秋不書大事使僖公八年不因用致夫人則春秋不書禘不書又何準乎况宣公八年經書有事于太廟則是常祭也而以為禘何耶誠為禘祭經不得謂之有事且閔公二年春秋書吉禘于莊公是魯常以二年即禘矣何待三年與八年乎閔有禘文而不之據宣無禘文而妄據之傅㑹可見也取亂世之典以為治世之制鄭氏豈知春秋哉諸儒波蕩而從之歴代祀典咸所遵用益可悲也馬氏端臨曰案三年一祫五年一禘之説先儒林氏楊氏皆以為鄭康成因春秋文公二年有祫僖公定公八年有禘遂約略想像而立為此説蓋以魯僭亂之制定為周禮以悞後人然光武二十六年詔問張純禘祫之禮而純奏禮三年一祫五年一禘然則其説久矣蓋此語出於緯書緯書起於元成之間而光武深信之當時國家典禮朝廷大事多取決焉故此制遂遵而用之康成蓋以漢禮為周禮非魯禮也附辨徐邈髙堂隆諸家禘祫年嵗不同徐氏邈曰禮五年再殷凡六十月分中每三十月殷也曹述初難曰三年之䘮其實二十有五月則五年何必六十月蕙田案徐邈用鄭氏三年一祫五年一禘之説而小變之曹述初難之亦仍用鄭氏䘮畢而祭之説其失與徐邈同陳氏舒曰三年一閏五年祭八年又殷兩頭如四實不盈三又十一年殷十四年殷凡間含二則十年四殷與五年再殷其義合矣蕙田案陳舒以十年四殷發明鄭氏五年再殷之説更支何氏休閔二年公羊注禮禘祫從先君數朝聘從今君數三年䘮畢遭禘則禘遭祫則祫蕙田案鄭氏註王制大宗伯並云䘮畢有祫註鬯人詩元鳥並云䘮畢有禘説本兩岐何休遭禘則禘遭祫則祫較鄭為近其為䘮畢之説則同徐氏彦公羊疏或以為禘祫同三年但禘在夏祫在秋直時異耳孔氏頴逹周頌疏三年一祫五年一禘每於五年之内為此二禮據其年端數之故言三年五年耳其實禘祫自相距各五年非祫多而禘少也蕙田案公羊徐疏云禘祫同三年則五年之説贅矣周頌孔疏云禘祫相距各五年則三年之説又贅矣杜氏預僖八年春秋注禘三年大祭之名孔疏言每積三年而一為此祭楊氏勛文二年榖梁疏禘既三年祫則五年也蕙田案此與鄭氏説相反然皆臆説髙堂隆曰䘮以竒年畢則祫亦常在竒年偶年畢則祫亦常在偶年通典殷間嵗竒偶如虞夏周制天子諸侯三年䘮畢禫祭之後乃祫于太祖來年春禘于羣廟爾後五年再殷祭一禘一祫所以䘮畢有此禘祫者為後再殷之祭本也䘮畢之祫祫之本明年之禘禘之本故從此後各自數每至三年則各為之故得五年再殷祭因以法五嵗再閏天道大成也蕙田案髙堂隆及通典間嵗竒偶之説則是每隔一年行之以為此虞夏殷之禮未審何據䘮畢之祫祫之本明年之禘禘之本此後各自數每至三年則各為之此所謂禘祫不相因也但依此則是三年而再殷祭又與五年再殷祭之説不符山堂考索禮緯曰三年一祫五年一禘而鄭氏徐邈又分為二説為鄭氏之説則曰前三後二謂禘後四十二月而祫祫後十八月而禘為徐邈之説則曰前二後三謂二祭相去各三十月駁鄭氏者則曰三年而祫為月有餘二年而禘為月不足駁徐氏則曰禘在祫前則是三年而禘祫在禘後則是五年而祫以二説考之惟鄭氏曰魯禮三年䘮畢祫于太廟明年禘于羣廟自是之後五年而再盛祭一祫一禘由此言之鄭氏依倣魯禮推明王制實為有據林氏之竒曰鄭康成髙堂隆謂先三而後二徐邈謂先二而後三矛盾相攻卒無定論皆可置而勿辨楊氏復曰祫祭年月經無其文惟公羊文二年大事於太廟傳云大事者何大祫也五年而再殷祭夫殷祭乃大祫之祭也謂五年而再殷祭謂三年一祫五年再祫猶天道三嵗一閏五嵗再閏也于禘祭乎何與漢儒乃援此以証禘祫相因之説為鄭康成之説則曰三年而祫五年而禘為徐邈之説則曰相去各三十月三十月而祫三十月而禘唐自睿宗以後三年一祫各自計年不相通數然至二十七年凡五禘七祫其年夏禘訖冬又當祫而禘祫同嵗太常議曰今太廟禘祫各自數年兩岐俱下通計或比年頻合或同嵗再序或一禘之後并為再祫或五年之内驟有三殷求於禮經頗為乖失國朝宗廟之祭三年一祫以孟冬五年一禘以孟夏蓋用鄭康成之説其後有司又言三年䘮畢遇祫則祫遇禘則禘二説牴牾不可稽考慶厯初乃用徐邈之説每三十月而一禘後又以二祭各不相因故熙寧八年既禘又祫竟無一定之論推原其所以然皆由混禘於祫而皆以為合食於太祖也夫既混禘於祫皆以為合食於太祖則禘祫無辨矣而又欲勉强穿鑿分别其所以不同此所以紛紛多端而莫之一也知禘者禘其祖之所自出不兼羣廟之主而惟以其祖配之則禘與祫異不容混矣知大祫兼羣廟之主則自太祖而下毁廟未毁廟之主皆合食於太祖矣知禘祫之不同則鄭康成徐邈之説皆非矣其間相因不相因之説皆無謂矣又何同異得失之足論乎蕙田案楊氏猶惑于五年殷祭之説非也祫固嵗嵗有之矣附辨諸家禘祫時月不同通典禘以夏祫以秋詩閟宫𫝊云諸侯夏禘則不祫秋祫則不嘗惟天子兼之是也崔靈恩云禘以夏者以審諦昭穆序别尊卑夏時陽在上隂在下尊卑有序故大次第而祭之故禘者諦也第也祫以秋者以合聚羣主其禮最大必秋時萬物成熟大合而祭之祫者合也鄭氏曰禘以孟夏祫以孟秋孔氏頴逹周頌雝疏此禘毛以春鄭以夏不同徐氏乾曰殷應用孟秋進用孟冬時孔氏安國曰自太和四年已後殷祭皆用冬夏周禮圖曰禘以祼享先王其祼也猶事生之有享也享以陽為主故禘以夏祫以食享先王其食也猶事生之有食食隂也故祫以冬山堂考索禘祭以為夏四月其説一也而于祫祭則或以為秋或以為冬如毛氏詩解閟宫傳曰諸侯夏禘則不礿秋祫則不嘗惟天子兼之是以祫為秋祭也崔靈恩亦云禘以夏者以審諦昭穆序别尊卑夏時陽在上隂在下尊卑有序故因次第而祭之祫以秋者以合聚羣主其禮最大必秋時萬物成熟大合而祭之是亦祫為秋祭也若果為秋祭則三十九月為前二十一月為後不若張純之説以祫為冬祭其説曰冬十月五榖成熟物備禮成故合聚飲食而祭之然二説或以秋或以冬皆取萬物成熟之時其時不同其意則一不如張純以冬十月為得其正通典案明堂位夏六月以禘禮祀周公則今之四月七月日至孟獻子禘其祖則今之五月春秋文公二年大事于太廟則今之六月林氏之竒曰諸儒論禘祫之制既謬至其言祭之時亦非矣春秋書大事於秋八月而彼以為冬書閔公之禘于夏四月書僖公之禘于秋七月而彼一以為夏既本魯禮以行祀典而又不用其時是自戻也附辨鄭氏祫大禘小山堂考索馬融王肅以為禘大而祫小鄭康成以為祫大禘小為融肅之説者曰孔子言禘自既灌而往禘祫大祭而獨舉禘則祫可知故於是而以禘為大為鄭康成之説者曰公羊傳云大事于太廟大事者祫也祫者毁廟之主陳於太祖未毁廟之主皆升合食於太祖至於禘則云禘於莊公禘於僖公既不於太祖則小於祫矣故于是而以祫為大通典賈逵劉歆曰禘祫一祭二名禮無差降數家之説非無典據至於𢎞通經訓鄭義為長林氏之竒曰禘天子之祭名諸侯無禘禮魯用之僭也若夫祫則合食而已非惟天子有祫諸侯亦得祫也詳二祭之名則禘尊而祫卑可謂明矣先儒據鄭氏説率以祫大於禘是以諸侯之祭加天子之祭可乎楊氏復曰禘禮大略雖與祫禮同然大祫則合毁廟未毁廟之主而祭之禘又上及其祖之所自出則禘又大於祫矣馬融王肅皆云禘大祫小此言是也鄭𤣥注經乃云祫大禘小賈逵劉歆則云一祭二名禮無差降彼蓋不深考大傳小記之文與四代禘郊祖宗之義但以禘祫同為殷祭而不知禘為祭其祖之所自出所以徒為此紛紛也鄭氏禘祫志曰祫備五齊三酒禘以四齊二酒祫用六代之樂禘用四代之樂賈公彦曰祫十有二獻禘九獻此蓋注疏家溺于祫大禘小之説然也爾雅曰禘大祭也夫禴祀烝嘗時祫大祫皆宗廟祭也爾雅特言禘為大祭則禘大於祫可知矣明堂位言魯以禘禮祀周公於太廟牲用白牡尊用犧尊山罍鬰尊用黄目灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡其樂則升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏此蓋王禮也用之於周公之廟已為非禮其後他廟遂僭用之如閔二年夏五月乙丑吉禘於莊公僖八年秋七月禘於太廟用致夫人之類是也荀偃士匄曰魯有禘樂賔祭用之則不惟僭用之於祭亦僭用之於享賔矣此何異魯有佾舞雍徹而其後亦用之於季氏之庭三家之堂故春秋特書二禘所以譏僭禮之始也而注疏反引之以為先王之正禮不亦悞乎賈公彦曰大祫十有二獻禘大於祫其禮尤隆至於獻數亦當同之但禮文殘缺莫得而見節文之詳耳附辨袁準虞喜祫及壇墠禘及郊宗石室袁氏準曰祫及壇墠禘及郊宗石室此所及逺近之殺也虞氏喜左氏説古者先王日祭於祖考月祀於髙曾時享及二祧嵗祫及壇墠終禘及郊宗石室是為郊宗之上復有石室之祖楊氏復曰知禘者禘其祖之所自出不兼羣廟之主而惟以其祖配之則禘與祫異不容混矣知大祫兼羣廟之主則自太祖而下毁廟未毁廟之主皆合食於太祖矣又何壇墠與郊宗石室之分乎又曰南北諸儒論逺祖則以郊宗石室為言人之易惑豈不可歎蕙田案諸儒辨禘祫三年五年之説可謂詳矣傳曰仁人饗帝孝子饗親夫惟天子之禮合饗帝饗親而兼行之饗帝則郊祀之禮舉冬至圜丘孟春祈榖夏大雩秋明堂故曰郊社之禮所以事上帝是也饗親而宗廟之禮重春祠夏禴秋嘗冬烝中庸曰所以事乎其先是也天尊也祖親也皆一嵗四祭四祭者不踈不數尊尊而親親仁之至義之盡也是故由天而推則有五帝日月星辰方丘社稷山川或一嵗再祭或一嵗一祭是由尊而降禮殺而祭踈也由親廟而推則有毁廟之主有祖所自出之帝毁廟一嵗而祫舉以冬所自出之帝亦一嵗而禘舉以夏是由親而推亦禮殺而祭踈也然祭踈而嵗必有祭者舊榖既沒新榖既升天道一周四時代序情不自己理亦宜然故張子謂禘也祫也必每嵗有之豈容有三年五年之事此精微之極至聖賢之篤論也傳記氛如羣言淆亂非類叙諸儒之説而詳審之何由撥雲霧而揭日月也哉右諸儒論禘祫五禮通考卷九十七
