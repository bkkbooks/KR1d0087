body:
  text: 五禮通考卷一百三十八刑部尚書秦蕙田撰嘉禮十一朝禮宋史禮志宋承前代之制以元日五月朔冬至行大朝會之禮樂志建隆元年改樂章十二順為十二安皇帝臨軒為隆安王公出入為正安皇帝食飲為和安建隆乾徳朝會樂章二十八首皇帝升座隆安天臨有赫上法乾元鏗鏘六樂儼恪千官皇儀允肅五坐居尊文明在御禮備誠存公卿入門正安堯天協紀舜日揚光淑慎爾止率由舊章佩環濟濟金石鏘鏘威儀炳煥至徳昭彰上夀禧安乾健為君坤柔為臣惟其臣子克奉君親永御皇極以綏兆民稱觴獻夀山岳嶙峋舜韶更奏堯酒浮觴皇情載懌洪算無疆基隆郟鄏徳茂陶唐山巍日煥地乆天長蕙田案禧安為祭祀酌獻飲酒受胙之樂非朝會所用以淳化景徳樂章校之當作和安皇帝舉酒第一盞用白龜聖徳昭宣神龜出焉載白其色或游於川名符在沼瑞應巢蓮登歌丹陛紀異靈篇第二盞甘露天徳㝠應仁澤載濡其甘如醴其凝如珠雲表潛結顥英允敷降於竹栢永昭瑞圖第三盞紫芝煌煌茂英不根而生蒲茸奪色銅池著名晨敷表異三秀分榮書於瑞典光我文明第四盞嘉禾嘉彼合頴致貢升平異標南畝瑞應西成徳至於地皇祗效靈和同之象煥發祥經第五盞玉兔盛徳好生網開三面明視標竒昌辰乃見育質雪園淪精月殿著於樂章色含江練蕙田案乾徳四年判太常寺和峴言今年荆南進甘露京兆東州進嘉禾黄州進紫芝和州進綠毛龜黄州進白兔欲依月律撰神龜甘露紫芝嘉禾玉兔五瑞各一曲每朝會登歌首奏之詔如所請此則五曲乃乾徳中所増加今依宋志所編不復更析特著其説於此羣臣舉酒正安户牖嚴丹扆鵷鸞造紫庭懇祈南岳夀勢拱北辰星得士於兹盛基邦固以寧誠明一何至金石與丹青簪紱若雲屯晨趨閶闔門侁侁羅禹會濟濟奉堯罇周禮觀明備天儀仰晬温髙卑陳表著同拱帝王尊待漏造王庭威儀盛莫京紛綸簪組列清列珮環聲禮飲終三爵韶音畢九成永圖鳬藻樂千載奉升平羣臣第一盞畢作𤣥徳升聞治定資神武功成顯睿文貢輸庭實旅朝會羽儀分偃革千年運垂衣萬乗君孰知堯舜力明徳日升聞約法皇綱正崇文寳歴昌遒人振木鐸農器鑄干將瑞日含王字卿雲藹帝鄉萬邦成一統鴻祚與天長六變宸扆威容盛聲明禮樂宣九州臻禹會萬國戴堯天貢職輸琛賮皇猷煥簡編含和均暢茂鳩慶結非烟朝會儼威儀司常建九旗舞容分綴兆文物辨威蕤運格桃林牧祥開洛水龜帝功潛日用化俗自登熈螭階聊載筆紀瑞軼唐虞丹鳳儀金奏黄龍負寳圖羣材薪棫樸仁政煦蒲盧蕩蕩巍巍徳豚魚信自孚接聖宅神都方來五達區國賢熈帝載靈命握乾符至化當人被斯文益誕敷車書今混一聖治奉三無聖王臨大寳八表凑才賢經緯文天賦剛柔徳日宣建邦隆柱石造物運陶甄共致升平業綿長保億年神化妙無方巍巍邁百王鶴書搜隠逸龍陛䇿賢良拱揖朝羣后賓筵闢四方洪圖基億載淳曜徳彌光第二盞畢天下大定皇猷敷八表武誼肅三邊蘭錡韜兵日靈臺偃伯年奉珍皆述職獻賮盡朝天功徳超前古音徽播管弦伐叛天威震恢疆帝業多削平侔肅殺涵煦極陽和蹈厲觀周舞風雲入漢歌功成推大定歸馬偃琱戈六變惕厲日乾乾潛蟠或躍淵伐謀參上䇿受鉞總中堅田訟歸周日民謡戴舜年風雲自㝠感嘉會翼飛天壺闗方逆命投𬒮起親征虎旅聊攻伐梟巢遽蕩平天威清朔漠仁澤被黎氓案節皇輿復洋洋載頌聲蠢兹淮海帥保據毒黎苗不悟龍興漢猶同犬吠堯六師方雨施孤壘自氷消千載逢嘉運華戎奉聖朝上游荆楚要澤國洞庭深自識同文世皆逥拱極心一戎聊仗鉞九土盡輸金大定功成後薰風入舜琴席卷定巴卭西遐盡率從岷峨難負阻江漢自朝宗述職方舟集驅車九折通粲然書國史冠古耀豐功鋭旅慶回旋邊防盡宴然鍵櫜方偃武飛將亦韜弦震曜資平壘文明協麗天洸洸成大業赫奕在青編蕙田案宋初郊廟殿庭通用文徳武功之舞乾徳四年以和峴言改殿宇所用文舞為元徳升聞之舞武舞為天下大定之舞其武舞一變象六師初舉二變象上黨咸平三變象淮揚底定四變象荆湖歸復五變象卭蜀納欵六變象兵還振旅乃别撰舞曲樂章而文徳武功之舞請於郊廟仍舊通用然則元徳升聞以下十二曲亦乾徳中所增加乃和峴之詞今亦依宋志類編之不更析也樂志元豐三年楊傑言大樂七失曰國朝郊廟之樂先奏文舞次奏武舞而武舞容節六變一變象六師初舉二變象上黨克平所向宜北三變象淮揚底定所向宜東南四變象荆湖來歸所向宜南五變象卭蜀納欵所向宜西六變象兵還振旅所向宜北而南今舞者發揚蹈厲進退俯仰既不足以稱成功盛徳失其所向而文舞容節尢無法度則舞不象成也文獻通考建隆二年春正月朔帝御崇元殿受朝賀服衮冕設宫懸仗衛如儀仗退羣臣詣皇太后宫門奉賀上常服御廣徳殿羣臣上夀用教坊樂御殿儀仗者本充庭之制唐禮殿庭屯門皆列諸衛黄麾大仗宋朝太祖增創錯繡諸旗并旛􅌁等著於通禮正至五月一日御正殿則陳之宋史太祖本紀建隆三年春正月庚申朔以䘮不受朝賀禮志朝儀班序太祖建隆三年三月有司上合班儀太師太傅太保太尉司徒司空太子太師太傅太保嗣王郡王左右僕射太子少師少傅少保三京牧大都督大都䕶御史大夫六尚書常侍門下中書侍郎太子賓客太常宗正卿御史中丞左右諫議大夫給事中中書舍人左右丞諸行侍郎祕書監光禄衛尉太僕大理鴻臚司農太府卿國子祭酒殿中少府將作監前任節度使開封河南太原尹太子詹事諸王傅司天監五府尹國公郡公中都督上都䕶下都督太子左右庻子五大都督府長史中都䕶下都䕶太常宗正少卿秘書少監光禄等七寺少卿司業三少監三少尹少詹事左右諭徳家令率更令僕諸王府長史司天少監起居舍人侍御史殿中侍御史左右補闕拾遺監察御史郎中員外郎太常博士五府少尹五大都督府司馬通事舍人國子博士五經博士都水使者四赤令太常宗正祕書丞著作郎殿中丞尚食尚藥尚舍尚乗尚輦奉御大理正太子中允贊善中舍洗馬諸王友諮議㕘軍司天五官正凡雜坐者以此為凖詔曰尚書中臺萬事之本而班位率次兩省官節度使出總方面古諸侯也又其檢校兼守官多至師傅三公而位居九寺卿監之下甚無謂也其給事諫議舍人宜降於六曹侍郎之下補闕次郎中拾遺監察次員外郎節度使升於六曹侍郎之上中書侍郎之下餘悉如故職官志建隆以後合班之制中書令侍中同中書門下平章事以上為宰相親王樞宻使留守節度京尹兼中書令侍中同中書門下平章事以下並為使相尚書令太師太尉太傅太保司徒司空舊儀太師太傅太保為三師太尉司徒司空為三公太尉在太保下今依此序其三師三公之稱如舊儀制樞宻使知樞宻院事㕘知政事舊在樞宻之下樞宻副使舊在知院之上同知樞宻院事宣徽南院北院使簽書樞宻院事㕘政以下班位臨時取奏裁太子太師太傅太保左右僕射太子少師少傅少保諸府牧開封河南應天大名江陵興元真定江寧京兆鳯翔河中又有大都督大都䕶今皆領使無特為者御史大夫觀文殿大學士舊無此位六尚書吏兵戸刑禮工左右金吾衛左右衛上將軍門下中書侍郎舊在尚書下節度使泰寧武寧彰信鎮海天平安化武成忠武鎮海河陽山南東道武勝崇信昭化保康天䧺成徳鎮寧彰徳永清安國威徳静難彰化雄武保泰淮南忠正保信保静集慶建康寧國鎮南昭信荆南寧海武昌安遠武安鎮東平江鎮江宣徳保寧康國威武建寧益州安静武信山南西道昭武安徳武定寧海寧江武康清海静江寧遠建武髙州定南宻州静海凉州西河沙州歸義洮州保順應州彭國威城昌化豐州天徳朔州振武雲州大同觀文殿學士舊曰文明殿若學士官尚書者自從本班資政殿大學士三司使與觀文資政班位臨時取裁翰林學士承㫖翰林學士資政殿學士翰林侍讀侍講學士龍圖閣學士天章閣學士樞宻直學士龍圖直學士天章直學士左右散騎常侍舊在諸衛上將軍下六統軍左右龍武左右羽林左右神武諸衛上將軍左右騎衛左右武衛左右屯衛左右領軍衛左右千牛衛太子賔客太常宗正卿御史中丞權中丞立中丞專位内殿起居日止立本官班左右丞諸行侍郎節度觀察留後給事中左右諫議大夫中書舍人知制誥龍圖閣待制天章閣待制觀察使祕書監光禄衛尉太僕大理鴻臚司農太府卿内客省使國子祭酒殿中少府將作監景徳殿使延福宫使客省使開封河南應天大名尹太子詹事諸王傅司天監諸衛大將軍太子左右庻子引進使防禦使齊濟沂登萊鄭汝祭頴郢懐衛博磁洛棣深瀛雄霸莫代絳解龍和鄆舒復蜀象陸果團練使單濮濰唐相翼隰忻成鳯海鼎三司鹽鐡度支户部副使官至諫議大夫已上從本官玉清昭應宫景靈宫會靈觀判官太常寺宗正少卿祕書少監光禄等寺七寺少卿宣慶使四方館使國子司業殿中少府將作少監開封河南應天大名少尹太子少詹事左右諭徳太子家令太子率更令太子僕諸州刺史淄趙徳濵保并汾澤遼憲嵐石虢坊丹階乾商寧原慶渭儀環楚泰泗濠光滁通黄真舒江池饒信太平吉袁撫筠岳澧峽歸辰衡永全栁邵常秀温台衢睦處南劍江漳綿漢彭卭蜀嘉簡黎雅維茂資榮昌普渠合戎瀘典劍文集璧巴蓬龍施萬開逹涪渝昭循潮連梅英賀封南雄端新康恩春惠韶梧藤龔象潯貴賔横融化竇髙雷南儀欽鬰林亷瓊崖儋萬安諸王府長史司馬司天少監樞宻都承㫖如客省使以下充者依本職同班如閤門使充即在閤門使之上如自見任内客省以下轉南班官充亦與同班仍在舊職之上如自客省副使以下轉南班官充者並在閤門使之上宣政使昭宣使東上西上閤門使樞宻承㫖樞宻副都承㫖諸軍衛將軍起居舍人知雜御史侍御史諸行郎中左右司吏部兵部司封司勲考功職方駕部庫部度支户部金部倉部刑部都官比部司門禮部工部祠部主客膳部屯田虞部水部皇城以下諸司使皇城洛苑右騏驥尚食左騏驥御厨内蔵庫軍器左藏儀鸞南作坊弓箭庫北作坊衣庫莊宅六宅文思東作坊内苑牛羊如京東綾錦香藥崇儀榷易西京左右藏壇毯西綾綿西京作坊鞍轡庫東染院酒坊西染院法酒庫禮賔翰林醫官供備庫樞宻院副承㫖諸司副承㫖如帶南班官者在諸司使之下不帶南班官者在皇城副使之上殿中侍御史左右司諫諸行員外郎客省引進閤門副使左右正言監察御史太常博士皇城以下諸司副使諸次府少尹大都督府左右司馬兖徐潞陜楊杭越福通事舍人國子博士春秋禮記毛詩尚書周易博士都水使者開封祥符河南洛陽宋城縣令太常宗正祕書丞著作郎殿中丞内殿承制殿中省尚食尚藥尚衣尚舍尚乗尚輦奉御大理正太子中允左右贊善大夫内殿崇班閤門祗候太子中舍洗馬太子諸率府率左右衛左右監門左右清道左右司禁樞宻院兵房吏房户房禮房副承㫖東頭西頭供奉官太子諸率府副率諸衛中郎將左右金吾左右衞左右千牛左右羽林郎將左右金吾左右衛左右侍禁諸王友諸王府諮議叅軍官髙者從本官司天春官夏官秋官冬官正節度行軍司馬副使祕書郎左右班殿直著作佐郎大理寺丞諸寺監丞大理評事太學廣文博士太常太祝奉禮郎祕書省校書郎正字御史臺諸寺監主簿國子助教廣文太學四門書學算學博士律學助教書算學無助教司天靈臺郎保章正挈壺正三班奉職借職防禦團練副使留守京