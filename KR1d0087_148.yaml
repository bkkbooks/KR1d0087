爵一尊坫酒爵以金玉鬼充有司設上下羣官酒尊於殿下東西廂侍衛官及執事者各立于其位百官入就位侍中版奏中嚴復位少頃奏外辦閤簾捲殿上鳴蹕太樂令令撞黄鍾之鐘右五鐘皆應内侍承㫖索扇扇合皇帝服通天冠絳紗袍御輿出東閤協律郎俛伏舉麾興奏乾安之樂鼓吹振作皇帝出自東房降輿即御座南向扇開殿下鳴蹕協律郎偃麾戞敔樂止爐烟升三師以下至尚書左右丞親王以下至同知樞密院事及百官御史臺官外正任契丹使俱就北向位贊者曰拜在位者皆再拜三稱萬歲北向班分東西立光禄卿詣横街南北向俛伏跪奏具官臣某言請允羣臣上夀俛伏興侍中詣東階升進御座前承㫖退臨階西向曰制可侍中少退舍人曰拜光禄卿再拜訖復位三師以下就北向位贊者曰拜在位者皆再拜三稱萬歲太尉自東階升詣酒尊所北向尚食奉御酌酒一爵授太尉太尉搢笏執爵詣御座前跪進皇帝執爵太尉執笏俛伏興少退當御座前俛伏跪奏文武百官太尉具官臣某等稽首言元正首祚冬至云天正長至臣等不勝大慶謹上千萬歲夀俛伏興退降階復位贊者曰拜在位者皆再拜三稱萬歲侍中承㫖退臨階西向宣曰舉公等觴贊者曰拜在位者皆再拜三稱萬歲北向班分東西序位太尉自東階升侍立皇帝舉第一爵作和安之樂飲訖樂止太尉受虚爵復於坫降階三師以下復北向位贊者曰拜在位者皆再拜舞蹈三稱萬歲又再拜侍中自東階升進御座前俛伏跪奏侍中具官臣某言請延公王等升殿俛伏興降階復位侍中承㫖退稱有制贊者曰拜在位者皆再拜宣曰延公王等升殿贊者曰拜在位者皆再拜舞蹈三稱萬歲再拜公王等詣東西階升於席後立尚食奉御進酒殿中監省酒以進皇帝第二爵升殿羣官就横街位舍人曰各賜酒贊者曰拜上下羣官皆再拜三稱萬歲舍人曰就坐太官令行酒羣官搢笏受觶作正安之樂文舞入立宫架北觴行一周太官令奏樂止尚食奉御進食置御座前又詔羣官食太官令奏作盛德升聞之舞曲舞作三成止出殿中監進皇帝第三爵酒羣官立於席後登歌作嘉禾之曲飲訖樂止殿中監受虚爵舍人就坐羣官皆坐太官令行酒作正安之樂武舞進觴又行一周樂止尚食奉御進食置御座前又設羣官食太官令奏酒周巡食徧如前儀作天下大定之舞曲舞作三成止出殿中監進皇帝第四爵酒登歌作靈芝之曲其禮如第三爵太官令行酒如第二爵又一周樂止舍人曰可起百僚立於席後侍中進當御座前俛伏跪奏侍中具官臣某言禮畢俛伏興與羣官俱降復位贊者曰拜羣官皆再拜舞蹈三稱萬歲再拜起分東西序立内侍承㫖索扇扇合殿下鳴蹕太樂令令撞蕤賓之鐘左五鐘皆應協律郎跪俛伏舉麾興太樂令令奏乾安之樂鼓吹振作皇帝降坐御輿入自東房還閤扇開戞敔樂止侍中奏解嚴有司承㫖放仗羣官再拜乃退宋敏求又言考工記天子執冒四寸以朝諸侯未有臨臣子而執鎮圭唐六典元正冬至大朝會止有進爵之禮開寶通禮始著元會執圭出自西房淳化中又以上夀進酒以内侍捧圭臣等逺稽周制近考唐禮皆為未合其元會受朝賀請不執鎮圭上夀准此宋史神宗本紀元豐二年夏四月癸亥定正旦御殿儀秋七月戊寅詳定朝會儀樂志元豐二年詳定所以朝會樂而有請者十其一唐元正冬至大朝會迎送王公用舒和開元禮以初入門舒和之樂作至位樂止葢作樂所以待王公今中書門下親王使相先於丹墀上東西立皇帝升御座乃奏樂引三品以上官未為得禮請侍從及應赴官先就立位中書門下親王使相諸司三品尚書省四品及宗室將軍以上班分東西入正安之樂作至位樂止其二今朝會儀舉第一爵宫縣奏和安之曲第二第三第四登歌作慶雲嘉禾靈芝之曲則是合樂在前登歌在後有違古義請第一爵登歌奏和安之曲堂上之樂隨歌而發第二爵笙入奏慶雲之曲止吹笙餘樂不作第三爵堂上歌嘉禾之曲堂下吹笙瑞木成文之曲一歌一吹相間第四爵合樂奏靈芝之曲堂上下之樂交作蕙田案詳定所議樂曲節奏有登歌笙入間歌合樂次序與古雅樂合神宗本紀元豐三年春正月乙丑朔以大行太皇太后在殯不視朝五年春正月癸未朔不受朝六年春正月丁丑朔御大慶殿受朝始用新樂蕙田案文獻通考神宗熙寧五年元豐六年並元會文獻通考哲宗即位禮部言冬至正旦在諒闇當罷朝賀欲令羣臣於東上閤門内東門表賀從之宋史哲宗本紀元祐三年春正月己酉朔不受朝四年春正月壬申朔不受朝羣臣及遼使詣東上閤門内東門拜表賀十二月癸丑更定朝儀二舞曰威加四海化成天下五年春正月丁夘朔御大慶殿視朝六年春正月辛酉朔不受朝羣臣及遼使詣東上閤門内東門拜表賀八年春正月己卯朔不受朝禮志元祐八年太常博士陳祥道言貴人賤馬古今所同故覲禮馬在庭而侯氏升堂致命聘禮馬在庭而賓升堂私覿今元會儀御馬立於龍墀之上而特進以下立於庭是不稱尊賢才體羣臣之意請改儀注以御馬在庭于義為允哲宗本紀紹聖四年春正月丙戌朔不受朝羣臣及遼使詣東上閤門拜表賀元符元年春正月庚戌朔不視朝樂志元符大朝會三首皇帝初舉酒靈芝嘉瑞降臨應我皇德燁燁神芝不根而植春秋三秀晝夜一色物播詩歌聲被金石再舉酒夀星倬彼星象於昭於天維南有極離丙之躔既明且大應聖乗乾誕受景福億萬斯年三舉酒甘露泫泫零露雲英醴溢和氣凝津流甘委白飴泛泮林珠聨竹栢天不愛道聖功允格哲宗本紀元符二年春正月甲辰朔御大慶殿以雪罷朝羣臣及遼使詣東上閤門拜表賀羣臣又詣内東門賀如儀蕙田案文獻通考哲宗元祐五年紹聖三年並元會徽宗本紀大觀二年春正月壬子朔受八寶於大慶殿蔡京表賀符瑞禮志新儀成改元豐儀太尉為上公侍中為左輔中書令為右弼太樂令為大晟府盛德升聞為天下化成之舞天下大定為四夷來王之舞及增刑部尚書奏天下斷絶請付史館餘並如舊儀凡遇國恤則廢若無事不視朝則下敕云不御殿羣臣進表稱賀於閤門蕙田案文獻通考徽宗大觀二年政和八年宣和六年並元會欽宗本紀靖康元年春正月丁卯朔受羣臣朝賀陳隨隠上夀拜舞記凡正旦朝賀一十九拜三舞蹈初面西立上升座閤門起居班首以下躬身北面竢舍人宣名訖聽贊拜兩拜舞蹈如前禮躬身竢班首奏聖躬萬福聽贊拜兩拜起直身立竢樞密升殿班首出班俛伏致詞並躬身竢班首復位聽贊拜兩拜舞蹈如初起躬身竢樞密承㫖詣折檻東稱有制兩拜起躬身竢樞密宣答訖聽贊拜兩拜舞蹈如初文獻通考建炎之初鑾輿南幸庶事未備而朝會之儀未暇舉焉正至但循例宰臣率文武百官拜表稱賀而已紹興改元以道君皇帝淵聖皇帝北狩權宜皇帝躬率百僚遥拜畢次御常御殿朝㕘官起居宋史髙宗本紀紹興元年春正月己亥朔帝在越州帥百官遥拜二帝不受朝賀二年春正月癸巳朔帝在紹興府率百官遥拜二帝不受朝賀三年春正月丁巳朔帝在臨安率百官遥拜二帝不受朝賀四年春正月辛亥朔帝在臨安率百官遥拜二帝禮志紹興十二年十月臣僚言竊以元正一歲之首冬至一陽之復聖人重之制為朝賀之禮焉自上世以來未之有改也漢髙祖以五年即位而七年受朝於長樂宫我太祖皇帝以建隆元年即位受朝於崇元殿主上臨御十有六年正至朝賀初未嘗講艱難之際宜不遑暇兹者太母還宫國家大慶四方來賀亶惟其時欲望自今元正冬至舉行朝賀之禮以明天子之尊庻幾舊典不至廢墜禮部太常寺考定朝會之禮依國故事設黄麾大仗車輅法物樂舞等百竂服朝服再拜上夀宣王公升殿間飲三周詔自來年舉行十一月權禮部侍郎王賞等言朝會之制正旦冬至及大慶受朝賀係御大慶殿其文德紫宸垂拱殿禮制各有不同月朔視朝則御文德殿謂之前殿正衙仍設黄麾半仗紫宸垂拱皆係側殿不設儀仗元正在近大慶殿之禮事務至多乞候來年冬至别行取㫖詔從之文獻通考紹興十三年閤門言依汴京故事遇大行大禮則冬至及次年正旦朝會皆罷十四年九月有司言明年正旦朝會請權以文德殿為大慶殿合設黄麾大仗五千二十七人欲權減三分之一合設八寶於御坐之東西及登歌宫架樂舞諸州諸蕃貢物行在致仕官諸路貢士舉首並令立班詔從之十五年正旦御大慶殿受朝文武百官朝賀如儀建炎以來朝野雜記大朝會者紹興十二年十月詔來歲舉行之王望之為禮部侍郎言排辦不及請自來年冬至旣而不果十五年正月朔旦乃克行用黄仗三千三百五十人視東都舊儀損三之一時無大慶殿遂權於崇政殿行之以殿狹輦出房不鳴鞭它如故事是日設宮架樂百官朝服上夀如儀自是一行而止宋史樂志紹興十五年正旦朝會始陳樂舞公卿奉觴獻夀首奏和安次奏瑞木成文滄海澄清瑞粟呈祥三曲其樂專以太簇為宫太簇之律生氣湊達萬物於三統為人正於四時為孟春故元會用之紹興朝會十三首皇帝升座乾安鈞陳肅列金奏充庭顒卭南面如日之升垂衣拱手治無能名順履獻嵗大安大榮公卿入門正安升降同天子當陽臣工率職流水朝宗衆星拱極環珮鏘鏘威儀抑抑上下交欣同心同徳上公上壽和安八音克諧萬舞有奕上公奉觴率兹百辟聲効呼嵩祝聖人夀億載萬年天長地久皇帝初舉酒瑞木成文厚地效珍嘉木紀瑞匪刻匪雕具文見意三登太平允協聖治詩雅詠歌有光既醉再舉酒滄海澄清百谷王符聖治不揚波效殊祉德淪淵滄海清應千秋叙五行三舉酒瑞粟呈祥至治發聞惟馨香播厥百榖臻穰穰農夫之慶歲其有禾易長畝盈倉箱時和物阜粟滋茂嘉生駢穗來呈祥自今以始大豐美行旅不用齎餱糧羣臣酒行正安羣公卿士咸造在庭式燕以衎恩均露零穆穆明明於斯為盛歸美報上一人有慶明明天子萬福來同嘉賓式燕曷不肅雍燕以示慈式禮莫愆樂胥君子容止可觀酒一行文舞帝德誕敷銷鑠羣慝近悦逺來惟聖時克玉振金聲治功興起韶箾象之盡善盡美文物以紀藻色以明禮備樂舉遹觀厥成睿知有臨誕敷文德教雨化風洽此四國酒載行武舞用戒不虞誰能去兵師出以律動必有名折彼遐衝布昭聖武和衆安民時惟多助止戈曰武惟聖為能御得其道無敢不庭整我六師稽諸七德不吳不揚有嚴有翼皇帝降座乾安帝座熒煌庭紳肅穆對揚天休各恭爾服頌聲洋洋彌文郁郁禮備樂成永膺多福髙宗本紀三十一年春正月甲戌朔以日食不受朝孝宗本紀隆興元年春正月壬辰朔羣臣朝于文德殿光宗本紀紹熙三年春正月乙巳朔帝有疾不視朝五年春正月癸亥朔帝御大慶殿受羣臣朝續文獻通考理宗紹定元年春正月御文德殿羣臣朝賀四年十二月詔正旦大朝會權免右宋正旦朝賀五禮通考卷一百三十八
