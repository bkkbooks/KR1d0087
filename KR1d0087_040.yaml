皇祐二年大享明堂蓋以親郊之歲移其祀于明堂而其禮則合祭天地並祀百神蓋雖祀于明堂而所行實郊禮也然既曰明堂則當如鄭氏之注及厯代所行故以太昊炎帝黃帝少昊顓頊五人帝勾芒祝融后土蓐收玄冥五官神侑祀五帝于是祭天從祀又及人鬼矣中興以來國勢偏安三歲親祀多遵皇祐明堂之禮然觀儀注所具神位殿上正配四位東朵殿自青帝至南嶽十三位西朵殿自白帝至北嶽十二位東廊自北斗至北隰二百有八位西廊自帝座至哭星一百七十五位又有衆星一百五十八位共五百七十位則比晉賀循所言才三之一唐圜丘所祀三之二耳然晉唐未嘗雜祀地祗人鬼而位數反多此則以圜丘方澤明堂所祠合為一祠自五帝五官海嶽以至于原隰而位數反少殆不可曉然晉史唐史但能言從祀之總數而不及其名位之詳故無由參稽互考而不知其纎悉也姑志于此以俟博聞者共訂焉蕙田案馬氏通考止于嘉定而明禋儀注供自咸淳中間相隔四十餘年故附度宗之末宋史瀛國公本紀德祐元年九月辛巳有事于明堂赦右宋明堂明史世宗本紀嘉靖十七年六月丙辰定明堂大饗禮九月辛卯大享上帝于元極寶殿奉睿宗配禮志明初無明堂之制嘉靖十七年六月致仕揚州府同知豐坊上疏言孝莫大于嚴父嚴父莫大于配天請復古禮建明堂加尊皇考獻皇帝廟號稱宗以配上帝下禮部會議尚書嚴嵩等言昔羲農肇祀上帝或為明堂嗣是夏后氏世室殷人重屋周人作明堂之制視夏殷加詳焉蓋聖王事天如子事父體尊而情親故制為一歲享祀之禮冬至圜丘孟春祈穀孟夏雩壇季秋明堂皆所以尊之也明堂帝而享之又以親之也今日創制古法難尋要在師先王之意明堂圜丘皆所以事天今大祀殿在圜丘之北禁城東南正應古之方位明堂秋享即以大祀殿行之為當至配侑之禮昔周公宗祀文王于明堂詩傳以為物成形于帝猶人成形于父故季秋祀帝明堂而以父配之取其成物之時也漢孝武明堂之享以景帝配孝章以光武配唐中宗以高宗配明皇以睿宗配代宗以肅宗配宋真宗以太宗配仁宗以真宗配英宗以仁宗配皆世以遞配此主于親親也宋錢公輔曰郊之祭以始封之祖有聖人之功者配焉明堂之祭以繼體之君有聖人之德者配焉當時司馬光孫抃諸臣執辨于朝程朱大賢倡義于下此主于祖宗之功德也今復古明堂大享之制其所當配之帝亦唯二説而已若以功德論則太宗再造家邦功符太祖當配以太宗若以親親論則獻皇帝陛下之所自出陛下之功德即皇考之功德當配以獻皇帝至稱宗之説則臣等不敢妄議帝降旨明堂秋報大禮于奉天殿行其配帝務求畫一之説皇考稱宗何為不可再會議以聞于是户部左侍郎唐胄抗疏言三代之禮莫備于周孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝又曰嚴父莫大于配天則周公其人也説者謂周公有聖人之德制作禮樂而文王適其父故引以證聖人之孝答曾子問而已非謂有天下者必皆以父配天然後為孝不然周公輔成王踐阼其禮蓋為成王而制于周公為嚴父于成王則為嚴祖矣然周公歸政之後未聞成王以嚴父之故廢文王配天之祭而移于武王也後世祀明堂者皆配以父此乃誤孝經之義而違先王之禮昔有問于朱熹曰周公之後當以文王配耶當以時王之父配耶熹曰只當以文王配又曰繼周者如何熹曰只以有功之祖配後來苐為嚴父之説所惑亂耳由此觀之明堂之配不專于父明矣今禮臣不能辨嚴父之非不舉文武成康之盛而乃濫引漢唐宋不足法之事為言謂之何哉雖然豐坊明堂之議雖未可從而明堂之禮則不可廢今南北兩郊皆主尊尊必季秋一大享帝而親親之義始備自三代以來郊與明堂各立所配之帝太祖太宗功德並盛比之于周太祖則后稷也太宗則文王也今兩郊及祈穀皆奉配太祖而太宗獨未有配甚為缺典故今奉天殿大享之祭必奉配太宗而後我朝之典禮始備帝怒下胄詔獄嵩乃再會廷臣先議配帝之禮言考季秋成物之指嚴父配天之文宜奉獻皇帝配帝侑食因請奉文皇帝配祀于孟春祈穀帝從獻皇帝配帝之請而却文皇議不行已復以稱宗之禮集文武大臣于東閣議言禮稱祖有功宗有德釋者曰祖始也宗尊也漢書注曰祖之稱始始受命也宗之稱尊有德可尊也孝經曰宗祀文王于明堂以配上帝王肅注曰周公于文王尊而祀之也此宗尊之説也古者天子七廟劉歆曰七者正法苟有功德則宗之不可預為設數宗不在數中宗變也朱熹亦以歆之説為然陳氏禮書曰父昭子穆而有常數者禮也祖功宗德而無定法者義也此宗無數之説禮以義起者今援據古義推緣人情皇考至德昭聞密佑穹旻宗以其德可聖子神孫傳授無疆皆皇考一人所衍布宗以其世亦可宜加宗皇考配帝明堂永為有德不遷之廟帝以疏不言祔廟留中不下乃設為臣下奏對之詞作明堂或問以示輔臣大略言文皇逺祖不應嚴父之義宜以父配稱宗雖無定説尊親崇上義所當行既稱宗則當祔廟豈有太廟中四親不具之禮帝既排正議崇私親心念太宗永無配享無以謝廷臣乃定獻皇配帝稱宗而改稱太宗號曰成祖時未建明堂迫季秋遂大享上帝于元極寶殿奉睿宗獻皇帝配殿在宮右乾隅舊名欽安殿禮成禮部請帝升殿百官表賀如郊祀慶成儀帝以大享初舉命賜宴羣臣于謹身殿已而以足疾不御殿命羣臣勿行賀禮禮官以表聞並罷宴令光祿寺分給王圻續通考嘉靖十七年定大享禮一前期五日上詣犧牲所視牲其先一日上告于廟及還參拜俱如大祀之儀告詞參詞改稱大祀曰大享餘並同次日以後命大臣輪視如常儀一前期四日太常寺奏祭祀如常儀諭百官致齋三日一前期三日上詣太廟寢殿告請睿宗配帝以酺醢酒果再拜一獻禮祝文曰維嘉靖某年某月某日孝子皇帝御名敢昭告于皇考睿宗皇帝曰兹以今月某日恭行大享禮于大享殿謹請皇考配帝侑神伏唯鑒知謹告一前期二日太常卿光祿卿奏省牲如常儀一前期一日上親填祝版于文華殿夜二鼓禮部同太常堂上官詣安神御版位俱如祈穀之儀一陳設上帝位犢一玉用蒼璧一帛十二青色登一簠簋各二籩十二豆十二玉爵三酒尊三篚一祝案一配帝位同惟不用玉一正祭興祈穀同一祝文維嘉靖某年某月某日嗣天子臣御名恭奏享于皇天上帝曰時當季秋咸成農事羣生蒙利黎兆允安邦家是賴帝德敷天臣統羣工宜為酬享謹用玉帛犧牲祇謝生成大福備此禋燎奉皇考睿宗知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝配帝侑歆尚享圖書編國朝明堂大享典禮季秋行大饗禮于南郊大饗殿省牲齋戒儀同前祈榖前三日上祭服詣睿宗廟請皇考配帝行一獻禮用祝前三日太常博士奉祝版于文華殿上填御名訖捧安于香帛亭厨役舁至神庫供奉三更初太常官請安神位陳設如儀祭品皇天上帝南向騂牛一蒼璧皇考西向配陳設同無玉是日上常服乘輿至內西天門外神樂觀二知觀叩頭起執香爐導至神路錦衣衛官跪奏降輦上降輿導引官導上至大次具祭服出導引官導上由左門入至陛上典儀唱樂舞生就位執事官各司其事內贊對引官導上至拜位內贊奏就位典儀唱迎帝神奏樂樂止奏四拜傳贊百官同典儀唱奠玉帛奏樂奏升壇內贊導上至上帝香案前跪奏搢圭奏上香訖上受玉帛奏獻玉帛訖奏出圭內贊導上至配位香案前儀同前奏復位樂止典儀唱進爼奏樂齊郎舁安訖奏升壇內贊導上至上帝前奏搢圭奏進爼奏出圭內贊導上至配位前儀同前奏復位樂止典儀唱行初獻禮奏樂奏升壇內贊導上至上帝前奏搢圭上受爵奏獻爵訖奏出圭奏詣讀祝位樂暫止奏跪傳贊衆官皆跪贊讀祝訖樂復作奏俯伏興平身傳贊百官同內贊導上至配位前同前獻爵訖奏復位樂止典儀唱行亞獻禮終獻禮儀同初獻惟不讀祝樂止太常卿立于殿西東向唱賜福胙內贊奏詣飲福位內贊導上至祝飲位光祿寺卿捧福酒胙跪進于左奏跪奏搢圭奏飲福酒訖奏受胙訖奏出圭奏俯伏興平身奏復位奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送帝神樂奏四拜傳贊百官同樂止典儀唱讀祝官捧帛掌祭官捧饌各恭詣泰壇上退拜位之東立典儀唱望燎奏樂捧祝帛饌官出出殿中門奏詣望燎位內贊對引官導上至望燎位燎半奏禮畢導引官導上至大次易祭服出樂止上回明史樂志嘉靖十七年定大饗樂章迎神中和之曲於皇穆清兮𢎞覆惟仁既成萬寶兮惠此蒸民祇受厥明兮欲報無因爰稽古昔兮式展明禋肅肅廣庭兮遙遙紫旻笙鏞始奏兮祥風導雲臣拜稽首兮中心孔殷爰瞻寶輦兮森羅萬神庶幾昭格兮眷命其申徘徊顧歆兮鑒我恭寅奠玉帛肅和之曲捧圭幣兮瑶堂穆將愈兮聖皇秉豫心兮純一荷帝德兮溥將進俎凝和之曲歲功阜兮庶類成黍稷飶兮濡鼎馨敬薦之兮慙非輕大禮不煩兮惟一誠初獻壽和之曲金風動兮玉宇澄初獻觴兮交聖靈瞻元造兮懷鴻禎曷以酬之心怦怦亞獻豫和之曲帝眷我兮居歆紛繁會兮五音再捧觴兮莫殫臣心惟帝欣懌兮生民是任終獻熙和之曲綏萬邦兮屢豐年眇眇豫躬兮實荷昊天酒三獻兮心益虔帝命參輿兮勿遽旋徹饌雍和之曲祀禮既洽兮神人肅雍享帝享親兮勉竭臣𠂻惟洪恩兮罔極儼連蜷兮聖容送神清和之曲九韶既成兮金玉鏗鏘百辟森立兮戚羽斯藏皇天在上兮昭考在旁嚴父配天兮祇修厥常殷薦既終兮神去無方玄雲上升兮鸞鵠參翔靈光回照兮郁乎芬芳載慕載瞻兮願錫亨昌子孫庶民兮惟帝是將於昭明德兮永懷不忘望燎時和之曲龍輿杳杳兮歸上方金風應律兮燎斯揚達精誠兮合靈光帝廷納兮玉帛將顧下土兮眷不忘願錫吾民兮長阜康唐胄傳帝欲祀獻皇帝明堂配上帝胄力言不可下詔獄拷掠削籍歸豐熙傳子坊嘉靖二年進士出為南京吏部考功主事尋謫通州同知免歸家居貧乏思效張璁夏言片言取通顯十七年詣闕上書言建明堂事又言宜加獻皇帝廟號稱宗以配上帝世宗大悅未幾進號睿宗配饗元極殿其議蓋自坊始人咸惡坊畔父云明年復進慶雲雅詩一章詔付史館待命久之竟無所進擢歸家悒悒以卒蕙田案豐坊獻邢説以邀寵卒悒悒以卒可謂枉自為小人矣然當時亦必有惡之而使之然者豈非公議有不可泯沒者乎諂如嚴嵩尚為兩可之論而坊竟毅然出之異哉王圻續通考十八年九月六日遣成國公朱希忠行大享禮于元極殿奉皇考配帝明史禮志二十一年敕諭禮部季秋大享明堂成周禮典與郊祀並行曩以享地未定特祭于元極寶殿朕誠未盡南郊舊殿原為大祀所昨歲已令有司撤之朕自作制象立為殿恭薦名曰泰享用昭寅奉上帝之意乃定歲以秋季大享上帝奉皇考睿宗配享行禮如南郊陳設如祈穀明年禮部尚書費寀以大享殿工將竣請帝定殿門名門曰大享殿曰皇乾及殿成而大享仍于元極寶殿遣官行禮以為常會典嘉靖二十四年即故大祀殿之址建大享殿而建皇乾殿于大享殿北以藏神版命禮部歲用季秋奏請擇吉行大享禮已又命暫行于元極寶殿明史穆宗本紀隆慶元年正月丙寅罷睿宗明堂配享禮志隆慶元年禮臣言我朝大享之禮自皇考舉行追崇睿宗以昭嚴父配天之孝自皇上視之則睿宗為皇祖非周人宗祀文王于明堂之義于是帝從其請罷大享禮命元極寶殿仍改欽安殿續通考王氏圻曰明初無明堂之制世宗執嚴父配天之説特創斯禮以追隆所生元極既配之後明年幸承天享帝于龍飛殿亦奉獻皇帝配所以尊其親者至矣其後自定規制更建泰享殿三年而後成一時創制更新典物隆備宜與合宮世室昭垂令典矣乃殿成而祀事不舉內殿殷薦止于代攝蓋帝排正議崇私親雖矯強于一時終有惄然不自安者故禮臣敦請屢諭緩行非僅耽奉玄修憚乘輿之一出也穆宗即位以禮臣議罷之允矣蕙田案明代明堂之禮肇于世宗然大享殿並非五室九階之制大祀禮行于玄極道士之宮并與唐宋之規摹講求者異矣至違正議而豐私昵憚親行而藉攝事不能見喻于臣民矧可希蹤于古哲耶右明明堂五禮通考卷三十
