body:
  text: 五禮通考卷三十刑部尚書秦蕙田撰吉禮三十明堂宋史寧宗本紀紹熙五年即位九月辛未合祭天地于明堂大赦文獻通考光宗紹熙五年詔今歲郊祀大禮改作明堂大禮令有司除事神儀物諸軍賞賜依舊外其乘輿服御中外支費並從省約後以在壽皇喪制內依淳熙十五年典故施行寧宗本紀慶元六年九月辛未合祭天地于明堂大赦文獻通考寧宗慶元六年大饗明堂以諒暗用紹熙禮紹熙五年明堂孝宗未卒哭時趙汝愚朝獻景靈宮嗣秀王伯圭朝享太廟而上獨祀明堂是年光宗之喪甫踰月而當行大禮乃命右丞相謝深甫欵天興之祠嗣濮王不儔攝宗廟之祭蓋亦用紹熙禮云開禧二年九月辛卯合祭天地于明堂玉海開禧二年禮部侍郎倪思奏周家明堂本為嚴父自皇祐定制以太祖太宗真宗參配事祖嚴父于是兩盡獨壽皇纍行重屋之禮是時高宗尊御德壽陛下初欵合宮而光宗頤神壽康是以上于並侑祖宗今光宗飇御在天升祔云久望亟命有司討論舊典以光宗與祖宗並配天地詔集議參政李璧奏竊考神宗聖訓有曰周公宗祀乃在成王之世成王以文王為祖則明堂非以配考明矣大哉王言皇祐故事後為南郊止云且奉三聖並侑司馬光謂孔子以周公輔成王致太平之業而文王其父也故引之以證聖人之德莫大于孝答曾子之問而已非謂凡有天下者皆當以父配天然後為孝也近世祀明堂者皆以其父配帝此誤識孝經之意而違先王之禮不可以為法也光所指近世謂唐故事代宗用杜鴻漸等議以考肅宗配天一時誤禮本不足據故錢公輔等于治平初推本經訓亦謂當先朝時惜無一引古義而爭者光公輔之言與神宗聖訓相為表裏有合乎祀無豐昵之義思又奏易之豫曰配祖考則是饗帝可以兼配祖考也晉摯虞之議曰郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以遠祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考此諸儒之論有合于經者皇祐參配紹興專配未嘗不嚴父璧又奏淳熙詔書曰具殫尊祖之誠則是嚴父之説已經釐正足以刋千載之誤垂萬世之規欲再舉淳熙以前典禮則與壽皇所既改者又將抵牾因阜陵之已行申神考之明訓復先王之舊禮一洗魏晉以來之曲説詔祀事日迫候將來別議思又奏聖莫聖于神宗賢莫賢于司馬光固可以為定論然熙寧四年元豐三年兩行明堂親祠實以英宗配元祐初光相哲宗而明堂之祠實以神宗配已見于議論終不敢輕改舊制蓋以經文及漢晉以來典章故耳集議官謂豫卦非為明堂立文考之正義云配祀明堂以考文王也則是為明堂立文分明蕙田案李璧此議宗祀配帝之義最為曲盡嘉定二年九月辛丑合祭天地于明堂大赦文獻通考嘉定二年當郊詔行明堂大禮臣僚言臣聞古之王者父事天母事地一歲之間冬夏日至大雩大享以及四時迎氣之類無非躬行郊見之禮後世彌文日增乘輿出郊儀衛之供百物之須賞賚之數無名之費不一而足雖欲行禮如先王不可得已夫禮從宜苟不失乎先王之意而有得于事天之實何害其為禮也恭惟藝祖在位十有七年親郊者四太宗在位二十二年親郊者五真宗以後三歲一郊遂為定制逮仁宗皇祐間始有事于明堂蓋稽之古典斷自聖意而以義起也陛下即位以來圜丘重屋其禮迭舉及兹三載又當親郊之期有司文移督辦錢物固已旁午于道州縣之間以應奉為名抑配于民不知其幾軍旅之後旱蝗相仍公私之積旦暮不繼民生既囏國力大屈重以今日使命往來其費逾倍空匱之狀可為寒心臣願陛下相時之宜權停郊祀之禮仍以季秋大享明堂既無失于事天之誠而可以省不急之費古之行禮視年之上下正此意耳昔咸平中鹽鐵使王嗣宗奏郊祀費用繁重望行謁廟之禮當是之時帑藏充溢天下富饒嗣宗猶以為請况今日國計比之咸平萬萬不侔矣檢照國朝故事仁宗嘉祐元年恭謝天地于大慶殿四年祫祭七年明堂蓋不行郊禋者九年哲宗元祐繼舉明堂者再高宗紹興繼舉明堂者三若陛下申講宗祀之儀則于祖宗舊章不為無據欲望下臣此章令禮部詳議施行臣又聞真宗因王嗣宗之請詔三司非禋祀所須並行減省是歲減應奉雜物十萬六千計其數之可考若此則必有條目而非漫然者矣今若舉行明堂其費比之郊丘雖已不等然明堂祭祀儀物之外賜豫浮費豈無合從節約者望并詔有司取其凡目參酌考訂當減者減之當去者去之一切條畫無為具文方國用窘乏民力殫竭之餘減千則吾之千也疑有脫文若曰細微不足經意則真宗全盛之時視十萬六千何足道哉唯陛下果斷而行之從之八年九月辛未合祭天地于明堂王圻續通考寧宗嘉定八年合祭天地于明堂吳詠繳進明堂御劄狀曰臣嘗出入禮經讀郊特牲謂祭有祈有報有辟焉讀周官太祝謂祀有祈福祥有求永正有弭災兵焉所謂肇禋于郊宗祀于明堂者不但曰報而已蓋海內乂安兵革不興年至于屢豐則鋪張揚厲而主報疆埸多事水旱間作民未有寧宇則禬禳祀禱而主祈此皆成周之令典國家列聖以來成法所不能廢也粵自近歲詞臣所撰赦詔類多頌美形容之詞而少愛人惻怛之意矧今兵祲未解民食孔艱陛下畏威一念如對上帝毖祀一忱若保赤子所宜因此時力致祈天永命之請臣用是輒援仁祖高宗兩朝故事載之御劄所有將來合降赦書更宜推廣此意深自貶損明示四方如建炎間臣夢得所上奏疏紹興間臣蓋臣近臣世將諸臣所撰赦文則庶幾可以迓續天命感動人心仰昭陛下寅畏懷保之實十一年九月辛巳合祭天地于明堂大赦蕙田案文獻通考數寧宗親祀明堂七有十四年九月辛卯但紀志未載用識于此宋史理宗本紀嘉定十七年嗣皇帝位九月辛卯祀明堂大赦禮志嘉定十七年閏八月理宗即位大享當用九月八日在寧宗梓宮未發之前下禮官及臺諫兩省詳議吏部尚書羅點等言本朝每三歲一行郊祀皇祐以來始講明堂之禮至今遵行稽之禮經有越紼行事之文既殯而祭之説則雖未葬以前可以行事且紹熙五年九月在孝宗以日易月釋服之後未發引之前慶元六年九月亦在光宗以日易月釋服之後未發引之前今來九月八日前祀十日皇帝散齋別殿百官各受誓戒係在閏八月二十七日即當在以日易月未釋服之內乞下太史局于九月內擇次辛日行禮則在釋服之後正與前史相同乃用九月二十八日辛卯前二日朝獻景靈宮前一日享太廟遣官攝事皇帝親行大享禮成不賀理宗本紀紹定三年九月辛丑祀明堂大赦六年九月辛亥祀明堂大赦端平三年九月辛未祀明堂大赦王圻續通考端平三年詔以今年九月有事于明堂直寶謨閣知婺州陳庸熙奏當舉皇祐典禮以太祖太宗寧考並配于明堂詔令禮部太常寺討論以聞宋史理宗本紀嘉熙三年九月辛巳祀明堂大赦淳祐二年九月辛卯祀明堂大赦禮志淳祐三年將作少監權樞密都承旨韓祥言竊以明堂之禮纍聖不廢嚴父配侑之典南渡以來事頗不同高廟中興徽宗北狩當時合祭天地于明堂以太祖太宗配非廢嚴父之祀以父在故也及紹興末乃以徽廟配孝宗在位二十八年娛奉堯父故無祀父之典南郊明堂惟以太祖太宗配沿襲至今遂使陛下追孝寧考之心有所未盡時朝散大夫康熙亦援倪思所著合宮嚴父為言上曰三后並侑之説最當是後明堂以太祖太宗寧宗並侑蕙田案續通考載端平三年婺州陳庸熙言當舉皇祐典禮以太祖太宗寧考並配疑禮志朝散大夫康熙即庸熙之訛也存之以俟考理宗本紀淳祐五年九月辛亥祀明堂奉太祖太宗寧宗並侑大赦八年九月辛酉祀明堂大赦王圻續通考監察御史陳垓言祀者國之大事三歲明禋將享多非本物皆自見科市戶今仰臣監督各備正色毋以他物充代從之十一年九月辛未祀明堂大赦寶祐二年九月辛亥祀明堂大赦五年九月辛酉祀明堂大赦禮志寶祐五年九月辛酉復奉高宗升侑于是明堂之禮一祖三宗並配王圻續通考五年三月詔曰高宗皇帝克紹大業寵綏萬民厄十世以中興恢旋乾轉坤之烈御六飛而南渡有櫛風沐雨之勞定社稷以奠鰲極之安明統系以詒燕謀之永豈有光復我家之盛未隆升陪世室之尊永言孝思稽古多闕所以採博士議郎之是酌人情禮制之宜倣有夏之祀少康法元和之尊光武合一祖三宗而並侑有德有功則參天二地之宏規丕承丕顯用秩元祀昭宣重光陟配而多歷年以陳常于時夏會通而行典禮將大享于季秋宋史理宗本紀景定元年九月辛巳祀明堂大赦禮志度宗咸淳二年將舉郊祀時復議以高宗參配時吏部侍郎洪燾等議禮者所以別等差視儀則逺而尊者配于郊近而親者配于明堂明有等也臣等謂宜如紹興故事奉太宗配將來明堂遵用先皇帝彞典以高宗參侑庶于報本之禮奉先之孝為兩盡其至詔恭依度宗本紀咸淳五年九月辛酉祀明堂大赦丙寅明堂禮成加上皇太后尊號寶册禮志度宗咸淳五年又去寧宗以太祖太宗高宗理宗並配蕙田案王氏通考有咸淳二年四年大享無五年大享今依宋史為定度宗本紀八年九月辛未明堂禮成祀景靈宮還遇大雨改乘逍遙輦入和寧門肆赦王圻續通考八年起居舍人高斯得進郊天故事曰臣聞人主事天之道唯質與忱而已蓋質者天地之性而忱則天之道也大路越席掃地不壇器用陶匏牲用繭栗皆尚質也立澤聽誓皮辨聽報齋明盛服三宿七戒皆致忱也外盡乎質內盡乎忱則天之親德享道也宜矣秦漢之後文縟而掩其質敬弛而汨其忱千乘萬騎以為華寶鼎天馬以為飾而事天之本廢矣牡荆靈旗以禱兵方士祕術以求福而事天之心蕩矣若成帝者則以文滅質以欲汨忱之尤者也甘泉泰畤之祠正承武帝奢華之後丞相匡衡欲少去華就實乃奏罷鑾輅龍鱗黻繡周張之飾更定其儀與其樂章帝雖勉從而終不能改故雄賦甘泉極道八神警蹕星陳天行萬騎中營玉車千乘之盛以致靡麗之譏是時趙昭儀又大幸每上至甘泉常陪法從故雄賦云想西王母欣然而上壽兮屏玉女而却虙妃玉女無所眺其清盧兮虙妃曾不得施其蛾眉以戒齊肅之事惜乎帝之馳騖于紛華湛溺于逸欲而不能用也欲以感動天地逆釐三神不亦難乎陛下穆卜季秋中辛以行㿩館之祀今有日矣咸秩之禮昭事之忱所宜早戒而預定者聖心固已孜孜于此蓋自乾淳以來每遇郊禋必詔有司自事天儀物及諸軍賞給之外凡車服仗衛聲名文物之具莫不裁約而歸于儉錫賚推恩亦減承平之半或三之一可謂尚質之至矣至于前期齋殿致其精明以對越在天者尤極其嚴行事之際避黃道而不履虛小次而不御可謂至忱之極矣是以神天顧歆或積雨而頓霽或微恙而立瘳以樂成熙事此則陛下之家法也厥今四郊多壘財力單匱逺不逮乾淳之時臣願陛下于阜陵節約之外損之又損庶幾曰祀曰戒二者兼得乃若以忱事天又其大本記曰齋者防其邪物絶其嗜欲言不敢散其志也今距齋宿之期雖曰尚賖然臣願陛下以聖人久禱為心兢兢業業已如上帝臨汝神在其上之時則積此精誠用于一日天人相與如響應聲天神之不降地祗之不格風雨之不節寒暑之不時臣不信也蕙田案是年九月享明堂故斯得疏云穆卜季秋行㿩館之禮南渡以後當郊之歲每以資用不足權停郊祀止享明堂蓋以明堂代郊故臣僚封事統謂之郊天耳實非南郊也王儀明禋儀注明堂殿正配四位昊天上帝皇地祗太祖太宗各牲牢禮饌二十二拜一十三跪俯伏興第一上參神兩拜盥帨各詣前位跪奠鎮圭