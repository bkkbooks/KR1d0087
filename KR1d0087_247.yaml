body:
  text: 五禮通考卷二百三十七刑部尚書秦蕙田撰軍禮五出師一蕙田案先王不得已而用師師必以律律與禮相爲表裏者也師出不以律猶無師也律不以禮猶無律也故出師之際禮尤重焉今集經史及諸家之言列出師一門此書以議禮非言兵也故行陣擊刺之事從略而於類禡宜造命将誓師及凱旋宣捷諸儀節則加詳焉正史之外采唐五代㑹要開元禮政和新儀通典通考明集禮㑹典附益之易師卦師貞丈人吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也九二在師中吉旡咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也六三師或輿尸凶象曰師或輿尸大無功也六四師左次旡咎象曰左次旡咎未失常也六五田有禽利執言旡咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也程子曰師爲卦坤上坎下以二體言之地中有水爲衆聚之義以二卦之義言之内險外順險道而以順行師之義也以爻言之一陽而爲衆隂之主統衆之象也比以一陽爲衆隂之主而在上君之象也師以一陽爲衆隂之主而在下将帥之象也大易紀聞初六出師而嚴其律九二帥師而得其人戒六三之輿尸而一其令審六四之左次而重其進去天下之害而不自爲害此皆六五之君得興師之道操任将之法至上六而功成治定師之道終焉六爻中出師駐兵将兵将将與奉辭伐罪旋師班賞無所不載雖後世兵書之繁不如師卦六爻之略也謙卦六五利用侵伐旡不利上六利用行師征邑國朱子語類問謙是不與人爭如何五上二爻皆言利用侵伐利用行師曰老子言大國下小國則取小國小國下大國則取大國又言抗兵相加哀者勝矣大抵謙自是用兵之道只退處一步耳如必也臨事而懼皆是此意豫卦豫利建侯行師程子曰豫順而動也諸侯和順則萬民悦服兵師之興衆心和悦則順從而有功故悦豫之道利于建侯行師也又上動而下順諸侯從王師衆順令之象君萬邦聚大衆非和悦不能使之服從也離卦上九王用出征有嘉折首獲匪其醜旡咎象曰王用出征以正邦也程子曰九以陽居上在離之終剛明之極者也明則能照剛則能斷能照足以察邪惡能斷足以行威刑故王者能用如是剛明以辨天下之邪惡而行其征伐則有嘉美之功也征伐用刑之大者夫明極則無微不照斷極則无所寛宥不約之以中則傷于嚴察矣去天下之惡若盡去其漸染詿誤則何可勝誅所傷殘亦甚矣故但當折取其魁首所執獲者非其醜類則无殘暴之咎也書曰殱厥渠魁脅從罔治書𦙍征威克厥愛允濟愛克厥威允罔功仲虺之誥兼弱攻昧取亂侮亡推亡固存邦乃其昌傳弱則兼之闇則攻之亂則取之有亡形則侮之有亡道則推而亡之有存道則輔而固之康王之誥太保芮伯咸進曰張皇六師無壞我髙祖寡命傳言當張大六師之衆周禮春官大宗伯大師之禮用衆也鄭氏鍔曰五軍以為師以師統軍以軍統旅以旅統卒以卒統兩以兩統伍上下相統聞鼔進聞金止此大師之禮以用衆故欲其同夏官大司馬制軍詰禁以糾邦國以九伐之法正邦國馮弱犯寡則𤯝之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之注馮猶乗陵也言不字小而侵侮之𤯝猶人𤯝瘦也王霸記曰四面削其地春秋傳曰粗者曰侵精者曰伐又曰有鐘鼔曰伐則伐者兵入其境鳴鐘鼔以往所以聲其罪鄭氏鍔曰𤯝王氏謂詘其爵命削其土地若人𤯝瘦未免與下削之相似𤯝如易有災𤯝之𤯝用兵治之使若𤯝災不能逃其患也及師大合軍以行禁令以救無辜伐有罪注師所謂王廵守若㑹同司馬起師合軍以從所以威天下行其政也王氏昭禹曰及師大合軍謂命将或王親征之時鄭氏鍔曰大合軍旅非以肆暴也以行禁令所以申明乎九法也以救無辜所以明王者之仁也以伐有罪所以明王者之義也禮記曲禮班朝治軍涖官行法非禮威嚴不行陳氏澔曰治軍旅左右之局非禮則威嚴不行右師名義禮記月令孟春之月不可以稱兵稱兵必天殃陳氏澔曰天地大徳曰生春者生徳之盛時也兵凶器戰危事以殺戮之心逆生育之氣是變易天之生道其殃也宜哉季夏之月不可以起兵動衆孟秋之月天子乃命将帥選士厲兵簡練桀俊専任有功以征不義詰誅暴慢以明好惡順彼逺方陳氏澔曰専任有功謂大将有已試之功乃使之専主其事也詰者問其罪誅者戮其人殘下謂之暴慢上謂之慢右出師時令周禮夏官大司馬若大師則掌其戒令易氏祓曰若有强梗弗率者負固弗服者與夫侵犯王略而自干天誅者天子于是親帥六師方伯連帥從焉謂之大師大司馬掌其戒令則方伯連帥以至軍将師帥莫不受戒令焉鄭氏鍔曰或謂用師則大司馬為大将固掌號令以指麾六軍矣此言若大師則掌其戒令者葢此乃王親出征之時也王自出軍則王自将號令皆出于王大司馬惟掌戒令則専治六師之法而已詩小雅常武序常武召穆公美宣王也有常徳以立武事因以爲戒然詩緝嚴氏粲曰此詩王親征淮北之夷及徐方也召公既平淮南之夷未㡬淮北之夷復挾徐方以叛宣王于是親征之召公慮其狃勝而喜功也故因美而戒之蕙田案親征之事如黄帝之征蚩尤及夙沙氏夏啓戰甘之師武丁荆楚之伐皆是也湯南巢之戰武牧野之戰亦屬親征而其事又别後世如隋之征髙麗唐太宗之征突厥宋真宗景徳澶淵之師與明成祖之征蒙古本雅實哩阿嚕台衛拉特瑪哈穆特等英宗之征也先武宗之征宸濠或有合于奉辭伐罪之義或徒出于窮兵黷武之爲孰得孰失史有明文學者折衷于經可也右親征禮記王制諸侯賜弓矢然後征賜鈇鉞然後殺馬氏晞孟曰征與殺先王所以致天討弓矢鈇鉞先王所以致天討之器諸侯必俟天子之賜然後得以征伐者臣無有作威所用則君之賜而已以征對殺則殺爲重以弓矢對鈇鉞則鈇鉞爲重諸侯之出討有罪未賜斧鉞而有所不敢殺則亦征之而已書大禹謨帝曰咨禹惟時有苗弗率汝徂征禹乃㑹羣后誓于師三旬苗民逆命益曰惟徳動天無逺弗届矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于兩階七旬有苗格傳舞文舞于賔主階間抑武事疏釋言干扞也據器有武有文俱用以為舞而不用於敵故教為文也書𦙍征惟仲康肇位四海𦙍侯命掌六師義和廢厥職酒荒于厥邑𦙍侯承王命徂征林氏之竒曰羿之立仲康也方将執其禮樂征伐之權以號令天下羲和黨惡于羿𦙍侯承王命往征之以剪羿羽翼故終仲康之世羿不得以逞也詩大雅皇矣密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祐以對于天下依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之将萬邦之方下民之王詩緝嚴氏粲曰文王以西伯討密之罪先駐兵國都依憑此在京之師以為聲勢然後出兵自阮疆以侵密帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝閑閑崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂朱子詩傳述文王伐崇之事棫樸淠彼涇舟烝徒楫之周王于邁六師及之詩緝嚴氏粲曰三章述戎事之得人也文王之時北有玁狁之難文王以天子之命命将遣戍以討之必渡涇水也豳風東山序東山周公東征也我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下箋周公攝政三監及淮夷叛周公乃東伐之三年而後歸何氏楷曰朱子云東山之詩言自我不見于今三年則居東之非東征明甚葢周公居東二年成王因風雷之變既親迎以歸三叔懐流言之罪遂脅武庚以叛成王命周公征之其東征往返首尾又自三年也案逸周書作雒解云師旅臨衛攻殷殷大震潰降羣三叔禄父者奔管叔經而卒所征熊盈族十有七國俘維九邑俘殷獻民遷于九畢竹書成王三年王師滅殷殺武庚禄父遷殷民于衛遂伐奄滅蒲姑四年王師伐淮夷遂入奄五年王在奄遷其君于蒲姑夏五月王至自奄此則東征之役斧斨破缺盖歴三年也蕙田案金縢篇孔安國傳以我之弗辟為刑辟之辟并即以居東二年為東征誅管蔡之事鄭康成詩箋以弗辟為避而以居東二年為避居東土蔡仲黙因之竊謂一聞流言遽興兵而東誅二叔恐周公未必専擅如此惟避居二年積誠相感王心稍悟然後作鴟鴞以開解王心及乎風雷感泣發匱得書皮弁親迎之後乃敢用我斨我斧奉王命而致討居東二年征東三年自是二事豈可併為一談也古雖有専征之禮然如孔傳説適足為亂臣藉口當從康成為是何氏據逸周書竹書證之疑或然也破斧序破斧美周公也既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將書費誓序魯侯伯禽宅曲阜徐夷並興東郊不開作費誓傳徐戎淮夷並起為寇于魯故東郊不開魯侯征之于費地而誓衆詩秦風小戎序小戎美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉右諸侯専征禮記王制天子将出征類乎上帝蕙田案王制所説類宜造之禮凡二見其一為巡守之禮其一為征伐之禮鄭康成皆注云其禮亡則三代以上儀節之詳已不可見然散見各經者尚多今採取特備唐及明諸儀甚詳今略撮其要以備考又案孔疏爾雅所釋多為釋詩以皇矣云是類是禡故釋為師祭不謂餘文皆為師祭但類者以事類告天若以攝位事類告天亦謂之類故尚書舜典云肆類于上帝是也或以巡狩事類告天亦謂之類故王制云天子将出類乎上帝是也周禮春官大祝大師類上帝則前祝注前祝大師自前祝也王出将有事于神大祝居前先以祝辭告之天疏王出六軍親行征伐曰大師軍将出類祭上帝告以行大祝先告王後臨也王氏安石曰司馬法曰将用師乃告于皇天上帝日月星辰詩曰是類是禡爾雅曰此師祭也所謂類上帝也鄭氏鍔曰凡此事大祝處前告神故曰前祝王氏昭禹曰大祝前于羣祝肆師類造上帝則為位鄭氏鍔曰上帝至尊不可以凟因其事類然後告祭故名曰類類者上帝之祭造者祖廟之祭此曰類造上帝何也盖王者出征所至以事類告天故兼言之非常祭故為之位盖肆師主立國祀之禮耳孔叢子問軍禮先期五日太史誓于祖廟擇吉日齋戒然後乃類上帝柴于郊以出司馬法先王之治順天之道設地之宜官民之徳而正名治物立國辨職以爵分禄諸侯諸侯懐海外來服獄弭而兵寝聖徳之治也其次賢王制禮樂法度乃作五刑興甲兵以討不義巡狩省方㑹諸侯考不同其有失命亂常背徳逆天之時而危有功之君徧告於諸侯彰明有罪乃告於皇天上帝日月星辰然後冢宰徵師於諸侯曰某國為不道征之以其年月日師至於某國㑹天子正刑書湯誥敢用𤣥牡敢昭告于上帝神后請罪有夏以與爾有衆請命蔡傳𤣥牡夏尚黒未變其禮也詩大雅皇矣是類是禡注類出師祭上帝爾雅釋天是禷是禡師祭也注師出征伐禷于上帝書泰誓予小子夙夜祗懼類于上帝以爾有衆底天之罰蔡傳言予小子畏天之威早夜敬懼不敢自寧告于天地神祗以爾有衆致天之罰于商也詩周頌桓序桓講武類禡也桓武志也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之孔叢子問軍禮凡類禡皆用甲丙戊庚壬之剛日通典梁武帝天監初陸璉定軍禮依古制類造等用牲幣帝曰宜者謂征討得宜造者稟謀於廟類者奉天時以明伐並明不欲自専陳幣承命可也璉不能對嚴植之又爭之於是告用幣反亦如之北齊親征纂嚴則服通天冠文物充庭有司表更衣乃入冠武弁左貂附蟬以出誓訖次擇日陳六軍備大駕類于上帝隋大業七年征髙麗於宫南類上帝積柴燎壇設髙祖位于東方帝服大裘而冕乗玉輅祭奠玉帛並如宜社諸軍受胙畢帝就位觀燎乃出将發帝御臨朔宫親受節度遂出唐開元禮皇帝親征類于上帝纂嚴前一日本司承制宣攝内外諸司各隨職備辦施御幄於太極殿北壁下南向如常守宫設羣官文武次于東西朝堂如常儀陳革輅及玉輅以下車旗之属如常未明一刻開諸宫門諸衛勒所部列黄麾仗屯門及陳於殿庭如常儀其日平明留從之官悉集朝堂次侍臣服平巾幘袴褶其将帥等及從行之官亦平巾袴褶留守之官公服上水五刻侍中版奏請中嚴文武官各列于殿庭上水三刻通事舎人引羣官俱詣閤奉迎皇帝服武弁服侍衛如常即御座南向坐典儀唱再拜羣臣皆再拜訖中書令承㫖勅百竂訖通事舎人以次引羣官出侍中跪奏禮畢俛伏興皇帝降御座乗輿入自東房侍中從至閤齋戒前一日皇帝清齋於太極殿諸應告之官及羣官客使等各於所司及公館諸軍将各於正寢俱清齋一宿餘如郊祀儀陳設前告三日陳設如廵狩告圜丘儀社設大次于社宫西門之外道北南向設告官等次以下如祭社之儀又設軍将次於外堰南門外道東西向北上前二日設樂懸燎壇羣官版位等並如告圓丘之儀又設将軍位於應南每等異位重行北面西上軍将門外位於南壇外道東西向北上社軍将位次于社宫北門之外道東俱南向北上設樂懸等如祭社儀又為瘞埳三于樂之北如常又前二日奉禮設御位于北門内當社壇南向設太史等奉血幣位于埳北如常郊社令帥府史一人又齋郎以罇坫罍洗篚羃入設皆如祭未明十五刻烹牲如常蒼牲二每一座一配坐禮烹牲于厨用黒牛二齋郎以豆取毛血如常未明四刻太史令郊社各服其服升設神座如常儀鑾駕出宫皇帝武弁乗革輅備大駕及嚴鼓侍中奏請發内外器服皆如常儀前後備六軍薦玉帛其日未明二刻下至太常卿引皇帝至内壝門並如廵狩圜丘親告儀天地大罇二實以沈齊明水實于上罇山罍二一實𤣥酒為上一實清酒玉幣以蒼唯無禮部尚書太常卿陪從皇帝至版位西向立每立定太常卿與博士俱退立于左太常卿前奏請拜退復位皇帝再拜以下至奠玉帛訖降壇還版位樂止並如廵狩親告儀進熟皇帝既升奠玉帛太官令出帥進饌者以下至皇帝降壇還版位謁者引司徒降復位並如廵狩圜丘親告儀宜社自行司徒降復位以上同廵狩告社儀皇帝既降壇謁者引諸軍将詣壇東堦升進立於天帝神座前北靣西上宜社立于太社神座前南面西上初軍将升太祝帥齋郎以爵酌福酒進立於軍将之西東向北上宜社于軍将東西面南上軍将俱再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進俎減神前胙肉以次授軍将受以授齋郎軍将俱跪取爵遂飲卒爵太祝帥齋郎受爵復于坫軍将俱興再拜謁者引軍将降復太祝各進跪徹豆還罇所奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜元和之樂作太常卿前奏請再拜退復位皇帝再拜及燎燔以下至燔祝版並如廵狩親告儀宜社自皇帝再拜以下至燔祝版並如廵狩告社儀鑾駕還宫如郊社儀宜社同遼史禮志将出師刑青牛白馬以祭天地其祭常依獨樹無獨樹即所舎而行之明大政紀洪武四年正月丁亥上親祀上下神祗告伐明昇明會典天子親征祭告天地洪武三年定凡祭告天地前期擇日皇帝服武弁乗革輅備六軍以牲犢幣帛祭告作樂行三獻禮右類上帝禮記王制天子将出征宜乎社鄭氏鍔曰祭社曰宜葢以事宜而祭之非春秋之所報此國内之禮汪克寛經禮補逸宜出兵祭社之名社所以神地道主隂先王建國左祖右社大社在庫門之内右國社亦在公宫之右皆尚隂也隂主殺故誓社而田因田而習軍旅出征祭之稱其義也然征既宜于社而又類于上帝造于祖禰何哉盖生殺非王者所得私也類于上帝明奉天討也造于祖禰示受命于廟不敢自専也曰類曰宜曰造祭雖先後不同合周官王制泰誓言之其義各有攸當也周禮春官大祝大師宜于社則前祝注則前祝大祝自前祝也王出将有事于此神大祝居前先以祝辭告之疏軍将出宜祭于社王氏安石曰案爾雅曰起大事動大衆必先有事于社而後出謂之宜所謂宜于社也孔叢子問軍禮先期五日太史誓于祖廟擇吉日齋戒既筮則獻兆于天子天子使有司以特牲告社告以所征之事而受命焉司馬法興甲兵以討不義乃禱于后土四海神祗山川冢社書泰誓宜于冢土蔡傳冢土大社也春秋成公十三年左氏傳春三月公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦成子受脤于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎疏宗廟之祀則有執膰兵戎之祭則有受脤此是交神之大節也通典隋大業七年征髙麗煬帝遣諸将於薊城南桑乾河上築社稷二壇設方壇行宜社禮帝齋于臨朔宫懐荒殿與告官及侍從各齋于其所十二衛兵士並齋帝服衮冕玉輅備法駕禮畢御金輅服通天冠還宫唐開元禮制遣大将出征有司宜于大社将告有司卜日如别儀前一日諸告官致齋於社所守宫設告官以下位各於常所諸将位於社宫北門外道西東向南上右校清掃内外又為瘞埳二於南門内壇西南如常奉禮設告官以下版位如常儀設諸将位於北門内當太社壇南西面東上諸将門外位於北門外道西東向南上郊社令帥其属設罇罍玉帛等如式執罇罍者位如常告日未明十刻太官令先具牢饌質明告官等各服其服太史令諸社令升設神席良醖之屬入實罇罍玉幣大罍及配座象罇實醴齊𤣥酒各實于上罇玉社稷兩珪有邸幣以元一丈八尺奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀訖就位贊引引告官以下俱就門外位謁者引告官贊引引執事者入就位立定奉禮曰再拜贊者承傳告官以下皆再拜太官令出帥進饌者奉饌陳於西門外告官等入謁者引諸将俱就門外位告官入訖謁者引諸将入就位立定奉禮曰再拜大将以下皆再拜謁者進告官之左曰有司謹具請行事還本位諸祝俱取玉幣於篚各立於罇所謁者引告官詣大社壇升北面以下至奠玉幣酌飲福受祚如廵狩告社攝事儀初告官詣稷壇贊者引諸将詣大社壇升西陛進立於大社神坐前南面東上初諸将升諸祝帥齋郎以爵酌福酒進諸将東西面立諸将皆再拜受爵跪祭酒啐酒奠爵俛伏興諸祝帥齋郎進俎減神前胙肉以次授諸将受以授齋郎諸将俱跪取爵遂飲卒爵太祝帥齋郎受爵復於坫諸将俛伏興再拜訖謁者引諸将降詣太稷壇飲福受胙如大社儀訖還本位奉禮曰再拜諸将以下皆再拜謁者引出初諸将出諸祝各進跪徹豆以下及告官望瘞玊幣至禮畢如廵狩告社儀若凱旋唯陳俘馘及軍實於北門南面其告禮如上儀祝版燔於齋所蕙田案此開元所定命将宜社禮天子親征宜社禮已見前類帝中彼此互見明會典洪武三年定天子親征宜于社前期擇日皇帝服武弁乗革輅用牲犢幣帛作樂行三獻禮其儀同春秋祭社稷之儀軍将俱飲福于太稷廟蕙田案諸侯出師有宜社造禰之禮此在周禮王制無文而杜佑通典有之未詳所據今不另列此條右宜社禮記王制天子将出征造乎禰注造至也至考廟也鄭氏鍔曰蔡祖曰造葢特造至而祭之非四時之常享此國内之禮汪氏克寛曰造造而告之之祭也告于祖禰告以道其事而致其敬也考之王制又曰受命于祖泰誓曰受命于文考此盖因造告卜于廟受命于祖考而後征也周禮春官大祝掌六祈以同鬼神示二曰造注大師者六軍親征之稱出必徧祭七廟取遷廟之主而行大師造于祖則前祝王氏安石曰司馬法曰将用師乃造于先王所謂造于俎也蕙田案王制之造但祭考廟周禮之造徧祭七廟二説互相備司馬法興甲兵以討不義乃造于先王唐開元禮皇帝親征告于太廟齋戒将告有司卜日皇帝清齋及應告官清齋等並如廵狩告儀又諸軍将各於正寝清齋一宿若在營齋于軍幕諸衛令其屬守廟門工人俱清齋如常儀陳設前告三日陳設如廵狩告廟儀又設軍将次於南門外道東西向北上前二日設樂懸前一日設御座及從駕官位如廵狩告廟儀又設軍将門外道東每等異位重行西向北上設入罍洗大告日未明十五刻烹牲等並如廵狩告廟儀鑾駕出宫皇帝服武弁服乗革輅前後備六軍嚴鼓並准大駕餘同圜丘儀晨祼廵狩告廟同饋食皇帝既升裸下至獻九室訖降復位並如廵狩告廟儀又皇帝既降謁者引諸軍将升自東階進立於睿宗大聖至孝皇帝室户前北面西上初軍将升諸太祝各帥齋郎以爵酌罍福酒進立軍将之東西面北上以下至啐奠降復位如類上帝儀軍将登作諸祝各入室徹豆還罇所以至燔版于齋坊如類上帝儀鑾駕還宫皇帝既還大次侍中版奏請解嚴将士不得擅離部伍皇帝仍武弁乗革輅還宫如常儀明會典洪武三年定天子親征造于太廟前期擇日皇帝服武弁乗革輅備六軍祭告太廟每廟用牲幣行三獻禮其儀皆同時享軍将飲福于皇考之室右造廟禮記王制天子将出征禡于所征之地注禡師祭也為兵禱疏案釋天云是禷是禡師祭也故知禡為師祭也謂之禡者案肆師注云貉讀如十百之百為師祭造軍法者禱氣勢之増倍也其神盖蚩尤或曰黄帝鄭既云祭造軍法者則是不祭地熊氏以禡為祭地非也杜氏佑曰禡于所征之地者則兼黄帝蚩尤之神若田狩但祭蚩尤而已陳氏禮書黄帝與蚩尤戰于版泉軍法之興始于此故後世祭之路史史記逸周書大戴禮文所云炎帝赤帝皆謂蚩尤而書傳舉以為榆罔失之日下舊間説蚩尤者不一孔子三朝記大戴禮記以為庶人孔氏小司馬氏以為諸侯應劭以為古天子或以為炎帝之後或以為九黎之君或謂殺之于中冀或謂殺之于青丘或謂殺之于凶黎之谷傳聞異辭並存焉可也詩大雅皇矣是類是禡朱子詩傳禡至所征之地而祭始造軍法者謂黄帝及蚩尤也章氏侗曰漢書稱髙祖祀黄帝蚩尤于沛廷管仲稱蚩尤作劍㦸史記稱黄帝與蚩尤戰于阪泉豈軍法之興始於此故後世祭之歟爾雅釋天是禷是禡師祭也注師出征伐禡于所征之地疏禡祭造兵為軍法者為表以祭之禡周禮作貉貉又或為貊字古今之異也貉之言百祭祀此神求獲百倍春秋荘公八年春王正月甲午祠兵公羊傳祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也注祠兵祭也左氏作治兵盖禮兵不徒使故将出兵必祠于近郊陳兵習戰殺牲饗士卒丘氏濬曰此經傳言祠兵之始先儒謂何氏解祠兵有二義一則祀其兵器後世祭旗節始此一則殺牲享士卒後世犒賞士卒始此漢書髙祖本紀秦二世元年髙祖乃立為沛公祠黄帝祭蚩尤於沛廷而釁鼓旗幟皆赤郊祀志髙祖徇沛為沛公則祀蚩尤釁旗鼓應劭曰蚩尤好五兵故祠祭之求福祥也釁祭也殺牲以血塗鼔曰釁臣瓉曰案禮記及大戴禮有釁廟之禮皆無祭事蕙田案王制明有禡祭臣瓚以為無祭事謬矣髙祖本紀二年立蚩尤之祀於長安郊祀志武帝伐南越告禱泰一以牡荆畫幡日月北斗登龍以象太一三星為泰一鏠旗命曰靈旗為兵禱則太史奉以指所伐之國師古曰以牡荆為幡竿而畫幡為日月龍及星蕙田案此以太乙為旗神後漢滕輔祭牙文恭修太牢潔薦遐靈推轂之任實討不庭天道助順正直聰明敬建髙牙神武攸託雄㦸推鋒龍淵灑鍔晉顧愷之祭牙文某年某月日録尚書事豫章公裕敢告黄帝蚩尤五兵之靈兩儀有政四海有王奉命在天世徳重光烈烈髙牙闐闐伐鼓白氣經天簡揚神武恭行帝罰長殱醜虜維徳是依維人是輔蕙田案此祭黄帝蚩尤五兵宋鄭鮮之祭牙文潔牲先事薦兹敬祭崇牙既建義鋒増厲人鬼一揆三才同契惟兹靈鑒庶必有察逆順幽辨忠孝顯節凶醜時殱主寧臣悦振旅上京凱歸西蕃神器増輝四境永安隋書禮儀志後齊天子親征卜日建牙旗於墠祭以太牢将届戰所卜剛日備𤣥牲列軍容設柴於辰地為墠而禡祭大司馬奠矢有司奠毛血樂奏大濩之音禮畢徹牲柴燎開皇二十年太尉晉王廣北伐突厥四月己未次於河上禡祭軒轅黄帝以太牢制幣陳甲兵行三獻之禮大業七年征遼東行幸望海鎮於秃黎山為壇祀黄帝行禡祭詔太常少卿韋霽博士褚亮奏定其禮皇帝及諸預祭臣近侍官諸軍将皆齋一宿有司供帳設位為埋埳神坐西北内壝之外建二旗於南門外以熊席設帝軒轅神坐於壝内置甲胄弓矢於坐側建槊於坐後皇帝出次入門羣官定位皆再拜奠禮畢還宫唐開元禮親征禡于所征之地将祭有司卜日前祭一日皇帝齋於行宫應祭之官齋於祭所近侍之官與從祭羣官及諸軍将皆於軍幕齋一宿諸衛令其屬各以其方器服守衛壝門齋一宿尚舎直長施大次及羣官軍将等次如類上帝儀又為瘞埳於神座西北内壝之外方深取足容物前一日奉禮設御座東面西向設望瘞位於神座西南當瘞埳北上設諸蔡官位於御位東南執事者位於其後俱重行西向北上設御史位一位於神座西南東向一位於神座東南西向設奉禮位於祭官西南贊者二人在南差退俱西向北上又設奉禮贊者位於瘞埳西南上設從祭羣官位於祭官之南俱重行西向北上設軍将於南廂重行北向西上設門外位祭官以下皆於東壝之外道南從祭羣官位於祭官之南俱重行北向西上軍将位於南壝外道東重行西向北上兵部侍郎建二旗於南門外去門三十步郊社令帥府史及齋郎以罇坫罍洗篚羃入設於位犧罇二象罇二山罍二皆於神座東南俱北向西上罇皆加勺羃有坫以置爵設御洗又於酒罇東南設諸将罍洗又於東南北向設篚羃如常篚實以中爵執罇罍者如常設幣篚於酒罇之所祭日未明十五刻太官令先備特牲之饌牲以犢未明四刻郊社令奉熊席入設黄帝軒轅氏神座於壝内近北南向兵部侍郎置甲胄弓矢於座側建矟於座後未明二刻郊社令良醖令各帥其属入實罇罍及幣犧罇實以醴齊象罇實以盎齊山罍實以清酒齊皆加明水酒如𤣥酒各實于上罇大官令帥進饌者實諸籩豆簠簋未明一刻奉禮帥贊者先入就位贊引引御史太祝與執罇罍篚者入當御座前重行北向西上立定奉禮曰再拜贊者承傳御史以下皆再拜執罇罍者各就位贊引引御史太祝行掃訖引就位皇帝服武弁之服詣祭所諸将與從祭之官皆戎服陪從如常駕将至謁者引行事之官皆就東門外位駕至大次門外下馬之大次郊社令以祝版進御如常謁者贊引各引從駕羣官及諸将俱就門外位謁者贊引各引祭官及從蔡羣官諸軍将等次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次博士引太常卿太常卿引皇帝入門仗衛停於門外近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿前奏有司謹具請行事退復位太祝跪取幣於篚興立於罇所凡取物者皆跪俛伏而取以奠物則奠訖俛伏而後興太常卿引皇帝進神座前北向立太祝以幣授侍中侍中奉幣東向進皇帝受幣太常卿引皇帝進北向跪奠於神座俛伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝還版位西向立伺衆官拜訖太官令出帥進饌者奉饌陳於東門之外謁者引司徒出詣所司徒奉爼皇帝既復位太官令引饌入太祝迎引設於神座前訖謁者引司徒以下還本位太祝還罇所太常卿引皇帝詣罍洗侍中黄門侍郎贊洗授巾爵並如常儀謁者引司徒進立於罇所齋郎奉俎立於司徒之後皇帝洗爵訖太常卿引皇帝詣罇所執罇罍者舉羃侍中贊酌醴齊訖太常卿引皇帝進軒轅氏神座前北向跪奠爵俛伏興太常卿引皇帝少退北向立太祝持版進於神座之右東面跪讀祝文文臨時譔訖興皇帝再拜太祝進奠版於神座還罇所太祝以爵酌罇受福以授侍中受爵西向進皇帝再拜受爵跪祭啐奠爵受胙至還本位如常儀謁者引亞獻上将詣罍洗盥手洗爵酌盎齊奠啐受福如上訖還本位謁者又引次将終獻如亞獻儀太祝進徹豆如式奉禮由賜胙以下至望瘞位禮畢還大次並如常其寘土埳東西各四人若備六軍及嚴鼔作止如類告之禮唐書禮樂志皇帝親征禡於所征之地則為壝再重以熊席祀軒轅氏兵部建兩旗於外壝南門之外陳甲胄弓矢於神位之側植矟於其後尊以犧象山罍各二饌以特牲皇帝服武弁羣臣戎服三獻其接神者皆如常祀瘞而不燎蕙田案以上俱以軒轅為所祭之神大學衍義補唐節度使辭日賜雙旌雙節立六纛入境築節樓迎以鼓角宋朝有六纛旌節門旗受賜藏之公宇私室號節堂朔望次日祭之號衙日葢有旌節則有神祀丘氏濬曰後世六纛之名與祀始見於此陳子昂禡牙文萬嵗通天二年三月朔日清邊道大總管建安郡王某敢以牲牢告軍牙之神盖先王作兵以討有罪姦慝竊命戎夷不龔則必肆諸朝市大戮原野我皇周子育萬國寵綏百蠻青雲干吕白環入貢久有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞宴安鴆毒作為欃槍天厭其凶國用致討皇帝命我肅将王誅今大軍已集吉辰叶應旄頭首建羽斾前列夷貊咸集将士聽誓方俟天休命為人殄災唯爾有神尚殱乃醜召太一㑹雷公翼白虎乗青龍星流彗掃永清朔裔使兵不血刃戎夏大同以昭我天子之徳允乃神之功豈非正直克明哉無縱世讎以作神羞唐栁宗元祭纛文惟年月日某官以牲牢之奠祭於纛神惟昔灃有大特化為巨梓秦人慿神乃建茸頭是為兵主用以行師漢中蚩尤亦作靈旗既類既禡指於有罪北面詔盟抗侯以射雖有古典今棄不用惟兹之制神實守祀有蠢黄孽保固虐人俾兹太平猶用戎律天子有威威施於下惟守臣某董衆撫師秉羽元刃出用兹日敢修外事爰薦求牛庶無留行以殄有罪國有祀典屬於神明傷夷大命無敢私顧惟克勝敵以全天兵去兹蟊賊達我涵育收厥隷圉役於校人海隅黎獻永底於理無或頓刃以為神恥獨孤及祭纛文年月日都統江淮之南節度觀察處置等使户部尚書李峘謹以少牢之奠致敬於六纛之神天地不仁神明無親惟徳是與若響之答敢有象龔滔天搆釁稱亂國有明罰神其舎諸賊劉展假寵多難敢包狼心竊發蠆毒将敷害於上下神祗使東溟揚波羣動昏墊皇帝震怒按劎受鉞命我上将底天之伐於是虎牙鷹揚之臣虵矛犀渠之羣横行而東我伐用張月羽雲旗以先啓行方将歴潯陽下南陵收京口掃建業斮梟獍以釁鼓俘鯨鯢為京觀俾萬里浪破三象霧廓今以令月吉辰釐駕即路是用邀福於爾有神敢告無靡旗無絓驂無汰輈無僨車命五将䕶野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不帥俾莫我敢遏為神祗羞宋史禮志禡師祭也軍前大旗曰牙師出必祭謂之禡後魏出師又建纛頭旗上太宗征河東出京前一日遣右贊善大夫潘慎修出郊用少牢一祭蚩尤禡牙遣著作佐郎李巨源即北郊望氣壇用香柳枝燈油乳粥酥蜜餅果祭北方天王蕙田案此分蚩尤禡牙為二文獻通考太平興國五年十一月太常禮院言車駕北征請出宫前一日遣官祭蚩尤及禡牙於地並用少牢祭北方天王於北郊迎氣壇從之仍遣内侍一人監祭宋史禮志咸平中詔太常禮院定禡儀所司除地為壇兩壝繚以青繩張幄帟置軍牙六纛位版版方七寸厚三分祭用剛日具饌牲用太牢以羊豕代其幣長一丈八尺軍牙以白六纛以皂都部署初獻副都部署亞獻部署三獻皆戎服清齋一宿将校陪位禮畢焚幣釁鼔以一牢蕙田案此不祭蚩尤遼史景宗本紀乾亨二年十月卒巳将南伐祭旗鼓聖宗本紀統和六年九月癸卯祭旗鼓元史憲宗本紀憲宗七年詔諸王出師征宋夏六月謁太祖行宫祭旗鼓明會典洪武元年詔定親征遣将諸禮儀以為古者天子親征則類於上帝造於祖宜於社禡於所征之地祭所過山川若遣将出師亦告於廟社禡祭旗纛而後行於是諸儒議上今牙旗六纛藏之内府其廟在山川壇每嵗仲秋祭山川日遣官祭於旗纛廟霜降日又祭於教塲至嵗暮享太廟日又祭於承天門外俱旗手衛指揮行禮禡祭儀一齋戒皇帝清齋一日大将陪祭官以下皆如之一省牲前期二日設皇帝大次於廟庭之東省牲位於南門外前一日導駕官同太常寺導駕詣大次皇帝服通天冠絳紗袍至省牲位廪犧令率其属牽牲自東西行過御前省訖牽詣神厨太常卿奏請詣神厨視鼎鑊滌溉訖遂烹牲駕還大次一陳設前一日執事設神案於廟殿中之北軍牙位東立纛位西設籩十有二於神位東三行西上豆十有二於神位西三行東上簠簋各二於籩豆間簠東簋西鉶三登三於籩豆前爼三於登鉶前香案於爼前爵坫於香案前沙池於爵坫前設酒尊所於廟庭東幣篚位於酒尊北爵洗位於尊南御洗位於爵洗南瘞坎於神位西北設席於坎位前上置酒并椀五雄雞五以俟酹神設御位於廟庭之南正中北向大将及陪祭官從後異等重行文東武西皆北向一正祭是日清晨建牙旗六纛於神位後旗東纛西皇帝服武弁服導駕官同太常卿導皇帝自左南門入就位贊禮唱迎神大樂作太常卿奏鞠躬樂作奏拜興拜興平身樂止傳贊同贊禮唱奠幣行初獻禮太常卿奏請詣盥洗位皇帝至盥洗位搢圭盥帨訖出圭請詣爵洗位搢圭執爵官以爵進受爵滌爵拭爵訖以授執爵官再進爵亦如之出圭請詣酒尊所搢圭執爵官以爵進受爵司尊者舉羃酌醴齊訖以授執爵官再進爵亦如之出圭請詣軍牙神位前爵幣前行皇帝陞廟壇樂作至神位前奏跪搢圭三上香奠幣三祭酒奠爵出圭樂止讀祝官跪讀祝於神右訖太常卿奏俯伏興樂作奏拜興拜興平身樂止請詣六纛神位前禮同復位亞獻終獻不奠帛讀祝餘皆如之訖贊禮唱飲福受胙太常卿奏詣飲福位奏鞠躬樂作奏拜興拜興平身樂止奏跪搢圭飲福受胙訖出圭奏俯伏興樂作奏拜興拜興平身樂止復位贊禮唱徹豆樂作掌祭官各徹豆樂止太常卿奏皇帝飲福受胙免拜贊禮唱陪祭官皆再拜傳贊訖贊禮唱送神太常卿奏鞠躬樂作奏拜興拜興平身樂止傳贊同贊禮唱望燎讀祝官取祝捧幣官取幣掌禮官取饌詣望燎所太常卿奏詣望燎位燎舉執事殺雞刺血於酒椀中酹神燎半太常卿奏禮畢仍同導駕官導引還大次内設爵洗位滌爵拭爵上香祭酒神前再拜賜胙免拜等儀後並省大政紀洪武元年十二月庚寅立旗纛廟明會典旗纛凡各處守禦官俱於公廨後築臺立旗纛廟設軍牙六旗纛神位春祭用驚蟄日秋祭用霜降日祭物用羊一豕一帛一白色祝一香燭酒果先期各官齋戒一日至日守禦長官武服行三獻禮若出師則取旗纛以祭班師則仍置於廟儀注與社稷同但瘞毛血望燎與風雲雷雨等神同仲秋祭儀洪武二十六年定霜降同一齋戒二日一省牲牛一羊一豕一陳設神七位南向旗頭大将六纛大将五方旗神主宰戰船正神金鼓角銃砲之神弓弩飛鎗飛石之神陣前陣後神祗五猖等衆犢一羊一豕一登一鉶二籩豆各十簠簋各二帛七黒二白五禮神制帛共設酒尊三爵三酒盞三十篚一於壇東南西向祝文案一於壇西一正祭贊引引獻官至盥洗所盥洗教坊司奏樂典儀唱執事官各司其事贊引贊就位典儀唱迎神樂作樂止贊引贊四拜陪祭官同典儀唱奠帛行初獻禮奏細樂執事捧帛爵進贊引引獻官詣神位前奠獻訖贊詣讀祝位贊跪樂止讀祝訖奏樂贊俯伏興平身贊復位樂止典儀唱行亞獻禮奏樂執事官捧爵贊引引獻官詣神位前獻訖樂止典儀唱行終獻禮儀同亞獻唱飲福受胙以下如常儀嵗暮祭儀一陳設羊一豕一果五爵三帛一朔望日祭旗神儀一陳設羊一豕一無帛一正祭贊引引獻官就位贊四拜贊初獻禮贊跪贊讀祝訖贊俯伏興平身贊亞獻禮贊終獻禮贊四拜贊詣焚祝所訖贊禮畢明史禮志旗纛之祭有四其一洪武元年禮官奏軍行旗纛所當祭者乃建廟於都督府治之後以都督為獻官題主曰軍牙之神六纛之神其二嵗暮享太廟日祭旗纛於承天門外其三旗纛廟在山川壇左初旗纛與太嵗諸神合祭於城南九年别建廟每嵗仲秋天子躬祀山川之日遣旗手衛官行禮其正祭旗頭大将六纛大将五方旗神主宰戰船正神金鼓角銃礟之神弓弩飛鎗飛石之神陣前陣後神祗五猖等衆凡七位共一壇南向皇帝服皮弁御奉天殿降香獻官奉以從事祭物祀先農帛七黒二白五瘞毛血望燎與風雲雷雨諸神同祭畢設酒器六於地刺雄雞六瀝血以釁之其四永樂後有神旗之祭専祭火雷之神每月朔望神機營提督官祭於教塲牲用少牢凡旗纛皆藏内府祭則設之王國祭旗纛則遣武官戎服行禮天下衛所於公署後立廟以指揮使為初獻官僚屬為亞獻終獻儀物殺京都大政紀永樂八年二月以親征祓於承天門遣官祭太嵗旗纛等神八月丁未遣官祭旗纛春明夢餘録旗纛廟建於太嵗殿之東永樂建規制如南京明會典世宗嘉靖十八年南巡遣官祭旗纛之神用牲醴制帛三獻如常儀蕙田案以上俱祭旗纛又案禡或云蔡黄帝或云祭蚩尤鄭康成概以為祭造軍法者似二説皆通矣但明季氏本謂黄帝聖人蚩尤敢與拒戰逆臣也何得與于祭其理甚正核而論之當以祭黄帝為是隋唐皆専祭黄帝可謂得祀典之正者乃後世復有變而以旗纛之祭為禡祭者不知其説之何所據太白隂經曰大将軍中營建旗纛天子六軍故用六纛以旄牛尾為之在左驂馬首不言其有祭黄帝出軍訣曰牙旗者将軍之精一軍之形候凡始豎牙必祭以剛日亦未嘗以此為禡祭惟晉顧愷之文始以黄帝蚩尤與牙合而為一考史記裴駰集解引皇覽曰蚩尤冢在東平郡夀張縣闞鄉城中髙七丈民常十月祀之有赤氣出如匹絳帛民名為蚩尤旗此則其説之所自起歟夫以祭造軍法之人而變而祭牙旗又因旗神而及太乙五兵又或兼祭蚩尤與旗神紛紛之制皆非古也今並列之以備擇又禡有三出征而禡一也田獵而禡二也無事而禡三也丘瓊山曰至所征之地而既有其祭則無事之時必有其祠可知矣今以無事之禡類附于此而田獵之禡另入田獵一門右禡禮記王制天子将出征受命于祖注告祖也蕙田案孔疏謂受命于祖受成于學其禮在類宜造禡之前于經文次序既不合且康成亦無明説疏文並無確據不可從書泰誓予小子受命文考以爾有衆底天之罰春秋隠公十一年左氏傳鄭伯将伐許五月甲辰授兵于大宫注魯鄭共謀伐許授兵賦車馬也大宫鄭祖廟也盖授兵車于祖廟也凡出師必告于祖廟而奉遷廟之主以行蕙田案既已造禰又必受命于祖禮似近於煩數葢古人出師必載遷廟之主僅造于禰未得奉遷廟主也禰至親也遷廟主則至尊也出師大事宜臨之以尊不特豐于昵而已又案此諸侯告祖廟禮諸侯禮考之於經不具故不另列隋書禮儀志皇太子及大将出師則以豭豚一釁鼓告廟受斧鉞訖不得反宿于家開皇八年晉王廣将伐陳内史令李徳林攝太尉告于太祖廟髙祖本紀開皇八年冬十月甲子将伐陳有事于太廟命晉王廣秦王俊清河公楊素並為行軍元帥以伐陳十一月丁卯車駕餞師乙亥行幸定城陳師誓衆遼史禮志将出師必先告廟乃立三神主祭之曰先帝曰道路曰軍旅蕙田案受命于祖之禮後世鮮行之者葢與造祭混而為一略採一二事以見其概右受命於祖禮記王制天子将出征受成于學注定兵謀也在疏受成于學者謂學謀論兵事好惡可否其謀成定受此成定之謀在于學裏故云受成于學蕙田案類宜造禡告廟告學之次第見于王制差為可據而諸家之説參差不一孔叢子問軍禮篇先宜社次受成于學次類上帝隋禮儀志先宜社次類上帝次禡通典載北齊之制先造廟次宜社次類上帝次禡皆與王制不合今一以王制為定司馬法先後之次與王制略同司馬法乃古書班史入之周禮之後可信也又案受成于學之禮後世亦不行右受成於學五禮通考卷二百三十七
