body:
  text: 五禮通考卷五十四刑部尚書秦蕙田撰吉禮五十四六宗蕙田案陽祀自煙始曰禋祀隂祀自血始曰血祭六宗稱禋則陽祀天神之屬也但不知何神自漢諸儒已經聚訟立一説即有一難迄今未定今檢諸儒解説不同凡十六條每條先列本説次列論難之説案而不斷俟明者擇焉虞書舜典禋于六宗孔叢子宰我問禋于六宗孔子曰所宗者六埋少牢于泰昭祭時也祖迎于坎壇祭寒暑也至于王宫祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔傳精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也祭亦以攝告孔疏國語云精意以享禋也釋詁云禋祭也孫炎曰禋潔敬之祭也周禮大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師鄭云禋之言煙周人尚臭煙氣之臭聞者也鄭以禋祀之文在燎柴之上故以禋為此解耳而洛誥云秬鬯二卣曰明禋又曰禋于文王武王又曰王賓殺禋咸格經傳之文此類多矣非燔柴祭之也知禋是精誠潔敬之名耳宗之為尊常訓也名曰六宗明是所尊祭者有六但不知六者為何神耳祭法云埋少牢於太昭祭時相近於坎壇祭寒暑王宫祭日夜明祭月幽禜祭星雩禜祭水旱也據此言六宗彼祭六神故傳以彼六神謂此六宗必謂彼之所祭是此六宗者彼文上有祭天祭地下有山谷丘陵此六宗之文在上帝之下山川之上二者次第相類故知是此六宗王肅亦引彼文乃云禋于六宗此之謂矣鄭玄注彼云四時謂隂陽之神也然則隂陽寒暑水旱各自有神此言禋于六宗則六宗常禮也禮無此文不知以何時祀之鄭以彼皆為祈禱之祭則不可用鄭玄注以解此傳也漢世以來説六宗者多矣歐陽及大小夏侯説尚書皆云所祭者六上不謂天下不謂地旁不及四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗謂乾坤六子水火雷風山澤也賈逵以為六宗者天宗三日月星辰地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此其謂六也鄭玄以六宗言禋與祭天同名則六者皆是天之神祇謂星辰司中司命風師雨師星謂五緯也辰謂日月所會十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉初幽州秀才張髦上表云臣謂禋于六宗祀祖考所尊者六三昭三穆是也司馬彪又上表云歷難諸家及自言己意天宗者日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗四時五帝之屬惟王肅據家語六宗與孔同各言其志未知孰是司馬彪續漢書云安帝元初六年立六宗祠於洛陽城西北亥地祀比大社魏亦因之晉初荀顗定新祀以六宗之神諸説不同廢之摯虞駁之謂宜依舊近代以來皆不立六宗之祠也蔡傳禋精意以享之謂宗尊也所尊祭者其祀有六祭法曰埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也朱子語録問六宗曰古注説得自好鄭氏宗讀為禜即祭法中所謂祭時祭寒暑祭日祭月祭星祭水旱者如此説則先祭上帝次禋六宗次望山川然後遍羣神次序皆順蘇氏軾曰此之禋六宗望山川遍羣神蓋與類上帝為一禮爾考之祭法其泰壇祭天即此類上帝也祭時寒暑日月星水旱即此禋六宗也四坎壇祭四方與山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神即此望山川遍羣神也祭法所敘舜典之章句義疏也楊氏復曰六宗之義其最有據而得其正者孔安國之説是也其傳曰所尊祭者其祀有六謂四時也寒暑也日也月也星辰也水旱也可謂善也而司馬彪亦曲説以駁之王肅所解本諸家語與安國同而肅對魏明又以為乾坤六子則自叛其説矣據孔傳唯引祭法殊不知安國所據不獨祭法也謹案孔叢子書載宰我問於孔子曰禋于六宗何謂也孔子曰所宗者六皆潔祭之也埋少牢於泰昭所以祭時也祖迎於坎壇所以祭寒暑也主於郊宫所以祭日也夜明所以祭月也幽禜所以祭星也雩禜所以祭水旱也禋于六宗此之謂也安國之傳端本於此諸儒之説紛紛不已皆不見孔子之言故也劉氏昭曰孔叢子之言若果是夫子所説則後儒無復紛然正謂未必然耳續漢志注司馬氏彪駁曰安國案祭法為宗而除其天地於上遺其四方於下取其中以為六宗四時寒暑日月衆星并水旱所宗者八非但六也傳曰山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之又曰龍見而雩如此禜者祀日月星辰山川之名雩者周人四月祭天求雨之稱也雪霜之災非夫禜之所禳雩祭之禮非正月之所祈周人之後説有虞之典故於學者未盡喻也羅氏泌路史郊之祭也大報天而主日配以月則日月在郊而不在宗矣冬享司寒而四立各自迎氣則四時寒暑不在宗矣此孔之失也安國之説出於祭法而附於孔叢子家語因之蓋孔氏之家世有是説故王充蘇軾一皆從之亦未敢以為安也楊氏復曰孔注禋於六宗取祭法之説王肅亦同朱子書説非苟從者亦取祭法為宗必有深意但鄭玄注祭法改相近為祈禳又以六者皆為祈禱之祭夫舜乃攝位告祭安得有祈禳之禮哉稗編唐氏順之曰六宗出於虞書周禮則無明文惟孔叢子以祭法祭時祭寒暑祭日祭月祭星祭水旱為六宗孔安國因之王肅之説亦同朱子書説亦取焉三山楊信齋之説足以破之若以此祭為常祀則非也夫舜類于上帝望于山川遍于羣神所以告攝位也告攝位於天地山川羣神足矣何必告於四時寒暑水旱哉先儒以家語為漢儒附會觀於此類信矣孔安國王子雍祖述其説亦不足怪朱子取之何也楊信齋述祭禮一書足以為不刋之典既疑之復以為朱子取之必有深意又何也王氏樵尚書日記孔安國據祭法王肅據家語以四時寒暑日月星水旱六者之祭當之此視家語差為有據然鄭玄以彼皆為祈禱之祭因事而行今告攝須有六宗常禮何為祭及水旱哉是亦未得為定論也蔡氏德晉曰漢孔氏書傳云謂四時也寒暑也日也月也星也水旱也魏王子雍亦同九峰先生書傳因之此本於祭法及孔叢子二書皆漢人所作孔叢子非真孔子語祭法非古先聖王之典不足據也且祭法原文上有祭天祭地下有祭四方祭百神而截取中間六者以為六宗亦屬牽強况司暑無過赤帝炎帝祝融司寒無過黑帝顓頊玄冥此即四時耳水旱乃雩禜之祭靡神不舉非有専司舜自以攝位告祭何關水旱也蕙田案以上孔安國用祭法之説馬氏融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也尚書大傳同梁博士崔氏靈恩三禮義宗伏生馬融謂六宗者天地四方所以用天地四方為六宗者萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏皆有功於民故尊而祭之謂之六宗而或有非之者以前文有類于上帝今復謂天為類六宗無天地意謂其在天地四方生成道廣濟物既洪故報亦非一或類或宗尤未盡其功豈有嫌前已祀而謂後為非也然迎春既祭蒼帝靈威仰之神而復郊祭豈可復以迎春祭天而嫌郊為非天也通典杜氏曰馬融以天地四時為六宗禮無禋地與四時之義司馬氏彪駁曰帝在于類則禋者非天伏失其義蔡氏德晉曰古者祀帝于郊祭社于國社稷宗廟同在王宫中門之內舜格文祖則告宗廟必告社稷而類上帝則已告天不宜復數天地也蕙田案以上馬融天地四時之説歐陽氏和伯夏侯氏建曰六宗上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗矣李氏郃曰六宗者上不及天下不及地旁不及四方在六合之中助隂陽化成萬物唐氏順之稗編許謹非之曰處六合之間謂之六宗其實為一而名六宗虛實相互何以為義意謂本義以六宗之中合共尊祭故謂之六者明其在六之中間為人所宗非名宗為六不可責其稱六者非實是一之名也司馬氏彪駁曰六合之間非制典所及六宗之數非一位之名隂陽之説又非義也蔡氏德晉曰於天地四方之間懸空立一祭正恐無是神而近於誣蕙田案以上歐陽夏侯天地四方之間之説劉氏歆曰六宗謂乾坤六子水火雷風山澤朝錯孔光王莽顔師古同唐氏順之稗編孔光劉歆謂六宗者乾坤之六子取水火雷風山澤能生萬物故禋祀以報之謂之六宗馬昭難云凡八卦者所以生育萬物若祭卦便應祭八卦豈但祭六明非六卦也意謂劉孔之意所以但祭六者以為非子不能成父之業故生物之功由于六子合據成功而報故舍乾坤而不祭也通典杜氏曰漢以王莽等奏日月星辰山川海澤六子之卦為六宗者案周禮以實柴祀日月星辰則星辰非六宗矣卦是物象不應祭之蕙田案以上劉歆乾坤六子之説賈氏逵曰六宗謂天宗三日月星地宗三河海岱許慎同五經典義曰古尚書説六宗者天地屬神之尊者謂天宗三地宗三天宗日月北辰也地宗岱山河海也日月為隂陽宗北辰為星宗岱為山宗河為水宗海為澤宗也祀天則天文從祀地則地理從也賈疏鄭駁之云書云類于上帝禋于六宗望于山川既六宗云禋山川言望則六宗無山川明矣司馬氏彪駁曰山川屬望則海岱非宗宗猶包山則望何秩焉歆逵失其義也黃氏鎮成曰謂是山澤河海之類則望于山川又在六宗之外皆不可據蕙田案以上賈逵天宗三地宗三之説鄭氏康成曰六宗言禋與祭天同名則六者皆是天之神祗謂星辰司中司命風師雨師星五緯也辰十二次也司中司命文昌第五第四星也風師箕也雨師畢也唐氏順之稗編鄭云宗者星辰司中司命風師雨師此謂六宗也王肅難云星則五緯之星合為一位辰則十二月之會次又合為一位名實不相副也司中司命文昌第五第四星而别為兩位文昌之星獨分為二五緯之星所主各異合而為一義則不安尋鄭本意以五星十二次各共成功故各合為一司中司命所司有一不共成功故分為二王肅六宗亦以四時共成嵗功得合為一宗鄭以十二次五星各共成歲則何以不得各合為一王此難無通義也司馬氏彪駁曰并五緯以為一分文昌以為二箕畢既屬於辰風師雨師復特為位玄之失也范氏寧曰考觀衆議各有説難鄭氏證據最詳是以附之通典杜氏曰鄭玄以司中司命風師雨師為六宗者並是星質不應更立風師雨師之位羅氏泌路史宗之為言總也司中司命實係文昌而好風好雨乃是箕畢以總而言是特一宗耳豈得有實柴復曰槱燎哉此鄭之失也蔡氏德晉曰鄭康成本大宗伯之文俱以天神釋之是矣然以為星辰司中司命風師雨師而不數日月於理未安蕙田案以上鄭康成星辰司中司命風師雨師之説幽州秀才張氏髦上疏曰禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也書集傳孫氏曰類上帝祀天神也禋六宗享人鬼也望山川祭地祗也王氏曰天子事七廟于地不言大示于人不言太祖于天不言日月星辰以地示人鬼之及六宗山川則天神之及日月星辰可知也以天帝之及上帝則人鬼地示之及太祖大示亦可知也於天則舉尊以見卑於人於地則舉卑以見尊程子吕東萊同朱子語録問五峰取張髦之説如何先生曰非唯用改易經文兼之古者昭穆不盡稱宗唯祖有功宗有德故曰祖文王而宗武王且如西漢之廟惟文帝稱太宗武帝稱世宗至唐朝乃盡稱宗此不可以為據林氏之竒曰三昭三穆然愚亦知其不然者蓋七世之廟自太祖而下謂之六宗則不可古者祖有功宗有德必有德者而宗之如云周之六宗是也若以三昭三穆為六宗則七世之廟皆宗古無是理也而蘇氏謂受終之初既有事於文祖其勢必及餘廟豈有獨祭文祖於齊七政之前而祭餘廟于類上帝之後者乎以此觀之則張髦之説雖近似不可從也羅氏泌路史三昭三穆前人如程皓王安石輩多取以為祭人鬼然昭穆非宗也夫祭有其舉之莫敢廢也三昭三穆世何嘗廢祀此固不必議者且七政既齊之後則唯及天神又曷有文祖有事於在璣衡之前而後於餘廟哉王氏樵曰晉張髦以六宗為三昭三穆受終之初既有事於文祖勢必及餘廟然古者昭穆不盡稱宗惟祖有功宗有德故商有三宗周人祖文王而宗武王下至漢世猶止文帝稱太宗武帝稱世宗至唐乃盡稱宗此豈可以為據哉蕙田案以上張髦三昭三穆之説虞氏喜别論曰地有五色大社象之總五為一則成六六為地數推案經句缺無地祭則祭地劉氏昭曰虞喜以祭地近得其實而分彼五色合五為六又不通禋更成疑昧稗編唐氏順之曰舜攝位告祭類于上帝及望于山川遍于羣神矣惟不告祭于地祇意六宗為地祇也蓋六為地數宗尊也且序其次地祇正當在上帝之後山川羣神之上斯説豈不正大耶周禮大宗伯王大封則先告后土大封猶且告后土攝位為天子安得不告地也晉虞喜别論蓋謂此也但喜謂地有五色大社象之其總五為一成六為地數涉於鑿耳劉昭亦以為喜説近得其實豫亦云昭以虞書所稱肆類于上帝是祭天不言天而曰上帝帝是天神之極舉帝則天帝斯盡日月星辰從可知也禋于六宗是祭地不言地而言六宗六是地數之中舉中以該社稷等配從可知也其説似好謂帝能該日月星辰則可謂舉地數之中以該社稷等配則不可望于山川豈非地乎即如其説若重復矣但以地數六為六宗自明何必穿鑿如是蕙田案以上虞喜六為地數之説司馬氏彪曰春官大宗伯之職掌玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗四時五帝之屬也如此則羣神咸秩而無廢百禮遍修而不瀆於理為通王氏樵曰司馬彪言天宗者日月星辰寒暑之屬也地宗者社稷五祀之屬也四方之宗四時五帝之屬也案月令孟春祈榖於上帝孟冬祈來年於天宗是天宗明有其文但所稱數者之屬則未見的有所據耳蔡氏德晉曰司馬彪以天地四方之神皆統於六宗更浮遊而無當蕙田案以上司馬彪天宗地宗四方宗之説孟氏康曰六宗天地間遊神也羅氏泌路史太元曰神遊乎六宗蓋指六合非主於祭而言孟康蓋因此曽何取哉蕙田案以上孟康遊神之説摯氏虞新禮儀曰萬物負隂抱陽本於太極六宗者太極中和之氣六氣之宗也劉邵同通典杜氏曰魏劉邵以沖和之氣六氣之宗者氣先於天不合禋天之下氣從天有則屬隂陽若無所受何以宗之蕙田案以上摯虞六氣之宗之説魏孝文帝曰書言上帝六宗其文相屬上帝稱肆而不禋六宗言禋而不别其名理是一事六宗非别祭之名肆類非獨祭之見且禋非祀地之用是祭帝之事故稱禋以别之蓋六宗一祭也而今圜丘五帝在焉乃詔祭天皇大帝及五帝於郊壇總為一位通典杜氏曰後魏孝文帝以天皇大帝五帝為六宗於義為當何者案周禮以禋祀祀昊天上帝則禋祀在祀天不屬别神又司服云祀昊天上帝大裘而冕祀五帝亦如之昊天五帝乃百神之尊宗之義也或難曰書既云類上帝何更言祀者此敘巡守祀禮之次矣將出征肆類也禋宗遍祀六天也何以肆類之文而迷郊祀之禮乎羅氏泌路史六天之説本出漢世源於緯侯而成於康成然魏氏以昊天上帝為首則又非矣佑之所以取之蓋以昊天上帝周用禋祀而祀昊天上帝大裘而冕五帝如之則禋不屬於别祀不知先王禮典莫有重舉上帝既已肆類豈復禋乎佑抑不知漢之所祀自是泰乙故曰泰乙者天神之最貴其佐為五帝是則非昊天矣蕙田案以上通典六天之説張氏迪曰六宗六代帝王也通典杜氏曰張迪以六代帝王為六宗並不堪録羅氏泌路史張迪虞喜一無所據曽何取哉蕙田案以上張迪六代帝王之説羅氏泌路史宗亦祀之尊也伯夷典天地人之三禮而曰秩宗周官主祀大神祗而曰宗伯大宗小宗族之尊也老子曰萬物之宗言萬物莫不尊也莊周曰天地為宗故禮有天宗則亦有地宗矣天宗者萬象之宗雲漢虹霓雷電雪霜風雨氛祲之屬非必日月星辰而地宗者萬類之宗也土石金榖草木毛羽鱗介之屬非必主於山川求之於傳又有河岱之宗河宗則萬水之宗謂淵泉溪沼藪岸灘濤之屬非主於山川四瀆而岱宗則萬山之宗也謂岡巒陵谷阿隴原隰之屬非主於五嶽九山也凡此皆微小族類祀所不該故以大為宗而總祭之如夷蠻戎狄之總名曰人爾王者事天明事地察故於地而加詳是四宗者所以及乎其不及而已矣然則幽宗雩宗其不在六宗乎日月既主於郊四時寒暑復各屬於嵗惟星一類實繁猶之在地之山而水旱者隂陽之極數民事之尤切故二者自為宗或曰六宗云禋山川云望則山川在望不在禋矣是故禮無禋地之文是不然禋者蠲精之名爾大傳作煙則事止燔燎然劉昭曰堙則及於瘞埋矣且古書曰六宗者天地屬神之尊也奚為而不併地如曰不然則安國之説庶乎其次矣他不足稽也且將從孔説則必上自類帝至於羣神合以為一而又升五帝於肆類而不禋于六宗禋日月於六宗而不與於郊類斯可矣何則郊祀而及於天地間之神古蓋有矣燔太壇瘞太圻此則似乎類帝而合食矣泰昭祭時坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱此則似乎六宗矣四時寒暑雖别有祭於此又合而享之未大害郊既主日則日月決不可下齊乎六宗星為幽宗水旱為雩宗此自二類鄭改宗為禜踈矣坎壇以祭四方而又遍祭於百神山林川谷丘陵能出雲為風雨見怪物者此則合乎山川與羣神矣四方非山川林谷丘陵又未盡於百神此漢儒以意求之是以漢世泰壇其中而五帝環其下以求當乎六宗而復壇設羣神以求合乎書之文是則禋類百神合之以為一也山川惟不望知遍走其地矣望者遙祭爾以山髙可望而祭之川曰望者本山而言之漢嶽瀆各祠其處然不望則非也王肅治家語而輒自異之必有其説矣噫多言奚為後世必有堯舜文王周孔者出不由羣惑一斷以義則六宗之秩正矣於豫與何有蕙田案此雜取莊周尚書祭法湊成六宗恐亦臆説又案以上羅泌天宗地宗河宗岱宗幽宗雩宗之説黃氏度曰鄭康成據周禮實柴祀日月星辰槱燎祀司中司命風師雨師也是皆天神故稱宗月令祈年於天宗是也然去日月恐不可或曰日一月二星三辰四司中司命五風師雨師六此恐當是蕙田案此用鄭氏之説而小變之據鄭氏司中司命為文昌第五第四星風師雨師為箕畢二星則已統在星宗內未見其的又案以上黃氏日月星辰四宗司中司命風師雨師二宗之説蔡氏德晉曰虞書禋於六宗在格文祖類上帝之後望山川遍羣神之前所謂六宗者何也月令季冬乃祈來年於天宗周官大宗伯以禋祀祀昊天上帝則知宗為天神禋為祀天神矣蓋天神之祀不外乎大宗伯以禋祀祀昊天上帝以燔柴祀日月星辰以槱燎祀司中司命風師雨師之三言言司中司命以該司民司祿諸星言風師雨師以該軒轅雷電霹靂諸星皆於經星中抽出言之是三言者實二言已該也故虞之類上帝即祀昊天上帝也禋六宗即祀日月星辰也日月星辰謂之六宗者日一月二緯星三經星四五辰五十二辰六也緯星即五星經星則二十八宿衆星之屬也辰者天之壤五辰即五方之帝十二辰則日月所會十二次也此不必附會傳記之文而以理揆之庶乎其不逺者矣蕙田案此以星辰各分為二實止四宗耳亦未安又案以上蔡氏日月二宗星辰四宗之説周官大宗伯以實柴祀日月星辰以槱燎祀司中司命風師雨師賈疏此經星辰與司中司命風師雨師鄭君以為六宗案尚書堯典禋于六宗但六宗之義有其數無其名故先儒各以意説鄭君則以此星也辰也司中也司命也風師也雨師也六者為六宗案異義今歐陽夏侯説六宗者上不及天下不及人傍不及四時居中央恍惚無有神助隂陽變化有益於人故郊祭之古尚書説六宗天地神之尊者謂天宗三地宗三天宗日月星辰地宗岱山河海日月屬隂陽宗北辰為星宗岱為山宗河為水宗海為澤宗祀天則天文從祀祀地則地理從祀謹案夏侯歐陽説云宗實一而有六名實不相應春秋魯郊祭三望言郊天日月星河海岱凡六宗魯下天子不祭日月星但祭其分野星其中山川故言三望六宗與古尚書説同元之聞也書曰肆類于上帝禋于六宗望于山川遍于羣神此四物之類也禋也望也遍也所祭之神各異六宗言禋山川言望則六宗無山川明矣周禮大宗伯曰以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師凡此所祭皆天神也禮記郊特牲曰郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭于其質也祭義曰郊之祭也大報天而主日配以月則郊祭并祭日月可知其餘星也辰也司中司命風師雨師此之謂六宗亦自明矣禮論王莽時劉歆孔光以為易震巽等六子之卦為六宗漢武即位依虞書禋于六宗禮用大社至魏明帝時詔令王肅議六宗取家語宰我問六宗孔子曰所宗者六埋少牢於泰昭祭時相近於坎壇祭寒暑王宫祭日夜明祭月幽禜祭星雩禜祭水旱孔安國注尚書與此同張融許從鄭君於義為允案月令孟冬云祈來年於天宗鄭云天宗日月星辰若然星辰入天宗又入六宗其日月入天宗即不入六宗之數也以其祭天主日配以月日月既尊如是故不得入宗也楊氏復曰諸儒説六宗異同如此愚案舜典類于上帝禋于六宗望于山川六宗在上帝之後山川之前其禮甚重因諸家之説不同而遂廢惜哉先君泉南先生曰虞書六宗之説自漢以來紛然不一矣其説似屬近理而未有的據者皆不具論惟孔氏據祭法以四時寒暑日月星水旱當之較為有據故蔡氏解經全用其説至今遵之而鄭康成以為彼皆祈禱之祭因事而行告攝宜有常禮何為祭及水旱殊不知三代以前初無非禮之祭所得禱祈者莫非常所當祭之神非若秦漢以後有荒唐不經之祀也告攝之時既祀上帝以及羣神靡所不祭豈獨舍其祈禱之所祭乎况水旱尚可専屬祈禱四時日月星則何祈禱之有是鄭氏所駁亦未為至當也惟是安國所據者祭法也案祭法自天地而下則云泰昭祭四時相近於坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱也四坎壇祭四方有山林川谷風雨百神之語今以天地屬之肆類山川而下屬之山川羣神是矣而自四時以至四方其類尚有七今存其六以配六宗微不能無疑然自漢及今其説之有據而當於理要無過於孔氏者雖有毫髮之疑亦當存之以俟論定而不敢以意為附會也觀承案六宗之説自漢以下最著者十有二家要以孔安國所據為不刋司馬彪謂周禮無六宗之兆禮記無六宗之文而直欲廢之此固大謬也若夫伏生以天地四時為六宗而馬融從之然舉首及天已上復類帝孔光劉歆以水火雷風山澤為六宗而魏晉間多從之然六子皆象既虛而無質而山澤之下侵又無論也賈逵以天宗三地宗三為六而許謹從之然地宗之三則全逼山川矣晉虞喜謂地有五色大社象之總五為一則成六而劉昭從之然地示當祭而曰禋其非大社可知後魏文帝更以天皇大帝及五帝為六宗而通典從之然除大帝則是五宗連大帝則是類帝何别云禋宗哉此五説者以本文上下核之而皆拂戾者也乃張迪之説則以六代帝王為六宗夫禋宗皆天神之屬忽移而之人與張髦以宗廟三昭三穆為六宗者略同此二説者就文斷之而已知其非也歐陽和伯大小夏侯則謂上不及天下不及地旁不及四方在六者之間助隂陽變化萬物者為六宗此即孟康天地間遊神之説也固已荒誕而不經劉邵謂太極沖和之氣六氣宗之此即摯虞六氣之宗之説也益復幽渺而無據矣此二説直如一説而不足道也乃彪既歷難諸家及自言己意仍用賈氏天宗地宗而益以四方宗為六亦即歐陽夏侯六者之間之意而小變之顧彼意其內而此揣其外為更劣耳鄭康成則以星辰司中司命風師雨師為六宗雖孔頴達是之然必推配日月以包于類帝而後割截星辰以合為六終屬牽勉而已是皆曲為之説而不免得此失彼者耳惟安國之説本於家語宰我問六宗而孔子以祭時祭寒暑祭日祭月祭星祭水旱六者告之則顯有證據或謂此説亦見孔叢然禮記祭法正與此合先以祭天地明類上帝之義下以四方山川百神明望山川遍羣神之義中間恰好詳陳此六者直是虞書禋六宗之義疏也四方即四望其復何所疑議哉至如盧植舊説以祈來年於天宗為六宗及羅泌等更以天宗地宗岱宗海宗讀幽宗雩宗為本字而成六宗者其亦不攻而自破矣蕙田案以上總論右禋六宗文獻通考漢興於甘泉汾隂立壇禋六宗平帝時王莽奏祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火相逮雷風不相悖山澤通氣然後能變化既成萬物也日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆謹與太師光等議易曰方以類聚物以羣分羣神以類相從為五部兆天墬之别神中央帝黃靈后土畤及日廟北辰北斗鎮星中宿中宫于長安城之未墬兆東方帝太昊青靈勾芒畤及雷公風伯廟嵗星東宿東宫於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宫於南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宫於西郊兆北方顓頊黑靈玄冥畤及月廟雨師廟辰星北宿北宫於北郊奏可於是長安旁諸廟畤甚盛矣馬氏曰王莽既以六子為六宗矣然所謂羣神以類相從為五部兆則日月雷風皆祠之而不及山澤何也後漢書祭祀志安帝即位元初六年以尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者為非是三月庚辰初更立六宗祀於雒陽西北戌亥之地禮比太社也注月令孟冬祈來年於天宗盧植注曰天宗六宗之神李氏家書曰司空李郃侍祠南郊不見六宗祠奏曰案尚書肆類于上帝禋于六宗六宗者上不及天下不及地傍不及四方在六合之中助隂陽化成萬物漢初甘泉汾隂祀天地亦禋六宗孝成之時匡衡奏立南北郊祀復祀六宗及王莽謂六宗易六子也建武都雒陽制祀不道祭六宗由是廢不血食今宜復舊制度制曰下公卿議五官將行𢎞等三十一人議可祭大鴻臚龎雄等二十四人議不當祭上從郃議由是遂祭六宗六宗之議自伏生及乎後代各有不同今並抄集以證其論云虞書曰肆類於上帝禋于六宗望于山川伏生馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也歐陽和伯夏侯建曰六宗上不謂天下不謂地傍不謂四方在六者之間助隂陽變化者也孔安國曰精意以享謂之禋宗尊也所尊祭其祀有六埋少牢於太昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔叢曰宰我問六宗於夫子夫子答如安國之説臣昭以此解若果是夫子所説則後儒無復紛然文秉案劉歆曰六宗謂水火雷風山澤也賈逵曰六宗謂日宗月宗星宗岱宗海宗河宗也鄭玄曰六宗星辰司中司命風師雨師也星五緯也辰謂日月所會十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉武帝時司馬紹統表駁之并五緯以為一分文昌以為二箕畢既屬於辰風師雨師復特為位玄之失也案周禮云昊天上帝日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物又曰兆五帝于四郊四類四望亦如之無六宗之兆祭法云祭天祭地祭時祭寒暑日月星祭水旱祭四方及山林川谷丘陵能出雲為風雨見怪物皆是有天下者祭百神非此族也不在祀典復無六宗之文明六宗所禋即祭法之所及周禮之所祀即虞書之所宗不宜特復立六宗之祀也幽州秀才張髦又上疏曰禋于六宗禮祖考所尊者六也何以考之周禮及禮記王制天子將出類于上帝宜于社造于禰巡狩四方覲諸侯歸格于祖禰用特舜典亦曰肆類于上帝禋于六宗望于山川遍于羣神班瑞于羣后肆覲東后協時月正日同律度量衡巡狩一嵗以周爾乃歸格于藝祖用特臣以尚書與禮王制同事一義符契相合禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若如十家之説既各異義上下違背且沒乎祖之禮考之禮考之祀典尊卑失序若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也禮記曰夫政必本於天殽以降命命降於社之謂殽地降於祖廟之謂仁義降於山川之謂興作降於五祀之謂制度又曰祭天於郊所以定天位也祀社於國所以列地利也祭祖於廟所以本仁也山川所以儐鬼神也五祀所以本事也又曰禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故自郊社祖廟五祀義之修而禮之藏也凡此皆孔子所以祖述堯舜紀三代之教著在祀典首尾相證皆先天地次祖宗而後山川羣神耳故禮祭法曰七代之所更變者禘郊祖宗明舜受終文祖之廟察璇璣考七政審已天命之定遂上郊廟當義合堯典則周公其人也郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭者也居其位攝其事郊天地供羣神之禮巡狩天下而遺其祖宗恐非有虞之志也五嶽視三公四瀆視諸侯皆以案先儒之説而以水旱風雨先五嶽四瀆從祖考而次上帝錯於肆類而亂祀典臣以十一家皆非也太學博士吳商以為禋之言煙也三祭皆積柴而實牲體焉以升煙而報陽非祭宗廟之名也鄭所以不從諸儒之説者將欲據周禮禋祀皆天神也日月星辰司中司命風師雨師凡八而日月並從郊故其餘為六宗也以書禋於六宗與周禮事相符故據以為説也且文昌雖有大體而星名異其目不同故隨事祭之而言文昌七星不得偏祭其第四第五此為周禮復不知文昌之體而又妄引為司中司命箕畢二星既不係於辰且同是隨事而祭之例又無嫌於所係者范寧注虞書曰考觀衆議各有説難鄭氏證據最詳是以附之案六宗衆議未知孰是虞喜别論云地有五色太社象之總五為一則成六六為地數推案經句缺無地祭則祭地臣昭曰六宗紛紜衆釋互起竟無全通亦難偏折歷辨碩儒終未挺證康成見宗是多附焉盍各爾志宣尼所許顯其一説亦何傷乎竊以為祭祀之敬莫大天地虞典首載彌久彌盛此宜學者各盡所求臣昭謂虞喜以祭地近得其實而分彼五色合五為六又不通禋更成疑昧尋虞書所稱肆類於上帝是祭天天不言天而曰上帝帝是天神之極舉帝則天神斯盡日月星辰從可知也禋于六宗是實祭地地不言地而曰六宗六是地數之中舉中足以該數社稷等配從可知也天神稱上地表數中仰觀俯察所以為異宗者崇尊之稱斯亦盡敬之謂也禋也者埋祭之言也實瘞埋之異稱非周煙之祭也夫製字涉神必以今之示今之示即古之神所以社稷諸字莫不以神為體虞書不同祀名斯隔周禮改煙音形兩異虞書改土正元祭義此焉非疑以為可了豈六置宗便為傍祭乎風俗通曰周禮以為槱燎祀司中司命文昌上六星也槱者積薪燔柴也今民猶祠司命耳刻木長尺二寸為人像行者置篋中居者别作小居齊地大尊重之汝南諸郡亦多有者皆祠以豬率以春秋之月文獻通考魏明帝立六宗祀六子之卦帝疑其事以問王肅肅以為六宗之卦故不廢景初二年改祀太極中和之氣時散騎常侍劉劭言萬物負隂而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗也時從其議晉初罷其祀後復立六宗因魏舊事晉書禮志尚書禋于六宗諸儒互説往往不同王莽以易六子遂立六宗祠魏明帝時疑其事以問王肅亦以為易六子故不廢及晉受命司馬彪等表六宗之祀不應特新禮於是遂罷其祀其後摯虞奏之又以為案舜受終類於上帝禋於六宗望于山川則六宗非上帝之神又非山川之靈也周禮肆師職曰用牲於社宗黨正職曰春秋祭禜亦如之肆師之宗與社並列則班與社同也黨正之宗文不繫社則神與社異也周之命祀莫重郊社宗同於社則貴神明矣又月令孟冬祈於天宗則周禮祭月令天宗六宗之神也漢光武即位髙邑依虞書禋于六宗安帝元初中立祀乾位禮同太社魏氏因之至景初二年大議其神朝士紛紜各有所執唯散騎常侍劉邵以為萬物負隂而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗是時考論異同而從其議漢魏相仍著為貴祀凡崇祀百神放而不致有其興之則莫敢廢之宜定新禮祀六宗如舊詔從之文獻通考後魏明元帝太常三年立六宗祀皆有别兆祭有常日牲用少牢孝文太和十三年詔祀天皇大帝及五帝之神於郊天壇時大議禋祀之禮髙閭曰書稱肆類于上帝禋于六宗六宗之祀禮無明文名位壇兆歷代所疑漢魏及晉諸儒異説或稱天地四時或稱六者之間或稱易之六子或稱風雷之類或稱星辰之屬或曰世代所宗或云宗廟所尚或曰社稷五祀凡十有一家自晉以來逮於聖世以為論者雖多皆有所缺莫能詳究遂相因承别立六宗之兆總為一位而祭之帝曰尚書稱肆類上帝禋于六宗文相接屬理似一事上帝稱肆而無禋六宗言禋而不别其名以此推之上帝六宗當是一時之祀非别祭之名肆類非獨祭之目禋非地祀之用六宗者必是天皇大帝及五帝之神是祭帝之事故稱禋以缺其地故稱一宗一祭也互舉以成之今祭圜丘五帝在焉其牲幣一也故稱肆類上帝禋于六宗一祭而祀備焉六祭俱備無煩别立右歷代禋六宗五禮通考卷五十四
