body:
  text: 五禮通考卷四十一刑部尚書秦蕙田撰吉禮四十一社稷蕙田案周禮小宗伯建國之神位右社稷左宗廟社祭土神稷祭榖神人非土無以立非榖無以養國以民為本故建國以社稷為先郊特牲社祭土而主隂氣也土亦是地而與祭地異者隤然下凝皆地也其職主載惟天子得祭之於地之中别而為土職主稼穡以養人洪範土爰稼穡是也故自天子下及庶民被其功徳者均得美報此土榖之祭所以達乎上下也世儒以祭社為祭地誤矣有天子社有諸侯社有大夫社有庶民社有亡國之社有春祈有秋報有冬蜡其配句龍后稷其牲黝牲其祭血祭其尊大罍其服希冕其樂應鍾其鼓靈鼓其舞帗舞其儀三獻凡軍旅會同田獵灾𤯝皆有事焉見於經文班班可考今悉採其文條列之間附以諸儒異同之論其歴代制度典禮詳焉周禮地官大司徒以天下土地之圖周知九州之地域廣輪之數設其社稷之壝注社稷后土及田正之神大疏謂於中門之外右邊設社大稷王社王稷又於廟門之屏設勝國之社稷其外皆壝埒于四面黄氏度曰社祭土稷祭穀郊丘祭天地天子之禮也土穀之祭達乎上下故方丘與社皆地祭也而宗伯序祭有社無示舉社則其禮達乎上下舉示則天子獨用之鼓人職曰以雷鼔鼓神祀以靈鼔鼓社祭不曰示祭而曰社祭亦見其禮之達乎上下也大司樂雷鼓雷鼗以祭天神靈鼔靈鼗以祭地示是則示祭社祭其用同矣非天子不祭天而天子與庶人皆得祭社尊父親母之義也小司徒凡建邦國立其社稷疏諸侯亦有三社三稷謂國社侯社勝社皆有稷配之言立其社稷謂以文書法度與之不可國國身徃鄭氏鍔曰大司徒設其社稷之壝矣小司徒又立之蓋地官掌貳權重位尊諸侯受土以置社或為之設壝或為之立祀則權在朝廷而諸侯不敢以自擅矣封人掌設王之社壝注壝謂壇及堳埒也不言稷者稷社之細也疏云掌設王之社壝者謂王之三社三稷之壇及壇外四邊之壝皆設置之直言壝不言壇舉外以明内之有壇可知也又曰壝謂壇及堳埒也者堳埒即壝經不言壇故鄭兼見之也案孝經緯社是五土總神稷是原隰之神原隰即是五土之一耳故云稷社之細舉社則稷從之矣故言社不言稷也云社謂后土者舉配食者而言耳蕙田案鄭以稷為社之細猶以望為郊之細云爾然以此解社稷則難通鄭氏鍔曰考大司徒于邦國都鄙言制其畿疆而溝封之又言制其地域而封溝之俱謂聚土為封則知康成聚土之説為是司徒制封溝之封制其法也封人為聚土之封為其事也惟其為聚土之事故于王社則掌設其壝又為畿封而植木以為表于諸侯國之社稷亦掌設其壝為之封土以表其界之所非特王社之畿與諸侯國之封為然造都鄙表封域亦然蓋俱循大司徒所立之法而為壇壝堳埒與小封疆也凡封國設其社稷之壝造都邑亦如之疏禹貢徐州貢土五色注云王者封五色土為社建諸侯則各割其方色土與之使立社是封諸侯立社稷之法右建設社稷春官小宗伯掌建國之神位右社稷左宗廟注庫門内雉門外之左右其疏言右社稷左宗廟者案匠人亦云左祖右社彼掌營作此掌其成事位次耳地道尊右故社稷在右是尚尊尊之義此據外神在國中者社稷為尊故鄭注郊特牲云國中神莫大于社祭義注周尚左者據内神而言若據衣服尊卑先王衮冕先公鷩冕亦貴于社稷故云周尚左各有所對故注不同也又曰鄭知庫門内雉門外者後鄭義以雉門為中門故知雉門外庫門内之左右也易氏紱曰古者建國王宫居中左者人道所親故立祖廟于王宫之左右者地道所尊故立國社于王宫之右鄭氏鍔曰左所以本仁右所以明義考工記匠人營國左祖右社注王宫所居也祖宗廟所疏左右前後者據王宫居處中而言之白虎通社稷在中門之外外門之内何尊而親之與先祖同也不置中門内何敬之示不䙝瀆也右社稷神位書禹貢徐州厥貢惟土五色孔傳王者封五色土為社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅茅取其潔黄取王者覆四方疏燾覆也四方各依其方色皆以黄土覆之其割土與之時苴以白茅用白茅裹土與之必用白茅者取其潔清也易稱藉用白茅茅色白而潔美韓詩外傳云天子社廣五丈東方青南方赤西方白北方黒上冒以黄土將封諸侯各取其方色土苴以白茅以為社明有土謹敬潔清也傳説彚纂水經注姑幕縣有五色土王者封建諸侯隨方授之元和志徐州彭城郡開元貢五色土各一斗詩大雅緜迺立冢土毛傳冢土大社也起大事動大衆必先有事乎社而後出謂之宜美大王之社遂為大社也諸孔疏大社者天子社名諸侯不得稱大社也冢土非侯之社云遂為大社皆言大王所作遂為文王之法也郊特牲曰社所以神地之道也禮運云命降于社之謂殽地是社為土之神也冢既為大土為社主故知冢土大社也傳以大社者天子社名大王時實諸侯而云乃立冢土以天子之名言之者美此大王之社而遂為大社言大王立此社文王後取其制以為天子之社故以冢土言之毛所以為此説者蓋以祭法云王為羣姓立社曰大社郊特牲云天子大社必受霜露風雨之氣也以為大社之名惟施于天子其諸侯不得名大社故也朱子曰冢土大社也亦大王所立後遂因以為天子之制何氏楷曰山項之髙腫起者曰冢故以為髙大之義社説文云地主也郊特牲云家主中霤而國主社孔云冢土訓為大社未即名為大社祭法王為羣姓立社曰大社郊特牲云天子大社必受霜露風雨之氣以為大社之名惟施于天子諸侯雖不可名大社可以言冢土矣乃立冢土正是諸侯之法案泰誓言類于上帝宜于冢土則猶仍大王舊稱以未為天子故也汲冢周書作雒篇諸侯受命于周乃建大社于國中注受封也其位東青土南赤土西白土北驪土中央舋以黄土將建諸侯鑿取其方一面之土苞以黄土苴以白茅以為土封故曰受削土于周室注其方謂建東方諸侯以青土而覆茅苴裹土封之為社也白虎通其壇大如何春秋傳曰天子有大社焉東方青色南方赤色西方白色北方黑色上冒以黄土故將封東方諸侯青土苴以白茅謹敬潔清也蔡邕獨斷天子大社以五色土為壇皇子封為王者受天子之社土以所封之方色東方受青南方受赤他如其方色苴以白茅受之各以其所封方之色歸國以立社故謂之受茅土漢興以皇子封為王者得茅土其他功臣及鄉亭他姓公侯各以其户數租入為限不受茅土亦不立社也天子社稷土壇方廣五丈諸侯半之社稷二神同功故同堂别壇俱在未位通志社壇在東稷壇在西俱北面壇築壇門四面門天子之社則以五色土各依方色為壇廣五丈諸侯則但用當方之色為壇周禮圖曰社稷壇相並社壇在東稷壇在西各三級壝在四隅如矩曲方右社稷壇禮記郊特牲社祭土而主隂氣也疏土謂五土山林川澤丘陵墳衍原隰也以時祭之故云社祭土土是隂氣之主故云主隂氣也馬氏晞孟曰古人之言社必有稷此言社而不言稷者蓋社以總祭五土之神而山林川澤丘陵墳衍原隰皆是也稷則止于原隰而已言社可以兼稷也祭法言天子諸侯立社而不言稷亦以此蕙田案馬氏言社可以兼稷是也云稷則止于原隰而已此依鄭義非是社所以神地之道也地載萬物天垂象取財于地取法于天是以尊天而親地也故教民美報焉家主中霤而國主社示本也疏言立社之祭是神明于地之道發此句為下張本也地載萬物者釋地所以得神之由也天垂象者欲明地故引天為對地有其物天皆垂其象所謂在天成象在地成形也財並在地出故為人所取人知四時早晚皆放日月星辰以為耕作之候是取法于天故尊而祭之天子祭天是也所取財者故親而祭之一切親地而共祭社是也地既為民所親故與庶民祭之以教民美報故也卿大夫之家主祭土神于中霤天子諸侯之國主祭土神于社以土神生財以養官與民故皆祭土神示其生養之本也社稷之義先儒所解不同鄭康成之説以社為五土總神稷為原隰之神勾龍以有平水土之功配社祀之稷有播種之功配稷祀之鄭必以為此説者案郊特牲云社祭土而主隂氣又云社所以神地之道又禮運云命降于社之謂殽地又王制云祭天地社稷為越紼而行事據此諸文故知社即地神稷是社之細别别名曰稷稷乃原隰所生故以稷為原隰之神若賈逵馬融王肅之徒以社祭勾龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云禮運云祀帝于郊所以定天位祀社于國所以列地利社若是地應云定地位而言列地利故知社非地也為鄭學者馬昭之等通之云天體無形故須云定位地有形不須云定位故唯云列地利肅又難鄭云祭天牛角繭栗而用特牲祭社牛角尺而用大牢又祭天地大裘衮冕祭社稷絺冕又唯天子令庶民祭社社若是地神豈庶民得祭地乎為鄭學者通之云以天神至尊而簡質事之故牛角繭栗而用特牲服著大裘天地至尊天子至貴天子社稷是地之别體有功于人報其載養之功故用大牢貶降于天故角尺也祭用絺冕取其隂類庶人䝉其社功故亦祭之非是方澤神州之地也肅又難鄭云召誥用牲于郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知唯祭勾龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲勾龍是上公之神社是地祗之别尊卑不甚懸絶故云配同牲也肅又難鄭云后稷配天孝經有配天明文后稷不稱天也祭法及昭二十九年傳云勾龍能平水土故祀以為社不云祀以配社明知社即勾龍也為鄭學者通之云后稷非能與天同功惟尊祖配之故云不得稱天勾龍與社同功故得云祀以為社而得稱社也肅又難云春秋云伐鼓于社責上公不云責地祗明社是上公也又月令命民社鄭注云社后土也孝經注云后稷土也勾龍為后土鄭注云社后土則勾龍也是鄭自相違反為鄭學者通之云伐鼓責上公者以日食臣侵君之象故以責上公言之勾龍為后土之官其地神亦名后工故左傳云君戴皇天而履后土地稱后土與勾龍稱后土名同而實異也鄭注云后土者謂土神也非謂勾龍也故中庸云郊社之禮注云社祭地神又鼔人云以靈鼓鼓社祭注云社祭祭地祗也是社為地祗也異義今孝經説曰社者土地之主主地廣博不可徧敬故封五土以為社古左氏説共工為后土后土為社許君謹案亦曰春秋稱公社今人謂社神謂社公故知社是土公非地祗𤣥駁之云社祭土而主隂氣又云社者神地之道謂社神皆言上公失之矣今人亦謂雷曰雷公天曰天公豈上公也異義稷今孝經説稷者五榖之長穀衆多不可徧敬故立稷而祭之古左氏説烈山氏之子曰柱死祀以為稷稷是田正周棄亦為稷自商以來祀之許君謹案禮縁生及死故社稷人事之既祭稷榖不得但以稷米祭稷反自食同左氏義鄭駁之云宗伯以血祭祭社稷五祀五嶽社稷之神若是勾龍社棄不得先五嶽而食又引司徒五土名又引大司樂五變而致介物及土示土示五土之總神即謂社也六樂于五地無原隰而有土祗則土祗與原隰同用樂也又引詩信彼南山云畇畇原隰下之黍稷或云原隰生百穀黍為之長然則稷者原隰之神若達此義不得以稷米祭稷為難通典説曰王者諸侯所以立社稷者為萬人求福報功也人非土不立非榖不生不可徧敬故立社稷而祭焉自經籍灰燼互執不同鄭𤣥注社稷者土榖之神勾龍后稷以配食也案所據郊特牲云社祭土而主隂氣君南嚮於北墉下答隂之義又云社者神地之道又周禮以血祭祭社稷五祀五嶽樂用靈鼓大喪三年不祭唯天地社稷越紼而行事王肅云勾龍周棄並為五官故祀為社稷案所據左氏傳云勾龍為后土祀以為社故曰伐鼓於社責上公也今俗猶言社公上公之義耳又牲用太牢與地不同若稷是榖神祭之用稷反自食乎崔靈恩云二家之説雖各有通途但昔來所習謂鄭為長故依鄭義試評曰案崔靈恩以鄭為長當矣何者案公者尊稱以人尊社故曰社公王肅以俗言社公及以社為上公者俗言天公雷公豈上公乎又日蝕伐鼓于社責隂助陽之義也夫陽為君隂為臣日蝕者隂蝕陽也君弱臣强是以伐鼓于社云責上公耳若句龍周棄為社則不得先五嶽而埋血也以人鬼雖用血而不埋復云以無配食字是正神者周人禘嚳而郊稷祖文王而宗武王亦無配食之説豈得不謂郊天者乎且人鬼之道不用靈鼓不得越紼而祭也稷者土有生長之功立其神因以稷名之鄭據孝經説曰社者土地之神稷者能生五穀之神孝經援神契云稷乃原隰之中能生五穀之祗今案本無正神人感其功欲美報之因以稷名所以稷名神者五穀之長故也楊氏復曰王鄭之學互有得失若鄭云勾龍有平水土之功配社祀之后稷有播種之功配稷祀之則鄭説為長蕙田案兩家互有得失鄭得者勾龍配社后稷配稷一也地稱后土勾龍稱后土名同而實異二也駁社是上公駁勾龍棄先五嶽而食三也其失者社即地示一也稷為原隰之神二也稷是社之細别三也王得者社非祭地一也定地位一難牲牢裘冕二難二也駁鄭自相違反三也其失者社祭勾龍稷祭后稷皆人鬼一也無配食明文不得稱配二也稷米祭稷反自食三也朱子註孟子云社土神稷榖神最為明白簡當云土神則隨土之大小皆得祭之若云地示則惟天子乃得祭而非社之謂矣馬氏晞孟曰天逺于人則尊而不親地近于人則親而不尊故在天則明之欲民尊而親之也在地則神之欲民親而尊之也萬物本乎天而亦本乎土故家以中霤為主國以社為主者示其不敢忘本之意也周氏諝曰周官以血祭祭社稷五祀中霤五祀之一而社稷之次故有國者以社為主而有家者則中霤而已禮運命降于社之謂殽地注降于社謂教令由社下者也社土地之主也周禮土㑹之法有五地之物生社疏命者政令之命降下于社謂從社而來以降民也即地也指其神謂之社指其形謂之地法社以下教令故云殽地周禮大司徒五地則山林川澤丘陵墳衍原隰地有五土生物不同人君法地亦養物不一也王氏安石曰命者命祀之謂也出命而降于社天子有社諸侯亦可以有社謂之殽地諸侯可以祭社而不可以祭天故也殽者雜而分也天子大社兼土五色使諸侯立社各以其方色之土授之殽地之謂也祀社于國所以列地利也疏出財故云列地利劉氏彞曰祀社于國也生物享其報而民不敢慢于其神矣方氏慤曰天則逺人而尊故祭帝于郊地則近人而親故祀社于國郊謂郊之南南者陽之盛故曰所以定天位國謂國之右右者隂之盛故曰所以列地利定天位則天下達于尊卑之禮矣列地利則天下達于施報之禮矣且位以祭之所言也利以祭之物言也位欲其一故言定物欲其陳故言列天神曰祀地示曰祭而此于天曰祭者郊所以明天道故也于地曰祀者社所以神地道故也禮行于社而百貨可極焉疏祀社盡禮則五穀豐稔金玉露形盡為國家之用故云可極禮器社稷山川之事鬼神之祭體也荀子社祭社稷祭稷白虎通王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有土尊稷五榖之長故封稷而祭之也尚書曰乃社于新邑孝經曰保其社稷而和其民人蓋諸侯之孝也稷者得隂陽中和之氣而用尤多故為長也不謂之土何封土為社故變名謂之社利于衆土也為社立祀始謂之稷語不自變有内外或曰至稷不以稷為社故不變其名事自可知也後漢蔡邕陳留索昏庫上里社碑社祀之建尚矣在昔聖帝有五行之官而共工子勾龍為后土及其没也遂為社祀故曰社者土地之主也周禮建為社位左宗廟右社稷戎醜攸行于是受脤土膏恒動于是祈農又頒之于兆民春秋之中命之供祠故自有國至黎庶莫不祀焉附諸家論社神稷神仲長統社祭土神答自漢諸儒論勾龍即是社主或云是配其議甚衆後荀彧問仲長統以社所祭者何神也統答所祭者土神也侍中鄧義以為不然而難之彧令統答焉統答義曰前見逮及敢不敬對退熟惟省郊社之祭國之大事誠非學淺思薄者所宜興論重復亦以鄧君難事有先漸議則既行可謂辭而不可得因而不可得已者也屯有經綸之義暌有異同之辭歸于建國立家通志斷類也意則欲廣其㣲以宗實備其論以求真先難而後易出異而歸同乎難曰社祭土主隂氣正所謂勾龍土行之官為社則主隂明矣不與記説有違錯也答曰今記之言社輒與郊連體有本末辭有上下謂之不錯不可得禮運曰政必本于天殽以降命命降于社之謂殽地參于天地並于鬼神又曰祭帝于郊所以定天位也祀社于國所以列地利也郊特牲曰社所以神地之道也地載萬物天垂象取財于地取法于天是以尊天而親地家主中霤國主社示本也相此之類元尚不道配食者也主以為勾龍無乃失歟難曰信如此所言土尊故以為首在于上宗伯之體所當列上下之序上句當言天神地祗人鬼何反先人而後地上文如此至下何以獨不可而云社非勾龍當為地哉答曰此形成著體數自上來之次言之耳豈足據使從人鬼之例邪三科之祭各指其體今獨擿出社稷以為但勾龍有烈山氏之子恐非其本意也案記言社土而云何得之為勾龍則傳雖言祀勾龍為社亦何嫌反獨不可謂之配食乎祭法曰周人禘嚳郊稷祖文王宗武王皆以為配食者若復何須謂之不祭天乎備讀傳者則真土獨據記者則疑勾龍未若交錯參伍致其義以相成之為善也難曰再特于郊牛者后稷配故也社于新邑牛一羊一豕一所以用二牲者立社位祀勾龍縁人事之也如此非祀地明矣以宫室新成故立社耳又曰軍行載社者當行賞罰明不自專故告祖而行賞造社而行戮二主明皆人鬼人鬼故以告之必若所云當言載地主于齋車又當言用命賞于天不用命戮于地非其謂也所以有死社稷之義者凡賜命受國造建宫室無不立社是奉言所受立不可棄捐苟免而去當死之也易勾龍為其社傳有見文今欲易神之相令記附食宜明其徴祀國大事不可不重據經依傳庶無咎悔答曰郊特牲者天至尊無物以稱專誠而社稷太牢者土于天為卑縁人事以牢祭也社禮今亡并特之義亦未可得明也昭告之文皆于天地何獨人鬼此言則未敢取者也郊社之次天地之序也今使勾龍載冒其名耦文于天以度言之不可謂安矣土者人所依以固而最近者也故立以為守祀居則事之時軍則告之以行戮自順義也何為當戮于地不言用命賞于天乎帝王兩儀之參宇中之莫尊者也而盛一官之臣以為土之貴神置之宗廟之上接之郊禘之次俾守之者有死無失何聖人制法之參差用禮之偏頗其列在先王人臣之位其于四官爵侔班同比之司徒于數居二縱復令王者不同禮儀相變或有尊之則不過當若五卿之與冢宰此坐之上下行之先後耳不得同祖與社言俱坐處尊位也周禮為禮之經而禮記為禮之傳案經傳求索見文在于此矣鈞之兩者未知孰是去本神而不祭與貶勾龍為土配比其輕重何謂為甚經有條例紀有明義先儒未能正不可稱是鈞校典籍論本考始矯前易故不從常説不可謂非孟軻曰予豈好辨哉乃不得已也鄭司農之言正此之謂也丘光庭兼明書社始或問社之始答曰始于上古穴居之時也故禮記云家主中霤而國主社者古人掘地而居開中取明雨水霤入謂之中霤言土神所在皆得祭之在家為中霤在國為社也由此而論社之所始其來尚矣稷始或問稷之始答曰始有粒食之時也故祭法曰厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷厲山氏神農之號則神農之時有稷矣社神先儒以社祭五土之神五土者一曰山林二曰川澤三曰丘陵四曰墳衍五曰原隰明曰社者所在地土之名也凡土之所在人皆賴之故祭之也若惟祭斯五者則都邑之土人不賴之乎且邑外之土分為五事之外無餘地也何必歴舉其名乎以此推之知社神所在土地之名也或問曰五土之名出自周禮非乎答曰案周禮地官唯云辨五土之名物不云五土為社也又問曰社既土神而夏至祭皇地祗于方丘又何神也答曰方丘之祭祭大地之神社之所祭邦國鄉原之土神也社名或問曰社既土神不言祗而云社者何也答曰社以神地之道蓋以土地人所踐履而無崇敬之心合其字從示其音為社皆所以神明之也稷神先儒皆以稷祭百榖之神鄭康成以稷原隰之神明曰鄭義非也且原隰亦土也社既祭土何故更分原隰而别祭之乎又稷之名義不與原隰相侔縱令鄭義有徴亦是不分真偽諸儒所識可謂不一稷名或問曰稷既百榖之神不言榖而云稷者何也答曰稷屬土而為諸榖之長故月令謂之首種首種者種最在前也諸榖不可徧舉故舉其長而為言之以等之也若直以榖言之則為人所䙝慢也朱子語類堯卿問社稷神曰説得不同或云稷是山林原隰之神或云榖神看來榖神較是社是土神又問社如何有神曰能生物便是神也丘氏濬曰社以祀土神稷以祀榖神而配以人尚矣祭法謂祀后土以為社而春秋傳則謂勾龍為后土蓋后土掌水土之官勾龍嘗居是官一以人名一以官名也鄭𤣥謂勾龍以有平水土之功配社祀之稷有播種之功配稷祀之非謂即祀之以為社為稷也蕙田案社神榖神鄭王兩家之辨詳矣鄧義仲長統之論難不喻其指比而觀之自以仲説為長而最後一答則尤為鄭學者所未到然以為五土之神原隰之神則猶泥而不圓正不如丘氏所云社為土地所在之名稷為百榖之神其義正大而的當也蓋人非土不立非榖不養古之人享其功者必祭之報其功也天子有天下而始尊天下有百榖而民育故天子之社天下之社也所以報其萬邦作乂烝民粒食之功也諸侯分土而始有國有土有財有民故諸侯之社一國之社也所以守其胙土保其宗廟而和其民人也若一州之社大夫以下之社則由大而漸小由廣而漸狹矣大如天下次如一國猶可云五土也若一鄉一里何山林川澤原隰丘陵墳衍之有則主人鬼者固非而謂為五土之示者亦未是矣至以稷為原隰之神則不惟與五土中原隰重複而失五榖養人之義自當以朱子生物之論為穩右社稷名義禮記祭法厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之伯九州也其子曰后土能平九州故祀以為社注厲山氏炎帝也起於厲山或曰有烈山氏棄后稷名也共工氏無録而王謂之伯在太昊炎帝之間疏其子曰農能殖百榖者農謂厲山氏後世子孫名柱能殖百榖故國語云神農之名柱作農官因名農是也夏之衰也周棄繼之者以夏末湯遭大旱七年欲變置社稷故廢農祀棄以配稷之神其子曰后土能平九州故祀以為社者是共工後世之孫為后土之官后君也為君而掌土能治九州五土之神故祀以為配社之神葉氏夢得曰自夏以上蓋世以烈山氏主稷勾龍氏主社而易稷以代烈山氏者自殷以來為之也故祀后稷為稷祀勾龍氏為社至于今守之吾讀禮至此然後知逸書作夏社之意書序云湯勝夏欲遷其社不可作夏社意者湯既黜夏殷人有歸罪于社稷之不能保其國而易之者后稷之功在天下而人所共知故以代柱無嫌而勾龍氏未有昭然如稷可代者則不可以苟易所以遷烈山氏而不遷勾龍氏歟春秋昭公二十九年左氏傳蔡墨曰共工氏有子曰勾龍為后土注共工在太昊後神農前以水名官者其子勾龍能平水土故死而見祀疏言共工有子謂後世子耳不知勾龍之為后土在于何代后土為社疏句龍既為后土又亦配社故言后土為社也稷田正也注掌播殖也之疏國語云宣王不藉千畝虢文公諫曰民大事在農是故稷為大官然則百穀稷其長遂以稷名為農官之長正長也稷是田官之長有烈山氏之子曰柱為稷注烈山氏神農世諸侯氏疏魯語及祭法皆云烈山之有天下也其子能殖百穀故祀以為稷言有天下則是天子矣杜注不得為諸侯也買逵鄭𤣥皆云烈山炎帝之號杜言神農世諸侯者案帝王世紀神農本起烈山然則初封烈山為諸侯後為天子猶帝堯初為唐侯然也此與魯語皆云其子曰柱祭法云其子曰農者劉炫云蓋柱是名其官曰農猶呼周棄為稷自夏以上祀之注祀柱也周棄亦為稷注棄周之始祖能播百穀湯既勝夏廢柱而以棄代之疏棄為周之始祖能播殖百穀經傳備有其事以其後世有天下號國曰周故以周冠棄棄時未稱周也自商以來祀之左傳土正曰后土杜注土為羣物主故稱后也其祀句龍焉在家則祀中霤在野則為社疏后者君也羣物皆土所載故土為羣物之主以君言之故云后土也賈逵云勾芒祀于户祝融祀于竈蓐收祀于門𤣥冥祀于井后土祀于中霤今杜云在家則祀中霤是同賈説也家謂宫室之内對野為文故稱家非卿大夫之家也言在野者對家為文雖在庫門之内尚無宫室故稱野且卿大夫以下社在野田故周禮大司徒云辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社鄭𤣥云社稷后土及田正之神田主田神后土田正之所依也詩人謂之田祖所宜木謂若松柏栗也是在野則祭為社也此野田之社民所共祭即月令仲春之月擇元日命民社是也劉炫云天子以下俱荷地徳皆當祭地但名位有髙下祭之有等級天子祭地祭大地之神也諸侯不得祭地使之祭社也家又不得祭社使祭中霤也霤亦地神所祭小故變其名賈逵以勾芒祀于户云云言雖天子之祭五神亦如此耳杜以别祭五行神以五官配之非祀此五神于門户井竈中霤也門户井竈直祭門户等神不祭勾芒等也惟有祭后土者亦是土神故特辨之云在家則祀中霤在野則為社言彼與中霤亦是土神但祭有大小郊特牲云社所以神地之道也地載萬物取材于地教民美報焉家主中霤而國主社示本也是在家則祀中霤也大司徒以下同此禮也家語五帝孔子曰古之平治水土及播植百榖者衆矣唯勾龍氏兼食于社而棄為稷神易代奉之無敢易者明不可與等也漢書郊祀志自共工氏伯九州其子曰句龍能平水土死為社祠有烈山氏王天下其子曰柱能植百榖死為稷祠湯放桀欲遷夏社不可作夏社迺遷烈山子柱而以周棄代為稷祀應劭曰遭大旱七年明徳以薦而旱不止故遷社以棄代為稷欲遷勾龍徳莫能繼故作夏社説不可遷之義也通鑑前編成湯二十有四祀祀棄為稷尚書序湯既勝夏欲遷其社不可孔傳湯承堯舜禪代之後順天應人逆取順守而有慙徳故革命創制改正易服變置社稷而後世無及句龍者故不可而止疏湯于初時社稷俱欲改之周棄功多于柱即令廢柱祀棄而上世治水土之臣其功無及句龍者故不可遷而止孟子曰犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷鄭𤣥因此乃云湯伐桀之時大旱既置其禮祀明徳以薦而猶旱至七年故更置社稷乃謂湯即位之後七年大旱方始變之若實七年乃變何書繫之勝夏勝夏猶尚不可况在湯誓前乎且禮記云夏之衰也周棄繼之商興七年乃變安得以夏衰為言也若商革夏命猶七年祀柱左傳亦不得斷為自夏以上祀柱自商以來祀棄也由此而言孔稱改正朔而變置社稷所言得其㫖也漢世儒者説社稷有二左傳説社祭勾龍稷祭柱棄惟祭人神而已孝經説社為土神稷為榖神勾龍柱棄是配食者也孔無明説而此經云遷社孔傳云無及勾龍即同賈逵馬融等説以社為勾龍也邱光庭兼明書社配春秋昭二十九年左傳曰共工氏之子句龍為后土為社是勾龍生而后土之官死故以之配祭于社今之祭配社以后土配坐即句龍也稷配明曰有能播百榖者謂之曰正正長也謂為農之長死後以配祭于稷謂之后稷后君也謂為榖之君傳曰有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之祭稷配以后稷者周棄也蕙田案句龍配社柱棄配稷當以左傳祭法為正王肅即以人神為社稷者誤也右社稷配神禮記祭法王為羣姓立社曰大社王自為立社曰王社注羣衆也社疏羣姓謂百官以下及兆民言羣姓者包百姓也大在庫門内之右故小宗伯云右社稷王自為立社曰王社者其王社所在書傳無文或曰與大社同處王社在大社之西崔氏云王社在籍田王自所祭以共粢盛今從其説故詩頌云春藉田而祈社稷是也張子曰大社王為羣姓所立必在國外也民各有社不害為大社王自為立社必在城内在漢猶有大社在唐只見一社天又曰天子立大社為羣姓必不但為城中之民為下也諸侯國社則是一國也郊者郊天之位社者祭地之位郊外無天神之祀社外無地示之祀澤中方丘亦社也故凡言社者即地示之祭如大社王社又分而言之大社祭天下之地示王社祭京師之地示五祀祭宫中之地示蕙田案祀社于國所以列地利張子謂大社為羣姓所立必在國外恐非蓋左祖右社天子諸侯同之也王社疏謂與大社同處崔氏謂在藉田張子謂必在城内則猶注疏之説也至謂社即是祭地社外無地祗之祭則惑矣詳見祭地門陳氏禮書先儒謂王社或建於大社之西或建於藉田然國語王藉則司空除壇農正陳藉禮而歴代所祭先農而已不聞祭社也故詩曰春藉田而祈社稷非謂社稷建於藉田也又曰西漢及魏有官社無官稷晉之時有帝社無帝稷類皆二社一稷議者紛然或欲合二社以為一或欲異二社之所向是雖違經悖禮然亦二社同設於國中未聞藉田有之也蕙田案注疏引崔氏説謂王社在藉田禮書辨之甚力夫大社為民而立尚在國中王自為立社似不宜在國外陳氏説恐是疏謂與大社同處理或有之然不可考矣郊特牲天子大社必受霜露風雨以達天地之氣也注大社王為羣姓所立以疏風雨至則萬物生霜露降則萬物成故不為屋受霜露風雨是天地氣達也蔡邕獨斷天子之宗社曰大社天子所為羣姓立社也天子之社曰王社一曰帝社古者有命將行師必于此社授以政尚書曰用命賞于祖不用命戮于社右天子社稷禮記王制諸侯祭社稷禮運同馬氏晞孟曰社稷者土穀之神也諸侯者為天子守土也故祭社稷在上者可以兼下故天子祭天地社稷五祀在下者不可以兼上故諸侯祭社稷祭法諸侯為百姓立社曰國社諸侯自為立社曰侯社疏諸侯國社亦在公宫之右侯社在藉田曲禮問國君之年長則曰能從宗廟社稷之事矣幼則曰未能從宗廟社稷之事也國君去其國止之曰奈何去社稷也注臣民殷勤之言國君死社稷吕氏大臨曰以社稷為言指其所本也先王之建國必為之置社稷使其君守之為土地人民之主此有國者所以以社稷為言也禮運故國有患君死社稷謂之義方氏慤曰諸侯為守土之臣故死于社稷謂之義義之為言宜也孟子諸侯不仁不保社稷孝經保其社稷而和其民人蓋諸侯之孝也蔡邕獨斷諸侯為百姓立社曰國社諸侯之社曰侯社白虎通王者諸侯俱兩社何俱有土之君禮記三正曰王者二社大社為天下報功王社為京師報功大社尊于王社土地久故而報之陳氏禮書諸侯有侯社國社亡國社與天子同其祭用少牢與天子異先儒謂天子社廣五丈諸侯半之天子社五色冒以黄而諸侯受土各以其方之色亦冒以黄其言雖不經見然五土數黄土色則天子社廣五丈冒以黄信矣諸侯之禮常半天子天子六軍諸侯三軍天子六卿諸侯三卿天子六宫諸侯三宫天子辟雍諸侯泮宫天子之馬十二閑諸侯之馬六閑則社半五丈信矣禹貢徐州貢土五色以為社則大社五色諸侯受土各以其方之色信矣附辨諸家社不置稷陳氏禮書王社侯社國中之土示而已無預農事故不置稷大社國社則農之祈報在焉故皆有稷西漢及魏有官社無官稷類皆二社一稷王與諸侯皆三社二稷史氏浩曰王社侯社皆不置稷者王與諸侯以寳土地為任也大社國社有稷侑之者民以食為天也鄭氏鍔曰王自為立社是為土示而稷無預與封人所設之社壝謂地兹所以不立稷也周禮小司徒賈疏諸侯有三社三稷謂國社侯社勝國之社皆有稷配之州長疏同馬氏晞孟曰古人之言社必有稷祭法言天子諸侯立社而不言稷言社可以兼稷也書召誥孔疏經有社無稷稷是社類知其同告之告立社稷之位其祭用太牢故牛羊豕各一也句龍能平水土祀之以為社后稷能殖百榖祀以為稷左傳魯語祭法皆有此文漢世儒者説社稷有二左氏説社稷唯祭句龍后稷人神而已是孔之所用孝經説社為土神稷為榖神句龍后稷配食者是鄭之所從而武成篇云告於皇天后土孔以后土為地言后土社也者以泰誓云類於上帝宜於冢土故以后土為社也小劉云后土與皇天相對以后土為地若然左傳云句龍為后土豈句龍為地乎社亦名后土地名后土名同而義異也社稷共牢經無明説郊特牲云社稷太牢二神共言太牢故傳言社稷共牢也此經上句言於郊此不言於社此言社於新邑上句不言郊於新邑上句言用牲此言牛羊豕不言用告天不言告地告社不言告稷皆互相足從省文也通志天子三社諸侯三社大夫以下一社立名雖異其神則同皆以句龍配之稷周棄配之蕙田案據注疏王社侯社在藉田詩周頌載芟序曰春藉田而祈社稷也是王社侯社亦皆有稷也又案王與諸侯皆立兩社先儒謂大社國社為公王社侯社為私夫社以祭土天下之土皆天子之土也一國之土皆諸侯之土也又何公私之有竊謂大社天子為羣姓所立即所稱五色之土用以分封諸侯與天下共之者乎王自立社則畿内之土神王所自主而與畿内公卿大夫士共之者乎諸侯國社即分封茅土之社與國同為存亡百姓之所繋屬者乎自立之社則國邑之土神所謂旱乾水溢可以變置者乎春祈秋報則兩社皆可並行如此雖畧有分别而皆屬于公於義為合觀大夫以下成羣立社無有一家自立一社者亦可証也右諸侯社稷周禮春官喪祝掌勝國邑之社稷之祝號以祭祀禱祠焉注勝國邑所誅討者社稷者若亳社是矣存之者重神也蓋揜其上而棧其下為北牖疏以祭祀禱祠者祭祀謂春秋正祭禱祠謂國有故祈請求福曰禱得福報賽曰祠云勝國邑所誅討者據武王伐紂取其社稷而事之故云若亳社是也據其地則曰亳據彼國喪亡即為亡國之社稷此主勝之即為勝國之社稷是以郊特牲云喪國之社春秋謂之亳社也君自無道被誅社稷無罪故存之是重神也公羊白掩其上即屋之也棧其下者非直不受天陽亦不通地隂劉氏彛曰周勝于商取其社以祭之故曰勝焉弇上以絶天之陽也棧下以絶地之生也北其牖而祭之為其國亡也故喪祝掌其祀事陳氏傅良曰鄭謂存之重神也存先代之後忌子夘之日陳垂和之器古人如此皆有深意如詩云有客白馬助祭于廟皆是此意若曰商之賢聖六七作豈謂其處此哉皆儆戒修省之意作夏社與此意同秋官士師若祭勝國之社稷則為之尸注以刑官為尸略之也周謂亡殷之社為亳社祭疏案鳧鷖詩宗廟社稷七祀皆稱公尸不使刑官今勝國之社稷士師為尸故鄭云用刑官為尸略之也云周謂亡殷之社為亳社者據周勝殷謂之勝據殷亡即云亡國即郊特牲云廢國之社屋之是也據地而言即言亳社春秋亳社灾是也鄭氏鍔曰勝國國為吾所勝也則無主後矣然實我用兵以勝之如周之勝商不廢亳社以湯之故不絶祀是以祭之易氏祓曰社祭土而主隂氣也又曰天子大社必受霜露風雨以達天地之氣喪國之社屋之不受天陽也亳社北牖使隂明也言亳社則勝國之社也亳社以隂為主而刑乃隂之類媒氏以男女之隂訟而聴于勝國之社類也此祭勝國之社而刑官為之尸亦類也劉氏彞曰鳧鷖之詩宗廟社稷七祀皆有尸未聞用刑官為之勝國之社稷其祭五土之神與先稷與夫與王之社稷無以異矣必屋其壇用士師為之尸祭其社稷而威其亡國之妖邪耳蕙田案古者凡祭外神亦皆有尸此其明文地官媒氏凡男女之隂訟聴之于勝國之社注陰訟争中冓之事以觸法者勝國亡國也亡國之社奄其上而棧其下使無所通就之以聴隂訟之情明不當宣露其罪疏云勝國亡國也者此社有四名若此徃勝得彼國將社來謂之勝國即此文是也若據彼國喪亡則謂之亡國之社引公羊傳者是也又名喪國之社郊特牲云喪國之社必屋之是也據其地則曰亳社則左傳云亳社灾是也故云勝國亡國也故鄭引公羊傳云勝國亡國也云亡國之社者公羊傳文云奄其上者即郊特牲屋之不受天陽者是也云棧其下者謂于下著柴以棧之使不通隂故也故云使無所通也云就之以聴隂訟之情明不當宣露者以其勝國社上下不通是不宣露中冓之言亦不宣露故就而聴之也若然案詩召伯聴男女之訟于甘棠之下不在勝國社者彼謂周公未制禮前此據制禮之後故不同禮記郊特牲喪國之社屋之不受天陽也薄社北牖使隂明也注屋之北牖絶其陽通其隂而已薄亳殷之社殷始都薄疏喪國禮社者謂周立殷社以為戒天是生法無生義故屋隔之塞其三面惟開北牖示絶陽而通隂隂明則物死也尚書序湯既勝夏欲遷其社不可作夏社孔傳湯承堯舜禪代之後順天應人逆取順守而有慚徳故革命剏制改正易服變置社稷作夏社言夏社不可遷之義春秋襄三十年左氏傳鳥鳴于亳社如曰嘻嘻定公六年左氏傳陽虎盟國人于亳社哀公四年六月辛丑亳社灾杜注亳社殷社諸侯有之所以戒亡國范氏寗曰殷都于亳武王克紂而班列其社于諸侯以為亡國之戒劉向曰灾亳社戒人君縱恣不能儆戒之象榖梁傳亳社者亳之社也亳亡國也亡國之社以為廟屏戒也其屋亡國之社不得達上也范注亳即殷也殷都于亳故因謂之亳社立亳之社于廟之外以為屏蔽取其不得通天人君瞻之而致戒心必為之作屋不使上通天也縁有屋故言灾諸楊疏周禮建國之神位左宗廟右社稷彼謂天子侯之正社稷霜露者周禮又云決隂事于亳社明不與正同處明一在西一在東故左氏曰間于兩社為公室輔是也公羊傳蒲社灾蒲社者何亡國之社也社者封也其言灾何亡國之社蓋掩之掩其上而柴其下蒲社灾何以書記灾也何注掩柴之者絶不得使通天地四方以為有國之戒戒社者先王所以威示教戒諸侯使事上也是後宋事强呉齊晉前驅滕薛俠轂魯衛驂乘故天去戒社若曰王教絶滅云爾者疏蒲社者先世之亡國在魯竟者公羊解以為蒲古國之名天子滅之以封伯禽取其社以戒諸侯使事上今灾之者若曰王教絶云爾左氏穀梁以為亳社者殷社也武王滅殷遂取其社賜諸侯以為有國之戒然則傳説不同不可為難案今穀梁經傳皆作亳字范氏曰殷都于亳武王克紂而班列其社于諸侯以為亡國之戒而賈氏云公羊傳曰蒲社也者蓋所見異哀公七年左氏傳以邾子益來獻于亳社白虎通王者諸侯必有誡社者何示有存亡也明為善者得之為惡者失之故春秋公羊傳曰亡國王社掩其上柴其下郊特牲曰喪國之社屋之自言與天地絶也在門東明自下之無事處也或曰皆當置明誡當近君置宗廟之牆南禮曰亡國之社稷必以為宗廟之屏示賤之也漢書五行志亳社灾董仲舒劉向以為亡國之社所以為誡也韓詩外傳亡國之社以戒諸侯人之戒在于挑殳陳氏禮書孔子謂哀公曰君出魯之四門以望魯之四郊亡國之墟必有數焉君以此思懼則懼將焉不至然則天子諸侯必有勝國之社其意亦若此也記言天子大社繼之以亡國之社屋之天子之亳社也春秋書亳社灾魯之亳社也左傳曰鳴于亳社宋之亳社也社必有稷少司冦祭勝國之社稷則為尸是也位必在左春秋傳所謂間于兩社是也掩上棧下不受天陽設于北牖使隂明焉以其不能生成萬物而趨于幽也男女之訟於此聴者以其當隱蔽而不敢䙝也祭之而刑官為尸者以其滅亡刑之類也宗廟之制天子外屏諸侯内屏不容以亡國之社為之榖梁以亡國之社為廟屏此不可考孔穎達曰亡國之社或在廟或在庫門内之東是穎達亦疑榖梁之説蕙田案榖梁立亳社於廟之外以為屏蔽非如内屏外屏之屏也特因其蔽于外而取屏蔽之意以為喻耳禮書似泥右勝國社稷五禮通考卷四十一
