body:
  text: 五禮通考卷九十八刑部尚書秦蕙田撰吉禮九十八禘祫漢書元帝本紀永光四年詔罷祖宗廟在郡國者韋玄成傳罷郡國廟月餘復下詔將軍列侯中二千石諸大夫博士議玄成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁迭互也親盡則毁毁廟之主藏乎太祖五年而再殷祭言一禘一祫也師古曰殷大也禘諦也一一祭之祫合也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖之所自出以其祖配之而立四廟言如受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親踈之殺示有終也後嵗餘上寢疾夢祖宗譴罷郡國廟匡衡告謝毁廟曰在昔帝王承祖宗之休典取象於天地天序五行人親五屬師古曰五屬謂同族之五服斬衰齊衰大功小功緦麻也天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接於天萬世不墮繼烈以下五廟而遷上陳太祖間嵗而祫師古曰間嵗隔一嵗也其道應天故福祿永終哀帝時議毁廟劉歆以為禮去事有殺去除也殺漸也故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曽髙則月祀二祧則時享壇墠則嵗貢大禘則終王服虔曰蠻夷終王乃入助祭各以其珍貢以共大禘之祭也師古曰每一王終新王即位乃來助祭德盛而遊廣親親之殺也彌逺則彌尊故禘為重矣漢舊儀宗廟三年大祫祭子孫諸帝以昭穆坐於髙廟諸隳廟神皆合食設左右坐髙祖南靣幄繡帳堂上西北隅帳中坐長一丈廣六尺繡裀厚一尺著之以絮四百斤曲几黃金扣器髙后右坐亦幄帳郤六寸白銀扣器每大牢中分之左辨上帝右辨上后俎餘委肉積于前數千斤名曰維俎子為昭孫為穆昭西向曲屏風穆東向皆曲几如髙祖饌陳其右各配其左坐如祖妣之法太常導皇帝入北門羣臣陪位者皆舉手班辟抑首伏大鴻臚大行令九儐傳曰起復位而皇帝上堂盥侍中奉觶酒從帝進拜謁贊享曰嗣曾孫皇帝敬再拜前上酒卻行至昭穆之坐次上酒子為昭孫為穆各父子相對也畢却西靣坐坐如乘輿坐贊享曰奉髙祖賜夀皇帝起再拜即席以太牢之左辨賜皇帝如祠其夜半入行禮平明上九巵畢羣臣皆拜因賜胙皇帝出即更衣中詔罷當從者文獻通考馬氏曰案西漢書未嘗言禘祫之祀惟漢舊儀載其制頗詳又韋玄成傳載諸儒因議毁廟而及禘祫其説并著于此然則以禘為五年之殷祭以禘為祀天以禘為並祭羣廟韋劉諸人所言已如此鄭康成特襲其訛耳劉歆大禘則終王之説是每王一世方一舉禘禮又與五年之説不合云蕙田案祫祭太祖東向穆北向昭南向此室中之位也髙祖南靣穆東向昭西向此堂上之位也古禮之變始此至髙祖幄帳在堂上西北隅太牢中分左帝右后則又非禮之禮矣而受胙賜胙及九巵為九獻則猶近古意云漢書平帝本紀元始五年春正月禘祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭禮畢益户賜爵及金帛增秩補吏各有差蕙田案西漢禘祫之制不見正史韋元成傳稱五年殷祭間嵗而祫其所稱引皆出春秋傳非禘祫正義據漢舊儀但言祫祭未及禘祭至後漢張純言漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭是當時祫祭并與公羊傳大祫之旨不同矣又稱元始五年始為禘祭是前此但有祫也禘祫之禮終西漢未有定制後漢書祭祀志建武二年立髙廟於洛陽四時祫祀髙帝為太祖文帝為太宗武帝為世宗如舊文獻通考建武十八年幸長安詔太常行禘禮於髙廟序昭穆父為昭南向子為穆北向後漢書祭祀志建武二十六年有詔問張純禘祫之禮不施行幾年純奏禮三年一祫五年一禘毁廟之主陳於太祖未毁廟之主皆升合食太祖五年再殷祭舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年始行禘禮父為昭南嚮子為穆北嚮父子不並坐而孫從王父禘之為言諦諦諟昭穆尊卑之義以夏四月陽氣在上隂氣在下故正尊卑之義祫以冬十月五榖成熟故骨肉合飲食祖宗廟未定且合祭今宜以時定語在純傳上難復立廟遂以合祭髙廟為常後以三年冬祫五年夏禘之時但就陳祭毁廟主而已謂之殷太祖東靣惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭張純傳建武二十六年詔純曰禘祫之祭不行已久矣三年不為禮禮必壞三年不為樂樂必崩宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟與未毁廟之主皆登合食乎太祖五年而再殷漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟會始為禘祭又前十八年親幸長安亦行此禮禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也斯典之廢於兹八年謂可如禮施行以時定議帝從之自是禘祫遂定蕙田案祭祀志稱三年冬祫五年夏禘但陳毁廟主是張純奏定後雖三年五年之期冬祫夏禘之時較前稍異而未毁廟之主仍未合食也章帝本紀建初七年八月飲酎髙廟禘祭光武皇帝孝明皇帝甲辰詔書云祖考來假明哲之祀豫末小子質又菲薄仰惟先帝蒸蒸之情前修禘祭以盡孝敬朕得識昭穆之序寄逺祖之思今年大禮復舉加以先帝之坐悲傷感懷樂以迎來哀以送往雖祭亡如在而空虛不知所裁庶或享之豈亡克慎肅雍之臣辟公之相皆助朕之依依今賜公錢四十萬卿半之及百官執事各有差蕙田案公羊傳毁廟之主陳於太祖未毁廟之主皆升合食太祖謂之大祫漢制但以毁廟主合食未毁廟之主不合食義無所裁後漢張純亦不能是正又禘祫雖有冬夏之分祭之時俱但陳毁廟主仍以禘祫相混名雖分而實未異也右漢禘祫三國蜀志先主傳章武元年夏四月大赦改元祫祭髙皇帝以下魏志齊王本紀正始六年冬十一月祫祭太祖廟通典魏明帝太和六年尚書難王肅以曽子問唯祫於太祖羣主皆從而不言禘知禘不合食肅答曰以為禘祫殷祭羣主皆合舉祫則禘可知也袁準正論曰先儒或以為同或以為異然祫及壇墠禘及郊宗石室此所及逺近之殺也大傳曰禮不王不禘諸侯不禘降於天子也若禘祫同貫此諸侯亦不得祫非徒不禘也武宣皇后太和四年六月崩至六年三月有司以今年四月禘告王肅議曰今宜以崩年數案春秋魯閔公二年夏禘於莊公是時縗絰之中至二十五月大祥便禘不復禫故譏其速也去四年六月武宣皇后崩二十六日晚葬除服即吉四時之祭皆親行事今當計始除服日數如此禮須到禫月乃禘趙怡等以為皇帝崩二十七月之後乃得禘祫王肅又奏如鄭玄言各於其廟則無以異四時常祀不得謂之殷祭以粢盛百物豐衎備具為殷祭者夫孝子盡心於事親致敬於四時比時具物不可以不備無緣儉祭其親纍年而後一豐其饌夫謂殷者因以祖宗並陳昭穆皆列故也設以為毁廟之主皆祭謂殷者夫毁廟祭於太祖而六廟獨在其前所不合宜非事之理近尚書難臣以曽子問惟祫于太祖羣主皆從而不言禘知禘不合食臣答以為禘祫殷祭羣主皆合舉祫則禘可知也論語孔子曰禘自既灌而往者吾不欲觀之矣所以特禘者以禘大祭故欲觀其盛觀也禘祫大祭獨舉禘則祫亦可知也於禮記則以祫為大於論語則以禘為盛進退未知其可也漢光武時言祭禮以禘者毁廟之主皆合於太祖祫者惟未毁廟之主合而已矣鄭玄以為禘者各於其廟原其所以夏商夏祭曰禘然其殷祭亦名大禘商頌長發是大禘之歌也至周改夏祭曰礿以禘惟為殷祭之名周公以聖德用殷之禮故魯人亦遂以禘為夏祭之名是以左傳所謂禘於武宫又曰蒸嘗禘於廟是四時祀非祭之禘也鄭斯失矣至於經所謂禘者則殷祭之謂鄭據春秋與大義乖案太和八年用王肅議袁準曰祫及壇墠禘及郊宗石室此所及逺近之殺也大傳曰禮不王不禘諸侯不禘降殺於天子也若禘祫同貫此諸侯亦不得祫也然則禘大而祫小謂祫為殷祭者大於四時皆大祭也國語曰禘郊不過繭栗蒸不過把握明禘最大與郊同也公羊傳曰大事者何祫毁廟之主陳於太祖未毁廟之主皆升合食乎太廟何謂也曰夫禘及壇墠則毁廟也俱祭毁廟但所及異耳所及則異毁與未毁則同此論者所惑鄭謂不同是也謂禘不及毁廟則非也劉歆賈逵同毁與未毁是也不别禘祫逺近則非也蕙田案王肅所謂禘者毁廟之主皆合食於太祖是以祫為禘也祫者惟未毁之主合而已矣是以時祫為大祫也其説皆非其破鄭各於其廟之説則是右三國禘祫晉書武帝本紀太康十年太廟成遂祫祭大赦禮志升平五年十月己卯殷祀以帝崩後不作樂通典東晉升平五年五月穆帝崩十月殷興寧三年二月哀皇帝崩明帝太和元年五月皇后庾氏崩廢帝海西公后也十月殷此哀皇帝在周之內庾氏既葬之後殷也大元二十一年十月應殷其年九月孝武崩至隆安三年國家大吉乃循殷事元興三年夏應殷太常博士徐乾等議應用孟秋進用孟冬時宋書禮志晉安帝義熙二年六月白衣領尚書左僕射孔安國啓云元興三年夏應殷祠昔年三月皇輿旋軫其年四月夏應殷而大常博士徐乾等議云應用孟秋臺尋校自泰和四年相承皆用冬夏乾等既伏應孟冬回復追明孟秋非失御史中丞范泰議今雖既祔之後得以蒸嘗而無殷薦之比太元二十一年十月應殷烈宗以其年九月崩至隆安三年國家大吉乃修殷事又禮有喪則廢吉祭祭新主於寢今不設别寢既祔祭於廟故四時蒸嘗以寄追逺之思三年一禘以習昭穆之序義本各異三年喪畢則合食太祖遇時則殷無取於限三十月也當是內臺常以限月成舊就如所言有喪可殷隆安之初果以喪而廢矣月數少多復遲速失中至於應寢而修意所未譬安國又啓范泰云今既祔遂祭於廟故四時蒸嘗如泰此言殷與蒸嘗其本不同既祔之後可親蒸嘗而不得親殷也太常劉瑾云章后喪未一周不應祭臣尋升平五年五月穆皇帝崩其年七月山陵十月殷興寧三年二月哀皇帝崩泰和元年五月海西夫人庾氏薨時為皇后七月葬十月殷此在哀皇再周之內庾夫人既葬之後二殷策文見在廟又文皇太后以隆安四年七月崩陛下追述先旨躬服重制五年十月殷再周之內不以廢事今以小君之哀而泰更謂不得行大禮臣尋永和十年至今五十餘載用三十月輒殷皆見於注記是依禮五年再殷而泰所言非真難臣乃以聖朝所用遲速失中泰為憲司自應明審是非羣臣所啓不允即當責失奏彈而愆慢稽停遂非忘舊請免泰瑾官丁巳詔皆白衣領職初元興三年四月不得殷祠進用十月計常限則義熙三年冬又當殷若更起端則應用來年四月領司徒王謐議曰有非常之慶有非常之禮殷祭舊準不差至於義熙之慶經古莫二雖曰反正理同受命愚謂履運惟新於是乎始宜用四月太常劉瑾議殷無定月考時致敬且禮意尚簡去年十月祠雖于日有差而情典允備宜仍以為正徐乾議三年一祫五年一禘經傳記籍不見補殷之文著作郎徐廣議尋先事海西公泰和六年十月殷祠孝武皇帝寧康二年十月殷祠若依常去前三十月則應用四月也于時蓋有故而遷在冬從太元元年十月殷祠依常三十月則應用二年四月也是追計辛未嵗十月來合六十月而再殷何劭甫注公羊傳云祫從先君來積數為限自僖八年至文二年知為祫祭如此履端居始承源承流領會之節逺因宗本也昔年有故推遷非其常度寧康太元前事可依雖年有曠近之異然追計之理同矣愚謂從復常次者以推歸正之道也左丞劉潤之等議太元元年四月應殷而禮官墮失遂用十月本非正期即以失為始也宜以反初四月為始當用三年十月尚書奏從謐議通志博士陳舒表三嵗一閏五年祭八年又殷兩頭如四實不盈三又十一年殷十四年殷凡間含二則十年四殷與禮五年再殷其義合矣博士徐禪議春秋左氏傳曰嵗祫及壇墠終禘及郊宗石室許慎稱舊説曰終者謂孝子三年喪終則禘于太廟以致新死者也徐邈議禮五年再殷凡六十月分中每三十月殷也大學博士曹述初難云三年之喪其實二十有五月則五年何必六十月禮天子特礿三時皆祫禘祫雖有定年而文無定月案明堂夏六月以禘禮祀周公則今之四月七月日至孟獻子禘其祖則今之五月春秋文公二年大事于太廟則今之六月邈答曰五年再殷象再閏無取三年喪也祫三時皆可者蓋喪終則吉而祫服終無常故祫隨所遇惟春不祫故曰特礿非殷祀常也禮大事有時日故蒸嘗以時况祫之重無定月乎今據徐邈議每三十月當殷祀賀循祫祭圖太祖東向昭北行南向穆南行北向蕙田案以上晉通典宋制殷祭皆即吉乃行武帝永初三年九月十日奏傅亮議權制即吉聖代宜耳宋書禮志文帝元嘉六年九月太學博士徐道娛上議曰祠部下十月三日殷祠十二日蒸祀謹案禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間禮也蓋歷嵗節月無定天子諸侯先後弗同禮稱天子祫嘗諸侯蒸祫有田則祭無田則薦鄭注天子先祫然後時祭諸侯先時祭然後祫有田者既祭又薦新祭以首時薦以仲月然則大祭四祀其月各異天子以孟月殷仲月蒸諸侯孟月嘗仲月祫也春秋僖公八年秋七月禘文公二年八月大事於太廟榖梁傳曰著祫嘗也昭公十五年二月有事於武宫左傳曰禮也又周禮仲冬享蒸月令季秋嘗稻晉春蒸曲沃齊十月嘗太公此並孟仲區别不共之明文矣凡祭必先卜日用丁巳如不從進卜逺日卜未吉豈容二事推期而往理尤可知尋殷蒸祀重祭薦禮輕輕尚異月重寧反同且祭不欲數數則瀆今隔旬頻享恐於禮為煩自經緯墳誥都無一月兩獻先儒舊説皆云殊朔晉代相承未審其原國事之重莫大乎祀愚管膚淺竊以惟疑請詳告下議寢不報蕙田案此言不宜一月兩祭是孝武孝建元年十二月戊子有司奏依舊今元年十月是殷祠之月領曹郎范泰參議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四月殷則猶在禫內下禮官議正國子助教蘇瑋生議案禮三年喪畢然後祫於太祖又云三年不祭唯天地社稷越紼行事且不禫即祭見譏春秋求之古禮喪服未終固無祼享之義自漢文以來一從權制宗廟朝聘莫不皆吉雖祥禫空存無綅縞之變蒸嘗薦祀不異平日殷祀禮既弗殊豈獨以心憂為礙太學博士徐宏議三年之喪雖從權制再祥周變猶服縞素未為純吉無容以祭謂來四月未宜便殷十月則允太常丞臣朱膺之議虞禮云中月而禫是月也吉祭猶未配謂二十七月既禫祭當四時之祭日則未以其妃配哀未忘也推此而言未禫不得祭也又春秋閔公二年吉禘於莊公鄭元云閔公心懼於難務自尊大以厭其禍凡二十二月而除喪又不禫云又不禫明禫內不得禘也案王肅等言於魏朝云今權宜存古禮俟畢三年舊説三年喪畢遇禘則禘遇祫則祫鄭元云禘以孟夏祫以孟秋今相承用十月如宏所上公羊之文如為有疑亦以魯閔設服因言喪之紀制爾何必全許素冠可吉禘縱公羊異説官以禮為正亦求量宜郎中周景逺參議永初三年九月十日奏傅亮議權制即吉御世宜爾宗廟大禮宜依古典則是皇宋開代成凖謂博士徐宏太常丞朱膺之議用來年十月殷祠為允詔可蕙田案此謂禫內不宜殷祭是孝武大明七年二月辛亥有司奏四月應殷祠若事中未得為得用孟秋與不領軍長史周景逺議案禮記云天子祫禘祫嘗祫蒸依如禮文則夏秋冬三時皆殷不唯用冬夏也晉義熙初僕射孔安國啓議自泰和四年相承殷祭皆用冬夏安國又啓永和十年至今五十餘年用三十月輒殷祠博士徐乾據禮難安國乾又引晉咸康六年七月殷祠是不專用冬夏於時晉朝雖不從乾議然乾據禮及咸熙故事安國無以奪之今若來四月未得殷祠遷用孟秋於禮無違參議據禮有證謂用孟秋為允詔可蕙田案以上宋南齊書髙帝本紀建元元年十月己卯車駕殷祀太廟武帝本紀永明五年夏四月車駕殷祀太廟十年十月甲午車駕殷祀太廟蕙田案以上齊通典梁武帝初用謝廣議三年一禘五年一祫謂之殷祭文獻通考梁制三年一禘五年一祫禘以夏祫以冬皆以功臣配其儀頗同南郊尚書左丞何佟之議曰禘於首夏物皆未成故為小祫於秋冬萬物皆成其禮尤大司勳列功臣有六皆祭於大蒸知祫尤大乃及之也近代禘祫並不及功臣有乖典制宜改詔從之蕙田案以上梁陳制五年再殷殷大祫而合祭也蕙田案以上陳北魏書髙祖本紀太和十五年八月乙巳親定禘祫之禮禮志太和十三年正月壬戌髙祖詔曰禮記祭法稱有虞氏禘黃帝大傳曰禘其祖之所自出又稱不王不禘論曰禘自既灌詩頌長發大禘爾雅曰禘大祭也夏殷四時祭礿禘蒸嘗周改禘為祠祭義稱春禘秋嘗亦夏殷祭也王制稱犆礿祫禘祫嘗祫蒸其禮傳之文如此鄭元解禘天子祭圜丘曰禘祭宗廟大祭亦曰禘三年一祫五年一禘祫則合羣毁廟之主於太廟合而祭之禘則增及百官配食者審諦而祭之天子先禘祫而後時祭諸侯先時祭而後禘祫魯禮三年喪畢而祫明年而禘圜丘宗廟大祭俱稱禘祭有兩禘明也王肅鮮禘祫稱天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘宗廟稱禘禘祫一名也合而祭之故稱祫審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉之故稱五年再殷祭不言一禘一祫斷可知矣禮文大略諸儒之説盡具於此卿等便可議其是非尚書遊明根左丞郭祚中書侍郎封琳著作郎崔光等對曰鄭氏之義禘者大祭之名大祭圜丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆圜丘常合不言祫宗廟時合故言祫斯則宗廟祫禘並行圜丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春祭犆礿於嘗於蒸則祫不於三時皆行禘祫之禮中書監髙閭儀曹令李韶中書侍郎髙遵等十三人對稱禘祭圜丘之禘與鄭義同其宗廟禘祫之祭與王義同與鄭義同者以為有虞禘黃帝黃帝非虞在廟之帝不在廟非圜丘而何又大傳稱禘其所自出之祖又非在廟之文論稱禘自既灌事似據爾雅稱禘大祭也頌長發大禘也殷王之祭斯皆非諸侯之禮諸侯無禘禮唯夏殷夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行圜丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名據王氏之義祫而禘祭之故言禘祫總為再殷祭明不異也禘祫一名也其禘祫止於一時止於一時者祭不欲數數則黷一嵗而三禘愚以為過數帝曰尚書中書等據二家之義論禘祫詳矣然於行事取衷猶有未允閭等以禘祫為名義同王氏禘祭圜丘事與鄭同無所間然尚書等與鄭氏同兩名兩祭並存並用理有未稱俱據二議一時禘祫而闕二時之禘事有難從夫先王制禮內緣人子之情外協尊卑之序故天子七廟諸侯五廟大夫三廟數盡則毁藏主於太祖之廟三年而祫祭之世盡則毁以示有終之義三年而祫以申追逺之情禘祫既是一祭分而兩之事無所據毁廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為簡王以禘祫為一祭王義為長鄭以圜丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一名從王禘是祭圜丘大祭之名上下同用從鄭若以數則黷五年一禘改祫從禘五年一禘則四時盡禘以稱今情禘則依禮文先禘而後時祭便即施行著之於令永為世法蕙田案以圜丘為禘鄭氏之臆説也明根等以審諦五精星辰釋之誣矣始祖所自出並不立廟禘之於始祖廟而已髙閭乃云不在廟非圜丘而何益又誣矣從鄭固非從王亦未為是詔言禘祫既是一祭分而兩之事無所據夫禘祫之為兩祭有經傳明文可據指為一祭皆諸妄議溷之耳世宗景明二年夏六月祕書丞孫惠蔚上言臣聞國之大禮莫崇明祀祀之大者莫過禘祫所以嚴祖敬宗追養繼孝合享聖靈審諦昭穆遷毁有恆制尊卑有定體是以惟王創制為建邦之典仲尼述定為不刋之式暨秦燔詩書鴻籍泯滅漢氏興求拾掇遺篆淹中之經孔安所得唯有卿大夫士饋食之篇而天子諸侯享廟之祭禘祫之禮盡亡曲臺之記戴氏所述然多載尸灌之義牲獻之數而行事之法備物之體蔑有具焉今之取證唯有王制一簡公羊一册考此二書以求厥旨自餘經傳雖時有片記至於取正無可依攬是以兩漢淵儒魏晉碩學咸據斯文以為朝典然持論有深淺及義有精浮故令傳記雖一而探意乖舛謹案王制曰天子犆礿祫禘祫嘗祫蒸鄭玄曰天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾之後五年而再殷祭一祫一禘春秋公羊魯文二年八月丁卯大事於太廟傳曰大事者何大祫也大祫者何合祭也毁廟之主陳於太祖未毁廟之主皆升合食於太祖五年而再殷祭何休曰陳者就陳列太祖前太祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆又曰殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審諦無所遺失察記傳之文何鄭禘祫之義略可得聞然則三年喪畢祫祭太祖明年春祀遍禘羣廟此禮之正也古之道也叉案魏氏故事魏明帝以景初三年正月崩至五年正月積二十五晦為大祥太常孔美博士趙怡等以為禫在二十七月到其年四月依禮應祫散騎常侍王肅博士樂祥等以為禫在祥月至其年二月宜應祫祭雖孔王異議六人殊制至於喪畢之祫明年之禘其議一焉陛下永惟孝思因心即禮取鄭捨王禫終此晦來月中旬禮應大祫六室神祏升食太祖明年春享咸禘羣廟自兹以後五年為常又古之祭法時祫並行天子先祫後時諸侯先時後祫此於古為當在今則煩且禮有升降事有文節適時之制聖人弗違當祫之月宜減時祭以從要省然大禮久廢羣議或殊以臣觀之理在無怪何者心制既終二殷惟始禘祫之正實在於斯若停而闕之唯行時祭七聖不聞合享百辟不覩盛事何以宣昭令問垂式後昆乎皇朝同等三代治邁終古而令徽典闕於昔人鴻美漸於往志此禮所不行情所未許請付禮官集定儀注詔曰禮貴循古何必改作且先聖人遵綿代恆典豈朕沖暗所宜革之且禮祭之議國之至重先代碩儒論或不一可付八座五省太常國子參定以聞七月侍中録尚書事北海王祥等言奉旨集議僉以為禘祫之設前代彞典惠蔚所陳有允舊議請依前尅敬享清宫其求省時祭理實宜爾但求之解注下逼列國兼時奠之敬事難輒省請移仲月擇吉重聞制可延昌四年正月世宗崩肅宗即位三月甲子尚書令任城王澄奏太常卿崔亮上言秋七月應祫祭於太祖今世宗宣武皇帝主雖入廟然蒸嘗時祭猶别寢室至於殷祫宜存古典案禮三年喪畢祫於太祖明年春禘於羣廟又案杜預亦云卒哭而除三年喪畢而禘魏武宣后以太和四年六月崩其月既葬除服即吉四時行事而猶未禘王肅韋誕並以為今除即吉故特時祭至於祫禘宜存古禮髙堂隆亦如肅議於是停不殷祭仰尋太和二十三年四月一日髙祖孝文皇帝崩其年十月祭廟景明二年秋七月祫於太祖三年春禘於羣廟亦三年乃祫謹準古禮及晉魏之議并景明故事愚謂來秋七月祫祭應停宜待年終然後祫禘詔曰太常援引古今並有證據可依請冬十二月丁未任城王澄尚書崔亮奏謹案禮記曽子問曰諸侯旅見天子不得成禮者幾孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝會孔子應云五而獨言四明不廢朝賀也鄭元禮注云魯禮三年喪畢祫於太祖明年春禘羣廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公會劉子及諸侯於平邱八月歸不及於祫冬公如晉明十四年春歸祫明十五年春乃禘經曰二月癸酉有事於武宫傳曰禘於武公謹案明堂位曰魯王禮也喪畢祫禘似有退理詳考古禮未有以祭祀廢元會者禮云吉事先近日脫不吉容改筮三旬尋攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無踈怠之譏三元有順軌之美既被成旨宜即宣行臣等伏度國之大事在祀與戎君舉必書恐貽後誚輒訪引古籍竊有未安臣等學闕通經識不稽古備位樞納可否必陳冒陳所見伏聽裁衷靈太后令曰可如所執胡氏寅曰宗廟之祭奠重於禘祫而自漢以來諸儒之論紛紜交錯誠如聚訟莫得其要則混然行之不有達理真儒擇乎經訓而折其衷何以破古昔之昏昏示後來之昭昭耶諸儒之言曰天子禘諸侯祫大夫享庶人薦此尊卑之等也所以知天子禘者以禮云禮不王不禘知之也所以知諸侯祫者魯侯國當用祫而以賜天子禮樂故春秋中有禘無祫而孔子曰魯之郊禘非禮也言諸侯不當用禘也禘祫者合祭之名耳天子有所自出之帝為東向之尊餘廟以昭穆合食于前是之謂禘諸侯無所自出之帝則合羣廟之主而食於太廟是之謂祫若其時其物則視其所得用而隆殺之矣以此斷禘祫豈不明哉通考馬氏曰案以禘祫為共一祭而異名以禘為合祭祖宗審諦昭穆之議漢儒之説也近代諸儒多不以為然獨致堂從之然大傳禮不王不禘王者禘其祖之所自出以其祖配之而即斷之曰諸侯及其太祖大夫士有大事省于其君于祫及其髙祖其文意亦似共説一祭天子則謂之禘所謂不王不禘而祭則及其祖之所自出諸侯則不可以言禘而所祭止太祖大夫士又不可以言祫必有功勞見知於君許之祫則於祫可及髙祖蓋共是合祭祖宗而以君臣之故所及有逺近故異其名所以魯之禘祭者即祫也若大傳文諸侯之下更有一祫字則其義尤明蕙田案諸儒以禘祫皆合祭此聚訟所由起也但胡氏仍主禘祫皆合祭而馬氏又於大傳文諸侯下添祫字強經從我難協人心又案以上北魏隋書禮儀志後齊禘祫如梁之制每祭一太牢皇后預蕙田案以上北齊後周禘祫則於太祖廟亦以皇后預其儀與後齊同蕙田案以上北周右南北朝禘祫隋三年一祫以孟冬遷主未遷主合食於太祖之廟五年一禘以孟夏其遷主各食其所遷之廟未遷之主各於其廟禘祫之日則停時享而陳諸瑞物及伐國所獲珍竒於廟廷及以功臣配享意田案以上隋禘祭各於其廟仍鄭謬也舊唐書禮儀志三年一祫以孟冬五年一禘以孟夏唐書禮樂志祫禘大祭也祫以昭穆合食於太祖而禘以審諦其尊卑此祫禘之義而為禮者失之至於年數不同祖宗失位而議者莫知所從禮曰三年一祫五年一禘傳曰五年再殷祭髙宗上元三年十月當祫而有司疑其年數太學博士史元璨等議以為新君喪畢而祫明年而禘自是之後五年而再祭蓋後禘去前禘五年而祫常在禘後三年禘常在祫後二年魯宣公八年禘僖公蓋二年喪畢而祫明年而禘至八年而再禘昭公二十年禘至二十五年又禘此可知也議者以元璨等言有經據遂從之睿宗崩開元六年喪畢而祫明年而禘自是之後禘祫各自以年不相通數凡七祫五禘至二十七年禘祫並在一嵗有司覺其非乃議以為一禘一祫五年再殷宜通數而禘後置祫嵗數逺近二説不同鄭玄用髙堂隆先三而後二徐邈先二後三而邈以謂二禘相去為月六十中分三十置一祫焉此最為得遂用其説由是一禘一祫在五年之間合於再殷之義而置祫先後則不同焉韋韜傳開元時遷太常髙宗上元三年將祫享議者以禮緯三年祫五年禘公羊家五年再殷祭二家舛互諸儒莫能決太學博士史元璨議曰春秋僖公三十三年十二月薨文公之二年八月丁卯大享公羊曰祫也則三年喪畢新君之二年當祫明年當禘羣廟又宣公八年禘僖公宣公八年皆有禘則後禘距前禘五年此則新君之二年祫三年禘爾後五年再殷祭則六年當祫八年禘昭公十年齊歸薨十三年喪畢當祫為平邱之會冬公如晉至十四年祫十五年禘傳曰有事於武宫是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事於襄宫是也則禘後三年而祫又二年而禘合於禮議遂定後睿宗喪畢祫於廟至開元二十七年禘祭五祫祭七是嵗縚奏四月嘗已禘孟冬又祫祀禮叢數請以夏禘為大祭之源自是相循五年再祭矣通典開元六年秋睿宗皇帝喪畢祫享於太廟自後相承三年一祫五年一禘各自計年不相通數至二十七年凡經五禘七祫其年夏禘訖冬又當祫太常議曰禘祫二禮俱為殷祭祫謂合食祖廟禘謂諦序尊卑申先君逮下之慈成羣嗣奉親之孝事異常享有時行之而祭不欲數數則黷亦不欲踈踈則怠故王者法諸天道制祀典焉蒸嘗象時禘祫如閏天道大成宗廟法之再為殷祭者也謹案禮記王制鄭玄注周官宗伯並云國君嗣位三年喪畢祫於太祖明年禘於羣廟自爾以後五年再殷一祫一禘漢帝古事貞觀以後並用此禮以為三年一閏天道大備故也此則五年再殷通計其數一禘一祫迭相乘矣今太廟禘祫各自數年兩岐俱不通計或比年頻合或同嵗再序或一禘之後併為冉祫或五年之內驟有三殷法天象閏之期既違其度五嵗再殷之祭數又不同求之禮文頗為乖失夫以法天之度既有指歸稽古之禮若兹昭著禘祫二祭通計明矣今請以開元二十七年己卯四月禘至辛巳年十月祫至甲申年四月又禘至景戌年十月又祫至己丑年四月又禘至辛卯年十月又祫自此五年再殷周而復始又禘祫之説非唯一家五嵗再殷之文既相師矣法天象閏之理大抵亦同而禘後置祫或近或逺盈縮之數有二法焉鄭玄髙堂生則先三而後二徐邈之議則先二而後三謹案鄭氏所序先三之法約三祫五禘之文以為甲年既禘丁年當祫己年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫四十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖小有愈於其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又分三等之言本舉全數三周有半實整三年於此置祫不違文矣何必拘滯三正乎蓋千慮一失通儒之蔽也徐氏之議有異於是研覆周審最為憑準以二禘相去為月六十中分三十置一祫焉若甲年既禘丙年冬祫己年夏禘辛年冬祫有象閏法毫釐不偏三年一祫之禮既無乖越五嵗再殷之制踈數又均校之諸儒義實長矣今請依據以定二殷先推祭月周而復始時皆以其議為允開元禮蕙田案開元禮禘祫儀同時享儀其注中儀節不同之處録如左餘詳時享門陳設祫享設尊彞於廟堂上下每座斚彞一黃彞一犧樽二象樽二著樽二山罍二在堂上皆於神座之左獻祖太祖髙祖髙宗樽彞在前楹間北向懿祖代祖太宗中宗睿宗樽彞在户外南向其壺樽二太樽二山罍四在堂下階間北向西上禘享則雞彞鳥彞餘同祫享攝事簋簠㽅鉶與正數半之享日未明五刻太廟令服其服布昭穆之座于户外自西序以東皇八代祖獻祖宣皇帝皇六代祖太祖景皇帝皇髙祖神堯皇帝皇祖髙宗天皇太帝座皆北廂南靣皇七代祖懿祖光皇帝皇五代祖代祖元皇帝皇曽祖太宗文武聖皇帝皇伯考中宗孝和皇帝皇考睿宗大聖真皇帝座於南廂北向每座皆設黼扆莞席紛純藻席畫純次席黼純左右几省牲器膟膋腸間脂祫禘祝史洗肝於鬱鬯餘同圜丘儀晨祼太廟令帥其屬陳瑞物於廟廷大階之西上瑞為前中下相次及伐國所得寶器上次先後亦然俱藉以席攝事不陳瑞物寶器未明二刻陳腰輿于東陛之東每室各二皆西面北上立定贊引引太廟令太祝宫闈令帥內外執事者以腰輿自東陛升詣獻祖室入開塪室太祝宫闈令奉出神主各置於輿出詣座前奉神主置於座訖以次奉出懿祖以下如獻祖儀少退攝事同饋食祫享樂終八節止諸座皆然祫禘祝云晷度環周嵗序云及永懷追慕伏增逺感謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦泛齊肅雍明獻恭備祫享餘字並同禘享祝云祗薦禘事太祖以下稱臣祫禘以功臣配享享日未明一刻太廟令布功臣神座於太廟之庭吏部尚書贈司空鄖國公殷開山光祿卿渝國公劉政會開府儀同三司淮安靖王神通禮部尚書贈司空河間元王孝恭右配享髙祖廟庭太階之東少南西向以北為上下並于此司空贈太尉梁國文昭公房玄齡特進贈司空鄭國文貞公魏徴洛州都督贈尚書左僕射蔣國忠公屈突通開府儀同三司贈司徒申國文獻公髙士廉右配享太宗廟庭少南西向以北為上司空太子太師贈太尉英國貞武公李績中書令贈尚書右僕射髙唐縣公馬周尚書左僕射兼太子少傅北平縣公張行成右配享髙宗廟庭少南西向以北為上侍中譙國公桓彥範侍中平陽郡公敬暉中書令兼吏部尚書濮陽郡公張柬之特進博陵郡公崔元暐中書令南陽郡公袁恕已右配享中宗廟庭少南西向以北為上尚書左僕射太子少傅贈司空許國文貞公蘇瓌尚書左丞相太子少保徐國公劉幽求右配享睿宗廟庭少南西向以北為上諸座各設版於座首其版文各具題官爵姓名每座各設壺樽二於左北向元酒在西加勺羃置爵於樽下設洗於終獻罍洗東南北向太廟令與良醖令以齊實樽如常堂上設饌訖太官令帥進饌者出奉饌入祝迎引於座左各設於座前太官令以下出祝還樽所亞獻將畢贊引引獻官詣罍洗盥手洗爵詣酒樽所執樽者舉羃獻官酌酒諸助奠者皆酌酒訖贊引引獻官進詣首座前東面奠爵贊引引還本位于獻官進奠諸助奠者各進奠于座還樽所于堂上徹豆祝進首座前徹豆還樽所通典天寶八載閏六月五日敕文禘祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熙纍盛既錫無疆之休合享登神思𢎞不合之典自今以後每禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若元象下以盡虔恭之誠無違至道比來每緣禘祫則時享暫停事雖適於從宜禮或虧於必備以後每緣禘祫其常享無廢享以素饌三焚香以代三獻胡氏寅曰唐非李聃之裔而以聃為祖孝子慈孫豈忍為也使聃而果祖也猶非所自出之帝不得與合食之享况非其祖而加之祖考之上是有兩姓之廟也此李唐典禮之大失而當時無一人言者君好諛而臣獻諂故雖以他人為祖而終不得知又况其餘乎册府元龜建中二年二月復肅宗神座於寢宫先是寶應二年西戎犯京師焚建陵之寢室至是始創復焉十月癸卯祫享太廟始奉獻祖神主出行祫禮初寶應二年元宗肅宗神主祔廟始遷獻祖懿祖神主於西夾室是時禮儀使于休烈以國喪畢將行祫享以太祖既位當東向獻祖懿祖屬尊於太祖若同祫享即太祖不得居正位於是永閟二神主於西夾室至是有司亦以國喪既畢當行祫禮於是太常博士陳京建議請準魏晉以來祫禮奉二主出同祫享與太祖並列昭穆而虛東向之位又云若以二祖同享謂太祖失尊位即請奉二祖神主於德明皇帝廟祫享詔下尚書省雜議禮儀使顔真卿請依蔡謨等議至祫享之日奉獻祖神主居東面之位自懿祖太祖洎諸祖宗遵左昭右穆之列時宰臣百寮並同真卿之議奏留中不出將及祫享真卿又奏請從蔡謨議為定從之通典建中二年九月太常博士陳京上疏言今年十月祫享太廟并合享遷廟獻祖懿祖二神主春秋之義毁廟之主陳於太祖未毁廟之主皆升合食於太祖則太祖之位在西而東向其下子孫昭穆相對南北為别無毁廟遷主不享之文徴是禮也自於周室而國朝祀典當與周異周以后稷配天太廟為始封之祖而下乃立廟廟毁主當遷者故太祖東向之位全其尊而不疑然今年十月祫享太廟伏請據魏晉舊事為比則構築别廟東晉以征西等四府君為别廟至禘祫之時則於太廟正太祖之位以申其尊别廟登髙皇太皇征西等四府君以序其親伏以國家若用此義則宜别為獻祖懿祖立廟禘祫祭之以重其親則太祖於太廟遂居東向以全尊伏以德明興聖二皇帝曩既立廟至禘祫之時常用享禮今别廟之制便就興聖廟藏祔為宜敕下尚書省集百僚議禮儀使太子少師顔真卿議曰伏以太祖景皇帝以受命始封之功處百代不遷之廟配天崇享是極尊嚴且至禘祫之時暫居昭穆之位屈己申孝敬奉祖宗緣齒族之禮廣尊先之道此實太祖明神蒸蒸之本意亦所以化被天下率循孝悌請依晉蔡謨等議奉獻祖神主居東靣之位自懿祖太祖洎諸祖宗遵左昭右穆之列舊唐書禮儀志貞元七年十一月二十八日太常卿裴郁奏曰禘祫之禮殷周以遷廟皆出太祖之後故得合食有序尊卑不差及漢髙受命無始祖以髙皇帝為太祖太上皇髙帝之父位廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其髙皇太祖處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西潁川等四府君亦為屬尊不在昭穆合食之列國家誕受天命纍聖重光景皇帝始封唐公實為太祖中間世數既近於三昭三穆之內故皇家太廟唯有六室其𢎞農府君宣光二祖尊於太祖親盡即遷不在昭穆之數著在禮志可舉而行開元中加置九廟獻懿二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百代不遷而居昭穆獻懿二祖親盡廟遷而居東向徴諸故實實所未安請下百寮僉議敕旨依陳京傳貞元七年太常卿裴郁上言獻懿親盡廟遷猶居東向非禮之祀神所不享願下羣臣議於是太子左庶子李嶸等上言謹案晉孫欽議太祖以前雖有主禘祫所不及其所及者太祖後未毁已升藏於二祧者故雖百代及之獻懿在始封前親盡主遷上擬三代則禘祫所不及太祖而下若世祖則春秋所謂陳於太祖者漢議罷郡國廟丞相韋玄成議太上皇孝惠親盡宜毁太上主宜瘞於園惠主遷髙廟太上皇在太祖前主瘞於園不及禘祫獻懿比也惠遷髙廟在太祖後而及禘祫世祖比也魏明帝遷處士主置園邑嵗時以令丞奉薦東晉以征西等祖遷入西除同謂之祧皆不及祀故唐初下訖開元禘祫猶虛東向位洎立九廟追祖獻懿然祝於三祖不稱臣至德時復作九廟遂不為𢎞農府君主以祀不及也廣德中始以景皇帝當東向位以獻懿兩主親盡罷祫而藏顔真卿引蔡謨議復奉獻主東向懿昭景穆不記謨議晉未嘗用而唐一王法容可準乎臣等謂嘗禘郊社神無二尊瘞毁遷藏各以義斷景皇帝已東向一日改易不可謂禮宜復藏獻懿二主於西室以本祭法逺廟為祧去祧而壇去壇而墠壇墠有禱祭無禱止之義太祖得正無所屈吏部郎中柳冕等十二人議曰天子以受命之君為太祖諸侯以始封之主為祖故自太祖以下親盡迭毁洎秦滅學漢不暇禮晉失宋因故有連五廟之制有虛太祖之位且不列昭穆非所謂有序不建迭毁非所謂有殺連五廟非所謂有别虛太祖位非所謂一尊此禮所由廢也傳曰父為士子為天子祭以天子葬以士今獻懿二祖在唐未受命時猶士也故髙祖太宗以天子之禮祭之而不敢奉以東向位今而易之無乃亂先帝序乎周有天下追王太王王季以天子禮及其祭則親盡而毁漢有天下尊太上皇以天子之禮及祭也親盡而毁唐家追王獻懿二祖以天子禮及其祭也親盡而毁復何所疑周官有先公之祧先王之祧先公遷主藏后稷之廟其周未受命之祧乎先王遷主藏文武之廟其周已受命之祧乎故有二祧所以異廟也今自獻而下猶先公也自景而下猶先王也請别廟以居二祖則行周道復古制便工部郎中張薦等請自獻而降悉入昭穆虛東向位司勳員外郎裴樞曰禮親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故社稷重太祖之上復追尊焉則尊祖之義乖太廟之外别祭廟焉則社稷不重漢韋元成請瘞主於園晉虞喜請瘞廟兩階間喜據左氏自證曰先王日祭祖考月祀曽髙時享及二祧嵗祫及壇墠終禘及郊宗石室是為郊宗之祖喜請夾室中為石室以處之是不然何者夾室所以居太祖下非太祖上藏主所居未有卑處正尊居旁也若建石室於園寢安遷主采漢晉舊章祫禘率一祭庶乎春秋得變之正是時京以考功員外郎又言興聖皇帝則獻之曽祖懿之髙祖以曽孫祔曽髙之廟人情大順也京兆少尹韋武曰祫則大合禘則序祧當祫之嵗常以獻東向率懿而後以昭穆極親親及禘則太祖筵於西列衆主左右是於太祖不為降獻無所厭時諸儒以左氏子齊聖不先父食請迎獻主權東向太祖暫還穆位同官尉仲子陵曰所謂不先食者邱明正文公逆祀儒者安知夏后世數未足時言禹不先鯀乎魏晉始祖率近始祖上皆有遷主引閟宫詩則永閟可也因虞主則瘞園可也緣逺祧則築宫可也以太祖實卑則虛位可也然永閟與瘞園臣子所不安若虛正位則太祖之尊無時而申請奉獻懿二祖遷於德明興聖廟為順或曰二祖别廟非合食且德明興聖二廟禘祫之年皆有薦享是已分食奚獨疑二祖乎國子四門博士韓愈質衆議自申其説曰一謂獻懿二主宜永藏夾室臣不謂可且禮祫祭毁主皆合食今藏夾室至祫得不食太廟乎若二祖不與不謂之合矣二謂兩主宜毁而瘞之臣不謂可天子七廟一壇一墠遷主皆藏於祧雖百代不毁祫則太廟享焉魏晉以來始有毁瘞之議不見於經唐家立九廟以周制推之獻懿猶在壇墠可毁瘞而不禘祫乎三謂二祖之主宜各遷諸陵臣不謂可二祖享太廟二百年一日遷之恐眷顧依違不即享於下國四謂宜奉主祔興聖廟而不禘祫臣不謂可禮祭如在景皇帝雖太祖於獻懿子孫也今引子東向廢父之祭不可為典五謂獻懿宜别立廟京師臣不謂可凡禮有降有殺故去廟為祧去祧為壇去壇為墠去墠為鬼漸而逺者祭益希昔魯立煬宫春秋非之謂不當取已毁之廟既藏之主復築宫以祭今議正同故臣皆不謂可古者殷祖元王周祖后稷太祖之上皆自為帝又世數已逺不復祭之故始祖得東向也景皇帝雖太祖於獻懿子孫也當禘祫獻祖居東向位景從昭若穆是祖以孫尊孫以祖屈神道人情其不相逺又常祭衆合祭寡則太祖所屈少而所伸多與其伸孫尊廢祖祭不以順乎冕又上禘祫議證十四篇帝詔尚書省會百官國子儒官明定可否左司郎中陸淳奏案禮及諸儒議復太祖之位正也太祖位正則獻懿二主宜有所安今議者有四曰藏夾室曰置别廟曰各遷於園曰祔興聖廟臣謂藏夾室則享獻無期非周人藏二祧之義置别廟論始曹魏禮無傳焉司馬晉議而不用遷諸園亂宗廟之制唯祔興聖廟禘若祫一祭庶乎得禮帝依違未決也權德輿遷廟議禮有五經莫重于祭祭稱百順實受其福故曰萬物本乎天人本乎祖以太祖始封之重當殷祭東嚮之尊百代不遷下統昭穆此孝享嚴禋之極制也周自后稷十六代至武王毁廟遷主皆太祖之後故序列昭穆合食無嫌漢之太上皇主瘞于園寢尋置别廟是為屬尊故周漢皆太祖之位正自魏至隋則虛其位魏明帝初以太皇别廟未成故權設對祫後有司定七廟之制太祖以下為昭穆二祧旋至三少帝運移于晉不以兄弟為代數故元帝上繼武帝簡文上繼元帝至安帝時後征西至京兆四府君遷盡未及殷祭運移於宋初永和中疑四府君所藏之禮詔公卿博議范宣請特築一室韋泓請屋朽乃止蔡謨亦請改築别室未展者當入就太廟以征西府君東向議竟不行宋齊梁陳北齊周隋悉虛其位以待太祖皆以短祚其禮不申則自魏以降太祖列昭穆之位非通例也武德中立親廟四自宣簡公而下貞觀中立七廟六室自𢎞農府君而下開元中始制九廟追尊獻祖懿祖故自武德至於開元太祖在四廟七廟九廟之數則東向之虛又非例也廣德二年將及殷祭有司以二祖親盡當遷太祖九室既備其年冬祫於是正太祖於東向藏二主於夾室凡十八年建中二年冬祫有司誤引蔡謨征西之議以獻祖居東向懿祖為昭太祖為穆此誠乖疑倒置之大者也議者或引春秋禹不先鯀湯不先契文武不先不窋以為證且湯與文武皆太祖之後理無所疑至於禹不先鯀安知説者非啓與太康之代而左邱明因而記之邪向者有司以二主藏夾室非宜則可闕殷祭非敬則可處東向之位則不可是以貞元七年冬太常上奏請下百寮僉議詔可其奏八年春有于頎等一十六狀至十一年又詔尚書省集議有陸淳宇文炫二狀前後異同有七家之説至於藏夾室虛東向逺遷園寢分享禘祫如幣玉虞主而枚卜瘞埋膚引滋多皆失禮意臣等審細討論唯置别廟及祔於德明興聖二説最為可據德明興聖之廟猶别廟也等於創立此又易行伏以德明皇帝于舞羽之際與稷契同功契後為殷向五百年稷後為周逾八百年德明流光無窮啓皇運於後景福靈長與天地凖又獻懿二祖於興聖皇帝為曽為元猶周人祔於先公之祧也此亦亡於禮者也明尊祖之道正大祭之義禮文祀典莫重於是凡議同者七狀百有餘人其中名儒禮官講貫詳熟臣今獲二宗伯職業所守典禮是司研考古今罄竭愚管豈敢以疑文虛説黷陛下嚴敬重難之心其夾室等五家不安之説謹具條上伏唯聖慮裁擇藏夾室右太祖已下毁廟主之所藏也今若以二祖之主同在夾室當禘祫之際代祖元皇帝以遷主合食而二主留在夾室神靈何所依邪或主有禱則祭無禱則止如殷祭何如或云每禘祫時就享於夾室如合食何此其不可也虛東向右自魏晉方有太祖已上府君以備親廟自太祖已下昭穆既列太祖之上親盡皆遷然後正東向之位明不遷之重自魏至隋皆以短厯或遷離多故其禮未行故虛東向自武德後貞親開元加廟數太祖尊位厭而未申故虛東向今九廟已備代祖已遷而議虛東向則無其例此其不可也園寢右漢魏太上皇處士居園寢之制近在京師故於遷主無有異議今二祖園寢皆在趙州法駕撰儀經途遐逺此其不可也分享右尊祖敬宗至當無二審禘合享王者所先議者請常以獻祖受祫太祖受禘五年之間迭居東向就如其説則當祫之時太祖固序昭穆矣當禘之禮獻祖何所依也從古以來無此義例此其不可也瘞埋右議者引古者貴祖命斂幣玉藏諸兩階之間又埋虞主於廟門外之道左以為此類彼主命幣玉者既反告則無所用矣彼虞主用桑者既練祭則無所用矣不忍褻瀆故斂而藏之徹而埋之豈如栗主依神雖廟毁而常存之制哉此其不可也况兩階之間與門外道左皆祖廟也今則下瘞於子孫之廟于理安乎此其又不可也以前謹具周漢太祖居東向魏晉已下虛東向并貞元八年十一月兩度會議一十八狀內夾室等五家不安之説如前謹録奏聞謹奏昌黎集四門博士韓愈獻議今輒先舉衆議之非然後申明其説一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不合食于太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹案禮記天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而享焉自魏晉以降始有毁瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况于毁瘞而不禘祫乎三曰獻懿廟主宜各遷于其陵所臣又以為不可二祖之祭于京師列于太廟也二百年矣今一朝遷之豈惟人聽疑抑恐二祖之靈眷顧依違不即享于下國也四曰獻懿廟主宜祔于興聖廟而不禘祫又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟于京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而愈逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至于禘祫也合食則禘無其所廢祭則于義不通此五説者皆所不可故臣博采前聞求其折中以為殷祖玄王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多此于伸孫之尊廢祖之祭不亦順乎朱子韓文考異韓公本意獻祖為始祖其主當居初室百世不遷懿祖之主則當遷於太祖之西夾室而太祖以下以次列于諸室四時之享則惟懿祖不與而獻祖太祖以下各祭于其室室自為尊不相降厭所謂所伸之祭常多者也禘祫則惟獻祖居東向之位而懿祖太祖以下皆序昭穆南北相向于前所謂祖以孫尊孫以祖屈而所屈之祭常少者也韓公禮學精深蓋諸儒所不及故其所議獨深得夫孝子慈孫報本反始不忘其所由生之本意真可為萬世之通法不但可施于一時也程子以為不可漫觀者其謂此類也歟但其文字簡嚴讀者或未遽曉故竊推之以盡其意云觀承案韓議最精朱子所以極推尊之然謂韓意以獻祖為始祖其主當居初室百世不遷則未見其然觀韓子請遷元宗廟議專以景皇為太祖比周之后稷則獻懿俱在祧遷之列可知但其以禘祫俱為合祭而禘祫之分則未有其義此直沿唐之制而未及考古以正之亦所謂事異殷周禮從而變也夫蕙田案韓議已見陳京傳因其過略故復附其全篇唐書禮樂志禮禘祫太祖位於西而東向其子孫列為昭穆昭南向而穆北向雖已毁廟之主皆出而序於昭穆殷周之興太祖世逺而羣廟之主皆出其後故其禮易明漢魏以來其興也勃又其上世微故創國之君為太祖而世近毁廟之主皆在太祖之上於是禘祫不得如古而漢魏之制太祖而上毁廟之主皆不合食唐興以景皇帝為太祖而世近在三昭三穆之內至禘祫乃虛東向之位而太祖與羣廟列於昭穆代宗即位祔元宗肅宗而遷獻祖懿祖於夾室於是太祖居第一室禘祫得正其位而東向而獻懿不合食建中二年大學博士陳京請為獻祖懿祖立别廟至禘祫則享禮儀使顔真卿議曰太祖景皇帝居百代不遷之尊而禘祫之時暫居昭穆屈已以奉祖宗可也乃引晉蔡謨議以獻祖居東向而懿祖太祖以下左右為昭穆由是議者紛然貞元十七年太常卿裴郁議以太祖百代不遷獻懿二祖親盡廟遷而居東向非是請下百僚議工部郎中張薦等議與真卿同太子左庶子李嶸等七人曰真卿所用晉蔡謨之議也謨為禹不先鯀之説雖有其言當時不用獻懿二祖宜藏夾室以合祭法逺廟為祧而壇墠有禱則祭無禱則止之義吏部郎中柳冕等十二人曰周禮有先公之祧遷主藏於后稷之廟其周未受命之祧乎又有先王之祧其遷主藏於文武之廟其周已受命之祧乎今獻祖懿祖猶周先公也請築别廟以居之司勳員外郎裴樞曰建石室於寢園以藏神主至禘祫之嵗則祭之考功員外郎陳京同官縣尉仲子陵皆曰遷神主於德明興聖廟京兆少尹韋武曰祫則獻祖東向禘則太祖東向十一年左司郎中陸淳曰議者多矣不過三而已一曰復太祖之正位二曰並列昭穆而虛東向三曰祫則獻祖禘則太祖迭居東向而復正太祖之位為是然太祖復位則獻懿之主宜有所歸一曰藏諸夾室二曰置之别廟三曰遷於園寢四曰祔於興聖然而藏諸夾室則無享獻之期置之别廟則非禮經之文遷於寢園則亂宗廟之儀惟祔於興聖為是至十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王詔等五十五人請遷懿祖祔興聖廟議遂定由是太祖始復東向之位舊唐書陳京傳貞元十九年將禘祭京奏禘祭大合祖宗必尊太祖位正昭穆請詔百官議尚書左僕射姚南仲等請奉獻懿主祔德明興聖廟鴻臚卿王權申衍之曰周人祖文王宗武王故詩清廟章曰祀文王也故不言太王王季則太王王季而上皆祔后稷故清廟得祀文王也太王王季之尊私禮也祔后稷廟不敢以私奪公也古者先王遷廟主以昭穆合藏於祖廟獻懿主宜祔興聖廟則太祖東向得其尊獻懿主歸得其所是時言祔興聖廟什七八天子尚猶豫未剛定至是羣臣稍顯言二祖本追崇非有受命開國之鴻構又權根援詩禮明白帝泮然於是定遷二祖於興聖廟凡禘祫一享詔增廣興聖二室會祀日薄廟未成張繪為室內神主廟垣間奉興聖德明主居之廟成而祔自是景皇帝遂東向自博士獻議彌二十年乃決諸儒無後言帝賜京緋衣銀魚文獻通考貞元十二年祫祭太廟近例祫祭及親拜郊令中使引傳國寶至壇所昭示武功至是上以傳國大事中使引之非宜乃令禮官一人就內庫監引領至太廟焉册府元龜開成四年三月己卯帝御紫宸殿宰臣楊嗣復奏曰太廟準禮三年一祫五年一禘今是禘祭時讓皇帝廟亦合禘祭臣案讓皇帝本封寧王元宗親兄元宗既定內難寧王能讓帝位元宗感之贈以鴻名其復置廟享獻禘祫與九廟同至上元二年杜鴻漸奏停時享而禘祫存今元宗肅宗神主已歸夾室讓皇帝猶禘祫不闕於禮未安李班曰宗廟事重比者臣不敢輕議讓皇至今禘祫實不當禮嗣復所論至當今請下禮官議帝曰俞四月王起奏讓皇帝廟去月二十四日詔下太常寺委三卿及博士同詳議聞奏者臣等復以讓皇帝追尊位號恩出一時别立廟祠不涉正統既非昭穆禘祫所及無子孫獻享之儀親盡則踈嵗久當革杜鴻漸所議禘祫之月時一祭者蓋以時近恩深未可頓忘故也今睿宗元宗既已祧去又文敬等七太子中亦有追贈奉天承天皇帝之號當以停廢則讓帝之廟不宜獨存臣等參詳伏請準中書門下狀便從廢罷文獻通考昭宗大順元年將行禘祭有司請以三太后神主祔享於太廟三后者孝明太皇太后鄭氏宣宗母恭僖皇太后王氏敬宗母正獻皇太后韋氏文宗母三后之崩皆作神主有故不當入太廟當時禮官建議並置别廟每年五享三年一禘五年一祫皆于本廟行事無奉神主入廟之文至是亂離之後舊章散失禮院憑曲臺禮欲以三太后祔享太常博士殷盈孫獻議非之議見后妃廟門右隋唐禘祫文獻通考後唐長興二年四月禘享於太廟周顯德五年六月禘于太廟先是言事者以皇家宗廟無祧遷之主不當行禘祫之禮國子司業聶崇義以為前代宗廟追尊未毁皆有禘祫别援故事九條以為其證曰魏明帝以景初三年正月崩至五年二月祫祭明年又禘自兹以後五年為常且魏以武帝為太祖至明帝始三帝而已未有毁主而行禘祫其證一也宋文帝元嘉六年祠部定十月三日殷祠其太學博士議禘云案禘祫之禮三年一五年再宋自髙祖至文帝才及三帝未有毁主而行禘祫其證二也梁武帝用謝廣議三年一禘五年一祫謂之殷祭禘祭以夏祫祭以冬且梁武乃受命之君僅追尊四廟而行禘祫則知祭者是追養之道以時移節變孝子感而思親故薦以首時祭以仲月間以禘祫序以昭穆乃理之經也非關宗廟備與不備其證三也唐禮貞觀九年將祔髙祖于太廟國子司業朱子奢請準禮立七廟是時乃立六廟而行禘祫今檢會要及通典并禮閣新儀皆載此禮並與實録符同此乃廟亦未備而行禘祫其證四也貞觀十六年四月己酉光祿大夫宗正卿紀國公段綸卒太宗甚傷悼為不視朝將出臨之太常奏禘祫祭致齋不得哭乃止此明太宗之時宗廟未備實行禘祫其證五也貞觀二十三年自九嵕葬回迎神主於太極殿之西階日中行虞祭之禮有司請依典禮以神主祔廟髙宗欲留神主于內寢旦夕供養申在生之敬詔停祔禮英國公李績等抗表固請曰竊以祖功宗德飾終之明典文昭武穆嚴配之明訓今停祔廟奉徇哀情直據典章乖替為甚又國哀已後而廟停時祭逾月之後須申大祫以唐禮九廟觀之自太宗已上才足七廟未有毁主將伸大祫其證六也貞觀十六年四月癸丑有司言將行禘祭依今禮祫享功臣並得配享于廟廷禘享則不配請集禮官學士等議太常卿韋挺議曰其禘及時享功臣皆應不預故周禮六功之官皆大蒸而已大蒸即祫祭也梁初誤禘功臣左丞駁議武帝允而依行降及周隋俱遵此禮竊以五年再禘合諸天道一大一小通人雅論小則人臣不預大則兼及有功今禮禘無功臣誠謂禮不可易太宗改令從禮載詳此論該曉歷代援據甚明又貞觀年中纍陳禘祫其證七也髙宗上元三年有司祫享於太廟止有七室未有遷主通典會要及禮閣新儀其明此禮其證八也中宗景龍三年八月帝將祠南郊欲以韋皇后助行郊禮國子司業郭山等議云皇朝舊禮圜丘分祭天地惟有皇帝親拜更無皇后助祭之文及時享并禘祫亦無助祭之事今據中宗之代國子祭酒等舉禘祫之文稱是皇朝舊禮又明太宗髙宗之廟皆行禘祫其證九也疏奏從之宋史聶崇義傳顯德五年將禘於太廟言事者以宗廟無祧室不當行禘祫之禮崇義援引故事上言終從崇義之議右後唐後周禘祫五禮通考卷九十八
