body:
  text: 五禮通考卷八十八刑部尚書秦蕙田撰吉禮八十八宗廟時享周禮天官太宰及納亨贊王牲事注納亨納牲將告殺謂向祭之晨既殺以授亨人其疏禮器云納牲詔于庭殺訖毛以告純血以告殺腥爼豚解以腥之以此訖乃納于亨人爓祭此言納亨者以牽牲也蕙田案納亨有二一是朝踐薦血薦腥後豚解而亨之以爲爓也一是饋食將體解之納亨以實鼎爼也注專以向祭之晨殺以授亨人言之未備亨人掌共鼎鑊給水火之齊注鑊所以煮肉及魚腊之器既孰乃脀于鼎齊多少之量外疏云鑊所以煮肉及魚腊之器者案少牢爨在廟門之東大夫五鼎羊豕腸胃魚腊各異鑊鑊别有一鼎鑊中肉孰各升一鼎故鄭云既孰乃脀于鼎云齊多少之量者此釋經給水火之齊謂實水于鑊乃㸑之以火皆有多少之齊夏官諸子大祭祀正六牲之體注正謂庀載之入疏案特牲少牢移鼎陳即有一人鼎中庀出牲體一人在鼎西北而載之于爼既言正六牲之體明是此二事也禮記禮運然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮注體其犬豕牛羊謂分别骨肉之貴賤以爲衆爼也疏此論祭饋之節然後退而合亨者前明薦爓既未孰今至饋食乃退取曏爓肉更合亨之㑹孰擬更薦尸又尸爼唯載右體其餘不載者及左體等亦于鑊中亨煮之故云合亨亨之既孰乃體别骨之貴賤以爲衆爼供尸及待賓客兄弟等知非尸前正爼者以此經所陳多是祭末之事故爲祭末亨燕之衆爼也實其簠簋籩豆鉶羮者此舉事尸之時所供設也方氏慤曰合亨則合衆物而亨之犬豕牛羊骨有貴賤各異體焉故曰體以稻粱而實簠以黍稷而實簋以水土之品而實籩豆以五味之和而實鉶鼎故曰實詩小雅楚茨執㸑踖踖爲俎孔碩傳㸑饔㸑廪㸑也踖踖言㸑竈有容也疏以祭祀之禮饔㸑以煮肉廪㸑以炊米此言臣各有司故兼二㸑也少牢云雍人摡鼎匕爼於饔㸑饔㸑在門東南北上廪人摡甑甗七與敦于廪㸑廪㸑在饔㸑之北故知有二焉踖踖㸑竈有容者謂執㸑之有容儀也何氏楷曰薦孰之禮以尸人也必薦孰而後尸可享也則執㸑以下事也朝踐以前皆交於神明之道其意在於求神薦孰以後始兼用人道其事在於享尸信南山紀朝踐以前事楚茨紀薦孰以後事二詩相爲首尾祭以饋孰爲正故此章專就薦孰時言之㸑賈公彦云今之竈也周人制禮之時謂之㸑至孔子時則謂之竈案少牢禮有雍㸑有廪㸑雍㸑以煮肉雍人掌之廪㸑以炊米廪人掌之特牲禮有牲㸑有魚腊㸑即雍㸑也然無廪㸑而有饎㸑主婦視之舊說炊黍稷曰饎饎廪所㸑同物而廪比饎爲大則行禮之人異耳此詩所執者乃雍㸑也踖踖爾雅云敏也案特牲記爼之類不一有肵爼有折爼有尸爼有阼爼有主婦爼有祝爼有佐食爼有賓爼肵爼載牢心舌于上設於尸饌之北尸每食牲體反著於肵爼是主人敬尸之爼郊特牲所謂肵之爲言敬也折爼謂節解者旅酬時所設也尸爼事尸之爼牲體有九曰肩曰臂曰臑曰肫曰胳曰正脊二骨曰横脅二骨曰長脅二骨曰短脅凡九體皆尚右周道也所以尊尸也體貴竒者何陽數也骨者何以致敬也又有膚三焉以致愛也愛敬交致孝之至也又有離肺一刌肺五焉所以貴肺者何氣主也又魚十有五魚陰物也取諸月十有五日而盈之義也腊如牲骨則猶是貴竒之意也阼爼者主人之爼自阼爼而下亦總名爲執事之爼而其物薄矣據此詩以孔碩言爼葢耑指尸爼右饋食合亨周禮天官籩人饋食之籩其實棗㮚桃乾䕩榛實注饋食薦孰也今吉禮存者特牲少牢諸侯之大夫士祭禮也不祼不薦血腥而自薦孰始是以皆云饋食之禮疏此謂朝踐薦腥後堂上更體犬豕牛羊亨孰之時后薦謂之饋食之籩也云饋食薦孰也者謂於堂上饋孰之時后薦之云今吉禮存者吉禮謂祭祀以其天子諸侯祭祀之禮亡故云存者云特牲少牢諸侯之大夫士祭禮也者以天子大夫太牢祭今用特牲少牢故知諸侯大夫士祭禮也云不祼不薦血腥者若天子諸侯則有室中二祼堂上朝踐薦血腥之禮大夫則無此二者也醢人饋食之豆其實葵菹蠃醢脾折蠯醢蜃蚳醢豚拍魚醢疏言饋食之豆者亦與饋食之籩同時而薦蕙田案周禮外宗禮記祭統明堂位載王后夫人薦豆籩詳見朝踐條下右薦饋食豆籩禮記禮器羮定詔於堂疏羮肉湆也定孰肉也謂煮肉既孰將迎尸主入室乃先以爼盛之告神于堂是薦孰未食之前也方氏慤曰羮定則事以人道神明之也故詔于堂以堂比室爲明故也右詔羮定周禮春官小宗伯逆齍注受饎人之盛以入明疏案少牢饎㸑在廟門之外天子諸侯饎㸑亦在廟門外今逆齍迎入向廟堂中實之於簠簋也小祝迎齍盛疏祭宗廟饋獻後尸將入室食小祝于廟門外迎饎人之齍盛于廟堂也實之薦于神座前肆師祭之日表齍盛告絜春秋桓公六年左氏傳奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也注三時春夏秋右逆齍盛周禮春官大司樂以六律六同五聲八音六舞大合樂以致鬼神示注大合樂者謂徧作六代之樂用疏云大合樂者據薦腥之後合樂之時之也此所合樂即下云若樂六變若樂八變若樂九變之等彼據祭天下神此據正祭合樂若然合樂在下神後而文退下神在樂後者以下神用一代樂此用六代六代事重故進之在上此經六樂即上六舞故知徧作六代之樂言徧作樂而一時俱爲待一代訖乃更爲故云徧作也以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武大祭祀率國子而舞注當用舞者率以往禮記祭統夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也疏祫祭在秋大嘗禘在夏用天子禮則升歌清廟及舞大武大夏之樂所以爲大嘗禘也明堂位升歌清廟下管象朱干玉戚冕而舞大武皮弁素積禓而舞大夏蕙田案注疏詳見制度樂舞條祭統及入舞君執干戚就舞位君爲東上冕而總干率其羣臣以樂皇尸陳氏禮書周之興也功莫大于武功樂莫重于武舞故舞大武以祭服之冕舞大夏則朝服之皮弁而已蕙田案大合樂則聲容相應詠蹈相宣注徧作六代之樂夫徧作非奏其全樂也備其器服用其威儀節奏而已君執干戚就舞位是舞初入時冕而總干以爲之倡亦非君始終自舞也是時君方入室獻尸矣右大合樂儀禮特牲饋食禮祝延尸尸升入尸即席坐主人拜妥尸注延進在後詔侑曰延禮器所謂詔侑武方者也妥安也禮記郊特牲舉斚角詔妥尸注妥安坐也尸始入舉奠斚若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯奠角疏斚角爵名也饋食薦孰之時尸未入祝先奠爵于鉶南尸入即席而舉之如特牲禮陰厭後尸入舉奠焉也詔告也尸始即席舉奠斚角之時未敢自安祝當告主人拜尸使尸安坐是詔妥尸也蔡氏徳晉曰設饌于堂尸將入室飲食故徙堂上之饋于室祝酌奠於饌南尸入而舉之也曾子問接祭不迎尸孔疏接祭者接捷也捷速也速而祭之然案郊特牲云既灌然後迎牲則迎尸於奥在殺牲前凡迎尸之禮其節有二一是祭祖迎尸於奥而行灌禮灌畢而後出迎牲于時迎尸于户外親割薦血毛行朝踐之禮設腥爓之爼于尸前是一也然後退而合亨更迎尸入坐于奥行饋孰之禮是二也注云不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入此謂宗廟之祭郊社之祭無文不迎尸亦在此時蕙田案饋食時延尸入室亦曰迎尸迎尸有二一是始祭時太祝逆尸相尸禮小祝逆尸沃尸盥是也一是薦孰時迎尸入室曾子問接祭條鄭云接祭不迎尸孔云退而合亨更迎尸入坐於奥行饋孰之禮不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入案此是當祭而日食大廟火則不迎尸入室若常禮則有兩迎尸胡邦衡以爲即始祭時之迎尸非也郊特牲舉斚角詔妥尸鄭孔並云在薦孰時尸入室後今案儀禮特牲少牢並有妥尸之文與尸入相連鄭孔之說是也辨應撝謙朝踐在室饋食在堂應撝謙禮樂彚編問先儒謂朝踐于堂饋食于室今反之何也曰此非無據而敢然也據禮運元酒在室醴醆在户粢醍在堂澄酒在下是以酒之貴者在室而賤者在堂也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊先儒周禮注以爲朝踐之獻尊實醴醍饋食之象尊實盎沈朝踐之醴齊在户醍齊在堂而其禮行之于堂饋食之盎齊在户沈齊在堂下而其禮反行之于室先儒謂設而不酌者今以禮器祭統徴之盎齊並非饋食所薦是知醴醆在户内爲朝踐之所薦而粢醍在堂爲饋食之所薦無疑也朝踐血腥爓祭禮之精㣲者也今反在堂饋食禮之近人情非其至者也今反在室不惟與所設之酒不合于理亦已悖矣先儒徒見特牲饋食少牢饋食皆行之于室而不知大夫士惟無朝踐之禮故饋食在室天子諸侯以朝踐為尊故饋食行之于堂也郊特牲曰詔祝于室坐尸于堂用牲于庭升首于室是迎牲奠幣之時祝詔尸出堂殺牲而升首是尸已反于室而行朝踐也禮器曰納牲詔于庭血毛詔于室羮定詔于堂繼之曰設祭于堂為祊于外是知羮定詔于堂而即設正祭焉此即饋食之禮也祭義曰建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肝肺首心覸以俠甒加以鬱鬯以報魄也是升首固朝事也郊特牲既曰升首于室矣又曰取膟膋燔燎升首報陽也朝踐禮在室無疑今不信經而信諸儒之說固不可也蕙田案朝踐在堂饋食在室先儒並無岐說應氏乃反易之以爲朝踐在室饋食在堂然就其說案之仍有難通者郊特牲曰詔祝于室坐尸于堂用牲于庭升首于室注疏以爲朝踐時應氏亦以爲朝踐時則明知朝踐在室之不符矣而乃云迎牲奠幣尸在堂升首時尸入室是朝踐一節而忽堂忽室則朝踐在室一語仍不能周全而無缺矣曾子問既儐而祭一條云尸入三飯不侑酳不酢齊衰之祭一條云尸入三飯不侑酳不酢可見饋食正祭尸入而飯而侑而酳而酢節次相連若以飯侑酳酢俱行於堂則所謂尸入者果從何入耶則饋食在堂之說亦難通矣至所引禮運元酒在室云云亦安設之禮宜爾朝踐血腥爓祭以神道事之于堂饋食黍稷鉶羮以人道事之于室先神後人先堂後室莫非禮之精㣲者而何以爲悖于理耶應氏違反舊義正程子所訶解經而欲新竒未可信也右延尸入室周禮春官司尊彛其饋獻用兩壺尊皆有罍注變再獻爲饋獻者亦尊相因饋獻謂薦孰時也疏變再獻為饋獻者亦尊相因其實先饋獻後再獻以其饋獻在朝踐後亦當在尸未入室再獻是王酳尸後節也是以云饋獻謂薦孰時也此即禮運云熟其殽鄭注云體解而爓之是也蕙田案薦熟在饋食時非爓也薦爓乃朝踐事注以熟其殽爲薦熟恐非禮記明堂位尊用象疏象象尊也以象骨飾之此尊象周禮春夏之祭堂上薦朝事竞尸入室饋食時用以盛盎齊君及夫人所酌以獻尸也郊特牲祭齊加明水報陰也注明水司烜所取于月之水也齊五齊也五齊加明水則三酒加元酒也祭疏正祭之時陳列五齊之尊上又加明水之尊故云齊加明水也水屬北方皆陰類故云報陰明水涗齊貴新也凡涗新之也其謂之明水者由主人之絜著此水也注涗猶清也五齊濁泲之使清謂之涗齊及取明水皆貴新也周禮㡛氏以涗水漚絲涗齊或作汎齊新之者敬也著猶成也言主人齊絜此水乃成可得也周氏謂曰周官司尊彛之職謂鬱齊獻酌醴齊縮酌及盎齊涗酌以五齊清濁次之則泛齊醴齊同用縮酌而湜齊沈齊與盎齊同用涗酌此言明水涗齊葢自盎而下三齊也涗者以水和之解之也和解之則新矣貴新故不嫌于味之薄也春秋桓公六年左氏傳奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉徳而無違心也蕙田案郊特牲祭齊加水疏以正祭釋之且與祭黍稷文相屬其爲饋食正祭之酒無疑左傳奉酒體以告亦在奉盛以告之後其次序與郊特牲相合右饋食王獻周禮天官太宰享先王贊玉爵内宰后獻則贊春官外宗贊王后獻蕙田案以上三條注見前朝踐條右饋食后獻禮記禮運孔疏乃退而合亨至薦孰之時尸入室故禮器云設饌于堂乃後延尸入室太祖東面昭在南面穆在北面徙堂上之饌於室内坐前祝以斚爵酌奠詔主人拜郊特牲注云天子奠斚諸侯奠角即此之謂也自此以前謂之接祭乃迎尸入室舉此奠斚主人拜以妥尸故郊特牲云舉斚角拜妥尸是也后薦饋獻之豆籩王乃以玉爵酌壺尊盎齊以獻尸爲五獻也后又以玉爵酌壺尊醴齊以獻尸是六獻也通典至薦孰之時謂之饋食先薦孰於堂視陳此設饌之禮非謂即食設饌之時王及尸皆有倚住之處設机於傍故云變机也設席之後更設尸主之席於室在户内西方東面尸在其北布尸主席訖乃遷所設於堂上之饌置尸主坐前時祝又以斚酌奠奠於饌南所謂天子奠斚乃迎尸主入室即席舉奠斚將祭之時祝則詔王拜妥尸拜訖尸遂祭酒以菁茅謂之縮酒尸遂啐之奠之尸乃坐於是王以玉爵酌象尊盎齊以獻尸五獻也時后薦饋食之豆籩又以玉爵酌象尊醴齊以獻尸此六獻也楊氏復曰儀禮特牲饋食士禮也少牢饋食大夫禮也大夫士之祭不祼不薦血腥唯室中設尸主東面行饋食禮天子諸侯饋食以前堂上設南面位行祼鬯薦腥之禮而後延尸入室東面位行饋食禮郊特牲注云奠謂薦孰時當此之時大合樂自此以後謂之接祭乃迎尸入室舉此奠斚主人拜以妥尸后薦饋獻之豆籩王以玉爵酌盎齊以獻尸此五獻也后又以玉爵酌醴齊以獻尸此六獻也周禮春官外宗王后以樂羞齍則贊疏羞進也齍黍稷也后進黍稷之時依樂以進之則贊后者亦佐后進之豆籩與齍此官已贊九嬪又贊者以籩豆及黍稷器多故諸官共贊天官九嬪凡祭祀贊玉齍注玉齍玉敦受黍稷器祫疏言凡祭祀者惟宗廟禘與四時月祭等贊玉齍者祭祀之時男子進爼婦人進豆籩簠簋贊助后也詩小雅信南山是烝是享苾苾芬芬何氏楷曰烝冬祭名牲既殺矣臭既升矣于是行烝祭中享獻之禮謂薦孰也薦孰之禮周禮謂之饋獻亦謂之饋食此時始薦黍稷故以苾苾芬芬言苾芬觧見楚茨篇饋食之薦不止於黍稷而獨言苾芬者祭以黍稷爲主也楚茨苾芬孝祀何氏楷曰苾說文云馨香也芬說文云草初生其香分布荀子注云花草氣香也愚案此當指黍稷言書曰黍稷非馨明徳維馨明黍稷有馨頌所謂有飶其香有椒其馨者也祭以酒食爲主而此詩又爲農事既成而作故云然右羞齍周禮春官小祝大祭祀贊隋注隋尸之祭始疏賛隋者特牲少牢尸入室拜妥尸尸隋祭以韭菹擩于醢以祭于豆間小祝其時賛尸授之禮祀明堂位周祭肺注氣主盛也陳氏禮書祭以右手凡祭必於脯醢之豆間特公食大夫有司徹祭於上豆之間以豆數多故也祭之尚肺周禮而已若有虞氏則祭首夏后氏則祭心殷則祭肝以時異則禮異也周之尚肺特宗廟賔客飲食之間而已若五祀則户先脾中霤先心門先肝以事異則禮異也士冠有嚌肺而鄉飲酒鄉射燕禮之類皆有離肺而無祭肺昏禮有離肺又有祭肺鬼神陰陽之意也特牲饋食先祭肺後祭肝祝亦祭肺後祭肝則祭肺非不祭肝也以肺爲主耳由是推之夏殷非不祭肺也以心與肝爲主而已郊特牲祭黍稷加肺報陰也注祭黍稷加肺謂綏祭也疏尸既坐綏祭之時祭黍稷加之以肺兼肺而祭故云加肺也陸氏佃曰祭黍稷加肺少牢所謂上佐食取黍稷下佐食取肺尸受同祭於豆是也周禮春官守祧既祭則藏其隋注隋尸所祭肺脊黍稷之屬藏之以依神疏案特牲少牢及曽子問皆有隋祭之事特牲禮祝命綏祭尸取菹㨎于醢祭于豆間佐食取黍稷肺祭授尸尸祭之注云肺祭則肺是其隋者彼不言脊似誤王氏昭禹曰其隋則埋以藏之王氏安石曰隋肉謂之隋隋葢尸祭之餘易氏祓曰藏其隋則埋于西階之東禮記曾子問攝主不綏祭注不綏祭謂今主人也綏周禮作墮疏主人欲食之時先咸黍稷牢肉而祭之于豆間故曰綏祭尸與主人俱有綏祭凡將受福先爲綏祭今辟正主不敢受福故不綏也綏是減毁之名故從周禮墮為正守祧云既祭則藏其隋是也陳氏禮書儀禮士虞祝命佐食隋祭佐食取黍稷肺祭授尸特牲祝命尸挼祭之尸取菹擩於醢祭於豆間佐食授主人挼祭主婦則佐食挼祭主婦撫之少牢尸受肺與黍同祭于豆間主人佑受佐食綏祭坐祭之主婦亦受佐食綏祭祭之鄭康成謂下祭曰隋則隋與春秋傳所謂隋成之隋同周官與士虞作隋少牢與禮記作綏特牲作挼其實一也隋祭所以祭鬼神之物猶生者之飲食必祭也其物黍稷與肺其樂鐘鼓贊之以祝祭之以佐食藏之以守祧而尸與主人主婦皆有是禮則尸既舉奠而綏祭祭神食也主人受酢而綏祭祭尸食也少牢主婦受祭于佐食而祭之特牲主婦祭以佐食而撫之以士卑而禮簡故也攝主不綏士虞無尸不綏以攝與無尸非備文故也周人所祭莫先於肺天子諸侯或隋於堂上或隋於室中固不可攷要之皆先祭肺而已右隋祭周禮大司徒奉牛牲羞其肄享先王亦如之注鄭司農云羞進也肆陳骨體也蕙田案康成與司農解不同經文當兼豚解體解兩事今並存之夏官司士帥其屬而割牲羞爼豆疏體其犬豕牛羊鄭云分别骨肉之貴賤以爲衆爼也更破使多熟而薦之小子掌祭祀羞羊殽肉豆疏大夫士祭自饋熟始故正祭即體解為二十一體天子諸侯之祭有腥有爓至酳尸乃有孰與大夫士不同也大司馬大祭祀饗食羞牲魚授其祭注牲魚魚牲也祭謂尸賔所以祭也鄭司農云大司馬主進魚牲少疏此大祭祀據宗廟而言授尸祭祭者魚之大臠即牢下篇云尸爼五魚侑主人皆一魚加膴祭于其上膴謂魚之反覆者公食大夫亦云授賔祭故云祭謂尸賔所祭天官亨人共大羮鉶羮注大羮肉湆鄭司農云大羮不致五味也鉶羮加鹽菜矣疏大羮肉湆盛于登謂太古之羮不調以鹽菜及五味也鑊中煮肉汁一名湆故鄭云大羮肉湆云鉶羮者皆是陪鼎膷腫膮牛用藿羊用苦豕用薇調以五味盛之于鉶器即謂之鉶羮若盛之庶羞即公食大夫十六豆膷腫膮等也詩小雅楚茨或肆或將鄭箋云有肆其骨體于爼者或奉持而進之者孔疏外饔掌外祭祀之割亨供其脯修刑膴陳其鼎爼實之性體則肄其骨體于爼是外饔也大司徒云祀五帝奉牛牲羞其肆享先王亦如之注云肆進所解骨體又小子職云掌祭祀羞羊肆羊殽肉豆則奉持進之是司徒小子之類也然羣臣助祭各有所掌奉持進之非獨此二職也蕙田案鄭箋與毛傳異因其在絜爾牛羊之下執㸑之前故從傳編入朝踐節條下然據其所引周禮則饋食時當有薦孰一事不可缺也又案儀禮少牢尸受祭之後未食之前有主人羞肵爼上佐食羞兩鉶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶一節事詩楚茨疏引周禮各條謂是羣臣助祭奉持進之正是天子諸侯饋食時進孰授祭之禮也右進孰授祭周禮春官大祝辨九􅉔以享右祭祀注享獻也謂朝獻饋獻也右讀爲侑侑勸尸食而拜牢疏云侑勸尸食而拜者案特牲尸食祝侑主人拜少主人不言拜侑故知侑尸時有拜儀禮少牢尸告飽祝侑曰皇尸未實侑鄭注侑勸也實猶飽也賈疏此與特牲皆有尸飯法天子諸侯當亦有之故大祝九拜之下云以享侑祭祀注云侑勸尸食而拜若然士三飯即告飽而侑大夫七飯告飽而侑諸侯九飯告飽而侑天子十一飯而侑也有司徹尸告飽主人拜侑不言尸又三飯鄭注凡十一飯士九飯大夫十一飯其餘有十三飯十五飯賈疏上篇士禮九飯少牢上下大夫同十一飯士大夫既不分命數爲尊卑則五等諸侯同十三飯天子十五飯可知禮記曾子問尸入三飯賈疏天子諸侯祭禮既亡今儀禮唯有大夫士祭禮案特牲饋食禮祝延尸於奥迎尸而入即延坐三飯告飽祝侑尸尸又飯至於九飯畢若大夫依少牢饋食尸食十一飯而畢鄭注少牢云士九飯大夫十一飯也案此說則諸侯十三飯天子十五飯也逆尸令鐘鼓右亦如之注右讀亦當爲侑字疏亦上九拜之下享右之皆爲侑鄭氏鍔曰侑食之時亦令擊鐘鼓故曰亦如之右當爲侑謂勸侑尸食詩小雅楚茨以享以祀以妥以侑傳侑勸也爲箋享獻也以黍稷酒食獻之以祀先祖既又迎尸使處神坐而食之爲其嫌不飽祝以主人之辭勸之疏妥侑當饋食之節故云又迎尸使處神坐而食於時拜以安之是妥也爲其嫌不飽祝以主人之辭勸之是侑也言嫌者以天子使公卿爲尸尸爲天子所尊已有爲臣之嫌故言嫌不飽祝以主人之辭勸之知祝者以今少牢特牲之禮主人及尸之言皆祝之所傳故也禮記禮器詔侑武方注武當爲無聲之悞也方猶常也告尸行節勸尸飲食無常若孝子就養無方此亦周所因于殷也中疏詔告也侑勸也子事父母就養無方故在宗廟之禮主于孝凡預助祭皆得告尸威儀勸尸飲食無常人也案特牲延尸及詔侑相尸之禮皆是祝官則是有常而云無常者謂但是祝官皆得為之不常用一祝也蔡氏徳晉禮傳天子尸十五飯十一飯告飽而侑諸侯十三飯九飯告飽而侑大夫十一飯七飯告飽而侑士九飯三飯告飽而侑陳氏禮書特牲禮尸三飯告飽祝侑之如初鄭云不復飯者三三者士之禮大成也少牢禮尸三飯又食胾又食舉腊肩又食舉牢骼又食告飽又曰皇尸未實侑尸又食舉牢肩尸不飯主人拜侑尸禮有以多爲貴故特牲士祭尸九飯少牢大夫祭尸十一飯有以少爲貴故禮器天子一食諸侯再大夫三葢一食即一飯也士九飯大夫十一飯則飯以九與十一而又加者也正飯致其隆故貴多加飯嫌於凟故貴少此飯禮所以不同也鄭氏曰士九飯大夫十一飯其餘有十三飯十五飯而賈公彥謂十三飯諸侯禮十五飯天子禮理或然也飯必告飽而告飽必侑侑禮有拜以致其敬有辭以道其勤有樂以樂其心特牲尸告飽祝侑主人拜少牢尸告飽主人拜侑此拜以致其敬也少牢祝侑曰皇尸未實侑此辭以道其勤也大祝逆尸令鐘鼓侑亦如之此樂以樂其心也然特牲三飯告飽而侑少牢七飯告飽而侑則九飯三侑飯寡而侑多十一飯再侑飯多而侑寡者葢禮殺者儀蹙故告飽速而侑多禮隆者儀紓故告飽遲而侑少此侑禮所以不同也賈公彦謂諸侯九飯而侑天子十一飯而侑理或然也然以論語考之每飯異樂每樂異工則侑固多矣而特牲少牢尸飯止於三侑再侑大司樂王大食三侑者葢有每飯之侑有終食之侑每飯之侑一工而已終食之侑侑禮之大者也故荀卿言三嗅之不食大戴史記亦言三侑之不食此皆指其大者論之也古者之於賔客如祭祀禮而祼獻之數未嘗不同則天子而下其飯數宜與尸食無異矣大司樂王大食三侑皆令奏鐘鼓則凡非大食無鐘鼓歟右尸食侑饋食畢王五獻后六獻周禮春官司尊彛其朝獻用兩著尊注朝獻謂尸卒食王酳之其變朝踐為朝獻者尊相因也明堂位曰爵用玉琖又鬱人職曰受舉斚之卒爵而飲之則王酳尸以玉爵也疏朝獻是王酳尸因朝踐之尊醴齊引鬱人職欲証王酳尸與前同用玉爵之意也通考馬氏曰朝獻即食後酳尸之禮謂之朝獻者葢以酳尸因朝踐之尊而得名與禮記明堂位爵用玉琖仍雕注爵君所進于尸也仍因也因爵之形爲之飾也疏爵君酌酒獻尸杯也琖夏后氏之爵名也以玉飾之故曰玉琖仍因也因用爵形而為之飾故曰仍雕陳氏禮書夫卒食必有酳曾子問言侑酳是侑食然後有酳也樂記言執醬而饋執爵而酳是饋食然後有酳也特牲少牢之祭皆曰饋食而獻皆曰酳尸則大夫士無朝獻饋獻之禮特酳尸於饋食之後而已右朝獻王酳尸周禮夏官量人凡祭祀制其從獻脯燔之數量注從獻者肉殽從酒也元謂燔從于獻酒之肉炙也數多少也量長短也疏祭禮獻以燔從案特牲少牢云主人獻尸以肝從主婦獻尸以燔從故後鄭據此以爲從獻以燔案儀禮脯十脡各長尺二寸是多少長短燔之數量未聞王氏詳說曰正獻之脯見于籩人所謂加籩之實蔆芡栗脯正獻之燔見于生民所謂載燔載烈王氏昭禹曰從獻者以所獻牲牢爲正而以脯燔爲從也物之所共則有數器之所容則有量詩小雅楚茨或燔或炙傳燔取膟膋炙炙肉也獻箋燔燔肉也炙肝灸也皆從之爼也其爲之于㸑必取肉也肝也肥碩之大者用疏傳以炙爲炙肉則是薦爼非從獻也從獻之炙肝朱子集傳燔燒肉也炙炙肝也皆所以從獻也特牲主人獻尸賔長以肝從主婦獻尸兄弟以燔從是也何氏楷曰燔是近火燒之如今之燒肉火焰所及也炕舉也以物貫之而舉於火上以炙之也吕祖謙云爲爼孔碩謂薦熟也或燔或炙謂從獻也鄭氏以爲一事誤矣燔肉與肝灸豈得謂之孔碩乎蕙田案或燔或炙毛鄭異義毛以爲燔取膟膋鄭以爲從獻之爼據取膟膋在殺牲時則當言之或肆或將之下而不應言之執㸑踖踖之下此執爨踖踖已是薦熟時非朝踐時矣故朱子從鄭而不從毛也禮記禮運薦其燔炙疏謂燔肉炙肝案特牲禮主人獻尸賔長以肝從主婦獻尸兄弟長以燔從則此君薦用炙夫人薦用燔是也陳氏禮書楚茨先言執㸑而繼之以或燔或炙鳬鷖先言爾殽而終之以燔炙芬芬禮運亦先言孰其殽然後繼之以薦其燔炙周禮量人制從獻脯燔之數量特牲主人獻尸賓長以肝從主婦獻尸賔長以燔從是燔以肉炙以肝燔炙在血腥爓孰之後非祭之所先也謂之從獻非獻之正味也故制之不在司士而在量人獻之不在主人而在賔特祭義言建設朝事燔燎羶薌繼之以薦黍稷羞肺肝加以鬱鬯而鄭氏謂朝事君親制祭則親制其肝洗鬱鬯而燔之以詔神於室又出以墮於主前然則主人用肝之禮又與從獻者異矣蕙田案肺肝血氣之盛也故制祭用之從獻又用之制祭之肝生用尚血也從獻之肝已炙進熟也制祭之祭肺貴氣主生用也祭黍稷加肺熟用也一在朝踐時一在饋食時截然不同先儒多混又案特牲禮主人洗角升酌酳尸注酳猶衍也是獻尸也云酳者尸既卒食又故頤衍養樂之尸拜受賔長以肝從尸卒爵主人拜少牢禮主人降洗爵升北面酌酒乃酳尸尸拜受賔長羞牢肝用爼卒爵主人拜是酳尸以肝從爲一時事此七獻也右從獻周禮春官司几筵設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之注鄭司農云昨席于主階設席王所坐也𤣥謂昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王于是席王于户内后諸臣致爵乃設席疏祀先王謂宗廟六享皆用上三種席酢席謂王酳尸尸酢王王受酢之席亦如上三種席故云亦如之司農云酢席于主階設席王所坐也者此約鄉飲酒禮主人在阼階賔在户牖主人受酢王行飲酒禮亦然此酢文承祀先王下即是祭禮受尸酢不得為凡常飲酒禮故後鄭不從也後鄭知王有受尸酢法者謂若鬱人注引特牲少牢此注亦取彼義故云尸卒食王酳之卒爵祝受之又酌授尸尸酢王于是席王于戸内也案特牲少牢主人受酢之時未設席夫婦致爵乃設席今王于受酢即設席者優至尊與大夫士禮異知席王在户内者約特牲主人受酢時在户内之東西面也云後諸臣致爵乃設席者此亦約特牲夫婦致爵之時有席若然王于酢有席與彼異至于后即與彼同者禮有損之而益故后不得與王同宜同士禮案特牲無致爵于賔長之法而此言諸臣致爵者此王于諸臣亦無致爵禮此致爵謂酳尸訖主人獻賔長于西階之上謂之致爵也特牲主人致爵于主婦席于東房中此后亦然其諸臣案特牲獻賔長于西階上無席獻訖以薦爼降降設于西階下亦無席此諸臣有席者亦是王之臣尊宜設席乃以薦爼降設于席東也天官膳夫凡王祭祀則徹王之胙俎注膳夫親徹胙爼胙爼最尊也其餘則其屬徹之東疏祭宗廟有胙爼者謂若特牲少牢主人受尸酢尸西面設主人爼于席前王受尸酢禮亦當然鄭氏鍔曰王當祭祀以祭之胙肉置之于爼則名曰胙爼與賔客禮食則主人飲食之爼亦曰胙爼是爼最尊不可䙝膳夫親徹之不敢使其屬也右尸酢王禮記禮運修其祝嘏注嘏祝爲尸致福于主人之辭也疏此下云嘏以慈告詩小雅云鍚爾純嘏子孫其湛是致福于主人之辭也嘏以慈告疏少牢又云主人獻尸祝嘏主人云皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉夀萬年勿替引之是嘏以慈告周氏諝曰嘏亦祝也而謂之嘏者以其傳尸之言而所告者皆福也郊特牲富也者福也嘏長也大也注福者人君嘏辭有富此訓之也或曰福也者備也久疏尸嘏主人欲使長廣大也詩小雅天保君曰卜爾萬夀無疆傳君先君也尸所以象神卜予也箋君曰卜爾者尸嘏主人傳神辭也尸疏經陳祭事故君為先君也言曰卜爾是語詞故知也而稱君者尸所以象神由象先君之神傳先君之意以致福故箋申之云君曰卜爾者傳神辭也朱子詩傳君通謂先公先王也卜猶期也此尸傳神意以嘏主人之辭楚茨工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既勅永錫爾極時萬時億箋祝以神意告主人使受嘏既而以嘏之物往予主人嘏之禮祝徧取黍稷牢肉魚擩于醢以授尸孝孫前就尸受之天子使宰夫受之以筐祝則釋嘏辭以勅之又曰長賜女以中和之福是萬是億言多無數疏特牲少牢薦獻禮終尸皆命祝以嘏于主人故知工祝致告是致神意告主人使受嘏也告之下即云徂賚孝孫故知以嘏之物往與主人其嘏之物即下箋云黍稷牢肉是也此及下章再言工祝致告箋以此章祝以神意告主人使受嘏下章祝以主人之意告尸以利成知者此致告之下即云徂賚孝孫以物予主人明是告之使受嘏也下章乃云工祝致告訖即云皇尸載起明致孝子之意以告尸也又特牲少牢皆受嘏在前告利成在後以此知之二者皆祝傳其辭故並稱工祝致告少牢禮曰二佐食各取黍于一敦上佐食兼授搏之以授尸尸執以命祝卒命祝祝受以東北面于户西以嘏于主人曰既稱嘏辭主人坐奠爵興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興出宰夫以籩受嗇黍主人嘗之納之内是大夫受嘏之禮也特牲禮曰佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受是士受嘏之禮也二禮皆取黍而已特牲注云獨用黍者食之主也又云變黍直言嗇者因事託戒欲其重稼嗇此言徧取黍稷牢肉魚以齊者是减取諸物故知徧减取也知祝取之者嘏禮祝所主又特牲言佐食搏黍授祝祝授尸凖此故爲祝也知擩于醢者以醢亦宜在徧取之中而少牢禮云尸取韭菹辯擩于三豆有擩醢之事此既徧取以嘏天子天子當嘗之故知擩于醢以授尸也既以授尸故孝子前就尸受之特牲尸親嘏少牢命祝嘏此言既即是孝子自就取則亦尸親嘏不嫌與士同也言天子使宰夫受之以筐者以少牢宰夫受之故知此亦宰夫特牲少牢皆受以籩此經云既筐故知受之以筐也少牢主人受之出以授宰夫此初即宰夫受之不至于出故言天子使宰夫以爲别異之文也定本注天子宰又受之無使夫兩字祝則釋嘏辭以勅之少牢嘏辭云皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受禄于天宜稼于田眉夀萬年勿替引之是亦大夫之嘏辭也天子嘏辭無以言之此永錫爾極時萬時億是其辭之畧以少牢嘏辭凖之知天子嘏辭必多于是彼先設嘏辭乃嘏以黍此先以嘏予之乃釋辭者亦天子之禮大節文之數與大夫異也易傳者以徂賚孝孫是嘏之事也永錫爾極是嘏之辭也則此章唯說受嘏之禮耳不得有執事于其間若不指執事則極疾固慎文無所主故易之以爲受嘏之禮何氏楷曰工祝周禮大祝之官也致告者致尸意以告主人使受嘏也案主人受祭福其名曰嘏徂往賚賜也祝承尸命以嘏之物往予主人即下文言既齊既稷是也案少牢禮略云佐食取黍搏之以授尸尸執以命祝祝受以嘏于主人特牲禮略云佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人夫特牲乃士禮而尸親嘏少牢爲卿大夫禮而尸命祝嘏當是以尸之尊卑不同若天子之尸其尊更甚則其命工祝徂賚焉宜也苾芬孝祀以下皆祝所傳嘏辭也爾之孝徳盛則福亦自然盛故先知爾之膺受百福其繁駢之數如許必皆如其法式也爾極當與思文之詩立我烝民莫匪爾極同解王者重民之事使民皆有以遂其生復其性善莫至焉時萬時億仍以稼穡所獲言時萬猶言萬斯箱也時億猶言我庾維億也言爾孝孫自今而後長俾爾務農重本有極至之盛徳而歳歳所獲或以萬計或以億計無少歉焉周王業起於農詩詠饗祀豐潔又皆本於農故其言如此天子嘏辭無所見唯天保之詩云君曰卜爾萬夀無疆及此詩皆天子嘏辭也若少牢嘏辭云皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受禄于天宜稼于田眉夀萬年勿替引之則卿大夫嘏辭也田乃粢盛之所自出故卿大夫嘏辭亦以宜稼于田爲言則此章嘏辭之㫖可言矣蕙田案箋以永錫二句爲嘏辭何氏以苾芬以下皆爲嘏辭似何氏爲長卜爾百福正與天保君曰卜爾文義相同是神命主人之辭也時萬時億箋指福之多言何氏謂指稼穡亦何氏近之與少牢嘏辭宜稼于田之義相類葢人君之福莫有大于屢豐年者若泛云福多恐欠着實大雅既醉公尸嘉告傳公尸天子以卿言諸侯也諸箋公尸以善言告之謂嘏辭也侯有功徳者入爲天子卿大夫故云公尸公君也也疏尸告主人唯嘏辭耳故知公尸嘉告謂嘏辭朱子集傳公尸君尸也周稱王而尸但曰公尸葢因其舊如秦已稱皇帝而其男女猶稱公子公主也嘉告以善言告之謂嘏辭也何氏楷曰吕祖謙云周之追王止于太王則宗廟之祭尸之尊者乃公尸也陳祥道云父爲士子爲大夫葬以士禮而祭之尸則服士服父爲大夫子爲士𦵏以大夫禮而祭之尸則服大夫服故周官司服享先公則鷩冕以祭則各以其服授尸尸服鷩冕而王服衮以臨之則非所以致敬故不敢也愚案如前說則此公尸當是于諸祖中舉其最尊者乃后稷之尸也周旅酬六尸先儒謂后稷之尸𤼵爵不受旅是也朱子援引秦已稱皇帝而其男女猶稱公子公主謂周稱王而尸但曰公尸葢因其舊殊屬臆說又何休謂天子以卿爲尸諸侯以大夫爲尸卿大夫以下以孫為尸毛傳同其說謂天子之卿葢諸侯也未詳何據鄭元則謂諸侯有功德者入爲天子卿大夫故云公尸公君也孔穎達引曽子曰王者宗廟以卿爲尸射以公爲耦不以公爲尸避嫌也此言公者卿六命出封則爲侯伯故得以公言之又引石渠論云周人祭天用太公爲尸白虎通云周公祭太山用召公爲尸謂天地山川得用公皆牽强附㑹絶非事實嘉告鄭云以善言告之謂嘏辭也通篇皆宗祝傳公尸之意所謂工祝致告者又曰既醉以酒既飽以德此饋食之時也楊氏曰案儀禮特牲饋食士禮也少牢饋食大夫禮也大夫士之祭不祼不薦血牲唯行饋食禮天子諸侯饋食以前堂上設南面位行祼鬯薦腥之禮而後延尸入室東面位行饋食禮愚案此時尸始飲食及告飽主人酳尸尸遂嘏主人此詩通篇皆尸嘏王之語故但據饋食時爲言所飽者黍稷也而曰飽以徳者即周書黍稷非馨明德惟馨之意陳氏禮書嘏以慈告其辭說則少牢饋食祝曰皇尸命工祝承致多福無疆于女孝孫來汝孝孫來與賚同鄭氏作釐使女受福于天宜稼于田眉夀萬年勿替引之之類也其儀則士禮佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受大夫禮二佐食各取黍於一敦上佐食兼受搏之以授尸尸執以命祝祝受以東北面于户西以嘏于主人主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懷之實於左袂挂於季指執爵以興坐卒爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納内葢士賤而禮簡故佐食搏黍授祝祝授尸尸執而親嘏之大夫貴而禮煩故佐食兼受二敦黍搏之以授尸尸執以命祝嘏之士執角受之詩懷而不嘗大夫奠爵受之坐祭嚌之乃詩懷之而又嘗其實于左袂所以便執爵也以袂挂于季指所以便卒爵也其受皆於主人酳尸之後而主婦亞獻賔三獻不與焉特受尸酢爵而已曽子問攝主不嘏以明福在主人非攝者所可受也梁明山賔議請郊廟受福惟皇帝再拜明上靈降祚臣不敢同也其言頗合禮意唐開元開寳禮天子親祠而亞獻飲福有司攝事而太尉飲福然受尸酢爵謂之飲酢可也謂之飲福非也以爲飲福非古遂廢受酢之禮此又全失獻酢往來之道也古者受福雖在皇尸飯酳之後然主人受酢受福皆同時其後繼之以亞獻終獻加爵無嫌乎受福太蚤也今親祠儀注亞獻終獻行禮已訖然後禮官前導皇帝飲福受胙而亞獻終獻無復與於酢爵恐非禮意蕙田案儀禮少牢尸酢主婦不嘏則嘏辭惟朝獻有之也周禮春官鬱人大祭祀與量人受舉斚之卒爵而飲之注斚受福之嘏聲之悞也王酳尸尸嘏王此其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯燔事相成之疏此大祭祀云受嘏謂祭宗廟者也鄭知斚是受福嘏非天子奠斚殷爵名者案郊特牲云舉斚角詔妥尸其時無鬱人量人受爵飲之法惟有受嘏時受王卒爵飲之禮故知斚爲受福之嘏也此鬱人受王之卒爵亦王出房時也者大夫士有獻祝及佐食無獻鬱人量人法天子有獻鬱人量人之禮無獻祝及佐食之事但其節同故引爲証也云必與量人者鬱人贊祼尸量人制其從獻脯燔之數量前祼後獻祭事乃成故云事相成也王介甫曰斚者先王之爵惟王禮用焉卒爵若儀禮所謂皇尸卒爵是也夏官量人凡宰祭與鬱人受斚歴而皆飲之注言宰祭者冡宰佐王祭亦容攝祭元謂斚讀如嘏尸之嘏宰冡宰伯疏鄭云冡宰佐王祭亦容攝祭者義當兩含案大宗云若王不與祭祀則攝位此據宗伯亦冇故則冡宰攝之後鄭云斚讀如嘏尸之嘏讀從少牢尸嘏主人此有歴字者謂鬱人與量人歴皆飲之也楊氏復曰疏云有獻鬱人量人之法何也當受王爵之時王皆飲之以酒此疏所謂獻也王氏詳說曰案少牢饋食之禮主人受嘏執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人量人受斚其亦出房之時歟以嗇黍授祝以爵授鬱人量人况助祭乎記曰夫祭有畀煇胞翟閽者惠下之道也辨陸佃卒爵在朝踐時陸氏佃曰宗廟之祭始祼之時尸入于室王與后既祼獻矣及殺牲迎尸于堂王即以肝洗鬱齊而燔之制祭于主前于此之時尸既即席祝乃詔之使安坐王以玉角酌元酒以獻尸后以玉斚酌清酒以亞獻是之謂從獻郊特牲曰舉斚角詔妥尸當此節也鬱人贊祼量人制從獻之燔脯時相及事相成故受舉斚之卒爵酌而飲之鄭氏鍔曰以康成之說考之舉斚角詔妥尸之時無鬱人量人受酌爵飲之法惟有妥嘏時受王卒爵飲之禮故康成改斚爲嘏然有改字之嫌陸佃之說雖不改字以理考之方其祭之始獻而妥尸薦腥薦孰之禮尚未及行而鬱人量人先已得飲卒爵豈合人情也耶右嘏禮記祭統尸飲五君洗玉爵薦卿皆以齒注尸飲五謂酳尸五獻也大夫士祭三獻而獻賔祭疏此據備九獻之禮者至主人酳尸故尸飲五也凡二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此等皆尸飲之故云尸飲五于此之時以玉爵獻卿其爵雖同皆長者在先故云皆以齒云大夫士祭三獻而獻賔者欲明諸侯獻賔時節與大夫士獻賔不同知大夫士祭三獻而獻賔者特牲禮文下大夫不賔尸與士同亦三獻而獻賔知者有司徹文其上大夫别行儐尸之禮與此相異也右君獻卿辨陸佃尸飲五當饋食初獻陸氏佃曰尸飲五若十二獻當朝踐亞獻之節尸飲七當饋食初獻尸飲九當饋食三獻即九獻尸飲五當饋食初獻尸飲七當饋食三獻尸飲九在酳尸矣七獻五獻尸飲三于是獻卿與朝獻祼獻尸皆不飲至饋食然後尸飲所謂尸飲五者飲于五獻之時而已非其飲之以五也祭統孔疏凡祭二獻祼用鬰鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸故云尸飲五於此時獻卿獻卿之後主婦酳尸賔長獻尸是尸飲七也及瑶爵獻大夫是正九獻禮畢但初二祼不飲故云尸飲七自此以後長賔長兄弟更爲加爵尸又飲二是并前尸飲九主人乃散爵獻士及羣有司也若侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一鄭注大夫士祭三獻而獻賔此特牲禮文明與諸侯獻賔時節不同案有司徹下大夫不賔尸與士同亦三獻而獻賔其上大夫别行賔尸之禮與此異也蕙田案飲五飲七飲九注疏之說已極分明山陰之說不同者彼說十二獻有祼獻朝踐饋食酳尸四節每節有王獻后獻諸臣獻故尸飲五當朝踐亞獻之節其九獻之禮則祼二朝踐二故尸飲五當饋食初獻之節其云尸飲七當饋食三獻然如其說饋食亦止兩獻耳三獻之云不知何說其解飲于五獻之時尤屬附㑹祭統古者明君爵有徳而禄有功必賜爵禄于太廟示不敢專也故祭之日一獻君降立於阼階之南南鄉所命北面史由君右執策命之再拜稽首受書以歸而舍奠于其廟此爵賞之施也注一獻一酳尸也舍當爲釋非時而祭曰奠疏爵表德禄賞功卿大夫等既受䇿書歸而奠于家廟告以受君之命也君尊尚爵賞于廟不自專故民知施必由尊也鄭知一獻非初裸及朝踐饋食之一獻必爲一酳尸者以一酳尸之前皆爲祭事承奉鬼神未暇䇿命尸食已畢可行爵賞也此一獻則上尸飲五君獻卿之時也若天子命羣臣則不因常祭特假于廟故大宗伯云王命諸侯則儐是也應氏鏞曰一獻始命者以祭爲先也不俟獻終而命者以賞為重也蕙田案饋食六獻既畢又有酳尸三獻以備九獻酳尸王一獻周禮謂之朝獻則第七獻也后亞獻諸臣三獻周禮通謂之再獻則第八第九獻也此一獻賜爵禄注疏以爲酳尸之一獻非初祼朝踐饋食之一獻極是葢此七獻亦稱一獻故八獻九獻並稱再獻祭統與司尊彞之文相𤼵也楊氏復曰愚案儀禮注云諸侯尸十三飯天子尸十五飯尸食後王以玉爵酌朝踐之尊醴齊以酳尸爲七獻也尸卒爵祝受之以酌授尸尸以酢王於是設酢席于户内司几筵之祀先王昨席亦如之是也祝取少祭饌并黍稷以嘏福王王乃出量人與鬱人受舉斚之卒爵是也尸飲五王乃以玉爵獻卿此天子禮也諸侯酳尸尸酢主君亦設酢席於户之東面此諸侯禮也又曰案祭統尸飲五君洗玉爵獻卿以下所謂君者指國君言之先鄭注及疏家皆言王可以獻卿者葢王獻諸臣無文此又約祭統以明王禮右賜爵禄朝獻畢王七獻周禮春官司尊彛其再獻用兩象尊注再獻者王酳尸之後后酌亞獻諸臣爲賔又次后酌盎齊備卒食三獻也于后亞獻内宗薦加豆籩其變再獻爲饋獻者亦尊相因此凡九獻王及后各四諸臣一祭之正也以今祭禮特牲少牢言之二祼爲奠而尸飲七矣王可以獻諸臣祭統曰尸飲五君洗玉爵獻卿是其差也王酳尸用玉爵而再獻者用璧角璧散可知也象尊以象鳯凰或曰以象骨飾尊疏云再獻用兩象尊尸食後陰厭王酳尸后與賔長爲再獻此亦在饋獻後先言再獻者后與賔酳尸因饋獻盎齊之尊獻變饋獻云再獻云内宗薦加豆籩者案醢人及籩人有朝事之豆籩有饋食之豆籩有加豆籩之實故鄭于此取朝事當朝踐節饋食當饋獻節食後重加故加豆加籩當酳尸節案内宰職云贊后薦加豆籩故知内宗薦之云此凡九酌王及后各四諸臣一者九謂王及后祼各一朝踐各一饋食各一酳尸各一是各四也諸臣酳尸一并前八為九云祭之正也者此九獻是正獻案特牲少牢仍有衆賔長兄弟之長嗣子舉奠上利洗散爲加獻彼並非正故此云祭之正也云以今祭禮特牲少牢言之者天子諸侯祭禮亡雖檢禮記及周禮而言其文不具故取特牲少牢見在禮而言以其特牲少牢惟有酳尸後三獻天子諸侯酳尸後亦三獻與彼同故取以爲說也云二祼爲奠而尸飲七矣王可以獻諸臣矣王獻諸臣無文此又約祭統而言故即引祭統曰尸飲五君洗玉爵獻卿是其差也者彼據侯伯禮宗廟七獻二祼爲奠不飲朝踐已後有尸飲五獻卿即知天子與上公同九獻二祼爲奠不飲是尸飲七可以獻諸臣若然子男五獻者二祼爲奠不飲是尸飲三可以獻卿故鄭云是其差皆當降殺以兩大夫士三獻無二祼直有酳尸三獻獻祝是也通考馬氏曰后酳尸謂之再獻者葢以朝獻王一獻后未獻今后再酳尸而乃謂之再獻歟天官内宰贊瑶爵注爵以瑶為飾以疏内宰以瑶爵授后后親酌盎齊酳尸又曰瑶爵謂尸卒食王既酳尸后亞獻之者尸食後王以玉爵酌朝踐醴齊以酳尸謂之朝獻后亦于後以瑶爵酌饋獻時盎齊以酳尸謂之再獻知后以瑶爵亞酳尸者約明堂位云爵用玉醆仍彫加以璧散璧角食後稱加彼魯用王禮即知王酳尸亦用玉醆后酳尸用璧角賔長酳尸用璧散彼云璧此云瑶不同者瑶玉名瑶玉爲璧形飾角口則曰璧角角受四升爵爲總號故鄭云其爵以瑶爲飾也禮記明堂位加以璧散璧角注加加爵也以璧飾其口疏朝獻竟而夫人酌盎齊亞獻名爲再獻又名爲加于時薦加豆籩也此再獻之時夫人用璧角内宰所謂瑶爵也瑶是玉名爵是總號璧是玉之形制角是爵之所受名異而實一也右再獻后酳尸周禮春官内宗掌宗廟之祭祀薦加豆籩注加爵之豆籩疏以其食後稱加特牲少牢食後三獻爲正獻其後皆有加爵今天子禮以尸既食后亞獻尸爲加此時薦之故云加爵之豆籩即醢人籩人加豆加籩之實是也天官籩人加籩之實蓤芡㮚脯注加籩謂尸既食后亞獻尸所加之籩疏此加籩當尸食後王酳尸后亞王酳尸于時薦之春官内宗云掌宗廟之祭祀薦加豆籩以其内宗所薦明主于后又見特牲主婦獻尸云宗婦執兩籩于户外主婦受設于敦南主人獻尸之時不見有設籩之事故知惟主于后也少牢主婦不設籩者以其當日賔尸故也其下大夫不賔尸者亦與士同也醢人加豆之實芹菹兎醢深蒲醓醢箈菹雁醢筍菹魚醢疏此加豆之實亦與加籩之實同時設之辨薛士龍鄭鍔加豆籩在九獻後薛氏士龍曰周禮言加豆籩則加爵之豆籩特牲禮主人主婦既酳尸然後長兄弟衆賔長爲加爵不施于亞獻之節鄭氏謂尸既食后亞獻尸所加之籩悞矣明堂位曰爵用玉琖仍雕加以璧散璧角特牲禮獻用爵加用觚則加在獻數之外明矣其鄭氏鍔曰謂之加者加于九獻之外九獻爲正獻他謂之加爵故所薦之豆籩謂之加以象生時饋之有加蕙田案九獻之祭薦豆籩凡四故籩人曰四籩之實醢人曰四豆之實祼時二獻無豆籩朝踐二獻有豆籩則周禮所謂朝事之籩朝事之豆是也饋食二獻有豆籩則周禮所謂饋食之籩饋食之豆是也酳尸三獻有豆籩則籩人加籩之實醢人加豆之實及内宗薦加豆籩是也九獻之後加爵有豆籩則籩人羞籩之實醢人羞豆之實是也加豆籩注疏以爲尸既食后亞獻爲加則是在八獻時薛季宣鄭剛中並以爲加於九獻之後則加與羞無分别且不同時而設未見其爲的確也右薦加豆籩禮記祭統尸酢夫人執柄夫人受尸執足疏尸酢夫人執柄者爵爲雀形以尾爲柄夫人獻尸尸酢夫人尸則執爵尾授夫人也夫人受尸執足者夫人受酢于尸則執爵足也講義先儒謂爵如雀形以尾為柄恐非是爵之柄下有三戈足則戈也以豆觀之校爲柄乃中央直者則爵之柄亦指中央矣周禮天官内小臣祭祀徹后之俎注謂后受尸之爵飲于房中之爼疏天子諸侯祭禮亡案特牲薦且乃受尸之酢次主婦酳尸尸酢主婦于東房中受尸之酢亦有薦爼后之爼小臣所徹亦約與士禮主婦之爼同也右尸酢夫人禮記明堂位加以璧散注加加爵璧散以璧飾其口也疏璧散者夫人再獻訖諸侯為賔用之以獻尸雖非正加是夫人加爵之後故此總稱加璧者圓而有天體之象散者散而非致飾者也右諸臣獻尸周禮春官司尊彞春祠夏禴皆有罍諸臣之所昨也秋嘗冬烝皆有罍諸臣之所昨也注昨讀爲酢字之悞也諸臣獻者酌罍以自酢不敢與王之神靈共尊罍臣之所飲也詩曰瓶之罄矣維罍之恥疏云昨讀為酢者主人主婦賔長獻尸皆有酢報不得爲昨日之字故從酧酢之字也云諸臣獻者酌罍以自酢不敢與王之神靈共尊者王酳尸因朝踐之尊醴齊尸酢王還用醴齊后酳尸用饋獻之尊盎齊尸酢后還用盎齊以王與后尊得與神靈共尊今賔長臣卑酳尸雖得與后同用盎及尸酢賔長即用罍尊三酒之中清酒以自酢是不敢與王之神靈共酒尊故也辨鄭鍔諸臣昨罍爲酢尸鄭氏鍔曰自初祼以至饋食之獻王與后各四共爲八獻諸臣乃酳尸葢不敢與王同尊故酌三酒以酢之共爲九獻鄭謂諸臣酌以自酢豈有此理昨者酢也飲酒之禮百拜三行曰獻酬酢而已酢者送也故其字亦爲昨有送往之義葢酢以送尸耳何名自飲乎薛氏士龍曰九獻之後禮節備矣爲之尸者可以昨之乎彼王致祭后從王諸臣則從事於祭苟或略焉則禮節弗盡故王始獻后亞獻尸之昨亦王凡先焉諸臣之所昨豈非往返報施之禮終於此耶且行人于上公則曰王禮再祼而昨于諸侯則曰王禮一祼而昨是主獻賔而賔昨主也夫人之生以飲食燕樂爲相愛之恩以賔主獻酬爲相接之文及其既亡不忍異而絶之此昨禮所以設也王受昨在户内之東后受昨在東房之中諸臣受昨在西階之上司几筵有祀先王受昨之席則后也諸臣也亦莫不然右尸酢諸臣周禮天官籩人羞籩之實糗餌粉餈注羞籩謂若少牢主人酬尸宰夫羞房中之羞于尸侑主人主婦皆右之者上疏此當主酧尸内饔進之于尸侑等者也案有司徹大夫當自賔尸正祭不設内羞故于賔尸設之此天子之禮賔尸在明日則祭祀日當設之案少牢下大夫不賔尸者賔長致爵受酢云宰夫羞房中之羞司士羞庶羞于尸祝主人主婦内羞在右庶羞在左天子之禮賔長受酢後亦當設此内羞庶羞于尸祝及王與后然鄭不引不賔尸而引賔尸者以其設内羞之禮同故祗引其一但正祭設于祝賔尸設于侑又賔尸主人酬尸後正祭賔長受酢後爲異耳醢人羞豆之實酏食糝食疏此羞豆之實亦與羞籩之實同時設之宰夫以式法掌祭祀之戒具與其薦羞注薦脯醢也羞庶羞内羞疏庶羞謂天子八豆諸侯六豆之等内羞謂祭祀食所加言内者少牢所謂房中之羞糗餌粉餈是也楊氏復曰儀禮有司徹主人酬尸之後尸侑主人皆升筵乃羞宰夫羞房中之羞于尸侑主人主婦皆右之今案籩人醢人有羞籩羞豆之實則知天子之禮亦有羞諸侯亦必有之但經文不備耳蔡氏徳晉曰少牢禮宰夫羞房中之羞司士羞庶羞於尸侑主人主婦賈公彦謂賔尸在主人酬尸後正祭在賔長受酢後此賔長酳尸爲九獻也右薦羞豆籩禮記祭統尸飲七以瑶爵獻大夫皆以齒疏獻卿之後主婦酳尸賔長獻尸飲七也及瑶爵獻大夫是正九獻禮畢但初二祼不飲故云尸飲七自此以後長賔長兄弟更爲加爵尸又飲二是并前尸飲九主人乃散爵獻士及羣有司也若侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一鄭注大夫士祭三獻而獻賔此特牲禮文明與諸侯獻賔時節不同案有司徹下大夫不賔尸與士同亦三獻而獻賔其上大夫則行賔尸之禮與此異也方氏慤曰於尸言飲則主人酳之故也卿以下言獻則飲之可知君必獻臣者以賔禮隆助祭之人故也尸飲之後獻則間之者隆殺之别也間之以五以七以九者飲陽事故用竒之數焉凡觴皆謂之爵此言玉爵瑶爵正謂一升之爵爾言散爵即五升之散也禮器曰貴者獻以爵賤者獻以散則不特獻者然也雖受獻者亦然羣有司則前言進徹之百官後言煇胞翟閽者皆是皆以齒者同爵則尚齒也前言貴賤之等此變言尊卑者其獻也以卿大夫士為之等故以貴賤言之于卿大夫又各以齒故以尊卑言之禮運孔疏尸食十五飯訖王以玉爵因朝踐之尊泛齊以酳尸是七獻也故鄭云變朝踐云朝獻尊相因也朝獻謂此王酳尸因朝踐之尊也后乃薦加豆籩尸酌酢主人主人受嘏王所以獻諸侯于是后以瑶爵因酌饋食壺尊醍齊以酳尸爲八獻也鄭注司尊彞云變饋獻爲再獻者亦尊相因也再獻爲后酳尸饋獻謂饋食時后之獻也于時王可以瑶爵獻卿也諸侯爲賔者以瑶爵酌壺尊醍齊以獻尸爲九獻通典尸食訖王以玉爵酌朝踐之獻罇醴齊以酳尸謂之朝獻亦罇相因此七獻也后薦加事之豆籩尸飲七王可以獻公尸飲訖授祝祝酌清酒以授尸尸以酢王王乃設酢席于户内尸少祭饌黍稷并假福王王乃以出量人與鬱人受之后以玉爵酌饋食象罇之盎齊以獻尸曰再獻亦罇之相因尸酢后如王之法后飲酢酒此八獻也尸飲八王可以獻卿諸侯爲賔者以玉爵酌盎齊備卒食三獻合九獻凡王及后各四諸侯爲賔者一也尸飲九王可以獻大夫士尸飲訖又酢諸臣如后之法自九獻之後遂降冕而總干舞大武之樂以樂尸楊氏復曰愚案禮運疏云于是后以瑶爵酌饋食盎齊以酳尸爲八獻也尸酢后如王所謂小臣徹后之爼是也祭統云尸酢夫人執柄此諸侯大夫禮也諸臣爲賔者以瑶爵酌盎齊以獻尸爲九獻諸臣獻者酌罍以自酢司尊彞云皆有罍諸臣之所昨是也於時尸飲七王可以瑶爵獻大夫辨王安石朝獻即朝踐饋獻即再獻王氏安石曰朝踐者籩人醢人所謂朝事踐踐籩豆詩所謂籩豆有踐再獻者籩人醢人所謂饋食以朝事爲初獻則饋食爲再獻朝獻即朝踐以籩豆言之則曰踐以爵言之則曰獻相備也饋獻即再獻也以序言之則曰再以物言之則曰饋亦相備而已春官司尊彛鄭注朝踐謂薦血腥酌醴始行祭祀后於是薦朝事之豆籩既又酌獻饋獻謂薦熟時后於是薦饋食之豆籩朝獻謂尸卒食王酳之再獻者王酳尸之後后酌亞獻諸臣爲賔又次后酌盎齊備卒食三獻也於后亞獻内宗薦加豆籩此凡九酌王及后各四諸臣一祭之正也蕙田案朝獻即食後酳尸之一獻再獻即后酳尸之亞獻及諸臣酳尸之三獻鄭注甚諦秦溪楊氏云謂之朝獻者葢以酳尸因朝踐之尊而得名謂之再獻者葢以朝獻王一獻后未獻今后再酳尸而乃謂之再獻與其說是也王氏不從鄭注自剏新義舛矣右君獻大夫再獻畢后八獻諸臣九獻陳氏藴之曰九獻注疏已有成說但雜見於籩人司尊彞與其他官職今取注疏及禮圖之說類聚爲四葢别而言之謂之九獻合而言之則有四節其一節曰祼凡經中所謂祼者是也王以圭瓚酌鬱鬯以獻尸此一獻也后以璋瓚酌鬱鬯以獻尸此二獻也其二節曰薦腥籩人所謂朝事司尊彞所謂朝踐是也后既祼之後王出迎牲於門祝延尸向户外户牖之間南面后於是薦朝事之籩豆王迎牲入廟麗于碑親殺取血以告殺取毛以告純解而腥之爲七體薦于神坐王以玉爵酌醴齊以獻尸此三獻也后以玉爵酌醴齊以獻尸此四獻也其三節曰薦熟籩人所謂饋食司尊彞所謂饋獻是也朝踐之後乃體解其犬豕牛羊烹而熟之后於是薦饋食之籩豆王以玉爵酌盎齊以獻尸此五獻也后以玉爵酌盎齊以獻尸此六獻也其四節曰酳自饋食之後尸始有飲食之禮尸食訖后又薦加籩豆王以玉爵酌朝踐之醴齊以酳尸此七獻也后以瑶爵酌饋食之盎齊以酳尸此八獻也后酳尸後諸臣又以瑶爵酌盎齊獻尸司尊彞所謂皆有罍諸臣之所酢者以備卒食之三獻此九獻也以上九獻謂之正獻九獻之後遂行玉爵爲旅酬矣楊氏復曰司尊彞所述與先鄭所注祼二獻朝踐二獻饋食二獻朝獻一獻再獻三獻則九獻之目也籩人醢人有朝事饋食之籩之豆則九獻薦籩豆之時也禮運則論九獻之義也又案四時之祭名既不同禮必有異今其可見者惟尊彛之殊用耳於經無其文者皆不可知也辨鄭孔獻數係于服章禮器一獻質三獻文五獻察七獻神鄭注一獻祭羣小祀也三獻祭社稷五祀也五獻祭四望山川也察明也七獻祭先公也孔疏羣小祀最卑其禮質畧社稷五祀稍尊比羣小祀禮儀爲文飾四望山川其神既尊神靈明察先公之廟禮又轉尊神靈尊重也案周禮司服職元冕一章祭羣小祀希冕三章祭社稷五祀毳冕五章祀四望山川鷩冕七章享先公故鄭知獻數亦然也案此社稷三獻卑于四望山川而大宗伯職云以血祭祭社稷五岳又大司樂祭社稷奏太簇祀四望奏姑洗又禮緯云社稷牛角握五岳四瀆角尺以此言之則社稷尊于四望山川而獻與衣服卑者葢獻與衣服從神之尊卑其餘處尊者以其有功與地同類故進之在上也陳氏禮書周禮大祀次祀小祀見於肆師大祭中祭小祭見於酒正則大宗伯所辨天地五帝先王之類大祀也社稷五祀五岳之類中祀也四方百物之類小祀也大祀獻多小祀獻寡則社稷所獻宜加于山川也先王祭服各有象數則希冕三章以祭社稷者非卑之於山川也以社稷之所主止于利人故服粉米以稱之則獻數不係於服章矣且賔客之禮士一獻卿大夫三獻子男五獻侯伯七獻上公九獻而王饗諸侯自子男五獻以至諸侯長十有再獻皆服鷩冕七章而已孰謂獻數必係於服章哉鄭氏以三獻爲祭社稷五祀五獻爲祭四望山川誤矣羣小祀則四方百物之類也其牲色尨其牲體疈辜其祼器用散其舞兵舞帗舞或不興舞山川四望則其兆位各因其郊與其方其牲各因其方之色祼則用蜃玉則兩圭有邸與璋邸射舞則兵舞與羽舞奏姑洗歌南吕舞大㲈奏蕤賔歌函鐘舞大夏社稷則其牲黝其祭血祼以大罍鼓以靈鼓舞以帗舞奏大簇歌應鐘舞咸池其禮樂辨異如此則獻數不同宜矣葢禮略故質禮加故文察則其事地也察矣神則其事祖也神矣一獻孰則於人情爲近故曰質三獻爓則於人情爲逺故曰文三獻爓則五獻其血乎禮所謂血祭社稷是也蕙田案七獻祭先公者據諸侯而言天子祭先王則九獻也辨陸佃九獻次序不同陸氏佃曰宗廟九獻之禮以祼爲始祭之日王服衮冕而入奏以王夏立于阼后副禕而入奏以齊夏立于房尸服衮冕而入奏以肆夏席于室于是臨祭王與后共獻各一王以圭瓚酌鬱齊以祼尸后以璋瓚酌鬱齊以亞祼是之謂祼既祼獻矣王即以肝洗于鬱齊王燔之制祭于主前諸侯曰制祭天子曰宰祭量人凡宰祭是也于此之時尸既即席矣祝乃詔之使安坐王與后其獻亦各一王以玉角酌元酒以獻尸后以玉斚酌清酒以亞獻是之謂從獻郊特牲曰舉斚角詔安尸當此節也何以知其然禮運曰元酒以祭薦其血毛詩曰祭以清酒從以騂牡以啓其毛取其血膋元酒以祭在于薦血毛之後祭以清酒在取血膋之上則知從獻在朝事之前祼事之後也祭之末有加獻祭之始有從獻不聨九獻之數先王之制祭祀于始有從獻于末有加獻示祭祀始終有隆而無殺也此時制祭君未迎牲禮器先言君親牽牲然後君親制祭者謂諸侯爾葢天子宗廟之祭與天地同皆有兩牲有享牛有求牛求牛殺于未祼之先洛誥王賔殺禋咸格王入大室祼是也享牛迎于既祼之終特牲既祼然後迎牲是也諸侯之宗廟其祭貶于天子有享牛無求牛故制祭在迎牲之後割牲之前事不得不爾理不得不然矣從獻之後王乃袒而迎牲卿大夫贊幣而從后于是時薦六尊六彜之器以奠焉某彛當某所某尊當某處各置于常次禮云君親牽牲夫人薦盎又曰及迎牲君執紖卿大夫序從士執芻宗婦執盎葢夫人薦涚水是也王已迎牲后已奠器然後取蕭祭脂以合羶香奏樂以合聲舞此降神之序也禮云既奠然後焫蕭是也薦者升之也奠者置之也升之于下奠之于上事相因故祭統言薦禮器言奠其實一也鬱合鬯臭陰達于淵泉蕭合黍稷臭陽達于墻屋奏樂求諸隂陽之間所謂聲音之號詔告于天地之間則人鬼可得而禮矣朝踐之事于是行焉延尸于户西尸南向主東向王乃殺牲啟其血毛祝出受之而以血告幽以毛告全皆于室更取膟膋燎于爐炭之上見以蕭光升首焉以報陽又羞肺肝首心祭黍稷加肺祭齊加明水雜以瓦甒加以鬱尊以報陰有虞氏尚首夏后氏尚心殷人尚肝周人尚肺今羞肺肝首心則周人朝事之羞備四代之尚也于祭黍稷又特以所尚加焉故郊特牲曰祭黍稷加肺祭齊加明水報陰也取膟膋燔燎升首報陽也祭義曰建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肺肝首心見間以俠甒加以鬱鬯以報魄也祭義之報氣即特牲所謂報陽祭義之報魄即特牲所謂報陰祼獻之時有所謂求朝獻之時有所謂報固其理也當是時王與后其獻又各一王以玉爵酌盎齊以獻尸后薦籩人之八籩曰䵄蕡之類醢人之八豆曰韭菹之類以奠焉禮云君執鸞刀修嚌夫人薦豆又曰君獻尸夫人薦豆是也后于是以瑶爵酌盎齊以亞獻是謂朝獻葢王親迎牲則后薦尊彛王親羞嚌則后奠豆籩夫婦相成固有次第哉祼獻王酌以圭瓉后酌以璋瓉從獻王酌以玉斚后酌以玉角朝獻王酌以玉爵后酌以瑶爵尊卑之異也朝獻既畢于是行饋食之事當事者設饌于堂乃退而合亨尸適于小幄王適于小次以待焉堂上之饌又備矣王出小次復位乃更延主于室之奥祝出迎尸尸來升席自北方坐于主北葢宗廟之祭有二節朝事與祭之始爲一節饋食與祭之終爲一節其中間不以相續者所以容王與尸少息也惟有故則接祭見曾子問注君親制祭謂朝事時君親割牲謂饋食時此一悞也割牲與制祭同一節皆朝獻之時爾羊人祭祀割牲登其首是也頴達乃謂薦盎薦酒不得同時不知薦盎是從獻薦酒是正獻正與從兩獻不害爲同時鄭又以祭義燔燎羶薌至報氣也爲朝事時以薦黍稷羞肺肝首心至加以鬱鬯以報魄也爲饋食時亦悞也葢報魄即與報氣同一節皆朝事之時也于此時王以玉爵酌盎齊以獻尸后又薦以籩人之八籩曰栗脯之類醢人之八豆曰葵菹之類自祼至此五獻矣尸飲于五獻則王于是時可以獻卿矣祭統尸飲五君洗玉爵以獻卿是也鄭謂尸飲五爲酳尸五獻非也凡祭祀自血腥始曰朝踐自孰食始曰饋食朝踐祼獻尸皆不飲祭之啐之奠之以示敬而已非以食也至饋食則食道也然後尸飲特牲曰直祭祝于主鄭謂薦孰食祭以孰爲正血腥之屬盡敬心耳則所謂尸飲五者飲于五獻之時而已非其飲之以五也于是后以瑶爵酌盎齊以亞獻是爲六獻饋食禮畢酳尸之禮于是行焉王以玉爵酌凡酒以獻尸内宗代后薦籩人之加籩醢人之加豆是爲七獻王可以獻大夫矣祭統尸飲七君以瑶爵獻大夫是也后于是時又以瑶爵酌凡酒以亞獻是爲八獻王酳尸尸酢王后酳尸尸酢后酳尸禮畢諸侯與執事者又共一獻于尸而薦籩人之羞籩醢人之羞豆以備卒食之三獻合王后之八獻是為九獻備卒食之三食而尸爵止欲神惠之均于在室也凡九獻之内謂之正其次主人獻賔又其次主人獻長兄弟如賔儀獻衆兄弟如衆賔儀獻兄弟如衆兄弟之儀又其次長兄弟洗觚爲加爵又其次衆賔長洗觚爲加爵三加而尸爵止欲神惠之均于在庭也九獻之外謂之加明堂位曰加以璧散璧角是也葢卒食之後其豆謂之加豆以其加于卒食之後也卒獻之後其爵謂之加爵以其加于卒獻之後也凡獻尸惟祼無樂朝踐而下皆有焉惟祼無籩豆之修從獻而下皆有焉先儒以周官朝事之籩豆當朝獻之節饋食籩豆當饋獻之節又以加籩加豆當酳尸之節獨無所謂從獻加獻與諸臣之所酢三獻之籩豆葢悞矣葢籩人所謂羞籩醢人所謂羞豆此薦于王與后酳尸之末諸臣所酢也又籩人共薦羞之籩實醢人共薦羞之豆實葢薦籩薦豆者從獻之籩豆羞籩羞豆者加獻之籩豆也于此時遂行旅酬無算之爵而繼之以餕祭于是終焉故祭統曰餕者祭之末凡此九獻之禮王鄭之徒言禮以來多所未嘗知也蕙田案九獻之說詳於禮運孔疏杜氏通典以經傳核之雖略有參差而節次多合山陰陸氏以意更易案之經傳實多違戾一則祼獻之後朝踐之前有從獻二也案從獻者周禮量人制從獻脯燔之數量特牲饋食主人獻尸賔長以肝從主婦獻尸兄弟以燔從據此從獻當在饋食五獻六獻時陳氏禮書云楚茨先言執㸑而繼之以或燔或炙鳬鷖先言爾殽而終之以燔炙芬芬禮運亦先言孰其殽然後繼之以薦其燔炙燔以肉炙以肝燔炙在血腥爓孰之後非祭之所先也謂之從獻非獻之正味也故制之不在司士而在量人獻之不在主人而在賔長其說是也况朝踐之前尚未殺牲安得有燔脯從獻從獻之稱以從正獻爲義何得以主人一獻主婦亞獻乃稱從獻其悞一也一則制祭在祼獻時也案制祭在朝踐時禮器君親制祭鄭注謂朝事進血膋時制肝洗于鬱鬯而燔之入以詔神于室又出以堕于主前據制祭在進血膋時則在殺牲之後不在祼獻未殺牲之前且制祭與從獻又各一事不得牽合爲一也其悞二也一則求牛殺於未祼之先也案周禮牛人共其享牛求牛鄭氏以爲享牛正享之牛求牛繹祭之牛而劉氏小傳求讀如逑以爲配祭者之牛如劉氏說則郊社之祭即郊特牲所謂帝牛稷牛宗廟之祭即公羊所謂周公白牡魯公騂剛逸禮所謂毁廟之主昭共一牢穆共一牢者雖未詳孰是要皆無所謂殺於未灌之先者至所證洛誥王賔殺禋咸格則傳者以爲助祭諸侯以王殺牲禋祭祖廟故咸至非謂既殺牲而後王入室祼也其悞三也一則謂祭黍稷加肺爲朝踐時也案饋食之禮亦曰饋孰儀禮賈疏饋孰以進牲體而言饋食以進黍稷而言皆用生人食道饋之周禮小祝迎齍盛賈疏祭宗廟饋獻後尸將入室食小祝於廟門外迎饎人之齍盛於廟堂東實之薦於神座前據此則朝踐時並無薦黍稷之事况此郊特牲祭黍稷加肺之文乃是尸食時綏祭之事孔疏尸既坐綏祭之時祭黍稷加之以肺案綏祭者特牲禮祝命綏祭尸取菹㨎於醢祭於豆間佐食取黍稷肺祭授尸尸祭之周禮又謂之隋祭春官守祧既祭藏其隋鄭注謂尸所祭肺脊黍稷之屬是也山陰悞以綏祭爲正祭而又悞以饋食時事爲朝踐時事其悞四也一則饋食初獻時即獻卿也案獻卿當在饋食後酳尸時祭統尸飲五君洗玉爵獻卿鄭注尸飲五謂酳尸五獻孔疏凡祭二獻祼用獻鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此等皆尸飲之九獻之禮至主人獻尸故曰尸飲五于此之時以玉爵獻卿是也今山陰乃以爲尸飲于五獻文既支離又以朝踐二獻尸亦不飲義亦未確且當饋食初獻時酳尸之禮未行酬酢之事未起而遽以玉爵獻卿不倒行而逆施耶其悞五也一則以加璧散爲九獻之後加爵也案明堂位加以璧散孔疏璧散者夫人再獻訖諸侯爲賔用之以獻尸雖非正加是夫人加爵之後故總稱加據此則璧散正當第九獻諸臣獻尸以璧散尸酢諸臣以罍司尊彞皆有罍諸臣之所昨是也而祭統所云尸飲七以瑶爵獻大夫者即在此時其九獻之後有加爵者則祭統所謂尸飲九以散爵獻士及羣有司孔疏九獻禮畢自此以後賔長兄弟更爲加爵尸又飲二并前尸飲九是也山陰以飲七時之璧散合之於九飲時之加爵其悞六也凡此者案諸注疏固不相符稽諸經傳亦不甚合辨禮書二祼不在獻數陳氏禮書行人上公再祼而祼不預于九獻侯伯子男一祼而祼亦不預于七獻五獻則先儒以二祼在九獻之内非也蕙田案九獻之禮據注疏祼二獻通朝踐二獻饋食二獻酳尸三獻爲九獻先儒皆無異論禮書據大行人再獻而酢享禮九獻之文以爲二祼不在九獻之内然案大行人疏饗禮九獻謂後日王速賔賔來就廟中行享是再祼與九獻並非一日所行之禮未可援以爲據辨禮書朝踐三獻饋食三獻酳尸三獻陳氏禮書司尊彛朝踐用兩尊皆有罍籩人醢人有朝踐之籩豆有饋食之籩豆有加籩加豆則朝踐王獻后亞之諸臣之所昨三獻饋食王獻后亞之諸臣之所昨六獻也酳尸三九獻加爵不與焉此宗廟九獻之禮也書曰大保秉璋以酢孔安國謂報祭曰酢葢獻始事也酢成事也諸臣之于禮成之而已故獻皆曰酢楊氏復曰先鄭謂二祼王與后各一朝踐王與后各一饋獻王與后各一酳尸王與后各一又諸臣一爲九獻求之禮經尚有明証故先儒多從之今固不得遽以爲非陳氏謂朝踐三獻饋食三獻酳尸三獻似亦可通但以諸臣之所酢爲報祭而引太保秉璋以酢爲證則恐不然夫尊重而罍輕如先鄭謂諸臣酌罍以自酢下敢與神靈共尊則可謂諸臣以罍報祭於神靈而不以尊則於理爲不通矣又曰所謂九獻者謂王及后祼各一朝踐各一饋食各一朝獻王酳尸一再獻后酳尸一此爲八獻諸臣爲賔酳尸一并前八爲九是禮也春祠夏禴秋嘗冬烝追享朝享莫不皆然今經獨於春祠夏禴言朝踐再獻秋嘗冬烝言朝獻饋獻何也葢互文以見義也蕙田案陳氏薛氏司尊彞三言皆有罍諸臣之所昨遂以爲朝踐饋食酳尸各有三獻每三獻中各有諸臣一獻然據司尊彞三言皆有罍之文一指春祠夏禴言一指秋嘗冬烝言一指追享朝享言各有攸當並非謂一祭九獻之中諸臣有三酢也合從注疏不必立爲異說辨孔疏侯伯子男饋食無獻禮器君親制祭孔疏此謂侯伯子男祭廟之禮君親制祭夫人薦盎者謂殺牲已畢進血腥之時斷制牲肝洗于鬱鬯入以祭神于室于此之時夫人薦盎齊以獻之侯伯子男之禮朝踐君不獻故夫人薦盎君親割牲夫人薦酒者謂薦孰時君親割牲體于時君亦不獻故夫人薦酒禮運疏崔氏云天子九獻魯及王者之後亦九獻侯伯七獻朝踐及饋孰君皆不獻于九獻之中减二故爲七獻子男五獻亦以朝踐饋孰君皆不獻但酳尸一獻而已楊氏復曰特牲少牢饋食之禮主人主婦及賔備行三獻况祭禮以饋孰爲正上而天子下而大夫士祭禮皆有獻今云侯伯子男饋孰時皆無獻於理不通聖人制禮文理密察自有隆殺之宜必不如疏家所說之踈也蕙田案崔氏孔氏侯伯子男饋食時無獻理不可通信齋駁之是矣而禮器薦盎薦酒之解諸家聚訟終難分曉葢制祭割牲不應分爲兩候薦盎薦酒不得同在一時孔氏既譏熊氏爲非陸氏又稱孔氏爲悞添出從獻固陸氏悠謬之說主婦獨獻又崔氏違理之談然則何以解之愚謂此當以祭義之文爲凖祭義云君牽牲夫人薦盎君獻尸夫人薦豆薦盎薦豆儀節秩如訛豆爲酒萬難解說從祭義作夫人薦豆則葛藤盡斬矣五禮通考卷八十八
