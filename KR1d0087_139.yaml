body:
  text: 五禮通考卷一百二十九刑部尚書秦蕙田撰嘉禮二即位改元宋書武帝本紀永初元年六月丁卯設壇南郊即皇帝位柴燎告天策曰皇帝臣裕敢用玄牡昭告皇天后帝晉帝以卜世告終歷數有歸欽若景運以命于裕夫樹君司民天下為公德充帝王樂推攸集越俶唐虞降暨漢魏靡不以上哲格文祖元勳陟帝位故能大拯黔黎垂訓無窮晉自東遷四維不振宰輔憑依為日已久難棘隆安禍成元興遂至帝王遷播宗祀湮滅裕雖地非齊晉衆無一旅仰憤時難俯悼橫流投袂一援則皇祚尅復及危而能持顛而能扶姦宄具殱僭偽必滅誠興廢有期否終有數至於大造晉室撥亂濟民因藉時來實尸其重加以殊俗慕義重譯來庭正朔所暨咸服聲教乃至三靈垂象山川告祥人神協祉嵗月兹著是以羣公卿士億兆夷人僉曰皇靈降鑒於上晉朝欵誠于下天命不可以久淹宸極不可以暫曠遂逼羣議恭兹大禮猥以寡德託於兆民之上雖仰畏天威略是小節顧深永懷祗懼若霣敬簡元辰升壇受禪告類上帝用酬萬國之情克隆天保永祚于有宋惟明靈是饗禮畢備法駕幸建康宫臨太極前殿詔赦天下紀元表庚申宋武帝永初元年三建是年西秦乞伏熾磐𢎞元西涼李歆弟恂永建元義三年武帝崩太子符立癸亥少帝景平元年二魏二年北太武帝始光元隆在位二年弟義立乙丑文帝元嘉元年三十連二年夏赫勃勃子昌承光元赫五年北魏神麚元西秦乞伏熾磐子暮末永洪元夏連昌弟定勝光元北涼沮渠蒙遜承元元年八年沮渠蒙遜義和元北燕馮跋弟𢎞太興元一九北魏延和元十年沮渠蒙遜子牧健永和元作氶光二十二年北魏太延元君元十八年北魏正平元十七年北魏太平真二十九年二月北魏太武帝崩南安王余立改元永平冬十月皇孫濬立是為文成帝改元興安三十年宋元凶劭太初元帝在位三十年子駿立改元一甲午孝武帝孝建元年三興是年北魏光元二年北魏太安元丁酉大明元年八在四年北魏和平元立帝位八年太子子業尋廢文帝子湘東王彧立乙巳廢帝永光元年八月改為景和元年十一月明帝立改為泰始元年七崩是年北魏文成帝太子𢎞立是為獻文帝年二年北魏獻文帝天安元孝三年北魏皇興元七北魏禪位于太子宏是為文帝改元延興子帝在位七年改元一太昱立五年廢為蒼梧王癸丑後廢帝元徽元年五在位五年改元一明帝子安成王準立丁巳順帝升明元年三魏是年北太和元齊帝在位三年封蕭道成為王禪位封帝為汝隂王右宋齊書髙帝紀建元元年夏四月甲午上即皇帝位於南郊設壇柴燎告天曰皇帝臣道成敢用玄牡昭告皇皇后帝宋陟鑒乾序欽若明命以命于道成夫肇自生民樹以司牧所以闡極則天開元創物肆兹大道天下惟公命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸炳諸典謨載在方册宋德既微仍世多故實賴道成匡拯之功以宏濟于厥艱大造顛墜再構區宇宣禮明刑締仁緝義晷緯凝象川嶽表靈誕惟天人罔弗和會乃仰協歸運景屬與能用集大命于兹辭德匪嗣至于纍仍而羣公卿士庶尹御事爰及黎獻至于百戎僉曰皇天眷命不可以固違人神無託不可以曠主畏天之威敢不祗從鴻歷敬簡元辰虔奉皇符升壇受禪告類上帝以永答民衷式敷萬國惟明靈是饗紀元表己未南齊髙帝建元元年四一在位四年改元太子賾立癸亥武帝永明元年十一昭在位十一年改元一太孫業立後廢為欎林王甲戌鬱林王隆昌元年七月弟昭文立改為延興元年十月髙帝從子西昌侯立是為明帝改為建武元年四戊寅永泰元年一卷帝在位四年太子寶立後廢為東昏侯齊書禮志永泰元年有司議應廟見不尚書令徐孝嗣議嗣君即位並無廟見之文蕃支纂業乃有虔謁之禮左丞蕭琛議竊聞祗見厥祖義著商書朝于武宫事光晉册豈有正位居尊繼業承天而不虔覲祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭於祖考告嗣位也又篇曰閔豫小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之喪將始即政朝于廟也則隆周令典煥炳經記體嫡居正莫若成王又二漢由太子而嗣位者西京七主東都四帝其昭成哀和順五君並皆謁廟文存漢史其惠景武明章六君前史不載謁事或是偶有闕文理無異説議者乃云先在儲宫已經致敬卒哭之後即親奉時祭則是廟見故無别謁之禮竊以為不然儲后在宫亦從郊祀若謂前虔可兼後敬開元之始則無假復有配天之祭矣若以親奉時祭仍為廟見者自漢及晉支庶嗣位並皆謁廟既同有蒸嘗何為獨修繁禮且晉成帝咸和元年改號以謁廟咸康元年加元服又更謁夫時非異主猶不疑二禮相因况位隔君臣而反以一謁兼敬宜逺纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國奏可梁書蕭琛傳東昏初嗣立時議以無廟見之典琛議據周頌烈文閔豫皆為即位朝廟之典于是從之紀元表己卯東昏侯永元元年三太是年北魏孝文帝崩子恪立是為宣武帝年二年北魏宣武帝景明元于在位三明帝子南康王寶融即位江陵辛巳和帝中興元年二王在位二年封蕭衍為梁禪位封帝為巴陵王右南齊梁書武帝紀天監元年夏四月丙寅髙祖即位於南郊設壇柴燎告類于天曰皇帝臣衍敢用玄牡昭告于皇天后帝齊氏以歷運斯既否終則亨欽若天應以命于衍夫任是司牧惟能是授天命不于常帝王非一族唐謝虞受漢替魏升爰及晉宋憲章在昔咸以君德馭四海元功子萬姓故能大庇氓黎光宅區宇齊代云季世主昏凶狡焉羣慝是崇是長肆厥姦回暴亂以播虐于我有邦俾溥天惴惴將墜于深壑九服八荒之內連率嶽牧之君蹶角頓顙匡救無術卧薪待然援天靡訴衍投袂星言摧鋒萬里厲其挂冠之情用拯兆民之切銜膽誓衆覆鋭屠堅建立人主克翦昏亂遂因時來宰司邦國濟民康世實有厥勞而晷緯呈祥川嶽效祉朝夕坰牧日月郊畿代終之符既顯革運之期已萃殊俗百蠻重譯獻欵人神逺邇罔不和會于是羣公卿士咸致厥誠並以皇乾降命難以謙拒齊帝脫屣萬邦授以神器衍自惟匪德辭不獲許仰迫上玄之眷俯惟億兆之心宸極不可久曠民神不可乏主遂藉樂推膺此嘉祚以兹寡薄臨御萬方顧求夙志永言祗惕敬簡元辰恭兹大禮升壇受禪告類上帝克播休祉以𢎞盛烈式傳厥後用永保于我有梁惟明靈是饗范雲傳髙祖受禪柴燎于南郊雲以侍中參乘禮畢髙祖升輦謂雲曰朕之今日所謂凛乎若朽索之馭六馬雲對曰亦願陛下日慎一日紀元表壬午梁髙祖武帝天監元年十八元三年北魏正始五年秦州主薄吕茍兒反號建明元涇州陳瞻聖明元僣稱王七年北魏永平元魏京兆王愈僣稱帝號建平元十一年北魏延昌元年十五年北魏孝明帝熙平元十七北魏神龜元庚子普通元年七號是年北魏正光元莫五年沃野鎮人破落汙拔陵反真王元秦州城人折念生天建元僣稱天子六年北魏孝昌元徐州刺史元法僧天啓元僣稱宋王柔元鎮人杜洛州反于上谷號真王元山胡劉蠡斤神嘉元僣稱天子丁未大通元年二隆是年永州刺史蕭寶寅反號緒元陳郡民劉獲鄭辨同反于西華號天授元世二年北魏武泰元二月孝明帝崩胡太后立臨洮王子釗是為幼主太后臨朝稱制夏四月爾朱世隆立長樂王子攸是為孝莊帝改元建義九月改為永安元河間邢昶反于青州號天統元魏北海王皓為魏王號孝基元己酉中大通元年六武是年北海王皓建元二年北魏爾朱世隆與爾朱兆立長廣王曅改為建明元年十三年北魏爾朱世隆更立廣陵王恭改元普泰後廢一月髙歡立渤海太守朗于信都改元中興後廢月四年北魏前廢帝普泰二年後廢帝中興二年夏四髙歡廢具主恭及朗立平陽王修是為出帝改元太昌十二月改元永興以同太宗號復改為永熙元六年北魏出帝入關髙歡奉清河王亶子善見即位於洛陽是為東魏孝靜帝改元天平乙卯大同元年十一文是年北魏宇文泰立南陽王寶炬於關西是為西魏帝改元大統鄱陽鮮于琛反號上願元二年汾胡王迢觸二龍號平都元年四年東魏元象元五年東魏興和元九東魏武定元丙寅中大同元年一丁卯太清元年三德二年侯景立臨賀王正為帝號正平元帝在位四十八年改元七太子綱立庚午簡文帝大寶元年三東是年湘王繹起兵討侯景稱太清四年王北齊文宣帝天保元篡二年侯景廢簡文帝立豫章棟改元天正十月景位自立改為太始元西魏太子欽立是為廢帝位三年湘東王稱太清六年夏四月平侯景十一月即於江陵是為元年改元氶聖武陵王紀稱帝於成都號天正元西魏廢帝元壬申元帝承聖元年三辨三年十一月西魏陷江陵元帝被執遇害王僧陳霸先奉元帝子晉安王方智承制是為敬帝西魏廢帝三年為宇文泰所廢子齊王廓立是為恭帝元在位三年改元一乙亥敬帝紹泰元年一陽是年二月即皇帝位於潯陽王僧辨立貞王淵明于建康改元天成梁王蕭察稱帝于江陵是為後梁建元大定丙子太平元年二先二年九月封陳霸為陳公冬十月進爵為王敬帝禪位于陳陳封帝為江隂王在位三年改元二右梁陳書髙祖本紀永定元年冬十月乙亥髙祖即皇帝位于南郊柴燎告天曰皇帝臣霸先敢用玄牡昭告於皇皇后帝梁氏以圯剝荐臻歷運有極欽若天應以命霸先夫肇有蒸民乃樹司牧選賢與能未常厥姓放勳重華之世咸無意於受終當塗典午之君雖有心于揖讓皆以英才處萬乘髙勳御四海故能大庇黔首光宅區縣有梁末運仍葉遘屯獯醜憑陵久移神器承聖在外非能祀夏天未悔禍復罹寇逆嫡嗣廢黜宗枝僭詐天地蕩覆紀綱泯絶霸先爰初投袂大拯橫流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈祥緯聚東井龍見譙邦除舊布新既彰玄象遷虞事夏且協謳歌九域八荒同布衷欵百神羣祀皆有誠願梁帝髙謝萬邦授以大寶霸先自惟菲薄讓德不嗣至於再三辭弗獲許僉以百姓須主萬機難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慙德敬簡元辰升壇受禪告類上帝用答民心永保于我有陳惟明靈是饗紀元表丁丑陳髙祖武帝永定元年三文是年西魏封宇覺為周公禪位北周孝閔帝元正月即位尋廢子寧都公育立是為明帝元二年梁丞相王琳奉永嘉王蕭莊稱帝於江州改為天啓元稱三年北齊文宣帝崩太子殷立後廢北周武成元始皇帝在位三年改元一兄子臨川王蒨立庚辰文帝天嘉元年六常是年北齊廢帝乾明元山王演廢其主殷為濟隂王自立為孝昭帝改元為皇建北周廢帝弟魯國公雍立是為武帝二年北齊孝昭帝崩弟長廣王湛立是為武成帝改元為太寧北周武帝保定元齊三年北齊河清元後梁蕭察于巋天保元六年北武成帝禪位于太子緯是為後主改元為天統丙戌天康元年一元是年北周天和帝在位六年改元二太子伯宗立後廢丁亥廢帝光大元年二頊二年安成王廢帝為臨海王自立元帝在位二年改一己丑宣帝太建元年十四武二年北齊平元帝四年北周建德元晉八年北齊隆化元齊人立文襄子安德王延宗于陽改元德昌尋被執于周九年北齊後主禪位于太子恆是為幼主改為承光元被執于周十年北周宣政元武帝崩太子斌立是為宣帝于十一年北周宣帝天成元年二月改為大象元禪位太子衍是為靜帝十二年北周宣帝崩十二月封楊堅為隋王帝十三年北周靜帝大定元年春正月禪位于隋隋封為介國公隋文帝開皇元十四年