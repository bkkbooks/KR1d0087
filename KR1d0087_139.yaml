上在位十八年改元三太子適立庚申德宗建中元年四奉四年冬十月涇原兵亂帝幸天朱泚應天元僣稱秦帝甲子興元元年一京是年李懷光反帝幸梁州李晟等收復京師帝還李希烈應天元僣稱帝朱泚天皇元更號漢乙丑貞元元年二十一死十二年𥘉渤海王欽茂卒子宏臨早族弟元義立一嵗國人殺之宏臨子華嶼立改元中興華嶼卒欽茂少子蒿臨立改元正歷在位二十六年改元三太子誦立唐書順宗本紀貞元二十一年正月癸巳德宗崩丙申即皇帝位于太極殿二月癸卯朝羣臣于紫宸門永貞元年八月庚子立皇太子為皇帝自稱曰太上皇辛丑改元降死罪以下蕙田案順宗以德宗崩年即位本不改元至八月內禪乃改為永貞元年與蜀後主晉惠帝之改元有别紀元表乙酉順宗永貞元年一于是年正月立八月禪位太子純在位一年改元一丙戌憲宗元和元年十五執三年沙陀來降以其酋長宜為隂山兵馬使為後唐之始南詔王尋閣勸應道元八四年渤海王元瑜永德元南詔王勸龍晟龍興元年渤海王言義朱雀元義十一年南詔王勸利全義元卒十三年初渤海王言卒弟明忠立改元太始一嵗從父仁季立改元建興至是遣使入朝告哀詔以仁秀嗣渤海王在位十五年太子恆立改元一辛丑穆宗長慶元年四天三年南詔王豐祐保和元後又改元啓在位四年太子湛立改元一乙巳敬宗寶歷元年二所在位二年為宦官劉克明弒弟江王昂立改元一丁未文宗太和元年九彛四年渤海王震咸和元丙辰開成元年五十在位四年太弟瀍立改元二辛酉武宗會昌元年六忱在位六年太叔立改元一丁卯宣宗大中元年十三在十三年南詔王酋龍建極元位十三年子鄆王漼立改元一庚辰懿宗咸通元年十四王在位十四年子普儇立改元一甲午僖宗乾符元年六五二年黃巢作亂年黃巢王霸元庚子廣明元年一是年黃巢陷長安帝幸興元黃巢金統元僣稱齊帝辛丑中和元年四成是年帝幸都二年賊將朱溫降以為河中招討使賜名全忠為後梁之始三年李克用破黃巢復長安乙巳光啓元年三帝是年三月帝還京十二月蒲晉邠寧四鎮搆兵幸鳯翔秦宗權稱帝一年南詔王驃信舜化中興元襄二年帝幸興元邠寧未玫以肅宗元孫王煴監國尋稱帝改元建貞戊申文德元年一十是年僖宗還京元在位年太弟傑立改五己酉昭宗龍紀元年一庚戌大順元年二王二年前蜀建鎮蜀壬子景福元年二楊是年吳行密鎮淮南度二年吳越錢鏐節鎮海軍甲寅乾寧元年四犯二年邠寧二鎮闕帝幸石門鎮李克用以車駕還京馬三年李茂貞犯闕帝幸華州閩王潮節度威武軍楚殷節度湖南四年閩王潮弟審知節度威武軍戊午光化元年三劉是年帝還京立三年宦官季述等廢帝太子裕辛酉天復元年三王是年春正月帝復位黜太子裕為德十一月韓全誨等劫帝幸鳳翔南漢劉隱節度清海甲子天祐元年四立是年朱全忠弒帝太子祝是為昭宣帝二年昭宣帝仍稱天祐吳楊行密卒于渥立位于梁昭宗在位十六年改元七四年昭宣帝禪年末昭宣帝嗣立三改元右唐五代史梁本紀太祖開平元年夏四月壬戌更名晃甲子皇帝即位戊辰大赦改元國號梁紀元表丁卯後梁太祖開平元年四億是年遼太祖耶律即皇帝位始稱元年晉王李克用岐王李茂貞吳楊渥俱稱唐天祐四年前蜀王建稱唐天復七年吳越錢鏐據杭州閏王審知據閩南平髙季興節度荆南楚馬殷據湖南南漢劉隱據嶺南二年前蜀王建武成元僣稱帝吳越錢鏐天寶元通鑑綱目吳越至唐明宗天成元年改元寶正十國春秋吳越在梁開平二年已稱天寶後改寶大尋又改寶正演三年晉王李存朂吳楊渥弟隆俱稱唐天祐六年庚午乾化元年四年是前蜀王建永平元南漢劉隱庶弟龑節度清海燕劉守光應天元二年子均王友貞立是為末帝三年末帝仍稱乾化晉王李存朂吳楊隆演岐李茂貞俱稱唐天祐十年在位六年為其子郢王友圭所弒改元二甲戌末帝貞明元年六建二年遼太祖神册元前蜀王通正元三年前蜀王建天漢元改國號漢南漢劉龑乾亨元僣稱帝國號越漢四年前蜀王建光天元復國號蜀南漢劉龑改國號吳五年吳楊隆演武義元僣稱王前蜀王建子衍乾德元辛巳龍德元年三吳是年楊隆演子溥順義元年二年遼天贊元吳越錢鏐始建國稱王三晉王存朂伐梁末帝自殺右後梁五代史唐本紀莊宗同光元年夏四月己巳皇帝即位大赦改元國號唐紀元表癸未後唐莊宗同光元年四康三年前蜀王衍咸元降唐南漢劉龑白龍元南平髙季興封南平王後蜀孟知祥節度西川閩王審知長子延翰僣稱王國號閩吳越錢鏐王寶正元養四年莊宗被弒于郭從謙子嗣源立改元一五代史唐本紀明宗天成元年四月丁亥莊宗崩己丑入洛陽甲午監國朝羣臣于興聖宫丙午始奠於西宫皇帝即位于柩前易斬縗以衮冕甲寅大赦改元徐氏無黨曰曰始奠見其緩也自己丑入洛至此二十日矣柩前即位嗣君之禮也反逆之臣自立而用嗣君之禮書從其實而不變文者蓋先已書反正其罪矣此書其實者見其猶有自愧之心而欲逃大惡之名也紀元表丙戌明宗天成元年四稱二年遼太宗德光立仍天顯二年遼史太宗本紀天贊二年五月改元天顯七月太祖崩太宗本紀天顯二年十一月即位有司請改元不許據此則太宗未改太祖天顯年號故天顯有十五年而五代契丹附録德光立三年改元天顯計在唐明宗天成元年通鑑載契丹改元天顯又在天成二年彼此互異今從遼史吳楊溥乾貞元僣稱帝閩王審知次子鏻弒延翰自立楚馬殷封楚國王誨三年南漢劉龑大有元南平髙季興長子從立四年吳楊溥太和元庚寅長興元年四立是年後蜀孟知祥據西川楚馬殷次子希聲三年楚馬殷第四子希範立四年閩王鏻龍啓元僣稱帝國號閩吳越錢鏐長子元瓘立在位八年子從厚立改元二甲午閔帝應順元年潞王從珂清泰元年三德是年後蜀孟知祥明元閏五月僣稱帝國號蜀六月子昶立仍稱明德陷二年吳楊溥天祚元閩王鏻永和元三年石敬塘洛陽帝自焚死契丹立敬塘為帝一在位三年改元右後唐五代史晉本紀髙祖尺福元年十一月丁酉皇帝即位國號晉己亥大赦改元紀元表丙申晉髙祖天福元年八元二年南唐李升升元篡吳僣稱帝國號齊唐三年遼會同元後蜀孟昶廣政元南唐李升改國號四年閩王審知少子曦永隆元七年南漢劉龑長子坌光天元吳越錢元瓘長子佐立應八年南唐李忭子璟保大元南漢劉龑次子晟改元乾又改元乾和閩王審知子延政天德元改國號殷福在位七年兄子齊王重貴立是為出帝仍稱天八年甲辰出帝開運元年三政二年封劉知逺為北平王閩王延復國號閩降于南唐三年契丹入冦帝被執一在位三年改元右後晉紀元表丁未後漢髙祖建國即位稱晉天福十二年戊申改乾祐元年三開天福晉髙祖年號天福止八年改元運至此四年漢雖易代仍稱晉年號舍開運而追稱天福為十二年是年六月以前仍稱晉六月始改國號漢是年遼大同元建國號曰遼太宗崩永康王烏雲立是為世宗改元天祿楚馬希範同母弟希廣立二年吳越錢佐弟俶立南平髙從誨第三子保融立以在位二年子周王承祐立是為隱帝仍稱乾祐二年郭威為樞密使宋太祖趙匡胤應幕居帳下希三年郭威廢帝自立楚馬萼殺其弟希廣自立五代史漢本紀贊嗚呼人君即位稱元年常事爾古不以為重也孔子未修春秋其前固已如此雖暴君昏主妄庸之史其記事先後逺近莫不以嵗月一二數之乃理之自然也其謂一為元亦未嘗有法蓋古人之語爾古謂嵗之一月亦不云一而曰正月國語言六呂曰元間大呂周易列六爻曰初九大抵古人言數多不言一不獨謂年為元也及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事自漢以後又名年以建元而正偽紛雜稱號遂多不勝其紀也五代亂世也其事無法而不合於理者多矣皆不足道也至於年號乖錯以惑後世則不可以不明初梁太祖以乾化二年遇弒明年末帝已誅友圭黜其鳯歷之號復稱乾化三年尚為有説至漢髙祖建國黜晉出帝開運四年復稱天福十二年者何哉蓋以其愛憎之私爾方出帝時漢髙祖居太原嘗憤憤下視晉而晉亦陽優禮之幸而未見其隙及契丹滅晉漢未嘗有赴難之意出帝已北遷方陽以兵聲言追之至土門而還及其即位改元而黜開運之號則其用心可知矣蓋其于出帝無復君臣之義而幸禍以為利者其素志也可勝歎哉夫所謂有諸中必形于外者其見於是乎蕙田案歐陽氏論後漢黜開運之號是矣以稱元為未嘗有法未敢信也右後漢五代史周本紀太祖廣順元年春正月丁卯皇帝即位大赦改元國號周紀元表辛亥周太祖廣順元年四子是年遼世宗崩太宗夀安王舒嚕立是為穆宗改元應歷楚馬殷世子希崇立一月為南唐所滅北漢劉旻僣稱帝仍稱乾祐四年在位四年改元一養子柴榮立五代史周本紀周世宗顯德元年正月丙申皇帝即位於柩前紀元表甲寅世宗顯德元年七稱是年北漢劉旻子鈞仍乾祐八年四年北漢劉鈞天會元改五年南漢劉晟長子鋹大寶元南唐李璟中興元又元交泰盡去帝號奉周正朔六年世宗崩于梁王宗訓立是為恭帝不改元為七年恭帝禪位于殿前都檢點趙匡胤宋封帝鄭王徐氏無黨曰五代亂世以嗣君即位者五而改元不依古者四梁末帝晉出帝即位踰年宜改元而不改又明年然後改漢隱帝周恭帝皆仍稱先帝年號終其世不改書其實自見其失也右後周宋史太祖本紀周顯德七年春軍士宣言䇿點檢為天子羅拜呼萬嵗擁宰相范質等至降階列拜翰林承旨陶榖出周恭帝禪位制書于袖中宣徽使引太祖就庭北面拜受已乃掖太祖升崇元殿服衮冕即皇帝位建隆元年春正月乙巳大赦改元定有天下之號曰宋己酉遣官祭告天地社稷文獻通考告天地社稷羣祀祝文曰維大宋建隆元年嵗次庚申正月辛丑朔某日嗣天子臣匡胤謹遣某官某敢昭告于昊天上帝皇地祗天命不常惟德是輔神器大寶猥集眇躬欽眷命而不遑勵小心而昭事靈貺下屬羣情樂推今月四日已即皇帝位改國號為大宋乃改建隆元年不敢不告尚享又遣宗正少卿郭屺以即位告周髙祖世宗廟紀元表庚申宋太祖建隆元年三弟是年南平髙寶融卒保朂立二年南唐李璟子煜立子三年南平髙保朂卒保融繼沖立癸亥乾德元年五平是年南髙繼沖入宋國除于三年後蜀孟昶降宋戊辰開寶元年九養是年北漢劉鈞子繼恩立二月為供奉官侯霸所殺劉繼元立改元廣運二年遼穆宗崩世宗子賢立是為景宗改元為保寧三年南漢劉鋹降于宋位九年太祖崩弟晉王光義立在十七年改元三丙子太宗太平興國元年八元三年吳越錢俶降于宋崩四年北漢劉繼降于宋七年遼景宗長子隆緒立是為聖宗國八年遼聖宗統和元復號曰大契丹甲申雍熙元年四遷四年李繼為夏國王西夏之禍始此戊子端拱元年二州是年命李繼捧鎮夏賜姓名趙保忠庚寅淳化元年五保二年李繼遷降賜姓名趙吉趙保忠叛降契丹乙未至道元年三二三年太宗崩在位二十年改元五太子恆立戊戌真宗咸平元年六年六夏趙保吉死子德明嗣甲辰景德元年四戊申大中祥符元年九五年遼開泰元丁巳天禧元年五太五年遼平元壬戌乾興元年一年是真宗崩在位二十六年改元五太子受益立癸亥仁宗天聖元年九遼九年聖宗崩太子宗真立是為興宗改元景福壬申明道元年二夏是年遼重熙元趙德明死于元昊嗣避父諱稱顯道元甲戌景祐元年四開是年夏趙元昊反改元運又改為廣運三年夏趙元昊大慶元戊寅寶元元年二禮是年夏趙元昊改元天授法延祚僣稱帝國號夏更名曩霄庚辰康定元年一辛巳慶歷元年八為四年册元昊夏國王八年夏曩霄子諒祚延嗣寧國元己丑皇祐元年五垂二年夏諒祚天祐聖元五年夏諒祚福聖承道元甲午至和元年二立二年遼興宗崩長子洪基是為道宗改元為清寧丙申嘉祐元年八改八年仁宗崩在位四十二年元九太宗曾孫宗實立甲辰英宗治平元年四元是年夏諒祚拱化元五二年遼咸雍四年英宗崩在位年改元一太子頊立戊申神宗熙寧元年十二是年夏秉常乾道元年王安石用事行新法交趾李日尊自稱帝國號大越改元寶象又改元神武三年夏秉常天賜禮盛國慶元八年遼太康元夏秉常大安元戊午元豐元年八九八年遼大安元煦在位十年改元二太子立丙寅哲宗元祐元年八年是年夏秉常天安禮定元元二夏秉常子乾順天儀治平天六年夏乾順佑民安元甲戌紹聖元年四事是年章惇蔡京等用二年遼夀隆元戊寅元符元年三在二年夏乾順永安元端三年哲宗崩位十五年改元三弟王佶立辛巳徽宗建中靖國元年一王是年遼道宗崩孫燕國延禧立是為天祚帝改元乾統壬午崇寧元年五順二年夏乾貞觀元丁亥大觀元年四辛卯政和元年七基是年遼天慶元渤海髙永昌僣號稱隆元四年金太祖稱帝元年七年金天輔元戊戌重和元年一己亥宣和元年七元二年夏乾順德元三年遼保大元京四年遼保大二年金克中京天祚帝奔雲中三月燕留守李處溫等立秦晉王淳為帝遙廢天祚帝為湘隂王建元建福六月遼主淳殂蕭幹等迎立秦王定為帝蕭后稱制改元德興十二月金克燕京蕭后奔天德王五年遼天祚帝奔夏都統蕭迪里等立帝第二子梁雅里為帝改元神歷冬十月天祚帝復渡河東還雅里殂蕭迪里等復立聖宗孫珠拉為帝十一月珠拉為亂兵所害知北院樞密事奚和哩布自稱為奚帝改元天復都統蕭幹自稱為奚帝改元天嗣金太祖崩弟晟立是為太宗改元天會六年耶律達實稱帝于竒爾瑪勒是為西遼改元延慶六七年遼天祚帝為金所執遼亡在位二十五年改元傳位于太子桓丙午欽宗靖康元年二元是年西遼耶律達實康國二年徽宗欽宗北狩康王搆即位于南京是為髙宗宋史欽宗本紀宣和七年十二月徽宗詔皇太子嗣位趣太子入禁中被以御服涕泣固辭因得疾又固辭不許辛酉即皇帝位御垂拱殿見羣臣改元髙宗本紀建炎元年至應天府皇后手書告中外俾帝嗣統詔有司備法駕儀仗羣臣勸進命有司築壇府門之左五月庚寅帝登壇受命禮畢慟哭遙謝二帝即位于府治改元建炎通考髙宗建炎元年五月一日登極告於昊天上帝册文曰維靖康二年嵗次丁未五月庚寅朔嗣天子臣構敢昭告于昊天上帝金戎亂華二帝北狩天支戚屬混於穹居宗社固所憑依夷夏罔知攸主臣構以道君皇帝之子奉宸旨以總六師握大元帥之權唱義旅而先諸將冀清京邑迎復兩宫而百辟卿士萬邦黎獻謂人思宋德天眷趙宗宜以神器屬臣構辭之再四懼不克負荷貽羞於來世九州四海萬口一辭咸曰不可稽皇天之寶命栗栗震惕敢不欽承尚祈隂相以中興于宋祚紀元表丁未髙宗建炎元年四夏是年帝幸揚州三二年乾順正德元年帝幸杭州苖傅劉正彥作亂立皇子敷改元明受四月傅正彥伏誅帝復位還越州辛亥紹興元年三十二安是年金立劉豫為齊帝改元阜昌宗二年帝還臨五年徽宗崩于金五國城金太崩太祖孫亶立是為熙宗咸六年夏乾順大德元西遼感天皇后蕭氏稱制改元清八年帝定都臨安金天眷元十十年夏乾順子仁孝大慶元元十一年金皇統元三年西遼達實子伊立紹興十四年夏仁孝人慶元幹十八年夏仁孝大盛元遼王宗子亮立後廢改元天德十九年金熙宗崩二十三年金貞元元遷都于燕二二十五年西遼承天太后富僧額稱制改元崇福十六年欽宗崩于金金正隆元三十一年金曹國公雍即位于遼陽是為世宗改元大定廢帝被弒尋追廢為海陵庶人世宗入燕在位三十六年內禪于太子眘改元二宋史孝宗本紀髙宗久有禪位之意紹興三十二年五月乙亥內降御札皇太子可即皇帝位朕稱太上皇帝退處德壽宫丙子遣中使召帝入禁中面諭之帝又推遜不受即趨側殿門欲還東宫髙宗勉諭再三乃止於是髙宗出御紫宸殿輔臣奏事畢髙宗還宫百官移班殿門外拜詔畢復入班殿庭頃之內侍掖帝至御榻前側立不坐內侍扶掖至七八乃略就坐宰相率百僚稱賀帝遽興輔臣升殿固請帝愀然曰君父之命出于獨斷然此大位懼不敢當班退太上皇帝即駕之德壽宫帝服袍履步出祥曦殿門冒雨掖輦以行及宫門弗止上皇麾謝再三且令左右扶掖以還顧曰吾付託得人吾無憾矣左右皆呼萬嵗宋史禮志髙宗內禪紹興三十二年六月十日御札皇太子可即皇帝位朕稱太上皇帝退處德壽宫一應軍國事並聽嗣君處分十一日行內禪禮有司設仗紫宸殿宰臣文武百僚立班皇帝出宫鳴鞭禁衛諸班直親從儀仗并內侍省執骨朵使臣等並迎駕自贊常起居皇帝升御座知閣門官以下並內侍都知御帶以下一班起居次管軍一班起居次宰執以下常起居訖左僕射陳康伯知樞密院事葉義問參知政事汪徹同知樞密院事黃祖舜升殿奏曰臣等不才輔政纍年罪戾山積乃蒙容貸不賜誅責今陛下超然獨斷髙蹈堯舜之舉臣等心實欽仰但自此不獲日望清光犬馬之情不勝依戀因再拜辭相與泣下幾至號慟帝亦為之流涕曰朕在位三十六年今老且病久欲間退此事斷自朕心非由臣下開陳卿等當悉力以輔嗣君康伯等復奏曰皇太子仁聖天下所共知似聞謙遜太過未肯便御正殿帝曰朕前此固嘗與之言早來禁中又面諭之即步行徑趨側殿門欲還東宫已再三敦勉邀留今在殿後矣宰執降階皇帝降坐鳴鞭還內宰臣文武百僚並退立班聽宣詔訖再拜舞蹈三稱萬嵗再拜訖班權退復追班入請殿下立班少頃新皇帝服履袍涕泣出宫禁衛諸班直親從儀仗等迎駕起居鳴鞭內侍扶掖皇帝至御榻涕泣再三不坐內侍傳太上皇帝聖旨請皇帝升御座皇帝升御座東側坐知閣門官以下一班起居稱賀次管軍官一班起居稱賀次文武百僚橫行北面立舍人當殿文武百僚宰臣陳康伯以下起居稱賀皇帝降御座側身西向不坐後宰臣以下再拜舞蹈三稱萬嵗起居稱賀畢康伯等升殿奏臣等言願陛下即御坐以正南面上副太上皇帝傳授之意帝愀然曰君父之命出于獨斷此大位懼不敢當尚容辭避康伯等再奏兹者伏遇皇帝陛下應天順人龍飛寶位第以駑下之材恐不足以仰輔新政然依乘風雲千載之遇實與四海蒼生不勝慶幸再拜賀畢奏事而退宰執下殿皇帝還內鳴鞭宰執文武百僚赴祥曦殿候太上皇帝登輦至德壽宫而退淳熙十六年孝宗內禪紹熙五年光宗內禪並如紹興二十三年故事紀元表癸未孝宗隆興元二乙酉乾道元年九遼四年西伊立子珠勒呼元禧元甲午淳熙元年十六金十四年髙宗崩世十六年大定二十九年宗崩太孫璟立是為章宗太在位二十七年改元三禪位于子淳宋史光宗本紀淳熙十六年正月辛亥兩府奏事孝宗諭以倦勤欲禪位皇太子退就休養以畢髙宗三年之制因令周必大進呈詔草二月壬戌孝宗吉服御紫宸殿行內禪禮應奉官以次稱賀內侍固請帝坐帝固辭內侍扶掖至七八乃微坐復興次丞相率百僚稱賀禮畢樞密院官升殿奏事帝立聽班退孝宗反喪服御後殿帝侍立尋登輦同詣重華宫帝還內文獻通考淳熙十六年二月五日光宗即位以皇帝登極奏告天地宗廟社稷景靈宫諸宫觀諸陵攢宫紀元表庚戌光宗紹熙元年五丹是年金章宗明昌元契德夀托精等據信州反建元身聖天四年夏仁孝子純祐慶元宋史光宗本紀紹熙五年壽皇聖帝崩七月甲子太皇太后以皇帝疾未能執喪命皇子嘉王即皇帝位于重華宫之素幄寧宗本紀紹熙五年六月戊戌孝宗崩光宗以疾不能出宰臣奏云皇太子嘉王仁孝夙成宜正儲位以安人心從之擬旨以進御批云歷事嵗久念欲退間宰臣等以禪位嘉王之意請於太皇太后太皇太后諭曰好為之知樞密院事趙汝愚命殿帥郭杲夜分兵衛南北翌日禫祭汝愚率百官詣大行柩前太皇太后垂簾汝愚率同列再拜奏皇帝疾不能執喪乃奉御批八字以奏太皇太后曰既有御筆卿當奉行汝愚曰內禪事重須議一指揮太皇太后允諾汝愚袖出所擬以進云皇帝以疾未能執喪曽有御筆欲自退間皇子嘉王擴可即皇帝位尊皇帝為太上皇皇后為太上皇后太皇太后覽畢曰甚善汝愚出以旨諭帝帝固辭曰恐負不孝名汝愚曰天子當以安社稷定國家為孝今中外憂亂萬一變生置太上皇何地衆扶入素幄被黃袍方却立未坐汝愚率同列再拜帝詣几筵殿哭盡哀須臾立仗訖催百官班帝衰服出就重華殿東廡素幄立內侍扶掖乃坐百官起居訖乃入行禫祭禮詔建泰安宫以奉太上皇太上皇后以即位告于天地宗廟社稷蕙田案光宗內禪寧宗即位之禮與髙宗內禪儀稍别蓋因時制宜不得不爾當時宰臣趙汝愚等不愧為大臣也王圻續通考宋寧宗慶元元年吏部員外郎李謙言事莫重于登極禮莫急于告廟蓋即位必告廟示敬親也告廟必于嵗首大其事也舜正月上日受終于文祖禹正月朔旦受命于神宗皆行告廟之禮也然禮以變而或殊事隨時而亦異有不可以一例觀者議禮之家各持一説不致其辨禮意無自而明夫嘉禮之與凶禮不可以並行舉一必廢一故在禮經喪三年不祭惟祭天地社稷為越紼而行事蓋不敢以卑而廢尊也夫天地以尊而不廢宗廟以親豈獨可廢乎况王制三年不祭之説諸儒之論亦自不同杜預之説以為既祔以後宗廟得四時常時祭蓋杜氏之意不以三年不祭宗廟為是也今姑置常祭之説而論即位踰年告廟之禮庶幾禮簡而易明虛言無證則論不定請質事以明之且太甲之元祀十有二月乙丑伊尹奉嗣王祗見厥祖百官猶總已以聽冡宰則是太甲居仲壬之喪而告廟也漢吕后以八年七月即世九月大臣迎立代王元年十月辛亥文帝即祚謁髙廟即是文帝居吕后之喪而告廟也唐代宗以大歷十四年即世德宗建中元年正月庚午朝享于太廟其後穆宗長慶之元年敬宗寶歷之元年武宗會昌之元年懿宗咸通之元年皆以正月朝享于太廟遍觀歷代之制雖小節不同大概居喪雖權住祭踰年正月必告于廟載諸經史可考而知漢昭宣元成哀平六世皆以即位謁廟不待踰年則失之速唐太宗貞觀三年正月方事于太廟馬周得以為言則失之緩皆非禮之正也以歷代之事而求其當其惟踰年正月告廟乎恭惟陛下自登極以來已享帝矣大行梓宫發引在即來年正月盍行告廟之禮禮官未見申明者豈非以王制為據乎竊謂即位之後已曽謁廟國有大故故可以未祭與居喪之後即位未經謁廟者事體不同考歷代已行之事宜於來年正月一日陛下躬行告廟之禮庶幾立一王之制示萬世之規乞下禮官指定施行詔令禮部太常寺討論聞奏至是禮寺看詳乞俟皇帝從吉日討論典禮施行從之通考馬氏端臨曰國朝會要告禮門總序稱祖宗以來登位則有告祭而所記纍朝排年告祭之禮則惟昌陵受禪創業思陵南京中興有之此後則惟孝宗光宗寧宗登極有告祭之禮而太宗以下皆無之豈軼其記耶或孝光寧三帝以受內禪故行之而纍朝以諒暗不克行耶又即位之後即親見于宗廟行饗祀禮亦惟