body:
  text: 五禮通考卷八十刑部尚書秦蕙田撰吉禮八十宗廟制度唐書髙祖本紀武德元年六月己夘追諡皇髙祖曰宣簡公皇曾祖曰懿王皇祖曰景皇帝廟號太祖皇考曰元皇帝廟號世祖禮樂志書曰七世之廟可以觀徳而禮家之說世數不同然自禮記王制祭法禮器大儒荀卿劉歆班固王肅之徒以為七廟者多葢自漢魏以来創業之君特起其上世㣲而無功德以立四廟故其初皆不能立七廟武德元年始立四廟曰宣簡公懿王景皇帝元皇帝舊唐書禮儀志武德元年五月備法駕迎宣簡公懿王景皇帝元皇帝神主祔於太廟始享四室于志寧傳貞觀三年志寧為中書侍郎加散騎常侍太子左庶子黎陽縣公是時議立七廟羣臣皆請以凉武昭王為始祖志寧以凉非王業所因獨建議違之唐書禮樂志貞觀九年髙祖崩太宗詔有司定議諫議大夫朱子奢請立七廟虚太祖之室以待於是尚書八座議曰禮天子三昭三穆與太祖之廟而七晉宋齊梁皆立親廟六此故事也制曰可於是祔𢎞農府君及髙祖為六室舊唐書禮儀志貞觀九年髙祖崩將行遷祔之禮太宗命有司詳議廟制諫議大夫朱子奢建議曰案漢丞相韋𤣥成奏立五廟諸侯亦同五劉子駿議開七祖邦君降二鄭司農踵元成之轍王子雍揚國師之波分塗並驅各相師祖咸翫其所習好同惡異遂令歴代祧祀多少參差優劣去取曾無畫一𫝊稱名位不同禮亦異數易云卑髙以陳貴賤位矣豈非别嫌疑慎㣲逺防陵僣尊君卑佐升降無舛所貴禮者義在兹乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名器無凖冠履同歸禮亦異數義將安設戴記又稱禮有以多為貴者天子七廟諸侯五廟若天子五廟纔與子男相埓以多為貴何所表乎愚以為諸侯立髙祖以下并太祖五廟一國之貴也天子立髙祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂徳厚者流光徳薄者流卑此其義也伏惟聖祖在天山陵有日祔祖嚴配大事在斯宜依七廟用崇大禮若親盡之外有王業之所基者如殷之𤣥王周之后稷尊為世祖倘無其例請三昭三穆各置神主太祖一室考而虚位將待七百之祚遞遷方處庶上依晉宋旁愜人情於是八座奏曰臣聞揖讓受終之后革命創制之君何嘗不崇親親之義篤尊尊之道䖍奉祖宗致敬郊廟自義乖闕里學滅秦庭儒雅既䘮經籍湮殄雖兩漢纂脩絶業魏晉敦尚斯文而宗廟制度典章散逸習所𫝊而競偏説執淺見而起異端自昔迄兹多歴年代語其大略兩家而已祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至德自然孝思罔極誠宜定一代之𢎞規為萬世之彞則臣奉述睿㫖討論徃載紀七廟者實多稱四祖者葢寡較其得失昭然可見春秋榖梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書曰七世之廟可以觀德至于孫卿孔安國劉歆班彪父子孔晁虞憙干寶之徒或學推碩儒或才稱博物商較今古咸以為然故其文曰天子三昭三穆與太祖之廟而七晉宋齊梁皆依斯義立親廟六豈非有國之茂典不刋之休烈乎若使違羣經之明文從累代之疑議背子雍之篤論尊康成之舊學則天子之禮下偪於人臣諸侯之制上僭於王者非所謂尊卑有序名位不同者也况復禮由人情自非天墜大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀逮七世得加隆之心是知德厚者流光乃可久之髙義徳薄者流卑實不易之令範臣等參議請依晉宋故事立親廟六其祖宗之制式遵舊典庶承宗之道興於禮定之辰尊祖之義成於孝治之日制從之蕙田案子奢論七廟是貞觀二十三年太宗崩將行崇祔之禮禮部尚書許敬宗奏言𢎞農府君廟應迭毁案舊儀漢丞相韋𤣥成以為毁主瘞埋但萬國宗享有所從来一旦瘞埋事不允愜晉博士范宣意欲别立廟宇奉征西等主安置其中方之瘞埋頗協情理事無典故亦未足依又議者或言毁主藏於天府祥瑞所藏本非斯意今謹凖量去祧之外猶有壇墠祈禱所及竊謂合宜今時廟制與古不同共基别室西方為首若在西夾之中仍處尊位祈禱則祭未絶祗享方諸舊儀情實可知𢎞農府君廟逺親殺詳據舊章禮合迭毁臣等參議遷奉神主藏於夾室本情篤教在禮為𢎞從之其年八月庚子太宗文皇帝神主祔於太廟文明元年八月奉高宗神主祔於太廟中始遷宣皇帝神主於夾室唐書武后本紀垂拱四年正月甲子增七廟立髙祖太宗髙宗廟於神都舊唐書禮儀志垂拱四年正月又於東都立髙祖太宗髙宗三廟四時享祀如京廟之儀别立崇先廟以享武氏祖考則天尋又令所司議立崇先廟室數司禮博士崇文館學士周悰希㫖請立崇先廟為七室其皇室太廟減為五室春官侍郎賈大隱奏曰臣竊凖秦漢皇太后臨朝稱制并據禮經正文天子七廟諸侯五廟葢百王不易之義萬代常行之法未有越禮違古而擅裁儀注者也今周悰别引浮議廣述異文直崇臨朝權儀不依國家常度升崇先之廟而七降國家之廟而五臣聞皇圖廣闢實崇宗社之尊帝業𢎞基實等山河之固伏以天歩多艱時逢遏宻代天理物自古有之伏惟皇太后親承顧托憂勤黎庶納孝慈之請垂矜撫之懐實所謂光顯大猷恢崇聖載其崇先廟室合同諸侯之數國家宗廟不合輒有移變臣之愚直並依正禮周悰之請實乖古儀則天由是且止蕙田案賈議辭嚴義正卓然不可磨唐書武后本紀嗣聖七年即武后天授元年九月丙戌立武氏七廟於神都十月改唐太廟為享德廟以武氏七廟為太廟禮樂志天授二年則天既革命稱帝於東都改制太廟為七廟室奉武氏七代神主祔於太廟改西京太廟為享德廟四時唯享髙祖已下三室餘四室令所司閉其門廢其享祀之禮又改西京崇先廟為崇尊廟其享祀如太廟之儀蕙田案武氏之罪此為最大中宗本紀神龍元年正月丙午復於位五月壬午遷武氏神主於崇恩廟乙酉立太廟於東都八月乙亥祔孝敬皇帝於東都太廟皇后見於廟十一月壬午及皇后享於太廟大赦壬寅皇太后崩廢崇恩廟禮樂志初唐建東西二都而東都無廟則天皇后僭號稱周立周七廟於東都以祀武氏改西京唐太廟為享德廟神龍元年中宗復位遷武氏廟主於西京為崇尊廟而以東都武氏故廟為唐太廟祔光皇帝以下七室而親享焉由是東西二都皆有廟嵗時並享蕙田案東西二都立廟並享非禮也舊唐書禮儀志神龍元年正月改享德廟依舊為京太廟五月遷武氏七廟神主於西京之崇尊廟東都創置太廟太常博士張齊賢建議曰昔孫卿子云有天下者事七代有一國者事五代則天子七廟古今達理故尚書稱七世之廟可以觀德祭法稱王立七廟一壇一墠王制云天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毁廟之主陳於太祖未毁廟之主皆升合食於太祖之室太祖東向昭南向穆北向商之𤣥王周之后稷是也太祖之外更無始祖但商自𤣥王已後十有四代至湯而有天下周自后稷以後十有七代至武王而有天下其間代數既逺遷廟親廟皆出太祖之後故合食有序尊卑不差其後漢髙受命無始封祖即以髙皇帝為太祖太上皇帝之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其髙祖太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等並為屬尊不在昭穆合食之列歴兹以降至於周隋宗廟之制斯禮不改故宇文氏以文皇帝為太祖隋室以武元皇帝為太祖國家誕受天命累葉重光景皇帝始封唐公實為太祖中間代數既近列在三昭三穆之内故皇家太廟唯有六室其𢎞農府君宣光二帝尊於太祖親盡則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月十九日勅七室以下依舊號尊崇又奉三月一日勅既立七廟須尊崇始祖速令詳定者伏尋禮經始祖即是太祖太祖之外更無始祖周朝太祖之外以周文王為始祖不合禮經或有引白虎通議云后稷為始祖文王為太祖武王為太宗及鄭𤣥注詩雍序云太祖謂文王以為説者其義不然何者彼以禮王者祖有功宗有德周人祖文王而宗武王故謂文王為太祖耳非祫祭羣主合食之太祖今之議者或有欲立凉武昭王為始祖者殊為不可何者昔在商周稷禹始封湯武之興祚由稷禹故以稷禹為太祖即皇家之景皇帝是也凉武昭王勲業未廣後主失國土宇不傳景皇始封實基明命今乃捨封唐之盛烈崇西凉之逺搆考之前古實乖典禮魏氏不以曹參為太祖晉氏不以殷王卬為太祖宋氏不以楚元王為太祖齊梁不以蕭何為太祖陳隋不以胡公楊震為太祖則皇家安可以凉武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯制下公卿議議者多同帝亦然之杜林正議獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循竟從林議又傳稱欲知天上事問長人以其近之武德貞觀之時主聖臣賢其去涼武昭王葢亦近於今矣當時不立者必不可立故也今既年代寖逺方復立之是非三祖二宗之意實恐景王失職而震怒武昭虚位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其説既灌而往孔子不欲觀之今朝命惟新宜應慎禮祭如神在理不可誣請凖勅加太廟為七室享宣皇以備七代其始祖不合别有尊崇太常博士劉承慶尹知章又議云謹案王制天子七廟三昭三穆與太祖之廟而七此載籍之明文古今之通制皇唐稽考前範詳採列辟崇建宗靈式遵斯典但以開基之王受命之君王迹有淺深太祖有逺近湯文祚基稷禼太祖代逺出乎昭穆之上故七廟可全若夏繼唐虞功非由鯀漢除秦項力不因堯及魏晉經圖周隋撥亂皆勲隆近代祖業非逺受命始封之主不離昭穆之親故肇立宗祊罕聞全制夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毁或以太祖代淺廟數非備更於昭穆之上逺立合遷之君曲從七廟之文深乖迭毁之制皇家千齡啟旦百葉重光景皇帝濬德基唐代數猶近號雖崇於太祖親尚列於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝唯有宣光景元神堯文武六代親廟文帝登遐神主升祔於廟室以宣皇帝代數當滿凖禮復遷今止有光皇帝已下六代親廟非是天子之廟數不當有七本由太祖有逺近之異故初建有多少之殊敬惟三后臨朝代多儒雅神祊事重禮豈虚存規模可沿理難變革宣皇既非始祖又廟無祖宗之號親盡既遷其廟不合重立若禮終運往建議復崇實違王制之文不合先朝之㫖請依貞觀之故事無革三聖之宏規光崇六室不虧古義時有制令宰相更加詳定禮部尚書祝欽明等奏言博士三人自分兩議張齊賢以始同太祖不合更祖昭王劉承慶以王制三昭三穆不合重崇宣帝臣等商量請依張齊賢以景皇帝為太祖依劉承慶尊崇六室制從之尋有制以孝敬皇帝為義宗升祔於太廟其年八月崇祔光皇帝太祖景皇帝世祖元皇帝髙祖神堯皇帝太宗文武聖皇帝皇考髙宗天皇大帝皇兄義宗孝敬皇帝於東都之太廟躬行享獻之禮蕙田案張齊賢論唐太祖之説極是而以尊於太祖之祖為不在合食之列則未審也葢時享所奉七廟之定制也太祖而外三昭三穆論親而不論功德祫祭之禮毁廟所合食也太祖而外凡為祖者無拘太祖前後皆得與食亦論親而不論功德葢世數有近逺古今有時宜禮以義起者當如是若如漢魏以後屬尊不合食之例安得謂之祫祭乎劉承慶等六廟之説自亦權宜至以孝敬帝升祔足數則非禮矣觀承案屬尊不合食之例殊謬葢不知禮以義起故也故唐人禘祫紛紜當以昌黎之議為得情理之中景龍元年正月丙戌復武氏廟陵置令丞守戸舊唐書禮儀志神龍二年駕還京師太廟自是亦崇享七室仍改武氏崇恩廟明年二月復令崇恩廟一依天授時享祭時武三思用事宻令安樂公主諷中宗故有此制尋又特令武氏崇恩廟齋郎取五品子充太常博士楊孚奏言太廟齋郎承前只七品以下子今崇恩廟齋郎既取五品子即七廟齋郎作何等級上曰太廟齋郎亦凖崇恩廟置孚奏曰崇恩廟為太廟之臣太廟為崇恩廟之君以臣凖君猶為僭逆以君凖臣天下疑懼孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也伏願無惑邪言以為亂始其事乃寢蕙田案楊孚之奏與賈大隱可稱二絶唐書睿宗本紀景雲元年七月乙亥廢崇恩廟十月癸夘出義宗於太廟禮樂志中宗崩中書令姚元之吏部尚書宋璟以謂義宗追尊之帝不宜列昭穆而其葬在洛州請立别廟於東都而有司時享其京廟神主藏於夾室由是祔中宗而光皇帝不遷遂為七室矣舊唐書禮儀志景雲元年中書令姚元之吏部尚書宋璟奏言凖禮大行皇帝山陵事終即合祔廟其太廟第七室先祔皇兄義宗孝敬皇帝哀皇后裴氏神主伏以義宗未登大位崩後追尊神龍之初乃特令遷祔春秋之義國君即位未踰年者不合列叙昭穆又古者祖宗各别立廟孝敬皇帝恭陵既在洛州望於東都别立義宗之廟遷祔孝敬皇帝哀皇后神主命有司以時享祭則不違先㫖又協古訓人神允穆進退得宜在此神主望入夾室安置伏願陛下以禮斷恩制從之及既葬祔中宗孝和皇帝和思皇后趙氏神主於太廟其義宗即於東都從善里建廟享祀韋湊傳開元初遷將作大匠詔復孝敬皇帝廟號義宗湊奏曰傳云必也正名禮祖有功宗有德其廟百世不毁商有三宗周宗武王漢文帝為太宗武帝為世宗歴代稱宗者皆方制海内德澤可尊列于昭穆是謂不毁孝敬皇帝未嘗南面且别立寢廟無稱宗之義遂罷蕙田案廢崇恩廟出義宗皆極是唐書𤣥宗本紀開元四年六月太上皇崩十一月丁亥遷中宗於西廟舊唐書禮儀志開元四年睿宗崩及行祔廟之禮太常博士陳貞節蘇獻等奏議曰謹案孝和皇帝在廟七室已滿今睿宗大聖真皇帝是孝和之弟甫及仲冬禮當祔遷但兄弟入廟古則有焉遞遷之禮昭穆須正謹案禮論太常賀循議云兄弟不相為後也故殷之盤庚不序於陽甲而上繼於先君漢之光武不嗣於孝成而上承於元帝又曰晉惠帝無後懐帝承統懐帝自繼於世祖而不繼於惠帝其惠帝當同陽甲孝成别出為廟又曰若兄弟相代則共是一代昭穆位同至其當遷不可兼毁二廟此葢禮之常例也荀卿子曰有天下者事七代謂從禰已上也尊者統廣故恩及逺祖若旁容兄弟上毁祖考此則天子有不得全事於七代之義矣孝和皇帝有中興之功而無後嗣請同殷之陽甲漢之成帝出為别廟時祭不虧大祫之辰合食太祖奉睿宗神主升祔太廟上繼髙宗則昭穆永貞獻祼長序制從之初令以儀坤廟為中宗廟尋又改造中宗廟於太廟之西蕙田案兄弟不相為後者謂兄弟昭穆等倫同堂異室祔則並祔祧則同祧不紊世次之序耳非謂不相為後則不可同享於廟也陳貞節等迺有出為别廟之議可謂未達於禮矣唐書𤣥宗本紀開元五年正月癸夘太廟四室壊遷神主於太極殿素服避正殿輟視朝五日己酉享於太極殿十月戊寅祔神主於太廟禮樂志開元五年太廟四室壊奉其神主於太極殿天子素服避正殿輟朝三日時將行幸東都遂謁神主於太極殿而後行陳貞節傳開元五年太廟壊天子舍神主太極殿營新廟素服避正寢三日不朝猶幸東都伊闕男子孫平子上書曰乃正月太廟毁此躋二帝之騐也春秋君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟今皆違之魯文公之二年躋僖於閔上後太室壊春秋書其災説曰僖雖閔兄嘗為之臣臣居君上是謂失禮故太室壊且兄臣於弟猶不可躋弟嘗臣兄乃可躋乎莊公薨閔公二年而禘春秋非之况大行夏崩而太廟冬禘不亦亟乎太室尊所若曰魯自是陵夷墮周公之祀太廟今壊意者其將陵夷墮先帝之祀乎陛下未祭孝和先祭太上皇先臣後君昔躋兄弟上今弟先兄祭昔太室壊今太廟毁與春秋正同不可不察武后簒國孝和中興有功今内主别祠不得列於世亦已薄矣夫功不可棄君不可下長不可輕且臣繼君猶子繼父故禹不先鯀周不先不窋宋鄭不以帝乙厲王不肖猶尊之也况中興耶晉太康時宣帝廟地䧟梁折又三年太廟殿䧟而及泉更營之梁又折天之所譴必非朽而壊也晉不承天故及於亂臣謂宜遷孝和還廟何必違禮下同魯晉哉帝異其言詔有司復議貞節獻與博士馮宗質之曰天子七廟三昭三穆與太祖而七父昭子穆兄弟不與焉殷自成湯至帝乙十二君其父子世六易乾鑿度曰殷之帝乙六世王則兄弟不為世矣殷人六廟親廟四并湯而六殷兄弟四君若以為世方上毁四室乃無祖禰是必不然古者由禰極祖雖迭毁迭遷而三昭穆未嘗闕也禮大宗無子則立支子又曰為人後者為之子無兄弟相為後者故捨至親取逺屬父子曰繼兄弟曰及兄弟不相入廟尚矣借有兄弟代歴承統告享不得稱嗣子嗣孫乃言伯考伯祖何統緒乎殷十二君惟三祖三宗明兄弟自為别廟漢世祖列七廟而惠帝不與文武子孫昌衍文為漢太宗晉景帝亦文帝兄景絶世不列於廟及告謚世祖稱景為從祖今謂晉武帝越崇其父而廟毁及亡何漢出惠帝而享世長久乎七廟五廟明天子諸侯也父子相繼一統也昭穆列序重繼也禮兄弟相繼不得稱嗣子明睿宗不父孝和必上繼髙宗者偶室於廟則為二穆於禮可乎禮所不可而使天子旁紹伯考棄已親正統哉孝和中興别建園寢百世不毁尚何議哉平子猥引僖公逆祀為比殊不知孝和升新寢聖真方祔廟則未嘗一日居上也帝語宰相召平子與博士詳論博士䕶前言合軋平子平子援經辯數分明獻等不能屈蘇頲右博士故平子坐貶都城尉然諸儒以平子孤挺見迮於禮官不平帝亦知其直久不決然卒不復中宗於廟蕙田案平子之議漢魏以来儒者論禮皆未之及也史稱其援經辨數分明人莫能屈豈非理足者可以特立而諸儒為之不平又以見人心之大公耶乃卒坐貶而中宗不得復廟惜哉姚崇傳帝將幸東都而太廟屋自壊帝問宰相宋璟蘇頲同對曰三年之䘮未終不可以行幸壊壓之變天所以示教戒陛下宜停東巡脩德以答至譴帝以問崇對曰臣聞隋取符堅故殿以營廟而唐因之且山有朽壊乃崩况木積年而木自當蠧乎但壊與行會不縁行而壊且陛下以闗中無年輸餉告勞因以幸東都所以為人不為已也百司已戒供擬既具請車駕如行期舊廟難復完盍奉神主舍太極殿更作新廟申誠奉大孝之德也帝曰卿言正契朕意賜絹二百匹詔所司如崇言舊唐書禮儀志開元十年正月下制曰朕聞王者乗時以設教因事以制禮沿革以從宜為本取舍以適會為先故損益之道有殊質文之用斯異且夫至德之謂孝所以通乎神明大事之謂祀所以䖍乎宗廟國家握紀命歴重光累盛四方由其繼明七代可以觀德朕嗣守丕業祗奉睿圖聿懐昭事罔不恤祀嘗覽古典詢諸舊制逺則夏殷事異近則晉漢道殊雖禮文之不一固嚴敬之無二朕以為立愛自親始教人睦也立敬自長始教人順也是知朕率於禮縁於情或教以道存或禮從時變將因宜以創制豈沿古而限今况恩以降殺而疎廟以毁遷而廢雖式瞻古訓禮則不違而永言孝思情所未足享嘗則止豈愛崇而禮備有禱而祭非德盛而流永其祧室宜别為正室使親而不盡逺而不祧廟以貌存宗由尊立俾四時式薦不間於毁主百代靡遷匪唯於始廟所謂變以合禮動而得中嚴配之典克崇肅雍之美兹在又兄弟繼及古有明文今中宗神主猶居别處詳求故實當宁不安移就正廟用章大典仍創立九室宜令所司擇日告遷通志開元十年加置九廟移中宗神主就正廟仍創立九室其後制獻祖懿祖太祖世祖髙祖太宗髙宗中宗睿宗太廟九室也唐書𤣥宗本紀開元十一年五月乙丑復中宗於太廟八月戊申追號宣皇帝曰獻祖光皇帝曰懿祖禮樂志開元十一年詔宣皇帝復祔於正室謚為獻祖并謚光皇帝為懿祖又以中宗遷祔太廟於是太廟為九室將親祔之而遇雨不克行乃命有司行事案禮樂志一段係十年事但與本紀十一年事同故並列舊唐書𤣥宗本紀開元十一年四月遷祔中宗祔主於太廟八月尊八代祖宣皇帝廟號獻祖光皇帝廟號懿祖始祔於太祖之九廟禮儀志開元十一年春𤣥宗還京師下制曰崇建宗廟禮之大者聿追孝享德莫至焉今宗以立尊親無遷序永惟嚴配致用蠲潔棟宇式崇祼奠斯受顧兹薄德獲承禋祀不躬不親曷展誠敬宜用八月十九日祗見九室於是追尊宣皇帝為獻祖復列於正室光皇帝為懿祖并遷中宗神主於太廟及將親祔會雨而止乃令所司行事其京師中宗舊廟便拆毁之東都舊廟始移孝敬神主祔焉其從善里孝敬舊廟亦令拆毁蕙田案周制七廟兼文武兩世室而九故有九廟之説然稱之曰世室猶非廟也復中宗於廟是矣而加以九廟之名奚為者耶况所謂九廟者止九室耳實一廟也混親廟與功德而一之紊昭穆與世次而九之揆之古禮失之逺矣文獻通考胡氏寅曰范祖禹有言書云七世之廟可以觀德則天子七廟自古而然也其祖宗有功德而其廟不毁則無世數商之三宗周之文武是也然則三昭三穆之外猶足以祖有功而宗有德矣明皇始為九廟何所取乎夫先覺君子皆以漢儒祖有功宗有德之論為非曰子孫於祖考無選擇而事之之義是故天子七廟而已矣有祧焉不患其數盈也有禘焉不患其乏享也今既以九廟為非而有功德之廟不毁則九亦安足以盡之文武固造周者以功而論則成康身致太平刑措不用亦豈可毁耶是故宗廟之禮由子孫不忘而建不忘者仁也或七廟或五廟或三廟者禮也其有功德無功德非子孫所當祔祧而隆殺之也名之曰幽厲非子孫所當回隱而遷改之也一斷以先王之禮無敢損益於其間是則禮之盡也七世之廟可以觀徳者吉凶善惡皆以是觀之云耳朱子曰古人七廟恐是祖宗功德者不遷胡氏謂如此則是子孫得以去取其祖宗然其於續謚法又謂謚乃天下之公義非子孫得以私之如此則廟亦然唐書韋縚傳開元時縚遷太常唐興禮文雖具然制度時時繆缺不倫至顯慶中許敬宗建言籩豆以多為貴宗廟乃踰於天請大祀十二中祀十小祀八大祀中祀簠簋㽅爼皆一小祀無㽅詔可二十三年勅令以籩豆之薦未能備物宜詔禮官學士並議以聞縚請宗廟籩豆皆加十二又言郊奠爵容止一合容小則陋宜增大之兵部侍郎張均職方郎中韋述議曰禮天之所生地之所長苟可薦者莫不咸在聖人知孝子之情深而物類無限故為之節使物有品器有數貴賤差降不得相越周制王食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋而以四籩四豆供祭祀此祀與賔客豐省不得同舊矣且嗜好燕私之饌與時而遷故聖人一約以禮雖平生所嗜非禮則不薦所惡是禮則不去屈建命去祥祭之芰曰祭典有之不羞珍異不陳庶侈此則禮外之食前古不薦今欲以甘㫖肥濃皆充於祭苟踰舊制其何極焉雖籩豆有加不能備也若曰以今之珍生所嗜愛求神無方是簠簋可去而盤盂桮案當御矣韶濩可抵而箜篌笙笛應奏矣且自漢以来陵有寢宫嵗時朔望薦以常饌固可盡孝子之心至宗廟法享不可變古從俗有司所承一升爵五升散禮凡宗廟貴者以爵賤者以散此貴小賤大以示節儉請如故文獻通考二十三年正月勅文宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物宜令禮官學士詳議具奏太常卿韋縚奏宗廟之奠每座籩豆各加十二又酒爵制度全小僅無一合執持甚難請稍令廣大付尚書省集衆官詳議太子賔客崔沔議曰祭祀之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴蘖汚樽抔飲則有𤣥酒之奠施及後王禮物漸備作為酒醴嚴其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至𤣥可存而不能測也祭禮至敬可備而不可廢也是以毛血腥爓𤣥樽犧象靡不畢登於明薦矣然而薦貴於新味不尚䙝雖則備物猶存節制故禮云天之所生地之所長苟可薦者莫不咸在備物之情也又曰三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶爼籩豆簠簋罇罍實皆周人之時饌也其用通於讌享賔客而周公制禮咸與毛血𤣥酒同薦於先晉中郎盧諶近古知禮者也著家廟祭禮皆晉時常食不復純用舊文然則當時飲食不可闕於祀祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢来祭致逺物也有新必薦順時令也苑囿之内躬稼所收蒐狩之時親發所中莫不割鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當申勅祭如神在無或簡怠增朂䖍誠其進珍饈或時鮮美考諸祠典有所漏略皆詳擇名目編諸甲令因宜而薦以類相從則新鮮肥醲盡在是矣不必加於籩豆之數也至於祭器隨物所宜故大羮古食也盛於㽅㽅古器也和羮時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤𤣥酒盛於罇未有薦時饌而追用古器者古質而今文便於事也雖加籩豆十二未足以盡天下美物而措諸清廟有兼倍之名近於侈矣又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又稱酒爵全小須加廣大竊據禮文有以小為貴者獻以爵貴其小也小不及制敬而非禮是有司之失其傳也固可隨失釐正無待議而後革未知今制何所依准請兼詳古式據文而行上曰享祀實思豐潔不應法制者亦不可用於是更令太常加品味韋縚又請每室加籩豆各六每四時異品以當時新果及珍羞同薦制可之又酌獻酒爵上令用藥汁一升合於古義而多少適中自是常依行焉二十四年勅宗廟祭享籩豆宜加獐鹿鶉兎野雞等料夏秋供腊春冬供鮮仍令所司祭前十日具數申省准料令殿中供送唐書𤣥宗本紀開元二十九年立𤣥元皇帝廟天寶二載加號𤣥元皇帝曰大聖祖咎繇曰德明皇帝涼武昭王曰興聖皇帝改西京𤣥元宫曰太清宫東宫曰太㣲宫八載閏六月丙寅謁大清宫加上𤣥元皇帝號曰聖祖大道𤣥元皇帝増祖宗帝后諡肅宗本紀至德二載九月癸夘復京師至自靈武十一月庚子作九廟神主告享於長樂殿禮樂志安禄山之亂宗廟為賊所焚肅宗復京師設次光順門外向廟而哭輟朝三日嚴郢傳郢補太常協律郎守東都太廟禄山亂郢取神主祕於家至德初定洛陽有司得以奉迎還廟擢大理司直乾元元年四月辛亥祔神主於太廟禮樂志代宗寶應二年祧獻祖懿祖祔𤣥宗肅宗自是之後常為九室矣代宗本紀大歴十四年遷元皇帝於夾室祔代宗於太廟禮樂志代宗崩禮儀使顔真卿議太祖髙祖太宗皆不毁而代祖元皇帝當遷於是遷元皇帝而祔代宗舊唐書禮儀志大歴十四年十月代宗神主將祔禮儀使顔真卿奏議曰王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七代之廟可以觀德此經典之明證也七廟之外則曰去祧為壇去壇為墠故歴代儒者制迭毁之禮皆親盡宜毁伏以太宗文皇帝七代之祖髙祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命於天始封於唐元本皆在不毁之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或議者以祖宗之名難於迭毁昔漢朝近古不敢以私滅公故前漢十二帝為祖宗者四而已至後漢漸違經意子孫以推美為先自光武已下皆有廟號則祖宗之名莫不建也安帝信讒害大臣廢太子及崩無上宗之奏後自建武以来無毁者因以陵號稱宗至桓帝失德尚有宗號故初平中左中郎蔡邕以和帝以下功德無殊而有過差不應為宗餘非宗者追尊三代皆奏毁之是知祖有功宗有德存至公之義非其人不居葢三代立禮之本也自東漢以来則此道衰矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名悉為廟號未有子孫踐祚而不祖宗先王者以此明之則不得獨據兩字而為不合祧遷之證假令傳祚百代豈可上崇百代以為孝乎請依三昭三穆之義永為通典日知録顧氏炎武曰漢惠帝從叔孫通之言郡國多置原廟元帝時貢禹以為不應古禮永光四年下丞相韋𤣥成等議以春秋之義父不祭于支庶之宅君不祭於臣僕之家王不祭於下土諸侯請勿復脩奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠後魏明元貴嬪杜氏魏郡鄴人生世祖及即位追尊為穆皇后配享太廟又立后廟於鄴髙宗時相州刺史髙閭表脩后廟詔曰婦人外成理無獨祀隂必配陽以成天地未聞有莘之國立太姒之饗此乃先王所立一時之至感非經世之逺制便可罷祀是古人罷祖宗之廟而不以為嫌也王莽尊元帝廟號髙宗成帝號統宗平帝號元宗中興皆去之後漢和帝號穆宗安帝號恭宗順帝號敬宗桓帝號威宗桓帝尊母梁貴人曰恭懐皇后安帝尊祖母宋貴人曰敬隱皇后順帝尊母李氏曰恭愍皇后獻帝初平元年左中郎將蔡邕議孝和以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而已臣下懦弱莫能執正據禮和安順桓四帝不宜稱宗又恭懐敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可唐髙宗太子𢎞追謚孝敬皇帝廟號義宗開元六年將作大匠韋凑上言凖禮不合稱宗於是停義宗之號是古人除祖宗之號而不以為忌也後世浮文日盛有増無損徳宗初立禮儀使吏部尚書顔真卿上言上元中政在宫壺始増祖宗之諡𤣥宗末姦臣竊命列聖之謚有加至十一字者案周之文武言文不稱武言武不稱文豈盛德所不優乎葢稱其至者故也故謚多不為褒少不為貶今列聖謚號太廣有踰古制請自中宗以上皆從初謚睿宗曰聖真皇帝𤣥宗曰孝明皇帝肅宗曰宣皇帝以省文尚質正名敦本上命百官集議儒學之士皆從真卿議獨兵部侍郎袁傪官以兵進奏言陵廟玉冊木主皆已刋勒不可輕改事遂寢不知陵中玉冊所刻乃初謚也自此宗廟之廣謚號之繁沿至後世遂成故典而人臣不敢議矣稱宗之濫始於王莽之三宗稱祖之濫始於曹魏之三祖唐王彦威所謂不可以訓者也文獻通考德宗建中元年三月禮儀使上言東都太廟闕木主請造以祔初武后於東都立髙祖太宗髙宗三廟至中宗以後兩京太廟四時並享至德亂後木主多亡缺未祔於是議者紛然而大㫖有三其一曰必存其廟遍立羣主時享之其二曰建廟立主存而不祭若皇輿時巡則就享焉其三曰存其廟瘞其主駕或東幸則飾齋車奉京師羣廟之主以往議皆不決而罷舊唐書禮儀志貞元十五年四月膳部郎中歸崇敬上疏東都太廟不合置木主謹案典禮虞主用桑練主用栗重作栗主則埋桑主所以神無二主猶天無二日土無二王也今東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟葢將以備行幸遷都之所也且殷人屢遷前八後五前後遷都一十三度不可每都而别立神主也議者或云東都神主已曾䖍奉而禮之豈可以一朝而廢之乎且虞祭則立桑主而䖍祀練祭則立栗主而埋桑主豈桑主不曾䖍祀而乃埋之又所闕之主不可更作作之不時非禮也唐會要天寶末両都傾䧟神主亡失肅宗既克復但建廟作主於上都其東都太廟毁為軍營九室神主失亡大歴間始於人間得之遂寓於太㣲宫不復祔享自建中至於會昌議者不一或以為東西二京宜皆有廟而舊主當瘞虚其廟以俟巡幸則載主而行或謂宜藏神主於夾室或曰周豐洛有廟者因遷都乃立廟耳今東都不因遷而立廟非也又曰古者載主以行者唯新遷一室之主耳未有載羣廟之主者也至武宗時悉廢羣議詔有司擇日修東都廟已而武宗崩宣宗竟以太㣲神主祔東廟焉蕙田案歸崇敬神無二主之説可決千古之疑若依此制唐室安有東都之主亡失而寓太㣲哉既已廟毁則瘞主可矣當時諸臣鮮知禮者是以羣言淆惑迨於宣宗訖復脩廟祔主惜哉唐書禮樂志貞元十七年太常卿裴郁議以太祖百代不遷獻懿二祖親盡廟遷而居東向非是請下百寮議工部郎中張薦等議與真卿同太子左庶子李嶸等七人曰真卿所用晉蔡謨之議也謨為禹不先鯀之説雖有其言當時不用獻懿二祖宜藏夾室以合祭法逺廟為祧而壇墠有禱則祭無禱則止之義吏部郎中栁冕等十二人曰周禮有先公之祧遷祖藏於后稷之廟其周未受命之祧乎又有先王之祧其遷主藏於文武之廟其周已受命之祧乎今獻祖懿祖猶周先公也請築别廟以居之司勲員外郎裴樞曰建石室於寢園以藏神主至禘祫之嵗則祭之考功員外郎陳京同官縣尉仲子陵對曰遷神主於德明興聖廟京兆少尹韋武曰祫則獻祖東向禘則太祖東向左司郎中陸淳曰議者多矣不過三而已一曰復太祖之正位二曰並列昭穆而虚東向三曰祫則獻祖禘則太祖迭居東向而復正太祖之位為是然太祖復位則獻懿之主宜有所歸一曰蔵諸夾室二曰置之别廟三曰遷於園寢四曰祔於興聖然而藏諸夾室則無享獻之期置之别廟則非禮經之文遷於園寢則亂宗廟之儀唯祔於興聖為是至十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王紹等五十五人請遷懿祖祔興聖廟議遂定由是太祖始復東向之位舊唐書禮儀志貞元十九年三月十五日遷獻祖懿祖神主權祔德明興聖廟之幕殿二十四日享太廟自此景皇帝始居東向之尊元皇帝已下依左昭右穆之列矣二祖新廟成勅曰奉遷獻祖懿祖神主正太祖景皇帝之位䖍告之禮當任重臣宜令檢校司空平章事杜佑攝太尉告大清宫門下侍郎平章事崔損攝太尉告太廟又詔曰國之大事式在明禋王者孝享莫重於禘祭所以尊祖而正昭穆也朕承列聖之休德荷上天之睠命䖍奉牲帛二十五年永惟宗廟之位禘嘗之序夙夜祗慄不敢自專是用延訪公卿稽參古禮博考羣議至於再三敬以令辰奉遷獻祖宣皇帝神主懿祖光皇帝神主祔於德明興聖皇帝廟太祖景皇帝正東向之位宜令所司循禮務極精嚴祗肅祀典載深感惕咨爾中外宜悉朕懐蕙田案獻懿二祖祔興聖廟事詳見禘祫門因有闗廟制附載其略唐書禮樂志德宗崩禮儀使杜黄裳議髙宗在三昭三穆外當遷於是遷髙宗而祔徳宗葢以中睿為昭穆矣蕙田案兄弟不得為昭穆也舊唐書禮儀志永貞元年十一月德宗神主將祔禮儀使杜黄裳與禮官王涇等請遷髙宗神主於西夾室其議曰自漢魏以降沿革不同古者祖有功宗有德皆不毁之名也自東漢魏晉迄於陳隋漸違經意子孫以推美為先光武以下皆有祖宗之號故至於迭毁親盡禮亦迭遷國家九廟之尊皆從周制伏以太祖景皇帝受命於天始封元本德同周之后稷也髙祖神堯皇帝國朝首祚萬葉所承德同周之文王也太宗文皇帝應天靖亂垂統立極德同周之武王也周人郊后稷而祖文王宗武王聖唐郊景皇帝祖髙祖而宗太宗皆在不遷之典髙宗皇帝今在三昭三穆之外謂之親盡新主入廟禮合迭遷藏於西第一夾室每至禘祫之月合食如常於是祧髙宗神主於西夾室祔徳宗神主焉元和元年七月順宗神主祔有司疑於遷毁太常博士王涇建議曰禮經祖有功宗有德皆不毁之名也惟三代行之漢魏已降雖曰祖宗親盡則遷無功亦毁不得行古之道也昔夏后氏十五代祖顓頊而宗禹殷人七代祖契而宗湯周人三十六王以后稷為太祖祖文王而宗武王聖唐德厚流廣逺法殷周奉景皇帝為太祖祖髙祖而宗太宗皆在百代不遷之典故代宗升祔遷代祖也德宗升祔遷髙宗也今順宗升祔中宗在三昭三穆之外謂之親盡遷於太廟夾室禮則然矣或諫者以則天太后革命中宗復而興之不在遷藏之例臣竊未諭也昔者髙宗晏駕中宗奉遺詔自儲副而陟元后則天太后臨朝廢為廬陵王聖歴元年太后詔復立為皇太子屬太后聖夀延長御下日久奸臣擅命紊其紀度敬暉桓彦範等五臣俱唐舊臣匡輔王室翊中宗而承大統此乃子繼父業是中宗得之而且失之母授子位是中宗失之而復得之二十年間再為皇太子復踐皇帝位失之在已得之在已可謂革命中興之義殊也又以周漢之例推之幽王為犬戎所滅平王東遷周不以平王為中興不遷之廟其例一也漢吕后專權産禄秉政文帝自代邸而立之漢不以文帝為中興不遷之廟其例二也霍光輔遷之廟其例三也伏以中宗孝和皇帝於聖上為六代伯祖尊非正統廟亦親盡爰及周漢故事是與中興功德之主不同奉遷夾室固無疑也是月二十四日禮儀使杜黄裳奏曰順宗皇帝神主已升祔太廟告祧之後即合遞遷中宗皇帝神主今在三昭三穆之外凖禮合於太廟從西第一夾室每至禘祫之日合食如常於是祧中宗神主於西夾室祔順宗神主焉有司先是以山陵將畢議遷廟之禮有司以中宗為中興之君當百代不遷之位宰相召史官蔣武問之武對曰中宗以𢎞道元年於髙宗柩前即位時春秋已壯矣及母后簒奪神器潛移其後頼張柬之等同謀國祚再復此葢同於反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗與惠安二帝事同即不可為不遷之主也有司又云五王有再安社稷之功今若遷中宗廟則五王永絶配享之例武曰凡配享功臣每至禘祫年方合食太廟居常即無享禮今遷中宗神主而禘祫之年毁廟之主並陳於太廟此則五王配食與前時如一也有司不能答元和十五年四月禮部侍郎李建奏上大行皇帝謚曰聖神章武孝皇帝廟號憲宗先是淮南節度使李夷簡上議曰王者祖有功宗有德大行皇帝戡剪寇逆累有武功廟號合稱祖陛下正當決在宸斷無信齷齪書生也遂詔下公卿與禮官議其可否太常博士王彦威奏議大行廟號不宜稱祖宜稱宗從之其月禮部奏凖貞觀故事遷廟之主藏於夾室西壁南北三間第一間代祖室第二間髙宗室第三間中宗室伏以山陵日近睿宗皇帝祧遷有期夾室西壁三室外無置室處凖江都集禮古者遷廟之主藏於太室北壁之中今請於夾室北壁以西為上置睿宗皇帝神主石室制從之唐書王彦威傳彦威拜博士憲宗崩淮南李夷簡上言大行皇帝功髙宜稱祖穆宗下其議彦威奏古者始封為太祖由太祖而降則又祖有功宗有德故夏人祖顓頊而宗禹商人祖契而宗湯周人祖文王而宗武王魏晉而下務欲推美自始祖外並建列祖之議叔世亂象不可以為訓唐本周禮以景皇帝為太祖祖神堯而宗太宗自髙宗後咸稱宗以為成法不然太宗致升平𤣥宗清内難肅宗收復兩都皆撥亂反正猶不稱祖今當本三代之制黜魏晉亂法大行廟號宜稱宗制可舊唐書禮儀志長慶四年正月禮儀使奏謹案周禮天子七廟三昭三穆與太祖之廟而七荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七廟典籍通規祖功宗德不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆之外是親盡之祖雖有功德禮合祧遷禘祫之嵗則從合食制從之冊府元龜太和四年四月禮儀使奏拆脩太廟西夾室遷移神主五位得大卜署令狀擇用四月二十四日吉其日先出室内先祧遷神主五位入幕殿便起首拆脩至五月五日畢功六日移神主入室詔依開成五年禮儀使奏謹案天子七廟祖功宗德不在其中國朝制度九廟九室伏以太祖景皇帝受封於唐髙祖太宗創業受命有功之主百代不遷今文宗元聖昭獻皇帝升祔有時代宗睿文孝武皇帝是親盡之祖禮合祧遷每至禘祫合食如常從之唐書武宗本紀會昌五年十月作昭武廟於虎牢闗唐會要㑹昌五年七月中書門下李德裕奏孟州汜水縣武牢闗太宗擒王竇之地闗城東峯有髙祖太宗像在一堂威靈皆畏於軒臺風雲疑還於豐沛請如漢郡國立廟故事更造一廟號昭武廟制可蕙田案昭武廟非禮也舊唐書禮儀志㑹昌五年八月中書門下奏東都太廟九室神主共二十六座自禄山叛後取太廟為軍營神主棄於街巷所司潛收聚見在太㣲宫内新造小屋之内其太廟屋並在可以脩崇太和中太常博士議以為東都不合置神主車駕東幸即載主而行至今因循尚未脩建望令尚書省集公卿及禮官學官詳議如不要更置須有收藏去處如合置望以所拆大寺材木脩建既是宗室官居守便望令充脩東都太廟使勾當脩繕奉勅宜依㑹昌六年三月太常博士鄭路等奏東都太㣲宫神主二十座去年三月二十九日禮院分析聞奏訖伏奉今月七日勅此禮至重須遵典故宜令禮官學官同議聞奏者臣今與學官等詳議訖謹具分析如後獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后文德皇后髙宗天皇大帝則天皇后中宗大聖大昭孝皇帝和思皇后昭成皇后孝敬皇帝孝敬哀皇后已前十二座親盡迭毁宜遷諸太廟祔於興聖廟禘祫之嵗乃一祭之東都無興聖廟可祔伏請且權藏於太廟夾室未題神主十四座前件神主既無題號之文難申祝告之禮今與禮官等商量伏請告遷之日但瘞於舊太㣲宫内空閒之地恭酌事理庶協從宜制可太常博士叚瓌等三十九人奏議曰禮之所立本於誠敬廟之所設實在尊嚴既曰薦誠則宜統一昔周之東西有廟亦可徴其所由但縁卜洛之初既須營建又以遷都未決因議兩留酌其事情匪務於廣祭法明矣伏以東都太廟廢已多時若議增修稍乖前訓何者東都始制寢廟於天后中宗之朝事出一時非貞觀開元之法前後因循不廢者亦踵鎬京之文也記曰祭不欲數數則煩天寶之中兩京悉為寇䧟西都廟貌如故東都因此散亡是知九廟之靈不欲歆其煩祀也自建中不葺之後彌歴嵗年今若廟貌維新即須室别有主舊主雖在大半合祧必几筵而存之所謂宜祧不祧也孔子曰當七廟五廟無虚主也謂廟不得無主者也舊主如有留去新廟便合創添謹案左傳云祔練作主又戴載云虞而立几筵如或過時成之便是以凶干吉創添既不典虚廟又非儀考諸禮文進退無守或曰漢於郡國置宗廟凡百餘所今止東西立廟有何不安者當漢氏承秦焚燒之餘不識典故至於廟制率意而行比及元成二帝之間貢禹韋𤣥成等繼出果有正論竟從毁除足知漢初不本於禮經又安可程法也或曰几筵不得復設寢廟何妨修營候車駕時巡便合於所載之主者究其始終又得以論之昨者降勅參詳本為欲收舊主主既不立廟何可施假令行幸九州一一皆立廟乎愚以為廟不可修主宜藏瘞或就瘞於塪室或瘞於兩階間此乃萬代常行不易之道也其年九月勅段瓌等詳議東都不可立廟李福等别狀又有異同國家制度須合典禮證據未一則難建立宜並令赴都省對議須歸至當工部尚書薛元賞等議伏以建中時公卿奏請修建東都太廟當時之議大者有三其一曰必有其廟備立其主時享之日以他官攝行二曰建廟立主存而不祭皇輿時巡則就享焉三曰存其廟瘞其主臣等立其三議參酌禮經理宜存廟不合置主謹案禮祭義曰建國之神位右社稷而左宗廟禮記云君子將營宫室宗廟為先是知王者建邦設都必先宗廟社稷况周武受命始都於豐成王相宅又卜於洛烝祭嵗於新邑冊周公於太室故書曰戊辰王在新邑烝祭嵗王入太室祼成王厥後復立於豐雖成洛邑未嘗久處逮於平王始定東遷則周之豐鎬皆有宗廟明矣又案曾子問廟有二主夫子對以天無二日土蕪二王嘗禘郊社尊無二上未知其為禮者昔齊桓作二主夫子譏之以為偽主是知二主不可並設亦明矣夫聖王建社以厚本立廟以尊祖所以京邑必有宗社今國家定周秦之兩地為東西之兩宅闢九衢而立宫闕設百司而嚴拱衛取法𤣥象號為京師既嚴帝宅難虚神位若無宗廟何謂皇都然依人者神在誠者祀誠非外至必由中出理合親敬用交神明位宜存於兩都廟可偕立誠難專於二祭主不並設或以禮云七廟五廟無虚主是謂不可無主所以天子巡狩亦有所尊尚飾齋車載遷主以行今若修廟瘞主則東都太廟九室皆虚既違於經須徴其説臣復探賾禮意因得盡而論之所云七廟五廟無虚主是謂見享之廟不可虚也今之兩都雖各有廟禘祫享獻斯皆親奉於上京神主几筵不可虚陳於東廟且禮云唯聖人為能享帝孝子為能享親漢韋𤣥成議廢郡國祀亦曰立廟京師躬親承事四海之内各以其職来祭人情禮意如此較然二室既不並居二廟豈可偕祔但所都之國見享之廟既無虚室則叶通經議者又欲置主不享以俟巡幸昔魯作僖公之主不於虞練之時春秋書而譏之合祔之主作非其時尚為所議今若置不合祔之主不因時而作違經越禮莫甚於此豈有九室合享之主而有置而不享之文兩廟始創於周公二主獲譏於夫子自古制作皆範周孔舊典猶在足可明徴臣所以言東都廟則合存主不合置今將修建廟宇誠不虧於典禮其見在太㣲宫中六主請待東都修建太廟畢具禮迎置於西夾室閟而不享式彰陛下嚴祀之敬以明聖朝尊祖之義吏部郎中鄭亞等五人議據禮院奏以為東都太廟既廢不可復修見在太㣲宫神主請瘞於所寓之地有乖經訓不敢雷同臣所以别進議狀請修祔主並依典禮兼與建中元年禮儀使顔真卿所奏事同臣與公卿等重議皆以為廟固合修主不可瘞即與臣等别狀意同但衆議猶疑東西二廟各設神主恐涉廟有二主之義請修廟虚室以太㣲宫所寓神主藏於夾室之中伏以六主神位内有不祧之宗今用遷廟之儀猶未合禮臣等猶未敢署衆狀葢為闕疑太學博士直𢎞文館鄭遂等七人議曰夫論國之大事必本乎正而根乎經以臻於中道聖朝以廣孝為先以得禮為貴求於典訓考乎大中廟有必修之文主無可置之理何則正經正史兩都之廟可徴禮稱天子不卜處太廟擇日卜建國之地則宗廟可知廢廟之說恐非所宜謹案詩書禮三經及漢朝正史兩都並設廟而載主之制久已行之敢不明徴而去文飾援據經文不易前見東都太廟合務修崇而舊主當瘞請於太㣲宫所藏之所皇帝有事於洛則奉齋車載主以行太常博士顧德章議曰夫禮雖縁情將明厥要實在得中必過禮而多求則反虧於誠敬伏以神龍之際天命有歸移武氏廟於長安即其地而置太廟以至天寶初復不為建都而設議曰中宗立廟於東都無乖舊典徴其意不亦謬乎又曰東都太廟至於睿宗𤣥宗猶奉而不易者葢縁嘗所尊奉不敢輒廢也今則廢已多時猶循莫舉之典也又曰雖貞觀之始草創未暇豈可謂此事非開元之法者謹案定開元六典勅曰聽政之暇錯綜古今法以周官作為唐典覽其本末千載一朝春秋謂考古之法也行之可久不曰然歟此時東都太廟見在六典序兩都宫闕西都具太廟之位東都則序而不論足明事出一時又安得曰開元之法也又三代禮樂莫盛於周昨者論議之時便宜細大取法於周遷而立廟今立廟不因遷何羙之而不能師之也又曰遷國神位右社稷而左宗廟君子將營宫室宗廟為先者謹案六典永昌中則天以東都為神都邇後漸加構宫室百司於是傋矣今之宫室百司乃武氏改命所備也上都已建國立宗廟不合引言又曰東都洛陽祭孝宣等五帝長安祭孝成等三帝以此為置廟之例則又非也當漢兩處有廟所祭之帝各别今東都建廟作主與上都盡同概而論之失之甚者又曰今或東洛復太廟有司同日侍祭以此為數實所未解者謹案天寶三載詔曰頃四時有事於太廟兩京同日自今已後兩京各宜别擇日載於祀典可得而詳且立廟造主所以祭神而曰存而勿祀出自何經當七廟五廟無虚主而欲立虚廟法於何典前稱廟貌如故者即指建中之中就有而言以為國之先也前以非時不造主者謂見有神主不得以非時而造也若江左至德之際主並散亡不可拘以例也或曰廢主之瘞請在太㣲宫者謹案天寶二年勅曰古之制禮祭用質明義兼取於尚幽情實縁於既沒我聖祖澹然常在為道之宗既殊有盡之期宜展事生之禮自今以後每至聖祖宫有昭告宜改用卯時者今欲以主瘞於宫所即與此勅全乖又曰主不合瘞請藏夾室者謹案前代藏主頗有異同至如夾室儀用以序昭穆也今廟制既不中禮則無禘祫之文又曰君子將營宫室以宗廟為先則建國營宫室而宗廟必設東都既有宫室而太廟不合不營凡以論之其義斯勝而西周東漢並曰兩都其各有宗廟之證經史昭然又得以極思於揚㩁詩曰其繩則直縮板以載作廟翼翼大雅𤓰瓞言豐廟之作也又曰於穆清廟肅雍顯相洛邑既成以率文王之祀此詩言洛之廟也書曰成王既至洛烝祭嵗文王騂牛一武王騂牛一又曰祼於太室康王又居豐命畢公保釐東郊豈有無廟而可烝祭非都而設保釐則書東西之廟也逮於後漢卜洛西京之廟亦存建武二年於洛陽立廟而成哀平三帝祭於西京一十八年親幸長安行禘禮當時五室列於洛都三帝留於京廟行幸之嵗與合食之期相㑹不奉齋車又安可以成此禮則知兩廟周人成法載主以行漢家通制或以當虚一都之廟為不可而引七廟無虚主之文禮言一都之廟室不虚主非為兩都各廟而不可虚也聨出征之辭更明載主之意因事而言禮實相統非如詩人更可斷章以取義也古人求神之所非一奉神之意無二故廢桑主重作栗主既事理之易明其一也或又引左氏傳築郿凡例謂有宗廟先君之主曰都而立建主之論案魯莊二十八年冬築郿左傳為築發凡例榖梁譏因藪澤之利公羊稱避凶年造邑之嫌三傳異同左氏為短何則當春秋二百年間魯凡城二十四邑唯郿一邑稱築城其二十三邑豈皆宗廟先君之主乎執此為建主之端又非通論或又曰廢之瘞之何以在於太㣲宫所藏之所宜舍故依新前已列矣案瘞主之位有三或於北牖之下或在西階之間廟之事也其不當立之主但隨其所以瘞之夫主瘞乎當立之廟斯不然矣以所在而言則太㣲宫所藏之所與漢之寢園無異歴代以降建一都者多兩都者少今國家崇東西之宅極嚴奉之典而以各廟為疑合以建都故事以相質正即周漢是也今詳議所徴究其年代率皆一都之時豈可以擬議亦孰敢獻酬於其間詳考經㫖古人謀寢必及於廟未有設寢而不立廟者國家承隋氏之弊草創未暇後雖建於垂拱而事有所合其後當干戈寧戢之嵗文物大備之朝歴於十一聖不議廢之豈不以事出於一時廟有合立之理而不可一一革也今洛都之制上自宫殿樓觀下及百辟之司與西京無異鑾輿之至也雖厮役之賤必歸其所理也豈先帝之主獨無其所安乎時也虞主尚瘞廢主宜然或以馬融李舟二人稱寢無傷於偕立廟不妨於暫虚是則馬融李舟可法於宣尼矣以此擬議乖當則深或稱凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城者謹案二百四十年間惟郿一邑稱築如城郎費之類各有所因或以他防或以自固謂之盡有宗廟理則極非或稱聖主有復古之功簡䇿有考文之美五帝不同樂三王不同禮遭時為法因事制宜此則改作有為非有司之事也如有司之職但合一一據經變禮從時則須俟明詔也凡不修之證略有七條廟立因遷一也已廢不舉二也廟不可虚三也非時不造主四也合載遷主行五也尊無二上六也六典不書七也謹案文王遷豐立廟武王遷鎬立廟成王遷洛立廟今東都不因遷而欲立廟是違因遷立廟也謹案禮記曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也今東都太廟廢已八朝若果立之是違已廢不舉也謹案禮記曰當七廟五廟無虚主今欲立虚廟是違廟不可虚也謹案左傳丁丑作僖公主書不時也記又曰過時不祭禮也合禮之祭過時猶廢非禮之主可以作乎今欲非時作主是違非時不作主也謹案曽子問古者師行以遷廟主行乎孔子曰天子巡狩必以遷廟主行載於齋車言必有尊也今也取七廟之主以行則失之矣皇氏云遷廟主者載遷一室之主也今欲載羣廟之主以行是違載遷之主也謹案禮記曰天無二日土無二王嘗禘郊社尊無二上也今欲兩都建廟作主是違尊無二上也謹案六典序兩都宫闕及廟宇此時東都有廟不載是違六典不書也遍考書傳並不合修寖以武德貞觀之中作法垂範之日文物大備儒彦畢臻若可修營不應議不及矣記曰樂由天作禮以地制天之體動也地之體止也此明樂可作禮難變也伏惟陛下誠明載物莊敬御天孝方切於祖宗事乃求於根本合再集議俾定所長臣實職司敢不條白以對德章又有上中書門下及禮院詳議兩狀並同載於後其一曰伏見八月六日勅欲修東都太廟令㑹議事此時已有議狀准禮不合更修尚書丞郎已下三十八人皆同署狀德章官在禮寺實沗司存當聖上嚴禋敬事之時㑹相公尚古黜華之日脱國之祀典有乖禮文豈唯受責於曠官竊懼貽羞於明代所以懃懃懇懇將不言而又言也昨者異同之意盡可指陳一則以有都之名便合立廟次則欲崇修廟宇以候時巡殊不知廟不合虚主惟載一也謹案貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟時秘書監顔師古議曰臣旁觀祭典遍考禮經宗廟皆在京師不於下土别置昔周之豐鎬實為遷都乃是因事便營非云一時别立太宗許其奏即日而停由是而言太原豈無都號太原爾時猶廢東都不立可知且廟室惟新即須有主主既藏瘞非虚而何是有都立廟之言不攻而自破矣又案曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩必以遷廟主行載於齋車言必有尊也今也取七廟之主以行則失矣皇氏云遷廟主者唯載新遷一室之主也未祧之主無載行之文假使候時巡自可修營一室議構九室有何依憑夫宗廟尊事也重事也至尊至重安得以疑文定論言苟不經則為擅議近者勅㫖凡以議事皆須一一據經若無經文任以史證如或經史皆無據者不得率意而言則立廟東都正經史無據果從臆說無乃前後相違也其二曰夫宗廟之設主於誠敬旋觀典禮二則非誠是以匪因遷都不可别立廟宇記曰天無二日土無二王嘗禘郊社尊無二上又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也則東都太廟廢已多時若議增修稍違前志何者聖歴神龍之際武后始復明辟中宗取其廟易置太廟焉本欲權固人心非經久之制也伏以所存神主既請祧藏今廟室維新即須有主神主非時不造廟寢又無虚議如修復以俟時巡唯載一主備在方冊可得而詳又引經中義有數等或是弟子之語或是他人之言今廟不可虚尊無二上非時不造主合載一主行皆大聖祖及宣尼親所發明者比之常據不可同塗又丘明修春秋悉以君子定襃貶陳泄冶以忠獲罪晉文以臣召君於此數條復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也或以東都不同他都地有壇社宫闕欲議構葺似是無妨此則酌於意懷非曰經據也但以遍討今古無有壇社立廟之證用以為說實所未安謹上自殷周旁稽故實除因遷都之外無别立廟之文制曰自古議禮皆酌人情必稷嗣知幾賈生達識方可發揮大政潤色皇猷其他管窺葢不足數公卿之議實可施行德章所陳最為淺近豈得苟申獨見妄有異同事貴酌中禮宜從衆宜令有司擇日修崇太廟以留守李石充使勾當六年三月擇日既定禮官既行旋以武宗登遐其事遂寢蕙田案德章之議詳盡確實可謂深於禮矣㑹昌六年五月禮儀使奏武宗昭肅皇帝祔廟并合祧遷者伏以自敬宗文宗武宗兄弟相及已歴三朝昭穆之位與承前不同所可疑者其事有四一曰兄弟昭穆同位不相為後二者已祧之主復入舊廟三者廟數有限無後之主則宜出置别廟四者兄弟既不相為後昭為父道穆為子道則昭穆同班不合異位據春秋文公二年躋僖公何休云躋升也謂西上也惠公與莊公當同南西上隱桓與閔僖當同北西上孔潁達亦引此義釋經又賀循云殷之盤庚不序陽甲漢之光武上繼元帝晉元帝簡文皆用此義毁之葢以昭穆位同不可兼毁二廟故也尚書曰七代之廟可以觀德且殷家兄弟相及有至四帝不及祖禰何容更言七代於理無矣今己兄弟相及同為一代矯前之失則合復祔代宗神主於太廟或疑已祧之主不合更入太廟者案晉代元明之時已遷豫章潁川矣及簡文即位乃元帝之子故復豫章潁川二神主於廟又國朝中宗已祔太廟至開元四年乃出置别廟至十年置九廟而中宗神主復祔太廟則已遷復入亦可無疑三者廟有定數無後之主出置别廟者案魏晉之初多同廟葢取上古清廟一宫尊逺神祗之義自後晉武所立之廟雖云七主而實六代葢景文同廟故也又案魯立姜嫄文王之廟不計昭穆以尊尚功德也晉元帝上繼武帝而惠懐愍三帝時賀循等諸儒議以為别立廟親逺義疎都邑遷異於理無嫌也今以文宗棄代纔六七年武宗甫邇復土遽移别廟不齒祖宗在於有司非所宜議四者添置廟之室案禮論晉太常賀循云廟以容主為限無拘常數故晉武帝時廟有七主六代至元帝明帝廟皆十室及穆簡二帝皆至十一室自後雖遷故祔新大抵以七代為准而不限室數伏以江左大儒通賾都奥事有明據固可施行今若不行是議更以迭毁為制則當上不及髙曽未盡之親下有忍臣子恩義之道今備討古今參校經史上請復代宗神主於太廟以存髙曾之親下以敬宗文宗武宗同為一代於太廟東間添置兩室為九代十一室之制以全臣子恩敬之義庶協大順之宜得變禮之正折古今之紛互立羣疑之杓指俾因心廣孝永燭於皇明昭德事神無虧於聖代勅曰宗廟事重實資參詳宜令尚書省兩省御史臺四品以上官大理卿京兆尹等集議以聞尚書左丞鄭涯等奏議曰夫禮經垂則莫重於嚴配必參損益之道則合典禮之文况有明徴是資折𠂻伏自敬宗文宗武宗三朝嗣位皆以兄弟考之前代理有顯據今謹詳禮院所奏並上稽古文旁摭史氏協於通變允為得宜臣等商議請依禮官所議從之蕙田案古者七廟兄弟同廟而異室後世一廟兄弟異室而同昭穆所謂禮以義起九代十一室不得非之者也十一月太常博士任疇上言去月十七日享德明興聖廟德廟直候論狀稱懿祖室在獻祖室之上當時雖以為然便依行事伏審獻祖為懿祖之昭懿祖為獻祖之穆昭穆之位天地極殊今廟至奪倫不即陳奏尚為苟且罪不容誅仍勅修撰朱儔檢討王皥研精詳覆得報稱天寶二年制追尊咎繇為德明皇帝凉武昭王為興聖皇帝十載立廟至貞元十九年制從給事中陳京右僕射姚南仲等一百五十人之議以為禘祫是祖宗以序之祭凡有國者必尊太祖今國家以景皇帝為太祖太祖之上施於禘祫不可為位請接德明興聖廟共成四室祔遷獻懿二祖謹尋儔等所報即當時表奏並獻居懿上是嵗以還不當失序四十餘載理難尋詰伏祈聖鑒即垂詔勅具禮遷正其月儔又奏曰伏奉今月十三日勅以臣所奏獻懿祖二室倒置事宜令禮官集議聞奏者臣去月十七日縁遇太廟祫享太祖景皇帝以下羣主准貞元十九年所祔獻祖懿祖於德明廟共為四室准元勅各於本室行享禮審知獻祖合居懿祖之上昭穆方正其時親見獻祖之室倒居懿祖之下於後遍校圖籍實見差殊遂敢聞奏今奉勅宜令禮官集議聞奏者臣得奉禮郎李岡太祝栁仲年協律郎諸葛畋李潼檢討官王皥修撰朱儔博士閔慶之等七人狀稱謹案髙祖神堯皇帝本紀及皇室圖譜并武德貞觀永徽開元已来諸禮著在令甲者並云獻祖宣皇帝是神堯之髙祖懿祖光皇帝是神堯之曾祖以髙曾辨之則獻祖是懿祖之父懿祖是獻祖之子即博士任疇所奏倒祀不虚臣等伏乞即垂詔勅具禮遷正其事遂行宣宗即位迎太㣲宫神主祔東都太廟祫禘之禮盡出神主合食於太祖之前唐書禮樂志宣宗已復河湟二州七闗歸其功順宗憲宗而加謚號博士李稠請改作神主易書新謚右司郎中楊發等議以謂古者已祔之主無改作加謚追尊非禮也始於則天然猶不改主易書宜以新謚寶冊告於陵廟可也是時宰相以謂士族之廟皆就易書乃就舊主易書新謚焉冊府元龜楊發為左司郎中大中三年十二月宣宗追尊順宗憲宗謚號禮院奏廟中神主已題舊號請改造及重題詔禮官議發與都官郎中盧搏獻議曰臣等伏尋舊典栗主升祔之後在禮無改造之文亦無重加尊謚改題神主之例求之曠古夐無其文周加太王王季文王之謚但以得合王周遂加王號未聞改謚易主且文物大傋禮法可稱最在兩漢並無其事光武中興都洛陽遣大司馬臣鄧禹入闗奉髙祖已下十一帝后神主祔洛陽宗廟葢神主不合新造故也自魏晉迄於周隋雖代有放恣之君亦有知禮講學之士不聞加謚追尊改主重題書之史冊今議者唯引東晉重造鄭太后神主事為證伏以鄭太后本琅琊王妃薨後已祔琅琊邸廟其後母以子貴將升祔太廟賀循請重造新主改題皇后之號傋禮告祔當時用之伏以諸侯廟主與天子廟主長短不同若以王妃八寸之主上配至極禮似不同時謟臣貪君私用此謬禮改造神主比量晉事義絶非宜且宣懿非穆宗之后實武宗之母以子之貴也祔别廟正為得禮享薦無虧今若從祀至尊題主稱為太后因子正得其宜今若改造新主題去太字即穆宗上僊之後臣下追致作嬪之禮瀆亂正經實驚有職臣當時並列朝行知其謬戾以漢律擅論宗廟者以大不敬論又其時無詔下議遂黙塞不敢出言今又欲重用東晉謬禮穢媟聖朝大典猥䝉下問敢不盡言謹案國朝例甚有明文武德元年五月備法駕於長安迎宣簡公懿王景皇帝神主祔太廟既言於舊廟奉迎足明必奉舊主其加謚追尊之禮自古本無其事則天太后攝政之後纍纍有之自此之後數用其禮歴檢國史並無改造重題之文若故事有之無不書於簡冊臣等愚見宜但告新謚於廟止其改造神主故事有開元初太常卿韋縚以髙宗廟題武后神主云天后聖帝武氏縚奏請削去天后聖帝之號别題云則天順聖皇帝后武氏詔從之即不知其時削舊題耶重造主耶亦不知用何代典禮禮之疑者決在宸衷以臣所見但以新謚寶冊告陵廟正得其宜改造重題恐乖禮意時宰臣覆奏就神主改題而知禮者非之舊唐書禮儀志中和元年夏四月有司請享太祖已下十一室詔公卿議其儀太常卿牛叢與儒者同議其事或曰王者巡狩以遷廟主行如無遷廟之主則祝奉幣帛皮珪告於祖禰遂奉以出載於齋車每舍奠焉今非巡狩是失守宗廟夫失守宗廟則當罷宗廟之事叢疑之將作監王儉太子賔客李匡乂虞部員外郎袁皓建議同異及左丞崔厚為太常卿遂議立行廟以𤣥宗幸蜀時道宫𤣥元殿之前架幕為十一室又無神主題神版位而行事達禮者非之以為止之可也明年乃特造神主以祔行廟光啓三年二月車駕自興元還京以宫室未備權駐鳳翔禮院奏皇帝還宫先謁太廟今宗廟焚毁神主失墜請准禮例修奉者禮院獻議曰案春秋新宫災三日哭傳曰新宫宣公廟也三日哭禮也案國史開元五年正月二日太廟四室摧毁時神主皆存迎奉於太極殿安置𤣥宗素服避正殿寶應元年肅宗還京師以宗廟為賊所焚於光順門外設次向廟哭歴檢故事不見百官奉慰之儀然上既素服避殿百官奉慰亦合情禮切循故事比附參詳恐須宗正寺具宗廟焚毁及神主失墜事由奏皇帝素服避殿受慰訖輟朝三日下詔委少府監擇日依禮新造列聖神主如此方似合宜伏縁採栗須十一月漸恐遲晚修奉使宰相鄭延昌具議中書門下奏曰伏以前年冬再有震驚俄然巡幸主司宗祝迫以倉皇伏縁移蹕鳯翔未敢陳奏今則將回鑾輅皆舉典章清廟再營孝思咸傋伏請降勅命所司參詳典禮修奉勅曰朕以涼德祗嗣寶圖不能上承天休下正人紀兵革競興於㝢縣車輿再越於藩垣宗廟震驚烝嘗廢闕敬修典禮倍切哀摧宜付所司又修太廟使宰相鄭延昌奏太廟大殿十一室二十三間十一架功績至大計料支費不少兼宗廟制度有素難為損益今不審依元料修奉為復更有商量請下禮官詳議太常博士殷盈孫奏議言如依元料難以速成况帑藏方虚須資變禮竊以至德二年以新修太廟未成其新造神主權於長安殿安置便行享告之禮如同宗廟之儀以俟廟成方為遷祔今京城除充大内及正衙外别無殿宇伏聞先有詔㫖欲以少府監大㕔權充太廟其㕔五間伏縁十一室於五間之中陳設隘狹請更接續修建成十一間以傋十一室薦享之所其三太后廟即於少府監取西南屋三間以備三室告享之所勅㫖從之古唐廟制五代史梁本紀太祖開平元年追尊皇髙祖黯廟號肅祖曾祖茂琳廟號敬祖祖信廟號憲祖考誠廟號烈祖蕙田案以上後梁唐本紀莊宗同光元年追尊曽祖執宜廟號懿祖祖國昌廟號獻祖考廟號太祖自唐髙祖太宗懿宗昭宗為七廟同光二年正月丁夘七廟神主至自太原祔於太廟文獻通考同光二年太常禮院奏國家興建之初已於北都置廟今尅復天下遷都洛陽却復本朝宗廟案禮無二廟之文其北都宗廟請廢從之蕙田案禮無二廟之說甚是應順元年中書門下奏太常以大行山陵畢祔廟今太廟見享七室髙祖太宗懿宗昭宗獻祖太祖莊宗大行升祔禮合祧遷獻祖下尚書集議從之時議者以懿祖賜姓于懿宗以支庶繫大宗例宜以懿為始祖次昭宗可也不必祖神堯而宗太宗若依漢光武則宜于代州立獻祖而下親廟其唐廟依舊禮行之可也而議謚者忘咸通之懿宗又稱懿祖父子俱懿于理可乎將朱邪三世與唐室四廟連叙昭穆非禮也議祧者不知受氏於唐懿宗而祧之今又及獻祖以禮論之始祧昭宗次祧懿祖可也而懿祖如唐景皇帝豈可祧乎蕙田案以上後唐晉本紀天福二年追尊髙祖璟廟號靖祖曾祖郴廟號肅祖祖昱廟號睿祖考紹雍廟號獻祖文獻通考天福二年中書門下奏皇帝到京未立宗廟所司請立髙祖以下四親廟其始祖一廟未敢輕議令都省百官集議御史中丞張昭議曰臣讀十四代史書見二千年故事觀諸家宗廟都無始祖之稱唯殷周二代以稷契為太祖禮記曰天子七廟三昭三穆與太祖之廟而七鄭𤣥注云此周制也七者太祖后稷及文王武王與四親廟又曰殷人六廟契及成湯與二昭二穆也夏后氏立五廟不立太祖唯禹與二昭二穆而已據王制鄭𤣥所釋即殷周以稷契為太祖夏后氏無太祖亦無追謚之廟自殷周以来時更十代皆於親廟之中以有功者為太祖無追崇始祖之例具引今古即恐詞煩事要證明須陳梗概漢以髙祖父太上皇無社稷功不立廟號髙帝自為髙祖魏以曹公相漢垂三十年始封于魏故為太祖晉以宣王輔魏有功立為髙祖以景帝始封于晉故為太祖宋世先世官閥卑㣲雖追崇帝號劉裕自為髙祖南齊髙帝之父位至右將軍生無封爵不得為太祖梁武帝父順之佐佑齊室封侯位至領軍丹陽尹雖不受封于梁亦為太祖陳武帝父文讚生無名位以武帝有功梁室贈侍中封義興公及武帝即位亦追為太祖周閔帝以父泰相西魏經營王業始封于周故為太祖隋文帝輔周室有大功始封于隋故為太祖唐髙祖神堯祖父虎為周大柱國隋氏追封唐公故為太祖唐末梁室朱氏有帝位亦立四廟朱氏先世無名位雖追冊四廟不立太祖朱公自為太祖此則前代追冊太祖不出親廟之成例也王者祖有功而宗有德漢魏之制非有功德不得立為祖宗殷周受命以稷契有大功於唐虞之際故追尊為太祖自秦漢之後其禮不然雖祖有功仍須親廟今粗言徃例以取證明秦稱造父之後不以造父為始祖漢稱唐堯劉累之後不以堯累為始祖魏稱曹參之後不以參為始祖晉稱趙將司馬卭之後不以卭為始祖宋稱漢楚元王之後不以元王為始祖齊梁皆稱蕭何之後不以蕭何為始祖陳稱太丘長陳寔之後不以寔為始祖元魏稱李陵之後不以陵為始祖後周稱神農之後不以神農為始祖隋稱楊震之後不以震為始祖唐稱臯陶老子之後不以臯陶老子為始祖唯唐髙宗則天武后臨朝革唐稱周便立七廟仍追冊周文王姬昌為始祖此葢當時附麗之徒不諳故實武立姬廟乖越已甚曲臺之人到今嗤誚臣逺觀秦漢下至周隋禮樂衣冠聲明文物未有如唐室之盛武德議廟之初英才間出如溫魏顔虞通今古封蕭薛杜達禮儀制度憲章必有師法夫追先王先母之儀起於周代據史記及禮經云武王纘太王王季文王之緒一戎衣而有天下尊為天子宗廟享之周公成文武之德追王太王王季祀先公以天子之禮又曰郊祀后稷以配天據此言之周武雖祀七世追為王號者但四世而已故自東漢以来有國之初多崇四廟從周制也况殷因夏禮漢習秦儀無勞博訪之文宜約已成之制請依隋唐有國之初創立四廟推四世之中名位髙者為太祖謹議以聞勅令尚書省集議奏聞乃倣唐朝舊制追尊四廟蕙田案張昭之議頗達古今事變非禮制也五代史晉本紀出帝天福七年十一月庚子祔髙祖神主于太廟蕙田案以上後晉漢本紀天福十二年漢雖建國而追續天福為十二年追尊髙祖湍廟號文祖曽祖昻廟號德祖祖僎廟號翼祖考琠廟號顯祖以漢髙皇帝為髙祖光武皇帝為世祖皆不祧文獻通考天福十二年時漢髙祖已即位尚仍天福之號太常博士段顒奏請立髙曾祖禰四廟更上追逺祖光武皇帝為百代不遷之廟居東向之位吏部尚書竇正固等議古者四親廟之外祖功宗德不拘定數今除四親廟外更請追尊髙皇帝光武皇帝共立六廟從之宋史竇貞固傳貞固在晉拜刑部尚書漢祖入汴貞固與禮部尚書王淞率百官見于滎陽西漢祖駐馬勞問久之初營宗廟帝以姓自漢出遂襲國號尊光武為世祖并親廟為五詔羣臣議貞固上言曰案王制天子七廟諸侯五大夫三士一正義曰周之制七廟者太祖及文王武王之祧與親廟四也又曰七廟者據周也有其人則七無其人則五至光武中興及魏晉宋齊隋唐或立六廟或立四廟葢建國之始未盈其数也禮曰德厚者流光此天子可以祀六世之義也今陛下大定寰區重興漢祚旁求典禮用正宗祧伏請立髙曽祖禰四親廟及自古聖王祖有功宗有德更立始祖在四廟之外不拘定數所以或五廟或七廟今請尊髙帝光武皇帝為世祖法文王武王不遷之制用歴代六廟之規庶合典禮漢祖從之論者以天子建國各從其所起堯自唐侯禹生大夏是也立廟皆祖其功商之契周之后稷漢之武帝晉之三廟是也髙祖起于晉陽而追嗣兩漢徒以同姓為逺祖甚非其義貞固又以四親匹庶上合髙光失之彌逺矣但援立親廟可也餘皆非禮文獻通考馬氏曰後唐晉漢皆出于夷狄者也莊宗明宗既捨其祖而祖唐之祖矣及敬瑭知逺崛起而登帝位俱欲以華胄自詭故于四親之外必求所謂始祖者而祖之張昭之言議正而詞偉矣至漢初則段顒竇正固之徒曲為謟附乃至上祖髙光以為六廟然史所載出自沙陀部之説固不可掩也竟何益哉蕙田案以上後漢五代史周本紀廣順元年五月辛未追尊祖考為皇帝妣為皇后髙祖璟諡曰睿和廟號信祖祖妣張氏諡曰睿恭曽祖諶謚曰明憲廟號僖祖祖妣申氏諡曰明孝祖藴諡曰翼順廟號義祖祖妣韓氏諡曰冀敬考謚曰章肅廟號慶祖妣王氏諡曰章德文獻通考廣順元年有司議立四親廟從之五代史周本紀廣順三年十二月戊申四廟神主至自西京迎之於西郊祔於太廟乙亥享於太廟宋史聶崇義傳崇義周顯德中累遷國子司業兼太常博士先是世宗以郊廟祭器止由有司相承製造年代浸久無所規式乃命崇義檢討摹畫以聞四年崇義上之乃命有司改造焉五代史周本紀顯德五年夏四月庾申祔五室神主於新廟蕙田案以上後周右五代廟制五禮通考卷八十
