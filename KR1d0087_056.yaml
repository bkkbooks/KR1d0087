body:
  text: 五禮通考卷四十六刑部尚書秦蕙田撰吉禮四十六四望山川蕙田案虞書望於山川又望秩於山川是祭山川皆稱望而周禮四望之祭與山川不同小宗伯兆五帝于四郊四望四類亦如之兆山川丘陵墳衍各因其方是兆不同典瑞兩圭有邸旅四望璋邸射以祀山川是玉不同大司樂奏姑洗歌南吕舞大㲈以祀四望奏蕤賔歌函鐘舞大夏以祭山川是樂不同又周禮于四望則曰祀于山川則曰祭是秩不同蓋同一山川逺而望祭之則名曰望祭於其地則直曰祭山川也而郊後之望不能遍及故獨祭其宗鄭氏所謂嶽瀆是也而名山大川不以封其禮不通於諸侯故魯之三望僭也春秋譏之若夫山川之祭則凡能興雲雨者皆足以濟民澤物而祈報由辟之典天子則及天下近者就祭之小宗伯所謂兆山川因其方也逺者或因事祭之書所謂柴望詩所謂陟高山是也或命有司祭之月令所謂祈祀是也諸侯則祭境內左傳所謂並走羣望曾子問所謂命祝史告於山川是也朱子曰天子有天下則天下鬼神屬焉諸侯守一國則一國鬼神屬焉明為所統屬則精神相通也詳考書傳専言山川則嶽瀆在其中故禮謂名山大川五嶽視三公四瀆視諸侯其餘視伯子男對四望言則四望大而秩隆山川小而秩卑故周禮壇壝牲玉樂舞之屬皆有等差通典通考以山川一門兼四望然經有明文不可強合今先列四望後列山川分為兩節其漢以後祀典不常不可析别仍為合敘而封禪本非正禮因其有事于山川附綴于末焉周禮春官小宗伯兆五帝于四郊四望四類亦如之注鄭司農云四望道氣出入玄謂四望五嶽四鎮四瀆兆為壇之營域疏司農云四望道氣出入者案上注司農以為日月星海後鄭不從矣今此云道氣出入與上注不同者以無正文故兩注有異若然云道氣出入則非日月星海謂五嶽之等也故後鄭就足之還為五嶽之屬解之天子四望諸侯三望境內山川案僖三十一年夏四月猶三望服氏云三望分野星國中山川又上文先鄭云四望日月星海後鄭必知望祭中無天神者案哀六年云初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也爾雅又云梁山晉望又案尚書云望于山川則知望祭中無天神可知若天神日月之等當入四類之內也若然尚書云望于山川必知四望非山川是五嶽四瀆者以其下云兆山川丘陵之等山川既在下故知此四望是五嶽之屬山川之大者也鄭氏鍔曰魯有三望之祭或以為分野星及國中山川或以為日月星海考之書云望于山川唯山川則望而祭之故楚昭王曰三代命祀祭不越望江漢睢漳楚之望也即是論之則四望之為五嶽四鎮四瀆明矣諸侯得祭其境內山川而禮下于天子故望止于三天子有天下祭及于四方故凡名山大川在四方者皆望而祭之四望之祭亦如五帝因其方而為之兆也丘氏濬曰自古所以祀五嶽四瀆山川者皆以其能出斂雲雨也出雲雨則便不至于旱暵斂雲雨則便不至于淫潦無非欲其生五穀五穀熟而民人育則君位安矣又曰所謂四望者蓋以五嶽四鎮四瀆乃天下山川之大者天子兼有天下之大不能親臨其地故遙望而祭之也又曰鄭司農解周禮四望以謂日月星海鄭玄謂禮無祭海之文考周頌般序及觀學記謂三王祭川先河後海則是海之祭三代已有矣烏可謂無祭海之禮乎附辨禮書望兼上下之神陳氏禮書天子四望逹于四方魯三望太山河海而已書曰海岱及淮維徐州諸侯之望皆其境內之名山大川也望雖以名山大川為主而其實兼上下之神故詩於柴望言懷柔百神及河喬嶽周禮于望皆言祀而不言祭又典瑞四望與山川異玉大司樂四望與山川異樂左氏曰望郊之細也又曰望郊之屬也公羊曰方望之事無所不通則望兼上下之神可知矣鄭司農釋大宗伯曰四望日月星海杜預釋左傳曰望祀分野之星及封內山川許慎日四望日月星辰河海大山其説蓋有所受之也鄭康成釋小宗伯曰四望五嶽四瀆釋大司樂又兼之以司中司命風伯雨師釋舞師又以四望為四方其言異同不可考也望之禮有二而其用不一男巫掌望祀望衍鄭氏讀衍為延謂望祀有牲與粢盛望衍用幣致神而已然鄭氏于大祝衍祭亦以為延祭禮文殘闕不可考也楊氏復曰四望之説惟鄭氏注小宗伯云四望五嶽四鎮四瀆其説為是蓋言望祭天下之名山大川也所謂懷柔百神者言合祭四方名山大川之神故云百神非必兼上下之神也舜即位類于上帝禋于六宗望于山川遍于羣神類也禋也望也各是一事非望兼上下之神可知也蕙田案小宗伯四郊之兆各為一壇以望祀一方之名山大川舜典望于山川典瑞兩圭有邸以祀地旅四望司服王祀四望山川則毳冕是四望為祭山川而屬地祗也春秋僖公三十一年四卜郊不從乃免牲猶三望公羊傳曰天子有方望之事無所不通三望者何祭太山河海也鄭康成以魯境不及河乃以淮易之左傳哀公六年楚昭王曰三代命祀祭不越望江漢睢漳楚之望也爾雅梁山晉望也皆祭山川名望之證也鄭衆以四望為日月星海許慎以為日月星辰河海太山賈逵服虔杜預以三望為魯分野之星及國中山川陳氏禮書因謂兼上下之神非也大宗伯以血祭祭五嶽以埋沈祭山林川澤王制説苑天子祭天下名山大川五嶽視三公四瀆視諸侯山川視子男蓋四望祭山川之大且逺者山川則凡近且小者就而祭之也公羊方望之事無所不通是言天子之疆域無所不屆非謂其兼上下之神也楊信齋駁之當矣又案鄭康成大小宗伯注以四望為五嶽四鎮四瀆是矣而以公羊傳河海潤於千里及學記三王之祭川皆先河而後海推之則四望中當有四海邱瓊山之言亦是觀承案禮有望祭其類不十考之尚書周禮春秋其稱望者率指山川而言先鄭解大宗伯四望謂日月星海而康成不從專以五嶽四鎮四瀆當之是也故此編亦以四望定為山川之禮以昭畫一也然義有可通則其説亦不得不並存古者祭祀之禮有定名而亦有通號如五天帝稱五帝而五人帝亦稱五帝門行尸竈中霤稱五祀而左傳五官之神亦稱五祀望本遙祭之名祭山川者固秩於望祀而凡望祀者則不獨山川也周禮大司樂分樂而序有祀享祭之别而祀四望乃與祭山川對舉祀祭雖散文可通而對文則别是山川地類故稱祭四望必天類故稱祀耳康成注先以嶽鎮四瀆還其本稱而後曰此言祀者司中司命風師雨師或亦用此樂歟可謂讀經精審而據本文祀字以疑之不為無徴也則左氏謂望者郊之細又曰郊之屬杜氏謂望祀分野之星及封內山川許慎謂日月星辰河海大山而康成釋舞師又以四望為四方者夫亦各有所受而未可一概屏除者乎但其常祀則主于山川而已右四望壇禮記王制五嶽視三公四瀆視諸侯注視三公視諸侯視其牲器之數也楊氏復曰舜望秩于山川秩序也以次序而祭之五嶽視三公四瀆視諸侯特言其禮有隆殺重輕耳書舜典望秩于山川疏祭五嶽如祭三公之禮祭四瀆如祭諸侯之禮祭山川如祭伯子男之禮蔡傳望望秩以祀山川也秩者其牲幣祝號之次第也右秩望祀書舜典望于山川蔡傳山川名山大川五嶽四瀆之屬望而祭之故曰望王氏樵曰山川名山大川五嶽四瀆之屬不能親詣望所在而祭之故曰望周禮春官司服祀四望則毳冕注鄭司農云毳罽衣也元謂毳畫虎蜼謂宗彛也其衣三章裳二章凡五也之疏云毳罽衣也者案爾雅云毳氂謂之罽則續毛為若今之毛布但此毳則宗彛謂虎蜼而先鄭以為罽衣于義不可故後鄭不從也鄭氏鍔曰毳冕虎蜼二物不可以偏言以其皆毛物故因名曰毳虎西方之義獸蜼遇雨則以其尾塞鼻獸之有智者二者皆山林之物故服之以祭四望山川而祀四瀆亦服之者以山川通氣故也王氏詳説曰四望山川國之阻固以扞禦于外者故以虎蜼之服典瑞兩圭有邸以旅四望注兩圭者以象地數二也王氏昭禹曰旅四望則五嶽四瀆在焉考工記玉人之事兩圭五寸有邸以旅四望疏此亦依典瑞所解謂國有故旅祭四望林氏希逸曰四望之旅祭用之屬地也地官牧人望祀各以其方之色牲毛之注望祀五嶽四鎮四瀆也疏知望祀是四望者以其言望與四望義同故知是四望五嶽等也鄭氏鍔曰各倣其方之色豈徒東青西白南赤北黑哉必欲其毛之純乎青白赤黑也春官大司樂奏姑洗歌南吕舞大㲈以祀四望注姑洗陽聲第三南吕為之合四望五嶽四鎮四瀆又疏四望又卑于神州故降用陽聲第三及用大㲈也曰云姑洗陽聲第三南吕為之合者以其南吕六二上生姑洗之九三是陽聲第三也姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星是南吕為之合也云四望五嶽四鎮四瀆者以大宗伯五嶽在社稷下山川上此文四望亦在社稷下山川上故知四望是五嶽四鎮四瀆也陸氏佃曰南吕則隂之所成者事易氏祓曰㲈紹也言舜之繼堯而能紹其道也故大㲈之樂起于姑洗之辰而應以南吕之酉以舜之柴望于方嶽而四嶽四鎮四海四瀆之神咸秩以祀四望亦其類也周禮春官男巫掌望祀旁招以茅注杜子春云旁招以茅招四方之所望祭者鄭氏鍔曰用茅以招之神來無方其招亦非一方也故曰旁招茅之為物柔順潔白惟潔白可以見誠敬之心惟柔順可以致懷柔之禮禮記禮器五獻察注察明也明疏謂祭四望山川其神既尊神靈察又曰毳冕五章祀四望山川故知五獻祭四望山川也通典杜氏曰其祭之嶽鎮則升血為始次薦豆籩及爓肉為朝踐大祭用腥則次祀用爓也爓為沈肉於湯故鄭云湯肉為爓時王酌盎齊以獻所謂朝踐之獻也大宗伯亞獻亦以盎齊至熟王酌清酒以獻尸亞者亦清酒所謂饋食之獻通前四獻也尸食訖王又酌清酒以酳尸凡五獻也右望正祭禮物儀節大戴禮三正記郊後必有望通典杜氏曰一嵗凡四祭一者謂迎氣時二者郊天時三者大雩時四者大蠟時蕙田案春秋書不郊猶三望則望祭行于郊後可知三正記之言當非無據也右郊後望書舜典嵗二月東巡守至于岱宗柴望秩于山川五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮孔傳岱宗太山為四嶽所宗故名柴燔柴祭天告至東嶽諸侯境內名山大川如其秩次望祭之謂五嶽牲禮視三公四瀆視諸侯其餘視伯子男朱子曰燔柴以祀天而遂望祭東方之山川又各以其秩次而就祭之也注家以至岱宗柴為句某謂當以柴望秩于山川為一句如柴望大告武成漢郊祀志亦云柴望秩于山川禮記王制嵗二月東巡守至于岱宗柴而望祀山川覲諸侯陳氏祥道曰巡守之禮凡大山川于其所至則望之故時邁言巡守告祭柴望也于其所過則祀之故般言巡守而祀四嶽河海也柴望先于覲諸侯尊神也方氏慤曰柴而望祀山川即詩時邁言巡守告祭柴望是也以天之髙故燔柴以上逹以山川之逺故望而祀之皆所以告至而已葉氏夢得曰或曰望祀或曰望秩者秩其無文而祀其在祀典者也詩周頌時邁序時邁巡守告祭柴望也天疏武王既定下巡行其守土諸侯至于方嶽之下作告至之祭柴祭昊天望祭山川安祀百神乃是王者盛事周公既致太平追念武王之業故述其事而為此歌焉懷柔百神及河喬嶽毛傳懷來也柔安也喬髙也髙嶽岱宗也疏百神者謂天與山川之神巡守之禮必始于東方故以岱宗言之其實兼四嶽也朱子集傳懷柔百神以至于河之深廣嶽之崇髙而莫不感格廖氏剛曰河之善溢于地嶽之峻極于天其神為難懷柔而言及之則山川莫不寧可知矣是信能成天使之傳序之意也國語晉語成王盟諸侯于岐陽楚為荆蠻置茅蕝設望表與鮮卑守燎韋注置立也蕝謂束茅而立之所以縮酒望表謂望祭山川立木以為表表其位也鮮卑東夷國燎庭燎也蕙田案以上四條巡守望周禮春官小宗伯若軍將有事則與祭有司將事於四望注軍將有事將與敵合戰也合疏其四望者謂五嶽四鎮四瀆王軍將有事與敵戰之時則小宗伯與祭有司大祝之等祭四望之神以求福但四望之神去戰處逺者不必祭之王之戰處要有近之者祭之故以四望言之也先鄭以與祭以上絶讀之若然則與祭者與祭何神其有司將事于四望則有司自有事于四望矣不于小宗伯輒于此言之見何義也于義不然故鄭合為一事解之也鄭氏鍔曰軍將有事則與祭者主帥奉祭小宗伯以職當立之奉之故當與也小宗伯已與祭于軍中則四望之祭必遣其所屬之有司往行事焉理之宜也先鄭知此意故讀與祭以上為絶句康成以與祭連有司以下讀之恐不成文理戰必禱于神欲氣勢之增倍而四望又山川之尤大者國家所賴以為阻固是其為兵之捍蔽黃氏度曰春秋有事于太廟有事祭也軍將有事謂將以軍旅有事于鬼神也祭有司主祭禱者也與如字祭禱自有主者小宗伯與之偕軍事重將事于四望謂將其事以往也兩將字各義蕙田案鄭氏黃氏解與注不同似黃氏為優先鄭後鄭俱未穩大祝國將有事於四望則前祝疏云國將有事于四望者謂軍行所過山川造祭乃過據此經四望以上為出時獻於社為歸時皆大祝前祝以辭告之鄭氏鍔曰國有事于四望則將戰地之四望與夫軍有功歸而獻于社凡此二事大祝處前告神故曰前祝肆師封于大神則為位注封謂壇也大神社及方嶽也疏知兼有方嶽者見小宗伯云軍將有事于四望謂將戰時今戰訖所告明兼祭方嶽方嶽即四望也鄭氏鍔曰封者纍土增高非山川之大神則無纍土為壇以封崇之禮非常祭故為之位周書武成柴望大告武成孔傳燔柴郊天望山川先祖後郊自近始蔡傳既告祖廟燔柴祭天望祀山川以告武功之成由近而逺由親而尊也蕙田案以上四條行師望周禮春官大宗伯國有大故則旅四望注故為凶災旅陳也陳其祭祀以祈焉禮不如祀之偹也鄭司農云四望日月星海玄謂四望五嶽四鎮四瀆賈疏此旅是祈禱之名是以知是凶災凶謂年榖不熟災謂水火也云旅陳也陳其祭事以祈焉禮不如祀之備者但祈謂祈請求福得福乃祠賽之祠賽則備而與正祭同故知禮不如祀之備也鄭司農云四望日月星海後鄭不從者禮無祭海之文又山川稱望故尚書云望秩于山川是也玄謂四望五嶽四鎮四瀆知者祭山川既稱望案大司樂有四鎮五嶽崩四瀆又與五嶽相配故知四望中有此三者言四望者不可一往就祭當四向望而為壇遙祭之故云四望也蕙田案旅祭名旅四望當即在四郊之兆詩所謂自郊徂宫郊不止天地當有四望在內疏謂四向望而為壇祭之非是又案此條因災而祭右祈告望春秋僖公三十一年夏四月四卜郊不從乃免牲猶三望杜注三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭孔疏公羊傳曰三望者祭太山河海且魯竟不及于河禹貢海岱及淮惟徐州徐即魯地三望謂淮海岱也賈逵服虔以為三望分野之星國中山川今杜亦從之左氏傳非禮也望郊之細也不郊亦無望可也公羊傳天子有方望之事無所不通諸侯山川有不在其封內者則不祭也何注方望謂郊時所望祭四方羣神日月星辰風伯雨師五嶽四瀆及餘山川凡六所天子盡八極之內天之所覆地之所載無所不至故得郊也魯郊非禮也三望者何望祭也然則曷祭祭太山河海曷為祭太山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨乎天下者唯太山爾河海潤于千里猶者何通可以己也何以書譏不郊而望也注側手為膚案指為寸言其觸石理而出無有膚寸而不合崇重也不重朝言一朝也亦能通氣致雨潤澤及于千里蕙田案公羊此傳論天子諸侯望祭之事極有精理可為經傳望祭的解方望無所不通對下不在封內是言其疆域之大非兼上下百神也何注兼日月星辰言之大非胡傳望祭也有虞氏受終而望因於類巡守而望因於柴皆天子之事也天子有方望無所不通諸侯非名山大川在其封內者則不祭魯得用重禮視王室則殺故望止于三比諸侯則隆故河海雖不在其封而亦祭然非諸侯之所得為也吳氏澄曰天子郊祀上帝必望祭山川望祭在郊祀之後因郊而望也魯諸侯也以成王之賜許用王禮四望缺其一殺于天子然郊禮既廢則望禮可以不舉魯既不郊而猶三望故書以譏其非禮汪氏克寬曰周官四望蓋望四方今魯三望蓋太山在魯西海在魯東而河在魯北殺天子之禮也宣公三年春王正月猶三望左氏傳望郊之屬也不郊亦無望可也成公七年春王正月猶三望右魯望春秋哀公六年左氏傳楚昭王曰三代命祀祭不越望江漢睢漳楚之望也注諸侯望祀竟內山川星辰江漢睢漳四水在楚界朱子曰諸侯祭山川也只祭得境內底如楚昭王病卜云河為祟時諸大夫欲去祭河昭王自言楚之分地不及于河河非所以為祟孔子所以美之云楚昭王知大道矣其不失國也宜哉這便見得境外山川與我不相關自不當祭之爾雅梁山晉望也右列國望春秋襄公二十六年左氏傳王子朝曰至於夷王王愆于厥身諸侯無不並走其望以祈王身昭七年左氏傳韓宣子謂子産曰寡君寢疾並走羣望注晉所望祀山川皆走往祈禳昭十三年左氏傳楚共王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇于五人者使主社稷乃遍以璧見于羣望曰當璧而拜者神所立也右祈禳走羣望周禮春官大宗伯以血祭祭五嶽注隂祀自血起貴氣臭也五嶽東曰岱宗南曰衡山西曰華山北曰恆山中曰嵩髙山不見四瀆者四瀆五嶽之匹或省文疏云五嶽東曰岱宗南曰衡山西曰華山北曰恆山中曰嵩髙山者此五嶽所在據東都地中為説案大司樂云四鎮五嶽崩注云華在豫州嶽在雍州彼據鎬京為説彼必據鎬京者彼據災異若據洛邑則華與嵩髙並在豫州其雍州不見有災異之事故注有異也案爾雅江河淮濟為四瀆為定五嶽不定者周國在雍州時為西嶽故權立吳嶽為西嶽非常法爾雅不載以東都為定故爾雅載之也若然此南嶽衡山案爾雅霍山為南嶽者霍山即衡山也故地理志揚州霍山為南嶽者山今在廬山彼霍山與兾州霍山在嵩華者别云不見四瀆者四瀆五嶽之匹或省文者五嶽四瀆相對若天地故設經省文唯見五嶽也若然下云貍沈祭山林川澤五嶽歆神雖與社稷同用血五嶽四瀆山川之類亦當埋沈也爾雅云祭山曰庪縣者或異代法耳若然庪縣既非周法而校人云凡將事于四海山川則飾黃駒注云王巡守過大山川則有殺駒以祈沈禮與玉人云天子以巡守宗祝以前馬注云其祈沈以馬宗祝亦執爵以先之彼亦言祈沈者祈沈雖非周法引以况義無嫌也黃氏度曰鄭謂四瀆五嶽之匹非四瀆川祭四望則四瀆在焉春秋傳曰觸石而出膚寸而合不崇朝而雨遍天下者唯太山乎其功用大故與社稷同其秩祭劉氏向曰五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大斂雲雨焉施德博大故視三公四瀆者何謂也江河淮濟也四瀆何以視諸侯能蕩滌垢濁焉能通百川于海焉能出雲雨千里焉為施甚大故視諸侯也山川何以視子男也能出物焉能潤澤物焉能生雲雨為恩多然品類以百數故視子男也金氏履祥曰案李氏心傳辨周禮五嶽謂周都豐鎬則華山乃中嶽嵩髙不得為中嶽據爾雅河西嶽河南華河東泰江南衡則嶽山乃西嶽而華乃中嶽嵩髙之為中嶽蓋東遷之後也今以此説推之禹貢兾州自有太嶽今猶謂之霍太山則堯都兾州蓋以太嶽為中嶽爾雅河西嶽周禮雍州其山鎮曰嶽山即禹貢岍山一名嶽山又名吳嶽今在隴州者是也然則唐虞西嶽當以岍為西嶽太嶽為中嶽而東岱南衡北恆爾衡山最逺黃帝以潛霍為山之副然則秦以岍為西嶽漢武徙衡山之神于霍山厯代加封岷山多以西嶽為言蓋有自來矣虞書獨東嶽稱岱宗而南西北三嶽不名蓋當時巡守四嶽取肆覲羣后道里之宜爾不必拘于嵩華之為嶽也敢因李氏之言以傳其疑蔡氏德晉曰職方九州皆有山鎮澤藪川浸大司樂言四鎮五嶽蓋嶽亦為鎮岱衡華恆嶽為五鎮其餘沂會醫霍又為四鎮通為九鎮而有不同五嶽四瀆四海定自開闢以來不可更易州鎮則每代不同舜肇十二州封十二山即為十二鎮禹别九州奠髙山大川周制又殊故鎮與澤浸不得與嶽瀆等川則流行宇內不得以州域分如河自積石而下稱西河唐以來名西瀆以其厯兾豫幽兖而入海故職方以為幽兖之川是也涇與渭洛皆川而職方以渭洛為浸言澤則遺洞庭彭蠡青草南旺言川則遺黑水赤水遼水固知職方僅舉其大略非可援以定祀典也大宗伯書大傳王制説苑皆特表嶽瀆而其餘山川並從同不易之制矣或又疑職方五嶽無嵩山有嶽山何也説者謂據鎬京而言權立吳嶽為西嶽而以華山為中嶽若以東都為定則華山自是西嶽嵩山自是中嶽不知雍豫二州山鎮係傳寫錯誤豫州山鎮當作嶽山即嵩山也嵩為中嶽故獨得嶽名雍州山鎮當作華山周之雍州兼梁州之域故華山在雍也蕙田案漢郊祀志云三代之居皆河洛之間故嵩髙為中嶽自五帝以至秦其禮損益世殊不可勝記是五嶽之名從古變易金氏蔡氏之言是也以貍沈祭山林川澤注祭山林曰埋川澤曰沈順其性之含藏疏經埋沈祭山林川澤總言不析别而説故鄭分之以其山林無水故埋之川澤有水故沈之是其順性之含藏也崔氏靈恩曰祭之法各當其時山林于壇川澤于坎故禮記云四坎壇祭四方牲用少牢王服玄冕牲玉各放其方之色樂則奏蕤賔歌函鍾舞大夏鄭氏鍔曰山林有功于埋藏川澤有功于涵容祭山林之牲則埋之祭川澤之牲則沈之各象其德儀禮覲禮祭山丘陵升祭川沈敖氏繼公曰升謂縣之瘞埋也此皆順其性而為之也爾雅祭山曰庪縣祭川曰浮沈邢疏庪縣祭山之名也庪謂埋藏之大宗伯云以埋沈祭山林川澤鄭注云祭山林曰埋是也縣謂縣其牲幣于山林中郭云或庪或縣置之于山是也又山海經曰縣以吉玉是也浮沈郭云投祭水中或浮或沈大宗伯云以埋沈祭山林川澤鄭注云祭川澤曰沈順其性之含藏是也右望祭法禮記祭法四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神注四方即謂山林川谷丘陵之神也祭山林丘陵于壇川谷于坎每方各為坎為壇怪物雲氣非常見者也雲疏四坎壇四方各為一坎一壇山林川谷丘陵能出為風雨見怪物此四壇坎所祭之神也怪物慶雲之屬風雨雲露並益于人壇以祭山林丘陵坎以祭川谷泉澤也馬氏晞孟曰山林川谷丘陵民之所取財用也而又能出雲為風雨而有澤以利于人見怪物而有威以敬于人皆有不可測之神故皆曰神右山川壇禮記祭法山林川谷丘陵民所取材用也非此族也不在祀典注族猶類也祀典謂祭祀也樂記三王之祭川也皆先河而後海或源也或委也此之謂務本注源泉所出也委流所聚也始于一勺卒成不測疏三王祭百川之時皆先祭河後祭海或先祭其源或後祭其委河為海本源為委本總之則皆曰川也源委謂河海之外諸大川也或解云源則河也委則海也申明先河而後海義亦通矣先祭本是務重其本本小而後至大是小為大本先學然後至聖是學為聖本也朱子曰先河後海者以其或是源故先之或是委故後之疏有二説此説是也沈氏清臣曰海者源也河者委也昔有人問何以謂海為源應之曰海者水之所會也其河之所流者皆其泉脈也譬之人之一身元氣則其海也其經絡則其河也元氣不充實則經絡不運行矣謂經絡為源則非也謂元氣為委則非也鄭氏謂源者泉所出委者流所聚蓋不知吾之説也然則所謂先河而後海者以河之近故先祭之海之逺故後祭之非故後之也亦務其本者當如是也蕙田案此以朱子説為是沈氏説非禮器晉人將有事于河必先有事于惡池齊人將有事于太山必先有事于配林注呼池嘔夷并州川也配林林之名疏惡池小川配林是太山之從祀者先告惡池配林然後祭河及太山此皆積漸從小至大之義也方氏慤曰有事謂祭也將有事于大必先有事于小焉所謂有由始也林則木之所積以其從祀于太山故曰配林馬氏晞孟曰天子祭名山大川諸侯祭山川之在其地者齊人有事于太山亦非禮也然而祭者取之而不非者取其有大小先後之序也陸氏佃曰晉人告惡池以配河齊人告配林以配太山雖曰告之實以肄習其禮即事有漸也王制山川神祇有不舉者為不敬不敬者君削以地注舉祭也敬疏山川有外神故云不舉不舉不也山川在其國故削以地方氏慤曰神祇衆矣止以山川為言者蓋諸侯之所守以山川為大故魯頌言錫之山川經又云諸侯祭名山大川之在其地者皆此意也天曰神地曰示此以山川為神祗者自其無所屈言之皆可謂之神自其有所别言之皆可謂之祗右祭山川名義書禹貢奠髙山大川曾氏曰定其山之髙峻川之深大者為其州之鎮秩其祭而使其國主之也孔氏曰奠定其差秩祀禮所視易隨卦上六王用亨于西山朱子本義自周而言岐山在西凡筮祭山川者得之其誠意如是則吉也項氏安世曰大有九三王用亨于天子隨上六王用亨于西山益六二王用亨于帝升六四王用亨于岐山四爻句法皆同古文亨即享字今讀益作享讀者俗師不議古字獨于享帝不敢作亨帝也何氏楷曰如王之祭享于西山誠意顓篤雖鬼神可格而况于人乎王謂九五古文亨即享字西山岍隴諸山其尊者吳嶽在正西兌方又地祗隂神也故兊之隂畫為西山又兊為巫升卦六四王用亨於岐山何氏楷曰王文王也文王三分有二侯度益謹惟祭境內之山川止矣終不敢越分而修禋祀者也岐山在禹貢雍州境南坤西南象又按儀禮云祭山邱陵升疏云祭山曰庪縣不言升此山邱陵云升者升即庪縣也禮記王制天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者注視三公視諸侯視其牲器之數也諸侯祭名山大川若魯人祭太山晉人祭河是也周氏諝曰天子百神之主故祭天下之名山大川諸侯境內之主惟名山大川之在境內者則祭之張氏栻曰古者諸侯各得祭其境內山川山川所以為神靈者以其氣之所感能出雲雨潤澤羣物是故為之壇壝立之祝史設之牲幣所以致吾禱祝之實而交孚乎隱顯之際誠之不可掩如此後世有山川之祠而人其形宇其地則其失久矣夫山峙川流是其形也而人之也何居其氣之流通可以相接也而宇之也何居無其理而強為之雖百拜而祈備物以享其有時而應亦偶然而已朱子曰一家之主則一家鬼神屬焉諸侯守一國則一國鬼神屬焉天子有天下則天下鬼神屬焉看來為天子者這一個神明是甚麼大如何有些子差忒得若縱欲無度天上許多星辰地下許多山川如何不變怪又曰古人祭山川只是設壇位以祭之祭時便有祭了便無故不至褻瀆後世却先立個廟貌如此所以反致惑亂人心僥求非望無所不至曲禮天子祭山川嵗遍諸侯方祀祭山川嵗遍疏祭山川者周禮兆五帝于四郊四望四類亦如之也諸侯既不得祭天地又不得總祭五方之神唯祀當方故云方祀祭山川者王制云在其地則祭之亡其地則不祭是也吕氏大臨曰天子有天下故得祭天地四方山川五祀言無所不及也諸侯有國國必有方祭其所居之方而已非所居之方及山川不在其境內者皆不得祭故曰方祀祭山川祭五祀言有及有不及也陳氏祥道曰山川周禮所謂以血祭祭五嶽以埋沈祭山林川澤王制所謂名山大川是也諸侯方祀春秋傳所謂三代命祀祭不越望是也山川王制所謂名山大川在其竟內是也于天子言天地則日月星辰司中司命風師雨師之類舉矣于天子諸侯言四方方祀則社稷之類舉矣言山川則林澤丘陵墳衍之類舉矣陳氏禮書望祀或設于郊天之後或設于巡守之方或旅于大故之時則望有常有不常之祀也崔靈恩謂四望之祭嵗各有四不知何據然也望祀其兆四郊其牲各放其方之色其樂姑洗南吕大㲈其玉兩圭有邸其服毳冕其位茅以辨之而植表于其中周禮所謂旁招以茅晉語所謂茅蕝設表望是也白虎通謂周公祭太山以召公為尸其言無所經見右山川正祭禮記月令孟春之月命祀山林川澤仲夏之月命有司為民祈祀山川百源注陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源川疏雩之與禱所以異者考異郵説云天子禱九州山諸侯禱封內大夫禱所食邑又僖公三時不雨帥羣臣禱山川以過自讓凡雩必先禱故此經云乃命百縣祈祀山川百源始大雩帝是也陳氏祥道曰禮有先其大而後其小者亦有先其小而後其大者先其大而後其小者異尊卑也祫而後時祭郊而後三望之類是也先其小而後其大者致敬文也魯人將有事于上帝必先有事于頖宫晉人將有事于河必先有事于惡池是也二者之禮雖殊其所以為尊尊則一而已月令仲夏為民祈祀山川百源然後大雩帝此致敬盡文之意也仲冬之月天子命有司祈祀四海大川名源淵澤井泉注順其德盛之時祭之也馬氏晞孟曰盛德在水故應是而祈焉以為民致福也講義四海者衆水之所聚大川名源者若江淮河濟之類是也江之源出于岷山河之源出于崑崙淮之源自桐柏濟之源自沇水故謂之名源也淵澤者水之所鍾而息者也井泉者汲取之無窮者也仲冬之月水歸于澤而復其本源矣故命有司祈祀之應氏鏞曰夏祈山川百源火勝水弱遵其流委而廣其潤澤也冬祀四海川源淵澤井泉盛德在水鍾其淵源厚其渟蓄也三王之祭川皆先河而後海以海為委而河為源也水重冬祀亦豈非源乎季冬之月乃畢山川之祀注四時之功成于冬孟月祭其宗至此可以祭其佐也疏案上孟冬祈來年于天宗大割祠于公社臘先祖五祀是為蠟祭並祭山川也是嶽瀆及衆山川也孟冬不見者文不具孟冬祭嶽瀆因及衆山川至此又更祭衆山川山川小于嶽瀆是孟月祭其宗此月祭其佐也右祭山川之時周禮春官小宗伯兆山川丘陵墳衍各因其方注順其所在疏案大司徒職云地有十等此不言林澤原隰亦順所在可知故略不言也鄭氏鍔曰五嶽四瀆神之最尊者也此言山川則祭法所謂山林川谷丘陵能出雲為風雨見怪物皆曰神之山川耳不為兆域唯因其所在之方為其卑也李氏嘉平曰原隰則卑下不祭司服祀山川則毳冕典瑞璋邸射以祀山川注璋有邸而射取殺于四望鄭司農云射剡也疏此祀山川謂若宗伯云兆山川丘陵各于其方亦隨四時而祭則用此璋邸以禮神鄭氏鍔曰半圭曰璋射者琰而出也半圭之璋邸于琮而從下向上皆邪郤而琰出故謂之射璋以象隂之盛事又從而邪殺之如矢之射見通贊之義以此祀山川則小宗伯所謂兆山川邱陵墳衍者是也易氏祓曰琮方固所以象地半圭所邸于地道為不足于以祀山川蕙田案山川有大小故玉人職璋有長短大璋中璋九寸邉璋七寸又牙璋中璋七寸雖非此璋可例推也考工記玉人璋邸射素功以祀山川注鄭司農云素功無瑑飾也趙氏溥曰璋邸者就方琮上出一璋以璋而邸于琮琮之方所以象地之體以琮為依托之邸所以象山川之麗于地也與圭璧之意同亦欲山川之神降而依存于璋邸中亦植在神坐前非手所執之玉易氏祓曰射言剡而出而貫于邸素功則朴質而無瑑飾之文所以象山川有阻固之功禮記月令季夏之月命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共名山大川四方之神注四監王山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國養犧牲之芻多少有常民皆當出力艾芻養牲以供祠神靈為民求福也林疏案周禮有山虞澤虞林衡川衡之官秩芻出于山又季冬云收秩薪柴薪柴亦出于山林川澤鄭知百縣非諸侯而云鄉遂之屬者以取芻養牲不可大逺故知是畿內鄉遂仲夏云百縣雩祀則兼外內諸侯也此云鄉遂不兼公卿大夫之采邑也方氏慤曰四監者天子之縣內監郡之大夫也古者千里百縣縣有四郡郡使大夫監之故謂之四監春秋傳所謂下大夫受郡是也馬氏晞孟曰四監則郊各以監有受其入也百縣則甸服之內所使納總銍秸服者也既卜而芻焉皆謂之牲將殺而告具焉皆謂之犧令民無不咸出其力則所謂祭祀者非獨恭也謂民力之普存也季冬之月命宰厯卿大夫至於庶民土田之數而賦犧牲以共山林名川之祀注此所與卿大夫庶民共者也厯猶次也卿大夫采地亦有大小其非采地以其邑之民多少賦之田疏宰小宰也卿大夫謂畿內有采地者庶民受田準多少之數賦之犧牲以供山林名川之祀不云士者上舉卿大夫下舉庶民則士在其中省文耳卿大夫無采地則出其邑之賦稅庶人無邑則出其賦稅以與邑宰邑宰以共上陸氏佃曰厯而數之小宰之事也凡在天下九州之民者無不咸獻其力以共山林名川之祀注民非神之福不生雖有其邦國采地此賦要由民出疏以經云天下九州之民不云諸侯卿大夫獨云民故鄭注言此賦要由民出也周禮夏官小子凡沈辜候禳飾其牲注鄭司農云沈謂祭川爾雅曰祭川曰浮沈辜謂磔牲以祭也月令曰九門磔禳以畢春氣候禳者候四時惡氣禳去之也王氏昭禹曰沈謂貍沈辜謂疈辜候謂候福禳謂却禍易氏祓曰飾其牲被之以文繡謂羊牲也秋官犬人凡幾珥沈辜用駹可也易氏祓曰幾祈也珥弭也沈以祭川辜以磔門四者用牷正也無則以駹代之亦可也禮記月令孟春之月犧牲毋用牝注為傷妊生之類以疏犧牲毋用牝者山林川澤其祀既卑餘月之時牲皆用牝唯此月不用故注為傷妊生之類者天地宗廟大祭之時雖非正月皆不用牝方氏慤曰祀不止於山林川澤然止以是為言者蓋天地宗廟之祭非春亦未嘗用牝故也論語子謂仲弓曰犁牛之子騂且角雖欲勿用山川其舍諸朱注犁雜文騂赤色周人尚赤牲用騂角角周正中犧牲也用用以祭也山川山川之神也言人雖不用神必不舍也陳氏埴曰祭天地之牛角繭栗宗廟之牛角握社稷之牛角尺以其色既赤又且角中程度也大戴禮曾子天圓篇山川曰犧牷注色純曰犧體完曰牷周禮春官鬯人掌共秬鬯而飾之凡山川四方用蜃凡祼事用概注祼當為埋字之誤也故書蜃或為謨杜子春云謨當為蜃書亦或為蜃蜃水中蜃也蜃畫為蜃形蚌曰含漿尊之象概尊以朱帶者而疏鄭破祼為埋者若祼則用鬱當用彛尊不合在此用概尊故破從埋也埋謂祭山林則山川用蜃者大山川云蜃畫為蜃形者亦謂漆畫之云蚌曰含漿尊之象者蚌蛤一名含漿含漿則是容酒之類故畫為蜃而尊名也云概尊以朱帶者玄纁相對既是黑漆為尊以朱帶落腹故名概概者橫概之義故知落腹也鄭氏鍔曰四方山川則用漆尊而畫為蜃形先儒謂為蚌蛤一名含漿則是容酒之類余謂此乃海上能吐氣為樓臺者非蚌蛤之比四方山川為國扞蔽通氣乎天地之間蜃之為物外堅有阻固扞蔽之義且能一闔一闢其通亦有時焉故四方山川之祼尊則畫以為飾祼事用雞鳥六彜見于司尊彞之官鬱人亦曰凡祭祀賓客之祼事和鬱鬯以實彛而陳之則祼事不用概明矣大宗伯有貍沈疈辜之祭此下有疈事用散之文則此祼字為埋字無疑矣祼事用概概亦漆尊也上下黑漆以朱落其腹為飾猶橫概然山林川澤財用百物之所出入人所取足而為之神者初無私焉其功利及物可謂平矣黃氏度曰鄭改祼為埋埋沈祭山川之名此指言山川用蜃凡祼事則不獨祭也知賓客享適子冠凡用祼者皆以概盛鬯王氏昭禹曰凡祼必和鬱鬯而多少之齊宜適平故以罍以朱帶為飾而橫概落腹以概能平物故也大司樂乃奏蕤賓歌函鍾舞大夏以祭山川注蕤賓陽聲第四函鍾為之合函鍾一名林鍾四疏云蕤賓陽聲第四者應鍾之六三上生蕤賓之九是陽聲第四也云函鍾為之合者蕤賓午之氣也五月建焉而辰在鶉首函鍾未之氣也六月建焉而辰在鶉火是函鍾之為合也云函鍾一名林鍾者此周禮言函鍾月令云林鍾故云一名林鍾也易氏祓曰夏大也言禹之治水而能大中國也故大夏之樂起于蕤賓之午應以函鍾之未以禹之奠髙山大川而懷襄昏墊之患始息以祀山川亦其類也陸氏佃曰林鍾以夏為庇物言之李氏嘉會曰林者物已成林坤當涵而養之故曰函見蓄養萬物地官舞師掌教兵舞帥而舞山川之祭祀賈疏掌教兵舞謂教野人使知之國有祭山川則舞師還帥領往舞山川之祀已下皆然王氏昭禹曰兵舞干舞也山川為國阻固故以干舞之干之言扞也山虞若祭山林則為主而修除且蹕注為主主辦護之也修除治道路場壇主疏此山林在畿內王國四方各依四時而祭云則為者謂主當祭事者也而修除者謂掃除糞灑云且蹕者且復蹕止行人也云為主主辦護之也者案中侯握河紀堯受河圗云帝立壇磬折西向禹進迎舜契陪位稷辦護注云辦護者供時用相禮儀則此云辦護者亦謂共時用相禮儀者也云修除道路場壇者案守祧職云其廟則有司修除之鄭云有司恆主修除謂掃除糞灑場謂墠即除地之處壇神位之所也王氏安石曰修修祭事除除地為墠蹕止人犯其祭虞主山林掌其政令且為之厲禁也禮記禮器五獻察孔疏謂祭四望山川白虎通周公祀太山召公為尸右祭山川禮物儀節書禹貢梁州蔡蒙旅平陳氏大猷曰古人舉事必祭况治水土大事必不敢忽然旅獨於梁雍言之者蓋九州終於梁雍以見前諸州名山皆有祭也旅獨於蔡蒙荆岐言之者蓋紀梁之山終於蔡蒙紀雍之山始於荆岐以見州內諸名山皆有祭也故下文復以九山刋旅總結之然特言於諸州之後其先成民而後致力於神之意歟雍州荆岐既旅九山刋旅九川滌源九澤既陂陳氏曰九州之山槎木通道已可祭告王氏樵曰刋旅舉始末以包中間刋者治水之始旅者功成祭告蕙田案以上三條治水祭山川詩周頌般序般巡守而祀四嶽河海也疏武王既定天下巡行諸侯所守之土祭祀四嶽河海之神神皆享其祭祀降之福祚至周公成王太平之時詩人述其事而作此歌焉中嶽無事故序不言漢書溝洫志云四瀆河為宗然則河為四瀆之長言河可以兼之經無海而序言海者海是衆川所為歸經雖不説祭之可知於皇時周陟其髙山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命傳高山四嶽也嶞山之狹小者也翕合也裒聚也鄭箋陟登也喬髙也允信也敷遍也對配也遍天下之神皆如是配而祭之是周之所以受天命而王也疏天子巡守所至則登其髙山而祭之謂每至其方告祭其方之嶽也堯典及王制説巡守之禮皆言望秩于山川則知嶞山喬嶽允猶翕河皆謂秩祭之事釋文曰嶞山形狹長也何氏楷曰此詩言武王先于喬嶽之上祭天又旁及諸山川皆在喬嶽之上望而祭之無所不遍蓋天子省方告祭所以承天命而答人之心禮當如此周禮夏官校人凡將事於四海山川則飾黃駒注四海猶四方也王巡守過大山川則有殺駒以祈沈禮與玉人職有宗祝以黃金勺前馬之禮疏云四海猶四方也者王巡守唯至方嶽不至四海夷狄故以四海為四方云有殺駒以祈沈禮與者爾雅云祭山曰庪縣祭川曰浮沈今鄭云以祈沈者總解過山川二事言與者爾雅據正祭此則行過之約與彼同故云與以疑之也引玉人職者證過山川設禮用馬牲之事也鄭氏鍔曰若有祭祀于四海山川則必擇黃色之駒加文飾以將事焉此皆校人之職或謂大宗伯以沈貍祭川澤而祭祀之牲各放其色四海山川乃均用黃駒何耶以玉人之職考之王巡守過大山川所用之璋不同然皆以黃金勺前馬則知均用黃駒者海與山川均為地道黃者地之中色若夫用駒則以巡守而行四方駒有千里之足而行地莫如馬駒雖馬之小者禮以小為貴飾黃駒乃郊用犢之意考工記玉人大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬注射琰出者也勺故書或作約杜子春云當為勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也玄謂鼻勺流也凡流皆謂龍口也衡古文橫假借字也衡謂勺徑也三璋之勺形如圭瓚天子巡守有事山川則用灌焉于大山川則用大璋加文飾也于中山川用中璋殺文飾也于小山川用邉璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事焉將有事于四海山川則校人飾黃駒勺疏此經説王巡守出行過山川禮敬之事三璋據為柄黃金勺以下據為勺頭又曰射琰出者也者向上謂之出謂琰半已上其半已下為文飾也先鄭云鼻謂勺龍頭鼻後鄭增成其義衡謂勺柄龍頭後鄭不從元為衡古文為橫謂勺徑破先鄭為勺柄云三璋之勺形如圭瓚者圭瓚之形前注已引漢禮但彼口徑八寸下有盤徑一尺此徑四寸徑既倍狹明所容亦少但形狀相似耳故云形如圭瓚也知用灌者以其圭瓚灌宗廟明此巡守過山川用灌可知于大山川已下至半文飾皆無正文鄭君以意解之云祈沈以馬者取校人飾黃駒故知馬也知宗祝亦執勺以先之者即引大祝職云王過大山川則大祝用事焉是大祝用此經黃金勺之事也云將有事于四海山川則校人飾黃駒者校人職文引之者見禮山川非直灌亦有牲牢以山川地神故用黃駒也大祝職云王過大山川大祝用事不言中山川小山川者舉大而言或使小祝為之也尚書大傳虞傳曰維元祀巡守四嶽八伯壇四奧沉四海封十有二山兆十有二州注奧內也安也四方之內人所安居也為壇祭之謂祭四方之帝四方之神也祭水曰沈祭者必封封亦壇也十有二山十有二州之鎮也兆域也為營域以祭十二州之分星也壇沈封兆皆因所宜為之名樂正定樂名元祀代太山貢兩伯之樂焉東嶽陽伯之樂舞侏離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大謡名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾彧其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱于秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰花落和伯之樂舞玄鶴其歌聲比中謡名曰歸來幽都𢎞山祀貢兩伯之樂焉冬伯之舞齊落歌曰縵縵并論八音四會注陽伯猶言春伯春官秩宗也伯夷掌之侏離舞曲名言象物生育離根株也徒歌謂之謡其聲清濁比如余謡然後應律也晳當為析春厥民析晳陽樂正所定也是時契為司徒掌地官矣後又舉禹掌天官儀當為羲仲之後也鼚動貌哉始也言象物應雷而動始出見也南任也中仲也古字通春為元夏為仲五月南巡守仲祭大交氣于霍山也南交稱大交書曰宅南交也夏伯夏官司馬也棄掌之謾猶曼也彧長貌猶物象之滋曼彧然也初慮陽上極隂始謀也謾或為謗將陽言象物之秀實動搖也于大也八月西巡守祭栁榖之氣于華山也栁聚也齊人語秋伯秋官士臯陶掌之蔡猶衰也俶始也言象物之始衰也和伯和仲之後也玄鶴象陽鳥之南也歸來言反其本也𢎞山恆山也十有一月朔巡守祀幽都之氣于恆山也互言之者明祭山北稱幽都也冬伯冬官司空也垂掌之齊落終也言象物之終也齊或為聚此上下有脫辭其説未聞蕙田案以上四條巡守告山川之禮儀禮覲禮禮四瀆於北門外禮山川邱陵於西門外敖氏繼公曰禮四瀆于北禮山川邱陵于西皆隨其地之隂陽而為之禮川不于北者四瀆尊宜避之也此三禮者皆與上事相屬而舉之天子巡守有懷柔百神望秩山川之禮此諸侯以天子不巡守之故而來覲故天子於此亦略修祀事以放巡守之禮云周禮春官大祝大會同過大山川則用事焉注用事亦用祭事告行也玉人職有宗祝以黃金勺前馬之禮是謂過大山川與曾子問曰凡告必用牲幣反亦如之疏大會同者王與諸侯時見曰會殷見曰同或在畿內或在畿外亦告廟而行言用事亦用祭事告行也者言亦如上經大師用祭事告行引玉人職者案玉人職大璋中璋九宗祝以前寸邉璋七寸射四寸厚寸黃金勺青金外天子以巡守馬此云有宗祝以黃金勺前馬之禮非是彼正文義略言之耳云是謂過大山川與者彼不過云山川此言過大山川此不言用黃金勺彼言以黃金勺以義約為一故言與以疑之彼注云大山川用大璋中山川用中璋小山川用邉璋此直見過大山川不見中小者欲見中小山川共大山川一處直告大山川不告中小故不見中小山川各自别處則用中璋邉璋此所過山川非直用黃金勺酌獻而已亦有牢故校人職云將有事于四海山川則飾黃駒注云四海猶四方王巡守過大山川則有殺駒以祈沈之禮與是其牲牢也禮記曾子問孔子曰諸侯適天子命祝史告於社稷宗廟山川凡告用牲幣反亦如之校疏必知天子用牲者人云王所過山川則飾黃駒是用牲也必知諸侯不用牲者約下文云幣帛皮圭以告故知不用牲也或天子諸侯出入有告有祭故告用制幣一丈八尺其卿大夫唯入祭而已故聘禮既使而反祭用牲也諸侯相見命祝史告於五廟所過山川反命祝史告至於前所告者注山川所不過則不告貶于適天子也春秋襄公十一年左氏傳載書曰司慎司盟名山名川注二司天神鎮疏名山山之有名者謂五嶽四也名川謂四瀆也蕙田案以上四條朝會祭山川周書武成底商之罪告於皇天后土所過名山大川孔傳名山華嶽大川河山疏周適商路過河華故知所過名山華嶽大川河也川大乃有名名大互言之耳周禮大祝云王過大山川則用事焉鄭云用事用祭祀告行也周禮春官肆師祭兵于山川則為位注山川蓋軍之所依止疏云山川蓋軍之所依止者以其山川衆多不可並祭軍旅思險阻軍止必依山川故知祭軍所依止者也鄭氏鍔曰兵之所在必增髙以祭之非頓兵之山川則無類禡之祭兵之所在則宜有祭此非常祭故為之位王氏與之曰祭兵于山川若武成告所過名山大川春秋宣公十二年左氏傳楚子敗晉師于邲祀于河襄公十八年左氏傳晉侯伐齊將濟河獻子以朱絲係玉二玨而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟杜注雙玉曰玨環齊靈公名負依也神主民也謂數伐魯殘民人彪晉平公名稱臣者明上有天子以謙告神曽臣猶末臣官臣守官之臣偃獻子名疏王制云五嶽視三公四瀆視諸侯則諸侯于河神其辭不得稱臣故解其意稱臣者以明上有天子言已是天子之臣以謙告神也曾祖曽孫者曽為重義諸侯之于天子無所可重曽臣猶末臣謙彼之意耳昭公十七年左氏傳晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎九月丁卯晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾蕙田案以上五條行師告山川春秋成公五年左氏傳梁山崩重人曰國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已注主謂所主祭去盛饌損盛服車無文息八音舍于郊陳玉帛自罪責禮山川右因事祭山川春秋僖公十九年左氏傳秋衛大旱卜有事於山川不吉昭公元年左氏傳山川之神則水旱癘疫之災於是乎禜之注有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營攢用幣以祈福祥疏水旱癘疫在地之災山川帶地故祭山川之神也禜是祈禱之小祭耳若大旱而雩則遍祭天地百神不復别其日月與山川也杜言山川之神若臺駘者言此禜祭祭其先世主山川之神耳非獨祭此山川之神也昭公十六年左氏傳鄭大旱使屠擊祝欵豎拊有事於桑山斬其木不雨子産曰有事於山蓻山林也而斬其木其罪大矣奪之官邑淮南子曰湯旱以身禱於桑山之林右禜祭山川五禮通考卷四十六
