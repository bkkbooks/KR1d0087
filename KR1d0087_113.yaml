body:
  text: 五禮通考卷一百三刑部尚書秦蕙田撰吉禮一百三后妃廟舊唐書禮儀志景雲元年冬追尊昭成肅明二皇后於親仁里别置儀坤廟四時享祭唐書肅明劉皇后傳睿宗肅明順聖皇后劉氏祖德威儀鳯中帝在藩納為孺人俄為妃生寧王夀昌代國二公主帝即位為皇后會帝降號皇嗣復為妃長夀二年為戶婢誣與竇德妃挾蠱道祝詛武后並殺之宫中葬祕莫知景雲元年追諡肅明皇后昭成竇皇后傳睿宗昭成順聖皇后竇氏曾祖抗父孝諶后婉淑尤循禮則帝為相王納為孺人即位進德妃生元宗及金仙玉真二公主與肅明同追諡並招魂葬東都之南肅明曰惠陵后曰靖陵立别廟曰儀坤以享云帝崩追稱皇太后與肅明祔橋陵后以子貴故先祔睿宗室肅明以開元二十年乃得祔廟蕙田案元宗先以生母祔廟繼以肅明並祔也文獻通考唐制追贈皇太后皆别立廟舊唐書禮儀志開元四年令以儀坤廟為中宗廟尋又改造中宗廟于太廟之西貞節等以肅明皇后不合與昭成皇后配祔睿宗奏議曰臣聞於禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而來無易伏惟昭成皇后有太姒之德已配食於睿宗則肅明皇后無啓母之尊自應别立一廟謹案周禮云奏夷則歌小吕以享先妣先妣者薑嫄是也薑是帝嚳之妃后稷之母特立廟名曰閟宫又禮論云晉伏系之議云晉簡文鄭宣后既不配食乃築宫于外歲時就廟享祭而已今肅明皇后無祔配之位請同薑嫄宣后别廟而處四時享祀一如舊儀從之於是遷昭成皇后神主祔于睿宗之室唯留肅明皇后神主于儀坤廟陳貞節傳貞節遷太常博士元宗奉昭成皇后袝睿宗室又欲肅明皇后并升焉貞節奏請凖周薑嫄晉宣后納别主廟時享如儀於是留主儀坤廟詔𨽻太廟毋置官屬音樂志儀坤廟樂章十二首迎神用永和林鐘宮散騎常侍昭文館學士徐彥伯作猗若清廟肅肅熒熒國薦嚴祀坤輿淑靈有几在室有樂在庭臨兹孝享百祿惟寧金奏夷則宫不詳作者一本無此章除靈效祉軒曜降精祥符淑氣慶集柔明瑶爼既列雕桐發聲徽猷永逺比德皇英皇帝行用太和黃鐘宫左諭德昭文館學士邱説撰孝哉我后沖乎乃聖道映重華德輝文命慕深視篋情殷撫鏡萬國移風兆人承慶酌獻登歌用肅和中吕均之太簇羽一云蕤賔均之夾鐘羽太子洗馬昭文館學士張齊賢撰祼圭既濯鬱鬯既陳畫羃雲舉黃流玉醇儀充獻酌禮盛衆禋地察惟孝愈焉饗親迎爼用雍和姑洗羽太中大夫昭文館學士鄭善玉作酌鬱既灌取蕭方爇籩豆靜嘉簠簋芬飶魚臘薦美牲牷表潔是戢是將載迎載列肅明皇后室酌獻用昭和林鐘宫禮部尚書昭文館學士薛稷作陽靈配德隂魄昭升堯壇鳳下漢室龍興俔天作對前旒是凝化行南國道盛西陵造舟集灌無德而稱我粢既潔我醴既澄隂隂靈廟光靈若憑德馨惟饗孝思蒸蒸昭成皇后室酌獻用坤貞不詳作者乾道既亨坤元以貞肅雍攸在輔佐斯成外睦九族內光一庭克生睿哲祚我休明欽若徽範悠哉淑靈建兹清宫于彼上京縮茅以獻潔秬惟馨實受其福期乎億齡飲福用夀和黃鐘宫太子詹事崇文館學士徐堅作於穆清廟肅雍嚴祀合福受釐介以繁祉送文舞出迎武舞入用舒和南吕商銀青光祿大夫崇文館學士胡雄作送文迎武遞參差一始一終光聖儀四海生人歌有慶千齡孝享肅無虧武舞用安和太簇徵祕書少監崇文館學士劉子元作妙算申帷幄神謀出廟庭兩階文物備七德武功成校獵長楊苑屯軍細栁營將軍獻凱入歌舞溢重城徹爼用雍和蕤賔均之夾鐘羽銀青光祿大夫崇文館學士員半千作孝享云畢維徹有章雲感元羽風悽素商瞻望神座祇戀匪遑禮終樂闋肅雍鏘鏘送神林鐘宫金紫光祿大夫崇文館學士祝欽明作閟宫實實清廟微微降格無象馨香有依式昭纂慶方融嗣徽明禋是享神保聿歸又儀坤廟樂章二首太樂又有一本與前本略同二章不同如左不詳撰者迎神一本有此章而無徐彥伯之詞月靈降德坤元授光娥英比秀任姒均芳瑶臺薦祉金屋延祥迎神有樂歆此嘉薌送神一本有此章而無祝欽明之詞玉帛儀大金絲奏廣靈應有孚𡨕徴不爽降彼休福歆兹禋享送樂有章神麾其上舊唐書禮儀志元宗二十一年又特令遷肅明皇后神主祔于睿宗之室仍以舊儀坤廟為肅明觀唐書昭德王皇后傳德宗昭德皇后王氏帝為魯王時納為嬪生順宗既即位册號淑妃貞元三年立為皇后册禮方訖而后崩羣臣大臨三日帝七日釋服將葬后母郕國鄭夫人請設奠有詔祭物無用寓欲祭聽之于是宗室王大臣李晟渾瑊等皆祭自發塗日日奠終發引乃止葬靖陵置令丞如他陵臺立廟奏坤元之舞永貞元年改祔崇陵音樂志昭德皇后室酌獻用坤元樂章九首內出迎神用永和穆清廟薦嚴禋昭禮備和樂新望靈光集元辰祚無極享萬春登歌鬯用肅和誠心達娛樂分升蕭膋鬱氛氲茅既縮鬯既薰后來思福如雲迎爼用雍和我將我享盡明而誠載芬黍稷載滌犧牲懿矣元良萬邦以貞心乎愛敬如覩容聲酌獻用坤元於穆先后儷聖稱崇母臨萬宇道被六宫昌時協慶理內成功殷薦明德傳芳國風送文舞出迎武舞入用舒和金枝羽部輟清歌瑶堂肅穆笙磬羅諧音遍響合明意萬類昭融靈應多武舞用凱安辰位列四星帝功參十亂進賢勤內輔扈蹕清多難承天厚載均並曜宵光燦留徽藹前躅萬古披圗煥徹爼用雍和公尸既起享禮載終稱歌進徹盡敬由衷澤流惠下大小咸同送神用永和昭事終幽享餘移月御返仙居璇庭寂靈幄虛顧徘徊感皇儲蕙田案題云九章實止八首蓋闕其一唐書孝明鄭太后傳憲宗孝明皇后鄭氏丹陽人元和初李錡反有相者言后當生天子錡聞納為侍人錡誅沒入掖廷侍懿安后憲宗幸之生宣宗宣宗為光王后為王太妃及即位尊為皇太后懿宗立尊后為太皇太后六年崩移仗西內上諡册葬景陵旁園恭僖王太后傳穆宗恭僖皇后王氏越州人本仕家子幼得侍帝東宫生敬宗長慶時册為妃敬宗立上尊號為皇太后文宗時稱寶歷太后大和五年宰相建白以太皇太后與寶歷太后稱號未辨前代詔令不敢斥言皆以宫為稱今寶歷太后居義安殿宜曰義安太后詔可會昌五年崩有司上諡葬光陵東園禮儀志會昌元年六月制曰朕近因載誕之日展承顔之敬太皇太后謂朕曰天子之孝莫大於丕承人倫之義莫重於嗣續穆宗睿聖文惠孝皇帝厭代已久星霜屢遷禰宫曠合食之禮惟帝深濡露之感宣懿皇太后長慶之際德冠後宫夙表沙麓之祥實荷河洲之範先朝恩禮之厚中壼莫偕况誕我聖君纘承昌運已協華於先帝方延祚於後昆思廣貽謀庶𢎞博愛爰從舊典以慰孝思當以宣懿皇太后祔太廟穆宗睿聖文惠孝皇帝之室率是彛訓其敬承之祇奉慈旨載深感咽宜令宣示中外咸使聞知唐書宣懿韋太后傳穆宗宣懿皇后韋氏失其先世穆宗為太子后得侍生武宗長慶時册為妃武宗立妃已亡追册為皇太后上尊諡有司奏太后陵宜别制號帝乃名所葬園曰福陵既又問宰相葬從光陵與但祔廟孰安奏言神道安於靜光陵因山為固且二十年不可更穿福陵崇築已有所當遂就臣等請奉主祔穆宗廟便帝乃下詔朕因誕日展禮於太皇太后謂朕曰天子之孝莫大於承續今穆宗皇帝虛合享之位而宣懿太后實生嗣君當以祔廟繇是奉后合食穆宗室光啓元年十二月二十五日僖宗再幸寶雞其太廟十一室并祧廟八室及孝明太皇太后等别廟三室等神主緣室法物宗正寺官屬奉之隨駕鄠縣為賊所劫神主法物皆遺失三年二月車駕自興元還京太常博士殷盈孫奏議三太后廟即於少府監取西南屋三間以備三室告饗之所敕旨從之大順元年將行禘祭有司請以三太后神主祔享於太廟三太后者孝明太皇太后鄭氏宣宗之母也恭僖皇太后王氏敬宗之母也貞獻皇太后韋氏文宗之母也三后之崩皆作神主有故不當入太廟當時禮官建議並置别廟每年五享及三年一禘五年一祫皆於本廟行事無神主入太廟之文至是亂離之後舊章散失禮院憑曲臺禮欲以三太后祔享太廟博士殷盈孫獻議非之曰臣謹案三太后憲宗穆宗之后也二帝已祔太廟三后所以立别廟者不可入太廟故也與帝在位皇后别廟不同今有司誤用王彥威曲臺禮禘别廟太后於太廟乖戾之甚臣竊究事體有五不可曲臺禮云别廟皇后禘祫於太廟祔於祖姑之下此乃皇后先崩已造神主夫在帝位如昭成肅明元獻昭德之比昭成肅明之崩也睿宗在位元獻之崩也元宗在位昭德之崩也肅宗在位四后於太廟未有本室故創别廟當為太廟合食之主故禘祫乃奉以入享其神主但題云某諡皇后明其後太廟有本室即當遷祔帝方在位故皇后暫立别廟耳本是太廟合食之祖故禘祫乃升太廟未有位故祔祖姑之下今恭僖貞獻二太后皆穆宗之后恭僖會昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖别立廟其神主直題云皇太后明其終安别廟不入太廟故也貞獻太后大中元年作神主立别廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦别立廟是懿宗祖母故題其主為太皇太后與恭僖貞獻亦同今以别廟太后神主禘祭升享太廟一不可也曲臺禮别廟皇后禘祫於太廟儀注云內常侍奉别廟皇后神主入置於廟庭赤黃褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即須奏云某諡太皇太后且太廟中皇后神主二十一室今忽以皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神何依憑此三不可也古今禮要云舊典周立薑嫄别廟四時祭薦及禘祫於七廟皆祭惟不入太祖廟為别配魏文思甄后明帝母廟及寢依薑嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以别廟太后禘祫於太廟四不可也所以置别廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而况於禘乎竊以為並皆禘於别廟為宜且恭僖貞獻二廟比在朱陽坊禘祫赴太廟皆須備法駕典禮甚重儀衛至多咸通之時纍遇大享耳目相接歲代未遙人皆見聞事可詢訪非敢以臆斷也或曰以三廟故禘祫於别廟或可矣而將來有可疑焉謹案睿宗親盡已祧今昭成肅明二后同在夾室如或後代憲宗穆宗親盡而祧三太后神主其得不入夾室乎若遇禘祫則如之何對曰此又大誤也三后廟若親盡合祧但當閟而不享安得處於夾室禘祫則就别廟行之歷代已來何嘗有别廟神主復入太廟夾室乎禘祫禮之大者無宜錯失宰相孔緯曰博士之言是也昨禮院所奏儀注今已敕下大祭日迫不可遽改且依行之於是遂以三太后祔合太廟達禮者譏其大謬右唐后妃廟五代史唐本紀廢帝清泰二年二月己丑追尊魯國太夫人魏氏為皇太后唐明宗家人傳魏氏鎮州平山人也其子為潞王從珂明宗時從珂已王乃追封魏氏為魯國夫人廢帝即位追尊魏氏為皇太后議建陵寢而太原石敬瑭反乃於京師河南府東立寢宫清泰三年六月丙寅遣工部尚書崔儉奉上皇太后寶册諡曰宣憲右後唐后妃廟宋史太祖本紀建隆三年四月乙巳追册夫人賀氏為皇后禮志建隆三年追册會稽郡夫人賀氏曰孝惠皇后止就陵所置祠殿奉安神主薦常饌不設牙盤祭器太祖孝惠賀皇后傳后開封人右千牛衛率府率景思長女也晉開運初宣祖為太祖聘焉生秦國晉國二公主魏王德昭周顯德五年薨年三十建隆三年四月詔追册為皇后乾德二年三月有司上諡曰孝惠四月葬安陵西北神主享于别廟神宗時與孝章淑德章懷並祔太廟太祖本紀乾德元年十二月甲申皇后王氏崩二年四月乙卯葬孝明皇后于安陵壬申祔二后于别廟禮志乾德元年孝明皇后王氏崩始議置廟及二后先後之次太常博士和峴請共殿别室以孝明正位內朝請居上室孝惠緣改葬不造虞主與孝明同祔宜居次室禮院又言后廟祀事一凖太廟亦當立戟孝明王皇后傳孝明王皇后邠州新平人彰德軍節度饒第三女孝惠崩周顯德五年太祖為殿前都點檢聘后為繼室太祖即位建隆元年八月册為皇后生子女二人皆夭乾德元年十二月崩年二十二有司上諡二年四月葬安陵之北神主享于别廟太平興國二年祔享太廟蕙田案孝惠雖未正位乃元配也别廟乃躋孝明于正室而以孝惠居次室非逆祀而何又案太平興國中以孝明祔太祖室神宗時又以元配孝惠第三后孝章並祔蓋踵真宗以懿德明德元德三后並配之故事也禮志太平興國元年追册越國夫人符氏為懿德皇后尹氏為淑德皇后並祔后廟太宗淑德尹皇后傳太宗淑德尹皇后相州鄴人滁州刺史廷勛之女太宗在周時娶焉早薨及帝即位詔追册為皇后并諡葬孝明陵西北神主享于别廟後升祔太廟懿德符皇后傳懿德符皇后陳州宛邱人魏王彥卿第六女也周顯德中歸太宗建隆初封汝南郡夫人進封楚國夫人太宗封晉王改越國開寶八年薨年三十四葬安陵西北帝即位追册為皇后諡懿德享于别廟至道三年十一月詔有司議太宗配宰相請以后配詔從之奉神主升祔太廟太宗本紀太平興國二年五月己卯祔太祖神主於廟以孝明皇后王氏配又以懿德皇后符氏淑德皇后尹氏袝别廟禮志太祖祔廟有司言合奉一后配食案唐睿宗追諡肅明昭成二后至睿宗崩獨昭成以帝母之重升配肅明止享於儀坤廟近周世宗正惠宣懿二后並先崩正惠無位號宣懿居正位遂以配食今請以孝明王皇后配忌日行香廢務其孝惠皇后享於别廟從之太平興國六年十二月太常禮院言今月二十三日臘享太廟緣孟冬已行時享冬至又嘗親祀案禮每歲五享其禘祫之月即不行時享慮成煩數有爽恭虔今請罷臘日薦享之禮其孝惠别廟即如式從之真宗本紀至道三年二月即皇帝位十一月甲子祔太宗神主于太廟以懿德皇后配禮志至道三年孝章皇后宋氏祔享有司言孝章正位中壼宜居上室懿德追崇后號宜居其次詔孝章殿室居懿德下六月禮官議案太平興國中追册定諡皆以懿德居上淳化初宗正少卿趙安易言别廟祭享懿德在淑德之上未測升降之由其時敕旨依舊懿德在上案江都集禮晉景帝即位夏侯夫人應合追尊散騎常侍任茂傅玄等議云夏侯夫人初歸景帝未有王基之道不及景帝統百揆而亡后妃之化未著逺邇追尊無經義可據今之所議正與此同且淑德配合之初潛躍之符未兆懿德輔佐之始藩郡之位已隆然未嘗正位中宫母臨天下豈可生無尊極之位沒升配享之崇於人情不安於典籍無據唐順宗祔廟後十一年始以莊憲皇后升配憲宗祔廟後二十五年始以懿安皇后升配今請虛位允協舊儀再詔尚書省集議及禮官同詳定上議曰淑德皇后生無位號沒始追崇况在初潛早已薨謝懿德皇后享封大國作配先朝雖不及臨御之期且夙彰賢懿之美若以升祔當歸懿德又詳周世宗正惠宣懿配食故事當時議以正惠追尊位號請以宣懿為配是時以太后在位疑宣懿祔廟之後立忌非便議者引晉哀帝時何太后在上尊所生周氏為太妃封其子為琅琊王及太妃薨帝奔喪琅琊第七月而葬此則奔喪行服尚不厭降即其日廢務於禮無嫌今禮官引唐順憲二宗廟享虛位之文夫既追册二后即虛室亦為未便請奉懿德神主升配又案議者以周世宗神主祔廟必若宣懿同祔即正惠神主請加太字今升祔懿德請即加淑德太字仍舊别廟詔以懿德配享至於太者尊極之稱加於母后施之宗廟禮所未安乃不加太字仍别廟配享孝章宋皇后傳孝章宋皇后河南洛陽人左衛上將軍偓之長女也母漢永寧公主開寶元年二月納入宫為皇后太祖崩號開寶皇后太平興國二年居西宫雍熙四年移居東宫至道元年四月崩年四十四有司上諡三年正月祔葬永昌陵北神主享于别廟神宗時升祔太廟蕙田案孝章祔享乃祔于孝惠賀皇后之别廟也太平興國元年太宗懿德符后已先祔其廟故孝章祔時有司以居室之上次為論但孝章乃太祖之繼后懿德乃太宗之繼室以兄弟之序君臣之分而言俱宜以孝章居乎上室今乃易之亂其序矣真宗本紀至道三年六月乙巳追册莒國夫人潘氏為皇后諡莊懷十一月甲子祔莊懷皇后於别廟真宗章懷潘皇后傳真宗章懷潘皇后大名人忠武軍節度美第八女真宗在韓邸太宗為聘之封莒國夫人端拱二年五月薨年二十二真宗即位追册為皇后諡莊懷葬永昌陵之側陵名保泰神主享于别廟舊制后諡冠以帝諡慶歷中禮官言孝字連太祖諡德字連太宗諡遂改莊為章以連真宗諡云十二月丙申追尊母賢妃李氏為皇太后禮志至道三年十二月追尊賢妃李氏為元德皇太后有司言案禮春官大司樂之職奏夷則歌仲吕以享先妣謂薑嫄也是帝嚳之妃后稷之母特立廟曰閟宫晉簡文宣后以不配食築室於外歲時享祭唐先天元年始祔昭成肅明二后於儀坤廟又玄宗元獻楊后立廟於太廟之西稽於前文咸有明據望令宗正寺於后廟內修奉廟室為殿三間設神門齋房神厨以備薦享真宗本紀咸平元年正月丙寅上皇太后李氏諡曰元德禮志咸平元年判太常禮院李宗訥等言元德皇太后别建廟室淑德皇后亦在别廟同是帝母而無太字案唐穆宗三后除宣懿升祔正獻恭懿二后並立别廟各有太字又開元初太常議昭成皇太后請不除太字云入廟稱后義繫於夫在朝稱太后義繫於子如諡册入陵神主入廟則當去太字案神主入廟之説蓋為祔享太廟以厭降故不加太字則本朝文懿諸后是也如别建廟室不可但稱皇后則唐正獻恭僖二太后是也淑德皇后亦請加太字既加之後望遷就元德新廟居第一室以元德次之仍遷莊懷又次之詔下中書集議兵部尚書張齊賢等奏宗廟神靈務乎安靜况懿德作合之始逮事舅姑躬執婦道祔享之禮宜從後先伏請仍舊又漢因秦制帝母稱皇太后檢詳去歲議狀請加淑德太字而詔不加之者緣當時元德皇太后未行追册今册命已畢望依禮官所言三年四月乙卯祔葬元德皇太后於永熙陵有司言元德神主祔廟準禮當行祔謁載稽前典有未合者伏以追薦尊稱奉加太字崇建别廟以備蒸嘗况當禘祫之時不預合食之列廟享之制與諸后不同俟神主還京即祔廟室薦獻安神更不行祔謁之禮每嵗五享禘祫如太廟儀李賢妃傳李賢妃真定人乾州防禦使英之女也太祖為太宗聘之開寶中封隴西郡君太宗即位進夫人生皇女二人皆早亡次生楚王元佐妃嘗夢日輪逼己以裾承之光耀遍體驚而寤遂生真宗太平興國二年薨年三十四真宗即位追封賢妃又進上尊號為皇太后有司上諡曰元德咸平三年祔葬永熙陵車駕詣普安院攢宫素服行禮拜伏嗚咽神主祔别廟大中祥符三年禮官趙湘請以后祔太宗廟室真宗曰此重事也俟令禮官議之六年秋宰相王旦與羣臣表請后尊號中去太字升祔太廟明德之次從之真宗景德四年帝祀汾陰謁廟畢親詣元德皇太后廟躬謝自門降輦步入酌獻如太廟設登歌兩省御史宗室防禦使以上班廟內餘班廟外遣官分告孝惠諸后廟詔太廟元德皇后廟享用犢諸后廟親享用犢攝事用羊豕樂志皇后廟十五首迎神肅安閟宫翼翼雅樂洋洋牲器肅設几筵用張飭以明備秩其令芳神兮來格風動雲翔太尉行舒安服章觀象山龍是則容止蹌蹌威儀翼翼司徒捧爼豐安徹同恪恭奉祀祗薦犧牲九成爰奏有爼斯盈酌獻孝明皇后室惠安祀事孔明廟室惟肅鉶登籩豆金石絲竹既灌既薦允恭允穆奉神如在以介景福孝惠皇后室奉安初陽作配內助惟賢柔順中積英徽外宣神宫有侐明祀惟虔歆誠降祐於萬斯年孝章皇后室懿女猗那淑聖象應資生配天作合與日齊明椒宫垂範彤史揚名聿修毖祀永奉粢盛懿德皇后室順安王門稟慶帝族惟賢功存內治德協靜専流芳圖史垂範紘綖新廟有侐祀禮昭然淑德皇后室嘉安明明英媛德備椒庭籩豆有踐黍稷匪馨靜嘉致薦容與昭靈精意以達顧享來寧莊穆皇后室理安曾孫襲慶柔祗育德正位居體其儀不忒教被宫壼化行邦國祝史正辭垂裕無極莊懷皇后室永安淑德昭著至樂和平登豆在列膋香薦誠六變合體八音諧聲穰穰景福佑我休明元德皇后廟興安為太宗后為天下母誕聖繼明膺乾作主玉振金相蘭芬桂芳於萬斯年永奉蒸嘗飲福禧安彛尊鬯酒慶佑遂行介以純嘏允答明誠亞獻恭安宗臣率禮步玉鏘鏘吉蠲斯獻百祿是將終獻順安薦獻可終禮容斯穆以奉嘉觴以膺多福送神歸安明禋告畢靈輅難留升雲杳邈整馭優遊誠深嘉栗禮飭斂修豐融垂佑以永洪休景佑以後樂章六首章獻明肅皇太后室奠瓉達安肅肅閟宫順時薦事鬱鬯馨香如見於位酌獻厚安祥標曾麓德合方儀萬邦展養九御蒙慈孝恭祊祏美播聲詩淑靈顧享申錫維祺章懿皇太后室奠瓚報安青金玉瓚祼將于京永懷罔極夙夜齊明酌獻衍安翊佐先朝章明壼教淑順謙勤徽音在劭樹風不止劬勞匪報黍稷含芳嘏兹乃告奉慈廟章惠皇太后室奠瓚翕安祼圭既陳酌鬯斯醇音容倣佛奠獻惟寅酌獻昌安內輔先猷夙昭壼則保祐之勞慈惠其德榮養有終芳風無極享獻閟宫載懷悽惻真宗汾陰禮畢親謝元德皇后室三首迎神肅安閟宫奕奕韶樂洋洋牲幣虔布几筵肅張醴泉淳美嘉肴潔香俟神來格降彼帝鄉奉爼豐安樂鏗金石爼奉犧牲禮成斯奏三教爰行送神理安鸞驂復整鶴駕難留白雲縹眇紫府深幽廟雖載止神無不遊垂佑皇宋以永鴻休元德皇后升祔一首顯安之曲顯矣皇妣德侔柔祗升祔太室協禮之宜耀彼寶册列之尊彛惟誠是厚永佑慶基真宗本紀景德元年三月己酉皇太后崩夏四月甲寅上大行皇太后諡曰明德禮志真宗景德元年有司詳定明德皇太后李氏升祔之禮案唐睿宗昭成肅明二后先天初以昭成配開元末以肅明祔此時儒官名臣步武相接宗廟重事必有據依推之閨門亦可擬議晉驃騎將軍溫嶠有三夫人嶠薨詔問學官陳舒舒謂秦漢之後廢一娶九女之制妻卒更娶無復繼室生既加禮亡不應貶朝旨以李氏卒於嶠之微時不霑贈典王何二氏追加章綬唐太子少傅鄭餘慶將立家廟祖有二夫人禮官韋肅議與舒同略稽禮文參諸故事二夫人並祔於禮為宜恭惟懿德皇后久從升祔雖先後有殊在尊親則一請同列太宗室以先後次之詔尚書省集議咸如禮官之請祔神主於太廟禮志真宗景德三年十月孟冬薦享其月明德皇后園陵有司言故事大祠與國忌日同日者其樂備而不作今請如例從之明德李皇后傳明德李皇后潞州上黨人淄州刺史處耘第二女開寶中太祖為太宗聘為妃既納幣會太祖崩至太平興國三年始入宫雍熙元年十二月詔立為皇后太宗崩真宗即位至道三年四月尊后為皇太后居西宫嘉慶殿咸平二年宰相請别建宫立名從之四年宫成移居之仍上宫名曰萬安景德元年崩年四十五諡明德權殯沙臺三年十月祔葬永熙陵禮官請以懿德明德同祔太宗廟室以先後為次從之蕙田案景德三年既以懿德明德並祔大中祥符六年又祔元德此三后並祔之始真宗本紀景德四年四月辛巳皇后郭氏崩辛亥有司上大行皇后諡曰莊穆六月乙卯葬莊穆皇后秋七月丁卯莊穆皇后祔别廟禮志景德四年奉莊穆皇后郭氏神主謁太廟祔享於昭憲皇后享畢祔别廟殿室在莊懷之上七月以莊穆皇后祔享權停孟享章穆郭皇后傳章穆郭皇后太原人宣徽南院使守文第二女淳化四年真宗在襄邸太宗為聘之封魯國夫人進封秦國真宗嗣位立為皇后景德四年從幸西京還以疾崩年三十二禮官奏皇帝七日釋服特詔增至十三日太常上諡曰莊穆葬永熙陵之西北神主享於别廟仁宗即位升祔真宗廟室改諡章穆五年龍圖閣直學士陳彭年言禘祫日孝惠淑德二后神主自别廟赴太廟祔簡穆皇后神主之下太祖神主之上此蓋用曲臺禮别廟皇后禘祫祔享太廟之説竊慮明靈合享神禮未安望詔禮官再加詳定有司言案曲臺禮載禘祫之儀則如皇后先祔别廟遇禘祫祔享於太廟如是昭后即坐於祖姑之下南間如是穆后即坐於祖姑之下北間又案博士殷盈孫議云别廟皇后禘祫於太廟祔於祖姑之下者此乃皇后先沒已造神主如昭成肅明之沒也睿宗在位元獻之沒也元宗在位昭德之沒也德宗在位四后於太廟未有本室故創别廟當為太廟合食之主故禘祫乃奉以入享此明其後太廟有本室即當遷祔帝方在位故皇后暫立别廟禮本合食故禘祫乃升太廟以未有位故列祖姑之下據開寶通禮與曲臺禮同今有司不達禮意遇禘祫歲尚以孝惠孝章淑德三后神主祔享祖姑之下乃在太祖太宗之上案禮稱婦祔祖姑謂既卒哭之明日此正禮也稱祖姑有三人則祔於親者注元謂舅之母死而又有繼室二人親者謂舅所生然則祖姑有三人同在祖室明婦有數人亦當同在夫之本室不可久祔於祖姑也故開元禮但載肅明皇后别廟時享之儀而無禘祫之禮即知别廟時享及禘祫皆於本廟也孝惠孝章淑德禘祫既祔太廟則自今禘祫祔享本室次於正主庶協典禮真宗本紀大中祥符六年七月己亥中書門下表請元德皇后祔廟庚午行配祔禮十月辛酉元德皇后祔廟玉海大中祥符六年七月有司請奉元德皇后合享曰母貴由於子子孝本於親后稷諸侯故薑嫄異祭於帝嚳開元王者故昭成祔享於睿宗宋史仁宗本紀明道二年三月甲午皇太后崩四月壬寅追尊宸妃李氏為皇太后至是帝始知為宸妃所生癸亥上大行太后諡曰莊獻明肅宸妃李氏皇太后諡曰莊懿八月壬寅作奉慈廟十月己酉祔莊獻明肅太后莊懿太后神主於奉慈廟禮志明道二年判河南府錢惟演請以章獻章懿二后並祔真宗之室太常禮院議夏商來父昭子穆皆有配坐每室一帝一后禮之正儀唐開元中昭成肅明二后始並祔於睿宗今惟演引唐武宗母韋太后升祔穆宗本朝孝明懿德祔太祖故事案穆宗惟韋后祔太祖未嘗以懿德配伏尋先帝以懿德配享太宗及明德園陵禮畢遂得升祔元德太后自追尊後凡十七年始克升祔今章穆皇后著位長秋祔食真宗斯為正禮章獻太后母儀天下與明德例同若從古禮止應祀后廟若便升祔似非先帝慎重之意又况前代無同日並祔之比惟上裁之乃詔有司更議皆謂章穆位崇中壼與懿德有異已祔廟室自協一帝一后之文章獻輔政十年章懿誕育帝躬功德莫與為比退就后廟未厭衆心案周官大司樂職奏夷則歌小吕以享先妣者薑嫄也帝嚳之妃后稷之母特立廟曰閟宫宜别立新廟奉安二太后神主同殿異室歲時薦享用太廟儀别立廟名自為樂曲以崇世享忌前一日不御正殿百官奉慰著之令甲乃作新廟在兩廟間名曰奉慈建廣孝殿奉安章懿皇后章獻明肅皇后傳章獻明肅劉皇后華陽人父通虎捷都指揮使嘉州刺史后通第二女也真宗即位入為美人大中祥符中進德妃自章穆崩真宗欲立為后大臣多不可帝卒立之李宸妃生仁宗后以為己子撫視甚至真宗崩遺詔尊后為皇太后軍國重事權取處分羣臣上尊號御文德殿明道元年冬至復御文德殿明年帝新耕籍田太后亦謁太廟加上尊號是嵗崩年六十五諡曰章獻明肅葬於永定陵之西北舊制皇后皆二諡稱制加四諡自后始於是泰寧軍節度使錢惟演請以章獻章懿與章穆並祔真宗室詔三省與禮院議皆以謂章穆皇后位崇中壼已祔真宗廟室自協一帝一后之文章獻明肅處坤元之尊章懿感日符之貴功德莫與為比謂宜崇建新廟同殿異室歲時薦享一用太廟之儀仍别立廟名以崇世享翰林學士馮元等請以奉慈為名詔依慶歷五年禮院言章獻章懿二后請遵國朝懿德明德元德三后同祔太宗廟室故事遷祔真宗廟詔兩制議翰林學士王堯臣等議請遷二后祔序於章穆之次從之李宸妃杭州人也父仁德終左班殿直初入宫為章獻太后侍兒真宗以為司寢生仁宗封崇陽縣君後為婉儀仁宗即位為順容從守永定陵初仁宗在襁褓章獻以為己子使楊淑妃保視之仁宗即位妃默處先朝嬪御中未嘗自異人畏太后亦無敢言者終太后世仁宗不自知為妃所出也明道元年疾革進位宸妃薨年四十六初章獻太后欲以宫人禮治喪於外丞相吕夷簡奏禮宜從厚太后遽引帝起有頃獨坐簾下召夷簡問曰一宫人死相公云云何歟夷簡曰臣待罪宰相事無內外無不當預太后怒曰相公欲離間吾母子耶夷簡從容對曰陛下不以劉氏為念臣不敢言尚念劉氏則喪禮宜從厚太后悟遽曰宫人李宸妃也且奈何夷簡乃請治喪用一品禮殯洪福院夷簡又謂入內都知羅崇勳曰宸妃當以后服殮用水銀實棺異時勿謂夷簡未嘗道及崇勳如其言後章獻太后崩燕王為仁宗言陛下乃李宸妃所生死以非命仁宗號慟頓毁不視朝纍日下哀痛之詔自責尊宸妃為皇太后諡莊懿幸洪福寺祭告易梓宫親哭視之玉色如生冠服如皇太后以水銀養之故不壞仁宗嘆曰人言其可信哉遇劉氏加厚陪葬永安陵廟曰奉慈又即景靈宫建神御殿曰廣孝慶歷中改諡章懿升祔太廟仁宗本紀景祐四年十一月己卯改上莊穆皇后諡曰章穆莊獻明肅皇太后曰章獻明肅莊懿皇太后曰章懿莊懷皇后曰章懷莊惠皇太后曰章惠庚辰朝享景靈宫辛巳享奉慈廟慶歷元年十一月乙丑享奉慈廟禮志慶歷四年從吕公綽言先帝特諡二后莊懷莊穆及上真宗文明武定帝聖元孝之諡郭后升祔當正徽號宜於郊禮前遣官先上寶册改莊為章止告太廟更不改題遂如故事將郊所司導五后寶册赴三廟各於神門外幄次以待奏告畢皆納於室俄又詔中書門下令禮官考故事升祔章懿神主禮院言章獻章懿宜序章穆之次章惠先朝遺制嘗踐太妃至明道中始加懿號與章懷頗同請序章懷之次太者生事之禮不當施於宗廟章獻以顧託之重臨御之勞欲稱别廟義無所嫌屬之配室禮或未順學士王堯臣等言章獻明肅盛烈丕功非一惠可舉諡告於廟册藏於陵無容追減章惠擁祐帝躬並均顧復故景祐中膺保慶之册義専繫子禮須别祠章穆升祔歲月已深奉慈三室先後已定若再議升降則情有重輕請如舊制中書門下覆議成憲在前文考之意配食一體二慈之宜奉承無私陛下之孝請如禮官及學士議案祥符詔繫章聖特旨位序先後乞聖制定數昭示無窮詔依所議十月文德殿奉安寶册帝服通天冠綘紗𫀆執圭太常奏樂百官宿廟堂次日有司薦享諸廟寅時復詣正衙宰臣行事官贊導册寶至大慶殿庭發册出宣德門攝太尉賈昌朝陳執中受以赴奉慈廟上寶册告遷二主皆塗太字祔於太廟仁宗本紀至和元年正月癸酉貴妃張氏薨丁丑追册為皇后賜諡溫成七月丁卯立溫成園十月丁酉葬溫成皇后丙午溫成皇后神主入廟十一月甲子出太廟禘祫時饗及溫成皇后樂章𨽻於太常禮志至和元年七月有司奉詔立溫成皇后廟樂章祭器數視皇后廟後以諌官言改為祠殿歲時令宫臣薦行常饌張貴妃傳張貴妃河南永安人也祖頴建平令父堯封石州推官卒妃幼無依遂納於章惠皇后宫寢長得幸有盛寵妃巧慧多智數善承迎勢動中外慶歷元年封清河郡君歲中為才人遷修媛皇祐初進貴妃後五年薨年三十一仁宗哀悼之追册為皇后諡溫成禮志嘉祐四年十月仁宗親詣太廟行祫享禮禮官張洞韓維言國朝每遇禘祫奉别廟四后之主合食太廟唐郊祀志載禘祫祝文自獻祖至肅宗所配皆一后惟睿宗二后蓋昭成明皇母也續曲臺禮有别廟皇后合食之文蓋未有本室遇祫享即祔祖姑下所以大順中三太后配列禘祭議者議其非禮臣謂每室既有定配則餘后不當參列議當革正學士孫抃等議春秋傳曰大祫者何合祭也未毁廟之主皆升合食於太祖是以國朝事宗廟百有餘年至祫之日别廟后主皆升合食非無典據大中祥符中已曾定議禮官著酌中之論先帝有恭依之詔他年有司攝事四后皆預今甫欲親祫而四后見黜不亦疑於以禮之煩故耶宗廟之禮至尊至重苟未能盡祖宗之意則莫若守舊禮臣等愚以謂如故便學士歐陽修等曰古者宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則有别廟之祭本朝禘祫乃以别廟之后列於配后之下非惟於古無文於今又四不可淑德太宗之元配列於元德之下章懷真宗之元配列於章懿之下一也升祔之后統以帝樂别廟之后則以本室樂章自隨二也升祔之后同牢而祭牲器祝册亦統於帝别廟之后乃從専享三也升祔之后聨席而坐别廟之后位乃相絶四也章獻章懿在奉慈廟每遇禘祫本廟致享最為得禮若四后各祭於廟則其尊自申而於禮無失以為行之已久重於改作則是失禮之舉無復是正也請從禮官詔四后祫享依舊須大禮畢别加討論元豐三年二月慈聖光獻皇后祔廟前二日告天地社稷太廟皇后廟如故事至日奉神主先詣僖祖室次翼祖室次宣祖室次太祖室次太宗室次太宗與懿德皇后明德皇后同一祝次享元德皇后慈聖光獻皇后異饌位異祝行祔謁禮次真宗室次仁宗室次英宗室禮畢奉神主歸仁宗室神宗本紀元豐六年七月乙卯祔孝惠孝章淑德章懷皇后於廟禮志元豐六年詳定所言案禮夫婦一體故昏則同牢合卺終則同穴祭則同几同祝饌未嘗有異廟者也惟周人以薑嫄為禖神而帝嚳無廟又不可下入子孫之廟乃以别廟而祭故魯頌謂之閟宫周禮謂之先妣可也自漢以來不祔不配者皆援薑嫄為比或以其微或以其繼而已蓋其間有天下者起於側微而其后不及正位中宫或以嘗正位矣有所不幸則當立繼以奉宗廟故有祖姑三人則祔於親者之説立繼之禮其來尚矣始微終顯皆嫡也前娶後繼皆嫡也後世乃以始微後繼置之别廟不得伸同几之義則非禮意恭惟太祖孝惠皇后太宗淑德皇后真宗章懷皇后實皆元妃而孝章則太祖繼后乃皆祭以别廟在禮未安請升祔太廟增四室以時配享七月遂自别廟升祔焉玉海初孝惠孝章淑德章懷四后未入廟元豐六年七月乙卯始祔廟室初議不發册太常博士王古言升祔之重由發册而後顯乃詔升祔比太廟親祀用竹册哲宗本紀元祐八年九月戊寅太皇太后崩己卯詔以太皇太后園陵為山陵十二月己巳上太皇太后諡曰宣仁聖烈皇后禮志皇太后崩三省請奉安神御於治隆殿以遵元祐初詔復以御史劉極之言特建原廟廟成名神御殿曰徽音山殿曰寧真紹聖二年十月癸酉告遷宣仁聖烈太后神御於景靈宫徽音殿甲戌詣宫行奉安禮宣仁聖烈髙皇后傳英宗宣仁聖烈髙皇后亳州蒙城人曾祖瓊祖繼勳皆至節度使母曹氏慈聖光獻姊也后少鞠宫中英宗與后同年既長遂成昏濮邸生神宗治平二年册為皇后神宗立尊為皇太后居寶慈宫元豐八年帝不豫宰執王圭等乞立延安郡王為皇太子太后權同聽政哲宗嗣位尊為太皇太后凡熙寧以來政事弗便者皆次第罷之人以為女中堯舜元祐八年九月屬疾崩年六十二建中靖國元年詔建欽聖憲肅皇后欽慈皇后神御殿於大明殿北名曰柔明尋改欽儀又改坤元又名哲宗神御殿曰觀成尋改重光詔自今景靈宫並分三日朝獻崇寧三年奉安欽成皇后神御坤元殿欽聖憲肅皇后之次欽慈皇后又次之政和三年奉安哲宗神御於重光殿昭懷皇后神御殿成詔名正殿曰柔儀山殿曰靈娭神御殿宣祖昭憲皇后於資福寺慶基殿章獻明肅皇后於慈孝寺章德殿章懿皇后於景靈宫廣孝殿明德章穆二后於普安院重徽殿章惠太后於萬夀觀廣慶殿神宗欽聖憲肅向皇后傳神宗欽聖憲肅向皇后河內人故宰相敏中曾孫也治平三年歸於頴邸封安國夫人神宗即位立為皇后帝不豫后贊宣仁后定建儲之議哲宗立尊為皇太后宣仁命葺慶夀故宫以居后后辭曰安有姑居西而婦處東瀆上下之分不敢徙遂以慶夀後殿為隆祐宫居之帝倉卒晏駕獨決䇿迎端王章惇異議不能沮徽宗立請權同處分軍國事后以長君辭帝泣拜移時乃聽凡紹聖元符以還惇所斥逐賢大夫士稍稍收用之才六月即還政明年正月崩年五十六欽成朱皇后傳欽成朱皇后開封人父崔傑早世母李更嫁朱士安后鞠於所親任氏熙寧初入宫為御侍進才人婕妤生哲宗及蔡王以徐國公主纍進德妃哲宗即位尊為皇太妃時宣仁欽聖二太后皆居尊故稱號未極元祐三年宣仁詔春秋之義母以子貴其尋繹故實務致優隆於是輿蓋仗衛冠服悉侔皇后紹聖中欽聖復命即閣建殿改乘車為輿出入由宣德東門百官上箋稱殿下名所居為聖瑞宫崇寧元年二月薨年五十一追册為皇后上尊諡陪葬永裕陵欽慈陳皇后傳欽慈陳皇后開封人幼頴悟莊重選入掖庭為御侍生徽宗進美人帝崩守陵殿思顧舊恩毁瘠骨立左右進粥藥揮使去曰得早侍先帝願足矣未幾薨年三十二建中靖國元年追册為皇太后上尊諡陪葬永裕陵徽宗本紀政和三年二月辛卯崇恩太后暴崩閏四月辛酉上崇恩太后諡曰昭懷昭懷劉皇后傳昭懷劉皇后初為御侍明艷冠後庭且多才藝由美人婕妤進賢妃生一子二女有盛寵能順意奉兩宫時孟后位中宫后不循列妾禮且隂造竒語以售謗孟后既廢后竟代焉徽宗立册為元符皇后明年尊為太后名宫崇恩帝緣哲宗故曲加恩禮后以是頗干預外事且以不謹聞帝與輔臣議將廢之而后己為左右所逼即簾鈎自㱲而崩年三十五樂志崇恩太后升祔十四首入門顯安俔天生德作配元符儀型壼則輔佐帝圖登崇廟祏勒號璠璵蒸嘗億載皇極之扶神主升殿顯安曰嬪于京天作之配進賢審官克勤其志於穆清廟本仁祖義億萬斯年神靈攸暨迎神興安四章黃鐘宫二奏閟宫有侐堂筵屹崇靈徽匪遐精誠感通苾芬維時登兹明祀泠然靈車有來其馭大吕角二奏羽旌風翔翠蕤飄舉儼其音徽登兹位處笙鏞始奏合止柷敔是享是宜永求伊祜太簇徵二奏枚枚閟宫鼎爼肆陳蒸畀明靈登其嘉新鼓鐘既戒旨酒既醇攸介攸止純禧薦臻應鐘羽二奏旨酒嘉肴于登于豆是享是宜樂既合奏衎我懿德執事溫恭靈兮允格有翼其從罍洗嘉安列爵陳爼芬芳和羮摐金擊石洋洋和聲禮行伊始我德惟明既盥而往於昭斯誠升降殿熙安笙簫紛如陟彼廟庭鏘鏘佩玉懷兹先靈神保聿止音容杳𡨕繁福是介萬年惟寧酌獻兹安雍雍玉佩清酤惟良粢盛具列有飶其香懷其徽範德合無疆於兹燕止降福穰穰亞獻神安嬪於潛邸爰正坤儀關雎化被思齊名垂柔德益茂家邦以熙皇心建崇永羞牲粢退文舞進武舞昭安翩然干戚揚庭陳階文以經緯武以威懷其張其弛節與音諧迄兹獻享妥靈綏來終獻儀安珩璜之貴褘褕之尊天作之合內治慈溫元良鍾慶祉福乾坤以享以祀事亡如存徹豆成安鏘洋純繹於論鼓鐘周旋陟降齋莊肅容維罍既旨維籩伊豐歌徹以雍介福來崇送神興安黍稷維馨虡業充庭既欽既戒靈心是承顧豫蒸嘗言從之邁申錫無疆是用大介徽宗本紀政和三年七月庚子貴妃劉氏薨九月戊戌追册貴妃劉氏為皇后諡曰明達四年七月甲午祔明達皇后神主於别廟禮志政和四年有司言政和元年孟冬祫享奉惠恭神主入太廟祔於祖姑之下今歲當祫而明達皇后神主奉安陵祠緣在城外三代之制未有即陵以為廟者今明達皇后追正典册歲時薦享並同諸后宜就惠恭别廟增建殿室迎奉神主以祔又言明達神主祔謁日於英宗室增設宣仁聖烈皇后明達皇后二位及遍祭七祀配享功臣並别廟祔享惠恭明達二位紹興七年惠恭改諡為顯恭以上徽宗聖文仁德顯孝之諡故也劉貴妃傳劉貴妃由才人七遷至貴妃生濟陽郡王棫祁王模信王榛政和三年秋薨帝大悲惻特加四字諡曰明達懿文又欲踵溫成故事追崇使皇后表請因册贈為后而以明達諡焉髙宗本紀紹興十二年四月皇后邢氏崩訃初至七月丁酉上皇后諡曰懿節祔神主於别廟禮志紹興十二年五月禮部侍即施垌言懿節皇后神主候至卒哭擇日祔廟合依顯恭皇后禮於太廟內修建殿室以為别廟安奉又言將來祔廟其虞主合於本室後瘞埋緣别係行在祔廟欲於本室册寶殿收奉候回京日依别廟故事從之七月有司行九虞之祭奉安髙宗憲節邢皇后傳髙宗憲節邢皇后開封祥符人父焕朝請即髙宗居康邸以婦聘之封嘉國夫人王出使夫人留居蕃衍宅金人犯京師夫人從三宫北遷及即位遙册為皇后紹興九年后崩於五國城年三十四金人祕之髙宗虛中宫以待者十六年顯仁太后回鑾始得崩聞上為輟朝行釋服之祭諡懿節祔主於别廟紹興十二年八月后梓宫至攢於聖獻太后梓宫之西北淳熙末改諡憲節祔髙宗廟紹興十三年初築三殿聖祖居前宣祖至祖宗諸帝居中殿元天大聖后與祖宗諸后居後髙宗本紀紹興二十九年九月庚子皇太后韋氏崩十月戊寅册諡皇太后曰顯仁十一月丙午權攢顯仁皇后於永祐陵十二月甲子祔顯仁皇后神主於太廟韋賢妃傳妃開封人髙宗母也初入宫為侍御崇寧末封平昌郡君大觀初進婕妤纍遷婉容髙宗在康邸出使封賢妃從太上皇北遷建炎改元遙尊為宣和皇后紹興七年徽宗及鄭皇后崩聞至翰林學士朱震請遙尊為皇太后從之豫作慈夀宫命參政王次翁等為奉迎使十二年四月次燕山八月至臨安入居慈寧宫二十九年九月崩諡曰顯仁攢於永佑陵之西祔神主太廟樂志紹興二十九年顯仁皇后祔廟一首酌獻歆安恭惟聖母躋祔孔時陳羞宗祏徼福坤儀鐘鼓惟序牲玉載祗於皇來格永介丕基紹興别廟二首安穆皇后室酌獻歆安祥發俔天符彰夢日有懷慈容孝享廟室泰尊是酌旨酒嘉栗靈其格思祚以元吉安恭皇后室酌獻歆安美詠河洲德嬪媯汭徽音如存肇修已事縮以包茅酌以醴齊靈來顧歆降福攸備禮志紹興三十一年禮部太常言故妃郭氏追册為皇后合依懿節皇后祭於别廟所有廟殿見安懿節皇后神主行禮狹隘乞分為二室以西為上各置戶牖及劈截本廟齋宫權安懿節神主工畢還殿王普又請各置祏室並從之工部侍郎兼太常少卿王普言謹案春秋公羊説曰主藏廟室西壁中以備火災左氏説曰主祏於宗廟言廟有祏室以藏神主漢儀藏主於西牆壁塪中去地六尺一寸蓋塪即祏室也非特備災亦神道尚幽之義然則古者廟必有主主必有祏鄭原繁曰先君桓公命我先人典司宗祏此諸侯廟主之祏也衛孔悝使車反祏於西圃此大夫廟主之祏也開寶通禮别廟時享孝明孝惠皇后享日宫闈令入室開塪奉出神主置於座政和五禮時享别廟儀享日祠祭官贊奉神主宫闈令于祏宫內奉惠恭皇后神主于神幄啓匱設于座至送神樂止祠祭官贊奉神主入祏室宫闈令納神主于匱捧入祏室然則本朝故事别廟后主亦有祏室自藝祖至徽宗未之有改也昨紹興五年祖宗后神主至自溫州始建太廟才為屋五間後稍增至七間皆有殿而無室但置神主并櫝于案上以帳幬之每遇祭享則就案啓櫝而薦獻于前其草創如此十二年祔懿節皇后乃建别廟亦如太廟其草創也十六年新造禮器告成詔增籩豆簠簋之數悉依典禮而太廟殿上迫狹不能容之於是始作新廟凡十三間除東西夾室之外為十一室各開户牖安祏室于西墻略倣京師廟制唯别廟一位祭器不多遂且仍舊以至于今此有司因循之過也兹追册皇后將祔于懿節之次既修别廟分為二室當各置祏室如纍朝故事詔從之孝宗成穆郭皇后傳孝宗成穆郭皇后開封祥符人奉直大夫直卿之女孫其六世祖為章穆皇后外家孝宗為普安郡王時納郭氏封咸寧郡夫人生光宗及莊丈太子愭魏惠憲王愷邵悼肅王恪紹興二十六年薨年三十一追封淑國夫人三十一年用明堂恩贈福國夫人既建太子追封皇太子妃及受禪追册為皇后諡恭懷尋改安穆及營阜陵又改成穆祔孝宗廟孝宗本紀乾道三年六月辛卯皇后夏氏崩七月癸酉權攢安恭皇后於臨安禮志乾道三年閏七月安恭皇后神主祔於别廟為三室成恭夏皇后傳成恭夏皇后宜春人曾祖令吉為吉水簿夏氏初入宫為憲聖太后閣中侍御普安郡王夫人郭氏薨太后以夏氏賜王封齊安郡夫人即位進賢妃踰年奉上皇命立為皇后乾道三年崩諡安恭改諡成恭寧宗本紀開禧三年五月辛卯以太皇太后謝氏有疾赦是日崩八月己巳上大行太皇太后諡曰成肅皇后九月乙酉權攢成肅皇后於阜陵壬寅祔成肅皇后神主於太廟成肅謝皇后傳成肅謝皇后丹陽人被選入宫憲聖太后以賜普安郡王封咸安郡夫人王即位進婉容踰年進貴妃成恭皇后崩中宫虛位淳熙三年上皇諭立貴妃為皇后光宗受禪上尊號壽成皇后孝宗崩尊為皇太后慶元初加號慈惠嘉泰二年加慈佑太皇太后開禧三年崩諡成肅攢祔於永阜陵樂志開禧三年成肅皇后祔廟一首酌獻歆安天合重華內治昭融承承繼繼保佑恩隆歸從阜陵登祔太宫燕我後人福祿來從上册寶十三首册寶入門隆安威儀皇止庶尹在庭爰舉徽章遹觀厥成勒崇揚休寫之瓊瑛迄于萬祀發聞惟馨册寶升殿崇安有猷有言順承天則聿崇號名再揚典册朱英寶函左右翼翼千秋萬歲保兹無極迎神歆安黃鍾宫籩豆大房犧尊將將馨香既登明靈迪嘗其樂伊何吹笙鼓簧靈來燕娭降福無疆大吕角二奏吉蠲惟時禮儀既備奉章峩峩羣公在位神之格思永錫爾類展彼令德於焉來暨大簇徴二奏雍雍在宫翼翼在庭顯相休嘉肅雍和鳴神嗜飲食明德惟馨綏我思成式燕以寧應鍾羽二奏犧牲既成籩豆有楚摐金擊石式歌且舞追懷懿德令聞令儀靈兮來格是享是宜罍洗嘉安嘉肴旨酒潔粢豐盛既盥而往以我齊明有孚顒若黍稷非馨神之格思享於克誠升降熙安佩玉鏘鏘其來雍雍陟降孔時步武有容恪兹祀事神罔時恫綏我邦家福祿來崇酌獻明安旨酒嘉栗有飶其香衎我淑靈歆此令芳德貽彤管號正椒房神具醉止降福穰穰退文舞進武舞昭安籥翟既陳干戚斯揚進旅退旅一弛一張其儀不忒容服有光以宴以樂德音不忘亞終獻和安望髙六宫位應四星輔佐君子警戒相成禕衣福崇琛册追榮于以奠之有椒其馨徹豆成安濯濯其英殖殖其庭有來羣工賚我思成嘉肴既將旨酒既清雍徹不遲福祿來寧送神歆安禮儀既備神保聿歸洋洋在上不可度思神之來兮肹蠁之隨神之去兮休嘉是貽上欽成皇后册寶六首入門升殿顯安上帝錫羡實生婉淑輔佐神皇寵膺天祿誕育泰陵劬勞顧復於昭徽音久而彌郁迎神歆安於顯惟德徽柔懿明嬪于初載有聞惟馨肆我鼓鍾萬舞在庭神保是格來止來寧盥洗嘉安有煒柔儀率履不越惠於初終既明且達我將我享相盥乃登胡臭亶時攸介攸寧升降熙安苾苾其芬殽核其旅陟降孔時有秩斯祜德容內化維神之明明則不渝綏我思成酌獻明安天維顯思有相於內右賢去邪夙夜警戒猗歟追册重翟禕衣既右享之百世是儀亞終獻和安酌彼玉瓚有椒其馨鬷假無言雍容在庭生莫與崇於赫厥聲祀事孔明神格是聽上明達皇后册寶五首迎神歆安恭儉宜家柔順承天德昭彤管憂在進賢寶而禕翟追榮壽原四時祼享何千萬年酌獻明安涓宫有嚴廣樂在庭鍾鼓管磬九變既成縮茅以獻潔秬惟馨靈遊可想來燕來寧退文舞進武舞昭安秉翟竣事萬舞摐金總干揮戚節以鼓音禮容有煒肹蠁來歆淑靈是聽雅奏愔愔徹豆成安登獻罔愆爼豆斯徹神具醉止禮終樂闋御事既退珊珊佩玦介我繁祉歆此蠲潔送神歆安備成熙事虛除翠楹神保聿歸雲車夙征鑒我休德神交惚恍留祉降祥千秋是享仁宗本紀景祐三年十一月戊寅保慶皇太后楊氏崩辛卯上寶慶太后諡曰莊惠四年二月己酉葬莊惠皇后於永定陵己未奉神主於奉慈廟禮志治平元年同判太常寺吕公著言案喪服小記慈母不世祭章惠太后仁宗嘗以母稱故加保慶之號蓋生有慈保之勤故沒有廟享之報今於陛下恩有所止禮難承祀其奉慈廟乞依禮廢罷熙寧二年命太常卿張琰奉章惠太后神主瘞陵園文獻通考神宗即位知諫院楊繪言章惠太后於仁宗有撫養之恩故别祭於奉慈廟今陛下之於仁宗皇帝則孫也乞下有司詳議禮官復申治平之義乃命太常卿奉神主瘞於陵園帝率羣臣詣瓊林苑酌獻以辭遂廢其廟楊淑妃傳楊淑妃益州郫人祖瑫父知儼妃年十二入皇子宫真宗即位拜才人又拜婕妤進婉儀後加淑妃真宗崩遺制以為皇太后始仁宗在乳褓章獻使妃護視凡起居飲食必與之俱所以擁佑扶持恩意勤備後名其所居宫曰保慶稱保慶皇太后景祐三年無疾而薨年五十三殯於皇儀殿帝思其保護之恩令禮官議加服小功初仁宗未有嗣后每勸帝擇宗子近屬而賢者養於宫中其選即英宗也英宗立言者謂禮慈母於子祭於孫止請廢后廟瘞其主園陵英宗弗欲遽也詔下有司議未上會帝崩遂罷蕙田案以上四條係仁宗慈母祔廟享故附於末右宋后妃廟五禮通考卷一百三
