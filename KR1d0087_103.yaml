陳芳薦欵接仙輿飲酒受福永耀鴻圖亞終獻正安邈矣道祖㝠幾惚恍常德不離至真無象引位清穹降祥神壤酌醴薦誠控飇來享送神真安醴醆在戸金奏在庭籩豆有踐黍稷非馨義盡蠲潔誠通杳㝠言旋風駟祚我修齡太極觀奉冊寳一首登安之曲薦號穹㝠登名祖禰陟配陽郊協宣典禮感電靈區誕聖鴻懿冊寳斯陳福祿來暨景靈宫奉冊寳一首登安之曲穆穆真宗錫羡蕃昌飇輪臨貺諄誨洞彰䖍崇懿號祗答景祥至誠致享降福無疆景祐元年親享景靈宫二首降真太安真館奉幣潔齊致馨靈因斯格社稷慶寧送真太安椒漿尊享珍饌精祈睟容杳邈瑶輅霞飛大觀三年朝獻景靈宫二首奉饌吉安威靈洋洋靡有常饗於惟欽承來假來饗博碩芬香是烝是享奉器有䖍載德無爽爾牲既充是烹是肆爾肴既具是羞是饋非物之重唯德之備神之格思歆我精意髙宗郊前朝獻景靈宫二十一首皇帝入門乾安維皇齊居承神其初顒顒昻昻龍歩雲趨景鐘鏗如肅覲清都肸蠁之交神人用孚升殿乾安帝既臨享罄兹精意對越在天爰升紫陛孔容翼翼保承丕緒孝奏天儀永錫爾類降聖太安惟徳馨香升聞八方粤神臨之來從帝鄉萬靈景衞有燁其光監我精神降神穰穰盥洗乾安齊居皇皇瓊琚鏘鏘承祭之初其如在旁挹彼注兹儲禧迎祥神之聽之欣欣樂康聖祖位乾安涓選休辰有事嘉薦琅琅瓊佩陟降巖殿其陟伊何幣玉斯奠周旋中禮千億儲羡聖祖位奉玉幣臨安上靈始祖雲景元尊嚴祀夙展六樂朱軒明玉之潔豐帛之溫暢乃繼序承德不愆還位乾安我后臨享奠幣攸畢式旋其趨榘度其式禮容齊莊孝思純實天休滋至時萬時億奉饌吉安百職駿奔來相於庭奉聖以告登兹芳馨際天蟠地黙運二靈神兮來歆祚我休平再盥洗乾安有嚴大禮對時休明情文則粲蠲潔必清再臨觀盥以專以精真游來格永觀厥成再詣聖祖位乾安於赫炎宋十葉華耀屬兹郊報陟降在廟其降伊何椒漿桂酒再拜斟酌永御九有聖祖位酌獻祖安御製瑶源誕啟玉牒肇榮覆育群言監觀圓清酒醴既洽登薦惟誠無有後艱駿惠雲仍還位乾安奠鬯告成式旋厥位天歩雍容神人燕喜九廟觀德百靈薦祉子孫其昌垂千萬祀文舞退武舞進正安於皇樂舞進旅退旅一弛一張笙磬具舉豈惟翫聲象德是似神鑒孔昭福祿來予亞終獻冲安五音飭奏神既億康澹其容與薦此嘉觴有來顯相鋗玉鏘鏘奉承若宥罔不齊荘飲福報安嘉薦貺終神貺斯復賚我思成靈光下燭孝孫承之載祗載肅敷錫庶民函蒙祉福還位乾安帝臨閟庭逆釐上靈神鴹安坐肅若有承嘉觴既申德聞唯馨靈光留俞祚我億齡徹饌吉安普淖既薦苾芬孔時神嗜而顧有來燕娭饗矣將徹載欽載祗展詩以侑益臻厥熈送真太安雍歌既徹熈事備成神夕奄虞忽乗青冥靈心回睠監我精禋誕降嘉祉休德昭清降殿乾安我秩元祀上推靈源展事有侐侵威肅然丹墄既降秉心益䖍荷天之休于千萬年望燎乾安奕奕靈宫有嚴毖祀燔燎具揚禮儀既備帝心肅祗天歩旋止對越在天永膺蕃祉還大次乾安帝將於郊昭事上祀爰兹畢觴復即于此飇游載旋容旌杳騎唯皇嘉承錫祚昌熾髙宗明堂前朝獻景靈宫十首降聖大安德唯馨香升聞八方粤神之從燦然有光驂飛乗蒼啾啾蹌蹌消摇從容顧予不忘升殿乾安帝既臨享龍馭華耀孝孫承之陟降在廟誠意上交慶陰下冒天休駢至千億克紹聖祖位奠玉幣靈安玉氣如虹豐繒充笥既奉既將亦奠在位有永羣后實相祀事何以臨下心意不貳奉饌吉安瓊琚鏘鏘元衣繡裳薦嘉升香粢盛芬芳禮儀莫愆鼓鐘喤喤曾孫之常綏福無疆聖祖位酌獻祖安裴回若留靈其有喜薦我馨香挹兹酒醴我祖在天執道之紀申佑無疆奏神稱禮文舞退武舞進正安進旅退旅載執干戚不愆於儀容服有赫式妥式侑神保是格靈鑒孔昭孝思惟則亞終獻冲安用舊辭飲福報安於赫大神總司元化監我純精威光來下延昌之貺千億憑藉曾孫保之丕平是迓徹饌吉安洋洋降臨肅肅布列熈事既成嘉籩告徹九天儲慶垂佑無缺寖明寖昌綿綿𤓰瓞送真太安髙飛安翔持御陰陽幽贊圓穹監觀四方元精回復奄虞孔良畢觴降嘏偃蹇于驤望燎乾安奕奕原祠有嚴毖祀禮儀孔宣燔燎斯暨帝心肅祗天歩旋止熈事既成永膺蕃祉孝宗明堂前朝獻景靈宫八首盥洗乾安合宫之享報本奉先欽惟道祖濬發璿源駕言謁欵其盥惟䖍尚監精衷錫祚綿綿聖祖乾安駿命有開慶基無窮祗率百辟仰瞻睟容鼓鐘斯和黍稷斯豐靈其居歆福祿來崇還位乾安嘉玉既設量幣既陳髣髴靈游來顧來寧對越伊何厥惟一純佑缺我熈事迄以成奉饌吉安發祥僊源流澤萬世曷其報之親饗三嵗相維列卿潔粢是饋匪物之尚誠之為至再詣盥洗乾安華燈熒煌瑞烟氤氲威神如在蠲潔必親再盥於罍再帨於巾皇心肅祗其敢憚勤再詣聖祖位乾安歲逢有年月旅無射我將我饗如幾如式肅爾臣工諧爾金石本原休功垂裕罔極還位乾安㫖酒思柔神其醉止工祝既告孝孫旋位何以酢之純嘏来備燕及雲來蕃衍無已文舞退武舞進正安象徳之成有奕其舞一弛一張進旅退旅嘒以管簫和以鏞鼓神其樂康永錫多祜寧宗郊前朝獻景靈宫二十四首皇帝入門乾安閟幄邃深雲景杳冥天清日睟展容玉庭締基發祥希夷降靈神其來燕是饗是聽升殿乾安帝居瑶圖璇題玉京日月經振列宿上榮桂簋飶芬瑚器華晶夤承禋祀用戒昭明降神太安六變圜鐘為宫四靈晨耀五緯夕明風雲晏和天地粹清靈兮來迎靈兮來迎啟我子孫饗于純精黄鐘為角芬枝揚烈熉珠叶陶闓珍闡符展詩舞箾神哉来下神哉來翺肅若有承靈心招摇太簇為徵龍車既奏鳳馭載翔帝幄佇靈天衢騰芳神來留俞神來蹇驤禮鬯樂明奏假孔將姑洗為羽虹旌蜺旄鸞旗翠蓋星樞扶輪月御叶衞靈至陰陰靈般裔裔來格來饗福流萬世盥洗乾安禮文有俶祀事孔明將以潔告允唯齊精自盥而往聿觀厥成靈監下臨天德其清詣聖祖位乾安維宋肖德欽天顧右於皇道祖丕釐靈祐葛藟殖繁𤓰瓞孕茂克昌厥後世世孝奏聖祖位奉玉幣靈安髙宗御製見前皇帝還位乾安桂宫耽耽藻儀穆穆天回衮彩風韶璜玉咸英皦亮容與炳煜假我上靈景命有僕奉饌吉安我簋斯盈我簠斯實或剝或烹或燔或炙有殽既將為爼孔碩禮儀卒度永錫爾極再盥洗乾安觴澹初勺禮戒重盥假廟以萃取象于觀清明外暢精肅中貫我儀圖之三靈攸贊再詣聖祖位乾安肇基駿命鞏右鴻業鼎玉龜符垂固萬葉靈貺具臻神光燁燁暉祚無疆規重矩疊聖祖位酌獻祖安髙宗御製見前還位乾安皇帝瑞慶長發其祥纂系悠逺遡源靈長德之克明休烈有光配天作極孝享是將文舞退武舞進正安持翟成象秉朱就列旄乗整溢鳳儀諧節揮舒皇文歌蹈先烈合好効懽福流有截亞獻冲安光熉紫幄神流玉房秉文侑儀嘉虞貳觴震澹醉喜彷彿廸嘗璇源之休地乆天長終獻冲安靈輿蹇驤畢觴泰筵貳享允穆祼將克竣垂恩儲祉錫羡永年將以慶成燕及皇天詣飲福位乾安若木露英清雲流霞蔓蔓芝秀馮馮桂華綿瑞無疆産嘏孔奢皇則受之鞏我帝家飲福酒報安㫖酒惟蘭勺漿惟椒福流瓚斚光燭琨瑶拜貺清宫凝輝慶霄神其如在徘徊招摇還位乾安烝哉我皇繼天毓聖逆釐元都對越靈慶如天斯乆如日斯盛瑶圖濬邈永隆駿命徹饌吉安房鉶陳列室簋登奉告享具歆展徹惟拱祥光奕奕嘉氣懞懞受嘏不諐燕天之寵送真太安雲車風馬靈其來游天門軼蕩神其莫留遺慶陰陰祉發祥流康我有宋與天匹休降殿乾安璇庭爛景紫殿流光禮洽乾回福應日昌聖系彪鴻景命溥將德茂功成率祀無疆詣望燎位乾安厥初生民淵濬唯祖芳薦既輟明燎具舉德馨升聞靈貺蕃詡懐濡上禋佑周之祜還大次乾安帝假於宫彛承清祀天睴臨幄宸衞森峙行繇太室旋趨紫畤率禮不違式旉靈祉理宗明堂前朝獻景靈宫二首餘用舊辭升殿登歌乾安我享我將罄兹精意陟降左右維天與契齊明乃心祗蕭在位於萬斯年百福來備亞獻宫架冲安慶雲郁郁鳴璆琅琅澹其容與申薦貳觴奉承若宥神其樂康錫以多祉源深流長右宋廟享下五禮通考卷九十三
