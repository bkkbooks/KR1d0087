body:
  text: 五禮通考卷二百九刑部尚書秦蕙田撰嘉禮八十二體國經野顧氏棟高春秋大事表宋都商丘陶唐氏遷閼伯於商丘即此今為河南歸德府之商丘縣初成王既殺武庚命微子啓代殷後國號宋亦曰商昭八年魯搜於紅革車千乘自根牟至于商衛釋例曰商宋一地是也按商丘漢為睢陽縣劉宋為夀春縣隋改曰宋城明置曰商丘縣今城西南有商丘周三百步世稱閼臺蒙澤莊十二年宋萬弒閔公於蒙澤杜注宋地梁國有蒙縣今商丘縣北有蒙澤案高氏謂蒙為宋邑非也下文云遇仇牧于門批而殺之遇太宰督于東宫之西又殺之則蒙澤尚在宫門之內意蒙水之引入宫墻內為遊觀之所亦如齊桓公乘舟於囿之類耳公羊傳云婦人皆在側則此為宫中燕私之地可知逢澤哀十四年宋皇野語向巢迹人來告逢澤有介麋焉杜注地理志言逢澤在滎陽開封縣東北逺疑非正義曰宋都睢陽計去開封四百餘里非輕行可到故杜以逺疑蓋於宋都之旁别有近地名逢澤耳宋邑黃隱元年傳惠公之季年敗宋師于黃杜注宋邑陳留外黃縣東有黃城寰宇記歸德府考城縣西三十六里有黃溝西距外黃城四里即魯惠公敗宋師處郜隱十年辛未取郜杜注濟隂成武東南有郜城案郜有北郜有南郜北郜為郜國桓二年取郜大鼎于宋杜注郜國所造器是也又有南郜為宋邑在北郜城南二里今山東曹州府城武縣東南二十里有郜城亳莊十二年宋萬弒閔公羣公子奔蕭公子御説奔亳杜注宋邑蒙縣西北有亳城在今商邱縣西北案周書立政有三亳阪尹皇甫謐曰蒙為北亳穀熟為南亳偃師為西亳此蓋北亳也湯始興時所居孟子曰湯居亳與葛為鄰亦名薄僖二十一年公會諸侯盟于薄釋宋公哀十四年桓魋請以鞍易薄公不可曰薄宗邑也即此穀熟之亳湯所遷也伊尹曰天誅造攻自牧宫朕載自亳即此今商邱縣東南四十里有穀熟故城偃師之亳湯伐夏時所居也書序湯居亳從先王居孔安國曰契父帝嚳居亳湯自商邱遷焉以二亳俱在商邱境故曰自商邱遷也在今河南府偃師縣城西二十里春秋時係鄭地襄十一年同盟于亳城北即此蕭杜注宋邑沛國蕭縣今江南徐州府蕭縣北十里有蕭城光武封蕭王即此案蕭本宋邑是年蕭叔大心殺南宫牛立桓公有功宋封之以為附庸自是遂為國莊二十三年簫叔朝公穀梁云微國之君未爵命者至宣十二年楚莊王滅蕭然楚雖滅之而不能有還為宋邑襄十年楚子囊鄭子耳伐我西鄙還圍蕭克之定十一年宋公之弟辰入于蕭以叛是仍為宋邑之明證也緡僖二十三年齊侯伐宋圍緡杜注宋邑髙平昌邑縣東南有東緡城古緡國昭四年椒舉曰桀為仍之會有緡叛之即此今在山東兖州府金鄉縣東北三十里彭城成十八年楚鄭伐宋宋魚石復入于彭城杜注宋邑今彭城縣舊為大彭氏國春秋時為宋地項羽都此為西楚霸王時號江陵為南楚陳為東楚彭城為西楚晉立徐州東晉時嘗為重鎮明亦為徐州直𨽻南京今陛府治銅山縣夷庚西鉏吾曰今將崇諸侯之姦而披其地以塞夷庚毒諸侯而懼吳晉杜注吳晉往來之要道案吳晉往來必由彭城襄十年晉悼公會吳于柤遂滅逼陽以豫宋柤為楚地逼陽為楚與國俱在徐州府沛縣與山東兖州府嶧縣南接界亦所以通吳晉往來之道也呂留襄元年楚子辛救鄭侵吕留杜注吕留二縣今屬彭城郡即宋之二邑吕縣漢置泗水至吕城積石為梁故曰吕梁今吕梁城在徐州府治北五十里中河分司駐馬留縣秦置張良遇漢髙於此因封留侯水經注泗水過沛縣東北又東南過留縣北即春秋吕留也今屬徐州府為運道所經犬丘襄元年鄭子然侵宋取犬丘杜注譙國酇縣東北有犬丘城迂廽疑案犬丘池不近鄭故杜以為疑然是時楚方侵宋取吕留鄭蓋為楚取也今歸德府永城縣西北三十里有大丘集與夏邑接界大河經此東北流入碭山境鄼縣漢屬沛郡音嵯非蕭何所封邑雍丘哀九年宋皇瑗取宋師于雍丘杜注雍丘縣陳留案杞封雍丘杞遷東國地屬宋今為開封府杞縣治城鉏哀十一年衛太叔疾奔宋臣向魋納美珠焉與之城鉏杜注宋邑今衛輝府滑縣東十五里有鉏城其後更屬衛哀二十五年衛侯出奔宋適城鉏杜注城鉏衛之近宋邑二十六年衛悼公立以城鉏與越人出公在城鉏以弓問子貢是也戶牖哀十三年會于黃池吳人囚子服景伯而還及户牖歸之杜注户牖陳留外黃縣西北東昏城是今東昏故城在開封府蘭陽縣東北二十里鞍哀十四年向魋請以鞍易薄杜注向魋邑曹向魋入于曹以叛杜注哀八年宋滅曹以為邑曹國即今山東曹州府之曹縣空澤哀二十六年宋景公逰于空澤卒于連中大尹興空澤之士千甲奉公自空桐入杜注宋邑在今歸德府虞城縣東水經注所謂獲水又東南徑空桐澤北是也空桐杜注梁北虞縣東南有地名空桐今虞城縣空桐澤有空桐亭連中杜注館名名勝志連中館在空澤後遺址髙二丈宋地老桃隱十年公會齊侯鄭伯于老桃杜注宋地戰國䇿髙誘注曰任城有桃聚今山東兖州府濟寧州城北有桃鄉城菅公敗宋師于菅杜注宋地當在今山東曹州府單縣北境稷桓二年會于稷以成宋亂杜注宋地當在今歸德府境榖丘桓十二年公會宋公燕人盟于穀丘杜注宋地左傳云句瀆之丘杜注即穀邱也方輿紀要云在今山東曹州府曹縣北三十里虛公會宋公于虛杜注宋地疑在睢州境龜公會宋公于龜杜注宋地疑在睢州境衮桓十五年會于衮伐鄭杜注宋地沛國相縣西南有衮亭今在江南鳳陽府宿州幽莊十六年同盟于幽杜注宋地當在今歸德府考城縣界梁丘莊三十二年齊侯宋公遇于梁丘杜注在髙平昌邑縣西南穀梁傳梁丘在曹邾之間夫齊八百里張氏曰齊不以伯主自居以梁丘近宋而先之也今山東曹州府城武縣東北三十里有梁丘山山南有梁丘城與兖州府金鄉縣接界柳僖元年會于柳杜注宋地陳國陳縣西北有柳城公羊傳作朾左傳作犖今陳州府西北有犖城即柳也貫僖二年齊宋江黃盟于貫杜注宋地梁國蒙縣西北有貰城貰與貫字相似在今山東曹州府曹縣西南十里多魚齊寺人貂始漏師於多魚杜注闕髙氏曰時為貫澤之盟蓋相宋境也當在今歸德府虞城縣界葵丘僖九年會于葵丘杜注宋地陳留外黃縣東有葵丘今在歸德府考城縣東三十里次睢之社僖十九年宋公使邾子用鄫子于次睢之杜杜注睢水次有妖神東夷人皆祀之蓋殺人而用祭後漢志臨沂縣有叢亭博物志縣東界次睢有大叢社民謂之食人社今在山東沂州府治蘭山縣境鹿上僖二十一年宋齊楚盟于鹿上杜注宋邑汝隂有原鹿縣今江南潁州府太和縣西有原鹿城盂僖二十一年宋公楚子盟于孟杜注宋池今歸德府睢州有孟亭承筐文十一年叔仲彭生會晉郤缺于承筐杜注宋地在陳留襄邑縣西今歸德府睢州西三十里有故承筐城長丘文十一年傳初宋武公之世鄋瞞伐宋宋敗之于長丘杜注宋地在今開封府封邱縣南八里即白溝也音轉為翟孟康曰春秋敗翟于長邱今翟溝是新城文十四年公會諸侯及晉趙盾于新城杜注宋地在梁國榖熟縣西今商邱縣西南有新城亭大棘宣二年宋鄭戰于大棘杜注在陳留襄邑縣南今歸德府睢州西曲棘里有棘城又寧陵縣西南七里有大棘城亦與睢相近水經注云後其地為楚莊所併大棘有楚太子建墳伍員釣臺沙隨成十六年會于沙隨杜注宋地梁國寧陵縣北有沙隨亭今沙隨城在歸德府寧陵縣西六里汋陵成十六年鄭子罕伐宋敗宋師于汋陵杜注宋地今歸德府寧陵縣南二十五里有汋陵城朝郟成十八年鄭會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽邱杜注宋地當在今歸德府夏邑縣界城郜杜注宋地當在今江南徐州府蕭縣界幽邱杜注宋地當在蕭縣界靡角之谷成十八年晉侯遇楚師于靡角之谷杜注宋地案彭城之役晉楚遇于靡角之谷晉將遁矣用雍子謀楚師宵潰晉降彭城而歸諸宋則靡角之谷當為近彭城地虛朾諸侯同盟于虛朾杜注闕或云即宋之虛也訾母襄十年楚伐宋師于訾母杜注宋地當在歸德府鹿邑縣境楊梁襄十二年楚子囊秦庶長無地伐宋師于楊梁杜注梁國睢陽縣東有地名楊梁今在歸德府城東南三十里合襄十七年合左師彭城古迹志徐州沛縣有合鄉近志合鄉在嶧縣西北晉滅逼陽以封向戍是就其初封益之也二縣本接壤鬼閻昭二十年宋八公子之徒與華氏戰于鬼閻杜注潁川長平縣西北有閻亭今陳州府西華縣東北閻倉城是也鴻口昭二十一年齊師宋師敗吳師于鴻口杜注梁國睢陽縣東有鴻口亭今在歸德府商邱虞城二縣界赭丘與華氏戰于赭丘杜注宋地後漢志陳國長平縣有赭邱舊城在今陳州府西北境曲棘昭二十五年宋公卒于曲棘杜注宋地陳留外黃縣城中有曲棘里當在今開封府杞縣境老丘定十五年鄭罕逹敗宋師于老丘杜注宋地今聞封府陳留縣東北四十五里有老丘城蕖蒢鄭伐宋齊侯衛侯次于蕖蒢杜注宋地今無考宋山川案宋都商丘係河南之歸德府合境無山宋又兼彭城彭城為今徐州府之銅山縣現今有山而不見于左傳故宋之山險無可考泓水僖二十二年宋楚戰于泓杜注泓水名寰宇記鄢城北里許有泓水即宋楚戰處鄢城在今河南歸德府柘城縣北三十里孟諸僖二十八年楚子玉為瓊升玉纓夢河神謂已曰畀余余賜女孟諸之麋杜注孟諸宋藪澤水草之交曰麋今歸德府治東北有孟諸澤接虞城縣界周禮謂之望諸爾雅十藪宋有望諸是也又虞城縣北有孟諸臺俗謂之湄臺即杜預所謂水草之交曰麋矣鄭都新鄭今為河南許州府之新鄭縣初宣王封弟桓公友于鄭居咸林為今陜西同州府之華州幽王時桓公寄帑于虢檜子武公與平王東遷卒定其地號曰新鄭以别于初封之鄭故城在今縣治西北櫟為鄭别都桓十五年鄭伯突入于櫟杜注鄭别都河南陽翟縣今為許州府禹州李氏曰春秋書突入櫟而不書其入鄭所以著強都之害如書晉滅下陽之義櫟後屬楚髙氏成十七年衛北宫括侵鄭至于髙氏杜注在陽翟縣西南即今禹州上棘襄十八年楚伐鄭右師城上棘遂涉潁次于旃然杜注將涉潁故于水邊欋築小城以為進退之備郡縣志陽翟有上棘城今在禹州南鄭邑鄢隱元年鄭伯克段于鄢杜注今潁川鄢陵縣成十六年晉楚戰于鄢陵即此在今河南開封府鄢陵縣西南四十里制制巖邑也杜注鄭邑今河南成臯縣一名虎牢故城在今開封府汜水縣西京請京使居之杜注鄭邑今滎陽京縣在今開封府滎陽縣東南二十里祭祭仲杜注陳留長垣縣東北有祭城髙氏曰人但知長垣近衛鄭不能有因不取杜説而括地志遂以管城之祭為祭仲邑或人疑為周祭伯之采地鄭并之以封仲非也祭伯祭仲同見于隱元年至莊二十三年尚有祭叔來聘鄭安得取以封仲乎列國錯壤甚多祭仲省留取道于宋而被執則留亦錯入宋境矣長垣之旁有滑鄭衛日爭之然則長垣亦鄭衛相接之地耳今長垣縣屬北直大名府南至開封府蘭陽縣九十里廪延至于廪延杜注鄭邑陳留酸棗縣北有延津一名酸棗襄三十年遊吉齊晉駟帶追之及酸棗即此故城在今衛輝府延津縣北十五里潁谷潁考叔為潁谷封人孔穎建曰鄭邊邑水經注潁水出陽城陽乾山之潁谷在今河南府登封縣長葛隱五年宋人伐鄭圍長葛杜注潁川長社縣北有長葛城在今許州府長葛縣北十二里牛首桓十四年宋以諸侯伐鄭伐東郊取牛首杜注鄭邑今開封府陳留縣西南十一里有牛首城新城僖六年伐鄭闈新城杜注鄭新密滎陽密縣今許州府密縣東南三十里有故密城汜水僖二十四年王適鄭處于汜杜注鄭南汜也在襄城縣南襄城今屬許州府鄶城僖三十三年公子瑕葬鄫城之下杜注故鄶國在滎陽密縣東北案鄭取鄫不居其都故别有鄶城今在許州府密縣東北五十里管宣十二年晉師救鄭楚子次于管以德之杜注滎陽京縣東北有管城在今開封府鄭州北二里即管叔鮮所封國管除屬檜檜成屬鄭鄤成三年諸侯伐鄭鄭公子偃使東鄙覆諸鄤路史曰春秋鄭邑商武丁封季父于河北曼曰曼侯優鄧其出也汜祭成四年晉伐鄭取汜祭吳氏曰此為二邑汜即成臯之汜祭即中牟之祭亭今俱屬開封府虛滑成十七年鄭子駟侵晉虛滑杜注晉二邑滑故滑國為秦所滅時屬晉案成十三年吕相絶秦曰殄滅我費滑孔疏滑即費春秋更無費國蓋國邑並舉也自後更歷晉歷鄭歷周秦滅之而不能有為晉得然其地近鄭在所必爭是年所以侵晉虛滑也時蓋屬晉襄十八年楚公子格帥師侵鄭費滑胥靡此時滑又屬鄭至定六年鄭伐周馮滑胥靡此時滑人屬周鄭之始終不忘情于滑可知矣周人又謂之侯氏今緱氏故城在今河南府偃師縣南二十里梧襄十年晉師城梧及制杜注鄭舊地嚴氏啓隆曰梧與制皆虎牢之旁邑城之所以翼虎牢案隋書滎陽縣有梧桐澗疑即梧也制即北制杜注鄭邑河南成臯縣在今開封府鄭州之北舊許襄十一年諸侯伐鄭東侵舊許杜注許之舊國鄭新邑案成十五年許遷于葉則許舊地為鄭所有故謂之舊許故許城在今許州府東三十里胥靡襄十八年楚薳子馮帥師侵費滑胥靡獻于雍梁杜注鄭邑獻于杜注鄭邑雍梁杜注鄭邑河南陽翟縣東北有雍城襄三十年伯有奔雍梁即此在今許州府禹州東北宛襄二十四年晉求御于鄭鄭人卜宛射犬吉水經注潩水自長社故城徑皇臺又東南徑宛亭即鄭大夫宛射犬之食邑城麇襄二十六年楚侵鄭至于城麇杜注鄭邑犨昭元年是城犨櫟郟杜注犨縣屬南陽本鄭邑此時已入楚史記沛公與秦南陽守莊齕戰于犨東即此今汝州魯山縣東南有犨縣故城郟杜注郟縣屬襄城本鄭邑此時已入楚二世元年陳勝將鄧龍居郟章邯破之即此今為汝州郟縣彌作六邑哀十二年宋鄭之間有隙地馬曰彌作頃邱玉暢嵒戈錫子産與宋人為成曰勿有是杜注凡六邑玉暢今開封府杞縣東北三十里有玉帳或云古玉暢案杞縣為春秋宋地北與陳留接壤傳曰宋鄭之間或即是也戈故夏國即豷所封杜注戈在宋鄭之間故知即是邑矣錫路史商末錫疇子斯其先為御姓國在宋鄭之間鄭滅之以處宋元公之孫即錫邑也餘未詳鄭地城潁遂置薑氏于城潁杜注鄭地孔潁達曰即臨潁縣也故城在今許州府臨潁縣西北十五里時來隱十一年公會鄭伯于時來杜注鄭地滎陽縣東有釐城在今開封府祥符縣東四十里狐壤隱十一年傳公與鄭人戰于狐壤且馬杜注鄭地後漢志潁隂縣有狐宗鄉疑即此武父桓十三年公會鄭伯盟于武父杜注鄭地陳留濟陽縣東北有武父城水經注濟陽縣故武父城也今在直𨽻大名府東明縣西南與河南開封府蘭陽縣接界滑莊三年公次于滑杜注鄭地在陳留襄邑縣北案後漢志襄邑有滑此杜氏所本也今歸德府睢州有滑亭大陵莊十四年鄭厲公自櫟侵鄭及大陵獲傳瑕杜注鄭地京相璠曰潁川臨潁縣東北有故巨陵亭古大陵也在今許州府臨潁縣北三十里弭莊二十一年鄭虢胥命于弭杜注鄭地近西鄙在今許州府密縣境扈莊二十三年盟于扈杜注鄭地在滎陽卷縣西北後漢志卷縣有扈城亭今原武縣西北扈亭是也原武向屬開封府今改屬懷慶府桐丘莊二十八年鄭人將奔桐丘杜注許昌東北有桐丘城今陳州府扶溝縣西二十里有桐丘亭即此柯澤僖二十二年鄭丈夫人勞楚子于柯澤杜注鄭地襄十四年衛孫氏敗公徒于阿澤水經注作柯澤此在東阿非鄭之柯澤也踐土僖二十八年晉文公還至衡雍作王宫于踐土杜注鄭地括地志滎澤縣西北十五里有王宫城城內東北隅有踐上臺去衡雍三十餘里滎澤今屬開封府衡雍杜注鄭地今滎陽卷縣今懷慶府原武縣西北五里有衡雍城即衡雍也汜南僖三十年晉秦圍鄭晉軍函陵秦軍汜南杜注此東汜也在滎陽中牟縣南中牟今屬開封府函陵見山川垂隴文二年盟于垂隴杜注鄭地滎陽縣東有隴城今在開封府滎澤縣東北匡文元年衛孔達侵鄭取綿訾及匡杜注匡在潁川新汲縣東北本衛地中屬鄭今陳州府扶溝縣西有匡城定六年公侵鄭取匡此鄭國之匡也在今開封府洧川縣東南申文八年晉致鄭公壻池之封自申及虎牢之境杜注鄭地當在今開封府汜水縣界棐文十三年鄭伯會公于棐即棐林宣元年諸侯會晉師于棐林杜注鄭地滎陽宛陵縣東南有林鄉今開封府新鄭縣東二十五里林鄉城是其地也北林宣元年諸侯伐鄭楚蒍賈救之遇于北林杜注鄭地滎陽中牟縣西南有林亭在鄭北今屬開封府邲宣十二年晉楚戰于邲杜注鄭地今開封府鄭州東六里有邲城郔楚子北師次于郔杜注鄭北地或云即廪延蟲牢成五年同盟于蟲牢杜注鄭地陳留封邱縣北有桐牢亭在開封府封邱縣北三里繞角成六年晉欒書救鄭與楚師遇于繞角杜注鄭地杜佑通典汝州魯山縣東南有繞角城修澤成十年鄭于然與晉盟于修澤杜注滎陽卷縣東有修武亭今在懷慶府原武縣北訾成十三年鄭公子班自訾求入于大宫杜注鄭地髙氏曰此即周之訾在河南府鞏縣西南鳴雁成十六年晉侯伐鄭至于鳴雁杜注在陳留雍邱縣西北今開封府杞縣北四十里有白雁亭督揚成十六年諸侯伐鄭我師次于督揚不敢過鄭杜注鄭東地案襄十九年諸侯自沂上盟于督揚杜以督揚即祝阿係齊地在今山東濟南府長清縣北與此不同制田諸侯遷于制田杜注滎陽宛陵縣東有制澤在今開封府新鄭縣東北戲童成十七年諸侯伐鄭自戲童至于曲洧水經注汜水出浮戲之山在今開封府汜水縣南四十里襄九年諸侯盟于戲即此曲洧杜注今新汲縣治曲洧城臨洧水在今開封府洧川縣南柯陵成十七年同盟于柯陵杜注鄭西地汝上楚師于汝上汝水出汝州魯山縣蓋鄭楚之界鄫襄元年諸侯之師次于鄫杜注鄭地在陳留襄邑縣東南襄邑今為歸德府睢州城棣襄五年諸侯會于城棣以救陳杜注鄭地陳留酸棗縣西南有棣城寰宇記有南棣城北棣城在陽武北十里二棣城之間有博浪沙亭即子房擊始皇處陽武縣今屬開封府鄬襄七年會于鄬以救陳杜注鄭地鄵鄭伯卒于鄵杜注鄭地隂坂襄九年諸侯濟于隂坂次于隂口而還杜注隂坂洧水津隂口鄭地名在今開封府洧川縣北陽陵襄十年諸侯伐鄭至于陽陵杜注鄭地在今許州府西北瑣襄十一年諸侯次于瑣闈鄭觀兵于南門杜注滎陽宛陵縣西有瑣侯亭在今許州府新鄭縣北向襄十一年諸侯會于北林杜注鄭地十四年會吳于向即此今開封府尉氏縣西南四十里有向城亳城同盟于亳城北杜注鄭地當在今河南府偃師縣西二十里蕭魚會于蕭魚杜注鄭地斗城襄三十年子産葬伯有于斗城杜注鄭地今開封府陳留縣南二十五里有斗城搜氏昭五年鄭伯勞屈生于搜氏杜注鄭地寰宇記搜氏城在開封府尉氏縣西北四十里索氏鄭勞韓宣子于索氏杜注河南成阜縣東有大索城今開封府滎陽縣東北三十里有京城大索城在京城西二十里其東北四十里為小索城楚漢戰于京索間即此圉韓宣子自楚反鄭伯勞諸圉杜注云鄭地陳留風俗傳曰圉故陳地鄭取之苦楚之難修干戈以虞患故曰闈在今開封府杞縣南五十里柤昭六年鄭伯勞楚公子棄疾于柤杜注鄭地襄十一年會吳于柤此係楚地蓋有二柤臯鼬定四年盟于臯鼬鄭氏曰鄭地成臯也杜注繁昌縣東南有城臯亭今在許州府臨潁縣鄭山川敖山宣十二年戰邲傳晉師在放鄗之間杜注二山在滎陽西北敖山在今河南鄭州河隂縣西二十里晉為滎陽縣地唐開元二十年始析置河隂縣周宣王狩于敖即此秦于其地臨河置倉名曰敖倉北臨汴水所謂敖倉之粟是也梅山襄十八年楚師伐鄭右回梅山侵鄭東北杜注梅山在滎陽密縣東北今河南開封府鄭州西南三十里有梅山路史云梅伯爵紂所滅河南密縣有梅山武王封伯元孫于黃梅在楚鄭之間子孫以梅為氏魚陵襄十八年楚師伐鄭次于魚陵杜注魚陵魚齒山下在南陽犨縣北魚齒山在今河南汝州東南五十里子庚門于純門涉于魚齒之下以山下有滍水故言涉水經注湛水源于魚齒山函陵僖三十年晉秦圍鄭晉軍函陵函陵在今河南許州府新鄭縣北十三里洧水流徑其北山形如函故名函陵河今河南原武縣西北大河即晉師敗而濟河楚莊王祀河告成處原武縣向屬開封府今屬懷慶府係鄭地又廪延即今延津縣水經曰河水又東北流通謂之延津廪延之津也濟水襄十一年諸侯闈鄭觀兵于南門西濟于濟隧水經注濟水伏流自河而出隂溝上源濟隧絶焉世謂之十字溝京相璠曰滎澤在滎陽東南與濟隧合邲宣十三年晉楚戰于邲今河南開封府鄭州東六里有邲城亦為邲水即今之汴河濟水于此又兼名邲即晉楚戰處明季為河所奪今湮潁水宣十年晉士會逐楚師于潁北杜注潁水出河南陽城至下蔡入淮水經注潁水出潁川陽城縣西北少室山又東南過陽翟縣北陽翟今禹州潁北當在禹州之北成十五年諸侯師于潁上襄十年晉師與楚夾潁而軍鄭人宵涉潁與楚盟亦禹州之潁也汝水成十七年楚師于汝上汝水出河南汝州魯山縣東北經伊陽至汝州南又東南經寶郟南入南陽之裕州歷許州府之襄城郾城襄城郾城皆鄭地成十六年楚以汝潁之田求成于鄭汝水蓋在鄭楚之界洧水襄元年晉伐鄭敗其徒兵于洧上杜注洧水出密縣東南洧水出許州府密縣馬嶺山又東過新鄭縣南即晉敗鄭徒兵處又昭十九年龍鬬于時門之外洧淵蓋古鄭城在今新鄭縣治西北溱水在北洧水在南亦鄭環衛國都之水也旃然水襄十八年楚師入潁水于旃然杜注旃然水出滎陽成臯縣東入汴旃然水即索水在今開封府滎陽縣南三十五里北流入京水後唐同光二年詔蔡州刺史米勍濬索水通漕宋人每濬京索二水以為金水河之源即此水也黃水襄二十八年公如楚伯有勞于黃崖杜注宛丘西有黃水西南至新鄭城西入洧今許州府新鄭縣東南二十里有黃水滎澤宣十二年楚潘黨逐之及滎澤禹貢濟水入于河溢為滎孔傳濟水入河並流十數里而南截河又並流十數里溢為滎澤自王莽時濟水但入河不復過河滎澤已枯鄭元曰自平帝以後滎澤塞為平地隋于其地置廣武縣尋改滎澤縣屬開封府古滎澤在今縣治南棘澤襄二十四年次于棘澤棘澤在今開封府新鄭縣東南水經注龍淵水出長社縣又東南徑棘城北即傳之棘澤也又東左注洧圃田澤僖三十三年皇武子曰鄭之有原圃杜注原圃即圃田圃田澤在今開封府中牟縣西北七里周禮豫州藪曰圃田爾雅十藪鄭有圃田澤多産麻黃詩所謂東有甫草也東西五十里南北二十六里髙者可田窪者成匯今為澤者八若東澤西澤之類為陂者二十六若大灰小灰之類其實一圃田澤耳狼淵文九年楚子師于狼淵以伐鄭杜注潁川潁隂縣西有狼陂寰宇記謂之狼溝潁隂今屬河南許州府萑苻之澤昭二十年鄭多盜取人于萑苻之澤杜注澤名此即中牟之圃田澤南汜水僖二十四年王適鄭處于汜杜注鄭南汜也在襄城縣南在今許州府襄城縣南京相璠曰南汜水出襄城縣浮城山至鄭州汜水縣入河以周襄王出居于此故名襄城成七年楚子重伐鄭師于汜襄二十六年楚伐鄭涉于汜昭五年楚令尹子蕩如晉逆女過鄭鄭伯勞諸泛皆此汜也東汜水僖三十年晉秦國鄭秦軍汜南杜注此東汜也在滎陽中牟縣南在今開封府中牟縣南入官渡水今涸秦軍汜南在此水之南又襄九年昔會諸侯伐鄭師于泛亦在此陳都宛丘今為河南陳州府治孔潁達曰樂記武王克殷未及下車封黃帝之後于薊帝堯之後于祝帝舜之後于陳左傳所謂以備三恪者也鄭玄以薊祝陳為三恪杞宋為二王之後杜氏以陳杞宋為三恪鄭説為優虞閼父為周陶正其子曰胡公滿武王配以元女大姬而封諸陳今府城南三里有宛丘髙二文又城內東北隅有池即詩所謂東門之池也夏封舜後曰虞今為河南歸德府虞城縣杜注梁國有虞縣案堯典殯于虞虞在河東大陽縣西山上有虞城今為山西解州平陸縣舜因以為有天下之號周與封仲雍之後為虞國正是其地而禹受舜禪封商均于虞却在梁國虞縣虞思妻少康以二姚而邑諸綸是其後也今縣西二十五里有綸城即夏時綸邑周武王封陳時虞絶封已久殷封舜後曰遂今山東兖州府寧陽縣西北十里有遂鄉杜氏以為殷所封昭八年傳舜重之以明德置德于遂遂世守之及胡公不淫故周賜之姓使祀虞帝杜注殷之興存舜之後而封遂胡公滿遂之後武王賜姓曰媯封諸陳蓋胡公自以選建明德而封遂本國能世守至周時尚存特微不克振耳莊十三年為齊桓公所滅春秋齊人殱于遂是也陳邑焦夷僖二十三年楚伐陳取焦夷杜注陳邑譙縣也襄元年晉以諸侯之師伐陳遂侵楚焦夷蓋其時已屬楚矣秦為譙縣史記葛嬰攻譙下之曹操譙縣人于譙東五十里築精舍往往治兵于此以擊孫權曹丕改建五都譙其一也至後周始改為亳今為江南潁州府亳州治通典乃云亳州理譙縣周武王封神農之後於焦即其地案周本紀注地理志𢎞農陜縣有焦城古焦國為晉所滅所謂許君焦瑕朝濟而夕設版者也與亳州之譙無預夷見楚地即城父壺丘文九年楚侵陳克壺丘杜注陳邑在今陳州府南境鳴鹿成十六年知武子以諸侯之師侵陳至于鳴鹿杜注陳國武平縣西南有鹿邑今河南歸德府鹿邑縣西十三里有古鹿邑城陳地厥貉杜注地闕當在今陳州府項城縣界辰陵宣十一年楚子陳侯鄭伯盟于辰陵杜注陳地潁川長平縣東南有辰亭今陳州西南四十里有辰陵亭故長平城在府西北四十里大冥哀六年吳伐陳楚昭王救陳攻大冥卒于城父杜注陳地吳師所在當在今陳州府項城縣境濮隱四年衛人殺州吁于濮杜注陳地水名在今陳州府北境即濮水蔡都上蔡今為河南汝寧府上蔡縣左傳蔡仲封淮汝之間今縣西南十里有古蔡國城遷新蔡為今汝寧府新蔡縣昭十一年楚滅蔡使公子棄疾為蔡公十二年平王立復蔡封于是隱太子之子廬歸于蔡是為平侯漢地理志新蔡縣蔡平侯徙此當在此時也其事不見經傳惟杜氏釋例嘗言之又遷州來今為江南鳳陽府夀州哀元年楚子圍蔡使蔡疆于江汝之問而還蔡請遷于吳後中悔二年吳泄庸如蔡聘因襲之蔡侯哭而遷墓冬蔡遷于州來謂之下蔡在淮水之北與壽春夾淮為固今州北三十里有下蔡城蔡邑陽昭十九年楚子在蔡陽封人之女奔之生太子建杜注蔡邑在今汝寧府新蔡縣境蔡地莘莊十年荆敗蔡師于莘杜注蔡地在今汝寧府汝陽縣境桑隧成六年晉師侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧杜注汝南朗陵縣東有桑里在上蔡東南朗陵漢縣在今汝寧府確山縣西南三十里又縣東有桑里亭曹都陶丘今為山東曹州府曹縣鄭氏曰曹在濟隂定陶去王城八百里在畿外故稱甸服詩譜云在雷夏菏澤之野夾于魯衛通釋云濟隂曹北三十七里即定陶故城曹所都宋濟隂縣在今曹縣西南六十里曹邑重丘襄十七年衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詢之衛伐曹取重丘杜注曹地寰宇記重丘在乘氏縣東北三十一里漢乘氏故城在今曹州府曹縣東北五十里又襄二十五年同盟于重丘杜注齊地在今東昌府城東南跨茌平縣界漢置重丘縣杜氏明注兩國乃方輿紀要混而一之謂東昌府之重丘為曹北境之邊邑同盟于重丘即衛所取者似誤鄸昭二十年曹公孫會自鄸出奔宋杜注曹邑寰宇記濟隂乘氏縣西北有大饗城曹之鄸邑也一作大鄉在今曹州府曹縣北郊定十一年衛公孟彄伐曹克郊杜注曹邑在今曹州府菏澤縣界黍丘哀七年宋人伐曹築五邑于其郊曰黍丘揖邱大城鍾邗杜注梁國下邑縣有黍丘亭案下邑即今之夏邑也屬河南歸德府黍丘亭在縣西南揖邱當在今曹縣界大城當在今府治菏澤縣界鍾當在今曹州府定陶縣界邗當在今定陶縣界曹地洮僖八年齊桓公盟諸侯于洮杜注曹地僖三十一年晉文公分曹地自洮以南東傅于濟即此今曹州府濮州西南五十里有洮城曹南僖十九年宋人曹人邾人盟于曹南范氏曰曹南曹之南鄙今曹縣東南八十里有曹南山曹山川曹南山僖十九年宋公曹人邾人盟于曹南詩曹風薈兮蔚兮南山朝隮毛傳云南山曹南山也今曹縣南八十里有曹南山范氏謂曹之南鄙是也孔疏以會于曹南謂在曹之都者非是濟水僖三十一年分曹地自洮以南東傅于濟杜注濟水自滎陽東過魯之西禹貢濟水東出于陶邱北鄭氏曰曹在濟隂定陶是在濟水之南其地夾于魯衛之間曹在衛東魯更在曹東故在曹則曰東傅于濟而杜注則曰濟水過魯之西也曹魯分境之濟在巨野夀良須昌之間巨野縣今分屬曹州府夀良即今兖州府夀張縣須昌在泰安府東平州今曹州府治即古曹國與魯之東鄆巨野相接所爭濟西田蓋在此許都許今為河南許州府治石梁縣隱十一年公及齊侯鄭伯入許鄭莊公使許叔居許西偏莊公卒鄭亂許叔乃復入于許後屢受兵于鄭遂遷楚境鄭因有其地謂之舊許今府治東三十里有故許城遷于葉今為河南南陽府葉縣成十五年許畏鄭請遷于楚楚遷許于葉襄二十六年許靈公如楚請伐鄭既而卒于楚楚為之伐鄭而後葬許靈公蓋許雖遷猶在方城之外鄭患未巳昭四年楚欲遷許于賴卒不行至昭九年遷許于夷葉仍入楚十一年靈王滅蔡遷六小國于荆山許亦與焉十三年平王復封陳蔡許亦復居于葉十八年楚王子勝曰葉在楚方城外之蔽也土不可易楚子乃遷許于析葉復入楚以封葉公今縣治東有古葉城又遷于夷今為江南潁州府亳州昭九年楚公子棄疾遷許于夷實城父今州東南七十里有城父城又遷于白羽今為河南南陽府內鄉縣昭十八年楚使王子勝遷于析實白羽杜注自葉遷也又遷于容城在今南陽府葉縣西應劭以漢華容縣為許所遷之容城非也定四年許遷于容城後二年鄭即滅許傳云因楚敗也漢華容為今荆州府監利縣在郢都之側鄭豈能至此又哀元年許復從楚圍蔡似未嘗滅或云楚復封之則不可考其何地矣許邑鉏任冷敦成四年鄭伯伐許取鉏任冷敦之田俱在今許州府治境許地展陂成四年鄭公孫中帥師疆許田許人敗諸展陂杜注許地在今許州府治西北棫林襄十六年晉伐許次于棫林杜注許地案此許即葉也昭九年遷許于夷遷方城外于許杜注遷許于葉因謂之許是也棫林在今葉縣東北函氏又伐許次于函氏杜注許地亦在今葉縣北秦都雍今為陜西鳳翔府治鳳翔縣史記德公元年初居雍城大鄭宫時魯莊公十七年也至僖十三年輸粟于晉自雍及絳杜注雍秦國都始見于春秋孔頴達曰周初為召穆公采邑有召亭東遷時陷于戎平王賜襄公岐以西之地曰能攻逐戎即有之至文公十六年伐戎戎敗走遂收周餘民地至岐岐以東獻之周鄭氏詩譜云秦襄公橫有周西都畿內八百里之地非是今縣南七里有古雍城秦德公所居大鄭宫城也平陽為秦舊都今為陜西鳳翔府之郿縣史記秦寧公二年徙居平陽是為魯隱公之元年至桓四年秦師圍魏執芮伯萬以歸秦始見經則寧公徙平陽之七年矣秦邑彭衙文二年戰于彭衙杜注郃陽縣西北有彭衙城史記秦武公元年伐彭戲氏正義曰彭戲戎號即彭衙秦文公于其地置泉縣在今陜西同州府白水縣東北六十里汪文二年晉伐秦取汪及彭衙而還當亦在白水縣界邧文四年晉侯伐秦圍邧新城杜注秦邑當在同州府澄城縣境新城杜注秦邑即梁國之新里也秦取之謂之新城今同州府澄城縣東北三十里有古新城少梁文十年晉人伐秦取少梁杜注馮翊夏陽縣故梁國也秦取其地以為邑曰少梁今同州府韓城縣南二十里有古少梁城秦地王城僖十五年晉隂飴甥會秦伯盟于王城杜注晉地馮翊臨晉縣東有王城在陜西同州府朝邑縣東僖二十四年晉侯潛會秦伯于王城瑕甥郤芮不獲公乃如河上成十一年秦晉將會于令狐秦伯不肯涉河次于王城則王城為河以西臨河之地史記厲共公十六年塹河旁攻大荔取其王城蓋春秋末地失于戎而復取之也河西文十三年秦伯師于河西杜注今河北縣于秦為在河之西在今陜西同州府及華州之境麻隧成十三年晉秦戰于麻隧秦師敗續師遂濟涇及俟麗而還迓晉侯于新楚杜注秦地在今陜西西安府涇陽縣西南侯麗杜注秦地劉伯莊云在今涇陽縣境新楚杜注秦地當在今同州府朝邑縣境棫林杜注秦地即舊鄭咸林宣王母弟友所封也今為陜西同州府華州秦山川中南昭四年傳司馬侯曰荆山中南九州之險杜注中南在始平武功縣南中南一名終南山亦曰太白山在今陜西西安府長安縣南五十里亘鳳翔岐山郿縣武功盩厔鄠縣長安咸寧藍田九縣之境程氏大昌曰終南山橫亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去且八百里河文十三年秦伯師于河西魏人在東杜注今河北縣于秦為在河之東河西在今陜西同州府及華州之境秦初起岐雍未能以河為界晉強遂跨河而滅西虢兼舊鄭以汾澮為河東故以華隂為西至僖九年秦穆公援立夷吾夷吾請割河外列城五東盡虢略河外即河之西虢略故虢國地即今闕鄉靈寶在河之東逮背約不與而戰韓見獲僖十五年十一月秦歸晉侯始征晉河東而河外五城不必言矣十七年晉太子圉為質于秦秦復歸晉河東而河西五城大抵終為秦有自是秦地始東至河秦在河西晉在河東判然若兩戒秦孝公初立下令曰穆公東平晉亂以河為界此其證也秦地至河自穆公始涇水成十三年晉師伐秦濟涇及侯麗而還涇水出今陜西平涼府平涼縣笄頭山亦名崆洞山東至西安府髙陵縣西南入渭水髙陸即髙陵也寰宇記涇陽有睢城渡即諸侯濟涇秦人毒涇上流處舊為漢唐之通津楚都郢今為湖廣荆州府治江陵縣史記文王熊資始都郢孔頴達曰世本及譜皆云武王都郢又左傳沈尹戍曰若敖蚡冒至于武文土不過圻猶不城郢則楚之都郢並不始于武王蓋經營之數世至武文而始定耳初時未有城郭文十四年公子燮子儀因城郢作亂事未得訖襄卜四年子囊將死遺言謂子庚必城郢楚子是始城之至昭二十三年囊瓦畏吳復增修以自固即杜預所云江陵縣北紀南城也今紀南城在荆州府治北十里遷于鄀今為湖廣襄陽府之宜城縣所謂鄢郢也以江陵為紀郢故謂此為鄢郢史記昭王十二年吳伐楚取鄱楚恐北去徙都鄀實當春秋定公之六年吳入郢後之二年矣因仍喟之郢故左傳曰遷郢于鄀也今縣西南九十里有故鄀城又史記頃襄王二十一年秦白起拔郢燒夷陵楚王東北保陳城即故陳國今為河南陳州府治號曰郢陳考烈王二十二年又遷壽春仍謂之郢即今江南鳯陽府之夀州又三世至負芻而亡丹陽為楚故都在今湖廣歸州東南七里北枕大江亦曰秭歸史記周成王封熊繹于楚居丹陽章懷太子曰丹陽在秭歸東南袁嵩謂屈原有賢姊聞原放逐亦來歸因名秭歸又枝江亦名丹陽者不知楚何時所遷杜佑通典曰楚初都丹陽為今秭歸後徙枝江亦曰丹陽蓋諸侯遷都常仍舊名故有兩丹陽後世猶因之晉王濬伐吳破丹陽遂克西陵此歸州之丹陽也西魏伐江陵曰為蕭氏計席捲渡江直據丹陽此枝江之丹陽也枝江漢縣今屬荆州府水經注云北據大江江汜枝分東入大江縣治洲上故名所謂江陵有九十九洲是也班固地理志謂楚封在丹陽郡丹陽縣者大謬丹陽郡為今江南鎮江府鄢為楚别都今襄陽府宜城縣西南九里有古鄢國桓十三年楚屈瑕伐羅及鄢亂次以濟杜注鄢水在襄陽宜城入漢昭十三年靈王沿夏將欲入鄢夏即漢之别名杜注云順漢水入鄢也本為楚别都故靈王欲入後昭王徙郢于鄀兼稱鄢郢以鄢與鄀俱在宜城縣地相近故稱鄢以别于江陵之紀郢也楚又嘗自鄀徙鄢踰年而復史記六國表頃襄王二十年秦白起拔郢二十一年拔郢王亡走陳髙誘曰秦兵出武關則臨鄢下黔中則臨郢渚宫即今荆州府治江陵城也文十年子西為商公沿漢泝江將入郢王在渚宫下見之孔頴達曰商在漢水北漢水東流而南入江子西自商縣沿漢水順流而下至江乃泝流逆上渚宫當郢都之南故王在渚宫下見之水經注今江陵城楚船官地即春秋時渚宫也荒谷冶父在今荆州府治江陵縣西桓十三年莫放縊于荒谷羣帥囚于治父以聽刑案荆州記州東三里餘有三湖湖東有水名荒谷又西北有小城曰冶父水經注揚水徑郢城南又東北路白湖注之湖在大港北港南曰中湖下曰昏官湖三湖合為一水東徑荒谷荒谷東岸有冶父城水盛則南通大江否則南迄江隄皆當在郢都之側羣帥囚于此以聽刑今冶父城在江陵縣東脾泄定五年王在隨子西為王輿服國于牌泄杜注楚邑近郢都當在今荆州府江陵縣境鄂為楚熊渠時别都今為湖廣武昌府武昌縣在府東北八十里史記熊渠當周夷王時興兵伐庸揚粵至于鄂立其長子康為句亶王中子紅為鄂王句亶即今江陵鄂即武昌也熊渠卒長子康蚤死子熊摯紅立即鄂王紅也其弟弒而代立曰熊延又鄭語孔朝注云熊繹元孫曰熊摯有疾楚人廢之立其弟熊延熊摯自棄于夔子孫有功王命為夔子與史記云弒少異案夔即歸即楚始封之丹陽熊摯自竄不過遜居國都之側蓋熊渠當日仍都丹陽分立兩子各啓土宇逮武王定都江陵夔乃獨為一國世守宗祀為附庸而武昌亦世為别都耳楚邑湫莊十九年楚子伐黃還及湫有疾杜注南郡鄀縣東南有湫城今在襄陽府宜城縣西南楚靈王時為伍舉采邑國語有湫舉子湫鳴析僖二十五年秦晉伐鄀過析隈入而係輿人以圍商密人懼曰秦取析矣杜注楚邑一名白羽南鄉析縣昭十八年楚還許于此今河南南陽府鄧州內鄉縣即其地近武關戰國時也秦昭王發兵下武關攻楚取析是商文十年子西為商公杜注楚邑上雒商縣今陜西商州東九十里有上洛廢縣又河南鄧州內鄉縣西有商於城為商鞅封邑張儀以商於地誑楚裴駰曰有商城在於中故曰商於酈道元曰丹水經內鄉丹水二縣間隔于中故曰商於或謂商即商州於即內鄉至商州凡六百里皆古商於地矣期思文十年楚子田孟諸期思公復遂為右司馬杜注弋陽期思縣故蔣國楚滅之里以為邑在今河南光州固始縣西北七十大林文十六年楚大飢戎伐其西南至于大林又伐其東南至于陽邱以侵訾枝社注楚邑考今安陸府荆門州西北有長城城北有櫟林長坂橫木修竹隱天蔽日即曹操追先主處胡氏曰長坂在當陽縣東南百二十里長林城北蓋自當陽之北而接長林之境皆長坂也訾枝杜注楚邑當在安陸府治鍾祥縣境廬文十六年自廬以往振廪同食故盧戍國伐羅傳所謂羅與盧戎兩軍之者也楚滅之為廬邑孔疏曰盧與廬通漢置中廬縣今為中廬鎮在襄陽府南漳縣東五里而應劭謂廬州古廬子國通典因之而復云左傳自廬以往即此地又廬州古迹有同食館唐元和中刺史路應求建亦採左傳自廬以往振廪同食之義為名誤甚矣魚文十六年滅庸傳惟禆鯈魚人逐之杜注禆鯈魚庸三邑魚即魚復縣漢為益州都尉治公孫述號曰白帝城先主改曰永安今為四川夔州府治奉節縣東有魚復浦葉宣三年鄭文公生公子士朝于楚楚人鴆之及葉而死杜注南陽葉縣楚遷許于葉王子勝曰葉在楚方城外之蔽也楚子乃使遷許于析而更以葉封沈諸梁號曰葉公東魏置襄州其地險隘髙齊保此以備周今河南南陽府葉縣南三十里有占葉城轑陽宣四年子越圍伯嬴于轑陽而殺之遂處蒸野將攻王杜注楚邑蒸野杜注楚邑俱當在荆州府境沂宣十一年令尹蒍艾獵城沂杜注楚邑定五年大敗夫槩王于沂即此九縣宣十二年鄭行成于楚曰請改事君夷于九縣杜注楚滅九國以為縣正義曰莊十四年滅息十六年滅鄧僖五年滅弦十二年滅黃二十六年滅夔文四年滅江五年滅六滅蓼十六年滅庸傳又稱楚武王滅庸文王縣申息凡十一國不知何以言九髙氏曰楚人拓地始于北境次及于東欒貞子曰漢陽諸姬楚實盡之杜謂姬姓之國在漢北者夷考姬姓國之近楚者曰隨曰息曰蓼曰穀隨終春秋不滅榖在漢南息蓼在淮壖又非漢北蓋楚所吞滅姬姓國甚多皆不見于經傳也鄭所謂九縣者未知何所指沈宜十二年戰于邲沈尹將中軍杜注沈或作寢寢縣也今汝陰固始縣案此沈國之别邑楚取之以為重鎮故沈尹見于春秋甚詳時為沈尹者莊王之子公子貞也靈王時有沈尹射平生時有沈尹赤昭王時有沈尹戍惠王時有沈尹朱邑本名寢楚人因取之于沈遂謂之沈至光武時改名固始今屬河南光州又沈本國定四年為蔡所滅後入楚為平輿邑在今汝寧府沈邱縣後漢地理志汝南郡有平輿有沈亭故國輿圖備考于河南沈邱下注云古沈子國漢平輿合諸後漢志平輿有沈亭之説相符則沈國之在沈邱明矣州來成七年吳入州來杜注楚邑淮南下蔡縣今為江南鳯陽府夀州即夀春也自成七年吳入州來至昭二十三年雞父之戰楚師大奔州來遂入吳自是入郢之禍兆矣吳蓋爭之七十餘年而後得哀二年吳遷蔡于州來謂之下蔡由是夀春城在淮之南下蔡城在淮之北相去三十里夾淮為固歷東漢至六朝常為重鎮汴宋南渡亦謂之南北夀春今壽州治即古夀春縣城為楚考烈王所築州北三十里有蔡國城即下蔡矣呂成七年子重請申吕為賞田吕為虞夏時國國語史伯曰當成周者南有申吕後并于楚今南陽府城西三十里有吕城鍾離成十五年諸國大夫會吳于鍾離杜注楚邑淮南縣昭四年楚針尹宜咎城鍾離以備吳三十四年楚于為吳師以略吳疆師還吳踵楚遂滅巢及鍾離南北朝時為重鎮今江南鳳陽府鳳陽縣東四里有鍾離舊城新石成十五年鄭子罕侵楚取新石杜注楚邑當在河南南陽府裕州葉縣境巢成十七年吳人圍巢伐駕圉釐虺杜注巢駕釐虺楚四邑巢即薳啓疆城之以備吳者今為江南廬州府巢縣駕釐虺襄三年吳伐楚取駕駕良邑也駕釐皆在無為州境虺在廬江縣境俱屬廬州府棠襄十四年楚子囊師于棠以伐吳昭二十年伍奢長子曰棠公尚寰宇記六合古棠邑今為江南江寧府六合縣棘襄二十六年聲子曰吳于是伐巢取駕克棘杜注楚邑譙國酇縣東北有棘亭今在河南歸德府永城縣南櫟昭四年吳伐楚入棘櫟麻杜注楚東鄙邑汝陰新蔡縣東北有櫟亭今河南汝寧府新蔡縣北二十里有野櫟店即古櫟城也若鄭之櫟邑則今河南禹州與此不同麻杜注楚東鄙邑魏收志碭郡安陽縣治麻城今江南徐州府碭山縣有安陽城即古麻城也以楚東鄙言之安陽之説近是城父昭九年楚公子棄疾遷許于夷實城父杜注城父縣屬譙郡案楚有兩城父此所謂夷城父取諸陳者也僖二十三年楚伐陳取焦夷杜注夷一名城父即此焦邑别見陳地昭三十年楚城夷以處徐子章羽三十一年吳人侵楚伐夷蓋夷城父二名兼用矣今江南潁州府亳州東南七十里有城父城又有北城父昭十九年費無極言于楚子大城城父而置太子焉以通北方故太子建居于城父杜注今襄城城父縣此又一城父也哀六年昭王攻大冥卒于城父即此漢置父城縣王莽末馮異為父城長光武也巾車鄉獲馮異處也今河南汝州郟縣西四十里有城父城不羮昭十一年楚子城陳蔡不羮杜注襄城縣東南有不羮城定陵西北有不羮亭案羮音郎有東西二不羮今河南許州府襄城縣東南有西不羮城定陵故城在河南府舞陽縣北西北有東不羮城中犨昭十三年王奪鬬韋龜中犨田杜注邑名疑當在南陽府境州屈昭二十五年楚子使薳射城州屈復茄人焉在今江南鳳陽府治鳳陽縣西茄近淮小邑丘皇城丘皇遷訾人焉在今河南汝寧府信陽州境訾亦在信陽州境昭十三年楚靈王師及訾梁而潰即此訾水之梁也卷使熊相郭巢季然郭卷杜注使二大夫為巢卷二邑築郭也卷城在南陽葉縣南後漢志葉有卷城在今河南南陽府葉縣西南巢見前潛昭二十七年吳師圉潛社注楚邑在廬江六縣西南昭三十一年吳人侵潛六楚沈尹戍帥師救潛吳師還楚遷潛于南岡即此漢置灊縣屬廬江郡晉因之今江南六安州霍山縣東北三十里有灊城南岡即漢置縣處也養昭三十年吳公子掩餘燭庸奔楚楚子大封而定其徙逆吳公子使居養莠尹然左司馬沈尹戍城之取于城父與胡田以益之杜注養即楚封吳公子之邑胡田故胡子之地今河南陳州府沈邱縣東有養城春秋時楚養邑也杜雖不言養所在然他處注云城父屬譙郡汝陰西北有胡城譙郡今為江南亳州汝陰今為潁州府沈邱與之逼近正在吳楚境上言養邑在此理可通矣豐哀四年司馬起豐析與秋戎杜注楚邑析南有豐鄉今河南南陽府淅川縣西南有豐鄉城其地與鄖陽相接析杜注楚邑析縣屬南鄉郡今淅川縣及內鄉縣之西北境皆析地白哀十六年子西召故太子建之子勝于吳使處吳境為白公杜注楚邑汝陰褒信縣西南有白亭今河南光州息縣東有白城東北七十里有褒信城慎吳人伐慎白公敗之杜注汝陰慎縣也今江南潁州府潁上縣西北有慎城水經注潁水經慎縣故城是其地文獻通考云白公勝邑案左傳子西召勝使處吳境為白公杜注白楚邑也汝陰郡褒信縣西南有白亭是勝之封邑在褒信矣白公敗吳于慎非封慎也慎自是楚邑但非白公所封之邑耳楚地沈鹿桓八年楚子合諸侯于沈鹿杜注楚地今湖廣安陸府治鍾祥縣東六十里有鹿湖地深不可測相傳有白鹿入此因名今涸為上腴郊郢桓十一年鬬亷謂屈瑕曰君次于郊郢以禦四邑杜注楚地今安陸府治鍾祥縣郢州故城是其地也前代置郢州蓋以楚郊郢故案府治旁控石城下臨漢水蓋險固地當時四國隨在隨州蓼在固始州在監利絞在鄖陽遼逺不能遽集而此居中扼要故欲據之以離其黨羽因以伐鄖之孤軍耳鄖國今德安府治安陸縣與溳沄二字通用水經注溳水經安陸故城古鄖國也若敖娶沄子之女生子文即此樠木之下莊四年楚武王卒于樠木之下今安陸府治鍾祥縣東一里有樠木山一名武陵以楚武王卒于此因名那處莊十八年傳楚武王遷權于那處杜注楚地南郡編縣東南有那口城史記文王少子季載封于冉孔氏曰冉一作那或作那皆讀曰然即那口也今安陸府荆門州東南有口故城津莊十九年楚子禦巴人大敗于津杜注楚地水經注枝江縣西三里有津鄉枝江縣今屬荆州府後漢建武四年岑彭謀伐蜀引兵屯津鄉當荆門要會十一年自津鄉攻田戎于荆門克之是也陘僖四年齊伐楚次于陘杜注楚地潁川召陵縣南有陘亭在今河南許州郾城縣召陵城南召陵盟于召陵杜注潁川縣也今郾城縣東四十五里有召陵故城武城僖六年許僖公見楚子于武城杜注楚地在南陽宛縣北今南陽府治南陽縣北有武延城故為申國地申滅屬楚選文十六年麇人率百濮聚于選將伐楚楚謀徙于阪髙杜注楚地當在荆州府枝江縣南境阪髙杜注楚地地當在今襄陽府西境句澨楚次于句澨使廬戢黎侵庸及庸方城杜注楚西界地當在襄陽府均州西庸方城杜注庸地上庸縣東有方城亭今鄖陽府竹山縣東四十五里有方城山上平坦四面險固山南有城周十餘里即春秋時庸方城也陘隰先君蚡冒所以服陘隰也杜注地名荆州府以東多山溪之險因名臨品楚子會師于臨品子越自石溪子貝自仞以伐庸杜注地名當在襄陽府均州界石溪杜注入庸道當在均州界仞杜注入庸道當在均州界臯滸宣四年楚子與若敖氏戰于皋滸杜注楚地路史英六二軫皆臯地陶之所封也後皆屬楚滸水邊地名案傳上文云若敖師于漳澨漳水在荆州府枝江縣北四十里此亦當在其境郔宣十一年楚左尹子重侵宋玉待諸郔杜注楚地當在河南陳州府項城縣境夏州宣十一年楚入陳鄉取一人焉以歸謂之夏州杜注州鄉屬示討夏氏所獲地理通釋云大江中州也今在湖廣武昌府江夏縣鄧成九年鄭伯會楚公子成于鄧桓二年蔡侯鄭伯會于鄧穀梁傳曰鄧某地不知其國公羊傳曰鄧與會爾又賈逵服虔並以鄧為國而正義駁之云蔡鄭懼楚始為此會不應就近楚小國故知非鄧國也昭十三年楚蔡公召子干子晳盟于鄧杜注潁川召陵縣西南有鄧城推知桓二成九兩會皆在此矣戰國策楚懷王伐秦敗于藍田韓魏聞之南襲楚至鄧即此今河南許州府郾城縣東南三十五里有鄧襄城汝陰之田成十六年楚使公子成以汝陰之田求成于鄭杜注汝水之南近鄭地楚文王封畛于汝楚地止于汝水之南田蓋在汝州陜縣及裕州葉縣間瑕成十六年鄢陵之戰楚師還及瑕杜注楚地水經注肥水徑山桑縣故城南又東積而為陂謂之瑕陂又東南徑瑕城南春秋楚師還及瑕即此城也山桑漢縣在今江南潁州府蒙城縣北繁陽襄四年楚師為陳叛故猶在繁陽杜注楚地在汝南鮦陽縣南今河南汝寧府新蔡縣有繁陽亭柤襄十年會吳于祖杜注楚地今山東兖州府嶧縣東南有渣口戍即今泇河入氶水之泇口又汪氏克寬曰逼陽國及柤地皆在沛縣蓋地相接云庸浦襄十三年吳侵楚子庚與吳戰于庸浦杜注楚地在今江南廬州府無為州南濱江之浦也雩婁襄二十六年楚子秦人侵吳及雩婁淮南子楚相孫叔敖決期思之陂灌雩婁之野期思陂即芍陂今雩婁縣在江南潁州府霍邱縣西南期思城在河南光州固始縣境二邑相鄰並也水經注雩婁故吳地此誤本傳原云知吳有備而還是不入吳境也又為叔敖陂水所溉其為楚地明矣史記吳王餘祭十二年楚伐吳至雩婁服虔亦曰雩婁楚之東邑夏汭昭四年楚沈尹射奔命于夏汭杜注漢水曲入江今夏口也荆州記夏口入江處謂之夏汭蓋夏水之尾漢末謂之夏口亦曰漢口亦曰沔口沔之下流為漢夏水亦會三水共出此口也今在湖廣武昌府治江夏縣瑣昭五年楚伐吳楚大夫常壽過帥師會楚子于瑣杜注楚地當在今江南潁州府霍邱縣東鵲岸聞吳師出薳啓疆帥師從之遽不設備吳人敗諸鵲岸杜注廬江舒縣有鵲尾渚髙氏曰志云今廬江府舒城縣西北有鵲亭即杜預所云也然薳射自夏汭出薳啓疆别從江道交戰不應在楚之內地杜佑曰南陵大江中有鵲尾洲即古鵲岸也此説可通今江南太平府繁昌縣西南大江中有鵲尾洲又池州府銅陵縣北十里有鵲頭山髙聳臨江故江曰鵲江岸曰鵲岸南懷昭五年薳射帥繁陽之師先入南懷及汝清吳不可入汝清杜注皆楚界俱應在今江淮間豫章昭六年楚使薳泄伐徐吳人救之令尹子蕩帥師伐吳師于豫章而次于乾溪吳人敗其師于房鍾豫章凡六見于左傳杜注始云在江北淮水南蓋後徙江南豫章至柏舉之戰又云豫章漢東江北地名與前文小異由是諸説紛然至求之湖廣德安府之章山施諸吳楚夾漢則可以解定二年之見舟豫章昭十三年楚師還自徐吳人敗諸豫章獲其五帥則相距千餘里求諸傳文前後斷不可合愚嘗考之豫章寬大之語自江西之饒州南康二府西抵九江府之德化盡鄱陽湖之境隔江為江南安慶府之宿松北接潁亳廬夀西接光黃皆為楚之豫章地跨大江南北以及淮南蓋鳳陽以西壽霍光固之境皆近淮壖為吳楚日交兵處今日但以江西為豫章乃漢豫章郡非春秋豫章地也秦滅楚置九江郡漢分九江置豫章郡乃邇取春秋之豫章為名如會稽本在浙東而秦漢之會稽郡則盡浙西之境也皇輿表以南昌為吳豫章地尤非南昌乃漢豫章郡治如秦會稽都尉治蘇州其地統𨽻極逺今日豈求會稽于蘇州乎且南昌始終為楚地于吳無涉考史記闔閭十一年吳伐楚取番番即今鄱陽縣為饒州府治而闔閭十一年為定公六年在柏舉之後則當柏舉戰時吳尚未有饒州之地又安得越南康九江二府而先有南昌也哉由是知左傳舍舟淮汭自豫章與楚夾漢豫章斷非今日之南昌案淮汭為今夀州在淮之南杜氏所云豫章在江北淮水南者正當即指淮汭而言蓋舍舟于此遵陸亦當由此耳至漢東之説髙氏辨之甚明不論可也乾溪杜注在譙國城父縣南楚東境今江南潁州府亳州東南七十里有乾溪與城父村相近即漢城父縣也夷濮西田昭九年然丹遷城父人于陳以夷濮西田益之杜注夷田在濮水西者水經注夏肥水上承沙水東南流徑城父縣故城春秋所謂夷田在濮水西者也蓋濮水亦稱沙水在潁州府亳州西境今堙潁尾昭十二年楚子狩于州來次于潁尾杜注潁水之尾在下蔡西蓋潁水入淮處也亦謂之潁口歷南北朝至唐宋皆為戰爭地今在江南鳯陽府夀州西北四十里魚陂昭十三平楚公子比為王公子黑肱為令尹次于魚陂杜注竟陵縣城西北有甘魚陂戰國策冷向曰楚南有符離之塞北有甘魚之口是也今在湖廣安陸府天門縣西北天門縣即古竟陵縣訾梁師及訾梁而潰梁名在河南汝寧府信陽州界宗丘昭十四年楚子使然丹簡上國之兵于宗丘杜注楚地當在今湖廣宜昌府歸州境上國在國都之西西方居上流故謂之上國長岸昭十七年楚人及吳戰于長岸杜注楚地今江南太平府當塗縣西南三十里有西梁山與和州南七十里之東梁山夾江相對如門之闕亦曰天門山郡國志云春秋楚獲吳乘舟餘皇處也歷代為建康西偏之要地下陰昭十九年楚工尹赤遷陰于下陰杜注陰縣屬南鄉郡水經注沔水徑穀城東又南徑陰縣故城西故下陰也春秋遷陰于下陰即此今湖廣襄陽府光化縣西漢水西岸有古陰縣城雞父昭二十三年戰于雞父杜注楚地安豐縣南有雞備亭今江南鳯陽府夀州西南六十里有安豐故城雞備亭又在其城西南圉陽昭二十四年楚子為舟師以略吳疆及圉陽而還杜注楚地應在江南廬州府巢縣南境柏舉定四年吳楚戰于柏舉杜注楚地名勝志云湖廣黃州府麻城縣東北三十里有柏子山縣東南有舉水柏舉之名蓋因柏山舉水而得今案傳文子常濟漢自小别至于大别又三戰而陳于柏舉是在漢之東北其地應在麻城縣境也大隧直轅冥厄左司馬戌謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄杜注三者漢東之隘道又城口是三隘道之總名所謂義陽與三關之塞也三關之中冥厄最著在河南汝寧府信陽州東南九十里湖廣德安府應山縣北六十五里一名平靖關其關因山為障不營濠湟故以平靖為名亦曰冥塞莊辛對楚襄王禳侯填黽塞之內投已乎冥塞之外是也大隧一名武陽關在信陽州東南一百五十里西南至應山縣一百三十里地名大寨嶺薛氏云三關之險大寨嶺為平易是也直轅一名黃峴關又謂之九里關在信陽州南九十里南至應山亦九十里義陽城與三關勢如首尾南北朝時最為重鎮得失不常侯景之亂三關為齊有南國之勢益弱春秋之世楚所恃以為國者申息之間方城之外扼要惟此也稷定五年秦子蒲使楚人先與戰而自稷會之大敗夫槩王于沂杜注楚地當在河南南陽府桐柏縣境軍祥薳射子從子西敗吳師于軍祥杜注楚地當在湖廣德安府隨州西南堂溪夫概王奔楚為堂溪氏杜注楚地水經注灈水出汝南吳房縣吳房西北有堂溪城即此也吳房本房子國楚封夫槩于此故曰吳房今河南汝寧府遂平縣西吳房故城北有堂溪成與西平縣及許州府郾城縣相接麇吳師居麇杜注楚地今湖廣嶽州府治巴陵縣東有麇城案麇本小國其地為今鄖陽府治鄖縣又十一年楚子伐麇後尋為楚滅髙氏謂吳師敗楚師于雍澨吳師居麇雍澨在安陸府京山縣境麇地不能至此當是麇滅之後楚人遷之以來如羅鄀類耳竊謂麇之為麇國不可知而彚纂謂在嶽州巴陵縣此斷非也細案前後傳文定四年戰于柏舉係黃州府麻城縣吳從楚師及清發係德安府附郭安陸縣繼敗諸雍澨五戰及郢雍澨係安陸府京山縣楚子遂棄其國都奔隨隨為德安府之隨州近河南蓋吳師從淮右陸路來與楚夾漢在漢水之北交戰只在楚之北境楚亦倉皇向北走未嘗一涉洞庭湖之南也且傳云敗諸雍澨五戰及郢是年左司馬戍及息而還敗吳師于雍澨三戰皆傷五年秋吳師又敗楚師于雍澨則雍澨為戰之地所謂父兄新暴骨焉者也子期欲焚麇而子西不可則麇即為雍澨無疑案麇一作麇宋白曰楚伐麇今安陸府當陽縣東南六十里有麇城與京山接壤此為較近竊意水草之交為麇麇即雍澨水邉吳師偶屯駐其地耳如此才與傳文吻合若嶽州巴陵逺在湖南吳楚未嘗一戰其地何暴骨之有且郢為今荆州江陵縣在湖之北王已出奔隨州何用更涉楚之南入楚之內地乎必不然矣負函哀四年楚人謀北方致蔡于負函杜注楚地在今河南汝寧府信陽州境繒關致方城之外于繒關杜注楚地在今邵州境倉野右師軍于倉野杜注在上洛縣今陜西啇州東南有倉野聚三戶楚執蠻子與其五大夫以畀楚師于三户杜注丹水縣北有三戶亭今河南南陽府淅川縣西南有三户城楚山川荆山昭四年傳荆山中南九州之險杜注荆山在新城沶鄉縣南荆山在今湖廣襄陽府南漳縣西少北八十里昭十三年楚遷許胡沈道房申于荆杜注荆荆山是荆山之為地廣矣子革曰昔我先君熊繹辟在荆山則以地近四境為言耳塗山昭四年穆有塗山之會社注塗山在夀春東北塗山在江南鳳陽府懷逺縣東南八里水經注荆塗二山本相連為一脈禹以桐柏之流泛濫為害乃鑿山為二以通之兩山間有斷接谷大别定四年楚師濟漢而陳自小别至于大别大别山在今湖廣漢陽府漢陽縣東北半里漢江西岸江水徑其南漢水從西北來會之山之左即沔口地説曰漢水東行觸大别之陂南與江合是已亦名魯山有魯肅祠因名小别小别山在今漢陽府漢川縣南十里山形如甑亦名甑山漢川在漢陽之西北百七十里則小别當在大别之西孔穎達謂在大别之東謂楚師退而至大别自東漸西者非是方城僖四年屈完曰楚國方城以為城杜注方城山在南陽葉縣南方城山名在今河南南陽府裕州東北四十里葉正在州北楚人因山為固築連城東向以拒中國則屈完所謂方城以為城也今自葉縣之方城山至唐縣連接數百里一曰長城山即古方城舊迹少習哀四年將于少習以聽命杜注少習商縣武關也少習山名在今陜西西安府商州東武關在少習山下故亦名少習京相璠曰武關楚通上雒厄道也春秋時蓋嘗為晉有以其近陰地穆公之世秦伐鄀與楚爭商密近武關地至是云將通少習而杜釋之如此是楚已得武關矣今由河南之南陽湖廣之襄鄖入長安者必道武關自武關至長安四百九十里多從山中行至藍田始出險就平蓋自古為險厄矣莵和哀四年左師軍于莵和杜注莵和山在上雒東莵和山名今陜西商州東有莵和山通襄漢往來之道析隈僖二十五年秦晉伐鄀秦人過析隈入而係輿人以圍商密杜注析今南鄉析縣析隈山名在今河南南陽府鄧州南七十里俗訛為厮隈山汾陘之塞戰國策蘇秦曰楚北有汾陘之塞鮑彪注曰陘召陵陘亭汾在襄城陘山在今河南許州府郾城縣南又新鄭亦有陘山在縣南三十里蓋陘塞縣亘甚逺蘇秦説楚曰北有汾陘説韓曰南有陘山蓋二國皆恃此為險在楚為北塞在韓則為南塞也徐廣曰陘山絶之名汾襄十八年楚子庚治兵于汾杜注襄城東北有汾邱城汾邱在今河南許州府襄城縣東北史記秦昭王四十三年攻韓汾陘拔之蓋與新鄭陘山俱為南北隘道阜山文十六年戎伐楚西南至于阜山阜山在今湖廣鄖陽府房南五十里萊山昭五年沈尹赤會楚子于萊山今河南光州光山縣南百五十里有天臺山或云即萊山坻箕之山昭五年楚子觀兵于坻箕之山今江南廬州府巢縣南七十三里有踟蹰山輿地志以為即坻箕山樠木山莊四年楚莊王卒于樠木之下今湖廣安陸府治東一里有樠木山上有青泥池一名青泥山三國志魏樂進與關羽相拒于青泥山祝穆曰即樠木山也亦名武陵以楚武王卒于此而得名大江宣十二年鄭行成于楚曰其俘諸江南以實海濱亦惟命江水自四川夔州府巫山縣流入楚境經湖廣宜昌府巴東縣及歸州之北為楚始封之丹陽又東歷夷陵州荆州府嶽州府又北至漢陽府城東武昌府城西而會于漢水復北折而東歷武昌府北又東歷黃州府南又東南歷廣濟縣黃梅縣之南而入江南安慶府宿松縣界江之南岸即江西九江府德化縣界矣迂回千八百餘里皆當時楚境也初都丹陽在枝江居江南後徙郢都在荆州府居江北别都鄂即武昌府亦在江之南自荆州以南皆楚所謂江南也楚遷權于那處遷六小國于荆山在江北遷羅于枝江遷許于華容在江南鄭蓋欲自比此屬耳春秋時未知有南海屈完之對齊桓公蓋漫為侈大之詞實非楚境也鄭請實海濱亦自貶損以恱之耳漢水莊四年莫敖以王命入盟隨侯且請為會于漢汭而還濟漢而後發喪杜注汭內也謂漢西漢水自襄陽府城北折而東南經宜城縣之東又經安陸府城之西荆門州之東復東南出經潛江縣北及景陵縣西又東歷沔陽州北及漢川縣南至漢陽府城東北大别山下會于大江此漢汭乃襄陽以南至安陸之漢水也自襄陽至安陸府七百里自安陸至沔陽州七百里安陸為楚之郊郢是時王卒于樠木之下在安陸府治東一里莫敖懼隨人邀襲故以王命請隨侯為會于此示以整暇待隨侯濟漢歸國而後發王喪也此時楚尚未能有漢隨在漢東楚在漢西故杜注漢汭為漢西淮水桓八年楚武王侵隨軍于漢淮之間淮源出桐柏山在今河南南陽府桐柏縣東一里東南接湖廣德安府隨州隨州即春秋時隨國正當漢之東淮之南故曰軍于漢淮之間是時南陽之境猶未為楚有逮後文王縣申息封畛于汝則淮為楚境內之水矣彚纂曰楚軍于漢淮之間當在今安陸府應山縣境汝水成十六年楚以汝陰之田求成于鄭杜注汝水之南近鄭地汝水出河南汝州魯山縣東北經伊陽至汝州南又東南經實郟南入南陽府裕州歷許州府之襄城郾城南至汝寧府西平境又東南流至潁州南而入于淮其自南陽以下皆楚境也楚文王封畛于汝蓋楚地止于汝水之南其在汝州郟縣及裕州葉縣間者汝陰田也潁水昭十二年楚子狩于州來次于潁尾杜注潁水之尾在下蔡西潁水出陽城山東至下蔡入淮在今江南潁州府潁上縣與鳳陽府夀州接界潁水入淮處在夀州西北四十里所謂潁尾也亦謂之潁口荀子曰楚汝潁以為險溠水莊四年除道梁溠軍臨于隨杜注溠水在義陽厥縣西梁橋也溠水在今隨州北八十五里周禮職方豫州其浸波溠是時王薨于行若歸國則虛實立見若進兵臨漢復恐隨人阻漢而守故用竒兵别開新道橋溠水出不意而直壓隨都隨既懼而行成計從漢還又恐隨人乘半渡而邀擊復以王命請隨侯為會于漢汭而我乃還國蓋欲隨人以好會之禮送楚師至漢水之西隨既會訖濟漢東還而後發王喪始由竒道從溠東渡繼由正道從漢西歸也彭水桓十二年楚伐絞楚師分涉于彭釋例彭水至南鄉築陽縣入漢彭水在今湖廣鄖陽府房縣西南流入穀城縣界涌水莊十八年閻敖遊涌而逸杜注涌水在南郡華容縣涌水在今湖廣荆州府監利縣東南乃夏水支流水經注江水當華縣東南涌水出焉涌水自夏水南通于江謂之涌口閻敖遊涌而逸于二水之間者也鄢水桓十三年及鄢亂次以濟杜注鄢水在襄陽宜城縣入漢鄢水在今湖廣襄陽府宜城縣南滑水宣八年楚伐舒蓼滅之楚子疆之及滑汭滑汭當為今江南廬州府東境雲中定四年楚子濟江入于雲中夢中宣四年邧夫人使棄諸夢中周禮職方荆州藪曰雲夢今湖廣德安府雲夢縣南一里有雲夢橋今澤已湮昔時方九百里雲澤跨江之南夢澤跨江之北今荆州府之監利石首枝江三縣安陸府之荆門州沔陽州黃州府之蘄州及黃岡麻城二縣德安府之安陸縣俱有雲夢之稱蓋跨州豆隰兼包勢廣矣睢水定四年楚子涉睢杜注睢水出新城昌魏縣東至枝江縣入江是楚王西走處睢水入江處在今荆州府枝江縣當郢都之西楚王避吳西走處也睢一作沮漳水宣四年子越師于漳澨杜注漳水出新城沶鄉縣南至當陽縣入沮漳水在今湖廣安陸府當陽縣北四十里自南漳流入城至縣東南五十里與沮合名合溶渡湛水襄十六年晉楚戰于湛阪楚師敗績晉師遂侵方城之外杜注昆陽縣北有湛水東入汝湛水在河南南陽府葉縣北三十里縣北二十里有昆陽城周禮荆州其浸潁湛水經注湛水出犨縣北魚齒山東南流湛浦春秋晉楚戰于湛阪即此泜水僖三十三年楚子上救蔡與晉師夾泜而軍杜注泜水出魯陽縣東經襄城定陵入汝泜水即􅓳水在今河南南陽府葉縣東北一里光武大敗王邑工尋于昆陽士卒溺死滍水為之不流即此定陵在今南陽府舞陽縣界夏水昭四年楚沈尹射奔命于夏汭杜注夏汭漢水曲入江今夏口也孔潁達曰漢水之尾變為夏水以冬竭夏流故名夏汭乃漢水入江處其地在漢陽府城東武昌府城西正當大别山下禹貢所謂南入于江者莊四年會于漢汭在安陸府治鍾祥縣北去此七百里泉始出山為漾南流為沔至漢中東流為漢尾稱夏隨地立名亦有全漢俱稱夏者昭十三年王沿夏欲入鄢杜注順流為沿順漢水南至鄢鄢在今襄陽府宜城縣順流入鄢則猶在宜城之北漢水之上流左傳遽稱夏者是舉尾以該首猶水經以全漢為沔是舉首以該尾也羅水昭五年楚子以驛至于羅汭杜注羅水名今河南汝寧府羅山縣舊有羅水北入淮楚子當至此或云即汨羅不應反過洞庭湖南大謬窮水昭二十七年楚與吳師戰于窮令尹子常以舟師及沙汭而還水經注淮水又東窮水入焉窮水出安豐縣窮谷即楚與吳師遇處在今江南潁州府霍邱縣西南八里沙水水經注汴沙到浚儀而分汴東注沙南流至義城縣西南入于淮謂之沙汭楚東地也義城故城在今江南鳳陽府懷逺縣東北臼水定五年王之奔隨也將涉于成臼杜注江夏竟陵縣有臼水西南入漢今湖廣漢陽漢川縣有臼水亦名曰子河西南與漢水合清發定四年吳從楚師及清發杜注清發水名水經注溳水過安陸縣西又南徑石巖山北亦謂之清水即春秋時吳從楚師處今湖廣德安府附郭安陸縣城西八十里有石巖山溳水經其下雍澨定四年吳從楚敗諸雍澨五戰及郢今湖廣安陸府京山縣西南八十里有三澨水通于漢江春秋之雍澨其一也又縣境有汊澨漳澨薳澨説者以為即禹貢之三澨昭二十三年薳越縊于薳澨今湮右春秋列國都邑山川中五禮通考卷二百九
