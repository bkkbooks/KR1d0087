body:
  text: 五禮通考卷一百九十五刑部尚書秦蕙田撰嘉禮六十八觀象授時大清會典推步法推日躔法用數康熙二十三年甲子天正冬至為律元江氏永曰律必有元所以為步算之端古術先為日法以今日月五星之行推而上之必得甲子嵗前十一月甲子朔夜半冬至七曜齊動之年以為元荒逺無徴自漢太初三統而後一術輒更一元元授時術始革其失測定氣應閏應轉應交應五星合應律應即以至元辛巳為元不用積年日法明大統法因之季年用西法擬改憲以崇禎戊辰為元我此朝因其新法諸平行嵗嵗有根數隨年皆可為元定康熙甲子紀首之年為元用授時立應之法上考下求皆以是年諸應為根天正冬至者甲子年前之平冬至實癸亥年十一月推步必以年前冬至為首履端於始之義也周天度三百六十入算化作一百二十九萬六千秒平分之為半周四分之為象限十二分之為宮江氏永曰此周天整度也古法用日度三百六十五度有竒竒零之數不便分析故以三百六十整齊之或曰天本無度因日之行而生度可以臆縮之乎曰天道恒以整齊者為體以竒零不齊者為用如十干十二支相配而為六十此整齊者也六其六十則為三百六十矣一嵗必多五日有竒天之用數也要其體數則恒為三百六十故易曰乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日亦以其體數言之實則當期之度也自太陽一日右旋之軌迹而觀之似一日平行一度而無餘自體數三百六十度而觀乃是一日平行一度而不足即謂周天實止三百六十度因日行有不足之數而生五日有竒之羸數亦無不可也天者統而言之七政恒星各居一重天皆以三百六十度為周天經度如斯緯度亦然即地之經緯度亦然凡諸天之小輪皆可析為十二宮剖為三百六十度又若三角八線萬有不齊之數皆可以整齊者御之度法六十分秒微以下皆以六十迭析江氏永曰三百六十度者六其六十度分以下亦皆以六十為法其不用百分何也八線表及渾儀以六十析度為得踈宻之中又一小時六十分與度法相當亦取便於變時也嵗周三百六十五日二四二一八七五嵗周小餘係五時三刻三分四十五秒將時刻分化秒用萬分通之得二千四百二十一分小餘八七五凡此者所以便布算也後平行諸應通法皆倣此江氏永曰嵗周即嵗實此太陽平行之平嵗實也今時太陽最卑近冬至平行處近春分測累年春分前後相距則得平嵗實如是若以定冬至相距其小餘必稍羸猶之月朔當轉終則時刻必多於朔䇿且太陽小輪古更大於今其羸數愈多回回之法三百六十五日為平年多一日為閏年一百二十八年閏三十一日此小餘萬分日之二四二一八七五正合一百二十八分之三十一又考崇禎新書日躔表說云新法依百分算定用平行嵗實為三百六十五日二十四刻二十一分八十八秒六十四微尾數多一秒一十四微截去不用豈欲取五時三刻三分四十五秒之整數秒下之微其數可省與一秒一十四微僅當六微弱耳雖積之久其數不多也零通分之法以五時三刻三分四十五秒化作二萬九百二十五秒與萬相乘為實以一日八萬六千四百秒為法除之得二四二一八七五嵗差五十一秒江氏永曰太陽行黄道已周尚有不及列宿天之數謂之嵗差實由恒星天日日有東行之細數積之一嵗行五十一秒也七十年行五十九分三十秒幾及一度日法一千四百四十江氏永曰古法一日百刻不便於均泒十二時今法定為九十六刻刻十五分合之一千四百四十分一刻用十五分者合四刻為一小時六十分與度法相當也分下秒微亦以六十迭析一日化秒八萬六千四百秒日周通法一萬江氏永曰萬分者授時之法今仍用為通法紀法六十江氏永曰甲子六十日也宿法二十八江氏永曰日有值日之宿猶之六甲值日古法無之大陽每日平行三千五百四十八秒三三五一六九江氏永曰以周天一百二十九萬六千秒乘日周通法以嵗周除之得毎日平行秒數及小餘以六十分法約之五十九分八秒一十九微竒也最卑嵗行六十一秒一六六六六江氏永曰最卑者太陽本輪底之一㸃舊曰最髙衝或曰髙衝今定名最卑此㸃亦有行度與月孛五星最髙同理不用最髙而用最卑者近冬至故也嵗行一分一秒一十微五十九年弱行一度最卑日行十分秒之一又六七四六九江氏永曰太陽距最卑為自行引數毎日之行雖甚微亦當加之本天半徑一千萬江氏永曰日月五星各麗一重天則各有其本天自下而上一太隂二水星三金星四太陽五火星六木星七土星本天皆以地心為心其半徑大小甚相懸常設一千萬者整數便於算也太陽本天距地比例數見推月食法本輪半徑二十六萬八千八百一十二均輪半徑八萬九千六百四江氏永曰本輪均輪太陽盈縮之所由生也本輪之心在本天均輪之心在本輪太陽實體在均輪遇最卑在均輪之頂遇最髙在均輪之底其行也本天隨動天左旋不及動天之速因有右旋之度本天右旋則本輪之心亦隨之右旋太陽每日平行之數即本輪心行於本天之數其嵗周即本輪心隨本天一周之數也然本輪心又有逐日離最卑之度則本輪又自左旋本輪左旋而均輪心亦隨之左旋嵗周之外有餘分逐及最卑則本輪帶均輪一周矣然均輪心雖隨本輪左旋而均輪又自右旋太陽在均輪上亦隨之右旋其度恒以倍本輪左旋一度均輪右旋兩度本輪一周均輪則兩周也太陽隨均輪在本輪心之左則加於平行在本輪心之右則減於平行其加減之度分秒必均故謂之均輪月五星之本輪均輪半徑有定太陽則不然古大而今漸小此本輪均輪半徑之數蓋崇禎戊辰所測其加減最大之均數二度三分有竒今時似不及此數本輪半徑約二十五萬一千五百九十六均輪半徑約八萬三千八百六十五最大之均一度五十五分而已顧其大不知何時始其小不知何時復此則非今日所能知惟隨時測騐修改耳之均輪常居本輪三一氣應七日六五六三七四九二六江氏永曰律元天正冬至辛未日也初日起甲子七日為辛未其小餘剰八萬六千六百秒以萬分法除之五萬六千七百一十秒七九三六零六四以時分秒收之十五小時四十五分一十秒四十七㣲三十六纎竒平冬至辛未日申初三刻零一十一秒宿應五日六五六三七四九二六江氏永曰辛未日尾值宿也初日起角宿五日為尾最卑應七度一十分一十一秒一十微江氏永曰辛未次日子正時最卑行也以減太陽平行為太陽自行自元至元以前最卑在冬至前至元以後最卑在冬至後惟至元間與冬至同度至是年行七度有竒冬至後八日乃當最卑夏至後亦八日當最髙是為盈縮之初恒以冬至為盈初夏至為盈初者非也求天正冬至江氏永曰求平冬至也若求定冬至須實算日躔初宮初度見後求節氣時刻條置嵗周以距律元之積年下求將來則從律元順推上考徃古則從律元逆溯減一乗之江氏永曰距年恒數算外須減一乃是實距如甲戌距甲子十一年實距十年得中積分江氏永曰積日併小餘加氣應上考徃古減氣應之江氏永曰加減七日有竒氣應乃得甲子後幾日滿紀法去之江氏永曰六旬周故也餘為天正冬至日分上考徃古則以所餘轉與紀法相減餘為天正冬至日分自初日起甲子其小餘以日法通之如法收為時刻日周通法為一率小餘為二率日法為三率求得四率為時分滿六十分收為一小時十五分收為一刻小江氏永曰三率法見後條註分下有秒其數小可略數過半收為分未過半棄之後凡求時刻相同初時起子正一時為丑初以至二十三時為夜子初江氏永曰求天正冬至小餘為後條求年根秒數張本若小餘當某時某刻某分此為平冬至不以註書亦求之者重嵗始且與定冬至時刻相較先後也小寒後二十三平氣則可略之矣凡最卑在冬至前者平冬至在定冬至後最卑在冬至後者反之求平行以日周通法為一率太陽每日平行為二率天正冬至小餘與日周通法相減餘為三率江氏永曰如氣應小餘六五六三七四九二六與日周通法相減餘為三四三六二五零七四求得四率二率與三率相乗一率除之即得四率後倣此除江氏永曰此三率法即異乗同除之法相乗者實數之者法數也二率三率可互易凡三率中有百千萬之整數為二三率者進位即可省乗為一率者退位即可省除為年根秒數江氏永曰平冬至次日子正時太陽平行若干秒也以平冬至小餘與日周通法相減之餘為三率其餘數之特刻太陽平行得若干秒是為次日子正時之秒亦即為一年之根年根必次日子正時者便於相加得整日所求皆得子正時之度秒也又置太陽每日平行以本日距天正冬至之日數乗之得數為秒與年根相併以宫度分收之為平行江氏永曰一十萬八千秒為宮三千六百秒為度六千秒為分求實行置最卑嵗行以積年乗之又置最卑日行以距天正冬至之日數乗之兩數相併内加最卑應上考則減最卑應以減平行得引數江氏永曰太陽平行距最卑之數亦即均輪心行本輪周之數用直角三角形江氏永曰小句股形也以本輪半徑三分之二為對直角之邊江氏永曰本輪半徑減去均輪半徑其餘三分之二如以八九六零四減二六八八一二其餘一七九二零八也此邊為小弦從本輪心抵均輪底與正方角相對以引數為一角江氏永曰此角輳本輪心引數度在本輪周即其角之度求得對角之邊江氏永曰此邊為小句用正弦比例檢八線表半徑千萬為一率引數度正弦為二率對直角之邊為三率求得四率為對角之邊從直角抵均輪底與小弦相交周引數過一象限者與半周相減過二象限者減去半過三象限者與全周相減皆用其餘為二率倍之江氏永曰凡引數左旋一度則均輪右旋兩度太陽實體在其上前求對角之邊雖抵均輪之底尚未抵太陽故更引長而倍之所以用倍數何也合本輪均輪半徑三五八四一六與本輪半徑三分之二加一倍故此邊恒用倍其所加之一倍即均輪上倍引數度之通弦為太陽實體所在又求得對餘角之邊江氏永曰此邊為小股用餘弦比例半徑千萬為一率引數度餘弦為二率對直角之邊為三率求得四率為對餘角之邊從直角抵本輪心用第二率之法同上與半徑相加減引數三宮至八宮則相加九宮至二宮則相減江氏永曰本天之半徑也本輪上六宮相加下六宮相減復用直角三角形江氏永曰大句股形也以加倍之數為小邊加減半徑之數為大邊直角在兩邊之中句江氏永曰小邊為大大邊為大股求得對小邊之角為均數江氏永曰用切線比例大邊為一率小邊為二率半徑十萬為三率求得四率為正切以正切撿表得角度此角輳地心置平行以均數加減之引數初宮至五宮為加六宮至十一宮為減反江氏永曰初宮起最卑故與月五星之加減相得實行江氏永曰平行者本輪心當黄道之度實行者太陽實體當黄道之度求宿度以積年乗嵗差得數加黄道宿鈐鈐見卷後以減實行餘為日躔宿度若實行不及減宿鈐退一宿減之江氏永曰積年乗嵗差加黄道宿鈐者加入相近之經度宿也以減太陽實行則得日躔宿度矣然所得皆本日子正時宿度若當兩宿交界之際欲求易宿時刻當倣後求節氣時刻之法於易宿之日以本口太陽實行與次日實行相減餘為一率日法為二率本日子正實行與本宿相減餘為三率求得四率為距子正後分數乃以時刻收之即得次宿時刻求值宿置中積分加宿應滿宿法去之餘數加一日為值宿初日起角宿江氏永曰如三百六十有竒滿宿法去三百六十四日餘一日有竒加一日是亢宿求節氣時刻日躔初宮丑初度為冬至十五度為小寒一宮子初度為大寒十五度為立春二宮亥初度為雨水十五度為驚蟄三宮戌初度為春分十五度為清明四宮酉初度為穀雨十五度為立夏五宮申初度為小滿十五度為芒種六宮未初度為夏至十五度為小暑七宮午初度為大暑十五度為立秋八宮巳初度為處暑十五度為白露九宮辰初度為秋分十五度為寒露十宮卯初度為霜降十五度為立冬十一宮寅初度為小雪十五度為大雪江氏永曰此黄道上分界定度太陽實行到此為真節氣因太陽有加減之度故黄道上度均而時日不均古法不知太陽盈縮者固非知盈縮有定氣而仍以恒氣注律者亦非況其所為恒氣者又不以平冬至為根而以定冬至起算其所為盈縮者又不知有推移而常定於二至則恒氣固謬而定氣亦非真皆以子正日躔未交節氣宮度為本日已過節氣宮度為次日推時刻之法以本日實行與次日實行相減為一率日法為二率本日子正實行與節氣相減為三率如推立春則以本日實行與一宮十五度相減餘倣此求得四率為距子正後之分數乃以時刻收之即得節氣初正時刻如實行適與節氣宮度相符而無餘分即為子正初刻江氏永曰後惟月離交食皆有求用時之法此求節氣即以平時為真時矣若宻測太陽時刻方位仍當用求時差之法至於各省節氣時刻皆以京師為主視偏度加減之偏東一度加時之四分偏西一度減時之四分刻江氏永曰地是圓形人所居東西不同經則時異如此方視太陽正中為午正東方視之已過中西方視之未至中故節氣時刻西早而東晚地經差十五度者時差四刻故一度加減四分求日出晝夜時刻以本天半徑為一率北極髙度之正切以髙度查八線表得之表詳數理精藴後倣此為二率本日距緯度以實行查黄赤距緯表得之表詳後之正切為三率求得四率為赤道之正弦江氏永曰從圓心出線至北極為半徑則極髙切線與赤道平行而距緯切線與半徑線平行其勢同故能為句股比例距緯切線最大者四三四六四也必求赤道者時以赤道為宗也檢八線表得日出入在卯酉前後赤道度變為時分一度變時之四分十五分變時之一分凡言變時者倣此十江氏永曰太陽與赤道平行左旋繞地一周三百六度分十二時故一宮當一大時十五度當一小時一度當時四分此赤道度變時之理也以加減卯酉時即得日出入時刻春分前秋分後以加卯正為日出時刻以減酉正為日入時刻春分後秋分前以減卯正為日出時刻以加酉正為日入時刻自日出至日入為晝刻與九十六刻相減餘為夜刻江氏永曰南方極出地度少晝夜之差漸平北方極出地度多晝夜之差漸増地圎之故也度如求出入地平方位則以本天半徑為一率北極髙之正割為二率本日距緯度之正弦為三率求得四率為正弦檢八線表得出入卯酉地平經度春分後在卯酉北秋分後在南二十八宿黄道經緯度鈐黄道經度黄道緯度斗初宫五度五十分南三度五十分牛初宮二十九度二十七分北四度四十一分女一宮七度二十三分北八度一十分虚一宮十九度一分北八度四十二分危一宮二十九度北十度四十二分室二宮十九度七分北十九度二十六分壁三宮四度四十八分北十二度三十五分奎三宮十七度五十四分北十五度五十八分婁三宮二十九度三十三分北八度二十九分胃四宮十二度三十三分北十一度十六分昴四宮二十四度四十八分北四度一十分畢五宮四度三分南二度三十七分參五宮十八度一分南二十三度三十八分觜五宮十九度二十二分南十三度二十六分井六宮初度五十五分南初度五十三分鬼七宮一度二十分南初度四十八分柳七宮五度五十二分南十二度二十七分星七宮二十二度五十六分南二十二度二十四分張八宮一度十九分南二十六度十二分翼八宮十九度二十三分南二十二度四十一分軫九宮六度二十三分南十四度二十五分角九宮十九度二十六分南一度五十九分亢十宮初度三分北二度五十八分氐十宮十度四十一分北初度二十六分房十宮二十八度三十一分南五度二十三分心十一宮三度二十一分南三度五十五分尾十一宮十度五十四分南十五度箕十一宮二十六度五十分南六度五十六分右二十八宿鈐乃律元甲子年之黄道經緯度分其緯度距黄道之南北千古不移而經度則每嵗東行五十一秒所謂嵗差也故求宿度必須以距律元積年與嵗差五十一秒相乗得數加入宿鈐方得所求年各宿實在之度分江氏永曰赤道宗北極黄道宗黄極而恒星天亦以黄極為宗星距黄極有定度其經度之東移者恒與黄道平行故距黄道之南北千古不移而距赤道時時不同古在赤道南者今或在北古在北者今或在南術家但知天樞一星去極逺近不同不知普天星宿皆有移動也每嵗東行五十一秒由積候而得雖或稍有贏胸亦必遅之又久而後可見益此二十八宿度數與崇禎戊辰所測者間有損黄赤距度表距度表按二分二至分順逆列之二分後各宮列於上三宮至五宮為春分後係北緯九宮至十一宮為秋分後係南緯二至後各宮列於下六宮至八宮為夏至後係北緯初宮至二宮為冬至後係南緯太陽實行在上六宮則用右行順度在下六宮則用左行逆度用表之法以實行之宮對實行之度其縱横相遇之數即為所求之距度也江氏永曰假如太陽實行七宮一十一度于下列七宮對左行一十一度横查之一十七度三十分二十九秒係北緯又如實行十一宮八度於上列十一宮對右行八度横查之二十一度四十一分二十五秒係南緯表只列整度其分數用中比例法求之江氏永曰六十分化三千六百秒為一率實行零分化秒為二率本度距緯與次度距緯相減餘分化秒為三率求得四率為秒以分收之視次度多于本度者加之少於本度者減之算表之法以本天半徑為一率黄赤大距之正弦三九八六二為二率距春秋分黄道度之正弦為三率求得四率為正弦以正弦減八線表得黄赤距度分分下之秒視表内次一分之數用中比例法求之黄赤大距古多今少古測日度二十四度當今整度二十三度三十九分元至元時日度二十三度九十分當今整度二十三度三十三分明季測整度二十三度三十一分半此表大距二十三度二十九分半个時所測向後又當漸減此一事亦不知何時而起何時而止者也蕙田案以上推日躔法推月離法用數太隂每日平行四萬七千四百三十五秒二一一七七江氏永曰用前後兩月食諸行相近者計其積日得日平行十三度一十分三十五秒竒太隂小時四刻平行一千九百七十六秒四五九二一五七江氏永曰日平行二十四分之三十二分五十六秒二十七微竒月孛毎日平行四百一秒七七四七七江氏永曰月本輪最髙㸃也其對衝即古法入轉日平行六分四十一秒五微竒以減太隂日平行為月自行正交毎日平行一百九十秒六四江氏永曰月道交黄道自南而交入於北之一㸃也其對衝為中交日平行三分一十秒三十六微竒其行左旋正交謂之羅㬋中交謂之計都古法以正交為中中交為正本天半徑一千萬江氏永曰本天距地比例數見推月食法本輪半徑五十八萬均輪半徑二十九萬江氏永曰本輪之心在本天均輪之心在本輪均輪半徑得本輪半徑之半本輪左旋均輪右旋負圈半徑七十九萬七千江氏永曰負圈者所以負均輪而轉次輪者也其半徑合均輪全徑及次輪半徑其心在均輪上當次輪最近㸃對衝之處負圈隨均輪右旋則次輪亦隨之後雖不用負圈而負圈在其中無負圈則次輪無為帶動者矣次輪半徑二十一萬七千江氏永曰次輪者月離日之輪也五星次輪心在均輪上獨月次輪心在負圈上其周恒與均輪相切負圈帶之右旋而次輪之度自左旋月離日一度次輪上兩度謂之倍離朔至望望至朔而兩周次均輪半徑一十一萬七千五百江氏永曰次均輪者月實體所在也五星實體在次輪上月獨有次均輪其心在次輪上一月兩周朔望時最近於均輪心兩弦時最逺于均輪心月在次均輪上左旋從輪心出線距地心作十字線於輪面朔望時恒當直線之下兩弦時恒當直線之上朔弦與望弦間恒在横線之左弦望與弦朔間恒在横線之右亦一月而兩周黄赤大距二十三度二十九分三十秒江氏永曰康熙甲午年所測也朔望黄白大距四度五十八分三十秒兩弦黄白大距五度一十七分三十秒江氏永曰白道者月道也朔望月在次均輪之底故兩道稍斂而狹兩弦月在次均輪之頂故兩道稍張而濶其中數五度八分太隂平行應一宮八度四十分五十七秒一十六微江氏永曰律元天正冬至次日壬申子正時太隂平行宮度也授時律諸應皆起冬至日時刻此諸應起冬至次日子正使于積算整日也後月孛正交及五星諸應倣此月孛應三宮四度四十九分五十四秒九微正交應六宮二十七度一十三分三十七秒四十八微求天正冬至詳日躔求太隂平行置中積分詳日躔加氣應小餘江氏永曰六五六三七四九二六也減天正冬至小餘江氏永曰所求天正冬至日之餘數也得積日上考徃古則減氣應小餘加天正冬至小餘與太隂毎日平行相乗滿周天秒數去之餘數收為宮度分以加太隂平行應得太隂年根上考徃古則減時江氏永曰加氣應小餘者從律元辛未日子正起也減天正冬至小餘者欲得整日也律元冬至日子正至今年冬至日子正得積日若干猶之律元冬至次日子正至今年冬至次日子正也太隂平行應實律元冬至次日子正之宮度分以加積日之平行即是今年冬至次日之平行矣故為太隂年根又置太隂每日平行以距天正冬至之日數乗之得數為秒以宮度分收之與年根相併滿十二宮去之為太隂平行求月孛平行以積日與月孛每日平行相乗滿周天秒數除之餘數收為宮度分以加月孛應得月孛年根上考徃古則減又置月孛每日平行以距天正冬至之日數乗之得數為秒以宮度分收之與年根相併滿十二宮收之為月孛平行求正交平行以積日與正交每日平行相乗滿周天秒數去之餘數收為宮度分以減正交應正交應不足減者加十二宮減之得正交年根上考徃古則加順江氏永曰交行左旋故減逆加又置正交每日平行以距天正冬至之日數乘之得數為秒以宮度分收之以減年根年根不足減者加十二宮減之為正交平行求用時太隂平行以本日太陽均數變時得均數時差均數為加者時差為減均數減者時差為加變江氏永曰假如均數一度四十五分三十秒一度四分四十五分變三分三十秒變二秒併之得七分零二秒又以本日太陽黄赤經度黄經即實行詳日躔求赤經法見後求月出入時刻條相減餘數變時得升度時差二分後為加二至後為減乃以兩時差相加減為時差總兩時差同為加者則相併為總其號仍為加同為減者亦相併為總其號為減兩時差一加一減者則相減為總加數大為加號減數大為減號化秒與一小時太隂平行相乗為實以一度化秒為法除之江氏永曰一度當作一小時一小時平行若干秒則今有之時差當得若干秒也得數為秒以分收之得時差行以加減太隂平行時差總為加者則減為減者則加相江氏永曰時分與度分加減每反為用時太隂平行江氏永曰用時何也凡時刻有二一為時刻之數一為時刻之位太陽左旋依赤道平轉閱太虚天三百六十度其數有常因其一周之運而截之為時刻此時刻之數也隨人所居之地必有正子午圈太陽一日之軌迹必過此圈加臨於正子正午乃為子午則亦依赤道均分之為時刻此時刻之位也二者同宗赤道而常有差其差之根有二一由太陽有平行實行平行者輪心實行者日體其與時刻之數相符者乃本輪心所到而日體或在其左右均數減則方位已過而時有加分均數加則方位未及而時有減分矣一由黄赤道有升度差二分後黄道斜而赤道直赤道之升度少則太陽所到之位已過而時有加分二至後黄道度大赤道度狹赤道之升度多則太陽所到之位未及而時有減分矣前所算毎日子正時者乃時刻之數而日體未必正加於子之位故合兩種時差定其加減之分乃為用時從用時至平時其間太隂必有行分故以加減子正之平行為用時太隂平行在太陽實行惟最卑最髙無時差而時差最大者今時二分後八日黄赤升度惟二至二分無時差而時差最大者恒在四立節故二差參差不齊必合而求其總乃為真時差崇禎新書日差表既舛誤月離交食皆有加減時表又止算升度之時差不以均數時差相較皆未為精宻也求初實行置用時太隂平行減月孛平行江氏永曰太隂平行不及減者加十二宮減之後倣此得引數江氏永曰太隂距月孛度用直角三角形以本輪半徑之半為對直角之邊江氏永曰均輪半徑二十九萬居本輪半徑之半故本輪内減去均輪半徑其餘為本輪半徑之半以引數為一角求得對角之邊江氏永曰半徑千萬為一率引數正弦為二率對直角之邊為三率求得四率為對角之邊引數過象限以後用二率之法詳日躔求實行條三因之江氏永曰本輪半徑之半二十九萬合本輪均輪半徑八十七萬是三其二十九萬也故小邊無論大小皆三因之三之一為對角之邊三之二即均輪上倍引數度之通弦均輪右旋必倍引數其理與太陽同此邊所抵即次輪最近㸃所在又求得對餘角之邊江氏永曰半徑千萬為一率引數餘弦為二率對直角之邊為三率求得四率為對餘角之邊之用二率法同上與半徑相加減引數九宮至二宮相加三宮至八宮相減江氏永曰初宮起最髙故與太陽加減異復用直角三角形以三因數為小邊加減半徑數為大邊直角在兩邊之中求得對小邊之角為初均數江氏永曰大邊為一率小邊為二率本天半徑為三率求得四率為正切以正切線檢表得均角度言初均者對後二三均也并求得對直角之邊為次輪最近㸃距地心線為求次均數之用為江氏永曰本天半徑為一率初均數度之正割線二率大邊為三率求得四率為次輪最近㸃距地心線次輪與均輪相切最近㸃謂最近於均輪心置用時太隂平行以初均數加減之引數初宮至五宮為減六宮後為加為初實行江氏永曰初實行者次輪最近㸃所到之度惟定朔定望此㸃即為次均輪之心月在次均輪之底與距地心線正相值即以初實行為月實行非定朔定望更有二三均加減求白道實行置初實行減本日太陽實行得次引即月距日度必江氏永曰太陽實行求日躔時所得用實行乃得實距後五星同用三角形江氏永曰斜三角也以次輪最近㸃距地心線為一邊江氏永曰此線為初實行之界線倍次引之通弦千萬為一率次引之正弦為二率次輪半徑為三率求得四率倍之即通弦故江氏永曰月距日一度次輪上左旋二度用倍次引之通弦通弦者正弦之倍也為一邊江氏永曰此邊所指即次均輪心所到以初均數與引數減半周之度引數不及半周則與半周相減如過半周則減去半周之江氏永曰引數減半周之度即均輪心距最卑度相加江氏永曰初均數有加有減此與引數減半周之度恒相加何也凡次輪最近㸃距地心線惟初宮六宮之初度無初均數者其線正有初均數則線必斜其斜線之數即初均之數試置最近㸃于次均輪心借次均輪上作度初均為加者度在輪之左半斜線穿心至近頂分輪為兩其左半必一百八十度也而訃度必從輪之正頂始正頂在斜線之右則當加此數矣初均為減者度在輪之右半斜線穿心至近頂亦分輪之右半為一百八十度而正頂在斜線之左則亦當加此數矣故無論初均為加為減恒用加又以次引距象限度次引不及象限則與象限相減如過象限及過三象限則減去象限及三象限用其餘如過二象限則減去二象限餘數仍與象限相減周江氏永曰次輪上為倍離度次引一象限倍之則半次引距象限度猶之倍次引距半周度也次引二象限則次輪一周矣故過二象限與不過象限同過三象限與過一象限同加減之初均數減者次引過象限或過三象限則相加不過象限或過二象限則相減初均加者反是倍江氏永曰初均數與引數減半周之度相加即次引度之角故次引適足一象限者無加減其有距象限度如初均減者次引未及象限則相減已過象限則相加初均加者次引未及象限則相加已過象限則相減所作角左右低昻之勢異也假如初均數與引數減半周之度相加為一百五十度是初均數減則與象限相減為六十度自六十度順數至一百五十度皆相減過此則相加又如初均數加引數減半周之度為三十度亦是初均數減則與象限相減為六十度次引六十度距象限三十度相減無餘過此仍與三十度相減滿象限而後相加又如初均數加引數減半周之度為二百一十度減去半周餘三十度是初均數加則與象限相加為一百二十度自一百二十度逆數至三十度皆相加過此則相減又如初均數加引數減半周之度為三百三十度減去半周餘一百五十度亦是初均數加加一象限為二百四十度自二百四十度逆數至一百五十度皆相加其間次引六十度距象限三十度相加適足半周過此仍相加加一象限而後相減為所夾之角若相加過半周則與全周相減其餘則為所夾之角若相加適足半周或相減無餘則無二均數若次引為初度或一百八十度亦無二均數減江氏永曰所夾之角外角也相加過半周與全周相減其餘為所夾之角亦外角也以外角減半周即本角將用半外角切線求二均故即以外角為所夾之角次輪之角在輪周借次均輪可顯角度心相加適足半周或相減無餘者與次輪最近㸃距地線正相值故無二均次引為初度與一百八十度者定朔定望也與距線合為一故亦無二均朔望距線穿月體無二均則無三均非朔望而線相值者不穿月體雖無二均仍有三均求得對通弦之角為二均數如無初均數者以次輪心距地心線為一邊次輪半徑為一邊次行倍度為所夾之角江氏永曰二均數者次均輪心所到也當用切線分外角法求之距地心線與倍次引之通弦相併為一率相減之餘為二率半外角切線為三率求得四率為半較角切線以半較角減半外角其餘為對通弦之角無初均者初宮與六宮之初度也次輪心距地心線以相減得之本輪半徑内減去均輪次輪兩半徑五十萬七千餘七萬三千初宮初度與半徑相減為九百九十二萬七千次引倍度為所夾之角亦外角也求二均亦倣前法邊總與邊較若半外角切線與半較角切線以半較角減半外角得對次輪半徑之角隨定其加減號以初均數與均輪心距最卑之度相加為加減泛限適足九十度則二均加減與初均同如泛限不及九十度則與九十度相減餘數倍之為加減限初均減者以次引倍度初均加者以次引倍度減全周之餘數皆與限相較並以大於限度則二均之加減與初均同小於限度者反是江氏永曰泛限適足九十度者本輪三宮九宮之初也此際次輪皆出距地心線之外三宮初均減而次輪又在其右則同為減九宮初均加而次輪又在其左則同為加其他上下諸宮距地心線皆有割入次輪之度至初宮六宮之初度割次輪各半而止皆以此線所割之度為限其度皆與九十度減餘之倍數也二均與限相較而大者在距線之外故與初均之加減同相較而小者入距線之内故減變為加加變為減并求得對角之邊為次均輪心距地心線江氏永曰二均角之正弦為一率次引倍度之通弦為二率夾角之正弦為三率求得四率為次均輪心距地心線又以此線及次引用三角法求得三均數次均輪心距地心線為一邊次均輪半徑為一邊次引倍度倍為所夾之角求得對次均輪半徑之角為三均數次江氏永曰三均數月體所值也次均輪度亦左旋與引倍度相應其度從輪下起所夾之角為本角過半周者與全周相減用其餘為所夾之角亦本角也本角減半周為外角亦用切線分外角法求之邊總與邊較若半外角切線與半較角切線以半較角減半外角其餘為所求之三均角隨定其加減號次引倍度不及半周為加過半周為減月江氏永曰不及半周者月在輪左故加過半周者在輪右故減乃以二均數與三均數相加減為二三均數兩均數同號則相加異號則相減表江氏永曰月離二三均加減即此數以加減初實行二均三均同為加號者仍為加同為減號者仍為減如一為加號一為減號者加數大則加減數大則減為白道實行求黄道實行用弧三角法江氏永曰斜弧三角也求得黄白大距及交均以黄白大距中數為一邊黄白大距半較為一邊次引倍度為所夾之角求得對邊為黄白大距並求得對半較之角為交均一江氏永曰朔望黄白大距小兩弦黄白大距大其較十九分折其中數五度八分半較則九分半也欲求毎度之黄白大距有兩邊夾一角求對角之邊正法須用兩次乗除㨗法以加減代一次乗除其法兩邊相加為總弧相減為較弧以兩弧餘弦相減折半為初數視所夾角不過象限者用正矢過一象限者用大矢過二象限與過一象限同過三象限與不過象限同以其矢與初數相乗半徑為法除之得對弧較弧兩矢之較以矢較加入較弧矢得對弧矢以矢減半徑為餘弦以餘弦減八線表得所求黄白大距前有兩邊又求得一邊因以求對半較之角是三邊求角也亦倣前法而倒用四率以黄白大距中數為一邊求得黄白大距為一邊兩邊相較為總弧相減為較弧各以餘弦相減折半為初數以半較對弧與較弧兩矢之較與半徑相乘初數為法除之得所求角之矢得矢即得餘弦因以得對半較之角其謂之交均何也兩交亦有加減均度也黄白大距中數一邊為緯半交一邊為經兩交㸃皆在經圈惟朔望兩弦二邊相合無交均角則兩交㸃如其平行之度過此即有次引倍度角亦必有交均角而交㸃漸離其平行之處矣次引倍度滿象限即半較亦成正線與白道經圈平行而均度最大得一度四十六分此一度四十六分即半較九分半所成蓋半較在五度有竒之處則小在九十度處則大故也以交均加減正交平行次引倍度不及半周為減過半周為加而江氏永曰交行左旋減者更進而前加者則却後也得正交實行江氏永曰交行常為前却之行惟朔望兩弦平行即實行又加減六宮為中交實行江氏永曰正交移則對宮者亦移置白道實行減正交實行得距交實行江氏永曰白道實行不及減者加十一宮減之距交只論正交後以距交查切線或距正交或距中交以本天半徑為一率黄白大距之餘弦為二率距交實行之正切為三率求得四率為黄道之正切江氏永曰此正弧三角兩角與一邊求對餘角之邊也黄白大距為黄白交角距交實行為白道一邊又黄白距緯從黄極出線截白道交黄道其交必成正角又為一角今求對餘角之黄道同升度法以兩角之正弦餘弦比兩邊之正切亦即句股形大弦與大句若小弦與小句也後凡求黄赤五星本道求黄皆倣此本天半徑為一率即正角之正弦也後凡正弧三角用半徑者倣此檢八線表得度分與距交實行相減餘為升度差以加減白道實行距交實行不過象限或過二象限為減過象限或過三象限為加加江氏永曰此與前求用時條黄赤升度時差二分後二至後減同理距交不過象限或過二象限猶之二分後也過象限或過三象限猶之二至後也時與度相反故彼為加者此為減彼為減者此為加為黄道實行江氏永曰月不行黄道然求宿度求合朔弦望求交宮皆論黄道度故必先求黄道實行求黄道緯度以本天半徑為一率黄白大距之正弦為二率距交實行之正弦為三率求得四率為距緯之正弦檢八線表得黄道緯度距交實行初宮至五宮為黄道北六宮至十一宮為黄道南三江氏永曰距交實行之正弦謂黄道距交度凡正弧角四率俱用正弦者正角有所對之角而所求之邊又有所對之角也求宿度依日躔求宿度法江氏永曰各宿毎年加五十一秒求得本年黄道宿鈐以黄道實行月孛正行及正交中交實行各度分視其足減宿鈐内某宿則減之餘為各種宿度求合朔弦望太隂實行江氏永曰謂黄道實行與太陽實行同宮同度為合朔限距三宮為上弦限距六宮為望限距九宮為下弦限皆以太隂未及限度為本日已過限度為次日求時之法以太陽本日實行與次日實行相減又以太隂本日實行與次日實行相減兩減餘數相較為一率江氏永曰兩減餘數相較是交限日太隂距太陽之實行也以一日實行為法比出距限餘分應得若干時刻日法為二率本日太陽實行加限度上弦加三宮望加六宮下弦加九宮減本日太隂實行餘為三率江氏永曰求合朔即于本日太陽實行内減太隂實行餘為三率十一率三率皆以度化分分下有秒約三為五六為後求交宮時刻倣此求得四率為距子正之分數如法收之得合朔弦望時刻求交宮時刻以太隂本日實行與次日實行相減未過宮為本日已過宮為次日餘為一率日法為二率太隂本日實行不用宮與三十度相減餘為三率求得四率為距子正之分數如法收之得交宮時刻求正升斜升横升合朔日太隂實行自子宮十五度至酉宮十五度為正升江氏永曰春分前後一宮半也自酉宮十五度至未宮初度為斜升江氏永曰夏至前一宮半也自未宮初度至寅宮十五度為横升江氏永曰夏至後五宮半也自寅宮十五度至子宮十五度為斜升江氏永曰冬至前半宮後一宮半也求太隂出入時刻以本日太陽黄道經度求其赤道度以本天半徑為一率黄赤大距之餘弦為二率本日太陽距春秋分黄道經度之正切為三率求得四率為赤道經度之正切其江氏永曰時刻宗赤道故必先求太陽赤道度求法與白道求黄道同理又用弧三角法江氏永曰斜弧三角也以太隂距黄道為一邊江氏永曰前既求得黄道距緯度分矣距緯在北減九十度距緯在南加九十度為太隂距黄極度黄赤大距為一邊江氏永曰黄赤大距與黄極距北極等北極為心黄極為界規一小輪大距正弦恒為半徑此一邊即小輪半徑度太隂距冬至黄道經度為所夾之外角過半周者與全周相減用其餘取江氏永曰外角減半周即本角求對邊用本角矢銳角用正矢鈍角用大矢求得對邊江氏永曰對所夾本角之邊為太隂距北極度江氏永曰求法兩邊相併為總弧相減為較弧兩弦各取餘弦相加折半為初數與角之矢相乗半徑千萬除之得對弧較弧兩矢之較以矢較加較弧矢得對弧矢以矢減半徑為餘弦以餘弦檢表得對邊加減九十度得赤道緯度不及九十度者與九十度相減餘為北緯過九十度者減去九十度餘為南緯又求得近北極之角為太隂距冬至赤道經度江氏永曰前有兩邊又求得距北極一邊用三邊以求又一角為近北極之角其度即太隂距冬至赤道經度求法以黄赤大距為一邊太隂距北極為一邊兩邊相併為總弧相減為較弧各取餘弦視總弧過象限兩餘弦相加不過象限相減折半為初數又以較弧矢與對邊之矢相減半徑乘之初數為法除之得所求角之矢矢減半徑為餘弦檢表得太隂距冬至赤道經度乃以本天半徑為一率北極髙度之正切為二率太隂赤道緯度之正切為三率求得四率為赤道正弦江氏永曰赤道緯度正切與半徑平行赤道正弦與極髙正切平行故能為句股比例與求日出入卯酉前後赤道度同理檢八線表得太隂出入在卯酉前後赤道度太隂在赤道北出在卯正前入在酉正後太隂在赤道南出在卯正後入在酉正前江氏永曰與春秋分前後太陽出入同理以加減前減後加太隂距太陽赤道度太隂赤道經度内減去太陽赤道經度即得不足減者加十二宮減之得數變時江氏永曰假令距太陽九十度則變為六小時自卯正酉正後計之出地自卯正後入地自酉正後再加本時太隂行度之時刻約一小時行三十分變為時之二分用江氏永曰月離不平行所差者微可約數如六小時約行三度為時十二分即得太隂出入時刻江氏永曰日躔月離兩篇不言求閏月者既求得定氣定朔視無中氣之月置閏不必求也古法置閏常在嵗終至漢太初律始改用無中氣之月然猶未知定朔也自唐以來始用定朔然不用定氣則無中氣之月未必果無中氣也至我月朝始兼定朔定氣以置閏而閏始真百餘年來正與十月十一月十二月未置閏者太陽最卑近冬至此數月日行速節氣縮與閏不相值故也蕙田案以上推月離法右推步法上五禮通考卷一百九十五
