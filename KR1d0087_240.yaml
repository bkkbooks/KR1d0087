body:
  text: 五禮通考卷二百三十刑部尚書秦蕙田撰賓禮十一諸侯遣使交聘儀禮聘禮鄭目録云大問曰聘諸侯相於久無事使卿相問之禮小聘使大夫周禮曰凡諸侯之邦交嵗相問也殷相聘也世相朝也於五禮屬賓禮卿疏大行人云上公九介侯伯七介子男五介諸侯之各下其君二等上公七介侯伯五介子男三介若小聘使大夫又下其卿二等此聘禮是侯伯之卿大聘以其經云五介又及竟張旜孤卿建旜據侯伯之卿之聘也威氏世佐曰此篇所陳主次國大聘之禮然以是而差次之則大國小國之大聘及凡諸侯之小聘皆可得而覩其略矣凡言諸侯之邦交惟同方嶽者耳非盡千八百國而相為朝聘也夫同在方嶽之內而一往一來以親仁善鄰恤小事大此情之所不能已而禮乏最巨者也聘禮君與卿圗事注圗謀也謀聘故及可使者謀事者必因朝其位君南面卿西面大夫北面士東面行疏謀聘者為久無事則聘故謂有事故或因聘或特記云若有故則卒聘束帛加書將命是因聘者也晉侯使韓穿來言汶陽之田之類是特行者也可使者謂於三卿之中選可使者也儀禮之內見諸侯三朝燕朝燕禮是也射朝大射是也不見路門外正朝正朝當與二朝面位同燕禮大射皆云卿西面大夫北面士東面公降階南面揖之是以知正朝面位然也遂命使者注遂猶因也既謀其人因命之也聘使卿中疏人亦在謀事之故云因命使者再拜稽首辭注辭以不敏君不許乃退注退反位也受命者必進敖氏繼公曰使者少進北面乃拜君親命之故拜而後辭也君不許其辭故不答拜使者亦當許而後退欽定義疏使者許諾而退不再拜稽首者辭時已拜也此所謂一辭而許曰禮辭者使於四方不辱君命人臣之素志也既圖事戒上介亦如之注既已也戒猶命也已謀事乃命上介難於使者易於介李氏如圭曰介副也上介使大夫敖氏繼公曰使者言命上介言戒異尊卑也如如其禮辭也使者與介必辭者不敢以專對才自許謙敬也凡聘使有故則上介攝其事宰命司馬戒衆介衆介皆逆命不辭注宰上卿二君事者也諸侯謂司徒為宰衆介者士也士屬司馬周禮司馬之屬司士掌作士適四方使為介逆猶受也疏天子有六卿天地四時之官諸侯兼官有三卿立地官司徒兼冡宰立夏官司馬兼春官立冬官司空兼秋官故諸侯謂司徒為宰也不辭者賤不敢辭敖氏繼公曰衆介受命亦當再拜稽首蕙田案以上命使介宰書幣注書聘所用幣多少也宰又掌制國之用疏謂聘鄰國享君及夫人問卿之等幣敖氏繼公曰周官冡宰以九式均節財用六曰幣帛之式故此主書幣也命宰夫官具注宰夫宰之屬也命之使衆官具幣及所宜齎張氏爾岐曰命之者宰也宰既書用幣之數遂命宰夫使官具之周禮宰夫掌百官府之徴令惠田案以上具幣齎及期夕幣注及猶至也夕幣見行之日夕陳幣而視之重聘也敖氏繼公曰此云及期則上亦當有請期告期之禮文略耳楊氏復曰夕幣之禮夕陳幣以授使者然授幣而未授圭何也圭聘禮之重者也不可以預授俟使者釋幣於禰釋幣於行乃遂載旜帥衆介以授命於朝於是君朝服南鄉而授之以圭所以謹之重之也使者朝服帥衆介夕注視翼事也盛氏世佐曰此暮夕於君而君臣皆朝服重其事也常時夕元端管人布幕于寢門外注管猶館也館人謂掌次舍帷幕者也布幕以承幣寢門外朝也疏寢門外朝謂路門外即正朝處張氏爾岐曰幕非在上之幕乃布之地以為藉者官陳幣皮北首西上加其奉於左皮上馬則北面奠幣於其前注奉所奉以致命謂束帛及玄纁也馬言則者此享主用皮或時用馬馬入則在幕南皮馬皆乘於疏官陳幣即上文官具者也館人布幕於地官陳幣其上所奉謂後享時奉入以致命束帛加璧以享君元纁加琮以享夫人鄭不言璧琮者璧琮不陳厥明乃授之也敖氏繼公曰北首變於執也西上放設時之位也左皮尊故加幣於其上馬入則亦右牽之前謂左馬之前幕之上也此皮若馬之位其享主君者在西享夫人者在東使者北面衆介立于其左東上注既受行同位也位在幕南疏未受行已前卿大夫士面位各異卿大夫在幕東西面北上注大夫西面辟使者今疏此謂處者大夫常北面與卿同西面故云辟使者宰入告具于君君朝服出門左南鄊注入告入路門而告李氏如圭曰出門而左君在東也史讀書展幣注展猶校録也史幕東西面讀書賈人坐撫其幣每者曰在必西面者欲君與使者俱見之也東疏賈人當在幕西面撫之敖氏繼公曰書謂享幣之數書於方者也宰執書告備具于君授使者使者受書授上介注史展幣畢以書還授宰宰既告備以授使者其受授皆北面者疏授受皆北面者當宰以書授使者之時宰來至使之東北面授使者使者北面授介三者皆北面向君故也公揖入注揖禮羣臣訖疏以展幣授使者禮畢故入於寢也官載其幣舍于朝注待旦行也前疏官謂官人從賓行者與官陳幣者異上介視載者注監其安處之畢乃出於疏注言上介出不言餘人出則上文舍朝以守幣也所受書以行注為當復展敖氏繼公曰所受書謂上介所受於使者也别言以行見其不與幣同處觀承案上介所受二條當作一氣讀蓋視字雙綰乃視其所載之物所受之書以驗其相符否也義疏甚明似宜遵之蕙田案以上授使幣厥明賓朝服釋幣于禰注告為君使也賓使者謂之賓尊之也天子諸侯將出告羣廟大夫告禰而已凡釋幣設洗盥如祭廟疏朝服者卿大夫朝服祭故還服朝服告也大夫三降天子諸侯不得並告故直告禰而已若父在則告祖釋幣於祖廟告無牲直用幣而已執幣須潔當有洗以盥手其設洗如祭祀之時有司筵几於室中祝先入主人從入主人在右再拜祝告又再拜注更云主人者廟中之稱也祝告告以主人將行也釋幣制玄纁束奠於几下出注祝釋之也凡物十曰束玄纁之率玄居三纁居二朝貢禮云純四只制丈八尺長疏玄三纁二率皆如此也純謂幅之廣狹制謂舒之短周禮趙商問只長八寸四八三十二幅廣三尺二寸大廣非其度鄭君答云古積畫悮為四當為三三咫則二尺四寸矣雜記云納幣一束束五兩兩五尋然則每卷二丈若作制幣者每卷丈八尺為制合卷為匹也張氏爾岐曰制玄纁束者丈八尺之玄纁其數十卷也主人立於户東祝立於牖西注少頃之間示有侯於神又入取幣降卷幣實於笲埋於西階東注又入者祝也埋幣必盛以器若藏之然敖氏繼公曰幣必埋之者神物不欲令人褻之又釋幣於行注告將行也行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毁宗躐行出于大門則行神之位在廟門外西方不言埋幣可知也今時民春秋祭祀有行神古之遺禮乎有疏天子諸侯常祀在冬月令祀行是也大夫雖三祀行無常祀因行使始出有告禮而已此謂平治道路之神至于出城又有軷祭祭山川之神諭無險難也祭山川之神有軷璮此祭行神亦當有軷壤月令注云行至廟門外之西為軷壇厚二寸廣五尺輪四尺是也敖氏繼公曰此釋幣之儀與室中者異故不蒙如之也遂受命注賓須介來乃受命也言遂者明自是出不復入疏自釋幣於門不復更入若然則待介於門矣上介釋幣亦如之注如其於禰與行欽定義疏衆介不釋幣職輕且辟大夫禮也蕙田案以上將行告禰及行上介及衆介俟於使者之門外注俟待也待於門外東面北上疏依賓客門外之位使者載旜帥以受命於朝注旜旌旗屬也載之者所以表識其事也周禮曰通帛為旜又曰孤卿建旜至於朝門使者北面東上疏諸侯三門臯應路路門外有常朝位下文君臣皆朝列位乃使卿進使者使者乃入至朝即此朝門者臯門外矣敖氏繼公曰使者俟命於雉門外蕙田案諸侯三門庫雉路無臯應使者所俟蓋庫門外也賈疏誤敖氏以為雉門外亦非君朝服南鄊卿大夫西面北上君使卿進使者注進之者使者謙不敢必君之終使己使者入及衆介隨入北面東上君揖使者進之上介立於其左接聞命注進之者有命宜相近也接猶續也敖氏繼公曰入入雉門而右也接聞命釋所以立於其左之意其實此時君不發命也上介必接聞命者為使者或有故則上介攝使事宜與聞之賈人西面坐啓櫝取圭垂繅不起而授宰注賈人在官知物賈者繅所以藉圭也其或拜則奠於其上今文繅作璪公疏繅有二種一者以木為中幹以韋衣之天子五采侯伯三采子男二采采為再行下記及典瑞皆有其文此為繅也下記云絢組尺鄭亦謂之繅若韋版為之者奠玉於上此則無垂繅屈繅之事若絢組為之者所以繫玉於韋版使不失墜此乃有屈垂之法則此經所云是也鄭以承玉繫玉二者所據雖異所用相將是以和合解之朱子曰今案在官上疑有庶人二字敖氏繼公曰繅以帛為之表玄裏纁所以藉玉而又掩其上者也垂纁謂開之也開而不掩則其繅垂授玉不起賤者宜自别也宰於其右亦坐受之髙氏愈曰垂繅以示文屈繅以示敬宰執圭屈繅自公左授使者注屈繅者欽之禮以相變為敬也自公左贊幣之義自疏少儀云詔辭右贊幣自左敖氏繼公曰屈繅以繅掩玉之上也掩之則其繅屈欽定義疏此時宰使者皆裼不襲執玉當襲而不襲者以非正行聘故苐率其常服也使者受圭同面垂繅以受命注同面者宰就使者北面並授之既授之而君出命矣凡授受者授由其右受由其左既述命同面授上介注述命者循君之言重失誤敖氏繼公曰此授受皆同面别於聘時賓主之儀也上介受圭屈繅出授賈人衆介不從注賈人將行者在門外北面疏上介送圭向外與賈人反來故衆介不從以待之云賈人將行者對上賈人出玉是留者也受享束帛加璧受夫人之聘璋享玄纁束帛加琮皆如初注享獻也既聘又獻所以厚恩惠也帛今之璧色繒也夫人亦有聘享者以其與己同體為國小君也其聘用璋取其半圭也君享用璧夫人用琮天地配合之象也圭璋特逹瑞也璧琮有加往德也周禮曰瑑圭璋璧琮以眺聘疏此經中三事上經已受聘君圭此經受享君束帛加璧又受聘夫人璋又受享夫人琮上文官陳幣不陳璧琮是以此經受璧連言束帛玄纁者以相配之物故兼言之也蕙田案享君之束帛經無明文鄭以為與璧色同亦未詳何色盛世佐以為色素亦恐未然故闕之遂行舍於郊注於此脫舍衣服乃即道也曲禮曰凡為君使己受命君言不宿於家疏脫舍朝服服深衣而行欽定義疏舍謂止宿於館也舍郊猶云宿於郊耳注謂脫舍衣服謬也蕙田案賈疏謂在道脫朝服服深衣可補經文之闕然以解經文舍字則太鑿矣斂旜注此行道耳未有事也斂藏也蕙田案以上受命遂行若過邦至於竟使次介假道束帛將命於朝曰請帥奠幣注至竟而假道諸侯以國為家不敢直徑也將猶奉也帥猶道也請道已道路所當由敖氏繼公曰假道禮輕故使次介奠幣者賤不敢授也下大夫取以入告出許遂受幣注言遂者明受其幣非為許故也容其辭讓不得命也餼之以其禮上賓大牢積唯芻禾介皆有餼注凡賜人以牲生曰餼餼猶稟也給也以其禮者尊卑有常差也常差者上賔上介牲用大牢羣介用少牢米皆百筥牲陳於門內之西北面米設於中庭上賔上介致之以束帛羣介則牽羊馬上賓有禾十車芻二十車禾以秣馬李氏心傳曰賓大牢則介不得用大牢積唯芻禾則無米可見矣張氏爾岐曰積唯芻禾謂所致之積唯芻與禾無米車也介但有餼無積蕙田案李氏張氏之説極是觀承案下文致館授飱衆介皆少牢則上介與上賓俱大牢可知故此注謂上賓上介皆大牢也然經文但云上賓大牢而無上介之文下但云介皆有餼而已則李氏駁之良是况下經上介雖亦大牢止飪一牢而鼎已減二又無腥一牢則禮數豈得與上賔同哉士帥沒其竟注沒盡郝氏敬曰遣士引導盡彼國界也欽定義疏夏官候人以士為之周語候人為導即此士也誓於其竟賓南面上介西面衆介北面東上史讀書司馬執策立於其後注此使次介假道止而誓也賓南面専威信也史於衆介之前北面讀書以勑告士衆為其犯禮暴掠也禮君行師從卿行旅從司馬主軍法者執策示罰疏此誓當在使次介假道之時止而誓言因上説彼國禮法訖乃更却本而言之不謂此士帥沒竟後蕙田案以上過他邦假道未入竟一肄注謂於所聘之國竟也肄習也習聘之威儀重失誤為壝壇畫階帷其北無宫注壝土象壇也帷其北宜有所鄊依也無宫不壝土畫外垣也疏案覲禮與司儀同為壇三成宫方三百步此則無外宫其壇壝土為之無成又無尺數象之而已敖氏繼公曰必畫階者習升降之儀也張氏爾岐曰案廣韻壝埒也壇也蓋壇之形埒也壇須築土髙厚有階級壝則略除地聚上令有形埒而已此壝壇兼言壝亦有壇名也朝服無主無執也注不立主人主人尊也不執玉不敢褻也徒習其威儀而已蕙田案道路常服深衣至是易朝服者以習儀重之也不皮辨下於聘也敖氏以為常服朝服者非介皆與北面西上注入門左之位也者疏不習大門外內及廟門內之禮以其於外威儀少而易行故略之但習入廟聘享揖讓升降布幣受玉之禮是以直云北面西上之位也習享士執庭實注士士介也庭實必執之者皮則有攝張之節習夫人之聘享亦如之習公事不習私事注公事致命者也夫疏公事謂君聘享夫人聘享及問大皆致君命者也私事謂私覿於君私面於卿大夫蕙田案以上習儀及竟張旜誓注及至也張旜明事在此國也張旜謂使人維之敖氏繼公曰誓之儀亦如初乃謁關人注謁告也古者竟上為關以譏異服識異言疏周禮司關職云凡四方之賓客叩關則為之告關人問從者幾人注欲知聘問且為有司當共委積之具疏不問使人而問從者關人卑不敢輕問尊者故問從者即知使者是大聘是小聘卿行旅從大夫小聘當百人從也以介對注以所與受命者對謙也聘禮上公之使者七介侯伯之使者五介子男之使者三介以其代君交於列國是以貴之周禮曰凡諸侯之卿其禮各下其君二等敖氏繼公曰以介數對則人數亦在其中若侯伯之國介者五人則知使者之為卿而從者五百人矣君使士請事遂以入竟注請猶問也問所為來之故也遂以入因道之疏君得關人告即知為聘來而云使士請事君子不必人故知而猶問也向來賓之問猶停關外君使士請訖乃道以入竟蕙田案以上入竟入竟斂旜乃展注復校録幣重其事斂旜變於始入疏重其事者亦恐有脫漏失錯布幕賓朝服立於幕東西面介皆北面東上賈人北面坐拭圭注拭清也側幕而坐乃開櫝誓疏賓西面者雖不對君由是臣道異於前時示威信也敖氏繼公曰拭圭者就櫝拭之故下乃云執盛氏世佐曰經云介皆北面東上則上介與衆並立也及視圭之時上介少進遂執展之注持之而立告在上介北面視之退復位注言退復位則視圭進違位退圭注圭璋尊不陳之敖氏繼公曰退之者其展事畢也退則藏之於櫝與陳皮北首西上又拭璧展之會諸其幣加於左皮上上介視之退注會合也諸於也古文曰陳幣北首陳疏璧言合諸幣者享時當合故今亦合而之盛氏世佐曰上介既復位賈人亦退璧而藏之有司退皮幣馬則幕南北面奠幣於其前注當前幕上敖氏繼公曰亦以璧會於幣乃奠之展夫人之聘享亦如之賈人告於上介上介告於賔注展夫人之聘享上介不視貶於君也賈人既拭璋琮南面告於上介上介於是乃東面以告賓亦所謂放而文之類欽定義疏鄭以夫人聘享上介不視非也君與夫人聘享前受命與下致命禮儀並與君同入竟而展無不視之理經明言亦如之何獨異乎蕙田案告者告展幣畢也兼君與夫人之聘享而言注以此文専指夫人言者非有司展羣幣以告注羣幣私覿及大夫者有司載幣者自展自告敖氏繼公曰有司自展既則告上介上介以告於賓此皮幣蓋不陳於幕辟君禮也及郊又展如初注郊逺郊也周制天子畿內千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里也近郊各半之及館展幣於賈人之館如初注館舍也逺郊之內有候館可以小休止沐浴展幣不於賓館者為主國之人有勞問己者就焉便疾也疏諸侯遣臣相聘無過一勞下文使卿近郊勞此乃逺郊之內得有勞問者謂同姓舅甥之國加恩厚者别有逺郊之內問勞也蕙田案以上入竟展幣賓至於近郊張旜君使下大夫請行反君使卿朝服用束帛勞注請行問所之也雖知之謙不必也士請事大夫請行卿勞彌尊賓也其服皆朝服敖氏繼公曰勞使卿以其爵同也主君於朝君則親郊勞故此禮放之而以同班蓋行禮欲其稱也下凡使卿者其義皆然上介出請入告賓禮辭迎於舍門之外再拜注出請出門西面請所以來事也入告入北面告賓也每所及至皆有舍其有來者與皆出請入告於此言之者賓彌尊事彌録疏此時賓當在賓館阼階西面故上介北面告賓也朱子曰注中與字陸氏音餘監本作者此非疑辭不當音餘復出者字亦無義理竊疑本介字也勞者不答拜注凡為人使不當其禮賓揖先入受於舍門內注不受於堂此主於侯伯之臣也公之臣受勞於堂國疏知公之臣受勞於堂者案司儀云諸公之臣相為客及大夫郊勞三辭拜辱三讓登聽命是公之臣受勞於堂之事勞者奉幣入東面致命注東面鄊賓面疏賓在館如主人當入門西故勞者東面向之也賓北面聽命還少退再拜稽首受幣勞者出注北面聽命若君南面然少退象降拜敖氏繼公曰賓入門即北面至是而言之者亦因事而見之耳受幣蓋在庭中西蕙田案賓初入門西面以在館如主人也及聽命乃北面從臣禮也敖氏云入門即北面非授老幣注老賓之臣老疏大夫家臣稱出迎勞者注欲儐之於疏司儀注云上下曰禮敵者曰儐敖氏繼公曰勞者出侯於門外上介出請勞者告事畢上介入告賓乃出迎之而告以欲儐之之辭勞者禮辭賓揖先入勞者從之乘皮設注設於門內也物四曰乘皮糜鹿皮也以疏庭實當三分庭一在南設之今儐勞者在庭故設於門內敖氏繼公曰乘皮設亦宜在門內之西其於勞者之南與賓用束錦儐勞者注言儐者賓在公館如家之義亦以來者為賓勞者再拜稽首受注稽首尊國賓也頓疏稽首首至地臣拜君法今勞者與賓同類不首而稽首故云尊國賓也下賓亦稽首送者以是為君使故亦稽首以報之也賓再拜稽首送幣注受送拜皆北面象階上面疏按歸饔餼賓儐大夫時賓楹間北面授幣大夫西受此賓宜與彼同北面授還北面拜送當云授送拜皆北面蓋據賓而言受字誤也朱子曰今案西面當作南面欽定義疏授受則一南面一北面乃為訝受也拜則無南面拜之理故皆北面賈氏讀注未審耳勞者揖皮出乃退賓送再拜注揖皮出東面揖執皮者而出疏執皮者是賓之使者執皮者得揖從出勞者從人當訝受之夫人使下大夫勞以二竹簠方玄被纁裏有蓋注竹簠方者器名也以竹為之狀如簋而方如今寒具筥筥者圎此方耳疏夫人勞使下大夫者降於君故不使卿其實棗蒸栗擇兼執之以進注兼猶兩也右手執棗左手執栗敖氏繼公曰蒸熟之也擇治之謂去其皮也賓受棗大夫二手授栗注受授不遊手慎之也兩疏初兩手俱用既授棗而不手共授栗則是遊暇一手不慎也賓之受如初禮注如卿勞之儀儐之如初下大夫勞者遂以賓入注出以束錦授從者因東面釋辭請導之以入然則賓送不拜蕙田案以上郊勞至於朝主人曰不腆先君之祧既拚以俟矣注賓至外門下大夫入告出釋此辭主人者公也不言公而言主人主人接賓之辭明至欲受之不敢稽賓也腆猶善也遷主所在曰祧周禮天子七廟文武為祧諸侯五廟則祧始祖也是亦廟也言祧者祧尊而廟親待賓客者上尊者疏於太祖廟受聘享以尊之若饗食則於禰廟燕又在寢彌相親也孔氏頴逹曰對言之遷主所藏曰祧若散而通論則凡廟曰祧故昭元年傳云其敢愛豐氏之祧襄九年傳云公冠必以先君之祧處之是也蕙田案祧者廟之通稱春官守祧八人鄭氏以為每廟一人周七廟并薑嫄廟而八則不論祖廟四親廟皆得云祧也敖氏以祧為廟堂以北之稱盛世佐駁之謂廟堂以北非行禮之所其説良然賓曰俟間注賓之意不欲奄卒主人也且以道路悠逺欲沐浴齊戒俟間未敢聞命蕙田案以上至朝大夫帥至於館卿致館注致至也賓至此館主人以上卿禮致之所以安之也疏云以上卿致明有束帛可知賓迎再拜卿致命賓再拜稽首卿退賓送再拜注卿不俟設飱之畢以不用束帛致故也不用束帛致之者明為新至非大禮也疏卿不言答拜答拜可知雖不言入言迎則入門可知下直云宰夫朝服設飱不言致則此卿致館兼致飱矣致館有束帛致飱空以辭致君命無束帛下記云飱不致是也然此侯伯之卿禮其公之臣亦以幣帛致朱子曰案此致止謂致館耳章首目其事而下詳其節也上無飱字而但云致命注疏何以見其為致飱耶詳又見下章敖氏繼公曰致命者致其君致館之命也致命於門外者以無幣也蕙田案注疏以致命為致飱與上致館為兩節經無眀文朱子辨之是也秋官司儀云諸公之臣相為國客致館如初之儀鄭氏以為如郊勞也然則致館之禮與郊勞略同郊勞有幣則此亦當有幣賈疏謂致館有束帛者得之其卿致命亦當在舍門內東面經不具者互見於郊勞也敖氏以為在門外誤又案以上致館宰夫朝服設飱注食不備禮曰飱多疏對饔餼也生與腥飪俱有餘物又此飱惟有腥飪而無生餘物又少故曰不備禮也欽定義疏飱夕食也故字從夕古者自大夫以上日食必有牲鼎朝食殺牲則祭肺夕食不殺牲但餕朝食之餘則祭牢肉而已是饔則豐而飱則殺也此所設視饔禮為殺故謂之飱若曰僅可共夕食云爾飪一牢在西鼎九羞鼎三腥一牢在東鼎七注中庭之饌也飪熟也熟在西腥在東象春秋也鼎西九東七凡其鼎實與其陳如陳饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪西疏云中庭之饌者對下文是堂上及門外之饌也鼎九謂止鼎九牛羊豕魚臘腸胃膚鮮魚鮮臘東七者腥鼎無鮮魚鮮臘故七陪鼎三則下云膷臐膮是也敖氏繼公曰牢太牢也太牢者牛羊豕各一也飪鼎九腥鼎七乃皆云牢者主於牛羊豕也飪在西腥在東以西為尊也腥減二鼎亦明其輕於飪也堂上之饌八西夾六注八六者豆數也凡饌以豆為本堂上八豆八簋六鉶兩簠八壺西夾六豆六簋四鉶兩簋六壺其實與其陳亦如饔餼疏凡設饌皆先設豆乃設餘饌門外米禾皆二十車注禾稿實并刈者也諸侯之禮車米視生牢禾視死牢牢十車大夫之禮皆視死牢而已雖有生牢不取數焉米陳門東禾陳門西薪芻倍禾注各四十車凡此之陳亦如饔餼上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾注西鼎七無鮮魚鮮臘盛氏世佐曰上介之牢西鼎減二無東鼎堂上之饌亦減二無西夾之饌米禾薪芻皆半於賓此其殺也衆介皆少牢注亦飪在西鼎五羊豕腸胃魚臘新至尚熟堂上之饌四豆四簋兩鉶四壺無簠疏少牢五鼎有膚此無者生人食與祭異故玉藻朔月少牢五俎亦云羊豕魚臘腸胃不數膚也敖氏繼公曰少牢五鼎羊豕魚臘膚與饋食之鼎同也此少牢故無堂上之饌欽定義疏五鼎當以少牢為凖有膚而無腸胃賈氏援玉藻注以疏此恐玉藻注本無據也歸饔餼士介無堂上之饌則設飱無之可知蕙田案以上設飧厥明訝賓於館注此訝下大夫也以君命迎賓謂之訝訝迎也亦皮辨賓皮辨聘至於朝賓入於次注服皮辨者朝聘主相尊敬也諸侯視朔皮辨服入於次者俟辦也次在大門外之西以帷為之乃陳幣注有司入於主國廟門外以布幕陳幣如展幣焉圭璋賈人執櫝而俟蕙田案以上賓至朝卿為上擯大夫為承擯士為紹擯擯者出請事注擯謂主國之君所使出接賓者也紹繼也其位相承繼而出也主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人聘義曰介紹而傳命君子於其所尊不敢質敬之至也既知其所為來之事復請之者賓來當與主君為禮為其謙不敢斥尊者啓發以進之於是時賓出次直闑西北面上擯在闑東關外西面其相去也公之使者七十步侯伯之使者五十步子男之使者三十步此旅擯耳不傳命上介在賓西北東面承擯在上擯東南西面各自次序而下末介末擯旁相去三丈六尺上擯之請事進南面揖賓俱前賓至末介上擯至末擯亦相去三丈六尺止揖而請事還入告於公此三丈六尺者門容二徹參個旁加各一步也今文無擯疏此擯陳在主國大門外主君之擯與賓之介東西相對南北陳之上擯入向公前北面受命出門南面遙揖賓使前擯者漸南行賓至末介北東面上擯至末擯南西面止揖者俱立定乃揖而請所為來之事賓對訖上擯入告公公乃有命納賓也敖氏繼公曰聘賓臣也故親對而不交擯云出請事而不云入告省文也蕙田案敖氏以擯止三人又以賓位西方東面介東南北面西上擯者西面請事皆與注異當從注説公皮辨迎賓於大門內大夫納賓注公不出大門降於待其君也大夫上擯也謂之大夫者上序可知從大夫總無所别也於是賓主人皆裼疏春秋之義卿稱大夫王制云上大夫卿是總無别也此時未執玉正是文飾之時明賓主人皆裼也敖氏繼公曰大門內者其在門東西面與納賓辭曰寡君須矣吾子其入也既則道之以入賓入門左注內賓位也衆介隨入北面西上少退擯者亦入門而右北面東上上擯進相君公再拜注南面拜迎賓辟不答拜注辟位逡遁不敢當其禮蕙田案以上迎賓公揖入每門每曲揖注每門輒揖者以相人偶為敬也凡君與賓入門賓必後君介及擯者隨之並而雁行既入則或左或右相去如初玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閩此賓謂聘卿大夫也門中門之正也不敢與君並由之敬也介與擯者雁行卑不踰尊者之迹亦敬也賓之介猶主人之擯入疏諸侯三門臯應路則應門為中門左宗廟右社稷大門東行即至廟門其間得有每門者諸侯有五廟太祖之廟居中二昭居東二穆居西廟皆别門門外兩邉皆有南北隔牆隔牆中夾通門若然祖廟已西隔墻有三則閣門亦有三東行經三門乃至太祖廟門中則相逼入門則相逺是以每門皆有曲即相揖故每曲揖也蕙田案諸侯三門庫雉路無臯應疏非是朱子曰案江都集禮廟制諸侯立廟宜在中門外之左古者宗廟之制外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南與此疏之説不同未知孰是欽定義疏古者廟必分昭穆故喪服小記曰祔必以其昭穆士虞記亦曰以其班祔敖氏乃謂太祖之廟最東髙祖而下以次而西則是置昭穆於不問而直以東為上也一有升祔則四親廟俱當動移此豈祔以其班之意乎賈氏昭東穆西而太祖居中近之矣然諸廟平列而無南北上下之殊揆之禮意亦未為得七廟五廟之説惟朱子用孫育之説為可從其有每門每曲者何也入大門北行折而東入廟又有西鄊之門為廟與朝之限此即謂之閣門也既入閣門則當有南鄊都宫之門又一門也都宫內左昭右穆其廟門之外或亦各有閣門東西相鄊與蕙田案廟朝之限應作闈門及廟門公揖入立於中庭注公揖先入省內事也既則立於中庭以俟賓不復出如此得君行一臣行二於禮可矣公迎賓大門內卿大夫以下入廟門即位而俟之敖氏繼公曰公揖賓而入禮之也凡主人與賓揖而入門有二義俱入則為道之自入則為禮之賓立接西孰注接猶近也門側之堂謂之孰立近孰者已與主君交禮將有出命俟之於此介在幣南北面西上上擯亦隨公入門東東上少進於士蕙田案以上揖賓入及廟門几筵既設擯者出請命注有几筵者以其廟受宜依神也賓至廟門司宫乃於依前設之神尊不預事也席西上上擯待而出請受賓所以來之命重停賓也至此言命事彌至言彌信也周禮諸侯祭祀席蒲筵繢純右雕几賈人東面坐啓櫝取圭垂繅不起而授上介注賈人嚮入陳幣東面俟於此言之就有事也授圭不起賤不與為禮也不言禓襲者賤不禓也繅有組繫也敖氏繼公曰玉尊不與幣同陳故事至乃取之上介不襲執圭屈繅授賓注上介北面受圭進西面授賓不襲者以盛禮不在於已也屈繅并持之也曲禮曰執玉其有藉者則禓無藉者則襲賓襲執圭注執圭盛禮而又盡飾為其相蔽敬也玉藻曰服之襲也充美也是故尸襲執玉龜襲也疏臣於君所合禓以盡飾今既執玉以瑞為敬若又盡飾而禓則掩蔽執玉之敬故不得禓也充猶覆也敖氏繼公曰襲謂襲上衣不見禓衣也聘以圭為尊吉服以襲為異不言垂繅可知也擯者入告出辭玉注擯者上擯也入告公以賓執圭將致其聘命圭贄之重者辭之亦所以致尊讓也納賓賓入門左注公事自闑西介皆入門左北面西上注隨賓入也介無事止於此今文無門三揖注君與賓也入門將曲揖既曲北面又揖當碑揖疏公先在庭南面賓入門捋曲揖既曲賓又揖二者主君皆向賓揖之再揖訖主君亦東面向堂塗北行當碑賓主又相向揖是君行一臣行二非謂賓入門時主君更向內霤相近而揖也至於階三讓注讓升公升二等注先賓升二等亦欲君行一臣行二賓升西楹西東面注與主君相鄊敖氏繼公曰此時公升堂西鄊西楹西言其東西節也當在楹西少北擯者退中庭注鄉公所立處退者以公宜親受賓命不用擯相也敖氏繼公曰擯者至是而退則鄊者從公立於階下矣凡公與賓為禮擯者皆贊之賓致命注致其君之命也公左還北鄊注當拜擯者進注進阼階西釋辭於賓相公拜也欽定義疏擯者進為公相禮或釋辭但在堂下而不升堂所謂卿擯由下也公當楣再拜注拜貺也貺惠賜也楣謂之梁賓三退負序注三退三逡遁也不言辟者以執圭將進授之方氏苞曰此經三退即司儀所謂三辟也同有事於楹間退之外别無辟法注疏強為分别似未當公側襲受玉於中堂與東楹之間注側猶獨也言獨見其尊賓也他日公有事必有贊為之者凡襲於隱者公序坫之間可知也中堂南北之中也入堂深尊賓事也東楹之間亦以君行一臣行二壁疏凡廟堂皆五架棟南北皆有兩架棟北一架下有開户棟南一架謂之楣則楣北有二架楣南有一架今於當楣北面拜訖乃更前北侵半架於南北之中乃受玉故云入堂深也敖氏繼公曰受玉之儀公西面賓東面授也東楹之間四分楹間一在東也凡堂上授受贄幣之禮敵者則在兩楹之間主人尊則於東賓尊則於西又皆以逺近為差方氏苞曰中堂言南北之度東楹之間言東西之度故曰與蕙田案經文云側者皆訓獨不獨聘禮為然盛世佐以側為堂東偏非擯者退負東孰而立注反其等位無事賓降介逆出注迸出由便李氏如圭曰逆出後入者先出賓出注聘事畢公側授宰玉注使藏之授於序端敖氏繼公曰公受玉時亦垂繅宰既受之則屈繅矣裼降立注裼者免上衣見裼衣凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也玉藻曰裘之裼也見美也又曰麛裘青犴褎絞衣以錫之論語曰素衣麛裘皮辨時或素衣其裘同可知也裘者為溫表之為其褻也寒暑之服冬則裘夏則葛凡袒裼者左降立俟享也亦於中庭古文裼皆作賜蕙田案以上聘擯者出請注不必賓事之有無賓裼奉束帛加璧享擯者入告出許注許受之庭實皮則攝之毛在內內攝之入設也注皮虎豹之皮攝之者右手并執前足左手并執後足毛在內不欲丈之預見也內攝之者兩手相鄊也入設亦參分庭一在南言則者或以馬凡君於臣臣於君麋鹿皮可也幣疏君於臣謂使者歸君使卿贈如覿幣及食饗以侑酬幣庭實皆有皮臣於君謂私覿庭實設四皮及介用儷皮賓入門左揖讓如初升致命張皮注張者釋外足見文也張氏爾岐曰當賓於堂上致命之時庭實即張之見文相應為節也公再拜受幣士受皮者自後右客注自由也從東方來由客後西居其左受皮也執皮者既授亦自前西而出張氏爾岐曰當公於堂上受幣士亦於堂下受皮賓出當之坐攝之注象受於賓張氏爾岐曰士初受皮仍如前張之皮賓出降至庭乃對賓坐而攝之當對也公側授宰幣皮如入右首而東注如入左在前皮右首者變於生也張氏爾岐曰執皮者初入時行在前者立在左此受皮者東行亦立在左者行在前故云如入也曲禮云執禽者左首此右首是變於生蔡氏德晉曰凡獻者左首受者右首禮相變也蕙田案敖君善據士昏禮改右首為左首但士禮與諸侯不同獻與受禮亦有别必執彼以例此則拘矣今依經文為定又案以上享聘於夫人用璋享用琮如初禮注如公立於中庭以下敖氏繼公曰夫人不可以親受故君代受之夫妻一體也不言束帛加琮省文也蕙田案以上聘享夫人若有言則以束帛如享禮注有言有所告請若有所問也記曰有故則束帛加書以將命春秋臧孫辰告糴於齊公子遂如楚乞師晉侯使韓穿來言汶陽之田皆是也無庭實也敖氏繼公曰如秦伯使西乞術來聘且言將代晉之類蕙田案以上因聘有言擯者出請事賓告事畢注公事畢賓奉束錦以請覿注覿見也鄊將公事是欲交其歡敬也不用羔因使而見非特來之疏自此盡訝受馬論賓將私覿主人不許而行禮賓事擯者入告出辭注客有大禮未有以待之請禮賓賓禮辭聽命擯者入告注告賓許也蕙田案主人請禮賓賓聽命擯者入告為禮賓第一節宰夫徹几改筵注宰夫又主酒食者也將禮賓徹神几改神席更布也賓席東上公食大夫禮曰蒲筵常緇布純加萑席尋玄帛純此筵上下大夫也周禮曰筵國賓於牖前莞筵紛純加繅席畫純左彤几者則是筵孤也孤彤几卿大夫其漆几與楊氏復曰神席當室前之中故以扆前為據賓席在西北故以牖前為據地道尚右故牖前西北之位家鄊國皆以為重士冠禮子筵於户西士昏禮婦席於户牖間鄊飲席於牖前鄊射賓席於户牖之間周禮筵國賓於牖前其名不同皆不越乎此位也公出迎賓以入揖讓如初注公出迎者己之禮更端也疏前聘享俱是公禮故不出迎此禮賓私禮故出迎欽定義疏聘享賓所以致其君命禮之正也初已迎之於大門內矣至執圭時公先入不出迎賓致君命未全乎賓也此禮賓則已所以自盡賓可全乎賓矣故迎之蕙田案公迎賓入為第二節公升側受几於序端注漆几也今文無升楊氏復曰禮賓之初有三節受几也受醴也受幣也三者公親受於序端而後授賓恭之至也設几主為啐醴故受几受醴皆於筵前禮莫重於幣故受幣當東楹前行聘享時賓東面主君西面訝授受以賓奉君命不北面此以主君禮賓賓臣也故受幣北面敖氏繼公曰公與賓升皆北面當楣而立不拜至者其辟朝君之儐禮與宰夫內拂几三奉兩端以進注內拂几不欲塵坌尊者以進自東箱來授君敖氏繼公曰凡執几皆橫執之惟設時乃縮也公東南鄊外拂几三卒振袂中攝之進西鄊注進就賓也疏宰夫奉几兩端故公中攝之復擬賓用兩手在公手外取之故也擯者告注告賓以公授几賓進訝受几於筵前東面俟注未設也今文訝為梧公一拜送注公尊也古文一作一賓以几辟注辟位逡遁北面設几不降階上答再拜稽首注不降以主人禮未成也凡賓左几左疏設几主為啐酒今未啐醴故云禮未成也凡賓几者對神右几也蕙田案賓受几設几為第三節公先一拜賓後再拜不降者禮未成也宰夫實觶以醴加柶於觶面枋注酌以授君也君不自酌尊也宰夫亦洗升實觶以醴自東箱來不面擸不訝授也是疏公西面向賓宰夫自東箱來在公旁側並授與公以下文公側受醴不訝受故不面擸也李氏如圭曰柶之大端為葉小端為枋面前也凡主人受賓醴者皆面枋賓迎受之皆面葉冠禮贊者酌醴授主人主人迎受故贊者面葉主人受之得面枋此宰夫實醴公不迎受故宰夫面枋公受之亦面枋也公側受醴注將以飲賓賓不降一拜進筵前受醴復位公拜送醴注賓一拜者醴質以少為貴欽定義疏凡授醴之禮皆受者先拜宰夫薦籩豆脯醢賓升筵擯者退負東孰注事未畢擯者不退中庭以有宰夫也敖氏繼公曰凡擯者之退近則中庭逺則負孰皆視後事之久速以為節賓祭脯醢以柶祭醴三庭實設注庭實乘馬盛氏世佐曰庭實或皮或馬惟所有耳經於享禮言皮於禮賓言馬互見也降筵北面以柶兼諸觶尚擸坐啐醴注降筵就階上手疏左手執觶右以柶祭醴訖降筵北面以柶兼并於觶兩手奉之此降筵啐醴亦在西階之上李氏如圭曰擸即葉也盛氏世佐曰尚擸者倒執之變於建也凡執柶者持其枋蕙田案賓受醴啐醴為第四節賓先一拜而公拜禮之變也啐醴不拜禮未成也公用束帛注致幣也言用尊於下也亦受之於序端建柶北面奠於薦東擯者進相幣注贊以辭賓降辭幣注不敢當公禮也公降一等辭注辭賓降也栗階升聽命注栗階趨君命尚疾不連步降拜注拜受公辭注不降一等殺也升再拜稽首受幣當東楹北面注亦訝受而北面者禮主已已臣也疏前行聘享時賓東面主君西面訝授受但以奉君命故不北面此以主君禮已已臣也故北面受異於聘享時也退東面俟注俟君拜也不北面者謙若不敢當階然公一拜賓降也公再拜注不俟公再拜者不敢當公之盛也公再拜者事畢成禮賓執左馬以出注受尊者禮宜親之也效馬者并左右靮授之餘三馬主人牽者從出也上介受賓幣從者訝受馬注從者士介欽定義疏下記云主人之庭實則主人遂以出賓之士訝受之故注以從者為士而即以介當之也然經言士者非一大抵皆公私執勞役之賤臣非是貴者上經享禮士受皮公家之臣也士昏納徴士受皮士家之私臣也其他舉鼎舉尸亦士為之推類可見矣然則此受馬者當與公食之受皮者同未必介為之也蕙田案賓受幣為第五節賓聽命降拜又升再拜執臣禮也公一拜賓降又再拜尊賓也又案以上禮賓賓覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首注不請不辭鄊時已請也覿用束錦辟享幣也總者總八轡牽之贊者居馬間扣馬也入門而右私事自闑右奠幣再拜以臣禮見也贊者賈人之屬介特覿也疏賓總八轡在前牽之二人贊者各居兩馬間各用左右手手扣一匹欽定義疏贊者蓋即受皮受馬之有司皆使者之家臣非必賈人之屬賈人専掌主玉聘享後無事矣擯者辭注辭其臣賓出注事畢蕙田案賓入門右奠幣以臣禮見為私覿第一節擯者坐取幣出有司二人牽馬以從出門西面於東孰南注將還之也贊者有司受馬乃出凡取幣於庭北面疏贊者待有司受馬乃出以幣可奠之於地馬不可散放也敖氏繼公曰有司牽馬亦二人者不可多於賓之贊者也西面於東孰南鄊賓也然則賓之外位常接西孰矣牽馬者蓋在擯者之南少退欽定義疏牽馬用有司二人而不以二擯可見訝受馬之從者亦非士介矣擯者請受注請以客禮受之賓禮辭聽命注賓受其幣贊者受馬蕙田案擯者取幣還賓賓聽命為第二節牽馬右之入設注庭實先設客禮也右之欲人居馬左任右手便也於是牽馬者四人事得申也曲禮曰效馬效羊者右牽之别疏前入門右時賓奉束錦總乘馬一時入無先後之是臣禮今此入設下乃云賓奉幣是庭實先設客禮也賓奉幣入門左介皆入門左西上注以客禮入可從介得疏對入門右行臣禮不從介也公揖讓如初升公北面再拜注公再拜者以其初以臣禮見新之也賓三退反還負序注反還者不敢與授圭同振幣進授當東楹北面注不言君受略之也敖氏繼公曰振幣去塵乃授君以示敬士受馬者自前還牽者後適其右受注自由也適牽者之右而受之也此亦並授者不自前左由便也便其已授而去也受馬自前變於受皮疏牽馬者四人各在馬西右手執馬而立士受馬從東方來由馬前各適牽馬者之前還繞其後適牽馬者之東馬西而受之牽馬者自前行而出之張氏爾岐曰此受馬亦視堂上受幣以為節也牽馬者自前西乃出注自由也出疏士既受馬其最西頭者便即門不須由馬之前其次東三匹者皆由西於馬前而出也賓降階東拜送君辭注拜送幣於階東以君在堂鄊之享疏賓拜送幣私覿己物故也前幣不拜送致君命非己物也拜也君降一等辭注君乃辭之而賓由拜敬也擯者曰寡君從子雖將拜起也注此禮固多有辭矣未有著之者是其志而煥乎未敢明説盛氏世佐曰此即公降一等之時擯者所釋之辭也凡公之辭賓皆擯者贊之蕙田案聘禮所載主賓之辭甚多於此著之者舉一以見例也敖繼公謂君降一等辭而賓又將拜故擯者云然則多一層周折矣當依盛氏之説為是栗階升公西鄊賓階上再拜稽首注成拜公少退注為敬賓降出公側授宰幣馬出注廟中宜清公降立蔡氏德晉曰側授宰幣自以所受束錦授太宰不用贊也降立俟介覿也蕙田案賓奉幣入至公授宰幣以賓禮見為第三節擯者出請上介奉束錦士介四人皆奉玉錦束請覿注玉錦錦之文纎縟者也禮有以少文為貴者後言束辭之便也擯者入告出許上介奉幣儷皮二人贊注儷猶兩也上介用皮變於賓也皮糜鹿皮盛氏世佐曰皮以兩殺於賓也二人贊人執一皮也皆入門右東上奠幣皆再拜稽首注皆者皆衆介也贊者奠皮出擯者辭注亦辭其臣介逆出注亦事畢也蕙田案上介及士介入門右奠幣用臣禮為第四節擯者執上幣士執衆幣有司二人舉皮從其幣出請受注此請受請於上介也擯者先即西面位請之釋辭之時衆執幣者隨立門中而俟郝氏敬曰君使擯執上介束錦使士執衆介玉錦使有司舉上介儷皮隨幣出還之不敢當臣禮也委皮南面注擯者既釋辭執衆幣者進即位有司乃得委之南面便其復入也委皮當門執幣者西面北上擯者請受注請於上介也上言其次此言其位互約文也疏上當言擯者執幣士四人北面東上坐取幣從有司二人坐舉皮從其幣出隨立於門中擯者出門西面於東孰南請受士執幣者進立擯南西面北上執皮者南面委皮於門中北上乃為文備也蕙田案上云請受標其目此云請受實其事本無二節賈疏補經文次第極明介禮辭聽命皆進訝受其幣注此言皆訝受者嫌擯者一一授之蕙田案擯者執幣還介介聽命為第五節上介奉幣皮先入門左奠皮注皮先者介隨執皮者而入也入門左介至揖位而立執皮者奠皮以有不敢授之義司疏享時庭實使人執之不奠於地以得親授主人有此奠之不敢授故下二人坐舉皮也公再拜注拜中庭也不受於堂介賤也介振幣自皮西進北面授幣退復位再拜稽首送幣注進者北行參分庭一而東行當君乃復北行也介出宰自公左受幣注不側受介禮輕有司二人坐舉皮以東張氏爾岐曰上介覿禮竟蕙田案上介覿為第六節擯者又納士介注納者出導入也士介入門右奠幣再拜稽首注終不敢以客禮見擯者辭介逆出擯者執上幣以出禮請受賓固辭注禮請受者一請受而聽之也賓為之辭士介賤不敢以言通於主君固衍字當如面大夫也疏案下士介面大夫時擯者執上幣出禮請受賓辭無固字故知此固衍字公答再拜擯者出立於門中以相拜注擯者以賓辭入告還立門中閾外西面公乃遙答拜也相者贊告之敖氏繼公曰公鄊欲親受幣故不受其奠幣之拜士介終不敢授公乃答之公是時拜於東方之中庭而介位在門外之西則擯者相拜宜西北面也士介皆辟注辟於其東面位逡遁也士三人東上坐取幣立注俟擯者執上幣來也欽定義疏士三人主國之有司受士介之幣者擯者已執上幣故只須三人而已取幣北面東上者以公在東也擯者進注就公所也向疏以公在庭故擯者自門外來進公左授幣與宰也宰夫受幣於中庭以東注使宰夫受於士士介幣輕也受之於公左賓幣公側授宰上介幣宰受於公左士介幣宰夫受於士敬之差執幣者序從之注序從者以宰夫當一一受之張氏爾岐曰以上衆介覿蕙田案士介覿為第六節賓上介尊故始以臣禮終以客禮士介卑故始終不敢當客禮也又案以上賓介私覿擯者出請賓告事畢注賓既告事畢衆介逆道賓而出也擯者入告公出送賓注公出衆擯亦逆道紹擯及賓並行間亦六步及大門內公問君注鄊以公禮將事無由問也賓至始入門之位北面將揖而出衆介亦在其右少退西上於此可以問君居處何如序殷勤也時承擯紹擯亦於門東北面東上上擯往來傳君命南面蘧伯玉使人於孔子孔子問曰夫子何為此公問君之類也朱子曰案所引論語非聘事意略相類耳賓對公再拜注拜其無恙公拜賓亦辟公問大夫賓對公勞賓賓再拜稽首公答拜注勞以道路之勤公勞介介皆再拜稽首公答拜賓出公再拜送賓不顧注公既拜客趨辟君命上擯送賓出反告賓不顧於此君可以反路寢矣論語説孔子之行曰君召使擯色勃如也足躩如也賓退必復命曰賓不顧矣疏此送賓是上擯孔子為下大夫得為上擯者以孔子有德君命使攝上擯若定十年夾谷之會令孔子為相也李氏如圭曰凡去者不答拜蕙田案以上公送賓問君問大夫勞賓介賓請有事於大夫注請問問卿也不言問聘聘亦問也嫌近君也上擯送賓出賓東面而請之擯者反命因告之郝氏敬曰必請於主君臣無私交也公禮辭許注禮辭一辭賓即館注少休息也即就也明疏此一日之間其事多矣旦行問卿暫時止息卿大夫勞賓賓不見注以己公事未行上介以賓辭辭之疏仍有問大夫之等公事未行故不敢見也大夫奠鴈再拜上介受注不言卿卿與大夫同執鴈下見於國君周禮凡諸侯之卿見朝君皆執羔張氏爾岐曰注見朝君見來朝之君也卿見來朝之君執羔此見來聘之賓執鴈是下於見朝君也勞上介亦如之敖氏繼公曰勞之於其館上介亦不見士介為受鴈也蕙田案以上卿大夫勞賓介君使卿韋辨歸饔餼五牢注變皮辨服韋辨敬也韋辨韎韋之辨兵服也而服之者皮韋同類取相近耳其服蓋韎布以為衣而素裳牲殺曰饗生曰餼疏韋辨尊於皮辨今行聘享皆皮辨歸饔餼則韋辨故云敬也陳氏祥道曰周禮有韋辨無爵辨書二人雀辨儀禮禮記有爵辨無韋辨士之服止於爵辨而荀卿曰士韋辨孔安國曰爵韋辨也則爵辨即韋辨耳韋其質也爵其色也士冠禮再加皮辨三加爵辨而以韋辨為敬韎色赤爵色亦赤即一物耳上介請事賓朝服禮辭注朝服示不受也受之當以尊服有司入陳注入賓所館之廟陳其積饔注謂飪與腥飪一牢鼎九設於西階前陪鼎當內廉東面北上上當碑南陳牛羊豕魚臘腸胃同鼎膚鮮魚鮮臘設扄冪膷臐膮蓋陪牛羊豕注陪鼎三牲􅌜膷臐膮陪之庶羞加也當內廉辟堂塗也腸胃次臘以其出牛羊也膚豕肉也唯燖者有膚此饌先陳其位後言其次重大禮詳其事也宫必有碑所以識日景引隂陽也凡碑引物者宗廟則麗牲焉以取毛血其材宫廟以石窆用木疏君子不食圂腴犬豕曰圂若然牛羊有腸胃而無膚豕則有膚而無腸胃也宫必有碑者按諸經云三揖者鄭注皆云入門將曲揖既曲北面揖當碑揖若然士昏及此聘禮是大夫士廟內皆有碑矣鄊飲酒鄊射言三揖則庠序之內亦有碑矣祭義云君牽牲麗於碑則諸侯廟內有碑明矣天子廟及庠序有碑可知但生人寢內不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者觀碑景邪正以知日之早晚也引隂陽者又觀碑景南北長短十一月日南至景南北最長隂盛也五月日北至景南北最短陽盛也二至之間景之盈縮隂陽進退可知其材以石窆用木雖無正文然葬碑取縣繩繂暫時之間往來運載當用木而已其宫廟之碑取其妙好又須久長用石為之朱子曰按注內引字疑當作别又今禹墓窆石尚存髙五六尺廣二尺厚一尺許其中有竅以受綍引棺者也然則窆亦用石矣檀弓云公室視豐碑三家視桓楹豈天子諸侯以石故謂之碑大夫以下用木故謂之楹歟廟中同謂之碑則固皆謂石也楊氏復曰腸胃同鼎謂牛羊腸胃同一鼎不異其牛羊腴賤也敖氏繼公曰飪鼎以牛為上陪鼎以膷為上古者宫庭有碑蓋居其庭東西南北之中所以識深淺也蓋發語辭云陪牛羊豕明其鼎相當也盛氏世佐曰正鼎曰冪陪鼎曰蓋皆所以覆物也異其名者冪大而蓋小也冪以他物為之故云設蓋與鼎同物故不云設言蓋而不言扄陪鼎小其手舉之與先儒以蓋為語辭非蕙田案注疏不解蓋字當以盛説為長腥二牢鼎二七無鮮魚鮮臘設於阼階前西面南陳如飪鼎二列注有腥者所以優賓也堂上八豆設於户西西陳皆二以並東上韭菹其南醓醢屈注户室户也東上變於親食賓也醓醢汁也屈猶錯也臡疏醓醢西曷本昌本西麋臡麋臡西菁菹菁菹北鹿鹿臡東葵菹葵菹東蝸醢蝸醢東韭菹案公食大夫公親食賓云宰夫自東房薦豆六設於醬東西上此云東上是變於親食賓也此經菹醢不自相當皆交錯陳之故云錯也敖氏繼公曰屈者醓醢西昌本昌北麇臡臡西菁菹注南鹿臡臡西茆菹菹北麋臡曲折而下所謂屈也蕙田案天官醢人職朝事之豆八韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡饋食之豆二葵菹螺醢此經八豆惟言韭菹醓醢其餘無明文賈疏敖氏各據周禮以言但賈疏有葵菹蝸醢無茆菹麇臡敖氏有茆菹麇臡無葵菹蝸醢二説不同按公食大夫六豆韭菹醓醢昌本麋臡菁菹鹿臡此六豆之見於經者也又云上大夫八豆注云加葵菹蝸醢聘禮之賓即上大夫也其禮宜與之同矣又按少牢禮有韭菹醓醢葵菹蝸醢朝事饋食之豆兼用之此大夫禮也此主君所賜之饔賓受之以祭祖禰記云如饋食之禮但饋食止少牢而此用太牢饋食止四豆而此八豆則祭品有加於常祭而常祭所有之葵菹蝸醢此亦必有之明矣敖氏説屈陳之次亦與賈疏不同未詳孰是八簋繼之黍其南稷錯注黍在北豆疏繼者繼八豆以西陳之八言屈八簋言錯者以八豆之實各别直次第屈陳之則得相變八簋惟有黍稷二種屈陳之則間雜故錯陳之使當行黍稷間錯不得並陳設亦相變也六鉶繼之牛以西羊豕豕南牛以東羊豕注鉶羮器也兩簠繼之粱在北注簠不次簋者粱稻加也凡饌屈錯要相變八壺設於西序北上二以並南陳注壺酒尊也酒蓋稻酒粱酒不錯者酒不以雜錯為味西夾六豆設於西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之粱在西皆二以並南陳六壺西上二以並東陳注東陳在北墉下統於豆臡疏六豆者先設韭菹其東醓醢又其東昌本南麋麋臡西菁菹又西鹿臡饌於東方亦如之注東方東夾室西北上注亦韭菹其東醓醢也疏西北上者於東壁下南陳西北有韭菹東有醓醢次昌本次南麇臡次西有菁菹次北有鹿臡亦屈錯也上西夾饌六豆直言北上不云西北上此獨云西北上者見雖東夾其陳亦與西夾同蕙田案疏次北有鹿臡北當作西壺東上西陳注亦在北墉下統於豆朱子曰今按凡言北上者皆南陳西上者皆東陳此經西夾六豆設於西墉下北上至兩簠下結云皆二以並南陳又云六壺西上東陳饌於東方亦如之西北上壺東上西陳則是東西之饌自簠以上皆南陳唯壺東西陳之疏於東夾之豆亦云於東壁下南陳其布置之次序亦是南陳下又云雖東夾其陳亦與西夾同凡此皆與經文合而布置西夾之豆乃東陳之又以簋鉶簠皆與壺東陳不唯與經文不合而亦自相抵牾殊不可曉覽者詳之蕙田案以朱子之説推之則東西二夾所陳六豆最北六簋在豆南四鉶在簋南兩簠在鉶南所謂南陳也東西夾布置兩兩相等故云亦如之若如楊信齊儀禮圗則豆簋鉶簠在西夾者東陳在東夾者西陳不特與經文不合并失疏家之旨矣其六豆次序當云韭菹東醓醢醓醢南昌本又南麋臡糜臡西菁菹菁菹北鹿臡又北韭菹乃為南陳疏家布置東西夾之豆皆與經不合今依朱子正之敖氏繼公曰腥鼎皆西面北上故東西夾室之饌皆西北上飪鼎東面北上故堂上之饌東北上各順之也屬飪者於堂上屬腥者於夾室亦異尊卑也夾室之饌先西後東是腥牢亦以西者為尊矣凡鼎俎恆竒豆簋之屬恆偶而鼎自三以上則豆簋之數率降於鼎者一鉶之數率降於豆簋者兩故此飪鼎九則堂上之饌八而鉶六腥鼎七則東西夾之饌六而鉶四也一牢則兩簠故堂上兩夾之數同醯醢百甕夾碑十以為列醯在東注夾碑在鼎之中央也醯在東醯穀陽也醢肉隂也實疏甕瓦器其容亦蓋一觳瓬人云簋實一觳又云豆三而成觳四升曰豆則甕與簋同受斗二升也郝氏敬曰十以為列謂左右直列醯五行在碑東榖味居左醢五行在碑西肉味居右也自飪一牢以下至此皆所謂饔也餼二牢陳於門西北面東上牛以西羊豕豕西牛羊豕注餼生也牛羊右手牽之豕東之寢右亦居其左米百筥筥半斛設於中庭十以為列北上黍粱稻皆二行稷四行注庭實固當庭中言當中庭者南北之中也東西為列列當醯醢南亦相變也此言中庭則設碑近如堂深也疏享時庭實入設在東西之中其南北三八庭一在南此更言中庭欲明南北之中也東西為列者橫陳黍兩行在北次粱兩行次稻兩行次南稷四行稻粱是加黍稷是正故黍為上端稷為下端而稻粱居其間也門外米三十車車秉有五籔設於門東為三列東陳注大夫之禮米禾皆視死牢秉籔數名也秉有五籔二十四斛也籔讀若不數之數今文籔或為逾疏上文飪一牢腥二牢是三牢死故米禾皆三十車禾三十車車三秅設於門西西陳注秅數名也三秅千二百秉薪芻倍禾注倍禾者以其用多也薪從米芻從未四者之車皆陳北輈凡此所以厚重禮也聘義曰古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則內君臣不相陵而外不相侵故天子制之而諸侯務焉耳四疏薪可以炊爨故從米陳之芻可以食馬故從禾陳者之車皆陳北輈者以其內向為正故也蕙田案米禾皆以十車為一列米先西後東故云東陳禾先東後西故云西陳其輈則皆北鄊敖氏以東陳為西轅者非又案有司入陳為歸饔餼第一節賓皮辨迎大夫於外門外再拜大夫不答拜注大夫使者卿也疏即上卿韋辨者也揖入及廟門賓揖入注賓與使者揖而入使者止執幣賓俟之於門內謙也古者天子適諸侯必舍於太祖廟諸侯行舍於諸公廟大夫行舍於大夫廟疏聘時主君揖入立於庭尊卑法此賓與使者幣故賓在門內謙也朱子曰按疏內者下幣字疑當作敵大夫奉束帛注執其所以將命入三揖皆行注皆猶並也使者尊不後主人疏賓所在若主人也至於階讓大夫先升一等注讓不言三不成三也凡升者主人讓於客三敵者則客三辭主人乃許升亦道賓之義也使者尊主人三讓則許升矣今使者三讓則是主人四讓也公雖尊亦三讓乃許升不可以不下主人也古文曰三讓張氏爾岐曰注意謂凡升者必三讓敵者則客三辭主人先升以道之是成三讓也客尊則主人三讓而客即升如此經大夫先升是也主人三讓客不三辭故云不成三也假使客三辭而猶先升則是主人四讓矣禮固無四讓注也故即經文大夫先升知大夫未嘗三辭是謂不成三也公雖尊當其為主人亦必三讓乃先升此主人自下之義也賓從升堂北面聽命注北面於階上也大夫東面致命賓降階西再拜稽首拜餼亦如之注大夫以束帛同致饔餼也賓殊拜之敬也重君之禮也張氏爾岐曰大夫東面致命在西階上也賓降階西再拜東階之西也殊拜者分别兩次拜之成拜訖又降拜也大夫辭升成拜注尊賓受幣堂中西北面注趨主君命也堂中西中央之西大夫降出賓降授老幣蕙田案大夫致命賓受幣為第二節出迎大夫注老家臣也賓出迎欲儐之大夫禮辭許入揖讓如初賓升一等大夫從升堂注賓先升敵也皆北面庭實設馬乘注乘四馬也賓降堂受老束錦大夫止注止不降使之餘尊盛氏世佐曰大夫不從降者儐禮輕也注説似曲賓奉幣西面大夫東面賓致幣注不言致命非君命也大夫對北面當楣再拜稽首注稽首尊君客也致對有辭也受幣於楹間南面退東面俟注賓北面授尊君之使賓再拜稽首送幣大夫降執左馬以出注出廟門從者亦訝受之賓送於外門外再拜蕙田案賓儐大夫為第三節明日賓拜於朝拜饔與餼皆再拜稽首注拜謝主君之恩惠於大門外周禮曰凡賓客之治令訝聽之此拜亦皮辨服蕙田案賓至朝拜謝為第四節又案以上歸賓饔餼上介饔餼三牢敖氏繼公曰三牢亦降以兩也飪一牢在西鼎七羞鼎三注飪鼎七無鮮魚鮮臘也賓介皆異館腥一牢在東鼎七堂上之饌六注六者賓西夾之數西夾亦如之筥及甕如上賓注凡所不貶者尊介也言如上賓者明此賓客介也餼一牢門外米禾視死牢牢十車薪芻倍禾敖氏繼公曰死牢飪與腥也牢十車明二十車也凡其實與陳如上賓注几凡飪以下下大夫韋辨用束帛致之上介韋辨以受如賓禮注介不皮辨者以其受大禮似賓不敢純如賓也儐之兩馬束錦注此下大夫使者受上介之儐禮如卿使者受賓儐禮當庭同蕙田案以上歸上介饔餼士介四人皆餼大牢米百筥設於門外注牢米不入門略之也米設當門亦十為列北上牢在其南西上欽定義疏士介四人亦各館餼大牢以下為一人言之其餘從同故云皆也宰夫朝服牽牛以致之注執紖牽之東面致命朝服無束帛亦略之士介西面拜迎疏下記云士館於工商則此致者在工商之館宰夫從外來宜在門西東面士介朝服北面再拜稽首受注受於牢東拜自牢後適宰夫右受由前東面授從者無儐注既受拜送之矣明日衆介亦各如其受之服從賓拜於朝疏上賓與上介皆有儐士介賤故略之蕙田案儐石經及宋元本皆作擯故楊復李如圭皆云當作儐監本已改正今從之下無儐同又案以上餼士介賓朝服問卿注不皮辨别於主君卿每國三人卿受於祖廟注重賓禮也祖王父也下大夫擯注無士擯者既接於君所急見之擯者出謮事大夫朝服迎於外門外再拜賓不答拜揖大夫先入每門每曲揖及廟門大夫揖入注入者省內事也既而俟於寧也行疏寧門屋寧也下云賓入三揖皆以卿俟於寧故得並行與卿三揖不俟於庭者下君也擯者請命注亦從入而出請不几筵辟君也敖氏繼公曰不几筵之義有二禮太重者不設此類是也禮差輕者亦不設小聘之禮是也庭實設四皮注麋鹿皮也賓奉束帛入三揖皆行至於階讓注皆猶並也古文曰三讓賓升一等大夫從升堂北面聽命注賓先升使者尊賓東面致命注致其君命大夫降階西再拜稽首賓辭升成拜受幣堂中西北面注於堂中央之西受幣趨聘君之命賓降出大夫降授老幣無擯注不擯賓辟君也蕙田案以上問卿擯者出請事賓面如覿幣注面亦見也其謂之面威儀質也賓奉幣庭實從注庭實四馬入門右大夫辭注大夫於賓入自階下辭迎之賓遂左注見私事也雖敵賓猶謙入門右為若降等然曲禮曰客若降等則就主人之階主人固辭於客然後客復就西階庭實設揖讓如初注大夫至庭中旋並行遂疏賓初入門右大夫階下辭賓賓門左大夫至庭中迎賓大夫回旋與賓揖而並行北面言如初者大夫不出門唯有庭中一揖至碑又揖再揖而已大夫升一等賓從之注大夫先升道賓大夫西面賓稱面注稱舉也舉相見之詞以相接大夫對北面當楣再拜受幣於楹間南面退西面立注受幣楹間敵也賓亦振幣進北面授者疏凡授受之義在於兩楹之間皆是體敵禮敵並授此大夫南面賓北面授雖是敵禮是尊大夫故訝受賓當楣再拜送幣降出大夫降授老幣蕙田案以上賓私面於卿擯者出請事上介特面幣如覿介奉幣注特面者異於主君士介不從而入也君尊衆介始覿不自别也上賓則衆介皆從之欽定義疏問者君禮也面者私禮也賓於卿先問而後面公私兩有之上介以下則致其私情而已故賓問則上介及士介皆從之問面相因面亦不改也上介有面無問曰特皮二人贊注亦儷皮也入門右奠幣再拜注降等也大夫辭注於辭上介則出擯者反幣注出還於上介也具疏不言反皮文不庭實設介奉幣入大夫揖讓如初注大夫亦先升一等今文曰入設介升大夫再拜受注亦於楹間南面而受介降拜大夫降辭介升再拜送幣注介既送幣降出也大夫亦授老幣擯者出請衆介面如覿幣入門右奠幣皆再拜大夫辭介逆出擯者執上幣出禮請受賓辭注賓亦為士介辭大夫答再拜擯者執上幣立於門中以相拜士介皆辟老受擯者幣於中庭士三人坐取羣幣以從之方氏苞曰士介面卿一與覿君之禮同何也擯者下大夫也使下大夫相拜而士介與國卿覿面而相為禮則彼此皆不能安故禮以有所窮而同蕙田案以上介面卿擯者出請事賓出大夫送於外門外再拜賓不顧注不顧言去擯者退大夫拜辱注拜送也方氏苞曰擯者下大夫也以同僚而共己之私事故拜其辱擯必以下大夫者介乃下大大也將聘君之命以問卿若使公士或私屬為擯則禮不稱蕙田案以上介私面於卿下大夫嘗使至者幣及之注嘗使至已國則以幣問之也君子不忘舊上介朝服三介問下大夫下大夫如卿受幣之禮注上介三介下大夫使之禮也爵疏問下大夫使上介是各於其易以相尊敬者也其面如賓面於卿之禮蕙田案以上問嘗使者大夫若不見注有故也君使大夫各以其爵為之受如主人受幣禮不拜注各以其爵主人卿也則使卿大夫也則使大夫不拜代受之耳不當主人禮也疏拜是致敬之事不可人代之拜蕙田案以上主國大夫有故夕夫人使下大夫韋辨歸禮注夕問卿之夕也使下大夫下君也君使之云夫人者以致詞當稱寡小君使疏按春秋公羊傳何休注云禮婦人無外事故知此下大夫歸禮者是君使之可知堂上籩豆六設於户東西上二以並東陳注籩豆六者下君禮也設於户東又辟饌位也其設脯其南醢屈六籩六豆敖氏繼公曰凡設籩豆自二以上皆先豆而後籩乃言籩豆者文順耳此六豆六籩宜用朝事者而各去其末之二其設之之序則豆皆在西籩繼之而東韭菹其南醓醢屈以終麷其南蕡亦屈以終不用簠簋鉶者以無牢故也此禮主於飲君之禮主於食也欽定義疏凡一豆一籩者則一脯一醢此籩豆各六注乃直以脯醢當之何也豈其六脯而六醢邪當以敖氏之説為正壺設於東序北上二以並南陳醙黍清皆兩壺注醙白酒也凡酒稻為上黍次之粱次之皆有清白以黍間清白者互相備明三酒六壺也先言醙白酒尊先設之疏上言白明黍粱皆有白下言清明稻黍亦有清故也於清白中言黍明醙即是稻清即是粱也故言互相備也三酒既有清白二色故言六壺必先言醙者以白酒尊重故先設之也蕙田案六壺盛三酒為三行稻最北黍在南次之粱在南又次之每行白酒在西清酒在東並陳大夫以束帛致之注致夫人命也此禮無牢下朝君也疏周禮掌客云上公之禮夫人致禮八籩膳太牢侯伯以下亦皆有牢是朝君來時有牢此卿來聘無牢故云下朝君也賓如受饔之禮儐之乘馬束錦上介四豆四籩四壺受之如賓禮儐之兩馬束錦注四壺無稻酒也不致牢下於君也敖氏繼公曰四豆者去菁菹鹿臡四籩者去形鹽膴四壺者去粱酒不言其位如賓可知蕙田案四壺鄭以去稻酒敖以去粱酒經俱無明文敖義較長明日賓拜禮於朝注於是乃言賓拜明介從拜也蕙田案以上夫人歸禮於賓大夫餼賓太牢米八筐注其陳於門外黍粱各二筐稷四筐二以並南陳無稻牲陳於後東上不饌於堂庭辟君也子疏按掌客鄰國之君來朝卿皆見以羔膳太牢侯伯男膳特牛彼又無筐米此侯伯之臣得用太牢有筐米者彼為君禮此是臣禮各自為差降不得以彼難此賓迎再拜老牽牛以致之賓再拜稽首受老退賓再拜送注老室老大夫之貴臣上介亦如之衆介皆少牢米六筐皆士牽羊以致之注米六筐者又無粱也士亦大夫之貴臣敖氏繼公曰米六筐黍粱稷各二筐也盛氏世佐曰下記云凡餼大夫黍粱稷然則大夫所歸之米皆有粱也注誤蕙田案以上大夫餼賓介公於賓一食再饗注饗謂亨太牢以飲賓也公食大夫禮曰設洗如饗則饗與食互相先後也知疏饗禮與食禮同食禮既亨太牢明饗禮亨太牢可但以食禮無酒饗禮有酒故以飲賓言之此經先言食後言饗則食在饗前公食言設洗如饗則饗在食前先後出於主君之意故不定也燕與羞俶獻無常數注羞謂禽羞鴈鶩之屬成熟煎和也俶始也始獻四時新物聘義所謂時賜無常數由恩意也賓介皆明日拜於朝上介一食一饗注饗食賓介為介從饗獻矣復特饗之客之也欽定義疏賓於發去之日乃三拜乘禽於朝則此之拜賜自拜饗食燕耳羞與俶獻未必僕僕亟拜也因饗食而及燕因又及羞獻之無常數以類連舉之耳若不親食使大夫各以其爵朝服致之以侑幣如致饗無儐注君不親食謂有疾及他故也必致之不廢其禮也致之必使同班敵者易以相親敬也致禮於卿使卿致禮於大夫使大夫非必命數也無儐以已本宜往古文侑皆作宥致饗以酬幣亦如之注酬幣饗禮酬賓勸酒之幣也所用未聞也禮幣束帛乘馬亦不是過也禮器曰琥璜爵蓋天子酬諸侯蕙田案以上食饗燕羞獻大夫於賓一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣注作使也大夫有故君必使其同爵者為之致之列國之賓來榮辱之事君臣同之宣疏此直言饗食不言燕其實亦有昭二年左傳云韓子來聘宴於季氏傳無譏文明鄰國大夫有相燕之法蕙田案以上大夫饗食賓介君使卿皮辨還玉於館注玉圭也君子於玉比德焉以之聘重禮也還之者德不可取於人相切厲之義也皮辨者始以此服之不敢不終也賓皮辨襲迎於外門外不拜帥大夫以入注迎之不拜示將去不純為主也帥道也今文曰迎於門外古文帥為率敖氏繼公曰不言出請入告文省也禮不主於己故不拜大夫亦襲至廟門乃執玉大夫升自西階鉤楹注鉤楹由楹內將南面致命致命不東面以賓在下也必言鉤楹者賓在下嫌楹外也敖氏繼公曰大夫南面立於中堂少西而致命賓自碑內聽命升自西階自左南面受圭退負右房而立注聽命於下敬也自左南面右大夫且並受也必並受命者若鄊君前耳退為大夫降逡遁今文或曰由自西階無南面朱子曰今按或舍於大夫廟中則當退於堂之西北負室牖而立方氏苞曰大夫南面致圭如主君親臨之也賓不北面受而並受如聘君親受之也盛氏世佐曰升不由阼不敢以主人自居也左大夫之東也大夫降中庭賓降自碑內東面授上介於阼階東注大夫降出言中庭者為賓降節也授於阼階東者欲親見賈人藏之也賓還阼階下西面立盛氏世佐曰兩言自碑內一言中庭見其升降皆不由堂塗也蓋分庭而行者賓主之禮也此賓與大夫皆代君行禮不敢以賓主自居故皆中庭而行異於常法與上介出請賓迎大夫還璋如初入注出請請事於外以入告也賓雖將去出入猶東唯升堂由西階凡介之位未有改也賓裼迎大夫賄用束紡注賄豫人財之言也紡紡絲為之今之繻也所以遺聘君可以為衣服相厚之至也疏此未知何用之財若是報享之物不應在禮玉之上今言束紡者以其上圭璋是彼國之物下云禮玉束帛報聘君之享物彼君厚禮於此此亦當厚禮於彼故特加此束紡是以鄭云相厚之至也鄭注周禮云布帛曰賄是賄為財物與人財物謂之賄又注周禮內司服云素紗者今之白縳也則此束紡者素紗也故據漢法况之盛氏世佐曰於是言裼則還璋之時賓與大夫尚襲矣所謂圭璋特而襲也賄主君所以報聘也既以圭璋還之而又加之以束紡厚往而薄來也聘之禮重於享而報聘之物乃輕於報享者其輕財重禮之義乎且享禮受之而於聘則無所受故分别報之亦取相稱而已禮玉束帛乘皮皆如還玉禮注禮禮聘君也所以報享也亦言玉璧可知也疏聘賓行享之時束帛加璧束錦加琮今報享物亦有璧琮致之故云亦言玉璧可知此玉則琮也以經言玉故以玉言之若然經言束帛兼有束錦矣大夫出賓送不拜蕙田案以上還玉報享公館賓注為賓將去親存送之厚殷勤且謝聘君之意也公朝服賓辟注不敢受國君見已於此館也此亦不見言辟者君在廟門敬也凡君有事於諸臣之家車造廟門乃下上介聽命注聽命於廟門中西面如相拜然也擯者每贊君辭則曰敢不承命告於寡君之老聘享夫人之聘享問大夫送賓公皆再拜注拜此四事公東面拜擯者北面敖氏繼公曰拜聘享與問謝聘君也所謂拜貺也拜送賓以賓將去也公退賓從請命於朝注賓從者實為拜主君之館已也言請命者以己不見不敢斥尊者之意公辭賓退注辭其拜也退還館裝駕為旦將發也周禮曰賓從拜辱於朝明日客拜禮賜遂行方氏苞曰賓不拜而退所以示主君之拜乃答其君之禮而已不敢尸即致辭不曰拜辱而曰請命之義也盛氏世佐曰辭辭其請也賓不拜不敢與敵者拜辱之禮同也凡拜辱之禮所拜者不見拜於門外乃退蕙田案以上主君就賓館賓三拜乘禽於朝訝聽之注發去乃拜乘禽明已受賜大小無不識遂行舍於郊注始發且宿近郊自展軨蕙田案以上賓拜賜遂行公使卿贈如覿幣注贈送也所以好送之也言如覿幣見為反報也今文公為君受於舍門外如受勞禮無儐注不入無儐明去而宜有己也如受勞禮以贈勞同節疏言不入無儐對歸饔餼入設而有儐使下大夫贈上介亦如之使士贈衆介如其覿幣大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣士送至於竟蕙田案以上贈送使者歸及郊請反命注郊近郊也告郊人使言反命於君也必請之者以已久在外嫌有罪惡不可以入敖氏繼公曰不敢徑入恭也請反命其亦使次介與朝服載旜注行時稅舍於此郊今還至此正其故行服以俟君命敬也禳乃入注禳祭名也為行道纍歷不祥禳之以除災凶乃入陳幣於朝西上上賓之公幣私幣皆陳上介公幣陳他介皆否注皆否者公幣私幣皆不陳此幣使者及介所得於彼國君卿大夫之贈賜也其或陳或不陳詳尊而略卑也其陳之及卿大夫處者待之如夕幣其禮於君者不陳上賓使者公幣君之賜也私幣卿大夫之幣也他介士介也言他容衆從者疏賓之公幣有八郊勞幣一也禮賓幣二也致饔餼三也夫人歸禮幣四也侑食幣五也再饗幣六也夕幣七也贈賄幣八也皆主君禮賜使者皆用束錦故曰公幣賓之私幣略有十九主國三卿五大夫皆一食有侑幣饗有酬幣皆用束錦則是十六有三卿郊贈則十九也其上介公幣則有五致饔餼一也夫人致禮幣二也侑食幣三也饗酬幣四也郊贈幣五也降於賓者以其上介無郊贈幣又無禮賓幣又闕一饗幣故賓八上介五也上介私幣有十一主國三卿五大夫或饗或食不備要有其一則其幣八也又三卿皆有郊贈如其面幣通前則十一也主國下大夫嘗使己國者聘亦有幣及之則亦有報幣之事其數不定士介四人直有郊贈報私幣主國卿大夫報士介私面士介私幣數不甚明禮於君者謂侑用束紡禮用束帛乘皮以禮於君者是其正故不陳之禮於己者以其榮故陳之聘君以幣問卿而其卿不報聘君之幣者以其尊卑不敵若報之嫌其敵體故也朱子曰案經文主國禮賜無有夕幣疏於上介公幣云無郊贈及無禮賓幣又闕一饗幣故賓八大夫五則前公幣中夕字當是饗字之誤而其次亦當在再饗之前張氏爾岐曰禮於君者不陳以使者將親執以告束帛各加其庭實皮左注不加於其皮上榮其多也公南鄊注亦宰告於君君乃朝服出門左南鄊卿進使者使者執圭垂繅北面上介執璋屈繅立於其左注此主於反命士介亦隨入並立東上反命曰以君命聘於某君某君受幣於某宫某君再拜以享某君某君再拜注君亦揖使者進之乃進反命也某君某國名也某宫若言桓宫僖宫也某君再拜謂再拜受也必言此者明彼君敬君己不辱命宰自公左受玉注亦于使者之東同面並受也不右使者由便也受上介璋致命亦如之注變反言致者若云非君命也致命曰以君命聘於某君夫人某君再拜以享於某君夫人某君再拜不言受幣於某宫可知略之張氏爾岐曰受上介璋賓受之也賓受璋當亦垂繅而致命本以君夫人聘君夫人但婦人無外事亦君命之命言致命若非君命然也執賄幣以告曰某君使某子賄授宰注某子若言髙子國子凡使者所當以告君者上介取以授之賄幣在外也禮玉亦如之注亦執束帛加璧也告曰某君使某子禮宰受之士隨自後左士介受乘皮如初上介出取玉束帛士介後取皮也張氏爾岐曰賓將告君之時上介出取玉帛士介取皮賓執玉帛以告宰受玉帛士即自士介後居其右而受皮向東藏之執禮幣以盡言賜禮注禮幣主國君初禮賓之幣也以盡言賜禮謂自此至於贈張氏爾岐曰自郊勞至贈行八度禮賓皆有幣執郊勞之幣而歷舉其全以告也公曰然而不善乎注善其能使於四方而猶女也授上介幣再拜稽首公答再拜注授上介幣當拜公言也不授宰者當復陳之私幣不告注亦略卑也君勞之再拜稽首君答再拜注勞之以道路勤苦若有獻則曰某君之賜也注言此物某君之所賜豫為惠者也其所獻雖珍異不言某為彼君服御物謙也其大夫出反必獻忠孝也君其以賜乎注不必其當君也獻不拜者為君之答已也蕙田案有獻謂彼國之君於常幣外别有賜豫故獻之於君云以為君賚賜之用謙未必當君用也敖氏以為賄禮中之物則是彼國所遺於主君者非賓之私物詎可謂之獻乎其説非是上介徒以公賜告如上賓之禮注徒謂空手不執其幣君勞之再拜稽首君答拜勞士介亦如之注士介四人旅答一拜又賤也君使宰賜使者幣使者再拜稽首注以所陳幣賜之也禮臣子人賜之而必獻之君父不敢自私服也君父因以子之則拜受之如更受賜也既拜宰以上幣授之方氏苞曰昭公四年左傳杜泄曰夫子受命於朝而聘於王王賜之路復命而致之君君不敢逆王命而復賜之王賜且然則鄰國之賜必待君之復賜宜也賜介介皆再拜稽首注士介之幣皆載以造朝不陳之耳與上介同受賜命俱拜既拜宰亦以上幣授上介乃退注君揖入皆出去介皆送至於使者之門注將行俟於門反又送於門與尊長出入之禮也乃退揖注揖别也使者拜其辱注隨謝之也再拜上介三拜士介蕙田案以上歸反命釋幣於門注門大門也主於闑布席於闑西閾外東面設洗於門外東方其餘如初於禰時出於行入於門不兩告告所先見也見疏出時自廟出先見行入時先門敖氏繼公曰行為道路之始出則禮之門為出入之限入則禮之乃至於禰筵几於室薦脯醢注告反也薦進也席疏似特牲少牢司宫設於奧東面右几但無牲牢進脯醢而已觴酒陳注主人酌進奠一獻也言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也獻疏不言奠而言陳以其下仍有室老及士獻以備三故言陳陳有次第之言也席於阼注為酢主人也酢主人者祝取爵酌不酢於室異於祭疏特牲少牢皆於室內尸東西面受酢此乃於外行來告反故在阼不在室與正祭異也又正祭有尸尸飲卒爵以尸爵酢主人此告祭無尸爵皆奠故别取爵以酢主人亦異也薦脯醢注成酢禮也時疏特牲少牢主人受酢皆席於户內有薦俎此雖無俎亦薦脯醢於主人之前以成酢禮也三獻注室老亞獻士三獻也每獻奠輒取爵酌主人自酢也也疏此通三獻皆獻奠訖别取爵自酢故云輒取爵酌正祭有尸三獻皆獻尸訖尸酢主人主婦賓長今此無尸皆自酢獨云主人者主人為首正故舉前以包後盛氏世佐曰正祭以主人主婦賓長為三獻今主婦不與而取士者以其皆從行之貴臣故助主人釋奠也一人舉爵注三獻禮成更起酒也主人奠之未舉也取疏此欲獻酬從者不得酌神之尊故知别酒也云主人奠之未舉者以其下文獻從者乃行酬似鄊飲酒鄉射一人舉觶待獻介衆賓後乃行酬亦然也獻從者注從者家臣從行者也主人獻之勞之也皆升飲酒於西階上不使人獻之辟國君也行酬乃出注主人舉奠酬從者下辨室老亦與焉也上介至亦如之蕙田案以上禮門及禰聘遭喪入竟則遂也注遭喪主國君薨也入竟則遂國君以國為體士既請事已入竟矣關人未告則反不郊勞注子未君也不筵几注致命不於廟就尸柩於殯宫又不神之疏聘為兩君相好今君薨當就尸柩故不就祖廟也鬼神所在曰廟則殯宫亦得為廟設几筵亦可矣但始死不忍異於生不神之故於殯傍無几筵也蕙田案筵几所以依神也於殯宫則不設臣子之心不忍遽神之也必受於殯宫者有二義一則大夫方為君持服不可以入廟攝行禮一則以所聘者故君也雖薨而聘君之命不可以不達故就殯宫致命在使者為不廢命在主國為不死其君也與使者以尸將命其義互相發敖氏以為受於廟者非觀承案下文特著夫人世子之喪君使大夫受於廟之文則此國君之喪可知不受於廟也蓋聘主國君雖薨而聘君之命不可不達自當就殯宫致命耳敖氏之説誠未當注義為長也不禮賓注喪降事也主人畢歸禮注賓所飲食不可廢也禮謂饔餼饗食賓唯饔餼之受注受正不受加也不賄不禮玉不贈注喪殺禮為之不備遭夫人世子之喪君不受使大夫受於廟其他如遭君喪注夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降遭喪將命於大夫主人長衣練冠以受注遭喪謂主國君薨夫人世子死也此三者皆大夫攝主人長衣素純布衣也去衰易冠不以純凶接純吉也吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純袂寸半耳君喪不言使大夫受子未君無使臣義也位疏向來所釋皆是君主始薨假令君薨踰年嗣子即鄰國朝聘以吉禮受之於廟雖踰年而未葬則亦使人受之李氏如圭曰更言遭喪不蒙上夫人世子之喪知主國君薨亦使大夫受也雜記大夫筮宅史練冠長衣以筮則練冠長衣者以凶接吉之服也蕙田案以上遭主國喪聘君若薨於後入竟則遂注既接於主國君也赴者未至則哭於巷衰於館注未至謂赴告主國君者也哭於巷者哭於巷門未可為位也衰於館未可以凶服出見人其聘享之事自若吉也今文赴作訃受禮注受饔餼也不受饗食注亦不受加赴者至則衰而出注禮為鄰國闕於是可以凶服將事也疏主人所歸禮則賓可以凶服受之其正行聘享則著吉服故雜記云執玉不麻是也盛氏世佐曰使者出竟在君未薨之前則赴者之至自宜後於聘且聘者君生時所命也既將命而後發其凶問亦事之次也然則聘時吉服之義明矣唯稍受之注稍稟食也闕疏禮君行師從卿行旅從從者既多不可於稍食案周禮每云稍事皆謂米稟以其稍稍給之故謂米稟為稍歸執圭復命於殯升自西階不升堂注復命於殯者臣子之于君父存亡同升疏按禮記奔父母之喪升自西階此復命於殯亦自西階法生時出必告反必面故云臣子於君父存亡同也欽定義疏雜記執玉不麻謂平常時也至有君喪既聘而受還玉及歸而復命則麻可也禮窮則不得不同也子即位不哭注將有告請之事宜清靜也不言世子者君薨也諸臣待之亦皆如朝夕哭位疏按公羊傳君存稱世子君薨稱子某既葬稱子踰年稱君奔喪云奔父之喪在家者待之皆如朝夕哭位辨復命如聘注自陳幣至於上介以公賜告無勞子臣皆哭注使者既復命子與羣臣皆哭與介入北鄊哭注北鄊哭新至别於朝夕與疏使者升階復命訖不見出文而言介入者以其復命之時介在幣南北面去殯逺復命訖除去幣賓更與介前入近殯北鄊哭鄊內為入新至别於朝夕者朝夕哭位在阼階下西面今於殯前北鄊出袒括髮注悲哀變於外臣也入疏案奔喪云至於家門左升自西階東面哭括髮袒於殯東是於內者子故也此使者出門袒括髮變於外者臣故也入門右即位踊注從臣位自哭至踊如奔喪禮絰疏按奔喪云袒括髮於西階東即位踊襲於序東此門外袒括髮入門右即位踊亦當襲絰於序東故鄭云自哭至踊如奔喪禮也蕙田案以上聘君薨若有私喪則哭於館衰而居不饗食注私喪謂其父母哭於館衰而居不敢以私喪自聞於主國凶服於君之吉使春秋傳曰大夫以君命出聞喪徐行而不反疏衰而居謂服衰居館行聘享則皮辨吉服公羊傳何氏注聞大喪而不反重君命也徐行者為君當使人追代之以此言之使雖未出國境聞父母之喪遂行不敢以私廢王事君使人代之可也明至彼所使之國雖聞父母之喪不反可知歸使衆介先衰而從之注已有衰斬之服不忍顯然趨於往來其在道路使介居前歸又請反命已猶徐行隨之君納之乃朝服既反命出公門釋服哭而歸其他如奔喪之禮吉時道路深衣疏朝服反命出門去朝服還服吉時深衣三日成服乃去之盛氏世佐曰案奔喪之禮有二一是平時聞赴遂歸在道不及成服則服深衣素委貌至家三哭之明日乃喪服杖於序東所謂三日成服也一是以君命出使不得遽歸則成服於外至家固已喪服不俟三日所謂若不得行則成服而後行也此經所陳即成服而後行之事然則出公門即反喪服矣疏乃引未成服而奔喪者之禮以釋之非蕙田案上文云衰而居此云衰而從之則已成服矣何用至家轉服深衣三日而成服乎盛氏駁疏義極當又案以上賓有私喪賓入竟而死遂也主人為之具而殯注具謂始死至殯所當用疏不殯於館取其至殯為節以其大斂訖即殯故連言殯下文歸介復命之時柩止門外明斂於棺而已朱子曰今案周禮注疏云權殯於館此疏非是介攝其命注為致聘享之禮也初時上介接聞命君弔介為主人注雖有臣子親姻猶不為主人以介與賓並命於君尊也齊疏古者賓聘家臣適子皆從行是以延陵季子聘於其子死葬於嬴博之間敖氏繼公曰凡諸侯弔於異國之臣君為之主此時其君不在故介為主人受主君之弔君弔蓋皮辨服禮諸侯弔於異國之臣皮辨錫衰主人未喪服則君亦不錫衰不錫衰則惟皮辨服矣介為主則袒免喪服記曰朋友皆在他邦袒免謂此類也凡諸侯弔主人必免主人歸禮幣必以用注當中奠贈諸喪具之用不必如賓禮疏主人所歸禮與幣必以當喪者之用不必如致飧饔之禮束紡皮帛之類不堪喪者之用故也介受賓禮無辭也注介受主國賓已之禮無所辭也以其當陳之以反命也有賓喪嫌其辭之不饗食歸介復命柩止於門外注門外大門外也必以柩造朝達其忠心疏國君有三門臯應路又有三朝內朝在路寢庭正朝在路門外應門外無朝外朝當在臯門外經直云止於門外無入門之言明知止於大門外外朝之上蕙田案此臯門當作庫門疏誤也介卒復命出奉柩送之君弔卒殯注卒殯成節乃去訖疏卒復命謂復命出君大門奉賓之柩送至賓之家入殯於兩楹之間君往就弔殯訖君與大夫盡去若大夫介卒亦如之注不言上介者小聘上介士也介疏按此據大聘上介是大夫而言經不言上則大夫介卒中兼有聘使大夫其􅌰亦如之故鄭云不言上介小聘上介士也欲兼見小聘之法也若小聘上介末介皆士則入下文士介死中以其下文更不見小聘賓介死法故此兼言之也士介死為之棺斂之注不具他衣物也自以時服也欽定義疏君於士有致襚之禮豈於他國士介而不具衣物者是非哀死恤喪之誼也敖氏云棺具互文亦未盡經義蓋具兼殯斂備其用者周士介則僅及其棺斂之需而已君不弔焉注主國君使人弔不親往若賓死未將命則既斂於棺造於朝介將命注未將命請俟間之後也以柩造朝以已至朝志在達君命若介死歸復命唯上介造於朝若介死雖士介賓既復命往卒殯乃歸注往謂送柩蕙田案以上賓介卒小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞注記貶於聘所以為小也獻私獻也面猶覿也疏不享者謂不以束帛加璧獻國所有不禮者聘訖不以齊酒禮賓面不升者謂私覿庭中受之不升堂其禮如為介三介注如為介如為大聘上介降疏禮即飧饔餼食燕之等三介者大夫於卿二等故也蕙田案以上小聘記久無事則聘焉注事謂盟會之屬若有故則卒聘束帛加書將命百名以上書於䇿不及百名書於方注故謂災患及時事相告請也將猶致也名書文也今謂之字䇿簡也方版也假疏簡據一片而言䇿是編連之稱方若今之祝板不連編之策一板書盡故言方板也主人使人與客讀諸門外注受其意既聘享賓出而讀之不於內者人稠處嚴不得審悉主人主國君也人內史也書必璽之客將歸使大夫以其束帛反命於館注為書報也明日君館之注既報館之書問尚疾也欽定義疏還玉之明日館賓館賓之明日賓行經之次第本如此惟有故加書則於還玉日多反命一事耳記此者嫌加書或當有遷延未得明日館賓也蕙田案以上記有故卒聘加書既受行出遂見宰問幾月之資注資行用也古者君臣謀密草創未知所之逺近問行用當知多少而已古文資作齎朱子曰案上言與卿圗事則固已知所之矣此但言與宰計度資費之多寡而已注言未知所之非是使者既受行日朝同位注謂前夕幣之間同位者使者北面介立於左少退别於其處臣也介疏謂已受命日夕幣之前使者及朝君之時皆同位北面東上蕙田案敖繼公以日朝為每日常朝其説甚鑿出祖釋軷祭酒脯乃飲酒於其側注祖始也既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委上為山伏牲其上使者為軷祭酒脯祈告也卿大夫處者於是餞之飲酒於其側禮畢乘車轢之而遂行舍於近郊矣其牲犬羊可也古文軷作祓疏道路之神有二在國內釋幣於行者謂平適道路之神出國門釋奠於軷者謂山行道路之神周禮犬人職云伏瘞亦如之是用犬也詩云取羝以軷是用羊也是犬羊各用其一未必並用之言可者人君有牲大夫無牲直用酒脯此見出行時祭軷聘使還亦宜有祖但文不具蕙田案以上記使者受命將行之禮所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼注圭所執以為瑞節也剡上象天圎地方也雜采曰繅以韋衣木版飾以三色再就所以薦玉重慎也九寸上公之圭也古文繅或作藻今文作璪疏下不剡象地方上剡象天圎凡圭天子鎮圭公桓圭侯信圭皆博三寸厚半寸剡上左右各寸半唯長短依命數不同凡言繅者皆蒙水草之文天子五采公侯伯三采子男二采皆是雜采也木版大小一如玉制然後以韋衣包之大小各如其板三色再就者一采為再就三采即六等也一匝為一就三采據公侯伯子男則二采朱子曰案記只有朱白蒼三字而雜記疏所引乃重有之不知何時傳寫之誤失此三字問諸侯朱緑繅八寸注二采再就降於天子也於天子曰朝於諸侯曰問記之於聘文互相備異疏上云三采六等此二采不云四就者臣禮與君禮此二采雖與子男同但一采為一匝二采為再幣為四等今臣一采為一就二采為再就是二采當君一采之處典瑞云瑑圭璋璧琮繅皆二采一就以眺聘亦是臣二采共當君一采一匝之處降於天子降於朝天子也諸侯自相朝亦同圭與繅九寸侯伯以下依命數諸侯遣臣自相問若遣臣問天子圭與繅亦八寸此言八寸據上公之臣侯伯之臣則六寸子男之臣則四寸各降其君二等皆玄纁繫長尺絢組注采成文曰絢繫無事則以繫玉因以為飾皆用五采組上以玄下以絳為地今文絢作絢張氏爾岐曰繅以藉玉繫以聨玉與繅組即所以飾繫者其質上玄下纁而又加五采之組也問大夫之幣俟於郊為肆又齎皮馬注肆猶陳列也齎猶付也使者既受命宰夫載問大夫之禮待於郊陳之為行列至則以付之也使者初行舍於近郊幣云肆馬云齎因其宜亦互文也不於朝付之者辟君禮也必陳列之者不夕也蕙田案以上記朝聘玉帛辭無常遜而説注遜順也大夫使受命不受辭辭必順且説辭多則史少則不達注史謂䇿祝辭苟足以達義之至也注至極也辭曰非禮也敢對曰非禮也敢注辭辭不受也對答問也二者皆􅌰曰敢言不敢蕙田案以上記辭卿館於大夫大夫館於士士館於工商注館者必於廟不館於敵者之廟為大尊也自官師以上有廟有寢工商則寢而已管人為客三日具沐五日具浴注管人掌客館者也客謂使者下及士介也蕙田案以上記館飧不致注不以束帛致命草次饌飧具輊賓不拜注以不致命沐浴而食之注自潔清尊主國君賜也記此重者沐浴可知蕙田案以上記設飧卿大夫訝大夫士訝士皆有訝注卿使者大夫上介也士衆介也訝主國君所使迎待賓者盛氏世佐曰訝即經所謂訝賓於館者周禮云凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝注云此謂朝覲聘問之日王所使迎賓客於館之訝是也蓋訝有二一是待事於客之訝秋官掌訝是也以中士為之一是迎賓於館之訝此記所陳是也以降於賓一等者為之天子二訝俱有諸侯無掌訝即以大夫士迎賓於館者兼之故下文賓就館訝以公使已待事之命告賓也賓即館訝將公命注使已迎待之命蕙田案賓即館謂聘享既畢就館之時敖氏以此節宜在卿致館之後非又見之以其摯注又復也復以私禮見者訝將舍於賓館之外宜相親也大夫訝者執鴈士訝者執雉賓既將公事復見訝以其摯注既已也公事聘享問大夫復報也使者及上介執鴈羣介執雉各以見其訝蕙田案以上記訝者凡四器者唯其所寶以聘可也注言國獨以此為寶也四器謂圭璋璧琮疏此據公侯伯之使者若子男使者聘用璧琮享用琥璜蕙田案以上記聘玉宗人授次次以帷少退於君之次注主國之門外諸侯及卿大夫之所使者次位皆有常處步疏朝聘陳賓介上公九十步侯伯七十步子男五十使其臣聘又各降二等其次皆依其步數就西方而置之未行禮之時止於次中至將行禮賓乃出次凡為次君次在前臣次在後故云少退於君之次蕙田案以上記賓次上介執圭如重授賓注慎之也曲禮曰凡執主器執輕如不克疏此謂將聘於主君廟門外上介屈繅授賓賓襲受之節賓入門皇升堂讓將授志趨注皇自莊盛也讓謂舉手平衡也志猶念也念趨謂審行步也孔子之執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循君疏賓入門皇謂未至堂時升堂讓謂升堂東面向主之時將授志趨謂賓執玉向楹將授玉之時念鄊入門在庭時執玉徐趨今當亦然敖氏繼公曰讓謂必後主君也經云公升二等賓升是也行而張足曰趨曲禮曰堂上不趨執玉不趨特志於趨耳言其急於授君而行速也授如爭承下如送君還而后退注爭爭鬭之爭重失隊也而后猶然後也疏授謂就東楹授王於主君時如與人爭接取物恐失墜下如送者謂聘享每訖君實不送而賓之敬如君送然君回還賓則退出廟門更行後事非謂賓出大門也欽定義疏賈氏以下為下堂退為賓出廟門者朱子於論語已質其非而敖氏以爭字為句謂尚疾者恐亦非執輕如不克之意蓋執玉以授君當執其下君則從其上受之故授之時如爭承物者然玉已授而手在下猶若有所送也蕙田案敖繼公以授如爭為句承下如送為句郝敬則以將授志為句趨授如爭為句皆非下階發氣怡焉再三舉足又趨注發氣舍息也再三舉足自安定乃復趨也至此云舉足則志趨卷豚而行也孔子之升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也朱子曰案趨進進字衍卷豚義見曲禮卷轉也豚之言若有循及門正焉注容色復故此皆心變見於威儀執圭入門鞠躬焉如恐失之注記異説也廟疏亦謂方聘執圭入門時及享發氣焉盈容注發氣舍氣也孔子之於享禮有容色衆介北面蹌焉注容貌舒揚入疏此謂賓行聘衆介從門左北面私覿愈愈焉注容貌和敬也疏舒於盈容出如舒鴈注威儀自然而有行列舒鴈鵝也疏此出廟門之外又舒緩於愈愈也皇且行入門主敬升堂主慎注復記執玉異説蕙田案以上三記賓介聘享之容凡庭實隨入左先皮馬相間可也注隨入不並行也間猶代也土物有宜君子不以所無為禮畜獸同類可以相代賓之幣唯馬出其餘皆東注馬出當從廄也餘物皆東藏之內府蕙田案以上記庭實入出多貨則傷於德注貨天地所化生謂玉也君子於玉比德焉朝聘之禮以為瑞節重禮也多之則是主於貨傷敗其為德幣美則沒禮注幣人所造成以自覆幣謂東帛也愛之斯欲衣食之君子之情也是以享用幣所以副忠信美之則是主於幣而禮之本意不見也賄在聘于賄注賄財也于讀曰為言主國禮賓當視賓之聘禮而為之財也賓客者主人所欲豐也若苟豐之是又傷財也周禮曰凡諸侯之交各稱其邦而為之幣以其幣為之禮蕙田案以上記貨幣之度凡執玉無藉者襲注藉謂繅也繅所以緼藉玉陸氏佃曰無藉若圭璋特是也經言繅又别言藉則藉非繅矣藉若璧以帛琮以錦之類公側襲受玉於中堂與東楹之間此無藉者之玉也束帛加璧則裼矣蕙田案圭璋特而襲璧琮加束帛而裼見於鄭注曲禮其説不可易而又以繅為藉殊為牽合辨見别卷又案以上記執玉襲禮不拜至注以賓不於是始至今文禮為醴張氏爾岐曰禮為聘享畢公禮賓也疏以為聘時似非經意醴尊於東箱瓦大一有豐注瓦大瓦尊豐承尊器如豆而卑薦脯五膱祭半職橫之注膱脯如版然者或謂之脡皆取直貌焉祭醴再扱始扱一祭卒再祭注卒謂後扱主人之庭實則主人遂以出賓之士訝受之注此謂餘三馬也左馬賓執以出矣士士介從者疏主人牽者從賓以出於門外賓之士介迎受之蕙田案以上記禮賓之事既覿賓若私獻奉獻將命注時有珍異之物或賓奉之所以自序尊敬也猶以君命致之擯者入告出禮辭注辭其獻也賓東面坐奠獻再拜稽首注送獻不入者奉物禮輕擯者東面坐取獻舉以入告出禮請受注東面坐取獻者以宜並受也其取之由賓南而自後右客也賓固辭公答再拜注拜受於賓也固亦衍字擯者立於閾外以相拜賓辟注相贊也擯者授宰夫於中庭注東藏之既乃介覿若兄弟之國則問夫人注兄弟謂同姓若昏姻甥舅有親者問猶遺也謂獻也不言獻者變於君也非兄弟獻不及夫人蕙田案以上記私獻若君不見注君有疾若他故不見使者使大夫受注受聘享也大夫上卿也自下聽命自西階升受負右房而立賓降亦降注此儀如還圭然而賓大夫易處耳今文無而左疏還玉時賓自大夫左受之此大夫於賓受之故云易處也不禮注辟正主也蕙田案以上記君不親受幣之所及皆勞不釋服注以與賓接於君所賓又請有事於己不可以不速也所不及者下大夫未嘗使者也不勞者以先是賓請有事於己同類既聞彼為禮所及則已往有嫌也所以知及不及者賓請有事固曰某子某子蕙田案以上記大夫勞賓賜饔唯羮飪筮一尸若昭若穆注羮飪謂飪一牢也肉謂之羮唯是祭其先大禮之盛者也筮尸若昭若穆容父在父在則祭祖父卒則祭禰腥餼不祭則士介不祭也士之初行不釋幣於禰不祭可也僕為祝祝曰孝孫某孝子某薦嘉禮於皇祖某甫皇考某子注僕為祝者大夫之臣攝官也四疏若然諸侯不攝官使祝祝䇿矣案定年祝他又云嘉好之事君行師從卿行旅從則臣無事若君到主國祭饔之時得不攝官乎但大夫使僕攝祝則是本無祝官與諸侯異耳敖氏繼公曰并祭祖禰盛之也一牢而并祭并祭而一尸皆異於常禮欽定義疏孝孫對皇祖為稱孝子對皇考為稱亦科用其一非兩稱之也並舉之者以若昭若穆不定惟人所指耳若并祭祖禰則祝辭但稱孝孫不當并稱孝子卑統於尊也周公并告太王王季文王而册祝之辭但云元孫某可以見其例矣在國則祝者公有司也祝不從行而僕攝之事神之職祝為尊大夫之貴臣老與士而已此僕為祝者其亦公家之臣與佐食宗人賓則同行者皆可為之宗人薦豆設敦且亞獻以其無主婦宗人宜攝之也司馬司士則皆其臣為之如饋食之禮注如少牢饋食之禮不言少牢今以太牢也疏少牢禮有尊俎籩豆鼎敦之數陳設之儀隂厭陽厭之禮九飯三獻之法此皆宜有之至於致爵加爵及獻兄弟弟子等固當略之矣假器於大夫注不敢以君之器為祭器朌肉及廋車注朌猶賦也廋廋人也車巾車也二人掌視車馬之官也賦及之明辨也張氏爾岐曰祭訖頒胙無不遍也夏官廋人職掌養馬蕙田案以上記賓受饔以祭聘日致饔明日問大夫注不以殘日問人崇敬也夕夫人歸禮注與君異日下之也今文歸作饋既致饔旬而稍宰夫始歸乘禽日如其饔餼之數注稍稟食也乘謂乘行之禽也謂鴈鶩之屬其歸之以雙為數其賓與上介也古文既為餼張氏爾岐曰十日之後賓不得時反則致稍廩與乘禽鴈鶩之屬行有行列故曰乘禽如饔餼之數者一牢當一雙故聘義云乘禽日伍雙是饔餼五牢者也上介則日三雙士介日一雙士中日則二雙注中猶間也不一日一雙大寡不敬也凡獻執一雙委其餘於面注執一雙以將命也面前也其受之則上介受以入告之士舉其餘從之賓不辭拜受於庭上介執之以相拜於門中乃入授人上介受亦如之士介拜受於門外禽羞俶獻比注比放也其致之禮如乘禽也禽羞謂成熟有齊和者俶獻四時珍美新物也俶始也言其始可獻也聘義謂之時賜蕙田案以上記禮賓之節及羞獻歸大禮之日既受饔餼請觀注聘於是國欲見其宗廟之好百官之富若尤尊大之焉李氏如圭曰吳季札聘魯請觀周樂晉韓起聘魯觀書於太史氏是其類訝帥之自下門入注帥猶道也從下門外入遊觀非正也蕙田案以上記賓請觀各以其爵朝服注此句宜在凡致禮下蕙田案此記致禮者之爵服士無饔無饔者無儐注謂歸餼也蕙田案此記士介之殺禮大夫不敢辭君初為之辭矣注此句宜在明日問大夫之下蕙田案此記賓問大夫凡致禮皆用其饗之加籩豆注凡致禮謂君不親饗賓及上介以酬幣致其禮也其具賓與上介也加籩豆謂其實也亦實於甕筐饗禮今亡蕙田案此記致饗禮無饔者無饗禮注士介無饗禮蕙田案此記士無饗凡餼大夫黍粱稷筐五斛注謂大夫餼賓上介也器寡而大略蕙田案此記大夫餼賓介既將公事賓請歸注謂已問大夫事畢請歸不敢自専謙也主國留之饗食燕獻無日數盡殷勤也凡賓拜於朝訝聽之注拜拜賜也唯稍不拜蕙田案此記賓請歸及拜賜燕則上介為賓賓為苟敬注饗食君親為主尊賓也燕私樂之禮崇恩殺敬也賓不欲主君復舉禮事禮已於是辭為賓君聽之從諸公之席命為苟敬苟敬者主人所以小敬也更降迎其介以為賓介大夫也雖為賓猶卑於君君則不與亢禮也主人所以致敬者自敵以上宰夫獻注為主人代公獻蕙田案此記燕無行則重賄反幣注無行謂獨來復無所之也必重其賄與反幣者使者歸以得禮多為榮所以盈聘君之意也反幣謂禮玉束帛乘皮所以報聘君之享禮也昔秦康公使西乞術聘於魯辭孫而説襄仲曰不有君子其能國乎厚賄之此謂重賄反幣者也疏此特來非歷聘歷聘則吳公子札聘於上國是也蕙田案此記特聘曰子以君命在寡君寡君拜君命之辱注此贊君拜聘享辭也在存也夫疏此及下三經即上經公館賓賓辟上介聽命聘享人之聘享問大夫送賓公皆再拜注云拜此四事彼見其拜此見其贊辭也君以社稷故在寡小君拜注此贊拜夫人聘享辭也言君以社稷故者夫人與君敵體不敢當其惠也其卒亦曰寡君拜命之辱君貺寡君延及二三老拜注此贊拜問大夫之辭貺賜也大夫曰老又拜送注拜送賓也其辭蓋云子將有行寡君敢拜送此宜承上君館之下蕙田案又拜送三字監本及敖本皆在君貺寡君之上唐石經及謝子祥郝敬張爾岐盛世佐諸本並在延及二三老拜之下於文義為順又案此四節記公館賓贊拜所釋之辭賈疏最明注云此宜承上君館之下謂自曰子以君命在寡君以下至此並當承上記眀日君館之下也朱子儀禮經傳通解楊氏儀禮圖僅以又拜送句入公館賓章而以子以君命在寡君寡君拜君命之辱入受玉章君以社稷故在寡小君拜入聘享夫人章君貺寡君延及二三老拜入賓問卿章似失注意又案此記公館賓之辭賓於館堂楹間釋四皮束帛賓不致主人不拜注賓將去是館留禮以禮主人所以謝之也不致不拜不以將别崇新敬也疏若鄊飲酒送賓賓不答禮有終相類也蕙田案此記賓釋皮帛於館大夫來使無罪饗之注樂與嘉賓為禮過則餼之注餼之生致其牢禮也其致之辭不云君之有故耳聘義曰使者聘而誤主君不親饗食所以愧厲之也不言罪者罪將執之張氏爾岐曰君有故亦不親饗此以使者有過不饗故致辭異也其介為介注饗賓有介者尊賓行敵禮也經疏饗賓於廟之時還以聘之上介為介上上介主人别行饗則是從賓為介之外復别饗也有大客後至則先客不饗食致之注卑不與尊齊禮蕙田案此記饗不饗之宜唯大聘有几筵注謂受聘享時也小聘輕雖受於廟不為神位蕙田案此記几筵十斗曰斛十六斗曰籔十籔曰秉注秉十六斛今江淮之間量名有為籔者今八籔為逾二百四十斗注謂一車之米秉有五籔張氏爾岐曰致饔時每車米數四秉曰筥注此秉謂刈禾盈手之秉也筥穧名也若今萊陽之間刈稻聚把有名為筥者詩云彼有遺秉又云此有不斂穧疏對上文秉為量名十筥曰稯十稯曰秅四百秉為一秅注一車之禾三秅為千二百秉三百筥三十稯也張氏爾岐曰致饔時禾三十車車三秅此其秉數蕙田案此記米禾之數薛氏禮圖諸侯相聘之法卿既受命將行之旦釋幣于禰告為君使乃受命于朝介及衆介皆從之受聘圭受享束帛加璧受夫人聘璋享琮遂行始至所聘之境張旜主君使士請事遂入斂旜至近郊張旜君使下大夫請行反君使卿朝服用束帛勞夫人使下大夫用棗栗勞及國主人請受示不敢留賓賓請間示不敢迫主人卿致館使若上卿則館于大夫之廟大夫館于士之廟宰夫朝服致飱明日賓皮辨服至于大門外西次主君迎賓大門內其擯數主君依已之爵位上擯在闑東門外西面北上承擯次南紹擯又次南皆西面賓出次當闑西北面上介次北衆介亦繼而北使介及陳位相去之數各依聘君之爵位君朝則使傳命聘使陳而已不傳命其上擯之請事揖賓俱進至末擯間賓亦進至末介間相對言也時公在大門內亦皮辨服請事訖賓入大門內公再拜公揖入遂入賓既入上介不襲執圭屈繅以授賓賓襲而執圭遂與主君揖讓升授玉主君襲受受玉訖裼而立受時介皆入在門內賓裼奉束帛加璧享享皆裼受庭中所陳或皮馬隨國所有次行夫人聘享亦如之皆君為之受既受享然後主君禮賓以醴酒荐脯醢禮以束帛乘馬賓既行私覿奉束錦乘馬以覿既覿而出君送至大門內問君問夫人賓對遂還館賓既還館主國卿皆就館勞皆用雁主君使卿韋辨服歸饔賓亦以皮辨服受之使大夫奉束帛以致賓亦以束帛乘馬儐使者夕夫人使下大夫韋辨歸禮大夫以束帛致之賓受如受君饔餼禮儐之以乘馬束錦于賓一食再饗燕或有或無上介一食一饗賓皆再拜于朝若不親饗食則大夫各以爵朝服致之以侑幣如致饔無儐致饗以酬幣亦如之君使卿皮辨還圭璋賓亦皮辨襲而受于公館賓遂行舍于近郊公使卿贈如受牢禮無擯還境而請反命乃先入至朝反命然後還家薦于廟右儀禮聘禮五禮通考卷二百三十
