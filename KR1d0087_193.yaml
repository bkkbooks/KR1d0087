body:
  text: 五禮通考卷一百八十三刑部尚書秦蕙田撰嘉禮五十六觀象授時易革卦象𫝊澤中有火革君子以治歴明時注歴數時㑹存乎變也虞氏翻曰天地革而四時成故君子以治歴明時也程子曰革變也君子觀變革之象推日月星辰之遷易明四時之序也夫變易之道事之至大理之至明跡之至著莫如四時觀四時而順變革則與天地合其序矣朱子語類林艾軒説因革卦得律法云律須年年改革不改革便於天度有差此説不然天度之差葢縁不曽推得律元定不因不改而然律豈是年年改革也者治律明時非謂律當改革葢四時變革中便具有治律明時之理戴氏震曰革與時義合天地革而四時成春革而夏夏革而秋秋革而冬冬又革而春治律者明此者也葢錯分至啟閉于朔望弦晦之間二者不同或先或後非治律無以明大象本指以變革屬時非以變革屬律先儒或謂三辰有差律當改革使三辰果有差則巧律莫之能推矣惟其無差千嵗之日至可坐而致然則術家所謂差者皆非差也自然之行如是也但數有㣲而未顯法有久而始精者初推之而不合則謂之差及驗之久而究其根則知非差方其初未嘗積驗雖聖人有所不知久之而後有定算又久之而後得其根既得其根則至常而不可革此宜隨時修正而非改革之謂也蕙田案朱子謂四時改革便具治律明時道理不取林氏之説細思之四時變革者治律之本也隨時改革者治律之法也聖人之言義藴深逺似當兼此兩義為足附論律當隨時修改後漢書志賈逵論曰天道參差不齊必有餘餘又有長短不可以等齊觀象者方以七十六嵗㫁之則餘分稍長稍得一日故易金火相革之卦象曰君子以治歴明時又曰湯武革命順乎天應乎人言聖人必象日月星辰明數不可貫數千萬嵗其間必改更先距求度數取合日月星辰所在而已故求度數取合日月星辰有異世之術太初術不能下通於今新法不能上得漢元一家術法必在三百年之間故䜟文曰三百年斗數改憲晉書天文志當陽侯杜預著春秋長律説云天行不息日月星辰各運其舍皆動物也物動則不一雖行度有大量可得而限累日為月累月為嵗以新故相涉不得不有毫末之差此自然之理也故春秋日有頻月有蝕者曠年不蝕者理不得一而算守恒數故術無不有先後也始失於毫毛而尚未可覺積而成多以失弦望晦朔則不得不改憲以從之書所謂欽若昊天言當順天以求合非為合以驗天者也蕙田案順天求合則改革中兼有欽若之義明鄭世子朱載堉進書疏律者嵗之積也嵗者月之積也月者日之積也日者時之積也時者刻之積也刻者分之積也分者秒之積也凡有形之物銖銖稱之至石必差寸寸量之至引必錯况無形之數乎夫乾樞斡運無停七政轉動不齊而拘之以一定之法猶膠柱而調瑟是以既久則不能不差既差則不可不改葢變法以從天隨時而推數故法有疏宻數有繁簡雖調例稍殊而綱目一也梅氏文鼎曰聖人言治律明時葢取於革故觀象者當順天以求合不當為合以驗天若預為一定之法而不隨時修改以求無弊是為合以驗天矣又何以取於革乎且吾嘗徴之天道矣日有朝有禺有中有昃有夜有晨此閱一日而可知者也月有朔有生明有弦有望有生魄有下弦有晦此閱一月而可知者也時有春夏秋冬晝夜有永短中星有推移此閱一嵗而可知者也乃若熒惑之周天則閱二年嵗星則十二年土星則二十九年夫至於十二年二十九年而一周已不若前數者之易見矣又其毎周之間必有過不及之餘分所差甚㣲非多周豈能灼見乃若嵗差之行六七十年始差一度至二萬五千餘年而始得一周雖有期頤上夀所見之差不過一二度亦安従辨之迨其積年既久差數愈多然後共見而差法立焉此非前人之智不若後人也前人不能預見後來之差數而後人則能盡考前代之度分理愈久而愈明法愈修而愈宻勢則然耳江氏永曰易取象於革久之不能不改非久亦不能改各平行率有積之數十年㣲覺其差而即改者如最卑行有通前後數百年或千餘年測準之度分用以相距定為平行其尾數或有未真必甚久而後可改者如七政平行有前人立法未精改之而加宻者如日食加時東西差昔以午正為限後改用黄平象限近又以白道算定交角有前人用法稍煩改之而徑捷者如六曜求初均昔用平三角今以直角算若夫黄赤相距之緯古闊而今漸狹黄赤相距西史第谷測得二十三度三十一分半今測得二十三度二十九分三十秒康熈五十三年臺官宻測立表今又當稍減矣太陽本輪均輪之半徑古大而今漸小太陽本輪均輪兩半徑併昔用十萬分之三千五百八十四或以一千萬為本天半徑則為三十五萬八千四百一十六日躔加減差表三宫九宫初度其均度二度三分一十秒平春分與定春分相距二日一小時有竒而今平春分與定春分相距一日二十二小時弱則最大之均度一度五十五分比舊例少八分本輪均輪兩半徑合得三十三萬五千四百有竒耳此二差出於常理之外前不知若何而始後不知若何而極非法之所能馭黄道為諸道之宗太陽為衆曜之君有此二差則六曜之出入於黄道離合於太陽者亦因之而小有改變惟隨時宻測以合天行耳戴氏震曰朱子言天度之差縁不曽推得律元定此理固然至欲推定律元則亘古無其法由漢而下觀象者七十餘家各立一元皆謂自今推定永為法典及用不數年輒差何也審之于寸積而至尺差矣修之於尺積而至丈又差矣推而極之至于無窮吾未見其差於何止也然天有參差之數數有一定之理不因數之參差而變法以從之猶之不因計算之差而改吾度量權衡以從之也今之治法不在推律元而在于求一定之理以為不變之法則庶㡬矣觀承案戴氏謂天有參差之數而數有一定之理不因數有參差而變法以従之此論最圓葢聖人立常以待變而不逐變以亂常惟以有常之法核無常之變故參差可得而見若變法以従則反無以測其變矣凡事皆然於律術尤甚大戴禮曽子所云其該之矣但有常之法雖定而參差之故難齊故隨時修改乃體大易澤火之象則又不可膠柱而鼓瑟焉耳大戴禮記曽子曰聖人慎守日月之數以察星辰之行以序四時之順逆謂之歴右觀象名義春秋昭公十七年左氏𫝊郯子曰我髙祖少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏歴正也注鳯鳥知天時故以名官𤣥鳥氏司分者也注𤣥鳥燕也以春分來秋分去伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止青鳥氏司啟者也注青鳥鶬鴳也以立春鳴立夏止丹鳥氏司閉者也注丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆歴正之屬官蕙田案諸史𫝊記皆言黄帝迎日推䇿考定日星而少皥之時有司分至啟閉之官顓頊命重黎職司天地今㫁自堯典以下而畧於上世古籍云亡時時見於雜說非所徴信也故概置不録右上古觀象書堯典乃命羲和欽若昊天歴象日月星辰敬授人時𫝊重黎之後羲氏和氏世掌天地四時之官故堯命之使敬順昊天星四方中星辰日月所㑹此舉其目下别序之日疏日月所㑹與四方中星俱是二十八宿舉其人所見以星言之論其日月所㑹以辰言之陸氏徳明曰日月所㑹謂日月交㑹于十二次也寅曰析木卯曰大火辰曰夀星巳曰鶉尾午曰鶉火未曰鶉首申曰實沈酉曰大梁戌曰降婁亥曰娵訾子曰𤣥枵丑曰星紀李氏光地曰王氏充耘以寅賔之類為推步日星鳥之類為推步星者極確然未言測象月辰者在何處也葢律象日月星辰一句是總綱分命四節則測象日星之事也汝羲暨和一節則測象月辰之事也日紀于星而成嵗故有分至啟閉之節月㑹于辰而成月故有朔晦望弦之分分至啟閉者民事之所闗也故以定其節候為先務朔晦望弦雖非民事所闗然亦于天道相為經緯而于庶政相為紀綱者非有以參合而整齊之則亦五紀亂而理數乖矣是故測日晷考中星是所以測象日星而使分至啟閉之無失節者也推交㑹置閏餘是所以測象月辰而使朔晦望弦之無失期者也必至是而後律事就蕙田案觀象授時以日躔為準發歛周則嵗功成以月逡為節朔望盡則月迭改以中星為變位漸移則時節異以十二辰為紀數不齊則正以閏明而授之於民然後民知趨候不失其時舜典在璿璣玉衡以齊七政𫝊在察也璿美玉璣衡王者正天文之器可運轉者七政日月五星各異政儀疏璣衡者璣為轉運衡為横簫漢世以來謂之渾天者是也馬融云渾天儀可旋轉故曰璣衡其横簫所以視星宿也蔡邕云玉衡長八尺孔徑一寸下端望之以視星辰葢懸璣以象天而衡望之轉璣窺衡以知星宿是其説也七政謂日月與五星也木曰嵗星火曰熒惑星土曰鎮星金曰太白星水曰辰星測天之事見於經者惟有此璿璣玉衡一事而已蔡邕天文志云言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜絶無師説周髀術數具在考驗天象多所違失故史官不用惟渾天者近得其情今史所用候臺銅儀則其法也王蕃渾天説曰天之形狀似鳥卯天包地外猶殻之裹黄圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見有一百八十二度半强地下亦然其南北極持其兩端其天與日月星宿斜而迴轉揚子法言云或問渾天曰洛下閎營之鮮于妄人度之耿中丞象之㡬乎㡬乎莫之能違也閎與妄人武帝時人宣帝時司農中丞耿夀昌始鑄銅為之象史官施用焉後漢張衡作靈憲以説其狀蔡邕鄭𤣥陸績呉時王蕃晉世姜岌葛洪皆論渾天之義並以渾説為長江南宋元嘉年皮延宗又作是渾天論太史丞錢樂之鑄銅作混天儀𫝊之齊梁周平江陵遷其器於長安今在太史書矣衡長八尺璣徑八尺圓周二丈五尺强轉而望之有其法也隋書天文志案虞書舜在璿璣玉衡以齊七政則考靈曜所謂觀玉儀之遊昏明主時乃命中星者也春秋文耀鈎云唐堯即位羲和立渾儀而先儒或因星官書北斗第二星名璇第三星名璣第五星名玉衡仍七政之言即以為北斗七星載筆之官莫之或辨史遷班固猶且致疑馬季長創謂璣衡為渾天儀鄭𤣥亦云其轉運者為璣其持正者為衡皆以玉為之七政者日月五星也故王蕃云渾天儀者羲和之舊器積代相𫝊謂之璣衡其為用也以察三光以分宿度者也又有渾天象者以著天體以布星辰而渾象之法地當在天中丌勢不便故反觀丌形地為外匡於己解者無異在内詭狀殊體而合於理可謂竒巧然斯二者以考於天葢宻矣又云古舊渾象以二分為一度周七尺三寸半而莫知何代所造今案虞喜云洛下閎為漢孝武帝於地中轉渾天定時節作泰初術或其所製也漢孝和帝時太史揆候皆以赤道儀與天度頗有進退以問典星待詔姚崇等皆曰星圗有規法日月實從黄道官無其器至永元十五年詔左中郎將賈逵乃始造太史黄道銅儀至桓帝延熹七年太史令張衡更以銅製以四分為一度周天一丈四尺六寸一分亦於宻室中以漏水轉之令司之者閉户而唱之以告靈臺之觀天者璇璣所加某星始見某星巳中某星今没皆如合符然則渾天儀者其制有璣有衡既動静兼狀以效二儀之情又周旋衡管用考三光之分所以揆正宿度準步盈虛求古之遺法也則先儒所言圓規徑八尺漢候臺銅儀蔡邕所欲寢伏其下者是也蔡氏沈曰歴代以來其法漸宻本朝因之為儀三重其在外者六合儀平置黒單環俞氏震曰名地平環此地靣四方之象也上刻十二辰入於四隅在地之位以準地靣而定四方側立黒雙環俞氏震曰名天經環此天半在地上半在地下之象也背刻去極度數陳氏師凱曰皆是自北數向南去之度以中分天脊直跨地平使其半入地下而結於其子午以為天經斜倚赤單環俞氏震曰名天緯環上下與天經相銜東西與地平相銜此天腹赤道之象也背刻赤道度數陳氏師凱曰皆是自西數向東去之度以平分天腹横繞天經亦使半出地上半入地下而結於其卯酉以為天緯三環表裏相結不動其天經之環則南北二極皆為圓軸虚中而内向以挈三辰四遊之環以其上下四方於是可考故曰六合次其内曰三辰儀則立黒雙環俞氏震曰制即如天經黒雙環在内而差小銜附黄赤二環以轉動亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則為赤單環俞氏震曰制亦如天緯赤單環在内而差小上下與三辰雙環相銜外依天緯亦刻宿度而結於黒雙環之卯酉其黄道則為黄單環俞氏震曰上下亦與三辰雙環相銜亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其内以為春分後之日軌半出其外以為秋分後之日軌又為白單環俞氏震曰鎖定黄赤二環以承其交使不傾墊下設機輪以水激之使其日夜隨天東西運轉以象天行以其日月星辰於是可考故曰三辰其最在内者曰四遊儀亦為黒雙環如三辰儀之制俞氏震曰在内而又小以貫天經之軸其環之内則兩面當中各施直距俞氏震曰直距者銅板二縦置于四遊儀内上屬北極下屬南極中施闗軸以夾望筒所謂望筒者即玉衡也外指兩軸而當其要中之内面又為小窽以受玉衡要中之小軸使衡既得隨環東西運轉又可隨處南北低昂以待占候者之仰窺焉以其東西南北無不周徧故曰四遊俞氏震曰右渾儀三重六合不動以象天地四方三辰運動以象天行四遊則亦運動而窺測焉雙環雙鑄一様二合為一故厚可貫管軸單環單鑄故薄其天經環南北二極之次有孔銜軸以穿三辰四遊于内使可運轉軸如管虛中其外有臍兩層以間隔三辰四遊之位次此其法之大畧也沈括曰舊法規環一面刻周天度一面加銀丁葢以夜候天晦不可目察則以手切之也古人以璿飾璣疑亦為此今太史局秘書省銅儀制極精緻亦以銅丁為之歴家之説又以北斗魁四星為璣杓三星為衡今詳經文簡質不應北斗二字乃用寓名恐未必然姑存其説以廣異聞欽定書經𫝊說彚纂璿璣玉衡乃觀天之器也理非數無以顯數非象無以明璿璣玉衡實具天象七政麗天惟月之距地為近次日次金水次火次木次土而恒星為最逺七政之行惟月之左旋為速次日次金水次火次木次土而恒星為最遲又就其行度細較之日有盈縮月有朓朒五星復有遲留順逆之不同必有以齊之而後可焉然七政之行必紀於天之度而天度不離乎黄赤二道之經緯平分天腰者赤道也交于赤道以㑹于兩極者為赤經與赤道平行者為赤緯斜交赤道而出其内外者黄道也交于黄道以㑹于黄極者為黄經與黄道平行者為黄緯聖人觀天地之經緯七政之運行而為璿璣以象之復為玉衡以窺之以察日之南北則節氣之早晚可辨以察日之出入則晝夜之永短可分以察月之周天與㑹日則晦朔弦望之期候可定至于五星之㑹日沖日而有合伏退望五星之近日逺日而有順逆遲留與夫日月五星之互相掩映而為交食凌犯俱可推步而不爽是即所謂齊也葢璿璣之設象天體之經緯玉衡之製窺七政之運行雖有周髀宣夜渾天之異名要皆與璣衡相為表裏者也李氏光地曰七政之行不齊而一政之行又自不齊故日則有盈縮月五星則有遲疾而五星且有留退虞周步推之法不可聞己後代考測至今日而始明其説曰七政皆終古平行也因有髙卑逺近而生遲疾皆視行也天以圓而運七政逐天亦以圓而運如丸珠之隨盤皆自作迴環之勢非逕行也故因行而生輪因輪而生髙下逺近仰而視之贏縮遲疾以至留退皆由於此矣然日者従天其輪一而已月五星從天又欲日故有隨天之輪又有逐日之輪兩者相加然後髙下之視逕遲疾之視差一一可以籌策運算而坐致之葢雖古所未講而其理不誣也戴氏震書補𫝊古者測天之器其制不𫝊後世渾天儀設璣衡以擬其名未必與古合也考之周髀有北極樞及北極璿璣之名所謂北極樞者今之赤極是也所謂北極璿璣者今之黄極是也釋周髀者不知北極璿璣何指葢其名出于古逺世所莫聞因思虞書之璿璣注疏家徒以為運轉之機未得其本象夫在天有赤極為赤道之樞又有黄極為黄道之樞自中土言之皆在北方故通曰北極北極不動黄極毎晝夜左旋環繞之而過一度毎一嵗而周四遊是赤極又為黄極之樞也惟其然故周髀謂赤極為北極樞而黄極無其名乃取測器之名以命之用是知唐虞時作璿璣運旋于中所以擬夫黄極者也衡横也横帶中圍周髀所謂七衡以界黄道其中衡則赤道或古之遺制與日月五星謂之七政出鄭康成注後儒悉從之伏生尚書大𫝊則曰七政謂春秋冬夏天文地理人道所以為政也人道正而萬事順成太史公作天官書馬融注尚書又以為北斗七星三説參差惟鄭近是然稽之于古實無明證堯典日月星辰星謂中星初不及五緯洪範五紀所謂星辰同乎堯典孔穎達云五星所行下民不以為候其説得之五緯至後代推測漸詳唐虞時恐未及此即推之不失亦非正年嵗攸闗何以與日月並稱七政乎今思政者實據人事立名堯典定四時成嵗即繋之以庶績咸熈臯陶謨曰撫于五辰庶績其凝庶績之熈也凝也由政之得宜而政之宜由于順天嵗月五辰而七凡所以順天出政不外乎是禮運亦言播五行于四時古人之以五行配時其來逺矣推日月之運循五行之序于是有嵗之政焉分至啟閉是也有月之政焉正朔告月是也有木火土金水五者之政焉法制禁令各順其時之宜是也分言之其政有七約言之一敬授民時而已必察璿璣玉衡者非躬自推算測驗也觀乎天文以察時變設器觀象不違天運然後為嵗為月為五辰一合乎天道以齊人事舜攝位之初而言齊七政斯以見政無弗舉庶績悉在是矣至若五星之行無闗授時之大在算家亦宜知之豈所急哉觀承案戴氏以嵗月五辰為七政其説似新然日主嵗月主月五星即五辰之精其與以二曜五緯為七政者亦何異哉惟不重在術數而歸於授時熈績之大則於經義為得之臯陶謨撫于五辰庶績其凝𫝊凝成也言百官皆撫順五行之時衆功皆成疏五行之時即四時也禮運曰播五行於四時土寄王四季故為五行之時也所撫順者堯典敬授民時平秩東作之類是也胡氏旦曰五行在地為物在天為時順其時而撫之則五物皆成其材而為人用矣故仲春斬陽木仲夏斬隂木所以撫木辰也季春出火季秋納火所以撫火辰也司空以時相阪隰所以撫土辰也秋為徒杠春達溝渠所以撫水辰也又春盛徳在木布徳施恵所以順木辰夏盛徳在火勞民勸農所以順火辰秋盛徳在金冬盛徳在水禁暴誅慢謹葢蔵歛積聚所以順金水之辰土寄旺四時四辰順土在其中矣論語顔淵問為邦子曰行夏之時注據見萬物之生以為四時之始取其易知寅疏夏之時謂以建之月為正也宋書志祖沖之曰月位稱建諒以氣之所本名隨實著非為斗杓所指近校漢時已差半次審斗節時其效安在或義非經訓依以成說將緯候多詭偽辭閒設乎梅氏文鼎疑問補問行夏之時謂以斗柄初昏建寅之月為嵗首議者以冬至既有嵗差則斗柄亦從之改度今時正月不當仍為建寅其説然乎曰不然也孟春正月自是建寅非闗斗柄其以初昏斗柄建寅者注釋家未深考也何則自大撓作甲子以十日為天干自甲至癸十二子為地支自子至亥天道圓故以甲乙居東丙丁居南庚辛居西壬癸居北戊己居中參同契所謂青赤白黒各居一方皆禀中央戊己之功也十干以配五行圎轉周流故曰天干也地道方故以寅卯辰列東巳午未列南申酉戌列西亥子丑列北易大𫝊所謂帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮自東而南而西而北其道左旋周而復始也是十二支以配四時十二月静而有常故曰地支也天干與地支相加成六十甲子以紀嵗紀日紀時而皆準于月以嵗有十二月也此乃自然而然之序不可増減不可動移是故孟春自是寅月何嘗以斗柄指寅而後謂之寅月哉如必以斗柄指寅而謂之寅月則亦有寅年寅月寅時豈亦以斗柄指寅而後得以謂之寅乎是故堯典命羲仲宅嵎夷平秩東作以殷仲春次命羲叔宅南交平秩南訛以正仲夏次命和仲宅西平秩西成以殷仲秋次命和叔宅朔方平在朔易以正仲冬此四時分配四方而以春為嵗首之證夫既有四仲月以居卯午酉子之四正則自各有孟月季月以居四隅仲春既正東為卯月其孟春必在東之北而為寅月何必待斗柄指寅乎故日中星鳥日永星火宵中星虛日短星昴並祇以晝夜刻之永短為憑以昏中之星為㫁未嘗一言及於斗柄也又考孔子去堯時已及千五百嵗嵗差之度已二十餘度若堯時斗柄指寅孔子時必在寅前二十度而指丑矣豈待今日而後知乎然孔子但言行夏之時葢以孟春為嵗首于時為正非以斗柄指寅而謂之寅月也又案斗杓之星距北極只二十餘度必以北極為天頂而後可以定其所指之方今中土所處在斗杓之南仰而觀之斗杓與辰極並在天頂之北其斗杓所指之方位原難清楚故古人祇言中星不言斗杓葢以此也如淮南子等書言招搖東指而天下春不過大概言之原非以此定月又案𫝊言營室之中土功其始火之初見期于司里又言水昏正而栽日至而畢詩亦言定之方中作于楚宫又言七月流火九月授衣古之人以星象授人時如此者不一而足也若以嵗差考之則于今日並相差一二旬矣然而當其時各據其時之星象為之著令所以使民易知也而終未有言斗杓指何方而作何事者則以其方位之難定也十二月建之非闗斗柄明矣是故斗柄雖因嵗差而所指不同正月之建寅不可易也又考嵗差之法古雖未言然而月令昏中之星已不同于堯典則實測當時之星度也然堯典祇舉昏中星而月令兼言旦中又舉其日躔所在又于堯典四仲月之外兼舉十二月而備言之可謂詳矣然未嘗一語言斗杓指寅為孟春又考史記律書以十律配十二月之所建地支而疏其義兼八風二十八舍以為之說而並不言斗建惟天官書畧言之其言曰杓攜龍角衡殷南斗魁枕參首用昏建者杓夜半建者衡平旦建者魁是則衡亦可言建魁亦可言建而非僅斗杓夜半亦有建平旦亦有建而非止初昏其言甚圓以是而知正月之為寅二月之為卯皆一定不可移而斗之星直之即謂建固非以初昏斗柄所指而命之為何月也然則謂行夏之時是以斗柄建寅之月為嵗首者葢注釋家所據一家之說而未詳厥故也今乃遂據其說而欲改正月之建寅可乎不可乎問説者又以各月斗柄皆指其辰惟閏月則斗柄指兩辰之間由今以觀其說亦非歟曰非也周天之度以十二分之各得三十度竒在西法為三十度凡各月中氣皆在其三十度之中半各月節氣皆居其三十度之首尾今依其說斗柄所指各在其月之辰則交節氣日斗柄所指必在兩辰之間矣假如立春為正月節則立春前一日斗柄所指在丑立春後一日斗柄指寅而立春本日斗柄所指必在丑與寅之問餘月皆然十二節氣日皆指兩辰之間又何以别其為閏月乎若夫閏月則只有節氣無中氣其節氣之日固指兩辰之間矣然惟此一日而已其前半月後半月並非兩辰之間也假如閏正月則雨水中氣在正月晦春分中氣在二月朔而閏月只有驚蟄節在月望則其前半月必指寅後半月必指卯惟驚蟄日指寅與卯之交界縫中可謂之兩辰間閏在餘月亦然地盤周圍分為十二辰首尾鱗次如環無端又何處設此三十度於兩辰間以為閏月三十日之所指乎凡若此等習説並由未經實測而但知斗杓所指為月建遂岐中生岐成此似是而非之解天下事毎壊於一知半解之人往往然也蕙田案斗建之說始見於汲冡周書時訓篇既以毎月斗正指辰則閏月不得正指而在兩辰之間猶之閏無中氣前月中氣在晦後月中氣在朔謂閏月在兩中氣之間未嘗不可其失不在斗指兩辰之間一語而在於泥以斗杓為建時節祖沖之已辨其非後人未見耳禮記禮運孔子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉注得夏四時之書也其書存者有小正蕙田案堯典以四方配四時臯陶謨以五辰言四時考諸十二子之位皆嵗首寅也獨謂建寅謂夏時者對殷周言之亦其書至夏始詳耳觀承案獨謂夏正建寅者堯舜禹三聖相嬗而守一道正朔未嘗有改至商周革命而始改正朔故對商周言之而但舉夏時則唐虞之建寅不必言矣至建寅之所以為時之正令之善者不必逺推元㑹也有即小而可以見大即近而可以知逺者焉一日十二辰子丑二時自當為今日之始然東方未明何能有作則當以建寅為正月可徴故三正迭建而夫子告顔淵必曰行夏之時右虞夏觀象附論月建書洪範次四曰協用五紀傳協和也四五紀一曰嵗𫝊所以紀四時二曰月傳所以紀一月三曰日𫝊紀一日四曰星辰𫝊二十八宿迭見以叙氣節十二辰以紀日月所會五曰歴數疏一曰嵗從冬至以及明年冬至為一嵗二曰月從朔至晦大月三十日小月二十九日三曰日從夜半以至明日夜半周十二辰為一日四曰星辰星謂二十八宿昏明迭見辰謂日月别行㑹于宿度從子至于丑為十二辰五曰歴數算日月行道計氣朔早晚所以為一嵗之律凡此五者皆所以紀天時故謂之五紀也五紀不言時者以嵗月氣節正而四時亦自正也鄭以為星五星也然五星所行下民不以為候天以積氣無形二十八宿分之為限每宿各有度數合成三百六十五度有餘日月右行循此宿度日行一度月行十三度有餘二十九日過半而月一周與日㑹毎于一㑹謂之一月是一嵗為十二月仍有餘十一日為日行天未周故置閏以充足若均分天度以為十二次則每次三十度有餘一次之内有節氣中氣次之所管其度多于每月之所統其日入月朔參差不及節氣不得在月朔中氣不得在月半故聖人律數此節氣之度使知氣所在既得氣在之日以為一嵗之律春秋昭公七年左氏𫝊十一月季武子卒晉侯謂伯瑕注伯瑕士文伯曰吾所問日食從矣可常乎注衞侯武子皆卒故對曰不可六物不同注各異時民心不壹注政教殊事序不類注有變易官職不測注治官居職非一法同始異終胡可常也詩曰或燕燕居息或憔悴事國注詩小雅言不同其異終也如是公曰何謂六物對曰嵗時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰注一嵗日月十二㑹所㑹謂之辰謂疏時謂四時春夏秋冬也星二十八宿也日月㑹之辰者辰時也言日月聚㑹有時也故以配日注謂以子丑配甲乙周禮春官馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其序事以㑹天位注辨其序事謂若仲春辨秩東作仲夏辨秩南訛仲秋辨秩西成仲冬辨在朔易㑹天位合此嵗日月辰星宿五者以為時事之候若今太嵗在某月某日某甲朔日直某也丁疏十有二辰者謂子丑寅卯之等十日者謂甲乙丙之等二十八星者東方角亢氐房心尾箕北方斗牛之等以㑹天位者五者在天㑹合而會候故謂之天位蕙田案周始以十二嵗為一終其十二辰即十二子也當先言十日後言十二辰屬辭之體因嵗月辰皆十二故先及之秋官硩蔟氏則先日後辰此日辰合之以紀日與洪範左𫝊所言辰不同又案十有二嵗之位用之紀年者也十有二月之位用之紀月者也十有二辰十日之位用之紀日者也二十有八星之位用之紀日躔月逡者也秋官硩蔟氏以方書十日之號十有二辰之號十有二月之號十有二嵗之號二十有八星之號注云日謂從甲至癸辰謂従子至亥月謂從娵至荼嵗謂從攝提格至赤奮若星謂從角至軫即此嵗月辰日星五者屈原賦攝提貞於孟陬兮惟庚寅吾以降攝提嵗也孟陬月也庚寅日辰也嵗日月辰名義今不可考要以方位節候定之馮相氏掌其位以辨候而硩蔟氏但書其號以逐天鳥又或舉十二次紀嵗如曰嵗在娵訾之口其明年乃及降婁嵗五及鶉火之屬因嵗星毎嵗行一次故晉侯曰十二年矣是謂一終一星終也十二次雖可紀嵗周禮之十二嵗當以爾雅嵗名為正終十二嵗者五而嵗陽嵗名合而六十是為一周爾雅釋天嵗陽太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰强圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥黓在癸曰昭陽嵗名太嵗在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若月陽月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極月名正月為陬注離騷云攝提貞于孟陬二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為𤣥注國語云至於𤣥月是也十月為陽注純隂用事嫌於無陽故以名云十一月為辜十二月為涂注皆月之别名顧氏炎武曰甲至癸為十日寅至丑為十二辰此二十二名古人用以紀日不以紀嵗嵗則自有閼逢至昭陽十名為嵗陽攝提格至赤奮若十二名為嵗名後人謂甲子嵗癸亥嵗非古也自漢以前初不假借史記太初元年年名焉逢攝提格月名畢聚日得甲子夜半朔旦冬至其辨晰如此若吕氏春秋序意篇維秦八年嵗在涒灘秋甲子朔賈誼鵩賦單閼之嵗兮四月孟夏庚子日斜兮服集予舍許氏説文後叙粤在永元困頓之年孟陬之月朔日甲子亦皆用嵗陽嵗名不與日同之證漢書郊祀歌天馬徠執徐時謂武帝太初四年嵗在庚辰兵誅大宛也自經學日哀人趨簡便乃以甲子至癸亥代之子曰觚不觚此之謂矣又曰春秋之世各國皆自紀其年發之於言或參互而不易曉則有舉其年之大事而為言者若曰㑹于沙隨之嵗叔仲恵伯㑹卻成子于承匡之嵗鑄刑書之嵗晉韓宣子為政聘于諸侯之嵗是也又有舉嵗星而言若曰嵗五及鶉火嵗及大梁嵗在娵訾之口者從後人言之則何不曰甲子也癸亥也是知古人不用以紀嵗也蕙田案十日十二子數窮六十周則更始古人創此法以紀日由來逺矣一嵗之日六易甲子加大餘五併小餘而數起焉紀年紀月經𫝊未有稱甲子者嵗别立閼逢及攝提格等名月别立畢及陬等名周禮嵗月但紀於十二爾雅踵事加宻遂一合乎甲子之法同實而殊名耳名所以必殊者恐其溷淆慎别之也觀承案古無年號以閼逢攝提格等相配紀年方可辨識後代既有年號矣則但取甲子之單名以著其實而省於文亦何不可若後人作書而仍以古干支為目是欲復結繩之法於書契之代也不亦迂乎春官大史正嵗年以序事頒之於官府及都鄙注中數曰嵗朔數曰年中朔大小不齊正之以閏定四時以次序授民時之事疏云正嵗年者謂正嵗年以閏則四時有次序依之授民以事故云以序事也一年之内有二十四氣正月立春節啟蟄中二月雨水節春分中三月清明節穀雨中四月立夏節小滿中五月芒種節夏至中六月小暑節大暑中七月立秋節處暑中八月白露節秋分中九月寒露節霜降中十月立冬節小雪中十一月大雪節冬至中十二月小寒節大寒中皆節氣在前中氣在後節氣一名朔氣中氣在晦則後月閏中氣在朔則前月閏節氣有入前月法中氣無入前月法中氣帀則為嵗朔氣帀則為年假令十二月中氣在晦則閏十二月十六日得後正月立春節此即朔數曰年至後年正月一日得啟蟄中此中氣帀此即是中數曰嵗周天三百六十五度四分度之一日一日行一度月一日行十三度十九分度之七二十四氣通閏分之一氣得十五日二十四氣分得三百六十度仍有五度四分度之一一度更分為三十二五度為百六十四分度之一者又分為八分通前為百六十八分二十四氣分之氣得七分若然二十四氣氣有十五日七分五氣得三十五分取三十二分為一日餘三分推入後氣即有十六日氣有十五日七分者故云中朔大小不齊月有大小一年三百五十四日而已日餘仍有十一日是以三十二月已後中氣在晦不置閏則中氣入後月故須置閏以補之故云正之以閏蕙田案賈氏疏中數朔數之說殊未分曉葢中數者従今年冬至數至後年冬至凡三百六十五日四分日之一而十二中氣一帀也朔數者從今年正月朔數至後年正月朔凡三百五十四日有竒而十二月朔一周也孔穎達月令正義解中數朔數最是以中數朔數相較則一嵗有閏餘十一日弱故云中朔大小不齊正之以閏也賈疏以閏十二月得後年朔氣為朔數以後年正月朔得中氣為中數其實中氣一帀與節氣一帀皆三百六十五日四分日之一何有大小之不齊乎右殷周觀象史記幽厲之後周室㣲陪臣執政史不記時君不告朔故疇人子弟分散如淳曰家業世世相𫝊為疇律年二十三𫝊之疇官各從其父學索隠曰韋昭云疇類也孟康云同類之人明數者也樂彦云疇昔知星人也或在諸夏或在夷狄其後戰國並争在于彊國禽敵救急解紛而已豈遑念斯哉秦滅六國兵戎極煩又升至尊之日未暇遑也漢興天下初定方綱紀大基髙后女主皆未遑故襲秦正朔服色至今上即位招致方士唐都分其天部漢書音義曰謂分部二十八宿為矩度而巴落下閎運算轉律徐廣曰陳術云徴士巴郡落下閎也索隠曰姚氏案益部耆舊𫝊云閎字長公明曉天文隠于落下武帝徴待詔太史於地中轉渾天改顓頊術作太初術拜侍中不受也然後日辰之度與夏正同觀承案史記此條甚核疇人子弟既分散或在夷狄則後世西域九執回回術數及西洋算法豈非原従中土流散在彼而衍其𫝊者乎此可為西法襲中法之一證也晉書志徐岳議效術之要要在日蝕熹平之際時洪為郎欲改四分先上驗日蝕日蝕在晏加時在辰蝕從下上三分侵二事御之後如洪言海内識真莫不聞見劉歆以來未有洪比隋書志張賔所創之法既行劉孝孫與冀州秀才劉焯並稱其失言學無師法刻食不中所駁凡有六條其一云何承天不知分閏之有失而用十九年之七閏其二云賔等不解宿度之差改而冬至之日守常度其三云連珠合璧七曜須同乃以五星别元其四云賔等惟知日氣餘分恰盡而為立元法不知日月不合不成朔旦冬至其五云賔等但守立元定法不須明有進退其六云賔等惟識轉加大餘二十九以為朔不解取日月合㑹准以為定此六事㣲妙理數大綱聖賢之通術而賓未曉此實管窺之謂也若驗影定氣何氏所優賔等推測去之彌逺合朔順天何氏所劣賔等依據循彼迷蹤葢是失其菁華得其糠粃者也唐書志髙祖受禪將治新法傅仁均善推步之學大史令庾儉丞傅奕薦之詔仁均與儉等參議合受命嵗名為戊寅元術乃列其大要所可考驗者有七曰唐以戊寅嵗甲子日登極律元戊寅日起甲子如漢太初一也冬至五十餘年輒差一度日短星昴合於堯典二也周幽王六年十月辛卯朔入蝕限合於詩三也魯僖公五年壬子冬至合春秋命律序四也月有三大三小則日蝕常在朔月蝕常在望五也命辰起子半命度起虚六符隂陽之始六也立遲疾定朔則月行晦不東見朔不西朓七也宋史志周琮論曰古今觀象必有術過於前人而可以為萬世之法者乃為勝也若一行為大衍術議及畧例校正累世以來立法強弱為術家體要得中平之數劉焯悟日行有盈縮之差舊法推日行平行一度至此方悟日行有盈縮冬至前後定日八十八日八十九分夏至前後定日九十三日七十四分冬至前後日行一度有餘夏至前後日行不及一度李淳風悟定朔之法并氣朔閏餘皆同一術舊法定朔平注一大一小至此以日行盈縮月行遲疾加減朔餘餘為定朔望加時以定大小不過三數自此後日食在朔月食在望更無晦二舊法皆須用章嵗章月之數使閏餘有差淳風造麟徳術以氣朔閏餘同歸一母張子信悟月行有交道表裏五星有入氣加減北齊學士張子信因葛榮亂隠居海島三十餘年専以圓儀揆測天道始悟月行有交道表裏在表為外道陽律在裏為内道隂律月行在内道則日有食之月行在外道則無食若月外之人北户向日之地則反觀有食又舊法五星率無盈縮至是始悟五星皆有盈縮加減之數宋何承天始悟測景以定氣序景極長冬至景極短夏至始立八尺之表連測十餘年即知舊景初算冬至常遲天三日乃造元嘉術冬至加時比舊退減三日晉姜岌始悟以月食所衝之宿為日所在之度日所在不知宿度至此以月食之宿所衝為日所在宿度後漢劉洪作乾象術始悟月行有遲疾數舊法月平行十三度十九分度之七至是始悟月行有遲疾之差極遲則日行十二度强極疾則日行十四度太其遲疾極差五度有餘宋祖沖之始悟嵗差書堯典曰日短星昴以正仲冬宵中星虚以殷仲秋至今三千餘年中星所差三十餘度則知毎嵗有漸差之數造大明術率四十五年九月而退差一度唐徐昇作宣明術悟日食有氣刻差數舊法推日食皆平求食多分不允合至是推日食以氣刻差數増損之測日食分數稍近天驗元史郭守敬列𫝊至元十七年新法告成守敬與諸臣同上奏曰臣等竊聞帝王之事莫重於歴自黄帝迎日推䇿帝堯以閏月定四時成嵗舜在璇璣玉衡以齊七政爰及三代迄無定法周秦之間閏餘乖次西漢造三統術百二十年而後是非始定東漢造四分術七十餘年而儀式方備又百二十一年劉洪造乾象術始悟月行有遲速又百八十年姜岌造三統甲子術始悟以日食衝檢日宿度所在又五十七年何承天造元嘉術始悟以朔望及弦皆定大小餘又六十五年祖沖之造大明術始悟太陽有嵗差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾留逆又三十三年劉焯造皇極術始悟日行有盈縮又三十五年傅仁均造戊寅元術頗采舊儀始用定朔又四十六年李淳風造麟徳術以古法章部元首分度不齊始為總法進朔以避晦晨月見又六十三年一行造大衍術始以朔有四大三小定九服交食之異又九十四年徐昂造宣明術始悟日食有氣刻時三差又百三十六年姚舜輔造紀元術始悟食甚泛餘差數以上計千一百八十二年法經七十改其創法者十有三家自是又百七十四年聖朝専命臣等改治新法臣等用創造簡儀髙表憑真測實數所考正者凡七事一曰冬至自丙子年立冬後依毎日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後三十三刻己卯冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻各減大明術十八刻逺近相符前後應準二曰嵗餘自大明術以來凡測景驗氣得冬至時刻真數者有六用以相距各得其時合用嵗餘今考驗四年相符不差仍自宋大明壬寅年距至今日八百一十年毎嵗合得三百六十五日二十四刻二十五分其二十五分為今法嵗餘合用之數三曰日躔用至元四年丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕九度有竒仍憑毎日測到太陽躔度或憑星測月或憑月測日或徑憑星度測日立術推算起自丁丑正月至己卯十二月凡三年共得一百三十四事皆躔於箕與日食相符四曰月離自丁丑以來至今憑毎日測到逐時太隂行度推算變從黄道求入轉極遲疾并平行處前後凡十三轉計五十一事内除去不真的外有三十事得大明法入轉後天又因考驗交食加大明法三十刻與天道合五曰入交自丁丑五月以來憑毎月測到太隂去極度數比擬黄道去極度得月道交於黄道共得八事仍依日食法度推求皆有食分得入交時刻與大明術所差不多六曰二十八宿距度自漢太初術以來距度不同互有損益大明術則於度下餘分附以大半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分毎度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明術日出入晝夜刻皆據汴京為準其刻數與大都不同今更以本方北極出地髙下黄道出入内外度立術推求毎月日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限依立招差求得毎日行分初末極差積度比古為宻二曰月行遲疾古法皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜疊招差求得轉分進退其遲疾度數逐時不同葢前所未有三曰黄赤道差舊法以一百一度相減相乘今從算術句股弧矢方圜斜直所容求到度率積差差率與天道實脗合四曰黄赤道内外度據累年實測内外極度二十三度九十分以圜容方直矢接句股為法求毎日去極與所測相符五曰白道交周舊法黄道變推白道以斜求斜今用立渾北量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月毎交二十八宿度分於理為盡明紀事本末神宗四十一年南京太僕寺少卿李之藻上西洋法一曰天包地外地在天中其體皆圓皆以三百六十度算之地經各有測法從地窺天其自地心測算與自地面測算者都有不同二曰地面南北其北極出地髙低度分不等其赤道所離天頂亦因而異以辨地方風氣寒暑之節三曰各處地方所見黄道各有髙低斜直之異故其晝夜長短亦各不同所得日景有表北景表南景亦有周圍圓景四曰七政行度不同各為一重天層層包裹推算周徑各有其法五曰列宿在天另有行度二萬七千餘嵗一周此古今中星所以不同之故不當指列宿之天為晝夜一周之天六曰五星之天各有小輪原俱平行特為小輪旋轉于大輪之上下故人従地面測之覺有順逆遲疾之異七曰嵗差分秒多寡古今不同葢列宿天外别有兩重之天動運不同其一東西差出入二度二十四分其一南北差出入一十四分各有定算其差極㣲従古不覺八曰七政諸天之中心各與地心不同處所春分至秋分多九日秋分至春分少九日此由太陽天心與地心不同處所人從地面望之覺有盈縮之差其本行初無盈縮九曰太隂小輪不但算得遲疾又且測得髙下逺近大小之異交食多寡非此不確十曰日月交食隨其出地髙低之度看法不同而人從所居地面南北望之又皆不同兼此二者食分乃審十一曰日月交食人從地面望之東方先見西方後見凡地面差三十度則時差八刻二十分而以南北相距二百五十里作一度東西則視所離赤道以為減差十二曰日食與合朔不同日食在午前則先食後合在午後則先合後食凡出地入地之時近于地平其差多至八刻漸近于午則其差時漸少十三曰日月食所在之宫毎次不同皆有捷法定理可以用器轉測十四曰節氣當求太陽真度如春秋分日乃太陽正當黄赤二道相交之處不當計日勻分右漢以來觀象五禮通考卷一百八十三
