body:
  text: 五禮通考卷首第一刑部尚書秦蕙田撰禮經作述源流上王氏通曰吾視千載而上聖人在上者未有若周公焉其道則一而經制大備後之為政者有所持循矣陸氏徳明曰周儀二禮並周公所制三禮次第周為本儀為末孔氏穎達曰洛誥云考朕昭子刑乃單文祖徳又禮記明堂位云周公攝政六年制禮作樂頒度量于天下所制之禮則周官儀禮也賈氏公彦曰周禮儀禮發源是一理有始終分為二部並是周公攝政太平之書周禮為末儀禮為本觀承案陸氏謂周為本儀為末者周禮乃禮之綱要儀禮乃禮之節目也賈氏又謂周禮為末儀禮為本者周禮乃經世宰物之宜儀禮乃敦行實踐之事也韓氏愈曰予嘗苦儀禮難讀又其行于今者葢寡沿襲不同復之無由考于今誠無所用之然文王周公之法制粗在于是孔子曰吾従周謂其文章之盛也古書之存者希矣百氏雜家尚有可取況聖人之制度耶于是掇其大要竒辭奥㫖著于篇學者可觀焉惜乎吾不及其時揖譲進退于其閒嗚呼盛哉程子曰有麟趾闗雎之意然後能行周官之法度問周禮有訛缺否程子曰甚多周公致治之大法亦在其中須知道者觀之可決是非也禮記中有聖人格言亦有俗儒乖謬之説乖謬之説本不能混格言只為學者不能辨别如珠玉之在泥沙耳聖人文章自然與學為文者不同譬之化工生物剪裁繪畫雖似相類終不若化工所生者自有一般生意禮記儒行經解極害義理又曰儒行之篇如後世遊説之士所為誇大之説觀孔子平日語言有如是者否禮記除中庸大學唯樂記為最近道學者深思自得之表記亦近道其言正張子曰周禮是的當之書然其閒必有末世増入者如盟詛之類必非周公之意葢盟詛起于王法不行人無所取直故要之于神所謂國将亡聴于神也天官之職須襟懐洪大看得葢其規模至大若此心欲事事上致曲窮究凑合此心如是之大必不能得也周禮唯太宰之職難看葢無許大心胸包羅記得此復忘彼其混混天下之事當如捕龍蛇搏虎豹用心力看方可其他五官便易看止一職也周氏諝曰禮經之殘缺久矣世之所傳曰周禮曰儀禮曰禮記其間獨周禮為太平之成法儀禮者又次之禮記者雜記先王之法而尚多漢儒附㑹之疵此學者所宜精擇吕氏大臨曰冠昏射鄉燕聘天下之達禮也儀禮所載謂之禮者禮之經也禮記所載謂之義者訓其經之義耳周禮直欲使無一物不得其所故其書無一言而非仁晁氏公武曰西漢諸儒得古文禮凡五十六篇髙堂生𫝊士禮十七篇為儀禮䘮服𫝊一卷子夏所為楊氏時曰周官之書先王經世之務也不可不講朱子曰周禮周公遺典也胡氏父子以為王莽令劉歆撰此恐不然周禮乃周家盛時聖賢制作之書周禮一書周公所以立下許多條貫皆是従廣大心中流出周官徧布精宻乃周公運用天理熟爛之書説制度之書唯周禮儀禮可信禮記便不可深信周禮畢竟出于一家謂是周公親筆做成固不可然大綱却是周公意思天官之職是總五官者若其心不大如何包得許多事且冢宰内自王之飲食衣服外至五官庶事自大至小自本至末千頭萬緒若不是大其心者區處應副事到面前便且區處不下況于先事措寘思患預防是著多少精神所以記得此復忘彼佛氏只合下將那心頓下無用處纔動步便疎脱所以吾儒貴窮理致知便須事事物物理㑹過五峰以周禮為非周公致太平之書謂如天官冢宰却管甚官閫之事其意只是見後世宰相請託宫閫交結近習以為不可殊不知此正人君治國平天下之本豈可以後世之弊而併廢聖人之良法美意哉又如王后不當交通外朝之説他亦是懲後世弊要知儀禮中亦分明自載此理在至若女祝掌凡内禱祠祈禳之事使後世有此官則巫蠱之事安従有哉比閭族黨之法正周公建太平之基本但這箇一如棊盤相似枰布定後棊子方有放處舊嘗妄意此書大綱是要人主正心脩身齊家治國平天下使天下之民無不被其澤又推而至于鳥獸草木無一不得其所而已不如是不足以謂之裁成輔相參賛天地耳周禮一書好廣大精宻周家法度在裏許儀禮禮之根本而禮記乃其枝葉儀禮經也禮記𫝊也且如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之類莫不皆然儀禮載其事禮記明其理讀禮記不讀儀禮許多理皆無安著處禮記只是解儀禮如喪服小記便是解喪服𫝊推之諸篇皆然問儀禮𫝊記是誰作曰𫝊是子夏作記是子夏以後人作漢河間獻王得古禮五十六篇想必有可觀但當時君臣閒有所不曉遂至無𫝊故先儒謂聖經不亡于秦火而壊于漢儒其説亦好今儀禮多是士禮天子諸侯喪祭之禮皆不存其中不過有些小朝聘燕享之禮自漢以來凡天子之禮皆是將士禮來増加為之漢河間獻王所得禮五十六篇却有天子諸侯之禮故班固謂愈于推士禮以為天子諸侯之禮者班固作漢書時此禮猶在不知何代何年失了可惜儀禮不是古人預作一書如此初間只以義起漸漸相襲行得好至于情文極細宻極周緻處聖人見此意思好故録成書只看古人君臣之際如君臨臣喪坐撫當心要絰而踊今日之事至于死生之際恝然不相闗不啻如路人恩義安在儀禮舊與六經三𫝊並行至王介甫始罷去其後雖復春秋而儀禮卒廢今士人讀禮記而不讀儀禮故不能見本末世謂禮記為漢儒作非也漢儒最純者莫如董仲舒仲舒之文最純者莫如三策曷嘗有禮記中語乎如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒安能到此禮有經有變經者常也變者常之變也先儒以曲禮為變禮葢曲者委曲之義故以為變禮然毋不敬安定辭安民哉此三語謂之變可乎先儒以儀禮為經禮然其中亦自有變又不可一律觀也問孔子何以問禮于老耼曰始疑有兩老耼後思之老子曾為柱下史故知禮之節文所以孔子問之耼雖知禮然其意以為不必盡行行之反以多事故欲絶滅之禮運所謂謀用是作而兵由此起等語亦有此意漢志諸記自一百三十一篇以下與經文本不相雜疑今亦多見于本篇後記及二戴之記孔子家語等書特不可考其所自耳陳君舉周禮説周制三公位冢宰則冢宰與王坐而論道者也今攷其屬小宰掌外治凡與王左右親習之官𨽻焉内宰掌内治凡與后左右親習之官𨽻焉而他無職業凡若是作格君心四篇其一曰凡饔飱田罟薪蒸之事醫藥之事酒漿之事幄帟次舎之事甚卑冗也甚煩縟也必用命士必皆命于冢宰若王有師田之事則大僕而下凡僕馭之官有祭祀之事則大祝而下凡巫祝之官有燕樂之事則大師而下凡聲樂之官其用命士每官多至四十人往往皆大夫長之而屬于卿若夫宿衞非宫中之羣吏則宫伯之士庶子所謂執矛戈立階戺皆冕衣裳者非若後世但以兵衞也昔周公作立政大抵汲汲于用賢而以虎賁綴衣趣馬攜僕列諸左右常伯三事之下常伯三事皆大臣也名位尊矣視趣馬綴衣至不等而周公一槩言之何也葢以大臣進見有節敷奏有常而朝夕與王燕者則斯人也必以士為之則必公卿所自簡除所自考課苟非命士則簡除考課不出于朝廷其進雜而羣枉至矣是故分𨽻于六卿而冢宰之治特詳書曰昔在文武侍御僕従罔非正人以旦夕承弼厥辟由此其選也方周公之敎世子也魯公之子伯禽衞康叔之子牟齊太公之子伋俱事成王伯禽牟伋葢宿衞國子也他日能為顯諸侯而成王與之處則相觀而善之益多其後詩人刺皇父曰皇父卿士家伯維宰仲允膳夫蹶維趣馬艶妻煽方處以是數人者皆相従于女謁者也由此觀之王之所與燕私得其人則太子見徳而成王為賢君不得其人則女謁行而褒姒之禍作自后世子賢否繫焉而周之興亡従之如之何其不謹乎其二曰庖事酒事衣裘之事惟王及后有司不敢㑹既不㑹矣而必領于大臣何也彼賤有司誠不宜以苛細推校至尊唯大臣以道佐人主獨得與人主可否相是非是故領之夫富有四海而一人之奉就使無節嵗費幾何方且嘉與大臣以自防檢庶幾過差不中九式之度雖有司不敢議而大臣盡規所以資啟沃成敬畏也其三曰嘗讀闗雎知三代而上后妃極天下之選矣后妃母儀天下常若欿然有不足配至尊之意當是時夫人嬪若干人世媍若干人女御若干人各以其職奉上所以共賓祭蕃子孫之官備矣后方惻然遐想幽深側陋之閒尚有遺賢宜配君子求而不可得則中夜不寐展轉歎息庶幾得之吾當推琴瑟鐘鼓之奉與之偕樂而後慊后徳如此則宫掖之政一以聴后之所為奚不可者乎迺内小臣而下凡閹官九嬪而下凡媍官下至于女奴曉祝者曉書者曉裁縫者必屬之大臣則夫員數之増損職掌之廢寘禄秩之多寡賜予之疏數皆禀命于朝廷而后不與且使内宰得以稽其功緒而賞罰其勤惰苟違有司之禁雖天子不得自以為恩是故私謁不行而内政舉古之所謂正家者葢如此而非屑屑然也令出房闥而方較是非于侵紊之後争予奪于縦弛之餘抑末矣漢太尉楊秉糾中常侍而尚書詰以三公統外安得越奏近官葢内治不聴于公卿久矣無怪乎後世之多亂也歟其四曰周之學政不别言王世子而嫁子于諸侯無王姬之法葢天子之元子庶子命士與公卿大夫之子共齒于學王姬之車服雖不繫其夫而其肅雝之詩曰齊侯之子平王之孫則従夫之序也夫惟王與后自牧甚卑則以能下人為家法夫唯能下人而後能長有天下自秦人尊君卑臣之令行無惑乎後世之疑周禮也馬氏廷鸞曰儀禮為書于竒辭奥㫖中有精義妙道焉于纎悉曲折中有明辨等級焉不惟欲人之善其生且欲人之善其死不惟致嚴于冠昏朝聘鄉射而尤致嚴于喪祭後世徒以其推士禮而達之天子以為殘闕不可考之書徐而觀之一士也天子之士與諸侯之士不同上大夫與下大夫不同等而上之固有可得而詳者矣熊氏朋來曰儀禮是經禮記是𫝊儒者恒言之以冠義昏義鄉飲酒義射義燕義聘義與儀禮士冠士昏鄉飲酒射燕聘之禮相為經𫝊也劉氏又補士相見公食大夫二義以為二經之𫝊及讀儀禮則士冠禮自記冠義以後即冠禮之記矣士昏禮自記士昏禮凡行事以後即昏禮之記矣鄉飲酒自記鄉朝服而謀賓介以後即鄉飲之記矣鄉射禮自記大夫與則公士為賓以後即鄉射之記矣燕禮自記燕朝服于寝以後即燕禮之記矣聘禮自記久無事則聘焉以後即聘禮之記矣公食大夫禮自記不宿戒以後即公食大夫之記矣覲禮自記几俟于柬廂以後即覲禮之記矣士虞禮自記虞沐浴不櫛以後即士虞禮之記矣特牲饋食禮自記特牲以後即特牲之記矣士喪禮則士處通寝以後附在既夕者即士喪禮之記矣既夕禮則啟之昕以後即既夕之記矣漢儒稱既夕禮即士喪禮下篇故二記合為一也喪服一篇每章有子夏作𫝊而記公子為其母以後又别為喪服之記其記文亦有𫝊是子夏以前有此記矣十七篇唯士相見大射少牢饋食有司徹四篇不言記其有記者十有三篇然冠禮之記有孔子曰其文與郊特牲所記冠義正同其餘諸篇唯既夕之説畧見于喪大記之首章喪服之𫝊與大𫝊中數與與疑當作語相似餘記自與小戴冠昏等六義不同何二戴不以禮經所有之記文而𫝊之也十三篇之後各有記必出于孔子之後子夏之前葢孔子定禮而門人記之故子夏為作喪服𫝊而并其記亦作𫝊焉聘禮篇末執圭如重入門鞠躬私覿愉愉等語未知鄉黨用聘禮語抑聘禮用鄉黨語大抵禮經多出于七十二子之徒所𫝊案朱子鄉黨集註用晁氏曰定公九年孔子仕魯至十三年適齊其間無朝聘之事疑使擯執圭二條但孔子嘗言其禮如此又引蘇氏曰孔氏遺書雜記曲禮非必孔子事也見得古儀禮之書聖門因記其語湛氏若水曰儀禮有有經而無𫝊者矣公食大夫也士相見也有有傳而無經者矣郊特牲也諸侯釁廟也遷廟也公符也投壺也有經中之傳者矣凡儀禮之稱曰記者是也有𫝊中之𫝊者矣玉藻之有深衣也明堂之有月令也童氏承叙曰或曰髙堂生所𫝊特士禮耳餘多散佚又曰古禮于今無所用之雖昌黎亦云然夫禮也者理也先王以承天之道以治人之情孔子曰殷因于夏禮所損益可知也周因于殷禮所損益可知也因者其本也損益者其末也恊諸義而協則先王所未有者可以義起矣故后蒼有推而致于天子之説然今觀之冠昏相見士禮也鄉飲鄉射大夫禮也燕射覲聘公食大夫諸侯禮也士喪既夕士虞特牲饋食諸侯士禮也少牢饋食有司徹諸侯卿大夫禮也喪服則通于天下顧獨曰士禮何哉夫禮無本不立無文不行雖夏商之際不能無文焉至周而備爾孔子曰虞夏之文不勝其質商周之質不勝其文葢思本也然文之蠧也久矣其在于今宜無所用至其本固未泯也是故因其文而遡之可知也因其本而拓之可行也不猶愈于并其文而亡之乎王氏志長曰六官治教禮政刑事上下四方覆藏宥宻如天地四方之六合缺一不可大如六鄉六遂六軍小如六牲皆六官合而後具如六出之花六瓣具而後花成缺一不可也一職修可以扶顛持危撥亂世而反之正六職修則天下太和萬物咸若矣又曰周官物各付物如天地之化大之曰星垂教河嶽効靈小之草木之一花一實鳥獸之一羽一毛靡不相對成文非物物刻而雕也又曰周禮有必不可復者如后妃夫人與尸賓獻酬天子與邦君送迎揖譲是也至宫府之為一體王后世子之動有式法寓兵于農取士以賢選用宦寺府史胥徒制馭諸侯四夷後世舎此無以為治又曰周官中有原兼官不别設官者有其官相聫不得不兼者有平日不設臨事設之事畢復罷者皆使人以其所能用人以其餘力故事治而功不妨官設而禄不費所以善也徐氏乾學曰文中子亟稱周官以為王道極是也葢夢寐欲行之唐太宗讀周禮亦歎為真聖作也而漢劉歆佐王莽頗遵用以更張而敗宋王安石尤主之奉詔上所撰三經義頒行而自董周官已用新法欲一二追復而又敗于是人咸為周官諱以為非經程伊川則以為有闗雎麟趾之意可以行周官之法度不易之言也張横渠以為天官之職必心量宏大方能讀若不大其心以體之而欲于事上窮究凑合知其難也朱晦菴曰周禮乃周公建太平之書皆従廣大心中流出又為孝宗言周禮天官冢宰一篇乃周公輔相成王垂後世之大法至為深切欲知三代人主正心誠意之實學騐諸此葢尊信如此乃武帝嘗作十論七難以排之不立學官而何休詆為戰國隂謀謬矣宗元案十論七難乃林碩作非武帝也此誤萬氏斯大曰儀禮一書與禮記相為表裏考儀文則儀禮為備言義理則禮記為精在聖人即吾心之義理而漸著之為儀文在後人必通達其儀文而後得明其義理故讀禮記而不知儀禮是無根之木無源之水也右禮經作述大指孔氏頴達曰周禮見于經籍其名異者見有七處案孝經説云經禮三百一也禮器云經禮三百二也中庸云禮儀三百三也春秋説云禮經三百四也禮説云有正經三百五也周官外題謂周禮六也漢書藝文志云周官經六篇七也七者皆云三百故知俱是周官周官三百六十舉其數而云三百也其儀禮之别亦有七處而有五名一則孝經説春秋及中庸並云威儀三千二則禮器云曲禮三千三則禮記云動儀三千四則謂為儀禮五則藝文志謂儀禮為禮古經凡此七處五名稱謂並承三百之下故知即儀禮也所以三千者其履行周官五禮之别其事委曲條數繁廣故有三千也非謂篇有三千但事之殊别有三千條耳或一篇一卷則有數條之事今行于世者唯十七篇而已吕氏大臨曰禮器云經禮三百曲禮三千其致一也中庸云禮儀三百威儀三千然則曲禮者威儀之謂皆禮之細也布帛之有經一成而不可變者也故經禮象之經禮三百葢若祭祀朝聘燕饗冠昏鄉射喪紀之禮其節文之不可變者有三百也布帛之有緯其文曲折有變而不可常者也故曲禮象之曲禮三千葢大小尊卑親疎長幼並行兼舉屈伸損益之不可常者有三千也今之所𫝊儀禮者經禮也其篇末稱記者記禮之變節則曲禮也禮記所載皆孔子門人所𫝊授之書雜取于遺編㫁簡者皆禮經之變節也葉氏夢得曰經禮三百曲禮三千經禮一而曲禮十經禮其常猶言制之凡也曲禮其變猶言文之目也故言禮儀三百威儀三千先王之時皆有書與法藏有司官掌之士習之有司守之謂之執禮周官太史掌邦之六典禮居一焉其曰大祭祀與羣執事讀禮書而協事祭之日執書以次位常大㑹同朝覲以書協禮事將幣之日執事以詔王小史大祭祀讀禮法或讀之以喻衆或執之以行事至周衰而二者皆亡唯孔子獨能知之故亦謂之執禮今禮記首載曲禮此非其書與法之正漢儒雜記其所聞而纂之耳故言曲禮曰以表之如毋放飯毋流歠孟子亦云則孟子猶及見其畧歟所謂經禮者無復聞朱子曰經禮威儀禮器作經禮曲禮而中庸以經禮為禮儀鄭𤣥等皆曰經禮即周禮三百六十官曲禮即今儀禮也冠昏吉凶其中事儀三千以其有委曲威儀故有二名獨臣瓉曰周禮三百特官名耳經禮謂冠昏吉凶葢以儀禮為經禮也而近世葉夢得曰經禮制之凡也曲禮文之目也先王之世二者葢皆有藏書于有司祭祀朝覲㑹同則太史執之以蒞事小史讀之以喻衆而卿大夫受之以教萬民保氏掌之以教國子者亦此書也愚意禮篇三名禮器為勝諸儒之説瓉葉為長葢周禮乃制治立法設官分職之書于天下無不該攝禮典固在其中而非専為禮設也故漢志立其經𫝊之目但曰周官而不曰周禮自不應指其官目以當禮篇之目又況其中或以一官兼掌衆禮或以數官通行一事亦難計其官數以充禮篇之數至于儀禮則其中冠昏喪祭燕射朝聘自為經禮大目亦不容専以曲禮名之也但曲禮之篇未見于今何書為近而三百三千之數又將何以充之耳又嘗考之經禮固今之儀禮其存者十七篇而其逸見于它書者猶有投壺奔喪遷廟釁廟中霤等篇其不可見者又有古經増多三十九篇而明堂隂陽王史氏記數十篇及河間獻王所輯禮樂古事多至五百餘篇倘或猶有逸在其間大率且以春官所頒五禮之目約之則其初固當有三百餘篇無疑矣所謂曲禮則皆禮之微文小節如今曲禮少儀内則玉藻弟子職篇所記事親事長起居飲食容貎辭氣之法制器備物宗廟宫室衣冠車旗之等凡所以行乎經禮之中者其篇之全數雖不可知然條而析之亦應不下三千有餘矣若或者専以經禮為常禮曲禮為變禮則如冠禮之不醴而醮用酒殺牲而有折俎若孤子冠母不在之類皆禮之變而未嘗不在經禮篇中坐如尸立如齊毋放飯毋流歠之類雖在曲禮之中而不得謂之變禮其説誤也王氏應麟曰三禮義宗云儀禮十七篇吉禮三凶禮四賓禮三嘉禮七軍禮皆亡禮器注曲禮謂今禮也即指儀禮而儀禮疏云亦名曲禮晉荀崧亦云朱文公従漢書臣瓚註謂儀禮乃經禮也曲禮皆微文小節如今曲禮少儀内則玉藻弟子職所謂威儀三千也敖氏繼公曰記有之曰禮經三百曲禮三千所謂經禮即十七篇之類也其數乃至三百者豈其合王朝與侯國之禮而言之歟若所謂曲禮則又在經禮之外者如内則少儀所記之類是也郝氏敬曰夫儀之不可為經猶經之不可為儀也經者萬世常行儀者隨時損益父子君臣夫婦長幼朋友經也禮儀三百威儀三千儀也皆以節文斯五者五者三代相因而儀者所損益可知也姜氏兆錫曰三千之數若以篇數求之恐其數或無以充或者以為經禮是禮之大條件曲禮是其中之小條件曲禮與經禮非是劃然兩項曲禮即在經禮之中其分二名只是一綱一目猶大學所謂三綱領八條目但不得専以變禮當之耳且如儀禮今存十七篇是經禮其中之威儀條件却有許多便是曲禮惟經禮是綱領藏得這許多故經禮每禮自為一篇而曲禮亦在其中也右經禮威儀之别五禮通考卷首第一
