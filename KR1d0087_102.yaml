body:
  text: 五禮通考卷九十二刑部尚書秦蕙田撰吉禮九十二宗廟時享宋史禮志宗廟之禮每嵗以四孟月及季冬凡五享朔望則上食薦新唯親郊封祀又有朝享告謝及新主祔謁皆大祀也二薦則行一獻禮其祔祭春祀司命及户夏祀竈季夏祀中霤秋祀門及厲冬祀行惟臘享禘祫則徧祀焉玉海太祖乾徳元年十一月帝以親郊齋於崇元殿翌日服通天冠絳紗袍執鎮圭乘玉輅鹵簿前導赴太廟宿齋翌日未明三刻帝服衮冕執鎮圭行享禮於四室自是每行郊祀前一日朝享太廟如儀蕙田案因郊告廟無享祭之禮宋仍唐故事遂以郊前朝享為盛祭失之矣厥後更有景靈宫朝享尤謬宋史禮志太祖乾徳六年判太常寺和峴上言案禮閣新儀唐天寳五年詔享太廟宜祭料外每室加常食一牙盤將來享廟欲每室加牙盤食禘祫時享亦準此制文獻通考開寳初上親享太廟見所陳籩豆簠簋問曰此何物也左右以禮器對上曰吾祖宗寧識亟命徹去進常膳如平生既而曰古禮不可廢也命復設之於是和峴請如唐故事别設牙盤食蕙田案牙盤常食非禮之饌和峴曲成之諛矣宋史禮志太宗太平興國六年十二月太常禮院言今月二十三日臘享太廟縁孟冬已行時享冬至又嘗親祀案禮每嵗五享其禘祫之月即不行時享慮成煩數有爽恭虔今請罷臘日薦享之禮其孝惠别廟即如式從之蕙田案時享正祭也禘祫大祭也義各不同因此廢彼何耶所以典禮未善自有不能行之處太宗本紀雍熈二年十一月壬午狩於近郊以所獲獻太廟著為令禮志宗正寺言準詔送兔十頭充享太廟玉海端拱二年七月丁亥詔以八月二十四日親享太廟有司詳定儀注辛丑詔以彗孛停宋史禮志淳化三年十月八日太常禮院言今年冬至親祀南郊前期朝享太廟及奏告宣祖太祖室常例每遇親祀設朔望兩祭又行奏告之禮煩則不恭又十一月二十日皇帝朝享去臘享日月相隔未為煩數欲望權停是月朔望之祭其臘享如常儀從之蕙田案此奏近是朔望之祭原非正也真宗本紀咸平二年九月甲午奉安太宗聖容於啟聖院新殿帝拜而慟左右皆掩泣十一月乙酉享太廟禮志咸平二年八月太常禮院言今年冬祭畫日以十月六日薦享太廟案禮三年一祫以孟冬又疑義云三年喪畢遭禘則禘遭祫則祫宜改孟冬薦享為祫享蕙田案改時享為祫非真宗本紀咸平三年十二月戊申狩近郊以親獲禽獻太廟景徳二年十一月丙辰享太廟三年十一月乙酉狩近郊以親獲兔付有司薦廟大中祥符元年正月大赦改元九月甲子奉天書告太廟十一月甲申命王旦奉上太祖太宗諡册親享太廟禮志大中祥符元年十一月二十七日帝於朝元殿備禮奉祖宗尊謚册寳再拜授攝太尉王旦奉之以出安太祖册寳於玉輅太宗册寳於金輅詣太廟親行朝廟之禮玉海大中祥符元年十一月二十三日庚辰詔曰朕祇事上封克成大典二十七日上尊諡禮畢恭謝太廟有司定儀注以聞二十五日壬午詳定所上儀注李宗諤上奠獻樂章二首癸未帝齋於長春殿翌日甲申帝服通天冠絳紗袍奉太祖太宗尊諡册寳拜攝太尉王旦持節奉册升輅鸞駕詣廟酌奠六室蕙田案宗廟四時享祀之禮竟宋之世人主未嘗一行所親行者唯郊祀朝享及告謝等登之則失時享本義削之則宋竟無時享矣今據事直書而失自見覽者詳之四年正月丁亥謁啟聖院太宗神御殿普安院元徳皇后聖容蕙田案啟聖院神御殿普安院皇后聖容亦非禮七年二月辛未享太廟禮志大中祥符八年兼宗正卿趙安仁言準詔以太廟朔望上食品味令臣詳定望自今委御厨取親享廟日所上牙盤例參以四時珍膳選上局食手十人赴廟饌造上副聖心式表精慤詔所上食味委宫闈令監造訖安仁省視之真宗本紀天禧元年正月壬寅上聖祖寳册己酉上太廟諡册庚戌享六室禮志天禧元年正月九日加上六室尊諡禮畢羣臣拜表稱賀十一月帝行朝享之禮玉海天禧元年正月三日癸卯以朝享太廟誓百官八日戊申奉寳册升輅九日己酉奉上六室寳册百官陪列十日庚戌朝享六室宋史真宗本紀天禧三年冬十一月已巳謁景靈宫庚午享太廟蕙田案謁享俱不是正祭樂志建隆以來祀享太廟一十六首迎神禮安肅肅清廟奉祀來詣格思之靈如在之祭克謹威儀載嚴容衛降福孔皆以克永世皇帝行隆安工祝升階賓尸在位祇達孝思允修毖祀顯相有儀克恭乃事儼恪其容通此精意奠瓚用瑞木木符啟瑞著象成文於昭大號協應明君靈命有屬鴻禧洞分歌以升薦休嘉洽聞又馴象嘉彼馴象來歸帝鄉南州毓質中區效祥仁格巨獸徳柔遐荒有感斯應神化無方又玉烏素烏爰止淳精允臧名符瑞牒色應金方潔白容與翹英奮揚孝思攸感皇徳逾張奉俎豐安維犧維牲以炮以烹植其鞉鼓潔彼鉶羮孔碩兹俎於穆厥聲肅雍顯相福禄來成酌獻僖祖室大善湯湯洪河經啟長源鬱鬱嘉木挺生本根大哉崇基出乎慶門發祥垂裕永世貽孫順祖室大寧元鐘九千生於仲吕日臺九層起於累土赫日之升明夷為主孝孫作帝式由祖武翼祖室大順明明我祖積徳攸宜肇繼𤓰瓞將隆本支爰資慶緒式昭帝基於穆清廟永洽重熙宣祖室大慶艱難積行緜長鍾慶同人之時得主乃定既叙宗祧乃修舞詠經武開先永昭丕命太祖室大定猗歟太祖受命于天化行區宇功溢簡編武威震耀文徳昭宣開基垂統億萬斯年太宗室大盛赫赫皇運明明太宗四隩咸暨一變時雍睿文炳煥聖徳温恭千齡萬祀永播笙鏞飲福禧安嘉栗㫖酒博腯牲牷神鑒孔昭享兹吉蠲夙夜毖祀孝以奉先永錫純嘏功格于天亞獻正安已象文治乃觀武成進退可度威儀克明終獻正安常武徂征詩人所稱總干山立厥象伊凝徹豆豐安肥腯之牲既析既薦鬱鬯之酒已配已獻祝辭亦陳和奏斯徧享禮具舉徹其有踐真宗御製二首奠瓚用萬國朝天鴻源濬發璿圖誕彰髙明錫羡累洽延祥巍巍藝祖溥率賓王煌煌文考區宇大康珍符昭顯寳歴綿長物性茂遂民俗阜昌甫田多稼禾黍穰穰含生嘉育鳥獸蹌蹌八紘統域九服要荒沐浴惠澤祗畏典常隔谷分壌望斗辨方並襲冠帶來奉圭璋峩峩雙闕濟濟明堂諸侯執帛天后當陽何以辨等衮衣繡裳何以褒徳輅車乘黄聲明煥赫雅頌汪洋啟兹丕緒佑我無疆大統斯集大樂斯揚俯隆宗祏仰繼穹蒼亞獻終獻用平晉樂五代衰替六合携離封疆竊據兵甲競馳天顧黎獻塗炭可悲帝啟靈命濬哲應期皇祖丕變金鉞俄麾率土執贄獷俗來儀瞻彼大鹵竊此餘基獨迷文告莫畏天威神宗繼統璿圖有輝尚安蠢爾罔懷格思六飛夙駕萬旅奉辭徯來廢詠不陣行師雲旗先路壺漿塞岐天臨日照宸慮通㣲前歌後舞人心悦隨要領自得智力何施風移僭冒政治淳熙書文混一盛徳咸宜干戈倒載振振言歸誕昭七徳永定九圍仁宗本紀天聖二年十一月丙申享太廟四年閏五月乙酉詔補太廟室長齋郎五年十一月辛亥朝享景靈宫壬子享太廟八年十一月丙寅朝享景靈宫丁卯享太廟明道二年正月乙巳皇太后服衮衣儀天冠享太廟皇太妃亞獻皇后終獻五月丙子命宰臣張士遜撰謝太廟記檢討宋祈言皇太后謁廟非後世法乃止蕙田案古有皇后助祭之禮無皇太后謁廟之儀皇祐二年九月己酉朝享景靈宫庚戌享太廟玉海皇祐二年九月以大饗明堂具大駕鹵簿赴景靈宫行薦享禮畢齊於太廟翌日庚戌詣七室行朝享禮降神樂作帝密諭樂卿令備其音節禮儀使請憩小次帝拱立益莊辛亥卒享宋史仁宗本紀嘉祐元年九月庚寅命宰臣攝事於太廟蕙田案攝事正也七年九月庚戌享太廟文獻通考仁宗慶歴時四孟臘時享太廟攝事用羊豚各二祈報象尊一别廟増黄彛壺尊二親享則加犢三年御史蔡稟言周制四時享親之禮有九今寺觀則車駕一嵗再臨未嘗薦獻宗廟非奉先教民意帝謂輔臣曰三嵗一祠郊廟而賚及天下若嵗親行之則人有覬賞之心朕朝夕奉三聖御容於禁中未嘗敢怠也蕙田案此條所記最有關係乃宋代廟享所由舛也夫郊廟乃人君敬天尊祖之大誼何與于臣民而必賚及天下甚至帑藏空虛必俟以三年乃竭物力而舉之斯何理也觀仁宗語亦以不克時享為不安而朝夕奉聖容以展敬特阻于憚費而不得已耳若使當時廟享之禮克正宗廟之外何必又有啟聖院景靈宫天章閣欽先孝思殿也木主之外何必又有塑像畫像也時享之外何必又有朝享告謝薦獻也夫人之孝思無窮而禮制之節制自定所謂賢者俯而就不肖者企而及循乎禮則一正而無不正違乎禮則一失而無不失宋一切非禮皆因不能親行時享而起不能時享因賞賚不給而起賞賚不給則因沿習前代舊例使然嗚呼稗政之害一至是哉宋史神宗本紀熙寧二年帝親酌獻景靈宫仍詔嵗以十月望朝享有期以上喪或災異則命輔臣攝事五年正月己亥詔大廟時享以宗室使相以上攝事禮志初國朝親享太廟儀物有制熙寧以來率循舊典元豐命官詳定始多損益元年詳定郊廟禮文所言古者納牲之時王親執鸞刀啟其毛而祝以血毛詔於室今請改正儀注諸太祝以毛血薦於神座訖徹之而退唐崔沔議曰毛血盛於盤開元天寳通禮及今儀注皆盛以豆禮以豆盛葅醢其薦毛血當盛以盤又言三牲骨體俎外當加牛羊腸胃豕膚俎各一又古者祭祀無迎神送神之禮其初祭及末皆不當拜又宜令戸部陳嵗貢以充庭實如古禮仍以龜為前金次之玉帛又次之餘居後又周禮大宗伯之職凡享涖玉鬯今以門下侍郎所瓚進皇帝侍中酌鬯進瓚皆未合禮請命禮部尚書奉瓚臨鬯禮部侍郎奉盤以次進皇帝酌鬯祼地訖侍郎受瓚并槃而退又言皇帝至阼階乃命太祝宫闈令始奉神主置於坐行禮畢皇帝俟納神主然後降階並從之又言神坐當陳於室之奥東面當行事時皇帝立於户内西向即拜於户内有司攝事晨祼饋食亦立於户内西向更不出户而拜其堂上薦腥則設神坐於扆前南向皇帝立於中堂北向有司攝事同此詔俟廟制成取㫖又請諸廟各設莞筵紛純加繅席畫純於户内之東西面皇帝行三獻禮畢於此受嘏又言每室所用几席當如周禮改用莞筵紛純加繅席畫純加次席黼純左右玉几凡祭祀皆繅次各一重并莞筵一重為五重又言古者宗廟九獻王及后各四諸臣一自漢以來為三獻后無入廟之事沿襲至今若時享則有事於室而無事於堂禘祫則有事於堂而無事於室室中神位不在奥堂上神位不當扆有饋食而無朝踐度今之宜以備古九獻之意請室中設神位於奥東面堂上設神位於户外之西南面皇帝立於户内西面祼鬯為一獻出户立於扆前北向行朝踐薦腥之禮為再獻皇帝立於户内西面行饋食薦熟之禮為三獻詔並俟廟制成取㫖又請三年親祠并祫享及有司攝事每室並用太牢及制幣宗廟堂上焫蕭以求陽而有司行事焫茅香宜易用蕭灌鬯於地以求隂宜束茅沃酒以象神之飲凡幣皆埋於西階東册則藏有司之匱又請除去殿下板位及小次而設皇帝板位於東階之上西向又請凡奉告祈禱報謝用牲牢祭饌並出帝后神主以明天地一體之義又古者祭祀兼薦上古中古及當世之食唐天寳中始詔薦享每室加常食一牙盤議者以為宴私之饌薦寢室而不可凟於太廟宜罷之古者吉祭必以其妃配不特拜請奠副爵無特拜儀禮嗣舉奠盥入請皇帝祭太廟既灌之後大祝以斚酌奠於鉶之南俟正祭嘏訖命皇子舉奠而飲又請命刑部尚書一員以奉大牲兵部尚書一員奉魚十有五仍合腥熟之薦朝享四孟及臘主皆設神位於户内南向其祼將於室朝踐於堂饋熟於室則於奥設莞筵紛純加繅席畫純加次席黼純左右玉几當筵前設饋食之豆八加豆八以南為上鉶三設於豆之南南陳牛鉶居北羊鉶在牛鉶之南豕鉶在羊鉶之南羞豆二曰酏食糝食設於薦豆之北大羮湆盛以登設於羞豆之北九俎設於豆之東三三為列以南為上肵俎一當腊俎之北縱設之牲首俎在北牖下簠簋設于俎南西上籩十有八設於簠簋之南北上户外之東設尊彛西上南肆阼階之東設六罍其三在西以盛元酒其三在東以盛三酒堂下陳鼎之位在東序之南居洗之西皆西面北上匕皆加於鼎之東俎皆設於鼎之西西肆肵俎在北亦西肆若廟門外則陳鼎於東方各當其鑊而在鑊之西皆北面北上又請既晨祼諸太祝入以血毛奠神坐太官令取肝以鸞刀制之洗於鬱鬯貫以膋燎於爐炭祝以肝膋入詔神於室又出以隋祭於尸外之左三祭於茅葅當饋熟之時祝取葅擩於醢祭於神坐前豆間三又取黍稷肺祭祭如初藉以白茅既祭宫闈令束而瘞之於西階東若郊祀天地則當進熟之時祝取葅及黍稷肺祭於正配神坐前各三祭畢郊社令束茅葅而燔瘞之祀天燔祭地瘞縮酒之茅或燔或瘞當與隋祭之葅同又言古者吉祭有配皆一尸其始祝洗酌奠奠於鉶南止有一爵及主人獻尸主婦亞獻賓長三獻亦止一爵請罷諸室奠副爵其祫享别廟皇后自如常禮應祠告天地宗廟社稷並用牲幣如唐制太廟局令以宗正丞充罷攝知廟少卿而宫闈令不預祠事又言晨祼之時皇帝先搢大圭上香祼鬯復位候作樂饋食畢再搢大圭執鎮圭奠於繅藉次奠幣執爵庶禮神並在降神之後從之蕙田案元豐更定儀注凡二十餘條皆本儀禮節次為之損益自唐以後議禮之臣無踰此者較開元禮所修益加精且詳矣觀承案元豐更定儀注一洗沿習之陋允為正當所以朱子每嘆神宗為大可有為之君也文獻通考神宗元豐三年詳定郊廟奉祀禮文所言祠禴烝嘗之名春夏則物未成而祭薄秋冬則物盛而祭備故許慎以品物少文詞多為祠而王弼以禴為祭之薄何休謂祈榖成者非一黍先熟可得薦故曰嘗冬萬物畢成所薦衆多故曰烝故禮記以嘗為大嘗周禮以烝為大烝孔安國亦以烝嘗為大享今太廟四時雖有薦新而孟享禮料無祠禴烝嘗之别伏請春加韭卵夏加麥魚秋加黍豚冬加稻雁當饋熟之節薦於神主其籩豆於常數之外别加時物之薦豐約各因其時以應古禮從之又言少牢饋食禮主人朝服即位于阼階東西面鄭氏曰為將祭也即不言拜及祝告禮成主人出立於阼階上西面亦不言拜近代事神拜而迎送殊非禮意聖王之事宗廟禮如事生故饌則薦四時之和氣與四海九州之美味貢則陳金璧龜帛以明共天下之材其餘無常必致國之所有以明逺物無不至自秦漢以來奉宗廟者不本先王之經訓有司奉行充其位而已故天下常貢入王府者未嘗陳於太廟良為濶畧又言古者人君臨祭立于阼阼者主階惟人君涖之行事示繼體祖考親親之義且以尊别於臣庶也今朝享太廟設小次於殿下褥位之東西向設皇帝版位於廟東階之東南西向乃是古者大夫士臨祭之位殊失禮意又曽子問曰歛幣玉藏諸兩階之間聘禮卷幣埋于西階東舊制宗廟燔其幣未合於禮宋會要元豐六年十月庚辰太常丞吕升卿言禮重饗帝不聞乃於致齋先享宗廟獨唐立老子廟號太清宫每嵗郊祀躬薦焉終唐世行之莫知其非今郊宜罷饗廟或止至太祖一室告以侑神之意繼令别修太廟躬祠之制嵗五大饗乘輿親臨其一則祀天饗親兩得其當不行蕙田案吕升卿此議典而正切中時弊為宋臣所少惜乎其不行也宋史禮志元豐六年十一月帝親祀南郊前期三日奉仁宗英宗徽號册寳於太廟是日齋於大慶殿翌日薦享於景靈宫禮畢帝服通天冠綘紗袍乘玉輅至太廟宰臣百官班迎於廟門侍中跪請降輅帝却乘輿步太廟趨至齋宫翌日帝服靴袍至大次有司奏中嚴外辦禮儀使跪奏請行事帝服衮冕以出至東門外殿中監進大圭帝執以入宫架樂作升東階樂止登歌樂作至位樂止太祝宫闈令奉諸室神主於坐禮儀使贊曰有司謹具請行事帝再拜詣罍洗登歌樂作降階樂止宫架樂作至洗南北向樂止帝搢圭盥帨洗瓚拭瓚訖執圭宫架樂作升堂樂止登歌樂作殿中監進鎮圭帝搢大圭執鎮圭詣僖祖室樂止登歌奏瑞安之曲至神坐前北向跪奠鎮圭於繅藉執大圭跪三上香執瓚祼地奠瓚奉帛奠訖執圭俛伏興出户外北向再拜内侍舉鎮圭以授殿中監至次室行事皆如前儀帝還位登歌樂作至位樂止宫架興安之樂作文舞九成止禮部户部尚書以次官奉逐室俎豆宫架豐安之樂作奠訖樂止帝再詣罍洗登歌樂作降階樂止宫架樂作至洗南北向立樂止帝搢圭盥帨洗爵拭爵訖執圭宫架樂作帝升東階樂止登歌樂作至僖祖室樂止宫架樂作帝搢圭跪授爵祭酒三奠爵執圭俯伏興出户外北向立樂止太祝讀册文帝再拜詣次室皆如前儀帝還位登歌樂作至位樂止文舞退武舞進宫架正安之樂作亞獻以次行事如前儀樂止帝詣飲福位登歌樂作至位樂止宫架僖安之樂作帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受搏黍奠黍豆再受爵飲福酒訖奠爵執圭俛伏興再拜樂止帝還位登歌樂作至位樂止太常博士徧祭七祀配享功臣户部禮部尚書徹俎豆登歌豐安之樂作徹訖樂止禮直官曰賜胙行事陪祀官皆再拜宫架興安之樂作一成止太祝宫闈令奉神主入諸祏室禮儀使跪奏禮畢登歌樂作帝降階樂止宫架樂作出東門殿中監受大圭歸大次樂止有司奏解嚴轉仗赴南郊文獻通考自元豐初命陳襄等詳定郊廟禮文至是始用新儀宋史禮志八年太常寺言故事山陵前宗廟輟祭享朔望以内臣行薦食之禮俟祔廟畢仍舊令景靈宫神御殿已行上食太廟朔望薦食自當請罷從之樂志景祐親享太廟二首迎神興安追養奉先納孝練主金奏鳳鳴關睢樂舞奠鬯恭神肥腯展俎積慶聰明降景寰宇酌獻真宗室大明於穆真皇宅心道粹和戎偃革焕乎文治操瑞拜圖封天祀地盛徳為宗烝嘗萬世熙寧以後享廟五首酌獻英宗室大英在宋五世天子嗣昌躬發英斷若乾之剛聲容沄沄被于八荒垂千萬年永烈有光送神興安鐘鼓惟旅籩豆孔時衎我祖宗既右享之神亟來止孝孫之喜神保聿歸孝孫之思禘祫孟享臘享宗正卿升殿正安進退有容服章有儀匪亟匪遲降登孔時仁宗大和於穆仁廟聖澤滂流華夷用義動植䝉休徽名冠古奕世垂謀帝躬祼獻盛典昭修英宗大康赫赫英皇總提邦紀濬發神功恢張聖理仙馭雖遙鴻徽不弭永言孝思竭誠躬祀常祀五享三首迎神興安九變奕奕清廟昭穆定位霜露増感粢盛潔祭神靈來格福祉攸暨追孝奉先本支百世太尉奠瓚嘉安有秩時祀匪怠匪凟有來宗工載祗載肅厥作祼將流黄瓚玉是享是宜永綏多福送神興安皇考皇祖配帝配天駿奔顯相神保言旋祝以告孝嘏以慈宣去來永慕宗事惟䖍禮志哲宗元祐二年奉安神宗神御於景靈宫如十一殿奉安之禮舊制車駕上元節以十一日詣興國寺啟聖院朝謁太祖太宗神宗神御下元節謁景靈宫朝拜天興殿朝謁真宗仁宗英宗神宗神御至是詔分每嵗四孟月拜謁之所自孟秋始其不當親獻則遣官分詣初詣天興殿保寧閣天元殿太始殿次詣皇武殿儷極殿大定殿輝徳殿次詣熙文殿衍慶殿美成殿次諸治隆殿宣光殿仍自來年孟春為始哲宗本紀元祐七年十一月辛卯朝獻景靈宫壬辰享太廟禮志元祐七年詔復用牙盤食舊制並於禮饌外設元豐中罷之禮官吕希純建議曰先王之祭皆備上古中古及今世之食所設禮饌即上古中古之食牙盤常食即今世之食議者乃以為宗廟牙盤原於秦漢陵寢上食殊不知三代以來自備古今之食請依祖宗舊制薦一牙盤從之乃更其名曰薦羞希純又請帝后各奠一爵后爵謂之副爵今帝后惟奠一爵共享凟禮莫甚請設副爵亦如其儀蕙田案牙盤常食不可為典要而帝后共爵則凟甚矣更正為是哲宗本紀紹聖二年九月壬寅告遷神宗神御於景靈宫顯成殿癸卯詣景靈宫行奉安禮己酉朝獻景靈宫庚戌朝享太廟禮志元豐中每嵗四孟月天子徧詣諸殿朝獻元祐初議者請以四孟分獻一嵗而徧至是復用舊儀詔自今四孟朝獻分二日先日詣天興殿保寧閣天元太始皇武儷極大定徳輝諸殿次日詣熙文衍慶美成繼仁治隆徽音顯承七殿哲宗本紀三年正月甲辰酌獻景靈宫徧詣諸殿如元豐禮四月丙子詔自今景靈宫四孟朝獻分為二日禮志紹聖三年十月帝詣天興諸殿朝獻翼日大雨詔差已致齊官分獻熙文七殿自是雨雪用為例云徽宗本紀大觀四年十一月乙丑朔朝景靈宫丙寅享太廟文獻通考徽宗大觀四年議禮局言案太廟儀注春夏用犠尊象尊秋冬用著尊壺尊各二已應周禮司尊彛之義又每享各用大尊二則是以追享朝享之尊施之於禴祠烝嘗矣其為失禮明甚請自今四時享太廟不用大尊禮記郊特牲曰灌以圭璋用玉氣也周禮典瑞祼圭有瓚以肆先王説者謂天地有禮神之玉而無鬱鬯宗廟有鬱鬯而無禮神之玉然則宗廟之玉祼圭而已圭瓚之制以圭為枋其長尺有二寸黄金為勺青金為外朱中央其容五升其徑八寸其勺之鼻為龍首所以出鬱鬯也其槃徑一尺所以承瓚也今親祀太廟以塗金銀瓚有司行事以銅瓚其大小長短之制皆不如禮請改製以應古制十一月太常光禄寺言禮制局新定太廟陳設之儀盡依周制籩豆各用二十有六簠簋各八以籩二十有六為四行以右為上羞籩二為第一行朝事籩八次之饋食籩八又次之加籩八又次之豆二十有六為四行以左為上羞豆二為第一行朝事豆八次之饋食豆八又次之加豆八又次之簠八為二行在籩之外簋八為二行在豆之外籩豆所實之物悉如周禮籩人醢人之制惟簠以稻梁簋以黍稷而茅菹以蓴蚳醢以蜂子代之十二月禮制局言太廟祭器鉶用三登用一竊考鉶與登皆盛羮之器祭祀亨牲於鼎升肉於俎其湆芼以醢鹽蔬實之於鉶則謂之鉶羮不致五味實之於登則謂之大羮周官饔人祭祀共大羮鉶羮是也且宗廟之祭用太牢而三鉶實牛羊豕之羮固無可論者至於大羮止設一登以少牢饋食禮考之則少牢者羊豕之牲也佐食羞兩鉶司士進湆二豆三牲之祭鉶既設三則登亦如其數請太廟設三登實牛羊豕之湆以為大羮明堂亦如之宋史禮志宣和元年禮部奏太常寺參酌立到諸州府有祖宗御容所在朔日諸節日降到御封香表及下降香表行禮儀注朔日諸節序奉香表行禮儀注齋戒朝拜前一日朝拜官及讀表文官早赴齋所俟禮備禮生引讀表文官齎香表官集朝拜官聴執事者以香表呈視禮生請讀表文官稍前習讀表或密詞即讀封題訖禮生贊復位次以御封香禮饌等呈視訖各復齋所朝拜官用長吏闕以次官充讀表文亦以次官充執事者以有服色者充有司設香案時果牙盤食神御前又設奠醪茗之器於香案前之左置御封香表案上設朝拜官位於殿下西向讀表文官位於殿之南北向陪位官位於其後設焚表文位於殿庭東南向朝拜日質明前香火官先詣殿下北向拜訖升殿東向侍立有司陳設訖禮生先引陪位官入就位北向次引讀表文官入就位次引朝拜官就位西向立定禮生贊有司謹具請行事禮生贊再拜拜訖引讀表文官先升殿於香案之右東向立次引朝拜官諸香案前贊搢笏上香奠酒茗拜興少立禮生贊搢笏跪讀表文或密詞即讀封題執笏興降復位朝拜官再拜降復位禮生贊再拜訖引朝拜官讀表文官詣焚表文位南向立焚訖退一遇旦望諸節序下降香表薦獻行禮儀注一如上儀惟禮生引獻官上香訖跪執事者以所薦之物授薦獻官受獻訖復授執事者置於神御前興拜退一如上儀詔頒行之徽宗本紀宣和七年十一月甲申朝獻景靈宫乙酉享太廟髙宗本紀建炎二年正月甲午詣夀寧寺謁祖宗神主十一月庚子詣夀寧寺朝享祖宗神主文獻通考髙宗建炎二年上幸揚州行南郊禮時太廟神主奉于夀寧寺前一日上親詣寺行朝享謝禮禮成恭謝如儀時景靈宫神御奉安于温州乃差官詣温州行禮三年上幸杭州太廟神主併奉安于温州祭享皆差官攝事以禮器未備五享權用酒脯行禮紹興五年二月戊寅遣權太常少卿張銖奉迎太廟神主於温州己丑詔建太廟四月戊申太廟神主至自温州戊午奉安太廟神主丙寅帝即射殿行朝獻景靈宫之禮五月乙亥初謁太廟七年九月己卯朝獻聖祖於常朝殿庚辰朝享太廟文獻通考紹興七年上祀明堂于建康時有徽宗之喪先是太常少卿呉表臣乞於大祀前二日朝獻景靈宫前一日朝享太廟及是援熙寧元年故事謂是時英宗喪未除不廢景靈宫太廟之禮請如故事翰林學士朱震以為不然謂王制喪三年不祭唯天地社稷得越紼行事監察御史趙渙言升祔以後宗廟常祭皆不當廢而當喪享廟亦有顯據左氏傳曰烝嘗禘於廟曾子問曰已葬而祭此不當廢也詩頌成王即位諸侯來助祭春秋文公四年十一月成風薨六年十月猶朝于廟此顯據也疏奏詔侍從臺諫議吏部尚書孫近等十五人言謹案春秋三十三年傳凡君薨卒哭而祔祔而作主特祀於寢烝嘗禘於廟杜預謂新主既特祀於寢則宗廟四時常祀自當如舊又案景徳三年明徳皇后之喪改易而服除真宗遂享太廟合祭天地於圜丘熙寧元年神宗居諒闇復用景徳故事躬行郊廟之禮則是攷古及今居喪得見宗廟將來明堂大禮已在以日易月服除之後前一日皇帝合詣太廟朝享從之禮部太常寺言將來明堂大禮依已降㫖前一日朝享太廟檢照景徳熙豐南郊故事皆在諒闇之中當時親行郊禮除郊景靈宫合用樂外所有鹵薄鼓吹及樓前宫架諸軍音樂皆備而不作其逐處巡警場止鳴金鉦鼓角而已今臣僚欲議罷宗祀奏樂受胙故事即無去奏樂受胙之文兼祖宗故事三載大饗明堂葢亦為民祈福奏樂受胙合依祖宗累朝已行故事從之先是監察御史趙渙言春秋有事于武宫叔弓卒去樂卒事以卿佐之喪而猶去樂况天王后之喪而可用備樂乎戴記既殯既𦵏而祭五祀則尸入三飯不侑不酢以五祀之祭猶廢侑酢况宗廟之祭而可享受福釐乎故晉制國有大喪天地明堂皆去聲樂且不受胙有唐祭日遇忌亦備樂而不奏此皆得禮之體也陛下雖在喪服而猶宗祀者用王制之言不敢以卑廢尊也今唯聲樂受胙於未安者蓋拜跪受釐既為嘉慶之事而虞祔既畢則廟加先帝之坐陛下薦祼饋奠進詣徽室必將想像平生悲哀感愴而乃金石絲竹雜然並奏豈不違神靈之至意而傷陛下之孝心哉將來明堂大禮前一日乞依列聖故事躬詣宗廟行朝享之禮其奏樂受胙二事乞寢庶合禮有㫖令本部太常寺討論宋史髙宗本紀紹興十三年正月戊戌加上徽宗尊號己亥親饗太廟二月乙酉建景靈宫奉安累朝神御二十七年六月戊午初命太廟冬享祭功臣臘享祭七祀祫享兼之三十一年九月庚午朔命大臣朝享太廟孝宗本紀隆興二年十二月己酉朝獻景靈宫庚戌朝享太廟禮志孝宗即位擇日朝享太廟禮部言牲牢禮料酒齊等物並如五享行之宋會要朝獻景靈宫御製及宰執兩省官撰二十五曲聖祖奉幣靈安酌獻祖安並御製朝享太廟四十一曲太祖酌獻用大定太宗同徽宗用承元並御製文獻通考孝宗淳熙十六年二月光宗受禪詔以四月六日親享太廟光宗紹熙五年閏十月時寧宗已即位浙東提舉李大性言竊觀紹興七年侍從臺諫禮官詳定明堂典禮其大畧云居喪皆得見宗廟近者合宫展祀陛下止詣明堂殿然臣之愚竊謂與淳熙十五年事體不同又况漢文以來皆即位而謁廟陛下龍飛已三越月未嘗一至宗廟行禮鑾輿屢出過太廟門不入揆之人情似為闕典乞與二三大臣議之早行擇日恭謝太廟少見祗肅宗廟之意於是詔遵用三年之制其朝謁太廟委有妨礙馬氏曰案古者宗廟之祭有正祭有告祭皆人主親行其禮正祭則時享禘祫是也告祭則國有大事告於宗廟是也自漢以來禮制隳廢郊廟之祭人主多不親行至唐中葉以後始定制於三嵗一郊祀之時前二日朝享太清宫太廟次日方有事於南郊宋因其制於第一日朝享景靈宫第二日朝享太廟第三日於郊壇或明堂行禮國史所書親享太廟大率皆郊前之祭然此乃告祭禮所謂卜郊受命於祖廟作龜於禰宫所謂魯人將有事於上帝必先有事於泮宫是也若正祭則未嘗親行雖禘祫大禮亦命有司攝事累朝惟仁宗嘉祐四年十月親行祫祭禮一次而已蓋法駕屬車其鹵薄鄭重祼薦升降其禮節繁多故三嵗享帝之時僅能舉一親祠然告祭之事亦有大於祀天者如即位而告廟則自舜禹受終以至太甲之見祖成王之見廟皆是也雖西漢時人主每嗣位亦必有見髙廟之禮而自唐以來則人主未嘗躬謁宗廟致祭以告嗣位宋朝惟孝宗光宗以親受内禪特行此禮而其它則皆以喪三年不祭之説為拘不復舉行然自以日易月之制既定諒闇之禮廢久矣何獨於嗣位告祭一事以為不可行乎慶元間李大性李謙所言可謂至論要之親享既不能頻舉則合於禘祫大祀行之而嗣位告祭則亦必合親行如卜郊之祭則三嵗常行之事又只為將有事於上帝而告白則本非宗廟之大祭有司攝事足矣孫氏洙曰漢四時車駕間出饗廟及八月飲酎以盡孝思唐禮有親饗之制而一世不過再三國家每嵗四孟及季冬凡五享三年一祫五年一禘皆有司侍祠天子未嘗親事唯三嵗親郊一行告廟之禮而神御殿酌獻一嵗徧焉是失禮經之意循近世之失也蕙田案歴代宗廟時享自東漢建武中一嵗五祠之制定後世徃徃相循雖三年五年祫禘之説未為合古然較西漢之凟䙝則相去逺矣乃有不經之至者莫如唐之郊祀朝享太清宫太廟不特𤣥元皇帝之祭貽誚古今而享帝之前致齋之日先享宗廟固非所以尊祖亦違敬天之義也至宋景靈宫太廟一遵唐之陋習終宋之世宗廟時祭竟未一行所存儀注不過祠祀官攝事之儀而禮之盛者反在郊祀前朝享一祭其儀注馬氏通考編在時享之前蓋有所不得已者矣今姑仍之而著其失云禮部太常寺修立郊祀大禮前一日朝享太廟行禮儀注陳設前享三日儀鸞司設大次於太廟東神門外道北南向小次於阼階東稍南西向又設文武侍臣次於大次之前行事助祭官宗室及有司次於廟之内外設東方南方客使次於文官之後西方北方客使次於武官之後各隨地之宜設饌幔於南神門外每室饌幔各一又設七祀次於殿下横街之北道西東向又設配享功臣次於殿下横街之南東西相向每室功臣配享各為一次前享二日宫闈令帥其屬掃除廟之内外開瘞坎於殿西階之東南方深取足容物南出陛太常設七祀燎柴於南神門外光禄牽牲詣所太常陳登歌之樂於殿上前楹間稍南北向設宫架於庭中立舞表於酇綴之間户部陳諸州嵗貢於宫架之南神門外隨地之宜東西相向前享一日奉禮郎及禮直官設皇帝位版於阼階上飲福位於東序俱西向贊者設亞終獻位於小次南稍東助祭親王宗室使相在其南進幣爵酒官受爵酒官奉幣官薦牛俎官薦羊俎官實鑊水官薦豕俎官増沃鑊水官受幣官盥洗奉爵官奉瓚槃官進搏黍官奉册官七祀獻官在助祭宗室使相之南並西向北上大禮使位於西階之西稍南與亞終獻相對行事光禄卿讀册官光禄丞功臣獻官在其西太常光禄以下皆稍却執事官位於其後助祭宰臣使相位在大禮使之南執政官在其西又設監察御史位二於西階下俱東向北上奉禮郎太祝太官令於東階下西向北上協律郎位二一於殿上磬簴西北一於宫架西北俱東向押樂太常丞於登歌樂簴北押樂太常卿宫架之北北向良醖令位於尊彛所俱北向薦香燈官宫闈令於室内北向西上又設助祭文武羣臣宗室位於横街之南東西相向諸方客位廟門之外隨其方國光禄陳牲於東神門外當門西向以南為上祝史各位於牲後太常設省牲位於牲西大禮使進幣爵酒官受爵酒官奉幣官盥洗奉爵官奉瓚盤官位於道南北向西上七祀配享功臣獻官在其後監察御史二位在西東向薦牛俎官眂滌濯官實鑊水官眂腥熟節官増沃鑊水官押樂太常卿光禄卿讀册舉册官太常丞光禄丞奉禮協律郎太祝太官宫闈令位在東西向北上禮部帥其屬設祝册案於室户外之右司尊彛帥其屬設幣篚於酌尊所次設籩豆簠簋之位每室左二十有六籩右二十有六豆俱為四行俎三二在籩前一在豆前又設俎九在豆右為三重登一在籩豆間鉶三皆有柶在登前簠八簋八在籩豆外三俎間簠在左簋在右設爐炭於室户外蕭蒿稷黍於其後又設毛血盤肝膋豆於室户外之左稍前設尊彛位每室斚彛一黄彛一皆有舟著尊二壺尊二皆有罍加勺冪為酌尊太尊二山尊二犧尊二皆有罍加勺加冪設而不酌俱北向西上太常設七祀位於殿下横街之北次内司命户竈中霤門厲行又設配享功臣位於横街之南次内韓王趙普濟陽王曹彬位於横街之南道西東向太師薛居正太師石熙載鄭王潘美位在其西太師李沆太師王旦太師李繼隆位又在其西太師王曾吕夷簡侍中曹瑋位又於其西又設司徒韓琦太師曾公亮位於横街之南道東西向太師富弼位在其東太師司馬光位又在其東太師韓忠彦位又在其東俱北上皆設神席太廟設神位版於座首司尊彛設祭器每左二籩右二豆俎一在籩豆前簠一簋一在俎前簠在左簋在右爵一次之象尊一在籩前加冪又設俎三於南神門外每室饌幔内設進盤匜帨巾内侍位於皇帝版位之後分左右奉盤者北向奉匜及執巾者南向又設亞終獻盥洗爵洗於其位之北盥洗在東爵洗在西罍在洗東加勺篚在洗西南肆實以巾若爵洗之篚則又實以爵太官令盥洗於西階下七祀配享功臣獻官盥洗各於神位之前七祀及配享功臣位前盥洗各一罍勺篚巾各設於左右執罍篚者位其後享日未行事前宫闈令開室帥其屬整拂神幄如常儀司尊彛入設祭器太府卿帥其屬入陳幣於篚幣以白光禄卿帥其屬入實籩豆簠簋籩四行以右為上第一行糗餌在前粉餈次之第二行麷在前蕡白黒形鹽膴鮑魚鱐次之第三行乾棗在前濕棗栗濕桃乾桃濕梅乾䕩榛實又次之第四行蔆在前芡㮚鹿脯次之豆四行以左為上第一行酏食在前糝食次之第二行韭菹在前醓醢昌本麋臡菁菹鹿臡茆菹麇臡又次之第三行葵菹在前蠃醢脾析蠯醢蜃蚳醢豚拍魚醢又次之第四行芹菹在前兔醢深蒲醓醢菭菹鴈醢筍菹魚醢又次之簠實以稻梁梁在稻前簋實以黍稷稷在黍前登實以大羮鉶實以和羮芼滑大官令帥其屬入實俎籩前之俎為二重以北為上第一重實以牛腥七體兩脾兩脅并脊而兩髀在兩端兩肩兩脅次之脊在中第二重實以羊腥七體其載如牛豆前之俎實以豕腥七體其載如羊豆右之俎九為三重以北為上第一重實以牛羊豕首各一第二重實以牛腥腸胃肺離在上端刌肺三次之腸三胃三又次之一實以羊腥腸胃肺其載如牛一實以豕腥膚九横載第三重一實以牛熟腸胃肺一實以羊熟腸胃肺一實以豕熟膚其載如腥皆牛在左羊在中豕在右良醖令帥其屬入實彛