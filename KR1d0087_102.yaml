臣賡載夷夏肅清本支百世持盈守成仁宗室美成在宋四世天子聖神用賢致治約已裕民海内富庶裔夷肅賓四十二年堯舜之仁英宗室治隆明明英后仁孝儉恭丕顯丕承増光祖宗繼志述事遵制揚功萬邦作孚盛徳形容神宗室大明厲精基治大哉乾剛信賞必罰内修外攘禮樂法理號令文章作新之功度越百王哲宗室重光於皇我宋世有哲明元祐用人遹駿有聲紹述先志思監于成受天之祜王配于京徽宗室承元帝撫熙運晏粲協期禮明樂備文恬武嬉道光授受謀深燕詒駿命不易子孫保之欽宗室端慶顯顯令主輝光日新奉親以孝綏下以仁兢兢業業誕保庶民於穆不已之徳之純髙宗室大徳昊天有命中興復古治定功成修文偃武徳隆商宗業閎漢祖付託得人系堯之緒孝宗室大倫藝祖有孫聰睿神武紹興受禪歸尊于父行道襲爵百度修舉聖徳曰孝光于千古光宗室大和維宋洽熙帝繼于理萬姓厚生三辰順軌對時天休以燕翼子肅唱和聲神其有喜還位乾安在周之庭設業設虡酒醴惟醹爾殽伊脯帝觴畢勺天步旋舉丕顯丕承念兹皇祖降殿乾安黼幄蟬蜎飈斿寧燕尊彛獻祼瑚簋陳薦眎儀天旋淳音韶變遹求厥寧福禄流羡入小次乾安皇容肅祗天步舒遲對越惟恭敬事不遺陟降蒞止永言孝思上帝臨女日監于兹文舞退武舞進正安明庭承神鞉磬柷敔玉梢飾歌佾綴維旅既肖厥文復象乃武祖徳宗功惟帝時舉亞獻正安尊斚星陳罍冪雲舒來貳鸞觴玉佩瓊琚相予嚴祀秉徳有初對揚王休何福不除終獻正安秉徳翼翼顯相肅雝疏冪三舉誠意益恭光燭黼繡和流笙鏞子孫衆多福禄來從出小次乾安廟楹邃嚴夜景藻清文物炳彪禮儀熙成帷宫載敞珮珩有聲帝復對越將受厥明再升殿乾安明明維后詒厥孫謀系隆我漢陳錫哉周以孝以饗世徳作求介以繁祉萬邦咸休飲福乾安玉瓚黄流有飶其香來格來享降福穰穰我應受之湯孫之將有百斯男福禄無疆還位乾安聖圖廣大宗祊光輝假于有廟帝命不違僾若有慕夙夜畏威嘉樂君子福禄祁祁徹豆豐安升饌有章卒食攸序庭鏘金奏凱收鉶筥其獻惟成其餕維旅禮洽慶流皇祖之祜送神興安珠幄熉黄神既燕娭監觀于下福禄來宜雲車風馬神保聿歸尚佑我後福禄來為降殿乾安聖有謨訓詒謀燕翼奉天酌祖萬世維則維皇孝熙乾乾夕惕禮既式旋惟福之錫還大次乾安王假有廟對越在天帷宫旋御率禮不愆泰畤展祠雲陽奉瑄齊居精明益用告䖍理宗朝享三首皇帝升降乾安於皇祖宗清廟奕奕威靈在天不顯惟徳垂裕鴻延詒謀燕翼孝孫格斯受祉罔極迎神興安九奏秬鬯既將黄鐘具奏瞻望真游僾若有慕於皇列聖在帝左右雲車具來以妥以侑寧宗室人安帝徳之休恭儉淵懿三十一年謹終如始升祔在宫祖功並美民懷有仁何千萬世髙宗祀明堂前朝享太廟二十一首皇帝入門乾安於皇我后祗戒專精齊肅有容祖考是承造次匪懈孝思純誠神聴有格福禄來寧升殿乾安肅哉清宫熉珠照幄神之來思八音振作赤舄龍章奉玉惟恪匪今斯今先民時若盥洗乾安於皇維后觀盥之初精意昭著既順既愉圭鬯承祀卿士咸趨目視心化四方其孚迎神興安涓選休成祖考是享夙夜專精求諸惚恍洋洋在上惟神之仰鬯矣清明應之如響捧俎豐安來相于庭鳴鋗鏘鏘奉牲而告登彼雕房非牲之備民庶是康神依民聴上帝斯皇僖祖室酌獻基命何慶之長實兆于商由商太戊子孫其昌皇基成命宋道用光詒厥孫謀膺受四方翼祖室大順上帝監觀維仁是依繼世修徳皇心顧之其顧伊何在彼冀方施于子孫降福穰穰宣祖室酌獻天元昭哉皇祖駿發其祥雕戈圭瓚盛烈載揚天錫寳符俾熾而昌神聖應期赫然垂光太祖室皇武猗歟皇祖下民攸歸膺帝之命龍翔太㣲戎車雷動天地清夷峩峩奉璋萬世無違太宗室大定煌煌神武再御戎軒時惠南土旋定太原車書混同聲教布宣維天佑之億萬斯年真宗室熙文於皇真宗體道之崇游心物外應迹寰中四方既同化民以躬清净無為盛徳之容仁宗室曲同郊祀送神亦同英宗室治隆噫我大君嗣世脩文維文維武諟繼虞勲天錫丕祚施于後昆於薦清酤酌之欣欣神宗室大明烝哉維后繼明體神憲章文武宜民宜人經世之道功格于天子孫嚴祀無窮之傳哲宗室重光明哲煌煌昭臨無疆丕承先志嘉靖多方朝廷尊榮民庶樂康珍符來應錫兹重光徽宗室承元聖孝巍巍光照丕基禮隆樂備時維純熙天仁兼履皇化無為功成弗處心潛希夷文舞退武舞進正安作樂合祖簴在庭衆奏具舉肅雝和鳴神靈來格庶㡬是聴皦繹以終永觀厥成亞獻正安威神在天來格于誠既載清酤有聞無聲相予熙事時賴宗英肅肅雝雝允協思成終獻正安疏幕三舉誠意一純孰陪予祀公族振振明靈來娭樂舞具陳奉神所佑昭孝息民飲福禧安赫赫明明徳與天通施于孫子福禄攸同日靖四方民和年豐有秩斯祜申錫無窮徹豆豐安歆我齊明威徳如存牲牷是享圭玉其温羣公執事亦既駿奔禮成告徹咸福黎元還大次乾安神明既交恍若有承欽翼齊莊福禄具膺王業是興祖武是繩佑我億年以莫不增孝宗明堂前享太廟三首徽宗室酌獻承元明明徽祖撫世升平制禮作樂發政施仁聖靈在天徳澤在民億萬斯年保佑後人髙宗室大徳於皇時宋自天保定髙宗受之再僕景命紹開中興翼善傳聖何千萬年永綏厥慶還大次乾安禮既行矣樂既成矣維祖維妣安且寧矣皇舉玉趾佩將鳴矣拜貺總章于厥明矣理宗明堂前朝享二首寧宗室奠幣定安皇矣昭考聖靈在天稱秩宗祀有嚴恭先奉幣以薦見之僾然仁深澤厚厥光以延酌獻考安假哉皇考必世後仁嘉靖我邦與物皆春之純之徳克配穹旻餘慶淵如佑我後人右宋廟享上五禮通考卷九十二
