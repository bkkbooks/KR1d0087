body:
  text: 五禮通考卷一百三十九刑部尚書秦蕙田撰嘉禮十二朝禮遼史禮志正旦朝賀儀臣僚并諸國使昧爽入朝奏班齊皇帝升殿坐契丹舍人殿上通訖引契丹臣僚東洞門入引漢人臣僚并諸國使西洞門入合班舞蹈五拜鞠躬平身引親王東階上殿欄內褥位俯伏跪自通全銜臣某等祝夀訖俯伏興退引東階下殿復位舞蹈五拜畢鞠躬宣徽使殿上鞠躬奏臣宣答稱有敕班首以下聽制訖再拜鞠躬宣徽傳宣云履端之慶與公等同之舍人贊謝宣諭拜舞蹈五拜贊各祗候分班引出引班首西階上殿奏表目訖教坊起居賀十二拜畢贊各祗候引契丹漢人臣僚并諸國使東西洞門入合班再拜贊進酒引親王東階上殿就欄內褥位搢笏執臺盞進酒訖退復褥位置臺盞出笏少前俯伏自通全銜臣某等謹進千萬歲夀酒俯伏興退復褥位與殿下臣僚皆再拜鞠躬俟宣徽使殿上鞠躬奏臣宣答稱有旨親王以下再拜如初儀傳宣云飲公等夀酒與公等內外同慶舍人贊謝宣諭如初贊各祗候親王搢笏執臺盞殿下臣僚分班皇帝飲酒教坊奏樂上下臣僚皆拜呼萬歲贊各祗候樂止教坊再拜皇帝卒飲親王進受盞復褥位置臺盞出笏揖臣僚合班引親王東階下殿復位鞠躬再拜贊各祗候分班引出皇帝起詣皇太后殿臣僚并諸國使皆從皇太后升殿皇帝東方側坐引契丹漢人臣僚并諸國使兩洞門入班稱賀進酒皆如皇帝之儀畢引出教坊入起居進酒亦如之皇太后宣答稱聖旨契丹班謝宣宴上殿就位立漢人臣僚并諸國使東洞門入丹墀東方面西鞠躬舍人鞠躬通文武百僚宰臣某以下謝宣宴再拜出班致詞訖退復位舞蹈五拜贊各上殿祗候引宰臣以下并諸國使副方裀朵殿臣僚西階上殿就位立不應坐臣僚並於西洞門出二人監盞教坊再拜贊各上階下殿謝宴如皇太后生辰儀拜表儀其日先於東上閣門陳設氊位分引南北臣僚諸國使副於氊位合班通事舍人二人舁表案置班首前揖鞠躬再拜平身中書舍人立案側班首跪搢笏興捧表跪左膝以表授中書舍人出笏就拜興再拜中書舍人復置表案上通事舍人舁表案於東上閣門入捲班分引出禮畢元日皇帝不御座行此儀餘應上表有故皆倣此樂志正月朔日朝賀用宫懸雅樂元會用大樂曲破後用散樂角抵終之是夜皇帝燕飲用國樂遼史太祖本紀太祖二年春正月癸酉朔御正殿受百官及諸國使朝七年春正月甲辰朔以用兵免朝太宗本紀會同四年十一月壬午以永寧天授二節及正旦重午冬至臘並受賀著為令五年春正月丙辰朔上在歸化州御行殿受羣臣朝以諸道貢物進太后及賜宗室百僚大同元年春正月丁亥朔備法駕入汴御崇元殿受百官賀穆宗本紀應歷十八年春正月乙酉朔宴於宫中不受賀十九年春正月己卯朔宴宫中不受賀聖宗本紀統和元年春正月戊午朔以大行在殯不受朝道宗本紀太康三年冬十二月丙寅預行正旦禮六年冬十二月丁亥預行正旦禮大安四年冬十二月癸卯朔預行正旦禮夀隆七年春正月壬戌朔力疾御清風殿受百官及諸國使賀右遼正旦朝賀金史禮志元旦聖誕上夀儀皇帝升御座鳴鞭報時畢殿前班小起居各復位立舍人引皇太子并臣僚使客合班入至丹墀舞蹈五拜平立閣使奏諸道表目皇太子以下皆再拜引皇太子升殿褥位搢笏捧盞進酒皇帝受置於案皇太子退復褥位轉盤與執事者出笏二閣使齊揖入欄子內拜跪致辭云元正啓祚品物咸新恭惟皇帝陛下與天同休若聖節則云萬夀令節謹上夀巵伏願皇帝陛下萬歲萬歲萬萬歲祝畢拜興復褥位同殿下臣僚皆再拜宣徽使稱有制在位皆再拜宣答曰履新上夀與卿等內外同慶聖節則曰得卿夀酒與卿等內外同慶詞畢舞蹈五拜齊立皇太子搢笏執盤臣僚分班教坊奏樂皇帝舉酒殿上下侍立臣僚皆再拜皇太子受虛爵退立褥位轉盤盞與執事者出笏左下殿樂止合班在外臣僚皆再拜分引與宴官上殿次引宋國人從至丹墀再拜不出班奏聖躬萬福再拜唱有敕賜酒食又再拜各祗候平立引左廊立次引髙麗夏人從如上儀畢分引左右廊立御果牀入進酒皇帝飲則坐宴侍立臣皆再拜進酒官接盞還位坐宴官再拜復坐行酒傳宣立飲訖再拜坐次從人再拜坐三盞致語揖臣使從人立誦口號畢坐宴侍立官皆再拜坐次從人再拜坐食入七盞曲將終揖從人立再拜畢引出聞曲時揖臣使起再拜下殿果牀出至丹墀合班謝宴舞蹈五拜各祗候分引出熙宗本紀皇統三年正月己丑朔以皇太子喪不御正殿羣臣詣便殿稱賀宋髙麗夏使詣皇極殿遙賀世宗本紀大定二年正月戊辰朔日有食之伐鼓用幣上徹樂減膳不視朝章宗本紀明昌元年正月丙辰朔改元以世宗喪不受朝賀二年正月庚戌朔以世宗喪不受朝三年正月乙巳朔以皇太后喪不受朝四年正月己巳朔以皇太后喪不受朝宣宗本紀貞祐二年春正月丁卯朔以邊事未息詔免朝賀興定四年春正月壬辰朔詔免朝五年正月丙戌朔免朝元光元年正月庚戌朔免朝二年正月甲辰朔詔免朝賀右金正旦朝賀元史憲宗本紀八年戊午春正月朔幸阿勒坦巴圖罕地受朝賀世祖本紀至元六年冬十月己卯定朝儀服色八年春三月甲戌敕元正聖節朝會凡百官表章外國進獻使臣陛見朝辭禮儀皆𨽻侍儀司禮樂志八年八月己未初起朝儀輟耕録至元初尚未遑興建宫闕凡遇稱賀則臣庶皆集帳前無尊卑貴賤之辨執法官厭其喧雜揮杖擊逐之去而復來者數次翰林承旨王磐時兼太常卿慮將貽笑外國奏請立朝儀如其言元正受朝儀前期三日習儀於聖夀萬安寺或大興教寺前二日陳設於殿庭至期大昕侍儀使引導從護尉各服其服入至寢殿前捧牙牌跪報外辦內侍入奏出傳制曰可侍儀俯伏興皇帝出閣升輦鳴鞭三侍儀使并通事舍人分左右引擎執護尉劈正斧中行導至大明殿外劈正斧直正門北向立導從倒卷序立惟扇置於錡侍儀使導駕時引進使同內侍官引宫人擎執導從入至皇后宫庭捧牙牌跪報外辦內侍入啓出傳旨曰可引進使俯伏興皇后出閣升輦引進使引導從導至殿東門外引進使分退押直至堊塗之次引導從倒卷出俟兩宫升御榻鳴鞭三劈正斧退立於露階東司晨報時雞唱畢尚引引殿前班皆公服分左右入日精月華門就起居位相向立通班舍人唱曰左右衛上將軍兼殿前都檢點臣某以下起居尚引唱曰鞠躬曰平身引至丹墀拜位知班報班齊宣贊唱曰拜通贊贊曰鞠躬曰拜曰興曰拜曰興曰都檢點稍前宣贊報曰聖躬萬福通贊贊曰復位曰拜曰興曰拜曰興曰平身曰搢笏曰鞠躬曰三舞蹈曰跪左膝三叩頭曰山呼曰山呼曰再山呼凡傳山呼控鶴呼譟應和曰萬歲傳再山呼應曰萬萬歲後倣此曰出笏曰就拜曰興曰拜曰興曰拜曰興曰平立宣贊唱曰各恭事兩班點檢宣徽將軍分左右升殿宿直以下分立殿前尚廄分立仗南管旗分立大明門南楹俟后妃諸王駙馬以次賀獻禮畢典引引丞相以下皆公服入日精月華門就起居位通班唱曰文武百僚開府儀同三司録軍國重事監修國史右丞相具官無常臣某以下起居典引贊曰鞠躬曰平身引至丹墀拜位知班報班齊宣贊唱曰拜通贊贊曰鞠躬曰拜曰興曰拜曰興曰平身曰搢笏曰鞠躬曰三舞蹈曰跪左膝三叩頭曰山呼曰山呼曰再山呼曰出笏曰就拜曰興曰拜曰興曰拜曰興曰平身侍儀使詣丞相前請進酒雙引升殿前行樂工分左右引登歌者及舞童舞女以次升殿門外露階上登歌之曲各有名音中本月之律先期儀鳯司運譜翰林院撰詞肄之丞相至宇下褥位立侍儀司分左右北向立俟前行色曲將半舞旋列定通贊唱曰分班樂作侍儀司引丞相由南東門入宣徽使奉隨至御榻前丞相跪宣徽使立於東南曲終丞相祝贊曰溥天率土祈天地之洪福同上皇帝皇后億萬歲夀宣徽使答曰如所祝丞相俯伏興退詣進酒位尚醖官以觴授丞相丞相搢笏奏觴北面立宣徽使復位前行色降舞旋至露階上教坊奏樂樂舞至第四拍丞相進酒皇帝舉觴宣贊唱曰殿上下侍立臣僚皆再拜通贊贊曰鞠躬曰拜曰興曰拜曰興曰平身丞相三進酒畢以觴授尚醖官出笏侍儀使雙引自南東門出復位樂止至元七年進酒儀班首至殿前褥位立前行進曲尚醖官執空杯自正門出授班首班首搢笏執空杯由正門入至御榻前跪俟曲終以杯授尚醖官出笏祝贊宣徽使曰諾班首俯伏興班首宣徽使由南東門出各復位班首以下舞蹈山呼三拜百官分班教坊奏樂尚醖官進殿上下侍立臣僚皆再拜三進酒畢班首降丹墀至元十八年十二月二十八日改今儀通贊贊曰合班禮部官押進奏表章禮物二案至橫階下宣禮物舍人進讀禮物目至第二重階俟進讀表章官等翰林國史院屬官一人至宇下齊跪宣表目舍人先讀中外百司表目翰林院官讀中書省表畢皆俯伏興退降第一重階下立俟進讀禮物舍人升階至宇下跪讀禮物目畢俯伏興退同降至橫街隨表章西行至右樓下侍儀仍領禮物東行至左樓下太府受之宣贊唱曰拜通贊贊曰鞠躬曰拜曰興曰平身曰搢笏曰鞠躬曰三舞蹈曰跪左膝三叩頭曰山呼曰山呼曰再山呼曰出笏曰就拜曰興曰拜曰興曰拜曰興曰平立僧道耆老外國藩客以次而賀禮畢大會諸王宗親駙馬大臣宴饗殿上侍儀使引丞相等升殿侍宴四品已上賜酒殿上典引引五品以下賜酒於日精月華二門之下宴畢鳴鞭三侍儀使導駕引進使導后還寢殿如來儀蕙田案至元朝儀定於劉秉忠許衡之手其儀注頗依倣前代為之惟太常陳燕樂不陳雅樂遂使三朝大會不聞大成雅樂之音至帝后並坐正殿則歷代所未有者輟耕録大明門在崇天門內大明殿之正門也七間三門日精門在大明門左月華門在大明門右皆三間一門大明殿乃登極正旦夀節會朝之正衙也十一間寢室五間東西夾六間後蓮香閣三間中設七寶雲龍御榻白蓋金縷褥並設后位諸王百僚集賽官侍宴坐牀重列左右春明夢餘録元大朝殿上設漏案香案酒海殿門外中道設褥位丹陛中道設鳴鞭丹墀中道設香案又設表案禮物案中道南東西設樂位設內黃麾立仗設外牙門立仗又酒海之前一人手執玉鉞立於階下鉞乃殷時之物長三尺有竒廣半之通體花紋宋藏宣和殿中為金所得後歸元以為大寶其服制祀天則服大裘而加衮正旦聖節則常衣不被衮冕惟祀宗廟則服之內庭大宴則服濟蘇濟蘇者華言一色服也其臣下朝會之服則用唐宋公服一品紫玉帶二品紫犀帶三品四品紫金帶五品紫角帶六品七品緋角帶八品九品緑角帶其京官賜宴則有濟蘇其制冬之服凡九等大紅納竒實大紅竒凌大紅官素一桃紅藍緑官素各一紫黃鴉青各一訥克實者金錦也竒凌者剪絨也世祖本紀十一年春正月己卯朔宫闕告成帝始御正殿受皇太子諸王百官朝賀二十三年春正月戊辰朔以皇太后故罷朝賀二十四年春正月壬申御正殿受諸王百官朝賀二十九年春正月甲午朔以日食免朝賀成宗本紀大德十一年春正月丙辰朔免朝賀武宗本紀至大四年春正月癸酉朔帝不豫免朝賀仁宗本紀延祐七年春正月辛巳朔日有食之輟朝賀癸未帝御大明殿受諸王百官朝賀順帝本紀元統二年冬十月乙卯朔正內外官朝會儀班次一依品從王圻續通考元統二年蘇天爵奏曰朝覲會同國家大體班制儀式不可不肅夫九品分官所以著尊卑之序四方述職所以同逺近之風蓋位序尊嚴則觀望隆重朝廷典獻莫大於斯邇年以來朝儀雖設版位品秩牽越班行均為衣紫從五與正五