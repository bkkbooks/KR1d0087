官員嚴禁雜人行走鼓初嚴執事官并侍衛官軍先入次王親公侯駙馬伯次在京文武品官次來朝品官次內外雜職次生儒次外國四夷人至奉天殿下文武百官依品級序立毋得攙越亂班禮畢外國四夷先出次生儒次雜職次文武品官次侍衛官軍及儀從人等俱盡象馬方行其金水橋東西角門各添設序班凡有攙越者御史序班糾舉拿奏若有市井姦人假借儒吏衣巾冒入殿庭錦衣衛官校緝拿又令凡正旦冬至聖節百官俱於先期之三日及二日習儀正旦冬至於朝天宫聖節於靈濟宫大政記十四年正月壬戌朔免朝賀癸酉御奏天殿文武及朝覲官行禮明世宗實録時帝以憲廟恭妃初喪不受節賀禮部請於視朝之日令文武百官及天下朝覲官公服行五拜三叩頭禮一伸臣子之情詔以十二日行明會典正旦冬至百官朝賀儀嘉靖十六年更定前一日尚寶司設寶案於奉天殿寶座之東鴻臚寺設表案二於殿東中門外禮部主客司設蕃國貢方物案八於丹陛中道左右欽天監設定時鼓於文樓之上教坊司設中和韶樂於奉天殿內東西設大樂於奉天門內東西俱北向至期錦衣衛陳鹵簿儀仗於丹陛及丹墀東西設明扇於殿內東西陳車輅步輦於奉天門丹墀中道北向金吾等衛列甲士軍仗於午門外奉天門外及丹墀東西旗手衛設金鼓於午門外列旗幟於奉天門外御馬監設仗馬錦衣衛設馴象於文武樓南東西相向欽天監設報時位於丹陛之東鼓初嚴百官具朝服齊班於午門外鼓次嚴引班官引百官并進表人員及四夷人等次第由左右掖門入詣丹墀序立欽天監雞唱官司晨一員於文樓下西向錦衣衛將軍六員於殿內之南北向將軍四員於丹陛四隅東西相向其餘侍衛將軍各分立於殿陛等處如儀鳴鞭四人於丹墀中道左右北向金吾等衛護衛官二十四員於丹陛之南六員於丹墀之北俱東西相向陳設方物鴻臚寺司賓署丞一員徹方物案鴻臚寺序班十六員於丹陛中道左右外贊鴻臚寺鳴贊等官十二員於丹陛及丹墀東西糾儀御史十二員於丹墀之東西殿前侍班錦衣衛千户六員光祿寺署官四員序班二員傳呼鳴鞭錦衣衛百户四員俱於殿中門外東西相向導表六科都給事中二員序班二員於表案左右掌領侍衛官三員於殿內東西相向錦衣衛正直指揮一員於簾右東向百户二員於簾下左右相向捲簾畢即趨出殿門外各預立以俟鼓三嚴執事禮部堂上官并內贊鳴贊一員陳設表案并舉案序班五員典儀鴻臚寺司儀署丞一員捧表禮部儀制司官四員展表六部都察院通政司大理寺堂上官二員宣表致詞并傳制等項鴻臚寺堂上官五員捧寶尚寶司官二員導駕六科給事中十員殿內侍班翰林院官四員中書官四員糾儀御史四員序班二員及各遣祭官俱詣華蓋殿外候上具衮冕升座鐘聲止入序立遣祭官以次復命訖各趨入丹墀班禮部堂上官跪奏方物并請上位看馬候得旨復位鴻臚寺卿跪奏執事官行禮贊五拜叩頭畢贊各供事鴻臚寺卿跪請升殿駕興導駕官前導尚寶官捧寶前行中和樂作奏聖安之曲上御奉天殿升座導駕官立於殿內柱下東西相向侍班翰林官立於東導駕官之後中書官立於西導駕官之後糾儀御史序班分立於侍班官之下尚寶官置寶於案分立於導駕官之上樂止鳴鞭報時雞唱訖外贊唱排班班齊鞠躬大樂作四拜興平身樂止內贊贊進表大樂作導表官導表案至殿東中門止序班舉案入至殿中退立於東西柱下樂止贊宣表目禮部堂上官并宣表目官詣殿中跪宣畢各叩頭退贊宣表展表官取表同宣表官詣殿中跪外贊贊跪衆官皆跪宣畢展表官分東西先退內外皆贊俯伏大樂作興平身樂止宣表官退序班舉案置殿東外贊贊跪衆官皆跪代致詞官跪於丹陛中道致詞云公侯駙馬伯文武百官某官臣某等詞與洪武間所定同賀訖外贊贊俯伏衆官皆俯伏樂作四拜興平身樂止傳制官詣御前跪奏傳制俯伏興由東門靠東出至丹陛之東西向立稱有制外贊贊跪衆官皆跪宣制制與洪武間所定同宣訖外贊贊俯伏大樂作興平身樂止贊搢笏鞠躬三舞蹈贊跪唱山呼百官拱手加額曰萬歲唱山呼曰萬歲唱再山呼曰萬萬歲贊出笏俯伏大樂作四拜興平身樂止鴻臚卿詣御前跪奏禮畢鳴鞭中和樂作奏定安之曲駕興尚寶官捧寶導駕官前導至華蓋殿樂止引班官引百官人等以次出序班徹方物案所司設黃幄於丹陛上陳王府及勳臣總兵官外夷所進馬匹於丹墀內禮部并鴻臚寺官立於丹墀東候上易便服御黃幄甲士行禮畢禮部官詣御道中跪奏御馬過奏畢復位候馬過詣御道中跪奏馬過畢駕還宫明世宗實録十六年三月戊戌南京禮部尚書崔韜言元旦冬至萬夀臣下慶賀皆行十二拜禮惟南京行八拜禮不宜獨簡下禮部議以大節在京有宣表致詞及傳制俱舞蹈山呼行十二拜禮而南京在外皆無是以南京每遇三大節先期進表俱舞蹈山呼行二拜禮遵送郊外至日止八拜此祖宗舊制非臣下敢自為隆殺詔仍舊明會典凡進賀表目親王各一通各處挂印總兵官各一通朝鮮國王一通南京禮部等衙門一通浙江等布政司按察司直𨽻府州等衙門各一通南京中軍等都督府一通中都留守司浙江等都司直𨽻衛所等衙門各一通春明夢餘録大朝畢上暫退至謹身殿更便服於殿外丹陛上設幄羣臣盛服侍班御馬監之馬雲錦成羣每一馬各有名牌壯士控之由東過西最為盛觀其制始於嘉靖中至後久不舉行崇禎壬申五年十一月初十日冬至郊祀十一日百官入賀朝畢復一閲視是日閲馬三百三十匹明世宗實録十八年正月庚午朔帝御奉天殿羣臣具公服致詞行八拜禮時帝母章聖皇太后之喪於十二月三十日服制二十七日滿禮部言檢孝貞皇太后故事制滿後素服御西角門視朝山陵畢後變服苐此次適遇正旦朝會祭享一應吉儀宜酌議今擬皇上正旦淺色袍黑冠帶御殿受朝疏入未下會帝問大學士夏言元旦元極殿拜天仍具祭服先期一日合變服否於是禮部更請正旦拜天受朝及先期一日時享宗廟前三日俱服青服帝謂內閣曰既曰以日易月雖山陵未就實非古人未葬百事皆輟之義定服后不必遷就有事於郊宜吉服作樂有事於廟著淺色服不作樂卿等其與宗伯翰林禮科議否即曰否於是羣臣請遵諭行報可初禮部三請正旦朝賀俱詔免及上制滿儀注內具正旦視朝一節又别具疏請帝仍於是日御殿視朝帝乃報曰履端歲首朝會之始但昨方除服梓宫在上卿等固以禮請且朕亦謂當行實事其於奉天門百官青衣本等帶行五拜三叩頭禮不必公服致詞鐘鼓鳴鞭俱輟之禮部復固請帝具翼善冠黃袍御殿百官公服致詞鳴鐘鼓鳴鞭奏堂下樂帝曰改歲更始王者奉順天道不可不重有謂弗宜非知道者既在除服外其如議行十九年正月甲午朔帝疾不御朝百官詣左順門疏起居報聞二十年正月戊午朔帝疾不御殿百官公服於奉天門外朝覲官四夷使於午門外行五拜禮文武大臣侍從官各表賀丙申帝拜天於元極殿出御奉天殿百官公服行八拜禮帝諭禮部元極之拜可移於九日取陽九之數庶猶躬奉愈於攝行尚書嚴嵩因言新正免賀臣子之心未安元極殿拜畢請具翼善冠黃袍出御殿行禮帝曰卿等言是新歲上下豈可不一接見乎明會典嘉靖二十一年令聖節正旦冬至俱赴朝天宫習儀凡正旦節自十二月二十八日起至正月二十日止百官俱吉服通政司不奏事冬至前三日後三日聖節前三日後三日俱吉服通政司亦不奏事凡朝賀班首致詞官例用勳臣有缺則禮部題請欽定王圻續通考二十二年正月丙午朔日有食之帝御朝免賀明世宗實録自是年以後終帝之世惟二十五年正旦一受朝賀其餘正旦冬至俱不御殿百官朝服於奉天門行五拜三叩頭禮歲以為常王圻續通考三十二年正月戊寅朔日有食之時陰雲不見頃之大雪百官以救護罷朝次日始朝服詣奉天門行禮表賀大政記穆宗隆慶元年正月丁巳朔免朝賀封奏如常儀通政司言舊例自正旦至二十日以節假免奏事封本兹值皇上御門聽政勵精萬幾之始請封奏如常從之丁卯賜百官上元節假十日諸司仍奏事自是歲以為常神宗實録萬厯四年十一月甲辰定京營官大朝班次是時從總督戎政楊炳之請令京營參遊佐擊坐營等官遇聖節冬至元旦俱於副將後隨班朝賀中都山東河南三都司各領班都司隨佐擊後右明正旦朝賀五禮通考卷一百三十九
