body:
  text: 五禮通考卷四十七刑部尚書秦蕙田撰吉禮四十七四望山川史記封禪書昔三代之君皆在河洛之間漢書注師古曰謂夏都安邑殷都朝歌周都洛陽故嵩髙為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦軼興軼衰名山大川或在諸侯或在天子其禮損益世殊不可勝記師古曰代代殊異故不可盡記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也于是自殽以東索隱曰殽即崤山杜預云崤在𢎞農澠池縣西南即今之二崤山是也亦音豪名山五大川祠二曰太室太室嵩髙也恆山泰山會稽湘山索隱曰地里志湘山在長沙水曰濟曰淮索隱曰風俗通云濟廟在臨邑淮廟在平氏也春以脯酒為歲祠因泮凍服虔曰解凍秋涸凍漢書注師古曰涸讀與沍同沍凝也音下故反春則解之秋則凝之春秋左氏傳曰固隂沍寒禮記月令曰孟冬行春令則凍閉不密冬賽禱祠索隱曰賽音先代反謂報神福也其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山者襄山也漢書注師古曰説者云薄山在河東一曰在潼關北十餘里而此志云自華以西者則今閿鄉之南山連延西山並得華山之名嶽山岐山吳山鴻冢瀆山瀆山蜀之岷山也漢書注師古曰周禮職方氏雍州其山曰嶽爾雅亦云河西曰嶽説者咸云嶽即吳嶽也今志有嶽又有吳山則吳嶽非一山之名但未詳嶽之所在耳徐廣云嶽山在武功據地理志武功但有垂山無嶽山也岐山即在今之岐山縣其山兩岐俗呼為箭括嶺吳山在今隴州吳山縣鴻冡釋在下岷山在湔氐道水曰河祠臨晉漢書注師古曰即今之同州朝邑縣界沔祠漢中漢書注師古曰沔漢水之上名也漢中今梁州是也沔音彌善反湫淵祠朝那蘇林曰秋淵在安定朝那縣方四十里停水不流冬夏不增減不生草木湫音將蓼反漢書注師古曰此水今在涇州界清徹可愛不容穢濁或喧汚輒興雲雨土俗亢旱每于此求之相傳云龍之所居也而天下山川隈曲亦往往有之湫音子由反江水祠蜀正義曰括地志云江瀆祠在益州成都縣南八里秦并天下江水祠蜀亦春秋泮涸禱賽如東方名山川而牲牛犢牢具圭幣各異而四大冢鴻岐吳嶽皆有嘗禾孟康曰以新榖祭陳寶節來祠服虔曰陳寶神應節來也其河加有嘗醪此皆在雍州之域近天子之都故加車一乘駵駒四灞滻長水灃潦涇渭皆非大川以近咸陽盡得此山川祠而無諸加韋昭曰無車駵之屬汧洛二淵鳴澤蒲山嶽􅬂山之屬為小山川亦皆歲禱賽泮涸祠禮不必同漢書郊祀志秦始皇即帝位三年東遊海上行禮祠名山川及八神諸此祠皆太祝常主以嵗時奉祠之至如它名山川諸神及八神之屬上過則祠去則已郡縣逺方祠者民各自奉祠不領于天子之祝官祝官有祕祝即有災祥輒祝祠移過于下史記封禪書二世元年東巡碣石並海南歷太山至會稽皆禮祀之右秦祀山川漢書髙祖本紀二年夏六月令祠官祀天地四方上帝山川以時祀之郊祀志髙祖初悉召故秦祀官復置太祝太宰如其故儀禮下詔曰吾甚重祠而敬祭今山川之神當祠者各以時禮祠之如故後四歲天下已定置祠祀官女巫令河巫祠河于臨晉而南山巫祠南山秦中文帝即位十三年下詔曰祕祝之官移過于下朕甚弗取其除之始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以歲時致禮如故明年廣增諸祀壇場圭幣河湫漢水王加各二文帝本紀十五年夏四月修名山大川嘗祀而絶者有司以歲時致禮武帝本紀建元元年夏五月詔曰河海潤千里其令祠官修山川之祠為歲事曲加禮郊祀志武帝元狩元年濟北王上書獻泰山及其旁邑天子以它縣償之常山王有罪􅞳師古曰􅞳與遷同天子封其弟真定以續先王祀而以常山為郡然後五嶽皆在天子之邦文獻通考馬氏曰案古者天子祭四望五嶽四瀆其大者也然王畿不過千里千里之外則皆諸侯之國所謂嶽瀆豈必在畿內而後祭之如舜都蒲坂而一歲巡五嶽俱有望秩之禮是也始皇雖併六國而禮典廢墜所祠祭山川皆因其遊觀所至處與封禪求仙則及之而其領之祠官以嵗時致祭且雜以淫祀者大率多秦中山川也至漢則名山大川之在諸侯國者不領于天子之祠官必俟齊淮南常山之國廢及濟北王獻地而後舉五嶽之祭俱非古義也武帝本紀元封元年春正月行幸緱氏詔曰朕用事華山至于中嶽親登嵩髙御史乘屬在廟旁吏卒咸聞呼萬歲者三登禮罔不答其令祠官加增太室祠禁無伐其草木以山下戶三百為之奉邑名曰崇髙獨給祠復亡所與郊祀志元封元年春三月東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言乃令祠官加增太室祠武帝本紀元封五年冬行南巡狩至于盛唐望祀虞舜于九嶷登灊天柱山自潯陽浮江薄樅陽而出遂北至琅琊並海所過禮祠其名山大川郊祀志五年上巡南郡至江陵而東登禮灊之天柱山號曰南嶽師古曰灊廬江縣天柱山在焉武帝以天柱山為南嶽浮江自潯陽出樅陽過彭蠡禮其名山大川武帝本紀天漢三年春三月幸北地祠常山瘞玄玉郊祀志自封太山後十三歲而周遍于五嶽四瀆矣宣帝神爵元年制詔太常夫江海百川之大者也今闕焉無祠其令祠官以禮為歲事師古曰言每嵗常祠之以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮東嶽泰山于博中嶽太室于嵩髙南嶽灊山于灊西嶽華山于華隂北嶽常山于上曲陽師古曰上曲陽常山郡之縣也河于臨晉師古曰馮翊之縣也江于江都淮于平氏師古曰南陽之縣也濟于臨邑界中師古曰東郡之縣也皆使者持節侍祠惟泰山與河歲五祠江水四餘皆一禱而三祠云哀帝建平三年莽改祭禮大合樂祀四望祭山川四望蓋謂日月星海也三光高而不可得親海廣大無限界故其樂同於山川地理也風俗通五嶽東方泰山詩云泰山巖巖魯邦所瞻尊曰岱宗岱者長也萬物之始隂陽交代雲觸石而出膚寸而合不崇朝而遍雨天下其唯泰山乎故為五嶽之長岱宗廟在博縣西北三十里山虞長守之十月日合凍臘月日涸凍正月日解凍皆太守自侍祠若有穢疾代行事法七十萬五千三牲燔柴上福脯三十朐縣次傳送京師四嶽皆王同禮南方衡山一名霍霍者萬物盛長垂枝布葉霍然而大廟在廬江灊縣西方華山華者華也萬物滋然變華于西方也廟在𢎞農華隂縣北方恆山恆者常也萬物伏藏于北方有常也廟在中山上曲陽縣中央曰嵩髙嵩者高也詩云嵩髙維嶽峻極于天廟在潁川陽城縣四瀆河出燉煌塞外崑崙山發源注海易河圖聖人則之禹貢九河既道詩曰河水洋洋廟在河南滎陽縣河隄謁者掌四瀆禮祠與五嶽同江出蜀郡湔流互徼外岫山入海詩云江漢陶陶禹貢江漢朝宗于海廟在廣陵江都縣淮出南陽平氏桐柏大復山東南入海禹貢海岱及淮淮沂其又詩云淮水湯湯廟在平氏縣濟出常山房子贊皇山東入海禹貢浮于汶逹于濟廟在東郡臨邑縣後漢書明帝本紀永平六年冬十二月幸陽城遣使者祀中嶽章帝本紀元和二年春二月詔曰今山川鬼神應典禮者尚未咸秩其議增修羣祀以祈豐年丙辰東巡守辛未幸太山柴告岱宗有黃鶴三十從西南來經祀壇上東北過于宫屋翺翔升降進幸奉髙三年春正月丙申北巡守二月戊辰進幸中山遣使者祀北嶽出長城三月己卯進幸趙庚辰祀房山于靈壽安帝本紀延光三年春二月辛卯幸太山柴告岱宗祭祀志延光三年上東巡守至太山柴祭及祀汶上明堂如元和三年故事右兩漢祀山川三國魏志文帝本紀黃初二年六月初祀五嶽四瀆咸秩羣祀晉書禮志二年禮五嶽四瀆瘞沈圭璧六年七月帝以舟軍入淮九月壬戌遣使者沈璧于淮三國魏志明帝本紀太和四年八月辛巳行東巡遣使者以特牛祠中嶽青龍元年夏五月詔諸郡國山川不在祀典者勿祠陳留王本紀咸熙元年春正月行幸長安使使者以璧幣祀華山右三國魏祀山川晉書禮志太始元年十二月詔曰昔聖帝明王修五嶽四瀆名山川澤各有定制所以報隂陽之功故也然以道蒞天下者其鬼不神其神不傷人故祝史薦而無愧辭是以其人敬慎幽冥而淫祀不作末世信道不篤僣禮瀆神縱欲祈請曽不敬而逺之徒偷以求幸祅妄相煽舍正為邪故魏朝疾之其案舊禮具為之制使功著于人者必有其報而祅淫之鬼不亂其間隋書禮儀志建武元年令郡國有五嶽者置宰祝二人及有四瀆若海應祠者皆以孟春仲冬祠之晉書明帝本紀太寧三年七月詔曰自中興以來五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處禮志穆帝升平中何琦備論五嶽祠曰唐虞之制天子五載一巡狩順時之方柴燎五嶽望于山川遍于羣神故曰因名山升中于天所以昭告神祗饗報功德是以災厲不作而風雨寒暑以時降及三代年數雖殊而其禮不易五嶽視三公四瀆視諸侯著在經記所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大川之祠而正立之祀可以闕哉自永嘉之亂神州傾覆兹事替矣唯灊音潛之天柱在王略之內也舊臺選百户吏卒以奉其職中興之際未有官守廬江郡常遣太史兼假四時禱賽春釋寒而冬請氷咸和迄今又復墮替計今非典之祠可謂非一考其正名則淫昏之鬼推其糜費則百姓之蠧而山川大神更為簡闕良由頃國家多難日不暇給草建廢滯事有未遑今元憝徒對反已殲宜修舊典嶽瀆之域風教所被而神明禋祀未之或甄崇明前典將候皇輿北旋稽古憲章大釐制度爼豆牲牢祝嘏大辭舊章靡記可令禮官作式歸諸誠簡以逹明德馨香如斯而已其諸妖孽可粗依法令先去其甚俾邪正不黷時不見省右晉祀山川宋書世祖本紀大明七年春二月甲寅車駕巡南豫南兗二州丙辰詔曰江漢楚望咸秩周禋禮九嶷于盛唐祀蓬萊于渤海皆前載流訓列聖遺式霍山是曰南嶽實維國鎮韞靈呈瑞肇光宋道朕駐蹕于野有事岐陽瞻睇風雲徘徊以想可遣使奠祭禮志大明七年六月丙辰有司奏詔奠祭霍山未審應奉使何官用何牲饌進奠之日又用何器殿中郎丘景先議修祀川嶽道光列代差秩圭璋義昭聨册但業曠中葉儀漏典文尋姬典事繼宗伯漢載持節侍祠血祭霾沈經垂明範酒脯牢具悉有詳例又名山著圭幣之異大冡有嘗禾之加山海祠霍山以太牢告玉此凖酌記傳其可言者也今皇風緬畼輝祀通嶽愚謂宜使以太常持節牲以太牢之具羞用酒脯時榖禮以赤璋纁幣又鬯人之職凡山川四方用脤則盛酒當以蠡杯其餘器用無所取説案郊望山瀆以質表誠器用陶匏藉以茅席近可依凖山川以兆宜為壇域參議景先議為允令以兼太常持節奉使牲用太牢加以璋幣器用陶匏時不復用脤宜同郊祀以爵獻凡肴饌種數一依社祭為允詔可右宋祀山川隋書禮儀志梁令郡國有五嶽者置宰祀三人及有四瀆若海應祠者皆以孟春仲冬祠之右梁祀山川北魏書禮志泰常三年立五嶽四瀆廟于桑乾水之隂春秋遣有司祭有牲及幣四瀆唯以牲牢凖古望秩云其餘山川及海若諸神在州郡者合三百二十四所每歲十月遣祀官詣州鎮遍祀有水旱災厲則牧守各隨其界內祈謁其祭皆用牲王畿內諸山川皆列祠次祭若有水旱則禱之太宗本紀泰常四年秋八月辛未東巡遣使祭恆嶽禮志四年八月幸代至雁門關望祀恆嶽八年正月南巡恆嶽祀以太牢幸洛陽遣使以太牢祀嵩髙華嶽還登太行五月至自洛陽諸所過山川羣祀之世祖本紀太延元年六月甲午詔守宰祭界內名山大川十二月癸卯遣使者以太牢祀北嶽禮志太延元年立廟于恆嶽華嶽嵩嶽上各置侍祀幾十人歲時祈禱水旱其春秋泮涸遣官率刺史祭以牲牢有玉幣太平真君十一年十一月世祖南征徑恆山祀以太牢浮河濟祀以少牢過岱宗祀以太牢文成皇帝即位三年正月遣有司詣華嶽修廟立碑數十人在山上聞虛中若音聲聲中稱萬歲云和平元年正月帝東巡歷橋山祀黃帝幸遼西望祀醫無閭山遂緣海西南幸冀州北至中山過恆嶽禮其神而返二年帝南巡過石門遣使者用玉璧牲牢禮恆嶽皇興二年以青徐既平遣中書令兼太常高允奉玉幣祀于東嶽髙祖本紀太和四年二月癸巳詔曰朕承乾緒君臨海內夙興昧旦如履薄氷今東作方興庶類萌動品物資生膏雨不降歲一不登百姓飢乏朕甚懼焉其敕天下祀山川羣神及能興雲雨者修飾祀堂薦以牲璧十九年春正月己亥車駕濟淮夏四月己未行幸瑕丘遣使以太牢祀岱嶽禮志太和十九年帝南征正月車駕濟淮命太常致祭又詔祀岱嶽右北魏祀山川北齊書宣帝本紀天保元年六月己亥詔分遣使人致祭于五嶽四瀆右北齊祀山川文獻通考後周大將出征遣太祝以羊一祭所過名山大川右後周祀山川隋書禮儀志開皇十四年閏十月詔東鎮沂山南鎮會稽山北鎮醫無閭山山逺則遙祀冀州鎮霍山並就山立祠東海于會稽縣界南海于南海鎮南並近海立祠及四瀆吳山並取側近巫一人主知灑掃並令多蒔松柏其霍山雩祀日遣使就焉大學衍義補丘氏濬曰鄭玄注周禮四望有五嶽四鎮四瀆後世祀典止有五嶽四瀆而無四鎮至是始祀之而又以冀州霍山為中鎮是為五鎮隋書髙祖本紀開皇十五年春正月壬戌車駕次齊州親問疾苦丙寅旅三符山庚午上以歲旱祀泰山以謝愆咎大赦天下三月己未至自東巡狩望祭五嶽海瀆六月辛丑詔名山大川未在祀典者悉祀之禮儀志十六年正月又詔北鎮于營州龍山立祠東鎮晉州霍山鎮若修造並準西鎮吳山造神廟煬帝本紀大業四年八月辛酉親祀恆嶽河北道郡守畢集禮儀志大業中煬帝因幸晉陽遂祭恆嶽其禮頗採高祖拜岱宗儀增置二壇命道士女官數十人於壝中設醮十年幸東都過祀華嶽築場于廟側事乃不經蓋非有司之定禮也隋制行幸所過名山大川則有司致祭嶽瀆以太牢山川以少牢右隋祀山川唐書禮樂志唐制嶽鎮海瀆祭于其廟無廟則為之壇坎廣一丈四向為陛者海瀆之壇也嶽鎮海瀆以山尊實醍齊山林川澤以蜃尊實沈齊皆二嶽鎮海瀆以兩圭有邸幣如其方色嶽鎮海瀆山林川澤籩豆各二簋簠爼各一丘陵墳衍原隰籩豆各一簋簠爼各一四時祭五嶽四鎮四海四瀆為籩豆十簋二簠二爼三犢皆少牢髙祖本紀武德二年十月甲子祠華山三年四月丙申祠華山册府元龜武德七年六月幸仁智宫以少牢祭宫所山川文獻通考唐武德貞觀之制五嶽四鎮四海年别一祭各以五郊迎氣日祭之東嶽岱山祭于兗州東鎮沂山祭于沂州東海于萊州東瀆大淮于唐州南嶽衡山于衡州南鎮會稽山于越州南海于廣州南瀆大江于益州中嶽嵩山于洛州西嶽華山于華州西鎮吳山于隴州西海及西瀆大河于同州北嶽恆山于定州北鎮醫無閭山于營州北海及北瀆大濟于洺州其牲皆用太牢禮官以當界都督刺史充册府元龜貞觀十九年征遼三月丁丑幸定州經北嶽帝自為文祭之唐書武后本紀中宗嗣聖五年即武后垂拱四年七月丁巳改洛水為永昌洛水封其神為顯聖侯加特進禁漁釣改嵩山為神嶽封其神為天中王太師使持節大都督蕙田案山川之神加以人爵封號蓋始于此非禮之端肇之者則天也文獻通考武后萬歲通天元年尊神嶽天中王為神嶽天中皇帝神龍元年復為天中王先天二年封華嶽為金天王蕙田案古者四望山川之祭壇而不屋易以廟號非古也况復封之為王為帝尊號頻加頻改不益惑之甚乎舊唐書玄宗本紀開元四年二月以關中旱遣使祈雨于驪山應時澍雨以少牢致祭仍禁樵採册府元龜開元五年十二月戊寅詔曰國之大事在祀神之所歆惟敬潔誠而齋精意以享則可臻介福致休祥深慮有司未副厥旨所緣嶽瀆等祭宜令禮官博士斟酌古今務加虔肅合于典禮即詳定奏聞八年三月敕頃嵗未登水旱不節今春事方起農桑是憂宜令太常長官分祭華嶽溫湯十一年四月庚申敕曰河東冀方其鎮惟霍神為天吏山有嶽靈在昔皇業初興肇蒙嘉祉今者省方旋軫重獲休徵同受三神之貺獨忘百邑之禮其霍山宜崇飭祠廟秩視諸侯蠲山下十戶以為灑掃晉州刺史春秋致祀十二年十一月庚午幸東都敕有司所經名山大川精意致祭以酒脯時果用代牲牢丙寅至華州命刺史徐知仁與信安王禕勒石于華嶽祠南之通衢帝親製其文文獻通考十三年封泰山神為天齊王禮秩加三公一等册府元龜開元十六年六月丁亥詔曰爰自首春有愆時雨朕憂勤黎庶精禱靈祗遂蒙九元垂福百神效祉膏澤頻降嘉年繁育眷彼山川能興雲雨報功享德祀典存焉諸州所管名山大川宜令當處長官設祭務盡誠敬以昭典禮庚寅詔曰宗社垂祐隂陽順成甘澤應時庶物繁育祗奉靈慶寅畏載深宜令中書門下肅事昭報仍令有司奏聞舊唐書玄宗本紀開元十八年百僚及華州父老纍表請上尊號并封西嶽不允册府元龜開元十八年正月丁巳親迎氣于東郊禮畢詔凡海內五嶽四瀆諸鎮名山大川及靈迹各令郡縣逐處設祭開元二十年四月戊申命有司擇日就祭五嶽四瀆十一月庚申祀后土于脽上命有司陳禮帝質明而享是日大赦制五嶽四瀆名山大川各令致祭務竭誠敬唐開元禮祭五嶽四鎮四海四瀆儀四祭每座籩豆各十簠簋各二爼二諸嶽鎮海瀆每年一祭各以五郊迎氣日祭之設祭州界已具歷代祀山川篇前祭五日諸祭官各散齋三日致齋二日如别儀前一日嶽令瀆令清掃內外又為瘞塪于壇壬地方深取足容物海瀆則塪內為壇髙丈四尺皆為陛贊禮者設初獻位于壇東南亞獻終獻于初獻南少退俱西向北上設掌事者位于終獻東南重行西靣以北為上設贊唱等諸位于終獻西南西向北上設獻官等望瘞位于瘞坎之東北西向祭海瀆無望瘞位設祭官以下門外位于南門之外道東重行西向以北為上祭器之數樽六籩十豆十簋二簠二俎三嶽瀆令帥其屬詣壇東陛升設樽于壇上東南隅北向西上尊皆加勺冪有坫以置爵設玉篚于樽坫之所設洗于南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍洗篚者各位于樽罍篚之後祭日未明烹牲于厨其牲各隨方色齋郎以豆先取毛血置于饌所夙興掌饌者實祭器牲體牛羊豕皆載右胖前腳三節節一假肩臂臑皆載之後腳三節節一假去下節載上肢胳二節又取正脊脡脊橫脊短脅正脅代脅各二骨以並餘皆不設簋實黍稷簠實稻粱籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醢醢菁葅鹿醢芹葅兔醢筍葅魚醢脾菜葅豚胉若土無者各以其類充之凡祭官各服其服三品毳冕四品繡冕五品玄冕六品以下爵辨若有二品以下各依令嶽令瀆令帥其屬入詣壇東陛升設嶽神瀆神座于壇上近北靣南向席以莞又實樽罍及玉凡樽一實醴齊一實盎齊一實清酒其玄酒各實于上樽祭神之玉雨圭有邸祝版置于坫嶽令瀆令又以幣置于篚齋郎以豆血皆設于饌所其幣長丈八尺各隨方色贊唱者先入就位祝與執樽罍篚者入當壇南重行北靣以西為上立定贊唱者曰再拜祝以下俱再拜執樽者升自東陛立于樽所執罍篚者各就位祝詣壇東陛升行掃除于上降行掃除于下訖瀆則掃除塪外訖各就位質明贊禮者引祭官以下俱就門外位立定一刻須贊禮者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位贊唱者曰再拜在位者皆再拜祝跪取玉幣于篚興立于樽所凡取物者皆跪俯伏而取以興奠物奠訖俯伏而後興掌饌者帥齋郎奉饌陳于東門之外贊禮者引初獻詣壇升自南陛進神座前北向立祝以玉幣東向進初獻受玉幣還樽所贊禮者引初獻進北向跪奠于神座興少退北向再拜贊禮者引初獻降還本位掌饌者引饌入升自南陛祝迎引于壇上設于神座前掌饌者帥齋郎降自東階復位祝還樽所贊禮者引初獻詣罍洗盥手洗爵升自南陛詣酒樽所執樽者舉冪初獻酌醴齊贊禮者引初獻進詣神座前北向跪奠爵興少退北向立祝持版進于神座之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子某謹遣某官某敢昭告于東嶽岱宗唯神贊飬萬品作鎮一方式因春始南嶽云夏始中嶽云季夏西嶽云秋始北嶽云冬始謹以玉幣犧齊粢盛庶品朝薦于東嶽岱宗尚享東瀆大淮云惟神源流深泌潛潤溥洽阜成百榖流滌三川青春伊始用遵典秩南瀆大江云惟神總合大川朝宗巨海功昭潤化德表靈長敬用夏首修其常典西瀆大河云惟神上通靈漢光啓圖書分導九枝旁潤千里素秋戒序用率典常北瀆大濟云惟神泉源清潔浸彼遐逺播通四氣作紀一方玄冬肇節聿修典制訖興初獻再拜祝進奠版于神座還樽所祝以爵酌清酒進初獻之右西向立初獻再拜受爵跪祭酒啐酒奠爵祝帥齋郎以爼進減神座前胙肉前腳第二節共置一爼上以授初獻初獻受以授齋郎初獻跪取爵遂飲卒爵祝進受爵復于坫初獻興再拜贊禮者引初獻降復位于初獻飲福酒贊禮者引亞獻詣罍洗盥手洗爵升自東陛詣樽所執樽者舉冪亞獻酌盎齊贊禮者引亞獻詣神座前北靣跪奠爵興少退北向再拜祝以爵酌清酒進于亞獻之右西向立亞獻再拜受爵跪祭酒遂飲卒爵祝受虛爵復于坫亞獻興再拜贊者引亞獻降復位初亞獻將畢贊禮者引終獻盥洗升獻飲福如亞獻之儀訖贊禮者引終獻降復位祝進神座前徹豆還樽所贊唱者曰再拜非飲福受胙者皆再拜贊禮者進初獻之左白請就望瘞位西向立于獻官將拜嶽令進神座跪取幣齋郎以爼載牲體黍稷飯詣瘞塪以饌物置于塪祭海瀆獻官拜訖瀆令及齋郎以幣血沈于瀆瀆令退就位東西廂各二人置土半塪贊者進初獻之左白禮畢遂引初獻以下立祝與執樽罍篚冪者俱復執事位立定贊唱者曰再拜訖遂出祝版燔于齋所舊唐書玄宗本紀開元二十二年春正月癸卯朔制嶽瀆海鎮用牲牢餘並以酒脯充奠二月壬寅秦州地震命尚書左丞相蕭嵩往祭山川册府元龜開元二十二年六月詔曰春來多雨歲事有妨朕自誠祈靈祇降福以時開霽迄用登成永惟休徵敢忘昭報宜令高品官祭五嶽四瀆其天下名山大川各令所在長官致祭務盡誠潔用申精意二十三年正月乙亥詔五嶽四瀆名山大川並令所在長官以禮致祭二十五年十月戊申敕曰時和年豐神所福也精意備物祭之義也朕每為蒼生嘗祈稔嵗微誠有感丕應乃彰今宗社降靈神祗效祉三時不害百榖用成使京坻遍于天下和平之氣既無逺而不通禋祀之典亦有期而必報宜令兵部尚書兼中書令晉國公李林甫工部尚書同中書門下三品豳國公牛仙客即分祭郊廟社稷尚書左丞相裴耀卿祭中嶽禮部尚書杜暹祭東嶽御史大夫李適之祭西嶽太子賔客王丘祭北嶽國子祭酒張説祭南嶽其四瀆四海四鎮及諸名山靈迹等各委所由州長官祭仍令所司即擇日開奏務修蠲潔之禮以致精明之德冀申誠懇如朕意焉文獻通考開元時天台道士司馬承禎言今五嶽神祠是山林之神也非正真之神也五嶽皆有洞府有上清真人降任其職山川風雨隂陽氣序是所理焉冠冕服章佐從神仙皆有名數請别立齋祠之所上竒其説因敕五嶽各置真君祠一所蕙田案以五嶽之神為真君始此方士之謬也册府元龜天寶元年正月丁未改元制曰前王重典在乎祭祀况屬惟新事宜昭告五嶽四瀆名山大川諸靈迹並令所繇州縣致祭是日甲寅得靈符于尹喜臺西百官請崇徽號壬申詔曰神仙所緘造化同固爰初有待經韞櫝而多時潛應改元若符契之相合景福修介祗畏良深而羣官宗室抗疏于外元良諸子屢請于中逮夫緇黃兼彼耆老以至誠懇不已前後相仍願加天寶之名用益開元之號顧惟菲薄何以當之然則元貺在乎欽承人心難以稱拒順天從衆義叶至公敬依所請實用多愧斯蓋上元厚載爰自百神孚佑效靈通于睿祖幽贊惟新之歷克彰永代之祥宜遵祀典式陳昭報宜差公卿擇日祭五嶽四瀆其名山大川各令所在長官備禮陳祭務申誠敬副朕意焉十二月乙亥詔曰歲之豐儉雖繫于常數天之感應實在于精誠頃者案以隂陽求諸推步至于今歲不合有年朕所以齋心妙門懇其元德靈徵不逺丕應乃彰果獲西成頗為善熟蓋至道儲祉惠于蒸人亦羣神叶贊錫以昭報詩不云乎無德不報宜令光祿卿嗣鄭王希言祭東嶽太子詹事嗣許王瓘祭中嶽太常卿韋縚祭北嶽所司即擇日録奏其四瀆及諸名山大川或逺近不同各委所繇郡長官便擇吉日致祭務崇豐潔以稱朕懷三載四月丙辰遣使分祀嶽瀆詔曰務農勸穡雖用天道人和歲稔實賴休徵頃者春夏之交稍愆時雨收穫之際復屬秋霖慮害農功每祈孚佑遂得百神降福羣望效靈既不為災仍多美熟幽贊之德普洽于生人昭報之儀式遵于祀典宜令太子詹事嗣許王瓘祭東嶽光祿卿嗣鄭王希言祭中嶽宗正卿濮陽郡王徹祭西嶽少府監李知柔祭南嶽衛尉卿嗣吳王祗祭淮瀆光祿少卿彭果祭河瀆所司擇日録奏其名山大川有路近處亦合便祭僻逺處委所繇長官備禮致祭務陳蠲潔以逹精誠十一月壬申敕曰敬惟明神普存于祀典咸秩羣望式重於邦畿頃者分命使臣致誠嶽瀆山川便近亦已有處分其關輔之內屢有陳祈王者所都禮亦異數應關內名山大川各委所繇郡縣長官稍優于常禮致祭京兆府界宜委蕭照同與少尹分祭倍崇精潔以副誠祈舊唐書玄宗本紀天寶五載春正月封中嶽為中天王南嶽為司天王北嶽為安天王天下山水名稱或同義且不經多因于里諺宜令所司各據圖籍改定册府元龜天寶五載正月乙亥詔曰五方定位嶽鎮總其靈萬物阜成雲雨施其潤上帝攸敘寰區是仰且岱宗西華先已封崇其中嶽等三方典禮所尊未齊名秩永言光被用叶靈心其中嶽神宜封為中天王南嶽神為司天王北嶽神為安天王應須告祭仍令所司擇日聞奏舊唐書玄宗本紀天寶六載正月詔五嶽既已封王四瀆當升公位封河瀆為靈源公濟瀆為清源公江瀆為廣源公淮瀆為長源公蕙田案四瀆封公爵始此册府元龜天寶六載正月戊子詔曰四瀆五嶽雖差秩序興雲播潤蓋同利物崇號所及錫命宜均其五嶽既已封王四瀆當升公位遞從加等以答靈心其河瀆宜封靈源公濟瀆封清源公江瀆封廣源公淮瀆封長源公仍令所司擇日差使告祭併五嶽及名山大川并令所在長官致祭舊唐書玄宗本紀天寶七載十二月改會昌山為昭應山封山神為元德公仍立祠宇册府元龜天寶八載六月詔曰九州之鎮實著禮經三代之典必崇望秩事既屬于報功義有符于錫命其九州鎮山除入諸嶽外宜並封公仍各置祠守者量更增修儲慶發祥當申昭報宜令所在長官各陳祭祀名山大川亦量事致祭九月命宗正卿褒郡信王璆祭西嶽太僕少卿兼單于安北副大都護張齊丘祭北海蜀郡長史鮮于仲通祭江瀆太子詹事李旭祭北嶽尚書右丞李通遷祭河瀆詔白朕肅恭明祀祈福上元冀敷佑于黎蒸將昭報于靈應頃蠻夷欵附萬里廓清稼穡豐穰羣方樂業豈惟菲德以致元和實賴神休永綏景貺思崇望秩用展虔誠宜令宗正卿褒信郡王璆等即分往五嶽四瀆及四海致祭所經道次者名山大川亦便致祭務令精意以稱朕懷蕙田案九鎮封公號始此天寶九載四月詔曰五材並用時表上靈八水分流實稱美利京師奧壤秦甸王畿灞滻通于涇渭潦潏匯于灃滈蓄泄雷雨滋育稼穡雖惠澤已及于蒸民而虔誠猶闕于祀典聿崇精享庶達明神其涇渭灞滻等八水宜令左庶子韋述取今月二十九日一時備禮致祭務陳蠲潔稱朕意焉舊唐書玄宗本紀天寶十載正月癸丑分遣嗣吳王祗等十三人祭嶽鎮海瀆册府元龜天寶十載正月甲子制曰嶽瀆山川藴靈育粹雲雨之澤利及生人春秋之義存乎祀典况正其運序式遵咸秩其五嶽四瀆及諸鎮山宜令專使分往致祭其名山大川及諸靈迹先有廟者各令郡長官逐便致祭是月丁未封東海為廣德王南海為廣利王西海為廣潤王北海為廣澤王二月己亥分遣嗣吳王祗祭東嶽齊天王嗣魯王宇祭南嶽司天王祕書監崔秀祭中嶽中天王國子祭酒班景倩祭西嶽金天王宗正少卿李成裕祭北嶽安天王衛尉少卿李浣祭江瀆廣源公京兆少尹韋嘗祭河瀆靈源公太子左諭德栁偡祭淮瀆長源公河南少尹豆盧回祭濟瀆清源公嗣道王錬祭沂山東安公江東道採訪使吳郡太守趙居貞祭會稽山永興公大理少卿李禎祭吳嶽山成德公潁王府長史甘守默祭霍山應靈公范陽郡司馬畢悅祭醫巫閭山廣寧公並取三月十七日庚子一時致祭申命太子中允李隨祭東海儀王府長史張九章祭南海太子中允栁奕祭西海太子洗馬李隨榮祭北海加王位且行册禮也四月辛巳制曰王者臨馭萬國莫不尊五嶽至于迎氣致祭必在辨方正位朕丕冒眷命肅事嚴禮庶有合于乾坤用永垂于典實加以厚德載物莫先于土推誠導氣必叶于時在厯數之有徵諒國家之所感含𢎞廣大利用豐功隨王雖布于四方歸本且闕于中位朕式明統緒用答元符爰創新儀再修墜典頃者每祝黃帝乃就南郊義實有乖禮亦非便稽諸體式理固不然宜于皇城內西南就坤地改置黃帝壇朕當親祠以昭誠敬仍令中書門下與禮官更審參詳奏聞文獻通考天寶七載八載十載皆以歲豐遣官分祭嶽瀆册府元龜天寶十二載二月制五嶽四瀆及名山大川并靈迹之處各委郡縣長官致祭其祠宇頽毁者量事修葺十四載八月辛卯制曰書云咸秩羣望詩曰懷柔百神永惟明徵豈忘昭報今秋稼穡頗勝常年實賴靈祗福臻稔歲其五嶽四瀆所在山川及得道升仙靈迹之處宜委郡縣長官至秋後各令醮祭務崇嚴潔式展誠享是月癸未詔曰朕永念蒸人祈榖上帝而隂陽式序風雨不愆今獲稼穡阜成允賴神明幽贊也頃者虔心精享己申昭告其五嶽四瀆及天下諸郡山川近令秋後展祭收穫既就農畝事隙報功咸秩抑推其時宜令所在郡縣長官即擇良辰以崇明祀舊唐書禮儀志至德二年春帝在鳯翔改汧陽郡吳山為西嶽增秩以祈靈助册府元龜上元元年閏四月己卯御明鳯門大赦改元詔曰自古明王聖帝名山大川並委州縣長吏擇日致祭文獻通考肅宗上元二年改封華山為太山華隂縣為太隂縣册府元龜廣德二年二月詔五嶽四瀆名山大川宜令所管致祭三月丙午敕曰三代之初皆有神降監其德也天實啓之恭惟王業之初師及霍邑堅城未下大將阻兵連雨積旬糧儲不給有白衣父老忽詣軍門稱霍山之神謁大唐皇帝云東南取路八日雨止助帝破敵盡如其言巖巖霍山九州之鎮興雲致雨功已洽于生人親道輔德力更宣于王室朕纘承大寶膺受鴻休肸蠁之間誠明可接永言幽贊兹謂有孚惟天命神據我斯意宜令禮儀使判官司封員外郎薛頎即往霍山致祭正詞以薦稱朕意焉永泰元年正月癸巳改元制曰書稱咸秩詩美懷柔仰惟衆靈念兹多祐其五嶽四瀆名山大川宜令所管牧宰精誠致祭大厯元年十一月甲子日長至御含元殿大赦改元制曰五嶽四瀆名山大川祀典攸存神理昭著宜以禮致祭五年六月詔曰五嶽四瀆名山大川神明所居風雨是主宜委中書門下分使致祭以達精誠唐書歸崇敬傳大歷八年遣祀衡山未至而哥舒晃亂廣州監察御史憚之請望祀而還崇敬正色曰君命豈有畏耶遂往文獻通考德宗貞元二年詔太常卿裴郁等十人各就方鎮祭嶽瀆等舊禮皆因郊祀望而祭之天寶中始有遣使祈福之祠非禮之正也册府元龜貞元四年五月初復御署祭嶽鎮海瀆祝版文獻通考太常卿董晉奏五嶽四瀆伏準開元禮每年各以五郊迎氣日祭之其祝版並合御署自上元元年中祠小祠一切權停自後因循不請御署其祝版欲至饗祭日所司準程先進取御署附驛祭遣敕旨宜依仍所司每至時先奏附中使送往册府元龜順宗以貞元二十一年正月即位四月册皇太子詔五嶽四瀆名山大川委所在長吏量加祭祀憲宗元和七年十月庚戌制册皇太子五嶽四瀆名山大川委所在長吏量加祭祀文宗太和八年二月庚寅以疾瘳大赦詔曰百靈所佑獲遂痊和虔奉神休敢忘昭報其五嶽四瀆名山大川各委所在長吏致祭仍加豐潔以副精誠九年六月封雞翁山為侯先是溫造為興元節度使初往漢中遇大雨平地水尺餘不可進禱雞翁山疾風驅雲即時清霽及是帝憶聞其事會造為御史大夫入見得詳言當時靈貺明日下詔封之文獻通考文宗開成二年四月十一日敕每聞京師舊説以為終南山興雲即必有雨若晴霽雖密雲他至竟不沾濡况兹山北靣闕庭日當顧矚修其望祀寵數宜及今聞都無祠宇巖谷湫却在命祀終南山未偹禮秩湫為山屬捨大從細深有闕于興雲致雨之祀也宜令中書門下且差官設奠宣告致禮便令擇立廟處所回日以聞命有司即時建立其年九月敕終南山宜封為廣惠公準四鎮例以本府都督刺史充獻官每年一祭以季夏土王日祭之僖宗乾寧五年敕封少華山為佑順侯昭宗天佑二年敕封洞庭湖君為利涉侯青草湖君為安流侯右唐祀山川册府元龜後唐愍帝應順元年閏正月詔曰朕猥以沖人獲膺大寶賴神祗之贊助顯天地之休禎夷夏駿奔式符于眷命聲教綿逺虔荷于炳靈德薄承祧憂深馭朽克奉治平之道諒繇冥助之功集是殊祥敢不寅畏賴隂陽之行運致時雨以應期稼穡順成得歲功而叶望咸臻上瑞普泰兆民宜令三京諸道州府界內名山大川祠廟有益于民者以時精虔祭祀稱朕意焉清泰元年五月壬申詔曰吳嶽成德公昨遇享期克申幽贊宜加王號以表神功可進封靈應王其祀享官屬仍舊同五嶽擇日册命初帝在鳯翔將有沈閼之釁遣房皓祀之有應至是欲加封爵下有司檢討奏曰天寶十載正月封吳山為成德公與沂山會稽醫無閭同制封公至德二年十二月改吳山為嶽祠享官屬視五嶽今國家以靈應告祥宜示殊等故有是命至二年四月庚午授册于少府監烏昭達往吳山祠封靈應王右後唐祀山川册府元龜後晉髙祖天福二年三月詔巡幸汴州中書奏車駕經過河南府河陽鄭州汴州管界所有名山大川去路十里內者伏請下本州府各排比祗候車駕過日以酒酺醢祭告從之五月湖南馬希範奏青草等四廟各乞進封敕青草廟安流侯宜進封廣利公洞庭廟利涉侯進封靈濟公磊石廟昭靈侯進封威顯公黃陵二妃廟舊封懿節廟改封昭烈廟八月詔曰負固者天地不容為逆者神人共怒永惟躬饗實有感通昨出師之時將帥虔禱頗聞隂佑成此戰功唐衛國公宜封靈顯王其餘鄭州并汜水管內神祠宜令長吏差官點簡如有墮損處便委量事修葺貴申嚴飭以合隂功五嶽承天四瀆紀地自正當陽之位未伸望秩之儀宜令差官遍往告祭兼下逐州府量事修崇所有近廟山林仍宜禁斷樵牧十月丙戌命使祠五嶽四瀆遼史太宗本紀會同三年冬十月庚申晉遣使貢布及請親祠南嶽從之案遼會同三年即晉天福五年册府元龜天福六年詔曰嶽鎮司方海瀆紀地載諸祀典咸福蒸民將保豐穰宜申虔敬俾加崇飾以奉神明其嶽鎮海瀆廟宇等宜令各修葺仍禁樵蘇七年二月敕唐州湖陽縣蓼山神祠宜賜名為蓼山顯聖之神仍下本州修葺廟宇初襄州安從進作逆舉軍北來東京教坊使充南靣先鋒都諌陳思讓進軍南行與從進相遇接蓼山列障俗以蓼與了字同音傳為不祥遂祈戰勝奏立廟額從進既敗行營都部署髙行周以狀奏聞因有是敕右後晉祀山川册府元龜後周太祖廣順二年五月親征兗州遣翰林學士竇儀祭東嶽廟玉海周世宗顯德四年止祭沂山其諸鎮不祭右後周祀山川宋史太祖本紀乾德元年三月戊寅克復朗州湖南平夏四月乙酉遣使祭南嶽繼令有司製諸嶽神衣冠劍履遣使易之玉海乾德六年詔祭四鎮準開元禮七月十日復南嶽四瀆常祭八月修霍山祠圖書編宋初緣舊制祭東嶽泰山于兗州西嶽華山于華州北嶽恆山于定州中嶽嵩山于河南府文獻通考乾德六年有司言祠官所奉止四嶽令案祭典請祭南嶽于衡州東鎮沂山于沂州南鎮會稽山于越州西鎮吳山于隴州中鎮霍山于晉州東海于萊州南海于廣州西海河瀆並于河中府北海濟瀆並于孟州淮瀆于唐州其江瀆準顯德五年敕祭于揚州楊子江口今請復祭于成都府北鎮醫無閭山在營州界未行祭享從之其後望祭北鎮于定州北嶽祠宋史太祖本紀開寶四年二月廣南平六月癸酉遣使祀南海禮志廣南平遣司農少卿李繼芳祭南海除去劉鋹所封偽號及宫名易以一品服又命李昉盧多遜王祐扈蒙等分撰嶽瀆祠及歷代帝王碑遣韓林待詔孫崇望等分詣諸廟書于石文獻通考開寶五年詔自今嶽瀆并東海南海廟各以本縣令兼廟令尉兼廟丞專掌祀事常加案視務于蠲潔仍籍其廟宇祭器之數受代日交以相付本州長吏每月一詣廟察舉縣近廟者遷治所就之宋史禮志開寶六年遣使奉衣冠劍履送西鎮吳嶽廟太祖本紀開寶九年秋七月丁亥命修五嶽四瀆祠廟玉海太宗太平興國四年六月八日平太原還次定州遣使祀北嶽宋史禮志太宗太平興國八年河決滑州遣樞密直學士張齊賢詣白馬津以一太牢沈祠加璧自是九河決溢修塞皆致祭玉海淳化二年二月祕書監李至請五郊迎氣祭其方嶽鎮海瀆北鎮于北嶽望祭八月十三日禮官言顯德中祭江瀆于揚請如故事祭于益宋史禮志祕書監李至言案五郊迎氣之日皆祭逐方嶽鎮海瀆自兵亂後有不在封域者遂闕其祭國家克復四方間雖奉詔特祭未著常祀望遵舊禮就迎氣日各祭于所𨽻之州長吏以次為獻官其後立春日祀東嶽岱山于兗州東鎮沂山于沂州東海于萊州淮瀆于唐州立夏日祀南嶽衡山于衡州南鎮會稽山于越州南海于廣州江瀆于成都府立秋日祀西嶽華山于華州西鎮吳山于隴州西海河瀆並于河中府西海就河瀆廟望祭立冬祀北嶽恆山北鎮醫無閭山並于定州北鎮就北嶽廟望祭北海濟瀆並于孟州北海就濟瀆廟望祭土王日祀中嶽嵩山于河南府中鎮霍山于晉州玉海至道元年二月八日以旱祀五嶽故事御書祝版學士言五嶽視三公稱名恐非古上曰唐德宗猶拜風雨朕為民祈福無憚桑林之禱舊制豈可廢宋史真宗本紀景德元年閏九月壬申江南旱遣使祀境內山川文獻通考景德元年上封事者言案開元禮儀鑑云車駕行幸路次有名山大川去三十里內則祭之名臣十里內則祭之今朝陵有期緣州縣所祀山川祠宇名多偽俗望委禮官先檢詳事迹以聞可下太常禮院禮院言同開封府孟鄭州所供山川神祠除京城神祠舊係祀典者今約定祠宇請下逐州差官以禮致祭從之玉海景德三年七月以汴口復通祭河瀆十二月己卯詔澶州于河南置河瀆廟初帝幸澶淵大河不冰敵若見隂兵助戰故立祠文獻通考真宗景德三年令澶州置河瀆廟上幸大名也禱之有應及元年駐蹕澶淵戎騎在郊河流不冰故立祠春秋致祭宋史真宗本紀景德四年二月辛卯車駕發西京甲午次鄭州遣使祀中嶽禮志景德四年二月次西京遣告汾陰中嶽太行河洛啓母少姨廟東還奏告如常儀真宗本紀大中祥符二年四月河北旱遣使祀北嶽五月陜西旱遣使禱西嶽河瀆諸祠三年八月旱洪潤州屢火遣使祀境內山川九月華州言父老二千餘人請幸西嶽四年二月壬子出潼關渡渭河遣近臣祀西嶽乙丑加號西嶽五月乙未加上五嶽帝號作奉神述九月向敏中等為五嶽奉册使冬十月戊申御朝元殿發五嶽册禮志真宗封禪畢加號泰山為仁聖天齊王遣職方郎中沈維宗致告又封威雄將軍為炳靈公通泉廟為靈派侯亭山神廟為廣禪侯嶧山神廟為靈巖侯各遣官致告詔泰山四面七里禁樵採給近山二十戶以奉神祠社首徂徠山並禁樵採車駕次澶州祭河瀆廟詔進號顯聖靈源公遣右諌議大夫薛映詣河中府比部員外郎丁顧言詣潭州祭告祕書丞董溫其言漢以霍山為南嶽望令壽州長吏春秋致祭禮官言雖前漢嘗以霍山為南嶽緣今嶽廟已在衡山難于改制其霍山如遇水旱祈求及非時準别敕致祭即委州縣奉行詔封江州馬當上水府福善安江王太平州采石中水府順聖平江王潤州金山下水府昭信泰江王及祀汾陰命陳堯叟祭西海曹利用祭汾河車駕至潼關遣官祀西嶽及河瀆並用太牢備三獻禮庚午親謁華陰西嶽廟羣臣陪位廟垣內外列黃麾仗遣官分奠廟內諸神加號嶽神為順聖金天王還至河中親謁奠河瀆廟及西海望祭壇五月乙未加上東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝中嶽曰中天崇聖帝命翰林禮官詳定儀注及冕服制度崇飾神像之禮其玉册制如宗廟諡册帝自作奉神述備紀崇奉意俾撰册文有司設五嶽册使一品鹵簿及授册黃麾仗載册輅衮冕輿于乾元門外各依方所羣臣朝服序班仗衛如會儀改服衮冕御乾元殿中書侍郎引五嶽玉册尚衣奉衮冕升殿上為之興奉册使副班于香案前侍中宣制曰今加上五嶽帝號遣卿等持節奉册展禮咸承制再拜奉册使以次升自東階受册御座前降西階副使受衮冕輿于丹墀隨册使降立丹墀西玉册發至于朝元門外帝復坐册使奉册升輅鼓吹振作而行東嶽北嶽册次于瑞聖園南嶽册次于玉津園西嶽中嶽册次于瓊林苑及廟內外列黃麾仗設登歌奉册于車奉衮冕于輿使副袴褶騎從遣官三十員前導及門奉置幄次以州長吏以下充祀官致祭畢奉玉册衮冕置殿內又加上五嶽帝后號東曰淑明南曰景明西曰肅明北曰靖明中曰正明遣官祭告詔嶽瀆四海諸廟遇設醮除青詞外增正神位祝文又改唐州上源桐柏廟為淮瀆長源公加守護者帝自制五嶽醮告文遣使醮告即建壇之地構亭立石柱刻文其上文獻通考十一月車駕過澶州幸河瀆廟酌奠進號河瀆曰顯聖靈源公遣官往河東府澶州祭告二年八月祕書丞董溫其上言漢以霍山為南嶽望令夀州長吏春秋致祭詔禮官與崇文院檢討詳定上奏曰案爾雅云江南衡山注云衡山南嶽又霍山為南嶽注云即天柱山潛水所出此即非特霍山為南嶽舜五月南巡周之王制皆以衡山為南嶽惟漢武帝以衡山遼逺取讖緯之説而祭灊霍至隋復以衡山為嶽况奉祀已久國家疆宇敻廣難于改制其霍山如有所請及特致祭即委州縣奉行從之陳氏淳曰泰山曰天齊仁聖帝在唐為天齊王至本朝以東方主生加仁聖二字封帝帝只一上帝而已安有山而謂之帝今立廟儼然人形貌垂旒端冕衣裳而坐又立后殿于其後不知又是何山可以當其配而為夫婦耶據泰山魯封內惟魯公可以祭今隔一江一淮與南方地脈絶不相干涉而在在州縣皆立東嶽行祠亦失于講明之故丘氏濬曰有此天地即有此山川有此山川即有所以主之者是則所謂神也世俗乃以三月二十八日為嶽神初度之辰嗚呼自天一生水凝而為山其所以凝而成形也亦有時日耶此無稽之甚也甚者惑于釋氏地獄之説謂人死其魂皆必經嶽祠考掠而有二十四案之像其説尤為不經乞下有司屏除毋俾得以惑世欺民宋史樂志大中祥符五嶽加帝號祭告八首迎神靜安鍾石既作爼豆在前雲旗飛揚神光肅然當駕飈歘來乎青圓言備縟禮享兹吉蠲册入門正安節彼喬嶽神明之府秩秩威儀肅肅靈宇懿號克崇庶物咸覩帝籍升名式綏九土酌獻東嶽嘉安節彼岱宗有嚴廟貌惟辟奉天依神設教帝典焜煌嘉薦普淖至靈格思殊祥是效南嶽作鎮炎夏畜兹靈光敷與萬物既阜既昌爰刻溫玊式薦徽章昭嘏神意福熙穰穰西嶽瞻言太華奠方作鎮典册是膺等威以峻上公奉儀祀宫薦信介祉萬邦永配坤順北嶽仰止靈嶽鎮于朔方增崇懿號度越彛章祗薦嘉樂式陳令芳永資純佑國祚蕃昌中嶽巖巖神嶽作鎮中央肅奉徽册尊名孔章聿降飈駕載獻蘭觴熙事允洽寶祚彌昌送神靜安祗薦鴻名寅威明祀有楚之儀如在之祭奠獻既終禮容克備神鑒孔昭福禧來暨天安殿册封五嶽帝一首册出入正安名嶽奠方帝儀克舉吉日惟良九賔咸旅溫玊縷文纁裳正寧禮備樂成篤神之祜真宗本紀大中祥符五年八月己未作五嶽觀玉海五年二月命朝回等撰五嶽碑六年正月辛亥修淮瀆廟九月辛卯修南海廟七年十月十九日上親製東嶽醮告文八年三月十四日製五嶽醮告文刋石于廟宋史禮志天禧四年從靈臺郎皇甫融請凡修河致祭增龍神及尾宿天江天紀天社等諸星在天河內者凡五十位仁宗本紀景祐四年六月乙亥杭州江潮壞堤遣使致祭文獻通考仁宗康定二年增封海瀆逐處遣官致祭東海為淵聖廣德王南海為洪聖廣利王西海為通聖廣潤王北海為沖聖廣澤王江瀆為廣源王河瀆為靈源王淮瀆為長源王濟瀆為清源王宋史禮志康定二年三月以黃河水勢甚淺致分流入汴未能通濟遣使祭河瀆及靈津廟又澶州曹村掃方開減水直河而水自流通遣使祭謝文獻通考慶厯二年儂智髙反圍廣州數有風雨遂遁乃詔益封南海神為洪聖廣利昭順王宋史仁宗本紀慶厯三年夏四月丙辰以春夏不雨遣使祠禱于嶽瀆禮志皇祐四年以靈臺郎王大明言汴口祭河兼祀箕斗奎與東井天津天江咸池積水天淵天潢水位水府四瀆九坎天船王良羅堰等十七星在天河內者皇祐五年以儂智髙遁益封南海洪聖廣利昭順王蕙田案禮志與文獻通考年次不同必有一誤仁宗本紀嘉祐元年春正月帝不豫遣諸州長吏禱于嶽瀆諸祠玉海嘉祐六年閏八月辛卯修北嶽祠宋史神宗木紀熙寧元年春正月庚辰遣使祭南嶽南海告以南伐十一月乙亥以安南行營將士疾疫遣同知太常禮院王存禱南嶽遣中使建祈福道場文獻通考神宗元豐三年集賢校理陳侗言案周禮小宗伯之職兆五帝于四郊四望四類亦如之鄭氏注四望謂五嶽四瀆也四類日月里辰也今四郊有五帝及日月星辰之壇而獨四望之壇不建或遇朝廷有祈焉則設位皇地祗壇下甚非古制請依周禮建四望壇于四郊以祭五嶽四鎮四瀆庶合于經詔下詳定禮文所詳定請以國朝祠令所載嶽鎮海瀆兆四望于四郊岱山沂山東海大淮于東郊衡山會稽山南海大江嵩山霍山大海于南郊華山吳山西海大河于西郊常山醫無閭山北海大濟于北郊每方嶽鎮則共為一壇海瀆則共為一坎以五時迎氣日祭之皆用血祭瘞埋有事則請禱之又以四方山川各附于本方嶽鎮海瀆之下别為一壇一坎水旱則禱之其北郊從祀及諸州縣就祭如故詔每方嶽鎮共為一壇望祭餘從之宋史樂志熙寧望祭嶽鎮海瀆十七首東望迎神凝安盛德惟木勾芒御神沂岱淮海厥功在民爰熙壇坎裒對庶神于以歆格靈貽具臻升降固安紳韠襜兮玉佩蕊兮于我將事神燕喜兮帝命望祀敢有不共往返于位肅肅雍雍奠玉幣明安祀以崇德幣則有儀肅我將事登降孔時精明純潔罔有弗祗史辭無愧神用來娭酌獻成安肇兹東上含潤無疆維時發春嘉薦令芳祭用薶沈順性含藏不涸不童誕降祺祥送神迎安神之至止熙壇為春神之將歸旗服振振歘兮回飈窅兮旋雲佑于東方永施厥仁南望迎神凝安嵩嵇衡霍暨厥海江時維長養惠我南邦肆嚴牲幣神式來降以侑以妥百福是龎酌獻成安景風應律朱鳥開辰肅肅明祀嘉籩列陳牲用牷物樂奏蕤賔克綏永福祐此下民送神凝安鼓鐘云云吹管依依神既醉飽曰送言歸山有厚藏水有靈德物其水依往奠炎宅中望迎神凝安維土作德維帝御行含養載育萬物以成有嚴祀典薦我德馨神其歆止永用億寧酌獻成安高廣融結實維中央宣氣報功利彼一方坎壇以祀六樂鏘鏘靈其有喜酌以大璋送神凝安言旋其處以奠中域無替厥靈四方是則神永不息祀永不愆以享以報于萬斯年西望迎神凝安品物順説時司金行于郊迎氣以望庶靈雅歌惟樂圭薦惟牲作民之祉永相厥成酌獻成安西皓沆碭執矩司秋諏言協靈時祀孔修禮有薦獻爰視公侯秩而祭之百福是遒送神凝安我樂我神簋爼牲饔曰神之還西土是宫于蕃禽魚于衍草木富我藪隰滋我高陸北望迎神凝安帝德乘坎時御閉藏爰潔牲醴兆兹北方海山攸宅神施無疆具享蠲吉降福孔穰酌獻成安淒寒凝陰隕蘀滌場百物順成黍稷馨香欵于北郊爰因其方何以侑神薦此嘉觴送神凝安維山及川奠宅幽方我度其靈降止靡常肅肅坎壇既迎既將促樂徹爼是送是望禮志吳山舊封成德公元豐八年封王元祐元年十二月以華州鄭縣山摧命太常博士顔復往祭西嶽玉海元符三年修東嶽廟命曽肇為碑為殿三曰嘉寧蕃祉儲佑宋史禮志東海大觀四年加號助順廣德王徽宗本紀政和三年八月戊寅封四鎮山為王禮志沂山舊封東安公政和三年封王會稽舊封永興公政和封永濟王醫無閭舊封廣寧公政和封王霍山舊封應聖公政和封應靈王文獻通考徽宗政和三年議禮局上五禮新儀五方嶽鎮海瀆壇各髙五尺周四十步四出陛兩壝每壝二十五步壇飾依方色祭嶽鎮海瀆設位南向以西為上山川從祀西向以北為上諸嶽鎮海瀆年别一祭以祭五帝日祭之東嶽泰山于兗州界東鎮沂山于青州界東海于萊州界東瀆大淮于唐州界南嶽衡山于潭州界南鎮會稽山于越州界南海于廣州界南瀆大江于益州界中嶽嵩山于河南府界中鎮霍山晉州界西嶽華州界西鎮吳山于隴州界西海西瀆大河于河中府界北嶽常山及遙祀北鎮醫無閭山于定州界北海北瀆大濟于孟州界太常寺言大中祥符中封五嶽為帝四海為王獨五鎮封爵尚仍唐舊元豐八年始封西鎮吳山為成德王而未及四鎮詔並封王玉海高宗建炎元年九月權太常少卿滕康請如虞望秩周時邁車駕巡幸祭所過名山大川詔望祭宋史髙宗本紀紹興七年五月命禮官舉嶽鎮海瀆之祀文獻通考紹興七年太常博士黃積厚言百神之祀曠歲弗修如中祀未舉者嶽瀆海鎮中嶽中鎮是也望舉而行之從之每歲以四立日季夏土王日設祭其禮料初依奏告例後比擬舊制用羊豕各一口籩十菱芡栗鹿脯榛實乾桃乾䕩乾棗形鹽魚鱐簠二稻粱簋二黍稷鉶鼎三鉶羮登二大羮脂盤一毛血豆十芹筍葵菁韭魚醢兔醢腸胃鹿臡醓醢爼八羊腥七體羊熟十一羊腥腸胃羊熟腸胃肺豕腥七體豕熟十一豕腥膚豕熟膚尊罍二十四實酒並同皇地祗三十一年知樞密院事督視軍馬葉義問言敵逼江上與鎮江建康太平諸郡才隔一水先報敵謀開第二港河欲徑衝丹徒施工纍日一夕大風沙漲截斷不得渡以為水府陰佑所以致然乞詔禮官考其制乞依五嶽例峻加帝號令建康守臣擇地建廟其金山采石二水府乞增封遣官精潔祭告詔令禮部太常寺討論已而太常寺言江瀆已封廣源王止係二字欲特贈加六字作八字王擬昭靈孚應威烈廣源王令建康守臣擇爽塏之地建廟賜額曰佑德其乞峻加帝號一節恢復中原日别議封册兼契勘廣源王本廟係在成都府今來所封廟額并增八字王令本廟一等稱呼從之孝宗乾道五年太常少卿林栗言國家駐蹕東南東海南海實在封域之內檢照國朝祀儀立春祭東海于萊州立夏祭南海于廣州其西北獨即方州行二時望祭之禮自渡江以後惟南海廣利王廟歲時降御書祝文令廣州行禮并紹興七年加封至八字王爵如東海之祠但以萊州隔絶不曽令沿海官司致其時祭殊不知通泰明越溫台泉福皆東海分界也紹興辛巳敵入侵李寶等舟師大捷于膠西是時神靈助順則東海之神于國為有功矣謹案東海祠隋祭于會稽縣界唐祭于萊州界本朝沿唐制萊州立祠元豐元年建廟于明州定海縣既成命知制誥鄧潤甫撰記二年加封淵聖之號崇寧二年本朝嵗度道士一員大觀四年又加助順二字則東海之祠本朝纍加崇奉皆在明州不必泥于萊州矣欲乞行下禮部參照南海已封禮例將李寶等昨來立功事迹顯著特封東海之神八字王爵自今後立春及大禮告謝乞依見令廣州祭南海禮例關報所屬請降香祝下明州排辦差官行禮詔從之蕙田案國勢偏安不克振作徒以加封神號為望佑之舉所謂聽命于神也其可久乎宋史樂志紹興祀嶽鎮海瀆四十三首東方迎神凝安帝奠九壥孰非我疆翳我東土山川相望祀事孔明肅雍不忘睪峩濛鴻郁哉洋洋初獻盥洗同安青陽肇開祀事孔飭鬱人贊溉其馨苾苾敬爾威儀亦孔之則神之格思無我有斁奠玉幣明安司歷告時惟孟之春爰舉時祀旅于有神鼓鐘既設圭帛具陳阜蕃庶物以福我民東嶽位酌獻成安巖巖天齊自古在昔膚寸之雲四方其澤惟時東作祀事乃飭惠我無疆恩霑動植東鎮位惟山有鎮雄于其方東孰為雄于河之疆祀事有時爰舉舊章我望匪遙庶幾燕享東海位澒洞鴻濛天與無極導納江漢節宣南北順助其功善下維德我祀孔時以介景福東瀆位我祀伊何于彼長淮導源桐柏委注蓬萊扞齊護楚宣威示懷豆籩列陳亦孔之偕亞終獻酌獻四位並同我祀孔肅神其安留容與裴回若止若浮洽此重觴申以百羞無我斁遺萬邦之休送神凝安蹇兮紛紛神實戾止以飲以食以享以祀眑兮冥冥神亦歸止以醉以飽以錫爾祉南方迎神凝安朱明盛長我祀用飭厥祀伊何山川咸秩如將見之繩繩齊栗神哉沛兮消搖來格初獻盥洗升降同安爰熙嘉壇揭虔毖祀鬱人沃盥贊我祼事于降于登以作以止莫不肅雍告靈享矣奠玉幣明安我祀我享儀物孔周一純斯舉二精聿修璞兮其溫絲兮其紑是薦潔蠲神兮安留南嶽位酌獻成安神曰司天居南之衡位焉則帝于以奠方南訛秩事望禮有常庶幾嘉虞介福無疆南鎮位維南有山于彼會稽作鎮在昔神則司之厥有舊典以祀以時百味惟旨靈其燕娭南海位維水善下利物曰功逶迤百川誰歟朝宗蕩蕩大受于焉會同膋蕭列陳以答鴻濛南瀆位四瀆之利經營中國南曰大江險兮天設維爾有神隃其廟食望秩孔時我心翼翼亞終獻酌獻神之遊兮洋洋對越淡乎容與肸蠁斯答乃奏既備八音攸節重觴申陳百禮以洽送神曲同迎神薦徹豆籩熙事備成靈兮將歸羽旄紛紜飄其逝矣浮空籋雲悵然顧瞻有撫懷心中央迎神凝安天作髙山屹然中峙經營厥宇萬億咸遂火熙土王爰舉時祀繩繩宣延倣佛來止初獻盥洗升降同安思來感格肅雍不忘禮儀既備濟濟蹌蹌潔蠲致敬往薦其方交若有承神兮孔饗奠玉幣明安練日有望高靈來下何以告誠心惟物假有篚斯實有寶斯藉于以奠之神光燭夜中嶽位酌獻成安與天齊極伊嵩之高顯靈效異神休孔昭飭我祀事實爼鸞膋以侑旨酒其馨有椒中鎮位禹畫九州河內曰冀霍山崇崇作鎮積勢我祀如何百末旨味承神燕娭諸神畢至亞終獻酌獻禮樂既成肅容有常奄留消搖申畢重觴仰臚所求降福滂洋師象山則以况皇章送神曲同迎神虞至旦兮靈亦有喜蹇欲驤兮象輿已轙粥音送兮靈聿歸矣長無極兮錫我以祉西方迎神凝安有岌斯安有涵斯洽聿相厥成允祀是答爰飭乃奏乃奏既協於昭降止是尊是接初獻盥洗升降同安靡實不新靡陳不濯人之弗蠲矧敢將酌載晞之帨載濡之勺洸儀告備陟降時若奠玉幣明安彼林有屐彼澤有沈倚與西望弗菲弗淫乃追斯邸乃㡆斯尋卬禮既卒是用是歆西嶽位酌獻成安屹削厥方風雲斯所陰邑有宫侐侐俁俁清酤在尊靈脊在下于爼獻兮則莫我吐西鎮位維吳崇崇于汧之西瞻彼有隴赫赫不迷克俾于嶽我酌俶齊于凡有旅視公維躋西海位奄浸坤軸滋殖其濊而典斯稽有陛有壝弗替時舉元斚斯酹胡先于河實委之會西瀆位自彼昆虛于以潛流念兹誕潤豈侯不猶在昔中府暨海聿修迄既望止神保先卣亞終獻肅肅其又既旨既溢逮其畢酌偏兹博碩祀事既遂不敢誶射神武醉止我心斯懌送神曲同迎神乃羞既徹乃奏及闋無餕斯爼式聽致謁不蹇不蹶不沸不決厲魃其祛永庇有截北方迎神凝安我土綿綿孰匪疆里惟時幽都匪曰隃止滌哉良月朔風其同曷阻曷深其亦來降初獻盥洗升降同安壽宫輝煌聿將時祀繽其昭矣吉蠲以娭居乎昻昻行乎遂遂敬爾攸司展采錯事奠玉幣明安相豫陰威厥功浩浩一歲之功何以為報府有圭幣我其敢私肅肅孔懷于以將之北嶽位酌獻成安瞻彼芒芒曰北之常既高既厚乃紀乃綱薦鬯伊始靈示孔將玄服鐡駕覽此下方北鎮位赫赫作鎮幽朔之垂兼福我民食哉其宜克配彼嶽有嚴等衰蠲我灌禮其敢不祗北海位八裔皆水此一會同沄沄天墟洞蕩洪濛至哉維坎不有斯功所秩伊何黃流在中北瀆位水星之精播液發靈不脅于河既介以清翼翼盥薦椒糈芬馨載止載留爰弭翠旌亞終獻爼豆紛披金石繁會侑以二尊匪瀆匪怠我儀既周我心孔戒憺兮容與倣佛如在送神曲同迎神靈既醉飽禮斯徹兮靈亦樂康樂斯闋兮雲征飈舉不可尼兮薦福錫祉曷有極兮理宗本紀淳祐十二年十二月癸亥詔海神為大祀春秋遣從臣奉命往祠奉常其條具典禮來上樂志淳祐祭海神十六首迎神延安宫一曲堪輿之間最巨惟瀛包乾括坤吐日滔星祀典載新禮樂孔明鑒吾嘉賴來燕來寧角一曲四溟廣矣八紘是紀我宅東南回復萬里洪濤飄風安危所倚祀事特隆神其戾止徵一曲若稽有唐克致崇極祝號既升爰增祭式從享于郊神斯受職我祀肇新式祈陰騭羽一曲猗與祀禮四海會同靈之來沛鞭霆馭風肹蠁倣佛在位肅雍佑我蒸民式徼神功升降欽安靈之來至垂慶陰陰靈之已至飭兹五音壇殿聿嚴陟降孔欽靈宜安留鑒我德心東海位奠玉幣德安百川所歸天地之左澒洞鴻濛功高善下行都依依百祿是荷制幣嘉玉以佑以妥南海位奠玉幣瀛安祝融之位貴乎三神吞納江漢廣大無垠長為委輸佑我黎民敬陳明享允鑒恭勤西海位奠玉幣潤安蒲昌之澤派引天潢羲娥出入浩渺微茫蓋髙斯覆猶隔封疆我思六合肇正吉昌北海位奠玉幣瀚安瀚海重潤地紀亦歸吞受百瀆限制北陲一視同仁我心則怡嘉薦玉幣神其格思捧爼豐安昭格靈貺祀典肇升牲牷告充雕爼是承薦虔效物省德惟馨靈其有喜萬宇肅澄東海位奠酌獻熙安滄溟之德東南具依熬波出素國計攸資石臼却敵濟我王師神其享錫益畀燕綏南海位酌獻貴安南溟浮天旁通百蠻風檣迅疾琛舶來還民商永賴坐消寇姦薦兹嘉觴弭矣驚瀾西海位酌獻類安積流疏派被于流沙布潤施澤功均邇遐我秩祀典四海一家祗薦令芳靈其享嘉北海位酌獻溥安備忽會同裴回安留牲肥酒香晨事聿修惟德之涼曷奄九州帝命是祗多福是求亞終獻饗安籩豆有楚二觴斯旅神其醉飽式燕以序百靈祕怪蜿蜒飛舞錫我祺祥有永終古送神成安告靈享矣錫我嘉祚乾端坤倪開豁呈露元雲聿收羣龍咸鶩滅除凶災六幕清豫右宋祀山川五禮通考卷四十七
