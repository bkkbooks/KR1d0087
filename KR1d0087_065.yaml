body:
  text: 五禮通考卷五十五刑部尚書秦蕙田撰吉禮五十五四方蕙田案四方之祭見於經傳者不一祭法四坎壇祭四方此祭之壇也曲禮天子祭四方諸侯方祀有兼祭専祭之不同此祭之等也大司馬仲秋祀祊則治兵有祭月令季秋祭禽則田獵有祭雲漢方社不莫甫田以社以方則祈年有祭大田来方禋祀則報賽有祭占夢舍萌四方則因祓禳有祭八蜡記四方則蜡有祭此祭之類也其玉青圭赤璋白琥𤣥璜其幣因方色其牲疈辜其尊蜃散其舞羽舞此祭之物也四方之祭重矣然乃不知其為何神鄭注大宗伯于六器則以為五帝於疈辜則以為蜡注舞師則以為四望注曲禮則以為五官之神注祭法則以為山林川谷丘陵之神即鄭氏一家已參錯如此案大宗伯血祭祭五岳疈辜祭四方是四方與四望不同也曲禮祭四方之下即曰祭山川而貍沈與疈辜亦異兵舞與羽舞又異是四方與山川不同也周禮祀五帝三月繋牲十日誓戒其義與祀天相等四方則與百物連言是四方與五帝不同也唯五官之神之說應為近之五官之神生有功烈於民死則祀之各主一方佐天成物但從食五人帝以配五帝尚非正祀此祭四方或其正祀耳然經傳雖詳而漢以後無其祀亦以諸儒之說未定故與禮記祭法四坎壇祭四方也注四方即謂山林川谷丘陵之神也祭山林丘陵於壇川谷於坎每方各為坎為壇一疏山林川谷丘陵之神有益於人民者也四方各為坎一壇壇以祭山林丘陵坎以祭川谷泉澤故言坎壇祭四方也方氏慤曰四方者四方萬物之神也方有四而位則有八若乾位西方艮位東方坎位正北震位正東皆陽也坤位西南巽位東南離位正南兌位正西皆隂也故有坎有壇而合以四焉周氏諝曰四坎壇祭四方豈蜡之祭四方百物之神若先嗇之類則祭於壇若水庸之類則祭於坎歟蕙田案鄭以為山林川谷丘陵之神是以四方即山川然據曲禮嵗徧及周禮大宗伯貍沉疈辜舞師兵舞羽舞則四方與山川異祭難於合一方氏泛指萬物之神無所依據周氏移鄭氏疈辜祭四方之解以解祭法恐亦未是右四方坎壇曲禮天子祭四方歲徧諸侯方祀歲徧注祭四方謂祭五官之神於四郊也勾芒在東祝融后土在南蓐收在西𤣥㝠在北詩云来方禋祀来方者各祭其方之官而已疏此經直言祭四方知非祭五天帝於四方者以上云祭天地則五帝在其中矣故知非天帝也案宗伯云疈辜祭四方百物知此方祀非四方百物者以此文在山川五祀之上與大宗伯血祭社稷五祀五嶽五祀在五嶽之上此四方亦在山川之上故知是五官之神云祝融后土在南者鄭意以為黎兼為后土土位在南方故知祝融后土在南引詩云来方禋祀者是小雅大田之詩以刺幽王之無道追論成王之太平時和年豐至秋報祭招来四方之神禋潔祭祀引之者證四方之義也諸侯方祀者諸侯既不得祭天地又不得總祭五方之神唯祀當方故云方祀楊氏復曰四方注疏此一條謂五官之神祭法一條謂山林川谷丘陵之神舞師一條謂四望之神大宗伯一條謂蜡祭四方百物之神月令一條謂四方五行之神大司馬一條謂祭四方之神詳考諸說唯舞師帥而舞四方之祭祀謂四望也其說為近盖四方即四望而又有不同四望者郊之屬是也四方者四時山川之祀而望祭之如左氏曰望郊之屬是也四方者四時各望祭於其方如天子祭四方歲徧是也通而言之則同時合祭四方謂之望四時各祭於其方亦謂之望如舜即位同時告祭曰望于山川歲二月東巡守亦曰望秩于山川是也諸侯方祀亦云歳徧何也諸侯之國雖居一方然國内又各有東西南北亦隨四時而望祭於其方也望祭之方則五官之神五行之神及山林川澤之神皆在其中矣固不可又分而為四也大宗伯以疈辜祭四方百物亦謂之四方何耶案以血祭祭五嶽以疈辜祭四方百物禮固不同所謂祭四方百物言祭四方之内百物之神耳鼓人鼓兵舞帗舞疏云百神之小神是也非祭四方也蕙田案鄭氏數解以此曲禮注為是楊氏亦主四望之說然五岳用血祭四方用疈辜詎可合而一之與方氏慤曰天子言祭四方則知諸侯之方祀為一方吕氏大臨曰天子四時各祭其方以迎氣諸侯有國國必有方祭其所居之方而已非所居之方皆不得祭故曰方祀周禮春官大宗伯以疈辜祭四方注鄭司農云罷辜披磔牲以祭若今時磔狗祭以止風𤣥謂疈疈牲胸也疈而磔之謂磔禳及蜡祭郊特牲曰八蜡以祀四方疏云罷辜披磔牲以祭者此先鄭從古書罷於義未可故後鄭不從罷從經疈為正其云披磔牲以祭仍從之矣云若今時磔狗祭以止風者此舉漢法以况疈辜為磔之義必磔狗止風者狗屬西方金金制東方木之風故用狗止風也云疈疈牲胸也者無正文盖據當時疈磔牲體者皆從胷臆解析之故以胸言之云謂磔禳及蜡祭者案禮記月令云九門磔禳又十二月大儺時亦磔禳是磔牲禳去惡氣之禮也云及蜡祭者案彼云蜡也者索也歲十二月聚萬物而索享之謂天子於周之十二月建亥之月於郊而為蜡法此所引郊特牲曰八蜡已下彼據諸侯行蜡法彼云八蜡以記四方不作祀作祀者誤云八蜡以記四方者謂八蜡之禮以記四方諸侯知順成不順成若年不順成則八蜡不通者若四方諸侯年榖有不順四時成熟者其八蜡不得與四方成熟之處通祭八蜡也王氏昭禹曰疈者肆而磔之辜者制而磔之四方異體肆而不全故祭以疈百物異用制而不變故祭以辜亦各以其物宜蕙田案四方謂各主其方之神詩所謂以社以方者鄭氏磔禳及蜡祭之說非是詩小雅甫田以社以方傳方迎四方氣於郊也曲疏言迎四方之神於郊者下禮云天子祭四方歲徧注云祭四方謂祭五官之神於四郊也勾芒在東祝融后土在南蓐收在西𤣥㝠在北是也實五官而云四郊者火土俱在南其火土俱祀黎又大宗伯注云五祀者五官之神在四郊四時迎五行之氣於郊而祭五徳之帝亦食此神焉少昊氏之子曰重為勾芒食於木該為蓐收食於金修及熙為𤣥冥食於水顓頊氏之子曰黎為祝融后土食於火土是黎兼二祀也曲禮言歲徧此祀在秋而并言四方盖常祀嵗徧此秋成報功則總祭故并言四方也知此社與四方皆為秋祭報功者以上言黍稷之盛而此言齊羊之祭明是物成而祭也下言農夫之慶當孟冬休息以御田祖是来春祈榖故知此祭在秋為時次也故大司馬仲秋云遂以獮田羅弊致禽以祀祊注云祊當為方聲之誤也獮田主祭四方報成萬物即引此詩云以社以方是報祭四方在仲秋也朱子集傳方秋祭四方報成萬物周禮所謂羅弊致禽以祀祊是也何氏世本古義曰方謂四方之神曲禮云天子祭四方嵗徧諸侯方祀嵗徧注云祭四方謂祭五方之神於四郊也勾芒在東祝融后土在南蓐收在西𤣥冥在北疏云諸侯不得總祭四方之神唯祀當方故云方祀愚案詩每以方社對舉以后土乃中央之神既立為社自不當在五祀之列故禮止言四方注増謂五方而疏又増置后土於南皆臆說也然四方之解又自不一周禮大宗伯以疈辜祭四方百物舊說謂磔禳及蜡祭也舞師教羽舞帥而舞四方之祭祀舊以為四望又祭法云四坎壇祭四方舊以為山林川谷丘陵之神也今案周禮鼓人職云凡祭祀百物之神鼓兵舞帗舞者則與四方之祭用羽舞異可知四方與百物不同必非磔禳蜡祭之類也大司樂祀四望在天神地示之下山川之上而鬯人掌供秬鬯凡山川四方用蜃則又列四方於山川之下可知四方别是一祭既不同於山川亦斷非祭日月星海之四望也參互衆說唯以祭勾芒等神為允此祭社方及下文御田祖皆孟夏雩祭祈雨之禮詳已見小引下又証於雲漢之詩曰祈年孔夙方社不莫明前此冬春既行祈年之禮及巳月又行雩祭方社之禮而卒過時不雨故閔之也舊說皆以此為秋報誤矣蕙田案何氏之說當是右四方正祭禮記月令季秋之月天子乃厲飾執弓挟矢以獵命主祠祭禽於四方注以所獲禽祀四方之神也司馬職曰羅弊致禽以祀祊疏謂獵竟也主祠謂典祭祀者也禽者獸之通名也四方四方有功於方之神也四時田獵皆祭宗廟而分時各以為主也春時土方施生獵則祭社為主也夏時隂氣始起象神之在内獵則祭宗廟為主也秋時萬物以成獵則以報祭社及四方為主也冬時萬物衆多獵則主用衆物以祭宗廟而亦報於物有功之神於四方也此天子獵既畢因命典祀之官取田獵所獲之禽還祭於郊以報四方之神也冬獵亦何以知然案鄭注秋獮祀方云秋田主祭四方報成萬物詩曰以社以方下云方迎四方氣於郊也鄭又云秋祭社與四方為五穀成熟報其功也又司馬冬狩云致禽饁獸於郊入獻禽以享烝鄭云冬田主用衆物多衆得取也致禽饁獸於郊聚所獲禽因以祭四方神於郊也月令季秋天子既田命主祠祭禽四方是也入又以禽祭宗廟案于經注更相引証如可見矣其祭四方但用此禽又用别牲故甫田云與我犧羊以社以方是也此祀四方者謂四方五行之神也方氏慤曰祭禽則以報成功於百神且示非専為一人之奉也是月也豺猶祭獸戮禽則田獵而祭四方固亦宜矣周禮夏官大司馬中秋教治兵遂以獮田羅弊致禽以祀祊注秋田為獮之殺也羅弊罔止也秋田主用㒺中殺者多也皆殺而㒺止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方過疏羅弊致禽以祀祊者秋田主用羅羅止田畢入國郊之神位乃致禽以祀四方之神又曰云祊當為方聲之誤也者以祊乃是廟門之外内惟因祭宗廟及明日繹祭乃為祊祭今既因秋田而祭當是祭四方之神故云誤也云秋田主祭四方報成萬物者以秋物成四方神之功故報祭之云詩曰以社以方者詩大雅引之証方是四方之神也詩大雅雲漢祈年孔夙方社不莫箋我祈豐年甚早祭四方與社又不晚疏祭社與四方即以社以方是也世本古義曰方社指雩祭四方之神及后土言詳見倬彼甫田篇前此冬春既行祈年之禮及巳月萬物始盛待雨而大復行雩祭請雨之禮謹遵其時不為晚矣又案秋報亦祭方春祈秋報皆祭社解者或誤以此句兼祈報言又或謂専指秋報言皆於詩意未合詩為閔此時不雨而言何逺及前歳報賽之事乎小雅大田来方禋祀箋云成王之来則又禋祀四方之神祈報焉疏此以田事為主成王出觀民事因即祭祀故云成王之来則又禋祀四方之神祈報焉對出觀為文也此出觀之祭則祭當在秋祈報並言者言其報禮成而祈後年也朱子集傳精意以享謂之禋曽孫之来又禋祀四方之神而賽禱焉周禮春官占夢乃舍萌於四方以贈惡夢注杜子春讀萌為明或曰其字當為明明謂敺疫也謂竟歲逐疫置四方書亦或為明𤣥謂舍讀為釋舍萌猶釋菜也古時釋菜釋奠多作舍字萌菜始生也贈送也欲以新善去故惡舍疏子春之說舍萌為敺疫案下文自有敺疫於此以萌為之其義不同故後鄭不從𤣥謂舍萌猶釋菜也者案王制有釋菜奠幣之事故從之云萌菜始生也者案樂記區萌達鄭注云屈生曰區芒而直出曰萌故知萌菜始生者云欲以新善去故惡者舊嵗將盡新年方至故於此時贈去惡夢鄭氏鍔曰舍萌謂取菜之始萌者而祭也夢者禍福之萌用菜萌以祭示去其萌芽之義禮記郊特牲八蜡以記四方注四方方有祭也右因事祭四方周禮春官大宗伯以玉作六器以禮天地四方注禮謂始告神時薦於神坐書曰周公植璧秉圭是也對疏言作六器者此據禮神則曰器上文人執則曰瑞此文義爾若通而言之禮神雖不得言瑞人執者亦曰器故聘禮云圭璋璧琮凡四器者唯其所寳以聘可也尚書亦以五瑞為五器卒乃復是其人執亦曰器也云禮謂始告神時薦於神坐者此以玉禮神在作樂下神後故鄭注大司樂云先奏是樂以致其神禮之以玉而祼焉是其以玉禮神與宗廟祼同莭若然祭天當實柴之節也書曰周公植璧秉圭是也者此金縢文彼以周公請天代武王死之說為三壇同墠又為壇於南方周公於前立焉告太王王季文王故植璧於三王之坐手秉桓圭引之者証植璧於神坐之側事也以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方注禮東方以立春謂蒼精之帝而太昊勾芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黒精之帝而顓頊𤣥㝠食焉禮神者必象其類圭銳象春物初生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物唯天半見疏云禮東方以立春謂蒼精之帝者此已下皆據月令四時迎氣皆在四立之日故以立春立夏立秋立冬言之也知皆配以人帝人神者亦據月令四時十二月皆陳人帝人神彼止為告朔於明堂及四時迎氣配天帝而言告朔於明堂告五人帝告五人神配以文王武王必知迎氣亦有五人帝五人神者以其告朔入明堂至秋總享五帝於明堂皆以五人帝五人神配天若然迎氣在四郊還是迎五天帝明知五人帝五人神亦配祭可知以其自外至者無主不止故皆以人帝人神為配也言蒼精赤精白精黒精者皆據春秋緯運斗樞云太微宫有五帝坐星文耀鈎亦云靈威仰之等而說也云禮神者必象其類者即圭銳已下是象其類也云圭銳象春物初生者雜記賛大行云圭剡上左右各半寸是圭銳也云半圭曰璋者案典瑞云四圭有邸以祀天兩圭有邸以祀地是兩圭半四圭又云圭璧以祀日月是一圭半兩圭又云璋邸射以祀山川是璋又半一圭故云半圭曰璋公羊傳亦云寳者何璋判白亦半圭曰璋云象夏物半死者夏時薺麥死是半死云琥猛象秋嚴者謂以玉為琥形猛屬西方是象秋嚴也云半璧曰璜者逸禮記文似半圭曰璋也云冬閉藏地上無物唯天半見者列宿為天文草木為地文冬時草木枯落唯天上列宿仍在故云唯天半見故用半璧曰璜也此六玉所用則上璧下琮案覲禮祀方明東方圭南方璋西方琥北方璜與此同唯上圭下璧與此違者鄭彼注云上宜以蒼璧下宜以黄琮而不以者則上下之神非天地之至貴者也彼上下之神是日月故陳玉與此不同也此經神不見中央含樞紐者此四時迎氣皆在四郊小宗伯云兆五帝於四郊鄭注云黄帝亦於南郊是也易氏祓曰圭銳而首出其色以青象帝出乎震而物色東方之義也璋明也其色以赤象物之相見乎離南方之義也琥威也其色以白象秋之肅物西方之義也璜者用藏也其色以𤣥象乎物之歸藏北方之義也詩小雅甫田以我齊明與我犧羊以社以方箋云以潔齊豐盛與我純色之羊秋祭社與四方為五榖成熟報其功也大田来方禋祀以其騂黒與其黍稷以享以祀以介景福傳騂牛也黒羊豕也皆箋陽祀用騂牲隂祀用黝牲疏毛以諸言騂者牛故云騂赤牛也定本集註騂下無赤字是也上篇云以社以方而方社連文則方與社稷同用太牢故以黒為羊豕通牛為三牲也且上章言犧羊是方有羊明不特牛故為太牢牢中色而色不同者毛意盖以此四方既非望祀又非五方之帝故用是牲所以無方色之别箋陽祀用騂牲隂祀用黝牲地官牧人文也彼注云陽祀南郊及宗廟隂祀北郊及社稷非四方之神而引以解此者以毛分騂黒為三牲鄭以騂黒為二色故引牧人騂黝以明騂黒為别方之牲耳非謂四方之祭在陽祀隂祀之中也知方祀各以其色牲者大宗伯云青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方皆有牲幣各放其器之色注云以為禮五天帝人帝而勾芒等食焉是五官之神其牲各從其方色則宜五色獨言騂黒者略舉二方以韻句耳故周禮大宗伯職祀天乃稱禋五祀在血祭之中而言禋者此五官之神有配天之時配天則禋祀此祭雖不配天以其甞為禋祀故亦以禋言之五祀在血祭之中則用太牢矣故上篇云與我犧羊以社以方是方祭有羊孫毓以為方用特牲非禮意也朱子集傳四方各用其方色之牲此言騂黒舉南北以見其餘也周禮春官大宗伯皆有牲幣各放其器之色注幣以從爵若人飲酒有酬幣器疏言皆則上六玉所禮者皆有牲與幣也言各放其之色則上蒼璧等六器所有牲幣各放此器之色又曰知幣是從爵非禮神者若是禮神當在牲上以其禮神幣與玉俱設若肆師云立大祀用玉幣牲牷是帛在牲上今在下明非禮神者也云若人飲酒有酬幣者獻尸從爵之幣無文故以生人飲酒之禮况之案聘禮享時有酬幣明此幣既非禮神之幣則獻尸後酬尸時亦有幣之從爵也春官鬯人掌共秬鬯而飾之凡四方用蜃凡疈事用散注故書蜃或為謨杜子春云謨當為蜃書亦或為蜃蜃水中蜃也鄭司農云修謨概散皆器名𤣥謂修蜃概散皆漆尊也蜃畫為蜃形蚌曰含漿尊之象概尊以朱帶者無飾曰散疏司農云修謨概散皆器名者先鄭從古云謨後鄭亦不從之矣鄭知修蜃概散皆漆尊也者以稱散凡物無飾曰散直有漆明概散蜃之等漆外别有飾故知皆尊也云蜃畫為蜃形者亦謂漆畫之云蚌曰含漿尊之象者蚌蛤一名含漿含漿則是容酒之類故畫為蜃而尊名也云無飾曰散者以對概蜃獻象之等有異物之飾此無故曰散云疈事者即大宗伯云疈辜祭四方百物者也王氏昭禹曰疈辜以祭四方百物言疈則辜可知鄭氏鍔曰祭四方百物則疈磔牲體其尊用散取其散在四方各以羣分之意上文所謂四方山川者五岳四瀆下文所謂埋則山林川澤小宗伯兆四望之下又有兆山林川澤丘陵之文則知山林川澤與四方不同地官舞師教羽舞帥而舞四方之祭祀注羽析白羽為之形如帗也四方之祭祀謂四望也師疏云掌教兵舞謂教野人使知之國有祭山川則舞還帥領往舞山川之祀已下皆然案春官樂師有六舞并有旄舞施於辟雍人舞施於宗廟此無此二者但卑者之子不得舞宗廟之酬祭祀之舞亦不得用卑者之子彼樂師教國子故有二者此教野人故無旄舞人舞又曰但羽舞用白羽帗舞用五色繒用物雖異皆有柄其制相類故云形如帗也四方之祭祀謂四望也知者若以四方連百物則四望不止四方令單云四方四望五岳四瀆亦布在四方故知四方即四望也王氏昭禹曰四方為國翼蔽故以羽舞之羽有翼蔽也黄氏度曰山川之在四郊者蜡則其民得祭之四方鄭康成以為四望四望非州黨所得祭記曰順成之方其蜡乃通詩曰以社以方是則四郊之民各祭其方王則通祭之王制山川社稷四方則國子舞此州黨之祭故使舞徒舞謂之野舞野舞舞師教之舞師所以列於鄉官者以此右祭四方禮物樂舞尚書大傳六沴之禮散齋七日致齋新器絜祀用赤黍三日之朝于中庭祀四方從東方始卒于北方注禮致齋三日周禮凡祭祀前期一日宗伯帥執事卜日是為齊一旬乃祀也今此致齊即祀者欲得容三祀也盖八日為致齊明九日朝而初祀者一旬有一日事乃畢也新器赤黍改過之宜也中庭明堂之庭也或曰朝庭之庭也此祀五精之神其牲器粢盛有常禮記其異者也不祀天非正月亦以此禮祀此神也其祀禮曰格祀篇名也今亡也曰某也方祀曰播國率相行祀注篇中太祝贊主人辭也某也天子名也方祀祀四方也播讀曰藩藩國謂諸侯相助也言諸侯率其常事来即助行祭之禮也其祀也注大祝告神以君悔過之辭也周禮大祝掌六祀之辭以事鬼神祗祈福祥求永貞也曰若尒神靈洪祀六沴是合注神靈謂木精靈威仰火精赤熛怒土精含樞紐金精白招拒水精汁光紀及木帝大皥火帝炎帝土帝黄帝金帝少皥水帝顓頊木官勾芒火官祝融土官后土金官蓐收水官𤣥㝠皆是也古者生能其事死在祀典配其神而食合猶為也六沴是神靈所為也無差無傾無有不正注言神靈正直無類所謂皆是也若民有不敬事則㑹批之六沴注言民廣及天下有道者也事六事也㑹合也批推也言天下有道神靈亦合推内於六沴天子以天下為任者也六事之機以縣示我注六事貌言視聽思心王極也機天文也天文運轉以縣見六事之變異示我我謂天子我民人無敢不敬事上下王祀注我與民人無敢不敬畏六事上下君祀之所縣示變異者言皆悔過也上君祀靈威仰下君祀大皥之屬也右六沴祀四方四類蕙田案四類之兆見於周禮小宗伯與五帝四望並言則非小祀但不知所祀何神疏解家亦不同今姑存其說以備參考周禮春官小宗伯兆五帝於四郊四類亦如之鄭注兆為壇之營域鄭司農云四類三皇五帝九皇六十四民咸祀之賈疏先鄭云四類三皇五帝九皇六十四民咸祀之者案史記云九皇氏没六十四民興六十四民没三皇興彼雖無三王五帝之文先鄭意三皇已祀之明并祭五帝三王可知後鄭不從者以其兆五帝已下皆據外神太昊勾芒等配祭而已今輒特祭人帝於其中非所宜故不從是以易之也蕙田案以上先鄭三皇五帝九皇六十四民為四類之說鄭康成曰四類日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊賈疏後鄭注云四類日月星辰者以其言類明以氣類而為位以祭之故知是日月之等知兆日於東郊者案祭義云大明生於東故覲禮亦云拜日於東郊玉藻又云朝日於東門之外也又知兆月於西郊者月生於西知風師亦於西郊者以其五行金為𤾉土為風風雖屬土秋氣之時萬物燥落由風故風亦於西郊也云兆司中司命於南郊者以其南方盛陽之大司中司命又是陽故司中司命在南郊也云兆雨師於北郊者以其雨是水宜在水位故知雨師在北郊也鄭氏鍔曰先儒以四類為日月星辰攷之書云類于上帝惟天神則類而祭之以其神非一故也日出於東月始乎西其類宜於東西司中司命陽也其類宜於南雨師水也其類宜於北先儒以風師亦在西郊恐不然也五行箕星好風箕東方之宿也西則違其方位豈理哉蔡氏徳晉曰四望之兆本有定方其四類之兆則日出於東故兆於東郊月生於西故兆於西郊其北斗五星二十八宿北辰十二辰則嵗星及析木大火夀星三辰東方蒼龍七宿兆於東郊熒惑鎮星及鶉尾鶉火鶉首三辰南方朱鳥七宿兆於南郊太白及實沈大梁降婁三辰西方白虎七宿兆於西郊北辰北斗辰星及娵訾𤣥枵星紀三辰北方𤣥武七宿兆於北郊也蕙田案以上後鄭日月星辰為四類之說華氏鳴翁曰四類即大宗伯以疈辜祭四方百物者蕙田案以上華氏四方百物為四類之說蔡氏徳晉曰小宗伯四郊之兆有四類者何也類如倫類之類易云方以類聚物以羣分有若曰聖人之於民亦類也故物與物為類人與人為類四類者四郊各為一壇以祀一方之人鬼物鬽也鄭司農云四類三皇五帝九皇六十四民咸祀之此專以人鬼言也華鳴翁云四類即大宗伯以疈辜祭四方百物者此専以物鬽言也合考之而四類之義明矣類祭之神有四一曰報祀古昔君臣聖賢有功徳於民者所謂盛徳必百世祀也二曰厲祀古昔王侯之無後者祭法王祀泰厲諸侯祀公厲王制天子諸侯祭因國之在其地而無主後者是也三曰酺祭族師春秋祭酺康成注酺者民物災害之神若人鬼之步蝝螟之步也四曰蜡祭郊特牲蜡也者索也嵗十二月合聚萬物而索饗之也天子大蜡八主先嗇而祭司嗇享農及郵表畷祭坊與水庸迎貓迎虎是也四類之壇凖四望壇之例去王城十里當季辰之位辰戌丑未是也垣之外垣方九十步内為方壝壝之内相並為方壇四皆一成廣五歩崇四尺四階階二等壇上無木主祭時以帛為位而書神之名號祭畢則焚之也鄭康成以四類為日月星辰運行無常以氣類為之位則不宜在四望之下盖兆五帝則天神也四望則地示也四類則人鬼物鬽也此皆壇兆之在四郊者也上文左宗廟右社稷此廟壇在國中王宫之内者下文兆山川丘陵墳衍各因其方則壇兆之在四方者以自近而遠為序也蕙田案以上蔡氏報祀厲祀酺祭蜡祭為四類之說右四類兆高禖蕙田案月令仲春之月𤣥鳥至以太牢祀髙禖乃禮天子所御帶以弓韣授以弓矢於髙禖之前說者謂祀髙禖以祈子弓韣弓矢男子之祥也詩大雅克禋克祀以弗無子商頌天命𤣥鳥降而生商二詩推本稷契之生由於祈祀髙禖而得其日以𤣥鳥至故云天命𤣥鳥降而生商說者以為稷母履大人跡而有身契母吞鳦卵而有身非也然則高禖之禮上古有之秦漢以後無常祀每因皇嗣艱難則立髙禖以祈嗣焉禮記月令仲春之月𤣥鳥至至之日以太牢祀於髙禖天子親往注𤣥鳥燕也燕以施生時来巢人堂宇而孚乳嫁娶之象也媒氏之官以為候髙辛氏之世𤣥鳥遺卵娥簡吞之而生契後王以為媒官嘉祥而立其祠焉變媒言禖神之也疏案蔡邕以為禖神是髙辛已前舊有高者尊也謂尊髙之禖不由髙辛氏而始有高禖又生民及𤣥鳥毛詩傳云姜嫄從帝而祀於郊禖又云簡狄從帝而祈於高禖則是姜嫄簡狄之前先有禖神矣而此注立髙辛氏為禖神是高辛氏以前未有禖神參差不同也蕙田案註疏不同疏為較長后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢於高禖之前注御謂從往侍祠周禮天子有夫人有嬪有世婦有女御獨云帥九嬪舉中云也天子所御謂令有娠者於祠太祝酌酒飲於髙禖之庭以神恵顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮曰帶以弓韣禮之禖下其子必得天材謂疏祭高禖既畢祝官乃禮接天子所御幸有娠之人酌酒以飲之飲酒既畢乃屬帶此所御之人以弓韣又授之以弓矢於高禖之前而北面也禮此所御之人於禖神之前禖在壇上御者在下故云禖下以祭神必降福故云其子必得天材方氏慤曰后妃與闗雎所稱同義九嬪御者九嬪與九御也御即女御也女御八十一人每九人則屬一嬪故謂之九御言九嬪則包夫人言九御則包世婦矣以周官内宰考之故知其如此天子所御謂御而幸之者亦見曲禮琴瑟不御解禮謂酌之以酒也射者男子之事弓矢者男子之祥也男子生而懸弧者以此韣則弓衣也帶以弓韣者示其有能受之資也授以弓矢者予之以所求之祥也詩商頌𤣥鳥天命𤣥鳥降而生商傳𤣥鳥鳦也春分𤣥鳥降湯之先祖有娀氏女簡狄配高辛氏帝帝率與之祈于郊禖而生契故本其為天所命以𤣥鳥至而生焉疏毛以為契母簡狄於春分𤣥鳥至日祈於高禖而生契封商後世有此殷國今以髙宗有國本而美之釋鳥云燕燕鳦也色𤣥故又名為𤣥鳥毛氏不信讖緯以天無命鳥生人之理而月令仲春云是月也𤣥鳥至之日以太牢祀於高禖天子親往后妃率九嬪御𤣥鳥降之日有祀郊禖之禮也大戴禮帝系篇說帝嚳卜其四妃之子皆有天下云有娀氏女簡狄則契為髙辛之子簡狄髙辛之妃而云𤣥鳥至生商則是以𤣥鳥至日祈而得之也故以為春分𤣥鳥降湯之先祖簡狄祈郊禖而生契也𤣥鳥以春分而至氣候之常非天命之使生契但天之生契將令王有天下故本其欲為天所命以𤣥鳥至而生焉記其祈福之時美其得天之命故言天命𤣥鳥使下生商也𤣥鳥之来非從天至而謂之降者重之若自天来然月令季春戴勝降於桑注云是時指在桑言降者若始自天来重之故稱降也朱子集傳𤣥鳥鳦也春分𤣥鳥降髙辛氏之妃有娀氏女簡狄祈於髙禖鳦遺卵簡狄吞之而生契其後世遂為有商氏以有天下事見史記歐陽氏修曰天命𤣥鳥降而生商毛氏之說以今人情物理推之事不為怪宜其有之而鄭謂吞鳦卵而生契者怪妄之說也秦漢之間學者喜為異說鄭學博而不知統又特喜讖緯諸書故於怪說尤篤信由是言之義當從毛嚴氏粲曰契母簡狄於春分𤣥鳥至之日祈於髙禖而生契故推本言之何氏楷世本古義曰𤣥鳥生商其語近竒而事甚無怪毛氏之說正矣乃詩緯含神霧則云契母有娀浴於𤣥丘之水睇𤣥鳥銜卵過而墜之契母得而吞之遂生契中候契握則云𤣥鳥翔水遺卵流娀簡吞之生契封禮緯則云契姓子氏以其母吞鳦子而生紛紛語怪逓相祖述總不外吞卵一說而甚且以契為無父娀非嚳妃如劉向列女傳曰契母簡狄者有娀氏之長女也當堯之時與其妺姊浴於𤣥丘之水有𤣥鳥銜卵過而墜之五色甚好簡狄與其妺姊競往取之簡狄得而含之誤而吞之遂生契焉王嘉拾遺記曰商之始也有神女簡狄逰於桑野見黒鳥遺卵於地有五色文作八百字簡狄拾之貯以玉筐覆以朱紱夜夢神母謂之曰爾懐此卵即生聖子以繼金徳狄乃懐一年而有娠經十四月而生契祚以八百叶卵之文也雖遭旱厄後嗣興焉譙周則謂契生堯代舜始舉之必非嚳子以其父微故不著名羅泌闢之云世本大戴之書言昔帝嚳卜四妃之子皆有天下而稷之後為周周人既上推后稷為嚳子矣何所疑耶昔有娀氏有二女長曰東逖次曰建庇柬逖為嚳次妃是為簡翟故屈原云簡翟在臺嚳何宜乙鳥致貽女何喜又曰髙辛之靈盛子遭乙鳥而致貽夫古書之存者其言簡翟未甞不及於嚳也若司馬遷王逸亦既以簡狄為嚳妃矣而一則曰三人行浴因吞墜卵一則曰侍帝嚳臺上嘉墜卵而吞之總無以異於讖緯之說乃吕氏春秋更有異焉謂有娀氏有二佚女為之九成之臺飲食必以鼓帝令燕往視之鳴若諡隘二女愛而争持之覆以玉筐少選發而視之燕遺二卵北飛遂不反善乎蘇洵之言曰史載簡狄吞卵生契為商始祖神竒怪濫不亦甚乎使聖人而有異於衆庶也天地必將儲隂陽之和積元氣之英以生又安用此微禽之卵哉燕墜卵於前取而吞之簡狄其䘮心乎歐陽修亦云東漢之間學者喜為異說謂髙辛氏之妃陳鋒氏女感赤龍精而生堯簡狄吞鳦卵而生契姜嫄履大人迹而生后稷髙辛四妃其三皆以神異而生子盖堯有盛徳稷契後世皆王天下數百年學者喜為之稱述欲神其事故務為竒說也至帝摯無所稱故獨無說又蔡邕月令章句曰𤣥鳥感陽而至其来主為孚乳蕃滋故重其至日因以用事契母簡狄盖以𤣥鳥至日有事髙禖而生契焉故詩曰天命𤣥鳥降而生商其說獨與毛傳合當漢之世而有能持正論如兩人者正不多得若禇先生謂詩言契生於卵后稷人迹者欲見其有天命精誠之意耳鬼神不能自成須人而生奈何無父而生乎褚雖疑無父之說之非而未免惑於神怪感通之事未足稱達識也雖然以朱子之素持正論而猶以吞卵為可信况其他哉契為商開基之祖故謂生契為生商蕙田案𤣥鳥生商之說毛以為祀髙禖鄭以為吞鳦卵朱子兼用之歐陽以為義當從毛何氏以為毛孔說正是也大雅生民厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷傳生民本后稷也姜姓也后稷之母配髙辛氏帝焉禋敬弗去也去無子求有子古者必立郊禖焉𤣥鳥至之日以太牢嗣於郊禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢於郊禖之前履踐也帝髙辛氏之帝也武迹敏疾也從於帝而見於天將事齊敏也箋弗之言祓也姜嫄之生后稷如何乎乃禋祀上帝於郊禖以祓除其無子之疾而得其福也帝上帝也敏拇也介左右也夙之言肅也祀郊禖之時時則有大人之迹姜嫄履之足不能滿履其拇指之處心體歆歆然其左右所止住如有人道感己者也於是遂有身帝疏禋祀郊禖之時其夫髙辛氏帝率與俱行姜嫄隨之後踐履帝迹行事敬而敏疾故為神歆享既享其祭則愛而佑之於是為天神所美大為福禄所依止即得懐娠則震動而有身經言禋祀未知所祀之神故云古者必立郊禖焉言此祀祀郊禖也知者以婦人無外事不因求子之祭無有出國之理又禋祀以求子惟禖為然故知禋祀是祀禖也自𤣥鳥至之日以下皆月令文所異者惟彼郊作髙耳於祀之時乃以醴酒禮天子所御謂己被幸有娠者也使太祝酌酒飲之於郊禖之庭以神之恵光顯之也既飲之酒又帶以弓之韣衣授以弓矢使執之於郊禖之前弓矢者男子之事使之帶弓衣執弓矢冀其所生為男也鄭於月令之注其意則然惟髙禖異耳故鄭注云高辛氏之世𤣥鳥遺鳦卵簡狄吞之而生契後王以為禖官嘉祥而立其祀焉以為由髙辛有嘉祥故稱髙禖蔡邕月令章句云髙禖祀名高猶尊也禖猶媒也言争先見之象謂之人先毛於此及𤣥鳥傳皆依作郊禖則讀髙為郊下傳云從於帝而見於天則此祭為祭天不祭人先也於郊故謂之郊不由髙辛亦不以髙為尊也郊天用特牲而此祭天用太牢者以兼祭先禖之神異於常郊故也鄭於此箋亦云禋祀上帝於郊禖則后稷未生之前已有郊禖之祀矣而月令注以為簡狄吞鳦卵生契後王以為嘉祥而立其祀又以契之後王始立此祀二義不同者鄭記王權有此問焦喬答云先契之時以自有禖氏祓除之祀位在南郊盖以𤣥鳥至之日祀之矣然得禋祀乃於上帝也娀簡吞鳦有子之後後王以為禖官嘉祥祀之以配帝謂之髙禖毛傳亦云郊禖者以古自有于郊克禋之義又據禮之成文耳祀天而以先禖配之義如后土祀以為社此是鄭沖弟子為說以申鄭義其意言髙辛己前祭天於郊亦以先禖配之謂之郊禖至高辛之世以有吞鳦之事以為禖之嘉祥又以髙辛之世禖配此祭故改之而為髙禖故此箋從傳為郊祀禮解其高義後王以為禖官嘉祥而立其祀謂立禖以配郊非謂立郊求子始於後王鄭意或當然也如此為說可得合詩禮二注耳然禮注為髙辛之世者謂髙辛之後世子孫猶號髙辛其時簡狄吞鳦卵生契如此得與稷同時為堯臣耳朱子集傳民人也謂周人也時是也姜嫄炎帝後姜姓有邰氏女名嫄為髙辛之世妃精意以享謂之禋祀祀郊禖也弗之言祓也祓無子求有子也古者立郊禖盖祭天於郊而以先媒配也變媒言禖者神之也其禮以𤣥鳥至之日用太牢祀之天子親往后率九嬪御乃禮天子所御帶以弓韣授以弓矢於郊禖之前也履踐也帝上帝也武跡敏拇歆動也猶驚異也介大也震娠也夙肅也生子者及月辰居側室也育養也姜嫄出祀郊禖見大人迹而履其拇遂歆歆然如有人道之感於是即其所大所止之處而震動有娠乃周人所由以生之始也蕙田案集傳云祀天于郊而以先媒配據祀髙禖在仲春之月冬至圜丘孟春祈榖皆是郊天不聞仲春之月又有郊天一祭恐不必如此說羅氏泌路史臯禖之神女媧是享末世已失其源謂為娀簡之所託者疏矣昔者駘姜從嚳郊禖則郊媒之禮古先之世有之矣娀駘同列豈得為娀簡哉而五經異義乃以為簡狄吞乙卵而生子後王以為禖官嘉祥從而祠之故王權為問謂舊注以言先商之時未有髙禖生民禋祀以祓無子而姜嫄禋祀上帝以生契則郊禖非立於生契之後鄭志焦喬答云先商之時自有禖氏祓除之祀位在南郊以𤣥鳥至之日祠之彼其所禋乃於上帝至娀簡吞鳦之後後王乃復祠之以配帝若昔先媒則廢之矣斯說為覈然乃不知其為女皇至商而祀簡狄迨周而祭姜嫄時各推其本而配之亦猶后稷之神古祠帝柱逮周而易以棄事資沿革隨世而有變易此蔡邕所以謂禖神髙辛以前之所舊有不由於高辛也束晳云臯禖者人之先也盧植乃云𤣥鳥至時隂陽中而萬物生於是以三牲請於髙禖之神因其明顯故謂之髙因其求子故謂之禖而古有禖氏之官因以為之神斯得之矣秦廢典祀及漢武晚無子於是始立禖祠城南下洎北齊爰以太昊配之青帝壇之南郊旁隋唐因之及皇朝景祐四年乃以春分之日壇於南郊祠青帝而配以伏羲與嚳猶不及女禍云嚴氏粲曰姜嫄為髙辛氏後世子孫之妃能精意以享能備禮以祀祈於高禖之神以祓除其無子之疾天帝本無迹今其来格若有歩武之迹姜嫄奉祀周旋若隨天帝之步武即有所感也履帝武言祭神如神在洋洋乎如在其左右也敏歆言感動之速大意言上帝降格即有身耳不必如鄭氏說歆歆然如有人道感己也於是神介助之依止之則震動而有身則夙早而不遲則生産之則長育之是為后稷也閟宫言彌月不遲謂滿十月即生是早也何氏楷世本古義曰堯既嗣嚳為帝則為嚳後者當屬堯之子孫稷不得為嚳後此周人所以特立姜嫄之廟而詠歌亦止及嫄彼有為爾也然祭法言周人禘嚳而郊稷者所謂禘者乃推其始祖之所自出而以始祖配之也則周人亦何甞不祀嚳乎又嫄若非嚳妃則何得行郊禖之禮此理甚明無容曲說黄子道周云髙禖或曰髙辛氏或曰有儷氏鄭氏曰禮於高禖之下其子必得天材盖古云然也又蔡邕束晳皆云髙禖人之先也陳際泰云祓祓除之義所以禱於郊以祓除不祥故用弓矢後世射弧星即其遺也殷大白云敏即膚敏之敏歆即歆居之歆孔氏解姜嫄得踐帝跡所由以髙辛之帝親行禋祀姜嫄行在後而踐帝之迹即上傳所云后妃率九嬪御是也踐足者直謂隨後行耳非必以足躡其踐地之處也將事齊敏者謂行祀天之事齊敬而速疾也鬼神食氣謂之歆謂祭而神享之也文獻通考載宋髙宗十六年禮部言竊詳生民之詩言履帝武敏歆先儒以敏為拇謂姜嫄履巨迹之拇以歆郊禖之神是生后稷以為從帝嚳祀禖神之應其說頗附㑹𤣥鳥生契之意如詩言繩其祖武傳言夫子歩亦歩趨亦趨皆繼踵相因循之意帝嚳引禖祀之禮姜嫄踵而行之疾而不遲故上帝所歆居然生子以見視履考祥其應亦速而後世弗深考經㫖傳注怪詭禨祥併為一談至北齊妃嬪參享黷而不蠲去禮逾逺歴世非之蕙田案履帝武敏歆其說難解嚴氏何氏之說頗為近理何氏似較長也魯頌閟宫有侐實實枚枚傳先妣姜嫄之廟在周常閉而無事孟仲子曰是禖宫也侐清淨也實實廣大也枚枚礱密也故疏孟仲子云是謂禖宫盖以姜嫄祈郊禖而生后稷名姜嫄之廟曰禖宫朱子集傳閟深閉也宫廟也時盖修之故詩人歌詠其事以為頌禱之詞史記殷本紀曰契母曰簡狄為帝嚳妃三人行浴見𤣥鳥卵取之因孕生契三代世表曰后稷母為姜嫄出見大人迹而履踐之知於身則生后稷禇少孫曰稷契之父皆黄帝之子也詩言契生於卵后稷人迹者欲見其有天命精誠之意耳奈何無父而生乎路史女皇氏女媧太昊氏之女弟出於承匡生而神靈亡景亡􅞗少佐太昊禱於神祗而為女婦正姓氏職婚婣通行媒以重萬民之判是曰神媒治百有三十載而落以其載媒是以後世有國是祀為髙禖之神因典祠焉五經通義王者祭天地仲春后妃郊禖亦祭天地也五經異義鄭𤣥曰𤣥鳥至之日以太牢祀於髙禖注曰髙辛氏之世娀簡狄吞燕子而生契後王以為禖官嘉祥其祀焉王權問曰以注言之先商之時未有髙禖生民詩曰克禋克祀以弗無子傳以為古者必以郊禖焉姜嫄禋祀上帝而生稷是則郊媒之祀非以生契之後立也焦喬答曰先商之時自必有禖氏祓除之祀位在南郊盖亦以𤣥鳥至之日祀之矣然其所禋乃於上帝娀簡狄吞鳯子之後後王以為禖官嘉祥祀之以配帝謂之髙禖月令廣義祀高禖以請子請子必以乙至之日者春分来秋分去開生之候鳥帝少昊司命之官也蕙田案注疏言祀天而以髙禖配後世遂有壇祀於南郊者非也南郊乃祭昊天上帝之所豈可雜以他神且因祀髙禖而及上帝尤為倒置考晉以後俱祀青帝庶或近之右經傳祀髙禖隋書禮儀志漢武帝年二十九乃得太子甚喜為立禖祀於城南祀以特牲因有其祀漢書戾太子傳初上年二十九始得太子甚喜為立禖祀使東方朔枚臯作禖祝東方朔傳朔之文詞有皇太子生禖賦枚乗傳乗孽子臯武帝春秋二十九迺得皇子羣臣喜故臯與東方朔作皇太子生賦及立皇子禖祝受詔所為皆不從故事重皇子也通典晉博士束晳云漢武帝晚得太子始為立高禖之祠髙禖者人之先也故立石以為主而祀之以太牢也蕙田案武帝元朔元年皇太子生為立禖師古曰求子之神也令臯作祭祀之文見戾太子傳及枚臯傳髙禖之見於漢書者止此後漢書禮儀志仲春之月立髙禖祠於城南祀以特牲通典魏禖壇有石青龍中造許慎云山陽人以石為主隋書禮儀志禮仲春以𤣥鳥至之日用太牢祀於髙禖晉恵帝元康六年髙禖壇上石中破為二詔問石毁今應復不博士議禮無髙禖置石之文未知造設所由既已毁破可無改造更下西府博議而束晳議以石在壇上盖主道也祭器敝則埋而置新今宜埋而更造不宜遂廢此議不用後得髙堂隆故事魏青龍中造立此石詔更鐫石令如舊置髙禖壇上埋破石入地一丈晉束晳髙禖壇石議元康六年髙禖壇上石破為二段詔書問置此石幾時出何經典今應復否博士議禮無髙禖置石之文未知設造所由既已毁破無可改造說髙辛氏有簡狄吞卵之祥今此石有吞卵之象盖俗說所為而史籍無記可但收聚復於舊處而已太常以為吞卵之言盖是逸俗之失義因令毁破便宜廢除下四府博士議賦曹屬束晳議後得高堂隆故事詔更置石如舊夫未詳其置之故而欲必其可除之理不可然案郊祀志秦漢不祀郊禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主繇来尚矣祭禮龜䇿祭器敝則埋之而改置新石今破則宜埋而更造不宜遂廢收集破石積之故處於禮無依於事不肅愚所未安也通志宋元嘉中得晉郊禖之石或曰百姓祀其傍或謂之落星也隋書禮儀志梁太廟北門内道西有石文如竹葉小屋覆之宋元嘉中修廟所得陸澄以為孝武時郊禖之石然則江左亦有此禮矣後齊高禖為壇於南郊傍廣輪二十六尺髙九尺四陛三壝每嵗春分𤣥鳥至之日皇帝親帥六宫祀青帝於壇以太昊配而祀髙禖之神以祈子其儀青帝北方南向配帝東方西向禖神壇下東陛之南西向禮用青珪束帛牲共以一太牢祀日皇帝服袞冕乗玉輅皇后服禕衣乗重翟皇帝初獻降自東陛皇后亞獻降自西陛並詣便坐夫人終獻上嬪獻於媒神訖帝及后並詣攅位乃送神皇帝皇后及羣官皆拜乃撤就燎禮畢而還蕙田案齊以前祀髙禖之禮不詳至是乃祀青帝似為得之北史劉芳傳芳轉太常卿上疏曰禮儀志云髙禖祀於城南不云里數故今仍舊隋制亦以𤣥鳥至之日祀髙禖於南郊壇牲用太牢一蕙田案禖祀用郊壇不已甚乎通典唐月令亦以𤣥鳥至之日以太牢祀於髙禖天子親往宋史禮志唐明皇因舊月令特存其事開元定禮已後不著仁宗本紀景祐四年二月乙丑置赤帝像於宫中祈嗣禮志初仁宗未有嗣景祐四年二月以殿中侍御史張奎言詔有司詳定禮官以為月令雖可據然周官闕其文漢志郊祀不及禖祠獨枚臯傳言皇子禖祀而已後漢至江左概見其事而儀典委曲不可周知惟髙齊禖祀最顯妃嬪參享黷而不蠲恐不足為後世法唐明皇因舊月令特存其事開元定禮已後不著朝廷必欲行之當築壇於南郊春分之日祀青帝本詩克禋以祓之義配以伏羲帝嚳以禖神從祀報吉為禖之先石為主依東漢晉隋之舊牲用太牢樂以升歌儀視先蠶有司攝以乗輿所御弓矢弓韣致禖神前祀已與胙酒進内以禮所御使齋戒受之每歳孟春有司申請以俟上㫖命曰特祀即用其年春分遣官致祭壇髙九尺周廣二丈六尺四出陛陛廣五尺設三壝壝别二十五步青石主長三尺八寸用木生成之數形凖廟社主植壇上稍北露首三寸玉幣青色牲用牛羊豕各一如盧植說樂章祀儀凖青帝罇器神座如勾芒唯有司攝事受福不飲為異祀前一日内侍請皇后宿齋别寢宫嬪從齋庭量地設香案褥位各二重行南向以望禖壇又設褥位香案北重行皇后服禕衣褥位以緋宫嬪服宫中朝賀之服褥位以紫祀日有司以福酒胙肉弓矢弓韣授内臣奉至齋所置弓矢弓韣於箱在香案東福酒於坫胙肉於俎在香案西内臣引宫嬪詣褥位東上南向立又詣皇后幄次跪請皇后行禮導至褥位南向立請再拜在位者皆再拜導皇后詣香案褥位上香帶弓韣受弓矢轉授内臣置於箱又請再拜内臣進胙皇后受訖轉授内臣次進福酒内侍曰請飲福内臣又奉請再拜乃解弓韣内臣跪受置於箱導皇后歸東向褥位又引宫嬪最髙一人詣香案上香帶弓韣受弓矢轉授左右置於箱請再拜左右授福酒請飲福再拜解弓韣還位又引以次宫嬪悉如上儀俟俱復内侍奉請皇后詣南向褥位皆再拜内侍跪奏禮畢導皇后歸幄次宫嬪並退是嵗宫中又置赤帝像以祈皇嗣李絢傳仁宗未有繼嗣絢因奉祀髙禖還奏賦大指言王者遠嬖寵近柔良則神降之福子孫繁衍帝嘉納仁宗本紀寶元二年八月甲戌皇子生辛巳命輔臣報祠髙禖禮志寳元二年皇子生遣參知政事王鬷以太牢報祀準春分儀惟不設弓矢弓韣著為常祀遣兩制官攝事玉海仁宗寳元二年八月皇子生先是見赤蛇出於殿墀神光照庭至是遣報祀髙禖宋史仁宗本紀慶歴元年春正月壬申詔歲以春分祀髙禖禮志慶歴三年太常博士余靖言皇帝嗣續未廣不設弓矢弓韣非是詔仍如景祐之制玉海皇祐三年九月四日詔禖壇徙爽塏之地皇祐四年六月十四日禖壇徙郊壇東南奉先寺同知禮院張師中言其卑陋保章正皇甫定等請徙於圜丘之東鎮安軍文學鄭孝先謂宜在東方長男之位命禮官司天監詳定嘉祐二年五月甲申徙禖壇於南郊壇東宋史禮志神宗熙寜二年皇子生以太牢報祀髙禖惟不設弓矢弓韣既又從禮官言案祀儀青帝壇廣四丈髙八尺今祀髙禖既以青帝為主其壇髙廣請如青帝之制又祀天以髙禖配今郊禖壇祀青帝於南郊以伏羲髙辛配復於壇下設髙禖位殊為爽誤請準古郊禖改祀上帝以高禖配改伏羲高辛位為髙禖而徹壇下位詔髙禖典禮仍舊壇制如所宜改犢為角握牛髙禖祝版與配位並進書焉又言伏羲髙辛配祝文並云作主配神神無二主伏羲既為主其高辛祀文請改云配食於神玉海熙寜五年閏七月己酉判太常章衡請遵故事祀禖飲福受胙以應求男之祥上曰帝王子孫自有天命宋史樂志熙寜以後祀髙禖六首降神髙安六變容臺講禮禖宫立祠司分届後帶韣陳儀嘉祥萃止靈馭来思皇支蕃衍永固邦基升降正安郊禖之應肇自生商誕膺寳命濬發其祥天材蕃衍徳稱君王本支萬世與天無疆奠玉幣嘉安昔帝高辛先禖肇祀爰揆仲陽式祈嘉祉陳之犧牲授以弓矢敷祐皇宗施於孫子酌獻祐安昭薦精忠靈承瑞命青帝顧懐神禖儲慶胙以蕃昌協於熙盛螽斯衆多流於雅詠亞終獻文安赫赫髙禖萬世所祀其徳不回錫茲福祉蕃衍椒聊和平芣苢傳類降康世濟其美送神理安禮奠蠲衷祭儀竣事丕擁靈休蕃衍皇嗣文獻通考元豐四年天章閣待制羅拯言髙禖壇在南郊制不甚廣上設神位三皆宻列祭器執事之人殆不容足祀官奠獻或側身拜於褥位乞令修展以叶禮制詔太常禮院詳定以聞禮官言髙禖壇髙八尺廣二十六尺上以青帝為主伏羲髙辛配侑髙禖設位壇下壇上神位三陳設祭器樂架實為狭隘酌奠拜跪及執事進退不可觀禮案祀儀青帝壇廣四丈髙八尺今祀髙禖既以青帝為主其壇髙廣宜如青帝之制從之尚書禮部言先農正座帝神農氏祝文云以后稷配神作主配座后稷云作主侑神謹案春秋公羊傳曰郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止何休曰天道闇昩故推人道以接之然則古者作主配神之意本施於祖宗其間有雖非祖宗而祝辭可以言作主配神者如五人帝之於五帝是推人道以接天神勾龍之於社后稷之於稷是推人道以接土榖之祗其祝辭俱云作主可也若並為外祭而正配座又皆人鬼則以正座為主其配座但合食從祭而已伏請於神農祝文云以后稷配於后稷云配食於神髙禖以伏羲高辛配祝文並云作主配神神無二主伏羲既為主其髙辛祝文改云配食於神從之宋史禮志元祐三年太常寺言祀儀髙禖壇上正位設青帝席配位設伏羲高辛氏席壇下東南設髙禖從祀席正配位各六爼實以羊豕腥熟髙禖位四爼實以牛腥熟祀日兵部工部郎中奉羊豕俎升壇諸正配位髙禖位爼則執事人奉焉竊以青帝為所祀之主而牲用羊豕禖神因其嘉祥從祀而牲反用牛又牛俎執事者陳之而羊豕爼皆奉以郎官輕重失當請以二牲通行解割正配從祀位並用皆以六曹郎官奉俎今羊俎以兵部豕爼以工部牛俎請以户部郎官文獻通考徽宗政和二年詔春分祀髙禖青帝以帝伏羲氏髙辛氏配簡狄姜嫄從祀宋史徽宗本紀政和三年四月庚戌班五禮新儀禮志政和新儀春分祀髙禖以簡狄姜嫄從配皇帝親祀並如祈榖祀上帝儀惟配位作承安之樂而増簡狄姜嫄位牛羊豕各一髙宗紹興元年太常少卿趙子晝言自車駕南巡雖多故之餘禮文難備至於祓無子祝多男所以係萬方之心盖不可闕文獻通考紹興元年太常少卿趙子晝言祀典每嵗春分日祀髙禖青帝正位配以伏羲髙辛從以簡狄姜嫄弓矢弓韣内出備器禮畢收徹三從祀神位前禮料入禁中行禮乞自来嵗之春復行髙禖之祀從之玉海紹興二年二月禮官上春分行禮飲福受胙儀注三年正月博士趙霈請宸翰製祝辭以代親祠十二年十二月博士劉嶸請講求禖壇方位制度禮官請建於行宫東南巽地城外宋史髙宗本紀紹興十六年八月辛丑築髙禖壇文獻通考紹興十六年監察御史王鎡言禖祀之壇卑陋弗稱有司致齋於社亭之上行事於民居之後遇雨望祭徙至江館去壇既逺事涉瀆慢未足以彰禋潔祀為帝王求嗣之禮乞申命攸司攷昔制度一新壇宇仍命大臣取生民姜嫄從於帝而見於天之義月令以太牢祀於髙禖天子親往之文詳加定議乞法駕臨祀必獲聖嗣詵詵之福詔禮部考詳先時禮部太常寺檢㑹國朝禮例髙禖壇在國之東南依儀合差三獻官監察御史等各前十日受誓戒又排設登歌之樂内行事官就南郊齋宫宿齋牲用牛羊豕每位籩豆各一十二昨縁車駕駐蹕臨安府權於望湖門外恵照院齋宫設位行禮牲用羊豕毎位籩豆各六差獻官一員行禮不受誓戒亦不設登歌之樂今来劉嶸所請欲令臨安府於行宫東南城外踏逐隨宜修建及踏逐近便寺觀權充行事官齋舍所有設登歌樂差行事官受誓戒并合用牲牢禮料籩豆之數並依見今大祀禮例差官排辦從之又禮部言竊詳生民之詩言履帝武敏歆先儒以敏為拇謂姜嫄履巨跡之拇以歆郊禖之神是生后稷以為從帝嚳祀禖神之應其說頗附㑹𤣥鳥生契之意如詩言繩其祖武傳言夫子步亦步趨亦趨皆繼踵相因循之意履帝武敏歆猶言帝嚳行禖祀之禮姜嫄踵而行之疾而不遲故上帝所歆居然生子以見視履考祥其應亦速而後世弗深考經㫖傳註怪詭禨祥併為一談至北齊妃嬪參饗黷而不蠲去禮逾逺歴世非之惟禮記通典載大唐月令具言仲春𤣥鳥至之日以太牢祀於髙禖天子親往而政和新禮亦有皇帝親享髙禖之儀縁祖宗以来未甞舉行親祠惟兩制官并有司攝事今欲乞比祖宗故事増重祀典依每歳元日祈穀於上帝禮例命執政官攝事前期申取指揮施行又檢國朝㑹要每嵗春分遣官致祭牲用牛羊豕各一弓矢弓韣以乗輿所御者權降付外有司奉祠訖以福胙弓矢弓韣授内侍以進皇后宫嬪就宫中受胙飲福今欲遇祠髙禖及徹禮饌進内依景祐儀制行飲福受胙之禮所有牲牢亦依祖宗故事用牛羊豕務從豐備以盡祈天錫羡之誠從之宋史髙宗本紀紹興十七年二月乙巳親祀髙禖禮志紹興十七年車駕親祀髙禖如政和之儀文獻通考紹興十七年禮部太常寺言案禮經仲春天子親祀髙禖徽宗皇帝修成親祠之制具載新儀未經舉行望皇帝親祠以祈多男之祥副天下之望從之二月上親祀髙禖以普安郡王為亞獻恩平郡王為終獻玉海紹興十七年二月三日上親祀儀注上服通天冠絳紗袍乗輦詣壇大次降輦入次服袞冕執大圭奏儀安嘉安景安之樂帝臨降康之舞甲辰以太師檜為親祀使乙巳上親祀青帝於東郊以伏羲髙辛配普安郡王亞獻恩平郡王終獻祀姜嫄於壇下牲用太牢玉用青幣放其玉之色樂舞如南郊之制禮畢御端誠殿受賀樂曲十四降神用髙安升壇用正安奠玉幣用嘉安捧俎用豐安青帝酌獻用祐安亞終獻用文安送神用理安上祀髙禖禮畢十七日有司奏築壇之所有瑞氣之應修壇之日有六鶴之祥文獻通考宋髙宗駐蹕臨安府權於望湖門外恵照院齋宫設位行禮玉海紹興二十三年三月己未校書郎董徳元請髙禖與青帝分為二壇禮官請如舊制宋史樂志紹興祀髙禖十首降神髙安圜鍾為宫聿分春氣施生在時禖宫肇啟精意以祠禮儀告備神其格思厥靈有赫錫我繁釐黄鍾為角眷此尊祀實惟仲春青圭束帛克祀克禋庶䝉嘉恵嗣續詵詵神之降鑒雲車来臻太蔟為徴猗歟禖宫祀典所貴粤自艱難禮或弗備以迄於今始建壇壝願戒雲車歆此誠意姑洗為羽春氣肇分萬類滋榮惟此祀事皆象發生求神以類式昭至誠庶幾来格子孫繩繩升壇正安有奕禖宫在國之南壇壝既設威儀孔嚴登祀濟濟神兮顧瞻佑我皇祚宜百斯男奠玉幣嘉安青律載陽有鳦頡頏祈我繁祉立子生商三牲既薦玉帛是將克禋克祀有嘉其祥奉俎豐安祇祓禖壇潔蠲羊豕博碩肥腯爰具牲醴執事駿奔肅將俎几神其顧歆永錫多子青帝位酌獻祐安伏羲髙辛酌獻並同瑞鳦至止祀事孔時酌以清酒祼獻載祇神具醉止介我蕃禧乃占吉夢維熊維羆亞終獻文安中春涓吉蕆事禖祠禮備樂作籩豆孔時貳觴畢舉薦獻無違庶幾神恵祥啓熊羆送神理安嘉薦令芳有嚴禋祀神来燕娭永既醉止風馭言還栗然歘起以祓以除錫我蕃祉金史章宗本紀明昌六年二月己未始祭髙禖禮志明昌六年章宗未有子尚書省臣奏行髙禖之祀乃築壇於景風門外東南端當闕之卯辰地與圜丘東西相望壇如北郊之制嵗以春分日祀青帝伏羲氏女媧氏凡三位壇上南向西上姜嫄簡狄位於壇之第二層東向北上前一日未明三刻布神位省牲器陳御弓矢弓韣於上下神位之右其齋戒奠玉幣進熟皆如大祀儀青帝幣玉皆用青餘皆無玉每位牲用羊一豕一有司攝三獻司徒行事禮畢進胙倍於他祀之肉進胙官佩弓矢弓韣以進上命后妃嬪御皆執弓矢東向而射以次飲福享胙章宗本紀承安元年二月甲子命有司祠髙禖如新儀二年五月皇子生六月乙巳命禮部尚書張暐報祀髙禖明史禮志嘉靖九年青州儒生李時颺請祠髙禖以祈聖嗣禮官覆以聞帝曰髙禖雖古禮今實難行遂寢其議已而定祀髙禖禮春明夢餘録髙禖臺明初無此祀世宗嘉靖中始設木臺於皇城東永安門北震方壇上皇天上帝南向騂犢花璧奉獻皇考配西向牛一羊一豕一髙禖在壇下西向牛一羊一豕一禮三獻樂九奏陳八佾皇帝位壇下北向后妃嬪位壇南數十丈外北向用帷壇下陳弓矢弧韣如后妃嬪之數祭畢女官導后妃嬪至髙禖前跪取弓矢授后妃嬪受而納於弧韣張璁言頃者生員李時颺監生張岑各疏請舉祀郊禖之禮以祈聖嗣夫古后稷之生祈於郊禖孔子之生亦禱於尼山禱之說古禮有之然大雅既醉之詩曰公尸嘉告曰君子萬年永錫祚允曰釐爾女士從以孫子夫公尸之告皆祖考之錫福也皇上仁孝誠敬天地神明日監在茲况祖考之親者乎臣願當兹慎選淑女之時以廣求嗣續之誠告於太廟以祈祖考之祐以慰聖母之心上嘉其請擇十二月二十四日行禮夏言充祈嗣醮壇監禮使世宗實録十年十一月復於欽安殿建祈嗣醮以禮部尚書夏言充監禮使侍郎湛若水顧鼎臣充迎嗣導引官啓醮及除壇日帝親詣進香行禮餘遣大臣五人迭代圗書編髙禖設木臺於震方皇城東永安門之北祭品上帝儀同祈榖皇考儀同髙禖太羮一和羮二簠簋各二籩豆各六牛一羊一豕一帛用紅上拜位設於壇下北向后妃位七設於壇南數十丈外北向用帷待贊行禮行欽天監擇吉具奏前三日太常卿奏齋戒於宫中上及皇后以下齋三日執事内外官齋一日前二日太常寺卿光禄卿奏省牲如儀昊天上帝正位皇考獻皇帝配位西向髙禖設於壇下西向陳弓韣弓矢如妃嬪之數質明上祭服后禮服妃嬪各服其服上率后以下乗輅車至壇所降導駕官導上至拜位女官導后以下各至拜位典儀唱執事官各司其事内贊奏就位上就位傳贊同后以下帷中就位典儀唱迎神内贊奏陞壇上陞至上帝前奏跪奏搢圭奏上香司香官捧香跪進於左上三上香訖奏出圭導至皇考前儀同分獻官詣髙禖神位前上香訖退立於東奏復位奏四拜典儀唱奠帛内贊奏陞壇上陞至上帝前跪奏搢圭奏奠帛捧帛官以帛跪進於右上受帛訖導至皇考前儀同奏復位典儀唱行亞獻禮終獻禮儀同太常卿進立於壇前東向立唱賜福胙内贊奏詣飲福位奏飲福酒上飲訖光禄寺卿捧福胙跪於左内贊奏受胙上受訖奏出圭俯伏興平身奏復位奏四拜平身傳贊同典儀唱徹饌唱送神内贊奏四拜平身傳贊同典儀唱讀祝讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位典儀唱望燎内贊奏詣望燎位上詣望燎位燎畢内贊奏禮畢分獻太常寺官俱退女官導皇后以下至髙禖神位前贊跪皇后以下皆跪贊受弓矢女官跪詣神位取弓矢以次授皇后以下受訖納韣贊俯伏興再拜禮畢退執事捧禖神位帛饌詣燎所焚之上率后以下乗輅還宫蕙田案世宗定制郊禖改祀昊天上帝因明無五帝祀也然太褻矣大學衍義補丘氏濬曰不孝有三無後為大盖祖宗一氣相傳自開闢天地有人類以来至於今日生生禪續之不已一旦至我身而閼絶焉豈非大變事乎矧有天下之大宗社之重將以綿千百世之宗支而為億兆生民之主宰尤不可不加之意焉然是事也雖若人為而實由乎天是以自古聖王制為郊禖之祀以為祈嗣之禮必順天時感物類精意以禋之備禮以祀之庶幾髙髙在上者或有所聞而冀有感格之祥後世不知出此乃信方士之惑而設素饌投青詞而求之窈㝠茫昩之外而不知吾聖人自有當行之禮也臣竊以為古者祀髙禖於郊壇郊者祀天之常所而使后妃嬪御涉於其間不無褻瀆况郊在國都之外而后妃嬪御之出入亦或有不便焉者臣請擇宫中潔浄之地立為禖壇中設帝位而以髙禖配庶於行禮為宜蕙田案古者祭祀之事必備内外之官後世一切典禮婦人不預雖髙禖係后妃應行之禮往往以為難行而罷此古今禮數之異也丘氏之說或亦有可采者歟右歴代祀髙禖五禮通考卷五十五
