body:
  text: 五禮通考卷一百五十六刑部尚書秦蕙田撰嘉禮二十九饗燕禮蕙田案周禮大宗伯以饗燕之禮親四方之賔客賈疏饗禮烹太牢以飲賔獻依命數在廟行之燕禮其牲狗行一獻四舉旅降脱屨升堂無算爵以醉為度行之在寝成十二年左傳晋郤至曰饗以訓恭儉燕以示慈惠宣十六年定王曰王享有體薦宴有折俎公當饗卿當燕周語王公立飫則有房烝親戚宴享則有殽烝杜注享有體薦設几而不倚爵盈而不飲殽乾而不食燕則折俎相與共食孔疏王為公侯設饗則半觧其體而薦之為不食故不觧折燕禮體觧節折升之於俎即殽烝其物觧折使可食又饗則君親獻燕則不親獻此饗與燕之别也而饗之禮有三天子享元侯一也兩君相見二也凡饗賔客三也詩小雅彤弓覲禮饗禮乃歸周禮掌客三饗壹饗大行人饗禮九獻七獻五獻郊特牲大饗尚腵脩此天子享諸侯之大饗襄四年左傳穆叔曰三夏天子所以享元侯是也仲尼燕居言禮有九大饗有四兩君相見揖讓而入門入門而升堂升堂而樂闋下管象舞夏籥序興陳其薦俎序其禮樂備其百官坊記大饗廢夫人之禮是兩君相見之大饗成十二年左傳晋郤至曰世之治也諸侯間於天子之事則相朝於是乎有饗宴之禮是也左傳僖十二年齊侯使管夷吾平戎於王王以上卿之禮饗管仲三十年周公閲來聘饗有昌歜形鹽襄二十九年范獻子來聘公享之昭二年韓宣子来聘公享之等是凡饗賔客之大饗也饗禮以天子饗元侯為正兩君相見次之若殽烝之饗不得謂之大饗矣天子之大饗有等數周禮掌客凡諸侯之禮上公三饗三食三燕侯伯三饗再食再燕子男壹饗壹食壹燕大行人上公之禮廟中将幣三享王禮再祼而酢饗禮九獻食禮九舉諸侯之禮廟中将幣三享王禮壹祼而酢饗禮七獻食禮七舉諸子廟中將幣三享王禮壹祼不酢饗禮五獻食禮五舉是也鄭注饗設盛禮以飲賔賈疏云盛禮者以其饗有食有酒兼燕與食故云盛禮是燕不得為饗而饗則又兼燕與食矣考之禮惟諸侯燕其臣及公食大夫之禮見於儀禮而饗禮久亡今以散見於周禮傳記者類而輯之以著於燕禮之前而以儀禮及左傳所載春秋饗宴之禮及後世史事附焉周禮春官大宗伯以饗燕之禮親四方之賔客注賔客謂朝聘者子疏饗燕謂大行人云上公三饗三燕侯伯再饗再燕男一饗一燕饗烹大牢以飲賔獻依命數在廟行之燕者其牲狗行一獻四舉旅降脱屨升坐無算爵以醉為度行之在寢此謂朝賔若聘客則皆一饗其燕與時賜無數是親四方之賔客也秋官掌客掌四方賔客之牢禮之等數凡諸侯之禮上公三饗三食三燕侯伯三饗再食再燕子男壹饗壹食壹燕春秋宣公十六年左氏傳王享有體薦注享則半觧其體而薦之所以示共儉為疏王為公侯設享則半觧其體而薦之不食故不觧折所以示共儉也宴有折俎注體觧節折升之於俎物皆可食所以示慈惠也也疏王為公侯設宴禮體觧節折升之於俎即殽烝是其物觧折使皆可食共食噉之所以示慈惠也其宴飲殽烝其數無文若祭祀體觧案特牲饋食禮有九體則肩一臂二臑三肫四胳五正脊六横脊七長脇八短脇九此謂士禮也若大夫禮則十一體加脡脊代脇其諸侯天子無文或同十一公當享卿當宴王室之禮也注公謂諸侯名疏五等諸侯總為公故云公謂諸侯言諸侯親來則為之設享又設燕也享用體薦燕用折俎若使卿來雖為設享仍用公之燕法亦用折俎是王室待賔之禮也周語説此甚詳王召士季曰子弗聞乎禘郊之事則有全烝王公立飫則有房烝親戚宴享則有殽烝今叔父使士季實來惟是先王之宴禮欲以貽爾體觧節折而共飲食之於是乎有折俎以示容合好將安用全烝注國語者皆云禘祭宗廟郊祭天地則有全其牲體而升俎謂之全烝王公立飫即享禮也禮之立成者名為飫半觧其體而升於俎謂之房烝傳言體薦即房烝也親戚宴享則宴享禮同皆體觧節折乃升於俎謂之殽烝此傳略而為文猶是彼意故注皆取彼觧之成公十二年左氏傳晋郤至曰世之治也諸侯間於天子之事則相朝也於是乎有饗宴之禮享以訓共儉宴以示慈惠注享有體薦設几而不倚爵盈而不飲殽乾而不食所以訓共儉宴則折俎相與共食共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也注言宴享結好鄰國所以捍蔽其民蕙田案饗禮之大者有二秋官掌客及定王所言天子饗諸侯之禮郤至所言兩君相見之禮而大宗伯饗燕之禮實該之右統論饗燕周禮天官小宰以官府之六聨合邦治二曰賔客之聨事以法掌朝覲㑹同賔客之戒具令百官府共其財用治其施舍春官司几筵凡大朝覲大饗射王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几疏云饗者謂王與諸侯行饗禮於廟即大行人云上公三饗之屬是也昨席莞筵紛純加繅席畫純筵國賔於牖前亦如之左彤几注昨讀曰酢鄭司農云國賔老臣也為布几筵於牖前元謂國賔諸侯來朝孤卿大夫來聘後言几者使不蒙如也朝者彫几聘者彤几則疏亦如之亦如同二種席也几席雖同但上文鬼神右几此文生人則左几也大司樂大祭祀宿懸遂以聲展之大饗如祭祀典庸器掌藏樂器庸器及祭祀帥其屬而設筍虡陳庸器饗食亦如之蕙田案以上大饗設几席樂器秋官掌客王合諸侯而饗禮則具十有二牢庶具百物備注饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫敵用也疏哀七年吴來徴百牢魯使子服景伯對曰周之王也上物不過十二以為天之大數也上公以九為節則十二者是王禮之數也云以公侯伯子男盡在是兼饗之者以經云合則時㑹殷同盡在於是兼饗故用十二牢也今兼饗諸侯無二相敵故云莫敵用也天官宰夫凡朝覲㑹同賔客以牢禮之法掌其牢禮地官牛人凡饗食共其膳羞之牛封人賔客則飾其牛牲夏官羊人賔客共其灋羊蕙田案以上大饗牲牢之具天官酒正共賔客之禮酒共后之致飲於賔客之禮醫酏糟皆使其士奉之酒人共賔客之禮酒飲酒而奉之漿人掌共王之六飲共夫人致飲於賔客之禮清醴醫酏糟而奉之蕙田案注疏謂禮酒王所致酒王致酒后致飲又云禮酒饗燕之酒王不親饗而使人各以其爵致之是不饗則致於其館親饗則陳之於廟可知又案以上大饗酒醴之具春官小宗伯辨六彞之名物以待祼將辨六尊之名物以待賔客注待者有事則給之賔疏司尊彞唯為祭祀陳六彞六尊不見為客陳六尊此兼言賔客則在廟饗賔客時陳六尊亦依祭祀四時所用唯在野外饗不用祭祀之尊故左傳云犧象不出門也若然則上六彞亦為賔客而辦之典瑞祼圭有瓉以祼賔客注爵行曰祼上疏以祼賔客則大行人云公再祼侯伯一祼之等是也云爵行曰祼者此周禮祼皆據祭而言至於生人飲酒亦曰祼故投壺禮云奉觴賜灌是生人飲酒爵行亦曰祼也凡賔客之事共其玉器而奉之注玉器謂祼圭之屬之疏凡賔客謂再祼之等奉者送向所行禮之處也鬰人掌祼器凡賔客之祼事和鬰鬯以實彞而陳之疏賔客祼大行人云公再祼之等是也和鬰鬯陳於廟中饗賔客之處也凡祼玉濯之陳之以賛祼事蕙田案以上大饗祼具天官外饔掌祭祀之割亨共其脯脩刑膴陳其鼎俎實之牲體魚腊凡賔客之饗食之事亦如之獸人凡賔客共其死獸生獸䱷人凡賔客共其魚之鱻薧腊人凡賔客共其脯腊凡乾肉之事地官川衡賔客共川奠澤虞賔客共澤物之奠場人賔客共其果蓏天官凌人賔客共冰春秋昭公四年左氏傳古者日在北陸而藏冰其出之也朝之禄位賔食於是乎用之周禮天官籩人賔客之事共其薦籩羞籩醢人凡祭祀共薦羞之豆實賔客亦如之醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賔客亦如之疏賔客據饗食致之春秋僖公三十年左氏傳王使周公閱來聘饗有白黑形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉榖鹽虎形以獻其功吾何以堪之周禮天官亨人祭祀共太羮鉶羮賔客亦如之疏饗食亦應有太羮故云賔客亦如之地官舍人凡祭祀共簠簋實之陳之賔客亦如之注言實之陳之據饗食之時也舂人凡饗食共其食米注饗有食米則饗禮兼燕與食疏燕禮無食米食禮無飲酒若饗禮有飲酒有食米故云饗禮兼燕與食也若然經云其食米則饗禮但供食米也􅐪人凡賔客共其簠簋之實饗食亦如之秋官掌客凡諸侯之禮上公豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳侯伯豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳子男豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳蕙田案據注疏以為饔餼之數大饗時當亦如是禮記郊特牲鼎俎竒而籩豆偶隂陽之義也籩豆之實水土之品也不敢用䙝味而貴多品所以交於神明之義也蕙田案以上大饗陳鼎俎籩豆簠簋之具周禮春官世婦掌女宫之宿戒及祭祀比其具詔王后之禮事帥六宫之人共齍盛相外内宗之禮事大賔客之饗食亦如之注比帥詔相其事同法疏賔客饗食王后亦有助王禮賔之故内宰凡賔客之祼獻瑶爵皆賛注云謂王同姓及二王之後來朝覲為賔客者祼之禮亞王而禮賔獻謂王饗燕亞王獻賔也瑶爵所以亞王酬賔也是其饗有后事也蕙田案此條大饗内官戒具雞人大祭祀夜呼旦以嘂百官凡國之大賔客亦如之天官閽人設門燎蹕宫門廟門凡賔客亦如之疏燭在地曰燎謂若天子百公五十侯伯子男皆三十所作之狀蓋百根葦皆以布纒之以蜜塗其上若今蠟燭矣對人手爇者為手燭故云地燭也賔客在宫中廟中謂若饗食在廟燕在寢皆為設門燎及蹕止行人春秋襄公三十一年左氏傳諸侯賔至甸設庭燎禮記郊特牲庭燎之百由齊桓公始也注僣天子也庭燎之差公蓋五十侯伯子男皆三十入疏庭燎之百者謂於庭中設火以照燎來朝之臣夜者因名火為庭燎也禮天子百燎上公五十侯伯子男三十蕙田案以上大饗賔至庭燎周禮夏官齊僕掌馭金路以賔注以待賔客朝覲宗遇饗食皆乗金路其灋儀各以其等為車送逆之節注節謂王乗車迎賔客及送相去逺近之數上公九十歩侯伯七十歩子男五十歩疏郊特牲云覲禮天子不下堂而見諸侯是受贄受享皆無迎法今言朝覲宗遇饗食皆乗金路者謂因此朝宗覲遇而與諸侯行饗食在廟即有乗金路迎賔客之法也引之者欲見饗食迎賔與受享同司儀所云亦受饗食之禮也春官樂師教樂儀行以肆夏趨以采齊車亦如之環拜以鐘鼓為節注鄭司農云肆夏采齊皆樂名或曰皆逸詩謂人君行歩以肆夏為節疾趨於歩則以采齊為節今時行禮於太學罷書以鼓陔為節𤣥謂行者謂於太寢之中趨謂於朝廷然則王出既服至堂而肆夏作出路門而采齊作其反入至應門路門亦如之此謂歩迎賔客王如有車出之事登車於太寢西階之前反降於阼階之前尚書傳曰天子将出撞黄鍾之鐘右五鐘皆應入則撞蕤賔之鐘左五鐘皆應太師於是奏樂則疏此王行迎賔若春夏受贄於朝無迎法受享於廟迎之若秋冬一受之於廟並無迎法若饗食在廟燕在寢則皆有迎法若然鄭此注據大寢而言則是燕時若饗食在廟則與此大寢同也先鄭云肆夏采齊皆樂名者案襄四年穆叔如晋晋侯饗之金奏肆夏杜亦云肆夏樂曲名案鐘師注九夏皆詩之大者載在樂章樂崩從而亡以此言之肆夏亦詩篇名先鄭云或曰皆逸詩得通一義也案玉藻注齊讀如楚茨之茨此齊讀亦從茨可知云此謂歩迎賔客者以其言行與趨是歩行之法可知也云王如有車出之事者則經車亦如之是也但車無行趨之法亦門外有采齊門内奏肆夏大司樂王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏大饗不入牲其他皆如祭祀注大饗饗賔客也不入牲牲不入亦不奏昭夏也其他謂王出入賔客出入亦奏王夏肆夏疏大饗謂饗諸侯來朝者此經云大饗與郊特牲大饗尚腵脩為一物言不入牲謂饗亦在廟其祭祀則君牽牲入殺今大饗諸侯其牲在廟門外殺因即烹之升鼎乃入故云不入牲也鄭知此大饗是饗賔客者以其不入牲若祭祀大饗牲當入故知饗賔客諸侯來朝者也其他謂王出入賔客出入亦奏王夏肆夏者則據賔客與尸同奏肆夏案禮器云大饗其王事與又云其出也肆夏而送之鄭注云肆夏當為陔夏彼賔出入奏肆夏與此大饗賔出入肆夏同而破肆夏為陔夏者彼鄭注大饗為祫祭先王祭未有燕而飲酒有賔醉之法與鄉飲酒賔醉而出奏陔夏同故破肆夏為陔夏此大饗饗諸侯來朝則左傳云饗以訓共儉設几而不倚爵盈而不飲獻依命數賔無醉理故賔出入奏肆夏與尸出入同也鐘師以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏注杜子春曰肆夏詩也春秋傳曰穆叔如晋晋侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜曰三夏天子所以享元侯也使臣不敢與聞肆夏與文王鹿鳴俱稱三謂其三章也以此知肆夏詩也國語曰金奏肆夏繁遏渠天子所以享元侯肆夏繁遏渠所謂三夏矣吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也肆遂也夏大也言遂於大位謂王位也故時邁曰肆於時夏允王保之繁多也遏止也言福禄止於周之多也故執競曰降福穰穰降福簡簡福禄來反渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天元謂以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具疏引國語者歌詩尊卑各有别若天子享元侯升歌肆夏頌合大雅享五等諸侯升歌大雅合小雅享臣子歌小雅合鄉樂若兩元侯自相享與天子饗己同五等諸侯自相享亦與天子饗己同諸侯享臣子亦與天子享臣子同燕之用樂與饗同故燕禮燕臣子升歌鹿鳴之等三篇襄四年晋侯享穆叔為之歌鹿鳴云君所以嘉寡君是宴饗同樂也云所謂三夏矣者即上引春秋肆夏三不拜三是三夏故云三夏吕叔玉云是子春引之者子春之意與叔玉同三夏並是在周頌篇故以時邁執競思文三篇當之後鄭不從者見文王大明緜及鹿鳴四牡皇皇者華皆舉現在詩名及肆夏繁遏渠舉篇中義意故知義非也元謂以文王鹿鳴言之則九夏皆詩篇名者以襄四年晋侯享穆叔奏肆夏與文王鹿鳴同時而作以類而言文王鹿鳴等既是詩明肆夏之三亦是詩也肆夏既是詩則九夏皆詩篇名也云頌之族類也者九夏並是頌之族類也云此歌之大者以其皆稱夏也云載在樂章者此九夏本是頌以其大而配樂歌之則為樂章載在樂章也鎛師凡祭祀鼓其金奏之樂饗食亦如之疏饗食謂饗食來朝諸侯禮記仲尼燕居兩君相見揖讓而入門入門而縣興注大饗謂諸侯來朝者也縣興金作也門疏兩君相見揖讓而入門者諸侯來朝兩君相見入而縣興者謂鐘磬興而動作謂金奏作也入門而金作示情也注金性内明象人情也郊特牲賔入大門而奏肆夏示易以敬也注賔朝聘者易和悦也疏案大射禮主人納賔是己之臣子又無王事之勞故賔入不奏肆夏賔入及庭公升即席乃奏肆夏燕禮記云若以樂納賔則賔及庭奏肆夏卿大夫有王事之勞則奏此樂此是己之臣子有王事之勞賔及庭而奏肆夏也以大射禮燕禮而言此云賔入大門謂朝聘之賔行朝聘既畢燕饗之時燕則大門是寢門也饗則大門是廟門也而奏肆夏示易以敬也者樂主和易今奏此肆夏大樂者示主人和易嚴敬於賔也國語魯語金奏肆夏繁遏渠天子所以享元侯春秋襄公四年左氏傳三夏天子所以享元侯也注周禮以鐘鼔奏九夏其二曰肆夏一名繁三曰韶夏一名遏四曰納夏一名渠蓋擊鐘而奏此三夏曲元侯牧伯文王兩君相見之樂也注諸侯㑹同以相樂諸疏天子享元侯歌肆夏則其餘侯不得用肆夏當歌文王與兩君相見同也然則兩元侯相見與天子享之禮同亦歌肆夏之類仲尼燕居兩君相見升歌清廟謂元侯也不歌肆夏辟天子也諸侯來朝乃歌文王遣臣來聘必不得同矣當歌鹿鳴也陸氏徳明曰國語云金奏肆夏繁遏渠杜遂分為三夏之别名吕叔玉云肆夏時邁也繁遏執競也渠思文也禮記郊特牲大夫之奏肆夏也由趙文子始也注僣諸侯疏案大射禮公升即席奏肆夏燕禮云若以樂納賔則賔及庭奏肆夏是諸侯之禮今文子亦奏之故云僣諸侯此謂納賔樂也若登歌下管正樂則天子用三夏以饗元侯元侯相饗亦得用之蕙田案以上饗禮迎賔賔入詩小雅彤弓彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之箋大飲賔曰饗一朝猶早朝大疏饗者烹大牢以飲賔是禮之者故曰大飲賔曰饗謂以大禮飲賔獻如命數殽牲俎豆盛於食燕周語曰王饗有體薦燕有折俎公當饗卿當燕是其禮盛也言一朝者言王殷勤於賔早朝而即行禮故云一朝猶早朝以燕如至夜饗則如其獻數禮成而罷故以朝言之昭元年左傳云鄭饗趙孟禮終乃燕是饗不終日也周禮秋官掌客王合諸侯而饗禮諸侯長十有再獻大行人上公之禮饗禮九獻諸侯之禮饗禮七獻諸子之禮饗禮五獻注饗設盛禮以飲賔也就疏饗禮九獻者謂後日王速賔賔來廟中行饗饗者烹大牢以飲賔設几而不倚爵盈而不飲饗以訓恭儉九獻者王酌獻賔賔酢主人主人酬賔酬後更八獻是謂九獻云饗設盛禮以飲賔也者云盛禮者以其饗有食有酒兼燕與食故云盛禮也禮記郊特牲諸侯適天子天子賜之禮太牢疏謂諸侯朝天子天子賜之禮大牢大饗尚腵脩而已矣注亦不饗味也此大饗饗諸侯也疏謂諸侯行朝享及灌以後而天子饗燕食之也若上公則三饗三食三燕若侯伯則再饗再食再燕若子男則壹饗壹食壹燕也其行饗之時雖設大牢之饌於時先設腵脩於筵前然後始設餘饌故云尚腵脩而已矣此亦明不饗味之義周禮夏官大司馬饗食羞牲魚授其祭注祭謂賔所以祭也疏饗食謂諸侯來朝行之在廟皆羞進魚牲春秋昭公五年左氏傳設机而不倚爵盈而不飲注言務行禮不疏朝聘之禮有設机進爵之時聘義曰酒清人渴而敢飲也肉乾人飢而不敢食也是言務在行禮不敢倚机不敢飲酒也禮記聘義聘射之禮至大禮也質明而始行事日幾中而後禮成非强有力者弗能行也酒清人渴而不敢飲也肉乾人饑而不敢食也蕙田案以上烹大牢尚腵脩羞牲魚獻依命數設机而不倚爵盈而不飲饗之盛禮也周禮春官大宗伯大賔客則攝而載果注載為也果讀為祼代王祼賔客以鬯君無酌臣之禮言為者攝酌獻耳拜送則王也鄭司農云王不親為主疏大行人云上公之禮再祼而酢此再祼者有后祼則亦攝為之内宰賛之侯伯一祼而酢子男一祼不酢此皆無后祼王不親酌則皆使大宰宗伯攝而為之知代王祼賔客以鬯者見欎人宗廟及賔客皆以欎實彝而陳之云君無酌臣之禮者見燕禮大射諸侯禮皆使大夫為賔宰夫為主人是諸侯君不酌臣此大賔客遣大宗伯代祼是天子君亦不酌臣也云言為者攝酌祼耳拜送則王者以其言代而為祼即是直祼不拜案鄉飲酒禮燕禮大射賔主獻酢皆拜送其送是王自為之以其恭敬之事不可使人故也鬰人詔祼將之儀與其節凡祼事沃盥疏言凡非一若賔客則大宗伯祼欎人沃以水盥手及洗瓉也小宗伯凡賔客以時將瓉祼注將送也猶奉也賔客以時奉而授宗伯天子圭瓉諸侯璋瓉義疏授宗伯者大宗伯云大賔客則攝而載祼是也祭云君用圭瓉灌大宗伯用璋瓉亞祼若然天子用圭瓉則后亦用璋瓉也其諸侯未得圭瓉者君與夫人同用璋瓉也天官小宰凡賔客賛祼注唯祼助宗伯朝疏賔客賛祼者謂諸侯來朝享既畢王禮之有賛灌酢之事也大宗伯職大賔客則攝而載祼非直攝王灌兼有后灌之時大宗伯亦代后祼也春官肆師大賔客築䰞賛祼將注此王所以禮賔客酌欎鬯授大宗伯載祼疏大宗伯攝而載祼則此官主以築欎金煮之和鬯酒也案小宰亦云賔客賛祼者容有故相代也典瑞祼圭有瓉以祼賔客蕙田案周禮大行人所稱上公再祼而酢侯伯壹祼而酢子男壹祼不酢謂朝覲之日三享既畢王乃以鬰鬯之酒禮賔也其禮上公則大宗伯代王酌圭瓉授賔王拜送爵小宰賛之是為壹祼大宗伯又代后酌璋瓉授賔后拜送爵内宰賛之是為再祼賔乃酌玉爵以酢大宰賛王受之是為再祼而酢若侯伯子男則有王祼無后祼故云壹祼但侯伯有祼有酢子男有祼不酢其爵愈卑不敢與王為禮也覲禮不及禮賔之節其當在肉袒請事之後與覲享與大饗皆在廟以神明臨之故獻必先祼周禮内宰疏云后之祼者饗燕亦與焉是也饗禮之祼經無明文以禮賔之節推之上公九獻則王一獻后亞獻皆祼侯伯七獻子男五獻則惟王祼而已王祼用圭瓉惟上公及諸侯之賜圭瓉者耳其餘皆以璋瓉祼也記云獻之屬莫重於祼大饗者賔客之大禮其十二獻九獻七獻與事神同亦必有祼明矣周禮所載賔客之祼事注疏皆以禮賔當之而不及大饗似尚未備詩小雅彤弓我有嘉賔中心喜之鐘鼓既設一朝右之箋右之者主人獻之賔受爵奠於薦右既祭俎乃席末坐卒爵之謂也疏案燕禮云主人筵前獻賔賔西階上拜筵前受爵反位膳宰薦脯醢賔升筵膳宰設折俎賔坐左執爵右祭脯醢奠爵於薦右興取肺坐絶祭嚌之興加於俎坐捝手執爵遂祭酒興席末坐啐酒此鄭略其事故言之謂右之者即此燕禮所言奠於薦右之謂也彼啐酒即此卒爵爵即酒也鄭以下言醻之為醻賔故此右之為當獻賔既獻賔賔受而奠之於薦右是言之可以明主之獻賔故作者舉以表之周禮天官内宰凡賔客之祼獻瑶爵皆賛注謂王同姓及二王之後來朝覲為賔客者祼之禮亞王而禮賔獻謂王饗燕亞王獻賔也瑶爵所以亞王酬賔也坊記曰陽侯殺穆侯而竊其夫人故大饗廢夫人之禮於疏云祼者謂行朝覲禮訖即行三享之禮享訖乃賔户牖之間獻謂饗燕賔客后亦助王獻賔瑶爵謂王饗燕酬賔時后亦助王酬賔皆賛助於后也鄭知賔客是二王之後者見大行人上公再祼王先一祼次后再祼但祼時大宗伯代后至於拜送則后則内宰亦賛后拜送爵云祼之禮亞王而禮賔者案聘禮有以醴禮賔之言故鄭依而言之若據大行人則云祼也云獻謂王饗燕亞王獻賔也者后之祼者饗燕亦與焉案大行人云三饗三食三燕無飲酒之禮唯有饗燕耳饗者亨大牢以飲賔立行禮在廟獻依命數爵盈而不飲饗燕皆有獻賔酬賔后亦助王獻賔酬賔之事内宰皆賛后也太宰大朝覲㑹同賛玉爵注玉爵王禮諸侯之酢爵其禮之於阼階上疏大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢此祼時大宗伯攝祼非冡宰所賛但諸侯酢王用玉爵則冡宰賛王受之故云賛玉爵言其禮之於阼階上者言禮之謂祼諸侯也知王在阼階上者當依賔主之禮案燕禮主君在阼賔在户牖之間故知禮之王在阼階上也禮記郊特牲諸侯為賔灌用鬰鬯灌用臭也疏灌猶獻也謂諸侯來朝在廟中行三享竟然後天子以欎鬯酒灌之也故大行人云上公之禮廟中將幣三享王禮再祼而酢侯伯壹灌而酢子男壹灌不酢灌用臭也者此亦明貴氣之禮大饗君三重席而酢焉疏此大饗謂諸侯相朝主君饗賔賔主俱是諸侯皆設三重之席而受酢詩小雅彤弓我有嘉賔中心好之鐘鼓既設一朝醻之箋飲酒之禮主人獻賔賔酢主人主人又飲而酌賔謂之醻疏案燕禮賔既受獻西階上北靣坐卒爵賔以虚爵降賔坐取觚奠於篚下盥洗卒盥揖升酌以酢主人於西階上主人北面拜受又曰遂卒爵是主人獻賔賔酢主人也又曰主人盥洗升媵觚於賔酌散西階上坐奠爵拜賔賔降筵北靣答拜主人坐祭遂飲又曰主人酌膳賔西階上拜受爵於筵前反位主人拜送爵賔升席坐祭酒遂奠於薦東是主人又飲而酌賔曰醻也禮記仲尼燕居揖讓而升堂升堂而樂闋疏揖讓而升堂升堂而樂闋者賔主及階揖讓升堂主人獻賔賔卒爵而樂闋是大饗之一也又於此之後賔酢主君而縣興主君飲畢而樂闋是大饗之二也鄭注所謂金再作是也郊特牲卒爵而樂闋孔子屢歎之疏卒爵而樂闋者賔至庭樂作及至主人獻爵賔受爵啐酒拜告㫖而樂止賔飲訖酢主人主人受酢畢主人獻公而樂作公飲卒爵而樂止是卒爵而樂闋也此卒爵謂兼賔及主君也依大射禮主人受酢不作樂若其饗時主君親獻賔賔親酢主君賔主俱作樂也孔子屢歎之者孔子見禮入門而縣興卒爵而樂闋數數歎美此禮善其和易恭敬之義周禮春官樂師凡樂掌其序事治其樂政注序事次序用樂之事凡國之小事用樂者令奏鐘鼓注小事小祭祀之事有疏謂王元冕所祭皆鐘鼓樂師令之凡樂成則告備注成謂所奏一竟書曰簫韶九成燕禮曰大師告於樂正曰正歌備終疏云成所奏一竟者竟則終也所奏八音俱作一曲則為一成則樂師告備如是者六則六成餘八變九變亦然故鄭引書簫韶九成為證也又云燕禮者欲見彼諸侯燕禮大師告於樂正樂正告於賔與君此天子祭禮亦大師於樂成之時告樂師樂師乃告王也詔來瞽臯舞注詔來瞽詔眡瞭扶瞽者來入也臯之言號告國子當舞者舞令相注令眡瞭扶工鄭司農曰告當相瞽師者言當罷也瞽師盲者皆有相道之者而疏鄭見儀禮扶工者皆稱相以其瞽人無目稱工故云令眡瞭扶工也饗食諸侯序其樂事令奏鐘鼓令相如祭之儀疏言如祭之儀者非直序樂令鐘鼓令相其中詔來瞽等皆如之禮記郊特牲奠酬而工升歌發德也歌者在上匏竹在下貴人聲也疏奠酬而工升歌據大射禮獻卿之後大夫媵觶於公所謂酬也公奠置此酬而未舉於時工升歌也或可饗時主君親酬賔賔初奠酬薦東於時即工升歌也大射與燕禮異也發徳也者所以奠酬升歌歌詠其詩發明賔主之徳周禮春官大師大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓朄大饗亦如之疏此大饗謂諸侯來朝即大行人上公三饗侯伯再饗子男一饗之類其在廟行饗之時作樂與大祭祀同亦如上大祭祀帥瞽登歌下管播樂器令奏皆同故云亦如之凡祭祀大饗及賔射升歌下管一皆大師令奏小師佐之其鐘鼓則大祝令奏故大祝云隋釁逆尸令鐘鼓侑亦如之若賔射及饗鐘鼓亦當大祝令之與祭祀同也小師大祭祀登歌擊拊下管擊應鼓大饗亦如之疏其大饗饗諸侯之來朝者眡瞭賔射皆奏其鐘鼓注擊朄以奏之其登歌大師自奏之鐘師凡祭祀饗食奏燕樂注以鐘鼓奏之之疏饗食謂與諸侯行饗食禮在廟故與祭祀同樂故連言之知以鐘鼓奏之者以其鐘師奏九夏用鐘鼓故知此燕樂亦用鐘鼓奏之可知也笙師凡祭祀饗射共其鐘笙之樂注鐘笙與鐘聲相應之笙韎師掌教韎樂祭祀則帥其屬而舞之注舞之以東夷之樂大饗亦如之旄人凡祭祀賔客舞其燕樂籥師掌教國子舞羽龡籥祭祀則鼓羽籥之舞賔客饗食則亦如之疏亦鼓之以羽籥之舞與祭祀同以其俱在廟故樂亦同也鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之司干掌舞器舞者既陳則受舞器既舞則受之賔饗亦如之禮記仲尼燕居下管象舞夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉升歌清廟示徳也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已注下謂堂下也象舞武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也示徳相示以徳也清廟頌文王之徳也示事相示以事也象武武王之大事也疏下管象武者謂升歌清廟堂下管中吹象武之曲但此下管象武之上少升歌清廟之一句夏籥序興者夏籥謂大夏文舞之樂以象武次序更逓而興於是陳列薦俎次序禮樂備具百官從夏籥序興至此重賛揚在上之事如此升歌清廟示徳也者清廟頌文王之徳故云示徳也下而管象示事也者象謂武王伐紂之樂事謂王業之大事故下管象武示王業之事也禮記郊特牲孔疏皇氏又云襄四年左氏傳云三夏天子所以饗元侯文王大明緜兩君相見之樂也燕禮歌鹿鳴合鄉樂凡合樂降於升歌一等王饗燕元侯升歌三夏三夏即頌合樂降一等即合大雅也元侯自相饗亦歌頌合大雅故仲尼燕居兩君相見歌清廟是也侯伯子男相見既歌文王合鹿鳴也凖約元侯則天子饗燕侯伯子男亦歌文王合鹿鳴也諸侯燕臣子歌鹿鳴合鄉樂燕禮是也其天子燕在朝臣子工歌鹿鳴合鄉樂故鄭作詩譜云天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合鄉樂是也升歌合樂所以異者案鄉飲酒禮及燕禮工升自西階歌鹿鳴四牡皇皇者華歌訖笙入立於堂下奏南陔白華華黍奏訖乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間歌訖乃合鄉樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋間者謂堂上堂下一歌一吹更遞而作合者上下之樂並作此其所以異也皇氏云此經卒爵樂闋之義主人受酢之時作樂今案大射禮宰夫為主人受酢之時不作樂皇氏説非也皇氏又云卒爵而樂闋作樂三闋也一是賔飲畢樂闋也二是主人受酢飲畢樂闋也三是賔奠酬之後工升歌畢將旅酬之時樂闋也今案此經初云入門而奏肆夏次云卒爵而樂闋下云奠酬而工升歌所陳之事依先後次第則樂闋之中不得并數奠酬升歌樂闋也且工升歌之後則有笙入奏南陔之等及間歌合樂無樂闋之文何得卒爵樂闋之中數之為三闋皇氏非也案鐘師九夏皆夏文在下而南本納夏獨夏又在上其義疑也皇氏云天子燕饗己之臣子與燕合諸侯同歌文王合鹿鳴今案詩譜云天子諸侯燕羣臣及聘問之賔歌鹿鳴合鄉樂皇説非也歌者在上匏竹在下貴人聲也者觧所以不升堂之義也匏笙也竹箎笛也歌是人聲人聲可貴故升之在堂匏竹可賤故在下然瑟亦升堂者瑟工隨歌工故也蕙田案疏論升歌合樂特詳故附載之又案以上大饗祼獻酬升歌合樂禮記禮器琥璜爵注琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也疏天子饗諸侯或諸侯自相饗行禮至酬酒時則有幣將送酬爵又有琥璜之玉將幣故云琥璜爵也崔氏云諸侯貴者以琥賤者以璜則公侯用琥伯子男用璜也陳氏禮書食有侑食故有侑幣饗有酬爵故有酬幣聘禮公於賔若不親食使大夫致之以侑幣致饗以酬幣亦如之大夫於賔若不親饗則公作大夫致之以酬幣春秋之時秦后子享晋侯歸取酬幣終事八反魯侯享范獻子莊叔執幣是饗有酬幣也禮器琥璜爵鄭氏以為天子酬諸侯諸侯相酬之禮又王饗虢公晋侯皆玉五㲄馬三匹是天子饗諸侯諸侯相饗酬幣用玉也諸侯食大夫大夫相食以皮帛束錦則侑幣固有差矣酬幣亦謂之侑侑幣不謂之酬故春秋傳享醴皆曰宥以侑者勸酬之通名也蕙田案以上大饗酬酒時侑幣周禮春官肆師饗食授祭注授賔祭肺依疏饗者烹大牢以飲賔獻命數食者亦烹大牢以食賔舉依命數云授祭者祭謂祭先造食者案膳夫云授王祭則此授祭者非授王祭可知故鄭云授賔祭肺也必先祭肺者有虞氏祭首夏后氏祭心殷祭肝周祭肺肺周所祭故知祭者祭肺也王氏詳説享用太牢食用太牢鄭氏以授祭為祭肺惜其説不廣也既曰祭食祭所先進又曰殽之叙徧祭之所謂夕祭牢肉是已鄭氏鍔曰待以饗食之盛禮賔客當祭肆師授之以所祭之品王食則膳夫授祭饗食賔客則使肆師授之為佐擯以待賔客蕙田案此條大饗授祭内宗掌宗廟之祭祀薦加豆籩注加爵之豆籩爵疏鄭知加籩豆是加之豆籩者以其食後稱加特牲少牢食後三獻為正獻其後皆有加爵今天子禮以尸既食后亞獻尸為加此時薦之故云加爵之豆籩即醢人籩人加豆加籩之實是也及以樂徹則佐傳豆籩注佐傳佐外宗玉疏外宗佐王后籩豆籩賔客之饗食亦如之疏饗食賔客俱在廟饗食訖徹器與祭祀同亦后徹内外宗佐傳故云亦如之樂師及徹帥樂士而歌徹注樂士國子也鄭司農云謂將徹之時自有樂故帥樂士而歌徹元謂徹者歌雍雍在周頌臣工之什小師徹歌注於有司徹而歌雍天官膳夫凡王祭祀賔客食則徹王之胙俎注膳夫親徹胙俎胙俎最尊也其餘則其屬徹之賔客食而王有胙俎王與賔客禮食主人飲食之俎皆為胙俎見於此矣疏賔客食則王與賔客禮食於廟賔在户牖之間王在阼階上各有饌皆設俎故亦有胙俎皆膳夫徹之也王與尸賔相答酢故遣膳夫親徹其餘明非王胙俎則其屬徹之可知云王與賔客禮食者以賔客與祭祀同科故知是禮食非是凡平燕食案公食大夫主君與聘大夫禮食賔前有食君前無食退俟於箱今此天子與諸侯禮食王前有食俎者天子於諸侯其禮異於諸侯與聘大夫故王前有俎云主人飲食之俎皆為胙俎見於此矣者案特牲少牢主人之俎雖為胙俎直是祭祀不兼賔客此則祭祀賔客俱有故云主人飲食之俎皆為胙俎見於此飲據祭祀食據賔客故雙言之也禮記仲尼燕居行中規旋中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣注雍振羽皆樂章也振羽振鷺及雍送疏客出以雍者雍詩樂章名也言客出之時歌雍以之徹以振羽者振羽即振鷺詩亦樂章名也言禮畢通徹器之時歌振鷺也禮記雜記大饗既饗卷三牲之俎歸於賔館注既饗歸賔俎所以厚之也牲疏大饗賔客既畢主人卷歛三俎上之肉歸於賔館蕙田案以上饗禮徹歌客出歸賔俎儀禮覲禮饗禮乃歸注禮謂食燕也王或不親以其禮幣致之略言饗禮互文也疏以此文為互則饗食燕皆有酬幣侑幣是以掌客職三饗三食三燕云云即云若弗酌則以幣致之蕙田案此王不親饗致幣右饗禮禮記坊記子云禮非祭男女不交爵注交爵謂相獻酢以此坊民陽侯猶殺繆侯而竊其夫人注同姓也其國未聞故大饗廢夫人之禮注大饗饗諸侯來朝者也夫人之禮使人攝夫疏大饗之時夫人與君同饗于賔是繆侯及人共出饗賔陽侯是繆侯同姓之國見繆侯夫人之美乃殺繆侯而取其夫人反簒其國而自立故大饗廢夫人之禮不使夫人得預其禮也以此言之則陽侯以前大饗夫人出饗鄰國之君得有男女交爵此云非祭男女不交爵者謂侯伯子男及卿大夫士祭乃交爵若王於上公及上公相饗時后與夫人亦男女交爵與祼同也自陽侯殺繆侯後后夫人獻禮遂廢並使人攝也右饗變禮郊特牲大夫而饗君非也注其饗君由强且富也天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也注明饗君非禮也鄭疏春秋之時有諸侯饗天子故荘二十一年伯享王於闕西辟樂備亂世非正法也右饗失禮五禮通考卷一百五十六
