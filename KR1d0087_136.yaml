婦位壇下東北南向設外命婦位壇下東南北向俱異位重行西上內外命婦一品各二人二品三品各一人又設從採桑內命婦等位於外命婦之東南向以內命婦一員充詣蠶室授蠶母桑以食蠶設從採桑外命婦等位於外命婦東北向俱異位重行西上設執皇后鈎箱者位於內命婦之西少南西上尚功執鈎司製執箱內外命婦鈎箱者各位於後典製執鈎女史執箱又於壇上設執皇后鈎箱位於皇后採桑位之北稍東南向西上前出宫一日兵部帥其屬陳小駕鹵簿於宣德門外太僕陳厭翟車東偏門內南向其日未明外命婦應採桑及從採桑者先詣親蠶所冪次以俟起居各令其女侍者進鈎箱載至親蠶所授內謁者監以授執鈎箱者前一刻內命婦各服其服內侍引內命婦妃嬪以下俱詣殿庭起居訖內侍奏請中嚴少頃又奏外辦皇后首飾鞠衣乘龍飾肩輿如常儀障以行幄出內東門至左升龍門內侍跪奏具官臣某言請降肩輿升厭翟車訖俯伏興少退御者執綏升厭翟車內侍詣車前奏請車進發出宣德東偏門執事者進鈎箱載之車至親蠶所降車乘肩輿入後殿西閣門侍衛如常儀內侍先引內外命婦及從採桑者俱就壇下位諸執鈎箱者各就位內侍奏請中嚴少頃奏外辦皇后首飾鞠衣乘肩輿內侍前導至壇東門華蓋仗衛止於門外近侍者從之入內侍奏請降肩輿至幄次內下簾又內侍至幄次請行禮導皇后詣壇升自南陛東向立執鈎箱者自北陛以次升壇就位次內侍引尚功詣採桑位前西向奉鈎以進皇后受鈎採桑司製奉箱進以受桑皇后採桑三條止以鈎授尚功尚功受鈎司製奉箱俱退復位初皇后採桑典製各以鈎授內外命婦皇后採桑訖內外命婦以次採桑女使執箱者受之內外命婦一品各採五條二品三品各採九條止典製受鈎與執箱者退復位內侍各引內外命婦退復位內侍詣皇后前奏禮畢退復位內侍引皇后降自南陛歸幄次少頃奏請乘肩輿如初內侍前導皇后歸殿後閣內侍奏解嚴初皇后降壇內侍引內命婦詣蠶室尚功帥執鈎箱者以次從至蠶室尚功以桑授蠶母蠶母受桑縷切之授內命婦蠶灑一薄訖內侍引內外命婦各還次皇后還宫徽宗本紀六年閠三月辛巳皇后親蠶禮志宣和重定親蠶禮外命婦宰執并一品夫人升壇侍立餘品列於壇下六年閠三月皇后復行親蠶之禮焉玉海髙宗紹興二年四月二十四日上謂輔臣曰宫內亦自育蠶欲知女工艱難俾每事質儉宋史髙宗本紀紹興七年五月壬申命禮官舉農蠶風雷雨師之祀禮志紹興七年始以季春吉已日享先蠶視風師之儀玉海紹興七年五月十一日黃積厚請季春吉已日享先蠶從之文獻通考紹興十五年太常王湛言請案政和禮建親蠶殿蠶室繭館請皇后就禁中行親蠶之禮朝旨送禮部下太常寺討論不果行宋史禮志孝宗乾道中升先蠶為中祀王圻續通考親蠶之禮遼金俱不行故不列祀典元建蠶壇而祀事不舉故其禮儀亦無可考趙天麟嘗有策述古公桑之製勸中宫倣古親蠶明史世宗本紀嘉靖九年正月作先蠶壇於北郊禮志先蠶明初未列祀典嘉靖時都給事中夏言請改各官莊田為親蠶厰公桑園令有司種桑柘以備宫中蠶事九年復疏言耕蠶之禮不宜偏廢帝乃敕禮部古者天子親耕皇后親蠶以勸天下自今嵗始朕親祀先農皇后親蠶其考古制具儀以聞大學士張璁等請於安定門外建先蠶壇詹事霍韜以道逺爭之户部亦言安定門外近西之地水源不通無浴蠶所皇城內西苑中有太液瓊島之水考唐制在苑中宋亦在宫中宜倣行之帝謂唐人因陋就安不可法於是禮部尚書李時等言大明門至安定門道路遙逺請鳳輦由東華元武二門因條上四事一治繭之禮二壇壝之向三採桑之器四掌壇之官帝從其言命自元武門出內使陳儀衛軍一萬人五千圍壇所五千護於道餘如議世宗實録禮部尚書李時等條上四事一增治繭之禮採桑而不治繭非禮之全及繭成後令內臣自北郊捧獻宫中仍於宫中量立蠶繭織室行三盆之禮以終蠶事二定壇壝之向先蠶採桑二壇悉凖先農藉田先蠶壇北向採桑壇東向如唐開元之制三定採桑之器唐制尚功奉金鈎夫親桑以識女工之艱難金鈎侈矣篚鈎宜如民間器用毋過雕飾四擇掌壇之官中宫出郊禮儀擇司禮監老成謹厚者掌之禮志三月工部上先蠶壇圖式帝親定其制壇方二丈六尺疊二級髙二尺六寸四出陛東西北俱樹桑柘內設蠶宫令署採桑臺髙一尺四寸方十倍三出陛鑾駕庫五間後蓋織堂壇圍方八十丈蕙田案壇圍方八十丈壇字疑誤或當作牆存考世宗實録九年三月皇后親蠶於北郊祭先蠶氏禮部言親蠶之禮出於創見命婦倉卒入壇恐愆禮度請以所繪採桑圖授之俾先期肄習並定命婦牙牌式視陪祀官殺三之一至日皇后出郊行親蠶禮祭先蠶氏明會典國初無親蠶禮肅皇帝始敕禮部以每嵗季春皇后親蠶於北郊後改於西苑未久即罷嘉靖九年定先期欽天監擇日以聞順天府具蠶母名數奏送蠶室內工部具鈎箱筐架及一應飬蠶什物給送蠶母順天府將蠶種及鈎筐一副進呈訖奉自西華門出置綵輿中鼓樂送至蠶室蠶母浴種伺蠶生先飼以待先一日蠶宫令丞設皇后採桑位於採桑臺東向執鈎筐者位於稍東設公主及內命婦位於皇后位東設外命婦位於採桑臺東陛之下南北向以西為上至日四更宿衛陳兵衛女樂工備樂司設監備儀仗及重翟車蠶宫令備鈎筐俱候於西華門外內執事女樂生并司贊六尚女官等皆乘車先至壇內候將明內侍詣坤寧宫奏請皇后詣先蠶壇所皇后服常服導引女官導皇后出宫門乘肩輿侍衛警蹕如常儀公主及內命婦應入壇者各服其服以從至西華門內侍奏請降輿升重翟車兵衛儀仗女樂前導女官奉鈎筐行於車前皇后至具服殿少憩易禮服祭先蠶祭畢更常服司賓引外命婦先詣採桑臺位南北向女侍執鈎筐者各隨於後尚儀入奏請詣採桑位導引女官導皇后至採桑位東向公主以下各就位南北向執鈎者跪進鈎執筐者跪奉筐受桑皇后採桑三條還至壇南儀門坐觀命婦採桑三公命婦以次取鈎採桑五條列侯九卿命婦以次採桑九條採訖各以筐授女侍司賓引內命婦一人詣蠶室尚功帥執鈎筐者從尚功以桑授蠶母蠶母受桑縷切之以授內命婦內命婦還尚儀前奏採桑禮畢皇后還具服殿候升座尚儀奏司賓帥蠶母等行叩頭禮訖司贊唱班齊外命婦序列定贊四拜畢腸命婦宴於殿內外並賜蠶婦酒食於採桑臺旁公主及內命婦殿內序坐外命婦從採桑者及文武二品以上命婦於殿臺上三品以下於臺下各序坐尚食進膳司賓引公主及內命婦各就坐教坊司女樂奏樂進酒及進膳進湯如儀宴畢徹案公主以下並外命婦各就班司贊贊四拜尚儀跪奏禮畢皇后興還宫導從如前禮志四月蠶事告成行治繭禮選蠶婦善繅絲及織者各一人卜日皇后出宫導從如常儀至織堂內命婦一人行三盆手禮布於織婦以終其事蠶宫令送尚衣織染監局造服其祀先蠶止用樂不用舞樂女生冠服俱用黑世宗本紀十年四月皇后親蠶於西苑實録二月禮臣言親蠶盛典去嵗皇后躬祭採桑巳足風勵天下今先蠶壇殿工未畢宜且遣官行禮帝初不可令如舊行已而以皇后出入不便命改築先蠶壇於西苑明會典親蠶壇改築於西苑壇髙二尺六寸四出陛廣六尺四寸甃以甎石又為瘞坎於壇右方深取足容物東為採桑臺方一丈四尺髙二尺四寸三出陛鋪甃如壇制臺之左右樹以桑壇東為具服殿三間前為門一座俱南向西為神庫神厨各三間右宰牲亭一座壇之北為蠶室五間南向前為門三座髙廣有差左右為廂房各五間後為從室各十間以居蠶婦設蠶宫署於宫左置蠶宫令一員丞二員擇內臣謹恪者為之以督蠶桑等務初建先蠶壇於北郊以嵗春擇日皇后躬祀先蠶行親蠶禮後又改築壇於內苑致祭行親蠶禮一齋戒前期三日尚儀奏致齋三日內執事并司贊六尚等女官及應入壇者各齋二日一省牲羊二豕一鹿一兔一陳設先蠶氏之神羊二豕一登一籩豆各六簠簋各二帛一篚一酒尊三爵三酒盞三十祝案一正祭先一日蠶宫令陳樂女生位於壇南設皇后拜位於壇下北向次公主次內命婦次外命婦拜位俱異位重行北向設內贊位於壇南設司贊位於皇后拜位之東西設司賓位於外命婦班之北東西相向皇后至壇所入具服殿少憩司賓先引外命婦列於先蠶壇下東西相向以北為上尚儀詣皇后前奏請皇后易禮服出殿門將至壇內贊唱樂女生就位執事官各司其事導引女官導皇后至拜位司贊奏就位次公主次內命婦又次外命婦各就拜位內贊唱瘞毛血迎神樂作樂止司贊奏四拜公主以下同內贊唱奠帛行初獻樂作執事官捧帛爵跪於神位前各奠訖樂暫止內贊唱讀祝司贊奏跪皇后跪公主以下同讀祝女官跪於神位前右讀訖樂作司贊奏興皇后興公主以下同樂止內贊唱行亞獻禮樂作執事官捧爵跪奠於神位前訖樂止內贊唱行終獻禮儀同亞獻執事女官進立壇東西向唱賜福胙司贊奏跪皇后跪執事女官以福酒跪進於皇后右奏飲福酒皇后飲訖執事女官以胙跪進於皇后右奏受胙皇后受胙訖司贊奏興皇后興司贊奏二拜公主以下同內贊唱徹饌樂作執事女官詣神位前徹饌訖樂止內贊唱送神樂作司贊奏四拜公主以下同樂止內贊唱讀祝官捧祝執事官捧帛饌各詣瘞位樂作樂止司贊唱禮畢皇后還具服殿更常衣行親蠶禮享先蠶樂章於穆惟神肇啓蠶桑依我萬民保我家邦兹舉曠儀春日載陽恭迎霞馭靈氣洋洋神其臨只有苾有芬乃獻玉齍乃奠文纁仰祈昭鑒淑氣氤氲顧兹蠶婦祈祈如雲載舉清觴蠶祀孔明以格以享鼓瑟吹笙隂教用彰坤儀允貞神之聽之鑒此禋誠神之格思桑土是宜三繅七就惟此繭絲獻禮有終神不我遺錫我純服藻繪皇儀爼豆具徹式禮莫愆既匡既敕我祀孔虔我思古人葛覃唯賢明靈歆只永顧桑阡神之升矣日霽霞蒸相此女紅杼軸其興兹過元宫鸞鳯翔騰瞻望勿及永錫嘉徴禮志四月皇后行親蠶禮於內苑帝謂親耕無賀此安得賀苐行叩頭禮女樂苐供宴勿前導春明夢餘録夏言請舉親蠶之禮疏祭統天子親耕於南郊以供粢盛皇后親蠶於北郊以供祭服夫以天子之尊非莫為之耕也而必躬耕以供郊廟之粢盛后妃之貴非莫之蠶也而必躬蠶以為祭祀之服飾所以然者一以致其誠信可以交於神明一以勸天下之農夫蠶婦非身帥先之弗可也先儒張栻曰周家建國自后稷以農事為務歷世相傳其君子則務稼穡之事其室家則躬織袵之勤如周公之告成王其見於詩有若七月皆言農桑之候也其見於書有曰無逸欲其知稼穡之艱難知小人之依也帝王相傳心法之要端在於此臣由是考之於漢皇后蠶於東郊後漢皇后帥公卿列侯夫人蠶歷魏晉宋北齊後周以及於隋亦復依據周典未之或廢唐立先蠶壇在長安北苑太宗貞觀九年三月文德皇后帥內外命婦有事於先蠶歷髙宗永徽顯慶以還皆間嵗皇后親祀先蠶宋真宗景德三年詔祀先蠶神宗元豐四年又詳定享先蠶之儀宣和元年皇后親蠶於延福宫髙宗紹興七年猶復舉行至十五年太常丞王湛言請案政和禮建親蠶殿蠶室繭館請皇后就禁中行親蠶禮朝旨送禮部下太常寺討論尋不果行則是親蠶之禮殆廢於此矣洪惟我太祖髙皇帝開天建極制禮作樂躬耕藉田既稽古攸行矣顧獨於親蠶闕焉當時議禮諸臣亦竟未有及之者豈非本朝之缺歟列聖相承繼文由舊謙讓未遑禮官廷臣蔑聞建白是固有待於陛下也夫農桑之業衣食萬人不宜獨缺耕蠶之禮垂法萬世不宜偏廢先儒謂禮樂必百年而後興又曰必聖人在天子之位此臣惓惓之愚所以不巳於今日發也伏望陛下留神垂覽倘蒙采納乞敕禮户工三部會集具議以聞續文獻通考嘉靖十年世宗召張孚敬李時詣西苑相地建土榖壇并建先蠶壇於仁夀宫側毁北郊蠶壇農政全書太祖洪武二年二月上命皇后率內外命婦蠶北郊供郊廟衣服如儀自是嵗以為常蕙田案明史先蠶明初未立祀典會典亦云國初無親蠶禮夏言亦云太祖制禮親蠶獨缺而農政全書所載未知何本今附之以俟考世宗實録嘉靖十六年二月詔罷親蠶禮西苑改建先蠶壇十一十二年皇后皆親蠶其後因事輒不舉至是始詔罷之仍命進蠶具如常嵗遣女官祭先蠶明史禮志嘉靖三十八年罷親蠶禮四十一年並罷所司奏請蕙田案世宗罷親蠶禮據實録在十六年至三十八年并女官亦罷史誤右漢至明親桑享先蠶五禮通考卷一百二十六
