body:
  text: 五禮通考卷一百二十六刑部尚書秦蕙田撰吉禮一百二十六親桑享先蠶蕙田案周禮內宰仲春詔后帥外內命婦蠶於北郊以為祭服此與天子親耕南郊以供粢盛同義祭統云天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡敬敬盡然後可以事神明此之為言得禮意矣其儀詳於月令祭義其享先蠶經亦不見杜氏通典馬氏通考皆云即躬桑之日其説當是自漢以後時舉時罷今採可考者類次焉禮記月令季春之月天子乃薦鞠衣於先帝注鞠衣黃桑之服先帝太皥之屬為將蠶求福祥之助也葉疏依禮祭五帝自服大裘今薦鞠衣色如鞠塵象桑始生鞠者草名花色黃與桑同色又當桑生之時故鄭云黃桑之服蓋薦於神坐為蠶求福也知先帝太皥之屬者以其言先不言上故知非天蠶功既大總祭五方之帝於明堂故鄭云之屬陳氏祥道曰將耕也祈穀於上帝所以祈有秋將蠶也薦鞠衣於先帝所以祈有春鞠衣后服也其色象鞠鞠之華以隂中其色則隂盛色也后蠶服此則率內外命婦而蠶使天下之嬪婦取中焉后之盛事也薦鞠衣於先帝則是薦之於神所以告將服之以蠶也蓋王與后常相資以成禮者也又曰天子薦鞠衣於先帝以告將蠶內宰詔后帥內外命婦以趨蠶事而后之首飾以編服以鞠衣屨以黃屨車以翟車貝面組總有握及郊享先蠶然後東鄉而躬桑焉躬桑后夫人之事耳天子必薦鞠衣君必皮辨素積卜三宫夫人世婦使入蠶室者內外相成之義也欽定義疏黃帝之妃西陵氏始蠶後世祀為先蠶或天子先告黃帝而後乃祀西陵與路史黃帝有熊氏命西陵氏勸蠶稼月大火而浴種夫人副禕而躬桑通鑑外記西陵氏之女嫘祖為帝元妃始教民育蠶治絲繭以供衣服後世祀為先蠶唐月令三月之節天子乃薦鞠衣於先帝三月中氣后妃齋戒享先蠶而躬桑以勸蠶事通典后妃齋戒享先蠶而躬桑以勸蠶事注季春吉已王后享先蠶先蠶天駟也享先蠶而後躬桑示帥天下先也陳氏禮書先蠶壇呂氏月令言薦鞠衣於先帝不言享先蠶唐月令言薦鞠衣於先帝又言享先蠶考之於古食必祭先倉竈必祭先炊視學祭先聖先師養老祭先老射祭侯師祭禡則將蠶而享先蠶蓋禮然也漢儀以中牢羊豕祭蠶神曰苑窳婦人寓氏公主凡二神晉武時先蠶壇在皇后採桑壇東南北齊為蠶壇每嵗季春榖雨後吉日使公卿以一太牢祠先蠶黃帝氏於壇上無配如祀先農禮訖皇后乃躬桑後周皇后至蠶所以一少牢親進祭奠先蠶西陵氏神二嬪為亞獻終獻隋制先蠶壇於宫北三里為壇季春上已皇后服鞠衣以太牢制幣祭先蠶用一獻之禮唐制亦皇后上已享先蠶遂以親桑李林父釋月令曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為黃帝或以為西陵氏或以為天駟歷代儒者議論不一然則蠶其首馬首其性喜溫惡濕其浴火月而再養則傷馬此固與馬同出於天駟矣然天駟可謂蠶祖而非先蠶者也蠶婦人之事非黃帝也史記黃帝娶西陵氏而西陵氏始蠶於志無見漢祀苑窳婦人寓氏公主二人此或有所傳然也其壇或在桑壇東南或在桑壇之西其祭或少牢或太牢或一獻或三獻歷代之所尚異也然禮必皇后親享北齊使公卿祠之非古也蕙田案聖王祀典凡有利於民者必報之故飲食必祭原其始也凡先聖先師先農先老先醫先牧先炊先倉皆始為之者之神蓋理與事之所必有而不必實指其為誰何也先蠶之名舊説為天駟為黃帝為西陵氏為苑窳婦人寓氏公主夫既為始蠶之人則非天駟顯然而西陵氏已下則亦無明據也祀先蠶禮自漢以後具有之陳氏考之特詳但其正義則經無明文耳惟月令鞠衣之薦為近於祀事今取通典及禮書説附於經文之下從其類也至先蠶之神似當與祭諸先同例而不必求其人以實之與俟議禮者質焉右饗先蠶周禮天官內宰中春詔后帥外內命婦始蠶於北郊注蠶於北郊婦人以純隂為尊鄭氏鍔曰中春者可蠶之候也説者謂月令季春之月鳴鳩拂其羽戴勝降於桑后妃齋戒親東鄉躬桑而先儒於祭義大昕之注亦以為季春朔日今此仲春詔后何也然以七月之詩考之春日載陽有鳴倉庚女執懿筐爰求柔桑謂仲春也倉庚以仲春鳴記禮者乃言季春豈季春者蠶事之始歟謂之始蠶意可知矣禮記祭義古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘牆而外閉之疏公桑蠶室者謂官家之桑於處而築養蠶之室近川取其浴蠶種便也築宮謂築養蠶宫牆七尺曰仭言牆之七尺又有三尺髙一丈也棘牆者謂牆上置棘外閉謂扇在户外閉也陳氏禮書天子諸侯之禮文而有辨故耕於南郊東郊王后夫人之禮質而少變故皆蠶於北郊公桑蠶室近川為之以其便於浴蠶也築宫仭有三尺棘牆而外閉之所以謹於蠶者也方氏慤曰公桑猶公田也以其别於私故謂之公築宫謂築宫牆也前曰蠶室此曰築宫者蠶居於內故曰室牆圍於外故曰宫也仭者度土髙深之用考工記曰人長八尺登下以為節故八尺為仭也牆髙於人長之外又有三尺所以防窺伺也又置棘所以防踰越也閽人自外閉其門以親蠶者皆婦人故也陸氏佃曰棘牆而外閉之者不専為防也故曰外戶而不閉禦風氣而已若棘亦以為暖今養華用棘蕙田案以上公桑蠶室月令季春之月命野虞毋伐桑柘鳴鳩拂其羽戴勝降於桑具曲植籧筐注毋伐桑柘愛蠶食也野虞謂主田及山林之官鳴鳩飛且翼相擊趨農急也戴勝織紝之鳥是時恆在桑皆蠶將生之候也言降於桑者若時始自天來重之也曲薄也植槌也皆養蠶器也自疏曲植籧筐案方言云宋魏陳楚江淮之間謂之曲關而西謂之簿故云曲簿方言注槌縣蠶薄柱也宋魏陳楚江淮之間謂之植自關而西謂之槌方氏慤曰以致曲而織故曰曲以取直而立故曰植籧則席之粗者筐則筥之方者凡此皆蠶具蕙田案此條具蠶器祭義及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶於蠶室奉種浴於川桑於公桑風戾以食之注大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早涼脆采之風戾之使靈氣燥乃以食蠶蠶性惡濕也侯疏世婦亦諸侯世婦前雖總舉天子諸侯此特舉諸互言之奉種浴於川言蠶將生而又浴之初於仲春已浴至此更浴之也陸氏佃曰鄭氏謂大昕季春朔日之朝然則餘日為昕朔日然後謂之大昕言大以有小文王世子大昕鼓徴視學蓋亦朔日不然朝愈益早矣蕙田案此條浴蠶月令季春之月后妃齊戒親東鄉躬桑注后妃先採桑示帥先天下也束鄉者鄉時氣也是明其不常留養蠶也留養者所卜夫人與世婦禁婦女毋觀省婦使以勸蠶事注毋觀去容飾也婦使縫線組紃之事周禮夏官馬質禁原蠶者注原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與月疏辰則大火房為天駟故云辰為馬月值大火謂二則浴其種則內宰云仲春詔后帥外內命婦治蠶於北郊是也若然祭義云大昕之朝奉種浴於川注云大昕季春朔日之朝是建辰之月又浴之者蓋蠶將生重浴之故彼下文即云桑於公桑之事是也云是蠶與馬同氣者以其俱取大火是同氣也云禁再蠶者為傷馬與者二者既同氣不可兩大而禁再蠶明恐傷馬無正文故云與以疑之也李氏嘉會曰今東南如兖揚衣被天下蠶盛而無馬西北苦寒之地有馬而無蠶蓋可知矣蕙田案以上躬桑禁戒禮記祭義嵗既單矣世婦卒蠶奉繭以示於君遂獻繭於夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之古之獻繭者其率用此與注嵗單謂三月月盡之後也言嵗者蠶嵗之大功事畢於此也副禕王后之服而云夫人容二王之後歟禮之禮奉繭之世婦也其率用此與問者之辭也方氏慤曰自去嵗蠶成之後迄今嵗蠶成期一嵗矣故謂之嵗單若孟夏稱麥秋亦此意蠶嵗既單故繼言世婦卒蠶也繭則示於君而獻於夫人者示則告其成而已獻則欲其受之以繅也禮之以少牢則所以勞其還也月令蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰注登成也敕往蠶者蠶畢將課功以勸戒之方氏慤曰蠶事既登者事畢而登比年之數也與曲禮年穀不登之登同義分繭所以使之繅稱絲所以使之織效其功之多少以共郊廟之服無有敢惰敬之至也孟夏之月蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服注后妃獻繭者內命婦獻繭於后妃收繭稅者收於外命婦外命婦雖就公桑蠶室而蠶其夫亦當有祭服以助祭收以近郊之稅耳貴賤長幼如一國服同疏后妃獻繭者謂后妃受內命婦之獻繭知非后妃獻繭於王者祭義曰世婦卒蠶奉繭以示於君遂以獻於夫人是夫人不獻繭也內命婦既以獻繭乃收外命婦之賦稅外命婦雖受公桑蠶室而蠶既是官家之桑繭應全入於巳所以有稅者以其夫亦當有祭服官家所給故輸繭稅以供造之但稅寡少載師云近郊十一公桑在國比近郊故知收以近郊之稅也以桑為均者言收稅之時以受桑多少為賦之均齊桑多則賦多桑少則賦少胡氏銓曰鄭謂后妃受內命婦獻繭非也據經云后妃獻繭則獻於王矣鄭以祭義云世婦奉繭以示於君遂以獻夫人是夫人不獻故云后亦不獻按天子尊於后妃若諸侯與夫人體敵也不可以為比又祭義云世婦獻繭於君則夫人不可獻也此不云世婦獻繭於天子則后妃自獻無疑也鄭又謂收外命婦繭稅案內宰職后妃帥外內命婦蠶則繭稅亦內外均何必外命婦祭義及良日夫人繅三盆手遂布於三宫夫人世婦之吉者使繅注三盆手者三淹也凡繅每淹大總而手振之以出緒也疏良日謂吉日宜繅之日明繅更擇日日至而後夫人自繅每淹以手振出其緒故曰三盆手夫人親繅三盆以手振出其緒訖遂布與三宫夫人世婦之吉者既據諸侯則夫人惟一人而云世婦之吉者雜互天子言之以天子有三夫人就其中取吉者若諸侯惟世婦之吉者蠶繅非一人擇其吉者主領而已蕙田案以上獻繭繅絲月令季夏之月命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐偽祭義遂朱緑之元黃之以為黼黻文章服既成君服以祀先王先公敬之至也陳氏禮書繅必三盆手者禮成於三也三盆手猶王藉之三推也然後布於三夫人世婦之吉者使繅遂朱緑之元黃之以為祭服猶庶人之終畝也蕙田案以上染采作服右親蠶之禮漢書文帝本紀十三年詔曰皇后親桑以奉祭服其具禮儀景帝本紀二年詔曰后親桑以奉宗廟祭服為天下先元后傳孝元王皇后為太后春幸繭館師古曰上林苑有繭館蓋蠶繭之所也率皇后列侯夫人桑後漢書禮儀志注漢舊儀曰春桑生而皇后親桑於苑中蠶室養蠶千薄以上祀以中牢羊豕祭蠶神曰菀窳婦人寓氏公主凡二神羣臣妾從桑還獻於繭館皆賜從桑者絲皇后自行凡蠶絲絮織室以作祭服祭服者冕服也天地宗廟羣臣五時之服其皇帝得以作縷縫衣得以作中絮而已置蠶官令丞諸天下官皆詣蠶室亦婦人從事故舊有東西織室作法通典漢皇后蠶於東郊蕙田案史家稱周禮蠶於北郊漢則東郊非古也魏依周制用北郊為是晉則西郊蓋止取與東郊藉田相對俱非古義後漢書禮儀志明帝永平二年三月皇后帥公卿諸侯夫人蠶祀先蠶禮以少牢注丁孚漢儀曰皇后出乘鸞輅青羽蓋駕駟馬龍旗九斿大將軍妻參乘太僕妻御前鸞旗車皮軒闟戟雒陽令奉引亦千乘萬騎車府令設鹵簿駕公卿五營校尉司𨽻校尉河南尹妻皆乘其官車帶夫本官綬從其官屬導從皇后置虎賁羽林騎戎頭黃門鼓吹五帝車女騎夾轂執法御史在前後亦有金鉦黃鉞五將導桑於蠶宫手三盆於繭館畢還宫案谷永對稱四月壬子皇后蠶桑之日也則漢桑亦用四月東觀漢記曰明德馬皇后置織室蠶室於濯龍中數往來觀視晉書禮志周禮王后帥內外命婦享先蠶於北郊漢儀皇后親蠶東郊苑中蠶室祭蠶神曰菀窳婦人寓氏公主祠用少牢魏文帝黃初七年正月命中宫蠶於北郊依周典也魏韋誕皇后親蠶頌於時明庶扇物鳥帑昏正躬耕帝藉邁德班令嘉柔桑之肇敷思郊廟之至敬命皇后以親蠶俾躬桑於郊坰考時日於巫咸詔太卜以獻禎御坤德之大輅翳翠葆以揚旌爾乃皇英參乘塗山奉輿總薑任於後陳載樊衛於二車千乘隱其雷動萬騎粲以星敷啓前路於三官命蚩尤而清衢遊青蚪於左角步素螭於右隅登崇壇而正位覿休氣於朝陽步雕輦而下降手柔條於公桑嬪妾肅以蒞事職蠶植而承筐供副禕之六服昭孝敬於蒸嘗盛華禮於中宇神化馳於八方乃延羣妾宴賜於前降至貴以逮下布愷悌之渥恩禮儀備序巾車回轅班中黃之禁財散束帛之戔戔神澤沛以雨施洪恩布於膴原同碩慶於生民發三靈之永歡苞繁祜於萬國卷福釐以言旋美休祚於億載豈百世之曾元隋書禮儀志魏遵周禮蠶於北郊吳韋昭制西蠶頌則孫氏亦有其禮矣晉書禮志武帝太康六年散騎常侍華嶠奏先王之制天子諸侯親耕藉田千畝后夫人躬蠶桑宫今陛下以聖明至仁修先王之緒皇后體資生之德合配乾之義而坤道未光蠶禮尚缺以為宜依古式備斯盛典詔曰昔天子親藉以供粢盛后夫人躬蠶以備祭服所以聿遵孝敬明教示訓也今藉田有制而蠶禮不修由中間務多未暇崇備今天下無事宜修禮以示四海其詳依古典及近代故事以參今宜明年施行於是蠶於西郊蓋與藉田對其方也乃使侍中成粲草定其儀先蠶壇髙一丈方二丈為四出陛陛廣五尺在皇后採桑壇東南帷宫外門之外而東南去帷宫十丈在蠶室西南桑林在其東取列侯妻六人為蠶母蠶將生擇吉日皇后著十二笄步搖依漢魏故事衣青衣乘油畫雲母安車駕六騩音貴馬女尚書著貂蟬佩璽陪乘載筐鈎公主三夫人九嬪世婦諸太妃太夫人及縣鄉君郡公侯特進夫人外世婦命婦皆步搖衣青各載筐鈎從蠶先桑二日蠶宫生蠶著簿上躬桑日皇后未到太祝令質明以一太牢告祠謁者一人監祠祠畢徹饌頒餘胙於從桑及奉祠者皇后至西郊升壇公主以下陪列壇東皇后東面躬桑採三條諸妃公主各採五條縣鄉君以下各採九條悉以桑授蠶母還蠶室事訖皇后還便座公主以下乃就位設享宴賜絹各有差隋書禮儀志晉太康六年武帝楊皇后躬桑於西郊祀先蠶宋書孝武帝本紀大明三年冬十月丁酉詔曰古者薦鞠青壇聿祈多慶分繭元郊以供純服來嵗可使六宫妃嬪修親桑之禮四年三月甲申皇后親桑於西郊禮志先蠶壇髙一丈方二丈為四出陛陛廣五尺在採桑壇東南帷宫之外去帷宫十丈皇后未到太祝令質明以一太牢告祀謁者一人監祀祀畢徹饌班餘胙於從桑及奉祀者周禮王后帥外內命婦蠶於北郊漢則東郊非古也魏則北郊依周禮也晉則西郊宜是與藉田對其方也魏文帝黃初七年正月命中宫蠶於北郊案韋誕后蠶頌則於時漢德已亡更考撰其儀也及至晉氏先蠶多采魏法宋孝武大明四年又修此禮隋書禮義志宋孝武大明四年始於臺城西白石里為蠶所設兆域置大殿七間又立蠶觀其禮皆循晉氏宋書孝武文穆王皇后傳大明四年后率六宫躬桑於西郊皇太后觀禮上下詔曰朕卜祥大昕測辰拂羽爰詔六宫親蠶川室皇太后降鑾從御佇蹕觀禮緑蘧既具元紞方修庶儀發椒闈花動中縣妃主以下可量加班賜隋書禮儀志北齊為蠶坊於京城北之西去皇宫十八里之外方千步蠶宫方九十步牆髙一丈五尺被以棘其中起蠶室二十七口别殿一區置蠶宫令丞皆宦者為之路西置皇后蠶壇髙四尺方二丈四出陛陛廣八尺置先蠶壇於桑壇東南大路東橫路之南壇髙五尺方二丈四出陛陛各五尺外兆方四十步面開一門有緑襜𥜗衣黃履以供蠶母每嵗季春榖雨後吉日使公卿以一太牢祠先蠶黃帝軒轅氏於壇上無配如祀先農禮訖皇后因親桑於桑壇備法駕服鞠衣乘重翟帥六宫升桑壇東陛即御座女尚書執筐女主衣執鈎立壇下皇后降自東陛執筐者處右執鈎者居左蠶母在後乃躬桑三條訖升壇即御座內命婦以次就桑服鞠衣者採五條展衣七條禒衣九條以授蠶母還蠶室切之授世婦灑一簿領預桑者並復本位后乃降壇還便殿設勞酒頒賚而還後周制皇后乘翠輅率三妃三㚤音弋婦官名御媛御婉三公夫人三孤內子至蠶所以一太牢親進祭奠先蠶西陵氏神禮畢降壇昭化嬪亞獻淑嬪終獻因以躬桑蕙田案隋書周祭先蠶以一太牢與隋制同通典通志通考俱作少牢恐相沿之訛隋制先蠶壇於宫北三里為壇髙四尺季春上已皇后服鞠衣乘重翟率三夫人九嬪內外命婦以一太牢制幣祭先蠶於壇上用一獻禮祭訖就桑位於壇南東面尚功進金鈎典制奉筐皇后採三條反鈎命婦各依班採五條九條而止世婦以授蠶母受切桑灑訖還依位皇后乃還宫自齊及周隋其典法多依晉儀亦時有損益唐書太宗本紀貞觀元年三月癸巳皇后親蠶文獻通考唐先蠶壇在長安宫北苑中髙四尺周廽三十步太宗貞觀九年三月文德皇后率內外命婦有事於先蠶唐會要髙宗永徽三年三月七日制以先蠶為中祀后不祭則皇帝遣有司享之如先農文獻通考有司言案周官宗伯后不祭則攝而薦豆籩徹明王后之事而宗伯得攝行之伏以農桑乃衣食萬人不宜獨闕先蠶之祀無已則皇后遣有司享之如先農可也唐書髙宗本紀顯慶元年三月辛巳皇后親蠶總章二年三月癸巳皇后親蠶咸亨五年三月皇后親蠶上元元年三月己巳皇后親蠶二年三月丁巳天后親蠶元宗本紀開元元年正月辛巳皇后親蠶文獻通考自嗣聖以來廢闕此禮至是始重行焉肅宗本紀乾元二年三月己巳皇后親蠶唐書張皇后傳后親蠶苑中儀物甚盛通典顯慶元年皇后武氏先天二年皇后王氏乾元二年皇后張氏並有事於先蠶其儀備開元禮開元禮皇后季春吉已享先蠶儀攝事附齋戒先祀五日散齋三日於後殿致齋二日於正殿前致齋一日尚寢設御幄於正殿西序及室中俱東向致齋之日晝漏上水一刻尚儀版奏請中嚴尚服帥司仗布侍衛司賓引內命婦陪位並如式六尚以下各服其服詣後殿奉迎尚儀版奏外辦上水三刻皇后服鈿叉禮衣結珮乘輿出自西房華蓋警蹕侍衛如常儀皇后即御座東向坐六尚以下侍衛如常一刻頃尚儀前跪奏稱尚儀妾姓言請降就齋室興退復位皇后降座乘輿入室六尚以下各還寢直衛者如常司賓引陪位者退散齋之日內侍帥內命婦之吉者使蠶於蠶室攝事無以上儀凡應享之官散齋三日於其寢致齋二日一日於其寢一日於享所亞獻終獻則致齋二日皆於其所六尚以下應從升者及從享內外命婦各於其寢清齋一宿諸應享之官致齋之日給酒食及明衣各習禮於齋所光祿卿監取明水火大官令取水於隂鑑取火於陽燧火以供㸑水以實樽前享一日諸衛令其屬未後一刻各以其器服守衛壝門每門二人每隅一人享日未明給使代執與女工人等俱清齋一宿攝事同陳設前享三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御座尚舍直長設內命婦及六尚以下次於大次之後俱南向守宫設外命婦次大長公主長公主公主以下於南壝之外道西三公夫人以下在其南俱重行每等異位東向北上設陳饌幔於內壝東門之外道南北向攝事守宫設享宫次於東壝內道南北向西上設陳饌幔於內壝東門外道南北向前享二日大樂令設宫懸之樂於壇南內壝之內如圜邱儀諸女工人各為位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外又為瘞塪於壇之壬地內壝之外方深取足容物南出陛又為採桑壇於壇南二十步所方三丈髙五尺西出陛尚舍量施帷幛於外壝之外四面開門其東門使容厭翟車前享一日內謁者設御位於壇之東南西向設望瘞位於壇之西南當瘞塪西向設亞獻終獻位於內壝東門之內道南執事者位於其後每等異位俱重行西向北上設典正位於壇下一位於東南西向一位於西南東向女史各陪於後設司贊位於樂懸東北掌贊二人在南差退俱西面又設司贊掌贊位於瘞塪西南東面南上設典樂舉麾位於壇上南陛之西東向設司樂位於北懸之間當壇北向設內命婦位於終獻之南每等異位重行西面北上設外命婦位於中壝南門之外大長公主以下於道東西向當內命婦位差退太夫人以下於道西去道逺近準公主俱每等異位重行相向北上又設御採桑位於採桑壇上東向設內命婦採桑位於壇下當御位東北每等異位南向西上設外命婦採桑位於壇下當御位東南每等異位北向西上設執御鈎筐者位於內命婦之西少南西上尚功執鈎司製執筐設內命婦執鈎筐者位各於其採桑位之後尚功下四典執鈎司製下女史執筐設門外位享官於東壝之外道南從享內命婦於享官之東俱每等異位重行北向西上從享外命婦於南壝之外道西如設次之式攝事內謁者設三獻位於內壝東門之內道北執事位於道南每等異位重行西面以北為上又設望瘞位於壇之東北當瘞塪道西向又設典正位於壇下一位於東南西向一位於西南東向女史各陪其後糾察違失設掌贊位於樂懸東北女史二人在南差退俱西向設掌贊女史位於瘞塪西南東向南上設典樂舉麾位於壇上南陛之西東向設司樂位於北懸之間當壇北向設三獻以下門外位於東壝之外道南每等異位北向西上無設御位下至此儀設酒樽之位於壇上東南隅北向西上犧樽二象樽二山罍二樽皆加勺冪有坫以置爵設御洗於壇南陛東南攝事無御洗亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚冪者位於樽罍篚冪之後設幣篚於壇上樽坫之所晡後內謁者帥其屬以樽坫罍洗篚冪入設於位升壇者自東陛享日未明十五刻大官令帥宰人以鸞刀割牲祝史以豆取毛血置於饌所遂烹牲其神厨及諸司供事便次守宫與金吾相之量於壇東張設享日未明五刻司設服其服升設先蠶氏神座於壇上北方南向席以莞設神位於座首車駕出宫前享一日金吾奏請外命婦等應集壇所者並聽夜行其應採桑者四人各具女侍者進筐鈎載之而行監門先奏請享日未明四刻開所由苑門諸親及命婦以下以次入詣壇南次所各服其服其應採桑者筐鈎各具女侍者執授內謁者監內謁者監受之以授執鈎筐者享日未明三刻槌一鼓為一嚴三嚴時節前日內寺奏裁未明二刻槌二鼓為再嚴尚儀版奏請中嚴內命婦各服其服所司陳車駕鹵簿未明一刻槌三鼓為三嚴司賓引內命婦入立於庭重行西面以北為上六尚以下各服其服俱詣室奉迎尚服負寶如式內僕進厭翟車於閣外尚儀版奏外辦馭者執轡皇后服鞠衣乘輿以出華蓋侍衛警蹕如常內命婦從出門皇后升車尚功司製進筐鈎載之仗衛如常內命婦及六尚等乘車陪從如式其內命婦應採桑者四人各服其服典製等進筐鈎載之諸翊駕之官皆乘馬駕動警蹕如常不鳴鼓吹諸衛前後督攝如常內命婦宫人以次從饋享享日未明二刻諸享官各服其服尚儀及司醖各帥其屬攝事則女史及司醖各帥其屬入實樽罍及幣犧樽實以醴齊象樽實以盎齊山罍實以清酒齊加明水酒加元酒各實於上樽其幣以