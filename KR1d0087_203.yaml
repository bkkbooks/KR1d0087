星去極八十半下頭六箇雷電形今測雷電六星黃經二宮一十三度五十四分緯北一十五度四十四分赤經二宮九度零七分緯北八度一十一分星經雷電六星在室西南主興雷電也距隋書天文志室南六星曰雷電宋兩朝天文志西南星去極八十七度入危宿十二度壘壁陳次十二星十二兩頭大似井今測壘壁陳一星黃經一宮一十五度四十六分緯南四度五十三分二星黃經一宮一十七度一十二分緯南四度四十九分十三星黃經一宮一十七度二十二分緯南二度二六分四星黃經一宮一十九度零七分緯南二度二十九分六五星黃經一宮二十四度二十三分緯南二度星黃經二宮初度五十八分緯南一度一十分八七星黃經二宮七度一十分緯南初度二十分星黃經二宮一十二度四十五分緯南一度七九星黃經二宮二十三度五十六分緯南三度零分十星黃經二宮二十四度四十七分緯南二度五十四分四十一星黃經二宮二十四度三十二分緯南五度十二分三十二星黃經二宮二十三度十八分緯南五度四十分星經壘辟十二星在室南主翊衛天子之軍西入室五度去北辰一百二十三度也晉書天文志壘辟陳十二星在羽林北羽林之垣壘也主軍衛為營壅也宋史天文志一作壁壘宋兩朝天文志距西第一星去極一百十五度入女宿十一度陳下分布羽林軍四十五卒三為羣今測羽林軍三星黃經二宮四度二十七分緯南八度一十分四星黃經二宮四度一十一分緯南五度三十七分九六星黃經二宮一十二度四十分緯南二度四十分七星黃經二宮一十一度五十三分緯南三度五十九分十八星黃經二宮一十二度二十一分緯南四度一三分九星黃經二宮一十二度二十五分緯南四度四十四分星經羽林軍星四十五星在室南書史記天官書虛危其南有衆星曰羽林天軍晉天文志一曰天軍主軍騎又主翼王也室宋史天文志三三而聚散出壘壁之南一曰在營之南東西布列北第一行主天軍軍騎翼衛之象度宋兩朝天文志距大星去極一百一十七入危宿十五度半軍西四星多難論子細歷歷看區分三粒黃金名鈇鉞一顆真珠北落門星經鈇鑕三星在八魁西北一名斧鉞主斬刈亂行誅誑詐偽人史記天官書軍西為壘或曰鉞宋史天文志斧鉞三星在北落師門東芟刈之具也主斬芻牧以飼牛馬隋志通志皆在八魁西北主行誅拒難斬伐姦謀三宋兩朝天文志距北星去極一百十度入室宿一度今測北落師門黃經一宮二十九度二十二分緯南二十一度赤經二宮九度五十六分緯南三十一度一十三分星經北落師門一星在羽林軍西主候兵入危九度去北辰一百二十度史記天官書鉞旁有一大星為北落在晉書天文志北落師門一星在羽林西南北者宿北方也落天之藩落也師衆也師門猶軍門也長安城北門曰北落門以象此也主非常以候兵宋兩朝天文志去極一百二十六度入危宿十一度半八魁九星今無門東八魁九箇子星經八魁九星在北落東南主獸之官宿宋兩朝天文志距南星去極一百三十九度入壁四度半天綱一星門西一宿天綱是星經天綱一星在北落西南主天繩張幔野宿所用也晉書天文志北落西南一星曰天綱主武帳宋史天文志一曰在危南主武帳宮舍天子遊獵所會宋兩朝天文志去極一百二十九度入危宿五度土功吏二星今一星電旁兩箇土功吏星經土吏三星在室西南主備設司過農事宋隋書天文志室西南二星曰土功吏主司過度史天文志土功吏一曰在危東北蕙田案步天歌室宿之屬有土功吏壁宿之屬有土公宋志溷合為一騰蛇室上二十二星經騰蛇二十二星在室北枕河主水蟲頭入室一度去北辰五十度也晉書天文志騰蛇二十二星在營室北天蛇也度宋兩朝天文志距中大星去極四十四少入危宿九度半室宿之屬合象宋史天文志案步天歌已上諸星皆屬營室雷電土功吏鈇鉞晉志皆不載隋志有之壘壁陳北落師門天綱羽林軍晉志在二十八宿外騰蛇屬天市垣武密書以騰蛇屬營室又屬壁宿乾象新書以西十六星屬尾屬危東六星屬室羽林軍西六星屬危東三十九星屬室以天綱屬危斧鉞屬奎通占録又以斧鉞屬壁屬奎説皆不同蕙田案騰蛇北方之星無屬尾宿之理宋志云乾象新書以西十六星屬尾屬危者蓋衍屬尾二字當刪壁兩星下頭是霹靂今測壁一星黃經三宮四度四十八分緯北一十二度三十五分赤經二宮二十九度一十八分緯北一十三度二十六分星經東壁二星主文章圗書八宋史天文志漢永元銅儀東壁二星九度舊去極十六度景祐測驗壁二星九度距南星去極八十五度半宋兩朝天文志距南星去極八十度霹靂五星橫著行今測霹靂一星黃經二宮一十四度一十二分緯北九度零四分二星黃經二宮一十七度零一分緯北七度一十八分分三星黃經二宮二十度四十八分緯北九度零三四星黃經二宮二十三度一十三分緯北七度一十四分星經霹靂五星在雲雨北天威擊擘萬物志隋書天文志土公西南五星曰礔礰宋史天文霹靂五星在雲雨北一曰在雷電南一曰在土功西主陽氣大盛擊碎萬物宋兩朝天文志距西星去極九十三度入危十五度雲雨次之口四方今測雲雨一星黃經二宮一十八度三十一分緯北四度二十七分二星黃經二宮二十二度一十五分緯北三度二十五分星經雲雨四星在雷電東主雨澤萬物成之兩隋書天文志礔礰南四星曰雲雨在壘壁北宋朝天文志距西北星去極九十五度入室宿五度壁上天廏十圜黃星經天廏十星在壁北主天子馬坊廏苑之官也驛晉書天文志東壁北十星曰天廏主馬之官若今亭也主傳令置驛逐漏馳鶩謂其行急疾與晷漏競馳也宋兩朝天文志距西星去極四十九度半入壁宿初度鈇鑕五星羽林旁通志鈇鑕五星在天倉西南刈具也主斬芻飼牛馬土功兩黑壁下藏星經土公二星在壁南主營造宮室起土之官蕙田案通志文獻通考俱無此一句今協紀辨方書有之壁宿之屬合象宋史天文志案步天歌壁宿下有鈇鑕五星晉隋志皆不載隋志八魁西北三星曰鈇鑕又曰鈇鉞其占與步天歌室宿內斧鉞略同恐即是此誤重出之霹靂五星雲雨四星晉志無之隋志有之武密書以雲雨屬室宿天廏十星晉志屬天市垣其説皆不同右北方元武七宿五禮通考卷一百九十三
