body:
  text: 五禮通考卷一百九十三刑部尚書秦蕙田撰嘉禮六十六觀象授時東方蒼龍七宿角宿二星角兩星南北正直著今測角一星黃經九宮一十九度二十六分緯南一度五十九分赤經九宮一十七度一十分緯南九度二十七分十二星黃經九宮一十七度四十三分緯北八度四二分赤經九宮一十八度二十三分緯北一度零一分星經角二星為天門夀星蒼龍角也南左角名天津北右角為天門中問名天關左主天田右主天祗史記天官書左角李右角將元宋史天文志漢永元銅儀以角為十三度而唐開遊儀角二星十二度舊經去極九十一度今測九十三度半距星正當赤逆其黃道在赤道南不經角中今測角在赤道南二度半黃道復經角中即與天象合景祐測驗角二星十二度距南星去極九十七度在赤道外六度中有平道上天田總是黑星兩相連今測平道一星黃經九宮一十三度四十七分緯北一度四十五分星經平道二星在角間主路逆之官角宋兩朝天文志距東星去極九十一度入二度星經天田二星在角北主天子畿內地志宋史天文志武密曰天子籍田也宋兩朝天文距西星去極入十二度半入角二度半進賢一星别有一烏名進賢平道右畔獨淵然星經進賢一星在平道西主卿相薦舉逸士通志平道西一星曰進賢在太微宮東周鼎三星最上三星周鼎形星經周鼎三星在攝提大角西主神鼎宿宋兩朝天文志距東北星去極六十四度半入角七度半角下天門左平星雙雙橫於庫樓上今測天門一星黃經九宮一十八度二十三分緯南七度五十一分二星黃經九宮二十一度四十八分緯南六度一十六分星經天門二星在左角南主天門侍晏應對之所六宋兩朝天文志距西星去極一百四度半入軫十度晉書天文志平星二星在庫樓北平天下之法獄事廷尉之象宋兩朝天文志距西星去極一百九度半入軫十六度庫樓十星屈曲明樓中五柱十五星三三相似如鼎形其中四星别名衡星經庫樓星二十九星庫樓十星柱十五星衡四星在角南軫東南晉書天文志庫樓十星其六大星為庫南四星為樓在角南一曰天庫兵甲之府也旁十五星三三而聚者柱也中央四小星衡也宋兩朝天文志庫樓二星距西北星去極一百二十三度入軫十五度半蕙田案協紀辨方書云庫樓今九星以圗校之止八星南門二星南門樓外兩星橫晉書天文志南門二星在庫樓南天之外門也十宋兩朝天文志距西星去極一百三十七度入軫一度蕙田案天官書亢為疏廟其南北兩大星曰南門自指亢宿上下兩星而言正義以庫樓南之南門釋之疑非是角宿之屬合象宋史天文志案晉志以左角為天田别不載天田二星隋志有之平道進賢周鼎晉志皆屬太微垣庫樓并衡星柱星南門天門平星皆在二十八宿之外唐武密及景祐書乃與步天歌合亢宿四星亢四星恰似彎弓狀今測亢一星黃經十宮初度零三分緯北二度五十八分赤經九宮二十八度五十九分緯南八度四十四分十三星黃經九宮二十九度一十九分緯北七度一九分四星黃經十宮三度三十二分緯北初度三十二分星經亢四星名天府一名天庭四史記天官書亢為疏廟主疾索隱曰元命包云亢星為廟廷文耀鈎為疏廟宋均以為疏外也廟或為朝訟晉書天文志亢天子之內朝也總攝天下奏事聽理獄録功者也一曰疏廟主疾疫史宋兩朝天文志距南第二星去極九十六度宋天文志亢宿四星漢永元銅儀十度唐開元遊儀九度舊去極入十九度今九十一度半景祐測驗亢九度距南第二星去極九十五度大角一星大角一星直上明今測黃經九宮一十九度五十分緯北三十一度零三分赤經十宮初度二十二分緯北二十度五十六分星經大角一星天棟在攝提中主帝座入亢三度半去北辰五十九度也史記天官書大角者天王帝廷十宋兩朝天文志去極六六度入亢二度半折威七星今無折威七子亢下橫星經折威七星在亢南主詔獄斬殺邊將死事亢宋兩朝天文志距西第三大星去極一百三度入三度左右攝提各三星大角左右攝提星三三相似如鼎形星經攝提六星在角亢東北提史記文官書大角兩旁各有三星鼎足句之曰攝攝提者直斗杓所指以建時節故曰攝提格攝隋書天文志攝提直斗杓之南主建時節伺禨祥提為楯以夾擁帝席也主公卿十宋兩朝天文志攝提六星其右距北大星去極六七度入亢七度其左距南星去極七十二度半入亢七度頓頑二星折威下左頓頑星兩箇斜安黃色精晉書天文志頓頑二星在折威東南主考囚情狀察詐偽也宋兩朝天文志距東南星去極一百一十二度半入亢四度陽門二星頑下二星號陽門色若頓頑直下存星經陽門二星在庫樓東北隘塞外冦盜之事書天文志庫樓東北二星曰陽門主守隘塞也晉宋兩頓天文志太陽門二星距西星去極一百一十三度入角十度亢宿之屬合象宋史天文志案晉志以大角攝提屬太微垣折威頓頑在二十八宿之外陽門則見於隋志而晉史不載武密書以攝提折威陽門皆屬角亢乾象新書以右攝提屬角左攝提屬亢餘與武密書同景祐測驗乃以大角攝提頓頑陽門皆屬于亢其説不同蕙田案晉志載陽門二星在二十八宿之外與隋志同此志疑誤氐四星似斗側量米今測氐一星黃經十宮一十度四十一分緯北初度二十六分赤經十宮八度二十四分緯南十四度三十九分十二星黃經十宮一十六度三十四分緯南一度一八分三星黃經十宮二十度四干分緯北四度二十八分五四星黃經十宮十四度五十八分緯北八度三十分赤經十宮十五度零二分緯南八度零九分星經氐四星為天宿宮一名天根二名天符主皇后妃嬪前二大星正妃後二左右史記天官書氐為天根主疫正義曰星經云氐四星為路寢聽朝所居其占明大則臣下奉度合誠圗云氐為宿宮也晉書天文志氐四星王者之宿宮后妃之府休解之房前二星適也後二星妾也宋兩朝天文志距西南星去極一百四度半度宋史天文志漢永元銅儀唐開元遊儀氐宿十六去極九十四度景祐測驗與乾象新書皆九十八度天乳一星天乳氐上黑一星世人不識稱無名星經天乳在氐北主甘露去北長九十六度四宋兩朝天文志天乳一星去極九十二度入氐十度招搖一星一箇招搖梗河上星經招搖星在梗河北入氐二度去北辰四十一度隋書天文志招搖一星一曰矛楯宋兩朝天文志去極五十一度入亢四度半梗河三星梗河橫列三星狀星經梗河三星在大角帝座北天隋書天文志梗河者天矛也一曰天鋒宋兩朝文志距大星去極五十九度入氐二度帝席三星今無帝席三黑河之西星經帝席三星在大角北宋晉書天文志大角北三星曰帝席主宴獻酬酢兩朝天文志距東星去極六十七度半入氐宿一度半亢池六星今四星亢池六星近攝提星經亢池六星在亢北主度送迎之事主隋書天文志亢北六星曰亢池亢舟航也池水也送往迎來史宋史天文志武密云主斷軍獄掌棄市殺戮與舊異説宋兩朝天文志距北大星去極七十度半入亢三度氐下衆星騎官出騎官之衆二十七三三相連十欠一星經騎官二十七星在氐南主天子騎虎賁入北辰一百十五度史記天官書房南衆星曰騎官宋兩朝天文志距西北星去極一百二十度入氐宿初度陳車氐下騎官次今測陳車一星黃經十宮一十六度一十五分緯南七度三十七分二星黃經十宮一十八度三十七分緯南一十度星經陳車三星在氐南主革車兵車晉書天文志陳車三星在騎官東北車騎三星騎官下三車騎位星經車騎三星在騎官南總領車騎行軍之事二宋兩朝天文志距東南星去極一百四十度入氐度天輻二星天輻兩星在陳傍今測天輻一星黃經十宮二十四度一十分緯南八度二十七分二星黃經十宮二十四度五十三分緯南九度五十四分星經天輻二星在房西主鑾駕乘輿之官車宋史天文志天輻在房西斜列主乘輿若周官巾官也一作天福騎陳將軍一星將軍陳裏振威霜星經車騎將軍星在騎官東南主車騎將軍之官宋晉書天文志騎官東端一星騎陳將軍騎將也史天文志將軍一星騎將也在騎官東南總領車騎車將部陳行列蕙田案星經作車騎將軍晉隋二志俱作騎陳將軍惟宋志止稱將軍與步天歌合氐宿之屬合象宋史天文志步天歌已上諸星俱屬氐宿乾象新書以帝席屬角亢池屬亢武密與步天歌合皆屬氐而以梗河屬亢占天録又以陳車屬於亢乾象新書屬氐餘皆與步天歌合房四星直下主明堂今測房一星黃經十宮二十八度三十一分緯南五度二十三分赤經十宮二十五度零二分緯南二十五度零八分十二星黃經十宮二十八度四十三分緯南五度二三分三星黃經十宮二十八度四十六分緯北一度零五分一四星黃經十宮二十八度零八分緯南度五十五分星經房四星名天府管四方一名天旗二名天駟三名天龍四名天馬五名天衡六為明堂房為四表表三道日月五星常道也上第一星名為右服次將其名陽環上道二星名右驂上相其名中道三名左服次將其名下道四名左驂上相總四輔史記天官書房為府曰天駟其隂右驂輔晉書天文志房四星為明堂天子布政之宮亦四也下第一星上將也次次將也次次相也上星上相也南二星君位北二星夫人位又為四表中問為天衢為天開黃道之所經也南間曰陽環其南曰太陽北間曰隂間其北曰太隂七曜由于天衢則天下平和亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂宋兩朝天文志距南第二星去極一百一十四度半舊宋史天文志漢永元銅儀唐開元遊儀房宿五度去極百八度今百十度半景祐測驗房距南第二星去極百十五度在赤道外二十三度乾象新書在赤道外二十四度鍵閉一星鍵閉一黃斜向上今測黃經十一宮初度零八分緯北一度四十二分星經鍵閉星在房東北主管籥四宋兩朝天文志去極一百八度入房度鈎鈐二星鈎鈐兩箇近其旁今測黃經十宮二十九度一十七分緯北初度二十四分星經鈎鈐二星主法第一名天健二名天宮去北辰一百四度半史記天官書房旁有兩星曰襟度半入宋兩朝天文志鈎鈐二小星去極一百九房二度半蕙田案鈎鈐二星今圗止一星罰三星罰有三星直鍵上星經罰三星在東咸西下西北而列主受金罰贖市布租也宋史天文志罰二星在東西咸正南宋兩朝天文志距南星去極一百八度入心一度半兩咸夾罰似房狀今測西咸一星黃經十宮二十二度五十五分緯北四度零四分二星黃經十宮二十五度二十六分緯北三度三十三分十三星黃經十宮二十五度五十八分緯北六度一一分四星黃經十宮二十六度五十一分緯北九度一十九分二東咸一星黃經十一宮四度緯北五度二十分星黃經十一宮三度三十二分緯北三度二十分分三星黃經十一宮一度五十七分緯北一度四十四星黃經十一宮三度零五分緯北一度四十分星經西咸四星在氐東主治淫泆南星入氐五度去北辰九十三度東咸四星在房東北主防淫泆星南入心二度去北辰一百三度朝宋史天文志東咸在心北西咸在房西北宋兩天文志東咸距西南星去極一百一十一度入心一度西咸距西南星去極一百四度半入氐十五度日一星房下一星號為日今測黃經十宮二十二度三十八分緯北初度零一分宋史天文志日一星在房宿南太陽之精主昭令德十宋兩朝天文志去極一百一三度入氐十四度半從官二星從官兩箇日下出隋書天文志從官二星在積卒西北氐宋兩朝天文志距西星去極