body:
  text: 五禮通考卷一百四十四刑部尚書秦蕙田撰嘉禮十七飲食禮禮記文王世子庶子之正于公族者教之以孝悌睦友子愛明父子之義長幼之序注正者政也庶子司馬之屬掌國子之倅為政于公族者其朝於公內朝則東面北上臣有貴者以齒其在外朝則以官司士為之其在宗廟之中則如外朝之位宗人授事以爵以官其登餕獻受爵則以上嗣庶子治之雖有三命不踰父兄疏此句應承前文臣有貴者以齒之下其外朝既云司士為之則內朝自然庶子治之也所以在此者當是簡札遺脫鄭不言者略耳其公大事則以喪服之精粗為序雖于公族之喪亦如之以次主人其在軍則守於公禰注謂從軍者公禰行主也行以遷主言禰在外親也公若有出疆之政庶子以公族之無事者守於公宮正室守太廟諸父守貴宮貴室諸子諸孫守下宮下室五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之至於賵賻承含皆有正焉公族其有死罪則磬於甸人其刑罪則纎剸亦告於甸人公族無宮刑獄成有司讞於公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑於甸人公又使人追之曰雖然必赦之有司對曰無及也反命於公公素服不舉為之變如其倫之喪無服注素服於凶事為吉於吉事為凶非喪服也君雖不服臣卿大夫死則皮辨錫衰以居往弔當事則辨絰於士蓋疑衰同姓則緦衰以弔之今無服者不往弔也倫謂親疏之比也素服亦皮辨矣親哭之注不往弔為位哭之而已君於臣使有司哭之公族朝於內朝內親也雖有貴者以齒明父子也外朝以官體異姓也宗廟之中以爵為位崇德也宗人授事以官尊賢也登餕受爵以上嗣尊祖之道也喪紀以服之輕重為序不奪人親也戰則守於公禰孝愛之深也正室守太廟尊宗室而君臣之道著矣諸父諸兄守貴室子弟守下室而讓道逹矣五廟之孫祖廟未毁雖及庶人冠取妻必告死必赴不忘親也親未絶而列於庶人賤無能也敬弔臨賻賵睦友之道也古者庶子之官治而邦國有倫邦國有倫而衆鄉方矣公族之罪雖親不以犯有司正術也所以體百姓也刑於隱者不與國人慮兄弟也弗弔弗為服哭於異姓之廟為忝祖逺之也疏為其犯罪忝辱先祖於公法合疏逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宮刑不剪其類也宣公二年左氏傳晉麗姬之亂詛無畜羣公子注詛盟誓疏服虔云麗姬與獻公及諸大夫詛無畜羣公子欲令其二子專國杜雖不注義似不然若麗姬為此姬死即應復常何得比至於今國無公族蓋為奚齊卓子以庶篡適晉國創其為亂不用復畜公子案檢傳文及國語文公之子雍在秦樂在陳黑臀在周襄公之孫談在周則是晉之公子悉皆出在他國是其因行而不改也自是晉無公族注無公子故廢公族之官語疏公族之官掌教公之子弟孔朝注國云公族大夫掌公族及卿大夫子弟之官是卿之適子屬公族也及成公即位乃宦卿之適而為之田以為公族注宦仕也為置田邑以為公族大夫又宦其餘子亦為餘子注餘子適子之母弟也亦治餘子之政亦疏庶子為妾子知餘子則是適子之母弟也言為餘子則知餘子之官亦治餘子之政令主教卿大夫適妻之次子也下云庶子為公行不云教庶子然則卿大夫之妾子亦是餘子之官教之矣其庶子為公行注庶子妾子也掌率公戎行疏下文趙盾自以庶為旄車之族即公行也晉於是有公族餘子公行皆官名國語晉語欒伯請公族大夫欒伯欒武子公族大夫掌公族與卿之子弟公曰荀家惇惠荀家晉大夫荀會文敏荀會荀家之族黶也果敢黶欒書之子桓子無忌鎮靜無忌韓厥之子公族穆子使兹四人者為之夫膏梁之性難正也故使惇惠者教之使文敏者導之使果敢者諗之使鎮靜者修之惇惠者教之則遍而不倦文敏者導之則婉而入果敢者諗之則過而不隱鎮靜者修之則一使兹四人者為公族大夫孔叢子雜訓魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也答曰吾以其疏逺也子思聞之曰無恩之甚也昔者季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之以食序以昭穆萬世婚姻不通忠篤之道然也右正公族文獻通考秦商鞅立法宗室非有軍功論不得為屬籍漢書髙帝本紀七年置宗正官以敘九族文帝本紀四年復諸劉有屬籍家無所與賜諸侯王子邑名二千石武帝本紀元光元年復七國宗室前絶屬者馬氏曰孝景三年詔楚元王子執等與吳王濞等為逆朕不忍加法除其籍毋令汚宗室是年始詔復之後元二年正月朝諸侯於甘泉宮賜宗室昭帝本紀始元二年以宗室毋在位者舉茂材劉辟疆劉長樂皆為光祿大夫辟疆守長樂衛尉宣帝本紀地節元年詔曰蓋聞堯親九族以和萬國朕蒙遺德奉承聖業惟念宗室屬未盡而以罪絶若有遺材改行勸善其復屬使得自新成帝本紀建始二年罷太子博望苑以賜宗室朝請者漢書劉向傳上封事言王氏一姓朱輪華轂者二十三人大將軍秉事用權五侯驕奢排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與已分權事勢不兩大王氏與劉氏且不並立宜發明詔吐德音援近宗室親而納信黜逺外戚毋授以政所以褒睦內外之姓子孫無疆之計也哀帝本紀即位賜宗室王子有屬者馬各一平帝本紀元始元年詔宗室屬未盡而以罪絶者復其屬其為吏舉廉佐史補四百石師古曰宗室為吏者皆令舉廉各從本秩而依廉吏遷之為佐史者例補四百石四年二月賜宗室有屬籍者爵自五大夫以上各有差五年正月祫祭明堂宗室子九百人召助祭禮畢皆益戶賜爵及金帛增秩補吏各有差詔曰蓋聞帝王以德撫民其次親親以相及也昔堯睦九族舜惇敘之朕以皇帝幼年且統國政惟宗室子皆太祖髙皇帝子孫及兄弟吳頃楚元之後漢元至今十有餘萬人雖有王侯之屬莫能相紏或陷入刑罪教訓不至之咎也傳不云乎君子篤於親則民興於仁其為宗室自太上皇帝以來族親各以世氏郡國置宗師以紏之致教訓焉二千石選有德義者以為宗師考察不從教令有寃失職者宗師得因郵亭書言宗伯請以聞常以嵗正月賜宗師帛各十匹後漢書世祖本紀建武二年十二月戊午詔曰惟宗室列侯為王莽所廢先靈無所依歸朕愍之其並復故國若侯身已殁屬所上其子孫見名尚書封拜十三年二月丙辰詔曰長沙王興真定王得河間王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為真定侯邵為樂成侯茂為單父侯其宗室及絶國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公文獻通考漢置宗正卿掌序録王國嫡庶之次及諸宗親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決胡廣曰又嵗一治諸王世譜差序秩後漢書和帝本紀元興元年宗室以罪絶者悉復屬籍文獻通考魏文帝黃初二年制封王之庶子為鄉公嗣王之庶子為亭侯公之庶子為亭伯明帝太和五年詔令諸王及宗室公侯各將適子一人朝齊王時宗室曹冏上書曰大魏之興二十四年矣子弟王空虛之地君有不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶內無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人厠其間與相維制非所以強幹弱枝備萬一之虞也今之用賢超為名都之主或為偏師之帥而宗室有文者必限之小縣之宰有武者必致百人之上非所以勸進賢能褒異宗室之禮也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冀以此論感悟曹爽爽不能用晉武帝懲魏氏孤立之弊故大封宗室授以職任又詔諸王皆得自選國中長吏衛將軍齊王攸獨不敢皆令上請又詔除魏宗室禁錮晉置宗正統皇族家人圖牒孝武制帝室期親官非祿官者月給錢十萬梁置宗正卿位視列曹尚書皇室外戚之籍以宗室為之後魏明帝時京兆王遙大功昆弟皆是景穆之孫至明帝而夲服絶故除遙等屬籍遙表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬絶矣去兹以往猶繫之以姓而弗别綴之以食而弗殊又律曰議親者非惟當世之屬親歷謂先帝之五世謹尋斯旨將以廣帝宗重磐石先王所以變兹事條為此别制者大和之季方有意於吳屬經始之費慮深在初割滅之起暫出當時也且臨淮王提分屬籍之始髙祖賜帛三千匹所以重分離樂良王長命亦賜縑二千匹所以存慈眷此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔已者衆臣誠不欲妄親太階茍求潤屋但傷大宗一分則天子屬籍不過千數人而已在漢親王之子不限多少皆列土而封謂之曰侯至於魏晉莫不廣胙河山稱之曰公者蓋惡其大宗之不固骨肉之恩疏矣臣去皇上雖是五世之逺於先帝便是天子之孫髙祖所以國秩祿賦復給衣食后族惟給其賦不與衣食者欲以别內外限異同也今諸廟之感在心未忘行道之悲倐然已及其諸封者身亡之日三年服終然後改奪今朝猶在遏密之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書左僕射元暉奏同遙表靈太后不從先是皇族有譴皆不持訊時有宗士元顯當犯罪宗正約以舊制尚書李平奏以帝宗磐石周布天下其屬籍疏逺蔭官卑末無良犯憲理須根究請立限斷以為定式詔曰雲漢綿逺蕃衍代滋植籍宗氏而為不善者良亦多矣先朝既無不訊之格而空相矯恃以長為暴諸在議請之外者可悉依常法齊置大宗正寺掌宗室屬籍統皇子王國長公主家唐太宗貞觀元年初上皇欲強宗室以鎮天下故皇再從三從弟及兄弟之子雖童孺皆為王王者數十人上從容問羣臣封宗子於天下利乎封德彛對曰前世惟皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以來未有如今日之多者爵命既崇多給力役恐非示天下以至公也上曰然朕為天子所以養百姓也豈可勞百姓以養已之宗族乎乃詔降宗室郡王皆為縣公惟有功者數人不降蕙田案大宗此舉是也傳云親親之殺封爵多則濫濫則淫淫則刑禍隨之豈保全宗族之道乎玄宗先天之後皇子幼則居內東封後以年漸長成乃於安國寺東附苑城同為大宅分院居之名為十王宅令中官押之於夾城中起居每日家令進膳又引詞學工書之人入教謂之侍讀十王謂慶忠棣鄂榮光儀頴永濟蓋舉全數其後盛儔陳豐恆涼六王又就封入內宅開元二十五年鄂光得罪忠王繼大統天寶中慶棣又殁惟榮儀十四王居內而府幕列於外坊嵗時通名起居而已外諸孫長成又於十王宅外置百孫院每嵗幸華清宮側亦有十王宅百孫院十王宮人每院四百餘人又於宮中置維城庫諸王月俸物納之以給用諸孫納妃嫁女亦就十院中太子不居於東宮但居於乘輿所幸之别院太子之子亦分院而居婚嫁則同親王公主於崇仁里之禮院唐宗正寺掌天子族親屬以别昭穆凡親有五等先定於司封一曰皇帝周親皇后父母視三品二曰皇帝大功親小功尊屬太皇太后皇太后皇后周親視四品三曰皇帝小功親緦麻尊屬太皇太后皇太后皇后大功親視五品四曰皇帝緦麻親袒免尊屬太皇太后皇太后皇后小功親五曰皇帝袒免親太皇太后小功卑屬皇太后皇后緦麻親視六品皇帝親之夫婦男女降本親二等餘親降三等尊屬進一等降而過五等者不為親諸王大長公主親本品嗣王郡王非三等親者亦視五品選舉制凡館有二門下省有𢎞文館生三十六人東宮有崇文館生二十人以皇緦麻以上親皇太后皇后大功以上親宰相貴官之子為之宋仁宗景祐中下詔度玉清昭應宮舊地建宮合宗室十位聚居賜名曰贍親院於祖宗後選一人為宗正以司訓導紏違失凡宗族之政令皆令掌之奏事毋得專達先詳視可否以聞初諸王邸散居京師過從有禁非朝謁從祠不得時會見仁宗立贍親院以夀春郡王允讓知大宗正事總領輯睦甚有恩意務以身先之教養子孫崇向藝學不率則正其罪故更相責厲莫不勸服故事內朝謁宗婦不預因曰托姻皇屬而不得一望禁闥非所以顯榮之也奏通其籍又宗婦少喪夫雖無子不許更嫁曰此非人情乃為請使有歸神宗熙寧二年中書樞密院言祖宗受命百年皇族日以蕃衍而親疏之施未有等衰甄序其材未能如古獻議之臣謂宜有所釐正請參酌先王典制時事之宜條具聞奏詔同議以聞臣等今謀定方今可行之制宣祖太祖太宗之子皆擇其後一人為宗世世封公補環衛官以奉祭祀不以服屬盡故殺其恩禮祖宗袒免親將軍以下願出官者聽仍先經大宗正司陳請大宗正擇本宮尊長與太學教授使學才行堪任使者然後審察以聞就武官者試讀律習書就文官者試一中經説或論一首將軍換諸司副使太常丞正率換內殿崇班太子中允並與州郡監當一次任滿與親民副率換西頭供養官大理評事與監當一次任滿有州郡監司保舉者與親民否則即依外官祖宗袒免親未賜名授官者除右班殿直年十五與請給年二十許出官願換文官者與試銜知縣並令監當考試及任滿有無保任如前法出官日並特與友賜願鎖廳應舉者依外官其非袒免親不賜名授官許應舉應進士者只試䇿論明經者習一大經試大義及䇿初試不成文理者退黜餘令覆試取合格者以五分為限人數雖多不得過五十人纍經覆試不中年長者當特推恩量材録用已出官者給俸依在京分數許依審官三班銓法指擬注授不以逺近為限授文官者轉官者轉官與進士出身同鎖廳應進士明經舉有出身人至員外郎與轉左曹宗室不出官者祖宗玄孫轉官至正任觀察使止袒免親至遙郡刺史止祖宗袒免親見任官合奏薦子孫者許依外官祖宗袒免親以下見有官不願出官父祖俱亡者許在京居住隨處置産其出官者置田宅如外官法祖宗袒免女嫁賜錢減半壻與三班奉職非袒免女量加給賜更不與壻官有官者與免入逺許依審官三班流內銓法指擬注授班行免指使其袒免親娶婦量加給賜其非袒免親嫁娶依庶姓仍不得與非士族家為婚姻祖宗袒免親以外兩世貧無官者量賜田孤幼無依及尤貧失所者不拘世數隨所在官司具名聞奏當職特加存恤奏上詔曰自我祖宗敦敘邦族大則疏封於爵土次則通籍於閨臺並留京師參奉朝請然而世緒寖逺皇枝益蕃屬有親疏則恩有隆殺才有賢否則祿有重輕今而一貫於周行是亦奚分於流别雖敦睦之道誠廣而德施之義未周故廷臣數言宰司繼請謂宜定正限以等夷朕惟親戚之間經史有訓漢唐之世故事具存或以九族辨尊卑或以五宗紀逺近或聽推恩而分子弟或許自試而效才能或宗子之賢得從科舉或諸王之女自主婚姻盡前世之所行顧當今之未備況我朝制作動法先王豈宗室等衰乃無定制因俾羣公之合議將一代之通規載覽奏封具陳條目以謂祖宗昭穆是宜世世之封王公子孫抑有親親之教若乃服屬之既竭洎於才藝之並優在隨器以甄揚使當官而勉𢡟至於任子之令通婚之儀凡曰有司之常一用外官之法僉言既允朕意何疑告於將來用頒明命宜依中書樞密院所奏施行宗正寺言每嵗寫仙源積慶圖宗藩慶緒録送龍圖天章寶文閣今宗室非袒免親既不賜名授官一依外官之法請定所修圖册詔下禮院詳定禮官言六世親屬既竭繫之以姓而弗别則禮有其義皇宗祖廟雖毁子孫皆於宗寺附籍則今有其文況朝廷釐改皇族授官之制而袒免外親統宗襲爵進預科選遷官給俸恩禮優異悉不與外官匹庶同法屬雖疏而恩數不絶若圖籍湮落則無審其所從證其宗正寺所修圖録並請仍舊從之元豐官制行詔大宗正司不𨽻六曹大宗正以宗室團練以上有德望者為之次一人為同知位髙屬尊者為制掌紏合族屬而訓之以德行道藝受其詞訟而紏正其愆違有罪則先劾以聞法例不能決者同上殿取裁凡宗室服屬逺近之數及其賞罰規式皆總之屬有記室一人掌箋奏講書教授十有二人講授兼領小學之事渡江後頗用南班多不得其人無以表率更生刻削宗室皆患之哲宗紹聖元年禮部言諸宗室係袒免以外兩世祖父俱亡而無官雖有官而未釐務貧不能給者委大宗正司及所在官司奏給錢米從之徽宗崇寧元年詔曰神宗嘗詔宗室年長者推恩又嘗詔袒免外兩世貧無官者賜田又嘗詔外任者許居於兩京今宜遵先志宰臣蔡京等言宗室舊來在宮有出入之限有不許外交之禁宮門有幾察之令今疏屬外屬僅遍都下積日滋久殆不能容若不居之兩京散之近郡立關譏察之令或一有非意犯法則勢有不可已者今請非袒免親以下兩世除北京外欲分於西京南京近輔或沿流便郡居止各隨州郡大小創置居宇仍先自兩京為始每處置敦宗院命文武官各一員管幹參酌在京宮院法禁不可行者頒下從之大觀二年正月詔自我英宗起於濮邸入繼大統濮王之後於屬雖親於服已逺如不字之子論正服則猶是緦麻視正統則已非袒免無賜名授官之制無祿廪賜豫之法比聞貧乏匱困或不能自存朕富有天下而五服內親僅同民庶非強本之道欲盡親親之禮而承統之重義所不敢夙夜以思當使恩義兩得然後為稱應濮陽孫士字可依仲字不字及不字之子並依士字恩數條例宗女隨其字行等第施行庶不失承統之義而曲盡人倫之親八月詔保州皇族子孫於屬雖逺然未有仁而遺其親者比聞皇族之孫未官者餘三十人或貧乏不能自存已令置敦宗院其六房內各擇最長年二十已上者與三班奉職二人一房及六人已上加一人並與添差監當宣和五年詔今後內外宗室並不稱姓七年後詔依熙寧法並著姓建炎末上以天屬避地者少詔南班宗婦無子孫食祿者廪給有差凡祖宗緦麻親嵗給錢九十六千米三十六斛帛二十八匹袒免親錢米減三之二綿帛並減半四年六月己邜故事宗室近臣吉凶皆有賜豫紹興初以軍興財匱罷之六年正月己巳十一年秋皇叔祖右監門衛大將軍仲䍃卒於臨安至無以斂判大宗正事齊安郡王士㒟言於朝詔緦麻親任環列以上亡者賜錢三百千袒免減三之一九月甲辰今以為例焉本朝宗室皆聚於京師熙寧間始許居於外蔡京為政即河南應天置西南二敦宗院設宗官主之靖康之禍在京宗室無得免者而睢雒二都得全建炎初上將南幸先徙諸宗室於江淮於是大宗正司移江寧南外移鎮江西外移揚州元年八月戊午明年春又移西外於泰州及髙郵軍正月甲午三年冬又移於福州而南外移泉州以避狄十二月甲子紹興元年秋嗣濮王仲湜請合西南外宗正為一司以省財用有司以泉州乏財不許九月壬子是時兩外宗子女婦合五百餘人歲費緡錢九萬紹興府宗正司者紹興三年以行在未有居第權分宗子居之三十年春恩平郡王出居會稽遂以為判大宗正事三月丙子乾道七年虞丞相秉政言蜀中闕大宗正司上欲移紹興府宗正司於成都五月戊寅既而不行但省會稽一司而已今蜀中宗子甚衆既無親賢領之但每州以行尊者一員檢察錢米請受由是往往蹈於非彛而不可訓焉東都故事宗子皆築大舍聚居之太祖太宗九王後曰睦親秦王後曰廣親英宗二王曰親賢神宗五王曰棣華徽宗諸王曰蕃衍渡江後宗子始散居郡邑惟親賢子孫為近屬則聚居之孝宗子四人邵悼肅王無後莊文太子魏惠憲王早薨莊文之妃惠憲之夫人皆别居賜第初莊文既大祥議者欲皇孫出居於外或以為不可又踰年竟以知樞密院府為外第焉紹興初寧宗封嘉王將以所藉富民裴氏之居為府第而議者以為非宜乃改築蓋自紹興以來天屬鮮少故不復賜宅名云續文獻通考遼皇族有五院六院橫帳之分五院有額爾竒木六院有郎君房額爾竒木房錫里房橫帳有孟父房仲父房季父房統謂之三父房自德祖族屬號三父房始稱橫帳乃宗室之尤貴者蓋分益親則名益貴也約遼史文遼史百官志肅祖長子學順之族在五院司仲子噶拉季子拉哩及懿祖仲子塔拉季子尼古察之族皆在六院司此五房者謂之三院皇族元祖伯子瑪魯無後次子葉穆之後曰孟父房叔子實嚕之後曰仲父房季子為德祖德祖之元子為太祖謂之橫帳次日埓克曰特爾格曰伊德實曰安圖曰蘇皆曰季父房此一帳三房謂之四帳皇族二院治之以北南二王四帳治之以大內特哩衮皆統於大特哩衮司遼俗東嚮而尚左御帳東嚮約尼九族南嚮皇族三父帳北嚮故謂御營為橫帳國語解國族皆姓耶律有謂始興之地曰錫里譯者以錫里為耶律契丹國志曰錫里上京東二百里之地名也以所居之地為姓譯之則曰耶律又有言以漢字書曰耶律以契丹字書曰伊喇太祖本紀元年詔皇族承約尼氏九帳為第十帳二年正月始置特哩衮典族屬以皇弟薩喇為之即宗正職也續文獻通考大內特哩衮司掌皇族四帳之政教大橫帳詳衮司掌太祖皇帝後九帳皇族之事詳衮亦曰敞穩又有孟父族帳詳衮司季父族帳詳衮司皆各掌其房族之事又有四帳都詳衮司掌四帳軍馬之事錫里司掌皇族之軍政遼史太祖本紀六年以皇弟蘇為南府宰相南府宰相自諸弟搆亂府之名族多罹其禍故其位久虛至是告於宗廟而後授之宗室為南府宰相自此始自後皇族四帳世預其選太宗本紀天顯五年三月皇弟魯呼請赦宗室錫里郎君以罪繫獄者詔從之興宗本紀重熙十一年賑恤三父族之貧者金史宗室表金人初起完顔十二部其後皆以部為氏史臣記録有稱宗室者有稱完顔者完顔亦有二有同姓完顔蓋疏族若實圗美都古爾納是也有異姓完顔蓋部人若歡多是也大定以前稱宗室明昌以後避睿宗諱稱內族其實一而已宣宗詔宗室皆稱完顔不復識别焉大定泰和之間袒免以上親皆有屬籍以敘授官大功以上薨卒輟朝親親之道行焉貞祐以後譜牒散失矣穆宗子朂傳皇兄弟皇子為親王給二品俸宗室封一字王者給三品俸百官志大宗正府掌敦睦紏率宗屬以皇族中屬親者充泰和中避睿宗諱改為大睦親府熙宗本紀皇統四年詔以去年所得宋幣賜始祖以下宗室海陵本紀正隆二年改定親王以下封爵等第命追取存亡誥身存者二品以上死者一品參酌削降公私文書但有王爵字者立限毁抹墳墓碑志並發而毁之世宗本紀大定十二年十一月帝謂宰臣曰宗室中有不任官事者若不加恩澤於親親之道未宏朕欲授以散官量與廪祿未知前代何如左丞石琚曰陶唐親九族周家睦九族見於詩書皆帝王美事也十六年正月詔宗室未附玉牒者並與編次四月詔定宗室子程試等第十七年正月帝謂宰臣曰宗室中年髙往往未有官稱其先皆有功於國朕欲稍加以官使有名位可稱何如對曰親親報功先王之令則五月尚書奏定皇家袒免以上親燕饗班次並從唐制二十五年四月以會寧府即上京地官一人兼大宗正丞以治宗室之政二十二年十月徙河間宗室於平州章宗本紀明昌元年六月定親王家人有犯其長史府掾失覺察故縱罪八月喇嘛節以皇家袒免之親特收充尚書省祗候郎仍為永制三年遣諭諸王府傅尉曰朕分命諸王出鎮蓋欲政事之暇有以自適耳然慮其舉措或違於理所以分置傅尉使勸導彌縫不入於過失若公餘遊宴不至過度亦復何害今聞爾等用意太過凡王門細碎之事無妨公道者一一干與贊助之道豈當如是宜各思職分事舉其中無失禮體仍就諭諸王使知朕意四年諸王府增置司馬一人承安五年三月大睦親府進重修玉牒九月修玉牒成定皇族收養異姓男為子者徒三年姓同者減二等立嫡違法徒一年元史世祖本紀中統元年賜親王銀文綺金素綿絹自是嵗以為常明史諸王列傳明制皇子封親王授金册金寶歲祿萬石府置官屬護衛甲士少者三千人多者至萬九千人親王嫡長子年及十嵗則授金册金寶立為王世子長孫立為世孫諸子年十嵗則授塗金銀册銀寶封為郡王嫡長子為郡王世子嫡長孫則授長孫諸子授鎮國將軍孫輔國將軍曾孫奉國將軍四世孫鎮國中尉五世孫輔國中尉六世以下皆奉國中尉其生也請名其長也請婚祿之終身喪葬豫費王圻續通考鎮國將軍初定為三品永樂時改一品輔國將軍初四品改從二品奉國將軍初五品改從三品鎮國中尉初六品改從四品輔國中尉初七品改從五品奉國中尉初八品改從六品諸王世表洪武中以子孫蕃衆命名慮有重復乃於東宮親王世系各擬二十字字為一世子孫初生宗人府依世次立雙名以上一字為據其下一字則取五行偏旁者以火土金水木為序惟靖江王不拘東宮擬名曰允文遵祖訓欽武大君勝順道宜逢吉師良善用晟秦府曰尚志公誠秉惟懷敬誼存輔嗣資亷直匡時永信惇晉府曰濟美鍾竒表知新慎敏求審心咸景慕述學繼前修燕府後為帝系曰髙瞻祈見祐厚載翊常由慈和怡伯仲簡靖迪先猷周府曰有子同安睦勤朝在肅恭紹倫敷惠潤昭格廣登庸楚府曰孟季均榮顯英華藴盛容宏才升博衍茂士立全功齊府曰賢能長可慶睿智實堪宗養性期淵雅寅思復會通魯府曰肇泰陽當健觀頤夀以宏振舉希兼逹康莊遇本寧蜀府曰恱友申賓讓承宣奉至平懋進深滋益端居務穆清湘府曰久鎮開方嶽揚威謹禮儀剛毅循超卓權衡素自持代府曰遜仕成聰俊充庭鼐鼎彛傳貽連秀郁炳耀壯洪基肅府曰瞻祿貢真弼縉紳識烈忠曦暉躋當運凱諫處恆隆遼府曰貴豪恩寵致憲術儼尊儒雲仍祺保合操翰麗龍輿慶府曰秩邃置台鼒倪伸師倬竒適完因巨衎隲眷發需毗寧府曰磐奠覲宸拱多謀統議中總添支庶濶作哲向親𠂻岷府曰徽音膺彥譽定幹企禋雍崇理原咨訪寬鎔喜賁從谷府曰賦質僖雄敞叢興闡福昌篤諧恂懌豫擴霽昱禎祥韓府曰沖範徴偕旭融謨朗璟逵亶韶愈灝慥令緒價藩維瀋府曰佶幼詮勛允恬珵效迥瑝湜源諲晳暐圭璧徹澄昂安府曰斐序斌延賞凝覃濬祉襄恢嚴顓輯矩縝密廓程綱唐府曰瓊芝彌宇宙碩器聿琳琚啓齡蒙頌體嘉歷協銘圖郢府曰偉聞參望奭針誨洎臯夔麒麟餘積兆奎頴曄璿璣伊府曰顒勉諟訏典褒珂采鳯琛應疇須胄選昆玉冠泉金靖江王曰贊佐相規約經邦任履亨若依純一行逺得襲芳名考明代帝系熹宗莊烈二帝名始及由字其他王府亦多不出十字食貨志大祖洪武九年定諸王公主嵗供之數親王米五萬石鈔二萬五千貫錦四十匹紵絲三百匹紗羅各百匹絹五百匹冬夏布各千匹綿二千兩鹽二百引茶千斤皆嵗支馬料草月支五十匹其縀匹嵗給料匠付王府自造靖江王米萬石鈔萬貫餘物半親王馬料草二十匹公主未受封者紵絲紗羅各十匹絹冬夏布各三十匹綿二百兩已受封賜莊田一所嵗收糧千五百石鈔二千貫親王子未受封視公主已受封郡王米六千石鈔二千八百貫錦十匹紵絲五十匹紗羅減紵絲之半絹冬夏布各百匹綿五百兩鹽五十引茶三百斤馬料草十匹女已受封及已嫁者米千石鈔千四百貫其縀匹於所在親王國造給皇太子之次嫡子并庶子既封郡王必俟出閣然後嵗賜與親王子已封郡王者同女俟出嫁與親王女已嫁者同凡親王世子與已封郡王同郡王長嫡子襲封郡王者半始封郡王女已封縣主及已嫁者米五百石鈔五百貫餘物半親王女已受封者郡王諸子年十五各賜田六十頃除租稅為永業其所生子世守之後乃令止給祿米二十八年詔更定諸王嵗給時以官吏軍士俸給彌廣量減諸王嵗給以資軍國之用乃更定親王萬石郡王二千石鎮國將軍千石輔國將軍奉國將軍鎮國將軍中尉以二百石遞減輔國中尉奉國中尉以百石遞減公主及駙馬二千石郡主及儀賓八百石縣主郡君及儀賓以二百石遞減縣君鄉君及儀賓以百石遞減自後為永制太祖本紀二十二年正月改大宗正院為宗人府職官志宗人府掌皇九族之屬籍書宗室子女適庶名封嗣襲生卒婚嫁諡葬之事凡宗陳請為聞於帝逹材能録罪過洪武三年置大宗正院至是改為宗人府並以親王領之其後以勳戚大臣攝府事不攝官而所領盡移之禮部王圻續通考太祖時定宗室傳世爵級凡將軍中尉以下其有文武才能堪任用者宗人府具以名聞考驗升轉如常選法如或有犯宗人府取聞明白奏聞輕則量罪降等重則黜為庶人但明賞罰不加刑責著為令明史成祖本紀永樂二十二年九月時仁宗已即位增諸王嵗祿食貨志仁宗增減諸王嵗祿非常典也時鄭越襄荆淮滕梁七王未之國令暫給米嵗三千石遂為例史料前集洪熙元年周府加米五千石通前二萬石悉支本色慶府原祿一萬石悉支本色寧府加米九千石通前一萬石悉支本色代府加米千五百石通前二千石悉支本色瀋府加米七千石通前萬石內本色六千石餘折鈔唐府加米七百石通前二千石悉支本色魯府加米二千石通前五千石悉支本色遼府加米一千石通前二千石悉支本色肅府加米五百石通前一千石悉支本色秦府原祿一萬石內加米四千五百石通前五千石支本色餘五千石折鈔伊府加米一千七百石通前二千石悉支本色靖江王加米七百石通前一千石悉支本色趙漢二府各加米二萬石通前三萬石仍嵗加鈔十萬貫晉府給米三千石明年又給韓王嵗祿三千石內一千五百石本色餘折鈔襄陵王樂平王各嵗祿千石內五百石本色餘折鈔漢庶人以宣德元年反削國而趙王亦辭所加之祿矣英宗正統十二年定王府祿米撥給之制將軍自賜名受封日為始縣主儀賓自出閣成婚日為始於附近州縣秋糧內撥給至景帝景泰七年定郡王將軍以下祿米出閣在前受封在後以受封日為始受封在前出閣在後以出閣日為始孝宗本紀宏治三年禁宗室奏請田土及受人投獻魯王傳世宗嘉靖三年定宗室毋得以媵子為嫡之例世宗本紀嘉靖四十年頒宗藩條例續文獻通考初太祖大封宗藩令世世食祿而不任事親親之誼甚厚然天潢日繁民賦有限其始祿米盡支本色既而本鈔兼支有中半者有本多於折者厥後勢不能給而冒濫益多姦弊百出自宏治間禮部尚書倪嶽即請節減以寬民力嘉靖九年禮部覆豐林王議處宗室疏帝意欲封帝之皇子為郡王親王次子為鎮國將軍以張璁言宜量減祿而不降封乃止四十一年御史林潤言天下財賦供京師米四百萬石而各藩祿嵗至八百五十三萬石即無災傷蠲免嵗輸亦不足供祿米之半將軍以下飢寒困辱聚詬有司守土之臣每懼生變夫賦不可增而宗室日繁將何以支事下諸王議至是乃定條例郡王將軍七分折鈔中尉六分折鈔郡縣主郡縣鄉君及儀賔八分折鈔他冒濫者多所裁減於是秦晉周楚蜀趙慶襄淮德崇嵗祿萬石辭一千石魯益衡嵗祿萬石辭二千石崇王萬三百石與唐王六千五百石俱辭五百石嵗出為少紓而將軍以下益不能自存矣嘉靖四十一年下諸王議時其明年南陵王睦楧條上七議請立宗學以崇德教設科選以勵人材嚴保勘以杜冒濫革冗職以除素餐戒奔競以息貪叨制拜掃以廣孝思立憂制以省祿費詔下廷臣參酌之其後諸藩遂稍稍陳利弊禮部尚書李春芳集而上之諸吉凶大禮及嵗時給賜皆嚴為之制而武岡王顯槐復上書條藩政請設宗學擇立宗正宗表督課親郡王以下子弟十嵗入學月米一石三載督學使者考績其中程式者全録之五試不中科則黜之給以本祿三之一其庶人暨妻女月餼六石案食貨志宗室有罪革爵者曰庶人英宗初頗給以糧嘉靖中月支米六石當即準此議而行之也又言萬歷時減至二石或一石庶女勿加恩其頒宗藩條例時多採睦楧顯槐二王議云王世貞處宗室䇿國家待宗室自親王至中尉凡八等其支子歷八世至於庶人而祿始絶王國所屬長史衛校百千人而止耳不得臣他吏民干有司事親王常祿萬石郡王二千石鎮國將軍千石以至於庶人亦百石而他婚嫁居第資送導從之費不與焉親王米石軍校官僚居第婚喪之費又不下數萬下至於庶人而人各嵗百石居第二百金婚娶百金此不可已也嘗觀嘉靖二十八年宗正籍見存者已萬餘人今又十餘年矣人益其半而合之當為二萬人又十餘年而人益其半而合之當為四萬五千人酌祿之中人各得五百石益萬人是益萬五百石粟也大司農何以應之官又為厲禁俾不得從農商之業其賢者又不得偕寒士從有司之薦非所以明親親用賢之道也今請自將軍以上少裁其祿數而務實其惠中尉以下毋賜爵祿而寬其禁使其賢者得與寒士角才而授任不肖者從事於南畝以其力周其身而官弗與焉庶乎其猶可支也明史諸王世表神宗萬歷七年更定親王承襲之例親王之子例封郡王若以支屬嗣者自後長子襲封親王外餘子仍照原封世次授以本等爵級不得冒濫郡爵郡王無子兄弟及兄弟之子不得請襲違者為冒封王圻續通考萬歷十年定各王府玉牒每年八月投禮部宗人府收貯或有嫡庶混淆名位舛錯那移封期增減嵗月者駁回重繕宗室之子年十嵗以上俱入宗學於宗室中推舉一人為宗正領其事年十五乃請封給祿米三分之一仍留學五年驗有進益方出學始給全祿天順八年定各王府所生子女年至十五方許請封嘉靖四十年定各王府所生子五嵗即請名萬歷時定各府所生子五嵗請名十嵗請封十五嵗選婚所生女十五嵗請封即與選婚若因事耽延未能如期奏請者聽若所生子請名請封過期者五年查題十年行勘十五年勘明另題止給名糧五十石本折分支十五年以上立案如係聽繼王爵人數過期年久另題立案者臨期請旨御定男選婚女請封過期至十五年以上者立案其庶人請給名糧亦以十嵗為斷過期如選婚例宗人有罪者錮髙墻髙墻在中都今鳯陽府凡先後入髙墻者男女且千人嘉靖四年至十八年共釋三百八十六人還原邸給薪米自便其婚嫁之資一槩免給萬歷時令查先年罪案極重者子孫止從寬釋不得濫請名糧稍輕者許現在子孫請名嵗給米十二石身終即止輕者其日後子孫亦得請給如止遺母妻而無子孫可倚者嵗給米六石終其身妾媵不給凡庶人皆不得更乞冠帶明史神宗本紀十八年更定宗藩事例始聽無爵者得自便三十三年開宗室科舉入仕例續文獻通考鄭世子載堉於二十二年正月上疏請宗室皆得儒服就試毋論中外職中式者視才品器使詔允行奉國中尉以下入試輔國中尉以上爵尊不得與其後禮臣李廷機言封爵科目原自兩途彼既願得科目入仕應照士子出身資格銓除何拘原爵亦從之惟不得除京朝官明史熹宗本紀天啓五年十一月行宗室限祿法熹宗實録時禮部尚書薛三省奏定宗藩限祿之法以天啓四年以前之祿數為天啓五年以後之祿額就各府見祿多寡自為通融令各省撫按酌為嵗額又奏言祖制宗室郡王止四妾將軍以下遞減一人蓋亦限子之微意今請郡王以五子為率一子襲封餘四子各得應得封祿此外多一子則合四子之祿為五分以均給之子遞增則諸子之祿遞減俟諸子之祿僅與名祿庶人等然後官為增祿一人將軍中尉之子亦然乞以此著為令報可右漢至明惇敘宗室五禮通考卷一百四十四
