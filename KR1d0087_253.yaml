body:
  text: 五禮通考卷二百四十三刑部尚書秦蕙田撰軍禮十一田獵下漢書司馬相如傳嘗從上至長楊獵是時天子方好擊熊豕馳逐野獸相如因上疏諫其辭曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖烏獲羿蒙之技不得用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變況乎涉豐草騁丘虛前有利獸之樂而內無存變之意其為害也不難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取蓋明者逺見于未萌而知者避危於無形禍固多藏于隱微而發于人之所忽者也故鄙諺曰家絫千金坐不垂堂此言雖小可以諭大臣願陛下留意幸察上善之文獻通考元鼎中天子行獵新秦中以勒邉兵而歸新秦中或千里無亭徼於是誅北地太守以下漢書元帝本紀永光五年冬上幸長揚射熊館布車騎大獵成帝本紀元延二年冬行幸長楊宫大校獵宿萯陽宫揚雄傳十二月羽獵雄從以為昔在二帝三王宫室臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴穀土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其樹黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎湖御宿昆吾旁南而西至長楊五柞北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳯闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊遊觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁御所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故因校獵賦以風明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至宏農南驅漢中張羅罔罝罘捕熊羆豪豬虎豹狖玃狐菟麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨成文章故藉翰林以為主人子墨為客卿以風後漢書禮儀志立秋之日自郊禮畢始揚威武斬牲于郊東門薦陵廟其儀乘輿御戎路白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車馳駟送陵廟還宫遣使者齎束帛以賜武官武官肆兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳名曰乘之立春遣使者齎束帛以賜文官貙劉之禮祠先虞執事告先虞已烹鮮時有司告乃逡巡射牲獲車畢有司告事畢野王二老傳初光武二於更始會關中擾亂遣前將軍鄧禹西征送之於道既反因於野王獵路見二老者即禽光武問曰禽何向並舉手西指此中多虎臣每即禽虎亦即臣大王勿往也光武曰苟有其備虎亦何患父曰何大王之謬耶昔湯即桀于鳴條而大城于亳武王亦即紂于牧野而大城於郟鄏彼二王者其備非不深也是以即人者人亦即之雖有其備庸可忽乎光武悟其旨顧左右曰此隱者也將用之辭而去莫知所在東平憲王蒼傳蒼拜驃騎將軍位在三公上永平四年春車駕近出觀覽城第尋聞當遂校獵河內蒼即上書諫曰臣聞時令盛春農事不聚衆興功傳曰田獵不宿飲食不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消搖仿佯弭節而旋至秋冬乃振威靈整法駕備周衛設羽毛詩云抑抑威儀惟德之隅臣不勝憤悶伏自手書乞詣行在所極陳至誠帝覽奏即還宫明帝本紀永平十五年冬車騎校獵上林苑安帝本紀延光二年十一月校獵上林苑順帝本紀永和四年冬十月校獵上林苑桓帝本紀永興二年十一月校獵上林苑延熹元年冬十月校獵廣成遂幸上林苑六年冬十月丙辰校獵廣成遂幸函谷關上林苑靈帝本紀光和五年冬十月校獵上林苑厯函谷關遂巡狩于廣成苑右漢魏志文帝本紀黃初二年春正月甲戌校獵王朗傳文帝踐阼朗為司空時帝頗出遊獵或昏夜還宫朗上疏曰夫帝王之居外則飾周衛內則重禁門將行則設兵而後出幄稱警而後踐墀張弛而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也近日車駕出臨捕虎日昃而行及昏而反違警蹕之常法非萬乘之至慎也帝報曰覽表雖魏綘稱虞針以諷晉悼相如陳猛獸以戒漢武未足以喻方今二寇未殄將帥逺征故時入原野以習戎備至於夜還之戒已詔有司施行蘇則傳則為侍中從行獵槎桎拔失鹿帝大怒踞牀拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺羣吏愚臣以為不可敢以死請帝曰卿直也遂皆赦之然以此見憚吳大帝紀漢建安二十三年十月權將如吳親射虎於庱亭馬為虎所傷權投以雙戟虎却廢常從張世擊以戈獲之右三國晉書楊濟傳濟有才藝常從武帝校獵北芒下與侍中王濟俱著布袴褶騎馬執角弓在輦前猛獸突出帝命王濟射之應弦而倒須臾復一出濟受詔又射殺之六軍大叫稱快右晉宋書文帝本紀元嘉二十五年三月庚辰車駕校獵禮志元嘉二十五年閏二月大搜於宣武場主胄奉詔列奏申攝剋日校獵百官備辨設行宫殿便坐武帳於幕府山南岡設王公百官便坐幔省如常儀設南北左右四行旌門建獲旗以表獲車殿中郎一人典獲車主者二人收禽吏二十四人配獲車備獲車十二兩校獵之官著袴褶有帶武冠者脫冠者上纓二品以上擁刀備鞘麾幡三品以下帶刀皆騎乘將領部曲先獵一日遣屯布圍領軍將軍一人督右甄護軍一人督左甄大司馬一人居中董正諸軍悉受節度殿中郎率護軍部曲在大司馬之後尚書僕射都官尚書五兵尚書左右丞都官諸曺郎都令史都官諸曺令史幹蘭臺治書侍御史令史諸曺令史幹督攝糾司校獵非違至日會於宣武場列為重圍設留守填街位於雲龍門外內官道北外官道南以西為上設從官位於雲龍門內大官階北小官階南以西為上設先置官位於行止車門外內官道西外官道東以北為上設先置官還位於廣莫門外道之東西以南為上校獵日平旦正直侍中奏中嚴上水一刻奏捶一鼓為一嚴上水二刻奏捶二鼓為再嚴殿中侍御史奏開東中華雲龍門引仗為小駕鹵簿百官非校獵之官著朱服集列廣莫門外應還省者還省留守填街後部從官就位前部從官依鹵簿先置官先行上水三刻奏捶三鼓為三嚴上水四刻奏外辦正次直侍中散騎常侍給事黃門侍郎散騎侍郎軍校劍履進夾上閣正直侍中負璽通事令史帶龜印中書之印上水五刻皇帝出著黑介幘單衣乘輦正直侍中負璽陪乘不帶劍殿中侍御史督攝黃麾以內次直侍中次直黃門侍郎護駕在前又次直侍中佩信璽行璽與正直黃門侍郎從護駕在後不鳴鼓角不得喧譁以次引出警蹕如常儀車駕出騶讃陛下再拜皇太子入守車駕將至威儀唱引先置前部從官就位再拜車駕至行殿前回輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俯伏起皇帝降輦登御座侍臣升殿直衛鈒戟虎賁毛頭文衣鶡尾以次列階正直侍中奏解嚴先置從駕百官還便座幔省皇帝若親射禽變御戎服內外從官及虎賁悉變服如校獵儀鈒戟抽鞘以備武衛黃麾內外從入圍裏列置部曲廣張甄圍旗鼓相望銜枚而進甄周圍會督甄令史奔騎號法施令曰春禽懷孕搜而不射鳥獸之肉不登于俎不射皮革齒牙骨角毛羽不登於器不射甄會大司馬鳴鼓蹙圍衆軍鼓譟警角至宣武場止大司馬屯北旌門二甄帥屯左右旌門殿中中郎率護軍部曲入次北旌門內之右皇帝從南旌門入射禽謁者以獲車收載還陳於獲旗北王公以下以次射禽各送詣獲旗下付收禽主者事畢大司馬鳴鼓解圍復屯殿中郎率其屬收禽以實獲車充庖厨列言統曺正厨置樽酒俎肉于中逵以犒饗校獵衆軍至晡正直侍中量宜奏嚴從官還著朱服鈒戟復鞘再嚴先置官先還三嚴後二刻正直侍中奏外辦皇帝著黑介幘單衣正次直侍中散騎常侍給事黃門侍郎軍校進夾御坐正直侍中跪奏還宫次直侍郎稱制曰可正直侍中俯伏起乘輿登輦還衛從如常儀大司馬鳴鼓散屯以次就舍車駕將至威儀唱引留守填街先置前部從官就位再拜車駕至殿前回輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俯伏起乘輿降入正直次直侍中散騎常侍給事黃門侍郎散騎侍郎軍校從至閣亦如常儀正直侍中奏解嚴內外百官拜表問訊如常儀訖罷宋書孝武帝本紀大明七年春正月癸酉詔曰春搜之禮著自周令講事之語書于魯史所以昭宣德度示民軌則念嵗稔氣榮中外寧晏當因農隙葺是舊章可克日于玄武湖大閲水師并巡江右講武校獵二月丁巳車駕校獵於厯陽之烏江己未車駕登烏江縣六合山十月己巳車駕校獵于姑孰禮志大明七年二月丙辰有司奏鑾輿巡搜江左講武校獵獲肉先薦太廟章太后廟并設醢酒公卿行事及獻妃隂室室長行事太學博士虞和議檢周禮四時講武獻牲各有所施振旅春搜則以祭社茇舍夏苗則以享礿治兵秋獮則以祀方大閲冬狩則以享蒸案漢祭祀志唯立秋之日白郊事畢始揚威武曰貙劉乘輿入囿躬執弩以射牲以鹿麑太宰令謁者各一人載獲車馳送陵廟然則春田薦廟禾有先準兼太常丞庾蔚之議和所言是搜狩不失其時此禮久廢今時和表晏講武教人又虔供乾豆先薦二廟禮情俱允社主土神司空土官故祭社使司空行事太廟宜使上公參議搜狩之禮四時異議禮有損益時代不同今既無復四方之祭三殺之儀曠廢來久禽獲性物面傷剪毛未成禽不獻太宰令謁者擇上殺奉送先薦廟社二廟依舊以太尉行事詔可蕙田案以上宋隋書禮儀志古者三年練兵入而振旅至于春秋搜獮亦以講其事焉梁陳時依宋元嘉二十五年搜宣武場其法置行軍殿於幕府山南岡并設王公百官幕先獵一日遣馬騎布圍右領軍將軍督右左領軍將軍督左大司馬董正諸軍獵日侍中三奏一奏捶一鼓為嚴三嚴訖引仗為小駕鹵簿皇帝乘馬戎服從者悉綘衫幘黃麾警蹕鼓吹如常儀獵訖宴會享勞比校多少戮一人以懲亂法會畢還宫陳書後主本紀禎明二年冬十月輿駕幸幕府山大校獵蕙田案以上梁陳魏書道武帝本紀登國九年春三月帝北巡夏五月田於河東皇始元年春正月大搜於定襄之虎山因東幸善無北陂天興六年七月車駕北巡築離宫於豺山縱士校獵東北踰罽嶺出參合代谷天賜三年春正月車駕北巡幸豺山宫校獵至屋孤山明元帝本紀永興四年春正月登虎圈射虎賜南平公長孫嵩等布帛各有差秋七月大獮於石會山臨去畿陂觀漁至於濡源西巡幸北郊諸落賜以繒帛八月車駕還宫壬子幸西宫臨板殿大享羣臣將吏以田獵所獲賜之命民大酺三日五年六月西幸五原校獵於骨羅山獲禽十萬神瑞二年五月丁亥次于參合東幸大寧丁未田於西岬山六月戊午幸去畿陂觀魚辛酉次于濡源築立蚌臺射白熊于頽牛山獲之泰常元年六月丁巳車駕北巡秋七月甲申帝自白鹿陂西行大獮于牛山登釜山臨殷繁水而南觀于九十九泉戊戌車駕還宫二年五月車駕西巡至于雲中遂濟河田于大漠四年正月朔車駕臨河大搜于犢渚冬十有二月西巡至雲中踰白道北獵于辱孤山至于黃河從君子津西渡大狩于薛林山六年夏六月乙酉北巡至蟠羊山秋七月西巡獵于祚山親射虎獲之遂至於河八月大獮于犢渚九月車駕還宫七年九月己酉詔太平王率百國以法駕田于東苑車乘服物皆以乘輿之副八年三月帝田于鄴南韓陵山幸汲郡至于枋頭太武帝本紀神麚元年夏四月西巡田于河西冬十月北巡田于牛川十有一月行幸河西大校獵二年十有一月西巡狩田于河西至祚山而還三年八月行幸南宫獵于南山太延元年秋七月田于棝楊十有一月乙丑行幸冀州己巳校獵于廣川二年八月帝校獵于河西太平真君七年二月幸雍城田于岐山之陽文成帝本紀太安二年秋八月甲申畋于河西三年夏五月庚申畋于松山己巳還宫秋八月畋于隂山之北己亥還宫四年二月南幸信都畋遊于廣川六月畋于松山和平二年三月發并肆州五千人治河西獵道三年二月畋于崞山遂觀魚于旋鴻池四年夏四月癸亥上幸西苑親射虎三頭壬寅行幸隂山秋七月壬午詔曰朕每嵗以秋日間月命羣官講武平壤所幸之處必立宫壇糜費之功勞損非一宜仍舊貫何必改作也八月丙寅遂畋于河西詔曰朕順時畋獵而從官殺獲過度既殫禽獸乖不合圍之義其敕從官及典圍將校自今以後不聽濫殺其田獲皮肉别自頒賚獻文帝本紀皇興元年十月癸卯畋于邦南池二年五月乙卯畋于崞山遂幸繁畤冬十月畋于冷泉三年夏四月丁酉畋于崞山出帝本紀永熙二年十有二月丁巳車駕狩于嵩陽己巳遂幸溫湯丁丑車駕還宫三年二月辛巳幸洪池陂遂遊畋周書文帝本紀魏大統八年冬十二月魏帝狩于華陰大享將士太祖率諸侯朝于行在所魏書孝靜帝本紀武定元年春正月己巳車駕搜于邯鄲之西山冬十有車駕狩于西山爾朱榮傳榮之將討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則禽葛榮不中則否既而並應弦而殪三軍咸悅及破賊之後即命立碑於其所號雙兔碑榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政養民順時搜狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海內何宜今日便言勳也如聞朝士尤自寬縱今秋欲共兄戒勒士馬校獵嵩原令貪汚朝貴入圍搏虎仍出曽陽厯三荆悉擁生蠻北鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降徑度數千騎便往縛取待六合寧一八表無塵然後共兄奉天子巡四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也蕙田案以上北魏隋書禮儀志後齊春搜禮有司規大防建獲旗以表獲車搜前一日命布圍領軍將軍一人督左甄護軍將軍一人督右甄大司馬一人居中節制諸軍天子陳小駕服通天冠乘木輅詣行宫將親禽服戎服鈒戟者皆嚴武衛張甄圍旗鼓相望銜枚而進甄常開一方以令三驅圍合吏奔騎令曰鳥獸之肉不登于俎者不射皮革齒牙骨角毛羽不登于器者不射甄合大司馬鳴鼓促圍衆軍鼓譟鳴角至期處而止大司馬屯北旌門二甄帥屯左右旌門天子乘馬從南旌門入親射禽謁者以獲車收禽載還陳于獲旗之北王公已下以次射禽皆送旗下事畢大司馬鳴鼓解圍復屯殿中郎中率其屬收禽以實獲車天子還行宫命有司每禽擇取三十一曰乾豆二曰賔客三曰充君之庖其餘即于圍下量犒將士禮畢改服鈒者韜刀而還夏苗秋獮冬狩禮皆同河清中定令每嵗十二月半後講武至晦遂除二軍兵馬右入千秋門左入萬嵗門並至永巷南下至昭陽殿北二軍交一軍從西上閣一軍從東上閣並從端門南出閶闔門前橋南戲射並訖送至城南郭外罷北齊書神武本紀興和二年十二月阿至羅别部遣使請降神武帥衆迎之出武州塞不見大獵而還文宣帝本紀天保四年春正月巡三堆戍大狩而歸五月庚寅帝校獵于林慮山戊子還宫後主本紀武平四年九月校獵于鄴東七年冬十月丙辰帝大狩于祈連池暴顯傳顯少經軍旅善於騎射曽從魏孝莊帝出獵一日之中手獲禽獸七十三元坦傳坦為冀州刺史性好畋漁無日不出秋冬獵雉兔春夏捕魚蟹鴈犬常數百頭自言寧三日不食不能一日不獵北史馮淑妃傳周師之取平陽帝獵于三堆晉州亟告急帝將還淑妃請更殺一圍帝從其言蕙田案以上北齊隋書禮儀志後周仲春教振旅大司馬建大麾于萊田之所鄉稍之官以旗物鼓鐸鉦鐃各帥其人而致誅其後至者建麾于後表之中以集衆庶質明偃麾誅其不及者乃陳徒騎如戰之陳大司馬北面誓之軍中皆聽鼓角以為進止之節田之日于其所萊之北建旗為和門諸將帥徒騎序入其門有司居門以平其人既入而分其地險野則徒前而騎後易野則騎前而徒後既陳皆坐乃設驅逆騎有司表貉于陳前以太牢祭黃帝軒轅氏於狩地為墠建二旗列五兵於坐側行三獻禮遂搜田致禽以祭社仲夏教茇舍如振旅之陳遂以苗田如搜法致禽以享礿仲秋教練兵如振旅之陳遂以獮田如搜法致禽以祀方仲冬教大閲如振旅之陳以狩田如搜法致禽以享蒸周書武帝本紀建德五年春正月辛卯行幸河東涑川集關中河東諸軍校獵蕙田案以上北周田獵儀式規仿周官頗為近古蓋廬辨輩所潤色也右南北朝隋書煬帝本紀大業三年六月辛巳獵于連谷禮儀志大業三年煬帝在榆林突厥啓民及西域東胡君長並來朝貢帝欲誇以甲兵之盛乃命有司陳冬狩之禮詔虞部量拔延山南北周二百里並立表記前狩二日兵部建旗於表所五里一旗分為四十軍軍萬人騎五千匹前一日諸將各帥其軍集於旗下鳴鼓後至者斬詔四十道使並揚旗建節分申畋令即留軍所監獵布圍圍南面方幘而前帝服紫袴褶黑介幘乘闟豬車其飾如木輅重輞縵輪虯龍繞轂漢東京鹵簿所謂獵車者也駕六黑駵太常陳鼓笳鐃簫角於帝左右各一百二十百官戎服騎從鼓行入圍諸將並鼓行越圍乃設驅逆騎千有二百闟豬停軔有司斂大綏王公以下皆整弓矢陳於駕前有司又斂小綏乃驅獸出過於帝前初驅過有司整御弓矢以前待詔再驅過備身將軍奉進弓矢三驅過帝乃從禽鼓吹皆振坐而射之每驅必三獸以上帝發抗大綏次王公發抗小綏次諸將發則無鼓驅逆之騎乃止然後三軍四夷百姓皆獵凡射獸自左膘而射之達于右腢五口反為上等達右耳本為次等自左髀達于右䯚為下等羣獸相從不得盡殺已傷之獸不得重射又逆向人者不射其面出表者不逐之畋將止虞部建旗於圍內從駕之鼓及諸軍鼓俱振卒徒皆譟諸獲禽者獻於旗所致其左耳大獸公之以供宗廟使歸薦臘于京師小獸私之右隋唐書禮樂志皇帝狩田之禮亦以仲冬前期兵部集衆庶修田法虞部表所田之野建旗于其後前一日諸將帥士集於旗下質明弊旗後至者罰兵部申田令遂圍田其兩翼之將皆建旗及夜布圍闕其南面駕至田所皇帝鼓行入圍鼓吹令以鼓六十陳于皇帝東南西向六十陳于西南東向皆乘馬各備簫角諸將皆鼓行圍乃設驅逆之騎皇帝乘馬南向有司斂大綏以從諸公王以下皆乘馬帶弓矢陳于前後所司之屬又斂小綏以從又驅獸出前初一驅過有司整飭弓矢以前再驅過有司奉進弓矢三驅過皇帝乃從禽左而射之每驅必三獸以上皇帝發抗大綏然後公王發抗小綏驅逆之騎止然後百姓獵凡射獸自左而射之達于右腢為上射達右耳為次射右脾達于右䯚為下射羣獸相從不盡殺已被射者不重射不射其面不剪其毛凡出表者不逐之田將畢虞部建旗于田內乃雷擊駕鼓及諸將之鼓士從譟呼諸得禽獸旗下致其左耳大獸公之小獸私之其上者供宗廟次者供賔客下者充庖厨乃命有司饁獸于四郊以獻告至于廟開元禮略同通典李靖曰校獵一人守圍地三尺量人多少以左右兩將為交頭其次左右將各主士伍為行列皆以金鼓旗為節制其初起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍幡守圍有漏獸坐守圍吏大獸公之小獸私之以觀進止斯亦教戰一端也唐書髙祖本紀武德三年正月己巳獵于渭濵四年閏月己未幸舊墅壬戌獵於好畤乙丑獵于九嵏丁卯獵于仲山戊辰獵于清水谷五年十一月癸卯獵于富平北原十二月丙辰獵于萬夀原六年二月壬子獵于驪山十月庚申獵于白鹿原十一月辛卯獵于沙苑丁酉獵于伏龍原七年十月辛未獵于鄠南庚寅獵于圍川十二月戊辰獵于髙林八年十月辛巳如周氏陂獵于北原十一月辛卯如宜州獵于西原庚子講武于同官癸丑獵于華池北原十二月獵于鳴犢泉巢刺王元吉傳元吉為并州總管劉武周略汾晉詔遣右衛將軍宇文歆助守元吉喜鷹狗出常載置罔三十車曰我寧三日不食不可一日不獵夜潛出淫民家府門不閉歆驟諌不納乃顯表於帝曰王數出與竇誕縱獵蹂民田縱左右攘畜産為盡每射于道觀人避矢以為樂百姓怨不可與共守蘇世長傳世長拜諫議大夫從獵涇陽大獲帝入旌門詫左右曰今日畋樂乎世長曰陛下廢萬機事遊獵不滿十旬未為樂也帝變色既而笑曰狂態發邪曰為臣計則狂為陛下計則忠矣時武功郿新經突厥寇掠鄉聚凋虛帝將遂獵武功世長諫曰突厥向盜劫人陛下救恤之言未出口又獵其地殆百姓不堪所求帝不聽吕向傳向以起居舍人從帝東巡帝引頡利發及蕃夷酋長入仗內賜弓矢射禽向上言鴟梟不鳴未為瑞鳥豺虎雖伏弗曰仁獸況突厥安忍殘賊莫顧君父陛下震以武義來以文德勢不得不庭故稽顙稱臣奔命遣使陛下引內從官陪封禪盛禮使飛矢于前同獲獸之樂是狎昵太過或荆卿詭動何羅竊發逼嚴蹕冒清塵縱醢單于汙穹廬何以塞責帝順納詔蕃夷出仗唐儉傳儉為民部尚書從獵洛陽苑羣豕突出于林帝射四輒殪四豕一豕躍及鐙儉投馬搏之帝拔劍斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢祖以馬上得之不以馬上治之陛下神武定四方豈復快心于一獸帝為罷獵禇亮傳髙祖獵親格虎亮懇愊致諫帝禮納其言唐書髙宗本紀顯慶二年十一月乙巳獵于滍南壬子講武于新鄭五年十二月辛未獵于安樂川龍朔元年十月丁卯獵于陸渾戊辰獵于非山舊唐書髙宗本紀總章二年九月己亥發自九成宫壬寅停華林頓大搜于岐唐書髙宗本紀咸亨二年十二月癸酉獵于昆陽四年閏五月丁卯禁作簺捕魚營圈取獸者上元元年十一月乙酉獵于華山回武原通典高宗永徽元年冬出獵在路遇雨因問諫議大夫谷那律曰油衣若為不得漏對曰能以瓦為之必不漏矣上大悅因此不復出獵唐書中宗本紀神龍元年十月癸亥幸龍門乙丑獵于新安通典睿宗先天元年十一月獵於驪山之下侍中魏知古上詩諫曰嘗聞夏太康五子訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛豈暇翔飛熊從渭水瑞翟想陳倉此欲誠難縱茲遊不可常子雲陳羽獵僖伯諫漁棠得失鑒齊楚仁恩合禹湯雍熙諒在宥亭毒匪多傷辛則令為決虞針遂孔彰手制曰所進十韻三復研精良增欺美子時因暇景為苗而畋開一面之羅展三驅之禮無情校獵但慕前禽卿有針規輔豫不逮今賜物五千段用以勸奬唐書玄宗本紀開元元年十月甲辰獵于渭川文獻通考明皇開元三年大搜于鳯泉石補闕崔向上疏曰臣聞天子三田若古有訓豈惟為乾豆賔客庖厨者哉亦將閲兵講武戒不虞也詩美宣王之田徒御不驚有聞無聲謂畋獵時人皆銜枚有若聞而無歡譁也又曰悉率左右以燕天子謂悉驅禽順有左右之宜以安待王射也則知大綏將下亦有禮焉側聞獵于渭濵有異於是六飛馳騁萬騎騰躍衝翳薈蹴蒙籠越嶄險靡榛藂紅塵坐昏白日將暗毛羣擾攘羽族繽紛左右戎夷並伸驍勇攢鏑亂下交刃霜飛而降尊亂卑爭捷於其間豈不殆哉夫環衛而居暴客攸待清道而出行人尚驚如有墜駕之虞流矢之變獸窮則搏鳥窮則攫陛下復何以當之哉惟深思後慮以誡後圗天下幸甚唐書吳兢傳開元十三年帝東封泰山道中數馳射為樂兢諫曰方登岱告成不當逐狡獸使有垂堂之危朽株之殆帝納之玄宗本紀十四年十二月獵于方秀川十五年十一月獵于城南舊唐書玄宗本紀開元十七年十二月校獵渭濵唐書代宗本紀大厯四年十一月禁畿內弋獵十三年十月禁京畿持兵器捕獵德宗本紀貞元三年十二月獵于新店八年十二月獵于城東十年十二月獵于城南舊唐書德宗本紀貞元十一年十二月戊辰上獵苑中戒多殺止行三驅之禮勞士而還唐書憲宗本紀元和九年十一月戊子罷京兆府獵獻狐兔穆宗本紀元和十五年正月即皇帝位十二月庚辰獵于城南壬午擊鞠于右神策軍遂獵于城西甲申獵于苑北長慶二年十月己卯獵于咸陽十一月庚午皇太后幸華清宫癸酉迎皇太后遂獵于驪山白居易傳居易知制誥穆宗好畋遊獻續虞人針以諷曰唐受天命十有二聖兢兢業業咸勤厥政鳥生深林獸在豐草春搜冬狩取之以道鳥獸蟲魚各遂其生民野君朝亦克用寧在昔元祖厥訓孔彰馳騁田獵俾心發狂何以效之曰羿與康曽不是誡終然覆亡高祖方獵蘇長進言不滿十旬未足為歡上心既悟為之輟畋降及宋璟亦諫玄宗溫顔聽納獻替從容璟趨以出鷂死握中噫逐獸于野走馬于路豈不快哉銜橛可懼審其安危唯聖之慮文宗本紀太和四年三月癸卯禁京畿弋獵開成元年二月乙亥停獻鷙鳥畋犬舊唐書武宗本紀會昌二年十月帝幸涇陽校獵白鹿原諫議大夫高少逸鄭朗等于閣內論陛下校獵大頻出城稍逺萬幾廢弛星出夜歸方今用兵且宜停止上優勞之諫官出謂宰相曰諫官甚要朕時聞其言庶幾減過四年十月獵于鄠縣十二月獵于雲陽唐書憲宗懿安皇后郭氏傳武宗喜畋遊擇五坊小兒得出入禁中他日問后起居后曰諫臣章疏宜審覽度可用用之有不可以詢宰相毋拒直言帝再拜還索諫章閲之往往道遊獵事自是畋幸希小兒等不復橫賜矣右唐五代史唐莊宗本紀同光元年十二月壬辰畋于伊闕二年十一月癸卯畋于伊闕丙午至自伊闕三年十二月己卯畋于白沙家人傳莊宗方與后荒于畋遊十二月己卯獵畋于白沙后率皇子后宫畢從厯伊闕宿龕澗癸未乃還何澤傳莊宗好畋獵數踐民田澤乃潛身伏草間伺莊宗當馬諫曰陛下未能一天下以休兵而暴斂疲民以給軍食今田將熟奈何恣畋遊以害多稼使民何以出租賦吏何以督民耕陛下不聽言願賜臣死于馬前使後世知陛下之過莊宗大笑為之止獵伶官傳莊宗好畋獵獵于中牟踐民田中牟縣令當馬切諫為民請莊宗怒叱縣令去將殺之伶人敬新磨知其不可乃率諸伶走追縣令擒至馬前責之曰汝為縣令獨不知吾天子好獵耶奈何縱民稼穡以供稅賦何不飢汝縣民而空此地以備吾天子之馳騁汝罪當死因前請亟行刑諸伶共倡和之莊宗大笑乃得免明帝本紀天成二年十二月甲辰畋于東郊宋史符彥卿傳清泰中彥卿改易州兼領北面騎軍賜戎服介胄戰馬嘗射獵遂城鹽臺淀一日射麞彘狼兔四十二觀者神之晉出帝本紀天福八年十月壬子畋于近郊開運二年三月丁未畋于戚城十二月丁丑畋于近郊南唐近事烈祖輔吳四方多壘雖一騎一卒必加姑息然羣校多從禽聚飲近野或搔擾民庶上欲糾之以法而方藉其材力思得酌中之計問於嚴求求曰無煩繩之易絶耳請敕泰興海鹽諸縣罷採鷹鸇可不令而止烈祖從其計期月之間禁校無復遊墟落者右五代宋史太祖本紀建隆二年二月己卯禁春夏捕魚射鳥十二月庚戌畋于近郊禮志建隆二年始校獵于近郊先出禁軍為圍場五坊以鷙鷹細犬從帝親射走兔三從官貢馬稱賀其後多以秋冬或正月田于四郊從官或賜窄袍暖鞾親王以下射中者賜以馬太祖本紀建隆三年十月辛亥畋近郊十一月己卯畋于近郊乾德元年冬十月己亥田近郊十一月己亥畋近郊二年十一月壬辰畋近郊開寶元年冬十月己未畋近郊二年十月戊子畋近郊十一月甲寅畋近郊五年十一月己亥畋近郊八年九月壬申狩近郊逐兔馬蹶墜地因引佩刀刺馬殺之既而悔之曰吾為天下主輕事畋獵又何罪馬哉自是遂不復獵九年五月己巳幸飛龍院觀漁金水河太宗本紀太平興國二年九月丙辰狩近郊十月辛巳畋近郊十二月庚午畋近郊三年夏四月丙辰禁民自春及秋毋捕獵冬十月庚午畋近郊十二月庚午畋近郊四年二月戊寅次澶州觀魚于河十一月己丑畋近郊十二月丁卯畋近郊禮志太宗將北征因閲武獵近郊以多盜獵狐兔者命禁之有衛士奪人獐當死帝曰若殺之後世必為我重獸而輕人特貰其罪帝常以臘日校獵諭從臣曰臘日出狩以順時令緩轡從禽是非荒也回幸講武臺張樂賜羣臣飲其後獵西郊親射走兔五詔以古者搜狩以所獲之禽薦享宗廟而其禮久廢今可復之遂為定式帝雅不好弋獵詔除有司行禮外罷近甸遊畋五方所畜鷹犬並放之諸州不得以鷹犬來獻已而定難軍節度使趙保忠獻鶻一號海東青詔還賜之獵日但命諸王略畋近郊而五坊之職廢矣太宗本紀太平興國五年三月丙午幸水磑因觀魚九月壬戌畋近郊十二月庚辰發大名府因校獵六年十二月己卯畋近效七年十二月丙申狩近郊李燾長編太宗雍熙二年十一月詔曰三田之制其一田乾豆謂臘之以供祀也近以率遵時令薄狩郊畿既親射以獲禽宜奉先而登俎其以田獵親獲獸付所司薦享太廟著于令太宗本紀雍熙四年秋七月丙寅幸講武池觀魚冬十二月庚戌畋于近郊端拱元年冬十月癸未詔罷遊獵五坊所畜鷹犬並放之諸州毋以為獻淳化五年十二月丙戌命諸王畋近郊真宗本紀咸平三年十二月戊申狩近郊以親獲禽獻太廟文獻通考三年十二月以獵獲狐兔薦廟之餘賜中書樞密院宋史真宗本紀咸平四年十一月庚寅畋近郊景德三年十二月乙酉狩近郊以親獲兔付有司薦廟大中祥符三年二月己亥禁方春射獵每嵗春夏所在長吏申明之禮志真宗詔教駿所養鷹鶻量留十餘以備諸王從時展禮禁圍草地許民耕牧仁宗本紀五年十月庚午幸瓊林苑遂畋楊村遣使以所獲馳薦太廟召父老賜以飲食茶帛文獻通考慶厯五年兵部員外郎直集賢院李東之言祖宗校獵之制所以順時令而訓戎事也陛下臨御以來未嘗講修此禮願詔有司草儀注擇日命殿前馬步軍司互出兵馬以從獵于近郊詔樞密院討詳先朝校獵制度十月御內東門賜從官酒三行奏鈞容樂幸瓊林苑門賜從官食遂獵於楊村燕幄殿奏教坊樂遣使以所獲麞兔馳薦太廟既而召父老臨問賜以酒食茶絹及賜五坊軍士銀絹有差宋史仁宗本紀六年十一月辛丑畋東韓村乘輿所過及圍內田蠲租一年禮志六年復獵于城南東韓村自玉津園去輦乘馬分騎士數千為左右翼節以鼓旗合圍場徑十餘里部隊相應帝按轡中道親挾弓矢屢獲禽焉是時道傍居人或畜狐兔鳬雉驅場中帝謂田獵以訓武事非専所獲也悉縱之免圍內民田一嵗租仍召父老勞問其後以諫者多罷獵近甸自是終靖康不復講仁宗本紀慶厯七年三月罷出獵髙宗本紀紹興二十年二月庚戌禁民春月捕鳥獸蕙田案宋史兵志不及田獵事然考其經制如禁兵以殿前侍衛二司總之而建隆之獵先出禁軍為圍場或幸騏驥院因以射獵則凡親近扈從諸軍皆從獵之軍也又數罷五坊諸人安有鷹犬小兒隊長之紛紛哉蓋宋懲五代唐莊宗弊政故田獵之事簡便務實有可取者南渡以後史志闕如蓋亦無復開國規模矣右宋遼史營衛志遼國盡有大漠浸包長城之境因宜為治秋冬違寒春夏避暑隨水草就畋漁以為常四時各有行在之所謂之巴納春曰鴨子河濼皇帝正月上旬起牙帳約六十日方至天鵝未至卓帳氷上鑿冰取魚氷泮乃縱鷹鶻捕鵝雁晨出暮歸從事弋獵鴨子河濼東西二十里南北三十里在長春州東北三十五里四面皆沙堝多榆栁杏林皇帝每至侍御皆服墨緑色衣各備連鎚一柄鷹食一器刺鵝錐一枚于濼周圍相去各五七步排立皇帝冠巾衣時服繫玉束帶于上風望之有鵝之處舉旗探騎馳報逺泊鳴鼓鵝驚騰起左右圍騎皆舉幟麾之五坊擎進海東青鶻拜授皇帝放之鶻擒鵝墜勢力不加排立近者舉錐刺鵝取腦以飼鶻救鶻人例賞銀絹皇帝得頭鵝薦廟羣臣各獻酒果舉樂更相酬酢致賀語皆插鵝毛于首以為樂賜從人酒遍散其毛弋獵網釣春盡乃還夏巴納無常所多在圖爾山道宗每嵗先幸黑山拜聖宗興宗陵賞金蓮乃幸子河避暑圖爾山在黑山東北三百里近饅頭山黑山在慶州北十三里上有池池中有金蓮子河在圖爾山東北三百里懷州西山有清涼殿亦為行幸避暑之所四月中旬起牙帳卜吉地為納涼所五月末旬六月上旬至居五旬與北南臣僚議國事暇日遊獵七月中旬乃去秋巴納曰伏虎林七月中旬自納涼處起牙帳入山射鹿伏虎林在永州西北五十里嘗有虎據林傷害居民畜牧景宗領數騎獵焉虎伏草際戰栗不敢仰視上舍之因號伏虎林每嵗車駕至皇族而下分布濼水側伺夜將半鹿飲鹽水令獵人吹角效鹿鳴既集而射之謂之舐鹻鹿又名呼鹿冬巴納曰廣平淀在永州東南三十里本名白馬淀東西二十餘里南北十餘里地甚坦夷四望皆沙磧木多榆栁其地饒沙冬月稍暖牙帳多于此坐冬與北南大臣會議國事時出校獵講武兼受南宋及諸國禮貢皇帝牙帳以槍為硬寨用毛繩連繫每帳下黑氊傘一以芘衛士風雪槍外小氊帳一層每帳五人各執兵仗為禁圍南有省方殿殿北約二里曰夀寧殿皆木柱竹榱以氊為蓋彩繪韜柱錦為壁衣加緋繡額又以黃布繡龍為地障窗槅皆以氊為之傅以黃油絹基髙尺餘兩廂廊廡亦以氊蓋無門户省方殿北有鹿皮帳帳次北有八方公用殿夀寧殿北有長春帳衛以梗寨宫用契丹兵四千人每日輪番千人祗直禁圍外卓槍為寨夜則拔槍移卓御寢帳周圍拒馬外設鋪傳鈴宿衛每嵗四時周而復始禮志獵儀獵十二月辰日前期一日詔司獵官選獵地其日皇帝皇后焚香拜日畢設圍命獵夫張左右翼司獵官奏成列皇帝皇后升輿多囉倫穆騰以酒二尊盤飱奉進北南院大王以下進馬及衣皇帝降輿祭東畢乘馬入圍中皇太子親王率羣臣進酒分兩翼而行皇帝始獲兔羣臣進酒上夀各賜以酒至中食之次親王大臣各進所獲及酒訖賜羣臣飲還宫應厯元年冬漢遣使來賀自是嵗以為常儀統和中罷之太祖本紀天贊三年十月獵約囉山獲野獸數千以充軍食十一月射虎于烏蘭實哷山抵霸室山六百餘里且行且獵日有鮮食軍士皆給太宗本紀會同三年九月庚午侍中崔窮古言晉主聞陛下數遊獵意請節之上曰朕之遊畋非徒縱樂所以練習武事也乃詔諭之郭襲傳景宗即位數遊獵襲上書諫曰昔唐髙祖好獵以蘇世長諫罷史稱其美伏念聖祖創業艱難修德布政宵旰不懈穆宗逞無厭之欲不恤國事天下愁怨陛下繼統海內翕然望中興之治十餘年間征伐未巳而寇賊未除年穀雖登而瘡痍未復正宜戒謹修省以懷永圖側聞恣意遊畋萬一有銜橛之變搏噬之虞悔將何及況南有強敵伺隙而動聞之得無生心乎伏望陛下節從禽酣飲之樂為生靈社稷計則有無疆之休上覽而稱善聖宗本統統和十四年正月漁于潞河十一月詔諸軍官毋得非時田獵妨農十五年八月獵于平地松林皇太后誡曰前聖有言欲不可縱我兒為天下主馳騁田獵萬一有銜橛之變適貽子憂宜深戒之興宗本紀重熙十七年閏正月射虎于哈爾喜右遼金史太祖本紀收國元年三月辛未獵于寥晦城二年九月己亥上獵近郊熙宗本紀皇統二年正月己亥上獵于來流河十二月壬申上獵于哈雅愛滿路癸未還四年九月乙酉上如東京壬子獵于沙河射虎獲之十一月己酉上獵于海島九年十一月癸巳上獵于和囉和屯世宗本紀大定三年八月敕殿前都點校唐古德溫重九出獵國朝舊俗今扈從軍二千不無擾民可嚴為約束仍以錢萬貫分賜之九月秋獵十月冬獵十二月獵于近郊所獲薦山陵自是嵗以為常九年三月尚書省定網捕禽獸法或至徒上曰以禽獸之故而抵民以法是重禽獸而輕民命也自今有犯可杖而釋之十年七月秋獵放圍場役夫詔扈從糧食並從官給又敕扈從人縱畜牧蹂踐禾稼者杖之仍償其直二十五年十月禁止上京等路大雪及含胎時採捕十一月詔豺未祭獸不許採捕冬月雪尺以上不許用網及蘇克蘇呼恐盡獸類梁襄傳世宗將幸金蓮川襄上疏極諫曰陛下神武善騎射舉世莫及銜橛之變猛摰之虞姑置勿論設于行獵之際烈風暴至塵埃漲天宿霧四塞跬步不辨以致翠華有崤陵之避襄城之迷百官狼狽于道途衛士參錯于隊伍當此宸衷寧無戒悔臣又聞陛下于合圍之際麋鹿充牣圍中壯而大者才取數十以奉宗廟餘皆縱之不欲多殺是陛下恩及禽獸而未及隨駕衆多之臣庶也議者謂前世守文之主生長深宫畏見風日彎弧上馬皆所不能志氣弱懦筋力拘柔臨難戰懼束手就亡陛下監其如此不憚勤身逺幸金蓮至於松溪名為坐夏打圍實欲服勞講武臣愚以為戰不可忘獵不可廢宴安鴆毒不可懷然事貴適中不可過當今過防驕惰之患先蹈萬有一危之途何異無病而服藥也況欲習武不必度關涿易雄保順薊之境地廣又平且在邦域之中獵田以時誰曰不可伏乞陛下發如綸之音回北轅之轍塞雞鳴之路安處中都不復北幸宗社無疆之休天下莫大之願也世宗嘉納遂為罷行章宗本紀大定二十九年正月癸巳即皇帝位六月辛卯修起居注完顔烏哲知登聞檢院孫鐸皆上書諫罷圍獵上納其言九月丙子獵于近郊戊寅監察御史焦旭劾奏太傅克寧右丞相襄不應請車駕田獵上曰此小事不須治之十月丙申冬獵明昌元年春正月丁巳制諸王任外路者許遊臘五日過此禁之仍令禁約人從毋擾民六月丙申遣諸王凡出獵毋越本境八月丁未獵于近郊十月丁未獵于近郊十一月丙子冬獵十二月壬午免獵田今年稅二年十二月甲申獵于近郊三年二月甲戌朔敕明安穆昆許于冬月率所屬户田獵二次每出不得過十日丁酉獵于近郊九月己卯如秋山免圍場經過人户今嵗夏秋租稅之半曽當差役者復一年十月己巳獵于近郊四年正月癸巳諭點檢司行宫外地及圍獵之處悉與民耕種禁地聽民持農器出入丙申東京路副使王勝進鷹遣諭之曰汝職非輕民間利害官吏邪正略不具聞而乃以鷹進此豈汝所職也後毋復爾二月癸丑獵于桃村淀十二月丙辰獵于近郊五年六月己亥出獵登呼圖巴山酹酒再拜曺王永升以下進酒七月戊辰獵于和齊寬一發貫雙鹿是日獲鹿二百二十二賜扈從官有差辛巳次羅衮呼實布是日上親射獲黃羊四百七十一閏十月乙亥獵于近郊永安元年八月己酉獵于近郊三年八月辛未獵于近郊癸酉獵于香山九月乙巳獵于近郊十月庚午獵于近郊十一月甲寅冬獵十二月甲子獵于酸棗林大風寒罷獵凍死者五百餘人四年八月己巳獵于近郊壬申獵于香山丁丑獵于近郊五年七月甲戌獵于近郊十月丁未獵于近郊泰和元年正月辛未上以方春禁殺含胎兔犯者罪之告者賞之十二月壬寅獵于近郊二年十月丙戌獵于近郊十二月戊寅冬獵三年七月庚辰獵于近郊十一月丁丑冬獵以獲兔薦山陵五年七月丙子定圍場誤射中人罪六年十月甲子獵于近郊七年二月己未獵于近郊九月丙戌獵于近郊十月丙辰獵于近郊十一月甲午獵于近郊衛紹王本紀大安二年十一月獵于近郊宣宗本紀貞祐二年九月戊子禁軍官圍獵三年九月丁卯以秋稼未獲禁軍官圍獵元光元年十月甲申上獵于近郊詔免百官迎送且勿令治道以勞百姓二年十月乙亥制行樞密院及元帥府農隙之月分番巡徼校獵月不過三次丁丑上獵于近郊乙酉上獵于近郊哀宗本紀正大四年十月壬戌外臺監察御史諫獵上怒以邀名賣直責之十一月丁酉獵于近郊六年十二月罷附京獵地百里聽民耕稼癸辛雜識北客云北方人打圍凡用數萬騎各分東西而往凡行月餘而圍始合蓋不啻千餘里矣既合則漸束而小之圍中之獸皆悲鳴相弔獲獸凡數十萬虎狼熊羆麋鹿野馬豪豬狐狸之類皆有之特無兔耳獵將竟則開一門廣半里許俾餘獸得以逸去不然則一網打盡來嵗無遺種矣又曰未獵之前隊長去其頭帽於東南方開放生之門如隊長復帽則其圍復合衆始獵耳此亦湯王祝網之意也右金元史兵志元制自御位及諸王皆有實保齊蓋鷹人也是故捕獵有户使之致鮮食以薦宗廟供天庖而齒革羽毛又皆足以備用此殆不可闕焉者也然地有禁取有時而違者則罪之春冬之交天子或親幸近郊縱鷹隼搏擊以為遊豫之度謂之飛放故鷹房捕獵皆有有司存而打捕鷹房人户多取析居放良及漏籍布哷齊還俗僧道與凡曠役無賴者及招收亡宋舊役等户為之其差發除納地稅商稅依例出軍等六色宣課外並免其雜泛差役自太宗乙未年抄籍分屬御位下及諸王公主駙馬各投下及世祖時行尚書省嘗重定其籍厥後永為定制焉太宗本紀二年庚寅春帝與圖類獵于烏爾罕河四年壬辰冬十一月獵于納琳齊拉衮之野五年癸巳秋八月獵于伯蘇之地六年甲午冬獵于托卜罕地九年丁酉春獵于齊齊克察罕之澤冬十月獵于野馬川十年戊戌夏帝獵于齊齊克察罕之澤十一年己亥春復獵于齊齊克察罕之澤十三年辛丑春二月獵于齊齊克察罕之澤十一月丁亥大獵齊齊克察罕定宗本紀元年丙午冬獵黃羊於野馬川憲宗本紀三年癸丑春正月帝獵于齊齊克察罕之地四年甲寅春帝獵于齊齊克察罕夏幸伊爾穆爾齊之地冬大獵于額默根哈爾察海之地八年五月皇子阿蘇岱因獵獨騎傷民稼帝見讓之遂撻近侍數人士卒有拔民蔥者即斬以徇由是秋毫不敢犯世祖本紀中統三年冬十月乙丑禁京畿田獵至元元年秋七月陜西獵户移獵商州冬十月乙巳禁上都畿內捕獵二年四月戊子禁北京平濼等處人捕獵三年十月申禁京畿畋獵四年十一月申嚴京畿畋獵之禁七年七月命達嚕噶齊烏蘭濟達給上都扈從畋獵糧九年冬十月己亥敇自七月至十一月終聽捕獵餘月禁之十年正月己未禁鷹坊擾民九月辛巳遼東飢弛獵禁戊子禁京畿五百里內射獵己丑敕自今秋獵鹿豕先薦太廟十二年二月敕輝和地春夏毋獵孕字野獸十月辛丑弛北京義錦等處獵禁十四年八月車駕畋於上都之北冬十月辛酉弛蓋州獵禁十七年春正月丁卯畋近郊十八年春正月丁未畋於近郊五月禁髙麗全羅等處畋獵擾民者九月癸亥朔畋于近郊十九年春正月丙子車駕畋于近郊三月丙戌禁益都東平沿淮諸郡軍民官捕獵冬十月庚寅以嵗時不登聽諸軍捕獵於汴梁之南二十二年春正月丙申帝畋于近郊七月癸酉詔禁捕獵二十三年十一月敇禽獸字孕時無畋獵二十四年二月甲午畋于近郊乙未禁輝和地禽獸孕孳時畋獵閏二月乙丑畋于近郊二十五年春正月弛遼陽漁獵之禁惟毋殺孕獸丙午畋于近郊二月敇江淮勿捕天鵝弛魚濼禁三月甲午禁捕鹿羔二十七年三月乙巳中山畋户飢給六十日糧九月申嚴漢人畋獵之禁二十八年十一月武平平濼諸州飢弛獵禁其孕字之時勿捕二十九年二月丁卯畋于近郊戊子禁杭州放鷹成宗本紀大德元年三月癸酉畋于栁林丁亥禁正月至七月捕獵大都八百里內亦如之五月丁丑禁民間捕鬻鷹鷂八月丁未命諸阿濟格自今出獵悉自供具毋傷民力十一月癸亥詔自今畋獵始自九月閏十二月弛湖泊之禁仍聽正月捕獵二年二月己巳畋于漷州五年冬十月丙戌以嵗飢禁釀酒弛山澤之禁聽民捕獵七年二月真定路飢賑鈔五萬錠仍諭諸王小薛及鷹師等毋于真定近地縱獵擾民武宗本紀至大元年十一月辛巳罷益都諸處哈喇齊等狩獵三年秋七月立河南打捕鷹坊魚課都提舉司秩正四品八月甲子獵於瑪固諾爾之地十一月以益都寧海等處連嵗飢罷鷹坊縱獵其餘獵地並令禁約以俟秋成仁宗本紀至大四年三月仁宗即位四月禁鷹坊擾民九月復置中宫位下齊哩克昆諸色民匠打捕鷹坊都總管府秩正三品十二月禁人持弓矢兵器田獵皇慶元年五月諸王托果斯哈雅默色以農時出獵擾民敇禁止之自今十月方許出獵二年七月諸被災地並弛山澤之禁獵者毋入其境延祐二年四月乙巳車駕幸上都宣徽院以供尚膳遣人獵于歸德敇以其擾民特罷之三年春正月以真定保定薦飢禁畋獵三月鷹坊博囉等擾民於大同敇拘還所奉璽書禁天下春時畋獵五年三月庚午立諸王鄂囉木烏遜部打捕鷹坊諸色人匠齊哩克昆總管府秩從四品六年十一月中書省臣言曩賜諸王阿濟格鈔三萬錠使營子錢以給畋廩膳毋取諸民今其部阿勒呼木等出獵恣索於民且為姦事宜令宗正府刑部訊鞫之以正典刑制曰可英宗本紀至治元年二月丁巳畋于栁林三年二月癸酉畋于栁林泰定帝本紀泰定二年春正月乙未以畿甸不登罷春畋三年八月甲午以災變罷獵辛丑次中都畋于翁果察圖之地四年二月壬午狩于漷州致和元年正月乙卯帝將畋獵栁林御史王獻等以嵗飢諫帝曰其禁衛士毋擾民家命御史二人巡察之文宗本紀天厯二年正月癸酉敇罷今嵗栁林畋狩十一月甲子止鷹坊毋獵畿甸至順元年二月庚寅立諸色民匠打捕鷹坊都總管府秩正二品十一月知樞密院事雅克布琳請依舊制全給鷹坊芻粟使毋貧乏帝曰國用皆百姓所供當量入為出朕豈以鷹坊失所重困吾民哉不從戊戌立打捕鷹坊紅花總管府於遼陽行省秩正四品十二月癸酉詔宣忠扈衛親軍都萬户府凡立營司境內所屬山林川澤其鳥獸魚鱉悉供內膳諸獵捕者坐罪甲戌賑遼陽行省所居鷹坊户糧一月二年八月丁巳命邠王巴延特穆爾圍獵于撫州順帝本紀至元三年春正月戊午帝獵于栁林凡三十五日秋七月癸卯車駕出獵四年二月庚午車駕獵于栁林蕙田案元代最重田事史志所紀御位下打捕鷹房官至一千二百餘户諸王位下打捕鷹房官幾至千戶約計天下州縣所設獵户幾三萬三千餘户既非𨽻籍之兵又非屯田之卒姦民未免寄食于其中以擾害閭閻矣明大政紀永樂二十年五月乙酉車駕度偏嶺命將士獵于道傍山下上顧從臣曰朕非好獵顧士卒隨朕征討道中唯畋獵可以馳馬揮戈振揚武士作其驍勇之氣耳明史宣宗本紀宣德四年十月甲午閲武于近郊乙未獵于峪口戊戌還宫五年十月丙子巡近郊己卯獵于坌道丙戌至洗馬林遍閲城堡兵備壬辰還宫九年九月癸未自將巡邉乙酉度居庸關丙戌獵于坌道丁酉至洗馬林閲城堡兵備己亥大獵冬十月丙午還宫王圻續通考明英宗天順二年十月上校獵南苑苑在京城南二十里方一百六十里苑中有按鷹臺臺旁有三海皆元之舊也本朝闢四門繚以周垣獐鹿雉兔甚多設海户千餘守視自永樂定都以來嵗時搜獵於此亦所以訓武也是日上親御弓矢命勳戚武將應詔馳射獲輒獻之既畢賜酒饌以所獲分賜從臣而歸大政紀正德十二年正月上獵南海子九月二十七日上獵大同陽和衛城天雨雹軍士有死者是夜又星隕明日駕赴大同十三年四月上親詣天夀山祭告六陵遂往黃花鎮密雲等處遊獵明史武宗本紀正德十四年春二月丁丑大祀天地於南郊遂獵于南海子冬十一月乙巳漁於清江浦蕙田案明史兵志不載田獵事本紀亦不詳禮志復不及之蓋有明一代惟宣宗孝宗頗有志講武者由今考之侍衛上直軍及四衛營其皆從獵之軍歟右明周禮夏官大司馬仲春教振旅遂以搜田火弊獻禽以祭社注火弊火止也春田主用火因焚萊除陳草皆殺而火止疏火弊者謂田止也司爟掌行火之政令時則施火令注焚萊之時野焚萊則有刑罰焉注野焚萊民擅放火鄭疏野焚萊有罰者大司馬仲春田獵云火弊云春田主用火因除陳生新則二月後擅放火則有罰也蕙田案施火令謂昆蟲既蟄以後刑焚萊謂春田火弊以後也牧師凡田事贊焚萊注焚萊者山澤之虞生疏山虞二月焚萊除陳新禮記王制昆蟲未蟄不以火田注謂未十月之時十月則得火田故羅氏云蠟則作羅𥜗注云今俗放火張羅從十月以後至仲春皆得火田若陶鑄之火則季春出火季秋內火案春秋傳三月鄭人鑄刑鼎士文伯曰火未出而作火鄭其有災乎刑鼎則陶鑄也蕙田案疏云十月至仲春皆得火田此正司爟修火令之時也與季春出火季秋內火無涉月令仲春之月毋焚山林方氏慤曰毋焚山林主田者言之也蕙田案孔疏十月至仲春皆得火田此云毋焚山林者蓋已在日夜分之後春搜火弊獻禽已畢司爟所謂野焚萊者有罰時也郊特牲季春出火為焚也注謂焚萊也凡出火以火出然後簡其車賦而厯其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變注君親誓社誓吏士以習軍旅既而遂田以祭社也言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春火出而民乃用火今云季春出火乃後誓社記者誤也疏祭社既用仲春此出火為焚當在仲春之月今云季春季者以季春之時民始出火遂以為天子諸侯用焚亦在春故誤為季春當為仲春也出火以火出者案春秋火出為夏三月此出火者謂陶冶之火故左氏昭六年鄭人鑄刑書火未出而用火士文伯譏之若田獵之火則昆蟲蟄後得火田以至仲春也案司爟云季春出火民咸從之作記之人謂為焚萊祭社故稱季春春秋桓公七年春二月乙亥焚咸丘注焚火田也咸丘魯地譏盡物故書者疏以火焚地明為田獵故知焚是火田也不言搜狩以火田非搜狩之法而直書其焚以譏其盡物也禮記王制云昆蟲未蟄不以火田則是已蟄得火田也又爾雅釋天云火田為狩似法得火田而譏其焚者説爾雅者李巡孫炎皆云放火燒草守其下風周禮羅氏蠟則作羅襦鄭云襦細密之羅此時蟄者畢矣可以羅網圍取禽也今俗放火張羅其遺教然則彼火田者直焚其一叢一聚羅守下風非謂焚其一澤也禮天子不合圍諸侯不掩羣尚不盡取一羣豈容并焚一澤知其譏盡物故書也沈氏以周禮仲春火弊謂夏之仲春今周之二月乃夏之季冬故譏其盡物義亦通也蕙田案疏解火田之説是爾雅釋天火田為狩注放火燒草獵亦為狩也疏與冬獵同名故云亦蕙田案冬獵曰狩火田在昆蟲既蟄之後亦冬獵也狩不必皆火田而火田常在冬時故二者同名春秋書焚咸丘于春二月於夏時為季冬非譏其不時譏其盡物也陳氏禮書建辰之月鶉火見于南方則令民出火所謂季春出火是也建戌之月火伏于日下故令民納火所謂季秋納火是也司烜仲春修火禁以火未出而不可以作火故也王制昆蟲未蟄不以火田以火伏而后蟄者畢故也然孟春啓蟄而周禮中春之田有火弊者焚圃草以田可也焚山林以田不可也月令仲春禁焚禮也郊特牲季春出火為焚非禮也春秋之時楚子田使齊侯載燧此火田之所用者歟蕙田案周禮司爟四時變國火此鑽燧之火順隂陽之衰旺以為變改之宜所以平飲食也季春出火季秋內火此陶冶之火視心星之伏見以為出內之候所以利器用也王制昆蟲未蟄不以火田爾雅火田曰狩此田獵之火視昆蟲之動蟄以為焚萊之節所以仁庶物也鑽燧之火四時不廢陶冶之火用於夏至季秋而納之田狩之火用於冬至中春而禁之三者各為一事全不相涉火田之令自孟冬閉蟄而始至中春搜田而止大司馬云火弊火弊者火止也火止則焚山林有禁矣月令之文與周官互相發明郊特牲云季春出火為焚也蓋誤合出火與焚萊而一之鄭注駁之最是陳氏禮書於此處似未明晰故其言多鶻突後世如遼道宗清寧二年詔曰方夏長養鳥獸孳育之時不得縱火於郊其有合於昆蟲未蟄不以火田之義者矣右火田附五禮通考卷二百四十三
