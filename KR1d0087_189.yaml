牲齋郎以豆取牲血置於饌所遂烹牲未明二刻太史令郊社令各服其服入設神位各於壇上北方南向席皆以莞設神位各於座首未明一刻祭官以下各服其服郊社令良醖令入實罇罍及玉山罍實以醍齊蜃罇實以沈齊散罇及山罍皆實以清酒齊加明水酒加元酒各實于上罇祭神之玉以兩珪有邸太祝以幣置於篚太官令帥進饌者實諸籩豆簠簋等奉禮帥賛者先入就位賛引引御史太史執罇罍篚羃者入自東門當壇南重行北向西上立定奉禮曰再拜賛者承𫝊御史以下皆再拜訖執罇罍篚羃者各就位賛引引御史詣壇東陛升行掃除於上令史祝史行掃除於下訖引就位質明謁者引獻官賛引引執事者俱就東門外位太樂令帥工人次入就位謁者賛引各引獻官以下入就位立定奉禮曰再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位協律郎跪俛伏興舉麾鼓柷奏順和之樂蕤賔之均自後壇下之樂皆奏姑洗樂三成偃麾戞敔樂止奉禮曰再拜獻官以下皆再拜太祝取玉於篚立於罇所謁者引獻官詣岳壇升自南陛北向太祝以玉幣東向授獻官受登歌作肅和之樂以函鍾之均謁者引獻官進北面跪奠於岳神之座俛伏興謁者引退北面再拜訖登歌止謁者引獻官降自南陛還本位初獻官升奠玉幣太官令帥進饌者奉饌陳於東門外登歌止太官令引饌入俎初入門雍和之樂作饌至陛樂止饌升南陛太祝迎引於壇上設於岳神座前籩豆葢羃徹之如式設訖太官令以下降自東陛以出太祝還罇所其鎮海以下之饌皆祝史迎於壇上設於神座前相次而畢訖謁者引獻官詣罍洗盥手訖洗爵謁者引升自南陛詣酒罇所執罇者舉羃獻官酌醍齊訖樂作謁者引詣岳神座北向跪奠爵興謁者引獻官少退北向立樂止初獻官進奠爵祝史各以爵酌奠鎮海以下還罇所太祝持版於神座之右東面跪讀祝文祝文臨時撰訖興獻官再拜初讀祝文訖樂作太祝進奠版於神座還罇所獻官拜訖樂止太祝酌罍福酒進獻官之右西向立獻官再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎進俎太祝減神前二牲胙肉皆取前脚第二骨加於俎西向授獻官受以授齋郎獻官跪取爵遂飲卒爵太祝受爵復於坫獻官興再拜謁者引獻官降復位諸祝各徹豆如常訖還罇所奉禮曰賜胙賛者唱再拜在位者皆再拜獻官不拜順和之樂作奉禮又曰再拜獻官以下皆再拜樂一成止謁者進獻官之左白請就望瘞位西向立於衆官將拜諸太祝各執篚進神座前跪取玉幣齋郎以俎載毛血等各由其陛降壇詣瘞塪以物置於塪訖奉禮曰可瘞塪東西各四人寘土半塪謁者進獻官之左白禮畢遂引出賛引引執事以次出又賛引引御史太祝以下俱復執事位奉禮曰再拜御史以下皆再拜訖出賛引引工人以次出其祝板燔於齋所肆覲東后望秩之明日肆覲東后於告至之前刺史縣令皆先奉見如常將作先於行宫之南為宫壝方三百步面一門為壇於壝内三分壝二在南壇方九丈六尺髙四尺四出陛南面兩陛餘三面各一陛前二日太樂令設宫懸之樂於壇南如殿庭之儀前一日尚舍鋪御座於上近北南向又設解劍席於南陛之西南守宫於門外量設百官次文東武西以北為上東方刺史縣令次於文官之南蕃客次於武官之南所司陳輦輅於壇南如常典儀設羣官板位文官一品以下九品以上位於壇東南每等異位重行西面以北為上武官一品以下九品以上位於壇西南當文官每等異位重行東面以北為上東方刺史縣令於壇南三分庭一在南每等異位重行北面以西為上若有蕃客則位於刺史之西每國異位重行北面以東為上設典儀位於南陛之東賛者二人在南差退俱西向北上奉禮設門外位文官一品以下九品以上位於門東每等異位重行西面武官一品以下九品以上位於門西毎等異位重行東面俱以北為上設東方刺史縣令位於文官之南每等異位重行西面以北為上蕃客位於武官之南每國異位重行東面以北為上其日未明三刻諸衛各以其方器服量設牙旗於壝外四面未明一刻諸衞各勒所部列黄麾大仗屯門及鈒㦸陳於壝内如殿庭之儀羣官及刺史以下集各就次服其朝服蕃客集次各服其服侍中板奏請中嚴近仗陳於行宫門外諸侍衞之官各服其器服符寳郎奉寳俱詣行宫門外奉迎典儀帥賛者先入就位吏部兵部主客户部賛羣官客使俱出次通事舍人各引就門外位刺史縣令俱執贄通事舍人引就門外位贄各以其土所有錦綺繒布葛越之屬俱五兩為一束而執之仍飾以黄帊其餘當土常貢之物並盛以篚其屬執之列於縣令位後通事舍人引文武官一品以下九品以上先入就位侍中板奏外辦皇帝將出仗動太樂令令撞黄鍾之鐘右五鐘皆應協律郎舉麾工鼓柷奏太和之樂皇帝服衮冕乗輿以出曲直華葢警蹕侍衞如常儀皇帝入自北壝門由北陛升壇即御座樂止腰輿退其羽儀華葢仍侍於御側通事舍人引東方刺史以下入就位鴻臚引蕃客次入就位初刺史入壝門懸下舉麾舒和之樂作至位立定樂止典儀曰再拜賛者承𫝊執贄者俱跪奠贄興在位者皆再拜訖跪取贄興凡拜奠贄皆如之侍中前承制降詣刺史東北西面立稱有制蕃客則舍人承㫖宣勅刺史以下皆再拜宣制訖又再拜户部引諸州貢物兩行各入於刺史位前東西陳之龜為前列金次之丹漆絲纊四海九州美物重行量陳於後訖執物者各退立於東西廂文武前側立通事舍人引刺史為首者一人執贄詣解劍席跪解劍脫舄執贄興舍人接引升壇詣御座前北面跪奏稱具官臣姓名等敢獻壌奠遂奠贄俛伏興又舍人跪舉以東授所司舍人引刺史降詣解劍席跪佩劍納舄興通事舍人引復北面位初為首者奠贄通事舍人引在庭者以次奠贄於位前訖各俛伏興引退復位訖刺史以下俱再拜户部尚書進詣階間北面跪奏稱户部尚書臣某言諸州貢物請付所司俛伏興侍中前承詔退稱制曰可尚書退復位所司受贄其執貢物各進執物所司引退俱出東門初刺史將朝中書侍郎以諸州鎮表方别為一案俟於西門外給事中以祥瑞案俟於東門外俱令史絳公服對舉案侍郎給事中俱就侍臣班初刺史將入門中書侍郎降引表案入詣西階下東面立給事中降引祥瑞案詣東階下西面立刺史將升奠中書令黄門侍郎俱降立於階下刺史執贄升階中書令黄門侍郎各執所奏之文以次升初户部尚書奏退復位訖中書令前跪奏諸方表訖黄門侍郎又進跪奏祥瑞各還侍位侍郎與給事中引案退司儀日再拜賛者承𫝊文武羣官刺史以下及諸國客俱再拜訖通事舍人以次引北面位者出就門外位侍中前奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞蕤賔之鍾左五鍾皆應太和之樂作皇帝乗輿降自北陛警蹕侍衞如來儀入行宫樂止通事舍人引東西面位者以次出設㑹如正㑹之儀考制度朝覲之明日左右丞相以考制度事奏聞命太常卿採詩陳之以觀百姓之風俗命市納賈以觀百姓之所好惡命典禮者考時月定日同律觀禮樂制度衣服正之山川神祗有不舉者為不敬宗廟有不順者為不孝不孝不敬者則長官黜以爵革制度衣服者為叛叛者長官有討有功徳于百姓者加爵賞五月南巡狩至于南嶽如東巡狩之禮八月西巡狩至于西嶽如南巡狩之禮十有一月北巡狩至于北嶽如西巡狩之禮歸格于宗禰用特如别禮若告封禪如别儀蕙田案開元禮諸儀皆仿虞書舜典禮記王制最為雅正唐書𤣥宗本紀開元二十一年十月壬午如潞州丙戌中書門下慮巡幸所過囚辛卯赦潞州給三年賜髙年粟帛十一月辛丑如北都癸丑赦北都給復三年庚申如汾隂大赦免供頓州今嵗税賜文武官階勲爵諸州侍老帛武徳以來功臣後及唐隆功臣三品以上一子官民酺三日十二月辛未至自汾隂冊府元龜開元二十四年正月敕以前議西幸屬嵗不登闗輔之間且欲無擾今稼漸熟漕運復多而陵寢又違蒸嘗永感農隙順動得非其時前取今年十月幸西京者以其月三日發東都取南路應縁頓所務要崇節減所司明為條例勿有煩勞十月戊申發東都幸京師甲子至陜州丁亥至京師右唐五禮通考卷一百七十九
