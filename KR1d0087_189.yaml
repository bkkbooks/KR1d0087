付所司侍中承制曰可所司受贄出東門中書侍郎以州鎮表方一案俟于西門外給事中以瑞案俟于東門外乃就侍臣位初刺史將入乃各引案分進東西陛下刺史將升中書令黄門侍郎降立既升乃取表升尚書既請受贄中書令乃前跪讀黄門侍郎給事中進跪奏瑞侍郎給事中導案退文武刺史國客皆再拜北向位者出就門外位皇帝降北陛以入東西位者出設㑹如正至刺史蕃客入門皆奏樂如上公㑹之明日考制度太常卿採詩陳之以觀風俗命市納賈以觀民之好惡典禮者考時定日同律禮樂制度衣服正之山川神祗有不舉為不恭宗廟有不慎為不孝皆黜爵革制度衣服者為叛有討有功徳于百姓者爵賞之舊唐書髙宗本紀武徳三年春正月辛巳幸蒲州唐書太宗本紀貞觀四年秋九月己卯如隴州壬午禁芻牧于古明君賢臣烈士之墓者十月壬辰赦岐隴二州免今嵗租賦降咸陽始平武功死罪以下乙卯免武功今嵗租賦十一月甲子至自隴州十一年春二月甲子如洛陽宫乙丑給民百嵗以上侍五人三月癸卯降洛州囚見徒免一嵗租調九月丁亥河溢壊陜州河北縣毁河陽中潬幸白司馬坂觀之賜頻河遭水家粟帛十一月辛卯如懐州丙午如洛陽宫十二年二月癸亥如河北縣觀底柱乙丑如陜州丁卯觀鹽池庚午如蒲州甲戌如長春宫免朝邑今嵗租賦降囚罪丙戌至自長春宫冊府元龜貞觀十五年正月如洛陽次温泉衞士崔卿刁文懿憚于行役冀鑾輿驚擾而停遂夜射行宫矢及寢院者五皆以大逆論己丑詔從行士卒家貧親老並放還二月癸丑宴從官及山東宗姓洛陽年髙于貞觀殿三月戊辰如襄城宫庚午罷襄城宫分賜百姓十月壬辰幸嵩陽辛丑還宫十一月壬申還京十二月戊子至自洛陽十八年二月己酉幸零口村落偪側問其受田丁三十畆遂夜分而寢憂其不給詔府州録尤少田者並給復移之于寛鄉乙卯還宫十一月壬申至洛陽宫壬午宴父老百九十人于儀鑾殿班賜有差唐書太宗本紀貞觀二十年八月如靈州庚辰次涇州賜髙年鰥寡粟帛丙戌踰隴山闗次瓦亭觀牧馬九月辛卯遣使巡察嶺南十月丙戌至自靈州髙宗本紀永徽五年三月戊午如萬年宫乙丑次鳯泉湯辛未赦岐州及所過徒罪以下八月己未詔免麟游岐陽今嵗課役岐州及供頓縣半嵗九月丁酉至自萬年宫顯慶二年閏正月壬寅如洛陽宫二月癸亥降洛州囚罪徒以下原之免民一嵗租調賜百嵗以上氊衾粟帛十一月戊戌如許州甲辰遣使慮所過州縣囚乙巳赦鄭州免一嵗租賦賜八十以上粟帛其嘗事髙祖任佐史者以名聞十二月乙卯如洛陽宫丁卯以洛陽宫為東都四年閏十月戊寅如東都辛巳詔所過供頓免今嵗租賦之半賜民八十以上氈衾粟帛五年正月甲子如并州己巳次長平賜父老布帛二月丙戌赦并州及所過州縣義旗初嘗任五品以上𦵏并者祭之加佐命功臣食别封者子孫二階大將軍府僚佐存者一階民年八十以上版授刺史縣令賜酺三日三月丙午皇后宴親族于朝堂㑹命婦于内殿賜從官五品以上并州長史司馬勲一轉婦人八十以上版授郡君賜氈衾布粟四月癸巳如東都舊唐書髙宗本紀龍朔元年三月壬戌幸合璧宫七月癸卯車駕還東都八月丙戌令諸州舉孝行尤著及累葉義居可以勵風俗者九月甲辰以河南縣大女張年百三嵗親幸其第天宫寺是髙祖潛龍時舊宅上周歴殿宇感愴久之度僧二十人壬子勅中書門下五品已上諸司長官尚書省侍郎并親王三等以上並詣沛王宅設宴禮奏九部樂禮畢賜帛雜綵等各有差十月丁卯狩于陸渾癸酉還宫冊府元龜咸亨元年九月丁丑京師久旱詔來年正月幸東都在路供頓所須並令司稼自供不得令州縣差科所經道路修理開拓水可涉渡不煩造橋築宫又擬置御營之驛並不敢擅加修補在路不得妄有進獻唐書髙宗本紀咸亨二年正月乙巳如東都二月辛未遣使存問諸州十一月庚戌如許州遣使存問所過老疾鰥寡慮囚十二月癸酉獵于昆陽丙戌如東都儀鳯元年二月丁亥如汝州温湯遣使慮免汝州輕繫三月甲辰如東都免汝州今嵗半租賜民八十以上帛四月戊申至自東都冊府元龜儀鳯三年五月壬戌𤼵京師幸九成宫丙戌至九成宫是日山中霖雨大寒從行兵士有凍死者各賜絹三匹給棺槥官為埋殯又九月丁巳車駕𤼵九成宫辛酉至京師十月詔曰咸京天府地隘人繁百役所歸五方胥萃雖𫉬登秋之積猶虧洊嵗之資眷言于此思蠲徭賦夫以交風奥壌測景神州職貢所均水陸輻輳今兹豐熟特倍常時事貴從宜實惟權道即以來年正月幸東都闗内百姓宜免一年庸調及租并地于税草其當道諸縣特免二年劍南隴右諸軍毎供進物一二年且停永淳元年四月丙寅如東都舊唐書髙宗本紀永淳元年四月丙寅幸東都上以穀貴減扈從兵士庶從者多浮踣于路戊寅次澠池之紫宫乙酉至東都唐書髙宗本紀𢎞道元年正月甲午幸奉天宫四月己未如東都冊府元龜先天元年十一月睿宗命帝巡邊誥曰先王省方所以觀風設教聖人順動所以刑清甿服故協時同律虞典之常道喬嶽翕河周詩之盛徳自王風不競兹禮遂亡兩漢本朝有時于邁三國以降日不暇給我皇家開元首出十代重光寰宇大寧車書無外文祖神宗之徳洽于人心考祥展義之規昭于國典皇帝天錫英武神與聰明自陟元后實總朕師時政益明彞倫攸敘而邉甿遐阻藩服悠曠式慰來蘇之懐實允卜征之意加以頃年邊將授任或乖師旅以虧軍威不振今盛徳在水𤣥𡨕御辰天道成于積隂王制崇于大閱皇帝宜順時巡狩親幸邊陲掌圗修考事之儀典樂具陳詩之禮西泊河塞東踰燕朔望秩名山肆覲羣后休農問老誓師訓率其有牧州典郡功施于人杖節擁旄隱若敵國者當崇進律之賞加以分麾之命若郡政不舉軍令莫修聚歛苛細侵削戰士者宜明兹憲典肅以天誅然後七萃騰裝三軍按節合符釡山之典覽軒帝之餘風勒騎單于之臺踐漢王之故事使隂山罷祲大漠無塵其供帳所資儲擬之費皆令有司支備不得煩人甲午帝以北巡之故慎選良將乃以幽州防禦使幽州都督宋璟為左軍大總管和戎等軍大使并州長史薛訥為中軍大總管兵部尚書郭元振為右軍大總管既而竟不行二年八月癸卯制曰咸雒京師建都惟舊乃眷時邁卜御斯在自中宗入闗于今八載省方之典久而莫修遂使水漕陸輓方春不息勞人奪農卒嵗何望闗東嗟怨朕實閔焉思欲寧人而休轉運館穀而就敖庾加以暑雨作害災拂秦川嵗星有福祥歸豫野朕情深救弊身豈懐安博考靈心審聴輿語上奉天以為孝下利人以為忠順時而動從衆之願宜以今年十一月行幸東都凡厥有司各恭乃事至于從行兵馬供頓貯積務在撙節勿使煩勞考使選人咸令都集東都宫殿須理量加補葺不得煩人朕本為人而行非擬勞人自奉所過州縣無費黎元亦不得輒有差科旁求進獻宣布遐邇知朕意焉十月己亥幸新豐之温湯乙巳至自温湯開元二年九月戊申幸新豐之温湯十一月甲申勅曰惟此新豐是出古之順豫義兼巡省頃者觀風數臨兹地以寃滯詢于故老閭里歡康田疇墾闢况冬降積雪春期有年且諺王遊果符時邁千乘萬騎咸給于主司而累月再來頗勤于除掃且下復蠲之令慰其望幸之心新豐縣百姓免一年雜差科縣官及温泉監官經兩度祗承者與一中上考三年十月癸亥幸郿縣之鳯泉湯甲戌制曰詩人賦田以備蒐狩之義王者順時式展畋遊之禮頃者築塲神甸清道子來經上林之苑囿指扶風之藪澤雖獵將提鼓虞人植旗仍憫沍寒之節不行肅殺之命豈惟虞舜之典咸秩山川所冀周文之風及于鳥獸繇是罷還士卒非重盤遊養彼吏人致有煩擾所謂行者幸也后來其蘇宜申恩恵用符古昔所經州縣供承頓官百姓并告營幕橋道等事宜令所司勘會奏聞其縁御路及頓場麥苖有損者亦令具實奏聞十一月己卯至鳯泉湯是月詔曰陳詩展義問俗觀風乃王者之所務也頃屬農事皆隙嵗功有成近歴鄷鎬左連岐雍見江山秀麗溝塍綺錯長楊鄠杜之間竹林園果之富相望于道家給人足謂之時邁頗慰予懐思所以問耆老恤淹滯舉逸人旌賢士庶協巡遊之典以符行在之恩駕所過之縣見禁囚徒以下咸宜放免流以上罪犯具狀奏聴進止古者親問髙年養存孤老年九十以上并篤各賜物四段錦布各一匹五年正月辛亥幸東都庚申勅曰行幸所經州宜令紫㣲令黄門平章事蘇頲訪察刺史上佐政術定作三等奏聞二月甲戌至東都六年七月辛酉詔曰觀俗省方所以愛人治國崇尊廟貌所以事神享親欽若昔典此惟大義朕祗膺鴻業積稔咸泰去嵗欲幸洛京已𤼵成命旋屬重營太廟因將中止未即展軨効駕信弗可違終肆覲于東方當載馳于西土流晷不駐通喪永畢象居始成如在増慕朕之前志日夜匪遑故可以詩陳肅雍禮極禋祀况神明之隩時惟雍州稼穡有年莫若闗輔王假用吉后來其蘇實𫉬我心俾從人欲可以今年十月取北路幸長安所司準式務在節省無得勞費甲寅復詔曰兩京來去乃是尋常縁頓所須皆用官物至于百姓縱暫祗承處置有條不合辛苦其中侵擾莫非横干或漁獵畜養以將進獻徒使役以徇聲名實由綱紀未樹教令不行去年從京向都嘗亦處分蒲州刺史程行諶同州刺史李朝隠陜州姜師度至其州界咸有進奉惜其能善政故乃屈法收情憶至于今豈能無怪冬中西幸不可踵前其有輒進送及餉遺從官并别有煩擾者必科以法御史明加糾察隨時奏聞九月辛卯以將作大匠韋溱為東都留守十月甲寅還京十一月辛未至自東都九年九月甲戌詔曰王者觀俗以賦政考祥以省方必將協于人和而奉若天命朕祗承鴻業用康黎庶思振徳以恵物豈勞人以尊已頃年闗輔之地轉輸實煩重以河塞之役兵戎屢動千金有費九載未儲懐此勞軫以増旰昃且夫茍利于物可隨方而變通將適于人故因時以巡幸卜洛萬方之隩維嵩五岳之中風雨之所交舟車之所㑹流通江汴之漕控引河淇之運利俗阜財於是乎在今欲省其費務以實闗中即彼敖庾少留河邑乘嵗陽之吉展遊順之儀豈惟龜筮不違故亦詢謀是協脩五禮問百年車輿動而不勞玉帛㑹而胥悦所謂先天以宏道因人以為利也宜以明年正月十五日幸東都唐書𤣥宗本紀開元十年正月丁巳如東都二月丁丑次望春頓賜從官帛冊府元龜開元十年正月丁巳幸東都二月戊寅至東都八月壬子制曰朕頃自鎬京省方于雒本以息轉輸之費即河瀍之殷今屬宗廟改修禮崇昭事永言配享必在躬親又眷彼晉陽是稱重鎮將陳詩以問俗式安邊而訓武雖來往祗供頗有煩役而國之大事不可云勞宜以明年正月三日𤼵雒幸并州取便路還京應須支計所留準式縁頓祗承一事以上並用當處官物不許科歛百姓其遞運及從兵馬官寮等務從減省所在公私並不得輒有進獻違者所由州縣官及進獻人各量事貶罰布告遐邇咸使聞知唐書𤣥宗本紀開元十一年正月丁卯降東都囚罪杖以下原之己巳如并州降囚罪徒以下原之賜侍老物庚辰次潞州赦囚給復五年以故第為飛龍宫辛卯次并州改并州為北都癸巳赦太原府給復一年下户三年元從家五年版授侍老八十以上上縣令婦人縣君九十以上上州長史婦人郡君百嵗以上上州刺史婦人郡夫人二月壬子如汾隂賜文武官階勲爵帛三月辛未至自汾隂免所過今嵗税赦京城舊唐書𤣥宗本紀開元十二年十一月庚午幸東都至華隂上製嶽廟文勒之于石立于祠南之道戊寅至自東都唐書𤣥宗本紀開元十三年十月辛酉如兖州庚午次濮州賜河南北五百里内父老帛十一月庚寅封于泰山辛丑禪于社首壬辰大赦賜文武官階勲爵致仕官一季禄公主嗣王郡縣一子官諸蕃酋長來㑹者一官免所過一嵗兖州二嵗租賜天下酺七日丁酉賜徐曹亳許仙豫六州父老帛十二月己巳如東都冊府元龜開元十五年六月乙巳西京父老詣闕上表請幸帝手詔許之甲寅制曰朕粤自鎬酆省方瀍雒屬九服寧宴四時順成殊徴龎殷景福紛委遂荷靈睠登于介丘先天成功允答休祐葢敬天知命不敢以寧也我來于東嵗亦數稔而西土耆老徯予多怨况闗輔之地頃則有年宜叶卜征之祥式展時巡之義可以今年閏九月十日取北路幸長安所司准式縁頓支供一事以上並用當處官物不須科斂百姓其遞運及行從官寮等務從減省所在公私不得輒有進獻宣布遐邇知朕意焉八月己巳制曰朕君臨區宇子育黎元毎懐勤恤不欲勞煩而鎬京之地陵寢所在自展義河雒已歴嵗年所以式尊卜征有事時邁抑惟嘗典寧敢憚勞將欲西巡元取北路今同州有暴水浸于邑居載懐憂惕無忘鑒寐且從南路幸長安所司准式閏九月庚申𤼵東都幸京師十月己卯至京師十九年六月丁卯制曰三秦九雒咸曰帝京五載一巡時維邦典上庾多饒衍之美仍勞于轉輸中壌均舟車之湊頗聞于殷積朕所以相時度宜期于利物者也况河汴頻稔江淮屢登二周馳望幸之誠三川勤徯予之請然猶未便順動且念人勞期以來年方議時邁而頃京輔近甸膏澤未均陜雒之交稼穡亦盛固不可俟于今日庶用協乎光天豈肆心于宴安期順人而從幸兩京供帳宿有儲擬十月滌塲是因暇隙信可備法駕整勾陳清蹕崤潼觀風河雒宜以今年十月四日幸東都所司准式十月丙申幸東都勅供頓州縣百姓所縁料及充木匠雜祗供人等宜放今年地租自餘户等免今年地税半應定供頓縣官各與一中上考庚辰至東都唐開元禮皇帝巡狩告圜丘告社廟及歸格禮並附齋戒將告前一日皇帝齋於太極殿如郊祀之儀凡應告之官清齋于告所告社齋于太社告廟齋于廟所近侍之官應從升者及羣官客使等各於本司及公館各清齋一宿諸衞令其屬晡後一刻各以其方器服守衞壝門社則社門廟則廟門與太樂工人俱清齋一宿陳設前告三日尚舍直長施大次于外壝東門之内道北南向社則宫西門廟則廟東門尚舍奉御鋪御座衞尉社則守宫廟同社設文武侍次於大次之後文官在左武官在右俱南向設告官從駕羣官次各於常所設陳饌幔於内壝東門之外道南北向社無饌幔廟同社前二日太樂令設宫懸之樂於壝南社則于壇北廟于庭設登歌及舉麾位於壇上廟于殿上並如常儀社自此則右校清掃内外為瘞塪二于樂懸北如常前一日右校掃除壇之内外郊社令積柴於燎壇方一丈二尺開上南出户髙四尺社無燎壇廟同社奉禮設御位於壇之東南西向將告奉禮郎一人守之在位板西南五步所西向社設御位於北門之内當社壇南向廟於東階東南西向設望燎位當柴壇之北南向設告官及從駕羣官板位於内外如常儀郊社令廟太廟令帥府史一人社二人及齋郎以樽坫罍洗篚羃及玉幣之篚入設於位並如常儀廟酒樽位於堂上前楹間各於室外之左北向毎室春夏雞彞一烏彞一犠樽二秋冬斚彞一黄彞一著樽二皆如勺羃俱西上各有坫以置瓉執樽罍篚羃者各位於樽罍篚羃之後告日未明十五刻太史令郊社令設昊天上帝神座於壇上北方南向席以藁秸設神座於座首廟太廟令整佛神幄又帥府史齋郎以樽坫罍洗篚羃入設於位告日未明十刻太官令帥宰人以鑾刀烹牲於厨社告日未明十五刻太官令帥人烹牲於厨牲用黑牛二齋郎以豆取牲血如常未明四刻太史命郊社令各服其服升設神座席位如常廟每室各一犢鑾駕出宫社廟同皇帝服衮冕之服乘玉輅備大駕及嚴鼓時奏請𤼵内外器服皆如常儀親告告社則薦玉帛及進熟告廟則晨祼及饋食其日未明三刻諸告官各服其服郊社令良醖令各帥其屬入實樽罍玉幣太廟實以汎齊凡樽皆二其元酒各實于上樽禮神之玉以蒼璧其幣以蒼社太罍實以醴齊配座以象樽實亦如之明水實于上樽玉兩珪有邸太祝各以幣置于篚幣隨牲色各長大八尺晨祼雞彞斚彞犧樽著樽之上實以明水鳥彞黄彞實以鬱鬯犧樽著樽實以醴齊太官令帥進饌者實籩豆簋簠入設于内壝東門外饌幔内社於厨中未明二刻奉禮帥賛者先入就位賛引引御史太祝以下入行掃除如常儀訖各引就位廟又未明一刻賛引引太廟令太祝宫闈令入當階間北面西上立定奉禮曰再拜賛者承𫝊太廟令以下皆再拜升東階入開塪室奉出獻祖以下九室神主各置於座訖各就位駕將至謁者賛引各引告官以下及從告羣官客使先置者俱就門外位駕至大次門外迴輅南向領千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅之大次協律太樂令帥工人各入就位凡升壇坐者皆脱履于下降納如常儀降輅之大次郊社以祝版進署如常儀謁者賛引各引從駕羣官俱就門外位奉禮帥賛者先入就位賛引引御史及諸太祝與執樽罍篚羃者入就位大樂令帥工人次入就位通事舍人各引告官及從告羣官客使次入就位升壇者脱履如常儀太廟令以祝版進置通事舍人引從駕羣官就入外位皇帝停大次半刻頃謁者賛引引從駕羣官入就位太常博士引太常卿立於大次門外當門北向侍中板奏外辦皇帝服大裘而冕出次華葢侍衞如常儀侍中負寳陪從如常社停大次太常博士引太常卿立於大次門外當門北向侍中板奏外辦皇帝出次華葢侍衞如常告廟同博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至内壝門外社