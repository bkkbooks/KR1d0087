body:
  text: 五禮通考卷一百七十九刑部尚書秦蕙田撰嘉禮五十二廵狩史記秦始皇本紀始皇二十七年巡隴西北地出雞頭山過回中焉賜爵一級治馳道應劭曰馳道天子道也若今之中道然二十八年始皇東行郡縣上鄒嶧山立石遂上泰山立石禪梁父刻所立石乃並勃海以東過黄腄窮成山登之罘立石頌秦徳焉而去南登瑯琊大樂之留三月乃徙黔首三萬户瑯琊臺下復十二嵗作瑯琊臺立石頌徳還過彭城齋戒禱祠欲出周鼎泗水使千人没水求之不得乃西南渡淮水之衡南郡浮江至湘山祠自南郡由武闗歸二十九年始皇東遊登之罘刻石之瑯琊道上黨入三十二年始皇之碣石刻碣石門巡北邊従上郡入三十七年始皇出遊行至雲夢望祀虞舜於九疑山浮江下觀籍渡海渚過丹陽至錢塘臨浙江水波惡乃西百二十里従狹中渡上㑹稽祭大禹望於南海而立石頌秦徳還過呉従江乗渡並海上北至瑯琊自瑯琊北至榮成山至之罘並海西至平原津二世元年東行郡縣到碣石並海南至㑹稽盡刻始皇所立刻石遂至遼東而還右秦漢書髙祖本紀髙祖二年冬十月如陜鎮撫闗外父老文帝本紀三年夏五月上幸甘泉自甘泉之髙奴因幸太原見故羣臣皆賜之舉功行賞諸民里賜牛酒復晉陽中都民三嵗租留游太原十餘日秋七月上自太原至長安十年冬行幸甘泉十一年冬十一月行幸代春正月上自代還十五年夏四月上幸雍景帝本紀景帝中六年冬十月行幸雍武帝本紀武帝元光二年冬十月行幸雍六年夏六月行幸雍元狩元年冬十月行幸雍元鼎四年冬十月行幸雍賜民爵一級女子百户牛酒行自夏陽東幸汾隂十一月行幸滎陽還至洛陽五年冬十月行幸雍遂踰隴登空同西臨祖厲河而還元封元年冬十月詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邊垂擇兵振旅躬秉武節置十二部將軍親帥師焉行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威振匈奴還祀黄帝於橋山迺歸甘泉春正月行幸緱氏遂東巡海上夏四月癸卯上還登封泰山降坐明堂詔行所巡至博奉髙蛇丘歴城梁父民田租逋賦貸已除加年七十以上孤寡帛人二匹四縣無出今年算賜天下民爵一級女子百户牛酒行自泰山復東巡海上至碣石自遼西歴北邊九原歸於甘泉二年冬十月行幸雍春幸緱氏遂至東萊夏四月還至瓠子臨決河命従臣將軍以下皆負薪塞河隄作瓠子之歌赦所過徒賜孤獨髙年米人四石四年冬十月行幸雍通回中道遂北出蕭闗歴獨鹿鳴澤自代而還幸河東春三月詔赦汾隂夏陽中都死罪以下賜三縣及楊氏皆無出今年租賦五年冬行南巡狩至于盛唐登灊天柱山自尋陽浮江親射蛟江中𫉬之舳艫千里薄樅陽而出作盛唐樅陽之歌遂北至琅琊並海所過禮祠其名山大川春三月還至泰山増封因朝諸侯王列侯受郡國計夏四月詔赦天下所幸縣毋出今年租賦賜鰥寡孤獨帛貧窮者粟還幸甘泉六年冬行幸回中春作首山宫三月行幸河東太初元年冬十月行幸泰山十二月䄠髙里東臨勃海望祀蓬萊春還受計于甘泉三年春正月行東巡海上天漢元年春正月行幸甘泉三月行幸河東二年春行幸東海還幸回中三年春三月行幸泰山還幸北地夏四月赦天下行所過毋出田租太始二年春正月行幸回中三年春正月行幸甘泉宫享外國客二月令天下大酺五日行幸東海𫉬赤雁作朱雁之歌幸琅琊禮日成山登之罘浮大海山稱萬嵗冬賜行所過户五千錢鰥寡孤獨帛人一匹四年春三月行幸泰山夏四月幸不其祠神人於交門宫若有鄉坐拜者作交門之歌五月還幸建章宫大置酒赦天下十二月行幸雍西至安定北地征和三年春正月行幸雍至安定北地四年春正月行幸東萊臨大海三月上耕鉅定還幸泰山夏六月還幸甘泉後元元年春正月行幸甘泉遂幸安定宣帝本紀神爵元年春正月行幸甘泉三月行幸河東元帝本紀永光五年冬上幸長楊射熊館成帝本紀永始四年春正月行幸甘泉三月行幸河東蕙田案王莽𫝊載天鳯元年莽巡狩事今削不録右漢後漢書世祖本紀建武三年冬十月壬申幸舂陵置酒舊宅大㑹故人父老十一月乙未至自舂陵四年夏四月丁巳幸鄴己巳進幸臨平五月進幸元氏辛巳進幸盧奴六月辛亥車駕還宫七月丁亥幸譙八月戊午進幸夀春冬十月甲寅車駕還宫十一月丙申幸宛十二月丙寅進幸黎丘九年夏六月丙戌幸緱氏登轘轅十七年夏四月乙卯南巡狩皇太子及右翊公輔楚公英東海公陽濟南公康東平公蒼從幸潁川進幸葉章陵五月乙卯車駕還宫十八年春二月甲寅西巡狩幸長安十九年秋九月南巡狩壬申幸南陽進幸汝南南頓縣舍置酒㑹賜吏人復南頓田租嵗父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十嵗乎吏人又言陛下實惜之何言謙也帝大笑復増一嵗進幸淮陽梁沛二十年春二月戊子車駕還宫冬十月東巡狩甲午幸魯進幸東海楚沛國十二月壬寅車駕還宫復濟陽縣徭役六嵗三十年春二月東巡狩甲子幸魯進幸濟南閏月癸丑車駕還宫秋七月丁酉幸魯國復濟陽縣是年徭役冬十一月丁酉至自魯中元元年春正月丁卯東巡狩二月己卯幸魯進幸泰山北海王興齊王石朝於東岳夏四月癸酉車駕還宫己卯改年為中元行幸長安戊子祀長陵五月乙丑至自長安明帝本紀永平二年冬十月甲子西巡狩幸長安歴覽館邑㑹郡縣吏勞賜作樂十一月進幸河東所過賜二千石令長以下至於掾史各有差癸卯車駕還宫五年冬十月行幸鄴與趙王栩㑹鄴六年冬十月行幸魯㑹沛王輔楚王英濟南王康東平王蒼淮南王延琅邪王京東海王政十二月還幸陽城壬午車駕還宫十年夏閏四月甲午南巡狩幸南陽日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤篪和之以娛嘉賔還幸南頓勞享三老官屬冬十月徴淮陽王延㑹平輿徴沛王輔㑹睢陽十二月甲午車駕還宫十三年夏四月辛巳行幸滎陽巡幸河渠乙酉詔曰今五土之宜反其正色濵渠下田賦與貧人無令豪右得固其利因遂渡河登太行進幸上黨壬寅車駕還宫十五年春二月庚子東巡狩辛丑幸偃師徴沛王輔㑹睢陽進幸彭城癸亥帝耕于下邳三月徴琅邪王京㑹良城徴東平王蒼㑹陽都又徴廣陵侯及其三弟㑹魯還幸孔子宅親御講堂命皇太子諸王説經又幸東平辛卯途幸大梁至定陶夏四月庚子車駕還宫章帝本紀建初七年秋九月甲戌幸偃師東涉卷津至河内下詔曰車駕行秋稼觀收穫因涉郡界皆精騎輕行無它輜重不得輒修橋道逺離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脱粟瓢飲耳所過欲令貧弱有利無違詔書遂覽淇園己酉進幸鄴勞享魏郡守令以下至于三老門闌走卒賜錢各有差勞賜常山趙國吏人復元氏租賦三嵗辛卯車駕還宫冬十月癸丑西巡狩幸長安進幸槐里岐山得銅器形似酒罇獻之又𫉬白鹿帝曰上無明天子下無賢方伯人之無良相怨一方斯器亦曷為來哉又幸長平御池陽宫東至髙陵造舟于涇而還每所到幸輒㑹郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁亥車駕還宫八年冬十二月甲午東巡狩幸陳留梁國淮陽潁陽戊申車駕還宫元和元年秋八月丁酉南巡狩詔所經道上郡縣無得設儲㣥命司空自將徒支柱橋梁有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛九月辛丑幸章陵祠舊宅園廟見宗室故人賞賜各有差冬十月己未進幸江陵還幸宛十一月己丑車駕還宫賜從者各有差二年春二月丙辰東巡狩乙丑帝耕于定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功辛未幸太山進幸奉髙癸酉大㑹内外羣臣丙子詔大赦天下諸犯罪不當得赦者皆除之復博奉髙嬴無出今年田租芻槀戊寅進幸濟南三月己丑進幸魯壬辰進幸東平乙未幸東阿北登太行山至天井闗夏四月乙卯車駕還宫張酺𫝊顯宗置五經師酺以尚書教授數講于御前遂令入授皇太子及肅宗即位數月出為東郡太守元和二年東巡狩幸東郡引酺及門生并郡縣掾吏並㑹庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特莫不沾洽章帝本紀元和三年春正月丙申北巡狩濟南王康中山王焉西平王羨六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕于懐二月壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟巡狩之制以宣聲教考同遐邇解釋結寃也今四國無政不用其良駕言出游欲親知其劇易前祠園陵遂望祀華霍東柴岱宗為人祈福今將禮常山遂徂北土歴魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之徳底績逺圗復禹宏業聖跡滂流至于海表不克堂構朕甚慙焉月令孟春善相丘陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聴半入今年田租以勸農夫之勞乙丑敕侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意戊辰進幸中山出長城癸酉還幸元氏三月丙子詔復元氏七年徭役己卯進幸趙辛卯車駕還宫賜從行者各有差八月乙丑幸安邑觀鹽池九月至自安邑章和元年秋八月癸酉南巡狩甲申徴任城王尚㑹睢陽戊子幸梁乙未幸沛徴㑹東海王政九月庚子幸彭城東海王政沛王定任城王尚皆從辛亥幸夀春己未幸汝隂冬十月丙子車駕還宫和帝本紀永元三年冬十月癸未行幸長安十五年九月壬午南巡狩清河王慶濟北王夀河間王開並從賜所過二千石長吏以下三老官屬及民百年者錢布各有差冬十月戊申幸章陵癸丑㑹宗室于舊廬勞賜作樂戊午進幸雲夢臨漢水而還十一月甲申車駕還宫賜從臣及留者公卿以下錢布各有差張禹𫝊永元十五年南巡祠園廟禹以太尉兼衞尉留守聞車駕當進幸江陵以為不宜冒險逺驛馬上諫詔報曰祠謁既訖當南禮大江㑹得君奏臨漢回輿而旋及行還禹特蒙賞賜十六年十一月己丑行幸緱氏登百岯山賜百官從臣布各有差安帝本紀延光三年春二月丙子東巡狩辛卯幸泰山齊王無忌北海王普樂安王延來朝癸巳勞賜郡縣作樂三月戊辰還幸東平至東郡歴魏郡河内壬戌車駕還京師冬十月行幸長安丁亥㑹三輔守令掾吏于長安作樂閏月乙未歴觀上林昆明池十一月乙丑至自長安四年春二月甲辰南巡狩順帝本紀永和二年冬十月甲申行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛庚子幸未央宫㑹三輔郡守都尉及官屬勞賜作樂十二月乙亥至自長安桓帝本紀延熹二年冬十月壬申行幸長安乙酉幸未央宫十二月己巳至自長安賜長安民粟人十斛行所過縣三斛七年冬十月壬寅南巡狩庚申幸章陵賜守令以下各有差戊辰幸雲夢臨漢水還幸新野十二月辛丑車駕還宫靈帝本紀光和五年冬十月校獵上林苑歴函谷闗遂巡狩于廣成苑右後漢三國魏志文帝本紀黄初二年冬十二月行東巡三年春正月庚午行幸許昌宫三月甲午行幸襄邑夏四月癸亥行還許昌宫冬十一月辛丑幸宛四年春正月築南巡臺于宛三月丙申行自宛還洛陽宫秋八月辛未東巡九月甲辰行幸許昌宫晉書禮志黄初四年七月帝將東巡以大軍當出便太常以一特牛告祠南郊五年秋七月行東巡幸許昌宫八月為水軍親御龍舟循蔡頴浮淮幸夀春揚州界將吏士民犯五嵗刑以下皆原除之九月遂至廣陵赦青徐二州改易諸將守冬十月乙卯行還許昌宫六年春二月遣使者循行許昌以東盡沛郡問民所疾苦貧者振貸之三月行幸召陵通討虜渠乙巳還許昌宫辛未帝為舟師東征五月戊申幸譙八月帝遂以舟師自譙循渦入淮從陸道幸徐九月築東巡臺冬十月行幸廣陵故城臨江觀兵戎卒千餘萬旌旗數百里是嵗大寒水道冰舟不得入江乃引還十二月行自譙過梁明帝本紀太和四年八月辛巳行東巡乙未幸許昌宫十月乙卯行還洛陽宫晉書禮志魏明帝凡三東巡狩所過存問髙年恤疾苦或賜穀帛齊王正始元年巡洛陽縣賜髙年力田各有差右魏晉書武帝本紀泰始四年六月甲申朔詔曰郡國守相三載一巡行屬縣必以春此古者所以述職宣風展義也見長吏觀風俗協禮律考度量存問耆老親見百年録囚徒理寃枉詳察政刑得失知百姓所患苦無有逺近便若朕親臨之通志晉初新禮巡狩方岳柴望告設壝宫如禮諸侯之覲者賔及執贄皆如朝儀而不建旗摯虞以覲禮諸侯各建其旗章所以殊爵命示等威詩稱君子至止言觀其旗宜定新禮建旗如舊詔可然終晉代不行其禮武帝泰始四年詔使使持節侍中黄門侍郎銜命四出周行天下其萬民之害為一書禮俗政事教理刑禁逆順為一書悖逆暴亂作慝犯令為一書札喪荒凶厄貧為一書康樂和親安平為一書每國辨異之以反命于王蕙田案此後世遣使代巡之始右晉宋書文帝本紀元嘉四年二月東巡狩至于丹徒三月享㑹父老舊勲于行宫加賜衣裳幣帛蠲租原刑戰亡之家及單孤並隨宜隠䘏二十六年二月東巡幸至京城㑹舊京故老萬餘人享勞賚𤼵赦蠲徭役孝武帝本紀大明七年春二月甲寅車駕巡南豫南兖二州丁巳車駕校獵于歴陽之烏江己未車駕登烏江縣六合山壬寅詔曰朕受天慶命十一年於兹矣憑七廟之靈𫉬上帝之力禮横四海威震八荒方巡三湘而奠衡岳次九河而檢云岱今恢覽功成省風畿表觀民六合蒐校長洲騰沙飛礫平岳盪海鼖晉合序鐃鉦協節獻鬯如禮饁獸傾郊敬舉王公之觴廣納士民之夀八風循通卿雲叢聚盡天罄瑞率宇竭歡思散大極之泉以福無方之外可大赦天下行幸所無出今嵗租布其逋租餘債勿復收賜民爵一級女子百户牛酒刺守邑宰及民夫従蒐者普加洽賚又詔曰朕弱年操製出牧司雍承政宣風荐歴年紀國步中阻治戎江甸難夷情義實繫于懐今或練蒐訓旅涉兹境閭故邑耆舊在日罕存年世未逺殱亡大半撫迹惟事傾慨兼著太宗燕故晉陽洽恩世祖流仁濟畿暢澤永言往猷思廣前賚可蠲歴陽郡租輸三年遣使巡慰問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛髙年加以羊酒凡一介之善隨才銓貫前國名臣及府州佐吏量所沾錫人身已往施及子孫壬申車駕還宫秋九月戊子詔曰昔周王驥迹實窮四溟漢帝鸞軫夙徧五岳是皆所以上對幽靈下理民土自天昌替馭臨宫創圗禮代天鬱世貿興毁皇家造宋日月重光璇璣得序五星順命而戎車嵗動陳詩義闕朕聿含五光奄一天下思盡寳戒之規以塞謀危之路當沿時省方觀察風俗外詳考舊典以副側席之懐冬十月戊申車駕巡南豫州詔曰朕巡幸所經先見百年者及孤寡老疾並賜粟帛獄繫刑罪並親聴訟其士庶或怨鬱危滯受抑吏司或隠約潔立負擯州里皆聴進朕前面自陳訴若忠信孝義力田殖穀一介之能一藝之美悉加旌賞雖秋澤頻降而夏旱嬰弊可即開行倉並加賑賜癸丑行幸江寧縣訊獄囚丙寅詔曰賞慶刑威奄國彞軌黜幽升明闢㝢恒憲故採言聆風式觀侈質貶爵加地于是乎在今類帝宜社親巡江甸因覲嶽守躬求民瘼思宏明試之典以申考績之義行幸所經􅊩民之職功宣于聴即加甄賞若廢務亂民隨諐議罰主者詳察以聞己巳車駕校獵于姑熟十一月丙子曲赦南豫州殊死以下巡幸所經詳減今嵗田租乙酉上于行所訊溧陽永世丹陽縣囚癸巳車駕習水軍於梁山有白爵二集華葢有司奏改大明七年為神爵元年詔不許乙未原放行獄徒繫東諸郡大獄壬寅遣使開倉貸䘏聴受雜物當租十二月丙午行幸歴陽甲寅大赦天下南豫州别署勅繫長徒一切原散其兵期考襲謫戍悉停歴陽郡女子百户牛酒髙年孤疾賜帛十匹蠲郡租十年癸亥車駕至自歴陽魏書昭成帝本紀建國十二年西巡至河而還十九年二月帝西巡因而臨河使人招喻閼頭従命二十二年春帝東巡至于桑乾川夏四月還雲中二十五年帝南巡至君子津冬十月行幸代道武帝本紀登國二年冬十月癸卯幸濡源十一月遂幸赤城十二月巡松漠還幸牛川三年春二月帝東巡夏四月幸東赤城六月渡弱落水班賞將士各有差秋七月帝還赤城七年秋八月行幸漠南仍築巡臺八年春正月帝南巡二月幸羖羊原赴白樓夏六月車駕北巡秋七月臨幸新壇庚寅宴羣臣仍講武九月還幸河南宫九年春三月帝北巡夏五月田于河東秋七月還幸河南宫天興元年春正月庚子車駕自中山行幸常山之真定次趙郡之髙邑遂幸于鄴民有老不能自存者詔郡縣賑恤之帝至鄴巡登臺榭遍覽宫城將有定都之意乃置行臺以龍驤將軍日南公和跋為尚書與左丞賈彞率郎吏及兵五千人鎮鄴車駕自鄴還中山所過存問百姓詔大軍所經州郡復貲租一年除山東民租賦之半辛酉車駕𤼵自中山至于望都堯山次于恒山之陽二月車駕自中山幸繁峙宫三年夏五月己巳車駕東巡遂幸涿鹿西幸馬邑觀灅源秋七月壬子車駕還宫六年秋七月戊子車駕北巡築離宫于豺山縱士校獵東北踰罽嶺出參合代谷九月行幸南平城規度灅南面夏屋山背黄𤓰堆將建新邑辛未車駕還宫天賜三年春正月甲申車駕北巡幸豺山宫二月乙亥幸代園山建五石亭三月庚子車駕還宫夏四月庚申幸馬城甲戌車駕還宫秋八月甲辰行幸豺山宫遂至青牛山丙申西登武要北原觀九十九泉造石亭遂之石漠九月甲戌朔幸漠南鹽池壬午至漠中觀天鹽池度漠北之吐鹽池癸巳南還長川丙申臨觀長陂冬十月庚申車駕還宫四年夏五月北巡自參合陂東過蟠羊山大雨暴水流輜重數百乗殺數百人遂東北踰石漠至長川幸濡源西幸參合陂築北宫垣三旬而罷乃還宫明元帝本紀永興四年秋九月己巳朔東巡己卯大獮于石㑹山戊子臨去畿陂觀漁庚寅至于濡源西巡幸北部諸落賜以繒帛八月庚戌車駕還宫壬子幸西宫臨板殿大享羣臣將吏以田獵所𫉬賜之冬十有二月丁巳車駕北巡至長城而還五年夏四月乙卯車駕西巡五月乙亥行幸雲中舊宫之大室六月西幸五原校獵于骨羅山𫉬獸十萬秋七月己巳還幸薄山帝登觀太祖遊幸刻石頌徳之處乃于其旁起石壇而薦享焉賜從者大酺于山下丙戌車駕自大室西南巡諸部落賜其渠帥繒帛有差遂南次定襄大落城東踰七嶺山田于善無川八月癸卯車駕還宫神瑞二年夏四月己卯車駕北巡五月丁亥次于參合東幸大寗丁未田于四岬山六月戊午幸去畿陂觀漁辛酉次于濡源築立蜯臺射白熊于頽牛山𫉬之丁卯幸赤城親見長老問民疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀温泉至廣寗登歴山秋七月還宫復所過田租之半泰常元年夏六月丁巳車駕北巡秋七月甲申帝自白鹿陂西行大獮于牛川登釡山臨殷繁水而南觀于九十九泉戊戌車駕還宫二年夏五月車駕西巡至于雲中遂濟河田于大漠冬十有二月庚申田于西山癸亥車駕還宫四年夏四月辛巳南巡幸雁門賜所過無出今年租賦五月庚寅朔觀漁于灅水己亥車駕還宫復所過一年租賦秋八月辛未東巡遣使祭恒岳甲申車駕還宫所過復一年田租冬十有二月癸亥西巡至雲中踰白道北獵野馬于辱孤山至于黄河從君子津西渡大狩于薛林山七年春正月甲辰朔自雲中西行幸屋竇城賜從者大酺三日蕃渠帥繒帛各有差二月丙戌車駕還宫賜從者布帛各有差秋七月乙巳幸灅南宫遂如廣寗辛酉幸橋山因東幸幽州見耆年問其所苦賜爵號分遣使者循行州郡觀風俗冬十月甲戌車駕還宫復所過田租之半壬辰車駕南巡出自天門闗踰恒嶺四方蕃附大人各率所部從者五萬餘人八年春正月丙辰行幸鄴存恤民俗三月乙巳帝田于鄴南韓陵山幸汲郡至于枋頭乙卯濟自靈昌津幸陳留東郡乙丑濟河而北西之河内造浮橋于冶坂津夏四月丁卯幸成臯城觀虎牢遂至洛陽觀石經閏月己未還幸河内北登太行幸髙都辛酉還至晉陽班賜從官王公以下逮于厮賤無不霑給五月丙寅還次雁門皇太子率留臺王公迎于句注之北庚寅車駕至自北巡六月丙辰北巡至于參合陂遊于蟠羊山秋七月幸三㑹屋侯泉詔皇太子率百官以從八月幸馬邑觀于灅源九月乙亥車駕還宫太武帝本紀始光元年夏四月甲辰東巡幸大寗神䴥元年夏四月壬子西巡戊午田于河西六月甲寅行幸長川秋七月車駕還宫八月東幸廣寗臨觀温泉九月車駕還宫冬十月甲辰北巡壬子田于牛川二年冬十有一月西巡狩田于河西至祚山而還文成帝本紀太安三年冬十月將東巡詔太宰常英起行宫于遼西黄山四年春正月乙卯行幸廣寧温泉宫遂東巡平州庚午至于遼西黄山宫游宴數日親對髙年勞問疾苦二月丙子登碣石山觀滄海大享羣臣于山下班賞進爵各有差改碣石山為樂游山築壇記行于海濵戊寅南幸信都畋遊于廣川三月丁未觀馬射于中山所過郡國賜復一年丙辰車駕還宫冬十月甲戌北巡至隂山有故塜毁廢詔曰昔姬文𦵏枯骨天下歸仁自今有穿毁墳壠者斬之辛卯車駕次于車輪山累石記行禮志和平元年正月帝東巡歴橋山幸遼西遂縁海西南幸冀州北至中山孝文帝本紀延興二年閏六月戊午行幸隂山秋七月壬寅詔州郡縣各遣二人才堪専對者赴九月講武當親問風俗九月辛巳車駕還宫三年冬十有一月癸巳太上皇帝南巡至于懐州所過問民疾苦賜髙年孝悌力田布帛太和五年春正月己卯車駕南巡丁亥至中山親見髙年問民疾苦二月辛卯朔大赦天下賜孝悌力田孤貧不能自存者穀帛有差免宫人年老者還其所親丁酉車駕幸信都存問如中山癸卯還中山己酉講于唐水之陽庚戌車駕還都三月辛酉朔車駕幸肆州癸亥講武于雲水之陽所經考察守宰加以黜陟己巳車駕還宫十五年秋七月乙酉車駕巡省京邑聴訟而還十六年春二月壬辰巡省京邑聴理寃訟三月丁卯巡省京邑十七年八月壬寅車駕至肆州民年七十以上賜爵一級路見眇跛者停駕親問賜衣食終身戊申幸并州親見髙年問所疾苦九月庚午幸洛陽十有八年春正月癸亥車駕南巡詔相兖豫三州百年以上假縣令九十以上賜爵二級七十以上賜爵一級孤老鰥寡不能自存者賜粟五石帛二匹孝悌亷義文武應求者皆以名聞乙亥幸洛陽西宫二月己丑行幸河隂壬寅車駕北巡閏月癸亥次句注陘南皇太子朝于蒲池壬申至平城宫秋七月壬辰車駕北巡辛丑幸朔州八月癸卯皇太子朝于行宫甲辰行幸隂山觀雲川丁未幸閱武臺臨觀講武癸丑幸懐朔鎮己未幸武川鎮辛酉幸撫㝠鎮甲子幸柔元鎮乙丑南還所過皆親見髙年問民疾苦貧窘孤老賜以粟帛丙寅詔六鎮及禦夷城人年八十以上而無子孫兄弟終身給其廪粟七十以上家貧者各賜粟十斛又詔諸北城人年滿七十以上及廢疾之徒校其元犯以準新律事當從坐者聴一身還鄉又令一子扶養終命之後乃