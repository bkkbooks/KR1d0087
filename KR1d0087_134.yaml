body:
  text: 五禮通考卷一百二十四刑部尚書秦蕙田撰吉禮一百二十四親耕享先農蕙田案禮記天子為藉千畝親耕南郊以共齊盛所以敬天祖致誠信重耕農也其儀見於月令國語甚詳享先農之禮不見他經國語農正陳藉禮説者以為祭田祖即神農教民始耕者一稱先嗇漢以後稱先農歷代典禮至今不廢誠巨典也周禮春官籥章掌土鼓豳籥凡國祈年於田祖吹豳雅擊土鼓以樂田畯注祈年祈豐年也田祖始耕田者謂神農也田畯古之先教田者爾雅田畯農夫也故疏此田祖與田畯所祈當同日但位别禮殊樂則同連言之耳田祖即郊特牲云先嗇一也詩小雅甫田琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以榖我士女傳田祖先嗇也謂郊後始耕也箋設樂以迎祭先嗇疏郊特牲注云先嗇若神農春官籥章注云田祖始耕田者謂神農是一也始教造田謂之田祖先為稼嗇謂之先嗇神其農業謂之神農名殊而實同也以神農始造田謂之田祖而后稷亦有田功又有事於尊可以及卑則祭田祖之時后稷亦食焉何氏世本古義以神農為田祖經傳無明文王安石謂生為田正死為田祖猶樂官之死而為樂祖也以樂祖例田祖於理近之禮記郊特牲主先嗇注先嗇若神農者詩周頌載芟序春藉田而祈社稷也疏載芟詩者春藉田而祈社稷之樂歌也謂周公成王太平之時王者於春時親藉田以勸農業又祈求社稷使獲其年豐嵗稔詩人述其豐熟之事而為此歌焉陳氏禮書國語曰司空除壇於藉漢舊儀春始東耕官祠先農以一太牢先儒謂先農神農也立壇於田所祠之其制度如社之壇後漢藉田儀正月始耕常以乙日祠先農已享乃就耕位晉以太牢祠先農宋元嘉中度宫之辰地整制千畝中開阡陌立先農於中阡西陌南御耕壇於中阡東陌北將耕宿青幕於耕壇之上耕日以太牢祠先農如帝社儀後魏太武天興中祭先農用羊一北齊藉田作祠壇於陌南阡西廣三十尺四陛三壝四門正月上辛後吉亥祠先農神農氏於壇上無配太宗親祭先農藉於千畝武后改藉田壇為先農壇神龍初祝欽明奏曰祭法王自為立社曰王社先儒以為其社在藉田之中詩序云春藉田而祈社稷是也乃改先農壇為帝社然則先農即禮所謂先嗇也歷代所祭或以太牢或以羊或以乙日或以亥日要皆不逺於禮其改先農壇為帝社此於經無見特傅會詩序為之説明蔣氏德璟先農考詩載芟春藉田而祈社稷也正義曰周公成王太平之時王者親耕藉田以勸農業又祈求社稷使獲年豐歲稔故序本其多獲所繇經則主説年豐不及藉社所以經序有異也月令孟春天子躬耕帝藉仲春擇元日命民社大司馬仲春搜田獻禽以祭社然則天子祈社亦以仲春與耕藉異月而連言之者俱在春時故以春總之祭法云王為羣姓立社曰泰社王自為立社曰王社亦曰帝社此二社皆應以春祈之但此為百姓祈祭文當主於泰社其稷與社共祭亦當為泰社泰稷焉鄭元謂王社在藉田之中漢立官社文帝令官祠先農晉武詔復二社北齊及隋又改曰先農唐神龍中禮官祝欽明議以禮典無先農之文先農與社本是一神妄為改作請改先農壇為帝社壇以應禮經王社之義至開元定禮又採齊隋之議復曰先農宋陳祥道曰先儒謂王社建於藉田然國語王藉則司空除壇農正陳藉禮而歷代所祭先農而已不聞祭社也詩曰春藉田而祈社稷非謂社稷建於藉田也今案祝欽明云先農即社陳祥道云社自社先農自先農藉田所祭乃先農非社也其説不同其為重農報本之義一也蕙田案先農始教造田者是人鬼社是土示截然不同詩序乃言兩祭皆歌此詩非謂藉田而祭社也陳用之説極是祝欽明議非蔣氏並存之混矣壇制考虢文公云藉田之制司空除壇於藉漢文帝立壇於田所其制如社之壇宋於宫之震地八里外整治千畝中開阡陌立先農壇於中阡西陌南梁移藉田於建康北岸築兆域如南北郊齊作祠壇於陌南阡西廣輪三十六尺四陛三壝四門又為大營於外唐髙宗改藉田壇為先農壇神龍初復改先農壇為社壇於壇西立帝稷壇禮同太社唯不備方色有異焉壇髙五尺方五丈四出陛其色青宋先農壇九尺四十步飾以青二壝元壇制同社壇縱廣十步髙五尺四出陛其色青每方開櫺星門國朝壇在藉田之北髙五尺濶五丈四出陛蕙田案康成云王社在藉田中國語云司空除壇於藉夫壇而曰除似臨時之事而不同於社壇矣且耕藉在南郊社在宗廟右鄭氏説恐未的祭與耕同日考享先農之禮與躬耕同日禮無明文惟周語云農正陳藉禮而韋昭注謂陳藉禮者祭其神為農祈也至漢以藉田之日祀先農而其禮始著漢舊儀春耕藉田官祀先農百官皆從置藉田令丞東漢藉田儀正月始耕常以乙日祀先農於田所先農已享耕於其地自晉魏至唐宋其禮不廢政和間罷享先農為中祀命有司行事止行親耕之禮南渡後復親祀元不親行僅命有司攝事而已明髙皇帝親祀躬耕始復古禮後改中祀止遣應天府官致祭不設配祭畢親耕唯登極初行耕藉禮則親祭云右享先農周禮天官內宰上春詔王后帥六宫之人而生穜稑之種而獻之於王注六宫之人夫人以下分居后之六宫者古者使后宫藏種以其有傳類蕃孶之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後熟謂之穜後種先熟謂之稑王當以耕種於藉田元謂詩云黍稷穜稑是也史氏浩曰凡穜稑之種必藉后宫生之者欲其亦知稼穡之艱難鄭氏鍔曰經言三農生九榖固不一種獨於穜稑之種則三言之司稼辨之而縣於邑閭舍人縣之於歲時內宰生之於上春皆以穜稑為言則知穜稑非九榖也司農謂先種而後熟則謂之穜後種而先熟則謂之稑言生穜稑之種則凡九榖之或先種後熟或後種先熟者皆生之也觀詩人有黍稷穜稑之言謂黍稷之有先後然則非指穜稑為穀明矣春秋襄七年左氏傳啓蟄而郊郊而後耕疏月令祈榖之後即擇日而耕亦在正月禮記月令孟春之月天子乃以元日祈榖於上帝乃擇元辰疏甲乙丙丁等謂之日子丑寅卯等謂之為辰耕用亥日故云元辰知用亥者以隂陽式法正月亥為天倉以其耕事故用天倉也盧植蔡雍並云郊天是陽故用日耕藉是隂故用辰元者善也郊雖用日亦有辰但日為吉主耕之用辰亦有日但辰為主皇氏云正月建寅日月會辰在亥故耕用亥也未知然否方氏慤曰元日者善日也擇日者有司之事以日者天子之事凡日皆擇而後以之然前言以後言擇者以尊卑之序且互相備也故擇元辰之文其下乃言天子親載耒耜則擇日非天子之事明矣日為陽辰為隂祈穀於天所以成物故日用辛耕藉於地所以終功故辰用亥也蔣氏德璟不用亥考月令孟春擇元辰説者曰元辰祈榖郊後吉辰也十二支謂之辰郊天是陽故用辛日耕藉是隂故用亥辰知用亥者正月亥為天倉以其耕事故用天倉也周語立春之日農祥晨正至二月初吉王祼鬯而行藉禮漢文用亥日耕藉祠先農明帝耕以二月章帝耕以正月乙日晉武帝以正月丁亥宋文帝以正月上辛後吉亥齊武帝時王儉謂親耕用立春後亥日經無明文何佟之云少牢饋食禮禘太廟用丁亥鄭元以不必丁亥今若不得丁則用己亥辛亥茍有亥焉可也梁天監中議書云以殷仲春藉田理在建卯於是改用二月唐用孟春吉亥宋用正月上辛後亥日政和中議禮局言孟春親耕下太史局擇日不必専用吉亥元用孟春吉亥國朝以仲春擇吉日行事蕙田案月令孟春之月天子乃以元日祈穀於上帝乃擇元辰躬耕帝藉仲春之月擇元日命民社鄭注以元日祈榖為上辛郊天元辰為郊後吉辰元日命民社為祀社日用甲王制耆老皆朝於庠元日習射上功孔疏以元日為擇善日虞書舜典正月上日受終於文祖月正元日舜格於文祖孔傳上日朔日也月正正月也元日上日也孔疏上日日之最上元日日之最長元日還是上日如禮文月吉日又變文言吉月令辰也或問均一元日於舜典以為朔日於王制以為善日於月令或為辛日或為甲日又為元辰為吉辰則亦是善日其説不一似不若俱以善日釋之曰訓元為善元日謂之善日則元年亦謂之善年乎月令既有元日又有元辰日與辰自有别康成因祈榖與命社之文故引郊特牲郊用辛社用甲以釋之非元日正訓也然郊用辛社用甲雖出於秦漢諸儒之傅會而社日用甲正與擇元日命民社有合蓋嘗考之元者始也元日者日之始元辰者辰之始春官馮相氏掌十有二月十有二辰十日故子者十二辰之始甲者十日之始而每月朔日亦為一月之日之始元辰惟一而元日有二非子不可稱元辰而朔日與甲日俱可稱元日也舜典王制及月令祈榖之元日皆朔日也祈榖直用朔日故言天子以元日而不言擇耕藉用子日故謂之元辰而言擇命民社用甲日故亦謂之元日而言擇也曰如此則祈榖之郊於元旦行之可乎曰以周制言乃三月之朔耳非元旦也於殷為二月朔於夏乃為元旦夏殷之禮不可考矣然萬物本於天而民之大事在農則以元旦祈榖於上帝固無不可也天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝藉注耒耜之上曲也保介車右也置耒於車右與御者之間人君之車必使勇士衣甲居右而參乘備非常也保猶依也介甲也在疏御者御車之人車右及御人皆主參乘於時天子左御者居中車右在右方氏慤曰帝藉蓋藉田也以其供上帝之粢盛故曰帝以其借民力而終之故曰藉陳氏禮書耕車周禮木路不挽以革漆之而已漢志耕車三蓋東京賦曰農輿路木薛綜曰所謂耕根車也然晉武及梁乘木路宋文及唐乘耕根車三重蓋而唐志木路赤質耕車青質則木路與耕根車少異耳考之周禮田僕掌馭田路以田以鄙鄭氏田路木路也田田獵也鄙循行縣鄙然則耕藉於郊蓋木路歟蔣氏德璟藉田考藉字周禮作藉禮記作藉詩載芟小序亦作藉説文作藉大明會典亦作藉周禮天官甸師掌帥其屬耕耨王藉以時入之以共齍盛注藉之言借也月令孟春乃擇元辰躬耕帝藉注元辰郊後吉辰也帝藉者為天神借民力所治之田也藉田共上帝粢盛故云為天神借民力也箋云藉之言借也借民力治之正義云王者役人自是常事而謂之借者言此田耕耨皆當王親為之但以聽政治民有所不暇故借人之力以為己功漢書孝文藉田應劭曰藉田千畝典藉之田臣瓚曰親耕親桑率天下先本不得以假借為稱然凡言典藉者謂作事設法書而記之或復追述前言號為典法此籍田在於公地歲歲耕墾何故以籍為名若以事載典籍即名藉田則天下之事無非籍矣何獨於此偏得籍名瓚親耕之文即云不得假借豈藉田千畝天子親耕之乎説文曰藉帝藉千畝也古者使民如借故謂之藉從耒昔聲通作藉韋昭曰借民力治之以奉宗廟且以勸率天下使務農也盧植曰藉耕也左傳鄅人藉稻故知藉為耕瓚曰藉謂蹈藉也師古曰瓚説是今會典作藉蓋本之説文祭統天子親耕於南郊以共齊盛諸侯親耕於東郊亦以共齊盛注東郊少陽諸侯象也子疏鄭云王藉田在逺郊故甸師氏掌之天太陽故南也諸侯少陽故東也然藉田並在東南故王言南諸侯言東方氏慤曰東南陽地南又盛陽之地故天子耕於南郊冕用朱紘者亦以此東者少陽之地故諸侯耕於東郊冕用青紘者亦以此此又隆殺之别也祭義天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒方氏慤曰耕必服冕所以敬其事也月令天子三推三公五推卿諸侯九推疏案國語王耕王一發班三之賈逵注班次也謂公卿大夫也王之下各三其上也王一發公三發卿九發大夫二十七發方氏慤曰或以三或以五或以九者以貴賤為勞逸之差等也且耕陽事也故每用數之竒焉此言天子三推而春秋外傳言王耕一撥者蓋一撥土而三推之其實一也國語周語古者太史順時覛土陽疸憤盈土氣震發農祥晨正日月底於天廟土乃脈發注覛視也疸厚也憤積也盈滿也震動也發起也農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥底止也天廟營室也孟春之月日月皆在營室脈理也農書曰春土冒厥陳根可拔耕者急發先時九日太史告稷曰自今至於初吉陽氣俱蒸土膏其動弗震弗渝脈其滿眚榖乃不殖稷以告注先先立春日也初吉二月朔日也詩云二月初吉蒸升也膏土潤也其動潤澤欲行震動也渝變也眚災也言陽氣俱升土膏欲動當即發動變寫其氣不然則脈滿氣結更為災病榖乃不殖以太史之言告王王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易注史太史陽官春官司事主農事官距去也祗敬也祓齋戒祓除也不易不易物土之宜王乃使司徒咸戒公卿百吏庶民司空除壇於藉命農大夫咸戒農用先時五日瞽告有協風至王即齋宫百官御事各即其齋三日王乃淳濯饗醴注先耕時也瞽樂太師知風聲者協和也立春曰融風御治也淳沃也濯溉也饗飲也謂王沐浴飲醴酒及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從注期耕日也犧人司尊也掌共酒醴者灌鬯飲醴皆所以自香潔及藉后稷監之膳夫農正陳藉禮太史贊王王敬從之注監察也膳夫上士也掌王之飲食膳羞之饋食農正田大夫主敷陳籍禮而祭其神為農祈也贊導也王耕一撥班三之注一撥一耜之撥也王無耦以一耜耕班次也三之下各三其上也王一撥公三卿九大夫二十七庶人終於千畝其后稷省功太史監之司徒省民太師監之注終盡耕也畢宰夫陳饗膳宰監之膳夫贊王王歆太牢班嘗之庶人終食注宰夫下大夫也膳宰膳夫也陳氏禮書耕壇掌次掌凡邦之張事則耕壇蓋有幕也國語曰司空除壇於藉而宋有御耕壇於中阡東陌北將耕宿青幕於耕壇之上北齊於藉田一頃地中通阡陌作祠壇又外設御耕壇後梁有親耕臺在壇東帝親耕畢登臺以觀公卿之推而晉及北齊隋唐皇后躬蠶亦有壇然則古者躬耕田有耕壇司空除壇不特除先農壇而已禮記月令反執爵於大寢三公九卿諸侯大夫皆御命曰勞酒注既耕而宴飲以勞羣臣也大寢路寢御侍也國語周語仲山父曰王治農於藉搜於農隙耨穫亦於藉禮記月令季秋之月乃命冢宰藏帝藉之收於神倉祗敬必飭注帝藉所耕千畝也藏祭祀之榖為神倉重粢盛之委也國語周語廪於藉東南種而藏之周禮天官甸師下士二人府一人史二人胥三十人徒三百人注王以孟春躬耕帝藉天子三推公五推卿諸侯九推庶人終於千畝庶人謂徒三百人葉氏禮經會元耕藉田以教諸侯之孝周官言甸師帥屬耕耨王藉以時入之豈特付之有司乎成王之於農畝無不躬親其事詩人歌之一則曰曾孫來止二則曰曾孫來止成王之於民田猶躬戾止况藉田乎甸師亦特言其職云爾案內宰王后帥六宫而生種稑之種而獻於王注云王當以耕於藉田地官舍人亦曰歲時辨種稑之種以共於王后之春獻種則其躬耕藉田可知矣夫以天子而躬親耕之禮則天下孰不勤於耕以耕藉而共粢盛則天下孰不勸於孝其田千畝或有萊田使之共蕭茅果蓏之薦而又足以示天下之無曠土其徒三百人自耕藉之暇則使之以薪蒸役外內饔之事而又足以示天下之無遊民故曰耕藉者天下之大教也陳氏禮書天子為藉千畝於南郊正陽之位也冕而朱紘則朱者正陽之色也諸侯為藉百畝於東郊少陽之位也冕而青紘則青者少陽之色也其時則中春春秋傳曰啓蟄而郊郊而後耕是也其日則剛日月令曰乃擇元辰是也其祭則祈社稷於內享先農於外詩曰春藉田而祈杜稷國語曰膳夫農正陳藉禮是也其禮則后帥六宫贊事於內司空后稷太史瞽師鬱人犧人膳夫農正司徒太師贊事於外周禮內宰詔后帥六宫之人生種稑之種獻之於王國語曰太史告稷司空除壇之類是也親載耒耜猶農者之出疆也載必措於保介之御間又明勸農者也王必三推即所謂一撥也三公五推卿諸侯九推即所謂班三之也月令所言者推數也國語所言者人數也庶人終於千畝甸師所率之徒也反執爵於大寢公卿諸侯大夫皆御命曰勞酒此春耕之終事也若夫夏耨秋穫王又至焉國語所謂耨穫亦於藉是也考之於禮蠟合萬物而索饗之則羣小祀也其禮主先嗇先嗇先農也王以元冕祭之則耕藉之祭先農其服元冕可知也小司徒凡小祭祀奉牛牲羞其肆鄭氏謂小祭祀王元冕所祭者則祭先農用牛牲可知也王之藉掌以甸師而諸侯亦有甸人則諸侯之禮與王略同矣右耕藉之禮漢書文帝本紀後二年春正月丁亥詔曰夫農天下之本也其開藉田應劭曰古者天子耕藉田千畝為天下先藉者帝王典藉之常也韋昭曰藉借也借民力以治之以奉宗廟且以勸帥天下使務農也臣瓚曰景帝詔曰朕親耕后親桑為天下先本以躬親為義不得以假借為稱也藉謂蹈藉也師古曰瓚説是也國語曰宣王即位不藉千畝虢文公諫斯則藉非假借明矣朕親率耕以給宗廟粢盛通典漢舊儀春始親耕於藉田官祀先農以一太牢百官皆從先農神農也五經要義云立壇於田所祀之其制度如社之壇賜三輔二百里孝悌力田三老種百榖萬斛為立藉田倉置令丞榖皆以給天地宗廟羣望之祀以為粢盛蕙田案應劭漢官儀曰天子升壇公卿耕訖嗇夫下種藉田亦曰帝藉亦曰耕藉亦曰東耕亦曰親耕亦曰王耕十三年春二月甲寅詔曰朕親率天下農耕以供粢盛其具禮儀景帝本紀二年詔曰朕親耕以奉宗廟粢盛為天下先武帝本紀征和四年上耕於巨定應劭曰齊國縣也昭帝本紀始元元年春上耕於鉤盾弄田應劭曰時帝年九歲未能親耕帝藉鉤盾宦者近署故往試耕為戲弄也臣瓚曰西京故事弄田在未央宫中師古曰弄田謂宴遊之田天子所戲弄耳非為昭帝年幼創有此名六年春正月上耕於上林後漢書明帝本紀永平四年春二月辛亥詔曰朕親耕藉田以祈農事續漢志正月始耕既事告祠先農後漢書明帝本紀十三年春二月帝耕於藉田禮畢賜觀者食十五年春二月東巡狩癸亥帝耕於下邳禮儀志正月始耕晝漏上水初納執事告祀先農祭祀志縣邑常以乙未日祀先農於乙地南齊書樂志章帝元和元年元武司馬班固奏用周頌載芟祀先農章帝本紀元和二年二月乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功三年春正月辛丑帝耕於懷禮儀志正月始耕晝漏上水初納執事告祠先農已享耕時有司請行事就耕位天子三公九卿諸侯百官以次耕推數如周法力田種各耰訖有司告事畢是月令日郡國守相皆勸民始耕如儀諸行出入皆鳴鐘皆作樂其有災眚有他故若請雨止雨皆不鳴鐘不作樂圖書集成順帝永建中黃瓊疏請舉藉田禮從之黃瓊傳自帝即位以後不行藉田之禮瓊以國之大典不宜久廢上疏奏曰自古聖帝哲王莫不敬恭明祀增致福祥故必躬郊廟之禮親藉田之勤以先羣氓率勸農功昔周宣王不藉千畝虢文公以為大譏卒有薑戎之難終損中興之名竊見陛下遵稽古之鴻業體虔肅以應天順時奉元懷柔百神朝夕觸塵埃於道路晝暮聆庶政以恤人雖詩詠成湯之不怠遑書美文王之不暇食誠不能加今廟祀適闋而祈榖潔齋之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典藉田有日司徒咸戒司空除壇先時五日有協風之應王即齋宫享醴載耒誠重之也自癸巳以來仍西北風甘澤不集寒涼尚結迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風易曰君子自強不息斯其道也書奏帝從之後漢書獻帝本紀興平元年二月丁亥帝耕於藉田三國魏志武帝本紀建安十九年春正月始耕藉田二十一年三月壬寅公親耕藉田明帝本紀太和元年春二月辛未帝耕於藉田五年春正月帝耕於藉田晉書禮志魏氏雖天子耕藉藩鎮闕諸侯百畝之禮及武帝末有司奏古諸侯耕藉百畝躬執耒以奉社稷宗廟以勸率農功今諸王臨國宜依修耕藉之儀然竟未施行武帝本紀泰始四年正月丁亥帝耕於藉田禮志泰始四年有司奏耕祠先農可令有司行事詔曰古之聖王躬耕帝藉以供郊廟之粢盛且以訓化天下近代以來耕藉止於數步之中空有慕古之名曾無供祀訓農之實而有百官車徒之費今循千畝之制當與羣公卿士躬稼穡之艱難以帥先天下主者詳具其制下河南處田地於東郊之南洛水之北若無官田隨宜便換而不得侵人也於是乘輿御木輅以耕以太牢祀先農自惠帝之後其事便廢武帝本紀泰始八年正月癸亥帝耕於藉田十年正月辛亥帝耕於藉田哀帝本紀興定二年二月癸卯帝親耕於藉田輿服志金根車天下親耕所乘也置耒耜於軾上禮志江左元帝將修耕藉尚書符問藉田至尊應躬祠先農不賀循答漢儀無正有至尊親自祭之文然周禮王者祭四望則毳冕祭社稷五祀則絺冕以此不為無親祭之義也宜立兩儀注賀循等所上儀注又未詳允事竟不行後哀帝欲復行其典亦不能遂宋書禮志宋文帝元嘉二十年太祖將親耕以其久廢使何承天撰定儀注史學生山謙之己私鳩集因以奏聞乃下詔曰國以民為本民以食為天一夫輟耕飢者必及倉廪既實禮節以興自頃在所貧耗家無宿積隂陽暫偏則人懷愁墊年或不稔而病乏比室誠由政德未孚以臻斯弊抑亦耕桑未廣地利多遺宰守微化道之方氓庶忘勤分之義永言𢎞濟明發載懷雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課逰食之徒咸令附業考核勤惰行其誅賞勸察能殿嚴加黜陟古者從時脈土以訓農功躬耕帝藉敬供粢盛仰瞻前主思遵令典便可量處千畝考上元辰朕當親帥百辟致禮郊甸庶幾誠素奬被斯民於是斟酌衆條造定圖注先立春九日尚書宣攝內外各使隨局從事司空大農京尹令尉度宫之辰地八里之外整制千畝開阡陌立先農壇於中阡西陌南御耕壇於中阡東陌北將耕宿設青幕於耕壇之上皇后帥六宫之人生種稑之種付藉田令耕日太祝令以一太牢告祠先農如帝社儀孟春之月擇上辛後吉亥日御乘耕根三蓋車駕蒼駟建青旗著通天冠青幘朝服青衮帶佩蒼玉蕃王以下至六百石皆衣青唯三臺武衛不耕不改服章車駕出衆事如郊廟之儀至藉田侍中跪奏至尊降車臨壇大司農跪奏先農已享請皇帝親耕太史令讚曰皇帝親耕三推三反於是羣臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反藉田令帥其屬耕竟畝灑種即耰禮畢乃班下州郡縣悉備其禮焉二十一年春親耕乃立先農壇於藉田中阡西陌南髙四尺方二丈為四出陛陛廣五尺外加埓去阡陌各二十丈車駕未到司空大司農帥太祝令及衆執事質明以一太牢告祠祭器用祭社稷器祠畢班餘胙於奉祠者舊典先農又常列於郊祭云孝武帝本紀大明四年正月乙亥車駕躬耕藉田明帝本紀泰始五年春正月癸亥車駕躬耕藉田通典齊武帝永平中耕藉田用丁亥使御史乘馬車載耒耜從五輅南齊書禮志武帝永明三年有司奏來年正月二十五日丁亥可祀先農即日輿駕親耕宋元嘉大明以來並用立春後亥日尚書令王儉以為亥日藉田經記無文通下詳議兼太學博士劉蔓議禮孟春之月立春迎春又於是月以元日祈榖又擇元辰躬耕帝藉盧植説禮通辰日日甲至癸也辰子至亥也郊天陽也故以日藉田隂也故以辰隂禮卑後必居其末亥者辰之末故記稱元辰法曰吉亥又據五行之説木生於亥以亥日祭先農又其義也太常丞何諲之議鄭注云元辰蓋郊後吉亥也亥水辰也凡在墾稼咸存灑潤五行説十二辰為六合寅與亥合建寅月東耕取月建與日辰合也國子助教桑惠度議尋鄭元以亥為吉辰者陽生於子元起於亥取陽之元以為生物亥又為水十月所建百榖賴兹沾潤畢熱也助教周山文議盧植云元善也郊天陽也故以日藉田隂也故以辰蔡雍月令章句解元辰云日幹也辰支也有事於天用日有事於地用辰助教何佟之議少牢饋食禮云孝孫某來日丁亥用薦嵗事於皇祖伯某注云丁未必亥也直舉一日以言之耳禘太廟禮日用丁亥若不丁亥則用已亥辛亥苟有亥可也鄭又云必用丁已者取其令名自丁寧自變改皆為謹敬如此丁亥自是祭祀之日不専施於先農漢文用此日耕藉祠先農故後王相承用之非有别義殿中郎顧皓之議鄭元稱先郊後吉辰而不説必亥之由盧植明子亥為辰亦無常辰之證漢世躬藉肇發漢文詔云農天下之本其開藉田斯乃草創之令未睹親載之吉也昭帝癸亥耕於鉤盾弄田明帝癸亥耕下邳章帝乙亥耕定陶又辛亥耕懷魏之烈祖實書辛未不繫一辰徴於兩代矣推晉之革魏宋之因晉政是服膺康成非有異見者也班固序亥位云隂氣應亡射該藏萬物雜陽閡種且亥既水辰含育為性播厥取吉其在兹乎固序丑位云隂大旅助黃鐘宣氣而牙物序未位云隂氣受任助蕤賓君主種物使長大茂盛是漢朝迭選魏室所遷酌舊用丑實兼有據參議奏用丁亥詔可樂志永明四年藉田詔驍騎將軍江淹造藉田歌淹製二章世祖口出付太樂歌之祀先農迎送神升歌羽鑾從動金駕時逰教騰義鏡樂綴禮修率先丹耦躬遵緑疇靈之聖之嵗殷澤柔饗神歌辭瓊斚既飾繡簋以陳方燮嘉種永育宵民梁書武帝本紀天監十三年二月丁亥輿駕親耕藉田赦天下孝悌力田賜爵一級册府元龜天監十六年二月辛亥親耕藉田梁五禮藉田儀注其田東去宫八里逺十六里為千畝天子耒耜一具公耒耜三具卿侯耒耜九具立方壇以祠先農隋書禮儀志梁初藉田依宋齊以正月用事不齊不祭天監十二年武帝以為啓蟄而耕則在二月節內書云以殷仲春藉田理在建卯於是改用二月又國語云王即齊宫與百官御事並齋三日乃有沐浴祼享之事前代當以耕而不祭故缺此禮國語又云稷臨之太史讚之則知耕藉應有先農神座兼有讚述耕旨今藉田應散齋七日致齋三日兼於耕所設先農神座陳薦羞之禮讚辭如社稷法又曰齊代舊事藉田使御史乘馬車載耒耜於五輅後禮云親載耒耜措於參保介之御間則置所乘輅上若以今輅與古不同則宜升之次輅以明慎重而逺在餘處於禮為乖且御史掌視尤為親省今宜以侍中奉耒耜載於象輅以隨木輅之後普通二年又移藉田於建康北岸築兆域大小列種梨柏便殿及齋宫省如南北郊别有望耕臺在壇東帝親耕畢登此臺以觀公卿之推反又有祈年殿云梁書武帝本紀普通四年二月乙亥躬耕藉田中大通六年春二月癸亥輿駕親耕藉田大赦天下孝悌力田賜爵一級大同元年春二月丁亥輿駕躬耕藉田二年春正月乙亥輿駕躬耕藉田三年春二月丁亥輿駕親耕藉田四年春二月己亥輿駕親耕藉田唐類函梁元帝祭東耕文曰三農九榖為政所先萬箱億庾是曰民天繫稱斫耜書美厥田花開杏樹凍解新泉當使黍稷莫莫民翳胥樂甘雨祈祈遂及我私我私之熟表裏禔福禔福中田嵗取十千是藨是衮登頌有年陳書宣帝本紀大建元年春二月乙亥輿駕親耕藉田三年春二月丁酉輿駕親耕藉田六年春二月辛亥輿駕親耕藉田九年春二月壬午輿駕親耕藉田北魏書道武帝本紀天興三年春二月丁亥始耕藉田禮志太武帝天興三年春始躬耕藉田祭先農用羊一孝文帝本紀延興二年春三月甲午車駕耕於藉田册府元龜太和十六年二月丙午詔有司刻吉亥備小駕躬臨千畝北魏書孝文帝本紀太和十七年春二月己酉車駕始藉田於都南宣武帝本紀景明三年冬十二月戊子詔曰民本農桑國重蠶藉粢盛所憑冕織攸寄比京邑初基耕桑暫缺遺規往旨宜必祗修今寢殿顯成移御維始春郊無逺拂羽有辰便可表營千畝開設宫壇秉耒援筐躬勸億兆孝明帝本紀正光三年春正月辛亥親耕藉田北齊書文宣帝本紀天保二年正月癸亥親耕藉田於東郊隋書禮儀志北齊藉於帝城東南千畝內種赤粱白榖大豆赤黍小豆黑穄麻子小麥色别一頃自餘一頃地中通阡陌作祠壇於陌南阡西廣輪三十六尺髙九尺四陛三壝四門又為大營於外又設御耕壇於阡東陌北每嵗正月上辛後吉亥使公卿以一太牢祠先農神農氏於壇上無配享祭訖親耕先祠司農進穜稑之種六宫主之行事之官併齊設齋省於壇所列宫懸又置先農座於壇上衆官朝服司空一獻不燎祠訖皇帝乃服通天冠青紗袍黑介幘佩蒼玉黃綬青帶祙舄備法駕乘木輅耕官具朝服從殿中監進御耒於壇南百官定列帝出便殿升耕壇南陛即御座應耕者各進於列帝降自南陛至耕位釋劍執耒三推三反升壇即坐耕官一品五推五反二品七推七反三品九推九反藉田令帥其屬以牛耕終千畝以青箱奉穜稑種跪呈司農詣耕所灑之耰訖司農省功奏事畢皇帝降之便殿更衣享宴禮畢班賚而還北周書閔帝本紀元年春正月癸亥親耕藉田明帝本紀二年春正月辛亥親耕藉田武帝本紀保定元年春正月乙亥親耕藉田天和元年春正月己亥親耕藉田二年春正月己亥親耕藉田建德三年春正月乙亥親耕藉田隋書禮儀志隋制於國南十四里啓夏門外置地千畝為壇孟春吉亥祭先農於其上以后稷配牲用一太牢皇帝服衮冕備法駕乘金根車禮三獻訖因耕司農授耒皇帝三推訖執事者以授應耕者各以班九推五推而司徒帥其屬終千畝播殖九榖納於神倉以擬粢盛穰稿以餉犧牲云樂志先農奏諴夏辭迎送神與方丘同農祥神晣土膏初起春原俶載青氊致祀斂蹕長阡廽旌外壝房爼飾薦山罍沈滓親事朱紘躬持黛耜恭神務嗇受釐降祉唐書太宗本紀貞觀三年正月癸亥親耕藉田舊唐書禮儀志太宗貞觀三年正月親祭先農躬御耒耜藉於千畝之甸初晉時南遷後魏來自雲朔中原分裂又雜以獯戎代歷周隋此禮久廢而今始行之觀者莫不駭躍於是祕書郎岑文本獻藉田頌以美之初議藉田方面所在給事中孔頴逹曰禮天子藉田於南郊諸侯於東郊晉武帝猶於東南今於城東置壇不合古禮太宗曰禮緣人情亦何常之有且虞書云平秩東作則是堯舜敬授人時已在東矣又乘青輅推黛耜者所以順於春氣故知合在東方且朕見居少陽之地由於東郊蓋其宜矣於是遂定自後每歲常令有司行事唐書禮樂志皇帝孟春吉亥享先農遂以耕藉前享一日奉禮設御坐於壇東西向望瘞位於壇西南北向從官位於內壝東門之內道南執事者居後奉禮位於樂縣東北贊者在南又設御耕藉位於外壝南門之外十步所南向從耕三公諸王尚書卿位於御坐東南重行西向以其推數為列其三公諸王尚書卿等非耕者位於耕者之東重行西向北上介公酅公於御位西南東向北上尚舍設御耒席於三公之北少西南向奉禮又設司農卿之位於南少退諸執耒耜者位於公卿耕者之後非耕者之前西向御耒耜一具三公耒耜三具諸王尚書卿各三人合耒耜九具以下耒耜太常各令藉田農人執之皇帝已享乃以耕根車載耒耜於御間皇帝乘車自行宫降大次乘黃令以耒耜授廪犧令橫執之左耜置於席遂守之皇帝將望瘞謁者引三公及從耕侍耕者司農卿與執耒耜者皆就位皇帝出就耕位南向立廪犧令進耒席南北向解韜出來執以興少退北向立司農卿進受之以授侍中奉以進皇帝受之耕三推侍中前受耒耜反之司農卿卿反之廩犧令令復耒於韜執以興復位皇帝初耕執耒者皆以耒耜授侍耕者皇帝耕止三公諸王耕五推尚書卿九推執耒者前受之皇帝還入自南門出內壝東門入大次享官從享者出太常卿帥其屬耕於千畝皇帝還宫明日班勞酒於太極殿如元會不賀不為夀藉田之榖斂而鍾之神倉以擬粢盛及五齊三酒穰稿以食牲藉田稿先農唐初為帝社亦曰藉田壇享先農樂章貞觀中禇亮等作迎神用咸和粒食伊始農之所先古今攸賴是曰人天耕斯帝藉播厥公田式崇明祀神其福焉皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和尊彜既列瑚簋有薦歌工載登幣禮斯奠肅肅享祀顒顒纓辨神之聽之福流寰縣迎爼用雍和前夕親牲質明奉爼沐芳整辨其儀式序盛禮畢陳嘉樂備舉歆我懿德非馨稷黍皇帝酌獻領福用夀和詞同冬至圜邱送文舞出迎武舞入用舒和羽籥低昻文綴已千鏚蹈厲武行初望歲祈農神所聽延祥介福豈云虛武舞用凱安詞同冬至圜邱送神用承和又享先農樂章一首太樂舊有此詞不詳所起送神用承和三推禮就萬慶所凝夤賔志逺薦衮惟興降歆肅薦垂祐祖膺送神有樂神其上升唐書髙宗本紀永徽三年正月丁亥耕藉田册府元龜丁亥親享先農御耒耜率公卿耕於藉田賜羣官帛各有差文獻通考乾封二年正月行藉田之禮躬秉耒耜而九推禮官奏陛下合三推上曰朕以身帥下自當過之恨不終千畝耳初將耕藉田閲耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素豈貴文飾乎乃命撤之唐書髙宗本紀儀鳯二年正月乙亥耕藉田册府元龜帝親耕藉田於東郊禮畢作藉田賦以示羣臣三年五月幸藉田所觀區種手種數區景雲三年親耕藉田舊唐書禮儀志則天時改藉田壇為先農唐書禮樂志神龍元年禮部尚書祝欽明議曰周頌載芟春藉田而祈社稷禮天子為藉千畝諸侯百畝則緣田為社曰王社侯社今曰先農失王社之義宜正名為帝社太常少卿韋叔夏博士張齊賢等議曰祭法王者立太社然後立王社所置之地則無傳也漢興以有官社未立官稷乃立於官社之後以夏禹配官社以后稷配官稷臣瓚曰髙祖立漢社稷所謂太社也官社配以禹所謂王社也至光武乃不立官稷相承至今魏以官社為帝社故摯虞謂魏氏故事立太社是也晉或廢或置皆無處所或曰二社並處而王社居西崔氏皇甫氏皆曰王社在藉田案衛宏漢儀春始東耕於藉田引詩先農則神農也又五經要義曰壇於田以祀先農如社魏秦靜議風伯雨師靈星先農社稷為國六神晉太始四年耕於東郊以太牢祀先農周隋舊儀及國朝先農皆祭神農於帝社配以后稷則王社先農不可一也今宜於藉田立帝社帝稷配以禹棄則先農帝杜並祠叶於周之載芟之義欽明又議曰藉田之祭本王社古之祀先農勾龍后稷也烈山之子亦謂之農而周棄繼之皆祀為稷共工之子曰后土湯勝夏欲遷而不可故二神社稷主也黃帝以降不以羲農列常祀豈社稷而祭神農乎社稷之祭不取神農耒耜大功而専於共工烈山蓋以三皇洪荒之迹無取為教彼秦靜何人而知社稷先農為二而藉田有二壇乎先農王社一也皆后稷勾龍異名而分祭牲以四牢欽明又言漢祀禹謬也今欲正王社先農之號而未決乃更加二祀不可叔夏齊賢等乃奏言經無先農禮曰王自為立社曰王杜先儒以為在藉田也永徽中猶曰藉田垂拱後乃為先農然則先農與社一神今先農壇請改曰帝社壇以合古王社之義其祭準令以孟夏吉亥祠后土以勾龍氏配於是為帝社壇又立帝稷壇於西如太社太稷而壇不設方色以異於太社蕙田案王社在藉田説本注疏據祭統天子親耕南郊諸侯親耕東郊明乎藉田在郊匠人營國左祖右社禮運祭天於郊祭社於國明乎社稷在國郊國所在不同詎可合一祝欽明以先農王社為一非是秦靜既知王社先農不可一矣而欲於藉田中並祀先農帝社為二壇抑又非矣唐書睿宗本紀先天元年正月戊子耕藉田舊唐書禮儀志睿宗太極元年親祀先農躬耕帝藉禮畢大赦改元唐書元宗本紀開元十九年正月丙子耕於興慶宫禮樂志十九年停帝稷而祀神農氏於壇上以后稷配舊唐書禮儀志元宗開元二十二年冬禮部員外郎王仲邱又上疏請行藉田之禮唐書元宗本紀開元二十三年正月乙亥耕藉田舊唐書禮儀志親祀神農於東郊以勾芒配禮畢躬御耒耜於千畝之甸時有司進儀注天子三推公卿九推庶人終畝元宗欲重勸耕藉遂進耕五十餘步盡壠乃止禮畢輦還齊宫大赦侍耕執牛官皆等級賜帛册府元龜開元二十三年正月十八日親祀先農禮畢降至耕位侍中執耒太僕秉轡帝謂左右曰帝藉之禮古則三推朕今九推庶九榖之報也贊導者跪而奏曰先王制禮不可踰越帝曰夫禮豈不在濟人治國勤事務功乎朕發乎至誠深惟嘉殖將以勸南畝供粢盛豈非禮意也於是九推而止公卿以下終其田畝制曰昔者受命為君體元立極未有不謹於禮而能見教於人今嗣歲初吉農事將起禮先本於耕藉義緣奉於粢盛是所嚴祗敢不敬事故躬載耒耜親率公卿以先萬姓遂藉千畝謂敦本之為耳何布澤之更深宜有順於發生俾無偏於行惠可大赦天下唐開元禮皇帝吉亥享先農攝事附齋戒前祀五日皇帝散齋三日於别殿致齋二日一日於太極殿一日於行宫餘同上辛儀陳設前享三日陳設如圜丘儀前享二日大樂令設宫懸樂如圜丘儀唯懸樂樹路鼓為瘞塪於壇壬地外壝之內為異前享一日奉禮設御位如圜丘儀唯設望瘞位於內壝東門之內道南又設奉禮位於瘞塪西南東面南上為異攝事右校掃除壇之內外前享二日衛尉設享官公卿以下次於外壝東門外道南北向西上設陳饌幔於內壝東門外道南北向太樂令設宫懸前享一日奉禮郎設享官公卿位於內壝東門內道北執事位於道南西向北上設御史位於壇下如式又設奉禮位於樂懸東北贊者二人在南差退俱西向北上又設奉禮贊者位於瘞塪東面南上設協律郎位於壇上南陛之西東向太樂令於北懸間享官門外位皆於東壝外道南如式又設御耕藉位於外壝南門之外十步所南向設從耕位三公諸王諸尚書諸卿位於御座東南重行西向各依推數為列其公王尚書卿等非耕者位於耕者之東重行西向俱北上介公酅公位於御位西南東向以北為上尚舍設御耒席於三公之北少西南向奉禮又設司農卿位於御耒席東少南西向廪犧令於司農卿之南少退諸執耒耜者位於公卿耕者之後非耕者之前西面御耒耜一具三公耒耜三具諸王尚書卿各三人合耒耜九具以下耒耜太常各令藉田農人執之攝事無設耕藉位以下至此儀設酒樽之位於壇上神農氏犧樽二象樽二山罍二東南隅北向后稷氏犧樽二象樽二山罍二在神農酒樽之東俱北向西上樽皆加勺幕有坫以置爵設御洗於壇南陛東南亞獻之洗於東陛之南俱北向執樽罍篚冪者各位於樽罍篚冪之後設幣篚於壇上各於樽坫之所晡後郊社令帥齋郎以坫罍洗篚冪入設於位升壇者自東陛謁者引光祿卿詣厨視濯溉凡導引者每曲一逡巡贊引引御史詣厨省饌具光祿卿以下每事訖各還樽所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲未明五刻太史令郊社令各服其服升設神農氏神座於壇上北方南向設后稷氏神座於東方西向席皆以管設神位於座首鑾駕出宫乘耕根車於太極殿前餘同圜丘儀饋享享日未明三刻諸享官及從享之官各服其服郊社令良醖令帥其屬入實樽罍及幣犧樽實以醴齊象樽實以盎齊山罍實以清酒齊皆加明水酒皆加玄酒各實於上樽幣皆以青太官令帥進饌者實諸籩豆簠簋等入設於饌幔內未明二刻奉禮帥贊者先入就位其御史及禮官等入再拜掃除及就位如圜丘儀未明一刻謁者贊引各引享官以下就門外位司空行掃除及從享羣官客使等次入就位並如圜丘儀攝事自未明三刻至此與正儀同初未明三刻諸衛列大駕仗衛陳設如式侍中板奏外辦請中嚴乘黃令進耕根車於宫南門外廽車南向若行宫去壇稍逺嚴警如式未明一刻侍中板奏外辦質明皇帝服衮冕乘輿以出繖扇華蓋侍衛如常儀侍中負璽陪從如式皇帝升車訖乘黃令進耒太僕受載如初黃門侍郎奏請鑾駕發引還侍位鑾駕動之大次並如圜丘儀郊社令以祝板進御署訖近臣奉出郊社令受各奠於坫如圜丘儀初皇帝降車訖乘黃令受耒耜授廩犧令而橫執之於左其耜之耜所置於席遂守之凡執耒耜皆橫之授則先其奉後其耜皇帝停大次半刻頃具奏辦出次太常卿請行事並如圜丘儀攝事衆官拜訖謁者白太尉有司謹具請行事無初未明三刻下至此儀協律郎舉麾工鼓祝以角音奏永和之樂以姑洗之均自後接神皆奏姑洗作文武舞樂舞三成偃麾戞敔樂止太常卿前奏稱請再拜退復位皇帝再拜及奠玉幣奏樂之節並如圜丘儀攝事謁者引太尉升奠幣太常卿引皇帝進北面跪奠於神農氏神座俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝又立於西方東向又太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東面跪奠於后稷氏神座俯伏興太常卿引皇帝少退東面再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史奉毛血之豆立於門外於登歌止祝史奉毛血入升自南陛配座升自東陛太祝迎取於壇上進奠於神座前太祝退立於樽所皇帝既升奠幣太官令出帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉神農之爼皇帝既至版位樂止攝事無太官令引饌入爼初入門雍和之樂作饌至陛樂止祝史進徹毛血之豆降自東陛以出神農氏之饌升自南陛配座之饌升自東陛太祝迎引於壇上各設於神座前籩豆蓋冪先徹乃升簋簠既奠却其蓋於下設訖謁者引司徒以下降自東陛復位太祝各還樽所太常卿引皇帝攝事謁者引太尉詣罍洗樂作其盥洗奏樂及齋郎奉爼並如圜丘之儀太常卿引皇帝詣神農氏酒樽所執樽者舉冪侍中贊酌醴齊訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進神農氏神座前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神座之右東面跪讀祝文曰維某年歲次月朔日子開元神武皇帝某攝事云謹遣太尉封臣名敢昭告於帝神農氏獻春伊始東作方興率由典則恭事千畝謹以制幣犧齊粢盛庶品肅偹常祀陳其明薦以后稷氏配神作主尚享訖興帝再拜攝事太尉再拜下倣此初讀祝文訖樂作太祝進跪奠版於神座興還樽所皇帝拜訖樂止太常卿引皇帝詣后稷氏酒樽所酌獻樂作並如神農氏唯皇帝東向立為異太祝持版進於神座之右北向跪讀祝文曰維某年歲次月朔日子開元神武皇帝某敢昭告后稷氏土膏脈起爰修耕藉用薦常事於帝神農氏唯神功協稼穡實允昭配謹以制幣犧齊粢盛庶品式陳明薦作主侑神尚享訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神座俯伏興還樽所皇帝拜訖樂止太常卿引皇帝進神農氏神座前北向立樂作太祝各以爵酌上樽福酒攝事太祝酌罍福酒其飲福受胙樂舞等並如圜丘儀攝事亦同圜丘攝事初皇帝將復位謁者引太尉詣罍洗攝事謁者引太常卿為亞獻盥手洗爵訖謁者引太尉自東陛升壇詣神農氏象樽所執爵者舉冪太尉酌盎齊武舞作謁者引太尉進神農氏神座前北向跪奠爵興謁者引太尉少退北向再拜謁者引太尉詣后稷氏象樽所取爵於坫執爵者舉冪太尉酌盎齊謁者引太尉進后稷氏神座前東向跪奠爵興謁者引太尉少退東向再拜謁者引太尉進神農氏神座前北向立太祝各以爵酌罍福酒合置一爵太祝持爵進太尉右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手帨爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿攝事同降復位武舞止諸祝各進跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜在位者皆再拜已飲福者不拜永和樂作太常卿前奏稱再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜樂一成止太常卿奏請就望瘞位奉禮帥贊者就瘞塪西南位太常卿引皇帝太和之樂作皇帝就望瘞位北向立樂止於羣官將拜祝各執篚進神座前取幣各由其陛降壇詣塪以幣置於塪訖奉禮曰可瘞東西各四人置土半塪太常卿前奏禮畢請就耕藉位攝事謁者進太尉之左白禮畢享官執事再拜出如圜丘攝事太常卿引皇帝樂作皇帝詣耕藉位南向立樂止初白禮畢奉禮帥贊者還本位攝事無詣耕藉位耕藉皇帝將詣望瘞位謁者引三公及應從耕侍耕者各就耕位司農先就位諸執耒者皆就位皇帝初詣耕位廪犧令進詣御耒席南北面跪伏搢笏解耒韜出執耒起少退北靣立司農卿受耒以授侍中侍中奉耒進皇帝受以三推侍中前受耒耜反於司農司農反於廪犧令訖還本位廪犧令復耒於韜執耒起復位立皇帝初耕執耒者以耒耜各授侍耕者皇帝耕訖三公諸王五推尚書卿九推訖執耒者前受耒耜退復位侍中前奏禮畢退復位太常卿引皇帝入自南門還大次樂作皇帝出自內壝東門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引享官及從享羣官諸方客使以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出太常卿帥其屬以次耕於千畝其祝版燔於齋所鑾駕還宫如圜丘儀勞酒車駕還宫之明日設會於太極殿如元會之儀唯不賀不上夀為異藉田東郊儀皇帝夾侍二人正衣二人右令以祝先農壇上行事夾侍正衣充中書門下先奏侍中一人奉耒耜進耕畢復受奏禮畢中書令一人侍從禮部尚書一人侍從宫以下並合便取祀先農壇上行事官充司農卿一人授耒耜於侍中侍耕右衛將軍一人已上並侍衛太尉司徒司空各一人行五推禮舊例宰臣攝行事九卿九人行九推禮舊例差左右僕射六尚書御史大夫攝行事諸侯三人行九推禮差正員一品官及嗣王攝行事禮儀使一人贊導耕藉禮太常卿一人贊導耕藉禮以上官便合取祀先農壇已上行事官充右禮司狀上中書門下請奏差如本官不足差六品以下官充並服袴褶御耒耜二具併韜並以青色內一具副準乾元故事合依農人所執者制造不合雕飾事畢日收藉耒耜一丈席二領先農壇髙五尺方五尺四出陛其色青祀前二十日修畢三公九卿諸侯耒耜一十五具御耒耜牛四頭內二頭副併牛衣每隨牛一人並綘衣介幘須明間農務者行事禮司専差人贊導髙品中官二人執侍耒耜並衣袴褶太常帥其屬庶人量用二十八人以備禮郊社令一人檢校太常少卿一人帥庶人赴耕所太常博士六人分贊導耕禮如本司官不足準舊例本司具名上中書門下請差攝行事司農少卿一人檢校庶人終千畝廪犧令二人一人奉耒耜授司農卿係差五品六品清資官攝充一人掌耒耜太常寺用本官三公九卿諸侯耕牛四十頭內十頭副每頭隨牛人一人須明間農耕者差庶人耒耜二十具畚二具鍤二具以木為刃府司差一人専知管藉田縣令一人具朝服當耕藉田時立於田畔候耕畢去畿甸諸縣令準舊例集先期到城藉田日服常服赴耕所陪位而立耆老量定二十人並常服藉田日於庶人耕藉田位之南陪位唐書肅宗本紀乾元二年正月戊寅耕藉田舊唐書禮儀志肅宗乾元三年春正月丁丑將有事於九宫之神兼行藉田禮自明鳯門出至通化門釋軷而入壇行宿齋於宫戊寅禮畢將耕藉先至於先農之壇因閲耒耜有雕刻文飾謂左右曰田器農人執之在於朴素豈文飾乎乃命徹之下詔曰古之帝王臨御天下莫不務農敦本保儉為先蓋用勤身率下也屬東耕啓候爰事典章况紺轅縹軏固前王有制崇奢尚靡諒為政所疵靖言思之良用歎息豈朕法堯舜重茅茨之意耶其所造雕飾者宜停仍令有司依農用常式即别改造庶萬方黎庶知朕意焉翌日己卯致祭神農氏以后稷配享肅宗冕而朱紘躬秉耒耜而九推焉禮官奏陛下合三推今過禮肅宗曰朕以身率下自當過之恨不能終於千畝耳既而佇立久之觀公卿諸侯王公以下耕畢唐書禮樂志憲宗元和五年詔以來歲正月藉田太常修撰韋公肅言藉田禮廢久矣有司無可考乃據禮經參采開元乾元故事為先農壇於藉田皇帝夾侍二人正衣二人侍中一人奉耒耜中書令一人禮部尚書一人侍從司農卿一人授耒耜於侍中太僕卿一人執牛左右衛將軍各一人侍衛三公以宰相攝九卿以左右僕射尚書御史大夫攝三諸侯以正員一品官及嗣王攝推數一用古制禮儀使一人太常卿一人贊禮三公九卿諸侯執牛三十人用六品以下官皆服袴褶御耒耜二併韜皆以青其制度取合農用不雕飾畢日收之藉耒耜丈席二先農壇高五尺廣五丈四出陛其色青三公九卿諸侯耒十有五御耒之牛四其二副也併牛衣每牛各一人絳衣介幘取間農務者禮司以人贊導之執耒持耜以髙品中官二人不袴褶皇帝詣望耕位通事舍人分導文武就耕所太常帥其屬用庶人二十八以郊社令一人押之太常少卿一人率庶人趍耕所博士六人分贊耕禮司農少卿一人督視庶人終千畝廪犧令二人一人奉耒耜授司農卿以五品六品清官攝一人掌耒耜太常寺用本官三公九卿諸侯耕牛四十其十副也牛各一人庶人耕牛四十各二牛一人庶人耒耜二十具鍤二具木為刃主藉田縣令一人具朝服當耕時立田側畢乃退畿甸諸縣令先期集以常服陪耕所耆艾二十人陪於庶人耕位南三公從者各三人九卿諸侯從者各一人以助耕皆絳服介幘用其本司𨽻是時雖草具其儀如此以水旱用兵而止王海隋書藉田令以青箱穜稑之種跪陳司農詣耕所灑之唐不行此禮右漢至唐親耕享先農五禮通考卷一百二十四
