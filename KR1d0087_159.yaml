賓降二等受逺遊冠一品以下進賢冠庶人黑介幘左執項右執前詣皇子筵前北面跪冠一品以下詣冠者筵前東向立祝曰吉月令辰乃申爾服敬爾威儀淑慎爾徳眉夀萬年永受斯福乃跪冠興復位賓之贊冠者坐設簪結纓興復位皇子興賓揖皇子適房賓主俱坐皇子著朝服一品以下庶子著絳紗服庶人則白裙襦服出房戸西南面立賓主俱興賓揖皇子進立席後南面賓詣酒罇所一品至三品嫡子冠禮無賓詣酒罇所以下執饌者徹薦爵立俟取爵酌酒進皇子筵前北面立祝曰㫖酒既湑嘉薦伊脯乃申其服庶子云爾服禮儀有序祭此嘉爵承天之祜皇子筵西拜受爵賓復西階上東面答拜執饌者薦籩豆皇子升筵末坐啐酒執爵興筵西跪奠爵再拜執爵興賓答拜皇子升筵坐奠爵於薦東興立於筵西南面執饌者徹薦賓揖皇子進升席南面坐賓之贊冠者跪脱逺遊冠庶人脱黑介幘置於箱櫛畢設纚興復位賓降三等受冕六品以下爵弁庶人則黑介幘左執項右執前詣皇子筵前北面跪冠興復位賓之贊冠者坐設簪結纓興復位皇子興賓揖皇子適房賓主俱坐主人贊冠者徹櫛箱入房皇子著衮冕之服庶子及六品以下爵弁服庶人絳公服出房戸西南面立賔主俱興賓揖皇子進立於席後南面賓詣酒罇所取爵酌酒進皇子筵前北面立祝曰㫖酒令芳籩豆有楚咸嘉其服庶子云爾服肴升折俎承天之慶福夀無疆皇子筵西拜受爵賓復位東面答拜三品以上賓之贊冠者跪設簪結纓興復位冠者興賓揖冠者適房賓主俱坐冠者著絳紗服庶人白裙襦服出房户西南面賓主俱興賓揖冠者進升席西向坐賓之贊冠者跪脱進賢冠庶人黒介幘置於櫛箱畢設纚興復位賓降三等受冕六品受爵弁庶人黒介幘右執項左執前進冠者筵前東向立祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黄耉無疆受天之慶乃跪興復位賓之贊冠者設簪結纓興復位冠者興賓揖冠者適房賓主俱坐主人贊冠者徹纚櫛簪箱及筵入於房又筵於室戸西南向冠者著冕服六品以下爵弁服庶人絳公服出戸西南面賓主俱興主人贊冠者盥手洗觶於房酌醴加柶覆之面葉出房南面立賓揖冠者就筵西面立賓進受醴於室戸東加柶面柄進冠者筵前北面立祝曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休夀考不㤀冠者筵西拜受觶賓復西階上東面答拜一品以下庶子與親王儀同執饌者薦籩豆設俎於籩豆之南皇子升筵坐左執爵一品以下用觶下倣此右祭脯醢贊冠者取胏一以授皇子奠爵於薦西興受郄左手執本坐右絶末祭上左手嚌之興加於俎皇子帨手執爵祭酒興筵末坐啐酒興降筵西南面坐奠爵再拜執爵興賓答拜皇子升筵坐奠爵於薦東興贊冠者引皇子降立於西階之南東面初皇子降賓自西階直西序東面立主人降自阼階直東序西面立賓少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉君子攸宜宜之於嘏永受保之曰孟某甫仲叔季惟其所當皇子曰某雖不敏夙夜祗奉賓出主人送於内門之外一品以下賓答拜賓主俱坐冠者升筵跪觶奠於薦東興進北面跪取脯降自西階入見母進奠脯於薦前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賓主俱興賓降當西席東向立主人東序西向立冠者既見母出立於西階之東南向賓少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰字某冠者曰某雖不敏夙夜祗奉賓出送於内門外一品以下庶子取脯見母如嫡子餘如親王主人西面請賓曰公辱執事請禮從者賓曰某既得將事敢辭主人曰敢固以請賓曰某辭不得命敢不從賓就次主人入初賓出皇子東面見諸親拜之皇子答拜一品以下及冠者西南拜賓之贊冠者答拜庶子同皇子入見内外諸尊於别所賓主既釋服改設席訖賓贊俱出次立於門西東面主人出門東西面主人揖賓賓報揖主人先入賓贊從之至階一揖一讓升各就座後立定俱升座㑹就賓主俱興賓立於西階上贊冠者在北少退俱東階主人立於東階上西面一品以下及衆賓降立於西階下東面庶子同掌事者受束帛之篚升授主人於東序端主人執篚少進西面立又掌事者奉幣篚升立於主人後於幣篚升牽馬者牽兩馬入陳於内門三分庭一在南北首西上北面賓還西階上北面贊冠者立於左少退俱北面再拜主人進立於楹間南面賓贊進立於主人之右俱南面東上主人授幣篚賓受之退復東面位於主人授幣篚掌事者又以幣篚授贊冠者退復位主人還阼階上北面拜送賓贊降自西階從者訝受幣賓當庭賓東面揖牽馬者從出訝受馬於門外賓降主人降送於大門外之東西面再拜賓退主人入四品以下於衆賓降並立於西階下掌事者以幣篚升授主人於序端賓北面再拜主人進立於楹間南面賓進立於主人之右俱南面賓受幣退復東面位主人還阼階北面再拜送賓降自西階從者拜受幣賓出主人送賓於大門外之東西面再拜賔退主人入庶子同親王儀孤子則諸父諸兄戒賓冠之日主人髻而迎賓拜揖讓如冠主冠於阼醴之庶子醴之及禮賓拜送皆如上儀明日見廟者冠者朝服無廟者見祖禰於寢質明贊禮者引入廟南門中庭道西北賓贊再拜訖引出六品以下見祖禰於正寢冠者公服庶人常服質明張几筵於正寢贊禮者引入至庭北面再拜訖引出五品以上子孫九品以上子冠假用出身品服其三品以上大功以上親冠同八品九品之服皇子詣闕至次著朝服通事舍人引皇子入詣皇帝所御之殿至闕閤近臣奏皇帝即御座南向坐近臣引皇子入立於階間北面再拜訖近臣引皇子至皇后殿閤外近臣附奏皇后即御座南向坐司言至閤引皇子入立於階間北面再拜司言引出閤皇子出還第如來儀明集禮親王即周之同姓諸侯漢之諸侯王也漢室冠諸侯遣使行事魏氏冠諸王三加禮晉議冠南宮王不復加使命冠汝南王復用漢遣使之儀劉宋冠蕃王齊冠南郡王止一加唐制親王冠於㕔事主人行禮天子不自為主止稱賓贊無臨軒遣命之文三加三醮並同於士也右隋唐五禮通考卷一百四十九
