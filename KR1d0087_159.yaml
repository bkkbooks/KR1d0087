body:
  text: 五禮通考卷一百四十九刑部尚書秦蕙田撰嘉禮二十二冠禮史記始皇本紀始皇九年四月己酉王冠帶劍漢書惠帝本紀四年三月甲子皇帝冠赦天下蕙田案此皇帝冠肆赦之始通典漢改皇帝冠為加元服惠帝加元服用正月甲子若丙子為吉蕙田案甲子丙子用剛日也亦桑弧蓬矢之意景帝本紀景帝後三年正月皇太子冠賜民為父後者爵一級三輔黄圖博望苑武帝立子據為太子為太子開博望苑漢書曰武帝年二十九乃得太子甚喜太子冠為立博望苑使之通賓客從其所好蕙田案太子年甫冠即通賓客從其所好失豫教之道矣昭帝本紀元鳳四年帝加元服見於髙廟賜諸侯王丞相大將軍列侯宗室下至吏民金帛牛酒各有差賜中二千石以下及天下民爵毋收四年五年口賦三年以前逋更賦未入者皆勿收蕙田案冠而見廟始見於此續漢書禮儀志注博物記曰孝昭帝冠辭曰陛下摛顯先帝之光耀以承皇天之嘉禄欽奉仲春之吉辰普尊大道之邦域秉率百福之休靈始加昭明之元服推逺冲孺之幼志藴積文武之就徳肅勤髙祖之清廟六合之内靡不蒙徳永永與天無極蕙田案此别製冠詞之始時用仲春不用正月葢不拘於時矣宣帝本紀五鳳元年皇太子冠皇太后賜丞相將軍列侯中二千石帛人百匹大夫人八十匹又賜列侯嗣子爵五大夫男子為父後者爵一級元帝本紀竟寧元年皇太子冠賜列侯嗣子爵五大夫天下為父後者爵一級漢書匡衡傳衡上疏曰臣聞室家之道修則天下理得故詩始國風禮本冠昏適子冠乎阼禮之用醴衆子不得與列所以貴正體而明嫌疑也非虚加其禮文而已乃中心與之殊異故禮探其情而見之外也哀帝本紀孝哀皇帝元帝庶孫定陶恭王子也年三嵗嗣立為王元延四年入朝盡從傅相中尉上以問定陶王對曰令諸侯王朝得從其國二千石上令誦詩通習能說成帝由此賢定陶王數稱其材為加元服而遣之時年十七矣平帝本紀元始五年冬十二月丙午崩有司議曰禮臣不殤君皇帝年十有四嵗宜以禮歛加元服奏可司馬彪漢儀志漢制正月甲子若丙子為吉日可加元服儀從冠禮乗輿初加緇布進賢次爵弁次通天冠訖皆於髙廟如儀謁見蕙田案漢禮用四加續漢書加元服乗輿皆於髙祖廟謁見案世祖廟始冠緇布冠於宗廟從古制漢書王莽傳莽令天下冠以戊子為元日婚以戊寅之旬為忌日百姓多不從者後漢書和帝本紀永元三年皇帝加元服賜諸侯王公將軍特進中二千石列侯宗室子孫在京師奉朝請者黄金將大夫郎吏從官帛賜民爵及粟帛各有差大酺五日郡國中都官繫囚死罪贖縑至司冦作及亡命各有差庚辰賜京師民酺布兩戸共一匹通典黄香太子冠頌惟永元之盛代仰皇徳之茂純躬烝烝之至孝崇敬順以奉天以三載之孟春建寅月之上旬皇帝將加𤣥冕簡甲子之元辰厥日正於太皞厥時叶於百神皇輿幸夫金根駕元虯之連蜷建螭龍以為旂鳴節路之和鸞既臻廟以成禮乃逥軫而反宮正朝服以享宴撞太簇之庭鐘祚蕃屏與鼎輔暨夷蠻之君王咸進酒於金罍獻萬年之玉觴蔡邕上始加元服與羣臣上夀表伏惟陛下應天淑靈丁期中興誕及幼齡聖姿碩異威儀孔備俯仰龍光顔如日星言稽典謨動蹈規矩緝熙光明思齊周成早智夙就參美顯宗令月吉日始加元服進御幘結以章天休臣妾萬國遐邇大小同喜逸豫式歌且舞臣等不勝踴躍鳬藻謹奉生頭酒九鍾稽首再拜上千萬夀陛下享兹吉福永守皇極通遵太和靖綏六合宜民宜人受禄於天書曰一人有慶兆民賴之其寧惟永詩曰顒顒卬卬如圭如璋令聞不忘萬夀無疆後漢書周防傳防年十六仕郡小吏世祖巡狩汝南召掾史試經防能誦讀拜為守丞防以未冠謁去下邳惠王衍傳衍有容貌肅宗即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差馬防傳防為衛尉子鉅為常從小侯六年正月以鉅當冠特拜為黄門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之蕙田案皇帝臨冠廷臣止此後漢書安帝本紀永初三年皇帝加元服大赦賜王主貴人公卿以下金帛各有差男子為父後及三老孝悌力田爵人二級流民欲占者人一級順帝本紀永建四年正月丙子帝加元服賜王主貴人公卿以下金帛各有差賜男子爵及流民欲占者人一級為父後三老孝悌力田人二級鰥寡孤獨篤癃貧不能自存者人帛一匹晉書禮志周禮雖有服冕之數而無天子冠文儀禮云公侯之有冠禮夏之末造也王鄭皆以為夏末上下相亂簒弑由生故作公侯冠禮則明無天子冠禮之審也大夫又無冠禮古者五十而後爵何大夫冠禮之有周人年五十而有賢才則試以大夫之事猶行士禮也故筮日筮賓冠於阼以著代醮於客位三加彌尊皆士禮耳然漢代以來天子諸侯頗採其儀正月甲子若丙子為吉日可加元服儀從冠禮是也漢順帝冠又兼用曹褒新禮乗輿初加緇布進賢次爵弁武弁次通天皆於髙廟以禮謁見世祖廟王公以下初加進賢而已案此文始冠緇布從古制也冠於宗廟是也蕙田案據晉志曹褒新禮皇帝冠於髙廟惟皇帝四加初用緇布冠王公以下三加初加進賢冠則不用緇布冠也桓帝本紀建和二年皇帝加元服大赦天下賜河間渤海二王黄金各百斤彭城諸國王各五十斤公主大將軍三公特進侯中二千石二千石將大夫郎吏從官四姓及梁鄧小侯諸大夫以下帛各有差年八十以上賜米酒肉九十以上加帛二匹綿三斤靈帝本紀建寧四年帝加元服大赦天下賜公卿以下各有差惟黨人不赦禮儀志注獻帝傳興平元年帝加元服司徒淳于嘉為賓加賜元纁駟馬貴人公主卿司𨽻城門五校及侍中尚書給事黄門侍郎各一人為太子舍人蕙田案加元服用賓見此禮儀志注獻帝起居注曰建安十八年正月濟北王加冠戸外以見父母給事黄門侍郎劉瞻兼侍中假貂蟬加濟北王給之通典後漢何休冠儀約制將冠子者具衣冠冠者父兄若諸父宗族之尊者一人為主主人告所素敬僚友一人為冠賓必自告其家告曰某之子某若弟某長矣將加冠於首願吾子教之賓既許主人自定吉日先冠一日宿告賓曰請以明日行事賓曰敢不從命主人灑掃内外皆肅執事者於兩楹間為冠者設北享筵又設賓東享筵兩筵相接授冠以篋器設於兩筵又設尊爵於東方冠者如常服待命於房夙興賓到迎延揖讓如常坐定執事自請行事主人跪告曰請勞吾子賓跪答曰敬諾賓起立西序東面聴命之禮畢冠者興西向拜賓賓答拜訖命就筵賓主各還坐冠者北享筵坐伏賓跪曰吾子之使請將命主人跪答曰勞吾子賓起就東享筵執事者執爵跪向冠者祝曰令月吉日始加元服棄爾幼志順爾成徳夀考惟祺介爾景福冠者即坐賓跪加冠訖冠者執爵酹地然後啐酒訖賓興復還本坐主人亦起乃俱坐冠者還房自整飾出拜父父為起若諸父羣從及兄應答拜者答拜如常入拜母母答拜其餘兄弟姑姊妹皆相拜如常主人命冠者出更設酬為勸乃罷異日有祭事自告祖考者自如舊祭禮常儀蕙田案此漢時士庶冠禮大概仿彿儀禮添出拜父一節右秦漢三國魏志齊王本紀正始四年帝加元服賜羣臣各有差晉書禮志魏天子冠一加其說曰士禮三加加有成也至於天子諸侯無加數之文者將以踐阼臨下尊極徳備豈得與士同也魏氏太子再加皇子王公世子乃三加孫毓以為一加再加皆非也又舊禮皆冠於廟自魏以來始於正殿行事别卜日謁廟侯太尉奠獻九室以下帝衮服執鎮圭入再拜乃出㑹羣臣通典其說曰古之士禮服必三加彌尊所以喻其志至於天子諸侯數無文將以踐阼臨人尊極徳成不復與士以加喻勉為義禮冠於廟自魏不復在廟矣蕙田案據此自魏以前天子加元服猶用古禮至是始分一加二加三加之别又改為正殿行事非禮也晉書武帝本紀武帝泰始七年皇太子冠賜王公以下帛各有差禮志惠帝之為太子將冠武帝臨軒使兼司徒髙陽王珪加冠兼光禄大夫屯騎校尉華廙贊冠蕙田案臨軒行事從魏制也泰始十年南宫王承年十五依舊應冠有司奏議禮十五成童國君十五而生子以明可冠之宜又漢魏遣使冠諸王非古典於是制王十五而冠不復加使命王彪之云禮傳冠皆在廟案武帝既加元服車駕出拜於太廟以告成也蓋亦猶擬在廟之儀禮醮辭曰令月吉日以嵗之正以月之令案魯襄公冠以冬漢惠帝冠以二月明無定月而後漢以來帝加元服咸以正月及咸寧二年秋閏九月遣使冠汝南王柬此則必非嵗首惠帝本紀惠帝永平元年皇太子冠見於太廟禮志冠禮於廟然武惠冠太子太子皆即廟見斯亦擬在廟之儀也通典晉王堪冠禮儀永平元年正月戊子冠中外四孫立於步廣里舍之阼階設一席於東廟引冠者以長幼次於席南東上賓宗人立於西廂東面南上堪立於東軒西南面西上陳元服於席上宗人執儀以次呼冠者各應曰諾宗人申誡之曰以嵗之正以月之令兄弟具來咸加爾服棄爾幼志順爾成徳敬慎威儀惟人之則夀考惟祺永受景福冠者皆跪而冠各自著布興再拜從立於賓南上酌四杯酒各拜醮而飲事訖上堂向御史府君再拜訖冠者皆東面坐如常燕禮蕙田案此晉士大夫冠禮成帝本紀咸康元年春正月庚午朔帝加元服大赦改元増文武位一等大酺三日賜鰥寡孤獨不能自存者米人五斛禮志江左諸帝將冠金石宿設百僚陪位又豫於殿上鋪大牀御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕將加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉夀惟祺介兹景福加冕訖侍中繫𤣥紘侍中脱帝絳紗服加衮服冕冠事畢太保率羣臣奉觴上夀王公以下三稱萬嵗乃退華恒傳恒領太常及帝加元服㓂難之後典籍靡遺冠禮無所依據恒推尋舊典撰定禮儀事並施用蕙田案冠用金石之樂見此孫毓五禮駁魏氏天子一加三加嫌同諸侯毓案玉藻記曰元冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也其說謂皆始冠則是有次加之辭此二冠皆卑服質古勢不一加必重加朝祭之服以崇彌尊聖人制禮所以一時歴加衆服者今始成人卜擇令日而徧加之所以重始也若冠日有不加者後必不擇吉而服非重始也又禮器有以少為貴者冠不在焉記有彌尊喻志之言葢以服從卑始象德日新不可先服尊服轉而即卑今嫌士禮喻志之文因從魏氏一加之制考之玉藻似非古典今三加者先冠皮弁次冠長冠後冠進賢冠以為彌尊於意又疑裴頠答治禮問天子禮元冠者形之成也為君未必成人故君位雖定不可孩抱而服冕弁摰虞以為天子即位之日即為成君冕服以備不宜有加諸侯即位為成豈不定諸侯成君不拘盛典而可以冠天子成君獨有火龍黼衣便不可乎意為宜冠有加蕙田案魏氏一加非禮也孫毓等議是穆宗本紀升平元年正月帝加元服告於太廟始親萬幾大赦改元増文武位一等禮志穆帝孝武將冠皆先以幣告廟訖又廟見也通典臺符問修復未畢吉凶不相干可加元服與不太常王彪之議禮有喪冠當是應冠之年服制未終若須服終便失應冠之年故也禮所以冠無定時月春夏不可便用秋冬若今嵗内修復未畢入新年卜仲春之日加元服不失年不失禮今便凖喪冠闕享樂而行事誠有依傍然加衮冕火龍焕然以凖喪儀情有不體若别有事必速加元服權諸輕重不須修復畢者便當凖喪冠耳又議新年至尊當加元服今若依成帝故事用三元日者冠有金石之樂恐修山陵未畢於樂便闕禮冠自卜日又云夏葛屨冬皮屨無定時不必三元也案晉故事及兩漢皆非三元當任時事之宜耳又議近訪得成皇帝加元服儀注闕無拜廟事案禮冠皆於廟儀禮云既畢賓出主人送於廟門明必在廟近代以來不復在廟成皇帝既加元服拜太廟以告成葢亦猶擬在廟之儀今既加元服亦應拜廟蕙田案王彪之議頗得漢魏之詳所稱冠無定時日必在廟尤合禮意孝武帝本紀太元元年帝加元服見於太廟康獻禇皇后傳穆帝既冠太后詔曰昔遭不造帝在幼沖皇緒之㣲𦕈若贅旒百辟卿士率遵前朝勸喻攝政以社稷之重先代成義僶俛敬從弗遑固守仰憑七廟之靈俯仗羣后之力帝加元服禮成徳備當陽親覽臨御萬國今歸事反政一依舊典於是居崇徳宫簡文帝即位尊后為崇徳太后及帝崩孝武帝幼沖太后復臨朝帝既冠乃詔曰皇帝昏冠禮備遐邇宅心宜當陽親覽緝熙維始今歸政事率由舊典於是復稱崇徳太后安帝本紀隆安元年帝加元服増文武位一等晉書輿服志緇布冠蔡邕云即委貌冠也太古冠布齊則緇之緇布冠始冠之冠也其制有四形一似武冠又一似進賢其一上方其下加幘顔其一刺上而方下進賢冠古緇布遺象也斯葢文儒者之服前髙七寸後髙三寸長八寸有五梁三梁二梁一梁人主元服始加緇布則冠五梁進賢三公及封郡公縣公郡侯縣侯鄉亭侯則冠三梁卿大夫八座尚書關中内侯二千石及千石以上則冠兩梁中書郎秘書丞郎著作郎尚書丞郎太子洗馬舍人六百石以下至於令史門郎小吏並冠一梁漢建初中太官令冠兩梁親省御膳為重也博士兩梁崇儒也宗室劉氏亦得兩梁冠示加服也蕙田案此以進賢冠為緇布冠遺象故晉王公以下初加進賢冠惟天子用古制始加緇布也進賢冠又以梁之多少分貴賤宋書文帝本紀元嘉十六年十二月乙亥皇太子冠大赦天下孝武帝本紀孝武帝大明七年冬十月壬寅太子冠賜王公以下帛有差宋謝莊太子元服上至尊表伏惟皇太子殿下明兩承乾元良作貳抗法迂身英華自逺樂以修中禮以治外三美克懋徳成教尊令日昭辰顯加元服對靈祗之望儔上庠之歡率天罄世莫不載躍上太后表離景承宸樞光陪極毓問東華飛英上序樂正歌風司成頌徳清明神鏡温文在躬練日簡辰顯被元服懋三王之教爥少陽之重後廢帝本紀元徽二年御加元服大赦賜民男子爵一級為父後及三老孝悌力田者爵二級鰥寡孤獨篤癃不能自存者穀五斛年八十以上加帛一匹大酺五日賜王公以下各有差南齊書鬱林王本紀鬱林王昭業文惠太子長子封南郡王永明五年冠於東宫崇政殿其日小㑹賜王公以下帛各有差禮志永明五年十月有司奏南郡王昭業冠求儀注未有前凖尚書令王儉議皇孫冠事歴代所無禮雖有嫡子嫡孫然而地居正體下及五世今南郡王體自儲暉實惟國裔元服之典宜異列蕃案士冠禮主人元冠朝服賓加其冠贊者結纓鄭元云主人冠者之父兄也尋其言父及兄則明祖在不為主也大戴禮記公冠篇云公冠自為主四加𤣥冕以卿為賓此則繼體之君及帝之庶子不得稱子者也小戴禮記冠義云嫡子冠於阼以著代也醮於賓位三加彌尊加有成也注稱嫡子冠於阼庶子冠於房記又云古者重冠故行之於廟所以自卑而尊先祖也據此而言彌與鄭注儀禮相㑹是故中朝以來太子冠則皇帝臨軒司徒加冠光禄贊冠諸王則郎中加冠中尉贊冠今同於儲皇則重依於諸王則輕又春秋之義不以父命辭王父命禮父在斯為子君在斯為臣皇太子居臣子之節無專用之道南郡雖處蕃國非支庶之列宜稟天朝之命㣲申冠阼之禮晉武帝詔稱漢魏遣使冠諸王非古正典此葢謂庶子封王合依公冠自主之義至於國之長孫遣使為允宜使太常持節加冠大鴻臚為贊醮酒之儀亦歸二卿祝醮之辭附凖經記别更撰立不依蕃國常體國官陪位拜賀自依舊章其日内外二品清官以上詣公車門集賀并詣東宫南門通牋别日上禮宮臣亦詣門稱賀如上臺之儀既冠之後尅日謁廟以宏尊祖之義此既大典宜通關八座丞郎并下二學詳議僕射王奐等十四人議並同并撰立贊冠醮酒二辭詔可祝辭曰皇帝使給事中太常武安侯蕭惠基加南郡王冠祝曰筮日筮賓肇加元服棄爾幼志從厥成徳親賢使能克隆景福醮酒辭曰㫖酒既清嘉薦既盈兄弟具在淑慎儀型永屆眉夀於穆斯寧蕙田案此天子嫡孫冠禮王儉等議是也集賀上禮見此明帝本紀建武三年皇太子冠賜王公以下帛各有差為父後者賜爵一級斷逺近上禮禮志明帝永泰元年徐孝嗣議曰案士冠禮三加畢乃醴冠者醴則惟一而已故醴辭無二若不醴則毎加輒醮以酒故醮辭有三王肅云醴本上古其禮重酒用時味其禮輕故也或醴或醮二三之義詳記於經文今皇王冠畢一酌而已即可擬古設醴而猶用醮辭實為乖衷謂自今王侯以下冠畢一酌醴以遵古之義醴即用舊文於事為允蕙田案用醴一酌徐議是梁書武帝本紀天監十四年正月皇太子冠赦天下賜為父後者爵一級王公以下頒賚各有差停逺近上慶禮蕙田案通典政和禮儀俱作十三年與本紀不同梁蕭子範冠子箴是月惟令敬擇良辰式遵士典誥筮於賓嘉字爰錫醮酒方陳禮莊爾質徳成爾身永變童心長移悼齒朱錦辭髪青絇在履丹石為操氷泉厲已務簡朋匹田蘓遊止在我尚謙推物盡美面諂退言弗納於耳直弦矢辭斯為良士沈約冠子祝文蠲兹令日元服肇加成徳既舉童心自化行之則至無謂道賒敦以秋實食以春華無恥下問乃至髙車子孫千億廣樹厥家阮孝緒傳孝緒字士宗陳留尉氏人也年十三徧通五經十五冠而見其父彦之戒曰三加彌尊人倫之始宜思自朂以庇爾躬答曰願迹松子於瀛海追許由於穹谷庶保促生以免塵累自是屏居一室非定省未嘗出戸家人莫見其面親友因呼為居士陳書文帝本紀天嘉六年春皇太子加元服王公以下賜帛各有差孝悌力田為父後者賜爵一級鰥寡孤獨不能自存者穀人五斛後主本紀至徳二年秋七月太子加元服在位文武賜帛各有差孝悌力田為父後者各賜一級鰥寡癃老不能自存者人穀五斛北魏書髙祖本紀高祖太和十九年皇太子冠於廟禮志太和十九年五月甲午冠皇太子恂於廟丙申高祖臨光極堂太子入見帝親詔之事在恂傳六月高祖臨光極堂引見羣官詔曰比冠子恂禮有所闕當思往失更順將來禮古今殊制三代異章近冠恂之禮有三失一朕與諸儒同誤二諸儒違朕故令有三誤今中原兆建百禮維新而有此三失殊以愧歎春秋襄公將至衛以同姓之國問其年幾而行冠禮古者皆灌地降神或有作樂以迎神昨失作樂至廟庭朕以意而行拜禮雖不得降神於理猶差完司馬彪云漢帝有四冠一緇布二進賢三武弁四通天冠朕見家語冠頌篇四加冠公也家語雖非正經孔子之言與經何異諸儒忽司馬彪四冠之志致使天子之子而行士冠禮此朝廷之失冠禮朕以為有賓諸儒皆以為無賓朕既從之復令有失孔所云斐然成章其斯之謂太子太傅穆亮等拜謝髙祖曰昔裴頠作冠儀不知有四裴頠尚不知卿等復何愧廢太子恂傳太和十七年七月癸丑立恂為皇太子及冠恂於廟高祖臨光極東堂引恂入見誡以冠義曰夫冠禮表之百代所以正容體齊顔色順辭令容體正顔色齊辭令順故能正君臣親父子和長幼然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾㫖蕙田案此用冠於廟之禮從古也所謂三失不作樂一也不用四加二也不用賓三也親臨告誡不傳制尤為重禮肅宗本紀正光元年秋帝加元服内外百官進位一等禮志肅宗加元服時年十一既冠拜太廟大赦改元官有其注劉芳傳王肅之來奔也髙祖雅相器重朝野屬目芳未及相見高祖宴羣臣於華林肅語次云古者惟婦人有笄男子則無芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭喪男子免時則婦人髽男子冠時則婦人笄言俱時變而男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮内則稱子事父母雞初鳴櫛纚笄總以兹而言男子有笄明矣高祖稱善者乆之肅亦以芳言為然曰此非劉石經耶北齊書後主本紀天統三年二月帝加元服大赦九州職人各進四級内外百官普進二級隋書禮儀志後齊皇帝加元服以玉帛告圜丘方澤以幣告廟擇日臨軒中嚴羣官位定皇帝著空頂介幘以出太尉盥訖升脱空頂幘以黑介幘奉加訖太尉進太保之右北面讀祝訖太保加冕侍中繫𤣥紘脱絳紗袍加衮服事畢太保上夀羣官三稱萬嵗皇帝入温室移御座而不上夀後日文武羣官朝服上禮酒十二鍾米十二囊牛十二頭又擇日親拜圜丘方澤謁廟皇太子冠則太尉以制幣告七廟擇日臨軒有司供帳於崇正殿中嚴皇太子空頂幘公服出立東階之南西面使者入立西階之南東面皇太子受詔訖入室盥櫛出南面使者進揖詣冠席西面坐光禄卿盥訖詣太子前梳櫛使者又盥奉進賢三梁冠至太子前東面祝脱空頂幘加冠太子興入室更衣出又南面就席光禄卿盥櫛使者又盥祝脱三梁冠加逺遊冠太子又入室更衣設席中楹之西使者揖就席南面光禄卿洗爵酌醴使者詣席前北面祝太子拜受醴即席坐祭之啐之奠爵降階復本位西面三師三少及在位羣臣拜事訖又擇日㑹宫臣又擇日謁廟五禮新儀至設㑹因奉觴上夀禮各有宜也辭云某臣某言伏惟皇帝陛下吉辰元服禮制樂和臣等不勝大慶謹上萬嵗夀也蕙田案齊制太子初加黑介幘次加冕皇太子初加進賢次加逺遊冠止似二加未詳其義北周書宣帝本紀宣帝髙祖長子也建徳元年髙祖親告廟冠於阼階立為皇太子蕙田案親告廟而冠於阼階是在廟也右三國南北朝隋書禮儀志隋皇太子將冠前一日皇帝齋於大興殿皇太子與賓贊及預從官齋於正寢其日質明有司告廟各設筵於阼階皇帝衮冕即御座賓揖皇太子進升筵西向坐贊冠者坐櫛設纚賓盥訖進加緇布冠贊冠進設頍纓賓揖皇太子適東序衣𤣥衣素裳以出贊冠者又坐櫛賓進加逺遊冠改服訖賓又受冕太子適東序改服以出賓揖皇太子南面立賓進受醴進筵前北面立祝皇太子拜受觶賓復位東面答拜贊冠者奉饌於筵前皇太子祭奠禮畢降筵進當御東面拜納言承詔詣太子戒訖太子拜贊冠者引太子降自西階賓少進字之贊冠者引皇太子進立於庭東面諸卿拜訖贊冠者拜太子皆答拜與賓贊俱復位納言承詔降命令有司致禮賓贊又拜皇帝降復阼階拜皇太子以下皆拜皇帝出更衣還宫皇太子從至闕因入見皇后拜而還蕙田案初加緇布次加逺遊次加冕三加也唐書太宗本紀貞觀八年皇太子加元服降死罪以下賜五品以上子為父後者爵一級民酺三日通典貞觀五年有司上言皇太子將冠禮宜用二月為吉請追兵以備儀注太宗曰今東作方興恐妨農事令改用十月太子少保蕭瑀奏稱准隂陽家用二月為勝上曰隂陽拘忌朕所不行若動静必依隂陽不顧禮義欲求福祐其可得乎若所行皆遵正道自然當為吉㑹且吉凶在人豈假隂陽拘忌農事甚要不可暫失原本追兵闕疑一本作遣官髙宗本紀永徽六年皇太子加元服降死罪以下賜酺三日五品以上為父後者勲一轉顯慶四年十月皇太子加元服大赦賜五品以上子孫為祖父後者勲一轉民酺三日唐㑹要開元六年侍中宋璟上表曰臣伏以太常狀以皇太子冠准東宫典記有上禮之儀謹案上禮非古從南齊後魏始有此事而垂拱神龍更扇其道羣臣歛錢獻食君上厚賜答之姑