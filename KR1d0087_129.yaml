body:
  text: 五禮通考卷第一百十九刑部尚書秦蕙田撰吉禮一百十九祭先聖先師遼史太祖本紀神册三年夏五月乙亥詔建孔子廟宗室義宗傳義宗名倍太祖長子神册元年立為皇太子時太祖問侍臣曰受命之君當事天敬神有大功德者朕欲祀之何先皆以佛對太祖曰佛非中國教倍曰孔子大聖萬世所尊宜先太祖大悅即建孔子廟詔皇太子春秋釋奠太祖本紀神册四年秋八月丁酉謁孔子廟王氏圻曰史稱遼之義宗可謂盛矣其始慕太伯之賢而為讓國之謀終疾陳恆之惡而為請討之舉李從珂弒主倍請討之志趣之卓蓋已見於早嵗先祀孔子之言終遼之世賢聖繼統皆其子孫至德之報昭然矣道宗本紀清寧六年六月丙寅中京置國子監命以時祭先聖先師右遼金史熙宗紀皇統元年二月戊午上親祭孔子廟北靣再拜退謂侍臣曰朕幼年遊佚不知志學嵗月逾邁深以為悔孔子雖無位其道可尊使萬世景仰大凡為善不可不勉自是頗讀尚書論語及五代遼史諸書或以夜繼焉王氏圻曰案金時即有遼史惜其本逸不傳薛居正舊五代史今亦無其書矣王圻續通考世宗大定十四年以顔歆從祀廟廷金史禮志大定十四年國子監言春秋仲月上丁日釋奠於文宣王本監造茶食等物以大小楪排設用留守司樂以樂工為禮生率倉場等官陪禮於古禮未合也况京師為首善之地四方之所觀仰據釋奠器物行禮次序合行詳定夫兖國公親承教者也鄒國公功扶聖教者也當於宣聖像左右列之今孟子以燕服在後堂宣聖像側還虗一位禮宜遷孟子像於宣聖右與顔子相對改塑冠冕粧飾法服一遵舊制禮官參酌唐開元禮定擬釋奠儀數文宣王兖國公鄒國公每位籩豆各十犧尊一象尊一簠簋各二爼二祝版各一皆設案七十二賢二十一先儒每位各籩一豆一爵一兩廡各設象尊二總用籩豆各二百二十三簠簋各六爼六犧尊三象尊七爵九十四其樽皆有坫罍二洗二篚勺各二冪六正位并從祀籍尊罍爼豆席約用三十幅尊席用葦爼豆席用莞牲用羊豕各三酒二十瓶禮行三獻以祭酒司業博士充分獻官二讀祝官一太官令一捧祝官二罍洗官一爵洗官一巾篚官二禮直官十一學生以儒服陪位樂用登歌大樂令一員本署官充樂工三十九人迎神三奏姑洗宫來寧之曲上都隆化廟堂作新神之來格威儀具陳穆穆凝旒巍然聖真斯文伊始羣方所視初獻盥洗姑洗宫靜寧之曲偉矣素王風猷至粹垂二千年斯文不墜涓辰維良爰修祀事沃盥于庭嚴禋禮備升階南吕宫肅寧之曲巍乎聖師道全德隆修明五常垂教無窮增崇儒宫遹追遺風嚴祀申虔登降有容奠幣姑洗宫和寧之曲天生聖人賢於堯舜仰之彌髙磨而不磷新廟告成宫墻數仭遣使陳詞斯文復振降階姑洗宫安寧之曲稟靈尼丘垂芳闕里生民以來孰如夫子新祠巋然四方所視酹觴告成祗循典禮兖國公酌獻姑洗宫輯寧之曲聖師之門顔惟居上其殆庶幾是宜配享桓圭衮衣有嚴儀像載之神祠增光吾黨鄒國公酌獻姑洗宫泰寧之曲有周之衰王綱既墜是生真儒宏才命世言而為經醇乎仁義力扶聖功同垂萬祀亞終獻姑洗宫咸寧之曲於昭聖能與天立極有承其流皇仁帝德豈伊立言訓經王國煥我文明典祀千億送神姑洗宫來寧之曲吉蠲為饎孔惠孔時正辭嘉言神之格思是饗是宜神保聿歸惟時肇祀太平極致闕里志大定十四年釋奠先聖詔依禮官議依開元禮合行祭器禮料羊二豕三酒二十瓶奏登歌雅奏春明夢餘録是年加宣聖像十二旒十二章金史世宗本紀大定二十三年二月戊申以尚書右丞張汝弼攝太尉致祭於至聖文宣王廟章宗本紀明昌二年五月戊辰詔諸郡邑文宣王廟隳廢者復之三年四月壬寅朔定先聖廟春秋釋奠三獻官以祭酒司業博士充祝詞稱皇帝謹遣及登歌改用太常樂工其獻官并執事與享者並法服陪位學官公服學生儒服十月壬子有司奏增修曲阜宣聖廟畢敕黨懷英撰碑文朕將親行釋奠之禮其檢討故事以聞明昌三年十一月丙子詔周公孔子之名令回避禮志明昌四年八月釋奠孔子廟北靣再拜親王百官太學生陪位闕里志明昌四年親釋奠宣聖諭旨宣徽院曰朕以宣聖萬世帝王之師恐汝等未諭可備拜裀朕將拜焉章宗本紀明昌五年閏十月戊寅上問輔臣孔子廟諸處何如平章政事守貞曰諸縣見議建立上因曰僧徒修飾廟宇像甚嚴道流次之惟儒者於孔子廟最為滅裂守貞曰儒者不能長居學校非若僧道久處寺觀上曰僧道以佛老營利故務在莊嚴閎侈起人施利自多所以為觀美也蕙田案章宗所見曲盡後世之弊禮志承安二年春丁章宗親祀以親王攝亞終獻皇族陪祀文武羣臣助奠上親為贊文舊封公者升為國公侯者為國侯郕國以下皆封侯章宗本紀泰和四年二月癸丑詔刺史州郡無宣聖廟學者並增修之五年三月甲戌諭有司進士名有犯孔子諱者避之仍著為令禮志宣宗遷汴建廟會朝門內嵗祀如儀宣聖顔孟各羊一豕一餘同小祀共用羊八無豕其諸州釋奠並遵唐儀哀宗本紀天興元年八月丁巳釋奠孔子右金元史祭祀志宣聖廟太祖始置於燕京選舉志國初燕京始平宣撫王楫請以金樞密院為宣聖廟王圻續通考內翰王文康公鶚元初自保定應聘北行時故人馬雲漢以宣聖畫像為贈既逹北庭值秋公奏行釋奠禮世祖悅即命舉其事公為祝文行三獻禮禮畢進胙於上上飲福熟其胙命左右均霑所賜自是春秋二仲嵗以為常蓋元之所以尊師重道者實公有以啓之世宗本紀中統二年六月乙卯詔宣聖廟及管內書院有司嵗時致祭月朔釋奠禁諸官員使臣軍馬毋得侵擾褻瀆違者加罪八月丁酉命開平守臣釋奠於宣聖廟中統三年春正月癸亥修宣聖廟成閏九月辛卯嚴忠範奏請補東平路學廟太常樂工從之王圻續通考至元元年始行宣聖釋奠禮世祖本紀至元四年五月丁亥敕上都重建孔子之廟祭祀志至元十年三月中書省命春秋釋奠執事官各公服如其品陪位諸儒襴衫唐巾行禮闕里志至元十年中書省判送御史中丞至聖文宣王用王者禮樂御王者衣冠南靣當坐天子供祠其於萬世之絶尊千載之通祀者莫如吾夫子也竊見外路官員提學教授每遇春秋二丁不變常服以供執事於禮未宜又照得漢唐以來祭文廟及社稷無非具公服執手板且鄉人儺孔子猶朝服而立於阼階先聖先師安得不備禮儀故詔王圻續通考至元二十三年命雲南諸路皆建學以祀先聖元史成宗本紀至元三十一年秋七月壬戌詔中外崇奉孔子祭祀志成宗即位詔曲阜林廟上都大都諸路府州縣邑廟學書院贍學土地及貢士莊以供春秋二丁朔望祭祀修完廟宇自是天下郡邑廟學無不完葺釋奠悉如舊儀邱氏濬曰案寧獻王所著通鑑博論於至元十八年有云帝信桑門之惑盡焚中國道藏闢儒道二教為外學貶孔子為中賢尊桑門為正道又為世祖斷云聽妖僧祥逼之誘作妖書以毁昊天上帝貶孔子為邪道擬為中賢不足稱聖及考元史止於是年焚毁道書而不見所謂貶孔子之實惟成宗本紀世祖正月崩成宗即位是年秋七月即詔中外崇奉孔子夫孔子自唐宋以來天下學校通祀之已非一日又何待今日始詔中外崇奉之哉噫當時必有所施行如博論所云者元史臣為世祖諱故略去之耳闕里志大德初敕到任先謁先聖廟拜謁方許以次詣神廟著為令蕙田案此後世到任謁廟之始成宗本紀大德六年六月甲子建文宣王廟於京師哈喇哈遜傳京師久闕孔子廟而國學寓他署乃奏建廟學選名儒為學官采近臣子弟入學大德十年八月丁巳京師文宣王廟成行釋奠禮牲用太牢樂用登歌製法服三襲命翰林院定樂名樂章樂志宣聖樂章迎神奏文明之曲天縱之聖集厥大成立言垂教萬世凖程廟庭孔碩尊爼既盈神之格思景福來并盥洗奏昭明之曲神既寧止有孚顒若罍洗在庭載盥載濯匪惟潔修亦新厥德對越在兹敬恭惟則升殿奏景明之曲降同大哉聖功薄海內外禮降秩宗光垂昭代陟降在庭攝齊委佩莫不肅雍洋洋如在奠幣奏德明之曲圭衮尊崇佩紳列侑籩豆有楚樂具和奏式陳量幣駿奔左右天眷斯文繄神之祐文宣王酌獻奏誠明之曲惟聖監格享於克誠有樂在縣有碩斯牲奉醴以告嘉薦惟馨綏以多福永底隆平兖國公酌獻奏誠明之曲潛心好學不違如愚用舍行藏乃與聖俱千載景行企厥步趨廟食作配祀典弗渝郕國公酌獻闕沂國公酌獻闕鄒國公酌獻奏誠明之曲洙泗之傳學窮性命力拒楊墨以承三聖遭時之季孰識其正髙風仰止莫不肅敬亞獻奏靈明之曲終獻同廟成奕奕祭祀孔時三爵具舉是享是宜於昭聖訓示我民彛紀德報功配於兩儀送神奏慶明之曲禮成樂備靈馭其旋濟濟多士不懈益虔文教兹首儒風是宣佑我闕蕙田案元史樂志所載祀宣聖樂章共二十有七前十六章則釋奠所用者也後十一章則當時擬撰而未及用者也但十六章中內十四章則全用宋時大晟樂府擬撰釋奠之詞其郕國公沂國公酌獻二章係宋無而元增入者後十一章中九章存而二章亡所亡即郕沂二公酌獻之詞何增於前而缺於後耶蓋顔曾思孟並配始於宋度宗咸淳三年當大晟擬撰時郕沂二公尚未入配位故無其樂章元既襲而用之則少此二配樂章不得不增入以充其數因於擬撰十一章之內取而用之夫是以前之所增即後之所缺也今十四章詞已見宋代不重出而郕國公沂國公酌獻二章則録之如左以志其增入之由又以見此詞之終未嘗闕云郕國宗聖公酌獻奏成安之曲南吕宫心傳忠恕一以貫之爰述大學萬世訓彛惠我光明尊聞行知繼聖迪後是享是宜沂國述聖公酌獻奏成安之曲南吕宫公傳自曽孟傳自公有嫡緒承允得其宗提綱開藴乃作中庸侑於元聖億載是崇武宗本紀大德十一年七月辛巳加封至聖文宣王為大成至聖文宣王王圻續通考大德十一年詔曰蓋聞先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也朕纂承丕緒敬仰休風循治古之良規舉追封之盛典加號為大成至聖文宣王遣使闕里祀以太牢於戲父子之親君臣之義永惟聖教之尊天地之大日月之明奚罄名言之妙尚資神化祚我皇元邱氏濬曰案自古諡號必加以實字未有用譬喻之語者成之言出於尚書大成之言出於孟子成者樂之一終也孟子以樂之始終兼聖智之全譬喻孔子之聖兼伯夷伊尹栁下惠之清任和而時出之蓋假設之辭非真實之德也加此二字於至聖文宣王之上固於聖德無所增益也元史武宗本紀至大二年春正月丙午定制大成至聖文宣王春秋二丁釋奠用太牢虞集傳集為助教除博士監祭殿上有劉生者被酒失禮爼豆間集言諸監請削其籍大臣有為劉生謝者集持不可曰國學禮義之所出也此而不治何以為教仁宗在東宫傳旨諭集勿竟其事集以劉生失禮狀上之移詹事院竟黜劉生仁宗更以集為賢大成殿新賜登歌樂其師世居江南樂生皆河北田里之人情性不相能集親教之然後成曲復請設司樂一人掌之以俟考正仁宗即位責成監學拜臺臣為祭酒除吳澄司業皆欲有所更張以副帝意集力贊其説有為異論以沮之者澄投檄去集亦以病免李邦寧傳邦寧宋故小黃門也世祖命給事內庭歷大司徒仁宗即位國學將釋奠敕遣邦寧致祭於文宣王點視畢至位立殿戶方闢忽大風起殿上及兩廡燭盡滅燭臺底鐡鐏入地尺餘無敢拔者邦寧悚息伏地諸執事者皆伏良久風定乃成禮邦寧因慚悔纍日胡氏粹中曰祭祀所以交神明故將有事焉必先射以觀德及期則齋以告虔戒以告潔刑罪喪疾之人不敢以與執役况敢主其祭乎邦寧閽腐餘醜其為刑疾孰甚焉而使之釋奠曽謂仲尼不如林放乎神不享非禮大風之變吾先聖豈可誣哉仁宗既不知此李孟以平章兼領國學而致其以非禮事先聖罪蓋不容掩矣仁宗本紀皇慶二年六月以宋儒周敦頥程皓皓弟頥張載邵雍司馬光朱熹張栻吕祖謙及故中書左丞許衡從祀孔子廟庭明沈氏佳辨大學衍義補元儒許魯齋不宜從祀議魯齋先生有扶世教之大功有衛道統之實學涵養深邃踐履篤實其言明白純粹光輝日新真有合於孔孟之學得統於伊洛之傳者真西山之後一人而已觀其仕元勸世祖不宜伐宋臨終惓惓猶以不得行道為歎此其出處之正志概之大亦可想見矣故明儒薛瑄屢極稱之以之從祀孔廟誰其有遺議焉邱氏妄肆譏詆謬矣延祐三年六月乙亥制封孟軻父為邾國公母為邾國宣獻夫人祭祀志延祐三年秋七月詔春秋釋奠於先聖以顔子曾子子思孟子配享仁宗本紀延祐六年二月丁亥朔日有食之改釋奠於中丁祭祀志又追封周惇頤蘧瑗並從祀王圻續通考延祐六年追封周惇頤為道國公又封蘧瑗為內黃侯從祀孔子元史文宗本紀天歷二年六月賜鳯翔府岐陽書院額書院祀周文憲王仍命學官春秋釋奠如孔子廟儀祭祀志周公廟在鳯翔府岐山之陽春秋釋奠凡有司致祭先代聖君名臣皆有牲無樂文宗本紀天歷二年秋七月遣使以上尊臘羊鈔十錠至大都國子監助仲秋上丁釋奠至順元年七月戊申加封孔子父齊國公叔梁紇為啓聖王母魯國太夫人顔氏為啓聖王夫人顔子兖國復聖公曾子郕國宗聖公子思沂國述聖公孟子鄒國亞聖公河南伯程皓豫國公伊陽伯程頥洛國公祭祀志至順三年加封兖國復聖公制曰朕惟得孔氏之門入聖人之域顔子一人而已觀其不遷怒不二過已成復禮之功無伐善無施勞益著為仁之效蓋將不日而化矣惜乎天不假之以年也朕緬懷哲人留心聖學將大彰於風教故特示於褒嘉於戲用之則行舍之則藏雖潛德一時之不顯吾見其進未見其止顧聖言百世而彌彰尚服寵光丕隆文治可加封兖國復聖公沂國述聖公制曰昔曾子得聖人之傳而子思克承厥統稽夫中庸之一書實開聖學於千載朕自臨御以來每以嘉惠後學為念萬幾之暇覽觀載籍致中和而天地位萬物育雅留意焉夫爵秩之榮既隆於升配景行之懿可後於褒加於戲有仲尼作於前孰儷世家之美得孟氏紹其後益昌斯道之傳渥命言承茂隆丕緒可加封沂國述聖公郕國宗聖公制曰朕惟孔子之道曾氏獨得其宗蓋本於誠身而已也觀其始於三省之功繼聞一貫之妙是以友於顔淵而無愧授之思孟而不湮者與朕仰慕休風景行先哲爰因舊爵崇以新稱於戲聖神繼天立極以來道統之傳遠矣國家化民成俗之效大學之書具焉其相豫之修齊兹式彰於褒顯可加封郕國宗聖公鄒國亞聖公制曰孟子百世之師也方戰國之縱橫異端之充塞不有君子孰任斯文觀夫七篇之書惓惓乎致君澤民之心凛凛乎拔本塞源之論黜伯功而行王道距詖行而放淫辭可謂有功聖門追配神禹者矣朕遠稽聖學祗服格言乃著新稱益彰渥典於戲誦詩書而尚友𬗟懷鄒魯之風非仁義則不陳期底唐虞之治英風千載蔚有耿光可加封鄒國亞聖公殿左東哲五位為費公閔損薛公冉雍黎公端木賜衛公仲由魏公卜商殿右西哲五位為鄆公冉耕齊公宰豫徐公冉求吳公言偃陳公顓孫師蕙田案四配復聖宗聖述聖亞聖之號定於此但志作三年與紀互異考危太朴記又稱二年未知孰是至順元年冬十一月己酉以董仲舒從祀孔子廟位列七十子之下王禕孔子廟庭從祀議孔子廟庭從祀者凡百有五人自淡臺滅明至孔鯉七十一人皆受業聖人之門而承聖人之教者也自左丘明至許衡三十四人皆傳注聖經尊崇聖學而有功於聖人之道者也蓋自唐貞觀二十一年始以左丘明至范寧等二十一人從祀廟庭及宋元豐七年復增荀况揚雄韓愈以世次先後從祀左丘明二十一人之間淳祐元年乃以周敦頥程皓程頥張載朱熹列於從祀景定二年又增張栻吕祖謙咸淳三年又增邵雍司馬光及元皇慶二年乃以許衡繼宋九儒居從祀之列所謂三十四人者也以今論之漢儒之從祀者十四人而猶闕者一人董仲舒是也唐之從祀者一人而猶闕者一人孔穎逹是也宋之從祀者九人而猶闕者四人范仲淹歐陽修真德秀魏了翁是也元之從祀者一人而猶闕者一人吳澄是也自夫孟軻既往聖學不明邪説盛行異端並起歷秦至漢諸儒繼作然完經翌傳局於顓門之學而於聖人之道莫或有聞唯董仲舒於其間號稱醇儒其學博通諸經於春秋之義尤精所以告其君者如天人性命仁義禮樂以及勉強遵行正誼明道之論皆他儒之所不能道至其告時君罷黜百家表章六經以隆孔子之教使道術有統異端息滅民到於今賴之則所以尊崇聖學者其功殆不在孟子下以荀况之言性惡揚雄之事新莽猶獲從祀而仲舒顧在所不取何也秦火之後聖經缺逸漢儒收拾散亡各為箋傳而偏學異説各自名家晉宋以來為説滋蔓去聖既遠莫可考證學者茫昧不知所歸唐初孔穎逹受詔撰定諸經之疏號曰正義自是以來著為定論凡不本於正義者謂之異端誠學者之宗師百世之取信也是其所以傳注聖經者較之馬融鄭康成輩功無所與遜且何休注公羊而黜周王魯王弼注易而專尚清虗害道已甚然在祀列胡獨至於穎逹而遺之也聖人之道或著之事功或載之文章用雖不同而實則一致三代以下人才莫盛於宋東都其間慨然以聖人之道為己任而著之行事者范仲淹而已其言以為士當先天下之憂而憂後天下之樂而樂雖伊尹之任無以尚之况當其時天下學術未知所宗尚而仲淹首以中庸授張載以為道學之倡蓋其為學本乎六經而其議論無不主於仁義雖勳業之就未究其志而事功所及光明正大實與司馬光相上下自聖道不行世儒徒知章句以為事而孰知聖人經世之志固不專在是也歐陽修與仲淹同時實倡明聖賢之學而著之文章其易春秋諸説詩本義等書發揮經學為精至其欲刪諸經正義讖緯之説一歸於正尤有功於聖道其為言根乎仁義而逹之政理所以羽翼六經而載之於萬世至於本論等篇比之韓愈之原道夫復何愧而世之淺者每目之為文人夫文以載道道因文而乃著雖經天緯地者亦謂之文而顧可少之哉然則如范仲淹之立功歐陽修之立名皆可謂有功於聖人之道者韓愈司馬光既列從祀則此二人固決在所當取者也自周敦頥接聖賢千載不傳之緒而程頥兄弟承之道統於是有所傳逮朱熹有作五經四子皆有傳注論述統宗會元集聖賢大成紹程氏之傳其中更學禁其道不行於是真德秀魏了翁並作力以尊崇朱學為己任而聖賢之學乃復明真氏所著有大學衍義讀書記魏氏所著有九經要義大抵皆黜異端崇正理質諸聖人而不謬其於聖人之道可謂有功而足以纘朱氏所傳之緒矣是則此二人者固又當繼朱氏而列於從祀者也及元興許衡起於北方尊用朱氏之學以教人既有以任斯道之重而其時吳澄起於南方能有見於前儒之所未及孝經大學中庸易詩書春秋禮皆有傳注隱括古今諸儒之説而折𠂻之其於禮經尤多所刪正凡以補朱氏之未備而其真修實踐蓋無非聖賢正大之學則其人又可謂有功聖人之道固宜與許衡同列於從祀而不可以或遺也案祀法有功於聖道則祀之是七人者其有功於聖人之道如此而從祀缺焉此甚不可搜纍代之曠典昭萬世之公議舉而明之固於今日矣又案聖孫孔伋故列孔鯉之下而曽參亦在曽晢後咸淳三年始升配享於顔孟為四侑東坐而西面父以從祀立廡下而子以配享坐堂上尊卑舛逆莫此為甚聖人之道在於明人倫而先自廢亂何以詔後世借曰曽子子思以傳道為重然子必當為父屈昔魯祀僖公躋之閔公之上傳者謂子雖齊聖不先父食以為逆祀今孔氏曽氏父子之失序非逆祀乎是故曽參孔伋今當降居於曽晢孔鯉之下又司馬光於程皓程頥為先進張載於二程為表叔而位次皆在下其先後次序亦不可不明咸淳之定從祀徒依朱子六贊以周二程邵張司馬為序而不知朱子之贊特以形容六君子道德之盛初未嘗定其先後之次胡可遂據以為凖乎是故司馬光張載今當升居於程皓程頥之上若夫荀况揚雄何休王弼之徒有不當與於從祀者兹又未敢以遽數也嗟乎天下之禮有似緩而實急似輕而實重者以其有關於名教也公議所在孰得而廢之况乎禮文之事自儒者出則於有功聖道之人禮所宜祀與祀而未稱於禮者固不得置之而不之議也是用疏其為名教所係而公議之不可廢者列之如右庶幾議禮之君子有所采擇云蕙田案忠文此議必在江都未從祀之先今以無年代可考姑列於此而其所議頗為折𠂻有理許氏約曰自唐祀夫子配以顔子至宋升孟子與顔子並配然當時未知道統之傳也自伊洛之學興性理之説明始以顔曽思孟並列於夫子之左蓋得夫子之傳者顔曽子思也得曽思之傳者孟子也故江南諸路學廟皆以四子並配以子張居七十二子之首自兩廡升於十哲補曽子之闕此當因而不當革者也今京師學廟與河北諸路府學並循亡金之舊左顔右孟與夫子並居南面有是理哉孟子學於子思子思學於曽子是知孟子乃曽子門人之弟子曽子乃孟子師之師也今屈曽子於從祀之中降子思於廊廡之末師之師不過一籩一豆門人弟子牲牢幣帛一與先聖等又豈有是理哉况今天下一家豈容南北之禮各異或謂學校所以明人倫路點皆父也回參皆子也子先父食於理安乎竊以為不然廟學乃國家通祀猶朝廷之禮也父為庶僚子為宰職各以其德與勳也如遇朝會殿廷班列則父雖尊安能超於子之上哉蓋抑私親而昭公道尊道統以崇正學乃所以明人倫也如今序傳道之配使顔曾思孟並列於夫子之左虛其右隅以避古者神位之方自兩廡升子張於十哲以補曾子之闕不惟先儒師弟之禮不廢使南北無二制天下無異禮亦可以見我朝明道統得禮之中足以垂世無窮矣邱氏濬曰案熊禾謂宜别設一室以齊國公叔梁紇居中南靣顔路曾晳孔鯉孟孫氏侑食西嚮春秋二祀當先聖酌獻之時以齒德之尊者為分獻官行禮於齊國公之前其配位亦如此如此則亦可以示有尊而教民孝矣然臣以為今天下州縣皆有祭處處皆設恐至於煩瀆説者謂泗水侯孔林自有廟曲阜侯宜祀於其子顔子之廟而以顔子配萊蕪侯無後今嘉祥有曾子墓當有祠宜於此祀萊蕪侯而以曽子配否則特立一廟於曲阜特祀三子而以顔子曾子子思配熊禾謂有王者作禮當損益祀不可瀆也姑志於此蕙田案孔鯉曾點顔路之祀王氏許氏所言皆有依據然不如熊氏議為是至順二年正月敕建孔子廟於後衛七月乙未立閔子書院於濟南八月賜上都孔子廟碑三年春正月封孔子妻鄆國夫人亓官氏為大成至聖文宣王夫人五月追封顔子父無繇為把國公諡文裕母齊薑氏把國夫人諡端獻妻宋戴氏兖國夫人諡貞素祭祀志至順元年冬十一月曲阜兖國復聖公新廟落成元統二年改封顔子考妣又割益都鄒縣牧地三十頃徴其嵗入以給常祀至順三年封先聖夫人制曰我國家惇典禮以彌文本閨門以成教乃眷素王之廟尚虛元嫓之封有其舉之斯為盛矣大成至聖文宣王妻亓官氏來嬪聖室垂裕世家籩豆出房因流風於殷禮琴瑟在御存燕樂於魯堂功言邈若於遺聞儀範儼孚其合德作爾褘衣之象稱其命鼎之銘噫秩秩彛倫吾欲廣關雎鵲巢之化皇皇文治天其興河圖鳯鳥之祥可特封大成至聖文宣王夫人危素尼山大成殿四公配享記略案顔子之侑坐肇於唐太宗貞觀二年冬尚書左僕射房元齡國子博士朱子奢之所建議也宋仁宗元豐七年夏復增孟子侑坐禮部郎中林希之所奏議也度宗咸淳三年春增升曾子子思我朝延祐二年仁宗皇帝在位崇學右文御史中丞趙公世延始言南北祭禮不宜有異當升曾思如典故制曰可先是四公列坐兩旁禮部以為翼承道統述明聖經作則萬世以立人極論德定名列次配侑東坐西向於禮為稱至順二年進封顔為復聖公曾為宗聖公思為述聖公孟為亞聖公仍命詞臣為制書一代之典可謂備矣至正十九年十一月江浙行省據杭州路申備本路經歷司呈準提控案牘兼照磨承發架閣胡瑜牒我朝崇儒重道加封先聖大成之號又追崇宋儒周敦頥等封爵然有司討論未盡尚遺先儒楊時等五人未列從祀惟故宋龍圖閣直學士諡文靖龜山先生楊時親得程門道統之傳排王氏經義之謬南渡後朱張吕氏之學其原委脈絡皆出於時者也故宋處士延平先生李侗傳河洛之學以授朱熹凡集注所引師説即其講論之旨也故宋中書舍人諡文定胡安國聞道伊洛志在春秋纂為集傳羽翼正經明天理而扶世教有功於聖人之門者也故宋處士贈太師榮國公諡文正九峯先生蔡沈從學朱子親承指授著書集傳發明先儒之所未及深有功於聖經者也故宋翰林學士參知政事諡文忠西山先生真德秀博學窮經踐履篤實當時立偽學之禁以錮善類德秀晚出獨以斯文為已任講習躬行黨禁解而正學明此五人者學問接道統之傳著述發儒先之祕其功甚大况科舉取士已將胡安國春秋蔡沈尚書集傳表章而尊用之真德秀大學衍義亦備經筵講讀是皆有補於國家之治道者矣各人出處詳見宋史本傳俱應追錫名爵從祀先聖廟庭可以敦厚儒風激勸後學如聞奏施行以補闕典吾道幸甚至正二十一年七月行移翰林集賢太常三院會議俱準所言二十二年八月奏準送禮部定擬五先生封爵諡號俱贈太師楊時追封吳國公李侗追封越國公胡安國追封楚國公蔡沈追封建國公真德秀追封福國公各給詞頭宣命遣官齎往福建行省訪問各人子孫給付如無子孫者於其故所居鄉里郡縣學或書院祠堂內安置施行二十二年十二月追諡朱熹父為獻靖其制詞云考德而論時灼見風儀之俊觀子而知父逮聞詩禮之傳久閟幽堂丕昭公論故宋左丞議郎守尚書吏部員外郎兼史館校勘纍贈通議大夫朱松仕不躁進德合中行遡鄒魯之淵源式開來學開圖書之藴奧妙契玄機奏對雖忤於權姦嗣續篤生於賢哲化民成俗著書滿家既繼志述事之光前何莭惠易名之孔後才髙弗展嗟沉滯於下僚道大莫容竟昌明於永世神靈不昧休命其承可諡獻靖其改封熹為齊國公制詞云聖賢之藴載諸經義理實明於先正風莭之勵垂諸世褒崇豈間於異時不有巨儒孰膺寵數故宋文華閣待制纍贈寶謨閣直學士太師追封徽國公諡文朱熹挺生異質蚤擢科名試用於郡縣而善政孔多回翔於館閣而直言無隱權姦屢挫志慮不回著書立言嘉乃簡編之富愛君憂國負其經濟之長正學久逹於中原渙號申行於仁廟詢諸僉議宜易故封國啓營丘爰錫太公之境土壤鄰洙泗尚觀尼父之宫墻𬗟想英風載欽新命可追封齊國公餘並如故金賁亨請從祀羅豫章李延平疏臣聞孔子纘述堯舜禹湯文武周公之道以詔萬世是以享有王祀久而彌尊當時從遊之士與夫後儒推明其道以傳示來學者皆得從祀於其庭後世膠於著述之説而或不計其德之醇疵則固有幸而入者至於道足以續聖人之緒而不偏言足以發聖人之藴而有助功足以定後學之趨而不惑如宋儒羅從彥李侗者而不得入焉此則盛典之有待而公論之不容已者也臣嘗溯其淵源侗宋儒朱熹之師也侗學於從彥從彥學於龜山楊時時學於河南程皓兄弟皓常送時南歸謂人曰吾道南矣夫皓豈輕許可者而獨以此稱時是時所傳於皓而以授從彥者即濓洛諸儒所以繼孔門之緒者也從彥聽時語三日驚汗浹背曰幾枉過了一生由是潛思力行任重詣極侗嘗稱其性明而修行完而潔擴之以廣大體之以仁恕精深微妙各極其至不言而飲人以和與人並立而使人化如春風發物蓋亦莫知其所以然也觀侗之言則從彥所得於時者可知矣侗親受從彥春秋中庸語孟之説從容潛玩有會於心盡得其所傳之奧熹狀其行曰充養完粹無復圭角精純之氣逹於面目色溫言厲神定氣和語默動靜端詳間泰自然之中若有成法又曰精明純一觸處洞然泛應曲酬發必中莭又述鄧迪之言曰願中如氷壺秋月瑩徹無瑕觀熹之言則侗所得於從彥者可知矣此其道足以續聖人之緒而不偏者也從彥少著述而熹所編録遺事皆其平日傳授切要之言熹所常尊信而服行者則亦侗之著述也熹又每引二家之言以訓釋經傳彰彰具存其心得獨見有非漢唐以來諸儒所及者此其言足以發聖人之藴而有助者也從彥常令侗靜中觀喜怒哀樂未發時作何氣象蓋謂程氏敬而無失便是喜怒哀樂未發之中之語互相發明而深得子思中庸之旨使學者有所主宰而不流於禪侗深領而亟稱之嘗謂熹曰學問之道不在多言但默坐澄心沉潛體認天理若見雖一毫人欲之發亦退聽矣久用力於此庶幾漸明講學始有力耳與從彥之教實出一轍熹皆尊信發揚以示學者是其師弟子相傳之的至正至明至精至約異世同符愈久不變是故從彥之功在於侗侗之功在於熹無從彥則無侗無侗則無熹而濓洛之所傳者泯矣雖有豪傑之士亦何所從受而保其不謬也哉此其功足以定後學之趨而不惑者也今之學者無不知熹之功而不知從彥與侗之功是猶人知有父而不知其祖也嘗觀漢儒若馬融劉向賈逵戴聖之徒考其素行皆背吾聖人之道止以著述微勞皆得從祀其所著述又豈能得聖人之旨如二儒者哉以二儒之賢而不得與融等並列此誠公論之不容已者也夫吾道之明晦有時賢哲之遭逢豈偶熹祀於宋祀時之議屢興屢寢至我孝宗皇帝用儒臣之言特敕從祀而羅李二儒猶所未及豈非有待於今日也哉恭惟陛下潛心聖學敦崇孔子之道作敬一針及發明宋儒程頥四針范浚心針以頒賜學校天下儒流莫不感激興起此正吾道大明而賢哲所由以表章之日伏望陛下準臣所奏敕下大臣討論故事錫與二儒封爵從祀孔子廟庭則吾道幸甚蕙田案此疏卓然不磨不知上於何時要在延平未從祀之前故附於此蓋二十二年從祀五先生未及豫章也其祝幣之式祝版三各一尺二寸廣八寸木用楸梓柏文曰維年月日皇帝敬遣某官等致祭於大成至聖文宣王先師曰維年月日某官等致祭於某國公幣三用絹各長一丈八尺其牲齊器皿之數牲用牛一羊五豕五以犧尊實泛齊象尊實醴齊皆三有上尊加冪有杓設堂上太尊實泛齊山罍實醴齊有上尊著尊實盎齊犧尊實醴齊象尊實沈齊壺尊實三酒皆有上尊設堂下盥洗位在阼階之東以象尊實醴齊有上尊加冪有勺設於兩廡近北盥洗位在階下近南籩十豆十簠二簋二登三鉶三爼三有毛血豆正配位同籩豆皆二簋一簠一爼一從祀皆同凡銅之器六百八十有一宣和爵坫一豆二百四十有八簠簋各一百一十有五登六犧尊象尊各六山尊二壺尊六著尊太尊各二罍二洗二龍杓二十有七坫二十有八爵一百一十有八竹木之器三百八十有四籩二百四十有八篚三爼百三十有三陶器三瓶二香爐一籩巾二百四十有八簠簋巾二百四十有八爼巾百三十有三黃巾蒙單十其樂用登歌其日用春秋二仲月上丁有故改用仲丁其釋奠之儀省牲前期一日晡時三獻官監祭官各具公服詣省牲所阼階東西向立以北為上少頃引贊者引三獻官監祭官巡牲一匝北向立以西為上待禮牲者折身曰充贊者曰告充畢禮牲者又折身曰腯贊者曰告腯畢贊者復引三獻官監祭官詣神厨視滌溉畢還齋所釋服釋奠是日丑前五刻初獻官及兩廡分奠官二員各具公服於幕次諸執事者具儒服先於神門外西序東向立以北為上明贊承傳贊先詣殿庭前再拜畢明贊升露階東南隅西向立承傳贊立於神門階東南隅西向立掌儀先引諸執事者各司其事引贊者引初獻官兩廡分奠官點視陳設引贊者進前曰請點視陳設至階曰升階至殿簷下曰詣大成至聖文宣王神位前至位曰北向立點視畢曰詣兖國公神位前至位曰東向立點視畢曰詣鄒國公神位前至位曰西向立點視畢曰詣東從祀神位前至位曰東向立點視畢曰詣西從祀神位前至位曰西向立點視畢曰詣酒尊所曰西向立點視畢曰詣三獻爵洗位至階曰降階至位曰北向立點視畢曰詣三獻官盥洗位至位曰北向立點視畢曰請就次方所獻點視時引贊二人各引東西廡分奠官曰請詣東西廡神位前東曰東西曰西向立點視畢曰詣先儒神位前至位曰南向立點視畢曰退詣酒尊所至酒尊所東西向立點視畢曰退詣分奠官爵洗位至位曰南向立點視畢曰請就次兩廡分奠官點視畢引贊曰請詣望瘞位至位曰北向立點視畢曰請就次初獻官釋公服司鐘者擊鐘初獻已下各服其服齊班於幕次掌儀點視班齊詣明贊報知引禮者引監祭官監禮官就位進前曰請就位至位曰就位西向立明贊唱曰典樂官以樂工進就位承傳贊曰典樂官以樂工進就位明贊唱曰諸執事者就位承傳贊曰諸執事者就位明贊唱曰諸生就位承傳贊曰諸生就位引班者引諸生就位明贊唱曰陪位官就位承傳贊曰陪位官就位引班者引陪位官就位明贊唱曰獻官就位承傳贊曰獻官就位引贊者進前曰請就位至位曰西向立明贊唱曰闢户俟户闢迎神之曲九奏樂止明贊唱曰初獻官以下皆再拜承傳贊曰鞠躬拜興拜興平身明贊唱曰諸執事者各司其事俟執事者立定明贊唱曰初獻官奠幣引贊者進前曰請詣盥洗位盥洗之樂作至位曰北向立搢笏盥手帨手出笏樂止及階曰升階升殿之樂作樂止入門曰詣大成至聖文宣王神位前至位曰就位北向立稍前奠幣之樂作搢笏跪三上香奉幣者以幣授初獻初獻受幣奠訖出笏就拜興平身少退再拜鞠躬拜興拜興平身曰詣兖國公神位前至位曰就位東向立奠幣如上儀曰詣鄒國公神位前至位曰就位西向立奠幣如上儀樂止曰退復位及階降殿之樂作樂止至位曰就位西向立俟立定明贊唱曰禮饌官進爼奉爼之樂作乃進爼樂止進爼畢明贊唱曰初獻官行禮引贊者進前曰請詣盥洗位盥洗之樂作至位曰北向立搢笏盥手帨手出笏請詣爵洗位至位曰北向立搢笏執爵滌爵拭爵以爵授執事者如是者三出笏樂止曰請詣酒尊所及階升殿之樂作曰升階樂止至酒尊所曰西向立搢笏執爵舉冪司尊者酌犧尊之泛齊以爵授執事者如是者三出笏曰詣大成至聖文宣王神位前至位曰就位北向立酌獻之樂作稍前搢笏跪三上香執爵三祭酒奠爵出笏樂止祝人東向跪讀祝祝在獻官之左讀畢興先詣左配位南向立引贊曰就拜興平身少退再拜鞠躬拜興拜興平身曰詣兖國公神位前至位曰就位東向立酌獻之樂作樂止讀祝如上儀曰詣鄒國公神位前至位曰就位西向立酌獻之樂作樂止讀祝如上儀曰退復位至階降殿之樂作樂止至位曰就位西向立俟立定明贊唱曰亞獻官行禮引贊者進前曰請詣盥洗位至位曰北向立搢笏盥手帨手出笏請詣爵洗位至位曰北向立搢笏執爵滌爵拭爵以爵授執事者如是者三出笏請詣酒尊所曰西向立搢笏執爵舉冪司尊者酌象尊之醴齊以爵授執事者如是者三出笏曰詣大成至聖文宣王神位前至位曰就拜北向立酌獻之樂作稍前搢笏跪三上香執爵三祭酒奠爵出笏就拜興平身少退鞠躬拜興拜興平身曰詣兖國公神位前至位曰東向立酌獻如上儀曰詣鄒國公神位前至位曰西向立酌獻如上儀樂止曰退復位及階曰降階至位曰就位西向立明贊唱曰終獻官行禮引贊者進前曰請詣盥洗位至位曰北向立搢笏盥手帨手出笏請詣爵洗位至位曰北向立搢笏執爵滌爵拭爵以爵授執事者如是者三出笏請詣酒尊所至階曰升階至酒尊所曰西向立搢笏執爵舉冪司尊者酌象尊之醴齊以爵授執事者如是者三出笏曰詣大成至聖文宣王神位前至位曰就位北向立稍前酌獻之樂作搢笏跪三上香執爵三祭酒奠爵出笏就拜興平身少退鞠躬拜興拜興平身曰詣兖國公神位前至位曰東向立酌獻如上儀曰詣鄒國公神位前至位曰西向立酌獻如上儀樂止曰退復位及階曰降階至位曰就位西向立俟終獻將升階明贊唱曰分獻官行禮引贊者分引東西從祀分獻官進前曰詣盥洗位至位曰北向立搢笏盥手帨手出笏詣爵洗位至位曰北向立搢笏執爵滌爵拭爵以爵授執事者出笏詣酒尊所至階曰升階至酒尊所曰西向立搢笏執爵舉冪司尊者酌象尊之醴齊以爵授執事者出笏詣東從祀神位前至位曰就位東向立稍前搢笏跪三上香執爵三祭酒奠爵出笏就拜興平身少退鞠躬拜興拜興平身退復位至階曰降階至位曰就位西向立引西廡分奠官同上儀唯至神位前東向立作西向立俟終獻十哲兩廡分奠官同時復位明贊唱曰禮饌徹籩豆徹饌之樂作禮饌者跪移先聖前籩豆略離席樂止明贊唱曰諸執事者退復位俟諸執事者至板位立定送神之樂作明贊唱曰初獻官以下皆再拜承傳贊曰鞠躬拜興拜興平身樂止明贊唱曰祝人取祝幣人取幣詣瘞次俟徹祝幣者出殿門北向立望瘞之樂作明贊唱曰三獻官詣望瘞位引贊者進前曰請詣望瘞位至位曰就位北向立曰可瘞埋畢曰退復位至殿庭前候樂止明贊唱曰典樂官以樂工出就位明贊唱曰闔户又唱曰初獻官以下退詣圓揖位引贊者引獻官退詣圓揖位至位初獻在西亞終獻及分獻以下在東陪位官東班在東西班在西俟立定明贊唱曰圓揖禮畢退復位引贊者各引獻官詣幕次更衣其飲福受胙除國學外諸處仍依常制元張顔釋奠儀注序禮曰皮辨祭菜示敬道也禮書殘缺釋奠釋菜名義徒存儀文無考唐開元禮倣佛儀禮饋食篇莭文為詳朱文公謂政和新儀差錯獨於開元禮有取申明至於再三竟格不下身沒之後郡邑放而行之能通其義者鮮矣中原文物肇開四方取則舍魯奚適闕里昔罹兵革宫室荆榛蓋二十年牲殺器皿衣服不備勢使然也而儀章度數固多可議者象設非古也開元禮猶云設席是無象也髙臺巍坐而席地之禮不可見帶劍秦漢冠服之飾也開元禮朝會猶有解劍之席冕服挾劍未之有聞二者之失所從來久矣神位西坐東向尸位也配位東坐西向主人位也自尸禮廢禮家謂自內出者無匹不行自外至者無主不止故立神以配而為主焉開元以後遷神位南面配位猶故也進顔孟南向參列如浮圗老子宫者孔氏祖庭廣記謂金大定十四年所行何所稽乎楹間兩階五齊三酒以四代之器為備物之享也列數瓦缶果為何説尸尊不就洗禮也登罍爵於牀洗者以尸尊自居犧象不錯諸地主人遂不坐實爵簡亦甚矣幣之未薦置諸神位之左示不敢褻陳之階起與主人俱升則不嚴矣蓋事由草創未之備也豫典教於兹思有以正之顧不學雜服不能安禮而雖善無徴無徴不信乃取朱文公所考訂自儀禮開元禮而下裒為一編命學徒肄習且與講説義數使之入耳著心既知義理之安將不期改而自改併附社稷風雨雷之祀庶幾好禮者有取焉抑禮有本有文是書所載文也習禮之士因文而究其本知交於神明者不徒籩豆之事微之顯誠不可掩也如此則可謂知禮矣若夫器樂冠服之度則有博採諸家之説從其是者訂其失者與此編并藏孔氏俾後來之文獻有足徴云蕙田案禮文儀注精意所存凡屬薦享不可不慎况行於聖人之廟者乎張顔宗朱子之意集為一書而序之如此可謂知禮矣惜其書不得而見也右元五禮通考卷一百十九
