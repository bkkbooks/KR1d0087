body:
  text: 五禮通考卷二百三十九刑部尚書秦蕙田撰軍禮七出師周禮天官太宰作大事則戒于百官贊王命注謂助王為教令春秋傳曰國之大事在祀與戎小宰以法掌祭祀朝觀會同賓客之戒具軍旅亦如之令百官府共其財用治其施舍聽其治訟春官典瑞牙璋以起軍旅以治兵守鄭氏鍔曰半圭曰璋長七寸瑑為齒牙之形取牙齒之剛利噬齧兵之象故執以起軍旅若屯兵于外守要害之地有不率紀律者執此以治之李氏嘉會曰牙璋則軍旅之大者用之中璋則軍旅之小者用之地官大司徒大軍役以旗致萬民而治其徒庶之政令縣師若將有軍旅田役之戒則受法于司馬以作其衆庶及馬牛車輦使皆備旗鼓兵器以帥而至夏官諸子掌國子之倅若有兵甲之事則授之車甲合其卒伍以軍法治之注國子謂諸侯卿大夫士之子也李氏曰王者之師非直興于閭里而又取諸世族彼以父祖富貴宜有報上之心况嘗學德行道藝孰不知忠孝之美任之以金革與夫干賞蹈利庸徒鬻賣者蓋有間矣司右掌羣右之政令凡軍旅會同合其車之卒伍而比其乘屬其右戎右掌戎車之兵革使注謂王使以兵有所誅斬也春秋傳曰戰于殽晉梁宏御戎萊駒為右戰之明日襄公縛秦囚使萊駒以戈斬之詔贊王鼓注既告王當鼓之節又助擊之疏太僕已贊王鼓此亦同是助擊其餘面也傳王命于陳中注為王大言之也黃氏曰掌戎車之兵革使蓋戰事也戰重戎右専使事也鄭引左氏萊駒斬囚事其小者耳虎賁氏掌先後王而趨以卒伍軍旅會同亦如之旅賁氏掌執戈盾軍旅則介而趨注介被甲王氏曰旅賁則王衛之尤親者王吉服則亦吉服王凶服則亦凶服王戎服則亦戎服亦與王同其憂樂也太僕凡軍旅贊王鼓注王通鼓佐擊其餘面也王疏王通鼓者謂王親將軍衆代擊乃擊之若鼓人云金鐸通鼓之類也王執路鼓路鼓四面佐擊其餘面也地官鼓人以鼖鼓鼓軍事注鼖鼓長八尺大鼓謂之鼖疏其長八尺對晉鼓六尺六寸者為大鄧氏元錫曰鼖從賁氣盛意鼓軍事以氣盛為壯也魏氏校曰鼓大而短則其聲疾而短聞小而長則其聲舒而逺聞鼖之為言大也因以肅軍令凡軍旅夜鼓鼜軍動則鼓其衆春官大師大師執同律以聽軍聲而詔吉凶注大師大起軍師兵書曰王者行師出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士強角則軍擾多變失士心宫則軍和士卒同心徵則將急數怒軍士勞羽則兵弱少威明大史抱天時與大師同車小史佐大史天官幕人軍旅共其帷幕幄帟綬掌次師田則張幕設重帟重案地官廩人凡師役之事則治其糧與其食封人軍旅則飾其牛牲天官外饔師役則掌其獻賜脯肉之事地官委人軍旅共其委積薪芻遺人凡師役掌其道路之委積牛人軍事共具犒牛凡軍旅行役共其兵車之牛秋官小行人若國師役則令稿禬之注稿讀如犒師之犒禬即大宗伯以禬禮哀圍敗也野廬氏邦之有大師則令掃道路且以幾禁行作不時者不物者鄭氏鍔曰國大用師道路之行欲無荒穢不祥之事苟于是時不當行而行不常作而作失蚤晚之時非所當衣而衣之非所當操而操之非其物而有異常之狀皆姦人之為寇盜者也微伺而幾察之以防變也周之制于田野之道十里之逺設官以治其廬舍禁止姦盜如此之嚴則道不拾遺豈不宜哉後世十里有亭亭必有長其法亦出于此司烜氏軍旅修火禁鄭氏鍔曰衆之所聚器甲資糧勝敗所係則火禁不可不謹也銜枚氏軍旅田役令銜枚注為其言語以相誤王氏昭禹曰軍旅田役大衆所聚惡譁而喜靜故令銜枚大祭祀止于令禁無囂者承祭祀者不若軍旅田役之衆伊耆氏軍旅授有爵者杖黃氏曰有爵者皆有統率在軍見王見帥宜當執秋今三衙兵官常朝亦執杖也鄭氏鍔曰軍中以斧鉞為威將帥所執爾若有爵者在其中既非仗鉞之將又非將校之列宜有以表異之故授以杖見其爵位之尊夏官挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧注鄭司農云挈壺以令軍井謂為軍穿井井成則挈壺懸其上令軍中士衆皆望見知此下有井壺所以盛飲故以壺表井挈轡以令舍亦懸于所當舍止之處使軍望見知之當舍止于此轡所以駕舍故以轡表舍挈畚以令糧亦懸畚于其所當稟假之處令軍望見知稟假于此下也畚以盛糧之器故以畚表稟軍中人多車騎雜會歡囂號令不能相聞故以其物為表省煩趨疾于事便也凡軍事懸壺以序聚柝注鄭司農云懸壺以為漏以序衆柝以次更聚繫柝備守也玄謂擊柝兩木相敲行夜時也右軍中職事夏官量人營軍之壘舍量其市朝州塗軍社之所里鄭氏鍔曰營軍之壘舍非徒欲廣狹足以相容又以社主為重所居之處欲其不褻王氏昭禹曰兵法曰善戰致人而不致于人夫我案兵無動而致敵使來以逸待勞宜勝之矣禮記曲禮行前朱鳥而後玄武左青龍而右白虎招搖在上急繕其怒進退有度左右有局各司其局注朱鳥玄武青龍白虎以此四獸為軍陳象天也急猶堅也繕讀曰徑又畫招搖星于旌旗上以堅徑軍之威怒象天帝也招搖星在北斗杓端主指者度謂伐與步數局部分也西疏此明軍行象天文而作陳法也前南後北左東右朱雀玄武青龍白虎四方宿名也軍前宜捷故用雀軍後須殿捍故用玄武玄武龜也龜有甲能禦侮也左為陽陽能生發象龍變也右為隂隂沈能殺虎沈殺也軍之左右生殺變應威猛如龍虎也鄭注四獸為軍陳則是陳法但不知何以為之今之軍行畫此四獸于旌旗以標左右前後之軍陳招搖北斗七星北方居四方宿之中以斗末從十二月建而指之則四方宿不差今軍行法之亦作此北斗星在軍中舉之于上以指正四方使四方之陳不差也急繕其怒者軍行既張四宿于四方標招搖于中上象天之行故軍旅士卒起居舉動堅徑奮勇如天帝之威怒也度謂伐與步數牧誓云今日之事不愆于六步七步四伐五伐一擊一刺為一伐也左右有局者局部分也軍之左右各有部分不相濫也各司其局者軍行須監領故主帥部分各有所司部分也蕙田案正義引昭二十一年左傳宋人與華亥戰云鄭翩願為鸛其御願為鵝又兵書云善用兵者似率然率然者常山蛇擊其首則尾至擊其尾則首至擊其中則首尾俱至則朱鳥等皆是陳法崔靈恩謂軍行所置旌旗畫此四物其説淺陋非康成意也觀承案戴禮此條即古八陳法也握機經四維方而主靜正兵布陳用之四正員而主動竒兵制勝用之蓋用後天八卦之位而其天前衝地後衡則先天之體亦存其中曲禮只主出行之時故専據龍虎鳥蛇為震兑離坎四卦員而主動者言之其四維四卦之方而主靜者不言可知至招搖在上應指大將之旌麾而言所以行軍布陳指揮兵衆為三軍之司命者也故曰急繕其怒者所以作其氣也若進退有度左右有局各司其局則坐作進退疾徐變化之法俱在其中矣古法無傳握機經是其遺制武侯之八陳亦即根源於此耳豈知熟讀曲禮都已包括而提其綱要也哉右營陳行列周禮春官巾車掌王之五路革路龍勒條纓五就建太白以即戎注革路挽之以革而漆之無他飾龍駹也以白黑飾韋雜色為勒條讀為絛其樊及以絛絲飾之而五成不言樊蓋脫爾太白殷之旗猶周大赤蓋象正色也即戎謂兵事疏趙商問巾車職云建太白以即戎司馬職仲秋辨旗物以治兵王載大常下注云凡頒旗物以出軍之旗則如秋不知巾車太白以即戎為在何時答曰旗之正色者或會事或勞師不親將故建先王之正色異于親自將又案司馬法云章夏以日月上明殷以虎上威周以龍上文不用大常者周雖以日月為常以龍為章故郊特牲云龍章而設日月又案周本紀武王遂入至紂所王射之三發而後下車以輕劍斬紂頭縣于太白之旗不用大常者時未有周禮故武王雖親將猶用太白也典路凡軍旅以路從注王乘一路典路以其餘路從行亦以華國夏官戎僕掌馭戎車注戎車革路也師出王乘以自將掌王倅車之政正其服注倅副也服謂衆乘戎車者之衣服也掌凡戎車之儀注凡戎車衆之兵車也書序武王戎車三百兩兩疏凡語廣故知衆兵車即三百也鄭氏鍔曰武王戎車三百兩與紂戰于牧野王自將則乘戎路戎僕為之馭正其所衣之服以戎事之服異乎乘車之服乘車之服主于文而戎事以武為主則皆服皮辨國容不可以入軍容當一以戎衣從事不可以不正也易氏祓曰上文言馭戎車則王之革路此言凡戎車則衆之兵車也武王戎車三百兩其進退之節不愆于六步七步不愆于四伐五伐六伐七伐乃止齊焉則戎車之儀可知大司馬于搜田之時亦有所謂坐作進退疾徐疏數之節戎僕所以掌其儀者此也春官車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃注萃猶副也此五者皆兵車所謂五戎也戎路王在軍所乘也廣車橫陳之車也闕車所用補闕之車也蘋猶屏也所用對敵自蔽隱之車也輕車所用馳敵致師之車也春秋傳曰公喪戎路又曰其君之戎分為二廣則諸侯戎路廣車也又曰帥斿闕四十乘孫子八陳有蘋車之陳又曰馳車千乘凡師共革車各以其萃注五戎者共其一以為王優尊者所乘也而萃各從其元焉六轁車者軍之羽翼也所以陷堅陳要強敵遮北走也王氏昭禹曰凡師共革車則師之所用者其車皆以革鞔之鄭氏鍔曰革車亦各有萃所以為不可敗之策禮記曲禮兵車不式注尚威武不崇敬武車綏旌注武車亦革路也取其建武即云兵車取其威猛即云武車旌謂車上旌也綏謂垂舒陳氏澔曰兵車革輅也尚勇猛無推讓故不式武車亦革輅也取其建戈刃即云兵車取其威猛即云武車旌車上旌幡也尚威武故舒散若垂緌然司馬法夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也右車路周禮春官司常凡軍事建旌旗及致民置旗弊之注始置旗以致民民至仆之誅後至者王氏曰置者植之弊者仆之鄭氏鍔曰軍旅之事用旌旗以指麾則掌建之始焉置之以致民使來終焉弊之以誅後至皆司常所掌也禮記曲禮前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摰獸則載貔貅注載謂舉旌于首以警衆也禮君行師從卿行旅從前驅舉此則士衆知有所舉各以其類象之青青雀水鳥也鳶鳴則天將風風生埃起鴻取飛有行列也士師謂兵象也虎取其有威勇貔貅亦摯獸書曰如虎如貔司馬法旗夏后氏玄人之執也殷白天之義也周黃地之道也章夏后氏以日月尚明也殷以虎尚威也周以龍尚文也右旌旗周禮夏官司兵掌五兵五盾各辨其物與其等以待軍事注五盾干櫓之屬等謂功沽上下五兵者戈殳戟酋矛夷矛疏言各辨其物與其等者五兵五盾各有物色與其善惡長短大小之等及授兵從司馬之法以頒之及其受兵輸亦如之注從司馬之法令師旅卒兩人數所用多少也兵輸謂師還有司還兵也疏受兵從司馬之法者司馬主六軍是一官之長先受于王命知多少乃始出軍故從司馬法以頒之鄭氏鍔曰物色也各辨其物色使以類相從等者所制之長短小大司兵授之以兵則從司馬之法多乎其數則闕國之守備寡乎其數則乏軍之用器軍之行也從其法而頒之及其還也受其所輸亦當如始者所頒之法苟有亡矢遺鏃之事亦如之矣軍事建車之五兵會同亦如之鄭氏鍔曰軍旅之車上必建五兵出先刃入後刃也會同王乘車則亦建焉皆以示威也司戈盾軍旅授二車戈盾建乘車之戈盾授旅賁及虎士戈盾注乘車王所乘車也軍旅則革路車疏軍旅二車二有車右故授之以戈盾云乘之戈盾者王所乘車有車右故建戈盾授旅賁氏及虎士戈盾者衛王故也及舍設藩盾行則斂之注舍止也藩盾盾可以藩衛者如今之扶蘇歟疏扶蘇舉漢法况之劉氏彛曰旅賁夾王車左右而虎士趨王車後先舍則守王間則殳與戈盾戒備之尤急者也非其有屏蔽之用乎司弓矢掌六弓四弩八矢之法凡弩夾庾利攻守唐大利車戰野戰注攻城壘者與自守者相迫近弱弩發疾也車戰野戰進退非強則不及凡矢枉矢潔矢利火射用諸守城車戰殺矢鏃矢用諸近射注枉矢潔矢二者皆可結火以射敵殺矢言中則死鏃矢象焉二者皆可以射敵之近者凡師役頒弓弩各以其物從授兵至之儀注物弓弩矢箙之屬鄭氏鍔曰師役用兵之時會同行禮之時事異禮異故各以其所當用之物而頒之右兵器禮記曲禮介胄則有不可犯之色馬氏曰兵車者以威克愛也以威克愛則服必稱情容必稱服故戎容暨暨介胄有不可犯之色者以此也介者不拜為其拜而蓌拜朱子曰蓌猶言有所枝拄不利屈伸也少儀乘兵車出先刃入後刃軍尚左卒尚右陳氏澔曰先刃刃向前也後刃不以刃向國也左陽生道也右隂死道也左將軍為尊其行伍皆尊尚左方欲其無覆敗也士卒之行伍尊尚右方示有必死之志也軍旅思險隱情以虞陳氏澔曰軍行舍止經由之處必思為險阻之防又當隱密已情以虞度彼之情計也玉藻戎容暨暨言容詻詻色容厲肅視容清明司馬法古者軍容不入國國容不入軍軍容入國則民德廢國容入軍則民德弱故在國言文而語溫在朝恭以遜修己以待人不召不至不問不言難進易退在軍抗而立在行遂而果介者不拜兵車不式城上不趨危事不齒故禮與法表裏也文與武左右也春秋僖公三十三年左氏傳春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言于王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎右軍容書甘誓左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命朱氏升曰在車左不治主射之事在車右不治擊刺之事御者居中不得馳驅之正皆不恭命也牧誓今日之事不愆于六步七步乃止齊焉不愆于四伐五伐六伐七伐乃止齊焉尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土傳戰事就敵不過六步七步乃止相齊言當旅進一心伐謂擊刺少則四五多則六七以為例桓武貌貔執夷虎屬也四獸皆猛健欲使士衆法之奮擊于牧野商衆能奔來降者不迎擊之如此則所以役我西土之義司馬法逐奔不過百步縱綏不過三舍家語工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後已夫子何善此子曰然如汝言也吾取其有不忍殺人之心而已蕙田案此事亦見檀弓荀子王者之軍制將死鼓御死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之令不進而進猶令不退而退也其罪唯均不殺老弱不獵禾稼服者不禽格者不舍奔命者不獲凡誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也以故順刃者生蘇刃者死奔命者貢王者有誅而無戰城守不攻兵革不擊上下相喜則慶之不屠城不潛軍不留衆師不越時故亂者樂其政不安其上欲其至也右坐作進退擊刺之節周禮秋官鄉士大軍旅則各掌其鄉之禁令帥其屬夾道而蹕士師掌國之五禁之法以左右刑罰五曰軍禁注古之禁書亡矣今軍有囂歡夜行之禁夏官小子凡師田斬牲以左右徇陳注示犯誓必殺之銜枚氏軍旅令銜枚禁􅑧呼歎嗚于國中者書費誓今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊牛馬誘臣妾汝則有常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑吕氏曰先治戎備次之以除道路又次之以嚴部伍又次之以立期會先後之序皆不可紊司馬法冢宰與百官布令於軍曰入罪人之地無暴神祗無行田獵無毁土功無燔牆屋無伐林木無取六畜禾黍器械見其老幼奉歸勿傷雖遇壯者不校勿敵敵若傷之醫藥歸之右軍中禁令周禮夏官大司馬及戰巡陳視事而賞罰秋官大司寇大軍旅涖戮于社注社謂社主在軍者鄭司農曰書曰用命賞于祖不用命戮于社小司寇小師涖戮注小師王不自出之師王氏昭禹曰大司寇大軍旅涖戮故小司寇小師涖戮鄉士大軍旅則各掌其鄉之禁令凡國有大事則戮其犯命者疏大事謂征伐故有犯命刑戮之事士師大師帥其屬而禁逆軍旅者與犯師禁者而戮之注逆軍旅反將命也犯師禁干行陳也鄭氏鍔曰王師所過而敢有沮遏或所須而有不從令者軍中之禁而輒敢干犯則不循軍法之人也安可不戮耶晉魏絳將與狄人戰于太原荀吳之嬖人不肯即卒則斬之雞澤之盟晉侯之弟揚干亂行于曲梁魏絳戮其僕正謂是也易氏祓曰帥其屬而行其戮所以正軍旅之法凡此皆以刑官之士師任其職重其事也書甘誓用命賞于祖不用命戮于社傳天子親征必載遷廟之祖主行有功則賞祖主前示不専又載社主謂之社事不用命奔壯者則戮之于社主前社主隂隂主殺親祖嚴社之義于疏曽子問云孔子曰天子巡狩以遷廟之主行載之齋車言必有尊也巡狩尚然征伐必也定四年左傳又云君以軍行祓社釁鼓祝奉以從是天子親征又載社主之事也郊特牲云惟為社事單出里故以社事言之所以刑賞異處者社主隂隂主殺祖主陽陽主生禮左宗廟右社稷是祖陽社隂就祖賞就社殺親祖嚴社之義也司馬法賞不踰時欲民速得為善之利也罰不遷列欲民速覩為不善之害也孔叢子問軍禮有司簡功行賞不稽于時其用命者則加爵受賜于祖奠之前其奔北犯令者則戮于社主之前信陵君問于子髙曰古者軍旅賞人必于祖戮人必于社其義何也答曰賞功于祖告分之均示不敢専也戮罪于社告中于土示聽之當也子路問於孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之正也其君在焉者有詔則無討右軍中刑賞禮記曽子問曽子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虛主虛主者唯天子崩諸侯薨與去其國與祫祭于祖為無主耳曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也陳氏澔曰既以幣玉告于祖廟則奉此幣玉猶奉祖宗之命也故曰主命每舍必奠神之也反則設奠以告而埋藏之不敢褻也真氏德秀曰先儒謂廟無虛主有廟者不可以其主行主命謂雖無木主但所受于神之命即是主也吳氏澄曰遷廟主謂祔禰時所遷昭穆最上之廟一主也在昭廟穆廟之上最尊最親者也君將出行時遍告有廟之諸主又特告此無廟之一主而載之以行也周禮春官小宗伯若大師則帥有司而立軍社奉主車鄭氏鍔曰古者大師則先有事于杜與廟然後載社主與遷廟之主以行不用命戮于社故載社主將以行戮用命賞于祖故載遷廟之主將以行賞小宗伯掌社稷宗廟之禮宜載以行乃言立者蓋杜本不在軍因用師始立之立者出于一時之故廟主為尊載之以行不敢忽也故言奉奉以言其肅欽之至帥有司者蓋帥大祝也大祝職曰大師宜于社造于祖設軍社國將有事于四望及軍歸獻于社則前祝故知此所謂有司為大祝明矣肆師凡師甸用牲于社宗則為位易氏祓曰用師者必載社之石主祖之木主示有所受命鄭氏鍔曰夫甸獵之甸乃四時搜苗獮狩之田師甸則大用師以對敵之時何以明之以所祭之神知之用師則載社主與遷廟之主以行此用牲于社宗大戰則類造于上帝封于大神祭兵于山川此有類造封祭之事豈四時之甸所宜有耶故知以師甸言社者主也宗者遷廟之主不曰祖曰宗者宗繼祖者也載主而行不在國之常位而祭不可以無位無位則鬼神無所依故為位然後祭小宗伯于軍旅甸後禱祠為位則止為位于肄儀之時肆師于用牲以祭時則為位者蓋所掌者立祀用牲之禮故也周禮春官大祝大師設軍社則前祝注鄭司農説設軍社以春秋傳曰所謂君以師行祓社釁鼓祝奉以從者也七疏軍將出祭于社即將社主行不用命戮于社出必廟俱祭取遷廟之主行用命賞于祖皆載于齊車社在軍中故云設軍社王氏安石曰詩云乃立冡土戎醜攸行所謂設軍社也鄭氏鍔曰大師必載社主與遷廟之主以行及軍之所在則必設軍中之社于其地此國外之禮小宗伯所謂帥有司而立軍社是也小祝大師掌釁祈號令王氏昭禹曰蓋軍行殺牲以血釁鼓以禦妖釁求其所斷焉故謂之釁祈小祝則號致焉而後祝耳鄭氏鍔曰祓社釁鼓以除去不祥祈軍有功大祝掌宜社造祖之事小祝掌其釁祈之祝號王氏曰大師掌釁祈號祝則左傳所謂軍行祓社釁鼓祝奉以從春秋定公四年左氏傳衛祝他子魚曰君以軍行祓社釁鼓祝奉以從真氏德秀曰古禮天子親征必奉廟主社主從軍而行有功則賞于廟主前不用命則戮于社主前示不専也孔叢子問軍禮天子出征命有司以特牲告社告以所征之事而受命焉以齋車載遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齋車凡行主皮圭幣帛皆每舍奠焉而後就館主車止于中門之外外門之內廟主居于道左社主居于道右周禮春官小官伯若軍將有事則與祭有司將事于四望注軍將有事將與敵合戰也與祭有司謂大祝之屬蓋司馬之官實典焉王氏曰先王雖以至仁伐至不仁然君子臨事而懼故有事于祭焉鄭氏鍔曰軍將有事則與祭者主帥奉祭小宗伯以職當立之奉之故當與也小宗伯已與祭于軍中則四望之祭必遣其所屬之有司往行事焉理之宜也戰必禱于神欲氣勢之增倍四望又山川之尤大者國家所賴以為阻固是以將戰則禱焉欲其為兵之捍蔽孔叢子問軍禮及至敵所將戰太史卜戰日卜右御先期三日有司明以敵人罪狀告之史史定誓命戰日將帥陳列車甲卒伍于軍門之前有司讀誥誓使周定三令五申既畢遂禱戰祈克于上帝然後即敵將士戰全已克敵史擇吉日復禡于所征之地柴于上帝祭社奠祖以告克者不頓兵傷士也戰不克則不告也右軍中之祭周禮夏官環人掌致師注致師者致其必戰之志古者將戰先使勇力之士犯敵焉疏古者將戰先使勇力之士犯敵焉者案文十二年秦伯伐晉秦人欲戰秦伯謂士會曰若何而戰對曰若使輕者肆焉其可注云肆突言使輕鋭之兵往驅突晉軍隱九年北戎侵鄭公子突曰使勇而無剛者嘗寇而速去之注云勇則能往無剛不耻退揚軍旅注為之威武以觀敵鄭氏鍔曰戰必致師蓋使環人犯敵以致吾必戰之志使敵人怒而求戰其致之自吾也王氏昭禹曰兵法曰善戰者致人而不致于人夫我按兵無動而致敵使來以逸待勞宜勝之矣春秋宣公十二年左氏傳楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘