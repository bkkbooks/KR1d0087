宗伯主于宗廟之禮故獻于祖也樂師凡軍大獻教愷歌遂倡之注鄭司農云樂師主倡也疏大獻者謂師克勝獻捷于祖廟也云教愷歌者愷謂愷詩師還未至之時預教瞽矇入祖廟遂使樂師倡道為之故云遂倡之鄭氏鍔曰王師大獻令奏愷樂則王親征之師故大司樂合之軍大獻教愷歌遣將出軍而歸故樂師教之又倡之異尊卑李氏嘉會曰愷歌歌于堂上愷樂作于堂下二者相應愷歌在前樂師倡之鎛師軍大獻則鼓其愷樂疏軍大獻謂獻捷于祖詩周頌酌序酌告成大武也於鑠王師遵養時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師孔叢子問軍禮然後鳴金振旅有司遍告捷于時所有事之山川既至舍于國外三日齊以特牛親格于祖禰然後入設奠以反主若主命則卒奠斂玉埋之於廟兩階間唐開元禮凱旋告廟陳俘馘于南門外北面西上軍實陳于後其告奠之禮皆與告禮同解嚴未解嚴前一日本司各隨職供辦尚舍奉御座于太極殿中楹間南向如常守宫設文武百官次于東西朝堂奉禮于東西朝堂設文武官版位如初典儀設位于殿廷文東武西皆重行北向相對為首設典儀位于東階革輅旌旗之屬于殿廷其日平明諸衛各勒所部屯門列仗百官服袴褶戎服皆集朝堂晝漏上水五刻侍中版奏請中嚴鈒戟以次列于殿廷上水七刻典謁引羣官以次入就位上水十刻應奉迎之官詣閣奏迎侍中版奏外辦皇帝服通天冠絳紗袍御輿以出曲直華蓋警蹕如常皇帝出自西房即御座侍臣夾侍如常典儀稱再拜贊者承傳羣官皆再拜通事舍人以次引羣官出侍中跪奏稱禮畢俯伏興還侍位皇帝降座御輿入自東房侍臣從至閣如常通典武德元年十一月秦王平薛仁杲凱旋獻于太廟四年七月秦王平東都被黃金甲陳鐵馬一萬甲士三萬以王世充竇建德及隋文物輦路獻捷于太廟貞觀四年三月李靖俘頡利可汗獻捷于太廟遼史禮志下城克敵班師以所獲牡馬羊各一祭天地明會典軍凱還皇帝率諸將以凱樂俘馘陳于廟社門外告畢以俘馘付刑部協律郎導樂以退其告祭用三獻禮儀與出師同蕙田案漢唐以下凱還儀節歷代不同未便細分如此段告廟而兼之告社是也今一以經為主此段入告廟即不復入告社餘倣此又案此凱旋告天地宗廟周禮夏官大司馬若師有功則左執律右秉鉞以先愷樂獻于社注功勝也律所以聽軍聲鉞所以為將威也先猶道也兵書曰愷獻于社獻功于社也司馬法曰得意則愷樂愷歌示喜也鄭氏鍔曰軍行必聽同律而鉞者大將所執也有功則執律者示師出以律而取勝也陽六為律左陽也故左執之鉞所以主殺隂也右亦隂也故右秉之春官大祝大師軍歸獻于社則前祝反行舍奠注舍奠之禮所以告至鄭氏鍔曰軍有功歸而獻于社大祝處前告神孔叢子問軍禮反社主如初迎之禮蕙田案此凱旋告社稷禮記王制天子出征執有罪反釋奠于學以訊馘告注釋菜奠幣禮先師也訊馘所生獲斷耳者詩曰執訊獲醜又曰在頖獻馘疏出師征伐執此有罪之人還反而歸釋菜奠幣于學以可言問之訊截左耳之馘告先聖先師也禮經補逸汪氏克寬曰訊者問其首惡馘者截其左耳夫執訊獲醜而反舍奠于先聖先師以是告之者蓋始出征受成于學今師還以武功告成于文德之地明不専恃乎威戮而必任之以德禮也昔僖公在頖獻馘而國人以文武頌之者亦以此歟詩魯頌泮水矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚詩緝嚴氏粲曰古者受成于學故出征執有罪反釋奠于學以訊馘告詩人因其泮宫可以為獻功之地而頌禱之耳孔叢子問軍禮舍奠于帝學以訊馘告大享于羣吏用備樂蕙田案此凱旋釋奠于學詩小雅出車序出車勞還率也我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁王命南仲往城于方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁于襄昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑起居豈不懷歸畏此簡書喓喓草蟲躍躍阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷蕙田案此凱旋勞還率周禮春官視瞭賔射奏其鐘鼓鼜愷獻亦如之注凱獻獻功愷樂也杜子春讀鼜為憂戚之戚謂戒守鼓也擊鼓聲疾數故曰戚疏鼜謂夜戒守之鼓愷獻謂戰勝獻俘之時作愷樂二者皆視瞭奏其鐘鼓春秋僖公二十八年左氏傳晉侯獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎內史叔興父策命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命真氏德秀曰此古人獻俘䇿命之禮見于春秋者秋七月丙申振旅愷以入于晉獻俘授馘飲至大賞徵會討二殺舟之僑以徇于國民於是大服真氏德秀曰此雖春秋時事而亦可見三代桭旅凱旅之遺制昭公十年左氏傳季平子伐莒取郠獻俘十七年左氏傳晉荀吳滅陸渾獻俘于文宫隋書髙祖本紀開皇九年春正月陳國平四月乙巳三軍凱入獻俘于太廟唐書髙祖本紀武德元年十一月癸亥秦王世民俘薛仁杲以獻四年五月壬戌秦王世民敗竇建德于虎牢執之七月甲子秦王世民俘王世充以獻唐會要武德四年秦王世民平東都被黃金甲乘戎輅李世績等二十五將從其後陳鐵騎一萬甲士三萬前後部鼓吹俘王世充竇建德及隋器物輦輅獻于太廟蕙田案唐秦王破宋金剛李績平髙麗皆凱歌入京師其樂歌則有破陳樂應聖朝等篇其奏樂則有鐃歌鼓吹二部笛篳篥簫笳鐃鼓等器至廟社但陳列于門外不奏歌曲俟告獻禮畢復奏曲如儀以廟社尊嚴之地鐃吹喧譁恐乖肅敬故不奏曲唐書太宗本紀貞觀四年三月李靖俘突厥頡利可汗以獻十四年十二月丁酉侯君集俘髙昌王以獻髙宗本紀永徽元年九月髙侃俘突厥車鼻可汗以獻王綝傳綝字方慶神功初清邊道大總管武攸宜破契丹凱還且獻俘內史王及善以孝明帝忌月請鼓吹備而不作方慶曰晉穆帝納后當康帝忌月時以為疑荀訥謂禮有忌日無忌月世用其言臣謂軍方大凱作樂無嫌詔可玄宗本紀開元二十年正月信安郡王褘為河東河北道行軍副元帥以伐奚契丹五月戊申忠王浚俘奚契丹以獻宋史太祖本紀建隆元年六月辛未拔澤州筠赴火死丁亥筠子守節以城降九月甲子歸太原俘禮志宋制親征納降獻俘皆遣官奏告天地宗廟社稷諸陵嶽瀆山川宫觀在京十里內神祠其儀用犧尊籩豆各一實以酒脯醢宫寺以素饌時果代用祝幣行一獻禮建隆元年太祖平澤潞仍祭祅廟泰山城隍用此禮太祖本紀乾德三年春正月乙酉蜀王孟昶降禮志受降獻俘太祖平蜀孟昶降詔有司約前代儀制為受降禮昶至前一日設御座仗衛于崇元殿如元會儀至日大陳馬步諸軍于天街左右設昶及其官屬素案席褥于明德門外表案于橫街北通事舍人引昶及其官屬素服紗帽北向序立昶跪奉表授閣門使復位待命表至御前侍臣讀訖閣門使承旨出昶等俯伏通事舍人掖昶起官屬亦起宣制釋罪昶等再拜呼萬嵗衣庫使導所賜襲衣冠帶陳于前昶等又再拜跪受改服乘馬至升龍門下馬官屬至啓運門下馬就次帝常服升坐百官先入起居班立閣門使引昶等入舞蹈拜謝召昶升殿閣門使引自東階升宣撫使承旨安撫之昶至御座前躬承問訖還位與官屬舞蹈出中書率百官稱賀遂宴近臣及昶于大明殿太祖本紀開寶四年春正月己丑潘美克廣州俘劉鋹廣南平五月乙未朔御明德門受劉鋹俘釋之禮志嶺南平劉鋹就擒詔有司撰獻俘禮鋹至上御明德門列仗衛諸軍百官常服班樓前别設獻俘位於東西街之南北向其將校位于獻俘位前北上西向有司率武士係鋹等白練露布前引至太廟西南門鋹等並下馬入南神門北向西上立監將校官次南立俟告禮畢于西南門出乘馬押至大社如上儀乃押至樓南御路之西下馬立俟獻俘將校戎服帶刀攝侍中版奏中嚴百官班定版奏外辦帝常服御座百官舞蹈起居畢通事舍人引鋹就獻俘位將校等詣樓前舞蹈訖次引露布案詣樓前北向宣付中書門下如宣制儀通事舍人跪受露布轉授中書門下轉授攝兵部尚書次攝刑部尚書詣樓前跪奏以所獻俘付有司上召鋹詰責鋹伏地待罪詔誅其臣襲澄樞等特釋鋹縛與其弟保興等罪仍賜襲衣冠帶鞾笏器幣鞍馬各服其服列謝樓下百官稱賀畢放仗如儀太祖本紀開寶八年十一月乙未曹彬克升州俘其國主煜江南平九年春正月辛未御明德門見李煜于樓下不用獻俘儀禮志南唐平帝御明德門露布引李煜及其子弟官屬素服待罪初有司請如獻劉鋹帝以煜奉正朔非若鋹拒命寢露布弗宣遣閣門使承制釋之太宗本紀太平興國四年五月甲申劉繼元降北漢平禮志太宗征太原劉繼元降帝幸城北陳兵衛張樂宴從臣於城臺繼元率官屬素服臺下遣閣門使宣制釋罪召繼元親勞之從臣詣行宫稱賀時以在軍中故不備禮繼元至京師詔告獻太廟前一日所司陳設如常告廟儀告日黎明博士引太尉就位通事舍人引繼元西階下東向立其官屬重行立贊者贊太尉再拜訖博士引就盥爵如常儀詣東階解劍脫舄升第一室進奠再拜太祝跪讀祝文訖又再拜通事舍人引繼元及官屬詣室前西階下北向立舍人贊云皇帝親征收復河東偽主劉繼元及偽命官見贊者曰再拜訖退位次至第二第三第四第五室皆如第一室博士引太尉降階佩劍納履位贊者曰再拜太尉與繼元等皆再拜退焚祝版於齋坊繼元既命以官故不稱俘焉寧宗本紀開禧三年春正月甲午吳曦僭位于興州二月四川宣撫副使司隨軍轉運安丙及興州中軍正將李好義監四川總領所興州合江倉楊巨源等共誅吳曦傳首詣行在獻于廟社禮志開禧三年三月四川宣撫副使安丙函逆臣吳曦首并違制創造法物所受金國加封蜀王詔及金印來獻四月三日禮部太常寺條具獻馘典故俟逆曦首函至日臨安府差人防守殿前司差甲士二百人同大理寺官監引赴都堂審驗奏獻太廟别廟差近上宗室南班奏獻太社太稷差侍從官各前一日赴祠所致齋至日行奏獻之禮大理寺殿前司計會行禮時刻監引首函設置以俟奏獻禮畢梟于市三日付大理寺藏于庫宋政和五禮新儀師旋奏凱某日大將勒所部兵衛執俘陳於都門外鼓吹令丞押凱樂分前後二部並其次第陳列將入都門鼓吹振作迭奏樂歌其詞隨時事撰述行至太廟及太社門工人下馬陳列于門外奏歌曲俟告獻禮畢復導引奏曲至宣德門樓前兵仗外二十步樂工皆下馬徐行前進兵部尚書於中路前導至樓下次協律郎二人公服執麾分導鼓吹令引樂工等至獻俘位之南面重行立定大司樂于樂工之前俯伏跪奏具官臣某言請奏凱樂協律郎舉麾鼓吹大作遍奏樂曲協律郎偃麾樂止大司樂跪奏臣某言奏凱樂畢兵部尚書大司樂退協律郎導鼓吹令引樂工等並于兵仗外序立次引復入獻如别儀獻俘前期殿中監帥其屬尚舍設御座于宣德門樓上前楹當中南向又設御幄于御座之右北儀鸞司分設文武百僚及獻俘將校次于樓下之左右隨地之宜其日未明尚書兵部率其屬陳列黃麾大仗于樓前東上閣門御史臺太常寺設文武百僚等班位並如受降之儀又設獻俘位于樓前少南又