body:
  text: 五禮通考卷一百五十三刑部尚書秦蕙田撰嘉禮二十六昏禮周禮地官媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之注判半也得耦為合主合其半成夫婦也喪服傳曰夫妻判合鄭司農云主萬民之判合入子者謂嫁女者也元謂言入子者容媵姪娣不聘之者髙氏愈曰判當作胖胖者胸背之骨兩形而聯為一體夫妻之合似之儀禮所稱夫妻胖合即此也判妻謂出妻再嫁娶判妻而入其子猶易所謂得妾以其子者欲令别于父母自養者故書之蕙田案判妻入子髙氏説較注疏為直截即下文男女之無夫家者也仲春之月令會男女於是時也奔者不禁若無故而不用令者罰之司男女之無夫家者而會之注司察也無夫家謂男女之鰥寡者男疏上文已云令會男女謂無夫家者也今又言司察女無夫家是嘗已有匹配故鄭云男女之鰥寡者也王氏應電曰程子云取失節者以配身是已失節也此云司無夫家而會之非歟夫天下之人上智寡而中材衆一與之齊終身不改固女子天然之節苟盡責以此事則失所者必多且非貞節之人徒使之不嫁以避失節之名而其陰至于敗俗必有甚者故聖人於牧民之政而開為此法凡鰥寡而欲嫁娶者亦量其才齒而會合之所以待中人至于昏禮用鴈從一而終實萬世綱常爰及鰥寡旌表貞婦常以為世勸實並行而不悖也蕙田案程子之言禮義自守之正也注疏之意惠鮮鰥寡之仁也王者參贊化育守經達權與匹夫硜硜之節自有不同王氏發明之是矣凡嫁子娶妻入幣純帛無過五兩注純實緇字也納幣用緇婦人陰也凡於娶禮必用其類五兩十端也必言兩者欲得其配合之名十者象五行十日相成也士大夫乃以元纁束帛天子加以榖圭諸侯加以大璋雜記曰納幣一束束五兩兩五尋然則每端二丈禮記昏義孔疏納徴納聘財也春秋謂之納幣其庶人則緇帛五兩王氏應電曰雜記納幣一束束五兩兩五尋八尺曰尋五尋即四丈也凡布帛四丈為一匹一匹兩端故又謂之兩然則每端二丈每兩四丈十端五兩為一束共二十丈也古者納幣不過於此故男女不至失時也後世昏娶論財男家以此責其婦女氏以此驕其夫南方遂以溺女成風禮之失也久矣反之其在士君子歟禮記雜記納幣一束束五兩兩五尋方氏慤曰納幣即昏禮所謂納徵以物言故曰幣以義言故曰徴五兩王氏謂天數五地數五五位相得而各有合五兩則以天地合數為之節陳氏澔曰從兩端卷至中則五匹為五箇兩卷矣故曰束五兩周禮地官遂人以樂昏擾氓注樂昏勸其昏姻如媒氏會男女擾順也疏男女人之大欲存焉配以昏姻即順民意大司徒以荒政十有二聚萬民十曰多昏劉氏彛曰昏必用六禮禮以荒而不可備時雖荒而不可失也故多昏之政行焉史氏浩曰古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民媒氏禁遷葬者與嫁殤者注遷葬謂生時非夫婦死既葬遷之使相從殤十九以下未嫁而死者生不以禮相接死而合之亦是亂人倫也王氏應電曰骨月歸于土以掩藏為善故袝之離合聖人所不拘而死則同穴特匹夫匹婦之私情耳民有遷徙而屑屑于遷其舊葬以祔其夫或婦者既使死者體魄不安亦使生者不盡人道而鴆溺鬼神禁之者裁民以義也此遷葬事由于夫婦之合故附載于此華氏泉曰嫁殤或女已殤而嫁之或男子殤而嫁女與之亦為嫁殤王氏昭禹曰昏姻所以合二姓之好天地之義受命則于祖親迎則于庭三月而後廟見未廟見而死猶不遷于祖不祔于姑歸葬于女氏之黨以示其未成婦殤而死乃妄為嫁娶豈禮之意乎蕙田案遷葬嫁殤後世不惟習以為俗且以合葬為禮而分葬為非者有之矣女未嫁殉夫不以為非禮而旌其貞烈者有之矣此皆溺於欲而不循於理聖人申以明禁豈非風俗民心之大間哉凡男女之陰訟聽之於勝國之社其附於刑者歸之于士注隂訟爭中冓之事以觸法者亡國之社就之以聽隂訟之情明不當宣露其罪不在赦宥者直歸士刑之不復以聽王氏應電曰隂訟以淫僻而致訟中冓之事故曰隂亡國之社覆以屋而行刑辟者聽之必于此者以其事故于屋中不欲宣布于衆且自古犯淫亂者無有不至于敗亡故于此以自戒大司徒之職施十有二教焉三曰以隂禮教親則民不怨王氏昭禹曰隂禮則昏姻之類以其為內事故謂之隂禮男子生而願為之有室女子生而願為之有家先王之教使民樂所願而已男女以正昏姻以時孰有怨哉蕙田案昏禮之見於經者惟儀禮士昏禮由士而上則為天子諸侯大夫下則為庶人而其禮不載蓋闕如矣家語孔子對哀公云敬之至矣大昏為大大昏至矣大昏既至冕而親迎合二姓之好以為天地宗廟社稷之主是天子諸侯有昏禮也又云無大夫冠禮而有其昏禮是大夫有昏禮也惟庶人之昏辭無所見今考大宗伯以嘉禮親萬民以昏冠之禮親成男女而大司徒又云以隂禮教親遂人以樂昏擾民媒氏掌萬民之判皆屬於地官何也宗伯之昏禮以節文為主雖無所不統而以天子諸侯大夫士為重若大司徒教養萬民貴在男女及時家室完聚內無怨外無曠故媒氏所掌曰會男女而娶判妻入子者皆書之司無夫家者而會之至納幣不過純帛非士大夫之元纁束帛也荒則多昏何擇乎冰泮霜降之時與六禮之相將也且不用令者有罰遷葬嫁殤者有禁豈所以行於士大夫者乎此蓋庶人之昏也何也禮不下庶人也右庶人昏禮記昏義昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徵請期皆主人筵几于廟而拜迎於門外入揖讓而升聽命於廟所以敬愼重正昏禮也注聼命謂主人聽使者所傳壻家之命疏此一節總明昏禮之義而拜迎于門外揖讓而升自從始至終也納采者謂采擇之禮故昏禮云下逹納采用鴈也問名者問其女之所生母之姓名故昏禮云謂誰氏言女之母何姓氏也此二禮一使而兼行之納吉者謂男家既卜得吉與女氏也納徵者納聘財也徴成也先納聘財而後昏成春秋則謂之納幣其庶人則緇帛五兩卿大夫則玄纁元三纁二加以儷皮及諸侯加以大璋天子加以穀圭皆具于周禮經注也請期者謂男家使人請女家以昏時之期由男家告于女家何必請者男家不敢自専執謙敬之辭故云請也女氏終聽男家之命乃告之納吉納徴請期每一事則使者一人行惟納徴無雁以有幣故其餘皆用雁主人筵几於廟者謂行此等之禮主人謂女父母設筵几于禰廟此等皆據士昏禮而知之也聽命于廟者謂女之父母聼受壻之使者之命于廟堂之上兩楹之間也父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執雁入揖讓升堂再拜奠雁蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也注酌而無酬酢曰醮醮之禮如冠醮與其異者于寢耳壻御婦車輪三周御者代之壻自乘其車先道之歸也共牢而食合卺而酳成婦之義必疏此一節明親迎之時父之醮子明迎婦之節所以命迎者欲使男往迎之女則從男而來也是男子先迎女從後至是男先女也拜迎於門外以敵禮待之共牢而食者共一牲牢而同食不異牲卺謂半瓢以一瓠分為兩瓢謂之卺壻之與婦各執一片以酳故云合卺以酳同尊卑謂共牢也所以合體同尊卑者欲使壻之親婦婦亦親壻所以體同為一不使尊卑有殊也敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也夙興婦沐浴以俟見質明贊見婦于舅姑婦執笲棗栗腵修以見贊醴婦婦祭脯醢祭醴成婦禮也陳氏禮書棗栗腵修贄也見舅以棗栗見姑以腵修者以棗栗者天所産腵修者人所成也棗栗進于舅而舅拜之腵修進于姑而姑拜之以禮無不答猶冠堂禮母拜子燕禮君答臣祭禮尸答主人也見必立於下而拜必于階上者立于堂下婦之所以尊尊也拜于階上舅姑所以親親也舅姑入室婦以特豚饋明婦順也注以饋明婦順者供養之禮主于孝順厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也注言既獻之而授之以室是也降者各還其燕寢婦見及饋饗于適寢昏禮不言厥明此言之者容大夫以上禮多或異日疏此以士為主亦兼明大夫故有厥明舅姑共饗婦若士婦見舅姑之日即舅姑饗婦故士昏禮舅姑醴婦醴婦既訖則饗之不待厥明也阼階是舅姑所升之處令婦由阼階而降是著明代舅姑之事也陳氏禮書冠必醴子昏必醴女以至主人醴賔舅姑醴婦皆致其誠敬而示以質也醴婦必席于户牖間其酌以觶其薦以脯醢其禮有祭而拜送拜答則贊者而已若夫饗婦則不然故舅洗在庭姑洗在北堂則所與行禮者舅姑也然則醴與饗必于户牖間猶冠者之醮于客位也婦降自阼階猶冠者之冠于阼也庶婦則使人醮之猶庶子之冠不醴也方氏慤曰阼者主人之階子之代父將以為主于外婦之代姑將以為主于內故此與冠禮並言著代也成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏注室人謂女妐女叔諸婦也當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不為稱夫也是故婦順備而后內和理內和理而后家可長久也故聖王重之注順備者行和當事成審也疏以審守委積蓋藏者言以此詳審保守家之所有委積掩蓋藏聚之物也室人是在室之人非男子也女妐謂壻之姊也女叔謂壻之妹也諸婦謂娣姒之屬是以古者婦人先嫁三月祖禰未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也注謂與天子諸侯同姓者也嫁女必就尊者教成之教成之者女師也祖禰女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦言婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為俎實蘋藻為羮菜祭無牲牢告事耳非正祭也其齊盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉雜記婦見舅姑兄弟姑姊妹皆立於堂下西面北上是見已注婦來為供養也其見主於尊者兄弟以下在位是為已見不復特見見諸父各就其寢注旁尊也亦為見時不來郊特牲幣必誠辭無不腆注誠信也腆猶善也告之以直信注直猶正也此二者所以教婦正直信也信事人也信婦德也注事猶立也一與之齊終身不改故夫死不嫁注齊謂共牢而食同尊卑也齊或為醮男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也注先謂倡道也執摯以相見敬章别也注言不敢相褻也摯所奠雁也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安注言人倫有别則氣性醇也無别無義禽獸之道也注言聚麀之亂類也壻親御授綏親之也親之也者親之也注言己親之所以使之親己敬而親之先王之所以得天下也注先王若太王文王出乎大門而先男帥女女從男夫婦之義由此始也注先者車居前也婦人從人者也幼從父兄嫁從夫夫死從子注從謂順其教令夫也者夫也夫也者以知帥人者也注夫之言丈夫也夫或為傅陳氏澔曰太王爰及薑女文王親迎于渭皆是敬而親之之道以至于有天下故曰先王之所以得天下也玄冕齋戒鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎注元冕祭服也隂陽謂夫婦也陳氏澔曰服元冕而致齋戒是事鬼神之道鬼者隂之靈神者陽之靈故曰鬼神隂陽也今昏禮者蓋將以主社稷之祭祀承先祖之宗廟也可不以敬社稷與先祖之禮敬之而元冕齋戒乎共牢注牢爼也而食同尊卑也故婦人無爵從夫之爵坐以夫之齒注爵謂夫命為大夫則妻為命婦器用陶匏尚禮然也注此謂太古之禮器也三王作牢用陶匏注言太古無共牢之禮三王之世作之而用太古之器重夫婦之始也厥明婦盥饋舅姑卒食婦餕餘私之也注私之猶言恩也舅姑降自西階婦降自阼階授之室也注明當為家事之主也昏禮不用樂幽隂之義也樂陽氣也注幽深也欲使婦深思其義不以陽散之也昏禮不賀人之序也注序猶代也曽子問孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也注謂舅姑沒者也必祭成婦義者婦有共養之禮猶舅姑存時盥饋特豚于室正疏昏禮奠菜之後更無祭舅姑之事此云祭于禰者謂奠菜也則廟見奠菜祭禰是一事也汪氏克寬曰案禮舅姑存成昏明日婦見舅姑共盥饋之禮此成昏三月擇日祭禰者則舅姑巳沒而婦見于廟也非謂廟見後擇日又祭也婦人謂嫁曰歸故稱來婦詩謂之子于歸易言歸妹是矣曰成婦之義者曰生既不獲供養于舅姑廟祭亦如生成盥饋之禮明敬事之當完故曰成婦之義也此雖存沒不同亦皆互文以見義耳然則廟見必待三月者父母既沒為人子者謂婦之來以成絲麻布帛以審守委積蓋藏者其事也和室人當于夫在中饋者其行也上以奉宗廟下以繼後世此又禮之重也職或不修有可去之事則不可以苟合也故必待久觀其成夫婦之道而後告廟焉此亦致敬于其所事也曲禮男女非受幣不交不親故日月以告君齋戒以告鬼神為酒食以召鄉黨僚友以厚其别也注日月娶婦之期也媒氏書之以告于君厚其别者重愼男女之倫也女子許嫁纓非有大故不入其門賀取妻者曰某子使某聞子有客使某羞吕氏曰賀者以物遺人而有所慶也著代以為先祖後人子之所不得已故不用樂且不賀也然為酒食以召鄉黨僚友則遺問不可廢也故其辭曰聞子有客使某羞舍曰昏禮而謂之有客則所以羞者佐其供具之費而已非賀也作記者因俗之名稱賀坊記昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也注舅姑妻之父母也妻之父為外舅妻之母為外姑父戒女曰夙夜無違命母戒女曰毋違宫事以此坊民婦猶有不至者注不至不親夫以孝舅姑也春秋成公九年春二月伯姫歸于宋夏五月季孫行父如宋致女是時宋共公不親迎恐其有違而致之也曲禮納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑注納女猶致女也不親迎則女之家遣人致之此其權也姓之言生也天子皇后以下百二十人廣子姓也吕氏大臨曰不敢以伉儷自期願備妾媵之數而已皆自卑之辭也馬氏晞孟曰納女者嫁女之家謙辭也備百姓者以嗣續為重備酒漿者以祭祀為重備掃灑者以賔客為重陸氏佃曰備百姓則百斯男太姒之事也曰備酒漿諸侯宜有禮樂之事焉曰備掃灑下于夫人有事人之道而已陳氏祥道曰傳曰凡公主嫁于敵國姊妹則上卿送之公子則下卿送之于大國雖公子亦上卿送之于天子則諸卿皆行于小國則上大夫送之故晉叔向送女于楚而薳啓疆曰上卿上大夫致之則送女謂之致女也納女而不及士何也儀禮凡女行于大夫以上曰嫁于士曰適人嫁者有家之辭適人則適于人而已此所以略而不言家語魯哀公問於孔子曰禮男必三十而有室女必二十而有夫也豈不晚乎孔子曰夫禮言其極也不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自昏矣羣生閉藏乎隂以以一作而為化育之始注陰冬也萬物翕聚于冬所以為發育之始也故聖人因時以合偶男女窮天數也注時謂婚姻之時窮天數即下文季秋冰泮之義承閉藏于陰而言矣霜降而婦功成嫁娶者行焉注季秋霜降嫁娶者始于此詩云將子無怒秋以為期也冰泮而農桑起昏禮始殺於此注泮解也正月農事起蠶者采桑昏禮始殺言猶未止也至二月農事已起乃會男女之無夫家者奔者期盡此月故也詩云士如歸妻逮冰未泮言如欲使妻歸及氷未泮散之盛時也男子者任天道而長萬物者也注乾知大始男乾道也知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其别謂之知所以效匹夫之聽也注聼宜為德女子者順男子之教而長其禮者也注坤作成物女坤道也是故無專制之義有三從之道幼從父兄既嫁從夫夫死從子言無再醮之端注禮女子當嫁父母醮而命之無再醮之端統言不改事人也教令不出於閨門注禮女不言外也事在共酒食而已注易曰無攸遂在中饋無門外之儀也注閫門限也婦人以自專為與閫外之事詩云無非無儀惟酒食是議言婦人得無非足矣有善者則非其所宜者也不越境而奔喪事無擅為行無獨成參知而後動可驗而後言晝不遊庭夜行以燭所以效匹婦之德也孔子遂言曰女有五不取逆家子者注謂其逆德也亂家子者注謂其亂倫也世有刑人子者注謂其棄于人也有惡疾子者注謂其棄于天也喪父長子者注謂其無受命也婦有七出三不去七出者不順父母者注謂其逆德也無子者注謂其絶世也淫僻者注謂其亂族也嫉妬者注謂其亂家也惡疾注謂其不可供粢盛也多口舌者注謂其離親也竊盜者注謂其反義也三不去者謂有所取無所歸注一也何休曰取作受不窮窮也與共更三年之喪注二也何休曰以其不忘恩也先貧賤後富貴注三也何休曰賤取貴不去不背德也凡此聖人順男女之際重昏姻之始也孟子女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也爾雅釋詁嫁往也劉熙釋名婦之父曰昏言壻親迎用昏又恆以昏夜成禮也壻之父曰姻姻因也女往因媒也白虎通禮曰女子十五許嫁納采問名納吉請期親迎以雁贄納徴曰玄纁故不用雁贄用雁者取其隨時南北不失其節明不奪女子之時也又取飛成行止成列也明嫁娶之禮長幼有序不相踰越也又昏禮贄不用死雉故用鴈也納徴玄纁束帛離皮玄三法天纁二法地也陽竒陰偶明陽道之大也離皮者兩皮也以為庭實庭實偶也天子下至士必親迎授綏者何以陽下隂也欲得其歡心示親之心也必親迎輪三周下車曲顧者防淫佚也遣女于禰廟者重先人之遺支體也不敢自專故告禰也父誡于阼階母誡於西階去不辭誡不告者蓋恥之重去也禮曰嫁女之家不絶火三日思相離也娶婦之家三日不舉樂思嗣親也感親年衰老代至也禮曰昏禮不賀人之序也娶妻不先告廟者示不必安也昏禮請期不敢必也婦入三月然後祭行舅姑既殁亦婦入三月奠采于廟三月一時物有成者人之善惡可得知也然後可得事宗廟之禮人君及宗子無父母自定娶者卑不主尊賤不主貴也大夫功成受封得備八妾者重國家廣繼嗣也不更聘大國者不忘本適也故禮曰納女于諸侯曰備灑掃天子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也王者之娶必先選於大國之女禮儀備所見多春秋曰紀侯來朝紀子以嫁女於天子故增爵稱侯至數十年之間紀侯無他功但以子為天王后故爵稱侯知雖小國者必封以大國明其尊所不臣也王者娶及庶人者何開天下之賢示不遺善也諸侯所以不得自娶國中何諸侯不得專封義不可臣其父母春秋傳曰宋三代無大夫惡其內娶也不娶同姓者重人倫防淫佚恥與禽獸同也外屬小功以上亦不娶也故春秋傳曰譏娶母黨也王者嫁女必使同姓諸侯主之何昏禮貴和不可相答為傷君臣之義亦欲使女不以天子尊乘諸侯也必使同姓者以其同宗共祖可以主親故使攝父事也不使同姓卿主之何尊加諸侯為威厭不得舒也不使同姓諸侯就京師主之何諸侯親迎入京師當朝天子為禮不兼春秋傳曰築王姬觀於外明不往京師也所以必更築觀者何尊之也不以路寢路寢本所以行政處非婦人之居也小寢則嫌羣公之舍則已卑矣故必改築于城郭之內也卿大夫妻二妾者尊賢重繼嗣也不備姪娣何北面之臣賤不足盡人骨肉之親禮服經曰貴臣貴妾明有卑賤妾也士一妻何下卿大夫禮喪服小記曰士妾有子則為之緦聘適未往而死媵當往否乎人君不再娶之義也天命不可保故一娶九女以春秋伯姬卒時娣季姬更嫁鄫春秋譏之嫡夫人死後更立夫人者不敢以卑賤承宗廟自立其娣者尊大國也春秋傳曰叔姬歸于紀叔姬者伯姬之娣也伯姫卒叔姫升於嫡經不譏也或曰嫡死不復更立明嫡無二防篡弒也祭宗廟攝而已以禮不聘為妾明不升婦人所以有師何學事人之道也詩云言告師氏言告言歸昏禮經曰教于公宫三月婦人學一時足以成矣與君無親者各教于宗廟婦人之室國君取大夫之妾士之妻老無子者而明于婦道又祿之使教宗室五屬之女大夫士皆有宗族自于宗子之室學事人也女必有傅姆何尊之也春秋傳曰傅至矣姆未至婦人學事舅姑不學事已父母者示婦與夫一體也禮內則曰妾事夫人如事舅姑尊嫡絶妬嫉之原禮服傳曰妾事女君與事舅姑同也婦事夫有四禮焉雞初鳴咸盥潄櫛縰笄總而朝君臣之道也惻隱之恩父子之道也會計有無兄弟之道也閨門之內袵席之上朋友之道也聞見異辭故設此也列女傳魯師春薑曰夫婦人以順從為務貞慤為首故婦事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道受期必誠則有朋友之信寢席之交而後有夫婦之際蕙田案以上昏禮之義晏子景公有愛女請嫁于晏子公乃往燕晏子之家飲酒酣公見其妻曰此子之內子耶晏子對曰然是也公曰嘻亦老且惡矣寡人有女少且姣請以滿夫子之宫晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼嘗託而嬰受之矣君雖有賜可以使嬰倍其託乎再拜而辭蕙田案此條男子守禮詩國風柏舟序柏舟共薑自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作詩以絶之注共伯僖侯之世子列女傳魯寡陶嬰者魯門之女也少寡養幼孤無強昆弟紡績為産魯人或聞其義將求焉嬰聞之恐不得免作歌明己之不更二也其歌曰悲夫黃鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行鳴呼哀哉兮死者不可忘飛鳥尚然兮况于貞良雖有賢匹兮終不重行魯人聞之曰斯女不可得已遂不敢復求嬰寡終身不改梁寡髙行者梁之寡婦也其為人榮于色而美于行夫死早寡不嫁梁貴多爭欲娶之者不能得梁王聞之使相聘焉髙行曰妾聞婦人之義一往而不改以全貞信之節今忘死而趨生是不信也貪貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刃以割其鼻曰妾已刑矣所以不死者不忍幼弱之重孤也于是相以報王大其義而髙其行乃復其身尊其號曰髙行陳寡孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戍夫且行時屬孝婦曰我生死未可知幸有老母無他兄弟儻吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰慈愛愈固紡績以為家業終無嫁意居喪三年其父母哀其年少無子而早寡也將取而嫁之孝婦曰妾聞之信者人之幹也義者行之節也妾幸得離襁褓受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄哉棄託不信背死不義不可也母固欲嫁之孝婦不從因欲自殺其父母懼而不敢嫁也遂使養其姑也二十八年姑死葬之終奉祭祀淮陽太守以聞漢孝文皇帝髙其義貴其信美其行使使者賜之黃金四十斤復之終身無所與號曰孝婦邵南申女者申人之女也既許嫁於酆夫家禮不備而欲迎之女與其人言以為夫婦者人倫之始不可不正傳曰正其本則萬物理失之毫釐差之千里是本立而道生源潔而流清故嫁娶者所以傳重承業繼續先祖為宗廟主也夫家輕禮違制不可以行遂不肯往夫家訟之於理致之于獄女終以一物不具一理不備守節持義必死不往孟姬者華氏之長女齊孝公之夫人也好禮貞一過時不嫁齊中求之禮不備終不往躡男席語不及外逺别嫌疑齊中莫能備禮求焉齊國稱其貞孝公聞之乃修禮親迎於華氏之室父母送孟姬不下堂母醮之房中結其襟褵戒之曰必敬必戒無違宫事父誡之東階之上曰必夙興夜寐無違命其有大妨于王命者亦勿從也諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠爾之襟䄜父母之言謂何姑姊妹誡之門內曰夙夜無愆爾之襟鞶無忘父母之言孝公親迎孟姬於其父母三顧而出親授之綏自御輪三曲顧姬輿遂納于宫三月廟見而後行夫婦之道東海鮑宣妻字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不悅曰少君生富驕習美飾而吾實貧賤不敢當禮妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之蕙田案以上女子守禮韓非子齊桓公微服以巡民家人有年老而自養者桓公問其故對曰臣有子三人家貧無以妻之傭未及反桓公歸以告管仲管仲曰畜積有腐棄之財則人飢餓宫有怨女則民無妻桓公曰美乃論宫中有婦人而嫁之下令于民也丈夫二十而室婦人十五而嫁漢書匡衡傳衡為光祿大夫太子少傅上疏曰臣聞室家之道修則天下之理得故詩始國風禮本冠昏始乎國風原情性而明人倫也本乎冠昏正基兆而防未然也福之興莫不本乎室家之道衰莫不始乎梱內故聖王必慎妃后之際别適長之位禮之于內也卑不踰尊新不先故所以統人情而理陰氣也元帝崩成帝即位衡上疏戒妃匹曰臣聞之師曰妃匹之際生民之始萬福之原昏姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好逑言能致其貞淑不二其操情欲之感無介乎儀容燕私之意不形乎動靜夫然後可以配至尊而為宗廟主此紀綱之首王教之端也自上世以來三代興廢未有不由此者也後漢書荀淑傳淑子爽延熹元年太常趙典舉爽至孝拜郎中對䇿陳便宜曰臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恆孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女于媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁于虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹于諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加于諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義孔子曰昔聖人之作易也仰則觀象於天俯則察法于地覩鳥獸之文與天地之宜近取諸身逺取諸物以通神明之德以類萬物之情今觀法于天則北極至尊四星妃后察法於地則崑山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴雊雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹逺取諸物則木實屬天根荄屬地陽尊隂卑蓋乃天性宜改尚主之制以稱乾坤之性昔者聖人建天地之中而謂之禮衆禮之中昏禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老夀之福後世之人好福不務其本惡禍不易其軌傳曰截迹適屨孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕廪糧耗費縑帛空竭府藏徴調增倍十而稅一空賦不辜之民以供無用之女百姓困窮于外隂陽隔塞於內故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和隂陽二曰省財用實府藏三曰修禮制綏眉夀四曰配陽施祈螽斯五曰寬役賦安黎民此誠國家之宏利天人之大福也蕙田案以上帝王重昏之義文中子中説子曰昏娶而論財夷虜之道也君子不入其鄉古者男女之族各擇德焉不以財為禮安定胡氏遺訓嫁女必須勝吾家勝吾家則女之事人必欽必戒娶婦必須不若吾家不若吾家則婦之事舅姑必執婦道世範男女不可于幼小之時便議昏姻大抵女欲得托男欲得偶若論目前悔必在後蓋富貴盛衰更迭不常男女之賢否須年長乃可見若早議婚姻事無變易固為甚善或昔富而今貧或昔貴而今賤或所議之女狠戾不檢從其前約則難保家背其前約則為薄義而爭訟由之以興可不戒哉男女議親不可貪其閥閲之髙資産之厚苟人物不相當則子女終身抱恨况又不和而生他事者乎有男雖欲擇婦有女雖欲擇壻又須自量我家子有女如何如我子愚癡庸下若娶美婦豈特不和或他事如我女醜拙狠妬若嫁美壻萬一不和卒為其棄出者有之凡嫁娶因非偶而不和者父母不審之罪也人之議親多要因親及親以示不相忘此最風俗好處然其婦女無逺識多因相熟而相簡至于相忽遂至于相爭而不和反不若素不相識而驟議親者故凡因親議親最不可託熟闕其禮文又不可忘其本意極于責偹則兩家周致無他患矣故有姪女嫁于姑家獨為姑氏所惡甥女嫁于舅家獨為舅妻所惡姨女嫁于姨家獨為姨氏所惡皆由玩意于其初禮薄而怨生又有不審于其初之過者嫁女須隨家力不可勉強然財産寬餘亦不可視為他人不以分給今世固有生男不得力而依託女家及身後葬祭皆由女子者豈可謂生女之不如男孤女有分必隨力厚嫁合得田産必依條分給若吝于目前必致嫁後有所陳訴蕙田案以上男女擇昏之義右昏義易屯卦六二屯如邅如乘馬班如匪寇昏媾女子貞不字十年乃字朱子本義字許嫁也禮曰女子許嫁笄而字六二隂柔中正有應於上而乘初剛故為所難而邅回不進然初非為寇也乃求與己為昏媾耳但已守正故不之許至于十年數窮理極則妄求者去正應者合而可許矣姤卦姤女壯勿用取女程傳取女者欲其柔和順從以成家道姤乃方進之陰漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣孟子萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也孟子曰不孝有三無後為大舜不告而娶為無後也君子以為猶告也論語子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之南容三復白圭孔子以其兄之子妻之禮記曾子問曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母注弔禮不可廢也父母不在則稱伯父世母伯父母又不在則稱叔父母也壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也注必致命者不敢以纍年之喪使人失嘉會之時壻免喪女之父母使人請壻弗取而後嫁之禮也注請請成昏以疏壻免喪之後則應迎婦必須女之父母請者壻家既葬致命于己壻既免喪所以須請也女之父母死壻亦如之注女免喪壻之父母亦使人請其已葬時亦致命疏男氏許諾而不敢娶女家不許壻而後别娶陽唱隂和壻之父母使人請昏而女家得冇不許者亦以彼初葬訖致命于已故也徐氏乾學曰或謂既納幣有吉日壻既免喪乃弗取而復嫁之似非禮之正何以為禮也不知壻免喪而女之父母使人請之以免喪所以須請也壻弗取而後嫁之必壻弗取而後嫁也若壻免喪而許娶則必取之矣此亦權禮之變也非壻必弗取而嫁之者也曾子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪注布深衣縞總婦人始喪未成服之服女在塗而女之父母死則女反如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服于內次然後即位而哭注不聞喪即改服者昏禮重于齊衰以下疏男謂壻也不入大門改其親迎之服服深衣于門外之次女謂婦也入夫門改其嫁服亦服深衣于門內之次然後就喪位而哭謂于壻室皇氏以為就喪家也然曾子不問小功者雜記云小功可以冠子取婦明小功輕不廢昏禮待昏禮畢乃哭也若女家齊衰大功之喪皇氏云不反歸其改服即位與男家親同也禮運云三年之喪與新有昏者期不使又王制云齊衰大功三月不從政是昏禮重于齊衰以下也此謂在塗聞齊衰大功廢昏禮若婦已揖遜入門內喪則廢外喪則行昏禮約上冠禮之文然昏禮重于冠故雜記云大功之末可以冠子小功之未可以取妻也曾子問曰除喪則不復昏禮乎注復猶償也為疏復是反覆之義故償也曾子以初昏遭喪不得成禮除喪之後豈不酬償更為昏禮乎孔子曰祭過時不祭禮也又何反于初注重喻輕也同牢及饋饗相飲食之道疏祭重而昏輕重者過時尚廢輕者不復可知祭祀是奉事鬼神故為重昏禮是生人燕飲故為輕曽子問曰女未廟見而死則如之何孔子曰不遷于祖不祔于皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也注不遷于廟不遷柩而朝于壻之祖廟也不祔于皇姑以未廟見故主不得祔姑之廟壻齊衰期但不杖不草履不别處哀次耳女之父母自降服大功曾子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之注未有期三年之恩也女服斬衰疏壻于女未有期之恩女于壻未有三年之恩以壻服齊衰故知女服斬衰雜記大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以娶婦已雖小功既卒哭可以冠娶妻下殤之小功則不可注此謂可用吉禮之時父大功卒哭可以冠子小功卒哭可以娶妻必偕祭乃行也下殤小功齊衰之喪除喪而後可為昏禮疏大功謂已有大功之喪末謂卒哭之後取婦有酒食之會集鄉黨僚友涉近歡樂故小功之末乃可得為也經文大功據己身不云父小功據其父不云身互而相通故鄭注同之謂父及己身俱有大功之末小功之末父是大功之末已亦是大功之末乃得行此冠子嫁子父小功之末已亦是小功之末可以嫁取必父子俱然乃得行事故云必偕祭乃行通典已拜時而後各有周喪迎婦遣女議晉懷帝永嘉中太常潘尼為子娶黃門郎李循女已拜時後各有周喪潘迎婦李遣女國子博士江統侍中許遐同議已拜舅姑者宜準女在途之禮齊衰大功三月既葬可迎婦案禮記在途而壻之父母死則改服赴喪女之父母死反而服周今已拜舅姑其義同于在塗也降其親而服夫黨非婦而何禮父母既沒而娶三月廟見成婦之義舅姑存則盥饋特豚以成婦道皆明重其成婦不繫其成妻也然則未廟見女死還葬於女氏若已見舅姑雖無袵席之接固當歸葬于夫家此非可否之斷乎禮壻親迎女未至而有齊衰大功之喪男不入改服於外次女入改服於內次即位哭又齊衰大功之喪三月既葬雖不可以納徴而可正御矣何琦駁江許議曰夫正名者理道之本然拜時非古而行之歷代遂以成俗古者布其几筵恭告祖禰將納他族以奉宗事父親醮子而命之迎女受父母之遣以涉夫氏之庭而交拜敬之禮方之在途喪紀定矣服制既正齊功卒哭可迎此不闕于古而通于今議是也然昏姻之道公私急務愚以為拜時及一日二日之婦婦名既正即宜一揆其衾幬未接歸葬其黨東晉廢帝太和中平北將軍郤愔上言功曹魏隲周喪內迎拜時婦鄉曲以違禮譏之謝奉與郤箋曰魏隲後來之良足以日新其美近聞邑有異議從弟異亦當拜時婦家遭喪即是其例夫拜之禮誠非舊典蓋由季代多難男女宜各及時故為此制以固昏姻之義也雖未入壻門今年吉辰拜後歲俗無忌便得以成婦迎之正以䇿名委質有定故也謝安議拜時雖非正典代所共行久矣將以三族多虞歲有吉忌故逆成其禮耳宋庾蔚之謂俗既流弊故以拜時代三日推其始意當是貪得從省以赴吉歲若周大功之喪既葬不可迎已拜之婦則與始昏不異非其旨也已拜時壻遭小功喪或婦遭大功喪可迎議晉中書郎范汪問劉惔曰從妹與荀始文昏已及好歲拜時有從叔父德度喪會叔親患危篤欲令荀氏迎從妹盡婦敬於夫氏以有此喪為難故為此議拜時出於近代將以宗族多虞吉事宜速故好歲拜新年便可迎也惡歲可迎是拜時已成婦也在途之婦猶服夫氏况已交拜成禮便當迎是長還也惔答云荀今從叔喪三月小功之服禮云小功之末可以納妻如此自可比初昏何疑蔡謨曰古人君爵命其臣在逺則遣使太公既封齊五侯九伯實得征之即王使名康公所命也至今詔使拜授亦當如此豈有疑乎易曰家有嚴君焉父母之謂今壻父命使拜其婦女父遣女拜受此命即是太公受命于召康公令人拜爵于詔使也而云未拜舅姑未為成婦然則太公未拜周王亦非方伯乎不修婦禮是其失耳至于是婦與非自當以典禮為正安得從彼所行假令太公不行臣禮王者便當不臣之乎謂拜壻之宗親與拜舅姑於禮無異又會稽王道子與王彪之書曰東海王來月欲迎妃而女身有大功服此于常禮當是有疑但先拜時大禮已交且拜時本意亦欲通如此之閡耳不得同之初昏固當在于可通彪之答曰女有大功服若初昏者禮例無許既已拜時猶復不同昔中朝許侍中等會議此事以為拜時不應以喪為疑倚傍經禮甚有理據談者多謂是殿下可視而量之拜時婦三日婦輕重議案禮經昏嫁無拜時三日之文自後漢魏晉以來或為拜時之婦或為三日之昏魏王肅鍾育育弟會陳羣羣子泰咸以拜時得比於三日晉武帝謂山濤曰拜于舅姑可準廟見三日同牢允稱在塗濤曰愚論已拜舅姑重于三日所舉者但不三月耳張華謂拜時之婦盡恭于舅姑三日之昏成吉于夫氏準于古義可為成婦已拜舅姑即是廟見常侍江應元等謂已拜舅姑其義同于在塗或曰夫失時之女許不備禮蓋急嫁娶之道也三日之婦亦務時之昏矣雖同牢而食同衾而寢此居室袵席之情義耳豈合古人亡則奠菜存則盥饋而婦道成哉且未廟見之婦死則反葬女氏之黨以此推之貴其成婦不係成妻明拜舅姑為重接夫為輕所以然者先配而後祖陳針子曰是不為夫婦誣其祖矣非禮也此春秋明義拜時重于三日之徴也議曰有夫婦而後有父子有父子而後有君臣則昏姻王化所先人倫之本拜時之婦禮經不載自東漢魏晉及于東晉咸有此事案其儀或時屬艱虞歲遇良吉急於嫁娶權為此制以紗縠幪女氏之首而夫氏發之因拜舅姑便成婦道六禮悉捨合卺復乖隳政教之大方成容易之弊法王肅鍾育陳羣山濤張華蔡謨皆當時知禮達識者何為不非之耶或時俗久行因循且便或彼衆我寡議論莫從者乎宋齊以後斯制遂息後之君子無愧前賢周喪不可嫁女娶婦議晉惠帝元康二年司徒王渾奏云前以冒喪昏娶傷化悖禮下十六州推舉今本州中正各有言上太子家令虞濬有弟喪嫁女拜時鎮東司馬陳湛有弟喪嫁女拜時上庸太守王崇有兄喪嫁女拜時夏侯俊有弟子喪為息恆納婦恆無服國子祭酒鄒湛有弟婦喪為息蒙取婦拜時蒙有周服給事中王琛有兄喪為息稜娶婦拜時并州刺史羊暨有兄喪為息明娶婦拜時征西長史牽昌有弟喪為息彥娶婦拜時湛職儒官身雖無服據為昏主案禮大功之末可以嫁子小功之末可以娶婦無齊衰嫁女之文虧違憲典宜加貶黜以肅王法請臺免官以正清議尚書符下國子學處議國子助教吳商議今之拜時事畢便歸昏禮未成不得與娶婦者同也俊琛稜並以齊衰娶婦娶妻所犯者重恆雖無服當不議而不諍亦禮所譏然其所犯者猶輕于稜也湛身既平吉子雖齊衰義服之末又不親迎吉凶别處所犯者輕濬暨為子拜時拜時禮輕當降也國子祭酒裴頠議以為吉凶之别禮之大端子服在凶而行嘉禮非所以為訓雖父兄為主事由已興此悉人倫大綱典章所慎也詔曰下殤小功不以娶俊等簡忽喪紀輕違禮經皆宜如所正司直劉隗上言文學王籍有叔母服未一月納吉娶妻虧俗傷化宜加貶黜輒下禁止妻父周嵩知籍有喪而成昏無王孫恥奔之義失為父之道王廙王彬于籍親則叔父皆無君子幹父之風應清議者任之鄉論主簿江啓曰夫風節不振無以蕩弊俗禮義不備無以正人流籍以名門耀登賔友不能率身正道公違典憲誠是愷悌垂恕體例宜全又東閣祭酒顔含居叔父喪而遣女推尋舊事永康二年虞濬陳湛各有弟喪嫁子拜時司徒王渾奏免竊謂弟喪不重于叔父成昏之禮不輕于拜時含犯違禮典夫崇禮謂之有方之士不崇禮謂之無方之人况虧淳創薄崇俗棄禮請免官禁止從事中郎謝潛議鄭玄以為女子成人逆降旁親及將出者昔陳湛以女年過二十依鄭議不責遷任徐州不為坐免久為成此若含女未過二十宜如隗奏若謂鄭玄説與禮違當先除而後禁不宜制未下而責人也主簿孔夷議鄭以未嫁成人降其旁親以明當及時與不及時者同降若嫁有時而遭喪因喪而降之非言齊衰之中可嫁女學者多失此旨非獨在今含應見原王濛息叔仁兄十月亡至十二月詔其子與琅琊王昏拜時叔仁以喪辭范尚書與會稽王箋為伸其意會稽王答曰既有所準情理可通故人主權而行之自君作故古之制也古人墨絰從事豈情所安通于君命之所制奪人臣之所屈乃至于此以今方之事情輕重豈得同日而欲執違耶又今自非拜時未為備禮暫一致身交拜而已即之于情有何不可且今王氏情事與國家正同王命既定事在必行太常王彪之與會稽王箋曰王濛女有同生之哀計其日月尚未絶哭豈可成昏凡在君子猶愛人以禮况崇化之主耶以此為聖人故事寧可執訓當今宜流後裔忝偹禮官情有不安謹具白所懷周服降在小功可嫁女娶妻議晉范郎問蔡謨曰甲有庶兄乙為人後甲妹景已許嫁而未出今乙亡如鄭玄意已許嫁便降旁親者景應為乙服小功本是周親甲今於禮可得嫁景不蔡答曰案禮大功之末可以嫁子不言降服復有異也兄在大功嫁降服小功之妹猶父在大功嫁小功之女也謂甲今嫁景于禮無違范難曰禮小功不稅降而小功則稅之又小功不易喪之練冠而長殤中殤之小功則變三年之葛又小功之末可以娶妻而下殤之小功則不可據此數事則明降服正服所施各異今子同之其理何居蔡答曰夫服有降有正此禮之常也若其所施必皆不同則當舉其一例無為復説稅與娶也今而然者明其所施有同有異不可以一例舉故隨事而言之也鄭君以為下殤小功不可娶者本齊衰之親也案長殤大功亦齊衰親而禮但言下殤不可以娶而不言長殤不可嫁明殤降之服雖不可娶而可嫁也所以然者陽唱隂和男行女從和從者輕唱行者重二者不同故其制亦異也范又難曰禮舉輕以明重下殤猶不可娶言長殤大功何可以嫁知禮所謂大功末者唯正服大功末耳蔡答曰下殤不可娶妻者謂己身也吾言長殤可以嫁子者謂女父也身自行之于事為重但施於子其理差輕然則下殤之不娶未足以明長殤之不嫁也又東晉臺符廬陵公主薨琅琊東海二王于禮為應得昏與不太常王彪之曰二王出後二國禮為人後降本親一等又云為姑姊妹適人者小功二王應制小功之服禮小功絶哭可以娶妻下殤之小功則不可先儒之説本齊衰之親故除喪而後可昏今二王雖以出後降服本亦齊衰之親情禮如例不應成昏也宋庾蔚之謂禮云下殤之小功則不可而不云再降之小功則知再降之小功可以娶大功末可為子娶婦議晉御史中丞髙嵩有從弟喪在服末欲為兒昏書訪尚書范汪曰禮有大功之末可以嫁子小功之末可以娶婦下章云已雖小功既卒哭可以娶妻已有小功喪則父便應有大功喪以義例推之小功卒哭可以娶妻則大功卒哭可以娶婦耶有舅姑曰婦無舅姑曰妻范答曰案禮大功之末可以冠子嫁子此於子已為無服也以已尚在大功喪中猶未忍為子娶婦近于歡事也故于冠子嫁子則可娶婦則不可矣已有緦麻之喪于祭亦廢昏亦不通矣况小功乎嵩又曰禮已雖小功既卒哭可以娶妻已有小功則父有大功已既小功卒哭可娶妻則父大功卒哭可娶婦將不嫌耶汪曰五服之制各有月數月數之內自無吉事故曰衰麻非所以接辨冕也春秋左氏傳齊侯使晏子請繼室于晉叔向對曰寡君之願也縗絰之中是以未敢請時晉侯有少薑之喪耳禮貴妾緦而叔向稱在衰絰之中推此而言雖輕喪之麻猶無昏姻之道也而敦本敬始之義每于昏冠見之矣雜記曰大功之末可以嫁子小功之末可以娶婦案大功之末未忍為子娶婦小功之末乃為子娶耳而下章云已雖小功卒哭可冠娶妻也二文誠為相代尋此旨為男女失時或繼嗣未立者耳非通例也禮男三十而娶女二十而嫁至于仲春會男女便云于此時也奔者不禁此亦是權禮非經常之典也嵩又訪于江彪彪答曰案大功之末可以嫁子小功之末可以娶婦又已小功卒哭可以娶妻此悉是明文正例當不如范語為此議者皆于為昏之主也娶婦則父為主取妻則已為主故父大功之末不得行此嘉禮至于已小功之末則可行之又禮稱娶妻則是無父之子正文謂大功之末娶婦於禮例猶尚不安今所為者重所虧者輕又準時人由來之比自不致嫌于是嵩依議為兒昏祖無服父有服可娶婦嫁女議晉劉嗣問徐野人曰嗣去年十二月有周慘欲用六月昏兒服早已除大人本無服便是一家主想無復異徐答曰此議本據祖為孫兒昏自平吉可得娶妻不計兒之有慘也嗣弟損又重問野人曰諸賢唯云祖尊一家得為昏主若便昏損疑速也徐答曰今歸重于王父理無取于遲速損重問曰禮云嫁女之家三夜不息燭取婦之家三日不舉樂得不有輕不又大功之末可以嫁女則男不得昏向家是嫁女今是已子昏男女詎無異耶向家亦是祖無服而父有周慘得嫁女徐答曰秉燭請樂居然輕重故嫁娶殊品至于今事理本分塗唯取歸重極尊而不别異男女一也又宋向歆問何承天曰父有伯母慘女服小功祖尊統一家年末可得嫁孫女不何答曰吾謂祖為昏主女身又小功服不嫌于昏鄭尚書曰祖為昏主女父不與昏事意謂可昏周續之曰禮已雖小功可以冠娶妻則女身雖有服謂出門無嫌也伯母義服而祖為家主於禮可通徐野人曰禮許變通記所稱父大功者當非有祖之家又公羊傳云不以父命辭王父命推附名例義在尊無二上容或可通理耶降服及大功末可嫁姊妹及女議晉南陽中正張輔言司徒府云故涼州刺史楊欣女以九月二十日出赴姊喪殯而欣息俊因喪後二十六日強嫁妹與南陽韓氏而韓就楊家共成昏姻韓氏居妻喪不顧禮義三旬內成昏傷化敗俗非冠帶所行下品二等本品第二人今為第四請正黃紙梁州中正梁某言俊居姊喪嫁妹犯禮傷義貶為第五品又宋江氏問裴松之曰從兄女先尅此六月與庾長史弟昏其姊祭氏先三月亡葬送已畢從兄無嗣兄子簡為後今與從妹同服大功大功末可以嫁子不知無父而兄有大功服可復嫁妹否答曰意謂父有大功尚可嫁子兄在大功理無不可今所未了者未知女身大功亦可得嫁不又降而在大功得與本服九月者同不見宗濤答范超伯問娶婦之與嫁子輕重有一等之差已身小功可以娶妻女身大功何為不可以嫁謂此言為是但其論降在大功者如為不盡吾以為聘納禮重故探其本情適人差輕故以見服為斷禮無降在大功不可嫁子之文不應于外生疑且有下殤小功之喪過五月便可以娶降在九月者過三月而後嫁計其日月亦一等之謂也荀伯子難裴曰本不謂父可而兄反不可今所疑謂父兄及女身並不可耳案禮小功之喪不可嫁子其末則可以娶妻下殤之小功則不可以所本是周服故也今降在大功亦本是周服何容復於降殺之內以行昏姻之禮耶禮云大功之末可以嫁子者自是論本服耳所以不明降在大功不可者正以下殤之小功足以包之也若謂降與不降必其不殊者其兄弟出後姊妹出適便再降為小功矣請問居此小功服在始亦可即以嫁子乎三月卒哭又可以娶妻乎奚獨慈于下殤而薄于出降之甚耶何承天通裴難荀曰昏禮吉而非樂貴不失時元康中有犯喪者為憲司所紏都無降服大功嫁女之彈彼豈輕犯周制重犯功服耶固于禮自通不應致譏耳足下謂下殤小功不可娶足以包降在大功不可嫁夫徹樂興嗣親之感繼燭發離别之悲唱行重于和從受禮輕于納幣既有一等之差本服周者雖不得娶何疑得嫁耶若本降為大功不可嫁者大功降為小功亦不可娶豈獨下殤小功而已乎斯不然矣李嵩為息邃昏張康女未成禮而康有姊喪已葬二家昏皆務速書問太常馮懷懷曰降服不與正服同者謂居處之節耳大功之末可冠子嫁子明冠宜時成嫁宜及時先儒云末者服半之後也張氏所服既半將非所疑又魏放之問孔琳之曰降在大功當得嫁女不答曰吾意降者似不得昏記稱大功之末可以嫁子小功之末可以娶妻不云不可嫁子者此便是得嫁也傅都官駁孔議曰娶妻嫁子雖為不同然可以例求也何者小功絶哭之後可以娶妻至于下殤之小功則不可也本服重而降在小功既不得同小功而娶妻本服周而降在大功豈可同大功而嫁子乎孔答曰娶妻事重嫁子事輕今若云不可納婦容可以嫁子為難耳既不明不以嫁子而獨明不可以娶妻事重非其類矣傅難曰今舉重以明輕何以謂之不類孔答曰傅意謂本周而在大功小功者則不得冠子嫁子納婦娶妻四事夫冠嫁納婦三事皆子身之吉事事不在己娶妻一事非在他人乃己身之吉事在子則輕在身則重輕故可行之於服末重必卒哭而後可以降殺之明義亦既差降則事何必齊今若欲徴其文觀于輕者則知重者應明輕者猶不可則重者不言自彰而今獨言小功之殤不可以娶妻是指言重者不可也重者自不可輕者自可有差何得輕必從重耶又宋庾蔚之曰昔為禮記略解已通此議大功重而嫁輕小功輕而娶重故大功之末可以嫁小功之末可以娶也所以然者下殤小功本周親者以其殤折之痛既人情所哀不可以娶長殤大功鄰於成人大功接於齊衰周親之內于情差重冠嫁之事可同于成人之大功故不言長殤大功之不嫁也降服喪已除猶在本服月內可嫁議晉謝琰問車胤曰人有妹喪降服已除本服未周可得嫁否答曰禮小功不稅降在小功者則稅是推本情不計見服也時人有以此昏嫁者僕常疑之孫騰答人有卜日除服便以昏况降服已徐禮有大斷此都無疑蕙田案禮記曾子問皆所以處昏禮之變也惟聖人可以權處變觀夫子之言可為義精仁熟而為萬世法矣雜記一條可補其略通典所載晉人辨議深足發明朱子文集答李繼善問孝述議親十年輾轉牽制尚未成畢老母欲令今冬畢親但先兄几筵未徹老母乃齊衰三年之服復有妨礙然主昏却是叔父姑從鄉族就親不知可否若就畢挈歸凡百從殺衣服皆從素淡不知可否曰若叔父主昏即可娶婦無嫌禮律皆可考也但母在而叔父主昏恐亦未安更可詳考也又問孝述謹案禮壻將親迎父醮而命之今孝述父兄俱沒上惟母在旁尊有叔父不知往迎之時當受母命耶為復受叔之命耶曰當受命于母然母既有服又似難行記得春秋隱公二年公羊傳有母命其諸父兄而諸父兄以命使者之説恐可檢看為叔父稱母之命以命之否更詳之更以上條并考之又問孝𫐠又案禮婦盥饋舅姑若舅姑既殁不知可以叔父受盥饋禮否曰叔父無盥饋之文蓋與姑受禮禮相妨也母若有服則亦難行此禮要是本領未正百事俱礙耳蕙田案此父沒兄期喪已畢牽于母服未除而不便娶以叔父受母命主昏但不行盥饋亦禮之變也又答應仁仲趙氏聘幣無置之之所故遣歸之今既不受未有以處欲如來諭納之於壙則今已葬且此間之葬例薄然亦時有意外之患欲置少田以給墓户則亦不必如此之多欲以施諸鄉人之為橋道者則似于義亦無所當反復思之唯有别以它女再結姻好之為善而家間諸女及孫雖多而年嵗無相當者其最長者才十有二耳似此再三籌度皆未有計不知賢者何以教之使于義稍安而無所疑也蕙田案此既受幣而女死者遣歸不受無所處之亦禮之變或以女年十二者結姻而待年成昏可也雜記諸侯出夫人夫人比至于其國以夫人之禮行至以夫人入使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告于執事主人對曰寡君固前辭不教矣寡君敢不敬須以俟命有司官陳器皿主人有司亦官受之注出夫人有罪而出之還本國也在道至入猶以夫人禮者致命其國然後義絶也將命者謙言寡君不敏不能從夫人以事宗廟社稷而不斥言夫人之罪答言前辭不教謂納采時固嘗以此為辭矣疏有司官陳器皿者陳夫人嫁時所齋器皿之屬以還主國也亦官受之者主國亦使有司官領受之也並云官者明付受悉如法也此諸侯禮也妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命使者退主人拜送之如舅在則稱舅舅沒則稱兄無兄則稱夫主人之辭曰某之子不肖如姑姊妹亦皆稱之注姑姊妹見棄亦曰某之姑不肖或某之姊不肖或某之妹不肖故云亦皆稱之也疏此卿大夫以下之禮也家語曾參後母遇之無恩而供養不衰及其妻以藜蒸不熟因出之人曰非七出也參曰藜蒸小物耳吾欲使熟而不用吾命况大事乎遂出之終身不取妻其子元請焉參告其子曰髙宗以後妻殺孝己尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免于非乎右昏禮之變易歸妹歸妹征凶無攸利注妹者少女之稱也兑為少隂震為長陽少隂而承長陽説以動嫁妹之象也然疏歸妹者卦名也婦人謂嫁曰歸歸妹猶言嫁妹也易論歸妹得名不同泰卦六五云帝乙歸妹彼據兄嫁妹謂之歸妹此卦名歸妹以妹從娣而嫁謂之歸妹故初九爻辭云歸妹以娣是也卦以少承長非是匹敵明是妹從娣嫁故謂之歸妹焉古者諸侯一娶九女嫡夫人及左右媵皆以娣姪從故以此卦當之矣不言歸姪者女弚是兄弟之行亦舉尊以包之也彖曰歸妹人之終始也説以動所歸妹也注少女而與長男交嫁而以娣是以説也動疏既係娣為媵不得别適若其不以備數更有望之憂故係娣而行合禮説以動也初九歸妹以娣跛能履征吉注娣少女之稱也少女之行善莫若娣少女以娣雖跛能履象曰歸妹以娣以恆也跛能履吉相承也注少女謂之妹從娣而行謂之歸初九以兑適震非夫婦匹敵是從娣之義也六三歸妹以須反歸以娣注室主猶存而求進焉進未值時故有須也不可以進故反歸待時以娣乃行也九四歸妹愆期遲歸有時象曰愆期之志有待而行也注嫁宜及時今乃過期而遲歸者此嫁者之志正欲有所待而後乃行也六五帝乙歸妹其君之袂不如其娣之袂良詩召南江有泛之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌序江有汜美媵也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也音義媵音孕古者諸侯娶夫人則同姓二國媵之嫡正夫人也名疏嫡謂妻也媵謂妾也謂之媵者以其從嫡以送為也故士昏禮注云媵送也古者女嫁必娣姪從謂之媵也士昏禮云雖無娣媵先言姪若無姪娣猶先媵是士有姪娣但不必備耳喪大記大夫撫姪娣是大夫有姪娣矣公羊傳曰諸侯一取九女二國媵之所從皆名媵獨言二國者異國主為媵故特名之其實雖夫人姪娣亦為媵也大雅韓奕諸娣從之祁祁如雲韓侯顧之爛其盈門傳諸侯一取九女二國媵之諸娣衆妾也之箋媵者必娣姪從之獨言娣者舉其貴者疏衆妾名有姪有娣有媵媵又自有姪娣其名不盡為娣而言諸娣衆妾者以衆妾之中娣為最貴故舉娣以言衆妾也明可以兼姪娣也春秋隱公七年春王三月叔姬歸於紀注叔姬伯姬之娣也至是歸者待年于父母國不與嫡俱行故書榖梁傳其不言逆何也逆之道微無足道焉爾注媵之為言送也從也不與嫡俱行非禮也許慎曰姪娣年十五以上能共事君子可以往二十而御易曰歸妹愆期遲歸有時娣必少于嫡知未二十而往也莊公十有九年秋公子結媵陳人之婦於鄄遂及齊侯宋公盟注公子結魯大夫公羊穀梁皆以為魯女媵陳人之婦其稱陳人之婦未入國略言也疏成九年伯姬歸于宋晉衛齊三國來媵然則為人媵者皆送至嫁女之國使之從嫡而行也公羊傳媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶媵不書此何以書為其有遂事書注言往媵之者禮君不求媵二國自往媵夫人所以一夫人之尊必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也因以備尊尊親親也九者極陽數也不再娶者所以節人情開媵路也榖梁傳媵淺事也不志此其志何也辟要盟也何以見其辟要盟也媵禮之輕者也盟國之重也以輕事遂乎國重無説其曰陳人之婦略之也其不日數渝惡之也成公八年冬衛人來媵注古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人凡九女所以廣繼嗣也當時雖無其人必待年而送之所以絶望求塞非常也辭稱蠢愚不教故遣大夫隨之亦謂之媵臣所以將謙敬之實也夫人薨不更聘必以姪娣媵繼室一與之醮則終身不二所以重昏姻固人倫人倫之義既固上足以奉宗廟下足以繼後世此夫婦之義也左氏傳衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否注必以同姓者參骨月至親所以息隂訟公羊傳媵不書此何以書注逆女不書媵也言來媵者禮君不求媵諸侯自媵夫人録伯姬也注伯姬以賢聞諸侯諸侯爭欲媵之故善而詳録之榖梁傳媵淺事也不志此其志何也以伯姬之不得其所故盡其事也九年晉人來媵注媵伯姬也左氏傳晉人來媵禮也注同姓故公羊傳媵不書此何以書録伯姬也十年齊人來媵注媵伯姬也異姓來媵非禮也公羊傳媵不書此何以書録伯姬也三國來媵非禮也曷為皆以録伯姬之辭言之婦人以衆多為侈也注伯姬以至賢為三國所爭媵故侈大其能容之惟天子娶十二女子疏惟天子取十二女保乾圖文孔為後王非禮也榖梁范注異姓來媵非禮楊疏何休以為異姓亦得媵故鄭針膏盲難之云天子云備百姓博異氣諸侯直云備酒漿何得有異姓在其中是亦以異姓不合媵也此媵不發傳者上詳其事見同姓之得禮異姓非禮可知啖氏助曰左氏云凡諸侯嫁女同姓媵之異姓則否若然則莒姓已邾姓曹此二國同姓至少如嫁女孰為媵乎恐此禮難行今則不取趙氏曰左氏云異姓則否啖子難之誠為當矣若實異姓不合媵則成十年直云齊人來媵足知非禮何假先書衛晉乎所以先書二國者明九女已足而又來媵所以為失禮非謂譏異姓來媵其義甚明蕙田案杜注夫人媵娣同姓之國國三人凡九女國三人者謂夫人本國娣媵二其餘兩國各三人也夫女之多少難以懸定一娶九女特因其自有非必定三人也或本國之數多于三人或不及三人兩國之媵亦如是耳左公榖皆言異姓來媵非禮啖氏趙氏以為不然趙氏又謂九女已足而又來媵所以為非禮恐亦曲説安知非晉衛二國媵不及數而齊人足之耶襄公二十三年左氏傳晉將嫁女于吳齊侯使析歸父媵之注禮媵同姓適異姓今晉嫁女於同姓齊以異姓為媵皆非禮也管子國君聘妻於異姓設為姪娣命婦宫女盡有法制所以治其內也明男女之别昭嫌疑之節所以防其姦也是以中外不通讒慝不生婦言不及官中之事而諸臣子弟無宮中之交此先王所以明德圉姦昭公威私也白虎通天子諸侯一娶九女何重國廣繼嗣也適也者何法地有九州承天之施無所不生也娶九女亦足以成君施也九而無子百亦無益也或曰天子娶十二女法天有十二月萬物必生也必一娶何防淫佚也為其棄德嗜色故一娶而已人君無再娶之義也備姪娣從者為其必不相嫉妬一人有子三人共之若已生子不娶兩姓何傳異氣也娶三國女何廣異類也恐一國血脈相似俱無子也姪娣年雖少猶從適人者明人君無再娶之義也還待年于父母之國未任答君子也二國來媵誰為尊者大國為尊國等以德德同以色質家法天尊左文家法地尊右所以不聘妾何人有子孫欲尊之義義不可求人以為賤也春秋傳曰二國來媵可求人為士不可求人為妾何士即尊之漸賢不止于士妾雖賢不得為嫡右娣媵春秋隱公元年左氏傳惠公元妃孟子孟子卒繼室以聲子生隱公注聲諡也蓋孟子之姪娣也諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治內事猶不得稱夫人故謂之繼室繼疏襄二十三年傳稱臧宣叔娶于鑄生賈及為而死室以其姪則姪之與娣皆得繼室經傳之説諸侯惟有繼室之文皆無重昏之禮故知元妃死則次妃攝治內事次妃謂姪娣與媵諸妾之最貴者釋例曰夫人薨不更聘必以姪娣媵繼室是夫人之姪娣與二媵皆可以繼室也右繼室詩豳風伐柯取妻如何匪媒不得傳媒所以用禮也之箋媒者能通二姓言定人室家之道周禮地官媒氏下士二人史二人徒十人注媒之言謀也謀合異類使和成者類疏媒氏在此者集名云配儷取地道生息故在此也異謂别姓三十之男二十之女和合使成婚姻禮記曲禮男女非有行媒不相知名注見媒往來傳昏姻之言乃相知姓名行疏相知男女名者先須媒氏傳昏姻之意後乃知名坊記夫禮坊民之淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也以此坊民民猶有自獻其身公羊傳使我為媒可則因用是往逆矣孟子媒妁之言注妁音酌丁云謂媒氏酌也二姓之可否故謂之媒妁戰國䇿處女無媒老且不嫁管子明主之治天下也必用聖人而後天下治婦人之求夫家也必用媒而後家事成求夫家而不用媒則醜耻而人不信也故曰自媒之女醜而不信淮南子因媒而嫁不因媒而成又民有好色之性故有大昏之禮因其好色而制昏姻之禮故男女有别待媒而結言所以防淫也世範古人謂周人惡媒以其言語反覆紿女家則曰男富紿男家則曰女美近世尤甚紿女家則曰男家不求備禮且助出嫁遣之資紿男家則厚許其所遷之賄且虗指數目若輕信其言而成昏則責恨見欺夫妻反目至于仳離者有之大抵嫁娶固不可無媒而媒者之言不可盡信如此宜謹察於始右媒妁五禮通考卷一百五十三
