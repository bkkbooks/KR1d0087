body:
  text: 五禮通考卷五十七刑部尚書秦蕙田撰吉禮五十七儺蕙田案易曰精氣為物遊魂為變故知鬼神之情狀幽明之故聖人通之故有儺禮以驅疫焉疫者四時不正之氣邪鬼或憑之以為癘鬼神之有邪正亦猶人之有君子小人也神之正直者不畏人鬼之竒邪者隂氣之慝以陽剛之氣懾之則遊散而不為害亦其理也周禮所載狂夫之狀雖近於誕然豈非所謂知鬼神之情狀者乎今以周禮禮記月令之言載於前後世之事附焉殆亦聖人神道設教之一端也夫周禮夏官方相氏狂夫四人王氏昭禹曰方相氏者以其相視而攻疫者非一方也月令於季冬命有司大儺則曰旁磔亦以方之所在非一方鄭氏鍔曰或謂每歲有時儺之事所謂季春命國儺仲秋天子乃儺季冬命有司大儺見於月令者是也三時有儺夏則無之方相氏乃為夏官之屬何耶蓋方相氏以狂夫為之康成謂方相猶放想可畏怖之貌義無所考殆猖狂之意也因四方而驅疫必狂夫為之蓋陽勝則為狂隂慝則為疫狂夫陽之太過者也夏則陽盛而火王陽盛而太過則為狂矣使之索隂慝之鬼亦厭勝之術髙氏愈曰方相能於四方上下相察凶神者也狂夫不自檢飭者其職主逐疫而屬夏官者陽誅殘賊隂驅疫癘其義一也掌蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百𨽻而時儺以索室驅疫疏案月令惟有三時儺季春有國者儺仲秋天子乃儺季冬乃命有司大儺言大則及民庶此經所儺據十二月大儺而言鄉黨鄉人儺郊特牲鄉人禓亦皆據民庶得儺而言也李氏嘉會曰鬼神隂物狂夫四目玄衣朱裳皆象陽氣以抑隂氣蔡氏德晉曰蒙冒熊皮示其猛黃金四目示其明執戈揚盾示其威百𨽻秋官司𨽻所掌五𨽻也時儺以季春仲秋季冬三時而儺也索室驅疫謂入室中搜索疫鬼而驅逐之也方氏苞曰玄衣朱裳執戈揚盾以驅疫可也而蒙熊皮黃金四目則怪誕可駭蓋王莽好厭勝如遣使負瞥持幢與令武士入髙廟拔劍四面提擊正與此相類故劉歆增竄此文以示聖人之法固如是其多怪變耳削去則職中辭氣相承完善無疵蕙田案方氏於周禮之文可疑者輒謂劉歆附王莽竄入此亦其一然聖人不語怪而除怪以怪蓋為愚夫婦而設未足過也若因誕而削之則石言神降豈非怪之尤者乎謂王莽竊其似以行私則可竟因此而削之則不可也春官占夢季冬遂令始難驅疫注令令方相氏也難謂執兵以有難卻也故書難或為儺杜子春儺當作難讀疏難者以其難去疫癘故為此李氏嘉會曰季春仲秋季冬皆有儺今日始儺者蓋在上始行儺禮則諸侯萬民斯可儺也王氏昭禹曰既舍萌贈惡夢內無釁然後自外至者可索而驅也易氏祓曰始儺所以迎和氣驅疫所以送戾氣男巫冬堂贈無方無算注杜子春云堂贈謂逐疫也無方四方為可也無算道里無數逺益善也玄謂冬歲終以禮送不祥及惡夢皆是也其行必自堂始巫與神通言當東則東當西則西可近則近可逺則逺無常數禮記月令季春之月命國難九門磔攘以畢春氣陳澔集説難之事在周官則方相氏掌之裂牲謂之磔除禍謂之攘春者隂氣之終故磔攘以終畢厲氣也舊説大陵八星在胃北主死喪昴中有大陵積尸之氣氣佚則厲鬼隨之而行此月初日在胃從胃歷昴故驅疫之事當於此時行之也仲秋之月天子乃儺以逹秋氣注此儺儺陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿值昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百𨽻而儺之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫陳澔集説此獨言天子難者此為除過時之陽暑陽者君象故諸侯以下不得難也季冬之月命有司大難旁磔出土牛以送寒氣陳澔集説季春惟國家之難仲秋惟天子之難此則下及庶人又以隂氣極盛故云大難也旁磔謂四方之門皆披磔其牲以攘除隂氣不但如季春之九門磔攘而已舊説此日月經虛危司命二星在虛北司祿二星在司命北司危二星在司祿北司中二星在司危北此四司者鬼官之長又墳四星在危東南墳墓四司之氣能為厲鬼將來或為災厲故儺磔以禳除之事或然也出猶作也月建丑丑為牛土能制水故特作土牛以畢送寒氣也方氏慤曰儺所以儺隂慝而驅之周官方相氏帥百隸而時儺以狂夫為之則狂疾以陽有餘唯陽有餘足以勝隂慝故也攘九門欲隂慝之出凡此慮春氣之不得其終也故曰以畢春氣此儺隂慝之作於春者也仲秋季冬則儺隂慝之作於秋冬者也獨夏不儺則以陽盛之時隂慝不能作故也季冬一歲隂慝之盛故本其積隂之氣而言之特謂之大蓋驅者邪氣也達之送之者正氣也春曰磔攘冬曰旁磔者災難故旁又磔焉不特九門故也秋雖不言從可知矣春曰命國秋曰天子冬曰命有司何也蓋天子之儺為國而已非自為之也委之有司而已故言之序如此且互相備也郊特牲鄉人禓孔子朝服立於阼存室神也注禓強鬼也謂時儺索室驅疫逐強鬼也禓或為獻或為儺朝服立於阼神依人也疏此一經論孔子存神之事鄉人驅逐強鬼孔子恐廟神有驚恐身著朝服立於廟之阼階存安廟室之神朝服以祭故用祭服以依神也馬氏晞孟曰儺者索室以去其不祥其法見於周方相氏而其事見於月令之季秋孔子聖人德合於神明矣非俟於索室以去其不祥然必從鄉人之儺者不違衆以立異也葉氏夢得曰儺有二名儺猶禳也以禦隂為義故文從儺猶禬也以抗陽為義故文從昜此以存室神也故以禓為名鄭氏以為強鬼之名誤也論語鄉黨鄉人儺朝服而立於阼階朱子集注儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也雲麓漫抄世俗嵗將除鄉人相率為儺俚語謂之打野狐案論語鄉人儺朝服立於阼階注大儺驅逐疫鬼也亦呼為野雲戲禮記外傳方相氏之官嵗有三時率領羣𨽻驅索癘疫之氣於宫室之中亦攘送之義也天以一氣化萬物五帝各行其德餘氣留滯則傷後時謂之不和而災疫興焉大儺者貴賤至於邑里皆得驅疫命國儺者但於國城中行之耳莊子逰島問雄黃曰今逐疫出魅擊鼓呼譟何也雄黃曰黔首多疫黃帝氏立巫咸使黔首沐浴齋戒以通九竅鳴鼓振鐸以動其心勞形趨步以發隂陽之氣飲酒茹蔥以通五臟夫擊鼓呼噪逐疫出魅黔首不知以為魅祟也右經傳儺漢舊儀顓頊氏有三子生而亡去為疫鬼一居江水是為疫鬼一居若水是為魍魎蜮鬼一居人宫室樞隅處善驚人小兒月令章句曰日行北方之宿北方大隂恐為所抑故命有司大儺所以扶陽抑隂也方相帥百𨽻及童女以桃弧棘矢土鼓鼓且射之以赤丸五榖播灑之後漢書禮儀志先臘一日大儺謂之逐疫其儀選中黃門弟子年十嵗以上十二以下百二十人為侲子侲之言善善童幼子也皆赤幘皂製執大鼗方相氏黃金四目蒙熊皮玄衣朱裳執戈揚盾十二獸有衣毛角中黃門行之冗從僕射將之以逐惡鬼於禁中夜漏上水朝臣會侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黃門令奏曰侲子備請逐疫於是中黃門倡侲子和曰甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯竒食夢強梁祖門共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使十二神造惡凶赫女軀拉女幹節解女肉抽女肺腸女不急去後者為糧注東京賦曰捎魑魅斫獝狂斬委蛇腦方良囚耕父於清泠溺女魃於神潢殘夔魖與罔象殪壄仲而殲遊光注曰魑魅山澤之神獝狂惡鬼委蛇大如車轂方良草澤神耕父女魃皆旱鬼惡水故囚溺於水中使不能為害夔魖罔象木石之怪壄仲遊光兄弟八人恆在人間作怪害也孔子曰木石之怪夔魍魎水之怪龍罔象臣昭曰木石山怪也夔一足越人謂之山㺐魍魎山精好學人聲而迷惑人龍神物也非所常見故曰怪罔象食人一名沐埤蒼曰獝狂無頭鬼因作方相與十二獸儛嚾呼周遍前後省三過持炬火送疫出端門注東京賦曰煌火馳而星流逐赤疫於四裔注曰煌火光逐驚走煌然火光如星馳赤疫疫鬼惡者也侲子合三行從東序上西序下門外騶騎傳炬出宫司馬闕門之外五營騎士傳火棄雒水中注東京賦注曰衛士千人在端門外五營千騎在衛士外為三部更送至雒水凡三輩逐鬼投雒水中仍上天池絶其橋梁使不度還百官官府各以木面獸能為儺人師訖設桃梗鬱儡葦茭畢執事陛者罷注山海經曰東海中有度朔山上有大桃樹蟠屈三千里其卑枝門曰東北鬼門萬鬼出入也上有二神人一曰神荼一曰鬱儡主閲領衆鬼之惡害人者執以葦索而用食虎於是黃帝法而象之驅除畢因立桃梗於門户上畫鬱儡持葦索以御凶鬼畫虎於門當食鬼也史記曰東至於蟠木風俗通曰黃帝上古之時有神荼與鬱儡兄弟二人性能執鬼桃梗梗者更也嵗終更始受介祉也葦戟桃杖以賜公卿將軍特侯諸侯云鄧皇后本紀永初三年舊事嵗終當饗衛士大儺逐疫太后以隂陽不和軍旅數興詔饗會勿設戲作樂減逐疫侲子之半悉罷象槖駝之屬豐年復故北魏書髙宗本紀和平三年十有二月乙卯因大儺耀兵有飛龍騰蛇魚麗之變以示威武禮志和平三年十二月因嵗除大儺之禮遂耀兵示武更為制令隋書禮儀志齊制季冬晦選樂人子弟十嵗以上十二以下為侲子合二百四十人一百二十人赤幘皂褠衣執鼗一百二十人赤布袴褶執鞞角方相氏黃金四目熊皮蒙首玄衣朱裳執戈揚盾又作窮竒祖明之類凡十二獸皆有毛角鼓吹令率之中黃門行之冗從僕射將之以逐惡鬼於禁中其日戊夜三唱開諸里門儺者各集被服器仗以待事戊夜四唱開諸城門二衛皆嚴上水一刻皇帝常服即御座王公執事官第一品已下從六品已上陪列預觀儺者鼓譟入殿西門遍於禁內分出上二閣作方相與十二獸儛戲喧呼周遍前後鼓譟出殿南門分為六道出於郭外隋制季春晦儺磔牲於宫門及城四門以禳隂氣秋分前一日禳陽氣季冬傍磔大儺亦如之其牲每門各用羝羊及雄雞一選侲子如後齊冬八隊二時儺則四隊執事十二人赤幘褠衣執皮鞭工人二十二人其一人方相氏黃金四目蒙熊皮玄衣朱裳其一人為唱師著皮衣執棒鼓角各十有司預備雄雞羝羊及酒於宫門為坎未明鼓譟以入方相氏執戈揚楯周呼鼓譟而出合趣顯陽門分詣諸城門將出諸祝師執事預疈牲胸磔之於門酌酒禳祝舉牲并酒埋之唐書禮樂志大儺之禮選人年十二以上十六以下為侲子假面赤布袴褶二十四人為一隊六人為列執事十二人赤幘赤衣麻鞭工人二十二人其一人方相氏假面黃金四目蒙熊皮黑衣朱裳右執楯其一人為唱帥假面皮衣執棒鼓角各十合為一隊隊别鼓吹令一人太卜令一人各監所部巫師二人以逐惡鬼於禁中有司預備每門雄雞及酒擬於宫城正門皇城諸門磔禳設祭太祝一人齋郎三人右校為瘞坎各於皇城中門外之右前一日之夕儺者赴集所具其器服以待事其日未明諸衛依時刻勒所部屯門列仗近仗入陳於階鼓吹令帥儺者各集於宫門外內侍詣皇帝所御殿前奏侲子備請逐疫出命寺伯六人分引儺者於長樂門永安門以入至左右上閣鼓譟以進方相氏執戈揚楯唱侲子和曰甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯竒食夢強梁祖明共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使一十二神追惡凶赫汝軀拉汝幹節解汝肉抽汝肺腸汝不急去後者為糧周呼訖前後鼓譟而出諸隊各趨順天門以出分詣諸城門出郭而止儺者將出祝布神席當中門南向出訖宰手齋郎疈牲胸磔之神席之西藉以席北首齋郎酌清酒太祝受奠之祝史持版於座右跪讀祝文曰維某年嵗次月朔日天子遣太祝臣姓名昭告於太隂之神興奠版於席乃舉牲并酒瘞坎百官志內寺伯六人嵗儺則涖出入鼓吹署令二人大儺帥鼓角以助侲子之唱宫門局宫門郎二人歲終行儺則先一刻而啓皇太子舊唐書禮儀志季冬晦堂贈儺磔牲於宫門及城四門各用雄雞一職官志太卜令掌卜筮之法嵗季冬之晦帥侲子入宫中堂贈大儺開元禮諸州縣儺方相四人執戈楯唱率四人侲子都督及上州六十人中下州四十人縣皆二十人方相唱率縣皆一人皆以雜職充之其侲子取人年十五以下十三以上充之又雜職八人四人執鼗鞉四人執鞭戈儺前一日之夕所司帥領宿於州門外其縣門亦如之未辨色所司白刺史縣令請引儺者入將辨色官者二人出門各執青麾引儺者入無官者外人引導於是儺擊鼗鞉俱譟呼鼓鞭戈楯而入官者引之遍索諸室及門巷訖官者引出中門所司接引出仍鼓譟而出大門外分為四部各趨四城門出郭而止初儺者入祝五人各帥執事者以酒脯各詣州門及城四門儺者出便酌酒奠脯於門右禳祝而止乃舉酒脯埋於西南酒以爵脯以籩其祝文曰維某年嵗次月朔日子祝姓名敢告於太隂之神寒暑往來隂陽之常度惟神以屏􅓇厲謹以酒脯之奠敬祭於神尚饗乾淳嵗時記禁中臘月三十日呈女童驅儺裝六丁六甲六神之類東京夢華録除日禁中呈大儺儀並用皇城親事官諸班直戴假面繡畫色衣執金鎗龍旗教坊使孟景初身亦魁偉貫全副金鍍銅甲裝將軍用鎮殿將軍二人亦介胄裝門神教坊南河炭醜惡魁肥裝判官又裝鍾馗小妹土地竈神之類共千餘人自禁中驅祟出南熏門外轉龍彎謂之埋祟而罷荆州嵗時記十二月八日為臘日諺語臘鼓鳴春草生村人並擊細腰鼓戴狐頭及作金剛力士以逐疫注案禮記云儺所以逐癘鬼也吕氏春秋季冬紀注云今人臘前一日擊鼓驅疫謂之逐除晉陽秋王平子在荆州以軍圍除以鬬故也元中記顓頊氏三子俱亡處人宫室善驚小兒漢世以五營千騎自端門傳炬送疫棄洛水中故東京賦云卒嵗大儺驅除羣癘方相秉鉞巫覡操茢侲子萬童丹首玄製桃弧棘矢所發無臬宣城記云洪矩吳時作廬陵郡載土船頭逐除人就矩訖矩指船頭云無取所載土耳小説孫興公常著戲頭與逐除人共至桓宣武家宣武覺興應對不凡推問乃驗也金剛力士世謂佛家之神案河圗玉版云天立四極有金剛力士長三十丈此則其義蕙田案自唐以後儺之禮不見於正史以上三條雖出於小説而語稍近實附載之大學衍義補丘氏濬曰儺者索室以去其不祥其法始於周禮方相氏而其事見於月令之三時季春行於國中仲秋行於宫禁惟季冬謂之大儺則通上下行之也雖以孔子之聖亦從鄉人之所行蓋有此禮也若無此禮聖人豈苟於同俗者哉漢唐以來其法猶存漢以中黃門為之蓋以其出入禁掖為便今世此法不傳然宫中邃密隂氣遍盛不能無影響之疑於是乎假外道以驅除之臣請斟酌漢唐之制俾內臣依古制以為索室逐疫之法是亦闢異端嚴宫禁之一事也右歷代儺酺蕙田案酺祭不知何神鄭康成注為人物災害之神後世蝗則行之亦為民祈禱之意也周禮地官族師月吉則屬民而讀邦法春秋祭酺亦如之注酺者為人物災害之神故書酺或為步校人職又有冬祭馬步則未知此世所云蝝螟之酺與人鬼之步與蓋亦壇位如雩禜云王氏昭禹曰祭酺必於族祭禜必於黨祭社必於州者凡以其祭有大小之不同故即其所聚之衆寡唯為社事單出里唯為社田國人畢作然則社之祭大矣故祭社於二千五百家之州禜之祭次之故祭禜於五百家之黨酺之祭小矣故祭酺於百家之族鄭氏鍔曰漢律三人以上無故羣飲罰金四兩詔得橫賜則會幾日謂之酺説者謂酺之言布也王者布德於天下而合聚飲酒也周人之酺殆此類蕙田案經明言春秋祭酺與合聚飲酒之説不同鄭説非五代史晉本紀出帝天福八年六月庚戌祭蝗於臯門文獻通考宋太祖建隆二年六月澶濮曹絳等州蝗命長吏以牢禮祭之宋史真宗本紀天禧元年五月諸路蝗食苗詔遣內臣分捕文獻通考天禧元年以蝻蝗再生分遣官禱京城宫觀寺廟仍諭諸州軍於公宇設祭宋史仁宗本紀慶歷四年正月太常禮儀院上新修禮書及慶歷祀儀禮志慶歷中上封事者言螟蝗為害乞外內並修祭酺禮院言案周禮族師春秋祭酺酺為人物災害之神鄭玄云校人職有冬祭馬步則未知此酺者蝝螟之酺歟人鬼之步歟蓋亦為壇位如雩禜云然則校人職有冬步是與馬為害者此酺蓋人物之害也漢有蝝螟之酺神又有人鬼之步神歷代書史悉無祭酺儀式欲準祭馬步儀壇在國城西北差官就馬壇致祭稱為酺神若外州者即略依禜禮其儀注先擇便方設營攢為位營攢謂立表施繩以代壇其致齋行禮器物並如小祠先祭一日致齋祭日設神座內向用尊及籩一豆一實以酒脯設於神座左又設罍洗及篚於酒樽之左俱內向執事者位於其後皆以近神為上薦神用白幣一丈八尺在篚將祭贊祀官拜就盥洗訖進至神座前上香奠幣退詣罍洗盥以酒再詣神坐前奠爵讀祝再拜退而瘞幣其酺神祝文曰維年嵗次月朔某日州縣官某敢昭告於酺神蝗蝝荐生害於嘉禾惟神降祐應時消殄謹以清酒制幣嘉薦昭告於神尚饗髙宗紹興三十二年太常寺言酺祭依紹興祀令從之孝宗本紀紹興三十二年五月癸巳蝗文獻通考紹興三十二年八月禮部太常寺言看詳酺祭事欲依紹興祀令蟲蝗為災則祭之俟得旨本寺擇日依儀祭告其祭告之所國城西北無壇乞於餘杭門外西北精進寺設位行禮所差祭告官合并辨排事並依當時祭告小祀例在外州縣無蟲蝗為害處候得旨令户部行下有蝗蟲處即依儀式一面差令設位祭告施行從之寧宗嘉定八年以飛蝗入臨安祭告酺神宋史禮志嘉定八年六月以飛蝗入臨安界詔差官祭告又詔兩浙淮東西路州縣遇有蝗入境守臣祭酺神蕙田案蝗亦昆蟲之類耳而其害民至大世謂蝗所行處有神故古稱飛蝗不入境及自入水死若有默相然者此祭之所以不可已也然則酺非祭害物之神祭其主此害物之神者耳右祭酺盟詛蕙田案榖梁曰盟詛不及三王考之書苗民罔中於信以覆詛盟則三王以前蓋有之矣苗民覆之故數之以為罪展禽有言周公太公股肱王室成王勞而賜之盟曰世世子孫無相害也載在盟府太史職之詩君子屢盟亂是用長非謂不可盟謂其盟之屢而無信也夫世之治也人以心相與家以誠相示知畏於神而不敢欺敬於神而不敢慢先王因其畏敬之心而躬信畏以先之此盟之所以息邪省刑而足以輔治也故周禮秋官立司盟以掌其事至并盟誓而背棄之則刑罰有所必加矣司盟亦謂之司載國語司載糾虔天刑是也但古者結繩足以示信盟詛雖有而不必用去古既逺民俗澆漓盟詛雖用而如無有升降之際良可慨已盟誓盛於春秋後世間有之學者不察以周官太平之書胡為玉府有珠盤玉敦之事戎右有贊牛耳桃茢之文遂信何休戰國隂謀之説蓋亦不考之於詩書爾今依經傳通解之例附著於篇書吕刑罔中于信以覆詛盟傳三苗之民瀆於亂政起相漸化皆無中於信義以反背盟詛之約慣疏三苗之民謂三苗國內之民也苗君久行虐刑民見亂政習以為常起相漸化中猶當也皆無中於信義言為行無與信義合者詩云君子屢盟亂是用長亂世之民多相盟詛既無信義必皆違之以此無中於信反背盟詛之約也詩小雅巧言君子屢盟亂是用長傳凡國有疑會同則用盟而相要也箋屢數也盟之所以數者由世衰亂多相背違時見曰會殷見曰同非此時而盟謂之數正義言凡國有疑謂於諸侯羣臣有疑不相協則在會同之上用盟禮告盟而相要束司盟職曰凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神是也何人斯出此三物以詛爾斯傳三物豕犬雞也民不相信則盟詛之君以豕臣以犬民以雞此箋我與汝俱為王臣今汝心誠信而我不知且共出三物以詛女之此物為其情之難知已又不欲長怨故設之以此言禮疏解所以有詛者民不相信則盟詛之言古者有此故欲與之詛也司盟曰盟萬民之犯命者詛其不信者是不相信有盟詛之法也彼不信自在詛下而兼言盟者以詛是盟之細故連言之也犯命者盟之不信者詛之是盟大而詛小也盟詛雖大小為異皆殺牲歃血告誓明神後若背違令神加其禍使民畏而不敢犯故民不相信為此禮以信之此傳言民者據周禮之文耳其實人君亦有詛法襄十一年左傳言季武子將作三軍盟諸僖閎詛諸五父之衢定六年陽虎及三桓盟於周社盟國人於亳社詛諸五父之衢是人君與羣臣有詛法也此何人與蘇公同為王臣蘇公與之詛則諸臣相疑亦應有詛法但春秋之世無其事耳詛之所用一牲而已非三物並用而言出此三物以三物皆是詛之所用總而言之故傳辨其等級云君以豕臣以大民以雞則鄭伯使卒出豭行出犬雞所云三物並用者時考叔為子都所射鄭伯不誅子都而使諸軍詛之百人為卒出一豭詛之二十五人為行或出犬或出雞以詛之每處亦止用一牲非一處而用三物也如此傳君乃得用豕彼百人即得用豭者於時鄭伯使之詛故得用君牲也以行之人數少於卒自為等級耳此豕犬雞詛所用也若盟皆用牛哀十五年左傳説衛太子蒯聵與伯姬輿豭以盟孔悝者時太子未立不敢從人君之禮故鄭異議駁云詩説及鄭伯使卒及行所出皆謂詛耳小於盟也周禮戎右職云若盟則以玉敦辟盟遂役之贊牛耳桃茢哀十七年左傳曰孟武伯問於髙柴曰諸侯盟誰執牛耳然盟者人君用牛伯姬孔悝以豭下人君牲是盟用牛也此謂大事正禮所當用者耳若臨時假用其禮者不必有牲故左傳孟任割臂以盟莊公華元入楚師登子反之牀子反懼而與之盟皆無牲也周禮秋官司盟掌盟載之法注載盟辭也盟者書其辭於策殺牲取血坎其牲加書於上而埋之謂之載書詐疏謂以牲載此盟書於上故謂之載也若云爾無我我無爾虞有違此盟無克祚國盟辭多矣以此為本凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之注有疑不協也明神神之明察者謂日月山川也覲禮加方明於壇上所以依之也詔之者讀其載書以告之也二之者寫副當以授六官鄭氏鍔曰神之明者吉凶禍福必審神尚幽人將告幽故北面也王氏昭禹曰幽則質之神而盟者神之所為也明則盡之人而約者人之所為也盟諸神約之人所以結信之道盟萬民之犯命者詛其不信者亦如之注盟詛者欲相與共惡之也犯命犯君教令也不信違約者也春秋傳曰臧紇犯門斬關以出乃盟臧氏又曰鄭使卒出豭行出犬雞以詛射頴考叔者詛疏凡言盟者盟將來者詛往過凡民之有約劑者其二在司盟注二之者檢其自相違約有獄訟者則使之盟詛注不信則不敢聽此盟詛所以省獄訟疏此盟詛謂將來訟者先使之盟詛盟詛不信自然不敢獄訟所以省事也黃氏度曰獄訟覆情匿詐無質證不可推究者多矣株連則恐其枉故為盟詛以止之詩蘇公刺暴公之語曰出此三物以詛爾斯是蓋恥格之風猶在不敢自欺其心敬畏昭明故其事可行也苗民以覆詛盟則以亂濟亂而已左氏論鄭事曰邪而詛之將何益哉反諸本之謂也凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯注使其邑閭出牲而來盟已又使出酒脯司盟為之祈明神使不信者必凶疏盟處無常但盟則遣其地之民出牲以盟并出酒脯以祈明神也鄭氏鍔曰民有盟詛則鄰里當共其牲既使衆庶共質之而鄰里共牲之人必能詰責之彼將知愧而自悔也共酒脯以祈神祈其盟之必驗也神之小者用酒脯故祭侯之禮用酒脯醢也天官玉府若合諸侯則共珠槃玉敦注敦槃類珠玉以為飾疏若合諸侯謂時見曰會若司儀云為壇十有二尋王與諸侯殺牲歃血而盟則供珠槃玉敦王氏昭禹曰珠槃以盛牛耳玉敦以盛血春官詛祝掌盟詛類造攻説禬禜之祝號注八者之辭皆所以告神明也盟詛主於要誓大事曰盟小事曰詛盟疏秋官自有司盟之官此詛祝兼言之者司盟直掌載之法不掌祝號與載辭故使詛祝掌之作盟詛之載辭以敘國之信用以質邦國之劑信疏為要誓之辭載之於䇿人多無信故為辭對神要之使用信故云以敘國之信用以質邦國之劑信亦為此盟詛之載辭以成之謂正之使不犯地官封人大盟則飾其牛牲注大盟會同之盟盟疏大盟謂天子親往臨此一經皆用牛牲故總云飾其牛牲也夏官戎右盟則以玉敦辟盟遂役之注鄭司農云敦器名也辟法也玄謂將歃血者先執其器為衆陳其載辭使心皆開闢也役之者傳敦血授當歃者疏凡盟先割牛耳盛於珠盤以玉敦盛血戎方執此敦血為陳其盟約之辭使心開辟乃歃之贊牛耳桃茢注鄭司農云贊牛耳春秋傳所謂執牛耳者故書茢為滅杜子春云滅當為厲玄謂尸盟者割牛耳取血助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執之桃鬼所畏也茢苕帚所以掃不祥鄭氏鍔曰盟雖歃血必有尸盟者執牛耳牛牲至順執牛耳者取其順從以聽命也陳氏禮書古者人君出户則巫覡有事弔臣則桃茢在前開氷則桃弧棘矢以除其災致膳則葷桃茢以辟凶邪膳於君有葷桃茢於大夫去茢於士去葷則盟用桃茢宜矣蓋桃茢凶邪之所畏避者也觀古人度朔之論桃湯之用則桃有過於茢矣秋官大司寇凡邦之大盟約涖其盟書而登之於天府太史內史司會及六官皆受其二而藏之注涖臨也天府祖廟之藏書疏王與諸侯因大會同而與盟既臨其盟書因登此於天府太史內史司會掌事皆與六卿同故皆有副二盟辭而藏之擬相勘當也儀禮覲禮諸侯覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外祭天燔柴祭山丘陵升祭川沈祭地瘞蕙田案此因覲而以會同之禮見諸侯遂有盟約之事司冦謂邦之大盟約春秋傳所云勞而賜之盟者也盟詛所祭之神經無明文據此則祀方明也禮記曲禮涖牲曰盟注涖臨也坎用牲臨而讀其盟書聘禮今存遇會誓盟禮亡誓之辭尚書見有六篇春秋隱公元年三月公及邾儀父盟於蔑疏諸侯俱受王命各有寰宇上事天子旁交鄰國天子不信諸侯諸侯自不相信則盟以要之凡盟禮殺牲歃血告誓神明若有背違欲令神加殃咎使如此牲也曲禮曰約信曰誓涖牲曰盟周禮天官玉府職曰若合諸侯則共珠槃玉敦夏官戎右職曰盟則以玉敦辟盟遂役之贊牛耳桃茢秋官司盟職曰掌盟載之法曰邦國有疑會同則掌其盟約之載及其禮儀北面詔明神鄭玄以為槃敦皆器名也珠玉以為飾合諸侯者必割牛耳取其血歃之以盟敦以盛血槃以盛耳將歃則戎右執其器為衆陳其載辭使心皆開辟司盟之官乃北面讀其載書以告日月山川之神既告乃尊卑以次歃戎右傳敦血以授當歃者令含其血既歃乃坎其牲加書於上而埋之此則天子會諸侯使諸侯聚盟之禮也凡天子之盟諸侯十二歲於方嶽之下故傳云再會而盟以顯昭明若王不巡守及諸侯有事朝王即時見曰會殷見曰同亦為盟禮其盟之法案覲禮為壇十有二尋深四尺加方明於其上方明者木也方四尺設六玉上圭下璧南方璋西方琥北方璜東方圭朝諸侯於壇訖乃加方明於壇而祀之列諸侯於庭玉府共珠槃玉敦戎右以玉敦辟盟遂役之贊牛耳桃茢司盟北面詔告明神諸侯以次歃血鄭注覲禮云王之盟其神主日王官之伯盟其神主月諸侯之盟其神主山川是盟禮之略也若諸侯之盟亦有壇知者故柯之盟公羊傳稱曹子以手劍劫桓公於壇是也其盟神則無復定限故襄十一年傳稱司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖是也其盟用牛牲故襄二十六年傳云欿用牲又哀十七年傳云諸侯盟誰執牛耳是也其殺牛必取血及耳以手執玉敦之血進之於口知者定八年涉他捘衛侯之手及捥又襄九年傳云與大國盟口血未乾是也既盟之後牲及餘血并盟載之書加於牲上坎而埋之故僖二十五年傳云宵坎血加書是也春秋之世不由天子之命諸侯自相與盟則大國制其言小國尸其事官雖小異禮則大同故釋例曰盟者殺牲載書大國制其言小國尸其事珠槃玉敦以奉流血而同歃是其事也其盟載之辭則傳多有之此時公求好於邾邾君來至蔑地公出與之盟史書魯事以公為主言公及及者言自此及彼據魯為文也桓十七年公會邾儀父盟於趡彼言會此言及者彼行會禮此不行會禮故也故劉炫云䇿書之例先會後盟者上言會下言盟惟盟不會者直言及此為不行會禮故言及也或可史異辭非先會而盟則稱會知者文七年公會諸侯晉大夫盟於扈傳云公後至則是不及其會而經稱會故知盟稱會者未必先行會禮也蕙田案此春秋書盟之始疏文亦最詳故録之後但載其有關盟詛之事義者七年左氏傳陳五父如鄭涖盟壬申及鄭伯盟歃如忘泄伯曰五父必不免不賴盟矣注插如忘志不在於插血也疏歃謂口含血也當歃血之時如似遺忘物然蕙田案此口含為歃血之證八年秋七月庚午宋公齊侯衛侯盟於瓦屋注宋序齊上王爵也瓦屋周地榖梁傳外盟不日此其日何也諸侯之參盟於是始故謹而日之也誥誓不及五帝注五帝謂黃帝顓頊帝嚳帝堯帝舜也誥誓尚書六誓七誥是其遺文五帝之世道化淳備不須誥誓而信自著盟詛不及三王注三王謂夏殷周也夏后有鈞臺之享商湯有景亳之命周武有孟津之會衆所歸信不盟詛也交質子不及二伯注二伯謂齊桓晉文胡傳周禮設司盟掌盟載之法凡邦國有疑則請盟於會同聽命於天子亦聖人待衰世之意耳德又下衰諸侯放恣其屢盟也不待會同其私約也不由天子口血未乾而渝盟者有矣其末至於交質子猶有不信者焉春秋謹參盟善胥命美蕭魚之會以信待人而不疑也蓋有志於天下為公之世凡此類亦變周制矣湛氏若水曰紀參盟也古者天下為公會同之禮制於天子無上命而私盟無道之甚者也然而彼善於此則有之參盟之謂也故書而紀之十一年左氏傳鄭伯將伐許授兵於大宫公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒秋七月傅於許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛鄭伯使卒出豭行出犬雞以詛射潁考叔者注百人為卒二十五人為行行亦卒之行列疾射潁考叔者故令卒及行間皆詛之者疏詛者盟之細殺牲告神令加之殃咎疾射潁者叔令卒及行間祝詛之欲使神殺之也一卒之內已用一豭又更令一行之間或用雞或用犬重祝詛之犬雞者或雞或犬非雞犬並用何則盟詛例用一牲不用二也豭謂豕之牡者爾雅釋獸豕牝曰豝豝者是牝知豭者是牡祭祀例不用牝且宋人謂宋朝為艾豭明以雄豬喻也君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪邪而詛之將何益矣蕙田案此詛用三物之證僖公二十五年左氏傳秦人圍商密昏而傳焉宵坎血加書偽與子儀子邊盟者注掘地為坎以埋盟之餘血加盟書其上蕙田案此坎血加書之證二十八年左氏傳晉文公伐衛楚師救衛戰於莘北楚師敗績晉師還至於衡雍作王宫於踐土獻楚俘於王王子虎盟諸侯於王庭注踐土宫之庭書踐土别於京師要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國注奬助也渝變也殛誅也俾使也隊隕也克能也晉人復衛侯寧武子與衛人盟於宛濮曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰捍牧圉不協之故用昭乞盟於爾大神自今日以往行者無保其力居者無懼其罪有渝此盟明神先君是糾是殛國人聞此盟也而後不二成公十二年左氏傳晉士燮會楚公子罷許偃盟於宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患交贄往來道路無壅謀其不協而討不庭有渝此盟無克祚國蕙田案此三條皆盟辭襄公九年左氏傳諸侯伐鄭鄭人恐乃行成注與晉成也同盟於戲鄭將盟鄭六卿公子騑注子駟公子發注子國公子嘉注子孔公孫輒注子耳公孫蠆注子蟜公孫舍之注子展及其大夫門子皆從鄭伯注門子卿之適子晉士莊子為載書注莊子士弱載書盟曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟注如違盟之罰公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與強可以庇民者是從而敢有異志者亦如之注亦如此盟荀偃曰改載書注子駟亦以所言載於策故欲改之公孫舍之曰昭大神要言焉注要誓以告神若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還注遂兩用載書楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之注神臨之明神不蠲要盟注蠲潔也背之可也乃及楚平公子罷戎入盟同盟於中分注中分鄭城中里名罷戎楚大夫蕙田案此用兩載書盟及要盟之證十一年左氏傳季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎注僖公之門詛諸五父之衢注五父衢道名在魯國東南詛以禍福之言相要蕙田案此盟後復詛之證諸侯伐鄭鄭人懼乃行成秋七月同盟於亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間茲命司慎司盟名山名川注二司天神覲疏盟告諸神而先稱二司知其是天神也覲禮諸侯於天子為宫方三百步壇十有二尋深四尺加方明於其上方明者木也方四尺設六色青赤白黑玄黃設六玉圭璋琥璜璧琮公侯伯子男皆就其旗而立天子祀方明禮日月四瀆山川丘陵彼方雖不言盟其所陳設盟之禮也鄭玄云方明者上下四方神明之象也會同而盟明神監之則謂之天之司盟有象者猶宗廟之有主乎天子巡守之盟其神主日諸侯之盟其神主山川王官之伯會諸侯而盟其神主月是言盟之所告告天神也鄭云神監之謂之司盟司盟非一神也其司慎亦不知指斥何神但在山川之上知其是天神耳名山山之有名者謂五嶽四鎮也名川謂四瀆也羣臣羣祀注羣祀在祀典者先王先公注先王諸侯之大祖宋祖帝乙鄭祖厲王之比也先公始封君七姓十二國之祖七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊薑姓莒已姓杞姒姓薛任姓實十三國言十二誤也言疏十三國為七姓世本世家文也姬即次曹意及則不以大小為次也實十三國而言十二服虔云晉主盟不自數知不然者案定四年祝他稱踐土之盟云晉重魯申於是晉為盟主自在盟內何因晉今主盟乃不自數故知字誤也劉炫難服虔云案宣子恐失諸侯謹慎辭令告神要人身不自數已不在盟彼叛必速豈有如此理哉明神殛之殛誅也俾失其民隊命亡氏踣其國家注踣斃也蕙田案此盟之明神見於盟書可據者二十三年左氏傳季武子無適子公彌長而愛悼子欲立之訪於臧紇紇為立悼子紇廢公鉏後孟莊子疾豐點謂公鉏苟立羯請讎臧氏及孟孫卒季孫至入哭而出曰秩焉在公鉏曰羯在此矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏臧紇斬鹿門之關以出奔邾乃盟臧氏二十五年左氏傳崔杼弒齊君立景公而相之慶封為左相盟國人於大宫注大宫大公廟曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃注盟書云所不與崔慶者有如上帝讀書未終晏子抄答易其辭因自歃曰所不與崔慶者本或此下有有如此盟四字者後人妄加蕙田案此亦改盟書之證二十六年左氏傳宋寺人惠墻伊戾為太子痤內師無寵注惠墻氏伊戾名秋楚客聘於晉過宋太子知之請野享之公使往伊戾請從之至則欿用牲加書徴之而騁告公曰太子將亂既與楚客盟矣蕙田案此亦坎血加書之證二十七年左氏傳宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已齊人許之告於秦秦亦許之皆告於小國為會於宋將盟於宋西門之外楚人衷甲伯州犁曰合諸侯之師以為不信無乃不可乎固請釋甲季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈専在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉晉有信也晉荀盈遂如楚涖盟蕙田案此小國尸盟之證二十九年左氏傳鄭大夫盟於伯有氏禆諶曰是盟也其與幾何注言不能久也詩曰君子屢盟亂是用長昭公元年左氏傳會於虢尋楚之盟也祁午謂趙文子曰宋之盟楚人得志於晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武將信以為本循而行之譬如農夫是穮是蓘雖有飢饉必有豐年且吾聞之能信不為人下吾不能是難楚不為患楚令尹圍請用牲讀舊書加於牲上而已晉人許之蕙田案此尋盟之證讀舊書加於牲上也三年左氏傳子太叔曰有事而會不協而盟疏十三年傳云明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明彼謂諸侯於天子朝覲同盟之數此説文襄之霸諸侯朝霸主大國之法也霸主之合諸侯不得令其同盟以奬已故令有事而會不協而盟不復設年限之期周室既衰政在霸主霸主不可自同天子故設此制以簡之蕙田案此霸主會盟之法十三年左氏傳晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速惟君叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋定公五年左氏傳陽虎囚季桓子冬十月己丑盟桓子於稷門之內庚寅大詛注稷門魯南城門傳言季氏之亂六年左氏傳秋陽虎又盟公及三桓於周社盟國人於亳社詛於五父之衢注傳言三桓微陪臣専政為八年陽虎作亂起蕙田案此二條亦盟詛並用之證八年左氏傳晉師將盟衛侯於鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之注二子晉大夫衛人請執牛耳注盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳故請疏盟用牛耳卑者執之尊者涖之請執牛耳請使晉大夫執牛耳今衛侯與晉大夫盟自以當為盟主宜涖牛耳故請晉大夫使執之成何曰衛吾溫原也焉得視諸侯注言衛小可比晉縣不得從諸侯禮將歃涉他捘衛侯之手及捥注捘擠也血至捥擠疏曰説文云推排也排也捘是推排之意故為擠也昭十三年傳言擠於溝壑謂被推入坑也衛侯怒王孫賈趨進賈衛大夫曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也注言晉無禮不欲受其盟蕙田案此小國執牛耳之證哀公十二年左氏傳魯哀公會吳於橐臯對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也注尋重也寒歇也乃不尋盟蕙田案此不尋盟之證十四年左氏傳小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉十五年左氏傳衛太子蒯聵與伯姬輿豭以盟孔悝蕙田案此盟不用牛之證下於君也十七年左氏傳哀公會齊侯盟於蒙武伯問於髙柴曰諸侯盟誰執牛耳注執牛耳尸盟者季羔曰鄫衍之役吳公子姑曹注季羔髙柴也鄫衍在七年發陽之役衛石魋發陽鄖地在十二年石魋石曼姑之子武伯曰然則彘也注彘武伯名也鄫行則大國執發陽則小國執據時執者無常故武伯自以為可執國疏依禮小國執牛耳武伯得季羔之言以鄫衍則大執發陽則小國執之既合古典武伯自以魯是小國故云然則彘也杜以傳有小國大國之執故云據時執者無常劉炫以為小國恆執牛耳何得云執者無常蕙田案此亦小國執牛耳之證國語楚語成王盟諸侯於岐陽楚為荆蠻置茅蕝設望表與鮮牟守燎注置立也蕝謂束茅而立之所以縮酒望表謂望山川立木以為表表其位也鮮牟東夷國燎庭燎也晉語晉文公合諸侯而盟曰吾聞國之昏不由聲色必由姦利好樂聲色者淫也貪姦者惑也夫淫惑之國不亡必殘自今以來無以美妾疑妻無以聲樂妨正無以姦情害公無以貨利示下其有之者是謂伐其根素流於華葉若此者有患無憂有冦勿弭不如言者盟示之於是君子聞之曰文公其知道乎其不王者由無佐也春秋莊公十三年公羊傳莊公會齊侯盟於柯曹子曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是齊桓公莊公升壇曹子手劍而從之管子進曰君何求曹子曰城環厭竟君不圗歟願請汶陽之田管子顧曰君其許諾桓公曰諾已盟曹子摽劍而去之要盟可犯而桓公不欺曹子可讐而桓公不怨桓公之信著乎天下自柯之盟始焉榖梁傳葵丘之盟東牲而不殺讀書加於牲上曰毋雍泉毋遏糴毋易樹子毋以妾為妻毋使婦人與國事孟子五霸桓公為盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無専殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好家語定公與齊侯會於夾谷孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公從之至會所為壇位土階三等以遇禮相見揖讓而登獻酢既畢齊使菜人以兵鼓謲劫定公東夷雷鼓曰謲孔子歷階而進以公退曰士以兵之吾兩君為好裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯心怍麾而避之將盟齊人加載書曰齊師出境而不以兵車三百乘從我者有如此盟孔子使茲無還對曰魯大夫也而不返我汶陽之田吾以供命者亦如之齊侯歸責其羣臣曰魯以君子道輔其君而子獨以夷狄道教寡人使得罪於是乃歸所侵魯之四邑及汶陽之田四邑鄆歡龜隂也汶陽之田本魯界孔子適衛路出於蒲會公叔氏以蒲叛衛而止之孔子弟子有公良儒者為人賢長有勇力以私車五乘從夫子行喟然曰昔吾從夫子遇難於匡又伐樹於宋注孔子與弟子行禮於大樹之下桓魋欲害之故先伐其樹焉今遇困於此命也夫與其見夫子仍遇於難寧我鬭死挺劍而合衆將與之戰蒲人懼曰苟無適衛吾則出子以盟孔子而出之東門孔子遂適衛子貢曰盟可負乎孔子曰要我以盟非義也陳氏禮書先王之時結民以忠信誠慤之心維邦國以比小事大之禮然盟詛之末常不弛於天下使人明則知好惡幽則知信畏然後有同德而無離心則盟詛之輔於教也其可忽哉周禮有盟萬民有盟諸侯有詛萬民之不信有教國之信用則盟詛固有大小矣司盟若合諸侯則共珠槃玉敦戎右以玉敦辟盟贊牛耳桃茢封人凡賔客軍旅大盟飾牛牲其未殺也飾以文繡其殺也置之於坎加書其上盤以盛耳敦以盛血尸之者執耳大者先歃小者亞之哀十三年吳晉爭先國語曰吳先歃晉亞之又晉語宋之盟楚人請先歃霸王之勢在德不在先歃定四年祝鮀曰晉文踐土之盟衛成公弟猶先蔡有玉帛以禮明神哀十二年子貢曰盟有玉帛以奉之有桃茢以祓不祥既盟則以盟書登於天府太史內史司會及六官皆受其二而藏之然則司盟共祈酒脯則既殺以盟於前又用酒脯以祈於後也覲禮諸侯覲天子春拜日秋禮山川丘陵冬禮月與四瀆而繼之以祭天燔柴祭山丘陵升祭川沈祭地瘞謂升沈必就祭謂王巡狩也王巡狩之盟其神主日諸侯之盟其神主山川王官之伯會諸侯其神主月歟經言祭天而鄭氏言祭日經言祭地而鄭氏言祭月且方明以象上下四方而經傳凡言主盟者多稱明神曰司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖齊語桓公與諸侯飭牲為載以約誓於上下庶神則諸侯之盟非特主山川也鄭氏謂王之盟主日諸侯主山川王官之伯主月其禮無據瑕禽曰平王東遷吾七姓從王王賜之騂旄之盟杜預曰言得重盟不以雞犬蓋騂旄之盟非王賜者不得用也襄十年詛祝掌盟詛類造攻説禬禜之祝號作盟詛之載辭以敘國之信用以質邦國之劑信詩曰出此三物以詛爾斯左傳曰鄭伯使卒出豭行出犬雞以詛射潁考叔書無逸曰否則厥口詛祝鄭氏曰大事曰盟小事曰詛賈公彥曰盟者盟將來詛者詛往過然季武子作三軍盟諸僖閎詛諸五父之衢陽虎己丑盟桓子於稷門之內庚寅大詛又盟三桓於周社盟國人於亳社詛於五父之衢鄭伯使卒出豭行出犬雞以詛射潁考叔者是盟有繼之以詛詛有不繫於盟則大事必盟而或詛詛以詛往過而或為將來也詩曰出此三物以詛爾斯毛氏曰君以豕臣以犬民以雞蓋以鄭伯使卒與行出此三物辨而等之其詳不可考也周禮左傳天子諸侯之盟皆執牛耳而衛太子蒯聵與伯姬輿豭以盟蓋下人君之禮也然盟詛皆坎牲加書以告明神其異者盟有執耳歃血既盟有祈而詛無是也春秋之盟有適一時之急而不用牲者若孟任割臂以盟莊公華元登楚子反之牀子反懼而與之盟此皆假行其禮而不用牲也春秋之盟或尋或同或乞或要或逃或渝或盟君以大夫或辱人以城下日以長亂莫之或熄皆先王之罪人也右經傳盟詛史記平原君適楚毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王王當歃血而定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録音祿所謂因人成事者也漢書王陵傳高后欲立諸吕為王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也魏志臧洪傳臧洪字子原廣陵射陽人也太守張超請洪為功曹與西至陳留見兄邈計事邈與語大竒之又致之於劉兖州公山孔豫州公緒乃設壇場方共盟誓諸州郡相讓乃共推洪洪乃升壇操槃歃血而盟吳孫權與蜀盟文天降喪亂皇綱失敘逆臣乘釁劫奪國柄始於董卓終於曹操九州輻裂普天無繼及曹丕偷取天位而子睿么麼尋亦凶逆昔共工亂象而髙辛行師三苗干度而虞舜征焉今日滅睿擒其徒黨非漢與吳將復誰在建大事必先盟誓漢之與吳雖信由中然分土列境宜立盟約使東西士民咸共聞知既盟之後戮力一心同討魏賊救危恤患分災共慶各守分土無相侵犯傳之後葉克終若始有渝此盟創禍先亂俾墜其師無克祚國晉劉琨與段匹磾盟文天不靖晉難集上邦四方豪傑是焉扇動乃憑陵於諸夏俾天子播越震蕩罔或攸底二鹵交侵區夏將泯神人乏主蒼生無歸百罹備臻死喪相枕肌膚潤於鋒鏑骸骨曝於草莽千里無煙火之廬列城有兵曠之邑兹所以痛心疾首仰訴皇穹者也臣琨蒙國寵靈叨竊台嶽臣磾世效忠節沗荷公輔大懼醜類猾夏王旅隕首喪元盡其臣禮古先哲王貽厥後訓所以翼戴天子敦序同好者莫不臨之以明神結之以盟誓故齊桓會於召陵而羣后加恭晉文盟於踐土而諸侯兹順而臣等介在遐鄙而與主相去回遼是以敢干先典刑牲歃盟自今日既盟之後皆盡忠竭節以剪夷二冦有加難於琨磾必救加難於磾琨亦如之繾綣齊契披布胸懷書勒金石藏於王府有渝此盟亡其宗族俾墜軍旅無其遺育晉庾闡為郗車騎討蘇峻盟文賊臣祖約蘇峻不恭天命不畏王誅凶戾肆逆千國之紀稱兵攻宫焚掠宗廟遂乃制脅幼主有無君之心大行皇太后以憂厄崩殂殘害忠良禍虐蒸民窮凶極暴毒流四海是以率土怨酷兆庶泣血咸願奉辭伐罪以除元惡今主上憂危百姓倒懸忠臣烈士志在死國既盟之後戮力一心共剪醜類殞首喪元以救社稷若二冦不梟無望偷安當令生者不食今誓死者無愧黃泉陳沈炯為陳武帝與王僧辨盟文侯景戎羯小醜逆天無狀背我恩義破我國家毒我生民改移我廟社誅鋤我郡縣割裂我宗姻我髙祖靈聖聰明光宅天下劬勞兆庶亭育萬民哀景以窮見歸全景將戮之首授景要害之地崇景非次之榮於景何怨而景長戟強弩陵蹙朝廷刳肝斫趾不厭其快高祖菜食卑宫春秋九十屈意凝威憤終冦手大行皇帝溫嚴恭默不守鴻名於景何有復加忍毒豈有率土之濱忍聞此痛僧辨等荷相國湘東王泣血銜寃之寄摩頂至踵之恩能不瀝膽抽腸共誅姦逆和將帥同心共契必誅逆豎尊奉湘東王嗣膺鴻業以主郊祀若一相欺負一相違戾天地宗廟是譴是詰右後世盟詛釁蕙田案釁之禮小矣古人敬事神明所以交之者異也以血塗釁即以釁名祭孫奭謂猶治亂曰亂抑其義歟大戴禮諸侯釁廟成廟釁之以羊注廟新成而釁者尊而神之也孔氏禮記雜記疏謂宗廟初成則殺羊取血以釁之君玄服立於寢門內南向祝宗人宰夫雍人皆玄服注以神事故亦同爵辨以載君朝服者謂不與也宗人曰請令以釁某廟君曰諾遂入雍人拭羊宰夫入廟門碑南北面東上注拭帨東上者宰夫也宰夫攝主也鄭氏雜記注拭靜也孔氏雜記疏雍人是厨宰之官拭羊拭靜其羊拭於廟門外但初受命於寢門內之時君與祝宗人宰夫雍人等皆著玄服謂朝服緇衣素裳等其祝宗人宰夫雍人等皆入廟之時則爵辨純衣雍人舉羊升屋自中中屋南面刲羊血流於前乃降鄭氏雜記注自由也孔氏雜記疏雍人舉羊升屋者熊氏云謂抗舉其羊升於屋自中者自由也謂升屋之時由屋東西之中謂兩階之間而升也中屋南面者謂當棟屋之上亦東西之中而南面刲割其羊使血流於前雍人乃降皇氏云舉羊謂縣羊升屋謂挂羊於屋自中謂在屋之中中屋謂羊在屋棟之下縣之上下處中今謂屋者謂室之在上之覆也前云升屋下云乃降與喪大記復者升屋其文正同何得以升為縣又中屋為屋棟去地上下為中此正得云屋中不得云中屋若室裏縣羊血則當羊而下何得云血流於前又下文其衈皆於屋下明知其釁則在屋上檢勘上下皇氏之説非也門以雞有司當門北面雍人割雞屋下當門注有司宰夫祝宗人也孔氏雜記疏門廟門也減於廟室故釁不用羊也門則當門屋之上中割雞使血流故云門當門郟室割雞於室中有司亦北面也注郟室門郟之室一曰東西廂也釁東西室有司猶北面統於廟也案小戴割雞亦於屋上記者不同耳孔氏雜記疏夾室東西廂也門與夾室各一雞凡用三雞釁門夾室用雞之時如上用羊之法亦升屋而割之先釁門後釁夾室又卑於門也其衈皆於屋下衈訖然後升屋而釁也夾室則當夾室上之中釁夾室之時宰夫祝宗人皆當於夾室而立既事宗人告事畢皆退反命於君君寢門中南向宗人曰釁某廟事畢君曰諾宗人請就宴君揖之乃退鄭氏雜記注告者告宰夫孔氏雜記疏釁事既畢宗人告攝主宰夫以事畢宰夫及祝宗人等乃退反報君命於路寢君受命之時南鄉於路寢門內南面而立禮記雜記成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣雍人拭羊宗人祝之宰夫北面於碑南東上雍人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北面既事宗人告事畢乃皆退反命於君曰釁某廟事畢反命於寢君南鄉於門內朝服既反命乃退注宗人先請於君曰請命以釁某廟君諾之乃行衈謂將刲割牲以釁先滅耳旁毛薦之耳聽聲者告神欲其聽之周禮有刉衈君朝服者不至廟也疏其衈皆於屋下者謂未刲割羊與雞之時先滅耳旁毛以薦神廟則在廟之屋下門與夾室則在門夾室之屋下衈訖為釁之時門則當門屋之上中夾室則當夾室上之中以割雞使血流故云門當門夾室中室鄭注周禮云毛牲曰刉羽牲曰衈以此經有羊有雞無别刉文故總以衈包之朝服即大戴禮云玄衣以不入廟故朝服蕙田案釁廟之禮二戴大同小異但小戴厠於雜記內大戴則另列為篇故朱子集儀禮經傳取之二書互有詳略今以大戴為正仍録小戴於後以備參考周禮夏官小子掌珥於社稷祈於五祀注鄭司農云以牲頭祭也玄謂珥讀為衈祈或為刉刉衈者釁禮之事也用毛牲曰刉羽牲曰衈衈刉社稷五祀謂始成其宫兆時也疏先鄭云珥以牲頭祭漢時祈禱有牲頭祭後鄭不從者案禮記雜記釁廟之禮云門夾室用雞其衈皆於屋下衈既為釁禮此刉與衈連文則刉亦是釁禮非祭祀之法何得為牲頭祭乎是依後鄭為釁法解之玄謂珥讀為衈祈讀為刉者以釁法無取於玉珥及祈禱之義故以士師刉衈為正也鄭知刉衈為釁禮之事約雜記而知也云用毛牲曰刉羽牲曰衈者此相對而言雜記廟用羊門用雞皆云衈散文通也知刉衈是社稷五祀始成其宫兆時也者凡物須釁者皆謂始成時是以雜記云廟成則釁之是也王氏與之曰珥當為弭如小祝所謂弭災兵祈如小祝所謂祈福祥非釁事也蕙田案王氏之説非是當從康成注禮記雜記路寢成則考之而不釁釁屋者交神明之道也注言路寢者生人所居不釁者不神之也考之者設盛食以落之耳疏釁屋者交神明之道也者釋所以不釁路寢之義言此屋與神明相交故釁之也蕙田案以上釁廟禮記雜記凡宗廟之器成則釁之以豭豚注宗廟名器謂尊彛之屬者疏器之名者尊彛之屬也若作名者成則釁之若細成則不釁名器則殺豭豚血塗之也不及廟故不用羊也周禮春官天府上春釁寶鎮及寶器注上春孟春也釁謂殺牲以血血之鄭司農云釁讀為徽或曰釁鼓之釁若疏云上春孟春也者謂建寅之月也殺牲取血釁之月令上春釁龜策等也云釁讀為徽者周禮先鄭皆讀釁為徽徽取飾義云或曰釁鼓之釁者讀從定四年祝他云君以軍行祓社釁鼓釁皆以血血之也禮記文王世子始立學者既興器用幣注興當為釁字之誤也禮樂之器成則釁之又用幣告先聖先師以器成新疏始立學者天子命諸侯始立教學又造禮樂之器成釁之既畢乃用幣告先聖先師以器成也然後釋菜既以幣告後又更釋菜告先聖先師以器成將用也案雜記宗廟之器其名者成則釁之以豭豚是器成當釁之故知興當為釁經言用幣故知告先聖先師以器成也周禮夏官大司馬若大師帥執事臨釁主及軍器注大師王出征伐也涖臨也主謂遷廟之主及社主在軍者也軍器鼓鐸之屬凡師既受甲迎主於廟及社主祝奉以從殺牲以血塗主及軍器皆神之奉疏云主謂遷廟之主左傳祝他云軍行祓社釁鼓祝以從尚書云用命賞於祖不用命戮於社皆是在軍是也小子釁邦器及軍器注邦器謂禮樂之器及祭器之屬雜記曰凡宗廟之器其名者成則釁之以豭豚禮疏鄭以軍器别言即云邦器者是禮樂之器也鄭云器者即射器之等樂器即鐘鼓之等祭器即籩豆俎簋尊彛器皆是引雜記宗廟器成釁之以豭豚者證此等所釁亦用豭豚也禮記樂記車甲釁而藏之府庫而弗復用注釁釁字也疏言車甲不復更用故以血釁而藏之周禮春官龜人上春釁龜注釁者殺牲以血之神之也玄謂上春者夏正建寅之月月令孟冬云釁祠龜莢相互矣秦以十月建亥為歲首則月令秦世之書亦或欲以歲首釁龜耳疏云釁者殺牲以血之神之也者謂若禮記雜記云廟成則釁之廟用羊門夾室用雞之類皆是神之故血之也禮記月令孟冬命太史釁龜莢注策蓍也周禮龜人上春釁龜秦以其歲終使太史釁龜策與周禮異矣龜疏太史史官釁龜策謂殺牲以血塗釁其及策策謂蓍也孟子齊宣王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之趙氏注胡齕王左右近臣也觳觫牛當到死地處恐貌新鑄鐘殺牲以血塗其釁郤因以祭之曰釁周禮大祝曰墮釁逆牲逆尸令鐘鼓天府上春釁寶鎮及寶器蕙田案釁禮之小者也故宗廟唯用羊若器則雞豚之屬而已釁鐘以牛非禮也春秋定公四年左氏傳君以軍行祓社釁鼓注師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁之疏釋天云起大事動大衆必先有事乎社而後出謂宜是軍師將出必有祭社之事也周禮女巫掌祓除釁浴則祓亦祭名故知祓社即宜社是也説文云釁血祭也是殺牲以血塗鼓鼙為釁鼓此皆祝掌之蕙田案以上釁器周禮夏官圉師春除蓐釁廄注蓐馬兹也馬既出而除之新釁焉神之也蕙田案此條釁廄周禮秋官司約若有訟者則珥而辟藏注鄭司農云謂有爭訟罪罰刑書謬誤不正者為之開藏取本刑書以正之當開時先祭之謂訟訟約若宋仲幾薛宰者也辟藏開府視約書不信不如約也珥讀曰衈謂殺雞取血釁其户户疏訟謂爭約劑不決者云則珥而辟藏者謂以血塗乃開闢其户以出本約劑之書勘之又曰司約所掌唯約劑之書先鄭以為爭訟罪罰刑書及以珥為祭後鄭皆不從而謂訟約若宋仲幾薛宰者案定元年正月晉魏舒合諸侯之大夫於狄泉將城成周宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命宋仲幾曰踐土固然又士彌牟曰子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎此是訟約法故引之為證云殺雞者以雜記云割雞當門其衈皆於屋下言衈故知用雞也蕙田案此條辟藏而釁周禮春官肆師以嵗時序其祭祀及其祈珥注序第次其先後大小祈當為造之雍禨之禨珥當為衈禨衈者釁禮之事雜記曰成廟則釁人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞其衈皆於屋下割雞門當門夾室中室然則是禨謂羊血也小子職曰掌珥於社稷祈於五祀是也孫奭孟子疏周禮大祝墮釁逆牲逆尸令鐘鼓者鄭司農云墮釁謂薦血也凡血祭曰釁既墮釁後言逆牲容逆鼎是也蓋古者器成而釁以血所以厭變怪禦妖釁釁鐘之釁謂之釁亦治亂謂之亂之類也鬯人共其釁鬯注釁尸以鬯酒使之香美者鄭司農云釁讀為徽疏鄭云釁尸以鬯酒使之香美者案肆師云大喪築鬻則此鬯酒中兼有鬱金香草故得香美也司農云釁讀為徽者以鬯釁尸故以徽為莊飾義也夏官羊人凡祈珥共其羊牲注共猶給也或疏犬人共犬此云共羊羊或犬俱得為釁故兩職各共之也侯禳釁積共其羊牲注鄭司農云謂釁國寶漬軍器也玄謂積積柴秋官士師凡刉珥則奉犬牲注珥讀為衈刉衈釁禮之事用牲毛者曰刉羽者曰衈衈疏鄭為衈者珥是玉名故破從衈取用血之意知刉是釁禮者雜記云成廟則釁之門夾室皆用雞其衈皆於屋下彼雖不言刉刉衈相將故知是釁禮知用牲毛者曰刉羽者曰衈者雜記雞言衈即毛曰刉可知犬人凡幾珥沈辜用駹可也注鄭司農云幾讀為庪爾雅曰祭山曰庪縣祭川曰浮沈駹謂不純色也玄謂幾讀為刉珥當為衈刉衈者釁禮之事疏幾珥言凡則宗廟社稷壇廟新成者皆釁之故云凡也云沈辜者沈謂沈牲於水辜謂疈磔牲體以祭云用駹者駹謂雜色牲此則牧人云毁事用駹是也云可也者用純為正用駹亦可也又曰先鄭讀幾為庪雖引爾雅後鄭不從云玄謂幾讀為刉從士師為正珥讀為衈從雜記為正云釁禮之事者據雜記而知也春官雞人凡釁共其雞牲注釁釁廟之屬釁廟以羊門夾室皆用雞鄭司農云釁讀為徽其疏鄭云釁釁廟之屬者言之屬則釁鼓釁甲兵皆在中釁廟以羊以下雜記文司農云釁讀為徽者亦謂以徽為飾治之義也蕙田案以上釁祭禮周禮春官女巫掌祓除釁浴注歲時祓除如今三月上巳如水上之類釁浴謂以香薰草藥沐浴故疏歲時祓除者非謂歲之四時惟謂歲之三月之時鄭君云如今三月上巳見今三月三日水上戒浴是也云釁浴謂以香薰草藥沐浴者若直言浴則惟有湯今兼言釁明沐浴之物必和香草經直云浴兼言沐者凡潔靜者沐浴相將故知亦有沐也蕙田案此條所言釁乃祓除之義非釁禮也春秋僖公十有九年邾人執鄫子用之左氏傳宋公使邾文公用鄫子於次睢之社欲以屬東夷公羊傅用之者何蓋叩其鼻以血社也成公三年左氏傅知罃曰執事不以釁鼓注釁鼓以血塗鼓昭公五年左氏傳楚子伐吳吳子使其弟蹶由犒師楚人執之將以釁鼓十一年楚師滅蔡執蔡世子友以歸用之范寧注用之者叩其鼻以衈社蕙田案釁社釁鼓皆古禮也然小事不用大牲而况敢用人乎以人血為釁怪矣又案以上釁附陳氏禮書釁者塗釁以血交神明之道也廟成則釁室成不釁以室不可以神之也宗廟之器其名者釁非名者不釁以非名者不足以神之也周官羊人釁共羊牲將以釁廟也雞人釁共雞牲將以釁門及夾室也犬人幾珥用駹禮記言宗廟之器釁之以豭豚則釁牲不特雞羊而已賈公彥曰或犬或羊俱得為釁是也小子珥於社稷祈於五祀羊人之祈衈犬人之幾珥士師之刉珥司約之珥鄭氏皆以為釁禮謂祈幾皆當為刉而珥當為衈毛牲曰刉羽牲曰衈其説蓋以禮記言釁而繼之以衈皆於屋下於是以祈珥為釁其詳不可考也古之用釁者多矣若天府釁寶鎮及寶器小子釁邦器及軍器龜人釁龜圉人釁廏以至社稷五祀與夫師行之主藏約之户或釁於始成或釁於將用其禮豈一端哉然釁有司行事而君不親犬羊為牲而牛馬不預有司爵辨而不冕牲駹而不純則釁之為禮也小矣後世有牛釁鐘而甚者有叩人鼻以衈社此先王之所棄也大祝隋釁令鐘鼓鄭氏曰隋釁謂薦血也凡祭血曰釁女巫掌嵗時祓除釁浴鄭氏曰釁浴謂以香薰草藥沐浴也然釁浴之於釁禮名同而實異若夫隋釁則挼與釁也鄭氏合之以為薦血誤矣右釁禮五禮通考卷五十七
