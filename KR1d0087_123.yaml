body:
  text: 五禮通考卷一百十三刑部尚書秦蕙田撰吉禮一百十三大夫士廟祭周禮地官載師以士田任近郊之地注士讀為仕仕者亦受田所謂圭田也夫疏單士恐不兼卿大故從仕官之仕禮記王制夫圭田無征注夫猶治也孟子曰卿以下必有圭田治圭田者不稅所以厚賢也此疏夫圭田者畿內無公田故有圭田卿大夫士皆以治圭田公家不稅其物故云無征必云圭者圭潔白也陳氏禮書孟子言九一而助繼之以圭田五十畝餘夫二十五畝者圭田祿外之田也餘夫夫外之田也祿外之田半百畝夫外之田又半之此自百畝而差之然也古者自卿士達乎圭田同等欲各致其誠敬而已後世因職分田以貴賤制之非禮意也孟子卿以下必有圭田圭田五十畝注古者卿以下至於士皆受圭田五十畝所以供祭祀也圭潔也所謂惟士無田則亦不祭王制曰夫圭田無征謂餘夫圭田皆不出征賦也時無圭田餘夫孟子欲令復古所以重祭祀利民之道也疏謂之圭田者所以名其潔而供祭祀之田也陳氏禮書士虞禮曰圭為哀薦之饗詩之吉蠲或作吉圭則圭田潔白也惟士無田則亦不祭則圭田所以共祭也卿以下有圭田猶天子諸侯侯之有藉也圭田無征所以厚賢也右圭田禮記曲禮凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服君子雖貧不粥祭器雖寒不衣祭服注大夫稱家謂家始造事無田祿者祭器可假有田祿者祭服宜自有粥賣也大疏家造大夫始造家事也崇敬祖禰故祭器為先有地夫祭器祭服俱造然雖得造器必先為祭服後為祭器耳緣人形參差衣服有大小不可假借故宜先造胡氏銓曰家謂人家鄭云大夫稱家非也若止謂大夫造祭器則下云祭器不踰竟何以兼士乎呂氏大臨曰犧賦亦謂器也犧牲之器如牢互盆簝之屬也孟子曰惟士無田則亦不祭牲殺器皿衣服不備故也不祭則薦而已與庶人同故不設祭器也有田祿則牲殺器皿衣服皆不可不備方氏慤曰以無田祿者不設祭器故禮運以祭器不假為非禮以有田祿者必具祭器故王制以祭器不假為禮此其辨也大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士注祭器用君祿所作取以出竟恐辱親也寓寄也與得用者言寄覬已復還問大夫之富曰有宰食力祭器衣服不假疏祭器衣服不假者謂四命大夫也衣服祭服也四命大夫得自造祭器衣服陳氏禮書周禮鄉師比共吉凶二服閭共祭器曲禮無田祿者不設祭器有田祿者先為祭服蓋無田祿者可共而不可設有田祿者可設而不可具則具而不假者大夫禮之盡也雜記大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭於己可也注辨爵辨也冠玄冠也祭於公助君祭也大夫爵辨而祭於己惟孤爾然則士辨而祭於己緣類欲許之也親迎雖亦己之事攝盛服爾非常也於疏此明大夫士公私祭服大夫謂孤也冕絺冕也祭己自祭廟也助祭為尊故服絺冕自祭為卑故服爵辨士以爵辨為上故用助祭冠玄冠為卑自祭不敢同助君之服故用玄冠也作記之人雖云士冠而祭於己以己既爵辨親迎親迎輕於祭尚用爵辨則自用爵辨自祭已廟於禮可用也崔氏靈恩曰孤不悉絺冕若王者之後及魯之孤則助祭用絺若方伯之孤助祭則玄冕以其君玄冕自祭不踰之也馬氏晞孟曰周禮曰卿之服自玄冕而下士之服自皮辨而下則大夫以玄冕為極而士以爵辨為極也詩周南采蘋于以盛之維筐及筥于以湘之維錡及釡傳方曰筐圓曰筥湘亨也錡釡屬有足曰錡無足曰釡箋亨蘋藻者于魚湆中是鉶羮之芼大學衍義補丘氏濬曰朱子謂籩豆簠簋之器乃古人所用故當時祭享皆用之今以燕器代祭器常饌代爼肉楮錢代幣帛是亦以平生所用是謂從宜也案人子之事親當事死如事生事亡如事存吾之祖考平日所用之器皿如此所被之衣服如此及其死亡也而又别為器與服以事之豈不駭其見聞哉古人生用几筵爼豆則死亦用几筵爼豆以事之今人之生所用者桌椅杯盤死所用者亦當以桌椅杯盤是即朱子所謂從宜者也政不必泥於古一惟稱家之有無隨俗之所尚惟誠惟孝起敬起慕雖不能一一如古人行禮之度數而古人行禮之心則固常存也右祭器衣服冕辨禮記曲禮大夫以索牛士以羊豕注索求得而用之滌疏公羊帝牲必在三月稷牛惟具稷牛有災故臨時得别求之是天子諸侯得有索牛也此大夫士謂天子大夫士也若諸侯大夫即用少牢士則用特牲其喪祭大夫亦得用牛士亦用羊豕故雜記云上大夫之虞也少牢卒哭成事祔皆太牢下大夫之虞也犆牲卒哭成事祔皆少牢是也其大夫牲體完全亦有犧牲之稱故上云大夫犧賦為次但不毛色純耳案楚語觀射父云古者牛羊必在滌三月小者犬豕不過十日此大夫索牛士羊豕既不在滌三月當十日以上但不知其日數耳方氏慤曰於大夫言索者以無養獸之官必索而後得之故也所謂羊豕者或以羊或以豕也王制大夫無故不殺羊士無故不殺犬豕庶人無故不食珍庶羞不踰牲燕衣不踰祭服寢不踰廟注故謂祭享羞不踰牲謂祭以羊則不以牛肉為羞也禮器羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也注稱牲之大小而為爼此指謂助祭者耳足猶得也云百官喻衆也疏臣助祭則各有爼祭竟播及胞翟雖復羔豚之小而百官皆悉得之假令大牢亦不使有餘小而皆得大而不餘是各稱牲體也大夫士有田則祭無田則薦則無地大夫士薦羔豚也無地則無臣助祭故鄭云百官喻衆也陸氏佃曰羔豚而祭謂小祭祀大牢而祭謂大祭祀先儒謂羔豚為無地大夫之祭是猶讀雲漢而責周無遺民也蕙田案大夫祭用少牢謂羊豕此云羔豚乃羊豕之小者耳與無田則薦之説無與孔氏非也陸農師以為小祭祀亦非字説羔小羊豚豕子君子大牢而祭謂之禮匹士大牢而祭謂之攘注君子謂大夫以上士疏大夫常祭少牢遣羮及卒哭祔用大牢匹士也士常祭特豚遣奠卒哭祔加一等少牢馬氏晞孟曰君子者以位之貴者言之匹士者以位之賤者言之古者天子諸侯卿大夫皆君子也天子諸侯卿大夫位之尊其禮可以致其隆故曰天子以犧牛諸侯以肥牛大夫以索牛此大牢而祭謂之禮也至於匹士大牢而祭故謂之攘攘者非其有而取之也春秋襄二十二年左氏傳九月鄭公孫黑肱有疾歸邑於公召室老宗人立段而使黜官薄祭祭以特羊殷以少牢注四時祀以一羊三年盛祭以羊豕殷盛也時疏少牢饋食禮者諸侯之大夫時祭之禮也是祭用少牢今公孫黑肱使黜官薄祭故時祭用特羊禮器云君子大牢而祭謂之禮是大夫之祭有用大牢時也雜記云上大夫之虞也少牢卒哭成事祔皆大牢據此二文大夫得用大牢者禮器之文據天子大夫故也雜記據喪祭故進用等士喪禮士遣奠用少牢是也國語楚語屈到嗜芰有疾召其宗老而囑之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子薦之子木曰不然夫子承楚國之政其法刑在民藏在王府上之可以比先王下之可以訓後世雖微楚國諸侯莫不譽其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用禮記祭器有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角注凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散小疏特牲云主人獻尸用角佐食洗散以獻尸是尊者卑者大案天子諸侯及大夫皆獻尸以爵無賤者獻以散之文禮文散亡略不具也特牲主人獻尸用角者下大夫也尊者舉觶卑者舉角者案特牲少牢禮尸入舉奠觶是尊者舉觶特牲主人受尸酢受角飲者是卑者舉角此是士禮天子諸侯祭禮亡文不具也陸氏佃曰貴者獻以爵賤者獻以散所謂尸飲五君洗玉爵獻卿尸飲九以散爵獻士尊者舉觶卑者舉角者凡妥尸天子舉斚諸侯舉角則卿舉觶大夫舉角歟若特牲饋食酳尸以角旅酬更以觶與此不同者蓋卑者以大為貴然則此經所言蓋天子諸侯之儀也蕙田案賤者獻以散疏以為禮無其文而陸農師引祭統散爵獻士為説蓋獻義原兼下獻上上獻下兩義不必專指下獻上陸説亦可通然明堂位加以璧散加爵係助祭之賔所獻此仍是下獻上疏不引之未詳何説坊記子云七日戒三日齋承一人焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賔飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲注戒謂散齋也承猶事也澄酒清酒也三酒尚質不尚味淫猶貪也上下猶尊卑也主人主婦上賔獻尸乃後獻主人降洗爵獻賔也因其酒肉聚其宗族言祭有酒食羣昭羣穆皆至而獻酬之咸有薦爼也堂上觀乎室堂下觀乎上謂祭時肅敬之威儀也注主人至獻賔此儀禮特牲文在堂上者觀望在室之人以取法在堂下者觀望堂上之人以為則上下內外更相效法葉氏夢得曰助祭而羣昭羣穆咸在其賜爵者皆以齒也故以教民睦詔祝升首皆在室故堂上觀乎室羮定酳尸皆在堂故曰堂下觀乎上蕙田案因其酒肉聚其宗族此指祭畢之燕即中庸燕毛序齒楚茨備言燕私之事鄭以獻酬薦爼為説者祗緣所引詩詞當在獻酬交錯時故也不知獻酬乃賔主之事燕私乃族人之事經云聚其宗族不得以獻酬當之引詩斷章未可拘泥尸飲三衆賔飲一此酳尸之事主人獻尸尸酢主人主婦獻尸尸酢主婦衆賔獻尸尸酢衆賔故曰尸飲三衆賔飲一陸農師以祼獻為言其説無稽又酳尸在室葉氏以為在堂亦誤祭義曾子曰父母既沒必求仁者之粟以祀之此之謂禮終注喻貧困猶不取惡人物以事亡親也黃氏曰粟者祿也謂父母既沒必仕於仁諸侯賢大夫之朝立身行道以終祭祀危邦不入亂邦不居恐辱先也孟子云士三月無君則弔失於祭祀之禮也親沒者必居於仁者之朝食祿行道以終祭祀之禮為有終也右牲牢酒醴黍稷祭統鋪筵設同几為依神也注同之言詷也祭者以其妃配亦不特几也疏詷共也人生時形體異故夫婦别几死則魂氣同歸於此故夫婦共几鄭注以某妃配儀禮少牢文謂祭夫祝辭不但不特設辭亦不特設其几祝辭與凡皆同於夫也故鄭注同几筵云祭於廟同几精氣合也席亦共之必云同几者筵席既長几則短小恐其各設故云同几也朱子語録問生時男女異席祭祀亦合異席今夫婦同席如何曰夫婦同牢而食家廟之制伊川只以元妃配蓋古者只是以媵妾繼室故不容與嫡並配後世繼室乃是以禮聘娶自得為正故唐會要中載顔魯公家祭有並配之儀祭於别室恐未安蕙田案朱子答汪尚書有正廟配食止合用初配一人其再娶及庶母之屬皆各為别廟祀之云云蓋朱子未定之説當以語録為正右鋪筵設几坊記禮非祭男女不交爵注交爵謂相獻酢尸疏特牲饋食禮云主婦獻尸酢主婦是非祭不交爵也內則男女非祭非喪不相授器注祭嚴喪遽授器不嫌也家語公父文伯之母季康子之從祖母康子往焉側門而與之言皆不踰閥文伯祭其祖悼子康子與焉進爼而不授徹爼而不與燕宗老不具則不繹繹不盡飫則退孔子聞之曰男女之别禮之大經公父氏之婦動中德趣度於禮矣右交爵授器論語祭肉不出三日出三日不食之矣注鄭曰自其家祭肉過三日不食是褻鬼神之餘也朱子集注家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也禮記少儀為人祭曰致福為己而致膳於君子曰膳祔練曰告凡膳告於君子主人展之以授使者於阼階之南南面再拜稽首送反命主人又再拜稽首其禮大牢則以牛左肩臂臑折九個少牢則以羊左肩七個犆豕則以豕左肩五個注曰致福曰膳曰告此皆致祭祀之餘於君子也攝主言致福申其辭自祭言膳謙也祔練言告不敢以為福膳也主人展之展省具也折斷分之也皆用左者右以祭也羊豕不言臂臑因牛序之可知方氏慤曰膳夫所謂凡祭祀之致福也受而膳之是矣必謂之福以言祭者獲福致其餘於人而與之同其福也曰致膳者蓋祭祀不祈為己而祭非敢邀福以其味之善乃致之於君子爾於致膳曰君子則致福又可知矣至於練祔特告死者之已練而已故直以告稱之展與展墓之展同主人展之省其善否也其授使者與反命皆再拜稽首則敬之至也止言膳告而不及致福則致福者尤致其敬不嫌其不如是矣臂則脛也臑其節也右分肉致福論語祭如在注孔曰言事死如事生朱子集注程子曰祭祭先祖也祭先主於孝愚謂此門人記孔子祭祀之誠意朱子語録問祭如在人子固是盡誠以祭不知其可使祖宗感格否曰上蔡言自家精神即祖考精神這裏盡其誠敬祖考之氣便在這裏只是一箇根苗來如樹已枯朽邊旁新根即接續這正氣來子曰吾不與祭如不祭注包曰孔子或出或病而不自親祭使攝者為之不致肅敬於心與不祭同朱子集注又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未嘗祭也禮記玉藻凡祭容貌顔色如見所祭者注如覩其人在此疏凡祭謂諸祭也容貌恭敬顔色溫和似見所祭之人謂如在也方氏慤曰孝子之祭也退而立如將受命蓋容貌如見所祭者也已徹而退敬齋之色不絶於面蓋顔色如見所祭者也凡行廟中齊齊注齊齊恭慤貌自疏廟中對神行步不敢舒散齊齊收持嚴正之貌祭義仲尼嘗奉薦而進其親也慤其行也趨趨以數已祭子贛問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也子曰濟濟者容也逺也漆漆者容也自反也容以逺若容以自反也夫何神明之及交夫何濟濟漆漆之有乎反饋樂成薦其薦爼序其禮樂備其百官君子致其濟濟漆漆夫何慌惚之有乎夫言豈一端而已夫各有所當也注嘗秋祭也親謂身親執事時也慤與趨趨言少威儀也趨讀如促數之言速也漆漆讀如朋友切切自反猶言自修整也及交及與也容以逺言非所以接親親也容以自反言非孝子所以事親也此皆非與神明交之道也天子諸侯之祭或從血腥始至反饋是進熟也薦爼豆與爼也慌惚思念益深之時也豈一端言不可以一槩也禮各有所當行祭宗廟者賔客濟濟漆漆主人慤而趨趨方氏慤曰特言嘗則與月令言嘗犧牲祭法言享嘗乃止同義奉薦而進謂子奉所薦之時物而進之於其親也慤言奉之之容完實而無文趨趨以數言行之之節收攝而不疏濟濟者威儀之齊而逺則優遊而不迫漆漆者威儀之飾自反則反覆而不茍濟濟者之逺則異乎趨數者矣漆漆之自反則異乎慤者矣容以逺若容以自反則致其飾而於神明之道不及以交矣致其濟濟漆漆則非以慌惚與神明交矣慌焉若無惚焉若有神人之道幽明之際以誠心交之其狀如此周氏諝曰濟濟之容逺也而漆漆之容自反也逺而自反非主祭者之容特其助祭者之容耳故孔子之言祭則濟濟漆漆而親奉祭則慤而趨趨者蓋言之各有所當也孝子之祭也盡其慤而慤焉盡其信而信焉盡其敬而敬焉盡其禮而不過失焉進退必敬如親聽命則或使之也注言當盡已而已如居父母前將受命而使之孝子之祭可知也其立之也敬以詘其進之也敬以愈其薦之也敬以欲退而立如將受命已徹而退敬齊之色不絶於面孝子之祭也立而不詘固也進而不愈疏也薦而不欲不愛也退立而不如受命敖也已徹而退無敬齊之色而忘本也如是而祭失之矣注詘充詘形容喜貌也進之謂進血腥也愈顔色和貌也薦之謂進熟也欲婉順貌齊謂齊莊固猶質陋也而忘本而衍字也方氏慤曰其立之也言方待事而立也其進之者言既從事而進也其薦之也言奉其物而薦也退而立者言其進而後退也已徹而退者言既薦而後徹也蓋退而立則少退而已己徹而退則於是乎退焉詘則身之屈也愈則色之愈也欲則心之欲也退而立如將受命則順聽而無所忽焉己徹而退敬齊之色不絶於面則慎終如始也蕙田案詘謂身之屈進即進退之進方解得之注訓詘為喜貌進為進血腥未的孝子將祭祀必有齊莊之心以慮事以具服物以修宮室以治百事及祭之日顔色必溫行必恐如懼不及愛然其奠之也容貌必溫身必詘如語焉而未之然宿者皆出其立卑靜以正如將弗見然及祭之後陶陶遂遂如將復入然是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也注百事謂齊之前後也如懼不及愛如懼不及見其所愛者也奠之謂酌尊酒奠之及酳之屬也如語焉而未之然如有所以語親而未見答也宿者皆出謂賔助祭者事畢出去也如將弗見然祭事畢而不知親所在思念之深如不見出也陶陶遂遂相隨行之貌思念既深如覩親將復入也術當為遂聲之誤也禮器子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎疏正祭之時事尸在室外人將饌至戶內人於戶內受饌設於户前相交承接在於戶也正祭後儐尸之時事尸於堂堂下之人送饌至階堂上之人於階受取是交乎階也張子曰室事交乎戶堂事交乎階亦通達連續之義也方氏慤曰室事謂有事乎室若血毛詔於室之類堂事謂有事乎堂若羮定詔於堂之類執事者內外異位乃以內而交乎外上下異等乃以上而交乎下則尤易為力矣宜乎質明而始行事晏朝而退也蕙田案大夫無朝踐於堂之禮故注疏訓堂事為儐尸其實少牢禮正祭時自陳鼎東序至上𧃊親嘏其有事於堂者不少不應獨指儐尸為堂事也方氏説得之右容儀節度郊特牲諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也注仲孫叔孫季孫氏皆立桓公廟魯以周公之故立文王廟三家見而僣焉臨疏鄭知魯得立文王廟者案襄十二年吳子夀夢卒於周廟禮也注云周廟文王廟也此經云諸侯不敢祖天子而文二年左傳云宋祖帝乙鄭祖厲王大夫不敢祖諸侯而莊二十八年左傳云凡邑有宗廟先君之主曰都彼據有大功德者此據尋常諸侯大夫也朱子語録諸侯不得祖天子然魯有文王廟左氏亦云鄭祖厲王何也此必周衰諸侯僭肆做此違條礙法事故公廟設於私家禮器管仲鏤簋朱紘山節藻棁君子以為濫矣注濫亦盜竊鏤簋謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯青組紘大夫士當緇組紘纁邊栭謂之節梁上楹謂之棁宮室之飾士首本大夫達稜諸侯斫而礱之天子加密石焉無畫山藻之禮也方氏慤曰是皆天子之禮管仲以陪臣為之則過於奢矣奢則僣故君子以為濫濫者溢而無所制之謂也雜記所謂難為上者以此晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣注隘猶狹陋也祀不以少牢與無田者同不盈禮也大夫士有田則祭無田則薦浣衣濯冠儉不務新方氏慤曰隘者陋而無所容之謂雜記所謂難為下者以此禮運祝嘏辭説藏於宗祝巫史非禮也是謂幽國盞斚及尸君非禮也是謂僭君大夫具官祭器不假聲樂皆具非禮也是謂亂國注藏於宗祝巫史言君不知有也幽暗也國暗者君與大夫俱不明也盞斚先王之爵也唯魯與王者之後得用之耳其餘諸侯用時王之器而已僣君謂僣禮之君也臣之奢富擬於國君敗亂之國也孔子謂管仲官事不攝焉得儉疏大夫若有地者置官一人兼攝羣職不得具足其官大夫無地則不得造祭器有地雖造而不得具足並須假借唯公孤以上得備造故周禮四命受器鄭云此公之孤始得有祭器者也又云王之下大夫亦四命大夫自有判縣之樂不得如三桓舞八佾一曰大夫祭不得用樂故少牢饋食無奏樂之文唯君賜乃有之大夫並為上事與君相敵則非禮也周氏諝曰以官事不攝於聲樂皆具為非禮則然矣以祭器不假為非禮則誤矣王制曰大夫祭器不假祭器未成不造燕器果大夫祭器猶且假之則燕器蓋未嘗有殆非先王養成德者之義也應氏鏞曰祝嘏辭説藏於公而不藏於私若金縢納於匱中是也周公不欲宣其事而揚己之功故命祝史勿敢言若夫常時祭祀之辭説未嘗不使人知之也故曰宣祝嘏辭説茍欲聽宗祝巫史為之而又俾私其藏不為隨之矯舉則為漢之祕祝矣蕙田案祝嘏辭説藏於宗祝巫史應氏之説得之無祭器則亦無燕器孟子所謂牲殺器皿衣服不備不敢以祭則不敢以宴是也意士無田不祭其無田之大夫猶得假祭器以祭歟春秋僖公十有五年九月己卯晦震夷伯之廟注夷伯魯大夫展氏之祖父夷諡伯字震者雷電擊之髙氏閎曰不曰公孫者大夫三廟宜毁而不毁故貶之也左氏傳震夷伯之廟罪之也於是展氏有隱慝焉公羊傳震之者何雷電擊夷伯之廟者也夷伯者曷為者也季氏之孚也季氏之孚則微者其稱夷伯何大之也曷為大之天戒之故大之也榖梁傳夷伯魯大夫也因此以見天子至於士皆有廟天子七廟諸侯五大夫三士二故德厚者流光德薄者流卑是以貴始德之本也始封必為祖注夷伯之廟過制家語魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年將亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過期而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親將祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也季桓子將祭齊三日而二日鐘鼓之音不絶冉有問於孔子子曰孝子之祭也散齋七日慎思其事三日致齊而一用之猶恐其不敬也而二日伐鼓何居焉右廟祭僭忒禮記曾子問曾子問曰大夫之祭鼎爼既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭於死者無服則祭注齊衰異門則祭室中之事謂賔長獻士之所以異者緦不祭則士不得成禮者十一也死者無服謂若舅舅之子從母昆弟右臨祭廢禮王制庶人祭於寢注寢適寢也史疏此庶人祭寢謂是庶人在官府之屬及尋常庶人此祭謂薦物以其無廟故知薦而已薦獻不可褻處故知適寢程子曰庶人五服皆至髙祖服既如是祭祀亦當如是庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以雁注庶人無常牲取與新物相宜而已牲疏云取與物相宜者謂四時之間有此榖兩物俱有故云相宜若牛宜稌羊宜黍之屬非謂氣味相宜也陳氏禮書卵魚豚雁以時之所宜論之則春宜豚冬宜鮮此則秋以豚夏以魚以物之相宜論之則羊宜黍豕宜稷雁宜麥魚宜苽此則黍以豚麥以魚何也蓋魚之於夏豚之於秋雁之於冬尤多而易得者也庶人之薦不過致其易得者而已月令季秋薦稻稻常穫於十月而天子以前此者為貴故與庶人異方氏慤曰韭之性溫則陽類也故以配卵卵隂物故也麥與黍皆南方之榖亦陽類也故配以魚與豚魚與豚皆陰物也稻則西方之榖則陰類也故配以雁雁陽物故也植物之陽者配以動物之陰植物之陰者配以動物之陽亦使陽不勝陰陰不勝陽而已大戴禮無祿者稷饋稷饋者無尸無尸者厭也注庶人無常牲故以禮為主國語楚語庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈又曰庶人食菜祀以魚又曰士庶人舍時陳氏禮書庶人之死曰鬼寢而不廟薦而不祭故春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以雁取其與新物相宜而已國語曰庶人有魚炙之薦而不及豚雁者舉其所易者言之也然言庶人舍時則與王制異矣古之貴者有正寢有燕寢正寢在外燕寢在內然則庶人祭於寢蓋亦在外之適寢歟聘禮記卿館於大夫大夫館於士士館於工商鄭氏曰官師以上有廟有寢工商則寢而已寢所以館士則在外可知右庶人祭寢禮記檀弓君子有終身之憂而無一朝之患故忌日不樂注終身之憂謂念其親無一朝之患謂毁不滅性也忌日謂死日不用舉吉事方氏慤曰忌日不樂蓋終身之憂有見於此祭義君子生則敬養死則敬享思終身弗辱也君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也注享猶祭也饗也忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至於親以此日亡其哀心如喪時疏非謂忌日不善别有禁忌不舉事也以孝子至意有所至極思念親不敢盡其私情而營他事也輔氏廣曰忌日當以喪禮處之文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也注言思親之深喪大記大夫士父母之喪既練而歸朔月忌日則歸哭於宗室注歸謂歸其宮也忌日死日宗室宗子之家謂殯宮也禮命士以上父子異宮疏朔月朔望也忌日死日也宗室適子家殯宮也庶子雖練各歸至忌日及朔望則歸殯宮也程子曰忌日必遷主出祭於正寢蓋廟中尊者所據又同室難以獨享也張子曰或問忌日有薦可乎曰古則無之今有於人情自亦不害凡忌日必告廟為設諸位不可獨享故迎出廟設於他次既出則當告諸位雖尊者之忌亦迎出此雖無古禮可以意推薦用酒食不焚楮幣其子孫食素古人於忌日不為薦奠之禮特致哀示變而已朱子語類先生母夫人忌日著黲黑布衫其巾亦然友人問今日服色何謂曰公豈不聞君子有終身之喪問忌日當哭否曰若是哀來時自當哭又問衣服之制曰某自有弔服絹衫絹巾忌日則服之輔廣録忌日祭只祭一位問君子有終身之喪忌日之謂也不知忌日合著如何服曰唐時士大夫依舊孝服受弔五代時某人忌日受弔某人弔之遂於坐間刺殺之後來只是受人慰書而不接見須隔日預辦下謝書俟有來慰者即以謝書授之不得過次日過次日謂之失禮服亦有數等考與祖曾祖髙祖各有降殺妣與祖妣服亦不同大槩都是黲衫黲巾後來橫渠制度又别以為男子重乎首女子重乎帶考之忌日則用白巾之類疑亦是黲巾而不易帶妣之忌日則易帶而不改巾服亦隨親踈有隆殺問先生忌日何服曰某只著白絹涼衫黲巾不能做許多樣服得問黲巾以何為之曰紗絹皆可某以紗又問黲巾之制曰如帕復相似有四隻帶若當幞頭然沈僴録問時祭用仲月清明之類或是先世忌日則如之何曰却不思量到古人所以貴於卜日也過每於士大夫家忌日用浮屠誦經追薦鄙俚可怪既無此理是使其先不血食也乙卯年見先生家凡值逺諱蚤起出主於中堂行三獻之禮一家固自蔬食其祭祀食物則以待賔客考妣諱日祭罷裹生絹黲巾終日一日晚到閣下尚裹白巾未除問未葬不當時祭遇先忌如何朱子曰忌者喪之餘祭亦無妨然正寢已設几筵即無祭處亦可暫停顔之推家訓禮云忌日不樂正以感慕罔極惻愴無聊故不接外賓不理衆務爾必能悲慘自居何限於深藏也世人或端坐奧室不妨言笑盛營甘美厚供齋食迫有急卒密戚至交盡無相見之理蓋不知禮意乎魏世王修母以社日亡來歲社修感念哀甚鄰里聞之為之罷社今二親喪亡偶值伏臘分至之節及月小晦後忌之外所經此日猶應感慕異於餘辰不預飲宴聞聲樂及行遊也李濓忌日答問李子當考妣忌日必杜門謝客不親書史蔬素竟日客有造謁於門者閽人辭焉他日客慍見李子再拜謝已而歎曰古禮之不明於天下也久矣檀弓曰忌日不樂祭義曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也又曰忌日必哀某於考妣忌日致齋於內不通賔客守先王之禮也亦情之不容己者也粵稽諸古若王修之母以社日亡每歲社日修感念哀甚里閭為之罷社祝欽明以匿親忌日而貶申日元亘以忌日辭攝祭而甘坐罰凡此咸可鑒也夫既見賔客必接談笑而孝子之心忍乎不忍乎顔氏家訓曰忌日不樂正以感慕罔極愴惻無聊故不接外賔不理衆務而艾仲孺侍郎嘗聞其祖母于歸時衣笥中得黲黑衣婦姒皆驚駭詰之曰父母教以遇翁家忌日著此服爾當時衣冠之家猶知此禮惜今未之聞也晦菴先生每于母夫人忌日著黲黑巾衫門人問其故先生曰子豈不聞君子有終身之喪乎先生凡值先代忌日必早起出主於中堂行三獻禮闔門蔬食此士大夫所當法也故曰君子有終制之喪有終身之喪有如須之喪終制之喪三年是也終身之喪忌日是也如須之喪弔日是也夫天之道隂陽不同時則當寒而燠者逆道也人之理哀樂不同日則忌日接見賔客談笑如故者逆理也君子愛人以德君其勿深咎豫哉客再拜曰先生教我合作忌日答問薛夢禮教家類纂凡祭祀所以報本不可不重近世多不行四時之祭惟於忌日設祭前期不齋臨祭無儀祭畢請客飲酒皆非禮也今宜悉依家禮援忌日祭止本親用四蔬果小三牲考以妣配妣不考右忌日祭中庸薦其時食朱子集注時食四時之食各以其物如春行羔豚膳膏香之類是也蕙田案中庸薦其時食指正祭言今俗節之祭古禮所無然與薦時食之義相近故先賢不廢家禮云俗節則獻以時食是也朱子語録朔旦家廟用酒果望旦用茶重午中元九日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦俗節酒止一上斟一杯叔器問行正禮則俗節之祭如何曰韓魏公處得好謂之節祠殺於正祭某家依而行之朱子文集答張欽夫書節祀有説蓋今之俗節古所無有故古人雖不祭而情亦自安今人既以此為重至於是日必具殽羞相宴樂而其節物亦各有宜故世俗之情至於是日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能已者但不當專用此而廢四時之正禮耳古人不祭則不敢以燕况今於此俗節既已據經而廢祭而生者則飲食燕樂隨俗自如殆非事死如事生事亡如事存之意也必盡廢之然後可又恐初無害於義理而特然廢之不惟徒駭俗聽若恐不能行逺則是已廢之祭拘於定制不能復舉而燕飲節物漸於流俗有時而自如也此於天理亦豈得謂安乎夫三王制禮因革不同皆合乎風氣之宜而不違乎義理之正正使聖人復起其於今日之議亦必有所處矣丘氏濬大學衍義補家禮俗節則獻以時食如清明寒食端午中元重陽之類右節薦蕙田案忌日俗節之祭古人所無而今人所有且為大夫士庶人通行之禮故並列焉春秋僖公十年左氏傳神不歆非類民不祀非族疏傳稱非我族類其心必異則族類一也皆謂非其子孫妄祀他人父祖則鬼神不歆享之耳襄公六年榖梁傳立異姓以蒞祭祀滅亡之道也史記趙世家趙武服程嬰公孫杵臼齊衰三年為之祭邑春秋祠之世世勿絶正義今河東趙氏祠先人猶别舒一座祭二士矣朱子文集答汪尚書宋公以外祖無後而歲時祭之此其意可謂厚矣然非族之祀於禮既未安而勢不及其子孫則為慮亦未逺曷若訪其族親為之置後使之以時奉祀之為安便而久長哉但貧賤之士則其力或不足以為此或雖為之而彼為後者無所顧於此則亦不能使之致一於所後若宋公則其力非不足為若為之而割田築室以居之又奏授之官以祿之則彼為後者必將感吾之誼而不敢乏其祀矣此於義理甚明利害亦不難曉竊意宋公特欲親奉蒸嘗以致吾不忘母家之意而其慮遂不及此耳若果如此則其為後者主其祭而吾特往助其饋奠亦何為而不可願早為之使異時史策書之可以為後世法蕙田案非族之祀世俗亦間有之列於末條以為承祭者之戒右不祀非族五禮通考卷一百十三
