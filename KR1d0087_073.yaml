body:
  text: 五禮通考卷六十三刑部尚書秦蕙田撰吉禮六十三宗廟制度周禮春官鬱人掌祼器注祼器謂彛及舟與瓚經疏知祼器中有彛及舟者此下文云和鬱鬯以實彛又見司尊彛云春祠夏禴祼用雞彛鳥彛皆有舟秋冬及追享朝享皆云焉故知有彛舟也知有瓚者案禮記王制云諸侯賜圭瓚然後為鬯尚書序云平王賜晉文侯秬鬯圭瓚皆與秬鬯相將即下文祼玉是也故知祼器中有瓚瓚則兼圭瓚璋瓚也鄭氏鍔曰典瑞於祼圭有瓉特辨其名物司尊彛於彛舟特詔其爵辨其用蓋不掌其器鬱人取所築以煮之鬱金以和秬鬯實之于六彛故并祼器掌之禮記明堂位灌尊夏后氏以雞夷殷以斚周以黃目其勺夏后氏以龍勺殷以疏勺周以蒲勺注夷讀為彛周禮春祠夏禴祼用雞彛鳥彛秋嘗冬蒸祼用斚彛黃彛龍龍頭也疏通刻其頭蒲合蒲如鳬頭也疏此一經明魯有三代灌尊及所用之勺彛法也與餘尊為法故稱彛雞彛者或刻木為雞形而畫雞于彛斚畫為禾稼黃目以黃金為目鄭引周禮以下司尊彛之文雞彛盛明水鳥彛盛鬱鬯斚彛黃彛義亦然龍勺勺為龍頭疏為刻鏤通刻勺頭蒲謂刻勺為鳬頭其口微開如蒲草本合其末微開口也陳氏禮書尊之為言尊也彛之為言常也尊用以獻上及於天地彛用以祼施于宗廟而已故尊於祭器獨名尊彛於常器均名彛籍談曰有勛而不廢撫之以彛器臧武仲曰大伐小取其所得以作彛器則彛之為常可知矣尊亦謂之彛彛亦謂之尊故黃目彛也記曰鬱氣之上尊雞斚皆彛也明堂位曰灌尊然彛之為器不特飾以雞鳥黃目虎蜼之象而已凡邦國之約劑書於此司約大約劑書於宗彛是也凡臣之有功銘于此祭統勤大命施于蒸彛鼎是也蓋臣之有功祭于大蒸故勤大命者施於蒸彛鼎則三時之彛不預也又曰雞者司晨之始則隂盛而陽微祼所以求諸隂故夏后氏以之若夫司尊彛以春言之者春則所謂時之首焉者也龍勺龍陽中之隂也淵潛而為仁以澤萬物故夏以之殷以疏者亦前疏屏之意蒲之為物柔而順有懷柔百神之意陸氏佃曰六彛雞東方也鳥南方也虎西方也蜼北方也黃彛斚彛中央也鄭氏謂斚畫禾稼龍勺為龍頭蒲勺為鳬頭疏勺為雉頭經曰雉曰疏趾龍勺以能施為義疏勺以能不淫為義蒲勺以能不溺為義周禮春官司尊彛春祠夏禴祼用雞彛鳥彛皆有舟秋嘗冬蒸祼用斚彛黃彛皆有舟凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟注雞彛鳥彛謂刻而畫之為雞鳯凰之形皆有舟言春夏秋冬及追享朝享有之同鄭司農云舟尊下臺若今時承槃斚讀為稼稼彛畫禾稼也黃彛黃目尊也明堂位曰夏后氏以雞彛殷以斚周以黃目玄謂黃目以黃金為目郊特牲曰黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌于中而清明于外蜼禺屬卬鼻而長尾疏云雞彛鳥彛謂刻而畫之為雞鳯凰之形者案尚書云鳴鳥之不聞彼鳴鳥是鳯凰則此鳥亦是鳯凰故云畫雞鳯凰之形也云皆有舟言春夏秋冬及追享朝享有之同者即文自具故知有之同也鄭司農云舟尊下臺若今時承槃者漢時酒尊下槃象周時尊下有舟故舉以為况也云斚讀為稼稼彛畫禾稼也者以諸尊皆物為飾今云斚于義無取故破從稼也云黃彛黃目尊也者依明堂位文引明堂位者證雞彛是夏法斚彛是殷法黃彛是周法玄謂黃目以黃金為目者無正文鄭以目既為眼目黃又與黃金字同故為黃金釋之也引郊特牲者解黃目之義也云蜼禺屬卬鼻而長尾者案雞彛鳥彛相配皆為鳥則虎彛蜼彛相配皆為獸故爾雅蜼在釋獸中云蜼禺屬彼注蜼似獼猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨即自懸于樹以尾塞鼻或以兩指今江東人亦取養之為物捷健若然向來所説雞彛鳥彛等皆有所出其虎彛蜼彛當是有虞氏之尊故鄭注尚書云宗彛宗廟之中鬱尊虞氏所用故曰虞夏以上虎蜼而已也鄭氏鍔曰祼獻必用彛尊非苟以為盛鬯齊之器而已各因時而用之時不同則器不同各因時以明義也鬯必盛以彛春祠之彛則飾以雞雞東方之畜嵗起于東于時為春也夏禴之彛則飾以鳥鳥鳯也書曰我則鳴鳥不聞指鳥為鳯夏為文明而鳯具五色文明之禽也王祼矣后亞之故用二彛王酌其一后酌其一尊之有罍備齊酒之乏彛之有酒豈不備鬯之乏乎舟之制陸佃謂如今世酒船之類酒船喻舟其義甚著但今宗廟中尊罍無此制度耳康成讀斚為稼謂秋者萬物揫斂之時禾稼西成故祼用斚彛以明農事之成黃彛者畫為黃目也人目未嘗黃龜目則黃氣之清明未有如龜者故記曰黃者中也目者清明也言酌于中而清明于外也冬者萬物歸根復命之時祼用黃彛言明于外而欲以觀其復先儒謂虎者西方之義獸雖似獼猴而大其鼻上向雨則自垂于樹以尾塞鼻蓋獸之智也追享及遷廟之主世既逺矣猶不忘祭是謂尊尊尊尊至于逺祖可以謂之義彛刻以虎以其義也朝享行于祖考之廟親為近矣每月祭焉是謂親親親親不忘乎月祭可以謂之智彛刻以蜼以其智也禮記明堂位鬱尊用黃目注鬱鬯之器也黃彛也鬯疏鬱尊用黃目者鬱謂鬱酒黃目嘗蒸所用尊崇周公於夏禘用之方氏慤曰所謂黃目即黃彛也而又曰鬱尊者以鬱鬯之所實也王氏安石曰周官有鬯人鬱人不知鬱謂之秬鬯鬯人供之煮鬱金和鬯酒謂之鬱鬯鬱人掌之天子賜諸侯以圭瓉則諸侯可用鬱鬯宣王嘗以圭瓉秬鬯二卣賜文侯周公在東都日成王嘗以秬鬯二卣命周公禋于文王武王則秬鬯圭瓉魯公必受此賜無疑案禮秋嘗冬蒸灌用黃彛黃彛即黃目賜諸侯或一卣或二卣不言黃彛何也卣乃中尊蓋黃彛别名謂尊有三彛為上卣為中罍為下失其義矣凡灌天子諸侯用圭瓉后夫人用璋瓉瓉者其槃圭其柄也故鬱尊有黃目灌有圭瓉雖魯人得用然瓉有大圭未免僭天子禮郊特牲黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明于外也注黃目黃彛也周所造于諸侯為上也疏黃彛以黃金鏤其外以為目因取名也貯鬱鬯酒故云鬱氣也祭祀時列之最在諸尊之上故云上也黃是中方色目是氣之清明者也酒在尊中而可斟酌示人君慮于祭事必斟酌盡於中也目在尊外而有清明示人君行祭必外盡清明潔淨也案明堂位云周以黃目是周所造也天子則黃彛之上有雞彛鳥彛備前代之器諸侯但有黃彛故云于諸侯為上也陳氏禮書先王制器或逺取諸物或近取諸身其取之也有義其用之也以類雞鳥虎蜼之彛取諸物也斚耳黃目取諸身也方氏慤曰以金目為飾故謂之黃目以實鬱鬯而貴臭故曰鬱氣之上尊而謂之尊者以居其所而贊者從者有尊之義故也司尊彛掌六尊六彛之位而黃彛處其四此乃言上尊者以尊時之所上而已目之精水也其光火也以水為體故其氣清以火為用故其氣明玉藻言視容清明是已是以詩云瑟彼玉瓉黃流在中鬱在中而以瓉酌之蓋酌于中也直逹于外焉蓋清明于外也夫孝子將祭虛中以治之此非酌于中之義乎至于不御內不聽樂不飲酒不茹葷此非清明于外之義乎周氏諝曰司尊彛之職秋嘗冬蒸祼用斚彛黃彛黃彛即黃目周禮謂之彛此謂之尊何也蓋以彛對尊則彛為常尊為變以尊對彛則尊為尊彛為卑及離而言之則尊與彛一也詩大雅江漢釐爾圭瓉秬鬯一卣毛傳釐賜也秬黑黍也鬯香草也築煮合而鬱之曰鬯卣器也九命錫圭瓉秬鬯虎鄭箋秬鬯黑黍酒也謂之鬯者芬香條鬯也王錫召以鬯酒一樽使以祭其宗廟書洛誥伻來毖殷乃命寧豫以秬鬯二卣曰明禋傳周公以黑黍酒二器明潔致敬告文武以美享漢疏周禮鬱鬯之酒實之于彛此言在卣者詩大雅江及文侯之命皆言秬鬯一卣則未祭實之于卣祭時實之于彛彼一卣此二卣者一告文王一告武王彼王賜臣使告其太祖故惟一卣耳文侯之命用賚爾秬鬯一卣疏祭時實鬯酒于彛此用卣者未祭則盛于卣及祭則實于彛此初賜未祭故盛以卣也春秋僖二十八年左氏傳王賜晉侯秬鬯一卣注秬黑黍鬯香酒所以降神卣器名周禮春官鬯人廟用修注修讀曰卣卣中尊謂獻象之屬尊者彛為上罍為下疏鄭以修從卣者詩與尚書及爾雅皆為卣修字于尊義無所取故從卣也云卣中尊為獻象之屬者案下司尊彛職是尊者彛為上罍為下獻象之屬在其中案大宗伯宗廟六享皆以祼為始當在鬱人用彛今不用鬱在鬯人用卣尊以喪中為吉祭略用饋食始也蕙田案書傳春秋傳並云秬鬯一卣則卣所以盛秬鬯故鬯人掌之至祼時和鬱鬯以實彛而陳之書傳疏皆云未祭則盛於卣祭時實之于彛是也其司尊彛所掌之六尊則以盛五齊三酒不以盛秬鬯注疏謂卣即獻象之屬則六尊六彛皆祼器而無獻尊矣又以為喪畢祭殺禮皆誤也爾雅釋器卣中尊也注不大不小者蕙田案以上祼尊禮記祭統君執圭瓉灌尸大宗執璋瓉亞祼注圭瓉璋瓉祼器也明堂位灌用玉瓉大圭注灌酌鬱尊以獻也瓉形如槃容五升以大圭為柄是謂圭瓉玉疏灌謂酌鬱鬯獻尸以求神也酌之所用玉瓉以飾瓉故曰玉瓉也以大圭為瓉柄故曰大圭也周禮春官典瑞祼圭有瓉以肆先王注鄭司農云于圭頭為器可以挹鬯祼祭謂之瓉故詩曰恤彼玉瓉黃流在中國語謂之鬯圭以肆先王祼先王祭也玄謂肆解牲體以祭因以為名漢禮瓉盤大五升口徑八寸下有盤口徑一尺謂疏祼圭即玉人所云祼圭尺有二寸者也以肆先王祭先王先鄭云于圭頭為器器即瓉是也詩云恤彼玉瓉黃流在中者彼詩是美王季為西伯受殷王圭瓉之賜言黃流在中即與玉人云黃金勺鼻等同也云國語謂之鬯圭者案國語云臧文仲以鬯圭與磬如齊告糴是也云漢禮瓉盤大五升口徑八寸下有槃口徑一尺者此漢禮器制度文叔孫通所作案玉人職云大璋中璋邊璋下云黃金勺青金外朱中鼻寸衡四寸鄭注云三璋之勺形如圭瓉玉人不見圭瓉之形而云如圭瓉者鄭欲因三璋勺見出圭瓉之形但三璋勺雖形如圭瓉圭瓉之形即此漢禮文其形則大三璋之勺徑四寸所容蓋似小也鄭氏鍔曰祼圭尺有二寸有瓉其制如槃然其柄用圭有流前注疏為龍口之形所以挹鬯以祼神與賔客也説者謂祀先王謂之肆于賔客則以祼為言何耶康成謂以祀先王者肆解牲體以祭因以為名余以為既祼然後解牲體今名祼為肆非其序也肆陳也鬱人和鬱鬯以實彛而陳之凡祼玉濯之陳之皆謂肆為陳圭瓉陳于先王之前而用以灌祭故先儒以為肆者灌祭先王待賔如事神然故其禮有祼所謂上公再祼之類是也嫌賔客人也不當祼故特以祼言之周禮考工記玉人祼圭尺有二寸有瓉以祀廟大璋中璋九寸邊璋七寸射四寸厚寸注祼之言灌也灌謂始獻酌奠也瓉如槃其柄用圭有流前注案疏祼讀為灌者取水灌之義云祼為始獻酌奠也者司尊彛注祼謂始獻尸郊特牲注云始獻神也蓋以其祼入獻于尸故云獻尸以灌圭為降神故云獻神三注雖曰不同其義一也黃金勺青金外朱中鼻寸衡四寸有繅注勺故書或作約杜子春云當為勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也玄謂鼻勺流也凡流皆為龍口也衡古文橫假借字也衡謂勺徑也三璋之勺形如圭瓉薛氏季宣曰圭璋其柄也瓉其勺也柄則圭璋純玉為之勺則玉多石少者可矣鄭司農謂瓉四玉一石是圭瓉璋瓉則玉為之圭璋之勺則裝以金焉玉人所謂黃金勺青金外是也鼻寸所以流鬯也衡四寸勺徑也圭璋瓉制蓋如此王氏詳説曰舊圖以瓉下有盤口徑一尺其説出于鄭氏固然矣然瓉盤之制出于漢儀六經所載初無此事陸氏謂瓉形如盤徑四寸鼻上寸為龍形圭璋為柄當矣但陸氏以黃金勺青金外朱中鼻寸橫四寸有半謂勺為龍口矣復有杜氏之説以勺為尊中之勺何其依違兩間乎蓋勺之事一而其制有二明堂位曰夏后氏龍勺商之疏勺周之蒲勺此謂尊中之勺也此曰黃金勺者謂圭瓉之首鼻勺之勺也杜氏鄭氏分為二説惟鄭氏之説為優詩大雅旱麓瑟彼玉瓉黃流在中傳玉瓉圭瓉也黃金所以飾流鬯也九命然後錫以秬鬯圭瓉為箋瑟鮮潔貌黃流秬鬯也圭瓉之狀以圭為柄黃金勺青金為外朱中央矣疏瓉者器名以圭為柄圭以玉為之指其體謂之玉瓉據成器謂之圭瓉故云玉瓉圭瓉也瓉者盛鬯酒之器以黃金為勺而有鼻口鬯酒溢中流出故云黃金所以飾流鬯以器是黃金照酒亦黃故謂之黃流也箋以瑟為玉之狀故云鮮潔貌説文云瑟者玉英華相帶如瑟絃或當然江漢曰釐爾圭瓉秬鬯一卣是賜玉瓉必以秬鬯隨之故知黃流即秬鬯也傳以黃為黃金流鬯箋直以秬鬯為黃流者秬黑黍一秠二米者也秬鬯者釀秬為酒以鬱金之草和之使之芬香條鬯故謂之秬鬯草名鬱金則黃如金色酒在器流動故謂之黃流易傳者以言黃流在中當謂在瓉之中不謂流出之時而瓉中赤而不黃故知非黃金也以此故具言圭瓉之狀以圭為柄黃金為勺青金在外以朱為中央矣明酒不得黃也知瓉之形如此者以天官玉人云黃金勺青金外朱中央鼻寸衡四寸三璋之勺形如圭瓉故説瓉之狀以璋狀言之知二璋如玉瓉者以彼上文云祼圭尺有二寸有瓉以祀宗廟更不説瓉形明于三璋之制見之故知同也又春官典瑞注引漢禮瓉槃大五升口徑八寸下有槃口徑一尺則瓉如勺為槃以承之也天子之瓉其柄之長尺有二寸其賜諸侯蓋九寸以下朱子集傳瑟縝密貌玉瓉圭瓉也以圭為柄黃金為勺青金為外而朱其中也黃流鬱鬯也釀秬黍為酒築鬱金煮而和之使芬芳條鬯以瓉酌而祼之也言瑟然之玉瓉則必有黃流在其中豈弟之君子則必有福祿下其躬明寶器不薦于褻味而黃流不注于瓦缶則知盛德必享於祿夀而福澤不降於淫人矣何氏楷曰黃流有二義毛謂黃金所以飾流鬯以瓉者盛鬯酒之器用黃為勺而有鼻也鬯酒從中流出器是黃金照酒亦黃故謂之黃流也鄭但以黃流為秬鬯以秬鬯者釀秬為酒以鬱金之草和之使之芬香條鬯故謂之秬鬯草名鬱金則黃如金色酒在器流動故謂之黃流鄭所以易傳者以言黃流在中當謂在瓉之中不謂流出之時而瓉既以朱為中央則其中亦朱而不黃矣明酒不得黃故知非言黃金也據此當從鄭義大雅棫朴濟濟辟王左右奉璋傳半圭曰璋禮箋璋璋瓉也祭祀之王祼以圭瓉諸臣助之亞祼以璋瓉諸疏祭之用瓉維祼為然故云祭祀之禮王祼以圭瓉臣助之亞祼以璋瓉即祭統云君執圭瓉祼尸大宗伯執璋瓉亞祼是也言諸臣者舉一人之事以見諸臣之美耳又天官小宰云凡祭祀贊祼將之事注云又將大宰助王然則大宰助王祼小宰又助之是助行祼事非獨一人故言諸臣小宰注云唯人道宗廟有祼天地大神至尊不祼則此言祼事祭宗廟也何氏楷曰奉説文云承也言以兩手承之毛云半圭曰璋鄭云璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉孔云臣行禮亦執圭璧無専以璋者冬官玉人所云大璋中璋邊璋皆璋瓉也祭之用瓉唯祼為然郊特牲曰祼以圭璋故知璋為璋瓉矣案考工記玉人云祼圭尺有二寸有璋以祀廟大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅祼之言灌也瓉如盤其柄用圭有流前注漢禮瓉盤大五升口徑八寸下有盤口徑一尺三璋之勺形如圭瓉勺即瓉也璋其柄也頭如矢鋭而穿物曰射其勺以金為之鼻者勺流也流者所以流鬯也衡者勺徑也據周禮內宰職云大祭祀后祼獻則贊先儒謂王行初祼后行亞祼其或后有不與則大宗伯攝之故祭統云君執圭瓉祼尸大宗執璋瓉亞祼是也而諸臣則又有助祼將之事者觀小宰職云凡祭祀贊祼將之事是可見助行祼事不獨一人矣沈括云璋圭之半體也合之則成圭王左右之臣合體一心趣乎王者也疏義云圭首鋭一圭中分為二璋奉于王前則其中分處向王類乎人之鞠躬內嚮而歸心也蕙田案小宗伯鄭注云天子圭瓉諸侯璋瓉王制孔疏若未賜圭瓉則用璋瓉此左右奉璋是文王為諸侯時之禮非指后祼亦非大宗伯攝行亞祼注疏家泛引亞祼以璋瓉為説未確國語魯語魯飢文仲以鬯圭如齊告糴白虎通九錫之禮孝道備者錫以秬鬯圭瓉宗廟之盛禮也玉以象德金以配情芬芳條鬯以通神靈玉飾其末君子之性金飾其中君子之道金者和之至也玉者德美之至也鬯者芬香之至也君子有玉瓉秬鬯乎周禮春官肆師及果築鬻鬻音煮也注果築鬻者所築鬻以祼鄭司農云築煮築香草煮以為鬯而疏謂于宗廟有祼案禮記雜記築鬱臼以椈杵以梧築鬱金煮以和秬鬯之酒以泲之而祼矣但鬱人自掌鬱此又掌之者彼官正職此肆師察其不如儀者也禮記雜記暢臼以椈杵以梧注所以搗鬱也椈柏也椈疏暢者謂鬱鬯也臼以杵以梧者謂搗鬯所用也椈柏也梧桐也謂以柏為臼以桐為杵搗鬱鬯用柏臼桐杵為柏香桐潔白于神為宜陳氏禮書圭以象陽之生物璋以象隂之成事王之肆先王禮賔客以祼圭后之亞祼與王之巡守以祼璋此王與后隂陽尊卑之分而宗廟賔客山川內外隆殺之辨也祼圭尺有二寸陽以偶成也大璋中璋九寸邊璋七寸隂以竒立也圭璋其柄也瓚其勺也柄則圭璋純玉為之勺則玉多石少者可也鄭康成許慎所謂瓉四玉一石是也圭瓉璋瓉則玉為之三璋之勺則飾以金焉玉人所謂黃金勺青金外是也三璋射四寸厚寸勺鼻寸衡四寸有繅則鼻寸所以流鬯也衡四寸勺徑也繅藉也圭璋瓉制蓋亦如此先儒謂凡流皆為龍口瓉槃大五升口徑八寸下有槃口徑一尺然古者有圭瓉璋瓉而無下槃有鼻而無龍口先儒之説蓋漢制歟周之時典瑞掌祼圭之名物鬱人掌祼事之儀節涖玉鬯則大宗伯贊祼將則小宰而內宰贊后之祼獻大宗伯攝后之載祼此王與后祭祀賔客之祼禮也惟天地之神無所用祼故典瑞祼圭止于肆先王玉人祼圭止于祀廟則天地無祼可知禮曰諸侯賜圭瓉然後為鬯故旱麓詩曰瑟彼玉瓉黃流在中江漢詩曰釐爾圭瓉秬鬯一卣而魯晉之國皆用焉以其有功于民者也祭統所謂君執圭瓉祼尸大宗執璋瓉亞祼鄭曰容夫人有故攝焉此諸侯用圭瓉之禮也周衰禮廢而臧文仲以鬯圭如齊告糴豈知先王所以康周公之意哉書曰王入大室祼記曰既灌而後迎牲則尸入祼之然後后再祼焉后再祼則大祭祀而已凡小祭祀蓋一祼也內宰大祭祀后祼獻觀周官行人祼侯伯子男一祼則小祭祀一祼可知記言諸侯相朝灌用鬱鬯此亦賜圭瓉者之禮也蕙田案彛祼器春官鬱人和鬱鬯以實彛而陳之陳氏禮書曰彛之為言常也彛有六天官冪人以畫布巾冪六彛司尊彛掌六彛春祠夏禴祼用雞彛鳥彛秋嘗冬蒸祼用斚彛黃彛追享朝享祼用虎彛蜼彛皆有舟雞彛鄭云謂刻而畫之為雞形著于尊上明堂位曰灌尊夏后氏以雞彛山堂曰雞彛受三斗口圓徑九寸底徑七寸其腹上下空徑髙一尺足髙二寸下徑八寸其六彛所飾各畫本象雖别其形制容受皆同其與舟俱漆並赤中鳥彛鄭云畫鳯凰形于尊上疏知鳥是鳯凰者案書君奭云我則鳴鳥不聞彼鳴鳥是鳯凰故知此鳥彛亦是鳯凰也山堂曰制度容受一同雞彛斚彛先鄭讀斚為稼謂畫禾稼于尊案明堂位爵殷以斚灌尊殷以斚是有二斚此斚彛乃灌尊之斚非爵之斚也郊特牲云舉斚角詔妥尸詩行葦云洗爵奠斚乃是斚爵與此斚彛不同黃彛即黃目尊明堂位曰鬱尊用黃目郊特牲曰黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌于中而清明于外也鄭謂黃目以黃金為飾陸農師云舊圖黃目尊畫人目而黃之人目不黃作而黃之理無有也許謹云龜目黃亦其氣之清明然則黃目宜畫龜目如謹説案黃彛居六彛之四而謂之上尊者天子備前代之器故黃彛之上有雞彛鳥彛諸侯則但有黃彛以尊時之所上而已虎彛畫虎以為飾蜼彛畫蜼以為飾爾雅注蜼禺屬似獼猴而大黃黑色尾長數尺似猶尾末有岐鼻露向上雨即自懸于樹以尾塞鼻或以兩指為物捷健舟先鄭云尊下臺若今承槃山堂曰舟外漆朱中槃口圓徑尺四寸其舟髙厚各半寸局足與槃通髙一尺足下空徑橫大二寸六彛下舟形制皆同其舟足各隨尊刻畫其類以飾之新圖云司農承槃説非是舟宜若後世酒缸所以盛鬯六尊有罍以盛酒彛不應獨無也案盛鬯以卣不以舟新圖説非也瓉有圭瓉有璋瓉並祼器王祼以圭瓉后亞祼以璋瓉圭瓉祭統云君執圭瓉祼尸春官典瑞考工記玉人並云祼圭有瓉後鄭云瓉如盤其柄用圭有流前注漢禮瓉大五升口徑八寸下有盤口徑一尺又名玉瓉明堂位云灌用玉瓉大圭詩旱麓云瑟彼玉瓉黃流在中毛傳黃金所以飾流鬯鄭箋圭瓉之狀以圭為柄黃金為勺青金為外朱中央璋瓉祭統大宗執璋瓉亞祼考工記玉人之事大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅鄭注勺謂酒尊中勺也鼻勺流也凡流皆為龍口衡謂勺徑案鄭氏説玉瓉以冬官玉人璋狀言之則二瓉之制無異但有大小之不同故賈疏云圭瓉口徑八寸下有盤徑一尺此徑四寸徑既倍狹所容亦小但形狀相似耳勺特牲禮尊兩壺于阼階東加勺南枋鄭云勺尊升所以㪺酒也其制三代不同明堂位曰夏后氏以龍勺殷以疏勺周以蒲勺孔疏龍勺勺為龍頭疏為刻鏤通刻勺頭蒲謂刻勺為鳬頭其口微開如蒲草本合其末微開口也此祼器之大概也觀承案曽子謂籩豆之事則有司存戴記亦謂失其義陳其數此特祝史之事者蓋在三代之時禮教未湮器物度數咸在惟貴心通其義則制作之精意得而享帝享親之典自昭已自秦滅制以來名物器數相次俱亡為禮者皆因陋就簡猶徒守其空虛無實之義一旦登諸廟朝有茫然而莫名一器者以是而求制作之材不猶反鑑而索照乎此編于名物制度一一討論明確使三代法物俱可手揣而目覩之則正惟陳其數而其義乃可以不失焉耳此古今時勢之所以不同也右彛瓚秬鬯周禮注疏凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數惟齊酒不二皆有器量注酌器所用注尊中者玄疏五齊五尊三酒三尊故云以實八尊此除明水酒若五齊加明水三酒加玄酒此八尊為十六尊不言之者舉其正尊而言也皆有酌數者謂三酒之祭事昔清尊皆有酌器盛酒益尊故言皆酌器謂酌齊酒注于尊中鄭氏鍔曰祭祀之禮以神事之則用五齊以人養之則用三酒其尊有八酒正以法共之其實本以事鬼神三酒之用不一始焉以酌獻終焉以酢諸臣貴其有餘而不欲其嗛是故大祭度用一尊則用三尊以為副二中祭度用一尊則用二尊以為副二小祭度用一尊則用一尊以為副二祭之大則所酌者多祭之小則所酌者寡此所以為降等皆有酌數取足而無乏耳惟尊中所實齊酒専以事神而不以飲諸臣不用副二之尊器之大小量之多寡俱有一定之數蓋五齊雖以致禮之文無實則近于偽而不誠非所以交神明之道故雖不副二亦皆有器量乃所以致禮之實春官司尊彛掌六尊六彛之位詔其酌辨其用與其實春祠夏禴其朝踐用兩獻尊其再獻用兩象尊皆有罍秋嘗冬蒸其朝獻用兩著尊其饋獻用兩壺尊皆有罍凡四時之間祀追享朝享其朝踐用兩大尊其再獻用兩山尊皆有罍注獻讀為犧象尊或曰以象骨飾尊明堂位曰犧象周尊也春秋傳曰犧象不出門尊以祼神罍神之所飲也詩曰瓶之罄矣維罍之耻爾雅曰彛卣罍器也著尊者著略尊也或曰著地無足明堂位曰著商尊也壺者以壺為尊春秋傳曰尊以魯壺大尊太古之瓦尊山尊山罍也明堂位曰泰有虞氏之尊也山罍夏后氏之尊山罍亦刻而畫之為山雲之形疏彛與齊尊各用二者鬱鬯與齊皆配以明水三酒配以玄酒故禮記郊特牲注云祭齊加明水三酒加玄酒依鄭志云一雞彛盛明水鳥彛盛鬱鬯是以各二尊罍尊不言數者禘祫與時祭追享朝享等皆同用三酒不别數可知也若然依酒正云大祭祀備五齊據大祫通鬱鬯與三酒并配尊則尊有十八禘祫四齊缺二尊則尊有十六此經時祭二齊缺六尊則尊十有二矣其祫在秋禘在夏則用當時尊重用取足而已此經彛下皆云舟尊與罍下皆不云所承之物則無物矣故禮器云天子諸侯廢禁其此之謂也云獻讀為犧犧尊飾以翡翠者翡赤翠青為飾象尊以象鳯凰此二者于義不安故更解以象骨飾尊此義後鄭從之其云飾以翡翠後鄭猶不從之矣引明堂位犧象周尊也者證飾尊有非周制者引春秋傳者是左傳定十年夾谷之會孔子之言引之者證犧象是祭祀之尊不合為野享之義也云尊以祼神者司農解犧象不出門之意其實獻尸而云祼神者尸神象尸飲即是祼神若云奉觴賜灌之類非謂二灌用鬱鬯也云罍臣之所飲也者經云皆有罍諸臣之所酢故知諸臣所飲者也引詩者證罍是酒尊之義引爾雅者欲見此經有彛為上卣即犧象之屬為中罍為下與爾雅同也云著尊者著略尊也者義不安云著地無足于義是也云春秋傳者昭十五年左傳云六月乙丑王太子夀卒秋八月戊寅王穆后崩十二月晉荀躒如周葬穆后籍談為介以文伯宴尊以魯壺是其義也引之者證壺是祭祀酒尊鄭司農讀蜼為蛇虺之虺或讀為公用射隼之隼者無所依據故後鄭皆不從也又云大尊太古之瓦尊者此即有虞氏之大尊于義是也故皆以明堂位為證也云山罍亦刻而畫之為山雲之形者罍之字于義無所取字雖與雷别以聲同故以雲雷解之以其雷有聲無形但雷起于雲雲出于山故本而釋之以為刻畫山雲之形也異義第六罍制韓詩説金罍大器天子以玉諸侯大夫皆以金士以梓古廷説罍器諸臣之所酢人君以黃目金飾尊大一石金飾無目蓋取象雲雷之象謹案韓説天子以玉經無明文罍者取象雲雷故從人君下及諸臣同如是經文唯有詩云我姑酌彼金罍古廷説云人君以黃金則其餘諸臣直有金無黃金飾也鄭氏鍔曰此言六彛六尊幕人乃有八尊以盛五齊三酒何也若五尊盛五齊則一尊常無用若以罍盛三酒則不應謂之八尊蓋尊與罍分而名之則不同合而言之則謂之尊耳獻字本戲字悮轉為獻毛詩傳謂之犧尊犧與戲字同音奈何康成讀犧為素何切鑿為之説曰畫為牛形婆娑然甚無理春而耕耕必資牛故春之尊為犧牛之形夏用象尊者象南方之獸其形絶大時至于夏萬物豐大故夏之尊為象形既祼出迎牲而入殺牲而獻血腥始行朝踐之事用兩獻尊盛醴齊及薦熟之時謂之再獻用兩象尊盛盎齊必用兩尊者王酌其一后酌其一也秋之時物傷于末將反其本已斂其華將取其實故其獻也用著地無足之尊冬之時人功已成可勞享之而飲酒矣故其獻也用酒壺之尊名曰壺者收藏畜聚之義記言君西酌犧象夫人東酌罍尊則知王與后不共尊兹其所以皆兩也李氏嘉會曰經文既曰春祠夏禴祼用雞彛鳥彛春夏而各用其一明矣至其下曰其朝獻用兩獻尊其再獻用兩象尊是春用獻尊夏用象尊每尊各兩尊以盛酒則特兩耳秋冬所用彛每一尊用兩亦然各隨時以致義非雞彛獻尊用于春而夏兼之鳥彛象尊用于夏而春兼之紛雜而無辨也明水之酒則常禮也所不必論酒正以實八尊則有玄酒明水合之而為八耳王氏與之曰此説祼彛儘好至説用尊處有礙經言朝踐用兩獻尊再獻用兩象尊共為四尊每獻王與后各酌其一朝踐二再獻二共用四尊可供四獻如所言春用獻尊兩夏用象尊兩何以湊成九獻之禮蕙田案司尊彛春祠夏禴秋嘗冬蒸之文俱互相備不可鑿空立説鄭氏李氏春犧夏象之説皆非是鄭解再獻之謬與王介甫同王氏昭禹曰大尊太古之瓦尊有反本復始之意禘以義追及其祖之所自出亦以仁而反本復始故用大尊山尊畫為山形山則以仁而興利致養之意祫以養死者之所歸合食于祖廟亦以仁而與利致養故用山尊禮記明堂位泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也注泰用瓦著著地無足泰疏考工記云有虞氏尚陶故知用瓦罍猶雲雷也畫為山雲之形也著無足而底著地故謂為著然殷尊無足則泰罍犧並有足也然殷名著周名犧象而禮器云君西酌犧象亦是周禮也方氏慤曰泰司尊彛謂太古之瓦尊蓋彼名其質此名其義故也山罍即山尊也禮器亦謂之罍尊非謂諸臣所酢之罍也以山罍為尊因謂之罍尊亦猶以壺為尊因謂之壺尊也著讀為附著之著下無所承著地而已殷質故其尊從簡如此飾以犧則曰犧尊飾以象則曰象尊無飾為質有飾為文周尚文故其尊有飾如此春秋定公十年左氏傳犧象不出門注犧象酒器犧尊象尊也疏周禮司尊彛云春祠夏禴祼用雞彛鳥彛其朝踐用兩獻尊其再獻用兩象尊鄭衆云獻讀為犧犧尊飾以翡翠象尊以象鳯凰阮諶三禮圗犧尊畫牛以飾象尊畫象以飾當尊腹上畫牛象之形王肅以為犧尊象尊為牛象之形背上負尊魏太和中青州掘得齊大夫子尾送女器為牛形而背上負尊古器或當然也詩魯頌閟宫犧尊將將傳犧尊有沙飾也蕙田案辨鄭注犧尊解詳圜丘祀天門禮記明堂位尊用犧象山罍疏尊用犧象山罍者用天子之尊也犧犧尊也此犧尊周禮春夏之祭朝踐堂上薦血腥時用以盛醴齊君及夫人所酌以獻尸也象象尊也以象骨飾之此象尊周禮春夏之祭堂上薦朝事競尸入室饋食時用以盛盎齊君及夫人所酌以獻尸也山罍謂夏后氏之尊天子于追享朝享之祭再獻所用今褒崇周公禘祭雜用山尊不知何節所用也劉氏彛曰犧者牛也而用事于耕者也象者西方之獸而致用以白者也于尊必以牛重本也必以象誠在內也罍也者貯酒而給于尊也詩曰瓶之罄矣維罍之恥則罍之為器大矣謂之罍者有雷之象蓋雷出于時則利于物而反之則為災器之名罍警之而已經曰終日飲酒而不得醉先王所以備禍乃其意也山也者止而安者也而罍以山者所以安于神司尊彛有山尊與此類也禮器廟堂之上罍尊在阼犧尊在西君西酌犧象夫人東酌罍尊注犧尊縣鼓俱在西禮樂之器尊西也犧周禮作獻西酌犧象象日出東方而西行也東酌罍尊象月出西方而東行也酌疏罍尊在阼夫人所酌也犧尊在西君所酌也君西犧象夫人東酌罍尊者案上云罍尊在胙當胙階堂上而設之則犧尊在西當西階堂上而陳之故君于阼階西嚮酌犧尊夫人于西房之前東嚮酌罍尊方氏慤曰廟堂者宗廟之堂也亦見月令解然廟堂之名人君所居亦得稱之若傳所謂人君不下廟堂之上而知四海之外是矣罍尊即明堂位所謂山罍也以畫雲氣于其上故于文從靁犧尊畫犧牛以為飾犧象謂犧尊象尊也前言尊而不言象後言象而不言尊互相備也楊氏簡曰犧尊有沙牛之象嘗官楚東知彼俗以牛之大者為沙牛牛之為物重遲而順者也人之所以去道逺者以其輕肆放逸故多違也暏犧之象必不萌輕肆之心心不輕肆則道固未嘗不在我而陸德明輒更之曰沙尊蓋曰毛詩傳犧尊有沙飾孔疏不知牛之為沙謂為羽飾故讀沙為娑陸承其誤又并改犧為沙差之又差妄謂本之毛鄭受毛鄭誤甚矣太和中魯郡于地中得齊大夫子尾送女器有犧尊為牛形厥驗明著禮經之曰犧尊者不勝其多何得每更曰娑殊滋後人之惑周禮司尊彛朝踐用兩獻尊鄭司農又讀獻為犧明堂位曰犧尊周尊也為一代之所尚獻必首用之故亦曰獻尊何以改讀為象尊為象形象之為獸其重厚為至其入水毅然悠然險莫能阻人之道心似之古列聖于禮器有不説之至教焉自道心已明者觀之足以默證聖心之精微也蕙田案楊氏説犧尊獻尊極是餘詳見圜丘祀天門春秋昭公十五年左傳樽以魯壺注魯壺魯所獻壺樽疏周禮司尊彛云秋嘗冬蒸其饋獻用兩壺樽鄭玄云壺者以壺為尊燕禮云司宫尊于東楹之西兩方壺左玄酒是禮法有以壺為樽禮記禮器五獻之尊門外缶門內壺注壺大一石缶疏此以小為貴在門外則大于壺矣缶盛酒在門外壺在門內儀禮特牲饋食禮視壺濯尊兩壺於阼階東注為酬賔及兄弟行神惠不酌上尊就其位尊之兩壺皆酒優之先尊東方示惠由近疏兩壺皆酒無玄酒優之也東方主人位先設東方見酒由主人來覆兩壺焉蓋在南注覆壺者盝瀝水且為其不宜塵説文壺昆吾尊也形象圜陳氏禮書圜者君之道方者臣之德燕禮大射鄉大夫皆方壺以其近尊而屈也士旅皆圜壺以逺尊而伸也先儒謂方壺腹圜而足口方圜壺腹方而足口圜然方者腹圜圜者腹方則名實不稱矣鬯人禜門用瓢齎用齎而已與壺異也莊周曰大瓠慮以為樽爾雅曰康瓠謂之甈賈誼弔屈原賦曰斡棄周鼎而實康瓠兮郭璞曰康瓠壺也蓋壺之為器其體有大小其制有方圜非必皆瓠為之特取名于壺瓠而已詩周南卷耳我姑酌彼金罍傳人君黃金罍釋文韓詩云天子以玉飾諸侯大夫皆以黃金飾士以梓禮記云夏曰山罍其形似壺容一斛刻而畫之為雲雷之形疏正義曰人君黃金罍此無文也故異義罍制韓詩説金罍大夫器也天子以玉諸侯大夫皆以金士以梓毛詩説金罍酒器也諸臣之所酢人君以黃金飾尊大一碩金飾龜目蓋刻為雲雷之象謹案韓詩説天子以玉經無明文謂之罍者取象雲雷博施如人君下及諸臣又司尊彛云皆有罍諸臣之所酢注云罍亦刻而畫之為山雲之形言刻畫則用木矣故禮圖依制度云刻木為之韓詩説言士以梓士無飾言其木體則以上同用梓而加飾耳毛説言大一碩禮圖亦云一大斛則大小之制尊卑同也雖尊卑飾異皆得畫雲雷之形以其名罍取于雲雷故也毛詩説諸臣之所酢與周禮文同則人君黃金罍謂天子也周南王者之風故皆以天子之事言焉小雅泂泂酌彼行潦挹彼注兹可以濯罍傳濯滌也罍祭器大雅蓼莪瓶之罄矣維罍之恥傳瓶小而罍大之正義釋器云小罍謂坎孫炎曰酒樽也郭璞曰罍形似壺大者受一斛是罍大于瓶也爾雅釋器小罍謂之坎注罍形似壺大者受一斛説文罍龜目尊以木為之陳氏禮書司尊彛犧象之尊王與后之所獻罍諸臣之所酢則罍賤於尊矣先儒曰彛上尊罍下尊記曰五獻之尊門內壺君尊瓦甒燕禮君尊瓦大卿大夫士旅以壺大射膳尊兩甒卿大夫士旅亦以壺士喪奠以兩甒而祭以壺則壺賤于瓦尊矣有汙尊鑿土為尊然後有瓦大有瓦大然後有山罍罍或作櫑許慎曰罍龜目尊以木為之則罍非特以瓦也詩曰我姑酌彼金罍毛氏謂人君黃金罍孔頴逹謂金飾龜目蓋刻為雲雷之象周南王者之風則黃金罍謂天子也於理或然韓詩謂天子罍以玉大夫以金士以梓此不可考罍之别有五山罍金罍大罍小罍水罍也周禮鬯人祭祀社壝用大罍則盛鬯者也儀禮罍水在洗東則盛水者也然則罍之為器豈施于一哉周禮天子禮諸侯如諸侯之相為賔春秋之時齊侯將享魯侯孔子曰犧象不出門則諸侯相饗用犧象矣燕禮君尊瓦大卿大夫壺大射膳尊瓦甒卿大夫壺則諸侯燕臣用壺矣昔周王燕晉荀躒樽以魯壺則天子燕諸侯之臣亦以壺也詩言我姑酌彼金罍其饗臣之禮歟禮器五獻之尊門內壺君尊瓦甒鄭氏曰壺大一石瓦甒五斗觀喪大禮棺槨之間大夫容壺士容甒則壺大于甒可知矣漢梁孝王有罍樽直千金後世寶之其制蓋侈于古矣沈氏括曰禮書言罍畫雲雷之象然莫知雷作何狀今祭器中畫雷有作鬼神伐鼓之象此甚不經余嘗得一古銅罍環其腹皆有畫正如屋梁所畫曲水細觀之乃是雲雷相間為飾如者古雲字也象雲氣之形如者雷字也古文為雷雷象回旋之聲其銅罍之飾皆一一相間乃所謂雲雷之象也今漢書罍字蓋古人以此飾罍後世自失傳耳陳氏禮書尊之為言尊也彛之為言常也尊用以獻上及于天地彛用以祼施于宗廟而已故尊於祭器獨名尊彛於常器均名彛籍談曰有勳而不廢撫之以彛器昭公十五年左臧武仲曰大伐小取其所得以作彛器襄十九年左則彛之為常可知矣司尊彛春祠夏禴祼用雞彛鳥彛其朝踐用兩獻尊其再獻用兩象尊秋嘗冬蒸祼用斚彛黃彛其朝踐用兩著尊其饋獻用兩壺尊追享朝享祼用虎彛蜼彛其朝踐用兩大尊其再獻用兩山尊明堂位曰泰有虞氏之尊也山罍夏后氏之尊也著商尊也犧象周尊也灌尊夏后氏以雞彛商以斚周以黃目蓋虞氏尚陶故泰尊瓦則山罍亦瓦矣商人尚梓故著尊木則犧象亦木矣書稱宗彛絺繡而宗彛在周為毳衣則虎彛蜼彛有虞以前之彛也説文稱壺昆吾尊昆吾祝融之後則壺尊商以前之尊也春秋傳曰燕人以斚耳賂齊則斚固有耳矣記曰黃目鬱氣之上尊黃者中也目者清明之氣也則黃其色也目其象也蓋先王制器或逺取諸物或近取諸身其取之也有義其用之也以類雞鳥虎蜼之彛取諸物也斚耳黃目取諸身也春祠夏禴彛以雞鳥尊以犧象以雞鳥均羽物犧象均大物故也秋嘗冬蒸彛以耳目尊以著壺以耳目均人體著壺均無足故也追享朝享彛以虎蜼尊以山大以虎蜼均毛物山大均瓦器故也夫雞東方之物仁也而牛大牲也膏薌宜于春鳥南方之物禮也而象大獸也産于南越此王者所以用祠禴也周彛黃則商彛白矣白者隂之質義也黃者隂之美信也著以象陽降而著地壺以象隂周而藏物此先王所以用嘗蒸也太玄曰陽氣潛萌于黃宫信無不在乎中則冬之為信可知矣虎義獸也蜼智獸也自禰率而上之至于祖因合食焉義也及于祖之所自出義之至也審其昭穆尊卑不使紊焉智也皆升而合食乎其所出智之至也泰則象道之見于事業山則象道之顯於仁夫道之見于事業而顯著仁則可以王天下可以王天下則可以禘祫矣此先王所以用追享朝享然雞鳥虎蜼黃目犧象山罍之飾或刻或畫不可得而知也詩與禮記左傳國語皆言犧詩曰犧尊將將記曰君西酌犧象犧尊疏布冪左傳曰犧象不出門國語曰犧人薦醴特司尊彛言獻尊則犧者尊之飾獻者尊之用也先儒讀犧為娑讀斚為稼或云犧飾以翡翠象飾以象骨或犧飾以鳳凰斚飾以禾稼皆臆論也王肅謂昔魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊有象尊尊為象形耳此又不可考也尊之為物其上有蓋其面有鼻其下有足少牢司尊啓二尊之蓋冪奠于棜上特牲禮覆兩壺焉蓋在南玉藻曰惟君面尊少儀曰尊壺者面其鼻此尊之形制也其無足者著與壺耳觀投壺之壺有頸與腹而無足則壺尊無足可知矣先儒謂壺有足誤也大射尊于東楹之西兩方壺膳尊甒在南皆元尊酒在北少牢尊兩甒于房户之間甒有玄酒特牲尊于户東玄酒在西記亦曰凡尊必上玄酒則兩尊之設一以盛玄酒一以盛齊矣春則雞彛盛明水鳥彛盛鬱鬯夏則鳥彛盛明水雞彛盛鬱鬯而斚黃虎蜼之相為用亦若此也此先儒謂雞彛虎彛専盛明水鳥黃蜼彛専盛鬱鬯恐不然也尊彛之量先儒謂尊實五斗彛實三斗此雖無所經見然彛祼而已其實少尊則獻酬酢焉其實多此尊所以大于彛歟蕙田案尊獻器陳氏禮書曰尊之為言尊也彛以用祼施于宗廟而已尊用以獻上及于天地尊有六春官司尊彛掌六尊春祠夏禴其朝踐用兩獻尊其再獻用兩象尊秋嘗冬蒸其朝獻用兩著尊其饋獻用兩壺尊四時之間祀追享朝享其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所酢也獻尊鄭讀為犧尊禮器犧尊在西魯頌犧尊將將先鄭讀犧為沙沙羽飾謂飾以翡翠阮諶禮圖謂于尊腹之上畫為牛形山堂考索曰牛有二種一曰沈牛牛之善水者也一曰沙牛俗亦謂之黃牛言有沙飾若今牛鼎有牛之飾而已王肅則讀犧為羲謂尊形如牛而背上負尊後儒楊簡鄭鍔何楷皆從王説案據此則犧當如字固不必讀為沙也明堂位以犧為周尊是周之獻以犧為首故直曰獻尊耳則獻亦當如字不必讀為犧也象尊先鄭謂飾以鳯凰後鄭謂以象骨飾尊禮圖謂于尊腹上畫為象形王肅謂尊形如象而背上貞尊陸佃曰頃見參知政事章惇得古銅象尊一制作極精緻三足象其鼻形望而視之真象也案明堂位犧象同為周尊故經傳多以犧象並稱禮器云君親酌犧象春秋左氏傳犧象不出門是也著尊爾雅謂之略尊明堂位謂之殷尊鄭云著地無足禮樂論曰受五斗漆赤中圓徑一尺二寸底徑八寸上下空徑一尺五分與獻尊象尊形制容受並同但無足及飾耳案著尊無足則他尊皆有足可知壺尊以壺為尊昭十年左氏傳樽以魯壺山堂曰壺尊受五斗漆赤中以壺為之口圓徑八寸脰髙三寸中徑六寸半脰下橫徑八寸腹中橫徑一尺一寸底徑八寸腹上下空徑一尺二寸足髙二寸下橫徑九寸大尊太古之瓦尊即明堂位泰有虞氏之尊儀禮燕禮云公尊瓦大兩山堂曰受五斗口圓徑一尺脰髙三寸中橫徑九寸脰下大橫徑一尺二寸底徑八寸腹上下空徑一尺五分厚半寸底平厚寸山尊即明堂位山罍夏后氏尊也禮器亦謂之罍尊蓋畫為山雲之形故名非諸臣所酢之罍也山堂曰山尊受五斗口圓徑九寸脰髙三寸空徑一尺五分足髙二寸下徑九寸案以上謂之六尊周禮又有所謂八尊者酒正共五齊三酒以實八尊冪人以疏布巾冪八尊史浩以為司尊彛春祠夏禴獻象皆兩之秋嘗冬蒸著壺皆兩之四時之間祀大山皆兩之是知每祀六尊皆設而為二尊各加其一焉故謂之八尊是也罍司尊彛六尊皆有罍諸臣之所酢也疏取象雲雷之象詩卷耳云我姑酌彼金罍韓詩説天子以玉諸侯大夫皆以金士以梓爾雅彛卣罍器也郭注罍受一斛邢疏引禮圖説彛受三斗尊受五斗罍受一斗案詩云瓶之罄矣維罍之恥傳曰瓶小罍大又罍為下而品卑則大一斛之説是也山堂曰口徑九寸五分脰髙三寸中徑七寸五分脰下橫徑九寸腹中橫徑一尺四寸上下中徑一尺六寸足髙二寸下徑一尺畫山雲之形爾雅云小罍謂之坎蕙田案以上六尊禮記禮器天子諸侯之尊廢禁大夫士棜禁此以下為貴也注廢猶去也棜斯禁也謂之棜者無足有似于棜或因名云爾大夫用斯禁士用棜禁禁如方今桉隋長局足髙三寸其疏廢禁者廢去其禁司尊彛鬱鬯之尊用舟以承之犧象等六尊皆無用舟又燕禮諸侯之法瓦大兩有豐是無禁也棜長四尺廣二尺四寸深五寸無足赤中畫青雲氣菱苕華為飾禁長四尺廣二尺四寸通局足髙三寸漆赤中畫青雲氣菱苕華為飾刻其足為褰帷之形也棜是輿名故既夕禮云設棜于東堂下注云棜今之輿也又注特牲云棜之制如今大木輿矣上有四周下無足令大夫斯禁亦無足似木輿之棜周公制禮或因名此斯禁為棜耳故少牢司宫尊兩甒于房户之間同棜是周公時已名斯禁為棜也案玉藻云大夫側尊用棜則斯禁也案鄉飲酒兩壺斯禁是大夫用斯禁也玉藻云士用禁又士冠禮士昏禮承尊皆用禁是士用禁也鄭注云名之禁者因為酒戒也案鄉射是士禮而用斯禁者以禮樂賢從大夫也特牲亦是士禮而云棜禁在東序者鄭注云祭尚厭飫故得與大夫同也方氏慤曰禁所以承酒尊且棜也禁也皆所以為酒戒曰棜則欲其不流曰禁則欲其不犯别而言之固如此合而言之棜亦禁也猶之旗常通謂之九旗也且有足者為禁無足者為棜有足則髙無足則下此主以下為貴于大夫用棜至廢禁則又下矣故天子諸侯之尊如此玉藻大夫側尊用棜士側尊用禁注棜斯禁也無足有似于棜是以言棜疏案鄉飲酒禮設兩壺于房户間有斯禁彼是大夫禮此云大夫用棜故知棜是斯禁也特牲禮注云棜今木輿上有四周下無足今斯禁亦無足故云有似于棜是以言棜也儀禮士冠禮尊于房戶之間兩甒有禁玄酒在西注禁承尊之器也名之為禁者因為酒戒也物疏醴不言禁醴非飲醉之物故不設戒酒是所飲之恐醉因而禁之玄酒非飲亦為禁者以玄酒對正酒不可一有一無故亦同有禁也士昏禮尊于室中北墉下有禁注禁所以􅔑甒者甒疏士冠云甒此尊亦也鄉飲酒禮尊兩壺於房户間斯禁注斯禁禁切地無足者疏禁者士禮以禁戒為名卿大夫並有禁名是以玉藻云大夫側尊用棜士側尊用禁禮器云大夫士棜禁注云棜斯禁也謂之棜者無足有似于棜大夫用斯禁士用棜禁然則禁是定名言棜者是其義稱鄉射禮尊于賔席之東兩壺斯禁左玄酒皆加勺注斯禁禁切地無足者也弟子奉豐升勝者之弟子洗觶升酌南面坐奠于豐上燕禮公尊瓦大兩有豐注瓦大有虞氏之尊也禮器曰君尊瓦甒豐形似豆卑而大公食大夫禮飲酒實于觶加於豐注豐所以承觶者也如豆而卑聘禮瓦大一有豐注瓦大瓦尊豐承尊器陸氏佃曰説文云豐足之豐滿者從手蓋手用豆之時也故禮自諸侯以上皆為豐記曰嵗凶年榖不登君膳不祭肺祭事不縣大夫不食粱士飲酒不樂由是觀之雖謂之豐禁在其中矣故豐亦或謂之廢禁是也廢讀如廢敦廢爵之廢無足曰廢廢豐似豆而卑宜非有足者且謂之廢禁固亦以去為義廢敦言喪無所事敦也廢爵言喪無所事爵也廢禁天子諸侯之尊無所事禁也然亦不可不戒所謂戒者皆有舟皆有疆壘是也既夕記設棜于東堂下南順齊于坫饌于其上注棜今之輿也士虞禮尊于室中北墉下當户兩甒醴酒在東無禁特牲饋食禮陳鼎於門外棜在其南南順實獸于其上壺禁在東序注棜之制如今大木輿矣上有四周下無足少牢饋食禮司宫尊兩甒于房户之間同棜注棜無足禁者酒戒也大夫去足改名啓二尊之蓋冪奠于棜上陳氏禮書司尊彛六彛皆有舟燕禮公尊瓦大有豐聘禮亦瓦大有豐少牢禮兩甒有棜鄉飲鄉射尊皆有斯禁士冠婚特牲禮尊皆有禁禮器曰天子諸侯之尊廢禁大夫士棜禁玉藻大夫側尊用棜士之禁有足而髙無足謂之廢禁猶儀禮所謂廢敦廢爵也大夫之棜亦謂之斯禁士之禁亦謂之棜蓋禁棜同制特其足之髙下異耳天子諸侯廢禁之制不見於經特燕禮以尊有豐鄭康成謂豐似豆而卑其他不可得而知也豐公食大夫大射鄉射以之承觶爵棜士既夕以之饌衣特牲以之實獸蓋先王制器苟可以便于禮者皆用之也然則謂之舟欲其不溺也謂之禁欲其不放也棜欲其屬厭而已不可益也豐欲其豐盛而已不可過也鄭康成曰廢猶去也棜如今之木輿上有四周下有足禁如今方案隋長局一足髙三寸又言大夫改斯禁名棜優尊也若不為之戒然謂天子諸侯去禁而燕禮有豐謂棜無足而既夕棜齊于坫謂優尊者若不為之戒而鄉飲鄉射謂之斯禁何耶舊圖刻人形謂豐國之君嗜酒亡國于是狀之以為酒戒此又不可考也士喪禮凡奠以至虞祭皆無禁蓋禁吉器也冠禮醴尊無禁酒尊有禁蓋醴非飲醉之物不設戒也又曰司尊彛曰彛皆有舟尊皆有罍舟以􅔑彛而罍非􅔑尊言彛有舟以見尊有禁也天子諸侯之尊廢禁廢禁無足以下為貴則彛舟之為物蓋象舟之形而已先儒以廢禁為去禁謂舟若漢承縏圜而崇尺恐不然也蕙田案以上舟棜禁豐禮記明堂位夏后氏尚明水殷尚醴周尚酒注此皆其時之用耳言尚非人疏正義曰夏后氏尚質故用水殷人稍文故用醴周轉文故用酒故云此皆其時之用耳云言尚非者案儀禮設尊尚玄酒是周家亦尚明水也案禮運云澄酒在下是三酒在堂下則周世不尚酒故知經言尚者非也儀禮特牲饋食禮壺禁在東序尊于户東玄酒在西少牢饋食禮司宫尊兩甒于房户之間同棜皆有冪甒有玄酒禮記禮運玄酒以祭疏玄酒以祭者謂朝踐之時設此玄酒于五齊之上以致祭鬼神此重古設之其實不用以祭也禮器醴酒之用玄酒之尚疏醴酒五齊第二酒也玄酒是水也尚上也言四時祭祀有醴酒之玄而陳尊在玄酒之下以玄酒之尊置在上此是修古也玉藻凡尊必上玄酒郊特牲祭齊加明水報隂也明水涗齊貴新也凡涗新之也其謂之明水也由主人之潔著此水也陳澔集注祭齊加明水謂尸正祭之時陳列五齊之尊又加明水之尊也明水隂鑑所取月中之水涗猶清也泲漉五齊而使之清故云涗齊所以設明水及涗齊者貴其新潔也凡涗新之也専主涗齊而言故下文又釋明水之義潔著潔淨而明著也自月而生故謂之明周禮秋官司烜氏掌以夫遂取明火于日以鑒取明水於月以共祭祀之明齍明燭共明水疏云夫遂陽遂也者以其日者太陽之精取火于日故名陽遂取火于木為木遂者也鑒鏡屬者詩云我心匪鑒不可以茹彼鑒是鏡可以照物此鑒形制與彼鑒同所以取水也云取水者世謂之方諸者漢世謂之方諸言取水謂之方諸則取火者不名方諸别名陽遂也明者潔也日月水火為明水明火是取日月隂陽之潔氣也云明燭以照饌陳者謂祭日之旦饌陳于堂東未明須燭照之云明水以為玄酒者鬱鬯五齊以明水配三酒以玄酒配玄酒井水也玄酒與明水别而云明水以為玄酒者對則異散文通謂之玄酒是以禮運云玄酒在堂亦謂明水為玄酒也先鄭云明水滫滌粢盛黍稷者滫謂滫瀡滌謂蕩滌俱謂釋米者也考工記輈人金錫半謂之鑒燧之齊注鑒燧取水火于日月之器也鑒亦鏡也凡金多錫則刃白且明也多疏云取水火于日月之器也者司烜氏職文云凡金錫則刃白且明也者據大刃以下削殺矢等鑒燧入且明之內舊唐書禮儀志李敬貞論明水實樽淮南子云方諸見月則津而為水髙誘注云方諸隂燧大蛤也熟摩拭令熱以向月則水生以銅盤受之下數石王充論衡云陽燧取火于日方諸取水于月相去甚逺而火至水來者氣感之驗也漢書儀云八月飲酎車駕夕牲以鑑諸取水于月以陽燧取火于日周禮考工記云金有六齊金錫半謂之鑑燧之齊鄭玄注云鑑燧取水火于日月之器凖鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火隂鑑形如方鏡以取明水但比年祭祀皆用陽燧取火應時得以隂鑑取水未有得者當用井水替明水之處奉敕令禮司研究敬貞因説先儒是非言及明水乃云周禮金錫相半自是造之法鄭玄錯解以為隂鑑之制依古取明水法合用方諸引淮南子等書用大蛤也又稱敬貞曾八九月中取蛤一尺二寸者依法試之自人定至夜半得水四五斗者敬貞所陳檢有故實又稱先經試驗確執望請差敬貞自取蚌蛤與所司對試蕙田案以上明水易坎卦六四樽酒簋二用缶疏一樽之酒可薦于宗廟詩小雅信南山祭以清酒從以騂牡享于祖考箋清謂玄酒也酒鬱鬯五齊三酒也楚茨以為酒食以享以祀箋以黍稷為酒食獻之以祀先祖疏酒是大名其鬱鬯五齊三酒總名皆為酒也大雅旱麓清酒既載箋云既載謂已在尊中也祭祀之事先為清酒鳬鷖爾酒既清篤公劉酌之用匏箋酌酒以匏為爵言忠敬也頌豐年為酒為醴蒸畀祖妣良耜為酒為醴蒸畀祖妣以洽百禮箋蒸進畀豫洽合也進于祖妣謂祭先祖先妣也絲衣兕觥其觩旨酒思柔不吳不敖胡考之休箋飲美酒者皆思自安不歡喧不敖慢也商頌烈祖既載清酤賚我思成箋既載清酒于尊酌以祼獻而神靈來至我致齊之所周禮天官酒正辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒蕙田案五齊三酒詳見圜丘祀天門春官司尊彛凡六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌注故書縮為數齊為齍鄭司農云獻讀為儀儀酌有威儀多也涗酌者捝拭勺而酌也修酌者以水洗勺而酌也齍讀皆為齊和之齊杜子春云數當為縮齊讀皆為粢玄謂禮運曰玄酒在室醴盞在户粢醍在堂澄酒在下以五齊次之則盞酒盎齊也郊特牲曰縮酌用茅明酌也盞酒涗于清汁獻涗于盞酒猶明清與盞酒于舊醳之酒也此言轉相泲成也獻讀為摩莎之莎齊語聲之誤也煮鬱和秬鬯以盞酒摩莎泲之出其香汁也醴齊尤濁和以明酌泲之以茅縮去滓也盎齊差清和以清酒泲之而已其餘三齊泛從醴緹沈從盎凡酒謂三酒也修讀如滌濯之滌滌酌以水和而泲之今齊人命浩酒曰滌明酌酌取事酒之上也澤讀曰醳明酌清酒盞酒泲之皆以舊醳之酒凡此四者祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒唯大事于太廟備五齊三酒禮記禮運玄酒在室醴盞在尸粢醍在堂澄酒在下注粢讀為齊聲之誤也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異盞與盎澄與沈蓋同物也奠之不同處重古略近也古疏玄酒在室者玄酒謂水也以其色黑謂之玄而大無酒此水當酒取用故謂之玄酒以今雖有五齊三酒貴重古物故陳設之時在于室內而近北醴盞在户醴謂醴齊盞謂盎齊以其後世所為賤之陳列雖在室內稍南近户故云醴盞在户皇氏云醴在户內盞在户外義或然也其泛齊所陳當在玄酒南醴齊北雖無文約之可知也粢醍在堂者以卑之故陳列又南近户而在堂澄酒在下者澄謂沈齊也酒謂三酒事酒昔酒清酒之等稍卑之故陳在堂下者坊記醴酒在室醍酒在堂澄酒在下示民不淫也注淫猶貪也澄酒清酒也三酒尚質不尚味齊疏正義曰澄酒清酒也謂澄齊也以其清于醴齊醍故云清酒也以此三齊皆云酒故知澄酒惟澄齊也禮運云玄酒在室醴盞在户粢醍在堂澄酒在下彼陳酒事故鄭分釋澄為沈齊酒為三酒也以此云示民不淫故知非三酒以三酒味厚美故也禮運云醴盞在户此云在室不同者在户之內則是在室也但禮運有玄酒在室之文故云醴酒在户耳知主人主婦上賔獻尸乃後主人降洗爵獻賔者儀禮特牲文也郊特牲縮酌用茅明酌也汪謂泲醴齊以明酌也周禮曰醴齊縮酌五齊醴尤濁和之以明酌藉之以茅縮去滓也明酌者事酒之上也名曰明者事酒今之醳酒皆新成也春秋傳曰爾貢包茅不入王祭不共無以縮酒酌猶斟也酒已泲則斟之以實尊彛昏禮曰酌玄酒三注于尊凡行酒亦為酌也盞酒涗于清注謂泲盞酒以清酒也盞酒盎齊必和以清酒者皆久味相得汁獻涗于盞酒注謂泲秬鬯以盞酒也獻讀當為莎齊語聲之誤也秬鬯者中有煮鬱和以盎齊摩莎泲之出其香汁因謂之汁莎不以三酒泲秬鬯者秬鬯尊也猶明清與盞酒于舊澤之酒也注猶若也澤讀為醳舊醳之酒謂昔酒也泲醴齊以明酌泲盞酒以清酒泲汁獻以盞酒天子諸侯之禮也天子諸侯禮廢時人或聞此而不審知云若今明酌清酒與盞酒以舊醳之酒泲之矣就其所知以曉之也泲清酒以舊醳之酒者為其味厚臘毒也陳澔集注縮酌謂醴齊濁泲而後可斟酌故云縮酌也用茅者以茅覆藉而泲之也周禮三酒一曰事酒二曰昔酒三曰清酒事酒為事而新作者其色清明謂之明酌言欲泲醴齊則先用此明酌和之然後用茅以泲之也盞酒盎齊也涗泲也清謂清酒也清酒冬釀接夏而成盎齊差清先和以清酒而後泲之故云盞酒涗于清以其差清故不用茅也汁獻謂摩挲秬鬯及鬱金之汁也秬鬯中有煮鬱又和以盎齊摩挲而泲之出其香汁故云汁獻涗于盞酒也上文所泲三者之酒皆天子諸侯之禮作記之時此禮已廢人不能知其法故言此以曉之曰泲醴齊以明酌泲盞酒以清酒泲汁獻以盞酒者即如今時明清盞酒泲于舊醳之酒也猶若也舊謂陳久也澤讀為醳醳者和醳醴釀之名後世謂之醳酒禮器君親制祭夫人薦盎注親制祭謂朝事進血膋時所制者制肝洗于鬱鬯以祭于室及主君親割牲夫人薦酒疏君割牲體于時君亦不獻故夫人薦酒祭義君牽牲夫人奠盎疏君牽牲夫人奠盎者熊氏云此謂繹祭君當牽牲之時夫人奠設盎齊之奠又曰奠盎設盎齊之奠也者此謂繹祭故牽牲之時夫人預設盎齊之尊假令正祭牽牲時夫人設奠盎之尊至君親制祭夫人酌盎齊以獻尸義無妨也皇氏怪此奠盎在牽牲之時于事太早以奠盎為洗牲勘諸經傳無洗牲以酒之文皇氏文無所據其義非也云謂繹日也者以其先云君獻尸後云夫人薦豆故知繹日也云儐尸主人獻尸主婦自東房薦韭菹醢者此是有司徹文引之者證儐尸之時先獻後薦上大夫儐尸則天子諸侯之繹也祭統宗婦執盎從夫人薦涗水注涗盎齊也盎齊涗酌也凡尊有明水因兼云水爾夫疏宗婦執盎從者謂同宗之婦執盎齊以從夫人也人薦涗水者涗即盎齊以濁用清酒以涗泲之涗水是明水宗婦執盎齊從夫人而來奠盎齊于位夫人乃就盎齊之尊酌此涗齊而薦之因盎齊有明水連言水耳陳氏禮書酒正共五齊三酒以實八尊皆陳而弗酌所以致事養之義也非此八尊所實而皆有二者大祭所酌度用一尊則以三尊副之中祭所酌度用一尊則以兩尊副之小祭所酌度用一尊則以一尊副之皆酌而獻所以致事養之用也酒正言凡祭祀則天地宗廟社稷諸神之祭皆有五齊三酒司尊彛朝踐用犧尊再獻用象尊皆有罍蓋犧象所實泛與醴也罍尊所實盎以下也君西酌犧象夫人東酌罍尊君親制祭夫人薦盎盎齊涗酌而宗婦執盎從夫人薦涗水是罍尊之所實者盎而盎之上泛醴而已則犧象實泛醴可知也司尊彛言醴而不及泛言盎而不及醍沈鄭氏謂泛從醴緹沈盎則罍之所實盎之下又可知也然則夫人酌罍而薦盎則君制祭朝事之時也及君割牲饋食則夫人薦酒而已儀禮大夫尊兩甒于房户之間士尊于户東禮記罍尊在阼犧尊在西此皆所酌而非所設也若夫玄酒在室醴盞在户粢醍在堂澄酒在下此則設而弗酌也醴盞在户而坊記言醴酒在室蓋有不同而其設亦異爾齊之作也始則其氣泛然次則有酒之體中則盎然而浮久則赤終則沈室者隂之幽户者隂陽之交堂者隂陽之辨堂下者陽之顯而道以幽玄醇厚為上以顯著清美為下泛齊在室以其未離于道故也醴盞在户以其離道未逺故也粢醍在堂則道與事之間者也澄酒在下則純于事而已觀此則先王所辨齊酒之位意可知矣夫醴齊縮酌則以茅縮而後酌此記所謂縮酌用茅明酌是也盎齊涗酌則以酒涗而後酌此記所謂盞酒涗于清是也黍稷别而言之則稷曰粢曲禮稷曰明粢是也合而言之皆曰粢禮凡言粢盛是也記於醍齊言粢醍指其材爾鄭氏改粢為齊誤也鄭氏又以明酌為事酒而澄酒或謂三酒或謂五齊於酒正坊記儀禮則曰澄酒三酒也於禮運則曰澄酒沈齊也祫備五齊禘備四齊時祭備二齊朝用醴齊饋用盎齊諸臣自酢用凡酒然記曰夫人薦盎則醴以上君所酌盎以下夫人所酌而無君饋薦盎之禮矣酒正曰凡祭祀以五齊三酒實八尊則中祭小祭皆備五齊而無四齊二齊之制矣蕙田案以上酒齊右尊罍酒齊禮記明堂位爵夏后氏以盞殷以斚周以爵注斚畫禾稼也詩曰洗爵奠斚其疏此一經明魯有三代爵並以爵為形故并標名于上盞以玉飾之殷亦爵形而畫為禾稼斚稼也周爵或以玉為之或飾之以玉方氏慤曰斚殷尊名也而爵亦名之者以爵有從事之義故因以名焉殷質故也若行葦所謂奠斚者爵也司尊彛所謂斚彛者尊也爵則為爵之形以承之周尚文故也夏殷未承以爵而亦通謂之爵者自周始然耳若所謂一升曰爵夏則一升曰盞殷則一升曰斚也不然則由周以前止有爵之名由周以後又有爵之形也陸氏佃曰盞以齊言斚以鬯言爵以酒言知然者盎齊亦或謂之盞酒鬯尊一名斚彛知之也詩大雅行葦洗爵奠斚傳斚爵也夏曰盞殷曰斚周曰爵疏禮主人洗以酬賔賔得而奠之所洗所奠猶一物也而云洗爵奠斚似是異器故辨之云斚爵也爵酒器之大名故儀禮飲觶者亦曰卒爵是爵為總稱作者因洗奠之别更變其文耳夏曰盞以下皆明堂位文引之者明斚非周器謂之斚者彼注謂畫禾稼也何氏楷曰洗灑奠置也斚説文云玉爵也或説斚受六升案明堂位云爵夏后氏以盞商以斚周以爵據此則斚為商爵然周亦用之春秋傳有瓘斚郊特牲云舉斚角詔妥尸禮運云盞斚及尸君非禮也是謂僣君周禮鬱人職云大祭祀與量人受舉斚之卒爵而飲之量人職云凡宰祭與鬱人受斚歷而皆飲之此周人用斚之證也盞斚爵疑三代皆有之特所貴重異耳又灌尊夏后氏以雞彛商以斚周以黃目則尊亦有名斚者然此詩所咏是爵非尊也孔云所洗所奠猶一物也而云洗爵奠斚爵酒器之大名故儀禮飲觶者亦云卒爵是爵為總稱作者因洗奠之别更變其文耳愚案孔説依文作解未足深信考燕禮射禮無用斚者疑當作觚鄭玄周禮注讀斚為受福之嘏謂聲之誤是則斚有嘏音嘏觚聲近因訛觚為嘏耳考工記梓人云獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也爵受一升觚受三升豆受四升一獻三酬者言獻以一升之爵酬以三升之觚也合之則為四升是謂一豆此詩言洗爵奠斚乃括乎首尾之辭洗爵蒙上獻酢之文主人洗爵酌酒以獻賔賔既受卒爵即洗主人所獻之爵以酢答主人主人卒飲又獻公公酢亦如之主人卒飲乃更酌觚而自飲以酬賔賔受之奠而不舉以俟旅酬此所謂奠斚者也楚茨言獻酬以該酢此既言獻酢而兼言奠斚乃正以表酬耳周禮天官冡宰贊玉爵注宗廟獻用玉爵爵疏此享先王有玉爵天地有但不用玉飾云宗廟獻用玉爵者案明堂位獻用玉盞謂王朝踐饋獻酳尸時若祼則用圭瓉也劉氏曰享先王謂宗廟六享也內宰大祭祀后祼獻則贊瑶爵亦如之注瑶爵謂尸卒食王既酳尸后亞獻之其爵以瑶為飾食疏案儀禮鄭注云諸侯尸十三飯天子尸十五飯尸後王以玉爵酌朝踐醴齊以酳尸謂之朝獻后亦于後以瑶爵酌饋獻時盎齊以酳尸謂之再獻故云后亞獻也云其爵以瑶為飾者嚮來所解知后以瑶爵亞酳尸者約明堂位云爵用玉盞仍雕加以璧散璧角食後稱加彼魯用王禮即知王酳尸亦用玉盞后酳尸用璧角賔長酳尸用璧散彼云璧此云瑶不同者瑶玉名瑶玉為璧形飾角口則曰璧角角受四升爵為總號故鄭云其爵以瑶為飾也蕙田案爵容一升角受四升此疏謂瑶爵即璧角恐未是禮記祭統尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒注尸飲五謂酳尸五獻也大夫士祭三獻而獻賔方氏慤曰凡觴皆謂之爵此言玉爵瑶爵正謂一升之爵耳言散爵即五升之散也禮器曰宗廟之祭貴者獻以爵賤者獻以散則不特獻者然也雖受獻者亦然周禮春官鬱人大祭祀與量人受舉斚之卒爵而飲之注斚受福之嘏聲之誤也王酳尸尸嘏王此其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯膰事相成特疏鄭知斚是受福之嘏非天子奠斚殷爵名者案郊牲云舉斚角詔妥尸其時無鬱人量人受爵飲之法唯有受嘏時受王卒爵飲之禮故破斚為受福之嘏也王氏安石曰斚者先王之爵唯王禮用焉卒爵若儀禮所謂皇尸卒爵是也夏官量人凡宰祭與鬱人受斚歷而皆飲之注鄭司農云斚讀如嫁娶之嫁斚器名明堂位曰爵夏后氏以盞殷以斚周以爵玄謂斚讀如嘏尸之嘏宰冡宰疏先鄭云斚讀如嫁娶之嫁直取音同引明堂位者證斚是器名周獻用玉爵無用斚故后鄭云斚讀如嘏尸之嘏王氏安石曰受斚厯而皆飲之受斚傳之他器而皆飲之也禮記郊特牲舉斚角詔妥尸注妥安坐也尸始入舉奠斚若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯奠角疏斚角爵名也天子曰斚諸侯曰角若依此則饋食薦孰之時尸未入祝先奠爵于鉶南尸入即席而舉之如特牲禮隂厭後尸入舉奠焉也但云舉斚角恐非周禮耳崔云是周也詔妥尸者詔告也妥安也尸始即席舉奠斚角之時既始即席至尊之坐未敢自安而祝當告主人拜尸使尸安坐也方氏慤曰斚先王之爵也天子用焉角時王之爵也諸侯用焉周官鬱人之大祭祀與量人受斚之卒爵而飲之蓋言是矣禮運盞斚及尸君非禮也注盞斚先王之爵也是疏盞是夏爵斚是殷爵若夏殷之後得以盞斚及于尸君其餘諸侯于禮不合明堂位爵用玉盞仍雕加以璧散璧角注爵君所進于尸也仍因也因爵之形為之飾也加加爵也散角皆以璧飾其口也爵疏爵用玉盞仍雕者爵君酌酒獻尸杯也盞夏后氏名以玉飾之故曰玉盞加以璧散璧角者加謂尸入室饋食竟夫人酌盎齊亞獻名為再獻又名為加以其非正獻故謂之加于時薦加籩豆也此時夫人用璧角內宰所謂瑶爵也瑶是玉名爵是總號璧是玉之形制角是爵之所受名異而實一也其璧散者是夫人再獻訖諸侯為賔用之以獻尸雖非正加是夫人加爵之後故此總稱加先散後角便文也劉氏彛曰散者散而非致飾者也角者剛而能制以為酒戒也玉為陽故君以玉盞獻尸璧之體有降于玉故賔長以之然散于角亦非所以施于尊者禮曰賤者獻以散卑者舉角是也言加則知非正爵方氏慤曰盞則爵而已一升曰爵四升曰角五升曰散惟其所容有加于盞也故又因以為加焉陸氏佃曰據加以璧散璧角玉盞仍雕言雕則玉不純矣下于周故也灌用圭璋故加用璧郊特牲曰束帛加璧先言璧散蓋體正獻以小為貴者加獻尚大正獻以大為貴者加獻尚小禮器有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門內壺君尊瓦甒此以小為貴也注凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散五獻子男之饗禮也壺大一石瓦甒五斗缶大小未聞也易曰尊酒簋二用缶疏案特牲云主人獻尸用角佐食洗散以獻尸是尊者小卑者大案天子諸侯及大夫皆獻尸以爵無賤者獻以散之文禮文散亡略不具也特牲主人獻尸用角者下大夫也尊者舉觶卑者舉角者案特牲少牢禮尸入舉奠觶是尊者舉觶特牲主人受尸酢受角飲者是卑者舉角此是士禮天子諸侯祭禮亡文不具也凡王饗臣及其自相饗行禮獻數各隨其命子男五命故知五獻是子男此以小為貴近者小逺者大缶在門外則大于壺矣案禮圖瓦大受五升則瓦甒與瓦大同凡饗有酒其列尊之法缶盛酒在門外壺在門內君尊謂子男尊也不云內外則陳之于堂人君面尊専惠也小尊近君大尊在門是不重味故以小為貴稱方氏慤曰獻謂獻之于尸也舉謂自舉而飲也貴賤以位言尊卑以體言獻爵者主人獻散者佐食主人之與佐食則有貴賤之别焉故以位言之舉觶者皇尸舉角者主人皇尸之與主人特有尊卑之别耳故以體言之于瓦甒言君尊則知壺缶為飲諸臣之尊于甒言瓦則知壺缶皆瓦矣爾雅言盎謂之缶雖不言其所容以推法推之掬四謂之豆積之至于缶二謂之鍾則缶四石之名也缶之名雖同缶之用不一有用之以盛酒者若坎所謂用缶是也有用之以汲水者若比所謂盈缶是也有用之以節樂者若離所謂鼓缶是也陸氏佃曰貴者獻以爵賤者獻以散所謂尸飲五君洗玉爵獻卿尸飲九以散爵獻士尊者舉觶卑者舉角者凡妥尸天子舉斚諸侯舉角則卿舉觶大夫舉角歟若特牲饋食酳尸以角旅酬更以觶與此不同者蓋卑者以大為貴然則此經所言蓋天子諸侯之儀也周官子男饗禮五獻則所謂五獻之尊主饗禮與言子男以見公侯舉祭在前舉饗在後亦言之序燕禮司宫尊于東楹之西兩方壺豈所謂門內壺者耶公尊缶本在尊南南上豈所謂尊瓦甒者耶士旅食于門而兩圜壺豈所謂門外缶者耶圜壺雖非缶其陳設之序則然祭統尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也疏尸酢夫人執柄者爵為雀形以尾為柄夫人獻尸尸酢夫人尸則執爵之尾授夫人也夫人受尸執足者夫人受酢于尸則執爵足也夫人相授受不相襲處者謂夫婦交相致爵之時襲因也其執之物不相因故處酢必易爵謂主人受主婦之酢易換其爵故特牲主人受主婦之酢爵更爵酢鄭注云主人更爵自酢男子不承婦人爵儀禮士虞禮主人洗廢爵注爵無足曰廢爵下疏云爵無足曰廢爵者案文主婦洗足爵鄭云爵有足輕者飾也則主人喪重爵無足可知凡諸言廢者皆是無足廢敦之類是也主婦洗足爵於房中注爵有足輕者飾也人疏云爵有足輕者飾也者主婦主之婦為舅姑齊衰是輕于主人故爵有足為飾也賔長洗繶爵注繶爵口足之間有篆又彌飾疏云繶爵口足之間有篆又彌飾者案屨人繶是屨之牙底之間縫中之飾則此爵云繶者亦是爵口足之間有飾可知少牢饋食禮司宫溉豆籩勺爵觚觶几洗篚于東堂下勺爵觚觶實于篚有司徹尸降筵受王婦爵以降尸易爵於篚盥洗爵尸作三獻之爵二人洗觶升實爵兄弟之後生者舉觶于其長致爵于主人致爵于主婦無算爵特牲饋食記篚在洗西南順實二爵二觚四觶一角一散注順從也言南從統于堂也二爵者為賔獻爵止主婦當致也二觚長兄弟及衆賔長為加爵二人班同迎接並也四觶一酌奠其三長兄弟酬賔卒受者與賔弟子兄弟弟子舉觶于其長禮殺事相接禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角舊説云爵一升觚二升觶三升角四升散五升疏云二爵者為賔獻爵止主婦當致也者以一爵獻尸尸奠之未舉又一爵主婦當致者案經主婦致爵於主人婦人不見就堂下洗當于內洗則主婦致爵于主人時不取堂下爵而云主婦當致者謂主婦當受致之時用此爵也云四觶一酌奠其三長兄弟酬賔卒受者與賔弟子兄弟弟子舉觶于其長禮殺事相接者酌奠于鉶南是嗣子雖飲還復神之奠觶也餘有三在主人洗一觶酬賔奠于薦北賔取奠于薦南此未舉也下篚有二觶在及長兄弟洗觚為加爵衆賔長為加爵如初爵止此亦未舉也下篚仍有一觶在乃羞之後賔始舉奠觶行旅酬辨卒受者以虛觶奠于下篚還有二觶至為加爵者作止爵長兄弟亦坐取其奠觶酬賔如賔酬兄弟之儀以辨卒受者未實觶于篚時賔弟子兄弟弟子洗觶各酌舉觶于其長即用其篚二觶卒受者未奠之故三觶並用也故注云卒受者與賔弟子兄弟弟子舉觶于其長也云禮器曰貴者獻以爵者謂賔長獻尸主人致爵于主婦是也賤者獻以散上利洗散是也尊者舉觶謂若酌奠之及長兄弟酬賔之等是也卑者舉角謂主人獻用角鄭云不用爵者下大夫也則大夫尊用爵士卑用角是也引舊説者爵觚以下升數無正文韓詩雖有升數亦非正經故引舊説為證也儀禮士喪禮東方之饌兩瓦甒其實醴酒角觶木柶注此饌但言東方則亦在東堂下也既夕禮兩甒醴酒酒在南篚在東南順實角觶四木柶二素勺二豆在甒北注角觶四木柶二素勺二為夕進醴酒兼饌之也勺二醴酒各一也别疏觶有四柶有二者朝夕酒醴及器設不同器朝夕二奠各饌其器也禮記祭義見間以俠甒加以鬱鬯以報魄也注見問皆當為覸字之誤也覸以俠甒謂雜之兩甒醴酒也孰疏薦黍稷羞肺肝首心見間以夾甒加以鬱鬯謂饋時薦此黍稷進肝與肺及首與心雜以兩甒醴酒加以鬱鬯云兩甒醴酒者以士喪禮既夕等皆以甒盛醴故也此用甒蓋是天子追享朝踐用大尊此甒即大尊或云子男之禮禮器云君尊瓦甒謂子男也方氏慤曰甒蓋瓦器有兩甒故曰俠即司尊彛所謂間祀用兩大尊是矣言瓦甒之大尊則鬱鬯之為虎彛可知不及時祭則舉大以該小耳以諸物見于夾甒之間故曰覸以俠甒又副之以鬱鬯之彛故曰加以鬱鬯周禮考工記梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣注勺尊升也觚豆字聲之誤觚當為觶豆當為斗升疏爵制今韓詩説一升曰爵二升曰觚三升曰觶四曰角五升曰散古周禮説亦與之同謹案周禮一獻三酬當一豆即觚二升不滿豆矣鄭玄駁之云觶字角旁支汝頴之間師讀所作今禮角旁單古書或作角旁氏角旁氏則與觚字相近學者多聞觚寡聞觚寫此書亂之而作觚耳又南郡太守馬季長説一獻而三酬則一豆豆當為斗一爵三觶相近禮器制度云觚大二升觶大三升是故鄭從二升觚三升觶也鄭云觚豆字聲之誤者觶字為觚是字之誤斗字為豆是聲之誤王昭禹曰梓人為筍虡為樂器也為飲器為禮器也趙氏曰勺以酌酒今之杓是也古者有龍勺刻龍在上明堂位言灌尊龍勺疏勺蒲勺是也爵用以盛酒盞之小者觚盞之有稜角者又大似爵凡酒盛于樽必先以杓挹酒然後注于爵中至用觚則加厚也梓人先勺而後以爵與觚小大先後序當如此正義曰一升曰爵二升曰觚三升曰觶四升曰角五升曰散者皆韓詩説文案異義今韓詩説一升曰爵爵盡也足也二升曰觚觚寡也飲當寡少三升曰觶觶適也飲當自適也四升曰角角觸也不能自適觸罪過也五升曰散散訕也飲不能自節為人所謗訕也總名曰爵其實曰觴觴者餉也觥亦五升所以罰不敬觥廓也所以著明之貌君子有過廓然明著非所以餉不得名觴古周禮説爵一升觚二升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食毛詩説觥大七升許慎謹案周禮云一獻三酬當一豆若觚二升不滿一豆又觥罰不過一一飲而七升為過多鄭駁之云周禮獻以爵而酬以觚觚寡也觶字角旁著氏是與觚相涉誤為觚也南郡太守馬季長説一獻三酬則一豆豆當為斗與一爵三觶相應如鄭此言是周禮與韓詩説同一也此周禮一獻三酬案燕禮獻以觚又燕禮四舉酬熊氏云此一獻三酬是士之饗禮也若是君燕禮則行無算爵非唯三酬而已若是大夫以上饗禮則獻數又多不惟一獻也故知士之饗禮也云壺大一石瓦甒五斗者漢禮器制度文也此瓦甒即燕禮公尊瓦大也云缶大小未聞也者今以小為貴近者小則逺者大缶在門外則大于壺矣案禮圖瓦大受五升口徑尺頸髙二寸徑尺大中身鋭下平瓦甒與瓦大同引易曰尊酒簋二用缶易坎卦六四爻辭案六四尊酒簋二用缶納約自牖終無咎鄭云六四上承九五又互體在震上天子大臣以王命出會諸侯尊於簋副設玄酒而用缶也王氏詳説曰明堂位曰夏后氏以盞商以斚周以爵梓人之爵一升非商人之上梓也明矣雖似周制亦不盡乎周制且一升曰爵二升曰觚三升曰觶四升曰角五升曰散總而名之皆曰觴也明堂位曰爵用玉盞仍雕加以璧角璧散禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角特牲實二觚二爵四觶一角一散則是周制之有五等矣此言爵曰觚而不及觶與角與散其非周制也明矣然鄭氏以觚當為觶豆當為斗蓋以所容之酒約之獻以爵酬以觚一獻而三酬則為酒一斗若不以觚為觶則不及斗酒之數矣緣觶之一字其書有三有以角旁從攴者有以角旁從氐者角旁從氐當誤而為觚字也必矣若夫五等之觴所容之外又有所謂觥者詩曰兕觥其觩是也又有所謂豐者鄉射記曰司射命弟子升設豐是也鄭氏于觥之説失之以觥即角也曾不謂所容四升何以為罰爵乎舊圖與許慎皆謂七升曰觥其説似可採也舊圖于豐之説失之以豐為人形而首戴杅謂豐國之君以酒亡國曾不謂豐為爵之承槃與玷同人以酒亡國者何必豐乎鄭氏與聶氏皆謂豐如豆而卑其説似可採也但梓人所為飲酒器皆以木為之詩曰酌之用匏則于是乎有匏爵矣此用之于郊也書曰乃受同冒則于是乎有銅爵矣此周人用之于圭瓉也明堂位曰爵用玉盞此魯人用之於灌也然則周人自用銅而與魯人以玉爵乎曰周制所用以當代異代為貴賤而不以銅玉為貴賤也蕙田案鄭氏以觥為四升而論語疏有觥亦五升之説許慎又有觥七升之説案觥為罰爵必不與四升之角五升之散同制當以七升之説為是陳氏禮書明堂位曰爵夏后氏以盞商以斚周以爵考之爾雅鍾之小者謂之棧音盞晉元興中剡縣民井中得鍾長三寸口徑四寸銘曰棧則棧卑而淺矣夏爵命之以盞蓋其制若盞然也祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵蓋其制若雀然也盞象棧爵象雀而斚有耳焉則三者之制可知矣明堂位言玉盞周禮言玉爵春秋傳言瓘斚則三者之飾可知矣儀禮士虞主人獻尸以廢爵主婦以足爵賔長以繶爵鄭氏謂繶爵者口足之間有篆則爵之繶猶屨之繶也主人廢爵而未有足主婦足爵而未有篆賔長則篆口足而已以虞未純吉故也然則吉禮之爵蓋全篆歟明堂位曰爵用玉盞仍雕仍雕則雕之不在夏而在周矣詩曰洗爵奠斚周禮鬱人大祭祀與量人受舉斚之卒爵而飲之盞斚先王之器也惟魯與二王之後得用焉諸侯用之則僭矣故記曰盞斚及尸君非禮也夫天下之理莫之爵者常大為物所爵者常小禽之名爵以小故也火之名爝亦以小故也爵資于尊而所入者小其實一升而已此所以謂之爵也梓人曰爵一升觚三升獻以爵而酬以觚韓詩説一升曰爵二升曰觚三升曰觶四升曰角五升曰散而爵量與梓人同觚量與梓人異者儀禮少牢有司徹皆獻以爵酬以觶鄉飲鄉射亦獻以爵酬以觶鄭氏釋梓人謂觚當為觶古書觶從角氏角氏與觚相涉故亂之耳其説是也然梓人曰獻以爵酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也一獻而三酬者獻以一升酬以三升也並而計之為四升四升為豆豆雖非飲器其計數則然鄭氏改豆為斗誤也凡獻皆以爵而燕禮大射主人獻賔獻公以觚特牲禮主人初獻以爵者禮器曰宗廟之器以小為貴貴者獻以爵賤者獻以散尊者舉觶卑者舉角特牲主婦獻以角與爵而佐食加獻以散祭統尸飲五君洗玉爵獻卿尸飲九以散爵獻士大射主人以觚獻賔及公而司馬以散獻服不是貴者以小賤者以大或獻尸或受獻一也士祭初獻以角下大夫也燕禮大射主人獻以觚下饗禮也饗禮惟不入牲其他皆如祭祀則用爵以獻可知也明堂位加以璧散璧角則天子自觶而上用玉可知也燕禮大射以象觚象觶獻公則諸侯之爵用象可知也燕禮司正飲角觶而士喪禮奠亦角觶蓋大夫飾以角士木而已喪奠用角觶攝盛也觶中觴也鄉飲鄉射記曰其他皆用觶觀士冠禮父醮子士婚主人禮賔婦見舅姑醴皆以觶聘禮禮賔士虞及吉祭與大夫吉祭隂厭之奠皆以觶公食大夫無尊亦以觶則觶之為用非適于一也先儒言諸觴皆形制同而升數異然爵如雀觚不圜孔子曰觚不觚觚哉觚哉古者破觚為圜殳體八觚壇有八觚則諸觴形制安得而同哉書稱上宗奉同王受同三宿三祭三吒則周之爵又謂之同也先儒謂爵盡也足也觚寡也觶適也角觸也散訕也又謂總名曰爵其實曰觴觴餉也此不可考要之爵觚觶角皆示戒也蕙田案爵明堂位曰周以爵疏云以爵為形陳氏禮書曰祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵蓋其制若爵然也山堂曰爵受一升口徑四寸底徑二寸上下徑二寸三分圓足飾之以玉曰玉爵天官冡宰贊玉爵疏天地有爵不用玉飾宗廟獻用玉爵飾之以瑶曰瑶爵天官內宰贊后瑶爵注王既酳尸后亞獻用之祭統尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫此玉爵瑶爵所用之異也盞明堂位夏后氏之爵以玉飾之名曰玉盞明堂位曰爵用玉盞仍雕是也斚明堂位殷爵並爵形而畫為禾稼郊特牲云舉斚角詔妥尸詩行葦洗爵奠斚飾之以瓘曰瓘斚春秋傳曰若我用瓘斚玉瓚是也陳氏禮書曰盞斚先王之器惟魯與二王後得用之諸侯用之則僭矣故記曰盞斚及尸君非禮也明堂位疏三爵並以爵為形方慤曰三爵皆容一升散禮器賤者獻以散祭統尸飲九以散爵獻士鄭云散容五升角禮器卑者舉角鄭云角受四升案散與角皆酳後加爵所用以璧飾口曰璧散璧角明堂位曰加以璧散璧角疏加爵夫人用璧角賔用璧散是也妥尸時諸侯亦奠角郊特牲舉斚角詔妥尸鄭注天子奠斚諸侯奠角案諸侯止用角散魯及二王後得用璧角璧散又明堂位疏璧角即瑶爵案瑶爵一升之爵璧角四升之角疏合而一之非也觚考工記獻以爵而酬以觚儀禮特牲饋食記篚實二觚注二觚長兄弟及衆賔長為加爵論語觚不觚鄭云觚容二升山堂曰口徑四寸中深四寸五分底徑二寸六分圓足漆赤中畫青雲氣觶禮器尊者舉觶鄭云觶受三升儀禮有司徹兄弟之後生者舉觶于其長特牲饋食記篚實四觶注四觶一酌奠其三長兄弟酬賔卒受者與賔弟子兄弟弟子舉觶于其長是也山堂曰口徑五寸中深四寸強底徑二寸觚觶角散形皆同升數則異並不圓缶禮器五獻之尊門外缶鄭云大小未聞而方慤以為缶大四石案易曰樽酒簋二用缶缶為卑約未必大至四石方説無據壺禮器門內壺鄭云大一石公羊傳云齊侯唁公子野井國子執壺漿何休云壺禮器腹方口圓曰壺反之曰方壺有爵飾蓋此壺也又疏云謂刻畫爵形以飾壺體上下空徑一尺四寸方橫徑一尺一寸強乃容一斛之數也特牲饋食記順覆兩壺蓋在南則壺又有蓋案此壺但設在門內則與天子饋獻壺尊不同瓦甒禮器君尊瓦甒鄭云大五斗祭義覸以俠甒注謂雜之兩甒醴酒間則瓦甒所以盛醴酒又祭義疏云甒即天子追享朝踐所用之大尊案如其説則瓦甒為天子之尊矣何以祭器指為五獻子男之尊耶缶壺瓦甒皆瓦器禮圖瓦甒為兩器皆大五升恐未是洗特牲饋食記設洗南北以堂深東西當東榮水在洗東篚在洗西少牢饋食禮司宫概洗於東堂下周禮祭器圖洗形如罍受一斛右爵斚奠獻五禮通考卷六十三
