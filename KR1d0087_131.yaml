body:
  text: 五禮通考卷一百二十一刑部尚書秦蕙田撰吉禮一百二十一祀孔子春秋哀公十六年左氏傳夏四月己丑孔丘卒注仲尼既告老去位猶書卒者魯之君臣崇其聖德殊而異之四月十八日乙丑無己丑己丑五月十二日日月必有誤公誄之曰旻天不弔不憗遺一老俾屏余一人在位煢煢余在疚嗚呼哀哉尼父無自律注憗且也屏蔽也律法也言喪尼父無以自為法鄭疏鄭衆曰誄謂積纍生時德行以賜之命主為其辭元禮記注云誄纍也誄列生時行迹讀之以作諡此傳惟説誄辭不言作諡傳記羣書皆不言孔子之諡蓋惟誄其美行示已傷悼之情而賜之命耳不為之諡故書傳無稱焉至漢王莽輔政尊尚儒術封孔子後為褒成侯追諡孔子為褒成宣尼君明是舊無諡也鄭元禮注云尼父因自字以為之諡謂諡孔父為尼父鄭元錯讀左傳云以字為諡遂復妄為此解禮記檀弓魯哀公誄孔丘曰天不遺耆老莫相豫位焉嗚呼哀哉尼父注誄其行以為諡也言孔子死無佐助我處位者尼父因其字以為之諡吳氏澄曰誄者述其功行以哀之之詞如後世祭文之類非諡也欽定義疏有誄而不諡者如哀公之誄尼父是也有誄而諡者如衛之諡貞惠文子是也諡必兼誄而誄不必兼諡鄭謂誄其行以為諡似未必然史記孔子世家孔子葬魯城北泗上皇覽曰孔子冢去城一里冢塋百畝冢南北廣十步東西十三步髙一丈二尺冢前以瓴甓為祠壇方六尺與地平本無祠堂冢塋中樹以百數皆異種魯人世世無能名其樹者民傳言孔子弟子異國人各持其方樹來種之其樹作扮雒女貞五味毚檀之類孔子塋中不生荆棘及刺人草弟子及魯人往從冢而家者百有餘室因命曰孔里魯世世相傳以歲時奉祀孔子冢而諸儒亦講禮鄉飲大射于孔子冢孔子冢大一頃故所居堂弟子內後世因廟藏孔子衣冠琴車書索隱曰謂孔子所居之室其弟子之中孔子沒後後代因廟藏夫子平生衣冠琴書於夀堂中至於漢二百餘年不絶髙皇帝過魯以太牢祀焉諸侯卿相至常先謁然後從政太史公曰詩有之髙山仰止景行行止雖不能至然心鄉往之余讀孔氏書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低回留之不能去云天下君王至於賢人衆矣當時則榮沒則已焉孔子布衣傳十餘世學者宗之自天子王侯中國言六藝者折中於夫子可謂至聖矣右周漢書髙祖本紀十二年十一月行自淮南還過魯以太牢祀孔子邱氏濬曰此漢以來祀孔子之始晉書禮志昔武王入殷未及下車而封先代之後蓋追思其德也孔子以大聖而終於陪臣未有封爵至漢元帝孔霸以帝師賜爵號褒成君奉孔子後漢書儒林傳元帝即位徴霸以帝師賜爵關內侯食邑八百户號褒成君史記孔子世家正義括地志云漢封夫子十二代孫忠為褒成侯生光為丞相封侯平帝封孔霸孫莽二千户為褒城侯後漢封十七代孫志為褒成侯魏封二十二代孫羡為崇聖侯晉封二十三代孫震為奉聖亭侯後魏封二十七代孫為崇聖大夫孝文帝又封三十一代孫珍為崇聖侯髙齊改封珍為恭聖侯周武帝改封鄒國公隋文帝仍舊封鄒國公煬帝改為紹聖侯皇唐給復二千户封孔子裔孫孔德倫為褒聖侯也成帝本紀綏和元年二月癸丑詔曰蓋聞王者必存二王之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里文獻通考梅福上書曰武王克殷未及下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於户所謂存人以自立者也今成湯不祀殷人無後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納初武帝時封周後姬嘉為周子南君至元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公蕙田案紹嘉侯之封雖曰繼殷之後其實亦是奉孔子也觀梅福之言曰今陛下誠能據仲尼之素功以封其子孫則國家必獲其福匡衡之言曰禮記孔子曰某殷人也先師所共傳宜以孔子世為湯後意可知矣故文獻通考載之於褒贈先聖先師門內而愚於是編亦附其內云平帝本紀元始元年封孔子後孔均為褒成侯奉其祀追諡孔子曰褒成宣尼公邱氏濬曰案此後世尊崇孔子之始夫平帝之世政出王莽姦偽之徒假崇儒之名以收譽望文姦謀聖人在天之靈其不之受也必矣有若曰自生民以來未有盛於夫子者也豈一言一行之美而可以節惠立諡者哉然則不加以諡號將何以稱曰千萬世之下惟曰先師孔子以見聖人所以為萬世尊崇者在道不在爵位名稱也後漢書鍾離意傳注意别傳曰意為魯相到官出私錢萬叁千文付户曹孔欣修夫子車身入廟拭几席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置几前孔子教授堂下床首有懸甕意召孔欣問此何甕也對曰夫子甕也背有丹書人莫敢發也意曰夫子聖人所以遺甕欲以懸示後賢因發之得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯藏其一意即召伯問果服焉右漢後漢書世祖本紀建武五年二月壬申封殷後孔安為殷紹嘉公注成帝封孔吉為紹嘉公安即吉之裔也冬十月還幸魯使大司空祠孔子蕙田案此遣官祀闕里之始十三年二月庚午以殷紹嘉公孔安為宋公十四年夏四月辛巳封孔子後志為褒成侯注平帝封孔均為褒成侯志均子也馬氏端臨曰西漢時孔氏之裔侯者二人紹嘉侯奉殷後也褒成侯奉孔子之後也建武中興襲爵如故紹嘉之後不知所終褒成之後則志卒子損嗣至和帝永元四年徙封褒尊侯損卒子曜嗣曜卒子元嗣相傳至獻帝初國絶魏時再襲封世世不絶明帝本紀永平十五年三月幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王説經注漢春秋曰帝時升廟立羣臣中庭北面皆再拜帝進爵而後坐册府元龜永平十五年帝東巡過魯幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王説經帝自製五經要説章句令桓郁較定於宣明殿其後帝親於辟雍自講所著五經章已復令郁説一篇帝謂郁曰我為孔子卿為子夏起子者商也又問郁曰子幾人能傳學郁曰臣子皆未能傳學孤兄子一人學方起帝曰努力教之有起者即白之邱氏濬曰此後世祀孔子弟子之始章帝本紀元和二年二月丙辰東巡狩三月己丑進幸魯庚寅祀孔子於闕里及七十二弟子賜褒成侯及諸孔男女帛東漢書曰祠禮畢命儒者論難孔僖傳元和二年二月帝東巡狩還過魯幸闕里以太牢祀孔子及七十二人作六代之樂大會孔氏男子二十以上者六十三人命儒者講論語僖自陳謝帝曰今日之會於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛安帝本紀延光三年春二月東巡狩三月戊戌祀孔子及七十二弟子於闕里自魯相令丞尉及孔氏親屬婦女諸生悉會賜褒成侯以下帛各有差闕里志元嘉二年詔孔子廟置百石卒史一人掌領禮器春秋享禮出王家錢給大酒值河南尹給牛羊豕各一大司農給米後漢置百石卒史詔碑司徒臣雄司空臣戒稽首言魯前相瑛書言詔書崇聖道勉六藝孔子作春秋制孝經刪述五經演易繫辭經緯天地幽贊神明故特立廟褒成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守廟春秋饗禮財出王家錢給大酒直須報謹問太常祠曹椽馮牟史郭玄辭對故事辟雍禮未行祠先聖師侍祠者孔子子孫太宰太祝令各一人皆備爵太常丞監祠河南尹給牛羊豕雞各一大司農給米祠臣愚以為宜如瑛言夫子大聖則象乾坤為漢制作先世所尊祠用衆牲長吏備爵今欲加寵子孫敬恭明祀傳於罔極可許臣請魯相為孔子廟置百石卒史一人掌領禮器出王家錢給大酒直他如故事臣雄臣戒愚戇誠惶誠恐頓首稽首死罪死罪臣稽首以聞制曰可元嘉三年三月二十七日壬寅司徒雄司空戒下魯相承書從事下當用者選年四十以上經通一藝雜試通利能𢎞先聖之禮為宗所歸者如詔書到言永興元年六月甲辰朔十六日辛酉魯相平行長史事下守長擅叩頭死罪敢言之司徒司空府壬寅詔書為孔子廟置百石卒史一人掌領禮器選年四十以上經通一藝雜試通利能奉𢎞先聖之禮為宗所歸者平叩頭叩頭死罪死罪謹案文書守文學掾魯孔和師孔憲户曹史孔覽等雜試和修春秋嚴氏通經髙第事親至孝能奉先聖之禮為宗所歸一除和補名狀如牒平惶恐叩頭死罪上司空府讚曰巍巍大聖赫赫彌章相乙瑛字少卿平原髙唐人令鮑疊字文公上黨屯留人政教稽古名重規矩乙君察舉守宅除吏孔子十九世孫麟廉請置百石卒史一人鮑君造作百石史舍功垂無窮于是始闕靈帝建寧二年詔祀孔子依社稷出王家榖春秋行禮魯相史晨奏出王家榖祀夫子碑建寧二年三月癸卯朔七日己酉魯相臣晨長史臣謙頓首死罪上言臣蒙厚恩受任符守得在奎婁周孔舊寓不能闡𢎞德政恢崇一變夙夜憂怖纍息屏營臣晨頓首頓首死罪死罪臣以建寧元年到官行秋享飲酒泮宮畢復禮孔子宅拜謁神座仰瞻榱桷俯視几筵靈所憑依肅肅猶存而無公出酒脯之祠臣即自以俸錢修上案食醊具以敘小節不敢空謁臣伏念孔子乾坤所挺西狩獲麟為漢制作故孝經援神契曰玄丘制命帝卯行又尚書考靈曜曰丘生倉際觸期稽度為赤立制故作春秋以明文命綴紀撰書修定禮儀臣以為素王稽古德亞皇代雖有褒成世享之封四時來祭畢即歸國臣伏見臨辟雍日祠夫子以太牢長吏備爵所以尊先師重教化夫封土為社立稷而祀皆為百姓興利除害以祈豐穰月令祀百辟卿士有益於民矧乃孔子玄德煥炳光於上下而本國舊居復禮之日闕而不祀誠朝廷聖恩所宜特加臣寢息耿耿情所思維臣輒依社稷出王家榖春秋行禮以供禋祀餘胙賜先生執事臣晨誠惶誠恐頓首頓首死罪死罪上言太尉司徒司空大司農府治所部從事府昔在仲尼汁光之精大帝所挺顔母育靈承弊遭衰黑不代倉轍環歷聘歎鳳不臻自衛反魯養徒三千獲麟輟作端門見徴血書著紀黃玊􅞗應主為漢制道審可行乃作春秋復演孝經刪定六藝象與天談鈞河適洛郤揆未然巍巍蕩蕩與乾比崇右東漢三國魏志文帝本紀黃初二年春正月詔曰昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運在魯衛之朝教化乎洙泗之上棲棲焉遑遑焉欲屈已以存道貶身以救世於時王公終莫能用之乃退考五代之修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀兹可謂命世之大聖億載之師長者也以遭天下大亂百祀隳廢舊居之廟隳而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇化報功盛德百代必祀者哉其以議郎孔羡為宗聖侯邑百户奉孔子祀命魯郡修起舊廟置百石吏卒以守衛之又於其外廣為室屋以居學者晉書禮志魏文帝黃初二年正月詔以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡修舊廟置百户吏卒以守衛之魏志崔林傳林為司空魯相上言漢舊立孔子廟褒成侯歲時奉祀辟雍行禮必祭先師王家出榖春秋祭祀今宗聖侯奉嗣未有命祭之禮宜給牲牢長吏奉祀尊為貴神制三府議博士傳祗以春秋傳言立在祀典則孔子是也宗聖適足繼絶世章盛德耳至於顯立言崇明德則宜如魯相所上林議以為宗聖侯亦以王命祀不為未有命也周武王封黃帝堯舜之後及立三恪禹湯之世不列於時復特命他官祭也今周公以上達於三皇忽焉不祀而禮經亦存其言今獨祀孔子者以世近故也以大夫之後特受無疆之祀禮過古帝義踰湯武可謂崇明報德矣無復重祀於非族也右三國魏晉書武帝本紀泰始三年十二月徙宗聖侯孔震為奉聖亭侯禮志武帝泰始三年十一月改宗聖侯孔震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子宋書禮志晉明帝大寧三年詔給事奉聖亭侯孔亭四時祀孔子祭如泰始故事晉書孝武帝紀太元十一年秋八月庚午封孔靖之為奉聖亭侯奉宣尼祝宋書文帝本紀元嘉十九年十二月丙申詔曰胄子始集學業方興自微言泯絶逝將千祀感事思人意有慨然奉聖之後可速議繼襲於先廟地特為營造依舊給祠直令四時享祀闕里往經冦亂黌校殘毁并下魯郡修學舍採召生徒昔之賢哲及一介之善猶或衛其邱壠禁其芻牧况尼父德表生民功被百代而墳塋荒蕪荆棘弗剪可蠲墓側數户以掌灑掃魯郡上民孔景等五户居近孔子墓側蠲其課役供給灑掃并種松柏六百株孝武帝本紀孝建元年十月戊寅詔曰仲尼體天降德維周興漢經緯三極冠冕百王爰自前代咸加褒述典司失人用闕宗祀先朝逺存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮勵實憑聖義大教所敦永惟兼懷無忘待旦可開建廟制同諸侯之禮擇爽塏厚給祭秩禮志文帝元嘉八年奉聖侯有罪奪爵至十九年又授孔隱之隱之兄子熙先謀逆又失爵二十八年更以孔惠雲為奉聖侯後有重疾失爵孝武大明二年又以孔邁為奉聖侯邁卒子莽嗣有罪失爵齊書武帝本紀永明七年二月詔曰宣尼誕敷文德峻極自天發輝七代陶鈞萬品英風獨舉素王誰匹功隱於當年道深於日月感麟厭世緬邈千祀川竭谷虛邱夷淵塞非但洙泗湮淪至乃饗嘗乏主前王敬仰崇修寢廟歲月亟流鞠為茂草今學斆興立實稟洪規撫事懷人彌增欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時紹繼明帝本紀永泰元年三月詔曰仲尼明聖在躬允光上哲𢎞厥雅道大訓生民師範百王軌儀千載立人斯仰忠孝攸出元功潛被至德彌闡雖反袂遐曠而祧薦靡闕時祭舊品秩比諸侯頃歲以來祀典凌替爼豆寂寥牲奠莫舉豈所以克昭盛烈永隆風教者哉可式循舊典詳復祭秩使牢餼備禮欽饗兼申梁書武帝本紀天監四年六月庚戌立孔子廟敬帝本紀太平二年春正月壬寅詔曰夫子降靈體哲經仁緯義允光素王載闡元功仰之者彌髙誨之者不倦立忠立孝德被蒸民制禮作樂道冠羣后雖泰山頽峻一簣不遺而泗水餘瀾千載猶在自皇圗屯阻祧薦不修奉聖之門嗣續殱滅敬神之寢簠簋寂寥永言聲烈實兼欽愴可搜舉魯國之族以為奉聖後并繕廟堂供備祀典四時薦秩一皆遵舊陳書廢帝本紀光大元年十二月庚寅以兼從祀中郎孔英哲為奉聖亭侯奉孔子祀北魏書世祖本紀太平真君十一年八月輿駕南伐十有一月至於鄒山使使者以太牢祀孔子禮志世祖南征至魯以太牢祭孔子顯祖皇興二年以青徐既平遣中書令兼太常髙允以太牢祀孔子册府元龜皇興二年以青徐平詔中書令髙允兼太常至兖州以太牢祭孔子廟帝謂允曰此簡德而行勿有辭也北魏書髙祖本紀延興二年二月乙巳詔曰尼父稟達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祀典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺牲鼓舞倡優媟狎豈所以尊明神敬聖道者也自今以後有祭孔子廟制用酒脯而已不聽婦女合雜以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨時致敬令肅如也牧司之官明糾不法使禁令必行太和十三年七月立孔子廟於京師蕙田案此京師立孔廟之始十六年二月丁未改諡宣尼曰文聖尼父告諡孔廟癸丑帝臨宣文堂引儀曹尚書劉昶鴻臚卿遊明根行儀曹事李韶授策孔子崇文聖之諡於是昶等就廟行事既而帝齊中書省親拜祭於廟邱氏濬曰案有司薦享始于此前此但云釋奠而未嘗言廟至是始有宣尼廟之文蕙田案此即十三年所立京師之廟邱氏不深考遂以為至是始有宣尼廟之文耳十九年四月庚申行幸魯城親祠孔子廟辛酉詔拜孔氏四人顔氏二人為官如徐州又詔選諸孔宗子一人封崇聖侯邑一百户以奉孔子之祠又詔兖州為孔子起園柏修飾墳壠更建碑銘褒揚聖德文獻通考後魏封孔子二十七葉孫乘為崇聖大夫孝文太和十九年改封二十八葉孫珍為崇聖侯北齊書文宣帝本紀天保元年六月詔封崇聖侯邑一百户以奉孔子之祀并下魯郡以時修治廟宇務盡褒崇之至遣使人致祭孔父文獻通考北齊改封三十一代孫為恭聖侯後周武帝平齊改封孔子後為鄒國公北周書宣帝本紀大象二年三月丁亥詔曰盛德之後是稱不絶功施於民義昭祀典孔子德惟藏往道實生知以大聖之才屬千古之運載𢎞儒業式敘彛倫至如幽贊天人之理裁成禮樂之務故以作範百王垂風萬葉朕欽承寶歷服膺教義眷言洙泗懷道兹深且褒成啓號雖彰故實旌崇聖績猶有闕如可追封為鄒國公邑數準舊并立後承襲别於京師置廟以時祭享右南北朝文獻通考隋文帝仍舊封孔子後為鄒國公煬帝改封為紹聖侯右隋唐書禮樂志髙祖武德九年封孔子之後為褒聖侯闕里志武德九年十二月二十九日詔曰宣尼以大聖之德天縱多能王道藉以裁成人倫資其教義故孟軻稱生民以來一人而已自漢氏馭歷魏室分區爰及晉朝暨於隋氏咸相尊尚用存享祀朕欽若前王憲章故實親師宗聖是所庶幾存亡繼絶仰推通典可立孔子後為褒聖侯以隋故紹聖侯孔嗣衍嫡子德倫為嗣唐書太宗本紀貞觀十一年七月丙午給兖州孔子廟户二十以奉享禮樂志貞觀十一年尊孔子為宣父作廟於兖州給户二十以奉之文獻通考貞觀十一年封孔子裔德倫為褒聖侯舊唐書髙宗本紀乾封元年正月甲午次曲阜縣幸孔子廟追贈太師增修祠宇以少牢致祭闕里志乾封元年正月車駕發泰山至曲阜親幸祠廟詔曰朕聞德契機神盛烈光於後代化成天下元功被於庶物魯大司冦宣尼父孔某資大聖之材屬衰周之末思欲屈已濟俗𢎞道佐時歷聘周流莫能見用想乘桴而永歎因獲麟而興感於是垂素王之雅則正魯史之繁文播鴻業於一時昭景化於千祀朕嗣膺寶歷祗奉璿圖憲章前王規矩先聖崇至公於海內行大道於天下遂得八表乂安兩儀交泰功成化洽禮備樂和展采東巡回輿西土途經兹境撫事興懷駐蹕荒區願為師友瞻望幽墓思承格言雖殿寢荒蕪舊基尚在靈廟空寂徽烈猶存孟軻曰自生民以來未若孔子者也微禹之歎既深褒崇之道宜峻可追贈太師庶年代雖逺式範令圖景業維新儀刑茂實其廟宇傾頽者宜更加修造仍令三品一人以少牢致祭褒聖侯德倫既承允嗣有異常流其子孫並宜免賦役册府元龜咸亨元年五月詔曰諸州縣孔子廟堂有破壞并先來未造者遂使先師闕奠祭之儀久致飄零深非敬本宜令有司速事營造唐書禮樂志武后天授元年封周公為褒德王孔子為隆道公神龍元年以鄒魯百户為隆道公采邑以奉歲祀子孫世襲褒聖侯舊唐書禮儀志神龍元年以鄒魯百户封隆道公諡曰文宣太極元年正月詔孔宣父祠廟令本州修飾取側近三十户以供灑掃元宗本紀開元十三年十一月丙申幸孔子宅遣使以太牢祭其墓給復近墓五户册府元龜十三年親設奠祭詔曰孔宣父誕聖自天垂範百代作王者之師表開生民之耳目朕增封岱嶽回鑾泗濱思闕里之風想雩壇之詠逖矣遺烈慨然永懷式遵祀典用申誠敬宜令禮部尚書蘇頲以太牢致祭仍令州縣以時祀享復近墓五户長供掃除玉海古者惟功臣與祭大蒸未聞弟子從祀於師也自建武祠七十二子於孔廟然亦不出闕里也貞觀末加以左卜諸儒從祀太學而武成王之祠亦倣而為之總幸開元以來又加諸儒以三等之爵而州縣學宮咸有從祀矣文獻通考德宗建中三年以文宣王三十七代孫齊卿為兖州司馬襲文宣王憲宗元和四年以文宣王三十八代孫惟昉為兖州參軍十三年以文宣王三十八代孫惟晊襲文宣王武宗會昌二年以文宣王三十九代孫榮為國子監丞襲文宣王右唐五代史周本紀太祖廣順二年六月乙酉朔幸曲阜祀孔子册府元龜廣順二年五月親往兖州辛未遣端明殿學士顔行往曲阜祀文宣王廟六月己酉幸曲阜謁孔子廟既畢其所奠金花銀爐十數事留於祠所以備享遂幸孔林拜孔子墓墳側有石壇是唐朝封禪回謁孔子之壇二百餘年間絶東封之禮洙泗之上無復鑾和之音帝以武功之餘枉車致敬尊師重道不亦優乎文獻通考廣順二年六月以文宣王四十三代孫前曲阜縣令孔仁玉復為曲阜縣令仍賜緋魚袋以亞聖顔淵裔孫顔涉為曲阜縣主簿仍敕兖州修葺祠宇墓側禁樵採時車駕親征兖州初平遂幸曲阜謁孔子祠既奠將致敬左右曰仲尼人臣無致敬之禮上曰文宣百代帝王師得無拜之即拜奠於祠前胡氏寅曰人為諂諛趨利而不顧義者也孔子大聖途之人猶知之豈以位云乎如以位固異代之陪臣也如以道則配乎天地如以功則賢乎堯舜卒伍一旦為帝王而以異代陪臣臨天下之大聖豈特趨利導諛又無是非之心矣斯臣也當周太祖時以拜孔子為不可則當石髙祖時必以拜契丹為可者是故君子有言天下國家所患莫甚于在位者不知學在位者不知學則其君不得聞大道則淺俗之論易入理義之言難進人主功德髙下一係於此然則學乎學乎豈非君臣之急務哉祖庭廣記周髙祖親征慕容彥超至兖州城將破夜夢一人狀甚魁異被王者服城陷取委巷入適夫子廟在帝豁然曰昨夢殆夫子乎不然何路與廟會因駐蹕升堂瞻像一如夢中所見感喜下拜右五代闕里志宋建隆三年詔祭文宣王用一品禮立十六戟於廟門仍詔用永安之曲文獻通考太祖乾德四年以文宣王四十四代陵廟主進士孔宜為兖州曲阜縣主簿太宗太平興國三年詔孔宜可授太子右贊善大夫襲封文宣公十月詔免兖州曲阜縣襲封文宣公家租稅先是歷代以聖人之後不預庸調周顯德中遣使均田遂抑為編户至是孔氏訴於州以聞帝特免之宋史真宗本紀景德四年五月兖州增二十户守孔子墳八月辛亥賜文宣王四十六世孫聖佑同學究出身大中祥符元年十一月戊午幸曲阜縣謁文宣王廟服鞾袍再拜幸叔梁紇堂近臣分奠七十二弟子遂幸孔林加諡孔子曰元聖文宣王遣官祭以太牢給近便十户奉塋廟賜其家錢三十萬帛三百匹以四十六世孫聖佑為奉禮郎近屬授官賜出身者六人禮志大中祥符元年封泰山詔以十一月一日幸曲阜備禮謁文宣王廟內外設黃麾仗孔氏宗屬並陪位帝服鞾袍行酌獻禮又幸叔梁訖堂命官奠七十二弟子先儒洎叔梁紇顔氏初有司定儀肅揖帝特展拜以表嚴師崇儒之意親製贊刻石廟中復幸孔林以樹擁道降輿乘馬至文宣王墓設奠再拜詔追諡曰元聖文宣王祝文進署祭以太牢修飾祠宇給便近十户奉塋廟仍追封叔梁訖為齊國公顔氏魯國夫人伯魚母亓官氏鄲國夫人王圻續通考大中祥符元年十一月制曰王者順考古道懋建大猷崇四術以化民昭宣教本總百王而致治丕變人文方啓迪於素風思丕揚於鴻烈先聖文宣王道膺上聖體自生知以天縱之多能實人倫之先覺元功侔乎簡易景鑠配乎貞明惟列辟以尊崇為億載之師表朕以寡昧欽承命歷曷嘗不遵守彛訓保乂中區屬以祗若元符告成喬嶽觀風廣魯之地飭駕數仭之牆躬詣逺祠緬懷遐躅仰明靈之如在肅奠獻以惟寅是用稽簡册之文昭聰睿之德聿舉追崇之禮庶申嚴奉之心備物典章垂之不朽誕告多士昭示朕意宜追諡曰元聖文宣王曲阜縣志大中祥符元年封聖考叔梁紇為齊國公聖母顔氏為魯國太夫人制曰朕以祗陟岱宗新巡魯甸永懷先聖之德躬造闕里之庭奠獻周旋欽崇備至惟降靈之所自亦錫美之有初像設具存名稱斯闕宜加追命以煥典章叔梁訖宜追封齊國公顔氏宜追封魯國太夫人遣部官員外郎王勵精虔祭告追封聖配亓官氏為鄲國夫人制曰朕巡行魯郡躬詣聖堂顧風教之所尊舉典章而既渥眷惟令淑作合聖靈載稽簡册之文尚闕追崇之數屬兹咸秩特示追崇垂厥方來式昭遺範亓官氏宜追封鄲國夫人仍令兖州遣官詣曲阜祭告宋史真宗本紀大中祥符五年十二月壬申改諡元聖文宣王曰至聖文宣王禮志以國諱改諡至聖文宣王賜孔氏錢帛録親屬五人並賜出身又賜太宗御製御書一百五十卷銀器八百兩邱氏濬曰案真宗先詔有司檢討漢唐褒崇先聖故事初欲追諡為帝或言宣父周之陪臣周止稱王不當加帝號故苐增美名曰元聖蓋以春秋演孔圖曰孔子母感黑帝而生故曰元莊子曰恬淡元聖素王之道遂取以為稱嗚呼孔子之道非一言一義所可盡者諡之有無固不為之輕重况加之非聖之言既加之矣而又以犯其誕妄之祖之諱而改之哉闕里志宋真宗東封王欽若言祭尼邱山上有紫雲氣長八九丈詔遣入內殿頭楊懷玉祭謝天禧二年賜文宣公家祭冕服又賜行宫材修葺廟宇又敕兖州差兵士四十人員寮一人於本廟巡宿守護官物仍委轉運司於轄下有衣甲軍器處約度支於本廟文獻通考天禧元年以文宣王四十六代孫光祿寺丞聖佑襲封文宣公皇祐三年詔兖州仙源縣自國朝以來世以孔氏子孫知縣事使奉承廟祀近歲廢而不行非所以尊先聖也今後宜復以孔氏子弟充選宋史仁宗本紀至和二年三月丙子封孔子後為衍聖公文獻通考集賢殿學士劉敞言據禮部員外郎直集賢院祖無擇奏伏見至聖文宣王四十七代孫孔宗願襲封文宣公乃是其人未死已賜諡矣臣切觀前史孔子之後襲封者衆在漢魏則曰褒成褒聖宗聖在晉宋亦曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封以鄒國唐初曰褒聖或為君或為侯為公為大夫使奉祭祀惟漢平帝追諡孔子為褒成宣尼公遂以均為褒成君至唐開元二十七年追諡為文宣王又以其後為文宣公是皆以祖之美諡而加後嗣生而諡之不經甚矣欲乞明詔有司詳求古訓或封以小國或取尊儒褒聖之義别定美號加於封爵著於令式使千古之下無以加於我朝之盛典也奉聖旨送兩制詳議臣等謹案漢元帝初元元年以師孔霸為關內侯食邑八百户號褒成君而霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食八百户祀孔子及霸卒子福嗣福卒子房嗣房卒子莽嗣皆稱褒成君至平帝元始元年始更以二千户封莽為褒成侯而追諡孔子曰褒成宣尼公以此觀之則褒成者國也宣尼者諡也公爵者爵也褒成宣尼公猶曰河間獻王云耳蓋推宣尼以為褒成祖非用褒成以為宣尼諡也唐世不深察此義而以褒成為夫子之諡因疑霸等號封褒成皆襲其祖之舊耳故遂封夫子文宣王而爵其後文宣公考校本末甚失事理先帝既封泰山親祠闕里又加文宣以至聖之號則人倫之極致盛德之顯名盡在此矣尤非其子孫臣庶所宜襲處而稱之者也臣等以為無擇議是可用其文宣王四十七代孫孔宗願伏乞改賜爵名若褒成奉聖之比上足以尊顯先聖有不可階之勢下不失優孔氏使得守繼世之業改唐之失法漢之舊傳曰必也正名又曰正稽古立事可以永年此之謂也闕里志慶歷中梁適知兖州乞以廂兵代廟户又裁減人數方是時宰相章得象欲如其請參知政事范仲淹獨曰此事與尋常利害不同自是朝廷崇奉聖師美事仁義可息則此人數可減吾輩雖行他人必復之朝論遂已當時天下以此賢仲淹而鄙得象文獻通考英宗治平元年詔勿以孔氏子弟知仙源縣其襲封人如無親屬在鄉里令常任近便官不得逺去家廟京東提刑王綱乞慎重長民之官故有是詔哲宗元祐元年朝議大夫孔宗翰辭司農少卿請依家世例知兖州以奉孔子祀從之宗翰又言孔子後襲封疏爵本為侍祠今乃兼領他官不在故郡請自今不使襲封之人更兼他職終身使在鄉里事下禮部太常寺禮官議欲依所請釐定典禮命官以司其用度立學以訓其子孫襲封者専主祠事增賜田百頃供祭祀之餘許均贍族人其差墓户並如舊法賜書置教授一員教諭其家子孫鄉鄰或願從學者聽改衍聖公為奉聖公及刪定家祭冕服等制度頒賜詔可元符元年吏部言請下兖州於孔子家衆議承襲之人不必子繼所貴留意祖廟敦睦族人從之髙宗紹興八年詔衢州於係官田內撥賜五頃賜主奉先聖祠事襲封衍聖公孔玠以孔氏渡江子孫隔絶林廟故賜田以奉先聖蒸嘗也二十四年以文宣王五十代孫搢補右承奉郎襲封衍聖公奉祀事光宗紹熙四年以文宣王五十一代孫孔文逺為承奉郎褒封衍聖公右宋金史熙宗本紀天眷三年十一月癸丑以孔子四十九代孫璠襲封衍聖公奉孔子後王圻續通考海陵天德二年二月初定襲封衍聖公俸格有加於常品又加拯承直郎大定十六年詔立兖州學闕里廟宅子孫年十三以上入學者不限數金史世宗本紀大定二十年十二月癸卯特授襲封衍聖公孔總為兖州曲阜令封爵如故王圻續通考時召總至京師欲與之官尚書省奏總主先聖祀若加任使守奉有缺上曰然乃授曲阜縣令章宗本紀明昌元年三月詔修曲阜孔子廟學二年四月詔襲封衍聖公孔元措視四品秩王圻續通考章宗明昌三年四月詔曰衍聖公秩視四品階正八品不稱可超遷中議大夫永著於令元泰定三年山東亷訪使王鵬南言孔思誨襲爵上公階止四品於格弗稱且失尊崇意遂進階嘉議大夫三年十月壬子有司奏增修曲阜宣聖廟敕黨懷英撰碑文朕將親行釋奠之禮其檢討典故以聞十一月庚午朔尚書省奏翰林侍讀學士黨懷英舉孔子四十八代孫端甫年德俱髙該通古學賜進士及第俟春暖召之六年夏四月癸亥敕有司以增修曲阜宣聖廟工畢賜衍聖公以下三獻法服及登歌樂一部仍遣太常舊工往教孔氏子弟以備祭禮八月己未命兖州長官以曲阜新修廟告成於宣聖闕里志襲封衍聖公奏朝廷稽考三代制禮作樂乞頒降大樂許內族人及縣學生咸使肄習并乞降禮器以備釋奠及家祭使用至六年賜堂上正聲大樂一副禮器一副於闕里金史章宗本紀承安二年二月特命襲封衍聖公孔元措世襲兼曲阜令闕里志金泰和八年八月二十七日以先聖降誕之辰前期一日宗子率闔族敬祀尼山廟祭奠日方午刻俄聆殿上當空有樂振作皆金石絲竹之聲凡在一舍間皆聞之駭然蓋德感所致金修正殿廊廡大中門大成門鄲國夫人殿自皇統大定以來建之其制猶質素至明昌初增後位夾殿殿廡皆以碧瓦為緣外柱以石刻龍為文其藻栱之飾塗以青碧每位皆有閣至於欄檻簾櫳並硃漆之齊國公僅與正位又創二代三代祖殿育聖侯五賢堂奎文閣之屬煥然一新與夫廳堂黌舍門廡凡四百餘楹方之前古於此為備宣宗本紀貞祐三年十月召中奉大夫襲封衍聖公孔元措為太常博士上初用元措於朝或言宣聖墳廟在曲阜宜遣之奉祀既而上念元措聖人之後山東冦盜縱橫恐罹其害是使之奉祀而反絶之也故有是命右金元史太宗本紀五年六月詔以孔子五十一世孫元措襲封衍聖公十二月敕修孔子廟八年三月復修孔子廟闕里志太宗九年奉旨灑掃廟户依舊一百户奉上差法并行蠲免不係州縣所管元史選舉志憲宗四年世祖在潛邸特命修理殿廷及即位賜之玉斚俾永為祭器張德輝傳史天澤辟德輝為經歷官世祖在潛邸召見問曰孔子沒已久今其性安在對曰聖人與天地終始無往不在殿下能行聖人之道性即在是矣歲戊申春釋奠致胙於世祖世祖曰孔子廟食之禮何如對曰孔子為萬代王者師有國者尊之則嚴其廟貌修其時祀其崇與否於聖人無所損益但以此見時君崇儒重道之意何如耳世祖曰今而後此禮勿廢闕里志至元二年罷孔廟灑掃户王圻續通考曲阜孔子廟歷代給民百户以供灑掃復其家至是尚書省以括户之故盡收為民翰林學士王磐言林廟户百家歲賦鈔不過六百貫僅比一六品官終年俸耳聖朝疆域萬里財賦歲億萬計豈愛一六品官俸不以待孔子哉且於帑庫所損無多其損國體甚大時論韙之元史世祖本紀至元四年正月癸卯敕修曲阜宣聖廟梁宜御賜尚醖釋奠記至元五年後己卯正月皇帝田於柳林以上丁在邇允御史臺奏因宣聖五十四代孫監察御史臣思立出上尊酒釋奠於闕里遣御史從事臣髙元肅驛致之禮竟曲阜縣尹權祀事臣孔克欽言於宗黨曰兹誠罕有之盛典不識諸石罔以昭後於是其宗人前湖廣行中書省都事臣思迪等屬臣宜記之宜延祐初科進士且嘗助教國子揄揚聖德職也遂不敢辭而諾之曰吾夫子沒魯哀公雖誄之而未極其尊漢髙帝雖祀之而未盡其禮後代褒崇封爵之未悉其道詎若皇元纍頒明詔既於至聖文宣王上加封以大成復於二丁永享以太牢重以香帛白金之錫帝心再三寅奉尊隆禮意淵博邁越古昔逺矣今憲臺擴𢎞縟典霈光祿之天釀以備祖庭禋酌豈惟孔氏子孫有光實天下儒服之士舉有光也乃拜手稽首樂為之書十三年以孔子五十三世孫曲阜縣尹孔治兼權主祀事十九年十一月襲封衍聖公孔洙入覲以為國子祭酒兼提舉浙東學校事就給俸祿與護持林廟璽書王圻續通考案孔子後自宋南渡初其四十八代孫端友子玠寓衢州元既平宋擬所立或言孔氏子孫寓衢者乃其宗子召洙赴闕洙遜於居曲阜者帝曰寧違榮而不違親真聖人後也故有是命閻子靜復曲阜廟碑略曰聖上嗣服之初祗述祖考之成訓興學養士嚴祀宣聖自曲阜始明年元貞改元先聖五十三代孫密州尹治入朝璽書賜命中議大夫襲封衍聖公月俸有千秩視四品孔氏世爵弗傳者久至是乃復申命有司制考辟雍作廟於京師由是四方嚮風崇建廟學惟恐居後闕里祠宇燬於金季之亂閣號奎文若大中門闥存者無幾右轄嚴公忠濟保魯嘗假清臺頒歷錢佐營繕之費歲戊申始復鄆國後寢以寓先聖顔孟十哲像至元丁卯衍聖公治尹曲阜主祀事將圖起廢奎文杏壇齋廳黌舍即其舊而新之禮殿則未遑也國初封建宗室畫濟兖單三州為魯國大長公主駙馬濟寧王分地置濟寧總管府屬縣十六曲阜其一也濟寧守臣阿勒坦布哈承詔旨會府尹僚佐鄉長者謀以廟役為任首出錢幣萬緍衆翕然助之傭工雇力市木於河輦石於山掄材於野杗棟櫨桷楹礎之屬悉具又得泗水渠堰積石數百石堊稱是露階銘砌咸足用焉郡政之暇躬為督視甄陶煆治丹艧髹漆以致工師廩積各有司存經始於大德二年之春屬歲祲中止續事於五年之秋不期月而告成殿矗重簷亢以層基繚以修廊大成有門七十二賢有廡泗沂二公有位黼座既遷更塑鄆國像於後寢締構堅貞規模壯麗大小以楹計者百二十有六資用以緍計者十萬有竒落成之日逺近助祭者衣冠輻輳衆庶瞻顒千祀祖庭頓還舊觀於是衍聖公治遣其子曲阜令思誠奉表以聞且以廟碑為請會選胄子入學擢思誠國子監丞特敕中書賜田五千畝以供粢盛户二十八以應灑掃仍下翰林書其事於石臣復承命踧踖既述興造始末竊惟聖元神武造邦天兵傅汴戎事方殷不忘先聖之祀詔令五十一代孫衍聖公元措歸魯裒集奉常禮樂於兵燼之餘燕翼之謀肇於此矣世祖聖德神功文武皇帝仁沾義洽九域混同文物煥然可觀內立國學外置郡邑學官而於先聖之後尤所注意遴選師儒訓迪作成需賢以嗣封爵兹志未究皇上纘而行之用能培植教本光昭先業以致魯國臣民思樂泮水如附靈臺子來之衆至矣哉觀文化下必世後仁之效豈特震耀一時實宗社無疆之福也闕里志大德五年復給灑掃二十八户從衍聖公孔治之請也元史成宗本紀大德七年閏五月壬戌詔禁犯曲阜陵廟者冬十月給大都文宣王廟灑掃户五王圻續通考大德九年給曲阜林廟灑掃户以尚珍署田五十頃供歲祀元史仁宗本紀至大四年閏七月辛丑命國子祭酒劉賡詣曲阜以太牢祀孔子祭祀志闕里之廟始自太宗三年令先聖五十一代孫襲封衍聖公元措修之官給其費而代祠之禮則始於武宗牲用太牢禮物别給白銀一百五十兩綵幣表裏各十有三匹四年冬復遣祭酒劉賡往祀牲禮如之延祐之末泰定天歷初載皆循是典錦幣雜綵有加焉闕里志延祐七年詔以白金一百五十兩綿綺雜綵表裏各一十三假遣説書王存義詣魯以太牢祀孔子仁宗手香加額以授之元史英宗本紀至治二年春正月戊寅敕有司恤孔氏子孫貧乏者泰定帝紀至治三年十一月癸丑遣使詣曲阜以太牢祀孔子文宗本紀天歷二年二月癸巳遣翰林侍讀學士曹元用祠孔子於闕里至順元年冬十月戊申降璽書申飭衍聖公崇奉孔子事至順二年七月藝文少監歐陽元言先聖五十四代孫襲封衍聖公爵最五等秩登三品而用四品銅印於爵秩不稱詔鑄從三品印給之王圻續通考至順三年二月詔修曲阜宣聖廟先是亓官夫人神座下生木芍藥一本見者異之而修廟令下順帝元統元年令浙江行省範銅造和寧宣聖廟祭器凡百三十有五事順帝本紀至元元年五月遣使詣曲阜孔子廟致祭四年正月詔修孔子廟五年敕賜曲阜宣聖廟碑六年十一月辛未以孔克堅襲封衍聖公至正二年十月壬戌遣官致祭於曲阜八年七月乙卯遣使祀曲阜孔子廟十五年十月以襲封衍聖公孔克堅同知太常禮儀院事以克堅子希學襲封衍聖公十六年二月己卯令集賢直學士楊俊民致祭曲阜孔子廟仍葺其廟宇右元王圻續通考洪武二年遣使詣曲阜致祭曲阜孔子故里也使者陛辭太祖諭之曰仲尼之道廣大悠久與天地相並故後世有天下者莫不致敬盡禮修其祀事朕今為天下主期在明教化以行先聖之道今既釋奠國學仍遣爾修祀事於闕里爾其敬之大明集禮洪武二年遣官降香致祭曲阜孔子御製祝文曰惟神昔生周天王之國實居魯邦聖德天成述紀前王治世之法雖當時列國鼎峙其道未行垂教於後以至於今凡有國家大有得焉自漢之下以神通祀海內朕代前王統率庶民目書檢點忽覩神之訓言非其鬼而祭之諂也敬鬼神而逺之祭之以禮此非聖賢明言他何能道故不敢通祀暴殄天物以纍神之聖德兹以香幣牲齊粢盛庶品式陳明薦惟神鑒焉明史太祖本紀洪武二年八月衍聖公襲封及授曲阜知縣並如前代制七年二月戊午修曲阜孔子廟設孔顔孟三氏學十八年十月甲辰詔曰孟子傳道有功名教歷年既久子孫甚微近有以罪輸作者豈禮先賢之意哉其加意詢訪凡聖賢後裔輸作者皆免之闕里志洪武二十九年上謂工部右侍郎秦逵曰春秋之時人紀廢壞孔子以至聖之資刪述六經使先王之道晦而復明萬世永賴功莫大焉夫食粟則思樹藝之先衣帛則思蠶繅之始皆重其所從出也孔子之功與天地並立故朕命天下通祀以致崇報之意而闕里又啓聖降神之地廟宇廢而不修將何以妥神靈詔來世爾工部其即為修理以副朕懷洪武初奉詔修孔廟至永樂十四年又撤其故而新之是年遣官祭闕里宣德元年宣宗皇帝登極遣太常寺丞孔克凖詣闕里祭告自先師而下四配十哲兩廡凡九壇俱用太牢正統元年英宗皇帝登極遣國子監司業趙琬詣闕里祭告景泰元年景帝登極遣翰林院侍講吳節以香帛詣闕里祭告天順元年英宗復位遣工科左給事中孫昱詣闕里祭告成化元年憲宗皇帝登極遣吏部右侍郎尹旻詣闕里祭告又駕幸太學釋奠孔子遣官取衍聖公𢎞緒并三氏子孫赴京觀禮命衍聖公分獻沂國公此遣官欽取之始𢎞治元年孝宗皇帝登極遣太常寺少卿田景賢詣闕里祭告明通紀𢎞治六年命孔彥繩為翰林世襲五經博士主衢州孔子廟祀明史考宗本紀𢎞治十二年六月曲阜先師廟災遣使慰祭明通紀十二年曲阜孔廟火題準取旁近各省及各抽分厰銀重修兖州府志闕里至聖廟災遣翰林侍讀學士李傑祭告出帑金十五萬兩命守臣重建明史孝宗紀𢎞治十七年閏四月闕里先師廟成遣大學士李東陽祭告闕里志正德十六年詔有司改建孔氏家廟廟在衢州者官給錢董其役令博士孔承義奉祀嘉靖元年世宗皇帝登極遣吏部尚書石瑶詣闕里祭告隆慶元年穆宗登極遣尚寶司卿劉奮庸詣闕里祭告萬歷元年神宗登極遣尚寶司司丞張孟男詣闕里祭告天啓元年熹宗皇帝登極遣順天府府丞姚士慎詣闕里祭告右明五禮通考卷一百二十一
