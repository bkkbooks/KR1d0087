body:
  text: 五禮通考卷七十四刑部尚書秦蕙田撰吉禮七十四宗廟制度虞書舜典八音克諧周禮春官大司樂播之以八音大師播之以八音金石土革絲木匏竹注金鐘鏄也石磬也土塤也革鼔鼗也絲琴瑟也木柷敔也匏笙也竹管簫也也疏匏笙亦以竹為之以經别言匏故匏不得竹名蔡氏徳晋曰八音一曰金為鏞為鏄為編鍾為錞為鐲為鐃為鐸二曰石為球為編磬三曰土為塤為缶為土鼔四曰革為鼔為鼗為拊五曰絲為琴為瑟六曰木爲柷為敔七曰匏為笙為竽八曰竹為管為籥為簫為篴為箎為牘為應為雅李氏光地曰金石以紀律樂之綱也琴瑟以應人聲在堂上笙管塤貴人氣在堂下樂之用也鼓鼗柷敔所以節樂而已故序其輕重之次則曰金石絲竹匏土革木國語伶州鳩所言是也此則以成于天地者為貴故先以金石土成于動物者次之故繼以革絲成於植物者又次之故繼以木匏竹也所謂播之以八音也禮記樂記金石絲竹樂之器也然後聖人作為鼗鼔椌楬壎箎此六者徳音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也注六者為夲以其聲質也椌楬謂柷敔也壎箎或謂簨虡官序貴賤謂尊卑樂器列數差次國語周語伶州鳩曰琴瑟尚宮注凢樂輕者從大重者從細故琴瑟尚宫也鐘尚羽注鐘聲大故尚羽也石尚角注石磬也輕於鐘故尚角匏竹利制注匏笙也竹簫管也利制以聲音調利為制無所尚也大不踰宮細不過羽夫宮音之主也第以及羽故樂器重者從細注重謂金石從細尚細聲輕者從大注輕瓦絲也是以金尚羽石尚角瓦絲尚宫匏竹尚議注議議從其調和革木一聲注革鼗鼓木柷敔一聲無清濁之變夫政象樂樂從和和從平聲以和樂律以平聲金石以動之絲竹以行之匏以宣之瓦以贊之革木以節之物得其常曰樂極極之所集曰聲聲應相保曰和細大不踰曰平如是而鑄之金磨之石繫之絲木注繫絲木以為琴瑟也越之匏竹注越謂為之孔也節之鼓而行之以遂八風李氏光地曰琴瑟細恐其過扵羽故尚宮鐘聲大恐其踰扵宮故尚羽惟石聲清和而角在清濁之間故其音獨相得也匏竹者人氣所吹也歌以人聲吹以人氣髙下在心有所取裁故曰利制又曰尚議革木無五聲為樂之節而已故曰一聲八音之叙金石為先金聲玉振樂之綱也其次琴瑟以叶升歌諧人聲者也其次匏竹土貴人氣也又其次乃革木以為諸音之節此八音貴賤之等也白虎通八音者何謂也土曰塤竹曰管皮曰鼓匏曰笙絲曰絃石曰磬金曰鐘木曰柷敔此謂八音也法易八卦也又曰聲五音八何聲為本出於五行音為末象八風故樂記曰聲成文謂之音比音而樂之謂之樂也陳氏禮書萬物盈於天地之間而若堅若脆若勁若韌若實若虗若沈若浮莫過於金石土革絲木匏竹而天下之音具存矣可以和神人可以作動物非深於樂者其能究此乎葢樂器重者從細輕者從大大不踰宮細不踰羽大細之中則角而已金重者也故尚羽瓦絲輕者也故尚宫石輕於金而重於瓦絲故尚角匏竹無大細之從故尚議革木無清濁之變故一聲此八音所以直八卦而遂八風也葢主朔易者坎也故其音革而風廣莫為果蓏者艮也故其音匏而風融震為竹故其音竹而風明庶巽為木故其音木而風清明兌為金故其音金而風閶闔乾為玉故其音石而風不周瓦土器也故坤音瓦而風凉蠶火精也故離音絲而風景以方言之金石則土類也西凝之方也故三者在西匏竹則木類也東生之方也故三者在東絲成於夏故在南革成於冬故在北小胥之序八音先之以金石土中之以革絲後之以匏竹木葢西者聲之方虚者聲之本故音始於西而終於東西則先金石而後土者隂逆推其所始也東則先匏竹而後木者陽順序其所生也革絲居南北之正而先革而後絲亦先虚之意歟記曰鐘聲鏗鏗以立號號以立横横以立武石聲磬磬以立辨辨以致死絲聲哀哀以立廉亷以立志竹聲濫濫以立㑹㑹以聚衆鼓聲讙讙以立動動以進衆葢竹聲濫石聲清濫則立㑹以阜財清則立辨以死節絲聲哀鼔聲讙哀則立亷以制行讙則立動以致功鐘聲不讙不哀不清鏗鏘以立號足以肅衆横而不屈足以立武此所以聼之有合也魏明帝曰金音鏗鏗以立横横以勁武故金音正則人思武矣石聲硜硜以立别别以致死故石音正則人思守節矣絲音哀哀以立亷亷以立志絲音正則人将立操矣竹音濫濫以立㑹㑹以聚衆竹音正則人思和洽矣土音濁濁以立太太以含育土音正則人思寛厚矣革音讙讙以立動動以進衆革音正則人思毅勇矣匏音啾啾以立清清以忠謹匏音正則人思愛㳟矣木音直直以立正正以寡欲木音正則人思㓗已矣陳氏樂書周官大師掌六律六同以合隂陽之聲皆播之以八音先金石而土革次之先絲木而匏竹次之八者之序也國語曰鑄之金磨之石繫之絲木越之匏竹節之鼓而行之以遂八風太元曰㓮割竹革木土金擊石弹絲以和天下掜擬之八風八音所以掜擬八風而遂之八風所以從律而不失先後之序故其論次亦因之而已金生於土而别於土其卦則兑其方則西其時則秋其風閶闔其聲尚羽其音則鏗立秋之氣也先王作樂用之以為金奏焉周官鐘師掌金奏鏄師掌金奏之鼓鼓人掌四金之音聲孟子曰金聲是也金奏之樂未嘗不用鼓特謂之金者以金爲主故也禮曰内金示和也又曰入門而金作示情也國語曰金奏肆夏荘子曰金石有聲不考不鳴則金奏而鳴之内以示情外以示和音之實也石之為物堅實而不動其卦則乾其時則秋冬之交其方則西北之維其風不周其聲尚角其音則辨立冬之氣也先王作樂擊之以為磬之屬焉葢金石之樂其聲未嘗不相應故荘子曰金石有聲不考不鳴國語曰金石以動之唐李真以車鐸而得徴音之石則其相應可知矣三代之樂既壊於秦漢漢至成帝尚未有金石之樂及晉武破苻堅之後而四廂金石始備焉後世磬以泗濱石其聲下而不和而以華原所出者易之信乎審一以定和難矣哉土則埏埴以成器而冲氣出焉其卦則坤其方則西南之維其時則夏秋之交其風則凉其聲尚宮其音則濁立秋之氣也先王作樂用之以為塤之屬焉故詩曰伯氏吹塤仲氏吹箎又曰如塤如箎樂記以塤箎為徳音之音周官笙師并掌而教之則其聲相應信矣革去故以為器而羣音首焉其卦則坎其方則北其時則冬其風廣莫其律黄鍾其聲一其音讙冬至之氣也先王作樂用之以為鼓之屬焉葢鞉所以兆奏鼔者也二者以同聲相應故祀天神以雷鼔雷鼗祭地示以靈鼓靈鼗享人鬼以路鼔路鼗樂記亦以鼗鼔合而為徳音周官少師亦以鼗鼓并而鼔之也絲飾物而成聲其卦則離其方則南其時則夏其聲尚宮其律蕤賔其風景其音哀夏至之氣也先王作樂絃之以爲琴瑟之屬焉葢琴瑟之樂君子所常御其大小雖不同而其聲應一也故均列之堂上焉匏之為物其性輕而浮其中虚而通笙則以匏為母象植物之生焉其卦則艮其方東北之維其時冬春之交其聲尚議其律大吕太簇其風融其音啾立春之氣也先王作樂慮之以爲笙竽之屬焉記曰歌者在上匏竹在下國語曰匏竹利制葢匏竹相合而成聲得清濁之適故也竹之為物其節直而有制其心虚而能通而利制之音所由岀也其卦則震其方則東其時則春其聲尚議其律姑洗其風明庻其音溫春分之氣也先王作樂竅之以為簫管之屬焉木者所以合止樂之器其卦則巽其方東南之維其時春夏之交其風清明其律夾鐘其聲一其音直立夏之氣也先王作樂斵之以為柷敔之屬焉樂記曰作為椌楬徳音之音柷敔以椌楬爲用椌楬以柷敔為體二者之聲一合一止未嘗不相待也又曰樂經之亾乆矣其遺音餘韻雖奪於殽亂之衆言然質諸他經亦可少概見矣樂記曰聖人作為鞉鼓椌楬塤箎此六者徳音之音也然後鐘磬竽瑟以和之葢作革以為鞉鼓作木以為椌楬作土以為塤作竹以為箎作金以為鐘作石以為磬作匏以為竽作絲以爲毖則鞉鼔椌楬塤箎唱徳音於其始也鐘磬竽瑟和徳音於其終也書曰戞擊鳴球摶拊琴瑟以詠下管鞉鼓合止柷敔笙鏞以間葢鳴球以為石琴瑟以為絲下管以為竹拊鞉鼓以為革柷敔以為木笙以為匏鏞以為金則戛擊鳴球摶拊琴瑟作之於堂上也管鞉鼓柷敔笙鏞作之於堂下也引而伸之觸類而長之周官旋宮之樂舉鐘以見石舉鞉鼓以見木舉管以見匏舉琴瑟以見瓦詩之有瞽言應田縣鼓與鞉則革音也言柷圉則木音也言簫管則竹音也言磬則石音也不言金者以石見之不言匏者以竹見之葢八音之於樂一音不備不足以為樂以用言之未有不比音以體言之未有不比物然詩書不言土音易於比坎離獨言缶不及土音者葢八音以土爲主猶五事以思為主也故七音非土不和土非七音不備詩書舉七音以見土推用以見體也易舉缶以見七音眀體以見用也由是觀之八音樂之器而樂非器也律呂正義八音之樂各從其類而制器尤宜探其體要書曰詩言志歌永言聲依永律和聲八音克諧無相奪倫葢生於人聲成於樂器而宮調運於其中所以節人聲而裁樂器也古聖人初制律吕以和五聲然後被之八音金石有厚薄重輕之差匏竹有空竅短長之别絲音則徽柱散實以分聲調土樂則中空容積以較度分革木雖止一聲亦皆有所由起要之莫不以律呂五音之倍半凖其損益葢絲與金石為一類假人力以生聲者也竹與匏土為一類假人氣以生聲者也革與木為一類所以為樂之節奏者也然八音之中備律吕隂陽之體叶宮調聲字之全惟絲竹為最要何也金石之器以律吕實積容受分量較其厚薄重輕古有特鐘特磬編磬又有鏞鐘鏄鐘金錞金鐲金鐃金鐸後世變爲方響雲鑼之類其爲體也雖各不同而為用則一器獨限一聲而已匏之器曰笙曰簧大者為巢小者爲和又曰竽葢古者皆以匏攢衆管而近世不用匏以木代之月令曰調竽笙箎簧則與竹音並列乆矣土之器惟壎有頌壎雅壎之異樂記所謂徳音之音也其聲生於空竅其分定於容積與竹音同革木之器雖不以律呂之法為凖則而其度分亦皆依黄鍾而得數記曰鼓無當於五聲五聲弗得不和其大者爲雷鼓靈鼓路鼓鼖鼓鼛鼓晉鼓小者為鼗鼓應鞞相鼓朄鼓又變為腰鼓杖鼓羯鼓銅鼓國語曰木以節之上古惟柷敔後世増為舂牘又變為拍板要之革與木皆所以應和樂之始終節奏耳夫六經所載八音備具然堂上之樂貴人聲而以絲音為主虞書戛擊鳴球摶拊琴瑟以詠樂記清廟之瑟朱絃而疏越一唱而三歎是也堂下之樂貴人氣而以竹音為主商頌所謂嘒嘒管聲戴記所謂下管象舞夏籥序興是也凡升歌笙入間歌合樂未有不以絲竹為要領者竹之聲在虗虚之多者聲濁少者聲清而多少之數定於中空之圍徑短長絲之聲在實實之多者聲濁少者聲清而多少之數定於絲綸之巨細分度所以然者竹音之樂十二律吕為之本相與比例推求而取其聲由於比例推求而得其數其圍徑長短加分減分總不越乎十二律呂之範圍大者用其大體本形之度分小者用其小體本形之度分而後竹音諸樂之聲字各歸於律吕之位而各應於律呂之宮調焉其器之最古者惟排簫具十二律呂之正加以二倍律二倍吕共為一十有六管各一聲偹聲字清濁之二均合於鐘磬而為諸樂之主宰其餘為簫為笛為箎為管之属而匏之器同施於竹其制為笙要之其體皆自黄鍾之倍半而生其設孔也則又自律呂相和而成故備聲字清濁於一器而得適於用焉葢竹音諸樂依人之氣而生聲故本之中空容積之多寡而無與乎形體厚薄之度分也絲音之樂五聲二變為之夲相與比例折取而察其聲由於比例折取而得其分其絲綸巨細徽柱逺近總不越乎五聲二變之範圍大者用其大體本絃之度分小者用其小體本絃之度分而後絲音諸樂之聲字各得五聲二變之位而各應於律呂之宮調焉其器之最古者惟琴與瑟後變而為筝為筑為琵琶為月琴之屬而琴瑟最正記有大琴大瑟中琴小瑟三禮圖又有雅琴雅瑟頌琴頌瑟之類所言體制雖殊而大絃則皆起於下徴之分取音必合於三分損益之法其聲位始正葢絲音諸樂依人之力而生聲故本之絲綸之巨細長短而無與乎形質之大小也今列之樂器所得之度分所應之聲字而辨其體用必使絲竹之器一皆恊於十二律呂五聲二變之正而衆音之器所應宮調聲字又皆恊於絲竹之音然後諸樂之大本可得而論焉古之樂器不得其實即今之樂器而索之律呂宮調其聲字無不符合者正由三分損益之理為之體而隔八相生之義為之用故也至於諸樂之器數形體孔徑度分古今稍有更變者葢緣古者一律一呂各為一聲而後世備衆聲於一器當其一律為一聲則合七律為一均而不見有餘及乎備衆聲於一器則一器各為一均且或一均而該衆調而不見不足今古雖殊其器一也器即不同其理一也是以聲音之微妙全在虚實之分虚者氣之所發而實者體之所存氣與體鼓動之間而天地之和應焉在器數或閲因革而有變更聲氣之元則亘古今而無新故寓諸八音而氣以行焉體以成焉推之六合之内四海之外此音同此理同也推之百世之上百世之下此理同此音同也是故不知古樂而溺於今非特不知古并不知今也必復古樂而不屑於今非特不知今終亦無從復古也蕙田案聲有五而音數八聲本於陽五氣之流行者也故其數竒音麗於器器屬隂八方之對待者也故其數偶陽根於隂五聲必附八音而出隂統於陽八音不外五聲之用此聲音之道所以與天地通也陳氏發明象數自然之理正義推闡律呂度分之詳八音名義舉其全矣右八音名義書益稷笙鏞以間蔡傳鏞大鐘也周禮春官鐘師掌金奏凡樂事以鐘鼓奏九夏注金謂鐘及鏄鎛師掌金奏之鼓凡祭祀鼓其金奏之樂疏金奏謂奏金金即鐘鏄儀禮大射儀樂入宿縣於阼階東其南笙鐘其南鑮皆南陳西階之西其南鐘其南鑮皆南陳爾雅釋樂大鐘謂之鏞其中謂之剽小者謂之棧注此别鐘大小之名也世本云垂作鐘釋名曰鐘空也内空受氣多其大者名鏞李巡曰大鐘音聲大鏞大也孫炎曰鏞深長之聲又名鑮大射禮云其南鑮鄭云鑮如鐘而大是也其不大不小者多剽孫炎曰剽者聲輕疾也李廵云其中㣲小故曰剽剽小也其小者名棧李巡云棧淺也東晋元興年㑹稽剡縣人家井中得一鐘長三寸口徑四寸上有銘古文云棧鍾之小者既長三寸自然淺也蕙田案此從鄭氏以鑮為大鐘未是國語周語伶州鳩曰細鈞有鐘無鎛昭其大也大鈞有鏄無鐘甚大無鎛鳴其細也陳氏禮書細鈞角徴也大鈞宮商也細必和之以大故有鐘無鎛大必和之以細故有鎛無鐘則鎛小鐘耳韋昭釋國語杜預釋左傳皆以鎛為小鐘晋語曰鄭伯嘉納女樂及寳鎛左氏曰鄭伯嘉納魯之寳鐘又曰鄭人賂晋侯歌鐘二肆及其鎛磬杜氏謂鎛小鐘也特康成曰鎛如鐘而大孫炎許慎沈約之徒亦以為大鎛然爾雅大鐘謂之鏞不謂之鎛又儀禮鎛從薄與錢鎛之鎛同則鎛為小鐘之説於理或然白虎通鐘兑音也鐘之為言動也隂氣用事萬物動成鐘為氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡與昌正相廹故謂之鎛風俗通案世本垂作鐘秋分之音也蕙田案以上鏞鐘鑮大小異名周禮磬師掌教擊編鐘陳氏禮書磬亦編於鐘言之者鐘有不編不編者鐘師擊之然則所謂不編者十二辰零鐘也豈惟十二零鐘哉堂上一磬一鐘蓋亦不編陳氏樂書編鐘十二同在一虡為一堵鐘磬各一堵為肆春秋傳歌鐘二肆則四堵也小胥之職凡縣鐘磬半為堵全為肆是鐘磬皆在所編矣磬師掌教擊磬擊編鐘於鐘言編則磬可知明堂位曰叔之離磬編則雜離則特謂之離磬則特縣之磬非編磬也言磬如此則鐘可知也荀卿言縣一鐘大戴禮言編縣一言特縣鐘磬如此則編鐘編磬亦可知矣蕙田案以上編鐘周禮考工記鳬氏為鐘兩欒謂之銑注銑鐘口兩角謂疏欒銑一物俱鐘兩角古之樂器應律之鐘狀如今之鈴不圜故有兩角也鄭氏諤曰鐘之制有鎛有鏞有編鐘編鐘十六枚而在一虡小胥正其位磬師教其擊者也鏞則當十二辰之鐘者也所謂笙鏞以間而典同辨其聲者也此鳬氏言大鐘之制所謂鏞也旁有兩欒正有兩面面皆有帶銑間謂之于于上謂之鼔鼔上謂之鉦鉦上謂之舞注此四名者鐘體也鄭司農云于鐘脣之上袪也鼔所擊處鄭氏諤曰脣之厚形褰袪然為于記曰易則易于則于鐘磬之發欲其緩故謂之于鼔之上聲之所止之處曰鉦鉦之上曰舞惟舞者之舞蹈履有節葢或作或止于是而節舞上謂之甬甬上謂之衡注此二名者鐘柄鄭氏諤曰甬如甬道之甬甬上謂之衡者橫在甬上平正不欹故名衡鐘縣謂之旋旋蟲謂之幹注旋屬鐘柄所以縣之也鄭司農云旋蟲者旋以蟲為飾也𤣥謂今時旋有蹲熊盤龍辟邪邪疏後鄭舉漢法鍾旋之上以銅篆為蹲熊及盤龍辟辟邪亦獸名古法亦當然也鄭氏諤曰其形如環有盤旋之義于旋之上為蟲形以飾之其名曰幹則有正固之義鐘帶謂之篆篆間謂之枚枚謂之景注帶所以介其名也介在于鼓鉦舞甬衡之間凡四鄭司農云枚鐘乳也𤣥謂今時鐘乳俠鼓與舞毎處有九面三十六鄭氏諤曰帶如衣之帶然所以介而辨之其介凡四其名曰篆篆如篆刻之篆篆間四處每處有乳各九四九三十六凡鍾有乳三十六枚别無可數故名之曰枚枚謂之景者日之光謂之景蕙田案乳圓有光故曰景于上之攠謂之隧注攠所擊之處攠弊也隧在鼔中窐而生光有似夫隧鄭氏諤曰隧如隧道之隧隧而深也本造鐘之時必窐其形故謂之隧十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞脩去二分以為舞廣注此言鉦之徑居銑徑之八而銑間與鉦之徑相應鼔間又居銑徑之六與舞脩相應舞脩舞徑也舞上下促以橫為脩從為廣舞廣四分今亦去徑之二分以為之間則舞間之方恒居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四此鍾口十者其長十六也鍾之大數以律為度廣長與圓徑假設之耳其鑄之則各隨其鍾之制為長短大小也凡言間者亦為從篆以介之鉦間亦當六今時鍾或無鉦間以其鉦之長為之甬長注并衡數也為疏知并衡數以其衡不言其長又以鉦長六甬長太長不類故并衡數也以其甬長為之圍參分其圍去一以為衡圍注衡居甬上又小疏自兩欒以上至甬皆下寛上狹衡又在甬上故宜小于甬一分故三分去一為衡也參分其甬長二在上一在下以設其旋注令衡居一分則參分旋亦二在上一在下以旋當甬之中央是其正甬疏上文惟以其鉦之長為甬長并衡數則未知衡與長短之定故云令衡居一分假令三分甬居二衡居一一則於甬中央下有一分上通衡有二分故云令衡居一分則三分旋亦二在上一在下以旋當甬之中央是其正正謂上有二分下有一分也薄厚之所震動清濁之所由出侈弇之所由興有説注説猶意也故書侈作移鄭司農云當為侈疏此鐘厚薄之所震動由鐘體薄厚出聲震動有石有播也云清濁之所由出者清濁據聲亦由鐘之厚薄云侈弇之所由興者由鐘口侈弇所興之聲亦有柞有鬰于此略言其意言有意者即下文已厚已薄不得所之意是也鐘已厚則石注大厚則聲不發已薄則播注大薄則聲散侈則柞注柞讀如咋咋然之咋聲大外也弇則鬰注聲不舒揚長甬則震注鐘掉則聲不正是故大鐘十分其鼔間以其一為之厚小鐘十分其鉦間以其一為之厚注言若此則不石不播鐘大而短則其聲疾而短聞注淺則躁躁而竭也鐘小而長則其聲舒而逺聞注深則安安難息為遂六分其厚以其一為之深而圜之注厚鐘厚深謂窐之也其窐圜故書圜作圍杜子春云當為圜已疏此遂謂所擊之處初鑄作之時即深而圜以擬撃也陳氏禮書典同凡為樂器以十有二律為之度數單穆公曰先王之制鐘也大不出鈞重不過石律度量衡於是乎生則樂器待律然後制而律度又待鐘然後生故有十二辰之鐘以應十二月之律十二月之鐘大鐘也大鐘特縣詩書爾雅所謂鏞是也非十二辰之鐘則編焉周禮所謂編鐘是也鐘體之别五銑于鼓鉦舞是也鐘柄之别二甬衡是也衡上有旋旋飾有蟲介於于鼔鉦舞之間有帶布於帶間有枚先儒謂銑金之澤者又曰銑小也鐘欒亦謂之銑以其類然也于則銑間之曲袪者也鼓則于上之待枷者也鉦則鼔舞之正中者也舞則聲之震動於此者也甬出舞上者也衡橫甬上者也帶類篆故謂之篆乳有數故謂之枚然鐘之長短徑圍經無明證其言十分其銑去二以為鉦以其鉦為之銑間者鉦體之徑居銑間之八也去鉦二分以為之鼓間者鼓間之徑居銑間之六也以其鼓間為之舞脩脩舞之徑也舞徑亦居銑間之四也舞長四而徑間亦四舞鼓徑六而長亦六鄭氏以為此鐘口十其長十六也凡樂器以十有二律為之度數若黃鍾之律九寸十六之而銑取其十以為度則銑徑五寸有竒鉦鼓舞之所居者遞去二分則舞脩三寸有竒舞廣二寸有竒林鍾之律六寸十六之而銑取其十以為度則銑徑三寸有竒鉦鼓舞之居者遞去二分則舞修二寸有竒舞廣一寸有竒餘律之鐘亦然賈公彦曰律各倍半以為鐘舉一端也大鐘十分其鼓間以其一為之厚小鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚葢鉦體居銑之六與鼓間同鉦間又殺矣與鼓間異此所以各十分之以為厚薄鄭氏曰鼓鉦之間同方六而今宜異又十分之一猶太厚皆非也若言鼔外鉦外則近之鼓外二鉦外一以謂鼓外二間鉦外一間而十分之以其一為厚薄其説誤矣鳬氏曰以其鉦之正為之甬以其甬長為之圍三分其圍去一以為衡圍三分其甬長二在上一在下以設其旋聶氏崇義三禮圖律厯志云以律各倍半而為鍾黃鍾管長九寸其為鍾也高二尺二寸半厚八分兩欒之間一尺四寸十六分分之十鉦之下帶橫徑一尺一寸二分十六分分之八鼓間方八寸四分十六分分之六舞間方舞之四橫徑八寸四分十六分分之六舞廣徑五寸六分十六分分之四鍾乳謂之枚亦謂之景一物而三名俠鼓與舞皆在帶篆之間毎處有九甬長五寸六分餘愽三寸厚一寸六分餘衡長二寸八分餘博一寸八分厚與甬同其甬衡共長八寸四分十六分分之六孟子高子曰禹之聲尚文王之聲孟子曰何以言之曰以追蠡朱注追鐘紐也蠡者齧木蟲也周禮考工記六分其金而鉤居一謂之鐘鼎之齊蕙田案以上鐘制度禮記明堂位垂之和鐘陳氏樂書禮器曰内金示和也郊特牲曰以鐘次之以和居參之也蓋鐘之為樂過則聲淫中則聲和和鐘者一適厚薄侈弇小大長短之齊以合六律六同之和而已周禮春官典同凡聲高聲䃂正聲緩下聲肆陂聲散險聲斂逹聲贏㣲聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石注高鐘形大上上大也高則聲上藏衮然旋如裏正謂上下直正則聲緩無所動下謂鍾形大下下大也下則聲出去放肆陂讀為險陂之陂陂謂偏侈陂則聲離散也險謂偏弇也險則聲斂不越也逹謂其形㣲大也逹則聲有餘若大放也㣲謂其形㣲小也韽讀為飛鉆湟韽之韽韽聲小不成也回謂其形微圜也回則其聲淫衍無鴻殺也侈謂中央約也侈則聲迫筰出去疾也弇謂中央寛也弇則聲鬰勃不出也甄讀為甄燿之甄甄猶掉也鐘㣲薄則聲掉鐘大厚則如石叩之無聲疏此十二種竝是鐘之病此職掌十二律之鐘是十二辰之零鍾非編者直言病鍾者欲見除此病外即是鐘之善者李氏光地曰䃂其聲鏗然清也韽暗也筰暴疾也弇如弇蓋不舒也甄讀如震掉也高謂聲高也高則鏗鎗正謂聲平正也正則和緩下謂聲下也下則𢎞肆此三者聲之正也其餘則皆聲之病也然其諸病亦由三者推之陂險皆正之反陂者聲不正也險者聲不平也不正則聲不根於内而散不平則氣不逹於外而斂此二者正聲所以失之原也大高而四逹其過則盈溢太下而沈微或紆回其失則暗昧而衍餘逹之甚而侈放則暴疾而不蓄回之甚而弇掩則鬱抑而不舒高而薄則至於掉而不收下而厚則至於如石而無韻二者幾於不成聲矣此七者皆高下之過必去其病然後清濁適均可與正聲相宣而諧和也案鄭氏專指鐘之一器而言其理葢亦相通然所謂高下陂險逹㣲之類皆以鐘形為説則字義多有難解且於下文凡為樂器與和樂之義為不合耳蕙田案此典同十二聲所以齊量樂器不專指鐘而鐘器之大者當亦在内也李氏之説是春秋昭公二十一年左氏傳周景王將鑄無射注無射鍾名律中無射伶州鳩曰夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鍾之注鍾聚也輿以行之注樂須音而行小者不窕注窕細不滿大者不摦注横大不入則和於物物和則嘉成故和聲入於耳而感於心心億則樂窕則不感注不充滿人心摦則不容注心不堪容國語周語景王将鑄無射而為之大林注賈侍中云無射鐘名律中無射也大林無射之覆也作無射而為大林以覆之其律中林鍾也或説云鑄無射而加以林鍾之數益之昭謂下言細抑大林又曰聽聲越逺如此則賈言無射有覆近之矣單穆公曰不可夫鍾不過以動聲注動聲謂合樂以金奏而八音從之若無射有林耳不及也注若無射復有大林以覆之無射陽聲之細者林鍾陰聲之大者細抑大陵故耳不能聽及也夫鍾聲以為耳也耳所不及非鍾聲也注非法鍾之聲也猶目所不見不可以為目也夫目之察度也不過步武尺寸之間其察色也不過墨文尋常之間耳之察龢也在清濁之間注清濁律呂之變也黄鍾為宫則濁大呂為角則清其察清濁也不過一人之所勝注勝舉也是故先王之制鍾也大不出鈞重不過石注鈞所以鈞音之發也以木長七尺有絃繫之以為鈞法百二十斤為石律度量衡於是乎生小大器用於是乎出故聖人慎之春秋襄公十九年左氏傳季武子以所得於齊之兵作林鍾而銘魯功焉注林鍾律名鑄鍾聲應林鍾因以為名定公四年左氏傳分康叔以大呂注鍾名林疏周鑄無射魯鑄鍾皆以律名名鍾知此大呂姑洗皆鍾名也其聲與此律相應故以律名焉分唐叔以姑洗注鍾名陳氏禮書唐時岑陽耕者得古鍾高尺餘楊枚叩之曰此姑洗角也既劀拭有刻有兩欒果然尚書大傳天子左五鍾右五鍾天子将出則撞黃鍾右五鍾皆應入則撞蕤賔左五鍾皆應注六律為陽六呂為陰凡律呂十二各一鍾呂氏春秋黃帝又命伶倫與榮猨鑄十二鍾以和五音以施英韶黃鍾生林鍾林鍾生太蔟太蔟生南呂南呂生姑洗姑洗生應鍾應鍾生蕤賔蕤賔生大呂大呂生夷則夷則生夾鍾夾鍾生無射無射生仲呂三分所生益之一分以上生三分所生去其一分以下生黃鍾大呂太簇夾鍾姑洗仲呂蕤賔為上林鍾夷則南呂無射應鍾為下李氏光地曰古人造律之後又鑄鍾以象其聲國語所謂度律均鍾是也呉氏曰黃鍾林鍾以下皆鍾名也十二鍾之聲由律而起十二律之名則由鍾而得也禮記樂記鐘聲鏗鏗以立號考律緒言呉氏鼎曰古人論樂必謂之鍾律而十有二律以鍾名者四是律以鍾為重也周禮考工記鳬氏為鍾厚薄清濁侈弇各有度春官大司樂有圜鍾有函鍾典同凡爲樂器以十有二律為之數度以十有二聲為之齊量疏樂器謂鍾也呂氏春秋黃帝命伶倫鑄十二鍾春秋左氏傳定四年子魚曰成王分康叔以大呂唐叔以姑洗國語周景王二十三年鑄無射而為之大林左傳襄十九年季武子以所得於齊之兵作林鍾而銘魯功史記樂毅書大吕陳于元英索隱曰齊鍾名左傳襄十一年鄭賂晋以歌鍾二肆注縣鍾十六為一肆二肆三十二枚案此三代以上鍾必案律之證也漢郊祀志以六律六鍾大合樂靈帝紀中平三年二月鑄黄鍾魏都賦注魏四年丙申五月作蕤賔鍾無射鍾隋志晉及宋齊宫懸有四鎛鍾黃鍾太蔟姑洗蕤賔梁武帝以為六律不具設十二鎛鍾各依辰位而應其律唐書樂志隋用黄鍾一宫惟擊七鍾五鍾設而不擊謂之啞鍾髙祖命祖孝孫張文收吹調五鍾叩之而應由是十二鍾皆用孝孫又以十二月旋相為宮六十調八十四聲文獻通考周世宗顯徳六年王朴疏言唐太宗用祖孝孫張文收考正雅樂而旋宫八十四調復見於時安史黃巢之餘工器俱盡購募不獲文記亦亡太常博士殷盈孫案周官考工記之文鏄鍾十二編鍾二百四十今之在縣者是也雖有樂器之狀殊無相應之和梁唐晉漢未暇及于禮樂十二鎛鍾不問聲律但循環而擊黃鍾之調亦不和備八十四調于是冺滅宋景祐中太常鍾磬每十六枚為一虡而四清聲相承不擊李照言四清乃鄭衛之樂請于編垂中去四清鍾馮元等駁之帝令權用十二為一格皇祐中王堯臣等言律呂旋宮之法既定以管又制十二鍾準為十二正聲準正聲之半以為十二子聲故有正聲子聲各十二鍾子聲即清聲也求聲之法本之于鍾故國語所謂度律均鍾者也今太常鍾懸十六者舊傳正聲之外有黃鍾至夾鍾四清聲雖于圖典未明所出然考之實有義趣蓋自夷則至應鍾四律為均之時若盡用正聲則宮輕而商重縁宮聲以下不容更有濁聲一均之中宮弱商強是謂陵僣故須用子聲乃得長短相敘自角而下亦循前法故夷則為宮則黃鍾為角南呂為宮則大呂為角無射為宮則黃鍾為商太蔟為角應鍾為宮則大呂為商夾鍾為角蓋黃鍾大呂太蔟夾鍾正律俱長並當用清聲如此則音律相諧而無所抗此四清鍾可用之騐也元豐三年劉㡬言古編鍾磬數皆十六十二律之外有四清聲也李照議樂不復考擊全失古法乞依古法具四清聲從之案此漢唐以来鍾律沿革之原委也律學失傳鍾虡非古雖唐祖孝孫旋宫六十調八十四聲之制已不復傳十二鏄鍾環擊而不問音律編鍾四清聲見周禮鄭注左傳杜注尚為近古而李照去之于景祐之年劉㡬復之于元豐之際枚數僅存亦復聚訟如此何暇與之講和聲求古律哉獨所傳十二律之名號自古及今未有能易之者而其制度大小輕重厚薄侈弇之間攷工雖言之而未詳各律遞差之分通典言子聲之鍾半于正聲正聲之鍾倍于子聲通志言鍾以律計身倍半三分損益上下相生為正聲子聲二十四鍾月令律中太蔟疏云計太蔟之管數倍而更半鑄之為鍾名曰太蔟之鍾唐殷盈孫案鳬氏之法用算法乘除定鍾之輕重大小厚薄其見于文而可考者如此此可知鍾之律即用管律倍與半之法而三分損益以為之差也韓邦竒謂鼔無當于五聲如大鍾亦無當于五聲柷敔亦然皆和樂節樂之器案此所謂大鍾正如上林賦撞千石之鍾立萬石之虡三輔黃圖稱漢高廟鍾重十二萬斤乃後世好大之主侈為之而不合律度者要不聞以之入樂若夫入樂之器如景王大鍾號稱無射則案律而成可知豈得謂大鍾無當于五聲哉律呂正義太古之世制作淳朴中古至聖條理詳明故簫韶九成鳯凰來儀人間可致之祥莫不因大樂之和而畢至迨及三代之世不相沿樂列國紛爭秦焚漢續漸失正傳於兹數千百年而古制尚有存乎今觀祠廟之所懸與古器所存及史志圖書所載鐘之形式有上鋭中腰細而口徑大者有中腰廣口徑小上徑仍小於口徑者有上下一制而中腰獨大者有上徑小口徑大形體直而兩角下垂者有形體渾圓者有形體扁側者有兩欒獨垂者有底口平正者有各種雷紋者有帶篆乳枚者夫鍾之紋與帶枚不過形體之外飾初無預於聲音之高下姑置而不論惟以形體之各種不一者辨之其上鋭中腰細而口徑大者如三才圖㑹之鏞鍾鎛鍾編鍾也其中腰廣口徑小上徑仍小於口徑者如博古圖周山鍾花乳鍾也其上下一制而中腰獨大者如三禮圖編鍾博古圖周齊侯鏄鍾宋公䪫鍾漢環鈕鍾之類也其上徑小口徑大形體直而兩角下垂者如博古圖周大編鍾特鍾蛟篆鍾遲父鍾聘鍾寶和鍾䕫首鍾素帶鍾素篆鍾素乳鍾雷紋鍾之類也其扁側者如博古圖周挾耳鍾螭紋鍾六朝編鍾也其口徑平者如博古圖周鳯鈕鍾也其形體渾圓者乃中古之定制所謂以律計自倍半而有中空容積之度分高徑面冪之相差得體用之兼備者也至于形體扁側與兩欒之下垂者乃後世稽古之書記其器並載以圖繪圖以紙不得體之圜周姑以扁圜合兩弧而為之口面視之不但扁側不圜而且兩角下垂此正鍾之兩欒下垂所由始也然形體圓者周圍擊之其聲皆同形體扁者擊其大面聲必下擊其小面聲必高况兩欒下垂而成兩角口徑不平将何以得渾厚中正之聲韻哉原夫鍾之兩欒或肇自太古立制朴畧全體難於渾鑄但以兩瓣合成用條片錮之令其堅固是以欒之兩邊分之而為銑耳其形體稍扁者亦兩欒合成之所致實非有意於不圜也惟鍾之形體一歸於圜則中腰與上頂下口之大小随制立法無所不可總不越乎中空容積之多寡焉如中腰細而口徑大者不過分徑為三等口徑為最大其次舞廣又其次中腰為最小夫口徑即考工記之所謂銑問也中腰即考工記之所謂鉦也其上頂反大於腰者即考工記之所謂舞也如中腰廣而口徑小者與上下一致而中腰獨大者蓋皆一理形為撱圓獨上下平耳唯此制為最正而聲音鏗然渾厚且無餘音比之中腰細而口徑大者制易而體堅考之通典三禮圖等書所繪編鍾十六枚而懸一虡者亦皆如之今禮部太常所用亦仍此制但形體稍扁耳要而言之鍾之取聲不在於鐫紋設枚之外飾而生於輕重厚薄之實體無與乎大小形容之别異實係乎中空容積之度分其倍半清濁之相資一本之黃鍾律法與律呂同理容積多者聲大容積少者聲小律呂之徑同故於長短損益其容積鍾之形體若依律為大小而又大者厚小者薄則皆比例同聲反不與十二律呂相應是猶管之長者徑大而短者徑小之説矣大扺鍾之形制外體宜同其理猶之律呂管徑之相同也定黃鍾之鍾取其厚薄比騐中容之積以為準則次自大呂以下遞減其容積俾由濁而漸清夫遞減其容則不得不遞增其厚聲之大者其體薄惟體薄則中空大而容受多也聲之細者其體厚惟體厚則中空小而容受少也其理猶之律呂管籥之有長短也今約其法以為制鍾之準亦必本之黃鍾之律先定其中空容積之度分次考其實體之厚薄與夫鈞兩之重輕再較其聲音倍半之所應復度以三分損益之相差而後鍾體之制可言也定其中空容積者何法以黃鍾之積為本倍以五百一十二龠用五百一十二龠者八倍黃鍾之管得聲應黃鍾之律今復八倍之為六十四倍亦應黄鍾之律再八倍之則為五百一十二倍仍應黄鍾之律故以之為鍾之中空積也得積今尺之二百二十寸三百九十九分二百一十一釐五百二十豪為此一鍾之中空容積之度分既得此中空容積乃以黃鍾之長七寸二分九釐為此鍾之内高然編鍾之制中腰大而上下小上下同徑如仍以黃鍾之度為中腰大徑則上下徑所得度分太小而形制不稱惟以大呂之度為中腰大徑則上下徑所得度分適合於宜而形制稱焉大呂之度六寸八分二釐六豪為中腰大徑則面冪得三十六寸六十分二十一釐三十七豪以内高黃鍾之度七寸二分九釐乘之得二百六十六寸八百二十九分五百八十二釐五百九十三豪是為中腰大徑同徑之長圓形體積也此形較之編鍾中空容積為大以此形體積内減五百一十二倍黃鍾之二百二十寸三百九十分二百一十一釐五百二十豪餘四十六寸四百三十分三百七十一釐零七十三豪是為中腰大徑所成長圓形比編鍾中空容積多出之餘分為凹面形之體積也復以此凹面體積三倍之得一百三十九寸二百九十一分一百一十三釐二百二十一豪則成中腰大徑所成長圓形之比上下小徑所成長圓形之較積為圓圜體形矣爰以中腰大徑所成之長圓形積内減去此圓圜體積一百二十七寸五百三十八分四百六十九釐三百七十二豪是為上頂下口小徑同徑之小長圓形焉以内高七寸二分九釐除之得一十七寸四十九分四十九釐八十八豪即上下小徑同徑長圓形之面冪以之求徑得四寸七分一釐九豪乃上頂下口之同徑也攷其實體之厚薄與夫鈞兩之重輕者何一則以黃鍾之積較其體一則以黃鍾之容黍較其重或自體而得其重或因重而成其體務使二者合一始為立法之宻以黃鍾之積較其體者法黃鍾之龠六十四為之實用六十四者八八之數也得積今尺之二十七寸五百四十九分九百零一釐四百四十豪為此鍾實體之總積以内高除中空容積得上下相均長圓形之内徑面冪三十寸二十三分三十釐八十八豪以之求徑得六寸二分零四豪復以此徑求周得一十九寸四分九釐一豪仍以高乘周得一百四十二寸零九分一十五釐七十七豪即為此鍾之内皮面積以之加於内徑面冪得一百七十二寸三十二分四十六釐六十五豪乃此鍾内皮之總面積以此總面積而除實體之總積得一分五釐九豪八絲是為此鍾之體厚以之加於内高得七寸四分四釐九豪為此鍾之外高以體厚倍之加於中腰大徑得七寸一分四釐六豪加於上下徑得五寸零三釐九豪是為此鍾之中腰上下外徑之數也以黃鍾之容黍較其重者此鍾之實體乃六十四倍黃鍾之積為二十七寸五百四十九分九百零一釐四百四十豪既有體積而其鈞兩因之而生矣以此實積用制鍾之三合銅每正方寸為今之銖兩七兩八錢二分之數乘之得二百一十五兩四錢有餘歸盡其奇為二百一十六兩以每斤十六兩分之得一十三斤八兩為此鍾實體之重數也或以黃鍾容黍千二百之重今之銖兩為二錢五分以分此鍾實體之二百一十六兩得八百六十四龠是此一鍾之重得黃鍾之八百六十四龠也既有重而其實體之度分亦可因之而生矣如不用黃鍾之積較其體而以黃鍾八百六十四龠之重反求其實體積而以内周面冪之總面積分之亦得此鍾之體厚一分五釐九豪八絲此所以自體而得其重自重而得其體二法同歸於一致乃為成始而成終也較其聲音倍半之所應者何既定中空容積之度分又得實體重輕之銖兩依制而鑄一體審其音正應黃鍾之律復制倍體以較其聲此倍體非中空容積之倍乃實體重輕厚薄之倍其形模外範初未嘗異制也於焉以此鍾之厚一分五釐九豪八絲倍之為三分一釐九豪六絲外形一仍其制獨内徑與内高減其分焉如以此鍾之重倍之為四百三十兩零八錢得斤二十六斤餘一十四兩八錢此正國語大不出鈞重不過石之説也以此斤兩反求其積得五十五寸八十九分五百一十四釐以正體中空容積所成上下相均長圓形徑六寸二分零四豪内減去倍體多出兩邊厚分三分一釐九豪六絲餘五寸八分八釐四豪四絲是為倍體中空容積所成上下相均長圓形之徑以此徑求得面冪加以内周内皮之面積得内皮總積一百五十九寸零一分六十二釐以除實體倍積之五十五寸八十九分五百一十四釐得三分四釐六豪比之所倍之厚大二釐六豪蓋因體圓愈内而積漸厚之故斯又權度加倍之尤當詳審者也依此倍體而制一鍾審其音亦應黃鍾之律夫律呂管音黃鍾之半雖為清聲乃不應黃鍾之清而下應倍無射之清是體雖為清而聲未得本律之清也今鍾正體之應黃鍾律者倍體雖為清聲恰亦應黃鍾之律而為黃鍾之清此與律呂管音正黃鍾之半不應黃鍾之清而應倍無射之清遞下一音之理為不同矣管律之正為濁而半為清體雖為清而聲不得本律之清鍾律之正為濁而倍反為清體既為清而聲又得本鍾律之清倍半之為用也不同而清濁生聲之理亦異斯又管律鍾律之宜晰者矣此正國語重者從細輕者從大之説也度以三分損益之相差者何既得正體與倍體其間十二聲音之準一取法乎此以斤兩之重輕而三分損益之則自倍體而漸減至正體或正體而漸加至倍體以度分之厚薄而損益之則自厚體而漸損至薄體或自薄體而漸益至厚體總之不越三分損益之理焉法以倍體為損益之原所得十有二分其第十三分之度上生則不及倍體下生則不及正體即如仲呂還生不及黃鍾之理其取各分為各鍾之度者則自正體遞取其漸厚者而為應鍾之準焉是以倍體正體俱應黃鍾之律宮聲工字其自倍體所得第十二分即比正體差厚微重乃應大呂之呂清宮高工字其第十一分則應太蔟之律商聲凡字第十分應夾鍾之呂清商高凡字第九分應姑洗之律角聲六字第八分應仲呂之呂清角高六字第七分應蕤賔之律變徴五字其第六分乃應夷則之律徵聲乙字而變體所生之第十二分則在倍體所生第七分第六分之間其聲始應林鍾之呂清變徴高五字倍體所生第五分則應南呂之呂清徴高乙字第四分應無射之律羽聲上字第三分應應鍾之呂清羽高上字第二分應半黃鍾之律變宮尺字而倍體所生之第十三分為變體者乃應半大呂之呂清變宮高尺字至此清濁二均之一十四聲已具然編鍾一十有六取下羽至正羽之陰陽合八而用應二倍律二倍呂之四體故取倍體所生第二第三第四與第十三變體之半聲而倍體所生之第二與第十三之變體不用所用者倍體所生之第三第四以至第十二合黃鍾之一正體變體所生之第十二與四半體共為一十有六以應排簫之陰陽二均焉倍體所生之第四分半之應倍夷則之律下羽上字第三分半之應倍南呂之呂清下羽高上字第二分半之應倍無射之律變宮尺字第十三分變體半之應倍應鍾之呂清變宮高尺字夫鍾體三分損益之法一如律呂但律呂自長而生短聲由濁而漸清鍾律自厚而生薄聲反自清而漸濁故自正體計之實自薄而漸厚亦由濁而漸清也是故編鍾之一十有六外形皆同一制其外高皆七寸四分四釐九豪外皮中徑皆七寸一分四釐六豪外上下徑皆五寸零三釐九豪其内高中徑上頂下口之度分與夫中空容積之多寡實體之厚薄斤兩之輕重具詳載其數列表於左俾後世有所依據爰以制器而考聲焉倍夷則之鍾倍者非言鍾之倍體乃聲應倍律倍呂之鍾也故列于黃鍾之前内高七寸三分一釐六豪七絲中徑六寸八分八釐零一絲上頂下口内徑俱四寸七分七釐三豪一絲中容積二百二十五寸一十六分七百五十五釐八百四十豪體厚一分三釐三豪重一百七十九兩七錢倍南呂之鍾内高七寸三分零七豪七絲中徑六寸八分六釐二豪一絲上頂下口内徑俱四寸七分五釐五豪一絲中容積二百二十三寸四百六十分三百一十一釐六百八十豪體厚一分四釐二豪重一百九十二兩倍無射之鍾内高七寸三分零一絲中徑六寸八分四釐六豪九絲上頂下口内徑俱四寸七分三釐九豪九絲中容積二百二十二寸一百五十分二百一十一釐二百豪體厚一分四釐九豪六絲重二百零二兩二錢倍應鍾之鍾内高七寸二分九釐二豪一絲中徑六寸八分三釐零九絲上頂下口内徑俱四寸七分二釐三豪九絲中容積二百二十寸七百七十分二十三釐四十豪體厚一分五釐七豪六絲重二百一十三兩黃鍾之鍾内高七寸二分九釐中徑六寸八分二釐六豪六絲上頂下口内徑俱四寸七分一釐九豪六絲中容積二百二十寸三百九十九分二百一十一釐五百二十豪體厚一分五釐九豪八絲重二百一十六兩大呂之鍾内高七寸二分八釐一豪四絲中徑六寸八分零九豪五絲上頂下口内徑俱四寸七分零二豪五絲中容積二百一十八寸九百二十五分三百四十八釐四百八十豪體厚一分六釐八豪三絲重二百二十七兩五錢太蔟之鍾内高七寸二分七釐二豪四絲中徑六寸七分九釐一豪四絲上頂下口内徑俱四寸六分八釐四豪四絲中容積二百一十七寸三百七十二分六百三十六釐八百豪體厚一分七釐七豪三絲重二百三十九兩七錢夾鍾之鍾内高七寸二分六釐零四絲中徑六寸七分六釐七豪四絲上頂下口内徑俱四寸六分六釐零四絲中容積二百一十五寸二百九十七分三百七十七釐九百二十豪體厚一分八釐九豪三絲重二百五十六兩姑洗之鍾内高七寸二分五釐零二絲中徑六寸七分四釐七豪一絲上頂下口内徑俱四寸六分四釐零一絲中容積二百一十三寸五百五十分五百七十七釐二百八十豪體厚一分九釐九豪五絲重二百六十九兩六錢仲呂之鍾内高七寸二分三釐六豪七絲中徑六寸七分二釐上頂下口内徑俱四寸六分一釐三豪中空積二百一十一寸二百一十五分九百一十一釐四十豪體厚二分一釐三豪重二百八十八兩蕤賔之鍾内高七寸二分二釐五豪三絲中徑六寸六分九釐七豪二絲上頂下口内徑俱四寸五分九釐零二絲中容積二百零九寸二百五十分七百六十釐三百二十豪體厚二分二釐四豪四絲重三百零三兩四錢林鍾之鍾内高七寸二分一釐六豪五絲中徑六寸六分七釐九豪六絲上頂下口内徑俱四寸五分七釐二豪六絲中容積二百零七寸七百二十九分二百零八釐八百八十八豪體厚二分三釐三豪二絲重二百一十五兩三錢夷則之鍾内高七寸二分一釐三豪三絲中徑六寸六分七釐三豪二絲上頂下口内徑俱四寸五分六釐六豪二絲中容積二百零七寸一百八十分四百七十八釐八十豪體厚二分三釐六豪四絲重三百一十九兩六錢南呂之鍾内高七寸一分九釐七豪二絲中徑六寸六分四釐一豪一絲上頂下口内徑俱四寸五分三釐四豪一絲中容積二百零四寸四百一十三分四百六十六釐二百四十豪體厚二分五釐二豪五絲重三百四十一兩三錢無射之鍾内高七寸一分八釐三豪七絲中徑六寸六分一釐四豪一絲上頂下口内徑俱四寸五分零七豪一絲中容積二百零二寸八十四分三百九十八釐七百二十豪體厚二分六釐六豪重三百五十九兩五錢應鍾之鍾内高七寸一分六釐五豪七絲中徑六寸五分七釐八豪上頂下口内徑俱四寸四分七釐一豪中容積一百九十八寸九百七十一分五百一十釐四百豪體厚二分八釐四豪重三百八十四兩蕙田案以上鐘律周禮地官鼔人以金錞和鼔注錞錞于也圜如碓頭大上小下樂作鳴之與鼔相和金疏謂作樂之時此錞和于鼓節也項氏安世曰四金惟金錞用于樂餘皆軍事此以大小序錞大于鐲其形圓鐲小如鐘鐲無舌鐸有舌春官小師掌六樂聲音之節與其和注和錞于陳氏禮書周禮小師掌六樂之聲節與其和鄭氏曰和即錞于也鼓人掌教六鼔四金之音聲以節聲樂以和軍旅以正田役以金錞和鼔以金鐲節鼓以金鐃止鼔以金鐸通鼓葢錞聲淳鐲聲濁鐃聲高鐸聲明聲淳則有所合故於鼓唱而和之聲濁則有所制故於鼔行而節之聲高則有所辨故於鼔退而止之聲明則有所交故於鼓作而通之攷之于禮大司馬中春教振旅王及諸侯軍将師帥皆鼔卒長執鐃兩司馬執鐸公司馬執鐲中冬教大閲鼓人三鼓司馬振鐸車徒皆作鼔行鳴鐲車徒皆行三鼓摝鐸車徒皆坐又三鼓振鐸乃止如初乃鼓車馳徒步徒三戒車三發徒三刺乃鼓退鳴鐃且卻遂以狩田是鐸之於鼓所以通之於其中及其退也去鐲而鳴鐃錞之於兵雖無經見國語曰戰以錞于丁寧儆其民也又黃池之㑹吴王親鳴鐘鼓丁寧錞于振鐸則兵法固用錞矣春秋傳曰有鐘鼓曰伐則古之用兵葢亦有鐘矣鄭康成曰錞圜如碓頭上大下小樂作鳴之與鼓相應漢大予樂有之杜祐曰錞于古禮器也宋時廣漢什邡人叚祖以錞于獻始興王鑑其制髙三尺六寸圍二尺四寸圜如筩也色黒甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水于下以芒當心跪注錞于以手震芒則其聲如雷後周平蜀得之斛斯徴觀曰錞于也唐李仲樂圖縣以龍格今太常作伏虎于其上若武舞入則兩工對舉一人隨撞之其縣以虡則設于熊羆案十二枚鳴以和鼔陳氏樂書周官小師掌六樂聲音之節與其和鼓人掌六鼓四金之音聲以金錞和鼓自金聲之淳言之謂之錞自和鼔之倡言之謂之和其實一也葢其形象鐘頂大腹􅰐口弇上以伏獸為鼻内懸子鈴銅舌凡作樂振而鳴之與鼔相和後周平蜀獲其器太常卿斛斯證觀曰錞于也以芒筒捋之其聲極振乃取以合樂焉國語曰戰以錞于儆其民也又黃池之㑹呉王親鳴鍾鼓錞于振鐸則錞之和鼓以節聲樂和軍旅其來尚矣後世之制或為兩馬或為蛟龍之状引舞用焉非周制也蕙田案以上金錞周禮地官鼓人以金鐲節鼓注鐲鉦也形如小鍾軍行鳴之以為鼓節司馬職曰軍行鳴鐲陳氏禮書鼓人以金鐲節鼔司馬職公司馬執鐲軍行鳴鐲詩曰鉦人伐鼔國語曰鼔丁寧春秋傳曰射汰輈而著于丁寧説文曰鐲鉦也韋昭曰丁寧鉦也然則鉦也丁寧也皆鐲之異名陳氏樂書自其聲濁言之謂之鐲自其儆人言之謂之丁寧自其正人言之謂之鉦其實一也蕙田案以上金鐲以金鐃止鼓注鐃如鈴無舌有秉執而鳴之以止撃鼓司馬職曰鳴鐃且却聶氏三禮圖樂記曰復亂以武復謂反復也亂理也武謂金鐃也謂舞畢之時舞人必反復鳴此金鐃而治理之欲退之時亦擊此金鐃以限之陳氏禮書説文曰鉦鐃也鐃小鉦也似鈴柄中上下通樂記曰始奏以文則登歌清廟之類也復亂以武則下管象之類也鄭氏以文為鼓武為鐃豈其然乎陳氏樂書大司馬卒長執鐃以其聲譊譊然故以鐃名之漢鼓吹曲有鐃歌所以退武舞也豈亦周之遺制歟葢其小者似鈴有柄無舌執而鳴之以止鼔大者象鍾形薄旁有二十四銑宮縣用之飾以流蘓葢應律音而和樂也蕙田案以上金鐃以金鐸通鼓注鐸大鈴也振之以通鼓司馬職曰司馬振鐸聶氏三禮圖樂記曰天子夾振之注云王與大将夾舞者振鐸以為節也陳氏禮書司馬職曰兩司馬執鐸又曰三鼔摝鐸三鼓振鐸司馬法曰鼓聲不過閶鼙聲不過閶鐸聲不過琅鄭康成許慎皆曰鐸大鈴也葢鐸有金鐸木鐸金鐸舌以金木鐸舌以木金鐸振武事若司馬之振鐸摝鐸揜上振之謂之摝黃池之㑹官師振鐸是也木鐸振文事若書禮所言狥以木鐸是也樂記曰天子夾振之鄭氏謂王與大将夾舞者振鐸以為節鐸雖用之於樂然非王與大将振之也晉荀氏得趙人牛鐸然後能諧樂則古人之為鐸鐲鐃錞施於聲律皆有當也今大樂有二種鐸以道武舞木為柄者謂之單頭鐸金為柄而兩鐸相屬者謂之雙頭鐸非古也蕙田案以上金鐸陳氏禮書鐸鳴自内鍾鳴自外先儒謂撞鍾必以濡木以其兩堅不能相和也或曰海中有巨魚曰鯨巨獸曰蒲牢蒲牢畏鯨撃鯨則蒲牢大鳴後世繇是作蒲牢於鍾上而状鯨魚以撞之欲其大鳴張衡東京賦曰發鯨魚鏗華鍾是也然經無明文其制不可以考蕙田案此條論撞木右金音之屬五禮通考卷七十四
