body:
  text: 五禮通考卷一百七十三刑部尚書秦蕙田撰嘉禮四十六學禮蕙田案三代以上自王子公卿大夫士之子國之俊造及曲藝之士無不養之於學校之中待其學成而任之必官故其時選舉與學校不分兩事無所謂科目之名也後代取士之法或出於薦舉或出於科目其所得之士不必由學校起家而學校所升選者如漢之博士弟子宋之上舍出身人才反不如科目之盛惟前明科舉之制凡應鄉試者非國子監生及郡縣學生不得與故當時進士一科資格最高要皆學校所儲之士較之唐宋之世士子皆得投牒自進者立法獨為盡善矣今採輯周官鄉舉里選之法而歷代取士之制亦撮其大綱以著於篇若夫雜流仕進固非一途要與興賢之義無涉可無録焉周禮地官鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之注賢者有德行者能者有道藝者衆寡謂鄉人之善者無多少也鄭司農云興賢者謂若今舉孝亷興能者謂若今舉茂才賔敬也敬所舉賢者能者玄謂變舉言興者謂合衆而尊寵之以鄉飲酒之禮禮而賔之疏三年一閏天道小成則大案比當鄉之內云考其德行道藝者德行謂六德六行道藝謂六藝云而興賢者則德行之人也能者則道藝之人也云鄉老及鄉大夫帥其吏者謂州長以下云與其衆寡者謂鄉中有賢者皆集在庠學云以禮禮賔之者以用也用鄉飲酒之禮以禮賢者能者賔客舉之云賢者有德行者欲見賢與德行為一在身為德施之為行內外兼備即為賢者也云能者有道藝者鄭亦見道藝與能為一上注云能者政令行其身有道藝則政教可行是能者也云衆寡謂鄉人之善者無多少也者案鄉飲酒堂上堂下皆有衆賔不言其數此經衆寡兩言無問多少皆來觀禮故云無多少也鄭司農云若今舉孝亷及茂才者孝悌亷潔人之德行故以孝亷況賢者茂才則秀才也才人之技藝故以況能者也玄謂變舉言興者案禮記文王世子云或以事舉或以言揚故今貢人皆稱舉今變舉言興云謂合衆而尊寵之者合衆即此經云鄉老及鄉大夫已下是也云鄉飲酒之禮者則儀禮篇飲酒賔舉之法是也厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府內史二之注厥其也其賔之明日也獻猶進也王拜受之重得賢者王上其書于天府天府掌祖廟之寶藏者內史副寫其書者當詔王爵祿之時疏厥明者謂今日行鄉飲酒之禮至其明日表奏於王云天府掌阻廟之寶藏者春官天府職文引之者欲見天府掌寶物賢能之書亦是寶物故藏于天府云內史副寫其書者二副也內史副寫一通文書擬授爵祿案內史職有策命諸侯羣臣之事故使內史二之退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞注以用也行鄉射之禮而以五物詢于衆民鄭司農云詢謀也問於衆庶寧復有賢能者和謂閨門之內行也容謂容貌也主皮謂善射射所以觀士也故書舞為無杜子春讀和容為和頌謂能為樂也無讀為舞謂能為六舞玄謂和載六德容包六行也庶民無射禮因田獵分禽則有主皮主皮者張皮射之無侯也主皮和容興舞則六藝之射與禮樂與當射之時民必觀焉因詢之也此謂使民興賢出使長之使民興能入使治之注言是乃所謂使民自舉賢者因出之而使之長民教以德行道藝于外也使民自舉能者因入之而使之治民之貢賦田役之事於內也言為政以順民為本也書曰天聰明自我民聰明天明威自我民明威老子曰聖人無常心以百姓心為心如是則古今未有遺民而可為治疏言此謂使民興賢者謂上經賔舉者皆民中舉之還使治民出使長之謂使鄉外與民為君長云使民興能入使治之者謂能者復來入鄉中治民之貢賦云使民自舉賢者因出之而使之長民教以德行道藝於外也者以賢者德大故遣出外或為都鄙之主或諸侯皆可也以其自有德行道藝故還使之教民以德行道藝云使民自舉能者因入之而使之治民之貢賦田役之事於內也者以其能者德小不可以為大夫諸侯等故還入鄉中量德大小以為比長鄰長已上之官治民之貢賦田役於內也州長三年大比則大考州里以贊鄉大夫廢興注廢興所廢退所興進也鄭司農云贊助也考疏州長至三年大案比之日則大考州里者謂年年訖至三年則大考之言大考者時有黜陟廢興故也遂大夫各掌其遂之政令三嵗大比則帥其吏而興氓明其有功者屬其地治者注興氓舉民賢者能者如六鄉之為也興猶舉也屬猶聚也又因舉吏治有功者而聚敕其餘以職事者疏云三嵗大比已下若鄉大夫三嵗大比興賢者能其義同變之耳云帥其吏者則遂大夫以下縣正至鄰長云興氓舉民賢者能者如六鄉之為也者鄉大夫以鄉飲酒興賢能者厥明獻賢能之書於王王拜而受之登於天府內史二之此職亦然也當興舉之時因舉治民之吏鄰長以上吏之有功者而升之又聚其地治鄰長以上敕之以職事使之不慢也李氏景齊曰六遂以耕為主遂大夫所掌要不過教民稼穡之事賔興何與焉蓋大司徒以鄉三物教萬民而賔興之繼以施教法於邦國都鄙則教之施於六遂亦可知也田野之中莫非可取之才有遂大夫從而興之固不至老于龕巖深谷之下而不獲進矣蕙田案古者取士於鄉有二法一則由鄉而升司徒由司徒而升大學學成然後用之王制所謂造士是也一則三年大比興其賢能直達於王不復令入國學周禮所謂賔興是也六遂之學與鄉同禮記王制命鄉論秀士升之司徒曰選士注移名於司徒也秀士鄉大夫所考有德行道藝者案疏移名于司徒謂録名進在司徒其身猶在鄉學也鄉大夫云三年則大比考其德行道藝而興賢者能者謂鄉人有能有賢者以鄉飲酒之禮興之獻賢能之書於王名則升於天府身則任以官爵則下文云大樂正論造士之秀者以告於王而升諸司馬曰進士彼據鄉人故三年一舉此據學者故中年考試殷周同也熊氏以為此中年舉者為殷禮鄉大夫三年舉者為周法其義非也司徒論選士之秀者而升之學曰俊士注可使習禮者學大學疏案內則云二十而冠始學禮此俊士年以二十可使習禮此升于學者謂身升于大學非唯升名而已升於司徒者不征於鄉升於學者不征於司徒曰造士注不征不給其繇役造成也能習禮則為成士名疏此繇役者供學及司徒細碎之繇役也選士雖升司徒猶給鄉之繇役以藝業未成俊士身雖升學亦以學未成猶給司徒繇役若其學業既成升諸司徒則不征于鄉升之於學則不征于司徒是謂造成之士陳氏祥道曰司徒大軍旅大田役治其衆庶之政令鄉師辨其可任者國中賢者能者皆舍則征于司徒者惟大軍旅大田役而已升于司徒者鄉師之所舍升于學者又司徒之所舍也大樂正論造士之秀者以造于王而升諸司馬曰進士注移名于司馬司馬夏官卿主邦政者進士可進受爵祿也疏此文承王子公卿大夫之子下似専據王子等其實鄉人入學為造士者亦同于此其鄉人不在學者及邦國所貢之士所貢于王亦當升諸司馬以司馬掌爵祿故知入仕皆司馬主之司馬辨論官材注辨其論官其材觀其所長論進士之賢者以告於王而定其論注各署其所長論定然後官之注使之試守任官然後爵之注命之位定然後祿之有發則命大司徒教士以車甲注乘兵車衣甲之儀有發謂有軍師發卒疏命司徒者以其主衆又主教故使與司馬相參也陳氏禮書秀於一鄉謂之秀士中於所選謂之選士俊士以其德之敏也造士以其材之成也進士以其將進而用之也選士升於司徒而不征於鄉俊士升於學而不征於司徒俊士亦謂造士蓋學至於此材成德敏非可一名命之也傳曰十人曰選百人曰俊此論其大致然也古之六卿其分職也未嘗不通其聮事也未嘗不分司徒掌邦教司馬掌邦政未嘗不分也有發則司徒教士以車甲升造士則司馬辨論官材未嘗不通也周官大司馬之屬司士曰以德詔爵此司馬辨官材之謂也劉氏彞曰古者鄉學教庶人國學教國子鄉學所升曰選士不過用為鄉遂之吏而選用之權在司徒國學所升曰進士則命為朝廷之官而爵祿之權在司焉此鄉學教選之異所以為編户世家之别也然庶人之仕進亦有二道可為選士者司徒試用之一也入國學則論選之法與國子同二也蕙田案選士俊士専主鄉學所升而言進士則國子及鄉之俊造俱在其內文王世子凡語于郊者注語謂論説於郊學學疏郊西郊也周以虞庠為小在西郊天子親視學于西郊而考課論説于西郊之學以西方成就之地故也或遍在四郊必取賢斂才焉或以德進或以事舉或以言揚注大樂正論造士之秀者升諸司馬曰進士謂此矣曲藝皆誓之注曲藝為技能也誓謹也皆使謹習其事以待又語注又語為後復論説也如疏又語謂後復論説之日春待秋時也三而有一焉注三説之中有一善則取之以有曲藝不必盡善乃進其等注進於衆學者疏等輩類也以其序注又以其藝為次謂之郊人逺之注俟事官之缺也以代之逺之者不曰俊選曰郊人賤技藝疏謂之郊人以其猶在郊學也於成均以及取爵於上尊也注天子飲酒於虞庠則郊人亦酌于上尊以相旅尊疏上尊堂上之酒尊凡飲酒之禮尊者酌于堂上之卑者酌于堂下之尊今郊人雖賤亦得酌于堂上尊所以榮之吳氏澄曰鄉學之秀士已升于司徒為選士者于天子視學飲酒之時得取爵於堂上之尊以相酬又升于太學為俊士者則謂之成均之士曲藝雖已進等然猶在郊學未得與國學者齒是逺之於成均并未及與升于司徒者得取爵于上尊也欽定義疏祭祀之上尊以尊神也故旅酬雖賔不得取上尊燕飲之上尊以尊賔也鄉當賔興之時則升于司徒者乃得用上尊豈有天子飲酒于成均而郊人亦取上爵以相酬如鄭氏所説者又此郊是四郊之鄉學先語之而舉其賢者才者而升之矣若醫卜射御有一可取則誓戒之期而考試春秋皆于辨論秀士後行之非春又待秋秋又待春如孔氏説也蕙田案以上國學鄉學所升之士射義古者天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比于禮其節比于樂而中多者得與于祭其容體不比于禮其節不比于樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也注嵗獻獻國事之書及計偕物也三嵗而貢士舊説云大國三人次國二人小國一人疏諸侯嵗獻者謂諸侯每嵗獻國事之書及獻計偕之物于天子也貢士於天子者諸侯三年一貢士於天子也天子試之於射宫者言天子試此所貢之士於射宫之中而中多者得與於祭此謂大射也云三嵗而貢士者以經貢士之文繫嵗獻之下恐每嵗貢士故云三嵗而貢士也知三嵗者案書傳云古者諸侯之於天子也三年一貢士一適謂之好德再適謂之賢賢三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯不云益地者文不具矣書傳又云貢士一不適謂之過注云謂三年時也再不適謂之敖注云謂六年時也三不適謂之誣注云謂九年時也一絀以爵再絀以地三絀而地畢注云凡十五年鄭以此故知三嵗而貢士也漢書食貨志其有秀異者移鄉學于庠序庠序之異者移國學於少學諸侯嵗貢少學之異者于天子學于大學命曰造士行同能偶則别之以射然後爵命焉蕙田案以上諸侯所貢之士亦於諸侯之學論其秀而貢之陳氏傅良曰古者取士先國子次俊造夫國子非但王人之謂也記曰羣后之太子卿大夫元士之適子皆造焉則諸侯子在其中矣今見於經師氏居虎門教國子則宿衛王宫之士庶子宫伯所領者也大司樂成均教國子是謂胄子則常在學者也其餘不常在學特名在學士之版則嵗春秋一合諸學其籍在諸子其教則大胥小胥由此觀之列國之子與在周行者同衛王宫同入成均同隸學士之版於斯取才焉而用之曽何內外之辨傳言魯公之子伯禽衛康叔之子牟齊太公之子伋俱事成王而宣王欲得國子之能訓導諸侯者樊穆仲以魯侯對略可觀矣猶以為未廣也則鄉黨有賔賢邦國有貢士是謂俊造蓋以三百六十官迭來四方之彥而博極一時之選是故天下無遺才而王室亦無世官之弊也右取士漢書高帝本紀十一年詔曰賢士大夫有肯從我遊者吾能尊顯之御史大夫昌下相國相國酇侯下諸侯王遣詣相國府署行義年有而弗言覺免年老癃病勿遣文帝本紀二年十一月晦日有食之詔舉賢良方正能直言極諫者十五年詔諸侯王公卿郡守舉賢良能直言極諫者上親策之傅納以言蕙田案此天子親策士之始景帝本紀後二年詔曰人不患其不富患其無厭也其唯亷士寡欲易足今訾算十以上乃得官應劭曰古者疾吏之貪限訾十算乃得為吏十算十萬也師古曰訾讀與資同亷士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令亷士久失職貪夫長利武帝本紀建元元年詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可元光元年初令郡國舉孝亷各一人元朔元年詔曰朕深詔執事興亷舉孝今或至闔郡而不薦一人是化不下究而積行之君子雍于上聞也二千石官長紀綱人倫將何以佐朕燭幽隱勸元元崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪有司奏議詔書令二千石舉孝亷所以化元元移風易俗也不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可馬氏端臨曰漢時郡國薦舉人材賢良方正與孝亷二科並行然賢良一科文帝與武帝時每對輒百餘人又徴詣公車上書自衒鬻者以千數而孝亷之選文帝之詔以為萬家之縣亡應令者武帝之詔以為闔郡不薦一人蓋賢良則稍有文墨材學者可以充選而孝亷則非有實行可見者不容謬舉故也又曰漢高皇孝武二詔皆為舉賢設也其旨以為人才之遺失咎在公卿之蔽賢至立法以論其罪後世之法嚴謬舉之罰而限其塗轍者則有之矣未有嚴不舉之罰而責以薦揚者也蓋古之稱賢能者皆不求聞達之士而後世之于薦舉者皆巧于奔競之人故法之相反如此國家待士之意固薄而士之不自重深可慨也元狩六年詔遣博士大等六人分循行天下舉獨行之君子徵詣行在所元封五年詔令州郡察吏民有茂材異等可為將相及使絶國者昭帝本紀始元元年遣故廷尉王平等五人持節行郡國舉賢良五年詔令三輔太常舉賢良各二人郡國文學高第各一人六年詔有司問郡國所舉賢良文學民所疾苦元鳯元年賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里宣帝本紀本始元年詔內郡國舉文學高第各一人四年郡國地震詔令三輔太常內郡國舉賢良方正各一人地節三年詔令內郡國舉賢良方正可親民者令郡國舉孝弟有行義聞于鄉里者各一人元康元年詔博士舉吏民厥身修正通文學明于先王之術宣究其意者各二人中二千石各一人四年遣大中大夫強等循行天下舉茂才異倫之士神爵四年令內郡國舉賢良可親民者各一人黃龍元年詔曰舉亷吏誠欲得其真也吏六百石位大夫有罪先請秩祿上通足以效其賢材自今以來毋得舉元帝本紀初元二年二月地震詔丞相御史中二千石舉茂材異等直言極諫之士永光元年詔丞相御史舉質朴敦厚遜讓有行者光祿嵗以此科第郎從官師古曰始令丞相御史舉此四科人以擢用之而見在郎及從官又令光祿每嵗依此科考狡定其第高下二年三月日有蝕之令內郡國舉茂材異等賢良直言之士各一人建昭四年遣諫議大夫博士賞等二十一人循行天下舉茂材特立之士成帝本紀建始元年詔三輔內郡舉賢良方正各一人三年十二月朔日有蝕之詔丞相御史與將軍列侯中二千石及內郡國舉賢良方正能直言極諫之士詣公車河平四年舉惇厚有行能直言之士鴻嘉二年詔舉惇厚有行義能直言者永始三年遣太中大夫嘉等循行天下與部刺史舉惇朴遜讓有行義者各一人元延元年有星孛于東井詔公卿大夫博士議郎以經對與內郡國舉方正能直言極諫者各一人北邉二十二郡舉勇猛知兵法者各一人哀帝本紀建平元年詔大司馬列侯將軍中二千石州牧守相舉考弟惇厚能直言通政事延于側陋可親民者各一人元夀元年正月朔日有蝕之詔公卿大夫將軍列侯中二千石舉賢良方正能直言者各一人平帝本紀元始元年五月朔日有蝕之公卿將軍中二千石舉敦厚能直言者各一人二年舉勇武有節明兵法郡一人詣公車後漢書光武帝本紀建武六年九月晦日有食之敕公卿舉賢良方正各一人七年三月晦日有食之詔公卿司𨽻州牧舉賢良方正各一人遣詣公車漢官目録建武十二年八月乙未詔三公舉茂材各一人亷吏各二人光祿嵗舉茂材四行各一人察亷吏三人中二千石嵗察亷吏各一人廷尉大司農各二人將兵將軍嵗察亷吏各二人監察御史司隸州牧嵗舉茂材各一人後漢書章帝本紀建初元年三月詔曰夫鄉舉里選必纍功勞今刺史守相不明真偽茂材孝亷嵗以百數既非能顯而當授之政事甚亡謂也每尋前世舉人貢士或起􅎌畝不繫閥閲敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人五月初舉孝亷郎中寬博有謀任典城者以補長相五年二月朔日有食之詔公卿以下舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華漢官儀建初元年十二月詔書辟士四科其一曰德行高妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問才任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔令皆存孝悌清公之行自今以後審四科辟召及刺史二千石察舉茂才尤異孝亷吏務實校試以職有非其人不習曺事正舉者故不以實法也後漢書丁鴻傳和帝時大郡口五六十萬舉孝亷二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口嵗舉孝亷一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之和帝本紀永元五年三月詔曰選舉良材為政之本科别行能必由鄉曲而郡國舉吏不加簡擇故先帝明敕在所令試之以職乃得充選又德行尤異不須經職者别署狀上而宣布以來出入九年二千石曽不承奉恣心從好司𨽻刺史訖無糾察今新蒙赦令且復申敕後有犯者顯明其罰六年詔令三公中二千石二千石內郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隱遣詣公車帝親臨策問選補郎吏安帝本紀永初元年三月日有食之詔公卿內外衆官郡國守相舉賢良方正有道術之士明政術達古今能直言極諫者各一人五年三月詔令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術達於政化能直言極諫之士各一人及至孝行與衆卓異者并遣詣公車朕將親覽焉建光元年令公卿特進侯中二千石二千石郡國守相舉有道之士各一人順帝本紀延光四年令郡國守相視事未滿嵗者一切得舉孝亷吏詔公卿郡守國相舉賢良方正能直言極諫之士各一人陽嘉元年初令郡國舉孝亷限年四十以上諸生通章句文吏能箋奏乃得應選其有茂才異行若顔淵子竒不拘年齒左雄傳雄上言郡國孝亷古之貢士出則宰民宣協風教若其面牆則無所施用孔子曰四十而不惑禮稱強仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法文吏課箋奏副之正端門以練虛實以觀異能以美風俗有不承科令者其罪法若有茂才異行自可不拘年齒帝從之文獻通考陽嘉二年張衡言自初舉孝亷迄今二百嵗矣皆先孝行行有餘力始學文法辛卯詔書以能章句奏案為限雖有至孝猶不應科此棄本而取末曽子長于孝然實魯鈍文學不若遊夏政事不若冉季今欲使一人兼之苟外有可觀內必有闕則違選舉孝亷之志矣後漢書黃瓊傳瓊為尚書令以前左雄所上孝亷之選専用儒學文吏於取士之義猶有所遺乃奏增孝悌及能從政者為四科事竟施行范氏蔚宗曰漢初詔舉賢良方正州郡察孝亷秀才斯亦貢士之方也中興以後復增淳朴有道仁賢能直言獨行高節質直清白淳厚之屬榮路既廣觖望難裁自是竊名偽服浸以流競權門貴士請謁煩興自左雄任事限年試才雖頗有不密固亦因時識宜而黃瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駁卒之循名者屈其短算實者挺其效故雄在尚書天下莫敢妄選十餘年間稱為得人斯亦效實之證乎徐氏曰案孝亷之舉始自西都嘗考元朔詔書云深詔執事興亷舉孝今或至闔郡不薦一人其與中二千石禮官博士議不舉者罪有司奏議曰不舉孝不奉詔當以不敬論不察亷不勝任也當免詳觀此文則孝之與亷當是各為一科蕭望之薛宣黃霸張敞等皆以察亷補長丞獨王吉京房師丹孟喜皆以舉孝亷為郎劉輔舉孝亷為襄賁令東都則合為一科矣西都止從郡國奏舉未有試文之事至東都則諸生試家法文吏課箋奏無異於後世科舉之法矣西都未始限年至東都則年四十以上始得察舉矣黃瓊言左雄所上孝亷之選専用儒學文吏於取士之選猶有所遺乃奏增孝悌及能從政者為四科則知當時雖以孝亷名科而未嘗責其孝行亷隅之實是亦失設科之本意也雖然漢世諸科雖以賢良方正為至重而得人之盛則莫如孝亷斯亦後世之所不能及馬氏端臨曰西漢舉賢良文學則令其對策而孝亷則無對策之事蓋所謂賢良文學者取其忠言嘉謀足以佐國崇論宏議足以康時故非試之以對策則無以盡其材若孝亷則取其履行而非資其議論也今亦從而有試焉則所謂孝亷者若何而著之於篇乎又況左雄所言諸生試家法文吏課箋奏則又文之靡者去賢良所對尚復逺甚而何以言孝亷乎雄又言郡國孝亷古之貢士出則寧民宣協風教若其面牆則無所施用愚以為真孝實亷之人豈有不學牆面之理而以家法箋奏應選者又豈可遽許以學古入官之事也然史言雄立此法之後濟隂太守胡廣等十餘人皆坐繆舉免黜惟汝南陳蕃頴川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉則知當時孝亷一科濫吹特甚於文墨小技尚未能精通固無問其實行也科以孝亷名而猶如此則它可知王荆公詩言文章始隋唐進取歸一律安知鴻都事竟用程人物嗚呼其來久矣非始於隋唐也蕙田案左雄限年試士之法此變薦舉為課試之漸也以孝亷之名舉之而所收者不過儒學文吏其真孝悌者反不得與無惑乎胡廣張衡黃瓊諸人紛紛多異論矣然在當時選舉冒濫自不得不校試以嚴為澄汰范蔚宗所謂因時識宜者可謂得其平矣觀承案限年試士之法似非鄉舉里選本意然古者敷奏明試原屬並行况薦舉豈能盡公即果無私而所舉孝亷乃未嘗讀書識字之人亦可使之從政立朝也耶則既舉而試自不可少也順帝本紀漢安元年詔大將軍公卿舉賢良方正能探賾索隱者各一人沖帝本紀建康元年詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人桓帝本紀建和元年詔大將軍公卿校尉舉賢良方正能直言極諫者各一人又詔大將軍公卿郡國舉至孝篤行之士各一人三年詔大將軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人元嘉二年詔公卿校尉舉賢良方正能直言極諫者各一人延熹八年詔公卿校尉舉賢良方正九年詔公卿校尉郡國舉至孝靈帝本紀建寧元年五月朔日有食之詔公卿以下及郡國守相舉有道之士各一人獻帝本紀建安五年詔三公舉至孝二人九卿校尉郡國各一人蕙田案兩漢辟舉之目曰茂材異等曰賢良方正曰孝亷曰文學高第又有質朴敦厚遜讓有行及至孝篤行有道獨行諸名大約西京得人以賢良為盛東京取士以孝亷為盛西漢察孝亷或闔郡不薦一人至東漢定郡國嵗舉孝亷以户口多寡為差而賢良方正諸科非特詔不得常舉順帝用左雄之請限孝亷年四十以上通章句能箋奏者乃能應選又試之公府覆之端門以核虛濫蓋後漢之舉孝亷與唐宋進士科大略相同但郡國守相必取其實行參以鄉評而後舉之非如後代之投牒自獻也今人稱舉人為孝亷蓋由於此文獻通考西漢舉賢良文學者朝錯董仲舒公孫𢎞杜欽嚴助朱雲王吉貢禹魏相蓋寬饒孔光谷永杜鄴何武轅固黃霸朱邑東漢舉賢良文學者魯丕申屠剛蘇章李法爰延崔駰周燮劉瑜荀淑皇甫規張奐劉淑劉焉西漢舉孝亷者路溫舒龔勝鮑宣京房趙廣漢張敞尹翁歸王尊蓋寬饒劉輔蕭望之薛宣馮遂朱博杜鄴王嘉師丹孟喜黃霸尹賞王吉京房平當東漢舉孝亷者馬稜魏霸韋彪馮豹賈琮鄭𢎞周章張霸桓典桓鸞劉平江革周磐第五倫鍾離意寒朗朱穆徐防張敏胡廣袁安翟劭霍諝陳禪龎參陳龜橋元黃憲楊彪張綱王龔种皓陳球杜根劉陶李雲傅燮蓋勳張衡左雄李固杜喬吳祐延篤段熲陳蕃李膺劉祐宗慈巴肅范滂尹勳蔡衍羊陟陳翔檀敷劉儒賈彪符融鄭太荀彧皇甫嵩朱雋劉虞公孫瓉袁術許荆第五訪劉矩劉寵陽球劉琨張興包咸楊仁董鈞服虔潁容許慎高龔劉梁高彪劉茂張武戴封雷義王烈謝夷吾李郃公沙穆華他西漢任子入仕者蘇武以父任為郎劉向以父任為輦郎孔光子男放為侍郎董恭為御史任賢為太子舍人蕭育以父任為太子庶子史丹九男皆以丹任為侍中汲黯以父任為太子洗馬史丹馮野王皆以父任為太子中庶子伏湛以父任為博士弟子辛慶忌以父任為右校丞杜延年以三公子補軍司空虎賁諸郎皆父死子代右父任霍去病任光為郎楊惲以忠任為郎爰盎兄噲任盎為郎中右兄任侯霸以族父任為太子舍人趙兼淮南王舅子以宗家任為郎右宗家任元始二年龔勝邴漢乞骸骨策曰其上子若孫及同産子一人所上子男皆除為郎右致仕任東漢任子入仕者桓郁桓焉周協耿秉馬廖宋均黃瓊袁敞黃琬臧洪何休西漢時以試吏入官者路溫舒衛青公孫𢎞張湯杜周王欣陳萬年于定國龔勝丙吉趙廣漢尹翁歸張敞王尊孫寶何並薛宣朱勝朱邑趙禹王溫舒尹齊減宣嚴延年尹賞樓護王吉鮑宣焦延夀西漢以博士入官者賈誼董仲舒疏廣薛廣德彭宣貢禹韋賢夏侯勝轅固后蒼韓嬰胡母生嚴彭祖江公以太常掌故入官者朝錯以博士弟子入官者息夫躬兒寬終軍朱雲眭𢎞蕭望之匡衡馬宫翟方進何武王嘉施讐房鳯召信臣東漢以博士入官者蔡茂承宫郎顗曺褒盧植戴憑歐陽歙牟長揚倫魏應西漢以資為郎者張釋之司馬相如輸財得官者卜式黃霸楊僕蕙田案兩漢入仕之途自辟舉而外或出於掾吏或出於任廕西都以吏職致位公卿者甚衆其時儒與吏未甚分别雖賢能儒雅之輩不嫌以吏為進身之階東京之初吏職漸輕而才能出衆者多由於辟舉故丁邯以孝亷為尚書郎雖被杖責不肯應詔逮於唐宋以吏胥為雜流謂之流外出身而士大夫以刀筆吏起家者蓋寥寥矣廕敘之法即成周世祿之遺意歷代相因不廢然亦非勸學興賢之正法今俱不載録通考此條以見兩漢仕進之大略云其博士弟子升進之法别見學校門右兩漢取士魏志文帝紀黃初二年初令郡國口滿十萬者嵗察孝亷一人其有秀異無拘戶口三年詔曰今之計考古之貢士也十室之邑必有忠信若限年然後取士是吕尚周晉不顯于前世也其令郡國所選勿拘老幼儒通經術吏達文法到皆試用有司糾故不以實者通典魏文帝時尚書陳羣以天朝選用不盡人才乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物定其高下杜氏佑曰九品之制州郡各置大小中正各以本處人任諸府公卿及臺省郎吏有德充才盛者為之區别所管之人物定為九等其有言行修著則升進之或以五升四以六升五倘有道義虧缺則降下之或自五退六自六退七矣是以吏部不能審定核天下人才士庶故委中正銓第等級憑之授受謂免乖戾及法弊也惟能知其閥閲非復辨其賢愚所以劉毅云上品無寒門下品無勢族南朝至於梁陳北朝至于周隋選舉之法雖互相損益而九品及中正至開皇中方罷晉書武帝本紀泰始四年詔王公卿尹及郡國守相舉賢良方正直言之士五年詔州郡舉勇猛秀異之才劉毅傳毅以魏立九品權時之制未見得人而有八損乃上疏曰臣聞立政者以官才為本而官才有三難人物難知一也愛憎難防二也情偽難明三也今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢愛憎決于心情偽由於已附託者必達守道者困悴上品無寒門下品無世族慢主罔時實為亂源損政之道一也置州都者取州里清議咸所歸服將以鎮異同一言議不謂一人之身了一州之才一人不審遂坐之若然自仲尼以上莫不有失則皆不堪何獨責于中人者哉使是非之論橫于州里嫌讐之隙結于人臣損政之道二也本立格之體謂人倫有序若貫魚成次也今之中正坐成其私乃使優劣易地首尾倒錯推貴異之器使在九品之下負載不肖越在成人之首損政之道三也委以一國之重而無賞罰之防杜一國之口培一人之勢使得縱橫無所顧憚諸受抂者抱怨積直獨不蒙天地無私之德而長壅蔽于邪人之銓損政之道四也一國之士多者千數中正知與不知將定品狀必采聲于臺府納毁于流言任已則有不識之弊聽受則有彼此之偏愛憎奪其乎人事亂其度損政五也凡立品設狀者求人才以理物非虛飾名譽相為好醜也今於限當報雖職之高還附卑品無績于官而獲高敘是為抑實功而隆虛名上奪天朝考績之分下長浮華朋黨之士損政六也凡官不同事人不同能今品不狀才能之所宜而以九等為例若狀得其實猶品狀相妨況今九品所疏則削其長所親則飾其短徒結白論以為虛譽則品不料能百揆何以得理損政七也前九品詔書善惡必書以為褒貶今之九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷懲勸不明則風俗汙濁天下人焉得不懈德行而鋭人事損政八也職名中正實為姦府事名九品而有八損臣以為宜罷疏奏優詔答之後司空衛瓘等亦共表宜省九品復古鄉議里選帝竟不施行馬氏端臨曰魏晉以來雖立九品中正之法然仕進之門則與兩漢一而已或公府辟召或郡國薦舉或由曺掾積纍而升或由世胄承襲而用大率不外此三四塗轍然諸賢之説多欲廢九品罷中正何也蓋鄉舉里選者採毁譽於衆多之論而九品中正者寄雌黃于一人之口且兩漢如公府辟掾屬州郡選曺僚皆自薦舉而自試用之若非其人則非特纍衡鑑之明抑且失倚毗之助故終不敢十分徇其私心其中正之法行則評論者自是一人擢用者自是一人評論所不許則司擢用者不敢違其言擢用或非其人則司評論者本不任其咎體統脈絡各不相關故徇私之弊無由徵革又必限於九品専以一人其法太拘其意太狹其迹太露故趨勢者不暇舉賢如劉毅所謂上品無寒門下品無世族是也畏禍者不敢疾惡如孫秀為琅琊郡吏求品於清議王戎從弟衍衍將不許戎勸品之及秀得志朝士有怨者皆被害戎衍獨免是也快恩讐者得以自恣如何劭初亡袁粲弔劭子岐岐辭以疾粲曰今年決下婢子品是也又如陳夀遭父喪有疾使婢丸藥客見之鄉里以為貶坐是沉滯纍年謝惠連愛幸會稽郡吏杜德靈及居父憂贈以五言詩十餘首坐廢不豫榮伍尚書僕射殷景仁愛其才乃白文帝言臣小兒時便見此文而論者云是惠連其實非也文帝曰若此便應通之元嘉七年乃為彭城王義康參軍閻纘父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寶訟于有司遂被清議十餘年纘孝謹不怠母後意解更移中正乃得復品以此三事觀之其法甚嚴然亦太拘蓋人之履行稍虧者一入品目遂永不可以抆拭湔滌則天下無全人矣況中正所品者未必皆當乎固不若採之於無心之鄉評以詢其履行試之以可見之職業而驗其才能一如兩漢之法也又曰任子之法始於漢而其法尤備於唐漢唐史列傳中凡以門廕入仕者皆備言之獨魏晉南北史不言門廕之法而列傳中亦不言以門廕入仕之人何也蓋兩漢入仕之途或從辟召或舉孝亷至隋唐則専以科目取人所以漢唐之以門廕入仕者皆不由科目與辟召者也自魏晉以來始以九品中正為取人之法而九品所取大槩多以世家為主所謂上品無寒門下品無世族故自魏晉以來仕者多世家逮南北分列凡三百年而用人之法多取之世族如南之王謝北之崔盧雖朝代推移鼎遷物改猶卬然以門地自負上之人亦緣其門地而用之故當時南人有三公之子傲九棘之家黃散之孫蔑令長之室之説北人亦有以貴襲貴以賤襲賤之説往往其時仕者或從辟召或舉孝亷雖與兩漢無異而所謂從辟召舉孝亷之人則皆貴胄也其起自單族匹士而顯貴者蓋所罕見當時既皆尊世胄而賤孤寒故不至如後世之誇特起而鄙門廕而史傳中所以不言以廕敘入官者蓋所以見當時雖以它途登仕版居清要者亦皆世家也顧氏炎武曰古之哲王所以正百辟者既已制官刑警于有位矣而又為之立閭師設鄉校存清議于州里以佐刑罰之窮移之郊遂載在禮經殊厥井疆稱於畢命兩漢以來猶循此制鄉舉里選必先考其生平一玷清議終身不齒君子有懷刑之懼小人存恥格之風教成於下而上不嚴論定於鄉而民不犯降及魏晉而九品中正之設雖多失實遺意未亡凡被糾彈付清議者即廢棄終身同之禁錮至宋武帝篡位乃詔有犯鄉論清議贓汙淫盜一皆蕩滌洗除與之更始自後凡遇非常之恩赦文並有此語齊梁陳詔並云洗除先注當日鄉論清議必有記注之目然鄉論之汙至煩詔書為之洗刷豈非三代之直道尚在於斯民而畏人之多言猶見於變風之日乎蕙田案九品中正之制其弊至於毁譽失實愛憎任情劉毅論之詳矣然考晉宋諸史所載以內行不謹被清議者甚衆知士大夫尚以孝悌亷節為重有三代直道之遺焉又如宋文帝時舍人王宏為上所愛遇上謂曰卿欲作士人得就王球坐乃當判耳若往詣球可稱旨就席及至球舉扇曰若不得爾宏還依事啓聞上曰我便無如此何齊世祖時紀僧真得幸嘗請曰臣逢聖時階榮至此無所須唯就陛下乞作士大夫上曰此由江斆謝草瀹我不得措意可自詣之僧真承旨詣斆登榻坐定斆顧命左右曰移吾牀逺客僧真喪氣而退以告世祖世祖曰士大夫故非天子所命夫流品之清濁天子不得主而取憑於一二人之口則當時九等之髙下原有公論而所謂大小中正者亦必擇名德之士而授之非盡失實也漢時孝秀之舉得士最多然當時亦有舉秀才不知書察孝亷父别居之謠毁譽之失實豈獨九品中正乎通典東晉元帝制揚州嵗舉二人諸州各一人時以天下喪亂務存慰勉遠方孝秀不復策試到即除署既經略粗定乃詔試經有不中科刺史太守免官其後孝秀莫敢應命有送至京師皆以疾辭太興三年尚書孔坦議請普延五嵗許其講習乃詔孝亷申至七年而秀才如故馬氏端臨曰孝亷諸科自東漢以來皆有策試之事夫以文墨小技而定其優劣已不足以稱其科之名矣今觀東晉之事則應舉者皆不能試之人且以孝亷自名而必遲以五嵗待其講習乃能豫於試不亦有靦面目乎然觀惠帝永寧初王接舉秀才報友人書曰今世道交喪將遂剝亂而智識之士鉗口韜筆非榮此行欲極陳所言冀有覺悟會是嵗三王舉義惠帝復祚以國有大慶天下秀才孝亷一皆不試接以為恨然則上下相蒙姑息具文其來久矣宜其皆欲僥幸於不試也宋制丹陽吳會會稽吳興四郡嵗舉二人餘郡各一人凡州秀才郡孝亷至皆策試天子或親臨之及公卿所舉皆屬於吏部序才銓用凡舉得失各有賞罰失者其人加禁錮年月文帝元嘉中限年三十而仕孝武即位仕者不拘長幼宋書恩幸傳論漢末喪亂魏武始基軍中倉卒權立九品蓋以論人才優劣非謂世族高卑因此相沿遂為成法自魏至晉莫之能改州都郡正以才品人而舉世人才升降蓋寡徒以憑藉世資用相陵駕都正俗士斟酌時宜品目少多隨事俯仰劉毅所云下品無高門上品無賤族也嵗月遷訛斯風漸篤凡厥衣冠莫非二品自此已還遂成卑庶周漢之道以智役愚臺𨽻參差用成等級魏晉以來以貴役賤士庶之科較然有辨齊尚書都令史駱宰議策秀才格五問並得為上四三為中二為下一不合與第謝超宗以為片辭折獄寸言挫衆魯史褒貶孔論興言皆無俟繁而後秉裁夫表事之深析理之會豈必委牘方切理道非患對不盡問患以常文弗竒必使一通峻正寧劣五通而常與其俱竒一亦宜採詔從宰議因習宋代限年之制然而鄉舉里選不核才德其所進取以官婚胄籍為先遂令甲族以二十登門仕後門以三十試吏故有增年矯貌以圗進者其時士人皆厚結姻援奔馳造請浸以成俗梁初無中正制年二十五方得入仕天監中又制凡九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年州置州重郡置郡崇鄉置鄉豪各一人専典搜薦無復膏粱寒素之隔普通七年詔凡州嵗舉二人大郡一人敬帝太平二年復令諸州各置中正仍舊放選舉皆須中正押上然後量授不然則否文獻通考武帝天監中沈約上疏曰頃自漢代本無士庶之别自非仕宦不至京師罷公卿牧守並還鄉里小人瞻仰以成風俗且庠校棊布傳經授業學優而仕始自鄉邑本於小吏幹佐方至文學功曺積以嵗月乃得察舉人才秀異始為公府所辟遷為牧守入作台司漢之得人於斯為盛今之士人並聚京邑其有守土不遷見謂愚賤且當今士子繁多略以萬計常患官少才多無地以處秀才自别是一種任官非若漢代取人之例也假使秀才對五問可稱孝亷答一策能過此乃雕蟲小道非關理亂一切得失以此求才徒虛語耳鴻臚卿裴子野又論曰書云貴貴為其近於君也天下無生而貴者是故道義可尊無擇負販苟非其人何取代族周衰禮壞政出臣下卿士大夫自相繼及非夫嗣嫡猶等家臣且徒步匹夫見禮侯伯式閭擁篲無絶於時其後四方豪勢之家門客千數卑身折節比食同袍雖相傾倚亦成風俗迄于二漢尊儒重道朝廷州里學行是先雖名公子孫還齊布衣之士士庶雖分而無華素之隔有晉以來其流稍改草澤高士猶厠清塗降及季年専稱閥閲自是三公之子傲九棘之家黃散之孫蔑令長之室轉令互爭銖兩所論必門户所議莫賢能苟且之俗成傲慢之禍作非所以敦𢎞退讓厲德興化之道也陳依梁制凡年未三十不得入仕唯經學生策試得第諸州迎主簿西曺左奏及嘗為挽郎得未壯而仕後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否其秀才對策第居中上表敘之正始元年冬乃罷諸郡中正魏書韓麒麟傳子顯宗上言前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可别貢門地以敘士人何假冒秀孝之名或云代無竒才不若取士於門此亦失矣豈可以代無周召便廢宰相而不置哉但當較其寸長銖重者即先敘之則賢才無遺矣隋書禮儀志後齊每策秀孝中書策秀才集書策貢士考功郎中策亷良天子常服乘輿出坐於朝堂中楹秀孝各以班草對其有脫誤書濫孟浪者起立席後飲墨水脫容刀通典北齊選舉多沿後魏之制凡州縣皆置中正周武帝平齊詔山東諸州舉明經幹理者上縣六人中縣五人下縣四人宣帝大成元年詔州舉高才博學者為秀才郡舉經明行修者為孝亷上州上郡嵗一人隋文帝開皇七年制諸州嵗貢三人工商不得入仕煬帝始建進士科蕙田案魏晉以降雖有秀才孝亷諸科而郡國之察舉吏部之銓選率憑於中正之高下其弊也重門閥而輕孤寒所舉者不必賢能所棄者不必不肖至於隋世乃廢九品中正之制而設進士科士皆得投牒自進州郡不復察其素行而鄉舉里選之法遂不可復矣右魏晉至隋取士唐書選舉志唐制取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升于有司而進退之其科之目有秀才有明經有進士又有俊士有明法有明字有明算有一史有三史有開元禮有道舉有童子而明經之别有五經有三經有二經有學究一經有三禮有三傳此嵗舉之常選也其天子自詔者曰制舉以待非常之才焉舉選者不由學館者謂之鄉貢皆懷牒自列于州縣試已長吏以鄉飲酒禮會屬僚設賔主陳俎豆備管弦牲用少牢歌鹿鳴之詩因與耆艾序長少焉既至者皆疏名列到結欵通保及所居始由户部集閲而關于考功員外郎試之凡秀才試方略策五道以文理通粗為上上上中上下中上凡四等為及第凡明經先帖文然後口試經文大義十條答時務策三道亦為四等凡開元禮通大義百條策三道者超資與官義通七十策通二者及第散試官能通者依正員凡三傳科左氏傳問大義五十條公羊榖梁傳三十條策皆三道義通七以上策通二以上為第白身視五經有出身及前資官視學究一經凡史科每史門大義百條策三道義通七策通二以上為第能通一史者白身視五經三傳有出身及前資官視學究一經三史皆通者奬擢之凡童子科十嵗以下能通一經及孝經論語卷誦文十通者豫官通七豫出身凡進士試時務策五道帖一大經經策全通為甲第策通四帖過四以上為乙第凡書學先口試通乃墨試説文字林二千條通十八為第凡算學録大義本條為問答明數造術詳明術理然後為通試九章三條海島孫子五曺張邱建夏侯陽周髀五經算各一條十通六記遺三等數帖讀十得九為第試綴術緝古録大義為問答者明數造術詳明術理無注者合數造術不失義理然後為通綴術七條輯古三條十通六記遺三等數帖讀十得九為第落經者雖通六不第凡𢎞文崇文生試一大經一小經或二中經或史記前後漢書三國志各一或時務策五道經史皆試策十道經通六史及時務策通三皆帖孝經論語共十條通六為第蕙田案隋大業中置進士科試以策問唐初亦因之高宗永隆二年詔進士試雜文兩篇通文律然後試策所謂雜文即詩賦之類也天寶十一載詔進士帖經既通而後試文詩賦各一篇文通而後試策是則進士一科永隆以前止有對策天寶以前有策有詩賦天寶以後有帖經有策有詩賦無専試策與帖經之事志所云進士試時務策帖一大經經策皆通為甲第者非也又進士試有雜文始於高宗之世而説者謂隋以詩賦取士亦誤矣志載算學一條似有重復訛舛之處文獻通考亦同俟考通典初秀才科等最高貞觀中有舉而不第者坐其州長由是廢絶士族所趨向惟明經進士二科而已秀才之科久廢明經雖有甲乙丙丁四科進士有甲乙二科自武德以來明經惟有丁第進士唯乙科而已其進士大抵千人得第者百一二明經倍之得第者十一二其制詔舉人不有常科皆標其目而搜揚之試之日或在殿廷天子親臨觀之試已糊其名於中考之文策高者特授以美官其次與出身應詔者多則二千人少則不下千人所收百才有一蕙田案此則唐時已有糊名之法但惟施于制科而明經進士則否顧氏炎武曰舊唐書杜正倫傳正倫隋仁夀中與兄正元正藏俱以秀才擢第唐代舉秀才止十餘人正倫一家有三秀才甚為當時稱美唐登科記武德至永徽每年進士或至二十餘人而秀才止一人二人舊唐書職官志則云秀才有唐已來無其人杜氏通典云初秀才科第最高試方略策五條有上上上中上下中上凡四等貞觀中有舉而不第者坐其州長由是廢絶新唐書高宗永徽二年始停秀才科士人所趨嚮惟明經進士二科而已顯慶初黃門侍郎劉祥道奏言國家富有四海于今有四十年百姓官寮未有秀才之舉未必今人之不如昔將薦賢之道未至豈使方稱多士遂缺斯人請六品以下爰及山谷特降綸言更審搜訪唐人之於秀才其重如此秀才字出史記賈生傳年十八以能誦詩屬書聞于郡中吳公為河南守聞其秀才而儒林傳公孫𢎞等之議則曰有秀才異等輒以名聞此秀才之名所起元宗御撰六典言凡貢舉人有博識高才強學待問無失俊選者為秀才通二經已上者為明經明間時務精熟一經者為進士張昌齡傳本州欲以秀才舉之昌齡以時廢此科已久固辭乃充進士貢舉及第是則秀才之名乃舉進士者之所不敢當也又文苑英華判目有云鄉舉進士至省求試秀才考功不聽求訴而已趙岊判曰文藝小善進士之能訪對不休秀才之目是又進士求試秀才而不可得也今以生員而冒呼此名何也容齋三茟謂秀才之名自宋魏以後實為貢舉科目之最而今世俗以為相輕之稱明初嘗舉秀才洪武十五年徵至秀才數千人如太祖實録洪武四年四月辛丑以秀才丁士梅為蘇州府知府童權為揚州府知府俱賜冠帶十年二月丙辰以秀才徐尊生為翰林應奉十五年八月丁酉以秀才曽泰為户部尚書是也亦嘗舉孝亷洪武十八年十二月丙午洪武二十年二月己丑以孝亷李德為應天府尹是也此辟舉之名非所施於科目之士今俗謂生員為秀才舉人為孝亷非也洪氏容齋隨筆唐世制科舉目猥多徒異其名耳其實與諸科等也張九齡以道侔伊吕策高第以登科記及會要考之蓋先天元年九月明皇初即位宣勞使所舉諸科九人經邦治國材可經邦才堪刺史賢良方正與此科各一人藻思清華興化變俗科各二人其道侔伊吕策問殊平平但云興化致理必俟得人求賢審官莫先任舉欲逺循漢魏之規復存州郡之選慮牧守之明不能必鑒次及越騎佽飛皆出畿甸欲均井田於要服遵邱賦於革車并安人重榖編户農桑之事殊不及為天下國家之要道則其所以待伊吕者亦狹矣九齡於神龍二年中材堪經邦科本傳不書計亦此類矣蕙田案唐世制科之目見於登科記者有賢良方正能直言極諫科博通墳典達於教化科識洞韜略堪任將帥科清亷守節政術可稱堪任縣令科孝弟力田聞於鄉閭科詳明政術可以理人科才識兼茂明於體用科達於吏理可使從政科軍謀宏達材任將帥科志烈秋霜科幽素科詞殫文律科詞標文苑科蓄文藻之思科抱儒素之業科文藝優長科絶倫科臨難不顧徇節寧邦科長才廣度沈迹下僚科拔萃科疾惡科才膺管樂科道侔伊吕科龔黃科材堪經邦科才高位下科抱器懷能科茂材異等科良材異等科文儒異等科文以經國科藏名負俗科藻思清萃科寄以宣風則能興化變俗科手筆俊拔超越輩流科哲人竒士逸淪屠釣科文史兼優科文詞雅麗科博學通議科博學宏詞科文辭秀逸科風雅古調科詞藻宏麗科智謀將帥科武足安邊科高才沉淪草澤自舉科高材未達沈迹下僚科多才科王霸科高蹈邱園科樂道安貧科諷諫主文科經學優深科軍謀越衆科而王伯厚困學紀聞云唐制舉之名多有八十有六則登科記所載尚有未盡者矣唐書選舉志高宗永徽二年始停秀才科上元二年加試貢士老子策明經二條進士三條永隆二年考功員外郎劉思立言明經多抄義條進士惟誦舊策皆亡實材而有司以人數充第乃詔自今明經試帖十得六以上進士試雜文二篇通文律者然後試策通典武后載初二年二月策問貢士于洛城殿數日方了殿前試人自此始馬氏端臨曰武后所試諸路貢士蓋如後世之省試非省試之外再有殿試也唐自開元以前試士未屬禮部以考功員外郎主之武后自詭文墨故于殿陛間下行員外郎之事蕙田案通考載此事作天授元年考之正史武后以載初二年九月改元天授則策試貢士在未改元以前通典為是長夀二年后自製臣軌兩篇令貢舉習業停老子神龍二年二月制貢舉人停臣軌依舊習老子開元二十一年玄宗新注老子成詔天下每嵗貢士減尚書論語策而加老子唐書選舉志開元二十四年考功員外郎李昻為舉人詆訶帝以員外郎望輕遂移貢舉于禮部以侍郎掌之禮部選士自此始文獻通考開元二十五年敕曰進士以聲韻為學多昧古今明經以帖誦為功罕窮旨趣自今明經問大義十條對時務策三首進士試大經十帖天寶六載上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對策斥言其姦惡建言舉人多卑賤愚憒恐有俚言汙濁聖聽乃令郡縣長官精加試練具名送省委尚書覆試御史中丞監之取名實相副者聞奏既而至者皆試以詩賦論遂無一人及第者馬氏端臨曰以唐登科記考之是年進士二十三人風雅古調科一人不知何以言無一人及第也册府元龜開元二十四年已後復有秀才舉其時以進士漸難而秀才本科無貼經及雜文之限反易於進士主司以其科廢久不欲拔奬應者多落之三十年來無登第者至天寶初禮部侍郎韋陟始奏請有堪此舉者乃令長官特考其常年舉送者並停顧氏炎武曰册府元龜又言代宗朝楊綰為禮部侍郎請置五經秀才科事寢不行而舊唐書儒學傳馮伉大歷初登五經秀才科則是嘗行之而旋廢耳文獻通考肅宗乾元初中書舍人李揆兼禮部侍郎言主司考取士多不考實徒峻其隄防索其書策殊不知藝不至者居文史之囿亦不能摛其詞藻深昧求賢之意及試進士日於庭中設五經諸史及切韻本於牀而引貢士謂之曰大國選士但務得材經籍在兹請恣尋撿蕙田案據此則唐時進士試詩賦不許持切韻矣然白居易集有云禮部進士例許用書策兼得通宵得通宵則思慮必周用書策則文字不錯是唐試進士無挾書之禁豈李揆知貢舉以後遂以為例與又案搜索懷挾之例唐時始有之唐書選舉志代宗廣德元年賈至為侍郎建言嵗方艱歉舉人赴省者兩都試之兩都試人自此始寶應二年禮部侍郎楊綰言進士科起於隋大業中是時猶試策高宗朝劉思立加進士雜文明經填帖故為進士者皆誦當代之文而不通經史明經者但記帖括又投牒自舉非古先哲王側席求賢之意請依古察孝亷其鄉閭孝友信義亷恥而通經者縣薦之州州試其所通之學送于省自縣至省皆勿自投牒其到狀保辨識牒皆停而所習經取大義聽通諸家之學每問經十條對策三道皆通為上第吏部官之經義通八策通二為中第與出身下第罷歸其明經進士及道舉並停帝以問翰林學士對曰舉進士久矣廢之恐失其業乃詔明經進士與孝亷兼行蕙田案孝亷科罷於建中元年初禮部侍郎親故移試考功謂之别頭貞元十六年中書舍人高郢奏罷議者是之元和十三年禮部侍郎庾承宣奏復考功别頭試太和三年高鍇為考功員外郎取士有不當監察御史姚中立又奏停考功别頭試六年侍郎賈餗又奏復之蕙田案唐之别頭試即今所謂回避卷也元和中明經停口義復試墨義十條五經取通五明經通六其嘗坐法及為州縣小吏雖藝文可採勿舉初開元中禮部考試畢送中書門下詳覆其後中廢元和十三年侍郎錢徽所舉送覆試多不中選由是貶官而舉人雜文復送中書門下長慶三年侍郎王起言故事禮部已放榜而中書門下始詳覆今請先詳覆而後放榜議者以起雖避嫌然失貢職矣太和八年宰相王涯以為禮部取士乃先以榜示中書非至公之道自今一委有司以所試雜文鄉貫三代名諱送中書門下蕙田案唐進士放榜畢以試文送兩省詳覆如今之鄉會試卷送部磨勘非别命題覆試之也先是進士試時賦及時務策五道明經策三道建中二年中書舍人趙贊權知貢舉乃以針論表贊代詩賦而皆試策三道太和八年禮部復罷進士議論而試詩賦文宗從內出題以試進士謂侍臣曰吾患文格浮薄昨自出題所試差勝乃詔禮部嵗取登第者三十人茍無其人不必充其數是時文宗好學嗜古鄭覃以經術位宰相深嫉進士浮薄屢請罷之文宗曰敦厚浮薄色色有之進士科取人二百年矣不可遽廢因得不罷武宗即位宰相李德裕尤惡進士初舉人既及第綴行通名詣主司第謝其制序立西階下北上東向主人席東階下西向諸生拜主司答拜乃敘齒謝恩遂升階與公卿觀者皆坐酒數行乃赴期集又有曲江會題名席至是德裕奏國家設科取士而附黨背公自為門生自今一見有司而止其期集參謁曲江題名皆罷蕙田案門生之名起於兩漢謂所傳業者非謂所舉之士也然東漢孝亷于舉主之喪至有制服三年比于心喪者則謝恩私門漢時已然矣唐世士子始以有司為座主而自稱門生中葉以降遂成門户之習至是李文饒當國始議進士及第後祗許一度參謁有司不得于私宅聚集參謁蓋座主門生之禁實始於此唐國史補進士為時所尚久矣是故俊又實在其中由此而出者終身為文人故爭名常為時所弊其都會謂之舉場通稱謂之秀才投刺謂之鄉貢得第謂之進士互相推敬謂之先輩俱捷謂之同年有司謂之座主京兆府考而升之者謂之等第外府不試而貢者謂之拔解然拔解亦須預託人為詩賦非謂自薦將試各相保謂之合保羣居而賦謂之私試造請權要謂之關節激揚聲價謂之還往既捷列名於慈恩寺塔謂之題名大燕於曲江亭子謂之曲江會曲江大會在關試後亦謂關宴宴後同年各有所之亦謂之離會籍而入選謂之春關不捷而醉飽謂之打眊燥匿名造謗謂之無名子退而肄業謂之過夏執業以出謂之夏課亦謂之秋卷挾藏入試謂之書策此其大略也馬氏端臨曰案昌黎公贈張童子序言天下之以明二經舉其得升于禮部者嵗不下三千人謂之鄉貢又第其可進者屬之吏部嵗不及二百人謂之出身然觀登科記所載雖唐之盛時每年禮部所放進士及諸科未有及五七十人者與昌黎所言不合又開元十七年限天下明經取士及第每年不過百人又太和敕進士及第不得過四十人明經不得過百一十人然記所載逐年取人數如此則元未嘗過百人固不必為之限也又明經及第者姓名尤為寥寥今曰不得過百一十人則是每科嘗過此數矣豈登科記所載未備而難憑耶唐史托言載華良入為京兆解不第以書讓考官曰聖唐有天下垂二百年登進士科者三千餘人以此證之則每嵗所放不及二十人也登科記不誤矣右唐取士文獻通考梁太祖開平元年敕近年舉人當秋薦之時不親試者號為拔解今後宜止絶又敕禮部貢院每年所放明經及第不得過二十人乾化元年以尚書左僕射楊涉知貢舉非常例也開元時以禮部侍郎専知貢舉其後或以它官領多用中書舍人及諸司四品清資官唯會昌中命太常卿王起主貢舉時亦檢校僕射五代時或以兵部尚書或以戶部侍郎刑部侍郎為之不専主於禮侍矣後唐莊宗同光三年敕今年新及第進士符蒙正等令翰林院覆試升王徽桑維翰居魁亞降蒙正為第四今後禮部所試委中書門下子細詳覆奏聞三年工部侍郎任贊奏請諸舉人不是家在逺方水陸隔越者逐處選賔從官僚中藝學精博一人各於本貫一例分明比試如非通贍不許妄給文解明宗長興三年敕今後落第舉人所司已納家狀者次年便赴貢院就試並免再取文解長興四年禮部貢院奏新立條件如後一九經五經呈帖由之時試官書通不後有不及格者唱落後請置筆硯將所納帖由分明却令自閲或者試官錯書通不當與改正如懷疑者便許請本經當面校對如實是錯即更於帖由上書名而退一五科常年駮榜出多稱屈塞今年並明書所對經書墨義云第幾道不第幾道粗第幾道通任將本經書疏照證如考試官去留不當許將狀陳訴當再考較如合黜落妄有披述當行嚴斷一今年舉人有抱屈落第者許將狀披訴於貢院當與重試如貢院不理即詣御史臺論訴請自試舉人日令御史臺差人受舉人訴屈文狀并引本身勘問所論事件或知貢舉官及考試官以下敢受貨賂升擢親朋屈抑藝能隂從請託及不依格去留一事有違請行朝典一懷挾書策舊例禁止請自今後入省門搜得文書者不計多少準例扶出殿將來兩舉一遙口受人回換試處及抄義題帖書時諸般相救準例扶出請殿將來三舉一藝業未精準格落下恥見同人妄扇屈聲擬為將來基址及他人帖對過場數多者便生誣玷或羅織毆罵者並當收禁牒送御史臺請賜敕鞫如知貢舉官及考試官事涉私徇情屈塞藝士請行朝典若虛妄者請嚴行科斷牒送本道重處色役仍永不得入舉場同保人亦請連坐各殿三舉奉敕宜依又奏準會要貢人至元日列在方物之前以備充庭之禮近來直臨鎖院前赴應天門外朝見今後請令舉人復赴正仗如舊法或以人數不少請祗取諸科解頭一人就列其餘續到者俟齊日别令朝見奉敕依葉氏夢得曰唐末禮部知貢舉有得程文優者即以已登第時名次處之不以甲乙為高下也謂之傳衣鉢和凝登第名在十三後得范魯公質遂處以十三其後范登相位官至太子太傅封國於魯與凝皆同世以為異也後周太祖廣順三年敕禮部貢院於引試之前精加考校逐場去留無藝者雖應舉年深不得饒借場數有藝者雖遭黜落並許陳訴祗不得街市省門故為喧競及投無名文字訕毁主司如有故違必行嚴斷配流邊逺同保人永不得赴舉主司不得受薦託書題密具姓名聞奏其舉人不得就試又令今後舉人須取本鄉貫文解若鄉貫阻隔祗許兩京給解世宗顯德二年敕國家設貢舉之司求俊茂之士務詢文行以中科名比聞近年以來多有濫進或以年勞而得第或因媒勢以出身今嵗所貢舉人試令看詳果見紕繆須至去留其李覃何曮楊徽之趙鄰幾等四人宜放及第其嚴説武允成王汾閭丘舜卿任惟吉周度張慎微王翥馬文劉選程浩然李進等一十二人藝學未精並宜黜落且令苦學以俟再來禮部侍郎劉溫叟失於選士頗屬因循據其過尤合行譴謫尚示寬恕特與矜容劉溫叟放罪將來貢舉公事仍令所司具條理聞奏其年五月尚書禮部侍郎知貢舉竇儀奏其進士請今後省卷限納五卷以上於中雖有詩賦論各一卷餘外雅文歌篇並許同納祗不得有神道碑志文之類其帖經對義並須實考通三已上為合格將來却覆試候考試終場其不及人以文藝優劣定為五等取文字乖舛詞理紕繆最甚者為第五等殿五舉其次者為第四等殿三舉以次稍優者為第三等第一等並許次年赴舉其所殿舉數並於所試卷子朱書封送中書門下請行指揮及罪發解試官監官等其諸科舉人若合解不解不合解而解者監官試官為首罪勒停見任舉送長官聞奏取裁監官試官如受賂及今後進士如有倩人述作文字應舉者許人告言送本處色役永不得仕進同保人知者殿四舉不知者殿兩舉受倩者如見在官停任選人殿三選舉人殿五舉諸色人量事科罪從之竇儀又奏乞依唐穆宗時考試及第進士先具姓名雜文申送中書請奏覆訖下當司與諸科一齊放榜五年右諫議大夫知貢舉劉濤於東京試士放榜後率新及第進士劉坦已下一十五人來赴行在以其所試詩賦進呈上以其詞多紕繆命翰林學士李昉覆試退落郭浚趙保雍等七人濤坐責官馬氏端臨曰五代五十二年其間惟梁與晉各停貢舉者二年則降敕以舉子學業未精之故至於朝代更易干戈搶攘之嵗貢舉固未嘗廢也然每嵗所取進士其多者僅及唐盛時之半土宇分割人士流離固無怪其然但三禮三傳學究明經諸科唐雖有之然每科所取甚少而五代自晉漢以來明經諸科中選者動以百人計蓋帖書墨義承平之時鄙其學而不習國家賤其科而不取故惟以攻詩賦中進士舉者為貴喪亂以來文學廢墜為士者往往從事乎帖誦之末習而舉筆能文者固罕見之國家亦姑以是為士子進取之塗故其所取反數倍於盛唐之時也國初諸科取人亦多於進士蓋亦承五季之弊云右五代取士五禮通考卷一百七十三
