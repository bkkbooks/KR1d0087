body:
  text: 五禮通考卷一百四十七刑部尚書秦蕙田撰嘉禮二十飲食禮為人後附禮記曾子問孔子曰宗子為殤而死庶子弗為後也注族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮疏以其未成人庶子不得代為之後庶子既不為後宗子禮不可闕族人以其倫軰與宗子昭穆同者代之此為大宗族人但是宗子兄弟行無親疎皆得代之知此是指大宗者以何休公羊注云小宗無子則絶大宗無子則不絶重適之本也徐氏乾學曰此庶子即宗子之弟也蓋言宗子殤沒庶子即為父後不必為宗子後故云庶子弗為後也若依注疏之言則是父有親子反舍之不立而别立他人之子盡以己之世爵禄産授之此豈近于人情耶且有宗子則宗子為後宗子夭則庶子為後此理之必然也豈有庶子不可為父後而反以族人代宗子為後乎難者曰此庶子既不為殤後小記何以有為殤後之文不知小記本文上言男子冠而不為殤下即繼之曰為殤後者以其服服之則彼之所謂殤指已冠婚者而言此之所謂殤指未冠婚者而言已冠婚者得以立後未冠婚者不得立後故記文有不同也又何疑乎晉書文六王傳城陽哀王兆字千秋十嵗而夭武帝踐阼詔曰亡弟千秋有夙成之質不幸早亡其以皇子景度為千秋後雖非典禮亦近世之所行且以述先后本㫖也於是追加封諡景度薨復以第五子憲繼哀王後薨復以第六子祗為東海王繼哀王後薨又封第十三子遐為清河王以繼兆後遼東悼惠王定國年三嵗薨咸寧初追加封諡以齊王攸長子蕤為嗣廣漢殤王廣德年二嵗咸寧初追加封諡以齊王第五子贊紹封薨更以第二子實嗣武十三王傳毗陵悼王軌二嵗而夭以楚王瑋子義嗣始平哀王裕年七嵗薨以淮南王允子廸嗣蕙田案殤子立後其情有二一是寵愛其子思念不忘於是為之𡨕婚立後封爵贈諡建廟立碑以為榮寵若晉書所載是也其失也愚一是兄弟子行中已無應繼之人惟孫行尚有支子又恐無子立孫則其孫有祖而無父于是强借夭殤之子或别立兄弟夭殤之子爲子而後以孫繼之其失也詐夫殤無為父之道必以立後為厚之未見其為厚也孫有後祖之義必以無父而諱之未見其可諱也是皆明禮者所不為也又案以上為殤子立後禮記射儀孔子射於矍相之圃蓋觀者如堵牆射至於司馬使子路執弓矢出延射曰僨軍之將亡國之大夫與音義與音預為人後者不入其餘皆入注與猶竒也後人者一人而已既有為者而徃竒之是貪財也配疏謂有人無後既立後訖此人復徃竒之竒謂合之外復有竒隻也舊唐書盧簡辭傳無子以弟簡求之貽殷元禧入繼貽殷終光禄少卿元禧登進士第終國子博士宋史留從效世家從效無子以兄從願之子紹錤紹鎡為子劉敞與為人後議孔子射於矍相之圃子路誓客曰僨軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半敢問何如斯謂之與為人後矣與之也者干之也求之也庶子奪其宗非干歟適子不為族人後適子而後其族非干歟諸父諸兄尊也諸弟倫也義不可以為後非干歟禮不後異姓異姓而為人子非干歟庶子而奪其宗則簒其祖也適子而後其族則輕其親也諸父諸兄諸弟而後其子兄弟則亂昭穆也異姓而後於人則背其姓也當周之衰僨軍之將亡國之大夫與為人後者蓋多此仲由所惡也或曰昔之言禮與子異曰然昔之言禮者以為人有後矣而又徃與之者也有後人而又徃與之是兩後矣安見有兩後者歟且人惟無後故求後焉未有有後而又求副焉者也此非子路之指或曰立後者立族人族人既為人之後矣而晚父有子立族人歟立子歟曰諸侯將立後必告於天子而見於祖大夫將立後必告於諸侯而見於祖傳為人後者為之子也降其私親所以重之也故有子則反苛代匱而已非立後也呂柟春官外署語胡林問射禮延射云敗軍之將亡穆國之大夫與為人後者不得入夫為人後者自是昭應繼不得已而為之何以與敗軍之將亡國之大夫等先生曰此為人後當是異姓飬子之類背父離母失其家矣與敗軍亡國者又何異也若同姓為後禮經有明徴矣周璞曰注疏謂與為求先生曰此説更明可見古注疏不可不讀朱氏國禎曰射禮敗軍之將亡國之大夫與為人後者不得入敗亡之恥莫甚焉不入固宜為人後者亦如之何故馮文所云賤夫妄為者也然則宜為後者當入矣蓋射本觀德德以孝為先既為人後則本生父母不得執三年䘮人子之心何安而敢上觀德之塲乎先王蓋以教孝也由是觀之為人後者當列不幸之科矣馮又曰非大宗非賢非德而後之皆曰妄棄其親而親人幾於禽獸吁何至若是之甚其不妄者豈無十之四乎或者馮公有感之言不可為據蕙田案一人二後情事亦有不同其争奪承繼以兩立為解紛者其為貪利䘮行不待言矣亦有富貴之家己雖無子而樂見子孫之蕃盛此其意亦無大惡然於情理有不可者蓋我既無子而兄弟以子後之此存亡繼絶之大德非常破格之義舉聖人之所甚重也今乃一之不足而至于再于彼于此可以唯吾所欲立其視己之衣食貲財為甚重而視人之以子後己為甚輕于情于理其可安乎又有貧富不均誼敦手足見兄弟之多男而多取之以紓其累者此尤近于美意然不思兄弟之子猶子兄弟貧窘而我獨豐盈飲之食之教之誨之皆伯叔父分中之事也何必斤斤焉使舍其父而父我然後可以施其撫育何其隘而私乎且彼兄弟之子並無干求争奪之心而自兩後並立之後旁觀之人皆以為與為人後而卑鄙之是愛之適以害之也既不以禮自處又不以禮處人亦何所取意而為之也哉注疏與劉氏説不同其義一也當並存之又案以上一人立二後漢書張安世傳兄賀有一子早死無子子安世小男彭祖師古曰言養以為子封陽都侯賀有孤孫覇年七嵗拜散騎中郎將賜爵關内侯蕙田案上言無子謂賀無子孤孫即早死之子所生非無孫矣夫立後所以繼絶也不絶而取人為後則與義男養子何異取者受者皆失之矣又案以上有孫復立子春秋成公十五年春王三月乙巳仲嬰齊卒公羊傳仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者爲之子也爲人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使於晉而未反何以後之叔仲惠伯傅子赤者也文公死子㓜公子遂謂叔仲惠伯曰君㓜如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何㓜君之有公子遂知其不可與爲謀退而殺叔仲惠伯殺子赤而立宣公宣公死成公㓜臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎於是遣歸父之家然後哭君歸父使乎晉還自晉至檉聞君薨家遣墠帷哭君成踊反命於介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也胡傳嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也于是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣杜氏預曰嬰齊襄仲子歸父弟宣十八年逐東門氏既而使嬰齊紹其後曰仲氏徐氏乾學曰卿大夫以下繼世與天子不同天下不可一日無天子國不可一日無君是故繼嗣不立則取于旁支以弟後兄可也以兄後弟可也甚至以叔後姪古亦為之君之生存既以盡臣其諸父昆弟身沒而旁支入繼必為之服斬衰既為之服斬衰即以祖禰事之可也大夫則不然以别子為祖亦不能臣其宗族繼世相傳以宗法齊之而已春秋之法大夫以罪廢逐不得入宗廟即思其先世而為之立後亦直以廢逐者之兄弟代主大宗之祀世及相傳而不及於廢逐者之子姪正所以嚴昭穆之序也魯子叔孫氏嘗逐僑如而立其弟豹矣於臧氏嘗逐紇而立其兄爲矣于東門氏則逐歸父而立嬰齊其事正同不聞豹禰僑如為禰紇而顧必以嬰齊禰歸父此魯人之剏舉也其意若謂吾逐歸父以其父故父罪之大不可後寧後其子爾乃不自知其已大悖典制矣故何氏以為亂昭穆之序失父子之親胡氏以為弟不可爲兄後父字不可為氏真不易之論也然則魯人之處此宜何如曰歸父固宗子又一時所稱賢大夫也左氏公榖皆以書其出奔為善之魯人既察其無罪而為之立後則自有宗法在不得復同於廢逐之臣矣禮曾子問篇曰若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配又曰宗子去在他國庶子無爵而居者望墓為壇以時祭若宗子死告於墓而後祭于家宗子死稱名不言孝身沒而已蓋卿大夫家乃宗法所自始其禮固甚嚴也使歸父有子當直立之無子則當立嬰齊之子嬰齊又無子則當使為攝主以待其子之生季孫有疾命正常曰南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既𦵏康子在朝正常以告康子請退此卿大夫之庶子攝位以待宜立者之生之證也魏書文成五王傳河間王若未封而薨詔京兆康王子太安為後太安與若爲從弟非相後之義廢之以齊郡王珎繼蘇淑傳淑字仲和武邑人也立性敦謹頗渉經傳兄夀興坐事為閹官後為河間太守賜爵晉陽男及夀興將卒遂冐養淑為子舊唐書淮陽王道元傳無子詔封其弟道明為淮陽王以奉道元之祀宋史李筠世家城陷筠將赴火妾劉欲俱死筠以其有娠麾令去守節筠子既購得之果生子焉守節無子以劉氏所生之弟為嗣王欽若傳欽若子從益無子以叔二子為後袁氏世範同姓之子昭穆不同亦不可以為後鴻雁㣲物猶不亂行人乃不然至以叔拜姪於理安乎况啟争端設不得已養弟飬姪孫以奉祭祀惟當撫之如子以其財産與之受所養者奉所養如父母如古人為嫂制服如今世為祖承重之意而昭穆不亂亦無害也大清律若立嗣雖係同宗而尊卑失序者罪亦如之如立異姓杖六十其子亦歸宗改立應繼之人蕙田案仲嬰齊以弟後兄千古未有不知其非者而近世士民之家猶有紊亂名分以弟繼兄者何歟大都長子早亡理當立後則此一分家産屬之他人不若取一㓜子畀其寡婦為子則我之家産仍是我子所有但知取後於人則我子少一分財産不思人來後我則我家添一分子孫此大惑也若人以子少則富未聞多子之家留其一而其餘推以與他人者是愛子之心無異貧與不貧不暇計也獨至立後繼絶則雖親兄弟孫猶忍弗能予而寧以㓜子當之不知㓜子固我子也而冡適則已絶矣是謂惜財産而甘為絶戸也豈不謬哉又案以上以弟後兄舊唐書德宗諸王傳文敬太子謜順宗之子德宗愛之命為子宋史陳洪進世家子文顯文顥文顗文頊文頊本文顯子初洪進在泉妙有相者言一門受禄當至萬石時洪進與三子皆領州郡而文頊始生乃以文頊為子欲應其言蕙田案孫之於祖可謂親矣何必改稱為子乃爲親愛乎不能加親於孫而適使之絶於父也有是理乎又案以上名孫為子晉書司馬彪傳彪字紹統髙陽王睦之長子也出後宣帝弟敏少篤學不倦然好色薄行為睦所責故不得為嗣雖名出繼實廢之也彪由此不交人事而專精學習故得博覽羣集終其綴集之務蕙田案睦父進為敏兄且身列諸侯王則彪乃繼祖之適孫也敏雖無子而兄弟之子固不乏人睦以愛憎之私妄將適子後敏長㓜昭穆皆所不顧人之愚昧一至此乎又案此以長房適子為㓜房後魏書胡叟傳年八十而卒無子無有家人營主凶事者胡始昌迎而殯之於家𦵏於墓次即令一弟繼之襲其爵始復男虎威將軍叟與始昌雖為宗室不相好附于其存也徃來乃簡及亡而收恤至厚議者以為非必敦衰疎宗或縁求利品秩也宋史李至傳至七嵗而孤鞠於飛龍使李知審家及貴即逐其養子以利其資知審因之亦至右金吾衛大將軍癸辛雜識止安陳公振字震亨居吳門無子有同姓昌世者為人端慤每加敬愛因延之家塾常從容與言命繼之事且託之訪歴乆未有所啟問之以難其人爲對則曰得如子者乃佳昌世皇恐不敢當又乆之問如初昌世謝未敢輕有所進乃曰如此則無出于子矣昌世固辭不敢强之再三乃勉承命後因語及曩嘗夢謁家廟覺有拜於後者顧視則昌世也此意遂决昌世以其澤入仕嘗倅三州攝郡於公帑纎毫無所取穆陵聞之擢為郎淳祐間事也北溪字義在今世論之立同宗又不可泛蓋姓出于上世聖人之所造正所以别生分類自後有賜姓匿姓者又皆混雜故立宗者又不可恃同姓為慿湏擇近親有來歴分明者立之則一氣所感父祖不至失祀蕙田案同姓而不知世系所出猶異姓也夫虞有出於帝舜者爲嬀姓有出於虞仲者爲姬姓曹有出於振鐸者爲姬姓有出於邾婁者爲曹姓後世之姓與古初之姓有名異而實同或字同而實異安在其可以爲後乎又案此以同姓非宗爲後春秋襄五年夏叔孫豹鄫世子巫如晉公羊傳外相如不書此何以書爲叔孫豹率而與之俱也叔孫豹則曷爲率而與之俱蓋舅出也何注巫者鄫前夫人襄公母姊妹之子也俱莒外孫故曰舅出莒將滅之故相與徃殆乎晉也注殆疑疑讞于晉齊人語莒將滅之則曷爲相與徃殆乎晉取後乎莒也其取後乎莒奈何莒女有爲鄫夫人者蓋欲立其出也注時莒女嫁為鄫後夫人夫人無男有女還嫁之于莒有外孫鄫子愛後夫人而無子欲立其外孫書者善之得為善者雖揚父之惡救國之滅者可也秋公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾婁子滕子薛伯齊世子光呉人鄫人於戚公羊傳吳何以稱人注據上善稻之㑹不稱人吳鄫人云則不辭注方以吳抑鄫國故進吳稱人何以抑鄫者經書莒人滅鄫又與巫訴晉當存惡鄫文必以吳者夷狄尚知父死子繼故以甚鄫也襄六年莒人滅鄫公羊何注莒稱人者莒公子鄫外孫稱人者從莒無大夫也言滅者以異姓為後莒人當坐滅也不月者取後于莒非兵滅祀榖梁范注莒是鄫甥立以爲後非其族類神不歆其故言滅榖梁傳非滅也注非以兵滅中國日卑國月夷狄時鄫中國也而時非滅也家有既亡國有既滅注滅猶亡亡猶滅家立異姓為後則亡國立異姓為嗣則滅既盡也滅而不自知由别之而不别也莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也楊疏言鄫所以滅者立嗣須分别同姓而鄫不别也胡傳或曰鄫取莒公子為後罪在鄫子不在莒人春秋應以梁亡之例而書鄫亡不當但責莒人也今直罪莒舍鄫何哉曰莒人之以其子為鄫後與黄歇進李園之妹於楚王吕不韋獻邯鄲之姬于秦公子其事雖殊其欲滅人之祀而有其國則一也春秋所以釋鄫而罪莒歟以此防民猶有以韓謐爲世嗣昏亂紀度如郭氏者李氏亷曰滅鄫之說先儒所以不取左氏者豈非以昭四年復有魯取鄫之文故以此為非實滅乎趙子案其事情以爲莒人以兵破鄫立其子使守之而爲附庸其子又鄫之外甥令奉鄫祀然神不歆非類是使鄫絶祀故須書滅公榖但傳得立鄫甥守祀之說而不知事實耳莒今滅為附庸後魯取之故復書取也究此則三傳亦互相通此恐得其實三傳拆諸徐徤菴曰汪氏云鄫無後而以莒之子為後鄫未嘗無後也㐮五年經稱鄫世子巫是知其立巫為後告於大國者也舍衆著之適長而暱於牀第之情迎異姓為後其罪浮於賈充軰逺矣先王之制禮也大宗無後者為之置後今鄫本有後也而反立異姓以爲後何爲而不滅亡與按律乞養異姓義子以亂宗族者杖六十若以子與異姓人為嗣者罪同其子歸宗此乞養異姓子亦言無後者耳若鄫莒之事又律文所不載當從重科斷者也三國志馬忠傳忠字德信少養外家姓狐名篤後乃復姓改名忠王平傳平字子均本養外家何氏後復姓王朱然傳然字義封治姊子也本姓施氏初治未有子然年十三乃啟䇿乞以爲嗣魏氏春秋陳矯本劉氏子出嗣舅氏而婚于本族徐宣每非之庭議其闕太祖惜矯才量欲擁全之乃下令曰䘮亂以來風教凋薄謗議之言難用褒貶自建安五年以前一切勿論其以斷前誹議者以其罪罪之晉書陳騫傳騫父矯魏司徒矯本廣陵劉氏為外祖陳氏所養因而改焉賈充傳充無嗣及薨充婦郭槐輙以外孫韓謐為黎民子充子黎民三嵗死奉充後郎中令韓咸中尉曹軫諫曰禮大宗無後以小宗支子後之無異姓爲後之文無令先公懷腆后土良史書過豈不痛心槐不從咸等上書求改立嗣不報槐遂表陳是充遺意詔曰太宰魯公充崇德立勲勤勞佐命背世殂殞每用悼心又𦙍子早終世嗣未立古者列國無嗣取始封支庶以紹其統而近代更除其國至於周之公旦漢之蕭何或預建元子或封爵元妃蓋尊顯勲庸不同常例太宰素取外孫韓謐為世子黎民後吾退而斷之外孫骨肉至近推恩計情合於人心其以謐爲魯公世孫以嗣其國自非功如太宰始封無後皆不得以為例秦秀傳充薨秀議曰充舍宗族弗授而以異姓爲後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親耶但以義推之則無父子耳又案詔書自非功如太宰始封無後如太宰所取必已自出如太宰不得以爲比然則外孫爲後自非元功顯德不之得也天子之禮蓋可然乎絶父祖之血食開朝廷之禍門諡法昏亂紀度曰荒請諡荒公不從魏書髙崇傳崇字積善父潛顯祖初歸國賜爵開陽男居遼東詔以沮渠牧犍女賜潛爲妻封武威公主拜駙馬都尉加寧逺將軍卒舅氏坐事誅公主痛本生絶嗣遂以崇繼牧犍後改姓沮渠景明中啟復本姓襲爵舊唐書李叔明傳本姓鮮于氏大歴末有閬州嚴氏子上疏稱叔明少孤養子於外遂冐姓焉請復之詔從焉叔明初不知其從外氏姓意醜其事遂抗表乞賜宗姓代宗以戎轅寄重許之仍寘嚴氏子于法宋史葉夢鼎傳本陳待聘之子七嵗後於母族蕙田案異姓為後固爲非禮然直書不諱則本系尚明傳中言召赴行在丁本生母憂蓋與爲伯叔後者同行出降之禮此是當時父命使然倘葉氏無後可立而待聘别自有子固不容自復本宗而視葉之絶嗣也若諱言非禮而沒所由來則尤不可矣元史王鶚傳無子以壻周鐸子之綱承其祀明史外戚傳陳公淳皇后父也追封揚王王無子生二女長適季氏次即皇太后晚以季氏長子爲後陳泰傳㓜從外家曹姓既貴乃復故王得仁傳本謝姓父避讐外家因冐王氏夏良勝傳徐鰲本髙氏子少孤依舅京師冐徐姓從其業爲醫蕙田案世俗視兄弟之子甚疏而視女及女夫甚親于是有不立應繼而甘招贅壻亦有不得已而立後而與贅壻分支作兩房者其爲非禮不待論矣倘有㣲族單門伶仃孤子實無宗支應繼之人者若不招壻則無以自存此安得不以外孫承祀乎曰是有説焉夫既無應繼則所有財産不得不歸之女壻外孫女壻外孫既得其財産不得不承其祭祀此情理之必然者也雖曰鬼神不享非類然古之有功德於天下者則天下祭之有功德於一國一鄉者則一國一鄉祭之以云報也今以庶民之家宮室衣食俱蒙婦翁外祖之庇則亦有功德於一家一人者也柰何不祭之以報乎然其祭之也宜主之以外孫而不主之以壻沒外孫之身而止或外孫生子早識其祖母之父母則亦祭之沒身而止明其殺於本宗也而其祝文稱謂則仍以外祖外曾祖爲名而外孫外曾孫仍自姓其本姓此不得已之變通亦庶幾亡於禮者之禮也若乃更其姓氏易其稱謂使自廢其祖先之祀甚乃忘其所自而通婚於同宗是謂陷人非禮有識者所當深戒又案此以女壻外孫爲後北齊書髙隆之傳隆之字延興本姓徐氏云出自髙平金鄉父幹魏白水郡守爲姑壻髙所養因從其姓五代史周本紀世宗本姓柴氏柴氏女適太祖是為聖穆皇后后兄守禮子榮㓜從姑長太祖家以謹厚見愛太祖遂以爲子宋史程瑀傳瑀字伯㝢饒州浮梁人其姑臧氏婦養瑀爲子及姑殁始復本姓累官至校書郎爲臧氏父母服蕙田案姊妹之子猶有血氣之屬妻兄弟子何人而可以爲後乎在已則妻為夫綱在其子必知母而不知父矣真可憫也又案以上以妻兄弟子爲後北齊書獨孤永業傳永業字世基本姓劉母改適獨孤氏永業㓜孤隨母爲獨孤家所育養遂從其姓隋書王充傳充字行滿祖支頽耨徙居新豐頽耨死其妻少寡與儀同王粲野合生子曰瓊粲遂納之以爲小妻其父收㓜孤隨母嫁粲粲愛而養之因姓王氏官至懷汴二州刺史王充本王世充隋書以唐諱去之也唐書安禄山傳禄山營州栁城胡也本姓康母阿史德爲覡居突中禱之于軋犖山虜所謂閗戰神者既而妊及生有光照穹廬野獸盡鳴望氣者言其祥范陽節度使張仁愿遣摉廬帳欲盡殺之匿而免母以神所命遂字軋犖山少孤隨母嫁虜將安延偃開元初偃擕以歸國與將軍安道買亡子偕來得依其家故道買子安節厚德偃約兩家為兄弟乃冐姓安更名禄山郭子儀傳子暖暖子銛尚西河公主主初降沈氏生一子銛無嗣以沈氏子嗣舊唐書元載傳家本寒㣲父景昇任員外官載母擕載適景昇冐姓元氏青箱雜記范文正公㓜孤隨母適朱氏因冐姓朱名説後復本姓以啟謝時宰曰志在投秦入境遂稱於張禄名非霸越乘舟乃効于陶朱以范雎范蠡亦嘗改姓名故也明史熊概傳㓜孤隨母適胡氏冐其姓巡撫南畿浙江還始復姓蕙田案既娶改嫁之婦孤兒無依後夫養之亦聖人所不禁也但易姓以亂其宗則不可若其間情誼之厚薄禮制之重輕詳䘮服繼父同居條宜叅考焉又案以上以妻前夫子爲後詩小雅小宛螟蛉有子蜾蠃負之教誨爾子式榖似之注螟蛉桑上小青蟲蜾嬴土蜂也取桑蟲負之于木空中七日化爲其子式用榖善也螟蛉有子則蜾蠃負之以興不似者可教而似教誨爾子用善而似之可也蜀志衛繼字子業兄弟五人繼父爲縣功曹繼兒時與兄弟隨父遊戯庭寺中縣長成都張君無子每呼其子省弄甚憐愛之因語功曹欲乞繼功曹即許之遂養為子繼敏逹夙成學識通博進仕州郡歴職清顯而其餘四人無堪當世者父恒言己之將衰張明府將盛也時法禁以異姓爲後故復爲衛氏陳書周文育傳文育字景德義興陽羡人也少孤貧本居新安夀昌縣姓項氏名猛奴年十一能反覆遊水中數里跳髙五六尺與羣兒聚戱衆莫能及義興人周薈爲夀昌浦口戌主見而竒之因召與語文育對曰母老家貧兄姊並長大困於賦役薈哀之乃隨文育至家就其母請文育養為己子母遂與之及薈秩滿與文育還都見于太子詹事周捨請製名字捨因爲立名文育字景德魏書胡叟傳叟字倫許安定臨涇人也不治産業常苦饑貧然不以爲恥養子字螟蛉以自給養每至貴勝之門恒乘一㹀牛弊韋袴褶而已作布囊容三四斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也五代史王晏球傳晏球字瑩之洛陽人也少遇亂為盗所掠汴州富人杜氏得之以爲子冐姓杜氏宋史安德裕傳父重榮晉成德軍節度德裕生未朞重榮舉兵敗乳母抱逃水竇中為守兵所得執以見軍校秦習習與重榮有舊因匿之習先養石守瓊為子及年壯無嗣以德裕付瓊養之因姓秦氏習卒德裕行三年服然後還本姓習家盡以槖裝與之凡白金萬餘兩德裕却之曰斯秦氏之蓄於我何有聞者髙之薛居正傳惟吉字世康居正假子也居正妻妬悍無子婢妾皆不得侍側故養惟吉愛之甚篤孝義傳劉孝忠母死孝忠傭為富家奴得錢以葬富家知其孝行養為己子後養父兩目失明孝忠爲䑛之經七日復能視申積中成都人襁褓中揚繪從其父起求之爲子及長知非揚氏而絶口不言年十九登進士第事所養父母盡孝終身有二弟一妹爲畢婚娶始歸本族復為申氏江萬里傳萬里無子以蜀人王橚子爲後即鎬也韓侂胄傳侂胄娶憲聖吳皇后姪女無子取魯子為後名㣉既誅侂胄削籍流沙門島癸辛雜識戴良齊云昔有宦家過屠門見㓜穉而愛之抱以為子戒抱者以勿言既長且承序矣嘗因祀先恍惚見受享者皆佩刀正坐而裹章服者列位其傍愕然以語保者保者始告以實自是當祀必先祀其所生而後祀其所為後者云命後者不可不知也遼史耶律隆運傳隆運本姓韓名德讓西南面招討使匡嗣之子也賜姓名薨無子清寧三年以魏王塔布子頁嚕為嗣天祚立以皇子額嚕温繼之蕙田案隆運本宗韓氏有弟有姪乃舍之不立而偏以耶律氏子為嗣細人之愛以姑息而不知適以殄其嗣悲夫金史章宗紀承安五年九月定皇族收義異姓男爲子者徒三年姓同者减二等明史外戚傳馬公髙皇后父也追封徐王王無後以外親武忠武聚為之張詩傳詩字子言順天人本農家李氏子八嵗時育於官恐當作宦家張氏閲三十年始知乃痛自悲悼覔得其兄弟哭諸父母之墓議歸宗終以張氏無子遂仍其舊蕙田案張詩可謂孝矣夫已之父母尚有兄弟張氏宗祀寄之一詩少受撫育長而背之于李無大益而于張為酷禍宜仁孝之人所不忍為也羅虞臣譜法或問譜法有進有黜曰他姓之子後吾宗雖成𣲖吾其猶黜諸吾宗之子為他姓後雖易世吾其猶進諸大清律其乞養異姓子以亂宗族者杖六十若以子與異姓人為嗣者罪同其子歸宗凡文武官員應合襲廕者若無嫡長嫡次庶出子孫許令弟姪應合承繼者襲廕若將異姓外人乞養為子瞞昧官府詐冐承襲者乞養子杖一百𤼵邊逺充軍本家所關俸給事𤼵截日住罷他人教令詐冐者同罪蕙田案異姓為後之失人皆知之不必為之贅説矣余獨以為事變無窮固有已成父子于前而不容頓然改正者又當量其緩急輕重而善處之若安德裕申積中張詩諸人或報恩而後反其宗或繼絶而終守其祀觀過知仁無乖情理是亦君子之所諒也若乃衣食乳哺深受其恩家産田園親享其利一旦托返本復始之名以行其負義忘恩之實以是爲禮又所謂是惡知禮意者矣又案以上以異姓爲後管子入國所謂恤孤者凡國都皆有掌孤士人死子孤㓜無父母所養不能自生者屬之其鄉黨知識故人養一孤者一子無征養二孤者二子無征養三孤者盡家無征掌孤數行問之必知其食飲饑寒身之膌胜而哀憐之此之謂恤孤魏書馮熙傳熙字晉昌文明太后之兄也父朗坐事誅熙生於長安爲姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母擕熙逃避至氐羗中撫育年十二好弓馬有勇幹氐羗皆歸附之魏母見其如此將還長安始就博士學問事魏母孝謹如事所生魏母卒乃散髪徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤髙祖以熙情難奪聽服齊衰期宋史后妃傳神宗欽成朱皇后開封人父崔傑早世母李更嫁朱士安后鞠於所親任氏熙寧初入宮進媫妤生哲宗哲宗即位尊為皇太妃紹聖中贈崔任朱三父皆至師保崇寧元年薨追冊爲皇后蕙田案三姓並贈典禮濫極矣然鞠養之恩不敢忘報固忠厚之道也凡在民庶可恝然歟大清律例其遺棄小兒年三嵗以下雖異姓仍聽收養即從其姓但不得以無子遂立爲嗣例凡乞養義子有情願歸宗者不許將分得財産擕回本宗其收養三嵗以下遺棄之小兒仍依律即從其姓但不得以無子遂立為嗣仍酌分給財産俱不必勒令歸宗如有希圖貲財冐認歸宗者照律治罪箋釋四嵗以上不報官收飬者以收留迷失子女論利輯注駁之蓋收養遺棄意在哀其死收留迷失意在其人情若有異也縱年至四五嵗不能自知其父母姓氏居址者自應收養以全其生如能明言父母姓名及居址何處即應查訪送還或報官喚人認領竟留而不言亦有不合苐不宜科以杖徒重罪耳或謂三四嵗兒成人後生父告認問以冐認良人爲子之罪斷還養父議者謂子無絶父母之理案父母忍心遺棄揆義已絶他人養成而認争之固有不合第其中或有正妻嫉妬抛棄不留夫主知情甚有家庭謀佔財産私抱棄置無由根尋者事變多端似不宜執一而論倘查明訊確實非本生父母遺棄現在年老無兒當令認償養費加倍謝酬勸諭收養者放回延其宗嗣亦體悉民情之一端也余曾有所見聞故特附筆於此大清律凡收留人家迷失子女不送官司而自收爲妻妾子孫者杖九十徒二年半其收留在逃者杖八十徒二年給親完聚蕙田案收養遺棄而藉以爲後則非禮矣又案以上收養遺棄附漢書外戚惠后傳呂太后欲其生子萬方終無子乃使陽爲有身取後宫美人子名之殺其母立所名子爲太子惠帝崩太子立為帝四年乃自知非皇后所出曰太后安能殺我母而名我我壯即爲所爲太后恐其作亂乃幽之永巷言帝病甚左右莫得見太后下詔廢之更立恒山王𢎞蕙田案太后欲張后有子詐取後宫子名之後宫所生亦安見其盡非帝子然推太后之心則其爲是否亦所不論嫌疑之際大臣遂盡舉誅之倘四子之中有一真惠帝子豈不因之而斬乎甚矣作偽之爲害也趙充國傳傳子至孫欽欽尚敬武公主無子主教欽良人習詐有身名它人子欽薨子岑嗣侯岑父母求錢財無已忿恨相告岑坐非子免國除三國志齊王芳紀芳字蘭卿明帝無子養王及秦王詢宫省事秘莫有知其所由來者北溪事義神不歆非類民不祀非族古人繼嗣大宗無子以族人之子續之取其氣脉相為感通可以嗣續無間此亦至正大公之舉而聖人所不諱也後世理義不明人家以無嗣為諱不肯顯立同宗之子多潛養異姓之兒陽若有繼而隂已絶矣仲舒繁露載漢一事有人家祭用祝降神祭畢語人曰適所見甚怪有官員公裳盛服欲進而躊躇不敢進有一鬼蓬頭祼袒手提屠刀勇而前歆其祭主人不曉其由有長老説其家舊日無嗣乃取異姓屠家之子爲嗣即今主祭者所以只感召得屠家父祖而來其繼立本家之祖先非其氣類自無交接感通之理蕙田案今繁露中絶無此文蓋是書本多殘闕或宋時善本尚多别有見也但詳其文氣殊與繁露不類豈或有記憶之誤歟否則繁露曾有此事撮其事述之而非董之原文歟皆不可知也疑即癸辛雜識戴良齋云云一條北溪誤憶耳明史諸王傳楚恭王英㷿薨子華奎㓜萬歴八年始襲爵三十一年楚宗人華趆等言華奎與弟宣化王華壁皆非恭王子華奎乃恭王妃兄王如言子抱養宫中華壁則王如綍家人王玉子也華趆妻即如言女知之悉禮部侍郎郭正域請行勘大學士沈一貫右華奎委撫按訊皆言偽王事無左驗而華趆妻持其説甚堅不能决廷議令覆勘中㫖以楚襲封已二十餘年宜治華趆等誣罔御史錢夢臯為一貫劾正域正域𤼵華奎行賄一貫事華奎遂訟言正域主使正域罷去東安王英燧武岡王華増江夏王華塇等皆言僞跡昭著行賄有據諸宗人赴都投揭奉㫖切責罰禄削爵有差華趆坐誣告降庶人錮鳯陽未幾華奎輸賄入都宗人遮奪之巡撫趙可懷屬有司捕治宗人藴鉁等方恨可懐治楚獄不平遂大閧毆可懐死巡按吳楷以楚叛告一貫擬𤼵兵㑹勦命未下諸宗人悉就缚於是斬二人勒四人自盡錮高牆及禁間宅者復四十五人三十三年四月也自是無敢言楚事者久之禁錮諸人以恩詔得釋而華奎之真僞竟不白郭正域傳先是楚恭王得廢疾隆慶五年薨遺腹宫人胡氏孿生子華奎華壁或云内官郭綸以王妃兄王如言妾尤金梅子為華奎妃族人如綍奴王玉子爲華壁儀賓汪若泉嘗許奏之事下撫按王妃持甚堅得寢萬歴八年華奎嗣王華壁亦封宣化王宗人華趆者素强禦忤王華趆妻如言女也是年遣人訐華奎異姓子也不當立一貫屬通政使沈子木格其疏勿上月餘楚王劾華趆疏至乃上之命下部議未幾華趆入都訴通政司邀截實封及華奎行賄狀楚宗與名者凡二十九人子木懼召華趆更令易月日以上㫖并下部正域請勅撫按公按從之初一貫屬正域毋言通政司匿疏事及華趆疏上正域主行勘一貫言親王不當勘但當體訪正域曰事關宗室臺諫當亦言之一貫㣲笑曰臺諫斷不言也及帝從勘議楚王懼奉百金爲正域夀且屬毋竟楚事當酬萬金正域嚴拒之已而湖廣巡撫趙可懐巡按應朝卿勘上言詳審毋左騐而王氏持之堅諸郡主縣主則云罔知真僞乞特遣官再問詔公卿雜議於西闕門日晏乃罷議者三十七人各具一單言人人殊李廷機以左侍郎代正域署部事正域欲盡録諸人議廷機以辭太繁先撮其要以上一貫遂嗾給事中楊應文御史康丕揚劾禮部壅閼羣議不以實聞正域疏辨且𤼵子木匿疏一貫阻勘及楚王饋遺狀一貫益恚謂正域遣家人導華趆上疏議令楚王避位聽勘私庇華趆當是時正域右宗人大學士沈鯉右正域尚書趙世卿謝傑祭酒黄汝良則右楚王給事中錢夢臯遂希一貫㫖論正域詞連次輔鯉應文又言正域父懋嘗笞辱於楚恭王故正域因事陷之正域疏辨留中不報一貫鯉以楚事皆求去廷機復請再問帝以王嗣位二十餘年何至今始𤼵且夫訐妻証不足憑遂罷楚事勿按正域四疏乞休去沈一貫傳萬歴三十一年楚府鎮國將軍華趆訐楚王華奎為假王一貫納王重賄令通政司格其疏月餘先上華奎劾華趆欺罔四罪疏正域楚人頗聞假王事有狀請行勘虚實以定罪案一貫持之正域以楚王饋遺書上帝不省及撫按臣會勘并廷臣集議疏入一貫力右王嗾給事中錢夢臯楊應文劾正域勒歸聽勘華趆等皆得罪董漢儒傳楚宗五十餘人訐假王事獲罪囚十載漢儒力言王假也請釋繫者外戚邵喜傳世宗大母邵太后弟也封昌化伯子蕙嗣嘉靖二年卒無子族人争嗣初太后入宫時父林早殁太后弟四人宗安宣喜宗宣無後及蕙卒帝令蕙弟萱嗣蕙姪錦衣指揮輔千戸茂言萱非嫡𣲖不當襲蕙母争之議乆不决大學士張璁等言邵氏子孫已絶今其争者皆傍支不宜嗣時帝必欲爲喜立後乃以喜兄安之孫杰為昌化伯明年明倫大典成命武定侯郭勛頒賜戚畹弗及杰杰自請之帝詰勛勛怒錄邵氏争襲章奏訐杰實他姓請覆勘帝不聽㑹給事中陸粲論大學士桂萼受杰賂使奴𨽻冐封爵帝怒下粲獄而盡革外戚封杰亦奪襲蕙田案三代以下各親其親各子其子人情所同也己無子而可取他人子名之是己子不足以爲親人子不足以爲疎也此豈其情也哉觀史書所載詐爲有子者若漢之惠后敬武公主明之楚藩類皆出於婦女之所為内懷嫉妬外要權寵遂至斬其夫之世緒而不顧斯已惑矣至若近世士夫之家尚有合謀妻妾詐為有身及宗族訴訟而折獄之官不容舍其父母之言偏狥無稽之訐告以致所名之子多得守田廬承祭祀不自知其爲餒而之鬼雖其事隱秘而所見所聞蓋間有之嗚呼彼獨非人情乎蓋嘗深原其故而知其吞聲飲恨甘心爲此下下之䇿者良由憤激至深而非真以為宗支享祀之計也何則人生無子大不幸之事也無子而人以子繼之甚盛德之舉也當大不幸之時而受其甚盛德之舉此其兄弟之情宜益篤而其繼立之父子宜益親然而若是者不多見何也薄俗寡恩惟知貪利其人中年無子方以爲憂而兄弟之間已若有喜色其人晚年得子方以爲喜而兄弟之子反若失所望此其幸灾樂禍之心根于寤寐見諸聲色無子之人未有不爲之痛心者也卒也耄年無子或有子而不育而彼之乆懷覬覦者遂將肆然據之爲己有是所為兄弟叔姪者乃路人之不若而讐人之不啻也然則無子者欲以我之田園産業一旦付之讐人則寧付之路人之爲愈也然又不可正告親族曰我將以與路人也則莫如取路人之子而强名之陽以博嗣續之名而快意於一時隱以絶覬覦之心而洩憤於平日即彼明知其爲抱養他族而勢不容以口舌争也至於身後之事鬼神之享杳𣺌無憑之事亦何暇計及哉此其所以悍然行之而不顧也夫人以私情之忿遂至亂其族類絶其享祀而不恤其爲非禮無識誠無所逃其罪矣然以情事言之則激成其事者罪又甚焉何也無子之人處凄凉煢獨之境罄其資財以與人者期于無子而有子也乃未事之先耽耽虎視得之之後了無德色此其撫心悲恨情事固所難堪若彼爲兄爲弟爲姪者處安常之境而生兼并之謀利羡餘之財而幸骨肉之絶致使其人痛心疾首忽思變計從此遂成讐隙而不可復合則族類之所以亂祭享之所以絶雖曰彼自為之其能不以激成之者為罪之魁也哉又案以上名他人子附魏書崔元伯傳弟徽子衡衡長子敞敞弟鍾敞亡後鍾貪其財物誣敞息子積等三人非敞之嗣辭訴累嵗人士嫉之宋史韓億傳知洋州州豪李甲兄死廹嫂使嫁因誣其子為他姓以專其貲嫂訴於官甲輙賂吏掠服之積十餘年訴不已億視舊牘未嘗引儒醫爲証召甲出乳醫示之甲亡以爲辭寃遂辨元史順帝紀及明宗崩文宗復正大位至順元年四月明宗后班布爾實被讒遇害遂徙帝於高麗使居大青中不與人接閲一嵗復詔天下言明宗在朔漠之時素謂非其己子移于廣西之静江虞集傳文宗在上都將立其子喇特納達喇爲皇太子乃以托歡特穆爾太子乳母夫言明宗在日素謂太子非其子黜之明史孫燧傳六月乙亥宸濠生日宴鎮巡三司明日燧及諸大吏入謝宸濠伏兵左右大言曰孝宗為李廣所誤抱民間子我祖宗不血食者十四年今太后有詔令我起兵討賊亦知之乎衆相顧愕眙燧直前曰安得此言請出詔示我宸濠曰毋多言我徃南京汝當扈駕燧大怒曰汝速死耳吾豈從汝爲逆哉蕙田案宸濠叛逆所謂路人皆知其心者也然其𤼵端藉口於民間子可謂詐而愚矣乃世之謀奪承嗣者猶紛紛以誣訐抱養為得計其皆宸濠之故智乎然宸濠曾借是以成其事乎夫亦可以悟矣王守仁傳子正億隆慶初襲新建伯子承勛嗣子先進無子以弟先逹子業𢎞繼先逹妻曰伯無子爵自傳吾夫由父及子爵安徃先進怒因育族子業洵為後及承勛卒先進未襲死業洵自以非嫡嗣終當歸爵先逹且虞其争乃謗先逹爲乞養而别推承勛弟子先通當嗣屢争於朝數十年不决崇禎時先逹子業𢎞與先通疏辨而業洵兄業浩時為總督所司懼忤業浩竟以先通嗣業𢎞憤持疏入禁門訴自刎不殊執下獄尋釋先通襲伯四年流賊陷京師被殺蕙田案先進爲陽明嫡曾孫義不可絶者也業𢎞雖不言有兄弟與否然嫡伯無子便當入嗣襲爵禮之正也先逹妻既不肯以子入嗣則當别立兄弟之子近支果無其人則育業洵而子之亦禮之正也夫業洵之支屬雖疎然於先進為子行先通之服屬雖近然於先進爲堂弟既可絶先進而别嗣其爵則先逹爲承勛次子宜其有以藉口而争者反至無詞於是而乞養之謗興矣是其争訐不已之端一起於業𢎞之不肯入嗣再搆於業洵之不襲而反襲一堂弟之先通也故先通有子則當改嗣無子則立業洵此兩言而决者也乃告訐紛紛至於朝議不能為之决何歟蓋大禮議後倫紀不明先逹妻之説正世宗所謂嗣位不嗣統者也利始祖之爵禄而絶大宗之祭祀上行下效相襲成風揆厥所由蓋璁萼之流毒逺矣又案以上誣指人為非其父所生附宋史程顥傳爲晉城令富人張氏父死旦有老叟踵門曰我汝父也子驚疑莫測相與詣縣叟曰身為醫逺出治疾而妻生子貧不能養以與張顥質其騐取懷中一書進其所記曰某年月日抱兒與張三翁家顥問張是時纔四十安得有翁稱叟駭謝大清律若冐認良人爲妻妾子孫者杖九十徒二年半蕙田案晉城老叟特欲誣此少年冀其養贍不知即果其子亦當令張氏别立應繼而子隨叟歸富人之利仍無與也又有孤兒㓜小宗族争繼而賄買閒人冐認己子并質証者此皆譸張為幻之徒彼貧寠之人以子與富人抱養必不利一時之酬謝而使子失一生之産業此人情也然則真者必不認認者必不真居官者慎無爲所惑也又案以上冐認人為己所生附又案立後之失至異姓亂宗止矣其間若收養遺棄名他人子甚至誣指人爲非其父所生冐認人為己所生皆異姓爲後之變態也自立後之義不明遂爲世道人心之害因連類附之以爲烱鑑若夫史傳所載更有義兒及中官養子則又理外之事與立後無關不贅入焉右立後之失蜀志諸葛亮傳喬字伯松亮兄瑾之第二子也本字仲慎初亮未有子求喬為嗣亮以喬為己嫡子故易其字焉年二十五卒子攀諸葛恪見誅於吳子孫皆盡而亮自有胄裔故攀後為瑾後晉書彭城王權傳子康王釋薨子雄立坐奔蘇峻伏誅更以釋子紘嗣紘字偉德初繼髙密王據雄誅入繼本宗嵇紹傳子聄早夭以從孫翰襲封成帝時以翰為奉朝請翰以無兄弟自表還本宗魏書城陽王長夀傳長夀長子多侯早卒次子鸞字宣明始繼叔章武敬王及兄卒還襲父爵宋史禮志熙寧二年同修起居注直史館蔡延慶父褒故太尉齊之弟也齊初無子子延慶後齊有子而褒絶請復本宗禮官以請許之大清律若所養父母有親生子及本生父母無子欲還者聽若養同宗之人爲子所養父母無子所生父母有子而捨去者杖一百𤼵付所養父母收管蕙田案以上本生無子歸宗晉書皇甫謐傳出後叔父後叔父有子既冠謐年四十䘮所生後母遂還本宗南齊書魚服侯子響傳子響字雲音世祖第四子也豫章王嶷無子養子響後有子表留為嫡永明六年有司奏子響體自聖明出繼宗國大司馬臣嶷昔未有嗣所以因心鞠養陛下𢎞天倫之愛臣嶷深猶子之恩遂乃繼體扶疏世祚垂改茅蔣菴蔚冡嗣莫移誠欣惇睦之風實虧立嫡之教臣等參議子響宜還本乃封巴東郡王隋書鄭譯傳譯父道邕魏司空譯從祖開府文寛尚魏平陽公主則周太祖元后之妹也主無子太祖令譯後之由是譯少爲太祖所親文寛後誕二子譯復歸本生大清律例若立嗣之後却生子其家産與原立子均分蕙田案以上所後有子歸宗通典東晉成帝咸和五年散騎侍郎賀喬妻于氏上表云妾昔初奉醮歸於賀氏後嗣不殖母兄羣從以妾犯七出數告賀氏求妾還妾姑薄氏過見矜愍無子歸之天命婚姻之好義無絶離故使夫喬多立側媵喬仲兄羣哀妾之身恕妾之志數謂親屬曰于新婦不幸無子若羣陶新婦生前男以後當以一子與之陶氏既産澄馥二男其後子輝再孕羣即白薄若所育是男以乞新婦妾敬諾拜賜先為衣服以待其生輝生之日洗浴斷臍妾即取還服下乳以乳之陶氏時取孩抱羣恒訶止婢使有言其本末者羣輙責之誠欲使子一情以親妾而絶本恩於所生輝百餘日無命不育妾誠自悲傷為之憔悴姑長上下益見矜憐羣續復以子率重見鎮撫妾所以訖心盡力者如養輝故率至于有識不自知非妾之子也率生過周而喬妾張始生子纂于是羣尚平存不以爲疑原薄及羣以率賜妾之意非唯以續喬之嗣乃以存妾之身妾所以得終奉烝嘗於賀氏縁守羣信言也率年六嵗纂年五嵗羣始䘮亡其後言語漏洩而率漸自嫌爲非妾所生率既長與妾九族内外修姑姨之親而白談者或以喬既有纂其率不得乆安爲妾子若不去則是與為人後去年率即歸還陶氏喬時寢疾曰吾母兄平生之日所共議也陌上遊談之士遽能深明禮情當與公私共論正之尋遂䘮亡率既年小未究大義動於遊言無以自處妾亦婦人不逹典儀惟以聞於先姑謂妾養率以為己子非所謂為人後也妾受命不夭嬰此煢獨少訖心力老而見棄曾無蜾臝式榖之報婦人之情能無怨結謹備論其所不解者六條其所疑十事如左夫禮所謂人後者非養子之謂而世不深案禮文恒令此二事以相疑亂處斷所以大謬也凡言後者非並時之稱明死乃主䘮生不先養今乃以生為人子亂於死爲人後此妾一不解也今談者以喬自有纂不嫌率還本也原此失禮為後之意傳曰為人後者孰後後大宗也今喬上非大宗率不為父後何繫於有纂無纂乎此妾二不解也夫以支子後大宗者為親屬既訖無以序昭穆列親疏故繫之以宗使百代不遷故有立後之制今以兄弟之子而比之族人之子後大宗此妾三不解也凡為後者降其本親一等以成人之性奉父母之命而出身於彼豈不異嬰孩之質受成長於人不識所生惟識所養者乎鄙諺有之曰黄雞生卵烏雞伏之但知為烏雞之子不知為黄雞之兒此言雖小可以喻大今以義合之後比成育之子此妾四不解也孔傳曰爲人後者為所後祖父母妻妻之父母昆弟昆弟之子若子若子者義比於子而恩非子也故曰爲後者異於為子也今乃以爲後之公義奪育養之至恩此妾五不解也與為人後者自謂大宗無後族人既以選支子爲之嗣矣今人之中或復重為之後後人者不二之也自非殉爵則必貪財其舉不主於仁義故尤之也非謂如率為嫡長先定庶少後生而當以爲譏此妾六不解也妾又聞父母之於子生與養其恩相半豈抱胎之氣重而長養之功輕孔子曰子生三年然後免於父母之懷故服三年詩曰父兮生我母兮鞠我長我育我顧我畜我出入腹我欲報之恩昊天罔極凡此所歎皆養功也螟蛉之體化爲蜾臝班氏之族乳虎紀焉由此觀之哺乳之義參於造化也今率雖受四體於陶氏而成髪膚於妾身推燥居濕分肌損氣二十餘年已至成人豈言在名稱之間而忘成育之功此妾一疑也夫人道之親父子兄弟夫妻皆一體也其義父子手足也兄弟四體也夫惟一體之親故曰兄弟之子猶己子故以相宗也今更以一體之親擬族人之疎長養之實比出後之名此妾二疑也夫子之於父母其情一也而有以父之尊厭母之情以父之故斷母之恩以父之命替母之禮其義安取蓋取尊父命也凡嫡庶不分惟君所立是君命制于臣也慈母如母生死弗怠是父命之行于子也妾之母率尊命則由羣之成言本義則喬之猶子計恩則妾之懐抱三者若此而今棄之此妾三疑也諸葛亮無子取兄瑾子喬為子喬本字仲慎及亮有子瞻以喬為嫡故改字伯松不以有瞻而遺喬也蓋以兄弟之子猶己子也陳夀云喬卒之後諸葛恪被誅絶嗣亮既自有後遣喬子攀還嗣瑾祀明恪不絶嗣則攀不得還亮近代之純賢瑾正逹之士其兄弟行事如此必不陷子弟于不義而犯非禮於百代此妾四疑也春秋傳曰陳女戴嬀生桓公莊姜以為己子取而字之傳又曰爲人後者為之子徃而承之也取而字之者母也徃而承之者子也在母母之仁也則蜾臝之育螟蛉在子子之義也則成人之後大宗也茍能别以為己子與爲後之子不同文也則可與求禮情矣以義相况則宗猶父也父猶母也莊姜可得子戴嬀之子繫之于夫也兄弟之子可以爲子繫之于祖名例如此而論者弗尋此妾五疑也董仲舒一代純儒漢朝每有疑義未嘗不遣使者訪問以片言而折中焉時有疑獄曰甲無子拾道旁棄兒乙養之以爲子及乙長有罪殺人以狀語甲甲藏匿乙甲當何論仲舒斷曰甲無子振活養乙雖非所生誰與易之詩云螟蛉有子蜾臝負之春秋之義父爲子隱甲宜匿乙詔不當坐夫異姓不相後禮之明禁以仲舒之博學豈闇其義哉蓋知有後者不鞠養鞠養者非後而世人不别此妾六疑也又一事曰甲有子乙以乞丙乙後長大丙所成育甲因酒色謂乙曰汝是吾子乙怒杖甲二十甲以乙本是其子不勝其忿自告縣官仲舒斷之曰甲生乙不能長育以乞丙於義已絶矣雖杖甲不應坐夫拾兒路旁斷以父子之律加杖所生附于不坐之條其為予奪不亦明乎今説者不逹養子之義唯亂稱為人後此妾七疑也漢代秦嘉早亡其妻徐淑乞子而養之淑亡後子還所生朝廷通儒移其鄉邑録淑所養子還繼秦氏之祀異姓尚不為嫌况兄弟之子此妾八疑也吳朝周逸博逹古今逸本左氏之子爲周氏所養周氏又自有子時人不逹亦譏逸逸敷陳古今故卒不復本姓識學者咸謂當矣此妾九疑也爲人後者止服所後而為本父服周一也女子適人降所生二也為父後者爲出母無服三也諸侯之庶子不得服其母四也庶子爲王不敢服其母五也凡此五者非致人情禮稱以義斷恩節文立焉率情立行者蠻貊之道也患世人未能錯綜禮文表裡仁義亂於大倫故漢哀以諸侯嗣天子各還尊其私親以爲得周公嚴父之義而不知其大悖國典夫未名之子死而不哭既名之後哭而不服三殤之差及至齊衰所禀所受其體一也而長㓜異制等級若此又今世人生子徃徃有殺而不舉者君子不受不慈之責有司不行殺子之刑六親不制五服之哀賓客不修弔問之禮豈不以其蠢爾初載未夷於人乎生而殺之如此生而棄之受成長於他人則追名曰本吾子也乃全責以父子之恩自同長養之功此妾十疑也勅下太常廷尉禮律博士案舊典决處上博士杜瑗議云夫所謂為人後者有先之名也言其既沒於以承之耳非並存之稱也率為喬嗣則猶吾子羣之平素言又惻至其為子道可謂備矣而猥欲同之與爲人後傷情棄義良可悼也昔趙武之生濟由程嬰嬰死之日武為服三年䘮夫異姓名義其猶若此况骨肉之親有顧復之恩而無終始之報凡于氏所據皆有明證議不可奪廷史陳序議令文無子而養人子以續亡者後於事役復除無廻避者聽之不得過一人令文養人子男後自有子男及閹人非親者皆别爲户案喬自有子纂率應别為户尚書張闓議賀喬妻于氏表與羣妻陶辭所稱不同陶辭喬妻于氏無子夫羣命小息率爲喬嗣一年喬妾張生纂故驃騎將軍顧榮謂羣喬已有男宜使率還問與爲人後者不同故司空賀循取從子紘為子鞠養之恩皆如率循後有晚生子遣紘歸本率今欲喬即便見遣于表養率以爲己子非謂爲人後立六義十疑以明為後不並存之稱生言長嫡死乃言後存亡異名又云乞養人子而不以爲後見於何經名不虚立當有所附于古者無此事也今人養子皆以爲後于又云為人後者族人選支子為之嗣非謂如率為嫡長先定庶㓜後生而以爲譏此乃正率宜去非所以明其應留也且率以若子之輕義奪至親之重恩是不可之甚也于知禮無養子之文故欲因今世乞子之名而博引非類之物爲喻謂養率可得自然成子避其與後之譏乎丹陽尹臣謨議言辭清允折理精練難于之説要而合典上足以重一代之式愚以為宜如闓議周書豆盧寧傳初寧未有子養弟永安子勣及生子讚親屬皆請讚為嗣寧曰兄弟之子猶子也吾何擇焉遂以勣為世子世以此稱之及寧薨勣襲爵癸辛雜識昌化章氏昆弟二人皆未有子其兄先抱育族人一子未幾其妻得翃其弟言兄既有子盍以所抱子與我兄告其妻妻猶在蓐曰不然未有子而抱之甫得子而棄之人其謂我何且新生那可保也弟請不已嫂曰不得已寧以我新生與之弟初不敢當嫂卒與之已而二子皆成立長曰翃字景韓季曰詡字景虞翃之子樵槱詡之孫鑄鑑皆相繼登第遂為名族孝友睦婣之報如此婦人有識尤可尚也歸有光金守齋墓誌初子喬未生時即以沐齋先生守齋兄之季子為嗣名之曰嵒撫愛如己子嵒亦不知其非己出也君春秋六十有三以嘉靖某年月日終二子即嵒喬蕙田案以上所後生子不歸宗歸有光題立嗣辨錫命無子而同父弟宜亦未有子故以同祖兄寵之子能白為子時寵有三子故以能白與錫命子之其理順矣迨後宜生三子而寵子皆殁議者謂能白當還寵而宜子當後錫命錫命是以爲此辨以為等之兄弟之子而二十餘年蜾臝式榖之恩不忍更也不忍更者情也情之所在即禮也昔諸葛亮取兄瑾子喬為子及亮有子瞻而恪被誅無嗣亮遣喬還嗣瑾祀錫命今尚無子與亮異而寵未嘗無子而無孫獨可使能白之子嗣之庶乎無憾也已蕙田案此條本生䘮子可立孫者不歸宗晉書高密王泰傳據薨無子以彭城康王子紘為嗣其後紘歸本宗立紘子俊以奉其祀蕙田案據與紘本從祖兄弟此襲封之制如古諸侯禮故不以行軰拘也歸宗立後則行軰無誤而情理兩合是可為法雖間代亦可也又案此條歸宗而以子後所後宋史禮志淳熙四年十月二十七日户部言知蜀州吳擴申明乞自今養同宗昭穆相當之子夫死之後不許其妻非理遣還若養子破蕩家産不能侍養實有顯過即聽所養母愬官近親尊長証騐得實依條遣還仍公共繼嗣大清律例若繼子不得於所後之親聽其告官别立蕙田案以上所後不肖歸宗晉書河間王洪傳章武王混薨諸子皆沒於胡少子滔初嗣新蔡王確亦與其兄俱沒後得南還與新蔡太妃不協大興二年上疏以兄弟並沒遼東宜還所生太妃訟之事下太常太常賀循議章武新蔡俱承一國不絶之統義不得替其本宗而先後傍親案滔既被命為人後矣必須無復兄弟本國永絶然後得還所生今兄弟在逺不得言無且鮮卑恭命信使不絶自宜詔下遼東𤼵遣令還繼嗣本封滔今未得便離所後也元帝詔曰滔雖出養自有所生母新蔡太妃相待甚薄淊執意如此如其不聽終當紛紜更為不可今便順其所執還襲章武蕙田案太常之議禮也元帝之詔情也據禮則兄弟尚存不應歸宗論情則母子既乖不容强合蓋雖不可以為常法而不幸處變亦宜有以變通而兩全之矣宋書東平王子嗣傳子嗣字孝叔孝武帝第二十七子也大明七年生仍封東平王繼東平冲王休倩休倩母顔性理嚴酷泰始二年子嗣所生母景寧園昭容謝上表曰故東平冲王休倩託荄璿極岐嶷夙表降年弗永遺緒莫傳孝武皇帝敕妾子臣子嗣出繼爲後既承國祀方奉烝薦庶覃遐慶式延于逺而妾顔訓養非恩撫導乖理情闕引進義違負螟昔世祖平日詭申慈愛崩背未幾真性便𤼵猶逼畏崇憲少欲藏掩自兹以後專縱嚴酷實顯布宗戚宣灼宮闈用傷人倫爰惻行路妾天屬冥至感切實深伏願乾渥廣臨曲垂末照賜復改命還依本屬則妾母子雖隕之辰猶生之年許之晉熙王昶傳昶二妾各生一子並卒泰始六年以第六皇子爕字仲綏繼昶改封為晉熙王爕襲爵太宗既以爕繼昶乃下詔曰夫虎狼䕶子猴猨負孫毒性薄情亦有仁愛故識念氣類尚均羣品况在人倫可亡天屬晉熙太妃謝氏沈刻無親物理罕比征北公雖孝道無替而遭此不慈自少及長闕恩育之闕乃至休否莫關寒温不訪晨昏屏塞定省靡因事無違忤動致誚責毒句𤼵口人所難聞加惡備苦過於讎隙遂事憤于宗姻義傷于行路公故妃郗氏婦禮無違逢此嚴酷遂以憂卒用夭盛年又謝氏食則豐珍衣則文麗奉己之餘播覃羣下而諸孫纊不温體食不充饑付於姆妳之手縱以任軍之路遇其所生棄若糞土繿縷比之重囚窮困過於下使誠皇規方逺沙塞將一公修短不諱亦難豫圖兼妾女累弱一第領主防閑之道人理斯急朕所以詔第六子爕奉公爲嗣欲以毗整一門爲公繼紹但謝氏待骨肉至親尚相棄蔑况以義合免苦為難患萌防漸危機湏斷便可還其本家削絶蕃秩蕙田案以上所後不慈歸宗右爲後歸宗五禮通考卷一百四十七
