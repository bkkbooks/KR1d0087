body:
  text: 五禮通考卷一百八十七邢部尚書秦蕙田撰嘉禮六十觀象授時唐書志日躔盈縮略例曰北齊張子信積候合蝕加時覺日行有入氣差然損益未得其正至劉焯立盈縮躔衰術與四象升降麟德術因之更名躔差凡陰陽往來皆馴積而變日南至其行最急急而漸損至春分及中而後遲逮日北至其行最舒而漸益之以至秋分又及中而後益急急極而寒若舒極而燠若及中而雨㿩之氣交自然之數也焯術於春分前一日最急後一日最舒秋分前一日最舒後一日最急舒急同於二至而中間一日平行其説非是當以二十四氣晷景考日躔盈縮而密於加時元史志北齊張子信積候合蝕加時覺日行有日入氣差然損益未得其正趙道嚴復凖晷景長短定日行進退更造盈縮以求虧食至劉焯立躔度與四象升降雖損益不同後代祖述用之夫陰陽往來馴積而變冬至日行一度強出赤道二十四度弱自此日軌漸北積八十八日九十一分當春分前三日交在赤道實行九十一度三十一分而適平自後其盈日損復行九十三日七十一分當夏至之日入赤道內二十四度弱實行九十一度三十一分日行一度弱向之盈分盡損而無餘自此日軌漸南積九十三日七十一分當秋分後三日交在赤道實行九十一度三十一分而復平自後其縮日損行八十八日九十一分出赤道外二十四度弱實行九十一度三十一分復當冬至向之縮分盡損而無餘盈縮均有損益初為益末為損自冬至以及春分春分以及夏至日躔自北陸轉而西西而南於盈為益益極而損損至於無餘而縮自夏至以及秋分秋分以及冬至日躔自南陸轉而東東而北於縮為益益極而損損至於無餘而復盈盈初縮末俱八十八日九十一分而行一象縮初盈末俱九十三日七十一分而行一象盈縮極差皆二度四十分由實測晷景而得仍以算術推考與所測允合梅氏文鼎疑問問日有髙卑加減始於西法與曰古法有之且詳言之矣但不言卑髙而謂之盈縮耳曰日何以有盈縮曰此古人積候而得之者也秦火以還典章廢闕漢晉諸家皆以太陽日行一度故一歲一周天自北齊張子信積候合蝕加時始覺日行有入氣之差而立為損益之率又有趙道嚴者復凖晷景長短定日行進退更造盈縮以求虧食至隋劉焯立躔度與四序升降為法加詳厥後皆相祖述以為步日躔之凖蓋太陽行天三百六十五日惟只兩日能合平行一在春分前三日一在秋分後三日一年之內能合平行者惟此二日此外日行皆有盈縮而夏至縮之極每日不及平行二十分之一冬至盈之極又過於平行二十分之一兩者相較為十分之一以此為盈縮之宗而過此皆以漸而進退焉此盈縮之法所由立也曰日躔既每日有盈縮則歲周何以有常度曰日行每日不齊而積盈積縮之度前後自相除補故歲周得有常度也細考之古今歲周亦有微差此只論其大較則實有常度今以授時之法論之冬至日行甚速每日行一度有竒厯八十八日九十一刻當春分前三日而行天一象限古法周天四之一為九十一度三十分竒下同謂之盈初此後則每日不及一度其盈日損積九十三日七十一刻當夏至之日復行天一象限謂之盈末夫盈末之行每日不及一度而得為盈者以其前此之積盈未經除盡總度尚過於平行故仍謂之盈若其每日細行固悉同縮初此盈末縮初可為一法也試以積數計之盈初日數少而行度多其較為二度四十分盈末日數多而行度少其較亦二度四十分以盈末之所少消盈初之所多則以半歲周之日共一百八十二日六十二刻竒行半周天之度一百八十二度六十二分竒而無餘度矣夏至日行甚遲每日不及一度積九十三日七十一刻當秋分後三日而行天一象限謂之縮初此後則每日行一度有竒其縮日損積八十八日九十一刻復當冬至之日而行天一象限謂之縮末夫縮末之行每日一度有竒而亦得為縮者以其前此之積縮未能補完總度尚後於平行故仍謂之縮若其每日細行則悉同盈初此縮末盈初可為一法也試以積數計之縮初日數多而行度少其較為二度四十分縮末日數少而行度多其較亦二度四十分以縮末之所多補縮初之所少則亦以半歲周之日行半周天之度而無欠度矣夫盈縮既皆以前後自相除補而無餘欠則分之而以半歲周行半周天者合之即以一歲周行一周天安得以盈縮之故疑歲周之無常度哉問日有盈縮是矣然何以又謂之髙卑曰此則回回泰西之説也其説曰太陽在天終古平行原無盈縮人視之有盈縮耳夫既終古平行視之何以得有盈縮哉蓋太陽自居本天而人所測其行度者則為黃道黃道之度外應太虛之定位即天元黃道與靜天相應者也其度勻剖而以地為心太陽本天度亦勻剖而其天不以地為心於是有兩心之差而髙卑判矣是故夏至前後之行度未嘗遲也以其在本天之髙半故去黃道近而離地逺逺則見其度小謂太陽本天之度而人自地上視之遲於平行矣縮初盈末半周是太陽本天髙處故在本天行一度者在黃道不能占一度而過黃道遲是則行度之所以有縮也冬至前後之行度未嘗速也以其在本天之低半故去黃道逺而離地近近則見其度大亦謂本天之勻度而人自地上視之速於平行矣盈初縮末半周是太陽本天低處故在本天行一度者在黃道占一度有餘而過黃道速是則行度之所以有盈也且夫行度有盈縮而且日日不同則不可以籌䇿御而今以圜法解之不同心之理通之在髙度不得不遲在卑度不得不速髙極而降遲者不得不漸以速卑極而升速者不得不漸以遲遲速之損益循圜周行與算數相會是則盈縮之徵於實測者皆一一能得其所以然之故此髙卑之説深足為觀象授時之助者矣太陽之平行者在本天太陽之不平行者在黃道平行之在本天者終古自如不平行之在黃道者晷刻易率惟其終古平行知其有本天惟其有本天斯有髙卑以生盈縮不平行之率以平行而生者也惟其盈縮多變知其有髙卑惟其盈縮生於髙卑驗其在本天平行平行之理又以不平行而信者也夫不平行之與平行道相反矣而求諸圜率適以相成是蓋七曜之所同然而在太陽尤為明白而易見者也月五星多諸小輪加減故本天不同心之理惟太陽最明問以髙卑疏盈縮確矣然又有最髙之行何耶曰最髙非他即盈縮起算之端也盈縮之算既生於本天之髙卑則其極縮處即為最髙如古法縮限之起夏至也極盈處即為最卑如古法盈限之起冬至也亦謂之最髙衝或省曰髙衝然古法起二至者以二至即為盈縮之端也西法則極盈極縮不必定於二至之度而在其前後又各年不同故最髙有行率也其説曰上古最髙在夏至前今行過夏至後每年東移四十五秒今又定為一年行一分一秒十微何以徵之曰凡最髙為極縮之限則自最髙以後九十度及相近最髙以前九十度其距最髙度等則其所縮等何也以視度之小於平度者並同也古法以盈末縮初通為一限亦是此意髙衝為極盈之限則自髙衝以後九十度及相近髙衝以前九十度其距髙衝度等則其所盈亦等何也以視度之大於平度者並同也古法以縮末盈初通為一限亦是此意今據實測則自定氣春分至夏至一象限即古盈末限之日數與自夏至後至定氣秋分一象限即古縮初限之日數皆多寡不同又自定氣秋分至冬至一象限即古縮末限之日數與自冬至後至定氣春分一象限即古盈初限之日數亦多寡不同由是觀之則極盈極縮不在二至明矣曰若是則古之實測皆非與曰是何言也言盈縮者始於張子信而後之術家又謂其損益之未得其正由今以觀則子信時有其時盈縮之限後之術家又各有其時盈縮之限測驗者各據其時之盈縮為主則追論前術覺其未盡矣此豈非至髙者之有動移乎又古之盈縮皆以二十四氣為限至郭太史始加密算立為每日每度之盈縮加分與其積度由今考之則郭太史時最髙卑與二至最相近自律元戊辰逆溯至元辛巳三百四十八年而最髙卑過二至六度以今率每年最髙行一分一秒十微計之其時最髙約與夏至同度以西人舊率每年髙行四十五秒計之其時最髙已行過夏至一度三十餘分其距度亦不為甚逺也故盈縮起二至初無謬誤測算雖密秪能明其盈縮細分若最髙距至之差無緣可得非考驗之不精也問最髙有行能周於天乎抑只在二至前後數十度中東行而復西轉乎曰以理徵之亦可有周天之行也曰然則何以不徵諸實測曰無可據也古西士去今一千八百年以三角形測日軌記最髙在申宫五度三十五分今以年計之當在漢文帝七年戊辰自漢文帝戊辰順數至律元戊辰積一千八百算外此時西法尚在權輿越三百餘年至多祿某而諸法漸備然則所謂古西士之測算或非精率然而西史之所據止此矣又况自此而逆溯於前將益荒逺而髙行之周天以二萬餘年為率亦何從而得其起算之端乎是故以實測而知其最髙之有移動者只在此數千百年之內其度之東移者亦只在二至前後一宫之間若其周天則但以理斷而已曰以理斷其周天亦有説與曰最髙之法非特太陽有之而月五星皆然其加減平行之度者亦中西兩家所同也故中法太陽五星皆有盈縮太陰則有遲疾在西法則皆曰髙卑視差而已然則月孛者太陰最髙之度也而月孛既有周天之度矣太陽之最髙何獨不然故曰以理徵之最髙得有周天之行也問以最髙疏盈縮其義已足何以又立小輪曰小輪即髙卑也但言髙卑則當為不同心之天以居日月小輪之法則日月本天皆與地同心特其本天之周又有小輪為日月所居是故本天為大輪負小輪之心向東而移日月在小輪之周即邉也向西而行大輪移一度日月在小輪上亦行一度大輪滿一周小輪亦滿一周而盈縮之度與髙卑之距皆不謀而合回回法以七政平行為中心行度蓋謂此也凡日月在小輪上半順動天西行故其右移之度遲於平行為減在小輪下半逆動天而東故其右旋之度速於平行為加五星同理若在上下交接之時小輪之度直下不見其行謂之留際留際者不東行不西行無減無加與平行等此小輪上逐度之加減以上下而分者也若以入表則分四限小輪上半折半取中為最髙大輪下半折半取中則為最卑最卑最髙之點皆對小輪心與地心而成直線七政居此即與平行同度故為起算之端假如七政起最髙在小輪上西行能減東移之度半象限後西行漸緩所減漸少至一象限而及留際不復更西即無所復減然積減之多反在留際何也七政至此其視度距小輪心之西為大也在古法則為縮初既過留際而下轉而東行本為加度因前有積減僅足相補其視行仍在平行之西至一象限而及最卑積減之數始能補足而復於平行是為縮末又如七政至最卑在小輪下東行能加東移之度半象限後東行漸緩所加漸少至一象限而又及留際不復更東亦無所復加然積加之多亦在留際何也七政至此其視度距小輪心之東為大也在古法則為盈初過留際而上復轉西行即為減度然因前有積加僅足相消其視行仍在平行之東至一象限而復及最髙積加之度始能消盡而復於平行是為盈末此則表中入算加減從小輪之左右而分者也小輪之用有二其一為遲速之行在古法則為日五星之盈縮月之遲疾西法則總謂之加減即前所疏者是也其一為髙卑之距即回回影徑諸差是也凡七政之居小輪最髙其去人逺故其體為之見小焉其在最卑去人則近故其體為之加大焉驗之於日月交食尤為著明别條詳之是故所謂平行者小輪之心而所謂遲速者小輪之邉與其心前後之差即東西所謂髙卑者小輪之邉與其心上下之距也知有小輪而進退加減之行度逺近大小之視差靡所不貫矣然則何以又有不同心之算曰不同心之法生於小輪者也七政之本天即小輪心所行之道也假如七政在小輪最髙小輪心東移一象限七政之在小輪亦西行一象限為留際小輪心東移滿半周七政在小輪亦行半周為最卑由是小輪心東移滿二百七十度七政亦行小輪二百七十度至留際小輪心東移滿一周七政行小輪上亦行滿一周復至最髙若以小輪上七政所行聨之即成大圈此圈不以地心為心而别有其心故曰不同心圈也兩心之差與小輪之半徑等故可以小輪立算者亦可以不同心立算而行度之加減與視徑之大小亦皆得數相符也問二者之算悉符果孰為本法曰晶宇廖廓天載無垠吾不能飛形御氣翺步乎日月之表小輪之在天不知其有焉否耶然而以求朓朒之行則既有其度矣以量髙卑之距則又有其差矣雖謂之有焉可也至不同心之算則小輪實已該之何也健行之體外實中虛自地以上至於月天大氣所涵空洞無物故各重之天雖有髙卑而髙卑兩際只在本天七政各共之天相去甚逺其間甚厚故可以容小輪而其最髙最卑皆不越本重之內非别有一不同之心繞地而轉也不同心之天既同動天西運則其心亦既繞地而旋况七政兩心之差各一其率若使其不同之心皆繞地環行亦甚渙而無統矣故曰不同心之算生於小輪而小輪實已該之觀回回但言小輪可知其為本法而苐谷於西術最後出其所立諸圗悉仍用小輪為説亦足以徵矣論相因之理則不同心之算從小輪而生論測算之用則小輪之徑亦從不同心而得故推朓朒之度於小輪特親小輪心即平行度也從最髙過輪心作線至地心為平行指線剖小輪為二則小輪右半在平行線西為朒左半在平行線東為朓而求最髙之行以不同心立算最切最髙在天不可以目視不可以器測惟據朓朒之度以不同心之法測之而得其兩心之差是即為小輪之半徑於以作圗立算而朓朒之故益復犁然是故不同心者即測小輪之法也小輪心在本天七政在小輪體皆相連小輪心非能自動也小輪之動本天之動也七政亦非自動也七政之動小輪之動也其故何也蓋小輪心既與本天相連必有定處因本天為動天所轉與之偕西而不及其速以生退度故小輪心亦有退度焉算家紀此退度以為平行回回律所謂中心行度故曰小輪之動本天之動也然則小輪心者小輪之樞也樞連於本天不動故輪能動而七政者又相連於小輪之周者也小輪動則七政動矣故曰七政之動小輪之動也七政之居小輪也有一定之向本天挈小輪心東移而七政在小輪上常向最髙殆其精氣有以攝之也故輪心東移一度小輪上七政亦西遷一度以向最髙譬之羅金小輪者其盤也小輪心者置針之處也七政所居則針所指之午位也試為大圓周分三百六十度以法周天别為大圈加其上使與大圓同心而可運以法同心輪乃置羅金於大圈之正午而依針以定盤則針之午即盤之午此如小輪在最髙而七政居其頂與最髙同處也於是運大圈東轉使羅金離午而東此如本天挈小輪而東移也則盤針之指午者必且西移而向丁向未因正午所定之盤不復更置則此時之丁之未實為針之午如小輪從本天東移而七政西遷居小輪之旁以向最髙之方盤東移一度針亦西移一度盤東移一宫針亦西移一宫盤東行半周至大圓子位則針在盤上亦西移半周而反指盤之子此時盤之子實針之午此如小輪心行至最髙衝而七政居小輪之底在小輪為最卑而所向者最髙之方也盤東移三百六十度而復至午針亦西移一周而復其故矣是何也針自向午不以盤之東移而改其度自盤上觀之見為西移耳七政之常向最髙何以異是七政在小輪上常向最髙之方小輪以算視行視行非一故小輪亦非一也凡算視行有二法或用不同心輪則惟月五星有小輪而日則否何也以盈縮髙卑即於不同心之輪可得其度故不以小輪加減而小輪之用已藏其中也或用同心輪負小輪則日有一小輪月五星有兩小輪其一是髙卑小輪為日五星之盈縮月之遲疾即不同心之算七政所同也其一是合望小輪在月為倍離即晦朔弦望在五星為歲輪即遲留逆伏皆以距日之逺近而生故太陽獨無也若用小均輪則太陽有二小輪其一為平髙卑二為定髙卑而月五星則有三小輪其一二為平髙卑定髙卑與太陽同其三為太陰倍離五星歲輪與太陽異也凡此皆以齊視行之不齊有不得不然者然小輪之用不同而名亦易相亂如月離以髙卑輪為自行輪又稱本輪又曰古稱小輪其定髙卑輪五星稱小均輪月離稱均輪或稱又次輪至於距日而生之輪月離稱次輪五星或稱次輪或稱年歲輪然亦曰古稱小輪今約以三者别之一曰本輪七政之平髙卑是也一曰均輪七政平髙卑之輪上又有小輪以加減之為定髙卑此兩小輪相須為用二而一者也一曰次輪月五星距日有逺近而生異行故曰次輪而五星次輪則直稱之歲輪也蕙田案梅氏疏日行盈縮辨論不同心天及七政小輪最為詳確日有盈縮月有遲疾五星有留退其理一也舉日行而月五星皆可知矣梅氏之論實總七政之大綱故備述之觀承案日月五星雖統謂之七政其實五緯以日月為主而月離又以日躔為主故日躔定而七政始可齊也梅氏論日行盈縮舉日行而七政皆可知斯為能挈其要洵不刋之論也新法算引太陽之行黃道也論其積歲平分之數新法以天度計為五十九分八秒有竒所謂平行度分是也然平行齊而實行則固非齊矣冬盈而夏縮矣所以然者蓋緣黃道圈與日輪天不同心而黃道之心即地球心是日輪天與地球不同心也心既不同則日行距地近逺不等距近即行疾疾則所行之度過於平行而為盈每冬月一日計行一度一分有竒以較平行盈二分矣距逺即行遲遲則所行之度不及平行而為縮每夏月一日計行五十七分有竒以較平行則縮二分矣盈縮相差若此豈可謂之齊乎終歲之間但逢最髙限最卑限二日平實二行度數惟一此外兩行之較日日不等新法因其或過或不及也故有加分減分謂之加減差蓋以有恆率之平行為限而以加減差定之然後差而不差非齊而齊矣至論太陽之入某宫次以分節氣也亦有平實二算蓋算平行十五日二十一刻有竒為一節氣乃一歲二十四平分之一耳若用躔度之日以算則冬夏不齊冬一節氣為十四日八十四刻有竒夏一節氣為十五日七十二刻有竒總由夏遲冬疾故其差如此太陽天距地極逺之點謂之最髙極近之點謂之最髙衝亦名最卑此二點者乃盈縮二行之界古法於冬夏二至謂其恆在一點其實非也案古今諸測皆各不齊古測最髙在夏至前數度今則在後六度矣以此推知一年之內太陽自行四十五秒也蕙田案日行盈縮以髙卑又謂之不同心天及小輪之法推之極步算之巧妙梅氏謂小輪為本法髙卑因小輪而生誠確論也西人刻白爾又創撱圓立算專主不同心天與髙卑意同合古今中西法雖各殊要以推日之實行求其密合耳既得實行則定氣可知定氣之名見於隋書明氣以此為定恆氣非日實行不得為定也其名蓋非漫設唐以後猶以恆氣注數而定氣止為算交食之用踵一行之謬也今已用定氣梅氏尚堅主一行説得江氏恆氣注數辨千古之疑乃釋附江氏永恆氣注數辨江氏永曰改憲以來用定氣注數久矣勿庵梅氏嘗舉康熙己未以後積年髙行及四正相距時日别為一卷而云治數首務太陽太陽重在盈縮又云西法最髙卑之點在兩至後數度歲歲東移故雖冬至亦有加減不得以恆為定則梅氏亦重定氣矣而疑問補等書謂當如舊法之恆氣注數持論甚堅永深思之謂恆氣與平氣不同冬至既不得以恆為定則諸節氣亦當用定不可用恆爰引梅氏之説疏論其下梅氏文鼎疑問補曰問舊法節氣之日數皆平分今則有長短何也曰節氣日數平分者古法謂之恆氣其日數有多寡者謂之定氣二者之算古法皆有之然各有所用唐一行大衍議曰以恆氣注數以定氣算日月交食是則舊法原知有定氣但不以之注數耳江氏永曰案七政在天皆有平行有視行平行為步算之根視行為人事之用故月必以定朔定望推交食五星必以歲輪視度察陵犯太陽尤為氣化之主其用於人最大雖行於本天者一日一度此古之日度無盈縮進退而輪有髙卑人視黃道上度有盈縮則氣有長短一切分至啓閉及諸節氣皆當用其視行之定氣不當用其平行之恆氣也何以言之如云冬至夏至至者極也人視日極南極北立表測之景極長極短而晝夜之短長亦於此日為極也春分秋分黃道與赤道交日正當其交處陽律陰律於此分而晝夜時刻均亦於此日平分也若景非極長極短不得謂之至日不正當赤道不得謂之分故皆當用視度不用平度如史紀冬至有從測景得者書曰某日景長景長者定冬至非平冬至也平與定之差隨髙衝離冬至逺近而異元至元以前定冬至皆在平冬至前至元以後定冬至皆在平冬至後其相差之極亦如今之春秋分前後約二日日躔加減差表均數最多者二度有竒故平氣定氣能差二日有竒而術家紀冬至必據景長之日人事之最重大者如朝會圜丘皆以是日為定則自古以來冬至皆用定氣矣一歲節氣獨冬至用定其餘二十三氣皆用恆寧有是理况其所謂恆氣者並非恆氣也如欲定在天之恆氣當以太陽本天界為二十四段一段均得十五度據今法整度言之又以一歲三百六十五日二十三刻三分四十五秒之平歲實據今歲實平率言之分為二十四氣一氣均得十五日二十刻一十四分三十一秒五十二微半亦據今之刻分秒微言之以平冬至起根而均派之猶曰此在天太陽平行之平氣也今乃以太陽視行之定冬至與來歲定冬至相距之時日折半以為夏至四折以為春秋分又均派以為諸中氣節氣無論春秋分非交赤道之日即諸中氣節氣亦無一氣合乎在天之均平者矣何也平冬至與定冬至起根不同也兩歲冬至相距為活泛之歲實與平率歲實多寡不同也如月有平朔平望平弦有定朔定望定弦步算者必以月之經朔時日為根即平朔以朔䇿纍加之為逐月經朔朔策折半為平望四折為平弦若以此月定朔與後月定朔之時日多者二十九日九時少者二十九日三時折半為望又折半為弦則平者皆非平矣古法不知定朔自唐以來既用定朔定望推交食必無復用平朔平望注數之理若以定朔為距折半為望又折半為弦無此理亦無此法恆氣亦猶是也古術家唯隋劉焯皇極法始用定氣其法未頒行大衍以後諸家皆有推定氣之法然一行之言曰凡推日月度及軌漏交蝕依定氣注數依恆氣則唐以後術家必用恆氣注數者此一行此言誤之也梅氏又曰譯西法者未加詳考輒謂舊法春秋二分並差兩日則厚誣古人矣夫授時所注二分日各距二至九十一日竒乃恆氣也江氏永曰案授時之恆氣與大衍之恆氣雖若無異亦微有辨至元時平冬至與定冬至時刻略同則其均泒之恆氣以定冬至為根猶之以平冬至為根也若一行定法在至元辛巳前五日五十餘年髙衝約在冬至前十度其時兩心差又較大定冬至約在平冬至前四十餘刻其所謂恆氣者以定冬至為距非以平冬至為根則當年恆氣二分加時或近夜半前後者與在天之平氣二分相差亦可一日矣春分先天秋分後天此理一行固未知郭氏亦未曉郭氏之時與天偶符由太陽有髙卑髙卑又有行度兩心又有微差重關未啓故也今日此理已昭晰固可無疑於定氣梅氏又曰其所注晝夜各五十刻者必在春分前兩日竒及秋分後兩日竒則定氣也定氣二分與恆氣二分原相差兩日授時既遵大衍議以恆氣二分注數不得復用定氣故但於晝夜平分之日紀其刻數則定氣可以互見非不知也且授時固不知有定氣平分之日又何以能知其日之為晝夜平分乎江氏永曰案授時固明言四正定氣矣然自小寒至大雪二十三氣皆用恆氣注數由惑於一行之議亦由當時髙衝與冬至同度最髙與夏至同度冬至為盈初夏至為縮初意其盈縮之限常如此故以兩冬至相距之時日均泒為二十四氣以為合於天之平分時日也設當時以最髙最卑隨時推移之理告之曰今日之盈初在冬至縮初在夏至者由太陽髙卑兩點與二至同度故也向後五十餘年兩點各東移一度則平冬至與定冬至不相值而諸節氣中氣平定皆不同矣又細推之前後一歲半歲亦微有不同者矣及其極也平冬至與定冬至相差兩日當是時猶以兩定冬至相距時日均泒為二十四氣則小寒至大雪二十三氣不皆與平氣相差兩日乎倘或併冬至亦用平舍景長之日而用景未極長之日既有所未可或欲令二十三氣皆從平冬至起根而均𣲖之則是冬至至小寒驟減兩日只有十三日大雪至冬至驟增兩日竟有十七日竒也寧有是理乎進退無所據則欲遵大衍常以恆氣注數者為舛矣郭氏聞此論亦當别立隨時推定氣之法不當以恆氣注數矣梅氏又曰夫不知定氣是不知太陽之有盈縮也又何以能算交食何以能算定朔乎江氏永曰案經朔猶恆氣定朔猶定氣此理極是然恆氣與經朔猶有辨何也經朔以日月平理算其相會是以平為根今注數之冬至由日躔加減表與日差表定其加時則是視行之定冬至非平行之平冬至矣上下數千年惟至元辛巳間定冬至即平冬至其他皆有差其相差之極至二日猶執算定之冬至以為根逐氣均泒命為恆氣而謂其猶經朔可乎梅氏又曰夫西法以最髙卑疏盈縮其理原精初不必為此過當之言良由譯書者並從西法入手遂無暇參稽古法之源流而其時亦未有能真知授時立法之意者為之援據古義以相與虛公論定故遂有此等偏説以來後人之疑義不可不知也江氏永曰新書之言固過然使今日猶執一行之恆氣注數推其流失有如前條進退無據之云者當酌所以處之梅氏又曰其所以為此説者無非欲以定氣注數使春秋二分各居晝夜平分之日以見援時立法之差兩日以自顯其長殊不知授時是用恆氣原未嘗不知定氣不得為差而西法之長於授時者亦不在此以定氣注數不足為竒而徒失古人置閏之法欲以自暴其長反見短矣故此處宜酌改也後條詳之江氏永曰案授時雖知有定氣未知盈縮二根之有推移今時冬至既不為盈初則據定氣冬至為根均泒之一歲二十三氣似非法矣梅氏又曰問授時既知有定氣何為不以注數曰古者注數只用恆氣為置閏地也江氏永曰案定氣注數亦正為密於置閏地也閏以無中氣之月為的然必合算定朔定氣視其無中氣之月置閏於此乃為真閏月若只用定朔不用定氣則無中氣之月未必果無中氣也譬之算定朔必合太陽盈縮太陰遲疾視其相會之日命為朔乃為真定朔若得其一遺其一則或有以晦為朔以二日為朔者矣古法置閏疏謬後漸知用定朔置閏於無中氣之月矣而不用定氣則無中氣之月亦非真然則堯命羲和以閏月定四時成歲之法必兼用定朔定氣始精耳梅氏又曰春秋傳曰先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖蓋謂推步者必以十一月朔日冬至為起算之端故曰履端於始而序不愆也江氏永曰履端於始先生説近是然不必朔日也一歲冬至即履端於始也杜注推步之始以為術之端首似後世之推律元者非也梅氏又曰十二月之中氣必在其月如月內有冬至斯為仲冬十一月月內有雨水斯為孟春正月月內有春分斯為仲春二月餘月並同皆為本月之中氣正在本月十三日之中而後可名之為此月故曰舉正于中民則不惑也江氏永曰案舉正於中正即三正之正舉此正朔示民使民遵之故曰民則不惑正月為歲首而言舉正於中者對冬至為始歲終為終則正朔在其中間也周之正雖與冬至同月而推步猶以冬至為始故舉正為中且言先王之正時亦通三正而言之也杜注云舉中氣以正月果爾何以不云舉中而云舉正乎且古法節氣亦由略而詳由疏而密上古少皥氏以鳥名官有司分司至司啓司閉而左氏亦云凡分至啓閉必書雲物啓者立春立夏閉者立秋立冬併二分二至為八節則古時只有八節未有二十四氣也二十四氣之名蓋秦漢以來始有之其名義大約有所本如云驚蟄者本夏小正之啓蟄月令之蟄蟲始振也雨水者本月令之始雨水也芒種者本周禮澤草所生種之芒種也小暑者本月令小暑至也處暑者本楚語處暑之既至也白露者本月令白露降也霜降者本荀子霜降殺內月令霜始降也大寒者本魯語大寒降也而中氣節氣漢以來亦有小異漢始以驚蟄為正月中雨水為二月節而劉歆三統法始改雨水為正月中驚蟄為二月節三統法猶以榖雨為三月節清明為三月中而易緯通卦驗則以清明為三月節榖雨為三月中然則左氏時尚未有中氣節氣如今法之詳密不得以舉正為舉中氣梅氏又曰若一月之內只有一篩氣而無中氣則不能名之為何月斯則餘分之所積而為閏月矣閏即餘也前此餘分纍積歸於此月而成閏月以為餘分之所歸則不致春之月入於夏且不致冬之月入於明春故曰歸餘於終事則不悖也江氏永曰案左氏之意本謂閏月當在歲終今文公元年閏三月為非禮此左氏習見當時置閏常在歲終故為此言本非確論亦可見古法未有中氣節氣如後世之詳密不能定其當閏何月故不得已總歸之歲末秦人以十月為歲首閏月則為後九月漢初猶仍其失太初以後始改之左氏歸餘於終之言信矣先生謂歸餘分於無中氣之月則終字之義似無所指然先生於此句本有兩説其答李祠部云閏月之義大旨不出兩端其一謂無中氣為閏月此據左氏舉正於中為説乃術家之説也其一謂古閏月俱在歲終此據左氏歸餘於終為論乃經學家之詀也古今法原自不同推步之理踵事加密故自今日言法則以無中氣置閏為安而論春秋閏月則以歸餘之説為長何則治春秋者當主經文今考本經書閏月俱在年終此其據矣案歸餘於終當以此説為正然則上句舉正於中非謂舉氣以正月益明矣梅氏又曰然惟以恆氣注數則置閏之理易明何則恆氣之日數皆平分故其每月之內各有一節氣一中氣此兩氣䇿之日合之共三十日四十三刻竒以較每月常數三十日多四十三刻竒謂之氣盈又太陰自合朔至第二合朔實止二十九日五十三刻竒以較每月三十日又少四十六刻竒謂之朔虛合氣盈朔虛計之共餘九十刻竒謂之月閏乃每月朔策與兩氣策相較之差也積此月閏至三十三個月間其餘分必滿月䇿而生閏月矣閏月之法其前月中氣必在其晦後月中氣必在其朔則閏月只有一節氣而無中氣然後名之為閏月斯乃自然而然天造地設無可疑惑者也一年十二個月俱有兩節氣惟此一個月只一節氣望而知為閏月江氏永曰案造化之妙莫妙於均平與參差二者相為用也若無均平之數則無以為立算之根若無參差之行則無以為變化之用故七政各居一重天各有其本行而必有本輪均輪以生盈縮遲疾且復有最髙最卑之行度焉又有兩心差之改焉所以變動不窮也使太陽可用恆氣何不去其小輪終古只一平行乎置閏於無中氣之月用定氣而理愈精梅氏又曰今以定氣注數則節氣之日數多寡不齊故遂有一月內三節氣之時又或有原非閏月而一月內反只有一中氣之時其所置閏月雖亦以餘分所積而置閏之理不明民乃惑矣江氏永曰案一月三節氣甚稀間有之今時必在冬月又必定朔最大然後有此其或首尾皆節氣而中氣在月中也則去閏月尚逺其或首尾皆中氣而節氣在月中也則置閏在此月之前不以後月為閏此於置閏之法初無所妨若一月之內只有一中氣更無妨於閏月矣梅氏又曰然非西法之咎乃譯書者之踈略耳何則西法原只有閏日而無閏月其仍用閏月者遵舊法也亦徐文定公所謂鎔西洋之巧算入大統之型模也江氏永曰案定氣注數改憲之大者當時譯書者之失惟在星紀等名係在中氣耳若以定氣置閏後世必無追咎譯書者梅氏又曰案堯典云以閏月定四時成歲乃帝堯所以命羲和萬世不刋之典也今既遵堯典而用閏月即當遵用其置閏之法而乃不用恆氣用定氣以滋人惑亦昧於先王正時之理矣是故策算雖精而有當酌改者此亦一端也江氏永曰案羲和之法或用恆氣與否不可考使當時惟知用恆氣今改用定氣猶平朔改為定朔其理益精耳梅氏又曰今但依古法以恆氣注數亦仍用西法最髙卑之差以分晝夜長短進退之序而分注於定氣日之下即置閏之理昭然衆著而定氣之用亦並存而不廢矣江氏永曰案定氣之用甚大一切陰陽五行自干支出者或係於月建則交節氣之日時為要未交節氣係前月既交係今月或係於年歲則交立春之日時為要未交立春係前年既交係今年諸節氣中氣各方農家或以之占侯有驗而祿命三式諸術不可盡信亦不可盡廢者年月干支為綱維其交界之際尤不可不確也定氣恆氣之差小者在時大者在日其極差兩日有竒此豈可不辨其理之是非以定年月之交界而姑為並存之説使定氣僅為分晝夜長短之用乎夫定氣所以必當用者何也太陽有本輪均輪本輪之心恆平行於本天而太陽之體實旋行於輪上從地心出線至輪心其度皆平度若太陽行輪上有加減則人視黃道上所當之度非輪心之度而氣亦非均平之氣日行卑時氣䇿未滿而度巳盈故氣短日行髙時氣䇿已滿而度未盈故氣長其積差在髙卑之中兩日有竒故定氣之度即黃道上平剖為二十四段者太陽既到其上即為實度其氣即為真氣人生於地安得不稟於其所視而更從輪心之並行者乎况又不以平冬至為根而以定冬至起算天上原無此界限夫以本無之界限命為恆氣而注之書以為民用大者係一年次者係一月非前人之失乎梅氏又曰案恆氣在西法為太陽本天之平行定氣在西法為黃道上視行平行度與視行度之積差有二度半弱西法與古法略同所異者最髙衝有行分耳古法恆氣注數即是用太陽本天平行度數分節氣江氏永曰案定氣時日不均而度均若恆氣者時日均而度反不均矣且又以定冬至起算則非本天行度數之分限梅氏又曰案古律每日行一度原無盈縮言盈縮者自北齊張子信始也厥後隋劉焯唐李淳風僧一行言之綦詳閲宋至元為法益密然不以之注數者為閏月也大衍議曰以恆氣注數定氣算日月食由今以觀固不僅交日用盈縮也凡定朔定望定弦無處不用但每月中節仍用恆氣不似西洋之用定氣耳西洋原無閏月袛有閏日故以定氣注數為便若中土之法以無中氣為閏月故以恆氣注數為宜治西法者不諳此理輒訶古法為不知盈縮固其所矣江氏永曰案定氣注數無妨於置閏而置閏得此始真前已辨之明矣若唐以來術家知有定氣而仍以恆氣注數者其故多端一由不知日之所以盈縮者生於小輪也一由不知盈縮之初限不恆係二至也一由不知冬至相距為活泛歲實而别有恆歲實也一由不知景長為定冬至而别有平冬至也一由不知恆氣起定冬至天上無此界限也貿貿然用之以注數豈謂其宜於置閏哉徐李諸公不能明辨恆氣之失而徒用西人之言訶古法為不知盈縮此則其疏耳蕙田案二十四氣皆有平氣有定氣平氣者均分平歲實古所謂恆氣以其常久不變故曰恆以其二十四均分故曰平皆以太陽本輪心平行為根或起平春分或起平冬至而舊法起定冬至其失顯然梅氏未之覺耳定氣者人目所視太陽之實行其日數無定而以太陽實到其處方為定纍積之則為泛歲實古人既知定氣而不以注書所謂立一法未盡其法之用也觀承案古人創一法實已包括無盡但渾淪含蓄未盡説破耳堯典授時舜典璣衡周公土圭萬古言天者不能出其外更益以周髀算經及漢唐以來諸術理數已無不到但天道幽微象數雜賾雖有精心大力何能搜羅畢盡故歷代皆互相補備以闡發之如古人雖知有定氣而不即以是注書蓋立一法而未盡其法之用者大抵皆然不但定氣之一端江氏能乘其間而疏明之所謂勝者即用敗者之棋誠好學深思人也右測日行盈縮以推定氣五禮通考卷一百八十七
