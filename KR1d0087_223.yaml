body:
  text: 五禮通考卷二百十三刑部尚書秦蕙田撰嘉禮八十六設官分職蕙田案周禮六官之首皆冠之曰設官分職蓋聖人為國以禮禮以辨上下主秩敘則官職之統屬相維大小相貫內外相繫固典禮之一大事也禮經之傳於世者周官居其一先儒謂運用天理爛熟之書千萬世弗能越焉然因革損益則隨時變通所以適宜而協于政者其數莫可殫矣今仍朱子經傳通解遺意彚經傳之文略為考證以見古初三代之本建置規模精意具在後代職官粗舉大綱以附于後若其沿革之詳則以俟専家者書説命明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟治亂在庶官傳言所官得人則治失人則亂官不及私昵惟其人傳不加私昵惟能是官爵罔及惡德惟其賢傳言非賢不爵私疏戒王使審求人謹好也蔡氏沈曰六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德所以亂也周官明王立政不惟其官惟其人傳言聖帝眀王立政修教不惟多其官惟在得其人周禮惟王建國辨方正位體國經野設官分職注鄭司農云置冡宰司徒宗伯司馬司冦司空各有所職而百事舉疏既體國經野須立官以治民故云設官分職也以為民極天官大宰以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聨以會官治四曰官常以聼官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治注百官所居曰府弊斷也鄭司農云官屬謂六官其屬各六十若今博士大史大宰大祝大樂屬太常也小宰職曰以官府之六屬舉邦治一曰天官其屬六十是也官職謂六官之職小宰職曰以官府之六職辨邦治一曰治職二曰教職三曰禮職四曰政職五曰刑職六曰事職官聨謂國有大事一官不能獨共則六官共舉之聨讀為連古書連作聨聨謂連事通職相佐助也小宰職曰以官府之六聨合邦治一曰祭祀之聨事二曰賔客之聨事三曰喪荒之聨事四曰軍旅之聨事五曰田役之聨事六曰斂弛之聨事官常謂各自領其官之常職非連事通職所共也官成謂官府之成事品式也小宰職曰以官府之八成經邦治一曰聼政役以比居二曰聼師以簡稽三曰聼閭里以版圗四曰聼稱責以傳别五曰聼祿位以禮命六曰聼取豫以書契七曰聼賣買以質劑八曰聼出入以要會官法謂職所主之法度官職主祭祀朝覲會同賔客者則皆自有其法度小宰職曰以法掌祭祀朝覲會同賔客之戒具官刑謂司刑所掌墨罪劓罪宫臯刖罪殺臯也官計謂三年則大計羣吏之治而誅賞之元謂官刑司冦之職五刑其四曰官刑上能糾職官計謂小宰之六計所以斷羣吏之治魏氏校曰治天下有體邦國君道也以六典治之官府臣道也以八法治之以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰子以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過注柄所秉執以起事者也詔告也助也爵謂公侯伯子男卿大夫士也詩云誨爾序爵言教王以賢否之第次也班祿所以富臣下書曰凡厥正人既富方穀幸謂言行偶合于善則有以賜豫之以勸後也生猶養也賢臣之老者王有以養之成王封伯禽于魯曰生以養周公死以為周公後是也五福一曰夀奪謂臣有大罪沒入家財者六極四曰貧廢猶放也舜殛鯀于羽山是也誅責讓也曲禮曰齒路馬有誅凡言馭者所以驅之納之于善王氏應電曰爵祿二者王所以馭羣臣八柄之大者豫奪二者自其祿而施低昻之柄廢置二者自其爵而操進退之柄生誅二者制其死生之柄也子置生皆作福之事奪廢誅皆作威之事洪範曰惟辟作福惟辟作威臣無有作威作福故以詔王也小宰以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聼其情注敘秩次也謂先尊後卑也治功狀也食祿之多少情爭訟之辭得疏凡言敘者皆是次序先尊後卑各依秩次則羣吏正故云正羣吏也一曰以敘正其位者謂若卿大夫士朝位尊卑次列二曰以敘進其治者謂卿大夫士有治職功狀文書進于上亦先尊後卑也三曰以敘作其事者謂有所執掌起事亦先尊後卑也四曰以敘制其食者謂制祿依爵命授之亦先尊後卑也五曰以敘受其會者謂嵗終進會計文書受之亦先尊後卑也六曰以敘聼其情者情謂情實則獄訟之情受聼斷之時亦先尊後卑也鄭氏伯謙曰考之諸官小宰月終受羣吏之要則以官府之敘宰夫掌百官府之徴令則有胥以治敘宫伯掌王宫士庶子之政令而嵗終必均其敘內史以八祊之法詔王治而納訪必掌其敘鄉師凡邦事令作秩敘下而里宰合耦于鋤亦行其柣敘蓋治衆必有敘乃不至紊亂故小宰以六敘正羣吏為先也以官府之六聨合邦治一曰祭祀之聨事二曰賔客之聨事三曰喪荒之聨事四曰軍旅之聨事五曰田役之聨事六曰斂弛之聨事凡小事皆有聨注鄭司農云大祭祀大宰贊玉幣司徒奉牛牲宗伯視滌濯涖玉鬯省牲鑊奉玉齍司馬羞魚牲奉馬牲司冦奉明水火大喪大宰贊贈玉含玉司徒帥六鄉之衆庶屬其六紖宗伯為上相司馬平士大夫司冦前王此所謂官聨杜子春弛讀為施元謂荒政弛力役及國中貴者賢者服公事者老者疾者皆舍不以力役之事奉牲者其司空奉豕與葉氏時曰大宰以官聨會官治舉其要也小宰以六聨合邦治分其詳也夫所謂聨者大宰小宰宰夫之職正二之聨也宫正宫伯宫衛之聨膳夫庖人膳羞之聨醫師至獸醫醫官之聨酒正至鹽人飲食之聨太府而下財官之聨內宰而下宫正之聨此治官之聨也教官有教之聨禮官有禮之聨政官有政之聨刑官有刑之聨人皆知其分職率屬之為官聨也至於聨事合屬有非其官之屬而實相聨者焉以祭祀言之宗伯而下鬱鬯尊彛典祀等職皆聨事也而大宰祭祀則贊玉幣司徒奉牛牲司馬奉馬牲司冦奉犬牲此非他官之合聨乎以賔客言之行人而下司儀行夫環人掌客等職皆聨事也而大宰朝會則贊玉幣宰夫掌牢禮司徒修委積封人飾牛牲此非他官之合聨乎太宰贊含鄉師治役司徒荒政遺人委積此喪荒之聨事也司馬治軍司徒致民小宰掌具縣師受法此軍旅之聨事也司馬教陳鄉師帥民司徒舉旗虞人萊野此田役之聨事也閭師征賦太府受財司徒施征司馬制賦此斂弛之聨事也六官聨事不一而足以至小事莫不有聨典祀春官而得以征役於秋官之司𨽻鼓人地官而得以詔鼓於夏官之太僕秋官掌戮而得預天官甸師之殺秋官蠻𨽻而得執夏官校人之役鄉師地官而考辟於司空稍人地官而聼政於司馬有同寅協恭而無畔官離次有聨事合治而無分朋植黨成周之官所以內外相統小大相維而無曠官者六聨為有助焉是故分其職而率其屬則事權若分而不相混合其聨而會其治則事權若合而不相離此官治之所以會而邦治之所以合也雖然周人聨事之意不特見於官然也其在鄉也則比閭族黨州縣之有聨其在遂也則鄰里鄼鄙縣都之有聨司徒之安民則曰聨兄弟聨師儒聨朋友族師之登民則十人為聨十家為聨八閭為聨至于司關之官亦掌國貨之節以聨門市是無往而不為聨也官治其有不會乎邦治其有不合乎王氏應電曰一事而一官専行之此六職也一事而合六官共行之此六聨也非専行則侵非共行則闕合二者而官制之善始見以官府之八成經邦治一曰聼政役以比居二曰聼師田以簡稽三曰聼閭里以版圖四曰聼稱責以傅别五曰聼祿位以禮命六曰聼取豫以書契七曰聼賣買以質劑八曰聼出入以要會注鄭司農云政謂軍政也役謂發兵起徒役也比居謂伍籍也比地為伍因內政寄軍令以伍籍發軍起役者平而無遺脫也簡稽士卒兵器簿書簡猶間也稽猶訃也合也合計其士之卒伍閲其兵器為之要簿也故遂人職曰稽其人民簡其兵器國語曰黃池之會吳陳其兵皆官師擁鐸拱稽版户籍圖地圖也聼人訟地者以版圖決之司書職曰邦中之版土地之圖稱責謂貸子傳别謂劵書也聼訟責者以劵書決之傅傅者約束于文書别别為兩兩家各得一也禮命謂九錫也書契符書也質劑謂市中平賈今時月平是也要會謂計最之簿書月計曰要嵗計曰會故宰夫職曰嵗終則令羣吏正嵗會月終則令正月要元謂政謂賦也凡其字或作政或作正或作征以多言之宜從征如孟子交征利云傅别謂為大手書于一札中字别之書契謂出子受入之凡要凡簿書之最目獄訟之要辭皆曰契春秋傳曰王叔氏不能舉其契質劑謂兩書一札同而别之長曰質短曰劑傅别質劑皆今之劵書也事異異其名耳禮命禮之九命之差等葉氏時曰太宰以官成經邦治又以官成待萬民之治宰夫則曰師掌官成以治凡大司冦則曰凡庶民之獄訟以邦成弊之鄭司農以八成若今之決事比賈公彥以八成若今之斷事律是聼斷之不可無官成也此太宰所以分邦成之目而以經邦治焉司徒曰五家為比五比為閭此比居之有籍也聼征役之訟則以比居決之遂人曰稽其人民簡其兵器此簡稽之有簿也聼師田之訟則以簡稽決之版圖如司書邦中之版土地之圖是也聼閭里之訟則以版圖決之禮命如宗伯一命受職再命受服是也聼祿位之訟則以禮命決之傳别鄭司農謂劵書也後鄭謂為大手書於一札中字别之愚案士師言以財獄訟者正之以傅别今聼稱責以傅别則是傅著文書别為兩本也故以之決財貨稱貸之爭書契鄭司農謂符書也後鄭謂出豫受入之凡要愚案酒正凡有秩酒者以書契授之今聼取豫以書契則是取其劵書之相符也故以之決俸秩取豫之爭質劑如質人大市以質小市以劑聼市㕓之買賣則以質劑決之也委會如宰夫月終正月要嵗終正嵗會聼貨賄之出入則以要會決之也謂之成者蓋言其一成而不可易也謂之經者蓋言其治有常而不可紊也然此皆簿書之要爾聖人於簿書之煩惟恐防姦之不密其待民不既薄乎誠以民聚而必有事事起而必有爭聖人起教于微眇而憂患于未然是以有書以載其法有法以待其事事來而應之以法訟起而正之以書猶決事之不可無比斷事之不可無律也天下豈有不決之訟而猶有不經之民哉易曰上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬其官成之謂與抑嘗觀士師之職有曰掌士之八成鄭司農亦曰若今時決事比案士師八成曰邦汋邦賊邦諜犯邦令嬌邦令為邦盜為邦朋為邦誣而已初無簿書之要而亦謂之成鄭氏皆以為決事比之類蓋成者取其行事之成者以為品式也聼斷而不稽成事以為法則舞文弄法者有之誣上行私者有之求以防姦而適以為姦也然則士師不可無事之八成猶小宰不可無官府之八成此鄭氏所以均謂之若漢之決事比與蕙田案八成者每事各有一成之例以為聼斷之法式如今之律令則例是也大宰既定其綱小宰又别其目頒諸官府俾奉行之故上有畫一之治而下無舞文之弊以聼官府之六計弊羣吏之治一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨注聼平治也平治官府之計有六事弊斷也既斷以六事又以廉為本善善其事有辭譽也能政令行也敬不解于位也正行無傾邪也法守法不失也辨辨然不疑惑也杜子春云廉辨或為廉端髙氏愈曰六計所以課吏而皆以廉為本蓋廉者立身之大間居官之要術若其貪欲而以才幹濟之尤聖王之所禁也漢人取士曰興廉調吏曰察廉蓋猶存周官遺意而所謂六條察吏者蓋亦本此蕙田案王介甫訓廉為察王次點亦從之然上文曰聼曰弊則察已在其中矣無庸贅出也臯陶制刑貪墨者殺周官弊吏以廉為本古人之重廉而懲貪如此宰夫掌百官府之徴令辨其八職一曰正掌官法以治要二曰師掌官成以治凡三曰司掌官法以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官敘以治敘八曰徒掌官令以徴令注别異諸官之八職以備王之徴召所為正辟於治官則冢宰也治要若嵗計也師辟小宰宰夫也治凡若月計也司辟上士中士治目若今日計也旅辟下士也治數每事多少異也治藏藏文書及器物贊治若今起文書草也治敘次序官中如今侍曹伍伯傳吏朝也徴令趨走給召呼疏言掌百官府之徴令辨其八職者謂總王朝三百六十官以備王之所徴召及施令若不分别其職則徴召無所指斥故須分别三百六十職也一曰正者正長也六卿下各有屬六十故六卿稱正也云掌官法者掌當官之法也以治要者要謂大計要也劉氏曰正六官之長師六官之丞司六屬之長旅六屬之佐要大要也合衆目以為凡目條目也數者目之細正師之治簡司旅之治詳凡詳于要數密于目髙氏愈曰八職所掌大率尊者舉略卑者治詳以尊臨卑以下奉上此周公建官之體統使尊者而欲盡閲其事則耳目不給而姦胥有弄法之弊使卑者無所統承則意見厖雜而十羊九牧之害作矣右官制總論春秋昭公十七年左氏傳郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子對曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名注黃帝受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也紀疏以少皥之立有鳯鳥之瑞而以鳥紀事黃帝以雲事明其初受天命有雲瑞也雲為官名更無所出唯文十八年傳云縉雲氏有不才子疑是黃帝時官故云縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名注炎帝神農氏有火瑞以火紀事名百官共工氏以水紀故為水師而水名注共工以諸侯霸有九州者在神農前大皥後亦受水瑞以水名官大皥氏以龍紀故為龍師而龍名注大皥伏犧氏有龍瑞故以龍名官用疏此黃帝以上四代用火雲水龍紀事其官之名必火雲水龍為之但書典散亡更無文紀其名不可復知故杜不復為説唯有縉雲見傳疑是黃帝官耳服虔云黃帝以雲名官蓋春官為青雲氏夏官為縉雲氏秋官為白雲氏冬官為黑雲氏中官為黃雲氏炎帝以火名官春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火共工以水名官春官為東水夏官為南水秋官為西水冬官為北水中官為中水大皥以龍名官春官為青龍氏夏官為赤龍氏秋官為白龍氏冬官為黑龍氏中官為黃龍氏此皆事無所見苟出肺腸少皥鳥紀不以五方名官焉知彼四代者皆以四時五方名官乎以縉為赤色則云夏官為縉雲焉知餘方不更為之目而直指青黃為名也以天文有大火鶉火即云春為大火夏為鶉火其餘何故直以西北名火也此皆虛而不經故不可採用我髙祖少皥之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也注鳯鳥知天時故以名厯正之官所疏當時名官直為鳥名而已其所職掌與後代名官司事同所言厯正以下及司徒司冦工農之屬皆以後代之官所掌之事託言之言爾時鳥名如今之此官也玄鳥氏司分者也注玄鳥燕也以春分來秋分去之疏此鳥以春分來秋分去故以名官使主二分伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也注青鳥鶬鴳也以立春嗚立夏止丹鳥氏司閉者也注丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆厯正之屬官祝鳩氏司徒也注祀鳩鷦鳩也鷦鳩孝故為司徒主教民鴡鳩氏司馬也注鴡鳩王鴡也鷙而有别故為司馬主法官鳲鳩氏司空也注鳲鳩鴶鵴也鳲鳩平均故為司空平水土爽鳩氏司冦也注鳩鷹也鷙故為司冦主盜賊鶻鳩氏司事也注鶻鳩鶻鵃也春來冬去故為司事五鳩鳩民者也注鳩聚也治民上聚故以鳩為名五雉為五工正注五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉利器用正度量夷民者也注夷平也九扈為九農正注扈有九種也春扈鳻鶞夏扈竊元秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教民事扈民無淫者也注扈止也止民使不淫放自顓頊以來不能紀逺乃紀于近為民師而命以民事則不能故也注顓頊氏代少皥者德不能致逺瑞而以民事命官仲尼聞之見於郯子而學之賈氏公彥曰政教君臣起自人皇之世至伏羲因之伏羲已前雖有三名未必具立官號至黃帝名位乃具案左傳云自顓頊以來不能紀逺乃紀于近是少皥以前天下之號象其德百官之號象其徴顓頊以來天下之號因其地百官之號因其事事即司徒司馬之類是也少皥氏言祝鳩氏為司徒者本名祝鳩言司徒者以後代官况之二十九年左氏傳蔡墨曰五行之官是為五官實列受氏姓封為上公注爵上公祀為貴神社稷五氏是尊是奉木正曰句芒注正官長也取木生句曲而有芒角也亦疏正訓為長木官之最長也其火金水土正然火正曰祝融注祝融明貌金正曰蓐收注秋物摧蓐而可收也水正曰元冥注水隂而幽冥土正曰后土注土為羣物主故稱后也魏獻子曰社稷五祀誰氏之五官也對曰少皥氏有四叔疏四叔是少皥之子孫未知於少皥逺近也四叔出於少皥耳其使重為句芒非少皥使之世族譜云少皥氏其官以鳥為名然則此官皆在髙陽之世也楚語云少皥氏之衰也九黎亂德民神雜糅不可方物顓頊受之乃命南正重司天以屬神命火正黎司地以屬民是則重黎居官在髙陽之世也又鄭語云黎為髙辛氏火正命之曰祝融則黎為祝融又在髙辛氏之世案世本及楚世家云髙陽生稱稱生卷章卷章生黎如彼文黎是顓頊之曾孫也楚語云少皥之衰顓頊受之即命重黎似是即位之初不應即得命曽孫為火正也少皥世代不知長短顓頊初已命黎至髙辛又加命不應一人之身綿歷兩代事既久逺書復散亡如此參差難可考校世家云共工作亂帝礐使黎誅之而不盡帝誅黎而以其弟吳坰為黎復居火正為祝融即如此言黎或是國名官號不是人之名字顓頊命黎髙辛命黎未必共是一人傳言世不失職二者或是父子或是祖孫其事不可知也由此言之少皥四叔未必不有在髙辛世者也曰重曰該曰修曰熙實能金木及水注能治其官使重為句芒注木正該為蓐收注金正修及熙為元冥注二子相代為水正世不失職遂濟窮桑此其三祀也注窮桑少皥之號四子能治其官使不失職濟成少皥之功顓頊氏有子曰犂為祝融注犂為火正共工氏有子曰句龍為后土疏共工有子謂後世子耳亦不知句龍為后土在于何代少皥氏既以鳥名官此當在顓頊以來耳此其二祀也后土為社稷田正也注掌播殖也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之漢書百官公卿表自顓頊以來為民師而命以民事有重黎句芒祝融后土蓐收元冥之官蕙田案此木正火正金正水正土正及田正凡六官名皆顓頊以後之制堯命棄為后稷蓋因于此史記黃帝置左右大監監于萬國其文不見于經故不備載觀承案五官之外又有田正則是六官矣此即禹於水火金木外分土與榖為六府之所本也右上古官制書周官唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯傳堯舜考古以建百官內置百揆四嶽象天之有五行外置州牧十二及五國之長上下相維外內咸治言有法庶政惟和萬國咸寧傳官職有序故衆政惟和萬國皆安所以為正治疏唐堯虞舜考行古道立官惟數止一百也內有百揆四嶽者百揆揆度百事為羣官之首立一人也四嶽內典四時之政外主方嶽之事立四人也外有州牧侯伯牧一州之長侯伯五國之長各監其所部之國外內置官各有所掌衆政惟以協和萬邦所以皆安也吕氏祖謙曰唐虞建官惟百而謂之稽古則官之有百蓋前於唐虞矣侯伯逮春秋猶襲以霸者之稱在唐虞則必次州牧而總諸侯者也唐虞之官見于書者猶多成王獨舉其四惟識其大故能挈其綱也堯典乃命羲和欽若昊天厯象日月星辰敬授人時傳重黎之後羲氏和氏世掌天地四時之官以疏楚語云顓頊命南正重司天以屬神火正黎司地屬民堯育重黎之後使復典之以至夏商據此則自夏及商無他姓也吕刑稱乃命重黎傳云重即羲黎即和也羲和雖别為氏族而出自重黎故吕刑以重黎言之朱子曰厯是古時一件大事故炎帝當作少昊以鳥名官首曰鳯鳥氏厯正也嵗月日時既定則百工之事可考其成共工方鳩僝功傳共工官稱帝曰咨四嶽傳四嶽即羲和之四子分掌四嶽之諸侯故稱焉朱子曰四嶽官名一人而總四嶽諸侯之事也語類問四嶽百揆曰四嶽是總在外諸侯之官百揆則總在內百官者又問四嶽是一人是四人曰汝能庸命巽朕位不成讓於四人又如咨二十有二人乃四嶽九官十二牧尤見得四嶽只是一人蕙田案孔傳以四嶽即羲仲羲叔和仲和叔四人分掌四嶽之事其説牽合難信據春秋傳云夫許太嶽之後也又云謂我薑戎四嶽之裔胄也則堯時四嶽蓋薑姓薑姓出于神農與羲和之出自髙陽者異矣舜典納于百揆百揆時敘傳揆度也度百事總百官納舜于此官蔡氏沈曰百揆者揆度庶政之官惟唐虞有之猶周之冡宰也乃日覲四嶽羣牧班瑞于羣后蔡氏沈曰四嶽四方之諸侯羣牧九州之牧伯也鄧氏孝孺曰四嶽領羣牧羣牧領羣后月正元日舜格于文祖詢于四嶽闢四門傳詢謀也謀政治于四嶽開闢四方之門未開者廣致衆賢明四目逹四聰咨十有二牧曰食哉惟時傳咨亦謀也所重在于民惟當敬授民時柔逺能邇惇德允元傳柔安邇近惇厚也元善之長言當安逺乃能安邇厚行德信使足長善而難任人蠻夷率服傳任佞難拒也佞人斥逺之則忠信昭于四夷皆相率而來服舜曰咨四嶽有能奮庸熙帝之載傳奮起庸功載事也訪羣臣有能起發其功廣堯之事者使宅百揆亮采惠疇傳亮信惠順也求其人使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空傳四嶽同辭而對禹代鯀為崇伯入為天子司空治洪水有成功言可用之帝曰俞咨禹汝平水土惟時懋哉傳然其所舉稱禹前功以命之懋勉也惟居是百揆勉行之禹拜稽首讓于稷契暨臯陶傳居稷官者棄也契臯陶二臣名稽首首至地帝曰俞汝往哉傳然其所推之賢不許其讓敕使往宅百揆蔡氏沈曰僉衆也四嶽所領四方諸侯有在朝者也平水土者司空之職蓋四嶽及諸侯言伯禹見作司空可宅百揆舜然其舉而咨禹使仍作司空而兼行百揆之事録其舊績而勉其新功也以司空兼百揆如周以六卿兼三公後世以他官平章事知政事亦此類也帝曰棄黎民阻飢汝后稷播時百榖傳阻難播布也衆人之難在於飢汝后稷布種是百榖以濟之美其前功以勉之金氏履祥曰棄之為稷久矣帝始即位因其職而中命之也舜典凡不咨而命命而不讓者皆因其職而申命之也帝曰契百姓不親五品不遜傳五品謂五常遜順也汝作司徒敬敷五教在寬傳布五常之教務在寬所以得人心亦美其前功帝曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服傳士理官也五刑墨劓剕宫大辟服從也言得輕重之中正五服三就傳既從五刑謂服罪也行刑當就三處大罪於原野大夫於朝士於市五流有宅五宅三居傳謂不忍加刑則流放之若四凶者五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外惟明克允傳言臯陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯者因禹讓三臣故厯述之朱子曰禮樂所以成教化而兵刑輔之當唐虞之時禮樂之官析為二兵刑之官合為一詳略之意可見薛氏季宣曰禮大刑用甲兵則蠻夷盜賊之事亦領于士師也陳氏大猷曰隆古之時兵既不常用但領之於士官聖人仁天下之深意也唐虞兵刑之官合為一而禮樂分為二成周禮樂之官合為一而兵刑分為二蓋帝者之世詳于化而略于政王者之世詳于政而略于化此世變升降之異也帝曰疇若豫工僉曰垂哉傳問誰能順我百工事者朝臣舉垂垂臣名帝曰俞咨垂汝共工傳共謂共職事垂拜稽首讓于殳斨暨伯與傳殳斨伯與二臣名帝曰俞往哉汝諧傳汝能諧和此官薛氏季宣曰前共工不名蓋世官也共工放後工官始分而垂為之帝曰疇若豫上下草木鳥獸僉曰益哉傳上謂山下謂澤順謂施其政教取之有時用之有節言伯益能之帝曰俞咨益汝作朕虞傳虞掌山澤之官益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧傳朱虎熊羆二臣名垂益所讓四人皆在元凱之中朱子曰孟子説益烈山澤而焚之是使之除去障翳驅逐禽獸耳未必使之為虞官也至舜命之作虞然後使之養育其草木鳥獸耳馬氏明衡曰周禮有山虞澤虞乃是育養禽獸魚鱉之官其職比此較輕上古之時洪水之後山林川澤皆未能得所益之為虞蓋皆平治一畨與禹平水土相表裏蕙田案孟子稱舜使益掌火在禹未治水之前所云掌火者疑即古火正之官此舜命官在水土既平之後以益有烈山澤之功故即命為虞掌山澤之事帝曰咨四嶽有能典朕三禮僉曰伯夷傳三禮天地人之禮伯夷臣名薑姓帝曰俞咨伯汝作秩宗傳秩序宗尊也主郊廟之官夙夜惟寅直哉惟清傳夙早也言早夜敬思其職典禮施政教使正直而清明伯拜稽首讓于夔龍傳夔龍二臣名帝曰俞往欽哉傳然其賢不許讓蔡氏沈曰秩序也宗祖廟也秩宗主敘次百神之官而専以秩宗名之者蓋以宗廟為主也周禮亦謂之宗伯而都家皆有宗人之官以掌祭祀之事亦此意也帝曰夔命汝典樂教胄子傳胄長也謂元子以下至卿大夫子弟以歌詩蹈之舞之教長國子中和祗庸孝友直而溫寬而栗傳教之正直而溫和寬宏而能莊栗也剛而無虐簡而無傲傳剛失之虐簡失之傲教之以防其失詩言志歌永言傳謂詩言志以導之歌詠其義以長其言聲依永律和聲傳聲謂五聲宫商角徴羽律謂六律六吕十二月之音氣言當依聲律以和樂八音克諧無相奪倫神人以和傳倫理也八音能諧理不錯奪則神人咸和命夔使勉之朱子曰大司樂之教即是夔典樂事古者教人多以樂如舜命夔之類蓋終日以聲音養其性情亦須理會得樂方能聼帝曰龍朕聖讒説殄行震驚朕師傳聖疾殄絶震動也言我疾讒説絶君子之行而動驚我衆欲遏絶之命汝作納言夙夜出納朕命惟允傳納言喉舌之官聼下言納于上受上言宣于下必以信蔡氏沈曰納言官名命令政教必使審之既允而後出則讒説不得行而矯偽無所托矣敷奏復逆必使審之既允而後入則邪僻無自進而功緒有所稽矣周之內史漢之尚書魏晉以來所謂中書門下者皆此職也又曰此以平水土若百工各為一官而周制同領于司空此以士一官兼兵刑之事而周禮分為夏秋兩官蓋帝王之法隨時制宜所謂損益可知者如此王氏炎曰百揆百官之首故先命禹養民治之先務故次命稷富然後教故次命契刑以弼教故次命臯陶工立成器以為天下利人治之末故次命垂如此治人者略備矣然後及草木鳥獸故次命益民物如此則隆禮樂之時也故次命夷夔禮先樂後故先夷後夔樂作則治功成矣羣賢雖盛治功既成苟讒間得行則賢者不安前功遂廢故命龍于未所以防讒問衛羣賢以成其終帝曰咨汝二十有二人傳禹垂益伯夷夔龍六人新命有職四嶽十二牧凡二十二人特敕命之欽哉惟時亮天功傳各敬其職惟是乃能信立天下之功蔡氏沈曰二十有二人四嶽九官十二牧也周官言內有百揆四嶽外有州牧侯伯蓋百揆者所以統庶官而四嶽者所以統十二牧也既分命之又總告之使之各敬其職以相天事也三載考績三考黜陟幽明傳三年有成故以考功九嵗則能否幽明有别黜退其幽者升進其明者庶績咸熙傳考績法明衆功皆廣也疏此史述舜事非帝語林氏子竒曰周禮太宰嵗終則令百官府各正其治受其會聼其致事而詔王廢置三嵗則太計羣吏之治而誅賞之此即唐虞考績之法也然其制已密不若唐虞之寬也益稷帝曰吁臣哉鄰哉鄰哉臣哉傳鄰近也帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為豫欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明豫欲聞六律五聲八音在治忽以出納五言汝聼豫違汝弼汝無面從退有後言欽四鄰傳四近前後左右之臣敕使敬其職尚書大傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視次國之君也禮記文王世子記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也疏四輔者案尚書大傳云前曰疑後曰丞左曰輔右曰弼也蕙田案尚書之四鄰禮記謂之四輔以其為親近之臣故曰鄰以其有輔弼之職故曰輔也史記夏本紀載臯陶謨文云敬四輔臣與文王世子正合明堂位有虞氏官五十注以夏周推前後之差有虞氏官宜六十不得如此記也賈氏公彥曰虞官六十唐則未聞堯舜道同或皆六十并屬官言之則皆有百故成王周官曰唐虞建官惟百也方氏慤曰書言唐虞稽古建官惟百與此不同者書之所言者據其號記之所言者據其人蓋官有等差而分職不可以無辨職有繁簡而用才或得以相兼故官之號常多而官之人常少則虞之官其實五十而已蕙田案春秋緯稱堯時舜為太尉説苑稱稷為司馬皆於經無據今不取觀承案唐虞稽古建官惟百夏商官倍亦克用乂此尚書周官之明文也而明堂位乃云有虞氏官五十夏后氏官百殷二百何相刺謬耶百官之稱其來已久禹謨亦云率百官若帝之初必非官止五十而虛加一倍以數之也則明堂位之言恐非其實矣至注疏虞官六十夏百二十殷人二百四十之云則亦臆測耳附辨諸儒以羲和為堯時六官馬氏融曰羲氏掌天官和氏掌地官仲叔四子掌四時賈公彥周禮正義序堯典云乃命羲和注云髙辛之世命重為南正司天犂為火正司地堯育重犂之後羲氏和氏之子賢者使掌舊職天地之官亦紀于近命以民事其時官名蓋曰稷司徒是天官稷也地官司徒也又云分命羲仲申命羲叔分命和仲申命和叔使分主四方注仲叔亦羲和之子堯既分隂陽四時又命四子為之官掌四時者字曰仲叔則掌天地者其曰伯乎是有六官案下歡兜曰共工注共工水官也至下舜求百揆禹讓稷契暨臯陶帝曰棄黎民阻飢汝后稷播時百榖注稷棄也初堯天官為稷又云帝曰契百姓不親汝作司徒又云帝曰臯陶汝作士此三官是堯時事舜因禹讓述其前功下文云舜命伯夷為秩宗舜時官也以先後參之唯無夏官之名以餘官約之夏傳云司馬在前又後代况之則羲叔為夏官是司馬也故分命仲叔注云官名蓋春為秩宗夏為司馬秋為士冬為共工通稷與司徒是六官之名見也鄭元分隂陽為四時者非謂時無四時官始分隂陽為四時但分髙辛時重犂之天地官使兼主四時耳而云仲叔故云掌天地者其曰伯乎若然堯典云伯禹作司空四時官不數之者鄭云初堯冬官為共工舜舉禹治水堯知其有聖德必成功故改命司空以官名寵異之非常官也至禹登百揆之任捨司空之職為共工與虞故曰垂作共工益作朕虞是也案堯典又云帝曰疇咨若時登庸鄭注云堯末時羲和之子皆死庶績多闕而官廢當此之時歡兜共工更相薦舉下又云帝曰四嶽湯湯洪水有能俾乂鄭云四嶽四時之官主四嶽之事始羲和之時主四嶽者謂之四伯至其死分嶽事置八伯皆王官其八伯唯歡兜共工放齊􅦡四人而已其餘四人無文可知案周官云唐虞稽古建官惟百內有百揆四嶽則四嶽之外更有百揆之官者但堯初天官為稷至堯試舜天官之任謂之百揆舜即真之後命禹為之即天官也案尚書傳云惟元祀巡狩四嶽八伯注云舜格文祖之年堯始以羲和為六卿春夏秋冬者并掌方嶽之事是為四嶽出則為伯其後稍死歡兜共工求代乃置八伯元祀者除堯喪舜即真之年九州言八伯者據畿外八州鄭云畿內不置伯鄉遂之吏主之朱子曰羲和即是那四子或云有羲伯和伯共六人未必是蕙田案堯典云乃命羲和是舉其綱又云分命羲仲申命羲叔分命和仲申命和叔是詳其目非二仲二叔之外又有二伯也堯命羲和惟云欽天授時以和氏為地官尤屬謬妄六卿之名始見於夏書唐虞但有司空司徒之名夏殷以後始有大宰司馬司冦至天地春夏秋冬六官之名則惟周禮有之自周以前未之有也賈氏以堯時稷為天官司徒為地官羲和二伯為之又以羲叔為夏官司馬皆出臆揣不可為據觀舜典舜命九官與周之六官絶不相同則以羲和當六卿者不辨而自屈矣古人重司天之官故郯子述少昊氏官名首舉鳯皇氏而後及五鳩九扈之屬堯典首羲和亦即此意以羲和為六卿又以為即四嶽皆出漢儒附會不足信右唐虞官制書周官夏商官倍亦克用乂傳禹湯建官二百亦能用治疏夏禹商湯立官倍多於唐虞雖不及唐虞之消簡亦能用以為治甘誓大戰于甘乃召六卿注天子六軍其將皆命卿齊氏召南曰案六卿之名始見于此鄭康成注大傳曰夏六卿后稷司徒秩宗司馬作士共工也此以周官凖度虞夏想當然耳士即刑官稱士為作士虞為朕虞皆漢人之陋也孔頴逹疏禮記月令曰案書傳有司徒司馬司空公領三卿此夏制也曲禮云司徒司馬司空司士司冦此殷制也鑿鑿言之亦無確據杜佑通典謂堯置天地四時之官為六卿其説本于賈公彥考工記疏然堯時實未見六卿名目禮記明堂位夏后氏官百注昏義曰天子立六官三公九卿二十七大夫八十一元士凡百二十此謂夏時也蕙田案夏之官名見于甘誓者曰六卿見于允征者曰遒人曰官師曰工曰瞽曰嗇夫見于立政者曰事曰牧曰凖見于夏小正者曰主夫曰鹿人曰嗇人見于春秋傳者曰豢龍氏曰御龍氏曰陶正曰車正曲禮天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典注典法也此蓋殷時制也周則太宰為天官大宗曰宗伯宗伯為春官大史以下屬焉大士以神仕者天子之五官曰司徒司馬司空司士司冦典司五衆注此亦殷時制也周則司士屬司馬大宰司徒宗伯司馬司冦司空為六官天子之六府曰司土司木司水司草司器司貨典司六職注府主藏六物之稅者此亦殷時制也周則皆屬司徒司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨丱人也天子之六工曰土工金工石工木工獸工草工典制六材注此亦殷時制也周則皆屬司空土工陶瓬也金工築冶鳬栗假桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也唯工職亡蓋謂作萑葦之器五官致貢曰享注貢功也享獻也致其嵗終之功於王謂之獻也周禮大宰嵗終則令百官府各正其治受其會聼其致事而詔王廢置軍疏此以下是殷禮案甘誓云六事之人鄭云周禮六皆命卿則三代同矣案甘誓及鄭注則三王同有六卿又鄭注大傳夏書云所謂六卿者后稷司徒秩宗司馬作士共工也而不説殷家六卿之名今此記所言上非夏法下異周典鄭唯指為殷禮也殷家六卿太宰司徒司馬司空司士司冦是也但周立六卿象天地四時而殷六卿所法則有異以大宰為一卿以象天時司徒以下五卿法于地事故鄭志崇精問焦氏云鄭云三王同六卿殷應六卿此云五官何也焦氏答曰殷立天官與五行其取象異耳是司徒以下法五行并大宰為六官也但大宰既尊故先列大宰并顯大宰之下𨽻屬大宰之官既法于天故同受大名故云先六大也天子之五官者嚮立六官以法天之六氣此又置五官以象地之五行也天官尊陽故一卿以攝衆地官卑隂故五卿俱陳也天子之六府者殷六卿外復别立此六官也府者藏物之處既法天地立官天地應生萬物故為萬物立府也天子之六工者工能也言能作器物者也前既有六府之物宜立六工以作之為器物故為次也亦有六者依府以用事也嵗終則五官各考其屬一年之功以獻于天子故云致貢曰享也五官謂天子五官司徒以下吕氏大臨曰殷人尊神率民以事神先鬼而後禮大宗以下皆事鬼神奉天時之官故總謂之天官太宰者佐王代天工以治者也大宗掌事鬼神者也大史掌正嵗年及頒朔則奉天時者也大祝所以接神者也士者即周司巫巫所以降神者也大卜主問龜所以求神者也六者皆天事也人事也人事可變天事不可變者也周官司士則夏官之屬此别出司士為一官者司士掌羣臣之版及卿大夫士庶子之數則所統有衆與司馬司徒司空司冦略等矣所以並立為五官也司徒之衆則六卿六遂是也司馬之衆六軍是也司空之衆百工是也司冦之衆士師司𨽻之屬是也故曰典司五衆六府者主藏之官斂藏六者之入以待國用者也農以耕事貢九榖則司土受之山虞以山事貢材木則司木受之澤虞以澤事貢水物則司水受之圃以樹事貢薪芻疏材則司草受之工以飭材事貢器物則司器受之商以市事貢貨賄則司貨受之周官司土則廪人倉人之職司木則山虞林衡之職司水則澤虞川衡之職司草則委人之職司器司貨則玉府內府之職所入者乃農圃虞衡工商之民所貢故曰典司六職六工者飭材為器以待國用者也草工以萑葦莞蒲菅蒯之類為器用者六工所治之材各有不同故曰典制六材終嵗則司徒以下五官各致其功以獻于王故謂之享王得以行其誅賞太宰不貢者周官大宰詔王廢置則殷制亦然也陸氏佃曰司徒教官也司馬政官也故五官一曰司徒次二曰司馬有教有政而後事可立故次司空事立矣則以禮文之可也故次司士禮之所去刑之所取也故次司冦以司士代宗伯者以司士所掌與禮相通也六典書也五衆則其人焉五衆謂若大司徒大司馬典司小司徒小司馬之類不言大宰大宰典司六卿五衆有位者六職則其職而已考工記曰凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二土工蓋摶埴之工金工蓋攻金之工石工蓋刮摩之工木工蓋攻木之工獸工蓋攻皮之工草工蓋設色之工若以藍為青以䓞為紫以蒨為紅以菉為黃之類是也或曰草讀如字今俗作皂非正也殷人尚質故設色之工謂之草工吳氏華曰以郯子所言官名考之其言少昊氏之官名則曰祝鳩氏司徒也鵈鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五官之名實與曲禮鄭注周制同齊氏召南曰鄭氏謂五官是殷制亦非鑿空史記周本紀古公作五官有司民皆歌樂之此即本大雅乃召司空乃召司徒之文以為説耳若左傳言職官五正則殷制之眀驗也明堂位殷二百注以夏周推前後之差殷宜二百四十蕙田案商之官名其别見于詩書者曰阿衡亦曰保衡曰相曰卿士曰父師曰少師曰蒙士又春秋傳稱仲虺為湯左相則殷有左右二相矣箕子陳洪範稱司徒司空司冦卿士師尹之屬皆殷制之可考者王制王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等注二五象五行剛柔十日祿所受食爵秩次也上大夫曰卿祿疏上大夫卿者見下文云下大夫倍上士卿四大夫是下大夫之上則有卿故知上大夫即卿也此上大夫卿外惟有下大夫所以下文除卿之外更有上大夫下大夫者謂就下大夫之中更分為上下耳卿者白虎通云卿之言嚮也為人所歸嚮大夫者逹人謂扶逹于人士者事也皇氏熊氏皆為任職事其大夫之稱亦得兼三公故詩云三事大夫謂三公也上大夫卿亦兼孤也故春秋陽處父為太傅經云晉殺其大夫陽處父是也孤亦稱公故鄉飲酒禮云公三重是孤也卿亦得稱公故春秋襄三十年傳云鄭伯有之臣稱伯有曰吾公在壑谷士既命同而分為三等者言士職卑德薄義取漸進故細分為三卿與大夫德髙位顯各有别命不復細分其諸侯以下及三公至士總而言之皆謂之官官者管也以管領為名若指其所主則謂之職故周禮云設官分職通卿大夫士也知諸侯亦為官者尚書周官云唐虞稽古建官惟百下云外有州牧侯伯是州牧侯伯亦為官也若細而言之諸侯非偏有所主則非官也故學記云大德不官注云天子諸侯是也諸侯亦稱職故左傳云小有述職大有巡功述職謂諸侯朝天子是諸侯稱職也其爵則殷以前大夫以上有爵故士冠禮云古者生無爵死無諡謂士也周則士亦有爵故鄭注周制以士為爵死猶不為諡耳是也陳氏祥道曰周官凡言爵祿皆先爵而後祿此先祿而後爵者蓋田不分不可以制祿祿不制不可以定爵先王量財以制用視祿以制爵然後無有餘不足之患矣然則爵祿者班爵祿之序也祿爵者制爵祿之序也君之德純故公侯伯子男無上中下之辨臣之德不必皆純故大夫士有上中下之差然皆止五等者五者天地之中數也孟子以天子至子男凡五等君至下士凡六等與此不同者此言制爵之法孟子言班爵之法制之出于天子故不必言天子班之首于天子與君故兼天子與君也蕙田案周禮序官有卿有中大夫有下大夫而無上大夫王制云諸侯之上大夫卿注云上大夫曰卿春秋書列國之卿皆曰大夫然則天子諸侯之上大夫皆曰卿三代皆然也孟子云卿一位大夫一位卿即上大夫也大夫則兼中下大夫而言此云下大夫蓋亦兼中大夫言之或云諸侯之國無中大夫天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸注皆象星辰之大小也不合謂不朝會也小城曰附庸附庸者以國事附于大國未能以其名通也視猶比也元善也善士謂命士也陸氏佃曰此與孟子所言各差一等非不同也孟子言受地爾蓋天子之卿之田視伯即受地視侯他倣此徐氏自明曰先王設官制祿寰外諸侯自公侯至于附庸王朝之臣自三公至于元士受田相視內外齊一所以制天下偏重之患而使逺近若一也夫分田之法所以內必視夫外者蓋先王之制出為列國之君則入為王朝之臣所以一內外也內為三公稱公外而諸侯亦稱公故畢公以父師保釐東土衛侯以列國入相于周周公居東復相成王山甫徂齊式遄其歸或以三公居外復入為內諸侯所以出入均勞而內外之輕重不分也春秋以來鄭武公入為周司徒鄭莊公為平王卿士而滕侯亦曰我周之卜正蓋畿外諸侯入備王官先王所以一內外此所以內諸侯之祿視外諸侯而為之制也是故三公則受百里之地六卿則受七十里之地二十七大夫則受五十里之地而元士三等亦視附庸而受田夫田者祿之所自出而居官之祿即田也古者內諸侯自公卿大夫皆有采邑之地其田自官給之其耕之者固自有人也大夫之食采地蓋任官之有功者始食之其子孫之繼世者得世其祿不世其官所謂大夫有采以處其子孫也其大夫之無功者則無采地亦與士皆食祿于上以圭田為祭祀耳夫自三公至于元士大者受邑小者受田所謂分田制祿可坐而定於此略可考矣自天子三公之田至天子之元士此畿內諸侯公卿大夫士制祿之法自諸侯之下士至君十卿祿此畿外諸侯以下卿大夫士制祿之法然畿內卿大夫則有采地至諸侯之卿大夫皆量祿分田與之畿內公卿大夫元士皆世祿至諸侯之卿大夫則量祿分田而不世祿矣蕙田案王制所載畿內公卿大夫受田又與孟子不同蓋王制述夏商之法孟子述周初之法周初之列爵分土固多因於二代而亦小有異同如此類是也陸農師謂受地與受田有别孟子言受地王制言受田其實則一沈氏彤駮之曰王制又云方百里者為田九十億畝則未去三之一而已稱田矣以為皆實田者非也制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也注農夫皆受田于公田肥墽有五收入不同也庶人在官謂府火之屬官長所除不命于天子國君者分或為糞諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿注此班祿尊卑之差足疏此班祿尊卑之差者經云下士視上農夫祿以代其耕也則庶人在官者雖食八人以下不得代耕故載師有官田謂庶人在官之田大夫以下位卑祿少故大小國不殊卿與君祿重位尊故祿隨國之大小為節案周禮天子卿大夫士與諸侯之臣執贄同則祿亦同也此自下士至小國之卿倍大夫祿皆據無采地者言之故鄭答林碩云王畿方千里者凡九百萬夫之地三分去一定受田者三百萬夫出都家之田以其餘地之稅祿無田者下士食九人中士食十八人上士三十六人下大夫七十二人中大夫百四十四人卿二百八十八人陳氏祥道曰周官載師有官田則庶人之在官者有田矣春秋傳曰唯卿備百邑國語曰大國之卿一旅之田上大夫一卒之田則諸侯之卿大夫蓋無田者祿出於廪有田者祿出於田下士視上農夫則食九人中士倍下士則食十有八人由是積之上士則食三十六人下大夫則食七十二人三等之國士大夫之祿不以國之大小為差而惟卿君不同者士大夫則分治其職之事則必以祿稱職君卿則兼治一國之事則必以祿視國故也蕙田案此卿大夫士班祿之差與孟子正同蓋周初因於夏殷者次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫注此諸侯使卿大夫俯聘並會之序也其爵位同小國在下爵異固在上耳方氏慤曰三等之國其地與君互降一等故其卿大夫位之所當亦各降一等焉上大夫即卿矣有上中下卿又有上大夫者蓋下大夫之上者也欽定義疏命數則大國次國之卿分二等小國一等位序則各分二等大夫對卿言之皆為下而於此又分上下者崔氏靈恩曰小宰小司徒為上小司馬小司冦小司空為下也或云天官秋官無正卿故吳宋宰稱大魯司冦稱大孔子為魯大司冦是小宰小司冦為上蕙田案班爵之制卿為一等大夫為一等此復分卿為三等大夫為二等則主俯聘之位序言之也大國之中卿當次國之上卿等而上之則大國之上卿可當次國之君故春秋傳叔孫云列國之卿當小國之君也其有中士下士者數各居其上之三分注謂其為介若特行而並會也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出會之事春秋傳謂士為微蕙田案此云中士下士謂於上士之內又分為三等乃上士之中者下者非班爵之中士下士也中士以下無出會之事故止據上士分之而不及其餘也鄭注甚明無可疑者後儒不得其指以為錯簡蓋失之天子三公九卿二十七大夫八十一元士注此夏制也明堂位曰夏后氏之官百舉成數也三疏此一經論夏天子設公卿大夫元士之數周禮官百六十此官百二十故云夏制以夏制不明更引明堂位夏后氏之官百以證之直云百不云百二十故云舉成數也王制之文鄭皆以為殷法此獨云夏制者以明堂殷官二百與此百二十數不相當故不得云殷制也記者故雜記而言之或舉夏或舉殷也蕙田案九卿之名始見於此周禮考工記外有九室九卿朝焉九分其國以為九分九卿治之鄭氏以六卿三孤為九卿則三孤亦卿也此經康成以為夏制是夏有九卿周官立三孤六卿則周亦有九卿講義官之因革不概見於世孔子聞郯子言謂天子失官學在四夷孟子答北宫錡謂其詳不可得聞諸侯惡其害已皆去其籍然則此記所載及書之周官與明堂位所載建官之數其不同者亦各舉其略不必切切然求合也或者遂謂戴記王制皆雜述前代之法未别時世如此處鄭注據明堂位以為夏制亦一端耳朱子儀禮經傳芟去注語而統以夏商之制者蓋以卿大夫士官名唐虞未有三九二十七八十一官數又與周禮不合既録尚書周官篇首述唐虞下及夏商之文遂以記文通屬二代以概著其制并不審計其數以為徴也大抵三代各厯年數百厯世數十即一代中先後不無損益作傳記者各述傳聞文雖有異非抵牾也後人拘牽參合紛紛失之大國三卿皆命于天子下大夫五人上士二十七人次國三卿二卿命于天子一卿命于其君下大夫五人上士二十七人小國二卿皆命于其君下大夫五人上士二十七人注命于天子者天子選用之如今詔書除吏是矣小國亦三卿一卿命于天子二卿命于其君此文似誤脫耳或者欲見畿內之國二卿與數疏此一節論夏家天子命諸侯之國卿大夫及士之前既云夏官此亦夏禮卿大夫士數五等之國悉同但大國三卿並受命于天子也夏之大國謂公與侯也殷周大國並公也崔氏云三卿者依周制而言謂立司徒兼冡宰之事立司馬兼宗伯之事立司空兼司冦之事故春秋左傳云季孫為司徒叔孫為司馬孟孫為司空此是三卿也以此推之故知諸侯不立冡宰宗伯司冦之官也下大夫五人者崔氏云三卿命于天子則大夫以下皆其君自命之也三卿則上中下三品而含上下今云下大夫五人者取卿為言耳知大夫有上下者案前云次國之下卿位當大國之上大夫是也何以五人者謂司徒之下置小卿二人一是小宰一是小司徒司空之下亦置二小卿一是小司冦一是小司空也司馬之下惟置一小卿小司馬也故公羊襄十一年作三軍三軍者何三卿也古者上卿下卿上士下士何休云古者諸侯有司徒司空上卿各一下卿各二司馬事省上下卿各一若有軍事上士相上卿下士相下卿足以為治今襄公乃益司馬故云作三軍踰王制故譏之下卿即大夫也故此云下大夫五人上士二十七人云上士者對府史之屬也周禮五等國悉三卿五大夫二十七士皆與此同但公國長有四命孤一人故典命云公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命而鄭注再引王制以成彼義當恐周之人數與王制同也且曽子問是眀當時周法而云國家五官則五大夫大夫若五則知餘亦不異也且冡宰云施典于邦國設其參傳其伍鄭云參謂卿三人伍謂大夫五人次國三卿二卿命于天子一卿命于其君下大夫五人上士二十七人者次國者夏則伯殷則侯也周則侯伯也而卿大夫士之命及人之數與大國同但一卿其君自命為異也下文備也小國二卿皆命于其君下大夫五人上士二十七人者小國者殷謂伯夏周同子男也案鄭注言小國亦三卿差次而言應一卿命于天子二卿命于其君此惟言二卿則似誤也鄭何以得知應三卿案前云小國又有上中下三卿位當大國之下大夫若無三卿何上中下之有乎故知有三卿也案周禮三命受位鄭云謂此列國之卿始有列位于王則子男之卿再命不應得一卿命于王而鄭今云一卿命于王者謂子男之卿亦得王命而彼注三命下云列國卿三命者此自據侯伯為言以會彼三命受會者耳鄭又為一説畿內之國惟置二卿並是其君自命之今記者或欲因此又以見畿內之法故捨去子男一卿命于王者而不言也陳氏祥道曰周官子男之卿再命國語曰諸侯有卿伯子男有大夫無卿者以其無天子之命卿也王制亦曰小國之卿皆命於其君李氏曰司馬職云凡制軍大國三軍次國二軍小國一軍軍將皆命卿為之則知雖畿外之小國猶一卿命于天子也二卿皆命於君者畿內之國也畿外舉大國次國以見小國畿內舉公卿以見大夫顧氏棟髙曰王制大國三卿皆命于天子明大夫以下皆其君自命案僖十二年管仲辭饗禮曰有天子之二守國髙在宣十六年晉侯請於王命士會為太傅是卿命于天子之證也晉鞏朔以上軍大夫獻捷於周而王曰鞏伯未有職司于王室是大夫不命于天子之證也天子使其大夫為三監監于方伯之國國三人注使佐方伯領諸侯三疏此一節論天子遣大夫往監方伯之國州别各置人之事天子使其大夫者謂使在朝之大夫往監于方伯每一州輒三人三八二十四人崔氏云此謂殷之方伯皆有三人以輔之佐其伯謂監所領之諸侯也周則于牧下置二伯亦或因殷使大夫為三監故燕禮云設諸公之坐鄭云公孤也大國孤公一人而云諸公者容牧有三監然則天子于州牧之國别置三大夫以輔之其尊卑之差則下文其祿視諸侯之卿其爵視次國之君其祿視諸侯之卿者謂公之孤也故燕禮謂之諸公與公孤同也尚書使管叔蔡叔霍叔為三監者為武庚與此别也馬氏曰周官乃施典於邦國而建其牧立其監牧之下又立監所謂三監者是也大國之卿不過三命下卿再命小國之卿與下大夫一命注不著次國之卿者以大國之下互明之此卿命則異大夫皆同周禮公侯伯之卿三命其大夫再命子男之卿再命其大夫一命經疏此一節論大國小國卿大夫命數多少不同之事直云大國之卿及小國之卿不云次國故云不著次國之卿云以大國之下互明之者以大國之卿不過三命則知次國之卿不過再命大國下卿再命則知次國下卿一命故云互明之云此卿命則異者以大國上卿三命下卿再命次國上卿再命下卿一命小國上下卿並皆一命故云卿命則異云大夫皆同者謂大國次國小國大夫皆同一命今經云小國之卿與下大夫一命既與小國連文知非直據小國下大夫一命者以經云大國下卿再命以次差之眀大夫一命自然次國大夫亦一命故云大夫皆同此夏殷制也案周禮云公國之孤四命與餘卿不同則知此大國之卿不過三命亦謂孤也大國下卿再命者謂除孤以外之卿就再命之中分為中卿下卿也故前文云次國之上卿位當大國之中是也次國之卿再命亦謂上卿執政者若魯之季孫下卿一命亦分為中下二等故前文云中當其下下當其上大夫是也小國之卿雖同一命亦分為三等故前文云小國之上卿位當大國之下卿中當其上大夫下當其下大夫其大國次國小國大夫雖同一命當皆分為上下二等文已具于上今總云下大夫者對卿言之云周禮公侯伯之卿三命以下者皆周禮典命文以經云大國之卿不過三命故引公侯伯之卿三命以對之周禮公之孤四命不與三命相當故不引之也蕙田案諸侯之國皆三卿大國則有三命之卿再命之卿次國則有再命之卿一命之卿小國惟一命之卿皆以命於天子者言之若其君加命則大國之卿皆得三命次國之卿皆得再命小國卿之未命於天子者亦得一命所謂命於其君也周官典命掌五等諸臣之命數與此不同故注疏以夏殷解之諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命于其君者如小國之卿天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之于方伯之地疏前以有諸侯之下士以上及大夫卿君故此依前而釋也諸侯之士既眀則天子士同之可知故此文發畿外之卿也諸侯下士視上農夫故九人也上士倍中士故三十六也下大夫倍上士則食七十二人卿四大夫祿則三百八十八人君食二千八百八十人者君謂大國之君也君十卿祿故二千八百八十人次國之卿食二百一十六人者謂夏伯殷侯周則侯伯國也此大夫以下亦如大國大夫而卿惟得三大夫祿耳故特言卿也君食二千一百六十人者君亦十卿祿也小國之卿食百四十四人者小國謂夏周男子殷之伯國也大夫以下亦如大國大夫而卿則二大夫祿耳故君食千四百四十人者君亦十卿祿也次國之卿命于其君者大國三卿皆命于天子則其祿各食二百八十八人若次國三卿二卿命于天子祿各食二百一十六人而一卿命于其君為賤則祿不可等命天子者故視小國卿小國卿食一百四十四人也其若子男一卿命于天子二卿命于其君則祿猶如此其命天子卿無以異也其國小故不復差降也或云視大夫也其天子之士卿大夫無文宜凖大夫之卿大夫士也諸侯世子世國大夫不世爵使以德爵以功注謂縣內及列國諸侯為天子大夫者不世爵而世祿辟賢也諸侯之大夫不世爵祿疏諸侯降于天子故大夫不世爵祿若有大功德亦得世之故隱八年官有世功則有官族邑亦如之是據諸侯卿大夫也昏義天子立六官三公九卿二十七大夫八十一元士以聼天下之外治以明章天下之男教故外和而國治注三公以下百二十人似夏時也蕙田案鄭注王制及昏義俱以三公以下百二十人為夏制據明堂位夏后氏官百之文也然於他書無可考又案王制一篇其述官制上與虞書百揆四嶽九官十二牧不同下與周禮官數亦異故先儒並目為夏殷之制而孟子答北官錡周室班爵祿之問與王制大略多同説者或又據王制孟子之文以駮周禮謂非周公所作由今考之孟子言班爵祿與武成列爵惟五分土惟三相合蓋周初沿夏商二代之舊故有百里七十里五十里之國至周公制禮乃定五等諸侯之封為五百里四百里三百里二百里百里然後因田以制賦因賦以出軍不然則子男五十里之國豈能出萬二千五百人之一軍而論語所云千乘之國亦豈方百里者所能給乎官制之沿革正與封建相表裏知周初之建國不同於周禮則知周初之官制必不合於周禮矣至王制之文又與孟子少異則所謂周因夏殷而損益可知者今依朱子通解以王制官制為夏商之法而孟子所述班爵則定為周初之制云書立政古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣傳禹之臣蹈知誠信于九德之行謂賢智大臣乃敢告教其君以立政宅居也居汝事六卿掌事者牧牧民九州之伯居內外之官及平法者皆得其人則此惟君矣謀面用丕訓德則乃宅人兹乃三宅無義民傳謀所面見之事無疑則能大用順德乃能居賢人于衆官若此則乃能三居無義民大罪宥之四裔次九州之外次中國之外蘇氏軾曰事所謂常任也牧所謂常伯也準所謂準人也呂氏祖謙曰自臯陶以九德告禹夏后蓋世守以為知人之法焉方夏之盛任三宅者如此及其衰也並至于曽無義民言所任者皆不義之人無一君子也兹乃云者此乃三宅之法非他位也猶無義民則他可知矣蔡氏沈曰言非迪知忱恂于九德之行而徒謀之面貌用以為大順于德而任之如此則三宅之人豈復有賢者乎蕙田案三宅指上事牧凖三者經文甚明孔傳因舜典有五宅三居之文遂解宅為流宥不可從亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊蔡氏沈曰三宅謂居常伯常任凖人之位者三俊謂有常伯常任凖人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也三俊説者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如説者所云也右夏商官制詩大雅綿乃召司空乃召司徒傳司空司徒卿官也司空掌營國邑司徒掌徒役之事以疏后稷封邰為上公文王以百里而王則太王之時殷之大國當立三卿其一蓋司馬乎時不召者司馬于營國之事無所掌故也書牧誓王曰嗟我友邦冡君御事司徒司馬司空傳治事三卿司徒主民司馬主兵司空主土指誓戰者卿疏孔以時已稱王而有六師亦應已置六卿今呼三是指誓戰者故不及太宰大宗司冦亞旅師氏傳亞次旅衆也衆大夫其位次卿師大夫官以兵守門者千夫長百夫長傳師帥卒帥大疏周禮二千五百人為師師帥皆中夫百人為卒卒長皆上士孔以師雖二千五百人舉全數亦得為千夫長長與帥其義同故以千夫長為師帥百夫長為卒帥蕙田案武王未克商以前尚用諸侯之制故有司徒司馬司空三卿注疏以為時已置六卿者非也泰誓云王乃大巡六師是史官追述之詞不得為六卿之證立政周公若曰拜手稽首告嗣天子王矣用咸戒于王曰玉左右常伯常任凖人綴衣虎賁傳常所長事常所委任謂三公九卿凖人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休兹知恤鮮哉傳歎此五者立政之本知憂得其人者少吕氏祖謙曰常伯等即三宅三代之書他無所見意者公卿輔相之别名歟官有别名如相曰阿衡保衡三卿曰圻父農父宏父此亦三代輔相大臣别名耳綴衣虎賁特于侍御僕從中錯舉二者以見其餘耳職重者有安危之寄職親者有習染之移其繫天下之本一也蔡氏沈曰牧民之長曰常伯任事之公卿曰常任守法之有司曰凖人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯立政任人凖夫牧作三事傳文武亦法禹湯以立政常任凖人及牧治為天地人之三事虎賁綴衣趣馬小尹傳趣馬掌馬之官言此三者雖小官長必慎擇其人左右擕僕百司庶府傳雖左右擕持器物之僕及百官有司主劵契藏吏亦皆擇人大都小伯藝人表臣百司傳小臣猶皆慎擇其人况大都邑之小長以道藝為表幹之臣及百官有司之職可以非其任乎太史尹伯庶常吉士傳太史下大夫掌邦六典之二尹伯長官大夫及衆掌常事之善士皆得其人司徒司馬司空亞旅傳此有三卿及次卿衆大夫則是文武未伐紂時舉文武之初以為法則夷微盧蒸三亳阪尹傳蠻夷微盧之衆帥及亳人之歸文王者三所為之立監及阪地之尹長皆用賢文王惟克厥宅心乃克立兹常事司牧人以克俊有德蔡氏沈曰任人常任也凖夫凖人也牧常伯也以職言故曰事虎賁綴衣趣馬小尹左右擕僕百司庶府此侍御之官也趣馬掌馬之官小尹小官之長擕僕擕持僕御之人百司若司裘司服庶府若內府太府之屬也大都小伯藝人表臣百司太史尹伯此都邑之官也吕氏曰大都小伯謂大都之伯小都之伯也大都言都不言伯小伯言伯不言都互見之也藝人者卜祝巫匠執技以事上者表臣百司表外也表對裏之詞上文百司蓋內百司若內府內司服之屬所謂裏臣也此百司蓋外百司若外府外司服之屬所謂表臣也太史者史官也尹伯者有司之長如庖人內饔膳夫則是數尹之伯也鐘師尹鐘磬師尹磬大師司樂則是數尹之伯也凡所謂官吏莫不在內外百司之中至於特見其名者則皆有意焉虎賁綴衣趣馬小尹左右擕僕以扈衛親近而見庶府以冗賤人所易忽而見藝人恐其或興淫巧機詐以蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊畿不預百司之數者既條陳厯數文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常德吉士也司徒司馬司空亞旅此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通於天子歟夷微盧蒸三亳阪尹此王官之監於諸侯四夷者也微盧見經亳見史三亳蒙為北亳榖熟為南亳偃師為西亳蒸或以為衆或以為夷名阪未詳古者險危之地封疆之守或不以封而使王官治之參錯於五服之間是謂之尹地志載王官所治非一此特舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以內見外也夫上自王朝內而都邑外而諸侯逺而夷狄莫不皆得人以為官使何其盛歟孟子北宫錡問曰周室班爵祿也如之何孟子曰其詳不可得聞也諸侯惡其害己也而皆去其籍然而軻也嘗聞其略也注諸侯欲恣行憎惡其法度妨害己之所為故滅去典籍今周禮司祿之官無其職是則諸侯皆去之故使不復存也軻孟子名也言嘗間其大綱如此矣今考之禮記王制則合也天子一位公一位侯一位伯一位子男同一位凡五等也注公謂上公九命及二王後也自天子以下列尊卑之位凡五等君一位卿一位大夫一位上士一位中士一位下士一位凡六等注諸侯法天子臣名亦有此六等從君下至於士天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不逹於天子附於諸侯曰附庸注凡此四等土地之等差也天子之卿受地視侯大夫受地視伯元士受地視子男注視比也天子之卿大夫士所受采地之制大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也注公侯之國為大國卿祿居于君祿十分之一也大夫祿居于卿祿四分之一也上士之祿居大夫祿二分之一也中士下士轉相倍庶人在官者未命為士者也其祿比上農夫士不得耕以祿代耕也次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也注伯為次國大夫祿居卿祿三分之一也小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也注子男為小國大夫祿居卿祿二分之一也耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是為差注獲得也一夫一婦佃田百畝百畝之田加之以糞是為上農夫其所得榖足以食九口庶人在官者食祿之等差由農夫有上中下之次亦有此五等若今之斗食佐史除吏也之疏王制云王者之制祿爵公侯伯子男凡五等諸侯上大夫卿下大夫上士中士下士凡五等其不及天子又無六等與孟子不合者蓋以孟子所言則周制而王制所言則夏商之制也王制云公侯田方百里伯七十里子男五十里孟子不言田而言地者蓋祿以田為主王制主於分田以制祿孟子主於制地以分國國以地為主所以有田地之異也王制云天子之三公田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸與孟子不同亦以周制與夏商之制不同也沈氏彤曰孟子因籍去而聞其略此所云並周所沿夏商之制耳考諸周官畿內外皆無七十里之國王制有七十里之國注疏以為夏殷之制而湯國七十里即見孟子書由是以觀而其他之沿於夏商亦明矣蕙田案周禮一書藏於大史非世掌國史莫得見之故韓宣子觀書於大史氏始知周禮在魯而孔子學周禮必於周之柱下史戰國時諸侯所去之籍即周禮也諸侯之籍既失孟子又未適周故所傳聞者皆周初之法與周禮不合右周初官制五禮通考卷二百十三
