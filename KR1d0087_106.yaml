body:
  text: 五禮通考卷九十六刑部尚書秦蕙田撰吉禮九十六宗廟時享明史太祖本紀洪武元年二月壬寅定宗廟禮嵗必親祀以為常禮志洪武元年定宗廟之祭每嵗四孟及嵗除凡五享學士陶安等言古者四時之祭三祭皆合享於祖廟惟春祭于各廟自漢而下廟皆同堂異室則四時皆合祭今宜倣近制合祭於第一廟庶適禮之中無煩凟也太祖命孟春特祭于各廟三時及嵗除則祫祭于徳祖廟太祖本紀洪武元年夏四月丁未祫享太廟蕙田案此時享祫也洪武二年春正月丁未享太廟明會典洪武二年定時享之制春以清明夏以端午秋以中元冬以冬至嵗除如舊明史禮志二年詔太廟祝文止稱孝子皇帝不稱臣凡遣皇太子行禮止稱命長子某勿稱皇太子後稱孝元孫皇帝又改稱孝曽孫嗣皇帝初太廟每室用幣一二年從禮部議用二白繒又從尚書崔亮奏作圭瓚三年禮部尚書崔亮言孟月者四時之首因時變致孝思故備三牲黍稷品物以祭至仲季之月不過薦新而已既行郊祀則廟享難舉宜改從舊制其清明等節各備時物以薦從之春明夢餘錄洪武三年禮臣崔亮奏周禮大宗伯以吉禮事邦國之鬼神以肆獻祼享先王灌以鬱鬯謂始迎尸求神時也禮記郊特牲曰魂氣升於天體魄歸於地故祭有求諸陰陽之義殷人先求諸陰聲是也祭統云祭之屬莫重於灌凡大祭有三始宗廟以樂為致神始以祼為歆神始以腥為陳饌始案説文祼祭也從示果聲酌鬯以灌地夏氏曰灌者謂以圭瓚酌爵以獻尸尸受酒而不飲因灌於地故謂之灌也鬯説文曰鬯以秬釀鬱金草芬芳攸服以降神也徐氏曰秬黒黍也服服事也周人尚臭祼用鬱金鬯以秬黍搗鬱金草取汁而用之和釀其氣芬香調鬯故謂之秬鬯陸佃云秬者百榖之華鬯者百草之英故先王煮以合鬯圭瓚禮書云圭柄也瓚杓也徐氏曰瓚亦圭也圭狀剡上邪鋭之於其首爲杓形謂之瓚於其柄爲注水道所以灌瓚之言進也以進於神今定擬宗廟之祭奠帛之前宜舉用祼禮所用圭瓚宜依周禮以玉爲之瓚口徑四寸深至二寸圭通長一尺二寸博二寸五分厚五分鼻一寸作龍形流空五分瓚盤用金為之口徑九寸深五分足徑七寸髙九分其鬱鬯用糯米代黑黍爲酒以鬱金汁和之是年之冬享廟行家人禮次年始行灌禮明會典洪武四年罷廟庭幃設之次改設黄布幃殿於廟内併具兩廡中居祖考神位廡立親王及功臣每奠獻祖考則遣大臣各分獻不讀祝明史禮志九年新建太廟凡時享正殿中設徳祖帝后神座南向左懿祖右熙祖東西向仁祖次懿祖凡神座俱不奉神主止設衣冠禮畢藏之孟春擇上旬日三孟用朔日及嵗除皆合自是五享皆罷特祭而行合配之禮二十一年定時享儀更前制迎神四拜飲福四拜禮畢四拜二十五年定時享若國有䘮事樂備而不作明會典時享洪武二十六年初定儀一齋戒前一日太常司官宿於本司次日具本奏致齋三日次日進銅人一省牲牛九羊八山羊十豕十九鹿一兔四正祭前二日太常司官奏明日與光禄司官省牲至次日省牲畢同復命一陳設皇髙祖前犢一羊一豕一豋二鉶二籩豆各十二簠簋各二帛二白色奉先制帛皇曾祖陳設同皇祖陳設同皇考陳設同共設酒罇三金爵八瓷爵十六篚四於殿東祝文案一於殿西親王配享四壇共二十一位第一壇夀春王妃劉氏犢一羊一豕一豋二鉶二籩豆各十簠簋各二爵六帛二展親制帛第二壇霍丘王妃翟氏下蔡王安豐王妃趙氏南昌王犢一羊一豕一豋六鉶六籩豆各十簠簋各二爵十八帛六展親制帛第三壇蒙城王妃田氏盱眙王妃唐氏臨淮王妃劉氏陳設與二壇同第四壇寶應王六安王來安王都梁王英山王山陽王招信王犢一羊一豕一豋七鉶七籩豆各十簠簋各二爵二十一帛七展親制帛共設酒罇三篚四於殿東南北向功臣配享十壇中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英虢國忠烈公俞通海蔡國忠毅公張徳勝越國武莊公胡大海梁國武桓公趙徳勝泗國武莊公耿再成永義侯桑世傑河閒忠武王張玉一正祭典儀唱樂舞生就位執事官各司其事導引官導引皇帝至御拜位内贊奏就位典儀唱迎神奏樂樂止内贊奏四拜百官同典儀唱奠帛行初獻禮奏樂執事官各捧帛金爵受酒獻於神御前讀祝官取祝跪於神御右内贊奏跪典儀唱讀祝讀訖奉安於神御前内贊奏俛伏興平身百官同樂止典儀唱行亞獻禮執事官各以瓷爵受酒獻於神御前樂止典儀唱行終獻禮儀同亞獻樂止太常司卿進立殿東西向唱賜福胙光禄司官捧福酒胙自神御前中門左出至皇帝前内贊奏跪搢圭光禄司官以福酒跪進内贊奏飲福酒光禄司官以胙跪進内贊奏受胙出圭俛伏興平身内贊奏四拜百官同典儀唱徹饌奏樂執事官徹饌樂止太常卿詣神御前跪奏禮畢請還宫奏樂内贊奏四拜百官同樂止典儀唱讀祝官奉祝進帛官捧帛各詣燎位奏樂内贊奏禮畢明史恭閔帝本紀洪武二十五年閏五月詔行三年䘮郊社宗廟如常儀樂志洪武元年宗廟樂章迎神太和之曲慶源發祥世徳惟崇致我眇躬開基建功京都之中親廟在東惟我子孫永懐祖風氣體則同呼吸相通来格来崇皇靈顯融奉冊寳時享不用維水有源維木有根先世積善福垂後昆冊寶鏤玉徳顯名尊祗奉禮文仰答洪恩進俎時享不用明明祖考妥神清廟薦以牲牷匪云盡孝願通神明願成治效此帝王之道亦祖考之教初獻夀和之曲徳祖廟初獻云思皇髙祖穆然深元其逺歴年其神在天尊臨太室餘慶綿綿歆于几筵有永其傳懿祖廟初獻云思皇曾祖清勤純古田里韜光天篤其祜佑我曾孫𢎞開土宇追逺竭䖍勉遵前矩熙祖廟初獻云維我皇祖淑後貽謀盛徳靈長與泗同流發于孫枝明禋載修嘉潤如海恩何以酬仁祖廟初獻云惟我皇考既淳且仁弗耀其身克開嗣人子有天下尊歸于親景運維新則有其因亞獻豫和之曲對越至親儼然如生其氣昭明感格在庭如見其形如聞其聲愛而敬之發乎中情終獻熙和之曲承先人之徳化家爲國母曰予小子基命成績欲報其徳昊天罔極慇懃三獻我心悦懌徹豆雍和之曲樂奏具肅神其燕嬉告于成祖亦右皇妣敬徹不遲以終祀禮祥光煥揚錫以嘉祉送神安和之曲顯兮幽兮神運無迹鸞馭逍遥安其所適其靈在天其主在室子子孫孫孝思無斁二十一年更定其初獻合奏餘並同思皇先祖耀靈于天源衍慶流由髙逮元元孫受命追逺其先明禋世崇億萬斯年永樂以後改迎神章致我眇躬句爲助我祖宗又改終獻章首四句爲惟前人之功肇膺天歴延及予小子爰受方國餘並同成祖本紀永樂元年春正月乙酉享太廟七年夏四月癸酉朔皇太子攝享太廟仁宗本紀洪熙元年春正月己卯享太廟英宗前紀正統元年夏四月丁酉朔享太廟禮志正統三年正月享太廟禮部言故事先三日太常寺奏祭祀御正殿受奏是日宣宗皇帝忌辰例不鳴鐘鼓苐視事西角門帝以祭祀重事仍宜升殿餘悉遵永樂間例行之英宗後紀天順二年正月乙丑享太廟六年閣臣以皇太后䘮請改孟冬時享于除服後從之憲宗本紀成化元年春正月乙卯享太廟禮志成化四年禮部以慈懿太后䘮請改孟秋享廟于初七日不從孝宗本紀𢎞治元年春正月乙亥享太廟十六年春正月癸酉遣官代享太廟武宗本紀正徳元年春正月乙酉享太廟世宗本紀嘉靖元年春正月癸丑享太廟明會典凡太廟和羮嘉靖三年奏准依福胙脯醢豚胉例另用一牛不許牲上取辦其牲體分爲六塊一首一背四肢不許零碎明史禮志嘉靖九年春世宗行特享禮令于殿内設幃幄如九廟列聖皆南向各奠獻讀祝三餘如舊十年正月帝詣太廟行特享禮通鑑紀事十年春正月乙未特享太廟正太祖南面位初太祖立四親廟徳懿熙仁同宮異廟各南向孟春特享于羣廟三時合祭于徳祖廟序用昭穆後改建太廟同堂異室亦各南向四孟及嵗除俱各祭于中室仍序昭穆如初罷特享禮至英宗升祔九室悉備憲宗將祔用禮官議祧懿祖孝宗祔祧熙祖武宗祔祧仁祖獨徳祖不祧時享則太祖太宗以下俱東西向至是帝諭張孚敬曰朕欲自今春享奉太祖居中太宗而下各居一室行特享禮三時仍聚羣廟于太祖之室昭穆相向行時祫禮季冬中旬並享太廟親王功臣配食兩廡以存太祖當代之制嵗暮節祭行于奉先殿世廟止行四時之享嵗暮祭于崇先殿庶祭義明而萬世可行也邪論勿惑即會李時議上或咨夏言以助之孚敬唯唯如諭議聞帝從之乃命祠官于廟中設帟如九廟狀奉太祖南向羣宗遞遷就室各南向特享之始退徳祖于祧殿不復預時享矣明史禮志嘉靖十一年大學士張孚敬等言太廟祭祀但設衣冠皇帝改行出主誠合古禮但徧詣羣廟躬自啟納不免過勞今請太祖神主躬自安設羣廟帝后神主則以命内外捧主諸臣帝從其請明會典特饗儀一前期二日太常寺卿同光禄寺卿面奏省牲如常儀次日復命太常寺陳設如圖儀一正祭日上乗輿到廟街門入至靈星門西降輿導引官導上由靈星左門入上至㦸門東帷幕具祭服出導引官導上由㦸門左門入至寢殿同捧主官帝主以大臣恭捧后主以内臣恭捧出主陞太廟至太祖室安主次至太宗以下昭廟安主次仁宗以下穆廟安主訖典儀唱樂舞生就位執事官各司其事導引官導上至御拜位内贊奏就位典儀唱迎神樂作樂止内贊奏四拜平身傳贊百官同典儀唱奠帛行初獻禮樂作内贊導上至太祖前奏跪奏搢圭奏上香司香官捧香跪於上左上三上香訖執事官捧帛跪於上右奏獻帛上獻帛執事者捧爵跪於上右奏獻爵上獻太祖前爵奏出圭上出圭致恭訖奏搢圭捧爵者跪於上左奏獻爵上獻髙后前爵奏出圭奏詣讀祝位上至中室讀祝位樂暫止奏跪傳贊衆官皆跪内贊贊讀祝讀官跪讀訖樂復作奏俛伏興平身傳贊百官同内贊導上至太宗以下昭廟前奏跪奏搢圭奏上香奏獻帛獻爵奏出圭内贊導上至仁宗以下穆廟前奏跪奏搢圭奏上香獻帛獻爵奏出圭奏詣讀祝位内贊導上至太宗前讀祝位奏跪傳贊衆官皆跪樂暫止内贊贊讀祝七廟讀祝官跪齊讀訖樂復作俯伏興平身傳贊百官同奏復位内贊導上復位樂止典儀唱行亞獻禮樂作内贊導上至太祖前奏搢圭奏獻爵上獻太祖髙后前爵訖奏出圭奏復位太宗仁宗以下捧主官獻爵訖樂止典儀唱行終獻禮樂作儀同亞獻樂止太常卿於殿左西向立唱賜福胙内贊奏跪奏搢圭光禄卿捧酒跪於上右奏飲福酒上飲訖光禄官捧胙跪於上右奏受胙上受訖奏出圭俯伏興平身奏四拜傳贊百官同典儀唱徹饌樂作樂止太常卿至中室向上跪奏禮畢請還宫樂作内贊奏四拜樂止典儀唱讀祝官捧祝進帛官捧帛各詣燎位上轉立拜位之東樂作捧祝帛官出殿門内贊奏禮畢上納穆廟主次納昭廟主至太祖髙后前納主訖率捧主官各捧至寢殿安訖易服還宫時祫儀一前一日太常寺陳設如圖儀一正祭日儀同前惟祝文總一讀各廟以下上香獻帛獻爵俱捧主官代行明史樂志嘉靖十五年孟春九廟特享樂章太祖廟迎神太和之曲於皇於皇兮仰我聖祖乃武乃文攘夷正華為天下大君比隆于古越彼放勛肇造王業佑啟予子孫功徳超邁大室攸尊首稱春祀誠敬用申維神格思萬世如存初獻夀和之曲薦帛于篚潔牲于俎嘉我黍稷酌我清酤愚孫毖祀奠獻初舉翼翼精誠對越我皇祖居然顧歆永錫純祜亞獻豫和之曲籥舞既薦八音洋洋工歌喤喤醇醴載羞齋明其將之永佑于子孫嵗事其承之俾嗣續克承百世其保之終獻寧和之曲三爵既崇禮秩有終盈溢孚顒顯相肅雍惟皇祖格哉以繹以融申錫無窮暨于臣民萬福攸同徹饌豫和之曲禮畢樂成神悦人宜籩豆靜嘉敬徹不遲穆穆有容秩秩其儀益祇以嚴矧敢斁于斯還宫安和之曲於皇我祖陟降在天清廟翼翼禋祀首䖍明神既留寢祐靜淵介福綏祿錫䕃綿綿以惠我家邦於萬斯年成祖廟迎神太和之曲於惟文皇重光是宣克勘内難轉坤旋乾外讋百蠻威行八埏貽典則于子孫不忘不愆聖徳神功格于皇天作廟奕奕百世不遷祀神孔明億萬斯年初獻亞獻終獻徹饌還宫俱與太祖廟同仁祖廟迎神太和之曲明明我祖盛徳天成至治訏謨遹駿有聲專奠致享惟古經是程春祀有嚴以迓聖靈惟陟降在庭以賚我思成初獻夀和之曲幣牲在陳金石在縣清酒方獻百執事有䖍明神洋洋降歆自天俾我孝孫徳音孔宣亞獻豫和之曲中誠方殷明神如存醴齊孔醇再舉罍尊福禄穰穰攸介攸臻追逺報酬罔極之恩終獻寧和之曲樂比聲歌佾舞婆娑稱彼玉爵酒㫖且多獻享惟終神聴以和孝孫在位受福不那徹饌雍和之曲牷牲在俎稷黍在簠孝享多儀格我皇祖稱歌進徹髦士膴膴孝孫受福以敷錫于下土還宫安和之曲犆享孔明物備禮成於昭在天以莫不聴神明即安維華寢是憑肇祀迄今百世祇承宣廟英廟憲廟俱與仁廟同孝廟迎神太和之曲列祖垂統景運重熙於惟孝皇敬徳允持用光于大烈化彼烝黎專廟以享經禮攸宜俎豆式陳庶幾来思初獻夀和之曲粢盛孔蠲腯肥牲牷考鼓􅞵􅞵萬舞躚躚清醑初酌對越在天明神居歆式昭厥䖍亞獻豫和之曲祀事孔勤精意未分樂感鳯儀禮䖍駿奔醖齊挹清載奠瑶尊神其格思福禄来臻終獻寧和之曲樂舞既成獻享維終明明對越彌篤其恭篤恭維何明徳是崇神之聴之萬福来同徹饌雍和之曲牲牢醴陳我享我將黍稷蘋藻潔白馨香徹以告成降禧穰穰神錫無疆祐我萬方還宫安和之曲禮享既洽神御聿興廟寢煌煌以憑以寧維神匪遐上下在庭於寢孔安永厎我烝民之生武廟迎神列祖垂統景運重熙於惟武皇昭徳敕威用翦除奸兇大業弗隳專廟以享經禮攸宜俎豆式陳庶幾來思初獻亞獻終獻及徹饌還宫俱與孝廟同睿廟迎神太和之曲於穆神皇秉徳凝道仁厚積累配于穹昊流慶顯休萃于眇躬施于無窮以似以續以光紹我皇宗惟兹氣始俎豆是供循厥舊典式敬式崇神其至止以鑒愚衷初獻夀和之曲制帛牲牢庶羞芬膫玉戚朱干協于韶簫清醑在筵中情纒綿神之格思儀形僾然亞獻豫和之曲瑶爵再陳侑以工歌籥舞蹌蹌八音諧和孝思肫肫感格聖靈致慤則存如聞其聲終獻寧和之曲儀式弗踰奠爵維三樂舞雍容以雅以南仰仁源徳澤嶽崇海淵願啟我子孫緝熙光明維兩儀是參徹饌雍和之曲嘉饌甘只亦既歆只登歌迅徹敬終惟始維神孔昭賚永成于孝矣還宫安和之曲幽顯莫測神之無方祀事既成神返諸帝鄉申發休祥蔭嗣蕃昌宜君兮宜王厯世無疆王圻續通考嘉靖十五年秋罷中元節内殿之祭著爲令先是上諭禮部尚書夏言曰春清明秋霜降二節于陵前祭甚合禮今中元亦有陵祭内殿其勿凟可也言對曰中元係是俗節事本不經陵祀既有遣官而内殿又有祭祀事涉煩數上從之明史禮志嘉靖十七年定享祫禮凡立春特享親祭太祖遣大臣八人分獻諸帝内臣八人分獻諸后立夏時祫各出主于太廟太祖南向成祖西向序七宗之上仁宣英憲孝睿武宗東西相向秋冬時祫如夏禮春明夢餘録十七年九月上尊皇考廟睿宗祔饗太廟睿宗于孝宗弟也躋武宗上遂稱太宗為成祖于時定饗祫禮及其樂章凡立春時饗上親獻太廟遣大臣獻列聖各出主成廟迎神樂别歌三獻徹饌還宫樂如太廟仁宣英憲四廟樂歌同孝武二廟迎神樂别歌三獻徹饌還宫歌同睿廟樂異于諸廟立夏時祫各出主于太廟大殿行禮立秋時祫如夏禮樂歌異于夏立冬時祫如秋禮迎神徹饌還宫樂歌異于秋季冬中旬大祫出四祖太祖成祖七宗主于太廟歌大祫祭畢各歸主于其寢是年皇后助獻罷脱舄禮明史樂志九廟時祫樂章孟夏迎神太和之曲序屆夏首兮風氣薰禮嚴時祫兮戛擊鐘鼖迎羣主来合享交欣於皇列聖正南面以申崇報皇勲初獻夀和之曲瞻曙色方昕仰列聖在上奠金觥而捧幣紋小孫執盈兮敢不懼慇亞獻豫和之曲思皇祖仰聖神来列主會太宸時祫修循古倫惟聖鑒歆愚孫忱恂終獻寧和之曲齊醴清兮麥熟新籩豆潔兮孝念申仰祖功兮宗徳願降祐兮後人徹饌雍和之曲樂終兮禮成告玉振兮訖金聲徹之弗遲以肅精誠還宫安和之曲三獻就兮祖宗鑒享一誠露兮念維長思弗盡兮思弗忘深荷徳澤之啟祐小孫惟頼以餘光神返宫永安保家國益昌孟秋迎神時兮孟秋火西流感時毖祀兮爽氣囬喜金風兮飄來仰祖宗兮永慕哉秋祫是舉兮希鑒歆小孫恭迓兮捧素裁初獻皇祖降筵列聖靈聯執事恐蹎樂舞蹁躚小孫捧盈兮敢弗䖍亞獻再酌兮玉漿潔淨兮馨香祖宗垂享兮錫允昌萬嵗兮此禮行終獻進酒三觥歌舞雍韺鐘鼓轟錚皇祖列聖永享愚誠徹饌秋嘗是舉稌黍豐農三獻既周聖靈顯容小孫時思恩徳兮惟􅍵還宫仰皇祖兮聖神功祀典陳兮報莫窮嘗祫告竣鸞馭旋宫皇靈在天主在室萬禩陟降何有終孟冬迎神時兮孟冬凛以凄感時毖祀氣潛囬遡朔風兮北来仰祖宗兮永慕哉冬祫是舉兮希鑒歆小孫恭迓兮捧素裁初亞終獻俱同孟秋徹饌冬烝是舉俎豆維豐三獻既周聖靈顯容小孫時思恩徳兮惟􅍵還宫同孟秋惟改嘗祫為烝祫王圻續通考上以乾明門鷹隼田犬既經放縱其奉先奉慈崇先祭品止依會典所載鹿兔雉鴈其鷀䳓等物不必復用春明夢餘録新太廟成睿宗帝后遂祔饗然舊廟猶藏主凡四孟嵗除五饗饗太廟日仍設祭于睿宗廟明㑹典嘉靖二十四年重建太廟成奉睿宗升祔而罷睿宗廟祭時饗于正殿則太祖仍居中南向成祖而下以序東西相向孟春仍于上旬擇日孟夏孟秋孟冬仍用朔日俱合饗祫祭仍以嵗除日凡儀節俱如舊明史禮志二十四年新廟成復定享祫止設衣冠不出主隆慶元年孟夏時享以世宗几筵未撤遵正徳元年例先一日帝常服祭告几筵祗請諸廟享祀其後時享祫祭在大祥内者皆如之穆宗本紀隆慶元年夏四月丙戌朝享太廟王圻續通考隆慶元年左給事中王治請正獻皇廟位不報夏四月朔舉時饗太廟禮是日陪祭官大學士李春芳安鄉伯張鉉吏部尚書楊博等不至詔免問時久廢親祀人多懈怠至是上新即位行之陪祀諸臣唯英國公張溶等二十七人先至其餘有陸續陪拜者有趨門外不及入班者有全未到者爲糾儀御史蔡應揚劾奏有㫖姑從寛遂一無所問神宗本紀萬厯三年春正月丁未享太廟明會典嘉靖間稱六廟皇祖考妣太皇帝后皇伯考孝宗敬皇帝皇伯妣孝康敬皇后皇考睿宗獻皇帝皇妣慈孝獻皇后皇兄武宗毅皇帝孝靜毅皇后萬厯七年以槩稱㡬廟祖妣未明更定祝文通列九廟帝后聖號續文獻通考太常寺卿温純等請更定時饗䟽稱太廟時饗原設九帝后冠服今祝文内稱五廟皇祖考妣太皇帝后照得憲廟而下既備列六帝后乃又加以五廟則不止于九矣今查五廟内實止太祖成祖英宗三廟設祭而祝文則多稱二廟于座位未合似應改正其歲暮大祫東壁下配饗設夀春王以下共十五位神牌案帝系圗夀春王于太祖爲伯霍丘以下七王爲兄寶應以下七王爲姪自英宗以來相沿稱夀春及霍丘以下七王俱爲皇髙伯祖寶應以下七王爲皇曾伯祖倫序既紊且世次已逺不宜仍稱髙曾伯祖查親盡帝后止稱徽號今諸王似應改稱本爵庶于名義爲協上命閣臣議議得時饗之制止于九廟太祖成祖百世不遷其餘則以親序而祧廟不與焉查得先廟祝文𢎞治中自憲宗而上稱六廟太皇帝后嘉靖初自孝宗而上稱六廟皇祖考妣太皇帝后至孝烈皇后升祔仁宗奉祧始稱五廟隆慶間因而不改盖其時世宗新升之主即孝烈舊祔之位世數猶未增也至我皇上嗣統則世次異矣方乃時饗祝文自髙皇祖憲宗皇帝至皇考穆宗皇帝已備六廟之數而太祖成祖英宗三廟猶仍五廟之稱揆之世數名義委屬未妥臣等竊惟孝莫大于尊祖禮莫嚴于假廟當皇上躬親對越之頃正祖宗神靈陟降之時帝后尊稱不宜徑從簡畧廟位世次尤當序立分明合無比照嵗暮大祫禮將時饗祝文通列九廟帝后聖號以致如在之誠不必更稱五廟其大祫配饗夀春等王親屬已逺稱謂未安宜將諸王神牌止稱本爵其皇髙伯祖等稱盡行裁去庶得情理之當合候命下容臣等另撰祝文進呈御覽發下該寺并夀春等王神牌一體遵照改正施行從之明史神宗本紀萬厯十九年夏四月丙申享太廟是後廟祀皆遣代熹宗本紀天啟元年春正月庚辰享太廟莊烈帝本紀天啟七年八月即皇帝位冬十月甲午朔享太廟崇禎十六年冬十月辛酉朔享太廟禮志奉先殿洪武三年建每日朝晡帝及皇太子諸王二次朝享皇后率嬪妃日進膳羞諸節致祭又録皇考妣忌日嵗時享祀以爲常宣徳元年奉太宗祔廟畢復遣鄭王瞻埈詣奉先殿設酒果祭告奉安神位天順七年奉孝恭皇后祔廟畢帝還行奉安神位禮畧如祔廟儀𢎞治十七年吏部尚書馬文升言南京進鮮船本爲奉先殿設輓夫至千人沿途悉索今揚徐荒旱願倣古凶年殺禮之意減省以甦民困命所司議行之嘉靖十四年定内殿之祭并禮儀清明中元聖誕冬至正旦有祝文樂如宴樂兩宫夀旦皇后并妃嬪生日皆有祭無祝文樂立春元宵四月八日端陽中秋重陽十二月八日皆有祭用時食舊無祝文今增告詞舊儀但一室一拜至中室跪祝畢又四拜焚祝帛今就位四拜獻帛爵祝畢后妃助亞獻執事終獻徹饌又四拜忌祭舊具服作樂今更淺色衣去樂凡祭方澤朝日夕月出告回參及冊封告祭朔望行禮皆在焉先是冊封告祭以太常寺官執事仍題請遣官至萬厯元年帝親行禮而遣官之請廢二年太常寺以内殿在禁地用内官供事便帝俞其請凡聖節中元冬至嵗暮嘉靖初俱告祭于奉先殿十五年罷中元祭四十五年罷嵗暮祭隆慶元年罷聖節冬至祭其方澤朝日夕月出告回參嘉靖中行于景神殿隆慶元年仍行于奉先殿諸帝后忌辰嘉靖以前行于奉先殿十八年改髙皇帝后忌辰于景神殿文皇帝后以下于永孝殿二十四年仍行于奉先殿凡内殿祭告自萬厯二年後親祭則祭品告文執事皆出内監遣官代祭則皆出太常唯品用脯醢者即親祭亦皆出太常萬厯十四年禮臣言近年皇貴妃冊封祭告奉先殿祝文執事出内庭而祭品取之太常事體不一夫太常専主祀享而光禄則主膳羞内廷祭告盖取象于食時上食之義也宜遵舊制凡祭告内殿無論親行遣官其祭品光禄寺供唯告文執事人親行則辦之内庭遣官則暫用太常寺從之蕙田案明代時享之禮天子親行盡革唐宋以来賞賚陋例可謂撥雲霧而覩青天矣世宗建九廟定特祭祫享之制尤為追慕古昔而奉先殿日享月薦孝思盎然較之宋之齋薦神御殿不更霄壤哉右明廟享五禮通考卷九十六
