body:
  text: 五禮通考卷首第二刑部尚書秦蕙田撰禮經作述源流下漢書藝文志周官經六篇王莽時劉歆置博士師古曰即今之周官禮也亡其冬官以考工記充之周官𫝊四篇河間獻王𫝊修學好古所得書皆古文先秦舊書周官尚書禮後漢書賈逵𫝊作周官解詁儒林𫝊中興鄭衆𫝊周官經後馬融作周官𫝊授鄭𤣥𤣥作周官注𤣥本習小戴禮後以古經核之取其義長者故為鄭氏學鄭𤣥序云世祖以來通人達士大中大夫鄭少贛名興及子大司農仲師名衆議郎衞次仲侍中賈君景伯南郡太守馬季長皆作周禮解詁又云元竊觀二三君子之文章顧省竹帛之浮辭其所變易灼然如晦之見明其所彌縫奄然如合符復析斯可謂雅達廣攬者也二鄭者同宗之大儒今讃而辯之庶成此家世所訓也馬融周官𫝊云秦法與周官相反故始皇特疾惡欲絶滅之搜求焚燒之獨悉孝惠帝始除挾書之律開獻書之路既出於山巖屋壁入于秘府五家之儒莫得見焉至孝成皇帝達才通人劉向子歆校理秘書始得列序著于録畧然亡其冬官一篇以考工記足之時衆儒並出共排以為非是唯歆獨識其年尚㓜務在廣覽博觀末年乃知其周公致太平之迹迹具在斯奈遭天下倉卒兵革並起弟子死喪僅有門人河南緱氏杜子春尚在永平之初年且九十能通其讀鄭衆賈逵往受業焉衆逵洪雅博聞又以經書記轉相證明為解逵解行於世衆解不行吾年六十為武都守郡小少事乃述平生之志著易尚書詩禮𫝊皆訖惟念前業未畢者唯周官年六十有六目瞑意倦自力補之謂之周官𫝊也賈公彦序周禮廢興周禮起于成帝劉歆而成于鄭𤣥附離之者大半故林孝存以為武帝知周官末世凟亂不驗之書故作十論七難以排棄之何休亦以為六國隂謀之書唯有鄭𤣥徧覽羣經知周禮者周公致太平之迹括嚢大典網羅衆家是以周禮大行後王之法易曰神而化之存乎其人此之謂也蕙田案元儒吴澄云周官六篇缺冬官漢藝文志序列于禮家後人名曰周禮文帝召老樂工因得春官大司樂之章景帝子河間獻王好古學購之女子李氏得周官五篇武帝遂藏之秘府哀帝命劉歆校理秘書始著録畧以考工記補之隋志謂河間獻王所補未詳孰是隋書經籍志漢時有李氏得周官周官葢周公所制官政之法上于河間獻王獨闕冬官一篇獻王購以千金不得遂取考工記以補其處合成六篇奏之至王莽時劉歆始置博士以行于世河南緱氏杜子春受業于歆因以教授自後馬融作周官𫝊以授鄭𤣥𤣥作周官注今周官六篇唯鄭注立于國學周官禮十二卷馬融注周官禮十二卷鄭𤣥注周官禮十二卷王肅注周官禮十二卷伊説注周官禮十二卷干寳注梁人有周官寜朔新書八卷晉燕王師王懋約撰亡集注周官禮二十卷崔靈恩撰禮音三卷劉昌宗撰周官禮異同評十二卷晉司空長史陳邵撰周官禮駁難四卷孫畧撰周官禮義疏四十卷沈重撰周官分職四卷周官禮圖十四卷梁有郊祀圖四卷亡儒林𫝊陳邵泰始中為燕王師撰周禮評甚有條貫舊唐書經籍志周官評論十二卷陳邵撰傅元評周官寧朔新書八卷司馬伷序王懋約注周官音三卷鄭元撰唐書藝文志賈公彦周禮疏五十卷通考晁氏曰公彦洺州人永徽中仕至太學博士今併為十二卷世稱其發揮鄭學最為詳明王元度周禮義決三卷宋史藝文志王安石新經周禮義二十二卷通考晁氏曰熈寧中設經義局介甫自為周官義十餘萬言不解考工記陳氏曰熈寜八年詔頒之國子監且置之義解之首王昭禹周禮詳解四十卷通考陳氏曰其學皆宗王氏新説楊時周禮辯疑一卷通考晁氏曰攻安石之書夏休周禮井田譜二十卷陳止齋序曰其説畿内廣成萬步謂之都不能成都謂之鄙雖不能成鄙即成縣者與之為縣成甸者與之為甸至一丘一邑盡然以其不能成都成鄙故謂之閒田以其不可為軍為師而無所専繋故謂之閒民鄉遂市官皆小者兼大者他亦上下相攝備其數不必具其員皆通論也餘至纎至悉要與時務合不為空言鄭諤周禮解義二十二卷中興藝文志詳制度明經㫖學者宗其書黄度周禮説五卷通考陳氏曰字文叔不解考工記又葉適序曰周官晚出而劉歆遽行之大壊矣蘇綽壊矣王安石又壊矣以余考之周之道莫聚于此書周之籍莫切于此書文武周召之實政在是也永嘉陳君舉亦著周禮説十二篇素善文叔論議相出入所以異者君舉以後凖前由本朝至漢溯而通之文叔以前凖後由春秋至本朝沿而别之陳傅良周禮説一卷通考作十三卷曰中興藝文志傅良之言鄭氏之誤三王制漢儒之言今以釋周禮司馬法兵制今以證田制漢官制皆襲秦今以比周官徐筠學于傅良記所口授而為書曰微言傅良為説十二篇専論綱領劉彝周禮中義八卷陳氏曰祠部員外郎長樂劉彝執中撰林之竒周禮講義四十九卷項安世周禮邱乗圖説一卷史浩周禮講義中興藝文志孝宗為建王浩分講周禮多啟發孝宗稱之然止于司闗林椅周禮綱目八卷易祓周禮總義三十六卷胡銓周禮𫝊十二卷俞廷椿周禮復古編三卷鄭景炎周禮開方圖説一卷鄭伯謙周禮類例義㫁二卷魏了翁周禮折衷二卷要義三十卷王與之周禮訂義八十卷王圻續文獻通考補正古周禮胡一桂撰周禮説馬之純著周禮通解聞人充著禮經纂要周昌著周禮解陳戒叔余嚞周禮辯學王居正著周禮解義漳州黄穎周官辯疑徳濬董周禮集解興化黄鐘周禮辯一篇金揚雲翼著周官考正吴澄序次序曰周官六篇其冬官一篇闕漢藝文志序列于禮家後人名曰周禮文帝嘗召至魏文侯時老樂工因得春官大司樂之章景帝子河閒獻王好古學購得周官五篇武帝求遺書得之藏于秘府禮家諸儒皆莫之見哀帝時劉歆校理秘書始著于録畧以考工記補冬官之闕歆門人河南杜子春能通其讀鄭衆賈逵受業于杜漢末馬融傳之鄭𤣥𤣥所注今行于世宋張子程子甚尊信之王文公又為新義朱子謂此經周公所作但當時行之恐未能盡後聖雖復損益可也至若肆為排詆訾毁之言則愚陋無知之人耳冬官雖闕今仍存其目而考工記别為一卷附之經後云周禮纂言吴當著當澄之孫周禮補亡邱葵著葵同安人取五官中錯簡成書因名補亡周官考三卷臧夢解著鄞人周禮集説宋濓著明史藝文志方孝孺周禮考次目録一卷何喬新周禮集注七卷周禮明解十二卷陳鳳梧周禮合訓六卷魏校周禮沿革𫝊六卷官職㑹通二卷楊慎周官音詁一卷舒芬周禮定本十三卷季本讀禮疑圖六卷陳深周禮訓雋十卷周禮訓注十八卷考工記句詁一卷唐樞周禮因論一卷羅洪先周禮疑一卷王圻續定周禮全經集注十四卷李如玉周禮㑹注十五卷柯尚遷周禮全經釋原十四卷金瑶周禮述注六卷王應電周禮𫝊十卷周禮圖説二卷學周禮法一卷非周禮辯一卷馮時行周禮别説一卷施天麟周禮通義二卷周即登周禮説十四卷焦竑考工記解二卷陳與郊考工記輯注二卷郝敬周禮完解十二卷郭良翰周禮古本訂注六卷孫攀古周禮釋評六卷陳仁錫周禮句解六卷張采周禮合解十八卷林兆珂考工記述注二卷徐昭慶考工記通二卷王志長周禮注疏刪翼三十卷郎兆玉注釋古周禮六卷沈羽明周禮彚編六卷王氏志長曰近世非周禮者指瑕摘釁不下十數家自絶于經無論矣自俞夀翁王次㸃吴幼清而來以為周禮未嘗亡散見于五官取五官聨職者而人各以其意回復更定則此乃人之周禮豈復為周公之禮哉禮以上周漢書儒林傳叙言禮則魯高堂生藝文志漢興魯高堂生傳士禮十七篇訖孝宣世后倉最明戴德戴聖慶普皆其弟子三家立于學官禮古經者出于魯淹中蘓林曰里名也及孔氏學七十篇劉氏敞曰學七十當作與十七文相似多三十九篇禮古經五十六卷后氏戴氏經七十篇劉氏敞曰七十當作十七儒林傳漢興魯高堂生傳士禮十七篇而魯徐生善為頌蘓林曰漢舊儀有二郎為此頌貌威儀事有徐氏徐氏後有張氏不知經但能盤辟為禮容天下郡國有容史皆詣魯學之師古曰頌讀與容同下皆類此孝文特徐生以頌為禮官大夫傳子至孫延襄師古曰延及襄二人襄其資性善為頌不能通經延頗能未善也襄亦以頌為大夫至廣陵内史延及徐氏弟子公戸滿意桓生單次皆為禮官大夫師古曰姓公户名滿意也與桓生及單次凡三人單音善而瑕丘蕭奮以禮至淮陽太守諸言禮為頌者由徐氏孟卿東海人也事蕭奮以授后倉魯閭丘卿倉説禮數萬言號曰后氏曲臺記服䖍曰在曲臺校書著記因以為名師古曰曲臺殿在未央宫授沛聞人通漢子方如淳曰聞人姓也名通漢字子方梁戴徳延君戴聖次君沛慶普孝公為東平太傅徳號大戴為信都太傅聖號小戴以博士論石渠至九江太守由是禮有大戴小戴慶氏之學通漢以太子舎人論石渠至中山中尉普授魯夏侯敬又𫝊族子咸為豫章太守大戴授琅邪徐良斿卿為博士州牧郡守家世𫝊業小戴授梁人橋仁季卿楊榮子孫師古曰子孫榮之字也仁為大鴻臚家世𫝊業榮琅邪太守由是大戴有徐小戴有橋楊氏之學劉歆𫝊歆欲立逸禮列于學官移書太常博士曰魯恭王得古文于壊壁逸禮有三十九天漢之後孔安國獻之藏于秘府伏而未發孝成校理舊文以考學官所𫝊經或脱簡或間編隋書經籍志漢初有髙堂生𫝊十七篇又有古經出于魯淹中而河間獻王好古愛學收集餘燼得而獻之合五十六篇並威儀之事古經十七篇與髙堂生所𫝊不殊而字多異自髙堂生至宣帝時后倉最明其業乃為曲臺記倉授梁人戴徳及徳兄子聖沛人慶普于是有大戴小戴慶氏三家並立後漢惟曹充𫝊慶氏以授其子褎然三家雖存並微相𫝊不絶漢末鄭𤣥𫝊小戴之學後以古經挍之取其于義長者作注為鄭氏學其喪服一篇子夏先𫝊之諸儒多為註解今又别行今古經十七篇唯鄭註立于國學餘多散亡並無師説儀禮十七卷鄭𤣥註又十七卷王肅註梁有李軌劉昌宗音各一卷鄭元音二卷亡儀禮義疏見二卷儀禮義疏六卷史記正義七録云古經出魯淹中其書周宗伯所掌五禮威儀之事有六十六篇無敢𫝊者後博士侍其生得十七篇鄭𤣥註今之儀禮是也餘篇皆亡唐書藝文志袁凖註儀禮一卷孔倫註一卷陳銓註一卷蔡超宗註一卷田僧紹註二卷朱氏彛尊曰陸氏釋文序録載註解𫝊述人于儀禮有鄭康成註此外馬融王肅孔倫陳銓裴松之雷次宗蔡超田儶之劉道拔周續之凡十家云自馬融以下並註喪服考隋經籍志十家之中惟載王肅儀禮註十七卷其餘未嘗有全書註也舊唐書經籍考于馬融喪服記下云又一卷鄭𤣥註又一卷袁凖註又一卷陳銓註又二卷蔡超宗註又二卷田僧紹註亦未載諸家有全書註至新唐書藝文志始載袁凖儀禮註一卷孔倫註一卷陳銓註蔡超宗註二卷田僧紹註二卷並不著其註喪服則誤以喪服註為儀禮全書註也下至鄭氏通志畧既于儀禮全書註載袁凖孔倫陳銓蔡超宗田僧紹姓名而又于喪服傳註五家複出由是西亭王孫授經圖焦氏經籍志皆沿其誤當以陸氏序録為正也賈公彦儀禮疏五十卷衞氏湜禮記集説曰同李元植編儀禮疏儀禮自鄭注之後僅有黄慶李孟悊二家疏義公彦等裁定為五十卷宋史藝文志陳祥道註解儀禮三十二卷周燔儀禮詳解十七卷李如圭儀禮集釋十七卷朱熹儀禮經𫝊通解二十三卷宋中興藝文志儀禮經𫝊通解凡二十三卷熹晚嵗所定惟書數一篇缺而未補其曰儀禮集𫝊集注者即此書舊名凡十四卷為王朝禮而卜筮一篇亦缺熹所草定未及刪改朱子乞修三禮劄子畧周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮通禮學究諸科士猶得以誦習而知其説熈寜以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任𫝊遺本宗末其失已甚而博士諸生又不過誦其虚文以供應舉至于其間亦有因儀法度數之實而立文者則咸幽㝠而莫知其源一有大議率用耳學臆㫁而已故臣嘗與一二學者考訂其説欲以儀禮為經而取禮記及諸經史雜書所載有及于禮皆以附于本經之下具列注疏諸儒之説畧有端緒而私家無書檢閲無人抄寫久之未成欲望聖明特詔有司許臣就秘書省闗借禮樂諸書自行招致舊日學徒十餘人踏逐空閒官屋數間與之居處令其編類可以興起廢墜垂之永久使士知實學異時可為聖朝制作之助則斯文幸甚朱在儀禮經傳目録後記先君所著家禮五卷鄉禮三卷學禮十一卷邦國禮四卷王朝禮十四卷今刋于南康道院其曰經傳通解者二十三卷葢先君晚嵗之所親定次第具見于目録唯書數一篇闕而未補而大射禮聘禮公食大夫禮諸侯相朝禮八篇則猶未脱稿也其曰集𫝊集註者此書之舊名也凡十四卷為王朝禮而卜筮篇亦缺餘則先君所草定而未暇刪改者也至于喪祭二禮則嘗以規摹次第屬之門人黄幹俾之類次他日書成亦當相従于此庶幾此書本末具備吴氏師道曰以三禮論則周官為綱儀禮乃本經而禮記諸篇則其疏義三者固有本末之相須而不可闕是以子朱子慨然定為儀禮經傳通解集註之書未完者門人又足成之可謂禮書之大全千古之盛典也虞氏集曰先王既逺禮樂崩壊秦漢以來諸儒相與綴輯所傳聞而誦説之後世猶得稍見其緒餘者則其功也然其臆説自為牴牾亦不無焉自非真知聖人之道不能有所決疑于其閒伊洛諸君子出然後制作之本葢庶幾矣至于朱子将觀其㑹通以行其典禮故使門人輯為儀禮經傳通解其志固将有所為也事有弗逮終身念之而所謂家禮者因司馬氏之説而麤為櫽括特未成書而世已傳之其門人楊氏以其師之遺意為之記注者葢以補其闕也記曽氏棨曰朱子挈儀禮正經以提其綱輯周禮之諸經有及于禮者以備其闕釐為家鄉邦國王朝之目自天子以至于庶人之禮謂之儀禮經傳通解然亦未及精詳黄幹儀禮經𫝊續通解二十九卷陳氏曰外府丞長樂黄幹直卿撰晦菴之婿號勉齋始晦菴著禮書喪祭二禮未及論次以屬幹家續成之楊復儀禮經𫝊續編序昔文公朱先生既修鄉學邦國王朝禮以喪祭二禮屬勉齋黄先生編之先生服膺遺訓不敢少怠嘉定乙卯先取向來喪禮稿本精専修改至庚辰之夏而書成凡十有五卷竊嘗聞其畧曰禮時為大要當以儀禮為本近世以來儒生誦習知有禮記而不知有儀禮昔之僅存者皆廢矣今因其篇目之僅存者為之分章句附𫝊記使條理明白而易攷後之言禮者有所依據不至棄經而任𫝊遺本而宗末王侯大夫之禮闗于綱常者為尤重儀禮既闗其書後世以來處此大變者咸幽㝠而莫知其源取具臨時沿襲鄙陋不經特甚可為慨歎今因小戴喪大記一篇合周禮禮記諸書以補其缺而王侯大夫之禮粲然可考于是喪禮之本末經緯莫不悉備既而又念喪禮條目散濶欲撰儀禮喪服圖式一卷以提其要而附古今沿革于其後草具甫就而先生没矣鳴呼此千古之遺憾也先生所修祭禮本經則特牲少牢有司徹大戴禮則釁廟所補者則自天神地祗百神宗廟以至因事而祭者如建國遷都巡狩師田行役祈禳及祭服祭器事序始終其綱目尤為詳備先生嘗為復言祭禮用力甚久規模已定每反其書翻閲而推明之閒一二條方欲如意修定而未遂也嗚呼禮莫重于喪祭文公以二書屬之先生其責任至不輕也先生于二書也推明文王周公之典辯正諸儒異同之論掊擊後世蠧壊人心之邪説以示天下後世其正人心扶世教之功至逺也而喪服圖式祭禮遺藁尚有未及訂定之遺恨後之君子有能繼先生之志者出而成之是先生之所望也楊復儀禮圖解十七卷曽氏棨曰黄幹通解續晚年祭禮尚未脱稿又以授之楊復復研精覃思蒐經摭傳積十餘年以特牲饋食少牢饋食為經冠之祭禮之首輯周禮禮記諸書分為經𫝊以補其闕綜之以通禮首之以天神次之以地祗次之以宗廟次之以百神次之以因祭次之以祭物次之以祭統有變禮有殺禮有失禮並見之篇終郊祀明堂廟制皆折衷論定以類相従各歸條貫使畔散不屬者悉入于倫理疵雜不經者咸歸于至當而始得為全書又因朱子之意取儀禮十七篇悉為之圖制度名物粲然畢備以圖考書如指諸掌西山真徳秀稱為千古不刋之典焉朱張氏萱曰儀禮經𫝊通解續宋淳祐間信齋楊復著晦菴編集儀禮經𫝊通解獨喪祭二禮未完以屬黄勉齋幹續成之勉齋即世祭禮猶未就于是信齋據二公草本參以舊聞精加修定凡十四卷八十一門徐氏乾學曰儀禮一書冠昏喪既夕虞皆士禮惟大夫而上無冠禮他諸侯大夫昏喪葬禮皆亡唯饋食有少牢有有司徹則太牢亡也特牲少牢唯饋食則享禮亡也聘有公食大夫則公再享大夫禮亡也禮大問曰聘使大夫則間于事相朝禮亡也至王禮止覲則春朝夏宗冬遇殷見衆頫禮亡也推斯而言禮缺廢甚矣葢孔子適周學周禮于柱下史而王朝禮業不展于邦國諸侯憚行禮又自去其籍以孟子之好古一則曰未之學一則曰聞其畧他可知矣惟士鄉禮以習行而存今觀漢中世諸生猶以時習禮于孔氏而孔子廟堂車服禮器猶存可見已其存者又文辭古奥易行難誦讀其所稱宫室堂奥冕弁衣裳飲食用器非今世嘗及見即進趨拜跪辟譲揖遜周旋之節又異宜而莫之行自唐韓愈已苦其難讀而歎以為文武周公之法制具在恨不及其時揖譲進退于其間然自鄭注賈疏而外諸儒先舊説不復得見至唐太宗始表章十三經以注疏列于學官而王安石用三經新説又罷儀禮葢廢已久矣至是文公實始尊信之勉齋黄氏信齋楊氏相繼講求以述先生之志洵禮家之統宗也後之學者可以審所遵循矣文獻通考集釋古禮十七卷釋宫一卷綱目一卷陳氏曰廬陵李如圭寳之撰釋宫者經所載堂室門庭今人所不曉者一一釋之中興藝文志儀禮既廢學者不復誦習或不知有是書乾道間有張淳始訂其訛為儀禮識誤淳熈中李如圭為集釋出入經傳又為綱目以别章句之指為釋宫以論宫室之制朱子嘗與之校定禮書王圻續文獻通考類注儀禮黄士毅著士毅字子洪莆田人朱子門儀禮解葉味道著味道温州人嘉定中進士理宗訪問朱子門人使者以味道對授博士儀禮合抄増損髙斯得著儀禮集説十七卷敖繼公著自序曰儀禮何代之書也曰周之書也何人所作也曰先儒皆以為周公所作愚亦意其或然也周自武王始有天下至周公相成王乃始制禮作樂以致太平故以其時攷之則當是周公之書又以其書攷之辭意簡嚴品節詳偹非聖人莫能為益有以見其果為周公之書也然周公此書乃為侯國而作也而王朝之禮不與焉何以知其然也書中十七篇冠昏相見鄉飲鄉射士䘮既夕士虞特牲饋食凡九篇皆言侯國之士禮少牢饋食上下二篇皆言侯國之大夫禮聘食燕大射四篇皆言諸侯之禮惟覲禮一篇則言諸侯朝天子之禮然主于諸侯而言也喪服篇中言諸侯及公子大夫土之服詳矣其間雖有諸侯與諸侯之大夫為天子之服然亦皆主于諸侯與其大夫而言也由是觀之則此書決為侯國之書無疑矣然則聖人必為侯國作此書者何也夫子有言曰夫禮必本于天殽于地列于鬼神達于喪祭冠昏射御朝聘聖人以禮示之故天下國家可得而正以夫子此言證之則是書也聖人其以為正天下之具也歟故當是時天下五等之國莫不寶守是書而藏之有司以為典籍無事則其君臣相與講明之有事則皆據此以行禮又且班之于其國以教其人此有周盛明所以國無異禮家無殊俗兵寝刑措以躋太平者其以是乎其後王室衰微諸侯不道樂于放縦而惮于檢束也于是惡典籍之不便于已而皆去之則其向之受于王朝者不復藏于有司矣向之藏于有司者或私傳于民間矣此十七篇之所以不絶如綫而幸存以至于今日也或曰此十七篇為侯國之書固也豈其本數但如是而已乎抑或有亡逸而不具者乎曰是不可知也但以經文與其禮之類考之恐其篇數本不止此也是經之言士禮特詳其于大夫則但見其祭禮耳而其昏禮喪禮則無聞焉此必其亡逸者也公食大夫禮云設洗如饗謂如其公饗大夫之禮而今之經乃無是禮焉則是逸之也明矣又諸侯之有覲禮但用于王朝耳若其邦交亦當有相朝相饗相食之禮又諸侯亦當有喪禮祭禮而今皆無聞焉是亦其亡逸者也然此但以經之所嘗言禮之所可推者而知之也而況其間又有不盡然者乎由此言之則是經之篇數本不止于十七亦可見矣記有之曰經禮三百曲禮三千所謂經禮即十七篇之類也其數乃至于三百者豈其合王朝與侯國之禮而言之歟若所謂曲禮則人在經禮之外者如内則少儀所記之類是也先王之世人無貴賤事無大小皆有禮以行之葢以禮有所闕則事有所遺故其數不容不如是之多也去古既逺而其所存者乃不能什一也可勝歎哉夫其已廢壊而亡逸者固不可復見矣其幸存而未泯者吾曹安可不盡心而講明之乎三禮叙録吴澄序次序曰儀禮十七篇漢興髙堂生得之以授瑕丘蕭奮奮授東海孟卿卿授后倉倉授戴徳戴聖大戴小戴及劉氏别録所𫝊十七篇次第各不同尊卑吉凶先後倫序惟别録為優故鄭氏用之今行于世禮經殘缺之餘獨此十七篇為完書以唐韓文公尚苦難讀況其下者自宋王文公行新經義廢黜此經學者益罕傳習朱子考定易書詩春秋四經而謂三禮體大未能緒正晚年欲成其書如此至惓惓也經傳通解乃其編類草槀将俟喪祭禮畢而筆削焉無禄弗逮遂為萬世之闕典澂每伏讀而為之惋惜竊謂樂經既亡經僅存五易之彖傳象傳本與繋辭文言說卦序卦雜卦諸傳共為十翼居上下經二篇之後者也而後人以入卦爻之中詩書之序本自為十篇居國風雅頌典謨誓誥之後者也而後人以冠各篇之首春秋二經三𫝊初皆别行公榖配經其來已久最後注左氏者又分傳以附經之年何居便𫝊文序文與經混淆不准非所以尊經且于文義多所梗礙歴千數百年而莫之或非也莫之或正也至東萊吕氏于易始因晁氏本定為經二篇𫝊十篇朱子于詩書各除篇端小序合而為一以寘經後春秋一經雖未暇詳校而亦别出左氏經文併以刋之臨漳于是易書詩春秋悉復夫子之舊五經之中其未為諸儒所亂者惟二禮經然三百三千不存葢十之九矣朱子補其遺闕則編類之初不得不以儀禮為綱而各疏其下脱稾之下必将有所科别決不但如今槀本而已若執槀本為定則經之章也而以後記補記補傳分𨽻分古于其左也與彖象傳之附易經者有以異乎否也夫以易書詩春秋之四經既幸而正而儀禮之一經又不幸而亂是豈朱子之所以相遺經者哉徒知尊信草剏之書而不能探索未盡之意亦豈朱子之所以望後學者哉嗚呼由朱子而來至于今将百年然而無有乎爾澂之至愚輒因朱子所分禮章重加倫紀其經後之記依經章次秩叙其文不敢割裂一仍其舊附于篇終其十七篇次第並如鄭氏本更不間以它篇庶十七篇正經不至雜糅二戴之記中有經篇者離之為逸經禮各有義則經之𫝊也以戴氏所存兼劉氏所補合之而為𫝊正經為首逸經次之𫝊終焉皆别為卷而不相紊此外悉以歸諸戴氏之記朱子所輯及黄氏喪禮楊氏祭禮亦參伍以去其重複名曰朱氏記而與二戴為三凡周公之典其未墜於地者葢畧包舉而無遺造化之運不息則天之所秩未必終古而廢壊有議禮制度考文者出所損所益百世可知也雖然苟非其人禮不虚行存誠主敬致知力行下學而上達多學而一貫以得夫堯舜禹湯文武周公孔子之心俾吾朱子之學未流不至于漢儒學者事也澂也不敢自棄同志其尚敦朂之哉趙氏魏史曰儀禮者周公監二代而制之以經世者也漢興河間獻王得孔壁禮經五十六篇其十七篇與髙堂生所傳同餘外三十九篇在于秘府謂之逸禮繼以新莽之亂亡焉故迄今所存止此而已其篇次二戴與劉氏别録參差不同而鄭本一依劉氏其注疏朱子葢嘗以浮蕪病焉欲力為釐正而不果近代吴氏亦嘗嗣為考定焉而未盡儀禮逸經八篇吴澄纂次序曰漢興髙堂生得儀禮十七篇後魯共王壊孔子宅得古文禮經于孔氏壁中凡五十六篇河間獻王得而上之其十七篇與儀禮正同餘三十九篇藏在秘府謂之逸禮哀帝初劉歆以列之學官而諸博士不肯置對竟不得立孔鄭所引逸經中霤禮禘于太廟禮王居明堂禮皆其篇也唐初猶存諸儒曽不以為意遂至于亡惜哉今所纂八篇其二取之小戴記其三取之大戴記其三取之鄭氏注奔喪也中霤也禘于太廟也王居明堂也固得儀禮三十九篇之四而投壺之類未有考焉疑古禮逸者甚多不止于三十九篇也投壺奔喪篇首與儀禮諸篇之體如一公冠等三篇雖已不存此例葢作記者刪取其要以入記非復正經全篇矣投壺大小戴不同奔喪與逸禮亦異則知此二篇亦經刋削但未如公冠等篇之甚耳五篇之經文殆皆不完然實為禮經之正篇則不可以其不完而擯之于記故特纂為逸經以續十七篇之末至若中霤以下三篇其經亡矣而篇題僅僅見于注家片言隻字之未泯者猶必收拾而不敢遺亦我愛其禮之意也儀禮𫝊十篇吴澄纂次序曰儀禮傳十篇澂所纂次案儀禮有士冠禮士昏禮戴記則有冠義昏義儀禮有鄉飲酒禮鄉射禮大射禮戴記則有鄉飲酒義射義以至燕聘皆然葢周末漢初之人作以釋儀禮而戴氏抄以入記者也今以此諸篇正為儀禮之傳故不以入記依儀禮篇次萃為一編文有不次者頗為更定射義一篇迭陳天子諸侯卿大夫士之射雜然無倫釐之為鄉射義大射義二篇士相見義公食大夫義則用清江劉氏原父所補並因朱子而加考詳焉于是儀禮之經自一至九經各有其傳矣唯覲義缺然大戴朝事一篇實釋諸侯朝覲天子及相朝之禮故以備覲禮之義而共為𫝊十篇云李氏俊民曰秦熖既熄掇拾遺餘兼收並蓄得𫝊于後漢儒之力也依稀論著以𫝊其舊唐賢之學也㑹通經𫝊洞啟門庭以祛千載之惑朱子之特見也若夫造詣室奥疏剔户牖各有歸趣則至草廬吴先生始無遺憾焉世有好禮之士先觀註疏舊本次考朱子通解然後取先生所次所釋而釋研之乃知俊民之言為不妄也朱氏彛尊曰吴氏儀禮逸經八篇投壺一奔喪二公冠三諸侯遷廟四諸侯釁廟五中霤六禘于太廟七王居明堂八𫝊十篇冠義一昏義二士相見義三鄉飲酒義四鄉射義五燕義六大射義七聘義八公食大犬義九朝事義十方朱子通解目録文簡而倫叙秩然以之頒學官可也明史藝文志汪克寛經禮補逸九卷自序曰自樂亡而經行于世惟五易詩書春秋雖中不無殘闕而未若禮經甚焉然三百三千不𫝊葢十之八九矣朱子嘗考定四經謂三禮體大未易緒正晚年惓惓是書未就而没遂為萬世缺典克寛伏讀而加惋惜焉世之三禮所傳曰周禮曰儀禮曰禮記其實禮記乃儀禮之傳儀禮乃周禮之節文而三禮之要則在乎吉凶軍賓嘉五禮之別也何則吉禮之别十有二以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祠春饗先王以禴夏饗先王以嘗秋饗先王以烝冬饗先王凶禮之别有五以喪禮哀死亡以荒禮哀凶札以弔禮哀禍烖以禬禮哀圍敗以恤禮哀冦亂賓禮之別有八春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同時聘曰問殷頫曰視軍禮之别有五以大師之禮用衆以大均之禮恤衆以大田之禮簡衆以大役之禮任衆以大封之禮合衆嘉禮之别有六以飲食之禮親宗族兄弟以昏冠之禮親成男女以賓射之禮親故舊朋友以饗燕之禮親四方之賓客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國此其大較也然儀禮十有七篇吉禮之存惟特牲饋食篇乃諸侯國之士祭祖廟之禮少牢饋食及有司徹篇乃諸侯卿大夫祭祖禰廟之禮凶禮之存唯喪服篇乃制尊卑親疎冠絰衣服之禮士喪禮篇乃士喪其親自始死至既殯之禮士虞禮篇乃士既葬其親迎精而反日中而祭于殯宮之禮賔禮之存唯士相見禮篇乃士以職位相親始承贄相見之禮聘禮篇乃諸侯相交久無事使相問之禮覲禮篇乃諸侯秋朝天子之禮嘉禮之存惟冠禮篇乃士之子始加冠之禮士昏禮篇乃士娶妻之禮鄉飲酒禮乃鄉大夫賓興賢能飲酒之禮鄉射禮篇乃士為州長㑹民射于州序之禮燕禮篇乃諸侯燕饗其臣之禮大射儀篇乃諸侯将有祭祀之事與羣臣燕飲之禮公食大夫禮篇乃諸侯以禮食鄰國小聘大夫之禮自此之外如朝覲㑹同郊祀大饗帝大喪之禮葢皆亡逸況軍禮無存非闕細故此豈散軼已在于夫子正禮之前哉是以當時吉禮之失如魯君之郊僣夫子之禮孟獻子之禘七月而為之夏父弗綦躋僖公而逆祀三桓大夫立公廟于私家管仲鏤簋朱紘晏平仲豚肩不掩豆至于太廟説笏與燔柴于奥諸侯宫縣而祭以白牡之類是也凶禮之失如伯魚喪出母期而猶哭子路姊喪過而弗除子上母死而不喪成人兄死不為衰有為慈母練冠為妾齊衰者有居喪沐浴佩玉與浴于爨室者有朝祥而暮歌與既祥而絲屨組纓者以至小歛而奠于西方既祖而反柩受弔有以大夫而遣車一乗有葬其夫人而醯醢百甕之類是也賓禮之失如天子下堂而見諸侯朝覲而私覿主國王臣以私好而朝諸侯者有焉諸侯以强大而盟天子之三公者有焉庭燎之百侯國用之繡黼丹朱中衣大夫用之者又有焉嘉禮之失如魯昭公娶于吴則不告天子魯哀公為重肆夏以饗賔天子以喪賓燕者有之夫人出境而饗諸侯者有之大夫反坫與不識殽烝者又有之軍禮之失如齊桓公亟舉兵作偽主以行魯莊公及宋戰以失御而敗戰而復矢始于升陘敗而髽弔始于臺鮐以至蒐田不時丘甲始作之類可攷也又況出師専征習視故常争地黷武嵗無虚日使禮經舊典具存于當時則五禮之失豈至如是之甚哉由是知周之叔世禮典已多散逸葢不特大于秦而亡于漢也今考于儀禮周官大小戴記易詩書春秋𫝊孝經家語及漢儒紀録凡有合于禮者各著其目列為五禮之篇名曰經禮補逸是編也于周公經世之典雖未能極意象之微然五禮之大體葢畧包舉無遺庶幾學者于此俾由得失以觀其㑹通而天之所秩與造化之運不容息者卒歸于性命之正則三代可復也明時制作之盛或有擇焉亦區區愛禮之一得云拾曽氏魯曰六籍之闕也久矣而禮為甚漢興區區掇于秦火之餘而淹中古經旋復散失所存者十有七篇而已周官雖後出而司空之篇竟莫得補二戴所𫝊又往往雜以秦漢之紀然則學者之欲覩夫成周三千三百之目之全固亦難矣至宋慶歴元祐諸儒先後慨然有志于復古及朱子乃始㫁然謂周禮為禮之綱儀禮其本經而禮記其義疏于是創為條目科分臚列出入經𫝊補其遺闕以為王朝邦國家鄉學禮而喪祭二禮則以屬門人黄氏其有功于學者甚大然其書浩博窮鄉晚進有未易遽究者祈門汪先生徳輔父間嘗因其成法别為義例以吉凶軍賓嘉五禮之目㑹萃成書名曰經禮補逸辭約而事備學者便焉學禮之士誠能因汪氏之所輯以達于朱子之書則三百三千之目雖不可復覩其全然郁郁乎文之盛豈不若身歴而目擊之矣乎儀禮逸經十八篇永樂中劉有年上之朱氏彛尊曰吾意有年所進即草廬吴氏本耳逸經八篇傳十篇適合其數當時内閣諸老知其為草廬書是以館閣書目止載草廬本無有年姓名也黄潤玉儀禮戴記附注五卷何喬新儀禮叙録十七卷陳鳳梧射禮集要一卷湛若水儀禮補逸經𫝊測一卷王廷相昏禮圖一卷鄉射禮圖注一卷舒芬士相見禮儀一卷聞人詮飲射圖解一卷朱縉射禮集解一卷胡纉宗儀禮鄭注附逸禮二十五卷郝敬儀禮節解十七卷王志長儀禮注疏刪翼十七卷以上儀禮漢書藝文志禮記百三十一篇七十子後學者所記也明堂隂陽三十三篇古明堂之遺事王史氏二十一篇七十子後學者師古曰劉向別録云六國時人也曲臺后倉九篇如淳曰行射禮于曲臺后倉為記故名曲臺記中庸説二篇師古曰今禮記有中庸一篇亦非本禮經葢此之流明堂隂陽説五篇明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉倉等推士禮而至于天子之説師古曰瘉與愈同愈勝也能孔氏頴達曰禮記之作出自孔氏但正禮殘缺無復明故范武子不識殽烝趙鞅及魯君謂儀為禮至孔子沒後七十二子之徙共撰所聞以為此記或録舊禮之義或録變禮所由中庸是子思伋所作緇衣公孫尼子所撰鄭康成云月令吕不韋所修盧植云王制漢文時博士所録其餘衆篇皆如此例未能盡知所記之人鄭君六藝論云案漢書藝文志儒林𫝊云𫝊禮者十三家唯髙堂生及五𫝊弟子戴徳戴聖名在也又云戴徳𫝊禮八十五篇則大戴禮是也戴聖𫝊禮四十九篇則此禮記是也虙氏曰禮記乃儀禮之𫝊儀禮有冠禮禮記則有冠義以釋之儀禮有昏禮鄉飲酒禮燕禮聘禮禮記則有昏義鄉飲酒義燕義聘義以釋之其他篇中雖或雜引四代之訓而其言多與儀禮相為表裏但周禮儀禮皆周公所作而禮記則漢儒所録雖曰漢儒所録然亦儀禮之流也儀禮之書漢初已行故髙堂生𫝊之蕭奮肅奮傳之孟卿孟卿傳之后倉后倉傳之戴徳戴聖二戴用習儀禮而録禮記故知禮記儀禮之流也孟卿𫝊孟卿善為禮𫝊后倉世所𫝊后氏禮皆出孟卿戴徳號大戴聖號小戴以博士論石渠後漢書橋元𫝊七世祖仁従戴徳學著禮記章句四十九篇號曰橋君學成帝時為大鴻臚儒林𫝊鄭𤣥注小戴所𫝊禮記四十九篇隋書經籍志漢初河間獻王又得仲尼弟子及後學者所記一百三十一篇獻之時亦無𫝊之者至劉向考校經籍檢得一百三十篇向因第而叙之而又得明堂隂陽記三十三篇孔子三朝記七篇王氏史氏記二十一篇樂記二十三篇凡五種合二百十四篇戴徳刪其煩重合而記之為八十五篇謂之夫戴記而戴聖又刪大戴之書為四十六篇謂之小戴記漢末馬融遂𫝊小戴之學融又足月令一篇明堂位一篇樂記一篇合四十九篇而鄭元受業于融又為之註今小戴記四十九篇唯鄭注立于國學禮記十卷漢北中郎将盧植注禮記二十卷漢九江太守戴聖撰鄭元注禮記三十卷王肅注梁有禮記十二卷業遵註亡禮記寜朔新書八卷王懋約註梁有二十卷月令章句十二卷漢左中郎将蔡邕撰禮記音義隠一卷謝氏撰禮記音二卷宋中散大夫徐爰撰梁有鄭元王肅射慈射貞孫毓繆炳音各一卷蔡謨東晉安北諮議參軍曹耽國子助教尹毅李軌員外郎范宣音各二卷徐邈音三卷劉昌宗音五卷亡禮記三十卷魏秘書監孫炎註禮畧二卷禮記要鈔十卷緱氏撰梁有禮義四卷魏侍中鄭小同撰摭遺别記一卷樓㓜瑜撰亡禮記新義疏二十卷賀㻛撰梁有義疏三卷宋豫章郡丞雷肅之撰亡禮記義疏九十九卷皇侃撰禮記講疏四十八卷皇侃撰禮記義疏四十巻沈重撰禮記義十卷何氏撰禮記大義十卷梁武帝撰禮記文外大義二卷秘書學士禇暉撰禮記義證十卷劉芳撰禮記畧解十卷庾氏撰禮記評十一卷劉雋撰舊唐書經籍志小戴禮記二十卷戴聖撰鄭𤣥注月令章句十二卷戴顒撰禮記義記四卷鄭小同撰禮記講疏一百卷皇侃撰義疏五十卷皇侃撰禮記義疏四十卷熊安生撰禮記義證十卷劉芳撰禮記類聚十卷禮記正義七十卷孔穎達撰䘙氏湜禮記集説孔氏字仲達先與朱子奢李善信賈公彦柳士宣范義頵張權等取皇甫侃熊安生二家義疏刪定續與前修疏人及周元達趙君賛王士雄等覆更詳審為正義七十卷又曰鄭氏註雖間有拘泥而簡嚴該貫非後學可及孔氏正義以一時崇尚䜟緯多所採録然記載詳實未易輕議苐自晉宋而下𫝊禮學者南人有賀循賀㻛庾蔚崔靈恩沈重范宣皇甫侃等北人有徐道明李業興李寳鼎侯聰熊安生等何止十數家正義實據皇甫侃以為本而以熊安生補其所不備後世但知為孔氏之書而已禮記疏八十卷賈公彦撰唐書藝文志御刋定禮月令一卷集賢院學士李林甫陳希烈徐安貞直學士劉光謙齊光又陸善經修撰官史元晏待制官梁令瓉等注解自第六易為第一文獻通考晁氏曰唐明皇刪定李林甫等注序謂吕氏定以孟春日在營室不知氣逐閏移節隨斗建于是重有刪定國朝景祐初改従舊文由是别行明宋三朝國史藝文志初禮記月令篇第六即鄭注唐皇改黜舊文附益時事號御刪月令升為首篇集賢院别為之注厥後學者傳之而釋文義疏皆本鄭志遂有别注小疏者詞頗卑鄙淳化初剡國子監李至請復行鄭注従之成伯璵禮記外𫝊四卷晁氏曰義例兩卷五十篇名數兩卷六十九篇劉明素序張㓜倫注王元感禮記繩愆三十卷禮記字例異同一卷元和十二年詔定宋史藝文志楊逢殷禮記音訓指説二十卷上官均曲禮講義二卷吕大臨禮記𫝊十六卷衞氏是禮記集説中興館閣書目止一卷有表記冠義昏義鄉飲酒義射義燕義聘義喪服四制八篇而已今書坊所刋十卷又有曲禮上下孔子閒居中庸緇衣深衣儒行大學八篇李格非禮記精義十六卷衞氏湜禮記集説字文叔就曲禮檀弓王制喪服小記大傳少儀學記樂記雜記喪大記祭法十一篇中隨所見為之義陸佃禮記解十四卷𫐠禮新説四卷宋中興藝文志牽于字説宣和末其子宰上之方慤禮記解義二十卷文獻通考陳氏曰政和三年表進自為之序以王氏父子獨無解義乃取其所撰三經義及字説中而明之著為此解由是得上舎出身其所解文義亦明白馬希孟禮記解七十卷文獻通考陳氏曰希孟字彦醇未詳何人亦宗王氏朱子語録方馬二解合當參看儘有說得好處不可以其新學而黜之最衛氏湜禮記集説方氏馬氏及山隂陸氏三家方氏為詳悉有補初學然雜以字説且多牽合大為一書之累間有與長樂陳氏講義同者方自序亦謂諸家之説于王氏有合者悉取而用之則其説不皆自己出也馬氏陸氏皆畧馬氏大學解又與藍田吕氏同陸氏説多可取間有穿鑿亦新學誤之也王普深衣制度一卷夏休破禮記二十卷中興藝文志夏休以禮記多漢儒雜記于義有未安者乃援禮經以破之然中庸大學實孔氏遺書也衛氏湜曰夏休立意毀訾㫁章拆句妄加譏詆中庸大學猶且不免其不知量甚矣戴溪曲禮口義二卷學記口義三卷胡銓禮記𫝊十八卷衞氏湜禮記集説廬陵胡氏字邦衡禮記小疏二十卷不知作者衞湜禮記集説二百六十卷文獻通考陳氏曰直秘閣崑山衞湜正叔集諸家説自注疏而下為一書各著其姓氏寳慶二年表上之由是寓直中秘魏鶴山為作序楊簡孔子閒居講義一篇鄭樵鄉飲禮七卷張虙月令解十二卷吴仁傑禘祫綿蕞三卷魏了翁禮記要義三十三卷衞氏湜禮記集説名氏長樂劉氏彛字執中七經中義内禮記四十卷臨川王氏安石字介甫禮記發明一卷横渠張子記説三卷延平周氏諝字希聖解王制等十七篇不見于中興館閣書目石林葉氏夢得字少藴解曲禮等十九篇仲子模過庭録時有論説慶源輔氏廣字漢卿所註疏方氏馬氏陸氏胡氏諸說倣吕氏讀書紀編集間有已説金華應氏鏞字子和纂義二十卷金華邵氏淵字萬宗解曲禮等五篇王圻續文獻通考禮記解二十卷何述著浦城人禮記纂義蘭溪應鏞禮記解龍溪黄樵仲晉江吕椿小戴記集解岳珂飛之孫戴記心法徐畸禮記通攷繆主一禮記正義一卷温州鄭樸翁禮記集説陳澔注澔都昌人號雲荘濳心禮學自序曰先君子師事雙峰先生十有四年以是經三領鄉書為開慶名進士所得于師門講論甚多中罹煨燼隻字不遺不肖僭不自量㑹萃衍繹而附以臆見之言名曰禮記集説校正小戴記三十六篇吴澄纂次序曰小戴記三十六篇澂所序次漢興得先儒所記禮書三百餘篇大戴氏刪合為八十五小戴氏又損益為四十三曲禮擅弓雜記分上下馬氏増以月令明堂位樂記鄭氏従而為之注總四十九篇精粗雜記靡所不有秦火之餘區區掇拾所謂存十一于千百雖不能以皆醇然先王之遺制聖賢之格言往往賴之而存苐其諸篇出于先儒著作之全書者無幾多是記者旁搜博採𠞰取殘編㫁簡㑹萃成篇無復詮次讀者每病其雜亂而無章唐魏鄭公為是作類禮二十篇不知其書果何如也而不可得見朱子嘗與東萊先生吕氏商訂三禮篇次欲取戴記中有闕于儀禮者附之經其不係于儀禮者仍别為記吕氏既不及答而朱子亦不及為幸其大綱存于文集猶可攷也晚年編校儀禮經傳則其條例與前所商訂又不同矣其間所附戴記數篇或削本篇之文補以他篇之文今則不敢故止就本篇之中科分節剔以類相従俾其上下章文義聫屬章之大指標識于左庶讀者開卷瞭然若其篇第則大學中庸程子朱子既表章之以與論語孟子並而為四書固不容復厠之禮篇而投壺奔喪實為禮之正經亦不可以雜之于記其冠義昏義鄉飲酒義射義燕義聘義六篇正釋儀禮別輯為傳以附經後矣此外猶冇三十六篇曰通禮者九曲禮内則少儀玉藻通記小大儀文而深衣附焉月令王制専記國家制度而文王世子明堂位附焉曰喪禮者十有一喪大記雜記喪服小記服問檀弓曽子問六篇記喪而大𫝊間𫝊問喪三年問喪服四制五篇則喪之義也曰祭禮者四祭法一篇記祭而郊特牲祭義祭統三篇則祭之義也曰通論者十有二禮運禮器經解一類哀公問仲尼燕居孔子閒居一類坊記表記緇衣一類儒行自為一類學記樂記其文雅馴非諸篇比則以為是書之終嗚呼由漢以來此書千有餘嵗矣而其顛倒糾紛至朱子始欲為之是正而未及竟豈無望于後之人歟用敢竊取其義修而成之篇章文句秩然有倫先後始終頗為精審將來學禮之君子于此考信其有取乎非但為戴氏忠臣而已也禮記纂言吴澄著禮記集義陳櫟著休寜人禮記説韓性著禮記集説四十九卷彭絲著絲安福人禮記節疏張業著安福人禮記正訓劉績著明史藝文志連伯聰禮記集𫝊十六卷朱右深衣考一卷黄潤玉考定深衣古制一卷永樂中勅修禮記大全三十卷胡廣等纂鄭節禮𫝊八十卷岳正深衣注疏一卷楊廉深衣纂要一卷夏時正深衣考一卷王廷相夏小正集解一卷深衣圖論一卷夏言深衣考一卷王崇慶禮記約䝉一卷楊慎檀弓叢訓二卷一名附注夏小正解一卷張孚敬禮記章句八卷戴冠禮記集説辯疑一卷柯尚遷曲禮全經類釋十四卷李孝先投壺譜一卷黄乾行禮記目録四十九卷聞人徳潤禮記要指補十六卷邱橓禮記摘訓十卷徐師曽禮記集註三十卷戈九疇禮記要㫖十六卷陳與郊檀弓輯註二卷姚舜牧禮記疑問十二卷沈一中禮記述注十八卷王荁禮記纂註四卷郝敬禮記通解二十二卷余心純禮經搜義二十八卷劉宗周禮經考次正集十四卷分集四卷樊良樞禮測二卷陳有元禮記約述八卷朱泰禎禮記意評四卷湯三才禮記新義三十卷王翼明禮記補注三十卷黄道周月令明義四卷坊記集𫝊二卷表記集𫝊二卷緇衣集解二卷陳際泰王制説一卷張習孔檀弓問四卷盧翰月令通考十六卷楊鼎熈禮記敬業八卷間有章説禮三十一卷以上禮記漢書藝文志軍禮司馬法百五十五篇古封禪羣祀二十二篇封禪議對十九篇武帝時也漢封禪羣祀三十六篇議奏三十八篇石渠後漢書儒林𫝊孔安國所獻禮古經五十六篇及周官經六篇前世𫝊其書未有名家中興已後亦有大小戴博士雖相𫝊不絶然未有顯于儒林者建武中曹充習慶氏學𫝊其子褒遂撰漢禮曹褒𫝊父充持慶氏禮建武中為博士作章句辯難于是遂有慶氏學褒拜博士作通義十二篇演經雜論百二十篇又𫝊禮記四十九篇慶氏學遂行于世儒林𫝊董鈞習慶氏禮永平初為博士鄭𤣥𫝊自秦焚六經聖文埃滅漢興諸儒頗修藝文及東京學者亦各名家而守文之徒滯固所禀異端紛紜互相詭激遂令經有數家家有數説章句多者或乃百餘萬學徒勞而少功後世疑而莫正鄭𤣥括嚢大典網羅衆家刪裁繁蕪刋改漏失自是學者畧知所歸仲尼之門不能過也及𫝊授生徒並専以鄭家法云徐防𫝊永元十四年司空徐防以五經久逺聖意難明以誤後學上疏曰漢承秦亂經典廢絶本文畧存或無章句收拾缺遺建立明經博召儒術開寘太學孔聖既逺微㫖將絶故立博士十有四家設甲乙之科以勉勸學者所以示人好惡改敝就善者也㑹要盧植少與鄭𤣥同事馬融能通古今好學研精而不守章句作三禮解詁盧植𫝊熹平四年拜九江太守作尚書章句三禮解詁時始立太學石經以正五經文字植上書曰少従通儒馬融受古學頗知今之禮記特多回冗臣前以周禮諸經發起粃繆敢率愚淺為之解詁願得將能書生二人詣東觀専心研精合尚書章向考禮記失得庶裁定聖典刋立碑文古文科斗近于為實而厭抑流俗降在小學中興通儒班固賈逵鄭興父子並悦之今毛詩左氏周禮各有𫝊記與春秋相表裏宜寘博士為立學官以廣聖意嵗餘拜議郎校五經魏志王肅𫝊肅善賈馬之學而不好鄭氏采㑹同異為尚書詩論語三禮左氏解肅父朗字景興著易春秋孝經周易𫝊肅撰定皆列學官儒林𫝊董景道字文博三禮之義専遵鄭氏著禮通論非駁諸儒演廣鄭㫖隋書經籍志大戴禮記十三卷漢信都王太傅戴徳撰梁有諡法三卷後漢安南太守劉熈注亡一文獻通考晁氏曰漢戴徳纂亦河間王所獻百三十篇劉向校定又得明堂隂陽記三十三篇徳刪為八十五篇今書止四十篇其篇目自三十九篇始無四十三四十四四十五六十一四篇有兩七十四葢因舊闕録之毎卷稱今卷第幾題曰九江太守戴徳撰案九江太守聖也徳為信都王太傅葢後人誤題三陳氏曰自隋唐志所載卷數皆與今同而篇第乃自十九而下止于八十一其前闕三十八篇末闕四篇所存當四十三而于中又闕第七十二複出一篇實存四十篇意其闕者即聖所刪耶然哀公問投壺二篇與今禮記文不異他亦間有同者保傅傳世言賈誼書所従出也今考禮詧篇湯武秦定取舎一則盡出誼疏中反若取誼語𠞰入其中者公符篇至録漢昭帝冠詞則此書殆後人好事者采諸書為之故駇雜不經決非戴徳本書也做朱子曰大戴禮冗雜其好處已被小戴採摘來禮記了然尚有零碎好處在石渠禮論四卷戴聖撰梁有羣儒疑義十二巻戴聖撰禮論三百卷宋御史中丞何承天撰禮論條牒十卷宋太尉參軍任預撰禮論帖三卷任預撰梁四卷禮論鈔二十卷庾蔚之撰禮論要鈔十卷王儉撰梁三卷禮論要鈔一百卷賀㻛撰禮論鈔六十九卷禮論要鈔十卷梁有齊御史中丞荀萬秋鈔畧二卷尚書儀曹郎丘季彬論五十八卷議一百三十卷統六卷亡禮論答問八卷宋中散大夫徐廣撰禮論答問十三卷徐廣撰禮答問二卷徐廣撰殘缺梁十一卷禮答問六卷庾蔚之撰禮答問三卷王儉撰梁有晉益壽令吴商禮難十二卷雜議十二卷又禮議雜記故事十三卷喪雜事二十卷宋光禄大夫傅隆議二卷祭法五卷亡禮答問十二卷禮雜問十卷范甯撰禮答問十卷何佟之撰梁二十卷禮雜問十卷禮雜答問八卷禮雜答問六卷禮雜問答鈔一卷何佟之撰問禮俗十卷董勛撰問禮俗九卷董子𢎞撰答問雜儀二卷任預撰禮儀答問八卷王儉撰禮疑義五十三卷梁䕶軍周捨撰制㫖革牲大義三卷梁武帝撰禮樂義十卷禮秘義三卷三禮目録一卷鄭𤣥撰梁有陶𢎞景注一卷亡三禮義宗三十卷崔靈恩撰三禮宗畧二十卷元延明撰三禮大義十三卷三禮大義四卷三禮雜大義三卷梁有司馬法三卷李氏訓記三卷又郊丘議三卷魏太尉蒋濟撰祭法五卷又明堂議三卷王肅撰雜祭法六卷晉司空中郎盧諶撰祭典三卷晉安北将軍范汪撰七廟議一卷又後養議五卷干寳撰雜鄉射等議三卷晉太尉庾亮撰逆降議三卷宋特進顔延之撰逆降議一卷田僧紹撰分明士制三卷何承天撰釋疑二卷郭鴻撰答問四卷徐廣撰答問五十卷何允撰又答問十卷亡三禮圖九卷鄭𤣥及後漢侍中阮諶等撰周室王城明堂宗廟圖一卷鄭諶撰梁又有冠服圖一卷五宗圖一卷月令圖一卷亡舊唐書經籍志雜禮義十一卷吴商等撰禮議雜記故事十一卷禮論答問九卷范甯撰雜禮儀問答四卷戚夀撰禮論降議三卷顔延之撰禮論抄六十六卷任預撰禮雜抄畧二卷荀萬秋撰禮議一卷傅伯祚撰禮統郊記六卷禮論要抄十三卷禮論抄畧十三卷禮大義十卷梁武帝撰禮統十三卷賀𫐠撰三禮圖十二卷夏侯伏朗撰唐書藝文志魏徴次禮記二十卷亦曰類禮舊唐書魏徴以戴聖禮記編次不倫遂為類禮二十卷以類相従削其重複採先儒訓注擇善従之研精覃思數年而畢太宗覽而善之賜物千段録數本賜太子諸王仍藏秘府元行沖類禮五十卷李敬元論禮六十卷張鎰三禮圖九卷唐質類禮二十卷韋彤五禮精義十卷丁公著禮志十卷丘伯敬五禮異同十卷孫玉汝五禮名義十卷杜肅禮畧十卷張頻禮粹二十卷宋史藝文志五禮緯書二十卷聶崇義三禮圖集注二十卷文獻通考晁氏曰聶崇義周世宗時被㫖纂集以鄭康成阮諶等六家圖刋定建隆三年奏之歐陽丙三禮名義五卷魯有開三禮通義五卷殷介集五禮極義一卷李洪澤直禮一卷王慤中禮八卷陸佃禮象十五巻文獻通考陳氏曰陸佃改舊圖之失其尊爵彞鼎皆取公卿家及秘府所藏古遺器與聶圖大異何洵直禮論一巻陸佃大裘議一巻陳祥道禮例詳解十巻禮書一百五十巻文獻通考晁氏曰祥道元祐初以左宣議郎仕太常博士解禮之名物且繪其象甚精博朝廷聞之給札繕寫奏御陳氏曰論辨詳博間以繪畫于唐代諸儒之論近世聶崇義之圖或正其失或補其闕元祐中表上之李心傳丁丑三禮辨二十三巻中興藝文志以儀禮之説與鄭氏辨者八十四周禮之説與鄭氏辨者二百二十六皆有据大戴之書疑者三十小戴之書疑者一百九十八鄭氏之注疑者三百七十五亦各辨其所以而詳識之鄭伯謙太平經國書統集七十卷鄭樵鄉飲禮七巻王圻續文獻通考三禮發微趙敦臨奉化人伊洛禮書補亡陳傅良禮講解奉化舒璘禮學舉要禮學從宜仙遊鄭鼎新著三禮說蕭㪺著校正大戴記三十四篇吳澄序次序曰大戴記三十四篇澂所序次案隋志大戴記八十五篇今其書缺前三十八篇始三十九終八十一當為四十三篇中間第四十三第四十四第四十五第六十一四篇復闕第七十四有二總四十篇據云八十五篇則末又缺其四或云止八十一皆不可考竊意大戴類萃此記多為小戴所取後人合其餘篇仍為大戴記已入小戴記者不復録而闕其篇是以其書冗泛不及小戴書甚盖彼其膏華而此其查滓爾然尚或間存精語不可棄遺其與小戴重者投壺哀公問也投壺公冠諸侯遷廟諸侯釁廟四篇既入儀禮逸經朝事一篇又一儀禮傳哀公問小戴已取之則于彼宜存于此宜去此外猶三十四篇夏小正猶月令也明堂猶明堂位也本命以下雜録事辭多與家語荀子賈傅等書相出入非專為記禮設禮運以下諸篇之比也小戴文多綴補而此皆成篇故其篇中章句罕所更定唯其文字錯誤參互考校未能盡正尚以俟好古博學之君子云三禮考注康宗武著三禮訂疑湛若水著明史藝文志夏時正三禮儀畧舉要十巻湛若水二禮經傳測六十八巻大畧以曲禮儀禮為經禮記為傳吳嶽禮考一巻劉績三禮圖二巻貢汝成三禮纂注四十九巻李黼二禮集解十二巻合周禮儀禮為一集諸家之説以解之李經綸三禮類編三十卷鄧元錫三禮編繹二十六巻唐伯玉禮編二十八巻以上通禮右禮經傳述源流五禮通考巻首第二
