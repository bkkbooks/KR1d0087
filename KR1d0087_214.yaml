body:
  text: 五禮通考卷二百四刑部尚書秦蕙田撰嘉禮七十七體國經野書禹貢導岍及岐至于荆山逾于河錐指傳曰三山皆在雍州河謂梁山龍門西河正義曰地理志云吳嶽在扶風汧縣西古文以為汧山岐山在美陽縣西北荆山在馮翊懷德縣南蘇氏曰逾者禹自荆山而過於河也孔氏以為荆山之胍逾河而為壺口雷首者非是渭案導者循行之謂導山猶云隨山蘇氏云自此以下至敷淺原皆隨山之事是也導山時尚未施功先儒皆以此為通水曰導山之澗谷而納之川殊失經旨汧縣今為鳯陽府之隴州州南三里有汧縣故城岍岐荆並在河西渭北禹首導此三山而逾河以抵壺口則冀州之所先治者其規畫早定于胸中矣岍一作汧説文有汧字而無岍字汧縣唐為汧源縣隴州治明省縣入焉周禮雍州山鎮曰嶽山漢志以吳山為雍州山是吳山即嶽山也爾雅河南華河西嶽河東岱河北恆朱長孺云商周之世疑以岍為西嶽故爾雅職方皆名嶽山吳山漢志雖云在縣西而岡巒綿亘延及其南與嶽山只是一山自周尊岍山曰嶽山俗又謂之吳山或又合稱吳嶽史記遂析嶽山與吳嶽為二山而岍山之名遂隱其實此二山者周禮總謂之嶽山禹貢總謂之岍山當以漢志為正蘇傳引朝氏説又謂今隴山天井金門秦嶺皆古之岍山不知何據漢志美陽縣下云禹貢岐山在西北中水鄉周太王所邑詩曰率西水滸至於岐下又曰彼徂矣岐有夷之行是也水經注岐水徑周城南城在岐山之陽而近西所謂居岐之陽也非直因山致名亦指水所稱矣又歷周原下北則中水鄉成周聚故曰有周也水北即岐山矣今案岐山一名天柱山其峰髙峻狀若柱然國語周之興也鸑鷟鳴於岐山故俗呼為鳯凰堆山之南周原在焉詩所稱周原膴膴者也東西橫亘肥美寬平在今岐山縣東北四十里荆山有三一在雍域褱德北條之荆大禹鑄鼎處也一為荆豫界臨沮南條之荆卞和得玉處也一在豫域與禹貢無涉漢郊祀志公孫卿曰黃帝采首山銅鑄鼎於荆山下案唐志虢州湖城縣有覆釡山一名荆山元和志山在縣南即黃帝鑄鼎處晉灼以為在馮翊懷德縣非也湖城元省入閿鄉縣山今在縣南二十五里縣屬河南府陜州韓愈詩云荆山已去華山來日照潼關四扇開李商隱詩云楊僕移關三百里可能全是為荆山即此山也蘇傳以此為北條之荆因晉灼而誤壺口雷首至於太嶽錐指傳曰三山在冀州太嶽上黨西正義曰地理志云壺口在河東北屈縣東南雷首在河東蒲坂縣南太嶽在河東彘縣東是三山在冀州以太嶽東近上黨故云在上黨西也渭案漢上黨郡今山西潞安府是蒲坂今為平陽府之蒲州其故城在州東南漢縣舜所都也餘見冀州胡氏渭曰雷首山在今蒲州南一名首陽山詩唐風采苓采苓首陽之顛論語伯夷叔齊餓于首陽之下馬融曰首陽山在蒲坂河曲之中寰宇記云首陽即雷首之南阜也或稱首山漢地理志蒲反有首山祠郊祀志黃帝采首山銅即此亦稱獨頭山闞駰曰首陽山一名獨頭山夷齊所隱也又名襄山穆天子傳云東巡自河首襄山又名薄山穆天子傳云登薄山置軨之隥史記封禪書云薄山者襄山也又名堯山漢地理志蒲反有堯山水經注云雷首山臨大河北去蒲坂三十里俗亦謂之堯山也又名中條山元和志云雷首一名中條在河東縣南十五里永樂縣北三十里寰宇記云中條山在芮城縣北十五里亦曰薄山也又名陑山寰宇記云堯山在河東縣南二十八里即雷首山山有九名亦即陑山湯伐桀升自陑注在河曲之南即此也括地志云此山西起雷首東至吳坂長數百里隨地異名通典云雷首在今河東縣此山凡有八名歷山首陽山薄山襄山甘棗山中條山渠豬山獨頭山也蒲州新志首陽山在州南四十五里又中條山在州東南十五里山狹而長西起雷首迤邐而東直接太行南跨芮城平陸北跨臨晉解州安邑夏縣聞喜垣曲諸境凡數百里中條之北有數峰攢立拱對州城在州南十五里中髙旁下俗名為筆架山又南五里為八盤山又南十里為麻谷山又南為鳯凰山去州七十里與潼關相對為中條南麓盡處今據雷首之脈為中條東盡於垣曲王屋在焉禹至此顧不東行而北抵太嶽蓋以帝都為急也太嶽即霍山又名霍太山在平陽府霍州東三十里及嶽陽縣西北九十里趙城縣東北四十五里周禮冀州山鎮曰霍山漢志河東彘縣有霍太山在東冀州山是也爾雅西方之美者有霍山之珠玉亦稱景霍晉語宰孔曰景霍以為城韋注云景大也大霍晉山名今在河東彘史記周武王滅殷飛廉先為紂使北方還無所報乃為壇於霍太山而致命焉水經注汾水南過永安縣西故彘縣也又東與彘水合水出東北太嶽山禹貢所謂嶽陽即霍太山矣山有嶽廟甚靈汾水又南徑霍城東故霍國也又徑趙城西南穆王以封造父趙氏自此始元和志霍山一名太嶽在霍邑東三十里今州治即霍邑故城也新志云山髙百餘丈長八十里周二百餘里南接趙城嶽陽北跨靈石今謂之中鎮渭案隋開皇十四年詔以霍山為冀州鎮歷代因之號曰中鎮蓋即古之中嶽也降而為鎮為嵩髙所壓耳閻百詩曰嵩髙維嶽謂嵩然而髙者維是四嶽之山非以太室山為嶽名曰嵩髙也爾雅撰於三百篇後緣此遂實指嵩髙為中嶽太史公又出爾雅後并補注堯典曰中嶽嵩髙也是殆忘却禹貢之太嶽矣將堯有二中嶽邪漢武登禮太室易曰崈髙中嶽名益顯皆為爾雅所誤者或曰然則周竟無中嶽乎豫曰周仍以唐虞時太嶽為中嶽矣觀職方河內曰冀州鎮曰霍山可知蓋自有宇宙便有此山黃帝正名百物蚤已定五嶽之稱禹主名山川又從而奠之下迄周秦悉不敢移豈有如武帝以衡山逺移南嶽之祀于灊霍山者乎豫最愛鄭康成注大司樂四鎮五嶽取諸職方九州之山而遍足少嫌其以嶽山為西嶽而不以霍山為中嶽又嫌其大宗伯注乃襲爾雅雜以嵩髙忘却大司樂注殆由未善讀嵩髙之詩也哉蕙田案閻氏以太嶽即古之中嶽其説甚辨底柱析城至於王屋錐指傳曰此三山在冀州南河之北東行正義曰地理志云析城在河東濩澤縣西王屋在河東垣縣東北地理志不載底柱底柱在大陽關東析城之西渭案濩澤今為山西澤州之陽城縣其故城在縣西三十里垣縣今為平陽府絳州之垣曲縣其故城在縣西四十里大陽今為解州之平陸縣其故城在縣東北皆漢縣也大陽關在今河南府陜州東王屋山在今懷慶府濟源縣西北唐王屋縣地西與垣曲接界地理今釋底柱山在今河南河南府陜州東四十里大河中西北去山西平陽府平陸縣五十里析城山在今山西澤州陽城縣西南七十里王屋山在今河南懷慶府濟源縣西北九十里接山西平陽府垣曲縣及澤州陽城縣界山有三重其狀如屋太行恆山至於碣石入於海錐指傳曰此二山連延東北接碣石而入滄海正義曰地理志云太行山在河內山陽縣西北恆山在常山上曲陽縣西北太行去恆山太逺恆山去碣石又逺故云此二山連延東北接碣石而入滄海也渭案山陽今為河南懷慶府之修武縣其故城在縣西北上曲陽今為直𨽻真定府定州之曲陽縣其故城在縣西地理志河內壄王縣西北有太行山山陽縣北有東太行山壄王今為河內縣其故城即今懷慶府治孔疏引山陽而遺壄王非也恆山北嶽在今曲陽縣西北碣石見冀州海在碣石之東逾河為禹渡河則入海亦禹涉海也地理今釋太行山延袤千餘里起於河南懷慶府濟源縣迤而東北跨山西河南直𨽻界胡氏渭曰太行列子作太形則行讀如字亦可故陸氏兼存之太行一名五行山淮南子武王欲築宫於五行之山髙誘注云太行山也河圖括地象曰太行天下之脊漢志以在壄王者為太行而在山陽者為東太行其太行之支峰乎又案金史地理志云濟源縣有太行山以沁水為界西為王屋東為太行則此山實起於濟源蓋自河南懷慶府入山西澤州迤而東北跨陵川壺關平順潞城黎城武鄉遼州和順平定樂平以及河南之輝縣武安直𨽻之井陘獲鹿諸州縣界中皆有太行山延袤千餘里焉林少頴曰太行在今懷州之北連亘數州為河北脊以接恆嶽程子謂太行千里片石衆山皆石上起爾朱子語録曰太行山一千里河北諸州皆旋其趾潞州上黨在山脊最髙處過河便見太行在半天如黑雲然舜典十有一月朔巡狩至於北嶽傳云北嶽恆山周禮正北曰并州其山鎮曰恆山注云在上曲陽爾雅恆山為北嶽管子曰恆山北臨代南俯趙漢書恆山北嶽在常山郡上曲陽縣西北有祠并州山張晏曰恆山在西避文帝諱故改曰常山大同府渾源州南二十里亦有恆山水經注云崞縣南面元嶽即此山也州本漢雁門郡繁峙崞二縣古北嶽恆山歷代史志皆云在上曲陽並無異論自宋世以恆山沒於遼從曲陽望祀之因廢曲陽之恆山而指此為禹迹近志謂與在曲陽西北者實一山然州距大茂約三百餘里雖或峰巒相接未可強合為一也北嶽在曲陽又何疑焉閻百詩云後之建都于燕者以為曲陽在南渾源少北於方位宜余案孔氏詩嵩髙疏曰若必據所都以定方位則五嶽之名無代不改何則軒居上谷處恆山之西舜居蒲阪在華隂之北豈當據已所在改嶽祠乎此名儒之言也金世宗大定間或言今既都燕當别議五嶽名不得仍前代太常卿范洪輒援嵩髙疏數語以對事遂寢明𢎞治六年兵部尚書馬文升建言北嶽當改祠渾源下禮部議侍郎倪嶽持不可乃止修渾源州舊廟而祭祀仍在曲陽神宗十六年大同巡撫胡來貢疏請改北嶽沈文端鯉為宗伯覆疏詳駁議者口塞西傾朱圉鳥鼠至于太華錐指傳曰西傾朱圉鳥鼠三者雍州之南山至于太華相首尾而東正義曰地理志云朱圉在天水冀縣南鳥鼠東望太華大逺故傳云相首尾而東也曽氏曰岍與西傾皆北條山故西傾不言導其文蒙於導岍渭案今鞏昌府伏羌縣南有冀縣故城即漢縣也西傾鳥鼠太華並見前西傾在鳥鼠之西南鳥鼠渭水所出朱圉太華皆在渭水之南地理今釋朱圉山在今陜西鞏昌府伏羌縣西南三十里熊耳外方桐柏至于陪尾錐指傳曰四山相連東南在豫州界正義曰地理志云熊耳山在𢎞農盧氏縣東嵩髙山在頴川崈髙縣古文以為外方桐柏山在南陽平氏縣東南橫尾山在江夏安陸縣東北古文以為陪尾是四山接華山而相連東南皆在豫州界也朱氏鶴齡曰凡言至于者以相去之逺也太華去鳥鼠逺故曰至于則陪尾亦應逺觀經文導淮自桐柏東會于泗沂其為徐州之陪尾明矣渭案盧氏今屬河南府崈髙今為登封縣地平氏今為南陽府桐柏縣其故城在縣西北四十里安陸今屬湖廣德安府泗水今屬山東兖州府本漢魯國卞縣陪尾山在縣東也地理今釋熊耳山在今河南府盧氏縣西南五十里接陜西西安府商州晉上洛縣界熊耳雖有東西異名其實一山故郭璞云在上洛班固云在盧氏蔡傳以班固為非非也外方今中嶽嵩山在河南河南府登封縣北十里西接洛陽縣北接鞏縣東接開封府密縣界綿亘一百五十里桐柏山在今河南南陽府桐柏縣東一里東南接湖廣德安府隨州西接襄陽府襄陽縣界陪尾山在今山東兖州府泗水縣東五十里案孔傳云淮出桐柏經陪尾今德安府安陸縣北有橫山漢志所謂橫尾山古文以為陪尾者也淮水不經此山下吳澄書纂言曰唐志泗水縣有陪尾山泗水出焉蓋此是也以橫尾為陪尾者非是胡氏渭曰漢書武帝紀元封元年登禮嵩髙置奉邑名曰崇髙地理志頴川崈髙縣武帝置以奉太室山是為中嶽有太室少室山廟古文以崈髙為外方山也左傳昭四年司馬侯曰四嶽三塗陽城太室太室即嵩髙也於四嶽外别言之亦可見嵩髙時不為嶽矣爾雅嵩髙為中嶽蓋後人所附益耳後漢書熹平五年復崈髙為嵩髙韋昭曰嵩髙有太室少室之山山有石室故名戴延之西征記曰東曰太室西曰少室相去十五里嵩髙其總名也元和志云嵩髙山在告成縣西北二十三里唐改陽城縣曰告成其故城在今登封縣東南四十里登封縣北八里髙二十里周一百三十里少室山在告成縣西北五十里登封縣西十里髙六十里周三十里渭案古時皆指嵩髙為太室而韋昭戴延之則兼二室並稱然前賢題咏猶以太室稱嵩山而少室則仍其本名故有嵩少之目其山東跨密縣西跨洛陽北跨鞏縣綿亘百五十里太室中為峻極峰左右列峰各十二凡二十四少室峰三十六先儒皆以嵩髙為外方金吉甫曰嵩髙世名中嶽安得與江夏內方相為內外哉據唐志陸渾山一名方山蓋古外方云此説非是嵩髙當禹時未為中嶽即為中嶽而仍名外方與東岱西華南衡北恆一例理無可疑且陸渾方山亦何以知其為外方乎詩大雅嵩髙維嶽峻極于天兼五嶽言之爾雅釋山曰山大而髙嵩郭璞注云今中嶽嵩髙山蓋依此名邢昺疏云李巡曰髙大曰嵩此則山髙大者自名嵩本不指中嶽今之中嶽名嵩髙或取此文以立名乎無正文故云蓋以疑之是亦不以詩之嵩髙為中嶽也自劉熙釋名云嵩字或為嵩則二字通作一字世遂以降神生甫專歸之中嶽文士錯解貽誤至今間有能正之者反以為非也導嶓冡至於荆山錐指傳曰漾水出嶓冡在梁州經荆山荆山在荆州正義曰梁州云岷嶓既藝是嶓冡在梁州也渭案後魏地形志華陽郡嶓冡縣有嶓冡山漢水出焉唐六典山南道名山曰嶓冡嶓冡縣故城在今陜西漢中府沔縣西南四十里西南接寧羌州界山今在州北九十里荆山在今湖廣襄陽府南漳縣西通典云南漳漢臨沮地有荆山也嶓冡山孔傳不言所在之郡縣而正義引地理志以實之曰隴西郡西縣嶓冡山西漢水所出夫此水即嘉陵水之上源非禹貢之所謂嶓冡導漾東流為漢者也而班固以西縣之嶓冡為禹貢之嶓冡謬矣自是以後言嶓冡者率依班氏如張衡西京賦云終南太一連岡乎嶓冡潘嶽西征賦云面終南而背雲陽跨平原而連嶓冡玩其辭意皆主隴西而言司馬彪郡國志亦云漢陽郡西縣有嶓冡山無異議也自後魏正始中析沔陽地置嶓冡縣以表其山而名始著酈道元卒於孝昌二年上距正始置縣之時凡二十餘嵗本朝典故生所親見而注水經不言豈事在成書之後不及追改抑亦因其晚出而疑之乎然漾水注引漢中記曰嶓冡以東水皆東流嶓冡以西水皆西流故俗以嶓冡為分水嶺作者亦似知班志之謬而以禹貢嶓冡為當在漢中也者不然於漢中記奚為詳及隴西之山邪由此觀之則魏收以前已有知嶓冡在漢中者不待地形志出而後知也頴達豈未之考乎然班志雖以西縣嶓冡為禹貢之山而養水則自繫氐道之下不言出某山養與漾通或作漾自水經云漾水出氐道縣嶓冡山而氐道亦有嶓冡矣常璩華陽國志云東源出武都氐道縣漾山為漾水而氐道之嶓冡且有漾山之目矣郭璞注山海經云嶓冡今在武都氐道縣南酈道元注水經云東西兩源俱出嶓冡而同為漢水則似一山跨二縣之境而在西縣者為西源在氐道者為東源矣輾轉迷惑愈久愈訛説經者不能出其窠臼而禹貢之嶓冡幾不可問矣西縣故城在今秦州西南氐道今不知所在蓋自晉永嘉之亂隴西沒於氐羌郡縣荒廢常璩郭璞皆云氐道屬武都而晉志武都郡無之則此縣之不可考久矣要之二縣在隴西皆古雍州域也而禹貢嶓冡乃梁州之山不應闌入雍域故唯魏收所言為得其實秦州之嶓冡與寧羌之嶓冡南北相距五六百里地理今釋荆山在今湖廣襄陽府南漳縣西少北八十里昭四年左傳荆山九州之險指此內方至於大别錐指傳曰內方大别二山名在荆州漢所經正義曰地理志云章山在江夏竟陵縣東北古文以為內方山也地理志無大别鄭玄云大别在廬江安豐縣杜預解春秋云大别闕不知何處或曰大别在安豐縣西南左傳云吳既與楚夾漢然後楚乃濟漢而陳自小别至於大别然則二别近漢之名無緣得在安豐如預所言雖不知其處要與內方相接漢水所經必在荆州界也蘇氏曰二别山皆在漢上蔡氏曰內方在今荆門軍長林縣大别在今漢陽軍漢陽縣渭案地理志六安國安豐縣下云禹貢大别山在西南鄭杜説所自出正義謂志無大别何也安豐後漢屬廬江郡其故城在今江南廬州府霍丘縣西北竟陵故城在今湖廣安陸府鍾祥縣南長林故城在今荆門州東漢陽縣即今漢陽府治大别山在其東北水經注所謂翼際山也左傳定四年自小别至于大别杜預云禹貢漢水至大别南入江然則此二别在江夏界水經注云江水東經魯山南古翼際山也元和志魯山一名大别山地理今釋內方山在今湖廣安陸府鍾祥縣西周回百餘里接荆門州界大别山一名魯山在今湖廣漢陽府漢陽縣東北半里漢水西岸岷山之陽至於衡山錐指傳曰岷山江所出在梁州正義曰梁州云岷嶓既藝是岷山在梁州也地理志云衡山在長沙湘南縣東南曽氏曰岷嶓皆南條山故岷山不言導其文蒙於導嶓冡也吳氏曰蜀以西近江源者皆為岷山連峰接岫青城天彭諸山之所環繞皆岷也岷山之陽其山非一衡山南嶽也在衡州衡陽縣北七十里南一峰曰岣嶁山自縣西北以至湘南縣東南皆衡山也渭案岷山地理志云在蜀郡湔氐道徼外湔氐道今為四川松潘衛山在衛西北衡山縣本漢湘南縣今屬湖廣衡州府唐志衡山縣有南嶽祠元和志云嶽廟在縣西三十里衡陽今府治也古今言岷山者凡四處一在今四川松潘衛衛東南去布政司七百六十里史記作汶山封禪書云自華以西名山七有瀆山蜀之汶山也漢書地理志云岷山在湔氐道西徼外江水所出蜀志秦宓曰蜀有汶阜之山江出其腹華陽國志云岷山一名沃焦山其跗曰羊膊江水所出任豫益州記云大江泉源始發羊膊嶺下東南下百餘里至白馬嶺而歷天彭闕水經注云岷山在蜀郡氐道縣即瀆山也又謂汶阜山在徼外江水所導隋志汶山在汶山郡左封縣唐悉州治東至翼州一百九十里今疊溪營西有廢翼州此皆謂在松潘者也一在今成都府之茂州州本冉駹國漢以其地置汶山郡治汶江縣晉改曰廣陽隋又改曰汶山山海經注云岷山在廣陽縣水經注云汶水出汶江道徼外岫山玉輪坂下元和志云汶山縣有汶山即岷山去青城山百里天色晴明望見成都即隴山之南首張栻西嶽碑云岷山在茂州列鵝村其跗曰羊膊也輿地廣記云岷山在汶山縣西北俗謂之鐵豹嶺王氏地理通釋云大渡河一名羊山江源出鐵豹嶺嶺即羊膊之異名也此皆謂在茂州者也一在成都府之灌縣縣本漢綿虒郫江原三縣地周武帝分江原置青城縣因山為名元和志云青城山在蜀州青城縣西北三十二里杜光庭成都記云岷山連峰接岫千里不絶灌縣青城山乃其第一峰也縣志云汶山在縣北三十里蓋即青城矣一在今陜西岷州衛衛本漢隴西郡地西魏置溢樂縣今衛治即其故城括地志云岷山在岷州溢樂縣南連綿至蜀幾二千里皆名岷山元和志云山在溢樂縣南一里此皆謂在岷州衛者也然則岷山最大志家各就其所在言之陸遊曰自蜀郡之西大山廣谷谽谺起伏西南走蠻箐中皆岷山也薛季宣曰今自岷洮松疊以南其大山峻嶺班班可考者皆岷山之隨地立名者耳此説是也觀漢志云山在徼外則固不可以湔氐一縣限之矣大抵岷山北起於溢樂實跨古雍州之境而南則訖於青城綿地千餘里與太行伯仲或專指在松潘亦非篤論然大江所出則必直氐道西徼外者也舜典五月南巡守至於南嶽傳云衡山也後漢志長沙郡湘南縣下云衡山在東南劉昭曰郭璞云山别名岣嶁湘中記云遙望衡山如陳雲沿湘千里九向九背乃不復見水經注云湘水北徑衡山縣東山在西南有三峰一名紫蓋一名容峰此處恐有脫誤盛𢎞之荆州記云衡山有三峰一名紫蓋一名石囷一名芙蓉容峰最為竦傑自逺望之蒼蒼隱天故羅含云望若陳雲非清霽素朝不見其峰丹水湧其左醴泉流其右山經謂之岣嶁山為南嶽也山下有舜廟南有祝融冡衡山東南二面臨映湘川自長沙至此七百里中有九向九背故漁者歌曰帆隨湘轉望衡九面山上有飛泉下映青林直注山下望之若幅練矣徐靈期南嶽記云南嶽周回八百里回雁為首嶽麓為足嶽麓在長沙故唐志潭州湘潭縣有衡山長沙記云衡山軒翔聳拔九千餘丈尊卑差次七十二峰最大者五芙蓉紫蓋石廪天柱祝融祝融為最髙韓退之曰五嶽於中州衡山最逺南方之山巍然髙而大者以百數獨衡為宗顧遴遊衡山記云登祝融之顛俯視四極蒼然一色山川雜陳瑣細莫辨風自逺來其力甚徑侯與地下絶殊比曉觀日出海體象洞見近若疆中東餘遊氛浩漫無際過九江至於敷淺原錐指傳曰敷淺原一名傅陽山在揚州豫章界正義曰地理志豫章歷陵縣有傅陽山古文以為敷淺原渭案漢志傅易山傅讀曰敷今注疏本作博字之誤也朝以道云饒州鄱陽縣界中有歷陵故縣及傅陽山其説蓋近是通典云江州潯陽縣有蒲塘驛即漢歷陵縣也驛前有敷淺原原西數十里有敷陽山渭案唐武德八年於潯陽縣置蒲塘驛後改為場五代時楊吳升為德安縣今治故驛也杜佑以驛為漢歷陵縣不知何據豈因王莽改歷陵曰蒲亭而遂以蒲塘附會邪黃子鴻深疑之嘗為之辨曰漢志豫章郡領歷陵縣晉志歷陵與餘汗鄡陽俱割屬鄱陽郡而柴桑則屬武昌郡不應歷陵反出柴桑之西也因謂朝氏云歷陵在鄱陽者為是且曰吳志歷陵有石印山即今饒州府之鄱陽山亦歷陵在鄱陽之一證也今案鄱陽山在府治鄱陽縣西北一百五十里鄱陽湖中亦名石印山鄱陽縣故城在今府城東六十三里三國吳至隋皆為鄱陽郡治唐移於今所然則府城西當即為故歷陵地敷淺原蓋在鄱湖之西落星之畔也説文原髙平之野人所登原固有山體故謂之傅陽山猶強梁原亦稱華原山杜氏析山與原為二處非也朱子九江彭蠡辨曰今之所謂敷淺原者為山甚小而庳不足以有所表見而其全體正脈遂起而為廬阜則甚髙且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者唯是乃為宜耳又答程泰之書曰詳經文敷淺原是衡山東北一支盡處意即今廬山若如朝氏説以為江入海處所過之水又非特京口而已是其意以廬阜為敷淺原也然此山髙峻似不可名之曰原金吉甫云敷古文作傅傅陽山在廬阜之西南則是敷淺原之陽也蓋廬山雖髙而其中原田連亘人民奠居所以有敷淺原之名是亦善解矣然原田連亘要不過山中髙平之地耳若此者不一而足安得舉體而名之曰原王耕野云敷淺原恐非廬山髙平曰原而又名敷淺則必平曠之地不為髙山可知近朱長孺亦曰傅陽山漢志得之古文可據也朱子疑庳小不足表識繹敷淺之名正不當求之髙大蓋傅陽在古本髙平之地後人名之為山耳導江漢之山至大别敷淺原而即止者以江漢至此合流赴海不煩殫力隨刋況導水合舉源流可以互見豈必求之山脈盡處邪此説是也今案水經注引孫放廬山賦曰潯陽郡南有廬山臨彭蠡之澤接平敞之原是廬山下固有平原也山今跨德化星子二縣之境南唐改尋陽縣曰德化今為九江府治宋升德化之星子鎮為縣今為南康府治縣以落星石得名水經注云廬山之南湖中有落星石周回百餘步髙五丈今在城南五里湖中梁書王僧辨破侯景于落星灣即此地星子舊以為漢鄡陽地然鄡陽故城在今鄱陽縣西北一百二十里鄱湖之東北則都昌為是星子似非其地竊疑星子地本歷陵而敷淺原即孫放所謂平敞之原乃廬山東南之麓瀕于彭蠡澤者蓋柴桑故城在德化縣南九十里故蒲塘驛今為德安縣在德化縣西南一百五十里此必漢柴桑地西連武昌郡界故晉以柴桑屬焉而歷陵與鄡陽俱屬鄱陽郡歷陵在柴桑之東鄡陽之西則唯星子可以當之歷陵故治當在湖西今星子縣地其境則跨湖而東宋元嘉初廢歷陵蓋舉石印以東併入鄱陽而其西則併入柴桑故星子鎮屬德化耳廬山盤基廣大其陽必有平敞之原但曠衍無竒選勝者所不道而志家又因仍舊説不能詳考指言其狀耳以此求之庶不失朱子之意而又不即以髙山為平原犯學者之所疑凖諸地望揆諸經旨視朝氏為少優云地理今釋敷淺原蔡傳遵用師説指廬阜為敷淺原而復以無可考據為疑何也廬阜在今江西九江府德化縣南山北𨽻南康府星子縣蕙田案敷淺原漢志以為豫章歷陵縣之傅陽山水經亦云在歷陵縣西南後世求歷陵者或于德安或於鄱陽皆無定論獨朱子欲以廬山當敷淺原蔡九峰書傳主德安而兼存朱子之説蓋疑而未決胡朏明錐指前後亦有兩説然當以後説為長蓋以星子當歷陵既與漢志相合而孫放廬山賦亦云臨彭蠡之澤接平敞之原則敷淺原實當為匡廬之支隴朱子之説本非無據至德安之傅淺原出於後人附會而鄱陽則又無山可以當之皆不足信導弱水至於合黎錐指傳曰合黎水名在流沙東正義曰顧氏云地説書合黎山名但此水出合黎因山為名也鄭玄亦以為山名地理志張掖郡刪丹縣桑欽以為導弱水自此西至酒泉合黎又居延縣有居延澤在東北古文以為流沙如志之言酒泉郡在張掖郡西居延屬張掖合黎在酒泉則流沙在合黎之東與此傳不合案經弱水西流水既至於合黎餘波入於流沙當如傳文合黎在流沙之東不得在其西也蘇氏曰合黎山名易氏曰甘州即漢張掖郡弱水出刪丹縣南山下合黎山在張掖縣西北二百里俗名要塗山薛氏曰弱水出吐谷渾界窮石山自刪丹西至合黎山與張掖河合渭案導亦循行之謂與導菏澤之導異禹治水或躬親其事或遣官屬往治之及九州功畢其水之大而切於利害者有九禹舟行從源至委核其治否故謂之導非疏瀹決排之謂先儒皆以導為治夫治河先積石治江先岷山有是理乎經旨鬱而不明可歎也張掖郡今為甘州衛陜西行都司治酒泉郡今為肅州衛刪丹縣即今山丹衛居延故城在甘州衛東北塞外其澤曰居延海弱水正流出合黎峽口而東北注之非經所謂流沙也地理今釋合黎山亦名要塗山在今陜西甘州衛西北四十里綿延而西接髙臺鎮彛二所界餘波入於流沙錐指傳曰弱水餘波西溢入流沙顔氏曰流沙在燉煌西林氏曰弱水溢其餘波以被於流沙猶導菏澤被孟豬也薛氏曰流沙大磧也在沙州西八十里其沙隨風流行故名陳氏曰弱水之正者入合黎其餘則入于流沙也金氏曰大抵西北之地多是沙磧史書所謂河沙諸國佛書所謂沙界恆河沙是也沙則水滲而下如沙州以西山北之地即連流沙弱水滲其下也鄭氏曉曰弱水正派至於合黎過此無事疏鑿矣其餘波入于流沙聽其流衍耳志合黎見其經流有所歸志流沙見其支流有所泄渭案弱水入流沙而謂之餘波蓋時遇衍溢則分泄於流沙不常入也其正流自合黎山峽口東北入居延澤故此云餘波地理今釋流沙在今陜西嘉峪關外索科鄂模即居延澤漢志古文以為流沙以北東至賀蘭山西至廢沙州界幾南北千餘里東西數百里其沙隨風流行隨處有之導黑水至於三危入於南海錐指林氏曰三危距南海凡數千里禹導黑水至三危即得其故道遂從此以達南海蓋其間數千里不加人功修治故經載此水至於三危即曰入於南海也薛氏曰黑水至沙州燉煌縣經三危山流出徼外書謂南流入海其當時之所見邪夏之西境極於流沙而知黑水之所歸則當時即敘之戎大略為可知也渭案黑水三危並見雍州梁之黑水别是一川非界雍之西者黑水自三危以北杜氏謂今已堙涸自三危以南則水行徼外不可得詳亦莫知其從何處入南海也南海自揭陽以西至象林皆是經所謂海盡東海也唯黑水所入為南海故言南以别之地理今釋三危山在大河南今陜西岷州衛塞外古疊州西西蕃界中雲南麗江府北河圖括地象云三危在鳥鼠西南與汶山相接黑水出其南鄭元云南當岷則在積石西南是也案今雲南大理府雲龍州西有三崇山一名三危瀾滄江經其麓有黑水祠或以為即古三危也然其地太南似未為的姑存備考導川黑水即今雲南之瀾滄江其源發於西蕃諾莫渾五巴什山分支之西曰阿克必拉南流至你那山入雲南界東岐一支為漾備江即程大昌所謂葉榆河東南流分注大理府之西洱海經流入順寧府境其正支南行絶雲龍江而東南至雲州屬順寧府北之分水嶺仍與漾備江合又南流至阿瓦國入南海案金沙瀾滄一為梁州之黑水一為導川之黑水然皆非四大水之黑水也昔人謂蕃名山川皆以形色西南夷地水色多黑故悉蒙黑名如打沖金沙瀾滄俱得稱黑水也而真黑水之源去瀾滄之西三百餘里蕃名哈拉烏蘇色禽經蒙蕃怒彛猓猓界由緬甸入南海即佛書所謂黑水出阿耨達山即大崑崙山在今達賴喇嘛界東是也禹迹之所不至蓋中國在阿耨達之東故名震旦所入大水唯黃河一支可見黑水出阿耨達之東實在中國之西南未嘗流入內地故從古無人知其源委也黑水之辨諸家紛如今考地圖禹貢之黑水有三正不必強合水經注所謂黑水出張掖雞山今甘州至於燉煌今廢沙州此雍州之黑水也漢書地理志犍為郡縣南廣注云汾關山符黑水所出南廣今南溪縣北至僰道入江今敘州府唐樊綽亦以麗江為古黑水云羅些城北有三危山羅些城在今麗江府北境其水從山南行上出吐蕃界薛季宣謂瀘水為黑水今打沖河引酈道元説黑水亦曰瀘水即若水出姚州徼外吐蕃界中山海經黑水之間有若水是也以麗江之説為非不知打沖河至大姚縣即合金沙江會流入岷江薛氏之説原與漢志相合此梁州之黑水也宋程大昌以瀾滄江為黑水李元陽黑水辨亦云隴蜀無入南海之水唯滇之瀾滄足以當之而元史載勸農官張立道使交趾並黑水以至其國吳任臣山海經注亦以瀾滄為古黑水此導川之黑水也蓋雍州之黑水其源在黃河之北梁州及導川之黑水其源皆在黃河之南有截然不相紊者第以張掖燉煌尚在內地可以尋源而求而推其委而不得遂託為越河伏流之説夫崑崙為地軸其山根連延起頓包河南接秦隴直達長安為南山黑水自燉煌而南縱可越大河之伏流其不能越河以南之南山也明矣若狃于雍州三危既宅之説此是言雍州分域以內今終南鳥鼠皆在河之南而三危更在鳥鼠之南書疏鄭康成引地記云三危在鳥鼠之西南當岷山要知禹貢導川之三危必在河之南非竄三苗之三危也其與雍州之黑水又何涉邪然主瀘水麗江瀾滄之説者亦皆以意度未能確指水之分合不知瀘水麗江源異而流同麗江瀾滄源近而流别分合言之梁州之黑水有兩支而與導川之黑水實出一地也而古未有及之者蓋以二水僻在蕃界隔蔽南山阻奧從古未通中國即魏之法顯唐之玄奘元世祖之南征邱處機之西遊皆繞出崑崙以外歷西域諸國至於滇南總未嘗經其地但從入中國之支流以古今分域配之料約為某水某水而已今海內一統西南徼外咸入版圖爰遣使臣遍歷其地究源討委寫圖以志支派經絡瞭如指掌諸家浮説有折衷矣李氏紱黑水考禹貢之水不趨東海者二弱水西行而黑水入南海也程氏論黑水三條未能得黑水之實其駁隋志扶州黑水是矣扶州黑水既合白水注嘉陵江以入岷江與禹貢入南海之文全異自不得指為禹貢之黑水也其駁孔氏頴達所引酈氏水經注則實未審漢四郡之形勢與黃河經行之地孔氏之説雖有可駁而所駁之者未中其窽則孔固失矣而程亦未為得也水經謂黑水出張掖雞山南流至燉煌過三危山南流入於南海程氏謂其説雖出許慎而道元增益以入南海句入南海乃禹貢本文增無害也杜佑誤合於南廣之符黑水則佑自失耳酈不失也孔氏疑黑水不能越黃河而南謂自積石以西河多伏流故得越河入南海程氏詆其巧而駁其誤謂張掖者甘州而燉煌者沙州甘沙之水皆入積石河河流既東已非南向又河源出于闐南山之北是山岡麓東行南接秦隴直達長安幾近萬里何理可以越之而入南海至河之下流與甘沙對岸為秦河南地其大川為洮洮既北入於河縱有伏流不能逆行南上其説似辨而實非也考漢武所開四郡並在黃河之西惟武威為今涼州與黃河稍近由涼州西北行至甘州去黃河已一千四百餘里又西行四百餘里為肅州則漢之酒泉也去黃河近二千里由肅州出嘉峪關西北行千三百餘里而後至哈密由哈密西北行八百里而至吐魯番吐魯番西二百餘里為玉門關又西二百餘里為陽關考漢書燉煌郡所屬龍勒縣陽關玉門關在其地杜林以燉煌為古瓜州地生美瓜則舜竄三苗之地所謂與允姓之戎同居瓜州者也瓜州之西為沙州唐書稱沙州燉煌郡黑水所經之三危山在焉今方輿路程圖河源當西十九度而陽關當西二十六七度之間是黑水所經在河源崑崙西偏千六百里之逺距黃河東北行之道已二三千里若洮河在陜西內地則相距六七千里矣蓋黑水在甘州發源時已與黃河下流相逺其流至三危則繞出河源崑崙之西河流已無庸度越況洮水與秦隴諸山又豈能限之也哉至謂甘沙之水並入積石河則甚不然沙州之水距黃河絶逺固無入黃河之理即甘肅之水亦無入黃河者考古地圖甘涼之間惟浩亹水由湟水入河今方輿圖所載惟涼州以南有大通河及莊浪河由苦水堡入於黃河而已若涼州以北則皆西北流無入黃河者况甘沙二州之水絶逺者哉古今山川異名固難求其必合然方隅形勢猶可尋也張掖雞山之水漢唐諸史俱無其名以今方輿路程圖考之甘州惟有一大川名曰黑河發源於馬營墩堡山中西北行四百餘里至古城堡抱甘州城東北歷黑泉諸堡西北行六百餘里至金塔寺堡出長城外北行四百里至都崑崙河又百餘里入於索科鄂謨鄂謨者池澤之名疑即舊圖所謂蒲昌海者其地在哈密之南瓜州之東甘州之水無大於此者既有黑河之名所歷又以黑泉名堡豈即許慎所謂雞山黑水者耶或疑其水既西北行又入於沙澤無入於南海之迹未敢遽指為禹貢之黑水然三危之山漢書唐書咸以為在燉煌燉煌為古瓜州地三苗所居實生美瓜今瓜之美無出哈密右者蓋哈密即古瓜州也其西有大鳴沙山至唐武德二年始分為沙州而以燉煌為之屬縣三苗三危既在其地則舍甘州黑河别無所謂禹貢之黑水矣其水雖入於沙澤無南行之迹然甘肅瓜州之地數千里皆沙也地稍低者即滙為澤而水入焉案舊輿圖西番之西大流沙之南湧出一澤名曰嘉河南流為潞江至永昌騰越境內稱為南金沙江由阿瓦緬甸入於南海其水盛大深黑人有稱為黑水河者以今方輿路程圖考之則嘉湖即今西番大池名哈拉努爾色楞格者其水流為大川南行千九百里經鄂欺拉達巴罕名黑水江入怒彛境又南行六百里入雲南境經怒山之西更名怒江又南行八百里經永昌府西境更名潞江又南行三百里至潞江安撫司其地當騰越州正東三百餘里皆雲南內地土人稱為南金沙江自騰越西南行三百里入阿瓦界經緬甸凡千餘里入於南海若以甘州黑河為黑水之源此黑水江為黑水之委則北起雍州之西北南盡梁州之西南其為二州之界可無遺憾而三危三苗俱在瓜沙二州更無疑竇若疑甘州黑河既西北流其入沙之地當經度之四十一度而嘉湖當三十一二度中間相距近二千里入彼出此恐難確定然沇水逾河至溢為滎澤又出陶邱北東西相距六七百里其水無色可辨神禹尚能定其為沇水所溢況黑水與他水不同顔色深黑南北相望禹豈不能確定其源流乎程氏大昌以葉榆水指為黑水謂榆葉漬水而黑固出臆揣數千里大川豈木葉所能黑滇池黑水祠去勞廣諸水甚逺考水經葉榆澤在漢益州郡葉榆縣經不韋縣入牂牁郡過交趾麋泠縣入海自源竟委無一字及於黑水似難慿信不韋為古哀牢國以今方輿路程圖考之蓋即所謂瀾滄江也其水發源西番阿克必拉疑即古之勞水南行千六百里始名瀾滄江迤蒙番東境又南行千里入雲南小甸又南行八百里經永昌府西境則哀牢山在焉又南行千六百里經永順威逺二府至車里宣慰司名九龍江入阿瓦老撾二國境入於南海其水源委甚長似足以當黑水然自發源以至雲南行三千餘里並無黑水之名至西洱河來會洱河之源始稱黑水其源近出雲南與雍州絶逺中隔岷峨諸山亦無與甘州黑水相通之理必非禹貢之黑水程氏乃以為足界兩州誤亦甚矣程氏又謂葉榆在蜀正西東北距宕昌不逺宕昌即三苗種類以為與三危之敘三苗相應則其誤尤甚夫三危之在燉煌三苗之在瓜州自古訖今别無異説燉煌瓜州在雍州西北宕昌在雍州西南相去二千餘里妄指宕昌以為三苗又用三苗以影附三危豈有當哉禹貢謂黑水西河惟雍州西河者龍門之河以其在冀州之西也然西河僅足界雍州東面若以葉榆瀾滄為黑水逺在雍州西南境外是雍州西北南三面俱無疆界必不然矣如以絶無黑水之名之瀾滄江為足以當黑水又不如徑指潞江為黑水其源流既與瀾滄相等又實有黑水江之名尚略有依據也右禹貢隨山濬川五禮通考卷二百四
