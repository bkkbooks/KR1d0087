body:
  text: 五禮通考卷六十二刑部尚書秦蕙田撰吉禮六十二宗廟制度體記郊特牲尸神象也方氏慤曰見乃謂之象神隱而尸陳以其陳者見于隱者故曰尸神象也陸氏佃曰尸是象而已其所謂神在彼不在此也尸陳也注尸或詁為主此尸神象當從主訓之言陳非也陸氏佃曰尸陳也者神無象也以尸陳之而已坊記祭祀之有尸也宗廟之有主也示民有事也疏祭祀有尸宗廟有主下示于民有所尊事也方氏慤曰尸用于祭祀之時主藏于宗廟之內故于祭祀言有尸宗廟言有主也為尸以象其生為主以偶其存經曰事死如事生事亡如事存此所以言示民有事也白虎通祭所以有尸者鬼神聽之無聲視之無形升自阼階仰視榱桷俯視几筵其器存其人亡虛無寂寞思慕哀傷無所寫泄故坐尸而食之毁損其饌欣然若親之飽尸醉若神之醉矣通典杜氏佑曰祭所以有尸者鬼神無形因尸以節醉飽孝子之心也祝迎尸於門外者象神從外來也程子曰古人祭祀用尸極有深意不可以不思也蓋人之魂氣既散孝子求神而祭無尸則不饗無主則不依魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既已潔齋至誠相通以此求神宜其饗之後世不知此道以尊卑之勢遂不肯行耳吕氏大臨曰求神必以其類升其堂也入其室也其形不可見也其聲不可聞也烹孰羶薌而薦之莫知其來享也此孝子之心所以必立尸也主人之事尸以子事父也然獻酢拜跪禮無不答猶賔之也父母而賔客之自殯于西階始此事人事鬼之所以異也尸必筮之求于神而不敢專也朱子語録用之問祭用尸之意曰古人祭祀無不用尸非惟祭祀家先用尸祭外神亦用尸不知祭天地如何想惟此不敢為尸杜佑説古人用尸者蓋上古朴陋之禮至聖人時尚未改文蔚録云是上古朴野之俗先王制禮是去不盡者相承用之至今世則風氣日開朴陋之禮已去不復可用去之方為禮而世之迂儒必欲復尸可謂愚矣杜佑之説如此今蠻夷徭洞中有尸之遺意每遇祭祀鬼神時必請鄉之魁梧姿美者為尸而一鄉之人相率以拜祭為之尸者語話醉飽每遇嵗時為尸者必連日醉飽此皆古之遺意嘗見崇安余宰邵武人説他之鄉里有村名密溪去邵武數十里此村中有數十家事所謂中王之神甚謹所謂中王者每嵗以序輪一家之長一人為中王周而復始凡祭祀祈禱必請中王坐而祀之嵗終則一鄉之父老合樂置酒請新舊中王者講交代之禮此人既為中王則一嵗家居寡出恭謹畏慎略不敢為非以副一村祈向之意若此村或有水旱災沴則人皆歸咎于中王以不善為中王之所致此等意思皆古之遺聞近來數年此禮已廢矣看來古人用尸自有深意非朴陋也陳丈云蓋不敢死其親之意曰然用之云祭祀之禮酒殽豐潔必誠必敬所以望神之降臨乃歆饗其飲食也若立之尸則為尸者既已享其飲食鬼神豈復來享之如此却為不誠矣曰此所以為盡其誠也蓋子孫既是祖宗相傳一氣下來氣類固已感格而其語言飲食若其祖考之在焉則有以慰其孝子順孫之思而非恍惚無形想象不及之可比矣古人用尸之意所以深逺而盡誠蓋為是耳今人祭祀但能盡誠其祖考猶來格况既是他親子孫則其來格也益速矣因言今世鬼神之附著生人而説話者甚多亦有祖先降神于其子孫者又如今之師巫亦有降神者蓋皆其氣類之相感所以神附著之也周禮祭墓則以墓人為尸亦是此意蕙田案古人祭必立尸其不立者三事曰薦如薦新薦寢廟無田則薦是也曰厭如殤祭之隂厭陽厭是也曰奠如喪奠朔奠釋奠是也後世祭不立尸強名曰祭實為薦為厭為奠而已豈知古人之祭必設尸以事之者易所謂原始反終而知死生之説又曰知鬼神之情狀故陟降飲食必有所憑依几筵祝奠實有其對越固非聖人莫能制而非人所能盡喻矣朱子謂今世鬼神之附著生人而説話者甚多亦有祖先降神于其子孫者豈非實有以見其必然耶又案以上立尸之義曲禮禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸注孫為王父尸以孫與祖昭穆同也有疏凡稱禮曰者皆舊禮語也祭祀必尸尸必以孫今子孫行並幼弱則必抱孫為尸不得抱子為尸也作記者又自解云此言孫可以為王父尸子不可以為父尸也曾子問云孫幼則使人抱之無孫則取于同姓可也謂無服內之孫則取服外同姓也天子至士皆有尸天子必取孫列之為卿大夫者謂諸侯入為卿大夫者故云公尸諸侯亦然朱子曰神主之位東向尸在神主之北古人用尸本與死者一氣又以生人精神去交感他那精神是會附著歆享又曰古者立尸必隔一位孫可以為王父尸子不可以為父尸以昭穆不可亂故也新安王氏曰特牲禮注大夫士以孫之倫為尸言倫明非已孫崔靈恩謂大夫用已孫為尸非也特牲禮有尸士禮也少牢禮有尸大夫禮也祭統言君執圭瓚祼尸諸侯禮也守祧言以其服授尸天子禮也曾子問曾子問曰祭必有尸乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取于同姓可也疏曾子以祭是祭神神無形象以生人象之無益死者若如厭祭亦可謂祭初尸未入之前祭末尸既起之後並皆無尸直設饌食以厭飫鬼神也孔子謂必須有尸以成人之喪威儀具備必須有尸以象神之威儀也尸必以孫若其孫幼則使人抱之若無孫則取同姓昭穆孫行適者可也以其成人威儀既備有為人父之道不可無尸祭統孫為王父尸所使為尸者于祭者子行也注子行猶子列也祭祖則用孫列皆取于同姓之適孫也通典杜氏佑曰天子宗廟之祭以公卿大夫孫行者為尸一云天子不以公為尸諸侯不以卿為尸為其太尊嫌敵君故天子以卿為尸諸侯以大夫為尸卿大夫不以臣為尸俱以孫者避君也天子諸侯雖以卿大夫為尸皆取同姓之嫡也楊氏復曰特牲饋食筮尸疏大夫士以孫之倫為尸皆取無爵者無問成人與幼皆得為之若天子諸侯雖用孫之倫取卿大夫有爵者為之故鳧鷖祭尸之等皆言公尸又春秋公羊子何休注曰禮天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸又鳧鷖詩公尸來燕來寧疏曰其尸以卿大夫為之曲禮為人子者祭祀不為尸注尸者尊者之處為其失子道然則尸卜筮無父者人疏尸代尊者子不為也孟子弟為尸白虎通曾子曰王者宗廟以卿為尸不以公為尸避嫌三公尊近天子親稽首拜尸故不以公為尸蕙田案以上立尸之法禮記檀弓虞而立尸有几筵疏未葬由生事之故未有尸既葬親形已藏故立尸以係孝子之心也前所云既窆而祝宿虞尸是也既封主人贈而祝宿虞尸疏士虞禮記云男男尸女女尸是虞有尸也虞者葬日還殯宫安神之祭名方氏慤曰既封而贈則虞祭有期矣故祝先反而宿虞尸焉宿亦戒也以事戒之曰戒以期戒之曰宿蕙田案此立尸之始也父母之神去而體魄留故立重立主以存其神體魄歸于土又立尸以象其形然則主者神事之也尸者形事之也孝子之志合于冥漠昭于法象此所以致愛而存致慤而著也夫儀禮士虞禮記男男尸女女尸必使異姓不使賤者注異姓婦也賤者謂庶孫之妾也尸配尊者必使適也婦疏虞卒哭之時男女别尸故男女别言之也云異姓也者以男無異姓之禮故也孫與祖為尸孫婦還與祖姑為尸故不使同姓女為尸也尸配尊者必使適也者男尸先使適孫無適孫乃使庶孫女尸先使適孫妻無適孫妻使適孫妾又無妾乃使庶孫妻即不得使庶孫妾以庶孫之妄是賤之極者鄭云必使適也者據經不使賤有適孫妻則先用適而言其實容用庶孫妻法也此經男女别尸據虞祭而言至卒哭已後自禫已前喪中之祭皆男女别尸案司几筵云每敦一几鄭注云雖合葬及同時在殯皆異几體實不同祭于廟同几精氣合篇未云是月也吉祭猶未配注云是月是禫月也未以某妃配某氏哀未忘也禮記少儀婦人為尸坐則不手拜肅拜注為尸為祖姑之尸也士虞禮曰男男尸女女尸若疏周禮坐尸嫌婦人或異故記者明之尸坐謂虞祭平常吉祭共以男子一人為尸祭統云設同几是也喪服小記練筮日筮尸皆要絰杖繩屨有司告具而后去杖筮日筮尸有司告事畢而后杖拜送賔大祥吉服而筮尸疏筮尸筮小祥之尸小祥男子除首絰唯有要絰豫著小祥之服臨此筮尸也吉服朝服也大祥之日縞冠朝服亦豫服以臨筮尸蕙田案以上喪事內尸禮器周坐尸詔侑武方其禮亦然其道一也夏立尸而卒祭殷坐尸注武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子就養無方此亦周所因于殷也夏禮尸有事乃坐殷無事猶坐侑疏此論三代尸禮不同殷人坐尸周因坐之詔告也勸也凡預助祭皆得告尸威儀勸尸飲食無常人也夏禮質言尸是人不可久坐神坐故唯飲食時暫坐非飲食則尸倚立以至祭競也殷因夏禮而損其不坐之禮益為常坐之法是殷轉文也方氏慤曰夏立尸而殷坐尸殷雖坐尸而詔侑未必無方周則文又備不唯坐尸而且詔侑無方為此特文備之事爾而于禮莫不然也故曰其禮亦然以其道未始不相因故曰其道一也郊特牲古者尸無事則立有事而後坐也注古謂夏時也疏夏立尸唯有飲食之時乃坐若無事則倚立由世質故耳少儀其有折爼者取祭反之不坐燔亦如之尸則坐注尸尊也少牢饋食禮曰尸左執爵右兼取肺肝擩于爼鹽振祭嚌之加于菹豆疏折爼折骨于爼爼既有足故立而就爼取所祭肺升席坐祭祭訖反此所祭之物加之于爼皆立而為之故云取祭反之不坐唯祭時坐耳燔謂燔肉雖非折骨其肉在爼其取及祭反時亦不坐尸尊雖折爼取祭反之皆坐也鄭引少牢饋食禮證尸坐之義禮器周旅酬六尸曾子曰周禮其猶醵與注周旅酬使之相酌也后稷之尸發爵不受旅合錢飲酒為醵旅酬相酌似之也疏旅酬六尸謂祫祭時聚羣廟之主于太祖后稷廟中后稷在室西壁東嚮為發爵之主尊不與子孫為酬酢餘自文武二尸就親廟尸凡六在后稷之東南北對為昭穆更相次序以酬也然大祫多主唯云六尸者毁廟無尸但有主也陸氏佃曰案周九廟而旅酬六尸則旅酬蓋言成康之世而文武親未盡猶在七廟之數蓋以時祭何必大祫逸禮祫于太廟之禮毁廟之主升合食而立二尸通典案鄭玄禘祫志云太王王季以上遷主祭于后稷之廟其坐位與祫祭同文武以下遷主若穆之遷主祭於文王之廟文王居室之奧東面文王孫成王居文王之東而北面以下穆王直至親盡之祖以次繼而東皆北面無昭主若昭之遷主祭於武王之廟武王亦居室之奧東面其昭孫康王亦居武王之東而南面亦以次繼而東直至親盡之廟無穆主也其尸后稷廟中后稷尸一昭穆尸各一文王廟中文王尸一穆尸共一武王廟中武王尸一昭尸共一逸禮稱二尸圖據文王之廟及太祖昭穆而言也其實太祖文武廟三尸也故云獻昭尸如穆尸之禮禮記祭統鋪筵設同几為依神也注祭者以某妃配亦不特几也疏人生時形體異故夫婦别几死則魂氣同歸于此故夫婦共几鄭注以某妃配儀禮少牢禮文不但不特設辭亦不特設其几故鄭注司几筵云祭于廟同几精氣合也席亦共之通典杜氏曰夫婦共尸者婦人祔從于夫同牢而食故共尸也楊氏復曰愚案曲禮孫為王父尸疏云新喪虞祭之時男女各立尸故士虞禮云男男尸女女尸至祔祭之後止用男一尸以其祔祭漸吉故也凡吉祭止用一尸故祭統云設同几是也又案司几筵每致一几注云周禮雖合葬及同時在殯皆異几體實不同祭于廟同几精氣合朱子語類或問古人合祭時每位有尸否曰固是周家旅酬六尸是每位各有尸也古者主人獻尸尸酢主人開元禮猶如此每一獻畢則尸便酢主人主人受酢已又獻第二位不知是甚時緣甚事廢了到本朝都把這樣禮數併省了又曰古人不用尸則有隂厭書儀中所謂闔門垂簾是也欲使神靈厭飫之也蕙田案以上三代祭事立尸禮記坊記七日戒三日齋承一人焉以為尸過之者趨走以教敬也注戒謂散齋也承猶事也方氏慤曰齋戒以承之趨走以避之敬之至矣故云以教敬也曲禮為君尸者大夫士見之則下之君知所以為尸者則自下之尸必式乘必以几注下下車也所以尊尸國君時或幼小不能盡識羣臣有以告者乃下之尸必式禮之也乘以几尊者慎也疏為君尸謂臣為君作尸者已被卜吉君許用者也古者致齋各于其家散齋亦猶出在路及祭日之旦俱來入廟故羣臣得于路見君之尸皆下車而敬之君若于散齋之時在路見尸亦自下車敬之尸在廟門之外其尊未伸不敢亢禮不可下車故式為敬以答君也式謂俯下頭也古者車箱長四尺四寸而三分之前一後二橫一木下去車牀三尺三寸謂之式于式上二尺二寸橫一木謂之較較去車牀五尺五寸于時立乘平常則馮較詩倚重較兮是也若應為敬則落手隱下式而頭得俯俯式視馬尾是也尸至廟中禮伸則亢故答拜几案在式之上尊者有所敬事以手據之几上有冪君以羔皮以虎緣之也吕氏大臨曰几者尊者之所馮以養安也故尸之乘車用之方氏慤曰必曰為君尸者則知非為君尸者有所不下矣曾子問孔子曰尸辨冕而出卿大夫士皆下之尸必式必有前驅注為君尸或辨者先祖或有為大夫士也卿大夫士見而下車尸小俯禮之前驅謂辟道以疏孔子廣設事尸之法案士虞禮尸服卒者之上服君之先祖有為士者當著爵辨以助君祭故子孫祭之尸得服爵辨者若以助君祭服言之大夫著冕注云大夫因士連言耳案儀禮特牲尸服玄端少牢又云尸服朝服尸皆服在家自祭之服不服爵辨及冕者大夫士卑屈于人君故尸服祖父自祭之上服人君禮伸故尸服助祭之上服也少儀酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲注如君之僕當其為尸則尊也周禮大御祭兩軹祭軌乃飲軌與軹于車同謂轊頭也軌與范聲同謂軾前也今疏尸之僕為尸御車之僕將欲祭軷酌酒與尸之僕為軷祭如酌酒與君之僕也其在車謂僕在車中時也僕既主尸車故于車執轡受爵尸位在左僕立在右故左執轡右受爵祭酒也君僕亦然軌謂轂末范謂式前僕既受爵將飲則祭之于車左右軌及前范學記當其為尸則弗臣也方氏慤曰以神言之故為尸則弗臣蕙田案以上敬尸之禮周禮天官掌次凡祭祀張尸次注尸則有幄鄭司農云尸次祭祀之尸所居更衣帳尊疏諸祭皆有尸尸故别帳尸次春官守祧掌守先王先公之廟祧其遺衣服藏焉若將祭祀則各以其服授尸注遺衣服大斂之餘也尸當服卒者之上服以象生時疏先王之尸服衮冕先公之尸服鷩冕也禮記中庸設其裳衣注裳衣先祖遺衣服設之當以授尸也楊氏時曰裳衣守祧所藏是也祭則各以其所服衣授尸所以依神也儀禮士虞禮記尸服卒者之上服禮記喪服小記父為士子為天子諸侯則祭以天子諸侯其尸服以士服父為天子諸侯子為士祭以士其尸服以士服疏尸服士服謂玄端若君之先祖為士大夫則服助祭之服故曽子問云尸辨冕而出是為君尸有著辨者有著冕者若為先君士尸則著爵辨若為先君大夫尸則著玄冕是也若大夫士之尸則服家祭之服故鄭注士虞記尸服卒者之上服士玄端是也方氏慤曰言天子諸侯士之祭其别如此則王制所謂祭從生者也與中庸所言亦同父為士其尸服以士服者則與喪從死者同義玉藻服之襲也充美也是故尸襲注尸尊則襲于疏尸居尊位無敬下故襲也陳氏祥道曰掩而充裘曰襲方氏慤曰裘之上有禓衣禓衣之上有襲衣襲衣之上有正服則所謂禓者未嘗無襲由露其禓衣故謂之禓爾所謂襲者未嘗無禓由掩以襲衣故謂之襲爾由內逹外則有裘而後有禓故于禓言裘自外至內則有服而後有襲故于服言襲由內逹外則出乎顯故曰見美以示其文自外至內則入乎隱故曰充美以示其質充言充于內也見言見于外也周禮春官大祝逆尸令鐘鼓右亦如之相尸禮注右讀亦當為侑相延其出入詔其坐作二疏凡言相尸者諸事皆相尸出入者謂祭初延之入灌訖退出坐于堂上南靣朝踐饋食訖又延之入室詔其坐作者郊特牲云詔祝于室坐尸于堂饋獻訖又入室坐凡坐皆有作及與主人答拜皆有坐作之事小祝大祭祀送逆尸沃尸盥贊隋注隋尸之祭也祭疏送逆尸者為始迎尸而入祭末送尸而出沃尸盥者尸尊不就洗案特牲少牢尸入廟門盥于盤其時小祝沃水贊隋者案特牲少牢尸始入室拜妥尸尸隋祭以韭菹擩于醢以祭于豆間小祝其時贊尸以授之禮記祭統君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子注不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸欲疏尸體既尊君宜自卑若出迎尸尸道未伸嫌君猶自尊故不迎也尸本是臣在廟則尊耳君若出迎則疑尸有還為臣之道故云疑于臣君若出廟門外則君道還尊與平常不異是疑于君周氏諝曰以君而迎牲可也以君而迎尸則嫌于以君而迎臣方氏慤曰君迎牲而不迎尸者非重牲而輕尸也為其有君臣之疑所以别其嫌也周禮春官大司樂尸出入則令奏肆夏疏尸出入謂尸初入廟時及祭祀訖出廟門皆令奏肆夏禮記玉藻君與尸行接武大夫繼武士中武注接武尊者尚徐蹈半迹繼武迹相及也中武迹間容迹也也疏此貴賤與尸行步廣狹不同君天子諸侯也武迹二足相躡每蹈于半未得各自成迹尊者舒遲故君及尸步遲狹大夫漸卑故與尸行步稍廣速也士卑故與尸行步極廣每徙足間容一足地乃躡之也方氏慤曰凡行步廣則疾而勞狹則緩而逸尊者逸而卑者勞樂記宗祝辨乎宗廟之禮故後尸注辨猶别也後尸居後贊禮儀疏宗謂宗人祝謂大祝但辨曉于宗廟詔相之禮故在尸後輔氏廣曰必言與尸行者著行之徐非止逸也敬而已矣愈尊愈敬郊特牲舉斚角詔妥尸注妥安坐也尸始入舉奠斚若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也疏斚角爵名也饋食薦孰之時尸未入祝先奠爵于鉶南尸入即席而舉之如特牲禮隂厭後尸入舉奠焉也詔告也尸始即席舉奠斚角之時未敢自安祝當告主人拜尸使尸安坐是詔妥尸也詩小雅楚茨以妥以侑傳妥安坐也侑勸也其箋迎尸使處神坐而食之為嫌不飽祝以主人之辭勸之嫌疏迎尸使處神坐而食于時拜以安之是妥也為其不飽祝以主人之辭勸之是侑也郊特牲曰舉斚角詔妥尸注云妥安坐也祝則詔主人拜安尸使之坐周禮夏官御僕大祭祀相盥而登注相盥者謂奉槃授巾與疏少牢特牲尸盥時有奉槃授巾故云也以無正文故云與以疑之禮記祭統君純冕立于阼夫人副禕立于東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆注圭瓚璋瓚祼器也以圭璋為柄酌鬱鬯曰祼大宗亞祼容夫人有故攝焉紖所以牽牲也芻謂藁也殺牲時用薦之周禮封人祭祀飾牲共其水藁涗盎齊也盎齊涗酌也凡尊有明水因兼言水爾嚌嚌肺祭肺之屬也君以鸞刀割制之天子諸侯之祭禮先有祼尸之事乃後迎牲夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人授尸執豆注校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也疏鄭注執醴授醴之人者謂夫人獻尸以醴齊此人酌醴以授夫人至夫人薦豆此人又執豆以授夫人祭義是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆注色不和曰怍郊特牲坐尸于堂注詔祝坐尸謂朝事時也朝事延尸于户西南面布主席東面取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神于室又出以墮于主主人親制其肝所謂制祭也時尸薦以籩豆至薦孰乃更延主于室之奧尸來升席自北方坐于主北焉方氏慤曰坐尸于堂即羮定詔于堂祭統詔祝于室而出于祊此交神明之道也注詔祝告事于尸也出于祊謂索祭也辭疏詔告也祝祝也謂灌鬯饋孰酳尸之等祝官以祝告事于尸其事廣也祊謂明日繹祭而出廟門旁求神于門外之祊輔氏廣曰詔祝于室而出于祊無所不盡為求神也周禮夏官大司馬大祭祀羞牲魚授其祭注牲魚魚牲也祭謂尸所以祭也鄭司農云大司馬主進魚牲下疏大祭據宗廟而言授尸祭祭者魚之大臠即少牢篇云主人主婦尸侑各一魚加膴祭于其上膴謂魚之反覆者禮記禮運盞斚及尸君非禮也注盞斚先王之爵也唯魯與王者之後得用之耳其餘諸侯用時王之器而已周氏諝曰夏曰盞殷曰斚諸侯有用之及尸君者非禮也所謂及尸君者君以獻尸而尸以酢君者也坊記尸飲三衆賔飲一示民有上下也注上下猶尊卑也主人主婦上賔獻尸乃後主人降洗爵獻賔也方氏慤曰尸飲三衆賔飲一謂祭祀獻酬之時也尊者飲多而卑者飲少故曰示民有上下也祭統尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司注尸飲五謂酳尸五獻也大夫士祭三獻而獻賔疏此據上公九獻之禮凡祭二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸故云尸飲五于此時獻卿獻卿之後主婦酳尸賔長獻尸是尸飲七也及瑶爵獻大夫是正九獻畢但初二祼不飲故云尸飲七自此以後長賔長兄弟更為加爵尸又飲二是并前尸飲九主人乃散爵獻士及羣有司也若侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一鄭注大夫士祭三獻而獻賔此特牲禮文明與諸侯獻賔時節不同案有司徹下大夫不賔尸與士同亦三獻而獻賔其上大夫别行賔尸之禮與此異也詩小雅信南山曾孫之穡以為酒食畀我尸賔箋斂稅曰穡畀豫也成王以黍稷之稅為酒食至祭祀齋戒則以賜尸與賔尊尸與賔所以敬神也大雅既醉令終有俶公尸嘉告傳俶始也公尸天子以卿言諸侯也箋俶猶厚也既始有善令終又厚之公尸以善言告之謂嘏辭也諸侯有功德者入為天子卿大夫故云公尸公君也子疏由此祭而使羣臣飽德故因述王之祭祀焉傳天以卿謂以卿為尸也箋公君明國君而稱公非必公爵也此宗廟宜以卿為尸但因解公而連言大夫耳祭統云孫為王父尸則天子諸侯宗廟之祭其尸用同姓也于同姓之中用其適者故祭統注云必取同姓之適曲禮曰為人子者不為尸然則尸又用適而無父者也非其宗廟之祭則其尸不必同姓石渠論云用太公為尸白虎通又云周公祭太山用召公為尸世本古義何氏楷曰時武王新即位故以有俶言吕祖謙云周之追王止于太王則宗廟之祭尸之尊者乃公尸也陳祥道云父為士子為大夫葬以士禮而祭之尸則服士服父為大夫子為士葬以大夫禮而祭之尸則服大夫服故周官司服享先公則鷩冕以為祭則各以其服授尸尸服鷩冕而王服衮以臨之則非所以致敬故不敢也愚案如前説則此公尸當是于諸祖中舉其最尊者乃后稷之尸也周旅酬六尸先儒謂后稷之尸發爵不受旅是也朱子援引秦已稱皇帝而其男女猶稱公子公主謂周稱王而尸但曰公尸蓋因其舊殊屬臆説又何休謂天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸毛傳同其説謂天子之卿蓋諸侯也未詳何據鄭玄則謂諸侯有功德者入為天子卿大夫故云公尸公君也孔穎逹引曾子曰王宗廟以卿為尸射以公為耦不以公為尸避嫌也此言公者卿六命出封則為侯伯故得以公言之又引石渠論云周公祭天用太公為尸白虎通云周公祭太山用召公為尸謂天地山川得用公皆牽強附會絶非事實嘉告鄭云以善言告之謂嘏詞也通篇皆宗祝傳公尸之意所謂工祝致告者禮記祭統冕而總干率其羣臣以樂皇尸注皇君也言君尸者尊之夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜道之以禮以奉三重而薦諸皇尸此聖人之道也注武宿夜曲名也停疏皇氏曰師説書傳云武王伐紂至于商郊止宿夜士卒皆歡樂歌舞以待旦因名焉熊氏曰武宿夜即大武之樂也陳氏祥道曰獻之屬有九而莫重于祼是以降神者為重凡獻卿大夫及羣有司皆其輕者也聲莫重于升歌是以貴人聲者為重凡見于下管象舞之器皆其輕者也舞莫重于武宿夜是以當時者為重凡見于前代者皆其輕者也詩小雅楚茨皇尸載起鼓鐘送尸傳皇大也則箋皇君也載之言也尸節神者也神醉而尸謖送尸而神歸尸出入奏肆夏尸稱君尊之也疏釋言云謖起也又解以鼓鐘送尸由尸出入奏肆夏故也尸出入奏肆夏春官大司樂職文世本古義何氏楷曰古者祭必立尸所以象神特牲是士禮少牢是大夫禮並皆有尸又祭統云君執圭瓚祼尸是諸侯有尸也又周禮守祧職云若將祭祀則各以其服受尸是天子有尸也天子以下宗廟之祭皆用同姓之嫡故祭統云夫祭之道孫為王父尸所使為尸者于祭者子行也父北面而事之所以明子事父之道也注云子行猶子列也祭祖則用孫列皆取于同姓之嫡孫也疏云主人為欲孝敬已父不計已尊而北面事子行則凡為子者豈得不自尊事其父乎是見子事父之道也而儀禮疏則云大夫士以孫之倫為尸皆取無爵者無問成人與幼皆得為之若天子諸侯雖用孫取卿大夫有爵者為之故鳬鷖祭尸之等皆言公尸是已又何休公羊注云禮天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸坊記子云祭祀之有尸也宗廟之有主也示民有事也以此坊民民猶忘其親鄭云載之言則也尸節神者也神醉而尸謖鼓鐘之鼓從攴與鐘鼓之鼓從支不同彼二器並作此則以擊鐘為主所謂金奏也周禮大司樂凡樂事大祭祀宿縣遂以聲展之尸出入則令奏肆夏鐘師掌金奏以鐘鼓奏九夏肆夏其一也九夏掌于鐘師先擊鐘次擊鼓以金為奏樂之節故但言鼓鐘耳李如圭云尸在廟門外則疑于臣故送迎尸皆以廟門為斷鄭云神安歸者歸于天也孔云神尸相將神無形故尸象焉羅泌云夫神猶火也火生無形因物顯昭物盡而火熄神本無方因物顯用物盡而神藏是故火非可盡也而在物者為可盡神非可盡也以其在物者有可盡之理也白虎通曰祭之所以尸以其虛無而寂寞也視之無形聽之無聲升自阼階仰視榱桷俯察几筵其器存而人亡思慕哀傷無所寫泄故坐尸而食之毁損其饌欣然若親之飽其醉若神之醉也詩云神具醉止皇尸載起鼓鐘送尸是故侑神尸入舉角妥尸食為之節及乎酌盎醉尸有至沾醉旅酬降冕則尸辨而舞之以盡神也蕙田案以上祭祀事尸之禮詩大雅鳬鷖序鳬鷖守成也太平之君子能持盈守成神祗祖考安樂之也箋君子斥成王也言君子者太平之時則皆然非獨成王也鳬鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成箋祭祀既畢明日又設禮而與尸燕燕疏言公尸來燕則是後燕尸非祭時也尸之禮大夫謂之賔尸即用其祭之日今有司徹是其事也天子諸侯則謂之繹以祭之明日春秩宣八年言辛巳有事于太廟壬午猶繹是謂在明日也此公尸來燕是繹祭之事故云祭祀既畢明日又設禮而與公尸燕也鳬鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為鳬鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福祿來下鳬鷖在潨公尸來燕來宗既燕于宗福祿攸降公尸燕飲福祿來崇鳬鷖在亹公尸來止熏熏旨酒欣欣燔炙芬芬公尸燕飲無有後艱朱子集傳此祭之明日繹而賔尸之樂世本古義何氏楷曰鳬鷖武王為諸侯繹祭五廟禮畢因而享尸之樂所以知為祭五廟者以此詩言公尸凡五知之如謂辭煩而不殺何必至五且何以竟止于五乎王制云諸侯五廟二昭二穆與太祖之廟而五祭法云諸侯五廟曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止疏云曰考廟者父廟考成也謂父有成德之美也曰王考者祖廟王君也祖尊于父故加君名曰皇考廟者曽祖也皇大也君也曾祖轉尊又加大君之稱也曰顯考廟者髙祖也顯明髙祖居四廟最上故以髙祖目之曰祖考廟者太祖也祖始也此廟為王家之始故云祖考也天子月祭五諸侯卑故惟得月祭三也太祖為不遷而與髙祖並不得月祭止預四時也今案此詩言鳬鷖在涇涇為水名而其後沙渚潨亹皆非水名乃蒙乎涇之辭涇水居中有太祖之象沙渚皆在水旁有髙曾一昭一穆之象潨亹居涇水下流又為祖考在髙曾下一昭一穆之象其為諸侯之五廟明矣尸稱公尸亦周家未為天子時之稱然愚初猶意其為文王之詩以祭義引詩云明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之正言繹祭之事後又思詩人凡言景物必據所見文王居岐周而祭宗廟當言岐水或已遷于豐而祭宗廟當言豐水是皆非涇經流之地安得逺及涇水乎及觀華谷嚴氏粲之説而意始豁然直斷其為武王未有天下時之詩焉嚴云渭水東流先會豐而後會涇豐水自南而入渭涇水自西北而入渭文王居豐在豐水之西則越豐而後至涇武王居鎬在豐水之東則去涇近矣張衡西京賦云欱澧吐鎬據渭據涇見涇水近鎬也郝氏敬云鳬善沒鷖善浮有變化出沒之象以比鬼神愚案郝説是矣禮謂索祭於祊不知神之所在於彼乎於此乎意亦近是然詩之興義必有所取舊説皆謂興公尸則公尸只一人耳而以二鳥興之何居禮夫婦一體昏則同牢合卺終則同穴祭則同几同祝故禮記曰鋪筵設同几為依神也疏謂人生時體異故夫婦别几死則魂氣同歸于此故夫婦同几唐博士陳正節議曰臣聞于禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而來無易兹典陳祥道曰祭祀同几則一尸儀禮男男尸女女尸謂虞祭也又曰案少牢饋食蕆嵗事于皇祖必以某妃配某氏故同几共牢一尸而爼豆不兩陳以其夫婦一體故也然則鳬鷖乃以興祖考妣非興公尸也蓋是先行繹祭之禮而後享尸詩既不言繹祭之事而特寄興于鳬鷖一語以致其恍惚想像之意此詩筆之幻處又取興之變體宗元案鳬鷖詩序謂繹而賔尸信已鄭康成乃分首章祭宗廟之尸次章四方萬物之尸三章天地之尸四章社稷山川之尸五章七祀之尸者殊鑿歐陽本義破之極快朱子已不從之洵為至當何元子乃更鑿為武王祫祭五廟之尸謂武王時為諸侯二昭二穆與太祖之廟而五因以每一章只祭一廟之尸其比康成之鑿不更甚乎且釋義處尤多膠固滯泥以此説詩所謂固哉髙叟也已今姑存之以廣聞見勿為所愚可也蕙田案此繹祭賔尸禮記曾子問曾子問曰卿大夫將為尸於公受宿矣而有齊衰內喪則如之何孔子曰出舍於公館以待事禮也注出舍公館吉凶不可同處也然疏受宿謂受宿齋戒也出舍公館待事畢後歸哭也曾子問曰大夫之祭鼎俎既陳籩豆既設不得成禮廢者幾孔子曰九外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣注室中之事謂賔長獻齊疏此大夫祭謂祭宗廟若遭異門衰之喪其祭迎尸入室三飯則止祝更不勸侑使至十一主人酌酒酳尸尸不酢主人唯此而已大功服輕祭禮稍備蕙田案此條尸變體孔子曰祭殤必厭蓋弗成也祭成喪而無尸是殤之也注祭殤必厭厭飫而已孔子曰宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉肺無肵俎無玄酒不告利成是謂隂厭注用特牲者尊宗子凡殤則特豚自卒哭成事之後為吉祭舉肺脊肵爼利成禮之施于尸者隂厭者祭之于奧疏肵是尸之所食歸餘之爼玄酒重古之義祭成人則有之利成謂祭畢告供養之禮不舉肺無肵爼不告利成此三事本主于尸今以無尸故不為凡殤與無後者祭于宗子之家當室之白尊于東房是謂陽厭注凡殤謂庶子之適也當室之白謂西北隅得户明者也明者曰陽疏凡殤有二一昆弟之子祭之當于宗子父廟二是從父昆弟祭之當于宗子祖廟其無後者亦有二一是昆弟無後祭之當于宗子祖廟二是諸父無後祭之當于宗子曽祖之廟其經營祭祀牲牢之屬親者主為之程子曰無服之殤不祭下殤之祭終父母之身中殤之祭終兄弟之身長殤之祭終兄弟之子之身成人而無後者終兄弟之孫之身此皆以義起也蕙田案以上祭殤無尸王制庶人祭于寢疏庶人之祭謂薦物以其無廟故唯薦而已薦獻不可褻處故知適寢也庶人春薦韭夏薦麥秋薦黍冬薦稻陳氏禮書祭有尸而薦無尸大戴禮天圓篇無祿者稷饋稷饋者無尸無尸者厭也注庶人無常牲故以稷為主蕙田案以上庶人無尸通典尸神象也祭所以有尸者鬼神無形因尸以節醉飽孝子之心也夏氏立尸而卒祭夏禮尸有事乃坐殷坐尸無事猶坐周坐尸詔侑無方其禮亦然其道一也言此亦周所因於殷也方猶常也告尸行節勸尸飲食無常若孝子就之為也孝子就養無方也又云旅酬六尸使之相酌也后稷之尸發爵不受旅曾子問曰祭必有尸乎言無益無用為若厭祭亦可乎厭時無尸孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則使同姓可也人以有子孫為成人子不殤父義由此也夫祭之道孫為王父尸所使為尸者於祭者為子行戶郎反也父北面而事之所以明子事父之道子行猶子列也祭祖則用孫列者取于同姓之嫡孫也天子諸侯之祭朝士延尸于外户是以有北面事尸之禮君子抱孫不抱子此言孫可以為王父尸子不可以為父尸以孫與祖昭穆同為君尸者大夫士見則下之君知所以為尸者則自下之尊尸也下下車也國君或時幼小不盡識羣臣有以告者乃下也尸必式禮之也乘必以几尊者慎也君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟中則全於臣全於子是故不出者明君臣之義不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸也祝迎尸於廟門之外者象神從外來也天子宗廟之祭以公卿大夫孫行者為尸一云天子不以公為尸諸侯不以卿為尸為其太尊嫌敵君故天子以卿為尸諸侯以大夫為尸周公祭太山而以召公為尸者外神賔主相見敬之道不嫌也卿大夫不以臣為尸俱以孫者避君也天子諸侯雖以卿大夫為尸皆取同姓之嫡也夫婦共尸者婦人祔從於夫同牢而食故共尸也始死無尸者尚如生故未立也檀弓云既封主人贈而祝宿虞尸贈以幣送死者于壙也于主人贈祝先歸也封彼驗及白虎通曰祭所以有尸者鬼神聽之無聲視之無形升自阼階仰視榱桷俯視几筵其器存其人亡虛無寂寞思慕哀傷無所寫泄故座尸而食之毁損其饌欣然若親之飽尸醉若神之醉矣詩云神具醉止皇尸載起説曰案鳬鷖詩美成王能持盈守成神祗祖考安樂之也其詩五章每章有公尸鄭玄以初章為宗廟其二為四方百物其三為天地其四為社稷山川其五為七祀則是周代大小神祀皆有尸也至於周人輕重各因其象類又案周公祭太山以召公為尸是三公之類也又秋官職祭亡國之社以士師為尸是刑戮之義則其餘亦可知矣杜佑議曰古之人朴質中華與夷狄同有祭立尸焉有以人殉葬焉有茹毛飲血焉有巢居穴處焉有不封不樹焉有手摶食焉有同姓婚娶焉有不諱名焉中華地中而氣正人性和而才惠繼生聖哲漸革鄙風今四裔諸國地偏氣獷則多仍舊自周以前天地宗廟社稷一切祭享凡皆立尸秦漢以降中華則無矣或有是古者猶言祭尸禮重亦可習之斯豈非甚滯執者乎案後魏文成帝拓跋濬時髙允獻書云祭尸久廢今風俗則取其狀貌類者以為尸祭之晏好敬之如夫妻事之如父母敗損風化黷亂情理據文成帝時其國猶在代北又案周隋蠻夷傳巴梁間每秋祭祀鄉里美鬢面人迭迎為尸以祭之今栁道州人每祭祀迎同姓丈夫婦人伴神以享亦為尸之遺法陳氏禮書古者事死如事生事亡如事存故祭祀必立尸周官節服氏郊祀裘冕二人執戈送逆尸士師若祭勝國之社稷則為之尸祀五帝則沃尸及王盥守祧若將祭祀則各以其服授尸鳬鷖之序言神祗祖考而詩稱公尸則凡祭有尸矣惟奠與祭殤無尸春秋傳曰晉祀夏郊董伯為尸傳曰舜祀唐郊丹朱為尸又周公祭泰山以召公為尸曽子問曰卿大夫為尸於公則凡尸皆貴者矣白虎通曰王者宗廟以卿為尸不以公為尸嫌三公尊近天子親稽首拜尸也杜佑曰天子不以公為尸諸侯不以卿為尸天子諸侯雖以卿大夫為尸皆取同姓之嫡也卿大夫不以臣為尸俱以孫者避君故也禮記曰為人子者祭祀不為尸則凡尸皆無父者矣然則天子諸侯之尸以卿大夫則幼者不與焉禮曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也此大夫士之禮歟蓋喪禮始喪而奠則無尸以人道事之也既葬而祭則有尸以神道事之也祭祀同几則一尸儀禮曰男男尸女女尸謂虞祭也父為士子為大夫葬以士禮而祭之尸則服士服父為大夫子為士葬以大夫禮而祭之尸則服大夫服故周官司服享先公則鷩冕以為祭則各以其服授尸尸服鷩冕而王服衮以臨之則非所以致敬故弗敢也然小記曰父為天子諸侯子為士祭以士其尸服以士服者鄭氏曰父以罪誅尸服以士服不成其為君也以卒者不成其為君故不敢服其為君之服也儀禮大夫前祭一日筮尸士則前祭三日筮尸大夫於尸再宿而一戒士於尸一宿而無戒則大夫之禮有所屈士之禮有所伸推而上之則人君蓋亦前三日筮尸而宿戒之儀又加隆矣周官掌次祭祀張尸次儀禮大夫士之禮皆祝迎尸於門外祝入門左則固張於廟門之西矣及其入也主人立於阼階東西南面尸盥而進升自西階主人升自阼階祝從尸主人從祝尸入即席東面而坐祝主人西南而立皆拜妥尸尸答拜遂坐而挼祭焉禮記曰周坐尸詔侑無方夏立尸而卒祭殷坐尸周旅酬六尸觀儀禮大夫士之祭則人君事尸之儀略可見矣附辨李氏祫祭昭穆二十餘尸李氏三禮辨宗廟昭穆或問之説詳矣但謂祫于太廟室中則羣昭羣穆之主皆入列于牖下則小誤耳逸禘祫禮昭穆各用一尸蓋周之中世先王先公之位已凡二十餘所使南北相向各列牖下假以宣王考室之時言之后穆東向先公不窋以下十一尸先王太王以下十三尸南北相向每尸設二十六豆籩九俎八簋六鉶及尸與主賔獻酬之地蓋比明堂三倍之廣而二十餘尸各十一獻又有三酬亦非一日所能行也陳氏禮書鄭氏禘祫志云其尸后稷廟中后稷尸一昭穆尸各一其實太祖廟三尸也趙氏德曰鄭謂昭穆各用一尸恐亦或然故杜預云逸禮祫于太廟之禮毁廟之主升合食而立二尸以此言之則祫祭之羣昭羣穆雖多昭一尸穆一尸而已汪氏份曰禮器云周旅酬六尸孔疏云后稷在室西壁東向為發爵之主尊不與子孫為酬酢餘自文武二尸就親廟尸凡六在后稷之東南北對為昭穆更相次序以酬然大祫多主而唯云六尸者先儒與王肅並云毁廟無尸但有主也而李氏乃有不窋以下十一尸太王以下十三尸之説誤也蕙田案依鄭王義則祫祭不必皆有尸明矣而鄭王之説微有不同一主三尸一主六尸一毁廟有尸一毁廟無尸今案六尸見於禮器三尸不見何經從王為是右尸禮記曲禮措之廟立之主曰帝注春秋傳曰凡君卒哭而祔祔而作主疏措置也王葬後卒哭竟而祔置于廟立主使神依之也崔靈恩云古者帝王生死同稱生稱帝者死亦稱帝生稱王死亦稱王凡君卒哭而祔祔而作主者此是左傳僖三十三年之言也卒哭者是葬竟虞數畢後之祭名也孝子親始死哭晝夜無時葬後虞竟乃行神事故卒其無時之哭猶朝夕各一哭故謂其祭為卒哭明日而立主祔于廟隨其昭穆從祖父食卒哭主暫時祔廟畢更還殯宫至小祥作栗主入廟乃埋桑主于祖廟門左埋重處故鄭云虞而作主至祔奉以祔祖廟既事畢反之殯宫然大夫士亦哭而祔而左傳唯據人君有主者言之故云凡君鄭注祭法云大夫士無主也此言凡君明不關大夫士也崔靈恩云大夫士無主以幣帛祔祔竟並還殯宫至小祥而入廟也檀弓乃云重主道也鄭注引公羊傳云虞主用桑練主用栗則似虞已有主而左傳云祔而作主二傳不同者案説公羊者朝葬日中則作虞主若鄭君以二傳之文雖異其意則同皆是虞祭總了然後作主故異義云古春秋左氏説既虞然後祔死者于先死者祔而作主為桑主也期年然後作栗主許慎謹案左氏説與禮記同鄭君不駁明同許意蕙田案記措之廟立之主並言乃祔廟之練主非虞主也鄭引左傳非是疏用鄭祭法注證凡君二字謂大夫士無主尤為謬戾詳見大夫士宗廟條下坊記宗廟之有主也示民有事也疏宗廟有主下示于民有所尊事也方氏慤曰主藏于宗廟之內故于宗廟言主也為主以偶其存經曰事亡如事存此所以言示民有事也春秋文公二年公羊傳練主用栗用栗者藏主也注練謂期年練祭也埋虞主于兩階之間易用栗也夏后氏以松殷人以柏周人以栗榖梁傳吉主於練注期而小祥其主用栗作主壞廟有時日於練焉壞廟之道易簷可也改塗可也注親過髙祖則毁其廟以次而遷將納新神故示有所加作疏今方練而作主猶是凶服而曰吉主者此雖為練之主終入廟以辨昭穆故傳以吉言之然作主在十三月壞廟在三年喪終而傳連言之者此主終入廟入廟即易簷以事相繼故連言之非謂作主壞廟同時也蕙田案吉主即祔于宗廟之主也虞主用桑栗主作而虞主埋焉故虞主喪主也詳讀禮通考兹不載白虎通祭所尸主何神本無方孝子以主係心廟主以木為之木有終始與人相似題之欲令後可知主用木方尺或曰尺二寸五經異義主者神象也孝子既葬心無所依所以虞而立主以事之小祥以前主用桑者始死尚質故不相變既練易之遂藏于廟以為祭主主之制四方穿中央逹四方天子長一尺二寸諸侯一尺皆刻諡于背禮記外傳廟主用木者木落歸本有始終之義天子廟主長尺二寸諸侯一尺禮士虞記曰桑主不文吉主皆刻而諡之何休公羊傳注主狀正方穿中央逹四方天子長尺二寸諸侯長一尺榖梁傳范注同衛次仲曰宗廟主皆用栗右主八寸左主七寸廣厚三寸右主謂父也左主謂母也成氏伯璵曰天子之主一尺二寸諸侯一尺四向孔穴五逹相通漆書其諡故曰神主葬後孝子之心因無所覩故以神主也主之狀古今異制不得以新禮求之通典漢儀云帝之主九寸前方後圓圍一尺后主七寸圍九寸木用栗晉武帝太康中制太廟神主尺二寸后主一尺與尺二寸中間木以栗大唐之制長尺二寸上頂徑一寸八分四廂各剡一寸二分上下四方通孔徑九分玄漆櫝玄漆趺其櫝底蓋俱方底自下而上蓋從上而與底齊趺方一尺厚三寸皆用古尺古寸以光漆題諡號於背又曰晉劉氏問蔡謨云時人祠有板板為用當主為是神坐之榜題謨答今代有祠板木乃始禮之奉廟主也主亦有題今板書名號亦是題主之意安昌公荀氏祠制神板皆正長尺一寸博四寸五分厚五寸八分大書某祖考某封之神座夫人某氏之神座以下皆然書訖蠟油炙令入理刮拭之司馬氏書儀以桑木為祠版鄭康成以為卿大夫士無神主大夫束帛依神士結茅為菆徐邈以為公羊大夫聞君之喪攝主而往重主道也埋重而立主大夫士有重亦宜有主蔡謨以為今世有祠版乃禮之廟主也主亦有題今版書名號亦是題主之意安昌公荀氏祠制神版皆正長尺一寸博四寸五分厚五寸八分大書某祖考某封之神座夫人某氏之神座書訖蠟油炙令入理刮拭之今士大夫家亦有用祠版者而長及博厚不能盡如荀氏之制題云某官府君之神座某封邑夫人郡縣君某氏之神座續加封贈則先告貼以黃羅而改題無官則題處士府君之神座版下有趺韜之以囊籍之以褥府君夫人只為一匣今從之禮虞主用桑練主用栗祠版主道也故於虞亦用桑將小祥則更以栗木為之蕙田案古人有重有主未聞有版也既因大夫士主無明文而不立主祠版更何所據耶朱子家禮伊川神主式作主用栗取法於時月日辰趺方四寸象嵗之四時髙尺有二寸象十二月身博三十分象月之日厚十二分象日之辰身趺皆厚一寸二分剡上五分為圓首寸之下勒前為額而判之一居前二居後前四分後八分陷中以書爵姓名行曰宋故某官某公諱某字某第幾神主陷中長六寸濶一寸合之植于趺身去趺上一寸八分并趺髙一尺二寸竅其旁以通中如身厚三之一謂圓徑四分居二分之上謂在七寸二分之上粉塗其前以書屬稱屬謂髙曽祖考稱謂官或號行號如處士秀才行如幾郎幾公旁題主祀之名曰孝子某奉祀加贈易世則筆滌而更之水以灑墻壁外改中不改朱子家禮作主制度身髙一尺二寸闊三寸厚一寸二分首削去其上兩角各去五分俾其首作圓形頷從上量下一寸橫勒其前人身深四分為頷判開其下分陷中于頷下本身上刻深四分闊一寸長六寸為陷中竅于本身兩側旁鑽兩圓孔徑四分以通陷中其孔離趺面七寸二分前面廣三寸安在頷下趺方四寸厚一寸二分鑿之通底以受主身合式前合于後身納于趺植立仍髙一尺二寸座以薄板三片相合安于趺之兩旁及後面比主稍髙面頂俱虛趺之四邊各寬于版少許令可蓋蓋亦以薄板為之四片相合有頂可以罩趺上板唯前面留一圓竅俱飾以黑漆古以帛縫如斗帳齊主四方板為頂韜其主置于座中然後加蓋今人從簡便不復並用朱氏彛尊與佟太守書主之制雖不載于經然衛次仲言右主八寸左主七寸廣厚三寸何休言主狀正方穿中央逹四方天子長尺有二寸諸侯長一尺漢書儀言帝主長九寸后主長七寸杜佑通典述晉太康故事帝主尺二寸后主一尺蔡謨言今代祠板乃禮之廟主安昌公荀朂祠制神板皆正長尺二寸博四寸五分厚五分雖諸家之説長短不齊要之帝后之尊莫有過尺二寸者洓水司馬氏伊川程氏定為主式作主以栗趺四寸以象四時髙尺二寸以象十二月身博三十分象月之日厚十二分象日之辰今之法式大率凖此蕙田案以上主名義制度禮記郊特牲直祭祝于主注直正也祭以孰為正祝疏薦孰正祭之時祝官以辭告于主若儀禮少牢敢用柔毛剛鬛用薦嵗事于皇祖伯某是也陸氏佃曰直祭祝于主謂尸未入祝而已是之謂直祭若少牢祝酌奠遂命佐食啓會主人西面祝祝曰孝孫某敢用柔毛剛鬛用薦嵗事于皇祖伯某尚饗當此節曾子問孔子曰吾聞諸老聃曰祫祭於祖則祝迎四廟之主主出廟入廟必蹕注祝迎廟主祝接神者也蹕止行也疏三年一祫當祫之年則祝迎髙曾祖禰四廟而于太祖廟祭之天子祫祭則迎六廟之主四廟舉諸侯言也主謂木主天子一尺二寸諸侯一尺出廟者謂出已廟而往太祖廟入廟謂從太祖廟而反還入已廟主出入之時必須蹕止行人若主入太祖廟中則不蹕以壓于尊者也春秋文公二年大事於太廟公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳于太祖未毁廟之主皆升合食于太祖注毁廟謂親過髙祖毁其廟藏其主于太祖廟中大祖周公之廟陳者就陳列大祖前太祖東向昭南向穆北向其餘孫從王父自外來曰升榖梁傳大事者何大是事也著祫嘗祫祭者毁廟之主陳于太祖未毁廟之主皆升合祭于大祖注祫合也嘗秋祭祫祭者皆合祭諸廟已毁未毁者之主于大祖廟中以昭穆為次序祭畢則復還其廟通典祫祭太祖尸南向主在其右昭在東穆在西主各在其右蕙田案以上祭祀奉主之禮禮記曾子問曾子問曰廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也注曽子問比怪時有之也孔子以尊喻卑偽猶假也舉兵以遷廟主行無則主命為假主非也方氏慤曰廟有主則神之所依廟有二主則莫適為依是豈禮之意哉所謂尊無二上者以其神有尊卑故言無二上也蕙田案此條言廟無二主孔子曰吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟注老聃古夀考者之號也與孔子同時天子崩諸侯薨則藏諸主于祖廟象有凶事者聚也卒哭成事先祔之祭名也蕙田案此條因喪遷主君去其國太宰取羣廟之主以從禮也注君去其國以廟主從鬼神依人者也蕙田案此條去國遷主當七廟五廟無虛主虛主者唯天子崩諸侯薨與去其國與祫祭于祖為無主耳張子曰有廟即當有主方氏慤曰廟之有主猶國之有王也非此四者主其虛乎右主春秋莊公十四年左氏傳原繁曰先君桓公命我先人典司宗祏注宗廟中藏主石室為疏宗祏者慮有非常火災于廟之北壁內石室以藏木主有事則出而祭之既祭納于石室祏字從示神之也昭公十有八年宋衛陳鄭災左氏傳鄭子産使祝史徙主祏于周廟告于先君注祏廟主石函周廟厲王廟也有火災故合羣主于祖廟易救護則疏每廟木主皆以石函盛之當祭則出之事畢盛于函藏于廟之北壁之內所以辟火災也白虎通主藏之西壁衛次仲曰祭訖則納于西壁坎中去地一尺六寸公羊説主藏太廟室西壁中以備火災必在西者長老之處地道尊右鬼神幽隂也説文祏宗廟主也周禮有郊宗石室通典或問髙堂隆曰昔受訓馮君正廟之主各藏太室西壁之中遷廟之主於太祖太室北壁之中案逸禮藏主之處似在堂上壁中答曰章句但言藏太祖北壁中不别堂室愚意以堂上無藏主當室之中也賀氏循曰古禮神主皆盛以石函江都集禮太祖室北壁中堂上無藏主處故於室中也右祏周禮春官司巫祭祀則共匰主注杜子春曰匰器名主謂木主也主先匰者共主以匰祝疏以匰器盛主來向祭所大取得主匰器即退摯虞決疑云廟主藏于户之外西墉之中有石函名曰宗祏函中笥以盛主右匰陳氏禮書公羊曰虞主用桑練主用栗榖梁曰喪主於虞吉主於練特左氏曰凡君祔而作主曲禮曰措之廟立之主曰帝然人子之於親不忍一日使無依焉故始死依以重既葬依以主重埋則桑主作桑主埋則栗主立豈有既虞卒哭不存其象俟祔而后為之乎然則左氏曲禮之説蓋曰作主將以祔廟非祔而後作之也先儒謂既祔主反其寢大夫士無主以幣告然坊記曰喪禮每加以逺荀卿曰喪事動而逺故將葬而既祖柩不可反孰謂將祔而既餞主可反乎重主道也大夫士有重尸神象也大夫士有尸孔悝大夫也去國載祏孰謂大夫士無主乎主之制不見於經何休曰主狀正方穿中央逹四方天子長尺二寸諸侯長一尺桑主不文吉主皆刻而諡之衛次仲曰右主八寸左主七寸廣厚三寸右主父也左主母也漢舊儀后主長七寸圍九寸帝主長九寸其制雖不可考然正廟之主各藏其室西壁之中遷廟之主藏于太室北壁之中去地六尺一寸大戴禮五經異義江都集禮傳述皆然蓋有所授之也自東漢迄隋唐宗廟之制與古不同而遷主所藏或在西儲或在西夾室其正廟之主雖各藏廟室西壁之中而帝后别為石坎非禮意也案少牢饋食薦嵗事于皇祖必以某妃配某氏故同几共牢一尸而爼豆不兩陳以其夫婦一體故也賀循亦謂后配尊于帝神主所居宜同故東晉明帝時廟有坎室者十皆帝后共一石室至恭帝時廟為坎室一十八而帝后異室此議者所以譏之也書甘誓用命賞于祖蔡汪天子巡守必載其遷廟之主與其社主以行以示賞戮之不敢専也周禮春官小宗伯若大師則帥有司而奉主車注有司大祝也王出軍必先有事于社及遷廟而以其主行遷主曰祖曾子問曰天子巡守以遷廟主行載于齊車言必有尊也書曰用命賞于祖肆師用牲于社宗則為位凡師不功則助牽主車注宗遷主也助助大司馬也夏官大司馬若大師則涖釁主注大師王出征伐也涖臨也主謂遷廟之主及社在軍者也凡師既受甲迎主于廟殺牲以血塗主神之若師不功則厭而奉主車注鄭司農云厭謂厭冠喪服也玄謂奉猶送也送主歸于廟與社禮記曾子問曾子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣注齊車金路齊疏凡祭祀皆乘玉路車則降一等乘金路也遷廟主行者謂載新遷廟之主張子曰古者天子巡守載遷廟主而行必載遷廟主親之至也曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告於祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也皇氏疏有遷主者直以幣帛告神不將出行即埋之階間無遷主者加以皮圭告于祖禰遂奉以出文王世子其在軍則守於公禰注在軍謂從軍者公禰行主也行以遷主言禰在外親也既疏公禰謂遷主載在齊車隨公行者也庶子官從在軍故守於公齊車之行主也戰則守於公禰孝愛之深也尚書大傳王升舟鼓鐘亞觀臺亞將舟亞宗廟亞孔頴逹曰社殺戮與軍將同故命社主為將宗廟則遷主也亞在將舟後陳氏禮書曰師行載遷主則未遷之主不行矣遷主載于齊車則社主亦齊車矣用命賞于祖則遷主之車在左所以象左宗廟也不用命戮于社則社主之車在右所以象右社稷也師載遷主而武王伐紂載文王之木主者所以成文王之志而已不可以常禮議之也書傳曰將舟亞宗廟亞蓋舉宗廟以見社耳先儒以將舟為社主恐不然也蓋君之出也先祓社后釁祖其行也前社而後祖其止也右社而左祖祖非禰也文王世子謂之公禰者親之也右行師遷主周禮春官天府掌祖廟之守藏與其禁令疏案王制云天子七廟三昭三穆與太祖之廟而七大祖即始祖廟也周立后稷廟為始祖以其最尊故寶物藏焉禁令謂禁守不得使人妄入之等也凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之注玉鎮大寶器玉瑞玉器之美者陳之以華國也疏典瑞云掌玉瑞玉器之藏辨其名物與其用事設其服飾其美者天府掌之鄭知玉鎮大寶器是玉瑞玉器之美者此云玉鎮即大宗伯云以玉作六瑞鎮圭之屬即此玉鎮也彼又云以玉作六器蒼璧禮天之屬即此寶器也若遷寶則奉之注奉猶送也則疏此遷寶謂王者遷都若平王東遷寶亦遷天府奉送之于彼新廟之天府藏之如故也守祧掌守先王先公之廟祧其遺衣服藏焉注遺衣服大斂之餘也稱疏云遺衣服大斂之餘也者案士喪禮云小斂十九不必盡服則小斂亦有餘衣必知據大斂之餘者小斂之餘至大斂更用之大斂餘乃留之故知其遺衣服無小斂餘也既祭則藏其隋與其服注鄭司農云隋謂神前所沃灌器名玄謂隋尸所祭肺脊黍稷之屬藏之以依神書顧命越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序允之舞衣大貝鼖鼓在西房兑之戈和之弓垂之竹矢在東房鄭氏周禮天府注陳之以華國也書顧命此其行事之見于經又云武王誅紂赤刀為飾大訓者禮法先王禮教即虞書典謨是也𢎞璧𢎞大也大璧琬琰皆尺二寸者大玉華山之球夷玉東北之璞天球雍州所貢之玉色如天三者皆璞未見琢治故不以器名之河圖圖出于河水帝王聖者所受允也和也垂也皆古人造此物者之名鼖鼓大鼓也此鼖非考工記鼖鼓長八尺者若是周物何須獨寶守明前代之物與周鼖鼓同名耳大貝者書傳曰散宜生之江淮之浦取大貝如車渠是也孔疏二序共為列玉五重又陳先王所寶之器物上言陳寶非寶則不得陳之中庸陳其宗器吕氏大臨曰宗器者國之玉鎮大寶器天府所掌者也若有大祭則出而陳之以華國如書所謂赤刀大訓𢎞璧琬琰大玉夷玉天球河圖之類是也楊氏時曰宗器天府所藏是也歷世寶之以傳後嗣祭則陳之示能守也于顧命陳之示能傳也周禮秋官司約凡大約劑書于宗彛注大約劑邦國約也書于宗廟之六彛欲神監焉于疏六彛之名若司尊彛云雞鳥斚黃虎蜼之等以畫宗廟彛尊使神監焉使人畏敬不敢違之也右宗廟守藏禮記曲禮天子建天官先六大曰大祝郊特牲祝將命也疏祝將命也者祝以傳逹主人及神之辭命也禮運故宗祝在廟疏宗宗伯也祝大祝也王在宗廟則委于宗祝示不自専以達下也樂記宗祝辨乎宗廟之禮故後尸注辨猶别也後尸居後贊禮儀疏宗謂宗人祝謂大祝但辨曉于宗廟詔相之禮故在尸後郊特牲失其義陳其數祝史之事也疏失其義陳其數祝史之事也者若不解禮之義理是失其義唯知布列籩豆是陳其數其事輕故云祝史之事也春秋桓公六年左氏傳祝史正辭信也襄公二十七年左氏傳其祝史陳信于鬼神無愧辭注祝陳馨香德足副之故不愧蕙田案以上建祝名義周禮春官大祝掌六祝之辭以事鬼神示疏云掌六祝之辭者六辭皆是祈禱之事皆有辭説以告神故云六祝之辭云以事鬼神示者此六祝皆所以事人鬼及天地神祗掌六祈以同鬼神示二曰造注造祭于祖也劉氏彛曰六祝因祭享而祝之六祈特為因事祭而祈之作六辭以通上下親踈逺近一曰祠五曰禱注鄭司農云禱謂禱于天地社稷宗廟主為其辭也蔡氏德晉曰祠之名不一書伊尹祠于先王太甲始立告廟也大宗伯以祠春享先王嗣前嵗之祭也小宗伯禱祠于上下神祗鄭康成注求福曰禱得求曰祠蓋得所求而祭之其禮如常祭故常祭皆可稱祠取嗣續之意蕙田案以上祈禱宗廟之祝辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭注杜子春云命祭祭有所主命也鄭司農云擩祭以肝肺菹擩鹽醢中以祭也繚祭以手從肺本循之至于末乃絶以祭也絶祭不循其本直絶肺以祭也重肺賤肝故初祭絶肺以祭謂之絶祭至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀弗祭謂之振祭特牲饋食禮曰取菹擩于醢祭于豆間鄉射禮曰取肺坐絶祭鄉飲酒禮曰右取肺左郤手執本坐弗繚右絶末以祭少牢曰取肝擩于鹽振祭玄謂振祭擩祭本同不食者擩則祭之將食者既擩必振乃祭絶祭繚祭亦本同禮多者繚之禮略者絶則祭之蕙田案此條祝祭鄭氏鍔曰食必有祭示不忘先宗廟之中尸祭有九大祝辨之非賔主飲食之祭而康成皆引賔主之食以言不可不辨命祭若曾子問師行無遷廟之主則何如孔子曰主命以皮幣告禰載命以行每舍奠焉貴命也是謂命祭鄭引玉藻君命使祭之禮非大祝所辨也衍者餘也尸之餘也下佐食取尸祭之餘以授上佐食上佐食以授主人主人以祭是謂衍祭鄭引曲禮主人延客之禮非大祝所辨者炮不煩改字封人云歌舞牲及毛炮之豚蓋尸取所炮之豚以祭祀是謂炮祭周亦非曲禮遍祭先鄭謂四面為坐以祭百神是謂周祭振祭擩祭二祭本同所以異者尸未食之前以葅擩于醢祭于豆間是謂擩祭蓋擩則祭之尸將食之時主人獻尸賔長以肝從尸右取肝擩于鹽振祭嚌之加于肵爼是謂振祭蓋振者先擩復振而擩祭則不振絶祭繚祭二祭亦本同所以異者繚祭以手從肺本循之至于末乃絶以祭不循其本直絶肺以祭禮多者繚之禮略者絶則祭之此所以為異共祭豈膳夫所共乎廟中則大祝授王以當祭者也髙氏愈曰九祭皆皇尸祭食之禮蓋祝左右于皇尸凡祭皆當相之故當先辨之也命祭祝命尸祭也劉氏彛曰命祭謂妥尸尸坐祝始命尸取韭醢遍擩于三豆祭于豆間也衍祭尸取黍稷祭也衍祭謂上佐食取黍稷及切肺授尸尸受而登于豆間賔尸所謂兼祭以其衍多故云衍也炮祭取所炮之豚祭也炮祭謂次賔羞羊膰尸擩鹽而祭也周祭依殽之序遍祭也周祭賔尸依殽祭之也振祭取魚臘振之而祭振祭謂凡牢幹魚臘骼肩背擩鹽振之擬祭弗奠是也擩祭取肺肝擩鹽而祭絶祭刲肺絶本而祭繚祭刲肺之大本繚之以祭繚猶曲也共祭謂凡尸所祭皆佐食共之共祭謂凡尸之食祭皆上佐食工祝共之所以尊之也然此章字義多難曉先儒所解亦多附會經傳而曲為之説耳方氏苞曰注謂衍當為延炮當作包周猶遍也義皆可通古書以音近而訛及同事而異名者甚多男巫望衍旁招以茅則衍當為延明矣小記輕者包重者特莊子周遍咸三者異名而同實其指一也則字義本同九祭尸賔並用賔客之命祭延祭見玉藻曲禮而祭祀亦有之士虞禮祝命佐食綏祭特牲饋食尸坐祝命綏祭是也二佐食次第取敦實爼實以授尸正延尸以祭耳祭祀之兼祭見特牲少牢而賔客亦有之公食大夫禮兼祭庶羞是也賔客之遍祭見曲禮而少牢十一飯所舉所祭無不遍也至振擩絶繚尸賔同具不待言矣蓋祭者尸賔而命祭延祭則贊尸賔之節會也每物専祭其常也然或物微禮殺亦有時而不祭惟尸賔之正禮有兼祭有遍祭故特揭之此四者祭之正也振擩絶繚則曲詳其儀節也自朝夕恆食而外祭祀賔客必有授祭者故以命祭始而以共祭終焉特牲士虞及少牢禮舉幹舉肩言振祭而不言擩是振原有不擩者注専以肝之既擩復振言似未盡蕙田案注疏釋九祭不専主祭祀鄭剛中則謂皆宗廟中尸祭之禮髙紫超從之是也方氏又兼賔祭言之未的又案以上尸祭之祝禮記禮運作其祝號疏作其祝號者謂造其鬼神及牲玉美號之辭祝史稱之以告鬼神周禮春官大祝辨六號二曰鬼號注號謂尊其名更為美稱也鬼號若云皇祖伯某禮記曲禮祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣注更設稱號尊神異于人也皇君也考成也言其德行之成也妣之言嫓也嫓于考也疏此更為神設尊號亦廣其義也王父祖父也皇君也考成也此言祖有君德已成之也王母曰皇祖妣者王母祖母也妣嫓也言得嫓匹于祖也父曰皇考母曰皇妣者義如上祖父母也君天下曰天子臨祭祀內事曰孝王某注唯宗廟稱孝疏內事曰孝王某者內事宗廟是事親事親宜言孝故祭廟則祝辭云孝王某某為天子名也諸侯臨祭祀內事曰孝子某侯某疏某侯某者若言齊侯衛侯下某是名郊特牲祭稱孝孫孝子以其義稱也疏熊氏云祭稱孝孫對祖為言稱孝子對禰為言以其義稱也者義宜也事祖禰宜行孝道是以義而稱孝也周官春禮大祝四曰牲號五曰齍號六曰幣號注幣號若玉曰嘉玉幣曰量幣鄭司農云牲號為犧牲皆有名號齍號為黍稷皆有名號也禮記曲禮凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮獻雉曰疏趾兔曰明視脯曰尹祭稿魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合梁曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣注號牲物者異于人用也元頭也武迹也腯亦肥也春秋傳作腯腯充貌也翰猶長也羮獻食人之餘也尹正也商猶量也脡直也萁辭也嘉善也稻菰蔬之屬也豐茂也大鹹曰鹺今河東云幣帛也然疏此一節論祭廟牲幣告神之法凡祭者謂貴賤悉牛曰一元大武者元頭也武迹也牛若肥則腳大腳大則迹䀶大故云一元大武也豕曰剛鬛者豕肥則毛鬛剛大也王云剛鬛言肥大也豚曰腯肥者腯即充滿貌也羊曰柔毛者若羊肥則毛細而柔弱故王云柔毛言肥澤也雞曰翰音者翰長也雞肥則其鳴聲長也犬曰羮獻者人將所食羮餘以與犬犬得食之肥肥可以獻祭于鬼神故曰羮獻也雉曰疏趾者趾足也雉肥則兩足開張趾相去疏也音義隱云雉之肥則足疏故王云足間疏也兔曰明視者兔肥則目開而視明也故王云目精明皆肥貌也然自牛至兔凡有八物唯有牛曰一頭而豕以下不云數者皆從其所用而言數也則並宜云若干也雞雉為膳及臘則不數也脯曰尹祭者尹正也裁截方正而用之祭一通云正謂自作之也脯自作則知肉之所用也論語沽酒市脯不食言其不正也稿魚曰商祭者稿乾也商量也祭用乾魚量度燥濕得中而用之也鮮魚曰脡祭者脡直也祭有鮮魚必須鮮者煮熟則脡直若餒則敗碎不直水曰清滌者古祭用水當酒謂之玄酒也而云清滌言其甚清皎潔也樂記云尚玄酒是也酒曰清酌者酌斟酌也言此酒甚清徹可斟酌當為三酒未必為五齊黍曰薌合者夫榖秫者曰黍秫既軟而相合氣息又香故曰薌合也粱曰薌萁者粱謂白粱黃粱也萁語助也稷曰明粢者稷粟也明白也言此祭祀明白粢也鄭注甸師云粢稷也爾雅云粢稷也注今江東人呼粟為粢此等諸號若一祭並有則舉其大者牲牢酒齊而言不應諸事皆道故少牢禮稱敢用柔毛剛鬛嘉薦普淖是也或唯有犬雞或魚兔及水酒韭鹽之祭則各舉其善號故此經備載其名必知然者案士虞禮祝辭云尹祭鄭注云尹祭脯也大夫士祭無云脯者今不言牲號而云尹祭亦記者誤矣如鄭此言明單用脯者稱尹祭以此推之餘亦可知也春秋桓公六年左氏傳故奉牲以告曰博碩肥腯奉盛以告曰潔粢豐盛奉酒醴以告曰嘉栗旨酒注嘉善也栗謹敬也謹疏嘉善釋詁文也杜訓栗為敬言善敬為酒蕙田案以上祝號周禮春官大祝辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒拜九曰肅拜以享右祭祀注稽首拜頭至地也頓首拜頭叩地空首拜頭至手所謂拜手也吉拜拜而后稽顙凶拜稽顙而后拜杜子春云振讀為振鐸之振動讀為哀慟之慟竒讀為竒偶之奇謂先屈一膝今雅拜是也或云竒讀為倚倚拜謂持節持戟拜身倚之以拜鄭大夫云動讀為董書亦或為董振董以兩手相擊也竒拜謂一拜也褒讀為報報拜再拜是也鄭司農云褒拜今時持節拜是也肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者玄謂振動戰栗變動之拜書曰王動色變一拜答臣下拜再拜拜神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜種疏此九拜之中四種是正拜五者逐事生名還依四正拜而為之也一曰稽首二曰頓首三曰空首此三者相因而為之空首者先以兩手拱至地乃頭至手是為空首也以其頭不至地故名空首頓首者為空首之時引頭至地首頓地即舉故名頓首一曰稽首其稽稽留之字頭至地多時則為稽首也此三者正拜也稽首拜中最重臣拜君之拜二曰頓首者平敵自相拜之拜三曰空首拜者君答臣下拜知義然者案哀十七年公會齊侯盟于蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首公如晉孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首郊特牲曰大夫之臣不稽首非尊家臣以避君也如是相禮諸侯于天子臣于君稽首禮之正然諸相于大夫之臣及凡自敵者皆當從頓首之拜也如是差之君拜臣下當從空首拜其有敬事亦稽首故大誓云周公曰都懋哉豫聞古先哲王之格言以下太子發拜手稽首是其君于臣稽首事洛誥云周公拜手稽首朕復子明辟成王拜手稽首不敢不敬天之休者此即兩相尊敬故皆稽首九曰肅拜者拜曰最輕惟軍中有此肅拜婦人亦以肅拜為正其餘五者附此四種正拜者四曰振動附稽首五曰吉拜附頓首六曰凶拜亦附稽首七曰竒拜附空首八曰褒拜亦附稽首以享侑祭祀者享獻也謂朝踐獻尸時拜侑侑食侑勸尸食時而拜此九拜不専為祭祀而以祭祀結之者祭祀事重故舉以言之黃氏度曰九􅉔専施於祭祀餘禮亦有拜不備九拜故太祝辨九拜以享右祭祀拜致敬也敬莫著于祭九拜各有所施施不失節而後禮可觀為能事鬼神太祝辨九拜教敬也鄭氏鍔曰稽之為言久也拜頭至地其留甚久此拜之最重者也頓之為言暫也頭雖叩地頓而便起不久留焉此稍重者也空首頭略至手其中空闊頭手不相密邇其禮輕矣臣之於君則稽首頓首自敵已以下用之秦嬴頓首於宣子之前是也空首君用於臣也振動者或云以兩手相擊振動其身今緩人之拜如此有所肅敬變動悚栗而下拜也吉拜則自凶向吉所謂拜而後稽顙凶拜則純乎凶所謂稽顙而後拜陽數竒隂數耦則竒者一拜褒拜則既拜矣又報一拜所謂再拜推手曰揖引手曰肅肅者不下拜俯下其手而復引之見其肅敬之至此軍禮所常用故曰介胄之士不拜郤至於戰三肅楚使而退是也王於廟中亦有時而當肅鄭康成云肅拜今之撎是也陳氏禮書禮曰拜服也稽首服之甚也拜稽顙哀戚之至隱也稽顙隱之甚也荀卿曰平衡曰拜下衡曰稽首至地曰稽顙許慎曰頓下首也然則書稱拜手稽首則拜手手拜也稽首首至地也荀卿所謂下衡曰稽首是也稽顙則首至地矣荀卿所謂至地曰稽顙是也大祝言禮之重者則先稽首而繼之以頓首空首振動言禮之輕者則先竒拜而繼之以褒拜肅拜則頓首空首振動重禮之漸殺者也褒拜肅拜輕禮之尤殺者也然則稽首拜手而稽留焉頓首則首頓於手而已空首不至于手空其首而已竒拜一拜也儀禮鄉飲鄉射聘禮士相見凡禮之殺者皆一拜是也肅拜俯其手而肅之也婦人與介者之拜也少儀曰婦人雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜然則所謂手拜者手至地也士婚禮婦拜扱地是也褒拜介于一拜肅拜之間則禮固殺矣其詳不可考也記曰大夫之臣不稽首避君也孟武伯曰非天子寡君無所稽首知武子曰天子在君稽首寡君懼矣是稽首者諸侯于天子大夫士于其君之禮也然君于臣有所稽首書稱太甲稽首於伊尹成王稽首于周公是也大夫于非其君亦有所稽首儀禮公勞賔賔再拜稽首勞介介再拜稽首是也蓋君子行禮于其所敬者無所不用其至則君稽首於其臣者尊德也大夫士稽首于非其君者尊主人也春秋之時晉穆嬴抱太子頓首於趙宣子魯季平子頓首于叔孫則頓首非施于尊者之禮也鄭氏謂稽首頭至地頓首頭叩地空首頭至手褒讀為報再拜也又引書曰王動色變為振動之拜此不可考又曰三年之喪稽顙而後拜所謂喪拜也期以下之喪拜而後稽顙所謂吉拜也蓋拜則致敬于人稽顙則致哀于已拜而後稽顙頽乎其順也以其先致敬故也稽顙而後拜頎乎其至也考工記輈欲頎典鄭司農曰頎讀為懇蓋古字頎懇通用以其先致哀故也孔子之時禮廢滋久天下不知後稽顙之為重而或以輕為重是猶不知拜下之為禮拜上之為泰而或以泰為禮故孔子救拜之弊則曰吾從其至者救泰之弊則曰吾從下凡欲禮之明于天下而已喪之稽顙猶稽首也禮非至尊不稽首則喪非至重不稽顙矣然有非至重而稽顙者非以其至親則以弔者之尊也故為妻稽顙以至親也大夫弔之雖緦必稽首以弔者之尊也婦人移天於夫而傳重于長子故雖父母不稽顙所稽顙者為夫與長子而已以所受于此者重所報于彼者殺也然士喪禮于三年之喪拜稽顙喪大記雜記皆言拜稽顙此謂拜必稽顙非拜而後稽顙也晉獻公之喪秦穆公弔公子重耳重耳稽顙而不拜穆公曰稽顙而不拜未為後也故不成拜國語曰重耳拜而不稽顙誤矣顧氏炎武日知録古人席地而坐引身而起則為長跪首至手則為拜手手至地則為拜首至地則為稽首此禮之等也君父之尊必用稽首拜而後稽首此禮之漸也必以稽首終此禮之成也今大明會典曰後一拜叩頭成禮此古之遺意也古人以稽首為敬之至周禮太祝辨九􅉔一曰稽首注稽首拜中最重臣拜君之禮禮記郊特牲大夫之臣不稽首非尊家臣以避君也左傳僖公二十三年秦伯享晉公子重耳公賦六月公子降拜稽首公降一級而辭焉襄公三年盟于長樗公稽首知武子曰天子在而君辱稽首寡君懼矣二十四年鄭伯如晉鄭伯稽首宣子辭子西相曰以鄭國之介恃大國而凌虐于敝邑寡君是以請罪焉敢不稽首哀公十七年盟於蒙齊侯稽首公拜齊人怒孟武伯曰非天子寡君無所稽首國語襄王使召公過及內史過賜晉惠公命晉侯執玉卑拜不稽首內史過歸以告王曰執玉卑替其贄也拜不稽首誣其上也替贄無鎮誣王無民可以見稽首之為重也自敵者皆從頓首李陵報蘇武書稱頓首荀子言平衡曰拜下衡曰稽首至地曰稽顙似未然古惟喪禮始用稽顙蓋以頭觸地其與稽首乃有容無容之别今表文皆云稽首頓首蔡雍獨斷漢承秦法羣臣上書皆言昧死言王莽盜位慕古法去昧死曰稽首光武因而不改朝臣曰稽首頓首非朝臣曰稽首再拜百拜字出樂記古人之拜如今之鞠躬故通計一席之間賔主交拜近至於百注云一獻士飲酒之禮百拜以喻多是也徐伯魯曰案鄉飲酒禮無百拜此特甚言之耳若平禮止是一拜再拜即人臣于君亦止再拜孟子以君命將之再拜稽首而受是也禮至末世而繁自唐以下即有四拜大明會典四拜者百官見東宫親王之禮見其父母亦行四拜禮其餘官長及親戚朋友相見止用兩拜禮是四拜惟于父母得行之今人書狀動稱百拜何也古人未有四拜之禮李涪刋誤曰夫郊天祭地止于再拜其禮至重尚不可加今代婦謁姑章其拜必四詳其所自初則再拜次則跪獻衣服文史承其筐篚則跪而受之常於此際授受多誤故四拜相屬耳戰國策蘇秦路過雒陽嫂蛇行匍伏四拜自跪而謝此四拜之始蓋因謝罪而加拜非禮之常也黃庭經十讀四拜朝太上亦是加拜今人上父母書用百拜亦為無理若以古人之拜乎則古人必稽首然後為敬而百拜僅賔主一日之禮非所施於父母若以今人之拜乎則天子止于五拜而又安得百也此二者過猶不及明知其不然而書之此以偽事其親也洪武三年上諭中書省臣曰今人書劄多稱頓首再拜百拜皆非實理其定為儀式令人遵守于是禮部定議凡致書于尊者稱端肅奉書答則稱端肅奉復敵已者稱奉書奉復上之與下稱書寄書答卑幼與尊長則曰家書敬復尊長與卑幼則曰書付某人九頓首出春秋傳然申包胥元是三頓首未嘗九也杜注無衣三章章三頓首每頓首必三此亡國之餘情至迫切而變其平日之禮者也七日夜哭於鄰國之庭古人有此禮乎七日哭也九頓首也皆亡國之禮也不可通用也韓之戰秦獲晉侯晉大夫三拜稽首古但有再拜稽首無三拜也申包胥之九頓首晉大夫之三拜也楚語椒舉遇蔡聲子降三拜納其乘馬亦亡人之禮也方氏苞曰振動則未嘗拜也而序列稽首頓首空首之下何也竒吉凶乃前三拜之細目肅拜不過下手以為恭而已振動則顔色變作手足辟易身體戰栗非尊者有過越之施無所用之其禮最重如聘禮賔入門公再拜賔辟賔致命公當楣再拜賔三退負序避與三退時必振動以示不敢答拜而震懾不寧更甚于答拜故列于五拜之前也注未指所施用王氏應電謂應受其拜而不答者不可通蕙田案拜之所用甚多而尤莫重于祭祀此經所以言右享祭祀也九拜稽首頓首稽重于頓有久暫之别二者拜之正也空首振動空首則頭不至地振動則幾不成拜一則以尊臨卑而意舒一則以卑承尊而神栗也二者拜之變也吉拜凶拜則稽首之差異也竒拜褒拜則頓首之多寡也肅拜則但以手肅之而已注疏説不如禮書為詳方氏解振動句有味顧氏所據皆是特其言拜甚廣不専指祭祀今附存之以著拜禮之備又案以上祝拜周禮春官大祝肆享則執明水火而號祝注如以六號祝明此圭潔也肆享祭宗廟也隋釁逆牲逆尸令鐘鼓右亦如之注隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右讀亦當為侑來瞽令臯舞注臯讀為卒呼嘷之嘷來嘷者謂皆呼之入相尸禮注延其出入詔其坐作之疏凡言相尸者諸事皆相故以出入坐作解尸出入者謂祭初延之入二灌訖退出坐于堂上南面朝踐饋獻訖又延之入室言詔其坐作者郊特牲云詔祝于室坐尸于堂饋獻訖又入室坐言作者凡坐皆有作及與主人答拜皆有坐作之事故云詔其坐作也既祭令徹疏祭訖尸謖之後大祝命徹祭器即詩云諸宰君婦廢徹不遲是也蕙田案以上正祭之祝大師造于祖則前祝注鄭司農云前祝大祝自前祝也玄謂前祝者王出也歸也將有事于此神大祝居前先以祝辭告之大會同造于廟疏大會同者王與諸侯時見曰會殷見曰同或在畿內或在畿外亦告廟而行云造者以其非時而祭造次之事即上文造于祖一也蕙田案以上有事造廟之祝小祝大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠注隋尸之祭也奠奠爵也祭祀奠先徹後反言之者明所佐大祝非一凡事佐大祝注唯大祝所有事蕙田案以上小祝禮記郊特牲詔祝于室直祭祝于主索祭祝于祊注朝事延尸于户西南面布主席東面取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神于室直正也祭以孰為正則血腥之屬盡敬心耳索求神也廟門曰祊謂之祊者以于繹祭名也祭統詔祝于室而出于祊此交神明之道也注詔祝告事于尸也出于祊謂索祭也請疏詔祝于室者詔告也祝祝也謂祝官以言詔告祝其尸于室求之而出于祊者謂明日繹祭而出廟門旁廣求神于門外之祊此交神明之道也者神明難測不可一處求之或門旁不敢定是求神明交接之道鬼神通故云道詩小雅楚茨祝祭于祊傳祊門內也祝箋孝子不知神之所在故使博求之平生門內之旁待賔客之處蕙田案以上祝主祝祊工祝致告徂賚孝孫傳善其事曰工而箋祝致神意告主人使受嘏既以嘏之物往豫主人工祝致告神具醉止傳致告告利成也利箋于是致孝孫之意告尸以成具皆也禮記禮運祝嘏莫敢易其常古是謂大假疏言天子諸侯所祭之時祝以主人之辭而告神神以嘏福而與主人二者皆依舊禮無敢易其常事古法是謂大假假大也宣祝嘏辭祝疏宣揚也祝嘏有舊辭更宣揚告神也蕙田案以上祝嘏易巽卦九二用史巫紛若吉禮記禮運王前巫而後史周禮春官司巫掌羣巫之政令祭祝則共匰主及道布及蒩館注杜子春云匰器名主謂木主也道布新布三尺也館神所館止也或曰布者以為席也玄謂道布者為神所設巾中霤禮曰以功布為道布屬于几也蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也主先匰蒩後館互言之者明共主以匰共蒩以筐大祝取其主蒩陳之器則退也士虞禮曰蒩刌茅長五寸實于筐饌于西坫上又曰祝盥升取苴降洗之升入設于几東席上東縮疏子春所解及讀字唯解匰器名一事後鄭從之自餘並義無所取後鄭不從玄謂道布者為神所設巾即引中霤禮以功布為道布屬于几是也云蒩之言藉者祭食有當藉者謂常藉所當之食云館所以承蒩謂若今筐也者筐所以盛蒩也云主先匰蒩後館互言之者謂主先匰器在上者欲見以匰器盛主來向祭所大祝取得主匰器即退蒩後言館器欲見大祝取得蒩館器退明亦初以館盛蒩來互言之是以鄭云明共主以匰共蒩以筐大祝取其主蒩陳之器則退也二事雙解之引士虞禮曰苴刌茅長五寸實于筐饌于西坫上者刌切也切之長五寸又陳之西坫者堂西南隅謂之坫饌陳于此未用前又曰祝盥升取苴降洗之升入設于几東席上東縮者士虞禮設席于奧禮神東面右几故設于几東席上東縮縮縱也據神東面為正東西設之故言東縮引之者見苴是藉祭之物鄭氏鍔曰主在廟則藏于石室謂之宗祏及合祭于廟則以匰盛而至祭所祝取主而匰退蔡氏德晉曰匰盛主之器道布郝仲輿謂冪主之巾主在道用以掩覆防褻也葅茅屬尸祭黍稷而以之為藉館則所以盛蒩者筐屬也國語楚語在男曰覡在女曰巫注巫覡見鬼者周禮男亦曰巫是使制神之處位次主注處居也位祭位也次主次其尊卑先後也而為之牲器時服注牲之毛色小大也器所當用也時服四時服色所宜也而後使先聖之後之有光烈注烈明也而能知山川之號注號名位也髙祖之主注髙祖廟之先也宗廟之事昭穆之世注父昭子穆先後之次也春秋躋僖公謂之逆祀齊敬之勤注齊莊也禮節之宜威儀之則容貌之崇注崇飾也忠信之質注質誠也禋潔之服注潔祀曰禋而敬恭明神者以為之祝注祝大祝也掌祈福祥使名姓之後能知四時之生注名姓謂舊族若伯夷炎帝之後為堯秩宗生嘉榖韭卵之屬犧牲之物玉帛之類采服之儀彛器之量注彛六彛器爼豆量大小也次主之度疏數之度屏攝之位注周氏云屏者并攝主人之位昭謂屏屏風也攝形如今要扇皆所以分别尊卑為祭祀之位近漢亦然壇場之所注除地曰場上下之神氏姓之出注所自出也而心率舊典者為之宗注宗宗伯也掌祭祀之禮荀子天子出戶而巫覡有事出門而宗祝有事蕙田案以上廟巫又案先王事神如事人人必得介紹以傳命而後賔主之情通鬼神亦然故先王立大小祝之官使之辨其名號潔其牲幣恭其拜跪善其詞祝以順道鬼神之欲惡而宣逹祭者之悃忱則神無怨恫而幽明之際渙然融洽足以召福祥而弭災變矣孔子曰祝鮀治宗廟蓋重之也右祝五禮通考卷六十二
