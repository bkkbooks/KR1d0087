關巡關御史張欽閉關上疏不聽遂逺出關外楊廷和等纍疏請回鑾九月上幸大同獵陽和明史世宗本紀嘉靖十八年二月乙卯幸承天辛酉次真定望于北嶽丁卯次衛輝三月己巳渡河祭大河之神辛未次鈞州望于中嶽庚辰至承天戊子御龍虎殿受賀詔赦天下給復承天二年免湖廣明年田賦五之二畿內河南三之一夏四月壬子至自承天甲子幸大峪山丙寅還宫明會典嘉靖十八年南巡儀注一先期上親奏告皇天于元極寶殿同日告聞皇祖太廟皇考睿宗廟遣官分告北郊成祖列聖羣廟大社稷帝社稷朝日夕月天神地祗用祭服太常寺備脯醢酒果翰林院撰告文一軷祭於起承天門遣官祭旗纛之神用牲醴制帛三獻如常儀一駕發出正陽中門后妃輦轎後隨錦衣衛設欽製武陳駕備輦輿儀仗等項扈行本衛選精壯旗校八千人內以六千人専管擡奉上座輿輦二千人専管擺執駕儀及一應正直巡綽傳宣等用選委千百户一百二十員分投管理各分撥班接替行太僕寺調取寄養馬三千匹兌給各旗校更迭騎坐以錦衣衛指揮充前驅使領千百户等官先往肅清道路簡命武職重臣二員留守京城兵部尚書一員參贊機務各請敕行事以文職大臣一員總督整飭宣大等處軍務一員提督薊州山海關等處地方邉備文職重臣一員充行邉使往遼東薊宣大雁門固原等九邊閲視兵備户部齎銀隨去勞賞官軍各請敕行事兵部奏請皇城四門京城九門大明門外兩邊守門文武大臣各一員坐邉官侯伯二員增設守門官軍用科道官點閘京城內外巡捕官軍行團營再選有馬官軍三千員名分為兩班酌𣲖五城地方與同舊有官軍巡邉仍選委坐營官及各提督把總等官晝夜巡捕安定德勝門各土城門外及鄭村壩大黃莊居庸關白羊口六處地方該營揀選有馬官軍每處一千員名分為兩班輪流下營防守安定德勝門土城各用東西官廳正總兵官一員其餘各用參將一員統領下營紫荆倒馬二關保定撫鎮官揀選精鋭有馬官軍每關一千員名分為兩班每月輪流下營把守各委坐營官一員統領一兵部於團營東西官廳御馬監勇士內揀扈駕官軍六千員名給兊馬匹內執武陳駕儀一千人總兵官一員領之駕前後各二千人參將二員領之駕左右各五百人翼駕行左右副參將領之及行文沿途撫鎮等官調撥兵馬屯駐扈駕先期户部請敕命侍郎一員率屬官六員帶領太倉銀三十餘萬兩前去沿途整理官軍糧料工部請敕差郎中一員同內官監督理沿途橋道及行宫席殿禮部行南北直𨽻浙江等十三布政司凡有要緊重事俱達行在所奏聞其餘事務俱達在京通政使司照常封進各該衙門啓請皇太子令旨行其事有疑礙者各差人赴行在所奏取旨各處拜進表箋除嵗例等項赴在京禮部照常類收啓請司禮監官捧進其特賀大禮不係常典者原差人恭詣行在投進一扈從官五府堂上官各一員首領官各一員吏各一人吏部堂上官一員文選等四司官各一員辦事官六員吏六人户部堂上官二員浙江等十三司官各一員辦事官二員吏十三人禮部堂上官二員儀制等四司官共六員鑄印局官一員辦事官六員儒士三人吏十二人鑄印匠四人兵部堂上官一員武選等四司官共六員辦事官一員吏六人刑部堂上官一員浙江等十三司官各一員辦事官一員吏十三人工部堂上官二員營繕等四司官共十員辦事官二員吏十人都察院堂上官二員浙江等十三道監察御史各二員辦事官四員吏十三人通政司堂上官二員首領官一員辦事官二員吏二人大理寺堂上官一員左右寺官二員辦事官二員吏二人太常寺堂上官六員首領官二員屬官十員吏一人執事人役四十人厨役三十人光祿寺堂上官二員四署官四員吏四人厨役二百人太僕寺堂上官一員首領官一員吏一人鴻臚寺堂上官俱從司儀司賔各一員鳴贊四員序班十六員通事四員翰林院堂上并講讀等官四員制敕誥敕二房官共二十員譯字官生四人吏十人尚寶司官四員吏一人六科給事十二員吏六人中書舍人一員吏一人行人司行人十員吏三人太醫院堂上官五員御醫吏目八員聖濟殿醫士選帶三分之一吏二人欽天監堂上官一員博士等官八員天文生隂陽人共十人吏一人教坊司奉鑾韶舞司樂八員俳色長樂工二百人扈從文武內外官及各項人役合用夫馬驢騾車輛廪給口糧各項應付事宜兵部定擬奏請轉行在外有司一體應付內府印綬監收貯先年行在衙門印信關防禮部領出給付各扈從官使用尚寶司給領文武字樣牙牌一駕發留守大臣率在京文武衙門官員各俱吉服先期赴宣武門外彰義關候送駕過退扈從官分程先發在途免朝參候駕惟禮兵二部鴻臚寺太常寺科道糾儀官從行光祿寺隨路預辦御膳酒飯供具凡遇行宫進膳處所各該撫按守巡兵備等官選委精壯官軍披帶盔甲器械拱衛乘輿不許喧譁錯亂違者聽錦衣衛即時具奏拿問其扈駕官軍户部給散行糧工部辦鍋竈不許分外索害有司及入民人舍混擾違者許被害等人赴撫按衙門告治仍行隨駕緝事官校訪拿重治各該軍衛有司不許分外科斂違者聽撫按官體訪指實參究重治各衙門跟隨吏書人等各照兵部原行關文於軍衛有司驛遞衙門應付不許分外多索其應付衙門亦要即時應付毋得遲誤違者俱赴所在官司告治經過駐劄地方原有商賈店鋪開賣飯食等物照常市貿不許躲避亦不許從駕人員用強輕價勒買違者許被害人即時告治兵部咨行各該巡撫官預先出給榜文曉諭一經過處所真定望祭北嶽恆山之神用牛犢羊豕上具常服行禮如常儀五府九卿巡撫大臣吉服陪拜衛輝遣官祭濟瀆之神用太牢鈞州望祭中嶽嵩山之神滎澤祭河神俱用太牢行禮如北嶽南陽遣官祭武當山之神用牲犢沿途古帝王聖賢忠臣烈士祠墓禮部查訪預期奏聞遣官致祭帝王用太牢次用少牢又次脯醢酒果凡祭翰林院撰祭文一各處撫按并三司官俱於所屬境上候駕先赴行在鴻臚報名駕至行宫各具吉服朝見所過府衛州縣官吏生員耆老人等俱於三十里外候迎道旁跪叩頭駕過退駕至行宫鴻臚寺引見俱行五拜三叩頭禮一各處近路王府許親王具常服預先出城候駕其餘宗室俱不許擅離府出近一親王迎接先期命文武大臣侍於途王於道傍拱立文武大臣下馬侍上左右禮部尚書跪奏某王某恭迎聖駕見內侍官引王至駕前跪行叩頭禮禮部尚書進立於上前候旨承旨訖起立傳旨示王隨至行宫上入少憩王具冕服欽定文武大臣於殿內左右侍從官於丹墀東西侍班候上升座鴻臚寺官引王由殿左門入至拜位贊行五拜三叩頭禮畢上命賜宴內侍官引王於别次少候從官叩頭如常儀王宴畢遣大臣伴送回府駕還先以書止諸王勿煩出送一上臨舊宫恭詣皇考睿宗獻皇帝謁告儀具祠祭司越四日行祭告皇天禮於龍飛殿丹陛奉皇考睿宗獻皇帝配是日上更皮辨服詣國社壇及山川壇行告祭禮次日恭謁顯陵儀見祠祭司次日從駕官上表賀遂頒詔前期一日鴻臚寺陳設表案詔案於龍飛殿中錦衣衛設隨駕朝儀及迎詔綵輿香亭於丹墀教坊司設中和韶樂百官各具朝服地方官吏師生耆老人等俱隨班行禮是日早鳴鐘鼓上具冕服御後殿執事官行禮畢上升殿鳴鞭欽天監官唱時鴻臚寺贊入班贊四拜興平身唱宣表宣表官宣訖贊俯伏興四拜興贊頒詔翰林院官捧詔授禮書禮書捧詔置雲盤內叩頭興由殿中門出置綵輿內錦衣衛官校舉輿教坊鼓樂前導百官趨出候於龍飛門外鴻臚寺贊入班行四拜禮贊跪宣讀詔畢贊俯伏興搢笏贊舞蹈山呼出笏贊四拜興平身禮畢禮部尚書捧詔出謄黃奏差行人等官頒行天下一聖駕回京上親奏謝皇天上帝於元極寶殿同日告謝皇祖太廟皇考睿宗廟如常儀文武官吏該陪祀者俱具祭服陪拜遣官分告北郊成祖列聖羣廟大社稷帝社稷朝日夕月天神地祗太嵗旗纛都城隍等神承天門之神俱行禮如初一百官上表稱賀如常儀石明五禮通考卷一百八十
