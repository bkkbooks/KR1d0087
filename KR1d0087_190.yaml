body:
  text: 五禮通考卷一百八十刑部尚書秦蕙田撰嘉禮五十三巡狩宋史禮志巡幸之制唐開元禮有告至肆覲考制度之儀開寶通禮因之太祖幸西京所過賜夏秋田租之半真宗朝諸陵乃舉大禮途中皆服折上巾窄袍出京過京城服韡袍具鑾駕羣臣公服繫鞋供奉班及內朝官前導凡從官並日赴行宫合班起居晚朝視事羣臣不赴中頓侍食百官就宿頓迎駕訖先發或道途隘逺則免迎駕將進發近臣諸軍賜裝錢出京留司馬步諸軍夾道左至新城門外奉辭留守辭于門內百官父老辭于苑前召留守等賜飲苑中州縣長吏留司官待于境所過賜巡警兵守津梁行郵治道卒賜服錢屬父老綾袍茶帛途中賜衛士緡錢所幸寺觀賜道釋茶帛或加紫衣師號吏民有以饔餼酒果方物獻者計值答之命官籍所過繫囚逋負者日引對多原釋仍採訪民間疾苦賑恤鰥寡孤獨車服度量權衡有不如法則舉儀制禁之有竒材異德及政事尤異者孝子順孫義夫節婦為鄉里所稱者其不守亷隅昧于正理者並條析以聞官吏知民間疾苦者亦許録奏所過州府結綵為樓陳音樂百戲道釋以威儀奉迎者悉有賜東京留守遣官表請還京優詔答之駕還京大陳兵衛以入凡行幸太祖太宗不常具數自咸平中車駕每出金吾將軍率士二百人執撾周繞謂之禁圍春夏緋衣秋冬紫衣郊祀省方並增二百服錦襖出京師則加執劍親王中書樞密宣徽行圍內餘官圍外大禮備儀衛則有司先布土為黃道自宫至祀所左右設香臺畫甕青繩闌干巡省在途則不設凡巡省翰林進號傳詩付樞密院每夕摘字令衛士相應為識東京舊城城門西京皇城司並契勘內外城宫廟門並勘箭出入皆然入藩鎮外城子城門亦勘箭朝門定扈從官人數入柏城者僕射以上三人丞郎以上六人餘各一人東封定仗內導駕官從人數親王中書樞密宣徽三司使四人學士尚書丞郎節度使三人大兩省大卿監三司副使樞密承旨客省閣門使副金吾大將軍押仗鳴珂內殿崇班以上二人餘各一人命諸司巡察之自後舉大禮皆循此制太祖本紀建隆元年夏六月上如潞辛卯大赦減死罪免附潞三十里今年租録陳殁將校子孫丁夫給復三年開寶九年春三月丙子幸西京己卯次鞏縣庚辰賜河南府民今年田租之半辛巳至洛陽辛卯幸廣化寺開無畏三藏塔夏四月丙午駕還辛亥上至自洛文獻通考太宗太平興國二年平太原五年次大名皆如太祖勞軍之制真宗咸平二年幸大名景德元年駐澶淵勞軍之禮如祖宗四年正月幸西京朝諸侯命知雜御史王濟等籍所過父老及繫囚逋負官物人仍察民間疾苦每日引逋欠人及禁囚等對於行在多蠲免原釋父老賜茶帛綾袍其貢香藥名馬者召對撫慰賜之金帛大中祥符元年三月詔許羣臣請封禪令泰山路葺行宫不得侵民户田苖及人馬損踐苖稼有司言凖禮巡狩有燔柴告至皇帝親行事即不載有司攝事之文車駕至泰山合行告至望令大尉以酒脯幣帛於泰山下壇告至奏可又詔給事中張秉等管勾所經州縣父老詣行在者送門引對賜以酒食州縣見禁囚具所犯以聞又詔以御史中丞王嗣宗攝御史大夫為考制度使左正言制誥周起攝中丞為副使所經州縣採訪民間不便事併市物之價車服權衡度量不如法則者舉儀制禁之有竒才異行隱淪不仕者與所屬長史詢求論薦鰥寡惸獨不能自存者重加賑恤官吏政迹尤異民受其惠及不守亷隅昧於政理者孝子順孫義夫節婦為鄉里所稱者並條析以聞官吏知民間利病者亦為録奏有司言澶州城門卑下不容大輦請徹門而出上慮煩勞不許詔由城外而過他所皆然又詔扈從人宿頓所無得壞民舍什物樹木違者重置其罪為朝覲壇於奉髙宫之南方九丈六尺髙九尺四出陛其南兩陛設衛仗宫懸於壇中書門下文武百官皇親諸軍將校四方朝貢使舉人蕃客父老僧道皆在列設襲文宣公位於文官三品之下鄰州長史悉集上服衮御夀昌幄殿受朝賀大赦天下遂幸兖州賜從官待制以上宗室將軍辟寒丸紫花茸綿細窄袍三畢祀汾隂悉如東封之制八月有司言祠宇之旁難行覲禮望俟至河中府朝覲經度制置使陳堯叟等言寶鼎行宫之前可以設壇詔如堯叟等語宋史真宗本紀大中祥符四年春正月丁酉發京師甲辰至慈澗頓賜道傍耕民茶荈二月戊申賜扈駕諸軍緡錢壬子出潼關渡渭河癸丑次河中府丁巳次寶鼎縣辛酉幸開元寺作大寧宫大赦天下文武官並進秩四品以上逮事太祖太宗潛藩或嘗更邊任家無食祿者録其子孫建寶鼎縣為慶成軍給西京分司官實奉三分之一令法官慎刑名有情法重者以聞賜天下酺三日大宴羣臣於穆清殿賜父老酒衣幣乙丑觀酺乙巳次華州幸雲臺觀庚午宴宜澤亭召見隱士鄭隱李寧賜茶果束帛辛未次閿鄉縣召見道士柴又元問以無為之要壬申宴虢州父老於湖城行宫三月甲戌次陜州召草澤魏野辭疾不至乙亥賜運船卒時服己卯次西京庚辰罷河北緣邊工役壬午幸上清宫甲申幸崇法院丁亥詔葺所經歷代帝王祠廟己丑御五鳯樓觀酺壬辰詔朝陵自西京至鞏縣不舉樂癸巳禁扈從人踐田稼甲午發西京夏四月甲辰朔上至自汾隂髙宗本紀建炎元年秋七月乙巳手詔京師未可往當巡幸東南丙午詔定儀巡幸南陽九月壬辰以金人犯河陽泛水軍詔擇日巡幸淮甸丁酉詔荆襄關陜江淮皆備巡幸冬十月丁巳朔帝登舟幸淮甸庚午次泗州幸普照寺乙卯次楚州寶應縣三年春正月庚辰朔帝在揚州二月壬子內侍鄺詢報金兵至帝被甲馳幸鎮江府是日金兵過揚子橋癸丑遊騎至瓜州王淵請幸杭州是夕發鎮江次吕城鎮甲寅次常州丙辰次平江府己未次秀州壬戌駐蹕杭州夏四月丁卯帝發杭州五月戊寅朔帝次常州辛巳次鎮江府乙酉至江寧府駐蹕神霄宫改府名建康六月甲戌移御行宫閏八月壬寅帝發建康復還浙張俊辛企宗以其軍從甲辰次鎮江府賜陳東家金冬十月癸未帝至杭州復如浙東庚寅渡浙江壬辰帝至越州十一月丁卯下詔回浙西己巳帝發越州癸酉帝如明州十二月己丑帝乘樓船次定海縣給行在諸軍雪寒錢癸巳帝次昌國縣庚子移幸溫州老學庵筆記建炎初大駕駐蹕南京揚州而東京置留守則百司庶府為二其一曰在京某司其一曰行在某司其後大駕幸建康會稽而六宫往江西則亦分為二曰行在某司行宫某司已而大駕幸建康六宫留臨安則建康為行在臨安為行宫今東京阻隔而臨安官司猶曰行在某司示不忘恢復也建炎三年春車駕倉卒南渡駐蹕於杭有侍臣召對者既對所陳劄子首曰恭維陛下嵗二月東巡狩至於錢塘吕相頤浩見之笑曰秀才家識甚好惡文獻通考紹興元年十一月詔以紹興駐蹕日久漕運艱梗兵軍薪水不便可移蹕臨安府二年正月車駕至臨安府駐蹕七年二月車駕自平江進發次鎮江三月至建康府駐蹕八年二月車駕自建康府進發至臨安府還宫三十一年車駕自臨安府進發視師次臨平鎮三十二年正月車駕次建康府二月車駕自建康府回臨安蕙田案宋自南渡以後播遷海澨但可謂之臨幸不得謂之巡狩但以一代典禮攸關姑采附焉亦春秋天王下狩河陽之意爾右宋遼史營衛志遼國盡有大漠浸包長城之境因宜為治秋冬違寒春夏避暑隨水草就畋漁嵗以為常四時各有行在之所謂之巴納春巴納曰鴨子河濼皇帝正月上旬起牙帳約六十日方至天鵝未至卓帳氷上鑿水取魚冰泮乃縱鷹鶻捕鵝雁晨出暮歸從事弋獵鴨子河濼東西二十里南北三十里在長春州東北三十五里四面皆沙堝多榆栁杏林皇帝每至侍御皆服墨緑色衣各備連鎚一柄鷹食一器刺鵝錐一枚於濼周圍相去各五七步排立皇帝冠巾衣時服繫玉束帶於上風望之有鵝之處舉旗探騎馳報逺泊鳴鼓鵝驚騰起左右圍騎皆舉幟麾之五方擎進海東青鶻拜授皇帝放之鶻擒鵝墜勢力不加排立近者舉錐刺鵝取腦以飼鶻救鶻人例賞銀絹皇帝得頭鵝薦廟羣臣各獻酒果舉樂更相酬酢致賀語皆插鵝毛於首以為樂賜從人酒遍散其毛弋獵結網釣春盡乃還夏巴納無常所多在托囉山道宗每嵗先幸黑山拜聖宗興宗陵賞金蓮乃幸子河避暑托囉山在黑山東北三百里近饅頭山黑山在慶州北十三里上有池池中有金蓮子河在托爾山東北三百里懷州西山有清涼殿亦為行幸避暑之所四月中旬起牙帳卜吉地為納涼所五月末旬六月上旬至居五旬與北南臣僚議國事暇日遊獵七月十旬乃去秋巴納曰伏虎林七月中旬自納涼處起牙帳入山射鹿及虎林在永州西北五十里常有虎據林傷害居民畜牧景宗領數騎獵焉虎伏草際戰栗不敢仰視上舍之因號伏虎林每嵗車駕至皇族而下分布濼水側伺夜將半鹿飲鹽水令獵人吹角效鹿鳴既集而射之謂之舐鹻鹿又名呼鹿冬巴納曰廣平淀在永州東南三十里本名白馬淀東西二十餘里南北十餘里地甚坦夷四望皆沙磧木多榆栁其地饒沙冬月稍暖牙帳多於此坐冬與南北大臣會議國事時出校獵兼受南宋及諸國禮貢皇帝牙帳以槍為硬寨用毛繩連繫每槍下黑氊傘一以芘衛士風雪槍外小氊帳一層每帳五人各執兵仗為禁圍南有省方殿殿北約二里曰夀寧殿皆木柱竹榱以氊為蓋彩繪韜柱錦為壁衣加緋繡額又以黃布繡龍為地幛窗槅皆以氊為之傅以黃油絹基髙尺餘兩廂廊廡亦以氊蓋無門户省方殿北有鹿皮帳帳次北有八方公用殿夀寧殿北有長春帳衛以梗寨宫用契丹兵四千人每日輪番千人祗直禁圍外卓槍為寨夜則拔槍移卓御寢帳周圍拒馬外設鋪傳鈴宿衛每嵗四時周而復始文昌雜録北國謂住坐處曰巴納四時皆然如春巴納之類是也不曉其義近者彼國中書舍人王師儒來修祭奠余充接伴使因以問師儒答云是契丹家語猶言行在也太祖本紀太祖三年春正月幸遼東太宗本紀天顯三年夏四月戊寅東巡四年夏六月己酉西巡己未選輕騎數千獵近山癸亥駐蹕涼陘秋七月庚辰觀市曲赦繫囚甲午祀太祖而東八月辛丑至自涼陘九月庚午如南京戊寅祠木葉山癸巳至南京冬十二月戊午至自南京七年冬十二月丁巳西狩駐蹕平地松林會同元年春二月戊戌幸遼河東三月壬戌將東幸三尅言農務方興請減輜重促還朝從之三年春三月己巳如南京壬申次石嶺庚寅詔扈從擾民者從軍律甲午幸薊州乙未晉及南唐各遣使來覲夏四月庚子至燕備法駕入自拱辰門御元和殿行入閣禮六月壬寅駕發燕京癸丑次奉聖州聖宗本紀統和元年秋八月戊子上西巡癸巳遂幸懷州九月辛酉幸祖州壬戌還上京三年秋七月甲寅東幸丙寅駐蹕土河以暴漲命造船橋明日乘步輦出聽政八月丁丑次藁城庚辰至顯州辛巳幸乾州觀新宫辛丑西幸閏九月丙子行次海上戊戌駐蹕通古山四年冬十一月乙卯幸南京戊午以南院大王留寧言復南院都民今年租賦十三年春正月壬子幸延芳淀庚申詔諸道觀農十五年夏四月己酉幸南京己未如炭山清暑秋九月庚午幸饒州冬十一月丙戌幸顯州十二月己酉駐蹕馳山開泰四年十二月南巡海徼還幸顯州太平五年秋九月駐蹕南京是嵗燕民以年穀豐熟車駕臨幸爭以土物來獻上禮髙年惠鰥寡賜酺飲至夕六街燈火如晝士庶嬉遊上亦微行觀之右遼金史太宗本紀天會八年七月丁卯上如東京十月乙亥上至自東京十年十月上如興中府十二月上至自興中府熙宗本紀天眷元年二月壬戌上如約羅春水乙丑幸天開殿六月戊午上至自天開殿三年四月丁卯上如燕京九月戊申上至燕京己酉親享太祖廟皇統二年二月丁卯上如天開殿三月辛丑還自天開殿四年二月癸未上如東京丙申次百泊河春水五月辛亥朔次薰風殿九月乙酉上如東京壬子畋於沙河射虎獲之十月辛酉詔薰風殿二十里內及巡幸所過五里內並復一嵗十二月甲午至東京五年二月乙未次濟州春水三月戊辰次天開殿八月戊戌發天開殿九月庚申至自東京程寀傳寀熙宗時歷翰林待制兼右諫議大夫上疏其略曰古者天子皆有巡狩無非事者或省察風俗或審理寃獄或問民疾苦宣布德澤皆巡狩之名也國家肇興誠恐郡國新民棄本逐末習舊染之汚奢侈詐偽或有不明之獄僭濫之刑或力役無時四民失業今鑾輿省方將憲古行事臣願天心洞照委之長二釐整風俗或置匭匣以申寃枉或遣使郡國問民無告皆古巡狩之事昔漢昭帝問疾苦光武求民瘼如此則和氣通天下丕平可坐而待也疏奏上嘉納之八年二月乙卯上如天開殿四月庚戌至自天開殿海陵本紀天德四年四月壬辰上自泰州如涼陘五月乙卯次臨潢府六月甲子朔駐綿山八月丙子次於都勒斡九月甲午次中京貞元元年二月庚申上自中京如燕京三月辛亥上至燕京初備法駕二年三月丙戌幸大興府正隆六年二月癸亥發中都丙寅次安肅州三月癸巳次河南府因出獵幸汝州溫湯視行宫地自中都至河南所過麥皆為空復禁扈從毋輒離次及遊賞飲酒犯者罪皆死而莫有從者四月丁卯次溫湯誡扈從毋輒過汝水上世宗本紀大定元年十一月辛巳以如中都期日詔羣臣壬午詔中都都轉運使左淵曰凡宫殿張設毋得增置毋役一夫以擾百姓但謹圍禁嚴出入而已己丑如中都次小口使中都留守宗憲先往壬辰次梁魚務丙申次義州十二月乙卯次三河縣丙辰次通州丁巳至中都壬戌詔軍士自東京扈從至京師者復三年四年正月丁酉如安州春水壬寅至安州大雪詔扈從人舍民家者人日支錢一百與其主二月丁巳免安州今年賦役及保塞縣御城邊吳二村凡扈從人常止其家者亦復一年辛酉獵於髙陽之北庚午還都六年三月甲寅上如西京庚申次歸化州西京留守唐古德溫上謁戊辰至酉京五月戊申幸華嚴寺觀故遼諸帝銅像詔主僧謹視之壬子詔雲中大同縣及警巡院給復一年壬戌詔將幸銀山諸扈從軍士賜錢五萬貫有敢損苗稼者並償之六月丙戌發自西京庚子獵於銀山七月辛酉次三叉口八月辛未朔次涼陘庚辰獵於望雲之南山九月辛丑朔至自西京七年九月庚寅次保州詔修起居注王大祈察訪所經過州縣官十月乙未朔上謂侍臣曰近聞朕所幸郡邑會宴寢堂宇後皆避之此甚無謂可宣諭仍令舊居止戊申還都八年五月乙丑上如涼陘七月己卯次三叉口上諭點檢司曰沿路禾稼甚佳其扈從人少有蹂踐則當汝罪八月乙酉至自涼陘十二年五月癸酉上如百花川甲戌命賑山東東路和掄明安民飢丁丑次阻居久旱而雨戊寅觀稼禁扈從蹂踐民田禁百官及承應人不得服純黃油衣癸未諭宰臣曰朕每次舍凡秣馬之具皆假于民間多亡失不還其主此彈壓官不職可擇人代之所過即令詢問但亡失民間什物並償其直乙酉詔給西北路人户口牛六月甲寅如金蓮川九月丙子至自金蓮川十四年五月甲午如金蓮川八月丁巳次珠勒實日中白龍見御帳東小港中須臾乘雲雷而去九月丁亥還都十八年正月壬戌如春水二月丙寅朔次管壯丙子次華港己丑還宫四月己巳上謂宰臣曰朕巡幸所至必令體訪官吏誠否向玉田知主簿舒穆嚕乃能吏也可授本縣令五月丙午上如金蓮川八月乙巳至自金蓮川二十年正月己巳如春水丙子幸石城縣行宫丁丑以玉田縣行宫之地偏林為御林大淀濼為長春淀二月丁未還都二十二年三月甲申諭户部今嵗行幸山後所須並不得取之民間雖所用人夫並以官錢和雇違者杖八十罷職四月甲子上如金蓮川九月戊寅至自金蓮川二十三年正月壬午如春水詔夾道三十里內被役之民與免今年租稅仍給傭直二月乙巳還都二十四年三月壬寅如上京四月庚申次廣寧府丙寅次東京丁卯給復東京百里內夏秋稅租一年在城隨關年七十者補一官曲赦百里內犯徒二年以下罪乙酉觀漁于混同江五月己丑至上京居于光興宫戊戌宴于皇武殿上謂宗戚曰朕思故鄉積有日矣今既至此可極歡飲君臣同之賜諸王妃主宰執百官命婦各有差宗戚皆霑醉起舞竟日乃罷六月辛酉幸安春水臨漪亭壬戌閲馬于緑野淀七月己未上謂宰臣曰天子巡狩當舉善罰惡凡士民之孝弟姻睦者舉而用之其不顧亷恥無行之人則教戒之不悛者則加懲罰丙午獵于勃海淀八月乙亥詔免上京今年市稅續文獻通考時世宗將幸上京大理司直路伯達上書諫曰人君以四海為家豈獨舊邦是思空京師而事逺遊非慎重之道也書奏不報後薛王府掾梁襄上疏極諫曰金蓮川在重山之北地積隂冷五穀不殖郡縣難建蓋自古極邊荒棄之壤也氣殊候異中夏降霜一日之間寒暑交至特與上京中都不同尤非聖躬將攝之所凡奉養之具無不逺勞飛挽越山踰險其費數倍至於頓舍之處車騎闐塞主客不分牛馬風逸以難收臧獲逋逃而莫得奪攘蹂躪未易禁止公卿百官衛士富者車帳僅容貧者穴居露處輿臺皂隸不免困踣飢不得食寒不得衣一夫致疾染及衆人夭傷無辜何異刃殺此特細故耳有大于此者臣聞髙城浚池深居邃禁帝王之藩籬也壯士健馬堅甲利兵帝王之爪牙也今行宫之所無有髙殿廣宇城池之固是廢其藩籬也挂甲常坐之馬日暴雨蝕臣知其必羸瘠矣禦侮待用之軍穴居野處冷啖寒眠臣知其必疲瘵矣衛官周廬才容數人一旦霖潦積旬衣甲弓刀霑濕柔脆豈堪為用是失其爪牙也神龍不可以失所人主不可以輕行雖陛下悅以使人勞而不怨豈若不勞為愈人君者不可恃人無異謀要在處已無憂患之地耳燕都地處雄要北倚山險南壓區夏若坐堂皇俯視庭宇本地所生人馬勇徑方遼雖小止以得燕故能控制南北坐致宋幣燕蓋京都之選首也况今又有宫闕井邑之繁麗倉廪府庫之充實百官僚屬皆處其內非曩日之陪京也居庸古北松亭榆林等關東西千里山峻相連近在都畿易於據守陛下舍此而他往倘有內隙乘之臣甚懼焉議者謂往年遼國之君春水秋山冬夏巴納舊人喜談之以為真得快樂之趣陛下效之耳臣謂三代之政今有不可行者况遼之過舉哉且遼之基業根本在山北之臨潢其所遊不過臨潢之旁儀物殊簡輜重不多隔三五嵗方一行非嵗嵗如此也本朝皇業根本在山南之燕豈可舍燕而之山北乎上京之人棟宇是居不便遷徙方今幅員萬里惟奉一君承平日久制度殊異文物增廣輜重浩穰隨駕生聚殆逾百萬如何嵗嵗而行以一身之樂嵗使百萬之人困于役傷于財陛下其忍之歟世宗納之遂為罷行章宗本紀明昌五年四月乙卯幸景明宫五月庚午次烏蘇薩巴六月壬辰如冰井己亥出獵登呼圗哩巴山酹酒再拜曹王永升以下進酒丙午曲赦西北路己未如香沙秋山七月戊辰獵于和齊寬一發貫雙鹿是日獲鹿二百二十二賜扈從官有差辛巳次羅衮呼實布是日上親射獲黃羊四百七十一乙酉次冰井丙戌以天夀節宴樞光殿凡從官及承應人遇覃恩遷秩者並受宣敕于殿前八月辛亥至自景明宫六年正月壬辰如春水二月庚午至自春水九月辛卯如秋山十月丙辰至自秋山丁巳以嵗幸春水秋山五日一進起居表自今可十日一進承安五年正月丙申如春水辛丑諭檢點司車駕所至仍令百姓市易二月辛未至自春水泰和二年五月壬戌諭有司曰金井巴納不過二三日留朕之所止一涼厦足矣若加修治徒費人力其藩籬不急之處用圍幕可也己巳敕御史臺京師拜廟及巡幸所過州縣止令灑掃不許以黃土覆道違者糾之五年正月丁卯如光春宫春水乙亥詔有司自泰和三年郡縣三經行幸民嘗供億者賜今年租稅之半丁丑次霸州二月己亥如建春宫三月庚申還宫宣宗本紀貞祐二年四月乙卯尚書省奏巡幸南京詔從之壬午車駕發中都丙戌次定興禁有司扈從蹂踐民田丁亥次安肅州癸巳次中山府敕扈從軍所踐禾稼計直酬之六月癸丑次內丘縣戊午次彰德曲赦其境內庚午次巨橋鎮壬戌次宜村秋七月車駕至南京右金元史世宗本紀中統元年冬十月戊午車駕駐錫衮之地命給官錢雇在京橐駝運米萬石輸行在所十二月乙巳帝至自和林駐蹕燕京近郊二年春二月丙午車駕幸開平詔減免民間差發罷守隘諸軍秦蜀行省借民錢給軍以今年稅賦償之免平陽太原軍站户重科租稅四年春二月甲子車駕幸開平秋八月壬申車駕至自上都至元元年春二月癸酉車駕幸上都詔諸路總管史權等二十三人赴上都大朝會弛邊城軍器之禁九月辛巳車駕至自上都四年春二月車駕幸上都秋九月車駕至自上都續文獻通考至元三十一年九月聖誕節帝駐蹕三部落受百官朝賀時監察御史崔敬疏言太祖以上都為清暑之地車駕行幸嵗以為常閣有大安殿有鴻禧睿思所以保養聖躬適起居之宜存畏敬之心也今實喇鄂爾多乃先皇帝所以備宴遊非常時臨御之所陛下方以孝治天下屢降德音祗行宗廟親祀之禮雖動植無知罔不歡悅而國家多故天道變更臣備員風紀以言為職願大駕還大內居深宫嚴宿衛與宰臣謀治道萬幾之暇則命經筵進講究古今盛衰之由緝熙聖學乃宗廟之福也元史成宗本紀元貞元年春二月丁酉車駕幸上都秋九月甲戌帝至自上都大德三年春二月癸丑朔車駕幸柳林庚辰幸上都秋九月癸未聖誕節駐蹕古柵受諸王百官賀乙亥車駕還大都續文獻通考成宗時每嵗或二月三月車駕幸上都至九月或十月還大都武宗本紀至大元年春三月戊寅車駕幸上都秋九月乙亥車駕至自上都仁宗本紀至大四年閏七月甲辰車駕將還大都太后以秋稼方盛勿令鷹坊駝人衛士先往庶免害稼擾民敕禁止之英宗本紀至治元年春三月辛巳車駕幸上都秋八月車駕駐蹕興和左右以寒甚請還京師帝曰兵以牛馬為重民以稼穡為本朕遲留蓋欲馬得芻牧民得刈穫一舉兩得何計乎寒九月丙子駐蹕昂固嶺丁酉車駕還大都二年春三月丁酉幸栁林夏四月戊戌朔車駕幸上都五月甲申車駕幸五臺山六月丁卯朔車駕至五臺山禁扈從宿衛毋踐民禾秋七月車駕至應州三年春三月壬辰朔車駕幸上都秋八月癸亥車駕南還駐蹕南坡續文獻通考至治時每嵗幸上都如仁宗泰定帝本紀泰定元年夏四月甲子車駕幸上都秋八月車駕至大都三年春二月甲辰車駕幸上都秋七月甲辰車駕發上都禁車騎踐民禾九月庚申車駕至大都四年春二月壬午狩于漷州三月壬戌車駕幸上都秋閏九月車駕至大都續文獻通考泰定時每嵗幸上都如英宗文宗本紀至順元年夏五月戊辰車駕發大都次大口己巳次龍虎臺六月丙戌大駕至上都秋閏七月大駕將還敕上都兵馬司官二員率兵士由偏嶺至明安巡邏以防盜賊丁酉大駕發上都八月己未大駕至京師續文獻通考至順元年樞密院臣言每嵗大駕幸上都發各衛軍士千五百人扈從又發諸衛護軍萬五千人以駐山後蒙古軍三千人駐官山以守關梁乞如舊數調遣以俟來年從之三年夏五月庚寅大駕發大都時巡于上都元史順帝本紀元統二年夏四月車駕時巡上都秋九月辛卯車駕還自上都至元元年夏五月戊子車駕時巡上都遣使者謁曲阜孔子廟致祭秋九月庚辰朔車駕駐鄂和嶺二年夏四月戊戌車駕時巡上都