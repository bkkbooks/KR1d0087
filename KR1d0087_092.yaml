body:
  text: 五禮通考卷八十二刑部尚書秦蕙田撰吉禮八十二宗廟制度宋史髙宗本紀建炎元年九月壬寅遣徽猷閣待制孟忠厚迎奉太廟神主赴揚州禮志建炎二年奉太廟神主於揚州壽寧寺東京神御殿在宫中舊號欽先孝思殿建炎二年閏四月詔迎温州神御赴闕先是神御于温州開元寺暫行奉安章聖皇帝與后像皆以金鑄置外方弗便因愀然謂宰輔曰朕播遷至此不能以時薦享祖宗神御越在海隅念之坐不安席故有是命建炎以來朝野雜記郡國廟國朝唯祖宗所嘗幸則有之建炎初金人圍西京急留守孫昭逺遣其将王仔奉啟運宫神御間道走揚州後遷于福州而永安軍會聖宫揚州章武殿之御容則遷于温州天慶觀紹興十三年復奉温州神御還臨安奉安于萬壽觀之後殿唯啟運留福州以守臣提舉成都府新繁縣御容殿者始在重光寺藥師院雍熈間僧道輝畫太祖皇帝御容于佛屋之後壁熈寧六年趙清獻為成都守請建殿奉安神宗不許但令設板屋欄楯以扄䕶之元豐七年走馬承受趙選者更具奏得㫖修建殿宇剏置門鑰宦官監守朝謁以時紹興元年終南山上清太平宫道士訾全真等復持太宗真宗御容自岐下抵宣撫使張忠獻忠獻即遣使奉安于太祖之側四年宣撫副使吴玠更自武興送仁宗英宗神宗御容至殿奉安二十七年楊椿為兵部侍郎言於朝有㫖别加營繕始更為殿門外門二十九年乃成時王時亨知府事請賜宫額及殿名不報淳熈中胡長文入蜀始議即府之聖壽寺剏殿以奉御容殿宇甚華供奉之物亦浸備乃復乞宫額于朝髙宗本紀建炎三年正月己丑奉安西京會聖宫累朝御容于夀寧寺二月癸丑游騎至瓜州太常少卿季陵奉太廟神主行金兵追之失太祖神主四月己酉詔訪求太祖神主六月請太后率宗室迎奉神主如江表十一月癸未主管歩軍司閭勍自西京奉累朝御容至行在詔奉安於天慶觀禮志建炎三年二月上覽禁中神御薦享禮物謂宰臣曰朕自省閱神御每位各用羊胃一須二十五羊祖宗仁厚豈欲多害物命謹以别味代之在天之靈亦必歆享吕頥浩曰陛下寅奉宗廟罔不盡禮而又仁愛及物天下幸甚髙宗本紀四年二月乙亥奉安祖宗神御於福州禮志建炎四年奉安神主於温州權用酒脯文獻通考建炎四年自海道還神主留温州十月十四日奉安宋史禮志紹興五年吏部員外郎董棻言臣聞戎祀國之大事而宗廟之祭又祀之大者也大祀禘祫為重祫大禘小則祫為莫大焉今戎事方殷祭祀之禮未暇徧舉然事有違經戾古上不當天地神祇之意下未合億兆黎庶之心特出於一時大臣好勝之臆說而行之六十年未有知其非者顧雖治兵禦戎之際正厥違誤宜不可緩仰惟太祖受天明命混一區宇即其功徳所起宜祫享以正東向之尊逮至仁宗親行祫享嘗議太祖東向用昭正統之緒當時在廷之臣僉謂自古必以受命之祖乃居東向之位本朝太祖乃受命之君若論七廟之次有僖祖以降四廟在上當時大祫上列昭穆而虚東向葢終不敢以非受命之祖而居之也暨熈寧之初僖祖以世次當祧禮官韓維等據經有請適王安石用事奮其臆說乃俾章衡建議尊僖祖為始祖肇居柬向馮京奏謂士大夫以太祖不得東向為恨安石肆言以折之已而又欲罷太祖郊配神宗以太祖開基受命不許安石終不以為然元祐之初翼祖既祧正合典禮至於崇寧宣祖當祧適蔡京用事一遵安石之術乃建言請立九廟自我作古其已祧翼祖宣祖並即依舊循沿至今太祖尚居第四室遇大祫處昭穆之列今若正太祖東向之尊委合禮經太常寺丞王普又言棻所奏深得禮意而其言尚有未盡臣竊以古者廟制異宫則太祖居中而羣廟列其左右後世廟制同堂則太祖居右而諸室皆列其左右者祫享朝踐於堂則太祖南向而昭穆位於東西饋食於室則太祖東向而昭穆位於南北後世祫享於一堂上而用室中之位故唯以東向為太祖之尊焉若夫羣廟迭毁而太祖不遷則其禮尚矣臣故知太祖即廟之始祖是為廟號非諡號也惟我太宗嗣服之初太祖廟號已定雖更累朝世次猶近每於祫享必虚東向之位以其非太祖必不可居也迨至熈寧又尊僖祖為廟之始祖百世不遷祫享東向而太祖嘗居穆位則名實舛矣儻以熈寧之禮為是僖祖當稱太祖而太祖當改廟號然則太祖之名不正前日之失大矣今宜奉太祖神主居第一室永為廟之始祖每嵗五享告朔薦新止於七廟三年一祫則太祖正東向之位太宗仁宗神宗南向為昭真宗英宗哲宗北向為穆五年一禘則迎宣祖神主享於太廟而以太祖配焉如是則宗廟之事盡合禮經無復前日之失矣上曰太祖皇帝開基創業始受天命祫享宜居東向之位宰相趙鼎等奏曰三昭三穆與太祖之廟而七載在禮經無可疑者又司封郎中林待聘言太廟神主宜在國都今新邑未奠當如古行師載主之義遷之行闕以彰聖孝於是始建太廟於臨安奉迎安置髙宗本紀紹興七年夏四月癸巳築太廟於建康以臨安府太廟為啟祖殿十二月丁卯祔徽宗皇帝顯肅皇后於太廟十三年正月己亥親享太廟奉上冊寳二月乙酉建景靈宫奉安累朝神御八月丙戌遣吏部侍郎江邈奉迎累朝神御於温州十月乙未奉安累朝帝后神御於景靈宫禮志紹興十三年二月臣僚言竊見元豐五年神宗始廣景靈宫以奉祖宗衣冠之遊即漢之原廟也自艱難以來庶事草創始建宗廟而原廟神遊猶寄永嘉乃者權時之宜四孟薦獻旋即便朝設位以享未副廣孝之意乞命有司擇爽塏之地倣景靈宫舊規隨宜建置俟告成有日迎還晬容奉安新廟庶幾四孟躬行獻禮用副罔極之恩從之初築三殿聖祖居前宣祖至祖宗諸帝居中殿元天大聖后與祖宗諸后居後掌宫内侍七人道士十人吏卒二百七十六人上元結燈樓寒食設鞦韆七夕設摩㬋羅簾幕嵗時一易嵗用酌獻二百四十羊凡帝后忌辰用道釋作法事蕙田案七廟禮也景靈宫非制也南渡以後尚不悟其非而重建景靈宫何耶文獻通考自渡江後行在靡有定所神御奉安它州朝獻則遣官分詣至紹興十二年和議成駐蹕臨安始備太廟原廟之制建炎以來朝野雜記自休兵後太祖剏冊寳殿凡帝后寳冊洎郊廟金玉禮器皆藏焉始時令太常寺官一員季㸃然第省閱文歴而已乾道五年春因有盗竊禮器者中書門下始奏令每季取索赤歴點檢足備用印封鎖具有無損失申省二月己丑降㫖慶元五年夏太常寺奏太廟遺失皇后金寳二命大理寺治之六月庚寅降㫖既而廟之衛卒赴有司自首坐獄死蓋故事冊寳以中人領其工作盗去鑿而售之中乃鐵胎也由是事敗自後朝廷益謹其事月以察官禮官中官各一員檢視謂之㸃寳禮器中瑶爵玉瓉二事絶佳人間所未見其他圭璧大抵多水漿色也冊寳中惟昭慈聖憲皇后諡冊以象牙餘皆珉玉又有徽宗皇帝諡寳玉色尤温粹宋史禮志紹興十五年秋復營建神御殿於崇政殿之東朔望節序帝后生辰皇帝皆親酌獻行香用家人禮其殿名徽宗曰承元欽宗曰端慶髙宗曰皇徳孝宗曰系隆光宗曰美明寧宗曰垂光理宗曰章熈度宗曰昭光建炎以來朝野雜記國朝宗廟之制太廟以奉神主一嵗五享朔祭而月薦新五享以宗室諸王朔祭以太常卿行事景靈宫以奉塑像嵗四孟享上親行之帝后大忌則宰相率百官行香僧道士作法事而后妃六宫皆亦繼徃天章閣以奉畫像時節朔望帝后生辰日皆徧薦之内臣行事欽先孝思殿亦奉神御上日焚香而諸陵之上宫亦有御容時節酌獻如天章閣毎嵗寒食及十月朔宗室内人各徃朝拜春秋二仲太常行園陵季秋監察御史檢視太廟之祭以俎豆景靈宫用牙盤而天章閣等以常饌用家人禮云迄今不改髙宗本紀紹興十六年三月乙未增建太廟五月癸未初作太廟祏室文獻通考十六年太常寺言契勘在京廟制每室東設户西設牖西牆作祏室藏祖宗帝后神主又有東西夾室其夾室止設户見今行在太廟係隨宜修蓋未曾安設祏室今既剏行修蓋即合體倣在京廟制同殿異室修蓋及将殿東西作兩夾室其兩夾室止設户十一室即依廟制設户牖其殿南北深七丈每室於西壁從北以南一丈二尺作厚牆隨宜安設祏室其西夾室亦合設祏室藏順祖室神主詔從之乃廣太廟玉海中興太廟在瑞石山之左紹興四年剏始髙宗在維揚寓神主于壽寧寺建炎四年自海道還神主留温州紹興三年十月二十七日禮官江端友請建太廟正殿七楹分為十三室五年迎温州神主及福州啟運宫神御七年四月二日更築太廟于建康十二月十一日復奉神主還臨安十二年五月二十六日以奉徽宗主修建别廟殿室三間十三年秋增修宿齋所十六年新祭器将成而室隘不能陳列三月乙未禮官巫伋請増建于是從西増六楹通舊十三楹每楹為一室東西二楹為夾室五月作祏室藏主建炎以來朝野雜記太廟自仁宗以來皆祀七世崇寧初蔡京秉政始取王肅說謂二祧在七世之外乃建九廟奉翼祖宣祖咸歸本室焉然王莽已營九廟唐明皇又用之非始於蔡京也紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熈末年太廟祀九世十二室及阜陵復土趙子直為政遂祧僖宣二祖而祔孝宗時朱元晦在經筵獨以九廟為正子直不從元晦議遂格及光宗祔廟復不祧今又祀九世矣髙宗本紀紹興三十二年正月丙子祧翼祖主於夾室禮志禮部太常寺言欽宗祔廟翼祖當遷於正月九日告遷翼祖皇帝神主奉藏於夾室孝宗本紀淳熈十五年四月丙戌祔髙宗神主於太廟七月戊戌上髙宗廟樂曰大勲舞曰大徳寧宗本紀紹熈五年時寧宗已即位閏十月庚申以吏部尚書鄭僑等奏請祧僖宣二祖正太祖東向之位尋立僖祖别廟以藏順翼宣三祖之主十二月癸酉上孝宗廟樂曰大倫之舞甲戌祔孝宗神主於太廟禮志紹熈五年九月太常少卿曾三復亦言請祧宣祖就正太祖東向之位其言甚切既而吏部尚書鄭僑等亦乞因大行祔廟之際定宗廟萬世之禮慰太祖在天之靈破熈寧不經之論今太祖為始祖則太宗為昭真宗為穆自是而下以至孝宗四昭四穆與太祖之廟而九上參古禮而不廢崇寧九廟之制於義為允又言治平四年僖祖祧遷藏在西夾室至熈寧五年王安石以私意使章衡等議乃復祔僖祖以為始祖又将推以配天欲罷太祖郊配韓維司馬光等力爭而安石主其說愈堅孫固慮其罷太祖配天建議以僖祖權居東向之位既曰權居則當釐正明矣詔從之閏十月權禮部侍郎許及之言僖順翼宣四祖為太祖之祖考所遷之主恐不得藏於子孫之廟今順翼二祖藏於西夾室實居太廟太祖之右遇祫享則於夾室之前設位以昭穆焉於是詔有司集議吏部尚書兼侍讀鄭僑等言僖祖當用唐興聖之制立為别廟順祖翼祖宣祖之主皆祔藏焉如此則僖祖自居别廟之尊三祖不祔子孫之廟自漢魏以來太祖而上毁廟之主皆不合食今遇祫則即廟而享於禮尤稱諸儒如樓鑰陳傅良皆以為可詔從之時朱熹在講筵獨入議状條其不可者四大畧云凖尚書吏部牒集議四祖祧主宜有所歸今詳羣議雖多而皆有可疑若曰藏之夾室則是以祖宗之主下藏於子孫之夾室至於祫祭設幄於夾室之前則亦不得謂之祫欲别立一廟則䘮事即逺有毁無立欲藏之天興殿則宗廟原廟不可相雜議者皆知其不安特以其心欲尊奉太祖三年一祫時暫東向之故其實無益於太祖之尊而徒使僖祖太祖兩朝威靈相與校強弱於㝠㝠之中今但以太祖當日追尊帝號之命而黙推之則知今日太祖在天之靈必有所不忍而不敢當矣又况僖祖祧主遷於治平不過數年神宗復奉以為始祖以為得禮之正而合於人心所謂有其舉之莫敢廢者又言當以僖祖為始祖如周之后稷太祖如周之文王太宗如周之武王與仁宗之廟皆萬世不祧昭穆而次以至髙宗之廟亦萬世不祧又言元祐大儒程頤以為王安石言僖祖不當祧復立廟為得禮竊詳頥之議論與安石不同至論此事則深服之足以見義理人心之所同固有不約而合者特以司馬光韓維之徒皆是大賢人所敬信其議偶不出此而安石乃以變亂穿鑿得罪於公議欲堅守二賢之說并安石所當取者而盡廢之今以程頥之說考之則是非可判矣議既上召對令細陳其說熹先以所論畫為圖本貼說詳盡至是出以奏陳久之上再三稱善且曰僖祖自不當祧髙宗即位時不曾祧夀皇即位太上即位亦不曾祧今日豈可容易可於榻前撰數語徑自批出熹方懲内批之弊因乞降出劄子再令臣僚集議上亦然之熹既退即進擬詔意以上意諭廟堂則聞已毁四祖廟而遷之矣時宰臣趙汝愚既以安石之論為非異議者懼其軋已藉以求勝事竟不行熹時以得罪遺汝愚書曰相公以宗子入輔王室而無故輕納妄議拆祖宗之廟以快其私欲望神靈降歆垂休錫美以永國祚於無窮其可得乎時太廟殿已為十二室故孝宗升祔而東室尚虚熹以為非所以祝延夀康之意深不然之因自劾不堪言語侍從之選乞追奪待制不許及光宗祔廟遂復為九世十二室蓋自昌陵祔廟踰二百年而後正太祖之位文獻通考紹熈五年閏十月時寧宗已即位詔别建四祖殿于太廟大殿之西奉祧主僖順翼宣四祖神主嵗令禮官薦獻宋朝自太祖追王僖順翼宣四祖以來毎遇禘祫祖宗以昭穆相對而虚東向之位王安石用事以為僖祖以上世次不可知則僖祖之有廟疑與后稷無以異當時諸儒韓維輩辨之不從時程頥為布衣為人言亦以安石之言為是熈寧八年夏禘於太廟以僖祖東向自是無敢議者紹興後董棻王普尤袤俱請正太祖東向之位未克行先是英宗祔廟已祧順祖至欽宗祔廟又祧翼祖及髙宗升祔遂為九世十二室至是孝宗将升祔趙汝愚當國欲并祧僖宣二祖事下侍從臺諫禮官議于是吏部尚書鄭僑等請祧二祖而正太祖東向之位諸儒如樓鑰陳傅良輩皆以為可詔從之僑等尋又請立僖祖别廟以順懿宣三祖祔藏自是年冬始而别建一殿以奉祧主于大殿之西隅嵗命禮官薦獻焉今謂四祖殿者是也馬氏曰案太祖東向之位或以為僖祖當居之或以為藝祖當居之自熈寧以來議者不一矣蓋自治平四年英宗已祔廟張安道等以為宜遵七世之制合祧僖祖詔從其說熈寧初王介甫當國每事務欲紛更遂主議以為僖祖宋之太祖不當祧而韓持國輩争之以為太祖合屬之昌陵諸賢争之愈力而介甫持之愈固遂㡬至欲廢藝祖配天之祀以奉僖祖蓋其務排衆議好異遂非與行新法等固無怪也然愚嘗考之張安道建隨世祧遷之議韓持國執藝祖當居東向之說論則正矣而揆之當時則未可蓋古之所謂天子七廟者三昭三穆與太祖之廟而七三昭三穆則自父祖而上六世太祖則始封受命以有功徳而萬世不祧遷者本非第七世之祖也今神宗之世而獨祧僖祖則順翼宣太謂太祖太宗共為一世真仁英猶七世也是将祧僖祖而以順祖為太祖乎不可也僖順俱無功徳非商契周稷之倫今當時之議其欲祧僖祖者特以其已在七世之外其不祧順祖者特欲以備天子七廟之數然不知親盡而祧者昭穆也萬世不祧者太祖也今以三昭三穆言則僖順皆已在祧遷之數以萬世不祧言則二祖俱未足以當之是姑以當祧之祖而權居太祖之位耳若不以順祖為太祖則所謂七世者乃四昭三穆矣非所謂三昭三穆與太祖之廟而七也若必曰虚太祖之位而只祀三昭三穆則當併僖順二祖而祧之又否則姑如唐人九廟之制且未議祧遷雖于禮經不合而不害其近厚今獨祧僖祖則順祖隱然居太祖之位矣此其未可一也如藝祖之合居東向為萬世不祧之太祖其說固不可易然神宗之時上距藝祖纔四代五廟耳若遽以為太祖則僖順以下四帝皆合祧而天子之廟下同於諸侯矣此其未可者二也諸賢之說大概只以為不可近捨剏業之藝祖而逺取追尊之僖祖介甫務欲異衆則必欲以其所以尊藝祖者尊僖祖而于當時事體皆未嘗審訂若以前二節者反復推之則尊僖祖者固失矣而遽尊藝祖者亦未為得也至寧宗之初年則不然矣自藝祖剏業以來已及八世十二廟則僖順翼宣之當祧無可疑者于此時奉藝祖正東向之位為萬世不祧之祖更無拘礙而董棻王普等所言乃至當之論矣晦菴獨以伊川曾是介甫之說而猶欲力主僖祖之議則幾於膠柱鼓瑟而不適于時黨同伐異而不當于理愚固未敢以為然也蕙田案宋紹熈中從廷臣鄭僑樓鑰陳傅良等議祧僖順翼宣四祖正藝祖太祖東向之位此不易之經也儀禮䘮服傳曰諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别于尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别于卑者也鄭註謂後世為君者祖此受封之君不得祀别子公子若在髙祖以下則如其親服後世遷之乃毁其廟耳賈疏始封君得立五廟者太祖一廟與髙祖以下四廟今始封君後世乃不毁其廟為太祖于此始封君未有太祖廟惟有髙祖以下四廟則公子為别子者得入四廟之限故云公子若在髙祖以下則如其親謂自禰以上至髙祖以次立四廟云後世遷之乃毁其廟者謂始封君死其子立即以父為禰廟前髙祖者為髙祖之父當遷之又至四世之後始封君為髙祖父當遷之時轉為太祖通四廟為五廟定制也據此則太祖之義明矣經所言者諸侯也推而上之自尊别于卑天子亦當如是無二理也祖諸侯者不祖公子公子若在髙祖以下則如其親服此則僖順翼宣四親廟之禮也後世遷之乃毁其廟則四祖當祧之明證也四世之後始封君為髙祖父當遷轉為太祖此藝祖當正太祖之位之確據也考之徃古騐之方來無不當以是為凖乃宋之廷臣孫固韓維司馬公等建議于前鄭僑樓鑰陳傅良等主持於後大禮雖卒定而遲久不决是皆不知以此經斷之之過也王荆公之偏僻無論矣乃程子從而是之朱子更堅主其說至於面折廷争而决以去就究其說亦終不行可見義理之正人心之安雖諸大儒非之而不可易特不觧朱子何以不察乎此致馬氏有膠柱鼓瑟黨同伐異之譏易曰精義入神以致用也蓋義之難精而經學之難講也久矣又曰有天下者必推其祖以配天既立宗廟必推其祖為太祖禮也自孝經有郊祀配天明堂配帝之說祭法有禘郊祖宗之說鄭氏註以為禘郊即郊也鄭氏以禘為祀天于圜丘然圜丘亦郊也祖宗即明堂也于是後之有天下者配天配帝必各以一祖推其剏業之祖以擬文王以為未足也而必求其祖之可以擬后稷者而推以配天焉夫文王受命作周者也漢之髙帝唐之神堯宋之藝祖庶乎其可擬矣曹孟徳司馬仲達以下諸人逞其奸雄詐力取人之天下國家以遺其子孫上視文王奚啻瓦釜之與黄鍾然其為肇造區夏光啟王業事迹則同為子孫者雖以之擬文王可也獨擬后稷之祖則歴代多未有以處于是或取之遥遥華胄如曹魏之祖帝舜宇文周之祖神農周武氏之祖文王是也此三聖人者其功徳固可配天矣而非魏與二周之祖也是以當時議之後代哂之以為不類至于唐既以神堯擬文王矣而求其所以擬后稷者則屬之景帝宋既以藝祖擬文王矣而求其所以擬后稷者則屬之僖祖夫景僖二帝雖唐宋之始祖然其在當時則無功業之庸夫也上視周室僅可比不窋之流而以后稷尊之過矣是以不特後世議其非而當時固譁然以為不可蓋無以厭服人心故也夫知其祖之未足以厭服人心而推崇尊大之意未慊也于是獻議者始為導諛附會之說以中之老𥅆亦人耳道家者流假託其名以行其教遂至推而尊之列坐上帝之右而為其徒習其教者則曰此天帝也非復周之柱下史也而𥅆姓適同乎唐乃推𥅆以為始祖尊之曰𤣥元皇帝蓋雖祖𥅆而其意謂吾祖固天之貴神也於是崇建太清宫每禘祫並于𤣥元皇帝前設位序正是蓋以𤣥元為太祖擬周之后稷而其祖宗則俱為昭穆矣至宋大中祥符間天書封禪之事競興遂復效唐人之為推所為司命保生天尊大帝以為聖祖建立景靈宫聖祖殿居中而僖祖以下各立一殿分置左右是蓋以聖祖為太祖擬周之后稷而祖宗則俱為昭穆矣晦菴嘗言景靈之建外為都宫而内各有寝廟門垣乃為近古蓋以其規制宏壯毎帝各居一殿不如太廟之共處一堂稍類古人立廟之制而足以稱天子所以嚴奉祖宗之意是則然矣然不知所謂聖祖者固有功徳之可稱如后稷譜系之可尋如稷之于文武成康乎祭法言虞夏商周禘郊祖宗之制鄭氏注謂有虞氏以上尚徳禘郊祖宗配用有徳而已自夏以下稍用其姓氏之先後為次項平甫亦言此經作祭法者已於篇末自解其意先序帝嚳堯舜鯀禹之功次序黄帝顓頊契㝠湯文武之功以為此皆有功烈於民者故聖王祀之非此族也不在祀典則其意蓋謂郊禘祖宗皆擇有功烈者祀之耳而後之有天下者欲稽此以祀其祖先則固與其說大異矣愚嘗因是而究論之虞夏商之事逺矣周人郊祀后稷宗祀明堂此後世所取法也以詩考之言后稷配郊者為生民思文言文王配明堂者為我将我将之詩其所稱頌者受命興周而已而生民思文二詩則皆言教民播種樹藝五榖之事然則文王有功於興周而后稷則有功于天下萬世者也傳曰烈山氏之子柱為稷自夏以上祀之周棄亦為稷自商以來祀之夫社五土之神稷五榖之神皆地之異名也古之聖人能建天地所不及之功則其道可以擬天地故後世祀之推以配天地棄自商祀以為稷則周為諸侯之時固已配食地祗矣周有天下棄開國之祖也文王受命禮合配天而實棄之子孫也周公制禮作樂既舉嚴父配天之禮以祀文王矣而棄之祀仍商之舊列于社稷是尊禰而卑祖也故復剏為明堂之禮而以是二聖人者各配一祀焉晦菴亦言古惟郊祀明堂之祀周公以義起自秦以來文王配天之禮廢矣而稷之祀至今未嘗廢蓋稷之配食地祗周未興而已然周已亡而不替所謂有功烈于民者祀之萬世如一日也後之有天下者豈復有此祖也哉而必欲效周之禮推其逺祖上擬后稷或本無譜系可考而強附會於古之帝王如曹魏二周之祖舜神農與文王是也或姑推其上世之逺祖而不問其人品功徳之何如如唐之景帝宋之僖祖是也又否則推而神之託之天帝之杳㝠如唐之𤣥元宋之聖祖是也而上視周家祀后稷之意則不類甚矣曷若只推其剏業之祖上擬文王郊祀明堂俱以配侑而上世之祖既未有可以擬后稷者則不必一遵周人之制可也蕙田案馬氏二論可謂長于理而善于辭矣而猶有未盡者以愚推之三代以後始祖之位移易不定而議亦莫歸于一者一在附會不可知之華胄以失之誣一在姑取親廟之第一世為祖而失之昵二者自漢及宋迭為乖謬而卒以剏業開國之君當之則人心安而典禮正焉夫以剏業之君為太祖人知之所祀之親廟功徳不可擬商周之稷契人亦知之然徃徃不足以堅其說而决其非者咎在持議之人無有以别子為祖之說斷之也傳曰别子為祖别子公子也大夫不得祖諸侯故以公子為始祖諸侯不得祖天子故以初封受國之君為始祖因生以賜姓胙之土而命之氏則以胙土受命之君為始祖故夏之世不祖顓頊而祖禹顓頊天子也不可祖禹則始封于夏之君也殷周之世不祖帝嚳而祖契與稷帝嚳天子也不可祖稷與契始封于商于邰之君也此乃胙土受命不可易之制而非專為其盛徳之可百世祀而報之是之謂祖有功功者始封有國之謂也如專以徳則百世祀者不獨其子孫矣後世之君或奮起布衣或業由篡竊既無有國始封之祖即髙曽以上之世系尚茫昧不可尋而姑以其所能記憶者立為親廟遂以親廟之最逺者為始祖夫親廟宜也是仁率親之義也以為不遷之祖不可也非祖有功之義也如唐之獻祖宋之僖祖皆始祀而卒遷假使當時議者不徒以稷契功徳之說較之而以稷契始封有國之說斷之則雄才大畧之主或不至任情以掩義何也功徳比擬迹渉貶抑而情之所篤孝子仁人必有歉於心而不肯從者若以始封别子之說决之則親廟之數窮而祧遷之論定矣然當議時雖不及此即加崇奉而數世後卒歸于遷改而後定者義理得而人心安也故三代以後總當以剏業開國之君為太祖凡追尊之廟皆親盡而遞遷蓋祖之名一而太祖不同祖考之祖有逺近隆殺之分太祖之祖乃萬世不易之號明乎此而始祖太祖之號確有所歸無可疑矣厥後明孝宗時憲宗升祔時九廟已備定議祧遷當時禮臣周洪謨倪岳等乃謂國家自徳祖以上莫推世次遂以徳祖視周后稷蓋沿王安石僖祖之謬說失職甚矣有一楊守陳争之而不從世宗時卒祧徳祖豈非與宋僖祖之議同一轍哉宋史禮志慶元二年四月禮部太常寺言已於太廟之西别建僖祖廟及告遷僖順翼宣帝后神主詣僖祖廟奉安寧宗本紀慶元四年十二月癸卯祔光宗皇帝神主於太廟續文獻通考寧宗嘉定四年三月臨安大火将及太廟詔遷神主於夀慈寺三日火息乃還太廟陳傅良上僖祖太祖廟議曰以經傳考之自商而上以受命之君為宗而祖其所始生之帝故虞夏以舜禹為宗而祖顓頊商人則以受命之君為宗而祖契周監二代於是以受命之君為祖繼祖為宗而郊其所始封之君故周人郊稷祖文王而宗武王文王未稱王何以得為受命之君周公為之也其在詩受命作周言文王有明徳故天復命武王此周公推受命於文王祖文而宗武之事也其在詩思文后稷配天則稷之郊樂也清廟祀文王則文王廟樂也執競祀武王則武王廟樂也我将祀文王於明堂則又文王配帝之樂也文武每廟各有樂章而后稷廟無專樂則見周祖文王而后稷不在七廟之列於是有先王先公之廟祧先王謂太王而下先公謂后稷而下其在詩天作祀先王先公則后稷以至太王王季之廟樂也文武每廟各樂章文王配帝又别有樂假如后稷為太祖則不應但有郊樂而無廟樂今天作一詩通用之先公先王則由王季而上其遷主皆藏於后稷而合享之明矣在書洛誥秬鬯二卣禋於文王武王烝祭歳文王辭牛一武王騂牛一不及后稷不應每事皆遺太祖又明騐也由此言之后稷固先公之廟也天保之詩曰禴祠烝嘗于公先王時祀固同而周禮享先王禮甚備享先公但用鷩冕或亦有隆殺之等記曰武王末受命周公成文武之徳追王太王王季上祀先公以天子之禮當武王之末追尊三世周公金縢之卜但告三王則太王為祖而文王猶為穆考酒誥所謂穆考文王是也成王制禮作樂更定廟制於是推稷為始祖文王為太祖閔予小子之詩曰於乎皇考永世克孝念兹皇祖陟降庭止則武王祔廟成王時也雝禘太祖謂文王也其詩曰既右烈考亦右文母則是以文王為祖武王為昭考矣武王為昭考故文王之子皆遞稱昭富辰所謂文之昭武之穆是也周禮天府掌祖廟之守藏註云祖廟為后稷始祖之廟詩禘太祖註云太祖為文王王肅亦曰文王自是祖廟孝經云宗祀文王宗字訓尊則以后稷為始祖文王為太祖王鄭同此說也䘮服傳曰諸侯及其太祖天子及其始祖之所自出此始祖太祖明文也馬融云諸言祖逺言始祖近言太祖是也韋昭曰商家祖契周初亦祖后稷而宗文王至武王雖成文王之業而有伐紂定天下之功其廟不可毁而後更祖文王宗武王此說近之矣孔子稱之曰孝莫大於嚴父嚴父莫大於配天周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝以為周公其人言非周公不足以及此明非夏商之舊也周變夏商非特此也追王至於三代前此未有也繫姓至於百世前此未有也推其所自出至於帝嚳又前此未有也商人禘舜至周禘嚳世數益逺是謂仁之至義之盡也漢魏以來諸儒考經不詳或得或失王鄭二家互相詆毁要不足深信此其所以專經為斷以贊廟議之决洪惟本朝世次弗彰今當以太祖之所推尊為定以僖祖為始祖之廟與太祖之廟皆世世享祀推廣孝思崇長恩厚則羣臣之議不相抵牾而大典可就矣蕙田案傅良尚主調停之說非實見太祖之當配天而不可易也理宗本紀寶慶元年四月辛卯朔寧宗祔廟王圻續通考御史臺言大行皇帝係是十世當行議祧切謂商以契為始祖以湯太戊武丁為不毁之廟不在三昭三穆之數魯公之廟文世室也武公之廟武世室也公羊子曰世室世世不毁仰惟國朝太祖皇帝為帝者太祖之廟太宗皇帝祔於太祖為一世之廟真宗仁宗神宗髙宗各有制書不祧此與商周不毁廟魯公武公之世室名異實同世室之祧既不在三昭三穆之中則固不在九廟之數自太祖以至光宗實為五廟今大行皇帝始為六廟合増展一室以祔大行皇帝於禮為合於義為安詔從之宋史理宗本紀紹定四年九月丙戌夜臨安火延及太廟十月戊午太常少卿度正國史院編修官李心傳各疏言宗廟之制未合於古兹緣災異宜舉行之詔兩省侍從臺諫集議以聞禮志紹定四年九月丙戌京師大火延及太廟太常少卿度正言伏見近世大儒侍講朱熹詳考古禮尚論宗廟之制畫而為圖其說甚備然其為制務傚於古而頗更本朝之制故學士大夫皆有異論遂不能行今天降災異火發民家延及宗廟舉而行之莫此時為宜臣於向來備聞其說今備員禮寺適當此變若遂隠黙則為有負謹為二說以獻其一純用朱熹之說謂本朝廟制未合於古因畫為圖謂僖祖如周后稷當為本朝始祖夫尊僖以為始祖是乃順太祖皇帝之孝心也始祖之廟居於中左昭右穆各為一廟門皆南向位皆東向祧廟之主藏於始祖之廟夾室昭常為昭穆常為穆自不相亂三年合食則併出祧廟之主合享於始祖之廟始祖東向羣昭之主皆位北而南向羣穆之主皆位南而北向昭穆既分尊卑以定其說合於古而宜於今盡美盡善舉而行之祖宗在天之靈必歆享於此而垂祐於無窮也其一說則因本朝之制而參以朱熹之說蓋本朝廟制神宗嘗命禮官陸佃討論欲復古制未及施行渡江以來稽古禮文之事多所未暇今欲驟行更革恐未足以成其事而徒為紛紛或且仍遵本朝之制自西徂東並為一列惟於每堂之後量展一間以藏祧廟之主毎室之前量展二間遇三年祫享則以帷幄幕之通為一室盡出諸廟主及祧廟主並為一列合食其上前乎此廟為一室凡遇祫享合祭於其室名為祫享而實未嘗合今量展此三間後有藏祧主之所前有祖宗合食之地於本朝之制初無大段更革而頗已得三年大祫之義今來朝廷若能舉行朱熹前議固無以加如其不然姑從後說亦為允當不失禮意然宗廟之禮儻無其故何敢妄議今因大火之後若加損益亦惟其時乞賜詳議有㫖令從祀禮部太常集議後竟不行蕙田案度正兩議都無一是理宗本紀五年壬寅新作太廟成王圻續通考景定五年八月都省言知嘉定府洪濤迎奉新繁縣太祖以下六朝御容于本府天慶觀一時權宜于禮未備詔令守臣選差武臣一員擇日迎奉赴行在所奉安合行典禮令有司條具上于尚書省右宋廟制下遼史聖宗本紀統和十三年九月丁卯奉安景宗及皇太后石像于延芳淀十四年十一月乙酉奉安景宗及皇太后石像於乾州開泰元年十二月丙寅奉遷南京諸帝石像于中京觀徳殿景宗及宣獻皇后於上京五鸞殿八年正月壬戌建景宗廟於中京九年十二月戊辰詔中京建太祖廟制度祭器皆從古制道宗本紀太康三年九月壬申修乾陵廟續文獻通考遼諸帝各有廟又有原廟如凝神殿之類其儀制俱未詳大抵簡樸有太古之風蕙田案遼廟制雖不詳然史云中京建廟制度祭器皆從古制則亦斐然有文矣苐所謂古制者三代以來之古制歟抑本國之古制歟要皆不失禮意勝于宋多矣右遼廟制金史禮志金初無宗廟天輔七年八月太祖葬上京宫室之西南建寧神殿于陵上以時薦享自是諸京皆立廟惟在京師者則曰太廟太宗天會二年立大聖皇帝廟于西京太宗本紀天會三年八月癸卯斡魯以遼主至京師甲辰告于太廟十月詔建太祖廟于西京熈宗本紀天會十四年八月丙辰追尊九代以下曰皇帝皇后定始祖景祖世祖太祖太宗廟皆不祧蕙田案是時熈宗立二年矣仍用太宗年號故稱天會十四年天眷二年九月丙申立太祖原廟于慶元宫皇統三年五月甲申初立太廟四年七月庚午建原廟於東京禮志皇統七年有司奏慶元宫門舊曰景暉殿曰辰居似非廟中之名今宜改殿名曰世徳是嵗東京御容殿成熈宗本紀皇統八年閏八月丙寅太廟成禮志皇統三年初立太廟八年太廟成則上京之廟也海陵本紀天徳四年十月壬戌朔使使奉遷太廟神主禮志天徳四年有司言燕京興建太廟復立原廟三代以前無原廟制至漢惠帝始置廟于長安渭北薦以時果其後又置于豐沛不聞享薦之禮今兩都告享宜止于燕京所建原廟行事于是名其宫曰衍慶殿曰聖武門曰崇聖蕙田案金天徳四年宋紹興二十二年也時宋方廣建神御殿而金之有司奏稱三代以前無原廟制何其正也使宋臣而知此亦何至是哉海陵本紀貞元三年十月戊寅權奉安太廟神主于延聖寺十一月丁卯奉安神主于太廟禮志貞元初海陵遷燕乃增廣舊廟奉遷祖宗神主于新都三年十一月丁卯奉安于太廟正隆中營建南京宫室復立宗廟南渡因之其廟制史不載傳志雜記或可概見今附之汴京之廟在宫南馳道之東殿規一屋四間限其北為神室其前為通廊東西二十六楹為間二十有五每間為一室廟端各虚一間為夾室中二十三間為十一室從西三間為一室為始祖廟祔徳帝安帝獻祖昭祖景祖祧主五餘皆兩間為一室世祖室祔肅宗穆宗室祔康宗餘皆無祔每室門一牖一門在左牖在右皆南向石室之龕于各室之西壁東向其世祖之龕六南向者五東向者一其二其三俱二龕餘皆一室一龕總十六龕祭日出主于北墉下南向禘祫則並出主始祖東向羣主依昭穆南北相向東西序列室户外之通廊殿階二級列陛三前井亭二外作重垣四繚南東西皆有門内垣之隅有樓南門五闔餘皆三中垣之外東北冊寳殿也太常官一人季視其封緘謂之㸃寳内垣之南曰大次東南為神庖廟門翼兩廡各二十有五楹為齋郎執事之次西南垣外則廟署也神門列㦸各二十有四植以木錡㦸下以板為掌形畫二青龍下垂五色帶長五尺享前一日則懸㦸上祭畢藏之世宗大定二年十二月詔以會寧府國家興王之地宜就慶元宫址建正殿九間仍其舊號以時薦享以睿宗御容奉還衍慶宫有司擬奏閔宗無嗣合别立廟有司以時祭享不稱宗以武靈為廟號又奏唐立别廟不必專在太廟垣内今武靈皇帝既不稱宗又不與祫享其廟擬于太廟東墉外隙地建立從之王圻續通考大定四年廟成以武靈後諡孝成又謂之孝成廟三月奉安武靈皇帝及悼皇后金史禮志大定五年會寧府太祖廟成有司言宜以御容安置先是衍慶宫藏太祖御容十有二法服一立容一戎衣一佩弓矢一坐容二巾服一舊在會寧府安置半身容二春衣容一巾而衣紅者二舊在中都御容殿安置今皆在此詔以便服容一遣官奉安擇日啟行前一日夙興告廟用酒饌差奏告官一員以所差使充進請御署祝版其日質明有司設龍車于衍慶宫門外少西東向宰執率百官公服詣本宫殿下班立再拜班首升殿跪上香奠酒教坊樂作少退再拜班首降階復位陪位官皆再拜奉送使副率太祝捧御容匣出宰執以下分左右前導出衍慶宫門外俟御容匣升車百官上馬後從旗幟甲馬錦衣人等分左右導香輿扇等前行至都門郊外俟御容車少駐導從官下馬車前立班再拜奉送使副側侍不拜班首詣香輿跪上香俛伏興還班再拜辭訖退使副遂行毎程到館或廨舍内安駐其道路儀衛紅羅傘一龍車一其制以青布為亭子狀安車上駕以牛又用駞五旗鼓共五十舁香輿一十人導從六十人執扇八人兵士百人䕶衛二十人以宗室明安穆昆子孫充所過州縣官屬公服出郭香果奉迎再拜班首上香奠酒又再拜送至郊外再拜乃退至會寧府官屬備香輿奉迎如上儀乘馬從至廟門外下馬分左右導引使副率太祝四員捧御容入廟于中門外東壁幄次内奉置定再拜訖退擇日奉安至日質明差去官與本府官及建廟官等並公服詣幄次前排立先再拜跪上香樂作奠酒訖又再拜太祝捧御容衆官前導引至殿下排立御容升殿奉安訖再拜班首升殿跪上香讀祝奠酒樂作少退再拜訖班首降階復位下闕三百五十二字于殿上又設親王宰執以下百官拜位于殿庭又設盥洗位于東階下執罍篚者位于其後又于神位前各設北向拜褥位并各設香案香爐匙合香酒花果器皿物等依前來例又於聖武殿上設香案爐匙合香等又于殿下各設腰輿一舁士一十六人傘子各二人執扇各十二人導從弩手各三十人前一日清齋親王于本府百官于其第行禮官執事人等習儀就祠所清齋其日質明禮官率太廟署官等詣崇聖閣奉世祖御容毎匣用内侍二人太祝一員禮官署官前導置于聖武殿神座禮直官引親王宰執百官公服于殿庭班立七品以下班于殿門之外贊者曰拜在位者皆再拜禮直官引班首詣罍洗盥手訖升殿詣神座前跪上香訖少退再拜禮直官引班首降殿復位贊者曰拜在位官皆再拜訖禮官導世祖御容升腰輿儀衛依次序導從至廣徳殿百官從後至庭下班位立禮官率太廟署官就腰輿内捧御容于殿上正面奉安訖百官于階下六品以下官于殿門外立班贊者曰再拜在位官皆再拜禮直官引班首詣盥洗盥手訖升殿執事官等徒升詣御容前跪上香奠酒教坊樂作少退再拜訖樂止禮直官引班首降殿復位贊者曰拜在位官皆再拜禮官率太廟署官詣崇聖閣太祝内侍捧太宗御容禮官導太宗御容于聖武殿行禮畢以次奉安于丕承殿行禮並如上儀次睿宗御容奉安于天慶殿禮亦如之俟奉安禮畢百官退世宗本紀大定十年十一月辛巳制盗太廟物者與盗宫中物論同禮志大定十二年議建閔宗别廟禮官援晉惠懐唐中宗後唐荘宗升祔故事若依此典武靈皇帝無嗣亦合升祔然中宗之祔始則為虚室終則増至九室恵懐之祔乃遷豫章頴川二廟荘宗之祔乃祧懿祖一室今太廟之制除祧廟外為七世十一室如當升祔武靈即須别祧一廟荀子曰有天下者事七世若旁容兄弟上毁祖考則天子有不得事七世者矣伏覩宗廟世次自睿宗上至始祖凡七世别無可祧之廟晉史云廟以容主為限無拘常數東晉與唐皆用此制遂增至十一室康帝承統以兄弟為一室故不遷逺廟而祔成帝唐以敬文武三宗同為一代于太廟東間増置兩室定為九代十一室今太廟已滿此數如用不拘常數之說増至十二室可也然廟制已定復議増展其事甚重又與睿宗皇帝祏室昭穆亦恐更改春秋之義不以親親害尊尊漢志云父子不並坐而孫可從王父若武靈升祔太廟増作十二室依春秋尊尊之典武靈當在十一室禘祫合食依孫從王父之典當在太宗之下而居昭位又當稱宗然前升祔睿宗已在第十一室累遇祫享睿宗在穆位與太宗昭位相對若更改祏室及昭穆序非有司所敢輕議宜取聖裁世宗本紀大定十三年四月辛巳更定盗宗廟祭物法禮志大定十六年四月十九日奉安世祖御容行朝謁之禮皇帝前一日齋于内殿皇太子齋于本宫親王齋于本府百官齋于其第太廟令率其屬于衍慶宫内外掃除設親王百官拜位於殿庭又設皇太子拜褥于親王百官位前宣徽院率其屬于聖武門外之東設西向御幄靈星門東設皇太子幄次其日有司列仗衛于應天門俟奉安御容訖有司于殿上并神御前設北向拜褥位安置香爐香案并香酒器物等皇太子比至車駕進發已前公服乗馬本官屬導從至衍慶宫門西下馬歩入幄次親王百官于衍慶宫門外西向立班俟車駕将至典贊儀引皇太子出幄次于親王百官班前奉迎導駕官五品六品七品職官内差四十員于應天門外道南立班以俟皇帝服靴袍乗輦從官繖扇侍衛如常儀勅㫖用大安輦儀仗一千人出應天門閤門通喝導駕官再拜訖閤門傳勅導駕官上馬分左右前導至廟門外西偏下馬車駕至衍慶宫門外稍西降輦左右宣徽使前導皇帝歩入御幄簾降閤門先引親王宰執四品以上執事官由東西偏門入至殿庭分東西班相向立典贊儀引皇太子入立于褥位之西東向進香進酒等執事官并升階于殿上分東西向以次立宣徽使跪奏請皇帝行朝謁之禮簾捲皇帝出幄宣徽使前導至殿上褥位北向立典贊儀引皇太子就褥位閤門引親王宰執四品已上執事官回班並北向立令中間歇空不礙奏樂五品以下聖武門外八品以下宫門外陪拜宣徽使跪奏請皇帝再拜教坊樂作皇太子以下羣官皆再拜請皇帝詣神御前褥位北向立又請皇帝再拜皇太子以下羣官皆再拜請皇帝跪三上香三奠酒俛伏興又請皇帝再拜皇太子以下羣官皆再拜訖皇帝復位又請皇帝再拜皇太子以下羣官皆再拜宣徽使奏禮畢以上擬八拜宣徽院奏過依舊例十二拜典贊儀引皇太子復立于褥位之西東向閤門引親王宰執以下羣官東西相向立先引五品以下官出宣徽使前導皇帝還御幄簾降典贊儀引皇太子閤門分引殿庭百官以次出宣徽使跪奏請皇帝還宫簾捲歩出廟門外升輦還宫如來儀世宗本紀大定十七年正月戊申詔以衍慶宫聖武殿西建世祖神御殿東建太宗睿宗神御殿禮志大定十九年四月禘祔閔宗遂増展太廟為十二室世宗本紀大定二十一年四月庚戌奉安昭祖以下三祖三宗御容于衍慶宫行親祀禮禮志大定二十一年閏三月奉㫖昭祖景祖奉安燕昌閣上肅宗穆宗康宗奉安閣下明肅皇帝奉安崇聖閣下毎位設黄羅幕一黄羅明金柱衣二紫羅地褥一龍牀一踏牀二衣全前期奏吉四月一日奉安五日親祀是年五月遷聖安寺睿宗皇帝御容于衍慶宫皇太子親王宰執奉迎安置世宗本紀大定二十九年正月癸巳上崩三月辛卯朔上尊諡廟號世宗禮志大定二十九年世宗将祔廟有司言太廟十二室自始祖至熈宗雖係八世然世祖與熈宗為兄弟不相為後用晉成帝故事止係七世若特升世宗顯宗即係九世於是五月遂祧獻祖昭祖升祔世宗明徳皇后顯宗于廟宣宗本紀貞祐三年七月丁丑肅宗神主至自中都奉安于明俊殿己卯明徳皇后神主至自中都八月太祖御容至自西京奉安于啟慶宫九月癸酉朝謁世祖太祖御容于啟慶宫行獻享禮始用樂甲戌朝謁太宗熈宗睿宗御容行獻享禮四年二月甲辰命參知政事李革為修奉太廟使權祔肅宗神主于世祖室奉世祖以下神主于隨室祭器以瓦代銅獻官以公服行事供帳等物並從儉約三月乙卯以将修太廟遣李革奏告祖宗神主于明俊殿五月癸丑朔禮官言太廟既成行都禮雖簡約惟以親行祔享為敬請權不用鹵簿儀仗及宫懸樂舞從之八月甲寅太子少保兼禮部尚書張行信定祔享親祀之儀以進上嘉納之十月己未親王百官奉迎祖宗神主于太廟辛酉上親行祔享禮甲子祔享禮成禮志貞祐二年宣宗南遷廟社諸祀並委中都自穆延盡忠棄城南奔時謁之禮盡廢四年禮官言廟社國之大事今主上駐蹕陪京列聖神主已遷於此宜重修太廟社稷以奉嵗時之祭案中都廟制自始祖至章宗凡十二室而今廟室止十一若増建恐難卒成况時方多故禮宜從變今擬權祔肅宗主世祖室始祖以下諸神主于隨室奉安主用栗依唐制皇統九年所定也祏室旁及上下皆石門東向以木為闔髹以朱室中有褥奠主訖帝主居左覆以黄羅帕后主居右覆以紅羅帕黼扆以紙木為筐兩足如立屏狀覆以紅羅三幅繡金斧五十四裹以紅絹覆於屏上其半無文者垂于其後置北墉下南向前設几筵以坐神主五席各長五尺五寸闊二尺五寸莞筵粉純以藺為席緣以紅羅以白繡蕙文及雲氣之状復以紅絹裹之毎位二繅席畫純以五色絨織青蒲為之緣以紅羅畫藻文及雲氣状亦以紅絹裹之毎位二在筦上次席黻純以輕筠為之亦曰桃枝席緣以紅綃繡鐵色斧裹以紅絹毎位二在繅席上虎席二大者長同惟闊増一尺以虎皮為褥有緼以紅羅繡金色斧緣之又有小虎皮褥制同三席時暄則用桃枝次席時寒則去桃枝加虎皮褥夏秋享則用桃枝次席二冬則去桃枝加小虎皮褥于繅席上臘冬則又添大虎皮褥二于繅上遷小虎皮褥二在大褥之上曲几三足直几二足各長尺五寸以丹漆之帝主前設曲几后設直几哀宗本紀正大元年三月戊申奉安宣宗御容于孝嚴寺四月癸酉宣宗祔廟蕙田案金太廟原廟神御殿畧如宋制然簡約多矣右金廟制五禮通考卷八十二
