body:
  text: 五禮通考卷一百五十八刑部尚書秦蕙田撰嘉禮三十一饗燕禮周禮天官膳夫王燕飲酒則為獻主注鄭司農云主人當獻賔則膳夫代王為主君不敵臣也燕義曰使宰夫為獻主臣莫敢與君亢禮疏謂王與臣以禮燕飲則膳夫為獻主案儀禮使宰夫為獻主此天子使膳夫為獻主皆是飲食之官代君酌臣酒正凡王之燕飲酒共其計酒正奉之注共其計者獻酬多寡度當足也春官鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之注龡之以管籥為之聲夏官太僕王燕飲則相其灋注相左右若疏此燕飲謂與諸侯燕公三燕侯伯再燕子男一燕之等或王與羣臣燕之等皆是秋官司儀王燕則諸侯毛注謂以須髪坐也朝事尊尊上爵燕則親親上齒鄭司農云謂老者在上也老者二毛故曰毛依疏此燕則公三燕侯伯再燕子男一燕朝事上爵者爵尊卑為先後燕則不問爵之尊卑取以年齒為先後也陳氏祥道曰於司儀見王所以燕諸侯者以齒也故曰王燕則諸侯毛於膳夫見王所以為燕者非自為主也故曰王燕飲則為獻主於太僕見王所以燕者必於内朝也故曰王燕則太僕相其法於酒正見王所以燕賔者必有多寡之數也故曰王燕則共其計於鞮鞻氏見王所以燕者必有樂也故曰掌四夷樂與其聲歌祭祀則龡而歌之燕亦如之然其牢禮之物獻酬之數衣服器皿之用與夫樂舞節奏皆不得而詳故孔頴達謂天子燕禮已亡也蕙田案以上天子燕禮禮記郊特牲三獻之介君專席而酢焉此降尊以就卑也注三獻卿大夫來聘主君饗燕之以介為賔賔為茍敬則徹重席而受酢也專猶單也疏謂諸侯遣卿來聘卿禮三獻其副為大夫與卿為介謂之三獻之介大夫席雖再重今為介降一席祗合專席主君若受此介之酢爵雖是諸侯合三重之席必徹去重席單席而受焉降諸侯之尊以就介之卑也五等諸侯之卿皆三獻若春秋之時則與此禮異若大國之卿則禮同子男故昭元年鄭人饗趙孟具五獻籩豆杜注朝聘之制大國之卿五獻其侯伯次國其卿與大國大夫同故昭六年季武子云下臣得貺不過三獻杜云大夫三獻是也蕙田案此諸侯燕聘賔之禮檀弓朝不坐燕不與注朝燕於寢大夫坐於上士立於下疏若路門外正朝則大夫以下皆立若燕朝在於路寢如孔子攝齊升堂則坐也燕禮獻卿大夫及樂作之後西階上獻士士既獻者立於東階下西面無升堂之文是士立於下蕙田案燕禮士非不與云不與者謂不與堂上之位又案此諸侯燕其臣之禮少儀凡祭於室中堂上無跣燕則有之注祭不跣者主敬也燕則有跣為歡也燕所尊在堂將燕降脱屨乃升堂凡飲酒為獻主者執燭抱燋客作而辭然後以授人注為宵言也主人親執燭敬賔示不倦也言獻主者容君使宰夫也末爇曰燋執燭不讓不辭不歌注以燭繼畫禮殺今疏禮賔主有讓及更相辭謝又各歌詩相顯既夜莫所以殺於三事蕙田案此燕時雜儀鄭康成詩譜其用於樂國君以小雅天子以大雅然而饗賔或上取燕或下就何者天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同疏左傳曰肆夏天子所以饗元侯魯語曰金奏肆夏繁遏渠天子所以饗元侯是天子饗元侯歌肆夏也則非元侯不得歌之肆夏頌之族類頌下惟有大雅故知於諸侯歌文王也傳又言文王兩君相見之樂是諸侯於鄰國之君亦歌文王與天子於諸侯同也鄉飲酒燕禮合樂皆降於升歌則知歌文王者當合鹿鳴歌肆夏者合文王也傳言金奏肆夏此云歌者凡樂之初作皆擊金奏之論語云始作翕如也鄭云始作謂金奏又左傳云歌鐘二肆是歌必以金奏之其實文王鹿鳴亦金奏肆夏亦工歌互言之也此歌在堂上故郊特牲云歌者在上貴人聲也其合樂則在堂下故降升歌一等元侯謂諸侯之長牧伯也牧伯與上公則為大國其餘侯伯為次國子男為小國非元侯也故總謂之諸侯用樂與兩君相見之樂同儀禮注云兩君相見歌大雅合小雅天子與次國小國之君燕亦如之是也仲尼燕居云兩君相見升歌清廟下管象彼兩元侯相見法也元侯相見亦與天子於元侯同不歌肆夏避天子也其元侯於次國小國亦當與諸侯於鄰國同天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合鄉樂疏天子諸侯於國君皆云饗於臣皆云燕所以見尊卑之禮異臣與國君别其等其實國君與臣饗燕皆有何者周禮掌客職曰上公三饗三燕是天子於諸侯饗燕俱有也鹿鳴天子小雅而序曰燕羣臣嘉賔也既飲食之箋云飲之而有幣酬即饗所用是天子於羣臣饗燕俱有也左傳曰晉侯使士㑹平王室定王饗之又曰晉士文伯如周王與文伯燕是天子於聘問之賔饗燕俱有也秋官司儀職曰凡諸公相為賔致饗食左傳曰公與晉侯燕於河上是諸侯相於饗燕俱有也左傳曰穆叔如晉晉侯饗之聘禮曰公於賔再饗一燕是諸侯於聘問之賔饗燕俱有也左傳曰季文子如宋致女復命公饗之燕禮燕已之臣子是諸侯自於羣臣饗燕俱有也其用樂由尊卑為差不由饗燕為異燕禮燕隣國聘問之賔歌鹿鳴晉侯饗穆叔歌鹿鳴之三三拜是其用樂同也故儀禮注引穆叔之辭乃云然則諸侯相與燕升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅所言用樂與此饗同是天子諸侯於國君饗燕同樂也此用樂之差謂升歌合樂為例其舞則燕禮云若舞則酌是諸侯於臣得用頌與此異也又郊特牲曰大夫之奏肆夏自趙文子始注云僣諸侯明諸侯得奏肆夏故郊特牲又曰賔入門而奏肆夏示易以敬注云賔朝聘者也又大射燕禮納賔皆云及庭奏肆夏及周禮注杜子春云賔來奏納夏之等皆謂賔始入及庭未行禮之時與升歌合樂别也蕙田案此論燕時之樂詩小雅鹿鳴序鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣箋飲之而有幣酬幣也食之而有幣侑幣也之疏燕禮賔惟一人而云羣臣皆為嘉賔者燕禮於客内立一人為賔使宰夫為主與之對行禮耳其實君設酒殽羣臣皆在君為之主羣臣總為賔也燕禮云若與四方之賔燕則迎之於大門内其燕皆與臣同則此嘉賔之中容四方之賔矣朱子曰君臣之分以嚴為主朝廷之禮以敬為主然一於嚴敬則情或不通而無以盡其忠告之益故先王因其飲食聚㑹而制為燕饗之禮以通上下之情而其樂歌又以鹿鳴起興而言其禮意之厚如此庶乎人之好我而示我以大道也序以此為燕羣臣嘉賔之詩而燕禮亦云工歌鹿鳴四牡皇皇者華即謂此也鄉飲酒用樂亦然而學記言大學始教宵雅肄三亦謂此三詩然則又為上下通用之樂矣豈本為燕羣臣嘉賔而作其後乃推而用之鄉人也與呦呦鹿鳴食野之苹我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行何氏楷曰鼓瑟吹笙即燕樂也瑟在堂上笙在堂下古者主人三獻禮成之後而樂作記所謂凡舉爵三作而不徒爵故作樂以樂之燕禮小臣納工工四人二瑟小臣左何瑟面鼓執越内弦右手相入升自西階北面東上坐小臣坐授瑟乃降工歌鹿鳴四牡皇皇者華卒歌笙入立於縣中奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀先鼓瑟而後吹笙故詩言之序如此承筐指幣帛言或疑燕禮無用幣之文兒燾謂周語云先王之燕體解節折而共飲食之於是乎有折俎加豆酬幣宴貨以示容合好則燕未嘗不用酬幣也呦呦鹿鳴食野之蒿我有嘉賔徳音孔昭視民不恌君子是則是傚我有㫖酒嘉賔式燕以敖箋徳音先王道徳之教也飲酒之禮於旅也語何氏楷曰燾謂此作樂坐燕之後而復行旅酬之禮時也鄉射禮云古者於旅也語疏義云賔筵之初禮樂方盛言語則慢矣迨至旅酬則禮已成樂已備於是而語乃無嫌也呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有㫖酒以燕樂嘉賔之心何氏楷曰八音以絲為君絲又以琴為君鄉飲酒禮二人皆左何瑟燕禮小臣左何瑟不及琴者以瑟見琴也燾謂首章言鼓瑟吹笙至此復言鼓瑟鼓琴者蓋旅酬既終作無算樂之時也先是作樂樂賔之後君命曰以我安皆對曰諾敢不安既而君曰無不醉皆興對曰諾敢不醉於是旅酬禮畢無算爵言以醉為節不限數也公有命徹冪然後皆升堂反坐無算樂向者獻酬有節笙歌間合皆三終今曰無算不拘三也此詩鼓瑟鼓琴重言義或因此伐木序伐木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民徳歸厚矣朱子曰此燕朋友故舊之樂歌伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聼之終和且平伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲洒掃陳饋八簋既有肥牡以速諸舅寧適不來㣲我有咎傳以筐曰釃以藪曰湑藇美貌羜未成羊也天子謂同姓諸侯諸侯謂同姓大夫皆曰父異姓則稱舅國君友其賢臣大夫士友其宗族之仁者粲鮮明貌圎曰簋天子八簋箋粲然已灑􅠜矣陳其黍稷矣謂為食禮聘疏此有酒有羜召族人飲之蓋是燕禮非饗也何則禮注云饗謂烹太牢以飲賔也今此惟肥羜而已是非饗禮明矣燕禮記云其牲狗不用羊豕此有肥羜者天子之禮異於諸侯也儀禮特牲少牢聘禮公食之等皆以簋盛黍稷則八簋是黍稷之器案周官掌客職五等諸侯簋皆十二又公食大夫禮上大夫八簋此天子云八簋者據待族人設食之禮知是食禮者燕禮主於飲酒無飯食則此簋盛黍稷是食禮可知伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失徳乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我迨我暇矣飲此湑矣傳衍美貌餱食也湑莤之也酤一宿酒也蹲蹲舞貌箋踐陳列貌兄弟父之黨母之黨此族人陳王之恩也王有酒則泲莤之王無酒酤買之要欲厚于族人為我擊鼓坎坎然為我興舞蹲蹲然謂以樂樂已又述王意曰及我今之閒暇共飲此湑酒欲其無不醉之意疏禮有同姓異姓庶姓同姓王之同宗是父之黨也異姓王舅之親庶姓與王無親者天子於諸侯非同姓皆曰舅不由有親無親則舅文又兼庶姓矣其中容有舅甥之親故通言母之黨也父黨母黨得同曰兄弟者兄弟是相親之辭推而廣之異姓亦得言之故釋親云父之黨為宗族母與妻之黨為兄弟此不言妻黨者以舅是母黨之稱故特言母耳其實妻黨亦曰兄弟釋親又曰妻之父為婚兄弟婿之父為姻兄弟是也朱子曰言人之所以至于失朋友之義者非必有大故或但以乾餱之薄不以分人而至于有愆耳故我于朋友不訃有無但及閒暇則飲酒以相樂也丘氏濬曰此詩可見人君之于其臣下非但有大燕饗若夫閒暇之時其于諸父諸舅朋友故舊亦必有燕飲以篤其恩義云何氏楷曰伐木文王季冬大飲三族也王居明堂禮季冬命國為酒以合三族君子説小人樂詩云迨我暇矣飲此湑矣謂嵗暮禮闋王者乃暇也禮有饗有食有燕此詩言有肥牡有肥羜是用太牢則同於饗言陳饋八簋籩豆有踐是有飯有殽則同于食言有酒湑我無酒酟我是無算爵言坎坎鼓我蹲蹲舞我是無算樂則同于燕兼是三者而有之禮之盛也三族有二義其一謂父子及身小記云以三為五以五為九是也其一謂父族及母族妻族也是詩有以速諸舅之言則當從後義魚麗序魚麗美萬物盛多能備禮也朱子曰此燕饗通用之樂歌案儀禮鄉飲酒及燕禮前樂既畢皆間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀然則此六者蓋一時之詩而皆為燕饗賔客上下通用之樂魚麗于罶鱨鯊君子有酒㫖且多魚麗于罶魴鱧君子有酒多且㫖魚麗于罶鰋鯉君子有酒㫖且有物其多矣維其嘉矣物其㫖矣維其偕矣物其有矣維其時矣朱子曰即燕饗所薦之羞而極道其美且多見主人禮意之勤以優賔也南有嘉魚序南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也箋樂得賢者與共立於朝相燕樂也朱子曰此亦燕饗通用之樂南有嘉魚烝然罩罩君子有酒嘉賔式燕以樂南有嘉魚烝然汕汕君子有酒嘉賔式燕以衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之翩翩者鵻烝然來思君子有酒嘉賔式燕又思朱子曰此亦因所薦之物而道達主人樂賔之意也南山有臺序南山有臺樂得賢也得賢則能為邦家立太平之基矣朱子曰此亦燕饗通用之樂南山有臺北山有萊樂只君子邦家之基樂只君子萬夀無期南山有桑北山有楊樂只君子邦家之光樂只君子萬夀無疆南山有把北山有李樂只君子民之父母樂只君子徳音不已南山有栲北山有杻樂只君子遐不眉夀樂只君子徳音是茂南山有枸北山有楰樂只君子遐不黄耉樂只君子保艾爾後蓼蕭序蓼蕭澤及四海也朱子曰諸侯朝于天子天子與之燕以示慈惠故歌此詩何氏楷曰蓼蕭諸侯繼世嗣封天子與之燕而歌此左傳襄二十六年齊侯如晉晉侯享之賦蓼蕭叔向命晉侯拜曰寡君敢拜齊君之安我先君之宗祧也昭十二年宋華定來聘通嗣君也享之為賦蓼蕭據二傳其一以賦此詩為安先君之宗祧其一以通嗣君之故賦此詩則其為繼世嗣封之詩明矣蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍為光其徳不爽夀考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令徳夀豈蓼彼蕭斯零露濃濃既見君子鞗革冲冲和鸞雝雝萬福攸同朱子曰其曰既見蓋于其初燕而歌之也湛露序湛露天子燕諸侯也箋燕謂與之燕飲酒也諸侯朝覲㑹同天子與之燕所以示慈惠湛湛露斯匪陽不晞厭厭夜飲不醉無歸傳厭厭安也夜飲私燕也階箋燕飲之禮宵則兩及庭門皆設大燭焉歐陽氏修曰露以夜降者也因其夜飲故近取以為比郝氏敬曰朝以朝旦禮主于辨也飲以昏夜情主于合也湛湛露斯在彼豐草厭厭夜飲在宗載考傳夜飲必於宗室箋豐草喻同姓諸侯也載之言則也考成也夜飲之禮在宗室同姓諸侯則成之於庶姓其讓之則止朱子曰宗室蓋路寢之屬也湛湛露斯在彼把棘顯允君子莫不令徳箋把也棘也異類喻異姓諸侯也令善也無不善其徳言飲酒不至于醉其桐其椅其實離離豈弟君子莫不令儀箋桐也椅也同類而異名喻二王之後也其實離離喻其薦俎禮物多於諸侯也飲酒不至于醉徒善其威儀而已謂陔節也菁菁者莪序菁菁者莪樂育材也君子能長育人材則天子喜樂之矣朱子曰此亦燕飲賔客之詩何氏楷曰朱傳以為燕飲賔客之詩子貢傳則云所以燕賢也申培説謂天子燕賔興之士則歌此詩陳氏疑為天子行禮于學校燕飲而歌此詩今案詩中無言及燕飲之事但以有歸美君子之辭則雖燕饗通用無不可者非為燕飲作也菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋汎汎楊舟載沉載浮既見君子我心則休詩小雅六月吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炰鼈膾鯉侯誰在矣張仲孝友箋吉甫既伐玁狁而歸天子以燕禮樂之則歡喜矣又多受賞賜也御侍也王以吉甫逺從鎬地來又日月長久今飲之酒使其諸友恩舊者侍之又加其珍美之饌所以極勸之也張仲吉甫之友其性孝友疏燕禮其牲狗天子之燕不過有牢牲魚鼈非常膳故云加之桑扈交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰百辟為憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪敖萬福來求箋兕觥罰爵也古之王者與羣臣燕飲上下無失禮其罰爵徒觩然陳設而已其飲美酒思得柔順中和與共其樂言不憮敖自淫恣也朱子曰此天子燕諸侯之詩何氏楷曰此諸侯春來朝天子而天子饗之之詩桑扈黄鳥俱春時所有非朝而何周禮九夏驁夏居其一杜子春謂公出入奏驁夏驁敖古俱通作傲此詩詠饗諸侯而末有彼交匪敖之語正與夏名相合則饗禮出入所奏其即此詩乎蕙田案何氏以桑扈即九夏之驁夏太鑿鴛鴦鴛鴦于飛畢之羅之君子萬年福禄宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乗馬在廄摧之秣之君子萬年福禄艾之乗馬在廐秣之摧之君子萬年福禄綏之朱子曰此諸侯所以答桑扈也魚藻魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居朱子曰此天子燕諸侯而諸侯美天子之詩瓠葉序瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼不肯用也故思古之人不以㣲薄廢禮焉朱子曰此亦燕飲之詩幡幡瓠葉采之亨之君子有酒酌言嘗之傳幡幡瓠葉貌庶人之菜也人箋亨熟也熟瓠葉者以為飲酒之菹也此君子謂庶之有賢行者也其農功畢乃為酒漿以合朋友習禮講道藝也酒既成先與父兄室人亨瓠葉而飲之所以急和親親也飲食而曰嘗者以其為之主于賔客賔客則加之以羞非疏士禮有特牲豚豕此止言瓠葉與兎首明有位之人故言庶人之菜王氏安石曰嘗其㫖否然後行獻酬之禮朱子曰蓋述主人之謙辭言物雖薄而必與賔客共之也有兎斯首炮之燔之君子有酒酌言獻之傳毛曰炮加火曰燔獻奏也以箋斯白也有兎白首者兎之小者也炮之燔之者將為飲酒之羞也飲酒之禮既奏酒于賔乃薦羞每酌言言者禮不下庶人庶人依士禮立賔主為酌名朱子曰有兎斯首一兎也猶數魚以尾也何氏楷曰公食大夫云上大夫庶羞二十加于下大夫以雉兎鶉鴽禮記内則紀諸膳有雉兎鶉鴽又有以兎為羮者内則云兎羮和糁不蓼又云雉兎皆有芼也有以兎為菹類者内則云兎為宛脾也有以兎為醢者周禮加豆之實芹菹兎醢内則云脯羮兎醢也此詩单舉兎一物而又以炮炙為言皆禮所不載内則云兎去凥則棄其後臀處不用故但舉首以顯之耳有兎斯首燔之炙之君子有酒酌言酢之傳炕火曰炙酢報也箋報者賔既卒爵洗而酌主人也凡治兎之宜鮮者毛炮之柔者炙之乾者燔之疏炕舉也謂以物貫之而舉于火上以炙之有兎斯首燔之炮之君子有酒酌言醻之傳醻道飲也箋主人既卒酢爵又酌自飲卒爵復酌進賔猶今俗之勸酒何氏楷曰禮主人導飲之後賔受爵却不飲奠于席前乃行旅酬之禮交錯以徧今此一獻禮薄當無旅酬之事蕙田案春秋傳趙武賦瓠葉而穆叔知其欲一獻則此詩蓋燕饗用一獻之正禮也禮有獻有酢有酬而後一獻之禮終故曰獻之禮成於酬此詩二章以下次第正與禮合周禮醢人所共七菹無瓠葉然賔客之禮醬用五十罋以五齏七菹七醢三臡實之尚不及其半禮文之不備者多矣經云采之亨之或亦取以芼羮如牛藿羊苦豕薇之類非為菹也庶羞用兎惟上大夫以上始有之毛鄭以為庶人之禮失之矣燕饗之品多矣於蔬云瓠葉於羞云兎舉其至薄者言之耳其云君子有酒與魚麗南有嘉魚諸詩之文同豈庶人足以當之乎大雅公劉篤公劉于京斯依蹌蹌躋躋俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之傳賔既登席坐矣乃依几矣曹羣也執豕于牢新國則殺禮也酌之用匏儉以質也為之君為之大宗也既疏此又言宫室就饗燕羣臣也吕氏祖謙曰既饗燕而定經制以整屬其民上則皆統于君下則各統于宗蓋古者建國立宗其事相湏楚執戎蠻子而致邑立宗以誘其逸民即其事也蕙田案公劉夏時之諸侯也詩述其燕飲羣臣之事云俾筵俾几則筵賔授几之禮也云執豕于牢則殽烝折俎之禮也云酌之用匏則酌獻酢酬之禮也云食之飲之則又兼饗食之禮矣云君之宗之則又兼族燕族飫之禮矣周公制禮蓋本乎此春秋文公四年左氏傳昔諸侯朝正于王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴昭五年左氏傳宴有好貨飱有陪鼎陳氏祥道曰先王之世近自九族同姓與夫兄弟朋友之親而逺至乎諸侯羣臣與夫蠻貊夷狄之邦莫不有恩以見其愛有文以盡其禮故禮行而天下服此古所為燕也行葦之詩或歌或咢洗爵奠斚燕九族同姓也常棣之詩兄弟既翕和樂且湛燕兄弟也伐木之詩矧伊人矣不求友生燕朋友也若燕諸侯則有湛露燕羣臣嘉賔則有鹿鳴而燕夷狄則所謂蓼蕭澤及四海是也蕙田案天子燕禮有六一燕諸侯來朝詩蓼蕭湛露是也二燕諸侯有功詩彤弓是也三燕羣臣詩鹿鳴是也四燕臣有功詩六月云吉甫燕喜是也五燕親戚故舊詩伐木是也六燕諸侯之聘客左傳王以文伯宴是也諸侯燕禮有五一兩君相燕司儀云諸公相為賔左傳晉侯以公燕于河上是也二燕羣臣儀禮燕禮是也三卿大夫有王事之勞及因聘而還燕之詩四牡勞使臣是也四燕四方聘客聘禮燕與時賜是也五燕天子之使左傳周公閲來聘饗之有饗則亦當有燕也儀禮惟有諸侯燕羣臣之禮其散見於他經者今並蒐採以補禮文之闕若夫祭畢之燕已見吉禮與族人燕已見飲食禮俱不載入右經傳燕禮春秋莊公十八年左氏傳虢公晉侯朝王王饗醴命之宥注王之覲羣后始則行饗禮先置醴酒示不忘古飲燕則命以幣物宥助也所以助歡敬之意言備設疏王饗醴命之宥者王為之設饗禮置醴酒命之以幣物所以助歡也周禮掌客王待諸侯之禮上公三饗三食三燕侯伯三饗再食再燕子男壹饗壹食壹燕三禮先言饗是王之覲羣后始則行饗禮也詩序曰鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意聘禮云若不親食使大夫朝服致之以侑幣致饗以酬幣亦如之是饗禮有酬幣也禮主人酌酒于賔曰獻賔答主人曰酢主人又酌以酬賔曰酬幣蓋于酬酒之時賜之幣也所賜之物即下玉馬是也傳稱饗醴命宥言其備設盛禮也此注命之宥者命在下以幣物宥助皆賜玉五㲄馬三匹非禮也注雙玉為㲄王命諸侯名位不同禮亦異數不以禮假人注侯而與公同賜是借人禮僖公二十五年左氏傳晉侯朝王王享醴命之宥注既行饗禮而設醴酒又加之以幣帛以助歡也宥助也請隧弗許曰王章也未有代徳而有二王亦叔父之所惡也與之陽樊温原櫕茅之田二十有八年左氏傳晉侯獻楚俘於王鄭伯傅王用平禮也注傅相也以周平王享晋文侯仇之禮享晉侯己酉王享醴命晉侯宥注既饗又命晉侯助以束帛以將厚意蕙田案以上天子饗諸侯僖公十二年左氏傳齊侯使管夷吾平戎於王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿徳謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣宣公十六年左氏傳晉侯使士㑹平王室定王享之原襄公相禮殽烝注烝升也升殽于俎也疏禮升殽于俎皆謂之烝故烝為升鄭𤣥詩箋云凡非榖而食之曰殽則殽是可食之名切肉為殽乃升于俎故謂之殽烝武子私問其故注享當體薦而殽烝故問之謂疏若公侯來朝王為設享則當有體薦薦其半體亦之房烝武子謂已被王享亦當房烝今乃殽烝故怪而問之王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也國語周語晉侯使随㑹聘於周定王饗之殽烝原公相禮随會私於原公曰吾聞王室之禮無毁折今此何禮也原公以告王召士季曰子弗聞乎禘郊之事則有全烝王公立飫則有房烝親戚宴饗則有殽烝今叔父使士季實來修舊徳以奬王室惟是先王之宴禮欲以貽女余一人敢設飫禘焉且惟戎翟則有體薦夫戎翟冒没輕儳貪而不讓不俟馨香嘉味故坐諸門外而使舌人體委與之今我王室一二兄弟以時相見將龢協典禮無亦擇其柔嘉選其馨香潔其酒醴品其百籩修其簠簋奉其犧象出其尊彞陳其鼎俎静其巾冪敬其祓除體解節折而共飲食之於是乎有折俎加豆胡有孑然其效戎翟也將焉用全烝武子遂不敢對而退歸乃講聚三代之典禮於是修執秩以為晉法春秋成公二年左氏傳晉侯使鞏朔獻齊㨗於周王使委於三吏禮之如侯伯克敵使大夫告慶之禮王以鞏伯宴而私賄之使相告之曰非禮也勿籍注籍書也昭公十五年左氏傳晉荀躒如周𦵏穆后籍談為介既葬除䘮以文伯宴樽以魯壺注魯壺魯所獻壺樽王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也蕙田案以上天子饗燕諸侯之大夫莊公二十一年左氏傳鄭伯享王於闕西辟樂備注樂備備六代之樂王與之武公之略自虎牢以東鄭伯之享王也王以后之鞶鑑與之注后王后也鞶帶而以鑑為飾也蕙田案此條諸侯饗天子又案大夫饗君謂之非禮則諸侯饗天子其非禮可知矣至莊二十年傳稱王子頽享五大夫樂及徧舞時子頽出惠王而自立故假天子饗羣臣之禮行之此僣亂之事惡可以言禮故削而不書僖公二十二年左氏傳楚子入享於鄭注為鄭所饗九獻注用上公之禮九獻酒而禮畢賔疏案儀禮主人酌以獻賔賔酢主人主人又酌以酬乃成一獻之禮九獻者九為獻酬而禮始畢也庭實旅百注庭中所陳品數百也加籩豆六品注食物六品加於籩豆籩豆禮食器饗畢夜出文芉送於軍取鄭二姬以歸叔詹曰楚王其不没乎為禮卒於無别無别不可謂禮將何以没諸侯是以知其不遂霸也二十四年左氏傳宋成公如楚還入於鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有䘮拜焉豐厚可也鄭伯從之享宋公有加禮也二十九年左氏傳冬介葛盧來以未見公故復來朝禮之加燕好注燕燕禮也好好貨也文公三年左氏傳公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜注俱還上成拜禮公賦嘉樂十三年左氏傳鄭伯與公宴於棐子家賦鴻雁季文子曰寡君未免于此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜成公三年左氏傳齊侯朝於晉晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也襄公九年左氏傳公送晉侯晉侯以公宴于河上問公年季武子對曰㑹于沙随之嵗寡君以生十年左氏傳宋公饗晉侯于楚丘請以桑林荀罃辭荀偃士匄曰諸侯宋魯于是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎舞師題以旌夏晉侯懼而退入于房去旌卒享而還注桑林殷天子之樂名師樂師旌夏大旌也題識也以大旌表識其行列十六年左氏傳晉侯與諸侯宴于温使諸大夫舞曰歌詩必類二十五年左氏傳莒子朝于齊饗諸北郭二十六年左氏傳齊侯鄭伯為衞侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也二十八年左氏傳蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為已心將得死乎三十一年左氏傳晉侯見鄭伯有加禮厚其宴好而歸之昭公三年左氏傳鄭伯如楚子産相楚子享之賦吉日既享子産乃具田備王以田江南之夢七年左氏傳楚子享公于新臺使長鬛者相好以大屈注宴好之賜大屈弓名既而悔之十一年左氏傳三月丙申楚子伏甲而饗蔡侯于申醉而執之夏四月丁巳殺之十二年左氏傳晉侯享諸侯子産相鄭伯辭于享請免喪而後聴命晉人許之禮也晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂穆子曰子失辭吾固師諸侯矣壺何為焉其以中儁也齊君弱吾君歸弗來矣穆子曰吾軍帥彊禦卒乗競勸今猶古也齊將何事公孫傁趨進曰日旰君勤可以出矣以齊侯出十七年左氏傳小邾穆公來朝公與之燕季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎郯子來朝公與之宴二十七年左氏傳公如齊齊侯請享之子家子曰朝夕立於其朝又何享焉其飲酒也乃飲酒使宰獻而請安注比公于大夫也禮君不敵臣宴大夫使宰為主獻獻爵也請安齊侯請自安不在坐也子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出定公十年左氏傳公㑹齊侯于祝其實夾谷孔子相齊侯將享公孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合享而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭徳也不昭不如其已也乃不果享疏諸侯相見之禮享在廟燕在寢不得行于野僖二十八年晉侯朝王于踐土王享醴命之宥襄十年宋公享晉侯于楚丘請以桑林十九年公享晉六卿于蒲圃二十七年鄭伯享趙孟于垂隴如此之類或特賞殊功或畏敬大國皆權時之事非正禮也孔子知齊懐詐慮其掩襲託正禮以拒之蕙田案以上兩君相饗燕僖公三十年左氏傳王使周公閲來聘饗有昌歜白黑形鹽注昌歜昌蒲菹白熬稻黑熬黍形鹽鹽形象虎辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉穀鹽虎形以獻其功吾何以堪之注嘉穀熬稻黍也以象其文也鹽虎形以象武也蕙田案此諸侯饗天子之大夫桓公九年左氏傳冬曹太子來朝賔之以上卿禮也享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也僖公二十三年左氏傳晉公子重耳及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜注古者禮㑹因古詩以見意欲言賦詩斷章也國語晉語公子過鄭鄭文公亦不禮焉遂如楚楚成王以周禮享之九獻庭實旅百公子欲辭子犯曰天命也君其享之亡人而國薦之非敵而君設之非天誰啟之心蕙田案重耳時為諸公子當以大夫之禮享之楚子乃為設九獻庭實旅百則以上公相待非禮之正故公子欲辭春秋文公四年左氏傳衛甯武子來聘公與之宴為賦湛露及彤弓注非禮之常公特命樂人以示意故言為賦不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王于是賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾十五年左氏傳宋華耦來盟公與之宴辭曰君之先臣督得罪于宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅魯人以為敏成公十二年左氏傳晉郤至如楚聘且涖盟楚子享之子反相為地室而懸焉注懸鐘鼓也郤至將登金奏作於下注擊鐘而奏樂奏疏朝賔入門而奏樂聘客至庭乃奏樂此將登堂始樂者縣當在庭而楚為地室而縣待客登堂乃奏皆所以見異驚而走出子反曰日云暮矣寡君須矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢注言此兩君相見之禮子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君須矣吾子其入也賔曰若讓之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝也于是乎有享宴之禮享以訓恭儉宴以示慈惠恭儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為已腹心股肱爪牙故詩曰赳赳武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣成公十四年左氏傳衛侯享苦成叔甯惠子相苦成叔傲甯子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔彼交匪傲萬福來求今夫子傲取禍之道也襄公四年左氏傳穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問于善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜八年左氏傳晉范宣子來聘公享之宣子賦摽有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓於襄王以為子孫藏匄也先君守官之嗣也敢不承命君子以為知禮十九年左氏傳公享晉六卿於蒲圃賜之三命之服軍尉司馬司空輿尉侯奄皆受一命之服賄荀偃束錦加璧乗馬先吳夀夢之鼎季武子如晉拜師晉侯享之范宣子為政賦黍苖季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈惟敝邑賦六月二十年左氏傳季武子如宋褚師段逆之以受享賦常棣之七章以卒宋人重賄之二十七年左氏傳六月丁未朔宋人享趙文子叔向為介司馬置折俎禮也注折俎體解節折升之於俎合卿宴之禮周禮司馬掌㑹同之事令疏周禮大司馬云大㑹同則帥士庶子而掌其政大祭祀饗食羞牲魚故宋人此享令司馬置折俎也仲尼使舉是禮也以為多文辭七月壬午宋公兼享晉楚之大夫趙孟為客注客一坐所尊子木與之言弗能對使叔向侍言焉子木亦不能對也鄭伯享趙孟於垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀第之言不踰閾况在野乎非使人之所得聞也子西賦黍苖之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾子之惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉往若保是言也欲辭福禄得乎楚薳罷如晉涖盟晉侯享之將出賦既醉叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政將焉往二十九年左氏傳范獻子來聘拜城杞也公享之展莊叔執幣注公將以酬賔射者三耦公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦疏燕禮云若射則大射正為司射是燕有射也此云公享之則享法亦有射也昭公元年左氏傳夏四月趙孟叔孫豹曹大夫入于鄭鄭伯兼享之子皮戒趙孟注戒享期禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻注瓠葉詩義取薄物而以獻酬知欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下注朝聘之制大國之卿五獻趙孟辭注趙孟自以今非聘鄭故辭五獻私於子産曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴注卿㑹公侯享宴皆折俎不體薦穆叔賦鵲巢趙孟曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安尨也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣飲酒樂趙孟出曰吾不復此矣昭公二年左氏傳晉韓宣子來聘公享之季武子賦緜之卒章韓子賦角弓季武子賦節之卒章聘於衛衞侯享之北宫文子賦淇澳宣子賦木𤓰六年左氏傳季孫宿如晉晉侯享之有加籩注籩豆之數多于常禮武子曰小國之事大國也茍免於討不敢求貺得貺不過三獻注周禮大夫三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢况下臣君之隷也敢聞加貺固請徹加而後卒事晉人以為知禮十二年左氏傳宋華定來聘享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懐寵光之不宣令徳之不知同福之不受將何以在十六年左氏傳晉韓起聘於鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而笑之注執政掌位列者禦止也縣樂肆疏諸侯享賔之禮亡惟有公食大夫存耳其禮云大夫納賔入門左及廟門公揖入賔入三揖至于階三讓公升二等賔升大夫立于東夾南西面北上士立于門東北面西上饗食事俱在廟則享位亦當然也孔張後至蓋賔入廟門乃始來至當從大夫適東夾之南西面位也張乃立于客間賔入未升階立于西方孔張入客行間也執政禦之適客後移立于客之西也又禦之適縣間適鐘磬樂肆之間也大射禮樂人宿縣于阼階東笙磬西面其南笙鐘其南鑮皆南陳西階之西頌磬東面其南鐘其南鑮皆南陳張初立客間已在西方被禦適客後又益西又被禦適縣間蓋又復益西入於頌磬鐘鑮之間也二十五年左氏傳宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也心之精爽是謂魂魄魂魄去之何以能久定公六年左氏傳季桓子如晉獻鄭俘也陽貨强使孟懿子往報夫人之幣晉人兼享之注賤魯故不復兩設禮十年左氏傳武叔聘於齊齊侯享之蕙田案以上諸侯饗燕鄰國之大夫宣公二年左氏傳晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下疏此飲趙盾酒是小飲酒耳非正燕禮燕禮獻酬之後方脱屨升堂行無算爵非止三爵而已其侍君小飲則三爵而退玉藻云三爵而油油以退是三爵禮訖自當退也成公九年左氏傳季文子如宋致女復命公享之賦韓奕之五章穆姜出於房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入襄公三年左氏傳晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍疏與之禮食者若公食大夫禮以大夫為賔公親為之特設禮食十四年左氏傳孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章二十年左氏傳季武子如宋歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也二十六年左氏傳鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑昭公九年左氏傳晉荀盈卒於戲陽殯於絳未𦵏晉侯飲酒樂饍宰屠蒯趨入請佐公使尊許之而遂酌以飲工曰女為君耳將司聰也辰在子卯謂之疾日君徹宴樂學人舍業為疾故也君之卿佐是為股肱股肱或虧何痛如之女弗聞而樂是不聰也又飲外嬖嬖叔曰女為君目將司明也服以旌禮禮以行事事有其物物有其容今君之容非其物也而女不見是不明也亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也公説徹酒禮記檀弓知悼子卒未𦵏平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀七是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至於今既畢獻斯揚觶謂之杜舉春秋哀公十六年左氏傳衛侯飲孔悝酒於平陽重酬之大夫皆有納焉醉而送之夜半而遣之二十五年左氏傳衛侯為靈臺於藉圃與諸大夫飲酒焉禇師聲子韈而登席注古者見君解韈公怒辭曰臣有疾異於人若見之君將㱿之是以不敢公愈怒大夫辭之不可公宴於五梧武伯為祝注上夀酒惡郭重曰何肥也季孫曰請飲彘也以魯國之宻邇仇讐臣以不獲從君克免於大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂蕙田案以上諸侯饗燕其臣飲酒附襄公二十七年左氏傳齊慶封來聘叔孫與慶封食不敬為賦相䑕亦不知也昭公二年左氏傳晉韓宣子來聘既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公蕙田案以上大夫饗聘客莊公二十二年左氏傳陳公子完飲桓公酒樂注齊桓賢之故就其家㑹據主人之辭故言飲桓公酒叔疏春秋之世設享禮以召君者皆大臣擅寵如衛公文子宋向魋之徒始為之耳非禮法也敬仲羈旅之臣且知禮者也必不召公臨已知桓公賢之自就其家㑹也公曰以火繼之辭曰臣卜其晝未卜其夜不敢疏服䖍云臣將享君必卜之示戒慎也此桓公自就其家非敬仲發心請享蓋桓公告其往日乃卜之耳夜飲之禮在宗室同姓則成于庶姓讓之則止敬仲非齊同姓故不敢也君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也昭公元年左氏傳秦后子享晉侯注為晉侯設享禮造舟于河注造舟為梁通秦晉之道十里舍車注一舍八乗為八反之備自雍及絳注雍絳相去千里用車八百乗歸取酬幣注備九獻之儀始禮自齎其一故續送其八酬酒幣疏每一獻酒必有幣帛以随之后子自齎其一以為初獻故續送其八也飲酒之禮主人初獻于賔賔酢主人主人受賔之酢禮飲訖又飲乃酌以酬賔如是乃成為一獻于酬之時始有幣以勸飲故以為酬酒幣也終事八反注每十里以八乗車各以次載幣相授而還不徑至故言八反定公十三年左氏傳初衞公叔文子朝而請享靈公注欲令公臨其家退見史鰌而告之史鰌曰子必禍矣子富而君貪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免戌也驕其亡乎哀公十四年左氏傳宋桓魋之寵害於公公使夫人驟請享焉而將討之未及魋先謀公請以鞌易薄公曰不可薄宗邑也乃益鞌七邑而請享公焉以日中為期家備盡往公知之蕙田案以上大夫饗君成公五年左氏傳宋公子圍龜為質於楚而歸華元享之請鼓譟以出鼓譟以入注出入輙擊鼓曰習攻華氏宋公殺之襄公二十三年左氏傳季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽絜之召悼子降逆之大夫皆起及旅而召公鉏注獻酬禮畢通行為旅使與之齒季孫失色二十八年左氏傳齊慶封來奔叔孫穆子食慶封慶封氾祭注氾祭逺散所祭不共穆子不説使工為之誦茅鴟亦不知昭公四年左氏傳叔孫為孟鐘曰爾未際饗大夫以落之哀公七年左氏傳季康子欲伐邾乃饗大夫以謀之國語魯語公父文伯飲南宫敬叔酒路堵父為客羞鼈小堵父怒相延食鼈辭曰將使鼈長而後食之遂出文伯母聞之怒曰吾聞之先子曰祭養上尸享養上賔鼈於何有而使夫人怒也蕙田案以上大夫相饗食春秋莊公四年春王二月夫人姜氏享齊侯于祝丘杜注享食也兩君相見之禮非夫人所用直書以見其失汪氏克寛曰春秋傳晉侯饗齊侯宋公饗晉侯楚子饗公小邾子郯子來朝公與之燕公饗宰周公范宣子饗晉六卿于蒲圃寗俞華耦來公與之燕至鄭伯饗王王饗晉侯經皆不書而書夫人饗齊侯則以其非禮也蕙田案此夫人饗諸侯右春秋饗燕五禮通考卷一百五十八
