body:
  text: 五禮通考卷二百十二刑部尚書秦蕙田撰嘉禮八十五體國經野地理通釋五代所有州梁唐晉漢周皆以藩鎮更為帝職方攷梁初天下别為十一國南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳳階成四州而營平二州陷於契丹其増置之州一寰合一百二十三州以為晉石氏入獻十有六州於契丹幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚而得蜀金州又増置之州一威合一百九州以為晉劉氏之初秦鳳階成復入於蜀隱帝時増置之州一觧合一百六州以為漢郭氏代漢十州入於劉旻世宗取秦鳳階成瀛莫及淮南十四州又増置之州五濟濱雄霸通而廢者三衍武景合一百一十八州以為周軍不在焉五代置軍六皆寄治于縣𨽻于州故不别出地志五代梁梁都洛陽謂之西都以汴州為東都開封府而廢京兆府為雍州友貞嗣立復都汴州有州七十有八五代志朱温新置州一曰輝州後唐改曰單州初治今徐州碭山縣後治今兖州府單縣唐既滅梁莊宗初即位於魏州因以州為東京興唐府而以太原為西京鎮州為北都滅梁後都洛復京兆為西都太原為北都洛陽為東都亦曰洛京而開封仍稱宣武軍北都仍曰鎮州東京改為鄴都又西并鳳翔唐既滅梁李茂貞稱臣奉貢改封秦王茂貞卒以其子繼曮為鳳翔節度使遂盡取其汧隴七州地南收巴蜀唐遣郭崇韜伐蜀入散關山南諸州望風降下至興州劒南諸州皆來降進至利州趨綿州入鹿頭闗據漢州王衍迎降以孟知祥董璋為兩川節度使散關即大散關也鹿頭關在今成都府漢州徳陽縣北三十里及同光之亂兩川復失同光末内外離叛莊宗為伶人郭從謙所弑嗣源自大梁入洛陽即帝位孟知祥等知中原多故謀據兩川唐遣兵攻之不克於是兩川及山南凡四十餘州皆陷唐所得者秦鳳階成四州而已明宗時有州一百二十五五代志後唐增置之州二曰寰州今大同府朔州馬邑縣曰府州今延安府葭州府谷縣而營平二州已沒於契丹時契丹强盛入渝闗芻牧于營平間為幽并患渝關即山海闗石晉興戎以燕雲十六州賂契丹十六州為幽薊瀛莫檀涿順新媯儒武雲寰應朔蔚也新今北直保安州儒今北直延慶州武今大同府朔州西百五十里之廢武州也亦曰毅州應今大同府應州輿地廣紀俱唐末置又山前山後十六州者幽薊瀛莫涿檀平順為山前八州新媯儒武雲應朔蔚為山後八州也平州先沒寰州後置故此有寰州而無平州云大梁未傾晉自洛陽徙都汴升汴州為東京開封府以洛陽為西京改西都為晉昌軍興唐府為廣晉府亦曰鄴都云有州一百有九晉亡十六州於契丹而取蜀州一曰金州又増置州一曰威州治今慶陽府環縣契丹南牧始終晉緒契丹屢冦河北至是自易定趨恒州晉遣杜威帥諸軍禦之威以衆降契丹遂從邢相而南渡白馬入大梁執晉主重貴徙之黄龍府黄龍府在今遼東開元衛北六百餘里劉氏保有晉陽遂成漢業南入大梁漢因晉都改晉昌為永興軍廣晉為大名府有州一百有六時秦鳳階成四州復入於蜀増置一州曰觧州今平陽府解州也郭威守鄴舉兵内向代漢稱周周因漢都廢鄴都止稱大名府幅􅊷未廣時河東十州入於劉崇世宗西克階成遣王景伐蜀克階成秦鳳四州南收江北伐南唐取揚泰滁和海楚泗濠夀光廬舒蘄黄十四州泰州今屬揚州府南唐所置州也北奠三關三關一曰益津關今順天府霸州也一曰瓦橋關今保定府雄縣一曰髙陽關今保定府安州髙陽縣通釋霸州東淤口關也時世宗伐契丹取瀛莫定三關有州一百十有八周失河東十州取巴蜀四州南唐十四州契丹二州又増置五州曰濟州治今兖州府濟寜州鉅野縣唐天寳後濟州廢至是改置曰濵州今濟南府濵州也曰雄州即今雄縣曰霸州即今州曰通州今揚州府通州也又廢三州曰衍州曰武州曰景州地志宋都邑考宋都大梁曰東京開封府以洛陽為西京河南府以歸德為南京應天府而大名府為北京稱四京南渡後以杭州為臨安府遂定都焉分天下為十五路宋制十五路轉運經略安撫等使罷節鎮所領支郡軍監與州府同列京東領府二州十五軍四監二開封即今府應天今歸徳府也兖州徐州曹州青州鄆州宻州齊州濟州沂州登州萊州淄州濮州見唐河南道注而濟州治鉅野單州濰州治今萊州府平度州濰縣廣濟軍今兖州府曹州定陶縣清平軍今濟南府章邱縣淮陽軍今淮安府邳州宣化軍今青州府髙苑縣也萊蕪監今濟南府泰安州萊蕪縣利國監在今徐州東北九十里盤馬山下志曰京東路東至海西距汴南極淮泗北薄於河以開封府守臣兼領而兖州亦曰襲慶府曹州亦曰興仁府青州曰鎮海軍鄆州亦曰東平府宻州亦曰安化軍齊州亦曰濟南府濰州亦曰北海軍徽宗時又増置拱州亦曰保慶軍今歸德府睢州也京西領府一州十六軍二河南今府也滑州鄭州汝州陳州許州蔡州潁州孟州見唐河南道注唐州鄧州襄州均州房州金州隨州郢州見唐山南道注而唐州治今南陽府泌陽縣信陽軍即唐申州也光化軍今襄陽府光化縣也志曰京西路東接汝潁西距崤函南逾漢沔北抵河津以河南守臣兼領而滑州亦曰武成軍汝州亦曰陸海軍陳州亦曰淮寜府許州亦曰潁昌府潁州亦為順昌軍又為順昌府襄州亦曰襄陽府隨州亦曰崇義軍金州亦曰昭化軍信陽亦曰義陽軍云河北領府三州二十二軍十四大名今府河間今府真定今府也貝州博州徳州滄州棣州深州洺州邢州冀州趙州定州莫州相州懐州衛州澶州磁州祁州見唐河北道注而深州移治静安今州治也濵州雄州霸州霸州治今霸州文安縣保州即今保定府也德清軍今大名府清豐縣保順軍今濵州海豐縣永静軍今河間府景州破鹵軍即霸州東淤口砦平戎軍今順天府霸州保定縣静戎軍今保定府安肅縣威鹵軍今安肅縣西二十五里廢遂城縣乾寜軍今河間府青縣順安軍今保定府安州髙陽縣寜邉軍今保定府博野縣天威軍今真定府井陘縣承天軍今真定西娘子關是靜安軍在深州城内通利軍今大名府濬縣也志曰河北路東至海西薄大行南臨河北據三關以大名守臣兼領而河間府亦曰瀛海軍貝州亦曰恩州邢州亦曰信德府冀州亦曰安武軍趙州亦曰慶源軍亦曰慶源府定州亦曰定武軍亦曰中山府澶州亦曰開德府保州亦曰安塞軍破鹵軍亦曰信安軍平戎軍亦曰保定軍靜戎軍亦曰安肅軍威鹵軍亦曰廣信軍乾寜軍亦曰清州寕邉軍亦口永寕軍通利軍亦曰濬州又為安利濬川平川等軍後又置平北軍今保定府完縣也河東領州十七軍六監二并州代州忻州汾州遼州澤州潞州晉州絳州慈州隰州石州嵐州憲州見唐河東道注而并州移治陽曲即今府治憲州移治靜樂今太原府屬縣豐州麟州見唐關内道注府州平定軍今太原府平定州火山軍今太原府河曲縣定𦍑單今太原保徳州寜化軍在太原岢嵐州嵐縣東北岢嵐軍今州威勝軍今沁州大通監今太原交城縣永利監今太原府太原縣志曰河東路東際常山西逾河南距厎柱北塞雁門以太原府守臣兼領而并州亦曰太原府潞州亦曰昭德軍亦曰除德府晉州亦曰平陽府慈州亦曰吉鄉軍麟州亦曰建寕軍亦曰鎮西軍府州亦曰靖康軍定羗軍亦曰保德軍而豐州沒于夏慶歴中于府谷北僑置又増置晉寜軍今延安府葭州也又増置慶祚軍今平陽府趙城縣也底柱山在今河南府陜州東北四十里陜西領府三州二十五軍四監二京兆今西安府河中今平陽府之蒲州鳳翔今府也同州華州丹州延州鄜州坊州邠州寜州涇州原州慶州隴州乾州耀州見唐關南道注秦州成州階州見唐隴右道注而秦州移治成紀今州治也階州移治福津今州東七十里廢福津縣是商州鳳州見唐山南道注虢州見唐河東道注陜州見唐河南道注環州解州五代漢所置州也渭州今平凉府治是義州治今平凉府華亭縣保安軍今延州府保安縣慶成軍今平陽府蒲州滎河縣鎮戎軍今平凉府固原州北百二十里鎮戎所是德順軍今平凉府静寜州也開寳監今鞏昌府徽州兩當縣沙苑監在今同州南十二里志曰陜西路東盡崤函西包汧隴南連商洛北控蕭關以京兆守臣兼領而京兆亦曰永興軍華州亦曰鎮潼軍延州亦曰延安府寜州亦曰興寜軍涇州亦曰彰化軍慶州亦曰慶陽府秦州亦曰雄武軍陜州亦曰保平軍耀州亦曰感義軍又為感德軍乾州亦曰醴州後又復唐之綏州亦曰綏德軍又復銀州旋廢為銀川城又復唐之㑹州河州岷州蘭州洮州廓州而岷州治今衞東廢祐川縣又復唐之鄯州亦曰西寜州又為賔徳軍又増置定邉軍在今慶陽府北三百里又置懐德軍今平凉府鎮原縣西百里廢平夏城也又於唐之臨川置鎮洮軍亦曰熙州今臨洮府治是又置湟州亦曰嚮德軍又為樂州在今西寜衛東南二百里又置震武軍在樂州北境又置積石軍在今西寜衛廢廓州西百八十里又置西安州今固原州西北二百三十里西安所是又置清平軍今西安府盩厔縣東廢終南縣也蕭關見唐關内道注淮南領州十八軍三監二揚州楚州濠州夀州光州黄州蘄州舒州廬州和州滁州見唐淮南道注而夀州治下蔡今州北三十里廢城是海州泗州亳州宿州見唐河南道注泰州通州真州今揚州府儀真縣也漣水軍今淮安府安東縣髙郵軍今揚州府髙鄜州無為軍今廬州府無為州也利豐監在通州西南四里海陵監今泰州如臯縣志曰淮南路東至海西抵睢漢南瀕江北據淮以揚州守臣兼領而夀州亦曰夀春府光州亦曰光山軍舒州亦曰安慶府又為德慶軍亳州亦曰集慶軍真州亦曰建安軍通州亦曰静海軍宿州亦曰保静軍徽宗時又増置六安軍今六安州也睢水出河南歸德府夏邑縣南經江南徐宿等州境至淮安府邳州宿遷縣東南合大河江南領府一州十三軍六江寜今府也宣州歙州池州饒州撫州江州洪州袁州吉州䖍州信州太平州即南唐之雄逺軍筠川廣德軍今廣德州南康軍今江西南康府興國軍今武昌府興國州臨江軍今江西臨江府南安軍今江西南安府建昌軍志曰江南路東限閩海西界夏口南抵大庾北際大江以江寜守臣兼領而江寜府亦曰昇州亦曰建康軍䖍州亦曰贛州太平州亦曰南平軍興國軍亦曰永興軍湖南領州七監一潭州衡州道州永州邵州郴州全州桂陽監志曰湖南路東據衡岳西接蠻獠南阻五嶺北界洞庭以潭州守臣兼領徽宗時又増置武岡軍今寳慶府武岡州也湖北領府一州九軍二江陵今荆州府也鄂州岳州澧州辰州復州峽州歸州鼎州即唐江南道朗州安州唐淮南道屬州也漢陽軍即唐沔州荆門軍今荆門州也志曰湖北路東盡鄂渚西控巴峽南抵洞庭北限荆山以江陵守臣兼領而岳州亦曰岳陽軍安州亦曰徳安府後又置沅州即唐巫州也改治州西盧陽縣即唐錦州治又置誠州亦靖州即今州也兩浙領州十四軍二杭州睦州湖州蘇州常州閏州婺州衢州温州處州台州明州越州秀州江隂軍順化軍志曰兩浙路東至海南接嶺島西控太湖北枕大江以杭州守臣兼領而杭州亦曰寜海軍睦州亦曰建徳軍又為嚴州蘇州亦曰平江軍後又為平江府潤州亦為鎮江府湖州亦曰昭慶軍婺州亦曰保寜軍溫州亦曰應道軍明州亦曰奉國軍福建領州六軍二福州泉州建州汀州漳州南劍州興化軍今府邵武軍今府志曰福建路東南據海西北距嶺以福州守臣兼領而泉州