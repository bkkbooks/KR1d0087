者及庭盥於洗陞自西階入於東房立於主贊冠者之南西面主贊冠者導冠者立於房外之西南面賓贊冠者取纚櫛簪跪奠於冠者筵南端退立於席北少東西面賓揖冠者冠者進升席西向坐賓贊冠者進筵前東面跪脫雙童髻櫛畢設纚興復位立賓降至罍洗盥訖詣西階主者立於席後西面賓立於西階上東面執緇布冠者升賓降一等受之右執項左執前進冠者筵前東向立祝用士禮祝詞祝畢跪冠興復位賓贊冠者進筵前東面跪結纓興復位冠者興賓揖之適房賓主皆坐冠者衣青衣素裳出戸西南面立賓主俱興賓揖冠者冠者進升席西向坐賓贊冠者跪脫緇布冠櫛畢設纚賓進進賢冠如初加禮祝用士禮詞易萬年為永年易胡福為遐福祝畢跪冠興復位賓贊冠者跪設簪結纓興復位冠者適房易絳紗服出升席賓贊冠者跪脫進賢冠櫛畢設纚賓進爵弁如再加禮祝用士禮詞祝畢賓贊冠者設簪結纓如前冠者適房著爵弁之服出主贊冠者徹纚櫛簪箱及筵入於房又設筵於室戸西南向冠者出房戸西南面立主贊洗觶於房酌醴出南面立賓揖冠者就筵西南面立賓受醴進冠者筵前北面立祝畢冠者拜受觶賓復西階上答拜執饌者薦饌於筵冠者左執觶右取脯祭於籩豆之間贊者取胏一以授冠者奠觶於薦西以祭冠者坐取觶祭醴奠觶再拜賓答拜冠者執觶興賓主俱坐冠者升筵跪奠觶於薦東興進北面跪取脯降自西階入見母進奠脯於席前退再拜出母不在則使人受脯於西階下初冠者入見母賓主俱興賓降當西序東面立主者降當東序西面立冠者出立於西階東南面賓少進字之辭同士禮冠者再拜跪曰某不敏夙夜祇奉賓出主者送於内門外西向請禮從者賓就次主者入初賓出冠者東面見諸親諸親拜之冠者答拜冠者西向拜賓贊冠者亦答拜見諸尊於别室亦如之賓主既釋服入醴席一獻訖賓與衆賓出次立於門東西面主者出揖賓賓報揖主者先入賓及衆賓從之至階賓立於西階上主者立於東階上衆賓立於西階下主者授幣篚於賓又授賓之贊冠者復位還阼階上北面拜送賓贊降自西階主者送賓於大門外西面再拜而入孤子則諸父諸兄戒賓冠之日主者紒而迎賓冠於阼階下其儀亦如之明日見廟冠者朝服入廟南門中庭道西北面再拜出蕙田案明集禮云後世所謂品官葢即古之大夫也古之大夫無冠禮大夫五十而後爵何冠禮之有其冠也則服士服行士禮而已自唐至宋品官冠禮悉倣士禮而増益至於冠制則一品至五品三品俱用冕六品而下三加用爵弁焉明㑹典品官之儀始加緇布冠再加進賢冠三加爵弁以為一代通行之制庶人冠禮凡男子年十五至二十皆可冠將冠筮日筮賓於祠堂戒賓俱如品官儀是日夙興張帷為房於㕔事東皆盛服設盥於阼階下東南陳服於房中西牖下席二在南酒在服北次幞頭帽巾各盛以盤三人捧之立於堂下西階之西南向東上主人立於阼階下諸親立於盥東儐者立於門外以俟賓冠者雙紒袍勒帛素履待於房賓至主人出迎揖而入坐定冠者出於房執事者請行事賓之贊者取櫛總篦幧頭置於席南端賓揖冠者冠者即席西向坐贊者為之櫛合紒施總加幧頭賓降主亦降立於阼階下賓盥主人揖讓升自西階復位執事者進巾賓降一等受之詣冠者席前東向祝詞同品官祝訖跪著巾興復位冠者興賓揖之入房易服深衣大帶出就冠席賓盥如初執事者進帽賓降二等受之進祝跪冠訖興復位揖冠者入房易服襴衫腰帶出就冠席賓盥如初執事者進幞頭賓降三等受之進祝跪冠訖興復位揖冠者入房易公服出執事者徹冠席設醴席於西階南向贊者酌醴出房立於冠者之南賓揖冠者即醴席西向立賓受醴詣席前北面祝冠者拜受賓答拜執事者薦饌冠者即席坐飲食訖再拜賓答拜冠者離席立於西階之東南向賓字之如品官辭冠者拜賓答拜冠者拜父母父母為之起拜諸父之尊者遂出見鄉先生及父之執友先生執友皆答拜賓退主人請禮賓賓辭固請乃入就坐設酒饌賓退主人酬賓贊侑以幣禮畢主人以冠者見於祠堂再拜出蕙田案儀禮所存者惟士冠禮後世之所謂冠儀皆推士禮為之者也其大夫諸侯天子冠禮雖見於家語冠頌大戴公冠與禮記特牲玉藻國語而遺文殘闕漢魏迄明其儀注損益亦毎不同冠則隨時尊用有一加二加三加四加之殊祝辭則或用古或新製醴則専用酒而或一醴或三醮冠之所則或於廟或於朝廷或於邸或於别殿告則或兼兩郊或止宗廟天子則或親臨或遣使持節至有以皇帝而下臨臣子之冠以男冠而推為女子之笄致不一焉要其初本無古禮可據亡於禮者之禮亦惟存其意而已雖書儀家禮亦猶是爾右金明禮記曲禮女子許嫁笄而字黄氏震曰字以尊名男冠女笄皆成人而字惟君父之前則名雜記女子十有五年許嫁笄而字雖未許嫁年二十而笄醴之婦人執其禮燕則鬈首注雖未許嫁年二十亦為成人矣醴之酌以成人言婦人執其禮明非許嫁之笄既笄之後去之猶若女有鬌結也疏賀瑒云十五許嫁而笄則主婦及女賓為笄禮主婦為之著笄而女賓以醴禮之也未許嫁而笄則婦人禮之無女賓不備儀也劉氏璋曰笄今簪也婦人之首飾也女子笄則當許嫁之時然嫁止於二十以其二十而不嫁則為非禮内則女子十有五年而笄呂氏坤曰笄翟形成人之飾也春秋公羊傳婦人許嫁笄而字之死則以成人之喪埋之注謂不為殤也魯僖公九年伯姬卒是也沈氏佳曰古者男子冠而字之儀禮賓字之檀弓云幼名冠字伯仲某甫是也女子幼名笄字如孟光字徳耀班昭字惠姬是也周制許嫁笄而醴之稱字女子未許嫁則二十而笄不字易屯九二爻辭女子貞不字十年乃字是也故朱子本義云字謂許嫁也其實女子有字字非許嫁之謂也謂許嫁乃稱字也呂氏坤曰古婦人名今不名不名何字鳥獸草木未有不名者士女不名不字鄙也夫唐開元禮義鑑禮云雖未嫁年二十而笄其儀如冠男子但用酒醮之為異耳禮云女子著笄明有繫屬故笄在許嫁二十而笄者禮云女子許嫁為成人故著笄焉明在繫屬於外若未許嫁年二十而笄以其成人非謂繫嫁也故禮記言婦人執其禮明非許嫁之笄許嫁笄當使主婦對女賓執其禮是二十未許嫁未許嫁有笄之義也宋史禮志公主笄禮年十五雖未議下嫁亦笄笄之日設香案於殿庭設冠席於東房外坐東向西設醴席於西階上坐西向東設席位於冠席南西向其裙背大袖長裙褕翟之衣各設於椸陳於庭冠笄冠朶九翬四鳳冠各置於槃蒙以帕首飾隨之陳於服椸之南執事者三人掌之櫛總置於東房内執事宫嬪盛服旁立俟樂作奏請皇帝陞御坐樂止提舉官奏曰公主行笄禮樂作贊者引公主入東房次行尊者為之總髻畢出即席西向坐次引掌冠者東房西向立執事奉冠笄以進掌冠者進前一步受之進公主席前北向立樂止祝曰令月吉日始加元服棄爾幼志順爾成徳夀考綿鴻以介景福祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事者奉裙背入服畢樂作公主就醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰酒醴和㫖籩豆静嘉受爾元服兄弟俱來與國同休降福孔皆祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹饌復引公主至冠席坐樂止贊冠者至席前贊冠者脫冠置於槃執事者徹去樂作執事者奉冠以進掌冠者進前二步受之進公主席前北向立樂止祝曰吉月令辰乃申爾服飾以威儀淑謹爾徳眉夀永年享受遐福祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事奉大袖長裙入服畢樂作公主至醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰賓贊既戒殽核惟旅申加爾服禮儀有序允觀爾成永天之祜祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹饌復引公主至冠席坐樂止贊冠者至席前贊冠者脱冠置於槃執事者徹去樂作執事奉九翬四鳳冠以進掌冠者進前三步受之進公主席前向北而立樂止祝曰以嵗之吉以月之令三加爾服保兹永命以終厥徳受天之慶祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事奉褕翟之衣入服畢樂作公主至醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰㫖酒嘉薦有飶其香咸加爾服眉夀無疆永承天休俾熾而昌祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹饌復引公主至席位立樂止掌冠詣前相對致辭曰嵗日具吉威儀孔時昭告厥字令徳攸宜表爾淑美永保受之可字曰某辭訖樂作掌冠者退引公主至君父之前樂止再拜起居謝恩再拜少俟提舉進御坐前承㫖訖公主再拜提舉乃宣訓辭曰事親以孝接下以慈和柔正順恭儉謙儀不溢不驕毋詖毋欺古訓是式爾其守之宣訖公主再拜前奏曰兒雖不敏敢不祗承歸位再拜見后母之禮如之禮畢公主復坐皇后稱賀次妃嬪稱賀次掌冠贊冠者謝恩次提舉衆内臣稱賀其餘班次稱賀並依常式禮畢樂作駕興樂止蕙田案公主笄禮於他書不詳即政和御製冠禮亦未及也惟宋史載此儀皇帝親臨於内殿三加三醮葢倣庶子冠禮而為之者司馬氏書儀女子許嫁笄年十五雖未許嫁亦笄主婦女賓執其禮主婦謂笄者之祖母母及諸母嫂凡婦女之為家長者皆可也女賓亦擇親戚之賢而有禮者贊亦賓自擇婦女為之行之於中堂執事者亦用家之婦女婢妾戒賓宿賓之辭改吾子為某親或邑封婦人於婦黨之尊長當稱兒卑幼當稱姑姊之類於夫黨之尊長當稱新婦卑幼當稱老婦陳服止用背子無篦幧頭有諸首飾謂釵梳之類席一背設於椸櫛總首飾置卓子上冠笄盛以盤蒙以帕笄如今朶子之類所以綴冠者執事者一人執之陪位者及擯亦止於婦女内擇之擯立於中門内將笄者雙紒繻繻今之褑子主人迎賓於中門内布席於房外南面如庶子之冠席賓祝而加冠及笄贊者為之施首飾賓揖笄者適房改服背子既笄所拜見者惟父母及諸母諸姑兄姊而已笄祝用冠者始加巾祝辭但去髦士攸宜一句餘皆如男子冠禮朱子家禮女子許嫁笄母為主前期三日戒賓一日宿賓以牋紙書其辭使人致之陳設如冠禮但於中堂布席如衆子之位厥明陳服如冠禮但用背子冠笄序立主婦如主人之位將笄者雙紒衫子房中南面賓至主婦迎入升堂主婦升自阼階賓為將笄者加冠笄適房服背子乃醮如冠禮辭亦同乃字如冠禮但改祝辭髦士為女士主人以笄者見於祠堂笄者見於尊長乃禮賓以上皆如冠儀而省蕙田案士庶女子笄禮自宋書儀家禮而外明世葢無聞焉然冠禮乆廢而今人家於女子年十三則畜髪謂之上頭擇日行之或拜見父母尊長告於親黨劉氏曰笄今簪也簪所以固冠今世惟已嫁者乃得用之似與禮意適合右女子笄五禮通考卷一百五十
