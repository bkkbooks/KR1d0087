body:
  text: 五禮通考卷一百五十刑部尚書秦蕙田撰嘉禮二十三冠禮三宋史真宗本紀大中祥符八年十二月皇子冠禮志皇子冠前期擇日奏告景靈宮太常設皇子冠席文徳殿東階上稍北東向設褥席陳服於席南東領北上九旒冕服七梁進賢冠服折上巾公服七梁冠簪導九旒冕簪導同箱在服南設罍洗酒饌旒冕冠巾及執事者並如皇太子儀其日質明皇帝通天冠絳紗袍御文徳殿皇子自東房出内侍二人夾侍王府官從恭安之樂作即席南向坐樂止掌冠者進折上巾北向跪冠修安之樂作贊冠者進北面跪正冠皇子興内侍跪進服訖樂止掌冠者揖皇子復坐以爵跪祝曰酒醴和㫖籩豆静嘉授爾元服兄弟俱來永言保之降福孔皆皇子搢笏跪受爵翼安之樂作飲訖太官令進饌訖再加七梁冠進安之樂作掌冠者進爵祝曰賓贊既成肴核維旅申加厥服禮儀有序允觀爾成承天之祜皇子跪受爵輔安之樂作太官奉饌三加九旒冕廣安之樂作掌冠者進爵祝曰㫖酒嘉栗敢薦令芳三加爾服眉夀無疆永承天休俾熾而昌皇子跪受爵賢安之樂作太官奉饌饌徹皇子降易朝服立横階南北向位掌冠者字之曰嵗日云吉威儀孔時昭告厥字君子攸宜順爾成徳永受保之奉勅字某皇子再拜舞蹈又再拜左輔宣勅戒曰好禮樂善服儒講藝蕃我皇室友于兄弟不溢不驕惟以守之皇子再拜進前俛伏跪稱臣雖不敏敢不祗奉俛伏興復位再拜出殿上侍立官並降復位再拜放仗明日百僚東上閤門賀玉海祥符八年十二月戊寅承天節羣臣上夀是日皇子慶國公加冠禮輔臣面賀宗室賀於内東門司天言日煇珥直抱氣戊子集賢校理晏殊上皇子冠禮賦詔奬之辛卯進封夀春郡王制曰辯惠之性言必有章趨進之容動皆合禮維城之制載協周邦半楚之封尚尊漢牘政和五禮新儀近制加冠者止加烏紗折上巾不用開寳禮舊儀宗室子若將授官者必先賜袍笏令裹頭而後授命焉蕙田案此三加三醮也宋開寳通禮如開元禮禮志皇太子冠儀常行於大中祥符之八年徽宗親製冠禮沿革十一卷命禮儀局倣以編次其儀前期奏告天地宗廟社稷諸陵宮觀殿中監設尚舍張設垂拱文徳殿門之内設香案殿下螭陛間又為房於東朶殿大晟展宮架樂於横街南太常設太子冠席東階上東宮官位於後設褥位陳服於席南東領北上逺遊冠簪導衮冕簪導同箱在服南設罍洗阼階東罍在洗東篚在洗西實巾一加勺冪光禄設禮席西階上南面實側尊在席南又設饌於席加冪執事者並公服立罍洗酒饌之所九旒冕逺遊冠折上巾各一匴奉禮郎三人執以侍於東階之東西面北上設典儀位於宮架東北贊者二人在南西向禮直官通事舍人太常博士引太子詣朶殿東房皇帝乗輦駐垂拱殿百官起居如月朔視朝儀左輔版奏中嚴外辨符寳郎奉寳先出左輔奏外辦皇帝服通天冠絳紗袍詣文徳殿簾捲大樂正令撞黄鍾之鐘右五鐘皆應殿上鳴鞭皇帝出西閤乗輦協律郎俛伏跪舉麾興工鼓柷奏乾安之樂殿上扇合禮直官太常博士引禮儀使導皇帝出降輦即座簾捲扇開鞭鳴樂止爐烟升符寳郎奉寳陳於御座左右禮直官通事舍人太常博士引掌冠贊冠者入門肅安之樂作至位樂止典儀曰再拜在位者皆再拜左輔詣御座前承制降東階詣掌冠者前西向稱有制典儀贊在位官再拜訖宣制曰皇太子冠命卿等行禮掌冠贊冠者再拜訖文臣侍從官宗室武臣節度使以上升殿東西立應行禮官詣東階下立東宮官入詣太子東房次禮直官等引太子内侍二人夾侍東宮官後從欽安之樂作即席西向坐樂止引掌冠贊冠以次詣罍洗所樂作搢笏盥帨訖出笏升樂止執折上巾者升掌冠者降一等受之右執項左執前進皇太子席前北向立祝曰咨爾元子肇冠於阼筮日擇賓徳成禮具於萬斯年承天之祜乃跪冠順安之樂作掌冠者興席南北面立後凖此贊冠者進席前北面跪正冠興立於掌冠者之後太子興内侍跪進服服訖樂止掌冠者揖太子復坐禮直官等引掌冠者降詣罍洗如上儀贊冠者進席前北向跪脫折上巾置於匴興内侍跪受興置於席執逺遊冠者升掌冠者降二等受之右執項左執前進太子席前北向立祝曰爰即令辰申加元服崇學以讓三善皆得副予一人受天百福乃跪冠懿安之樂作掌冠者興贊冠者進跪簪結紘興太子興内侍跪進服服訖樂止掌冠者揖太子復坐掌冠者降詣罍洗及贊冠者跪脱逺遊冠並如上儀執衮冕者升掌冠者降三等受之右執項左執前進太子席前北向立祝曰三加彌尊國本以正無疆惟休有室大競懋昭厥徳保兹永命乃跪冠成安之樂作掌冠者興贊冠者如上儀跪簪結紘内侍進服服訖樂止禮直官等引太子降自東階樂作由西階升即禮席南向坐樂止又引掌冠者詣罍洗樂作盥帨訖升西階樂止贊冠者跪取爵内侍注酒掌冠者受爵跪進太子席前北向立祝曰㫖酒嘉薦有飶其香拜受祭之以定爾祥令徳夀豈日進無疆太子搢圭跪受爵正安之樂作飲訖奠爵執珪太官令設饌席前太子搢圭食訖樂止執圭興太官令徹饌爵禮直官等引自西階詣東房易朝服降立横街南北向東宮官復位西向太子初行樂作至位樂止禮直官等引掌冠贊冠者詣前西向掌冠者少進字之曰始生而名為實之賓既冠而字以益厥文永受保之承天之慶奉勅字某太常博士請再拜太子再拜訖搢笏舞蹈再拜奏聖躬萬福又再拜左輔承㫖降自東階詣太子前西向宣曰有勅太子再拜宣勅曰事親以孝接下以仁逺佞近義禄賢使能古訓是式大猷是經宣訖太子再拜訖禮直官等引太子前俛伏跪奏稱臣雖不敏敢不祗奉奏訖興復位再拜訖引出殿門樂作出門樂止侍立官並降復位典儀曰拜贊者承傳在位者再拜禮儀使奏禮畢鳴鞭大樂正令撞蕤賓之鐘左五鐘皆應乾安之樂作皇帝降座左輔奏解嚴放仗在位官再拜退太子入内朝見皇后如宮中儀迺擇日謁太廟别廟宿齋於本宮質明服逺遊冠朱明衣乗金輅至廟改服衮冕執圭行禮羣臣稱賀皇帝賜酒三行蕙田案此三加一醴也徽宗本紀政和四年二月癸酉長子桓冠玉海政和四年二月禮制局定皇長子冠禮十七日癸酉行禮於文徳殿掌冠以禮部尚書贊冠以鴻臚卿列黄麾細仗於殿庭鐵圍山叢談冠禮肇於古國初草昧未能行因循至政和始脩焉是時淵聖皇帝猶未入儲宮初以皇長子而行冠於是天子御文徳殿百僚在位命官行三加禮是日方樂作行事而日為之重輪也先是諸王冠止於宫中行世俗之禮謂之上頭而已繇是而後天子諸王咸冠於外庭葢自淵聖始政和五禮新儀品官冠子儀告廟將冠主人諏日擇賓告於禰廟無廟者為位於㕔事兩楹之間南面主人公服再拜乃告曰某子某年若干矣卜某甲子冠吉賓某官某贊某官某不泯先君之嗣徼福於我先君實辱臨之以始卒冠事謹告凡行事如非南向並各因所向陳設以後倣此前三日主人戒賓賓如主人服出門立西面肅而入賓入門而左主人入門而右賓升東階主人升西階主人再拜賓答拜主人曰某之子某將以某日加冠於其首願吾子終教之賓曰某不敏恐不能共事以病吾子敢辭主人曰某猶願吾子終教之也賓曰吾子重有命某敢不從主人再拜賓答拜主人退賓送於門外前一日主人擇賓可使冠子者一人而宿之如戒賓之儀宿曰某將加冠於子某之首願吾子將莅之敢宿賓對曰某敢不夙興宿贊冠者亦如之質明執事者設洗於東階東南水在洗東箱實巾一在洗西陳服於房中東領北上無房者張帷為之平冕金鍍鍮石稜角簪青羅素裙蔽膝白綬中單緋白羅大帶金鍍銅華帶緋羅履襪五品以上五旒冕青生色大袖緋羅繡裙蔽膝皂綾銅環餘同平冕服三梁冠朝服金鍍銀稜角簪銀立筆緋羅大袖白紗中單皂襈白羅方心曲領緋羅蔽膝緋白羅大帶銀褐綬勤台金鍍銅束帶佩方膝練鵲錦綾青絲網鍮石環五品以上四梁羅金鍍銀稜犀簪束帶銀佩四盤賜錦綬餘同二梁冠折上巾公服巾總二梁冠平冕笄組紘實於篚平冕二梁冠折上巾各一箱執以待於西隅南面東上賓升則東面設洗於房中之東水在洗東箱實巾一在洗西質明主人公服立於東階下西面兄弟各服其服立於洗東西面北上將冠者立於房中南面賓贊如主人服立於外門之外主人出迎揖先入三揖至於階三遜設主人位於東階上西面賓贊位於西階上東面主人以賓升就位贊冠者盥於洗西升立於房中西面設冠位於主人東北西面將冠者出房南面贊冠者奠巾總於席南端賓揖將冠者即席坐贊冠者坐設巾總賓降主人從降賓辭請勿降主人曰吾子降辱敢不從降賓既盥一揖一遜升主人復初位賓即將冠者席前跪正巾興降西階一等執折上巾者升東面授賓賓右手執項左手執前進揖冠者席前東向立祝曰粤惟初冠考禮之稱正爾容體順爾辭令盡革童心永膺大慶乃跪冠興復位贊冠者跪正折上巾冠者興賓揖冠者適房服折上巾服出房南面立賓主俱興賓揖冠者即席坐贊冠者跪脫折上巾設笄賓降主人從降辭對如初賓既盥揖遜賓即冠者席前跪正巾興復西階二等執二梁冠者升東面授賓賓右手執項左手執前進冠者席前東向立祝曰載契我龜載加爾服爾既順序毋曰欲速自天申之申以百福乃跪冠興復位贊冠者卒紘冠者興賓揖冠者適房服二梁冠服出房南面立賓主俱興賓揖冠者即席坐贊冠者跪脫二梁冠設笄賓降主人從降辭對如初賓既盥揖遜升賓即冠者席前跪正巾興降西階三等執平冕者升東面授賓賓右手執項左手執前進冠者席前東向立祝曰授時之吉迎天之休抗以髙明掖其進修三加彌尊百禄是遒乃跪冠興復位贊冠者卒紘冠者興賓揖冠者適房服平冕服出房南面立賓主俱興執事者徹折上巾二梁冠席於房執事者布席於西階上南面設酒饌如常儀執事者盥手洗爵於房中贊冠者以酒注於爵賓揖冠者即席西南面立賓受爵進席前北向立祝曰㫖酒既嘉載肴斯阜既曰克家亦惟繼祖孝友慈祥受天之祐冠者席西拜受爵賓東面答拜贊冠者薦饌贊冠者即座坐飲食訖降席再拜賓答拜易服拜父父為起入拜母母為起賓降當西序東面主人降當東序西面立冠者出立于西階東南面賓少進字之曰卜筮云吉禮儀孔明爰字爾徳嘉爾有成伊何曰伯某甫仲叔季惟其所當冠者曰某雖不敏敢不祗奉賓出主人西面請賓曰吾子辱執事請禮從者賓曰某既得將事敢辭主人曰敢固以請賓曰某辭不得命敢不從賓就次如别儀冠者廟見及見諸父諸兄姑姊如常儀若以巾帽折上巾為三加者聴冠訖主人釋服改席賓與贊冠者如主人服出次立于門西東面主人出門東西面主人揖賓先入賓及贊冠者從之至階揖遜升各即席衆賓皆與執事者奉幣酬賓㑹訖賓主俱興主人再拜賓答拜賓出主人送於門外孤子冠即諸父諸兄為主如上儀品官子孫三舍生冠依品官儀庶人子冠儀將冠主人諏日擇賓告于禰為位於㕔事南面主人北面再拜乃告曰某子某年若干矣卜以某甲子冠吉乃速賓某以始卒冠事庶幾臨之謹告凡㕔事如非南向並各因所向陳設前期主人戒賓曰某日將冠於子某首願吾子莅之賓許諾其日夙興張帷為房於㕔事之東陳服其中東領北上酒饌在服北帽一折上巾一陳於西階之西為賓主位如常儀為冠者席於主人東少北西向將冠者待於房中賓至主人出迎揖而入坐定冠者出自房執事者曰請行事主人曰敢勞吾子賓揖將冠者即席坐執帽者升賓降受之進冠者席前東向立祝曰令月吉日始加首服棄爾幼志茂爾成徳俾夀而臧以介多福乃跪加帽興復位賓揖冠者適房易服出即冠席復坐賓跪脱帽執折上巾者升賓降受之進冠者席前東向立祝曰吉月令辰申加爾服欽爾威儀柔嘉維則夀考不忘以終厥徳乃跪冠興復位賓揖冠者適房執事者徹冠箱冠席入於帷中為醴席於西階南向冠者易服出賓主俱興執事者以酒注於琖賓揖冠者即醴席西向立賓受琖進席前北向立祝曰爾酒既湑爾肴伊旅拜受祭之自求多祜冠者席西拜受賓答拜執事者薦饌於席前冠者坐欽食訖再拜賓答拜冠者興離席立於東階之西東南向賓少進字之曰爾服既莊爾儀既備兄弟偕止爰告爾字永保受之令徳是似冠者拜賓答拜冠者廟見如常儀拜父父為起入拜母母為起拜諸父羣從之尊者主人享賓賓出主人送於門外孤子冠即諸父諸兄為主如上儀戒賓若主人有故所以函書蕙田案宋制庶人二加也又案政和五禮新儀皆御製禮故宋無皇帝加元服禮司馬氏書儀男子年十二至二十皆可冠必父母無期以上喪始可行之冠婚皆嘉禮也曾子問冠者至聞齊哀大功之喪冠而不醴未至則廢雜記曰大功之末可以冠子可以嫁子然則大功之初亦不可冠也曽子問有因喪服而冠者恐於今難行其禮主人盛服主人謂冠者之祖父父及諸父諸兄凡男子之為家長者皆可也凡盛服有官者具公服靴笏無官者具幞頭鞾襴或衫帶各取其平日所服最盛者親臨筮日於影堂門外西向卜筮在誠敬不在著龜或不能曉卜筮之術者止用坏亦可也其制取大竹根判之或止用兩錢擲於盤以一仰一俯為吉皆仰為平皆俯為凶西向據影堂門南向者言之私家堂室不能一一如此但以前為南後為北左為東右為西若不吉則更筮他日凡將筮日先謀得暇可行禮者數日然後筮取其吉者用之前期三日筮賓如求日之儀凡賓當擇朋友賢而有禮者為之亦擇數賓取吉者或不及筮日筮賓則曰擇其可者而已乃遣人戒賓士冠禮主人自戒賓宿賓今欲從簡但遣子弟若僮僕致命或使者不能記其辭則為如儀中之辭後云某上一辭為一紙使者以次達之賓答亦然曰某主人名也使者不欲斥主人名即稱官位或云某親有子某子名將加冠於某之首願吾子之教之也賓答曰某賓名不敏恐不能供事以病吾子敢辭病猶辱也禮辭一辭而許曰敢辭再辭而許曰固辭三辭曰終辭不許也主人曰某願吾子之終教之也賓對曰吾子重有命某敢不從凡賓主之辭或不以書傳慮有誤㤀則宜書於笏記無笏者為掌記前一日又遣人宿賓曰某將加冠於某之首吾子將莅之敢宿賓對曰某敢不夙興古人宿贊冠者一人今從簡但令賓自擇子弟親戚習禮者一人為之前夕又有請期告期今皆省之其日夙興賓主人執事者皆盛服執事者謂家之子弟親戚或僕妾凡與於行禮者皆是也執事者設盥盆於㕔事阼階下東南有臺帨巾在盆北有架古禮謹嚴之事皆行之於廟故冠亦在廟今人既少家廟其影堂亦褊隘難以行禮但冠於外㕔笄在中堂可也士冠禮設洗直於東榮南北以堂深水在洗東今私家無罍洗故但用盥盆帨巾而已盥濯手也帨手巾也㕔事無兩階則分其中央以東者為阼階西者為賓階無室無房則暫以帟幕截其北為室其東北為房此皆據㕔堂南向者言之陳服於房中西牖下東領北公服靴笏無官則襴衫靴次旋襴衫次四䙆衫若無四䙆止用一衫腰帶櫛篦總幧頭總頭􅔮幧頭掠頭也席二在南公服衫設於椸椸音移衣架也靴置椸下笏腰帶篦櫛總幧頭置卓子上酒壺在服北次盞注亦置卓子上幞頭帽巾各承以盤蒙以帕主人執事者三人執之立於堂下西階之西南下東上賓升則東向主人立於阼階下少東西向子弟親戚立於盥盆東西向北上親戚預於冠禮者皆謂男子也尊卑共為一列若有僮僕預於執事則立於親戚之後拜立行列皆倣此擯者立於門外以俟賓主人於子弟親戚中擇習禮者一人為擯將冠者雙紒童子紒似刀鐶今俗所謂呉雙紒也袍今俗所謂襖子是也夏單冬複勒帛素屐幼時多躡采屐將冠可以素屐在房中南向賓至贊者從之立於門外東向贊者少退擯者以告主人主人迎賓出門左西向再拜賓答拜主人與贊者相揖不拜又揖賓乃先入門賓並行少退贊從賓後入門賓主分庭而行揖讓而至階又揖讓而升主人由阼階先升立於階上少東西向賓由賓階繼升立於階上少西東向贊者盥手由賓階升立於房中西向擯者取席於房布之於主人之北西向此適長子之禮也衆子則布席於房戸之西南向將冠者出房立於席北南向衆子立於席西東向賓之贊者取櫛總篦幧頭置於席南端衆子置於席東端興席北少東西向立衆子則席東少北南向立賓揖將冠者將冠者即席西向坐衆子南向坐為之櫛合紒施總加幧頭賓降主人亦降立於阼階下賓禮辭賓盥手畢主人一揖一讓升自阼階賓升自西階皆復位賓降西階一等執巾者升一等授賓古者階必三等於中等相授今則無數但三分其階升階毎分一等可也賓執巾正容徐詣將冠者席前東向衆子北向祝曰令月吉日始加元服棄爾幼志順爾成徳夀考維祺介爾景福乃跪為之著巾興復位贊者為之取篦掠髪冠者興賓揖之適房服四䙆衫無四䙆衫止用衫勒帛腰帶出房南向良乆士冠禮注曰復出房南面者一加禮成觀衆以容禮賓揖之即席跪賓盥如初降二等受帽進祝曰吉月令辰乃申爾服謹爾威儀淑慎爾徳眉夀萬年永受遐福加之復位如初興賓揖之適房服旋襴衫腰帶正容出房南向良乆賓揖之即席坐賓盥如初降三等受幞頭進祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶贊者徹帽賓加幞頭復位如初冠者興賓揖之適房改服公服若靴襴正容出房立南向主人執事者受帽徹櫛篦席入於房擯者取席布於堂中間少西南向衆子仍故席贊者取盞斟酒於房中出房立於冠者之南西向賓揖冠者就席冠者立於席西南向賓受盞於贊者詣席前北向祝曰㫖酒既清嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘古者冠用醴或用酒醴則一獻酒則三醮今私家無醴以酒代之但改醴辭甘醴惟厚為㫖酒既清耳所以從簡冠者再拜於席西升席南向受盞賓復位東向答拜冠者即席南向跪祭酒興就席末坐啐酒啐子對切少飲酒也興降席授贊者盞南向再拜賓東向答拜冠者入家拜見於母母受之冠義曰見於母母拜之見於兄弟兄弟拜之成人而與為禮也今則難行但於拜時母為之起立可也下見諸父及兄倣此賓降階東向主人降階西向冠者降自西階立於西階東南向賓字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏嘏古雅切永受保之曰伯某甫仲叔季惟所當冠者對曰某雖不敏敢不夙夜祗奉賓請退主人請禮賓賓禮辭許乃入設酒饌延賓及擯賛如常儀酒罷賓退主人酬賓及賛者以幣端匹丈尺臨時隨意凡君子使人必報之至於婚喪相禮者當有以酬之若主人實貧相禮者亦不當受也仍拜謝之士冠禮乃禮賓以一獻之禮注一獻者主人獻賓而已即燕無亞獻者獻酬酢賓主人各兩爵而禮成又曰主人酬賓束帛儷皮注飲賓客而從之以財貨曰酬所以申暢厚意也束帛十端也儷皮兩鹿皮也又曰贊者皆與贊冠者為介注贊者衆賓也介賓之輔以贊為之尊之飲酒之禮賢者為賓其次為介又曰賓出主人送於外門外再拜歸賓俎注使人歸諸賓家也今慮貧家不能辦故務從簡易於賓之請退也冠者東向拜見諸父諸兄諸父為一列諸兄為一列毎列再拜而已下見諸母姑姊倣此西向拜贊者贊者答拜入見諸母姑姊皆為之起遂出見於鄉先生鄉里耆徳及父之執友冠者拜先生執友皆答拜若有誨之者則對如對賓之辭且拜之先生執友不答拜若孤子冠士冠禮主人紒而迎賓拜揖遜立於序端皆如冠主開元禮亦然恐於今難行故須以諸父諸兄主者則明日量具香酒饌於影堂冠者北向焚香跪酒俛伏興再拜而出曽子問父没而冠則已冠掃地而祭於禰已祭而見伯父叔父而後享冠者此謂自為冠主者也開元禮孤子冠之明日見於廟冠者朝服無廟者見祖禰於寢質明贊禮者引入廟南門中庭道西北賓贊再拜訖引出今㕘用之蕙田案書儀初加巾次加帽三加幞頭從時制也髙宗本紀宣和三年進封康王四年始冠出就外第寧宗本紀寧宗諱擴光宗第二子也淳熙五年十月封英國公九年正月始冠南渡典儀皇子行冠禮儀畧太史擇日降㫖命太常寺㕘酌舊禮有司具辦儀物至日質明百僚立班皇帝即御坐禮直官通事舍人太常博士引掌冠贊冠者入就位掌冠以太常卿贊冠以閤門官初入門祗安之樂作至位樂止典儀贊再拜在位皆再拜跪左輔詣御坐前承制降自東階詣掌冠者前稱有制典儀贊再拜在位皆再拜訖左輔宣制曰皇子冠命卿等行禮掌冠贊冠者再拜左輔復位王府官入詣皇子東房禮直官通事舍人太常博士引皇子内侍二人夾侍王府官後從皇子初行恭安之樂作即席南向坐樂止禮直官等引掌冠贊冠者詣罍洗樂作搢笏盥手訖執笏升樂止執折上巾者升掌冠者降一等受之右執項左執前進皇子席前北向跪冠修安之樂作掌冠者興席南北面立贊者進席前北面跪進服服訖樂止掌冠揖皇子復坐贊冠者跪取爵内侍以酒注於爵掌冠受爵跪進皇子席前北向立祝曰酒醴和㫖籩豆静嘉授爾元服兄弟具來永言保之降福孔皆皇子搢笏跪受爵翼安之樂作飲訖奠爵執笏太官令奉饌設於皇子席前皇子搢笏食訖執笏太官令徹饌贊冠者進席前北向跪脫折上巾置於匴興内侍跪受服興置於席執七梁冠者升掌冠者降二等受之右執項左執前進皇子席前北向跪冠欽安之樂作掌冠者興贊冠者進席前北向跪簪結紘興皇子興内侍進服服訖樂止復坐贊冠者進酒如前祝曰令月吉辰爰申爾服禮儀不愆受天之禄兄弟具來介爾景福皇子跪受爵崇安之樂作太官令奉饌如前贊冠者進席前北向跪脫七梁冠置於匴興内侍跪受服興置於席執九旒冕者升掌冠者降三等受之右執項左執前進皇子席前北向跪冠廣安之樂作掌冠者興贊冠者進席前北面跪簪結紘興立皇子興内侍進服服訖樂止復坐贊冠者進酒如前祝曰㫖酒既清嘉薦令芳三加爾服眉夀無疆永承天休俾熾而昌皇子跪受爵賢安之樂作太官令奉饌如前皇子降自東階詣朶殿東房易朝服降立於横街南王府官階下西向皇子初行樂作至位樂止禮直官等引掌冠者詣皇子位少進字之曰嵗日云吉威儀孔時昭告厥字君子攸宜順爾成徳永受保之奉勅字某皇子再拜舞蹈再拜奏聖躬萬福又再拜左輔詣御座前承㫖降階詣皇子前宣曰有勅皇子再拜宣勅戒曰好禮樂善服儒講藝蕃我王室友于兄弟不溢不驕惟以守之宣訖皇子再拜餘如皇太子儀次日文武百僚詣東上閤門拜表稱賀宋史理宗本紀寳祐二年冬十月癸酉皇子祺進封忠王十一月壬寅日南至忠王冠樂志皇子冠二十首寳祐二年皇帝將出文徳殿於皇帝徳乃聖乃神本支百世立愛立親敬供冠事以明大倫承天右序休命用申賓贊入門豐芑貽謀建爾元子揆禮儀年筮龜敬事八音克諧嘉賓至止於以冠之成其福履賓贊出門禮國之本冠禮之始賓升自西維賓之位于著于阼維子之義厥維欽哉敬以從事皇帝降坐路寢闢門黼坐恭已羣公在庭所重維禮正心齊家以燕翼子於萬斯年王心載喜皇子初行有來振振月重輪兮瑜玉在佩綦組明兮左徴右羽徳結旌兮步中采齊矩彠循兮賓贊入門我有嘉賓直大以方亦既至止厥徳用光冠而字之厥義孔彰表裏純備黄耉無疆皇子詣受制位吉圭休成其日南至天子有詔冠爾皇嗣為國之本隆邦之禮拜而受之式共敬之皇子升東階兹惟阼階厥義有在歴階而升敬謹將冠經訓昭昭邦儀粲粲正灑賓筵夀考未艾皇子升筵秩秩賓筵籩豆孔嘉帝子至止衿纓振華周旋陟降禮行三加成人有徳匪驕匪奢初加帝子惟賢懋昭厥徳跪冠於房元冠有特鼓鐘喤喤威儀抑抑百禮既洽祚我王國初醮有賓在筵有尊在戸磬管將將醮禮時舉跪觴祝辭以永燕譽寳祚萬年磐石鞏固再冠復乃肇祥震維標徳乃共皮弁其儀不忒體正色齊維民之則璇霄眷佑國夀箕翼再醮冠醮之義匪酬匪酌于戸之西敬共以恪金石相宣冠醮相錯帝祉之受施及家國三加善頌善禱三加彌尊爵弁峩峩介珪温温陽徳方長成徳允存燕及君親厥祉孔蕃三醮席於賓階禮義以興受爵執爵多福以膺匪惟服加徳加愈升匪惟徳加夀加愈増皇子降命服煌煌跬步中度慶輯皇闈化行海宇禮具樂成惕若戒懼寳璐厥躬有秩斯祜朝謁皇帝將出皇王烝哉令聞不已燕翼有謀冠醮有禮百僚在庭遹相厥事頌聲所同嘉受帝祉皇子再拜青社分封前星啟燄繁弱綏章厥光莫揜容稱其徳蓄學之騐芳譽敷華大圭無玷皇子退元衮黼裳垂徽永世勉勉成徳是在元子胙土南賓厥音孔懿充一忠字作百無愧皇帝降坐愛始於親聖盡倫兮元子冠字拜禮成兮天步舒徐皇心寧兮家人之吉億萬春兮朱子家禮冠禮男子年十五至二十皆可冠必父母無期以上喪始可行之大功未𦵏亦不可行前期三日主人告於祠堂古禮筮日今不能然但正月内擇一日可也主人必冠者之祖父自為繼髙祖之宗子者若非宗子則必繼髙祖之宗子主之有故則命其次宗子若其父自主之告禮見祠堂章祝版但云某之子某若某之某親之子某年漸長成將以某月某日加冠於其首謹以後同若族人以宗子之命自冠其子其祝版亦以宗子為主曰使介子某某若宗子已孤而自冠則亦自為主人祝版前同但云將以某月某日加冠于首謹以後同戒賓古禮筮賓今不能然但擇朋友賢而有禮者一人可也是日主人深衣詣其門所戒出見如常儀啜茶畢戒者起言曰某有子某若某子某親有子某將加冠於其首願吾子之教之也對曰某不敏恐不能供事以病吾子敢辭戒者曰願吾子之終教之也對曰吾子重有命某敢不從地逺則書初請之辭為書遣子弟致之所戒者辭使者固請乃許而復書曰吾子有命某敢不從前一日宿賓遣子弟以書致辭曰來日某人加冠於子某若某親某子某之首吾子將莅之敢宿某上某人答書曰某敢不夙興陳設設盥帨於㕔事如祠堂之儀以帟幕為房於㕔事之東北或㕔事無兩階則以堊畫而分之厥明夙興陳冠服有官者公服帶靴笏無官者襴衫帶靴通用皂衫深衣大帶履櫛􅔮掠皆卓子陳於房内東領北上酒注盞盤亦以卓子陳於西階下執事者一人守之長子則布席于阼階上之東少北西向衆子則少西南向宗子自冠則如長子之席少南主人以下序立主人以下盛服就位主人阼階下少東西向子弟親戚童僕在其後重行西向北上擇子弟親戚習禮者一人為擯立於門外西向將冠者雙紒四䙆采勒帛采履在房中南面若非宗子之子則其父立於主人之右尊則少進卑則少退賓至主人迎入升堂賓自擇其子弟親戚習禮者為贊冠者俱盛服至門外東面立贊者在右少退擯者入告主人主人出門左西向再拜賓答拜主人揖贊者贊者報揖主人遂揖而行賓贊從之入門分庭而行揖讓而至階又揖讓而升主人由阼階先升少東西向賓由西階繼升少西東向贊者盥帨由西階升立于房中西向擯者筵於東序少北西面將冠出房南面賓揖將冠者就席為加冠巾冠者適房服深衣納履出賓揖將冠者出房立於席右向席贊者取櫛􅔮掠置于席左興立于將冠者之左賓揖將冠者即席西向跪贊者即席如其向跪為之櫛合紒施掠賓乃降主人亦降賓盥畢主人揖升復位執事者以冠巾盤進賓降一等受冠笄執之正容徐詣將冠者前向之祝曰吉月令日始加元服棄爾幼志順爾成徳夀考維祺以介景福乃跪加之贊者以巾跪進賓受加之興復位揖冠者適房釋四䙆衫深衣加大帶納履出房正容南向立良乆再加帽子服皂衫革帶繫鞋賓揖冠者即席跪執事者以帽子盤進賓降二等受之執以詣冠者前祝之曰吉月令辰乃申爾服謹爾威儀淑慎爾徳眉夀永年享受遐福乃跪加之興復位揖冠者適房釋深衣服皂衫革帶繫鞋出房立三加幞頭公服革帶納靴執笏若襴衫納靴禮如再加惟執事者以幞頭盤進賓降没階受之祝辭曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶贊者徹帽賓乃加幞頭執事受幞徹櫛入於房餘並同乃醮長子則擯者改席於堂中間少西南向衆子則仍故席贊者酌酒於房中出房立於冠者之左賓揖冠者就席右南向乃取酒就席前北面向祝之曰㫖酒既清嘉薦芬芳拜受祭之以定爾祥承天之休夀考不忘冠者再拜升席南向受盞賔復位東面答拜冠者進席前跪祭酒興就席末跪啐酒興降席授贊者盞南向再拜賓東向答拜冠者遂拜贊者贊者賓左東向少退答拜也賓字冠者賓降階東向主人降階西向冠者降自西階少東南向賓字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰伯某甫仲叔季惟所當冠者對某雖不敏敢不夙夜祗奉賓或别作辭命以字之亦可出就次賓請退主人請禮賓賓出就次主人以冠者見於祠堂如祠堂章内生子而見之儀但改告辭曰某之子某若某親某之子某今日冠畢敢見冠者進立於兩階間再拜餘並同敢若宗子自冠則辭改曰某今日冠畢見遂再拜降復餘位並同冠者見於尊長父母堂中南面坐諸叔父兄在東序諸叔父南向諸兄西向諸婦女在西序諸叔母姑南向諸姊嫂東向冠者北向拜父母父母為之起同居有尊長則父母以冠者詣其室拜之尊長為之起還就東西序毎列再拜應答拜者答拜若非宗子之子則先見宗子及諸尊于父者於堂乃就私室見於父母及餘親若宗子自冠有母則見於母如儀族人宗之者皆來見於堂上宗子西向拜其尊長毎列再拜受卑幼者拜乃禮賓主人以酒饌延賓及擯贊者酬之以幣而拜謝之幣多少隨宜賓贊有差冠者遂出見於鄊先生及父之執友冠者拜先生執友皆答拜若有誨之則對如對賓之辭再拜之先生執友不答拜邱氏濬曰註内將冠者雙紒四䙆衫勒帛采屐紒即是髻子書儀註童子髻似刀環疑是作兩圎圈子也四䙆衫不知其制考玉篇廣韻等書並無䙆字惟車服志史照釋文曰䙆音暌挂反衣𥚑分也李廌師友談記有云國朝面賜緋即四䙆義襴衫事物紀原衫下註云有缺骻衫庶人服之即今四袴衫也紀原宋髙承作所謂今者指宋時言也豈四袴衫即此四䙆耶又案書儀始加適房服四䙆衫無四䙆衫即服衫則是四䙆衫亦可無也况此服非古制殊非深衣之比隨時不用可也若夫所謂勒帛采屐者書儀無采屐而於勒帛下有素字自註云幼時多躡采將冠可以素謂之躡意勒帛乃用以裹足者也屐是木履今云采屐疑是以采帛代木為之謂之勒帛采展似是以帛裹足納履中也此葢當時童子服後不必深泥惟隨時用童子所常服者代之似亦無害所謂帽子皂衫者其制不可考惟文公語録有云前輩士大夫家居常服紗帽皂衫革帶又云温公冠禮先裹巾次裹帽又云今來帽子做得怎地髙硬既不便於從事又且費錢皂衫費更重向疑其必廢今果人罕用也由是數言推之則帽子必是以紗為也温公時猶以軟輻裹頭至文公時始為髙硬之制後與皂衫俱不用於世也今世所戴帽子有二等所謂大帽者乃是笠子用以蔽雨日之具決不可用惟所謂小帽者以縐紗或羅或縀為之此雖是䙝服然今世之人通貴賤以為燕居常服環衛及邉方官舍以事朝見者亦往往戴之今世除此二帽之外别無他帽必不得已用以再加其紗製者似亦可用右宋金史禮志皇帝加元服告太廟或一室或徧告及原廟並一獻禮用祝幣明史禮志天子加元服儀前期太史院卜日工部製冕服翰林院撰祝文祝辭禮部具儀注中書省承制命某官攝太師某官攝太尉既卜日遣官奏告天地宗廟行一獻禮前一日内使監令陳御冠席于奉天殿正中其南設冕服案及香案寳案侍儀司設太師太尉起居位於文樓南西向設拜位於丹墀内道設侍立位於殿上御席西東向設盥洗位於丹墀西其餘文武百官及諸執事位次陳設如大朝儀是日質明鼓三嚴文武官入皇帝服空頂幘雙童髻雙玉導絳紗袍御輿以出侍衛導從警蹕奏樂如常儀皇帝陞坐捲簾鳴鞭報時雞唱訖通班贊各供事太師太尉先入就拜位百官皆入贊拜樂作四拜興樂止引禮導太師先詣盥洗位搢笏盥帨訖出笏由西陛升内贊接引至御席西東向立引禮復導太尉詣盥洗位盥帨訖立於太師南侍儀跪奏請加元服太尉詣皇帝前少右跪搢笏脫空頂幘以授内使内使跪受幘興置於箱太尉進櫛設纚畢出笏興退立於西太師詣御前北向立内使監令就案取冕立於左太師祝曰令月吉日始加元服夀考維祺以介景福内使監令捧冕跪授太師太師搢笏跪受冕加冠加簪纓訖出笏興退立於西内使監令徹櫛纚箱御用監令跪奏請皇帝著衮服皇帝興著衮服訖侍儀跪奏請就御坐内贊贊進醴樂作太師進御前北面立光禄卿奉酒進授太師太師搢笏受酒至御前北面祝曰甘醴惟厚嘉薦令芳承天之休夀考不忘祝訖跪授内使内使跪受酒捧進御前皇帝受祭少許啐酒訖以虚盞授内使樂止内使受盞降授太師太師受盞興以授光禄卿光禄卿受盞退太師出笏退復位内贊導太師太尉出殿西門樂作降自西階引禮接引至丹墀拜位樂止贊拜樂作太師太尉及文武官皆四拜興樂止搢笏三舞蹈山呼出笏俯伏興樂作復四拜樂止侍儀奏禮畢皇帝興鳴鞭樂作警蹕侍從導入宮樂止百官以次出皇帝改服通天冠絳紗袍入宮拜謁太后如正旦儀擇日謁太廟與時祭同明日百官公服稱賀賜宴於謹身殿明集禮皇太子加元服㕘用周禮其年近則十二逺則十五天子自為主設御座於殿庭設冠席於殿東壁擇三公太常為賓贊三加冠一祝醴禮志皇太子冠禮洪武元年定先期太史監筮日工部製衮冕逺逰冠折上巾服翰林院撰祝文祝辭禮部具儀注中書省承制命某官為賓某官贊既筮日遣官祭告天地宗廟前一日内使監令陳御座香案於奉天殿設皇太子次於殿東房賓贊次於午門外質明執事官設罍洗於東階設皇太子冠席於殿上東南西向設醴席於西階上南向張帷幄於東序内設褥席於帷中又張帷於序外御用監陳服於帷内東領北上衮服九章逺遊冠絳紗袍折上巾緇纚犀簪二物同箱在服南櫛實於箱又在南司尊實醴於側尊加勺冪設於醴席之南設坫於尊東置二爵進饌者實饌設於尊北諸執事者各立於其所冕九旒逺遊冠十八梁折上巾冠冕各一箱盛執事官各執立於階之西東面北上冕九旒以下三十二字依集禮增鼓三嚴文武官入皇帝服通天冠絳紗袍御輿出樂作升座樂止捲簾鳴鞭報時訖賓贊就位樂作四拜興樂止侍儀司跪承制降自東階詣賓前稱有勅賓贊及在位官皆跪宣制曰皇太子冠命卿等行禮賓贊在位官皆俯伏興四拜文武侍從班俱就殿内位賓贊執事官詣東階下位東宮官入詣皇太子東房太常博士亦詣東房導皇太子入就冠席内侍二人夾侍東宮官後從初行樂作即席西南向樂止賓贊以次詣罍洗樂作搢笏盥帨訖出笏樂止