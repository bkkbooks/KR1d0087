body:
  text: 五禮通考卷一百三十二刑部尚書秦蕙田撰嘉禮五朝禮禮記玉藻天子元端而聽朔於南門之外注端當為冕字之誤也元衣而冕冕服之下次疏知端當為冕者凡衣服皮弁尊次以諸侯之朝服以元端案下諸侯皮弁聴朔朝服視朝是視朝之服卑於聽朔今天子皮弁視朝若元端聽朔則是聴朔之服卑於視朝與諸侯不類且聽朔大視朝小故知端當為冕謂元冕也周禮春官司服注元者衣無文裳刺黻而已是以謂元焉凡冕服皆元衣纁裳疏易繫辭黄帝堯舜垂衣裳葢取諸乾坤乾為天其色元坤為地其色黄但土無正位托於南方火赤色赤與黄即是纁色故以纁為名也夏官弁師注元衣之冕三斿用玉七十二聶氏崇義曰元冕三旒五采藻十二就每旒亦貫五采玉十二計用玉七十二方氏慤曰經有曰元冕有曰元冠有曰元端何也葢元端者祭服燕服之總名衣元衣而加元冕則為祭服衣元衣而加元冠則為燕服或冠冕通謂之端元端而朝日則是元冕者也元端而居則是加元冠者也聽朔亦元冕者敬朔事如祭故也蕙田案元冕者五冕之下天子元冕五采繅十有二就前後三斿每斿貫五采玉十二凡用玉七十二其諸侯孤卿大夫從王視朔亦服元冕繅就各如其命數諸公繅九就用玉五十四侯伯繅七就用玉四十二子男繅五就用玉三十繅玉皆三采三采者朱白蒼也天子之三公繅八就用玉四十八卿繅六就用玉三十六大夫繅四就用玉二十四繅玉亦皆三采士無冕以爵弁代之其諸侯之大夫從王朝視朔繅就亦各從其命數又案以上元冕周禮春官司服眡朝則皮弁服注視朝視内外朝之事皮弁之服十五升白布衣積素以為裳云疏案禮記雜記云朝服十五升士冠僼皮弁素積故知義然也夏官弁師王之皮弁會五采玉璂象邸玉笄注故書㑹作䯤鄭司農云讀如馬㑹之㑹謂以五采束髪也士䘮禮曰檜用組乃笄檜讀與䯤同書之異耳説曰以組束髪乃著笄謂之檜沛國人謂反紒為䯤璂讀如綦車轂之綦𤣥謂㑹讀如大㑹之㑹㑹縫中也璂讀如薄借綦之綦綦結也皮弁之縫中毎貫結五采玉十二以為飾謂之綦詩云㑹弁如星又曰其弁伊綦是也邸下抵也以象骨為之詩疏天子以十二為節約同冕旒也引詩㑹弁如星者彼注云㑹謂弁之縫中飾之以玉皪皪而處狀似星也與經義合故為證也諸侯及孤卿大夫之冕韋弁皮弁各以其等為之而掌其禁令注各以其等繅斿玉璂如其命數也皮弁則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采士皮弁之㑹無結飾儀禮士冠禮皮弁服素積緇帶素鞸注此與君視朔之服也皮弁者以白鹿皮為冠象上古也積猶辟也以素為裳辟蹙其要中皮弁之衣用布亦十五升其色象焉素積白屨以魁柎之緇絇繶純純愽寸注魁蜃蛤柎注也疏以蛤灰塗注於上使色白也周禮司服疏天子諸侯白舄大夫士白屨皆施於皮弁蕙田案士冠禮稱皮弁服緇帶白屨皆士之制也若天子視朝則素帶朱裏朱綠終辟白舄諸侯視朔則素帶元華終辟白舄其素積素韠則上下同之禮記玉藻天子皮弁以日視朝遂以食疏天子既著皮弁視朝遂以皮弁而朝食所以敬養身體君衣狐白裘錦衣以裼之注君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服與凡裼衣象裘色也狐疏君謂天子引詩者證錦衣之上更有衣覆之必知白上加皮弁服者以狐白既白皮弁服亦白錦衣白三者相稱皆為白也云凡裼衣象裘色也者狐白裘用錦衣為裼狐青裘用𤣥衣為裼羔裘用緇衣為禓是裼衣與裘色相近也天子視朝服皮弁服則天子皮弁之下有狐白錦衣也諸侯於天子之朝亦然故秦詩云君子至止錦衣狐裘此經云君則天子兼諸侯也凡在朝君臣同服然則三公在天子之朝執壁與子男同則皮弁之下狐白錦衣與子男同也其天子卿大夫及諸侯卿大夫在天子之朝亦狐白裘以下云士不衣狐白則卿大夫得衣狐白也其裼則不用錦衣故下注云非諸侯則不用錦衣為裼熊氏云當用素衣為裼其天子之士及諸侯之士在天子之朝既不用狐白熊氏云用麛裘素裼也諸侯朝天子受皮弁之裼歸來嚮國則亦錦衣狐裘以告廟則秦詩云君子至止錦衣狐裘是也告廟之後則不服之其在國視朔則素衣麑裘卿大夫士亦皆然故論語注云素衣麑裳視朔之服是也諸侯皮弁以聽朔於太廟注皮弁下天子也皮疏以天子用元冕諸侯用弁故云下天子也論語素衣麑裘疏素衣麑裘諸侯在國視朔之服也卿大夫士亦皆然故鄭元注此云素衣麑裘視朔之服是也聶氏三禮圖説士冠禮皮弁服素積緇帶素韠注云以白鹿皮為冠象上古也此明上古未有布帛衣其羽皮也又云積猶辟也以素為裳辟蹙其要中也亦用十五升布為衣以象弁色葢天子素帶素韠朱裏朱綠終辟佩白玉白舄青絇繶純又弁師云王之皮弁㑹五采玉璂象邸玉笄注云㑹縫中也璂讀為綦綦結也邸謂下抵梁正張鎰圖云弁縫十二賈疏引詩㑹弁如星謂於弁十二縫中結五采玉落落而處狀似星也又於弁内頂上以象骨為抵至三王重質不變故王服之以日視朝燕諸公甥舅視學祭菜皆服焉賈疏云皮弁韋弁同但色異耳陳氏禮書周禮弁師王之皮弁㑹五采玉璂象邸玉笄諸侯及孤卿大夫之皮弁各以其等為之鄭康成曰皮弁者以白鹿皮為之葢皮弁存毛順物性而制之文質具焉韋弁去毛違物性而又染之文而已凡在下者為基可以托宿者為邸玉璂則縫中貫玉而施於下者也象邸則下柢用象而託以皮者也諸侯及孤卿大夫之皮弁各以其等鄭康成曰侯伯璂飾七子男璂飾五玉亦三采孤璂飾四三命之卿璂飾三再命大夫璂飾二玉亦二采於理或然推此則公之玉九天子之玉十有二又可知也詩曰㑹弁如星言其玉也又曰其弁伊騏書曰綦弁執戈言其文也葢綦者隂陽之雜故禮以綦組纓為士之齊冠綦組綬為世子佩詩以綦巾為女巾皆其未成德者之服也則士弁以綦宜矣康成讀玉璂為綦以綦為結是臆説也記曰三王共皮弁素積語曰素衣麑裘則素衣其衣也素積其裳也士冠禮皮弁素積緇帶禮記雜帶君朱綠大夫元華士緇辟則士之皮弁緇帶與君大夫皮弁之帶異矣士冠禮皮弁笄爵弁笄緇組紘纁邊弁師王朱紘禮記天子朱紘諸侯青紘則士皮弁緇組紘與天子諸侯皮弁之紘亦異矣葢皮弁天子以視朝以宴以聽郊報以舞大夏諸侯以聽朔以廵牲以卜夫人世婦以迎王之郊勞以待聘賔卿大夫以王命勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮弁服則皮弁之所施者衆矣葢人為者多變自然者不易皮弁因其自然而已此所以三王共皮弁素積而周天子至士共用之也然䘮服小記諸侯弔必皮弁錫衰郊特牲大蜡皮弁素服葛帶榛杖以送終則弁雖與吉禮同而服與吉服不同蕙田案天子諸侯有冕服有弁服弁有三等皮弁其一也天子皮弁以眡朝諸侯皮弁以聽朔弁師王之皮弁㑹五采玉璂象邸玉笄鄭注璂讀如綦皮弁之縫中每貫結五采玉十二以為飾謂之綦詩其弁伊騏箋云騏當作􅋒以玉為之陸德明釋文亦云説文作􅋒云弁飾也然則璂與􅋒􅋒與綦一字而互變其文耳内則云偪屨著綦又云屨綦鄭注綦屨繫也綦之訓結内則有之陳用之譏鄭為臆説非也弁師云諸侯及孤卿大夫之皮弁各以其等則天子眡朝諸臣之在王朝者三公璂飾八卿璂飾六大夫璂飾四其諸侯入為王卿士者上公璂飾九侯伯璂飾七子男璂飾五各如其命數可知也士皮弁無結飾則但以白鹿皮為之而已天子皮弁之服素衣素裳素帶朱裏朱綠終辟佩白玉素韠白舄其裘則以狐白錦衣以裼之知者司服注皮弁之服十五升白布衣士冠禮注皮弁之衣用布十五升其色象焉又論語素衣麑裘鄭注視朔之服諸侯以素衣視朔明天子以素衣眡朝故知素衣矣士冠禮皮弁服素積注積猶辟也以素為裳辟蹙其要中又冠禮記郊特牲明堂位祭義並有皮弁素積之文案積訓為辟即論語之帷裳也以素為之故云素裳矣玉藻天子素帶朱裏終辟而素帶終辟大夫素帶辟垂士練帶率下辟雜帶君朱綠大夫元華士緇辟二寸再繚四寸注士禆垂之下外内皆以緇是謂緇帶案士冠禮爵弁皮弁朝服元端四等皆用緇帶士以緇則天子以朱綠可知故云素帶朱裏朱綠終辟矣玉藻天子佩白玉而元組綬以君子玉不去身知常佩之故云佩白玉矣士冠禮皮弁服素韠玉藻注凡韠以韋為之必象裳色皮弁服皆素韠正義謂君與大夫士皮弁皆然故云素韠矣士冠禮素積白屨以魁柎之緇絇繶純純愽寸周禮司服疏天子諸侯白舄大夫士白屨皆施於皮弁屨人疏白舄配韋弁皮弁故云白舄矣玉藻君衣狐白裘錦衣以禓之注君衣狐白毛之裘則以素錦為衣覆之使可禓也詩云衣錦絅衣裳錦絅裳然則錦衣之上復有上衣明矣天子狐白之上衣皮弁服與案皮弁服者素衣也錦衣加狐白之上素衣又加錦衣之上中庸謂惡其文之著者以此凡在朝君臣同服故三公諸侯在天子之朝亦狐白錦衣詩秦風錦衣狐裘是也卿大夫亦衣狐白但以素衣裼不用錦衣鄭注玉藻云非諸侯則不用錦衣為裼是也士麛裘以素衣禓玉藻士不衣狐白是也諸侯視朔之服皮弁素衣素裳素韠白舄與天子同其皮弁之璂飾各如其命數素帶朱綠終辟佩山𤣥玉與天子異其裘則麛裘素衣以禓之卿大夫亦麑裘素衣論語素衣麑裘是也禮君用純色臣下之則大夫士視朔之裘青豻褎與凡禓衣象裘色玉藻絞衣以裼與論語素衣不同熊氏云臣用絞君用素皇氏云素衣為正記者亂言絞耳二説不同皇氏近之又案以上皮弁服周禮春官司服冠弁服注冠弁委貌其服緇布衣亦積素以為裳諸侯以為視朝之服詩國風曰緇衣之宜兮儀禮士冠禮主人𤣥冠朝服緇帶素韠注𤣥冠委貌也朝服者十五升布衣而素裳也衣不言色者衣與冠同也天子與其臣𤣥冕以視朔皮弁以日視朝諸侯與其臣皮弁以視朔朝服以日視朝凡染黒五入為緅七入為緇𤣥則六入與疏六入七入深淺不同而鄭以衣與冠同以緇與𤣥同色者大同小異皆是黒色故云同也蕙田案士之朝服緇帶諸侯則素帶朱綠終辟大夫則素帶元華辟垂儀禮燕禮記燕朝服於寢注朝服者諸侯與其羣臣日視朝之服也謂冠𤣥端緇帶素韠白屨也韠疏案屨人注天子諸侯吉事皆舄諸侯朝服素裳素應白舄而云白屨者引士冠禮成文其實諸侯當白舄其臣則白屨也周禮屨人注王吉服有九舄有三等赤舄為上冕服之舄詩云王錫韓侯𤣥衮赤舄則諸侯與王同下有白舄黒舄而疏赤舄舄中之上六冕之舄也冕服皆𤣥上纁下畫以衮龍赤舄者象纁裳故也下有白舄黒舄者白舄配韋弁皮弁黒舄配冠弁服冠弁服諸侯視朝之服燕禮記云燕朝服鄭云諸侯與其羣臣日視朝之服也謂冠𤣥端緇帶素韠白屨也白屨即與皮弁素積白屨同今以黒舄配之不與裳同色者朝服與𤣥端大同小異皆𤣥端緇布衣而裳有異耳若朝服則素裳白屨若𤣥端之裳則玉藻云韠君朱大夫素士爵韋是韠從裳色則天子諸侯朱裳大夫素裳皆不與裳同色者但天子諸侯舄有三等𤣥端既不得與祭服同赤舄若與韋弁皮弁同白則黒舄無所施故從上士𤣥裳無正而黒舄也大夫𤣥端素裳亦從裳黒屨矣蕙田案天子諸侯白舄以配韋弁皮弁冠弁黒舄以配𤣥端但司服所掌九服别無𤣥端故康成於冠弁之下注云王卒食以居則𤣥端以𤣥端與冠弁大同小異因附見之耳賈疏泥於注中三等舄配九服之文因謂黒舄配冠弁服既又知其非也復多方以通之竊謂不如云黒舄配𤣥端之直捷也又案𤣥端之服與朝服同惟裳與屨舄異朝服君素裳白舄臣素裳白屨𤣥端則天子諸侯朱裳黒舄大夫素裳黒屨上士𤣥裳中士黄裳下士雜裳同用黒屨其大夫𤣥端素裳與朝服不異賈公彦謂禮窮則同然朝服之屨以素𤣥端服以黒則亦有别矣特牲饋食禮記其服皆朝服𤣥冠緇帶緇韠注皆者謂賔及兄弟朝服者諸侯之臣與其君日視朝之服大夫以祭命賔兄弟緣孝子欲得嘉賔尊客以事其祖禰故服之緇韠者下大夫之臣蕙田案朝服素裳素韠上下同之此記云緇韠與士冠禮異疑緇當為素因上有緇帶之文而誤耳鄭氏以為下大夫之臣緇韠於他書無所考禮記玉藻諸侯朝服以日視朝於内朝注朝服冠𤣥端素裳也疏案王制云周人𤣥衣而養老注𤣥衣素裳天子之燕服為諸侯朝服彼注云𤣥衣則此𤣥端也若以素為裳則是朝服此朝服素裳皆得謂之𤣥端故論語云端章甫注云端𤣥端諸侯朝服若上士以𤣥為裳中士以黄為裳下士以雜色為裳天子諸侯以朱為裳則皆謂之𤣥端不得名為朝服也玉藻疏皇氏云畿内諸侯朝服用緇衣畿外用𤣥衣狐青是畿外諸侯朝服之裘熊氏以為内外諸侯朝服皆緇衣以羔為裘不用狐青也案王制直云𤣥衣而養老不辨内外之異又詩唐風羔裘豹袪卿大夫之服檜風云羔裘逍遥鄭𤣥云朝燕之服也論語云緇衣羔裘注云諸侯之朝服羔裘者必緇衣為裼唐檜魯非畿内之國何以並云羔裘若此𤣥衣為畿外諸侯則鄭注此何得云大夫士也陳氏澔曰諸侯以𤣥冠緇衣素裳為朝服凡在朝君臣上下同服蕙田案朝服緇衣也亦可稱𤣥端者緇與𤣥雖淺深不同而皆黒色從其相近而名之也𤣥端而不素裳則不得云朝服賈孔三禮疏析之當矣孔子曰朝服而朝卒朔然後服之注謂諸侯與羣臣也諸侯視朔皮弁服疏朝服緇衣素裳而朝謂每日朝君卒朔然後服之者卒朔謂卒告朔之時服皮弁告朔禮終脱去皮弁而後服朝服也陳氏澔曰聽朔重於視朝諸侯之朝服𤣥端素裳而聽朔則皮弁故卒聽朔之禮然後服朝服而視朝也朝服之以縞也自季康子始也注亦僣宋王者之後衣疏案王制云殷人縞而養老燕服則為朝服宋是殷後故朝服以縞方氏慤曰朝服以布不以純以緇不以縞後世反之始乎季康子之失禮陳氏澔曰朝服之布十五升先王之制也季康子始用生絹後人因之故記者原其所自雜記朝服十五升詩周南羔羊羔羊之皮素絲五紽傳大夫羔裘以居居疏謂居於朝廷非於家也論語曰狐貉之厚以居注云在家所以接賔客則在家不服羔裘矣論語注又云緇衣羔裘諸侯視朝之服卿大夫朝服亦羔裘惟豹祛與君異耳明此為朝服之裘非居家也鄭風緇衣緇衣之宜兮傳緇黒色卿士聽朝之正服也箋緇衣者居私朝之服也天子之朝服皮弁服也是疏此緇衣即士冠禮所云主人𤣥冠朝服緇帶素韠也諸侯與其臣服之以日視朝故禮通謂此服為朝服美武公善為司徒而經云緇衣則緇衣卿士所服也而天子與其臣皮弁以日視朝則卿士旦朝於王服皮弁不服緇衣故知是卿士聽朝之正服謂既朝於王退適治事之館釋皮弁而服以聽其所朝之政也又云退適治事之處為私對在天子之庭為公此私朝在天子宫内即下句適子之館兮是也舜典云闢四門者注云卿士之職使為己出政教於天下言四門者亦因卿士之私朝在國門魯有東門㐮仲宋有桐門右師是後之取法於前也彼言私朝者在國門謂卿大夫夕治家事私家之朝耳與此不同何則玉藻説視朝之禮曰君既視朝退適路寢使人視大夫大夫退然後適小寢釋服君使人視其事盡然後休息則知國之政教事在君所斷之不得歸適國門私朝明國門私朝非君朝矣玉藻云天子皮弁以日視朝是天子之朝服皮弁故退適諸曹服緇衣也羔裘羔裘如濡洵直且侯箋緇衣羔裘諸侯之朝服也朱子集傳葢美其大夫之辭羔裘豹飾孔武有力傳豹飾緣以豹皮也飾疏禮君用純物臣下之故袖異皮唐風羔裘羔裘豹袪自我人居居箋羔裘豹祛在位卿大夫之服也羔裘豹袖自我人究究檜風羔裘羔裘逍遥狐裘以朝傳羔裘以遊燕狐裘以適朝國無政令使我心勞衣箋諸侯之朝服緇衣羔裘大蜡而息民則有黄狐裘今以朝服燕祭服朝是其好潔衣服也蘇氏軾曰錦衣狐裘所以朝天子之服也嚴氏粲曰狐裘有青有白有黄此詩不指何色鄭氏以為黄衣狐裘謂檜君以祭服而朝也蘇氏以為狐白謂檜君以朝天子之服而聽其國之朝也二説不同狐青為臣下之服非檜君所服檜君好潔衣服亦必不服狐黄當從蘇氏以為狐白蕙田案朱子集傳從蘇氏説羔裘翺翔狐裘在堂疏上言以朝謂日出視朝此云在堂謂正寢之堂人君日出視朝乃退適路寢以聽大夫所治之政二者於禮同服羔裘今檜君皆用狐裘故二章各舉其一論語緇衣羔裘疏緇衣羔裘謂朝服也士冠禮云主人𤣥冠朝服緇帶素韠注云𤣥冠委貌朝服者十五升布衣而素裳不言色者衣與冠同色是朝服色𤣥𤣥即緇色之小别此説孔子之服云緇衣羔裘玉藻亦云羔裘緇衣以禓之是羔裘禓用緇衣明其上正服亦緇色也下文又曰羔裘𤣥冠不以弔是羔裘所用配𤣥冠羔裘之上必用緇布衣為裼裼衣之上正服亦是緇色又與𤣥冠相配故知緇衣羔裘是諸侯君臣日視朝之服也吉月必朝服而朝注孔曰吉月月朔也朝服皮弁服文疏皮弁服與君視朔之服也魯自公不行視朔之禮孔子恐其禮廢故每於月朔必衣此視朔之服而朝於君所謂我愛其禮也蕙田案儀禮禮記所謂皮弁服與朝服其用不一然皮弁自皮弁服朝服自朝服未有以皮弁為朝服者何也葢皮弁天子視朝之服𤣥端卿大夫視私朝之服二者似皆可稱朝服而不然者以在朝君臣同服而皮弁綦飾有五采三采之不同𤣥端服則有𤣥裳黄裳雜裳之别獨冠弁為諸侯君臣之朝服上下同之其不同者惟諸侯白舄大夫士白屨諸侯之羔裘純色大夫羔裘豹袖二端無大分别故謂之朝服也玉藻稱孔子曰朝服而朝卒朔然後服之夫告朔之服皮弁服也必卒朔而視朝然後脱皮弁而服朝服則朝服非皮弁服禮記所載甚明孔氏邢氏之説非也聶氏三禮圖説張鎰圖云緇𤣥二服素韠素帶朱綠終禆佩山𤣥玉白舄青絇繶純天子之卿服以從燕諸侯諸侯之孤卿大夫服以朝君蕙田案素帶朱綠終裨佩山𤣥玉白舄專據諸侯而言卿大夫與君不同蕙田案諸侯朝服以視朝朝服周禮司服謂之冠弁服鄭注冠弁委貌也冠弁亦謂之𤣥冠士冠禮主人𤣥冠朝服注𤣥冠委貌是也其名委貌者鄭氏云委猶安也言所以安正容貌也亦謂之委左氏傳劉定公曰吾與子弁冕端委以治民臨諸侯又晏子端委立於虎門國語晋侯端委以入武宫董安于曰臣端委以隨宰人諸所云端者朝服之𤣥端所云委者委貌也其制經無明文聶崇義三禮圖委貌有四式其一舊圖云委貌進賢冠其遺象是也其二漢志云委貌與皮弁冠同制是也其三張鎰圖云諸侯朝服之𤣥冠士之𤣥端之𤣥冠諸侯之冠弁此三冠與周天子委貌形制相同是也其四則梁正因阮氏之本而圖委貌與前三法形制又殊聶氏疑不敢定而以張氏為得之誠然但張氏亦畧有語病葢諸侯朝服之𤣥冠即冠弁亦即委貌本無二制其天子諸侯卿大夫士之𤣥端服惟裳制有異其冠則皆𤣥冠與朝服之𤣥冠亦無二制也張氏之説似猶岐而視之矣諸侯之朝服緇衣素裳素帶朱綠終辟佩山𤣥玉素韠白舄其裘則以羔緇衣以裼之知者詩鄭風緇衣之宜兮鄭武公以諸侯入為周卿士在私朝則服緇衣是緇衣為諸侯朝服也緇衣之布亦十五升雜記朝服十五升是也緇衣亦謂之𤣥衣王制周人𤣥衣而養老注𤣥衣素裳天子之燕服為諸侯朝服士冠禮疏云𤣥為六入緇為七入深淺不同鄭以緇與𤣥同色者大同小異皆是黒色故云同也亦謂之𤣥端論語注𤣥端諸侯朝服葢端者端正之義以朝服用正幅為之故云端矣知素裳素韠者司服注冠弁服亦積素以為裳玉藻注朝服冠𤣥端素裳也又士冠禮朝服素韠韠與裳同色故云素裳素韠矣素帶朱綠終辟佩山𤣥玉張鎰圖亦云然葢以玉藻文推得之燕禮記燕朝服注朝服謂冠元端緇帶素韠白屨也賈疏以為諸侯朝服應白舄而云白屨者引士冠禮成文其實諸侯當白舄其臣則白屨也諸侯朝服羔裘詩羔裘如濡箋云緇衣羔裘諸侯之朝服是也其臣亦羔裘而豹褎詩羔裘豹飾羔裘豹祛羔裘豹褎玉藻羔裘豹飾緇衣以禓之皆大夫士之禮也孔頴達曰禮君用純物臣下之故袖飾異皮陳用之乃以天子視朝服麛裘青豻褎諸侯視朝服羔裘豹飾上下同之其不然乎裼裘之制漢唐注疏家以為裘之上有裼衣裼衣之上又有正服故邢叔明疏論語云羔裘裼用緇衣明其上正服亦緇色也陳用之則謂袒而見裘曰裼揜而充裘曰襲素衣麑裘則麑裘之上素衣其正服也緇衣羔裘則羔裘之上緇衣其正服也黄衣狐裘錦衣狐裘葢亦若此詩曰衣錦尚褧葢惟錦加褧以惡文著餘衣固不然也此説似亦有理並存之以俟考又案以上冠弁服儀禮士冠禮𤣥端𤣥裳黄裳雜裳可也緇帶爵韠注此莫夕於朝之服𤣥端即朝服之衣易其裳耳上士𤣥裳中士黄裳下士雜裳雜裳者前𤣥後黄玉藻曰韠君朱大夫素士爵韋玉疏此莫夕於朝之服者當是莫夕於君之朝服也案藻云君朝服以日視朝於内朝夕深衣祭牢肉是君朝服朝服夕服深衣矣下又云朝𤣥端夕深衣朝時所服與君不同故鄭注云謂大夫士也則彼朝𤣥端夕深衣是大夫士家私朝也若然大夫士既服𤣥端深衣以聽私朝矣此服注云莫夕於朝之服是士向莫之時夕君之服必以莫為夕者朝禮備夕禮簡故以夕言之也若卿大夫莫夕於君當亦朝服矣云𤣥端即朝服之衣易其裳者上云𤣥冠朝服緇帶素韠此𤣥端亦緇帶彼云朝服即此𤣥端也但朝服亦得名端故論語云端章甫鄭云端諸侯視朝之服耳皆以十五升布為緇色正幅為之同名也云易其裳者彼朝服素韠韠同裳色則裳亦素此既易其裳以三等裳同爵韠則亦易之矣不言者朝服言素韠不言裳故須言易彼言素韠此云爵韠於文自明故不言易也云君朱大夫素士爵者韠之韋色也云君朱者見五等諸侯則天子亦朱矣韠同裳色則天子諸侯朱裳士言爵則此經爵韠亦一也以其裳有三等爵亦雜色故同爵韠若然大夫素裳則與朝服不異者禮窮則同也𤣥端黑屨青絇繶純純愽寸注屨者順裳色𤣥端黒屨以𤣥裳為正也絇之言拘也以為行戒狀如刀衣鼻在屨頭繶縫中紃也純縁也三者皆青愽廣也疏𤣥端有𤣥裳黄裳雜裳經惟云𤣥端黒屨與𤣥裳同色不取黄裳雜裳故云以𤣥裳為正也周禮屨人賈疏繶是牙底相接之縫綴絛於其中絇謂屨頭以絛為鼻純謂以絛為口緣特牲饋食禮主人冠端𤣥注冠端𤣥𤣥冠𤣥端下言𤣥者𤣥冠有不𤣥端者疏𤣥冠有不𤣥端者不𤣥端則朝服也對文則𤣥端有纁裳𤣥裳黄裳雜裳若朝服緇布衣而素裳但六入為𤣥七入為緇大判言之緇衣亦名𤣥是以散文言之朝服亦名𤣥端論語云端章甫鄭云端𤣥端也諸侯日視朝之服以端是正幅非直服名端六冕亦有端稱禮記魏文侯曰吾端冕而聽古樂是冕服正幅亦名端也禮記玉藻朝𤣥端夕深衣注謂大夫士也𤣥疏大夫士以視私朝故服端若朝君之時則朝服也朝服其衣與𤣥端無異但其裳以素耳若大夫莫夕蓋亦朝服其士則用𤣥端故士冠禮注云𤣥端士莫夕於朝之服是也其私朝及在家大夫士夕皆深衣也聶氏三禮圖司服云齋有𤣥端張鎰圖云天子齊𤣥衣𤣥冠𤣥裳黒韠素帶朱綠終辟佩白玉黒舄赤絇繶純諸侯惟佩山𤣥玉為别燕居朱裳朱韠赤舄黒絇繶純卿大夫素裳上士𤣥裳中士黄裳下士雜裳前𤣥後黄大夫以上朝夕服之惟士夕服之夕者若夕晡上視事耳蕙田案大夫士朝朝於君皆朝服其夕見君大夫則朝服士則𤣥端若大夫士夕視事於私朝亦服深衣不服𤣥端也今如禮圖所云大夫以上燕居朝夕服𤣥端既與玉藻夕深衣之文違牾又云惟士夕服之則士朝所服者又何衣耶陳氏禮書𤣥端齊服也諸侯與士以為祭服玉藻𤣥端以祭特牲冠端𤣥是也大夫士以為私朝之服玉藻朝𤣥端是也天子至士亦以為燕服玉藻天子卒食𤣥端以居内則事父母端韠紳是也然則端衣所用固不一矣若夫朝服天子以素諸侯以緇未聞以𤣥端也𤣥端皆𤣥裳或黄裳雜裳可也未聞以素裳也鄭氏釋儀禮謂𤣥端即朝服之衣易其裳耳釋玉藻曰朝服冠𤣥端素裳此説無據蕙田案𤣥端之名見於三禮者不一其以為齊服者周禮司服云齊服有𤣥端素端是也其以為祭服者特牲饋食禮主人冠端𤣥是也天子諸侯祭服皆冕雜記大夫冕而祭於公弁而祭於己士弁而祭於公冠而祭於己然則𤣥端以祭惟士則然玉藻諸侯𤣥端以祭鄭氏破端為冕其説原不可易陳用之據此謂諸侯祭服有𤣥端真大惑矣其以為朝服者大夫士私朝為然玉藻朝𤣥端是也若士夕見君則亦服之以夕禮簡於朝士卑於大夫故不服朝服而服𤣥端鄭注儀禮謂莫夕於朝之服是也其以為燕服者玉藻天子卒食𤣥端以居内則子事父母端韠紳是天子以至士皆得服之但天子燕居則朝夕並服𤣥端諸侯以下皆夕深衣則惟朝服之為不同耳朝服之緇衣與𤣥端同制葢緇之與𤣥猶纁之與黄緇衣可稱𤣥衣纁裳亦可云黄裳其色相近故也朝服君臣皆素裳𤣥端服之裳則天子諸侯以朱大夫以素士有以𤣥以黄以雜之别其𤣥端衣與朝服同鄭皆推校禮經諸文而得之陳氏以為無據亦非又案以上𤣥端服右朝服周禮春官巾車象路朱樊纓七就建大赤以朝注象路以象飾諸末象路無鉤以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝疏以日視朝者謂於路門外常朝之處乗之此雖據常朝而言至于三朝皆乗之夏官道僕掌馭象路以朝夕燕出入注朝夕朝朝莫夕呉氏澄曰朝見羣臣曰朝莫見曰夕燕謂自内外朝乗象路以還燕寢禮記玉藻大夫齊車鹿幦豹犆朝車鹿幦豹犆注幦覆苓也犆讀如直道而行之直直謂緣也臣之朝車與齊車同飾蕙田案巾車金路以封同姓象路以封異姓革路以封四衛木路以封蕃國賈疏凡五等諸侯所得路惟祭祀及朝天子乗之若齊弔及朝并朝夕燕出入可降一等然則諸侯視朝所乗之車同姓以象路異姓以革路四衛以下皆乗木路可知也卿大夫以下朝車經無明文玉藻紀大夫朝車有鹿幦豹犆之文亦未詳何車但以巾車孤乗夏卿乗夏縵大夫乗墨車士乗棧車考之則卿大夫朝車應即此四等之車也右朝車周禮春官大史頒告朔於邦國注天子頒朔於諸侯諸侯藏之祖廟至朔朝於廟告而受行之也疏案禮記玉藻諸侯皮弁聽朔於太祖太祖即祖廟諸侯約天子故縣之於中門帀日斂之藏之於祖廟月朔用羊告而受行之此經及論語稱告朔玉藻謂之聽朔春秋謂之視朔視朔者人君入廟視之告者使有司讀祝以言之聽者聽治一月政令所從言之異耳蕙田案玉藻皮弁以聽朔於太廟賈疏引作太祖小異閏月詔王居門終月注門謂路寢門也鄭司農云月令十二月分在青陽明堂總章𤣥堂左右之位惟閏月無所居居於門故於文王在門謂之閏疏明堂路寢及宗廟皆有五室十二堂四門十二月聼朔於十二堂閏月各於時之門故太史詔告王居路寢門若在明堂告事之時立行祭禮無居坐之處若在路寢堂與門聼事之時各居一月故立居門終月禮記月令孟春之月天子居青陽左个注所以順時氣也青陽左个大寢東堂北偏明疏北偏近北也然則此是明堂北偏而云大寢者欲明堂與大廟大寢制同故兼明於明堂聼朔竟次還大廟次還大寢也然云東堂則知聼朔皆堂不於五角之室中也仲春之月天子居青陽大廟注青陽大廟東堂當大室季春之月天子居青陽右个注青陽右个東堂南偏孟夏之月天子居明堂左个注明堂左个大寢南堂東偏仲夏之月天子居明堂大廟注明堂大廟南堂當大室季夏之月天子居明堂右个注明堂右个南堂西偏中央土天子居大廟大室注大廟大室中央室也東疏案考工記云周人明堂西九筵南北九歩凡室二筵則五室並皆二筵無大小也今中央室稱大室者以中央是土室土為五行之主尊之故稱大以夏后大室則四旁之室皆南北三歩東西三歩三尺中央土室南北四歩東西四歩四尺則周之明堂亦應土室在中央大於四角之室也但文不具耳孟秋之月天子居總章左个注總章左个大寢西堂南偏仲秋之月天子居總章大廟注總章大廟西堂當大室季秋之月天子居總章右个注總章右个西堂北偏孟冬之月天子居𤣥堂左个注𤣥堂左个北堂西偏仲冬之月天子居𤣥堂大廟注𤣥堂大廟北堂當大室季冬之月天子居𤣥堂右个注𤣥堂右个北堂東偏蕙田案明堂與大寢不同制辨詳吉禮明堂門玉藻天子𤣥端聽朔於南門之外閏月則闔門左扉立於其中注南門謂國門也天子廟及路寢皆如明堂之制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿於路寢亦如之閏月非常月也聽其朔於明堂門中還處路寢門終月凡聽朔必以特牲告其帝及神配以文王武王陽疏云每月就其時之堂而聽朔焉者月令孟春居青左个仲春居青陽大廟季春居青陽右个以下所居各有其處是每月就其時之堂也云閏月非常月也者案文六年云閏月不告月猶朝於廟公羊云不告月者何不告朔也曷為不告朔天無是月也閏月矣何以謂之天無是月是月非常月也何休云不言朔者閏月無告朔禮也穀梁之義與公羊同左氏則閏月當告朔案異義公羊説每月告朔朝廟至於閏月不以朝者閏月殘聚餘分之月無正故不以朝經書閏月猶朝廟譏之左氏説閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時政也許君謹案從左氏説不顯朝廟告朔之異謂朝廟而因告朔故鄭駁之引堯典以閏月定四時成嵗閏月當告朔又云説者不本於經所譏者異其是與非皆謂朝廟而因告朔似俱失之朝廟之經在文六年冬閏月不告月猶朝於廟辭與宣三年春郊牛之口傷改卜牛牛死乃不郊猶三望同言猶者告朔然後當朝廟郊然後當三望今廢其大存其細是以加猶譏之論語曰子貢欲去告朔之餼羊周禮有朝享之禮祭然則告朔與朝廟祭異亦明矣如此言從左氏説又以先告朔而後朝廟鄭以公羊閏月不告朔為非以左氏告朔為是二傳皆以先朝廟而因告朔二者皆失故鄭云其是與非皆謂朝廟而因告朔俱失之也鄭必知告朔與朝廟異者案天子告朔於明堂其朝享從祖廟下至考廟故祭法云曰考廟曰王考廟皆月祭之是也又諸侯告朔在太廟而朝享自皇考至考故祭法云諸侯自皇考以下皆月祭之是告朔與朝廟不同又天子告朔以特牛諸侯告朔以羊其朝享各依四時常禮故用太牢故司尊彛朝享之祭用虎彛蜼彛大尊山尊之等是其别也云聽其朔於明堂門中還處路寢門終月者以閏非常月無恒居之處故在明堂門中案太史云閏月詔王居門終月是還處路寢門終月謂終竞一月所聽之事於一月中耳於尋常則居燕寢也故鄭注太史云於文王在門謂之閏是閏月聼朔於明堂門反居路寢門皇氏云明堂有四門即路寢亦有四門閏月各居其時當方之門義或然也云凡聽朔必以特牲告其帝及神配以文王武王者論語云告朔之餼羊注云天子特牛與以其告朔禮畧故用特牛案月令每月云其帝其神故知告帝及神以其在明堂之中故知配以文王武王之主亦在明堂以汎配五帝或以武王配五神於下其義非也張子曰據玉藻天子聽朔於明堂諸侯則於太廟就藏朔之處告祖而行馬氏晞孟曰告朔於廟明其受之於祖也聽朔於南門之外明其受之於天也諸侯皮弁以聽朔於太廟注皮弁下天子也皮疏以天子用𤣥冕諸侯用弁故云下天子也此諸侯聼朔於太廟熊氏云周之天子於洛邑立明堂惟大享帝就洛邑耳其每月聼朔當在文王廟也以文王廟為明堂制故也此聽朔於太廟榖梁傳云諸侯受乎禰廟與禮乖非也凡每月以朔告神謂之告朔即論語云告朝之餼羊是也則於時聼治此月朔之事謂之聼朔此玉藻文是也聼朔又謂之視朔文十六年公四不視朔是也告朔又謂之告月文六年閏月不告月是也行此禮天子於明堂諸侯於太祖廟訖然後祭於諸廟謂之朝享司尊彛云朝享是也又謂之朝廟文六年云猶朝於廟是也又謂之朝正襄二十九年釋不朝正於廟是也又謂之月祭祭法云皆月祭之是也方氏慤曰天子聼朔於南門示受之於天也諸侯聼朔於太廟示受之於祖也諸侯受朔於天子而云受之於祖者以已得受朔於天子由祖故也元冕祭服也皮弁朝服也天子以祭服受之於天故神之諸侯以朝服受之於祖故明之春秋僖公五年左傳春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也注視朔親告朔也視疏公既告廟受朔即聽此朔之政文公十六年夏五月公四不視朔注諸侯每月必告朔聼政因朝於廟今公以疾闕不得視二月三月四月五月朔也春秋十二公以疾不視朔非一也義無所取故特舉此以表行事因明公之實有疾非詐齊朔疏天子頒朔於諸侯諸侯受而藏之於祖廟每月之以特羊告廟受而施行之遂聼治此月之政謂之視朔因以其日又以朝享之禮祭皇考以下謂之朝廟此年公疾自二月至於五月已經四月不得視朔故書公四不視朔告朔謂告於祖廟視朔謂聼治月政視朔由公疾而廢其告朔或有司告之不必廢也論語云子貢欲去告朔之餼羊必是廢其禮而羊在葢從是以後更有不告朔者故欲去其羊耳六年閏月不告月書經以譏之在後若不告朔不復書之者葢以閏月不告其譏已明故於後不復譏之公羊何注視朔説在六年不舉不朝廟者禮月終於廟先受朝政乃朝明王教尊也朝廟禮也故以不視朔為重常以朔者始重也文六年閏月不告月何注禮諸侯受十二月朔政於天子藏於太祖廟每月朔朝廟使大夫南面奉天子命君北面而受之比時使有司先告朔禮之至也受於廟者孝子歸美先君不敢自專也言朝者縁生以事死親在朝朝莫夕已死不敢渫鬼神故事必於朔者感月始生而朝蕙田案告朔與朝廟無二禮何邵公注公羊其説甚明鄭康成乃别以司尊彞之朝享當朝廟殊誤詳見吉禮告朔門左傳公四不視朔疾也公羊傳公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也注言無疾大惡不可言也是後公不復視朔政事委任公子遂家語季康子朝服以縞曾子問於孔子曰禮乎孔子曰諸侯皮弁以告朔然後服之以視朝若此禮者也荀悦申鑒曰天子南面聽天下嚮明而治葢取諸離天之道也月正聽朝國家之大事也宜正其儀以明舊典杜氏預春秋釋例人君者設官分職以為民極逺細事以全委任之責從諸下以盡知力之用總成敗以效能否執八柄以明誅賞故自非機事皆委任焉誠信足以相感事實盡而不擁故受位居職者思効忠善日夜自進而無所顧忌也天下之細事無數一日二日萬端人君之明有所不照人君之力有所不堪則不得不借問近習有時而用之如此則六鄉六遂之長雖躬履此事躬造此官當皆移聽於内官回心於左右政之粃亂常必由此聖人知其不可故簡其節敬其事因月朔朝廟遷坐正位㑹羣吏而聽大政考其所行而決其煩疑非徒議將然也乃所以考已然又惡其宻聽之亂公也故顯聚以㫁之是以上下交泰官人以理萬民以察天下以治也每月之朔必朝於廟因聽政事事敬而禮成故告以特牛然則朝廟朝正告朔視朔皆同日之事所從言異耳右聽朔周禮天官宰夫掌治朝之法敘羣吏之治以待賔客之令諸臣之復萬民之逆注恒次敘諸吏之職事三者之來則應使辦理之鄭司農云復請也逆迎受王命者宰夫主諸臣萬民之復逆故詩人重之曰家伯維宰元謂復之言報也反也反報於王謂於朝廷奏事自下而上曰逆逆謂上書廷疏復謂羣臣受王命使臣行之訖反報於王故云朝奏事也自上而下曰順故自下而上曰逆也言上書者則今之上表也若然據夏官諸侯諸臣萬民皆復逆並有則此亦皆有上書奏事耳吳氏澄曰令者賔客有求於朝也復者諸臣反命於上也逆者萬民有言於上也待之有敘則下得以致其情於上待之無敘則上無以審擇於其下故賔客之令有輕重諸臣之復有先後萬民之逆有緩急宰夫皆敘羣吏之治以待之則賔客臣民俱順矣邱氏濬曰案天官卿冡宰其貳則少宰少宰之次又有宰夫王眡朝則冡宰贊聽治而宰夫掌其治之法所謂敘羣吏之治即今百司各奏所治之事也待賔客之令即今鴻臚引見藩府所遣使及外夷也諸侯之復萬民之逆即今通政司所奏事也正公卿大夫羣吏之位正之為言疏謂察其不如儀者即前代殿中御史之職今輪御史糾儀也古今委任之職不同而所當為之令所當禁之法則一而已夏官太僕掌正王之服位出入王之大命掌諸侯之復逆建路鼓於大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庻子注服王舉動所當衣也位立處也出大命王之教也入大命羣臣所奏行也鄭司農云復謂奏事也逆謂受下奏窮謂窮冤失職則來撃此鼓以達於王若今時上變事撃鼓矣遽傳也若今時驛馬軍書當急聞者亦撃此鼔令聞此鼓聲則速逆御僕與御庻子也太僕主令此二官使速逆窮遽者𤣥謂達窮者謂司寇之屬朝士掌以肺石達窮民聼其辭以告於王遽令郵驛上下程品御僕御庻子直事鼔所者太僕聞鼔聲則速逆此二官當受其事以聞吳氏澄曰建路鼔於大寢門之外非惟以鼓為朝事早晩之節也葢亦如後世之登聞鼔焉窮謂窮冤失職者遽令謂事當急聞者之政令也御僕御庻子二官皆直事於鼓所者若聞鼓聲則太僕即速迎此二官而受其事也小臣掌三公及孤卿之復逆疏諸侯是賔客其復逆太僕尊官掌之三公孤卿是臣在朝廷故小臣掌也御僕掌羣吏之逆及庻民之復以序守路鼓注羣吏府史以下序更羣疏太僕掌諸侯復逆小臣掌三公孤卿復逆此所云吏對庻民是府史以下言以下兼胥徒若然不見大夫士者小臣孤卿中兼之矣序更者即太僕鄭云直事鼔所者也蕙田案内豎掌内外之通令凡小事注云内外以大事聞王則俟朝而自復然則宰夫太僕小臣御僕所掌諸臣之復逆皆以大事聞於王者也諸臣復逆大率在路寢聽政之時不必正當眡朝而於此可以想見先王之勤政事通下情舜之好察邇言大禹之稽於衆皆由此道也故先著於此又案以上復逆禮記玉藻將適公所宿齊戒居外寢沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝煇如也登車則有光矣注思所思念將以告君者也對所以對君者也命所受君命者也書之於笏為失忘也私朝自大夫家之朝也揖其臣乃行陳氏澔曰既服著朝服畢也容觀容貌儀觀也玉聲佩玉之聲也揖私朝與其家臣揖而往朝於君也論語孔子沭浴而朝朱子集注沐浴齋戒以告君重其事而不敢忽也右臣將適君所禮記玉藻朝辨色始入注羣臣也入入應門也辨猶正也别也蕙田案此諸侯之禮諸侯有庫雉路三門則所入者雉門也鄭誤以平諸侯有臯應路故云應門詩齊風雞鳴雞既鳴矣朝既盈矣傳朝盈而君作論語入公門鞠躬如也如不容立不中門行不履閾朱子集注公門髙大而若不容敬之至也中門中於門也謂當棖闑之間君出入處也閾門限也右臣入門禮記玉藻君日出而視之陳氏澔曰臣入常先君出常後尊卑之禮然也視朝而見羣臣所以通上下之情詩齊風雞鳴東方明矣朝既昌矣毛傳朝己昌盛則君聼朝蕙田案雞鳴而朝盈玉藻所謂辨色始入也東方明而聼朝所謂君日出而視之也及其衰也朝廷興居無節東方未明而顛倒衣裳違視朝之常期則詩人刺之東方未明東方未明顛倒衣裳顛之倒之自公召之箋挈壺氏失漏刻之節東方未明而以為明故羣臣促遽顛倒衣裳羣臣之朝别色始入自從也羣臣顛倒衣裳而朝人又從君所來而召之漏刻失節君又早興蕙田案小雅庭燎一篇蘇氏詩傳以為王將起視朝不安於寢而問夜之早晩朱子集傳亦因之然案之周禮秋官司烜邦之大事則供墳燭庭燎葢惟諸侯來朝設之其日視朝不設庭燎也當從箋義以為諸侯來朝故不載宗元案古人習勤子事父母皆雞初鳴而盥漱况人君聼朝有不於其時者乎雖人臣之入朝猶辨色君之視朝俟日出然櫛洗衣冠必於色未辨日未出時方能及時朝㑹其餘執事侍御之臣尤當早集於朝門此庭燎之所以不可不設今据司烜氏國有大事共墳燭庭燎然亦未嘗指定常朝之非大事也且墳燭與庭燎並言或常朝但有庭燎而不設墳燭或庭燎為數差減不比諸侯來朝時之多亦未可定歟論語君在踧踖如也與與如也馬曰君在視朝也踧踖恭敬之貌與與威儀中適之貌孟子朝將視朝右君出視朝周禮夏官司士司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右注特揖一一揖之也旅衆也大夫爵同者衆揖之公及孤卿大夫始入門石皆北面東上王揖之乃就位羣士及故士太僕之屬登在其位羣士位東面王西南嚮而揖之三揖者士有上中下王揖之皆逡遁既復位邱氏濬曰天子視朝之際臣下入朝之初大臣則逐位而拜羣臣則逐列而拜小臣則即其位而旁拜左右侍從之臣則方有事而未暇也故王於大臣則答以特揖之禮於羣臣則答以旅揖之禮於小臣則於再揖之後向其旁而答之焉聽政既畢王將還内而侍衛於門之左右者始行拜禮王於是隨其所在而左右揖之可見隆古盛時以禮為治位有尊卑而禮無不答也秦不師古始尊君卑臣而此禮廢矣禮記禮器諸侯視朝大夫特士旅之注大夫特士旅之謂君揖之疏視朝謂日出視諸臣之朝者也特猶獨也旅衆也君行日出路門視諸臣之朝若大夫則君人人揖之若士則不問多少而君衆共一揖之也是大夫貴故人人得揖士賤故衆共得一揖是以少為貴也此諸侯所尊者少故大夫特士旅之若天子之朝所尊者多故司士云孤卿特揖大夫以其等旅揖士旁三揖是也王制七十不俟朝注大夫士之老者君揖則退故不俟朝疏此謂大夫士老年而聼致仕者朝君之時入門至朝位君出揖之即退不待朝事畢也右揖夏官司士大僕前注前正王視朝之位大僕王眡朝則前正位而退入亦如之注前正位而退道王王既立退居路門左待朝畢位疏太僕本位在路門之左今進前正位訖還退在本故云退居路門左也王退入路寢聼事時亦前正王位却位立也右正位天官冢宰王眡治朝則贊聽治注王視之則佐王平㫁蕙田案聽治一節當在太僕正王位之後冢宰職之凡邦之小治則冢宰聽之則此眡朝所聽之治乃國家大事也右聽治夏官司士王入内朝皆退注王入入路門也王入路門内朝朝者皆退反其官府治處也玉藻退適路寢聽政使人視大夫大夫退然後適小寢釋服注小寢燕寢也釋服服𤣥端周禮宮人賈疏辨色始入者謂羣臣昧爽至門外辨色始入應門云君日出而視朝者尊者體盤故日出始出路門而視朝退適路寢聼政者謂路門外朝罷乃退適路寢以聼政朝罷君退適路寢之時大夫各鄉治事之處陳氏澔曰聽事而適路寢所以決可否之計釋服釋朝服也蕙田案古者視朝之禮甚簡既朝而退君適路寢聽政臣適諸曹治事諸臣治事之所即匠人所謂外九室是也其室在路門外治朝之左右如今午門朝房矣鄭康成箋詩以治事之所為私朝葢以卿大夫議朝政於此故亦得名朝曲禮云在朝言朝論語朝與下大夫言與上大夫言其在朝廷便便言皆指治事之朝而言也陳氏禮書朝辨色始入所以防㣲日出而視之所以優尊詩曰夜向晨言觀其旂臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也葢尊者體􅐻卑者體蹙體蹙者常先體􅐻者常後故視學衆至然後天子至燕禮設賔筵然後設公席則朝禮臣入然後君視之皆優尊之道也然朝以先為勤以後為逸退以先為逸以後為勤朝而臣先於君所以明分守退而君後於臣所以防怠荒此所以使人視大夫大夫退然後適小寢釋服也然則公卿諸侯之朝王其有先後乎詩云三事大夫莫肯夙夜邦君諸侯莫肯朝夕夫夙先於朝夜後於夕則公卿朝常先至夕常後退諸侯朝常後至夕常先退邱氏濬曰人君每日出視治朝見羣臣以通上下之情退適路寢聽政治以決可否之計葢視朝之時百官班次以列趨蹌以進漏下無幾刻耳奏對之際機務雜沓未易一一詳悉也故於退朝之後再御燕寢取其事務之急且切者重聽之與夫左右臣工所謂股肱心膂者委曲講究必罄竭其本末終始如此行之則便不如此則弊俾上心曉然於中而奉行之臣亦灼然知其必如此而不可如彼然後行下如此則朝廷所行之事皆所當行所禁之事皆所不當行行之萬世而無弊太平之根本在此矣右退朝禮記曲禮在朝言朝注朝謂君臣謀政事之朝朝言不及犬馬輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固注輟猶止也固謂不達於禮在朝言禮問禮對以禮論語其在朝廷便便言唯謹爾朝與下大夫言侃侃如也與上大夫言誾誾如也右在朝言語之節周禮地官師氏凡祭祀賔客㑹同䘮紀軍旅王舉則從聽治亦如之注舉猶行也謂王舉於野外以聽朝如疏王所在皆有朝以聽治之故從王亦上虎門之左同朝在野外則守内列注内列謂蕃營之在列者也其屬亦帥四夷之隷守之如守王宫天官冢宰王眡四方之聽朝則贊聽治注謂王廵守在外時疏此據依常者而言征伐外亦有聼朝以非常法故不言也蕙田案以上二條天子在外之聽朝夏官太僕王不眡朝則辭於三公及孤卿注辭謂以王不視朝之意告之春秋傳曰公有疾不視朔蕙田案此條王不眡朝禮記曽子問諸侯適天子必告於祖奠於禰冕而出視朝注聼國事也諸侯朝天子必禆冕為將廟受也禆冕者公衮侯伯鷩子男毳疏諸侯視朝當用𤣥冠緇衣素裳今視朝而服禆冕之服者案覲禮侯氏禆冕天子受之於廟故云諸侯朝天子必禆冕為將廟受也言天子於廟受己之禮今諸侯往朝天子為天子將欲於廟中受己之禮故諸侯豫敬之以冕服視朝也諸侯相見必告於禰朝服而出視朝注朝服為事故也反必親告於祖禰而后聽朝而入疏諸侯朝服𤣥冠緇衣素裳以上文諸侯朝天子冕而出視朝為將廟受尊敬天子習其禮故著冕服諸侯相朝雖亦在廟受降下天子不敢冕服惟著臨朝聼事之服故云朝服為事故也熊氏又云此朝服謂皮弁服以天子用以視朝故謂之朝服論語云吉月必朝服而朝注云朝服皮弁服是也聘禮諸侯相聘皮弁服則相朝亦皮弁服此義為勝也蕙田案此二條諸侯有事視朝右視朝變禮春秋成十三年左氏傳百官承事朝而不夕注不夕言無事疏旦見君謂之朝莫見君謂之夕哀十四年傳稱子我夕晋語稱叔向夕皆謂夕見君也人息事少故百官承奉職事皆朝朝而莫不夕不夕言無事也儀禮士冠禮賈疏無事亦無夕法若夕有事須見君則夕昭十二年左傳右尹子革夕注夕莫見哀十四年左傳子我夕注夕視事蕙田案杜預以子我夕為視事孔疏以為夕見君當從孔氏國語叔向聞之夕注夕至於朝右夕見周禮秋官小司寇之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君注國危謂有兵冦之難國遷謂徙都改邑也立君謂無冢適選於衆也鄭司農云致萬民聚萬民也詢謀也詩曰詢于芻蕘書曰謀及庻人疏國危謂鄰國來侵伐與國為難者也國遷謂王國遷徙若殷之盤庚遷殷之類若遷卿大夫都邑不在詢限立君冢適雙言案内則而言謂適后所生最長者為冢若無冢適后所生次冢以下為適則適者非一若無適則於衆妾所生擇立之衆妾所生非一是以須與衆人共詢可否此三者皆採衆心衆同乃可依用也小司寇擯以叙進而問焉以衆輔志而弊謀注擯謂揖之使前也敘更也輔志者尊王賢明也進疏以敘進者案小宰六敘皆先尊後卑則此言以敘謂先公卿以次而下此既在朝立定而問之明擯者無别相見之禮故知以次一一揖之使前問之地官鄉大夫大詢於衆庻則各帥其鄉之衆寡而致於朝注大詢者詢國危詢國遷詢立君鄭司農云大詢於衆庻洪範所謂謀及庻人疏國有大事必順於民心故與衆庻詢謀則六卿大夫各帥其鄉之衆寡而致於朝謂外朝三槐九棘之所共詢謀之書洪範汝則有大疑謀及乃心謀及卿士謀及庻人詩大雅先民有言詢于芻蕘蕙田案以上外朝詢事之制孟子昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人我將去之春秋哀元年左傳吳之入楚也使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逢滑當公而進蕙田案小司寇致萬民而詢詢國危居其一焉鄭氏訓國危謂有兵寇之難賈公彦以為鄰國來侵伐與國為難者也但天子詢國危於古無考孟子載太王為狄人所侵屬耆老而告之則周先公已有行之者矣左傳陳懷公事乃諸侯詢國危之見於經者又僖十五年秦獲晉侯以歸子金曰朝國人而以君命賞亦與詢危之事同以其時君亡在外諸大夫稱君命而行之故不復載蕙田案以上詢國危易益卦六四中行告公從利用為依遷國程傳自古國邑民不安其居則遷遷國者順下而動也書盤庚上盤庚遷於殷民不適有居率籲衆慼出矢言盤庚斆於民由乃在位以常舊服正法度曰無或敢伏小人之攸箴王命衆悉至於庭蕙田案古者建國辨方正位體國經野以為民極必順乎人心之所同欲而後相宅焉周公營洛邑四方民大和㑹侯甸男邦采衛百工播民和見士於周則諸侯百官庻民咸與聞可知矣至若不得已而有遷國之役或迫於天灾如殷有河患是也或逼於寇難則君親御外朝進百官兆姓而詢之詢謀僉同然後決之所謂作大事必順於人心也周衰平王東遷不聞詢之萬民葢此禮已廢春秋晉遷新田謀之諸臣而已邾遷於繹衛遷帝邱決之卜筮而已楚遷於鄀決之正卿而已其餘邢遷夷儀蔡遷州來許遷夷又遷白羽之類迫於彊寇捄亡而已何足道哉又案以上詢國遷書大禹謨朕志先定詢謀僉同春秋昭公二十有六年左傳昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也疏何休難年鈞以德之言云人君所賢下必從之焉能使王不立愛也鄭元答云周禮小司寇掌外朝之政以致萬民而詢焉其三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司寇以叙進而問焉如此則大衆之口非君所掩是王不立愛之法也哀二年左傳衛侯遊於郊子南僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祗辱注三揖卿大夫士言立適當以禮與内外同之今君私命事必不從適為辱揖疏周禮司士云孤卿特揖大夫以其等旅揖士旁三鄭衆云卿大夫士皆君之所揖禮春秋傳所謂三揖在下服䖍云三揖卿大夫士土揖庻姓時揖異姓天揖同姓孟子謀於燕衆置君而後去之惠氏士竒曰春秋王子朝與敬王爭立求助於晉晉欲助之而莫知適立也乃使士景伯蒞問於周士伯立於乾祭而問介衆由是遂絶子朝之使而戴敬王君子曰禮夫禮立君必詢萬民也堯年老而子不肖舜有元德而在側微帝聞之而岳牧不舉於是帝朝萬民而詢之廷民之所舉一如帝之所聞而當乎帝心於是史臣書之曰師錫帝介衆曰師以為舜有天下也衆錫之曷為不曰天錫之而曰衆錫之天逺而衆邇也不孚於衆而合乎天妄矣且古者立君問諸民不問諸神楚共王有寵子五人未知誰立乃大有事於羣望而祈焉宻埋璧於庭而使五人入拜且曰當璧而拜者神所立也既而或跨之或壓之或加之皆可以為當璧則神之所命誰知之者適以啟其覬覦之心而前有蒲宫後有奥主臣强於君末大於本亂幾亡國故古者立君問諸民不問諸神然則太卜曷為而卜立君卜立君者先王先蔽志而後命龜謀及卿士謀及庻人乃參之以卜筮未有不謀於卿士不謀乎庻人而專信卜筮之説者也蕙田案鄭氏訓立君謂國無冡適選於衆專指繼嗣葢舉其常而言若孟子稱堯禪舜則曰暴之於民而民受之尚書稱舜禪禹則曰詢謀僉同是五帝官天下必詢於民也孟子論伐燕之役云謀於燕衆置君而後去之是諸侯興滅繼絶必詢於民也惠氏謂古者立君問諸民不問諸神此説得之又案以上詢立君邱氏濬曰案王朝有三有内朝有治朝有外朝治朝其常治事之位内朝則退居之處也外朝不常御惟國家有非常之事然後御於此致萬民而詢謀之焉若夫常行之事則在治朝與羣臣案古典而施行之也洪範曰汝則有大疑謀及乃心謀及卿士謀及庻人詩曰詢于芻蕘此所謂致萬民而詢焉詢及萬民則卿大夫士皆在其中矣國危則詢之而求其所以安國之策國遷則詢之而求其所以徙國之方立君則詢之而求其所以嗣國之人三者皆國之大政必民心之所安衆論以為可然後行之苟非徧訪於人人其不至於逆天理而拂人心也者幾希然其詢之不於治朝而必於外朝者以民之衆且微治朝之嚴與狹非獨不可使之䙝入亦恐不足以容之也周禮秋官朝士掌建邦外朝之灋左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石達窮民焉注樹棘以為位者取其赤心而外刺象以赤心三刺也槐之言懷也懷來人於此欲與之謀羣吏謂府史也州長鄉遂之官帥其屬而以鞭呼趨且辟注趨朝辟行人執鞭以威之禁慢朝錯立族談者注慢朝謂臨朝不肅敬也錯立族談違其位僔語也疏違其位解錯立僔亦聚也聚語解族談也邱氏濬曰案外朝在庫門之外最居外者也人君不常御國家有大禮典則於此朝㑹而朝士掌其法有大疑難則於此詢問而小司寇掌其政法者經常之制政者權宜之事也朝著之間有上下之位有前後之次入者必循序漸進而不可參差立者必肅容守次而不可錯亂非奏對不言無故不可聚而喧譁故當人臣朝見之時小司寇則擯而相之使之次第而進朝士則帥其屬而用鞭號呼以肅之使之各趨其位而知所避焉後世人君出警入蹕而鳴鞭以肅衆其原葢出於此蕙田案以上外朝聽政之儀右外朝詢事聽政五禮通考卷一百三十二
