body:
  text: 五禮通考卷二百二十九刑部尚書秦蕙田撰賓禮十諸侯會盟遇蕙田案周禮邦國有疑會同則司盟掌其盟約之載北面詔明神既盟則二之何休云古者諸侯將朝天子必先會間隙之地考德行一刑法講禮義正文章習事天子之儀尊京師重法度恐過誤也又云古者有遇禮為朝天子若朝罷時卒相遇于塗近者為主逺者為賓稱先君以相接何氏去古未逺其言當有傳授然則古諸侯有會盟遇之禮皆因朝覲天子而後修之以奬王室睦鄰好春秋之世諸侯不尊天子而假此禮以行之故荀卿榖梁子有盟詛不及三王之論非古無是禮也今録曲禮所載遇會誓盟四者之義而以春秋所書者附之以見世變云禮記曲禮諸侯未及期相見曰遇相見于郤地曰會約信曰誓涖牲曰盟注及至也郤間也涖臨也坎用牲臨而讀其盟書遇會誓盟禮亡疏天下太平之時諸侯不得擅相與盟唯天子巡守至方嶽之下會畢然後乃與諸侯同盟同好惡奬王室以昭事神訓民事君凡國有疑會同則盟詛其不信者及殷見曰同並用此禮後至于五霸之道卑于三王有事而會不協而盟盟之為法先鑿地為方坎殺牲于坎上割牲左耳盛以珠槃又取血盛以玉敦用血為盟書成乃歃血而讀書知坎血加書者案僖二十五年左傳云坎血加書又襄二十六年左傳云坎用牲加書是也知用耳者戎右職云贊牛耳知用左者以馘者用左耳故也知珠槃玉敦者戎右職云以玉敦辟盟又玉府云則共珠槃玉敦知口歃血者隱七年左傳云陳五父及鄭伯盟歃如忘又襄九年云新與楚盟口血未乾是也盟牲所用許慎據韓詩云天子諸侯以牛豕大夫以大庶人以雞又毛詩説君以豕臣以犬民以雞又左傳云鄭伯使卒出豭行出犬雞以詛射頴考叔者又云衛伯姬盟孔悝以豭鄭云詩説及鄭伯皆謂詛小于盟周禮戎右職云盟則以玉敦辟盟遂役之贊牛耳桃茢又左傳云孟武伯問于髙柴曰諸侯盟誰執牛耳然則盟者人君以牛伯姬盟孔悝以豭不人君也皇氏以為春秋時盟乃割心取血故定四年王割子期之心與隨人盟杜云當心前割取血以盟示其至心是也春秋昭公三年左氏傳有事而會不協而盟疏諸侯朝天子因朝而為盟會所以同好惡奬王室霸主之合諸侯不得令其同盟以奬已故令有事而會不協而盟不復設年限之期蕙田案此子太叔所説晉文襄之霸制右會盟遇名義春秋隱公元年三月公及邾儀父盟于蔑杜注附庸之君未王命例稱名能自通于大國繼好息民故書字貴之劫疏諸侯之盟亦有壇故柯之盟公羊傳曹子以手劍桓公于壇是也其盟神則無復定限故襄十一年傳稱司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖是也其盟用牛牲故襄二十六年傳云歃用牲又哀十七年傳云諸侯盟誰執牛耳是也其殺牛必取血及耳以手執玉敦之血進之于口知者定八年涉他捘衛侯之手及腕又襄九年傳云與大國盟口血未乾是也既盟之後牲及餘血并盟載之書加于牲上坎而埋之故僖二十五年傳云宵坎血加書是也春秋之世不由天子之命諸侯自相與盟則大國制其言小國尸其事故釋例曰盟者殺牲載書大國制其言小國尸其事珠槃玉敦以奉流血而同歃是其事也桓十七年公會邾儀父盟于趡彼言會此言及者彼行會禮此不行會禮故也故劉炫云策書之例先會後盟者上言會下言盟惟盟不會者直言及此為不行會禮故言及也或可史異辭非先會而盟則稱會知者文七年公會諸侯晉大夫盟于扈傳云公後至則是不及其會而經稱會故知盟稱會者未必先行會禮也左氏傳邾子克也未王命故不書爵曰儀父貴之也注王未賜命以為諸侯其後儀父服事齊桓以奬王室王命以為邾子故莊十六年經書邾子克卒公攝位而欲求好于邾故為蔑之盟公羊傳及者何與也會及暨皆與也曷為或言會或言及或言暨會猶最也注最聚也直自若平時聚會無他深淺意也及猶汲汲也暨猶暨暨也及我欲之暨不得已也儀父者何邾婁之君也何以名字也曷為稱字褒之也曷為褒之為其與公盟也與公盟者衆矣曷為獨褒乎此因其可褒而褒之此其為可褒奈何漸進也昧者何地期也榖梁傳及者何內為志焉爾儀字也父猶傅也男子之美稱也其不言邾子何也邾之上古微未爵命於周也不日其盟渝也九月及宋人盟于宿杜注客主無名皆微者也宿小國凡盟以國地者國主亦與盟左氏傳始通也公羊傳孰及之內之微者也榖梁傳及者何內卑者也宋人外卑者也卑者之盟不日宿邑名也二年冬十月紀子伯莒子盟于密子伯左氏作子帛也杜注子帛裂繻字莒魯有怨紀侯既昏于魯使大夫盟莒以和解之左氏傳紀子帛莒子盟于密魯故也公羊傳紀子伯者何無聞焉爾榖梁傳或曰紀子伯莒子而與之盟注紀子以莒子為伯而與之盟伯長也或曰年同爵同故紀子以伯先也注年爵雖同紀子自以為伯而先三年冬十有二月齊侯鄭伯盟于石門左氏傳齊鄭盟于石門尋盧之盟也注盧盟左春秋前八年秋七月庚午宋公齊侯衛侯盟于瓦屋左氏傳盟于瓦屋以釋東門之役禮也榖梁傳外盟不日此其日何也諸侯之參盟于是始故謹而日也誥誓不及五帝注五帝之世道化淳備不須誥誓而信自著盟詛不及三王注三王謂夏殷周也夏啓有鈞臺之享商湯有景亳之命周武有孟津之會衆所歸信不盟詛也疏周禮秋官司盟之官掌盟載之法云盟詛不及三王者周公制盟載之法謂凡邦國有疑會同始為之不如春秋之世屢盟也交質子不及二伯注二伯謂齊桓晉文蕙田案荀卿亦云盟詛不及三王與榖梁同然周官司盟掌盟載之法天子會諸侯于方嶽加方明于壇而盟之三王之世非無盟也榖梁及荀子所譏謂春秋諸侯自相盟不命于天子者也九月辛卯公及莒人盟于浮來浮公榖作包左氏傳以成紀好也注二年紀莒盟于密為魯故今公尋之故曰以成紀好公羊傳公曷為與微者盟稱人則從不疑也榖梁傳可言公及人不可言公及大夫桓公元年夏四月丁未公及鄭伯盟于越左氏傳公及鄭伯盟于越結祊成也盟曰渝盟無享國榖梁傳及者內為志焉爾越盟地之名也二年九月公及戎盟于唐左氏傳修舊好也十有一年春齊人衛人鄭人盟于惡曹左氏傳齊衛鄭宋盟于惡曹注宋不書經闕十有四年夏五鄭伯使其弟語來盟左氏傳鄭子人來盟且修曹之會榖梁傳諸侯之尊弟兄不得以屬通其弟云者以其來我舉其貴者也來盟前定也不日前定之盟不日夏五傳疑也十有七年公及邾儀父盟于趡及左氏作會左氏傳及邾儀父盟于趡尋蔑之盟也蕙田案公榖皆作公及左氏傳亦云及邾儀父盟于趡惟經文云公會疑誤也莊公九年春公及齊大夫盟于蔇蔇公榖作暨左氏傳齊無君也公羊傳公曷為與大夫盟齊無君也然則何以不名為其諱與大夫盟也使若衆然榖梁傳公不及大夫大夫不名無君也盟納子糾也不日其盟渝也當齊無君制在公矣當可納而不納故惡內也十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳大夫無遂事此其言遂何聘禮大夫受命不受辭出竟有可安社稷利國家者則專之可也榖梁傳媵淺事也不志此其志何也辟要盟也何以見其辟要盟也媵禮之輕者也盟國之重也以輕事遂乎國重無説其曰陳人之婦略之也其不日數渝惡之也二十有一年秋七月丙申及齊髙徯盟于防公羊傳齊髙徯者何貴大夫也曷為就吾微者而盟公也公則曷為不言公諱與大夫盟也榖梁傳不言公髙徯伉也閔公元年秋八月公及齊侯盟于落姑左氏傳請復季友也榖梁傳盟納季子也二年冬髙子來盟公羊傳髙子者何齊大夫也何以不稱使我無君也然則何以不名喜之也何喜爾正我也其正我奈何莊公死子般弒閔公弒比三君死曠年無君設以齊取魯曽不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至于爭門者是也或曰自爭門至于吏門者是也魯人至今以為美談曰猶望髙子也榖梁傳其曰來喜之也其曰髙子貴之也盟立僖公也不言使何也不以齊侯使髙子也僖公二年秋九月齊侯宋公江人黃人盟于貫左氏傳服江黃也公羊傳江人黃人者何逺國之辭也逺國至矣則中國曷為獨言齊宋至爾大國言齊宋逺國言江黃則以其餘為莫敢不至也榖梁傳貫之盟不期而至者江人黃人也江人黃人者逺國之辭也中國稱齊宋逺國稱江黃以為諸侯皆來至也三年冬公子友如齊蒞盟左氏傳齊侯為陽榖之會來尋盟公羊傳蒞盟者何往盟乎彼也其言來盟者何來盟于我也榖梁傳蒞者位也其不日前定也不言及者以國與之也不言其人亦以國與之也四年夏楚屈完來盟于師盟于召陵左氏傳楚子使屈完如師師退次于召陵屈完及諸侯盟公羊傳屈完者何楚大夫也何以不稱使尊屈完也曷為尊屈完以當桓公也其言盟于師盟于召陵何師在召陵也師在召陵則曷為再言盟喜服楚也何言乎喜服楚楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北狄交中國不絶若線桓公救中國而攘夷狄卒帖荆以是為王者之事也榖梁傳楚無大夫其曰屈完何也以其來會桓成之為大夫也其不言使權在屈完也則是正乎曰非正也以其來會諸侯重之也來者何內桓師也于師前定也于召陵得志于桓公也得志者不得志也以桓公得志為僅矣十有九年夏六月宋公曹人邾人盟于曹南二十年秋齊人狄人盟于邢左氏傳為邢謀衛難也榖梁傳邢為主焉爾邢小其為主何也其為主乎救齊二十有一年春宋人齊人楚人盟于鹿上杜注宋為盟主故在齊人上三十有二年夏衛人侵狄秋衛人及狄盟文公二年三月乙已及晉處父盟左氏傳晉人以公不朝來討公如晉夏四月乙巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公羊傳此晉陽處父也何以不氏諱與大夫盟也榖梁傳不言公處父伉也為公諱也何以知其與公盟以其日何以不言公之如晉所恥也出不書反不致也三年冬公如晉十有二月己巳公及晉侯盟七年秋公孫敖如莒涖盟榖梁傳蒞位也其曰位何也前定也其不日前定之盟不日也十年秋及蘇子盟于女栗杜注蘇子周卿士頃王新立故與魯盟親諸侯也左氏傳頃王立故也十有三年冬公如晉十有二月己丑公及晉侯盟十有五年三月宋司馬華孫來盟左氏傳宋華耦來盟其官皆從之書曰宋司馬華孫貴之也注古之盟會必備威儀崇贄幣賔圭以成禮為敬故傳曰卿行旅從春秋時率多不能備儀華孫能率其屬以從古典故貴而不名榖梁傳來盟者何前定也不言及者以國與之也冬十有一月諸侯盟于扈左氏傳晉侯宋公衛侯蔡侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也凡諸侯會公不與不書諱君惡也與而不書後也趙氏汸曰文七年十五年十七年伯國盟會不序諸侯見中國之無伯也晉襄公卒靈公幼楚人知北方可圖矣趙盾以大夫合諸侯以救鄭不及楚師以三國伐宋取賂而還新城之盟諸侯若不能忘晉者而扈之再盟以賂不克伐齊又再會以定宋文之篡諸侯以為晉不足與也鄭既受盟于楚而齊魯俱二中國遂至于無伯矣中國無伯乃楚之所由興也春秋于靈公之盟會略諸侯不序以明晉伯中衰而楚自厥貉以後君將皆稱君其爵楚君者亦所以志無伯也十有六年六月戊辰公子遂及齊侯盟于郪丘郪公羊作犀穀梁作師榖梁傳復行父之盟也十有七年六月癸未公及齊侯盟于榖宣公七年春衛侯使孫良夫來盟左氏傳衛孫桓子來盟始通且謀會晉也榖梁傳來盟前定也十有一年夏楚子陳侯鄭伯盟于辰陵左氏傳陳鄭服也十有二年冬十有二月晉人宋人衛人曹人同盟于清邱左氏傳卿不書不實其言也成公元年夏臧孫許及晉侯盟于赤棘二年秋七月齊侯使國佐如師己酉及國佐盟于袁婁三年冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟左氏傳晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三注下卿孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫注降一等小國之上卿當大國之下卿中當其上大夫下當其下大夫注降大國二等上下如是古之制也注古制公為大國侯伯為次國子男為小國衛在晉不得為次國注春秋時以強弱為大小故衛雖侯爵猶為小國晉為盟主其將先之注計等則二人位敵以盟主故先晉丙午盟晉丁未盟衛禮也公羊傳此聘也其言盟何聘而言盟者尋舊盟也榖梁傳其日公也來聘而求盟不言及者以國與之也不言其人亦以國與之也不言求兩欲之也十有一年春王三月晉侯使郤犨來聘己丑及郤犨盟左氏傳郤犨來聘且涖盟十有六年十有二月乙丑季孫行父及晉郤犨盟于扈襄公三年夏四月壬戌公及晉侯盟于長樗左氏傳盟于長樗孟獻子相公稽首注相儀也稽首首至地七年十月衛侯使孫林父來聘壬戌及孫林父盟十有五年春宋公使向戌來聘二月己亥及向戌盟于劉二十有九年夏杞子來盟范注杞復稱子蓋時王所黜左氏傳杞文公來盟書曰子賤之也注賤其用夷禮昭公七年三月叔孫婼如齊涖盟婼公羊作舍榖梁傳蒞位也內之前定之辭謂之蒞外之前定之辭謂之來定公三年冬仲孫何忌及邾子盟于拔左氏傳盟于郯注郯即拔也修邾好也七年秋齊侯鄭伯盟于鹹齊侯衛侯盟于沙趙氏汸曰陳氏謂特相盟不書必有關於天下之故而後書紀莒無足道也齊鄭合天下始多故矣故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也今按春秋之初王綱既墜有特相盟而後有參盟諸侯合而為亂也有參盟而後有主盟則伯者興矣自有主盟而後無外特相盟故外特相盟雖伯主不書如僖二十八年晉侯齊侯盟于斂盂宣十八年齊侯會晉侯盟于繒是也惟晉弗主盟而後諸侯始特相盟鹹與沙齊衛鄭皆叛晉也此特相盟所以又見于經也八年冬衛侯鄭伯盟于曲濮十有一年冬叔還如鄭涖盟哀公二年春王二月癸巳叔孫州仇仲孫何忌及邾子盟于句繹榖梁傳三人伐而二人盟何也各盟其得也蕙田案以上書盟不書會又案春秋書內特相盟者七隱元年于蔑桓元年于越十七年于趡閔元年于落姑文十年于女栗十七年于榖襄三年于長樗是也特相盟而不地者二文三年十三年及晉侯盟是也公及外臣盟者二隱八年于浮來莊九年于蔇是也不地者一文二年及處父是也不稱公者一莊二十一年于防是也及戎盟者一桓二年于唐是也內大夫與諸侯盟者四文十六年于郪邱成元年于赤棘定三年于拔哀二年于句繹是也因遂事而盟者二莊十九年公子結是也內大夫特與外臣盟者一成十六年于扈是也內微者與外盟一隱元年于宿是也諸侯來盟者一襄二十九年杞子是也外臣來盟者四桓十四年鄭伯之弟語閔七年齊髙子文十五年宋華孫宣七年衛孫良夫是也因來聘而盟者五成三年晉荀庚衛孫良夫十一年晉郤犨襄七年衛孫林父十五年宋向戌是也內大夫出涖盟者四僖三年公子友文七年公孫敖昭七年叔孫婼定十一年叔還是也外特相盟者五隱二年于密三年于石門定七年于鹹于沙八年于曲濮是也外參盟者五隱八年于瓦屋桓十一年于惡曹僖十九年于曹南二十一年于鹿上宣十一年于辰陵是也外相盟參以上者二僖二年于貫文十五年于扈扈盟諸侯不序是也外同盟者一宣十二年于清丘是也外與狄盟者一僖二十年于邢是也因侵伐而盟者三僖四年于召陵成二年于袁婁及僖三十二年衛及狄是也隱公九年冬公會齊侯于防防公羊作邴左氏傳謀伐宋也榖梁傳會者外為主焉爾十年春王二月公會齊侯鄭伯于中丘十一年夏五月公會鄭伯于時來時來公羊作祈黎左氏傳謀伐許也桓公元年三月公會鄭伯于垂榖梁傳會者外為主焉爾二年三月公會齊侯陳侯鄭伯于稷以成宋亂杜注成平也宋有弒君之亂故為會欲以平之公羊傳內大惡諱此其目言之何逺也榖梁傳以者內為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於內之惡而君子無遺焉爾注江熙曰案宣四年公及齊侯平莒及郯傳曰平者成也然則成亦平也公與齊陳鄭欲平宋亂而取其賂鼎不能平亂故書成宋亂取郜大鼎納于太廟微旨見矣尋理推經傳似失之惠氏士奇曰成者斷獄之名王制所謂成獄辭也秋官訝士掌四方之訟獄四方有亂獄則往而成之成之者聽之也不可謂之平平者和解兩家訓成為平妄矣四方亂獄莫大于弒君桓往成之不成而退反取賂焉孔子直書之傷天下之無王也取賂在後成亂在前左氏一之失經義矣蕙田案春秋書成宋亂之義惟惠氏得之可謂發前人所未發七月蔡侯鄭伯會于鄧左氏傳始懼楚也公羊傳離不言會此其言會何蓋鄧與會爾注二國會曰離二人議各是其所是非其所非所道不同不能決事定是非立善惡不足采取故謂之離會自三國以上言會者重其少從多也能決事定是非立善惡三年春正月公會齊侯于嬴左氏傳成昏于齊也六月公會杞侯于郕杞公羊作紀郕公羊作盛左氏傳杞求成也九月公會齊侯于歡榖梁傳無譏乎曰為禮也齊侯來也公之逆而會之可也注為親迎之禮六年夏四月公會紀侯于成成榖梁作郕左氏傳紀來咨謀齊難也十年公會衛侯于桃丘弗遇公羊傳會者何期辭也其言弗遇何公不見要也榖梁傳弗遇者志不相得也弗內辭也十有一年秋九月公會宋公于夫鍾公羊作夫童冬十有二月公會宋公于闞十有二年八月公會宋公于虗虗公羊作郯冬十有一月公會宋公于龜十四年春正月公會鄭伯于曹左氏傳會于曹曹人致餼禮也十五年夏公會齊侯于艾艾公羊作鄗穀梁作蒿左氏傳謀定許也冬十有一月公會宋公衛侯陳侯于袲伐鄭左氏傳謀伐鄭將納厲公也十六年春正月公會宋公蔡侯衛侯于曹左氏傳謀伐鄭也十八年春王正月公會齊侯于濼莊公十有三年春齊侯宋人陳人蔡人邾人會于北杏齊侯穀梁作齊人時何注齊桓行伯約束諸侯尊天子故為此會也桓公未為諸侯所信鄉故使微者會也桓公不辭微者欲以卑下諸侯遂成霸功也左氏傳會于北杏以平宋亂穀梁傳是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也注言諸侯將權時推齊侯使行伯事曰可矣乎未乎舉人衆之也注稱人言非王命衆授之以事十有四年冬單伯會齊侯宋公衛侯鄭伯于鄄左氏傳宋服故也穀梁傳復同會也十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄左氏傳復會焉齊始霸也榖梁傳復同會也二十有七年冬公會齊侯于城濮杜注將討衛也僖公元年八月公會齊侯宋公鄭伯曹伯邾人于柳柳公羊作朾三年秋齊侯宋公江人黃人會于陽榖左氏傳謀伐楚也公羊傳此大會也曷為末言爾桓公曰無障谷無貯粟無易樹子無以妾為妻注時桓公功德隆盛諸侯咸曰無言不從曷為用盟哉故告誓而已榖梁傳陽榖之會桓公委端搢笏而朝諸侯諸侯皆諭乎桓公之志十有三年夏四月公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹左氏傳淮夷病杞故且謀王室也榖梁傳兵車之會也十月六年冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏傳謀鄫且東略也榖梁傳兵車之會也二十有一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋盂公羊作霍榖梁作雩二十有八年冬公會晉侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫左氏傳討不服也榖梁傳諱會天王也文公元年秋公孫敖會晉侯于戚十有一年夏叔仲彭生會晉郤缺于承筐左氏傳謀諸侯之從于楚者十有三年冬公如晉衛侯會公于沓十有二月己丑公及晉侯盟還自晉鄭伯會公于棐棐公羊作斐公羊傳還者何善辭也何善爾往黨衛侯會公于沓至得與晉侯盟反黨鄭伯會公于斐故善也注黨所也所猶是齊人語也一出三為諸侯所榮深善之十有七年六月諸侯會于扈左氏傳晉侯搜于黃父遂復合諸侯于扈平宋也公不與會齊難故也書曰諸侯無功也宣公元年夏公會齊侯于平州左氏傳會于平州以定公位七年冬公會晉侯宋公衛侯鄭伯曹伯于黑壤左氏傳晉侯之立也公不朝焉又不使大夫聘晉人止公于會盟于黃父公不與盟以賂免故黑壤之盟不書諱之也九年九月晉侯宋公衛侯鄭伯曹伯會于扈左氏傳討不睦也十有一年秋晉侯會狄于攢函左氏傳衆狄服也榖梁傳不言及外狄十有四年冬公孫歸父會齊侯于榖十有五年春公孫歸父會楚子于宋秋仲孫蔑會齊髙固于無婁成公五年夏叔孫僑如會晉荀首于榖左氏傳晉荀首如齊送女故宣伯餫諸榖注野饋曰餫運糧饋之敬大國也十有二年夏公會晉侯衛侯于瑣澤左氏傳宋華元克合晉楚之成夏五月晉士燮會楚公子罷許偃癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟神明殛之俾隊其師無克胙國鄭伯如晉聼成會于瑣澤成故也十有五年冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離左氏傳始通吳也公羊傳曷為殊會吳外吳也曷為外也春秋內其國而外諸夏內諸夏而外夷狄榖梁傳會又會外之也十有六年秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公左氏傳謀伐鄭也公羊傳不見公者何公不見見也注不見見者恚乞師不得欲執之榖梁傳不見公者可以見公也可以見公而不見公譏在諸侯也劉氏敞曰春秋于魯事有可耻者必為之諱君臣之禮也若我無失道而橫逆所加則不諱故直書以罪諸侯襄公二年秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚左氏傳謀鄭故也冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚五年夏仲孫蔑衛孫林父會吳于善道秋公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左氏傳盟于戚會吳且謀戍陳也公羊傳吳何以稱人吳鄫人云則不辭七年十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬八年夏季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左氏傳會于邢丘以命朝聘之數使諸侯之大夫聼命季孫宿齊髙厚宋向戌衛寧殖邾大夫會之鄭伯獻捷于會故親聼命大夫不書尊晉侯也榖梁傳見魯之失正也公在而大夫會也十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤左氏傳會吳子壽夢也榖梁傳會又會外之也十有一年公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚公羊傳此伐鄭也其言會于蕭魚何蓋鄭與會爾注中國以鄭故三年之中五起兵至是乃服其後無干戈之患二十餘年故喜而詳録其會十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾子會吳于向左氏傳會于向為吳謀楚故也冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚左氏傳謀定衛也十有九年冬叔孫豹會晉士丐于柯二十有一年冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商仕左氏傳錮欒氏也二十有二年冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于沙隨左氏傳復錮欒氏也二十有四年八月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀左氏傳會于夷儀將以伐齊水不克二十有六年夏公會晉人鄭良霄宋人曹人于澶淵左氏傳公會晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田趙武不書尊公也注罪武會公侯向戌不書後也注後會期鄭先宋不失所也注如期至三十年冬十月晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故左氏傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫會于澶淵既而無歸于宋故不書其人不信也公羊傳會未有言其所為者此言所為何録伯姬也諸侯相聚而更宋之所喪曰死者不可復生爾財復矣此大事也曷為使微者卿也卿則其稱人何貶曷為貶卿不得憂諸侯也榖梁傳會不言其所為其曰宋災故何也不言災故則無以見其善也其曰人何也救災以衆何救焉更宋之所喪財也昭公元年春王正月叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢左氏傳尋宋之盟也四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申杜注楚靈王始會諸侯九年春叔弓會楚子于陳十有一年秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥慗左氏傳謀救蔡也二十有五年夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父左氏傳謀王室也二十有七年秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈左氏傳令戍周且謀納公也三十有一年春季孫意如會晉荀躒于適厯定公十年夏公會齊侯于夾谷左氏傳公會齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加于載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之冬齊侯衛侯鄭遊速會于安甫十有四年五月公會齊侯衛侯于牽左氏傳謀救范中行氏秋齊侯宋公會于洮左氏傳范氏故也大搜于比蒲邾子來會公杜注會公于比蒲于何注書者非邾婁子會人都也如入人都當修朝禮古者諸侯將朝天子必先會間隙之地考德行一刑法講禮義正文章習事天子之儀尊京師重法度恐過誤言公者不受于廟趙氏汸曰凡公在外而諸侯會之曰會公于某公在內而諸侯會之曰某來會公哀公六年夏叔還會吳于柤七年夏公會吳于鄫十有二年夏五月公會吳于槖皋秋公會衛侯宋皇瑗于鄖十有三年夏公會晉侯及吳子于黃池左氏傳公會單平公晉定公吳夫差于黃池秋七月辛丑盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯乃先晉人公羊傳吳何以稱子吳主會也吳主會則易為先言晉侯不與夷狄之主中國也其言及吳子何會兩伯之辭也不與夷狄之主中國則曷為以兩伯之辭言之重吳也曷為重吳吳在是則天下諸侯莫敢不至也榖梁傳黃池之會吳子進乎哉遂子矣吳夷狄之國也祝髮文身欲因魯之禮因晉之權而請冠端而襲其藉于成周以尊天王吳進矣吳東方之大國也纍纍致小國以會諸侯以合乎中國吳能為之則不臣乎注言其臣也吳進矣王尊稱也子卑稱也辭尊稱而居卑稱以會乎諸侯以尊天王吳王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也蕙田案以上書會而不盟又案春秋書公特會諸侯者十七隱九年于防十一年于時來桓元年于垂三年于嬴于郕于歡六年于成十一年于夫鍾于闞十二年于虛于龜十四年于曹十五年于艾十八年于濼莊二十七年于城濮宣元年于平州定十年于夾谷是也會而弗遇者一桓十年于桃邱是也特會吳者二哀七年于鄖十二年于槖皋是也會諸侯參以上者六隱十年于中邱桓二年于稷十五年于袲十六年于曹定十四年于牽哀十二年于鄖是也公與伯主之會者十四僖元年于柳十三年于鹹十六年于淮二十八年于溫宣七年于黑壤成十二年于瑣澤襄五年于戚七年于鄬十年于柤殊會吳十一年于蕭魚二十一年于商任二十二年于沙隨二十四年于夷儀哀十三年于黃池吳晉兩伯是也會而不見公者一成十六年于沙隨是也諸侯迎會公者二文十三年于沓于棐是也來會公者一定十四年于比蒲是也公會外大夫者一襄二十六年于澶淵是也內大夫特會諸侯者四文元年于戚宣十四年于榖十五年于宋昭九年于陳是也特會吳者一哀六年于柤是也內大夫會諸侯者一襄八年于邢邱是也內大夫特會外大夫者五文十一年于承匡宣十五年于無婁成五年于穀襄十九年于柯昭三十一年于適厯是也會外大夫者八成十五年于鍾離襄元年秋于戚冬于戚十四年于向于戚昭元年于虢十一年于厥慗二十五年于黃父是也鍾離及向皆殊會吳內外大夫會吳者一襄五年于善道是也王臣會諸侯者一莊十四年于鄄是也外諸侯相會者七莊十三年于北杏十五年于鄄僖三年于陽榖二十一年于盂文十七年于扈諸侯不序宣九年于扈昭四年于申是也特相會者二桓二年于鄧定十四年于洮是也外諸侯大夫參相會者一定十年于安甫是也外諸侯會狄者一宣十一年于攢函是也外大夫相會者二襄三十年于澶淵昭二十七年于扈是也隱公二年春公會戎于潛杜注戎而書會者順其俗以為禮何注凡書會者惡其虛內務恃外好也古者諸侯非朝時不得踰竟所傳聞之世外離會不書書內離會者春秋王魯明當先自持正躬自厚而薄責于人故略外也朝聘會盟例書時左氏傳公會戎于潛修惠公之好也戎請盟公辭榖梁傳會者外為主焉爾知者慮義者行仁者守有此三者然後可以出會會戎危公也秋八月庚辰公及戎盟于唐左氏傳戎請盟秋盟于唐復修戎好也六年夏五月辛酉公會齊侯盟于艾左氏傳盟于艾始平于齊也桓公十一年秋九月柔會宋公陳侯蔡叔盟于折公羊傳柔者何吾大夫之未命者也榖梁傳柔者何吾大夫之未命者也十二年夏六月壬寅公會紀侯莒子盟于曲池曲池公羊作毆蛇左氏傳平紀莒也秋七月丁亥公會宋公燕人盟于榖丘十有二年十有一月丙戌公會鄭伯盟于武父十七年春正月丙辰公會齊侯紀侯盟于黃左氏傳平齊紀且謀衛故也莊公十有三年冬公會齊侯盟于柯左氏傳始及齊平也公羊傳何以不日易也其易奈何桓之盟不日其會不致信之也其不日何以始乎此莊公將會乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是會乎桓莊公升壇注土基三尺土髙三等曰壇會必有壇者為升降揖讓稱先君以相接所以長其敬曹子手劍而從之管子進曰君何求乎曹子曰城壞壓境君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟注下壇與曹子定約必下壇者為殺牲不潔又盟本非禮故不于壇上也已盟曹子摽劍而去之要盟可犯而桓公不欺曹子可讎而桓公不怒桓公之信著乎天下自柯之盟始焉榖梁傳曹劌之盟也信齊侯也桓盟雖內與不日信也十有六年冬十有二月會齊侯宋公陳侯衛侯鄭伯許男曹伯滑伯滕于同盟于幽左氏傳鄭服也公羊傳同盟者何同欲也榖梁傳同者有同也同尊周也不言公外內寮一疑之也二十有三年十有二月甲寅公會齊侯盟于扈公羊傳桓之盟不日此何以日危之也何危爾我二也魯子曰我二者非彼然我然也二十有七年夏六月公會齊侯宋公陳侯鄭伯同盟于幽左氏傳陳鄭服也穀梁傳同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也桓公不致安之也桓盟不日信之也信其信仁其仁衣裳之會十有一未嘗有歃血之盟也信厚也兵車之會四未嘗有大戰也愛民也僖公五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止首止公榖作首戴左氏傳會王太子鄭謀寧周也公羊傳曷為殊會王世子世子貴也世子猶世世子也榖梁傳及以會尊之也何尊焉王世子云者唯王之二也云可以重之右焉尊之也何重焉天子世子世天下也秋八月諸侯盟于首止公羊傳諸侯何以不序一事而再見者前目而後凡也榖梁傳無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王世子於首戴乃所以尊天王之命也世子含王命會齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊已而天王尊矣世子受之可也七年秋七月公會齊侯宋公陳世子款鄭世子華盟于寧母左氏傳謀鄭故也榖梁傳衣裳之會也八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮左氏傳謀王室也公羊傳王人者何微者也曷為序乎諸侯之上先王命也榖梁傳王人之先諸侯何也貴王命也朝服雖敝必加于上辨冕雖舊必加于首周室雖衰必先諸侯兵車之會也九年夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘左氏傳尋盟且修好禮也公羊傳宰周公者何天子之為政者也榖梁傳天子之宰通于四海宋其稱子何也未葬之辭也九月戊辰諸侯盟于葵丘左氏傳齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後咸歸于好公羊傳桓之盟不日此何以日危之也何危爾貫澤之會桓公有憂中國之心不召而至者江人黃人也葵丘之會桓公震而矜之叛者九國震之者猶曰振振然矜之者何猶曰莫若我也榖梁傳桓盟不日此何以日美之也為見天子之禁故美之也葵丘之盟陳牲而不殺讀書加于牲上一明天子之禁曰毋雍泉毋訖糴毋易樹子毋以妾為妻毋使婦人與國事十有五年三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘左氏傳尋葵丘之盟且救徐也榖梁傳兵車之會也十有九年冬會陳人蔡人楚人鄭人盟于齊何注因宋征齊有隙為此盟也其後楚遂得中國霍之會執宋公二十有一年十有二月癸丑公會諸侯盟于薄釋宋公榖梁傳會者外為主焉爾二十有五年冬十有二月癸亥公會衛子莒慶盟于洮左氏傳修衛文公之好且及莒平也榖梁傳莒無大夫其曰莒慶何也以公之會目之也二十有六年春王正月己未公會莒子衛寧速盟于向左氏傳尋洮之盟也榖梁傳公不會大夫其曰寧速何也以其隨莒子可以言會也二十有七年十有二月甲戌公會諸侯盟于宋杜注諸侯伐宋公與楚有好而往會之非後期宋方見圍無嫌于與盟故直以宋地何注地以宋者起公解宋圍為此盟也宋得與盟則宋解可知也而公釋之見矣范注地以宋者則宋得與盟宋圍解可知蕙田案左氏以宋方見圍公往會諸侯不與宋會二傳則以公會諸侯而宋圍釋宋亦與會以左傳宋人如晉告急之文校之則宋圍蓋未釋也左氏義長二十有八年五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土榖梁傳諱會天王也二十有九年夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏傳公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子慗盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不會公侯會伯子男可也文公二年夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴左氏傳公未至六月穆伯會諸侯及晉司空士縠盟于垂隴晉討衛故也書士縠堪其事也注晉司空非卿也以士縠能堪卿事故書榖梁傳內大夫可以會外諸侯七年秋八月公會諸侯晉大夫盟于扈左氏傳晉侯立故也公後至故不書所會凡會諸侯不書所會後也注不書所會謂不具列公侯及卿大夫後至不書其國辟不敏也公羊傳諸侯何以不序大夫何以不名公失序也公失序奈何諸侯不可使與公盟眣晉大夫使與公盟也榖梁傳其曰諸侯略之也八年冬十月壬午公子遂會晉趙盾盟于衡雍左氏傳報扈之盟也乙酉公子遂會雒戎盟于暴左氏傳書曰公子遂珍之也注大夫出竟有可以安社稷利國家者專之可也十有四年六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左氏傳同盟于新城從于楚者服且謀邾也榖梁傳同者有同也同外楚也十有六年春季孫行父會齊侯于陽榖齊侯弗及盟左氏傳公有疾使季文子會齊侯于陽榖諸盟齊侯不肯曰請俟君間公羊傳其言弗及盟何不見與盟也榖梁傳弗及者內辭也行父失命矣齊得內辭也宣公十有七年六月己未公會晉侯衛侯曹伯邾子同盟于斷道左氏傳討二也榖梁傳同者有同也同外楚也成公二年十有一月公會楚公子嬰齊于蜀榖梁傳楚無大夫其曰公子何也嬰齊亢也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀公羊傳此楚公子嬰齊也其稱人何得一貶焉爾榖梁傳楚其稱人何也於是而後公得其所也會與盟同月則地會不地盟不同月則地會地盟此其地會地盟何也以公得其所申其事也今之屈向之驕也五年十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢左氏傳同盟于蟲牢鄭服也七年秋公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵左氏傳同盟于馬陵尋蟲牢之盟且莒服故也九年春王正月公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左氏傳會于蒲以尋馬陵之盟十有五年三月癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚左氏傳討曹成公也十有七年夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵左氏傳同盟于柯陵尋戚之盟也榖梁傳柯陵之盟謀復伐鄭也十有八年十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾左氏傳謀救宋也襄公三年六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光已未同盟于雞澤榖梁傳同者有同也同外楚也陳侯使袁僑如會公羊傳其言如會何後會也榖梁傳如會外乎會也於會受命也戊寅叔孫豹及諸侯之大夫及陳袁僑盟左氏傳陳請服也公羊傳曷為殊及陳袁僑為其與袁僑盟也榖梁傳及以及與之也諸侯以為可與則與之不可與則釋之諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失正矣大夫執國權曰袁僑異之也注再言及明獨與袁僑不與諸侯之大夫九年冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯小邾子齊世子光伐鄭十有二月己亥同盟于戲左氏傳同盟于戲鄭服也榖梁傳不異言鄭善得鄭也不致恥不能據鄭也十有一年夏四月公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北左氏傳同盟于亳載書曰凡我同盟無蕰年無壅利無保姦無留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟注二司天神名山名川羣神羣祀注羣祀在祀典者先王先公注先王諸侯之大祖宋祖帝乙鄭祖厲王之比也先公始封君七姓十二國之祖注七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊薑姓莒己姓杞姒姓薛任姓實十三國言十二誤也明神殛之俾失其民隊命亡氏踣其國家趙氏汸曰襄公會晉悼者三同盟者四悼公既得國即圍宋彭城再會于戚遂城虎牢皆使大夫主之雞澤之役始命諸侯同盟而以大夫别盟陳袁僑為大夫專盟之始戚之會戍陳而會吳人為諸侯盟吳之始會于鄬以救陳而陳侯逃歸盟于戲以服鄭而鄭有異志於是會吳子于柤伐鄭戍虎牢矣再駕而盟亳城北三駕而會蕭魚鄭始服從於是會吳伐秦復以大夫主之戚之會遂孫林父廢立之謀而衛人君臣之禍成于晉矣此悼公復伯之事其於文襄之業果何如乎十有六年三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟公羊傳諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然榖梁傳溴梁之會諸侯失正矣諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也十有八年冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊十有九年春王正月諸侯盟于祝阿杜注前年圍齊之諸侯也二十年春王正月辛亥仲孫速會莒人盟于向左氏傳督揚之盟故也夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵左氏傳齊成故也二十有五年夏五月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀左氏傳會于夷儀伐齊以報朝歌之役秋八月己巳諸侯同盟于重邱左氏傳同盟于重邱齊成故也二十有七年夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋秋七月辛巳豹及諸侯之大夫盟于宋左氏傳盟于宋西門之外季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也公羊傳曷為再言豹殆諸侯也曷為殆諸侯為衛石惡在是也曰惡人之徒在是矣榖梁傳溴梁之會諸侯在而不曰諸侯之大夫大夫不臣也晉趙武恥之豹云者恭也諸侯不在而曰諸侯之大夫大夫臣也其臣恭也晉趙武為之會也趙氏汸曰襄公會晉平者四會而盟者二大夫盟者一溴梁諸侯會而大夫盟視雞澤益專同圍齊盟祝阿而齊靈卒乃得齊莊盟于澶淵商任沙隨勤諸侯以錮叛臣而齊始伐盟主矣再會夷儀伐齊不果重邱之盟適以成崔杼之亂而已蓋晉至平公益不競于楚於是趙武屈建盟于宋公子圍尋宋之盟于虢晉不復主夏盟而襄昭皆如楚矣昭公十有一年五月仲孫貜會邾子盟于祲祥左氏傳孟僖子會邾莊公盟于祲祥修好禮也十有三年秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘公不與盟左氏傳同盟于平丘齊服也公羊傳公不與盟者何公不見與盟也公不見與盟大夫執何以致會不恥也曷為不恥諸侯遂亂反陳蔡君子不恥不與焉榖梁傳同者有同也同外楚也公不與盟者可以與而不與譏在公也其日善是盟也二十有六年秋公會齊侯莒子邾子杞伯盟于鄟陵左氏傳謀納公也榖梁傳公在外也定公四年三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵左氏傳劉文公合諸侯于召陵謀伐楚也五月公及諸侯盟于鼬榖梁傳後而再盟公志於後會也後志疑也十有二年冬十月癸亥公會齊侯盟于黃蕙田案以上先書會後書盟又案春秋書公特與諸侯會盟者五隱六年于艾桓十二年于武父莊十三年于柯二十三年于扈定十二年于黃是也會盟參以上者八桓十二年于曲池于榖邱十七年于黃僖二十一年于薄諸侯不序二十五年于洮二十六年于向二十七年于宋諸侯不序昭二十六年于鄟陵是也與伯主會盟者二十二莊二十七年于幽僖五年于首止殊會王世子七年于寧母八年于洮九年于葵邱十五年于牡邱二十八年于踐土文七年于扈諸侯不序十四年于新城宣十七年于斷道成五年于蟲牢七年于馬陵九年于蒲十五年于戚十七年于柯陵襄三年于雞澤九年于戲十一年于亳城北十八年于祝柯二十年于澶淵二十五年于重邱會盟異地定四年于皋鼬會盟異地是也與會而不與盟者一昭十三年于平邱也公會而大夫盟者一襄十六年于溴梁是也書會不稱公者一莊十六年于幽是也內不書公外稱人者二僖十九年于齊二十九年于翟泉是也公與大夫會盟者一成二年于蜀是也與戎會盟者一隱二年于唐會盟異地是也內大夫特與諸侯會盟者一昭十一年于祲祥是也會而弗及盟者一文十六年于陽榖是也會盟參以上者三桓十一年于折文二年于垂隴成十八年于虛朾是也內大夫特與外臣會盟者二文八年于衡雍襄二十年于向是也與外臣會盟者一襄二十七年于宋是也與戎會盟者一文八年于暴是也桓公三年夏齊侯衛侯胥命于蒲左氏傳不盟也公羊傳胥命者何相命也注時盟不歃血但以命相誓何言乎相命近正也此其為近正奈何古者不盟結言而退榖梁傳胥之為言猶相也相命而信諭謹言而退以是為近古也是必一人先其以相言之何也不以齊侯命衛侯也趙氏汸曰春秋之初齊鄭一黨也宋衛一黨也齊衛之合於是始故特書之義與石門之盟同若莊二十一年鄭虢胥命于弭則不書或有謂齊衛相命以伯者雖陳氏亦引齊僖小伯及黎之臣子責衛以方伯連率之事證成其説則失其實矣蓋所謂伯者為諸侯盟主也齊自胥命後不能一日主諸侯之政而况於衛乎蕙田案以上書胥命者一右會盟隱公四年夏公及宋公遇于清杜注遇者革次之期二國各簡其禮若道路相逢遇也會疏曲禮下云諸侯未及期相見曰遇相見于郤地曰然則會者豫謀間地克期聚集訓上下之則制財用之節示威于衆各重其禮雖特會一國若二國以上皆稱會也遇者或未及會期或暫須相見各簡其禮若道路相逢遇然周禮冬見曰遇則與此别劉賈以遇者用冬遇之禮故杜難之釋例曰遇者倉卒簡儀若道路相逢遇者耳周禮諸侯冬見天子曰遇劉氏因此名以説春秋自與傳違案禮春曰朝夏曰宗秋曰覲冬曰遇此四時之名令者春秋不皆同之于禮冬見天子當是百官備物之時而云遇禮簡易經書李姬及鄫子遇于防此婦于夫共朝豈當復用見天子之禮於禮皆違是言春秋之遇與周禮冬遇異也公羊傳遇者何不期也一君出一君要之也注古者有遇禮為朝天子若朝罷時卒相遇于塗近者為主逺者為賔稱先君以相接所以崇禮讓絶慢易也當春秋時出入無度禍亂姦宄多在不虞無故卒然相要小人將以生心故重而書之所以防禍原也榖梁傳及者內為志焉爾遇者志相得也八年春宋公衛侯遇于垂左氏傳齊侯將平宋衛有會期宋公以幣請于衛請先相見衛侯許故遇于犬丘注犬丘垂也地有兩名榖梁傳不期而會曰遇遇者志相得也莊公四年夏齊侯陳侯鄭伯遇于垂二十有三年夏公及齊侯遇于榖榖梁傳及者內為志焉爾遇者志相得也三十年冬公及齊侯遇于魯濟左氏傳謀山戎也以其病燕故也榖梁傳及者內為志焉爾遇者志相得也三十有二年夏宋公齊侯遇于梁丘左氏傳齊侯為楚伐鄭之故請會于諸侯宋公請先見于諸侯夏遇于梁丘榖梁傳遇者志相得也梁丘在曹邾之間去齊八百里非不能從諸侯而往也辭所遇遇所不遇大齊桓也趙氏汸曰以禮相見為會不行會禮為遇特相遇惟莊以前見之齋僖欲平三國宋公有疑故請與衛侯先相見于垂是故有明年鄭宋連兵之禍齊襄欲滅紀故與陳鄭遇垂紀侯是以大去其國齊為楚伐鄭故請會諸侯宋公請先見齊侯是以緩于伐楚皆有關于天下之故者也隱與宋公聞衛亂而相遇齊桓圖伯亦兩與莊公遇者桓公欲身下諸侯以成伯業故以簡便濟其勤勞也蕙田案以上內相遇者三外相遇者三右遇五禮通考卷二百二十九
