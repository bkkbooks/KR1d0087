body:
  text: 五禮通考卷二百十四刑部尚書秦蕙田撰嘉禮八十七設官分職書周官立太師太傅太保兹惟三公論道經邦燮理隂陽傳師天子所師法傅傅相天子保保安天子于德義者此惟三公之任佐王論道以經緯國事和理隂陽言有德乃堪之官不必備惟其人傳三公之官不必備員惟其人有德乃處之少師少傅少保曰三孤傳此三官名曰三孤孤特也言卑于公尊於卿特置此三者二公宏化寅亮天地弼豫一人傳副二三公宏大道化敬信天地之教以輔我一人之治朱子曰三公三孤本無職事亦無官屬但以道義輔佐天子而已三公三少只是加官陳氏傅良曰周召以師保為冡宰是卿兼三公也顧命自太保奭以下皆卿也是時召公為保兼冡宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之衛侯康叔為司冦毛公為司空審如是則三公多是六卿兼之但其人足以兼公則加其公之職位無其人則止為卿而已三公三孤皆無其人則闕焉而已而六卿自若也要之成周以三公三孤待非常之德故曰官不必備惟其人蔡氏沈曰此篇與今周禮不同如三公三孤周禮皆不載或謂公孤兼官無正職故不載然三公論道經邦三孤二公宏化非職乎職任之大無踰此矣或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也然周禮非聖人不能作也意周公方條治事之官而未及師保之職所謂未及者鄭重而未及言之也書未成而公亡其間法制有未施用故與此不合而冬官亦闕要之周禮首末未備周公未成之書也讀書者參互而考之則周公經制可得而論矣陳氏師凱曰周禮未嘗不言公孤但不載其専職耳如云王之三公八命出封加一等則九命為伯是舉朝無尊于此者而外朝之位三公在前孤卿大夫在左公侯伯子男在右是惟三公可以面天子孤則亞于三公故其位與諸侯之公相對六卿莫敢先也其贄孤執皮帛卿執羔則卿亞于孤又可見矣蕙田案周禮地官之序官云鄉老二鄉則公一人鄭氏注云王置六鄉則公有三人也三公者內與王論道中參六官之事外與六鄉之教其要為民是以屬之鄉焉賈疏引曲禮三公於諸侯曰天子之老以證之其説極確然序官雖列鄉老之名而不及其職者以三公位居六卿之右其職主于論道經邦燮理隂陽佐天子以出治其分六鄉使領之者如周召分陜東西為二伯但遙領其政教而已以三公非地官之屬故闕其職掌所以尊之也然六鄉之官惟鄉老為最尊故特序于鄉大夫之前不沒其實也惟三年大比獻賢能之書鄉老亦與其事則附見于鄉大夫職蓋舉賢任官固大臣職也後儒或謂鄉老公孤之致仕在鄉者然致仕之臣無常額安得云每二鄉置一人乎觀承案六鄉之官鄉老最尊故六卿則每鄉一人鄉老以公為之則每二鄉一人然此乃三公之兼職而非其本職也其本職自在論道燮理用心於根本之地而不在職業之地課勤惰也今周禮止有六卿分職而缺三公之位故先儒謂周禮乃周公屬稿而未能盡行之書者良非無據後人乃據鄉老有二鄉則公一人之文以為周禮原有三公之職是以兼職而冒為本職逐末而忘其本已冡宰掌邦治統百官均四海傳天官卿稱太宰主國政治統理百官均平四海之內邦國言任大司徒掌邦教敷五典擾兆民傳地官卿司徒主國教化布五常之教以安天下衆民使小大皆協睦宗伯掌邦禮治神人和上下傳春官卿宗廟官長主國禮治天神地祗人鬼之事及國之吉凶賓軍嘉五禮以和上下尊卑等列司馬掌邦政統六師平邦國傳夏官卿主戎馬之事掌國征伐統正六軍平治王邦四方國之亂者司冦掌邦禁詰姦慝刑暴亂傳秋官卿主冦賊法禁治姦惡刑強暴作亂者夏司馬討惡助長物秋司冦刑姦順時殺司空掌邦土居四民時地利傳冬官卿主國空土以居民士農工商四民使順天時分地利授之土能吐生百榖故曰土六卿分職各率其屬以倡九牧阜成兆民傳六卿各率其屬官大夫士治其所分之職以倡道九州牧伯為政大成兆民之性命皆能其官則政治曰疏周禮冬官亡小宰職云六曰冬官掌邦事又云六事職以富邦國以養萬民馬融云事職掌百工器用耒耜弓車之屬與此主土居民全不相當冬官既亡不知其本禮記王制記司空之事云量地以制邑度地以居民是明冬官本有主土居民之事也齊語云管仲制法令士農工商四民不雜即此居民使順天時分地利授之土也土則地利為之名以其吐生百榖故曰土也周禮云事此云土者為下有居四民故云土以居民為急故也呂氏祖謙曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而併數之為六者綱在網中也乾坤之與六子並列于八方冢宰之於五卿並列于六職也周禮天官冡宰第一注象天所立之官冢大也宰者官也天者統理萬物天子立冢宰使掌邦治亦所以總御衆官使不失職不言司者大宰總御衆官不主一官之事也疏周天有三百六十餘度天官亦總攝三百六十官故云象天也乃立天官冡宰使帥其屬而掌邦治以佐王均邦國注掌主也邦治王所以治邦國也佐猶助也鄭司農云邦治謂總六官之職也故大宰職曰掌建邦之六典以佐王治邦國六官皆總屬于冢宰故論語曰君薨百官總已以聼于冢宰言冢宰于百官無所不主爾雅曰冢大也冢宰大宰也魏氏校曰冡長也衆官之有冢宰猶衆子之有冡嫡也髙氏愈曰政之均也始于心之均心之均者惡上無以使下惡前無以先後此潔矩之道也後世宰臣濁亂朝政其惡非一要皆始于其心之不平故詩人刺太師尹氏之惡而一言以蔽之曰不平其心嗚呼盡矣故宰相佐天子理天下自平其政始平其政自平其心始蔡氏德晉曰冢宰之官以天名夫統地與四時而成天合教禮兵刑事而成治則冢宰之任誠重也先王將使四海之治歸王畿王畿之治歸六官六官之治歸冢宰故天官冢宰立而萬事之樞機握四方之根抵定矣掌邦治言帥其屬者先有司之義均邦國言佐王者地道無成之義也地官司徒第二注象地所立之官司徒主衆徒地者載養萬物天子立司徒掌邦教亦所以安擾萬民乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國注教所以親百姓訓五品有虞氏五而周十有二焉擾亦安也言饒衍之陳氏傅良曰先王教民自經界始為井邑邱甸以正其賦比閭族黨以居其民伍兩卒旅以寓其兵無非習民于正而遇之以道德之意俾之分定而心一生厚而德優以服從上令是曰教典豳風述風化之由孟子言王道之本無非田圃之事誠知本者後世大臣不問疆理之務但以設學博置弟子員為修教化何以納民于善也方氏苞曰以地官掌教者禮官所教秀民而已土地人民皆𨽻于地官而親民之吏屬焉必地官掌教乃能盡天下之人無一不教古之聖人所以務明明德于天下而非漢唐之治所及也蔡氏德晉曰冢宰佐王奉若天道統馭百官司徒佐王祖識地德養教萬民故二官相次又冢宰之屬多上正君德之職司徒之屬多下安民生之職而師保之官亦所以正君德也二官立而邦之根本固矣春官宗伯第三注象春所立之官也宗尊也伯長也春者出生萬物天子立宗伯使掌邦禮典禮以事神為上亦所以使天下報本反始不言司者鬼神示人之所尊不敢主之故也乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國注禮謂曲禮五吉凶賔軍嘉其别三十有六鄭司農云宗伯主禮之官故書堯典曰帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯女作秩宗宗官又主鬼神故國語曰使名姓之後能知四時之生犧牲之物玉帛之類采服之宜彛器之量次主之度屏攝之位壇場之所上下之神祗氏姓之所出而率舊典者為之宗春秋禘于大廟躋僖公而傳曰夏父弗忌為宗人又曰使宗人釁夏獻其禮禮特牲曰宗人升自西階視壺濯及豆籩然則唐虞厯三代以宗官典國之禮與其祭祀漢之大常是也郝氏敬曰地官稱司春官不稱司何也地後天而春先時天首六官春首四時故天稱冢宰春稱宗伯所以尊禮而配天也蔡氏德晉曰天地之化始于春治教之端在于禮春于天為元于人則為仁而禮以仁為體者也吉禮以仁鬼神凶禮以仁死喪賔禮以仁賔客軍禮嘉禮以仁邦國萬民凡禮儀三百威儀三千無一事而非仁也此春官所以掌禮而贊治教也司徒司馬司冦司空皆言司以各主一事也冢宰兼統六官故不言司宗伯亦不言司者禮無乎不用治非禮不制教非禮不行政非禮不立刑無禮則淫事無禮則亂故亦不言司也夏官司馬第四注象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬共掌邦政政可以平諸侯正天下故曰統六師平邦國乃立夏官司馬使帥其屬而掌邦政以佐王平邦國注政正也政所以正不正者也孝經説曰政者正也正德名以行道鄭氏鍔曰太宰平邦國平之以道平于順治之前司馬平邦國平之以政平于叛違之後髙氏愈曰兵威雄猛象夏火之炎烈故稱夏官然非馬則徒兵不可以戰而貴儲之有素故以司馬名蔡氏德晉曰司馬主兵係之夏官夏為火令古人有言兵猶火也弗戢將自焚也先王其有垂戒之意乎秋官司冦第五注象秋所立之官冦害也秋者遒也如秋義殺害收聚斂藏于萬物也天子立司冦使掌邦刑刑者所以驅恥惡納人于善道也乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國注禁所以防姦者也刑正人之法孝經説曰刑者侀也過出罪施周子曰天以春生萬物止之以秋聖人以仁育萬物肅之以刑華氏泉曰周書云伯夷降典折民惟刑蓋出乎禮則入乎刑是禮與刑相表裏也虞書眀于五刑以弼五教蓋教之所棄即刑之所取是教與刑相表裏也髙氏愈曰刑官名司冦以除盜賊為主也盜賊特飢寒之民草竊無知至微末耳而刑官所掌以是為主者何也觀漢之亂倡于黃巾唐之社屋于黃巢明之鼎遷于逆闖則知盜賊之興真足以亡天下而刑官以司冦名其位即次于司馬聖人之慮深逺矣冬官考工記第六注象冬所立之官也是官名司空者冬閉藏萬物天子立司空使掌邦事亦所以富充國家使民無空者也司空之篇亡漢興購求千金不得此前世識其事者記録以備大數王氏與之曰書言司空居四民時地利則所謂事者非止如漢人考工記之補亡止言百工之事也民各有職職各有事邦國之富實基于此如衛文公務材訓農通商惠工馴致國家殷富蓋得事典之遺意辨諸儒以冬官未亡錯見五官之説俞氏廷椿曰司空之篇實雜出於五官之厲朱氏彛尊經義考俞氏復古編以天官之屬獸人獻人鱉人獸醫司裘染人追師屨人掌皮典絲典枲改入冬官以地官之屬鼓人舞師改入春官封人載師閭師縣師均人遂人遂師遂大夫土均草人稻人土訓山虞林衡川衡澤虞丱人角人羽人掌葛掌染草囿人場人改入冬官以春官之屬天府世婦內宗外宗太史小史內史外史御史改入天官典瑞典同巾車司常冡人墓大夫改入冬官以夏官之屬辨師司弓矢稿人職方氏土方氏形方氏山師川師邍師改入冬官以秋官之屬大行人小行人司儀行夫掌客掌訝掌交環人改入春官王氏與之曰司空果亡乎以周官司空之掌考之司空未可以為亡也夫周官言司空掌邦土居四民時地利凡經言田萊溝洫都邑塗巷者非邦土而何農工商賈市井里室廬者非居民而何桑麻榖粟之所出山澤林麓之所生非地利而何及考小宰官六官設屬各有六十今治官之屬六十有三教官之屬七十有九禮官之屬七十有一政官之屬六十有六意者秦火之餘簡編脫落司空之屬錯雜五官之中先儒莫之能辨遂以考工記補之其實司空一官未嘗亡也蕙田案王氏所著周禮訂義八十卷但移序官於每條之前其餘俱仍經文之舊未嘗輕有改移别著周官補遺證司空非亡雖亦承俞夀翁之誤而較之輕改經文者固有間矣今補遺一編已無存丘氏葵曰余生苦晚得俞夀翁王次點兩家之説始知冬官未嘗亡又參以諸家之説訂定天官之屬六十地官之屬五十七春官之屬六十夏官之屬五十有九秋官之屬五十有七冬官之屬五十有四於是六官始為全書朱氏彛尊經義考丘氏更定周禮天官之屬六十太宰小宰宰夫宫正宫伯宫人內宰九嬪世婦女御內宗外宗女祝女史內司服典婦功縫人夏采內小臣閽人寺人內豎膳夫庖人內饔外饔亨人甸師酒正酒人漿人凌人籩人醢人醯人鹽人冪人臘人醫師食醫疾醫痬醫掌舍幕人掌次天府大府玉府內府外府司會司書職內職嵗職幣太史小史內史外史御史地官之屬五十七大司徒小司徒鄉師鄉老鄉大夫州長黨正族師閭胥比長遂人遂師遂大夫縣正鄙師鄼長里宰鄰長師氏保氏司諫司救調人媒氏司市質人廛人胥師賈師司暴司稽胥肆長泉府司門司關掌節閭師縣師稍人土訓誦訓遺人旅師委人迹人廩人舍人倉人司祿司稼舂人饎人稿人掌炭掌茶掌蜃春官之屬六十大宗伯小宗伯肆師鬱人鬯人司尊彛司几筵典命典祀守祧職喪大司樂樂師大胥小胥大師小師瞽矇視瞭磬師鍾師笙師鏄師韎師旄人籥師籥章司干鼓人舞師鞮鞻氏典庸器馮相氏保章氏大卜卜師卜人龜人菙氏占人簭人占夢視祲大祝小祝喪祝甸祝詛祝司巫男巫女巫都宗人家宗人大行人小行人司儀行夫掌客掌訝掌交夏官之屬六十大司馬小司馬軍司馬輿司馬行司馬都司馬家司馬諸子虎賁氏旅賁氏司甲司兵司戈盾繕人環人挈壺氏掌固司險掌疆司右戎右齊右道右大馭戎僕齊僕道僕田僕馭夫馬質校人趣馬巫馬牧師廋人圉師圉人射人司士司勳懷方氏合方氏訓方氏匡人撢人大僕小臣祭僕御僕𨽻僕服不氏射鳥氏羅氏掌畜節服氏小子羊人方相氏司爟候人秋官之屬五十七大司冦小司冦士師鄉士遂士縣士方士訝士朝士司民司刑司刺司約司盟職金司厲司圜掌囚掌戮司𨽻罪𨽻蠻𨽻閩𨽻夷𨽻貉𨽻布憲禁殺戮禁暴氏野廬氏蠟氏雍氏萍氏司寤氏司烜氏條狼氏修閭氏冥氏庶氏穴氏翨氏柞氏剃氏硩簇氏剪氏赤犮氏蟈氏壺涿氏庭氏御枚氏伊耆氏象胥掌察掌貨賄朝大夫都則都士家士冬官補亡五十四大司空小司空載師封人量人均人土均草人稻人山虞林衡川衡澤虞丱人角人羽人掌葛掌染草囿人場人牧人牛人充人獸人獻人鱉人雞人犬人獸醫司裘掌皮司服典絲典枲染人辨師追師屨人典瑞典同巾車典路車僕司常司弓矢稿人冢人墓大夫職方氏土方氏形方氏山師川師邍師蓋合俞夀翁王次點兩家之説而損益之吳氏澄曰周公相成王建六官分六職禮樂政事燦然大備即其設位言之則曰周官即其制作言之則曰周禮周衰諸侯惡其害已滅去其籍漢河間獻王購得周官五篇冬官久亡以考工記補之考工記乃前世能識古制者所作先儒皆以為非惟劉歆獨識之而五官亦錯雜傳至於今莫敢是正澄何自而考之乎本之尚書以考之也周官一篇成王董政治官之全書也執此以考周禮之六官則不全者可坐而判也夫冢宰掌邦治統百官均四海執此以考天官之文則其所載非統百官均四海之事可以知其非冢宰之職也司徒掌邦教敷五典擾兆民執此以考地官之文則其所載非敷五典擾兆民之事可以知其非司徒之職也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國執此以考春夏二官則凡掌邦禮邦政者皆其職也舍此則非其職也司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利執此以考秋冬二官則凡掌邦禁邦土者皆其職也舍此則非其職焉是故天官之文有雜在他官者如內史司士之類是也亦有他官之文雜在天官者如甸師世婦之類是也地官之文有雜在他官者如大司樂諸子之類是也亦有他官之文雜在地官者如閭師柞氏之類是也春官之文有雜在他官者如封人大小行人之類是也亦有他官之文雜在春官者如御史大小胥之類是也夏官之文有雜在他官者如銜枚氏司𨽻之類是也亦有他官之文雜在夏官者如職方氏辨師之類是也至如掌祭之類吾知其非秋官之文縣師㕓人之類吾知其為冬官之文緣文尋意以考之參諸經籍以證之而又何疑之有乎方氏孝孺曰書之周官言六卿之職美矣冡宰者治之所從出也宗伯典禮司馬主兵司冦掌禁司空掌土皆聼于冡宰者也冢宰治之本天下之大政宜見于冢宰今周禮列于冢宰之下者預政之臣不過數人而六十屬皆庖厨之賤事攻醫制服之淺技夫王之膳服固冢宰之所宜知然以是實冢宰之職則陋且褻矣此必非周公之意司徒以五典施教其為事至重不宜復預他事也而自鄉師以下近于教者止十二屬其餘皆春秋二官之事而冬官為最多蓋定其序者不知地官在乎主教而以土官之事屬之土地冬官職也何與乎教教之大法及冡宰之大政皆已亡矣其不亡者間見於他官司馬司冦纂入者甚衆惟宗伯稍存多為他官所掠而禮之係乎邦國者亦亡其亡者皆諸侯之所惡而去之也而其失序者漢儒之謬也余喜讀周禮憂周公之心不明于後世以書周公之言為凖考六卿之屬更次之自宗伯歸于冢宰者五自司馬歸者三自司冦歸者二合宫正以下為五曰宫正歸以司徒之舍曰膳夫曰醫師曰內宰曰司農曰典婦功曰內司服附于冡宰之左重變古也司徒去其非教事者八十存者四以司馬之諸子訓方氏匡人撢人司冦之掌交歸焉宗伯自司徒歸者十自司馬歸者十有九自司冦歸者十有二司馬之存者三十有一司冦之存者二十有三而以司徒之司暴司稽司救調人歸焉於是取土地之事財賦之則在司徒者五十有五在司馬者八在司冦者十有三為司空土地不可無治之之道也故有載師閭師縣師均人治民無法不可以治地也故有遂人遂師遂大夫縣正鄙師鄼長里宰鄰長旅師稍人委人土均樹藝地之所宜先也故有草人焉有稻人焉有司稼焉地圖方志王者所宜知也故有土訓誦訓山林川澤地之寶也故有澤虞有川衡金玉錫石角羽荼炭染草葛蜃山澤之所産也故各有主之者以致其用苑囿場圃鳥獸草木所莘也故有迹人囿人場人榖粟土地所入守之宜有制也故有廩人倉人民者土地之本不可無恤也故有遺人以振其凶荒財用者生於地而取之有節故市有司㕓有人肆有長賈有師泉有府質人胥師司門司關職方土方懷方合方形方山師川師邍師所以辨土地而致稱異也故自司馬而歸焉逹道路除不蠲有野廬氏蠟氏掌害稼者有雍氏掌水禁有萍氏除毒蟲猛鳥獸蠹物蛙黽有冥氏庶氏穴氏翨氏硩簇氏翦氏赤犮氏蟈氏壺涿氏庭氏攻禾殺草有柞氏剃氏亦皆司空之事也故自司冦歸焉六卿之屬繇是復其始其不能皆六十者亡者衆也而亦不必以六十為率也卿之所掌有大小其事有煩簡奚必皆止于六十者乎蕙田案方氏所更五官之屬與俞氏丘氏吳氏又有不同王氏應電曰冬者萬物之所終也司空掌邦土天下之治所由以成故命名曰冬漢人以考工記補之夫共工者誠冬官之事但其一屬爾故取之以入冬官則可用之以補冬官則不可自宋以來乃以五官之事聨職于司空者歸之以為司空未嘗亡也不知周禮之治每事六官皆與蓋自王身王宫王朝王畿四海以及於昆蟲草木六官皆有其責非若後世之設官截然各為一事也不得此意遂用其疑似以相歸併此説一興人各自以意見而更定之豈得復為周公之周禮哉髙氏愈曰六官皆稱其屬六十今以其數考之天官之屬浮其一而教官之屬共浮十有九春官浮其八夏官浮其十秋官浮其六疑若其數過多者然地官自鄉大夫至比長自遂大夫至鄰長共十二職俱無府史胥徒之設乃即民間賢能舉而長其民者而比長每鄉至二千四百六十人之多則非王朝之官也又自胥師至肆長共六職皆係市賈而為長豈得云官則實訃教官之屬亦止六十一耳而春官內外宗係同異姓之女其數至多而瞽矇則盲夫視瞭則細民俱非官也則實計春官之屬止六十有四夏官三司馬皆闕又方相氏為狂夫圉師圉人為厮養不得居官數則實計政官之屬亦六十有四而秋官五𨽻皆俘奴賤役不得稱官則秋官之屬亦止六十有一而與每屬六十之數固相符也而或者以為五官皆有溢額而欲取以補冬官之闕謬之甚矣方氏苞曰司空之篇亡自漢以後無異議而晚宋元明諸儒乃分割五官以為事典是之謂不知而作也夫五官之事皆基于事典故洪範之述官政首司空而後及其餘而是經所謂辨方正位體國經野正司空之職也尚書周官所謂居四民時地利則體國經野之實用也即是以求之則事典之本體昭昭然可見而羣儒之迷謬不足辨矣蓋惟司徒司馬與司空聨事而事各異方雖若有連而不相及也鄉師之職大役則帥民徒而至治其政令既役則受州里之役要以考司空之辟蓋任役事者地官之民徒而興事任力則有司空之辟焉今其所謂辟者安在哉大司馬之職大役與慮事屬其植受其要蓋聚大衆故以司馬之法治植要以習軍中之壕壘然司馬曰與慮事則主其事者非司空而誰哉川澮溝洫之積數遂人掌之量人量之司險設之而規五溝五塗之深廣相因山通川之地勢要綰道路以立關梁時式險易以傳衆力溝或以水潄防或以水淫則司空之法也王畿侯國之封疆都鄙之室數大司徒制之大司馬正之量人量之職方氏辨之土方氏相之形方氏正其華離邍師辨其名物而鄉遂郊關以封域而别其逺近農士工商以作業而異其逰居城郭渠落以鄉山經水而審其面勢測土深以求泉順地阞以行水春築隄防冬繕城郭則司空之法也其在他職則事更無聨焉者社稷宗廟之位四郊四望四類以及山川邱陵墳衍之兆小宗伯授之會同之壇司儀令之而正方攻位量功命事小宗伯司儀不與也王內之宫寢宫中之官府次舍司空作焉而後內宰書其版圖之數宫正宫伯比其官吏人民士庶子之居朝市既成而後小司冦朝士太僕掌其政司市布其令倉府廄廩既成而後大府玉府內府外府倉人廩人校人廋人警其守車旗兵甲既成而後巾車典路司常司甲司兵司戈盾司弓矢辨其用其他禮樂賓祭之器守藏服御之物莫不皆然惟天官之染人追師屨人夏官之稿人疑可為事官之屬然王后世子之飲食衣服皆𨽻天官而聼于冡宰聖人有深慮焉染人以類從則所掌特宫中之染事耳兵器之用惟弓矢為多而易毁折故司馬之屬特設稿人以試之然曰受財于職金以齎其工則造之者乃弓人矢人可知矣用此觀之五官之屬皆確乎其不可易冬官雖亡而以五官按之其職其事可班而列也又况鄉師所涖之匠師儀禮大射之工人士梓人覲禮之嗇夫不屬于司空而焉屬哉蕙田案周禮冬官篇亡漢唐諸儒俱無異論至南宋俞氏庭椿創為冬官未亡之説其後王氏與之吳氏澄邱氏葵方氏孝孺等祖述其説互有更易支離割裂全無根據昔之亡者止冬官一篇今則并五官之存者而淆亂之而周公制作之精意幾何其不亡矣且六官之屬各六十特舉其大數而言非真以六十為定額而不可浮于六十之外也天官宰夫之下有上士八人中士十六人地官鄉師春官肆師之下亦同而夏官之上士别名輿司馬中士别名行司馬秋官之上士别名鄉士其名雖異而其官未嘗增多以是推之則知據五官之目而以為有溢額者皆刻舟之見也至如鄉遂之官隸於司徒實非王朝之官九嬪世婦女御內宗外宗非外朝之官胥師賈師司暴司稽胥肆長皆賈也瞽矇視瞭樂人也方相氏狂夫也圉師圉人圉也罪𨽻蠻𨽻閩𨽻夷𨽻貉𨽻𨽻也皆有職而無官然則五官之屬本無溢多而欲分其數以補冬官之亡不亦謬乎天官大宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以紏萬民六曰事典以富邦國以任百官以生萬民注典常也經也法也王謂之禮經常所秉以治天下者也邦國官府謂之禮法常所守以為法式也常者其上下通名鄭司農云治典冡宰之職教典司徒之職禮典宗伯之職政典司馬之職刑典司冦之職此三時皆有官惟冬無官以三隅反之則事典司空之職也髙氏愈曰太宰言六典猶中庸言九經也邦國守之為常經百官修之為常職萬世由之為常道由是典則治不由是典則亂六典六官所分掌而惟大宰兼統之所以隆其職冠于五官之上也乃施法于官府而建其正立其二設其考陳其殷置其輔注正謂冢宰司徒宗伯司馬司冦司空也二謂小宰小司徒小宗伯小司馬小司冦小司空也考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考疏鄉師云及葬執纛以與匠師御匶注云匠師事官之屬其於司空若鄉師之於司徒若然則匠師司空之考而此云未聞者彼文以義約之無正文故也小宰以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則専逹二曰地官其屬六十掌邦教大事則從其長小事則専逹三曰春官其屬六十掌邦禮大事則從其長小事則専逹四曰夏官其屬六十掌邦政大事則從其長小事則専逹五曰秋官其屬六十掌邦刑大事則從其長小事則専逹六曰冬官其屬六十掌邦事大事則從其長小事則専逹注大事從其長若庖人內外饔與膳夫共王之食小事専逹若宫人掌舍各為一官六官之屬三百六十象天地四時日月星辰之度數天道備焉亨疏大事從其長若膳夫食官之長則下庖人內外饔人有事皆來咨白膳夫也小事則専逹若宫人掌舍無大事無長官可咨自専行事王氏應電曰三百六十之屬固以六官為長而六官之下又有各司之長如膳夫為膳官長醫師為醫官長內宰為內官長也有大事焉則分司之屬承命于各官之長各司之長又承命于六官之長而無敢専行有小事焉則各司之長専行之而六官有弗與或分司之屬専行之而其長亦弗與蓋大臣而理小事則是上侵乎下而失其大體小臣而専大事則是下侵乎上而撓其大權其失均矣以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰攻職以服邦國以正萬民以聚百物五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物注懷亦安也賔客來共其委積所以安之聚百物者司馬主九畿職方制其貢各以其所有髙氏愈曰六職即六典也大宰以天子所統經綸天下者言之故謂之典小宰以百官所掌紀綱一事者言之故謂之職蕙田案以上六官之綱治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人注變冡言大進退異名也百官總焉則謂之冢列職于王則稱大冡大之上也山頂曰冡旅衆也下士治衆事者自大宰至旅下士轉相副二皆王臣也王之卿六命其大夫四命士以三命而下為差府六人史十有二人注府治藏史掌書者凡府史皆其官長所自辟除胥十有二人徒百有二十人注此民給徭役者若今衛士矣胥讀如諝謂其有才知為什長疏府史大例皆府少而史多而府又在史上惟御史史百有二人特多而在府上以其掌贊書多也有府兼有史以其當職事繁也有史而無府以其當職事少得史即足故也至于角人羽人等直有府無史以其當職文書少而有稅物須藏之也臘人食醫之等府史俱無以其専官行事更無所須也惟天府一官府特多于史以其所藏物特重也有胥必有徒胥為什長故也臘人之類有徒無胥者得徒則足不假長帥也食醫之類胥徒並無者専官行事不假胥徒也林氏之竒曰冢宰三公之任而命以卿蓋卿爵也冢宰官也其爵則卿其官則三公可以兼之王氏昭禹曰有藏則置府有書則置史有號令之事則置徒有徒則置胥有市賈之事則置賈也蔡氏德晉曰治典太宰以卿一人主之少宰以中大夫二人副之既已職其要矣然非多設佐員以職其詳則治之繁劇者無由理故更設宰夫以下大夫四人統領上中下士五十六人使職治典之詳也府史胥徒則吏員也自太宰至旅下士凡六十三人而府史胥徒止百五十人官甚多而吏甚簡蓋周時百官各勤于政吏止取其給不必過多且吏簡則易周知其情弊不至朋比為姦以蒙蔽其上况吏多而祿不給不得不薄薄則內顧之念重不得不為姦惟吏簡則祿易給而得厚則人咸知自愛然則先王之減省吏員誠法也又成周下士與庶人在官者同祿則知吏之與官其位亦不甚懸絶蓋必取儒雅賢厚之人居之如漢世博士弟子之眀經者多補太守卒吏是以吏之流品不雜此又正本清源之法也宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人注正長也宫正主宫中官之長上疏上大宰至旅下士總馭羣職故為首自此宫正已下至夏采六十官隨事緩急為先後故自宫正至宫伯二官主宫室之事安身先須官室故為先也自膳夫至臘人皆供王膳羞飲食饌具之事人之處世在安與飽故食次宫室也自醫師已下至獸醫主療疾之事有生則有疾故醫次食饌也自酒正至宫人陳酒飲肴羞之事醫治既畢須酒食養身故次酒肴也自掌舍至掌次安不忘危出行之事故又次之自大府至掌皮並是府藏計會之事既有其餘理須貯積或出或納宜計會之故相次也自內宰至屨人陳后夫人已下內教婦功婦人衣服之事君子明以訪政夜以安息故言婦人于後也夏采一職記招魂以其死事故於末言之也宫伯中士二人下士四人府一人史二人胥二人徒二十人注伯長也魏氏校曰宫正宫伯皆士先王燕居宫巾宦侍婦人不得在側左右前後所與居者惟士耳程子嘗言于哲宗曰人主親賢士大夫之時多親宦官官妾之時少則可涵養德性薰陶氣質得斯義矣王氏應電曰天官之職宫中為至要故小宰宰夫以宫職為至重宫正宫伯與小宰宰夫相戒交舉乃天官之第一義所以列銜百職之首也蔡氏德晉曰成周天子之衛有四官正宫伯所掌居守環列之衛也令官吏及士庶子有德行道藝者直宿衛以養成君德為務孟子所謂在王所者長幼卑尊皆薛居州王誰與為不善乃相臣格王要道故屬冢宰太僕所掌侍御僕從之衛也主于通政令虎賁所掌奔趨先後之衛也取其有勇力故二者屬司馬司𨽻所掌周防守禦之衛也令四翟之吏守王之門外與罪𨽻同為五𨽻故屬司冦然别言之則有四衛合言之止二衛而已宫正宫伯所掌即漢光祿勳所掌之郎衛也太僕虎賁司𨽻所掌即漢衛尉所掌之兵衛也漢之郎衛類取明經行修者充之自議郎外皆主更直執戟宿衛諸殿門出充車騎光祿勳考其德行而進退之猶存周官遺法魏晉以後郎衛廢而光祿不復居禁中至北齊光祿寺則掌膳羞悵幕而已膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人注膳之言善也今時美物曰珍膳膳夫食官之長也鄭司農以詩説之曰仲允膳夫蔡氏德晉曰養生莫切於飲食然物性不齊而四時五臟各有宜忌膳夫選擇牲物和調美善而後進于王所以均平其氣體衛護其生理非徒以肥甘養口體而已記以飲食為人之大欲存焉而魯共公擇言亦謂必有以酒與味亡其國者則知飲食之欲不可不防間撙節也人主玉食萬方苟縱欲不已小之則如唐時貢荔枝置遞鋪至死者相望于道以為民害大之則如商辛之酒池肉林而宗社為墟矣膳夫以禮制王食以道節王欲使品物有定多寡有數則臣民不得貢四方珍竒之味人主不得恣口腹無厭之求此所以成王清心寡欲之德也且膳夫一飲一食必與王俱如晉知悼子卒平公飲酒宰夫杜蕢遂入寢而諌是也是其有助于相臣格君心之職者非小故膳夫屬之冢宰也庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人注庖之言苞也裹肉曰苞苴賈主市買知物賈內饔中士四人下士八人府二人史四人胥十人徒百人注饔割烹煎和之稱內饔所主在內外饔中士四人下士八人府二人史四人胥十人徒百人注外饔所主在外亨人下士四人府一人史二人胥五人徒五十人注主為外內饔煮肉者朱子曰陳君舉説天官之職如膳羞衣服之官皆屬之此是治人主之身此説是魏氏校曰今之厨役古乃以士為之事外無道也後世士多清談鼎鑊之事以為賤役事道判矣讀周禮者以此類求之庶知古人溫恭朝夕執事有恪之義甸師下士二人府一人史二人胥三十人徒三百人注郊外曰甸師猶長也甸師主共野物官之長獸人中士四人下士八人府二人史四人胥四人徒四十人􅘋人中士二人下士四人府二人史四人胥三十人徒三百人鱉人下士四人府二人史二人徒十有六人臘人下士四人府二人史二人徒二十人注臘之言夕也髙氏愈曰自膳夫至臘人凡十官為一屬以其皆奉王飲食之事也天官自宰夫而下首列宫官所以擁衛王居而防肘腋之變次列食官醫官所以保護王躬而防意外之虞三者皆官之至要固不得以他官先之矣醫師上士二人下士四人府二人史二人徒二十人注醫師衆醫之長食醫中士二人注食有和齊藥之類疾醫中士八人瘍醫下士八人注瘍創癕也獸醫下士四人注獸牛馬之類黃氏度曰周冢宰必兼三公使其燥濕寒暑之不戒飲食起居之不節而疾生焉何以為師保故食醫之調適飲食為詳而醫師奉王之事屬于冢宰葉氏時曰人君一起居一飲食不知致謹皆足以生疾不統于大臣則小臣何所忌西漢以太醫太官𨽻少府而統于丞相御史猶有周官遺意至東漢則尚藥太官雖如舊而悉用奄人主之唐亦𨽻之內侍省起居飲食之重不揆于大臣而委之奄豎豈有防微杜漸葆和育德之計哉蔡氏德晉曰醫師職在調護王躬其屬以食醫為上治之于未病也疾瘍二醫則治之于己病矣食醫之法下及君子先王之體羣臣也疾瘍之療遍及萬民先王之子庶民也至獸如牛馬之屬人所任用者亦不忍其疾痬而設醫治之先王愛物之仁至矣疾醫不使療瘍內外之證異也民醫不使療獸人物之類殊也人則疾痬分為二職獸則統于一職詳于貴而略于賤也先王經制之善如此宜其上下恬熙民無夭札物無疵癘以成大和之治也酒正中士四人下士八人府二人史八人胥八人徒八十人注酒正酒官之長髙氏愈曰自酒正至冪人共九職亦皆主王飲食供養之事但女酒女漿之屬皆以女人在王宫之內內外貴有别故不與膳夫庖人相次酒人奄十人女酒三十人奚三百人注奄精氣閉藏者今謂之宦人月令仲冬其器閎以奄女酒女奴曉酒者古者從坐男女沒入縣官為奴其少才知以為奚今之侍史官婢或曰奚宦女漿人奄五人女漿十有五人奚百有五十人注女漿女奴曉漿者凌人下士二人府二人史二人胥八人徒八十人注凌氷室也詩云二之日鑿氷沖沖三之日納于凌隂髙氏愈曰凌人厠于食官者夏月酒漿籩醢之味皆利氷之寒故也籩人奄一人女籩十人奚二十人注竹曰籩女籩女奴之曉籩者醢人奄一人女醢二十人奚四十人注醢豆實也不謂之豆此主醢豆不盡于醢也女醢女奴曉醢者醯人奄二人女醯二十人奚四十人注女醯女奴曉醯者鹽人奄二人女鹽二十人奚四十人注女鹽女奴曉鹽者葉氏時曰周官鹽人一職亦以鹽之用而供邦事未嘗以鹽之利而供邦財也後世𣙜利之禁興方且𣙜鹽不足而又𣙜鐵𣙜鐵不足而又𣙜茶自漢至唐法日密矣冪人奄一人女冪十人奚二十人注以巾覆物曰冪女冪女奴曉冪者梁氏萬方曰飲食之官以冪人終之者致潔以告成全也宫人中士四人下士八人府二人史四人胥八人徒八十人掌舍下士四人府二人史四人徒四十人注舍行所解止之處幕人下士一人府二人史二人徒四十人注幕帷覆上者掌次下士四人府四人史二人徒八十人注次自修正之處王氏應電曰宫寢中凡便身煩勞之事後世皆屬之宦寺而周公必以屬士人宜其有承弼啓沃之功而無逢迎消蝕之禍也漢猶近古孔光以名士親執唾壺侍中後世宮人意亡而治彌不古若矣大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人注大府為王治藏之長若今司農矣葉氏時曰周以大府為府官之長總司貨賄出入之權則利權不分斂散得宜使分掌于諸司而不専總于一司則出財者惟以給辦為能用財者惟以濟事為功而不顧後之不繼矣玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人注工能攻玉者內府中士二人府一人史二人徒十人注內府主良貨賄藏在內者外府中士二人府一人史二人徒十人注外府主泉藏在外者李氏覯曰玉府掌天子燕私之物然而為冡宰之屬列大府之下主以上士之官而司書之要二司會之鈎考皆必及焉若以御府禁錢付之親幸之手省闥之中外人所不覩法制所不行比校所不及則傷財害民非細故矣葉氏時曰玉府掌王內帑內府外府掌王公帑公帑二而內帑一以公用多而私用少也三府各有所掌而統之以大府則三府不得行其私大府雖總其財而制之以太宰則大府亦不得行其私此成周掌財之官然也司會中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人注會大計也司會主天下之大計計官之長若今尚書司書上士二人中士四人府二人史四人徒八人注司書主計會之簿書職內上士二人中士四人府四人史四人徒二十人注職內主入也若今之泉所入謂之少內職嵗上士四人中士八人府四人史八人徒二十人注主嵗計以嵗斷職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人葉氏時曰財之出入必有會計司會為計官之長而司書二之職內職嵗則以出入相考而職幣復會其餘財焉不特此也司裘何與會計而嵗終且會其裘事掌皮何與財用而嵗終亦會其財齎以二官而繼于計官之列則凡事皆會可知此成周會財之官然也然以會計之官鈎考掌財用財之吏苟其權不足以制而為太府者反得以勢臨之則將聼命之不暇又安敢校其是非故太府僅以下大夫二人司會乃有中大夫二人下大夫四人使之以尊臨卑以多制寡而後糾察鈎考之勢得行司會又𨽻之冡宰而冢宰以九式節財以嵗終制用司會又不得以欺之也故知大府可以統諸府司會可以臨大府太宰可以制司會則理財之法庶乎可得而論矣後世有為漢丞相而不知一嵗錢穀之出入謂當責治粟內史為唐宰相而曰陳調兵食非宰相事請罷度支歸有司彼豈識大府司會兼屬冡宰之意乎蔡氏德晉曰職內職嵗皆無府藏唯職幣自有府藏蓋羣臣當用公物已經內外府支出其用之有餘則不復更入內外府故另立職幣俾收藏之以供賜豫之用此職之立有四善焉一則支給公物可以稍寬令辦事得以舒展一則令羣臣不得侵漁公物以入已一則令羣臣不獻羡餘以媚朝廷一則令君上不得索瑣悉小利入公帑而充正用一職立而君臣之道交得矣司裘中士二人下士四人府二人史四人徒四十人掌皮下士四人府二人史四人徒四十人郝氏敬曰自大府至掌皮十一職皆貨財之司而大府與司會為出入之長王飲食居處外財用為至急君心荒于侈與羣小因緣為姦亦唯財為甚故冡宰兼領之後世宰相領度支儒者非之不知後世之失在别設宰相不在領度支也髙氏愈曰司裘掌皮二職亦係王服御之事故屬之冡宰又以皮裘之事皆有會計故列諸會訃諸官之下內宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人注內宰宫中官之長鄭氏伯謙曰內宰為冡宰之屬則女寵近習皆畏師保之檢察而無敢踰節皇父作相膳夫內史皆不得人晉侯近女而惑疾醫和以為趙孟之過古人致君二南之化其道由此內小臣奄上士四人史二人徒八人注奄稱士者異其賢也李氏覯曰餘奄皆不命也先王不以恩奪義不以私廢公雖其褱人毋得過寵奄稱士者止于四人况可為卿大夫哉吕氏祖謙曰奄位極于上士先王防患之意蓋微閽人王宫每門四人囿遊亦如之注閽人司昏晨以啓閉者囿御苑遊離宫也沈氏形曰宫門臯庫雉應路凡五當二十人囿遊之門蓋二又當八人也囿人掌囿遊之守禁是遊即在囿中寺人王之正內五人注寺之言侍也詩云寺人孟子正內路寢疏僖二十四年寺人披請見自稱刑臣明寺人奄人也寺人既掌內人不掌男子而秦詩云欲見國君先令寺人者秦仲時官未備故寺人兼小臣也正內謂后之路寢若王之路寢不得稱內先鄭云后六宫前一後五前一則路寢朱子曰天官兼嬪御宦官飲食之事皆總之則其於飲食男女之欲所以制其君而成其德者至矣豈復有後世宦官之弊古者宰相之任如此蔡氏德晉曰幽王時周家法度雖壞猶有寺人孟子惡讒而作巷伯之詩孔子賢而録之則成周寺人必選用醇謹老成可知也今考員止五人而無爵其職雖得侍御于王而所掌正內人之事蓋慎簡而賤役之周家所以無宦寺之禍也秦詩云未見君子寺人之令説者謂秦仲官未備故寺人兼小臣得掌男子然宦寺與外政自此始厥後卒用趙髙殺扶蘇弒二世而亡秦豈非祖宗立法不善之所致與內豎倍寺人之數注豎未冠者之官名方氏苞曰童稚未有遽犯宮刑者按春秋傳庚宗婦人之子叔孫以為豎官又孔氏之豎渾良夫長而美通于伯姫則豎非刑人也九嬪注嬪婦也昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聼天下之內治以眀章婦順故天下內和而家理也不列夫人于此官者夫人之于后猶三公之于王坐而論婦禮無官職世婦注不言數者君子不苟于色有婦德者充之無則闕女御注昏義所謂御妻御猶進也侍也朱子曰五峯以周禮為非周公致太平之書謂如天官冡宰却管甚宫閫之事其意只是見後世宰相請託宫闈交結近侍以為不可殊不知此正人君治國平天下之本豈可以後世之弊而併廢聖人之良法美意哉薛氏衡曰內宰所掌自內豎以上所以紀綱王宫之治自九嬪以下所以輔成王內之治女祝四人奚八人注女祝女奴曉祝事者朱子曰古人立法無所不備有是事則立是官如宮中祈祝之事専立女祝以掌之自無後世巫蠱之禍女史八人奚十有六人注女史女奴曉書者張子曰女史八人書王后言動以佐內治及進御煩碎之事皆書之故后夫人以下莫不懼而增德典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人注典主也典婦功者主婦人絲枲功官之長典絲下士二人府二人史二人賈四人徒十有二人典枲下士二人府二人史二人徒二十人陳氏傅良曰三官悉用士人為之先王以此人主奢儉所係國家利害所關非士大夫為之則害國亂政必不得已與內宫相關通如內小臣內司服之類始用宦者耳髙氏愈曰婦人不親絲枲則湛于逸樂而淫邪易生故立典婦功典絲典枲三官以督之內司服奄一人女御二人奚八人注內司服主宫中裁縫官之長有女御者以衣服進或當于王廣其禮使無色過縫人奄二人女御八人女工八十人奚三十人注女工女奴曉裁縫者染人下士二人府二人史二人徒二十人薛氏衡曰內司服與縫人既主以奄人而染人特付之命士者蓋縫線之事雖當便于內而采章之正不宜使便于內也王氏志長曰染人職掌甚細然嫌微之際所關綦重書懋五服五章詩關緑衣黃裏蓋名器之尊卑後宫之華朴與其式法淫邪皆係焉屬之天官固宜已髙氏愈曰婦人淫巧自衣服始衣服奇邪自以艷色相誇鬪始故染人一官特掌于冡宰而後宫服飾化于竒邪者鮮矣追師下士二人府一人史二人工二人徒四人注追治玉石之名髙氏愈曰按追師為王后及九嬪世婦首服止于工二人其儉約如此屨人下士二人府一人史一人工八人徒四人史氏浩曰王有辨師后有追師王有司服后有內司服各有其司獨于屨人總之者以為不足煩二官夏采下士四人史一人徒四人注夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采陳氏傅良曰冡宰一職惟制御天子身畔之人一則環衛之人二則供奉飲膳酒漿之人三則出納財賄之人四則宫中使令之人蓋以此等與天子勢狎或用內卿或用女奚他卿不能誰何所以冡宰盡制御之李氏光地曰冡宰兼統百官理萬事而其要以正君身為本故自王及后世子凡內外之飲食服用居處以至閹豎閽寺婦職女功皆兼而掌之蓋所以相天子修身齊家而為治國平天下之本其慮至逺而義至精也惟小宰宰夫則佐冡宰兼總大體紀綱內外之政此外宫正宫伯則掌宿衛居守王宫之事事之最要者也膳夫庖人內饔外饔亨人甸師獸人􅘋人鱉人臘人醫師食醫疾醫瘍醫獸醫酒正酒人漿人凌人籩人醢人醯人鹽人冪人皆飲食之事宫人掌舍幕人掌次皆王寢處次舍之事大府玉府內府外府皆蓄藏之事司會司書職內職嵗職幣皆會計之事以上諸職雖兼掌宫內之服食器用然皆外職也故以司裘掌皮繼之蓋裘皮雖衣服之類然不出於婦功故於內職無所附屬而自內宰以下則皆內職也內宰內小臣閽人寺人內豎皆內之男官九嬪世婦女御女祝女史皆內之女官典婦功典絲典枲內司服縫人染人追師屨人夏采則皆服飾之事也服飾成於婦功故次於內職之後也髙氏愈曰先儒言天官一職凡宿衛之親人供奉之近密凡其布列王宫內外迫近人主左右者一舉而屬之冡宰夫是以嬪妃使令之私無敢蠱惑人主而侵竊大臣之柄者後世奪大臣之權而授之羣臣散天官之屬而歸之百司出內廷之士大夫而置之外廷上不得以臨於下外不能以制乎內甚者宰相大臣反仰鼻息于薰腐之輩豈復有綱紀名分乎周公深慮逺識知後世之撓亂國政者固必皆若輩為之故一攝以大宰之權使不得以乘間竊威福也蔡氏德晉曰天官冡宰之屬凡六十三職以太宰少宰宰夫為主乃總六官者其屬五項宫正宫伯主王宿衛膳夫以下主王飲食膳羞宫人以下主王宫室起居大府以下主國財用會計內宰以下主王內治皆迫近人主左右之人一舉而屬之冡宰俾得以道法而檢押廢置之是以嬪妃閹寺之流無敢蠱惑人主而侵奪大臣之柄也或疑如此恐有宰相不賢之弊不知人主但當慎擇賢宰相而専任之不當疑忌宰相而分其權使羣小得以乘間而竊威福至重為國家禍患也蕙田案天官之屬卿一人冡宰是也中大夫四人小宰司會各二也下大夫十二人宰夫司會各四大府內宰各二也上士四十六人中士百一十八人下士一百七十九人自冡宰而外司會則漢之計相魏晉之度支尚書唐之度支使宋之三司使是也大府則漢之司農少府是也宫正則漢之光祿勳是也內宰則漢之大長秋是也膳夫即今之光祿寺醫師即今之太醫院教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人注師長也司徒掌六鄉鄉師分而治之二人者共三鄉之事相左右也朱子語類問司徒職在敷教而地官言教者甚略言山陵林麓之事甚詳何也曰須使不飢不寒五方之民各得其所教始可施但其中言教亦不略如族師閭胥書其孝弟睦姻任恤屬民讀法之類皆是王氏應電曰六鄉天子首善之地多近臣近親司徒自治而教之鄉師為之師長領袖六遂以及都鄙皆天子畿內之地司徒不能遍及故于六遂特設遂人一職治而教之遂師為之師長領袖都鄙之治教則屬諸其長而有都則都士都宗人朝大夫等官以提挈之若邦國之治教則在諸侯而有牧伯以統率之然其教法皆本于司徒也鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人注老尊稱也王置六鄉則公有三人也三公者內與王論道中參六官之事外與六鄉之教其要為民是以屬之鄉焉州黨族閭比鄉之屬别正師胥皆長也正之言政也師之言帥也胥有才知之稱載師職曰以官田牛田賞田牧田任逺郊之地司勳職曰掌六鄉之賞地六鄉地在逺郊之內則居四同鄭司農云百里內為六鄉外為六遂王氏安石曰鄉老公也尊之于鄉憲其言行不纍以事故稱老鄉老于司徒之官非屬而無職陳氏傅良曰周公畢公以太師保釐東郊而召公以太保率西方諸侯蓋二伯兼鄉老者方叔涖中鄉之師則卿為鄉大夫者歟春秋傳宋二師令鄉而司徒令隧管仲為齊士鄉十五公與髙國各率其伍雖損益非古而列國孤卿亦董鄉事所以中外相維而治出於一章氏俊卿曰鄉大夫卿也何以謂之大夫王制曰諸侯之上大夫卿則卿固可謂之大夫矣大夫以智帥人者也故鄉大夫掌鄉之政教禁令則卿可曰大夫朝大夫掌都家之國治則士亦可曰大夫髙氏愈曰鄉大夫萬二千五百家之長六鄉共有鄉大夫六人其官以卿為之而復稱鄉大夫者意大夫其本職而卿特為加銜所以别于六遂耳州長二千五百家之長每鄉五州長六鄉共有州長三十人黨正五百家之長每州五黨正五州二十五黨正六鄉共黨正一百五十人族師百家之長每黨五族師一州二十五族師六鄉共族師七百五十人閭胥二十五家之長每族四閭胥一黨共二十閭胥一州共百閭六鄉共有閭胥三千人自鄉大夫至閭胥皆佐司徒以教其民者僅有其官而無府史胥徒以為役蓋皆里中賢者選而舉之使各任其鄉之事與朝廷之卿大夫不同比長五家之長六鄉七萬五千家共萬五千比長比長即五家之民自閭胥以上則為另設之官不在齊民之列沈氏彤曰鄉老三公兼之鄉大夫不以六卿兼何也曰鄉老無専職惟及鄉大夫帥其吏而禮賔賢能以獻其書于上退而以五物詢衆庶而已故三公可兼若鄉大夫則職専而所掌多故别置而不以六卿兼也如或兼之亦與公之兼鄉老常暫殊矣蔡氏德晉曰自鄉大夫至比長自遂大夫至鄰長皆無府史胥徒以此皆鄉遂之民差其等職其教非列位于朝而撡刑政之權者也其爵雖為卿大夫士而無官府之設其祿亦皆受田于鄉遂與其子弟自耕以供一家之衣食而非有祿廪稍餼之班故下士即上農夫受田百畝中士倍下士上士又倍巾士大夫又倍上士其所受之田皆私田而與其鄉民同養公田者也唯以致仕之公卿大夫士及世祿之子弟為之則皆受公田之祿于朝者也而司徒嵗終之考三嵗之比又視其賢否以進退其爵秩是以古者之民富貴貧賤常與其德行才能相稱而民莫不砥行修職以待上之察舉也蕙田案外朝之位三公及州長百姓北面三公每一人領二鄉之教則州長以下皆其屬吏故皆從三公之位也鄉老為兼官鄉大夫以下皆正官周禮列地官之職有鄉大夫而無鄉老以此或謂鄉大夫即六卿為之恐未然封人中士四人下士八人府二人史四人胥六人徒六十人注聚土曰封謂壝堳埒及小封疆也髙氏愈曰司徒主民民依于土教民安土重遷莫重于正四封而建社故鄉官以下即以封人先之鼓人中士六人府二人史二人徒二十人舞師下士二人胥四人舞徒四十人注舞徒給徭役能舞者以為之牧人下士六人府一人史二人徒六十人注牧人養牲于野田者詩云爾牧來思何蓑何笠或負其餱三十維物爾牲則具牛人中士二人下士四人府二人史四人胥二十人徒二百人注主牧公家之牛者詩云誰謂爾無牛九十其犉犉者九十其餘多矣充人下士二人史二人胥四人徒四十人注充猶肥也養繫牲而肥之方氏苞曰鼓舞乃民間通用之樂必屬地官于教民乃便牧人掌牧六牲以共祭祀亦地事也牧人養牲于田野充人養牲于國中載師上士二人中士四人府二人史四人胥六人徒六十人注載之言事也事民而稅之載師者閭師縣師遺人均人官之長閭師中士二人史二人徒二十人注主徴六鄉賦貢之稅者鄉官有州黨族閭比正言閭者徴民之稅宜督其親民者凡其賦貢入大府榖入倉人縣師上士二人中士四人府二人史四人胥八人徒八十人注主天下土地人民已下之數徴野賦貢也名曰縣師者自六鄉以至邦國縣居中焉鄭司農云四百里曰縣魏氏校曰縣師主天下之兵賦不屬之司馬而屬之司徒者古者寓兵于農無事則屬之司徒此經制也有事而後屬之司馬此權制也是故司馬調兵必檄司徒之屬先王所以防微也蔡氏德晉曰成周役法與軍法相表裏其事至煩重小司徒既兼總之又特設縣師以専司其事而于六遂內更立稍人掌邱乘之法亦所以佐縣師也遺人中士二人下士四人府二人史四人胥四人徒四十人注遺謂以物有所饋遺均人中士二人下士四人府二人史四人胥四人徒四十人注均猶平也主平土地之力政者髙氏愈曰自載師至均人共五官為一類皆主土地人民賦斂征役之事宜為司徒所掌也師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人注師教人以道者之稱也保氏司諫司救官之長鄭司農云詩云楀維師氏保氏下大夫一人中士二人府二人史二人胥六人徒六十人注保安也以道安人者也書敘曰周公為師召公為保相成王為左右聖賢兼此官也薛氏衡曰人主居君師之位將以善天下之民必先自善其身先王特設師保之官責以長善救失之任使人主無動不善所以善天下之本魏氏校曰先王有師臣者有友臣者于公孤則師之于師保氏則友之師嚴而友親相須以成德後世人主不知務故師友道廢人臣唯僕僕為恭漢置諫議大夫唐宋置拾遺補闕人主曷嘗與之友哉蔡氏德晉曰師保氏所以詔諫王者即所以教世子者也故父子一德也所以教世子者即所以教胄子者也故君臣一德也後世另設東宫官屬以教世子而詔諫王非其職則世子無嚴憚之心教胄子又非其職則世子無切磋之益其何以養成諸德也蕙田案周召為成王師保乃三公之職與經所云師氏保氏不同鄭合而一之誤矣文王世子云父師司成又云大司成論説在東序即地官之師氏教國子以道者也觀承案師氏保氏自與師保之尊不同據文王世子父師司成之文而以師氏保氏當之分析最確可破康成之謬司諌中士二人史二人徒二十人注諌猶正也以道正人行司救中士二人史二人徒二十人注救猶禁也以禮防禁人之過者也鄭氏鍔曰王者以天下為一身己之德成而無過亦欲天下之民有德行而無過惡故為民設司諌猶已有詔媺之師為民設司救猶已有諌惡之保調人下士二人史二人徒十人注調猶和合也媒氏下士二人史二人徒十人注媒之言謀也謀合異類使和成者今齊人名麴麩曰媒髙氏愈曰自師氏至媒氏共六官為一類主詔諌王訓國子而調和匡正會合其民司徒掌教莫切于此司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人注司市市官之長王氏曰地官主教養萬民士農工商四者而已六鄉皆士故鄉大夫而下於德行之教詳六遂皆農故遂人而下於稼穡之教詳市商人也司市而下治教商人之法也工則當見之于冬官矣質人中士二人下士四人府二人史四人胥二人徒二十人注質平也主平定物賈者廛人中士二人下士四人府二人史四人胥二人徒二十人注故書廛為壇杜子春讀壇為廛説云市中空地元謂廛民居區域之稱胥師二十肆則一人皆二史賈師二十肆則一人皆二史司暴十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人注自胥師以及司稽皆司市所自辟除也胥及肆長市中給徭役者胥師領羣胥賈師定物價司暴禁暴亂司稽察留連不時去者欽定義疏有爵者自下士始故知胥師以下非官也比長治五家即假以下士之名胥師賈師治二十肆而仍與羣胥伍以是知古之賤未而貴農也惟不假以爵故王都而外鄉遂都家公邑凡小邑聚有列肆者守土之吏皆得辟除以治市政又所以便民而恤商也泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人注鄭司農云故書泉或作錢市疏其職掌以市之征布故與司連類在此易氏祓曰外府列于天官而泉府列于地官者以掌市之征布也髙氏愈曰自司市至泉府凡十職皆所以治市然自胥師至肆長皆賈氏為之地官之屬六十其人固皆不在數中也司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人注司門若今城門校尉主王城十二門髙氏愈曰司門賤役也而主之以下大夫蓋凡門關之內敢于出入犯禁者類皆豪強兼并之徒非位尊權重必不能防間檢責之且主城管鑰原非可輕倘姦徒竊發繫尤非小故官卑者不可以居是職也在漢有城門校尉掌城門屯兵而出從緹騎且百二十者後世兵備彌嚴也司關上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人注關界上之門掌節上士二人中士四人府二人史四人胥二人徒二十人注節猶信也行者所執之信髙氏愈曰司門司關掌節三官以其為貨賄往來交通所係故屬於司徒市官之後太宰九賦其七所謂關市之賦者蓋皆司市以下諸官掌之矣遂人中大夫一人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人注遂人主六遂若司徒之于六鄉也六遂之地自逺郊以逹于畿中有公邑家邑小都大都焉鄭司農云遂謂王國百里外遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人鄼長每鄼中士一人里宰每里下士一人鄰長五家則一人注縣鄙鄼里鄰遂之屬别也王氏安石曰遂官各降鄉官一等故州謂之長縣與黨同謂之正鄙與族同謂之師髙氏愈曰六遂之制與六鄉無殊遂人之官視小司徒遂師視鄉師二官兼總六遂之政其地大其事煩故其設屬之多胥徒之盛直擬于冢宰司徒之六卿自遂大夫以下皆所謂民官其遂大夫統萬二千五百家視鄉大夫縣正統二千五百家視州長鄙師統五百家視黨正鄼長統百家視族師里宰統二十五家視閭胥鄰長統五家視比長而其爵每視鄉官皆卑一級旅師中士四人下士八人府二人史四人胥八人徒八十人注主斂縣師所徴野之賦榖者也旅猶處也六遂之官里宰之師也正用里宰者亦斂民之稅宜督其親民稍人下士四人史二人徒十有二人注主為縣師令都鄙邱甸之政也距王城三百里曰稍家邑小都大都自稍以出焉委人中士二人下士四人府二人史四人徒四十人注主斂甸稍芻薪之賦以共委積者也土均上士二人中士四人下士八人府二人史四人胥四人徒四十人注均猶平也主平土地之政令者也草人下士四人史二人徒十有二人注草除草稻人上士二人中士四人下士八人府二人史四人胥十人徒百人髙氏愈曰自旅師至稻人共六職俱主郊野米粟兵車芻薪貢賦與夫糞種作田之事次于遂人之下蓋亦猶其屬官而為之左右者也土訓中士二人下士四人史二人徒八人注鄭司農云訓讀為馴謂以逺方土地所生異物告道王也爾雅云訓道也元謂能訓説土地善惡之勢誦訓中士二人下士四人史二人徒八人注能訓説四方所誦習及人所作為久時事林氏之奇曰土訓之所訓者土地之圗誦訓之所訓者方志之書蕙田案大司徒以天下土地之圖周知九州之地域識其大者也土訓掌道地圖誦訓掌道方志以告於王識其小者也故二官為司徒之屬山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人注虞度也度知山之大小及所生者林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞注衡平也平林麓之大小及所生者竹木生平地曰林山足曰麓川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人注川流水也禹貢曰九川滌源澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡注澤水所鍾也水希曰藪禹貢曰九澤既陂爾雅有八藪陳氏汲曰周禮有頒田法而山澤未嘗頒之民太宰以九職任萬民乃有虞衡以作山澤之材則知畿內山澤皆官物也特置虞衡之官以掌之分山林川澤為上中下三等而設官有多少之異却令山澤之農以時入山林川澤入山林者供薪蒸木材入川澤者供川澤之奠以當邦賦然則周制何以不頒之民而乃設官以掌之也民自有之則有田不耕趨末者衆矣今設官以掌使旁近之民以時而入俾各供所有以當邦賦則上之政令有制而下之取有節迹人中士四人下士八人史二人徒四十人注迹之言迹知禽獸處丱人中士二人下士四人府二人史二人胥四人徒四十人注丱之言礦也金玉未成器曰礦角人下士二人府一人徒八人羽人下士二人府一人徒八人掌葛下士二人府一人史一人胥二人徒二十人掌染草下士二人府一人史二人徒八人注染草藍蒨象斗之屬掌炭下士二人史二人徒二十人掌荼下士二人府一人史一人徒二十人注荼茅莠掌蜃下士二人府一人史一人徒八人注蜃大蛤月令孟冬雉入大水為蜃囿人中士四人下士八人府二人胥八人徒八十人注囿今之苑場人每場下士二人府一人史一人徒二十人注場築地為墠季秋除圃中為之詩云九月築場圃十月納禾稼髙氏愈曰自山虞至場人共十五職皆主山林藪澤及其徴斂之事蓋太宰九職有山澤之賦皆此山虞以下諸官掌之也廪人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人注藏米曰廪廪人舍人倉人司祿官之長舍人上士二人中士四人府二人史四人胥四人徒四十人注舍猶宫也主平宫中用榖者也倉人中士四人下士八人府二人史四人胥四人徒四十人司祿中士四人下士八人府二人史四人徒四十人注主班祿司稼下士八人史四人徒四十人注種穀曰稼如嫁女以有所生舂人奄二人女舂抌二人奚五人注女舂手女奴能舂與手者手抒臼也詩云或舂或手饎人奄二人女饎八人奚四十人注鄭司農云饎人主炊官也特牲饋食禮曰主婦視饎爨故書饎作􅐪稿人奄八人女稿每奄二人奚五人注鄭司農云稿讀為犒帥之犒主冗食者故謂之犒髙氏愈曰自廪人至稿人共八職皆與米粟之事相出入故類為一屬周公以錢幣事屬天官以米粟事屬地官者錢幣主流行米榖主蓄藏隂陽之義也且使會計之繁劇各有所分而人不得縱其姦後世以錢榖二事總于户部一官而管算之勞有不勝言矣陳氏傅良曰周禮地官掌教最難曉以屬官考之自鄉師至比長自遂人至鄰長皆鄉遂之官自封人至充人皆疆場畜牧之官自載師至均人皆掌財賦征役之事自司市至泉府皆掌市井自司門至掌節皆掌門關自旅師草人稻人虞衡以至掌染草炭荼蜃極于場人囿人無非山林川澤田疇之官所謂教官者師氏保氏司諫司救調人鼓人不過六七而已當時謂之教典何也先王教民自經界始八八為井五五為軍市有奠居里有聨比無非習民于正而寓之以道德之意俾之分定而慮不易事同而心臧生厚而德正易直而淳龎以服從上令是曰教典師保諫救調媒之官則導媺惡訓禮行判合婚冠者也而豈徒謂是哉豳詩述風化之由孟子言王道之本無非田圃之事誠知本者也李氏光地曰大司徒主於教民然教民者以養民為本故自土地田野之事賦稅兵車之政皆司徒掌之蓋古者養即為教教即為養養教不相離非如後世之截然為二物也鄉師鄉老鄉大夫州長黨正族師閭胥比長皆六鄉之官也六鄉之民居王城之中其受田在近郊百里之內其施教最先其立法最詳蓋其所謂教民讀法序齒興賢其紀綱條具布之六遂都鄙邦國所以化民成俗無不由是故下六遂之官詳于田野稼穡而略于教事非逺近異施也其法已具于六鄉故於遂略其詞立文不同而義相備也封人主封社稷鼓人舞師主鼓舞祭祀牧人牛人充人主祭祀之犧牲皆國之大事故次之載師閭師縣師遺人均人主賦斂力征之事故又次之師氏保氏司諫司救調人媒氏掌教萬民德行道藝匡其過惡勸其親睦之事乃教所以成故又次之蓋六鄉之官為之經而封人以下至媒氏為之緯各主其鄉之祭祀賦役教化者經也又各為之専官者緯也此其序也司市質人㕓人胥師賈師司暴司稽胥肆長泉府皆市官也司門司關掌節皆關吏也市在王朝之後關在王城之外故關市次於此而山林川澤之官則列於六遂之終者亦重王城之義也遂人遂師遂大夫縣正鄙師鄼長里宰鄰長皆六遂之官也旅師稍人委人土均亦主賦役力征之事者也旅師猶載師也稍人猶縣師也委人猶遺人也土均猶均人也其職蓋相成而或屬於鄉或屬於遂亦以所職之逺近為先後之次也草人稻人蓋農師也繼於土均之後猶師氏保氏之繼均人鄉主教而遂主耕也土訓誦訓辨四海九州之土宜地俗因草人稻人辨地物而並及之也山虞林衡川衡澤虞迹人丱人角人羽人掌葛掌染草掌炭掌荼掌蜃皆山澤之官也次於此者猶關市之次六鄉也關市近故內之山澤逺故外之也囿人場人園圃之官也故次山澤也廪人舍人倉人司祿司稼舂人􅐪人稿人皆倉廪粟米之官也國之積貯民之司命故以是終焉蕙田案地官之屬卿一人大司徒是也中大夫五人小司徒二師氏一遂人二也下大夫十五人鄉師四保氏一司市二司門二遂師四廪人二也上士四十八人中士百四十八人下士三百三十八人山虞林衡川衡澤虞皆中下士其數無考其鄉遂之官則卿六人中大夫三十六人下大夫百八十人上士九百人中士三千七百五十人下士萬八千人而郊野之官不與焉師氏保氏如後世之經筵講讀及太子師傅司門如漢之城門校尉廪人如魏晉以後之倉部今之倉場侍郎也禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人注肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛薛氏衡曰肆之為言陳也宗伯以明其義肆師以陳其數鬱人下士二人府二人史一人徒八人注鬱鬱金香草宜以和鬯鬯人下士二人府一人史一人徒八人注鬯釀秬為酒芬香條暢于上下也秬如黑黍一稃二米雞人下士一人史一人徒四人司尊彛下士二人府四人史二人胥二人徒二十人注彛亦尊也鬱鬯曰彛彛法也言為尊之法也司几筵下士二人府二人史一人徒八人注筵亦席也鋪陳曰筵藉之曰席然其言之筵席通矣薛氏衡曰鬱鬯實尊彛而獻之涖几筵而陳之故三職相次天府上士一人中士二人府四人史二人胥二人徒二十人注府物所藏言天者尊此所藏若天物然典瑞中士一人府二人史二人胥一人徒十人注瑞節信也典瑞若今符璽郎典命中士二人府二人史二人胥一人徒十人注命謂王遷秩羣臣之書司服中士二人府二人史一人胥一人徒十人髙氏愈曰自天府至司服共四官皆國家典禮之物名器爵秩所係宜為禮官重職也典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧每廟二人奚四人注逺廟曰祧周為文王武王廟遷主藏焉奄如今之宦者女祧女奴有才知者天子七廟三昭三穆奚女奴也薛氏衡曰典祀掌外祀之兆守守祧掌先王先公之廟祧外焉兆守謹于四郊內焉廟祧謹于宗廟禮之大本在是世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人注世婦后官官也王后六宫漢始大長秋詹事中少府太僕亦用士人女府女史女奴有才智者卿疏王后六官每宫卿二人則十二人也此主婦人則大夫士並奄人為之是以賈馬皆云奄卿也沈氏彤曰王之六卿六命十二小卿皆中大夫四命九嬪視九卿此卿十二人則當視四命中大夫也天官之世婦即春官之世婦乎曰然其職同則其人同也但兩著其職而爵數獨詳于春官則未之歸一耳朱子以周禮為草本蓋謂此類也蕙田案賈疏以世婦為奄人大謬豈有奄人而位為列卿者乎考天官世婦所掌與此世婦所掌大略相同則其非兩職明甚內宗凡內女之有爵者注內女王同姓之女謂之內宗有爵其嫁于大夫及士者凡無常數之言外宗凡外女之有爵者注外女王諸姑姊妹之女謂之外宗冡人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人注冡封土為邱壠象冡而為之墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人注墓冡塋之地孝子所思慕之處職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人注職主也髙氏愈曰人死魂氣歸天體魄歸地聖人既立之主以定其魂復為之墓以藏其魄故廟之與墓皆有禮儀而不可忽而守祧與冡人墓大夫皆𨽻于禮官職喪主諸侯公卿大夫喪禮者與墳墓之類相近故冡人墓大夫以下即以此繼之大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人注大司樂樂官之長髙氏愈曰凡教人均平其氣體怡懌其心志使之優柔漸漬而自和順于道德者莫善于樂故虞廷命夔教胄子而周官教國子以司樂名官然虞廷典禮典樂分為二而周官以司樂屬之大宗伯蓋禮理也樂和也隂陽理而後和則司樂𨽻禮官宜矣大胥中士四人小胥下士八人府二人史四人徒四十人注胥有才知之稱禮記文王世子曰小樂正學干大胥佐之鄭氏鍔曰閭胥以胥名之謂其才智足以長人樂官亦名胥胥者相也惟有才智然後能相人太師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人視瞭三百人府四人史八人胥十有二人徒百有二十人注凡樂之歌必使瞽矇為焉命其賢知者以為大師小師晉杜蒯云曠也大師也視讀為虎視之視瞭目明者鄭司農云無目眹謂之瞽有目眹而無見謂之矇有目無眸子謂之瞍髙氏愈曰大司樂學官之長大師教樂之官之長小師其副也古人重樂謂其可以格神眀馴鳥獸故其官特以下大夫為之瞽矇其别有上中下者蓋亦以審音之優劣定其差典同中士二人府一人史二人胥二人徒二十人注同隂律也不以陽律名官者因其先言耳書曰協時月正日同律度量衡太師職曰執同律以聼軍聲疏引書及大師職證同在律上之義孔注尚書律為法制當齊同之則同不為隂律與鄭義别王氏安石曰典同則律可知髙氏愈曰不以陽律名官者陽待隂之和舉其全也磬師中士四人下士八人府四人史二人胥四人徒四十人鐘師中士四人下士八人府二人史二人胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鎛師中士二人下士四人府二人史二人胥二人徒二十人注鎛如鐘而大髙氏愈曰八音金石為重故先鐘磬二師笙師于匏土竹木四音皆教而專稱笙師者以笙之用獨多也鎛師主革音而以鎛名官者以主鼓其金奏也韎師下士二人府一人史一人舞者十有六人徒四十人注鄭司農説以眀堂位曰韎東夷之樂讀如味飲食之味杜子春讀韎為菋荎著之菋元謂如韎韐之韎旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人注旄牛尾舞者所持以指麾陸氏佃曰王者舞先王之樂眀有法也舞當代之樂明有制也舞四夷之樂明有懷也鄭氏鍔曰作四夷之樂當從其國不變其俗故韎師所服者赤韎示不變其所服旄人所執者牛尾示不變其所執鞮鞻氏所履者革履示不變其所履籥師中士四人府二人史二人胥二人徒二十人注籥舞者所吹春秋宣八年壬午猶繹萬入去籥傳曰去其有聲廢其無聲者詩云左手執籥右手秉翟籥章中士二人下士四人府一人史一人胥二人徒二十人注籥章吹籥以為詩章鄭氏鍔曰迎寒逆暑祈年祭蠟古之詩無不可用乃専用豳籥吹豳詩者蓋以先公開國于豳稼穡蠶桑勤力重本極王業之艱難周公念其祖先務農之勤教民之心風俗之厚故四時祈祭皆用豳籥吹豳詩而以籥章名官鞮鞻氏下士四人府一人史一人胥二人徒二十人注鞻讀如屨也鞮屨四夷舞者所屝也今時倡踏鼓沓行者自有屝典庸器下士四人府四人史二人胥八人徒八十人注庸功也鄭司農云庸器有功者鑄器銘其功春秋傳曰以所得於齊之兵作林鐘而銘魯功焉司干下士二人府二人史二人徒二十人注干舞者所持謂楯也春秋傳曰萬者何干舞也髙氏愈曰自典同至司干共十二職皆太師之屬而總𨽻于大司樂也大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人注問龜曰卜大卜卜筮官之長髙氏愈曰大卜卜師卜人三官同署而龜人以下四官皆其屬也先王所以同民患前民用使人通隂陽造化之幾而趨吉避凶者莫過於卜筮觀洪範九疇專以稽疑繫之則其重可知矣占夢視祲二官所以考休咎而察災祥亦其類也故附焉大卜卜師卜人官至三十人之多者蓋神明之事微妙而難窺當主多人以相參決也蕙田案洪範稽大疑則謀及卜筮易稱定天下之吉凶成天下之亹亹莫大乎蓍龜故先王以卜筮為重殷人建天官先六大而大卜居其一周禮大卜以下大夫為之而滕侯之先以王室懿親為周卜正則三代以上未嘗以方技目之矣古人先卜而後筮春秋傳亦云筮短龜長此筮人之官領於大卜蓋古制然也至孔子贊易列于六經而卜龜之法不傳人始重筮而輕卜矣龜人中士二人府二人史二人工四人胥四人徒四十人注工取龜攻龜菙氏下士二人史一人徒八人注燋焌用荆菙之類占人下士八人府一人史二人徒八人注占著龜之卦兆吉凶簭人中士二人府一人史二人徒四人注問著曰筮其占易占夢中士二人史二人徒四人視祲中士二人史二人徒四人注祲隂陽氣相侵漸成祥者魯史梓慎云吾見赤黑之祲朱子曰聖人雖至小事必用其敬如夢亦有官掌之鄧氏元錫曰卜筮占夢即人占天也視祲以天占人也欽定義疏殷宗恭默傅説見夢夢協朕卜武王以誓師大人之占著於小雅傳記所載祲祥凶變先見于夢兆者多矣故周公特設掌夢之官與卜筮視祲相間皆聖人畏天省躬精誠之所貫注也大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人注大祝祝官之長薛氏衡曰卜也者先王所以求諸幽以決吾心之疑祝也者先王所以告諸幽以薦吾心之信此序官之相為先後與王氏志長曰别立喪祝詛祝甸祝不以干大小祝者逹誠于鬼神示欲其心無所淆得専致其寅清也喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人注甸之言田也田狩之祝詛祝下士二人府一人史一人徒四人注謂祝之使沮敗也司巫中士二人府一人史一人胥一人徒十人注司巫巫官之長男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人注巫能制神之處位次主者王氏志長曰程子嘗言天人一也但常人神氣昏塞有所隔而不能相通聖人能通幽眀而一之此卜筮占夢視祲馮相保章巫祝醫官所由設也蓋王心一動鬼神與知善惡纎微皆與造化流通而無間內而徴於夢寐有獻贈之法外而動乎四體有養治之宜眀而見於蓍龜以詔救政幽而祈於鬼神以求福佑上而觀象於三辰以辨序事故曰王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正其此之謂與大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人注大史史官之長王氏與之曰史官公道所係清議所出君相一有過舉史氏直書正蘇子由所謂宰相操一時之賞罰史官明萬世之是非者此所以權重宰相列之春官雖太宰不得統攝之陳氏曰太史蓋掌記録明卜候故凡郡國記書及天官星憲之書皆藏于此晉韓宣子適魯觀書於大史見易象與魯春秋則知凡書皆藏大史矣楚昭王時有雲如衆赤鳥夾日以飛楚子使問之周大史則知太史兼明天象矣髙氏愈曰大史掌國家一切禮法當屬禮官而得以鈎考邦國官府之治其相亞太宰而略與司會權埒漢人以郡國計書先上大史猶仍周官之法至掌天時告朔之禮又合後世欽天監職而兼之故馮相保章司推算占候為其屬自後漢至隋惟魏明帝史職領中書其餘多領祕書而變為著作局國史纂修實録之屬矣馮相氏中士二人下士四人府二人史四人徒八人注馮乘也相視也世登髙臺以視天文之次序天文屬大史月令曰乃命大史守典奉法司天日月星辰之行宿離不貸保章氏中士二人下士四人府二人史四人徒八人注保守也世守天文之變髙氏愈曰馮相主推步保章主占候推步者司天文之常占候者司天文之變此則唐虞羲和之職而周公列之為二繫之以氏蓋亦世掌其官者內史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人王氏詳説玉藻曰左史書動右史書言以左傳考之左史即大史右史即內史襄二十五年載齊大史書崔杼之事非書動乎僖二十八年王命內史策命晉侯非書言乎髙氏愈曰內史於王生殺大柄皆參與而一切誥命策令皆出其手蓋為天子最親密之臣書稱大史友內史友而家語云古者天子以內史為左右手則倚任之重可知外史上士四人中士八人下士十有六人胥二人徒二十人陳氏傅良曰內史猶今內制翰林也外史猶今外制舍人也凡策命之出黜陟豫奪其與人主圗之者冡宰也而以二史屬春官冡宰詔王大宗伯之屬得以陳誼補過於其間故號令罔不臧而賞罰公亦三公所以集衆思昭令聞也髙氏愈曰其官無府史蓋闕文御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人注御猶侍也進也其史百有二十人以掌贊書人多也吕氏祖謙曰御史之名見於周官以中下士為之特小臣耳至于戰國其職益親故獻書多云獻書于大王御史秦趙澠池之會令御史書事淳于髠亦云御史在後執法在傍是乂掌記事紏察之任也至秦皇衡石程書侍御史之權益重漢以後御史大夫直與丞相分權矣蕙田案自大史以下皆史官大史位下大夫卑於內史而列職在其前者大史兼掌天事內史専掌人事古者以天事為重故也馮相保章大史之屬故次之漢以內史治三輔而御史大夫班亞丞相謂之副相與周禮名同而實異惟大史令即周大史之職凡郡國計書先上大史以其副下丞相與周禮掌六典法則之意同而司馬遷以為近於卜祝之流則其權益輕矣巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人注巾猶衣也巾車車官之長典路中士二人下士四人府二人史二人胥二人徒二十人注路王之所乘車車僕中士二人下士四人府二人史二人胥二人徒二十人司常中士二人下士四人府二人史二人胥四人徒四十人注司常主王旌旗髙氏愈曰先王所以明上下列貴賤辨等咸異物采者自衣服宫室而外莫過于車旗後世名分僣差亡等冒上多自此始故巾車司常二官為禮官重職都宗人上士二人中士四人府二人史四人胥四人徒四十人注都謂王子弟所封及公卿所食邑家宗人如都宗人之數注家謂大夫所食采邑易氏祓曰天子有宗伯諸侯有宗人春秋夏父弗忌為宗人此諸侯之宗人也內諸侯亦有宗人都宗人家宗人是已髙氏愈曰宗人主都家之禮猶天子之宗伯不敢稱伯稱宗人而已都司馬云每都朝大夫云每國此不言者缺文也春官有都家宗人夏官有都家司馬秋官有都家士是祭祀兵刑大事禮樂征伐大權俱不下移而一統于上此大都耦國之禍所以不見於先王之世也歟傳田案春秋傳鄭公孫黑肱有疾召室老宗人立段則諸侯之大夫亦設宗人矣凡以神士者無數以其藝之貴賤為之等注以神士者男巫之俊有學問才知者藝謂禮樂射御書數髙者為上士次之為中士又次之為下士疏有即入之故無常數在都家之下者欲見都家之神亦處置之易氏祓曰春官設屬最有統紀所典之禮五禮為先五禮之中吉禮為本是蓋天秩天敘自然之理觀大宗伯其用亦博矣實以天神人鬼地示為主然後小宗伯為之建國之神位肆師為之立國祀之禮而五禮從之自其設屬而言雖五禮之用為不同莫先于祭祀之禮於是因禮事之緩急而為職掌之先後祭祀始于祼而告時告備之禮行焉故鬱人先之鬯人次之雞人次之尊彛几筵瑞玉命服之官又次之以至內外祭祀無不畢舉而凶禮為謹終之事此冡墓職喪所以居五禮之末掌禮之職備矣禮之所至樂亦至焉又自大司樂以至司千凡二十職皆列于禮官之次蓋聖人制禮所以檢柅人心而歸之于中使之周旋鼓舞于聲容之間而至敬存焉是樂之為用皆所以輔成乎是禮者也然禮者理也所以經理斯世者苟有一毫之不盡亦不足以為禮之至又自太卜而下皆卜筮之事太祝而下皆巫祝之事太史而下皆紀策書之事是雖文為制度之未而天秩天敘實寓其間聖人率是而行之始于宫庭逹于天下其道甚大百物不廢復以神士者終焉寧非吉禮為五禮之本乎李氏光地曰宗伯職掌邦禮而以祭祀為主蓋所以治神人而和上下故凡有事於禮及司神之官皆屬焉小宗伯肆師佐大宗伯者也其次則鬱人鬯人雞人司尊彛司几筵皆掌祭祀之重器其次則天府典瑞典命司服皆掌禮秩之大儀又其次典祀守祧世婦內宗外宗則守廟兆之官及祭祀之職也又其次冡人墓大夫職喪則守墓域之官及喪事之職也行禮必有樂然後神人以和故大司樂樂師大胥小胥大師小師瞽矇視瞭典同磬師鐘師笙師鎛師韎師旄人籥師籥章鞮鞍氏典庸器司干皆樂官之屬也卜祝筮史明鬼神之理通隂陽之道故次於司樂之後而俱𨽻於宗伯之職太卜卜師龜人菙氏占人簭氏占夢視祲卜官之屬也大祝小祝喪祝甸祝詛祝祝官之屬也司巫男巫女巫巫官之屬也大史小史馮相氏保章氏內史外史御史史官之屬也巾車典路車僕司常掌車旄之事宜次於典命司服而敘在巫史之後蓋車所以乘旗載於車後之者貴賤之等也都宗人家宗人主食邑采地之官後之者內外之辨也凡以神仕者無常數未有官職故又後之也蕙田案春官之屬卿一人大宗伯也中大夫五人小宗伯二大司樂二內史一也下大夫二十四人肆師四冡人二墓大夫二樂師四大師二大卜二大祝二大史二內史二巾車二也上士五十三人中士一百五十八人下士二百七十五人瞽矇視瞭皆三百人男巫女巫凡以神士者無數內官則卿十二人下大夫二十四人中士四十八人內宗外宗無常數焉大司樂即虞書典樂教胄之職後世别立國子監而樂官領於太常分為二職與古制異矣內史即唐宋兩制之任明初以學士入閣辦事與周官設內史之意同其後委任益重遂為輔弼之臣諸曹莫能抗矣右周禮官制上五禮通考卷二百十四
