body:
  text: 五禮通考卷四十九刑部尚書秦蕙田撰吉禮四十九四望山川附封禪蕙田按封禪之名六經無之也其事始於泰始皇太史公作封禪書正義曰泰山上築土為壇以祭天報天之功故曰封泰山下小山上除地報地之功故曰禪言禪者神之也然則封禪者不過禮天祭地焉耳書望秩于山川詩時邁序曰巡狩告祭柴望也禮記曰因名山升中於天是古天子巡狩方嶽必告祭柴望所以尊天而懐柔百神也三代既衰禮失其傳陋儒諂諛遂為符瑞受命之説以希世主謂之封禪蓋春秋時已有之故管子作封禪篇然終之以詭竒之説而桓公乃止亦以著其説之足以惑聽而不可行也自始皇作俑厥後漢武光武唐髙宗𤣥宗宋真宗皆襲行之流毒當時貽譏後世斯足畏矣若所謂聖主不湏封禪凡主不應封禪許懋之論深切著明雖以梁武之中主猶深信之而毅然不為况聖君賢相秉道行義什百于梁武者哉今臚其論議事蹟附于山川之末後之覽者可以鑒矣管子封禪篇桓公既霸㑹諸侯于葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家史記正義韓詩外傳云孔子升泰山觀易姓而王可得而數者七十餘人不得而數者萬數也案管仲所記自無懐氏以下十二家其六十家無紀錄也而夷吾所記者十有二焉昔無懐氏封泰山禪云云漢書注鄭氏曰無懐氏古之王者在伏羲前見荘子服䖍曰云云在梁父東山名也晉灼曰云云山在蒙陰縣故城東北下有云云亭史記正義括地志云云云山在兗州博城縣西南三十里也虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云史記索隠曰鄧展云神農後子孫亦稱炎帝而登封者律歴志黄帝與炎帝戰于阪泉豈黄帝與神農身戰乎皇甫謐云炎帝傳位八代也黄帝封泰山禪亭亭史記注徐廣曰在鉅平駰案服䖍曰亭亭山在牟陰索隠曰應劭云亭亭在鉅平北十餘里服䖍曰亭亭在牟陰非也正義曰括地志云亭亭山在兗州博城縣西南三十里也亭漢書志晉灼曰地理志鉅平有亭山師古曰晉説是也顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首漢書注應劭曰山名在博縣晉灼曰在鉅平南十二里師古曰晉説是也皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三而乗車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎于是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾史記注應劭曰鄗上山也鄗音臛蘇林曰鄗上北里皆地名索隠曰設以不可得之物應劭曰光武改髙邑曰鄗姚氏云鄗縣屬常山一云鄗上山名所以為盛漢書注師古曰盛謂以實簠簋江淮之間一茅三脊所以為藉也漢書注服䖍曰茅草有三脊也張宴曰謂靈茅也師古曰藉謂以藉地也音才夜反東海致比目之魚史記注韋昭曰各有一目不比不行其名曰鰈索隠曰鰈音答郭璞云如牛脾身薄細鱗紫黒色一眼兩片合乃得行今江東呼為王餘亦曰阪魚焉漢書注師古曰爾雅云東方有比目魚不比不行其名謂之鰈西海致比翼之鳥史記注韋昭曰各有一翼不比不飛其名曰鶼鶼索隠曰山海經崇丘之山有鳥状如鳬一翼一月相得乃飛名曰郭璞注爾雅亦作鶼鶼漢書注師古曰爾雅曰南方而管仲乃云西海其説異也然後物有不召而自至者十有五焉今鳳凰麒麟不来嘉榖不生而蓬蒿藜莠茂鴟梟数至而欲封禪毋乃不可乎于是桓公乃止蕙田按封禪篇著于管子而史記引之可知其説自春秋已然矣世衰道微六經晦塞未經孔子刪定而陋儒附會如此此亦孟子所謂邪説也管子著其説而卒破之其亦有見于後世之必然而設辭以窮之乎禮器因名山升中於天升中於天而鳳凰降龜龍假鄭注名猶大也升上也中猶成也謂巡狩至於方岳燔柴祭天告以諸侯之成功也孝經説曰封乎泰山考績燔燎禪乎梁父刻石紀號也䟽泰山謂方岳也巡守至于方岳燔柴告天告以諸侯之成功也此所謂封禪也太平乃封禪其封禪必因巡守而為之若未太平但巡守而已其未太平巡守之時亦燔柴以告之故王制説天子巡守必先柴若太平巡守之時初到方岳以燔柴告至之後乃考諸侯功績及封土為壇更燔柴祭天告諸侯之成功也此唯泰山為之餘岳則否其巡守則每岳皆至也而皇氏云太平乃巡守案詩頌時邁巡守告祭柴望時邁武王之詩而有巡守之禮武王未太平何得云太平乃巡守其義非也孝經説云至刻石紀號皆孝經緯文也封乎泰山者謂封土為壇在于泰山之上考績燔燎者謂考諸侯功績燔柴燎牲以告天禪乎梁甫者禪讀為墠謂除地為墠在于梁甫以告地也梁甫是泰山之旁小山也刻石紀號也者謂刻石為文紀錄當代號諡案白虎通云王者易姓而起必升封泰山何報告之義所以必于泰山何萬物之所交代之處也必于其上何因髙告髙順其類故升封者増髙也下禪梁甫之基廣厚也刻石紀號者著已之功迹以自勸也増泰山之髙以報天附梁甫之基以報地或曰封者金泥銀䋲或曰石泥金䋲封之印璽故孔子曰封泰山觀易姓而王可得數者七十有餘三皇禪于繹繹之山五帝禪于亭亭之山三王禪于梁甫之山繹繹無窮之意禪于有徳者而居之無窮已亭亭者制度審諦道徳著明梁甫者梁信也甫輔也信輔天地之道今案書説禪者除地為墠而白虎通云禪以譲有徳其義非也案史記封禪書齊桓公欲行封禪管仲諫止辭云自古封禪七十二家夷吾所識十有二焉昔有無懐氏封泰山禪云云伏羲氏封泰山禪云云神農炎帝黄帝顓頊帝嚳堯舜禹湯周成王皆封泰山惟禹禪㑹稽成王禪社首其餘皆禪云云者亦泰山傍小山名也但白虎通與史記禪處不同未知孰是也蕙田按禮記因名山升中于天特巡狩柴望耳注䟽乃引緯書封禪以實之不亦誣聖經而賊萬世哉史記封禪書自古受命帝王曷嘗不封禪蓋有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也雖受命而功不至至梁父矣而徳不洽洽矣而日有不暇給是以即事用希傳曰三年不為禮禮必壊三年不為樂樂必廢每世之隆則封禪答焉及衰而息厥曠逺者千有餘載近者數百載故其儀闕然湮滅其詳不可得而記聞云乎又曰孔子論述六萟傳略言易姓而王封泰山禪梁父者七十餘王矣其爼豆之禮不彰蓋難言之詩云紂在位文王受命政不及泰山武王克殷二年天下未寧而崩爰周徳之洽惟成王成王之封禪則近之矣後漢書祭祀志注莊子曰易姓而王封于泰山禪于梁父者七十有二代其有形兆填堮勒石凡千八百餘處許慎説文序曰蒼頡之初作書蓋依類象形故謂之文其形聲相溢即謂之字字者言孶乳而滋多也著于竹帛謂之書書者五帝三王之世改易殊體封于泰山者七十有二代靡有同焉蕙田案觀莊子云云則戰國時有其説矣河圗真記王者封泰山禪梁父易姓奉度繼興崇功者七十二人春秋漢含孳天子所以昭察以從斗樞禁令天下繼體守文宿思以合神保長久天子受符以辛日立號孝經鈎命決曰封乎泰山考績燔燎禪乎梁父刻石紀號煥炳巍巍教化顯著蕙田案以上三書所謂讖緯之言是也尚書中候曰昔古聖王功成道洽符瑞出乃封泰山今比目之魚不至鳯凰不臻未可以封鄭元注云比目東方異氣所生名鰈蕙田案此即管子而重衍之帝王世紀曰黄帝得寳鼎興封禪有景雲之瑞故以雲紀官為雲師蕙田案此亦管子篇内所有五經通義易姓而王太平必封泰山禪梁父何天命已為王使理羣生也或曰封以黄金為泥以銀為䋲經無明文以義説之所以止封岱泰山者五岳之長羣神之主故獨封于泰山告太平于天報羣臣之功也禪梁父者泰山之支屬能配泰山之徳也白虎通王者易姓而起必升封泰山何教告之義也始受命之時改制應天天下太平功成封禪以告太平也所以必于太山何萬物所交代之處也必于其上何因髙告髙順其類也故升封者増髙也下禪梁父之山基廣厚也刻石紀號者著已之功跡也以自效仿也天以髙為尊地以厚為徳故増泰山之髙以倣天附梁甫之基以報地明天地之所命功成事遂有益于天地若髙者加髙厚者加厚矣或曰封者金泥銀䋲或曰石泥金䋲封以印璽故孔子曰升泰山觀易姓之王可得而数者七十有餘封者廣也言禪者明以成功相傳也梁甫者泰山旁山名正以梁甫何以三皇禪于繹繹之山明已成功而去有徳者居之繹繹者無窮之意也五帝禪于亭亭者制度審諟徳著明也三王禪于梁甫之山者梁信也甫輔也輔天地之道而行之也太平乃封知告于天必也于岱宗何明知易姓也刻石紀號知自紀于百王也燎祭天報之義也望祭山川祀羣神也詩云於皇時周陟其髙山言周太平封泰山也又曰墮山喬嶽允猶翕河言望祭山川百神来歸也天下太平符瑞所以来至者以為王者承統理調和陰陽陰陽和萬物序休氣充塞符瑞並臻皆應徳而至徳至天則斗極明日月光甘露降徳至地則嘉禾生蓂莢起秬鬯出太平感徳至文表則景星現五緯順軌徳至草木朱草生木連理徳至鳥獸則鳳凰翔鸞鳥舞麒麟臻白虎到狐九尾白雉降白鹿見白鳥下徳至山陵則景雲出芝實茂陵出異丹阜出萐莆山出器車泽出神鼎徳至淵泉則黄龍見醴泉通河出龍圗洛出龜書江出大貝海出明珠徳至八方則祥風至佳氣時喜鍾律調音度施四夷化越裳貢孝道至則以萐莆者樹名也其葉大于門扇不摇自扇于飲食清涼助供養也繼嗣平明則賓連生于房户賓連者木名連葉相承故在于房户象繼嗣也日歴得其分度則蓂莢生于階間蓂莢樹名也月一日生一莢十五日畢至十六日去荚故荚階生似日月也賢不肖位不相踰則平路生于庭平路者樹名也官位得其人則生失其人則死狐九尾何狐死首丘不忘本也明安不㤀危也必九尾也者九妃得其所子孫繁息也于尾者何子孫常盈也景星者大星也月或不見景星常見可以夜作有益於人民也甘露者羙露也降則物無不盛者也朱草者赤草也可以染絳别尊卑也醴泉者羙泉也状若醴酒可以養老嘉禾者大禾也成王時有三苗異畝而生同為一穟大㡬盈車長㡬充箱民有得而上之者成王訪周公而問之公曰三苗為一穟天下當和為一乎以是果有越裳氏重九譯而来矣蕙田案附會之説無稽之談至此已極不意孟堅而猶為此習俗移人乃至是乎孟康曰王者功成治定告成功于天封崇也助天之髙也刻石紀號有金䇿石函金泥玉檢封之焉風俗通尚書禮天子巡守嵗二月至于岱宗孔子稱封泰山禪梁父可得而数七十有二蓋王者受命易姓改制應天天下太平功成封禪以告平也所以必于岱宗者長萬物之宗陰陽交代觸石而出膚寸而合不崇朝徧雨天下唯泰山乎封者立石髙一丈二尺尅之曰事天以禮立身以義事父以孝成名以仁四守之内莫不為郡縣四夷八蠻咸来貢職與天下無極人民蕃息天祿永得祭上元尊而俎生魚壇廣十二丈髙三尺階三等必于其上示増髙也尅石紀號著已績也或曰金泥銀繩印之璽下禪梁父禮祠地主去事之殺示増廣也禪謂壇墠當有所與也三皇禪于繹繹明已功成而去徳者居之繹繹者無所指斥也五帝禪于亭亭徳不及于皇亭亭山名其身禪予聖人三王禪于梁父者信父者子言父子相信予也孝武皇帝封廣丈二尺髙九尺其下有玉牒書秘書江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸飛禽及白雉加祠兕牛犀象之屬其享曰天増授皇帝泰元神筴周而復始皇帝敬拜泰靈其夜有光如流星晝有白雲起封中于是作明堂汶上令諸侯各治邸車駕前後五至祠以元鼎六年告封改為元封武帝已年四十七矣何緣反更得十八也就若所云明神禍福必有徵應權時倒讀安能誕招期乎奉車子侯驂乗上下臣不預封事何因操印沒石乃止暴病而死悼傷無已又言武帝與仙人對博棊沒石中馬蹄跡處于今尚存虚妄若此非一事也予以空偽承乏東嶽忝素六載数聘祈祠咨問長老賢通上泰山者云謂璽處尅石文昧難知也殊無有金篋玉牒探籌之事春秋以為傳聞不如親見見之人斯為審矣傳曰五帝聖焉死三王仁焉死五伯智焉死其隕落崩薨之日不能咸至百年詩云三后在天論語曰古皆沒太史記黄帝𦵏于橋山騎龍升天豈不怪乎烏號弓者柘桑之林枝條暢茂烏登其上下垂著地烏適飛去後從撥殺取以為弓因名烏號耳蕙田案風俗通意似稍正而文極支離袁宏曰夫揖讓受終必有至徳於天下征伐革命則有大功于萬物是故王者初基則有封禪之事蓋以其成功告于神明者也夫東方者萬物之所始山岳者靈氣之所宅故求之物本必于其始取其所通必于所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也徳不周洽不得輒議斯事功不宏濟不得髣髴斯禮曠代一有其道至髙自黄帝堯舜至于三代各一得封禪未有中修其禮者也雖繼體之君時有功徳此蓋率復舊業増修其前政不得仰齊造國同符改物者也夫神道真一其用不煩天地易簡其禮尚質故藉用白茅貴其誠素器用陶匏取其易從然則封禪之禮簡易可也若夫石函玉牒非天地之性也崔靈恩曰自周以前封者皆封土為壇至秦皇漢武始用石檢袁准正論封禪之言惟周官有王大封之文齊桓公欲封禪聞管仲言而止焚燎祭天皆王者之事非諸侯之所為也是以學者疑焉後秦一主漢二君修封禪之事其制為封土方丈餘崇于泰山之上皆不見于經秦漢之事未可專信管仲云禹禪㑹稽告天則同祭地不得異也㑹稽而可禪四岳皆可封也夫洛陽者天地之所合嵩髙者六合之中也今處天地之中而告于嵩髙可也奚必于泰山蕙田案准但略言其事之不可信而未言其事之不可為識不足也末以封泰山不如告嵩髙抑惑矣又案以上諸儒附會封禪之説黄憲外史封禪篇齊王将進泰山問于徵君曰敝邑有封禪之山非天子不能舉也秦始以諸侯之國而舉之非僭與徵君對曰憲也聞之古者天子巡狩朝諸侯于明堂祀羣神于岱嶽觀民風以布王政未聞有封禪之舉也不經孰甚矣天子一日有萬務其勤惕也如是豈能懈其萬務率之以臣庶曠之以時月而侈心于封禪勒功徳于無知之石哉自古迄于秦好為封禪者七十有二然茫昧而不可述大抵皆侈心之主也炎漢重離我二祖光耀前後豐功令徳不能殫紀其盛然亦未嘗蹈前王之陋規而舉封禪文景紹厥休烈海内㡬刑措之風固盛王素主也至于封禪則恥之及孝武即極玩武佳兵傾海内之命運府庫之積而肆伐匈奴使百姓去家室之樂而身顯功烈之名致符瑞求神仙茂舉封禪以建榮號是以漢祚中替卒不能休隆于前也歴至于今譚封禪之事者猶昌而未熄豈非貽謀之慮與若秦之始皇又何道哉今以大王之賢而光濟王室可以跨秦而登周也誠能偃泰山之碑摧梁父之碣毁雲夢之銘修明堂之典以臨天皇而招八國之諸侯是王之顯功踰于桓文也何必慕狂秦之侈心追七十二君之陋軌哉齊王曰先生幸教不榖羙矣駿矣雅矣元矣乃命左右紀之文中子封禪非古也其秦漢之侈心乎蓋其曠世不常行而于禮無所本自漢以来儒生學官議論不同而至于不能決則出于時君率意而行之爾文獻通考馬氏曰案文中子曰封禪非古也其秦漢之侈心乎而太史公作封禪書則以為古受命帝王未嘗不封禪且當以文中子之言為正蕙田案文中子数語切中是非而盡其事理矣有徳者必有言其信然乎蘇氏轍曰郊祀天地見夫詩書固有國之常禮也三代既衰禮失其舊秦漢之間祀五畤封泰山禮汾陰雜于郊祀之外儒者以為此禮之大者然五畤廢于漢元封禪止于晉武當時自以為賢于秦漢今将考論其實此三者于唐虞三代抑嘗行之乎所謂封禪七十二君亦可信乎秦不足言漢之諸儒初不言封禪封禪之端發于相如相如之言抑可信乎胡氏寅曰緯書原本于五經而失之者也而尤紊于鬼神之理幽明之故夫鬼神之理幽明之故非知道者不能識斷國論者誠能一決以聖人之經經所不載雖有緯書讖記屏而不用則庶乎其不謬于理矣登封之事原本于燔柴而失之者也詩書紀巡狩而柴者記所謂祭天也至于岱宗陟其髙山云者記所謂因名山也有山則因以為髙無則于郊而壇其義類一也又有大事而告于上帝者武王克商始有天下故柴望而告也舍此則凟矣記以饗帝于郊與升中于天為二事則傳者之失也然則七十二君之編録詩書禮典略不經見審有是事乃天下國家之盛舉堯舜禹湯文武成康昭宣皆身致太平安得闕而不講大學衍義補丘氏濬曰封禪之説詩書禮典略不經見審有是事乃天下國家之盛舉堯舜禹湯文武成康皆身致太平安得闕而弗講所謂七十二君者果何代何人哉先儒有言養生至于長生不死為國至于祈天永命皆有是理然人未有能為之者縱為之然亦不出乎身心日用之間非必由乎服食藥物徼求鬼神而後致之也然自秦漢以来千餘年矣有國家者未有一人過百年而不死者亦未有一國踰千年而不亡者則是有此説而無此事明矣是故明君欲求夀年之永莫若寡欲欲得國祚之延莫若愛民寡欲而至于全其天愛民而至于過其歴真誠有是理亦真誠有是事嗚呼世主所以甘心于不貲之費而行封禪之禮者以有秘祝之求也誠知此理反之于心知其必無驗之于古知其無效則自不為矣徐氏乾學曰韓詩外傳曰孔子升泰山觀易姓而王可得而数者七十餘氏不可得而数者萬数袁准正論曰唯周有王大封之文案成王封禪而文武皆不在七十二君而無一言見于經傳學者疑焉愚謂韓詩外傳亦漢儒附會之説即太史公所引管仲答齊桓公之説皆非事實雖書籍經秦焚烏有七十二君而不一見于經傳者乎至緯書河圖真紀之言皆漢人偽托以諛世主又案晉太康郡國志始皇立石頌徳文曰事天以禮立身以義事父以孝成人以仁四守之内莫不郡縣四屬八荒咸来貢職與天無極人庶蕃息天禄永得刻石改號有金冊石函金泥玉檢之事焉案史遷云封藏皆秘世不得記則是漢世已無聞矣而太康志所載文亦不類秦人語特杜氏通典載之故附記于此蕙田案以上数條先儒辨正封禪之説右傳記諸家論封禪史記始皇本紀二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生議刻石頌秦徳議封禪望祭山川之事乃遂上泰山立石封祠祀下風雨暴至休于樹下因封其樹為五大夫禪梁父刻所立石其辭曰皇帝臨位作制明法臣下修飭二十有六年初并天下罔不賓服親巡遠方黎民詩記宋大觀中汶陽劉跂至泰山見其碑摹之乃作親􅛍逺黎登兹泰山周覽東極從臣思迹本原事業祇誦功徳治道運行諸産得宜皆有法式大義休明垂于後世順承勿革皇帝躬聖既平天下不懈于治夙興夜寐建設長利專隆教誨訓經宣達逺近畢理咸承聖志貴賤分明男女禮順慎遵職事昭隔内外靡不清浄施于後嗣化及無窮遵奉遺詔永承重戒封禪書秦始皇既即帝位三年東巡郡縣祀騶嶧山頌秦功業于是徵從齊魯之儒生博士七十人至乎泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅稭言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自泰山陽至巔立石頌秦始皇帝徳明其得封也從陰道下禪于梁父其禮頗采太祝之祠雍上帝所用而封藏皆秘之世不得而記也始皇之上泰山中阪遇暴風雨休于大樹下諸儒既絀不得與用于封事之禮聞始皇遇風雨則譏之于是始皇遂東㳺海上行禮祠名山川及八神始皇封禪之後十二嵗秦亡諸儒生疾秦焚詩書誅僇文學皆曰始皇上泰山為風雨所擊不得封禪史記正義道書福地記云泰山髙四千九百丈二尺周迴二千里括地志梁父山在兖州泗水縣北八十里西接徂徕山肅然山在博城縣東六十里晉太康地志云肅然泰山趾東北名也蕙田案始皇封禪意在誇詡功徳也右秦始皇封禪漢書武帝本紀元封元年春正月行幸緱氏遂東巡海上夏四月癸卯上還登封泰山降坐明堂詔曰朕以眇身承至尊兢兢焉惟徳菲薄不明于禮樂故用事八神遭天地况施著見景象屑然如有聞震于怪物欲止不敢遂登封泰山至于梁父然後升䄠肅然自新嘉與士大夫更始其以十月為元封元年行所巡至博奉髙蛇丘歴城梁父民田租逋賦貸已除加年七十以上孤寡帛人二匹四縣無出今年算賜天下民爵一級女子百戸牛酒郊祀志後二年郊雍獲一角獸若麃然有司曰陛下肅祇郊祀上帝報享賜一角獸蓋麟云于是薦五畤畤加一牛以燎賜諸侯白金以風符應合于天也于是濟北王以天子且封禪上書獻泰山及其旁邑齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黄帝時等卿有札書曰黄帝得寳鼎冕服問于鬼臾區鬼臾區對曰黄帝得寳鼎神䇿是嵗己酉朔旦冬至得天之紀終而復始于是黄帝迎日推䇿後率二十嵗復朔旦冬至凡二十推三百八十年黄帝仙登于天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大悦迺召問卿卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黄帝言無書獨有此鼎書曰漢興復當黄帝之時曰漢之聖者在髙祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黄帝得上泰山封申公曰漢帝亦當上封禪封禪則能仙登天矣元鼎中汾陰得寳鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而羣儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上于是迺令諸儒習射牛草封禪儀数年至且行天子既聞公孫卿及方士之言黄帝以上封禪皆致怪物與神通欲放黄帝以接神人蓬莱髙世比徳于九皇而頗采儒術以文之羣儒既已不能辨明封禪事又拘于詩書古文而不敢騁上為封祠器視羣儒羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圗封事于是上黜偃霸而盡罷諸儒弗用三月乃東幸緱氏禮登中岳太室上因東上泰山泰山草木未生迺令人上石立之泰山巔上遂東巡海上行禮祠八神齊人之上疏言神怪竒方者以萬数迺益發船令言海中神山者数千人求蓬莱神人公孫卿持節常先行候名山至東莱言夜見大人長数丈就之則不見見其跡甚大類禽獸云羣臣有言見一老父牽狗言吾欲見鉅公已忽不見上既見大跡未信及羣臣又言老父則大以為仙人也宿留海上與方士傳車及間使求神仙人以千数四月還至奉髙上念諸儒及方士言封禪人殊不經難施行天子至梁父禮祠地主至乙夘令侍中儒者皮弁縉紳射牛行事封泰山下東方如郊祠太一之禮封廣丈二尺髙九尺其下則有玉牒書書秘禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下阯東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中天子從禪還坐明堂羣臣更上夀下詔改元為元封又曰古者天子五載一巡守用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬莱諸神若将可得于是上欣然庶㡬遇之復東至海上望焉奉車子侯暴病一日死上迺遂去並海上北至碣石巡自遼西歴北邊至九原五月迺至甘泉周萬八千里云其秋有星孛于東井後十餘日有星孛于三能望氣王朔言候獨見填星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云史記平凖書武帝既得寳鼎立后土太一祠公卿議封禪事而天下郡國皆預治橋道繕故宫及當馳道縣縣治官儲設供具而望以待幸漢書司馬相如傳相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使来求書奏之其遺札書言封禪事所忠奏焉天子異之相如既卒五嵗上始祭后土八年而遂禮中岳封于泰山至梁甫禪肅然司馬相如封禪文伊上古之初肇自顥穹生民歴選列辟以迄乎秦率邇者踵武逖聽者風聲紛綸葳蕤堙滅而不稱者不可勝数也繼昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存軒轅之前遐哉邈乎其詳不可得聞已五三六經載籍之傳惟見可觀也書曰元首明哉股肱良哉因斯以談君莫盛于唐堯臣莫賢于后稷后稷創業于唐公劉發迹于西戎文王改制爰周郅隆大行越成而後陵夷衰㣲千載亡聲豈不善始善終哉然無異端慎所由于前謹遺教于後耳故軌迹夷易易遵也湛恩厖洪易豐也憲度著明易則也垂統理順易繼也是以業隆于襁褓而崇冠于二后揆厥所元終都攸卒未有殊尤絶迹可考于今者也然猶躡梁父登泰山建顯號施尊名大漢之徳逢涌原泉沕潏曼羨旁魄四塞雲布霧散上暢九垓下泝八埏懐生之類霑濡浸潤協氣横流武節焱逝爾陿㳺原迥闊泳沫首惡鬱沒晻昧昭晰昆蟲闓澤回首面内然後囿騶虞之珍羣徼麋鹿之怪獸導一莖六穗于庖犧雙觡共抵之獸獲周餘放龜于岐招翠黄乗龍于沼鬼神接靈圉賓于閒館竒物譎詭俶儻窮變欽哉符瑞臻兹猶以為徳薄不敢道封禪蓋周躍魚隕航休之以燎㣲夫斯之為符也以登介丘不亦恧乎進讓之道何其爽與于是大司馬進曰陛下仁育羣生義征不譓諸夏樂貢八蠻執䞇徳侔往初功無與二休烈浃洽符瑞衆變期應紹至不特創見意者泰山梁父設壇場望幸蓋號以况榮上帝垂恩儲祉将以慶成陛下謙讓而弗發也挈三神之驩缺王道之儀羣臣恧焉或謂且天為質闇示珍符固不可辭若然辭之是泰山靡記而梁父罔㡬也亦各並時而榮咸濟厥世而屈説者尚何稱于後而云七十二君乎夫修徳以錫符奉符以行事不為進越也故聖王弗替而修禮地祗謁款天神勒功中岳以章至尊舒盛徳發榮號受厚福以浸黎民也皇皇哉斯事天下之壯觀王者之卒業不可貶也願陛下全之而後因雜薦紳先生之略術使獲曜日月之末光絶炎以展采錯事猶兼正列其義祓飾厥文作春秋一藝将襲舊六為七攄之無窮俾萬世得激清流揚㣲波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其儀而覽焉于是天子沛然改容曰俞乎朕其試哉乃遷思回慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富乃作頌曰自我天覆雲之油油甘露時雨厥壤可逰滋液滲漉何生不育嘉穀六穗我穡曷蓄匪唯雨之又潤澤之匪唯徧我氾布濩之萬物熙熙懷而慕思名山顯位望君之来君兮君兮侯不邁哉般般之獸樂我君囿白質黑章其儀可喜旼旼穆穆君子之態葢聞其聲今視其来厥塗靡從天瑞之徵兹亦于舜虞氏以興濯濯之麟逰彼靈畤孟冬十月君徂郊祀馳我君輿帝用享祉三代之前葢未嘗有宛宛黄龍興徳而升采色炫燿煥炳煇煌正陽顯見覺寤黎烝於傳有之云受命所乗厥之有章不必諄諄依類託寓諭以封巒披蓺觀之天人之際已交上下相發允答聖王之徳兢兢翼翼也故曰興必慮衰安必思危是以湯武至尊嚴不失肅祇舜在假典顧省厥遺此之謂也兒寛傳漢武帝時議欲倣古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳言符瑞足以封泰山上竒其書以問寛對曰享薦之義不著于經以為封禪告成合祛天地神祗祇戒精專以接神明總百官之職各稱事宜為之節文惟聖王所由制定其當非羣臣之所能列今将舉大事優㳺数年使羣臣得人人自盡終莫能成惟天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉既成将用事拜寛為御史大夫從東封泰山還登明堂寛上夀曰三代改制屬象相因間者聖統廢絶陛下發憤合指天地祖立明堂辟雍宗祀太一六律五聲幽賛聖意神樂四合各有方象以承嘉祀為萬世則天下幸甚将建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅雝永亨光輝充塞天文粲然見象日昭報降符應臣寛奉觴再拜上千萬嵗夀制曰敬舉君之觴東方朔傳朔之文辭有封泰山篇武帝本紀元封二年冬十月行幸雍祀五畤春幸緱氏遂至東莱夏四月還祠泰山郊祀志其春公孫卿言見神人東莱山若云欲見天子天子于是幸緱氏城拜卿為中大夫遂至東莱宿留之数日無所見見大人跡云復遣方士求神人采藥以千数是嵗旱天子既出亡名迺禱萬里沙過祠泰山還至瓠子自臨塞決河留二日湛祀而去元封三年夏旱公孫卿曰黄帝時封則天旱乾封三年上乃下詔天旱意乾封乎武帝本紀五年冬行南巡守至于盛唐望祀虞舜于九嶷登灊天柱山自㝷陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌遂北至琅邪並海春三月還至泰山增封夏四月詔曰朕巡荆揚輯江淮物會大海氣以合泰山上天見象增修封禪其赦天下太初元年冬十月行幸泰山十二月䄠高里郊祀志太初元年幸泰山十二月甲午朔上親禪髙里祀后土臨渤海将以望祀蓬莱之屬㡬至殊庭焉武帝本紀太初三年春正月行東巡海上夏四月還修封泰山䄠石閭郊祀志是年冬巡海上考神仙之屬未有騐者方士有言黄帝時為五城十二樓以候神人于執期名曰迎年上許作之如方名曰明年上親禮祠上犢黄焉公玉帶曰黄帝時雖封泰山然風后封鉅岐伯令黄帝封東泰山禪凡山合符然後不死天子既令設祠具至東泰山東泰山卑小不稱其聲迺令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下阯南方方士言仙人閭也故上親禪焉武帝本紀天漢三年春三月行幸泰山修封祀明堂因受計還幸北地祀常山瘞元玉郊祀志自封泰山後十三嵗而周遍于五嶽四瀆矣武帝本紀太始四年春三月行幸泰山甲申修封丙戌䄠石閭夏四月幸不其祀神人于交門宫若有鄊坐拜者作交門之歌征和四年三月上耕于鉅定還幸泰山修封癸巳䄠石閭郊祀志上復修封于泰山東游東莱臨大海是嵗雍縣無雲如靁者三或如虹氣蒼黄若飛鳥集棫陽宫南聲聞四百里隕石二黑如黳有司以為羙祥以薦宗廟而方士之候神入海求蓬莱者終無騐公孫卿猶以大人之迹為解天子猶羈縻不絶㡬遇其真泰山五年一修封武帝凡五修封文獻通考馬氏端臨曰秦始皇漢武帝之封禪也皆黜當時諸儒之議而自定其禮儀攷史氏所載則秦之諸儒進蒲車掃地之説漢之諸儒有拘于詩書古文而不敢騁之説以此拂二帝之意而不見録然封禪非古禮也竊詳諸儒之意蓋欲以古帝王巡狩望祀之禮而緣飾之然古帝王之事則省方問俗賞善罰惡凡以為民其意出于公也秦漢二主之事則誇誦功徳希求福夀凡以為已其意出于私也迹其舉措正自冰炭則又安能考詩書之説行簡質之禮乎固宜其見黜也蕙田案漢武封禪意在慕黄帝之升天也右漢武帝封禪後漢書光武帝本紀中元元年春二月己夘幸魯進幸泰山北海王興齊王石朝于東岳辛夘柴望岱宗登封泰山甲午禪于梁父夏四月癸酉車駕還宫己夘大赦天下復嬴博梁父奉髙勿出今年田租芻藁改年為中元祭祀志建武三十年二月羣臣上言即位三十年宜封禪泰山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放何汙七十二代之編録桓公欲封管仲非之若郡縣逺遣吏上夀盛稱虚羙必髠兼令屯田從此羣臣不敢復言三月上幸魯過泰山告太守以上過故承詔祭山及梁父時虎賁中郎将梁松等議記曰齊将有事泰山先有事配林蓋諸侯之禮也河岳視公侯王者祭焉宜無即事之漸不祭配林三十二年正月上齋夜讀河圖會昌符曰赤劉之九會命岱宗不慎克用何益于承誠善用之姦偽不萌感此文乃詔松等復案索河雒讖文言九世封禪事者松等列奏乃許焉初孝武帝欲求神仙以扶方者言黄帝由封禪而後仙于是欲封禪封禪不常時人莫知元封元年上以方士言作封禪器以示羣儒多言不合于古于是罷諸儒不用三月上東上泰山乃上石立之泰山之巔遂東巡海上求仙人無所見而還四月封泰山恐所施用非是乃秘其事語在漢書郊祀志上許梁松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列于石旁東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有葢檢用金縷五周以水銀和金以為泥玉璽一方寸二分一枚方五寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地四尺又用石碑髙九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書上以用石功難又欲及二月封故詔松欲因故封石空檢更加封而已松上疏争之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞尤宜顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使泰山郡及魯趣石工宜取完青石無必五色時以印工不能刻玉牒欲用丹漆書之會求得能刻玉者遂書書秘刻方石中命容玉牒二月上至奉髙遣侍御史與蘭臺令史将工先上山刻石文曰維建武三十有二年二月皇帝東巡守至于岱宗柴望秩于山川班于羣神遂覲東后從臣太尉憙行司徒事特進髙宻侯禹等漢賓二王之後在位孔子之後褒成侯序在東后蕃王十二咸来助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主河圖會昌符曰赤帝九世巡省得中治平則封誠合帝道孔矩則天文靈出地祗瑞興帝劉之九會命岱宗誠善用之姦偽不萌赤漢徳興九世會昌巡岱皆當天地扶丸崇經之常漢大興之道在九世之王封于泰山刻石著紀禪于梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行徳封刻政河圖提劉子曰九世之帝方明聖持衡拒九州平天下予雒書甄曜度曰赤三徳昌九世會修符合帝際勉刻封孝經鉤命決曰予誰行赤劉用帝三建孝九會修專兹竭行封岱青河雒命后經讖所傳昔在帝堯聰明宻㣲譲與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依托周公霍光輔幼歸政之義遂以簒叛僭號自立宗廟墮壊社稷喪亡不得血食十有八年揚徐青三州首亂兵革横行延及荆州豪傑并兼百里屯聚往徃僭號北夷作宼千里無煙無雞鳴犬吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡修五禮五玉三帛二生一死贄吏治修職復于舊典在位三十有二年年六十二乾乾日昃不敢荒寧涉危歴險親巡黎元恭肅神祗惠恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛夘柴登封泰山甲午禪于梁陰以承靈瑞以為兆民永兹一宇垂于後昆百僚從臣郡守師尹咸蒙祉福永永無極秦相李斯燔詩書樂崩禮壊建武元年以前文書散亡舊典不具不能胡經文以章句細㣲相况八十一卷明者為驗又其十卷皆不昭晰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記二十二日辛夘晨燎祭天于泰山下南方羣神皆從用樂如南郊諸王王者後二公孔子後褒成君皆助祭位事也事畢将升封或曰泰山雖已從食于柴祭今親升告功宜有禮祭于是使謁者以一特牲于常祀泰山處告祠泰山如親耕貙劉先祀先農先虞故事至食時御輦升山日中後到山上更衣早晡時即位于壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢事畢皇帝再拜羣臣稱萬嵗命人立所刻石碑乃復道下二十五日甲午禪祭地于梁陰以髙后配山川羣神從如元始中北郊故事四月己夘大赦天下以建武三十二年為建武中元元年復博奉髙嬴勿出元年租芻藁以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至髙廟太尉奉匱以告髙廟藏于廟堂西壁石室髙主室之下應劭漢官馬第伯封禪儀記曰車駕正月二十八日發雒陽宫二月九日到魯遣守謁者郭堅伯将徒五百人治太山道十日魯遣宗室諸劉及孔氏瑕邱丁氏上夀受賜皆詣孔氏宅賜酒肉十一日發十二日宿奉髙是日遣虎賁郎将先上山三案行還益治道徒千人十五日始齋國家居太守府舎諸王居府中諸侯在縣庭中齋諸卿校尉将軍大夫黄門郎百官及宋公衛公襃成侯東方諸侯雒中小侯齋城外汶水上太尉太常齋山虞馬第伯自云某等七十人先之山虞觀祭山壇及故明堂宫郎官等郊肆處入其幕府觀治石石二枚狀博平圓九尺此壇上石也其一石武帝時石也時用五車不能上也因置山下為屋號五車石四維距石長丈二廣二尺厚尺半所四枚檢石長五尺廣六寸狀如封篋長檢十枚一紀號石髙丈二尺廣三尺厚尺二寸名曰立石一枚刻文字紀功徳是朝上山騎行徃徃道峻峭不騎步牽馬乍步乍騎且相半至中觀留馬去平地二十里南向極望無不覩仰望天闗如從谷底仰觀抗峰其為髙也如視浮雲其峻也石壁窅窱如無道徑遙望其人端如竹朽兀或為白石或雪久之白者移過樹乃知是人也殊不可上四布僵卧石上有頃復蘇亦賴齎酒脯處處有泉水目輒為之明復勉強相将行到天闗自以已至也問道中人言尚十餘里其道旁山脇大者廣八九尺狭者五六尺仰視巖石松樹鬱鬱蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里賴其羊腸逶迤名曰環道往往有絙索可得而登也兩從者扶挟前人相牽後人見前人履底前人見後人頂如畫重累人矣所謂磨胸揑石捫天之難也初上此道行十餘步一休稍疲咽脣燋五六步一休牒牒據頓地不避濕暗前有燥地目視而兩脚不隨早食上晡後到天門郭使者得銅物銅物形状如鐘又方柄有孔莫能識也疑封禪具也得之者汝南召陵人姓楊名通東上一里餘得木甲木甲者武帝時神也東北百餘歩得封所始皇立石及闕在南方漢武在其北二十餘步得北垂圓臺髙九尺方圓三丈所有兩陛人不得從上從東陛上臺上有壇方一丈二尺所上有方石四維有距石四面有闕鄉壇再拜謁人多置錢物壇上亦不掃除國家上見之則詔書所謂酢梨酸棗狼藉散錢處數百幣帛具道是武帝封禪至泰山下未及上百官為先上跪拜置梨棗錢于道以求福即此也東山名曰日觀日觀者雞一鳴時見日始欲出長三丈所秦觀者望見長安吴觀者望見會稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人日入下去行數環日暮時頗雨不見其道一人居其前先知蹈有人乃舉足隨之比至天門夜人定矣太康地記曰奉髙者以事東岳帝王禪代之處也故明堂在縣南四里漢武立太壇于東山以登天下示増髙後漢書曹褒傳褒父充持慶氏禮建武中為博士從巡狩岱宗定封禪禮張純傳建武三十年純奏上宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治人風成于頌有周之盛成康之間郊配封禪皆可見也書曰嵗二月東巡狩至于岱宗柴則封禪之義也臣伏見陛下受中興之命平海内之亂脩復祖宗撫存萬姓天下曠然咸蒙更生恩徳雲行惠澤雨施黎元安寧夷狄慕義詩云受天之祜四方来賀今攝提之嵗蒼龍甲寅徳在東宫宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封于岱宗明中興勒功勲復祖統報天神禪梁甫祀地祗𫝊祚子孫萬世之基也中元元年帝乃東巡岱以純視御史大夫從并上元封舊儀及刻石文文獻通考司馬彪論自上皇以来封泰山者至周七十二代易姓則改封者著一代之始明不相襲也繼世之王巡狩則有修封以祭而已自秦始皇孝武帝封泰山本因好仙信方士之言及造石檢印封之事也天道質誠約而不費故牲用犢器用陶匏殆将無事于檢封之間而樂難攻之石也夏少康周宣由廢復興不聞改封光武欲因孝武故封而梁松固爭以為必改乃當天意既封之後未有能福而松卒被誅死雖罪由身作蓋亦誣神之咎也且帝王所以能大著于後者實在其徳加于人不聞其在封矣胡氏寅曰前世論登封者莫善于許懋惜乎世祖之臣智不及此陷其君于過舉而不得聞也且世祖享國至是已三十年四垂無虞中土寧謐其心浸滿是以告功皇天明示得意而不自知其多失也不法唐虞三代而法始皇武帝一失也案讖文九世當封禪則孝武之世今乃自綴于元帝而削去成哀平三君二失也玉檢秘文人不得見是必祈求永年三失也前年拒羣臣之請謂百姓怨氣滿腹吾欺天乎豈有治天下三十年民怨未除纔後兩嵗即已歡洽此四失也勅戒郡縣有上夀稱美者必髠令屯田詔墨未乾乃自令梁松等討論故事此五失也奉髙后配地祗未㡬黜降廟主歸于寢園此六失也即位改元終身不可改而又改此七失也凡此七者人君舉動之大節而疵病如此惜乎光武勇智出倫而學問不足也光武年及耳順方建中元則意在久生不言而自見矣其視向者對宗族乞復之言夀陵迭興之詔即已大異蒯徹所謂人心無常詎不然哉蕙田案光武封禪信讖也右後漢光武帝封禪五禮通考卷四十九
