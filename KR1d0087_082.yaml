body:
  text: 五禮通考卷七十二刑部尚書秦蕙田撰吉禮七十二宗廟制度易象上傳雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考疏雷是陽氣之聲奮是震動之狀先王法此鼓動而作樂崇盛德業樂以發揚盛德故也蕙田案此作樂之原本樂之用莫重於祭祀而祭祀莫大於薦之上帝以配祖考故聖人觀象舉其祀天神者言之而祭地祗享人鬼皆統之矣雷在地中復先王以至日閉關商旅不行后不省方蕙田案二卦象乃樂律之微妙根乎天地自然之理也樂記曰凡聲陽也陽天之道也陽之動者發於聲而為雷是宇宙間凡聲之動皆雷之象也於卦為震震乾初爻也在地中為復是雷為衆聲之始而復之初又雷之兆所由萌也一陽之氣初動於五陰之下此黃鐘所以為律之本也由是而為臨為泰以至於坤仍反為復其六隂六陽之消長猶六律六吕之相次相生相合也六十四卦納六十甲子猶律吕之有六十調也調變而為八十四猶卦氣之有閏也八十四調統於七音即七日來復之義也黃鐘數九即陽爻之數也紀之以三即三畫之象參天之數也平之以六六畫卦之義兩地之法也成于十二乾坤之全也此易所以為樂之原而黃鍾為律本正應日至此亦可以見天地之心也觀承案雷在地中復見靜為動君寂為感始太音希聲正所以為萬籟之本故先王以靜體之如此書舜典帝曰夔命汝典樂詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和陳氏樂書陽六為律陰六為吕律與吕異合而言之吕亦謂之律此禮運所以有五聲十二律之説也李氏光地曰聲者宫商角徴羽也之五聲者之於樂也有調焉有音焉調則統一曲而名之以宫商角徴羽者是已音則每字而别其為宫商角徴羽者是已如唐開元樂譜鹿鳴三篇魚麗三篇為黃鐘宫調關睢三篇鵲巢三篇為無射商調此統一曲而名之者也然黃鍾之宫黃鍾也無射之商亦黃鍾也皆用黃鍾之律以起調畢曲其間雜用七律則皆黃鍾所生之商角徴羽與夫變宫變徴也此則隨其音之所宜每字而别然每字之音雖亦蒙以五聲之號大要因其字音之抑揚叶律髙下而已調之五聲則其氣象音節迥然不侔若知聲而不知調則非知五聲者禮記樂記凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之謂之樂李氏光地曰心感物而動則形於言而有聲矣所謂詩言志者也有言則自相應和而髙下疾徐之變生焉所謂歌永言者也其相應之變合節成調則謂之音所謂聲依永者也於是比合人之聲音被之樂器以為之樂所謂律和聲八音克諧也此章論音樂之本生於人心也蕙田案和聲由於依永依永由於永言永言由於言志此樂之所以由人心生也此律所以黃鐘為天統林鍾為地統太簇為人統也右律吕本原周禮春官大師掌六律六同以合陰陽之聲陽聲黃鍾太蔟姑洗蕤賓夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾注以合隂陽之聲者聲之陰陽各有合黃鍾子之氣也十一月建焉而辰在星紀大吕丑之氣也十二月建焉而辰在玄枵太蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星蕤賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕巳之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黃鍾初九也下生林鍾之初六林鍾又上生太蔟之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又下生大吕之六四大吕又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律取妻而吕生子也黃鍾長九寸其實一籥下生者三分去一上生者三分益一五下六上乃一終矣大吕長八寸二百四十三分寸之一百四太族長八寸夾鍾長七寸二千一百八十七分之十七十五姑洗長七寸九分寸之一中吕長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賓長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十九分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十聲疏六律為陽六同為隂兩兩相合經云以合隂陽之即言陽聲黃鍾大蔟姑洗等據左旋而言云隂聲大吕應鍾南吕等據右轉而説其左右相合之義案斗柄所建十二辰而左旋日體十二月與月合宿而右轉但斗之所建建在地上十二辰故言子丑之等辰者日月之會會在天上十二次故言娵訾降婁之等以十二律是候氣之管故皆以氣言之耳以黃鍾律之首與大吕合故先言之云其相生則以隂陽六體為之者向上所説順經六律左旋六同右轉以隂陽左右為相合若相生則六律六同皆左旋以律為夫以同為婦婦從夫之義故皆在旋鄭知有隂陽六體法者見律歷志云黃鍾初九律之首陽之變也因而六之以九為法得林鍾林鍾初六吕之首隂之變也皆三天兩地之法也是其隂陽六體其黃鍾在子一陽爻生為初九林鍾在未二隂爻生得為初六者以隂故退位在未故曰乾貞於十一月子坤貞於六月未也云同位者象夫妻異位者象子母者同位謂若黃鍾之初九下生林鍾之初六俱是初之第一夫婦一體是象夫婦也異位象子母謂若林鍾上生太蔟之九二二於第一為異位象母子但律所生者為夫婦吕所生者為母子十二律吕律所生者常同位吕所生者常異位故云律取妻而吕生子也故曰黃鍾為天統律長九寸林鍾為地統律長六寸太蔟為人統律長八寸林鍾位在未得為地統者以未衝丑故也志又云十二管相生皆八八上生下生盡于仲吕隂陽相生自黃鍾始而左旋八八為伍又云皆參天兩地之法也注云三三而九二三而六上生下生皆以九為法九六隂陽夫婦子母之道律取妻而吕生子天地之情也六律六吕而十二辰立矣五聲清濁而十日行矣鄭注皆取義於此也云黃鍾長九寸其實一籥者亦律歷志文案彼云子榖秬黍中者千有二百其實一籥彼又云黃鍾者律之實也云下生者三分去一上生者三分益一者子午已東為上生子午已西為下生東為陽陽主其益西為隂隂主其減故上生益下生減必以三為法者以其生故取法於天之生數三也云大吕長八寸二百四十三分寸之一百四者以黃鍾之律為本以八相生下生林鍾林鍾上生太蔟太蔟下生南吕已後皆然以此為次今鄭以黃鍾大吕太蔟等相比為次第不依相生為次第者鄭意既以上生下生得寸數長短仍依十二辰次第而言耳此之寸數所生以黃鍾長九寸下生林鍾三分減一去三寸故林鍾長六寸林鍾上生太蔟三分益一六寸益二寸故太蔟長八寸此三者以為三統故無餘分太蔟下生南吕三分減一八寸取六寸減二寸得四寸在餘二寸寸為三分合為六分去二分四分在取三分為一寸添前四寸為五寸餘一分在是南吕之管長五寸三分寸之一也南吕上生姑洗三分益一五寸取三寸益一寸為四寸又餘二寸者為十八分又以餘一分者為三分添前十八分為二十一分益七分為二十八分取二十七分為三寸添前四寸為七寸餘一分在是為姑洗之管長七寸九分寸之一姑洗下生應鍾三分去一取六寸去二寸得四寸又以餘一寸者為二十七分餘一分者為三分添二十七分為三十分減十分餘二十分在是應鍾之管長四寸二十七分寸之二十自此以下相生皆以三分為數而為減益之法其義可知故不具詳也髙氏愈曰凡天地之間有氣則有聲有聲則有節六律六同本于卦爻之六竒六耦而凖于天地十二月之氣卦之六竒即六律陽聲所自出六耦即六同隂聲所自出而十二月隂陽之氣互有虧盈則發于聲者凡長短髙下清濁之節亦皆有自然而然莫知其然之次第蓋不必聽鳳凰之鳴而始能合管為之矣典同掌六律之和以辨天地四方隂陽之聲以為樂器丘氏璿曰太師主於和聲典同主於制器蓋樂非聲不成而所以寓其聲者器也故典同之制器為要器正而聲無不正矣劉氏彛曰律同之和謂其長短厚薄所容中度得隂陽之和氣故律同中度則中氣之至而灰飛氣至則聲和所以日月會于十二次而不差則天之隂陽順于上隂陽合于十二辰而不謬則地之隂陽順于下故黃鍾之長用之以起五度則樂器修廣之所資黃鍾之容用之以起五量則樂器深閎之所賴黃鍾之重用之以起五權則樂器輕重之所出黃鍾之積用之以起五數則樂器多少之所差黃鍾之氣用之以起五聲則樂器宫商之所祖是以為樂器者必以律同為之本故曰凡樂器以十二律為之度數以十二聲為之齊量髙氏愈曰陽聲屬天隂聲屬地東方少陽陽聲之次南方太陽陽聲之盛西方少隂隂聲之次北方太隂隂聲之盛也凡聲不過乎隂陽而隂陽復有四方之異猶兩儀之分而為四象也六律六同天地四方隂陽之聲皆出焉典同辨之取其中聲以為樂器則無不盡者矣禮記月令孟春之月律中太蔟注孟春氣至則太蔟之律應應謂吹灰也凡律空圍九分仲春之月律中夾鍾注仲春氣至則夾鍾之律應季春之月律中姑洗注季春氣至則姑洗之律應孟夏之月律中仲吕注孟夏氣至則仲吕之律應仲夏之月律中蕤賓注仲夏氣至則蕤賓之律應季夏之月律中林鍾注季夏氣至則林鍾之律應中央土律中黃鍾之宫注黃鍾之宫最長也十二律轉相生五聲具終於六十焉季夏之氣至則黃鍾之宫應禮運曰五聲六律十二管還相為宫也疏鄭不云黃鍾律最長而云黃鍾之宫最長者唯黃鍾宫聲于諸宫為最長也黃鍾候氣之管本位在子此是黃鍾宫聲與中央土聲相應方氏慤曰十二律各有五聲凡六十律以宫為本以角為末起于黃鍾而終于仲吕起于黃鍾之宫而終于仲吕之角故十二律之外又有黃鍾之宫焉大宫固土之本音也然必中于黃鍾者以為建子之律故也蓋子者陽之所生土者物之所成土以成為終成以生為始由其終始之相須故其所中如此且以名取義黃言隂之美則土之色也鍾言氣之聚則土之事也孟秋之月律中夷則注孟秋氣至則夷則之律應仲秋之月律中南吕注仲秋氣至則南吕之律應季秋之月律中無射注季秋氣至則無射之律應孟冬之月律中應鍾注孟冬氣至則應鍾之律應仲冬之月律中黃鍾注黃鍾者律之始也仲冬氣至則黃鍾之律應季冬之月律中大吕注季冬氣至則大吕之律應李氏光地曰太簇至大吕者十二律配十二月也中者合也應也以理言之則相合以氣言之則相應也然氣之相應必案時候管逐月用調又非也聲音之道與天地隂陽自然流通者如此耳國語周語夫六中之色也故名之曰黃鍾注六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六為中故六律六吕而成天道黃鍾初九六律之首故以六律正色為黃鍾之名重元正始之義也黃鍾陽之變也管長九寸徑三分圍九分律長九寸因而九之九九八十一故黃鍾之數立焉為宫法云九寸之一得林鍾初六六吕之首隂之變管長六寸六月之律坤之始也故九六隂陽夫婦子母之道是以初九為黃鍾黃中之色也鍾之言陽氣鍾聚于下也朱子曰六字之義注雖粗通然似亦太牽合矣下章漢志正作黃字而其他説亦多出此疑此六字本是黃字劉歆時尚未誤至韋昭作注時乃滅其上之半而為六耳又法云九寸之一亦疑有誤當是去其三分之一所以宣養六氣九德也注十一月伏陽於下物始萌於五聲為宫含元處中所以偏養六氣九德之本也由是第之注由從也第次也次其月也二曰太簇注正月太簇乾九二也管長八寸法云九分之八太簇言陽氣大簇逹于上所以金奏贊陽出滯也注太簇正聲為商故為金奏所以佐陽發出滯伏也三曰姑洗所以修潔百物考神納賓也注三月姑洗乾九三也管長七寸一分律長七寸九分寸之一姑潔也洗濯也考合也言陽氣養生洗濯枯穢改柯易葉也于正聲為角是月百物修潔故用之宗廟合致神人用之享宴可以納賓也四曰蕤賓所以安靖神人獻酬交酢也注五月蕤賓乾九四也管長六寸三分律長六寸八十一分寸之二十六蕤委蕤柔貌也言隂氣為主委蕤于下陽氣盛長于上有似于賓主故可用之宗廟賓客以安靖神人行酬酢也五曰夷則所以詠歌九則平民無二也注七月夷則乾九五也管長五寸六分律長五寸七百二十九分寸之四百五十一夷平也則法也言萬物既成可法則也故可以詠歌九功之則成民之志使無疑二也六曰無射所以宣布哲人之令德示民軌儀也注九月無射乾上九也管長四寸九分律長四寸六千五百六十一分寸之六千五百二十四九月陽氣上升隂氣收藏萬物無射見者故可以遍布前哲之令德示民道法也為之六間以揚沈伏而黜散越也注六間六吕在陽律之間吕隂律所以侣間陽律成其功發揚滯伏之氣而去散越者也元間大吕助宣物也注十二月大吕坤六四也管長八寸八分法云三分之二四寸二百四十三分寸之五十二倍之為八寸分寸之一百四下生律元一也隂繫于陽以黃鍾為主故曰元間以陽為首不名其初臣歸功于上之義也大吕助陽宣散物也天氣始於黃鍾萌而赤地受之於大吕牙而白成黃鍾之功也二間夾鍾出四隙之細也注二月夾鍾坤六五也管長七寸四分律長三寸二千一百八十七分寸之一千六百三十二倍之為七寸分寸之一千七十五隙間也夾鍾助陽鍾聚曲細也四隙四時之間氣微細者春為陽中萬物始生四時之氣皆始於春春發而出之三時奉而成之故夾鍾出四時之微氣也三間中吕宣中氣也注四月中吕坤上六也管長六寸六分律長三寸萬九千六百八十三分寸之六千四百八十七倍之為六寸分寸之萬二千九百七十四陽氣起于中至四月宣散于外純乾用事隂閉藏于內所以助陽成功也故曰正月正陽之月也四間林鍾和展百事俾莫不任肅純恪也注六月林鍾坤初六也管長六寸律長六寸林衆盛也鍾聚也于正聲為徴展審也俾使也肅速也純大也恪敬也言時務和審百事無有偽詐使莫不任其職事速其功大敬其職事也五間南吕贊陽秀也注八月南吕坤六二也管長五寸三分律長五寸三分寸之一不榮而實曰秀南任也隂任陽事助成萬物贊佐也六間應鍾均利器用俾應復也注十月應鍾坤六三也管長四寸七分律長四寸二十七分寸之二十言隂應陽用事萬物鍾聚百嘉具備時務均利百官器用程度庶品使皆應其禮復其常也律吕不易無姦物也蕙田案國語此篇言律最詳首言黃鍾律吕之本也次言由是第之黃鍾生十一律也又曰以吕為間上生下生之義也漢書律厯志律十有二陽六為律隂六為吕律以統氣類物吕以旅陽宣氣黃鍾黃者中之色君之服也鍾者種也天之中數五韋昭曰一三在上七九在下五為聲聲上宫五聲莫大焉地之中數六韋昭曰二四在上八十在下六為律律有形有色色上黃五色莫盛焉故陽氣施種於黃泉孳萌萬物師古曰孳讀與滋同滋益也萌始生為六氣元也以黃色名元氣律者著宫聲也宫以九唱六孟康曰黃鍾陽九林鍾隂六言陽唱隂和變動不居周流六虛始於子在十一月大吕吕旅也言隂大旅助黃鍾宣氣而牙物也位於丑在十二月太蔟蔟奏也言陽氣大奏地而達物也師古曰奏進也位於寅在正月夾鍾言隂夾助太簇宣四方之氣而出種物也位於卯在二月姑洗洗潔也言陽氣洗物辜潔之也孟康曰辜必也必使之潔也位於辰在三月中吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於已在四月蕤賓蕤繼也賓導也言陽始導隂氣使繼養物也位於午在五月林鍾林君也言陰氣受任助蕤賓君主種物使長大楙盛也師古曰種物種生之物楙古茂字也種音之勇反位於未在六月夷則則法也言陽氣主法度而使隂氣夷當傷之物也師古曰夷亦傷位於申在七月南吕南任也言隂氣旅助夷則任成萬物也位於酉在八月亡射射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也位於戌在九月應鍾言隂氣應亡射該臧萬物而雜陽閡種也孟康曰閡臧塞也隂雜陽氣臧塞為萬物作種也晉灼曰外閉曰閡師古曰閡音胡待反下言該閡于亥音訓並同也位於亥在十月陳氏祥道曰律起於黃鍾終於中吕其長短有度其多寡有數其輕重有權而萬法之原畢會於是黃鍾者建子之律也黃之為色則隂之盛鍾之為器則隂之聚隂盛而極則陽生之矣隂盛而止則陽散之矣由隂終於亥而陽乃始於子也故曰黃鍾太蔟者建寅之律也入乎坎者必出乎震否乎否者必泰乎泰寅之氣方接乎震泰而泰出滯焉故曰太蔟姑洗者建辰之律也物至辰則潔齊其潔齊也非實體也且然而已故謂之姑洗蕤賓者建午之律也陽午則向衰也草木蕤矣隂用事而陽為賓焉故謂之蕤賓夷則者建申之律也人至申而夷物至申而有成則故謂之夷則無射者建戌之律也隂至戌而盛陽至戌而不厭故謂之無射此陽之律也陽道體變以始物故每律異名隂道體常以效法故止於三鍾三吕而已大吕者建丑之律也是謂隂律之始則隂之所以配陽而行者於是為大故曰大吕夾鍾者建卯之律也陽生於子終於午則卯為陽之中矣以其位於中而止焉故曰夾鍾中吕者建已之律也四時之序猶伯仲焉春為伯夏為仲方是時夏之氣始行焉故曰中吕林鍾者建未之律也萬物之繁茂止於此矣故曰林鍾南吕者建酉之律也酉正西也氣至南而化行於西而成西所以成南而行爾故曰南吕應鍾者建亥之律也始事者陽效法者隂陽始而唱之隂盛而應之隂陽之道如是而止矣故曰應鍾周官大師掌六律六同以合隂陽之聲陽聲始之以黃鍾則順而序之以生之序進之也隂聲始之以大吕則逆而序之以成之序退之也夾鍾亦謂之圜鍾者以春主規言之也林鍾亦謂之函鍾者以坤含𢎞言之也中吕亦謂之小吕者對大吕為小故也南吕亦謂之南事者以成南為事故也别而言之則律言其用吕言其體故陽六為律隂六為吕合而言之皆所以述氣而已故通謂之十二律焉李氏光地曰十二律之數以管而得十二律之名以鍾而定蓋鑄鍾以寫律之聲而為八音之綱紀故即其器以名律也然惟四律以鍾名者案周禮祀天則分祭合祭皆長黃鍾祭地則分祭長應鍾祭地主隂律也合祭長林鍾享廟則長夾鍾是四律者最尊故特列之也黃者以中色喻中聲也林者萬物至未而茂盛如林也夾者在中間之謂時惟中春四仲之首也應者窮上反下聲與氣無不終始相應也稱吕者三吕者侣也助也大吕助陽生物者也仲吕助陽長物者也南吕助陽成物者也鍾懸之列自北而南三吕之中位獨在南故曰南吕也不稱鍾吕者五太簇者蔟奏也古人金奏所用蓋於時則雷出地奮威德並行於律則木行商聲仁義並用故大奏尚之也姑洗者萬物始生孤稚而洗潔也蕤賓者正陽之時萬物相見如賓主酬酢禮容葳蕤也夷則者生物既盛平之以法也無射者陽律之終終則厭怠故欲其無射也然惟黃鍾為宫則陽氣在內屬信居中德之盛者故太簇則餘陰尚固陽氣奮擊而出屬商屬義姑洗則生理畢達屬角屬仁林鍾則萬物嘉美屬徴屬禮南吕則萬物成就分别屬羽屬智應鍾陽窮復生與黃鍾同德為變宫蕤賓隂生致役於陽與林鍾同德為變徴莫不各有其象數焉此黃鍾一律之尊也蕙田案律吕名義黃鍾一律漢志得之其餘則意義淺近朱子生鍾律篇謂其支離附合信不免也陳氏之説頗合隂陽消息之道似為近之然其於太簇以泰釋太以出滯釋簇字尚未切也于姑洗曰且然而已于夷則曰物至申而有成則敷衍字義亦無深意而無射則仍班氏之説今為繹之太簇太大也簇輳也猶輻輳之輳大即泰卦小往大來之大言三陽盛大而來輳也姑洗辰位也辰位巽為潔齊故曰洗姑者故也言至此而萬物皆洗其故也陽之極盛也夷則夷傷也春主發生秋主肅殺肅殺之事必循法則易所謂利物足以和義也無射射斁也散也陽氣至剝將盡而云無斁程子所謂陽無可盡之理猶十月謂之陽月也李氏釋南吕得之右律吕名義書舜典同律度量衡疏律者候氣之管而度量衡三者法制皆出于律漢書律歷志云度量衡出于黃鍾之律也李氏光地曰律者自然之聲自然之氣其髙下清濁皆有天機其長短大小皆有天則故可以律萬事而為之本也自然之道既合乎天故其立法以天為凖一管之長九寸而三分之以上下生是皆天之數也天包乎地一而涵三三三之衍不可勝窮此天之數而律凖之故日月星辰皆紀于天度量權衡皆紀于律日有度之義晷刻永短與時進退是也律之外分屬陽而度生焉故其法以十為率十幹之節也終於九十而一氣備矣月有量之義受日為光有滿有虧是也律之內積屬隂而量生焉故其法一分之冪十三黍有竒月每日退天之分也終于千二百黍而一籥成矣斗有權衡之義隨時低昻斟酌餘分是也長短多寡一以輕重為斷而權生焉故其法合籥為二十四銖成兩十六兩成斤三十斤成鈞四鈞成石三十二日而閏一日三十二月而閏一月四閏而交食一終之數也記大人作則必以天地為本以日星為紀月以為量四時以為柄本者律為萬事根本也紀者度也量者量也柄者權衡也故協時月正日與同律度量衡其道相為經緯也蕙田案律曰同則當時律管已有長短樂聲有髙下清濁之異矣故後世考律必以黃鍾真度為根本者其義已見於此周禮春官典同凡為樂器以六律為之度數以十有二聲為之齊量注度數廣長也云疏以十有二律為之度數者依律歷志古之神瞽度律均鍾以律計倍半以為鍾口之徑及上下之數自外十二辰頭皆以管長短計之可知故云度數廣長也廣則口徑長則上下也鄭氏鍔曰為樂器者用十二律以為度數則長短多寡由此而生用十二聲以為齊量則小大輕重由此而凖王氏某曰數本起于黃鍾始於一而三之歷十二辰而五數備其長則度之所起其餘律皆自是而生故凡為樂器以十二律為之度數方氏苞曰齊與食醫所和之齊同義謂其分之所際也蓋以十有二律之數為衆器之度以十有二聲之齊為衆器之量度必以律之數者記所謂百度得數而有常也蔡氏德晉曰度數謂長短廣狹凖于管之尺寸也齊量謂清濁髙下凖于管之聲音也和樂謂調其衆器之聲使之諧和也凡一十百千萬等謂之數尺寸分釐毫絲忽微纎等謂之度於本律之聲均齊謂之齊于上下律之聲分差等謂之量故典同者主以律吕和同樂器之音聲者也蕙田案經云凡為樂器言凡則八音之器皆統之諸儒之説是也注疏改同為銅遂専以均鍾度數釋之則謬矣此典同所言乃後世造律制樂之綱領也國語周語伶州鳩曰律所以立均出度也注律謂六律六吕也均者均鍾木長七尺有絃繫之以均鍾者度謂鍾之大小清濁也漢大豫樂官有之古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三注三者天地人古者紀聲合樂以舞天神地祗人鬼故能神人以和朱子曰此疑謂三分損益之法平之以六注平之以六律也上章曰律以平聲成於十二天之道也李氏光地曰律者法也萬事取法焉均者平也衆聲取平焉自黃鍾以至應鍾皆中聲也神瞽得中聲于心而量度之于制度之間故寄其聲於律又寫其聲于鍾而凡百官之職如所謂度量權衡者皆于是法則焉此律所由興也度律均鍾即所謂立均也百官軌議即所謂出度也紀之以三者置一而三之窮于十七萬七千一百四十七也六者六律也十二者律與吕也以三紀之以十二成之皆神瞽所為量之以制而生者也愚案此條論律最精蓋必考中聲而後量之以制不可泥于制而求中聲也後有作者折衷於此可矣蕙田案律吕之數見於此乃諸數之權輿也太極元氣函三為一參天倚數徑一圍三故紀之以三者即黃鍾之數所以行其變也太極生兩儀兩儀生四象坤卦用六兩地之數故平之以六者即黃鍾之數所以成其化也天有十二次地有十二辰嵗有十二月故成於十二者律吕之全數也明乎三之紀而天地人三統上生下生三分損益之法皆舉之矣明乎六之平而陽有六律隂有六吕歌奏六均以及倍其實四其實之法皆舉之矣明乎成於十二而十二月之律應十二辟卦氣及宫均十二皆舉之矣至於調成而為六十即五其十二也加二變為八十四即七其十二也六十調者五聲之正八十四聲者七音之變合五與七則亦十二也律吕之所以大成也此三言者後世算數均律之軌範也漢書律志黃帝使泠綸自大夏之西昆侖之隂取竹於解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本師古曰黃鍾之宫律之最長者比合也可以生之謂上下相生也故謂之律本律吕正義黃鍾理數篇司馬遷律書曰神生於無形成於有形然後數形而成聲神者天地之元氣發為元聲者也無形者理也有形者數也此言非理則數無由生也又曰核其華道者明矣華者數也道者理也言必核其數之真理始可得而見也夫有黃鍾之聲必有黃鍾之數有黃鍾之數必有黃鍾之理若無以明其理即無以精其數無以精其數即無以得其聲蓋理者數之體數者理之用惟理與數相生故人聲與樂器相協而大樂以成焉案律吕新書黃鍾九寸空圍九分積八百一十分注曰天地之數始於一終於十其一三五七九為陽九者陽之成也其二四六八十為隂十者隂之成也黃鍾陽聲之始陽氣之動也故其數九分寸之數具於聲氣之元不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分長九寸圍九分積八百一十分是為律本度量權衡於是而受法十一律由是而損益焉朱子以謂本原第一章圍徑之數是最大節目蓋上古聖人心通造化默會中聲製為黃鍾適符天地自然之數漢晉而後凡究心於律吕者因未詳考黃鍾之真度是以中聲無由而得今欲定黃鍾之管必先定黃鍾之度既得黃鍾之度乃考其周徑面冪積實之相生而較以容黍之多寡然後製以器審以音一一吻合則理之出於自然者無不歸於大同矣蕙田案此言黃鍾為律吕之本也淮南子曰規始於一一不生故分而為隂陽隂陽合和而萬物生故曰一生二二生三三生萬物三參物三三如九故黃鍾之律九寸而宫音調因而九之九九八十一故黃鍾之數立焉律之數六分為雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之為積分十七萬七千一百四十七黃鍾大數立焉李氏光地曰律者紀陽者也故以黃鍾之長為九寸又因之八十一為黃鍾之數又積之十七萬七十一百四十七為黃鍾之大數其數皆以三因之而得蓋八十一者所以為五聲相生之法也十七萬七千一百四十七者所以為十二律相生之法也聲窮於角其數六十四律窮於仲吕其數一十三萬一千七十二皆三分損益之所不行故聲律於是乎窮所以然者自一而至八十一五位此相生所以窮於五自一而至十七萬七千一百四十七十二位此相生所以窮於十二也史記律書置一而九三之以為法注索隱曰漢書律歷志曰太極元氣函三為一行之於十二辰始動於子參之於丑得三又參之於寅得九是謂置一而九三之也韋昭曰置一而九以三乘之是也實如法得長衍一寸衍注索隱曰實謂以子一乘丑三至亥得十七萬七千一百四十七為實數如法謂以一萬九千六百八十三之法除實得九為黃鍾之長言得一者算術設法辭也得下有長一下有寸者皆衍字也韋昭曰得九寸之一也姚氏謂得一即黃鍾之子數凡得九寸命曰黃鍾之宫蕙田案黃鍾之法莫詳於史記生鍾術生鍾分二章而此條言黃鍾得數之始實為律吕算數之本算數之本者置一而九三之也置一謂一分非一寸也實如法得一亦得一分非一寸也凡得九寸寸者假借尺度之名非分寸之寸也索隱謂得一者算術設法辭長字寸字皆衍字古法相傳必有所本此語實得黃鍾算數之妙義能會此義自知黃鍾之得一者為一分九寸為九分乃造律度十分之九而非尺度分寸之九則後世之言九寸言十寸者總無所用其紛糾而黃鍾之真度可得矣我朝御製律吕正義論黃鍾律曰黃鍾之長九寸非夏尺之九寸商尺之九寸亦非歷代諸尺之九寸乃本造律度十分之九也以八寸一分立法古聖人定黃鍾蓋合九九天數之全以立度闡發精詳所謂心通造化默會神明正與此注吻合可謂先後聖之同揆矣又案得一萬九千六百八十三為九寸非積十分為寸之寸也又何必泥以九分為寸也更何可加一寸為一尺也是置一而九三之之寸法也漢書律厯志太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戍得五萬九千口四十九又參之於亥得十七萬七千一百四十七此隂陽合德氣鍾於子化生萬物者也律吕新書黃鍾寸分數法子一黃鍾之律丑三為絲法寅九為寸數卯二十七為毫法辰八十一為分數已二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戍五萬九千四十九為絲數亥一十七萬七千一百四十七黃鍾之實蔡氏元定曰案黃鍾九寸以三分為損益故以三歷十二辰得一十七萬七千一百四十七為黃鍾之實其十二辰所得之數在子寅辰午申戌六陽辰為黃鍾寸分釐毫絲之數在亥酉未巳卯丑六隂辰為黃鍾寸分釐毫絲之法其寸分釐毫絲之法用皆九數故九絲為毫九毫為釐九釐為分九分為寸九寸為黃鍾蓋黃鍾之實一十七萬七千一百四十七之數以三約之為絲者五萬九千四十九以二十七約之為毫者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉或曰徑圍之分以十為法而相生之分釐毫絲以九為法何也曰以十為法者天地之全數也以九為法者因三分損益而立也全數者即十而取九相生者約十而為九即十而取九者體之所以立約十而為九者用之所以行體者所以定中聲用者所以生十一律也又曰淮南子謂置一而十一三之以為黃鍾之大數即此置一而九三之以為寸法者其術一也夫置一而九三之既為寸法則七三之為分法五三之為釐法三三之為毫法一三之為絲法從可知矣律書獨舉寸法者蓋已於生鍾分內默具律寸分釐毫絲之法而又於此律數之下指其大者以明凡例也一三之而得三三三之而得二十七五三之而得二百四十三七三之而得二千一百八十七九三之而得一萬九千六百八十三故一萬九千六百八十三以九分之則為二千一百八十七又以九分之則為二百四十三又以九分之則為二十七又以九分之則為三三者絲法也九其三得二十七則毫法也九其二十七得二百四十三則釐法也九其二百四十三得二千一百八十七則分法也九其二千一百八十七得一萬九千六百八十三則寸法也一寸九分一分九釐一釐九毫一毫九絲以之生十一律以之生五聲二變上下乘除參同契合無所不通蓋數之自然也顧自淮南太史公之後即無識其意者如京房之六十律雖亦同此十七萬七千一百四十七之數然乃謂不盈寸者十之所得為分又不盈分者十之所得為小分其餘為強弱不知黃鍾九寸以三損益數不出九苟不盈分者十之則其竒零無時而能盡雖泛以強弱該之而卒無以見強弱之為幾何則其數之精微固有不可得而紀者矣至於杜佑胡瑗范蜀公等則又不復知有此數而以意強為之法故通典則自南吕而下各自為法固不可以見分釐毫絲之實胡范則止用八百一十分乃是以積實生量之數為律之長而其因乘之法亦用十數故其餘算亦皆棄而不録蓋非有意於棄之實其重分纍析至於無數之可紀故有所不得而録耳夫自絲而下雖非目力之所能分然既有其數而或一算之差則法於此而遂變不以約十為九之法分之則有終不可得而齊者故淮南太史公之書其論此也已詳特房等有不察耳朱子曰十二律分寸釐毫絲之數鄭氏與太史公説不同太史二説又自為異鄭氏之言分寸審度之正法也太史之言欲其便於損益而為假設之權制也蓋律管之長以九為本上下相生以三為法而鄭氏所用正法破一寸以為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數則其數中損益之際皆有餘分雖有巧歷終不能盡是以自分而下遂不可析而直以九相乘歷十二管至破一寸以為一萬九千餘分而後略可得而記焉然亦苦於難記而易差終不若太史公之法為得其要而易考也蓋其以子為一而十一三之以至於亥則得十七萬七千一百四十七算而子為全律之數亥為全律之實可知矣以寅為子之寸數而酉為寸法則其律有九寸可知矣以辰為子之分數而未為分法則其寸有九分可知矣以午為子之釐數而已為釐法則其分有九釐可知矣以申為子之毫數而卯為毫法則其釐有九毫可知矣以戌為絲數而丑為絲法則毫有九絲可知矣下而為忽亦因絲而九之雖出權宜而不害其得乎自然之數以之損益則三分之數整齊簡直易記而不差也其曰黃鍾八寸十分一者亦放此意但以正法之數合其權法之分故不同耳其實則不異也蕙田案蔡氏以九起算非止得太史公之法實黃鍾律度為萬事根本之妙藴也黃鍾以九為本以三為用神明自然乃造化之奧機其所謂九寸者不過假尺度之名以紀損益乘除之數而與尺度之積十為分積分為寸之寸截然不同朱子謂為假設之權制可謂得其意而與史記注合但止稱其數整齊簡直過於鄭法之難記而易差不知黃鍾自然之數妙合天成是以生律生聲極其所至而無不通若鄭以分寸審度之法拘泥推測不但與律度之本旨霄壤懸殊即其算數已難記而不可行矣嗚呼黃鍾之藴朱子且未能盡窺何怪算數家紛爭執礙揣摩擬議而成萬世不決之疑也非大聖人孰能心悟神會而與於此哉右黃鍾之實史記律書生鍾分子一分丑三分二寅九分八卯二十七分十六辰八十一分六十四巳二百四十三分一百二十八午七百二十九分五百一十二未二千一百八十七分一千二十四申六千五百六十一分四千九十六酉一萬九千六百八十三分八千一百九十二戌五萬九千四十九分三萬二千七百六十八亥一十七萬七千一百四十七分六萬五千五百三十六律吕新書此即三分損益上下相生之數其分字以上者皆黃鍾之全數其分字以下者諸律所取於黃鍾長短之數也其上下相生之序則晉志所謂在六律為陽則當位自得而下生於隂六吕為隂則得其所衝而上生於陽者是也大吕夾鍾仲吕止得半聲必用倍數乃與天地之氣相應其寸分釐毫絲皆積九以為法史記生鍾術曰以下生者倍其實三其法索隱曰以下生者謂黃鍾下生林鍾黃鍾長九寸倍其實者二九十八三其法者以三為法約之得六為林鍾之長也以上生者四其實三其法索隱曰四其實者謂林鍾上生太簇林鍾長六寸以四乘六得二十四以三約之得八即為太簇之長也律吕新書黃鍾生十一律數子一分一為九寸丑三分二一為三寸寅九分八一為一寸卯二十七分十六三為一寸一為三分辰八十一分六十四九為一寸一為一分巳二百四十三分一百二十八二十七為一寸三三為一分一為釐午七百二十九分五百一十二八十一為一寸一九為一分一為釐未二千一百八十七分一千二十四二百四十三為一寸一二十七為一分三為一釐為三毫申六千五百六十一分四千九十六七百二十九為一寸八十一為一分九為一釐一為一毫酉一萬九千六百八十三分八千一百九十二二千一百八十七為一寸為二百四十三為一分二十七為一釐三一毫一為三絲戌五萬九千四十九分三萬二千七百六十八六千五百六十一為一寸九七百二十九為一分八十一為一釐為一毫一為一絲亥一十七萬七千一百四十七分六萬五千五百三十六一萬九千六百八十三為一寸二百四十三為一釐二千一百八十七為一分絲二十七為一毫三為一三一為忽蔡氏元定曰黃鍾生十一律子寅辰午申戌六陽辰皆下生丑卯巳未酉亥六隂辰皆上生其上以三歷十二辰者皆黃鍾之全數其下隂數以倍者即算法倍其實三分本律而損其一也陽數以四者即算法四其實三分本律而增其一也六陽辰當位自得六隂辰則居其衝其林鍾南吕應鍾三吕在隂無所增損其大吕夾鍾仲吕三吕在陽則用倍數方與十二月之氣相應蓋隂之從陽自然之理也十二律之實子黃鍾十七萬七千一百四十七全九寸半無丑林鍾十一萬八千九十八全六寸半三寸不用寅太簇十五萬七千四百六十四全八寸半四寸卯南吕十萬四千九百七十六全五寸三分半二寸六分不用辰姑洗十三萬九千九百六十八全七寸一分半三寸五分巳應鍾九萬三千三百一十二全四寸六分六釐半二寸三分三釐不用午蕤賓十二萬四千四百一十六全六寸二分八釐半三寸一分四釐未大吕十六萬五千八百八十八全八寸三分六釐六毫半一寸一分八釐三毫申夷則十一萬五百九十二全五寸五分五釐一毫半二寸七分二釐五毫酉夾鍾十四萬七千四百五十六全七寸四分三釐七毫三絲半三寸六分六釐三毫六絲戍無射九萬八千三百四全四寸八分八釐四毫八絲半二寸四分四釐三毫四絲亥仲吕十三萬一千七十二全六寸五分三毫四絲六忽餘二算半三寸二分八釐六毫二絲二忽蔡氏元定曰十二律之實約以寸法則黃鍾林鍾太蔟得全寸約以分法則南吕姑洗得全分約以釐法則應鍾蕤賓得全釐約以毫法則大吕夷則得全毫約以絲法則夾鍾無射得全絲至仲吕之實十三萬一千七十二以三分之不盡二算其數不行此律之所以止於十二也蕙田案生鍾分十二辰分字以上黃鍾幾分之數也分字以下諸律於黃鍾之數取其幾分也二與八與十六與六十四諸數陽生陰者倍其實陰生陽者四其實也子黃鍾也一分者九寸也丑林鍾也分黃鍾九寸為三分每分三寸取二分得六寸也寅太簇也分黃鍾九寸為九分每分一寸取八分得八寸也卯南吕也分黃鍾九寸為二十七分每三分為一寸取十六分得五寸三分三釐三毫三絲三忽也辰姑洗也分黃鍾九寸為八十一分每九分為一寸取六十四分得七寸一分一毫一絲一忽也巳應鍾也分黃鍾九寸為二百四十三分每二十七分為一寸取一百二十八分得四寸七分四釐零四絲七忽也午蕤賓也分黃鍾九寸為七百二十九分每八十一分為一寸取五百一十二分得六寸三分二釐九絲八忽也未大吕也分黃鍾九寸為二千一百八十七分每二百四十五分為一寸取一千二十四分得四寸二分一釐三毫為半大吕倍之得八寸四分二釐七毫也申夷則也分黃鍾九寸為六千五百六十一分每七百二十九分為一寸取四千九十六分得五寸六分一釐八毫六絲五忽也酉夾鍾也分黃鍾九寸為一萬九千六百八十三分每二千一百八十七分為一寸取八千一百九十二分得三寸七分四釐五毫七絲為半夾鍾倍之得七寸四分九釐一毫五絲也戍無射也分黃鍾九寸為五萬九千四十九分每六千五百六十一為一寸取三萬二千七百六十八分得四寸九分九釐四毫也亥仲吕也分黃鍾九寸為十七萬七千一百四十七分每一萬九千六百八十三分為一寸取六萬五千五百三十六分得三寸三分二釐九毫為半仲吕倍之得六寸六分五釐九毫也考津緒言吳氏鼎曰生鍾分之分即算家分母分子之分法為分母十二分字以上皆分母也即三其法之法也實為分子分字以下皆分子也即倍其實四其實之實也總括之不過三分損益四字試置黃鍾為實三分而損其一為林鍾置林鍾為實三分而益其一為太蔟置太蔟為實三分而損其一為南吕置南吕為實三分而益其一為姑洗此其為數與夫置黃鍾為實三分而取其二為林鍾置黃鍾為實九分而取其八為太蔟置黃鍾為實二十七分而取其十六為南吕置黃鍾為實八十一分而取其六十四為姑洗未始有異也由前之法十二律遞為其母而不以黃鍾為共母由後之法未嘗不遞為其母而實以黃鍾為共母自有生鍾之數而十二律之長短自見原不必立寸分釐毫之名以相泥至若究其所用之實則生鍾分乃言律之祖定律之根施之樂器悉範圍而不過豈無所用而空有其説哉吳氏鼐曰史記生鍾術以下生者倍其實三其法以上生者四其實三其法案陽數起于一隂數起于二一一者倍其實之根二二者四其實之根置一而十一三之三其法之根也黃一則林二太八則南十六姑六十四則應一百二十八蕤五百十二則大一千二十四夷四千九十六則夾八千一百九十二無三萬二千七百六十八則仲六萬五千五百三十六也此下生者倍其實也林二則太八南十六則姑六十四應一百二十八則蕤五百十二大一千二十四則夷四千九十六夾八千一百九十二則無三萬二千七百六十八也此上生者四其實也生鍾分自子一至十七萬零皆黃鍾之實也乃十一律生于黃鍾而以黃鍾為母也若以隂陽各六分之則一者六律之母也二者六吕之母也又五律以黃鍾為母五律以林鍾為母也若以律取妻而吕生子遞而衍之則遞為母也故置一而十一三之者黃鍾也置二而十三之者林鍾也置八而九三之者太蔟也置十六而八三之者南吕也置六十四而七三之者姑洗也置一百二十八而六三之者應鍾也置五百十二而五三之者蕤賓也置一千二十四而四三之者大吕也置四千九十六而三三之者夷則也置八千一百九十二而兩三之者夾鍾也置三萬二千七百六十八而一三之者無射也至亥則極靜不容再分矣故仲吕六萬五千五百三十六則黃鍾三分損益之極數也凡此皆參天之數也倍其實四其實兩地之數也夫是之謂參天兩地而倚數李氏光地曰天地之間理也氣也聲也形也數也顯微無間者也蓋氣者理之用形聲者氣之化而數者形聲之紀也樂律之道其數相生故其氣相生其氣相生故其聲亦相生而無不應也其必紀以九者何數之所以衍而不窮氣之所以運而不息也其必成以六者何數之衍所以節而氣之運所以裁也易卦尊陽而用九樂律亦尊陽而用九故窮則變變則通者用九之妙也易卦居陰而用六樂律亦居隂而用六故先後有序剛柔有偶者用六之功也黃鍾之律長九寸冪九分積其長八十一分積其冪八百一十分莫非九九之用故其道循環而與元氣終始成於六律究於十二管衍於六十調行於三百六十聲莫非六六之用故其道有常而與天地相似然則數有阻格則於氣有滯礙數有差繆則於氣有乖逆者亦自然之理矣蕙田案黃鍾為律吕之本何也律者法也黃鍾法之本也法者何隂陽之理也陽變而聲音之道出焉是為律隂合而聲音之用備焉是為吕陽包乎隂吕亦律也故曰六律黃鍾者六律之始聲音之法也黃鍾何以為聲音之法黃鍾九寸九九八十一分是其法也九寸何以為法寸者假度之名九其法也九何以為法九乾老陽之䇿參天之數也參天者徑一而圍三數起於一行於三一三而三三三而九九則復為一至於九則數備矣九者三三之數也故黃鍾之數用九也其用九何也用九者用三也用三者仍用九也以三用九故黃鍾之實子一丑三寅九卯二十七辰八十一巳二百四十三午七百二十九未二千一百八十四申六千五百八十一酉一萬九千六百八十三戍五萬五千四十九亥十七萬七千一百四十七其遞加之數皆三也其全數皆九也其必以三遞加而自子至亥者何也自子至亥而寸分釐毫絲之數與法備也其必備寸分釐毫絲之法與數者何也所以生十一律而正五音也十一律何以生隂陽之理自然而生也隂陽何以生隂陽互根也隂陽互根陽饒而隂乏故陽三分而損一以生隂則為吕吕三分而益一以生陽復為律或上或下不得不生也不得不生者黃鍾以三用九之數必至於十二也必至於十二者天之辰十二次嵗之紀十二月地之方十二位隂陽自然之數也然則何以止於十二也其數不行也數何以不行亥仲吕也仲吕之實十三萬一千七十二以三分之不盡二算故不行也此黃鍾所以止生十一律而成十二也猶卦之自八而六十四大衍之數萬有一千五百二十而其用四十有九也其正五音何也黃鍾之數九九八十一以為宫三分去一而生徵五十四徵三分益一而生商七十二商三分去一而生羽四十八羽三分益一而生角六十四則五音備也五音何以備也其旋相為宫自十二均至六十調加二變為七音八十四聲其相生之數皆黃鍾之數也何以為黃鍾之數也皆九也皆三分損益也三分損益何也倍其實四其實也倍其實四其實者一生二二生四兩地之數也黃鍾數九何以有兩地之數也陽得兼隂隂不得兼陽故黃鍾之數止用九也用九而天下之數備奚止律吕也然則以黃鍾為十寸何也曰非也黃鍾九寸者法也非度也十寸者度也非法也度生於法法不生於度也以黃鍾為九寸寸十分者何也曰亦非也十分者度之分也非法之分也以黃鍾為九寸寸九分者何也曰似矣而實非也分者法之分乃假借寸分釐毫絲之名以紀黃鍾損益乘除之數而行其九九之法實非尋丈尺寸之度也故或以為是九而非十或以為是十而非九或以為可以九可以十者皆泥於尺度不知律為法者也不知黃鍾為法之本者也不知黃鍾為律呂之本者也右黃鍾生十一律淮南子黃鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲吕仲吕極不生蕙田案蕤賓夷則無射三律皆下生者律吕之本數也於隂陽修短之氣未合故大吕夾鍾仲吕俱用倍律此淮南子蕤賓重上生乃算律之捷法歷代多宗之二者律法不同得寸數則一前漢書律厯志黃鍾之長三分損一下生林鍾三分林鍾益一上生太蔟三分太蔟損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生蕤賓三分蕤賓損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生仲吕隂陽相生自黃鍾始八八為伍吳氏鼐曰漢志蕤賓下生大吕用倍數仍與上生同夷無二律亦然説本史記蓋相生之正法也此與淮南子生法異而得數同吕氏春秋黃鍾生林鍾林鍾生太蔟太蔟生南吕南吕生姑洗姑洗生應鍾應鍾生蕤賓蕤賓生大吕大吕生夷則夷則生夾鍾夾鍾生無射無射生仲吕三分所生益之一分以上生三分所生去其一分以下生黃鍾大吕太蔟夾鍾姑洗仲吕蕤賓為上林鍾夷則南吕無射應鍾為下吳氏鼐曰晉書云吕不韋春秋言黃鍾之宫律之本也下生林鍾林鍾上生太蔟太蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲吕三分所生益一分以上生三分所生損一分以下生後代言律者多宗此説據晉書所載與吕覽原文不同今細繹之吕覽原文有誤字當作黃鍾大吕太蔟夾鍾姑洗仲吕蕤賓為下林鍾夷則南吕無射應鍾為上晉志是也據晉志所引蕤賓用倍數仍同淮南陳氏樂書本吕覽淮南王安建蕤賓重上生之議鄭康成之説也此説殊誤彼蓋據黃鍾大吕太蔟夾鍾姑洗仲吕蕤賓為上一語而以蕤賓為上生耳蕤既上生則黃大太夾姑仲豈盡皆上生耶蕙田案觀吳氏説足訂吕覽之文有誤鄭康成曰陽管為律隂管為吕布十二辰子為黃鍾管圓九分而長九寸同位取妻隔八生子下生者三分去一上生者三分益一黃鍾乾之初九也隔八而下生林鍾坤之初六林鍾又隔八而上生太蔟之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六五下六上乃一終矣後漢書律厯志術曰陽以圓為形其性動隂以方為節其性靜動者數三靜者數二以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黃鍾之清濁下生不得及黃鍾之數實皆參天兩地圓蓋方覆耦承竒之道也黃鍾律吕之首而生十一律者也通典十二律相生之法自黃鍾始黃鍾之管九寸三分損益下生林鍾林鍾上生太蔟太蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲吕仲吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四此謂十二律長短相生一終於仲吕之法朱子曰自黃鍾至仲吕皆屬陽自蕤賓至應鍾皆屬隂此是一箇大隂陽黃鍾為陽大吕為隂每一陽間一隂又是一箇小隂陽陳氏禮書先王因天地隂陽之氣而辨十有二辰因十有二辰而生十有二律統之以三故黃鍾統天林鍾統地太蔟統人所以象三才生之以八故黃鍾生林鍾林鍾生太蔟太蔟生南吕之類所以象八風律生吕為同位所以象夫婦吕生律為異位所以象子母六上所以象天地之六氣五下所以象天地之五行其長短有度其多寡有數其損益有宜始於黃鍾終於仲吕黃鍾太蔟姑洗損陽以生隂林鍾南吕應鍾益隂以生陽蕤賓夷則無射又益陽以生隂大吕夾鍾中吕又損隂以生陽何則黃鍾太蔟姑洗陽之陽也林鍾南吕應鍾隂之隂也陽之陽隂之陰則陽息隂消之時故陽常下生而有餘陰常上生而不足蕤賓夷則無射陰之陽也大吕夾鍾仲吕陽之陰也陰之陽陽之隂則陽消隂息之時故陽常上生而不足隂常下生而有餘然則子午以左皆上生子午以右皆下生矣鄭康成以黃鍾三律為下生蕤賓三律為上生其説是也班固則類以律為下生吕為上生誤矣吳氏鼎曰上生下生之説先儒不同以律為下生吕為上生者史記生鍾分及前漢志晉志劉歆京房蔡雍也以黃鍾三律為下生蕤賓三律為上生者史記律寸及鄭康成孔頴達淮南通典禮書也依律下生吕上生則大吕夷則仲吕止得半律依黃鍾三律下生蕤賓三律上生則皆得正律朱子鍾律篇各存其説而相生圖則用鄭孔蔡氏律吕新書以鄭孔之説為隂陽錯亂無倫而又謂大夾仲三吕在陽則用倍數是欲避律上生吕之名而仍用律上生吕之實矣陳氏以陽消隂息之理破錯亂無倫之疑最為得之律吕正義律吕始黃鍾終應鍾止於十二者聖人審音制律其生聲之理不得不止於十二故國語曰紀之以三平之以六成於十二天之道也至蕤賓之生大吕漢志下生通典主上生主下生者宗司馬遷律書主上生者宗淮南之説也而朱子儀禮經傳通解亦取上生蓋蕤賓下生則三分損益僅得大吕之半必倍之始得其全上生則三分益一適得大吕之全其數則黃鍾太蔟之中而聲界黃鍾太蔟之交與其下生而得其半孰若即用上生之直捷簡當耶此以聲音度數言之而宜用上生者也黃鍾一陽復始為十一月之律三分損益下生林鍾為六月之吕此陽生隂宜下生也林鍾三分益一上生太蔟為正月之律此隂生陽宜上生也太蔟三分損一下生南吕為八月之吕此陽生陰宜下生也南吕三分益一上生姑洗為三月之律此隂生陽宜上生也姑洗三分損一下生應鍾為十月之吕此陽生隂宜下生也應鍾三分益一上生蕤賓為五月之律此隂生陽宜上生也至蕤賓之生大吕復用上生者蓋自黃鍾十一月之律一陽始生而大吕十二月之吕二陽相繼位雖居陰而氣實應乎陽蕤賓五月之律一隂始生位雖居陽而氣則屬乎隂故蕤賓之生大吕實以隂生陽而宜上生者也自蕤賓一隂生而夷則七月之律無射九月之律氣皆為隂自黃鍾一陽生而夾鍾二月之吕仲吕四月之吕氣皆為陽故大吕生夷則為下生夷則生夾鍾為上生夾鍾生無射為下生無射生仲吕為上生是皆緣蕤賓上生而然此以隂陽理氣言之而宜用上生者也古之聖王制為十二律吕以配十有二月節四時之變明消息之機一皆本乎隂陽陰陽之辨精則理明而數備故律吕三分損益上下相生之法誠千古不易之至理也吳氏鼐曰正義取陳用之之説而廣其義與蔡雍陽生隂為下生隂生陽為上生之説及朱子律吕相生為小隂陽子午交界是大隂陽之説俱合其義精矣但陳氏以漢志為誤殆不知漢志蕤夷無三律下生而又用倍者皆子一分丑三分二之本數也後漢書律厯志京房法黃鍾十七萬七千一百四十七林鍾十一萬八千九十八太簇十五萬七千四百六十四南呂十萬四千九百七十六姑洗十三萬九千九百六十八應鍾九萬三千三百十二蕤賓十二萬四千四百十六大吕十六萬五千八百八十八夷則十一萬五百九十二夾鍾十四萬七千四百五十六無射九萬八千三百零四仲吕十二萬一千七十二律吕新書桑氏悅曰蕤賓之實十二萬四千四百一十六由是而下生大吕當損四萬一千四百七十二而為大吕八萬二千九百四十四可也何反益蕤賓之一而得十六萬五千八百八十八之數乎先儒云黃鍾生十一律子寅辰午申戌六陽辰皆下生丑卯巳未酉亥六隂辰皆上生隂數倍其實陽數四其實大吕當未未隂辰也而四其實可乎損之而益益之而損此律之所由成也蕤賔既益應鍾之一大吕又益蕤賓之一可乎曰朱子云十二管隔八相生自黃鍾之管陽皆下生隂皆上生自蕤賓之管隂反下生陽反上生以象天地之氣也若拘古法而以陽必下生隂必上生則以之候氣而氣不應以之作樂而樂不和此鄭氏重上生法所以為不易之論也惜乎西山當時失載其説不能不使初學之疑也范氏從子至已陽生隂退故律生吕言下生吕生律言上生從午至亥陽升隂退故律生吕言上生吕生律言下生梁氏寅曰班志隔八相生一下一上則終于中吕其長止三寸三分有竒京房之法則至蕤賓重上生凡五下六上終于中吕其長八寸六分有竒若仲吕止三寸三分有竒則雖三分益一不能復生黃鍾之律故用六寸六分則三分益一而可以復生黃鍾者也陳氏埴曰律吕隔八生子上生者三分益一如林鍾生太簇自六寸上生為八寸也下生者三分去一如黃鍾生林鍾自九寸下生為六寸也古史謂陽必下生隂必上生若拘此法則十二月之律無此降殺之序以之候氣則氣不應矣以之制樂則樂不和矣故鄭康成有重上生法自黃鍾生至蕤賓則陽反生上隂反生下六五而終矣其比次降殺之序可用以候氣可用以制樂乃天然之法非巧算所能為者吳氏鼐曰京房以子丑寅卯辰五陽辰為下生巳午未申酉戌六隂辰為上生蓋十二律中除仲吕不返生外惟蕤賓重上生餘則一上一下此算律之捷法也若其本法則大吕當八萬二千九百四十四夾鍾當七萬三千七百二十八仲吕當六萬五千五百三十六但本法大吕夾鍾仲吕俱得子聲倍之而正聲乃合故本數者天地氣化相生之缺陷也倍之而合正聲者人事輔相裁成之妙用也即重上生之捷法亦所以補氣化之缺陷也蕙田案以上律吕三分損益之數蕤賓重上生法律吕正義定律吕之長損益相生篇自古論律吕者必先考黃鍾之長黃鍾之長定而十一律吕皆由此定律吕新書言黃鍾九寸寸作十分為九十分又言黃鍾九寸寸作九分為八十一分夫九十分乃黃鍾之正數而八十一分原於管子絃音五聲度分史記淮南子遂以為管音度分新書雖兼取之而九寸之説實不可易但尺度不明則執九寸之説亦不能無失故定律吕之長必以古尺通之今尺比例推求然後真數可得以古尺言之黃鍾九寸三分損益得六寸為林鍾林鍾三分益一得八寸為太蔟太蔟三分損一得五寸三分三釐三毫三絲三忽三微三纎有竒為南吕南吕三分益一得七寸一分一釐一毫一絲一忽一微一纎有竒為姑洗姑洗三分損一得四寸七分四釐零七絲四忽零七纎有竒為應鍾應鍾三分益一得六寸三分二釐零九絲八忽七微六纎有竒為蕤賓蕤賓三分益一得八寸四分二釐七毫九絲八忽三微五纎有竒為大吕大吕三分損一得五寸六分一釐八毫六絲五忽五微六纎有竒為夷則夷則三分益一得七寸四分九釐一毫五絲四忽零九纎有竒為夾鍾夾鍾三分損一得四寸九分九釐四毫三絲六忽零六纎有竒為無射無射三分益一得六寸六分五釐九毫一絲四忽七微四纎有竒為仲吕仲吕三分益一得八寸八分七釐八毫八絲六忽三微三纎有竒比之黃鍾九寸不足一分二釐一毫一絲三忽六微六纎有竒以今尺言之黃鍾之七寸二分九釐損益相生則林鍾得四寸八分六釐太蔟得六寸四分八釐南吕得四寸三分二釐姑洗得五寸七分六釐應鍾得三寸八分四釐蕤賓得五寸一分二釐大吕得六寸八分二釐六毫六絲六忽六微六纎有竒夷則得四寸五分五釐一毫一絲一忽一微一纎有竒夾鍾得六寸零六釐八毫一絲四忽八微一纎有竒無射得四寸零四釐五毫四絲三忽二微有竒仲吕得五寸三分九釐三毫九絲零九微四纎有竒至仲吕上生比黃鍾原數不足九釐八豪一絲二忽零六纎有竒夫黃鍾古尺之度所生律吕其分寸如彼今尺之度所生律吕其分寸如此古尺之度為數多今尺之度為數少數多者橫黍之所生數少者縱黍之所纍數之多少雖異而管之長短則同今尺之七寸二分九釐正古尺之九寸也至於仲吕不能還生黃鍾乃數之使然蓋十二律吕上下相生損之漸少而益之不足故仲吕上生之變黃鍾雖不及黃鍾一分上下而其數仍與黃鍾相近不得自成一律其聲亦與黃鍾相近不能自成一音細繹其理下生而損上生而益損益之間數有消長亦如氣盈朔虛之有閏分此古人所以以律吕配之十二月也定律吕之積損益相生篇制律吕之法以積實容黍為要者蓋因管之長短廣狹依此以正而聲之洪纎髙下賴此以生是以必得黃鍾之真積然後中聲可定由是三分損益以為十一律吕而積無不合聲無不諧但古今尺度不同則縱長周徑因之而積實之數亦異必考核古今積數之異而驗以容受之同然後律吕之真分可辨也黃鍾積實古尺之八百一十分與今尺之四百三十分四百六十七釐二百一十毫為數不同而體之積分籥之容黍千二百粒實未嘗異故十二律吕之積損益相生皆本於此黃鍾古尺之積八百一十分三分損益得五百四十分為林鍾林鍾三分益一得七百二十分為太蔟太蔟三分損一得四百八十分為南吕南吕三分益一得六百四十分為姑洗姑洗三分損一得四百二十六分六百六十六釐六百六十六毫有竒為應鍾應鍾三分益一得五百六十八分八百八十八釐八百八十八毫有竒為蕤賓蕤賓三分益一得七百五十八分五百一十八釐五百一十八毫有竒為大吕大吕三分損一得五百零五分六百七十九釐零一十二毫有竒為夷則夷則三分益一得六百七十四分二百三十八釐六百八十三毫有竒為夾鍾夾鍾三分損一得四百四十九分四百九十二釐四百五十五毫有竒為無射無射三分益一得五百九十九分三百二十三釐二百七十三毫有竒為仲吕若夫今尺之積黃鍾之四百三十分四百六十七釐二百一十毫三分損益則林鍾得二百八十六分九百七十八釐一百四十毫太蔟得三百八十二分六百三十七釐五百二十毫南吕得二百五十五分零九十一釐六百八十毫姑洗得三百四十分一百二十二釐二百四十毫應鍾得二百二十六分七百四十八釐一百六十毫蕤賓得三百零二分三百三十釐八百八十毫大吕得四百零三分一百零七釐八百四十毫夷則得二百六十八分七百三十八釐五百六十毫夾鍾得三百五十八分三百一十八釐零八十毫無射得二百三十八分八百七十八釐七百二十毫仲吕得三百一十八分五百零四釐九百六十毫夫製管取聲皆由於積實則十一律吕之積宜與黃鍾並詳而言律者多未及焉蓋因其所定律吕之長與面冪相乘積數有未合耳十二律吕之度太蔟以上得全寸而無竒零故未顯同異南吕以下積差漸多南吕古尺之長五寸三分三釐三毫三絲三忽有竒與面冪九方分相乘得積四百八十分如以南吕為五寸三分與面冪九方分相乘止得積四百七十七分則少三分至無射四寸九分九釐四毫三絲六忽與面冪相乘得四百四十九分四百九十二釐有竒如以無射為四寸八分八釐四毫八絲與面冪相乘止得積四百三十九分六百三十二釐則少九分八百六十釐凡制樂之法皆以積數倍之或加四倍或加八倍或加至十數倍及其用也若積少一分四倍則差四分八倍則差八分積少九分四倍則差三十六分八倍則差七十二分夫聲音之發所辨正在中容實積多寡毫釐之際而可因其竒零遂略之耶至於黃鍾之籥積八百一十分容千二百黍蓋所積之分方分也所容之黍圓粒也以方分度圓粒則必有空隙故合八百一十分之方適容千二百黍之圓乃為虛實相應之凖則焉然十二律吕之管皆生於黃鍾而論者亦止及黃鍾之容其他俱未載夫積分猶恐虛數之難憑而容粒則有實黍之可證故容黍之分亦當用三分損益以核之黃鍾容千二百黍三分損一得八百黍為林鍾林鍾三分益一得一千零六十七黍為太簇太簇三分損益得七百一十一黍為南吕南吕三分益一得九百四十八黍為姑洗姑洗三分損一得六百三十二黍為應鍾應鍾三分益一得八百四十三黍為蕤賓蕤賓三分益一得一千一百二十四黍為大吕大吕三分損一得七百四十九黍為夷則夷則三分益一得九百九十九黍為夾鍾夾鍾三分損一得六百六十六黍為無射無射三分益一得八百八十八黍為仲吕仲吕三分益一得一千一百八十四黍凡餘分過大半者進一黍不及半者不計夫體積雖有古今尺度之殊而容黍則一是以假黍以證分推分以定律以千二百黍實黃鍾之籥不虧不溢則其他律吕之容受亦皆無一黍之差也是知古人制律有積分以驗實體有容受以驗積分所以互相比較務得律吕之真度故並著其同異俾觀者得取衷焉蕙田案以上律吕之長律吕之積三分損益之數亦蕤賓重上生之捷法考律緒言吳氏鼎曰言律者皆曰三分損益矣何以三分何以損益未有明其所由然者惟明葛中選泰律謂一位具三合三參天也三損一存二兩地也三損一矣存二之中仍具三焉遞而生之皆三也存二之中各分二焉倍而行之皆兩也是以一位之中凖三是三其兩也凖兩是兩其三也三者遞生也倍者自生也案聲音之理不過一律而一吕律吕之辨不過一隂而一陽隂陽之數不過一參而一兩參者三分所從出也兩者損益所從出也凡聲屬巨若雷霆細如蚊蚋其間髙下清濁至於無算及其此聲與彼聲而為用也總不出乎相生相應之理相生者一母一子母一而子三相應者一全一半全一而半二由三而九而二十七而八十一其數不同同歸於三由二而四而八而十六其數不同同歸於二一三一二而律之變化盡矣則三分損益而律之變化盡矣彼有不用三分損益之法者于音理曷有當耶李氏光地曰律之以損益相生何也曰凡象數皆起於隂陽象者方圓相變者也數者竒耦相生者也故方之內圓必得外圓之半皆以積實言其外圓必得內圓之倍圓之內方亦必得外方之半其外方亦必得內方之倍律之上生為下生之倍下生為上生之半其理一也蓋方圓函蓋竒耦乘負隂陽變化天地生生之道也苟其象之所生同數之所起同則上下無不應也外內無不合也倍半無不和也故司馬遷律書謂之同類今西人算學謂之比例孔子曰同聲相應同氣相求此之謂也夫金石之鏗訇與絲絃之繁細物性迥然殊矣而各以其性為聲律則無不相應者豈非同類比例之説乎其相生必以隔八何也曰比位者隂陽相合之情也隔七者隂陽相對之義也隔八者隂避陽位偏正之分尊卑之等也夫然後理順情和而相應矣辨不用三分損益明鄭世子朱載堉著律吕精義創為新法不用三分損益不拘隔八相生専恃開方乘除自黃鍾倍律轉生十二次仍得黃鍾正律正律生半律或左旋或右旋或隔六或逐位往而復返循環無端吳氏鼎曰新書載宋胡瑗病仲吕反生不及黃鍾乃遷就林鍾以下圍徑以就黃鍾清聲何承天劉焯欲增林鍾以下十一律之分使至仲吕反生黃鍾蔡氏論之以為惟黃鍾一律成律他十一律皆不成律今載堉之法損十一律之分使反生黃鍾半數亦猶何劉增十一律之數使反生黃鍾原數正所謂惟黃鍾一律成律耳至其所用開方乘除皆有遺棄不盡之數考京房六十律相生法餘分皆棄不用蔡氏論之曰夫律學微妙其生數之法正在毫釐秒忽之間京房乃以不盡之算不容損益遂或棄之或增之則其畸贏贅虧之積亦不得為此律矣今載堉之法正京房或棄或增之病蔡氏所訶不得為律者乃反以秒忽不盡為自然之理三分損益為疏舛之法不亦異乎右三分損益史記律書得九寸命曰黃鍾之宫淮南子黃鍾之長修九寸律吕新書黃鍾長九寸律吕正義黃鍾律分篇黃鍾之律有長與圍徑則有尺度有尺度然後數立焉黃鍾元聲原未絶於世而造律之尺獨難得其真隋志載歷代尺一十五等其後改革益甚至律吕新書所載如周尺漢劉歆銅斛尺蔡雍銅籥尺建武銅尺魏杜夔尺晉田父玉尺始平古銅尺汲冡玉律尺劉曜土圭尺劉宋錢樂之渾儀尺後魏元延明尺後周玉尺梁景表尺隋開皇水尺五代王朴律凖尺宋和峴尺李照尺胡瑗阮逸尺鄧保信尺大晟樂尺共二十餘種然尺者所以度律而黍者所以定尺古今尺度雖各不同而律之長短自不可更黍之大小又未嘗變故黃鍾之分參互相求而可得其真也宋李照以縱黍纍尺管容千七百三十黍空徑三分固失於大胡瑗以橫黍纍尺管容千二百黍空徑三分四釐六毫亦非真度通志載夏尺十寸商尺十有二寸周尺八寸自三代而後尺雖不一大約長不踰商尺短不減周尺今黃鍾之長九寸非夏尺之九寸商尺之九寸亦非歷代諸尺之九寸乃本造律度十分之九也夫以夏尺商尺之度制為黃鍾之籥其容受逾於千二百黍固不必言嘗以今尺之八寸為周尺立法制為黃鍾之籥其容黍又少歉更以今尺之八寸一分立法乃恰合千二百黍之分始知古聖人定黃鍾之律蓋合九九天數之全以立度且驗之今尺縱黍百粒得十寸之全而橫黍百粒適當八寸一分之限明鄭世子載堉律吕精義審度篇亦載橫黍百粒當縱黍八十一粒又前漢志曰黃鍾之長以子榖秬黍中者一黍之廣度之九十分黃鍾之長一為一分夫廣者橫之謂也九十分為黃鍾之長則黃鍾為九十橫黍所纍明矣以橫黍之度比縱黍之度即古尺之比今尺以古尺之十寸即橫黍一百之度為一率今尺之八寸一分即縱黍八十一之度為二率黃鍾古尺九寸為三率推得四率七寸二分九釐即黃鍾今尺之度也夫考音而不審度固無特契之理審度而不驗黍亦無恰符之妙依今所定之尺造為黃鍾之律考之於聲既得其中實之以黍又適合千二百之數然則八寸一分之尺豈非古人造律之真度耶蕙田案黃鍾九寸始於史記淮南子律吕新書從之九寸者九分也黃鍾律度以三用九故九九則八十一分非尺度之分寸也後人不知九為黃鍾度法而泥於九寸為尺寸之寸故或以為寸十分或以為一尺或以黍定尺或謂不當以黍定尺或以錢校尺論議紛紜而黃鍾之真度卒不可得古律吕卒不可求我聖祖天亶神聖心通律吕之原即以九九之數定黃鍾而橫黍之廣恰合八寸一分之限考之於聲則得其中實之以黍又適合一千二百之數豈非心通造化而為萬世法者哉彼不得其原而徒為尺度揣摩之術者可一舉而空之矣辨史記八寸七分一之説史記誤刋本曰黃鍾八寸七分一索隱曰律九九八十一故云長八寸十分一舊本作七分蓋誤也朱子曰蔡京用事作樂盡破前代之言樂者因作中聲正聲如正聲九寸中聲只八寸七分一案史記七字多錯乃是十分一其樂只是杜撰至今用之辨漢書九寸寸十分之説漢書律厯志一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺吳氏鼎曰此言黃鍾九寸寸十分之始京房劉歆鄭康成並同後世如李照房庶胡瑗范景仁司馬光皆用此説而明何塘曰漢志謂黃鍾之律九寸加一寸為一尺夫度量權衡所以取法於黃鍾者貴其與天地之氣相應也若加一寸以為尺則又何取於黃鍾殊不知黃鍾之長固非人所能為漢志不知乃欲加黃鍾為一寸謬矣蕙田案加一寸為尺者亦由不知黃鍾之寸乃假借之辭固不得以度之一寸十分為比也辨朱載堉黃鍾一尺之説朱載堉曰一分者總為一段也命黃鍾為一尺故曰子一分丑三分二乃一尺中三寸之二寅九分八乃一尺中九分之八蕙田案一尺之説最為無理不足辨皆由泥於度尺而然也辨黃鍾三寸九分之解吕氏春秋黃帝令伶倫作為律伶倫自大夏之西乃之阮隃之隂取竹於嶰豀之谷以生空厚竅均者斷兩節間其長三寸九分而吹之以為黃鍾之宫吹曰含少樂典曰黃帝命伶倫斷竹兩節間聲出三寸九分故吹曰含少合其無聲者四十二分則為全律三十九子半數也陽猶麗隂隂含少陽是以名也四古樂經傳自黃鍾八寸一分上下相生窮于應鍾寸二分則其中間長短相距取用之數蓋三寸九分而已伶倫先得嶰溪之竹斷取一均間别其三寸九分之內穴孔而吹之以備黃鍾之五聲故總其全體而命之曰黃鍾之宫而以其所穴之孔為黃鍾所含之少聲也矣朱載堉曰後學未逹指三寸九分為黃鍾之長誤八寸一分三寸九分合為十二寸即律吕之全數寸季本曰當為長九空徑三寸之誤蕙田案吕覽三寸九分之説樂典以為聲出三寸九分乃是吹口古樂經傳以下人各執一説皆揣擬無當惟御製律吕正義曰間嘗截竹為管詳審其音黃鍾之半律不與黃鍾合而合黃鍾者為太簇之半律吕氏春秋以三寸九分之管為聲中黃鍾之宫即半太簇合黃鍾之義乃知三寸九分者論宫均相應之半聲而非論其長也故吕氏曰吹之則明指聲矣曰含少少者非即半律之義耶後人但以長短之數欲牽合九寸八十一分多見其臆鑿也附今尺八寸七分一之數律吕正義曰黃鍾古尺九寸今尺七寸二分九釐今案古尺十寸當今尺八寸一分故黃鍾之管於古尺為九寸於今尺為七寸二分九釐也大吕古尺八寸四分二釐七毫今尺六寸八分二釐六毫太蔟古尺八寸今尺六寸四分八釐夾鍾古尺七寸四分九釐一毫今尺六寸零六釐八毫姑洗古尺七寸一分一釐一毫今尺五寸七分六釐仲吕古尺六寸六分五釐九毫今尺五寸三分九釐三毫蕤賓古尺六寸三分二釐今尺五寸一分二釐林鍾古尺六寸今尺四寸八分六釐夷則古尺五寸六分一釐八豪今尺四寸五分五釐一毫南吕古尺五寸三分三釐三毫今尺四寸三分二釐無射古尺四寸九分九釐四毫今尺四寸零四釐五毫應鍾古尺四寸七分四釐今尺三寸八分四釐蕙田案以上黃鍾寸法漢書律厯志黃鍾八百一十分後漢鄭康成月令注曰凡律空圍九分蔡氏雍銅籥銘曰籥黃鍾之宫空圓九分容黍千二百粒月令章句曰黃鍾之管徑三分圍九分孟氏康曰黃鍾律孔徑三分參天之數圍九分終天之數韋氏昭曰黃鍾管徑三分圍九分因而九之九九八十一故黃鍾之數立焉晉志曰十二律空徑三分隋志曰黃鍾之管徑三分長九寸宋史志曰皇祐中詔王洙范鎮如房庶説造律徑三分圍九分容千二百黍胡氏瑗曰黃鍾徑三分四釐六毫圍十分三釐八毫又曰黃鍾律管每長一分內實十三黍又三分黍之一圍中容九方分也後儒執守孤法多不能貫知權量之法但制尺求律便為堅證因謂圍九分者取圍圓九分爾以是圍九分之誤遂有徑三分之説若從徑三圍九之法則黃鍾之管止容九百黍積止六百七分半如此則黃鍾之聲無從而正權量之法無從而生房氏庶曰大其空徑四釐六毫是以樂聲太髙范氏鎮曰古律空徑三分圍九分今新律三分四釐六毫此四釐六毫何從出又曰古者以竹圍為律竹形本圓何以方分置算又算法圓分謂之徑圓方分謂之方斜所謂徑三圍九方五斜七是也今圓分何以方法算之此算法之非是也司馬氏光曰徑三圍九數家言其大要耳若以密率言之徑七分圍二十有二分也胡氏銓曰班固以八十一分為黃鍾之實起十二律之周徑度其長以容其實初未嘗有徑三圍九之説也康之徒惑於八十一分之實以一寸為九分而不察方圓之異於是徑三圍九之論興焉夫律之形圓如以為徑三圍九則刓其四角之方而不足於九分之數以之容黍豈能至於千二百哉然則所謂圍九分方也何以知之知籥之方則知黃鍾之分安得而不方哉圍九分方而圜之則徑不止於三分矣故夫徑三圍九之説孟康為之也朱子鍾律篇曰黃鍾圍九分徑三分四釐六毫又曰古者只説空圍九分不説徑三分蓋不啻三分有竒也蔡氏元定曰空圍九分積八百一十分又曰案十二律圍徑自先漢以前傳記並無明文惟班志云黃鍾八百一十分由此之義起十二律之周徑然其説乃自以律之長自乘而因之以十配合為説耳未可以為據也惟審度章云一黍之廣度之九十分黃鍾之長一為一分嘉量章則以千二百黍實其籥謹權衡章則以千二百黍為十二銖則是纍九十黍以為長積千二百黍以為廣可見也夫長九十黍容千二百黍則空圍當有九方分乃是圍十分三釐八毫徑三分四釐六毫也每一分容十三黍又三分黍之一以九十因之則一千二百也又漢斛銘文云律嘉量方尺圓其外庣旁九釐五毫冪百六十二寸深尺積一千六百二十寸容十斗嘉量之法合籥為合十合為升十升為斗十斗為石一石積一千六百一十寸為分者一百六十二萬一斗積一百六十二寸為分者十六萬二千一升積十六寸二分為分者一萬六千二百一合積一寸六分二釐為分者一千六百二十則黃鍾之籥為八百一十分明矣空圍八百一十分則長纍九十黍廣容一千二百黍矣蓋十其廣之分以為長十一其長之分以為廣自然之數也自孟康以律之長十之一為圍之謬其後韋昭之徒遂皆有徑三分之説而隋志始著以為定論然纍九十黍徑三黍止容黍八百有竒終與一千二百黍之法兩不相通而律竟不成唐因聲制樂雖近於古而律亦非是本朝承襲皆不能覺獨胡安定以為九分者九方分也以破徑三分之法然所定之律空圍不同則亦不成律矣性理大全彭氏曰黃鍾律管有周有徑有面冪有空圍內積有從長如史記論縱長律歷志論縱長及積東漢鄭氏注月令論冪東漢蔡氏月令章句論縱長皆不易之論獨周徑之説漢以前俱無明文漢律歷志開端未竟東漢蔡氏始創為徑三分之説晉孟氏以後諸儒續為徑三分圍九分之説宋胡氏蔡氏又為徑三分四釐六毫圍十分三釐八毫之説然考之古方圍周徑冪積皆未有合嘗依東漢蔡氏所言徑三分以密率乘除止得空圍內面冪七分七釐竒乃少一分九十二釐竒空圍內積實止得六百三十六分竒乃少一百七十三分竒如此則黃鍾之管無乃太狹蓋黃鍾空積忽微若徑內差一忽即面冪及積所差忽數至多此東漢蔡氏之説所以不合也晉孟氏諸儒言徑三分圍九分用徑一圍三之法雖是古率然以密率推之徑一則圍三有竒假如徑七則圍當二十有二今依孟氏所言徑三分則圍長當九分四釐二毫一秒強不但止於九分也若依九分圍長之數則徑當止有二分八釐六毫二秒六忽強又不及三分也此晉孟氏諸儒之説所以不合也宋胡氏不主徑三圍九之説大意疑其管狹耳然所言徑三分四釐六豪圍十分三釐八毫亦用徑一圍三之率若依所言三分四釐六毫徑當得圍十分八釐七毫六秒二忽強不但止於十分三釐八毫也若依十分三釐八毫圍則徑止得三分三釐竒又不及三分四釐六毫也此宋胡氏之説所以不合也宋蔡氏説徑圍分數與胡氏同至於算法用圓田術三分益一得一十二開方除之求徑又以徑相乘以管長乘之用三分益一四分退一之法求冪積今姑依其説以九方分平置又三分益一以三方分割置於九方分之外其積十二方分其縱橫可得三分四釐六毫強不盡二毫八絲四忽如蔡氏之説但依此徑以密率相乘則空圍內面冪不但止得九方分乃得九方分零四十釐六十毫五十七秒十四忽竒空圍內積實不但止得八百一十分乃得八百四十六分五百四十五釐一百四十二秒六百忽竒如此則黃鍾之管無乃太大細考之方內之圓所占者不止四分三圓外之方所當退者又不及四分一以所知三分益一四分退一乃算家大約之法此宋蔡氏之説所以又不能盡合也今欲求黃鍾的實定數取此管九寸寸作十分分作十釐釐作十毫毫作十秒秒作十忽以合天地五位終於十之數乃以十乘八十一得八百一十分以八百一十分配九十分管知此管長九十分空圍中容八百一十分即十分管長空圍中容九十分一分管長空圍中容九分乃以此管面空圍中所容九分以平方冪面推之知一分有百釐釐有百毫毫有百秒秒有百忽積而計之九平方分通有面冪九萬萬忽依密率乘除得圓周長十分六釐三毫六秒八忽萬分忽之六千三百一十二又以圓周求徑計三分三釐八毫四秒四忽萬分忽之五千六百四十五又以半徑半周相乘仍得九萬萬忽內一忽弱通得面冪九平方分也既以周徑相乘復得面冪如此則黃鍾之廣與長及空圍內積實皆可計矣故面冪計九方分深一分管則空圍內當有九立方分深九十分管計九十則空圍內當有八百一十立方分此即黃鍾一管之實其數與天地造化無不相合此算法所以成也算法既成之後或以竹或以銅别為之依其長作九十分乃取九十分之分計三分三釐八毫四秒四忽萬分忽之五千六百四十五以合孔徑如此則圍長面冪與夫空圍內積自然無不吻合特徑數自入毫以下非可細分而算法積忽與秒不容不然耳李氏光地古樂經傳曰彭氏之算庶幾得之秒忽之下有不盡之分則亦無形之可紀也蓋方體之積十四則內容之圓其積十一故知益一退一之法為古人疏率以積求周者置積為實以八十八乘之以七除之平方開之以周求徑者置周為實以徑法七因之以周法二十二除之以周徑求積者置周折半為實以徑折半為法乘之此彭氏之説也若以積求徑則置積為實以十四乘之以十一除之平方開之以徑求周則置徑為實以周法二十二乘之以徑法七除之其所得之數亦皆符會律吕正義定黃鍾縱長體積面冪周徑篇律吕新書黃鍾長九寸空圍九分言圓面積九方分也積八百一十分夫有縱長有體積則面冪圍徑自可得而考矣漢蔡雍晉孟康吳韋昭皆主徑三圍九以今所定比例四率法求之得面冪六分七十五釐平方定位法百釐成分百分成寸故曰幾十幾分幾十幾釐以長九十分乘之得體積六百零七分五百釐立方定位法千釐成分千分成寸故曰幾百幾十幾分幾百幾十幾釐比之八百一十分母乃太少宋胡瑗蔡元定主徑三分四釐六毫用定率求之得面冪九分三十九釐三十九毫以長九十分乘之得體積八百四十五分四百五十一釐比之八百一十分則又過之惟劉宋祖沖之密率求得徑三分三釐八毫四絲四忽面冪八分九十九釐九十七毫有竒其數為近但其法以周率二十二四之猶用圓田術三分益一起算故小餘猶未密耳夫執一説而不參互相求則於理有遺參互相求而不用密法比例則於數有遺今置黃鍾古尺積八百一十分以九十分歸之得面冪九方分用比例四率相求表內面線相等面積不同定數為比例以圓面積一十萬為一率方面積一十二萬七千三百二十四為二率今面冪九方分為三率推得四率一十一分四十五釐九十毫為圓面冪經線相等正方面積以開平方得三分三釐八毫五絲一忽乃黃鍾古尺之徑數也求周則以周徑相求定數為比例以徑一百一十三為一率周三百五十五為二率今徑三分三釐八毫五絲一忽為三率推得四率十分零六釐三毫四絲六忽為黃鍾古尺之內周數也較以時尺則黃鍾古尺之積比今尺之積即古尺自乘再乘之數比今尺自乘再乘之數因體積相比故用自乘再乘以古尺一百分自乘再乘得一百萬分為一率今尺八十一分自乘再乘得五十三萬一千四百四十一分為二率黃鍾古尺積八百一十分為三率推得四率四百三十分四百六十七釐二百一十毫乃黃鍾今尺之積也如求面冪則以今尺長七寸二分九釐歸之得面冪五分九十釐四十九毫如法求徑得二分七釐四豪一絲九忽是為黃鍾今尺之徑數若以古尺之徑數如法比例以推今尺之徑數或以今尺之徑數如法比例以推古尺之徑數皆彼此協合夫以縱長體積面冪周徑古尺今尺參互相求莫不環轉符契而無毫釐之差始為立法之密而於理數無遺也吳氏鼐曰黃鍾長九寸空圍九分則鄭蔡孟韋之説是也長九十分容千二百黍漢志之説而宋史宗之也積八百一十分亦漢志之説而蔡氏宗之也以空圍九分為九方分者則胡安定之説也徑三三八五周一零六三則正義之説是也駁徑三圍九則溫公是也聚古人算律之言參差不一者斷案精鑿則彭氏也合古今尺比例而得黃鍾真度者正義也此義明而諸家疑似之説可剖而斷也蕙田案以上黃鍾縱長體積面冪周徑漢志八百一十分黃鍾之實也三百六十分林鍾之實也六百四十分太簇之實也孟康曰黃鍾長九寸圍九分林鍾長六寸圍六分太簇長八寸圍八分蔡雍月令章句曰黃鍾之管長九寸其餘皆稍短惟大小圍徑無增減隋志曰漢志云黃鍾圍九分林鍾圍六分太簇圍八分續志及鄭康成並云十二律空皆徑三分圍九分後魏安豐王依班固志林鍾空圍六分及太簇空圍八分作律吹之不合黃鍾商徵之聲皆空圍九分乃與均鍾合開皇九年牛𢎞辛彥之鄭譯何妥等參考古律製黃鍾之管俱徑三分其九寸度有損益故容黍不同范鎮曰黃鍾長九寸三分損一為林鍾長六寸律皆圍九分黃鍾積實得八百一十分三分損一林鍾得五百四十分十二律皆如此律吕新書東都之亂樂律散亡雍之時未亂當親見之孟康時漢斛雖存而律不存康云黃鍾林鍾太簇圍徑各異無足怪又曰胡安定見仲吕反生不及黃鍾之數乃遷就林鍾以下諸律圍徑以就黃鍾清聲以夷則南吕為徑三分圍九分無射為徑二分八釐圍八分四釐應鍾為徑二分六釐五毫圍七分九釐五毫范蜀公曰胡先生律圍十分三釐八毫者八九分者一八分四釐者一九釐五毫者一皆非是夫律以空圍之同故其長短之異可以定聲之髙下令其律之空圍如此則亦不成律矣律吕正義律吕之見於史志者其説不一有主同徑者有主不同徑者夫惟徑之同乃得其長短之異而聲字之清濁賴之以辨使徑不同而長短又異則成同形十二律吕皆如一黃鍾矣故同徑之説乃十二律吕之定論也吳氏鼎曰禮記月令鄭注曰凡律空圍九分孔疏曰諸律雖長短有差其圍皆以九分為限案此十二律圍徑無異之明文也漢志言黃鍾八百一十分繇此之義起十二律之周徑顧陳垿釋之曰知律雖十二周徑一也是也律吕新書論胡瑗圍徑不同之失及明韓邦竒志樂曰十二管隨其長短而減其空圍則於八百一十分十七萬之數戾矣邢雲路律考曰如孟康所云則應鍾長四寸六分圍四分六釐徑止得一分五釐一分五釐之管涉於太細何以施吹何以成聲以上三説足以正圍徑不同之非矣蕙田案以上十二律圍徑附以黍定尺不同漢書律厯志一黍之廣度之九十分黃鍾之長一為一分隋志一黍之廣度之九十黍為黃鍾之長一黍為一分魏志永平中太樂祭酒公孫崇以一黍之長纍為寸法太常卿劉芳受詔修樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家紛競久不能決太和十九年髙祖詔以一黍之廣用成分體九十黍之長以定銅尺有司奏芳尺同髙祖所制芳遂典修金石宋史志景祐中阮逸胡瑗取上黨秬黍中者纍度求尺製黃鍾之律馬端臨曰胡瑗以橫黍纍尺管容黍千二百蕙田案此橫黍起分與漢志一黍之廣廣字合魏書志永平中太樂祭酒公孫崇更造新尺以一黍之長纍為寸法宋史志景祐中鄧保信製尺用上黨秬黍圓者一黍之長纍而成尺律管一據尺裁九十黍之長空徑三分空圍九分容秬黍千二百遂用黍長為分再纍成尺翰林學士丁度議曰保信黍尺以長為分雖合後魏公孫崇所説然當時已不施用况保信今尺以圓黍纍之及首尾相銜與實籥之黍再纍成尺不同不可用詔罷之長景德中潞州上秬黍李照等擇大黍縱纍之檢考短尺與太府尺合法乃定范鎮曰照以縱黍纍尺空徑三分容黍千七百三十太長不合古法朱載堉曰黃鍾九寸縱黍九分之寸蕙田案此以縱黍纍尺與古不合古樂經傳古稱秬黍中者中非不大不小之謂乃不長不短之謂蓋圓而無縱橫者也今欲以黍參定律者須擇圓者為是蕙田案圓黍起分即與橫黍同矣魏志中尉元匡以黍之廣度黍二縫以取一分朱載堉曰斜黍者非縱非橫而首尾相銜也蕙田案此以斜黍起分朱載堉曰上黨秬黍佳者縱纍八十一枚斜纍九十枚橫纍百枚皆與大泉九枚合蕙田案朱氏法當以橫纍九十枚斜纍八十一枚與橫黍法相近國朝會要曰古者黃鍾為萬事根本故尺量權衡皆起於黃鍾至晉隋間纍黍為尺而以制律容受卒不能合及平陳得古樂遂用之唐興因聲以制樂其器雖無法而其聲猶不失於古五代之亂大樂淪散王朴始用尺定律而聲與器皆失之故太祖患其聲髙特減一律至是又減半律然太常樂比唐之聲猶髙五律比今燕樂髙三律帝雖勤勞于制作而未得其當者有司失之於以尺而生律也河南程氏曰黃鍾之聲亦不難定世自有知音者將上下聲考之既得正便將黍以實其管看管實得幾粒然後推而定法可也古法律管當實千二百粒黍今羊頭黍不相應則將數等驗之看如何大小者方應其數然後為正昔胡先生定樂取羊頭山黍用三等篩子篩之取中等者特未定也又曰以律管定尺乃是以天地之氣為凖非秬黍之比也秬黍積數在先王時唯此適與度量合故可用今時則不同蔡氏元定曰律吕散亡其器不可盡見然古人所以制作之意則猶可考也欲求聲氣之中而莫適為凖則莫若且多截竹以擬黃鍾之管或極其短或極其長長短之內每差一分以為一管皆即以其長權為九寸而度其圍徑如黃鍾之法焉如是而更迭之以吹則中聲可得淺深以列則中氣可驗苟聲和氣應則黃鍾之為黃鍾者信矣黃鍾者信則十一律與度量權衡者得矣後世不知出此而唯尺之求晉氏而下則多求之金石梁隋以來又參之秬黍下至王朴剛果自用遂専恃纍黍而金石亦不復考矣夫金石真偽固難盡信若秬黍則嵗有豐凶地有肥瘠種有長短小大圓妥不同尤不可恃况古人謂子榖秬黍中者實其籥則是先得黃鍾而後度之以黍不足則易之以大有餘則易之以小約九十黍之長中容千二百黍之實以見周徑之廣以生度量權衡之數而已非律生于黍也百世之下欲求百世之前之律者其亦求之于聲氣之先而母祕之于秬黍則得之矣蕙田案會要及新書皆言不必以黍定律後漢書律厯志天效於景地效於響即律也隂陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰考隂陽又曰候氣之法為室三重户閉塗釁必周密布緹縵室中以木為案每律各一內庳外髙從其方位加律其上以葭莩灰抑其內端案歷而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律六十候日如其律晉書律厯志楊泉記云取𢎞農宜陽縣金門山竹為管河內葭莩為灰或云以律著室中隨十二辰埋之上與地平以竹莩灰實律中以羅縠覆律口氣至吹灰動縠隋書音樂志後齊神武霸府田曹參軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管飛灰已應每月所侯言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感一扇自動他扇並住與管灰相應若符契焉開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以候節氣依古於三重密屋之內以木為案十有二具每取律吕之管隨十二辰位置於案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每月氣至與律冥符則灰飛衝素散出於外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月才飛少許者髙祖異之以問牛𢎞𢎞對曰灰飛半出為和氣灰全出為猛氣灰不能出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴髙祖曰臣縱君暴其政不平非日别而月異也今十二月於一嵗之內應用不同安得暴君縱臣若斯之甚也𢎞不能對李氏光地曰京房候氣之法自蔡伯喈鄭康成皆有此説則恐古人誠有其法獨十二管未必即是十二律而於長短之間原無所取故禮記正義云十二律各當其辰斜埋地下入地處卑出地處髙黃鍾之管埋於子位上頭向南則是橫插以迎諸方之氣法在於方位不存乎長短也如後齊信都芳埋輪扇二十四於地中氣至而扇自動者此必界其中間而周圜設輪以迎氣耳其於長短分數又何與乎然是法也亦古人所以驗氣之和不和如樂記所謂八風從律而不姦者耳列管候之固有應不應而又何可據是以得管也蕙田案候氣之説始於東漢志而其法不傳後人議之者不一今存之以俟考右黃鍾真度五禮通考卷七十二
