body:
  text: 五禮通考卷一百三十一刑部尚書秦蕙田撰嘉禮四朝禮蕙田案古朝禮有二書日覲四岳羣牧又曰肆覲東后周禮大行人掌朝宗覲遇㑹同聘問之事乃賔禮也周禮宰夫掌治朝之法太宰王眡治朝則贊聽治為天子日視朝之正乃嘉禮也秦漢以還有常朝有正至聖節朝賀與古不同惟常朝為周治朝之意餘皆起於後世今以朝宗覲遇等别為賔禮而屬之嘉禮者統名之曰朝禮先經後史各以類列庻古今之沿革瞭若指掌焉周禮秋官小司寇掌外朝之政注外朝朝在雉門之外者也賈疏外朝之職朝士專掌但小司寇既為副貳長官亦與朝士同掌之耳外朝在雉門之外則亦在庫門之外也蕙田案天子五門則外朝在庫門外諸侯三門則外朝在雉門外其位王南鄉三公及州長百姓北面羣臣西面羣吏東面注羣臣卿大夫也羣吏府吏也其孤不見者孤從羣臣卿大夫在公後朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石達窮民焉注鄭司農云外朝在路門外内朝在路門内元謂王五門雉門為中門閽人幾出入者窮民葢不得入也然則外朝在庫門之外臯門之内與周天子諸侯皆有三朝外朝一内朝二内朝之在路門内者或謂之燕朝蕙田案康成駁先鄭説極是又案以上外朝周禮天官宰夫掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令注治朝在路門之外其位司士掌焉宰夫察其不如儀疏燕朝在路寢庭外朝在庫門外其事希簡非常治政之所此云治朝是常治事之朝故知是路門外宰夫與司士俱是下大夫非贊治朝經云禁令知直察其不如儀式者也夏官司士正朝儀之位辨其貴賤之等王南向三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕大右太僕從者在路門之左南面西上注此王日視朝事於路門外之位彼疏此王日視朝事於路門外之位者對太僕職路寢庭有燕朝朝士職庫門外有外朝而言也王氏詳説曰天子有三朝外朝治朝燕朝是也庫門之外為外朝則路寢門外與路寢門内之朝皆為内朝矣但以日眡事則曰治朝退適路寢之庭聽政則曰燕朝内外之朝本無定名以燕朝為内朝則治朝為外朝矣庫門之朝為外朝則治朝又為内朝矣玉藻曰朝服以日眡朝於内朝退適路寢云退適路寢者是内朝之内又有内朝也是燕朝也文王世子曰其朝於公内朝則東面北上以齒其在外朝則以官司士為之夫司士所掌之朝治朝也玉藻以路寢之外為内朝而文王世子又以司士所掌之朝為外朝治朝可以兼内外之名也大僕建路鼓於大寢之門外而掌其政注大寢路寢也其門外則内朝之中如今宫殿端門下矣門疏大寢路寢也者欲見在路寢門外正朝之處云其外則内朝之中者案玉藻云視朝於内朝羣臣辨色始入彼諸侯禮天子亦然若據文王世子亦得謂之外朝故文王世子云其朝於公内朝臣有貴者以齒其在外朝則以官彼以路門外為外朝者對路寢庭朝為外朝其實彼外朝亦内朝耳以其天子諸侯皆内朝二外朝一既以三槐九棘朝為外朝一明此二者皆内朝也天官冢宰王眡治朝則贊聽治注治朝在路門外羣臣治事之朝疏王有三朝必知此是路門外朝者但外朝是斷疑獄之朝路寢庭朝圖宗人嘉事二者並於事簡非正朝故知治朝是路門外司士所掌者也郝氏敬曰治朝中朝在路門外蕙田案中朝於經無文地官師氏居虎門之左司王朝注虎門路寢門也王日視朝於路寢門外畵虎焉以明勇猛於守宜也常疏虎門是路寢門者其路寢庭朝及庫門外之朝非朝之處司士所掌路門外是常朝日所朝之所經云司王朝明據此朝故鄭以路寢門外解之朱子曰正義謂路寢庭朝及庫門外之朝非常朝此是常朝故知在路門外葢路寢朝在路門之裏議政事則在此外朝在庫門之外國有大事詢衆庻則在此非常朝也每日常朝王立於寢門外與羣臣相揖而已王又先揖羣臣就位王使入揖亦有髙下不同如天揖同姓是也胡明仲常云近世朝禮每日拜跪乃是秦法周制元不如此地官槀人掌共外内朝冗食者之食注外朝司冦斷獄弊訟之朝也今司徒府中有百官朝㑹之殿云天子與丞相舊决大事焉是外朝之存者與内朝路門外之朝也冗食者謂留治文書若今尚書之屬諸直上者蕙田案此以治朝為内朝對小司寇朝士所掌外朝而言冬官匠人外有九室九卿朝焉注外路門之表也九室如今朝堂諸曹治事處外疏九卿之九室在門正朝之左右為之蕙田案賈疏所云正朝謂治朝也儀禮聘禮管人布幕於寢門外注寢門外朝也路疏寢門外朝也者謂門外即正朝之處也蕙田案此以治朝為外朝對燕朝而言宰入具告於君君朝服出門左南面注入告入路門而告疏朝在路門外故知入路門至路寢而告君以其在路寢聴政處故也官載其幣舍於朝使者載旜帥以受命於朝注孤卿建旜至於朝門使者北面東上疏至於朝門者凡諸侯三門臯應路路門外有常朝位下文君臣皆朝列位乃使卿進使者使者乃入至朝則此朝門者臯門外矣蕙田案官載弊舎于朝及受命于朝皆治朝也諸侯當在雉門内疏以為皋門外似非禮記月令賞公卿大夫於朝注朝大寢門外玉藻諸侯朝服以日視朝於内朝注此内朝路寢門外之正朝也天子諸侯皆三朝燕疏天子諸侯皆三朝者太僕云掌燕朝之服位注云朝朝於路寢之庭是一也司士正朝儀之位云此王日視朝事於路門外是二也朝士云掌外朝之法注云外朝在庫門之外皋門之内是三也諸侯三朝者文王世子云公族朝於内朝路寢朝是一也世子又云其在外朝司士為之與此視朝於内朝皆謂路寢門外每日視朝是二也此但云内朝對中門外朝謂為内也文王世于云外朝者對路寢庭為外此據路寢門外而稱内朝明知中門之外别更有朝也諸侯三門是中門外大門内又有外朝是三朝也蕙田案此以治朝為内朝對外朝而言文王世子庻子之正於公族者其在外朝則以官司士為之其在宗廟之中則如外朝之位注外朝路寢門之外庭疏案周禮司士掌路寢門外之朝司士為之者謂司士之官主為朝位之次外朝位既司士主之則内朝庻子主之也此對路寢庭朝為外朝若對庫門外朝朝士所掌三槐九棘之朝則此路門外朝亦為内朝也故玉藻云朝於内朝其朝位天子之朝三公北面東上孤束面北上卿大夫西面北上其士門西東面北上若諸侯之朝案大射卿西面北上大夫北面東上士門西東面北上與天于不同蕙田案此外朝指治朝對内朝而言下同外朝以官體異姓也注體猶連結也國語天子及諸侯合民事於外朝合神事於内朝注神事祭祀也内朝在路門内也蕙田案韋昭注以内朝在路門内則外朝亦指治朝而言又案以上治朝周禮夏官大僕王眡燕朝則正位掌擯相注燕朝朝於路寢之庭王圖宗人之嘉事則燕朝食疏以其路寢安燕之處則謂之燕朝以其與賔客享在廟燕在寢也但與賔客及臣下燕時亦有朝必以王圖宗人嘉事為燕朝者以其因燕而朝賔臣燕禮已有成文圖宗人嘉事者朝不見故鄭特見之宗人冠昏嘉禮之等皆曰嘉事鄭氏鍔曰王有三朝而燕朝乃安燕之地親族所聚正其位而且擯之相之則王之見之也以禮而宗人之見王也不敢恃恩以犯分禮記文王世子庻子之正於公族者其朝於公内朝則東面北上臣有貴者以齒庻子治之注内朝路寢庭公族朝於内朝内親也雖有貴者以齒明父子也周禮夏官射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面注位將射始入見君之位不言士者此與諸侯之賔射士不與也燕禮曰公升即位於席西鄉小臣納卿大夫卿大夫皆入門右北面東上士立於西方東面北上大射亦云則凡朝燕及射臣見於君之禮同云疏引燕禮者欲見天子諸侯朝燕射三者位同之義凡朝燕及射臣見於君之禮同者以儀禮内諸侯有燕朝有射朝不見正朝周禮内諸侯有射朝與正朝不見燕朝諸侯射朝與燕朝位同則天子燕朝亦與射朝位同則諸侯正朝亦與射朝位同是天子諸侯三朝各自同蕙田案此賔射之位與燕朝之位同春秋成公六年左氏傳韓獻子將新中軍且為僕大夫注兼太僕公揖而入獻子從公立於寢庭注路寢之庭日疏禮玉藻云君出而視朝退適路寢聽政知寢庭路寢之庭也沈氏云太僕職云王視燕朝則正位掌擯相鄭注云燕朝朝於路寢之庭韓獻子既為僕大大故知寢庭路寢之庭也蕙田案此諸侯之燕朝又案以上燕朝陳氏禮書周官太僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝於内朝庻子掌之其在外朝司士掌之玉藻朝服以日視朝於内朝退適路寢聽政然則文王世子與玉藻所謂朝者諸侯之朝也葢天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寢燕朝也太僕掌之諸侯亦有路寢有外朝則文王世子所謂内朝者玉藻所謂路寢也玉藻所謂内朝者文王世子所謂外朝也玉藻於路寢之外言内朝則又有外朝明矣諸侯内朝司士掌之其官與天子同燕朝庻子掌之其官與天子異魯語曰天子及諸侯合民事於外朝合神事於内朝自卿以下合官職於外朝合家事於内朝然則卿大夫亦二朝也王燕朝之位雖太僕掌之然其位之所辨不可以考文王世子曰公族朝於内朝東面北上臣有貴者以齒則王之燕朝宜亦然也太僕掌路鼓於大寢之門外而掌其政以待達窮者與遽令鄭氏曰路寢門外則内朝之中葢窮者達其情於外朝之肺石朝士又達窮者之情於内朝之路鼓遽令傳遽之令也行夫掌邦國傳遽之小事則遽令非行夫之所掌者而已鄭康成以公食大夫拜賜於朝不言賔入聘禮以柩造朝不言䘮入則謂諸侯之朝在大門外然大門外則經凃耳非朝位也呉氏紱曰大門外或尚寛闊非即經凃葉氏時曰周有三朝一曰燕朝一曰治朝一曰外朝外朝之位左孤卿大夫羣士在其後右公侯伯子男羣吏在其後面三公州長衆庻在其後此朝士所掌之朝法也及致萬民而詢之則小司寇掌其政王位南向三公及州長百姓北面羣臣西面羣吏東面其位亦如朝士之儀其建朝也左嘉石以平罷民右肺石以達窮民職聽國郊野都獄訟者必聽於此兩造束矢平劑鈞金者必入於此凡得獲貨賄人民六畜者必委於此雖有帥屬鞭呼趨辟之儀有慢朝錯立族談之禁其儀非不肅也而卿大夫以大詢之時帥六卿之衆庻而致於朝百姓衆庻得外與公卿侯伯羣士羣吏相先後於階戺之間則其政誠為平易近民矣治朝之位王南向三公北面孤東面卿大夫西面王族故士虎士在路門右太僕大右太僕從者在路門左此司士所正之朝儀也及掌敘羣吏之治則宰夫掌其法以正王及三公六卿大夫羣吏之位而察其不如儀其眡朝也太僕則前正位師氏則司王朝冡宰則贊聽治雖有虎賁士族之衛有僕御右從之位其儀非不嚴也而太僕掌建路鼓於大寢門外以待達窮者與遽令聞鼓聲則速逆御僕與御庻子而受其事以聞又况宰夫掌庻民之逆得與賔客之治諸臣之復同徹於冕旒之前則其朝又未嘗以禁嚴為限矣至於燕朝之法雖在太僕只曰王視燕朝則正位掌擯相而已然曰王眡朝則前正位而退入亦如之是正燕朝亦如正治也小臣正王之燕位御僕掌王之燕令此皆燕朝之臣其儀亦非不重也而諸侯之復逆則掌於太僕三公孤卿之復逆則掌於小臣羣吏之逆庻民之復則又掌於御復者下之報上逆者下之迎於上皆上書報奏之名庻民之復得與諸侯公卿羣吏之復逆又皆同達於燕處之時則其地亦未嘗以邃深而為間隔矣觀外朝之政而及萬民之詢治朝之治而及萬民之逆燕朝之令而及庻民之復則知成周盛時户庭無壅其疏通洞達何如哉然而三朝分掌外朝雖掌於秋官之屬而三公孤卿皆在焉則是太宰與聞外朝之政矣治朝之法雖曰司士正之屬於夏官而宰夫掌其禁令王眡治朝冡宰贊之則是太宰與聞治朝之事矣燕朝之臣亦夏官之屬也然而所掌羣臣之復逆實與宰夫所掌相闗焉而况太僕雖正燕朝之位而建鼓則在路門外治朝則在路門左王眡治朝則前正位王不眡朝則辭於三公及孤卿是燕朝之臣實與治朝相通則太宰亦與聞乎燕朝之政矣以此見周人之法宫中府中實為一體而無内外之分也蕙田案天子五門曰皋庫雉應路諸侯三門曰庫雉路皆三朝一曰外朝一曰治朝一曰燕朝外朝天子在庫門外諸侯在庫門内周禮小司寇朝士所掌有三槐九棘嘉石肺石國有大事致萬民而詢則御之非常朝之處治朝在路門外周禮宰夫掌治朝之法司士正朝儀之位太宰贊聽治有路鼓有屏有宁乃每日常朝聽治處燕朝在路門内路寢之庭周禮太僕掌擯相文王世子庻子正公族公族朝於内朝鄭康成謂王圖宗人嘉事則燕朝亦非常朝處治朝又兼内外之名對外朝而言亦曰内朝玉藻朝服以視朝於内朝鄭康成謂外朝一内朝二是也對燕朝而言亦曰外朝文王世子其在外朝則以官司士為之是也路門當道設屏禮緯天子外屏諸侯内屏爾雅邢疏天子外屏在路門之外諸侯内屏在路門之内爾雅門屏之間謂之宁當宁而立諸公東面諸侯西面曰朝孔疏天子受朝於路門外之朝於門外而宁立以待諸侯之至故云當宁而立據此則天子諸侯雖有五門三門惟路門外有屏有宁非每門皆有之也至其朝儀周禮司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右太僕前王入内朝皆退玉藻朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢周禮宰夫掌諸臣之復逆葢古者常朝惟在路寢門當宁而立三揖而退其禮甚簡聽政則在路寢之堂諸臣不從入有奏事然後因宰夫以入升路寢之堂論語過位升堂即此過位過當宁之位升堂升路寢之堂無事則朝畢而退不用過位亦不用升堂朱子訓過位謂門屏之間人君宁立之處所謂宁也萬充宗謂禮器云天子諸侯臺門足知君門崇廣可即此朝見臣民又玉藻云閏月則闔門左扉立於其中益足証君門可以蒞衆不必更有朝堂矣後世御門聽政即此意附辨通典天子四朝通典周制天子有四朝一曰外朝秋官朝士掌之二曰中朝夏官司士正其位辨其貴賤之等三曰内朝亦謂路寢之朝四曰詢事之朝小司寇掌其政諸侯三朝路寢為内朝中朝在路門外外朝在應門外諸侯社稷與中朝正相當故傳云間於兩社為公室輔者也蕙田案天子三朝一曰外朝一曰治朝一曰燕朝其外朝周官小司冦及朝士共掌之賈疏謂外朝之職朝士專掌但小司寇既為副貳長官亦與朝士同掌之今案致萬民而詢其事大故掌於小司寇九棘三槐聽獄之位其事小故掌於朝士其實一朝也杜君卿通典悞分朝士小司寇所掌為兩朝於三朝之外又添一詢事之朝遂有四朝之説文獻通考亦仍其誤其實止有三朝無所謂四朝也杜又謂詢事之朝非常朝之限及以治朝為中朝以燕朝為羣公常日於此朝見君位皆與註疏不合今不録右天子諸侯三朝禮記玉藻揖私朝煇如也注私朝自大夫家之朝也疏私朝大夫自家之朝也春秋襄公三十年左氏傳鄭伯有為窟室而夜飲酒撃鐘朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷論語冉子退朝朱子註朝季氏之私朝也國語魯語公父文伯之母如季氏康子在其朝與之言弗應從之及寢門弗應而入康子辭於朝而入見曰肥也不得聞命無乃臯乎曰子不聞乎天子及諸侯合民事於外朝合神事於内朝自卿以下合官職於外朝合家事於内朝寢門之内婦人治其業焉上下同之夫外朝子將業君之官職焉内朝子將庀季氏之政焉皆非吾所敢言也陳氏祥道曰據此則卿以下有二朝矣韋昭謂外朝君之公朝内朝家朝非是萬氏斯大與應撝謙書向奉書辨大夫士正寢之外無私朝玉藻所謂私朝即正寢答教不以為然更援魯語外朝内朝証鄙言之失某以為先王之制荒逺難稽不得不憑諸傳記苐傳記多後人所述有就古初之正禮以為言者有就衰時之變禮以為言者讀者要當擇善而從不可不慎也又禮文參錯一事之本末往往互見於他書苟非㑹通以考其詳則一隅之見或不無病於偏執此又言禮者所當知也魯語云自卿以下合官職於外朝合家事於内朝先生據以為别有私朝之証必謂敬姜賢婦素稱知禮其語可信也亦知康子之時何時乎魯自季武子專政以來禄去公室君若贅旒公廟立矣昭公出矣中軍作舍矣禮樂征伐惟其所出何有於私朝至康子時僣踰既久子孫臣庻視為固然莫有覺其非度因遂有非禮之禮以相傳如敬姜之語康子者使先王之制卿大夫果得有外朝以業君之官職則冉有之謀政於私朝乃其常分孔子曷為以其事抑之是以知敬姜之語從僣後為言而非先王之制也先王之職合官職於公朝合家事於私室觀玉藻云朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服據此則知聽政路寢之時卿大夫各治官職於外考工記云外有九室九卿朝焉曲禮云在官言官玉藻云君命召在官不俟屨據此則知公門外旁皆有卿大夫治事之所迨其後諸侯微大夫僣政莫在公而私家遂有内朝外朝之號然其内朝當即正寢其外朝當亦於門葢君有臺門旅樹以為治朝而郊特牲云臺門而旅樹大夫之僣禮知衰世大夫之門皆儼然公門以為外朝不獨季氏為然矣惟晏子近市之宅湫隘囂塵不可以居若是者知其必不僣為私朝也夫然玉藻所謂私朝疑亦就僣禮為文何以言之玉藻言朝服以縞自季康子始康子卒子哀公二十七年死而後謚則記玉藻者在康子死後其時之有私朝也久矣天子諸侯路寢之外别無朝堂安得據敬姜之言謂大夫士正寢之外别有私朝也哉蕙田案玉藻揖私朝煇如也鄭注私朝大夫家之朝論語冉子退朝朱註朝季氏之私朝葢卿大夫有家臣則必有朝家臣處有家事則必有合家事處其有私朝宜也大夫二門則私朝當在大門之内寢門之外魯語敬姜曰自卿以下合官事於外朝合家事於内朝夫外朝子將業君之官職焉内朝子將庀季氏之政焉陳用之謂據此則卿以下有二朝而萬充宗則謂此衰時之變禮敬姜之語從僣後為言而非先王之制案萬説最當敬姜並舉天子諸侯及自卿以下有二朝上下同之且謂寢門之内婦人治其業則是寢門之外有内外二朝矣有二朝則又有二門通寢門為三門是以大夫而上擬諸侯之制其為僭無疑也韋昭謂外朝為君之公朝内朝家朝葢亦知其非禮而强為之説非敬姜語本義敬姜但明婦人之不可干外而不知私家之不可干公故其説如是至萬氏謂大夫士正寢之外無私朝并謂玉藻所謂私朝亦就僭禮為文則非是私朝卿大夫自有之但不得兼内外兩朝如敬姜所云耳觀承案禮天子諸侯三朝無卿大夫二朝之文萬氏説最當陳氏據魯語疑大夫有二朝非也葢朝者以下事上之通稱内則子事父母亦曰昧爽而朝惟天子諸侯得備其制故其朝也有地有時有器有官而朝之典綦重下此則聽其自相朝而不為之制卿大夫士貴賤有等矣士冠禮鄭注云大夫士服元端深衣而聽私朝則大夫士同一聽朝之法其與内則昧爽之朝何異不獨此也門與寢内外朝之所也天子五門諸侯三門卿大夫士二門天子諸侯之寢四注卿大夫之室夏屋兩下皆天子諸侯一制卿大夫士一制大夫而有内外朝也士亦有内外朝乎士之不得有内外朝則凡禮之兼大夫士者皆可例觀何獨疑於大夫大率大夫士隨其時與地與其下相見即謂之朝非當宁之比義疏曰大夫士無宁兩塾之間非宁也此可見矣即魯語而論使康子而僭為當宁之制必將有夙戒之期何文伯之母硜硜守不言之義獨不知其朝而避之康子又不自重從而與之語不應又辭其衆而即之則所謂朝者正兩塾之間偶與衆接故文伯之母不知避而康子可得辭也其言合官職於外朝卿以下之官職即天子諸侯之民事韋昭謂外朝君之公朝甚合且曰自公卿以下亦括士在内則魯語原自分明何以為二朝之據乎惟大夫之朝與内則之朝無異則有其名而不干其制故冉子退朝夫子不以為非玉藻著大夫登車之美而先言其揖私朝之煇如不然設服離衛當時即有美矣君哉之刺况朝之大者乎然則季氏雖僭實未亢然而有二朝萬氏概以僭當之亦求其説不得而為之辭右卿大夫私朝附春秋成公十六年左氏傳齊侯使士華免以戈殺國佐於内宫之朝注内宫夫人宫宫疏於夫人之宫有朝羣妾之處故云内之朝葢齊侯召入與語而殺之陳氏禮書王后夫人朝左氏曰齊侯使華免殺國佐於内宫之朝則后夫人治家事於内猶天子諸侯治邦事於外故内宫亦有朝觀承案周禮内宰以隂禮教六宫鄭注后象王立六宫而居之亦正寢一燕寢五葢王六寢小寢五正寢一正寢即燕朝之所也然則王后夫人之朝其在六宫之正寢乎諸侯之寢三正寢一小寢二君夫人亦如之則所謂内宫之朝者其即後宫之正寢乎右后夫人内宫之朝附詩大雅綿廼立臯門臯門有伉𫝊王之郭門曰臯門臯箋諸侯之宫外門曰門朝門曰應門内有路門天子之宫加以庫雉之疏明堂位云庫門天子臯門雉門天子應門是則名曰庫雉制之如臯應魯以周公之故成王特褒之使之制二兼四則其餘諸侯不然矣㐮十七年傳宋人稱臯門之晳諸侯有臯門也諸侯法有臯應太王自為諸侯之制非作天子之門矣明堂位云天子臯門天子應門顧命云二伯率諸侯入應門是天子亦有臯應故為天子之宫加之以庫雉也家語衛亦有庫門者家語言多不經未可據信或以康叔賢亦蒙褒賞故也蕙田案春秋傳澤門之晳杜注澤門宋東城南門也然則澤門乃國門非朝門孟子所云垤澤之門即此陸德明釋文云澤門本或作臯門者誤也孔氏援以證諸侯有臯門是不然矣陳氏祥道曰左傳曰魯人之臯杜氏曰臯緩也臯鼔臯舞皆以臯為緩則門之逺者謂之臯宜矣毛氏以臯門為郭門非也朱子曰書天子有應門春秋書魯有雉門禮記云魯有庫門家語云衛有庫門皆無云諸侯有臯應者則臯應為天子之門明矣意者太王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立也禮記明堂位庫門天子臯門注天子五門臯庫雉應路魯有庫雉路則諸侯三門與臯之言髙也子疏言魯之庫門制似天臯門蕙田案以上臯門禮記檀弓上君復於庫門四郊徐氏師曽曰天子曰臯門諸侯曰庫門檀弓下既卒哭宰夫執木鐸以命於宫曰舎故而諱新自寢門至於庫門注百官所在庫門宫門外百疏寢門路門庫門是魯之外門也官及宗廟所在之次至庫門咸使知之也魯三門故至庫門耳若天子五門則至臯門也軍有憂則素服哭於庫門之外魯莊公之䘮既葬而絰不入庫門疏庫門周之臯門也魯有三門庫雉路庫門最在外以從外來故至庫門去絰絰既不入衰亦不入可知矣郊特牲孔子曰繹之於庫門失之矣疏繹祭之禮當於廟門外之西堂今乃於庫門内故言失之矣獻命庫門之内戒百官也注庫門在雉門之外入庫門則至廟門之外矣家語公西赤問衛莊公之反國改舊制變宗廟髙子臯問於孔子曰周禮繹祭於祊祊在宗廟之西今衛君更之如何孔子曰繹之於庫門内祊之於東方失之矣陳氏祥道曰曲禮曰在府言府在庫言庫天文東璧為文府西奎為武庫漢書于府言財物之府于庫言武庫則庫門兵庫在焉蕙田案以上庫門春秋定公二年夏五月雉門及兩觀灾冬十月新作雉門及兩觀注雉門公宫之南門兩觀闕也門疏明堂位云庫門天子臯門雉門天子應是魯之雉門公宫南門之中門也陳氏祥道曰春秋書新作雉門及兩觀公羊傳曰五板為堵五堵為雉葢城雉之制在是也何休曰天子外闕兩觀諸侯内闕一觀然天子外闕於經無見周禮天官閽人掌守王宫中門之禁注中門於外内為中鄭司農云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門𤣥謂雉門三門也春秋傳曰雉門灾及兩觀謂疏雉門外有臯庫内有應路故云於外内為中也𤣥雉門為三門者破先鄭雉門為二門必知雉門為中門者凡平諸侯三門有臯應路詩云乃立臯門臯門有伉乃立應門應門將將者是也若魯三門則有庫雉路故明堂位説魯制三兼四云庫門天子臯門則庫門向外兼臯門矣又云雉門天子應門則雉門向内兼應門矣既云庫門向外兼臯門雉門向内兼應門則天子五門庫門在雉門外明矣又引春秋傳者證魯有三門雉門有兩觀為中門則知天子五門雉門亦為中門有兩觀矣蕙田案鄭仲師以雉門為二庫門為三康成以庫門為二雉門為三今以明堂位庫門天子臯門雉門天子應門觀之則庫門在外雉門在内康成之説不可易矣疏謂平諸侯有臯應路非是諸侯有庫雉路無臯應又案以上雉門詩大雅綿乃立應門應門將將傳王之正門曰應門書康王之誥王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右傳出畢門立應門内之中庭南面蔡傳外朝在路門外則應門之内葢内朝所在也蔡氏德晉曰外朝在庫門外臯門内内朝在路門外應門内蔡傳云外朝在路門外葢因鄭仲師之悞然路門外即應門内既云外朝在此又云内朝亦在豈内外朝並在一處者乎禮記明堂位九采之國應門之外北面東上注正門謂之應門疏正門謂之應門者以明堂更無重門非路門外之應門以爾雅釋宫云正門謂之應門李廵云宫中南向大門應門也以當朝正門故謂之應門但天子宫内有路寢故應門之内有路門明堂位既無路寢故無路門及以外諸門但有應門耳雉門天子應門疏言魯之雉門制似天子應門周禮考工記應門二徹三个注二徹之内八尺三个二丈四尺爾雅正門謂之應門注朝門一疏李廵云路門之外受朝正門名應門以正朝在應門内故謂應門為朝門也陳氏祥道曰應門發政以應物也明堂位南門之外亦曰應門葢明堂之南門猶路門故南門之外門亦謂之應門蕙田案以上應門周禮春官小宗伯縣衰冠之式於路門之外夏官司士正朝儀之位王族故士虎士在路門之右太僕太右太僕從者在路門之左注此王日視朝事於路門外之位大僕建路皷於大寢門外注大寢路寢也其門外則内朝之中如今宫殿端門下矣冬官考工記路門不容乗車之五个注路門者大寢之門乗車廣六尺六寸五个三丈三尺言不容者是兩門乃容之兩門乃容之則此門半之丈六尺五寸地官師氏居虎門之左注虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也李氏叔寶曰虎門畫虎以示威武之象至於中門為雉門亦畫雉以象文明文明著於外威武潛乎内則王之威亦德威而已春秋昭公十三年左氏傳子良伐虎門晏平仲端委立於虎門之外疏鄭元以虎門為路寢門此亦當然或以虎門非路寢門當是宫之外門書顧命二人雀弁執惠立於畢門之内傳寢門一名畢門疏天子五門臯庫雉應路也下云王出在應門之内出畢門始至應門之内知畢門即是路寢之門一名畢門也陳氏祥道曰路大也王之路車路馬路寢路皷皆曰路則大寢之門謂之路門宜矣路門書謂之畢門師氏謂之虎門春秋之時齊晏子端委於虎門鄭子良伐虎門葢末世諸侯之門亦放其名耳蕙田案諸侯三門曰庫雉路無虎名陳氏謂末世諸侯放之極是至伐虎門者齊髙彊字子良非鄭子良也誤又案以上路門禮記月令田獵罝罘羅網畢翳餧獸之藥毋出九門注天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也逺郊門也闗門也九門磔攘以畢春氣陳氏禮書月令曰毋出九門先儒謂天子外門四闗門逺近郊門國門也内門五臯庫雉應路也諸侯外門四與天子同内門三則庫雉路而與天子異詩以天子之禮追太王之事明堂位以魯之門取天子之制皆稱臯門應門又書康王之誥周禮考工記爾雅互稱應門路門郊特牲王聽誓命庫門之内戒百官也則天子之門謂之臯庫應路著矣特雉門之設不見於經然周禮掌中門之禁則中門豈雉門歟雉門謂之中門猶應門書謂之南門爾雅謂之正門路門書謂之畢門師氏謂之虎門葢中於五門謂之中門前於路門謂之南門發政以應物謂之應門門畢於此謂之畢門畫虎於此謂之虎門則門之名豈一端而已哉臯門之内外朝也朝士建其法小司寇掌其政列三槐與九棘設嘉石與肺石而朝諸侯聽訟詢大事在焉應門之内治朝也司士正其位宰夫掌其法太僕正王之位而王日視朝在焉路門之内燕朝也太僕正其位掌擯相而族人朝焉玉藻曰朝服以視朝退適路寢聽政然則王日視於治朝而退聽政於燕朝矣雉門之外縣治象所以待萬民應門之外設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之内亦九室九嬪居焉明堂位曰庫門天子臯門故魯莊公既葬而絰不入庫門衛莊公繹於庫門之内檀弓曰君復於庫門四郊又曰卒哭而諱宰夫執木鐸以命於宫自寢門至於庫門又曰軍有憂哭於庫門之外則諸侯之公門庫門也魯公周公之故猶不可以稱臯門應門特為臯應之制而已况非魯乎閽人掌王宫之中門之禁䘮服凶器不入宮潛服賊器不入宫司寇凡民之有獄訟入束矢鈞金於朝朝士凡得獲貨財人民六畜者委於朝是禁施於雉門之内而不於雉門之外故庻民得以造外朝而奇服怪民得以入臯門庫門若然縣法於中門宜矣禮運曰仲尼與蜡賔事畢出遊於觀之上榖梁曰女嫁父送之不下堂母不出祭門諸母不出闕門諸侯之廟在闕門内則天子可知鄭氏釋閽人謂廟在中門之外其説無據蕙田案古者建國必先立為門制天子五門曰臯庫雉應路禮記明堂位天子有臯門郊特牲王立於澤親聽誓命獻命庫門之内是天子有庫門周禮天官閽人掌守王宫中門之禁賈疏謂外有臯庫内有應路雉門為中門是天子有雉門書康王之誥王出在應門之内考工記應門二徹三个爾雅正門謂之應門是天子有應門路門一名寢門一名虎門一名畢門春官小宗伯縣衰冠之式於路門之外夏官司士王族故士在路門之右太僕太右在路門之左太僕建路皷於大寢門外而掌其政鄭注大寢路寢也地官師氏居虎門之左司王朝鄭注虎門路寢門也顧命二人雀弁執惠立於畢門之内孔傳路寢一名畢門是天子有路門此五門之制也臯者髙也逺也門最髙而在外故曰臯庫者藏也府庫在焉故曰庫雉取其文明也畫雉于門故曰雉門居五門之中故又曰中門應居此以應治也應治出政故又曰正門路大也王之路車路馬路皷皆曰路故寢門謂之路門寢正寢也畫虎於門以示勇猛於守故又曰虎門門於此終矣故又曰畢門此五門之義也諸侯三門曰庫雉路檀弓魯莊公之䘮既葬而絰不入庫門春秋定二年雉門及兩觀灾魯頌閟宫路寢孔碩家語衛有庫門左傳昭十年晏平仲端委立於虎門之外列國無有稱臯應者况明堂位云庫門天子臯門雉門天子應門則臯應為天子之門明矣大雅綿之篇曰廼立臯門臯門有伉廼立應門應門將將朱子謂太王時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉其説是也是庫雉路諸侯之門也儀禮士冠禮賔如主人服贊者元端從之立於外門之外鄭注外門大門外士昏禮陳三鼎於寢門外東方是大門寢門大夫士之門也曲禮孔疏云天子五門諸侯三門大夫士二門其言信矣右天子五門諸侯三門禮記禮器天子諸侯臺門家不臺門注闍者謂之臺有疏兩邊築闍為基基上起屋曰臺門諸侯保捍之重故為臺門而大夫輕故不得也闍者謂之臺爾雅釋宫文徐氏師曽曰臺門門之兩旁築土為臺而起屋於其上諸侯之禮也郊特牲臺門大夫之僣禮也方氏慤曰門之有臺所以壯國體故家不臺門而以為大夫之僣也春秋定三年左傳邾子在門臺臨廷注門上有臺萬氏斯大曰天子五門諸侯三門門皆直入無堂室相間路門内為路寢即内朝治朝外朝就門而立左傳邾子在門臺臨廷即視朝時也然則天子諸侯路寢之外别無朝堂蕙田案韓詩外傳云吾君有治事之臺即臺門也君日視朝於此門之外則廷故古人稱朝廷不稱朝堂也右臺門禮記郊特牲旅樹大夫之僭禮也注旅道也屏謂之樹樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屏諸侯内屏大夫以簾士以帷疏樹立也人君當門道立屏蔽内外為敬也旅道也所行處故以為道也引管氏塞門者據經旅樹之義云禮天子外屏諸侯内屏大夫以簾士以帷禮緯文或云大夫以簾士以帷誤也雜記管仲旅樹而反坫注旅樹門屏也論語邦君樹塞門管氏亦樹塞門解鄭曰人君别内外於門樹屏蔽之不在顓臾而在蕭墻之内解鄭曰蕭之言肅也墻謂屏也君臣相見之禮至屏而加肅敬焉是以謂之蕭墻爾雅釋宮屏謂之樹注小墻當門中自疏屏蔽也樹立也立墻當門以蔽也李廵曰垣當門自蔽名曰樹諸侯内屏在路門之内天子外屏在路門之外而近應門者矣荀子大畧篇天子外屏不欲見外也諸侯内屏不欲見内也陳氏禮書古者門皆有屏天子設之於外諸侯設之於内禮臺門而旅樹旅道也當道而設屏此外門之屏也治朝在路門之外天子當宁而立宁在門屏之間此路門之屏也國語吳王背屏而立夫人向屏此寢門内之屏也魯廟疏屏天子之廟飾此廟門之屏也月令天子田獵整設於屏外此田防之屏也疏屏疏通之也爾雅云屏謂之樹語曰吾恐季孫之憂在蕭墻之内則屏謂之樹又謂之蕭墻漢之時東關罘思灾鄭康成釋明堂位曰屏若今浮思釋匠人曰城隅角浮思孔頴達謂浮思小樓也城隅及闕皆有之而屏亦然則屏又謂之浮思孔子以管仲樹塞門為不知禮禮記以旅樹為大夫之僭而禮緯謂大夫以簾士以帷於理或然天文屏四星在端門之内近右執法然則先王設屏非苟然也右門屏禮記曲禮下天子當宁而立諸公東面諸侯西面曰朝疏天子當宁而立者此為春夏受朝時也宁者爾雅中門屏之間謂之宁謂天子受朝於路門外之朝於門外而宁立以待諸侯之至故云當宁而立也詩齊風俟我于著乎而傳門屏之間曰著朝疏孫炎曰門内屏外人君視所宁立處也著與宁音義同爾雅釋宮門屏之間謂之宁注人君視朝所宁立之處疏謂路門之外屏樹之内人君視朝宁立之處因名曰宁論語過位色勃如也足躩如也其言似不足者解包曰過君之空位處疏君之空位謂門屏之間人君宁立之君雖不在此位人臣過之宜敬也朱子集註位謂君之虚位謂門屏之間人君宁立之處所謂宁也君雖不在過之必敬不敢以虚位而慢之也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也語類位君之虚位謂門屏之間如今人廳門之内屏門之外似周禮所謂外朝也問過位色勃如也位謂門屏之間人君宁立之處曰古今之制不同今之朝儀用秦制也古者朝㑹君臣皆立故史記謂秦王一旦捐賔客而不立朝君立於門屏之間屏者乃門間蕭墻也今殿門亦設之設位於庭中故謂之三槐九棘者廷中有樹處公卿位當其下附辨論語過位諸説不同饒氏魯曰門屏之間謂治朝也但天子外屏其屏在路門外諸侯内屏其屏在路門内諸侯當在屏外門内此為不同爾蕙田案天子諸侯雖有外屏内屏之别而宁立之處皆在路門之外門屋之内當扉之中不得泥門屏之間四字而謂諸侯宁立之處在路門内也林氏希元曰此是外朝人君聼治之所故又為治朝入則為内朝矣下文攝齊升堂則内朝也蕙田案林説是汪氏份曰諸侯三朝庫門内之外朝非君所常御路寢即燕朝羣臣不從君入葢羣臣日所常朝之地乃在治朝此章記夫子在朝之容則所謂攝齊升堂者必當在此存疑悞以過位為治朝而以升堂為路寢之内朝案朱註位君之虚位若以此為治朝則羣臣方日視朝於此何縁人君乃有虚位何縁不行朝禮而反過之况朱子語類引周禮所謂外朝不引文王世子所謂外朝且言三公九卿以下有三槐九棘云云此非最外之外朝而何既知此為最外之外朝則過此所升之堂雖先儒無明文可以知為治朝無疑也蕙田案論語過位過治朝門屏間君所宁立之位也升堂升路寢之堂也復其位復治朝中庭左右臣所立之位也或疑治朝為君日視朝之所何以有虚位夫子何以不行朝禮而過之不知過位升堂皆既朝以後事入雉門遂行朝禮君當宁而立諸大夫立於中庭左右君三揖禮畢退適路寢聽政諸大夫不得從入有宰夫小臣掌諸臣復逆諸大夫有所啟奏乃得因之以入於是有過位升堂之事葢君既退入路寢門屏間宁立之地已為虚位也或以過位之位為朝士所掌外朝之位升堂之堂為治朝之堂不知治朝君立於門屏間無堂可升外朝非常朝之所無當宁之位爾雅門屏之間謂之宁疏云天子外屏在路門外諸侯内屏在路門内朝士所掌外朝在庫門内雉門外無屏亦無宁也或以復其位之位即在堂下不知路寢之庭惟宗族朝於此異姓之臣惟燕得列位於此尋常朝位皆在路門外有所啟奏乃入奏畢即出堂下固無位也或又以復其位之位在外朝不知尋常朝位俱在治朝夫子不應舎治朝之正位而逺至外朝饒氏及林氏俱以過位為治朝之位升堂為路寢之堂汪氏非之反多謬解矣附辨釋宮門之内兩塾之間謂之宁朱子釋宮聘禮賔問卿大夫迎於外門外及廟門大夫揖入擯者請命賔入三揖並行鄭注大夫揖入者省内事也既而俟於宁也凡至門内霤為三揖之始上言揖入下言三揖並行則俟於霤南門内兩塾間可知矣李廵曰宁正門内兩塾間義與鄭同謂之宁者以人君門外有正朝視朝則於此宁立故耳欽定儀禮義疏大夫士本無所謂宁者注家强以門内兩塾當之非其實也即天子諸侯宁立之處亦不在此周官司士正朝儀之位天子之治朝也聘禮夕幣及受命于朝諸侯之治朝也皆立於路門之外未有在門内者若在門内兩塾之間則何以徧揖羣臣乎天子外屏屏在路門之外天子負之而立屏近而門稍逺諸侯内屏屏在路門之内諸侯在門外遥負之以立門近而屏稍逺曰門屏之間謂之宁者猶言門屏相近之處未可執二者之中間以求之也若泥於二者之間内屏者宁在門之内則不便於揖羣臣外屏者宁在屏之外則直幾於面墻矣而可乎曲禮疏謂天子外屏屏在路門之外而近應門亦慮面墻之不可而又泥間字耳若近應門則仍是内屏不必舎近求逺取節於路門而曰外屏矣覲禮侯氏肉袒告聽事出自屏南適門西則屏在門外而距門不逺可見也廟門如此路門可推蕙田案曲禮云天子當依而立又云天子當宁而立依在室户牖間當之即負之也則宁亦即在門屏間天子負之而立可知兩當字自屬一例註家訓為兩塾之間者殊未確也義疏分辨極明右宁五禮通考卷一百三十一
