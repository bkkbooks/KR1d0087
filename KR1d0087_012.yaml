body:
  text: 五禮通考巻二刑部尚書秦蕙田撰吉禮二圜丘祀天周禮春官大司樂冬日至于地上之圜丘奏之疏言圜丘者按爾雅土之髙者曰丘取自然之丘圜者象天圜既取丘之自然則未必要在郊無問東西與南北方皆可蕙田案賈分丘與郊為二故云未必要在郊無問東西南北方皆可斯謬甚矣禮記祭法燔柴于泰壇祭天也注壇封土為祭處壇之言坦也坦明貌也疏此祭感生之帝于南郊按禮器云至敬不壇此云燔柴于泰壇者謂燔柴在壇設饌在地郊特牲兆於南郊就陽位也方氏慤曰兆則為之分域如龜兆之可别也既曰兆于南郊矣又曰掃地而祭者葢築壇謂之兆若兆五帝于四郊是矣掃地亦謂之兆若此所言是矣禮器因吉土以饗帝于郊馬氏晞孟曰天者髙之極者也故為髙必因丘陵因髙而事之所謂因天事天也因吉土以享帝于郊因天之事也陸氏佃曰因天事天因地事地燔柴瘞埋于此葢有奥㫖存焉而昧者不知也至敬不壇掃地而祭注燔柴訖於壇下地而設正祭此周法也郊特牲祭天掃地而祭焉于其質而已矣逸周書作雒乃設兆於南郊祀以上帝爾雅非人為謂之丘廣雅圜丘太壇祭天也禮記外傳王者冬至之日祭昊天上帝于圜丘諸侯不祭天通典壇名泰壇在國南五十里司馬法百里為逺郊近郊五十里陳氏禮書祀天于南郊地上之圜丘祭地于北郊澤中之方丘泰壇自然之丘泰折人為之坎壇設于圜丘之南坎設于方丘之北古者郊祀如此更秦則興鄜宻上下之四畤以祀五帝至漢則増之以北畤以祠五帝秦之祀天不於圜丘謂天好隂而兆於髙山之下其祠地不於方丘謂地貴陽而兆於澤中之圜丘漢之祠天不於南郊而於甘泉其祀地不於北郊而於汾陰河東以至壇有八觚席有六采樂有玉女車有鸞路騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蠭起一時元始之間謬戾尤甚春秋則天地同牢于南郊冬夏則天地分祭于南郊先王之禮隳廢殆盡良可悼也附諸儒辨鄭氏郊丘不同周禮春官大宗伯以禋祀祀昊天上帝鄭注冬至於圜丘所祀天皇大帝禮記大傳不王不禘鄭注大祭其先祖所由生謂郊祀天也王者之先祖皆感大微五帝之精以生皆用正歳之正月郊祭之祭法有虞氏禘黄帝鄭注此禘謂祭昊天於圜丘也祭上帝於南郊曰郊燔柴於泰壇孔疏此祭感生之帝於南郊一大司樂賈疏禮天神必於冬至者以天是陽冬至陽生還於陽生之日祭之也至於郊天必於建寅者以其郊所感帝以祈榖實取三陽爻生之日萬物出地之時郊特牲孔疏其祭天之處冬至則祭于圜丘圜丘所在雖無正文應從陽位當在國南故魏氏之有天下營委粟山為圜丘在洛陽南二十里然則周家亦在國南但不知逺近者其五時迎氣則在四郊故小宗伯云兆五帝于四郊鄭云春迎青帝于東郊夏迎赤帝于南郊季夏迎黄帝亦于南郊秋迎白帝于西郊冬迎黒帝于北郊司馬法百里逺郊鄭注書序云近郊半逺郊去國五十里謂今河南洛陽相去則然是天之郊去國皆五十里也其夏正祭感生之帝亦于南郊知者孝經緯云祭帝于南郊就陽位是也其雩祭五天帝亦于國城南故鄭注論語云沂水在魯城南雩壇在其上是也其九月大享五帝則在明堂鄭駁異義云明堂在國之南丙巳之地三里之外七里之内其圜丘之祭崔氏云其初先燔柴及牲玉于丘訖次乃埽丘下而設正祭若夏正及五郊初則燔柴及牲玉于壇故祭法云燔柴于泰壇祭天也次則于壇下埽地而設正祭故禮器云至敬不壇掃地而祭是也蒼王肅以郊丘是一而鄭氏以為二者案大宗伯云璧禮天典瑞又云四圭有邸以祀天是玉不同宗伯又云牲幣各放其器之色則牲用蒼也祭法又云燔柴于大壇用騂犢是牲不同也又大司樂云凡樂圜鍾為宫黄鍾為角太蔟為徴姑洗為羽冬日至于地上之圜丘奏之若樂六變則天神皆降上文云乃奏黄鍾歌大吕舞雲門以祀天神是樂不同也故鄭以云蒼璧蒼犢圜鍾之等為祭圜丘所用以四圭有邸騂犢及奏黄鍾之等以為祭五帝及郊天所用王氏肅曰郊即圜丘圜丘即郊所在言之則謂之郊所祭言之則謂之圜丘於郊築泰壇象圜丘之形以丘言之本諸天地之性故祭法云燔柴於泰壇則圜丘也郊特牲云周之始郊日以至周禮云冬至祭天於圜丘知圜丘與郊是一也又曰郊與圜丘是一郊即圜丘也猶王城與京師異名而同處馬氏晞孟曰郊者圜丘之地而圜丘者郊之壇康成以圜丘祭天而郊祭感生帝非也陳氏禮書鄭氏之徒謂四圭之玉黄鍾大吕之樂夏至以祀感帝於南郊蒼璧之玉六變之樂冬至日禮天皇大帝在北極者于圜丘天皇大帝耀魄寳也五帝大微之帝也分郊與丘以異祀别四帝與感帝以異其禮王肅嘗攻之矣蕙田案郊丘非二地無二祭王肅謂郊即圜丘圜丘即郊馬氏謂郊者圜丘之地圜丘者郊之壇蓋王者于國之南郊因吉土以築壇郭璞曰地有吉氣土隨而起禮器云因吉土以享帝于郊是也爾雅非人為謂之丘吉土必髙故曰丘築壇象天之圜故曰圜丘亦曰泰壇泰壇即圜丘圜丘即吉土故曰至敬不壇蓋以自然之丘為壇為髙必因丘陵而非謂祭天無壇也記曰于郊故謂之郊則舉一郊而圜丘泰壇統之是無二地矣周禮冬日至祭天于圜丘郊特牲周之始郊日以至則非二祭矣乃註疏于大宗伯大傳祭法郊特牲大司樂誤以郊丘為二地二祭于是所祀之帝則有天皇大帝及感生帝之異豈知天一而已無二天安有二帝至感生帝之說尤屬不經王肅已非之所配之帝遂有帝嚳后稷分配之異夫大傳所云禘也宗廟之大祭非祭天也乃鄭氏誤以禘為郊天于是遂有帝嚳配天之說不知郊是祭天配者稷也非嚳也然鄭氏所以分郊丘為二地二祭者孔疏大宗伯云蒼璧禮天典瑞云四圭有邸以祀天是玉不同考蒼璧四圭非兩玉也蒼言其色璧言其質四圭言其製四圭四面各一圭蒼以象天之色璧以象天之圓四圭以象天之四時尺有二寸以象天之十有二月圭之本著于一璧亦以象乾元統天也本不必分為二玉又何緣為兩祭之證耶又徐邈曰璧以禮神圭以自執故曰植璧秉圭非圜丘與郊各有所執楊信齋曰於蒼璧言禮於四圭有邸言祀說者謂禮神在求神之初祀神在薦獻之初蓋一祭而兩用即如是說則亦足以破鄭氏兩祀之謬矣孔疏又云大宗伯牲幣各放其器之色則牲用蒼祭法云用騂犢是牲不同楊信齋曰天道渾全陰陽五行具備不比五方偏主一色逺望則其色蒼純陽則其色赤故說卦曰乾為大赤周為赤色用騂犢又何以蒼璧為疑夫玉以禮天至敬也故取象天之色牲則各從所尚如𤣥牡白牡之類若玉必用赤則且混于赤璋之色矣何玉與牲必同色耶孔疏又云冬日至圜鍾為宫祀天神乃奏黄鍾歌大吕是樂不同陸佃曰圜鍾降神之樂也故曰凡樂圜鍾為宫冬日至于圜丘奏之天神皆降黄鍾祀神之樂也故曰乃奏黄鍾以祀天神所用之樂雖不同不害其為同祭斯亦理之可信者據此則鄭注之所拘泥者可以盡破而帝天之殊號配祭之異帝尤為惑于䜟緯而不足辨者矣右郊壇易豫卦象上傳雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考禮記祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王陳氏禮書禘非祀天而文在郊上者以其祖之尤逺故也祖宗非皆祀明堂而文在郊下者以其祖有功宗有徳而廟不遷故也虞夏商以質而親親故郊其近而祖其逺周以文而尊尊故郊其逺而祖其近鄭康成謂虞夏宜郊顓頊商宜郊契其説非也國語魯語展禽曰有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊冥而宗湯周人禘嚳而郊稷祖文王而宗武王陳氏禮書言虞氏郊宗異于祭法者賈氏曰虞氏之後在夏商為二王後有郊禘祖宗之禮是也由是推之國語言商人禘舜亦異于祭法者蓋宋禮與附辨註疏諸家禘郊祖宗皆配天嚳稷分配圜丘郊圜丘郊名禘祭禮記祭法有虞氏禘黄帝鄭注禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾下有禘郊祖宗孝經曰宗祀文王於明堂以配上帝明堂月令春曰其帝太昊其神勾芒夏曰其帝炎帝其神祝融中央曰其帝黄帝其神后土秋曰其帝少昊其神蓐収冬曰其帝顓頊其神𤣥冥有虞氏以上尚徳禘郊祖宗配用有徳者而已自夏以下稍用其姓氏之先後之次有虞氏夏后氏宜郊顓頊殷宜郊契孔疏此一經論有虞氏以下四代禘郊宗祖所配之人經傳之文稱禘非一其義各殊論語云禘自既灌及春秋禘於太廟謂宗廟之祭也喪服小記云王者禘其祖之所自出大傳云禮不王不禘謂祭感生帝於南郊也此禘鄭謂祭昊天於圜丘者以文在於郊祭之上郊前之祭惟圜丘爾爾雅釋天云禘大祭比餘處為大祭故總得稱禘也按聖證論以此禘黄帝是宗廟五年祭之名虞氏之祖出自黄帝顓頊是虞帝七世祖以顓頊配黄帝而祭是禘其祖之所自出以其祖配之非鄭義也鄭云祭五帝五神於明堂曰祖宗者以明堂月令五時皆有帝及神又月令季秋大享帝故知明堂之祭有五人帝及五天帝也孝經云宗祀文王於明堂以配上帝故知於明堂也孝經云宗祀文王此云祖文王宗武王故知祖宗通言也此祖宗祭五帝郊特牲祭一帝而在祖宗上者以其感生之帝特尊之虞氏禘郊祖宗之人皆非虞氏之親是尚徳也夏之郊用鯀是稍用其姓代之但不盡用己姓故云稍也云先後之次虞夏宜郊顓頊殷人宜郊契者今虞先云郊嚳後云祖顓頊夏先云郊鯀後云祖顓頊殷先云郊冥後云祖契是在前者居後在後者居前故云冝也周禮大司樂鄭注祭法曰周人禘嚳而郊稷謂此祭天圜丘以嚳配之孝禮記大傳鄭注大祭其先祖所由生謂郊祀天也經曰郊祀后稷以配天配靈威仰也圜郊特牲孔疏王肅以郊特牲周之始郊日以至與丘同配以后稷鄭必以為異圜丘又以帝嚳配者鄭以周郊日以至自是魯禮故注郊特牲云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事鄭必知是魯禮非周郊者以宣三年正月郊牛之口傷是魯郊用日至之月案周郊祭天大裘而冕郊特牲云王被衮戴冕璪十有二旒故知是魯禮非周郊也又知圜丘配以帝嚳者案祭法云周人禘嚳而郊稷禘嚳在郊稷之上稷卑於嚳以明禘大于郊又爾雅云禘大祭也大祭莫過於圜丘故以圜丘為禘也圜丘比郊則圜丘為大祭法云禘嚳是也若以郊對五時之迎氣則郊為大故大傳云王者禘其祖之所自出故郊亦稱禘其宗廟五年一祭比毎嵗常祭為大故亦稱禘也以爾雅惟云禘為大祭是文各有所對也后稷配天見于周頌故思文云思文后稷克配彼天周若以嚳配圜丘詩頌不載者后稷周之近祖王業所基故配感生之帝有勤功用故詩人頌之嚳是周之逺祖為周無功徒以逺祖之尊以配逺尊天帝故詩無歌頌或曰詩本亦有也但後來遺落故正考甫得商之遺頌十二篇至孔子之時唯五篇而已以此言之明詩有遺落也其所配之人虞夏商周用人各異文具祭法圜丘之祭周人則以嚳配之祭法禘嚳是也其感生之帝則以后稷配之五時迎氣及雩祭則以五方人帝配之九月大享五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人帝則謂之宗崔氏云皆在明堂之上祖宗通言故祭法云祖文王文王稱祖孝經云宗祀文王于明堂是文王稱宗文王既爾則武王亦有祖宗之號故云祖宗通言趙氏匡采曰虞氏禘黄帝蓋舜祖顓頊出於黄帝則所謂禘其祖之所自出也郊嚳者帝王郊天當以始祖配天則舜合以顓頊配天也為身繼堯緒不可捨唐之祖故推嚳以配天而舜之世系出自顓頊故以為始祖情禮之至也舜宗堯當禹身亦宗舜凡祖者剏業傳世之所出也宗者徳髙而可尊其廟不遷也夏后氏禘黄帝義同舜也郊鯀者禹尊父且以有水土之功故以配天祖顓頊者禹世系亦出于顓頊也宗禹者當禹身亦宗舜子孫乃宗禹也殷祖契出自嚳故禘嚳冥有水功故郊冥以配天湯出契後故祖契宗湯者當湯身未有宗也周禘嚳義與殷同稷有播植之功且為始祖故郊稷當武王身亦未有宗楊氏復曰嘗以大戴禮帝繋及司馬史記考之乃知趙伯循之言確乎不可易也祭法有虞氏禘黄帝夏后氏亦禘黄帝殷人禘嚳周人禘嚳者黄帝生昌意昌意生帝顓頊顓頊生窮蟬窮蟬至瞽瞍皆微為庶人舜嗣帝位以帝顓頊為祖廟黄帝者帝顓頊之所自出也故禘黄帝於帝顓頊之廟而以帝顓頊配之也昌意生帝顓頊顓頊生鯀鯀生禹禹者黄帝之元孫而帝顓頊之孫也故夏后氏亦禘黄帝於帝顓頊之廟而以帝顓頊配之也殷祖於契契母曰簡狄有娀氏之女為帝嚳次妃吞𤣥鳥而生契帝嚳者契之所自出故殷人禘嚳于契之廟而以契配之也周祖於稷稷之母姜嫄為帝嚳元妃姜嫄出郊見巨人跡踐之而生稷帝嚳者稷之所自出故周亦禘嚳于后稷之廟而以稷配之也祭法有虞氏郊嚳夏后氏郊鯀殷人郊冥周人郊稷者黄帝生元嚻元囂生蟜極蟜極生髙辛是為帝嚳帝嚳生堯帝嚳即堯之父也帝顓頊則舜之祖也有虞氏當以帝顓頊配天為身嗣堯位故推帝嚳以配天而以帝顓頊為祖仁之至義之盡也祭法曰禹能修鯀之功夫鯀治水九載非無功也但以蔽於自用而績用弗成禹能修鯀之功則前日未成之功至是成矣故夏后以鯀配天也冥者契六世孫也冥勤其官而水死祭法推其功烈至與先聖並稱故殷人以冥配天也禮以祖配天后稷周之太祖克配彼天此則無可疑也有虞氏祖顓頊而宗堯夏后氏祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王者帝顓頊者有虞氏異代之祖以功徳而祖之也有虞氏宗堯亦以功徳而宗之也國語注曰虞以上尚徳是也夏后氏之祖顓頊猶有虞氏也禹啟夏祚既以顓頊為祖故夏后氏祖顓頊而宗禹至其後世子孫乃以禹為受命之祖書曰明明我祖是也湯革夏命為殷之祖然殷之功始於契故殷人祖契而宗湯後世子孫乃以湯為受命之祖詩曰衎我烈祖是也又其後殷有三宗祖甲曰太宗太戊曰中宗武丁曰髙宗亦有徳而可宗周公作無逸舉殷三宗以戒成王然則三宗亦為不毁之廟也武王革殷命為周之祖然武王之功起于后稷故周以后稷為太祖不言周人祖稷者周人郊稷以祖配天則祖稷不言可知矣文王受命作周故以文王為受命之祖所謂文世室是也文王為祖故武王為宗當武王之身亦未有宗後世始立武王之廟為宗所謂武世室是也凡此皆趙伯循己開其端特從而推明之爾馬氏晞孟曰禘者三年一祫五年一禘之禘郊者祭天於圜丘之郊祖者所以祖有功宗者所以宗有徳先王四時之祭則有常禮以常禮為未足以極其追逺之意而又為禘以祭則及其所出之祖先王宗廟之制則有常數以常數為未足盡祭享之意而又立廟以尊之則及於所祖宗之廟禮不王不禘王者禘其祖之所自出以傳攷之虞夏者黄帝之所自出也故虞夏禘黄帝商周者嚳之所自出也故商周禘帝嚳王氏肅曰鄭𤣥以祭法禘黄帝及嚳為配圜丘之祀祭法說禘無圜丘之名周官圜丘不名為禘是禘非圜丘之祭也𤣥既以祭法禘嚳為圜丘又大傳王者禘其祖之所自出而𤣥又施之於郊祭后稷是亂禮之名實也案爾雅云禘大祭也繹又祭也皆祭宗廟之名則禘是五年大祭先祖非圜丘及郊也周立后稷廟而嚳無廟故知周人尊嚳不若后稷之廟重而𤣥說圜丘祭天祀大者仲尼當稱昔者周公禘祀嚳圜丘以配天今無此言知禘配圜丘非也又詩思文后稷配天之頌無帝嚳配圜丘之文知郊即圜丘圜丘即郊趙氏匡采曰禘之所及者最逺故先言之耳豈關圜丘哉祖之所自出鄭云謂感生帝靈威仰也此何妖妄之甚楊氏復曰案天子七廟左昭右穆世滿而迭毁惟禘郊祖宗四條乃宗廟之大祭世世不絶不可以宗廟之常禮論也禘者禘其祖之所自出而以其祖配之也郊者郊天以祖配食也祖者祖有功宗者宗有徳祖宗之廟世世不毁也禘禮見於大傳小記子夏傳郊禮見於孝經大雅周頌祖有功宗有徳見於王肅賈誼劉歆韋𤣥成蓋禘與祖宗三條皆宗廟之祭無與乎祀天唯郊一條為配天之祭經傳昭然不可誣也祭法禘在郊上者謂郊以祖配天禘上及其祖之所自出禘逺而祖近故禘在郊上也鄭氏見禘在郊上便謂禘大於郊遂強分圜丘與郊為二以禘為冬至日祀昊天上帝於圜丘而以嚳配之以郊為祭感生帝於南郊而以稷配之既謂禘郊皆為配天矣遂併以祖宗為祀五帝於明堂而以祖宗配之輕肆臆說附經而行居之不疑王肅諸儒力詆其非不能勝也此無他王肅諸儒之說正矣又以禘為五年殷祭之名其擇猶未精其義猶未彰也唐趙伯循生於二千歳之後獨得其說於祭法大傳小記子夏傳之中於是禘郊祖宗之義煥然而大明言雖簡約而義己該備故朱子深有取焉又曰大司樂冬至圜丘一章與禘祭絶不相關而註妄稱圜丘為禘祭法禘祖宗三條分明說宗廟之祭惟郊一條謂郊祀以祖配天爾而註皆指為祀天大傳禮不王不禘一章言王者禘其祖之所自出諸侯只及其太祖大夫惟有功始祫其髙祖所論宗廟之祭降殺逺近爾於祀天乎何與而註妄指為祀感生帝竊嘗疑鄭康成博洽大儒解釋他經最為有功及注此三章則同歸於誤其病果安在乎蓋讀祭法不熟而失之也夫祭法歴叙四代禘郊祖宗之禮禘文皆在郊上蓋謂郊止於稷而禘上及乎嚳禘之所及者最逺故先言之耳鄭氏不察謂禘又郊之大者於是以祭法之禘為祀天圜丘以嚳配之以大傳之禘為正月祀感生帝於南郊以稷配之且祭法之禘與大傳之禘其義則一皆禘其祖之所自出也鄭氏強析之而為祀天兩義遂分圜丘與郊為兩處昊天上帝與感生帝為兩祀嚳配天與稷配天為兩事隨意穿鑿展轉枝蔓何其謬耶文獻通考馬氏曰祀天莫大于郊祀祖莫大于配天四代之郊見於祭法經文簡畧後之學者莫不求之鄭註而註之叢雜牴牾如此先儒謂其讀祭法不熟見序禘于郊之上於是意禘之所祀者亦天也故盡以為祀天然康成漢人也西漢之所謂郊祀蓋襲秦之制而雜以方士之説曰太一曰五帝叢雜而祀之皆謂之郊天太史公作封禪書所序者秦漢間不經之祠而必以舜類上帝三代郊祀之禮先之至班孟堅則直名其書曰郊祀志蓋漢世以三代之所謂郊祀者祀太一五帝於是以天為有六以祀六帝為郊自遷固以來議論相襲而然矣康成注二禮凡祀天處必指以為所祀者某帝其所謂天者非一帝故其所謂配天者亦非一祖于是釋禘郊祖宗以為或祀一帝或祀五帝各配以一祖其病葢在于取䜟緯之書解經以秦漢之事為三代之事然六天之祀漢人崇之六天之說遷固志之則其謬亦非始于康成也蔡氏徳晉曰禘與祖宗非祭天之名帝嚳及武王于周未嘗有配天之事不得謂冬至圜丘為禘以嚳配季秋明堂為祖宗以文武並配也祭法之禘與大傳小記之禘其義則一不得以祭法之禘為祀天圜丘以大傳小記之禘為正月祀感生帝于郊也大雩大享並非祀五帝不得配以五人帝徧及五人臣又不得于大享時抗五神于五帝之列而以文武並配也蕙田案祭有郊有宗廟周禮大宗伯禋祀昊天上帝于圜丘月令天子元日祈穀于上帝左傳郊祀后稷以祈農事月令大雩帝左傳龍見而雩圜丘以冬至祈穀以孟春雩以仲夏三者皆郊祭天也禘以祭始祖所自出之帝祫以合祭毁廟未毁廟之主祠禴嘗烝謂之時享皆宗廟之祭也二者固截然矣乃鄭康成注大司樂冬日至圜丘奏之曰此禘大祭也是以圜丘為禘也注祭法有虞氏禘黄帝曰此禘謂祭昊天于圜丘是以禘為圜丘也注大傳禘其祖之所自出曰謂郊祀天也孝經曰郊祀后稷以配天配靈威仰也是又以郊為禘也既分郊丘為二祭又合郊丘為禘祭惑誤滋甚王肅發其端趙氏楊氏詳其辨諸家從而引伸之可謂廓如矣孝經昔者周公郊祀后稷以配天宗祀文王于明堂以配上帝吕氏大臨曰郊者推其祖之功徳可以配天者祀天於郊以所配者配之故曰郊宗者以功徳可宗祀帝於明堂則以其宗配之周氏諝曰孔子曰郊祀后稷以配天宗祀文王於明堂以配上帝今以周人禘郊祖宗之法推之則有虞氏郊嚳夏后氏郊鯀殷人郊㝠皆為配天於圜丘而祖顓頊與契之類疑為配帝於明堂然昊天尊於五帝而后稷先於文王則后稷配天文王配帝可也而顓頊則先於帝嚳與鯀而契又先於冥今帝嚳與冥反配天於圜丘而顓頊與契反配帝於明堂何也記曰禮雖先王未之有而可以義起葢明堂之禮唯見於序周頌者之與孝經是明堂之禮虞舜夏殷之世未之有而唯起於周公則由殷而上所謂祖者固未嘗配祭於帝也又虞夏殷之世其禮猶質而不若周之文故所謂祖者即大祖也而為大祖者其廟不毁於萬世而其祭嘗行於四時則尊而且親所謂郊者其廟不免於毁而又止配祭於圜丘而已則尊而不親此虞舜夏殷之世所以用其先而尊者為祖後而卑者為郊至周則有祖有宗而復有大祖故后稷為大祖而配天於圜丘文王復為祖而配帝於明堂葢文之極於周也如此陳氏祥道曰天之精氣則一而吾之祖考不可以同配故或郊之以配於圜丘或祖宗之以配於明堂所謂祖宗者葢離而貳之則有祖有宗合而一之則皆謂之宗故此以文王為祖而孝經又以文王為宗也然則孝經以明堂始於周公則虞夏殷之祀祖宗其亦有明堂乎葢明堂之名雖始於周公而夏虞之祀祖宗未必非明堂之類也程子曰天與帝一也天言其體也帝言其主也在郊則言天以其冬至物生之始故祭於圜丘而配以祖陶匏藁鞂埽地而祭宗祀言上帝以季秋物成之時故祭以明堂而配以父以宗廟之禮享之楊氏復曰鄭以祀五帝五神於明堂而以文王武王配之謂之祖宗夫孝經所云宗祀文王於明堂以配上帝此嚴父之義也抗五神於五帝之列而以文武並配於理自不通矣况祖宗乃二廟不毁之名於配食明堂何關焉家語郊問定公問曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本乎天人本乎祖郊之祭也大報本返始也故以配上帝大戴禮朝事篇祀天於南郊配以先祖所以教民報徳不忘本也春秋定三年公羊傳郊則曷為必祭稷王者必以其祖配注祖謂后稷王者則曷為必以其祖配自内出者無匹不行自外至者無主不止注匹合也無所與㑹合則不能行詩周頌思文序曰思文后稷配天也疏后稷配南郊右配帝禮記郊特牲郊之祭也大報天而主日也注大猶徧也天之神日為尊者疏徧報天之一切神而天之諸神唯日為尊故此祭日為諸神之主故云主日也不用所出之帝為主而主日者所出尊不與諸神為賓主也猶如君燕羣臣使膳宰為主人不以君為主也陸氏佃曰禮務質畧是之謂大報若社不美不足為報也故曰内之為尊外之為樂少之為貴多之為美馬氏晞孟曰郊者所以祀天昊天上帝者天之貴神也神不得見故大報天而以日為主祭于壇而列於衆星之上葢日者陽之精也祭義言大報天而主日配以月而於此不言配以月者文畧也祭義郊之祭大報天而主日配以月注主日者以其光明天之神可見者莫著焉報疏郊之祭者謂夏正郊天大報天者謂於此郊時大天之衆星雖是春祈天生養之功大故稱大報天而主日配以月者謂天無形體縣象著明不過日月故以日為百神之主配之以月自日以下皆祭特言月者但月為重以對日耳葢天帝獨為壇其日月及天神等共為一壇故日得為衆神之主也周氏諝曰大報天當以昊天為主此言主日誤矣楊氏復曰禮家或謂郊祀上帝則百神從祀然乎曰郊之祭也大報天而主日配以月傳記屢言之竊意垂象著明莫大乎日月日月之明即天之明也故祭天而主日配以月非必百神悉從祀也月令仲夏大雩帝大雩之後乃命百縣雩祀百辟卿士季秋大饗帝大饗之後乃使有司嘗羣神告備於天子先後輕重固有節文矣以此類推之祀天之後乃祭百神蓋可知也莫尊於天莫重於郊祀精一以饗唯恐誠意之不至豈容溷以百神之祀乎舜之嗣位也肆類於上帝而後禋於六宗望於山川徧於羣神非類於上帝之時合祀六宗百神也告祭之禮簡矣猶有先後之序况郊祀大禮乎大司樂言樂六變則天神皆降者至和感召融液貫通上帝降鑒而百神皆降猶鑾輿順動而千官景從者理也禋祀則専主乎昊天上帝不容溷也案三正記曰郊後必有望又凡以神仕者以冬至日祭天神人鬼註云致人鬼於祖廟蓋用祭天之明日恐百神亦然也後之言禮者失於講明後漢建武元年采用前漢元始中合祭天地六宗羣神從祀二年正月制郊兆於雒陽城南七里泰壇之上至一千五百一十四神不亦䙝乎晉賀循已疑其非古人埽地而祭之意此固君子之所不取也蔡氏徳晉曰魯無朝日夕月之壇故即於郊之日附祭日月於壇上蕙田案周禮大宗伯以實柴祀日月掌次朝日則張大次小次典瑞圭璧以祀日月祭法王宫祭日夜明祭月祭日於壇祭月於坎祭日於東祭月於西則日月固有正祭矣而禮又云大報天而主日配以月何也孔疏徧報天之一切神而天之諸神唯日為尊故日為諸神之主猶如君燕羣臣以膳宰為主人也配之以月自月以下皆祭蓋天帝獨為壇日月及天神等共為一壇楊信齋謂祭天而主日配月非必百神從祀也莫尊于天莫重于郊祀豈容溷以百神之祀乎三正記曰郊後必有望蓋用祭天之明日恐百神亦然蔡徳晉從之又曰魯無朝日夕月之壇故即于郊之日附祭于壇上數說不同今案上帝為祭主日月為從祀于義無傷乃曰徧報天之一切神夫冬至郊天本屬正祭亦可稱報祭然所報者天也天至尊故曰大非以報一切神為大也今乃云自日以下皆祭至另為一壇夫圜丘泰壇止一壇耳安得别有一壇耶楊信齋謂非必百神從祀似為近之但據三正記云郊後必有望而謂郊之明日祭之恐亦未必然何也望祭専主山川不得兼日月也春官宗伯兆五帝于四郊四望四類亦如之乃概言諸祭而非指郊後之祭言即書稱禋六宗望山川徧羣神亦是各為一祭而非専指類上帝之明日則其說亦未的蔡氏云魯無朝日夕月之壇故即于郊之日附祭日月于壇上則此條専就魯郊而言似為有理然尚須考右日月從祀五禮通考卷二
