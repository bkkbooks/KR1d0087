body:
  text: 五禮通考卷四十三刑部尚書秦蕙田撰吉禮四十三社稷漢書高祖本紀二年二月癸未令民除秦社稷立漢社稷郊祀志髙祖初起禱豐枌榆社鄭氏曰枌榆鄉名晉灼曰枌白榆也社在豐東北十五里師古曰以此樹為社神因立名蓋髙祖里社也蕙田案禮有勝國之社故商有夏社周有殷社示誡也髙祖除秦社稷則勝國之社稷亡矣二年入關因命縣為公社李竒曰猶官社蕭何傳漢二年何守關中立宗廟社稷郊祀志六年天下已定詔御史令豐治枌榆社常以時春以羊彘祠之長安置祠祀官梁巫祠天社秦巫祠社主師古曰即五社主也蕙田案枌榆社周禮所云樹之田主各以所宜木名其社也十年春有司請令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠謂隨其祠具之豐儉也漢舊儀官大社及大稷一嵗各再祠太祝令常以二月八日以一太牢使者監祠南向立不拜天下祠社稷社者古司空主平水土共工氏之子勾龍氏能平水土植百榖祭於社以報其功稷者司馬官長助后稷耕種祭於稷以報其功祠社稷各官長諸侯丞相中二千石二千石以下令長侍祠文獻通考成帝初衡談奏罷雍舊祠社主有五祠置其一漢書平帝本紀元始三年夏立官稷郊祀志平帝時大司馬王莽上書帝王建立社稷百王不易社者土也宗廟王者所居稷者百榖之主所以奉宗廟共粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土師古曰大雅綿之詩也冢大也土土神謂大社也又曰以御田祖以祈甘雨師古曰小雅甫田之詩也田祖稷神也言設樂以御祭于神為農求甘雨也禮記曰唯祭宗廟社稷為越紼而行事李竒曰引棺車謂之紼當祭天地五祀則越紼而行事不以私喪廢公祀師古曰紼引車索也聖漢興禮儀稍定已有官社未立官稷臣瓚曰髙帝除秦社稷立漢社稷禮所謂大社也時又立官社配以夏禹所謂王社也見漢祀令而未立官稷至此始立之世祖中興不立官稷相承至今也遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種榖樹師古曰穀樹楮樹也其子類穀故于稷種徐州牧嵗貢五色土各一斗蕙田案髙祖立漢社稷有大社大稷即周禮王為羣姓立之大社也又有官社而未立官稷王莽立之亦猶古王社矣但古者大社王社皆以勾龍配而莽又以夏禹配之妄矣右漢社稷後漢書世祖本紀建武元年八月壬子祭社稷二年正月壬子建社稷于洛陽祭祀志建武二年立大社稷于洛陽在宗廟之右方壇無屋有門牆而已二月八月及臘一嵗三祠皆太牢具使有司祠孝經援神契曰社者土地之主也稷者五榖之長也禮記及國語皆謂共工氏之子曰勾龍為后土官能平九土故祀以為社烈山氏之子曰柱能植百榖疏自夏以上祀以為稷至殷以柱久逺而堯時棄為后稷亦植百榖故廢柱祀棄為稷大司農鄭玄説古者官有大功則配食其神故勾龍配食於社棄配食于稷郡縣置社稷太守令長侍祠牲用羊豕惟州所治有社無稷以其使官古者師行平有載社主不載稷也案平字當考蕙田案後漢社稷壇位配神祭祀之禮俱合古用康成説也州社無稷非是章帝本紀章和元年八月南巡守戊子幸梁己丑遣使祠豐枌榆社文獻通考漢儀朔前後各二日皆牽羊酒至社下以祭日日有變割羊以祠社用救日何休注公羊傳曰日有食之鼓用牲于社求乎隂之道也以朱絲縈社或曰脅之或曰為暗恐人犯之故縈之也何休曰脅之與責求同義社者主地之主也月者土地之精也上繫于天而犯日故鳴鼓而攻之脅其本也朱絲縈之助陽抑隂也或曰為暗者社者土地之主尊也為日光盡天暗冥恐人犯歷之故縈之然此説非也先言鼓後言用牲者明先以尊者命責之後以臣子禮接之所以為順也白虎通曰日食必救之隂侵陽也鼓攻之以陽責隂也故春秋日食鼓用牲于社所以必用牲者土地别神也尊之不敢虛責也日食大水則鼓用牲大旱則雩祭求雨非虛言也助陽責下求隂之道也蕙田案此即左傳伐鼓用牲之意蓋漢猶行之也右後漢社稷晉書禮志漢至魏但大社有稷而官社無稷故常二社一稷通典明帝景初中立帝社博士孔朝議漢氏及魏初皆立一社一稷至景初之時更立大社大稷又特立帝社云禮記祭法云王為羣姓立社曰大社言為羣姓下及士庶皆使立社非自立也今並立二社一神二位同時俱祭於事為重于禮為黷宜省除一社以從舊典劉喜難曰祭法為羣姓立社若如朝議當言王使不得言為下云王為羣姓立七祀諸侯自立為五祀若是使羣姓私立何得踰于諸侯而祭七祀乎却為羣姓立七祀乃王之祀也夫人取法于天取財于地普天率土無不奉祀而何言乎一神二位以為煩瀆蕙田案孔朝之議出于臆説劉喜難之是也明帝時祭社但稱皇帝王肅議太尉等祭祀但稱名不稱臣每有事須告皆遣祝史魏曹植社頌余前封鄄城侯轉雍丘皆欲為上宅宇初造以府庫尚豐志在善公夫務完圃而已農桑一無所營經離十載塊然守空飢寒備嘗聖朝閔之故封此縣田則膏腴桑則天下之甲第故封此桑以為田社乃作頌云於惟太社官名后土是曰勾龍功著上古德配帝王實為靈主克明播殖農正日舉尊以作稷豐年是與義與社同方神北宇建國成家莫不攸敘右魏社稷晉書武帝本紀太康九年春二月壬辰初并二社為一禮志前漢但制官社而無官稷王莽置官稷漢至魏但太社有稷而官社無稷故常二社一稷晉初仍魏無所損益至太康九年改建宗廟而社稷祠壇與廟俱徙乃詔曰社實一神其并二社之祀於是車騎司馬傅咸表曰祭法王社太社各有其義天子尊事宗廟故冕而躬耕躬耕也者所以重孝享之粢盛親耕故自報自為立社者為籍田而報者也國以人為本人以榖為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈藉田秋而報之也其論太社則曰王者布下圻內為百姓立之謂之太社不自立之於京都也景侯此論據祭法祭法大夫以下成羣立社曰置社景侯解曰今之里社是也景侯解祭法則以置社為人間之社矣而别論復以太社為人間之社未曉此旨也太社天子為百姓而祀故稱天子社郊特牲曰天子太社必受霜露風雨以羣姓之衆王者通為立社故稱太社也若夫置社其數不一蓋以里所為名左氏傳盟于清丘之社是也衆庶之社既已不稱太矣若復不立之京師當安所立乎祭法又曰王為羣姓立七祀王自為立七祀言自為者自為而祀也為羣姓者為羣姓而祀也太社與七祀其文正等説者窮此因云墳籍但有五祀無七祀也案祭五祀國之大祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯解大厲曰如周社鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為解而欲以口論除明文如此非但二社當見思惟景侯之解亦未易除也前被敕尚書召誥乃社於新邑惟一太牢不二社之明義也案郊特牲曰社稷太牢必援一牢之文以明社之無二則稷無牲矣説者則曰舉社則稷可知苟可舉社以明稷何獨不舉一以明二國之大事在祀與戎若有過而除之不若過而存之况存之有義而除之無據乎周禮封人掌設社壝無稷字今帝社無稷蓋出於此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人所掌社壝無稷字説者以為略文從可知也謂宜仍舊立二社而加立帝社之稷時成粲議社稷景侯論太社不立京都欲破鄭氏學咸重表以為如祭法之論景侯之解交以此壞大雅云乃立冢土毛公解曰冢土大社也景侯解詩即用此説禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各割其方色王者覆四方也如此太社復為立京都也不知此論何從而出而與解乖上違經記明文下壞景侯之解臣雖頑蔽少長學問不能默已謹復續上劉實與咸議同詔曰社稷一神而相襲二位象議不同何必改作其便仍舊一如魏制蕙田案景侯不自立之京師之説與孔朝同義傅咸以為人間之社不稱太足以折服之矣景侯解禹貢又與已説相矛盾然此解却是武帝本紀太康十年六月庚子復置二社禮志摰虞奏以為臣案祭法王為羣姓立社曰太社王自為立社曰王社周禮大司徒設其社稷之壝又曰以血祭祭社稷則太社也又曰封人掌設王之社壝又有軍旅宜乎社則王社也太社為羣姓祈報祈報有時主不可廢故凡祓社釁鼓主奉以從是也此皆二社之明文前代之所尊以尚書召誥社於新邑三牲各文詩稱乃立冢土無兩社之文故廢帝社惟立太社詩書所稱各指一事又皆在公旦制作之前未可以易周禮之明典祭法之正義前改建廟社營一社之處朝議沸然執古匡今世祖武皇帝躬發明詔定二社之義以為永制宜定新禮從二社詔從之元帝本紀建武元年春三月立宗廟社稷於建康禮志元帝建武元年又依洛京立二社一稷其太社之祝曰地德普施惠存無疆乃建太社保佑萬方悠悠四海咸賴嘉祥其帝社之祝曰坤德厚載邦畿是保乃建帝社以神地道明祀惟辰景福來造晉殷仲堪合社文里社之由來尚矣今二三宗親思桑梓之遺風遵先聖之明誥潔齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御衆稽舊章以作憲王廙春社櫟頌吉辰兮上戊明靈兮唯社百室兮畢集祈祭兮樹下濯卵兮韭齧菻兮劈鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可右晉社稷宋書禮志祀太社帝社大稷常以嵗二月八月二社日祀之太祝令夕牲進熟如郊廟儀司空太常大司農三獻也官有其注周禮王親祭漢以來有司行事通典宋仍晉舊無所改作宋何承天社頌余以永初三年八月大社聊為此文實唯隂祇稷為穀先率育萬類協靈昊乾霸德方將世號共工厥有才子實曰勾龍稱物平賦百姓熙雍唐堯救災決河流江棄亦播殖作乂萬邦克配三祀以報勳庸勳庸伊何厚載生民倉廩既實禮節斯行人亦有言因物思人矧乃大德功彼陶鈞豈伊百世萬代不泯蒸哉帝王肇建皇極體國經野設官分職峩峩二社剖幹比殖嵗云其秋晷漏均程牲牢既潔嘉薦惟馨乃家乃國是奉是尊南齊書禮志永明元年十二月有司奏今月三日臘祀太社稷一日合朔日蝕既在致齋內未審於社祀無疑不曹檢未有前準尚書令王儉議禮記曾子問天子嘗禘郊社五祀之祭簠簋既陳惟大喪乃廢至於當祭之日火日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齋初日仍值薄蝕則不應廢祭又初平四年士孫瑞議以日蝕廢社而不廢郊朝議從之王者父天親地郊社不殊此則前準為不宜廢詔可永明十一年兼祠部郎何佟之議案禮記郊特牲社祭土而主隂氣也君南向於北墉下答隂之義也鄭玄云答猶對也北墉社內北牆也王肅云隂氣北向故君南向以答之答之為言是相對之稱知古祭社北向設位齋官南向明矣近代相承帝社南向太社及稷並東向而齋官位在帝社壇北西向於神位後行禮又名稷為稷社甚乖禮意及未知失在何時原此禮當未久竊以皇齊改物禮樂維新中國之神莫貴於社若遂仍前謬懼虧盛典謂二社語其義則殊論其神則一位並宜北向稷若北向則成相背稷是百榖之總神非隂氣之主宜依先東向齋官在社壇東北南向立東為上諸執事西向立南為上稷依禮無兼稱今若欲尊崇正可名為太稷耳豈得謂為稷社耶臘祀太社日近案奏事御改定儀注儀曹稱治禮學士議曰郊特牲又云君之南向答陽也臣之北向答君也若以陽氣在南則位應向北隂氣在北則位宜向南今南北二郊一限南向皇帝奠幣黑瓚階東西向故知壇墠無繫於隂陽設位寧拘於南北羣臣小祀類皆限南面薦享之時北向行禮蓋欲申靈祇之尊表求幽之義魏世秦靜使社稷别營稱自漢以來相承南向漢之於周世代未逺鄗上頽基商邱餘樹猶應尚存迷方失位未至於此通儒達識不以為非庾蔚之昔已有此議後徐爰周景逺並不同仍舊不改佟之議來難引君南向答陽臣北向答君敢問答之為言為是相對為是相背相背則社位南向君亦南向可如來議郊特牲云臣之北向答君復是君背臣今言君南臣北向相稱答則君南不得稱答矣記何得云祭社君南向以答隂邪社果同向則君亦宜西向何故在社南向在郊西向邪解則不然記云君之南向答陽此明朝會之時盛陽在南故君南向對之猶聖人南面而聽向明而治之義耳寧是祈祀天地之日乎知祭社北向君答故南向祀天南向君答宜北向矣今皇帝黑瓚階東西向者斯蓋始入之别位非接對之時也案記云社所以神地之道也又云社祭土而主隂氣又云不用命戮於社孔安國云社主隂隂主殺傳曰日蝕伐鼓於社杜預云責羣隂也社主隂氣之盛故北向設位以本其義耳餘祀雖亦地祇之貴而不主此義故位向不同不得見餘隂祀不北向便謂社應南向也案周禮祭社南向君求幽宜北向而記云君南向答隂之義求幽之論不乖歟魏權漢社社稷同營共門稷壇在社壇北非古制後移宫南自當如靜此言乃是顯漢社失周法見漢世舊事爾時祭社南向未審出何史籍就如議者靜所言是祭社位向仍漢舊法漢又襲周成規因而不改者則社稷三座並應南向今何改帝社南向泰社及稷並東向邪治禮又難佟之凡三往反至建武二年有司議治禮無的然顯據佟之議乃行蕙田案郊特牲君南向以答隂則社北向可知以為社稷並南向固非以為社南向稷東向是以稷為社之配位矣勾龍后稷之配更宜何向耶佟之駁稷社名得之治禮解臣北向答君非是祈祀天地之日亦是也右宋齊社稷隋書禮儀志梁社稷在太廟西其初蓋晉元帝建武元年所創有太社帝社太稷凡三壇門牆並隨其方色每以仲春仲秋並令郡國縣祠社稷先農縣又兼祀靈星風伯雨師之屬及臘又各祀社稷於壇百姓則二十五家為一社其舊社及人稀者不限其家春秋祠水旱禱祈祠具隨其豐約蕙田案梁社稷壇承晉制仲春仲秋祠之郡國各有祠也舊太社廪犧吏牽牲司農省牲太祝吏贊牲天監四年明山賓議以為案郊廟省牲日則廪犧令牽牲太祝令贊牲祭之日則太尉牽牲郊特牲云社者神地之道國主社稷義實為重今公卿貴臣親執盛而令微吏牽牲頗為輕末且司農省牲又非其義太常禮官實當斯職禮祭社稷無親事牽之文謂宜以太常省牲廪犧令牽牲太祝令贊牲帝惟以太祝贊牲為疑又以司農省牲於理似傷犧吏執紖即事誠卑議以太常丞牽牲餘依明議於是遂定大同初又加官社官稷并前為五壇焉右梁社稷隋書禮儀志陳制皆依梁舊而帝社以三牲首餘以骨體薦粢盛為六飯粳以敦稻以牟黃粱以簠白粱以簋黍以瑚粢以璉通典其儀本之齊制敦音對陳書髙祖本紀永定三年六月丁酉髙祖不豫遣兼太宰中書令謝哲告太社隋書禮儀志陳宣帝大建中議從雙祀崑崙皇地示位神州位在青陛之北甲寅地社在赤陛之西未地稷位白陛之南庚地右陳社稷北魏書太祖本紀天興元年七月遷都平城始營宫室建宗廟立社稷十有一月辛亥詔儀曹郎中董謐撰郊廟社稷之儀禮志天興二年冬十月置太社太稷帝社於宗廟之右為方壇四陛祀以二月八月用戊皆太牢句龍配社周棄配稷皆有司侍祠劉芳傳芳以社稷無樹又上疏曰依合朔儀注日有變以朱絲為繩以繞係社樹三匝而今無樹又周禮司徒職云設其社稷之壝而樹之田主各以其社之所宜木鄭玄注云所宜木謂若松柏栗也此其一證也又小司徒封人職云掌設王之社壝為畿封而樹之鄭玄云不言稷者王主於社稷社之細也此其二證也又論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗是乃土地之所宜也此其三證也又白虎通云社稷所以有樹何也尊而識之也使民望見即敬之又所以表功也案此正解所以有樹之義了不論有之與無也此其四證也此云社稷所以有樹何然則稷亦有樹明矣又五經通義云天子太社王社諸侯國社侯社制度奈何曰社皆有垣無屋樹其中以木有木者土主生萬物萬物善於木故樹木也此其五證也此最其丁寧備解有樹之意也又五經要義云社必樹之以木周禮司徒職曰班社而樹之各以土地所生尚書無逸篇曰太社唯松東社唯柏南社唯梓西社唯栗北社唯槐此其六證也此又太社及四方皆有樹别之明據也又見諸家禮圖社稷圖皆畫為樹惟誡社誡稷無樹此其七證也雖辨有樹之據猶未正所植之木案夏后氏以松殷人以柏周人以栗便是世代不同而尚書無逸篇則云太社惟松東社惟柏南社惟梓西社惟栗北社惟槐如此便以一代之中而五社各異也愚以為宜植以松何以言之逸書云太社惟松今者植松不慮失禮惟稷無成證乃社之細蓋亦不離松也世祖從之髙祖本紀孝文帝太和二十三年春正月戊辰車駕至自鄴庚子告廟社禮志天平四年四月七帝神主既遷於太廟太社石主將遷於社宫禮官云應用幣中書侍郎裴伯茂時為祖祀文伯茂據故事太和中遷社宫髙祖用牲不用幣遂以奏聞於是議者或引大戴禮遷廟用幣今遷社宜不殊伯茂據尚書召誥應用牲詔遂從之右北魏社稷隋書禮儀志後齊立太社帝社太稷三壇於國右每仲春仲秋月之元辰及臘各以一太牢祭焉皇帝親祭則司農卿省牲進熟司空亞獻司農終獻右北齊社稷周書孝閔帝本紀元年春正月甲辰祠太社二月戊寅祠太社八月戊辰祠太社隋書禮儀志後周社稷皇帝親祀則冢宰亞獻宗伯終獻通典後周立社稷於左明帝本紀元年冬十月甲午祠太社武帝本紀保定元年春正月乙卯祠太社右北周社稷隋書髙祖本紀開皇二年二月甲子即皇帝位景寅修廟社禮儀志開皇初社稷並列於含光門內之右仲春仲秋吉戊各以一太牢祭焉牲色用黑孟冬下亥又臘祭之州郡縣二仲月並以少牢祭百姓亦各為社髙祖本紀開皇三年秋八月戊子上有事於太社七年十一月甲午幸馮翊親祠故社父老對詔失旨上大怒免其縣官而去禮儀志大業七年征遼東煬帝遣諸將於薊城南桑乾河上築社稷二壇設方壝行宜社禮帝齋於臨朔宫懷芳殿預告官及侍從各齋於其所十二衛士並齋帝衮冕玉輅備法駕禮畢御金輅服通天冠還宫樂志社稷歌辭四首迎送神登歌與方丘同春祈社奏諴夏辭厚地開靈方壇崇祀達以風露樹之松梓勾萌既甲芟柞伊始恭祈粢盛載膺休祉春祈稷奏諴夏辭粒食興教播厥有先尊神致潔報本惟虔瞻榆束耒望杏開田方慿戩福佇詠豐年秋報社奏諴夏辭北墉申禮單出表誠豐犧入薦華樂在庭原隰既平泉流又清如雲已望髙廪斯盈秋報稷奏諴夏辭人天務急農亦勤止或蓘或藨惟􅚂惟芑涼風戒時嵗云秋矣物成則報功施必祀右隋社稷舊唐書髙祖本紀武德九年二月戊寅親祠社稷禮儀志武德貞觀之制仲春仲秋二時戊日祭大社大稷社以勾龍配稷以后稷配社稷各用太牢一牲色並黑籩豆簠簋各二鉶俎各三季冬蠟之明日又祭社稷於社宫如春秋二仲之禮通典唐社稷亦在含光門內之右册府元龜武德九年正月丙子詔曰厚地載物社主其祭嘉榖養民稷惟元祀列聖垂範昔王通訓建邦正位莫此為先爰暨都邑建於州里率土之兵咸極莊敬所以勤農務本修始報功敦序教義整密風俗末代澆浮祀典虧替時逢喪亂仁惠弛薄壇壝闕昭備之禮鄉閭無紀合之訓朕握圖受歷菲食卑宫奉圭璧以尊嚴潔粢盛而槱燎尚想躬稼厲精治本永言享祀宜存億紀是以吉日惟戊親祀大社率從百僚以祈九榖今既南畝俶載東作方興州縣致祀宜盡祇肅四方之民咸勤殖藝隨其性類命為宗社京邑庶士臺省羣官里閈相從共遵社法以時供祀各申祈報兼行宴醑之義用洽鄉黨之歡且立節文明為典制進退俯仰登降折旋明加誨厲遞相勸奬齊之以禮有恥且格布告天下即宜遵用戊寅親祀社稷通典唐初為帝社亦曰籍田壇貞觀三年太宗將親耕給事中孔頴達議曰禮天子藉田南郊諸侯東郊晉武帝猶東南今帝社乃東壇未合於古太宗曰書稱平秩東作而青輅黛耜順春氣也吾方位少陽田宜於東郊乃耕於東郊舊唐書髙宗本紀咸亨五年五月己未詔春秋二社本以祈農如聞此外别為邑會此後除二社外不得聚集有司嚴加禁止唐書武后本紀長壽元年九月大赦改元改用九月社中宗本紀神龍元年五月乙酉立太廟社稷於東都禮樂志先農唐初為帝社亦曰籍田壇垂拱中武后籍田壇曰先農壇神龍元年禮部尚書祝欽明議曰周頌載芟春藉田而祈社稷禮天子為籍千畝諸侯百畝則緣田為社曰王社侯社今曰先農失王社之義宜正名為帝社太常少卿韋叔夏博士張齊賢等議曰祭法王者立太社然後立王社所置之地則無傳也漢興已有官社未立官稷乃立於官社之後以夏禹配官社以后稷配官稷臣瓚曰髙紀立漢社稷所謂太社也官社配以禹所謂王社也至光武乃不立官稷相承至今魏以官社為帝社故摰虞謂魏氏故事立太社是也晉或廢或置皆無處所或曰二社並處而王社居西崔氏皇甫氏皆曰王社在藉田案衛宏漢儀春始東耕於籍田引詩先農則神農也又五經要義曰壇於田以祀先農如社魏秦靜議風伯雨師靈星先農社稷為國六神晉太始四年耕於東郊以太牢祀先農周隋舊儀及國朝先農皆祭神農於帝社配以后稷則王社先農不可一也今宜於藉田立帝社帝稷配以禹棄則先農帝社並祠叶於周之載芟之義欽明又議曰藉田之祭本王社古之祀先農勾龍后稷也烈山之子亦謂之農而周棄繼之皆祀為稷共工之子曰后稷湯勝夏欲遷而不可故二神社稷主也黃帝以降不以羲農列常祀豈社稷而祭神農乎社稷之祭不取神農耒耜大功而專於共工烈山蓋以三皇洪荒之迹無取為教彼秦靜何人而知社稷先農為二而藉田有二壇乎先農王社一也皆后稷勾龍異名而分祭牲以四牢欽明又言漢祀禹謬也今欲正王社先農之號而未決乃更加二祀不可叔夏齊賢等乃奏言經無先農禮曰王自為立社曰王社先儒以為在籍田也永徽中猶曰籍田垂拱後乃為先農然則先農與社一神今先農壇請改曰帝社壇以合古王社之義其祭準令以孟春吉亥祠后土以勾龍氏配於是為帝社壇又立帝稷壇於西如太社太稷而不設方色以異於太社蕙田案社在籍田本無明據唐始以帝社為籍田壇繼以籍田為先農壇合社與先農而一之謬矣叔夏等又欲合先農帝社並祠而為二壇尤謬矣後乃改先農之名而曰帝社稍為得之然立社於籍田而奪先農之祀終非禮也張齊賢傳齊賢遷博士時東都置大社禮部尚書祝欽明問禮官博士周家田主用所宜木今社主石奈何齊賢與太常少卿韋叔夏國子司業郭山惲尹知章等議春秋君以軍行祓社釁鼓祝奉以從故曰不用命戮於社社稷主用石以可奉而行也崔靈恩曰社主用石以地産最實歟吕氏春秋言殷人社用石後魏天平中遷太社石主其來尚矣周之田主用所宜木其民間之社歟非太社也於是舊主長尺有六寸方尺七寸問博士云何齊賢等議社主之制禮無傳天子親征載以行則非過重禮社祭土主隂氣韓詩外傳天子社祭方五丈諸侯半之五土數社主宜長五尺以準數五方二尺以準隂偶剡其上以象物生方其下以象地體埋半土中本末均也請度以古尺云又問社稷壇隨四方用色而中不數尺冒黃土謂何齊賢等曰天子太社度廣五尺分四方上冒黃土象王者覆被四方然則當以黃土覆壇上舊壇上不數尺覆被之狹乖於古於是以方色飾壇四面及陛而黃土全覆上焉祭牲皆太牢其後改先農曰帝社又立帝稷皆齊賢等參定舊唐書禮儀志起居舍人王仲丘撰成一百五十卷名曰大唐開元禮二十年九月頒所司行用焉以社稷帝社為中祀州縣之社稷為小祀唐書禮樂志社稷之壇廣五丈以五土為之社以后土稷以后稷配以太罍實醍齊著尊實盎齊皆二山罍一州縣之社稷以象尊二實醍齊以兩圭有邸幣以黑小祀幣以白籩豆皆十簋二簠二鉶三俎三州縣祭籩豆皆八簋二簠二俎三春秋祭牲皆太牢以黑孟春祭帝社及配坐籩豆皆十簋二簠二㽅三鉶三俎三開元禮仲春仲秋上戊祭太社太稷舊樂用姑洗之均三變社稷之祀於禮為尊豈同丘陵止用三變合依地祇用函鍾之均八變之樂皇帝仲春仲秋上戊祭太社太稷儀攝事附齊戒如方丘儀陳設前祭三日尚舍直長施大次於社宫西門之外道北南向尚舍奉御鋪御座衛尉設文武侍臣次於大次之後文官在左武官在右俱南向設諸祭官次於齋坊之內攝事無設大次儀但守臣設祭官次三師於北門之外諸王於三師之北俱東向南上文官從一品以下九品以上於齋坊南門之外重行東向北上介公酅公于北門之外道東西向以南為上諸州使人東方南方於諸王西北東面西方北方于介公酅公東北俱南上武官三品以下九品以上于東門之外道北南向以西為上諸國之客于東門之外東方南方于武官東北南向西方北方于道南北向俱以西為上攝事無三師以下至此儀前祭二日太樂令設宫縣之樂于壇北東方西方磬簴起南鍾簴次之南方北方磬簴起東鍾簴次之設十二鎛鍾于編懸之間各依辰位樹靈鼓于南懸之內道之左右植建鼓于四隅置柷敔于懸內柷在左敔在右設歌鍾歌磬各于壇上近北南向皆磬簴在西其匏竹者各立于壇下南向相對為首凡縣皆展而編之諸工人各位于懸後東方西方以南為上南方北方以東為上右校清掃內外又為瘞塪二於南門之內於稷壇西南攝事為埋坎二于樂縣之北方深取足容物北出陛前祭一日奉禮設位北方之內當社稷壇北南向將祭奉禮郎一人守之在版位東北立五步所南向又設望瘞位西門之內當瘞塪南向攝事無御位以下至此儀設祭官公卿位於西門之內道北執事位于其後少北每等異位俱重行東面以南為上設御史位於壇上正位于太社壇東北隅西向副位于太稷壇西北隅東向攝事令史陪後設奉禮位于樂縣西北贊者二人在北差退俱東面南上又設奉禮贊者位于瘞塪西北東向北上攝事無奉禮位設協律郎位各於壇之上東北隅俱西向設太樂令位于南縣之門南向設祭官位三師位于北門之內道西俱南面東上設介公酅公位于道東南面西上文官從一品以下九品以上位于執事北每等異位俱重行東向武官三品以下九品以上位于東方值文官每等異位重行西向皆以南為上諸州使人位東方南方于北門之內道西于諸王西北重行南向以東為上西方北方于道東于介公酅公東北重行南向以西為上諸蕃客位于北門之內東方南方諸州使人之西每國異位重行南向以東為上西方北方於諸州使人之東每國異位俱重行南向以西為上設門外位祭官公卿以下皆于西門之外道南每等異位重行北向以東為上三師位于北門之外道西諸王于三師之北俱東向介公酅公位于道東西向皆以南為上文官從一品以下九品以上位西門之外祭官之南每等異位重行北向以東為上武官三品以下九品以上位于東門之外道北每等異位重行南向以西為上諸州使人位東方南方于諸王西北重行東向西方北方於介公酅公東北西向俱南上設諸國客位東方南方于武官東北每國異位俱重行南向西方北方於道南每國異位重行北向皆以西為上攝事無三師北門內位至此儀但設祭官門外之位設酒樽之位太社大樽二著樽二罍二壇上西北隅南向設后土氏象樽二著樽二罍二于太社酒樽之西俱南向東上各置于坫皆加勺羃爵皆置于樽下設太稷后稷酒樽于其壇上如太社后稷之儀設御洗各于太社太稷壇之西北南向亞獻之洗又各于西北南向俱罍水在洗西篚在洗東北肆篚實以巾爵執樽罍篚羃者位于樽罍篚羃之後各設玉幣之篚于壇上樽坫之所晡後謁者引光祿卿詣厨省撰具訖還齋所祭日未明十刻太官令帥宰人以鑾刀割牲祝史以豆取毛血攝事齋郎取毛血置于饌所遂烹牲牲皆用黝未明五刻太史令郊社令各服其服升設太社太稷神座各于壇上近南北向設后土氏于太社神座之右后稷氏于太稷神座之左俱東向席皆以莞設神座各于座首鑾駕出宫如方丘之儀奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣大樽為上實以醴齊著樽次之實以盎齊罍為下實以清酌配座之樽亦如之齊加明水酒加玄酒各實于上樽禮神之玉太社太稷兩圭有邸幣色各以玄太官令帥進饌者實諸籩豆簠簋皆設於神厨未明二刻奉禮帥贊者先入就位贊引引御史諸太柷及令史祝史與執尊罍篚羃者入自西門當太社壇北重行南面以東為上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者各升自西陛立于樽所執罍洗篚羃者各就位贊引引御史諸太祝詣太社壇西陛升行掃除于上令史祝史行掃除于下降又詣太稷壇行掃除如太社之儀訖各引就位駕將至謁者贊引各引祭官通事舍人分引從