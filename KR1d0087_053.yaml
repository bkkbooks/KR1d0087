刺史至參軍事引之次贊唱者先入就位縣令贊者引下倣此刺史停於次少頃服祭服出次參軍事引刺史入自西門就位南向參軍事立於刺史之東少退南向贊禮者引祭官以下及從祭之官以次入就位凡導引者每曲一逡巡立定贊唱者曰再拜刺史以下皆再拜參軍事少進刺史之左西面白請行事退復位本司帥執饌者奉饌陳於西門之外祝以幣授刺史參軍事引刺史北階升社壇南向跪奠幣于社神座前訖興少退再拜祝又以幣授刺史參軍事引刺史升稷壇南向跪奠幣于稷神座如社壇之儀訖參軍引刺史降復位本司引饌入社稷之饌升自北階配座之饌升自西階諸祝迎引于壇上設于神座前籩豆蓋羃先徹乃升簠簋既奠却其蓋于下籩居右豆居左簠簋居其間羊豕二俎橫而重于右臘特于左本司與執饌者降自西階復位諸祝各還樽所參軍事引刺史縣贊禮者引縣令下同詣罍洗執罍者酌水執洗者跪取盤興承水刺史盥手執篚者跪取巾于篚興進刺史帨手訖執篚者受巾跪奠於篚遂取爵興以進刺史受爵執罍者酌水刺史洗爵執篚者又取巾于篚興進刺史拭爵訖受巾奠於篚奉盤者跪奠盤興參軍事引刺史自社壇北階升詣社神酒樽所執尊者舉冪刺史酌醴齊參軍事引刺史詣社神座前南向跪奠爵興少退南向立祝持版進於神座之右西向跪讀祝文曰維某年嵗次月朔日子某官姓名敢昭告于社神唯神德兼博厚道著方直載生品物含養庶類謹因仲春祇率常禮恭以制幣犧齊粢盛庶品備茲明薦用伸報本以后土勾龍氏配神作主尚享縣祝文以下並同訖祝興刺史再拜祝進跪奠版于神座興還樽所刺史拜訖參軍事引刺史詣配座酒樽所取爵於坫執樽者舉冪刺史酌醴齊參軍事引詣后土氏神座前西向跪奠爵興少退西向立祝持版進于后土氏前祝文曰爰茲仲春厥日唯戊敬修常祀薦於社神唯神功著水土平易九州昭配之義實通祀典謹以犧齊粢盛庶品式陳明薦作主侑神尚享祝興刺史再拜祝進跪奠版于神座興還樽所刺史拜訖參軍事引刺史進當社神座南向立祝各以爵酌福酒合置一爵祝持爵進于刺史之右東向立刺史再拜受爵跪祭啐酒奠爵興祝帥執饌者以俎進減社神座前胙肉各取前腳第二骨共置一俎上興祝持俎東向進刺史受以授左右刺史跪取爵飲卒爵祝進受爵復于坫刺史興再拜參軍事引刺史降自北階詣罍洗盥手洗爵自稷壇北階升詣稷神酒樽所執樽者舉冪刺史酌醴齊參軍事引刺史詣稷神座前南向跪奠爵興少退南向立祝持版進于神座之右曰敢昭告于稷神唯神播生百榖首茲八政用而不匱功濟氓黎恭以制幣犧齊粢盛庶品祇奉舊章備茲瘞禮以后稷棄配神作主尚享訖祝興刺史再拜祝進跪奠版于神座興還樽所刺史拜訖參軍事引刺史詣配座酒樽所刺史取爵于坫執樽者舉冪刺史酌醴齊參軍事引刺史詣后稷氏座前西向跪奠爵興少退西向立祝持版進於神座之右南面跪讀祝文曰敢昭告于后稷氏爰以仲春恭修常禮薦於稷神唯神功叶稼穡闡修農政允茲從祀用率舊章謹以犧齊粢盛庶品式陳明薦作主配神尚享訖祝興刺史再拜祝進跪奠版於神座興還樽所刺史拜訖參軍事引刺史詣稷神座前南向立飲福受胙如社壇之儀訖參軍事引刺史降自本階還本位初刺史獻將畢贊者引亞獻詣罍洗盥手洗爵升獻如刺史之儀唯不讀祝文不受胙亞獻將畢贊禮者引終獻詣罍洗升爵終獻如亞獻之儀訖降復位諸祝各進神座前跪徹豆興還樽所贊唱曰賜胙再拜非飲福受胙者皆再拜贊唱者又曰再拜刺史已下皆再拜參軍事少進刺史之左西面白請就望瘞位參軍事引刺史就望瘞位西向立祝於神前取幣及血置於塪贊唱者曰可瘞埋東西面各二人置土半塪參軍事進刺史左白禮畢遂引刺史出還次贊禮者引祭官以下次出諸祝及執樽罍篚者降復掌事位贊唱者曰再拜祝以下皆再拜以出其祝版燔于齋所諸里祭社稷儀前一日社正及諸社人應祭者各清齋一日於家正寢正寢者為人家前堂待賓之所應設饌之家先修治神樹之下又為瘞塪于神樹之北深取足容于物掌事者設社正位于稷座西北十步東面諸社人位于其後東面南上設祝奉血豆位于瘞塪之北南向祭器之數每座樽酒二并勺一以巾覆之俎一籩二豆二爵二簠二簋二無禮器者量以餘器充之祭日未明烹牲於厨唯以特豕祝以豆取牲血置于饌所夙興掌饌者實祭器牲體載右胖折節如州縣制分載二俎其樽一實玄酒為上一實清酒次之籩實棗栗豆實葅醢簠實黍稷簋實稻粱掌事者以席入社神之席設于神樹下稷神之席設于神樹西俱北向質明社正以下各服其服掌事者以盥水器入設于神樹北十步所加勺巾二爵一於其下盛以箱又以酒樽入設於神北近西社神之樽在東稷神之樽在西俱東上南向置爵二及祝版於樽下執樽者立於樽後掌事者入實樽酒訖祝及執樽者其祝以社人有學識者充之入當社神北南向以東為上皆再拜執酒樽者就樽後立其執盥者就盥器後立贊禮者引社正以下俱就位立定贊禮者贊再拜社正以下皆再拜祝詣樽所贊禮者再拜社正以下皆再拜掌事者以饌入各設於神座前葅醢居前左右箱黍稷在其間俎居其外訖掌事者出贊禮者引社正詣盥器所執盥者酌水社正洗手取巾拭手訖洗爵拭爵訖贊禮者引社正詣社神酒樽所酌酒訖贊禮者引社正詣社神座前跪奠爵於饌右興少退南向立祝持版進社神座東西面跪讀祝文曰維某年嵗次月朔日子某坊村則云某村次下準此社正姓名合社若干人等今昭告于社神唯神載育黎元長茲庶物時屬仲春日唯吉戊謹率常禮恭用特牲清酌粢盛庶品祇薦社神尚享祝興社正以下及社人等俱再拜贊禮者引社正詣稷神樽所取爵酌酒訖贊禮者引社正詣稷神座前南向跪奠酒於饌右興少退南向立祝持版進于稷神座西東向跪讀祝文曰若干人等敢昭告于稷神唯神主茲百榖粒此羣黎今仲春吉戊秋云仲秋謹率常禮恭以特牲清酌粢盛庶品祇薦於稷神尚享祝興社正以下及社人俱再拜贊禮者引社正立于社神座前南向立祝以爵酌社稷神福酒合置一爵進社正之右社正再拜受酒訖跪祭酒遂飲卒爵祝受爵還樽所社正興再拜贊禮者引社正還本位立定贊禮者再拜社正及社人俱再拜訖祝以血置於塪塪東西各一人置土半塪贊禮者少前白禮畢遂引社正等出祝與執樽者復位再拜訖出其餘饌社人等俱於此餕如常會之儀其祝版燔于祭所唐會要開元二十二年三月詔州縣社仍用牲牢天寶元年十月戊寅九日詔社為九土之尊稷乃五榖之長祭官宜加精潔其社壇側禁樵牧三載二月戊寅詔社稷升為大祀以四時致祭後又依開元禮為中祀通典天寶三載詔社稷列為中祀頗紊大猷自今以後社稷及日月五星並升為大祀仍以四時致祭舊唐書肅宗本紀至德二載秋九月壬寅廣平王統朔方安西回紇南蠻大食之人與賊將戰於香積寺西北賊軍大敗棄京城東走癸未復西京甲辰捷書至行在即日遣裴冕入京啓告郊廟社稷文獻通考開元十九年正月三十日敕普天率土崇德報功饗祀唯殷刲割滋廣非所以全惠養之道協靈祇之心其春秋二時社及釋奠天下諸州府縣等並停牲牢唯用酒脯務存修潔足展誠敬自今以為常式至二十二年三月二十五日敕春秋祈報郡縣常禮比不用牲豈云血祭隂祀貴臭神何以歆自今已後州縣祭祀特以牲牢宜依常式其年六月二十八日敕大祀中祀及州縣社稷依式合用牲牢餘並用酒脯至貞元五年九月十二日國子祭酒包佶奏春秋祭社稷準禮天子社稷皆太牢至大厯六年十月三日敕中祀少牢社稷是中祠至今未改敕旨宜準禮用太牢舊唐書音樂志祭太社樂章八首貞觀中禇亮等作迎神用順和詞同夏至方丘皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和后土凝德神功叶契九域底平兩儀交際戊期應序隂墉展幣靈車少留俯歆樽柱迎俎用雍和美報崇本嚴恭展事受露疏壇承風啓地潔粢登俎醇犧八饋介福逺流羣生畢遂皇帝酌獻飲福用壽和詞同冬至圜丘送文舞出迎武舞入用舒和神道發生敷九稼隂陽乘仁暢八埏緯武經文陶景化登祥薦祉啓豐年武舞用凱安詞同冬至圜丘送神用順和詞同冬至圜丘又太社樂章二首太社舊有此詞不詳所起迎神烈山有子后土有神播種百榖濟育兆人春官緝禮宗伯司禋戊為吉日迎享兹辰送神告祥式就酬功載畢親地尊天禮文經術貺徴令序福流初日神馭爰歸祠官其出右唐社稷五禮通考卷四十三
