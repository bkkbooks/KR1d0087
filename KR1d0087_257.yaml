body:
  text: 五禮通考卷二百四十七邢部尚書秦蕙田撰凶禮二荒禮周禮地官大司徒以荒政十有二聚萬民注荒凶年也鄭司農云救饑之政十有二品鄭氏鍔曰金穰水毁木饑火旱或不可逃所恃以無恐者有救荒之政以聚之則雖荒而不流徙矣史氏浩曰大司徒裂土以封諸侯度地以授萬民宜先于賦斂而首及于荒政聚民之教見先王本以恤民為主一曰散利注鄭司農云散利貸種食也利疏謂豐時聚之荒時散之積而能散使民益云貸種食者謂民無者従公貸之或為種子或為食用至秋熟還公據公家為散據民往取為貸李氏曰夫家之征則薄之山澤之禁則弛之闗之譏則去之所以充一嵗之入而為國之經費者今皆以予民則已厚矣而又散利果何従給乎吾是以知其所以為荒政之備者其蓄積有素也後世常平義倉斂散之法美意出于此王氏昭禹曰若遺人云縣都之委積以待凶荒是也丘氏濬曰易云何以聚人曰財大學曰財散則民聚葢天立君以治民君必得民然後可以為君是君不可一日無民也然民必有安居托處之地日用飲食之具而後能聚焉人君為治所以使一世之民恒有聚處之樂而無分散之憂者果用何物哉財而已矣然是財也所以耗而費之者固由乎人力然尤莫甚于天災焉是以人君當夫豐穣無事之時而恒為天災流行之思斯民乏絶之慮豫有以蓄積之以為凶荒之備焉此無他恐吾民之散而不可復聚也是以周禮十二荒政而以散利為首鄭氏謂散利者貸種食也蓋子之食以濟一時之饑予之種以為嗣歳之計聖人憂民之心至矣逺矣既散所有之利而又行薄征以下十一事以濟之此治古之世所以時有豐凶而民無憂患民生所以長聚而君位所以永安者其以此歟蕙田案荒政惟散利一條所包最廣以後代之法言之大約有三大端曰周曰貸曰糶周者予而不責其償宜施于灾傷已成之後貸者荒時散之豐時斂之宜施于青黄不接之時糶者減價出售以平市直宜施于穀米踊貴之日此因時而别者也又極貧戸宜周次貧戸宜貸中等戸宜糶此因戸而别者也注所云貸種則後世借給耔種是也貸食則後世借給口糧是也鄉師以歳時巡國及野而賙萬民之囏阨以王命施惠注歳時者隨其事之時不必四時也囏阨饑乏也鄭司農云賙讀為周急之周旅師掌聚野之耡粟屋粟閒粟而用之以質劑致民平頒其興積施其惠散其利而均其政令注而讀為若聲之誤也若用之謂恤民之囏阨委積于野如遺人于鄉里也以質劑致民案入税者名㑹而貸之興積所興之積謂三者之粟也平頒之不得偏頗有多少縣官徴聚物曰興今云軍興是也是粟縣師徴之旅師斂之而用之以賙衣食曰惠以作事業曰利均其政令者皆以國服為之息還疏所聚之粟遇有凶年賑恤所輸入之人欲與之粟案入税者之人名㑹計多少以貸之凡用粟春頒而秋斂之注困時施之饒時收之疏上所云是貸而生利此所云是直給不生利也官得舊易新民得濟其困乏官民俱益之也易氏祓曰春頒者平頒其興積秋斂者聚野之耡粟屋粟而用之蓋凶荒之歳秋雖不熟尚有餘積或可移用及春作之始苟非上之人為之補助則將有救死不贍之患此先王所以專立春頒之法漢之春和議賑貸正與同意李氏景齊曰散之以春則民有以濟其乏而斂之以秋則粒米狼戾之時不至于穀賤而傷農蕙田案大司徒荒政之散利即此旅師所云施惠散利也春時農事方興其無力者頒粟以貸之秋收則計其所貸而斂之均政令者各計其戸口之多少年歳之盈歉以爲頒粟之差等鄭以國服爲息觧之疑非是蓋散利者所以恤民之乏不當又取其息也倉人掌粟入之藏辨九穀之物以待邦用若穀不足則止餘灋用有餘則藏之以待凶而頒之王氏昭禹曰法式所用有雖不足不可以已者有待有餘然後用者所謂餘法用則待有餘而餘用者易氏祓曰大府所謂式貢之餘財以供玩好幣餘之賦以待賜予委人所謂凡其餘聚以待頒賜止餘法用止此者歟有餘則藏之以待凶而頒之是樂歳則取之于民凶年則遂以頒之于民取之不以為虐頒之乃所以為利無非充裕民之仁政遺人縣都之委積以待凶荒疏縣四百里都五百里不見稍三百里則縣都中可以兼之特于此三處言凶荒者畿外凶荒則入向畿内取之畿内凶荒則向畿外取之鄭氏鍔曰凶荒則流離入闗者多矣故積于縣都以待之如漢時闗東水旱流民入闗中仰食之𩔖即都鄙之境上以賙恤之不來莩于京師李氏景齊曰司徒荒政所以散利或者取具于此歟司稼掌均萬民之食而賙其急而平其興注均謂度其多少賙禀其艱阨李氏嘉㑹曰司稼尤近民故賙急平興以先之又不足廪人始有移民就穀之事黄氏度曰司稼巡稼知歳之豐凶民之寛急為最切故通掌其事王氏與之曰平其興亦當如旅師謂平均其所興舉之粟以給之司救凡歳時有天患民病則以節巡國中及郊野而以王命施惠注施惠賙恤之春秋文公十六年左氏傳宋公子鮑禮于國人宋饑竭其粟而貸之襄公二十九年左氏傳五月鄭子展卒子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟戸一鍾是以得鄭國之民故罕氏常掌國政以爲上卿宋司城子罕聞之曰鄰于善民之望也宋亦饑請于平公出公粟以貸使大夫皆貸司城氏貸而不書爲大夫之無者貸宋無饑人昭公三年左氏傳晏子曰公棄其民而歸于陳氏齊舊四量豆區釡鍾四升爲豆各自其四以登于釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之蕙田案春秋時列國無復舉散利施惠之政者旅師司稼其職久廢而世卿大族或藉以結民心而專國政若宋子罕者其猶有歸美于君之意乎孟子齊饑陳臻曰國人皆以夫子將復爲發棠殆不可復注棠齊邑也孟子嘗勸齊王發棠邑之倉以賑貧窮時人賴之今齊人復饑陳臻言一國之人皆以為夫子將復若發棠時勸王也殆不可復言之也漢書文帝本紀後六年夏四月大旱蝗發倉庾以振民後漢書章帝本紀永平十八年京師及三州大旱詔其以見穀賑給貧人建初元年春正月詔三州郡國方春東作恐人稍受廪徃來繁劇或妨耕農其各實覈尤貧者計所貸并與之流人欲歸本者郡縣其實禀令足還到聽過止官亭無雇舍宿長吏親躬無使貧弱遺脱小吏豪右得容姦妄詔書既下勿得稽留刺史明加篤察尤無狀者和帝本紀永元十二年閏四月賑貸敦煌張掖五原民下貧者穀六月舞陽大水賜被水災尤貧者穀人三斛十三年三月丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者秋八月詔象林民失農桑業者賑貸種糧禀賜下貧穀十四年夏四月庚辰賑貸張掖居延敦煌五原漢陽㑹稽流民下貧穀各有差十五年二月詔禀貸潁川汝南陳留江夏梁國敦煌貧民安帝本紀永和元年正月禀司𨽻兖豫徐冀并州貧民二年春正月禀河南下邳東萊河内貧民二月遣光祿大夫樊凖呂倉分行冀兖二州禀貸流民冬十月禀濟隂山陽元莵貧民十二月禀河郡鉅鹿廣陽安定襄沛國貧民四年正月禀上郡貧民各有差二月禀九江貧民元初二年正月詔禀三輔及并凉六郡流宂貧人五年三月京師及郡國五旱詔禀遭旱貧人順帝本紀永建二年二月詔禀貸荆豫兖冀四州流冗貧人所在安業之疾病致醫藥三年四月遣光禄大夫案行漢陽及河内魏郡陳留東郡禀貸貧人陽嘉元年二月詔禀甘陵貧人大小口各有差三月禀冀州尤貧民永和四年秋八月太原郡旱民庶流冗癸五遣光禄大夫案行禀貸桓帝本紀建和元年二月荆揚二州人多餓死遣四府掾分行賑給魏志文帝本紀黄初三年秋七月冀州大蝗民饑使尚書杜畿持節開倉廪以振之五年十一月以冀州饑遣使者開倉廪振之明帝本紀景初元年九月冀兖徐豫四州民遇水遣侍御循行没溺死亡及失財産者在所開倉賑救之晉書武帝本紀泰始四年九月青徐兖豫四州大水伊洛溢合于河開倉以振之惠帝本紀元康八年春正月地震詔發倉廪振雍州饑人元帝本紀太興元年十二月江東三郡饑遣使振給之食貨志太興二年三吳大饑死者以百數吳郡太守鄧攸輙開倉廪賑之元帝時使黄門侍郎虞􅔎桓彞開倉廪振給并省衆役成帝本紀咸康二年七月揚州㑹稽饑開倉振給哀帝本紀隆和元年冬十月賜貧乏者米人五斛宋書文帝本紀元嘉十二年六月丹陽淮南吳興義興大水以徐豫南兖三州㑹稽宣城二郡米數百萬斛賜五郡遭水民沈演之傳元嘉十二年東諸郡大水民人饑饉吳興義興及吳郡之錢唐升米三百以演之及尚書祠部郎江邃並兼散騎常侍巡行拯䘏許以便宜從事演之乃開倉廪以賑饑民民有生子者口賜米一斗二十年諸州郡水旱傷稼民大饑遣使開倉賑䘏孝武帝本紀大明元年五月吳興義興大水民饑乙卯遣使開倉賑䘏七年十月詔曰雖秋澤頻降而夏旱嬰弊可即開行倉並加賑賜八年二月詔曰去歳東境偏旱田畝失收使命來者多至乏絶或下流窮穴頓伏街巷朕甚閔之可出倉米付建康秣陵二縣随宜贍恤若温拯不時以至捐棄者嚴加紏劾南齊書武帝本紀永明六年八月詔吳興義興水潦被水之鄉賜痼疾篤癃口二斛老疾一斛小口五斗八年十月詔吳興水淹過度開所在倉賑賜魏書太武帝本紀泰常八年十月即皇帝位十有二月開倉庫賑窮乏冊府元龜泰常八年十月以歳饑詔所在開倉賑給魏書太武帝本紀神䴥四年二月定州民饑詔啟倉以賑之太平真君元年州鎮十五民饑開倉賑恤九年二月山東民饑啟倉賑之文成帝本紀興安元年十有二月詔以營州蝗開倉賑恤太安三年十有二月以州鎮五蝗民饑使使者開倉以賑之五年冬十有二月詔曰六鎮雲中髙平二雍秦州徧遇災旱年穀不收其遣開倉廪以賑之有流徙者諭還桑梓和平五年二月詔以州鎮十四去歳蟲水開倉賑恤獻文帝本紀天安元年州鎮十一旱民饑開倉賑恤皇興二年十有一月以州鎮二十七水旱開倉賑恤四年春正月詔州鎮十一民饑開倉賑恤孝文帝本紀延興二年六月安州民遇水雹丐租賑恤九月詔以州鎮十一水丐民田租開倉賑恤三年三月詔諸倉囤穀麥充積者出賜貧民是歳州鎮十一水旱丐民田租開倉賑恤四年州鎮十三大饑丐民田租開倉賑之太和元年春正月雲中饑開倉賑恤十有二月詔以州郡八水旱蝗民饑開倉賑恤二年州鎮二十餘水旱民饑開倉賑恤三年六月以雍州民饑開倉賑恤四年以州鎮十八水旱民饑開倉賑恤五年十有二月詔以州鎮十二民饑開倉賑恤七年十有二月詔以州鎮十三民饑開倉賑恤八年十有二月詔以州鎮十五水旱民饑遣使者巡行問所疾苦開倉賑恤十年十有二月詔以汝南潁川大饑丐民田租開倉賑恤十有一年二月詔以肆州之雁門及代郡民饑開倉賑恤六月辛巳秦州民饑開倉賑恤十有二年十有一月詔以二雍豫三州民饑開倉賑恤十三年四月州鎮十五大饑詔所在開倉賑恤二十年十有二月以西北州郡旱儉遣侍臣循察開倉賑恤宣武帝本紀太和二十三年夏四月即皇帝位是歳州鎮十八水民饑分遣使者開倉賑恤景明元年十七州大饑分遣使者開倉賑恤正始四年秋八月敦煌民饑開倉賑恤九月司州民饑開倉賑恤永平二年夏四月詔以武州鎮饑開倉賑恤三年五月詔以冀定二州旱儉開倉賑恤延昌元年春正月以頻水旱百姓饑敝分遣使者開倉賑恤二月州郡十一大水詔開倉賑恤以京師穀貴出倉粟八十萬石以賑貧者六月詔出太倉粟五十萬石以賑京師及州郡饑民二年二月以六鎮大饑開倉賑贍六月青州民饑詔使者開倉賑恤三年夏四月青州民饑開倉賑恤孝明帝本紀熙平元年夏四月以瀛州民饑開倉賑恤二年冬十月庚寅以幽冀滄瀛四州大饑遣尚書長孫稚兼尚書鄧羡元纂等巡撫百姓開倉賑恤戊戌以光州饑敝遣使賑恤神龜元年春正月幽州大饑民死者三千七百九十九人詔刺史趙邕開倉賑恤食貨志天平三年秋并肆汾建晉秦陜東雍南汾九州霜旱民饑流散四年春詔所在開倉賑恤之而死者甚衆北齊書武成帝本紀河清四年三月詔給西兖梁滄趙州司州之東郡陽平清河武都冀州之長樂渤海遭水潦之處貧下戸粟各有差家别斗升而已又多不付周書武帝本紀建德四年岐寧二州民饑開倉賑給隋書食貨志山東頻年霖雨杞宋陳亳曹戴譙潁等諸州達于滄海皆困水災所在沉溺開皇十八年天子遣使將水工巡行川源相視髙下發隨近丁以疏導之困乏者開倉賑給前後用穀五百餘石自是頻有年矣冊府元龜唐武德元年十二月開倉以賑貧乏貞觀十五年二月建州言去秋䑕災損稼發義倉賑之十七年七月汝南州旱開倉賑給十八年九月穀襄豫荆徐梓忠綿宋亳十州言大水並以義倉賑給之十九年正月易州言去秋水害稼開義倉賑給之二十一年八月萊州螟發倉以賑貧乏二十二年正月詔建州去秋蝗以義倉賑貸二月詔泉州去秋蝗及海水泛溢開義倉賑貸唐書高宗本紀永徽二年正月開義倉以賑民舊唐書高宗本紀儀鳯四年二月東都饑官出糙米以救饑人冊府元龜景龍三年三月制發倉廪賑饑人開元二年正月敕曰如聞三輔近地幽隴之間頃縁水旱素不儲蓄嗷嗷百姓已有饑者宜令兵部員外郎李懷讓主爵員外郎慕容珣分道即馳驛徃岐華同幽隴等州指宣朕意灼然乏絶者速以當處義倉量事賑給如不足兼以正倉及永豐倉米充仍令節減務救懸絶者還日奏聞六年三月詔曰間者河北河南頗非善熟人間糧食固應乏少頃雖分遣使臣已令巡問猶慮鰥獨不能自存凡立義倉用爲歳備今舊穀向沒新穀未登宜開彼用儲時令貸給况京坻轉積歳月滋壞因而變造爲利宏多將以散滯收贏理財均施所司合作條件俾便公私八年二月以河南淮南江南頻遭水旱遣吏部郎中張旭等分道賑恤四月華州刺史竇思仁奏乏絶戸請以永豐倉賑給從之十五年七月冀州幽州莫州大水河水泛溢漂損居人室宇及稼穡並以倉糧賑給之八月制曰河北州縣水災尤甚言念蒸人何以自給朕當宁興想有勞旰昃在予之責用軫于懷宜令所司量支東都租米二十萬石賑給盧從愿傳開元二十年河北饑詔爲宣撫處置使發倉廥賑饑民舊唐書𤣥宗本紀開元二十一年闗中久雨害稼京師饑詔出太倉粟二百萬石給之文獻通考開元二十二年敕應給貸糧本州録奏待敕到三口以下給米一石六口以下給米兩石七口以下給米三石如給粟凖米計折冊府元龜開元二十九年制曰本制倉儲用防水旱朕每念黎庶嘗憂匱乏承前有遭損之州皆待奏報然後賑給近年亦分命使臣與州縣相知處置尚慮道路應逺徃復淹滯以此恤人何救懸絶自今已後若有損處應須賑給宜令州縣長官與採訪使勘㑹量事給訖奏聞朕當重遣使臣宣慰按覆貞元元年正月賑貸諸道將士百姓昭義河東成德幽州義武魏博奉誠晉慈隰宣武平盧汴滑河陽東都畿汝州諸軍節度合賑米四十七萬石舊唐書徳宗本紀貞元八年十二月詔賜遭水縣乏絶戸米三十萬石冊府元龜貞元十三年三月河南府上言當府旱損請借含嘉倉粟五萬石賑貸百姓可之舊唐書徳宗本紀貞元十四年六月以旱儉出太倉粟賑貸舊唐書憲宗本紀順宗即位之年八月受内禪即皇帝位九月敕申光蔡陳許兩道比遭亢旱宜加賑恤申光蔡賑米十萬石陳許五萬石冊府元龜元和元年四月命禮部員外郎裴汶以米十萬石賑給于浙東四年六月渭南縣暴水發溢漂損廬舎二百一十三戸秋田十六頃溺死者六人命京兆府發義倉賑給十一月詔淮南揚楚滁三州浙西潤蘇常三州今年歉旱尤甚米價殊高言念困窮豈忘存恤宜以江西湖南鄂岳荆南等使折糴米三十萬石賑貸淮南道三州三十萬石貸浙西道三州恐此米來遲不救所切宜委淮南浙西觀察使且各以當道軍糧米據數給旱損人戸節級作條件賑貸淮南李吉甫浙西韓臯躬親部署令刺史縣令切加勾當使此米必及饑人以副朕意如賑貸三州之外可及諸州亦聽量便宜處置待江西等道折糴和糴米到各處依數收管六年二月制曰如聞京畿之内縁舊穀已盡粟麥未登尚不足于食陳豈有餘于播種勸其耕食固在及時念彼徴求尤資寛貸京兆府宜以常平義倉粟二十四萬石貸借百姓其諸道府州有乏少糧種處亦委所在官長用常平義倉糧借貸淮南浙西宣歙等道元和四年賑貸並且停徴容至豐年然後填納舊唐書憲宗本紀元和七年二月詔以去秋旱歉賑京畿粟三十萬石其元和六年春賑貸百姓粟二十四萬石並宜放免九年二月詔以歳饑賑常平義倉粟三十萬石十一年四月以徐宿饑賑粟八萬石十二年正月以京畿及陳許饑詔鄭滑觀察使以估糶官粟救之九月制曰諸道應遭水州府河南澤潞河東幽州江陵府等管内及鄭滑滄景易定陳許晉隰蘇襄復台越唐隨鄧等州人戸宜令本州厚加優恤仍各以當處義倉斛㪷據所損多少量事賑給訖具數奏聞十四年七月東都留守上言河南府汝州百姓饑詔貸河南府粟五萬石汝州二萬石舊唐書穆宗本紀長慶二年七月陳許水災賑粟五萬石冊府元龜太和二年七月詔曰如聞山東降災滛雨泛濫應是諸州遭水損田苗壞廬舎處宜委所在吏切加訪恤如不能自濟者宜發義倉賑給普令均一以副朕懷三年五月詔去歳已來水損處鄆曹濮青淄德齊等三道宜各賜米五萬石並以入運米在側近者逐便速與搬運仍以有司員外郎劉茂復充曹濮等道賑恤使戸部員外郎嚴譽兖海等道賑恤使四年七月許州上言去年六月二十一日被水有詔仍令宣慰使李珝與本道勘㑹人戸實水損每人量給米一石其當戸人多亦不得過五石令度支以逐便支送其人粟數分并以聞八月舒州上言當州太湖宿松望江等縣從今年四月已後江水泛漲沒百姓産業共計六百八十二戸並盡人皆就高避水饑貧無食有詔以義倉賑給舊唐書文宗本紀太和四年秋七月太原饑賑粟三萬石九月舒州太湖宿松望江三縣水溺民戸六百八十詔以義倉賑貸是歳京畿河南江南荆襄鄂岳湖南等道大水害稼出官米賑給五年春正月太原旱賑粟十萬石秋七月劍南東西兩川水遣使宣撫賑給六年二月蘇湖二州水賑米二十二萬石以本州常平義倉斛斗給五月浙西丁公著奏杭州八縣災疫賑米七萬石冊府元龜太和七年正月以旱詔京兆府河中等九州府宜賜粟五十六萬石並以常平義倉及所糴斛㪷充無本色者以運米折給委本州府長吏明作等第差官吏對面宣賜先從貧下起給開成元年正月詔同州賜穀六萬石河中府絳州共賜十萬石委度支戸部以見貯粟麥充賜舊唐書文宗本紀開成三年春正月詔去秋蝗蟲害稼處以本處常平倉賑貸文苑英華開成三年正月詔淄青兖海鄆曹濮去秋蟲蝗害物徧甚宜以當處常平義食斛斗速加賑救京兆府諸州府應有蝗蟲米穀貴處亦宜以常平義倉及側近官中所貯斛斗量加賑恤唐書宣宗本紀大中九年七月以旱遣使巡撫淮南𤼵粟賑民冊府元龜後唐同光四年正月明宗奏深冀諸州縣流亡饑饉戸一千四百乞鄴都倉儲借貸以濟窮民長興元年正月滑州上言准詔賑貸貧民以去年水災故也二月郊禋禮畢制曰諸州府或經水旱災沴恐人戸闕少糇糧方值春時誠宜賑恤宜令逐處取去年納到新好屬省斛斗各加賑貸候秋收日徴納是月宋州奏准詔賑貸粟萬石五月青州奏准詔賑貸貧民糧一萬四百一十九石三年七月内出御劄示百僚曰今年州府遭水潦處已下三司各指揮本州府支借麥種及等第賑貸斛食仰逐處長吏切加安存不得輙有差使如戸口流移其戸下田園屋宅仰村鄰節級長須主管不得信令殘毁候本戸歸日具元本桑棗根數及什物數目交付不得致有欠少本戸未歸即許鄰保請佃供輸若入務時歸業准例收秋後交付後晉天福六年四月以齊路民饑詔兖青鄆三州發管内倉糧賑貸七年七月開封府奏准宣給糧二萬石賑諸縣貧民八月詔襄州城内百姓等久經圍閉例各饑貧宜示頒宣用明恩渥大戸各賜粟二石小戸各賜粟一石宜令襄州以見在數充十二月詔遣供奉官馬延翰雒京賑恤饑民仍宣河南府差大將量將米豆徃諸山谷裱散給人戸其諸縣係欠秋税與限至來年夏麥徴納後周廣順二年二月齊州言禹城縣二年水民饑流亡今年見固河倉有濮糧五萬二千餘斛欲賑貸勅諸邑留二三千斛給巡檢職員餘並賑貸貧民顯德四年三月命左諫議大夫尹日就于夀州開倉賑其饑民六年三月遣使徃和州開倉以賑饑民命夀州開倉以賑饑民文獻通考顯德六年淮南饑上命以米貸之或曰民貧恐不能償上曰民猶子也安有子倒懸而父不爲觧者安責其必償也宋史食貨志宋之爲治一本于仁厚凡振貧恤患之意視前代尤爲切至諸州歳歉必發常平惠民諸倉粟或平價以糶或貸以種食或直以振給之無分于主客戸不足則遣使馳傳發省倉或轉漕粟于他路又不足則出内藏或奉宸庫金帛鬻祠部度僧牒東南則留發運司歳漕米或數十萬石或百萬石濟之初建隆三年戸部郎中沈義倫使吳越還言楊泗饑民多死郡中軍儲尚餘萬斛宜以貸民有司沮之曰若歳未稔誰任其咎義倫曰國家以廪粟濟民自當召和氣致豐年寧憂水旱耶太祖悦而從之太祖本紀乾德元年二月辛亥澶滑衛魏晉絳蒲孟八州饑命發廪振之文獻通考開寶四年詔賑廣南管内州縣鄉村不接濟人戸委長吏于省倉内量行賑貸候豐稔日令只納元數宋史太祖本紀開寶六年二月曹州饑漕太倉米二萬石振之七年六月河中府饑發粟三萬石振之文獻通考開寶八年平江南詔出米十萬石賑城中饑民太宗太平興國八年以粟四萬石賑同州饑宋史太宗本紀端拱二年三月以太倉粟貸京畿饑民文獻通考淳化二年詔永興鳯翔同華陜等州歳旱以官倉粟貸之人五斗仍給復二年五年命直史館陳堯叟等徃宋亳陳頴等州出粟以貸饑民每州五千石及萬石仍更不理納宋史真宗本紀咸平二年三月江浙發廪賑饑是歳江浙廣南荆湖旱嵐州春霜害稼分使發粟賑之四年閏十二月河北饑發廪賑之文獻通考咸平五年遣中使詣雄霸瀛莫等州爲粥以賑饑民兩浙提刑鍾離瑾言百姓缺食官設糜粥民競赴之有妨農事請下轉運司量出米賑濟家得一斗從之宋史真宗本紀大中祥符元年正月夏州饑請易粟許之二年九月賜秦州被水民粟人一斛發官廪振鳯州水災七年三月發粟振儀州饑九年二月延州蕃部饑貸以邊穀八月令江淮發運司留上供米五十萬以備饑年天禧元年二月詔振災發州郡常平倉是歳諸路蝗民饑鎮戎軍風雹害稼詔發廪振之四年二月發唐鄧八州常平倉振貧民三月振蕃部粟五月發粟振秦隴乾興元年二月詔蘇湖秀州民饑貸以廪粟仁宗本紀天聖三年十一月晉絳陜觧州饑發粟振之四年十二月發米六十萬斛貸畿内饑鞠詠傳詠爲三司鹽鐡判官天聖六年河北京師旱饑奏請出太倉米十萬石振饑民明道元年冬十月詔漢陽軍發廪粟以振饑民二年正月詔發運使以上供米百萬斛振江淮饑民遣使督視景祐元年正月發江淮漕米振京東饑民二年以鎮戎軍薦饑貸弓箭手粟麥六萬石寳元二年九月出内庫銀四萬兩易粟振益梓利䕫路饑民慶歴八年九月詔三司以今年江淮漕米轉給河北州軍十二月出内藏錢帛賜三司貿粟以濟河北流民皇祐元年十一月詔河北被災民八十以上及篤疾不能自存者人賜米一石酒一斗五年五月詔轉運司振邕州貧民戸貸米一石英宗本紀治平元年八月以上供米三萬石振宿亳二州水災戸文獻通考治平四年河北旱民流入京師待制陳薦請以糴便司陳粟貸民戸二石從之御史中丞司馬光上疏曰聖王之政使民安其土樂其業自生至死莫有離散之心爲此之要在于得人以臣愚見莫若謹擇公正之人爲河北監司使之察災傷州縣守宰不勝者易之然後多方那融斗斛各使賑濟本州縣之民若斗斛數少不能周徧者且須救土著農民各據版籍先從下等次第賑濟則所給有限可以豫約矣司馬光論賑濟劄子臣竊惟鄉村人戸播植百穀種藝桑麻乃天下衣食之原也比於餘民尤宜存恤凡人情戀土各願安居苟非無以自存豈願流移他境國家若於未流移之前早行賑濟使糧食相接不至失業則此屋安堵官中所費少而民間實受賜若於既流移之後方散米煮粥以有限之儲蓄待無窮之流民徒更聚而餓死官中所費多而民實無所濟伏覩近降朝㫖令戸部指揮府界諸路提㸃刑獄司體量州縣人戸如委是闕食據見在義倉及常平米穀速行賑濟仍丁寧指揮州縣多方存恤無致流移失所此誠得安民之要道然所以能使民不流移者全在本縣令佐得人欲使更令提㸃刑獄司指揮逐縣令佐專切體量鄉村人戸有闕食者一面申知上司及本州更不候囬報即將本縣義倉及常平倉米穀直行賑貸仍據鄉村三等人戸逐戸計口出給歴頭大人日給二升小兒日給一升令各從民便或五日或十日或半月一次齎歴頭詣縣請領縣司亦置簿照㑹若本縣米穀數少則先從下戸出給歴頭有餘則并及上戸其不願請領者亦聽候將來夏秋成熟糧食相接日即據簿歴上所貸過糧令隨税送納一斗只納一斗更無利息其令佐若别有良法簡易便民勝於此法者亦聽從便要在民不乏食不至流移而已仍令提點刑獄司常切體量逐縣令佐有能用心存恤闕食人戸雖係災傷並不流移者保明聞奏優與酬奬其全不用心賑貸致戸口多流移者取勘聞奏乞行停替庶使吏有所勸沮百姓實霑聖澤神宗本紀熙寧元年二月貸河東饑民粟七年二月發常平米振河陽饑民七月以米十五萬石振河北西路災傷八月置塲于南董安上門給流民米十月詔浙西路提舉司出米振常潤州饑八年正月輟江南東路上供米均給災傷州軍曾鞏越州趙公救菑記熙寧八年夏吳越大旱九月資政殿大學士右諫議大夫知越州趙公前民之未饑爲書問屬縣菑所被者幾鄉民能自食者有幾當廪于官者幾人溝防構築可僦民使治之者幾所庫錢倉粟可發者幾何富人可募出粟者幾家僧道士食之羨粟書于籍者其幾具存使各書以對而謹其備州縣吏錄民之孤老疾弱不能自食者二萬一千九百餘人以告故事歳廪窮人當給粟三千石而止公斂富人所輸及僧道士食之羨者得粟四萬八千餘石佐其費使自十月朔人受粟日一升㓜小半之憂其衆相蹂也使受粟者男女異日而人受二日之食憂其且流亡也于城市郊野爲給粟之所凡五十有七使各以便受之而告以去其家者勿給計官爲不足用也取吏之不任職而寓于境者給其食而任以事不能自食者有是具也能自食者爲之告富人無得閉糶又爲之出官粟五萬二千餘石平其價予民爲糶粟之所凡十有八使糴者自便如受粟又僦民完城四千一百丈爲工三萬八千計其傭與錢又與粟再倍之民取息錢者告富人縱予之而待熟官爲責其償棄男女者使人得收養之宋史神宗本紀元豐元年八月詔濵棣滄三州被水民以常平糧貸之庚午詔青齊淄三州給流民食二年二月滄州饑發食粟振之文獻通考元豐元年詔以濵棣滄州被水災令民第四等以下立保貸請常平糧有差仍免出息帝曰賑濟之法州縣不能舉行夫以政殺人與刃無異今出入一死罪有司未嘗不力爭至于凶年饑歳老㓜轉死溝壑而在位者殊不恤此出於政事不修而士大夫不知務也王巖叟請依舊法賑濟免河北貸糧出息疏臣按祖宗賑濟舊法災傷無分數之限人戸無等第之差皆得借貸但令隨税納元數而已未嘗有息也故四方之人霑惠者溥銜恩者深郡縣倉庾以陳易新者多其後刻薄之吏隂改舊法必待災傷放税七分以上方許貸借而第四等以下方免出息殊非朝廷本意縁災傷放税多是監司以聚斂爲急威脅州縣州縣又承望風㫖不復體心朝廷以災傷的實分數除放若放及七分者災傷已是十分况少肯放及七分又六分之與七分相去幾何毫釐之間何以辨别幸而得爲七分别有借貸不幸而爲六分則無借貸但繫檢災官吏一言之髙下而被災百姓幸不幸相逺如此不可不察也三等而上均爲赤子均遇天災豈容因災偏令出息計其所得則甚少論其所損則實多乖陛下平一之心虧朝廷光大之施臣乞復如舊法不限災傷之分數並容借貸不拘民戸之等第均令免息庶幾聖澤無間感人心於至和天下幸甚如允臣所奏其河北京西淮南等路昨來水災州縣乞先次指揮施行蕙田案賑貸之令以拯窮民自不當更收其息况大荒之民宜賑濟次荒之民宜賑借必災傷已及十分方計貸借則太晚矣王巖叟之議最爲正大宋史哲宗本紀紹聖元年三月詔振京東河北流民貸以穀麥種諭使還業是歳京師疫洛水溢太原地震河北水發京都粟振之蘇軾乞將損弱米貸與上戸令賑濟佃客狀紹聖元年二月日狀奏臣契勘本路州軍災傷闕食人戸雖已奏准朝㫖於法外減價出糶常平白米賑濟訪聞民間闕乏少得見錢糴買尚有饑困之人今㸃檢得定州省倉有專副杲榮趙昇界熙寧八年糴到軍糧白米及專副梁儉劉受界元豐三年米皆爲年深夾襍損弱不堪就整充廂軍人糧支遣每月只充廂軍次米帶支今契勘得逐次止帶支五百石比至支絶更須三五年間顯見轉至陳惡兼聞本州管下村坊客戸見今實闕餱糧其上等人戸雖各有田業縁值災傷亦甚闕食難以賑濟况客戸乃主戸之本若客戸闕食流散主戸亦須荒廢田土矣今相度欲望朝廷詳酌特降指揮下定州將兩界見在陳損白米二萬餘石分給借貸與鄉村第一等第二等主戸吃用令上件兩等人戸據客戸人數不限石斗依此保借候向去豐熟日依元糴例並令送納十分好白米入官不惟乗此饑年人戸闕食優加賑濟又免損壞盡爲土壤如以爲便即乞速賜指揮行下謹錄奏聞伏候勅㫖貼黄今來已是春深正當春夏青黄不交之際可以發脱上件陳米斛㪷公私俱便若失此時則人戸必不願請不免守支積年化爲糞壤乞斷自朝廷早賜指揮入急遞行下更不下有司徃復勘㑹今來所乞借貸皆是臣與官吏體問上戸願得此米以濟佃戸將來必無失䧟與尋常賑貸一例支與貧下戸人催納費力事體不同乞早賜行下蕙田案上戸於佃客元有周濟之義而秋成徴納之際下戸或有逋逃上戸必無失䧟東坡議以陳粟貸上戸令其借給佃客亦荒政可行之一法也徽宗本紀崇寧四年蘇湖秀三州水賜乏食者粟大觀元年秦鳳旱京東水河溢遣官振濟貸被水戸租三年江淮荆浙福建旱秦鳳階成饑發粟振之食貨志紹興二十八年夏浙東西田損於風水在法水旱及七分以上者振濟詔自今及五分處亦振之髙宗本紀紹興二十九年閏六月命江湖浙西五漕司増價糴米二百二十萬石赴沿江十郡自荆至常州以備振貸孝宗本紀隆興二年九月以久雨出内庫白金四十萬兩糴米賑貧民文獻通考乾道三年臣僚言日前富家放貸約米一斗秋成還錢五百其時米價既平糶四斗始克償之農民豈不重困詔應借貸米穀只還本色取利不過五分蕙田案此懲私借之弊使富家不得乗穀貴以取數倍之息其意善矣荒政考略乾道五年御批今春閩中艱食朕甚念之向聞諸處賑濟多止及於城郭而不及鄉縣甚爲未均卿等一一奏來蕙田案賑䘏之惠惟徧及爲難南渡以後惟孝宗有愛民之實心故能見及之七年饒州旱措畫義倉米八萬石又撥附近州縣義倉五萬石併截留上供米二千石并立賞格勸諭出粟王圻續通考淳熙二年詔諸路常平司每歳於秋成之際取見所部郡縣豐歉各及幾分如有合賑糶賑給去處即仰約度所用及見管米斛若干或有闕少合如何措置移運並預期審度施行仍須於九月初旬條具聞奏宋史孝宗本紀淳熙四年三月貸隨郢二州饑民米王圻續通考七年姚述堯進對今歳旱傷賑恤之政當務寛大上曰國家儲蓄本備凶歳捐以予民朕所不惜宋史食貨志淳熙十一年福建諸郡旱錫米二十五萬石振糴一萬石振貧乏細民孝宗本紀淳熙十四年正月出四川樁積米貸濟金洋州及闗外四州饑民七月命臨安府捕蝗募民輸米振濟光宗本紀紹熙四年二月出米七萬石振江陵饑民食貨志慶元元年二月上以歳凶百姓饑病詔曰朕德菲薄饑饉薦臻使民阽於死亡夙夜慘怛寧敢諉過於下耶顧使者守令所與朕分寄而共憂也乃渉春以來聞一二郡老稚乏食去南畝捐溝壑咎安在耶豈振給不盡及民歟得粟者未必饑饑者未必得歟偏聚於所近不能均濟歟官吏視成而自不省歟其各恪意措畫務使實惠不壅毋以虛文䝉上則朕汝嘉寧宗本紀嘉泰四年十一月己未朔詔兩淮荆襄諸州值荒歉奏請不及者聽先發廪以聞王圻續通考開禧二年發米賑濟貧民寧宗本紀嘉定元年八月發米振貧民九月出安邊所錢一百萬緡命江淮制置大使司糴米振饑民二年八月發米十萬石振兩淮饑民三年五月以久雨發米振貧民七年十一月命浙東監司發常平米振災傷州縣十年十一月詔浙東提舉司發米十萬石振給貧民十五年十二月發米振給臨安府貧民十六年三月以道州民饑詔發米振之食貨志嘉定十六年詔於楚州所儲米撥二萬石濟山東西王圻續通考嘉定十七年知廣德軍耿秉田因歳歉發倉賑濟活饑民萬餘自劾矯制之罪上聞之賜璽書褒異紹定五年三月以隂雨詔出豐儲倉米五萬石以紓民食是年臣寮奏戒飭諸道常平使者遵用淳熙詔令每歳覈州縣豐歉分數或災傷重處即與賑䘏不許隱蔽不實違者罪之宋史理宗本紀淳祐十年十月詔郡邑間有水患其被災細民隨處發義倉振之王圻續通考淳祐十二年七月上諭輔臣嚴州水勢可駭移撥之米當賑濟不當賑糶謝方叔奏衢婺台亦多漂蕩宜一體救恤宋史理宗本紀寳祐元年七月温台處三郡大水詔發豐儲倉米并各州義廪振之開慶元年五月婺州大水發義倉米振之度宗本紀咸淳六年十月詔台州發義倉米四千石并發豐儲倉米三萬石振遭水家七年三月發屯田租穀十萬石振和州無爲鎮巢安慶諸州饑六月諸暨縣大雨暴風雷電發米振遭水家紹興府饑振糧萬石八年八月紹興府六邑水發米振遭水家遼史聖宗本紀統和十五年四月發義倉粟賑南京諸縣民食貨志開泰元年詔年穀不登發倉以貸聖宗本紀開泰六年十月南京路饑輓雲應朔宏等州粟振之道宗本紀大安二年七月出粟振遼州貧民九月發粟振上京中京貧民十一月出粟振乾顯成懿四州貧民三年二月發粟振中京饑四月詔出戸部司粟振諸路流民及義州之饑金史太宗本紀天㑹二年十月詔發寧江州粟賑泰州民被秋潦者世宗本紀大定三年四月賑山西路明安貧民給六十日糧十七年三月賑東京博索和碩館三路乙丑尚書省奏三路之粟不能周給上曰朕嘗語卿等遇豐年即廣糴以備凶歉卿等皆言天下倉廪盈溢今欲賑濟乃云不給自古帝王皆以蓄積爲國家長計朕之積粟豈欲獨用之耶今既不給可于鄰道取之以濟自今預備當以爲常二十一年三月上初聞薊平灤等州民乏食命有司發粟糶之貧不能糴者貸之有司以貸貧民恐不能償止貸有戸籍者上至長春宫聞之更遣人閲實賑貸以監察御史舒穆嚕元禮鄭大卿不紏舉各笞四十前所遣官皆論罪閏月漁陽令𤓰爾佳伊里哈司候判官劉居漸以被命賑貸止給富戸各削三官通州刺史郭邦傑總其事奪俸三月二十九年十一月詔有司今後諸處或有饑饉令總管節度使或提刑司先行賑貸或賑濟然後言上食貨志明昌六年七月勅宰臣曰詔制内饑饉之地令減價糶之而貧民無錢者何以得食其議賑濟省臣以爲闕食州縣一年則當賑貸二年然後賑濟如其民實無恒産者雖應賑貸亦請賑濟上遂命間隔饑荒之地可以辦錢收糴者減價糶之貧乏無依者賑濟宣宗本紀興定五年閏十二月發上林署粟賑貧民元史食貨志水旱疫癘賑貸之制中統三年濟南饑以糧三萬石賑之至元八年以糧賑西京路急逓鋪兵卒十二年濮州等處饑貸糧五千石十六年以江南所運糯米不堪用者賑貧民十九年真定饑賑糧兩月二十三年大都屬郡六處饑賑糧三月二十四年四月以陳米給貧民七月以糧給諸王阿濟格部貧民大口二斗小口一斗世祖本紀至元二十五年三月尚書省臣言近以江淮饑命行省賑之吏與富民因縁爲姦多不及于貧者今杭蘇湖秀四州復大水民鬻妻女易食請輟上供米二十萬石審其貧者賑之帝是其言食貨志至元二十六年京兆旱以糧三萬石賑之是年又賑左右翼屯田蠻軍及伊嚕勒部貧民糧各三月二十八年以去歳隕霜害稼賑宿衛士齊哩克昆糧二月以饑賑徽州溧陽等路民糧三月三十一年復賑宿衛士齊哩克昆糧三月元貞元年諸王阿南達部民饑賑糧二萬石是年六月以糧一千三百石賑隆興府饑民二千石賑千戸黙圗等軍七月以遼陽民饑賑糧二月大德元年以饑賑遼陽碩違勒達等戸糧五千石公主囊嘉特章位糧二千石是年臨江揚州等路亦饑賑糧有差腹裏并江南災傷之地賑糧三月二年賑龍興臨江兩路饑民又賑金復州屯田軍糧二月四年鄂州等處民饑發湖廣省糧十萬石賑之九年灃陽縣火賑糧二月皇慶元年寧國饑賑糧兩月明㑹典凡賑濟洪武十八年令天下有司凡遇歳饑先發倉廪賑貸然後具奏荒政考略洪武十九年詔曰所在鰥寡孤獨取勘明白果有田糧有司未曽除去設若無可自養者官歳給米六石其孤兒有田不能自爲既免差役有親戚者有司責令親戚收養無親戚者鄰里養之母致失所其無田者各一體給米六石鄰里親戚具孤兒名數分豁有無恒産以狀來聞候出㓜童民立戸河南大水命贖民鬻子廣治平略洪武二十六年孝感民饑有請發預備倉糧以貸之者太祖謂戸部曰朕嘗捐内帑之資付天下耆民糴儲正欲備荒歉以濟民急也若歳荒民饑必候奏請道途徃返民之饑死者多矣爾戸部即諭天下有司自今凡遇歳饑先發倉廪以貸民然後奏聞著爲令明㑹典洪武二十七年定災傷去處散糧則例大口六斗小口三斗五歳以下不與永樂二年定蘇松等府水渰去處給米則例每大口米一斗六歳至十四歳六升五歳以下不與每戸有大口十口以上者止與一石其不係全災内有缺食者原定借米則例一口借米一斗二口至五口二斗六口至八口三斗九口至十口以上者四斗候秋成抵斗還官通紀㑹纂永樂七年上巡幸北京命皇太子監國都御史虞謙巡視兩淮潁州軍民缺食請發廪賑貸皇太子馳諭之曰軍民困乏待哺嗷嗷卿等尚從容啟請汲黯何如人也即發廪賑之勿緩八年十月戸部賑北京臨城縣饑民三百餘戸給糧三千七百石有竒上曰國家儲蓄上以供國下以濟民故豐年則歛凶年則散但有土有民何憂不足紀事本末宣德初河南新安知縣陶鎔奏民饑借驛糧千石救賑秋成償還上謂夏原吉曰有司拘文法饑荒必申報賑濟民饑死久矣陶鎔先給後聞能稱任使毋責其專擅也荒政考略宣德八年詔軍民乏食者所在官司騐口給糧賑濟如官無見糧勸率有糧大戸借貸接濟待豐熟時抵斗酬還明㑹典正統五年令各衛所屯軍有因水旱子粒無收缺食者照缺食民人事例賑濟候秋成還官通紀㑹纂景泰二年命僉都御史王竑巡撫兩淮諸郡時徐淮大饑民死者相枕籍竑至盡所以救荒之術既而山東河南流民猝至竑不待奏報大發廣運官儲賑之全活數百萬人先是淮上大饑帝閲疏驚曰奈何百姓其饑死矣後得竑奏輙開倉賑濟大言曰好御史不然饑死我百姓矣明㑹典成化六年奏准流民願歸原籍者有司給與印信文憑沿途軍衛有司每口給口糧三升其原籍無房者有司設法起蓋草房四間仍不分男婦每大口給與口糧三斗小口一斗五升每戸給牛二隻量給種子審騐原業田地給與耕種優免糧差五年仍給下帖執照𢎞治二年議准順天河間永平等府水災渰死人口之家量給米二石漂流房屋頭畜之家給米一石通紀㑹纂嘉靖三年南畿都運大饑上命發帑藏截漕粟賑之明㑹典嘉靖十一年題准凡遇賑濟除各衛所上班官軍自有應得月糧外其原無糧餉軍餘或父母妻子極貧者查審的當與州縣饑民一體給散廣治平略神宗十四年𡊮伯修䇿曰賑之䇿一善行其賑之䇿六以幽遐蔀屋悉仰内帑其勢易窮而悉舉州邑之庫藏贖鍰急給州邑之窶者鮮不濟矣故從朝廷賑之則難從州邑賑之則易也一邑之内一郡之中豈無豪貲財好施與者故令上賑之則難令下民自相賑則易也里之厚貲者所捐若而百則賜綽楔旌之若而千則爵之若而萬則厚爵之富民有不竭蹶以趨者乎故繩之使賑則難勸之使賑則易也幽逺小民去城邑百里晨起裹糧蹩躠趨城胥吏猶持其短長非少賂之弗得經受賑得不償失奈何宜令耆民亷平者偕里之富而好施者臨其聚落招給焉平有賞私有罰蔑不暨矣故移民就食則難移食就民則易也夫珠不可衣玉不可食有米粟乏絶之處人至抱璧以殞者即得州邑及貲戸之賑而操金貲易轉移尚艱故使下民貸粟則難官司轉貸而給之猶易也凡此皆善行其賑之䇿者蕙田案以上賑米右散利上五禮通考卷二百四十七
