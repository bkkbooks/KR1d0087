body:
  text: 五禮通考卷七十五刑部尚書秦蕙田撰吉禮七十五宗廟制度書益稷戛擊鳴球傳球玉磬磬疏鳴球謂擊球使鳴樂器惟用玉故球為玉磬禮記明堂位拊搏玉磬陳氏樂書春秋時齊侯以玉磬賂晉師止兵臧文仲以玉磬如齊告糴郊特牲言諸侯宫縣而擊玉磬明堂位言四代樂器而拊搏玉磬則玉之於石類也玉聲則出乎其類矣以其爲堂上首樂之器其聲清徹有隆而無殺衆聲所求而依之者也商頌曰依我磬聲本諸此歟詩商頌那依我磬聲傳磬聲之清者也以象萬物之成箋磬玉磬也堂下諸縣與諸管聲皆和平不相奪倫又與玉磬之聲相依亦謂和平也玉磬尊故異言之蕙田案以上玉磬禮記明堂位叔之離磬疏叔之所作編離之磬陸氏佃曰離磬特磬也大戴禮縣一磬而尚拊爾雅大磬謂之毊陳氏禮書磬編則雜離則特叔之離磬特縣之磬也大戴禮曰縣一磬而尚拊則堂上亦有特縣磬矣陳氏樂書磬之為器昔人謂之樂石離磬則專簴之特磬非十二器之編磬也孟子玉振之也者終條理也朱注俟其既闋而後擊特磬以收其韻朱子文集樂有特鐘特磬是首尾用者朱子語類玉磬先後一般初打恁地響到作時也恁地響住時截然便住於衆樂之終必以此振之蕙田案以上特磬周禮春官磬師掌教擊磬注教教眡瞭也磬亦編聶氏三禮圖小胥職註云鐘磬編縣之二八十六枚而在一簨簴謂之堵十六枚之數起於八音倍而設之故十六也陳氏樂書磬師掌教擊磬擊編鐘言編鐘於磬師則知有編磬矣爾雅言大以見小磬師言鐘以見磬大則特縣小則編縣儀禮鼗倚于頌磬西紘則所謂紘者其編磬之繩歟小胥凡縣鐘磬半為堵全為肆鄭康成釋之謂編縣之十六枚同在一虡謂之堵鐘磬各一虡謂之肆禮圖取其倍八音之數而因之是不知鐘磬特八音之二者爾謂之取其數可乎典同凡為樂器以十有二律為之度數以十有二聲為之齊量則編鐘編磬不過十二爾謂之十六可乎蕙田案編磬之數經雖無文據疏以十六枚釋之其言固有所本聶氏乃謂數起于八音倍而設之夫磬乃八音之一何得以八音起數陳氏非之當矣但陳氏又泥十二律之數以為十二枚是又不知旋宫均調之有變半聲者亦未的也又案以上編磬儀禮大射儀樂人宿縣于阼階東笙磬西面西階之西頌磬東面周禮春官眡瞭擊頌磬笙磬注磬在東方曰笙笙生也在西方曰頌頌或作庸庸功也薛氏季宜曰磬之應鏞者曰頌磬頌即鏞也磬之應笙者曰笙磬大射禮笙磬西面是應笙之磬也又曰頌磬東面是應鏞之磬也一說謂鐘磬之應歌者曰頌鐘頌磬其應笙者曰笙鐘笙磬春秋傳有歌鐘二肆與頌鐘頌磬之義同周禮有笙鐘之樂與笙磬之義同近之矣黄氏度曰升歌則擊頌磬笙歌則擊笙磬蕙田案黄氏之說是陳氏樂書應笙之磬謂之笙磬應歌之磬謂之頌磬鄉飲酒之禮笙入堂下磬南北面立鄉射之禮笙入立于縣中西面蓋笙磬在東而面西頌磬在西而面東笙入立于縣中之南而面北故頌磬歌于西是南鄉北鄉以西方為上所以貴人聲也笙磬吹于東是以東方為下所以賤匏竹也大射鼗倚于頌磬而紘頌磬在西而有紘是編磬在西而以頌磬名之特磬在東而以笙磬名之周官眡瞭掌凡樂事播鼗擊頌磬掌太師之縣則頌磬編磬也笙磬特磬也縣則又兼編與特言之然言笙磬繼之以鐘鎛應笙之鐘鎛也笙師共笙鐘之樂是已言頌磬繼之以鐘鎛應歌之鐘鎛也左傳歌鐘二肆是已詩言笙磬同音書言笙鏞以間大鐘謂之鏞則笙鏞特縣之鐘也以笙鏞為特縣之鐘則笙磬為特縣之磬眀矣然則特磬特鐘編鐘編磬皆各堵而同肆鎛則隨之而已蕙田案樂書以笙磬為特磬非是笙匏竹也國語匏竹利制髙下在心應律合吕豈特磬所能應乎觀小雅笙磬同音則笙磬為編磬明矣又案以上頌磬笙磬書禹貢泗濱浮磬傳泗水涯水中見石可以為磬浮疏石在水旁水中見石似若水上然此石可以為磬故謂之浮磬也貢石而言磬者此石宜為磬猶如砥礪然也陳氏禮書先儒曰磬立秋之音禹貢泗濱浮磬蓋以土少而水多故其聲和潤也秦刻嶧山以頌曰刻此樂石顔師古曰嶧山近泗水秦取泗濱石銘之故曰樂石山海經云小華之山其陰多磬石又曰鳥危之山其陽多磬唐人多用華原石為磬周禮考工記磬氏為磬倨句一矩有半注必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳其博為一注博謂股博也博廣也股為二鼔為三參分其股博去一以為鼔博參分其鼔博以其一為之厚注鄭司農云股磬之上大者鼔其下小者所當擊者也𤣥謂股外面鼔内面也假令磬股廣四寸半者股長九寸也鼔廣三寸長尺三寸半厚一寸已上則摩其旁注鄭司農云磬聲太上則摩鑢其旁𤣥謂太上聲清也薄而廣則濁已下則摩其耑注太下聲濁也短而厚則清陳氏禮書世本曰無句作磬垂作鐘書曰垂之竹矢蓋叔與無句非二人垂之為工非一技皇氏謂無句叔之别名其說或然考工記磬氏為磬倨句一矩有半其博為一股為二鼔為三三分其股博去一以為鼓博三分其鼔博以其一為之厚葢鐘圓中規磬方中矩則倨句一矩有半觸其弦也其博為一股博一律也股為二後長二律也鼓為三前長三律也股非所擊也短而博鼓其所擊也長而狹鄭司農云股磬之上大者鼓其下小者康成云股外面鼔内面則擊者為前而在内不擊者為後而在外内者在下外者在上其大小長短雖殊而其厚均也黄鍾之磬股鼓皆厚二寸則餘推此可知矣蕙田案磬氏所言股鼓長短之制未有分别而曰已上則摩其旁是俾厚者而使之薄矣陳氏乃謂小大長短雖殊而其厚則均葢亦意擬之詞耳律呂正義宋林希逸考工記解載趙溥曰作磬依律長短前長三律二尺七寸後長二律一尺八寸此是黄鍾特垂之磬其他磬皆依律起度倨句一矩有半者以尺寸論之上邊倨句處共四尺五寸則此下邊兩弦之間恰有三尺三寸七分半又謂為一為二為三是分作三節算分數博為一謂股闊廣一律計九寸股為二謂股長二律計尺八寸鼔為三謂鼔長三律計二尺七寸參分股博去一以為鼓博則鼓廣六寸參分鼔博以一為厚則通上下其厚二寸此黄鍾磬餘皆以律準數賈公彦疏曰凡樂器厚則聲清薄則聲濁太上是聲清故摩使薄薄而廣則濁太下是聲濁由薄薄不可使厚故摩使短短則形小形小則厚厚則聲清宋志載阮逸胡瑗制十二磬股長鼓博皆依律分别長短而又逓加厚薄又宋王洙言周禮註疏磬有大小據此以黄鍾為律依法造黄鍾特磬正得林鍾律聲又范鎮樂論曰臣所造編磬皆以周官磬氏為法若黄鍾股之博四寸五分股九寸鼓一尺三寸五分鼓之博三寸而其厚一寸其弦一尺三寸五分十二磬各以其律之長而三分損益之此其率也今之十二磬長短厚薄皆不以律而欲求其聲不亦逺乎據范鎮之論制磬厚薄以律而長短仍以律矣案磬制周禮考工記言之已詳奈註者未盡其蘊而制者又未案其理故施於用而未合存諸簡而無徴也夫倨句一矩有半者倨之為言曲也禮記注微曲曰倨大曲曰句蓋句股之角直為大曲而磬之角鈍故微曲而為倨總之凡句與股皆矩也矩之小者為句矩之大者為股句為二分股為三分則股為句之一矩又有半譬如小矩句為一尺八寸則大矩股為二尺七寸句之一尺八寸復加其半九寸非二尺七寸乎下文博為一股為二鼔為三正此意也博為濶廣先儒已解之博為一乃一分譬如句為一尺八寸則博為九寸三分其股博去一以為鼔博者言股博為三分則鼔博為二分譬如股博為九寸則鼔博為六寸矣然首言博為一股為二鼔為三則所謂博者未分股博與鼔廣也今若以股博為股之半則鼔廣復去三分之一母乃太狹若以股博為鼔之半而鼓廣為股博之三分之二則體制適合於宜原其故蓋因鼔修大於股分縣之必偏一側惟鼔之長者狹而股之短者反廣則輕重相稱懸之而無偏側之慮大矩以擊而言故謂之鼔而小矩反易名曰股此又見古之句股之名蓋未嘗分大小也為一為二為三者一分二分三分之謂非一律二律三律之意也黄鍾之九寸三之而二尺七寸以為特磬獨懸其一可已若編磬十六枚而同懸一簴豈能勝之今取考工記博一股二鼔三之說依律吕損益之法而定制焉一則以黄鍾之律為本使各磬大小一制一則案十二律呂上下相生之制而為各磬之厚薄彼鼔大至二尺七寸者為黄鍾之特磬矣今若半之為一尺三寸五分則股為九寸鼔博則四寸五分是制似與范鎮所論同然范制近代時尺之度而此九寸則宜為古尺之度即今尺之七寸二分九釐也以今尺之度言之則股為七寸二分九釐鼔為一尺零九分三釐五豪股博為五寸四分六釐七豪五絲鼓博則為三寸六分四釐五豪此依黄鍾之律而起度如此以此一制為準而十六磬之股博鼔廣務使皆同然後較其清濁而度以厚薄焉如考工記三分鼓博以其一為厚則今制之鼔博三寸六分四釐五豪三分之而用其一則為一寸二分一釐五豪然未知此一寸二分一釐五豪之厚為應黄鍾之一磬乎抑編磬之一十有六皆同此一制乎在周禮獨載此一磬之厚而未眀其清濁適當何聲又不識當日審音定制時分音於長短乎抑分音於厚薄乎及試以石音諸器其音每不分於長短而分於厚薄其分於厚薄仍得倍半相應同聲而有清濁之分因知石之體堅而取音有其準則矣至於考工記之已上則摩其旁已下則摩其耑之語不過遷就其忽微清濁已耳要之一聲之上下不能晰也是以制磬之法既以黄鍾之律為之本或用其全或用其半或用其倍以定其股博鼓廣之度分而使十六磬大小長短一制然後以黄鍾之律定一磬之厚為之準如黄鍾今尺度七寸二分九釐則用其十分之一七分二釐九豪以為一磬之厚審其音與黄鍾之律相應乃以此度倍之得一寸四分五釐八豪復為一磬之厚審其音必與前七分二釐九豪之磬同聲為一音之清濁得此一音之清濁相應乃自清音之磬依律呂三分損益之法上下生之則十二磬之厚薄以次皆得十二磬之厚薄既定乃加二變體之分以為清濁二均七聲之準復於十四分内取其最清音四磬之厚而各半之為最濁音四磬之度而十四分内最清二音在所不用於是十六磬之制全爰以配排簫之一十六管而與編鍾並列為雅樂焉昔人言磬有二玉磬在堂上石磬在堂下不知古時凡石之美者皆以玉名豈必藍田夜光競為華飾哉書云戛擊鳴球又云擊石拊石總歸于金聲玉振始終條理而已又樂記云石聲磬磬以立辨宋儒謂石聲難和石聲和則八音無不和矣故詩曰既和且平依我磬聲先王所尤重焉至於取材之地載於禹貢徐州則泗濱浮磬梁州則貢璆鐵銀鏤砮磬圖書編謂泗濱磬後世以其聲下而不和以華原所出易之則雍州之產也延及近世多用靈璧石則仍徐州境也要之不必拘于所出惟期應律諧聲以成大樂庶幾神人上下涵泳太和而不失古聖人制作之微意焉耳倍夷則之磬六分零六豪八絲倍南呂之磬六分四釐八豪倍無射之磬六分八釐二豪八絲倍應鍾之磬七分一釐九豪一絲黄鍾之磬七分二釐九豪大呂之磬七分六釐八豪太蔟之磬八分零九豪夾鍾之磬八分六釐四豪姑洗之磬九分一釐零二絲仲呂之磬九分七釐二豪蕤賓之磬一寸零二釐四豪林鍾之磬一寸零六釐四豪夷則之磬一寸零七釐八豪七絲南呂之磬一寸一分五釐二豪無射之磬一寸一分一釐三豪六絲應鍾之磬一寸二分九釐六豪蕙田案以上磬制度書益稷䕫曰予擊石拊石百獸率舞庶尹允諧蔡傳重擊曰擊輕擊曰拊磬有大小故擊有輕重石聲最難諧和石聲一和則無不和矣詩小雅鼓鐘笙磬同音論語子擊磬于衛有荷蕢而過孔氏之門者曰有心哉擊磬乎蕙田案以上擊拊又案八音之中金石為衆音之綱紀孟子所謂金聲玉振也而黄鍾應鍾夾鍾林鍾皆以律名頌鐘笙鐘頌磬笙磬各以用别大師所謂十有二律為之度數十有二聲為之齊量也金聲玉振特懸之鐘磬也特懸者包衆樂而括始終在堂上者以節歌聲書所謂戛擊鳴球搏拊琴瑟以詠是也在堂下者以應笙鏞書所謂笙鏞以間是也頌鐘笙鐘頌磬笙磬編懸之笙磬也編懸者分堵肆而諧律呂后䕫之擊拊商頌之依聲小雅之同音孔子之擊磬荷蕢歎有心是也自雅樂失傳周景制大鐘漢賦稱萬石而特鐘之制紊矣周禮鳬氏為鐘不分大小而編鐘之制亡矣春秋以玉磬止兵告糴漢武有浮金輕玉之磬而特磬之制紊矣周官磬氏為磬不辨厚薄而編磬之制亡矣唐宋以來所謂定樂制器者但皆泥于注疏之解而不心領神悟考求制作之精宋王洙謂鐘磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假託之法孔疏因而述之據歴代史籍亦無鐘磬依律數大小之說其康成頴達等即非身㑹制作樂器可謂切中其弊蓋千百年來一大疑案也我聖祖御定律吕正義考定黄鍾真度以為律吕之本制鐘準以輕重厚薄之實體中空容積之度分而不分大小形容之别異摩磬則一本周禮磬氏之尺度而知石音不分於長短而分于厚薄準以黄鍾之律三分損益上下相生以定諸磬之度分于是十二律呂清濁二均七聲之準靡不諧合誠聖主天縱神聖千載一時之㑹也八音之綱紀於是乎立而始終之條理可考而求矣觀承案古樂失傳漢唐而下紛然聚訟而雅樂卒不可成說者謂樂經既亡之故愚則謂樂經不亡官具於周禮義存於戴記而歌備於三百篇皆樂之經也所亡者特其譜耳苟能合諸經傳記而精考之古樂亦復了了可尋所難者考据雖詳而泥於古今之異制雅俗之殊方施之於用而多扞格只成紙上之陳言而已聖祖御纂正義所以髙絶前古者不但聲律器數之得其真也妙在案諸弦索簫管而與五音六律一一配合其實蓋即今人所用之器而得古樂之形模軌度則坐而言者即可起而行故能補樂經之亡而收千載已墜之音也右石音之屬周禮春官籥章掌土鼓豳籥中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之凡國祈年于田祖龡豳雅擊土鼔以樂田畯國祭蜡則龡豳頌擊土鼔以息老物注杜子春云土鼔以瓦為匡以革為兩面可擊也禮記禮運蕢桴而土鼔注蕢讀為凷聲之誤也凷堛也謂摶土為桴也土鼔築土為鼓也明堂位土鼓蕢桴伊耆氏之樂也陳氏樂書樂以中聲為本土也者於位為中央於氣為冲氣則以土為鼔以土蕢為桴所以達中聲者也伊耆氏之樂所尚者土鼔則中聲作焉所擊者蕢桴則中聲發焉禮之初始諸燔黍捭豚以為食汙尊抔飲以為飲然則蕢桴土鼔有不為樂之初乎周官籥章凡逆暑於中春迎寒於中秋祈年於田祖祭蜡以息老物一於擊土鼓而已有報本反始之義焉夫豈以聲音節奏之末節為哉然土鼓之制窪土而為之故禮運之言土鼔在乎未合土之前與壺涿氏炮土之鼔異矣杜子春謂以瓦為臯陶以革為面不稽禮運之故也蕙田案以上土鼔易離卦九三不鼔缶而歌詩陳風坎其擊缶傳盎謂之缶缶疏郭璞曰盎盆也此云擊則缶是樂器呂氏春秋帝堯立乃命質為樂質乃效山林谿谷之音以歌乃以麋􅛘置缶而鼔之注質當為䕫陳氏禮書爾雅曰盎之謂缶國語曰瓦絲尚宫澠池之會秦王謂趙王擊缶李斯曰擊甕扣缶真秦聲也蓋缶古之樂器秦尚之劉安曰窮鄉之社扣瓮拊瓶相和而歌自以為樂亦擊缶之類也呂不韋曰堯使􅬣以麋􅛘置缶而鼓之此不可考也陳氏樂書土音缶立秋之音也古者盎謂之缶則缶之為器中虚而善容外員而善應中聲之所自出者也唐堯之時有擊壤而歌者因使􅬣以麋􅛘寘缶而鼓之是以易之盈缶見於比用缶見於坎鼔缶而歌見於離詩之擊缶見於宛丘是缶之為樂自唐至周所不易也徐幹曰聽黄鍾之音知擊缶之細則缶之樂特其器之細者歟蕙田案以上缶周禮春官小師掌教塤注塤燒土為之大如雁卵鄭司農云塤六孔疏案廣雅云塤象秤錘以土為之六孔故二鄭為此解也瞽矇掌播塤注播謂發揚其聲時疏皆小師教此瞽矇令於作樂之播揚以出聲也笙師掌教龡塤注教教眂瞭也詩小雅何人斯伯氏吹壎爾雅釋樂大塤謂之嘂疏說文云壎樂器名從土熏聲塤壎古今字釋名云塤喧也聲濁喧喧然大塤名嘂孫炎曰音大如呌呼聲郭云塤燒土為之大如鵞子銳上平底形如秤錘六孔小者如雞子周禮小師注云塤燒土為之大如雁卵鄭司農亦云六孔是相傳為然也世本云暴辛公作塤蘇成公作篪譙周古史云古有塤箎尚矣周幽王時暴辛公善塤蘇成公善篪記者因以為作謬矣世本之謬信如周言其云蘓公暴公所善亦未知所出蓋以詩小雅云伯氏吹壎仲氏吹篪蘓公刺暴公也故致斯謬白虎通壎坎音也壎在十一月壎之為言勳也陽氣於黄泉之下勳蒸而萌一說塤在西南方風俗通謹案世本暴辛公作塤詩云天之誘民如塤如篪塤燒土也圍五寸半長三寸半有四孔其二通凡為六孔陳氏禮書廣雅云塤象秤錘以土為之六孔鄭司農釋周禮郭璞釋爾雅其説皆然郭璞又謂銳上平底大者如鵝子小者如鷄子蓋塤之大小不同而同於六孔唐樂志曰壎曛也立秋之音萬物將曛黄也舊圖大塤謂之雅塤小者謂之頌塤然塤土也土位在坤而時立秋則唐志之說是而白虎通之說非矣陳氏樂書塤之為器立秋之音也平底六孔水之數也中虚上銳如秤錘然火之形也塤以水火相合而後成器亦以水火相和而後成聲故大者聲合黄鍾大呂小者聲合太簇夾鍾一要宿中聲之和而已爾雅大塤謂之嘂以其六孔交鳴而喧譁故也塤又作壎者金方而土圓水平而火銳一從熏火也其徹為黒則水而已從圓則土之形圓故也或謂塤青之氣陽氣始起萬物暄動據水土而萌始於十一月成於立春象萬物萌出於土中是主土王四季非主正位六月而言亦一說也律呂正義八音之樂土居其一古有土鼔及缶今惟有壎周禮小師職作塤註大者謂之雅塤小者謂之頌塤凡六孔上一前三後二寳慶府學校志云圍五寸半長三寸四分上尖底平大者如鵝子髙三寸六分六孔上一前二後三上孔平吹為太簇以四字應下五孔皆閉向上稍仰為黄鍾以合字應下五孔亦不開左手中指與食指二孔為仲呂以上字應凡吹上字止開此孔餘皆閉右手食指孔并左手二孔俱開為林鍾以尺字應凡吹尺字止開此三孔餘皆閉後二孔左手大指孔為南呂以工字應凡吹工字此孔與前三孔俱開餘皆閉右手大指孔黄鍾清律以六字應凡吹六字前後各孔俱開以兩手無名指小指托其底輕用氣以取聲此取聲字之法大槩有五聲而無二變今禮部太常所用壎外髙二寸五分餘中空内髙止二寸二分餘外圍七寸少歉其内圍亦不過五寸四五分前三孔上二下一下一近底上二平開相離五分餘後二孔一與前上二孔相對一比前下一孔稍髙審其音五孔生聲皆不能分上下詢之樂工則曰與羣樂共奏俯仰遷就以取相合蓋古聖人定八音之器以和聲律莫不有體而施於用今欲定壎之制亦惟以律呂準其度數而已依風俗通所載圍五寸半長三寸半如法求徑則得一寸七分五釐其中空容積則得五千六百一十四分有餘依寶慶志所載圍五寸半髙三寸六分如法求積則得五千七百七十五分此二制以黄鍾之積計之大槩皆一十三倍有餘然髙三寸五六分而徑止一寸七分五釐則形體太長而細依時用壎之内髙二寸二分内圍五寸五分如法求積得四千零一十五分六百二十五釐比之黄鍾之積則九倍有餘其内髙二寸二分而徑一寸七分五釐則形體長短庶為合宜但孔之髙下未案律度故生聲不得晰耳夫管籥諸音全係中空容積之度分初無預乎管體之厚薄壎雖土樂而生聲亦如管籥之含氣其要亦在中空容積之度分而無與乎外體之厚薄也案風俗通寶慶志所載壎制其内髙三寸五分上下謂古尺度則為今尺之二寸九分上下若謂今尺之三寸五分則與半黄鍾之度為近時用壎内髙二寸二分上下則與半夷則南呂相和之度為近如以半黄鍾之三寸六分四釐五豪之數為内髙則中空容積必得三十二倍黄鍾之積為體其形制始合於宜以二寸九分之數為内髙則中空容積必得一十六倍黄鍾之積為體其形制始合於宜以半夷則南呂相和之二寸二分一釐之數為内髙則中空容積必得八倍黄鍾之積為體其形制始合於宜以三十二倍黄鍾之積為制内髙三寸六分四釐五豪則内徑得二寸六分八釐六豪以一十六倍黄鍾之積為制内髙二寸九分一釐六豪則内徑得二寸一分二釐四豪以八倍黄鍾之積為制内髙二寸二分一釐七豪則内徑得一寸七分二釐二豪然此徑與髙所成體實為撱圓形而壎之制上銳下濶底平與撱圓微異故取中徑之三分之二為底徑而中徑居内髙之三分之一自下命之也減其上半體之分以益下以羨補不足則形制成而積無遺矣至於取音一以中髙為準依三分損益之法而前後設孔焉其開孔固以中髙為準而壎體用律呂之半為最短如諸孔皆開於中線則相隔甚近不能容指故離中線而左右分之使參差相錯手指得以案抑此又古人制作精微之意也是故全體之聲出自頂口應某律為某字自頂口至底前後各設一線為中界前三孔最下一分案某律某呂相和之度於線中界設之為第一孔應某律為某字次第二分案某律某呂相和之度偏左設之為第二孔應某律為某字又次第三分案某律某呂相和之度偏右設之為第三孔應某律為某字此前三孔之分也後二孔之下一孔為第四分案某律某呂相和之度偏左設之為第四孔應某律為某字其上一孔為第五分按某律某呂相和之度偏右設之為第五孔應某律為某字此後二孔之分也五孔之分前後左右實自下而漸上自遠而及近故生聲有序而髙下分明得以應律吕而為用焉考壎之制雖為三種而八倍黄鍾之壎全體所得聲字適應黄鍾之宮故定為雅樂所用而名之曰黄鍾壎其協大呂一均者則用七倍黄鍾之積為體而諸孔損益之法乃以黄鍾八分之七同形管之律呂相和之分準其度蓋黄鍾八分之七之管實與大呂相應故因以立制而名之曰大呂壎要之樂以取聲為要而取聲以立體為先壎之為器其形質雖與竹音諸樂不同然以黄鍾之積求之而立體生聲莫不合於律呂之度焉黄鍾之分定則太和之理得故凡所以諧八音而成衆器者皆有所準也黄鍾壎以八倍黄鍾之積為體其諸孔之度即用正黄鍾所生律呂之分其内髙則半夷則半南呂相和之分為二寸二分一釐七豪其大徑一寸七分二釐二豪居内髙之三分之一底徑一寸一分四釐八豪其頂孔所生之音應黄鍾之律宫聲工字是為此壎全體之聲字焉其半無射半應鍾相和之分一寸九分七釐一豪設孔應姑洗之律角聲六字為前三孔之居中第一孔焉其黄鍾大呂相和之四分之一一寸七分六釐四豪設孔應蕤賔之律變徵五字為前三孔之居左第二孔焉其太簇夾鍾相和之四分之一一寸五分六釐八豪設孔應夷則之律徵聲乙字為前三孔之居右第三孔焉其姑洗仲呂相和之四分之一一寸三分九釐四豪計其序宜應無射之律為上字今設孔比無射之律低半音其蕤賔林鍾相和之四分之一一寸二分四釐七豪設孔又比無射之律髙半音爰以此二分相併折中得一寸三分二釐設孔乃應無射之羽聲上字為後二孔之居左第四孔焉其次夷則南呂相和之四分之一為通體之半設孔比半黄鍾之律變宮尺字低半音其無射應鍾相和之四分之一為第一孔之半設孔乃應半黄鍾之律變宮尺字為後二孔之居右第五孔焉較其正半之分則六字之半應尺字為下三音蓋最下第一與最上第五為正半之分而半比正下三音亦如管籥諸器半體以上半分比正分遞下三音之理也至此五孔巳畢獨遺應太簇之律為凡字者而以頂孔應黄鍾之律為工字者代之此黄鍾壎之各孔分也大呂壎以七倍黄鍾之積為體其諸孔之度即用黄鍾八分之七同形管所生律呂之分其内髙則半夷則半南呂相和之分為二寸一分二釐其大徑一寸六分四釐七豪底徑一寸零九釐八豪其頂孔所生之音應大呂之呂清宮髙工字是為此壎全體之聲字焉其半無射半應鍾相和之分一寸八分八釐五豪設孔應仲呂之呂清角髙六字為前三孔之居中第一孔焉其黄鍾大呂相和之四分之一一寸六分八釐七豪設孔應林鍾之呂清變徵髙五字為前三孔之居左第二孔焉其太簇夾鍾相和之四分之一一寸四分九釐九豪設孔應南呂之呂清徵髙乙字為前三孔之居右第三孔焉其姑洗仲呂相和之四分之一一寸三分三釐三豪計其序宜應應鍾之呂為髙上字今設孔比應鍾之呂低半音其蕤賓林鍾相和之四分之一一寸一分九釐三豪設孔又比應鍾之呂髙半音爰以此二分相併折中得一寸二分六釐三豪設孔乃應應鍾之呂清羽髙上字為後二孔之居左第四孔焉其次夷則南呂相和之四分之一為通體之半設孔比半大呂之呂清變宮髙尺字低半音其無射應鍾相和之四分之一為第一孔之半設孔乃應半大呂之呂清變宮髙尺字為後二孔之居右第五孔焉較其正半之分則髙六字之半應髙尺字亦為下三音矣至此五孔已畢獨遺應夾鍾之呂為髙凡字者而以頂孔應大呂之呂為髙工字者代之此大呂壎之各孔分也壎之用於雅樂止取五聲而無二變其體亦止得六聲而不能備七聲之全至於旋宮轉調則以最近一音借用之或隨調而另製一體此所以有雅壎頌壎大小之别也右土音之屬周禮地官鼔人掌教六鼔四金之音聲以節聲樂以和軍旅以正田役教為鼔而辨其聲用注教為鼔教擊鼓者大小之數又别其聲所用之事鄭氏鍔曰能知聲者或不能為器能制器者或未必能知聲鼔人知聲者也韗人為鼔者也為鼔者大小長短儻不中度則知聲者欲其聲不爽可得哉故上言教擊鼔之法此言教為鼔而用之之法然則教為鼓者教韗人為之先儒謂教擊鼓者大小之數則失之矣以雷鼔鼔神祀注雷鼔八面鼔也神祀祀天神也疏鄭知雷鼔八面鼔者雖無正文案韗人為皋陶有晉鼔鼖鼔皋鼔三者非祭祀之鼓皆兩面則路鼔祭宗廟宜四面靈鼔祭地祗尊於宗廟宜六面雷鼔祀天神又尊於地祗宜八面故知義然也以靈鼔鼔社祭注靈鼔六面鼔也社祭祭地祗也疏社是五土之總神是地之次祀故舉社以表地祗其實地之大小之祭皆用靈鼔也以路鼔鼔鬼享注路鼔四面鼔也鬼享享宗廟也秋官㝠氏為阱擭以攻猛獸以靈鼔敺之注靈鼓六面鼔夏官大司馬中春教振旅王執路鼓太僕建路鼓于大寢之門外而掌其政陳氏禮書靁天聲也靁鼓鼓神祀而救日月亦天事也古人救日月則詔王鼔先儒以為鼔用靁鼔是也靈地德也靈鼔鼔社祭而攻猛獸亦地事也㝠氏攻猛獸以靈鼔敺之是也路鼔鼔鬼享而田獵達窮者與遽令亦用之司馬振旅王執路鼓太僕建路鼔于大寢之門外以待達窮者與遽令是也蕙田案以上雷鼓靈鼔路鼔詩大雅靈臺賁鼔維鏞傳賁大鼔也冬疏賁大也故謂大鼔為賁鼔官韗人注大鼓謂之鼖是也書顧命大貝賁鼓周禮地官鼔人以鼖鼓鼓軍事注大鼔謂之鼖鼔長八尺疏云大鼔謂之鼖是訓鼔為大此惟兩面而已而稱大者此不對路鼔已上以其長八尺直對晉鼓六尺六寸者為大耳夏官大司馬中春教振旅諸侯執鼖鼔爾雅釋樂大鼓謂之鼖注鼖長八尺陳氏樂書鼔之小者謂之應大者謂之鼖司馬法千人之師執鼙萬人之師執大鼔則所謂鼖鼔者大鼓而已鼖鼔鼓軍事則晝以進兵之鼔非夜以警衆之鼜也鄭氏以鼜為鼖誤矣凡此非特用之以和軍旅雖節聲樂亦用之故詩言鼖鼔維鏞以文王能作大事考大功作樂以象其成也鼖鼔路鼔皆謂之大者路者人道之大鼖者人事之大國之大事在祀與戎故鬼享以路軍事以鼖周禮地官鼔人以鼛鼔鼔役事注鼛鼔長丈二尺詩小雅鼔鐘鼔鐘伐鼛注鼛大鼔也字疏鼛即皋也古今異耳大雅綿鼛鼔弗勝陳氏禮書鼛鼓倨句磬折則皋鼔中髙而兩端下矣陳氏樂書鼖鼓以賁為義鼛鼔以皋為義詩曰鶴鳴于九皋傳曰下濕皋則皋者下濕之地其土潤以緩欲舞之緩謂之皋舞欲役之緩謂之皋鼔春秋傳曰魯人之皋詩曰鼛鼓弗勝又曰鼓鐘伐鼛蓋鼛鼓所以鼓役事也文王說以使民雖以鼛鼓節之使緩而民各致其功而不止雖鼛鼓有所弗勝也幽王拂民而役之雖伐鼛不足使之勸功適以勞之而已此詩人所以美文王於綿刺幽王於鼔鐘也馮元謂鼛鼓長尋有四尺不容有流蘇筍虡之飾而聶崇義三禮圖有之蓋失之矣周禮地官鼓人以晉鼔鼔金奏注晉鼓長六尺六寸金奏謂樂作擊編鐘疏鄭唯言編鐘據磬師而言其實不編者亦以晉鼔和之鄭氏鍔曰金奏者西方之聲陰之屬也陰以退為主陽氣導之乃進晉進也以進為義故宜用以鼔金奏夏官大司馬中春教振旅軍將執晉鼔陳氏禮書考工記韗人為皋陶長六尺有六寸先儒以為晉鼓其言是也鼓人之六鼓有靁鼓靈鼓路鼔鼖鼓晉鼔皋鼓而路鼓以上不特左右兩端面而已鼖鼔不特長六尺六寸而已則長六尺六寸左右端廣六寸其為晉鼓可知鼔人以晉鼓鼔金奏鎛師掌金奏之鼔鐘師以鼓奏九夏此所以為懸鼔也然司馬春振旅軍將執晉鼓吳與越戰載常建鼓韋昭曰將軍執晉鼓晉鼔建謂為楹而植之蓋晉鼓建之於軍猶路鼔建之於寢非此則不建矣蕙田案以上鼖鼓鼛鼓晉鼓禮記明堂位夏后氏之鼓足注足謂四足也陳氏禮書鼓其聲象雷其大象天其於樂象君故凡鼓瑟鼓琴鼓鐘鼔簧鼓缶皆謂之鼓以五音非鼔不節也明堂位曰夏后氏之鼔足鄭康成曰足謂四足考之於禮夏后氏尚黒商尚白周尚赤則三代鼔色可知矣春秋之時楚伯棼射王鼓跗然則兵車之鼓亦有足與殷楹鼓注楹為之柱貫中上出也儀禮大射儀建鼔在阼階西南鼓注建猶樹也以木貫而載之樹之跗也南鼔謂所伐面也也疏案明堂位云殷楹鼓注云楹為之柱貫中上出此云以木貫而載之則為之柱貫中上出一也周人縣鼓今言建鼔則殷法也主於射畧於樂故用先代鼔西階之西一建鼓在其南東鼓一建鼔在西階之東南面陳氏禮書商頌曰置我鞉鼔明堂位曰商之楹鼓禮公執桓圭諸侯之𦵏有桓楹鄭氏釋周禮曰雙植謂之桓釋禮記曰四植謂之桓則桓楹四稜圭之所顯者雙稜而已楹鼔蓋為一楹而四稜焉貫鼓於其端周禮大僕建路鼔于大寢之門外儀禮大射建鼔在阼階西南鼓則其所建楹也莊子曰負建鼓以求亡子建鼔可負則以楹貫之可知魏晉以後復商制而樹之謂之建鼔隋志又棲翔鷺於其上或曰鵠也取其聲逺聞也或曰鷺鼓精也越王勾踐建大路於康宮之端門有雙鷺咏之而去此其象也或曰詩云振振鷺鷺于飛鼓咽咽醉言歸後世怨周之衰故飾鼔以鷺欲其風流存焉國朝㳂唐制其髙六尺六寸中植以柱設重斗方蓋蒙以朱網張以絳紫繡羅四角六龍竿皆銜流蘓璧璜五采羽為飾竿首亦為翔鷺傍又挾二小鼓左曰鞞右曰應然詩言應田縣鼓則周制王之應田在懸鼔之側不在建鼔傍矣禮記明堂位周縣鼓注縣縣之簨虡也周頌曰應朄縣鼔禮器縣鼔在西注禮樂之器尊西也詩頌有瞽應田縣鼔傳縣鼔周鼔始疏明堂位云周人懸鼔是周法鼓在懸故云懸鼓周鼔陳氏樂書鼔之制始于伊耆氏少昊氏夏后氏加四足謂之足鼓商人貫之以柱謂之楹鼔周人縣而擊之謂之縣鼔而周官鼓人晉鼔鼔金奏鐘師以鼔奏九夏所謂縣鼔也禮曰縣鼔在西應鼔在東詩曰應田縣鼓則縣鼓周人所造之器始作樂而合乎祖者也以應鼔為和終之樂則縣鼔其倡始之鼔歟蓋宮縣設之四隅軒縣設之三隅判縣設之東西李照謂西北隅之鼔合應鍾黄鍾大呂之聲東北隅之鼔合太簇夾鍾姑洗之聲東南隅之鼓合仲呂蕤賓林鍾之聲西南隅之鼓合夷則南呂無射之聲依月均而考擊之於義或然周禮考工記韗人為皋陶注鄭司農云韗書或為􅕦皋陶鼔木也𤣥謂􅕦者以皋陶名官也􅕦則陶字從革長六尺有六寸左右端廣六寸中尺厚三寸注版中廣頭狹為穹隆也鄭司農云謂鼔木一判者其兩端廣六寸而其中央廣尺也如此乃得有腹穹者三之一注鄭司農云穹讀為志無空邪之空謂鼔木腹穹窿者居鼔三之一也𤣥謂穹讀如穹蒼之穹穹隆者居鼔面三分之一則其鼔四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼔四尺穹之徑六尺六寸三分寸之二也此鼔合二十版上三正注鄭司農云謂兩頭一平中央一平也𤣥謂三讀當為參正直也參直者穹上一直兩端又直各居二尺二寸不弧曲也此鼔兩面以六鼓差之賈侍中云晉鼔大而短近晉鼔也以晉鼓鼔金奏鼔長八尺鼔四尺中圍加三之一謂之鼖鼓注中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版穹六寸三分寸之二耳大鼔謂之鼖以鼖鼔鼓軍事鄭司農云鼔四尺謂革所蒙者廣四尺為皋鼓長尋有四尺鼔四尺倨句磬折注以皋鼔鼔役亊磬折中曲之不參正也中圍與鼖鼔同以磬折為異凡冒鼓必以啓蟄之日注啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所取象也冐蒙鼔以革良鼔瑕如積環注革調急也故疏瑕與環皆謂漆之文理謂革調急然若急而不調則不得然也鼔大而短則其聲疾而短聞鼔小而長則其聲舒而逺聞易通卦驗冬至鼔用馬革圓徑八尺一寸夏至鼔用牛皮圓徑五尺一寸荀子聲樂之象鼔大麗鼔其樂之君耶故鼔似天白虎通鼓震音煩氣也萬物憤懑震動而生雷以動之溫以煖之風以散之雨以濡之奮至德之聲感和平之氣也同聲相應同氣相求其本乃在萬物之始耶故謂鼔也風俗通案易稱鼔之以雷霆聖人則之不知誰所作也鼓者郭也春分之音也物郭皮甲而出故謂之鼔陳氏樂書雷積陽氣而後成聲蟲待雷聲而後啓蟄先王之為鼔其冒之也必以啓蟄之日其伐之也必為冬至之音蓋冬至之節五陰用事而一陽復焉啓蟄之日三陰用事而三陽泰焉以一陽之器冒於三陽之時其聲象雷其形象天其於樂象君故凡鼔琴瑟鼔鐘鼓磬鼓柷鼔敔鼔簧鼔缶皆謂之鼔以鼓無當於五聲五聲不得不和故也傳曰鼓所以檢樂為羣音之長是鼔為五聲之君五聲又以中聲為君故鼔大而短則其聲疾而短聞小而長則其聲舒而逺聞然則大而不短小而不長則其聲必適舒疾之節其聞必適短逺之𠂻一㑹歸中聲而已以之祀天神曰雷以之祭地祗曰靈以之享人鬼曰路鼓軍事則為鼖鼓役事則為鼛鼓金奏則為晉以至引之而為朄應之而為應始之而為朔警之而為鼜執之而為提卑之而為鼙兆之而為鼗其所以和之節之止之通之又不過錞鐃鐲鐸焉然則先王之為樂也節矣蕙田案以上鼔制度儀禮大射儀朔鼙在其北注朔始也奏樂先擊西鼙樂為賓所由來也先擊朔鼙應鼙應之周禮春官大師下管播樂器令奏鼔朄注鄭司農云朄小鼓也先擊小鼔乃擊大鼔小鼓為大鼓先引故曰朄朄讀為導引之引𤣥謂鼔朄猶言擊朄小師凡小祭祀小樂事鼔朄下管擊應鼔注應鼙也應與朄及朔皆小鼔也其所用别未聞王氏昭禹曰應鼙為朄鼓之和朄鼓為應鼙之引禮記禮器應鼓在東注小鼔謂之應儀禮大射儀應鼙在其東南鼓注應鼙應朔鼙也爾雅釋樂大鼔謂之鼖小者謂之應疏李廵云小者音聲相承故曰應也孫炎云和應大鼓也周禮春官鐘師掌鼙鼔縵樂注作縵樂擊鼙以和之作疏此官主擊鼙於磬師縵樂則鐘師擊鼙以和之夏官大司馬中春教振旅旅師執鼙禮記投壺鼔口注圜者擊鼙方者擊鼔聲音義鼙其聲下其音榻榻然鼓其髙其音鏜鏜然陳氏禮書鼙應鼔號應鼙朔鼓號朔鼙周禮大師大祭祀下管播樂器令奏鼔朄小師大祭祀下管擊應鼔小祭祀小樂事鼔朄儀禮大射建鼔在阼階西南鼔應鼙在其東南鼔西階之西頌磬東面其南鐘其南鎛皆南陳一建鼔在其南東鼔朔鼙在其北一建鼓在西階之東南面詩曰應田縣鼔先儒以詩之田為朄朄小鼓應應鼙也爾雅曰大鼔謂之鼖小鼔謂之應然則大祭祀皆鼔朄擊應大射有朔鼙應鼙詩又以應配朄則朔鼙乃朄鼓也以其引鼓焉故曰朄以其始鼓焉故曰朔是以儀禮有朔無朄周禮有朄無朔猶儀禮之𤣥酒周禮之明水其實一也鄭氏以應與朄及朔為三鼔恐不然也大射建鼔南鼔應鼔亦南鼔而居其東建鼔東鼔朔鼙亦東鼔而居其北則鼙與鼔比建而鼙常在其左矣朔作而應應之朔在西應在東則凡樂之奏常先西矣陳氏樂書鼙卑者所鼔也故周人論司馬所執五鼔推而上之王執路鼔鼔之尤大者也推而下之旅師執鼙鼔之尤小者也尊者執大卑者執小上下之分也司馬法曰萬人之師執大鼔千人之師執鼙儀禮大射應鼙在阼階西建鼔之東朔鼙在西階西建鼔之北鼙與鼔其聲皆以讙為主及比建而用之則鼙常在其左矣古之奏樂先擊西朔而東鼙應之是朔鼙倡始者也應鼙和終者也禮圖謂商人加左鞞右應為衆樂之節蓋不考儀禮左應右朔之過也鼙或鼓在卑上於鼔為卑故也或革在卑右以其上革故也蕙田案以上朔鼙朄應鼓應鼙鼙詩大雅靈臺鼉鼔逢逢書𦙍征瞽奏鼔周禮春官大司樂王大食三侑皆令奏鐘鼔樂師凡國之小事令奏鐘鼔饗食諸侯令奏鐘鼔樂出入令奏鐘鼓眡瞭賓射皆奏其鐘鼔鼓人救日月則詔王鼔禮記學記鼔無當於五聲五聲弗得不和樂記鼔鼙之聲讙讙以立動動以進衆君子聼鼔鼙之聲則思將帥之臣律呂正義禮記曰鼓無當於五聲五聲弗得不和故革與木居於八音之末又曰鼓鼙之聲讙讙以立動動以進衆君子聼鼔鼙之聲則思將帥之臣是革音最大為衆樂之長非他器婉轉悠揚者比但考其形制昔人之說往往不同通鑑外紀黄帝命岐伯作鼔通禮義纂黄帝制鼔鼙以當雷霆蓋伐蚩尤也自是伊耆氏之土鼓夏后氏之足鼓殷之楹鼓周之縣鼓制雖不同而取聲則一周禮地官鼓人掌教六鼓四金之音聲以節音樂以和軍旅以正田役教為鼔而辨其聲用以雷鼔鼔神祀以靈鼔鼔社祭以路鼔鼔鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼔鼔金奏以金錞和鼓以金鐲節鼓以金鐃止鼔以金鐸通鼔凡祭祀百物之神鼓兵舞帗舞者凡軍旅夜鼓鼜軍動則鼓其衆田役亦如之案周禮秋官㝠氏靈鼓以攻猛獸夏官太僕建路鼓以達窮者與遽令又地官鼔人疏雷鼔以救日月觀此則三鼔不獨祭祀用之而已詩曰鼖鼔維鏞非止軍事也又曰鼔鐘伐鼛非止役事也夏官司馬中春教振旅軍將執晉鼔亦非止金奏也然則鼔人所職特載其用之大者而已周禮註雷鼔八面路鼓四面若言一鼔而有八面六面四面之形舊圖說從之其所謂八面六面四面者蓋一制而數不同猶今儀仗花腔鼔二十四面杖鼓十二面之類也又周禮註鼖鼔長八尺鼛鼓長丈二尺晉鼓長六尺六寸考工記韗人為皋陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正鼔長八尺鼔四尺中圍加三之一謂之鼖鼔為皋鼔長尋有四尺鼔四尺倨句磬折凡冒鼔必以啓蟄之日良鼔瑕如積環鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞所謂皋陶者鼔之木腔也長六尺有六寸者舉晉鼓之度以例其餘也左右端廣六寸者木版兩頭各廣六寸周二十版則圍丈有二尺而面徑四尺也中尺厚三寸者版之中幅廣一尺合得鼔之腰圍二丈而空徑六尺有竒版中幅厚三寸漸殺而兩端二寸可知也穹者三之一者申言鼔腰中徑之數以鼓面徑四尺而三分之得一尺三寸三分零各加於面徑之兩旁為腰圍之徑六尺六寸有竒也上三正者言兩端與中腰三處立尺度之正數為諸鼓定式晉鼓鼖鼓皋鼔長短雖不同而圍徑皆同也以上晉鼔之制也鼓長八尺者版兩端相距也鼓四尺者即面徑也中圍加三之一者即腰穹之徑六尺六寸有竒也謂之鼖鼓以上鼖鼔之制也為皋鼓以下皋鼓之制也即鼛鼔長尋有四尺者兩面相距丈二尺也鼔四尺者面徑同前也倨句磬折者倨句漸殺如磬股之折也凡冒鼔必以啓蟄之日者象雷發聲也良鼓瑕如積環者鼓之中腰廣而兩端狹木腔衆幅輻凑其縫如積環也鼔大而短則其聲疾而短聞者晉鼔之類是也鼔小而長則其聲舒而逺聞者朔鞞之類是也此舉晉鼓鼖鼓皋鼓為例大而雷鼓靈鼓小而鼙鼔鼗鼓可類推矣至朔鞞長二尺大面徑一尺小徑七寸一名朄鼔一名縣鼔一名相鼓縣於建鼔之西有應鞞長尺四寸大面徑一尺小徑五寸一名應鼔亦曰鞞縣於建鼓之東蓋鼓大而鞞小擊之以相濟為髙下抑揚之節今小戴禮投壺篇有魯鼓薛鼔之圖圓者擊鼙方者擊鼔即其制也後世槩從簡畧不别設鞞直於鼓之邊旁假借取聲而已他若羯鼓腰鼓銅鼓石鼓之類或踵事増設或殊方異俗或因地施用殆非雅樂之遺故不足以列諸八音之器要之鼓腔大者聲大鼓腔小者聲小革之生聲又在緊慢且尤關於燥濕革遇燥而聲𢎞遇濕而聲濁所以聲音之清濁於鼓體之中最為難定蓋革木一聲非如絲竹諸器可細案以律呂之度止取為衆音之節奏故禮曰鼔無當於五聲五聲弗得不和是也蕙田案以上鼓鼙書益稷下管鼗鼓傳堂下樂也詩商頌那置我鞉鼔箋置讀曰植植鞉鼔者鞉與鼔也鞉雖不植貫而搖之亦植之類周禮春官大司樂靁鼓靁鼗冬日至於地上之圜丘奏之注鄭司農云雷鼔雷鼗皆謂六面有革可擊者也𤣥謂雷鼔雷鼗八面靈鼔靈鼗夏日至於澤中之方丘奏之注鄭司農云靈鼔靈鼗四面𤣥謂靈鼓靈鼗六面路鼓路鼗於宗廟之中奏之注鄭司農云路鼔路鼗兩面𤣥謂路鼔路鼗四面小師掌教鼓鼗注出音曰鼓鼗如鼓而小持其柄搖之旁耳還自擊瞽矇掌播鼗注播謂發揚其音眡瞭掌凡樂事播鼗儀禮大射儀鼗倚于頌磬西紘爾雅釋樂大鼗謂之麻小者謂之料注麻者音槩而長也料者聲清而不亂白虎通鞀者震之氣也上應昴星以通王道故謂之鞀也三禮圖小師職掌教鼓鼗鼗如鼔而小有柄賓至搖之奏樂也又眡瞭掌凡樂事播鼗擊頌磬笙磬磬言擊鼗言播播即搖之可知也鼗所以節樂賓至乃樂作故知賓至搖之以奏樂也又鼗導也所以導鼓聲或節一唱之終也陳氏禮書月令曰脩鞀音挑鞞世紀曰帝嚳命倕作鞞先儒謂小鼔有柄曰鞀大鞀謂鞞記曰賜諸侯樂以柷將之賜伯子男以鼗將之蓋柷以合樂鼗則兆鼓而已故其賜所以不同也孔頴達曰柷所以節一曲之始其事寛故以將諸侯之命鼗所以節一唱之終其事狹故以將伯子男之命豈其然哉儀禮諸侯之燕大射大夫士之鄉射鄉飲皆有鼗無柷諸侯之樂非無柷也文不備爾蕙田案以上鼗書益稷搏拊傳拊以韋為之實之以糠所以節樂之疏搏拊形如鼓以韋為之實之以糠擊以節樂漢初相傳為然也周禮春官大師大祭祀帥瞽登歌令奏擊拊注拊形如鼓小師大祭祀登歌擊拊注鄭司農云拊者擊石上疏引先鄭拊為擊石者先鄭注已解拊與擊同後鄭不從今引之在下者以無正文引之或得為一義故也禮記明堂位拊搏注拊搏以韋為之樂記會守拊鼓注拊者以韋為表裝之以糠鄭疏白虎通引尚書大傳拊革著以糠以此知之也尚書大傳以韋為鼔謂之搏拊陳氏禮書拊之為物以韋為之狀若鼔然書傳所謂以韋為鼔謂之搏拊是也實之以糠白虎通所謂拊革著以糠是也其設則堂上書所謂搏拊是也其用則先歌周禮所謂登歌合奏擊拊是也荀卿曰鞉拊椌楊似萬物又曰縣一鐘而尚拊大戴禮曰縣一磬而尚拊子夏曰絃匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅言尚拊則拊在一鐘一磬之東也言會守拊鼓則衆鼔待其動而後作也既曰會守拊鼓又曰治亂以相則相非拊也鄭氏以相為拊誤矣拊書謂之搏拊明堂位謂之拊搏蓋以其或搏或拊莫適先後也爾雅和樂謂之節或說節即相也晉傅休奕節賦曰口非節不詠手非節不拊江左清樂有節鼔唐雅樂升歌用之其詳不可考也律呂正義周禮大師大祭祀率瞽登歌令奏擊拊下管播樂器令奏鼔朄註云擊拊瞽乃歌拊形如鼔以韋為之著之以糠朄小鼓也蓋古者登歌堂上拊以先之管在堂下鼓朄以引之先擊小鼓乃擊大鼔然後衆樂皆作也拊與朄堂上堂下相須為用以成歌奏之節後世朄雅舂牘不存而拊僅存焉案拊之為字實擊拍拊循之意初無與器用之名虞書益稷戛擊鳴球搏拊琴瑟以詠孔傳竟以戛擊拊皆為樂器至宋儒始正之謂戛擊考擊也摶至也拊循也觀此則註周禮者或亦仍孔傳之解乎然其器尚有存於世者而形制可考既云如鼓或即朄與鼙鼗之類耶相傳用熟皮為之長一尺四寸而徑七寸實之以糠是亦革之音也觀此制與今所定黄鍾之度為近今定制宜以黄鍾之長為徑倍之為長庶數有所依而法有立矣蕙田案以上拊周禮地官鼓人凡軍旅夜鼔鼜注鼜夜戒守鼓也司馬法曰昏鼔四通為大鼜夜半三通為晨戒旦明五通為發昫春官眡瞭鼜愷獻亦如之注杜子春云讀鼜為憂戚之戚謂戒守鼔也擊鼓聲疾數故曰戚鎛師凡軍之夜三鼜皆鼔之守鼜亦如之注守鼜備守鼓也鼔之以鼖鼓杜子春云一夜三擊備守鼜也夏官掌固夜三鼜以號戒注杜子春云讀鼜為造次之造謂擊鼓行夜戒守也𤣥謂鼜擊鼜警守鼔也三巡之間又三擊鼜陳氏樂書鎛師凡軍之夜三鼜皆鼔之守鼜亦如之掌固曰夜三鼜以號戒鄭氏皆謂鼓之以鼖鼓然鼖雖鼓人用之以鼔軍事諸侯執之以振旅要皆非警夜之鼜鼓也司馬法曰昏鼓四通為鼜夜半三通為晨戒平旦五通為發明三鼜之制大致若此鄭氏之說不亦昧乎宋沈約樂志曰長丈二尺曰鼜惠田案鼜之名見於周禮者數矣然司馬法曰昏鼓四通為大鼜是鼜乃擊鼔之名而非鼓名杜子春以為擊鼓聲疾數是也地官鼓人以鼖鼓鼓軍事鄭氏以鼜為鼓之以鼖鼓亦是也陳晉之乃據梁人沈約之說而以鼜為鼓名又圖大鼜中鼜小鼜以實周禮三鼜之文惑矣又案以上鼜周禮夏官大司馬中春教振旅師帥執提注鄭司農云提謂馬上鼓有曲木提持鼔立馬髦上者故謂之提以疏云提謂馬上鼔者此先鄭蓋據當時已有單騎舉况周其實周時皆乗車無輕騎法也陳氏禮書大司馬春振旅師帥執提鄭氏曰馬上鼓賈公彥曰周時無騎法然左傳稱齊魯相遇以鞍為几禮記稱前有車騎史記稱趙靈王胡服騎射蓋古者國容以車軍容或有騎蕙田案八音之革為鼓易曰雷出地奮先王以作樂又曰鼓之以雷霆考工記曰凡冒鼓必以啓蟄之日周官鼓人六鼓以雷鼓為首是鼓以象雷樂之先聲也伶州鳩曰革木一聲聲唯一而其制有三曰鼓曰鼙曰鼗鼓之為體大其制詳于韗人其用辨于鼓人鼙之為體小陸徳明曰其聲下其音榻榻然陳暘曰鼔在卑上于鼓為卑是其形卑其聲亦卑也鼗亦鼔之小者其制有柄而不縣其聲以播而不以擊鼓之别有六鼔人所謂雷鼓靈鼔路鼔鼖鼔鼛鼔晉鼓也雷鼔先鄭以為六面康成以為八面靈鼓先鄭以為四面後鄭以為六面路鼔先鄭以為二面後鄭以為四面而皆無經據考周禮靁鼔六面而工十有二靈鼗八面而工十有六路鼗四面而工八每以二人各直一面則非合六面八面四面為一鼓甚明正義之說為不易矣鼙之别有三曰應曰朄曰朔禮書樂書謂朔即朄恐或然也又考之于經鼖鼔詩曰賁鼔鼛鼔考工記作皋鼔鼙月令作鞞鼗詩作鞉月令作鞀蓋鼖與賁皆大也皋與鼛皆聲也鼙之從鼓從革義一也鼗以其兆鼔則從鼗以其為革則從鞉以其導樂則從鞀先儒之說云然月令云修鞀鞞鼔禮書以大鞀為鞞非也右革音之屬五禮通考卷七十五
