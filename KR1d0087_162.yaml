body:
  text: 五禮通考卷一百五十二刑部尚書秦蕙田撰嘉禮二十五昏禮儀禮士昏禮鄭目録云士娶妻之禮以昏為期因而名焉必以昏者陽往而隂來日入三商為昏於五禮屬嘉禮二疏商謂商量是漏刻之名馬氏云日未出日入後皆刻半前後共五刻三商據整數言其實二半也敖氏繼公曰此篇主言士之適子娶妻之禮娶必以昏者取其近夜也昏禮敖氏繼公曰此不言士者辟下逹之文也下逹納采用鴈注逹通逹也將欲與彼合婚姻必先使媒氏下通其言女氏許之乃後使人納其采擇之禮詩云娶妻如之何匪媒不得昏必以媒交接設紹介皆所以養亷恥納采而用鴈為贄者取其順陰陽徃来陸氏佃曰若逆女之類自天子逹是也大夫有昏禮而無冠禮則冠禮不下達矣朱子曰下逹之說注疏迂滯不通陸氏說為近是盖大夫執雁士執雉而士昏下逹納采用雁如大夫乗墨車士乗棧車而士昏親迎乗墨車也注疏知乗墨車為攝盛而不知下達二字本為用雁一事而𤼵言自士以下至于庻人皆得用雁亦攝盛之意也盖既許攝盛則雖庶人不得用匹又昏禮贄不用死故不得不越雉而用雁耳今注疏既失其指陸于下達之義雖近得之然不知其與用鴈通為一義則亦未為盡善也敖氏繼公曰此謂自天子下逹于庶人納采皆用鴈也經惟有士昏禮故因以下達之文見之也以此推之則餘禮之用雁者皆當下逹惟納徴之禮或異耳媒妁傳言女家已許乃敢納其采女之禮采者取也用雁者先儒謂取其不再偶義恐或然春秋傳曰鄭徐吾犯之妺美公孫黒使强委禽焉是大夫納采亦用雁也蕙田案下達用鴈先儒順陰陽往来及敖氏不再偶之説似屬附㑹盖男先乎女六禮皆然故曰下達不特用鴈一事敖氏從朱子攝盛之義而謂自天子至於庻人納采皆用鴈不知朱子之意以為雁乃大夫之摯本非士庶人所得用故為攝盛若卿以上自當用其本等之摯不必下同于大夫矣盖士當用雉而雉不可生致故舍雉而用雁記云摯不用死是也主人筵於户西西上右几注主人女父也筵為神布席也户西者尊䖏將以先祖之遺體許人故受其禮扵禰廟席西上右設几神不統于人席有首尾疏公食記蒲筵萑席皆卷自末是席有首尾也張氏爾岐曰女家將受納采之禮先設神坐乃受之西上席首在西也郷射燕禮等設席皆東上以近主人為上是統于人今以神尊不統于人取地道尊右之義故席西上几在右也使者𤣥端至注使者夫家之屬若羣吏使往来者中疏如至人是上士則屬是中士主人是士則屬是下士主人是下士則屬亦當是下士禮窮即同也士冠禮𤣥端士莫夕于朝之服又以𤣥端祭廟今使者亦於主人廟中行事也蕙田案使者注疏謂中下士敖君善以為家臣似注疏說是家臣不宜服𤣥端也下經從者畢𤣥端疏又以為僕隷存參擯者出請事入告注擯者有司佐禮者也請猶問也禮不必事雖知猶問之重愼也主人如賔服迎於門外再拜賔不答拜揖入注門外大門外不答拜者奉使不敢當其盛禮張氏爾岐曰此時賔自執雁至於廟門揖入三揖至於階三讓注入三揖者至内霤將曲揖既曲北面揖當碑揖主人以賔升西面賔升西階當阿東面致命主人阼階上北面再拜注阿棟也入堂深示親親若疏禮之通例賔主敵者賔主俱升士冠與此文是也若郷飲酒郷射皆主尊賔卑故初至之時主人升一等賔乃升至卒洗之後亦俱升惟聘禮則公升二等賔始升也敖氏繼公曰主人以賔升謂主人先升而賔從之也蕙田案賔尊於主則先升聘禮是也主賔敵則主先升以導客故曰以賔升曲禮主人與客讓登主人先登客從之是也敖說是授於楹間南面注授于楹間明為合好其節同也南面並授也張氏爾岐曰授謂授雁楹間兩楹之間凡授受敵者扵楹間不敵者不于楹間君行一臣行二是也今使者不敵而授扵楹間明為合好故其逺近之節同也賔降出主人降授老鴈注老羣吏中之尊者公疏大夫家臣稱老是以䘮服食大夫以貴臣為室老士雖無君臣之名云老亦是羣吏中尊者也蕙田案以上納采擯者出請注不必賔之事冇無敖氏繼公曰請請事也下文倣此賔執鴈請問名主人許賔入授如初禮注問名者將歸卜其吉凶䟽此一使兼行納采問名二事相因也入門升堂授雁與納采禮同故云如初禮也張氏爾岐曰案記主人受鴈還西面對賔受命乃降是主人既受雁還復阼階之位西面以女名對賔賔乃降階出門也此一使兼行二禮既采須卜其事相因故也蕙田案以上問名陳氏禮書禮言婚姻禮下達而繼之以納采納采辭曰吾子有惠貺室某也某有先人之禮使某也請納采則納采之前已達其言矣納采扵廟賔受主人雁訖降出擯者出請賔執鴈請問名入授如初禮擯者出請醴賔主人迎于廟門外揖讓如初一使而二鴈三入廟而再迎之則問名因于納采故其禮略也士昏贄用鴈者不以死贄亦攝盛也觀其所乗大夫之墨車所衣助祭之爵弁而女必次純衣纁袡腊必用鮮魚必殽全則攝贄以鴈不為過也鄭氏曰用鴈取其順陰陽來徃理必不然擯者出請賔告事畢入告出請醴賔注此醴亦當為禮禮賔者欲厚之賔禮辭許注禮辭一辭主人徹几改筵東上側尊甒醴於房中注徹几改筵者郷為神今為人側尊亦言無𤣥酒側尊於房中亦有篚有籩豆如冠禮之設張氏爾岐曰徹去其几後將授賔也改筵改西上而東上也為人設則束上者統扵主人也主人迎賔於廟門外揖讓如初升主人北面再拜賔西階上北面答拜主人拂几授校拜送賔以几辟北面設於坐左之西階上答拜注拂拭也拭几者尊賔新之也校几足辟逡遁疏揖讓如初升者如納采時也主人北面再拜者拜賔至此堂飲之主人拂几者案有司徹主人西面左手執几縮之以右𬒮推拂几三二手横執几進授尸扵筵凡敵者拂几皆若此卑於尊者則内拂之授校者凡授几之法卑者以兩手執几兩端尊者則以兩手扵几間執之授設皆然受几之時或受其足或受于手間皆横受之及其設之皆旋几縱執乃設之于坐南北面陳之位為神則右之為人則左之不坐設之者几輕故也贊者酌醴加角柶面葉出於房注賛佐也佐主人酌事也賛者亦洗酌加角柶覆之如冠禮矣出房南面待主人迎受主人受醴面枋筵前西北面賔拜受醴復位主人阼階上拜送注主人西北而疑立待賔即筵也賔復位于西階上北面明相尊敬此筵不主為飲食起張氏爾岐曰主人執醴筵前西北面以待賔賔拜于西階上乃進筵前受醴受訖復西階北面之位主人乃扵阼階上拜送此醴古人受爵送爵相拜之法率如此贊者薦脯醢賔即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人答拜注即就也左執觶則祭以右手也凡祭於脯醢之豆間啐嘗也嘗之者成主人意建猶扱也興起也奠停也賔即筵奠於薦左降筵北面坐取脯主人辭注薦左籩豆之東降下也自取脯者尊主人賜將歸執以反命辭者辭其親徹賔降授人脯出主人送扵門外再拜注人謂使者從者授於階下西面然後出去蕙田案以上醴賔納吉用鴈如納采禮張氏爾岐曰如納采禮其揖讓升階致命授雁及主人醴賔取脯出門之節並如之蕙田案以上納吉納徴𤣥纁束帛儷皮如納吉禮注徵成也使使者納幣以成昏禮用𤣥纁者象陰陽備也束帛十端也周禮曰凡嫁子娶妻入幣純帛無過五兩儷兩也執束帛以致命兩皮為庭寔皮鹿皮帛疏此納徵無鴈者以有束帛為贄故也周禮純帛緇也是庻人用緇無纁士大夫乃以𤣥纁束帛天子加以榖圭諸侯加以大璋雜記云納幣一束束五兩兩五尋然則每端二丈𤣥纁束帛者合言之陽竒陰偶三𤣥二纁也陳氏禮書鄭氏釋周禮曰純寔緇字也古緇以才為聲士大夫乃以𤣥纁束帛賈公彦曰庻人用緇無纁然考之于史曰錦繡千純又曰文繡千純則純匹端也周禮所謂純帛乃匹帛也鄭改以為緇誤矣匹帛無過五兩則庶人不必五兩大夫士不得過焉非謂庻人用緇大夫用𤣥纁也先王之制昏禮其用財不過如此則婦之所飾可知矣以為合二姓之好上以事宗廟下以繼後世而不在財也後世之俗有以金幣相髙盖不知此盛氏世佐曰以三𤣥二纁釋五兩則𤣥六端纁四端矣其說本之聘禮鄭注本之雜記雜記云魯人之贈也三𤣥二纁是也但贈是送死之制幣此則用以聘女吉凶不同其制或異古䊷字多訛為純鄭改純為緇不為無據然𤣥而不纁與此不合疏以緇為庶人禮亦無明文可證陳氏說可以㕘考蕙田案以上納徴請期用鴈主人辭賔許告期如納徴禮注主人辭者陽倡隂和期日宜由夫家束也夫家必先卜之得吉日乃使使者徃辭即告之敖氏繼公曰壻家既得吉日乃不敢直以告女家而必請之者示聼命扵女家之意尊之也蕙田案以上請期期初昏陳三鼎於寢門外東方北面北上其實特豚合升去蹄舉肺脊二祭肺二魚十有四腊一肫髀不升皆飪設扄鼏注期取妻之日鼎三者升豚魚腊也寢壻之室也北面郷内也特猶一也合升合左右胖升於鼎也去蹄蹄甲不用也舉肺脊者食時所先舉也肺者氣之主也周人尚焉脊者體之正也食時則祭之飯必舉之貴之也每皆二者夫婦各一耳凡魚之正十五而鼎减一為十四者欲其敵偶也腊兎腊也肫或作純全也凡腊用全髀不升者近竅賤也飪熟也扃所以扛鼎鼏覆之張氏爾岐曰此下言親迎之禮先陳同牢之饌乃乘車往迎婦至成禮共三節設洗於阼階東南注洗所以承盥洗之器棄水者饌於房中醯醬二豆葅醢四豆兼巾之黍稷四敦皆盖注醯醬者以醯和醬生人尚䙝味兼巾之者六豆共巾也巾為禦塵盖為尚温周禮曰食齊視春時太羮湇在㸑注太羮湇煮肉汁也太古之羮無鹽菜㸑火上周禮曰羮齊視夏時尊於室中北墉下有禁𤣥酒在西綌冪加勺皆南枋注墉墻也禁所以庪甒者𤣥酒不㤀古也綌粗葛尊於房户之東無𤣥酒篚在南實四爵合卺注無𤣥酒者略之也夫婦酌于内尊其餘酌于外尊合卺破匏也四爵兩爵卺凡六為夫婦各三酳一升曰蕙田案以上將親迎陳器饌主人爵弁纁裳緇袘從者畢𤣥端乗墨車從車二乗執燭前馬注主人壻也爵弁𤣥冕之次大夫以上親迎冕服袘謂縁也從者有司也乗二車從行者也畢猶皆也士而墨車攝盛也執燭前馬使從役持炬火居前炤道敖氏繼公曰此禮據壻家而言故以壻為主人爵弁者以親迎當用上服也此言緇袘不言衣帶鞸與士冠禮互見也從者謂在車及執燭者也從者棧車也張氏爾岐曰一命大夫冕而無旒士變冕為爵弁故云冕之次士助祭扵公用之是士服之盛者大夫以上親迎則皆冕服矣疏以為五等諸侯亦不過𤣥冕天子親迎當衮冕或然也盛氏世佐曰郊特牲孔疏云士昏用上服以爵弁則天子以下皆用上服以五冕色俱𤣥故總稱𤣥冕也朱子嘗是其說賈云五等諸侯亦不過𤣥冕殆誤婦車亦如之有裧注亦如之者車同等士妻之車夫家共之大夫以上嫁女則自以車送之裧車裳帷周禮謂之容車有容則固有盖盛氏世佐曰亦如之者如其乘墨車而下之儀也嫁時之車王后重翟上公夫人厭翟侯伯子男夫人翟車孤卿以下至士皆與夫同唯有裧為異裧周禮謂之容詩謂之幃裳一名童容周禮作幢容容者以為車之容飾也幃裳者以其幃障車之傍如裳也其上有盖謂之童容四傍垂而下謂之裧裧與襜同其實一物也男子立乗有盖無裧婦人坐乗重自蔽故有盖復有裧敖君善云以布為之想當然耳又云在上曰裧在下曰帷裳此唯有裧而已以裧與帷裳為二非也鄭注雜記云裧謂鼈甲邊縁裧固在旁不在上又案裧車之形不見於聶氏三禮圖蕙田案鄭司農云容謂襜車山東謂之裳帷或謂之幢容似係一物至扵門外注婦家大門之外主人筵於户西西上右几注主人女父也筵為神布席女次純衣纁袡立於房中南面注次首飾也今時髲也周禮追師掌為副編次純衣絲衣女從者卑袗𤣥則此衣亦𤣥矣袡亦縁也袡之言任也以纁縁其衣象隂氣上任也凡婦人不常施袡之衣盛昏禮為此服䘮大記曰復衣不以袡明非常疏不言裳者以婦人之服不殊裳次次第髪長短為之所謂髲髢外内命婦衣鞠衣襢衣者服編衣褖衣服次其副唯于三翟祭祀服之士服爵弁助祭之服以迎則士之妻亦服褖衣助祭之服也此純衣即衣褖衣是士妻助祭之服尋常不用纁為袡今用之故云盛昏禮為此服姆纚笄宵衣在其右注姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母纚縚髪笄今時簮也纚亦廣充幅長六尺宵讀為詩素衣朱綃之綃魯詩以綃為綺屬也姆亦𤣥衣以綃為領因以為名且相别耳姆在女右當詔以婦禮女從者畢袗𤣥纚笄被顈黼在其後注女從者謂姪娣也詩諸娣從之祁祁如雲袗同也同𤣥者上下皆𤣥也顈襌也詩云素衣朱襮爾雅云黼領謂之襮周禮曰白與黒謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施襌黼扵領上假盛飾耳言被明非常服陳氏云袗設飾也説文曰褧檾也枲屬顈與褧檾通袗元設飾以元也顈黼以枲為領而刺黼也蕙田案注引詩諸娣從之釋女從者非也惟天子諸侯一娶九女娣姪從之白虎通義云卿大夫一妻二妾士一妻一妾不備娣姪何北面之勢不足盡人骨月之親也據此則卿大夫已異於諸侯之禮矣何况士乎女從者即下經所謂婦人送者耳主人𤣥端迎於門外西面再拜賔東面答拜注賔壻也主人揖入賔執鴈從至於廟門揖入三揖至于階三讓主人升西面賔升北面奠鴈再拜稽首降出婦從降自西階主人不降送注賔升奠鴈拜主人不答明主為授女耳主人不降送禮不㕘疏禮賔主宜各一人今婦既從故主人不參也壻御婦車授綏姆辭不受注壻御者親而下之綏所以引升車者曲禮曰僕人之禮必授人綏蕙田案女已從男故稱婦也婦乗以几姆加景乃驅御者代注乘以几者尚安舒也景之制盖如明衣加之以為行道禦塵令衣鮮明也景亦明也驅行也行車輪三周御者乃代壻壻乗其車先俟扵門外注壻車在大門外乘之先者道之也男率女女從男夫婦剛柔之義自此始也俟待也門外壻家大門外也疏乘以几者謂登車時景盖以襌縠為之顧氏炎武曰主人爵弁纁裳緇袘注主人壻也壻為婦主主人筵于戸西注主人女父也親迎之禮自夫家而行故壻稱主人至于父家則女父又當為主人故不嫌同辭也女父為主人則壻當為賔故曰賔東面答拜注賔壻也對女父之辭也至于賔出而婦從則變其文而直稱曰壻壻者對父之辭也曰主人曰賔曰壻一人而三異其稱可以見禮時為大而義之由内矣陳氏禮書納幣必以使而春秋之時有親行之者莊公如齊納幣是也逆女必親而春秋之時或以使公子翬公子遂如齊逆女是也應親而不親不應親而親之此春秋所以譏耳禮必親迎若不親迎則有婦入三月壻見之儀存焉蕙田案以上親迎婦至主人揖婦以入及寢門揖入升自西階媵布席於奥夫入於室即席婦尊西南面媵御沃盥交注升自西階道婦入也媵送也謂女從者也御當為訝訝迎也謂壻從者也媵沃壻盥扵南洗御沃婦盥于北洗夫婦始接情冇亷耻媵御交道其志夫疏御與婦人為盥非男子之事謂家之賤者也李氏心傳曰御壻家之女侍也蕙田案御為壻家女侍故後文媵餕主人之餘御餕婦餘不為䙝矣敖氏繼公曰奥室中西墉下少南也布席東面北上宜變扵神席也夫婦既升而並俟於堂媵既布席乃入也即席立于席上也婦立于尊西則尊亦當户明矣交者御沃媵盥媵沃御盥也居室之始即行此禮相下相親之義也蕙田案媵御交侍沃盥示交親之義也盥者夫與婦以將禮食也敖氏以為媵御盥非夫亦盥于北洗故經不見出入之文注謂壻盥於南洗恐未安贊者徹尊羃舉者盥出除鼏舉鼎入陳於阼階南西面北上七俎從設注執匕者執俎者從鼎而入設之匕所以别出牲體也俎所以載也北面載執而俟注執爼而立俟豆先設七者逆退復位於門東北面西上注執七者事畢逆退由便至此乃著其位略賤也贊者設醬於席前菹醢在其北俎入設扵豆東魚次腊特於俎北注豆東葅醢之東贊設黍於醬東稷在其東設湇扵醬南注饌要方也設對醬于東注對醬婦醬也設之當特俎菹醢在其南北上設黍於腊北其西稷設湇于醬北御布對席贊啟會郤扵敦南對敦於北注啟發也贊告具揖婦即對筵皆坐皆祭祭薦黍稷肺注贊者西面告饌具也壻揖婦使即席薦菹醴贊爾黍授肺脊皆食以湇醬皆祭舉食舉也注爾移也移置席上便其食也皆食食黍也以用也用者謂用口啜湇用指𠯗醬三飯卒食注卒巳也同牢示親不主為食起三飯而成禮也贊洗爵酌酳主人主人拜受贊户内北面答拜酳婦亦如之皆祭注酳潄也酳之言演也安也潄所以潔口且演安其所食酳酌内尊面疏壻拜當東面婦拜當南面少牢籑答拜注云在東席者東面拜在西面席者南面拜故知婦拜南面若贊答婦拜亦於户内北面也贊以肝從皆振祭嚌肝皆實於菹豆注肝肝炙也飲酒宜有肴以安之卒爵皆拜注婦拜見上篇見母章此篇婦見奠菜一章及内則女拜尚右手贊答拜受爵敖氏繼公曰卒爵而拜拜其飲己之賜也賛答拜亦一拜也受爵出奠於篚乃復洗他爵以升再酳如初無從三酳用卺亦如之注亦無從也敖氏繼公曰至是乃用卺者昏禮將終示以合體相親之意也亦如之者亦如初而無從也贊洗爵酌於户外尊入户西北面奠爵拜皆答拜坐祭卒爵拜皆答拜興注贊酌者自酢也敖氏繼公曰三酳乃自酢變于常禮也主人出婦復位注復尊西南面之位蕙田案前文夫婦皆答拜此時夫婦室中之拜皆順其東西向興謂夫婦也主人出為將脱服扵房也婦但當脱服扵室故不出復舊位而立也乃徹於房中如設於室尊否注徹室中之饌設于房中為媵御餕之徹尊不設有外尊也主人説服於房媵受婦説服於室御受姆授巾注巾所以自潔清御袵於奥媵袵良席在東皆有枕北止注袵卧席也婦人稱夫曰良孟子曰將覸良人之所之止足也古文止作趾疏布同牢席夫在西婦在東今乃易處者前者示隂陽交㑹有漸今取陽往就隂也主人入親說婦之纓注入者從房還入室婦人十五許嫁笄而禮之因著纓明有繫也盖以五采為之其制未聞蕙田案疏纓有二曲禮云女子許嫁纓注云繫纓有從人之端也即此說纓之纓也内則云男女未冠笄者總角衿纓此幼時纓也皆與男子冠纓異今主人親脱之者明此纓為已而繫也然亦暫脱之耳婦事舅姑衿纓仍當飾之燭出注昏禮畢將卧息媵餕主人之餘御餕婦餘贊酌外尊酳之注外尊房户外之東尊媵侍於户外呼則聞注為尊者有所徴求蕙田案以上婦至成禮夙興婦沐浴纚笄宵衣以俟見注夙早也昏明日之晨興起也俟待也待見扵舅姑寢門之外古者命士以上年十五父子異宫蕙田案特牲主婦宵衣盖士妻之正服也解見前疏謂純衣纁袡嫁時之盛服故事已而復其常也質明贊見婦於舅姑席於阼舅即席席于房外南面姑即席注質平也房外房户外之西婦執笲棗栗自門入升自西階進拜奠于席笲音煩矣注笲竹器有衣者其形盖如今之筥􅠚籚進拜者進東面乃拜奠之者舅尊不敢授也舅坐撫之興答拜婦還又拜注還又拜者還于先拜處拜婦人與丈夫為禮則俠拜降階受笲腵脩升進北面拜奠扵席姑坐舉以興拜授人注人有司姑執笲以起答婦拜授有司徹之舅則宰徹之曲禮疏脯搏肉無骨而𦢊之修取肉鍜治而加薑桂乾之如脯者蕙田案棗栗腵脩所以為贄也乃皆奠之而不敢授者凡相見之禮尊卑不敵則奠之舅撫而姑舉示受之也舅姑答拜與冠禮母拜之之拜同張氏爾岐曰婦見舅訖復自西階降受腵修以見姑蕙田案以上婦見舅姑贊醴婦注醴當為禮贊禮婦者以其婦道新成親厚之席於户牖間注室户西牖東南面位側尊甒醴扵房中婦疑立於席西注疑正立自定之貌贊者酌醴加柶面枋出房席前北面婦東面拜受贊西階上北面拜送婦又拜薦脯醢注婦東面拜賛北面答之變于丈夫始冠成人之禮婦升席左執觶右祭脯醢以柶祭醴三降席東面坐啐醴建柶興拜贊答拜婦又拜奠於薦東北面坐取脯降出授人於門外注奠於薦東升席奠之取脯降出授人親徹且榮得禮人謂婦氏人蕙田案以上醴婦舅姑入于室婦盥饋注饋者婦道既成成以孝養特豚合升側載無魚腊無稷並南上其他如取女禮注側載者右胖載之舅爼左胖載之姑俎異尊卑並南上者舅姑共席扵奥其饌各以南為上其他謂醬湆菹醢女謂婦也如取婦禮同牢時疏自側載以下南上以上與取女異周人吉禮尚右故知右胖載之舅俎左胖載之姑俎以異尊卑也蕙田案異俎則異席但同在奥而東面耳東面舅南而姑北婦贊成祭卒食一酳無從注賛成祭者授處之今文無成也席於北墉下注室中北墻下婦徹設席前如初西上婦餕舅辭易醬注婦餕者即席將餕也辭易醬者嫌淬汙婦餕姑之饌御贊祭豆黍肺舉肺脊乃食卒姑酳之婦拜受姑拜送坐祭卒爵姑受奠之注奠于篚婦徹於房中媵御餕姑酳之雖無娣媵先於是與始飯之錯注古者嫁女必娣姪從之謂之媵姪兄之子娣女弟也娣尊姪卑若或無娣猶先媵客之也始飯謂舅姑錯者媵餕舅餘御餕姑餘也古文始為姑蕙田案士之媵無娣姪故曰雖無娣媵先則士之媵盖以他女備之然既曰媵則始至之時亦客之也故酳媵在御先媵御固同餕姑之餘但止飯黍而無食舉故止與始飯敦黍而交錯餕之亦猶特牲少牢上下餕之分敦黍之意注謂媵餕舅餘御餕姑餘似可商又案以上婦饋舅姑舅姑共饗婦以一獻之禮舅洗於南洗姑洗於北洗奠酬注以酒食勞人曰饗南洗在庭北洗在北堂設兩洗者獻酢酬以潔清為敬奠酬者明正禮成不復舉凡酬酒皆奠於薦左不舉其燕則更使人舉爵舅姑先降自西階婦降自阼階注授之室使為主明代已歸婦俎於婦氏人注言俎則饗禮有牲矣婦氏人丈夫送婦者使有司歸以婦俎當以反命扵女之父母明其得禮蕙田案昏義厥明饗婦乃異日也注疏謂大夫以上或異日士同日非又案以上舅姑饗婦舅饗送者以一獻之禮酬以束錦注送者女家有司也爵至酬賔乂從之以束錦所以相厚古文錦皆作帛送疏尊無送卑之法士無臣故知有司之也姑饗婦人送者酬以束錦注婦人送者隷子弟之妻妾凡饗速之疏凡速者皆就館速之若異邦則贈丈夫送者以束錦注贈送也就賔館蕙田案以上饗送者若舅姑既沒則婦入三月乃奠菜注沒終也奠菜者以篚祭菜也盖用堇疏必三月者三月一時天氣變婦道可成也此言舅姑俱沒者若舅沒姑存則當時見姑三月亦廟見舅若舅存姑沒婦人無廟可見或更有繼姑自然如常禮也案曾子問云三月而廟見擇日而祭于襧鄭云舅姑沒者也婦有供養之禮猶舅姑存時盥饋特豚扵室此言奠菜即彼祭扵禰一也席於廟奥東面右几席於北方南面注廟考妣之廟北方墉下張氏爾岐曰席扵奥者舅席也席于北方者姑席也舅姑别席異而象生時婦見之禮與常祭同几者不同也祝盥婦盥於門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜於皇舅某子注帥道也入入室也某氏者齊女則曰姜氏魯女則曰姬氏來婦言來為婦嘉美也皇君也疏盥于門外此亦異于常祭云某子者言若張子李子也張氏爾岐曰疏以婦新入門稱姓以告故亦以姓稱其舅與婦拜扱地坐奠菜扵几東席上還又拜如初注扱地手至地也婦人扱地猶男子稽首子疏婦人以爾手為正今云扱地則婦人之重拜也男稽首亦拜中之重故以相况也盛氏世佐曰婦人拜法見扵經傳者五曰肅拜少儀云婦人吉事雖君賜肅拜是也曰手拜少儀注云凶事乃手拜孔疏云婦人除為䘮主其餘輕䘮凶事乃有手拜是也曰稽顙䘮服小記云婦人為夫為長子稽顙是也曰頓首左傳晋穆嬴抱太子以適趙氏頓首扵宣子是也曰扱地此奠菜禮是也惟肅拜為正餘皆非吉禮扱地之拜盖介乎吉凶之間以致其哀敬之意與以男子九拜例之肅拜軍中之拜也手拜盖與空首相似其法先以手至地而頭來至手也稽顙即凶拜頓首是男子平敵相與之拜而穆嬴施於其臣疏家以為私求法非禮之正然嬴時遭襄公之䘮則亦凶拜也殆如吉拜拜而后稽顙為殷之凶拜與扱地於九拜無所似賈疏謂以手至地而首不至手又與空首不同注云婦人扱地猶男子稽首稽首拜頭至地臣拜君之拜舉以相况者明其為拜中之最重非為拜法似之也然則扱地與肅拜異稽顙又與扱地異手拜與扱地皆以手至地而首或至手或不至手亦異熊氏謂初嫁及為夫為長子主䘮則以手扱地葢考之未精矣又案肅拜之法周禮注云肅拜但俯下手今時撎是也疏引郷飲酒禮注推手曰揖引手曰撎為證少儀注云肅拜拜低頭也若然女拜益不折腰屈膝矣郝氏謂男子坐拜婦人立拜故婦人見舅姑手棗栗腵修拜而後奠若坐拜必奠後拜此說得之敖氏云凡婦人之拜以左掌據地故右手執物而可以拜殆未講乎肅拜之法與特牲禮主婦致爵訖酌酢左執爵拜則以左掌據地之說不辨自破矣郝氏又謂婦拜舅立而使其舅坐拜答之於禮未當且廟見婦拜扱地舅姑坐拜不當扱地耶愚謂扱地之拜為不逮事舅姑者設將以生其哀慕之心焉故與凶事手拜相似豈宜施於具慶者㦲先聖使婦人肅拜所以重男女之别也拜君賜拜君舅君姑非不欲加隆焉而禮有所止惡其不純乎吉者參之也郝氏每以臆見測古禮無怪乎其疑之也婦降堂取笲菜入祝曰某氏來婦敢告於皇姑某氏奠菜於席如初禮注降堂階上也室事交乎户今降堂者敬也扵姑言敢告舅尊于姑婦出祝闔牖户注凡廟無事則閉之老醴婦於房中南面如舅姑醴婦之禮注因于廟見禮之盛氏世佐曰上云賛醴婦賛即老也以其助舅姑行禮故曰賛此無所助故直指其人言之郝氏敬扵醴婦章嘗以男女不親授受今用男子酌新婦而禮文不言用何等男子獻疑張氏爾岐亦云嘗疑此老與前贊者並是男子乃使與新婦為禮在前聖必自有說非末學所可臆度愚謂老家臣之長必有徳而年髙者為之故使之醴婦所以代舅姑也特牲少牢禮有主婦與尸祝佐食賔獻酢致爵之事古人行禮固不以為嫌後人不之疑而獨疑昏禮何居又郝氏謂三月廟見以夫婦共為祭主非以三月為限也苟未三月而及祭期婦可以不與于祭乎與于祭可以不先見乎此皆臆說也婦入三月然後祭行未三月而及祭期婦固不與也以其未成婦也壻饗婦送者丈夫婦人如舅姑饗禮注舅姑沒故壻兼饗丈夫婦人如舅姑饗禮盛氏世佐曰春秋宣五年經書齊髙固及子叔姬來左傳云反馬也杜注云禮送女留其送馬謙不敢自安三月廟見遣使反馬此士禮雖無反馬之事然送女者則必俟其成婦而後歸亦猶謙不敢自安之意也舅姑存則以昏之明日見于舅姑舅姑醴之而婦禮成矣送者可以歸矣故舅姑于饗婦之後即饗送者不必三月也若舅姑既殁則必待三月廟見而後成婦記云擇日而祭于禰成婦之儀也又云如未廟見而死歸葬于女氏之黨示未成婦也成婦而後送者乃可歸故經言壻饗送者于老醴婦之後著其行禮之節也敖云此禮宜行于始嫁之時非且婦未受禮而先饗送者亦失其尊卑先後之次矣蕙田案以上舅姑沒婦廟見及饗婦饗送者之禮盛氏世佐曰此章言禮之變亦記體也凡言禮之變者二一後世變禮自不合入經如冠禮不醴若殺此篇不親迎之類是也一古者元有其禮以通乎正之所窮特以非常故不見扵經而賢者識之以補其所未備如冠禮孤子冠母不在此篇宗子無父之類是也此章亦其類矣記士昏禮凡行事必用昏昕受諸禰廟辭無不腆無辱注用昕使者用昏壻也腆善也賓不稱幣不善主人不謝來辱疏辭無不腆無辱者郊特牲云告之以直信是賔納幣之時不得謙虗為辭主人亦不為謙虗教女正直之義也朱子曰用昕即詩所謂旭日始旦也敖氏繼公曰士一廟則祖禰皆在焉惟云禰者祖尊而禰親受昏禮宜于親者摯不用死皮帛必可制注摯雁也皮帛儷皮束帛也蕙田案死謂雉也虞書二生一死二生鴈其一也士當用雉因其死而不用故用鴈此記所以釋用鴈之義必可制謂當其人與時之宜可制而服之也聘禮記云幣美則沒禮過美則不可制而况濫惡乎是皆謂之不可制而非所云幣必誠也腊必用鮮魚用鮒必殽全注殽全者不餒敗不剥傷郝氏敬曰同牢禮饗用腊必新乾者鮒鯽魚性相依附曰鮒殽用全牲體備也盛氏世佐曰殽全謂豚爼也殽骨體也全者不折也一骨而分為二曰折特牲少牢禮言俎之折者不一是皆有殽而不全也雖一體完矣而二十一體不備亦不可謂全惟同牢之禮用其全耳郝氏說近之蕙田案以上記昏禮時地辭命用物女子許嫁笄而醴之稱字注許嫁已授納徴禮也笄女之禮猶冠男也使主婦女賔執其禮許疏笄女許嫁者用醴禮之未嫁者當用酒醮之祖廟未毁教于公宫三月若祖廟已毁則教于宗室注祖廟女髙祖為君者之廟也以有緦麻之親就尊者之宫教以婦徳婦言婦容婦功宗室大宗之家張氏爾岐曰此謂諸侯同族之女將嫁之前敎成之法其與諸侯共髙祖者是緦麻之親教之於公宫其共曾祖共祖共禰廟者皆教扵公宫可知也若與君絶服者則于大宗之家教之大宗之家謂别子之世適長子族人所宗事者也盛氏世佐曰宗子所以尊祖收族女子將嫁教于宗室三月亦收族之一端案注云大宗之家疏云不于小宗者小宗卑故也昏義孔疏大宗小宗之家悉得教之與大宗近者扵大宗與大宗逺者于小宗二說不同當以賈疏為正若謂與國君絶服者教于大宗之家與大宗絶服者教于小宗之家設有繼髙祖之宗而與大宗絶服者其女當于何教乎教于大宗則已逺教于已室是無統矣此則孔說所不通也蕙田案以上記笄女嫁女問名主人受鴈還西面對賔受命乃降注受鴈于两楹間南面還于阼階上對賔以女名蕙田案此記問名之儀祭醴始扱一祭又扱再祭賔右取脯左奉之乃歸執以反命注反命謂使者問名納吉納徴請期還報于壻父疏祭醴謂替醴賔之時禮成于三始祭醴之初扱一祭及又扱則分為兩祭是為三也張氏爾岐曰凡祭醴之法皆如此蕙田案以上記祭醴之儀納徴執皮攝之内文兼執足左首隨入西上參分庭一在南注攝猶辟也兼執足者左手執前兩足右手執後两足左首象生曲禮曰執禽者左首西上中庭位併敖氏繼公曰先儒讀攝為摺則訓叠也今人屈物而叠之謂之摺古之遺言與内文兼執足攝之之法也左首謂西上也云隨入者以其並攝嫌亦並行也西上統乎賔也張氏爾岐曰納徵之禮賔執束帛入别有二人執皮以為庭寶其執之之法襞攝之使文在内兩手兼執其四足首向左二人相隨入門至庭則併立以西為上三分庭之一而在其南賔致命釋外足見文主人受幣士受皮者自東出於後自左受遂坐攝皮逆退適東壁注賔致命主人受幣庭寳所用為節士謂若中士下士不命者以主人為官長自由也張氏爾岐曰賔堂上致命時執皮者庭中釋皮外足見文主人堂上受命時主人屬吏受皮者自東方出執皮者之後至其左北面受之既受皮遂坐攝之復使内文逆退適東壁者初二人相隨自東而西及退反東壁則後者在前也蕙田案以上記納徴庭實之儀父醴女而俟迎者母南面於房外注女既次純衣父醴之于房中南面盖母薦焉重昏禮也女奠爵於薦東立于位而俟壻壻至父出使擯者請事母出南面房外示親授壻且當戒女也女出於母左父西面戒之必有正焉若衣若笄母戒諸西階上不降注必有正焉者以託戒之使不忘張氏爾岐曰母在房户西南面女出房至母左時父阼階上西面戒之母送女至西階上乃戒之也父母不降送庶母及門内申父母之命蕙田案以上記父母戒女婦乗以几從者二人坐持几相對注持几者重愼之夫疏王后則履石大諸侯亦應有物履之但無文今人猶用臺蕙田案此記婦升車乗几婦入寢門贊者徹尊冪酌𤣥酒三屬於尊棄餘水於堂下階間加勺注屬注也𤣥酒涚水貴新昏禮又貴新故事至乃取之三注于尊中蕙田案此記𤣥酒之節笲緇被纁裏加於橋舅答拜宰徹笲注被表也笲有衣者婦見舅姑以飾為敬橋所以庪笲其制未聞今文橋為鎬蕙田案此記笲飾及受笲之節婦席薦饌於房注醴婦饗婦之席薦也饗婦姑薦焉注舅姑共饗婦舅獻爵姑薦脯醢婦洗在北堂直室東隅篚在東北面盥注洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房户與隅間婦酢舅更爵自薦注更爵男女不相因也不敢辭洗舅降則辟於房不敢拜洗注不敢與尊者為禮凡婦人相饗無降注姑饗婦人送者扵房無降者以北洗篚在上疏言凡者欲見舅姑共饗婦及姑饗婦人送者皆然蕙田案以上記醴婦饗婦饌具儀節婦入三月然後祭行注入夫之室三月之後於祭乃行謂助祭也蕙田案注云助祭盖兼舅姑存沒適婦庶婦而言三月之後婦道既成故凡祭皆行也特牲少牢禮婦人助祭者内賔宗婦皆與若謂助夫祭為主婦必舅姑既沒或老而傳者乃為得之舅在無姑婦仍不得為主婦也注是疏不合又案此記婦助祭之期庻婦則使人醮之婦不饋注庶婦庶子之婦也使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之其儀則同不饋者共養統于適也張氏爾岐曰亦昏之明日婦見舅姑時因使人醮之於房外之西如醴婦之儀婦不饋則舅姑亦不饗也盛氏世佐曰庶婦之醮當適婦之醴其不饗又因不饋而見非一義也注以不饗釋醮疏云以醮贊饗誤矣醮之位未聞以冠禮醮世子法例之當在房外敖氏謂亦在户牖間非或疑醮禮亦行於婦見舅姑之日斯時房外之位姑寔在焉豈庶婦見舅姑其位亦異於適與曰非也上文贊醴婦時舅姑尚在阼與房外之位若親醴之然所以尊適也禮畢乃入室此云使人醮之則舅姑早入於室矣無妨婦席於房外也人亦室老也舅姑不在其位故不云贊蕙田案此記庶婦禮敖氏繼公曰此以上專記事以下專記辭不欲其相亂也昏辭曰吾子有惠貺室某也注昏辭擯者請事告之辭吾子謂女父也稱有惠明下逹貺賜也室猶妻也某壻名某有先人之禮使某也請納采注某壻父名也某也使名也對曰某之子惷愚又弗能教吾子命之某不敢辭注對曰者擯出納賔之辭某女父名也吾子謂使者致命曰敢納采蕙田案以上記納采之辭問名曰某既受命將加諸卜敢請女為誰氏注某使者名也誰氏者謙也不必其主人之女盛氏世佐曰古人有姓有氏姓如姬姜之類氏如季孫叔孫之類男子恒稱氏婦人恒稱姓記云㓜名冠字五十以伯仲男子之禮也婦人既笄之後即以伯仲為字而稱之皆與男子異故以姓配伯仲婦人之通稱間有以姓配氏者如欒黶之妻曰欒祁東郭偃之姊曰東郭姜之類盖傳者以此相别耳非常稱也婦人之氏有二種而姓氏之氏不與焉一則以姓為氏如曰姬氏姜氏是也一則以字為氏如詩稱戴嬀太任皆曰仲氏是也上文云某氏來婦某姓也此云女為誰氏誰字也禮本問名辭乃問字者使者不敢斥言主人之對則直告以女名矣若女之姓氏於媒氏傳言時已知之何必問耶注誤以問名為問姓嫌于知而復問故以謙不必其主人之女解之真曲說也疏家主扵䕶注遂創為名有二種之說皆泥于婦人不以名行之說故耳夫不以名行者特以婦人無外事故名不聞于人非謂有名而不稱也昭二十七年左傳云請以重見是婦人稱名之例矣周禮媒氏云凡男女自成名以上皆書歲月日名焉記云男女非有行媒不相知名然則女子未字以前其名不出於梱唯媒氏知之而男家則猶待問也姜氏上均以問名為問字亦未為得昏義孔疏又云問名者問其女之所生母之姓名亦非問女名將以卜之也問女母之姓名何為㦲又案此辭及下文吾子有命以下至某不敢辭皆賔在廟門外與擯者對答之辭即經所謂擯者出請賔執鴈請問主人許者也賔致命於堂當曰敢問名主人則以女名對之即上記所謂主人受鴈還西面對者也疏以此為致命之辭張氏爾岐謂告擯者之辭當亦不異皆未的夫不敢斥言而云誰氏者使者之辭直云問名者壻父之命自納采以至請期致命之辭俱相似故記於納采納徴見其例而餘則畧之對曰吾子有命且以備數而擇之某不敢辭注卒曰某氏不記之者明為主人之女蕙田案注當云對以女名今曰某氏與前經主人受鴈還西面對注語不合云不記之者明其為主人之女更未妥見前盛氏辨中又案以上記問名之辭醴曰子為事故至于某之室某有先人之禮請醴從者注言從者謙不敢斥也對曰某既得將事矣敢辭注將行先人之禮敢固以請注主人辭固如故某辭不得命敢不從也注賔辭也不得命者不得辭已之命蕙田案以上記醴賔之辭納吉曰吾子有貺命某加諸卜占曰吉使某也敢告注貺賜也賜命謂許以女名也某壻父名對曰某之子不教唯恐弗堪子有吉我與在某不敢辭注與猶兼也蕙田案以上記納吉之辭納徴曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徴致命曰某敢納徴對曰吾子順先典貺某重禮某不敢辭敢不承命注典常也法也蕙田案以上記納徴之辭請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日注三族謂父昆弟已昆弟子昆弟虞度也不億度謂卒有死䘮此三族者已及子皆為服期期服則踰年欲及今之吉也雜記曰大功之末可以冠子嫁子對曰某既前受命矣唯命是聽注前受命者申前事也曰某命某聽命於吾子注曰某壻父名也對曰某固唯命是聽使者曰某使某受命吾子不許某敢不告期曰某日注某吉日之甲乙對曰某敢不敬須注須待也蕙田案以上記請期之辭凡使者歸反命曰某既得將事矣敢以禮告注告禮所執脯主人曰聞命矣蕙田案此記使者反命之辭父醮子注子壻也在疏父醮子用酒寢命之辭曰徃迎爾相承我宗事注相助也宗事宗廟之事朂帥以敬先妣之嗣若則有常注朂勉也若猶女也勉帥婦道以敬其為先妣之嗣女之行則當冇常深戒之詩云太姒嗣徽音張氏爾岐曰謂婦為相以其為夫之助也注以朂帥以敬八字為句愚謂當四字為句事嗣叶相常首尾叶若曰今徃迎爾相以承我宗事當勉帥以敬使其惟先妣是嗣汝之敬必有常不可敬始而怠終也末句申勸之子曰諾唯恐弗堪不敢忘命蕙田案以上記父醮子辭賔至擯者請對曰吾子命某以兹初昏使某將請承命注賔壻也命某某壻父名兹此也將行也使某行昏禮來迎對曰某固敬具以須敖氏繼公曰壻家告期而賔乃云吾子之命者不敢自專若受命于婦家也父送女命之曰戒之敬之夙夜毋違命母施衿結帨曰勉之敬之夙夜無違宫事注帨佩巾庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶注庶母父之妾也鞶鞶囊也男鞶革女鞶絲所以盛帨巾之屬為謹敬申重也宗尊也愆過也諸之也示之以衿鞶皆託戒使識之也不示之以衣笄者尊者之戒不嫌㤀之盛氏世佐曰鄭以鞶為囊杜氏注左傳以為紳帶一名大帶賈服皆與杜同說文亦云大帶也孔氏之疏每曲鄭而直杜以易或錫之鞶帶知鞶即帶也左傳疏又以内則縏袠之縏亦當為帶然縏字從系鞶字從革則一為囊一為帶自屬兩義丈夫之帶有二一為大帶以束衣一為革帶以佩韍玉之等婦帶應如之鞶為大帶則衿猶丈夫之革帶與凡佩繫于革帶故施衿則結帨以為之佩也蕙田案以上記親迎及父母戒女之辭壻授綏姆辭曰未教不足與為禮也張氏爾岐曰此節監本脱據石經及吳本補入或當有鄭注而今逸之矣姆教人者蕙田案此記姆辭壻授綏之辭宗子無父母命之親皆沒已躬命之注宗子者適長子也命之命使者母命之在春秋紀裂繻来逆女是也躬猶親也親命之則宋公使公孫夀來納幣是也言宗子無父是有有父者禮七十老而傳八十齊䘮之事不及若是者子代其父為宗子其取也父命之盛氏世佐曰母命之者母使子之諸父兄命五禮之使者親迎則使命其子昏詞皆稱母所使出命者之名也雖有諸父諸兄不敢擅為昏主必待母命而後為之尊大宗也母沒則族人無敢主其昏矣故已躬命五禮之使者親迎則告於禰而其詞皆稱壻名也母不通使義見公羊傳又昏禮當使同姓主之公羊傳云稱諸父兄師友劉向說苑載大夫士昏詞亦曰某之父某之師友師友異姓而與兄並稱恐未安支子則稱其宗注支子庶昆弟也稱其宗子命使者盛氏世佐曰此亦謂無父者支子與庶子異庶者對適而言支者對宗而言有庶子而為宗者如庶子為父後是也有宗子而為支者如身是繼禰之宗而父非適長則於祖為支矣身是繼祖之宗而祖非適長則於曾祖為支矣推而上之即至為繼髙祖之宗而於大宗仍為支子也曲禮云支子不祭祭必告於宗子以支子對宗子言與此同䘮服傳所云者非支子之正解也宗五宗也大宗一小宗四稱謂昏辭所稱之名如曰某有先人之禮之類是也父在則某是父名無父則是繼禰之宗子名身繼禰則稱繼祖之宗身繼祖則稱繼曾祖之宗其他可以類推矣弟則稱其兄注弟宗子母弟亦謂無父者敖氏繼公曰弟謂凡無父母而有親兄者也兄雖非宗子猶稱之也有兄則不稱宗子者尚親也蕙田案以上記命使之人若不親迎則婦入三月然後壻見曰某以得為外昏姻請覿注女氏稱昏壻氏稱姻覿見也敖氏繼公曰不親迎謂使人迎之此指無父者也記曰父醮子而命之迎昏義曰子承父命以迎是親迎者必受父命也無父則子無所承命故其禮不可行盛氏世佐曰敖氏無父者不親迎之說非也據昭元年左傳載楚公子圍娶婦事云請以衆迎又云圍布几筵告於莊共之廟而来則無父者告於廟而後迎禮也豈以無所承命而廢鬼神陰陽之大典乎隱二年經書紀履緰來逆女公羊傳曰譏始不親迎也莊二十有四年公如齊逆女杜氏注云親迎禮也詩曰韓侯迎止于蹶之里冕而親迎孔子以告哀公是諸侯之迎且不以父廢也而况大夫以下乎其為臆說無疑矣主人對曰某以得為外昏姻之數某之子未得濯溉於祭祀是以未敢見今吾子辱請吾子之就宫某將走見注主人女父也以白造緇曰辱對曰某以非他故不足以辱命請終賜見注非他故彌親之詞命謂將走見之言對曰某以得為昏姻之故不敢固辭敢不從注不言外亦彌親之辭主人出門左西面壻入門東面奠摯再拜出注出門出内門入門入大門出内門不出大門者異于賔客也壻見于寢奠摯者壻有子道不敢授也摯雉也擯者以摯出請受注欲使以賔客禮相見壻禮辭許受摯入主人再拜受壻再拜送出注出已見女父見主婦主婦闔扉立於其内注主婦主人之婦也見主婦者兄弟之道宜相親也闔扉者婦人無外事扉左扉壻立於門外東面主婦一拜壻答再拜主婦又拜壻出注必先一拜者婦人於丈夫必俠拜主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣注及與也無幣異于賔客壻出主人送再拜蕙田案以上記不親迎見婦父母之禮盛氏世佐曰此篇於親迎以前不言告廟之事白虎通義因有娶妻不先告廟者示不必安也之說然記有之曰日月以告君齋戒以告鬼神為酒食以召郷黨僚友以厚其别也齋戒以告鬼神而謂非告廟可乎儀禮之文不具者多矣他傳記足以補之者君子弗棄也隱八年左傳載鄭公子忽逆婦先配而後祖陳鍼子譏之之事注云禮逆婦必先告廟而後行鄭忽先逆婦而後告廟故曰先配而後祖杜義要有所本竊疑告廟之禮當是壻父率其子以告孤子則自告時忽父見在而疏以為逆者當自告恐未是鄭氏盖主不告廟之説故其解左傳以祖為軷道之祭注曲禮之告鬼神則以昏禮凡受女之禮皆于廟為神席當之解左之説已見斥於孔疏而曲禮注顧未有非之者夫於廟為神席乃女氏之事記者之意葢主男氏而言不可援以為証也况女父筵几於廟是重以先祖之遺體許人亦與厚别意㣲異左傳又載楚公子圍娶婦告廟事疏云聘禮臣奉君命聘於鄰國猶釋幣於禰乃行况昏是嘉禮之重文王世子曰五廟之孫祖廟未毁雖為庶人冠娶妻必告鄭云告于君也亦既告君必須告廟此說得之朱子經傳通解右白虎通義而疑左氏不足信愚未敢以為安右儀禮士昏禮五禮通考卷一百五十二
