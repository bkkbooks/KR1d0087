帝王肇迹之處未有祠宇者所由郡置一廟享祭仍取當時將相德業可稱者二人配享夏王都安邑以伯益伯夷配殷王湯都亳以伊尹仲虺配周文王都酆以師鬻熊太公望配周武王都鎬請入文王廟同享以周公召公配秦始皇都咸陽以李斯王翦配漢髙祖起沛以蕭何張良配後漢光武皇帝起南陽以鄧禹耿弇配魏武皇帝都鄴以荀彧鍾繇配晉武帝都故洛陽以張華羊祜配後魏道武皇帝起雲中以長孫嵩崔玄伯配後周文帝起馮翊以蘇綽于謹配隋文帝封隋漢東以髙熲賀若弼配並令郡縣長官春秋二時擇日凖前致祭其歷代帝王廟每所差側近人不課戶四人有闕續填仍關戶部處分邱氏濬曰案此祀三皇以前帝王之始然皇莫大于伏羲神農黃帝帝莫盛于少昊顓頊髙辛堯舜王莫備于禹湯文武經史所紀者僅此而已三皇以前世涉洪荒事屬茫昧有陵墓者命有司守之不立廟祀可也蕙田案此歷代帝王立廟之始舊唐書元宗本紀天寶九載冬十一月辛丑立周武王漢髙祖廟于京城司置官吏蕙田案此别立帝王廟文獻通考代宗永泰二年詔道州舜廟宜蠲近廟佃戶充掃除邱氏濬曰元宗時嘗令歷代帝王廟每所差側近人四戶有闕續填其後有敕廢之至是代宗從道州刺史元結請而有此舉大歷五年鄜坊節度使上言坊州軒轅皇帝陵闕請置廟四時列于祀典憲宗元和十四年敕周文王武王祠宇在咸陽縣宜令有司精加修飾王圻續通考唐昭宗乾寧四年建漢昭烈一廟在涿州西南樓桑村明洪武間重修宋史太祖本紀建隆元年春正月丁巳命周宗正郭玘祀周陵廟仍以時祭享五月己酉西京作周六廟成遣官奉遷秋七月甲子遣工部侍郎艾頴拜嵩慶陵八月辛未遣郭玘享周廟禮志建隆元年詔前代帝王陵寢或樵採不禁風雨不庇宜以郡國置戶以守墮毁者修葺之太祖本紀建隆二年春正月己未遣郭玘享周廟夏四月壬寅詔郡國置前代帝王賢臣陵冡戶乾德元年六月丙申詔歷代帝王三年一享立漢光武唐太宗廟禮志乾德初詔歷代帝王國有常享著于甲令可舉而行自五代亂離百司廢墜匱神乏祀闕孰甚焉案祀令先代帝王每三年一享以仲春之月牲用太牢祀官以本州長官有故則上佐行事官造祭器送諸陵廟又詔先代帝王載在祀典或廟貌猶在久廢牲牢或陵墓雖存不禁樵採其太昊炎帝黃帝髙辛唐堯虞舜夏禹成湯周文王武王漢髙帝光武唐髙祖太宗各置守陵五戶歲春秋祀以太牢商中宗太戊髙宗武丁周成王康王漢文帝宣帝魏太祖晉武帝後周太祖隋髙祖各置三戶歲一享以太牢秦始皇帝漢景帝武帝明帝章帝魏文帝後魏孝文帝唐元宗憲宗肅宗宣宗梁太祖後唐莊宗明宗晉髙祖各置守陵兩戶三年一祭以太牢周桓王景王威烈王漢元帝成帝哀帝平帝和帝殤帝安帝順帝沖帝質帝獻帝魏明帝髙貴鄉公陳留王晉惠帝懷帝愍帝西魏文帝東魏孝靜帝唐髙宗中宗睿宗德宗順宗穆宗代宗敬宗文宗武宗懿宗僖宗昭宗梁少帝後唐末帝諸陵常禁樵採尋又禁河南府民耕晉漢廟壖地邱氏濬曰宋太祖次序歷代帝王給守陵戶命有司致享可謂忠厚之至矣但其所品第者亦有未盡善者焉其第一等十六帝給民五戶第二等十帝給民三戶第三等十五帝給民二戶皆令有司歲祀第四等惟禁樵採無陵戶無祭祀其第一等皆創業之君無可議者其第二等曹操以篡得國未嘗即帝位也而亦列于成康漢文之間朱溫篡弒其君無復人理而亦得預于景武元憲之列則似無别矣至於北朝五代之陵墓皆禁樵採而於南朝獨遺者是時吳蜀未平也嗚呼宋祖此舉雖若為崇奉帝王而設然其品第之間亦寓抑揚之意後世人主鑒之亦知所以自勉矣文獻通考乾德二年十一月太常博士聶崇義上言凖祠令周文王以太公配唐天寶七載以師鬻熊及太公望配伏緣太公已封武成王春秋釋奠望自今止以鬻熊配享奏可宋史太祖本紀乾德四年九月丙午詔吳越立禹廟于會稽冬十月癸亥詔諸郡立古帝王陵廟路史乾德四年詔置女皇氏守陵五戶春祭少牢宋史太祖本紀開寶三年九月甲辰詔西京鳳翔雄耀等州周文成康三王秦始皇漢髙文景武元成哀七帝後魏孝文西魏文帝後周太祖唐髙祖太宗中宗肅宗代宗德順文武宣懿僖昭諸帝凡二十七陵常被盜發者有司備法服常服各一襲具棺槨重葬所在長吏致祭四年三月增前代帝王守陵戶二夏四月辛卯發廂軍千人修前代帝王陵寢之在秦者九年秋七月丁亥命修先代帝王祠廟真宗本紀咸平元年十一月甲子詔葺歷代帝王陵廟景德元年冬十月壬午詔修葺歷代聖賢陵墓禮志景德元年詔前代帝王陵寢並禁樵採摧毁者官為修築無主者碑碣石獸之類敢有壞者論如律仍每歲首所在舉行此令真宗本紀景德四年二月命吏部尚書張齊賢祭周六廟戊子葺周六廟庚寅詔河南府置五代漢髙祖廟辛卯車駕發西京甲午次鄭州遣使祀周嵩懿二陵玉海大中祥符元年王欽若言瑕邱堯祠前得芝草九本連理者四甲辰命欽若祭堯祠文獻通考大中祥符三年令西京葺後唐莊宗廟宋史真宗本紀大中祥符四年三月丁亥詔葺歷代帝王祠廟文獻通考四年祀汾陰駐蹕河中府遣官致祭緣路帝王祠廟神帳畫壁並加葺治令衡州葺神農廟宋史真宗本紀大中祥符六年六月丁丑崇飾諸州黃帝祠廟文獻通考大中祥符六年詔諸州有黃帝祠廟並加崇葺宋史真宗本紀天禧元年六月庚辰盜發後漢髙祖陵論如律并劾守土官吏遣內侍王克讓以禮治葬知制誥劉筠祭告因詔州縣申前代帝王陵寢樵採之禁禮志熙寧元年從知濮州韓鐸請堯陵在雷澤縣東榖林山陵南有堯母慶都靈臺廟請敕本州春秋致祭置守陵五戶免其租奉灑掃又以中丞鄧潤甫言唐諸陵除已定頃畝外其餘許耕佃為守陵戶餘並禁止鄧潤甫傳潤甫為御史中丞上言興利之臣議前代帝王陵寢許民請射耕墾而司農可之唐之諸陵因此悉見芟刈昭陵喬木剪伐無遺熙寧著令本禁樵采遇郊祀則敕吏致祭德意可謂逺矣小人掊克不顧大體願絀創議之人而一切如令從之文獻通考熙寧四年詔周嵩慶懿三陵柏子戶留七戶餘放歸農仍命歲時加修葺十年詔永興軍自漢以來諸陵下間地歲收州縣以其錢修葺陵墓宋史禮志元祐六年詔相州商王河亶甲冡載祀典先是乾德中定先代帝王配享儀下諸州以時薦祭牲用羊豕政和議禮局遂為定制文獻通考徽宗政和三年議禮局上五禮新儀仲春仲秋享歷代帝王女媧氏於晉州無配帝太昊氏於陳州以金提勾芒配帝神農氏於衡州以祝融配帝髙陽氏於澶州以玄冥配帝髙辛氏應天府無配帝陶唐氏濮州以卨配帝有虞氏於道州以庭堅配夏王大禹於越州以伯益配商王髙宗於陳州以甘盤傅説配商王成湯於慶成軍以伊尹配商王中宗於大名府以伊陟臣扈配周文王以鬻熊配武王以召康公配成王以周文公唐太叔配康王以畢公配秦始皇帝以李斯蒙恬王翦配漢髙皇帝以蕭何配太宗孝文皇帝以陳平周勃宋昌劉章配孝景皇帝以竇嬰申屠嘉配世宗孝武皇帝以公孫𢎞衛青霍去病金日磾配中宗孝宣皇帝以丙吉魏相霍光張安世配自周文王至漢宣帝並於永興軍後漢世祖光武皇帝於河南府以鄧禹吳漢賈復耿弇配魏文皇帝於河南府以賈詡王景興曹真辛毗配後周太祖於耀州以齊煬王憲蘇綽于謹盧辨配隋髙祖皇帝於鳳翔以牛里仁髙熲賀若弼配唐髙祖神堯皇帝於耀州以趙郡王孝恭殷開山劉政會淮安王神通配太宗文皇帝於永興軍以長孫無忌房喬杜如晦魏玄成李靖配明皇帝於華州以張説郭元振配肅宗宣孝皇帝於永興軍以苖晉卿裴冕配憲宗章武皇帝於華州以裴度杜佑李訴配宣宗獻文皇帝於耀州以夏侯孜白敏中馬植配後唐莊宗皇帝以郭崇韜李嗣昭符存審配明宗皇帝以霍彥威任圜配晉髙祖皇帝以桑維翰趙瑩配漢髙祖皇帝無配自後唐莊宗至漢髙祖皇帝並於河南府周嵩陵太祖皇帝慶陵世宗皇帝於鄭州建炎元年十一月丙寅郊赦歷代聖帝明王忠臣烈士有功于民載在祠典者命所在有司祭之自後凡赦皆如之宋史禮志紹興元年命祠禹于越州及祠越王勾踐以范蠡配文獻通考孝宗乾道四年加封楚州顯濟廟靈感王乃吳主孫皓祠汪太猷等使虜還言其靈感故加封仍命使人往來皆前期祭之淳熙四年靜江守臣張栻謂臣所領州有唐帝祠去城二十里而近其山曰堯山髙廣為一境之望祠雖不詳所始然有唐衡嶽道士彌明詩刻即知其來舊矣有虞帝祠去城五里而近其山曰虞山灕江滙其左曰皇澤之灣有大歷中磨崖碑載刺史李昌夔修祠事臣已肇修祠宇請著之祀典俾長吏檢校葺治從之宋史孝宗本紀淳熙十四年六月詔衡州葺炎帝陵廟文獻通考淳熙十四年衡州守臣劉清之奏史載炎帝陵在長沙茶陵今衡州茶陵縣是也陵廟在康樂鄉白鹿源距縣百里而祠宇廢祖宗時給近陵七戶守視禁其樵牧宜復建廟給陵戶禮官請如故事命守臣行之王圻續通考寧宗嘉定時廖德明重建舜廟于韶州黃岡嶺下又衡州刺史劉清之重建舜廟于衡陽淳祐八年二月荆湖帥臣陳韡奏國家以火德王于火德之祀合加欽崇炎帝陵在衡州茶陵縣廟久弗治乞相度興修以稱崇春之意從之金史禮志諸前代帝王三年一祭于仲春之月祭伏羲于陳州神農于亳州軒轅于坊州少昊于兖州顓頊于開州髙辛于歸德府陶唐于平陽府虞舜夏禹成湯于河中府周文王武王于京兆府泰和三年尚書省奏太常寺言開元禮祭帝嚳堯舜禹湯文武漢祖祝版請御署開寶禮羲軒顓頊帝嚳陶唐女媧成湯文武請御署自漢髙祖以下二十七帝不署平章政事鎰左丞匡太常博士溫德亨天興言方嶽之神各有所主有國所賴請御署固宜至於前古帝王寥落杳茫列於中祀亦已厚矣不須御署參知政事即康及鉉以為三皇五帝禹湯文武皆垂世立教之君唐宋致祭皆御署而今降祝版不署恐于禮未盡不若止從外路祭社稷及釋奠文宣王例不降祝版而令學士院定撰祝文頒各處為常制敕命依期降祝版而不請署章宗本紀泰和四年二月庚戌始祭三皇五帝四王三月詔定前代帝王合致祭者尚書省奏三皇五帝四王已行三年一祭之禮若夏太康殷太甲太戊武丁周成王康王宣王漢髙祖文景武宣光武明帝章帝唐髙祖文皇一十七君致祭為宜從之元史祭祀志自古帝王而下祭器不同籩豆簠簋儀非酌奠者有司便服行禮三上香奠酒而已凡有司致祭先代聖君名臣皆有牲無樂世祖本紀中統三年夏四月辛卯修河中禹廟賜名建極宫四年六月建帝堯廟于平陽仍賜田五十頃至元元年秋七月丁酉龍門禹廟成命侍臣阿哈托音代祀祭祀志堯帝廟在平陽舜帝廟河東山東濟南歷山濮州湖南道州皆有之禹廟在河中龍門至元元年七月龍門禹廟成命侍臣持香致敬有祝文世祖本紀至元五年九月建堯廟祭祀志至元十二年二月立伏羲女媧舜湯等廟于河中解州洪洞趙城十五年四月修會川縣盤古皇祠祀之二十四年閏二月敕春秋二仲丙日祀帝堯廟致和元年禮部移太常送博士議舜禹之廟合依堯祠故事每歲春秋仲月上旬卜日有司蠲潔致祭官給祭物文宗本紀至順元年三月命彰德路歲祭羑里周文王祠祭祀志至順元年三月從太常奉禮郎薛元德言彰德路湯陰縣北故羑里城周文王祠命有司奉祀如故事元歐陽元禹王廟記略在昔唐虞之世洪水橫流民無底居而天下幾不國矣大禹出而治之然後九州以平五行以順而民生衣食于彞倫攸敘之中逮於今幾四千年矣所謂盛德當祀宜與天地相為無窮也安邑夏后氏之故都邑之人尤重祀禹後魏分其東為夏縣邑之故墟存焉上有大禹廟四楹創始歲月莫有記焉且隘陋弗稱歲久將傾泰定甲子初靜海縣逹嚕噶齊瑞著致仕家居爰咨于衆合謀新之廟成有日而瑞著卒遂中寢邑士劉思義出已資以竟其功於故殿址廣植八楹殿之北復作四楹以塗山后配焉左右翼以邃廡嚴侐宏敞信足以萃人心祀盛德矣聞龍門之水噴薄激越聲如萬雷意疏鑿之初其功殆與神明侔也歷代廟祀固宜在焉然安邑山川形勢則大行王屋箕山三門在其東龍門壺口在其西其陽則雷首汾陰其陰則平陽霍嶽也邑大夫士庶歲時則具牲牷舉粢盛潔酒醴登于廟而左右瞻顧其隨山刋木跋履險阻舟車橇梮之載疏鑿排決之勞膚肢胼胝過其門而不入者可想像而見也傳曰見河洛而思禹功况其故都實治水之功所在而朝覲謳歌歸于吾君之子之地其感人思深矣是尤宜為廟食之所在也禮志三皇廟祭祀禮樂至正九年御史臺以江西湖東道肅政亷訪使文殊諾爾所言三皇開天立極功被萬世京師每歲春秋祀事命太醫官主祭揆禮未稱請如國子學宣聖廟春秋釋奠上遣中書省臣代祀一切儀禮倣其制中書付禮部集禮官議之是年十月二十四日平章政事台哈布哈鼎珠等以聞制曰可於是命太常定儀式工部範祭器浙江行省製雅樂器復命太常博士定樂曲名翰林國史院撰樂章十有六曲明年祭器樂器俱備以醫籍百四十有八戶充廟戶禮樂生御藥院大使盧亨素習音律受命教樂工四十有二人各執其技乃季秋九月九日蕆事宣徽供禮饌光祿勳共內醖太府共金帛廣源庫共薌炬大興府尹共犧牲制幣粢盛殽核中書奏擬三獻官以次定諸執事並以清望充前一日內降御香三獻官以下公服備大樂儀仗迎香至開天殿庋置退習明日祭儀習畢就廟齋宿京朝文武百司與祭官如之各以禮助祭翰林詞臣具祝文曰皇帝敬遣某官某致祭樂章降神奏咸成之曲黃鍾宫三成於皇三聖神化無方繼天立極垂憲百王聿崇明祀率由舊章靈兮來下休有烈光降神奏賔成之曲大呂角二成帝德在人日用不知神之在天矧可度思辰良日吉蕆事有儀感之至誠尚右享之降神奏顧成之曲太簇徴二成大道之行肇自古先功烈所加何千萬年是尊是奉執事孔虔神哉沛兮泠風馺然降神奏臨成之曲應鍾羽二成雅奏告成神斯降格妥安有位清廟奕奕肹蠁潛通豐融烜赫我其承之百世無斁初獻盥洗奏蠲成之曲姑洗宫靈斿戾止式燕以寧吉蠲致享惟寅惟清挹彼注兹沃盥而升有孚顒若交于神明初獻升殿奏恭成之曲南呂宮齋明盛服恪恭命祀洋洋在上匪遠具邇左右周旋陟降庭止式禮莫愆用介多祉奠幣奏祗成之曲南呂宮駿奔在列品物咸備禮嚴載見式陳量幣惟兹篚實肅將忱意靈兮安留成我熙事初獻降殿與升殿同捧爼奏囗成之曲姑洗宮我祀如何有牲在滌既全且潔為爼孔碩以將以享其儀不忒神其迪嘗純嘏是錫初獻盥洗與前同初獻升殿與前同太皥宓犧氏位酌獻奏囗成之曲南呂宮五德之音巍巍聖神八卦有作誕開我人物無能稱玄酒在尊歆監在兹惟德是親炎帝神農氏位酌獻奏囗成之曲南呂宮未耜之利人賴以生鼓腹含哺帝力難名欲報之德黍稷非馨眷言顧之享於克誠黃帝有熊氏位酌獻奏囗成之曲南呂宮為衣為裳法乾效坤三辰順序萬國來賔典祀有常多儀具陳純精鬯逹匪藉彌文配位酌獻奏囗成之曲南呂宮三聖儼臨孰侑其食惟爾有神同功合德丕擁靈休留娛嘉席歷世昭配永永無極初獻降殿與前同亞獻奏囗成之曲終獻同姑洗宮緩節安歌載升二觴禮成三終申薦令芳凡百有職罔敢怠遑神具醉止欣欣樂康徹豆奏囗成之曲南呂宮籩豆有踐殷薦亶時禮文疏洽廢徹不遲愼終如始進退無違神其祚我綏以繁釐送神奏囗成之曲黃鍾宮夜如何其明星煌煌靈逝弗留飈舉雲翔瞻望靡及德音不忘庶回景貺發為禎祥望瘞奏囗成之曲姑洗宮工祝致告禮備樂終加牲兼幣訖薶愈恭精神斯罄惠澤無窮儲休錫美萬福來崇蕙田案元祀三皇已歸入先醫門兹以醫官主祭未稱請如釋奠儀且樂章多歌其盛德大功不及醫藥事是仍不以先醫祀之也故附於此明史太祖本紀洪武三年十二月庚午遣使祭歷代帝王陵寢並加修葺禮志洪武三年遣使訪先代陵寢仍命各行省具圖以進凡七十有九禮官考其功德昭著者曰伏羲神農黃帝少昊顓頊唐堯虞舜夏禹商湯中宗髙宗周文王武王成王康王漢髙祖文帝景帝武帝宣帝光武明帝章帝後魏文帝隋髙祖唐髙祖太宗憲宗宣宗周世宗宋太祖太宗真宗仁宗孝宗理宗凡三十有六各製衮冕函香幣遣祕書監丞陶誼等往修祀禮親製祝文遣之每陵以白金二十五兩具祭物陵寢發者掩之壞者完之廟敝者葺之無廟者設壇以祭仍令有司禁樵採歲時祭祀牲用太牢洪武四年禮部定議合祀帝王三十五在河南者十陳祀伏羲商髙宗孟津祀漢光武洛陽祀漢明帝章帝鄭祀周世宗鞏祀宋太祖太宗真宗仁宗在山西者一滎河祀商湯在山東者二東平祀唐堯曲阜祀少昊在北平者三內黃祀商中宗滑祀顓頊髙辛在湖廣者二酃祀神農寧逺祀虞舜在浙江者二會稽祀夏禹宋孝宗在陜西者十五中部祀黃帝咸陽祀周文王武王成王康王宣王漢髙帝景帝咸寧祀漢文帝興平祀漢武帝長安祀漢宣帝三原祀唐髙祖醴泉祀唐太宗蒲城祀唐憲宗涇陽祀唐宣宗歲祭用仲春仲秋朔於是遣使詣各陵致祭陵置一碑刋祭期及牲帛之數俾所在有司守之已而命有司歲時修葺設陵戶二人守視又每三年出祝文香帛傳制遣太常寺樂舞生齎往所在命有司致祭其所祀者視前去周宣王漢明帝章帝而增祀媧皇於趙城後魏文帝於富平元世祖于順天及宋理宗於會稽凡三十六帝後又增祀隋髙祖于扶風而理宗仍罷祀又命帝王陵廟所在官司以春秋仲月上旬擇日致祭洪武四年帝以天下郡邑通祀三皇為瀆禮臣議唐元宗嘗立三皇五帝廟於京師至元成宗時乃立三皇五帝廟於府州縣春秋通祀而以醫藥主之甚非禮也帝曰三皇繼天立極開萬世教化之原汨於藥師可乎命天下郡縣毋得褻祀太祖本紀洪武六年詔祀三皇及歷代帝王禮志洪武六年帝以五帝三王及漢唐宋創業之君俱宜於京師立廟致祭遂建歷代帝王廟於欽天山之陽倣太廟同堂異室之制為正殿五室中一室三皇東一室五帝西一室夏禹商湯周文王又東一室周武王漢光武唐太宗又西一室漢髙祖唐髙祖宋太祖元世祖每歲春秋仲月上旬甲日致祭已而以周文王終守臣服唐髙祖由太宗得天下遂寢其祀增祀隋髙祖七年令帝王廟皆塑衮冕坐像惟伏羲神農未有衣裳之制不必加冕服八月帝躬祀於新廟已而罷隋髙祖之祀蕙田案此京師總立帝王廟之始太祖本紀洪武七年八月甲午朔祀歷代帝王廟明會典洪武七年春塑帝王衮冕坐像惟羲農不衮冕是秋上親臨祭焉凡五室十七帝王圻續通考洪武初命繪諸帝像于廟太祖臨其祭行禮畢復至漢髙祖之神位笑謂曰劉君今日廟中諸君當時皆有所憑藉以得天下惟我與汝不假尺土一民提三尺劍位至天子尤為難事可多飲三杯後遂為制每帝王前皆一爵惟漢髙帝以三爵獻又設歷代帝王祭一壇每歲春從祀于大祀壇內秋祭於本廟明史太祖本紀九年八月己酉遣官省歷代帝王陵寢禁芻牧置守陵戶王圻續通考先是上閲宋史見宋太祖詔修歷代帝王陵寢嘆曰此美事也遣翰林編修蔡元侍儀舍人李震亨陳敏于謙等四方求之仍命各行省之臣同詣所在審視若有廟祀并具圖以聞于是陳州有伏羲氏商髙宗孟津漢光武鄭州周世宗鞏宋太祖太宗真宗仁宗酃神農氏寧逺舜帝延安軒轅氏咸陽周文王武王成王康王漢髙祖景帝咸寧漢文帝興平漢武帝長安漢宣帝富平後魏文帝扶風隋髙祖三原唐髙祖醴泉唐太宗蒲城唐憲宗涇陽唐宣宗滑縣髙陽氏髙辛氏內黃商中宗順天元世祖東平堯帝曲阜少昊氏趙城媧皇氏滎河商湯王會稽夏禹王宋孝宗凡三十六陵是年遣官行視帝王陵寢遂禁樵牧設守陵戶陵二人三歲一傳制遣道士奉香詣諸陵令有司致祭凡遇皇帝即位俱遣官祭告禮志洪武二十一年令每歲郊祀附祭歷代帝王於大祀殿仍以歲八月中旬擇日遣官祭於本廟其春祭停之又定每三年遣祭各陵之歲則停廟祭是年詔以歷代名臣從祀禮官李原名奏擬三十六人以進帝以宋趙普負太祖不忠不可從祀元臣四傑木華黎為首不可祀孫而去其祖可祀木華黎而罷安童既祀伯顔則阿术不必祀漢陳平馮異宋潘美皆善始終可祀於是定風后力牧臯陶夔龍伯夷伯益伊尹傅説周公旦召公奭太公望召虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房元齡杜如晦李靖郭子儀李晟曹彬潘美韓世忠嶽飛張浚木華黎博爾忽博爾术赤老溫伯顔凡三十七人從祀於東西廡為壇四初太公望有武成王廟嘗遣官致祭如釋奠儀至是罷廟祭去王號邱氏濬曰祭法言聖王制祭祀之禮其常典所當祀者有五焉其下文復歷敘自古君臣有道功庸者以實之凡十有四人為君者八人為臣者六人後世廟祀前代帝王而以其功臣從享者其原蓋出于此本朝洪武初建帝王廟于南京雞鳴山之陽以祀三皇五帝三王漢髙祖光武唐太宗宋太祖元世祖所祀者止及一統之世創業之君其與前代泛及無統者異矣又詔以歷代名臣從祀帝王廟凡三十有七人是皆前代之君臣同德始終一心者然其中或有不祀其君而祀其臣者蓋惟取其純德巨功位列而通祀之非若前代隨其君而各以其臣配其食也臣愚竊以為昔者建都南京歷代帝王廟因在于彼今郊廟既立於此則帝王廟亦當從之而北焉議禮之事非臣下所當及者謹述所見如此明會典洪武二十六年定各處聖帝明王載在祀典者其廟宇陵寢皆要備知其處每年定奪日期或差官往祭或令有司自祭禮部悉理之是年定遣祭儀一齋戒前一日太常官宿于本司次日具本奏致齋二日傳制遣官行禮一傳制儀見儀制同一省牲牛五羊五豕六鹿一兔八凡正祭前一日獻官承制畢詣本壇省牲一陳設五室十六位每室犢一羊一豕一每位登一鉶二籩豆各十簠簋各二帛一白色禮神制帛共設酒尊三爵四十八篚五于中室東南西向祝文案一于西東廡第一壇風后臯陶龍伯益傅説召公奭召穆公虎張良曹參羊一豕一鉶九籩豆各四簠簋各一帛九白色禮神制帛酒盞二十七饌盤一篚一第二壇周勃馮異房元齡李靖李晟潘美嶽飛木華黎博爾忽伯顔羊一豕一鉶十籩豆各四簠簋各一帛一酒盞三十饌盤一篚一西廡第一壇力牧蘷伯夷伊尹周公旦太公望方叔蕭何陳平陳設與東廡第一壇同第二壇鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚博爾术赤老溫陳設與東廡第二壇同一正祭典儀唱樂舞生就位執事官各司其事贊引引獻官至盥洗所贊搢笏出笏引至拜位贊就位典儀唱迎神協律郎舉麾奏樂樂止贊四拜陪祭官同典儀唱奠帛行初獻禮奏樂執事官各捧帛爵進于神位前贊引贊詣三皇神位前搢笏執事官以帛進于獻官奠訖執事官以爵進于獻官贊獻爵凡三出笏詣五帝神位前儀同前爵五詣三王神位前爵三詣漢髙祖光武唐太宗皇帝神位前爵三詣宋太祖元世祖神位前爵二出笏詣讀祝所跪讀祝讀祝官取祝跪于獻官左讀畢進于神位前贊俯伏興平身復位樂止典儀唱行亞獻禮奏樂執事官各以爵獻於神位前樂止典儀唱行終獻禮儀同亞獻典儀唱飲福受胙贊詣飲福位跪搢笏執事官以爵進飲福酒執事官以胙進受胙出笏俯伏興平身復位贊兩拜典儀唱徹饌奏樂執事官各於神位前徹饌樂止典儀唱送神奏樂贊四拜平身樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位樂止贊禮畢一祝文維洪武年歲次月朔日皇帝謹遣具官某致祭于太昊伏羲氏炎帝神農氏黃帝軒轅氏帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢髙祖皇帝漢光武皇帝唐太宗皇帝宋太祖皇帝元世祖皇帝曰昔者奉天明命相繼為君代天理物撫育黔黎彞倫攸敘井井繩繩至今承之生民多福思不忘而報特祀以春秋惟帝以英靈來歆來格尚享明會典祀歷代帝王樂章迎神仰瞻兮聖容想鸞輿兮景從降雲衢兮後先來俯鑒兮微衷荷聖臨兮蒼生有崇眷諸帝兮是臨豫頓首兮幸蒙奠帛秉微誠兮動聖躬來列坐兮殿庭豫今願兮效勤捧禮帛兮列酒尊鑒豫情兮欣享方旋駕兮雲程初獻酒行兮爵盈喜氣兮雍雍重荷蒙兮再瞻再崇君臣欣兮躍從願睹穆穆兮聖容亞獻酒斟兮禮明諸帝熙和兮悅情百職奔走兮滿庭陳籩豆兮數重亞獻兮願成終獻獻酒兮至終早整雲鸞兮將還宫豫心眷戀兮神聖欲攀留兮無蹤躡雲衢兮緩行得遙瞻兮逹九重徹饌納肴羞兮領陳蒸民樂兮幸生將何以兮崇報惟歲時兮載瞻載迎送神幡繚繞兮導來蹤鸞輿冉冉兮歸天宫五雲擁兮祥風從民歌聖祐兮樂年豐望燎神機不測兮造化功珍羞禮帛兮薦火中望瘞旋庭兮稽首願神鑒兮寸衷明史禮志永樂遷都帝王廟遣南京太常寺官行禮明會典凡前代陵寢天順八年令各處帝王陵寢被人毁發者所在有司即時修理如舊仍令附近人民一丁看護免其差役明史禮志正德十一年立伏羲氏廟於陳州陳州古成紀地從巡按御史馮時奏也嘉靖九年罷歷代帝王南郊從祀令建歷代帝王廟于都城西歲以仲春秋致祭後并罷南京廟祭十年春二月廟未成躬祭歷代帝王於文華殿凡五壇丹陛東西名臣四壇禮部尚書李時言舊儀有賜福胙之文賜者自上而下之義惟郊廟社稷宜用歷代帝王止宜云答詔可十一年夏廟成名曰景德崇聖之殿殿五室東西兩廡殿後祭器庫前為景德門門外神庫神厨宰牲亭鐘樓街東西二坊曰景德街八月壬辰親祭帝由中門入迎神受福胙送神各兩拜嗣後歲遣大臣一員行禮四員分獻凡子午卯酉祭於陵寢之歲則停秋祭王圻續通考嘉靖九年庚寅右中允廖道南奏今之郊祀列歷代帝王一壇於五嶽四瀆之間是躋人鬼於天神地祗南畿歷代帝王廟每歲致祭宜歸本廟下禮部議復奏云迎奉明旨天地四壇祈報之祭俱不從祀今乃仍歸本廟為當再行南京太常寺加添春祭庶不失我祖宗敬禮前代帝王之意從之仍行南京太廟加春祭一壇已而上命建廟于北都致祭上謂禮臣曰古先帝王春祭南京不必增待廟成春秋俱在京行禮禮部臣奏云營建廟宇非旬月可完若候廟貌完備誠恐緩不及事有誤春祭合無嘉靖十年暫於南京本廟權添春祭一祭有旨來春暫於文華殿設壇朕親一舉蕙田案世宗罷帝王郊壇從祀最得禮意明會典十一年定親祭儀先期太常寺預設牲醴香帛樂舞等如儀錦衣衛設隨朝駕設上拜位於殿中設御幄于景德門之左是日早免朝上服常服御奉天門太常寺卿跪奏請皇上詣王廟祭歷代帝王上乘輿由長安右門出至廟門由中門入至幄次降輿具祭服出導引官導上由中門中道至拜位典儀唱樂舞生就位執事官各司其事內贊奏就位上就拜位典儀唱迎神樂作樂止內贊奏搢圭奏上香上三上香訖奏出圭復位內贊奏兩拜興平身傳贊陪祀官同典儀唱奠帛行初獻禮樂作內贊奏詣神位前執事官各捧帛爵跪進于各神位前樂暫止內贊讀祝奏跪傳贊陪祀官同讀祀官取祝讀訖樂作內贊奏俯伏興平身傳贊陪祀官同樂止典儀唱行亞獻禮樂作儀同初獻惟不讀祝樂止典儀唱行終獻禮儀同亞獻樂止太常寺卿進立於壇東西向唱答福胙內贊奏詣飲福位奏搢圭奏跪光祿寺卿以福酒跪進于上右內贊奏飲福酒上飲訖光祿寺卿以福胙跪進于上右內贊奏受胙上受訖奏出圭俯伏興平身傳贊陪祭官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位樂作內贊奏禮畢樂止導引官導上入御幄易祭服升輦還宫王圻續通考嘉靖十三年甲午秋七月朔例遣道士致祭帝王陵寢夏言復奏云本廟秋祭合宜停免春祭既無從祀仍當遣舉行從之遂著為令嘉靖十八年御史謝少南因上南巡言慶都為帝堯肇封之地堯母乃帝嚳元妃陵墓俱存乞表揚以𢎞逹孝以光巡幸上曰堯父母異陵可見合葬非古祠寢令有司修之少南建白可嘉改授翰林檢討兼司直明史禮志嘉靖二十四年以禮科陳棐言罷元世祖陵廟之祀及從祀木華黎等復遷唐太宗與宋太祖同室凡十五帝從祀名臣三十二人明會典嘉靖間更定遣官祝文曰仰惟諸帝昔皆奉天撫世創治安民皇祖景慕不忘春秋致祭著在令甲朕特遣建殿宇恭修恆祀時維仲春秋謹遣輔臣以牲帛庶品用享列聖豫惟沖昧敬體皇祖追報之虔惟諸帝鑒臨來格于斯庶副豫誠之至尚饗右歷代古帝王祀典五禮通考卷一百十六
