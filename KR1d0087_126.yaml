body:
  text: 五禮通考卷一百十六刑部尚書秦蕙田撰吉禮一百十六祀先代帝王禮記祭法夫聖王之制祭祀也法施於民則祀之疏若神農及后土帝嚳與堯及黃帝顓頊與契之屬是也以死勤事則祀之疏若舜及鯀冥是也以勞定國則祀之疏若禹是也能禦大災則祀之能捍大患則祀之疏若湯及文武也帝嚳能序星辰以著衆注著衆謂使民興事知休作之期也休疏嚳能紀星辰序時候以明著使民作有期不失時節故祀之也堯能賞均刑法以義終注賞賞善謂禪舜封禹稷等也能刑謂去四凶義終謂既禪二十八載乃死也疏五刑有宅是能刑有法也舜勤衆事而野死注野死謂征有苗死于蒼梧也疏舜征有苖仍巡守陟方而死蒼梧之野鯀鄣洪水而殛死注殛死謂不能成其功也疏鯀亦是有微功于人故得祀之又世本云作城郭是有功也鄭答趙商云鯀非誅死故居東裔至死不得反于朝禹乃其子也以有聖功故堯興之若以為殺人父用其子而舜禹何以忍乎禹能修鯀之功黃帝正名百物以明民共財顓頊能修之疏正名百物者雖有百物而未有名黃帝為物作名正名其體也以明民者謂垂衣裳使貴賤分明得其所也共財者謂山澤不鄣教民取百物以自贍也顓頊能修黃帝之法契為司徒而民成注民成謂知五教之禮也冥勤其官而水死注冥契六世之孫也其官玄冥水官也昌疏案世本契生昭明昭明生相土相土生昌若若生遭圉遭圉生根國根國生冥是契六世孫也湯以寬治民而除其虐文王以文治武王以武功去民之災注虐災謂桀紂也此皆有功烈于民者也非此族也不在祀典疏若非上等無益于民者悉不得與于祭祀之典也王制天子諸侯祭因國之在其地而無主後者注謂所因之國先王先公有功德宜享世祀今絶無後為之祭主者亦疏若天子因先公之後亦祭先公若諸侯因先王之後祭先王葉氏夢得曰亡國絶世而無主後者雖已廢而不可舉然先王興滅繼絶而因國亦祭者所以見其仁也胡氏銓曰因國謂所都所封之內固古先聖哲所居之地若晏子云爽鳩氏始居此地而後季崱因之有逢伯陵因之蒲始氏因之而後太公因之之因也右經傳古帝王祀典史記封禪書秦并天下令祠官所常奉於湖有周天子祠索隱曰地理志湖縣屬京兆有周天子祠二所在始皇本紀三十七年七月癸丑始皇出遊十一月行至雲夢望祀虞舜于九疑山上會稽祭大禹漢書髙祖本紀髙祖立為沛公祀黃帝祭蚩尤于沛庭而釁鼓應氏劭曰黃帝戰于版泉以定天下蚩尤亦古天子好五兵故祠祭之求福祥也漢舊儀髙祖五年修復周家舊祠祠后稷于東南常以八月祭以太牢舞者七十二人冠者五六三十人童子六七四十二人為民祈農報功漢書髙祖本紀十二年十二月詔曰秦皇帝楚隱王魏安釐王齊愍王趙悼襄王皆絶亡後其與秦始皇帝守冢二十家楚魏齊各十家趙及魏公子亡忌各五家令視其冢復亡與他事蕙田案此為帝王陵置守冢之始郊祀志天下已定立蚩尤之祠于長安南山巫祠南山秦中秦中者二世皇帝也各有時日人有言古天子常以春解祠祠黃帝用一梟破鏡張晏曰黃帝五帝之首也歲之始也梟惡逆之鳥方士虛誕云以歲始祓除不祥令神仙之帝食惡逆之物使天下為逆者破滅訖竟無有遺育也孟康曰梟鳥名食母破鏡獸名食父黃帝欲絶其類使百吏祠皆用之如淳曰漢使東郡送梟五月五日作梟羮以賜百官以其惡鳥故食之也師古曰解祠者謂祠祭以解罪求福武帝本紀元封元年冬十月祠黃帝于橋山郊祀志其春既滅南越其來年北巡朔方還祭黃帝冢橋山釋兵涼如上曰吾聞黃帝不死有冢何也或對曰黃帝以仙上天羣臣葬其衣冠武帝本紀元封五年冬十月行南巡狩至于盛唐望祀虞舜于九嶷郊祀志宣帝立黃帝祠于膚施後漢書章帝本紀元和二年二月東巡狩使使者祀唐堯于成陽靈臺郭緣生述征記曰成陽縣東南有堯母慶都臺上有祠廟堯母陵俗亦名靈臺大母安帝本紀延光二年二月東巡狩庚寅遣使者祀唐堯成陽三國魏志文帝本紀黃初二年正月甲戌校獵至原陵遣使者以太牢祠漢世祖宋書髙祖本紀永初元年閏八月壬午朔詔曰晉世帝后及藩王諸陵守衛宜便置格宋顔延之為湘州祭虞舜文惟哲化神繼天作聖藏器漁陶致身愛敬是以二妃嬪德九子觀命在麓不迷御衡以正唐歷既終虞道乃光咨堯授禹素爼采堂百齡厭世萬里陟方敬詢故老欽咨聖君職奉西湘虔屬南雲神之聽之匪酒伊葷南齊書明帝本紀建武二年十二月丁酉詔曰舊國都邑望之悵然况乃自經南面負扆宸居或功濟當時德覃一世而塋壠欑穢封樹不修豈直嗟深牧豎悲甚信陵而已哉昔中京淪覆鼎玉東遷晉元締構之始簡文遺咏在民而松門夷替埏路榛蕪雖年代殊往撫事興懷晉帝諸陵悉加修理并增守衛梁王僧孺祭禹廟文惟帝稟圖上昊貽則下民五聲窮聽四乘兼往輕璧惜景既捨冠履愛人忘我不顧胼胝下車以泣事深罪已憑舟靡懼義存拯物盛業方來遺神如在愛被昆蟲理有好生之德事安菲素固無厚味之求是用黍稷非馨蘋蘩以薦克誠斯享憑心可答北魏書太祖本紀天興三年五月己巳車駕東巡遂幸涿鹿遣使者以太牢祀帝堯帝舜廟太宗本紀神瑞二年夏四月己卯車駕北巡六月壬申幸涿鹿登橋山觀溫泉使使者以太牢祠黃帝廟至廣寧登歷山祭舜廟泰常七年九月辛酉幸橋山遣使者祠黃帝唐堯廟世祖本紀神麚元年八月東幸廣寧臨觀溫泉以太牢祭黃帝堯舜廟禮志文成帝和平元年正月帝東巡歷橋山祀黃帝先是長安牧守常有事於周文武廟延興四年坎地埋牲廟玉發見四月詔東陽王丕祭文武二廟以廟玉露見若即而埋之或恐愚民將為盜竊敕近司收之府藏髙祖本紀太和十六年二月丁酉詔祀唐堯于平陽虞舜于廣寧夏禹於安邑周文于洛陽禮志太和十六年二月丁酉詔曰崇聖祀德遠代之通典秩缺三字中古之近規故三五至仁唯德配享夏殷私己稍用其姓且法施於民祀有明典立功垂惠祭有恆式斯乃異代同途奕世共軌今遠遵明令憲章舊則比于祀令己為決之其孟春應祀者頃以事殷遂及今日可令仍以仲月享祀焉凡在祀令者其數有五帝堯樹則天之功興巍巍之治可祀於平陽虞舜播太平之風致無為之化可祀于廣寧夏禹禦洪水之災建天下之利可祀于安邑周文公制禮作樂垂範萬葉可祀于洛陽其宣尼之廟已于中省當别敕有司享薦之禮自文公已上可令當界牧守各隨所近攝行祀事皆用清酌尹祭也髙祖本紀太和十九年夏四月癸丑幸小沛遣使以太牢祀漢髙祖二十年五月丙戌初營方澤于河陰遣使者以太牢祭漢光武及明章三帝陵又詔漢魏晉諸帝陵各禁方百步不得樵蘇踐踏二十一年三月乙未車駕南巡丙辰次平陽遣使者以太牢祭唐堯夏四月庚申幸龍門遣使者以太牢祭夏禹癸亥行幸蒲坂遣使者以太牢祭虞舜戊辰詔修堯舜夏禹廟丙戌遣使者以太牢祀漢帝諸陵五月壬辰遣使者以太牢祭周文王于豐祭武王于鎬隋書禮儀志禘祫之月并以其日使祀先代王公帝堯于平陽以契配帝舜于河東咎繇配夏禹於安邑伯益配殷湯于汾陰伊尹配文王武王于豐渭之郊周公召公配漢髙帝於長陵蕭何配各以一太牢而無樂配者饗于廟庭丘氏濬曰秦始皇南巡望祀舜于九嶷上會稽祭禹北魏文成東巡歷橋山祀黃帝然皆因所至而祀也未有常典魏孝文太和始詔祀堯舜禹及周公然惟用清酌尹祭而已至隋始定為常祀祀用太牢而唐因之蕙田案祀有配食亦始于隋制也隋書髙祖本紀開皇十四年冬閏十月甲寅詔曰齊梁陳往皆創業一方綿歷年代既宗祀廢絶祭奠無主興言矜念良以愴然莒國公蕭琮及髙仁英陳叔寶等宜令以時修其祭祀所須器物有司給之蕙田案仁人之言藹如此祭勝國之典也煬帝本紀大業二年十月庚寅詔曰前代帝王因時創業君民建國禮尊南面而歷運推移年世永久邱壟殘毁樵牧相趨塋兆堙蕪封樹莫辨興言淪滅有愴於懷自古已來帝王陵墓可給隨近十戶蠲其雜役以供守祀舊唐書髙祖本紀武德三年春正月幸蒲州命祀舜廟唐書髙祖本紀武德三年六月癸卯詔隋帝及其宗室柩在江都者為塋窆置陵廟以故宫人守之舊唐書太宗本紀貞觀四年九月壬午令自古明王聖帝墳墓無得芻牧春秋致祭十一年二月甲子幸洛陽宫命祭漢文帝十六年冬十一月丙辰狩于岐山辛酉使祭隋文帝陵禮儀志貞觀之禮無祭先代帝王之文顯慶二年六月禮部尚書許敬宗等奏曰請案禮記祭法云聖王之制祀也法施于人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之又堯舜禹湯文武有功烈于人及日月星辰人所瞻仰非此族也不在祀典凖此帝王合與日月同例常加祭享義在報功爰及隋代並遵斯典漢髙祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢祖典章法垂于後自隋以下亦在祀例伏惟大唐稽古垂化網羅前典惟此一禮咸秩未申今請聿遵故事三年一祭以仲春之月祭唐堯於平陽以契配祭虞舜于河東以咎繇配祭夏禹于安邑以伯益配祭殷湯于偃師以伊尹配祭周文王于酆以太公配祭武王于鎬以周公召公配祭漢髙祖于長陵以蕭何配册府元龜景龍三年十二月甲午幸新豐溫湯境內有自古帝王陵致祭褚無量傳開元五年帝幸東都無量上言昔虞舜之狩秩山川遍羣神漢孝景祀黃帝橋山孝武祀舜九疑髙祖過魏祭信陵君墓過趙封樂毅後孝章祠桓談冡願陛下所過名山大川邱陵墳衍古帝王賢臣在祀典者並詔致祭自古受命之君必興滅繼絶崇德報功故存人之國大于救人之災立人之後重于封人之墓願到東都收敘唐初逮今功臣世絶者雖在支庶咸得承襲帝納其言即詔無量祠堯平陽宋璟祠舜蒲坂蘇頲祠禹安邑所在刺史參獻開元十二年十一月庚午幸東都敕有司所經自古帝王陵精意致祭以酒脯時果用代牲牢開元禮有司享先代帝王前享五日諸享官各散齋三日于正寢致齋二日于其廟所如别儀無廟者祭于壇其壇制準州社壇其祭官以當州長官充無以次通取也諸享官致齋之日給酒食及明衣各習禮於齋所前享一日所管縣官清掃內外整拂神座無廟者享日未明縣官率其屬入詣壇東陛升設神座于壇上近北南向席以莞以後陳設行事依在廟之位設配座于神座東南西向席以莞又為瘞坎于廟後壬地方深取足容物贊禮者設初獻位于東階東南亞獻終獻于初獻之南少退俱西向北上設掌事者位于終獻東南重行西面以北為上設贊唱者于終獻西南西向北上設望瘞位于廟堂東北西向又設贊唱者位于瘞塪東北南向東上設享官以下位于南門之外道東重行西面以北為上無廟者即設享官以下位于壇壝門之外道南重行北面西上祭器之數每座樽六籩十豆十簠二簋二鉶三爼三縣官率其屬升設樽于廟堂上前楹間室戶之外北向正座之樽在西配座之樽在東樽皆加勺冪有坫以置爵設幣篚于樽所設洗于東階東南北向東西當東霤南北以堂深罍水在洗東篚在洗西南肆實爵三巾二在篚加勺冪執樽罍洗篚者各依于樽罍洗篚之後享日未明烹牲于厨夙興掌饌者實祭器牲體牛羊豕皆載右胖前腳三節節一段皆載之後腳三節節一段去上節載下二節又取正脊脡脊正脅代脅各二骨以並餘皆不設簋實稷黍簠實菽粱籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醓醢菁葅鹿醢芹葅兔醢笋葅魚醢脾菜葅豚胉若土無者各以其