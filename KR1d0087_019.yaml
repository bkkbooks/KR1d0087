body:
  text: 五禮通考卷九刑部尚書秦蕙田撰吉禮九圜丘祀天唐書髙祖本紀武德四年十一月甲申有事于南郊蕙田案此郊舊書不載疑刻本之脫舊唐書禮儀志武德初定令每歲冬至祀昊天上帝於圜丘以景帝配其壇在京城明德門外道東二里壇制四成各髙八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈每祀則昊天上帝及配帝設位于平座藉用槀秸器用陶匏五方上帝日月内官中官外官及衆星並皆從祀其五方帝及日月七座在壇之第二等内官五星以下五十五座在壇之第三等二十八宿以下百三十五座在壇之第四等外官百一十二座在壇下外壝之内衆星三百六十座在外壝之外其牲上帝及配帝用蒼犢二五方帝及日月用方色犢各一内官以下加羊豕各九唐書禮樂志圜丘壇北辰北斗天一太一紫微五帝座並差在行位前餘内官諸座及五星十二辰河漢四十九座在第二等十有二陛之間中官市垣帝座七公日星帝座大角攝提太微五帝太子明堂軒轅三台五車諸王月星織女建星天紀十七座及二十八宿差在前列其餘中官一百四十二座皆在第三等十二陛之間外官一百五在内壝之内衆星三百六十在内壝之外五星三辰以象尊實醍齊七宿以壺尊實沈齊皆二五星十二辰二十八宿籩豆各二簠簋俎各一四時祭風師雨師靈星司中司命司人司禄籩八豆八簋一簠一俎一牲皆少牢席皆以筦蕙田案冬至祀圜丘之禮至武德乃得其正開國規模邈然逺矣唐書太宗本紀貞觀二年十一月辛酉有事于南郊裴寂傳貞觀二年太宗祠南郊命寂與長孫無忌同昇金輅寂辭讓太宗曰以公有佐命之勲無忌亦宣力於朕同載參乘非公而誰遂同乘而歸劉黒闥傳初秦王建天策府其弧矢制倍于常後餘大弓一長矢五藏之武庫每郊丘重禮必陳于儀物之首以識武功云五年十一月丙子有事于南郊禮樂志自周衰禮樂壊於戰國而廢絶於秦漢興六經在者皆錯亂散亡雜偽而諸儒方共補緝以意解詁未得其真而讖緯之書出以亂經矣自鄭𤣥之徒號稱大儒皆主其說學者由此牽惑沒溺而時君不能斷決以為有其舉之莫可廢也由是郊丘明堂之論至于紛然而莫知所止禮曰以禋祀祀昊天上帝此天也𤣥以為天皇大帝者北辰耀魄寶也又曰兆五帝於四郊此五行精氣之神也𤣥以為青帝靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黑帝汁光紀者五天也由是有六天之說後世莫能廢焉唐初貞觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝靈威仰於南郊以祈穀而孟夏雩于南郊季秋大享于明堂皆祀五天帝其配神之主貞觀初圜丘明堂北郊以髙祖配而𤣥帝唯配感帝蕙田案郊丘之論自漢以後紛然矣此志叙述原委簡括詳明至是人始知六天之謬而貞觀禮所定冬至圜丘孟春祈穀孟夏雩祀季秋明堂卓然與經典合儒者之效遂開有唐一代制作厥後開元禮成而五典燦然明備矣後代禮樂之得其正實賴貞觀禮為之權輿太宗之治所以煥然不同也然南郊祀靈威仰圜丘雩祀明堂皆祀五天帝尚未能革鄭氏信讖之流弊深哉舊唐書音樂志冬至祀昊天於圜丘樂章八首貞觀二年祖孝孫定雅樂貞觀六年禇亮虞世南魏徵等作此詞今行用降神用豫和上靈睠命兮膺會昌盛德殷薦叶辰良景福降兮聖德逺𤣥化穆兮天歴長皇帝行用太和穆穆我后道應千齡登三處大得一居貞禮惟崇德樂以和聲百神仰止天下文明登歌奠玉帛用肅和闓陽播氣甄耀垂明有赫圓宰深仁曲成日嚴蒼璧煙開紫營聿遵虔享式降鴻禎迎俎入用雍和欽惟大帝載仰皇穹始命田燭爰啟郊宮雲門駭聽雷鼓鳴空神其介祀景祚斯融酌獻飲福用夀和八音斯奏三獻畢陳寶祚惟永煇光日新送文舞出迎武舞入用舒和疊璧凝影皇壇路編珠流彩帝郊前已奏黄鐘歌大呂還符寶歴祚昌年武舞用凱安昔在炎運終中華亂無象鄷郊赤烏見邙山黑雲上大賚下周軍禁暴開殷網幽明何叶贊鼎祚齊天壤送神用豫和歌奏畢兮禮獻終六龍馭兮神將昇明德感兮非黍稷降福簡兮祚休徵又郊天樂章一首太樂舊有此辭名不詳所起送神用豫和蘋繁禮著黍稷誠微音盈鳳管彩駐龍旂洪歆式就介福攸歸送樂有闋靈馭遄飛唐書太宗本紀貞觀十四年冬十一月甲子朔日南至有事于圜丘十七年十一月己卯有事于南郊蕙田案此二郊新舊書並載馬氏通考以十七年為八月四日而脫去十四年但云一闕年月皆採輯之誤冊府元龜貞觀十七年十月甲寅詔曰朕聞上靈之應疾於影響茂祉之興積於年代朕嗣膺寶歴君臨區宇憑宗社之介福賴文武之同心時無風塵之警野有京坻之積厚地降祉貞石來翔營翠色而流光發素質而成字前紀厥功之德次陳卜年之永後述儲貳之美並名字昭然楷則相次曠代之所未聞故老之所未覩自天之祐豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡申奉天之志寧副臨下之心今年冬至有事南郊所司率由舊典十一月己卯有事於南郊太宗升壇皇太子從奠於時累日隂雪是旦猶雲霧晦冥及太宗升壇烟氛四散風景清朗文物昭映禮畢祝官讀謝天祝文曰嗣天子臣世民敢昭告于昊天上帝世民纂成鴻基君臨宇縣夙興旰食無忘于政道導德齊禮良愧于前聖爰有成命表貞瑞石文字昭然歴數惟永既旌髙廟之業又錫眇身之祚逮于皇太子某亦降禎符並具紀姓氏兼列名字仰瞻雲漢實銘大造俯惟寡薄彌增寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗慄之誠皇太子亦恭至泰壇䖍拜于蒼昊庶因眷祐之徳永膺無疆之休初十六年太宗遣刻受命元玉璽白玉為螭首其文云皇天景命有德者昌並神筆隸書然後鐫勒是日侍中負之以從唐書髙宗本紀永徽二年冬十一月辛酉有事于南郊禮樂志髙宗永徽二年以太宗配祀明堂而有司乃以髙祖配五天帝太宗配五人帝太尉長孫無忌等與禮官議以謂自三代以來歴漢魏晉宋無父子同配於明堂者祭法曰周人禘嚳而郊稷祖文王而宗武王鄭𤣥以祖宗合為一祭謂祭五帝五神于明堂以文武共配而王肅駁曰古者祖功宗德自是不毀之名非謂配食于明堂春秋傳曰禘郊祖宗報五者國之典祀也以此知祖宗非一祭于是以髙祖配于圜丘太宗配于明堂蕙田案自晉宋以後諸人議配帝唯此為的當駁鄭氏極是通典永徽二年太尉長孫無忌等奏議曰據祠令及新禮並用鄭𤣥六天之義圜丘祀昊天上帝南郊祀太微感帝明堂祭太微五天帝臣等謹案鄭𤣥此義唯據緯書所說六天皆為星象而昊天上帝不屬穹蒼故注月令及周官皆謂圜丘所祭昊天上帝為北辰星曜魄寶又說孝經郊祀后稷以配天明堂嚴父配天皆為太微五帝考其所說舛謬特深按易云日月麗乎天百穀草木麗乎土又云在天成象在地成形足以明辰象非天草木非地毛詩傳云元氣昊大則稱昊天逺視蒼蒼則稱蒼天此則天以蒼昊為體不入星辰之例且天地各一是為兩儀天尚無二焉得有六是以王肅羣儒咸駁此義又檢太史圜丘圖昊天上帝座外別有北辰座與鄭義不同得太史令李淳風等狀稱昊天上帝圖位自在壇上北辰自在第二等與北斗並列為星官内座之首不同鄭𤣥據緯之說此乃羲和所掌觀象制圖推步有恒相緣不謬又案史記天官書等太微宮有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝亦如房星為天王之象豈是天乎周禮云兆五帝於四郊又云祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非穹昊之祭又孝經唯云郊祀后稷別無圜丘之文王肅等以為郊即圜丘圜丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭之說分為兩祭圜丘之外別有南郊違棄正經理深未允且檢吏部式唯有南郊陪位更不別載圜丘式文既遵王肅祀令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大於配天下文即云周公宗祀文王於明堂以配上帝則是明堂所祀正在配天而以為但祭星官反違明義詔從無忌等議存祀太微五帝于南郊廢鄭𤣥六天之義蕙田案五帝非天郊丘非二所議眞如撥雲霧也舊唐書志以此列顯慶二年上議之人亦作許敬宗等未知孰是然祁公去髙宗時較近今姑從杜禮部尚書許敬宗等又奏稱於新禮祭畢收取玉帛牲體置於柴上然後燔柴燔壇又在神壇之左臣等謹案祭祀之禮必先降神周人尚臭祭天則燔柴祭地則瘞血祭宗廟則焫蕭灌鬯皆貴氣臭用以降神禮經明白義釋甚詳燔柴在祭初禮無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮說晉太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊天用脇之九介太宰令奉牲脅太祝令奉珪瓚俱奠燔薪之上即晉代故事亦無祭末之文唯周魏以降妄為損益約告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆別蒼璧蒼犢之流柴之所用四珪騂犢之屬祝之所須故郊天之有四珪猶廟之有珪瓚是以周官典瑞文義相因並事畢收藏不在燔柴之例今新禮引同蒼璧不顧珪瓚遂亦俱燔義既有乖理難因襲詔從之蕙田案祭畢燔柴牲玉同燎非禮違經至是乃革舊唐書禮儀志敬宗等又議籩豆之數曰案今光禄式祭天地日月岳鎮海瀆先蠶等籩豆各四祭宗廟籩豆各十二祭社稷先農等籩豆各九祭風師雨師籩豆各二尋此式文事深乖謬社稷多於天地似不貴多風雨少於日月又不貴少且先農先蠶俱為中祭或六或四理不可通又先農之神尊於釋奠籩豆之數先農乃少理既差舛難以因循謹案禮記郊特牲云籩豆之薦水土之品不敢用䙝味而貴多品所以交於神明之義也此即祭祀籩豆以多為貴宗廟之數不可踰郊今請大祀同為十二中祀同為十小祀同為八釋奠準中祀自餘從座並請依舊式詔並可之遂附于禮令唐書髙宗本紀總章元年十二月丁卯有事于南郊蕙田案此郊舊書不載疑刻本脫又案通考作十一月疑誤舊唐書髙宗本紀咸亨四年十一月丙寅上製樂章有上元二儀三才四時五行六律七政八風九宮十洲得一慶雲之曲詔有司諸大祠享即奏之上元三年十一月丁卯勅新造上元舞圜丘方澤享太廟用之餘祭則停唐書韋萬石傳上元中遷太常少卿當時郊廟燕會樂曲皆萬石與太史令姚元辯增損之舊唐書禮儀志乾封初髙宗東封迴又詔依舊祀感帝及神州司禮少常伯郝處俊等奏曰顯慶新禮廢感帝之祀改為祈穀昊天上帝以髙祖太武皇帝配檢舊禮感帝以世祖元皇帝配今既奉勅依舊復祈穀為感帝以髙祖太武皇帝配神州又髙祖依新禮見配圓丘昊天上帝及方丘皇地祇若更配感帝神州便恐有乖古禮案禮記祭法云有虞氏禘黄帝而郊嚳夏后氏亦禘黄帝而郊鯀殷人禘嚳而郊㝠周人禘嚳而郊稷鄭𤣥注云禘謂祭上帝於南郊又案三禮義宗云夏正郊天者王者各祭所出帝於南郊即大傳所謂王者禘其祖之所自出以其祖配之是也此則禘須逺祖郊須始祖今若禘郊同用一祖恐於典禮無據乾封二年十二月詔曰昔周京道喪秦室政乖禮樂淪亡經典殘滅遂使漢朝博士空說六宗之文晉代鴻儒爭成七祀之義或同昊天於五帝或分感帝於五行自兹遞相祖述紛紜莫定自今以後祭圜丘五方明堂感帝神州髙祖太武皇帝太宗文武皇帝配仍總祭昊天上帝及五帝於明堂唐書禮樂志則天垂拱元年詔有司議卒用元萬頃范履冰之說郊丘諸祠以髙祖太宗髙宗並配沈伯儀傳垂拱元年成均助教孔𤣥義奏嚴父莫大配天天於萬物為最大推父偶天孝之大尊之極也易稱先王作樂崇德殷薦之上帝以配祖考上帝天也昊天之祭宜祖考並配請以太宗髙宗配上帝於圜丘神堯皇帝配感帝南郊祭法祖文王宗武王祖始也宗尊也一名而有二義經稱宗祀文王文王當祖而云宗包武王以言也知明堂以祖考配與二經合伯儀曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥曰禘郊祖宗皆配食也祭昊天圜丘曰禘祭上帝南郊曰郊祭五帝五神明堂曰祖宗此為最詳虞夏退顓頊郊嚳殷捨契郊冥去取違舛唯周得禮之序至明堂始兩配焉文王上配五帝武王下配五神別父子也經曰嚴父莫太於配天又曰宗祀文王於明堂以配上帝不言嚴武王以配天則武王雖在明堂未齊於配雖同祭而終為一主也緯曰后稷為天地主文王為五帝宗若一神而兩祭之則薦獻數瀆此神無二主也貞觀永徽禮實專配由顯慶後始兼尊焉今請以髙祖配圜丘方澤太宗配南北郊髙宗配五天帝鳳閣舍人元萬頃范履冰等議今禮昊天上帝等五祀咸奉髙祖太宗兼配以申孝也詩昊天章二后受之易薦上帝配祖考有兼配義髙祖太宗既先配五祀當如舊請奉髙宗歴配焉自是郊丘三帝並配云文獻通考馬氏曰並配之制始於唐自鄭康成有六天之說魏晉以來多遵用之以為曜魄寶亦天也感生帝亦天也均之為天則配天之祖其尊一也至唐人始以為曜魄寶五帝皆星象之屬當從祀南郊而不當以事天之禮事之善矣然感帝之祠既罷旋復雖復其祠而以為有天帝之分尊卑之別遂於郊與明堂所配之祖不無厚薄之疑乃至每祭並配而後得為嚴父之禮然則周公亦豈厚於后稷而薄於文王乎則曷若一遵初議若郊若明堂皆專祀昊天各以一祖配之於禮意人情為兩得乎通典永昌元年九月勅天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂為天假有經傳互文終是名實未當稱號不別尊卑相渾自今郊祀之禮唯昊天上帝稱天自餘五帝皆稱帝舊唐書則天皇后本紀證聖元年九月親祀南郊加尊號改元天冊萬歲禮儀志則天革命天冊萬歲元年加號為天冊金輪大聖皇帝親享南郊合祭天地以武氏始祖周文王追尊為始祖文皇帝后父應國公為無上孝明髙皇帝以二祖同配如乾封之禮唐書禮樂志古者祭天于圜丘在國之南祭地于澤中之方丘在國之北所以順隂陽因髙下而事天地以其類也其方位既別而其燎壇瘞坎樂舞變數亦皆不同而後世有合祭之文則天天冊萬歲元年親享南郊始合祭天地舊唐書則天皇后本紀長安二年十一月戊子親享南郊大赦天下通典長安二年九月勅祠明堂圜丘神座並令著牀便為恒式舊唐書音樂志則天大聖皇后大享昊天樂章十二首御撰太隂凝至化貞耀蘊軒儀德邁娥臺敞仁髙姒幄披捫天遂啟極夢日乃昇曦瞻紫極望𤣥穹翹至懇罄深衷聽雖逺誠必通垂厚澤降雲宮乾儀混成冲邃天道下濟髙明闓陽晨披紫闕太一曉降黄庭圜壇敢申昭報方璧冀展䖍情丹襟式敷衷懇𤣥鑒庶察微誠巍巍叡業廣赫赫聖基隆菲徳承先顧禎符萃眇躬銘開武巖側圖薦洛川中微誠詎幽感景物忽昭融有懐慙紫極無以謝𤣥穹朝壇霧巻曙嶺烟沈爰設筐幣式表誠心筵輝麗璧樂暢和音仰唯靈鑒俯察翹襟昭昭上帝穆穆下臨禮崇備物樂奏鏘金蘭羞委薦桂醑盈斟敢希明徳聿罄莊心鐏浮九醞禮備三周陳誠菲奠契福神猷奠璧郊壇昭大禮鏘金拊石表䖍誠始奏承雲娛帝賞復歌調露暢韶音荷恩承顧託執契恭臨撫廟略靜邊荒天兵曜神武有截資先化無為遵舊矩禎符降昊穹大業光寰宇肅肅祀典邕邕禮秩三獻已周九成斯畢爰撤其俎載遷其實或昇或降唯誠唯質禮終肆類樂闋九成仰唯明德敢薦非馨顧慙菲奠久駐雲軿瞻荷靈澤悚戀兼盈式乾路關天扉迴日馭動雲衣登金闕入紫微望仙駕仰恩徽中宗本紀景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源為終獻蘇瓖傳將拜南郊國子祭酒祝欽明希庶人㫖建議請皇后為亞獻安樂公主為終獻瓌深非其議嘗于御前面折欽明帝雖悟竟從欽明所奏禇无量傳中宗將親祀南郊詔禮官學士修定儀注國子祭酒祝欽明司業郭山惲皆希㫖請以皇后為亞獻无量獨與太常博士唐紹蔣欽緒固爭以為不可旡量建議曰夫郊祀者明皇之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而叙人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎至如冬至圜丘祭中最大皇后内主禮位甚尊若合郊天助祭則當具著禮典今編檢周官無此儀制蓋由祭天南郊不以地配唯以始祖為主不以祖妣配天故唯皇帝親行其禮皇后不合預也謹案大宗伯職云若王不祭祀則攝位注云王有故代行其祭祀下文云凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下文即當云若不祭祀則攝而薦豆籩今於文上更起凡則是別生餘事夫事與上異則别起凡凡者生上起下之名不專繫於本軄周禮一部之内此例極多備在文中不可具錄又王后助祭親薦豆籩而不徹案九嬪職云凡祭贊后薦徹豆籩注云后進之而不徹則知中徹者為宗伯生文若宗伯攝祭則宗伯親徹不別使人又案外宗掌宗廟之祀王后不與則贊宗伯此一文與上相證何以明之案外宗唯掌宗廟祭祀不掌郊天足明此文是宗廟祭也案王后行事總在内宰職中檢其職文唯云大祭祀后祼獻則贊瑤爵亦如之鄭注云謂祭宗廟也注所以知者以文云祼獻祭天無祼以此得知又祭天之器則用陶匏亦無瑤爵注以此得知是宗廟也又内司服掌王后六服無祭天之服而巾車職掌王后之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文參之故知后不合助祭天也唯漢書郊祀志則有天地合祭皇后預享之事此則西漢末代强臣擅朝悖亂彛倫黷神諂祭不經之典事涉誣神故易傳曰誣神者殃及三代太誓曰正稽古立功立事可以永年承天之大律斯史策之良誡豈可不知今南郊禮儀事不稽古忝守經術不敢黙然請旁詢碩儒俯摭舊典採曲臺之故事行圓丘之正儀使聖朝叶昭曠之塗天下知文物之盛豈不幸甚時左僕射韋巨源等阿㫖叶同欽明之議竟不從无量所奏蔣欽緒傳中宗始親郊國子祭酒祝欽明建言皇后應亞獻欲以媚韋氏天子疑之詔禮官議衆曲意阿徇欽緒獨抗言不可諸儒壯其節祝欽明傳入為國子祭酒景龍三年中宗將親祀南郊欽明與國子司業郭山惲二人奏言皇后亦合助祭遂建議曰謹案周禮天神曰祀地祇曰祭宗廟曰享大宗伯職曰祀大神祭大祇享大鬼理其大禮若王有故不預則攝位凡大祭祀王后不預則設而薦豆籩徹又追師職掌王后之首服以待祭祀又内司服職掌王后之六服凡祭祀供后之衣服又九嬪職大祭祀后祼獻則贊瑤爵亦如之據此諸文即皇后合助皇帝祀天神祭地祇明矣故鄭𤣥注内司服云闕狄皇后助王祭羣小祀之服然則小祀尚助王祭中大推理可知闕狄之上猶有兩服第一褘衣第二搖狄第三闕狄此三狄皆助祭之服闕狄即助祭小祀即知搖狄助祭中祀褘衣助祭大祀鄭舉一隅故不委說唯祭宗廟周禮王有兩服先王衮冕先公鷩冕鄭𤣥因此以后助祭宗廟亦分兩服云褘衣助祭先王搖狄助祭先公不言助祭天地社稷自宜三隅而反且周禮正文凡祭王后不預既不專言宗廟即知兼祀天地故云凡也又春秋外傳云禘郊之事天子親射其牲王后親舂其粢故代婦職但云詔王后之禮事不主言宗廟也若專主宗廟者則内宗外宗職皆言掌宗廟之祭祀此皆禮文分明不合疑惑舊說以天子父天母地兄日姊月所以祀天于南郊祭地于北郊朝日于東門之外以昭事神訓人事君必躬親以禮文有故然後使攝此其義也禮記祭統曰夫祭也者必夫婦親之所以備内外之官也官備則具備又哀公問於孔子曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重焉又漢書郊祀志云天地合祭先祖配天先妣配地天地合精夫婦判合祭天南郊則以地配一體之義也據此諸文即知皇后合助祭望請別修助祭儀注同進帝頗以為疑召禮官親問之太常博士唐紹蔣欽緒對曰皇后南郊助祭於禮不合但欽明所執是祭宗廟禮非祭天地禮謹案魏晉宋及齊梁周隋等歴代史籍至於郊天祀地並無皇后助祭之事帝令宰相取兩家狀對定欽緒與唐紹及太常博士彭景直又奏議曰周禮凡言祭祀享三者皆祭之互名本無定義何以明之案周禮典瑞職云兩珪有邸以祀地則祭地亦稱祀也又司筵云設祀先王之胙席則祭宗廟亦稱祀也又内宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又案禮記云唯聖為能享帝此即祀天帝亦言享也又案孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名不獨天地為大祭也何以明之案鬱人職云大祭祀與量人授舉斚之卒爵尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則贊瑤爵據祭天無祼亦無瑤爵此乃宗廟稱大祭祀之明文欽明所執大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預則攝而薦豆籩徹欽明唯執此文以為王后有祭天地之禮欽緒等據此乃是王后薦宗廟之禮非祭天地之事何以明之案此文凡祀大神祭大祇享大鬼帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制大號理其大禮制相王之大禮若王不與祭祀則攝位此已上一凡直是王兼祭天地宗廟之事故通言大神大祇大鬼之祭也已下文云凡大祭祀王后不與則攝而薦豆籩徹此一凡直是王后祭廟之事故唯言大祭祀也若云王后助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以別之耳王后祭廟自是大祭祀何故取上凡相王之禮以混下凡王后祭宗廟之文此是本經科段明白又案周禮外宗掌宗廟之祭祀佐王后薦玉豆凡后之獻亦如之王后有故不預則宗伯攝而薦豆籩外宗無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之器初非祭天所設請問欽明若王后助祭天地在周禮使何人贊佐若宗伯攝后薦豆祭天又合何人贊佐並請明徵禮文即知攝薦是宗廟之禮明矣案周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕内司服掌王后祭服無王后祭天之服案三禮義宗明王后六服謂褘衣搖翟闕翟鞠衣展衣褖衣褘衣從王祭先王則服之搖翟祭先公及饗諸侯則服之鞠衣以採桑則服之展衣以禮見王及見賓客則服之褖衣燕居服之王后無助祭於天地之服但自先王以下又三禮義宗明三夫人之服云后不助祭天地五岳故無助天地四望之服案此則王后無祭天之服明矣三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乗也厭翟者后從王饗諸侯所乘也安車者后宮中朝夕見於王所乘也翟車者后求桑所乘也輦車者后遊宴所乘也案此則王后無祭天之車明矣又禮記郊特牲義贊云祭天無祼鄭𤣥注云唯人道宗廟有祼天地大神至尊不祼圜丘之祭與宗廟不同朝踐王酌泛齊以獻是一獻后無祭天之事大宗伯次酌醴齊以獻是為二獻案此則祭圜丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議引禮記祭統曰夫祭也者必夫婦親之案此是王與后祭宗廟之禮非關祀天地之義案漢魏晉宋後魏齊梁周陳隋等歴代史籍興王令主郊天祀地代有其禮史不闕書並不見往代皇后助祭之事又髙祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處髙宗天皇大帝永徽二年十一月辛酉親有事于南郊又總章元年十二月丁夘親拜南郊亦並無皇后助祭處又案大唐禮亦無皇后助祭南郊之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無明文時尚書左僕射韋巨源又希㫖協同欽明之議上納其言竟以后為亞獻仍補大臣李嶠等女為齋娘以執籩豆及禮畢特詔齋娘有夫壻者咸為改官景雲初侍御史倪若水劾奏欽明及郭山惲曰欽明等本是腐儒素無操行崇班列爵實為叨忝而涓塵莫効諂佞為能遂使曲臺之禮圜丘之制百王故事一朝墜失所謂亂常改作希㫖病君人之不才遂至於此今聖朝馭歴賢良入用唯兹小人猶在朝列臣請並從黜放以肅周行於是左授欽明饒州刺史唐書祝欽明傳欽明與國子司業郭山惲隂迎韋后意謬立議帝雖不睿猶疑之召禮官質問時左僕射韋巨源助后掎掣帝奪政事即傅欽明議帝果用其言以皇后為亞獻通典欽明又請以安樂公主為終獻唐紹蔣欽緒固爭乃止蕙田案皇后助祭南郊固非典禮然其端起于合祭也天地既已同牢夫婦何妨並薦殉葬之禍由于作俑信然唐紹蔣欽緒奮然爭之考証確實辨駁明暢洵為快矣然卒不行邪見之難黜如是欽明諂媚究歸黜放宜哉舊唐書音樂志景龍三年中宗親祀昊天上帝樂章十首降神用豫和天之歴數歸睿唐顧唯菲德欽昊蒼選吉日兮表殷薦冀神鑒兮降闓陽皇帝行用太和圜鐘宮恭臨寶位肅奉瑤圖恒思解網每軫泣辜德慙巢燧化劣唐虞期我良弼式贊嘉謨告謝圜鐘宮得一流元澤通三御紫宸逺叶千齡運遐銷九域塵絶瑞駢闐集殊祥絡繹臻年登慶西畝稔歲賀盈囷登歌用肅和無射均之林鐘羽悠哉廣覆大矣曲成九元著象七曜甄明珪璧是奠醞酎斯盈作樂崇德爰暢咸英迎俎用雍和圜鐘均之黄鐘羽郊壇展敬嚴配因心孤竹簫管空桑瑟琴肅穆大禮鏗鏘八音恭惟上帝希降靈歆酌獻用福和圜鐘宮九成爰奏三獻式陳欽承景福恭託明禋中宮助祭昇壇用函鐘宮坤元光至德柔訓闡皇風芣苡芳聲逺螽斯美化隆叡範超千載嘉猷備六宮肅恭陪盛典欽若薦禋宗亞獻用函鐘宮三靈降饗三后配神䖍敷藻奠敬展郊禋送文舞出迎武舞入用舒和圜鐘均之中呂商已陳粢盛敷嚴祀更奏笙鏞協雅聲琁圖寶歴欣寧謐宴俗淳風樂太平武舞作用凱安圜鐘均之無射徵堂堂聖祖興赫赫昌基泰戎車盟津偃玉帛塗山會舜日啟祥輝堯雲卷征斾風猷被有截聲教覃無外通典景雲元年十一月十三日乙丑冬至祀圜丘時隂陽人盧雅侯藝等奏請促冬至就十二日甲子以為吉會右臺侍御史唐紹奏曰禮所以冬至祭圜丘于南郊夏至祭方澤于北郊者以其日行躔次極於南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一歲之内吉莫大焉甲子但為六旬之首一年之内隔月常遇既非大會晷運未周唯總六甲之辰助四時而成歳今欲避圜丘以取甲子是背大吉而就小吉也竟依紹議蕙田案此郊新舊唐書本紀俱不載馬氏通考亦不數考舊書志即叙景龍三年之下而十二甲子十三乙丑與通典合是則當為杜氏之誤然杜述本朝事何至析一為二姑存之而闕其疑唐書睿宗本紀先天元年正月辛已有事于南郊己丑大赦改元曰太極舊書作景雲三年通典太極元年正月初將有事于南郊時有司議唯祭昊天上帝而不設皇地祇位諫議大夫賈曾上表謹案禮祭法曰有虞氏禘黄帝而郊嚳大傳曰大祭曰禘然則郊之與廟俱有禘名禘廟則祖宗之主俱合於太祖之廟禘郊則地祇羣望俱合於圜丘以始祖配享皆有事而大祭異於常祀之義三輔故事漢祭圜丘儀上帝位正南面后土位亦南面而少東又東觀漢記云光武於洛陽城南為圜壇天地位其上皆南面西上案兩漢時自有后土及北郊祀而此已於圜丘設地位明是禘祭之儀今之南郊正當禘禮固宜合配天地咸秩百神請備設皇地祇并從祀等座則禮得稽古義合緣情時又將親享北郊竟寢曾表蕙田案此條新舊唐書詳略懸殊唯通典為適中故存此去彼唐書賈曾傳天子親郊有司議不設皇地祇位曾請合享天地如古制并從祀等座睿宗詔宰相禮官議皆如曾請蕙田案是年正月南郊改元太極五月北郊又改元延和舊書作景雲三年新書又作先天元年一年四號自古無之又案通典言寢曾表是不合祭也新書此傳言如曾請又似改為合祭矣然此年五月戊寅有事北郊新書禮樂志又云是時睿宗將祭地于北郊故曾之議寢據此是賈傳誤也五禮通考巻九
