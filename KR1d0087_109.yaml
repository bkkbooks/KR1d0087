body:
  text: 五禮通考卷九十九刑部尚書秦蕙田撰吉禮九十九禘祫宋史禮志宗廟三年一祫以孟冬五年一禘以孟夏真宗咸平元年判太常禮院李宗訥等言僖祖稱曽髙祖太祖稱伯文懿惠明簡穆昭憲皇后並稱祖妣孝明孝憲孝章皇后並稱伯妣案爾雅有考妣王父母曽祖王父母髙祖王父母及世祖之别以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文事下尚書省議户部尚書張齊賢等言王制天子七廟謂三昭三穆與太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊本祖而重正統也又云天子絶朞䘮安得宗廟中有伯氏之稱乎其唐及五代有所稱者蓋禮官之失非正典也請自今有事於太廟則太祖并諸祖室稱孝孫孝曽孫嗣皇帝其爾雅考妣王父之文本不為宗廟言也歴代既無所取於今亦不可行詔下禮官議議曰案春秋正義躋魯僖公云禮父子異昭穆兄弟昭穆同此明兄弟繼統同為一代又魯隱桓繼及皆當穆位又尚書盤庚有商及王史記云陽甲至小乙兄弟四人相承故不稱嗣子而曰及王明不繼兄之統也又唐中睿皆處昭位敬文武昭穆同為一世伏請僖祖室止稱廟號后曰祖妣順祖室曰髙祖后曰髙祖妣翼祖室曰曽祖后曰曽祖妣祝文皆稱孝曽孫宣祖室曰皇祖考后曰皇祖妣祝文稱孝孫太祖室曰皇伯考妣太宗室曰皇考妣每大祭太祖太宗昭穆同位祝文並稱孝子其别廟稱謂亦請依此詔都省復集議曰古者祖有功宗有徳皆先有其實而後正其名今太祖受命開基太宗纘承大寳則百世不祧之廟矣豈有祖宗之廟已分二世昭穆之位翻為一代如臣等議禮為人後者為之子以正父子之道以定昭穆之義則無疑也必若同為一代則太宗不得自為世數而何以得為宗乎不得為宗又何以得為百世不祧之主乎春秋正義亦不言昭穆不可異此又不可以為證也今若序為六世以一昭一穆言之則上無毁廟之嫌下有善繼之美於禮為大順於時為合宜何嫌而謂不可乎翰林學士宋湜言三代而下兄弟相繼則多昭穆異位未之見也今詳都省所議皇帝於太祖室稱孫竊有疑焉詔令禮官再議禮官言案祭統曰祭有昭穆者所以别父子逺近長幼親疏之序而無亂也公羊傳公孫嬰齊為兄歸父之後春秋謂之仲嬰齊何休云弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不以子為父孫晉賀循議兄弟不合繼位昭穆云商人六廟親廟四并契湯而六比有兄弟四人相襲為君者便當上毁四廟乎如此四世之親盡無復祖禰之神矣温嶠議兄弟相繼藏主夾室之事云若以一帝為一世則當不得祭於禰乃不及庶人之祭也夫兄弟同世於恩既順於義無否元宗朝禘祫皇伯考中宗皇考睿宗同列於穆位徳宗亦以中宗為髙伯祖晉王導荀崧議大宗無子則立支子又曰為人後者為之子無兄弟相為後之文所以舍至親取逺屬者蓋以兄弟一體無父子之道故也竊以七廟之制百王是遵至於祖有功宗有徳則百世不遷之廟也父為昭子為穆則千古不刋之典也今議者引漢書曰為人後者為之子殊不知弟不為兄後子不為父孫春秋之深㫖父謂之昭子謂之穆禮記之明文也又案太宗享祀太祖二十有二載稱曰孝弟此不易之制又安可追改乎唐元宗謂中宗為皇伯考徳宗謂中宗為髙伯祖則伯氏之稱復何不可臣等參議自今合祭日太祖太宗依典禮同位異坐皇帝於太祖仍稱孝子餘並遵舊制蕙田案兄弟同昭穆所議是咸平二年八月太常禮院言今年冬祭畫日以十月六日荐享太廟案禮三年一祫以孟冬又疑義云三年䘮畢遭禘則禘遭祫則祫宜改孟冬荐享為祫享仁宗天聖元年禮官言真宗神主祔廟已行吉祭三年之制又從易月之文自天禧二年四月祫享玉海天聖元年四月乙卯遣官禘享太廟遂以薦享為禘享天聖八年九月太常禮院言自天聖六年夏行禘享之禮至此年十月請以孟冬薦享為祫享詔恭依嘉祐四年十月仁宗親詣太廟行祫享禮以宰臣富弼為祫享大禮使韓琦為禮儀使樞宻使宋庠為儀仗使參知政事曽公亮為橋道頓逓使樞宻副使程戡為鹵簿使同判宗正寺趙良規請正太祖東向位禮官不敢決觀文殿學士王舉正等議曰大祫之禮所以合昭穆辨尊卑必以受命之祖居東向之位本朝以太祖為受命之君然僖祖以降四廟在上故每遇大祫止列昭穆而虚東向魏晉以來亦用此禮今親享之盛宜如舊便禮官張洞韓維言國朝每遇禘祫奉别廟四后之主合食太廟唐郊祀志載禘祫祝文自獻祖至肅宗所配皆一后惟睿宗二后蓋昭成明皇母也續曲臺禮有别廟皇后合食之文蓋未有本室遇祫享即祔祖姑下所以大順中三太后配列禘祭議者議其非禮臣謂每室既有定配則餘后不當參列義當革正學士孫抃等議春秋傳曰大祫者何合祭也未毁廟之主皆升合食於太祖是以國朝事宗廟百有餘年至祫之日别廟后主皆升合食非無典據大中祥符中已曽議定禮官著酌中之論先帝有恭依之詔他年有司攝事四后皆預今甫欲親祫而四后見黜不亦疑於以禮之煩故耶宗廟之禮至尊至重茍未能盡祖宗之意則莫若守舊禮臣等愚以為如故便學士歐陽修等曰古者宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則有别廟之祭本朝禘祫乃以别廟之后列於配后之下非惟於古無文於今又四不可淑徳太宗之元配列於元徳之下章懷真宗之元配列於章懿之下一也升祔之后統以帝樂别廟之后則以本室樂章自隨二也升祔之后同牢而祭牲器祝冊亦統於帝别廟諸后乃從專享三也升祔之后聫席而坐别廟之后位乃相絶四也章獻章懿在奉慈廟每遇禘祫本廟致享最為得禮若四后各祭於廟則其尊自申而於禮無失以為行之已久重於改作則是失禮之舉無復是正也請從禮官詔四后祫享依舊須大禮畢别加討論仍詔祫享前一日帝詣景靈宫如南郊禮衛士毋得迎駕呼萬嵗有司言諸司奉禮攝廪犧令省牲依通禮改正祀儀散齋四日於别殿致齋二日於大慶殿一日於太廟尚舍直殿下設小次御坐不設黄道褥位七廟各用一太牢每座簠簋二㽅鉶三籩豆為後無黼扆席凡出三閣瑞石篆書玉璽印青玉環金山陳於庭别廟四后合食牲樂奠拜無異儀故事七祀功臣無牲止於廟牲肉分割知廟卿行事請依續曲臺禮共料一羊而獻官三員功臣單席如大中祥符加褥十月三日命樞宻副使張昇望告昊天上帝皇地祗帝齋大慶殿十一日服通天冠絳紗袍執圭乗輿至大慶殿門外降輿乗大輦至天興殿薦享畢齋於太廟明日帝常服至大次改衮冕行禮畢質明乗大輦還宫更服鞾袍御紫宸殿宰臣百官賀升宣徳門肆赦二十一日詣諸觀寺行恭謝禮二十六日御集英殿為飲福宴㑹要嘉祐四年孟冬詣太廟祫享御批云惟祫享之儀著禮經之文大祭先王合食祖廟感烝嘗之薦深肅僾之懐追孝奉先莫斯為重有司所存出於假攝卜以孟冬備兹法駕欵於太室親薦嘉籩朕取今年十一月擇日親詣太廟行祫享之禮所有合行諸般恩賞並特就祫享禮畢依南郊例施行楊氏復曰伏讀國朝㑹要仁宗皇帝嘉祐四年三月内出御札曰惟祫享之義著經禮之文大祭先王合食祖廟感烝嘗之薦深肅僾之懐追孝奉先莫斯為重慈享之廢歴年居多有司所行出於假攝禮之將墜朕深惜之大哉王言此仁聖之君至孝至敬之心之所形而不能自已也當時建明此議出於富公弼弼之言曰國朝三嵗必親行南郊之祀其於事天之道可謂得禮獨於宗廟祇遣大臣攝行時享而已親祀未講誠為闕典檢㑹今年冬至當有事於南郊又孟冬亦當合享於太廟欲望詔有司講求祫祭大禮所有降赦推恩則並用南郊故事富公弼之言可謂一言以為知一言以為不知者也夫聖王事親如事天事天如事親以祫享之禮比於南郊誠哉是言也然南郊推恩肆赦本非古典乃人主一時之優恩其後遂以為故事今孟冬祫享冬至南郊二大禮相繼而並行祫享推恩南郊可復行乎祫享肆赦南郊可復行乎南郊而不推恩肆赦又非祖宗之故事於是祫享之禮行而南郊因而權罷是雖有以盡宗廟親祫之誠而又失南郊祀天之禮夫豈聖主之本心然哉蓋欲矯其輕則事從其重而遂至於過重過重則不可繼也夫因有原廟則宗廟之禮必至於輕欲矯其輕則宗廟之禮必至於過重不惟過重而已自是親祫止行於一時而其後遂輟而不舉此則矯輕過重而終於不可繼也夫三年一祫此宗廟祀典之大者其實亦宗廟之常禮也常禮則非異事也何欲矯其輕而遂至於過重而終至於不可繼哉蕙田案楊氏之説切中時弊樂志至和祫享三首迎神興安濡露降霜永懐孝思祫食禘叙再問之期歌徳詠功八音播之歆神惟始靈其格兹奠瓚嘉安昭穆親祖自室徂堂禮備樂成肅然祼將瑟瓚黄流條鬯芬芳氣達淵泉神孚來享送神興安四祖基慶三后在天薦侑備成靈娭其旋孝孫應嘏受福永年送之懐之明發惻然嘉祐祫享二首迎神懐安來兹孝享禮備樂成神登于俎祝導于祊展牲肥腯奏格和平靈其昭格肅僾凝情送神懐安靈神歸止光景肅然福祥裕世明威在天孝孫有慶駿烈推先佑兹基緒彌萬斯年英宗本紀治平二年十一月辛未享太廟禮志治平元年有司凖畫日孟冬薦享改為祫祭案春秋閔公䘮未除而行吉禘三傳譏之真宗以咸平二年六月䘮除至十月乃祫祭天聖元年在諒隂有司誤通天禧舊禘之數在再期内案行禘祭以理推之是二年冬應祫而誤禘於元年夏故四十九年間九禘八祫例皆太速事失於始則嵗月相乗不得而正今在大祥内禮未應祫明年未禫亦未應禘至六月即吉十月合行祫祭乞依舊時享庶合典禮二年二月翰林學士王珪等上議曰同知太常禮院官吕夏卿狀古者新君踐祚之三年先君之䘮二十七月為禫祭然後新主祔廟特行禘祭自此五年再為禘祫䘮除必有禘祫者為再大祭之本也今當祫祭縁陛下未終三年之制納有司之説十月依舊時享然享廟祫祭其禮不同故事郊享之年遇祫未嘗權罷唯罷臘祭是則孟享與享廟嘗併行於季冬矣其禘祫年數乞一依太常禮院請今年十月行祫祭明年四月行禘祭仍如夏卿議權罷今年臘享蕙田案禘祫為四時之間祀與時享兩不相妨自惑於三年五年之期而疏數致咎又惑於䘮畢吉祭之文而禘祫之本義全失無一而可神宗熙寧八年有司言已尊僖祖為太廟始祖孟夏禘祭當正東向之位又言太廟禘祭神位已尊始祖居東向之位自順祖而下昭穆各以南北為序自今禘祫著為定禮老學菴筆記太祖開國雖追尊僖祖以下四廟然惟宣廟昭憲皇后為大忌忌前一日不坐則太祖初不以僖祖為始祖可知真宗初罷宣祖大忌祥符中下詔復之然未嘗議及僖祖則真宗亦不以僖祖為始祖可知今乃獨尊僖祖使宋有天下二百四十餘年太祖尚不正東向之位恐禮官不當久置不議也元豐元年詳定郊廟禮文所言禘祫之義存於周禮春秋而不著其名行禮之年經皆無文惟公羊傳曰五年而再盛祭禮緯曰三年一祫五年一禘而又分為二説鄭氏則曰前三後二謂禘後四十二月而祫祫後十八月而禘徐邈則曰前二後三謂二祭相去各三十月以二説考之惟鄭氏曰魯禮三年䘮畢祫於太廟明年禘於羣廟自後五年而再盛祭一祫一禘本朝自慶厯以來皆三十月而一祭至熙寧五年後始不通計遂至八年禘祫併在一嵗昨元豐三年四月已行禘禮今年若依舊例十月行祫享即比年行祫復踵前失請依慶厯以來之制通計年數皆三十月而祭詔如見行典禮詳定所又言古者祼獻饋食禴祠烝嘗並為先王之享未嘗廢一時之祭故孔穎達正義以為天子夏為大祭之禘不廢時祭之礿秋為大祭之祫不廢時祭之嘗則王禮三年一祫與禘享更為時祭本朝沿襲故常久未釐正請每禘祫之月雖已大祭仍行時享以嚴天子備禮所以丕崇祖宗之義其郊禮親祠準此從之蕙田案自公羊有五年再殷祭之文鄭氏據之又附㑹緯書三年一祫五年一禘之説蔓衍經傳分離乖隔後世不察遵而行之踈速不均逺近無準朝廷之上每譁然集議訖鮮折衷皆由不考周禮四時間祀之義耳至是詳定禮文所始有禘祫之義存於周禮之説而以祼獻饋食禴祠烝嘗並為先王之享未嘗廢一時之祭信經捨傳直透本原一切葛藤不削自絶乃千古之確論説經之正説聖人復起不可易矣惜當代及後世仍不能尊信而相沿往説不改緯書之流毒其深矣夫文獻通考元豐五年帝謂宰臣曰禘者所以審諦祖之所自出故禮不王不禘秦漢以來譜牒不明莫知祖之所自出則禘禮可廢也宰臣蔡確等以為聖訓得禘之本意非諸儒所及乃詔罷禘享於是詳定禮文所言案記曰禮不王不禘王者禘其祖之所自出以其祖配之若舜禹祖髙陽世系出自黄帝則虞夏禘黄帝以髙陽氏配商祖契出自帝嚳則商人禘嚳以契配周祖文王亦出自嚳故周人禘嚳以文王配虞夏商周四代所禘皆以帝有天下其世系所出者明故追祭所及者逺也藝祖受命祭四廟推僖祖而上所自出者譜失其傳有司因仍舊説三年一祫五年一禘禘與祫皆合羣廟之主綴食於始祖失禮莫甚臣等竊謂國家世系所傳與虞夏商周不同既求其祖之所自出而不得則禘禮當闕必推見祖系所出乃可以行從之蕙田案神宗此舉直是千古卓識有此卓識方知三年一祫五年一禘真是失禮莫甚也宋史禮志詳定所言古者天子祭宗廟有堂事焉有室事焉案禮祝延尸入奥灌後乃出迎牲延尸主出於室坐於堂上始祖南面昭在東穆在西乃行朝踐之禮是堂事也設饌於堂復延主入室始祖東面昭南穆北徙堂上之饌於室中乃行饋食之禮是室事也請每行大祫堂上設南面之位室中設東面之位禮部言合食之禮始祖東面昭南穆北者本室中之位也今設位户外祖宗昭穆别為幄次殆非合食之義請自今祫享即前楹通設帳幕以應室中之位文獻通考徽宗大觀四年議禮局言周官天府掌祖廟之守藏凡國之玉鎮大寳器藏焉若有大祭則出而陳之既事藏之説者以謂大祭禘祫也國朝嘉祐四年將行祫享議者請陳瑞物及陳國之寳令曹中有司請親祠太廟令户部陳嵗之所貢以充庭實世祖神宗皆可其奏今請祫享陳設應瑞寳貢物可出而陳者並令有司依嘉祐元豐詔㫖凡親祠太廟凖此從之宋史禮志大觀四年議禮局請每大祫堂上設南面之位室中設東面之位始祖南面則昭穆東西相向始祖東面則昭穆南北相向以應古義文獻通考議禮局言古者祫祭朝踐之時設始祖之位於户西南面昭在東穆在西相向而坐薦豆籩脯醢王北面而事之此堂上之位也徙饌之後設席於室在户内西方東面為始祖之位次北方南面布昭席次南方北面布穆席其餘昭穆各以序此室中之位也設始祖南方之位而朝踐焉在禮謂之堂事設始祖東面之位而饋食焉在禮謂之室事考漢舊儀宗廟三年大祫祭子孫諸帝以昭穆坐於髙廟毁廟神皆合食設左右坐髙祖南面則自漢以前堂上之位未嘗廢也元始以後初去此禮專設室中東向之位晉宋隋唐所謂始祖位者不過論室中之位耳且少牢饋食大夫禮也特牲饋食士禮也以儀禮考之大夫士祭禮無薦牲朝踐之事故惟饋食於室至於天子祭宗廟則堂事室事皆舉堂上位廢而夫子北面事神之禮缺矣伏請每行大祫堂上設南面之位室中設東面之位始祖南面昭穆東西相向始祖東面則昭穆南北相向以應古義詔依所議楊氏復曰大祫則如朱子周大祫圖時祫則如朱子周時祫圖堂上之所以異於室中也太祖南向昭西向穆東向而已蕙田案以上三條所論祭禮漸與經義相近皆儒者考經之效也宋史禮志南渡之後有祫而無禘髙宗建炎二年祫享於洪州紹興二年祫享於温州時儀文草創奉遷祖宗及祧廟神主别廟神主各設幄合食於太廟始祖東面昭穆以次南北相向紹興五年奏安太廟神主復議太祖東向禮親行欵謁文獻通考五年吏部員外郎董弅言臣聞戎祀國之大事而宗廟之祭又祀之大者也大祀禘祫為重今戎事方飭祭祀之禮未暇徧舉然事有違經戾古上不當天地神祗之意下未合億兆黎庶之心特出於一時大臣好勝之臆説而行之六十年未有知其非者顧雖治兵禦戎之際正厥違悞宜不可緩仰惟太祖皇帝受天明命混一區宇即其功徳所起則有同乎周之后稷若乃因時特起之蹟無異乎漢之髙帝魏晉而下莫可擬倫是宜郊祀以配天宗祀以配上帝祫享以居東向之尊傳千萬世而不易者也國初稽前代追崇之典止及四世故於祫享用魏晉故事虛東向之位逮至仁宗嘉祐四年親行祫享之禮嘗詔有司詳議太祖東向用昭正統之緒當時在廷多洪儒碩學僉謂自古必以受命之祖乃居東向之位本朝太祖乃受命之君若論七廟之次有僖祖以降四廟在上當時大祫止列昭穆而虛東向蓋終不敢以非受命之祖而居之允協禮經暨熙寧之初僖祖以世次當祧禮官韓維等據經有請援證明白適王安石用事奮其臆説務以勢勝乃俾章衡建議尊僖祖為始祖肇居東向神宗皇帝初未為然委曲訪問安石乃謂推太祖之孝心固欲尊宣祖而上孝心宜無以異則尊僖祖必當祖宗神靈之意神宗意猶未決博詢大臣故馮京奏謂士大夫以太祖不得東向為恨安石肆言以折之已而又欲罷太祖郊配神宗以太祖開基受命不許安石終不然之乃曰本朝配天之禮不合禮經一時有識之士莫敢與辨元祐之初翼祖既祧正合典禮至於崇寧宣祖當祧適蔡京用事一遵安石之術乃建言請立九廟自我作古其已祧翼祖及當祧宣祖並即依舊循沿至今太祖皇帝尚居第四室遇大祫處昭穆之列識者恨焉臣竊謂王者奉先與臣庶異必合天下之公願垂萬世之宏規非容私意於其間祖功宗徳之外親盡迭毁禮之必然自古未有功隆創業為一代之太祖而列於昭穆之次者也亦未有非受命而追崇之祖居東向之尊歴百世而不遷者也又言漢魏之制太祖而上毁廟之主皆不合食唐以景帝始制故規規然援后稷為比而獻懿乃在其先是以前後議論紛然乍遷乍祔使當時遂尊神堯為太祖豈得更有議論其後廟制既定始以獻懿而上毁廟之主藏於興聖徳明之廟遇祫即廟而享焉是為别廟之祭以全太祖之尊蓋合於漢不以太公居合食之列魏晉武宣而上廟堂皆不合食之義當時剛勁如顔真卿儒宗如韓愈所議雖各有依據皆不能易陳京之説以其當理故也太常丞王普奏曰僖祖非始封之君而尊為始祖太祖寔創業之主而列於昭穆其失自熙寧始宣祖當遷而不遷翼祖既遷而復祔其失自崇寧始為熙寧之説則曰僖祖而上世次不可知宜與稷契無異然商周之祖稷契謂其始封而王業之所由起也稷契之先自帝嚳至於黄帝譜系甚明豈以其上世不傳而遂尊為始祖耶為崇寧之説則曰自我作古而已夫事不師古尚復何言宜其變亂舊章而無所稽考也臣謹案春秋書桓宫僖宮災譏其當毁而不毁也書立武宫煬宫譏其不當立而立也然則宗廟不合於禮聖人皆貶之矣又况出於一時用事之臣私意臆説非天下之公論者豈可因循而不革哉臣竊惟太祖皇帝始受天命追崇四廟以致孝享行之當時可也至於今日世逺親盡迭毁之禮古今所同所當推尊者太祖而已董弅奏請深得禮意而其言尚有未盡蓋前日之失其甚大者有二曰太祖之名不正大禘之禮不行是也今日之議其可疑者有四曰奉安之所祭享之期七世之數感生之配是也古者廟制異宫則太祖居中而羣廟列其左右後世廟制同堂則太祖居右而諸室皆列其左古者祫享朝踐於堂則太祖南向而昭穆位於東西饋食於室則太祖東向而昭穆位於南北後世祫享一於堂上而用室中之位故惟以東向為太祖之尊焉若夫羣廟迭毁而太祖不遷則其禮尚矣臣故知太祖即廟之始祖是為廟號非諡號也惟我太宗嗣服之初太祖皇帝廟號已定雖更累朝世次猶近每於祫享必虛東向之位以其非太祖不可居也迨至熙寧又尊僖祖為廟之始祖百世不遷祫享東向而太祖常居穆位則名寔舛矣倘以熙寧之禮為是則僖祖當稱太祖而太祖當改廟號此雖三尺之童知其不可至於太祖不得東向而廟號徒為虛稱則行之六十餘年抑何理哉然則太祖之名不正前日之失大矣大傳曰禮不王不禘王者禘其祖之所自出以其祖配之祭法所謂商人周人禘嚳是也商以契為太祖嚳為契所自出故禘嚳而以契配焉周以稷為太祖嚳為稷所自出故禘嚳而以稷配焉儀禮曰大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出蓋士大夫尊祖則有時祭而無祫諸侯及其太祖則有祫而無禘禘其祖之所自出惟天子得行之春秋書禘魯用王禮故也鄭氏以禘其祖之所自出為祭天又謂宗廟之禘毁廟之主合食於太祖而親廟之主各祭於其廟考之於經皆無所據惟王肅之説得之前代禘禮多從鄭氏國朝熙寧以前但以親廟合食為其無毁廟之主故也惟我太祖之所自出是為宣祖當時猶在七廟之數雖禘未能如古然亦不敢廢也其後尊僖祖為廟之始祖而僖祖所出系序不著故禘禮廢自元豐宗廟之祭止於三年一祫則是以天子之尊而俯同於三代之諸侯凟亂等威莫此為甚然則大禘之禮不行前日之失大矣臣愚欲乞考古騐今斷自聖學定七廟之禮成一王之制自僖祖至於宣祖親盡之廟當遷自太宗至於哲宗昭穆之數已備是宜奉太祖神主第一室永為廟之始祖每嵗告朔薦親止於七廟三年一祫則太祖正東向之位太宗仁宗神宗南向為昭真宗英宗哲宗北向為穆五年一禘則迎宣祖神主享於太廟而以太祖配焉如是則宗廟之事盡合禮經無復前日之失矣乃若可疑者臣請辨之昔唐以景帝始封尊為太祖而獻懿二祖又在其先當時欲正景帝東向之位而議遷獻懿之主則或謂藏之夾室或謂毁瘞之或謂遷於陵所或謂當立别廟卒從陳京之説祔於徳明興聖之廟蓋臯陶涼武昭王皆唐之逺祖也故以獻懿祔焉惟我宣祖而上正如唐之獻懿而景靈崇奉聖祖之宫亦徳明興聖之比也臣竊謂四祖神主宜倣唐禮祔於景靈宫天興殿方今廵幸或寓於天慶觀聖祖殿焉則奉安之所無可疑者昔唐祔獻懿於興聖遇祫即廟而享之臣竊謂四祖神主祔於天興大祫之嵗亦當就行享禮既足以全太祖之尊又足以極追逺之孝考之前代實有據依則祭享之期無可疑者禮曰天子七廟三昭三穆與太祖之廟而七則是四親二祧止於六世而太祖之廟不以世數為限也書曰七世之廟可以觀徳蓋舉其總數而言非謂七世之祖廟猶未毁也是以周制考之在成王時以亞圉太王文王為穆以公叔祖紺王季武王為昭并太祖后稷為七廟焉髙圉於成王為七世祖已在三昭三穆之外則其廟毁矣惟我宣祖雖於陛下為七世祖亦在三昭三穆之外則其禮當遷無可疑者又言宗廟之禮有天下者事七世百王之所同也而崇寧以來増為九世三年一祫則叙昭穆而合食於祖百王之所同也而去冬祫享祖宗並為一列謂之隨宜設位夫増七廟而為九踵唐開元之失其非禮固已明甚至於不序昭穆而强名為祫則歴代未嘗聞究其所因直以廟之前楹迫狹憚於増廣而已夫重葺數檐之屋輕變千古之禮臣所未諭且君子將營宫室宗廟為先今行朝官府下逮諸臣之居每加營繕顧於宗廟獨有所靳節用之術豈在是乎大扺前日之肆為紛更則曰自我作古今日之務為茍簡則曰理合隨宜要皆無所據依不可為法臣今所陳定七廟之禮正太祖之位如或上合聖意願詔有司他年祫享必叙昭穆以别東向之尊勿以去冬所行為例庶㡬先王舊典不廢墜於我朝使天下後世無得而議詔侍從臺諌禮官赴尚書省集議聞奏時侍從臺諌禮官等皆謂太祖開基創業為本朝太祖正東向之位為萬世不祧之祖理無可疑廖剛謂四祖神主當遷之别宫祫祭則即而享之五年一禘則當禘僖祖任中先謂祫祭既正太祖東向之位則大禘之禮僖祖實統系之所自出太祖暫詘東向而以世次叙位在理為當晏原復謂正太祖東向之位以遵祫享之正禮僖祖而下四祖則參約漢制别為祠所而異其祭享無亂祫享之制議上不果行自是遇祫享設幄僖祖仍舊東向順祖而下以昭穆為序蕙田案太祖正東向之位禮之經也四祖祀於别殿禮之權也董弅王普所奏為得經權之宜然遷延日乆至寧宗而後斷然行之豈不難哉文獻通考孝宗乾道三年禮部太常寺言孟冬祫享其别廟懿節皇后神主依禮例合祔於神宗室祖姑之下安穆皇后神主安恭皇后神主合祔於徽宗室祖姑之下詔禮部秘書省國史院官參明典故擬定申尚書省李燾等擬乞以懿節皇后神座設於神宗幄内欽慈皇后之右少却安穆皇后安恭皇后神座設於徽宗幄内顯仁皇后之左皆少却其籩豆鼎俎并祝詞等别設並如舊制仍候酌獻祖宗位畢方詣三后位詔從之吏部尚書江應辰等言準尚書省送到太常少卿林栗劄子祫享之禮古人不以别廟祔姑而祔於祖姑者以别嫌也案曲臺禮别廟神主祔於祖姑之下有三人則祔於親者既祔於祖姑又各祔於親者之下明共一幄同享一位之薦不得别設幄次矣從來有司失於檢照將别廟神主祔享之位别設幄次若别設幄次當在舅姑之下豈得上祔於祖姑乎今來太廟祫享懿節皇后袝於神宗幄祖姑之下别設幄次在哲宗徽宗之上此其不可者一也神宗與三后共享一位犧牲粢盛之薦而懿節來祔獨享其一今來安穆皇后安恭皇后各設幄次祔於徽宗幄祖姑之下徽宗與三后共享一位之薦而安穆安恭共享其二揆之人情夫豈相逺此其不可者二也且祔之言附也孫婦之於祖姑其尊卑絶矣禮無不順祔豐而尊殺祔伸而尊屈將得為順乎栗竊謂别廟神主祔於祖姑之下宜執婦禮不當别設幄次陳其籩豆列其鼎爼亦不當别致祝詞但於本幄祖姑之下添入别廟祔享某皇后某氏於禮為稱蕙田案祔於祖姑者昭穆同也若另設幄便失祔義林議是淳熙元年詔議祫享東向之位吏部侍郎趙粹中言謹考前代七廟異宫合享則太祖東向始得一正太祖之尊倘祫享又不得東向則開基之祖無時而尊矣乃者紹興五年董弅建議乞正藝祖東向之尊謂太廟世數已備而藝祖猶居第四室乞遵典禮正廟制遇祫享則東向得㫖下侍從臺諌集議既而王普復有請當時集議如孫近李光折彦質劉大中廖剛晏原復王俁劉寧正胡文修梁汝嘉張致逺朱震任中先何慤楊晨莊必强李弼直以其議悉合於禮藝祖東向無疑乞行釐正時臣叔父渙任將作監丞因陛對奏陳甚力據引詩禮正文乞酌漢太公立廟萬年南頓君立廟章陵故事别建一廟安奉僖順翼宣四位烝祫禘嘗並行别祀而太祖皇帝神主自宜正位東向則受命之祖不屈其尊逺祖神靈永有常奉光堯皇帝深以為然即擢董弅為侍從叔父渙為御史是時趙霈為諌議大夫以議不已出倡邪説以害正然亦不敢以太祖東向為非不過以徽宗在逺宗廟之事未嘗專議以此宣言脇制議者而欲祫享虚東向今若稽以六經典禮三代之制度定藝祖為受命之祖則三年一祫當奉藝祖東向始尊開基創業之主其太廟常享則奉藝祖居第一室永為不祧之祖若漢之髙祖其次奉太宗居第二室永為不祧之宗若周之武王若僖順翼宣追崇之祖一稽舊禮親盡而祧四祖神主别議遷袝之所則臣亦嘗考之袝於徳明興聖之廟唐制也立太公南頓君别廟漢制也前日王普既用徳明興聖之説而欲祔於景靈宫天興殿朱震亦乞藏於夾室今若酌三代兩漢别廟之制與唐陳京之説或别建一廟為四祖之廟若欲事省而禮簡或祔天興殿或祇藏太廟西夾室每遇祫享則四祖就夾室之前别設一幄而太祖東向皆不相妨庶得聖朝廟制盡合典禮詔禮部太常寺討論既而衆議不同乃詔有司止遵見行祫享舊制行禮紹熙五年閏十月時寧宗已即位詔别建廟遷僖順翼宣四帝神主太廟以太祖正東向之位孟冬祫享先詣四祖廟室行禮次詣太廟逐幄行禮蕙田案太祖至此始正東向之位詳見天子廟制條下孟冬祫享儀注時日太廟三年一祫以孟冬之月其年太常寺預於隔季以孟冬時享前擇日祫享太廟闗太史局擇日報太常寺太常寺參酌訖具時日散告齋戒前享十日受誓戒於尚書省其日五鼔贊者設位版於都堂下初獻官在左刑部尚書在右並南向亞終獻禮官位於其南稍東北向西上監察御史位於其西稍北東向户部兵部工部尚書押樂太常卿光祿卿押樂太常丞光祿丞位於其南稍西北向東上凡設太常丞光禄丞位皆稍却奉禮協律郎太祝大官令内常侍内謁者薦香燈官宫闈令扶持内侍捧腰輿内侍位於其東西向北上捧爼官位其後質明贊者引行事執事官就位立定禮直官引初獻降階就位禮直官贊揖在位者對揖初獻搢笏讀誓文云十月某日孟冬祫享太廟各揚其職不共其事國有常刑讀訖執笏禮直官贊奉禮郎協律郎太祝大官令内常侍以下先退餘官對拜乃退