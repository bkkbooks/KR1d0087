夫通不易一易再易三等之率而家受二夫當二百五十六萬家則一同當二萬五千六百家郊地四同當十萬二千四百家以七萬五千家為六鄉餘二萬七千四百家以二萬五千家為十縣中含鄙五十鄼二百五十餘二千四百家以二千家為四鄙中含鄼二十餘四百家以為四鄼四鄼當亦為一鄙并四鄙當亦為一縣則為縣十一鄙五十五鄼二百七十四也野有甸稍縣疆四等地甸十二同當三十萬七千二百家以七萬五千家為六遂餘當二十三萬二千二百家稍二十同當五十一萬二千家縣二十八同當七十一萬六千八百家疆三十六同當九十二萬一千六百家去六遂家數存二百三十八萬二千六百家則為縣九百五十三中含四千七百六十五鄙也若其家而各有增減則縣鄙亦從而增減焉此所列者皆經傳舉中法也凡公邑皆稱縣鄙稍縣疆有都家則不如郊甸之皆為公邑而亦専計其縣鄙何也曰縣鄙者都家之所居也本大宰及大司徒注故經于采邑必兼都鄙稱之且都家無定數而縣鄙有常計縣鄙則于官爵之多少考稽尤便也何以知郊野官之爵等遞降于遂也曰野與郊之差猶鄉遂也鄉遂制同而鄉內遂外則遂官之爵降鄉官一等故知郊野制同而郊內野外則野之官之爵亦降郊之官一等也至郊在遂內為六鄉餘地而官之爵反降于遂者乃因郊之家亦以縣鄙名為六遂屬别之餘其地等之降固殊常也然則遂人造縣鄙形體之法何在野而不在郊也曰野對郊為甸稍縣疆獨舉則或兼郊或兼郊與鄉遂人治野之溝塗兼郊而復兼鄉也經田野而造縣鄙不兼鄉而已兼郊也則名郊之家為縣鄙也又何疑郊之官自里宰而下野之官自鄼長而下曷不并計其數而列之曰是皆官之無爵者無爵則無祿與遂之鄰長同非考祿所須也至序官之無郊野官文脫耳否則即遂官為例而省也三等國鄉遂之官爵略倣王畿其鄉遂之數何以定之曰凡遂之數與鄉同鄉之數與軍同蓋鄉遂俱萬二千五百家鄉在郊內為正遂在郊外為副而軍則萬二千五百人天子六鄉故為六軍則大國三軍知其三鄉次國二軍知其二鄉小國一軍知其一鄉矣六鄉者六遂則三鄉者三遂二鄉者二遂一鄉者一遂矣費誓曰魯人三郊三遂疏以三郊為三鄉魯次國而三鄉三遂何也曰諸侯地沃民衆蓋亦得為三鄉三遂以就大國之列然侯與伯同七命同食者三之一則二鄉二遂乃其常觀春秋書襄公十二年作三軍則伯禽之後襄公之前嘗為二軍其時固二鄉二遂也王畿之鄉遂比長里宰以下士而大國次國乃無爵何也曰降王畿一等也王制云諸侯之上大夫卿下大夫上士中士下士凡五等是其國不設中大夫故州長遂大夫知並以下大夫為之遞降而下則下士適當為閭胥鄼長矣蕙田案沈氏推周禮官爵之數較之文獻通考更為詳確又地官祗載鄉遂之官而郊野設官獨闕今以王畿百同之地除六鄉六遂外推算得郊內有十一縣五十五鄙二百七十四鄼野有九百五十三縣四千七百六十五鄙凡郊野官六千有四十七人可補向來注家之未備祿田數周天子及內外諸侯官之祿雖其籍皆亡而未嘗不散見經注及他傳記今即官爵公田之數復以所散見者參互考之以悉差其等而粗存其數周天子之官則公食四都孤卿食都中下大夫食縣上士食甸中士食邱下士食邑其庶人在官者食井若在內諸候則公之卿食甸下大夫食邱上士食邑下士與庶人在官者食井孤卿之大夫士食如之大夫之士食亦如之親王子弟之卿大夫士食如公次疏者之大夫士食如孤卿次更疏之士食如大夫若在外諸侯則上公之孤食都卿食縣下大夫食甸上士食邱中士食邑下士與庶人在官者食井侯伯之卿大夫士食亦如之子男之卿食甸下大夫食邱上士食邑下士與庶人在官者食井若內諸侯之加田則其宰各以其爵分食之外諸侯孤卿大夫之加田亦如之凡所食皆取諸公田天子之公田三十二萬夫公三人人食二千有四十八夫凡六千一百四十四夫孤卿十四人人食二百一十二夫凡七千一百六十八人中下大夫三百三十七人人食百二十八夫凡四萬三千一百三十六夫上士千一百五十人人食三十二夫凡三萬六千八百夫中士四千四百九十六人人食八夫凡三萬五千九百六十八夫下士萬九千五百有七人人食二夫凡三萬九千有一十四夫庶人在官者二萬一千七百有三人人食五十畝凡萬有八百五十一夫五十畝又不見于經而推知其爵數者上士十一人食三百五十二夫中士千有八人食八千有六十四夫下士五千有三十九人食萬有七十八夫又所闕冬官之有爵者約五百二十餘人其所食以五官食數去其公孤及鄉遂郊野官之食公孤去七千六百八十夫鄉遂官去十二萬五千五百二十夫郊野官去萬八千四百九十四夫存三萬五千有三十夫而五分取一以例之當食七千有餘夫所闕庶人在官者約四千三百四十人以五官在官庶人之食例之當食二千一百七十夫通計二十萬六千七百四十餘夫為員備位定而數可周知者常祿之總數王自食二萬有四百八十夫后世子與王子弟之未官未封者婦官女給事王宫士庶子之食及國中之法用皆于是給焉其外九萬二千七百七十餘夫以食他有爵之官及在官庶人以給國中及鄉遂郊野之法用亦分在所封都邑中若內諸侯之公田公二千有四十八夫王食者五百一十二夫自食者三百二十夫其卿二人食六十四夫下大夫五人食四十夫上士七人食十四夫下士三十三人食十六夫五十畝凡百三十四夫五十畝存千有八十一夫強孤卿五百一十二夫王食者百二十八夫自食者八十夫其大夫二人食十六夫上士七人食十四夫下士八人食四夫凡三十四夫存二百七十夫大夫百二十八夫王食者三十二夫自食者二十夫其上士二人食四夫下士七人食三夫五十畝凡七夫五十畝存六十八夫強凡所存皆以食他有爵之官及在官庶人與給國中縣鄙之法用其所加之公田皆食其宰與給縣鄙之法用若外諸侯之公田上公八萬夫王食四萬夫自食者五千一百二十夫其孤一人食五百一十二夫卿六人食七百六十八夫下大夫二十三人食七百三十六夫上士百一十七人食九百三十六夫中士六百七十六人食千三百五十二夫下士三千有五人食千五百有二夫五十畝凡五千八百有六夫五十畝存二萬九千有七十三夫強侯五萬一千二百夫王食者萬七千有六十六夫強自食者千二百八十夫其卿五人食六百四十夫下大夫十七人食五百四十四夫上士八十七人食六百九十六夫中士四百四十四人食八百八十八夫下士千九百六十九人食九百八十四夫五十畝凡三千七百五十二夫五十畝存二萬九千一百夫強伯二萬八千八百夫王食者九千六百夫自食者如侯其卿五人下大夫十七人上士八十七人食並如侯國中士三百七十二人食七百四十四夫下士千六百一十一人食八百有五夫五十畝凡三千四百二十九夫五十畝存萬四千四百九十夫強子萬二千八百夫王食者三千二百夫自食者三百二十夫其卿四人食百二十八夫下大夫十一人食八十八夫上士五十七人食百一十四夫下士三百有五人食百五十二夫五十畝凡五百四十四夫五十畝存八千七百三十五夫強男三千一百夫王食者八百夫自食者如子其卿四人下大夫十一人上士五十七人食並如子國下士百五十一人食七十五夫五十畝凡四百有五夫五十畝存千六百七十四夫強凡所存以給他祿食及法用與在所封都邑中悉如王畿凡外諸侯食王自九貢而外皆供王行及使于諸侯及諸侯見王使于王往來過邦及王所以救邦國之食與內諸侯之入稅殊若畿內賞地加賞田及致仕官進士學士守固士庶人之食並無常數則減省攝官試官封邑官之食足以當之畿外國亦如之天子之公食四都孤卿食都中下大夫食縣何以知之曰載師以家邑之田任稍地以小都之田任縣地以大都之田任疆地家邑即縣注云大夫之采地包乎中下小都即都注云卿之采地兼乎孤大都即四都注云公之采地夫公孤卿大夫之采地如是則未封者之所食可例推矣所以例推者何曰小宰聼祿位以禮命明制祿之多寡本以爵等而兼命數也典命云王之三公八命其卿六命其大夫四命及其出封皆加一等是出封之前不以采地之有無而殊其命數明矣疏云王朝公卿大夫亦有舊在畿內有采地之封者今乃封于畿外也夫命數同者雖爵異而祿亦同故孤卿皆六命則皆食都中下大夫皆四命則皆食縣况爵等與命數俱同者寧以封不封而殊其食也封邑者之所食以報其大功德也豈未封邑而不之稍殊乎曰封邑者其公田之入有貢于王然兼有山澤林麓之利且子孫世守之若未封者固無地貢而祿僅公田之入亦及身而止則所食雖同而多寡久近未嘗不稍殊也上士食甸中士食丘下士食邑庶人在官者食井何以知之曰由大夫食縣而差之每上以四則每下亦以四也是何田與爵之適相當也曰田自邑至都止五等四其都亦止六等而孤在卿上大夫有中下爵本八等若不令孤卿同六命中下大夫同四命以并爵為六等則上下之田安得皆以四為差是田與爵之適相當者由命數齊之蓋聖人于爵祿命三者固更迭參互以各得其制也上公之孤食都卿食縣下大夫食甸上士食丘中士食邑下士與庶人在官者食井何以知之曰凡命數同者祿亦同則命數殊者祿亦殊典命云公之孤四命其卿三命其大夫再命其士一命命各半於王國則其食當亦降於王國矣降止一等者以降二等則下士將不得祿也侯伯之卿大夫士食如公之國也何以知之曰典命稱侯伯之卿大夫士其命數皆如公國則其祿亦皆如公國也士之一命上中下同乎曰中下士不命其祿秩専以爵等耳何以知中下士不命也曰卿三命半王之卿大夫再命半王之大夫其上士之命適半王之中士而中下士不得命矣且卿三命比王之上士大夫再命比王之中士則一命而比王之下士者必上士獨也凡卿之食縣下大夫之食甸有徴乎曰左傳衛免餘云惟卿備百邑見襄二十七年鄭志以為邑方二里見坊記疏熊氏説熊以免餘辭邑之言當據古法故如此釋之杜氏解左傳謂一乘之邑則據當時僣擬説誤也是百邑即方二十里之縣也若計其地則三分去一田止六十四邑若百邑皆田則是縣之有加田者俱卿所食也易訟卦邑三百户鄭注云小國之下大夫采地方一成其定稅三百家見坊記疏小當作大惠定宇云訟九二不克訟歸而通其邑人三百戶旡眚鄭以爻位二為大夫三百户于采地為至薄苟自藏隱守至薄之祿而不敢與五為敵則旡眚也但采地三百户在大國誠至薄在小國未嘗不厚小字恐大字之誤成去三之一即甸也有此二徴而上下皆可無疑矣若未封者之食與已封者同亦如畿內耳晉語叔向云大國之卿一旅之田上大夫一卒之田按彼卿之祿如此下大夫彼上大夫之祿如此上士蓋一旅之田即一甸不易者一卒之田即一邱不易者也時雖多所變更猶有周官遺制子男之卿食甸下大夫食邱上士食邑下士與庶人在官者食井何以知之曰子男無中士故上士降而食邑上士食邑則卿大夫之食之遞降明矣大國次國卿大夫士之食既降於王國一等而小國又降於大國次國一等何也曰子男之卿再命其大夫一命其士不命皆降大國次國一等故也此亦以命數之殊而殊其祿也庶邦孤卿大夫之加田其宰各以其爵而分食如王畿也可悉推而知乎曰宰者家之貴臣也喪服傳謂之室老曲禮謂之家相詳喪服傳注疏在王畿公以卿為之孤卿以大夫為之大夫以上士為之由王畿例推而下則上公之孤之宰當卿卿之宰當大夫大夫之宰當上士侯伯之卿之宰當大夫大夫之宰當上士子男之卿之宰當上士矣有徴乎曰論語稱公叔文子之臣為大夫檀弓稱陳子車之宰為家大夫明侯國之卿其家臣有大夫而大夫即其宰也潘景昶云陽貨為季氏宰而援大夫之禮自處亦以此則餘所推者宜亦無不得矣文子子車果皆為卿乎曰苛子車非卿而大夫其宰安得並稱大夫至文子聼衛國之政亦見檀弓焉有聼國政而非卿者何以知上公之孤之宰非大夫而卿也曰上公之孤四命燕禮稱孤為公蓋如王之公王之公以卿為宰故知上公之孤亦以卿為宰而不與三命卿之宰同也王之公果以卿為宰乎曰左傳有所謂王叔之宰者王卿士之大夫也襄十年傳云王叔之宰與伯輿之大夫坐獄于王庭按王叔伯輿皆王卿士宰即大夫大夫即宰互文也卿以大夫為宰則公之宰卿而大夫之宰上士皆可知矣凡宰之人數各有幾曰制事之謂宰本白虎通蓋家止一人猶王之有冡宰諸侯之有執政也其宰之各分加田而食也如之何曰王之公之卿食甸則上公之孤之卿亦食甸矣王之孤卿之大夫食邱則上公侯伯之卿之大夫亦食丘矣王之大夫之上士食邑則上公侯伯之大夫之上士子男之卿之上士亦食邑矣子男之卿之宰亦上士而食邑何以知之曰以子男之卿再命與公侯伯之大夫同也蕙田案官必有祿祿出於田自周官司祿經亡注家未得其法數歐陽永叔始有官多田少祿將不給之難後之篤信周官者不能無疑其説吳江沈氏彤作祿田考以官爵及公田二者一一推算其確數官數則於鄉遂屬吏之外并郊野之吏而補之田數則去山林川澤等三之一又通不易一易再易之率以二夫當一夫然後以縣都邱甸井邑六等之田當公卿大夫士五等之爵不獨相當且有餘田以供他用而歐陽子之疑可不辨自明矣此説有功於周官甚大故備採其義於此又案以上論周官官數及田祿之數鄭氏伯謙曰或問太宰至旅下士其為官凡六十有三而為府者六為胥與史者皆十有二而為徒者百有二十何也曰此皆兼官也専官行事則不足兼官行事則有餘矣蓋自唐虞以來禹以司空而兼百揆羲和以二人而兼四嶽及舜二十二人之咨則四嶽實一人兼之古者官不必備惟其人而已有其人則備無其人則兼是以周官之作實效唐虞之制而官事不攝吾夫子所以深責管仲變先王之法也以三公言之召公為保周公為師而太傅無有焉召公實兼之也周公既沒召公為保而太師太傅無有焉召公實兼之也不惟此也三公之下實有三少當時不見其人召公又兼之乃同召太保奭苪伯彤伯畢公衛侯毛公是六卿之長召公又兼之蓋一人之身而兼總七職矣抑不惟此也當時三公三少既難其人而六卿之官亦不必備周公以三公兼冡宰召公以三公兼宗伯蘇公以三公兼司冦畢公毛公以三公兼司馬司空惟成王之季年芮伯彤伯衛侯實専領司徒宗伯司冦之職其餘大抵皆兼官也其大者猶兼而况于百官羣有司乎故嘗以周禮考之二鄉則公一人是三公兼鄉老也一鄉則卿一人是六卿兼鄉大夫也軍將皆命卿是六卿又兼六軍之將也甚者太公以太師而兼司盟之職載在盟府太師職之是也蘇公以三公而兼太史之職太史司冦蘇公是也故夫六官之中以春夏秋冬為通率以多少相乘除大約一官凡五百人則六官凡三千人而其兼行權攝者意其必相半焉天官卿大夫命士三百五十餘人地官除鄉遂山虞林衡司門司關不可考尚四百餘人春夏秋三官凡五百餘人是六官通率之凡三千人也是以局分不必設府史胥徒不别置雖置而其數亦未嘗過濫也且不見鄉老遂師而下乎府史胥徒四者俱無有何獨于天官冡宰而疑之也若夫専官行事勢宜多而不宜省則􅘋人之與甸師其徒皆三百人而春官御史其史則百有二十八矣葉氏時曰周官曰唐虞官百夏商官倍考之周禮六官之屬凡三百六十是周官又倍于夏商也案天官之屬六十有二地官七十有九春官七十有一夏官七十秋官六十有六凡三百五十有二冬官不預小宰言三百六十者舉大數也不特此耳天官自太宰小宰宰夫至旅下士凡六十有三此卿大夫士之數也為府者六為胥為史者皆十有二為徒者百有二十凡百有五十人此庶人在官之數也地官春官秋官皆然夏官掌兵則史十六人胥三十二人徒二百二十人通六官計之已一千五百有二人其餘六官之屬除地官鄉遂山澤等官及庶人在官者只合大夫士計之以多少相凖一官不下四百人合長二而言則六官幾三千人矣成周官吏可謂繁冗然卿大夫士之職分為六官之屬安知其不為兼官耶且以三公言之君奭曰召公為保周公為師則太傅不備矣顧命曰乃同召太保奭則太師太傅不備矣又有公兼冡宰者惟周公位冡宰是也有公兼司冦者太史司冦蘇公是也太保率西方諸侯畢公率東方諸侯又以公兼二伯也至如召太保奭芮伯彤伯畢公衛侯毛公此六卿之長也而以三公侯伯領之大而公卿必相兼攝則下而百司庶府獨不可兼攝乎案周禮言二鄉則公一人是三公兼鄉老也一鄉則卿一人是六卿兼大夫也六軍將皆命卿是六卿又兼六軍之將也世婦每官卿二人是六卿又兼六宫之職也世婦謂每官二人則十有二人其六卿之長二乎以此推之如地官鄉遂之官夏官司馬之屬必皆六卿之屬兼之六鄉之屬雖各有名大抵多兼攝也而况官屬有不可以専置者地官如迹人角人羽人掌炭掌荼等職只征一物秋官如庶氏冥氏穴氏硩蔟氏赤犮氏等官只攻一事豈無可兼者乎有不可常置者田詛則有甸祝詛祝祭祀軍旅共杖禁囂則有伊耆氏銜枚氏喪紀則有職喪喪祝夏采豈無可攝者乎若夫地官比閭族黨鄰里都鄙等官並無府史胥徒可知其使民興賢出使長之也其他如春官大司樂大胥太師太卜太祝太史夏官太僕小臣祭僕戎右齊右道右大馭戎僕齊僕田僕馭夫秋官大行人小行人司儀等官亦無府史胥徒非上下相兼則它官相攝也惟夫相兼攝也則官制雖倍于古而其職不冗于古也大抵官惟其人雖公不備官事不攝夫子譏之然則成周之官雖無慮三千員而實不過三百六十屬也蓋古者天子建官三公九卿二十七大夫八十一元士今案周禮鄉老即三公鄉大夫軍將世婦即六卿則知六官三百六十屬亦惟以此等大夫士為之雖六官所謂大夫士之數如彼其多其為兼攝可知矣至于府史胥徒之在官者天官有三千六百六十有六人春官有二千二百四十有一人夏官有三千二百六十有五人秋官二千六百五十有七人地官無常數冬官不可考只以四官計之已萬人矣是皆使民興能入使治之也其徒則大司徒起徒役而為之與考論周之官制大而公卿長二次而大夫士之屬既有兼攝則官何嫌于冗下而比閭族黨小而府史胥徒之衆又興于民則數何嫌于多乎蓋周人因事以置官周禮因官以存名居官而不兼其職則官冗兼官而不存其名則官廢知周禮兼官之職又知周禮存官之名則可與言官制矣蕙田案鄭氏葉氏論六官可以相兼攝不必備其人其説善矣然其中亦多疏舛如鄉大夫主六鄉之政其事甚繁春官之世婦係內職豈得以六卿兼之又如三公三孤官不必備周公召公為師保而太傅及三孤不見謂之不備可也謂召公兼之則伯謙之臆説也大司樂與樂師同署大胥與小胥同署大師與小師同署大卜與卜師卜人同署大祝與小祝同署大僕小臣祭僕與御僕同署大行人小行人司儀與行夫同署故府史胥徒共之葉氏謂大司樂諸官俱無府史胥徒然則大宰小宰亦無府史胥徒乎惟車右與御身執其事故不設府史胥徒耳讀者宜分别觀之周氏世樟曰設官一事代有不同繁簡因革之間大抵視世運為升降唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政和焉萬國寧焉然足以治唐虞之天下或不足以治後世之天下于是乎夏商則倍之夏之官制史傳缺如弗可深考或以王制三公九卿一説當之殆未必然商之官制見于曲禮有六太有五官有六府有六工官雖未必盡此而此亦其大略也周之成王仰法前代訓迪厥官周官一篇曉暢言之顧苐舉其綱未及其目周禮之三百六十屬則及其目矣夏商倍于唐虞則周之倍于夏商槩可知也乃若猶是官也有古重而後世輕者少昊名官首及歷正唐堯分職先命羲和至于後世星術之屬降為雜流矣有古設而後世廢者太皥以還皆有五行之官若句芒若祝融若蓐收若元冥若后土封為上公祀為貴神至于後世不過司天一家略寓其意其實官之廢則已久矣有猶是官而分合異者有虞之時伯夷典禮后夔典樂而兵刑並掌于臯陶至于後世禮樂合為一官而兵刑分為二矣有猶是官而統屬異者殷之太宗太史太祝太士太卜皆屬于太宰其五官則有司士無宗伯至周則改司士為宗伯而祝宗卜史悉屬之矣凡此設官之不同總因世運為升降耳蕙田案此條論上古及三代官制之同異周禮春官大宗伯以九儀之命正邦國之位注每命異儀貴賤之位乃正春秋傳曰名位不同禮亦異數一命受職注始見命為正吏謂列國之士於子男為大夫王之下士亦一命鄭司農云受職治職事再命受服注鄭司農云受服受祭衣服為上士元謂此受元冕之服列國之大夫再命於子男為卿卿大夫自元冕而下如孤之服王之中士亦再命則爵辨服三命受位注鄭司農云受下大夫之位元謂此列國之卿始有列位于王為王之臣也王之上士亦三命四命受器注鄭司農云受祭器為上大夫元謂此公之孤始得有祭器者也禮運曰大夫具官祭器不假聲樂皆具非禮也王之下大夫亦四命五命賜則注鄭司農云則者法也出為子男元謂則地未成國之名王之下大夫四命出封加一等五命賜之以方五百里二百里之地者方三百里以上為成國王莽時以二十五成為則方五十里合今俗説子男之地獨劉子駿等譏古有此制六命賜官注鄭司農云子男入為卿治一官也元謂此王六命之卿賜官者使得自置其臣治家邑如諸侯七命賜國注王之卿六命出封加一等者鄭司農云出就侯伯之國八命作牧注謂侯伯有功德者加命得専征伐于諸侯鄭司農云一州之牧王之三公亦八命九命作伯注上公有功德者加命為二伯得征五侯九伯者鄭司農云長諸侯為方伯典命掌諸臣之五等之命注五等謂孤以下四命三命再命一命不命也疏此經諸侯五等在諸侯之下既無一命以至五命明臣有五等通不命也據下文大國孤四命其卿三命大夫再命士一命侯伯之卿以下如公子男之卿再命大夫一命士不命王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之注四命中下大夫也出封出畿內封于八州之中加一等褒有德也大夫為子男卿為侯伯其在朝廷則亦如命數耳王之上士三命中士再命下士一命疏王之三公八命其卿六命其大夫四命皆是在朝者及其出封皆加一等者三公八命者為九命上公六命卿為七命侯伯四命大夫為五命子男其國家官室車旗衣服禮儀亦以命數為差也注云四命中下大夫者見序官有中下大夫于此經唯見四命大夫是知中下大夫同四命也云出封出畿內封于八州之中者其王朝公卿大夫亦有舊在畿內有采地之封是封畿內者也今乃封于畿外在八州之中為諸侯也云加一等褒有德也者王朝公卿大夫無功可進無過可退者不得出封以知加一等為南面之君者是褒有德也卿為侯伯大夫為子男鄭不言三公者雖出封加命爵仍是公不異故不言也云王之上士三命中士再命下士一命經既不言而鄭言之者此典命所以主命數序官有三等之士此文不見故以意推之必知士有三命以下者見經大夫四命四命以下惟有三等之命序官有上士中士下士故以三等之命而説之也然公卿大夫以八命六命四命為隂爵者一則擬出封加為陽爵二則在王下為臣是隂官不可為陽爵故也士既無出封之理又極卑賤故有三命一命為陽爵無嫌也公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各視其命之數注視小國之君者列于卿大夫之位而禮如子男也鄭司農云九命上公得置孤卿一人春秋傳曰列國之卿當小國之君固周制也元謂王制曰大國三卿皆命于天子下大夫五人上士二十七人次國三卿二卿命于天子一卿命于其君下大夫五人上士二十七人小國二卿皆命于其君下大夫五人上士二十七人疏案大行人云大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君鄭注云此以君命來聘者也孤尊既聘享更自以其贄見執束帛而已豹皮表之為飾繼小國之君言次之也其他謂二車及介牢禮賔主之間擯將幣祼酢饗食之數以此而言則以皮帛者亦是便以贄見若正聘當以圭璋若然彼云繼小國之君謂執皮帛次小國之君後則與此注列于卿大夫位一也此言視小國之君注云而禮如子男則彼其他視小國君并彼注二車及介以下是也昭二十三年左傳云叔孫婼為晉所執晉人使與邾大夫坐訟叔孫曰列國之卿當小國之君固周制也先鄭引魯之卿以證孤者孤亦得名卿故匠人云外有九室九卿朝焉是并六卿與三孤為九卿亦名卿者以其命數同也魯是侯爵非上公亦得置孤者魯為州牧立孤與公同若然其孤則以卿為之故叔孫婼自比于孤也王制之文多據夏殷此命卿亦是夏殷法故彼下文大國之卿不過三命下卿再命小國之卿與下大夫一命鄭注云不著次國之卿者以大國之下互明之此卿命則異大夫皆同以此言之則大國卿三命次國卿與大國卿同再命小國卿與大夫同一命彼注即引此周禮命卿大夫之法以證與古不同之義若然此引彼夏殷命臣法周禮諸侯卿大夫命雖與古不同五等諸侯國國皆有三卿得天子命者與夏殷同故引之若然云大國三卿皆命于天子者上卿則命數足矣中卿天子再命巳君加一命亦為三命下卿天子一命若夏殷己君加一命二命足矣周則已君加二命為三命亦足矣云下大夫五人不言命數者並不得天子命夏殷並巳君加一命周則大國之大夫再命也夏殷之士不命其二十七士亦應有上九中九下九而皆云上士者亦是勉人為髙行故總以上士言之也次國三卿上卿天子二命已君不加中卿天子一命巳君加一命下卿天子不命已君亦加二命為再命故云一卿命于其君是次國之卿皆再命也若周禮次國卿並三命亦下大夫五人上士二十七人義與大國同也小國二卿皆命于其君案彼鄭注云此文似誤脫云脫者類上文大國次國則此小國亦當有三卿宜云小國三卿一卿命于天子二卿命于其君則是脫亦三卿一卿命于天子九字矣云誤者次國云二卿命于天子不言皆此小國云二卿皆命于其君而言皆是誤故云誤也若依此三卿解之則三卿之內一卿命于天子為一命二卿命于其君亦各一命亦下大夫五人上士二十七人義與上同也若周禮小國三卿皆再命亦一卿命于天子一命已君加一命為再命二卿命于其君不得天子命並已君再命矣又周法次國五大夫亦與大國五大夫同再命小國下大夫五人各一命其士公侯伯之士同一命子男之士不命與夏殷同此文是也大司馬云大國三軍次國二軍小國一軍軍將皆命卿者謂得天子之命者得為軍將也若然諸侯之臣有四命三命再命一命不命而經云各視其命數者謂宫室之等四命者四百步二軍四乘旗四斿冕服四章三命者以三為節再命一命者亦以命數為降殺也但大夫元冕一命者一章裳上刺黻而已衣無章故得元名則冕亦象衣無旒其士服爵辨並無章飾是以變冕言爵辨也諸侯之大夫一命已上即有二車士雖一命亦無二車天子之士再命已上可有二車也蕙田案春秋成二年傳公賜晉三帥先路三命之服襄十九年傳公賜晉六卿三命之服此侯伯之卿皆三命之證也昭十二年傳叔孫昭子以再命為卿後更受三命叔仲子曰三命踰父兄非禮也則魯亦有再命之卿僖三十三年傳晉襄公以再命命先茅之縣賞胥臣以一命命郤缺為卿則晉亦有再命一命之卿大約諸侯之卿其命數以次而加但不得過三命耳又案以上諸臣命數之等右周禮官制下周禮天官冡宰乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔注侯伯有功德者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國書曰王啓監厥亂為民參謂卿三人伍謂大夫五人鄭司農云殷治律輔為民之平也玄謂殷衆也謂衆士也王制諸侯上士二十七人其中士下士各居其數之三分輔府史庶人在官者也國疏每州之中立一牧每國之中立一諸侯使各監一設其參者謂諸侯之國各立三卿傳其伍者謂三卿下各立五大夫陳其殷者謂三卿下各陳士九人三九二十七置其輔者謂三卿下各設府史胥徒諸侯三卿司徒司馬司空也大夫五人謂司徒下二大夫一大夫為司徒大夫一大夫為大宰大夫司空下二大夫一大夫主司空事一大夫為司寇大夫司馬事省闕一大夫故五人其伍言傅者大夫上有卿下有士受上政傅于下受下政傅于上故獨云傅朱子曰監疑謂天子大夫為三監者蓋謂之邦國則固已有君矣但建牧立監以佐之設卿大夫士以輔之耳乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔注謂公卿大夫王子弟食采邑者兩謂兩卿不言三卿者不足于諸侯鄭司農云兩謂兩丞疏公卿王子弟為采邑之主以是一邑之長故言長每采地之中立兩卿案典命云三公八命其卿六命其大夫四命大宗伯云六命賜官彼注王六命之卿賜官者使得自置其臣治家邑如諸侯則此云長唯據公卿巳下大夫四命不合立官此并言大夫者以大夫雖立官不與公卿同亦得稱長是廣解長義其實大夫不合有兩卿五大夫當與諸侯之卿同官事當相兼也親王子弟食邑與三公同在五百里疆地各百里其次疏者在四百里縣地各五十里與六卿同已上二者得立兩卿五大夫之等其次更疏者在三百里稍地各食二十五里與大夫同不得立兩卿五大夫亦職相兼也畿外諸侯南面為尊故得伸而立三卿天子三公六卿雖尊以其在天子之下故屈而立兩卿沈氏彤曰疏以大夫降于卿不合有兩卿五大夫豈知卿降于公而亦不容有乎故惟在公則兩為卿伍為大夫殷為上士若在卿則兩為大夫伍為上士殷為下士在大夫則兩為上士伍為下士春秋傳謂周公舉蔡仲為己卿士瑕禽為王卿士伯輿之大夫是公之兩為卿卿之兩為大夫皆有明徴而其下可例推矣蕙田案邦國畿外諸侯也都鄙畿內諸侯也周禮不及侯國之官制惟見于此而命數則詳于典命職云書酒誥豫惟曰汝劼毖殷獻臣傳劼固也我惟告汝曰汝當固慎殷之善臣信用之侯甸男衛矧太史友內史友傳侯甸男衛之國當慎接之况太史內史掌國典法所賔友乎越獻臣百宗工矧惟爾事服休服采傳於善臣百尊官不可不慎况汝身事服行美道服事治民乎矧惟若疇圻父薄違農父傳圻父司馬農父司徒身事且猶敬慎况所順疇咨之司馬乎况能迫回萬民之司徒乎言任大若保宏父定辟矧汝剛制于酒傳宏大也宏父司空當順安之司馬司徒司空列國諸侯三卿慎擇其人而任之則君道定梓材汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人朱子曰牧誓所言司徒司馬司空蓋未克商時侯國之官故內則以冡宰敷教而鄭氏以為諸侯并六卿為三故以司徒兼冡宰皆諸侯三卿之證也唯宋得備六官説者以為二王之後得用天子制度理或然也春秋定公四年左氏傳祝宗卜史注大祝宗人大卜大史凡四官備物典策官司彛器命以伯禽而封於少皥之虛蕙田案春秋時侯國各有祝宗卜史之官皆世其職蓋始封時所授也禮記明堂位有虞氏官五十夏后氏官百殷二百周三百凡四代之官魯皆兼之疏此明魯家兼有四代之官然魯是諸侯案太宰職諸侯惟有三卿五大夫故公羊傳司徒司空之下各有二小卿司馬之下一小卿是三卿五大夫也今魯雖被褒崇何得備立四代之官而備三百六十職者當成王之時褒崇于魯四代官中雜存官職名號是使魯有之非謂魯得盡備其數但記者盛美于魯因舉四代官之本數而言之周氏世樟曰侯國官制但有司徒司馬司空而無太宰宗伯司冦牧誓酒誥立政諸篇皆同及考左傳諸國皆有司冦而魯有夏父弗忌為宗伯國語單子過陳篇稱宗祝執祀司冦詰姦似侯國雖無太宰而仍有宗伯司冦何也蓋宗伯司冦侯國本無比二官左傳所言者乃東周諸侯之所添設也古者天子一事設一官諸侯不能備官一人常兼二三事故崔氏云司徒兼冡宰司馬兼宗伯司空兼司冦及東周時諸侯皆帝制自為管仲以大夫之家而官事不攝况諸侯乎然而三卿舊制終不可沒即以左傳觀之子産入陳命司徒致民司馬致節司空致地杜泄謂季孫曰吾子為司徒叔孫為司馬孟孫為司空皆三卿並列而不及宗伯司冦其為添設明矣侯國無太宰惟宋為王者之後故有之若吳楚之有太宰僣也侯國之禮官但有宗人無宗伯其刑官但有小司冦及士師無大司冦侯國之有宗伯大司冦亦僣也王制三等之國皆有五大夫所謂五大夫者崔氏云司徒之下置小宰及小司徒也司空之下置小司冦及小司空也司馬之下置小司馬也至于宗人併不在五大夫之列按成王封魯分以祝宗卜史則宗人之秩蓋在卜祝之間也右周侯國官制五禮通考卷二百十五
