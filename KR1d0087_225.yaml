body:
  text: 五禮通考卷二百十五刑部尚書秦蕙田撰嘉禮八十八設官分職周禮政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人注輿衆也行謂軍行列晉作六軍而有三行取名於此疏史胥徒獨多於四官者軍事尚嚴特須監察故也黃氏度曰司馬置屬與五官稍異小司馬而下有軍司馬輿司馬行司馬輿司馬掌車行司馬掌徒軍司馬兼掌之蕙田案春秋之世晉作三軍以其將佐為六卿而每軍别置司馬即周禮之軍司馬也凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長注軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選於六官六鄉之吏自卿以下德任者使兼官焉一軍則二府六史胥十人徒百人司勳上士二人下士四人府二人史四人胥二人徒二十人注鄭司農云勳功也此官主功賞故曰掌六鄉賞地之法以等其功疏軍以賞為先故首司勳注陳氏傳良曰六功戰居一而司勳𨽻政官何也軍政賞不踰時屬之他官則司存散隔文告回復而壅底之患生况有害功者乎馬質中士二人府一人史二人賈四人徒八人注質平也主買馬平其大小之賈直薛氏衡曰馬質宜為校人之屬今列此者校人兼掌六馬而戎馬之用尤多其事尤急先儒謂序官先後不以尊卑直取事急者居前事緩者居後是也量人下士二人府一人史四人徒八人注量猶度也謂以丈尺度地疏以其掌營軍之壘舍量其市朝州塗軍社之所理其間雖有餘事要以軍事為重故列職於此小子下士二人史一人徒八人注小子主祭祀之小事羊人下士二人史一人賈二人徒八人司爟下士二人徒六人注故書爟為燋杜子春云燋當為爟書亦或為爟爟為私火玄謂爟讀如豫若觀火之觀今燕俗名湯熱為觀則爟火謂熱火與陳氏傅良曰司爟之職此聖人觀天地之變順隂陽消息之宜察寒暑往來之節故得裁成輔相之道此意極大王氏應電曰萬物所以得生者隂陽二氣而已陽之盛為火之熱而物以暢茂條逹否則萎而不榮隂之極為氷之寒而物以縮聚凝結否則散而不收然火有出入當出而太早則過盛而為災當伏而不伏則錯行而傷隂此春秋所以出火納火也氷有藏啓藏之以抑伏藏之火俾之伏息啓之以發沉伏之隂俾得制火此冬春所以藏氷開氷也周公設司爟凌人二職調元之道也若秋官司烜氏但取火之名以為用而已髙氏愈曰自司勳至司爟共六官各有司存而不相統攝然司勳以下三官夏官所重而司爟羊人協于大夏南方之火故先列之掌固上士二人下士八人府二人史四人胥四人徒四十人注固國所依阻者也國曰固野曰險易曰王公設險以守其國司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人注疆界也候人上士六人下士十有二人史六人徒百有二十人注候候迎賔客之來者環人下士六人史二人徒十有二人注環猶郤也以勇力郤敵挈壺氏下士六人史二人徒十有二人注挈讀如潔髮之挈壺盛水器也世主挈壺水以為漏髙氏愈曰自掌固至環人共五官皆主封疆防禦巡徼之事禦姦宄而察非常宜在所先矣而挈壺氏縣壺戒夜亦軍務所重故附焉明代欽天監有挈壺正一人蓋猶用此名但周官以縣壺警夜為重故屬之司馬後世以定晷刻分晝夜為重故屬之司天監耳射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人疏射武事故在此薛氏衡曰先王於祭祀則有射於燕饗則有射文事而兼武守重其職故以下大夫為之服不氏下士一人徒四人注服不服不服之獸者射鳥氏下士一人徒四人疏射鳥亦武事故在此黃氏度曰射人與司士諸子聨職而以服不氏以下四官參其間服不氏待獲射鳥氏取矢終射義也羅氏下士一人徒八人注能以羅網搏鳥者郊特牲曰大羅氏天子之掌鳥獸者掌畜下士二人史二人胥二人徒二十人注畜謂斂而養之髙氏愈曰自服不氏至掌畜凡四官或養獸或養鳥或射羅鳥其職相類而服不射鳥二官皆有職於射者故次于射人之下王氏傳則以為天文南方為朱鳥故掌畜屬之夏官也司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人疏其職掌詔爵祿贊大司馬進賢興功故列職於此郝氏敬曰案王制大司樂論造士升之司馬司馬論進士之賢者告于王而官之故司士為司馬之屬蕙田案殷制以司士與司徒司馬司空司冦並列為五官至周禮改為司馬之屬然以下大夫為之則其任亦重矣諸子下大夫二人中士四人府二人史二人胥二人徒二十人注諸子主公卿大夫士之子者或曰庶子司右上士二人下士四人府四人胥八人徒八十人注右謂有勇力之士充王車右髙氏愈曰戎右齊右係中下大夫而司右為上士者蓋司右所掌但國中勇力之士能用五兵而為羣車之右者耳若戎右齊右皆于羣右之中選其德力之尤者而又積日纍勞功績顯著始居其官則其爵已尊于羣右之上而非復司右之屬矣故其官另立而不次于其下自司士至司右凡三職一掌羣臣之版一掌國子之倅一掌羣右之政其職相類而各不相統也虎賁氏下大夫二人中士十有二人府二人史八人胥八人虎士八百人注不言徒曰虎士則虎士徒之選有勇力者吕氏祖謙曰周公戒成王以虎賁與任人牧人凖人並言蓋侍衛傼御朝夕親比必得正人漸移默化故慎虎賁綴衣之選乃養成君德詳密處旅賁氏中士二人下士十有六人史二人徒八人節服氏下士八人徒四人注世為王節所衣服方相氏狂夫四人注方相猶言放想可畏怖之貌王氏應電曰其職主執兵以逐疫亦用武以正其不正之事故屬夏官髙氏愈曰自旅賁至方相皆當為虎賁之屬大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人注僕侍御於尊者之名大僕其長也隸僕下士二人府一人史二人胥四人徒四十人注此吏而曰𨽻以其事褻薛氏衡曰上而正君心于周旋密勿之問下而通人情于勢分難通之際太僕以之率其僚庶僚以之助其長上下交孚內外無壅天下之政此其本也髙氏愈曰大僕主王服位傳王大命可以旦夕承輔王者穆王命伯冏為大僕而以繩愆紏繆格其非心望之蓋係於君德之重如此小臣御僕祭僕皆其屬皆大僕所得自辟除冏命所謂慎簡乃僚者如此其官則唐虞之納言漢之公車令唐之門下省宋之直登聞鼓院而明之通政使也其屬之夏官者軍政機密尤宜速逹於王故也後世以太僕之官專典牧馬之政則名存而實亡矣𨽻僕亦大僕之屬辨師下士二人工四人史二人徒四人注辨者古冠之大稱王氏應電曰辨首服之次於冕者自天子以下皆服之冕則不常服故冕雖尊而獨以辨稱蕙田案大僕掌正王之服位故辨師亦𨽻焉司甲下大夫二人中士八人府四人史八人胥八人徒八十人注甲今之鎧也司甲兵戈盾官之長司兵中士四人府二人史四人胥二人徒二十人司戈盾下士二人府一人史二人徒四人注戈今時句孑戟司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人注司弓矢弓弩矢箙官之長繕人上士二人下士四人府一人史二人胥二人徒二十人注繕之言徑也善也稿人中士四人府二人史四人胥二人徒二十人注鄭司農云稿讀為芻稿之稿箭幹謂之稿此官主弓弩箭矢故謂之稿人髙氏愈曰甲兵弓矢俱軍需重器故設司甲至稿人六官而其官之尊者或至於下大夫其慎重如此與後世以武庫兵器賜弄臣者異矣戎右中大夫二人上士二人注右者參乘此充戎路之右田獵亦為之右焉齊右下大夫二人注充玉路金路之右道右上士二人注充象路之右方氏苞曰戎右以中大夫齊右以下大夫道右以士者右取其武故戎右宜尊賔祭尚嚴故次之朝夕視朝武非所尚也右以戎兼田以祀兼賔而僕各異者右主捍衛其事可兼賔祀師田車行異節必各有専僕而後事可間也大馭中大夫二人注馭之最尊戎僕中大夫二人注馭言僕者此亦侍御于車齊僕下大夫二人注古者王將朝覲會同必齊所以敬宗廟及神明道僕上士十有二人注王朝朝莫夕主御王以與諸臣行先王之道田僕上士十有二人馭夫中士二十人下士四十人疏案校人良馬三十六匹一馭夫計良馬二千一百六十匹則六十馭夫駑馬一馭夫主四百三十二匹駑馬千二百九十六匹則馭夫三人併前六十三人與此不合者蓋序官脫三人也薛氏衡曰右與僕皆身任其事故無府史胥徒王氏應電曰馭者通謂之僕惟大馭不稱僕者以前有大僕不可混也髙氏愈曰自戎右至馭夫共九職皆僕車右馭車之官與夏官戎政正相屬校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人注校之為言校也主馬者必仍校視之校人馬官之長趣馬下士皂一人徒四人注趣馬趣養馬者也鄭司農説以詩曰蹶維趣馬鄭氏鍔曰趣馬以下士為之其職則養馬而已周公立政以戒成王與任人凖人牧夫偕言之大夫之刺幽王與司徒卿士師氏內史連言之其微如此而所係反重以其近王故也巫馬下士二人醫四人府一人史二人賈二人徒二十人注巫馬知馬祖先牧馬社馬步之神者馬疾若有犯焉則知之是以使與醫同職牧師下士四人胥四人徒四十人注主牧放馬而養之廋人下士間二人史二人徒二十人注庾之言數也圉師乘一人徒二人圉人良馬匹一人駑馬麗一人注養馬曰圉四馬為乘良善也麗耦也薛氏衡曰自戎右至馭夫凡九職掌五路之車自校人至圉人凡七職掌五路之馬蕙田案校人以中大夫為之即後世太僕卿之職趣馬以下則其屬也周官太僕主正王服位出入王之大命漢之尚書唐之門下是其職與後世之太僕不同職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人注職主也主四方之職貢者職方氏主四方官之長土方氏上士五人下士十人府二人史五人胥五人徒五十人注土方氏主四方邦國之土地懷方氏中士八人府四人史四人胥四人徒四十人注懷來也主來四方之民及其物合方氏中士八人府四人史四人胥四人徒四十人注合方氏主合同四方之事訓方氏中士四人府四人史四人胥四人徒四十人注訓道也主教道四方之民形方氏中士四人府四人史四人胥四人徒四十人注形方氏主制四方邦國之形體山師中士二人下士四人府二人史四人胥四人徒四十人川師中士二人下士四人府二人史四人胥四人徒四十人邍師中士四人下士八人府四人史八人胥八人徒八十人注邍地之廣平者匡人中士四人史四人徒八人注匡正也主正諸侯以法則撢人中士四人史四人徒八人注撢人主撢序王意以語天下髙氏愈曰職方氏以下六官皆以氏為名若世修其職者蓋以四方山川險阻與夫風俗土地所宜非久於其任而世修其職者不能習故也山川邍師皆職方之輔蓋職方總掌天下之地圖最為煩瑣故分山林川澤原隰三者立三師以分掌之則覩記各有所専而職方氏為不煩擾矣原師官府史胥徒獨倍者以平原之地多於山林川澤故也自職方氏至撢人凡十一官職方為其長其下十官皆職方之屬也都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人注都王子弟所封及三公衆采地也司馬主其軍賦家司馬各使其臣以正於公司馬注家卿大夫采地正猶聼也公司馬國司馬也卿大夫之采地王不特置司馬各自使其家臣為司馬主其地之軍賦往聼政於王之司馬王之司馬其以王命來有事則曰國司馬髙氏愈曰大都之地儼若國然但不世襲耳苟尾大不掉則有曲沃京城之患故特以都司馬主其兵卿大夫采地王不特置司馬使各自以家臣為司馬主其地之政令往聼于王之司馬則家臣亦不得自擅其甲兵矣李氏光地曰大司馬掌邦政而以兵事為主故凡兵甲車馬之政隸御僕從之官九州邦國之形勝厄塞要害皆屬焉司勳者兵事以賞罰為主故先之也兵莫重於馬故馬質次之政莫重於地故量人又次之繼以小子羊人者祭祀之事也繼以司爟者火政兵事之要也設險守固制勝於未形故掌固司險次之候望譏察簫勺羣慝故掌疆候人環人又次之挈壺氏三軍之耳目故又次之射兵事所急故又次之服不氏射鳥氏羅氏掌畜因射而及故其職并屬焉司士以治官諸子以治國子司右以治戎右司士所掌非兵也而屬于司馬者案王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之此即司士之掌而古司馬之遺也虎賁旅賁夾衛王車節服方相皆因衛車而及故相次焉太僕小臣祭僕御僕𨽻傼皆侍御之官辨師司甲司兵司戈盾司弓矢繕人稿人皆掌辨甲兵器之職戎右齊右道右為右者也所謂勇士也大馭戎僕齊僕道僕田僕馭夫為御者也所謂僕夫也校人趣馬巫馬牧師廋人圉師圉人則皆掌馬之官司馬官之所以名者此也職方土方懷方合方訓方形方以及山師川師邍師匡人撢人皆所以周知天下之土地形勢山林川澤原野之險易而施其訓道匡正之法焉司馬之職於是盡矣都家司馬在食邑采地者故附之蕙田案夏官之屬卿一人大司馬也中大夫十四人小司馬二戎右二大馭二戎僕二校人二職方氏四也下大夫三十人軍司馬四射人二司士二諸子二虎賁氏二大僕二司甲二司弓矢二齊右二齊僕二職方氏八也上士六十七人中士百五十人下士四百五十三人其都家司馬皆上中下士而數無考刑官之屬大司冦卿一人小司冦中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人注士察也主察獄訟之事者鄭司農説以論語曰栁下惠為士師鄉士主六鄉之獄府六人史十有二人胥十有二人徒百有二十人髙氏愈曰士師為士官長故稱師其下鄉士主六鄉之獄遂士掌六遂之獄縣士掌外野之獄方士掌都家之獄訝士掌四方諸侯之獄隨其地以設獄官則于訊察便勘核易也明刑部於十三省每省各設郎中員外主事以主其獄訟蓋亦同此意方氏苞曰遂士縣士方士皆别設官而鄉士即用司冦之屬士者所受中國之獄訟其治在中國也諸官皆上士八人中士十六人以給官中之事而司冦之屬士獨兼受國中之獄訟者諸官之事紛秋官則所掌惟獄訟而四郊之獄訟鄉師聼之而後逹於鄉士六遂之獄訟遂大夫遂師聼之而後逹於遂士公邑都家之獄訟守土者聼之而後逹於縣士方士其獄辭皆已定矣其上逹則士師察其辭小司冦附其法大司冦斷而行其令故司冦之屬士雖使兼受國中之獄訟而不患其不暇給也遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人注遂士主六遂之獄者縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人注距王城三百里至四百里曰縣縣士主縣之獄者方士中士十有六人府八人史十有六人胥十有六人徒百有六十人注方士主四方都家之獄者訝士中士八人府四人史八人胥八人徒八十人注訝迎也士官主迎四方賔客黃氏度曰訝士獄官而送迎賔客者蓋有前驅辟蹕與司冦分其事賔客自外至則使訝士主之至其稱訝士者本為近受四方之獄云爾朝士中士六人府三人史六人胥六人徒六十人注朝士主外朝之法髙氏愈曰朝儀不肅則百度皆弛而犯法者衆謹法度肅朝儀刑官之事也故鄉遂五士官以下即以朝士先之司民中士六人府三人史六人胥三人徒三十人注司民主民數薛氏衡曰五刑皆戕民者也知所以愛其民則知所以謹其刑此司民所以列于司刑之上髙氏愈曰民數掌于司徒而司民𨽻于刑官者蓋使刑官多殺一人則司民之數少一人知其生之難而耗之易則司冦之刑自不敢濫矣故以司民𨽻之司刑中士二人府一人史二人胥二人徒二十人鄭氏鍔曰刑者大小司冦司之士師以下行之司刑蓋掌五刑之書司刺下士二人府一人史二人徒四人注刺殺也三訊罪定則殺之司約下士二人府一人史二人徒四人注約言語之約束司盟下士二人府一人史二人徒四人注盟以約辭告神殺牲歃血明著其信也曲禮曰涖牲曰盟鄭氏鍔曰先儒以盟為衰世之事蓋據穀梁盟詛不及三王之文然書載苖民罔巾于信以覆詛盟則五帝之世已有是事詩曰君子屢盟亂是用長亦惡其盟之屢而無信耳非謂盟之必不可也職金上士二人下士四人府二人史四人胥八人徒八十人注職主也髙氏愈曰金屬西方主肅殺故𨽻秋官且其職受士之金罰貨罰亦𨽻刑官為便也司厲下士二人史一人徒十有二人注犯政為惡曰厲厲士主盜賊之兵器及其奴者王氏昭禹曰春秋傳云鬼有所歸乃不為厲盜賊之厲于人猶厲鬼也犬人下士二人府一人史二人賈四人徒十有六人疏犬金畜故連類在此髙氏愈曰古者以犬供祭祀故設犬人牛屬土𨽻地官雞屬木𨽻春官羊屬火𨽻夏官犬屬金𨽻秋官且守夜吠盜有詰姦之義聖人於一牲之職必使𨽻之各得其當如此司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人注鄭司農云圜謂圜土也圜土謂獄城也今獄城曰圜司圜職中言几圜土之刑人也以此知圜者謂圜土也又大司冦職曰以圜土聚教罷民故司圜職曰掌收教罷民掌囚下士十有二人府六人史十有二人徒百有二十人注囚拘也主拘繫當刑殺之者掌戮下士二人史一人徒十有二人注戮猶辱也既斬殺又辱之司𨽻中士二人下士十有二人府五人史十人胥二十人徒二百人注𨽻給勞辱之役者漢始置司𨽻亦使將徙治道溝渠之役後稍尊之使主官府及近郡罪𨽻百有二十人注盜賊之家為奴者蠻𨽻百有二十人注征南夷所獲閩𨽻百有二十人注閩南蠻之别夷𨽻百有二十人注征東夷所獲貉𨽻百有二十人注征東北夷所穫凡𨽻衆矣此其選以為役員其餘謂之𨽻民方氏苞曰謂之𨽻者王官宿衛宫伯所掌士庶子也旅賁皆命士也虎賁所掌謂之虎士必粗知道藝而異於胥徒者故於司𨽻所掌稱𨽻以别之春秋傳人有十等𨽻班在六非甚賤也盜賊之子亦使班于諸𨽻者非其身之惡也不使列于齊民者恐其習為匪僻也布憲中士二人下士四人府二人史四人胥四人徒四十人注憲表也主表刑禁者髙氏愈曰主以刑禁表懸示人也先王欲使國家刑禁家喻户曉故設其官禁殺戮下士二人史一人徒十有二人注禁殺戮者禁民不得相殺戮禁暴氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百二十人注廬賔客行道所舍蠟氏下士四人徒四十人注蠟骨肉腐臭蠅蟲所蠟也月令曰掩骼貍胔此官之職也蠟讀如狙司之狙雍氏下士二人徒八人注雍謂隄坊止水者也萍氏下士二人徒八人注萍氏主水禁萍之草無根而浮取名於其不沉溺司寤氏下士二人徒八人注寤覺也主夜覺者司烜氏下士六人徒十有二人注烜火也讀如衛侯燬之燬故書燬為垣鄭司農云當為烜條狼氏下士六人胥六人徒六十人注杜子春云條當為滌器之滌元謂滌除也狼狼扈道上修閭氏下士二人史一人徒十有二人注閭謂里門王氏與之曰自禁殺戮至修閭氏十職皆幾防盜賊姦宄者幾防嚴則姦宄無清刑之原也髙氏愈曰自布憲至修閭氏共十有一職其官不盡相類然或憲刑禁或禁殺戮或禁暴或庀道路宿息井樹或除道路之胔或間溝瀆塞阱獲或禁川遊或防夜遊或禁火或辟行人或庀追胥而禁徑踰者則皆刑官之事也故俱以類列之冥氏下士二人徒八人注鄭司農云冥讀為冥氏春秋之冥元謂冥方之冥以繩縻取禽獸之名薛氏衡曰自修閭氏以上逹于布憲凡十一人先王所以盡乎人也自冥氏下至于庭氏凡十二人先王所以盡乎物也夫大而人之為民害者既革微而物之為民害者已消則先王之用刑通乎天地之心矣蔡氏德晉曰刑禁之官既備則姦慝不作而良民得安其生矣然使物類之凶邪者不除則民雖免于冦盜之傷殘猶不免于獸蟲之毒害而其生未暢遂也更設冥氏以下十二官凡猛獸妖鳥貍蟲毒蠱之屬一切去之而後萬物之害悉除宇宙皆太和之氣而民得嬉逰于化日矣庶氏下士一人徒四人注庶讀如藥煮之煮驅除毒蠱之言書不作蠱者字從聲穴氏下士一人徒四人注穴摶蟄獸所藏者翨氏下士二人徒八人注翨鳥翮也鄭司農云翨讀為趐翼之趐柞氏下士八人徒二十人注柞除木之名除木者必先刋剝之剃氏下士二人徒二十人注書剃或作夷鄭司農云掌殺草故春秋傳曰如農夫之務去草芟夷藴崇之又今俗問謂麥下為夷下言芟夷其麥以其下種禾豆也元謂剃讀如剃小兒頭之剃書或作夷此皆剪草也字從類耳月令曰燒剃行水謂燒所芟草乃水之硩蔟氏下士一人徒二人注鄭司農云硩讀為擲蔟讀為爵簇之簇謂巢也元謂硩古字從石折聲翦氏下士一人徒二人注剪斷滅之言也主除蟲蠧者赤犮氏下士一人徒二人注赤犮猶言捇拔也主除蟲豸自埋者蟈氏下士一人徒二人注鄭司農云蟈讀為蜮蜮蝦蟇也月令曰螻蟈鳴故曰掌去鼁黽鼁黽蝦蟇屬書或為掌去蝦蟇元謂蟈今御所食蛙也字從蟲國聲也蜮乃短狐與壺涿氏下士一人徒二人注壺謂瓦鼓涿擊之也庭氏下士一人徒二人注庭氏主射妖烏令國中潔清如庭者也王氏安石曰周禮所載道路溝澮一草木一昆蟲小小利害或興或除而地官秋官之職分矣凡所興利以地官主之凡所除害以秋官主之王氏應電曰秋官掌刑而有冥氏以下十二官則凡猛摯昆蟲與夫托于神姦而為害者並不能逃夫刑罰之威而况于姦慝暴亂之人乎銜枚氏下士二人徒八人注銜枚止言語囂歡也枚狀如箸橫銜之為之繣結於項髙氏愈曰國有大事庶民羣囂非政體矣故立銜枚氏禁之其𨽻秋官者司冦掌邦禁故也伊耆氏下士一人徒二人注伊耆古王者號始為蠟以息老物此主王者之齒杖後王識伊耆之舊德而以名官與今姓有伊耆氏郝氏敬曰物至秋成且老故齒杖屬之大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人注行夫主國使之禮朱子曰周禮最是大行人等官屬之司冦難曉按覲禮諸侯行禮既畢則降而肉袒請刑于廟門之東王曰伯父無事歸寧乃邦然後再拜稽首出所謂懷諸侯則天下畏之也所以屬之於司冦如此等處皆是合著如此初非聖人私意唐氏曰伯夷降典而繼以折民惟刑司儀行人之官必屬司冦此古者德刑相表裏之意環人中士四人史四人胥四人徒四十人鄭氏鍔曰周官有二環人夏官之環人掌致師此官掌環繞賔客而為之衛事雖不同皆有取於循環之義故皆名環人象胥每翟上士一人中士二人下士八人徒二十人注通夷狄之言者曰象胥其有才知者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之德先致南方也掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人史四人徒四十人注訝迎也賔客來主迎之掌交中士八人府二人史四人徒三十有二人注主交通結諸侯之好掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人髙氏愈曰凡賔客往來恐有挾詐為非常者立掌察以察之賔客之來必有貨賄相遺立掌貨賄以司其出納自大行人至此共十一官皆掌賔客之事而大行人為之長以下十官皆其屬也朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人注此王之士也使主都家之國治而命之朝大夫云疏庶子者蓋亦主采地之諸子在府史之下者蓋官長所自辟除也黃氏度曰庶子未有位故敘于府史之下髙氏愈曰朝士上士而曰大夫者自王朝言之則為上士自都家言之則尊而目之曰大夫都則中士一人下士二人府一人史二人庶子四人徒八十人注都則主都家之八則者也當言每都如朝大夫及都司馬云都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之注都家之士主治都家吏民之獄訟以告方士者也亦當言每都薛氏衡曰刑官之終宜首舉都家之士而先朝大夫次都則而後及於都士家士何也蓋八則以治都鄙七曰刑賞以馭其威使威福得以自行則是兩政耦國之漸也故於王朝各設朝大夫以主其治都則以守其法而後以都士家士明其刑然後綱維一挈於上也李氏光地曰秋官主刑設官而禁副之大司冦總掌刑禁之典法小司冦佐理刑而為刑罰獄訟之總司士師佐用禁而為羣獄訟之總司獄官先刑官而設鄉士遂士縣士方士訝士為羣獄訟之分司皆士師屬以地次之羣地之獄訟皆斷弊於朝故朝士後之獄訟既弊次以司民者見民者天之所司王之所敬刑罰不可不中也獄成不可易有五刑以麗其辟故次司刑有刺宥以附于刑故次司刺五刑之作民覆詛盟故司約司盟正之盟約失而獄訟興刑罰滋多於是罪輕而贖刑者則職金受其入罪重而孥戮者則司厲執其法稍重而未麗于法者則司圜主收教之已在刑者則囚而刑殺故掌囚掌戮又次之囚戮從坐者免刑任役故司𨽻又次之而所俘翟𨽻亦以類屬焉凡此圜囚𨽻戮之人官為防守之司故置犬人官于其間以犬主守示義類也自此以下刑官具矣雖然刑非得已也貴用禁故下皆以禁官次之禁其大凡則布憲通禁於天下禁其非常則禁殺戮禁暴氏嚴禁于國中刑尚寬禁尚密刑有所不及禁無所不至自野廬氏至修閭氏八職外而道路內而里閭靡事不有禁設蠟氏雍氏萍氏司寤氏司烜氏條狼氏于中間所以使行者無害死者有主陸走者無險阻水浮者不沒溺時其宵晝行止節防其焚災除其不蠲禁行至此可謂大細不捐禁官具矣自冥氏至庭氏十二職草木鳥獸為民害者驅而除之義之盡也是刑官之餘也繼以銜枚氏司囂者無端歌哭雜氣妖聲不祥也弭而消之仁之盡也是禁官之餘也於是刑禁畢次以伊耆氏者民安物阜收秋養之成也此以上皆王官行法於王國中者也其天下邦國則大司冦以所建之三典頒布使施行之而邦國諸侯奉法守紀惟恐干王刑典之誅故于朝覲會同日肉袒請刑而王者亦因其無事與之修賔客之禮于是大行人小行人司儀之官從之而設而行夫掌小事環人掌通送逆象胥掌四夷使以類屬焉其掌客之飲食掌訝之迎待皆以盡賔客之禮而掌交掌察掌貨賄又推賓客之禮而廣其用申其義于邦國也末因邦國而及都家故次以朝大夫都則而卒之以都士家士終刑官之用蕙田案刑官之屬卿一人大司冦也中大夫四人小司冦二大行人二也下大夫八人士師四小行人四也上士二十六人中士百六十四人下士二百四十七人其朝大夫都則都士家士皆上中下士而數無考大行人即漢典客及大鴻臚之職考工記凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五搏埴之工二注攻猶治也搏之言拍也埴黏土也故書七為十刮作捖鄭司農云十當為七捖摩之工謂玉工也捖讀為刮其事亦是也攻木之工輪輿弓廬匠車梓攻金之工築冶鳬栗段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡆刮摩之工玉楖雕矢磬摶埴之工陶瓬注事官之屬六十此職其五材三十工略記其事耳其曰某人者以其事名官也其曰某氏者官有世功若族有世業以氏名官者也廬矛戟矜祕也國語侏儒扶廬梓檟屬也故書雕或為舟鄭司農云輪輿弓廬匠車梓此七者攻木之工官别名也孟子曰梓匠輪輿蕙田案事官之屬已亡所可推而知者大司空卿一人小司空中大夫二人匠師下大夫四人據大宰疏云匠師司空之考上士八人中士十六人旅下士三十二人而已又案以上六官之目禮記明堂位周三百注周之六卿其屬各六十則周三百六十官也此云三百者記時冬官亡矣通典周六萬三千六百七十五員內二千六百四十三人外諸侯國官六萬一千三十二人按禮記王制計之商制同馬氏端臨曰杜氏通典所載周之官數則以為出於禮記王制今考之其所謂外諸侯官六萬一千三十二人者以王制云殷時天下諸侯國千七百七十三內大國二百四十九次國五百一小國一千二十三大國次國則皆三卿五下大夫二十七上士唯小國二卿其大夫與士如大國次國之數大凡列國卿大夫士有六萬一千三十二人其數是矣獨所謂內官二千六百四十三人者未知何據謹按周家之官數莫詳于周禮今以周禮太宰以下及其屬稽其員數之可考者除冬官一篇已亡無所稽據外而五官所掌其有命官而難考員數者如山虞每大山中士二人中山下士六人小山二人川衡每大川下士十二人之類是也又有元無命官者如酒人漿人之為