body:
  text: 五禮通考卷三十七刑部尚書秦蕙田撰吉禮方丘祭地蕙田案周禮大司樂以冬日至祀天於圜丘夏日至祭地於方澤此王者父事天母事地之正禮稽之經傳凡壇壝圭璧瘞埋樂舞祝詞皆與祀天逈别漢初郊祀之禮廢五畤太乙天帝已無正祭而渭陽汾陰后土之祭漫焉不倫建始初始建南北郊旋復旋廢至王莽剏合祭之議後世樂便安憚勞費往往仍而不改其間惟魏太和周建德隋開皇唐開元宋元豐明嘉靖隔數百載一舉行分祭之典而朝議齗齗紛若聚訟然主分祭者理正而有據主合祭者雖一時迎合附㑹曲意文飾亦終不敢斷然以分祭為非則定論固自有屬矣我朝制作明備南北郊之典天子嵗必親行法古垂後凖禮經而超百代矣至經生家妄爲祭社即祭地之說尤屬不經人主亦未有行之者兹輯祭地門先經後史詳載諸儒辨論稍稍正其紕繆而祭祀儀莭及後世祭地郊壇已附見祀天門者不重出焉禮記曲禮天子祭天地疏天地有覆載大功天子主有四海故得總祭天地以報其功吕氏大臨曰天子繼天而王君天下而有之冬日至祀天夏日至祭地劉氏炫曰天子以下俱荷地徳皆當祭地但名位有髙下祭之有等級天子祭地祭大地之神也諸侯不得祭地使之祭社也家又不得祭社使之祭中霤也霤亦地神所祭小故變其名劉氏彜曰唯為天子者乃得以主天地之祀地之為祗一也其濟生於物隨人大小不可以一祀而報之也故天子必父天而母地夏至之日祭於澤中之方丘則曰皇地祗也祭之於庫門内之西則曰大社為羣姓祈豐年也祭之於藉田之壇則曰王社為宗廟祈粢盛也諸侯為民而祭者曰國社為藉而祭者曰侯社大夫成羣而祭者曰置社司徒令其鄉黨而祭者曰里社是皆地示也而方丘之祭主之者獨天子焉方氏愨曰祭天地則天下之事故於天子言之蕙田案祭地乃天子之事故下文云諸侯祭社稷則祭地與祭社其為尊卑廣狹大有别矣注疏及兩劉氏方氏說得之詳見後條禮器因地事地注地事因下者以事也周禮大宗伯之職掌建邦地示之禮疏經先云人鬼後云地示鄭則先云地示後云人鬼者經先云人鬼欲見天在上地在下人藏其間鄭後云人鬼者據下經陳吉禮十二先地示後人鬼據尊卑為次故也王氏傳曰地之靈曰示大司樂以祭地示若樂八變則地示皆出可得而禮矣凡以神仕者以夏日至致地示詩周頌昊天有成命序曰郊祀天地也疏郊祀天地之樂歌也祭之于南郊祭之于北郊雖南北有異祭俱在郊故總言郊祀也書召誥丁巳用牲于郊牛二蔡傳郊天地也故用二牛欽定書傳說用牲于郊注案祭天地分合從古聚訟此經云用牲于郊牛二注疏謂以后稷配故牛二蔡傳則云祭天地也蔡但言祭天地不言合者天地各攻其位位成而祭之也疑此時南北郊之名已立言郊者統天地言之歟周禮大宗伯有蒼璧禮天黄琮禮地之說大司樂有圜丘方澤之說又祭法言燔柴于太壇祭天也瘞埋于太折祭地也用騂犢此皆天地並言祭天地異所王者尊天而親地未有祭天而不及地者亦未有言其合者也然則兆于南郊就陽位也禮固明言之而北郊未有明文此經之偶闕耳注疏之家鄭康成賈公彦孔頴達軰皆已補言之周禮典瑞云兩圭有邸以祀地注疏皆謂祀于北郊又牧人言陽祀隂祀注疏亦謂隂祀祭地北郊又如禮記太壇太折之文疏云此經論祭帝于南郊地示于北郊也此皆北郊之說鑿鑿可據者以此言之祭地之位不待推而可知也雖有冬夏至之分而此於位之初成非常祀之時可比故同日而舉也蕙田案天地分祭本於周禮朱子曰古時天地定不是合祭又曰天地合祭于南郊千五六百年無人整理葢信之深而望之切也祭地北郊自當以周禮朱子之說爲定先儒葉秀發陳用之楊信齋皆主之詳見圜丘門我朝既定南北郊之祭復欽定書經傳說折衷羣言証明北郊之可據發前人所未發聖人復起不能易矣又案北郊字經文雖未明言祭地而周禮天官内宰中春詔后帥外内命婦始蠶于北郊以為祭服禮記祭統王后蠶于北郊以共純服夫祭天于南郊故天子親耕于南郊以純陽爲尊而就陽位也祭地于北郊故王后親蠶于北郊以純陰爲尊而就陰位也經文毎多互見親蠶在北郊則祭地北郊可知即不得謂北郊之不見於經文也漢匡衡引禮記之文曰祭地于大折在北郊則其所本者逺葢不止注疏之言爲可據矣附諸儒辨注疏崑崙神州兩地示曲禮天子祭天地孔疏案地統書括地象云地中央曰崑崙又云其東南萬五千里曰神州以此言之崑崙在西北别統四方九州其神州者是崑崙東南一州耳於神州中更分為九州則禹貢之九州是也周禮大宗伯以黄琮禮地鄭注禮地以夏至謂神在崑崙者也大司樂以祭地示鄭注謂神州之神典瑞兩圭有邸以祀地鄭注謂所祀于北郊神州之神賈疏案河圖括地象崑崙東南萬五千里神州是也川地示皆出鄭注地示則主崑崙中禮器為下必因澤鄭注謂夏至祭地在方澤之孔疏祭崑崙之神陳氏禮書周禮或言大示或言地示或言土示葢大示則地之大者地示則凡地之示與焉土示則五土之示而已禮記言兆于南郊就陽位也南郊祀天則北郊祭地矣祀天就陽位則祭地就陰位矣大宗伯以黄琮禮地牲幣各放其器之色而牧人陰祀用黝牲則牲有不同也典瑞兩圭有邸以祀地則玉有不同也大司樂奏太蔟歌應鍾以祀地示凡樂函鍾爲宫若樂八變地示皆出則樂有不同也葢先王之於神示求之然後禮禮之然後祀函鍾爲宫求之之樂也太蔟應鍾祀之之樂也若夫玉之黄琮兩圭牲幣之黄黒葢祭有不一而牲幣器亦從而異也鄭氏之徒謂夏至于方丘之上祭崑崙之示七月于太折之壇祭神州之示此惑于讖緯之說不可考也楊氏復曰大司樂奏太蔟歌應鍾舞咸池以祀地示鄭注云地示所祭于北郊及社稷牧人陰祀用黝牲毛之鄭注云陰祀祭地北郊及社稷夫祭地唯有夏至北郊方澤之禮此外則有社祭亦祭地也鄭氏亦既知之矣及注曲禮天子祭天地大宗伯黄琮禮地典瑞兩圭祀地又云地神有二嵗有二祭夏至祭崑崙之神于方澤夏正祭神州之神于北郊何也葢祭地唯北郊及社稷此三代之正禮而釋經之正説鄭氏所不能違也有崑崙又有神州有方澤又有北郊析一事以為二事此則惑于緯書而牽合聖經以文之也知有正禮而又汨之以緯書甚矣其惑也馬氏端臨曰如通典則依鄭氏注以方丘為祭崑崙之神丘在國之北禮神之玉以黃琮牲用黃犢幣用黃繒所謂各如其器之色王及尸同服大裘配以后稷服與配經文不載注家以為同祭天之禮故服大裘配后稷其樂則大司樂之函鍾為宫云云至八變則地示皆出可得而禮是也神州地示則為壇于北郊名太折玉用兩圭五寸有邸牲用黝犢陰祀用黝牲幣用黒繒幣經無文據牲用黒知當從其色配亦以后稷其樂則奏太蔟歌應鍾舞咸池以祭地示是也案鄭氏解經于天地之祀皆分而爲二是有二天二地矣然古人祀天之祀郊與明堂本二處所配之祖又不同則因宗祀文王于明堂以配上帝一語而指其帝為五精之神感生之帝猶可云也至於祭地則經文所載唯方澤而已乃以爲此所祀者崑崙而又有神州則祭之于北郊又因祭法有太折之語而以爲太折即北郊又非方澤也其支離不通彌甚矣劉氏迎曰祭地示即樂之八變而出者鄭既謂地示則主崑崙又謂祭神州之神及社稷不知神州崑崙何所據蕙田案天子祭方丘祭社皆祭地示而廣狹不同方丘所祭統乎職載之地言無有疆域界限此地與天對乾父坤母之義也社之祭主乎所有之地言其不入版章者不與此社與稷對土爰稼穡之義也鄭氏分崑崙神州兩地示意亦如此但崑崙神州之號頗為不經况神州不係之社而係之太折誤分方丘太折爲二於祭地既屬重叠以太折之名侵祭社之實則祭社又成贅旒義兩無取諸儒辨二說之誤已詳但未指明神州一祭已該祭社之内恐尚無以盡其情而服其心耳附辨鄭氏說地示不同地官鼓人以靈鼓鼓社祭鄭注社祭祭地示也大宗伯血祭貍沈疈辜鄭注此皆地示蕙田案鄭氏于大司樂既分神州崑崙兩地示于鼓人又以社祭爲祭地示于大宗伯又以社稷五祀山林川澤四方百物皆爲地示解地示凡四說其實方澤所祭止一地示以其爲大地之示故亦曰大示社稷五祀山林川澤之類皆地示之屬不足以當地示之號猶日月星辰皆天神之屬而不足以當天神之號也周禮春官大司樂于澤中之方丘奏之疏地言澤中方丘者因髙以事天故于地上因下以事地故于澤中取方丘者水鍾曰澤不可以水中設祭故亦取自然之丘方象地方故也薛氏圖曰陰以方為體性靜地陰而靜故為方丘在國北之澤以祀之亦各從其類禮記祭法瘞埋于太折祭地也注折昭晳也必為昭明之名尊神也廣雅方澤大折祭地也通典方丘在國之北明集禮大折封土祭地之處折曲也言方丘之形四方曲折象地附諸儒社與方澤是一辨張子曰郊者郊天之位社者祭地之位郊外無天神之祀社外無地示之祀澤中方丘亦社也故凡言社者即地示之祭曰胡氏宏曰古者祭地于社猶祀天于郊也故泰誓郊社不修而周公祀于新邑亦先用二牛于郊後用太牢于社也記曰天子将出類于上帝宜于社又曰郊所以明天道社所以神地道周禮以禋祀祀昊天上帝以血祭祭社稷而别無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祀地示而别無祭社之說則以社對郊可知矣後世既立社又立北郊失之矣楊氏復曰愚案禮經天子祭天地諸侯祭社稷莫重于天地而社稷其次也胡氏乃合祭地祭社二者而一之何也曰社者五土之神是亦祭地也而有廣狹之不同曰里社則所祭者一里之地而已曰州社則所祭者一州之地而已諸侯有一國其社曰侯社則所祭者一國之地一國之外不及也天子有天下其社曰王社則所祭者天下之地極其地之所至無界限也故以祭社爲祭地惟天子可以言之凡胡氏所引皆天子社也且云後世既立社又立北郊失之矣此則未然有正祭有告祭冬至祭天于南郊順陽時因陽位夏至祭地于北郊順陰時因陰位以類求類故求諸天而天神降求諸地而地示出所謂正祭也匠人營國左祖右社以社與祖對尊而親之若因事而告地則祭社亦可知矣記曰天子将出類于上帝宜乎社之類是也說者曰類者依郊祀正禮而為之也宜者有事乎社求福佑也此所謂告祭也知祭各有義不可以一說拘則知聖人制禮精微之意矣觀承案天子祭天地證之周官戴記必截然分爲二祭者洵不刋之論已然天地匹也天於冬至外尚有孟春孟夏季秋之三祭地則夏至而外寂爾無聞何也社爲土神說者謂非大地之神不得爲祭地社既不得爲祭地則更以何者爲祭地乎夫合祭天地之所以不得不辨者以南郊合祭而遂廢北郊之禮故朱子謂社祭之外自應别有方丘一祭此誠是也今欲正祭地之專在方丘因斥凡社之皆無與於祭地至使方丘外天子竟嵗無祭地之時以此而報兩大生成無乃疏數不均之甚乎竊意社亦不同大社王社者天子之社也國社侯社者諸侯之社也諸侯之社固方隅之地而非大地天子之社則合萬國九州之地而一之矣王者無外其可限以方隅而不爲大地乎楊氏謂天子之社即是祭地者良是觀經傳之文多以郊社對言其意皆以社爲祭地而對天也惟社稷連文則但爲土榖之神而非地五土之示則如天之有五帝而非昊天上帝爾且冬至啟蟄龍見之祭皆在圜丘而季秋享帝則於明堂是祭天固亦不拘一所也則謂祭地之方丘雖在北郊而大社王社之亦爲祭地者即在庫門内其亦說之可通者歟或謂社與方丘之祭其儀文器數有大相徑庭者固未可統稱祭地是亦不然夫社與方丘之儀文器數雖不同其爲祭地則同也猶之冬至與明堂之禮亦固有不能盡同者而其爲祭天則同也葢惟冬夏二至為大報本之祭其餘則固可逓為等殺耳禮經殘闕所執各殊要惟㑹而通之以得其當則禮雖先王未之有可以義起况六經本無社非祭地之文乎附識于此以俟考禮者正之山堂考索社乃地示之屬而非地猶五帝為天之尊神而非天欽定書傳說彚纂社于新邑謂此所以祀地也非也若以此社爲祭地則王制所云祭天地社稷地與社豈重累而舉之乎周氏世樟曰朱文公不信北郊之說而取胡五峰之言以爲經文無北郊只社便是祭地然考之諸書地與社鑿然不同山堂考索云地者后土之總稱社者地示之屬而非即地猶五帝爲天之尊神而非即天也所以地爲大祀社爲中祀祭地則用騂犢祭社則用太牢祭地則用七獻祭社則用三獻祭地則服衮衣祭社則服希衣祭地則以后稷配祭社則以句龍配王制言天子祭天地諸侯祭社稷地與社之不同明矣呉澄云祭地之禮北郊方澤為至重唯天子得行之其次則祭地於社天子而下皆得行之斯言最爲明確經傳中有天與地並稱者此南北郊之禮也其禮地與天敵有郊與社並稱者此郊社之禮也其禮社不與郊敵今人弗深考遂謂社即是方澤誤矣宗元案圜丘方澤各自爲祭朱子言之不一而足語類此條因經文無北郊而反取胡五峰之言若非記録之訛即是朱子未定之說耳周氏乃單摘此條議之而不加别白尚欠分曉顧所論社與地示之判則頗明辨然亦但謂社不是方澤耳非社之必不可祭地也葢社連稷言地示自不在内若社對郊言即以爲地示在内亦何不可古人之文毎多互見大宗伯於天神言昊天上帝而不及五帝舉大以見小也於地示言社稷而不及方澤舉小以見大也小宗伯則言社稷五帝而並無天地大司樂又但言天地而並無社稷五帝亦皆互見以相備云爾即如中庸郊社之禮禘嘗之義亦是舉郊以該明堂舉社以該后土舉禘以該大祫舉嘗以該時祭也讀經貴細剖以研其異又貴統㑹以觀其同方不觸處成礙耳黄氏澤曰殷革夏周革殷皆屋其社是辱之也旱乾水溢則變置社稷是責之也王者父事天母事地豈有可責可辱之理則社非祭地明矣李氏光地曰祀天神祭地示其時其地詳見大司樂而大宗伯以蒼璧禮天黄琮禮地典瑞職四圭有邸以祀天兩圭有邸以祀地王制天子祭天地諸侯祭社稷則地示之祭自不得以社當之然大宗伯職序祭有社無示司徒鼓人職以雷鼓鼓神祀以靈鼓鼓社稷亦言社而不及示典瑞職以圭璧禮諸神祀地之外不著社稷大司樂分樂以祭亦不别著社稷於祭地之後二者又言示而不及社似乎彼此互見而示祭社祭禮無殊也黄勉齋曰社祭土稷祭榖土榖之祭達於上下故方丘與社皆祭地也而宗伯序祭有社無示舉社則其禮達於下舉示則天子獨用之鼓人職不曰祭示而曰社祭亦以其禮達於上下也大司樂靈鼓靈鼗以祭地示則示祭社祭其用同矣此說較之賈疏所謂以小該大者尤爲長於理而合於經也蕙田案周氏所引騂犢太牢七獻三獻衮衣希衣以見祭示祭社之不同而祭社不可謂之祭地也李氏所據鼓人職言社而不及示大司樂言示而不及社彼此互見祭禮無殊又以見祭示祭社之所同祭示之外必仍祭社而祭社之不得爲祭地也二說似異而實相發葢其所不同者大小之品秩其所同者社與示無二道也所謂因地事地也方氏苞曰胡仁仲謂王者父天而母地掃地而祭者唯昊天上帝地示則唯有社祭並無所謂方澤葢據大宗伯禋祀祀昊天上帝及鼓人以靈鼓鼓社祭皆不言大示而諸傳記亦多以郊社對舉故妄為此說戴記曰器用陶匏以象天地之性也又曰天地之牛角繭栗則祀天祀地儀物皆同可知矣又曰因天事天因地事地又曰燔柴于太壇祭天也瘞埋于太折祭地也又曰以祀天地山川社稷先古七十子之徒各記所聞而大體不易不得謂社祭之外别無方澤之祭昭昭然矣蕙田案祭地不同於祭社經有明文曲禮天子祭天地諸侯祭社稷今考其禮之不同者十有三周禮大司樂夏日至于澤中之方丘奏之又凡以神仕者以夏日至致地示此祭非諸侯所得與其不同一也詩周頌載芟序春藉田而祈社稷良耜序秋報社稷豐年序秋冬報月令孟冬之月大割祠于公社或以春或以秋冬從未有以夏至者是祭之時不同二也月令仲春之月擇元日命民社郊特牲日用甲用日之始也夏日至陰生日之甲陽始是祭之日不同三也方丘在澤中社稷在庫門内是祭之地不同四也儀禮祭地瘞周禮以血祭祭社稷是祭之名不同五也禮器瘞埋于泰折用騂犢郊特牲社稷太牢是牲不同六也郊特牲器用陶匏象天地之性犧尊疏布羃周禮鬯人社壝用大罍是祭器不同七也祭地用衮衣祭社稷希冕是祭服不同八也祭地七獻祭社三獻是獻不同九也祭地以后稷配祭社以句龍配是配不同十也地爲大祀社爲次祀是秩不同十一也周禮或言大示或言地示或言土示大示則地之大者地示則凡地之示與焉土示則五土之示而已是祭之稱示不同十二也周禮大司樂五變而致土示八變而致地示是樂之致示不同十三也經傳所載祭地祭社之不同如此乃胡五峰謂祭地即祭社楊氏章氏非之極是夫天子一嵗祭天有四而地則唯夏至一祭者詩載芟良耜豐年月令割祠公社凡軍旅㑹同田獵災眚皆有事焉祭社稷皆所以祭地而夏至方丘之正祭不嫌於一舉矣正祭不嫌於一舉而社又無乎不祭此社之祭所由與郊並稱書之郊社不修中庸郊社之禮禮記郊社之義皆對舉以言而地之正祭反有時不及胡氏之誤所由自來若明乎天子所祭者地唯方澤一祭則社之祭土不得混於祭地矣胡氏之云豈足以紊先王之大典哉附辨蔡氏方澤澤宫是一蔡徳晉禮圖說大社稷壇一名太折一名方丘一名方澤其制于雉門之右度方百二十歩之地為澤宫周之以垣垣北正中為門垣内為方澤澤北正中為橋澤内近北空地為習射處郊特牲云王立于澤親聽誓命射義天子将祭必先習射于澤司弓矢云澤供射椹質之弓矢是澤中社稷壇前有空地為誓戒習射處也又又曰社壇在國中王宫之右謂之方丘亦曰太折名冢土四面有水以象四海故又謂之澤宫郊特牲鄭注既卜必到澤宫擇可與祭祀者因誓勅之以禮也孔疏以射擇士因呼為澤宫至澤宫射以擇助祭之人陸氏佃曰毛詩傳曰雍澤也然則澤葢學宫辟雍是矣郝氏敬曰澤宫即璧雝泮宫之别名蕙田案方澤與社稷非一諸儒論之詳矣此禮圖說不特合方澤社稷而一之并合澤宫方澤而一之不知澤宫即學宫非祭地之方澤爾雅疏宫穹也言屋見於垣上穹崇然也記曰亡國之社屋之天子之社壇而不屋亦不可稱宫又古者僇人於社未聞擇士於社則澤宫與社壇尤無渉矣又案地道配天故易首乾坤自合祭行而地無正祭以社為地而地并無祭矣以土為地猶漢以五畤爲天周禮大宗伯所謂掌建地示之禮者何謂耶兩說盡破而地之正祭始明矣右方丘正祭書商書湯誥敢昭告于上天神后蔡傳神后后土也周書武成告于皇天后土召誥丁巳用牲于郊牛二王氏充耘曰郊社大事也周召以人臣行之可乎葢因事告祭奉天冊命以行事非常祭之比也周禮大宗伯王大封則先告后土注后土土神黎所食者大祝建邦國先告后土用牲幣注后土社神黄氏曰注疏說后土非也古人常以后土對皇天春秋傳曰君履后土而戴皇天后土地也五行之神后土黎所食者稱號同耳周禮大封告后土不曰社而曰后土社生物后土主土附辨注疏說后土不同春秋僖十五年左傳君履后土而戴皇天孔疏以地神后土言之后土者地之大名也履后土指謂地為后土也之此以后土為地大名大宗伯王大封則先告后土鄭注后土土神也黎所食者賈疏言后土有二若五行之官東方木官句芒中央土官后土此等后土土官也黎為祝融兼后土故云黎所食者若左氏傳云君戴皇天而履后土彼為后土神與此后土同也若句龍生為后土官死配社即以社為后土其實社是五土總神非后土但以后土配社食世人因名社為后土耳此以后土為中央土神商書湯誥敢昭告于上天神后蔡傳神后后土也此以后土為神后月令仲春之月命民社鄭注社后土也成檀弓君舉而哭于后土鄭注后土社也周書武告于皇天后土孔傳后土社也此小雅甫田以社以方毛傳社后土也俱以后土為社周書武成蔡傳句龍為后土此以后土為人神月令中央土其神后土鄭注后土顓頊之子曰黎兼為土官孔疏案昭二十九年左傳云顓頊氏有子曰黎為祝融共工氏有子曰句龍為后土后土為土官知此經后土非句龍而為黎者以句龍初為后土後轉為社后土官缺黎則兼之故鄭注大宗伯云黎食于火土以宗伯别云社稷又云五祀句龍為社神則不得又為五祀故云黎兼也故祭法共工氏之覇九州也其子曰后土能平九州祀以為社孔疏共工後世之子孫為后土之官能治九州五土之神故祀以為配社之神昭二十九年左傳共工氏有子曰句龍為后土后土為社孔疏句龍既為后土又亦配社故言后土為社也鄭志答趙商云后土為社謂輔作社神趙商問郊特牲社祭土而主陰氣大宗伯職曰王大封則先告后土注云后土土神也若此之義后土則社社則后土二者未知云何敢問后土祭誰社祭誰乎答曰句龍本后土後遷之為社大封先告后土𤣥注云后土土神不云后土社也田瓊問周禮大封先告后土注云后土社也前答趙商曰當言后土土神言社非也檀弓曰國亡大縣邑或曰君舉而哭于后土注云后土社也月令仲春命民社注云社土神中庸云郊社之禮所以事上帝也注云社祭地神不言后土省文此三者皆當定之否答曰后土土官之名也死以為社神而祭之故曰句龍為后土後轉為社故世人謂社為后土無可怪也欲定者定之亦可不須土此俱以后土為官陳氏禮書古者正祭有常數非正祭無常時故嵗祭天者四詩序曰春夏祈榖于上帝又曰豐年秋冬報則春祈榖左氏所謂啟蟄而郊是也夏祈榖所謂龍見而雩是也秋報月令所謂季秋大饗是也冬報周禮所謂冬日至于地上之圜丘是也凡此正祭也祭地之禮周禮所謂夏日至于澤中之方丘正祭也禱祠之屬非正祭也然先王親地有社存焉禮曰饗帝于郊祀社于國又曰郊所以明天道社所以神地道又曰郊社所以祀上帝又曰明乎郊社之義或以社對帝或以社對郊則祭社乃所以親地也大宗伯以血祭祭社稷又曰大封先告后土大祝大師大㑹同宜于社又曰建邦國先告后土則后土非社矣鄭氏釋大宗伯謂后土土神黎所食者釋月令其神后土謂后土黎也釋大祝謂后土社神也既曰土神又曰社神是兩之也書曰敢昭告于皇天后土左氏曰君戴皇天而履后土漢武帝祀后土于汾陰宣帝祠后土于河東而宋梁之時祠地皆謂之后土則古者亦命地示爲后土矣然周禮有大示有地示有土示有后土則所謂后土者非地示也蕙田案陳氏分正祭告祭極是但以冬至圜丘正祭爲冬報以祈榖雩大享爲正祭尚未的說見祀天門以方澤爲地示正祭以祀社為親地則千古不刋之論也至周禮有大示有地示有土示有后土又有社稷陳氏辨注既曰土神又曰社神是兩之也可謂抵鄭之隙矣但謂后土非地示畢竟后土何所指則不得其說矣竊謂大示即地示地示即后土對天神而言則曰地示以其配天神而非五土之示則曰大示以其尊於土示而君之則曰后土后土亦即地示也若土示則五土之示社稷則建國之土神而已鄭氏注后土為土神又注為社神自岐其指疎矣右后土告祭中庸郊社之禮所以事上帝也注社祭地不言后土者省文仲尼燕居郊社之義所以仁鬼神也注郊社所以祭天地周書泰誓郊社不修召誥孔疏社亦名后土地名后土名同而義異也蕙田案王者尊天而親地郊天與明堂五帝皆為祀天而莫尊於郊方澤與社皆為祭地而尤親於社故天子一嵗祭天凡四地雖止夏日方澤一祭他如載芟春祈良耜秋報豐年秋冬報月令孟冬大割祠與夫軍旅㑹同田獵災眚皆有事於社葢祭社亦是祭地故曰祀社于國所以列地利凡書中郊社並稱者於天舉所尊於地舉所親皆言其理而非言其制也乃世儒不察見郊社對舉遂以祭社當方丘之祭地誤矣右祭地稱社周禮春官大司樂夏日至于澤中之方丘奏之疏禮地示必于夏至之日者以地是隂夏至一隂生是以還于隂生之日祭之也劉氏彛曰陰生而祭地以助乎坤元資生之徳凡以神仕者以夏日至致地示注地陰也陰氣升而祭地示所以順其物也疏五月一陰生之日當陰氣升而祭之也蕙田案天子一嵗祭天冬至祈榖大雩明堂凡四而唯冬日至爲正祭方丘地之正祭也見於經者唯夏日至一祭而已孔疏謂地神有二嵗有二祭夫一地安得有二神而夏正之月亦未嘗有北郊之祭其繆甚矣又案月令仲春之月擇元日命民社郊特牲日用甲用日之始也疏社是國中之貴神甲是旬日之初始周諝曰甲者陽中之陽社用甲而不用乙欲其以陽召陰是祭社之日經有明文澤中夏至取其隂時隂位仲春甲日取其陽時陽日是地與社之祭日非惟不相似而且相反矣附辨孔賈祭神州月不同曲禮天子祭天地孔疏夏正之月祭神州地示于北郊或云建申之月祭之與郊天相對春官典瑞兩圭有邸以祀地賈疏三王之郊一用夏正未知神州何月祭之或解郊用三陽之月神州既與郊相對宜用三陰之月當七月祭也祭杜氏通典東晉咸和中議北郊用正月隋以孟冬神州于北郊唐因隋制依舊十月致祭開元禮以立冬祭神州于北郊陳氏汲曰祭地止夏至方澤豈得崑崙神州之異哉其曰三王之郊一用夏正是月令孟春天子以元日祈榖于上帝者非郊天也蕙田案注疏于夏至祭方澤之外添出神州一祭宜求其祭月不可得而徒為是紛紛也附辨諸家地有二祭四祭曲禮天子祭天地孔疏地神有二嵗有二祭夏至之日祭崑崙之神于方澤一也夏正之月祭神州地示于北郊二也于蔡氏禮圖說天子一嵗祭地有四大司樂夏日至澤中之方丘奏之凡以神仕者以夏日至致地物此夏至祭地于方澤一也詩小雅甫田以社以方頌有良耜此秋報二也月令孟冬大割祠于公社此冬祠三也大司馬仲春獻禽以祭社月令仲春擇元日命民社頌有載芟此春祈四也又曰天子一嵗四祭以夏至為大秋報冬祠春祈皆于方澤蕙田案地示無二方澤非社前辨已詳此嵗有二祭緣分崑崙神州為二也嵗有四祭緣合方澤社稷為一也一分一合二者胥失之陳及之楊信齋固云祭地止夏至方澤一祭耳右祭日通典配以后稷本注案鉤命訣釋孝經云郊祀后稷以配天地祭天南郊就陽位祭地北郊就陰位后稷為天地主文王為五帝宗明集禮配地之神周禮無文鄭𤣥以孝經緯云后稷爲天地主則后稷配天南郊亦當配地北郊矣其說無據至漢平帝用王莽之說以吕太后配光武時改薄太后為髙皇后以配後魏道武以神元靈后配則愈不經矣蕙田案祭地之配經無明文通典本注疏引緯書以后稷配明集禮謂為無據是也然王者父天母地中庸謂博厚配地髙明配天雖以徳言固三才之道也如配祭則周當以后稷而後世配天之祖亦當以配地此禮之以義起者也至地示無二配帝亦無二乃注疏裂崑崙神州為二示以嚳稷分配太平御覽載禮記外傳以后土后稷分配說愈支理愈窒至漢以吕太后配後魏以神元竇后配北齊以武徳皇后配無稽益甚矣右配神禮記祭義天子為耤千畆躬秉耒耜以事天地山川社稷先古以為醴酪齍盛蕙田案親耕粢盛秬鬯以事上帝本兼祭地在内詳見祀天門兹祭義一條明以天地社稷分别言之亦祭社非祭地之一證也右親耕粢盛醴酪周禮春官大宗伯以黄琮禮地注禮謂始告神時薦于神坐禮地以夏至謂神在崑崙者也禮神者必象其類琮八方象地八疏云琮八方以象地者天圎以對地方地有四方是方也易日天元而地黄今地用黄琮隨地色王氏與之曰鄭氏以大宗伯有蒼璧黄琮之文典瑞無之而云四圭有邸以祀天兩圭有邸以祀地遂以蒼璧所禮者冬至圜丘之祭四圭所禮者夏正郊天之祭黄琮所禮者崑崙之神兩圭所禮者神州之神其說甚誕蕙田案黄琮謂上為兩圭而以黄琮為邸也琮方象地黄則象其色土具五色以黄為主典瑞兩圭有邸以祀地注兩圭者以象地數二也僢而同邸疏僢而同邸者案王制注卧則僢彼僢謂兩足相向此兩圭亦兩足同邸是足相向之義故以僢言之則主四圭同邸者亦是各自兩足相向但就此兩足相向而言之也陳氏汲曰宗伯所謂蒼璧黄琮典瑞所謂四圭兩圭也蒼璧黄琮言其色四圭兩圭言其形以此推之若祀天則用四圭之蒼璧祭地則用兩圭之黄琮祭天地之處止於圜丘方澤安有天地之别崑崙神州之異哉考工記玉人兩圭五寸以祀地趙氏溥曰兩圭亦是用玉琢成方琮却於琮兩邊琢出兩圭相對其圭各長五寸邸者取其托宿之意天則以璧為邸地以琮為邸必以五寸則以地數不過五如書五曰土也此亦植在神坐前欲地示降而依憑存宿于中非所執之玉也此則典瑞兩圭有邸以祀地旅四望玉人制此器故特言其寸數易氏祓曰兩圭祀地對四圭祀天而言也天以健為體其徳無不周故其用為四圭其數為尺二寸地以順為體其徳有所止故半之而為兩圭殺之而其數為五寸知四圭尺有二寸而邸于璧則知兩圭五寸而托于琮蕙田案兩圭前後各一圭以黄琮為趺兩圭象地之有剛柔其本著于一琮象其得一以寧也五寸亦象地之有五方也鄭氏分作兩玉以祀兩地陳氏趙氏論之明矣春官大宗伯皆有牲幣各放其器之色明集禮周制禮地示之幣以黄蕙田案黄琮蒼璧是色不同兩圭四圭是制不同五寸尺有二寸是數不同祀天祭地之玉其别如此右玉幣尚書湯誥敢用𤣥牡敢昭告于上天神后召誥用牲于郊牛二林氏之竒曰用牛二者先儒以為后稷配不如王博士曰昊天有成命郊祀天地也葢祭地亦可以郊言之唯郊於天地故用二牛也周氏諝曰言郊則天神與地示也詩序曰昊天有成命郊祀天地也書曰用牲于郊牛二葢一則用于南郊以祀天神一則用于北郊以祭地示陳氏禮書大禮必簡小禮必繁簡則内心而貴誠繁則外心而貴味此所以郊特牲而社稷太牢諸侯膳天子用犢而天子禮諸侯以太牢也葢南郊所以祀天神北郊所以祭地示其謂之郊則同而其所以用特牲亦同故周頌曰郊祀天地是天地之祀皆謂之郊也書曰用牲于郊牛二是天地之牲皆用犢也周禮地官牧人陰祀用黝牲毛之注陰祀北郊及社稷也鄭司農云黝讀為幽黒也璧疏天神與宗廟為陽地與社稷為隂案大宗伯云蒼禮天黄琮禮地謂圜丘方澤下云牲幣各放其器之色則昊天與崑崙牲用蒼用黄四時迎五方天帝又各依其方色牲則非此騂牲黝牲惟有郊天及宗廟社稷一等不見牲色在此陽祀隂祀之中可知案郊特牲云郊之祭也大報天而主日兆于南郊就陽位也牲用騂是南郊用騂也檀弓云殷尚白周尚赤是祭宗廟時赤也據此而言則祭天于南郊及宗廟用騂也郊特牲云社祭土而主隂氣也是社稱陰孝經緯鈎命訣云祭地于北郊就陰位彼對郊天就陽位則是神州之神在北郊而稱陰以是知陰祀中有祭地于北郊及社稷也不從先鄭陽祀春夏者周祭宗廟四時同用騂夏至祭地方澤牲用黄春夏迎氣各隨方之色明不得同用騂故不從也云黝讀為幽幽黒也者以其幽是北方故從幽為黒也易氏袚曰黝者黒色之微陳氏禮書大宗伯牲幣各放其器之色則天以蒼不以騂地以黄不以黝牧人所言亦大率而已詩云來方禋祀以其騂黒則四方有用騂黒者孔子曰犁牛之子騂且角山川其舍諸則山川亦有用騂者禮記祭法瘞埋于太折祭地也用騂犢注地陰祀用黝牲與天俱用犢連言耳及疏云陰祀用黝牲毛之鄭康成注云陰祀祭地北郊社稷也又郊特牲云郊之用犢貴誠也彼文雖主南郊其北郊與天相對故知俱用犢也王制祭天地之牛角繭栗蕙田案祭天用犢而地亦用犢者尊地以配天也故郊之祭同陽祀用騂陰祀用黝祀天燔而祭地瘞者兩儀判而髙卑分也故郊之南北不同此聖人尊天親地之微意也至郊用特牲而社稷太牢方性夫曰于牲言特以見太牢之非一于牢言太以見特牲之用犢也孕牲祭地弗用則社稷容或用焉是祭地之牲又不同于社稷也右犧牲郊特牲器用陶匏以象天地之性也蕙田案郊祭兼圜丘方澤其體多相同故經言郊則統天地言之凡酒醴粢盛籩豆器用據周禮所載非惟祭地無明文即祭天亦統于祭大神之内故郊特牲所載毎多渾言惟此條明㸃出地字推之可見也又案郊祭用犧尊社壝用大罍器用之不同于祭社亦一證右器用禮記月令季夏之月令婦官染采黼黻文章必以法故以給郊廟祭祀之服蕙田案祭地之服經無明文統于祭天也統于祭天者統于衮冕也大裘特為冬至設耳故春官司服但言冕不言衮衮之章從乎冕未有冕而不衮者也祀天大裘葢謂異乎諸祭之服但衮冕耳郊特牲祭之日王被衮以象天家語天子大裘以黼之則固衮而備黼黻文章矣祭地去大裘而衮冕則郊祭之服同也乃注疏謂祭天地同服大裘是誤以祭天為但服大裘而不被衮并誤以祭地為同服大裘但知天地之祭同服而不知同者衮冕而非大裘也觀月令此條不惟祭地之不服大裘可見而祭天之服裘被衮亦可證矣何乃泥于大裘而冕一語致穿鑿無理如是耶附辨賈孔祭地服大裘天官司裘掌為大裘賈疏以其祭天地之服故以大言之王制一命卷孔疏祭地之服無文案詩昊天有成命郊祀天地也天地相對則祭地亦用大裘故孝經援神契云祭地之禮與祭天同亦據衣服同故也靈杜氏通典王及尸同服大裘注祭地之服無文崔㤙賈公彦孔穎達皆云與祭天同服今案郊特牲云器用陶匏以象天地之性是同器也王制云天地之牛角繭栗是同牲也又鈎命訣云地配以后稷又配祭同也此類頗多凡覆載功齊煦嫗徳一尚質之義安有二哉程子曰元祐時朝廷議行北郊只因五月間天子不可服大裘皆以爲難行不知郊天郊地禮制自不同天是資始故凡物皆尚純藉用藳秸器用陶匏服用大裘是也地則資生安可亦用大裘當時諸公知大裘不可服不知别用一服是時蘇子瞻便據昊天有成命之詩謂郊祀同文潞公便謂譬如祭父母作一處何害曰此詩冬至夏至皆歌豈不可耶郊天地又與共祭父母不同也此是報本之祭須各以其類祭豈得同時耶蕙田案程子謂天資始而尚純是大裘無衮冕也推之地資生則宜尚華尚備服用衮冕而不用大裘可矣于器用陶匏以象天地之性二句義便不合是程子此條論祭地不服裘則是論祭天服裘為純色義尚未確楊氏復曰自漢以來分冬至夏至二祀為南北郊南郊則周人之圜丘也北郊則周人之方澤也然後之人主欲行親郊之禮者未聞以南郊為難而常以北郊為難夫五月雖盛暑之月他事之當舉他禮之當行者未甞廢也而獨難于北郊何也諸儒謬誤之說惑之也案司服王祀昊天上帝則服大裘而冕祀五帝亦如之惟祀地之服經無明文鄭注亦未甞及之賈公彦始為之疏曰崑崙神州亦服大裘可知夫賈公彦一時率爾之言未甞深考其故豈有夏至陽極之月而可服大裘哉而崔靈恩孔頴達與杜佑通典亦為是說于是祀天地之服不問寒暑必服大裘而北郊遂為不可行之禮至本朝元祐中議北郊禮論者猶以大裘不可服為言于是始有請於冬至南郊而合祭天地者矣若顧臨等所言是也有援虞周告祭之禮以證祀地之正祭者矣如蘇軾之言是也因諸儒一時謬誤之言而欲廢祀地之大典可不惜哉又曰王者事天明事地察祭祀冕服同乎異乎曰冬至祀天夏至祀地蒼璧禮天黄琮禮地各因其類以象天地之性者不容以不異也冕服者王之所服以事昊天上帝后土地示不容以不同也但夏至不用大裘爾周官屨人曰凡四時祭祀以宜服之夫屨猶辨四時之宜則冕服可知矣唐長孫無忌曰天子祀天地服大裘冕案周郊祀被衮以象天戴冕璪十二旒與大裘同月令孟冬天子始裘以禦寒冬至報天啟蟄祈榖服裘可也孟夏迎氣龍見而雩如之何而可服故歴代惟服衮章斯言也信而有証矣右服冕儀禮覲禮祭地瘞敖氏繼公曰瘞埋也皆順其性而為之禮記祭法瘞埋于太折祭地也用騂犢疏謂瘞繒埋牲方氏慤曰瘞埋則藏之幽藏之幽者地道也謂瘞繒埋牲于土禮運祭地瘞繒注埋牲曰瘞幣帛曰繒或作贈法疏瘞繒者瘞埋也謂祀地埋牲也祭云瘞埋于太折祭地也幣帛曰繒繒之言贈也謂埋告又贈神也方氏慤曰繒帛藏之于幽故言瘞馬氏彦醇曰古者蒼璧禮天黄琮禮地未甞有瘞埋之玉也先儒謂燔柴瘞埋俱有玉以降天神出地示肆師曰大祀用玉帛牲牷雲漢云圭璧既卒皆謂禮神之玉此經燔柴瘞埋有帛而無玉也葢祭天不燔玉而燔帛祭地不瘞玉而瘞繒禮運云祭祀瘞繒是也正如諸侯之禮三帛二生一死贄則受之而五玉卒乃復也爾雅釋天祭地曰瘞埋注既祭埋藏之則疏祭法瘞埋于太折祭地然祭神州地示于北郊瘞繒埋牲因名祭地曰瘞埋李廵曰祭地以玉埋地中曰瘞埋孫炎曰瘞者翳也既祭翳藏地中文獻通考宋元豐元年九月陳襄等言陰祀自血始然則瘞血以致神明不可不在先也及致示矣方有事焉至於禮畢則以牲幣之屬瘞之然後為禮之終故儀禮謂祭地瘞而鄭氏謂祭禮終矣備矣先儒有謂于瘞之始即用牲幣之屬既不經見而又未薦神遽以瘞之則是備于先而闕于後也至後世知瘞牲幣于祭末而不知致神于其始則是備于後而闕于先也請祀北郊先行瘞血之禮俟薦獻禮畢即瘞牲幣之屬則始終之禮備從之陳氏禮書曽子問曰天子将出必以幣帛皮圭告于祖禰反必告釋奠卒歛幣玉藏之兩階之間君薨而世子生太祝執束帛升奠帛于殯東几上遂朝奠小宰升舉幣則宗廟之瘞在既事之後矣祭天曰燔柴祭地曰瘞埋又周人尚臭而升煙瘞埋乃臭氣也則天地之燔瘞在行事之前矣賈公彦謂天神中非直有升煙玉帛牲亦有禮神者也地示中非直有瘞埋牲亦有禮神者也以為瘞埋在作樂降神之後而禮神又燔瘞之後則燔瘞之與禮神固有二玉二帛二牲矣以宗廟之祭考之升首所以報陽則天地燔瘞固用首矣漢用牲首葢禮意也周官羊人凡釁積共其羊牲犬人凡祭祀共犬牲伏瘞亦如之鄭司農曰瘞謂埋祭祭地曰瘞埋則燔瘞用犬羊矣此豈施于天地之大祀與夫次祀小祀者乎周魏之間燔柴皆于祭末郭璞云祭天既祭積柴燒之祭地既祭瘞埋藏之恐先王之時祭祀事畢亦有燔瘞之禮其詳不可考也書金縢稱周公曰爾之許我我其以璧與圭瘞俟爾命則禮神之玉其終固燔瘞矣蕙田案燔瘞之禮當以宋元豐陳襄議為是陳氏禮書謂燔瘞用牲首及燔瘞有玉皆非是詳見祀天門祭地曰瘞周禮以血祭祭社稷是祭名不同也右瘞埋周禮春官大司樂凡樂函鍾為宫太蔟為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣注禘大祭也地示則主崑崙函鍾林鍾也林鍾生于未之氣未坤之位或曰天社在東井輿鬼之外天社地神也地宫林鍾林鍾上生太蔟太蔟下生南吕南吕上生姑洗鄭司農云靈鼓靈鼗四面𤣥謂靈鼓靈鼗六面孫竹竹枝根之末生者空桑山名舞疏言六變八變九變者謂在天地及廟庭而立四表人從南表向第二表為一成一成則一變從第二至第三為二成從第三至北頭第四表為三成舞人各轉身南向于北表之北還從第一至第二為四成從第二至第三為五成從第三至南頭第一表為六成則天神皆降若八變者更從南頭北向第二為七成又從第二至第三為八成地示皆出若九變者又從第三至北頭第一為九變人鬼可得禮焉此約周之大武象武王伐紂故樂記云且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分陜周公左召公右六成復綴以崇其餘大濩已上雖無滅商之事但舞人須有限約亦應立四表以與舞人為曲别也云函鍾林鍾也者月令謂之林鍾是也云林鍾生于未之氣未坤之位者林鍾在未八卦坤亦在未故云或曰天社在東井輿鬼之外者案星經天社六星輿鬼之南是其輿鬼外也天社神位皆是地示故以林鍾為地宫也地宫林鍾林鍾上生太簇太簇為角太簇下生南吕南吕為羽先生後用也南吕上生姑洗姑洗為徴後生先用四聲足矣云孫竹竹枝根之未生者案詩毛傳云枝幹也幹即身也以其言孫若子孫然知竹根未生焉薛氏士隆曰林鍾丑之衡為地統與其他之律皆相生之次而用地靜而不變以生為本故以相生為用不與圜丘宗廟同王氏詳說曰林鍾上生太簇太簇下生南吕南吕上生姑洗然先姑洗而後南吕以姑洗數多而南吕數少耳相生者地之功故于地言之鄭氏鍔曰地功始于寅故用太蔟為角角言功之始地功成于辰故用姑洗為徴徴言功之成地功終于酉故用南吕為羽羽言功之終天神而地靈故以靈名其鼓與鼗樂用函鍾言地為萬物之君終于南吕象其作成萬物之效鼓鼗言其徳之靈管象其生之衆空桑言其道無所不容咸池言其澤無所不徧而丘之體又象地之方祭之日用夏至一陰始生之日以類求類如此安有神之不出乎蔡氏徳晉曰函鍾即林鍾屬未其位為坤地勢坤萬物皆致養焉故祀地用以為宫不曰林而曰函與易坤卦含宏同意林鍾生太蔟太蔟生南吕南吕生姑洗者律之相生者也相生者地之功故祀地取之函鍾為宫蕤賓為之合太簇為角應鍾為之合姑洗為徴南吕為羽而交相合焉宫之旋而在地者其合降而三也鼓鼗以靈名靈為地之徳也孫竹竹旁生而柔穉者其音和平于祭地示宜也樂八變者咸池之樂以八變而終也天神在上故曰降地示在下故曰出言皆出者亦謂后土來格而諸地示隨之也方氏苞曰天之體動故其感較速地之體靜故其感較遲上言五變而致土祇此言八變而地示皆出何也上列序五地土祗者原隰之祗耳記曰大旅具矣不足以享帝則方澤之祭較之原隰之祗其感召必有難易可知也蕙田案此致示之樂乃奏太簇歌應鍾舞咸池以祭地示注太簇陽聲第二應鍾為之合咸池大咸也云疏地示卑于天神故降用太簇陽聲第二及咸池也太簇陽聲第二應鍾為之合者以黄鍾之初九下生林鍾之初六林鍾之初六上生太簇之九二是陽聲之第二也太簇寅之氣也正月建焉而神在娵訾應鍾亥之氣也而辰在析木是應鍾為之合也云咸池大咸也者此云咸池上文云大咸以為一物故云大咸也鄭氏鍔曰太簇者建寅之律陽聲之第二應鍾雖非陽聲之第二然其位在亥寅與亥相合之辰故奏太簇必歌應鍾之調取其合也易氏祓曰池以象地之澤唐堯氏之樂唐堯氏徳與地合故咸池之樂起于太簇之寅應以應鍾之亥是太簇為六律之次應鍾為六同之次咸池為六舞之次以祭地示類也蔡氏徳晉曰太簇屬寅陽聲第二應鍾屬亥陰聲第六為之合寅與亥合也咸池六樂第二蕙田案此祭示之樂右樂周禮春官大祝凡祭示逆尸相尸禮小祝大祭祀送逆尸沃尸盥曲禮孔疏天子祭天地社稷山川四方百物皆有尸右尸周禮春官大祝掌六祝之詞以事鬼神示辨六號三曰示號注號謂尊其名更為美稱焉示號若云后土地示祭示則執明水火而號祝注明水火司烜所共日月之氣以給烝享執之如以六號祝明比圭潔也劉氏敞曰祭示祭地方澤禮最大故特言大戴禮公符篇古祝詞溥溥之土承天之神興甘風雨庶卉百榖莫不茂者既安且寧維予一人敬拜下土之靈維某年某月上日右祝周禮天官冢宰前期十日帥執事而卜日遂戒祀大示亦如之春官大宗伯祭大示帥執事而卜日凡祭大示宿眂滌濯涖玉鬯詔大號治其大禮詔相王之大禮天官大宰及執事視滌濯祀大示亦如之春官大宗伯凡祭大示涖玉鬯省牲鑊奉玉齍注玉禮神之玉也皆疏即黄琮之等兩圭之類是禮神置于神坐也秋官蜡氏凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野疏大祭祀謂郊祭天地大祝凡祭示逆牲天官大宰及納烹贊王牲事祀大示亦如之春官大宗伯祭大示省牲鑊天官大宰贊玉幣爵之事祀大示亦如之小宰凡祭祀贊玉幣爵之事蕙田案祀天圜丘祭地方澤皆謂之郊然其禮有與祀天異者有與祀天同者澤中方丘夏日至玉幣犧牲瘞埋樂舞皆與天異者從其類也至卜日誓戒陳設省視酒醴粢盛籩豆器用服冕車旗及祭日儀節始終之序皆與天同者均其尊也今特舉其異而明著大示者編列如右其同者已詳祀天門不復載閱者參互考之可其見禮之等殺焉右儀節五禮通考卷三十七
