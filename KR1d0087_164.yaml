西南面一品以下主人出脱衣于房贊者徹饌設於東房内如初婦脱衣于室袵于奥又徹室内酒罇以出王脫冕服于房妃從者受之妃脱服于室王從者受之姆受巾王從者袵于奥妃從者袵良席于東皆有枕北趾一品以下無交受服姆受巾王入燭出妃從者餕王之餘王從者餕妃之餘贊者酌户外罇酳之王從者皆婦人妃從者侍于户外呼則聞妃朝見一品以下見舅姑其日依時刻諸衛勒所部屯門列仗妃夙興沐浴著花釵服褕衣乗厭翟車以出侍從如常至降車所妃下車司賔引妃立扵閤外近臣入奏皇帝即御座南向坐近臣如常妃奉笲笲竹器元表纁裏棗栗司賔引妃入立于庭北面妃再拜司賔引妃升自西階進北面跪奠于皇帝前興皇帝撫之尚食進饌以東司賔引妃降復位又再拜尚儀承勅降詣妃西北東面稱勅㫖妃再拜宣勅訖又再拜司賔引妃出遂詣皇后所御之殿立于閤外奉笲腵脩六尚以下各服其服俱詣閤奉迎尚儀入奏皇后即御座南向坐近臣如常司賔引妃入立扵庭北面再拜司賔引妃升自西階進北面跪奠於皇后前興皇后撫之尚食進徹以東司賔引妃降復位又再拜尚儀前承令降詣妃西北稱令㫖妃再拜宣令訖又再拜司賔引妃出閤侍從如常妃乗車還第如來儀一品以下見舅姑儀質明贊者見婦于舅姑立于寢門外贊者布舅席于東序西向布姑席于房中之西南向舅姑俱即席坐婦執笲棗栗自門外入升自西階東面再拜進跪奠于舅席前舅撫之贊者進徹以東婦退復東面位又再拜自西階階受笲腵修從者執俟于階下升進北面再拜進跪奠于姑席前姑撫之内贊者徹以東退復北面位人再拜贊設婦席于室户西南面在姑席之西少北側罇甒醴于房内東壁下加勺羃籩豆各一實以脯醢在罇北設洗東房近北罍水在洗西篚在洗東北肆篚實以觶巾角柶各一加羃婦立于席西南面内贊者盥手洗觶酌醴加柶面柄出房詣婦席前北面立婦進東面拜退復位内贊者西階上拜送内贊薦脯醢于席前婦升席坐左執觶右取脯擩于醢祭于籩豆之間加柶祭醴三始扱一祭又扱再祭加柶于觶面業興降席西東面坐啐醴加柶興拜内贊者答拜婦進升席跪奠觶于豆東取脯降自西階以出授婦氏從入于寢門外婦盥饋儀舅姑入于室婦盥饋贊者布席于室之奥舅姑共席坐俱東面南上贊設罇于室内北牖下饌于房内西牖下具饌如同牢牲體皆節折右載之於舅爼左載之于姑爼婦入升自西階入房以醬進設于舅姑席前其他饌從者設之加七箸俱以南為上爼入各設于豆東訖贊者各受箸舅姑各以韭葅擩于醬祭于邊豆之間又祭飲訖乃食婦入于房内盥手洗爵入室酌酒酳舅進奠爵于舅席前少東西面再拜舅取爵祭酒飲之婦受爵出户入房奠于篚又盥洗爵酌酒酳姑如酳舅之禮設婦席于室内北牖下罇東南面婦徹饌設于席如初西上婦親徹醬設之其他從者設之婦進西面再拜退升席南向坐將餕舅辭命易醬内贊者易之婦乃餕姑饌婦祭内贊者助之既祭乃食三飯卒食内贊者洗爵酌酒酳婦婦降席西面再拜受爵升席坐祭酒飲訖執爵興降席東面立内贊受爵奠于篚婦進西面再拜姑先降自西階婦降自阼階凡庶子婦舅不降而婦降自西階以出昏㑹主人及賔俱公服饌以籩豆簠簋爼銒罇爵巾坫其日主人至賔大門外之西東面立賔立於東階下西面儐者進于賔左北面受命出立扵門外之東西面曰敢請事主人曰某有嘉禮請公有顧王則稱王以下准此儐者入告遂引賔出大門外之東西面再拜主人答拜主人曰某有嘉禮請公有顧賔曰敢辭主人曰敢固請賔曰辭不得命敢不從主人拜賔答拜主人還賔遂與諸親從之掌事者先鋪賔席于堂上楹間近北南向設賔之宗室席位于賔西南賔之異姓席位于宗室之南又扵西廊下一品以下于西階下設異姓席位皆重行東向以北為上設主人席位于東階上西向設主人宗室席位于主人東北設異姓席位于宗室之北皆重行西向以南為上又設主人異姓席位于東廊下一品以下于東階下重行西向以北為上賔至扵主人大門外之西東向賔之宗室立扵賔西南異姓立宗室之南俱重行東面以北為上儐者引主人出立扵大門外之東西面主人諸親立于大門外之東重行西面以南為上立定主人西面再拜賔東面答拜主人揖賔報揖儐者引主人以入又儐者引賔以入賔之諸親以次從入至門内主人諸親從入如常至階主人揖賔報揖賔主及諸親以次升各立扵席後其在庭者亦如之立定賔主及諸親俱坐執觴者酌酒一品以下執爵者下倣此升自東階酒升堂賔與主人及諸親皆起執觴者以酒授主人儐者引主人進詣賔前北面立賔自席西進東南向受酒儐者引主人退復位賔還席後賔主及諸親俱坐執觴者又以酒授主人及諸親賔主俱祭而飲諸親不祭而飲觴行一周食升堂賔主及諸親皆起掌事者以醢醬豆授主人儐者引主人進設於賔席前賔曰請公無辱主人曰不敢忘禮儐者引主人復位執饌者以饌進設于賔主席前加以七箸執饌者又以饌設于衆賔以下設訖賔主及諸親皆坐賔主皆祭而食諸親不祭而食于賔祭主人辭曰蔬食不足祭賔主俱食三飯而止主人曰請公食賔更飯食畢遂進庶饈觴如常㑹畢賔主及諸親俱興儐者各引賔主以下降出賔主及賔之諸親皆復門外位主人諸親復門内位主人再拜送賔退儐者引主人入婦人禮㑹女賔乗車入至下車所内儐者引入主人迎送于門内相稱之辭各准其夫餘如丈夫之禮饗丈夫送者其日掌事者鋪賔席于堂上楹間近北南向又鋪主人席于阼階上西向又設衆賔席扵賔西南設從者席位于西廊下一品以下西階下俱重行東向以北為上儐者引賔以下立于主人門外之西重行東向以北為上立定儐者引主人出立于門東西向主人揖賔報揖儐者各引賔主以下入至階主人揖賔報揖賔主以次升立於席後立定賔主以下俱坐遂進酒設食如昏㑹之儀㑹畢賔主以下俱興儐者引賔立扵西階上東面主人掌事者牽馬入陳于門三分庭一在南北首西上一品以下無馬又掌事者奉束帛之篚升授主人主人執篚西面立賔西階上北面再拜主人進立扵楹間南面賔進立於主人之右俱南面主人授篚賔受之退立扵西階上北面主人還阼階上北面再拜送儐者引賔以下降自西階從者迓受篚賔及庭東面揖左馬以出牽馬者從之在庭者以次出俱復門外位從者迓受馬一品以下無受馬儀初賔降儐者引主人降自東階出門東西面拜送賔退主人入饗婦人送者其日女贊者鋪賔席扵堂上楹間近北南向又鋪主人席扵阼階上西向又設衆賔席於廊下俱重行東向以北為上女相者引賔以下立扵主人門外之西重行東面以北為上立定女相者引主人出立扵門外之東西面女相者引賔入衆賔以下從入賔入門西東面立定俱坐遂進酒設食如昏㑹之儀㑹畢賔主以下俱興女相者引賔立于西階上東面女相者奉束帛之篚升以授主人主人執篚進于楹間南面立女相者引賔進立扵主人之右俱南面主人授幣訖女相者引賔降出從者迓受篚衆賔以下從出初賔降女相者引主人降送于門内賔出女相者引主人入一品以下内相者引賔升主人迎送于閤内相稱之辭各准其夫酬以束帛如丈夫之禮公主出降納采前一日主人設使者次于大門之外道右南向其納吉納徴請期親迎等禮皆如之其日大昕使者至扵主人大門外贊禮者延入次凡賔主及行事者皆公服使者出次贊禮者引至扵大門外之西東面主人立扵東階下西面儐者立扵主人之左北面受命出立扵門東西面曰敢請事使者曰朝恩貺室於某公之子某公有先人之禮使某也請納采儐者入告主人曰寡人敢不敬從儐者出告掌畜者以鴈授使者其餘並如一品昏儀問名使者既出至主人還阼階上西面曰皇帝第某女封某公主餘行事並如一品昏儀其禮使者于户牖之間贈之篚幣及兩馬詞云吾子為事故至于寡人之室寡人有先皇之禮請禮從者納吉其日大昕使者至請事使者曰加諸卜占曰吉使某也敢告主人曰某公有吉寡人與在焉寡人不敢辭如納采之儀納徴其日大昕使者至入次掌事者布幕于内門外𤣥纁束帛陳于幕上乗馬在幕南北首西上掌事者奉璋以匵俟扵幕東使者曰朝恩貺室於某公之子某公有先人之禮使某也以束帛乗馬請納徴主人曰某公順先典貺以重禮寡人敢不承命餘並如一品昏儀請期其日大昕使者至入次至請事依常禮使者曰某公有賜既申受命某公使某請吉日儐者入告主人曰寡人既前受命唯命是聽使者曰某公命某聽命扵王儐者入告主人曰寡人固唯命是聽使者曰某公使某受命于王王不許某敢不告期曰某日餘並如一品昏儀親迎其日大昕壻之父告廟醮子並如一品昏儀子再拜降出乗輅備儀仗詣主人之第賔將至内贊者布席扵東房當户南向設罇甒醴等扵東房主人醴公主如一品醴女之儀公主著花釵褕翟纁袇入房以下並如一品醴女儀訖主人降立扵東階東南西面贊禮引賔出次立於門西東面儐者進受命出門東面曰敢請事賔曰某王命某之父以兹初昏命某將請承命儐者入告主人曰寡人固敬具以須至奠鴈出如常禮初賔入門主婦出立扵房户外之西南面扵賔拜訖姆導公主出主人少進西面戒之必有正焉若衣若花命之曰戒之敬之夙夜無違命主婦戒之於西階上施衿結帨戒之曰勉之敬之夙夜無違公主出以下並如常儀同牢初昏掌事者設洗扵東階東南及陳設牢饌鉶爼之數各依其品羊豕節折大羮在扵爨其器皆明烏漆惟㽅以陶卺以匏餘並如一品儀見舅姑見之日公主夙興沐浴著花釵服褕翟舅服公服姑著鈿釵禮衣其儀同一品昏禮公主降西階以出無取脯授婦氏之儀盥饋舅姑公主盥饋以少牢舅姑公主服如見禮及酳舅姑訖内贊者設公主席扵舅姑東北南面餘並如一品儀昏㑹如一品昏儀婦人禮㑹如一品昏儀饗丈夫送者同一品儀加送以乗馬設從者乃扵西廊下饗婦人送者女相者引賔升降酬以束帛餘如丈夫禮唐書元宗本紀開元二十一年五月以皇太子納妃降死罪流以下從之食貨志開元二十二年詔男子十五女十三以上得嫁娶舊唐書代宗本紀大歴元年正月禁王公宗室郡縣主之家不得與諸將昏姻通典建中元年十一月禮儀使顔真卿等奏郡縣主見舅姑請于禮㑹院過事明日早舅姑坐堂上行執笲之禮其觀華燭仗以昏禮主敬竊恐非宜並請停障車下壻却扇等行禮之夕可以感思至扵聲樂竊謂非禮並請禁斷相見儀制近代設以氈帳擇地而置此亦非禮合於堂室中置帳請准禮施行俗忌今時以子午卯酉年謂之當梁年其年娶婦舅姑不相見盖禮無所據亦請禁斷並從之其制多因周禮以三品以上五品以上六品以下爲降殺並如開元禮舊唐書徳宗本紀貞元九年八月皇太子長男廣陵王淳納妃郭氏敬宗本紀長慶四年正月穆宗崩皇太子即位三月詔六宅十宅諸王女宜令每年扵選人中選擇降嫁冬十月丙子朔宗正寺選尚縣主壻和元亮等二十五人各賜錢三十萬令備吉禮文宗本紀太和七年八月詔十六宅諸縣主委吏部于選人中簡擇匹配具以名聞右隋唐昏禮五禮通考卷一百五十四
