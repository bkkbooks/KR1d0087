body:
  text: 五禮通考卷一百五十四刑部尚書秦蕙田撰嘉禮二十七昏禮漢書惠帝本紀四年冬十月立皇后張氏通典漢惠帝納后納采鴈璧乗馬束帛聘黄金二萬斤馬十二匹吕氏為惠帝娶魯元公主女故特優其禮六年冬令女子年十五以上至三十不嫁五算注應劭曰越王令女子年十七不嫁者父母有罪漢律人出一算算百二十錢今使五算罪謫之也宣帝本紀五鳳二年秋詔曰夫昏姻之禮人倫之大者也酒食之㑹所以行禮樂也今郡國二千石或擅為苛禁禁民嫁娶不得具酒食相賀召由是廢郷黨之禮令民亡所樂非所以導民也詩不云乎民之失徳乾餱以愆勿行苛政平帝本紀元始三年春詔有司為皇帝納采安漢公女又詔光禄大夫劉歆等雜定昏禮四輔公卿大夫愽士郎吏家屬皆以禮娶親迎立軺併馬外戚傳孝平皇后安漢公太傅大司馬莽女也平帝即位成帝母太皇太后稱制而莽秉政莽欲依霍光故事以女配帝太后意不欲也莽設變詐令女必入因以自重太后不得已而許之遣長樂少府夏侯藩宗正劉宏少府宗伯鳳尚書令平晏納采太師光大司徒馬宮大司空甄豐左將軍孫建執金吾尹賞行太常事大中大夫劉歆及太卜太史令以下四十九人賜皮弁素幘以禮雜卜筮太牢祠宗廟待吉月日明年春遣大司徒宮大司空豐左將軍建右將軍甄邯光禄大夫歆奉乘輿法駕迎皇后扵安漢公第宮豐歆授皇后璽紱登車稱警蹕便時上林延夀門入未央宮前殿羣臣就位行禮大赦天下益封父安漢公地滿百里賜迎皇后及行禮者自三公以下至騶宰執事長樂未央宮安漢公第者皆增秩賜金帛各有差王莽傳莽既尊重欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宫未建掖廷媵未充乃者國家之難本從亡嗣配取不正請考論五經定取禮正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女事下有司上衆女名王氏女多在選中者莽恐其與己女争即上言身無徳子材下不宜與衆女並採太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省户下咸言明詔聖徳巍巍如彼安漢公盛勲堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生而上書者愈甚太后不得已聽公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以貳正統莽白願見女太后遣長樂少府宗正尚書令納采見女還奏言公女漸漬德化有窈窕之容宜承天序奉祭祀有詔遣大司徒大司空䇿告宗廟雜加卜筮皆曰兆遇金水王相卦遇父母得位所謂康强之占逢吉之符也信郷侯佟上言春秋天子將娶扵紀則褒紀子稱侯安漢公國未稱古制事下有司皆曰古者天子封后父百里尊而不臣以重宗廟孝之至也佟言應禮可許請以新野田二萬五千六百頃益封莽滿百里莽謝曰臣莽子女誠不足以配至尊復聽衆議益封臣莽伏自惟念得託肺腑獲爵土如使子女誠能奉稱聖徳臣莽國邑足以共朝貢不須復加益地之寵願歸所益太后許之有司奏故事聘皇后黄金二萬斤為錢二萬萬莽深辭讓受四千萬而以其三千三百萬予十一媵家羣臣復言今皇后受聘踰羣妾亡幾有詔復益二千三百萬合為三千萬莽復以其千萬分予九族貧者通典漢制皇太子納妃奉常迎時叔孫通定禮以天子無親迎之義皇太子以奉常迎也蕙田案天子親迎之禮不見於經惟家語有冕而親迎之語諸儒以為即指魯君其言近是叔孫此說或有所本後漢書桓帝本紀建和元年秋立皇后梁氏懿獻梁皇后紀后諱女瑩順烈皇后之女弟也帝初為蠡吾侯梁太后徴欲與后為昏未及嘉禮㑹質帝崩因以立帝明年有司奏太后曰春秋迎王后于紀在塗則稱后今大將軍冀女弟膺紹聖善結昏之際有命既集宜備禮章時進徴幣請下三公太常案禮儀奏可扵是悉依孝惠皇帝納后故事聘黄金二萬斤納采鴈璧乗馬束帛一如舊典建和元年六月始入掖庭八月立爲皇后通典靈帝冊宋貴人為皇后天子御章徳殿軒百官陪位太尉襲使持節奉璽紱皇后北面帝南面太尉立階下東向宗正大長秋西向宗正讀冊文曰維建寜四年七月乙未制誥皇后之尊與帝齊體供奉天地祗承宗廟母臨天下故有革興殷姜任母周二代之崇盖有内徳長秋宫闕中宫曠位宋貴人秉淑媛之懿體河山之儀威容昭曜徳冠後庭羣僚所咨僉曰宜㦲卜之蓍龜卦得承乾有司奏議宜稱紱組以母兆人今使太尉襲使持節奉璽紱宗正祖為副立貴人為皇后后其徃踐爾位敬遵禮典肅慎中饋無替朕命永終天禄冊文畢皇后拜稱臣妾畢住位太尉授璽紱中常侍長秋太僕髙郷侯覽長跪受璽紱奏扵殿前女使授婕妤長跪受以授昭儀受長跪以帶皇后皇后伏起拜稱臣妾畢黄門鼓吹三通鳴鼔畢羣臣以次出后即位大赦天下皇后秩比國王即位威儀赤紱玉璽也漢志乘輿黄赤綬四采黄赤縹紺純黄質長二丈九尺九寸太子太后與乘輿同後漢書杜喬傳建和元年代胡廣為太尉桓帝將立梁冀妹冀欲令以厚禮迎之喬據執舊典不聽後漢書獻穆皇后紀后諱節曹操之中女也獻帝建安十八年操進三女憲節華為夫人聘以束帛𤣥纁五萬匹小者待年扵國十九年並拜為貴人通典後漢鄭衆百官六禮辭大略因於周制而納采女家答辭末云奉酒肉若干再拜反命其所稱前人不云吾子皆云君六禮文皆封之先以紙封表又加以皂囊著箧中又以皂衣箧表訖以大囊表之題檢文言謁箧某君門下其禮物凡三十種各内有謁文外有贊文各一首封如禮文箧表訖蠟封題用皂帔葢于箱中無囊表便題檢文言謁篋某君門下便書贊文通共在檢上禮物以元纁羊雁清酒白酒粳米稷米蒲葦卷栢嘉禾長命縷膠漆五色絲合歡鈴九子墨金錢禄得香草鳳凰舍利獸鴛鴦受福獸魚鹿烏九子婦陽燧總言物之所象者元象天纁法地羊者祥也羣而不黨鴈則隨陽清酒降福白酒歡之由粳米養食稷米粢盛蒲衆多性柔葦柔之久卷栢屈卷附生嘉禾須禄長命縷縫衣延夀膠能合異類漆内外光好五色絲章彩屈伸不窮合歡鈴音聲和諧九子墨長生子孫金錢和明不止禄得香草為吉祥鳳凰雌雄伉合舍利獸亷而謙鴛鴦飛止須匹鳴則相和受福獸體恭心慈魚䖏淵無射鹿者禄也烏知反哺孝扵父母九子婦有四徳陽燧成明安身又有丹為五色之榮青為色首東方始右漢昏禮三國魏志齊王本紀正始四年夏四月乙卯立皇后甄氏大赦通典魏制天子冊后以皮馬庭實加榖珪齊王正始四年立后甄氏其儀不存諸侯娶妃以皮馬為庭實加以大璋王娶妃公主嫁五禮用絹百九十匹晋書武帝本紀泰始九年秋七月詔聘公卿以下子女以備六宫採擇未畢權禁斷昏姻冬十月辛巳制女年十七父母不嫁者長吏配之禮志泰始十年將納拜三夫人九嬪有司奏禮王后聘以榖珪無妾媵禮贄之制詔曰拜授可依魏氏故事于是臨軒使使持節兼太常拜三夫人兼御史中丞拜九嬪武帝本紀咸寜二年冬十月丁卯立皇后楊氏禮志咸寜二年臨軒遣太尉賈充䇿立皇后楊氏納悼后也因大赦賜王公以下各有差百僚上禮太康八年有司奏昏納徴大昏用𤣥纁束帛加珪馬二駟王侯𤣥纁束帛加璧乗馬大夫用𤣥纁束帛加羊古者以皮馬為庭實天子加以榖珪諸侯加大璋可依周禮改璧用璋其羊鴈酒米𤣥纁如故諸侯昏禮加納采告期親迎各帛五匹及納徴馬四匹皆令夫家自備惟璋官為具致之尚書朱整議案魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以榖珪諸侯加以大璋漢髙后制聘后黄金二百斤馬十二匹夫人金五十斤馬四匹魏氏王娶妃公主嫁之禮用絹百九十匹晋興故事用絹三百匹詔曰公主嫁由夫氏不宜皆為備物賜錢使足而已惟給璋餘如故事成帝本紀咸康二年春立皇后杜氏大赦增文武位一等四月皇后見于太廟禮志咸康二年臨軒遣使持節兼太保領軍將軍諸葛恢兼太尉䕶軍將軍孔愉六禮備物拜皇后杜氏即日入宫帝御太極殿羣臣畢賀賀非禮也王者昏禮禮無其例春秋祭公逆王后于紀榖梁左氏傳說與公羊又不同而自漢魏遺事並皆闕略武惠納后江左又無復儀注故成帝將納杜后太常華恒始與博士參定其儀據杜預左氏傳説主昏是供其昏禮之幣而已又周靈王求昏于齊齊侯問于晏桓子桓子對曰夫婦所生若如人姑姊妹則稱先守某公之遺女若如人此則天子之命自得下達臣下之答徑自上通先儒以謂丘明詳録其事盖為王者昏娶之禮也故成帝臨軒遣使稱制拜后然其儀注又不具存華恒傳恒領太常帝將納后冦難之後典籍靡遺昏禮無所依據恒推尋舊典撰定禮儀事並施用康帝本紀咸康八年即皇帝位十二月壬子立皇后禇氏禮志康帝建元元年納皇后禇氏而儀注陛者不設旄頭殿中御史奏令迎皇后依成恭皇后入宫御物而儀注至尊衮冕升殿旄頭不設求量處又案昔迎恭皇后惟作青龍旂其餘皆即御物今當臨軒遣使而五牛旂旗旄頭罼罕並出即用故致今闕詔曰所以正法服升太極者以敬其始故備其禮也今云何更闕所重而徹法物耶又恭后神主入廟先帝詔后禮宜降不宜建五牛旂而今猶復設之耶既不設五牛旗則旄頭罼罕之物易具也又詔曰舊制既難凖且于今而備亦非宜府庫之儲惟當以供軍國之費耳法服儀飾粗令舉其餘兼副雜器停之穆帝永和二年納后議賀不王述云昏是嘉禮春秋傳曰娶者大吉非常吉又傳曰鄭子罕如晋賀夫人鄰國猶相賀况臣下耶如此便應賀但不在三日内耳今因廟見成禮而賀亦是一節也王彪之議云昏禮不樂不賀禮之明文傳稱子罕如晋賀夫人既無經文又傳不云禮也禮娶婦三日不舉樂明三日之後自當樂至于不賀無三日之斷恐三日之後故無應賀之禮又云禮記所以言賀娶妻者是因就酒食而有慶語也愚謂無直相賀之體而有禮貺共慶㑹之義今世所共行扵時竟不賀通典撫軍答諸尚書云禮官所據誠是古典然禮亦隨時今既已從近代而上禮上禮即是稱慶將是賀例又恭后時已賀今依舊亦可通王彪之納悼后起居注無賀文而有上禮武帝以長秋再見感愴不敘詔通斷之納恭后記注有賀文時亦上禮案禮云昏禮不賀又云賀娶妻者愚謂禮傳昏姻無直相賀之禮而有禮貺共慶㑹之義今代所共行范汪云先朝所以上禮而不賀者依傍賀娶妻也雖名曰賀寔是酒食無慶語也但是吉事故曰賀耳思親之序故慶辭不可以達扵主人然吉禮宜有敘情故獻酒食而已先朝行之近代得禮至扵恭后時賀是王丞相導以明君臣之恩本不以為將來之法彪之云足下不賀意同而敘之小異吾謂昏禮不賀者謂不如今三節特賀也禮記所以復言賀娶妻者因獻酒食而有慶語也是不明言賀而於㑹同因有獻辭足下今云都不應有慶辭則何得獻酒肉㑹同耶亦與足下上禮辭不同自為矛盾又從伯丞相時相賀何必非失足下以徃賀為美事以今不賀為得禮亦不能兩濟斯義庾蔚之議案禮文及鄭注是親友聞主人有吉事故遣人送酒肉以賀之但昏有嗣親之感故不斥主人以賀昏唯云為有客而已今上禮既所為者昏亦不得都無慶辭彪之議為允扵時竟不賀但上禮穆帝本紀升平元年八月立皇后何氏大赦賜孝弟鰥寡米人五斛逋租宿債皆勿收冬十月皇后見于太廟禮志升平元年將納皇后何氏太常王彪之大引經傳及諸故事以定其禮深非公羊昏禮不稱主人之義又曰王者之于四海無非臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始以定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮逺尋古禮無王者此制近來史籍無王者此制比於情不安扵義不通案咸寜二年納悼皇后時𢎞訓太后母臨天下而無命戚屬之臣為武皇父兄主昏之文又考大晋已行之事咸寜故事不稱父兄師友則咸寜華恒所上禮合扵舊臣愚謂今納后儀制宜一依咸寜故事扵是從之華恒所定之禮依漢舊及晋己行之制故彪之多從咸寜由此也惟以娶婦之家三日不舉樂而咸康羣臣賀為失禮故但依咸寜上禮不復賀其告廟六禮版文等儀皆彪之定也其納采版文璽書曰皇帝咨前大尉參軍何𤦺渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀於公卿咸以宜率由舊典今使使持節太常彪之宗正綜以禮納采主人曰皇帝嘉命訪昏陋族備數採擇臣從祖弟故散騎侍郎凖之遺女未閑教訓衣屨若如人欽承舊章夙奉典制前太尉参軍都鄉侯糞土臣何𤦺稽首頓首再拜承詔次問名版文曰皇帝曰咨某官某姓兩儀配合承天統物正位于内必俟令族重章舊典今使使持節太常某宗正某以禮問名主人曰皇帝嘉命使者某到重宣中詔問臣名族臣族女父母所生先臣故光禄大夫雩婁侯禎之遺𤣥孫先臣故豫州刺史闗中侯惲之曾孫先臣安豐太守闗中侯叡之孫先臣故散騎侍郎凖之遺女外出自先臣故尚書左丞胄之外曾孫先臣故侍中闗内侯之外孫女年十七欽承舊章肅奉典制次納吉版文曰皇帝曰咨某官某姓人謀龜從僉曰貞吉敬從典禮今使使持節太常某宗正某以禮納吉主人曰皇帝嘉命使者某重宣中詔太卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制次納徴版文曰皇帝曰咨某官某姓之女有母儀之德窈窕之姿如山如河宜奉宗廟永承天祚以𤣥纁皮帛馬羊錢璧以章典禮今使使持節司徒某太常某以禮納徴主人曰皇帝嘉命降昏卑陋崇以上公寵以典禮備物典䇿欽承舊章肅奉典制次請期版文曰咨某官某姓謀于公卿泰筮元龜罔有不臧率遵典禮今使使持節太常某宗正某以禮請期主人曰皇帝嘉命使者某重宣中詔吉日惟某可迎臣欽承舊章肅奉典制次親迎版文曰皇帝曰咨某官某姓歲吉月令吉日惟某率禮以迎今使使持節太保某太尉某以禮迎主人曰皇帝嘉命使者某重宣中詔令月吉辰備禮以迎上公宗卿兼至副介近臣百輛臣螻蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制某稽首承詔皆如初答其納采問名納吉請期親迎皆用白鴈白羊各一頭酒米各十二斛惟納徴羊一頭𤣥纁用帛三匹絳二匹絹二百匹獸皮二枚錢二百萬玉璧一枚馬六匹酒米各十二斛鄭𤣥所謂五鴈六禮也其馬之制備物之數校太康所奏又有不同云古者昏冠皆有醮鄭氏醮文三首具存䑓符問迎皇后大駕應作鼔吹不博士胡訥議臨軒儀注闕無施安鼓吹䖏所又無舉麾鳴鐘之條太常王彪之以為昏禮不樂鼓吹亦樂之總名儀注所以無者依昏禮今宜備設而不作時用此議穆帝納后欲用九月九月是忌月范汪問王彪之答云禮無忌月不敢以所不見便謂無之博士曹躭荀訥等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌歲通典升平元年䑓符問皇后拜訖何官應上禮上禮悉何用太常王彪之上書以為上禮唯酒犢而已犢十頭酒十二斛王公以下名在三節祥瑞自簡慶賀録者悉賀左傳曰㑹吳扵鄫吳徴百牢子服景伯曰周制上物不過十二天之大數也太學博士雖不在賀而常小㑹者同悉應上禮又䑓符問迎皇后大駕應作樂不博士胡訥議臨軒儀注無施安鼔吹䖏所又無舉麾鳴鐘之條太常王彪之以為昏禮不樂鼓吹亦樂之總名儀注所以無者依昏禮也臣伏重詳禮云昏禮不作樂幽隂之義樂陽氣也又云娶婦之家三日不舉樂思嗣親也自王者下達迎大駕鹵簿及至尊升太極並闕此條當是依三日不舉樂之禮愚謂殿庭及大駕鹵簿鼓吹並可備儀而已蘭䑓太常主者案儀注云皇后列人自閶闔掖門鳴鐘鼓填門露仗如儀注之條案諸門唯有鼓無鐘既云鳴鐘則應施鐘既施鐘則施建鼓若如寺卿今意不作樂者當復安懸而不作彪之又議魏晋舊制晝夜漏既盡門鳴鼓鳴鐘吉凶鼓鐘常用非樂也舊儀皇后乗輿列閶闔門掖門鳴鐘鼓所以聲告内外耳今自應施鐘若他事㑹黄門侍郎舉麾舊應作宫懸金石之樂鳴鼓鐘中朝無宫懸設軒懸中興以來無此樂故惟作鼓吹鳴鐘以擬宫懸金石耳昏禮三日不作樂經典明文愚謂宜如舊儀至尊升殿舉麾作樂迎皇后大駕不應鼓吹蕙田案皇帝大昏至晋始具六禮亦縁士禮推之也禮重親迎而升平元年雖有版文仍遣太尉太保行事可見親迎之不可行扵天子也當時廷臣深扵禮典信經如蓍蔡至扵不樂不賀猶徃来辨論如此可謂篤信好學矣孝武帝本紀寜康二年八月以長秋將建權停昏姻三年秋八月立皇后王氏大赦加文武位一等禮志太元中公主納徴以獸豹皮各一其禮豈謂昏禮不辨王公之序故取獸豹以尊革其事乎漢魏之禮云公主居第尚公主者來第成昏司空王朗以爲不可其後乃革江左以來太子昏納徴禮用玉璧一獸皮二未詳何所凖况或者獸取其威猛有班彩玉以象徳而有潤栗珪璋亦玉之美者豹皮采蔚以譬君子王肅納徴辭云纁束帛儷皮鴈羊前漢聘后黄金二百斤馬十二匹亦無用羊之㫖鄭氏昏物贊曰羊者祥也然則昏之有羊自漢末始也王者六禮尚未用焉是故太康中有司奏太子昏納徴用𤣥纁束帛加羊馬二駟通典東晋王堪六禮儀于版上各方書禮文壻名媒人正版中納采于版左方裹以皂囊白繩纒之如封章某官某君大門下封某官甲乙白奏無官言賤子禮版奉案承之酒羊鴈繒采錢米别版書之裹以白繒同著案上羊則牽之豕鴈以籠盛繒以笥盛采以匳盛米以黄絹囊盛米稱斛數酒稱器脯腊以斤數媒人賫禮到女氏門使人執鴈主人出相對揖畢以鴈付主人侍者媒人進主人侍者執鴈立扵堂下從者以奉案入媒人退席當主人前跪曰甲乙使某敬薦不腆之禮主人跪答曰君之辱不敢辭事畢還座從者進奉案主人前侍者以鴈退禮物以次進中庭主人設酒媒人跪曰甲乙使某獻酒却再拜主人答拜還座主人酢媒人媒不復答杜氏佑曰禮唯昏辭云不得稱不腆故昏禮云幣必誠辭無不腆此恐王堪之説有誤宋書文帝本紀十五年夏四月立皇太子妃殷氏賜王公以下各有差禮志皇太子納妃六禮文與納后不異百官上禮其月壬戌于太極殿西堂敘宴二宫隊主副司徒征北鎮南三府佐揚兖江三州綱彭城江夏南譙始興武陵廬陵南豐七國侍郎以上諸二千石在都邑者並豫㑹禮志明帝泰始五年十一月有司奏案晋江左以來太子昏納徴禮用玉一虎皮二未詳何所凖况或者虎取其威猛有彬炳玉以象徳而有潤栗珪璋既玉之美者豹皮義兼炳蔚熊羆亦昏禮吉徴以類取象亦宜並用未詳何以遺文晋氏江左禮物多闕後代因襲未遑研考今法徽儀方將大備宜憲範經籍稽諸舊典今皇太子昏納徴禮合用珪璋豹皮熊羆皮與不下禮官詳依經紀更正若應用者為各用一為應用兩博士裴昭明議案周禮納徴元纁束帛儷皮鄭𤣥注云束帛以儀注以虎皮二太元中公主納徴以虎豹皮各一具豈謂昏禮不辨王公之序故取虎豹皮以尊革其事乎虎豹雖文而徴禮所不用熊羆吉祥而昏典所不及珪璋雖美或為用各異今帝道𢎞明徽則光闡儲皇聘納宜凖經誥凡諸僻謬並合詳裁雖禮代不同文質或異而鄭為儒宗既有明說守文淺見盖有惟疑兼太常丞孫詵議以為聘幣之典損益惟義歴代行事取制士昏若珪璋之用實均璧品彩豹之彰義齊虎文熊羆表祥繁衍攸寄今儲后崇聘禮先訓逺皮玉之美宜盡暉備禮稱束帛儷皮則珪璋數合同璧熊羆文豹各應用二長兼國子博士虞龢議案儀禮納徴直云元纁束帛雜皮而已禮記郊特牲云虎豹皮與玉璧非虗作也則虎豹之皮居然用兩珪璧宜仍舊各一參詵龢二議不異今加珪璋各一豹熊羆皮各二以龢議為允詔可明帝本紀泰始六年二月癸丑皇太子納妃甲寅大赦天下南齊書世祖本紀四月戊寅詔曰昏禮下逹人倫攸始周官設媒氏之職國風興及時之詠四爵内陳義不期侈三鼎外列事豈存奢晚俗浮麗歴兹永久每思仍革而民未知禁乃聞同牢之費華泰尤甚膳羞方丈有過王侯富者扇其驕風貧者恥躬不逮或以供帳未具動致推遷年不再來盛時忽徃宜為節文頒之士庶並可擬則公朝方樏供設合卺之禮無虧寜儉之義斯在如故有違繩之一法禮志永明中世祖以昏禮奢費敕諸王納妃上御及六宫依禮正棗栗腵脩加以香澤花粉其餘衣物皆停惟公主降嬪則止遺舅姑也明帝永泰元年尚書令徐孝嗣議曰尋昏禮實篚以四爵加以合卺既崇尚質之禮又象牉合之義故三飯卒食再酳用卺先儒以禮成好合事終於三然後用卺合儀注先酳卺以再以三有違㫖趣又郊特牲曰三王作牢用陶匏言太古之時無共牢之禮三王作之用太古之器重夫婦之始也今雖以方樏示約而彌乖昔典又連卺以鏁盖出近俗復别有牢燭雕費彩飾亦虧曩制方今聖政日隆聖教惟穆則古昔以敦風存餼羊以愛禮沿襲之規有切治要嘉禮實重宜備舊章謂自今王侯以下昏亦依古以卺酌終酳之酒並除金銀連鏁自餘雜器悉用埏陶堂人執燭足充焫燎牢燭華侈亦宜停省庻斵雕可期移俗有漸參議並同奏可蕙田案晋宋以後風俗奢敝齊世祖之詔孝嗣之議可謂得禮意矣隋書禮儀志梁大同五年臨城公昏公夫人於皇太子妃為姑姪進見之制議者互有不同令曰纁鴈之儀既稱合于二姓酒食之㑹亦有因不失親若使榛栗腵修贄饋必舉副笄編珈盛飾斯備不應婦見之禮獨以親闕頃者敬進酏醴已傳婦事之則而敬奉沃盥不行侯服之家是知繁省不同質文異世臨城公夫人于妃既是姑姪宜停省梁書徐摛傳摛為中庶子加戎昭將軍是時臨城公納夫人王氏即太宗妃之姪女也晋宋以來初昏三日婦見舅姑衆賔皆列觀引春秋義云丁丑夫人姜氏至戊寅公使大夫宗婦覿用幣戊寅丁丑之明日故禮官據此皆云宜依舊貫太宗以問摛摛曰儀禮云質明贊見婦于舅姑雜記又云婦見舅姑兄弟姊妺皆立於堂下政言婦是外宗未審􅈺令所以停坐三朝觀其七徳舅延外客姑率内賔堂下之儀以備盛禮近代婦見扵舅姑本有戚屬不相瞻看夫人乃妃姪女有異他姻覿見之儀謂應可略太宗從其議陳書文帝本紀天嘉三年秋皇太子納妃王氏在位文武賜帛各有差孝悌力田為父後者賜爵二級宣帝本紀太建元年秋七月皇太子納妃沈氏王公以下賜帛各有差右魏晋宋齊梁陳昏禮魏書太宗本紀神瑞二年冬姚興使散騎常侍東武侯姚敞尚書姚泰送其西平公主來帝以后禮納之世祖本紀太平真君九年十月癸卯以昏姻奢靡詔有司更為科限髙宗本紀和平四年冬詔曰夫昏姻者人道之始是以夫婦之義三綱之首禮之重者莫過于斯尊卑髙下宜令區别然中代以來貴族之門多不率法或貪利財賄或因縁私好在于苟合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓為昏髙祖本紀太和二年五月詔曰昏聘過禮則嫁娶有失時之弊厚葬送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁廼者民漸奢尚昏葬越軌致貧富相髙貴賤無别又皇族貴戚及士民之家不惟氏族髙下與非類昏偶先帝親發明詔為之科禁而百姓習常仍不肅改朕今憲章舊典祗案先制著之律令永為定凖犯者以違制論七年冬詔曰淳風行扵上古禮化用乎近葉是以夏殷不嫌一姓之昏周世始絶同姓之娶此皆教隨時設治因事改者也皇運初基中原未混撥亂經綸日不暇給古風遺樸未遑釐改後遂因循迄兹莫變朕屬百年之期當後仁之政思易質舊式昭惟新自今悉禁絶之有犯以不道論十九年九月詔厮養之户不得與士民昏二十七年七月詔曰夫婦之道生民所先仲春奔㑹禮有達式男女失時者以禮㑹之隋書禮儀志後齊皇帝納后之禮納采問名納徴訖告圓丘方澤如加元服是日皇帝臨軒命太尉為使司徒副之持節詣皇后行宫東向奉璽綬冊以授中常侍皇后受冊扵行殿使者出與公卿以下皆拜有司備迎禮太保太尉受詔而行主人公服迎拜于門使者入升自賔階東面主人升自阼階西面禮物陳於庭設席于兩楹間童子以璽書版升主人跪受送使者拜扵大門之外有司先於昭陽殿兩楹間供帳為同牢之具皇后服大嚴繡衣帶綬佩加幜女長御引出升畫輪四望車女侍中負璽陪乗鹵簿如大駕皇帝服衮冕出升御座皇后入門大鹵簿住門外小鹵簿入到東上閤施歩鄣降車席道以入昭陽殿前至席位姆去幜皇后先拜後起皇帝後拜先起帝升自西階詣同牢坐與皇后俱坐各三飯訖又各酳二爵一卺奏禮畢皇后興南面立皇帝御太極殿王公以下拜皇帝興入明日后展衣于昭陽殿拜表謝又明日以榛栗棗脩見皇太后扵昭陽殿擇日羣官上禮又擇日謁廟皇帝使太尉先以大牢告而後徧見羣廟蕙田案後齊儀注稍詳頗合禮意皇太子納妃禮皇帝遣使納采使者受詔而行主人迎於大門外禮畢㑹扵㕔事其次問名納吉並如納采納徴則使司徒及尚書令為使備禮物而行請期則以太常宗正卿為使如納采親迎則太尉為使三日妃朝皇帝于昭陽殿又朝皇后扵宣光殿擇日羣官上禮佗日妃還又佗日皇太子拜閤後齊聘禮一曰納采二曰問名三曰納吉四曰納徴五曰請期六曰親迎皆用羔羊一口鴈一隻酒黍稷稻米麪各一斛自皇子王以下至于九品皆同流外及庻人則減其半納徴皇子王用𤣥三匹纁二匹束帛十匹大璋一第一品已下至從三品用璧玉四品已下皆無獸皮二第一品已下至從五品用豹皮二六品已下至從九品用鹿皮錦綵六十匹一品錦綵四十匹二品三十匹三品二十匹四品雜綵十六匹五品十匹六品七品五匹絹二百匹一品一百四十匹二品一百二十匹三品一百匹四品八十匹五品六十匹六品七品五十匹八品九品三十匹羔羊一口羊四口犢二頭酒黍稷稻米麪各十斛一品至三品减羊二口酒黍稷稻米麪各减六斛四品五品减一犢酒黍稷稻米麪又减二斛六品已下無犢酒黍稷稻米麪各一斛諸王之子已封未封禮皆同第一品新昏從車皇子百乗一品五十乗第二品三品三十乗第四品五品二十乗第六第七品十乗八品達扵庻人五乗各依其秩之節通典杜氏佑曰上古人食禽獸之肉而衣其皮毛周氏尚文去質𤣥衣纁裳猶用皮為韠所以制昏禮納徴用元纁儷皮充當時之所服耳秦漢以降衣服制度與三代殊乃不合更以𤣥纁及皮為禮物也又有用虎皮豹皮者王彪之云取威猛有班彩尤臆説也人之常情非今是古不詳古今之異制禮數之從宜今時俗用五色信頗為得禮之變也或曰近代所以尚循𤣥纁儷皮之制男女配合教化大倫示存古儀務重其禮安可捨棄有類去羊答曰𤣥纁及皮當時之要詳觀三代制度或沿或革不同皆貴適時並無虗事豈今百王之末畢循徃古之儀如三代制天子諸侯至庻人祭則立尸秦漢則廢又天下列國唯事征伐志存于射建侯擇士皆主于斯秦漢以降改制郡縣戰爭既息射藝自輕唯祀與戎國之大事今並豈要復舊制乎其朝宗覲遇行朝享禮畢諸侯皆右肉袒扵廟門之東乃入門右北面立告聽事今豈須行此禮乎賔禮既重兩楹間有反爵之坫築土為之今㑹客豈須置坫乎又並安能復古道耶略舉數事餘其可知也何必納徴猶重無用之物徒稱古禮是乖從宜之㫖易曰隨時之義其大矣㦲先聖之言不可誣也蕙田案杜氏議極得從宜之㫖周書武帝本紀建德二年九月戊寅詔曰政在節財禮唯寜儉而頃者昏嫁競為奢靡牢羞之費罄竭資財甚乖典訓之禮有司宜加宣勒使咸遵禮制壬午納皇太子妃楊氏三年正月癸酉詔自今已後男年十五女年十三已上爰及鰥寡所在軍民以時嫁娶務從節儉勿為財幣稽留六年六月丁夘詔曰同姓百世昏姻不通盖惟重别周道然也而娶妻買妾有納母氏之族雖曰異宗猶為混雜自今以後悉不得娶母同姓以為妻妾其已定未成者即令改聘宣帝本紀宣政元年秋八月壬申遣大使廵察諸州詔制九條宣下州郡二曰母族絶服外者聽昏蕙田案此詔是右北魏北齊北周隋書髙祖本紀開皇四年秋七月以秦王俊納妃宴百寮班賜各有差禮儀志隋皇太子納妃禮皇帝臨軒使者受詔而行主人俟扵廟使者執鴈主人迎拜於大門之東使者入升自西階立扵楹間南面納采訖乃行問名儀事畢主人請致禮於從者禮有幣馬其次擇日納吉如納采又擇日以玉帛乗馬納徴又擇日告期又擇日命有司以特牲告廟冊妃皇太子將親迎皇帝臨軒醮而誡曰徃迎爾相承我宗事朂帥以敬對曰謹奉詔既受命羽儀而行主人几筵於廟妃服䄖翟立于東房主人迎于門外西面拜皇太子答拜主人揖皇太子先入主人升立於阼階西面皇太子升進當房户前北面跪奠鴈俛伏興拜降出妃父少進西面誡之母于西階上施衿結帨及門内施鞶申之出門妃升輅乗以几姆加幜皇太子乃御輪三周御者代之皇太子出大門乗輅羽儀還宫妃三日雞鳴夙興以朝奠笲於皇帝皇帝撫之又奠笲扵皇后皇后撫之席扵户牖間妃立于席西祭奠而出蕙田案皇太子納妃曲依儀禮者莫如隋唐書太宗本紀貞觀元年詔民男二十女十五以上無夫家者州縣以禮聘娶貧不能行者郷里富人及親戚資送之鰥夫六十寡婦五十婦人有子若守節者勿彊通典貞觀五年長樂公主出降帝以皇后所生敕有司資送倍扵永嘉長公主魏徴諫曰不可昔漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽前史以為美談天子姊妺為長公主天子之女為公主既加長字即是有所尊崇或可情有淺深無容禮有踰越上然其言長孫皇后遣使齎絹四百匹詣徴家送之貞觀中王珪子尚太宗女南平公主禮有婦見舅姑之儀自王姬下降此事多略珪曰此禮之廢由來久矣今上欽明動循法制吾受公主謁見豈為身榮㦲所以成國家之美耳扵是夫妻西向坐公主執行盥饋之道禮成而退物議善之是後公主有舅姑者皆備婦禮自珪始也永徽元年正月衡山公主欲出降長孫氏議以時既公除合行吉禮侍中于志寜上疏曰伏見衡山公主出降欲就今秋成禮竊案禮記云女十五而笄二十而嫁有故二十三而嫁鄭元云有故謂遭䘮也固知須終三年其有議者云准制公除之後須並從吉此漢文創制其儀為天下百姓至于公主服是斬縗縱使服隨例除無宜情隨禮改心䘮之内方復成昏非唯違扵禮經亦是人情不可陛下方奬仁孝之日敦崇名教之秋此事行之若難猶宜抑而守禮况行之甚易何容廢而受譏伏願遵髙祖之令規略孝文之權制國家扵法無虧公主情禮得畢則天下幸甚蕙田案于志寜議是唐書髙宗本紀顯慶二年三月戊申禁舅姑拜公主父母拜王妃通典顯慶二年詔曰比聞公主出適王妃作嬪舅姑父母皆降禮答拜此乃子道云替婦徳不循何以式序家邦儀刑列辟自今以後可明加禁斷使一依禮法若更有以貴加於所尊者令所司隨事紏聞蕙田棄此詔不可易顯慶三年又詔曰古稱釐降唯屬王姬比聞縣主適人皆云出降娶王女者亦云尚主濫假名器深乖禮經其縣主出嫁宜稱適娶王女者稱娶仍永以為式顯慶四年十月詔天下嫁女受財三品以上之家不得過絹三百匹四品五品不得過二百匹六品七品不得過一百匹八品以下不得過五十匹皆充所嫁女資装等用其夫家不得受陪門之財咸亨四年以左金吾將軍裴居道女為皇太子𢎞妃十月乙未皇太子𢎞納妃畢曲赦岐州賜酺三日中宗本紀神龍元年九月禁昏娶之家父母親亡停䘮成禮景龍二年以安樂公主出降假皇后仗出于禁中以盛其儀帝及后御安福樓觀之禮畢大赦天下賜酺三日蕙田案此舉非禮宜後之不終也輿服志太極元年左司郎中唐紹上疏曰士庻親迎之儀備諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見徃者下俚庸鄙時有障車邀具酒食以為戯樂近日此風轉盛上及王公乃廣奏音樂多集徒侣遮擁道路留滯淹時邀致財物動踰萬計遂使障車禮貺過扵聘財歌舞喧嘩殊非助感既虧名教實蠧風猷違紊禮經須加節制望請昏姻家障車者並須禁斷其有犯者有䕃家請凖犯名教例附簿無䕃人决杖六十乃各科本罪制從之通典開元十六年唐昌公主出降有司進儀注于紫宸殿行五禮右補闕施敬本等上疏曰竊以紫宸殿者漢之前殿周之路寢陛下所以負黻扆正黄屋享萬國朝諸侯人臣致敬之所猶元極可見不可得而升也昔周女出降於齊而以魯侯為主但有外館之法而無路寢之事今欲紫宸㑹禮即當臣下攝行馬入扵庭醴升扵牖主人授几逡廵紫宸之間賔使就筵登降赤墀之地又據主人辭稱吾子有事至扵寡人之室言辭僣越事理乖張既黷威靈深虧典制其問名納采等事並請權扵别所從之遂移扵光順門外設次行禮唐書禮樂志皇帝納皇后制命太尉為使宗正卿為副吏部承以戒之前一日有司展縣設案陳車輿于太極殿廷如元日文武九品朝集蕃客之位皆如冠禮設使者受命位于大横街南道東西上副少退北面侍中請中嚴羣臣入就位使副入立于門外道東西面黄門侍郎引幡節中書侍郎引制書案立于左延明門内道北西面北上乃奏外辦皇帝衮冕御輿出自西房即御座使副入就位典儀曰再拜在位者皆再拜侍中前承制降詣使者東北西面曰有制使副再拜侍中宣制曰納某官某氏女為皇后命公等持節行納采等禮使副又拜主節立于使者東北西面以節授黄門侍郎侍郎以援使者付于主節立于後中書侍郎引制書案立扵使者東北以制書授使者置于案典儀曰再拜在位者皆再拜使副出持節者前導持案者次之侍中奏禮畢皇帝入在位者以次出初使副乗輅鼓吹備而不作從者乗車以從其制書以油絡網犢車載之其日大昕使副至于次主人受于廟若寢布神席於室户外之西莞筵紛純加藻席畫純南向右彫几使副立于門西北上持幡節者立于北少退制案立于南執鴈者又在其南皆東面主人立于大門内西面儐者北面受命于左出立扵門東西面曰敢請事使者曰某奉制納采儐者入告主人曰臣某之女若如人既蒙制訪臣某不敢辭儐者出告入引主人出迎使者于大門之南北面再拜使者不答主人揖使副先入至于階使副入導以幡節案鴈從之幡節立西階之西東面使者由階升立于兩楹間南面副在西南持案及執鴈者又在西南皆東面主人升阼階當使者前北面立持案者以案進授使者以制書節脱衣使者曰有制主人再拜宣制主人降詣階間北面再拜稽首升進北面受制書以授左右使者授鴈主人再拜進受鴈以授左右儐者引答表案進立扵主人後少西以表授主人主人進授使者退復位再拜節加衣謁者引使副降自西階以出制文以版長一尺二寸博四寸厚八分后家答版亦如之問名使者既出遂立于内門外之西東面主人立于内門内東廂西面儐者出請事使者曰將加卜筮奉制問名儐者入告主人曰臣某之子若如人既蒙制訪臣某不敢辭儐者出告入引主人出迎使者以入授主人以制書答表皆如納采使副降自西階以出立于内門外之西東面主人立扵東階下西向儐者出請事使者曰禮畢儐者入告主人曰某公奉制至于某之室某有先人之禮請禮從者儐者出告使者曰某既得將事敢辭儐者入告主人曰先人之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者入告遂引主人升立于序端掌事者徹几設二筵東上設甒醴扵東房西牖下加杓羃坫在尊北實觶二角柶二籩豆各一實以脯醢在坫北又設洗扵東南主人降迎使者西面揖先入使副入門而左主人入門而右至階主人曰請某位升使者曰某敢辭主人又曰固請某位升使者曰某敢固辭主人又曰終請某位升使者曰敢終辭主人升自阼階使副升自西階北面立主人阼階上北面再拜受几於序端掌事者内拂几三奉兩端西北而以進主人東南向外拂几三振袂内執之掌事者一人又執几以從主人進西北向使者序進迎受於筵前東南向以俟主人還東階上北面再拜送使者以几跪進北面跪各設扵座左退于西階上北面東上答拜立于階西東面南上贊者二人俱升取觶降盥手洗觶升實醴加柶扵觶覆之面葉出房南面主人受醴面柄進使者筵前西北面立又贊者執觶以從使者西階上北面各一拜序進筵前東南面主人又以次授醴使者受俱復西階上位主人退復東階上北面一拜送掌事者以次薦脯醢扵筵前使者各進升筵皆坐左執觶右取脯擩扵醢祭於籩豆之間各以柶祭醴三始扱一祭又扱再祭興各以柶兼諸觶上躐降筵扵西階上俱北面坐啐醴建柶各奠觶於薦遂拜執觶興主人答拜使者進升筵坐各奠觶扵薦東降筵序立於西階上東面南上掌事者牽馬入陳於門内三分庭一在南北首西上又掌事者奉幣篚升自東階以授主人受於序端進西面位掌事者一人又奉幣篚立于主人之後使者西階上俱北面再拜主人進詣楹間南面立使者序進立於主人之西俱南面主人以幣篚授使者使者受退立於西階上東面執幣者又以授主人主人受以授使副使副受之退立於使者之北俱東面主人還東階上北面再拜送使者降自西階從者迓受幣篚使者當庭實揖馬以出牽馬者從出使者出大門外之西東面立從者迓受馬主人出門東西面再拜送使者退主人入立扵東階下西面儐者告于主人曰賔不顧矣主人反于寢使者奉答表詣闕納吉使者之辭曰加諸卜筮占曰日從制使某也入告主人之辭曰臣某之女若如人龜筮云吉臣預在焉臣某謹奉典制其餘皆如納采納徴其日使者至扵主人之門外執事者入布幕扵内門之外元纁束帛陳扵幕上六馬陳于幕南北首西上執事者奉榖珪以匵俟扵幕東西面謁者引使者及主人立于大門之内外儐者進受命出請事使者曰某奉制納徴儐者入告主人曰奉制賜臣以重禮臣某祗奉典制儐者出告入引主人出迎使者入執事者坐啓匵取珪加扵元纁牽馬者從入三分庭一在南北首西上執珪者在馬西俱北面其餘皆如納采冊后前一日守宫設使者次扵后氏大門外之西尚舍設尚宫以下次扵后氏閣外道西東向障以行帷其日臨軒命使如納采奉禮設使者位于大門外之西東向使副及内侍位于使者之南舉冊案及寶綬者在南差退持節者在使者之北少退俱東向設主人位扵大門外之南北面使者以下及主人位于内門外亦如之設内謁者監位扵内門外主人之南西面司贊位于東階東南掌贊二人在南差退俱西向又置一案扵閤外使副乗輅持節備儀仗鼓吹備而不作内僕進重翟以下于大門之外道西東向以北為上諸衛令其屬布后儀仗使者出次就位主人朝服立于東階下西面儐者受命出請事使者曰某奉制授皇后備物典冊儐者入告主人出迎于大門外北面再拜使者不答拜使者入門而左持節者前導持案者次之主人入門而右至内門外位奉冊寶案者進授使副冊寶内侍進使者西面受冊寶東面授内謁者監持入立扵閤門之西東面跪置於案尚宫以下入閤奉后首飾禕衣傅母贊后出尚宫引降立扵庭中北面尚宫跪取冊尚服跪取寶綬立於后之右西向司言司寶各一人立于后左東向尚宫曰有制尚儀曰再拜皇后再拜宣冊尚儀曰再拜皇后又再拜尚宫授皇后以冊受以授司言尚服又授以寶綬受以授司寳皇后升坐内官以下俱降立于庭重行相向西上司贊曰再拜掌贊承傳皆再拜諸應侍衛者各升立于侍位尚儀前跪奏曰禮畢皇后降坐以入使者復命其遣使者奉迎其日侍中版奏請中嚴皇帝服冕出升所御殿文武之官五品以上立於東西朝堂奉迎前一日守宫設使者次扵大門之外道右設使副及内侍次扵使者次西俱南向尚舍設宫人次于閤外道西奉禮設使副持案執鴈者持節者及奉禮賛者位如冊后又設内侍位于大門外道左西面又設宫人以下位于堂前使副朝服乗輅持節至大門外次宫人等各之次奉迎尚儀奏請皇后中嚴傅姆導皇后尚宫前引出升堂皇后將出主婦出于房外之西南向文武奉迎者皆陪立扵大門之外文官在東武官在西皆北上謁者引使者詣大門外位主人立于内門外堂前東階下西面儐者受命出請事使者曰某奉制以今吉辰率職奉迎儐者入告主人曰臣謹奉典制儐者出告入引主人出門南北面再拜謁者引入至内門外堂西階使者先升立于兩楹間南面副在西持案執鴈者在西南俱東面主人升東階詣使者前北面立使副授以制書曰有制主人再拜使者宣制主人降詣階間北面再拜稽首升進北面受制書主人再拜北面立使副授以鴈主人再拜進受仍北面立儐者引二人對舉答表案進主人以表授使副再