主人出立于門東西向主人揖賔報揖儐者各引賔主以下入至階主人揖賔報揖賔主以次升立於席後立定賔主以下俱坐遂進酒設食如昏會之儀會畢賔主以下俱興儐者引賔立于西階上東面主人掌事者牽馬入陳于門三分庭一在南北首西上一品以下無馬又掌事者奉束帛之篚升授主人主人執篚西面立賔西階上北面再拜主人進立于楹間南面賔進立於主人之右俱南面主人授篚賔受之退立于西階上北面主人還阼階上北面再拜送儐者引賔以下降自西階從者迓受篚賔及庭東面揖左馬以出牽馬者從之在庭者以次出俱復門外位從者迓受馬一品以下無受馬儀初賔降儐者引主人降自東階出門東西面拜送賔退主人入饗婦人送者其日女贊者鋪賔席于堂上楹間近北南向又鋪主人席于阼階上西向又設衆賔席於廊下俱重行東向以北為上女相者引賔以下立于主人門外之西重行東面以北為上立定女相者引主人出立于門外之東西面女相者引賔入衆賔以下從入賔入門西東面立定俱坐遂進酒設食如昏會之儀會畢賔主以下俱興女相者引賔立于西階上東面女相者奉束帛之篚升以授主人主人執篚進于楹間南面立女相者引賔進立于主人之右俱南面主人授幣訖女相者引賔降出從者迓受篚衆賔以下從出初賔降女相者引主人降送于門內賔出女相者引主人入一品以下內相者引賔升主人迎送于閣內相稱之辭各準其夫酬以束帛如丈夫之禮公主出降納采前一日主人設使者次于大門之外道右南向其納吉納徴請期親迎等禮皆如之其日大昕使者至于主人大門外贊禮者延入次凡賔主及行事者皆公服使者出次贊禮者引至于大門外之西東面主人立于東階下西面儐者立于主人之左北面受命出立于門東西面曰敢請事使者曰朝恩貺室於某公之子某公有先人之禮使某也請納采儐者入告主人曰寡人敢不敬從儐者出告掌畜者以鴈授使者其餘並如一品昏儀問名使者既出至主人還阼階上西面曰皇帝第某女封某公主餘行事並如一品昏儀其禮使者于户牖之間贈之篚幣及兩馬詞云吾子為事故至于寡人之室寡人有先皇之禮請禮從者納吉其日大昕使者至請事使者曰加諸卜占曰吉使某也敢告主人曰某公有吉寡人與在焉寡人不敢辭如納采之儀納徴其日大昕使者至入次掌事者布幕于內門外玄纁束帛陳于幕上乘馬在幕南北首西上掌事者奉璋以櫝俟于幕東使者曰朝恩貺室於某公之子某公有先人之禮使某也以束帛乘馬請納徴主人曰某公順先典貺以重禮寡人敢不承命餘並如一品昏儀請期其日大昕使者至入次至請事依常禮使者曰某公有賜既申受命某公使某請吉日儐者入告主人曰寡人既前受命唯命是聽使者曰某公命某聽命于王儐者入告主人曰寡人固唯命是聽使者曰某公使某受命于王王不許某敢不告期曰某日餘並如一品昏儀親迎其日大昕壻之父告廟醮子並如一品昏儀子再拜降出乘輅備儀仗詣主人之第賔將至內贊者布席于東房當户南向設樽甒醴等于東房主人醴公主如一品醴女之儀公主著花叉褕翟纁袇入房以下並如一品醴女儀訖主人降立于東階東南西面贊禮引賔出次立於門西東面儐者進受命出門東面曰敢請事賔曰某王命某之父以兹初昏命某將請承命儐者入告主人曰寡人固敬具以須至奠鴈出如常禮初賔入門主婦出立于房户外之西南面于賔拜訖姆導公主出主人少進西面戒之必有正焉若衣若花命之曰戒之敬之夙夜無違命主婦戒之於西階上施襟結帨戒之曰勉之敬之夙夜無違公主出以下並如常儀同牢初昏掌事者設洗于東階東南及陳設牢饌鉶爼之數各依其品羊豕節折大羮在于爨其器皆明烏漆惟㽅以陶卺以匏餘並如一品儀見舅姑見之日公主夙興沐浴著花叉服褕翟舅服公服姑著鈿叉禮衣其儀同一品昏禮公主降西階以出無取脯授婦氏之儀盥饋舅姑公主盥饋以少牢舅姑公主服如見禮及酳舅姑訖內贊者設公主席于舅姑東北南面餘並如一品儀昏會如一品昏儀婦人禮會如一品昏儀饗丈夫送者同一品儀加送以乘馬設從者乃于西廊下饗婦人送者女相者引賔升降酬以束帛餘如丈夫禮唐書元宗本紀開元二十一年五月以皇太子納妃降死罪流以下從之食貨志開元二十二年詔男子十五女十三以上得嫁娶舊唐書代宗本紀大歷元年正月禁王公宗室郡縣主之家不得與諸將昏姻通典建中元年十一月禮儀使顔真卿等奏郡縣主見舅姑請于禮會院過事明日早舅姑坐堂上行執笲之禮其觀華燭仗以昏禮主敬竊恐非宜並請停障車下壻却扇等行禮之夕可以感思至于聲樂竊謂非禮並請禁斷相見儀制近代設以氈帳擇地而置此亦非禮合於堂室中置帳請準禮施行俗忌今時以子午卯酉年謂之當梁年其年娶婦舅姑不相見蓋禮無所據亦請禁斷並從之其制多因周禮以三品以上五品以上六品以下為降殺並如開元禮舊唐書德宗本紀貞元九年八月皇太子長男廣陵王淳納妃郭氏敬宗本紀長慶四年正月穆宗崩皇太子即位三月詔六宅十宅諸王女宜令每年于選人中選擇降嫁冬十月丙子朔宗正寺選尚縣主壻和元亮等二十五人各賜錢三十萬令備吉禮文宗本紀太和七年八月詔十六宅諸縣主委吏部于選人中簡擇匹配具以名聞右隋唐昏禮五禮通考卷一百五十四
