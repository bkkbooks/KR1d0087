body:
  text: 五禮通考卷一百三十五刑部尚書秦蕙田撰嘉禮八朝禮遼史禮志常朝起居儀昧爽臣僚朝服入朝各依幕次内侍奏班齊先引京官班於三門外當直舍人放起居再拜各祗候依次兩府以下文武官於丹墀内面殿立豎班諸司并供奉官於東西道外相向立定當直閤使副贊放起居再拜各祗候退還幕次公服帝升殿坐兩府并京官丹墀内聲喏各祗候教坊司同北班起居畢奏事燕京就嘉寜殿西京就同文殿朝服幞頭袍笏公服紫衫帽正座儀皇帝升殿座警聲絶契丹漢人殿前班畢各依位侍立次教坊班畢捲退京官班入拜畢揖於右横街西依位班立次武班入拜畢依位立文班入拜畢依位立北班入起居畢於左横街東序班立次兩府班入鞠躬通宰臣某官以下起居拜畢引上殿奏事已上六班起居並七拜内有不帶節度使班首止通名亦七拜捲班與常朝同直院有㫖入文班留守司三司統軍司制署司謂之京官都部置司宫使副宫使都承以下令史北面主事以下隨駕諸司為武官館閣大理寺堂後以下御史臺隨駕閒員令史司天臺翰林醫官院為文官天慶二年冬教坊並服袍臣僚接見儀皇帝御座奏見榜子畢臣僚左入鞠躬通文武百僚宰臣某官以下祗候見引面殿鞠躬起居凡七拜引班首出班謝面天顔復位舞蹈五拜鞠躬宣答問制再拜宣訖謝宣諭五拜各祗候畢可矮􅩓以上引近前問聖躬萬福傳宣問䟦渉不易鞠躬引班舍人贊各祗候畢引右上准備宣問其餘並於右侍立宣答云卿等久居鄉邑來奉乗輿時屬霜寒或云炎蒸諒多勞止卿各平安好想宜知悉太宗本紀㑹同三年四月庚子至燕備法駕入自拱辰門御元和殿行入閤禮蕙田案遼史禮志不載入閤之儀儀衛志則云木契正面為陽背面為陰閤門喚仗則有之是亦有喚仗入閤之禮也右遼常朝金史熙宗本紀天眷二年三月丙辰命百官詳定儀制四月甲戌百官朝㕘初用朝服禮志朝㕘常朝儀及朔望儀准前代制以朔日六日十一日十五日二十一日二十六日為六㕘日後又定制以朔望日為朝㕘餘日為常朝凡朔望朝㕘日百官卯時至幕次皇帝辰刻視朝供御弩手傘子直於殿門外分兩面排立司辰入殿報時畢皇帝御殿坐鳴鞭閤門報班齊執擎儀物内侍分降殿階兩傍面南立宿衛官自都㸃檢至左右親衛祗應官自宣徽閤門祗候先兩拜班首少離位奏聖躬萬福兩拜弩手傘子先於殿門外東西向排立俟奏聖躬萬福時即就位北面山呼聲喏起居畢即相向對立擎御傘直立左班内侍上都㸃檢以次陞殿副㸃檢在少南東西相向立左右衛在殿下東西相向立閤門乃引親王班贊班首名以下再拜訖班首少離位奏聖躬萬福歸位再拜畢先退次引文武百僚班首以下應合朝㕘官并府運六品以上官皆左入至丹墀之東西向鞠躬畢閤門通唱復引至丹墀閤門贊班首名以下起居舞蹈五拜又再拜畢領省宰執陞殿奏事殿中侍御史對立於左右衛將軍之北少前修起居東西對立於殿欄子内副階下餘退右出初帝就坐置寶匣於殿階上東南角後定制師傅起居畢御案始東入置定捧案内侍東西分下侍殿隅直日主寶捧寶當殿叩欄奏封主符寶郎及當監印郎中各一員監軍手分令史用印訖主寶吏封授主寶俟奏事畢進封訖内侍徹案若常朝則親王班退引七品以上職事官分左右班入丹墀再拜班首稍前起居畢復位再拜宰執升殿餘官分班退海陵王本紀正隆元年三月壬寅朔始定職事官朝㕘等格仍罷兵衛儀衛志初國制凡朔望常朝日殿下列衛士簾下置甲兵正隆元年海陵去甲兵惟存錦衣弩手百人分列兩階其儀都副㸃檢公服偏帶常朝則展紫左右衛將軍宿直將軍展紫金束帶各執玉水晶及金飾固多左右親衛盤褁紫襖塗金束帶固多佩兵械供御弩手傘子百人並金花交脚幞頭塗金銅鈒襯花束帶固多左右班執儀物内侍二十人展紫塗金東帶朝㕘日弩手傘子直於殿門外分兩面排立司辰報時畢皇帝御殿坐鳴鞭閤門報班齊執擎儀物内侍分降殿階南向立㸃檢司起居弩手傘子於殿門外北向山呼聲喏訖即於殿門外東西相向排立都㸃檢以次三員陞殿都㸃檢在東近南左副又少南右副在西東向對立左右衛將軍在殿下東西對立省臣隨班起居畢左右司侍郎從宰執奏事殿中侍御史隨班起居畢東西對立於左右衛將軍之北少前修起居注分殿陛東西對立於殿欄外副階下以俟奏事畢皇帝還閤侍衛者乃退禮志大定二年五月命臺臣定朝㕘禮五品以上職事官趨朝朝服入局治事則展皂自來朝㕘除殿前班外若遇朔望自七品以上職事官皆赴其餘朝日五品以上職事官得赴六品以下止於本司局治事如左右司員外郎侍御史記注院等官職雖不係五品亦赴朝㕘若拜詔則但有職事並七品以上散官皆赴朝叅吏員令譯史通事檢法各於本局待官員朝退赴局簽押文字不得於宫内署押七品以下流外職遇朝日亦不合入宫如左右司都事有須合奏事乃聽入宫七品以上職事官如遇使客朝辭見日依朔望日皆赴若元日聖節拜詔車駕出獵送迎詣祖廟燒飯但有職事并七品以上散官皆赴凡親王宗室已命官者年十六以上皆隨班赴起居大定五年右諌議大夫伊喇子敬言明安穆昆不得與州鎮官隨班入見非軍民一體之意上是其言責宣徽院令隨班入見凡班首遇朝叅有故不赴以次押班凡五品以上及侍御史尚書諸司郎中太常丞翰林修撰起居注殿中侍御史補闕拾遺赴召或假一月以上若除官出使之類皆通班入見辭謝除官於殿門外見謝班皆舞蹈七拜辭班四拜門見謝辭並再拜十七年詔以皇族袒免以上親雖無官爵封邑若預宴當有班次禮官言案唐典皇家周親視三品大功親小功尊屬視四品小功親緦麻尊屬視五品緦麻袒免以上視六品上令以此制為班次黄久約傳世宗時左諌議大夫黄久約侍朝故事宰相奏事則近臣退避久約欲趨出世宗止之自是諌臣不避以為常章宗本紀承安四年春二月壬申諭有司自三月一日為始毎旬三品至五品官各一人轉對六品亦以次對臺諌勿與有應奏事與轉對官相見無面對者上章亦聽三月户部尚書孫鐸郎中李仲畧國子祭酒趙忱始轉對香閣泰和五年十一月戊戌大雪免朝叅宣宗本紀貞祐三年春正月辛巳皇太子疾輟朝四月權㕘知政事徳升言舊制夏至免朝四日一奏事上曰此在平時可也方今多故勿謂朕勞遂云當免但使國事無廢則善矣十二月戊子以軍事免樞密院官朝拜四年春正月丁卯諭御史臺曰今旦視朝百官既拜之後始聞開封府報衙聲四方多故之秋弛慢如此可乎中丞福興號素謹於官事者當一詰之興定四年五月丙申以時暑免常朝四日一奏事右金常朝春明夢餘録元世祖至元十一年正旦始御大明殿受朝賀及後天夀節皆行朝賀禮毎日則宰執入延春閣及别殿奏事而已馬氏治曰百官朝見奏事古有朝儀今國家有天下百年典章文物悉宜燦然光於前代况欽遇列聖文明之主如科舉取士吏員䧏等之類屢復古制惟朝儀之典不講而行使後世無以鑒觀則於國家太平禮樂之盛實為闕遺且夫羣臣奏對之際御史執簡史官執筆縉紳佩玉儼然左右則雖有懷奸利乞官賞者亦不敢公出諸口如蒙聞奏命中書省㑹集文翰衙門官員究講叅酌古今之宜或三日二日一常朝則治道昭明生民之福也蕙田案元有天下百年而常朝之典竟未及舉故史冊所載闕焉其遜於遼金逺矣右元常朝明㑹典常朝御殿儀洪武初定凡早朝文官自左掖門入武官自右掖門入如華盖殿朝至鹿頂外東西序立鳴鞭訖守衛官至鹿頂内行禮訖就侍立位各衙門官以次行禮訖有事奏者入奏無事奏者四品以上及應陞殿者入殿内侍立五品以下官出至鹿頂外列班北向立候鳴鞭以次出如奉天殿朝俱於華盖殿行禮奏事畢五品以下官詣丹墀依品級列班重行北向立四品以上及翰林院官給事中監察御史等官於中左中右門伺候鳴鞭各詣殿内序立候朝退捲班以次出如先於奉天殿朝後却奏事者文武官於丹墀内依品級重行北向立候鳴鞭行禮訖四品以上及翰林院官給事中監察御史等官陞殿侍立五品以下仍前序立候謝恩見辭人員行禮訖鳴鞭捲班退有事奏者於奉天門或華盖殿進奏無事奏者以次出常朝御門儀洪武初定凡早朝文官自左掖門入武官自右掖門入如奉天門朝至金水橋南各依品級東西序立候鳴鞭訖以次隨行至丹墀内東西相向序立守衛官先行禮畢東西序立文武官入班行禮有事者以次進奏無事奏者隨即入班朝退捲班分東西出春明夢餘録常朝御門其御座謂之金臺既升座錦衣力士張五繖盖四圑扇自東西陛升立座後左右而内使一執盖升立座上一執武備襍二扇立座後正中武備之制一柄三刃而圈以鐵線裹以黄羅袱如扇状用則線圈自落三刃出焉防不虞也又曰御門非古制也古制天子居總章明堂惟閏月則居門故閏字從王從門也蕙田案古者天子諸侯臺門毎日視朝則於此周禮師氏居虎門之左司王朝是朝於門之證也孫氏以御門非古制失之凡糾舉失儀洪武初令百官有未閑禮儀新任及諸武臣聽侍儀司官毎日於午門外演習御史二員監視有不如儀者糾舉百官入朝失儀者亦糾舉如律又令朝班毎日都察院輪委監察御史二員侍班糾察失儀凡雜儀令百官入朝遇雨雪許服雨衣凡行走洪武初令百官早朝入班行禮及朝退捲班俱分文東武西不許徑越御道東西行走如在奉天門朝其有事東西往來者出至金水橋南行過凡謝恩見辭洪武二年令在京文武官有故告假及出使皆奉辭還皆奉見而奉特㫖授官及除授内外百職皆即辭謝恩到任之日仍望闕行禮省𨕖者亦到任日望闕行禮或除郡縣官給賜銀物聽宣諭者皆總行謝禮俱五拜三叩頭又令凡早朝謝恩見辭人員都察院輪委監察御史二員侍班凡謝恩者居前見者次之辭者又次之俱行五拜三叩頭禮凡内外諸司文武官員已入流者謝恩見辭必具公服行禮其或常服見者綴班後如以軍務逺來及承使還即時引見者不在此例凡在外諸司遣人來朝及朝使還京者俱先朝見後詣所司否者以違制論昭代典則洪武三年正月癸巳命宰臣定百官入侍班序明太祖實録初帝以天下初定欲通君臣之情日詔百官悉侍左右詢問民情咨訪得失或考論古今典禮制度故雖小官亦得上殿至有踰越班序者至是帝謂宰相曰朝廷之上禮法為先殿陛之間嚴肅為貴朕始欲咨訪庶事故令百官入侍左右至班序失次非所以肅朝儀也自今文武百官入朝除侍從中書省大都督府御史臺指揮使六部尚書侍郎等官許上殿其餘文武官五品以下並列班於丹陛左右違者糾儀官舉正之續文獻通考三年二月庚午帝問禮部尚書崔亮曰朕郊祀天地拜位皆正中而百官朝叅則班列東西以避正中此何禮也亮對曰臣聞天子祭天升自午陛祭社升自子陛盖社祭土而主陰故君升自子陛而南向答陰之義也郊祭天而主陽故君升自午陛而北向以答陽也若夫羣臣朝叅於上非答神之義俱當避君上之尊故升降則俱由卯陛朝班則分列東西以避馳道此其義不同也帝曰臣之事君與君之事天其道不相逺也因命侍儀司自今百司朝恭左右班相去不得越二尺其省府臺官俱就甬道上拜謁但不得直行甬道而已明太祖實錄三年三月禮部奏案宋制駙馬班次出入皆依官品今駙馬既授官職當依百官由西門出入其班次品級當在百官之上如一品在一品之上二品在二品之上從之續文獻通考七月己亥詔定朔望升殿儀崔亮奏朔望日上皮弁服御奉天殿百官公服於丹墀東西對立引班引合班北面再拜班首詣前同百官鞠躬唱某官臣某起居贊禮稱聖躬萬福復位皆再拜分班對立省府臺部官有奏由西階升殿奏畢降階引班引百官以次出如無事奏則侍儀由西階升殿奏知降階百官出制可定百官朝叅儀崔亮奏凡朝覲進表箋及謝恩皆公服如面除不及具服即時謝恩者勿拘凡入午門毋相跪拜拱揖入朝坐立毋越其等毋談笑諠譁指畫窺望凡近侍御前毋咳嗽吐唾如有舊患齁喘𤼵者許即退班或一時感疾不能侍立者許同官掖出凡侍班奏事依舊儀含雞舌香如賜坐不許推讓或被顧問先起立對復問不必更起同列侍坐或被顧問一人奏對餘静聽毋攙言如各有所見俟其人言畢方許前陳凡諸儒官於御前奏事或進呈文字恐有口氣體氣須退立二三歩毋輙近御案凡立須於東西隅不得直前其入朝或錫宴俱不得素服制可瑣綴録今制早朝班定鴻臚官宣贊謝恩見辭行禮畢各官將奏事皆預咳一聲文武班中不約而同聲震如雷俗謂之打掃其有痰咳不可忍者許引退自便宣徳間少詹事曾棨以痰咳作於班中引退上遥見之勅免其常朝成化中文華殿經筵户部尚書馬昂以將咳退出殿門俟講畢仍同行禮餘未見有敢先退者盖昂初為序班故尚習此例其他見此不以為異則以為失儀矣明太祖實錄壬寅賜文武官朝服公服先是命省部㑹𢎞文館學士劉基等叅考歴代制度為之至是成始給賜凡大朝㑹天子衮冕御殿則服朝服見皇太子則服公服四年三月癸丑中書省奏舉百官起居之禮及進膳用樂不許五年三月己酉命將官子弟年幼者入國學稍長令隨班朝叅以觀禮儀六年九月丙午禮部奏定百官常朝班次及奏事等禮儀十一年三月丁酉始製牙牌給文武朝臣其製以象牙為之刻官稱於上凡朝叅佩以出入有不佩者門者却之私相借者論如律有故則納之内府其在外來朝百司官無牌者則於各門附名以入明㑹典洪武十四年定凡朔望日文武百官各具朝服俟鼓三嚴公侯一品二品官入東西角門俟其餘三品以下先於丹墀内班横行序立鐘三鳴公侯一品二品以次入班序立鐘鳴畢儀禮司奏外辦導駕官導上出陞御座鳴鞭訖鳴贊唱班齊通贊詣中道班首臣某等起居聖躬萬福畢百官行五拜禮儀禮司奏禮畢而退明太祖實録洪武十六年十一月甲寅詔定朝叅官坐次凡奉天門賜坐公侯至都督僉事坐於門内守衛指揮坐於都督僉事之後稍南六部尚書及署都督府事官坐於門外皆東西向六部侍郎十衛指揮應天府尹國子祭酒翰林院官諌官僉都御史坐於西角門東向若華盖殿則公侯及都督僉事坐於殿内尚書及署都督府事官坐於鹿頂内六部侍郎及十衛指揮應天府尹國子祭酒翰林院官諌官僉都御史坐於鹿頂外皆東西相向明史禮志十七年罷朔望起居禮後更定朔望御奉天殿常朝官序立丹墀東西向謝恩見辭官序立奉天門外北向陞座作樂常朝官一拜三叩頭樂止復班謝恩見辭官於奉天門外五拜三叩頭畢駕興明太祖實録十七年九月辛丑命公侯駙馬及文官三品武官四品以上凡大朝㑹及常朝許由午門之右門出入其有宣召及不時奏事文官四品武官五品以下仍由左右掖門二十年十月丁卯命禮部尚書李原名考正禮儀申布中外重定朝恭及筵宴儀朝恭儀八條一朝班序立公侯居文武班首次駙馬次伯自一品以下各以序文東武西風憲糾儀官居下北面紀事官居文武第一班之後稍近上以便觀聽不得攙越如奏事須從班末至御前跪奏不得班内横過二文武官於御前侍坐遇大小官奏事必起立奏畢復坐若特㫖賜坐者不拘三文武官出入朝門各加敬遜如一品以下遇公侯駙馬立則傍立行則後從餘倣此其有宣召不在此限四朝叅官遇有聖諭須專心拱聽守而勿失五百官入午門内不得吐唾如朝恭近侍病嗽者許即退班六御前奏對務從誠實不許妄誕七隨從過丹墀中常北面不得南向左右環轉不背北如隨從升奉天門或丹陛不得徑行中道及王道有㫖令行於側隨行入朝門須拱手端行不得行私揖禮邱氏濬曰案前代朝儀無一定之制時有更改惟我朝自祖宗以來至於今日率循舊章一日三朝自古帝王所無也每日晨興上御奉天門文東武西侍鳴鞭畢鴻臚寺卿唱入班百官行叩頭禮分班侍立翰林學士侍御座左錦衣衛官俠陛西立六科給事中分侍左右御史分班北面立鴻臚官屬立其後先日謝恩見辭者於鴻臚寺報名至日先赴午門外俟百官叩頭畢鴻臚卿對御宣奏姓名員數於午門外行五拜三叩頭禮畢五府六部以次奏所司合行事次通政司引入於御前面奏請㫖該司官出班承㫖大理寺以下有事出奏無則已次禮科引差使考滿官員次六科各奏㫖意題本守衛掲帖賞賜鈔錠次鴻臚宣奏藩府邊鎮所遣使臣上命以酒飯賞賜既而兩京堂上官新陞者及在外三司來朝赴任者面見叩頭畢鴻臚卿唱奏事畢羣臣俱側身向上立鳴鞭畢上乗輦往御武英殿或文華殿閲章疏日率如此至午後出朝晚亦如之此毎日常朝之制也毎月朔望上皮弁服御正殿百官公服叩頭畢分班侍鴻臚卿宣奏謝恩見辭員數畢上出奉天門視朝如常儀臣竊考前代之制有所謂押班放仗入閤等名或失於粗畧或失於煩瑣惟今日朝儀酌古凖今寔為得中洪武二十年冬太祖皇帝諭大臣曰近者臣僚尊卑體統多未得宜爾等宜著禮儀以為定式禮部尚書李原名等㑹官著為禮儀定式一書凡三十七條所謂朝叅之禮有八焉頒行既久而奉行者偶因一時之便遂襲以為故事旁觀者雖知其非而不復以為言後來因以為當然者亦或有之竊觀前代朝㑹班次皆著成圖式載在文獻通考諸書者可考也乞勅大臣及翰林院鴻臚寺官將累朝實録及禮儀定式等書再稽洪武永樂年間以來事例詳加講究櫽括節潤畫為圗式懸於兩長安門用以表正百官觀示列辟俾人人知所趨避世世得以遵守永為定制云二十一年二月己巳禮部言今後朝叅宫門籍宜從各衙門自置從之二十二年七月壬午給文武官朝服錦綬帝以民間不能製命工部織成頒賜之文官五品以上武官三品以上明㑹典洪武二十四年定侍班官員凡文武官除分詣文華殿啟事外如遇陞殿各用履鞵照依品級侍班有違越失儀者從監察御史儀禮司糾劾東班則六部堂上官各部堂掌印官都察院堂上官十三道掌印御史通政司大理寺太常寺太僕寺應天府翰林院春坊光祿寺欽天監尚寶司太醫院五軍斷事官及京縣官西班則五軍都督及首領官錦衣衛指揮各衛掌印指揮給事中中書舍人又凡朝班序立洪武二十四年冬禮部置百官朝班序牌大書品級列丹墀左右木柵之上文武百官照品序立侍班又凡入朝次第洪武二十四年令朝叅將軍先入近侍官員次之公侯駙馬伯又次之五府六部又次之應天府及在京雜職官員又次之百官朝見儀凡百官朝見洪武二十六年定稽首頓首五拜乃臣下見君上之禮先拜手稽首四拜後一拜叩頭成禮稽首四拜者百官見東宫親王之禮其見父母亦行四拜禮其餘官長及親戚朋友相見止行兩拜禮蕙田案明史禮志載洪武二十六年令凡入殿必履鞵今以㑹典考之乃在洪武二十四年疑志誤也昭代典則洪武二十八年十月壬寅從禮部言罷百官朝恭賜食先是每旦視朝奏事畢賜百官食帝御奉天門或華盖殿武英殿公侯一品官侍坐於門内二品至四品及翰林院等官坐於門外其餘五品以下於丹墀内文東武西重行列位贊禮贊拜叩頭然後就坐光祿司進膳案從以次設饌食畢百官仍拜叩頭而退率以為常至是以職事衆多供億為難罷之郭正域典禮志洪武二十九年十月丁酉詔定各司奏事次第禮部議凡奏事先都督府次十二衛次通政使司次刑部次都察院次監察御史次斷事官次吏戸禮兵工五部次應天府次兵馬指揮使次太常司次欽天監若太常司奏祭祀則在諸司先毎朝上御奉天門百官上謁畢儀禮司以次贊奏事奏畢復班若上御殿奏事官升殿以次奏畢先退其不升殿者俱於中左中右門外兩廊候奏事官出則皆出若文華殿啟事則詹事府在先凡晚朝惟通政使司六科給事中守衛官奏事其各衙門有軍情重事者許奏餘皆不許詔從之明太祖實録十一月乙卯朔詔免國子監生朔望朝恭續文獻通考成祖永樂元年五月庚辰禮部請忌辰西角門視朝禮部尚書李至剛等奏五月十日丙戌太祖髙皇帝忌辰議於忌辰前二日上服淺淡衣服御西角門視事不鳴鐘鼓不行賞罰不舉音樂禁屠宰文武官服淺淡衣服黒角帶視朝從之仍命八月十日髙皇后忌辰亦如之明史禮志永樂初令内閣官侍朝立金臺東錦衣衛在西後移御道東西對立四年諭六部及近侍官曰早朝多四方所奏事午後事簡君臣之間得從容陳論自今有事當商確者皆於晚朝續文獻通考七年正月癸丑賜朝叅官元宵節假自正月十一日為始凡十日百官朝恭不奏事聽軍民張燈飲酒為弛夜禁著為令明㑹典永樂七年大寒早朝上御奉天門百官行叩頭禮侍班俟鴻臚寺官引謝恩見辭人員行禮畢駕興御右順門内便殿百官有事奏者以次入奏無事者退治職務明史禮志七年諭行在禮部曰北京冬氣嚴凝羣臣早朝奏事立久不勝今後朝畢於右順門内便殿奏事明㑹典二十二年九月時仁宗已即位令方面大臣來朝鴻臚寺即皆引見續文獻通考十月庚戌令大小公私之事皆於公朝陳奏宣宗實録宣徳三年十二月寜王權言慶賀行禮拜進表箋三司官皆依秩序立獨儀賔未有定制帝命禮部考定尚書胡濙言考洪武禮制郡主儀賔秩從二品縣主儀賔從三品郡君儀賔從四品縣君儀賔從五品鄉君儀賔從六品若遇行禮宜序於同等官員之左詔頒行遵守鄧元錫明書宣徳四年十二月帝以霜寒命光祿寺賜早朝官羊酒謂侍臣曰皇祖考臨朝旦常賜食必謹識無忘明史英宗本紀宣徳十年正月英宗即位始罷午朝大政記太祖相傳諸帝臨朝毎至日昃不遑暇食惟欲達四聰以來天下之言至是以帝幼冲始罷午朝又創權制毎日早朝止許言事八件前一日先以副本詣闕下豫以各事處分陳上遇奏止依所陳傳㫖而已其後遂為定制朱氏國楨曰開創與守成不同長君與幼主亦異三楊創權制自合如此後八事改為六事今止三事臨朝文武侍立傳宣奏對不能多亦不能久與文華詳審擬議不可並論矣明史禮志景泰初定午朝儀凡午朝御左順門設寶案執事奏事官候於左掖門外駕出以次入内閣五府六部奏事官六科侍班官案西序立侍班御史二序班二將軍四案南面北立鳴贊一案東西向立錦衣衛鴻臚寺東向立管將軍官侍衛官立於將軍西府部奏事畢撒案各官退有密事赴御前奏蕙田案實錄但云景泰二年復午朝而備載此儀於𢎞治元年然明㑹典郭正域典禮志及此志並以為景泰初定盖景泰復午朝即定此儀孝宗因而行之耳實録於景泰中事多闕畧此亦其一證也續文獻通考景泰二年九月丙申朔定常朝内閣位午朝翰林院先奏事時戸部尚書兼翰林院學士陳循奏以永樂初内閣官遇常朝立金臺東錦衣衛在西後因不便移下貼御道東西對立已為定例近日因雨各衙門官俱上奉天門奏事五府官雖品髙皆立西􅉉柱外獨六卿序立東􅉉柱内遂使内閣官無地可立此係朝儀不可不辨又毎午朝進近御榻奏事臣所奏多係制誥機密重務不宜在五府六部奏雜事後帝從之故有詔瑣綴録舊制毎早朝閣老與司禮監太監對立寶座東西太宗晚年健忘寶座後常有一二宫嬪從立記㫖時金文靖公嫌不自安辭立丹陞下仗馬之南景泰中陳芳洲請復立陛下託言毎遇雨雪不便朝廷難之事遂寝天順中一日仗馬啼齧驚逼諸閣老英廟乃命諸閣老移南立諸給事之前大漢將軍之後給事亦移南立英廟見之命毋南移惟仍舊班成化間閤老復立北上諸給事又隨而北若前後班然不復分上下班矣初閣老以品序前後立成化初劉主靜以四品入閣獨立於陳彭二先生後以與給事班同上命立陳彭之下萬循吉繼之而立遂為一班明㑹典景泰三年令師保兼官品同者立班以衙門為次又令六科都左右給事中内外序坐書銜俱居御史之左又令官員人等至皇城門四下馬牌邊横過俱下馬其順行不係横過不在禁例續文獻通考英宗天順元年正月武清侯石亨言洪武禮制榜文凡朝叅及䕶衛官員軍校進退先後有序禁門出入有常近來不分貴賤相叅挨擠皇城各門諸人往來徑行全無忌憚有帶物貨入内買賣者今後常朝第三通鼓起先開二門官軍旗校将軍先進排列鐘響朝官依次而進嚴勅守衛官軍不許徑放無牌面人員穿朝出入及将物貨買從之明㑹典天順三年定方面官入班遞降京官一等成化元年令毎日早朝各衙門并公差官員具本面奏及通政司類進本状各具手本備開所奏事件送禮科収照次日将収到奏目并各衙門送到奏題本状通具奏目送司禮監交収以候類進又令一應奏題本有㫖意者六部都察院等衙門抄出即明白覆奏發落不許稽緩若過五日不覆奏者該科以聞凡在京文武衙門奏題本謹封完備俱差屬官捧入左順門進呈成化十三年奏准文武官員入朝大臣許帶官吏頭目毎人二名若遇陰雨大臣添一人小官許帶一人各執雨具又令文武大小官員入朝跟隨辦事官吏人等照出午門例於長安左右門承天門端門各下小木牌進入出則収囬十四年令朝叅官員遇鼔起時俱於左右掖門外拱候東西班次照依衙門品級序其進士各照辦事衙門次序立於見任官後明憲宗實録成化二十一年六月帝以盛暑祁寒朝官侍衛人等難於久立今後毎嵗自五月至七月十一月至次年正月止奏五事餘仍舊續文獻通考𢎞治元年正月丁酉帝黒翼善冠淺淡色袍黒犀帶御奉天門視朔羣臣常服朝參自是日至十五日皆不御殿故事元旦至元宵皆御殿閏正月丙寅朔帝御奉天殿文武官公服朝叅自是朔朢始御殿庚午吏部右侍郎楊守陳上疏請遵祖宗舊制日再御朝蕙田案憲章録昭代典則載守陳上疏在是年三月其官銜稱少詹事今以實録及明史本傳考之則守陳時已為吏部侍郎矣本傳云正月上疏今從實録及續通考在閏正月明孝宗實録𢎞治元年三月禮部進午朝儀注三月十八日午朝内官先設御座於左順門之北設案稍南文武執事奏事官俟於左掖門内駕出以次入序立内閣及府部奏事官六科侍班官俱案西序立侍班御史二序班二将軍四俱案南面北立鳴贊一案東面西立錦衣衛鴻臚寺堂上官於奏事官班下以次面東立管将軍官及侍衛官立於将軍之西府部官依次出班奏事通政司依常例引人奏事三法司官遇有奏俱隨班其常日承㫖刑部大理寺郎中寺正各一員都察院侍班御史承㫖其餘衙門分官承㫖鴻臚寺官贊奏事畢徹案百官退如有機宻重事許赴御前具奏蕙田案實録但云禮部進午朝儀注不云是年重定則㑹典明史志以為景泰初所定者是也特成化中已廢而不舉至是復遵舊制耳續文獻通考𢎞治二年六月戊子朔工部主事林沂奏欲按品秩列坐御史上為御史所劾帝以沂故違成憲治之御史向翀等劾曰朝廷設官分職有拘品秩者有不拘品秩者故慶成賜宴翰林坐於科道之前科道坐於郎中之上若概以品秩則殿閣諸大學士皆當列於太僕少卿之下京縣知縣兵馬指揮皆當列於御史給事中之上矣四年八月庚午復午朝九月甲午南京給事中毛珵等言陛下臨御之初吏部侍郎楊守陳請遵祖宗舊制御早午二朝聽政意以早朝侍衛森嚴君臣之間難以盡情冀於午朝欵曲辨議今乃與早朝不殊君臣間隔如故豈建言初意乎伏望自今午朝勅各衙門将𦂳切事件口奏少霽天顔議其可否朝退之後常御便殿時召大臣咨訪政事如守陳之説詔下所司知之憲章録𢎞治十三年正月大學士劉健等言自古願治之君必早朝晏罷日省萬幾祖宗黎明視朝毎日奏事二次邇者視朝太遲朝罷或至昏黒四裔朝貢奚所觀瞻庶府文移多致寝閣矧今各邊啟釁四方薦災尤為可慮怠荒是戒勵精是圖庶可以回天意慰人心上嘉納之孝宗本紀十三年五月丙辰召大學士劉健李東陽謝遷於平臺議政蕪史建極殿即謹身殿也殿居中向後髙踞三纒白玉石欄杆之上者雲臺門也兩旁向後者東曰後左門西曰後右門即雲臺左右門亦名曰平臺也凡召對閣臣等官或於平臺即後左門也明孝宗實録十三年六月戌子御史劾西寜侯宋愷等文武官五百有六人朝叅不至有詔宥之仍奪一月俸靖逺伯王憲以病在告都督僉事李晟等十二人以赴操太僕寺少卿李綸以文華殿辦事例免朝叅奏状得不奪俸明武宗實録正徳九年編修王思以乾清宫災應詔上言祖宗故事正朝之外日奏事左順門又不時召對便殿今毎月御朝不過三五日毎朝進奏不踰一二事其養徳之功求治之實宰輔不得而知也聞見之非嗜好之過宰輔不得而知也况天下之大四海之廣生民愁苦之状盗賊縱横之由又豈能一一上達伏願陛下悉遵舊典凡遇宴閒少賜召問勿以遇災而懼災過而弛不報明世宗實録嘉靖元年二月詔以正徳末朝儀多廢命禮部詳定於是禮部奏朝叅諸儀凡入進班奏啟復命及齋戒忌辰令節予告日期以及御史鴻臚官面糾疏糾各禮皆查復舊例明示諸司永為遵守從之典彚嘉靖六年十二月大學士楊一清等言人主視朝當有常期古禮朝辨色始入君日出而視之今陛下常於昧爽以前視朝或設燭以登寶位雖大風寒無間是固勵精圖治之心苐聖躬得毋過勞乎伏願於新嵗履端更始之前倣古禮而行命鴻臚官傳示内外毎以日出為度或遇大風寒日暫免遂著為令上曰卿等所言真師保愛君至意邇來内外百官偷閑怠惰不能勤事故朕以身先之庶足以警化云耳古禮謂辨色入朝日出而視之不獨為息養之計是亦防微之一道也蕙田案如一清所奏可見世宗初政之勤迨其後至三十餘年不御常朝矣明史禮志嘉靖九年令常朝官禮畢内閣官由東陛錦衣衛官由西陛陞立於寶座東西有欽差官及外國人領敕坊局官一人奉敕立内閣後稍上候領敕官辭奉敕官承㫖由左陛下循御道授之續文獻通考十一年八月丙子朔詔領敕及謝恩見辭之制俱如舊先是正月帝以疾數不視朝鴻臚卿王道中因請領敕謝恩及見辭官暫受事左順門後因循遂為定制禮部以為非祖制不可帝以諸事非係重大其如寺議於是尚書夏言議曰領敕必於御前以重帝命可防詐傳旁出之奸繳敕必於御前以達下情可防遲留隠匿之弊至面見面辭人員即遇免朝豈不能少待而遽廢上下之禮殆非臣子之心所安帝然之詔並遵舊制如遇雨雪風寒暫三五日不視朝並令候待若免朝日久准受命左順門著為令明世宗寔録十三年十一月帝以大祀御殿誓戒羣臣中書舍人無侍殿班者御史楊行中奏之掌中書事傅棨等言故事誓戒無舍人侍班下禮部議言升殿禮儀翰林官與中書舍人俱用四人東西侍班縁㑹典所載互有詳略故於誓戒進歴等禮有翰林而無中書今宜著為令凡御殿稱賀諸禮皆令中書舍人侍班從之續文獻通考十四年三月丁卯帝與大學士張孚敬李時議復午朝帝日講畢召輔臣張孚敬李時見於文華殿西室語次歴評諸臣時因請舉先朝午朝之典毎午御左順門命大臣朝見即奏事亦足以聯屬人心帝曰先朝仍有晚朝之儀朕常思之如鴻臚寺奏謝恩見辭是朝儀若政事另行為是今通政司奏事全是行政非朝也孚敬曰午朝驟難復不若時常宣召大臣於文華殿質問政事時曰不但質問政事亦可知人臣賢否臣等亦在側侍班帝曰也著科道官侍俟廷試後舉行之大政記隆慶元年正月戊午帝御宣治門視事明穆宗實録帝初即位禮部請御宣治門聽政詔以元年正月二日始至三月己卯始御皇極門復常儀明書辛酉詔復召對舊典令科道隨入大政記元年二月考定朝儀續文獻通考隆慶元年都給事辛自修等以朝儀久曠班行不肅請令禮官考議成式疏下禮部禮科㑹議至是奏言國家初制百官以品序立故今皇極殿前所列品山表識森然其後更定制度又有不拘於品者如内閣官錦衣衛升立寶位之東西翰林學士列於僉都御史之上其他翰林官不論品級叙於京堂之内科道官自為一等列於部屬之先及鴻臚寺尚寶司列於西階三科六道與東班對侍雖若次序叅錯班行混淆然或以顧問糾察或以奉事承㫖莫不有因難以輕改今後常朝悉如此例其餘官員仍依品級崇卑衙門次序為列如有紊越聽糾儀官糾奏至於各官被服束帶㑹典所載甚明不得僣用以乖典制從之穀城山房筆麈國初朝儀專叙品級不分散要世宗自甲午以後三十餘年不視常朝舊典無人記憶穆考登極始復常朝鴻臚搜求故實多所散失不知於世廟初年合否班行東西分列勲臣在西上東面不與百官齒左班面西侍立一品二品為一行三品次之為第二四品五品京堂次之為第三宫坊五品六品次之為第四翰林六品七品次之為第五兩房中書次之為第六此為一叚其下則六科為第一吏部第二中書舍人第三此為一叚其下則御史第一五部次之自此以下品級官次紊不可紀矣右班面東侍立則錦衣在前五軍都督府次之其後七十二衛指揮等官叩頭禮畢則左班内閣右班錦衣俱由玉陛升立金臺左右六科升立甬道左右東西向御史立於甬道左右北向其北面行禮班次則公侯駙馬伯立三班於前去文武階次稍逺其下則文武兩班同上御道左右分立一品二品為第一三品第二四品五品京堂至翰林史官吉士第三科道中書第四其下則六部郎官亦頗紊亂其同班序立翰林七品在小九卿六品之上宫坊六品在小九卿五品之上宫坊五品在大九卿五品之上講讀學士在大九卿四品之上惟讓僉都少詹光學士在僉都之上至于六部郎官往時一吏二禮其下則戸兵等部故有主事立於郎官之上者其後戸部主事賀邦泰以禮部在其上嘗疏爭之有詔六部郎中並列員外次之主事又次之久之又稍稍紊矣三年閏六月南京吏部尚書吳嶽上疏謂常朝止於見謝彌文即奏對常規姑取塞責宜将各部院衙門編為班次分定日期皇上親御便殿依次召入令其各照職掌次第敷陳其科道官亦得分畨叅與可否則可以廣聖聰勸百辟報可明史禮志隆慶六年詔以三六九日視朝明神宗實録元年禮部議應否常朝官定規除兵部協理戎政侍郎遇開操日免朝户部總督倉塲管東官㕔禄米倉銀庫大通橋崇文門禮部提督四夷館工部管修京通倉戸刑二部照磨各部司務俱朔望日朝叅刑部提牢主事暫免其餘在京差管倉塲㕔厰官俱常朝其差出城者臨時填註門籍明史禮志神宗三年令常朝日記注起居官四人列於東班給事中上稍前以便觀聽午朝則列於御座西稍南明神宗實録大學士張居正奏國初設起居注官日侍左右實古者左史記事右史記言之制後定官制乃設翰林院修撰編修檢討等官葢以記載事重故設官加詳原非有所罷廢而自職名更定遂失朝夕記注之規以致累朝史文闕略記載臣等仰稽成憲叅酌時宜竊以宫禁邃嚴流傳少實堂亷逺隔聽睹非真何以據事直書傳信垂後謹案禮儀定式凡遇常朝記事官居文武官第一班之後近上便於觀聽即古螭頭載筆之意洪武二十四年定召見臣下儀以修撰編修充侍班官即古隨仗入直紀事之意今遵祖制除升殿例用史官侍班外凡常朝御皇極門毎日輪該記注起居并史官共四人列於東班各科給事中之上午朝御㑹極門列於御座西稍南專記言動詔依擬行續文獻通考神宗四年六月癸酉帝命禮兵二部議五府官應否與勲臣同班立於是禮部言都督諸臣於殿下則當立錦衣衛官後而稍出其上與六部對侍常朝御門初立亦如之行禮後則與南北司無執事者同班而序其上命著為令春明夢餘録各班武臣當以都督為先自嘉靖以來錦衣權重又陸朱二公皆以三公重銜官在都督之上故立於首神宗六年戊寅朱太傅已殁掌錦衣者俱都指揮等官相沿舊規仍立前列其後遂有爭議部中以錦衣貴重竟不得持可否乃令錦衣仍前立行稍下都督立其後稍上非正禮也明㑹典神宗四年議准於左右掖門内各設序班分立東西與原設催促入班序班二員一同糾察十二年議令吉服朝叅日期除祭祀齋戒不面糾外其餘照常糾儀又令叅将見朝在京營者照京官儀不贊跪在外者照外官儀贊跪失儀俱面糾常朝近儀凡早朝鼓起文武官各於左右掖門外序立候鐘鳴開戸各以次進過金水橋至皇極門丹墀東西相向立候上御寶座鳴鞭鴻臚寺官贊入班文武官俱入班行一拜三叩頭禮分班侍立鴻臚寺官宣念謝恩見辭人員傳贊午門外行禮畢鴻臚寺官唱奏事各衙門應奏事件以次奏訖御史序班糾儀無失儀官則一躬而退鴻臚寺官跪奏奏事畢鳴鞭駕興百官以次出近例朝覲外官及舉監人等不許擅戴煖耳入朝明神宗實録十四年十一月己未給事中王三餘疏言視朝太早多有未便即日出亦不為遲既可調養聖躬保和元氣且於門禁朝儀俱為便益皇上如欲希古帝王及我祖宗中興之盛莫若再復午朝之規日與公卿大臣及執事等官商確政事面賜批答可也帝報聞明史荘烈帝本紀崇禎元年八月乙未詔非盛暑祁寒日御文華殿與輔臣議政續文獻通考是月甲寅御史王相説言文華殿召輔臣商確機務請仍輪詞臣二員以備記注臺省臣二員以備糾叅庶幾古人左右史記言動及諌官隨宰相入閤之意從之春明夢餘録崇禎十五年閏十一月初七日詔二祖舊制日常朝見羣臣裁决政事朕今率循成憲除門朝照例應免日期傳免外餘毎日視朝畢勲戚文武諸司等官有欲奏事者赴𢎞政門報名候召内外官員敢有壅蔽阻當者定以奸欺論觀承案常朝周制不過旅揖特揖其儀最簡而君體盤臣體蹙其分未始不嚴東遷以後上替下陵天子下堂侯國大夫相率而拜於上其朝可知矣秦矯其弊而立朝揖朝之法遂不復行然受决事於咸陽宫庶㡬其猶舊典禮歟叔孫通采古禮與秦儀雜治之為漢朝儀其見於史書者皆秦儀也頗采古禮者安在且不可用於常朝漢初公卿毎月常朝宣帝始親國事五日一朝則常朝也其儀不著意者即以倣秦之所為决事者為古禮歟唐宋以來重常朝而儀特備一切已非秦漢之舊至明御門商確事於晚朝俾從容陳論依古以來獨此為近載考漢唐君臣决事於殿庭也皆列坐宋太祖宻撤范質之坐宰相立而白事至不時之朝惟漢唐有之故汲黯得見武帝於武帳魏徴得見太宗於便殿宋以下則待召而入夫周之掌治朝者為小宰通復逆者為小臣皆士也而君臣又不時可見秦漢唐宋明用宦寺不得時見宜乎多奄禍而繁文縟節皆成日中之蔀已右明常朝五禮通考卷一百三十五
