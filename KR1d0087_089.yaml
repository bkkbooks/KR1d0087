body:
  text: 五禮通考卷七十九刑部尚書秦蕙田撰吉禮七十九宗廟制度三國蜀志先主傳章武元年夏四月大赦改元立宗廟祫祭髙皇帝以下注臣松之以為先主雖云出自孝景而世數悠逺昭穆難明既紹漢祚不知以何帝為元祖以立親廟于時英賢作輔儒生在官宗廟制度必有憲章而記載闕略良可恨哉通鑑綱目昭烈帝章武元年夏四月立宗廟祫祭髙皇帝以下尹氏起莘曰昭烈始得蜀漢正位繼統又適當屬繫人心之始綱目書此蓋與光武即位二年書立宗廟社稷于洛陽同意蕙田案宋書禮志云昭烈代紹而起未辨繼何帝為禰亦無祖宗之號劉禪面縛降魏北地王諶哭于昭烈之廟則昭烈廟别立也愚謂諸葛亮云將軍帝室之胄是昭烈為漢帝後無疑祫祭髙皇帝以下則實有祖宗之號可稱非朱子綱目正名定分則大統何自而明哉一統志云昭烈帝廟在成都府城南二里又案以上蜀漢晉書禮志王制天子七廟諸侯以下各有等差禮文詳矣漢獻帝建安十八年五月以河北十二郡封魏武帝為魏公是年七月始建宗廟于鄴自以諸侯禮立五廟也後雖進爵為王無所改易延康元年文帝繼王位七月追尊皇祖為太王夫人曰太王后黃初元年十一月受禪又追尊太王曰太皇帝皇考武王曰武皇帝三國魏志文帝黃初四年注魏書曰辛酉有司奏造二廟立太皇帝廟大長秋特進侯與髙祖合祭親盡以次毁特立武皇帝廟四時享祀為魏太祖萬載不毁也三國魏志明帝本紀太和三年初洛陽宗廟未成神主在鄴廟十一月廟始成使太常韓暨持節迎髙皇帝太皇帝武帝文帝神主于鄴十二月己丑至奉安神主于廟晉書禮志明帝太和三年追尊髙祖大長秋曰髙皇夫人吳氏曰髙皇后並在鄴廟廟所祠則文帝之髙祖處士沛國譙人曹萌曾祖髙皇萌之子騰祖太皇帝共一廟考太祖武皇帝特一廟百代不毁然則所祠止於親廟四室也其年十一月洛京廟成則以親盡遷處士主置園邑使行太傳太常韓暨宗正曹恪持節迎髙祖以下神主共一廟猶為四室而已三國魏志明帝本紀景初元年夏六月有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏髙祖樂用咸熙之舞帝制作興治為魏烈祖樂用章武之舞三祖之廟萬世不毁其餘四廟親盡迭毁如周后稷文武廟祧之制晉書禮志景初元年六月羣公有司始更奏定七廟之制曰大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇帝繼天革命應期受禪為魏髙祖上集成大命清定華夏興制禮樂宜為魏烈祖于太祖廟北為二祧其左為文帝廟號曰髙祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毁其餘四廟親盡迭遷一如周后稷文武廟祧之禮三國魏志明帝紀注孫盛曰夫諡以表行廟以存容皆于既汶然後著焉所以原始要終以示百世也未有當年而逆制祖宗未終而豫自尊顯昔華樂以厚斂致譏周人以豫凶違禮魏之羣司于是乎失正蕙田案以上魏三國吳志孫亮傳太平元年春注吳歷曰正月為權立廟稱太祖廟宋書禮志孫權不立七廟以父堅嘗為長沙太守長沙臨湘縣立堅廟而已權既不親祠直是依後漢奉南頓故事使太守祠也堅廟又見尊曰始祖廟而不在京師又以民人所發吳芮冡材為屋未之前聞也于建業立兄長沙桓王䇿廟于朱雀橋南權卒子亮代立明年正月于宫東立權廟曰太祖廟既不在宫南又無昭穆之序蕙田案以上吳右三國廟制晉書武帝本紀泰始二年春正月丁亥有司請建七廟帝重其役不許秋七月辛巳營太廟致荆山之木采華山之石鑄銅柱十二塗以黃金鏤以百物綴以明珠冬十一月己丑追尊景帝夫人夏侯氏為景懷皇后辛卯遷祖禰神主於太廟禮志泰始元年十二月丙寅受禪丁卯追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝宣王妃張氏為宣穆皇后二年正月有司奏置七廟帝重其役詔宜權立一廟於是羣臣議奏上古清廟一宫尊逺神祗逮至周室制為七廟以辨宗祧聖旨深𢎞逺迹上世敦崇唐虞舍七廟之繁華遵一宫之逺旨昔舜承堯禪受終于文祖遂陟帝位蓋三十載月正元日又格于祖遂陟帝位此則虞氏不改唐廟因仍舊宫可依有虞氏故事即用魏廟奏可於是追祭征西將軍豫章府君潁川府君京兆府君與宣皇帝景皇帝文皇帝為三昭三穆是時宣皇未升太祖虛位所以祠六世與景帝為七廟其禮則據王肅説也七月又詔曰主者前奏就魏舊廟誠亦有凖然於祗奉明主情猶未安宜更營造於是改創宗廟十一月追尊景帝夫人夏侯氏為景懷皇后任茂議以為夏侯初嬪之時未有王業帝不從蕙田案唐虞禪讓舜宗堯廟承其統緒而别立親廟于虞國所以公天下也晉之纂魏豈可倫擬羣臣據以為比妄矣况虞氏不改唐廟宗堯也晉用魏廟乃自祭其祖亦不同矣通典晉武帝即位權立一廟後用魏廟追祭征西將軍章郡府君名鈞字升平鈞之子名景章郡太守字公度章郡上一字為代宗廟諱除也潁川府君景之子名俊潁川太守字元異京兆府君俊之子名防京兆尹字建公生宣帝與宣帝景帝文帝為三昭三穆文獻通考廟制于中門外之左通為屋四阿殿制堂髙三尺隨見廟數為室代滿備遷毁神主尺二寸后主一尺與尺二寸中間木以栗通典太常博士孫育議云考工記左祖右社孔子曰周人敬鬼神而逺之近人而忠焉禮諸侯三門立廟宜在中門外之左宗廟之制外為都宫內各有寢廟别有門垣太祖在北左昭右穆次而南今宜為殿皆如古典蕙田案孫育議是晉書武帝本紀咸寧元年冬十二月丁亥追尊宣帝廟曰髙祖景帝曰世宗文帝曰太祖禮志太康元年靈壽公主修麗祔於太廟周漢未有其凖魏明帝則别立平原主廟晉又異魏也蕙田案公主祔廟尤非禮矣武帝本紀太康八年春正月太廟殿陷九月改營太廟禮志太康八年因廟陷當改修創羣臣又議奏曰古者七廟所自宜如禮又曰古雖七廟自近代以來皆廟七室於禮無廢於情為敘亦隨時之宜也其便仍舊蕙田案同廟異室之制定于此矣晉初仍魏無所損益至太康九年始建宗廟武帝本紀太康十年夏四月太廟成乙巳遷神主於新廟帝迎於道左遂祫祭大赦文武增位一等作廟者二等禮志太康十年改築於宣陽門內窮極壯麗然坎位之制猶如初耳廟成帝用摯虞議率百官遷神主於新廟自征西以下車服導從皆如帝者之儀賀循傳有司奏琅琊恭王宜稱皇考循議云禮子不敢以已爵加父帝納之元帝本紀太興三年八月戊午尊敬王后虞氏為敬皇后辛酉遷神主於太廟禮志武帝崩則遷征西及惠帝崩又遷豫章而惠帝世愍懷太子二子哀太孫臧沖太孫尚並祔廟元帝世懷帝殤太子又祔廟號為陰室四殤懷帝初又䇿諡武後楊后曰武悼皇后改葬峻陽陵側别祠𢎞訓宫不列於廟元帝既即尊位上繼武於元為禰如漢光武上繼元帝故事也是時西京神主湮滅虜庭江左建廟皆更新造尋以登懷帝之主又遷潁川位雖七室其實五世蓋從刁協以兄弟為世數故也於時百度草創舊禮未備毁主權居側室至太興三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情理不安可依禮更處太常恆言今聖上繼武皇帝宜凖漢世祖故事不親執觴爵又曰今上承繼武帝而廟之昭穆四世而已前太常賀循博士傅純並以為惠懷及愍宜别立廟然臣愚謂廟室當以容主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而已推此論之宜還復豫章潁川全拘七廟之禮驃騎長史溫嶠議凡言兄弟不相入廟既非禮文且光武奮劍振起不䇿名於孝平務神其事以應九世之讖又古不共廟故别立焉今上以䇿名而言殊於光武之事躬奉蒸嘗於繼既正於情又安矣太常恆欲還二府君以全七世嶠為是宜驃騎將軍王導從嶠議嶠又曰其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庶人帝從嶠議悉施用之於是乃更定制還復豫章潁川於昭穆之位以同惠帝嗣武故事而惠懷愍三帝自從春秋尊卑之義在廟不替也通典兄弟相繼藏主室議晉太常華恆被符宗廟宜時有定處恆案前議以為七代制之正也若兄弟旁及禮之變也則宜為神主立室不宜以室限神主今有七室而神主有十宜當别立臣為聖朝已從漢制今聖上繼武帝廟之昭穆四代而已前太常賀循等並以為惠懷愍三帝别立寢廟臣以為廟當以容主為限亦無常數據殷祭六廟而有三祖三宗不毁又漢之二祖寢廟各異明功德之君自當特立若繫之七室則殷之末代當祭禰而已準之前議知以七為正不限之七室故雖有兄弟旁及至禘祫不越昭穆則章郡潁川宜全七代之禮案周官有先公先王之廟今宜為京兆以上别立三室於太廟西廂宣皇帝得正始祖之位惠懷二帝不替而昭穆不闕於禮為安驃騎長史溫嶠議惠懷愍于聖上以春秋而言因定先後之禮夫臣子一例君父敬同故可以準於祖禰然非繼體之數也案太常恆所上故還章郡潁川以全七代愚謂是宜又求京兆以上三代在廟之西廂臣竊不安溫嶠為王導答薛太常書曰省示并博士議今明尊尊不復得繫本親矣先帝平康北面而臣愍帝及終而升上懼所以取議於春秋今所論太廟坎室足容神主不耳而下愍帝於東序若案尊尊之旨愍帝猶子之列不可為父與兄弟之不可一耳案閔公僖公之弟也而傳云子雖齊聖不先父食如此無疑愍帝不宜先帝上也今唯慮廟窄更思安處宜令得並列正室又荀嵩與王導書曰三年當大禘愍帝以居子位復居父位且子雖齊聖不先父食此君即父也此為愍帝是先帝之父懷帝是愍帝之父惠帝是懷帝之父二代便重四代所以為疑處也答曰意謂君位永固無復暫還子位之理惠帝至先帝雖四君今亦不以一君為一代何嫌二代之中重四君耶今廟尚居上祀何得居下若暫下則逆祀也孔衍議别廟有非正之嫌似若降替不可行也博士傅純議云議者既欲據傳疑文又欲安之陰室據傳則所代為禰陰室非禰所處此矛盾之説夫陰室以安殤主北向面隂非人君正位更衣者帝王入廟便殿當歸盛位漢明以存所常居故崩以安神而議者謂卑於陰室實所未喻惠懷愍宜更别立廟元帝崩溫嶠答王導書云近詔以先帝前議所定唯下太常安坎室數今坎室窄其意不過欲定先神主存正室故下愍帝也廟窄之與本體各是一事何以廟窄而廢本體也明帝崩祠部以廟過七室欲毁一廟又正室窄狹欲權下一帝溫嶠議今兄弟同代已有七帝若以一帝為一代則當不得祭於禰乃不及庶人之祭也夫兄弟同代於恩既順於義無否至於廟室已滿大行皇帝神主當登正室又不宜下正室之主遷之祧位自宜增廟權於廟上設幄坐以安大行之主若以今增廟違簡約之旨或可就見廟直增坎室乎此當問廟室之寬窄其廟室寬窄亦所未詳晉書賀循傳循拜太常時宗廟始建舊儀多闕或以惠懷二帝應各為世則潁川世數過七宜在迭毁事下太常循議以為禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝别立廟寢使臣下祭之此前代之明典而承繼之著義也惠帝無後懷帝承統弟不後兄則懷帝自上繼世祖不繼惠帝當同殷之陽甲漢之成帝議者以聖德沖逺未便改舊茲如此禮通所未論是以惠帝尚在太廟而懷帝復入數則盈八盈八之理由惠帝不出非上祖宜遷也下世既升上世乃遷遷毁對代不得相通未有下升一世而上毁二世者也惠懷二帝俱繼世祖兄弟旁親同為一世而上毁二為一世今以惠帝之崩已毁豫章懷帝之入復毁潁川如此則一世再遷祖位橫折求之古義未見此例惠帝宜出尚未輕論况可輕毁一祖而無義例乎潁川既無可毁之理則見神之數居然自八此蓋有由而然非謂數之常也既有八神則不得不於七室之外權安一位也至尊於惠懷俱是兄弟自上後世祖不繼二帝則二帝之神行應别出不為廟中恆有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熙元年告世祖諡於太廟八室此是苟有八神不拘於七之舊例也又議者以景帝俱已在廟則惠懷一例景帝盛德元功王基之本義著祖宗百世不毁故所以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應别廟也以今方之既輕重義異又七廟七世之親昭穆父子位也若當兄弟旁滿輒毁上祖則祖位空懸世數不足何足於三昭三穆與太祖之廟然後成七哉今七廟之義出於王氏從禰以上至於髙祖親廟四世髙祖以上復有五世六世無服之祖故為三昭三穆并太祖而七也故世祖初定廟禮京兆潁川曽髙之親豫章五世征西六世以應此義今至尊繼統亦宜有五六世之祖豫章六世潁川五世俱不應毁今既云豫章先毁又當重毁潁川此為廟中之親惟從髙祖已下無復髙祖以上二世之祖於王氏之義三昭三穆廢闕其二甚非宗廟之本所據承又違世祖祭征西豫章之意於一王定禮所闕不少時尚書僕射刁協與循異議循答義深備辭多不載竟從循議焉通典天子兄弟不合繼位昭穆議東晉元帝建武中尚書符云武帝崩遷征西府君惠帝崩遷章郡府君懷帝入廟當遷潁川府君賀循議古者帝各異廟廟之有室以象常居未有二帝共處之義也如惠懷二主兄弟同位於禘祫之禮會於太祖自應同列異坐而正昭穆至於常居之室則不可共以尊卑之分義不可黷故也昔魯夏父弗忌躋僖公於閔上春秋謂之逆祀僖公閔之庶兄閔公先立嘗為君臣故也左氏傳曰子雖齊聖不先父食懷帝之在惠帝世居藩積年君臣之分也正位東宫父子之義也雖同歸昭穆尊卑之分與閔僖不異共室褻黷非殊尊卑之禮以古義論之愚謂未必如有司所列惠帝之崩當已遷章郡府君又以懷帝入廟當遷潁川府君此是兩帝兄弟各遷一祖也又主之迭毁以代為正下代既升則上代稍遷代序之義也若兄弟相代則共是一代昭穆位同不得兼毁二廟禮之常例也又殷之盤庚不序陽甲之廟而上繼先君以弟不繼兄故也既非所繼則廟應别立由此言之是惠帝應别立上祖宜兼遷也故漢之光武不入成帝之廟而上繼元帝義取於此今惠懷二帝不得不上居太廟潁川未遷見位餘八非祀之常不得於七室之外假立一神位庾蔚之謂爾時愍帝尚在關中元帝為晉王立廟猶以愍帝為主故上至潁川為六代懷景二帝雖非昭穆之正數而廟不合毁是以見位餘八也循又議曰殷人六廟比有兄弟四人襲為君者便當上毁四廟乎如此四代之親盡無復祖禰之神矣又案殷紀成湯以下至於帝乙父子兄弟相繼為君合十二代而正代唯六易乾鑿度曰殷帝乙六代王也以此言之明不數兄弟為正代禮志元帝崩則豫章復遷然元帝神位猶在愍帝之下故有坎室者十也明帝崩而潁川又遷猶十室也於時續廣太廟故三遷主並還西儲名之曰祧以凖逺廟荀嵩傳元帝崩羣臣議廟號王敦遣使謂曰豺狼當道梓宫未反祖宗之號宜别思詳嵩議以為禮祖有功宗有德元皇帝天縱聖哲光啓中興德澤侔于太戊功惠邁于漢宣臣敢依前典上號曰中宗既而與敦書曰承以長蛇未剪别詳祖宗先帝應天受命以隆中興中興之主寧可隨世數而遷毁敢率丹直詢之朝野上號中宗卜日有期不及重請專輒之愆所不敢辭宋書禮志咸和三年蘇峻覆亂京都溫嶠等立行廟於白石復行其典告先帝先后曰逆臣蘇峻傾覆社稷毁棄三正汙辱海內臣亮等手刃戎首龔行天罰惟中宗元皇帝肅祖明皇帝明穆皇后之靈降鑒有罪勦絶其命翦此羣凶以安宗廟臣等雖殞首摧軀猶生之年穆帝永和二年七月有司奏十月殷祭京兆府君當遷祧室昔征西豫章潁川三府君毁主中興之初權居天府在廟門之西咸康中太常馮懷表續太廟奉還於西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世逺祖長在太祖之上昔周室太祖世逺故遷有所歸今晉廟宣皇為主而四祖居之是屈祖就孫也殷祫在上是代太祖也領司徒蔡謨議四府君宜改築别室若未展者當入就太廟之室人莫敢卑其祖文武不先不窋殷祭之日征西東面處宣皇之上其後遷廟之主藏於征西之祧祭薦不絶護軍將軍馮懷議禮無廟者為壇以祭可立别室藏之至殷禘則祭於壇也輔國將軍譙王司馬無忌等議曰諸儒謂太王王季遷主藏於文武之祧如此府君遷主宜在宣帝廟中然今無寢室宜變通而改築又殷祫太廟征西東面尚書郎孫綽與無忌議同曰太祖雖位始九五而道以從暢替人爵之尊篤天倫之道所以成教本而光百代也尚書郎徐禪議禮去祧為壇去壇為墠嵗祫則祭之今四祖遷主可藏之石室有禱則祭於壇墠又遣禪至會稽訪處士虞喜喜答曰漢世韋玄成等以毁主瘞於園魏朝議者云應埋兩階之間且神主本在太廟若今側室而祭則不如永藏又四君無追號之禮益明應毁而無祭是時簡文為撫軍與尚書郎劉邵等奏四祖同居西祧藏主石室禘祫乃祭如先朝舊儀時陳留范宣兄子問此禮宣答曰舜廟所以祭皆是庶人其後世逺而毁不居舜廟上不序昭穆今四君號猶依本非以功德致祀也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變則築一室親未盡則禘祫處宣帝之上親盡則無緣下就子孫之列其後太常劉遐等同蔡謨議博士或疑陳於太祖者皆其後之毁主憑案古義無别前後之文也禹不先鯀則遷主居太祖之上亦何疑也於是京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩而哀帝海西並為兄弟無所登除咸安之初簡文皇帝上繼元皇世秩登進於是潁川京兆二主復還昭穆之位至簡文崩潁川又遷文獻通考馬氏曰漢光武既即帝位以昭穆當為元帝後遂祀昭宣元于太廟躬執祭禮而别祀成哀以下于長安使有司行事此禮之變也然其時漢已為王莽所篡光武起自匹夫誅王莽夷羣盜以取天下雖曰中興事同創業又其祖長沙定王與武帝同出景帝則于元成服屬已為踈逺先儒胡致堂謂雖逺祖髙帝而不紹元帝自帝其舂陵侯以下四親而祠之于義亦未為大失者此也則成哀而下行既非尊屬又已逺姑不廢其祀可矣至于晉元帝以琅琊王而事惠懷愍簡文以會稽王而事成帝以下諸君君臣之義非一日矣一旦入繼大統即以漢世祖為比遽欲自尊而於其所嘗事之君於行為姪者即擯之而不親祀此何禮耶况又取已祧之逺祖復入廟還昭穆之位則所以嚴事宗廟者不幾有同兒戲乎蕙田案馬氏此説頗合情理觀承案禮以得中為貴光武之於大宗蓋過於厚者然與其過於薄也無寧過於厚觀晉元帝簡文帝及明世宗興獻王事乃知前人恪守舊防必不肯破壞阡陌者蓋非無謂晉書禮志太元十二年五月壬戌詔曰昔建太廟每事從儉太祖虛位稽古之制闕然便可詳議祠部郎中徐邈議武皇帝建廟六世三昭三穆宣皇帝創基之主實惟太祖而親則王考四廟在上未及遷世故權虛東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事亡之義矣又禮曰庶子王亦禘祖立廟蓋謂支胤授立則親迎必復京兆府君於今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定耳京兆遷毁宜藏主石室雖禘祫猶弗及何者傳稱毁主升合乎太祖升者自下之名不謂可降尊就卑也太子太孫陰室四主儲嗣之重升祔皇祖所託之廟世逺應遷然後從食之孫與之俱毁孝武帝本紀太元十六年春正月庚申改築太廟秋九月癸未新廟成禮志太元十六年始改作太廟殿正室十四間東西儲各一間合十六間棟髙八丈四尺傋法駕遷神主於行廟征西至京兆四主及太孫各用其位之儀服四主不從帝者儀是與太康異也諸主既入廟設脯醢之奠及新廟成神主還室又設脯醢之奠孝武崩京兆又遷如穆帝之世四祧故事義熙元年四月將殷祠詔博士議遷毁之禮大司馬琅琊王德文議泰始之初虛太祖之位而緣情流逺上及征西故世盡則宜毁而宣帝正太祖之位又漢光武移十一帝主於洛邑則毁主不設理可推矣宜築室以居四府君之主永藏而弗祀也大司農徐廣議四府君堂處廟堂之首歆率土之祭若埋之幽壤於情理未必咸盡謂可遷藏西儲以為逺祧而禘饗永絶也太尉咨議參軍袁豹議仍舊無革殷祠猶及四府君情理為允時劉裕作輔意與大司馬議同須後殷祠行事改制宋書臧燾傳晉孝武帝時太廟鴟尾災燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毁落而别廟饗此其徴乎乃上議曰臣聞國之大事在祀與戎將營宫室宗廟為首禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱然後祭之此宗廟之次親踈之序也鄭玄以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣周之祖宗何云去祧為壇乎明逺廟為祧者無服之祖也又逺廟則有享嘗之禮去祧則有壇墠之殊明世逺者其義彌踈也若祧是文武之廟宜同月祭于太祖雖推后稷以配天由功德之所始非尊崇之義每有差降也又禮有以多為貴者故傳稱德厚者流光德薄者流卑又云自上以下降殺以兩禮也此尊卑等級之典上下殊異之文而云天子諸侯祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過髙祖推隆恩于下流替誠敬于尊屬非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以傋六世之數宣王雖為太祖尚在子孫之位至於殷祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖于卑坐臣以謂非禮典之旨所謂與太祖而七自是昭穆既足太祖在六世之外非為須滿七廟乃得居太祖也議者又以四府君神主宜永同于殷祫臣又以為不然傳所謂毁廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其統而不絶也豈如四府君在太祖之前非繼統之主無靈命之瑞非王業之基昔以世近而及今則情禮已逺而當長饗殷祫永虛太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以淵儒碩學咸謂四府君神主無緣永存于百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所執小異而大歸是同若宣王既居羣廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫禮貴有中不必過厚禮與世遷豈可順而不斷故臣子之情雖篤而靈厲之諡彌彰追逺之懷雖切而遷毁之禮為用豈不有心于加厚顧禮制不可踰耳石室則藏于廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也凖傍事例宜同虞主之瘞埋然經典難詳羣言紛錯非臣卑淺所能折中時學者多從燾議竟未施行晉書桓玄傳玄篡位既不追尊祖曽疑其禮儀問于羣臣散騎常侍徐廣據晉典宜追立七廟又敬其父則子悅位彌髙者情禮得申道愈廣者納敬必普也玄曰禮云三昭三穆與太祖為七然則太祖必居廟之主也昭穆皆自下之稱則非逆數可知也禮太祖東向左昭右穆如晉室之廟則宣帝在昭穆之列不得在太祖之位昭穆既錯太祖無寄失之逺矣玄曽祖以上名位不顯故不欲序列且以王莽九廟見譏于前史遂以一廟矯之郊廟齊二日而已祕書監卞承之曰祭不及祖知楚德之不長也又毁晉小廟以廣臺榭其庶母蒸嘗靡有定所忌日見賓客遊晏唯至亡時一哭而已期服之內不廢音樂蕙田案晉享國一百五十餘年宗廟昭穆祧遷之禮屢議而未得其當者其失有三一在建國之初未定太祖之位而于一廟之中備三昭三穆之數夫有太祖而後有昭穆今晉未立太祖之廟並祭文帝以上至征西是但有親廟而無祖廟其失一也景帝與文帝兄弟也宜為一世乃分文景為二世以充七廟之數其失二也武帝崩而遷征西懷帝登而遷潁川室則七而世維五皆由不知兄弟同昭穆之義其失三也惟賀循建議廟室以容主為限無拘常數並祭惠懷愍而復豫章潁川于昭穆之位坎室有十蓋古人異廟晉則同廟而異室世不可缺不得不加坎室穆帝時祧四府君于西儲夾室而正室猶存十一祫則四祖居太祖之上臧燾謂昭穆既足太祖在六世之外四祖長享殷祫則永虛太祖之位斯言雖正而未施行是晉始終太祖之祭未正而昭穆祧遷之數未定也能不為當時議禮諸臣惜哉右晉廟制宋書武帝本紀永初元年夏六月即皇帝位追尊皇考為孝穆皇帝皇妣為穆皇后秋七月戊申遷神主於太廟車駕親奉禮志武帝初受晉命為宋王建宗廟於彭城依魏晉故事立一廟初祀髙祖開封府君曽祖武原府君皇祖東安府君皇考處士府君武敬臧后從諸侯五廟之禮也既即尊位乃增祀七世右北平府君六世相國掾府君為七廟永初初追尊皇考處士為孝穆皇帝妣趙氏為穆皇后隋書禮儀志晉江左以後乃至宋齊相承始受命之主皆立六廟虛太祖之位宋武初為宋王立廟於彭城但祭髙祖已下四世宋書禮志髙祖崩神主升廟猶從昭穆之序如魏晉之制虛太祖之位也廟殿亦不改構又如晉初之因魏也元嘉十年十二月癸酉太祝令徐閏刺署典宗廟祠祀薦五牲牛羊豕雞並用雄其一種市買由來送雌竊聞周景王時賔起見雄雞自斷其尾曰雞憚犧不詳今何以用雌求下禮官詳正敕太學依禮詳據博士徐道娛等議稱案禮孟春之月是月也犧牲無用牝如此是春月不用雌爾秋冬無禁雄雞斷尾自可是春月太常丞司馬操議尋月令孟春命祀山林川澤犧牲無用牝若如學議春祀三牲以下便應一時俱改以從月令何以偏在一雞重更敕太學議答博士徐道娛等又議稱凡宗祀牲牝不一前惟月令不用牝者蓋明在春必雄秋冬可雌非以山林同宗廟也四牲不改在雞偏異相承來久義或有由誠非末學所能詳究求詳議告報如所稱令參詳閏所稱粗有證據宜如所上自今改用雄雞蕙田案據月令是古人犧牲牝牡並用特春月不用者恐妨其孕字傷生氣耳當時議者何以不及此意又案以上宋南齊書髙帝本紀髙帝建元元年六月庚辰七廟主備法駕即於太廟禮志太祖為齊王依舊立五廟即位立七廟廣陵府君大中府君淮陰府君即丘府君太常府君宣皇帝昭皇后為七廟文獻通考髙帝追尊父為宣皇帝右軍將軍承之母為昭皇后七廟蕭子顯曰晉用王肅之議以文景為共代上至征西其實六也尋此意非以兄弟為後當以立主之義可容于七室及楊元后崩征西之廟不毁則知不以元后為代數廟有七室數盈八主晉太常賀循立議以後弟不繼兄故代必限七主無定數宋臺初立五廟以臧后為代室就禮而求亦親廟四矣若據伊尹之言必及七代則子昭孫穆不列婦人若依鄭玄之説廟有親稱妻者言齊豈或濫享且閟宮之德用七非數開元之祀晉八無傷今謂之七廟而止唯六祀使受命之君流光之典不足若謂太祖齊登則昭穆之數何繼斯故禮官所宜詳也南齊書禮志永明六年太常丞何諲之議今祭有生魚一頭干魚五頭少牢饋食禮云司士升魚臘膚魚用鮒十有五上既云臘下必是鮮其數宜同稱膚足知鱗革無毁記云稿魚曰商祭鮮曰脡祭鄭注商量脡直也尋商旨裁截脡義在全賀循祭義猶用魚十五頭今鮮頓刪約稿皆全用謂宜鮮稿各二頭稿微斷首尾示存古義國子助教桑惠度議記稱尚玄酒而爼腥魚玄酒不容多鮮魚理宜約干魚五頭者以其既加人功可法於五味以象酒之五齊也今欲鮮稿各雙義無所法諲之議不行蕙田案以上齊梁書武帝本紀天監元年夏四月即皇帝位追尊皇考為文皇帝廟曰太祖十一月己未立小廟隋書禮儀志中興二年梁武初為梁公曹文思議天子受命之日便祭七廟諸侯始封即祭五廟祠部郎謝廣等並駁之遂不施用乃建臺於東城立四親廟并妃郤氏而為五廟告祠之禮並用太牢其年四月即皇帝位謝廣又議以為初祭是四時常祭首月既不可移易宜依前剋日於東廟致齋帝從之遂於東城時祭訖遷神主於太廟始自皇祖太中府君皇祖淮陰府君皇髙祖濟陰府君皇曾祖中從事史府君皇祖特進府君并皇考以為三昭三穆凡六廟追尊皇考為文皇帝皇妣為德皇后廟號太祖皇祖特進以上皆不追尊擬祖遷於上而太祖之廟不毁與六親廟為七皆同一堂共庭而别室又有小廟太祖太夫人廟也非嫡故别立廟皇帝每祭太廟訖乃詣小廟亦以一太牢如太廟禮天監七年舍人周捨以為禮玉輅以祀金輅以賔則祭日應乘玉輅詔下其議左丞孔休源議玉輅既有明文而儀注金輅當由宋齊乖謬宜依捨議帝從之天監九年詔簠簋之實以籍田黑黍梁書武帝本紀天監十二年夏四月京邑大水六月癸巳新作太廟增基九尺隋書禮儀志天監十二年詔曰祭祀用洗匜中水盥仍又滌爵爵以禮神宜窮精潔而一器之內雜用洗手外可詳議於是御及三公應盥及洗爵各用一匜蕙田案以上梁陳書髙祖本紀永定元年十月乙亥即皇帝位辛已追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后戊子遷景皇帝神主祔于太廟隋書禮儀志陳制立七廟初文帝入嗣而皇考始興昭烈王廟在始興國謂之東廟天嘉四年徙東廟神主祔於梁之小廟改曰國廟祭用天子儀蕙田案以上陳右宋齊梁陳廟制北魏書太祖本紀道武帝天興二年冬十月太廟成遷神元平文昭成獻明皇帝神主於太廟禮志魏先之居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔逺真君中烏洛侯國遣使朝獻云石廟如故民常祈請有神驗焉其嵗遣中書侍郎李敞詣石室告祭天地以皇祖先妣配祝曰天子燾謹遣敞等用駿足一元大武敢昭告於皇天之靈自啓闢之初祐我皇祖於彼土田歷載億年聿來南遷惟祖惟父光宅中原克翦凶醜拓定四邊沖人纂業德聲弗彰豈謂幽遐稽首來王具知舊廟弗毁弗亡悠悠之懷希仰餘光王業之興起自皇祖綿綿瓜瓞時惟多祐敢以丕功配饗於天子子孫孫福祿永延敞等既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神奉之咸謂魏國感靈祗之應也石室南距代京四千餘里永興四年立太祖廟於白登山嵗一祭具太牢帝親之無常月是嵗詔郡國於太祖巡幸行宫之所各立壇祭以太牢嵗一祭皆牧守侍祀又立太祖别廟於宫中嵗四祭用牛馬羊各一蕙田案此與漢郡國廟同意太宗本紀永興五年秋七月己巳還幸薄山帝登觀太祖遊幸刻石頌德之處乃於其旁起石壇而薦饗焉賜從者大酺於山下神瑞二年二月甲辰立太祖廟於白登之西禮志神瑞二年於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊及親行貙劉之禮又於雲中盛樂金陵三所各立太廟四時祀官侍祀髙宗本紀太安元年春正月辛酉奉世祖恭宗神主於太廟三月己亥詔曰今始奉世祖恭宗神主於太廟又於西苑遍秩羣神朕以大慶饗賜百寮而犯罪之人獨即刑戮非所以子育羣生矜及衆庶夫聖人之教自近及逺是以周文刑于寡妻至于兄弟以御家邦化苟從近恩亦宜然其曲赦京師死囚已下髙祖本紀太和十五年夏四月己卯改太廟秋七月己卯詔議祖宗道武為太祖十月太廟成十有一月丁卯遷七廟神主於新廟禮志太和十五年夏四月改營太廟詔曰祖有功宗有德自非功德厚者不得擅祖宗之名居二祧之廟仰惟先朝舊事舛駁不同難以取凖今將述遵先志具詳禮典宜制祖宗之號定將來之法烈祖有創基之功世祖有開拓之德宜為祖宗百世不遷而逺祖平文功未多於昭成然廟號為太祖道武建業之勳髙於平文廟號為烈祖比功校德以為未允朕今奉尊道武為太祖與顯祖為二祧餘者以次而遷平文既遷廟唯有六始今七廟一則無主唯當朕躬此事亦臣子所難言夫生必有終人之常理朕以不德沗承洪緒若宗廟之靈獲全首領以沒於地為昭穆之次心願畢矣必不可預設可垂之文示後必令遷之司空公長樂王穆亮等奏言升平之會事在於今推功考德實如明旨但七廟之祀備行日久無宜闕一虛有所待臣等愚謂依先尊祀可垂文示後理衷如此不敢不言詔曰理或如此比有間隙當為文相示丁卯遷廟陳列冕服帝躬省之既而帝衮冕辭太和廟之太廟百官陪從奉神主於齋車至新廟有司升神主於太廟孫惠蔚傳先是七廟以平文為太祖髙祖議定祖宗以道武為太祖祖宗雖定然昭穆未改及髙祖崩祔神主於廟時侍中崔光兼太常卿以太祖既改昭穆以次而易兼御史中尉黃門侍郎邢巒以為太祖雖改昭穆仍不應易乃立彈草欲案奏光光謂惠蔚曰此乃禮也而執法欲見彈劾思獲助于碩學惠蔚曰此深得禮變尋為書以與光讚明其事光以惠蔚書呈宰輔乃召惠蔚與巒庭議得失尚書令王肅又助巒而巒理終屈彈事遂寢肅宗本紀熙平二年七月己巳車駕有事於太廟禮志熙平二年七月戊辰侍中領軍將軍江陽王繼表言臣功緦之內太祖道武皇帝之後於臣始是曽孫然道武皇帝傳業無窮四祖三宗功德最重配天郊祀百世不遷而曽玄之孫蒸嘗之薦不預拜於廟庭霜露之感闕陪奠於階席今七廟之後非直隔歸胙之靈五服之孫亦霑出身之敘校之墳史則不然驗之人情則未允何者禮云祖遷於上宗易於下臣曽祖是帝世數未遷便踈同庶族而孫不預祭斯之為屈今古罕有昔堯敦九族周隆本枝故能磐石維城禦侮於外今臣之所親生見隔棄豈所以楨幹根本隆建公族者也伏見髙祖孝文皇帝著令銓衡取曽祖之服以為資蔭至今行之相傳不絶而况曾祖為帝而不見録伏願天鑒有以昭臨令皇恩洽穆宗人咸敘請付外博議永為定凖靈太后令曰付八座集禮官議定以聞四門小學博士王僧奇等議案孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝然則太祖不遷者尊王業之初基二祧不毁者旌不朽之洪烈其旁枝逺胄豈得同四廟之親哉故禮記婚義曰古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室又文王世子曰五廟之孫祖廟未毁雖庶人冠娶必告死必赴不忘親也親未絶而列於庶人賤無能也鄭注云赴告於君也實四廟言五者容顯考為始封君子故也鄭君别其四廟理協二祭而四廟者在當世服屬之內可以與於子孫之位若廟毁服盡豈得同於此例乎敢竭愚昧請以四廟為斷國子博士李琰之議案祭統曰有事太廟羣昭羣穆咸在鄭氏注昭穆咸在謂同宗父子皆來古禮之制如是其廣而當今儀注唯限親廟四愚竊疑矣何以明之設使世祖之子男於今存者既身是戚蕃號為重子可得賔於門外不預碑鼎之事哉又因宜變法禮有其説記言五廟之孫祖廟未毁為庶人冠娶必告死必赴注曰實四廟而言五者容顯考始封之君子今因太祖之廟在仍通其曽玄侍祠與彼古記甚相符會且國家議親之律指取天子之玄孫乃不旁凖於時后至於助祭必謂與世主相論將難均一壽有短長世有延促終當何時可得齊同謂宜入廟之制率從議親之條祖祧之裔各聽盡其玄孫使得駿奔堂壇肅承禘礿則情理差通不宜復各為例令事事舛駮侍中司空公領尚書令任城王澄侍中尚書左僕射元暉奏臣等參量琰之等議雖為始封君子又祭統曰有事於太廟羣昭羣穆咸在而不失其倫鄭注云昭穆謂同宗父子皆來也言未毁及同宗則其共四廟之辭云未絶於父子明崇五屬之稱天子諸侯繼立無殊吉凶之赴同止四廟祖祧雖存親級彌逺告赴拜薦典記無文斯由祖遷於上見仁親之義踈宗易於下著五服之恩斷江陽之於今帝也計親而枝宗三易數世則廟應四遷吉凶尚不告聞拜薦寧容輒預髙祖孝文皇帝聖德玄覽師古立政陪拜止於四廟哀恤斷自緦宗即之人情冥然符一推之禮典事在難違此所謂明王相沿今古不革者也太常少卿元端議禮記祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧而祖考以功重不遷二祧以盛德不毁迭遷之義其在四廟也祭統云祭有十倫之義六曰見親踈之殺焉夫祭有昭穆者所以别父子逺近長幼親踈之序而無亂也是故有倫注云昭穆咸在同宗父子皆來指謂當廟父子為羣不繫於昭穆也若一公十子便為羣公子豈待數公而立稱乎文王世子云五廟之孫祖廟未毁雖為有所援引然與朝議不同如依其議匪直太祖曾玄諸廟子孫悉應預列既無正據竊謂太廣臣等愚見請同僧奇等議靈太后令曰議親律注云非唯當世之屬籍歷謂先帝之五世此乃明親親之義篤骨肉之恩重尚書以逺及諸孫太廣致疑百僚助祭何得言狹也祖廟未毁曾玄不預壇堂之敬便是宗人之昵反外於附庸王族之近更踈於羣辟先朝舊儀草創未定刋制律憲垂之不朽琰之援據甚允情理可依所執蕙田案三議以琰之為得情理與宗廟敘昭穆之禮合靈太后從之是也孝莊帝本紀永安二年二月甲午尊皇考為文穆皇帝廟號肅祖皇妣為文穆皇后四月癸未遷肅祖文穆皇帝及文穆皇后神主於太廟臨淮王談傳昌子彧字文若少有才學莊帝踐祚纍除位尚書令大司馬兼録尚書莊帝追崇武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以髙祖為伯考或表諫曰漢祖創業香街有太上之廟光武中興南頓立舂陵之寢元帝之于光武疏為絶服猶尚身奉子道入繼大宗髙祖之于聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金德將興宣王受寄自兹而降世秉威權景王意存毁冕文王心規裂冠雖祭則魏王而權歸晉室昆之與季實傾曹氏且子元宣王冢嗣文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經髙祖德溢寰中道超無外肅祖雖勳格宇宙猶曽奉贄稱臣穆皇后稟德坤元復將配享乾位此乃君臣並筵嫂叔同室歷觀墳籍未有其事時莊帝意鋭朝臣無敢言者唯彧與吏部尚書李坤俊並有表聞詔報曰文穆皇帝勳格四表道邁百王是用考循舊規恭上尊號王表云漢太上於香街南頓於舂陵漢髙不因瓜瓞之緒光武又無世及之德皆身受符命不由父祖别廟異寢於理何差文穆皇帝天眷人宅歷數有歸朕沗承下武遂主神器既帝業有統漢氏非倫若以昔况今不當移寢則魏太祖晉景帝雖王迹已顯皆以人臣而終豈得與餘帝别廟有闕餘序漢郡國立廟者欲尊髙祖之德使饗遍天下非關太廟神主獨在外祠薦漢宣之父亦非勳德所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必準古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同明有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毁莊帝既逼諸妹之請此辭意黃門侍郎常景中書侍郎邢子才所贊成也又追尊兄彭城王為孝宣皇帝彧又面諫曰陛下中興意欲憲章前古作而不法後世何觀歷尋書籍未有其事願割友于之情使名器無爽帝不從及神主入廟復敕百官悉陪從一依乘輿之式彧上表以為爰自中古迄於下葉崇尚君親褒明功懿乃有皇號終無帝名今若去帝直留皇名求之古義少有依凖又不納蕙田案彧之言甚正惜莊帝不納也又案以上北魏北齊書文宣帝本紀天保元年詔追尊皇祖文穆王為文穆皇帝妣為文穆皇后皇考獻武王為獻武皇帝兄文襄王為文襄皇帝祖宗之稱付外速議以聞甲戌遷神主於太廟隋書禮儀志後齊文襄嗣位猶為魏臣置王髙祖泰州使君王曾祖太尉武貞公王祖太師文穆公王考相國獻武王凡四廟文宣帝受禪置六廟曰皇祖司空公廟皇祖吏部尚書廟皇祖泰州使君廟皇祖文穆皇帝廟太祖獻武皇帝廟世宗文襄皇帝廟為六廟獻武已下不毁已上則遞毁並同廟而别室既而遷神主於太廟北齊書文宣帝本紀天保二年冬十月丁卯文襄皇帝神主入於廟隋書禮儀志文襄文宣並太祖之子文宣初疑其昭穆之次欲别立廟衆議不同至二年秋始祔太廟北齊書孝昭帝本紀皇建元年九月壬申詔議定三祖樂冬十一月癸丑有司奏太祖獻武皇帝廟宜奏武德之樂舞昭烈之舞世宗文襄皇帝廟宜奏文德之樂舞宣政之舞顯祖文宣皇帝廟宜奏文正之樂舞光大之舞詔曰可蕙田案以上北齊北周書孝閔帝本紀元年正月辛丑即天王位追尊皇考文公為文王皇妣為文后壬寅詔曰始祖獻侯啓土遼海肇有國基配南北郊文考德符五運受天明命祀於明堂以配上帝廟為太祖隋書禮儀志後周之制思復古之道乃左宗廟而右社稷置太祖之廟并髙祖已下二昭二穆凡五親盡則遷其有德者謂之祧廟亦不毁閔帝受禪追尊皇祖為德皇帝文王為文皇帝廟號太祖擬已上三祖遞遷至太祖不毁其下相承置二昭二穆為五焉蕙田案以上北周右北魏北齊北周廟制隋書髙祖本紀開皇元年二月甲子即皇帝位乙丑追尊皇考為武元皇帝廟號太祖皇妣為元明皇后丙寅修廟社禮儀志髙帝既受命遣兼太保宇文善兼太尉李詢奉䇿詣同州告皇考桓王廟兼用女巫同家人之禮上皇考桓王尊號為武元皇帝皇妣尊號為元明皇后奉迎神主歸於京師犧牲尚赤祭用日出是時帝崇建社廟改周制左宗廟而右社稷宗廟未言始祖又無受命之祧自髙祖以下置四親廟同殿異室而已一曰皇髙祖太原府君廟二曰皇曾祖康王廟三曰皇祖獻王廟四曰皇考太祖武元皇帝廟擬祖遷於上而太祖之廟不毁大業元年煬帝欲遵周法營立七廟詔有司詳定其禮禮部侍郎攝太常少卿許善心與博士禇亮等議曰謹案禮記天子七廟三昭三穆與太祖之廟而七鄭玄注曰此周制也七者太祖及文王武王之祧與親廟四也殷則六廟契及湯與二昭二穆也夏則五廟無太祖禹與二昭二穆而已玄又據王者禘其祖之所自出而立四廟案鄭玄義天子唯立四親廟並始祖而為五周以文武為受命之祖特立二祧是為七廟王肅注禮記尊者尊統上卑者尊統下故天子七廟諸侯五廟其有殊功異德非太祖而不毁不在七廟之數案王肅以為天子七廟是通百代之言又據王制之文天子七廟諸侯五廟大夫三廟降二為差是則天子立四親廟又立髙祖之父髙祖之祖並太祖而為七周有文武薑嫄合為十廟漢諸帝之廟各立無迭毁之義至元帝時貢禹匡衡之徒始建其禮以髙帝為太祖而立四親廟是為五廟唯劉歆以為天子七廟諸侯五廟降殺以兩之義七者其正法可常數也宗不在數內有功德則宗之不可預為設數也是以班固稱考論諸儒之議劉歆博而篤矣光武即位建髙廟於雒陽乃立南頓君以上四廟就祖宗而為七至魏初髙堂隆為鄭學議立親廟四太祖武帝猶在四親之內乃虛置太祖及二祧以待後代至景初間乃依王肅更立五世六世祖就四親而為六廟晉武受禪博議宗祀自文帝以上六世祖征西府君而宣帝亦序於昭穆未升太祖故祭止六也江左中興賀循知禮至於寢廟之儀皆依魏晉舊事宋武帝初受晉命為王依諸侯立親廟四即位之後增祠五世祖相國掾府君六世祖右北平府君止於六廟逮身沒主升從昭穆猶太祖之位也降及齊梁守而弗革加崇迭毁禮無違舊臣等又案姬周自太祖以下皆别立廟至於禘祫俱合食於太祖是以炎漢之初諸廟各立嵗時嘗享亦隨處而祭所用廟樂皆象功德而歌舞焉至光武乃總立一堂而羣主異室斯則新承冦亂欲從約省自此以來因循不變伏惟髙祖文皇帝睿哲元覽神武應期受命開基垂統聖嗣當文明之運定祖宗之禮且損益不同沿襲異趣時王所制可以垂法自歷代以來雜用王鄭二義若尋其指歸校以優劣康成止論周代非謂經通子雍總貫皇王事兼長逺今諸依據古典崇建七廟受命之祖宜别立廟祧百代之後為不毁之法至於鑾駕親奉申孝享於髙廟有司行事竭誠敬於羣主俾夫規模可則嚴祀易遵表有功而彰明德大復古而貴能變臣又案周人立廟亦無處置之文據冡人處職而言之先王居中以昭穆為左右阮忱撰禮圖亦從此議漢京諸廟既逺又不序禘祫今若依周制理有未安雜用漢儀事難全採謹詳立别圖附之議末其圖太祖髙祖各一殿準周文武二祧與始祖而三餘並分室而祭始祖及二祧之外從迭毁之法詔可未及創制既營建洛邑帝無心京師乃於東都固本里北起天經宫以遊髙祖衣冠四時致祭於三年有司奏請準前議於東京建立宗廟帝謂祕書監栁辨曰今始祖及二祧已具今後子孫處朕何所又下詔唯議别立髙祖之廟屬有行役遂復停寢蕙田案自漢以後唯此議為合禮唐書禇亮傳亮入隋為東宫學士遷太常博士煬帝議改宗廟之制亮請依古七廟而太祖髙祖各一殿法周文武二祧與世祖而三餘則分室而祭始祖二祧不從迭毁隋書煬帝本紀大業三年六月丁亥詔曰聿追孝享德莫至焉崇建寢廟禮之大者然而質文異代損益殊時學滅坑焚經典散逸憲章湮墜廟堂制度師説不同所以世數多少莫能是正連室異宫亦無凖定朕獲奉祖宗欽承景業永惟嚴配思隆大典於是詢謀在位博訪儒術咸以為髙祖文皇帝受天明命奄有區夏拯羣飛於四海革凋敝於百王恤獄緩刑生靈皆遂其性輕徭薄賦比屋各安其業恢夷宇宙混一車書東漸西被無思不服南征北怨俱荷來蘇駕毳乘風歷代所弗至辮髮左袵聲教所罕及莫不厥角關塞頓顙闕庭譯靡絶時書無虛月韜戈偃武天下晏如嘉瑞休徵表裏禔福猗歟偉歟無得而名者也朕又聞之德厚者流光治辨者禮縟是以周之文武漢之髙光其典章特立諡號斯重豈非緣情稱述即崇顯之義乎髙祖文皇帝宜别建廟宇以彰巍巍之德仍遵月祭用表蒸嘗之懷有司以時創造務合典制又名位既殊禮亦異等天子七廟事著前經諸侯二昭義有差降故其以多為貴王者之禮今可依用貽厥後昆右隋廟制五禮通考卷七十九
