body:
  text: 五禮通考卷三十九刑部尚書秦蕙田撰吉禮三十九方丘祭地宋史禮志北郊宋初方丘在宫城之北十四里以夏至祭皇地祇别為壇於北郊以孟冬祭神州地祗建隆以來迭奉四祖崇配二壇文獻通考宋制夏至祭皇地祗孟冬祭神州地祗遂為大祀南郊親祠昊天上帝則併設皇地祗之位南郊四祭冬至圜丘祀正月上辛祈榖孟夏雩季秋大享及感生帝皇地祗神州地祗凡七祭並以四祖迭配太祖親郊者並以宣祖配太宗即位其七祭但以宣祖太祖更配方丘在宫城北十四里常以夏至祭皇地祗别為壇於北郊以孟冬祭神州地祗真宗景德三年四月太常寺言神州壇壝中有坑塹及車馬之迹又兩壝步數迫隘不合禮文望令改擇壇位及依令式封標諸壇外壝禁人耕墾樵牧奏可即徙壇於方丘之西焉四年正月以朝陵遣工部尚書王化基詣汾陰后土祠致祭用太祠禮汾陰后土漢武帝元鼎中所立脽上祠宣帝元帝成帝後漢光武唐玄宗皆親祭是後曠其禮開寶九年徙廟稍南是年始遣使致祭其後又詔自今凡告天地仍詣祠告祭命禮官考定衣冠制度令有司調製遣奉上宋史樂志景德祀皇地祗三首降神靜安至載厚德陟配天長沉潛剛克廣大無疆資生萬物神化含章同和八變神靈效祥奠玉幣酌獻嘉安於昭祀典政享坤儀備物咸秩柔祗格思功宣敏樹日益鴻禧持載品彚率土攸宜送神靜安妙用無方倐來忽逝蠲潔寅恭式終禋瘞宋史真宗本紀大中祥符三年六月庚戌河中府父老千餘人請祀后土不許七月辛丑文武官將校等三上表請祀汾陰后土八月丁未朔詔明年春有事於汾陰州府長吏勿以修貢助祭煩民戊申陳堯叟為祀汾陰經度制置使己酉王旦為祀汾陰大禮使王欽若為禮儀使庚戌詔汾陰路禁弋獵不得侵占民田如東封之制文獻通考有司定制玊册金玉匱度廟庭擇地為塪中置石匱匱方五尺厚二尺中容玊匱刻金繩道三闊一寸深五分繫繩處刻深四寸方三寸五分容天下同文寶俟祀畢太尉奉玉匱置其中將作監領徒舉石覆之石厚一尺繫繩填泥印寶悉如社首封䃭之制皇帝省視訖加蓋其上封固為小壇廣厚五尺從之九月經度制置使詣脽上築壇如方丘之制廟北古雙柏旁有堆阜即就其地焉十月禮儀使王欽若言凖儀注祀畢太尉封玉册於廟庭石匱百官班於庭中皇帝謁廟禮畢至石匱南北向省視大中祥符四年春正月辛巳詔執事汾陰懈怠者罪勿原乙酉習祀后土儀丁亥將祀汾陰謁啓聖院太宗神御殿普安院元德皇后聖容二月辛酉祀后土地祗是夜月重輪還奉祗宫紫氣四塞文獻通考四年正月丁酉備鑾駕出京師二月丙辰至奉祗宫戊午致齋召近臣登延慶亭南望仙掌北瞰龍門自宫至脽丘列植嘉樹六師環宿行闕旌旗帟幕照耀郊次眺覽久之己未遣入內都知鄧永遷詣祠上衣服供具庚申羣臣宿祠所辛酉其法駕詣脽壇夾路設燎火其光如晝盤道紆曲周以黃麾仗至壇次服衮冕登壇祀后土地祗備三獻奉天書於神座之左以太祖太宗並配悉如封禪之禮先是脽上多風及行禮頓止黃氣繞壇月重輪衆星不見唯太角光明少頃改服通天冠絳紗袍乘輦詣廟設登歌奠獻省封石匱遣官分奠諸神登鄈丘亭望河汾還行宫鼓吹振作紫氣四塞觀者溢路民有扶老擕幼不逺千里而至者壬戌御朝覲壇肆赦是行塗中屢有甘澍之應皆夕降晨霽從官衛兵無霑服之患又農事方興耕民歡欣相屬三月駐驆西京四年詔脽上后土廟宜上額為太寧正殿文獻通考慶歷時夏至祭皇地祗用犢羊豕各一白其後禮官馮浩言皇地祗壇角再成面廣四丈九尺東西四丈六尺上等髙四尺五寸下等髙五尺方五丈三尺陛廣三尺五寸大抵卑陋不應禮典禮院請如唐郊祀録增廣因詳制度之未合禮者五年諸壇皆改嘉祐配位七十一加羊豕各五諌官司馬光奏告大行諡號於圜丘而皇地祗止於望告下同腏食失尊卑之序下禮院定非次祭告皇地祗請差官就壇行事景祐二年詔有司孟冬祭神州地祗遣內臣降香春秋朝陵諸祠祈解亦然宋史樂志景祐夏至祀皇地祗二首太祖奠幣恭安赫矣淳耀俶載帝基一戎以定萬國來儀寅恭潔祀博厚皇祗威靈攸在福祿如茨酌獻英安丕命惟皇萬物咸覩卜年邁周崇功冠禹有煜炎精大昌聖祚酌鬯祈年永錫繁祜文獻通考慶歷用羊豕各五正配山罍簠簋二皇祐定壇髙三尺廣四十八步四出陛宋史樂志熙寧祀皇地祗十二首迎神導安昭靈積厚混混坤輿配天作極陰慘陽舒齊明薦享百福其儲庶其來止風馬雲車升降靖安有來穆穆臨此方丘其行風動其止霆收躬事匪懈豐盛潔羞百昌咸殖允矣神休奠幣釐安純誠昭融芳美嘉薦肅將二精以享以奠休光四充靈祗來燕其祥伊何永世錫羡太祖肇安於皇烈祖維帝所興光輝宗祀如日之升告靈作配孝享蒸蒸錫兹祉福百世其承司徒奉俎承安我修祀事于何致誠罔敢怠佚視兹碩牲納烹薦俎侑以和聲格哉休應世濟皇明酌獻和安猗嗟富媪博厚含𢎞發榮敷秀動植兹豐爰酌兹酒肸蠁交通衆祥萃止垂祜無窮太祖侑安光大含𢎞坤元之力海宇咸寧列祖之德作配方壇不僭不忒子孫其承母替厥則飲福禔安載登壇阼載酌尊彜牲酒嘉止福祿純熙其福惟何萬物咸宜其祿惟何永承神禧送文舞迎武舞威安雍雍肅肅建我采旄舞以玉戚不吳不敖其將其肆脾臄嘉肴何以侑樂鐘鼓管簫亞終獻儀安折俎在籩胾羮在豆何以酌之酒醴是侑何以錫之貽爾眉夀何以格之永爾康阜徹豆豐安曵我黼黻履舄接武鏘我珩璜降升圉圉其將徹兮既曰不侮其終徹兮恭飲惟主送神阜安神兮來下享此苾芬酌獻雍雍執事孔勤神之還矣忽乘飛雲遺我祺祥物象欣欣常祀皇地祗五首迎神寧安八變坤元之德光大無疆一氣交感百物阜昌吉蠲致享精明是將介兹景福鼎祚靈長升降正安禮經之重祭典為宗上公攝事登降彌恭庶品豐潔令儀肅雍百祥萃止惟吉之從奉俎豐安禮崇禋祀神鑒孔明牲牷博腯以炮以烹馨香蠲潔品物惟精錫之純嘏享兹至誠退文舞迎武舞威安進旅退旅載揚干揚不愆于儀容服有章式綏式侑神保是聽鼓之舞之神永安寧送神迎安物備百嘉樂周八變克誠是享明德斯薦神鑒孔昭蕃禧錫羡回馭飄然邈不可見宋史禮志神宗元豐元年二月郊廟奉祀禮文所言古者祀天於地上之圜丘在國之南祭地於澤中之方丘在國之北其牲幣禮樂亦皆不同所以順陰陽因髙下而事之以其類也由漢以來乃有夫婦共牢合祭天地之説殆非所謂求神以類之意本朝親祀上帝即設皇地示位稽之典禮有所未合遂詔定更改以聞於是陳襄王存李清臣張璪黃履陸佃何洵直楊完等議或以當郊之嵗冬夏至日分祭南北郊各一日而祀遍或以圜丘之旁别營方丘而望祭或以夏至盛暑天子不可親祭改用十月或欲親郊圜丘之嵗夏至日遣上公攝事於方丘議久未決三年翰林學士張璪言先王順陰陽之義以冬至祀天夏至祀地此萬世不可易之理議者乃欲改用他月無所據依必不得已宜即郊祀之嵗於夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶先王之遺意猶存焉於是禮官請如璪議設宫架樂文武二舞改製樂章用竹册匏爵增配帝犢及捧俎分獻官廣壇壝齊宫修定儀注上之既而曽肇言今冬至若罷合祭而夏至又以有司攝事則不復有親祭地示之時於父天母地之義若有隆殺請遇親祀南郊之嵗以夏至日備禮躬欵北郊以存事地之義曽鞏傳弟肇字子開同知太常禮院太常自秦以來禮文殘闕先儒各有臆説無所稽據肇在職多所釐正親祀皇地祗於北郊蓋自肇發之異端莫能奪其議四年四月乃詔親祀北郊並以南郊之儀有故不行即以上公攝事六年禮部太常寺上親祀儀並如南郊其攝事唯改舞名及不備官其籩豆樂架玉幣之數盡如親祠是嵗十一月甲辰冬至祀昊天上帝以太祖配始罷合祭不設皇地示位黃履傳改崇政殿説書兼知諌院神宗嘗詢天地合祭是非對曰國朝之制冬至祭天圜丘夏至祭地方澤每嵗行之皆合於古猶以有司攝事未足以盡於是三嵗一郊而親行之所謂因時制宜者也雖施之方今為不可易惟合祭之非在所當正然今日禮文之失非獨此也願勑有司正羣祠為一代損益之制詔置局詳定命履董之北郊之議遂定哲宗初立未遑親祠有司攝事如元豐儀元祐五年夏至祭皇地示命尚書右丞許將攝事將言王者父天母地三嵗冬至天子親祠遍享宗廟祀天圜丘而夏至方澤之祭乃止遣上公則皇地示遂永不在親祀之典此大缺禮也望博詔儒臣講求典故明正祀典為萬世法禮部尚書趙彥若請依元豐所定郊祀之嵗親祀方丘及攝事已合禮之正更不須聚議禮部郎中崔公度請用陳薦議仍合祭天地從祀百神復詔尚書侍郎兩省及侍從臺諌禮官集議於是翰林學士顧臨等八人請合祭如故事俟將來親祠北郊則合祭可罷宋興一祖六宗皆合祭天地其不合祭者唯元豐六年一郊耳去所易而就所難虛地示之大祭失今不定後必悔之吏部侍郎范純禮等二十二人皆主北郊之議中書舍人孔武仲又請以孟冬純陰之月詣北郊親祠如神州地示之祭彭汝礪曽肇復上疏論合祭之非文多不載九月三省上顧臨等議太皇太后曰宜依仁宗皇帝故事吕大防言諸儒獻議欲南郊不設皇地示位於祖宗之制未覩其可范百祿以圜丘無祭地之禮記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改大防又言先帝因禮文所建議遂令諸儒定北郊祀地之禮然未經親行今皇帝臨御之始當親見天地而獨不設地示位恐亦未安况祖宗以恩霈四方慶賚將士非三嵗一行則國力有限今日宜為勉行權制俟北郊議定及太廟享禮行之未晚太皇太后以大防之言為是而蘇頌鄭雍皆以古者人君嗣位之初必郊見天地今皇帝初郊而不祀地恐未合古乃下詔曰國家郊廟特祀祖宗以來命官攝事唯三嵗一親郊則先享清廟冬至合祭天地於圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祀北郊之儀未之及行是嵗郊祀不設皇地示位而宗廟之享率如權制朕方修郊見天地之始其冬至日南郊宜依熙寧十年故事設皇地示位以嚴並况之儀厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢集官詳議典禮以聞十一月冬至親祠南郊遂合祭天地而詔罷飲福宴七年帝初郊合祭地祗于圜丘八年禮部尚書蘇軾復陳合祭六議令禮官集議以聞已而下詔依元祐七年故事合祭天地于南郊仍罷集議文獻通考紹聖元年以右正言張商英言先帝制詳定禮文所謂合祭非古據經而正之元祐之臣乃復行合祭請再下禮官議御史中丞黃履謂南郊合祭因王莽諂事元后遂躋地位同席共牢逮先帝親郊大臣以宣仁同政復用莽意合祀瀆亂典禮帝以詢輔臣章惇曰北郊嵗謂之社黃履曰郊者交於神明之義所以天地皆稱郊社者土之神耳豈有祭大祗亦可謂之社乎乃以履奏送禮部太常寺權禮部侍郎盛陶太常丞王誼等言宜用先帝北郊儀注以時躬行罷合祭禮三省言合祭既非禮典但盛夏祭地必難親行詔令兩省臺諌禮官同議可以親祀北郊然後可罷合祭之禮曽布言天地宗廟四時皆有祭未聞盛夏可以廢祭祀也若謂議可以親祀北郊然後可議罷合祭則先帝罷合祭為不當矣四月翰林學士錢協刑部侍郎范純禮議先帝親祀之詔所宜遵守但當斟酌時宜省去繁文末節以行親祠之禮若謂盛夏難於出郊則姑從權變禮以循祖宗故事吏部侍郎韓宗師兵部侍郎王古殿中侍御史井亮采監察御史常安民又以南郊合祭當循祖宗舊制權户部侍郎李琮以乘輿出郊暑雨不常合祭權宜亦難輕罷太常博士傅楫以事天地不可以暑暍廢大禮給事中虞䇿權給事中劉定中書舍人盛陶太常少卿黃裳請用十月親祭皇地祗於北郊吏部侍郎豐稷請於夏至前三日皇帝致齋於文德殿遺官奏告太廟至日五鼓詣北郊齋殿質明行事禮畢還宫不甚炎溽若遇陰雨大慶殿可陳望祭之禮起居舍人葉祖洽謂北郊之禮主於事地而太廟景靈宫自可差官攝事皇帝致齋於文德殿前事一日夙興至郊外齋宫次日五鼓行事質明禮畢還內則是乘輿宿外不過一日無憚暑之虞於理為可户部尚書蔡京禮部尚書林希翰林學士蔡卞御史中丞黃履工部侍郎吳安持祕書少監朝端彥侍御史翟思殿中侍御史郭知章正言劉拯監察御史黃慶基董敦逸等請罷合祭天地自後間因大禮嵗以夏至之日親祀北郊其親祠北郊之嵗更不親祀南郊明年乃詔罷合祭自今間因大禮之嵗以夏至之日躬祭地祗於北郊應緣祀事儀物及壇壝道路帷宫等宜令有司參酌詳具以聞蓋用蔡京等議然北郊親祀終帝世未克舉云權禮部侍郎黃裳等言南郊用大駕鹵簿儀仗二萬六十一人明堂祫享用法駕計一萬八千八十八人今親祠北郊備物則當用大駕如以盛暑之月稍減煩文即依明堂禮用法駕鹵簿詔依南郊用大駕鹵簿又言南郊朝祭服皆以羅綾為之今北郊盛暑之月難用祫服謹案月令孟夏初衣暑服孟冬始裘欲依衮冕制度改用單衣從之宋史哲宗本紀紹聖三年春正月戊午詔罷合祭間因大禮之嵗夏至日躬祭地祗於北郊六月乙酉立北郊齋宫於瑞聖園元符元年春正月甲戌幸瑞聖園觀北郊齋宫文獻通考元符元年帝幸瑞聖園觀新城北郊齋宫故事郊宫悉設以幕帟其費不資上命繕營不日而成曰三嵗一郊次舍之費縑帛三十餘萬工又倍之易以屋室一勞永逸所省多矣徽宗崇寧元年禮部尚書黃裳言南郊壇十二龕壝中布列從享星位具載其名凡三百三十有八至於北郊苐以嶽鎮海瀆山林川澤丘陵墳衍原隰之目别以四方置於成壝而不列其名雖從享於大祗莫非山澤而何者來格今兹講行北郊大禮尚未論著是為闕典乞令太常寺丞陳暘考其名位取其可以從祀者詳具以聞列於成壝從之二年禮部員外郎陳暘奏臣聞天一與地六合而生水於北其神玄冥地二與天七合而生火於南其神祝融天三與地八合而生木於東其神勾芒地四與天九合而生金於西其神蓐收天五與地十合而生土於中其神后土蓋地乘陰氣播五行於四時常有帝以為之主必有神以為之佐也五行之帝既從享於南郊第一成則五行之神亦當列於北郊第一成矣上辛大雩帝及五時迎氣並以五人神配而不設五行之神是取小而遺大也神宗皇帝嘗詔地祗之祭以五行之神從享以五人神配然尚立嶽鎮海瀆之間臣今欲升之第一成又云地示之祭先儒之説有二或繫於神州皆有所經見唯爾雅曰西北之美者有崑崙之球琳琅玕焉河圖括象曰崑崙東南萬五千里曰神州是崑崙不過域於西北神州不過域於東南也神宗皇帝嘗詔禮官討論北郊祀典位崑崙於方丘第一成之西北位神州於第一成之東南而其上設地祗位焉崑崙神州之説雖出不經然古人有其舉之莫敢廢也特降於從享之列耳欲望明推神考詔旨列崑崙神州於從享之位又言三代而上山川之神有望秩之祭故五嶽之秩視三公四瀆之秩視諸侯五嶽不視侯而視公猶未極乎推崇之禮聖朝始帝五嶽而王四瀆切唯天莫尊於上帝而五方帝次之地莫尊於大示而五嶽帝次之神宗皇帝親祠上帝於南郊而五方帝列於第一成然則五嶽帝其可尚與四鎮海瀆而並列乎今欲升之於第一成並從之蕙田案五行之帝即五行之神陳暘二之非是崑崙神州既知其不經而又曰有其舉之莫敢廢也亦依違之見帝五嶽而王四瀆尤非是宋書禮志政和三年詔禮制局議方壇制度是嵗新壇成初元豐三年七月詔改北郊圓壇為方丘六年命禮部太常定北郊壇制哲宗紹聖三年權尚書侍郎黃裳等言南郊青城至壇所五百一十八步自瑞聖園至皇地祗壇之東壇五百五十六步相去不逺其壇係國初所建神靈顧享已久元豐間有司請地祗神州並為方壇壇之外為坎詔止改圓壇為方請下有司比類南郊增飾制度除治四面稍令低下以應澤中之制詔禮部再為詳定指畫興築至是禮制局言方壇舊制三成第一成髙三尺第二成第三成皆髙二尺五寸上廣八丈下廣十有六丈夫圎壇既則象於乾則方壇當效法於坤今議方壇定為再成一成廣三十六丈再成廣二十四丈每成崇十有八尺積三十六尺其廣與崇皆得六六之數以坤用六故也為四陛陛為級一百四十有四所謂坤之䇿百四十有四者也為再壝壝二十有四步取坤之䇿二十有四也成與壝俱再則兩地之義也齋宫大內門曰廣禋東偏門曰東秩西偏門曰西平正東門曰含光正西門曰咸亨正北門曰至順南內大殿門曰厚德東曰左景華西曰右景華正殿曰厚德便殿曰受福曰坤珍曰道光亭曰承休後又增四角樓為定式其神位崇寧初禮部員外郎陳暘言五行於四時有帝以為之主必有神以為之佐今五行之帝既從享於南郊第一成則五行之神亦當列於北郊第一成天莫尊於上帝而五帝次之地莫尊於大祗而嶽帝次之今尚與四鎮海瀆並列請升之於第一成至是議禮局上新儀皇地祗位於壇上北方南向席以稿秸太祖皇帝位於壇上東方西向席以蒲越木神勾芒東嶽於壇第一龕東鎮海瀆於第二龕東山林川澤於壇下東丘陵墳衍原隰於內壝之內皆在卯階之北以南為上神州地祗火神祝融南嶽於壇第一龕南鎮海瀆於第二龕南山林川澤於壇下南丘陵墳衍原隰於內壝之內皆在午階之東以西為上土神后土中嶽於壇第一龕中鎮於第二龕中山林川澤於壇下中丘陵墳衍原隰於內壝之內皆在午階之西以西為上金神蓐收西嶽於壇第一龕西鎮海瀆於第二龕崑崙西山林川澤於壇下西丘陵墳衍原隰於內壝之內皆在酉階之南以北為上水神玄冥北嶽於壇第一龕北鎮海瀆於第二龕北山林川澤於壇下北丘陵墳衍原隰於內壝之內皆在子階之西以東為上神州地祗席以稿秸餘以莞席皆內向其餘並如元豐儀壇壝之制其位版之制皇地祗位板長二尺取兩地之數厚六寸取坤元用六之數廣一尺取地之成數書徽號以黃色取黃琮之義皆以金飾配位板各如天地之制又言大禮格皇地祗玉用黃琮神州地祗五嶽以兩圭有邸今請二者並施於皇地祗求神以黃琮薦獻以兩圭有邸神州惟用圭邸餘不用玉琮之制當用坤數宜廣六寸為八方而不剡兩圭之長宜共五寸並宿一邸色與琮同牲幣如之又言常祭地祗配位各用冰鑑一今親祀盛暑請增正配及從祀位冰鑑四十一並從之文獻通考政和三年詔自今每遇冬大禮後一嵗夏至祭地於方澤其儀物儀衛應奉行事悉從簡省從祭臣僚與隨駕衛士量行支賜簡而易行無偏而不舉之失以稱朕意可令禮制局裁定以聞宋史徽宗本紀政和四年夏五月丙戌始祭地于方澤以太祖配降德音於天下禮志政和四年五月夏至親祭地於方澤以皇弟燕王俁為亞獻越王偲為終獻皇帝散齋七日於别殿致齋七日於內殿一日於齋宫前一日告配太祖室其有司陳設及皇帝行事並於郊祀之儀是後七年至宣和二年五年親祀者凡四陸佃傳徽宗欲親祀北郊大臣以為盛暑不可徽宗意甚確朝退皆曰上不以為勞當遂行之李清臣不以為然佃曰元豐非合祭而是北郊公之議也今反以為不可耶清臣乃止文獻通考四年五月丙戌夏至日帝始親祭地於方澤以太祖皇帝配禮成帝親製二表遣觀文殿學士鄧洵武告於永泰陵詔以其日為景貺節故事大禮御札皆前期六月乃降六年冬祀夏祭始同一札五使亦同日命之遂為定制前期皇帝散齋七日於别殿致齋七日於內殿一日於齋宫舊儀侍從官設次青城內餘就草場今聽於青城附近官舍設次日給食錢更不具食祭前一日奏告太祖皇帝室殿中監設大次於外壝西門之內道北南向小次於第二成子階之西東向設皇帝褥位於小次前東向設文武侍臣次於大次前陪祀行事官宗室及有司次於外壝南門之外設饌幔於內壝東西門之外開瘞坎於壇子階之北壬地光祿牽牲詣祀所大晟陳登歌之樂於壇上稍北南向設宫架於壇北內壝之外立舞表於酇綴之間祭前一日大史設皇地祗位於壇上南方北向席以藳秸太祖皇帝位於壇上西方東向席以蒲越神州地祗位於第二成午階席以藳秸五官神嶽鎮海瀆各以其方設位於第二成山林川澤丘陵墳衍原隰各以其方設位於壇下內壝之內皆席以莞內向奉禮郎禮直官設皇帝位版於第二成子階之西東向飲福位於壇上皇地祗神位東北南向望瘞位於瘞坎之南北向設爟火於望瘞位之西北向司尊彜帥其屬設玉幣篚於酌尊所又設籩豆簠簋之位正配位皆左十有一籩右十有一豆俱為三行俎一在籩前二在豆右為二重登一在籩豆間血槃一在登之前簠一簋一在籩豆外簠在左簋在右又設尊罍之位每位太尊三著尊二犧尊象尊壺尊山尊各一尊皆有罍以東為上尊南罍北又設篚一於第二成子階之北實以槃匜中爵坫二於正配尊罍之次又設內侍供奉皇帝盥􅍤位於皇帝版位之前又設象尊二壺尊二在壇下子階之西俱南向東上皆加杓冪並實水又設第二成從祀每位皆左十籩右十豆俱為三行俎二在籩豆前登一槃一神州地示五官神用在籩豆間簠一簋一在籩豆外簠在左簋在右爵一置於俎上內壝神位每位皆左二籩右二豆俎一在神位前爵一次之簠一簋一在爵之前簠在左簋在右登一在籩豆之間又設尊罍之位二成每方各犧尊二山尊二壇下每方設蜃尊二散尊二在神位之左蜃尊散尊外餘皆有罍副之凡尊罍皆加杓冪又設正配位籩豆簠簋俎斗鼎各一於饌幔之內太府卿少府監帥其屬陳玉幣於篚皇地祗玉以黃琮幣以黃配帝幣亦如之神州帝祗玉以兩圭有邸幣以黑五行五官五方嶽鎮海瀆諸神幣各從其方色禮神之玉各置於神位前瘞玉加於幣先是郊祀尊彜籩豆簠簋之類習用前代無所考正上逺稽三代作郊廟社稷之器至是舉而用之粲然大備手詔具親祀圜壇門前期一日尚輦奉御進輿於垂拱殿皇帝服通天冠絳紗袍乘輿以出稱警蹕如常儀乘黃令進玉輅於宣德門外左輔奏請降輿升輅至齋宫明禋殿前回輅南向左輔奏請降輅乘輿入齋殿侍衛如常儀祭日皇帝服通天冠絳紗袍乘輿至大次禮儀使等分立大次前有司奏請行事皇帝服衮冕以出禮儀使等前導至中壝門外殿中監跪進大圭皇帝執以入宫架儀安之樂作至午階樂止登歌樂作至第二成版位東向立樂止禮儀使奏請有司謹具請行事宫架作寧安之樂廣生儲祐之舞八成止皇帝再拜禮儀使奏請搢大圭盥手登歌樂作􅍤手訖執大圭至壇樂止登歌嘉安之樂作殿中監進鎮圭皇帝搢大圭執鎮圭詣皇地祗神位前南向跪奠鎮圭於繅藉執大圭俯伏興搢圭禮儀使奏請受玉幣奠訖俯伏興再拜樂止恭安樂作詣太祖皇帝神位前西向奠圭幣如前儀禮儀使前導皇帝還版位登歌樂作至位東向立樂止禮部户部尚書以下奉饌俎宫架豐安之樂作奉奠訖樂止皇帝再詣罍洗搢大圭盥手登歌樂作􅍤手洗爵拭爵訖執大圭至壇上樂止登歌光安之樂作詣皇地祗神位前搢大圭跪執爵祭酒三奠爵訖執圭俯伏興樂止太祝讀册皇帝再拜訖登歌英安之樂作詣太祖皇帝神位前如前儀皇帝還版位登歌樂作至位樂止皇帝還小次登歌樂作殿中監跪受大圭簾降樂止文舞退武舞進宫架文安之樂作舞者立定樂止亞獻盥􅍤訖作降安之樂厚載凝福之舞禮畢樂止終獻行禮如前儀皇帝詣飲福位登歌樂作至位樂止禧安之樂作皇帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎尊俎受搏黍豆既奠再受爵飲福訖奠爵執圭俯伏興再拜樂止皇帝還版位如前儀禮部户部尚書徹俎豆登歌成安之樂作卒徹樂止禮部尚書等降復位禮直官曰賜胙行事陪祀官再拜宫架寧安之樂作一成止皇帝詣望瘞位登歌樂作降自子階樂止宫架樂作至位北向立樂止禮直官曰可瘞舉爟火瘞半坎禮儀使跪奏禮畢宫架樂作皇帝出中壝門殿中監受大圭皇帝至大次樂止有司奏解嚴皇帝常服乘大輦還齋宫鼓吹振作皇帝升御座百官稱賀皇帝降座鳴鞭殿上侍立官以次退所司放仗還內如常儀宣和二年五月丁巳祭地於方澤五年五月癸酉祭地於方澤宋史徽宗本紀政和七年五月己丑如玉清和陽宫上承天效法厚德光大后土皇地祗徽號寶册辛丑祭地於方澤降德音於諸路文獻通考馬氏曰北郊之議始於元豐初至元豐六年始罷合祭元祐七年復合祭紹聖以後復罷之政和四年始親祀地祗於方澤蓋自元豐六年至宣和之末共四十二年凡十一郊唯元祐七年一次合祭及政和四年以後四次親祠方澤而已其餘六郊則遂廢地祗之祀矣夫本以合祭為非禮分祭為禮至分合之議不決則廢親祠而權以上公攝事者且二十年蓋病其非禮而反至於廢禮以為不當並祀於圜丘而終不能親祀於方澤則固不若一遵祖宗之法三嵗並祀南郊之為愈也要之周禮冬至圜丘夏至方澤其禮甚正亦無難行者諸儒議論所以不能以時決者其拘牽有二禮文煩縟則憚勞賞賚優渥則憚費如陳古靈之説每遇親郊之嵗一日宿太廟以告一日宿北郊以祭地一日宿南郊以祭天是欲以二祀併祭一時則不至倍費矣而執禮之勞加甚如曽曲阜之説親郊之嵗依古禮以夏至親祠方澤一如郊禮至冬至則舉圜丘之祀是以二祀分在二時則不至甚勞矣而賞賚之費倍增然禮文乃百王相承之大典不可損略而賞賚則五季姑息之弊政何難更張則如政和三年之詔以郊天後一嵗祭地方澤應奉支賜務從簡省毋使有偏而不舉之失乃為至論但恐當時方倡豐豫之説繁費未必能省所以中興之後國勢倥偬則不復能遵而行之也蕙田案馬氏之論極中時弊至以為不如並祀南郊之為愈乃有激之詞非篤論也文獻通考髙宗紹興元年禮部太常寺討論夏日至祭皇地祗以太祖皇帝配正配二位每位尊爵籩豆各一實以酒酺鹿臡以獻官一員行禮立冬祭神州地祗以太宗皇帝配於天慶觀望祭宋史禮志紹興二年太常少卿程瑀言皇地祗當一依祀天儀式詔從之又言國朝祀皇地祗設位於壇之北方南向政和四年禮局議設於南方北向令北面望祭北向為難且於經無據請仍南向從之文獻通考太常寺每嵗常祀夏日至祭皇地祗係於行在錢湖門外惠照院望祭齋宫設位行禮以太祖皇帝配三獻官依儀初獻係差宰職亞獻禮部尚書侍郎有故或闕次輪别曹長二次給舍諌議終獻太常卿及禮部郎官有故或闕差北司官次輪别曹郎官合用禮料牲牢羊一口豕一口籩二十有六菱二芡二栗二鹿脯二乾棗濕棗乾桃濕桃乾䕩榛栗實麷蕡白黑形鹽膴鮑魚鱐糗餌粉餈簠八稻粱各四登一大羮槃一毛血簋八黍稷各四豆二十有六􅓞食糝食芹兔醢深蒲醓醢二菭葅雁醢笋魚醢二葵螺醢脾析蠯醢大蛤蚳醢豚拍韭昌本菁鹿臡苑麋臡二俎八羊腥七獻豕腥七體羊熟十一豕熟十一羊腥腸胃肺羊熟腸胃肺豕腥膚豕熟膚尊罍共二十有四著尊二一實玄酒明水一實盎齊太尊二一實泛齊一實醴齊山尊二一實盎齊一實醍齊犧尊二一實沈齊一實事酒象尊二一實昔酒一實清酒以上各加罍二隻係實明水紹興祀皇地祗十五首迎神寧安函鍾為宫至哉厚德物生是資直方維則翕闢攸宜於昭祀典致享坤儀禮罔不答神之格思太蔟為角蕆事方丘舊典時式至誠感神馨非黍稷肸蠁來臨鑒兹明德永錫坤珍時萬時億姑洗為徴至哉坤元乃順承天厚德載物含洪八埏日北多暑祀儀吉蠲式昭母事敢告恭虔南吕為羽蕆事方丘情文孔時名山大澤侑祭無遺牲陳黝犢樂備咸池柔祗皆出介我繁禧盥洗正安於穆盛禮肅肅在宫嵗事有初直于東榮滌濯是謹惟寅惟清祗薦柔嘉享義克誠升殿正安景風應時聿嚴毖祀用事方丘鏘鏘濟濟登降有節三獻成禮神其格思錫我繁祉正位奠玉幣嘉安坤元博厚對越天明辰事方澤神惟顧馨嘉玉量幣祗薦純精錫我繁祉燕及函生太祖位奠幣定安毖祀泰折柔祗是承於赫藝祖道格三靈式嚴配侑厚德惟寧爰昭薦幣享于克誠捧豆豐安丕答靈貺蕆事方丘豆登在列登俎斯儔牲牷告具寅畏彌周柔祗昭格颷至雲流正位酌獻光安祗事坤元飭躬敢憚爰潔粢盛載嚴圭瓚清明內融嘉旨外粲介我繁釐時億時萬太祖位酌獻英安皇矣藝祖九圍是式至哉柔祗萬彚允殖保兹嘉邦介我黍稷酌鬯告虔作配無極文舞退武舞進正安於穆媪神嫓德彼天我修毖祀以莫不虔肆陳時夏干羽相宣靈其來遊降福綿綿亞終獻文安禮有祈報國惟典常籩豆豐潔降升齊莊備物致志式薦纍觴昭格來享自天降康徹豆娛安承天效法其道貴誠牲羞黃犢薦德之馨芳俎告畢禮備樂盈既靜既安庶物霑生送神寧安至厚至深其動也剛精神默通或出其藏神之言歸化斯有光相我炎圖萬世無疆降神靜安膴膴郊原茫茫宇縣畫野分疆禹功疏奠靈祗是臻豆籩祗薦幽贊皇圖視之不見奠玉