分引第二等分獻官詣盥洗位搢笏盥手􅍤手執笏詣酌尊所執事以爵授分獻官酌以授執事者進詣首位神座前奠獻並如上儀祝史齋郎以次助奠訖各引還位諸獻既畢諸太祝進徹籩豆各一少移故處樂作豐寧之曲卒徹樂止奉禮官贊曰賜胙衆官再拜樂作一成止初送神樂止引初獻官詣望燎位樂作太蔟宫肅寧之曲至位南向立樂止初在位官將拜諸太祝祝史各奉篚進詣神座前玉幣從祭神州地祗以下並以俎載牲體并取黍稷飯爵酒各由其陛降壇北諸瘞物實於坎中又以從祭之位禮幣皆從瘞禮直官曰可瘞東西六行置土半坎禮直官贊禮畢引初獻出禮官贊者各引祭官及監祭監禮太祝以下俱復壇南北向立定奉禮郎贊曰再拜監祭以下皆再拜訖奉禮以下及工人以次出光祿卿以胙奉進監祭監禮展視其祝版燔於齋方樂志方丘樂歌迎神鎮寧之曲林鍾宫再奏太蔟角再奏姑洗徴再奏南吕羽再奏辭同至載坤儀萬彚資生稱物平施流謙變盈禮修泰折祭極精誠皇皇靈眷永奠寰瀛初獻盥洗太蔟宫肅寧之曲禮有五經無先祭禮即時申虔惟時盥洗品物吉蠲威儀濟濟錫之純嘏來歆愷悌初獻升壇應鍾宫肅寧之曲無疆之德至哉坤元沉潛剛克資生實蕃方丘之儀惟敬無文神其來思時歆薦殷初獻奠玉幣太蔟宫億寧之曲禮行方澤文物備舉惟皇地祗昭格來下奠瘞玉幣純誠內著神保是享陟降斯祜司徒捧俎太蔟宫豐寧之曲四階秩儀壇于方澤昭事皇祗即陰以墌潔祀于祊孔嘉且碩神其福之如幾如式正位酌獻太蔟宫溥寧之曲蕩蕩坤德物無不載柔順利貞含洪光大籩豆既陳金石斯在四海永寧福祿攸介配位酌獻配太宗也太蔟宫保寧之曲詞闕亞終獻升壇太蔟宫咸寧之曲卓彼嘉壇奠玉方澤百辟祗肅八音純繹祀事孔明柔祗感格徹豆應鍾宫豐寧之曲修理方丘吉蠲是宜籩豆靜嘉登于有司苾芬馨香來享來儀郊儀將終聲歌徹之送神林鍾宫鎮寧之曲因地方丘濟濟多儀樂成八變靈祗格思薦餘徹豆神貺昭垂億萬斯年永祐丕基詣望燎位太蔟宫肅寧之曲詞同升壇右金祭地續文獻通考元世祖時每嵗遣使代祀后土至元五年建后土祠於太寧宫十三年又立后土祠於平陽之監湯元史祭祀志成宗大德九年禮官博士奏冬至圜丘唯祀昊天上帝其方丘祭地之禮續議以聞制曰可武宗本紀至大二年十一月乙酉尚書省臣及太常禮儀院言今南郊之禮已行而未備北郊之禮尚未舉行明年夏至祭地北郊請以世祖皇帝配制可至大三年冬十月丙午三寶努及司徒田忠良等言曩奉旨舉行南郊配位從祀北郊方丘朝日夕月典禮臣等議欲祀北郊必先南郊今嵗冬至祀圜丘尊太祖皇帝配享來嵗夏至祀方丘尊世祖皇帝配享實合祀典有旨所用儀物其令有司速備之祭祀志三年正月中書禮部移太常禮儀院下博士擬定北郊從祀朝日夕月禮儀博士李之紹蔣汝礪疏曰案方丘之禮夏以五月商以六月周以夏五月其丘在國之北禮神之玉以黃琮牲用黃犢幣用黃繒配以后稷其方丘之制漢去都城四里為壇四陛唐去宫城北四里為方壇八角三成每成髙四尺上闊十六步設陛上等陛廣八尺中等陛廣一丈下等陛廣一丈二尺宋至徽宗始定為再成歷代制雖不同然無出於三成之式今擬取坤數用六之義去都城北六里於壬方選擇善地於中為方壇三成四陛外為三壝仍依古制自外壝之外治四面稍令低下以應澤中之制宫室墻圍器皿色並用黃其再成八角八陛非古制難用其神州地祗以下從祀自漢以來歷代制度不一至唐始因隋制以嶽鎮海瀆山林川澤丘陵墳衍原隰各從其方從祀今盍參酌舉行仁宗延祐元年四月丁亥太常寺臣請立北郊帝謙遜未遑北郊之議遂輟泰定帝泰定四年特加皇地祗黃犢一將祀之夕敕送新獵鹿二唯至大三年冬至正配位蒼犢皆一五方帝犢各一皆如其方之色大明青犢夜明白犢皆一馬一羊鹿野豕各十有八兔十有二四年四月如之其犧牲品物香酒皆參用國禮而豐約不同文宗至順二年遣祕書少監王圭代祀后土右元祭地五禮通考卷三十九
