body:
  text: 五禮通考卷一百三十七刑部尚書秦蕙田撰嘉禮十朝禮隋書禮儀志隋制正旦及冬至文物充庭皇帝出西房即御座皇太子鹵簿至顯日門外入賀復詣皇后御殿拜賀訖還宫皇太子朝訖羣官客使入就位再拜上公一人詣西階解劍升賀降階帶劍復位而拜有司奏諸州表羣官在位者又拜而出皇帝入東房有司奏行事訖乃出西房坐定羣官入就位上壽訖上下俱拜皇帝舉酒上下舞蹈三稱萬嵗皇太子與會則設坐於御東南西向羣臣上夀畢入解劍以升會訖先興蕙田案顯日門文獻通考作明陽門音樂志仁夀元年制詔吏部尚書竒章公𢎞等創制雅樂歌辭元會皇帝出入殿庭奏皇夏辭郊丘社廟同深哉皇度粹矣天儀司陛整蹕式道先馳八屯霧擁七萃雲披退揚進揖步矩行規勾陳乍轉華蓋徐移羽旗照耀圭組陸離居髙念下處安思危臨照有度紀律無虧皇太子出入奏肆夏辭惟熙帝載式固王猷體乾建本是曰孟侯馳道美漢寢門稱周德心既廣道業惟優傅保斯導賢才與逰瑜玉發響畫輪停輈皇基方峻匕鬯恆休食舉歌辭八首燔黍設教禮之始五味相資火為紀平心和德在甘旨牢羞既陳鐘石俟以斯而御揚盛軌養身必敬禮食昭時和嵗阜庶物饒鹽梅既濟鼎鉉調特以膚臘加臐膮威儀濟濟懋王朝饔人進羞樂侑作川潛之膾雲飛􅌜甘酸有宜芬勺藥金敦玉豆盛交錯御鼓既聲安以樂玉食惟君膳必珍芳菰既潔重秬新是能安體又調神荆包畢至海貢陳用之有節德無垠嘉羞入饋猶化謐沃土名滋帝臺實陽華之菜雕陵栗鼎俎芬芳豆籩溢通幽致逺車書一道髙物備食多方山膚既善水豢良桓蒲在位簨業張加籩折俎爛成行恩風下濟道化光禮以安國仁為政具物必陳饔牢盛罝罘斤斧順時令懷生熙熙皆得性於兹宴喜流嘉慶皇道四達禮樂成臨朝日舉表時平甘芳既飫醑以清揚休玉巵正性情隆我帝載永明明上夀歌辭俗已乂時又良朝玉帛會衣裳基同北辰久夀比南山長黎元鼓腹樂未央宴羣臣登歌辭皇明馭歷仁深海縣載擇良辰式陳髙宴顒顒卿士昂昂侯甸車旗煜爚衣纓蔥蒨樂正展懸司宫飾殿三揖稱禮九賓為傳圓鼎臨碑方壺在面鹿鳴成曲嘉魚入薦筐篚相輝獻酬交遍飲和飽德恩風長扇文舞歌辭天眷有屬后德惟明君臨萬宇昭事百靈濯以江漢樹之風聲罄地必歸窮天皆至六戎仰朔八蠻請吏煙雲獻彩龜龍表異緝和禮樂燮理陰陽功由舞見德以歌彰兩儀同大日月齊光同大一作固天一作同天武舞歌辭惟皇御宇惟帝乘乾五材並用七德兼宣平暴夷險拯溺救燔九域載安兆庶斯賴續地之厚補天之大聲隆有截化覃無外鼓鐘既奮干戚攸陳功髙德重政謐化淳鴻休永播久而彌新右隋正旦朝賀唐六典元日大陳設於太極殿今大明宫於含元殿東都則於乾元殿皇帝衮冕臨軒皇太子獻夀次上公獻夀次中書令奏諸州表黃門侍郎奏祥瑞户部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻太史令奏雲物侍中奏禮畢然後中書令又與供奉官獻夀時殿上皆呼萬嵗蕙田案通典以此條為唐舊制然考唐六典注云舊儀闕供奉官獻夀禮開元二十五年臣林甫謹草其儀奏而行之然則開元以後更有增益非盡舊制也宫城在皇城之北南面三門中曰承天東曰長樂西曰永安若元正冬至大陳設燕會赦過宥罪除舊布新受萬國之朝貢四夷之賓客則御承天門以聽政蓋古之外朝也其北曰太極門其內曰太極殿朔望則坐而視朝焉蓋古之中朝也有東上西上二閣門東西廊左延明右延明二門又北曰兩儀門其內曰兩儀殿常日聽朝而視事焉蓋古之內朝也大明宫在禁苑之東南西接宫城之東北隅龍朔元年髙宗以大內卑濕乃於此置宫南面五門正南曰丹鳳門門內正殿曰含元殿殿即龍首山之東趾也階上髙於平地四十餘尺南去丹鳳門四百餘步東西廣五百步今元正冬至於此聽朝也其北曰宣政門門內曰宣政殿次西曰延英門其內之左曰延英殿右曰含象殿宣政北曰紫宸門其內曰紫宸殿即內朝正殿也興慶宫在皇城之東南即今上龍潛舊宅也開元初以為離宫宫之西曰興慶門其內曰興慶殿即正衙殿次南曰金明門門內之北曰大同門其內曰大同殿宫之南曰通陽門北入曰明光殿其內曰龍堂通陽之西曰花萼樓樓西曰明義門其內曰長慶殿東都皇城如京城之制皇宫在皇城之北南面三門中曰應天左曰興教右曰光政應天門端門若西京之承天門其內曰乾元門若西京之太極門乾元之左曰萬春右曰千秋其內曰乾元殿則明堂也證聖元年營造上圜下方八窗四闥髙三百尺元正冬正有時而御焉上陽宫在皇城之西南上元中營造髙宗晚年常居此宫以聽政焉東面三門南曰提象門即正衙門北曰星躔門提象門內曰觀風門南曰浴日樓北曰七寶閣其內曰觀風殿蕙田案唐六典於禮部職云元日冬至大陳設於太極殿於工部職則云元正冬至大陳設御承天門以聽政朔望則御太極殿以視朝二條不合今以大明宫三殿之制相較似當以太極殿為大朝之外朝兩儀殿為常朝之正朝但考册府元龜載永徽二年八月詔來月一日太極殿受朝此後每五日一度太極殿視事朔望即為常式則又當以後説為是今姑兩存之以俟考葉氏夢得曰唐以宣政殿為前殿謂之正衙即古之內朝也以紫宸殿為便殿謂之上閣即古之燕朝也而外别有含元殿古者天子三朝外朝內朝燕朝外朝在王宫庫門外有非常之事以詢萬民於宫中內朝在路門外燕朝在路門內蓋內朝以見羣臣或謂之路朝燕朝以聽政猶今之奏事或謂之燕寢鄭氏小宗伯注以漢司徒府有天子以下大會殿為周之外朝而蕭何造未央宫言前殿則宜有後殿大會殿設於司徒府則為外朝而宫中有前殿則為內朝燕朝蓋去周猶未逺也唐含元殿宜如漢之大會殿宣政紫宸乃前後殿其沿習有自來矣方其盛時宣政傳蓋常朝日見羣臣遇朔望陵寢薦食然後御紫宸旋宣喚仗入閣宰相押之由閣門進百官隨之入謂之喚仗入閣紫宸殿言閣猶古之言寢此御朝之常制也中世亂離宣政不復御正衙立仗之禮遂廢惟以隻日常朝御紫宸而不設仗敬宗始復修之因以朔望陳仗紫宸以為盛禮亦謂之入閣誤矣蕙田案唐自髙宗以後朝會聽政多在大明宫而不常在大內故石林亦止舉大明宫而言其實大內興慶宫東都之皇宫上陽宫並有正衙不必常在宣政也漢司徒府中有百官朝會之殿其説見鄭氏稿人注别無大會殿之名若小宗伯注則并無此文何疏舛如此也唐書百官志凡朝晚入失儀御史録名奪俸三奪者奏彈御史臺大夫一人中丞三人朝會則率其屬正百官之班序遲明列於兩觀監察御史二人押班侍御史顓舉不如法者凡朝會以官職事同者先爵爵同以齒致仕官居上職事與散官勳官合班則文散官居職事之下武散官次之勳官又次之官同者異姓為後親王嗣王任文武官者從其班官卑者從王品郡王任三品以下執事者居官階品之上非任文武官者嗣王居太子太保之下郡王次之國公居三品之下郡公居從三品之下縣公居四品之下侯居從四品之下伯居五品之下子居從五品之上男居從五品之下以前官召見者居本品見任之上以理解者居同品之下本司參集者以職事為上下文武三品非職事官者朝參名簿皆稱曰諸公册府元龜武德九年正月庚寅朔廢朝雨故也舊唐書太宗本紀貞觀二年秋九月丙午詔曰尚齒重舊先王以之垂範還章解組朝臣於是克終釋菜合樂之儀東膠西序之制養老之義遺文可覩朕恭膺大寶憲章故實乞言尊事彌切深衷然情存今古世踵澆季而䇿名就列或乖大體至若筋力將盡桑榆且迫徒竭夙興之勤未悟夜行之罪其有心驚止足行堪激勵謝事公門收骸閭里能以禮讓固可嘉焉內外文武羣官年髙致仕抗表去職者參朝之日宜在本品見任之上蕙田案禮有七十致仕之文所以崇禮讓誡止足也唐制年髙抗表致仕者朝參之位居見任之上以理解者居同品之下其扶風教勵廉恥之義可為後世法舊唐書音樂志武德九年命祖孝孫修定雅樂至貞觀二年六月奏之制十二和之樂皇帝臨軒奏太和王公出入奏舒和皇帝食舉及飲酒奏休和皇帝受朝奏政和皇太子軒懸出入奏承和元日冬至皇帝禮會登歌奏昭和蕙田案新書禮樂志十一曰正和皇后受册以行此云皇帝受朝奏政和與彼不同考開元禮朝賀儀並無奏政和之文惟皇后受册儀則云典樂舉麾奏正和之樂則舊史誤也册府元龜載後漢張昭改十二和為十二成議云皇帝受朝皇后入宫奏正和請改為扆成然則皇帝受朝下當有皇后入宫四字舊志誤脫去又訛正為政耳唐書禮樂志唐之自製樂凡三大舞一曰七德舞二曰九功舞三曰上元舞元日冬至朝會慶賀七德舞與九功舞同奏通典貞觀中景雲見河水清協律郎張文收採古朱雁天馬之義製景雲河清歌名曰宴樂奏之管絃為諸樂之首今元會第一奏者是蕙田案張文收製宴樂在太宗朝册府元龜所載亦同唐志誤以為髙宗時册府元龜貞觀十一年正月朔帝臨軒懸而不樂禮也十五年正月庚午朔帝常服不臨軒行幸洛陽宫衣冠禮樂闕如也二十年正月甲子太宗常服不臨軒行在故也舊唐書髙宗本紀永徽元年春正月辛丑朔上不受朝詔改元壬寅御太極殿受朝而不會四年春正月癸丑朔上御軒不受朝以濮王泰在殯故也永淳元年正月乙未朔以年飢罷朝會册府元龜神龍二年正月庚子朔以則天皇后梓宫在殯不朝會舊唐書中宗本紀神龍三年春正月庚子朔不受朝會喪未再期也唐書睿宗本紀景雲二年春正月丁未朔以山陵日近不受朝賀舊唐書睿宗本紀景雲三年春正月癸酉上始釋慘服御正殿受朝賀册府元龜開元四年正月戊寅朔帝御正殿受朝賀禮畢親朝太上皇於西宫舊唐書玄宗本紀開元五年春正月壬寅朔上以喪制不受朝賀六年春正月丙辰朔以未經大祥不受朝賀通典開元六年八月敕九族既睦百姓有敘至于班列宜當分位嗣王實先於主祭國老有貴于乞言比在朝儀尚為間雜非所謂睦親敦舊之義也嗣王宜與開府儀同三司等致仕官各居本品之上用為永式册府元龜開元七年正月辛卯朔御含元殿受朝衛仗如常儀十年正月癸卯朔御含元殿受朝賀十六年正月戊戌朔始聽政於興慶宫朝賀如常儀十八年正月癸酉御含元殿受百僚朝賀如常儀開元禮皇帝皇后至正受皇太子朝賀前二日本司宣攝內外各供其職前一人尚舍奉御幄座於太極殿北壁南向守宫設皇太子次於承天門外朝堂北西向又於東宫朝堂設宫臣次如式太樂令展宫懸於殿庭如臨軒儀典儀設皇太子位於橫街南道東北面設典謁位於懸之東北贊者二人在南差退俱西面奉禮設宫臣版位於東宫朝堂如常其日依時刻宫官俱集於次各服其服諸衛率各勒所部陳設如常左庶子版奏請中嚴典謁引宫臣各就位如侍衛之官各服其器服右庶子負寶如式俱詣閣奉迎僕進金輅於西閣外南向內率一人執刀立於輅前北向中允一人在侍臣之前贊者二人在中允前左庶子版奏外辦僕奮衣而升正立執轡皇太子具服逺遊冠若未冠則雙童髻絳紗袍升輿而出左右侍衛如常儀內率前執轡皇太子升輅僕立授綏左庶子以下夾侍如常中允進當輅前跪奏稱中允臣某言請發引俯伏興退復位凡中允奏請皆如此儀輅動中允與贊者夾引以出內率夾輅而趨出出重明門至侍臣上馬所中允奏請輅權停令侍臣上馬左庶子前承令退稱令曰諾中允退稱侍臣上馬贊者承傳文武侍臣