賀之禮以九年冬郊祀故也十一年正月庚午朔御含元殿受朝賀十二年正月甲午朔御含元殿受朝賀十三年正月朔御含元殿受朝賀十四年正月朔御含元殿受朝賀十五年正月朔御含元殿受朝賀文獻通考貞元十五年膳部郎中歸崇敬以百官朝服袴褶非古禮上疏云案三代典禮兩漢史籍並無袴褶之制亦未詳所起之由隋代以來始有服者事不師古請罷之奏可册府元龜貞元十六年正月朔御含元殿受朝賀十七年正月朔御含元殿受朝賀舊唐書德宗本紀貞元十八年春正月戊午朔大雨雪罷朝賀册府元龜貞元十九年正月甲辰朔御含元殿受朝賀二十年正月朔御含元殿受朝賀舊唐書憲宗本紀元和元年春正月丁卯朔御含元殿受朝賀禮畢御丹鳳樓大赦天下改元曰元和册府元龜元和三年正月癸未朔以將受尊號元日權停朝賀四年正月戊寅朔御含元殿受朝賀五年正月壬寅朔御含元殿受朝賀十二月制來年正月一日御含元殿受朝賀令所司準式六年正月丙申朔御含元殿受朝賀閏十二月壬子敕來年正月一日御含元殿受朝賀宜權停七年正月辛酉朔帝不受朝賀以皇太子薨廢朝故也十二月戊戌敕來年正月一日御含元殿宜令所司準式甲寅晦宰臣並宿於中書八年正月乙卯朔御含元殿受朝賀九年正月己酉朔御含元殿受朝賀十年正月癸酉朔御含元殿受朝賀舊唐書憲宗本紀元和十一年正月丁卯朔以宿師於野不受朝賀十二年正月辛酉朔以用兵不受朝賀十三年春正月乙酉朔御含元殿受朝賀禮畢御丹鳳樓大赦天下十四年春正月庚辰朔以東師宿野不受朝賀穆宗本紀長慶元年正月辛丑朔御丹鳳閣羣臣於樓前稱賀二年春正月癸巳朔以用兵罷元會四年正月辛亥朔上御殿受朝如常儀册府元龜長慶四年十二月乙未敕來年正月一日朝賀宜權停舊唐書文宗本紀太和五年春正月庚子朔以積陰浹旬罷元會六年春正月乙未朔以久雪廢元會七年春正月乙丑朔御含元殿受朝賀比年以用兵雨雪不行元會之儀故書册府元龜太和九年正月丁未朔權停朝賀之禮舊唐書文宗本紀開成元年正月辛丑朔帝常服御宣政殿受賀文獻通考武宗會昌二年中書門下奏元日御含元殿百官就列唯宰相及兩省官皆未索扇前立於欄檻之內及扇開便侍立於御前三朝大慶萬邦稱賀唯宰相侍臣同介胄武夫竟不拜至尊而退酌於禮意事未得中臣商量請御殿日昧爽宰相兩省官對班於香案前俟扇開通事贊兩班官再拜拜訖升殿侍立從之蕙田案朝賀日宰相兩省官因侍立御前昧爽先拜其儀始此舊唐書武宗本紀會昌三年春正月以宿師於野罷元會四年春正月乙酉朔以澤潞用兵罷元會懿宗本紀咸通元年春正月上御紫宸殿受朝五年春正月戊午朔以用兵罷元會七年春正月戊寅朔以太皇太后喪罷元會十年春正月己未朔以徐州用兵罷元會舊唐書昭宗本紀乾寧元年正月乙丑朔上御武德殿受朝右唐正旦朝賀册府元龜後唐莊宗同光二年正月庚子朔帝衮冕御明堂殿受朝賀太常樂左右金吾仗六軍諸衛如常儀三年正月甲午朔帝御文明殿受朝賀如常儀明宗天成二年正月癸丑朔帝被衮冕法服御明堂殿百寮稱賀文物仗衛禮樂如常儀三年正月戊申朔帝御崇元殿受朝賀禮樂仗衛如常儀四年正月壬申朔帝御崇元殿受朝賀仗衛如常儀長興元年正月丙寅朔帝御明堂殿受朝賀樂懸仗衛如常儀二年正月庚寅朔帝御文明殿受朝賀如常儀三年正月癸未朔帝御明堂殿朝賀禮樂仗衛如式四年正月戊寅朔帝御文明殿百寮稱賀閔帝清泰三年春正月辛卯朔始御文明殿陳樂懸仗衛受朝賀蕙田案以上後唐册府元龜後晉髙祖天福二年正月甲寅朔帝御文明殿受文武百寮朝賀三年正月戊申朔帝御崇元殿受朝仗衛如式四年正月癸卯朔帝御崇元殿受朝賀仗衛如式十二月庚戌禮官奏嵗正旦王公上壽皇帝舉酒奏元同之樂再飲三飲並奏文同之樂三飲訖羣臣再拜樂奏大同蕤賓之鐘左右皆應是月壬戌又奏正旦宫懸歌舞未全且請雜用九部雅樂歌聲坊法曲從之五年正月丁卯朔帝御崇元殿朝賀仗衛如式六年正月辛酉朔帝受朝於崇元殿七年正月丙辰朔帝不受朝賀用兵故也少帝開運二年春正月戊戌朔帝不受朝賀不豫故也蕙田案以上後晉册府元龜後漢髙祖天福十二年九月權判太常卿張昭議請改十二和樂皇帝臨軒奏太和請改為政成王公出入奏舒和請改為弼成皇帝食舉及飲宴奏休和請改為德成皇帝受朝皇后入宫奏正和請改為扆成皇太子軒懸出入奏成和請改為裔成元日冬至皇帝禮會登歌奏昭和請改為慶成乾祐元年正月辛亥朔帝不受朝賀蕙田案以上後漢册府元龜周太祖廣順元年七月太常卿邊蔚上言議改十二成皇帝臨軒奏政成請改為治順之樂王公出入奏弼成請改為忠順之樂皇帝食舉奏德成請改為康順之樂皇帝受朝皇后入宫奏扆成請改為雍順之樂皇太子軒懸出入奏裔成請改為溫順之樂元日冬至皇帝禮會登歌奏慶成請改為禮順之樂三年正月壬子朔帝御崇元殿羣臣朝賀樂懸仗衛如常儀班退太祖御永福殿羣臣百竂稱觴獻夀舉教坊樂世宗顯德二年正月辛未朔帝不御殿宰臣率百官拜表稱賀三年正月乙未朔帝不御殿文武百官詣閣進名稱賀四年正月己丑朔帝御崇元殿受朝賀禮畢御廣政殿羣臣上夀並如常儀五年春正月癸未朔帝在楚州西北衣戎衣御帳殿受宰臣已下稱賀六年春正月丁未朔帝御崇元殿受朝賀金吾仗衛太常樂懸如儀蕙田案以上後周右五代正旦朝賀五禮通考卷一百三十七
