body:
  text: 五禮通考卷一百八十九刑部尚書秦蕙田撰嘉禮六十二觀象授時書堯典以閏月定四時成嵗疏六術諸緯與周髀皆云日行一度月行十三度十九分度之七為每月二十九日過半所以無閏時不定嵗不成者若無閏三年差一月則以正月為二月每月皆差九年差三月即以春為夏若十七年差六月即四時相反時何由定嵗何得成乎故須置閏以定四時春秋文公元年左氏傳於是閏三月非禮也注於術法閏當在僖公末年誤於今年三月置閏盖時達數者所譏先王之正時也履端於始注步律之始以為術之端首舉正於中注朞之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月歸餘於終注有餘日則歸之於終積而為閏故言歸餘於終履端於始序則不愆注四時無愆過舉正於中民則不惑注斗建不失其次寒暑不失其常故無疑惑歸餘於終事則不悖注四時得所則事無悖亂疏古今之法推閏月之術皆以閏餘減章嵗餘以嵗中乘之章閏而一所得為積月命起天正算外閏所在也其有進退以中氣定之無中氣則閏月也古法十九年為一章章有七閏入章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若于後漸積餘分大率三十二月則置閏不必恒同初章閏月僖五年正月辛亥朔日南至治律者皆以彼為章首之嵗漢書志云文公元年距僖五年辛亥二十九嵗是嵗閏餘十三閏當在十一月後而在三月故傳曰非禮也志之所言閏當在此年十一月後今三月已即置閏是嫌閏月大近前也杜以為僖三十年閏九月文二年閏正月故言於法閏當在僖公末年誤於今年置閏嫌置閏大近後也杜為長律置閏疏數無復定凖凡為術者閏前之月中氣在晦閏後之月中氣在朔僖五年正月朔旦冬至則四年當閏十二月也杜長律僖元年閏十一月五年閏十二月與常律不同者杜以襄二十七年再失閏司律過昭二十年二月己丑日南至哀十二年十二月螽云火猶西流司律過則春秋之世律法錯失所置閏月或前或後不與常同杜唯勘經傳上下日月以為長厯若日月同者則數年不置閏月若日月不同須置閏乃同者則未滿三十二月頻置閏所以異於常律故釋例云據經傳㣲㫖考日辰晦朔以相發明為經傳長律未必得天盖春秋當時之律也是杜自言不與常律同日月轉運于天猶如人之行步故推律謂之步律步律之始以為術之端首謂律之上元必以日月全數為始於前更無餘分以此日為術之端首故言履端于始也朞之日三百六十有六日謂從冬至至冬至必滿此數乃周天也日月之行有遲有速日行遲月行速凡二十九日過半月行及日謂之一月過半者謂一日於律法分為九百四十分月行及日必四百九十九分是過半二十九分今一嵗氣周有三百六十五日四分日之一其十二月一周唯三百五十四日是少十一日四分日之一未得氣周細而言之一嵗只少弱十一日所以然者一月有餘分二十九一年十二月有餘分三百四十八是一嵗既得三百五十四日又得餘分三百四十八其四分日之一一日為九百四十分則四分日之一為二百三十五分今於餘分三百四十八内取二百三十五以當卻四分日之一餘分仍有一百一十三其整日唯有十一日又以餘分一百一十三減其一日九百四十分唯有八百二十七分是一年有餘十日八百二十七分少一百一十三分不成十一日也前朔後朔相去二十九日餘前氣後氣相去三十日餘每月參差氣漸不正但觀中氣所在以為此月之正取中氣以正月故言舉正於中也月朔之與月節每月剩一日有餘所有餘日歸之於終積成一月則置之為閏故言歸餘於終文公六年左氏傳閏月不告朔非禮也閏以正時注四時漸差則置閏以正之時以作事注順時命事事以厚生注事不失時則年豐生民之道於是乎在矣不告閏朔棄時政也何以為民漢書志朔不得中是為閏月閏所以正中朔也汪氏克寛曰有朔而無中者為閏月月有晦朔則自然有閏無閏則失月行之數故曰法乎月而有閏也日月所會是謂辰以律言之則是積餘分而置閏以日月星辰觀之則閏月日月亦會於辰與他月無以異也又曰周天三百六十五度四分度之一日一日一周在天為不及一度積三百六十五日四分日之一而與天會為一嵗月一日不及天十三度十九分度之七積三百五十四日九百四十分日之三百四十八而與日㑹者十二為一年大率三百六十日為常數一嵗多五日九百四十分日之二百三十五分為二十四氣是為氣盈而晝夜長短節氣寒暑于是定焉一年少五日九百四十分日之五百九十二分為十二月是為朔虚而晦朔弦望于是定焉積嵗之有餘就年之不足而後有閏三年一閏尚餘三日有竒五年再閏則少五日有竒積十九年閏在十二月則氣朔分齊大率三十二月則有閏閏前之月中氣在晦閏後之月中氣在朔若不置閏則弦望晦朔皆非其正晝夜平分不在春秋之中而寒暑反易矣故書云以閏月定四時成嵗周禮注中數曰嵗朔數曰年中朔大小不齊正之以閏乃天地自然之理術家因其自然而立積分之數以合之耳公羊謂閏月天無是月穀梁謂附月之餘日皆非是夫二十九日九百四十分日之四百九十九而晦朔交則為一月月非有閏之名特以日月行天疾徐之不仝而嵗年盈縮之有異遂謂之閏天與日月之行自然有閏豈可謂天無是月哉月非有餘也又豈可謂附月之餘哉月之有閏則由乎天而月之名閏乃由於人故於文王在門為閏禮稱天子閏月則聽朔於明堂闔門左扉立於其中王之謹乎閏月者如此而諸侯安可不告月哉考之經傳凡言閏月多在嵗終盖是時術法謬矣每置閏於嵗終故左傳以閏三月為非禮則無中者不謂之閏而名曰閏者非閏月矣秦之後九月實倣於此蕙田案後代法宻於古月有平朔亦名經朔定朔氣有平氣亦名恒氣定氣平朔平氣者日月平行之數也定朔定氣者日月實行之數也實行亦名視行孔疏及汪氏所云皆據漢四分術有平行無實行其平行亦未宻也十九年氣朔分齊殊不然存之以見置閏大概耳明史志崇禎十四年十二月李天經言大統置閏但論月無中氣新法尤視合朔後先今所進十五年新書其十月十二月中氣適交次月合朔時刻之前所以月内雖無中氣而實非閏月盖氣在朔前則此氣尚屬前月之晦也至十六年第二月止有驚蟄一節而春分中氣交第三月合朔之後則第二月為閏正月第三月為二月無疑梅氏文鼎曰閏月之議紛紛聚訟大㫖不出兩端其一謂無中氣為閏月此據左氏舉正於中為説乃術家之法也其一謂古閏月俱在嵗終此據左氏歸餘於終為論乃經學家之詁也若如前推隱公辛酉冬至在經朔後三十日宜閏嵗前十二月即兩說齊同可無疑議然有不同者何以斷之曰古今法原自不同推步之理踵事加宻故自今日言則以無中氣置閏為安而論春秋閏月則以歸餘之説為長何則治春秋者當主經文今考本經書閏月俱在年終此其據矣蕙田案閏以正時時者因乎日行也日發歛一周而四時始終其數濶逺茫若無界月與日同行為朔相對為望一象為弦其數既近仰觀即見故用之為界限日月之會十二終時亦幾終故命為一年便於明民而已日一周凡三百六十五日竒日月之會十二終凡三百五十四日竒兩數相差十餘日非閏月則四時不定嵗不成矣古但有分至啟閉未嘗分十二中氣以配月閏月進退無據不得不置之嵗終秦漢之際術家乃言二十四氣漢以無中氣之月置閏然所用者平氣平朔未知有定氣定朔厥後劉洪張子信何承天祖沖之劉焯諸人言定氣定朔詳矣唐以來術家惟用定朔而不用定氣注書則置閏之法猶未宻也必得定氣定朔二者審之既精然後視無中氣之月為閏月斯不求而知定氣者日體實到之節序定朔者日體月體實會也定朔日數不均必先求經朔為根進退増減之今考自漢以後經恒朔實異同如左嵗實朔實授時之本是以特詳著之右置閏前漢書志太初術一月之日二十九日八十一分日之四十三蕙田案二十九日小餘四十三是為經朔亦曰朔策亦曰朔實凖前較嵗實法以萬萬通小餘滿日分八十一而一得五千三百有八萬六千四百一十九竒三統術月法二千三百九十二日法八十一蕙田案月法即朔實滿日法得二十九日小餘四十三與太初同後漢書志四分術察日月俱發度端日行十九周月行二百五十四周復會於端是則月行之終也以日周除月周得一嵗周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一嵗之月以除一嵗日為一月之數蔀月九百四十蔀日二萬七千七百五十九日法四周天千四百六十一蕙田案以十九通十二納七得二百三十五即章月以日法乘之得九百四十即蔀月以十九通周天得二萬七千七百五十九即蔀日滿蔀月得二十九日小餘四百九十九以萬萬通之滿蔀月得五千三百有八萬五千一百有六竒弱於太初三統晉書志漢劉洪乾象術通法四萬三千二十六日法千四百五十七蕙田案通法即朔實滿日法得二十九日小餘七百七十三以萬萬通之滿日法得五千三百有五萬四千二百二十一竒弱於四分魏景初術通數十三萬四千六百三十日法四千五百五十九蕙田案通數即朔實滿日法得二十九日小餘二千四百一十九以萬萬通之滿日法得五千三百有五萬九千八百八十一竒强於乾象弱於四分後秦姜岌甲子元術通數十七萬九千四十四日法六千六十三蕙田案通數滿日法得二十九日小餘三千二百一十七以萬萬通之滿日法得五千三百有五萬九千五百四十一竒强於乾象弱於景初魏書志正光術日法七萬四千九百五十二經月大餘二十九小餘三萬九千七百六十九日法除周天分得之日法者一蔀之月數周天分者一蔀之日數以其月除衆日得一月二十九及餘是周天分即為月通蕙田案以萬萬通小餘滿日法得五千三百有五萬九千二百九十一竒强於乾象弱於姜岌甲子元李業興甲子元術通數六百一十五萬八千一十七日法二十萬八千五百三十蕙田案通數滿日法得二十九日小餘十一萬六百四十七以萬萬通之滿日法得五千三百有六萬有四百七十竒强於景初弱於四分宋書志何承天元嘉術通數二萬二千二百七日法七百五十二蕙田案通數滿日法得二十九日小餘三百九十九以萬萬通之滿日法得五千三百五萬八千五百一十竒强於乾象弱於正光祖沖之甲子元術月法十一萬六千三百二十一日法三千九百三十九蕙田案月法滿日法得二十九日小餘二千有九十以萬萬通之滿日法得五千三百有五萬九千一百五十二竒强於元嘉弱於正光隋書志張賓所造算法通月五百三十七萬二千二百九日法一十八萬一千九百二十蕙田案通月滿日法得二十九日小餘九萬六千五百二十九以萬萬通之滿日法得五千三百有六萬一千二百三十五竒强於李業興甲子元術弱於四分大業四年戊辰所定算術月法三萬三千七百八十三日法千一百四十四蕙田案月法滿日法得二十九日小餘六百有七以萬萬通之滿日法得五千三百有五萬九千四百四十竒强於正光弱於姜岌甲子元劉焯皇極術朔實三萬六千六百七十七朔日法千二百四十二蕙田案朔實滿朔日法得二十九日小餘六百五十九以萬萬通之滿朔日法得五千三百有五萬九千五百八十一竒强於姜岌甲子元術弱於景初唐書志傅仁均戊寅術月法三十八萬四千七十五日法萬三千六蕙田案月法滿日法得二十九日小餘六千九百有一以萬萬通之滿日法得五千三百有六萬有一百二十六竒强於景初弱於李業興甲子元李淳風麟德術常朔實三萬九千五百七十一推法千三百四十蕙田案常朔實滿推法得二十九日小餘七百一十一以萬萬通之滿推法得五千三百有五萬九千七百有一竒强於皇極弱於景初開元大衍術朔實曰揲法日法曰通法月䇿曰四象一象之䇿即朔望弦相距也揲法八萬九千七百七十三通法三千四十四象之策二十九餘千六百一十三蕙田案揲法滿通法得二十九日小餘千六百一十三即四象之䇿也其一象七日小餘千一百六十三少凡四分一為少以萬萬通四象小餘滿通法得五千三百有五萬九千二百一十竒强於祖沖之甲子元術弱於正光寶應五紀術揲法三萬九千五百七十一通法千三百四十四象之策二十九餘七百一十一蕙田案四象策餘以萬萬通之滿通法得五千三百有五萬九千七百三十一竒强於麟德弱於景初建中正元術揲法三萬二千三百三十六通法千九十五四象之策二十九餘五百八十一蕙田案四象策餘以萬萬通之滿通法得五千三百有五萬九千三百六十竒强於正光弱於大業戊辰所定數長慶宣明術揲法曰章月通法曰統法四象之策曰合策章月二十四萬八千五十七統法八千四百合䇿二十九餘四千四百五十七蕙田案以萬萬通合䇿餘滿統法得五千三百有五萬九千五百二十三竒强於大業戊辰所定數弱於姜岌甲子元術景福崇元術揲法曰朔實四象之䇿曰平會朔實三十九萬八千六百六十三通法萬三千五百平會二十九餘七千一百六十三蕙田案以萬萬通平會餘滿通法得五千三百有五萬九千二百五十九竒强於大衍弱於正光五代史司天考王朴欽天術朔率二十一萬二千六百二秒二十八統法七千二百通法一百秒盈通法從分分盈統法從日朔䇿二十九分三千八百二十秒二十八蕙田案以萬萬通朔䇿分秒滿統法得五千三百有五萬九千四百四十四竒强於大業戊辰所定數弱於宣明宋史志崇天術朔實三十一萬二千七百二十九樞法一萬五百九十朔䇿二十九餘五千六百一十九蕙田案以萬萬通朔策餘滿樞法得五千三百有五萬九千四百九十竒强於欽天弱於宣明明天術朔實一百一十五萬一千六百九十三元法三萬九千朔策二十九餘二萬六百九十三蕙田案以萬萬通朔䇿餘滿元法得五千三百有五萬八千九百七十四竒强於元嘉弱於祖沖之甲子元術觀天術朔實三十五萬五千二百五十三統法一萬二千三十朔䇿二十九餘六千三百八十三蕙田案以萬萬通朔䇿餘滿統法得五千三百有五萬九千有一十九竒强於明天弱於祖沖之甲子元術紀元術朔實二十一萬五千二百七十八日法七千二百九十朔䇿二十九餘三千八百六十八蕙田案以萬萬通朔䇿餘滿日法得五千三百有五萬八千九百八十四竒强於明天弱於觀天統元術朔實二十萬四千六百四十七元法六千九百三十朔䇿二十九日餘三千六百七十七蕙田案以萬萬通朔䇿餘滿元法得五千三百有五萬九千一百六十三竒强於祖沖之甲子元術弱於大衍乾道術朔實八十八萬五千九百一十七秒七十六元法三萬秒法百朔䇿二十九日餘一萬五千九百一十七秒七十六蕙田案以萬萬通朔䇿餘滿元法得五千三百有五萬九千二百强於統天弱於大衍淳熙術朔實一十六萬六千五百五十二秒五十六元法五千六百四十秒法一百朔䇿二十九日餘二千九百九十二秒五十六蕙田案以萬萬通朔䇿餘滿元法得五千三百有五萬九千五百七十四竒强於姜岌甲子元術弱於皇極會元術朔率一百一十四萬二千八百三十四統率三萬八千七百朔策二十九日餘二萬五百三十四蕙田案以萬萬通朔䇿餘滿統率得五千三百有五萬九千四百三十一竒强於正元術弱於大業戊辰所定數統天術朔實三十五萬四千三百六十八䇿法萬二千朔䇿二十九餘六千三百六十八蕙田案以萬萬通朔䇿餘滿䇿法得五千三百有六萬六千六百六十六竒强於張賓所造法弱於四分開禧術朔率四十九萬九千六十七日法一萬六千九百朔䇿二十九餘八千九百六十七蕙田案以萬萬通朔䇿餘滿日法得五千三百有五萬九千一百七十一竒强於統元弱於乾道金史志大明術朔實一十五萬四千四百四十五分日法五千二百三十分朔䇿二十九日餘二千七百七十五分蕙田案以萬萬通朔䇿餘滿日法得五千三百有五萬九千二百七十八竒强於崇元弱於正光元史志庚午元術同大明授時術朔實二十九萬五千三百五分九十三秒日周一萬分朔策二十九日五千三百五分九十三秒蕙田案以萬萬進之為五千三百有五萬九千三百强於乾道弱於正光新法書西史依巴谷考騐一十二萬六千七日四刻實兩交食各率齊同之距也凡為交會者四千二百六十七為法而一得會望䇿二十九日五十刻一十四分三秒蕙田案以法推得小餘五千三百有五萬九千三百與授時同又案今時憲書改定朔策為二十九日五三五九五三以萬萬進之為五千三百有五萬九千有五十三强於觀天弱於祖沖之甲子元術右朔實後漢書志賈逵論曰今史官推合朔弦望月食加時率多不中在於不知月行遲疾意李梵蘇統以史官候注考校月行當有遲疾不必在牽牛東井婁角之間宋書志劉洪造乾象法又制遲疾法以步月行元嘉二十年何承天進元嘉術表曰月有遲疾日月蝕不在朔望非法意也故元嘉皆以盈縮定其小餘以正朔望之日錢樂之嚴粲奏曰承天法每月有頻三大頻二小比舊法殊為異舊日蝕不唯在朔亦有在晦及二日公羊傳所謂或失之前或失之後愚謂此一條自宜仍舊員外散騎郎皮延宗又難承天若晦朔定大小餘紀首值盈則退一日便應以故嵗之晦為新紀之首承天乃改新法依舊術不復每月定大小餘如延宗所難太史所上北齊書方技列傳信都芳私撰書名為靈憲算月有頻大頻小食必以朔證據甚甄明每云何承天亦為此法不能精靈憲若成必當百代無異議書未就而卒唐書志傅仁均戊寅元術月有三大三小孝孫使算學博士王孝通以甲辰術法詰仁均曰平朔定朔舊有二家三大三小為定朔望一大一小為平朔望日月行有遲速相及謂之合會晦朔無定由時消息若定大小皆在朔者合會雖定而蔀元紀首三端并失若上合履端之始下得歸餘於終合會有時則甲辰元術為通術矣仁均對曰書云季秋月朔辰弗集於房孔氏云集合也不合則日蝕可知又云先時者殺無赦不及時者殺無赦既有先後之差是知定朔矣詩云十月之交朔日辛卯又春秋傳曰不書朔官失之也自後術差莫能詳正故秦漢以來多非朔食宋御史中丞何承天㣲欲見意不能詳究乃為散騎侍郎皮延宗等所抑孝通之語乃延宗舊説治數之本必推上元日月如合璧五星如連珠夜半甲子朔旦冬至自此七曜散行不復餘分普盡總會如初唯朔分氣分有可盡之理因其可盡即有三端此乃紀其日數之元爾或以為即夜半甲子朔冬至者非也冬至自有常數朔名由於月起月行遲疾匪常三端安得即合故必須日月相合與至同日者乃為合朔冬至耳大衍術合朔議曰虞􅒠曰所謂朔在會合茍躔次既同何患於頻大也日月相離何患於頻小也春秋日蝕不書朔者八公羊曰二日也穀梁曰晦也左氏曰官失之也劉孝孫推俱得朔日以丘明為是乃與劉焯皆議定朔為有司所抑不得行傅仁均始為定朔而曰晦不東見朔不西脁元史志古法謂月平行十三度十九分度之七漢耿夀昌以為日月行至牽牛東井日過度月行十五度至婁角始平行赤道使然賈逵以為今合朔弦望月食加時所以不中者盖不知月行遲疾意李梵蘇統皆以月行當有遲疾不必在牽牛東井婁角之間乃由行道有逺近出入所生劉洪作乾象術精思二十餘年始悟其理列為差率以囿進退損益之數後之作術者咸因之至唐一行考九道委蛇曲折之數得月行疾徐之理先儒謂月與五星皆近日而疾逺日而遲數家立法以入轉一周之日為遲疾二術各立初末二限初為益末為損在疾初遲末其行度率過於平行遲初疾末率不及於平行自入轉初日行十四度半强從是漸殺積七日適及平行度謂之疾初限其積度比平行餘五度四十二分自是其疾日損又積七日行十二度㣲强向之益者盡損而無餘謂之疾末限自是復行遲度又積七日適及平行度謂之遲初限其積度比平行不及五度四十二分自此其遲日損行度漸増又歴七日復行十四度半强向之益者亦損而無餘謂之遲末限入轉一周實二十七日五十五刻四十六分遲疾極差皆五度四十二分舊法日為一限皆用二十八限今定驗得轉分進退時各不同今分日為十二共三百三十六限半之為半周限析而四之為象限梅氏文鼎曰月行遲疾一周之日數内分四限入轉初日太隂行最疾積至六日八十餘刻而復於平行謂之疾初限厥後行漸遲積至十三日七十七刻竒而其遲乃極謂之疾末限於是太隂又自最遲以復於平行亦六日八十餘刻謂之遲初限厥後行又漸疾亦積至十三日七十七刻竒其疾乃極如初日矣謂之遲末限合而言之共二十七日五十五刻四十六分而遲一周謂之轉終也遲疾分限數何也太隂行天有遲疾其遲疾又有初末與太陽之盈縮同所不同者太陽之盈縮以半嵗周分初末而其盈縮之度止於二度竒太隂之遲疾以十三日七十七刻竒分初末而其遲疾之度至於五度竒疾初只六日八十八刻竒而疾五度遲初只六日八十八刻竒而遲五度術家以八百二十分為一限即八刻竒一日分十二限十二分而自朝至暮逐限之遲疾細分可得而求矣以右旋之度言之日每日平行一度月每日平行十三度有竒合朔時日月同度積弦策七日二八二六四八二五而月度超前離日一象限是為上弦又積弦策而月度離日半周天與日對度是為望自此以後月向日行又積弦策而距日一象限是為下弦更積弦策而月追日及之又復周度而為合朔矣凡此者皆有常度有常期故謂之經朔經望經弦也乃若定朔定望定弦則有時而後於常期故有加差焉有時而先於常期故有減差焉凡加差之因有二一因於日度之盈夫日行既越於常度則月不能及一因於月度之遲夫月行既遲於常度則不能及日二者皆必於常期之外更増時刻而後能及於朔望弦之度故時刻加也減差之因亦有二一因於日度之縮夫日行既緩於常度則月易及之一因於月度之速夫月行既速於常度則易及於日二者皆不待常期之至而已及於朔弦望之度故時刻減也乃若以日之盈遇月之遲二者皆宜有加差以日之縮遇月之疾二者皆宜有減差故盈與遲縮與疾並為同名而其度宜併若以日之盈遇月之疾在日宜加在月則宜減以日之縮遇月之遲在日宜減在月宜加故盈與疾縮與遲並為異名而其度宜相減用其多者為主也如上所論既以盈縮遲疾二差同名相從異名相消則加減差之大致已定然而又有乘除者上所言者度也非時刻也故必以此所得之度分即同名相從異名相消之度分用每限之時刻八百二十分乘之為實每限之月行度為法即遲疾行度除之即變為時刻而命之為加減差矣以異乘同除之理言之月行遲疾行度則所積時刻為八百二十分今加減之度有幾个遲疾行度則月行時刻亦當有幾个八百二十分故以此乘除而知加減差之時刻新法算引太隂之行參錯不一推步籌算為力倍艱苟或分秒乖違交食豈能宻合故必細審其行度所以然而後可立法致用也盖月較諸曜本旋之外行復多種第一曰平行一日十三度有竒但此行之界凡四一界是從某宮次度分起算此界定而不動二界為本天之最髙此非定界每日自順天右行七分有竒是月距本天最髙一日為十三度三分有竒也故其平行二十七日三十刻有竒為一周已復於宮次元度又必再行二十三刻有竒為二十七日五十三刻始能及於本天之最髙此行新法謂之月自行中法於此周謂之轉周滿一周謂之轉終其最髙則行八年有竒而周天謂之月孛三界為黄白二道相交之所所謂正交中交此界亦自有行乃逆行也自東而西每日三分有竒則月平行距正交一日為十三度十三分有竒至二十七日二十七刻減交行之一度二十三分得二十七日十五刻有竒月乃囘於元界術家謂之交終四界是與太陽去離太陽一日約行一度則太隂距太陽為十二度十分有竒至二十九日五十三刻有竒逐及太陽復與之會術家謂朔策是也凡上四行總歸第一平行其第二行曰小輪每一朔内行滿輪周二次每日為二十四度有竒若以不同心圈論此即太隂中距圈也因有此行復生第二損益加減分云第二者盖於朔望所用加減分外再加再減故也此行中法所無以上太隂諸行新法定其軌轍不外三者均圈一不同心圈一小輪一然不同心圈與小輪名異而理實同術家資以推算兩用互推所得之數正等也各朔後月夕西見遲疾不一甚有差至三日者其故有三一因月視行度視行為疾段則疾見遲段則遲見一因黄道升降或斜或正正必疾見斜必遲見一因白道在緯南緯北凡在緯北疾見緯南遲見也此外又有極出地之不同朦朧分與炁差諸異所以遲疾難齊也新法表異月與五星本輪之外皆有次輪所以行度益繁就月言之同心輪負本輪之心而右本輪又負次輪之心而左俱一周而復月復循次輪而右半周而復次輪半徑半於本輪半徑并之得五度弱為二弦唯朔望月在本輪内規不須次輪加減止一加減已足餘日則於一加減外另有二三均數多寡不等右月行遲疾五禮通考卷一百八十九
