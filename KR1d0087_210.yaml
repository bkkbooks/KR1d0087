body:
  text: 五禮通考卷二百刑部尚書秦蕙田撰嘉禮七十三觀象授時禮記月令疏案鄭目録云名曰月令者以其紀十二月政教之所行也本呂氏春秋十二月紀之首章也以禮家好事抄合之後人因題之名曰禮記言周公所作其中官名時事多不合周法此于别録屬明堂隂陽此卷所出解者不同案呂氏春秋篇首皆有月令與此文同是一證也又周無太尉惟秦官乃有太尉此月令云乃命太尉是官名不合周法二證也又秦以十月建亥為嵗首而月令云為來嵗受朔日即是九月為嵗終十月為受朔是時不合周法三證也又周有六冕郊天迎氣則用大裘乘玉輅建太常日月之章而月令服飾車旗並用時令是事不合周法四證也然案秦始皇十六年并天下以十月為嵗首時不韋已死五年不韋不得以十月為正又周書先有月令篇何得云不韋所造又秦并天下立郡何得云諸侯秦以好兵殺害毒被天下何能布德施惠春不典兵鄭必謂不韋作者不韋集諸儒所作為一代大典亦採擇善言遵立舊章但秦自不能依行何怪不韋所作也秦為水位其來已久案文公獲黑龍以為水瑞何怪未平天下前不以十月為嵗首乎陸氏德明曰此是呂氏春秋十二月紀之首後人刪合為此記蔡伯喈王肅云周公所作張子曰月令大率秦法然采三代之文而為之不無古意月令儘有美意未易可破若春行賞秋行刑止舉大綱如此如云冬日則飲湯夏日則飲水豈曰冬日不得飲湯夏日不得飲水也馬氏晞孟曰律象日月星辰敬授民時自堯以來未之有改也舜齊七政周用五紀其究一也蓋日月星辰之往來不窮進退相代終始相循天以是命萬物而人奉之為令亦因是也夏之政典先時與不及時其罪至于殺蓋欲百官萬民謹其令而順承之也月令一書亦後儒祖先王之餘而傅會成之髙氏曰月令一篇大體與洪範相通初一曰五行即月令金木水火土之運也次三曰農用八政即月令之勸課農桑聚畜財貨祭祀神祗安養民居習合禮樂逐捕姦慝敬禮賔客簡練師徒之意也次四日協用五紀即月令嵗月日星辰厯數之事也次六曰又用三德即月令布德行惠戮有罪嚴斷刑以順天時者也次七曰明用稽疑即月令命大史釁龜策占兆審卦吉凶是也次八曰念用庶徴即月令之風雨寒燠各以時若草木昆蟲各以時遂皆休徴也每時令錯行而有焱風暴雨大旱凶荒之類皆休徴也次九曰嚮用五福即月令養衰老禮賢者行爵出祿必推所尊禮者也至于威用六極即時令失宜民多疾疫遷徙流亡之類是也若夫人君于二至之時盡齋戒之誠止聲色薄滋味節嗜欲定心氣則所以涵養此心一毫無纍俾視聽言貌思之間有肅又哲謀聖之德而所謂五皇極者即月令每月之發政施令毋有不當毋有枉撓毋有差貸毋有阿黨舉歸于大中至正者皆是也然則合而論之謂之洪範散而舉之謂之月令故月令所以著入六經垂訓萬世者其在斯乎蔡氏德晉曰周禮內宰上春詔王后帥六宮之人而生穜稑之種而獻之于王龜人上春釁龜祭先卜筮人上春相筮牧師孟春焚牧大司馬仲春教振旅羅氏仲春羅春鳥獻鳩以養國老行羽物媒氏仲春令會男女籥章仲春晝逆暑內宰仲春詔后帥內外命婦治蠶于北郊司爟季春出火大司馬仲夏教茇舍山虞仲夏斬隂木大司樂夏日至于澤中方丘祭地司裘仲秋獻良裘王乃行羽物籥章仲秋夜迎寒司裘季秋獻功裘以待頒賜司爟季秋內火小司冦孟冬祀司民獻民數于王王拜受之大司馬仲冬教大閲大司樂冬日至于地上圜丘祀天占夢季冬聘王夢獻吉夢于王王拜而受之乃令萌干四方以贈惡夢皆月令所未及蕙田案周官為朝廷政治之典章藏于天府民間多未之見故孔子問禮必于柱下史官及漢滅秦蕭何收圖籍亦藏之祕閣至劉歆校書始得而上之不韋春秋祗集魯諸生所為宜其未及也孟春之月日在營室昏參中旦尾中其日甲乙注甲孚甲乙之言軋也其帝太皥其神勾芒其蟲鱗注象物孚甲將解鱗龍蛇之屬其音角律中太簇其數八注木生數三成數八言八者舉其成數其味酸其臭羶其祀户祭先脾東風解凍蟄蟲始振魚上氷獺祭魚鴻鴈來注皆記時候也夏小正正月啓蟄魚陟負氷漢始亦以驚蟄為正月中天子居青陽左個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達注皆所以順時氣也麥實有孚甲屬木羊火畜也時尚寒食之以安性也器疏者刻鏤之象物當貫土而出也是月也以立春先立春三日大史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春于東郊還反賞公卿諸侯大夫于朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常是月也天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒是月也天氣下降地氣上騰天地和同草木萌動注此陽氣蒸達可耕之候也王命布農事命田舍東郊皆修封疆審端徑術注田謂田畯主農之官也舍東郊順時氣而居以命其事也術周禮作遂夫間有遂遂上有徑善相邱陵阪險原隰土地所宜五穀所殖以教道民必躬親之田事既飭先定凖直農乃不惑注説所以命田舍東郊之意也是月也命樂正入學習舞乃修祭典命祀山林川澤犧牲毋用牝注為傷妊生之類禁止伐木注盛德所在母覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵注為傷萌幼之類毋聚大衆毋置城郭注為妨農之始掩骼埋胔注謂死氣逆生也是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀孟春行夏令則雨水不時草木早落國時有恐注已之氣乘之也行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興注甲之氣乘之也行冬令則水潦為敗霜雪大摰首種不入注亥之氣乘之也施疏從上以來論當月令之事若施之順時則氣序調釋若施令失所則災害滋興故此論政失致災之事皇氏侃曰金木水火得土而成水數一得土數五故六火數二得土數五為成數七木數三得土數五為成數八金數四得土數五為成數九陳氏祥道曰日以辰為子辰以日為母母為幹子為支月令言日而不言辰者以辰統于日故也古者祭祀必有配四時迎氣不可以無配也五帝以德五神以功馬氏晞孟曰味生于形臭生于氣故形成而後有味氣化而後有臭春以陽中生木木成形而曲直曲直作酸故其味酸物以木化則其氣為羶秋以隂中生金金成形而從革從革作辛故其味辛物以金化則其氣為腥夏以陽極生火火成形而炎上炎上作苦故其味苦物以火化則其氣為焦冬以隂極生水水成形而潤下潤下作醎故其味醎物以水化則其氣為朽中央以隂陽之中氣生土土成形而可以稼穡稼穡作甘故其味甘物以土化則其氣為香土主四時而分王焉故五味以甘為主五臭以香為主方氏慤曰凍結于重隂之時東風蓋發散之氣也東風既解凍則物之藏于密者起而振潛于深者躍而上矣德令慶惠出于君而布和行施以下及者相也德主于宣利故曰布令貴于無乖故曰和慶則必致用故曰行惠則必有與故曰施慶主禮施主物度土而積謂之封界畫以守謂之疆封疆久則壞故曰修髙曰邱平而可陵曰陵陂而不平曰阪水所行曰險廣平曰原下濕曰隰所宜若山林宜皂川澤宜􅐤所殖若黍宜髙燥稌宜下濕教之使能其事道之使達其理十有二月之令行乎天地之間人君奉之以成位乎中也苟當此一月之中而行彼三時之令則是變天之道絶地之理亂人之紀矣故三者之災以類應焉何也氣之所召者然耳蕙田案古人以啓蟄為正月之候雨水為二月之候夏小正正月啓蟄左傳啓蟄而郊月令孟春之月蟄蟲始振是啓蟄在正月其改啓蟄為驚蟄以漢初避景帝諱故也月令仲春之月始雨水是雨水在二月也鄭氏云漢始以驚蟄為正月中雨水為二月節正義云太初以後更改氣名以雨水為正月中驚蟄為二月節迄今不改案漢書載三統術正月驚蟄二月雨水與月令同而班固注云驚蟄今曰雨水雨水今曰驚蟄然則太初以後之術仍是先驚蟄後雨水至東漢行四分術乃更其先後耳易通卦驗周書時訓解淮南子天文訓俱先雨水後驚蟄緯書出於東漢時訓一篇亦後人所託惟淮南子係武帝時書疑亦後人以時術追改之非淮南之舊也唐初傅仁均戊寅術李淳風麟德術用古法以啓蟄在雨水之前開元修大衍術復以雨水為寅月中驚蟄為卯月節至今因之周書所記七十二候於二月不取始雨水者既以雨水為正月中氣則不得以紀二月之候故也又案孟春行夏令之類自當主人君政令失時而言蓋天人一理也天道錯而人事應君政失而天變應上下相通之機感移至速洪範之咎徴與月令所言其理如合符節或乃指此為迂怪之説以為天之時令錯行非人事之失慢矣又案唐石經月令正月之節日在虛昏昴中曉心中斗建寅位之初正月中氣日在危昏畢中曉尾中斗建寅位之中改旦為曉避睿宗諱也所記中星與此不同者蓋據當時測驗改之後皆放此唐本又有是月也命有司祭風師是月也命有司釁龜策占兆審卦吉凶其移孟冬釁龜一條於此月則用鄭氏注也淮南子東方木也其帝太皥其佐句芒執規而治春其神為嵗星其獸蒼龍孟春之月招搖指寅盛德在木東風解凍蟄蟲始振蘇魚上負氷獺祭魚候雁北服八風水爨萁燧火東宮御女青色衣青彩鼓琴瑟其兵矛其畜羊朝於青陽左個以出春令布德施惠行慶賞省徭賦立春之日天子親率三公九卿大夫以迎嵗於東郊修除祠位幣禱鬼神犧牲用牡正月官司空其樹楊蕙田案淮南時則訓與月令文多同今取其異者附于每月之後王居明堂禮出十五里迎嵗易通卦驗立春雨水降條風至雉雊雞乳氷解正月中猛風至獺祭魚倉庚鳴泛勝之農書土長冒橛陳根可拔耕者急發孝經鈎命訣先立春七日敕獄吏決詞訟有罪當入無罪當出立春敕門欄無扄鑰以迎春之精下弓戴楯鼓示時聲動昆蟲也仲春之月日在奎昏弧中旦建星中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中夾鐘其數八其味酸其臭羶其祀户祭先脾始雨水桃始華倉庚鳴鷹化為鳩注皆記時候也漢始以雨水為二月節天子居青陽大廟乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達是月也安萌芽養幼少存諸孤注助生氣也擇元日命民社命有司省囹圄去桎梏毋肆掠止獄訟注順陽寬也是月也元鳥至注元鳥燕也至之日以太牢祠于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出注又記時候發猶出也先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災注主戒婦人有娠者也日夜分則同度量鈞衡石角斗甬正權概注因晝夜等而平當平也同角正皆謂平之也是月也耕者少舍乃修闔扇寢廟畢備注因蟄蟲啓户耕事少間而治門户也毋作大事以妨農之事注大事兵役之屬是月也毋竭川澤毋漉陂池毋焚山林注順陽養物也天子乃鮮羔開氷先薦寢廟上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之仲丁乃命樂正入學習樂是月也祀不用犧牲用圭璧更皮幣注為季春將選而合騰之也更猶易也當祀者告以玉帛而已仲春行秋令則其國大水寒氣總至冦戎來征注酉之氣乘之也行冬令則陽氣不勝麥乃不熟民多相掠注子之氣乘之也行夏令則國乃大旱暖氣早來蟲螟為害注午之氣乘之也馬氏晞孟曰始雨水隂陽交而成和也凡植物始茁為萌浸長為芽動物始生為幼未壯為少植物欲其無踐履故曰安動物欲其無殄滅故曰養朱氏申曰鷹以秋殺仲春仁氣盛故化為鳩方氏慤曰日陽也夜隂也陽長而隂消則日長夜短隂長而陽消則夜長日短皆非隂陽之中也春秋之分隂陽適中而日夜無長短之差故言日夜分春分以陽為主故繼言雷乃發聲秋分以隂為主故繼言雷始收聲乃者繼事之辭始者肇事之辭始必有終終則有始故也川澤之物非竭其水則不可以盡取故曰竭陂池之物漉之以網罟則可以盡之矣故曰漉毋竭川澤毋漉陂池主漁者言之毋焚山林主田者言之蕙田案淮南子髙誘注耕者少舍言耕皆出在野少有在都邑者也與鄭氏注異尚書仲春平秩東作詩四之日舉趾則建卯之月正耕作之時未可云稍休也髙説較長又案唐月令二月之節日在營室昏東井中曉箕中斗建卯位之初二月中氣日在奎昏東井中曉南斗中斗建卯位之中又有是月也祀朝日于東郊是月也命有司祭馬祖淮南子仲春之月招搖指卯桃李始華蟄蟲咸動蘇二月官倉其樹杏王居明堂禮帶以弓韣禮之禖下其子必得天材易通卦驗二月候雁北驚蟄大壯初九桃始華倉庫多火詩泛律樞梅柳驚春羊牛來暮説文祀髙禖以請子請子必以乙至之日者春分來秋分去開生之候鳥帝少昊司命之官也季春之月日在胃昏七星中旦牽牛中其日甲乙其帝太皥其神句芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀户祭先脾桐始華田鼠化為鴽虹始見萍始生注皆記時候也鴽鴾母螮蝀謂之虹天子居青陽右個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達是月也天子乃薦鞠衣于先帝命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乘舟薦鮪于寢廟乃為麥祈實注於含秀求其成也是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內注時可宣出不可收斂也句屈生者芒而直曰萌天子布德行惠命有司發倉廩賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞注溝瀆與道路不得不通所以除水潦便民事也田獵罝罘羅網畢翳餧獸之藥毋出九門注為鳥獸方孚乳傷之逆天時也是月也命野虞毋伐桑柘注愛蠶食也鳴鳩拂其羽戴勝降于桑注蠶將生之候也鳴鳩飛且翼相擊趨農急也戴勝織紝之鳥是時恆在桑具曲植蘧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心是月之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之是月也乃合纍牛騰馬遊牝于牧犧牲駒犢舉書其數命國難九門磔攘以畢春氣季春行冬令則寒氣時發草木皆肅國有大恐注丑之氣乘之也行夏令則民多疾疫時雨不降山陵不收注未之氣乘之也行秋令則天多沈隂淫雨蚤降兵革並起注戌之氣乘之也陳氏祥道曰孟春生氣未盛之時故命相布德施惠而已季春生氣方盛之時故天子布德行惠焉孟春兼言布令行慶而此言德惠者詳在于臣要在于主也陸氏佃曰桐始華蔡雍曰木之後華者也稚之故曰始王城面各三門南北九經東西九緯若今朱雀門三經經各一門是也毋出九門謂毋出此門也馬氏晞孟曰田鼠化為鴽則隂類之慝者遷乎陽而其性和也萍始生則隂物之浮以承陽者也方氏慤曰虹者天地訌潰之氣隂干陽所乃見而出故又謂之蝀焉氣以有所干而交以無所干而辨季春則隂陽向乎交矣故始見孟冬則隂陽極乎辨矣故藏而不見也陳氏澔曰在內則命有司奉行在外則勉諸侯奉行凡此皆天子之德惠吳氏澄曰南三門王之正門平日罝罘之物皆不得出餘門則出此月則皆禁之蕙田案九門呂氏春秋作國門唐石經同鄭氏解九門謂路門應門雉門庫門臯門城門近郊門逺郊門關門然羅網毒藥豈宜出自路門又天子五門但云毋出臯門則路應雉庫已在其內矣合五門與郊關諸門以足九數殊覺牽強當以陸氏吳氏之説為是又案唐月令三月之節日在婁昏柳中曉南斗中斗建辰位之初三月中氣日在胃昏張中曉南斗中斗建辰位之中淮南子季春之月招搖指辰行是月令甘雨至三旬三月官鄉其樹李王居明堂禮季春出疫于郊以攘春氣泛勝之農書三月榆莢雨髙地疆土可種术孟夏之月日在畢昏翼中旦婺女中其日丙丁注丙之言炳也萬物皆炳然著見而強大其帝炎帝其神祝融其蟲羽注象物從風鼓翼飛鳥之屬其音徴律中中呂其數七注火生數二成數七但言七者亦舉其成數其味苦其臭焦其祀竈祭先肺螻蟈鳴蚯蚓出王瓜生苦菜秀注皆記時候也螻蟈蛙也王瓜萆挈也天子居明堂左個乘朱路駕赤駵載赤旗衣赤衣服赤玉食菽與雞其器髙以粗注菽實孚甲堅合屬水雞木畜時熱食之亦以安性也粗猶大也器髙大者象物盛長是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏于南郊還反行賞封諸侯慶賜遂行無不欣説乃命樂師習合禮樂命太尉贊傑俊遂賢良舉長大注助長氣也三王之官有司馬無太尉秦官則有太尉今俗人皆云周公作月令未通于古行爵出祿必當其位是月也繼長增髙毋有壞墮注亦為逆時氣毋起土功毋發大衆注為妨蠶農之事毋伐大樹注亦為逆時氣是月也天子始絺注初服暑服命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都注急趨于農也是月也驅獸毋害五穀毋大田獵注謂傷蕃廡之氣農乃登麥天子乃以彘嘗麥先薦寢廟是月也聚畜百藥靡草死麥秋至注舊説云靡草薺葶藶之屬斷薄刑決小罪出輕繫注崇寬蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服是月也天子飲酎用禮樂孟夏行秋令則苦雨數來五穀不滋四鄙入保注申之氣乘之也行冬令則草木蚤枯後乃大水敗其城郭注亥之氣乘之也行春令則蝗蟲為災暴風來格秀草不實注寅之氣乘之也髙氏誘曰螻螻蛄蟈蝦蟇也四月隂氣始動于下故鳴王瓜色赤感火之色而生苦菜味苦感火之味而成張氏虙曰王瓜大瓜也種最多有大有小以大者為善方氏慤曰蚯蚓至隂之物感正陽之氣而出焉王爪南方之果也而其色赤苦菜南方之菜也故其味苦一則感火之色而生一則化火之味而秀太尉古司馬也司馬政官命之取人者取人將以為政故也王制言司馬辨論官材與此同意四時之田夏曰苖以其為苖除害故也故曰驅獸毋害五穀又曰毋大田獵者雖可田獵不可大為之也若秋獮冬狩則為大矣物感陽而生者則強而立感隂而生者則柔而靡謂之靡草則至隂之所生也故不勝至陽而死凡物生于春成于秋麥獨成于夏云麥秋者于時為夏于麥為秋也馬氏晞孟曰萬物所以長而髙者陽上逹故也長之髙之者天地繼之增之者人欲其長則勿壞欲其髙則勿墮起土功發大衆伐大樹皆所以壞墮之也徐氏師曾曰天氣始炎恐罪人之繫于圜土者或以鬱蒸而生疾故刑之薄者即斷決之不久繫也罪之小者即決遣之不收繫也繫之輕者即縱出之不復繫也今時熱審減刑即其制蕙田案唐月令四月之節日在昴昏翼中曉牽牛中斗建巳位之初四月中氣日在畢昏軫中曉須女中斗建巳位之中又云是月也命樂正習盛樂大雩帝命有司禱祠山川方之卿士有益于人者以祈穀實是月也命有司祀雨師其移仲夏大雩於此月亦用鄭説又以彘嘗麥之下多羞以含桃一句淮南子南方火也其帝炎帝其佐朱明執衡而治夏其神為熒惑其獸朱雀孟夏之月招搖指已盛德在火服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙其兵戟其畜雞朝于明堂左個以出夏令立夏之日天子親率三公九卿大夫以迎嵗于南郊還乃賞賜封諸侯修禮樂饗左右命太尉贊傑俊選賢良舉孝悌行爵出祿佐天長養四月官田其樹桃逸禮夏則衣赤衣佩赤玉乘赤輅駕赤龍載赤旗以迎夏于南郊其先祭黍與鳩居明堂正廟啓南户仲夏之月日在東井昏亢中旦危中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中蕤賔其數七其味苦其臭焦其祀竈祭先肺小暑至螳螂生鵙始鳴反舌無聲注皆記時候也螳螂螵蛸母也鵙博勞也反舌百舌鳥天子居明堂太廟乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗養壯佼注助長氣也是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益于民者以祈穀實農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟注此嘗雛也而云以嘗黍不以牲主穀也必以黍者黍火穀氣之主也含桃櫻桃也云疏如鄭此言黍非新成直取舊黍孟秋農乃登穀注黍稷于是始熟明仲夏未熟也令民毋艾藍以染注為傷長氣也此月藍始可别疏種藍之體初必叢生若及早栽移則有所傷損此月藍既長大始可分移布散毋燒灰注為傷火氣也毋暴布注不以隂功干太陽之事門閭毋閉關市毋索注順陽敷縱不難物挺重囚益其食注挺猶寬也遊牝别羣則縶騰駒班馬政是月也日長至隂陽爭死生分注爭者陽方盛隂欲起也分猶半也君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事無刑以定晏隂之所成鹿角解蟬始鳴半夏生木堇榮注又記時候也半夏藥草木堇王蒸也是月也毋用火南方注陽氣盛又用火于其方害微隂可以居髙明可以逺眺望可以升山陵可以處臺榭注順陽在上也仲夏行冬令則雹凍傷穀道路不通暴兵來至注子之氣乘之也行春令則五穀晚熟百螣時起其國乃飢注卯之氣乘之也行秋令則草木零落果實早成民殃於疫注酉之氣乘之也蔡氏雍曰此時黍新熟今蟬鳴黍是也許氏慎曰黍以暑得名小暑至農遂登黍髙氏誘曰雛新雞也毋燒炭草木未成不欲大物也是月炎氣盛猛布暴則脆傷之馬氏晞孟曰一隂生而慝作螳螂生則慝之有見于形者也鵙始鳴則慝之有聞于聲者也反舌無聲則以陽敷而作者以隂收而息門閭毋閉利宣也關市毋索不恃察以窮民隱也挺重囚益其食不以其罪廢不忍人之政也張氏虙曰火流則暑退暑極于火中此時方至也方氏慤曰隂陽爭者隂方來與陽始遇也仲冬亦言之者陽方來與隂始遇也陽主生隂主死微隂既生則萬物向乎死矣故死生之理於是分也君子以隂陽方爭故宜潔誠居內退聽以待其定也仲冬不言毋躁者暑為躁寒為靜故于此特戒之鹿陽類夏至感隂生而角解麇隂類冬至感陽生而角解言木堇别于堇草也蕙田案月令小暑至在仲夏之月日長至之前知古不以小暑為六月節逸周書時訓解又以此句為小滿後之第三候唐石經亦因之蓋因孟夏時候不足六數而取此以補之耳農乃登黍注疏以此時黍猶未熟故云舊黍蔡雍月令章句以蟬鳴黍當之則黍自别有一種先熟者二説不同但玩經文與農乃登麥農乃登穀之文一例當是新黍非舊黍蔡説較長毋燒灰淮南灰作炭呂氏春秋同以季秋草木黃落故伐薪為炭仲夏樹木方盛故禁燒炭其理亦可通也又案唐月令五月之節日在參昏角中曉危中斗建午位之初五月中氣日在東井昏亢中曉營室中斗建午位之中又云是月也祀皇地祗于方丘是月也命有司祭先牧又刪去農乃登黍天子以雛嘗黍一節以是月黍未熟也又改大雩帝及挺重囚兩條入孟夏之月而移孟夏聚畜百藥一條於此月淮南子仲夏之月招搖指午存鰥寡振死事禁民無發火五月官相其樹榆易通卦驗夏至小暑博勞鳴蝦蟇無聲博勞性好單棲其飛􅭙其聲嗅嗅夏至應隂而鳴冬至而止夏至人主從八能之士或調黃鐘或調六律或調五音或調五聲或調五行或調律紀或調隂陽或調正德所行作樂五日季夏之月日在柳昏火中旦奎中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鐘其數七其味苦其臭焦其祀竈祭先肺溫風始至蟋蟀居壁鷹乃學習腐草為螢注皆記時候也鷹學習謂攫搏也螢飛蟲螢火也天子居明堂右個乘赤路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗命漁師伐蛟取鼉登龜取黿命澤人納材葦是月也令四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福是月也命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等級之度是月也樹木方盛乃命虞人入山行木毋有斬伐注為其末堅刃也不可以興土功不可以合諸候不可以起兵動衆注土將用事氣欲靜毋舉大事以搖養氣注大事興徭役以有為毋發令而待以妨神農之事也注發令而待謂出徭役之令以豫驚民民驚則心動是害土神之氣土神稱曰神農者以其主于稼穡水潦盛昌神農將持功舉大事則有天殃是月也土潤溽暑注潤溽謂塗濕也大雨時行燒剃行水利以殺草如以熱湯注謂欲稼萊地先剃其草草乾燒之至此月大雨流水潦畜于其中則草死不復生而地美可稼也可以糞田疇可以美土疆季夏行春令則穀實鮮落國多風咳民乃遷徙注辰之氣乘之也行秋令則丘隰水潦禾稼不熟乃多女災注戌之氣乘之也行冬令則風寒不時鷹隼蚤鷙四鄙入保注丑之氣乘之也應氏鏞曰物得氣之先殺氣未肅而鷙猛之鳥已習于擊迎殺氣之微也涼氣未至而鳴隂之物已居于壁迎涼氣之微也方氏慤曰神農者農之神興農功而用之于明者人持農功而主之于幽者神水潦盛昌則百穀被其澤而向于成是神農將守其成也苟舉大事以妨之則是違神逆天而天之災適當之矣吳氏澄曰田疇謂熟耕而其田有界域者土疆謂耕難而其土磽確者蕙田案唐月令六月之節日在東井昏氐中曉東壁中斗建未位之初六月中氣日在柳昏尾中曉奎中斗建未位之中又唐本改命澤人納材葦入孟秋之月改命漁師伐蛟及令四監大合秩芻二節入季秋之月淮南子季夏之月招搖指未其位中央其日戊巳盛德在土其蟲螺其音宮律中黃鐘其數五其味甘其臭香其祀中霤祭先心涼風始至蟋蟀居奧鷹乃學習腐草化為蚈天子衣苑黃服八風水爨柘燧火中宮御女黃色衣黃采其兵劍其畜牛朝于中宮命滂人入材葦行惠令弔死問疾存視長老行桴鬻厚席蓐以送萬物歸也六月官少內其樹梓蕙田案淮南無中央令即見于季夏之月與月令異中央土注火休而盛德在土也其日戊巳注戊之言茂也巳之言起也萬物皆枝葉茂盛其含秀者抑屈而起其帝黃帝其神后土其蟲倮注象物露見不隱藏虎豹之屬恆淺毛其音宮律中黃鐘之宮其數五注土生數五成數十言五者土以生為本其味甘其臭香其祀中霤祭先心天子居太廟大室乘大路駕黃駵載黃旗衣黃衣服黃玉食稷與牛其器圜以閎注稷五穀之長牛土畜也器圜者象土周布于四時閎謂中寬象土含物張子曰五行之氣分主四時上周多于四者然其運行之氣則均同中央土在季夏之末者以易言之八卦之位坤居西南當離兊之間離兊則金火也是以在季夏之末吳氏澄曰倮人類也人類之貴于羽毛鱗介猶土之尊于木火金水也蕙田案唐月令有是月也祀黃帝于南郊淮南子中央土也其帝黃帝其佐后土執繩而治四方其神為鎮星其獸黃龍孟秋之月日在翼昏建星中旦畢中其日庚辛注庚之言更也辛之言新也萬物皆肅然改更秀實新成其帝少皥其神蓐收其蟲毛注象物應涼氣而備寒狐貉之屬生旃毛者其音商律中夷則其數九注金生數四成數九但言九者亦舉其成數其味辛其臭腥其祀門祭先肝涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮注皆記時候也寒蟬寒蜩謂霓也鷹祭鳥者將食之示有先也既祭之後不必盡食若人君刑戮之而已天子居總章左個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器廉以深注麻實有文理屬金犬金畜也器廉以深象金傷害物入藏是月也以立秋先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親率三公九卿諸候大夫以迎秋於西郊還反賞軍帥武人于廟天子乃命將帥選士厲兵簡練桀俊專任有功以征不義詰誅暴慢以明好惡順彼逺方是月也命有司修法制繕囹圄具桎梏禁止姦慎罪邪務搏執注順秋氣政尚嚴命理瞻傷察創視折注理治獄官也有虞氏曰士夏曰大理周曰司冦審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以嬴是月也農乃登穀天子嘗新先薦寢廟注黍稷之屬于是始熟命百官始收斂注順秋氣收斂物完隄防謹壅塞以備水潦修宮室壞牆垣補城郭注象秋收斂物當藏也是月也毋以封諸侯立大官毋以割地行大使出大幣孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃來注亥之氣乘之也行春令則其國乃旱陽氣復還五穀無實注寅之氣乘之也行夏令則國多火災寒熱不節民多瘧疾注巳之氣乘之也馬氏晞孟曰涼風至則天地之仁氣散矣白露降則隂乘陽而其候交矣寒蟬鳴則物之生於暑者其聲變矣鷹乃祭鳥用始行戮則時主殺而物之司殺者應是而動也于是可以設罻羅矣方氏慤曰穀謂稷也孟夏之麥仲秋之麻季秋之稻皆穀獨于稷言穀以稷為五穀之長也稼穡之官謂之后稷土穀之神謂之社稷皆以此爾蕙田案命理瞻傷察創視折審斷當於斷字絶句蔡雍云皮曰傷肉曰創骨曰折骨肉皆絶曰斷蓋此四者其受傷有輕重之殊故曰瞻曰察曰視曰審亦有深淺之别刑官相驗之法大略盡于此矣注疏本以審斷決為句陳氏澔集説亦同惟陸佃吳澄徐師曾皆從蔡氏今從之又案唐月令七月之節日在張昏尾中曉婁中斗建申位之初七月中氣日在張昏箕中曉昴中斗建申位之中又唐本于具桎梏下有斷薄刑決小罪六字無禁止姦以下三十一字蓋因鄭氏注以純陽之月斷刑決罪為非故移置此月也又于命百官始收斂下增入命澤人納材葦六字無完隄防以下十字又毋以封諸侯一條唐本亦無之淮南子西方金也其帝少昊其佐蓐收執矩而治秋其神為太白其獸白虎孟秋之月招搖指申盛德在金服八風水爨柘燧火西宮御女白色衣白采撞白鐘其兵戈其畜狗朝于總章左個以出秋令求不孝不悌戮暴傲悍而罰之以助損氣行是月令涼風至三旬七月官庫其樹楝尚書大傳天子以秋命三公將帥選士厲兵以征不義決獄訟斷刑罰趣收斂以順天道以佐秋殺詩記律樞蟋蟀在堂流火西也立秋促織鳴女工急促之候也春秋考異郵立秋趣織鳴尚書考靈曜虛為秋後昴為冬期隂氣相佐德乃不邪子助毋教母合子符仲秋之月日在角昏牽牛中旦觜觹中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中南呂其數九其味辛其臭腥其祀門祭先肝盲風至鴻雁來元鳥歸羣鳥養羞注皆記時候也盲風疾風也歸謂去蟄也羞謂所食也天子居總章太廟乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器廉以深是月也養衰老授几杖行糜粥飲食乃命司服具飭衣裳文繡有恆制有大小度有長短衣服有量必循其故冠帶有常乃命有司申嚴百刑斬殺必當毋或枉橈枉橈不當反受其殃是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗天子乃難以達秋氣以犬嘗麻先薦寢廟注麻始熟也是月也可以築城郭建都邑穿竇窖修囷倉注為民將入物當藏也乃命有司趣民收斂務畜菜多積聚注始為禦冬之備乃勸種麥毋或失時其有失時行罪無疑注麥者接絶續乏之穀尤重之是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸注又記時候也雷始收聲在地中動內物也壞益也蟄蟲益户謂稍小之也涸竭也此甫八月中雨氣未止而云水竭非也周語曰天根見而水涸天根見九月末也日夜分則同度量平權衡正鈞石角斗甬是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂凡舉大事毋逆大數必順其時慎因其類仲秋行春令則秋雨不降草木生榮國乃有恐注卯之氣乘之也行夏令則其國乃旱蟄蟲不藏五穀不生注午之氣乘之也行冬令則風災數起收雷先行草木蚤死注子之氣乘之也方氏慤曰盲者閉暗之稱當建酉闔户之月故其風謂之盲風又謂之閶闔元鳥至以陽中故歸以隂中也羞謂所美之食養之以備冬藏也陳氏澔曰水本氣之所為春夏氣至故長秋冬氣返故涸徐氏師曾曰農事畢故可以興土功城郭都邑功之作于上者竇窖囷倉功之作于下者蕙田案唐月令八月之節日在翼昏南斗中曉畢中斗建酉位之初八月中氣日在軫昏南斗中曉東井中斗建酉位之中又唐本有是月也命樂正習吹上丁釋奠于國學天子乃率公卿大夫親往視之是月也命有司上戊釋奠于太公廟是月也擇元日命人社是月也祀夕月于西郊是月也命有司享夀星于南郊是月也命有司祭馬社自乃命司服以下三十二字及命有司趣民收斂務蓄菜俱改入季秋之月築城郭以下四句易關市以下九句俱改入孟冬之月淮南子仲秋之月招搖指酉涼風至候雁來元鳥歸羣鳥翔八月官尉其樹柘王居明堂禮仲秋九門磔攘以發陳氣禦止疾疫仲秋農隙民畢入于室曰時殺將至毋罹其災仲秋乃命國醵春秋感精符八月白露降鶴即髙鳴相警季秋之月日在房昏虛中旦栁中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝鴻雁來賔爵入大水為蛤鞠有黃華豺乃祭獸戮禽注皆記時候也來賔言其客止未去也大水海也戮猶殺也天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器廉以深是月也申嚴號令命百官貴賤無不務內以會天地之藏無有宣出注內謂收斂入之也會猶聚也乃命冢宰農事備收舉五穀之要藏帝藉之收于神倉祇敬必飭是月也霜始降則百工休注寒而膠漆之作不堅好也乃命有司曰寒氣總至民力不堪其皆入室上丁命樂正入學習吹是月也大饗帝嘗犧牲告備于天子合諸侯制百縣為來嵗受朔日與諸侯所稅于民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私注秦以建亥之月為嵗首于是嵗終使諸侯及鄉遂之官受此法焉是月也天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設于屏外司徒搢撲北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽于四方是月也草木黃落乃伐薪為炭注伐木必因殺氣蟄蟲咸俯在內皆墐其户注墐謂塗閉之辟殺氣乃趣獄刑毋留有罪注殺氣已至有罪者即決也收祿秩之不當供養之不宜者注天氣殺而萬物咸藏可以去之也是月也天子乃以犬嘗稻先薦寢廟注稻始熟也季秋行夏令則其國大水冬藏殃敗民多鼽嚏注未之氣乘之也行冬令則國多盜賊邊境不寧土地分裂注丑之氣乘之也行春令則暖風來至民氣解惰師興不居注辰之氣乘之也方氏慤曰萬物皆華于陽獨鞠華于隂故言有春秋傳曰有者不宜有也獨言其色者其色正應隂之盛也陳氏澔曰雁以仲秋者為主季秋後至者為賔如先登者為主人從之以至者為客也專務收斂諸物于內以合天地閉藏之令也宣出則悖時矣張氏虙曰為政無取乎督促獄刑則惡乎留滯入秋以來孟月則嚴之仲月又申嚴之季月乃趣之桎梏之苦箠楚之痛望而畏之此豈可留者易曰山上有火旅先王以明慎用刑而不留獄旅不處也聖人以不留獄象之信矣欽定義疏月令紀雁為詳以生于隂而能從陽故重之重之故詳之十二月雁北鄉則七月南鄉可知鄉之未啓行也正月鴻雁歸啓行未至北也八月鴻雁來啓行未至南也九月則若賔之至矣九月來賔則三月至其鄉可知詳于南其所見也略于北其所不見也于北曰鄉曰歸歸其鄉也于南曰來曰來賔客之也蕙田案髙誘注淮南子云賔爵老雀也栖息于人房户之間有似賔客故云賔爵春秋正義引張叔皮論有賔爵下革田鼠上騰之語蓋主髙氏與注疏不同未知孰是又案唐月令九月之節日在角昏牽牛中曉東井中斗建戌位之初九月中氣日在氐昏須女中曉柳中斗建戌位之中又唐本有是月也命有司伐蛟取鼉登黿取龜是月也命有司具飭衣裳文繡有恆衣服有量冠帶有常必循其故是月也命有司合秩芻以養犧牲以供皇天上帝名山大川四方之神以祠宗廟社稷之靈為人祈福是月也趣人收斂務蓄菜而無為來嵗受朔日教田獵趣獄刑收祿秩不當供養不宜諸文淮南子季秋之月招搖指戌九月官候其樹桃王居明堂禮季秋除道致梁以利農詩記律樞天霜樹落葉而鴻雁南飛春秋感精符霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威若政令苛則夏霜誅伐不行則冬霜不殺草孟冬之月日在尾昏危中旦七星中其日壬癸注壬之言任也癸之言揆也萬物懷任于下揆然萌芽其帝顓頊其神元冥其蟲介注介甲也象物閉藏地中龜鱉之屬其音羽律中應鐘其數六注水生數一成數六但言六者亦舉其成數其味鹹其臭朽其祀行祭先腎水始氷地始凍雉入大水為蜃虹藏不見注皆記時候也大水淮也大蛤曰蜃天子居元堂左個乘元路駕鐵驪載元旗衣黑衣服元玉食黍與彘其器閎以奄注黍秀舒散屬火寒時食之亦以安性也彘水畜也器閎而奄象物閉藏也是月也以立冬先立冬三日大史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬于北郊還反賞死事恤孤寡是月也命太師釁龜策占兆審卦吉凶注周禮龜人上春釁龜謂建寅之月也秦以其嵗首使太史釁龜與周異矣是察阿黨則罪無有掩蔽是月也天子始裘注九月授衣至此可以加裘命有司曰天氣上騰地氣下降天地不通閉塞而成冬注使有司助閉藏之氣命百官謹蓋藏命司徒循行積聚無有不斂壞城郭戒門閭修鍵閉慎管籥固封疆備邊竟完要塞謹關梁塞徯徑飭喪紀辨衣裳審棺槨之薄厚塋丘壟之大小髙卑厚薄之度貴賤之等級注此亦閉藏之具順時飭正之也是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情是月也大飲蒸天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之天子乃命將帥講武習射御角力是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦注因盛德在水收其稅孟冬行春令則凍閉不密地氣上泄民多流亡注寅之氣乘之也行夏令則國多暴風方冬不寒蟄蟲復出注巳之氣乘之也行秋令則霜雪不時小兵時起土地侵削注申之氣乘之也方氏慤曰氷即水也水以陽釋氷以隂凝凍氣閉而陽不能熙也孟冬重隂之始故言水始氷地始凍焉水虞即周禮澤虞漁師即周禮漁人命是二官者各以其職故也仲秋言行罪無疑無疑未至于無赦也失時之罪小故止于無疑取怨之罪大故曰無赦馬氏晞孟曰雉火屬蜃水屬陽不勝隂而並與遷焉故化虹以隂于陽故見至是陽升隂降而弗通故藏蕙田案唐月令十月之節日在房昏虛中曉張中斗建亥位之初十月中氣日在尾昏危中曉翼中斗建亥位之中又唐本有是月也可以築城郭造宮室穿竇窖修囷倉是月也祭神州地祗于北郊是月也命有司祭司寒是月也命有司祭司中司命司人司祿是月也易關市來征旅納貨賄以便人事四方來集逺鄉皆至則財不匱上無乏用百事乃遂是月也命有司秫稻必齊麴蘖必時湛齊必潔水泉必香陶器必良火齊必得兼用六物酒官監之無有差貸其移仲冬乃命大酋一節于此月則取豳詩十月穫稻為此春酒之文也又改太史釁龜入孟春之月改天子祈來年于天宗命將帥講武習射御角力入季冬之月淮南子北方水也其帝顓頊其佐元冥執權而治冬其神為辰星其獸元武孟冬之月招搖指亥盛德在水服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鎩其畜彘朝于元堂左個以出冬令命有司修羣禁禁外徙閉閭大摉客斷罰刑殺當罪阿上亂法者誅十月官司馬其樹檀王居明堂禮孟冬之月命農畢積聚繫牧牛馬尚書大傳天子以冬命三公并固封境以望冬固地藏也逸禮冬則衣黑衣佩元玉居明堂後廟啓北户仲冬之月日在斗昏東壁中旦軫中其日壬癸其帝顓頊其神元𡨕其蟲介其音羽律中黃鐘其數六其味鹹其臭朽其祀行祭先腎氷益壯地始坼鶡旦不鳴虎始交注皆記時候也鶡旦求旦之鳥也交猶合也天子居元堂太廟乘元路駕鐵驪載元旗衣黑衣服元玉食黍與彘其器閎以奄飭死事注飭軍事戰必有死志命有司曰土事毋作慎毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月注暢猶充也太隂用事尤重閉藏是月也命奄尹申宮令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸天子命有司祈祀四海大川名源淵澤井泉注順其德盛之時祭之也是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰注此收斂尤急之時人有取者不罪所以警懼其主也山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦注務收欱野物也是月也日短至隂陽爭諸生蕩注爭者隂方盛陽欲起也蕩謂物動萌芽也君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定藝始生荔挺出蚯蚓結麋角解水泉動注又記時候也藝香草也荔挺馬薤也水泉動潤上行日短至則伐木取竹箭注此其堅成之極時是月也可以罷官之無事去器之無用者注謂先時權所建作者也天地閉藏而萬物休可以去之塗闕廷門閭築囹圄此以助天地之閉藏也注順時氣也仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲注午之氣乘之也行秋令則天時雨汁瓜瓠不成國有大兵注酉之氣乘之也行春令則蝗蟲為敗水泉咸竭民多疥癘注卯之氣乘之也髙氏誘曰始坼凍裂也鶡旦山鳥陽物也是月隂盛故不鳴虎陽中之隂隂氣盛以類發也朱子曰暢月謂陽久屈而得伸也張氏虙曰寒氣增于地之上故氷益壯暖氣生于地之下故凍者圻遊惰之民為人所取上未嘗加問惡其惰也勤力之民為人侵奪上為之罪其人喜其勤也上之示民好惡者如此馬氏晞孟曰夏為正陽隂始間之冬為正隂陽始間之有爭道焉于冬至曰諸生蕩見陽足以勝隂于夏至曰死生分見隂之來不過與陽為敵而已陳氏澔曰此與夏至同而有謹之至者仲夏之隂猶微陽未至于甚傷此時之隂猶甚微陽當在于善保故也方氏慤曰藝荔挺皆香草凡物之氣感隂者腥感陽者香蚯蚓感正陽之氣而後出故微陽始生而猶結言形之未解也是月隂極而終故氷益壯陽生而始故水泉動壯其形然動其氣然也蕙田案呂氏春秋淮南子唐月令俱無飭死事三字朱子定以為衍文蓋因孟冬有賞死事之文誤重出于此又案唐月令十一月之節日在箕昏營室中曉軫中斗建子位之初十一月中氣日在南斗昏東壁中曉角中斗建子位之中又唐本有是月也祀昊天上帝于圜丘是月也命有司祭馬步自乃命大酋以下改入孟冬之月又刪去命之曰暢月句省婦事毋得淫句及塗闕庭門閭三句淮南子仲冬之月招搖指子十一月官都尉其樹棗易通卦驗荔挺不出則其國多火災冬至之前五日商賈不行兵甲仗匿人主與羣臣左右從樂冬至日使八能之士鼓黃鐘之琴瑟用槐木長八尺一寸冬至之日立八神樹八尺之表日中視其晷晷如度者則嵗美人和不則嵗惡人惑晷入則水晷退則旱進二寸則月食進尺則日食孝經援神契仲冬昴星中取莒芋季冬之月日在婺女昏婁中旦氐中其日壬癸其帝顓頊其神元冥其蟲介其音羽律中大呂其數六其味鹹其臭朽其祀行祭先腎雁北鄉鵲始巢雉雊雞乳注皆記時候也雊雉鳴也天子居元堂右個乘元路駕鐵驪載元旗衣黑衣服元玉食黍與彘其器閎以奄命有司大難旁磔出土牛以送寒氣征鳥厲疾注殺氣當極也征鳥題肩也或名曰鷹仲春化為鳩乃畢山川之祀及帝之大臣天之神祗是月也命漁師始漁天子親往乃嘗魚先薦寢廟注此時魚潔美氷方盛水澤腹堅命取氷注腹厚也此月日在北陸氷堅厚之時也氷以入令告民出五種命農計耦耕事修耒耜具田器注明大寒既過農事將起也命樂師大合吹而罷乃命四監收秩薪柴以共郊廟及百祀之薪燎是月也日窮于次月窮于紀星回于天數將幾終注言日月星辰運行于此月皆周匝于故處也次舍也紀會也嵗且更始專而農民毋有所使注言專一女農民之心令之豫有志于耕稼之事不可徭役徭役之則志散失業也天子乃與公卿大夫共飭國典論時令以待來嵗之宜注周禮以正月為之建寅而縣之今用此月則所因于夏殷也乃命太史次諸侯之列賦之犧牲以共皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰列卿大夫至于庶民土田之數而賦犧牲以供山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀季冬行秋令則白露早降介蟲為妖四鄙入保注戌之氣乘之也行春令則胎夭多傷國多固疾命之曰逆注辰之氣乘之也行夏令則水潦敗國時雪不降氷凍消釋注未之氣乘之也馬氏晞孟曰雁北鄉則順陽而復也雉火畜也感于陽而後有聲雞木畜也麗于陽而後有形方氏慤曰氷之入也為隂事之終種之出也為陽事之始以氷入之期而告民出五種終則有始也蕙田案唐月令十二月之節日在南斗昏奎中曉亢中斗建丑位之初十二月中氣日在須女昏婁中曉氐中斗建丑位之中又唐本有命將帥講武習射御角力乃教田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設于屏外有司搢撲北面以誓之天子乃厲飾執弓挾矢以獵命有司修祭禽之禮天子乃䄍百神于南郊為來年祈福于天宗命有司出土牛以示農耕之早晚是月也合諸侯制百縣為來嵗受朔日與諸侯所稅于人輕重之法貢職之數以逺近土宜為度以給郊廟之事無有所私其移季秋頒朔于此月者以頒朔當在嵗終也移孟冬祈年天宗於此月亦以祈年當在嵗終也唐本又刪去乃畢山川之祀以下三句乃命同姓之邦以下六句淮南子季冬之月招搖指丑雁北鄉鵲始巢雉雊雞呼卵十二月官獄其樹櫟王居明堂禮季冬命國為酒以合三族君子説小人樂説文冬至後三戌為臘祭百神也易通卦驗小寒虎始交豺祭獸鵲者陽鳥先物而動先時而應見于木風之象尚書大傳東方之極自碣石東至日出榑桑之野帝太皥神句芒司之自冬日至數四十六日迎春于東堂距邦八里堂髙八尺堂階八等青稅八乘旗旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也孟春之月御青陽左個禱用牡索祀于艮隅貌必恭厥休時雨朔令曰挺羣禁開閉闔通窮窒達障塞待優其禁毋伐林木仲春之月御青陽正室牲先脾設主于户索祀于震正朔令曰棄怒惡解役罪免優患休罰刑閉關梁其禁田獵不宿飲食不享出入不節奪民農時及有姦謀季春之月御青陽右個薦用鮪索祀于巽隅朔令曰宣庫財和外怨撫四方行柔惠止剛強九門磔禳出役于郊以禳春氣南方之極自北户南至炎風之野帝炎帝神祝融司之自春分數四十六日迎夏于南堂距邦七里堂階七等赤稅七乘旗旐尚赤田車載弓號曰助天養倡之以徴舞之以鼓鞉迎夏之樂也孟夏之月御明堂左個嘗麥用彘索祀于巽隅視必明厥休時煥朔令曰爵有德賞有功惠賢良舉力農其禁毋隳隄防仲夏之月御明堂正室牲先肺設主于竈索祀于離正朔令曰振貧窮惠孤寡慮囚疾出大祿行大賞其禁棄法律逐功臣殺太子以妾為妻乃令民雩季夏之月御明堂右個牲先心設主于中霤索祀于坤隅思必睿厥休時風朔令曰起毁宗立無後封廢國立賢輔恤喪疾中央之極自崑崙中至大室之野帝黃帝神后土司之土王之日禱用牲迎中氣于中室樂用黃鐘之宮為民祈福命世婦治服章令民雩其禁治宮室飾臺榭內淫亂犯親戚侮父兄西方之極自流沙西至三危之野帝少皥神蓐收司之自夏日至數四十六日迎秋于西堂距邦九里堂髙九尺堂階九等白稅九乘旌旄尚白田車載兵號曰助天收倡之以商舞之以干戚此迎秋之樂也孟秋之月御總章左個嘗穀用犬索祀于坤隅言必從厥休時㿩朔令曰審用法備盜賊禁姦邪飾羣牧謹貯聚其禁毋弛戎備仲秋之月御總章正室牲先肝設主于門索祀于兑正朔令曰謹功築遏溝瀆修囷倉決刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊境乃令民畋醵庶氓畢入于室曰時殺將至毋罹其災季秋之月御總章右個薦用田禽索祀于乾隅朔令曰除道路守門閭陳兵甲戒百官誅不法除道成梁以利農夫北方之極自丁令北至積雪之野帝顓頊神元冥司之自秋分數四十六日迎冬于北堂距邦六里堂髙六尺堂階六等黑稅六乘旗旄尚黑田車載甲鐵號曰助天誅倡之以羽舞之以干戈此迎冬之樂也孟冬之月御元堂左個祈年用牲索祀于乾隅聽必聰厥休時寒朔令曰申羣禁修障塞畢積聚繫牛馬收澤賦其禁無作淫巧仲冬之月御元堂正室牲先腎設主于井索祀于坎正朔令曰搜外徒止夜禁誅詐偽省醖釀謹閉關其禁簡宗廟不禱祠廢祭祀逆天時乃令民罷土功季冬之月御元堂右個薦用魚索祀于艮隅朔令曰省牲牷修農器收秸薪築囹圄謹蓋藏乃大儺以禳疾命國為酒以合三族君子説小人樂蕙田案此洪範五行傳篇中之文與月令大同又案四仲之月索祀于震離兊坎四正四孟四季之月索祀于艮巽坤乾四隅此以後天八卦方位定四方其實四隅之祭各有不同孟春之艮兼寅季冬之艮兼丑季春之巽兼辰孟夏之巽兼已季夏之坤兼未孟秋之坤兼申季秋之乾兼戌孟冬之乾兼亥也後世術家以八卦配干支定為二十四干去戊巳土無正位也八卦去子午卯酉坎離震兊四正也或疑後天卦位出于方外陳摶之傳而未信之難與語仰觀俯察之妙矣逸周書時訓解立春之日東風解凍又五日蟄蟲始振又五日魚上氷風不解凍號令不行蟄蟲不振隂姦陽魚不上氷甲胄私藏雨水之日獺祭魚又五日鴻雁來又五日草木萌動獺不祭魚國多盜賊鴻雁不來逺人不服草木不萌動果蔬不熟驚蟄之日桃始華又五日倉庚鳴又五日鷹化為鳩桃不始華是謂陽否倉庚不鳴臣不主鷹不化鳩寇戎數起春分之日元鳥至又五日雷乃發聲又五日始電元鳥不至婦人不雷不發聲諸侯民不始電君臣威震清明之日桐始華又五日田鼠化為鴽又五日虹始見桐不華嵗有大寒田鼠不化鴽國多貪殘虹不見婦人苞亂穀雨之日萍始生又五日鳴鳩拂其羽又五日戴勝降于桑萍不生隂氣憤生鳴鳩不拂其羽國不治兵戴勝不降于桑正教不中立夏之日螻蟈鳴又五日蚯蚓出又五日王瓜生螻蟈不鳴水潦淫漫蚯蚓不出嬖奪后王瓜不生困于百姓小滿之日苦菜秀又五日靡草死又五日小暑至苦菜不秀賢人潛伏靡草不死國縱盜賊小暑不至是謂隂慝芒種之日螳螂生又五日鵙始鳴又五日反舌無聲螳螂不生是謂隂息鵙不始鳴令姦壅逼反舌有聲佞人在側夏至之日鹿角解又五日蜩始鳴又五日半夏生鹿角不解兵戈不息蜩不鳴貴臣放逸半夏不生民多癘疾小暑之日溫風至又五日蟋蟀居壁又五日鷹乃學習溫風不至國無寬教蟋蟀不居壁急迫之暴鷹不學習不備戎盜大暑之日腐草化為螢又五日土潤溽暑又五日大雨時行腐草不化為螢穀實鮮落土潤不溽暑物不應罰大雨不時行國無恩澤立秋之日涼風至又五日白露降又五日寒蟬鳴涼風不至無嚴政白露不降民多邪病寒蟬不鳴人皆力爭處暑之日鷹乃祭鳥又五日天地始肅又五日禾乃登鷹不祭鳥師旅無功天地不肅君臣乃農不登穀暖氣為災白露之日鴻雁來又五日元鳥歸又五日羣鳥養羞鴻雁不來逺人背畔元鳥不歸家室離散羣鳥不養羞下臣驕慢秋分之日雷始收聲又五日蟄蟲培户又五日水始涸雷不始收聲諸侯淫佚蟄蟲不培户靡有賴水不始涸甲蟲為害寒露之日鴻雁來賔又五日爵入大水化為蛤又五日菊有黃華鴻雁不來小民不服爵不入大水失時之極菊無黃華土不稼穡霜降之日豺乃祭獸又五日草木黃落又五日蟄蟲咸俯豺不祭獸爪牙不良草木不黃落是為愆陽蟄蟲不咸俯民多流亡立冬之日水始氷又五日地始凍又五日雉入大水為蜃水不氷是為隂負地不始凍咎徴之咎雉不入大水國多淫婦小雪之日虹藏不見又五日天氣上騰地氣下降又五日閉塞而成冬虹不藏婦不專一天氣不上騰地氣不下降君臣相嫉不閉塞而成冬母后淫佚大雪之日鶚鳥鳴又五日虎始交又五日荔挺生鶚鳥不鳴虎不始交荔挺不生卿士專權冬至之日蚯蚓結又五日麋角解又五日水泉動蚯蚓不結君政不行麋角不解兵甲不藏水泉不動隂不承陽小寒之日雁北鄉又五日鵲始巢又五日雉始雊雁不北鄉民不懷土鵲不始巢國不寧雉不始雊國大水大寒之日雞始乳又五日鷙鳥厲疾又五日水澤腹堅雞不始乳淫女亂男鷙鳥不厲國不除兵水澤不腹堅言乃不從王氏應麟曰周書時訓雨水之日獺祭魚驚蟄之日桃始華易通卦驗先雨水後驚蟄此漢太初後術也又案三統術穀雨三月節清明中而時訓通卦驗清明在穀雨之前與今術同然則二書皆作于劉歆之後時訓非周公書明矣是以朱子集儀禮取夏小正而不取時訓蕙田案逸周書本非古書而時訓一篇尤為淺陋蓋漢儒剽取月令之文分為七十二候傅會以占驗之説後之術家言五日一候者率凖乎此唐開元中御定月令乃以竄入禮記正文無識甚矣月令以天時草木鳥獸記每月之候此古法也每月中少者四五候多者七八候節氣與中氣交則候隨應之豈有五日而一候應又五日而一候應之理乎又每月既定為六候不可增多故仲夏則去木堇榮一候仲秋則去盲風至一候仲冬則去氷益壯地始坼藝始生三候矣亦不可減少故孟夏則以次月之小暑至補之而與月令之文相矛盾矣孟秋則以天地始肅為一候孟冬則以天氣上騰地氣下降與閉塞而成冬分為二候然月令所云天氣下降地氣上騰天地和同未嘗以紀孟春之候何獨於此月紀之且閉塞而成冬即上騰下降之驗尤不可分為兩事其支離雜湊如此至占驗之法出于讖緯家言尤無可取也右時令下後漢書禮儀志每月朔旦太史上其月律有司侍郎尚書見讀其令奉行其政宋書禮志漢制太史每嵗上其年律先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御座尚書令以下就席位尚書三公郎中以令置案上奉以先入就席伏讀訖賜酒一巵通典魏明帝景初元年通事奏曰前後但見讀四時令至于服黃之時獨闕太史令髙堂隆以為黃屬土也土旺四季各十八日土生于火故于火用事之末服黃三季則否其令則隨時不以土行為令也是以服黃無令斯則魏代不讀大暑令也宋書禮志晉成帝咸和五年六月有司奏讀秋令侍中散騎侍郎荀奕兼黃門侍郎散騎侍郎曹宇駮曰尚書三公曹奏讀秋令儀注新荒以來舊典未備臣等參議光祿大夫華恆議武皇帝以秋夏盛暑常闕不讀令在春冬不廢也夫先王所以順時讀令蓋後天而奉天時正服尊嚴之所重今服章多闕如比熱隆赫臣等謂可如恆議依故事闕而不讀詔可六年三月有司奏今月十六日立夏案五年三月門下駮依武皇夏闕讀令今正服漸備四時讀令是祗述天和隆赫之道謂今故宜讀夏令奏可宋太祖常讀土令三公郎中每讀時令皇帝臨軒百僚備位多震悚失常儀唯世祖世劉協太宗世謝緯善於其事人主及公卿並屬目稱歎隋書禮儀志北齊制立春日皇帝服通天冠青介幘青紗袍佩蒼玉青帶青袴青襪舄而受朝于太極殿西廂東向尚書令等坐定三公郎中詣席跪讀時令訖典御酌巵酒置郎中前郎中拜還席伏飲禮成而出立夏至立秋則施御座于中楹南向立冬如春東向各以其時之服色儀並如春禮通典唐貞觀十一年復修四時讀令開元十六年命太常少卿韋縚每月進月令一篇是後孟月朔日御宣政殿側置一榻東西置案令韋縚坐而讀之諸司長官亦升殿列坐聽焉嵗除罷之杜氏佑曰讀時令非古制也自東漢始焉其後因而沿襲案太宰職正月之吉懸治象之法於象魏使人觀之又春官太史頒告朔于邦國玉藻復云聽朔于南門之外並無讀時令故事而辟閭仁諝云元日受朝讀令此則聽朔禮畢合于玉藻之文王方慶雖有所駮大旨與仁諝不異皆臆説也凡言時者謂四時耳若正月之朔讀令則合云嵗令何以謂之時邪其夏秋冬又何為不讀邪則辟閭輩誤矣開元禮皇帝於明堂讀五時令陳設禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍直長施大次于青龍門外道北南向仲春于青陽太廟季春于青陽右個孟夏于朱雀門外道東西向仲夏于明堂太廟季夏于明堂右個孟秋于白虎門外道北南向仲秋于總章太廟季秋于總章右個孟冬于元武門外道西東向仲冬于元堂太廟季冬于元堂右個尚舍奉御設御座守宮設文武官次于大次之後文官在左武官在右俱南向夏俱西向秋俱北向冬俱東向設羣官次于璧水東門之外夏南門之外秋西門之外冬北門之外文官在北夏在東秋在南冬在西武官在南夏在西秋在北冬在東俱西上夏北上秋東上冬南上前一日尚舍奉御設御幄座于青陽左個仲春于青陽太廟季春于青陽右個孟夏于明堂左個仲夏于明堂太廟季夏于明堂右個季夏土王日讀土令于太廟太室孟秋于總章左個仲秋于總章太廟季秋于總章右個孟冬于元堂左個仲冬于元堂太廟季冬于元堂右個近西東向夏近北南向秋近東西向冬近南北向守宮設三品以上及諸司長官坐于堂上文官于御座東北武官于御座東南俱重行西上夏北上秋東上冬南上無官長者次官一人升判官不合設刑部郎中讀令座于御座東南北向有案夏西南東向秋西北南向冬東北西向設文官解劍席于