夏北面位秋東面位冬南面位上公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止羣官立定典儀曰再拜贊者承傳凡典儀有詞贊者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王等升俯伏興又侍中稱制曰可侍中詣左個東北南面夏東南西面秋西南北面冬西北東面稱詔延公王等升俯伏興又侍中典儀承傳堂下贊者又承傳在位皆再拜典謁者以次引西面位者夏典謁引北面位者秋引東面位者冬引南面位者各詣其階公初行樂作至解劍席樂止公王以下俱升席跪解劍俯伏興脫舄通事舍人各引升立于座後刑部郎中奉案進立于卯陛下侍中跪奏請讀月令俯伏興侍中稱有制曰可侍中退復位刑部郎中再拜就解劍席跪解劍俯伏興脫舄取令持案者仍立于下通事舍人引刑部郎中奉令升自卯陛詣席南北向跪置令于案俯伏興立于席後堂上典儀唱就座公王以下及刑部郎中並就座俯伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下及刑部郎中以令置于案與羣官俱跪佩劍俯伏興納舄典謁各引還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜典謁引西面位者出夏北面秋東面冬南面公初行樂作出門樂止侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝與太樂令令撞黃鐘之鐘右五鐘皆應太和之樂作皇帝降座御輿出之便次警蹕侍衛如來儀出門樂止典謁引南北面位者以次出夏引東西面秋引南北面冬引西東面春令其文具小戴禮篇故不繁載鑾駕還宮皇帝既還大次持節版奏請解嚴將士不得輒離部位皇帝停大次一刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴五刻頃捶三鼓為三嚴謁者贊引各引羣官序立于次前文武侍臣詣大次奉迎乘黃令進金輅于大次門外南向夏北向秋西向冬東向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝御輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如來儀黃門侍郎贊者夾引千牛將軍夾路而趨至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承詔退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬訖黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鼓傳音鑾駕動鼓吹振作而還文武羣官皆從如來儀鑾駕至承天門外侍臣下馬所鑾駕停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞蕤賔之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戞敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東閣回輅南向侍中進當鑾駕前跪奏稱臣某言請降輅俯伏興還侍位皇帝降輅御輿以入繖扇侍衛警蹕如常儀侍臣從至閣戞敔樂止初文武羣官至朝堂通事舍人承旨敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所皇帝於太極殿讀五時令禮部尚書先讀令三日奏讀時令承以宣告前一日尚舍奉御設御幄座于太極殿北廂南向尚舍直長設一品以下五品以上及諸司長官座于殿上文東武西重行相向北上無長官者次官一人升判官不合設刑部郎中讀令座于御座西南東向有案去御座二丈設解劍席于東西階下如常儀太樂令展宮懸于殿庭設舉麾位于殿西階之東西向一位于樂懸東南西向並如朔朝之儀典儀設文武三品以上及應升殿者位于南橫街之南道東設武官位于道西俱每等異位重行北向相對為首非升殿者位于殿庭文東武西如常設典儀位于北橫街之南贊者二人在南差退俱西向奉禮設門外位文官于東朝堂近南西面武官于西朝堂近南東面每等異位重行北上俱依刻諸衛勒所部屯門列仗及陳于殿庭如常文武官依時刻集朝堂俱就便次各服其服侍中量時版奏請中嚴鈒戟近仗入陳于殿庭太樂令帥工人入就位協律郎就舉麾位諸侍衛之官入服其器服符寶郎奉寶詣閣奉迎典儀帥贊者入就位典謁引羣官各就門外位刑部郎中以時令置於案覆以帊令史二人俱公服對舉案立于右延明門內道北郎中立于案後東面典謁者引非升殿者入就位侍中版奏外辦皇帝服通天冠絳紗袍御輿出自西房曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂皇帝出自西房即御座南向坐符寶郎奉寶置于御座如常儀偃麾戞敔樂止典儀一人升就東階上西面立侍臣夾侍如常儀典謁引公王以下入就北面位公初入門舒和之樂作至位樂止羣官立定典儀曰再拜贊者承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王以下等升俯伏興又侍中稱制曰可侍中詣東階上西向稱詔延公王等升殿上典儀承傳階上贊者又承傳在位者皆再拜典謁以次引北面位者詣東西階公初行樂作至解劍席樂止公王以下俱升席跪解劍俯伏興脫舄通事舍人以次引升殿者立于座後刑部郎中引案進立于西階下侍中跪奏請讀時令俯伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劍席跪解劍俯伏興脫舄取令持案者仍立于階下通事舍人引刑部郎中奉令升自西階詣席西東向跪置令于案俯伏興立于席後殿上典儀唱就座公王以下及刑部郎中並就座俯伏興刑部郎中讀令每句一絶使言聲可了讀令訖殿上典儀唱可起公王以下皆起通事舍人引公王以下及刑部郎中退降刑部郎中以令置于案興羣官俱跪佩劍俯伏興納舄典謁各司還本位典儀曰再拜在位者皆再拜典謁引北面位者出持令案者自右延明門而出侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞蕤賔之鐘左五鐘皆應太和之樂作皇帝降座御輿入自東房警蹕侍衛如來儀從至閣樂止典謁引東西面位者以次出讀夏令與春令同讀秋令與冬令同設刑部郎中讀令座于御座東南西向令案立于右延明門內道北郎中立于案後西面升階自東階餘與讀春令同皇帝若御翼善冠則羣官皆袴褶服陳解劍席若不設樂懸去警蹕通典乾元二年十二月丙寅立春御宣政殿命太常卿于休烈讀春令常參官五品以上正員並升殿與坐右後漢至唐讀時令五禮通考卷二百
