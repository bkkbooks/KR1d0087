body:
  text: 五禮通考卷二百四十五刑部尚書秦蕙田撰軍禮十三馬政下宋史兵志太祖初置左右飛龍二院以左右二使領之太平興國五年改為天廏坊雍熙四年改為騏驥院左右天駟監四左右天廏坊二皆𨽻焉真宗咸平三年置羣牧使以內臣勾當制置羣牧司京朝官為判官景德二年改諸州牧龍坊悉為監賜名鑄印以給之在外之監十有四大名曰大名洺州曰廣平衛州曰淇水並分第一第二河南曰洛陽鄭州曰原武同州曰沙苑相州曰安陽澶州曰鎮寧邢州曰安國中牟曰淳澤許州曰單鎮四年以知樞密院陳堯叟為羣牧制置使副都監判官凡廏牧之政皆出于羣牧司自騏驥而下皆聽命焉諸州有牧監知州通判兼領之蕙田案此宋初牧監之法馬政以牧監為上國無養馬之費馬有蕃息之功外此而市馬茶馬猶可權宜行之若户馬保馬社馬則皆使民養之于是民纍深而馬政亦壞矣其故皆由牧監之廢故首著之文獻通考太祖始置養馬二務又興葺舊馬務四以為牧放之地分遣中使詣邊州嵗市馬自是間廏之馬始備矣凡市馬之處河東則府州岢嵐軍陜西則秦渭涇原儀環慶階文州鎮戎軍川峽則益黎戎茂雅夔州永康軍皆置務遣官以主之嵗得五千餘匹以布帛茶他物凖其直招馬之處秦渭階文之吐蕃回紇麟府之黨項豐州之藏才族環州之白馬鼻家保家名市族洎涇儀延鄜火山保安軍唐龍鎮制勝開之諸蕃每嵗皆給空名敕書委沿邉長吏擇牙吏入蕃招募給券以詣京師至則估馬司定其直宋史兵志太平興國四年太宗觀兵于幽得汾晉燕薊之馬四萬二千餘匹內皂充牣始分置諸坊名臣奏議太宗端拱元年國子博士李覺上奏曰臣聞冀北燕代馬之所生戎之所恃也故制敵之用實資騎兵為急議者以為欲國之多馬在乎啖戎以利使重譯而至焉然市馬之費嵗益而廏牧之數不加者蓋失其生息之理也且戎人畜牧轉徙馳逐水草騰駒遊牝順其物理由是浸以蕃滋也暨乎市易之馬至于中國則縶之維之飼以枯稿離析牝牡制其生性元黃豗隤因而減耗宜然矣又不同中國之馬服習成性食枯芻處華廏率以為常故多生息古者用賦之法六十四井出戎馬四匹天子畿方千里出戎馬四萬匹兵車萬乘此賦馬之數也諸侯大者馬四千匹車千乘故稱千乘之國卿大夫大者馬四百匹兵車百乘故稱百乘之家則天下之廣諸侯之衆戎馬之賦多矣是以唐堯暨晉皆處河北而無邊患由馬之多後世戎馬悉從官給是以胸奴為患由馬之少也故朝錯説文帝勸農功令民有車騎馬一匹者復卒三人謂免三人甲卒之賦也至武帝七十年間衆庶街巷有馬阡陌成羣乘牝字者擯而不得會聚此則馬皆生于中國不聞市之于戎也今軍伍中牝馬乘多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠養馬之卒有罪無利是以駒子生乃令嗅灰而死其後官司知有此蠧于是議及養駒之卒量給賞緡其如所賜無幾尚習前弊今切揣量國家所市戎馬直之少者匹不下二十千往來資給賜豫復在數外是貴市于外夷而賤棄于中國非理之得也國家縱未暇别擇牝馬以分蓄牧宜且減市馬之半直賜畜駒之將卒增為月給俟其後納馬即止焉則是貨不出國而馬者滋也大率牝馬二萬而駒收其半亦可嵗獲萬匹況復牝又生駒十數年間馬必倍矣真宗大中祥符元年立牧監賞罰之令外監息馬一嵗終以十分為率死一分以上勾當官罰一月俸餘等第決杖牧倍多而死少者給賞緡有差凡生駒一匹兵校而下賞絹一匹當是時凡內外坊監及諸軍馬凡二十餘萬匹飼馬兵校一萬六千三十八人每嵗京坊草六十六萬六千圍麩料六萬二千二百四石鹽油藥糖九萬五千餘斤石諸州軍不預焉左右騏驥六坊監止留馬二千餘匹皆春季出就牧孟冬則别其羸病就棧皂養飼其尚乘之馬唯備用者在焉文獻通考天禧初宰相向敏中言國馬之數方先朝倍多廣費芻粟若令羣牧司度數出賣散于民間緩急取之猶外廏耳是秋乃詔十三嵗以上配軍馬估直出賣蕙田案開國之始馬政必嚴承平之後馬多必變法省初費而變為賣馬馬政由是多故矣宋史兵志凡牧監之在河南北天禧後靈昌監為河決所衝至乾興天聖間兵久不試言者多以為牧馬費廣而亡補乃廢東平監以其地賦民五年廢單鎮監六年廢洛陽監于是河南諸監皆廢悉以馬送河北蕙田案開國之初習于軍旅每以馬政為重設監置牧馬必蕃庶及承平日久上下恬熙民不知兵往往以馬多為無補而専惜其費於是牧監漸廢及需馬之時馬不足用一切苟且之政行而馬益耗民益困此漢唐宋明之錮病前後一轍也名臣奏議仁宗四年知諫院余靖上奏略曰臣謹案詩書已來中國養馬蕃息故事乃知不獨出于戎狄也秦之先曰非子居犬丘好馬及畜善養息之周孝王召使主馬于汧渭之間馬大蕃息犬丘今之興平汧渭今之秦隴州界也周官校人之職春執駒以養血氣夏攻持以防蹄齧衛文公居河之湄以建其國而詩人歌之曰騋牝三千不言牡而言牝則牝為蓄息之本也衛則今之衛州也詩人又頌魯僖公能遵伯禽之業亦云駉駉牡馬魯今屬兖州左氏云冀之北土馬之所生即今鎮定并代皆其地也月令季春之月乃合纍牛騰馬遊牝于牧仲夏之月遊牝别羣則縶騰駒亦秦人之馬政也漢之太原有家馬廏一廏萬匹又樓煩元池皆出名馬即今之并嵐石隰界也武帝出攻胸奴官私馬十四萬匹于漢之馬最為多矣唐以沙苑監最為宜馬即今之同州也又案唐自貞觀至麟德中國馬四十萬匹開元中置七坊四十八監半在秦隴綏銀則知古來牧馬之政修之由人不在于地今之同州及太原巴東相衛邢洛皆有馬監其餘州軍牧地七百餘所乞敕于羣牧使副都監判官等內一員往監牧舊地相度水草揀擇孳生四逺牧放一依周官月令之法務令蕃息别立賞罰以明勸沮庶幾數年之後馬蓄蕃盛仁宗皇祐五年中書舍人丁度言祥符天聖間牧馬至十餘萬其後言者以天下無事不可虛費遂廢八監然猶秦渭環階麟府文州火山保德岢嵐軍嵗市馬二萬二百匹補京畿塞下之闕自西鄙用兵四年所收三萬而已馬少地間坊監誠可罷若賊平馬歸則不可闕今河北河東京東西淮南皆籍丁壯為兵請令民畜一戰馬者得免二丁仍不計資産以升户等則緩急有備而國馬蕃矣言不果行嘉祐中韓琦請括諸監牧地留牧外聽下戶耕佃遣都官員外郎髙訪等括河北得間田三千三百五十頃募佃嵗約得穀十一萬七千八百石絹三千二百五十匹草十六萬一千二百束羣牧司言諸監牧地間有水旱每監牧放外嵗刈白草數萬束以備冬飼今悉賦民異時監馬增多及有水旱無以轉徙牧放詔遣左右廂提點官相度除先被侵冒已根括出地權給租佃餘委羣牧司審度存留有間土即募耕佃五年群牧司言凡牧一馬往來踐食占地五十畝諸監既無餘地難以募耕請存留如故廣平廢監先賦民者亦乞取還乃詔河北京東牧監帳管草地自今母得縱人請射犯者論以違制文獻通考至和二年歐陽修上奏略曰今之馬政皆因唐制而今馬多少與唐不同者其利病甚多不可悉舉至于唐世牧地皆與馬性相宜西起隴右金城平涼天水外暨河曲之野內則岐豳涇寧東接銀夏又東至于樓煩皆唐養馬之地也以今考之或陷沒戎狄或已為民田皆不可復得惟聞今河東路嵐石之間山荒甚多及汾河之側草地亦廣其間草軟水甘最宜牧養往時河東軍馬常在此處牧放今馬數全少間地極多此乃唐樓煩監牧地也可以興制一監臣謂推迹而求之則天池三監之地尚冀可得又臣往年因奉使河東嘗行威勝以東及遼州平定東見其不耕之地甚多而河東一路山川深峻水草甚佳其地髙寒必宜馬性及京西路唐汝之間久荒之地其數甚廣欲乞更下河東京西轉運司差官就近于轄下訪求草地若可以興制新監則河北諸監內有地不宜馬處却可議行廢罷宋史兵志神宗熙寧元年手詔文彥博等曰方今馬政不修官吏無著效豈任不久而才不盡歟是何監牧之多官吏之衆而乏才之甚也昔唐用張萬嵗三世典羣牧恩信行乎下故馬政修舉後世稱為能吏今上自提總官屬下至坊監使臣既非銓擇而遷徙迅速謂之假道欲使官宿其業而盡其能不可得也為今之計者當簡其勞能進之以序自坊監而上至于羣牧都監皆課其功而第進之以為任事者勸焉于是樞密副使邵元請以牧馬餘田修稼政以資牧養之利而羣牧司言馬監草地四萬八千餘頃今以五萬馬為率一馬占地五十畝大名廣平四監餘田無幾宜且仍舊而原武單鎮洛陽沙苑淇水安陽東平等監餘良田萬七千頃可賦民以收芻粟從之已而樞密院又言舊制以左右騏驥院總司國馬景德中始增置羣牧使副都監判官以領廏牧之政使領雖重未嘗躬自巡察不能周知牧畜利病以故馬不蕃息今宜分置官局専任責成乃詔河南北分置監牧使以劉航崔台符為之又置都監各一員其在河陽者為孳生監凡外諸監並分屬兩使各條上所當行者諸官吏若牧田縣令佐並委監牧使舉劾専𨽻樞密院不領于羣牧制置時上方留意牧監地然諸監牧田皆寬衍為人所冒占故議者爭請收其餘資以佐芻粟言利者乘之始以增賦入為務二年詔括河南北監牧司總牧地舊籍六萬八千頃而今籍五萬五千餘數皆隱于民自是請以牧地賦民者紛然而諸監尋廢是嵗天下應在馬凡十五萬三千六百有竒文獻通考熙寧五年廢太原監七年廢東平原武監而合淇水兩監為一八年遂廢河南八監惟存河苑一監而兩監牧司亦罷河苑監先以𨽻陜西提舉監牧至是復屬之羣牧司云河北察訪使曾孝寬言慶律中嘗詔河北民户以物力養馬備非時官買乞參考申行之而户馬法始此自諸監既廢仰給市馬而義勇保甲馬復從官給議者常患國馬未備元豐三年春以王拱辰之請乃詔開封府界京東西河北陜西河東路州縣户各計資産市馬坊郭家産及三千緡鄉村五千緡若坊郭鄉村通及三千緡以上者各養一馬增倍者馬亦如之至三匹止馬以四尺三寸以上齒以八嵗以下為斷齒及十五嵗則更市如初提舉司籍記之於是諸道各以其數來上先是熙寧中嘗令德順軍蕃部養馬帝問其利害王安石對今坊監以五百緡乃得一馬若委之熙河蕃部決當不至重費蕃部以畜牧為生且其地宜馬誠為便利既而得駒痺劣亡失者責償蕃部苦之其法尋廢至是環慶路經略司復言已誘勸諸蕃部令養馬詔閲實及格者一匹支五縑鄜延秦鳯涇原路準此養馬之令復行蕃部矣宋史兵志保甲養馬者自熙寧五年始先是中書省樞密院議其事于上前文彥博吳充言國馬宜不可闕今法馬死者責償恐非民願安石以為令下而京畿投牒者已千五百戶決非出于驅迫持論益堅五月詔開封府界諸縣保甲願牧馬者聽仍以陜西所市馬選給之六年曾布等承詔上其條約凡五路義勇保甲願養馬者户一匹物力髙願養二匹者聽皆以監牧見馬給之或官與其直令自市毋或強與府界毋過三千匹襲逐盜賊之外越三百里者有禁在府界者免輸量草二百五十束加給以錢布在五路者嵗免折變緣納錢三等以上十戶為一保四等以下十戶為一社以待病斃逋償者保户馬斃保户獨償之社户馬斃社戶半償之嵗一閲其肥瘠禁苛留者凡十四條先從府界頒焉五路委監司經略司州縣更度之于是保甲養馬行于諸路矣文獻通考時河東騎軍有馬萬一千餘匹嵗番戍邊率十年而一周議者以為費廩食而多亡失乃行五路義勇保甲養馬法繼而兵部言河東正軍馬九千五百匹請權罷官給以義勇保甲馬五千補其闕合萬匹為額俟正軍不及五千始行給配事下中書樞密院議樞密院以為車騎國之大計不當専以一時省費輕議廢置且官養一馬嵗為錢二十七千民養一馬才免折變緣納錢六千五百計折米而輸其直為錢十四千四百餘皆出於民決非所願若芻秣失節或不善調習緩急無以應用況減馬軍五千匹即異時當減軍正數九千九百人又減分數馬三千九百四十匹邊防事宜何所取備若存官軍馬如故漸令民間從便牧養不必以五千匹為限於理為可而中書謂官養一匹以中價率之為錢二十三千募民養牧可省雜費八萬餘緡且使入中芻粟之家無以邀厚利計前二年官馬死倍於保甲馬而保甲有馬可以習戰禦盜公私兩利上竟從樞密院議河東騎軍得不減耗而民馬不至甚病者由帝獨斷之審也元豐六年提舉河東路保甲王崇極言請令本路保甲十分取二以教騎戰每官給二十五千令市一馬限以五千當得馬六千九百十有八匹為緡錢十七萬二千九百有五十詔以京東鹽息錢給之令崇極上所買數於是保甲皆兼市馬矣七年京東提刑霍翔請募民養馬蠲其賦役乃詔京東西路保甲免教閲每一都保養馬五十匹匹給十千限以京東十年京西十五年而數足置提舉保馬官京西吕公雅京東霍翔並領其事而罷鄉村先以物力養馬之令尚養戶馬者免保馬凡養馬免大小保長稅租支移每嵗春夫催稅甲頭盜賊備賞保丁巡宿凡七事於是京東西戶馬更為保馬矣宋史兵志公雅又令每都嵗市二十匹限十五年者促為二年半京西不産馬民貧乏益不堪詔如元令稍增其數公雅乃請每都嵗市八匹限以八年山縣限以十年翔又奏本路馬已及萬匹請令諸縣弓手各養一匹以贖失補之罪哲宗嗣位言新法之不便者以保甲為急乃詔曰京東西保馬期限極寬有司不務循守遂致煩擾先帝己嘗手詔詰責今又未能遵守其兩路市馬年限並如元詔尋又詔以兩路保馬分配諸軍餘數付太僕寺不堪支配者斥還民户而責官直翔公雅皆以罪去而保馬遂罷馬氏端臨曰熙寧五年所行者户馬也元豐七年所行者保馬也皆是以官馬責之於民令其守養戶馬則是蠲其科賦保馬則是蠲其征役法行之初民皆樂從初非官府抑逼夫樂從之説出於建議者之口未必有是事實然當時賦役必繁重故苟有一役於官而得以自免則亦不暇詳慮却顧而靡然從之及其久也馬之斃者賠償不訾奉行之吏務為苛峻於是重為民病矣蕙田案户馬保馬此令民養馬之弊政也馬氏之論極中當時議者之隱元祐初議興廢監以復舊制于是詔庫部郎中郭茂恂往視陜西河東所當置監尋又下河北陜西轉運提點刑獄司按行河渭并晉之間牧田以聞時已罷保甲教騎兵而還戶馬于民于是右司諫王巖叟言兵之所恃在馬而能蕃息之者牧監也昔廢監之初識者皆知十年之後天下當乏馬已而不待十年其弊已見此甚非國之利也乞收還戶馬三萬復置監如故監牧事委之轉運官而不専置使今鄆州之東平北京之大名元城衛州之淇水相州之安陽洺州之廣平監以及瀛定之間棚塞草地疆畫具存使臣牧卒大半猶在稍加招集則指顧之間措置可定而人免納錢之害國收牧馬之利豈非計之得哉又況廢監以來牧地之賦民者為害多端若復置監牧而收地入官則百姓戴恩如釋重負矣自是洛陽單鎮原武淇水東平安陽等監皆復初熙寧中併天駟四監為二而左右天廏坊亦罷至是復左右天廏坊紹聖初用事者更以其意為廢置而時議復變太僕寺言府界牧田占佃之外尚存三千餘頃議復畿內孳生十監後二年而給地牧馬之政行矣先是知任縣韓筠等建議凡授民牧田一頃為官牧一馬而蠲其租縣籍其髙下老壯毛色嵗一閲亡失者責償已佃牧田者依上養馬知邢州張赴上其説且謂授田一頃為官牧一馬較陜西沿邊弓箭手既養馬又戍邊者為優樞密院是其請且言熙寧中罷諸監以賦民嵗收緡錢至百餘萬元祐初未嘗講明利害惟務罷元豐熙寧之政奪己佃之田而復舊監桑棗井廬多所毁伐監牧官吏為費不資牧卒擾民棚井抑配為害非一蓋自復監以來臣僚屢陳公私之害若循元祐倉卒更張之法久當益弊且左右廂今嵗籍馬萬三千有竒堪配軍者無幾惟沙苑六千匹愈于他監今赴等所陳授田養馬既蠲其租不責以孳息而不願者無所抑勒又限以尺寸則緩急皆可用之馬矣乃下太僕寺應監牧州縣悉行之時殿中侍御史陳次升言給地牧馬其初始于邢州守令之請未嘗下監司詳度諸路各有利害既不可知民居與田相逺者難就耕牧一頃之地所直不多而亡失責償為錢四五十千必非人情所願言竟不行四年遂廢淇水單鎮安陽洛陽原武監罷提點所及左右廂惟存東平沙苑二監曾布自敘其事曰元祐中復置監牧兩廂所養馬止萬三千匹而不堪者過半今既以租錢置蕃落十指揮于陜西養馬三千五百又人户願養者亦數千而所存兩監各可牧萬馬馬數多于舊監而所省官吏之費非一近世良法未之能及時三省皆稱善其後沙苑復𨽻陜西買馬監牧司而東平監仍廢大觀元年尚書省言元祐置監馬不蕃息而費用不資今沙苑最號多馬然占牧田九千餘頃芻粟官曺嵗費緡錢四十餘萬而牧馬止及六千自元符元年至二年亡失者三千九百且素不調習不中於用以九千頃之田四十萬緡之費養馬而不適于用又亡失如此利害灼然可見今以九千頃之田計其磽瘠三分去一猶得良田六十頃以直計之頃為錢五百餘緡以一頃募一馬則人得地利馬得所養可以紹述先帝隱兵于農之意請下永興軍路提點刑獄司及同州詳度以聞俟見實利則六路新邊間田當以次推行時熙河路蘭湟牧馬司又請兼募願養牝馬者每收三駒以其二歸官一充賞詔行之四年復罷京東西路給地牧馬復東平監政和二年詔諸路復行給地牧馬復罷東平監名臣奏議熙寧五年樞密使文彥博論監牧疏馬之有牧其來尚矣禹貢之萊夷作牧周官之牧田任逺郊之地宣王中興之主則有考牧之詩僖公遵伯禽之法則有在坰之頌蓋日中而出所以遂物性而生息也漢唐之盛苑監實繁祖宗以來修舉甚至七八十年搜用不絶熙寧元年陛下創置南北監牧使設官振職其制益嚴若有未至自當增修而近時議者多不深究本末熟詳利害乃欲賦牧地與農民斂其租課散國馬于編户責其孳息即不知所賦之地肥瘠皆可耕乎所斂租課豐凶皆可得乎復不知户配一馬縶之維之皆可蕃息乎既不蕃息則後將可繼乎或謂監牧之馬率多少弱既非齊力難勝具裝且馬既蕃庶必有駑良量材用之所得不少張萬嵗典牧最為甚多以至馬直一縑若計所直豈皆良馬又謂緣牧所費殆將不資嵗月計之有損無益臣嘗謂計河北監戶嵗入牧地之租可充吏兵之費所不足者亦無幾焉唯河南諸監所入尚少漸增地利亦可自充如此則仰給度支者不多所收馬課亦不少大率草馬二萬嵗收六課為駒一萬二千三嵗之中若失其半猶得六千匹駑良相參匹直十五千是嵗獲九萬貫此就小計之所得不少矣今若取一時浮淺之議則廢之甚易他時欲復祖宗之制則興之甚難坊監廏庫棚庌井泉官廨營房七八十年經營成就若廢罷之後蕩然一空却欲復之功費愈大如向時廢罷茶法自後議欲復故而園户雕殘場務破壞言者雖衆竟不能復必若采廢置之言即乞委臣寮博求利害而審處之利百則變乃無後悔蕙田案給地牧馬之弊盡于此疏矣蔡京既罷政新用事者更言其不便宣和二年詔罷政和二年以來給地牧馬條令收見馬以給軍應牧田及置監處並如舊制又復東平監凡諸監興罷不一而沙苑監獨不廢六年又詔立賞格應牧馬通一路及三千匹州通縣及一千縣及三百其提點刑獄守令各遷一官倍者更減磨勘年于是諸路應募牧馬者為户八萬七千六百有竒為馬二萬三千五百既推賞如上詔而兵部長二亦以兼總八路馬政遷官然北方有事而馬政亦急矣靖康元年左丞李綱言祖宗以來擇陜西河東河北美水草髙涼之地置監凡三十六所比年廢罷殆盡民間雜養以充役官吏便文以塞責而馬無復善者今諸軍闕馬者大半宜復舊制權時之宜括天下馬量給其直不旬日間則數萬之馬猶可具也然時已不能盡行其説矣歸氏有光曰前史言牧政者唯宋為詳而戶馬保馬餘地牧馬為後世害蓋自熙豐變法以至崇宣小人在位亟復亟變迄無善政而宋隨以亡渡江以後頗置監收而江南多水田其後三衙遇暑月放牧於蘇秀大為民患郢鄂之間亦置監牧然皆不可用而戰馬悉仰川秦廣三邊焉凡收市馬戎人驅馬至邊總數十百為一券一馬預給錢千官給芻粟續食至京師有司售之分𨽻諸監曰券馬邊州置場市蕃漢馬團綱遣殿侍部送赴闕或就配軍曰省馬陜西廣鋭徑勇等軍相與為社每市馬官給直外社衆復裒金益之曰馬社軍興籍民馬而市之以給軍曰括買宋初市馬唯河東陜西川峽三路招馬唯吐蕃回紇黨項藏牙族白馬鼻家保家名市族諸蕃至雍熙端拱間則麟府豐嵐州岢嵐火山軍唐龍鎮濁輪寨陜西則秦渭涇原儀延環慶階州鎮戎保安軍制勝關浩亹府河西則靈綏銀夏州川峽則益文黎雅成茂夔州永康軍京東則登州自趙德明據有河南其收市唯麟府涇原儀渭秦階環州岢嵐火山保安保德軍其後置場則又止環慶延渭原奉階文州鎮戎軍而已蕙田案此宋市馬之法文獻通考提舉茶場李杞言賣茶易馬固為一事乞同提舉買馬詔如其請其後羣牧判官郭茂恂言承詔義専以茶市馬以物帛市穀而併茶馬為一司臣聞頃時以茶市馬兼用金帛者亦聽其便近嵗事局既分始専用銀絹錢錢非蕃部所欲且茶馬二事事實相須乃詔専以雅州之名山茶為易馬之用自是番馬之至者稍衆久之買馬司復罷兼茶事自李杞建議始於提舉茶事兼買馬其後二職分合不一蕙田案此宋茶馬之法茶馬最善明代行之極有成效其原出于此也髙宗渡江以來無復國馬紹興二年始命措置牧監後置于饒州以守倅領之擇官田為牧地復置提舉俄廢四年又置於臨安之餘杭南蕩上曰輔臣進呈廣馬幾似代北所生春秋列國不相通所用之馬皆取於其國中而已申公巫臣使於吳與其射御教吳乘車則是雖無亦自有馬今必産馬處求之則是馬政不修也十九年夏詔馬五百匹為一監牡一而牝四之監分四羣嵗生産駒三分及斃二分以上有賞罰先是川路所買馬嵗付鎮江軍中養牧至上以未見孳生之數嵗分江上諸軍後又置監於郢鄂之間牡牝千餘十有餘年才生三十駒而又不可用乃已故凡戰馬悉仰川秦廣三邊焉馬政志宋初市馬嵗僅得五千餘匹天聖中蕃部省馬至三萬四千九百餘匹嘉祐以前原渭德順凡三嵗市馬至萬七千一百匹秦州券馬嵗置萬五千匹元豐四年詔専以雅州名山茶為易馬用自是蕃馬至者稍衆崇寧四年詔曰神宗皇帝厲精庶政經營熙河路茶馬司以致國馬法制大備其後監司欲侵奪其利以助糴買故茶利不専而馬不敷額近雖更立條約令茶馬司總運茶博馬之職猶慮有司苟於目前近利不顧悠久深害三省其謹守己行毋輒變亂元豐成法自是提舉茶事兼買馬其職任始一凡宋之市馬分而為二其一曰戰馬生于西陲良健可備行陳宕昌峰貼峽文州所産是也其二曰羈縻馬産西南諸蠻短小不及格黎敘等五州所産是也紹興三年即雍州置司提舉市於羅殿自杞大理諸蠻然自杞諸蕃本自無馬蓋又市之南詔南詔今大理國也大理地連西戎故多馬雖互市於廣南其實猶西馬也歸氏有光曰宋自熙寧未變法以前然苑馬之政亦未稱善世之害馬者有三曰選吏曰繁法曰易地吏非馬之所宜其害馬一也法非馬之所宜其害馬二也地非馬之所宜其害馬三也古有豢龍氏周官服不氏掌養猛獸而教擾之馬非異獸必有能馴之者非世官不可也羌童項髻徒跣隨水草畜牧馬與人意相喻非有書生文學法度理也法數變馬與人皆不自適何以能遂其生況置之磽狹無所􅌛畜或禾稼稻粳之田溝塍封限遊騰莫逞非所以適其走壙之性也昔元魏起代北故馬為特盛雖唐馬未必能及也故曰馬陸居則食草飲水喜則交頸相摩怒則分背相踶此馬之真性也政和五禮新儀仲春祀馬祖仲夏享先牧仲秋祭馬社仲冬祭馬步並擇日馬祖先牧馬社馬步壇各廣九步髙三尺四出陛一壝二十五步中興後以紹興三十一年於行在昭慶寺設位行祭蕙田案馬政莫繁于宋亦莫壞于宋夫牧監者畜牧之正也宋初以監牧致馬蕃息乃以承平日久用馬者少遂慮其多費而更易之不數年間馬遂耗而軍事用馬又亟于是一切權宜苟且之法行户馬保馬給地牧馬纍民滋甚而馬政大弊雖欲復舊時監牧之利而不可得矣南渡後雖置監牧馬而風土不宜馬不盛産于是専藉之市馬而馬政不可問矣右宋遼史食貨志初太祖為達喇府額爾竒木懲耀尼氏單弱於是撫諸部明賞罰不妄征討因民之利而利之羣牧蕃息上下給足及即位伐河東下代北郡縣獲牛羊駝馬十萬餘樞密使耶律色珍獲馬二十餘萬分牧水草便地數嵗所增不可勝算自太祖及興宗垂二百年羣牧之盛如一日天祚初年馬猶有數萬羣每羣不下千匹祖宗舊制常選南征馬數萬匹牧于雄霸隙地間以備燕雲緩急復選數萬給四時遊畋餘則分地以牧法至善也至末年纍與金戰畨漢戰馬十損六七雖增價數倍竟無所買乃冒法買官馬從軍諸羣牧私賣日多田獵亦不足用遂為金所敗棄衆播遷以訖于亡松漠以北善馬皆為達實林牙所有金史太宗本紀天會三年七月詔南京括官豪牧馬以等第取之分給諸軍兵志天德間置迪河鄂爾多阿爾本富僧額永安沃濟五羣牧所皆仍遼舊名各設官以治之又于諸色人內選家富丁多及品官家子明安穆昆佛寧軍與司吏家餘丁及奴使之司牧謂之羣子分牧馬駝牛羊為之立蕃息衰耗之刑賞後稍增其數為九契丹之亂遂亡其五世宗置所七曰特們圖們阿都齊布沙堪額勒本和囉噶伊囉斡大定二十年更定羣牧官詳衮托迪扎布羣牧人滋息損耗賞罰格二十一年敕諸所馬三嵗者付女直人牧之時遣使閲實其數缺則杖其官而令牧人償之二十八年蕃息之久馬至四十七萬明昌五年散騬馬令中都西京河北東西路驗民物力分畜之又令他路民養馬者死則於前四路所養者給換若欲用則悉以送官此金之馬政也然每有大役必括於民及取羣官之餘騎以給戰士焉元政典元起朔方俗善騎射因以弓馬之利取天下世祖中統四年設羣牧所其牧地東越耽羅北踰和哩圗們西至甘肅南暨雲南等地凡一十四處自上都大都以至約尼伯葉濟蘭格爾周回萬里無非牧地馬之羣或千百或三五十左股烙以官印號火印之馬牧人曰哈齊哈喇齊有千户百户父子相承任事自夏及冬隨地之宜行逐水草十月各至本地朝廷嵗以九月十月遣守官馳驛閲視較其多寡有所産駒即烙印取勘收除見在數目造蒙古回回漢字文册以聞其總數蓋不可知也幸上都太僕卿以下皆從先驅馬出建德門外取其肥可取乳者以行汰其羸瘦不堪者還于羣自天子以及諸王百官各以脫羅氊置撒帳為取乳室車駕還京師太僕卿先期遣使徴馬五十鄂瑪堆來京師鄂瑪堆承乳車之名也既至俾哈齊哈喇齊之在朝為卿大夫者親秣飼之每鄂瑪堆牝馬四十每牝馬一官給芻一束菽八升駒一給芻一束菽五升菽貴則其給減半以小稻充芻粟每旬取給于度支寺官亦以旬詣間廏閲肥瘠凡御位下正宫位下隨朝諸色目人及甘肅土番等處草地內及江南腹裏諸處應有係官孳生馬牛駝騾羊點數之處一十四道牧地各置千戶百戶等名目右遼金元明史兵志明制馬之屬內廏者曰御馬監中官掌之牧于大壩蓋倣周禮十有二間意牧于官者為太僕寺行太僕寺苑馬寺及各軍衛即唐四十八監意牧于民者南則直𨽻應天等府北則直𨽻及山東河南等府即宋保馬意其曰備養馬者始于正統末選馬給邊邊馬足而寄牧于幾甸者也官牧給邊鎮民牧給京軍皆有孳生駒官牧之地曰草場或為軍民佃種曰熟地嵗徴租佐牧人市馬牧之人曰恩軍曰隊軍曰改編軍曰充發軍曰抽發軍苑馬分三等上苑萬中七千下四千一夫牧馬十匹五十夫設圉長一人凡馬肥瘠登耗籍其毛齒而時省之三嵗寺卿偕御史印烙鬻其羸劣以轉市邊衛營堡府州縣軍民壯騎操馬則掌于行寺卿邊用不足又以茶易於蕃以貨市于邊其民牧皆視丁田授馬始曰戶馬既曰種馬案嵗徴駒種馬死孳生不及數輒賠補此其大凡也初太祖都金陵令應天太平鎮江廬州鳯陽揚州六府滁和二州民牧馬洪武六年設太僕寺于滁州統于兵部後增滁陽五牧監領四十八羣已為四十監旋罷惟存天長太興舒城三監置草場于湯泉滁州等地復令飛熊廣武英武三衛五軍養一馬馬嵗生駒一嵗解京既而以監牧歸有司専令民牧江南十一戶江北五戶養馬一復其身太僕官督理嵗正月至六月報定駒七月至十月報顯駒十一二月報重駒嵗終考馬政以法治府州縣官吏凡牡曰兒牝曰騍兒一騍四為羣羣頭一人五羣羣長一人三十年設北平遼東山西陜西甘肅行太僕寺定牧馬草場永樂初設太僕寺于北京掌順天山東河南舊設者為南太僕寺掌應天等六府二州四年設苑馬寺于陜西甘肅統六監監統四苑又設北京遼東二苑馬寺所統視陜西甘肅十二年令北畿民計丁養馬選居間官教之畜牧民十五丁以下一匹十六丁以上二匹為事編發者七户一匹得除罪尋以寺卿楊砥言北方人户五丁養一免其田租之半薊州以東至南海等衛戍守軍外每軍飼種馬一又定南方養馬例鳯廬揚滁和五丁一應天太鎮十丁一淮徐初養馬亦以丁為率十八年罷北京苑馬寺悉牧之民洪熙元年令民牧二嵗徵一駒免草糧之半自是馬日蕃漸散于鄰省濟南兖州東昌民養馬自宣德四年始也彰德衛輝開封民養馬自正統十一年始也已而也先入犯取馬二萬寄養近京充團營騎操而盡以故時種馬給永平等府景泰三年令兒馬十八嵗騍馬二十嵗以上免算駒成化二年以南土不産馬改徵銀四年始建太僕寺常盈庫貯備用馬價是時民漸苦養馬六年吏部侍郎葉盛言向時嵗課一駒而民不擾者以芻牧地廣民得為生也自豪右莊田漸多養馬漸不足洪熙初改兩年一駒成化初改三年一駒馬愈削民愈貧然馬卒不可少乃復兩年一駒之制民愈不堪請敕邊鎮隨俗所宜凡可以買馬足邊軍民交益者便宜處置時馬文升撫陜西又極論邊軍償馬之纍請令屯田卒田多丁少而不領馬者嵗輸銀一錢以助賠償雖皆允行而民困不能舒也繼文升撫陜者蕭禎請省行太僕寺兵部覆云洪永時設行太僕及苑馬寺凡茶馬蕃人貢馬悉收寺苑放牧常數萬匹足充邊用正統以後北敵屢入抄掠馬遂日耗言者每請裁革是惜小費而忘大計于是敕諭禎但令加意督察而北畿是永樂以來馬日滋輒責民牧民年十五者即養馬太僕少卿彭禮以戶丁有限而課駒無窮請定種馬額會文升為兵部尚書奏行其請乃定兩京太僕種馬兒馬二萬五千騍馬四之二年納駒著為令時𢎞治六年也十五年冬尚書劉大夏薦南京太常卿楊一清為副都御史督理陜西馬政一清奏言我朝以陜右宜牧設監苑跨二千餘里後皆廢惟存長樂靈武二監今牧地止數百里然以供西邊尚無不足但苦監牧非人牧養無法耳兩監六苑開城安定水泉便利宜為上苑牧萬馬廣寧萬安為中苑黑水草場逼窄清平地狹土瘠為下苑萬安可五千廣寧四千清平二千黑水千五百六苑嵗給軍外可常牧馬三萬二千五百足供三邊用然欲廣孳息必多蓄種馬宜增滿萬匹兩年一駒五年可足前數請支太僕馬價銀四萬二千兩於平慶臨鞏買種馬七千又養馬恩隊軍不足請編流亡民及問遣回籍者且視恩軍例凡發邊衛充軍者改令各苑牧馬增為三千人又請相地勢築城通商種植榆栁春夏放牧秋冬還廏馬既得安敵來亦可收保孝宗方重邊防大夏掌兵部一清所奏輒行遷總制仍督馬政諸監草場原額十三萬三千七百餘頃存者已不及半一清核之得荒地十二萬八千餘頃又開武安苑地二千九百餘頃正德二年聞于朝及一清去官未幾復廢時御史王濟言民苦養馬有一孳生馬輒害之間有定駒賂醫諱之有顯駒墜落之馬虧欠不過納銀二兩既孳生者已聞官而復倒斃不過納銀三兩孳生不死則飢餓馬日瘦削無濟實用今種馬地畝人丁嵗取有定額請以其額數令民買馬而種馬孳生縣官無與兵部是其言自後每有奏報輒引濟言縣官無與種馬事但責駒于民遺母求子矣初邊臣請馬太僕寺以見馬給之自改徵銀馬日少而請者相繼給價十萬買馬萬匹邊臣不能市良馬馬多死太僕卿儲巏以為言請仍給馬又指陳各邉種馬盜賣私借之弊語雖切不能從而邉鎮給發日益繁延綏三十六營堡自𢎞治十一年始十年間發太僕銀二十八萬有竒買補四萬九千餘匹寧夏大同居庸關等處不與焉至正德七年遂開納馬例凡十二條九年復發太僕銀市馬萬五千于山東遼東河南及鳯陽保定諸府嘉靖元年陜西苑馬少卿盧璧條上馬政請督逋負明印烙訓醫藥均地差以救目前而闢場廣蓄為經久計帝嘉納之自後言馬事者頗衆大都因事立説補救一時而已二十九年諳達入寇太僕馬缺復行正德納馬例已稍增損之至四十一年遂開例至捐馬授職隆慶二年提督四夷館太常少卿武金言種馬之設専為孳生備用傋用馬既别買則種馬可遂省今備用馬已足三萬宜令每馬折銀三十兩解太僕種馬盡賣輸兵部一馬十兩則直𨽻山東河南十二萬匹可得銀百二十萬且收草豆銀二十四萬御史謝廷傑謂祖制所定關軍機不可廢兵部是廷傑言而是時內帑乏方分使括天下逋賦穆宗可金奏下部議部請養賣各半從之太僕之有銀也自成化時始然止三萬餘兩及種馬賣銀日增是時通貢互市所貯亦無幾及張居正作輔力主盡賣之議自神宗九年始上馬八兩下至五兩又折徵草豆地租銀益多以供團營買馬及各邊之請然一騸馬輒發三十金而州縣以駑馬進其直止數金且仍寄養于馬戶害民不減曩時又國家有興作賞賚往往借支太僕銀太僕帑益耗十五年寺卿羅應鶴請禁支借二十四年詔太僕給陜西賞功銀寺臣言先年庫積四百餘萬自東西二役興僅餘四之一朝鮮用兵百萬之積俱空今所存者止十餘萬況本寺寄養馬嵗額二萬匹今嵗取折色則馬之派徵甚少而東征調兑尤多卒然有警馬與銀俱竭何以應之章下部未能有所釐革也崇禎初核戶兵工三部借支太僕馬價至一千三百餘萬蓋自神宗以來冏政大壞而邊牧廢弛愈不可問既而遼東督師袁崇煥以缺馬請于兩京州縣寄養馬內折三千匹價買之西邉太僕卿凃國鼎言祖宗令民養馬専供京營騎操防護都城非為邉也後來改折無事則易馬翰錢有警則出銀市馬仍是為京師備禦之意今折銀已多給各鎮如并此馬盡折萬一變生奈何帝是其言却崇焕請案明世馬政法久弊叢其始盛終衰之故大率由草場興廢太祖既設草場于大江南北復定北邉牧地自東勝以西至寧夏河西察罕諾爾以東至大同宣府開平又東南至大寧遼東抵鴨緑江又北千里而南至各衛分守地又自雁門關西抵黃河外東厯紫荆居庸古北抵山海衛荒間平野非軍民屯種者聽諸王駙馬以至近邉軍民樵採牧放在邉藩府不得自占永樂中又置草場于畿甸尋以順聖川至桑乾河百三十餘里水草美令以太僕千騎令懷來衛卒百人分牧後增至萬二千匹宣德初復置九馬坊于保安州于是兵部奏馬大蕃息以色别而名之其毛色二十五等其種三百六十其後莊田日增草場日削軍民皆困于孳養𢎞治初兵部主事湯冕太僕卿王霽給事中韓祐周旋御史張淳皆請清核而旋言香河諸縣地占于勢家霸州等處俱有仁夀宫皇莊乞罷之以益牧地雖允行而占佃已久卒不能清南京諸衛牧場亦久廢兵部尚書張鎣請復之御史胡海言恐遺地利遂止京師團營官馬萬匹與旗手等衛上直官馬皆分置草場嵗春末馬非聽用者坐營官領下場放牧草豆住支秋末回給事御史閲視馬斃軍逃者以聞後上直馬不出牧而騎操馬仍嵗出如例嘉靖六年武定侯郭勛以邉警為辭奏免之徴各場租以充公費餘貯太僕買馬于是營馬専仰秣司農嵗費至十八萬戶部為詘而草場益廢議者爭以租佃取贏浸淫至神宗時弊壞極矣茶馬司洪武中立於川陜聽西番納馬易茶賜金牌信符以防詐偽每三嵗遣廷臣召諸番合符交易上馬茶百二十斤中馬七十斤下馬五十斤以私茶出者罪死雖勛戚無貸末年易馬至萬三千五百餘匹永樂中禁稍弛易馬少乃命嚴邉關茶禁遣御史巡督正統末罷金牌嵗遣行人巡察邉氓冒禁私販者多成化間定差御史一員領敕専理𢎞治間大學士李東陽言金牌制廢私茶盛有司又屢以敝茶給番族番人抱憾往往以羸馬應宜嚴敕陜西官司揭榜招諭復金牌之制嚴收良茶頗增馬直則得馬必蕃及楊一清督理苑馬遂命并理鹽茶一清申舊制禁私販種官茶四年間易馬九千餘匹而茶尚積四十餘萬斤靈州鹽池增課五萬九千貯慶陽固原庫以買馬給邉又懼後無専官制終廢也於正德初請令巡茶御史兼理馬政行太僕苑馬寺官聽其提調報可御史翟唐嵗收茶七十八萬餘斤易馬九千有竒後法復弛嘉靖初戶部請揭榜禁私茶凡引俱南戶部印發府州縣不得擅印三十年詔給番族勘合然初制訖不能復矣馬市者始永樂間遼東設市三二在開原一在廣寧各去城四十里成化中巡撫陳鉞復奏行之後至神宗初不廢嘉靖中開馬市于大同陜邉宣鎮相繼行隆慶五年諳達上表稱貢總督王崇古市馬七千餘匹為價九萬六千有竒其價遼東以米布絹宣大山西以銀市易外有貢馬者以鈔幣加賜之初太祖起江左所急惟馬屢遣使市于四方正元夀節內外藩封將帥皆以馬為幣外國土司番部以時入貢朝廷每厚加賜豫所以招攜懷柔者備至文帝勤逺略遣使絶域外國來朝者甚衆然所急者不在馬自後狃于承平駕馭之權失馬無外增惟恃孳生嵗課重以官吏侵漁牧政荒廢軍民交困矣蓋明自宣德以後祖制漸廢軍旅特甚而馬政其一云歸氏有光馬政議竊惟古之馬唯養於官而其養之于民者官初無所與司馬法甸出長轂牛馬及所謂萬乘千乘百乘此皆寓兵于農有事則賦調而官不與知也惟其養于官者如周禮校人牧圉之屬與月令所載其養之之法備盡此則官之所自養也夫周之時既養馬矣而民之馬官有不與是以民各自以其力養己之馬而無所不盡其心故有事徴發而車與馬無不辦也漢之苑馬即校人之王馬而民間私牧官無所與而皆得以自孳息故街巷有馬而橋姚以致馬千匹逮武帝出師馬少而始有假母歸息之令亦兵興一切之制非久用也秦漢以來唐馬最盛皆天子所自置監牧其擾不及于民而馬之盛如此我國家苑馬之設即其遺意然又于兩京畿河南山東編戶養馬乃又兼宋人保甲之法蓋不獨養于官而又養于民也今監牧之馬未見蕃息民間牧養又日以耗且以今畿郡之養馬言之夫馬既繫于官而民以為非民之所有官既委于民而官以為非官之所専馬烏得而不敝自其立法之初已知其弊必至于今日也且天下有治人無治法苟能如其舊而得人以求實效亦未嘗不可以藉其用也今保馬既不可變而於其間又不能守其舊往往數為紛更循其末流而不究其本始愈變而愈敝必至于不可復為而後己此今日天下之事皆然而非獨馬政也嘗考洪武初制今有司提調孳牧江南十一户共養馬一匹江北五戶共養馬一匹以丁多之家為馬頭専養一馬餘令津貼以備倒失買補每二嵗納駒一匹又立羣頭羣長設官鑄印與守令分民而治有牧馬草場又免其糧草之半每加優恤使有司能責實而行之常使民得養馬之利則馬亦何憂於不蕃也今顧不能修其舊而徒以法之敝而亟變之則天下安得有善法夫令民養馬國家之意本欲得馬而已而有所謂本色折色何為也責民以養馬而又責其輸銀如此則取其銀可矣而又何以馬為于是民不以養馬為意而以輸銀為急矣牧地本與民養馬也而徴其子粒又有加增子粒如此則遂併之田稅而已而又何以責之馬戶於是民不以養馬為意而以輸子粒為急矣養馬者課其駒可也不用其駒而使之買俵於是民不以養馬為意而以買俵為急矣夫折色之議本因江南應天太平等處非産馬之地變而通之雖易銀可也遂移之河北今又變賣種馬而征其草料原今變者之意専欲責民之輪銀而非責民之養馬也官既無事于養馬而獨規目前之利民復恣為姦偽而為利己之圖有駒不報而上于欺隱不肯以駒備用而獨願以銀買俵至或戕其孕字絶其遊牝上下交征利以相欺而己衛文秉心塞淵致騋牝之三千魯僖以思無邪致馬之斯徂夫官民一於為利以相欺何望于馬之蕃息乎今之議者又方日出新意以變賣馬之半為未盡因欲盡賣種馬而惟以折色征解略不思祖宗立法之深意可為太息也夫河北之人驍健良馬冀之所産昔人所以謂此地王不得無以王霸不得無以霸者也今舉冀之良産盡棄之一旦國家有事西邉之馬可得以為畿內用乎古語曰變而不如前易而多所敗者亦不可不復也今欲講明馬政必盡復洪武永樂之舊江南折色可也畿輔河南山東之折色不可也草場之舊額可清也子粒不可征也官吏之侵漁可黜可懲也而管馬官羣長獸醫不可省也行馬復之令使民得寬其力民知養馬之利則雖官馬亦以為己馬矣又修金牌之制通關互市益得好馬别賦之民以為種馬而有司加督視之洪武永樂之舊猶可復也蓋修茶馬而渥窪之産至矣弛草地而坰牧之息繁矣恤編戶恣芻牧而烏倮橋姚之富臻矣故曰車騎天下之武備也其所以壯神京防後患者豈淺淺哉抑古之相衛邢洺皆有馬監即皆今之畿輔地也如使盡核官民所耕佃牧馬草場盡出之與夫羣不墾者皆立􅳕堆以為監牧之地而盡歸于苑馬宋人戶馬保馬之法雖罷之可也何必規規然沿其末流而日事紛更乎蕙田案歸氏此議利弊灼然惜未能見之行事也王圻續通考太祖都金陵馬祖先牧太僕廟洪武二年建祭馬祖先牧馬步馬社之神初命築壇於後湖祀馬祖諸神禮官奏言周官牧人掌天馬之屬春祭馬祖夏祭牧人冬祭馬步馬祖天駟星也孝經説云房為龍馬先牧始養馬者其人未聞馬社始乘馬者世本曰相土作乘馬馬步謂神之災害於馬者隋用周制祭以四仲之月唐宋因之擬春秋二仲月甲戌庚日為宜於是遣官行禮為壇四壇用羊一豕一幣一其色白籩豆各四簠簋登象尊壺尊各一用時樂獻官齋戒公服行三獻禮祝文曰維神始于天地之初而司馬於世牧養蕃息馭而乘之間廏得所厯代興邦戡定禍亂咸賴戎馬民人是安朕自起義以來多資於馬摧堅破敵大有功焉稽古案儀載崇明享爰伸報本以昭神功謹以制幣牲齊式陳明薦尚享自後定以春秋仲月十五日遣兵部官祭嵗以為常明史禮志洪武四年蜀明升獻良馬十其一白者長丈餘不可加韉勒太祖曰天生英物必有神司之命太常以少牢祀馬祖囊沙四百斤壓之令人騎而遊苑中久之漸馴帝乘之以夕月於清涼山比還大悅賜名飛越峰復命太常祀馬祖五年并諸神為一壇嵗止春祭永樂十三年立北京馬神祠於蓮花池其南京馬神則南太僕主之孝宗實録𢎞治九年三月詔修通州馬神祠祠在治之北地名壩上安德鄉也初文皇帝靖難兵起戰其地覺有神相之因詔作馬神祠久之祠廢至是順天府尹彭禮等修之明會典嘉靖三十八年以先牧廟建自永樂嵗久頽敝修之歸氏有光曰天文辰為馬精龍與馬同氣古之聖人非通天地萬物之理其孰能與於此是以制祭祀而國家受福百物皆昌也余觀秦趙史記自益為朕虞佐舜調馴鳥獸其後費昌仲衍世為御有功列為諸侯而造父幸於周穆王得驥溫驪驊騮騄耳之駟獻之穆王穆王使造父御西巡見西王母樂之忘歸而徐偃王反造父御穆王日馳千里以歸造父由此封於趙城其後奄父為宣王御而非子以善養馬孝王封之犬丘豈以柏翳為虞而子孫世世善御能息馬哉上古聖賢皆神靈通於萬物不可以後世測度也穆王造父之事竒矣夫社祀以勾龍稷祀以棄若造父非子豈今所謂先牧耶太僕秦官主奉車又掌馬事意秦制蓋有所本抑周禮軼而不備不然何前世御者皆能善馬太僕職兼奉車與馬其出於古非秦官明矣右明五禮通考卷二百四十五
