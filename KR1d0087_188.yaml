body:
  text: 五禮通考卷一百七十八刑部尚書秦蕙田撰嘉禮五十一巡狩蕙田案巡狩之制見于經者多矣參以史記五帝本紀及竹書紀年皇甫謐帝王世紀羅泌路史金履祥通鑑前編諸書則自黃帝顓頊已有巡方之典不始于唐虞也蓋先王以此察諸侯之政治聮逺方之聲教咨兆民之疾苦乃維持天下之大權其意深逺矣秦漢以下封建變為郡縣形勢雖異於古然時邁所及察吏治觀民風考其用意與唐虞三代若合符節焉唐開元禮及杜佑通典以巡狩屬吉禮宋史改屬嘉禮今從宋史先之以經訓而後世之史事附焉易觀卦象曰風行地上觀先王以省方觀民設教程子曰風行地上周及庶物為遊歷周覽之象故先王體之為省方之禮以觀民俗而設政教也天子巡省四方觀視民俗設為政教如奢則約之以儉儉則示之以禮是也朱子曰省方以觀民設教以為觀春秋莊公二十三年左氏傳諸侯有王注從王事王有巡狩注省四方孟子齊景公問于晏子曰吾欲觀于轉附朝儛遵海而南放于琅邪吾何修而可以比于先王觀也晏子對曰天子適諸侯曰巡狩巡狩者巡所守也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度注言天子出必因王事有所補助于民無非事而空行者春省耕補耒耜之不足秋省斂助其力不給也晏子又道夏禹之世民之諺語王者巡狩觀民其行從容若遊若豫豫亦遊也遊亦豫也春秋傳曰魯季氏有嘉樹晉韓宣子豫焉吾王不遊吾何以得見勞苦蒙休息也吾王不豫吾何以得見賑贍助不足也王者一遊一豫行恩布德應法而出可以為諸侯之法度也今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡為諸侯憂從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡注睊睊側目相視更相讒惡先王無流連之樂荒亡之行惟君所行也注言聖人之行無此四者天子適諸侯曰巡狩春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢掊克在位則有讓注慶賞也養老尊賢能者在位賞之以地益其地也掊克不良之人在位則責讓之白虎通德論王者必制巡狩之禮何尊天重民也所以至四嶽者何盛德之山四方之中能興雲致雨也以夏之中月同律度得其中也風俗通義巡者循也狩者牧也道德太平王者為天循行以牧人也恐逺近不同化幽隱有不得所者故自躬親行之孔氏穎達曰所以為此巡守之禮者以諸侯為天子守土専制一國告從令行而王者垂帷端拱深居髙視一日二日庶事萬幾耳目不達于逺方神明不照于幽僻或將強以陵弱恃衆以侵寡擁遏上命寃不上聞而使逺道細民受枉聖世聖王知其如是故制為此禮時自巡之吕氏祖謙曰巡守之禮此乃維持治具提攝人心聖人運天下妙處蓋人心久必易散政事久必有闕一次巡守一次提攝此新新不已之意朱子曰或問建牧立伯小大相維自可以垂拱無為矣何故復有巡守之舉豈牧伯不足任耶或云因以祭天且朝諸侯又云君民一體不可邈然不相接故必躬親巡撫然後上下情通而教化洽矣此先王之誠心二説孰是曰建牧立監與巡守之義並行不悖祭天朝諸侯巡撫之意皆在其中矣先王之政體用兼舉本末備具非若後世儒者一偏之説有體而無用得本而遺末也巡守亦非舜創立此制蓋亦循襲將來黃帝紀亦云披山通道未嘗寧居右巡狩名義書舜典五載一巡狩羣后四朝注各會朝于方嶽之下凡四處故曰四朝堯舜同道舜攝則然堯又可知天疏每五嵗一巡守其巡守之年諸侯羣后四方各朝子于方嶽之下凡四處别朝故云四朝肆覲東后是為一朝四嶽禮同四朝見矣朱子曰五載之內天子巡守者一諸侯來朝者四蓋巡守之明年則東方諸侯來朝于天子之國又明年則南方諸侯來朝又明年則西方諸侯來朝又明年則北方諸侯來朝又明年則天子復巡守蕙田案四朝有三説謂四面各朝于方嶽之下者孔安國馬融王肅孔穎達也謂四季朝京師者鄭康成也謂五載內諸侯來朝者四皆分方而至者朱子蔡仲默也當以朱蔡之説為正説見賔禮禮記王制天子五年一巡守注天子以海內為家時一巡省之五年者虞夏之制也周則十二嵗一巡守夏疏鄭志唐虞五載一巡守夏殷六年一巡守此云虞之制以夏與虞同與鄭志乖者以羣后四朝文在堯典堯典是虞夏之書故連言夏其實虞也方氏慤曰五為天地相合之數君臣之際有天地之義故取數以五為節白虎通德論所以五嵗巡狩何五嵗再閏天道大備王者恩亦當竟也不及五載為太煩也過五年為太疏也王者因天之道時有所生嵗有所成三嵗一閏天道小備五嵗再閏天道大備故五嵗一巡狩春秋穀梁傳曰古之君子以時視民之勤此之謂也蕙田案以上巡狩五年之期周禮秋官大行人十有二嵗王巡守殷國注王巡守諸侯會者各以其時之方書曰遂覲東后是也其殷國則四方四時分來如平時疏云殷國四方四時分來如平時者謂分四方各逐春夏秋冬如平時若六服盡來即與平時别也李氏曰周以木德王嵗星是木王之星十二嵗一周天故巡守取嵗星一周天道大備之數也鄭氏鍔曰至十二嵗王乃巡其所守變禮易樂者可以知其畔革制度者可以知其逆或討或流于是行焉若或有故而不巡守則合天下諸侯皆來朝王于京師考其制度焉是謂殷國殷者衆也言命衆國而皆至也楊氏曰虞舜之世其事簡其人寡其于巡守也兵衛少征求輕故行之五嵗不為數成周之世其事繁其人衆其于巡守也兵衛多征求重故行之十二嵗不為疏王氏安石曰王巡狩則諸侯各朝于方嶽王不巡守則會諸侯而殷見或巡守或殷國其出而省焉一也吕氏祖謙曰巡守之禮唐虞五載一巡守周却十二年何故蓋周時文治漸成禮文漸備所以十二年方舉巡守之事此是成王知時變識會通處蕙田案巡守與殷國乃兩事非一事蓋十二年一巡守者其常也或十二年之期已周而天子有事不能巡守則行殷國之禮此其變也鄭注甚明王氏李氏乃云殷衆也謂當方諸侯則以巡守殷國為一事矣案此經上文於春朝秋覲夏宗冬遇之下明云時會以發四方之禁殷同以施天下之政鄭注云時會即時見也無常期諸侯有不順服者王將有征討之事則既朝王命為壇於國外合諸侯而發禁命事焉殷同即殷見也王十二嵗一巡守若不巡守則殷同殷同者六服盡朝既朝王亦命為壇於國外合諸侯而命其政殷同四方四時分來嵗終則遍矣然則殷者諸侯朝王之一法因王不巡守而行之故並繫于十有二嵗之下鄭注云如平時而賈疏復申之云若六服盡來即與平時别者六服盡來不分四時此時會也雖不按服數而東春南夏西秋北冬四方分來此殷同也時會乃因王有征伐故行之則非常之事故六服盡來殷同特以代巡守故不必一時皆集義各有當耳王荆公説最確當從之書周官六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟注五服侯甸男采衛六年一朝會京師周制十二年一巡守春東夏南秋西冬北故曰時巡考正制度禮法于四嶽之下如虞帝巡守然四方諸侯各朝于方嶽之下大明考績黜陟之法人疏此篇説六年五服一朝周禮無此法也周禮大行侯嵗一見貢祀物甸二嵗一見貢嬪物男三嵗一見貢器物采四嵗一見貢服物衛五嵗一見貢材物要六嵗一見貢貨物先儒云見謂來朝也必如所言則周之諸侯各以服數來朝無六年一朝之事昭十三年左傳叔向云明王之制使諸侯嵗聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明自古以來未之或失也説者以為三年一朝六年一會十二年而盟計彼六年一會與此六年五服一朝事相當也再會而盟與此十二年王乃時巡亦相當也叔向盛陳此法以懼齊人若周無此禮齊人當以辭拒之何所畏乎且云自古以來未之或失則當時猶尚行之明周有此法禮文不具耳大行人所云見者皆言貢物或可因貢而見何必見者皆是君自朝乎遣使貢物亦應可矣大宗伯云時見曰會殷見曰同時見殷見不云年限時見曰會何必不是再朝而會乎殷見曰同何必不是再會而盟乎周公制禮若無此法豈成王謬言叔向妄説也朱氏升曰案此篇與今周禮不同此言六年五服一朝而周禮六服諸侯有一嵗一見者二嵗一見者三嵗一見者與此不合要之周禮首末未備周公未成之書也蕙田案尚書六年一朝周禮以服數來朝二者不同孔疏謂成周時自有二法元儒朱升作旁訓復據書以疑周禮竊恐未然蓋叔向所言本無年數其年數皆係解左傳者臆度之詞孔氏據以當六年之説未可信也至大行人所云見者與十二年一巡守之文緊緊承接明係朝之正禮今欲伸尚書而強指為因貢而見之變禮大宗伯所云會同即大行人之所謂時會殷同明係在朝宗覲遇之外今欲牽合尚書而遂指為朝之常法此皆偏曲之見也蘇子瞻云一朝畢朝也朝以逺近為疏數六年而遍五服畢朝也此説最為明了蓋尚書周禮本無二法先儒不得其説強生分别皆非也詳見賔禮又案以上十二年巡狩之期辨鄭氏夏殷六年一巡狩孔穎達禮記正義案鄭志孫皓問鄭答云唐虞之時五載一巡守夏殷之時天子蓋六年一巡守六年者取半一嵗之律吕也蕙田案唐虞巡守之期見於尚書周巡守之期見於周禮夏殷之制不見於經其云六年者康成臆度之言耳孔氏又從而為之説以為取律吕之半則更無據觀承案康成夏殷六年巡狩之説未可謂無據也唐虞五載一巡狩固是五年周禮又六年王乃時巡固是十二年然先曰六年五服一朝明是六年之中五服已遍朝此年原是六年巡狩之常期但係夏殷之禮周時已不能行故特空此一年而後曰又六年王乃時巡是前六年雖屆其期而不行直至又六年而乃行耳此猶唐虞建官惟百夏商官倍則二百故夏殷六年一巡狩周禮倍之則又六年也蓋唐虞分方朝覲羣后四朝須四年而遍故第五年乃時巡夏殷既分五服咸建五長須五年而遍故第六年而後時巡此細玩經文而可得者鄭説不為無據也然如孔氏謂取律吕之半則不免附會耳易復卦象曰雷在地中復先王以至日閉關商旅不行后不省方胡氏曰舜以十一月朔巡狩而此言后不省方則知巡狩者是月也不省方者是月之至日也書舜典嵗二月東巡守至于岱宗五月南巡守至于南嶽八月西巡守至于西嶽十有一月朔巡守至于北嶽歸格于藝祖注諸侯為天子守土故稱守巡行之岱宗泰山為四嶽所宗南嶽衡山自東嶽南巡五月至西嶽華山北嶽恆山巡守四嶽然後歸告至文祖之廟藝文也言祖則考著疏爾雅泰山為東嶽此巡守至于岱岱與泰山有二名也風俗通云泰山山之尊者岱始也宗長也萬物之始隂陽交代故為五嶽之長釋山云河南華河東岱河北恆江南衡又云泰山為東嶽華山為西嶽霍山為南嶽恆山為北嶽岱與泰衡與霍皆一山有二名也張揖云天柱謂之霍山漢書地理志云天柱在廬江灊縣則霍山在江北而與江南衡為一者郭璞云霍山在廬江灊縣漢武帝以衡山遼曠故移其神于此今其彼土俗人皆呼之為南嶽南嶽本自以兩山為名非從近來也而學者多以霍山不得為南嶽又云漢武帝來始乃名之即如此言謂武帝在爾雅前乎斯不然矣是解衡霍二名之由也四巡之後乃云歸格則是一出而周四嶽故知自東嶽而即南行以五月至也王者順天道以行人事故四時之月各當其時之中故以仲月至其嶽鄭玄以為每嶽禮畢而歸仲月乃復更去若如鄭言當于東巡之下即言歸格後以如初包之何當北巡之後始言歸乎且若來而復去計程不得周遍此事必不然也禮記王制嵗二月東巡守至于岱宗五月南巡守至于南嶽八月西巡守至于西嶽十有一月北巡守至于北嶽歸格于祖禰注岱宗東嶽假至也得疏巡守皆以夏之仲月者以律歷當其中也二月八月又晝夜分五月十一月者隂陽終故用四仲也孔注尚書自東嶽南巡五月至則是從東嶽而去鄭注云每歸格于祖言每歸似嶽别一歸若嶽别一歸而更去便是路逺無由可至辨崔氏一年巡一嶽崔氏靈思曰唐虞五載巡狩一嶽二十年方遍四嶽周則四十八年矣若一出四嶽皆遍且闕四時祭享唐虞衡山為南嶽周氏霍山為南嶽其祭吉行五十里若以二月到東嶽五月到南嶽八月到西嶽十一月到北嶽路程遼逺固必不及此知每至一嶽即歸義為長杜氏佑曰梁崔靈恩三禮義宗云唐虞五載巡狩一嶽二十年方遍四嶽周則四十八年矣案尚書周官篇云六年五服一朝又六年王乃時巡考制度諸侯各朝於方嶽大明黜陟又案堯舜簡儉嘗稱茆茨土階巡狩四方羽儀導從必少一年四嶽五載復往宗廟享祭暫委有司展義省方觀風察俗之大政如或二十年方遍及於民物不亦乖疏詳周官本文與孔氏注解既改制十有二載比唐虞已甚遐闊如四十八年乃遍豈非益為曠邈乎且周雖尚文天子諸侯降殺以兩穆王巡歷天下萬姓不甚勞苦始皇遊幸四方屬車八十一乘二漢以降至于有隋或東封告成或觀省風俗百辟悉至羣司畢從不下十餘萬人何止千乘萬騎所以曠代多闕斯禮崔生謂堯舜及周帝王行幸車徒禮數與秦漢以後無異斯不達古今豐約之别復不詳周官之文輒肆臆度之説耳吕氏祖謙曰舜典王制明言二月東巡五月南巡八月西巡十一月北巡而崔靈恩乃以為一年巡一嶽虞五載則二十年而遍周十二載則四十八年而遍不知何據馬氏端臨曰案舜典王制明言二月東巡五月南巡八月西巡十一月北巡而崔靈恩乃以為一年巡一嶽何所據耶古帝王之巡狩所以省方觀民初非遊適然舜之時五載僅能一行至周成王則又不能如舜至於十二年乃一行之又必止以四嶽為底止之地蓋雖一本於憂民之心而尚恐有煩民之事故出必有期而行必有方如此聞見後録舜一嵗而巡四嶽南方多暑以五月之暑而南至衡山北方多寒以十一月之寒而至常山世頗疑之蕙田案舜典歸格藝祖王制歸假祖禰其文皆承四巡之後本無可疑鄭康成創為每巡一嶽歸而復往之説崔靈恩知其説之不可通而強欲回護遂謂五載一巡止至一嶽若遍周四嶽須二十年謬矣諸儒駁之甚當又案每巡皆用夏時中月易稱至日不省方非謂十一月不省方原並行不悖若邵氏之聞見後録乃因仲夏盛暑不宜至衡山炎熱之地仲冬苦寒不當至恆山冰雪之區是以常情之偷惰窺測聖人矣又案南嶽衡山本無可疑惟因爾雅釋山乃有二條前云衡山後云霍山遂滋後儒之疑郭璞回護爾雅乃云一山二名不知爾雅為後儒所亂移衡山于霍山漢武帝事後一條明屬漢儒附益其文耳本朝宿松朱書字緑作南嶽辨一卷謂衡山僻逺斷無時巡之理因謂經文衡山即霍山也不知古聖人法天行健不敢自暇自逸舜至九疑禹臨會稽何嘗以其僻逺而畏逺行耶右巡狩之期書舜典嵗二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖用特疏舜既班瑞羣后即以其嵗二月東行巡省守土之諸侯至于岱宗之嶽燔柴告至又望而以秩次祭于其方嶽山川柴望既畢遂以禮見東方諸侯國之君巡守既周乃歸京師至于文祖之廟用特牛設祭以告巡守歸至也王者所為巡守者以諸侯自専一國威福在已恐其擁遏上命澤不下流故時自巡行問民疾苦孟子稱晏子對齊景公云天子適諸侯曰巡守巡守者巡所守也是言天子巡守主謂巡行諸侯故言諸侯為天子守土故稱守而往巡行之蔡氏沈曰嵗二月當巡守之年二月也文中子叔恬曰舜一嵗而巡五嶽國不費而民不勞何也曰無他道也兵衛少而徴求寡敷奏以言明試以功車服以庸蔡氏沈曰敷陳奏進也周禮曰民功曰庸程子曰敷奏以言者使各陳其為治之説言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也蕙田案此舜巡狩之實事巡行所守専以考察諸侯也右虞巡狩之禮路史炎帝之時后嵗省方觀民設教月省時考終嵗獻功史記五帝本紀黃帝披山通道未嘗寧居東至于海登丸山及岱宗西至于空桐登雞頭南至于江登熊湘北逐葷粥合符釡山路史黃帝撫萬靈度四方乘龍而四巡東薄海禪丸山西逾隴疑笄屯南入江內涉熊湘北屆浡碣南臨元扈乃開東苑祓中宫詔羣神授見者齋心服形以先焉作清角樂大合而樂之鳴鶴翺翔鳯凰蔽日于是合符于釡山以觀其會史記五帝本紀帝顓頊北至于幽陵南至于交址西至于流沙東至于蟠木幽靜之物小大之神日月所照莫不砥厲路史帝乃乘結元之輦巡四海以寧民北爌幽陵南撫交址西際神沙東跂蟠水四行天下周旋八外日芒所誋靡不砥厲帝省方以齊民之物而登封以報其政之成是以四海同風九州共賞天下歸往而人以樂生竹書紀年帝堯五年初巡狩四嶽路史帝制五服均五等五國相維設四嶽八伯以典諸侯而臨民以十二春省耕秋省斂宣聲教以同俗振雕瘵聽民聲觀四履之所以化其上入其疆土地辟岐旁趨養老尊賢駿傑在位則有慶反是則絀通鑑前編帝堯十有二載巡狩方嶽觀于華華封人曰嘻請祝聖人使聖人富夀多男子帝曰辭多男子則多懼富則多事夀則多辱封人曰天生萬民必授之以職多男子則授之職何懼之有富而使人分之何事之有天下有道與物皆昌天下無道修德就間千嵗厭世去而上仙乘彼白雲至于帝鄉何辱之有通志五帝紀堯巡狩告成周流五嶽存鰥寡賑荒札一民飢則曰我飢之一民寒則曰我寒之一民罹辜則曰我陷之故民戴之如日月愛之如父母不賞而勸不罰而治三齊略記堯山在廣固城西七里堯巡狩所登遂以為名山頂立祠祠邊有柏樹枯而復生不知幾代樹也又石上有堯迹于今猶存蕙田案以上古巡狩附周禮夏官職方氏王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑注乃猶汝也守謂國境之內職事所當供具王氏昭禹曰王巡守則諸侯各朝于方嶽故戒于四方守則諸侯所守之地職事則諸侯所治之職事天子適諸侯曰巡守巡守者巡所守也故戒以修平乃守修則使之治其壞也平則使各當其分也諸侯朝于天子曰述職述職者述所職也故戒以考乃職事職則慮其曠職事則慮其有廢事鄭氏鍔曰因巡守之年警戒之使修正其疆界考察其職業以俟王之時巡告戒之有素及其不率然後待之以誅夷竄殛之罪可以無愧矣李氏嘉會曰必先警戒而後巡守者不欲乘其不備幾于不戒而殺也必先警戒則刑可施及王之所行先道帥其屬而巡戒令注先道先由王所從道居前行其前日所戒之令鄭氏鍔曰及王之所行先用所嚮之方國巡其前所布之戒令預考其率與不率也蕙田案以上巡狩先事戒令禮記王制天子將出類乎上帝宜乎社造乎禰注類宜造皆祭名帝疏此論天子巡守之禮也將出謂初出時也類乎上祭告天也宜乎社者巡行方事誅殺封割應載社主令誅罰得宜亦隨宜而告也造乎禰者造至也謂至父祖之廟也前歸假既云祖禰明出亦告祖禰也今唯云禰者白虎通云從卑不敢留尊者之命至禰不嫌不至祖也孔叢子巡守篇子思遊齊陳莊伯與登泰山見古天子巡守之銘焉陳子曰敢問昔聖帝明王巡守之禮可得聞乎子思曰古者天子將巡守必先告于祖禰命史告羣廟及社稷圻內名山大川告者七日而遍親告用牲史告用幣申命冢宰清道而出白虎通德論王者出告廟何孝子出辭反面事死如事生尚書歸假于祖禰曽子問曰王者諸侯出親告祖禰使祝遍告五廟尊親也王者將出告天者示不専也故王制曰類于上帝宜乎社造乎禰類祭以祖配不曰接者尊無二禮尊尊之義造于禰獨見禰何辭從卑不復留尊者之命至禰不嫌不至祖即祭告天為告事也祖為出辭也義異告于尊者然後乃辭出朱子曰古者君將出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反面之義也陳氏澔曰類宜造皆祭名後章言天子將出征則此出為巡守也蕙田案以上巡狩先事行告祭曽子問曽子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣陳氏澔曰遷廟主謂新祧廟之主也齊車金輅也又名曰公禰吳氏澄曰遷廟主謂祔禰時所遷昭穆最上之廟一主也在昭廟穆廟之上最尊最親者也君將出行時遍告有廟之諸主又特告此無廟之一主而載之以行也方氏慤曰齊車示有齊敬之心焉曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也陳氏澔曰既以幣玉告于祖廟則奉此幣玉猶奉祖宗之命也故曰主命每舍必奠神之也反則設奠以告而埋藏之不敢褻也白虎通德論王者諸侯出必將主何示有所尊故曽子曰王者將出必以遷廟主行載于齊車示有尊也無遷主以幣帛皮圭告于祖禰廟遂奉以出每舍奠焉蓋貴命也必以遷主者明廟不可空也蕙田案以上亦見孔叢子不復載又案以上巡狩載主周禮夏官戎僕掌馭戎車犯軷如玉路之儀注戎車革路也王氏昭禹曰王以兵出故有犯軷之儀凡巡守及兵車之會亦如之鄭氏諤曰出國門則跋履山川故行犯軷之祭王氏昭禹曰凡巡守則戎車從焉兵車之會亦乘戎車異于乘車之會乘金路矣大馭掌馭玉路以祀及犯軷注行山曰軷封土為山于國門之外祭之以行為祖道也蕙田案以上巡狩犯軷地官土訓掌道地圗以詔地事王巡守則夾王車注道説也説地圗九州形勢山川所宜告王以施其事也若云荆揚地宜稻幽并地宜麻巡守行視所守也天子以四海為守吕氏溫曰見蒼梧塗山則思舜禹恤民之艱睹窮荒大漠則悟秦漢勞師之弊覽齊墟晉壤則想威文勤王之伯觀洞庭荆門則知苗蜀恃險之敗王者于此明得失諸侯于此鑒幽替斯懲勸之道也王氏昭禹曰其地異宜其民異數其穀異種王將制其職貢巡其封域而物之有無事之利害莫不知之則土訓之道地圗詔地事與有力焉鄧氏元錫曰王體萬物不可使一物失所故博告之誦訓掌道方志以詔觀事掌道方慝以詔辟忌以知地俗王巡守則夾王車注道方志説四方所識久逺之事以告王觀博古所識若魯有大庭氏之庫殽之二陵方慝四方言語所忌也不辟其忌則其方以為茍于言語也知地俗博事也鄭司農云以詔辟忌不違其俗也曲禮曰君子行禮不求變俗魏氏校曰地氣有偏不能無慝天常生物解之西北多風防風獨活之屬足理風東南多痺魚鱉螺蜆之屬足治痺江湖多氣橘柚之屬足破氣嶺海多瘴檳榔之屬足去瘴是矣王所至恐不習水土預求物以防患非若後世但求口腹玩好也蕙田案鄭注以方慝為言語之忌莊渠魏氏以為食物之忌二説不同皆通又案以上巡狩車行之儀周禮夏官校人凡將事于四海山川則飾黃駒注四海猶四方也王巡守過大山川則有殺駒以祈沈禮與玉人職有宗祝以黃金勺前馬之禮疏謂王行所過山川設祭禮之然後去山川地神土色黃故用黃駒也鄭氏諤曰若有祭祀于四海山川則必擇黃色之駒加文飾以將事焉此皆校人之職或謂大宗伯以沈貍祭川澤而祭祀之牲各放其色四海山川乃均用黃駒何耶以玉人之職考之王巡守過大山川所用之璋不同然皆以王金勺前馬則知均用黃駒者海與山川均為地道黃者地之中色若夫用駒則以巡守而行四方駒有千里之足而行地莫如馬駒雖馬之小者禮以小為貴飾黃駒乃郊用犢之意冬官考工記玉人大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬注射琰出者也杜子春云勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也元謂鼻勺流也凡流皆謂龍口也衡橫也謂勺徑也三璋之勺形如圭瓉天子巡守有事山川則用灌焉於大山川則用大璋加文餅也于中山川用中璋殺文飾也于小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則太祝用事焉將有事於四海山川則校人飾黃駒疏此經説王巡守出行過山川禮敬之事三璋據為勺柄黃金勺以下據為勺頭山川地神故用黃駒也林氏曰宗主禮者祝通神者孔叢子巡守所經五嶽四瀆皆有牲幣蕙田案以上巡狩所經嶽瀆禮記祭義王者巡守諸侯待于境白虎通德論王者巡守諸侯待于境何諸侯以守蕃為職也故待于境蕙田案此條亦見孔叢子不復載又案以上巡狩諸侯待境王制東巡守至于岱宗柴而望祀山川注柴祭天告至也疏謂燔柴以祭上天而告至其祭天之後乃望祀山川所祭之天則蒼帝靈威仰方氏慤曰天之髙也故燔柴以上達山川之逺故望而祀之皆告至也神祗衆矣止以山川蓋諸侯祭名山大川之在其地者其所守山川為大也天曰神地曰祗此以山川者其無所屈皆可謂神其無所别皆可謂祗也郊特牲天子適四方先柴周氏諝曰天子巡狩至于四嶽先柴以告天也禮器因天事天因地事地因名山升中于天陳氏澔曰名猶大也升上也中猶成也謂巡守至于方嶽燔柴祭天告以諸侯之成功也曲禮臨諸侯畛于鬼神曰有天王某甫陳氏澔曰天子巡守而至諸侯之國必使祝史致鬼神當祭者之祭以不親往故祝辭稱字曰某甫甫者丈夫之美稱也方氏慤曰望秩之禮必于野外故以畛言之畛田間道也祭于畛而謂之畛猶祭于郊而謂之郊也天子適諸侯非其常蓋有時矣故于是特言有焉詩周頌序時邁巡狩告祭柴望也時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之朱子集傳周制十有二年王巡狩殷國柴望祭告諸侯畢朝此巡守而朝會祭告之樂歌也般巡狩而祀四嶽河海也於皇時周陟其髙山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命朱子集傳言美哉此周也其巡狩而登此山以柴望又道于河以周四嶽凡以敷天之下莫不有望於我故聚而朝之方嶽之下以答其意耳曹氏曰時邁為武王巡守之頌則般頌成王矣蕙田案以上巡狩柴望周禮天官掌舍掌王之會同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門無宫則共人門凡舍事則掌之夏官土方氏王巡守則樹王舍易氏祓曰樹植也立也王巡守則有四方之舍土方氏既為之土地相宅而知利害之所在然後掌舍為之設梐枑再重為車宫轅門為壇壝宫棘門而土方氏植立之焉蕙田案以上巡狩設舍禮記王制覲諸侯注覲見也禮疏覲見也謂見東方諸侯其見之案覲禮云諸侯覲于天子為宫方三百步四門壇十有二尋深四尺鄭注云王巡守至于方嶽之下諸侯會之亦為此宫以見之是也覲禮又云天子乘龍載大旗拜日于東門之外反祀方明鄭注引朝事儀曰天子冕而執鎮圭尺有二寸云帥諸侯而朝日于東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以會同之禮見諸侯也凡會同者不協而盟盟時設方明於壇上乃以載辭告焉如覲禮及鄭注所云既告至之後為宫加方明於壇天子出宫東門外拜日反祀方明祀方明之後乃徹去方明故鄭云由此二者言之已祀方明乃以會同之禮見諸侯云二者謂覲禮經文朝日東門反祀方明朝事儀云朝日東郊退而朝諸侯故云由此二者言之已祀方明乃以會同之禮見諸侯也今於覲禮未祀方明之前未有見諸侯之事皇氏以為未祀方明之前已有諸侯非也其祀方明之後見諸侯之時王升立于壇上南面諸公中階之前北面諸侯東階之東西面諸伯西階之西東面諸子門東北面諸男門西北面王降階南面而見之三揖既升壇使諸侯升公拜於上等侯伯于中等子男于下等見諸侯訖若有不協更加方明於壇上諸侯等俱北面戎右傳敦血以授歃者司盟主其職故司盟云掌其盟約之載及其禮儀北面詔明神于時王立無文不可與諸侯同北面當於阼階上西面此是見諸侯之禮祀方明之時祭天則燔柴也天謂日也與此岱宗柴所用事别覲禮云祭天燔柴謂天子之盟也祭地瘞謂王官之伯盟也祭山丘陵升及祭川沈者是諸侯之盟也此是巡守及諸侯之盟祭也故注云升沈必就祭者也就祭則是謂王巡守及諸侯之盟祭也祭天柴謂祭日也祭地瘞者祭月也王巡守之盟其神主日諸侯之盟其神主山川則王官之伯會諸侯而盟其神主月與今此王制所主岱宗柴者謂祭天告至而覲禮注引王制云王巡守至于岱宗柴是王巡守之盟其神主日又以柴為盟之所用不同者告至與盟必非一事鄭意證巡守盟時有柴故引岱宗以證之其實别也覲禮云為宫即言加方明經文相連鄭注云王巡狩至于方嶽之下諸侯會之前為此宫則亦有方明但文不具耳故巡守祭天燔柴祭地瘞埋皆是祭方明也故鄭於方明設六玉之下注云上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也以此言之明天子巡守之祭有方明也而皇氏云諸侯來就王會同有方明王巡守見諸侯無方明皇氏用之為説其義非也周禮秋官司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節將合諸侯則令為壇三成宫旁一門注合諸侯謂有事而會也王巡守殷國而同則其為宫亦如此與詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之王氏曰古者天子巡守諸侯入朝一皆為壇於國門之外加方明焉天子示之蓋以為盟尸也此云合諸侯者謂大會同耳巡守之制亦如其會同但會同為壇于國門之外而巡守為壇于方嶽之下耳有事而會不協而盟此壇之所作也其制為壇三成即覲禮所云深四尺者是也蓋從下向上為深發地一尺上有三成則總四尺矣宫旁一門即覲禮所謂宫方三百步四門是也蓋壝土為壇壇外為宫每旁一門則四門矣馬氏端臨曰天子與諸侯相見於方嶽之下築壇與覲禮壇制同其壇外為土埒方三百步開四門壇方九十六尺髙四尺上為堂下為三等謂之三成成每等髙一尺其堂上置司盟之神位謂之方明見諸侯之時據鄭注司儀及覲禮諸侯之上介各以其君之旗置于宫內以表立位之處乃詔王升壇訖諸侯皆就其旗而立其位鄭案明堂位諸公中階之前北面東上諸侯阼階之東西面北上諸伯西階之西東面北上諸子門東北面西上諸男門西北面東上王乃於壇上揖之以定其位其揖之節有三儀與王無親者推手小下之與王婚姻之親者平推手揖之與王同姓者推手小舉之王既揖定其位諸侯乃進升壇奠玉又案司儀職及鄭注云公於上等奠桓圭王陳擯者五人禮之侯伯於中等奠信圭躬圭王陳擯者四人禮之子男於下等奠穀璧蒲璧王陳擯者三人諸侯各奠玉訖降拜又升成拜訖擯者乃延諸侯升堂授玉訖乃以璧琮行享禮謂之將幣諸侯既朝見王訖乃退而自相與盟王官之伯臨之其神主於月必因以祭之蕙田案巡守見諸侯其儀多與覲禮同學者當互參之又案以上巡狩覲諸侯白虎通德論王者巡狩必舍諸侯祖廟何明尊無二上也故禮坊記曰君適其臣升自阼階示不敢有其室也禮曰天子適諸侯必舍其祖廟王者出一公以其屬守二公以其屬從也蕙田案此禮不見于經亦有可疑姑存之又案以上巡狩舍諸侯祖廟掌客掌四方賔客之牢禮餼獻飲食之等數與其政治王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子一眂其大夫之禮注政治邦新殺禮之屬國君者王所過之國君也犢繭栗之犢也以膳天子貴誠也牲孕天子不食也祭帝不用也凡賔客則皆角尺令者掌客令主國也百牲皆具言無有不具備之疏王巡守則殷同殷同則殷國也王巡守至于四嶽下當方諸侯或所在經過或至方嶽之下若殷國或在王城出畿外在諸侯之國所在之處皆設禮待王故巡守殷國並言也易氏祓曰牢禮即凡用牢之禮餼謂餼九牢之類獻謂禽獻之類飲食謂享燕膳食之類禮記郊特牲天子適諸侯膳用犢貴誠之義也陳氏澔曰犢未有牝牡之情故云貴其誠慤蕙田案以上巡狩諸侯致膳牲王制問百年者就見之注就見老人之疏此謂到方嶽之下見諸侯後問百年者就見之若未至方嶽于道路上有百年者則王亦先見之祭義天子巡守諸侯待于竟天子先見百年者注問其國君以百年者所在而往見之八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也注弗敢過者謂道經之則見之疏此一節明尚齒貴老之義八十九十者未滿百嵗不可一一就見若天子諸侯因其行次或東行西行至八十九十者閭里之旁不敢過越而去必往就見之欲言政君就之者謂八十九十之人雖不當道路左右亦當共言論政教往就之可也應氏鏞曰彼向東此向西彼西行此趨東是相違而不相值然必駐行反迂謁而見之不敢超越經過也蕙田案以上巡狩見老人王制命太師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟注陳詩謂采其詩而視之市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴民之志淫邪則其所好者不正之疏太師是掌樂之官令各陳其國風之詩以觀君政善惡命典市之官進納物賈之書以觀民所好惡若民志淫邪則好邪僻之物由在上教之不正此以民俗知君上善惡也蕙田案以上巡狩觀察風俗命典禮考時月定日同律禮樂制度衣服正之注同隂律也疏典禮之官於周則太史也考校四時及十二月之大小時有節氣早晚月有弦望晦朔考之使各當其節又正定甲乙之日隂管之同陽管之律玉帛之禮鐘鼓之樂及制度衣服各有等差當正之使正云同隂律者鄭以先儒以同為齊同此律故辨之太師云執同律以聽軍聲又典同注云同隂律也不以陽律名官者因其先言耳蕙田案陸氏釋文載王肅尚書注以同為齊孔疏因之康成以同為隂律二説不同頴達作禮記疏即與書疏異解似王説較直捷又案以上巡狩考正制度山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功德于民者加地進律注舉猶宗也不順者謂若逆昭穆流放也討誅也律法也疏文二年秋八月丁卯大事于太廟躋僖公逆祀也左傳曰夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也于是躋僖公于閔公之上是逆昭穆也陳氏澔曰律者爵命之等加地而進之所以示勸也蕙田案以上巡狩賞罰黜陟南巡狩如東巡狩之禮西巡狩如南巡狩之禮北巡狩如西巡狩之禮歸格于祖禰用特注假至也特特牛也祖下及禰皆一牛程子曰但止就祖廟共用一牛不如時祭各于其廟也吕氏祖謙曰巡狩而歸茍民物有一不得其所其見祖廟有愧心矣想先王歸格之時此心無愧對越在廟慰愜可知也陳氏澔曰假至也歸至京師即以特牛告至于祖禰之廟蕙田案尚書但言祖禮記兼言禰文有詳略其禮一也孔叢子巡守歸反舍于外次三日齋親告于祖禰用特命有司告羣廟社稷及圻內名山大川而後入聽朝蕙田案以上巡狩歸告廟竹書紀年武王十五年初巡方嶽誥于沫邑通鑑前編武王十有五年春巡狩方嶽祀百神朝諸侯書周官惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周通鑑前編成王十有二年巡狩朝諸侯于方嶽因行黜陟之典竹書紀年成王十九年王巡狩侯甸方嶽召康公從歸于宗周遂正百官黜豐侯康王十六年王南巡守至九江廬山通典昭王德衰南巡濟于漢船人惡之以膠船進王王御船至中流膠液船解王及祭公俱沒于水而崩其右卒遊靡長臂且多力遊得王周人諱之穆天子傳周穆王守滲澤得白狐元狢以濟河宗得驥溫驪騄耳之駟西巡守樂而忘歸蕙田案穆天子傳文多荒誕未必紀實其事亦見史記秦本紀今存其略不詳及竹書紀年宣王八年巡狩東都朱子詩車攻集傳周公相成王營洛邑為東都以朝諸侯周室既衰久廢其禮至于宣王內修政事外攘夷狄復文武之境土修車馬備器械復會諸侯于東都因田獵而選車徒焉故詩人作此以美之春秋莊公二十一年左氏傳夏五月王巡虢守虢公為王宫于玤王與之酒泉鄭伯之享王也王以后之鞶鑑與之虢公請器王豫之爵鄭伯由是始惡于王冬王歸自虢春秋僖公二十有八年冬天王狩于河陽左氏傳是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明德也史記周本紀二十年晉文公召襄王襄王會之河陽踐土諸侯畢朝書諱曰天王狩于河陽蕙田案周禮所載周巡狩之儀甚詳其他禮記王制及見于各傳記者或兼夏殷巡狩之典然别無所考今統入周制右周巡狩之禮五禮通考卷一百七十八
