如之何侍郎無所用力事權多在中書自中書侍郎遷門下侍郎雖名進其實皆未必樂也馬氏端臨曰以宰相而兼他官本非令典唐制所謂反輕宰相之體是也然時方用兵則兼節度使崇儒學則為大學士急財用則為鹽鐵轉運使蓋以國家方重其事而以宰相提綱則下不敢以泛泛之司存親之猶有説也至於三省則俱為政本之地無所不統長官則宰相所謂中書門下同平章事是也佐官則參知政事是也今元豐改官制既以中書門下同平章事為左右僕射參知政事為中書門下侍郎尚書左右丞矣而復以左僕射兼門下侍郎右僕射兼中書侍郎則是既自有佐官而復以長官兼之贅疣甚矣蓋神宗必欲復唐三省之職而蔡確以有中書造命之説已為次相兼中書侍郎王圭為首相兼門下侍郎實欲隂擯圭於門下使不得與造命取旨之事苟以便其專政之私而不復顧體統名稱之不順也蕙田案丞相之名始於秦而漢因之哀帝改為大司徒自後不置魏晉以後或置或否居之者多非尋常人臣之職隋唐五代及北宋俱無丞相之名南渡復置左右丞相明初始廢平章軍國重事元祐中置使相親王樞密使留守節度使兼侍中中書今同平章事者皆謂之使相不預政事不書敕惟宣敕除授者敕尾存其御而已馬氏端臨曰宰相者總百官弼天子既不當儕之他官而其上則不當復有貴官矣自唐開元以來郭元振李光弼相繼以平章事為節度使謂之使相而宰相之職儕於他官自此始自宋元祐以後文潞公吕申公相繼以平章軍國重事序宰臣上而宰相之上復有貴官自此始然郭李以勳臣名將為之宜也自此例一開於是田承嗣李希烈之徒俱以節鎮帶同平章事者非一人極而至於王建馬殷錢鏐之輩蜂起盜地者皆欲效之蓋鄙他官而不為而必欲儕於宰相以自附於郭李則唐中葉以後所謂平章者如此文吕以碩德老臣為之宜也自此例一開於是蔡京王黼相繼以太師總知三省事三日一朝赴都堂治事以至於韓托胄賈似道擅權專政之久者皆欲效之蓋卑宰相而不屑為而必求加於相以自附於文吕則宋中葉以後所謂平章者如此蓋平章之始立名也本非甚尊之官及其久也則強藩之竊地者為之權臣之擅政者為之蓋雖官極尊而居之者多非其人矣參知政事乾德二年置以副宰相不押班不知印不升政事堂開寶六年詔參政於都堂與宰相同議政事至道元年詔宰相與參政輪班知印同升政事堂押敕齊銜行則並馬元豐新官制廢參知政事以門下中書二侍郎尚書左右丞代之建炎三年復門下中書侍郎為參知政事而省左右丞門下首受天下之成事審命令駮正違失國初以中書門下平章事為宰相復用兩制官一員判門下省事官制行始釐正焉凡官十有一侍中侍郎左散騎常侍各一人給事中四人左諫議大夫起居郎左司諫左正言各一人髙侍中掌佐天子議大政審中外出納之事國初以秩罕除自建隆至熙寧真拜侍中才五人官制行以左僕射兼門下侍郎行侍中職别置侍郎以佐之南渡省侍中不置侍郎掌二侍中之職省中外出納之事與知樞密院同知樞密院中書侍郎尚書左右丞並為執政官南渡省不置左散騎常侍左諫議大夫左司諫左正言同掌規諫諷諭國初置諫院知院官凡六人以司諌正言充職而他官領者謂之知諫院正言司諌亦有領他職而不預諌諍者官制行始皆正名給事中掌讀中外出納及判後省之事若政令失當除授非人則論奏而駮正之故事詔旨付銀臺司封駮官制行給事中始正其職而封駮司歸門下起居郎掌記天子言動舊置起居院命三館校理以上修起居注官制行改修注為郎舍人元豐六年詔左右史分記言動元祐元年仍詔不分𨽻符寶郎二人掌外廷符寶之事通進司進奏院俱給事中舊為通進銀臺司言登聞檢院𨽻諌議大夫告登聞鼓院𨽻司諌正中興後撿鼓糧審官官進奏謂之六院中書省掌進擬庶務官奉命令設官十有一令侍郎右散騎常侍各一人舍人四人右諌議大夫起居舍人右司諫右正言各一人真令掌佐天子議大政授所行命令而宣之國朝未嘗拜官制行以右僕射兼中書侍郎行令之職别置侍郎以佐之中興省令不置侍郎掌二令之職恭議大政南渡省不置中書舍人掌行命令為制詞分治六房國初為所遷官實不任職復置知制誥及直舍人院與學士對掌內外制官制行始正名而判後省之事右起居舍人掌同起居郎同右散騎常侍右諌議大夫司諫右正言與門下省但左屬門下右屬中書通謂之兩省官中興初詔諌院不𨽻兩省紹興二年詔並依舊檢正官五房各一人掌糾正省務葉氏夢得曰元豐既新官制四十年間職事官未有不經除者惟御史大夫左右散騎常侍至今未嘗除人蓋兩官為臺諌之長非宰執所利故無有啓之者尚書省掌施行制命舉省內綱紀程式六部皆𨽻焉設官九令左右僕射左右丞左右司郎中員外郎各一人來令掌佐天子議大政奉所出命令而行之自建隆以不除政和二年詔不復置宣和七年復置亦無除者南渡後並省行左右僕射掌二令之職與三省長官皆為宰相官制以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令事政和中改左僕射為太宰右僕射為少宰靖康元年復舊南渡後置左右丞相省僕射不置下左右丞掌通治省事二令僕射之職舊班六曹尚書官制行升其秩為執政南渡省不置左右司郎中員外郎掌分治六曺之事左司治吏户禮右司治兵刑工建炎中詔減左右司郎官二員置中書門下檢正諸房公事二員次年復舊雜榷賀務都茶場提轄官一員監場官二員與雜買務賣場文思院左藏東西庫提轄並稱四轄一左藏封椿庫監官一員監門官員洪氏邁容齋隨筆中書尚書令在西漢時為少府官屬與太官湯官上林諸令品秩略等侍中但為加官在東漢亦屬少府而秩稍增尚書令為千石然銅印墨綬雖居機要而去公卿甚逺至或出為縣令魏晉以來浸以華重唐初遂為三省長官居真宰相之任猶列三品大厯中乃升正二品入國朝其位益尊敘班至在太師之上然只以為親王及使相兼官撫單拜者見任宰相帶侍中者才五人范魯公質趙韓王普丁晉公謂馮魏公拯韓魏王琦尚書令又最貴除宗王外不以假人趙韓王韓魏王始贈真令韓公官止司徒及贈尚書令乃詔自今更不加贈蓋不欲以三師之官贅其稱也政和初蔡京改侍中中書令為左輔右弼而不置尚書令以為太宗皇帝曽任此官殊不知乃唐之太宗為之故郭子儀不敢拜非本朝也蕙田案侍中中書令尚書令魏晉以後為樞機之職比於宰相隋唐定為真相宋初因之以其秩髙不輕授人多為宗王宰輔加官及贈官而已南渡以後俱廢元初耶律楚材嘗為中書令其後但以東宫領之至尚書令及侍中更不復置矣明建文中嘗置侍中在尚書下侍郎上名同而職異尋廢樞密院掌軍國機務出納密命宋初以樞密院與中書對持文武二柄號為二府神宗初政省其務之細者歸之有司增置審官西院領閣門祗候以上至諸司使差遣官制行隨事分𨽻六曺而樞府專以本兵為職書樞密使知院事佐天子執兵政而同知院事副使簽院事為之二國初官無定制有使則置副有知院則置同知院資淺則用直學士簽書院事熙寧元年知院與副使並置元豐改官制議者欲廢密院歸兵部帝曰祖宗不以兵柄歸有司故專命官以統之互相維制何可廢也於是得不廢定置知院同知院二人副使悉罷元祐初復置簽書同簽書徽宗朝又有領樞密院事中興復置樞密使多以宰相兼之使與知院同知副使亦或並除其簽書同簽書並為端明殿學士恩數特依執政或以武臣為之都承旨副都承旨舊用院吏遞遷其後或用文臣或武臣為之興檢詳官熙寧中置視中書檢正官元豐新制罷之中復置計議官四員字編修官隨事置無定員賞主管三省樞密院架閣文一員三省樞密院激庫三省樞密院激賞酒庫監官各二人馬氏端臨曰樞密之名始於唐代宗寵任宦者故置內樞密使使之掌機密文書如漢之中書謁者令是也若內中處分則令內樞密使宣付中書門下施行則其權任已侔宰相至僖昭間楊復恭西門季元之徒遂至於視事行文書矣昭宗天復元年既誅劉季述乃敕近年宰相延英奏事樞密院侍側爭論紛然既出又稱上旨未允復有改易撓權亂政自今並依大中舊制俟宰相奏事畢方得升殿承受公事蓋當時所謂樞密使者專橫如此朱梁懲唐敝不用宦者然徒知宦者之不可用而不知樞密院之不必存也乃復改為崇政院以敬翔為使至後唐而復樞密院郭崇韜安重誨相繼領其事皆腹心大臣則是宰相之外復有宰相三省之外復有一省矣宋興始以樞密與中書對持文武二柄號稱二府然後樞密院之設始專有職掌不為贅疣然祖宗時樞密院官雖曰掌兵亦未嘗不兼任宰相之事景德四年中書命祕書丞楊士元通判鳯翔府樞密院命之掌內香藥庫兩府不相知宣勑各下乃詔自今中書所行事關軍機及內職者報樞密院樞密院所行關民政及京朝官者報中書是樞密院得以預除授之事也又是年命宰臣王旦監修兩朝正史知樞密王欽若陳堯叟參知政事趙安仁並修國史是樞密院可以預文史之事也至慶歷以後始以宰相兼樞密使及元豐官制行欲各正其名遂不復兼乃詔釐其事大小大事三省與樞密院同議進呈畫旨稱三省樞密院同奉聖旨三省皆同簽書付樞密院行之小事樞密院獨取旨行訖關三省每朝三省樞密先同對樞密院退待於殿廬三省始留進呈三省事退樞密院再上進呈獨取旨遂為定例然熙寧初以司馬溫公為樞密副使公以言新法不見聽力辭上使人謂之曰樞密兵事也官各有職不當以他事辭其時文潞公亦在樞府雖持正論終不能抑新法之行至哲宗初即位蔡確為相溫公為門下侍郎章惇知樞密院溫公欲復差役法而確言此大事當與樞密院同議取旨惇果駁溫公所言然則樞密院雖可以參謀三省之事而又在所以委任之者如何溫公潞公當熙寧之時與國論不合則欲其專任本兵不預他事蔡確當元祐之初欲引章惇以自助則欲其共立異議隂排正人至紹聖以後則兩府皆憸人附會紹述更無異議亦不復聞以文馬之儔參錯其間矣洪氏邁容齋隨筆國朝樞密之名其長為使則其二為副使其長為知院則其二為同知院如柴禹錫知院向敏中同知及曹彬為使則敏中改副使王繼英知院王旦同知繼馮拯陳堯叟亦同知及繼英為使拯堯叟乃改簽書院事而恩例同副使王欽若陳堯叟知院馬知節簽書及王陳為使知節遷副使其後知節知院則任中正周起同知惟熙寧初文彥博吕公弼已為使而陳升之過闕留王安石以升之曾再入樞府遂除知院知院與使並置非故事也安石之意以沮彥博耳紹興以來唯韓世忠張俊為使嶽飛為副使此後除使固多而其二只為同知亦非故事也又使班視宰相而乾道職制雜壓令副使反在同知之下蕙田案熙寧以後有提舉修敕令制置三司條例司三司會計司編修條例經撫房提舉講議司儀禮局禮制局南渡則有御營使提舉修政局制國用使都督諸路軍馬編修敕令所皆以宰執兼領因事創名未久遄罷今皆略之宣徽院宣徽南院使北院使掌總領內諸司及三班內侍之籍郊祀朝會宴饗供帳之儀二使共院而各設廳事故事與恭知政事樞密副使同知樞密院事以先後入敘位熙寧四年詔位恭政樞副同知下官制行罷宣徽院以職事分𨽻省寺而使號猶存紹聖三年罷自後不復置三司使國初沿五代之制置三司使號曰計省位亞執政太平興國八年分置鹽鐵度支