刑等官然唐宋中葉以後監司尤多蓋唐之多設監司也起于開元天寶之興利如楊國忠為宰相所領四十餘使元道州到官未五十日諸使徴求符牒三百餘封是也宋之多設監司也起于熙寧元豐之行新法如蘇軾所謂使者四十餘輩事少員多人輕權重及司馬光所謂提舉司乃病民之本源是也府州軍監諸府置知府事一人州軍監亦如之二品以上及帶兩府職事者稱判通判大郡置二員餘置一員州不及萬户不置武臣知州小郡亦特置焉幕職官有簽書判官廳公事兩使防圑軍事推判官節度掌書記觀察支使凡員數多寡視郡大小及職事之繁簡政和初改簽書判官廳公事為司録建炎初復舊諸諸曺官有録事户曺司法司理恭軍教授慶厯中置縣令有丞主簿尉若京朝官則稱知縣事有戍兵則兼兵馬都監或監押廟令舊制五嶽四瀆東海南海諸廟俱置令丞主簿總管鈐轄司治軍旅屯戍營房守禦之政令崇寧四年京畿四輔置副總管鈐轄各一員知州為都總管路分都監掌本路禁旅屯戍邉防訓練之政令諸軍都統制副都統制建炎初置御營司立都統制紹興十一年設御前諸軍都統制其後諸軍皆除都統制權任在帥臣右官卑者稱副都統制初渡江後大軍又有統制同統制副統制統領同統領副統領其下有正將凖備將訓練官部將隊將等名皆偏禆也巡檢司有沿邉溪洞都巡檢或蕃漢都巡檢或數州數縣管界或一州一縣又有刀魚船戰棹巡檢江河淮海置捉賦巡檢及巡馬巡鋪巡河巡捉私茶鹽等名蕙田案巡檢在宋為邉徼典軍之要職元明以後役屬於縣令其任益卑瑣矣監當官掌茶鹽酒稅場務征輸及冶鑄之事諸州軍隨事置名右宋官制五禮通考卷二百十八
