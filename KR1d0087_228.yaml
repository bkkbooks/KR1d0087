body:
  text: 五禮通考卷二百十八刑部尚書秦蕙田撰嘉禮九十一設官分職唐書百官志唐之官制其名號祿秩雖因時增損而大抵皆沿隋故其官司之别曰省曰臺曰寺曰監曰衛曰府各統其屬以分職定位其辨貴賤敘勞能則有品有爵有勳有階以時考核而升降之初太宗省內外官定制為七百三十員曰吾以此待天下賢材足矣然是時已有員外置其後又有特置同正員至於檢校兼守判知之類皆非本制又有置使之名或因事而置事已則罷或遂置而不廢其名類繁多莫能遍舉自中世以後盜起兵興又有軍功之官遂不勝其濫矣宰相之職佐天子總百官治萬事其任重矣然自漢以來位號不同而唐世宰相名尤不正初唐因隋制以三省之長中書令侍中尚書令共議國政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名自太宗時杜淹以吏部尚書參議朝政魏徴以祕書監參預朝政其後或曰參議得失參知政事之類其名非一皆宰相職也貞觀八年僕射李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事而平章事之名蓋起於此其後李績以太子詹事同中書門下三品謂同侍中中書令也而同三品之名蓋起於此然二名不專用而他官居職者猶假他名如故自髙宗以後為宰相者必加同中書門下三品雖品髙者亦然惟三公三師中書令則否其後改易官名而張文瓘以東臺侍郎同東西臺三品同三品入銜自文瓘始永淳元年以黃門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事平章事入銜自待舉等始自是以後終唐之世不能改初三省長官議事于門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂於中書省開元中張説為相又改政事堂號中書門下列五房于其後一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房分曹以主衆務焉宰相事無不統故不以一職名官自開元以後常以領他職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐵轉運使又其甚則為延資庫使至於國史太清宫之類其名頗多皆不足取法故不著其詳通典唐侍中中書令是真宰相尚書左右僕射亦嘗為宰相其間或改為納言內史左相右相黃門監紫微令等名其本即侍中中書令也共有四員其僕射貞觀末始加平章事方為宰相其餘以他官參掌者無定員但加同中書門下三品貞觀十七年以兵部尚書李績同中書門下三品同中書門下三品自此始也永淳𢎞道之際裴炎為正議大夫守侍中崔知溫為正議大夫守中書令劉齊賢為中大夫守侍中並同中書門下三品按此當以階卑官髙令所給祿秩同三品耳當時權時之制其後亦有階卑為侍中中書令者即更不言及平章事知政事參知機務參與政事及平章軍國重事之名者並為宰相亦漢行丞相事之例也自先天之前其員頗多景龍中至十餘人開元以來常以二人為限或多則三人天寶十五年之後天下多難勳賢並建故備位者衆然其秉鈞持衡亦一二人而已蕙田案正議大夫階正四品中大夫階從四品而侍中中書令皆正二品故云階卑官髙也髙宗以後官至侍中中書令則無同三品同平章事之稱又案唐書宰相表以他官參宰相之任者稱號不一有云知政事平章政事參議朝政參預朝政參知政事參議得失專典機密參知機務參掌機密參預機務同掌機務同知軍國政事平章軍國重事者髙宗以後同中書門下三品同中書門下平章事二名兼用肅代以降宰相無不稱平章事者矣馬氏端臨曰唐初始定制以三省為宰相之司存以三省長官為宰相之職任然省分為三各有所掌而其官亦復不一相職既尊無所不統則不容拘以一職於是始有同中書門下三品同平章事參知機務參預政事之名焉諸名之中所謂同平章事者唐初雖以稱宰相乃以處資淺之人在參知政事之下中世以後則獨為真宰相之官至宋元豐以前皆然學士之職本以文學言語被顧問出入侍從因得參謀議納諌諍其禮尤寵而翰林院者待詔之所也唐制乘輿所在必有文詞經學之士下至卜醫伎術之流皆直於别院以備宴見而文書詔令則中書舍人掌之自太宗時名儒學士時時召以草制然猶未有名號乾封以後始號北門學士元宗初置翰林待詔以張説陸堅張九齡等為之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書敕開元二十六年又改翰林供奉為學士别置學士院專掌內命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號為內相又以為天子私人凡充其職者無定員自諸曺尚書下至校書郎皆得與選入院一嵗則遷知制誥未知制誥者不作文書班次各以其官內宴則居宰相之下一品之上憲宗時又置學士承旨唐之學士𢎞文集賢分隸中書門下省而翰林學士獨無所屬三師三公太師太傅太保各一人太尉司徒司空各一人皆不設官屬尚書省尚書令一人掌典領百官其屬有六尚書庶務皆會決焉龍朔二年改尚書省曰中臺廢尚書令尚書曰太常伯侍郎曰少常伯光宅元年改尚書省曰文昌臺俄曰文昌都省垂拱元年曰都臺長安三年曰中臺左右僕射各一人掌統理六官為令之二令闕則總省事龍朔二年改曰左右匡政光宅元年曰文昌左右相開元元年曰左右丞相天寶元年復左右丞各一人掌辨六官之儀糾正省內左丞總吏户禮部右丞總兵刑工部左右司郎中各一人員外郎各一人都事各六人主事各六人龍朔元年改左右丞曰左右肅機郎中曰左右承務諸司郎中曰大夫永昌元年置員外郎神龍元年省明年復置吏部尚書一人侍郎二人掌文選勳封考課之政其屬有四曰吏部曰司封曰司勳曰考功吏部郎中員外郎各二人掌文官階品朝集祿賜給其告身司封郎中員外郎各一人掌封命朝會賜豫之級司勳郎中一人員外郎二人掌官吏勳級考功郎中員外郎各一人掌文武百官功過善惡之考吏部主事四人司封二人司勳四人考功三人武德五年改選部曰吏部七年省侍郎貞觀二年復置龍朔元年改吏部曰司列主爵曰司封考功曰司績咸亨初復舊武后光宅元年改吏部曰天官垂拱元年改主爵曰司封天寶十一載改吏部曰文部至德二載復舊户部尚書一人侍郎二人掌天下土地人民錢穀之政貢賦之差其屬有四曰户部曰度支曰金部曰倉部户部郎中員外郎各二人掌户口田土賦役貢獻蠲免優復姻婚繼嗣之事度支郎中員外郎各一人掌天下租賦嵗計所出而支調之金部郎中員外郎各一人掌天下庫藏出納權衝度量之數倉部郎中員外郎各一人掌天下軍儲出納租稅祿糧倉廪之事户部巡官二人主事四人度支主事二人金部倉部主事各三人髙宗即位改民部曰户部龍朔三年改户部曰司元度支曰司度金部曰司珍倉部曰司庾光宅元年改户部曰地官天寶十二載改金部曰司金倉部曰司儲禮部尚書一人侍郎一人掌禮儀祭享貢舉之政其屬四曰禮部曰祠部曰膳部曰主客禮部郎中員外郎各一人掌禮樂學校衣冠符印表疏圗書册命祥瑞鋪設祠部郎中員外郎各一人掌祠祀享祭膳部郎中員外郎各一人掌陵廟之牲豆酒膳主客郎中員外郎各一人掌二王後諸蕃朝見之事主事禮部祠部膳部主客各二人武德四年改儀曹郎曰禮部郎中司蕃郎曰主客郎中龍朔二年改禮部曰司禮祠部曰司禋膳部曰司膳光宅元年改禮部曰春官兵部尚書一人侍郎二人掌武選地圗車馬甲械之政其屬四曰兵部曰職方曰駕部曰庫部兵部郎中員外郎各二人掌武官階品軍戎調遣貢舉雜請資厯考課職方郎中員外郎各一人掌地圗逺近及四夷歸化之事駕部郎中員外郎各一人掌輿輦車乘傳驛廄牧馬牛雜畜之籍庫部郎中員外郎各一人掌戎器鹵簿儀仗兵部主事四人職方駕部庫部各二人龍朔二年改兵部曰司戎職方曰司城駕部曰司輿庫部曰司庫光宅元年改兵部曰夏官天寶十一載曰武部駕部曰司駕刑部尚書一人侍郎一人掌律令刑法徒𨽻按覆讞禁之政其屬四曰刑部曰都官曰比部曰司門刑部郎中員外郎各二人掌律法按覆奏讞都官郎中員外郎各一人掌俘𨽻簿録給衣糧醫藥而理其訴免比部郎中員外郎各一人掌句會內外賦斂經費俸祿贓贖徒役課程逋欠之物司門郎中員外郎各一人掌門關出入及闌遺之物刑部比部主事各四人都官司門各二人龍朔二年改刑部曰司刑都官曰司僕比部曰司計司門曰司關光宅元年改刑部曰秋官天寶十一載改刑部曰司憲比部曰司計工部尚書一人侍郎一人掌山澤屯田工匠諸司公廨紙筆墨之事其屬四曰工部曰屯田曰虞部曰水部工部郎中員外郎各一人掌城池土木之工役程式屯田郎中員外郎各一人掌天下屯田及文武職田諸司公廨田虞部郎中員外郎各一人掌苑囿山澤草木供頓畋獵之事水部郎中員外郎各一人掌津渠堤堰溝洫運漕之事工部主事三人屯田虞部水部各二人武德三年改起部曰工部龍朔二年曰司平屯田曰司田虞部曰司虞水部曰司川光宅元年改工部曰冬官天寶十一載改虞部曰司虞水部曰司水馬氏端臨曰漢成分尚書置四曹蓋因事設員以司其務非擬于古制也漢魏以來或五或六亦隨宜施制無有常典自宋齊以後稍定為六曹至隋六部而其制益明武太后遂以吏部為天官若參詳古今徴考職任則天官太宰當為尚書令非吏部之任今之吏部特出于夏官之司士耳今户部之職與地官之任雖云頗同各徴其承受考其沿襲則户部合出于度支度支主計算之官也計算之任本出于周禮天官之司會云蕙田案六部每部領四司昉於隋而唐宋皆因之吏部户部禮部兵部刑部工部六司謂之頭司餘為子司隋時諸曹皆稱郎唐武德三年始名郎中初户部在禮部後武后以六部擬周禮六官改户部為地官由是居禮部之前矣通典載顯慶元年改户部為度支尚書咸亨元年復為户部而唐志不載又天寶中改刑部曰憲部唐志稱司憲亦誤門下省侍中二人掌出納帝命相禮儀凡國家之務與中書令參總而專判省事武德元年改侍內曰納言三年曰侍中龍朔二年改門下省曰東臺侍中曰左相武后光宅元年曰納言垂拱元年改門下省曰鸞臺開元元年曰黃門省侍中曰監天寶元年曰左相門下侍郎二人掌二侍中之職龍朔二年改黃門侍郎曰東臺侍郎武后垂拱元年曰鸞臺侍郎天寶元年曰門下侍郎乾元元年曰黃門侍郎大厯二年復舊左散騎常侍二人掌規諷過失侍從顧問隋廢散騎常侍貞觀元年復置十七年為職事官顯慶二年分左右𨽻門下中書省皆金蟬珥貂左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂龍朔二年曰侍極左諫議大夫四人掌諫諭得失侍從贊相武德元年置諫議大夫龍朔二年曰正諫大夫貞元四年分左右又武后垂拱二年鑄銅匭四列於朝堂以受四方之書以諫議大夫補闕拾遺一人充使知匭事御史中丞侍御史一人為理匭使其後同為一匭元宗改理匭使為獻納使至德元年復舊寶應元年命中書門下擇正直清白官一人知匭以給事中中書舍人為理匭使建中二年以御史中丞為理匭使諫議大夫一人為知匭使給事中四人掌侍左右分判者事門下省有録事四人主事四人左補闕左拾遺各六人掌供奉諷諫大事廷議起居郎二人掌録天子起居法度與舍人分侍殿左右龍朔二年曰左史天授元年亦如之典儀二人掌