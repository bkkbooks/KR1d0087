body:
  text: 五禮通考卷六十五刑部尚書秦蕙田撰吉禮六十五宗廟制度禮記明堂位夏后氏以楬豆殷玉豆周獻豆注楬無異物之飾也獻疏刻之方氏慤曰楬豆未有他飾以木為柄若蠟氏之楬而已玉豆則于楬之上又飾之以玉也獻若周官所謂再獻之獻再獻對朝踐言之則朝踐為初獻矣醢人所謂朝踐之豆者初獻也所謂饋食之豆者再獻也此言獻豆則主祭祀之豆耳以祭祀之豆為疏刻之形則燕享之豆不疏刻矣司尊彛所謂獻尊義亦類此是皆漸增其飾也何氏楷曰以木為之則無異飾楬以言其制玉以言其飾獻以言其用薦用玉豆雕纂注纂籩屬也以竹為之雕刻飾其直者也疏薦用玉豆者謂所薦菹醢之屬也以玉飾豆故曰玉豆雕纂者與豆連文故知籩屬形似筥亦薦時所用纂既用竹不可刻飾故知雕鏤其柄鄭注飾其直直謂柄也馬氏晞孟曰玉豆所薦謂菹醢之屬水草之和氣也雕纂所薦謂陸産之物也凡器飾之以玉皆貴文之意也方氏慤曰天子飾豆以玉諸侯以象玉豆則天子之豆也以玉以象則與笏之所用同義儀禮士虞禮饌兩豆菹醢于西楹之東醢在西注醢在西南面取之得左取菹右取醢便其設之在疏以其尸在輿東面設者西面設于尸前菹在南醢北今于西楹束饌之菹在東醢在西是南面取之得左取菹右取醢至尸前西面又左菹右醢故云便也從獻豆兩亞之四籩亞之北上注豆從主人獻祝籩從主婦獻尸祝北上菹與棗不東陳疏據此陳之次然則東北菹為首次南醢醢東栗栗北棗棗東棗棗南栗云豆從主人獻祝者此二豆主人先獻祝酒後及薦豆故言從云籩從主婦獻尸祝者以其四籩二籩從主婦獻尸二籩從主婦獻祝亦是從也士虞禮記豆實葵菹菹以西螺醢籩棗蒸栗擇注棗蒸栗擇則菹刌也棗蒸栗擇則豆不楬籩有縢也特牲饋食禮宗人升自西階視壺濯及豆籩主婦盥于房中薦兩豆葵菹蝸醢醢在北佐食羞庶羞四豆設于左南上有醢注庶衆也衆羞以豕肉所以為異味四豆者膮炙胾醢南上者以膮炙為上以有醢不得䋫也宗婦執兩籩戶外坐主婦受設于敦南注兩籩棗栗棗在西席于户內設兩豆兩籩注主婦薦兩豆籩東面也特牲饋食記籩巾以綌也纁裹棗蒸栗擇注籩有巾者果實之物多皮核優尊者可蒸裹之也蒸擇互文舊説云纁裹者皆玄被少牢饋食禮司宫溉豆籩饌豆籩與篚于房中放于西方注放猶依也改饌豆籩于房中南面如饋之設實豆籩之實主婦被錫衣侈袂薦自東房韭菹醓醢坐奠于筵前主婦贊者一人亦被錫衣侈袂執葵菹螺醢以授主婦主婦不興遂受陪設于東韭菹在南葵菹在北注韭菹醓醢朝事之豆也而饋食用之豐大夫禮葵菹在北䋫疏云韭菹醓醢朝事之豆也者案周禮醢人職朝事之豆韭菹醓醢彼天子八豆今大夫取二豆為饋食用之豐大夫禮故也若然葵菹螺醢亦天子饋食之豆今大夫用之鄭不言者彼饋食當其節天子八豆此大夫取二而已上佐食羞胾兩瓦豆有醢亦用瓦豆設于薦豆之北注設于薦豆之北以其加也四豆亦䋫羊胾在南豕胾在北薦兩豆菹醢注葵菹螺醢饋疏上亦云葵菹螺醢是食之豆當饋食之節是其常事故不言豐大夫之禮今祝用之亦其常事故知葵菹螺醢也祝取肝㨎于鹽有司徹主婦自東房薦韭菹醢坐奠于筵前菹在西方婦贊者執昌菹醢以授主婦主婦不興受陪設于南昌在東方興取籩于房麷蕡坐設于豆西當外列麷在東方婦贊者執白黑以授主婦主婦不興受設于初籩之南白在西方興退注昌昌本也韭菹醓醢昌本麋臡麷熬麥也蕡熬枲實也白熬稻黑熬黍此皆朝事之豆籩大夫無朝事而用之儐尸亦豐大夫之禮主婦取籩興者以饌異親之當外列辟鉶也退退入房也主人酌獻侑主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩麷蕡以授主婦主婦不興受之奠麷于醢南蕡在麷東司空設席于東序主婦薦韭菹醢坐奠于筵前菹在北方婦贊者執二籩麷蕡主婦不興受設麷于菹西北蕡在麷西主婦西面于主人之席北入于房取糗與腶修執以出坐設之糗在蕡西修在白西注糗糗餌也腵修搗肉之脯酌獻侑主婦羞糗修坐奠糗于麷南修在蕡南酌以致主人主婦設二鉶與糗修主人揖尸侑婦贊者薦韭菹醢坐奠于筵前菹在西方婦人贊者執麷蕡以授婦贊者婦贊者不興受設麷于菹西蕡在麷南主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦贊者執栗脯主婦不興受設之栗在糗東脯在棗東注棗饋食之籩糗羞籩之實雜用之下賔尸也栗脯加籩之實也宰夫薦棗糗坐設棗于菹西糗在棗南注內子不薦籩祝賤使官可也主婦洗于房中酌致于主人主婦薦韭菹醢坐設于席前菹在北方婦贊者執棗糗以從主婦不興受設棗于菹北糗在棗西酌致爵于主婦婦贊者薦韭菹醢菹在南方婦人贊者執棗糗授婦贊者婦贊者不興受設棗于菹南糗在棗東詩小雅楚茨為豆孔庶傳豆謂內羞庶羞也主箋庶䏧也祭祀之禮后夫人共籩豆必取肉物肥䏧美者也醢傳正義曰毛以孔庶為甚衆此豆實則菹醢也周禮人注云凡醢者必先膞乾其肉乃莝之雜以粱麴及鹽漬以美酒塗置瓶中百日則成矣然則為豆先祭而豫作此本而言之非當祭時也豆內羞庶羞者以言孔庶則非一故為兼二羞也有司徹云宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之注云二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞內羞也內羞在右隂也庶羞在左陽也是有二羞之事也禮記祭統夫人薦豆執校執醴授之執鐙注校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也酌疏鄭注執醴授醴之人者謂夫人獻尸以醴齊此人醴以授夫人至夫人薦豆此人又執豆以授夫人獻與薦皆此人所掌故也周禮考工記旊人豆中縣注縣縣繩正豆之柄之疏豆中縣者豆柄中央把者長一尺宜上下直與縣繩相應其豆則直楊氏復儀禮旁通圗籩豆士冠脯醢脯用籩醢用豆士昏醴賔脯醢鄉飲脯醢衆賔辨有脯醢鄉射薦用籩脯五膱醢以豆聘禮醴賔脯醢又筵几于室薦脯醢燕禮大射禮獻賔獻公獻卿薦脯醢士喪禮始死奠脯醢小斂脯醢朝夕奠脯醢特牲主人獻賔薦脯醢以上皆一豆一籩士冠再醮兩豆葵菹螺醢兩籩栗脯大斂毼豆兩籩無縢士虞兩豆兩籩獻祝兩豆兩籩特牲兩籩兩豆主婦致爵于主人兩豆兩籩以上皆兩豆兩籩既夕遣奠四豆四籩少牢賔尸四豆四籩以上皆四豆四籩楊氏復曰案儀禮吉凶所用或一豆一籩或二豆二籩或四豆四籩此士大夫之禮然也周禮醢人掌四豆之實朝事之豆八饋食之豆八加豆之實八羞豆之實二籩人掌四籩之實朝事之籩饋食之籩加籩之實羞籩之實此天子之祭禮也禮器云天子之豆二十有六諸侯十有六此天子諸侯所用之數也又案聘禮歸饔餼二十豆公食大夫下大夫六豆上大夫八豆此皆諸侯待聘賔之禮也周官掌客上公豆四十侯伯豆三十有二子男豆二十有四此天子待諸侯之禮也掌客之豆較之于禮器之豆掌客之數又多焉何耶或曰禮器之數用數也掌客之數陳數也有豆無籩士昏禮夫婦席醯醬二豆菹醢四豆無籩婦饋舅姑有菹醢無籩婦見舅姑有笄棗栗聘禮歸饔饋八豆西夾六豆東夾亦如之無籩公食大夫下大夫六豆無籩上大夫八豆無籩士喪禮朔月奠無籩有黍稷當籩位又禮器天子之豆二十六以下言豆不言籩周官掌客上公豆四十以下不言籩及夫人致禮方有豆有籩蓋豆重而籩輕觀特牲禮厭祭時薦兩豆葵菹蝸醢及迎尸饋食之時尸取菹㨎于醢祭于豆間又佐食羞庶羞四豆皆未用籩也及主婦亞獻尸始設籩贊籩祭少牢厭祭設韭菹醯醢葵菹螺醢及迎尸饋食之時尸取韭菹㨎于三豆祭于豆間及主婦獻尸亦未用籩也逮明日賔尸于是主婦薦韭菹醢昌菹醢取籩于房設爵實白黑四籩後其所薦先後之序則豆重籩輕于此可見矣爾雅釋器木豆謂之豆注豆禮器也成疏案周禮旊人為豆實三而觳崇尺鄭注云崇髙也豆實四升又祭統云夫人薦豆執校執醴授之執鐙鄭注云校豆中央直者也鐙豆下跗也又禮圗云口員徑尺黑漆飾朱中大夫以上畫以雲氣諸侯以象天子以玉皆謂飾其豆口也然則豆者以木為之髙一尺口足徑一尺其足名鐙中央直豎者名校校徑二寸總而言之名豆其實四升用薦菹醢周禮醢人掌四豆之實朝事之豆其實韭菹醯醢之類是也其飾則三代不同明堂位曰夏后氏以楬豆殷玉豆周獻豆注云楬無異物之飾也獻疏刻之是也以供祭祀燕享故云禮器也竹豆謂之籩注籩亦禮器之疏案鄭注籩人及士虞禮云籩以竹為口有藤緣形制如豆亦受四升盛棗栗桃梅菱芡脯修膴鮑糗餌之屬是也亦祭祀饗燕所用故云亦禮器蕙田案豆爾雅云木豆謂之豆周禮旊人為豆實三而成觳崇尺鄭注豆實四升祭統云夫人薦豆執校執醴授之執鐙鄭注校豆中央直者也鐙豆下跗也禮圖云口員徑尺黑漆飾朱中大夫以上畫以雲氣諸侯以象天子以玉皆謂飾其豆口也然則豆者以木為之髙一尺口足徑一尺其足名鐙中央直豎者名校校徑二寸總而言之名豆其實四升用薦菹醢周禮醢人掌四豆之實朝事之豆其實韭菹醯醢之類是也登一名瓦豆爾雅瓦豆謂之登疏云冬官旊人掌為瓦器而云豆中縣鄭云縣繩正豆之柄是瓦亦名豆也詩大雅生民云于豆于登毛傳豆薦菹醢登盛大羮儀禮少牢饋食兩瓦豆有醢亦用瓦豆楬豆明堂位夏后氏以楬豆鄭云楬無異物之飾陳氏禮書曰楬者木之屬也以木為之則無異飾玉豆明堂位云殷玉豆又云薦用玉豆疏以玉飾豆故曰玉豆獻豆明堂位云周獻豆鄭云獻疏刻之籩爾雅云竹豆謂之籩周禮籩人掌四籩之實鄭注籩人及士虞禮云籩以竹為之口有藤緣形制如豆亦受四升盛棗栗桃梅菱芡脯修膴鮑糗之屬鄉射記注云豆宜濕物籩宜乾物雕纂明堂位薦用雕纂鄭注籩屬也以竹為之雕刻飾直者也疏云形似筥周禮天官籩人掌四籩之實注籩竹器如豆者其容實皆四升疏言四籩謂下經朝事饋食加籩羞籩是也鄭知籩是竹器者以其字竹下為之亦依漢禮器制度而知也云如豆者皆面徑尺柄尺亦依漢禮知之也云其容實皆四升者據其籩之所受則曰容據其所實麷蕡等則曰實故云容實皆四升亦約與豆四升同也史氏浩曰籩以竹為之所以陳乾物朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐注形鹽鹽之似虎者膴䐑生魚為大臠鮑者于楅室中糗乾之出于江淮也鱐者析乾之出東海王者備物近者腥之逺者乾之因其宜也今河間以北煮穜麥賣之名曰逢燕人膾魚方寸切其腴以啖所貴疏麷為熬麥蕡為麻子白為熬稻米黑為熬黍米形鹽鹽似虎形膴以魚肉為大臠鮑以魚于楅室糗乾之鱐為乾魚王氏安石曰王使周公閲來聘魯享有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之享以象其德羞嘉穀鹽虎形麷蕡白黑則所謂羞嘉穀也形鹽則所謂鹽虎形也昌本則所謂昌歜也推類而言則膴鮑魚鱐與夫既事之享皆所謂致其養之盛者也孝子之事親欲致其養養欲致其盛故朝事之籩豆其實如此饋食之籩其實棗栗桃乾䕩榛實注乾䕩乾梅也有桃諸梅諸是其乾者榛似栗而小梅疏其八籩者其實棗一也栗二也桃三也乾䕩謂乾四也榛實五也其于八籩仍少三案乾䕩既為乾梅經中桃是濕桃既有濕桃乾梅明别有濕桃則注引內則桃諸鄭云是其乾者既有濕桃明有濕梅可知以乾桃濕梅二者添五者為七籩案桃梅既並有乾濕則棗中亦宜有乾濕復取一添前為八也必知此五者之中有八者案儀禮特牲少牢士二籩二豆大夫四籩四豆諸侯宜六天子宜八饋食之豆有八此饋食之籩言六不類又上文朝事之籩言八下加籩亦八豈此饋食在其中六乎數事不可故以義參之為八若不如此任賢者裁之也加籩之實菱芡栗脯菱芡栗脯注重言之者以四物為八籩菱芰也芡雞頭也栗與饋食同鄭司農云菱芡脯修角疏四物重言之則八籩云菱芰也者屈到嗜芰即菱者也云芡雞頭也者俗有二名今人或謂之雁頭也先鄭云菱芡脯修者先鄭意怪饋食重言故為修替栗得為一義故引之在下也王氏詳説曰栗嘉栗也醢美味也故栗為饋食之籩亦為加籩之實醢為朝事之豆亦為加豆之實詩云醓醢以薦其周人之尚醢與語曰周人以栗其周人之尚栗歟羞籩之實糗餌粉餈注故書餈作茨鄭司農云糗熬大豆與米也粉豆屑也茨字或作餈謂乾餌餅之也玄謂此二物皆粉稻米黍米所為也合蒸曰餌餅之曰餈糗者搗粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足黏疏云糗餌粉餈者此為二籩糗與粉為一物恐餌餈著籩故分于二籩之下云故書餈作茨者此宜從食不宜從草故先鄭破之從經為正鄭司農云糗熬大豆與米也粉豆屑也並于義是但于義不足故後鄭增成之云茨字或作餈者謂故書亦有作次下食者云謂乾餌餅之也者餅之曰餈未正乾之言故後鄭不從玄謂此二物皆粉稻米黍米所為者據當時目驗而知云合蒸曰餌餅之曰餈者謂粉稻米黍米合以為餌餌既不餅明餅之曰餈今之餈糕皆餅之名出于此云糗者搗粉熬大豆者此與司農義同司農不言搗故後鄭增成之云餌言糗餈言粉互相足者此本一物餌言糗謂熬之亦粉之餈言粉搗之亦糗之凡言互者舉兩物相互今一物之上自相互直是理不足明故言互相足內則注搗熬榖榖則大豆也榖總名也劉氏彛曰粳糯黍秫或餌或餈鄭氏鍔曰曰糗曰餌曰粉曰餈亦以四物而為八籩凡祭祀共其籩薦羞之實注薦羞皆進也未食未飲曰薦既食既飲曰羞疏祭祀言凡者謂四時禘祫等皆共其籩籩則薦羞之實是也云未食未飲曰薦者先薦後獻祭祀也據朝踐饋獻時未獻前所薦籩豆朝事饋食之籩是也云既食既飲曰羞者謂尸食後酳尸訖所進羞即加籩之實是也鄭氏鍔曰四籩皆王后所薦籩人則實之耳其他祭祀則共籩中可薦可羞之物不共其籩有司自掌其器也醢人掌四豆之實疏言四豆之實者豆與籩並設節數與四籩同時亦謂朝事饋食加豆羞豆之實是也禮圖曰案考工記旊人為豆髙一尺又鄭注周禮及禮記云豆以木為之受四升口員徑尺二寸有蓋鄭注鄉射記云豆宜濡物朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡注醓肉汁也昌本昌蒲根切之四寸為菹三臡亦醢也作醢及臡者必先膞乾其肉乃後莝之雜以粱麴及鹽漬以美酒塗置瓶中百日則成矣鄭司農云麋臡麋肝髓醢或曰麋臡醬也有骨為臡無骨為醢菁菹韭菹鄭大夫讀茆為茅茅菹茅初生或曰茆水草杜子春讀茆為卯玄謂菁蔓菁也茆鳬葵也凡菹醢皆以氣味相成其狀未聞物疏云其實韭菹醓醢者于豆內韲菹之類菜肉通全若䐑為菹細切為韲又不言菹者皆是韲則昌本之類是也言昌本本根也昌蒲根為韲言麋臡者以麋肉為醢以其并骨為之則曰臡菁菹鹿臡茆菹麇臡為八豆並后設之醓者以肉為之醓汁即是肉汁云切之四寸為菹者但菹四寸無正文蓋以一握為限一握則四寸也即是全物若䐑云作醢及臡已下者鄭以當時之法解之案王制云一為乾豆鄭注云謂臘之以為祭祀豆實也脯非豆實亦謂作醢始得在豆與此先膊乾其肉義合鄭司農云麋臡麋肝髓醢此義後鄭不從云或曰麋臡醬也有骨為臡無骨為醢後鄭從之又菁菹韭菹者以菁為韭菁于義不可後鄭不從若為菲字菲則蔓菁于義為是後鄭不應破之明本作韭不作菲也鄭大夫讀茆為茅茅菹茅初生者茅草非人可食之物不堪為菹或曰茆水草後鄭從之杜子春讀茆為卯于義亦是玄謂菁蔓菁者破司農為韭菁云茆鳬葵也者增成子春等義云凡菹醢皆以氣味相成其狀未聞者經云韭菹醓醢以下兩兩相配者皆是氣味相成之狀不可知故云其狀未聞饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢注螺䗂蝓蜃大蛤蚳蛾子鄭司農云脾析牛百葉也蠯蛤也鄭大夫杜子春皆以拍為膊謂脅也或曰豚拍肩也今河間名豚脅聲如煆鎛不疏其實葵菹螺醢者此八豆之內脾析蜃豚拍三者言菹皆韲也言螺䗂蝓蜃大蛤蚳蛾子皆爾雅文蠯謂小蛤豚拍謂豚脅也鄭氏鍔曰葵也脾脅也蜃也豚拍也四物以為菹螺也蠯也蚳也魚也四物以為醢加豆之實芹菹兔醢深蒲醓醢箈菹雁醢筍菹魚醢注芹楚葵也鄭司農云深蒲蒲蒻入水深故曰深蒲或曰深蒲桑耳醓醢肉醬也箈水中魚衣故書雁或為鶉杜子春云當為雁玄謂深蒲蒲始生水中子箈箭萌筍竹萌疏深蒲醓醢者深蒲謂蒲入水深以為韲醓醢與朝事之豆同箈菹者謂以箈箭萌為菹也云筍菹者謂竹萌為菹也芹楚葵出爾雅鄭司農云深蒲蒲蒻入水深故曰深蒲者史遊急就章曰蒲蒻蘭席蒲蒻只堪為席不可為菹故後鄭不從云或曰深蒲桑耳者既名為蒲何得更為桑耳故後鄭亦不從云箈水中魚衣者此箈字既竹下為之非是水物不得為魚衣故後鄭不從玄謂深蒲蒲始生水中子者此後鄭以時事而知破先鄭也云箈箭萌者一名篠者也筍竹萌者一名簜者也萌皆謂新生者也見今皆為菹羞豆之實酏食糝食凡祭祀共薦羞之豆實注鄭司農云酏食以酒酏為餅糝食菜餗蒸玄謂酏􅊡也內則云取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之與稻米米二肉一合以為餌煎之疏言酏食者謂􅊡與糝實為二豆司農云酏食以酒酏為餅者酏粥也以酒酏為餅若今起膠餅文無所出故後鄭不從云糝食菜餗蒸者若今煮菜謂之蒸菜也亦文無所出後鄭亦不從玄謂酏􅊡也者案雜問志云內則􅊡次糝周禮酏次糝又酏在六飲中不合在豆且內則有􅊡無酏周禮有酏無􅊡明酏􅊡是一也故破酏從􅊡也又引內則曰取稻米舉糔溲之者案彼上注舉猶皆也糔溲博異語謂取稻米皆之云小切狼臅膏者鄭彼注狼臅膏臆中膏也云以與稻米為餈者彼鄭云若今膏􅖸云又曰糝取牛羊豕之肉三如一臘人凡祭祀共豆脯薦脯膴胖凡臘物注脯非豆實豆當為羞聲之誤也鄭司農云膴膺肉鄭大夫云胖當為判杜子春讀胖為版又云膴胖皆謂夾脊肉又云禮家以胖為半體玄謂公食大夫禮曰庶羞皆有大者此據肉之所擬祭者也又引有司曰主人亦一魚加膴祭于上者此據主人擬祭者膴與大亦一也內則曰麋鹿田豕麕皆有胖足相參正也大者胾之大臠膴者魚之反覆膴又詀曰大二者同矣則是膴亦䐑肉大臠胖宜為脯而腥胖之言片也析肉意也禮固有腥腍爓雖其有為孰之皆先制乃亨云疏知脯非豆實者案籩人職有栗脯則脯是籩實故脯非豆實也知豆當為羞者案籩人職云凡祭祀共其籩薦羞之實鄭云未飲未食曰薦已飲己食曰羞羞薦相對下既言薦脯則上當言羞脯也鄭司農云膴膺肉鄭大夫胖讀為判杜子春讀胖為版又云膴胖皆謂夾脊肉又云禮家以胖為半體者文無所出皆非也玄謂公食大夫禮曰庶羞皆有大者此據肉之所擬祭也又引有司曰主人亦一魚加膴祭于其上者此據主人擬祭者也膴與大亦一也內則曰麋鹿田豕麕皆有胖足相參正者注引有司并公食大夫二處證膴是大臠引內則明胖與膴不同故云足相參正云大者胾之大臠者重解公食大夫云膴者魚之反覆者反覆謂魚生時在腹下今加之于上云膴又詁曰大者據爾雅釋詁文云二者同矣者大共膴同是一則膴是䐑肉大臠同將祭先也云胖宜為脯而腥謂肉薄不煮者云胖之言片析肉意者此解胖是薄義云禮固有腥腍爓雖其有為孰之者祭祀之禮豚解而腥之又有體解而爓之又有薦孰之禮禮經固有此三者皆當共制為胖言此者證胖與膴不同破諸家之意陳氏禮書脯周禮臘人掌乾肉凡脯臘膴胖之事內則牛修鹿脯田豕脯麋脯大夫燕食有膾無脯有脯無膾郊特牲曰大饗尚腶修少儀曰其以乘壺酒束修一犬賜人若獻人則陳酒執修以將命先儒謂薄析曰脯捶而施薑桂曰腵然則腵猶濁氏之冒脯也食貨志注冒以椒薑腶析而段之修則其體長矣膴之于禮可以為輕可以為重可以用之于前可以羞之于後膳夫凡王祭祀賔客則有俎凡稍食則脯醢而已冠禮三加有乾肉折俎始醮再醮則脯醢而已喪禮則大斂卒塗朔月既夕士虞有牲體魚臘之俎小斂則特豚脯醢而已以脯醢之于魚臘俎為輕故也大饗有腥熟尚腶修以禮賔冠禮有牲俎取脯以見母昏禮賔取脯以授從者燕禮賔執脯以賜鍾人又昏禮婦摯豚脯以見姑學者束修以見師以脯之于禮為重故也用之于前則冠禮始醮再醮之類是也羞之于後則籩人加籩之實栗脯是也蓋脯割之也謂之尹曲禮士虞所謂尹祭是也體之直也謂之脡士虞禮所謂脯四脡是也脡亦作挺鄉飲禮所謂薦脯五挺是也脡亦謂之膱鄉射禮薦臘用籩五膱祭半膱膱長尺二寸是也鄉飲鄉射大夫禮也故五挺士虞士禮也故四挺春秋之時齊侯唁昭公于野井以四挺脯蓋野禮之禮歟曲禮曰以脯修置者左朐右末儀禮俎設于脯醢東朐在南又曰臘周官獸入于臘人臘人掌乾肉凡田獸之脯臘膴胖之事蓋析而乾之曰脯全而乾之曰臘脯在籩臘在俎脯常先于醢臘常亞于魚禮有薧臘有鮮臘有全臘有胖臘或取以用或不用或取以祭或不祭或在庶羞或不在庶羞或先舉魚後舉臘或先舉臘後舉魚聘禮賔之飪鼎九有魚臘鮮魚鮮臘上介飪鼎七無鮮公食大夫上大夫之俎九有魚臘加鮮魚鮮臘下大夫之俎七無鮮而昏禮臘必用鮮者禮之所隆也少牢鼎臘一純特牲士冠昏之類皆用全士喪大斂士虞既夕胖而已則不用全者禮之所略也昏禮厥明婦饋舅姑特豚無魚臘既夕禮徹巾苞不以魚臘以非正牲故也公食大夫禮魚臘醬湆不祭以預正饌故也若入庶羞故祭公食大夫若不親食魚臘陳于碑內有司徹升羊豕魚三鼎而無臘以在庶羞故也特牲後舉魚以三俎臘皆三舉故也少牢後舉臘以臘魚皆一舉故也夫臘之骨也如牲體卒塗之臘進柢未異于生也少牢之臘進下異于生也其載之也上肩其舉之也以肩鄭氏六體始于正脊終于肩昏禮臘肫髀不升喪禮臘髀亦不升而少牢祝俎體屬于尻有司徹臘辨無髀則臘之賤髀亦與牲同矣禮器曰大饗其王事歟三牲魚臘四海九州之美味也則天子之臘凡田獸在焉儀禮大夫臘用麋鄭康成曰士臘用兔然特牲臘用獸則苟有獸焉可也孰謂必用兔耶夏官量人凡祭祀制其從獻脯燔之數量注鄭司農云從獻者肉殽從酒也玄謂燔從于獻酒之肉炙也數多少也量長短也疏云凡者以其天地宗廟饗食事廣祭禮獻以燔從故總言之也案特牲少牢云主人獻尸以肝從主婦獻尸以燔從故鄭據此以為從獻以燔詩云載燔載烈毛傳云傳火曰燔貫之加于火曰烈燔雖不貫亦是炙肉故鄭云炙肉數多少也量長短也者案儀禮脯十脡各長尺二寸是多少長短燔之數量未聞天官醯人掌共五齊七葅凡醯物以共祭祀之齊葅凡醯醬之物注齊葅醬屬醯人者皆須醯成味在疏五齊七葅醯物乃是醢人所掌豆實今此者鄭云齊葅醬皆須醯成味故與醢人共掌云以共祭祀之齊葅凡醯醬之物者醯人連言醬者並豆醬亦掌鹽人祭祀共其苦鹽散鹽注杜子春讀苦為盬謂出鹽直用不湅治者鄭司農云散鹽湅治者玄謂散鹽鬻水為鹽水疏苦當為盬盬謂出于鹽池今之顆鹽是也散鹽煮為之出于東海又曰杜子春讀苦為盬者盬鹹非苦故破苦為盬見今海傍出鹽之處謂之盬云直用不湅治者對下經鬻鹽是湅治者也鄭司農云散鹽湅治者下經自有鬻鹽是涷治故後鄭不從禮記王制庶羞不踰牲注祭以羊則不以牛肉為羞宰疏案有司徹是少牢之祭云夫羞房中之羞注酏食糝食內則云糝取牛羊豕之肉得用牛者祭既用少牢則糝亦不用牛肉以羊肉為羞天子諸侯無事則嵗三田一為乾豆注謂臘之以為祭祀豆實也疏天子諸侯無事者謂無征伐出行喪凶之事則一嵗三時田獵獵在田中又為田除害故稱田也一為乾豆者謂乾之以為豆實豆實非脯而云乾者謂作醢及臡先乾其肉故云乾豆是上殺者也案榖梁桓四年范寧云上殺中心死速乾之以為豆實周禮天官獸人掌罟田獸注罟網也以網搏所當田之獸凡祭祀掌其死獸生獸凡獸入于臘人注共其完者者疏凡此所共于庖人云凡其死生鮮薧之物以共王之膳又曰知其完全者下經云凡獸入于臘人是其不完者故知此是完者地官囿人祭祀共其生獸死獸之物夏官服不氏凡祭祀共猛獸注謂中膳羞者獸人冬獻狼疏上云養猛獸則猛獸皆養之此言祭祀所共堪食者故鄭云謂中膳羞中膳羞唯有熊狼故引獸人與春秋為證案內則亦云狼臅膏可食也掌畜祭祀共卵鳥注其卵可薦之鳥雞疏還謂上經鵝鴨之屬其亦在焉天官漁人凡祭祀共其魚之鮮薧疏凡祭祀共其魚之鮮薧者此所共者共內外饔以其膳夫共王之膳羞即不掌祭祀之事鱉人祭祀共蠯螺蚳以授醢人注螺螔蝓鄭司農云蠯蛤也杜子春云蠯蚌也蚳蛾子國語曰蟲舍蚳蝝曰疏案醢人有蠯醢螺醢蚳醢故以此三者授醢人又螺螔蝓者一物兩名司農云蠯蛤也者杜子春云蠯蚌也者蚌即蛤也亦一物云蚳蛾子者謂蟻之子取白者以為醢地官川衡祭祀共川奠注川奠籩豆之實魚鱐蜃蛤之屬疏鄭此注皆據醢人及籩人而言案籩人職云朝事之籩有麷蕡白黑形鹽膴鮑魚鱐醢人云饋食之豆有蜃醢蠯醢蜃蠯是蛤則魚鱐及蜃皆川中所生之物故引為證川奠也言之屬者兼有螺醢亦是川奠故云之屬澤虞凡祭祀共澤物之奠注澤物之奠亦籩豆之實芹茆菱芡之屬疏案籩人職加籩之實有菱芡朝事之豆有茆菹加豆之實有芹菹是皆澤中所出故引證澤物之奠也言之屬者兼有深蒲昌本之等故云之屬天官庖人共祭祀之好羞注謂四時所為膳食若荆州之鮺魚青州之蟹胥雖非常物進之孝也物疏尋常所共者並在內外饔今言好羞則是非常之謂美魚之屬也又曰云四時所為膳食者謂四時之間非常美食云若荆州之鮺魚青州之蟹胥者鄭見當時有之又見禮記禮器云大饗其王事與三牲魚臘四海九州之美味苟可薦者莫不咸在且禹貢徐州貢蠙珠暨魚荆州無魚文是文不備是知好羞皆是魚也國語魯語宣公夏濫于泗淵注濫漬也漬罟于泗水之淵以取魚也泗在魯城北又曰在南門里革斷其罟而棄之注罟網也曰古者大寒降土蟄發注降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄始震也水虞于是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也注水虞漁師也掌川澤之禁令講習也罛漁網也罶笱也名魚大魚也川禽鱉蜃之屬是時陽氣起魚陟負冰故令國人取之所以助宣氣也月令季冬始漁乃嘗魚先薦寢廟唐云孟春誤矣鳥獸孕水蟲成注孕懷子也此為春時獸虞于是乎禁罝羅矠魚鱉以為夏稿注獸虞掌鳥獸之禁令罝兔罟羅鳥罟也禁禁不得施也矠􅝷也稿乾也夏不得取故于此時􅝷刺魚鱉以為夏儲助生阜也注阜長也鳥獸方孕故取魚鱉助生物也鳥獸成水蟲孕水虞于是乎禁罝䍡設穽鄂注罝當為罜罜䍡小網也穽陷也鄂柞格所以誤獸也謂立夏鳥獸已成水蟲方孕之時禁魚鱉之網設取獸之物也以實廟庖畜功用也注以獸實宗廟庖厨也而長魚鱉畜四時功足國財用也且夫山不槎蘖澤不伐夭魚不鯤鮞注鯤魚子也鮞未成魚也獸長麑䴠注鹿子曰麑麋子曰䴠鳥翼鷇卵注翼成也生哺曰鷇未成曰卵蟲舍蚳蝝注蚳蟻子也可以為醢蝝蝮蜪也可食舍不取也蕃庶物也古之訓也今魚方别孕不教魚長又行網罟貪無蓻也注别别于雄而懷子也蓻極也陳氏禮書魚月盈則魚腦盈月虧則魚腦虧特牲少牢尸俎魚皆十有五取盈數于三五故也若夫飲食之禮則不然公食大夫魚與腸胃倫膚若九若十有一下大夫若七若五則一命之魚七再命九三命十有一特天子諸侯魚數不見于經先儒謂諸侯十有三天子十有五理或然也士昏禮魚十有四攝盛也其加不至十有五者貴偶也然魚之在俎或縮或橫或右首或左首或進首或進尾或進鬐脊也或進腴或右鬐則右首左首者于俎為縮于人為橫進首進尾者于俎為橫于人為縮公食大夫魚縮俎寢右進鬐士喪卒塗之奠左首進鬐士虞亦進鬐少牢右首進腴蓋鬐者體之所在腴者氣之所聚禮雖貴右人之飲食貴體鬼神之祭貴氣也公食與少牢皆右首而喪禮左首反吉故也少牢進腴公食進鬐而喪奠與虞進鬐未異于生故也儀禮大夫士祭皆薧魚周禮漁人凡祭祀共其魚之鮮薧曲禮曰薧魚曰商祭鮮魚曰脡祭少儀曰進濡魚者進尾先儒謂天子諸侯之禮備薧濡其説是也魚之為物冬則潛而趨陽乎下故腴美夏則躍而趨陽乎上故鬐美冬右腴夏右鬐此又所尚在時與公食大夫少牢之所進者異矣然儀禮魚皆縮于俎而少牢獻祝魚一橫載之有司徹尸俎五魚橫載之侑主人皆一魚亦橫載之蓋少牢祝俎所載非一物也故橫之有司徹之橫載鄭康成曰彌變于神是也有司徹尸侑主人之魚皆加膴祭于其上少儀亦曰祭膴蓋膴大也公食大夫禮士羞庶羞皆有大則膴者特為大臠以備祭者也士虞用􅡈鮒少牢魚用鮒蓋大夫用鮒士虞或􅡈或鮒也漁人春獻王鮪潛之詩季冬薦魚春獻鮪月令季冬乃命魚師始漁天子親往乃嘗魚先獻寢廟魯語曰古者大寒降土蟄發水虞于是乎講罛罶取魚嘗之則大寒降者季冬薦魚之時也土蟄發者春獻鮪之時也此特薦其新者而已然王于凡祭祀奚適而不用魚哉以非正牲故其俎在牲之下又曰鱐庖人夏行腒鱐鄭司農曰腒乾雉鱐乾魚鄭康成曰腒鱐暵而乾內饔掌共羞修刑膴胖骨鱐以待共膳漁人辨魚物為鮮薧以共王膳羞凡祭祀賔客喪紀共其魚之鮮薧籩人朝事之籩其實膴鮑魚鱐鄭康成曰鮑者于楅室中糗乾之出于江淮也鱐者析乾之出東海王者備物近者腥之逺者乾之因其宜也曲禮曰薧魚曰商祭鄭氏曰商猶量也然薧魚曰鱐鱐曰商祭則鱐與商豈揫斂之謂歟籩人朝事之籩膴鮑魚鱐加籩之實菱芡栗脯則籩之所薦先魚而後脯矣又曰膴內饔掌共羞修刑胖骨鱐鄭司農曰刑膴謂夾脊肉鄭康成曰刑鉶羮也膴䐑肉大臠所以祭者外饔掌外祭祀之割亨共其脯修刑膴凡賔客之飱饔饔食亦如之籩人朝事之籩其實膴鮑魚鱐鄭氏曰膴䐑生魚為大臠今燕人膾魚方寸切其膄以啖所貴公食大夫禮庶羞皆有大有司徹主人亦一魚加膴祭于上少儀羞濡魚者進尾冬右腴夏右鬐祭膴鄭氏曰謂刳魚腹也膴讀如罕蓋䐑肉之大臠亦曰膴所以祭其在俎則加于魚肉之上在籩加于鮑鱐之上詩小雅信南山疆埸有瓜是剝是菹獻之皇祖傳剝瓜為菹也菹箋于畔上種瓜瓜成又入其稅天子剝削淹漬以為貴四時之異物皇君也獻瓜菹于先祖者順孝子之心也入疏周禮場人祭矣醢豆實無瓜菹者供其果蓏是祭必有瓜菹説正豆之實故文不具耳周禮地官埸人凡祭祀共其果蓏享亦如之注享納牲疏享納牲謂祭祀宗廟二灌後君迎牲納之于庭時后夫人薦朝事之豆籩豆籩中有果蓏之物故云享亦如之若然上言祭祀餘祭祀也天官甸人共野果蓏之薦注甸在逺郊之外郊外曰野果桃李之屬蓏瓜瓞之屬疏云果桃李之屬蓏瓜瓞之屬者案食貨志臣瓉以為在樹曰果在地曰蓏不辨有核無核張晏以有核曰果無核曰蓏今鄭云果桃李之屬即是有核者也蓏瓜瓞之屬即是無核者也此從張晏之義禮記禮運實其簠簋籩豆鉶羮禮器籩豆之薦四時之和氣也疏此亦是諸侯所貢實于籩豆是四時和氣所生故云四時和氣也郊特牲鼎俎奇而籩豆偶隂陽之義也疏籩豆兼有植物植物屬隂故其數偶籩豆所充實之物皆是水土所生品類非人所常食神道與人異故不敢用人之食味神以多大為功故貴多品掌客云上公豆四十侯伯三十子男二十四又禮器云天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六案禮籩與豆同是籩豆偶也鄉飲酒義豆數是年齒相次非正豆也籩豆之實水土之品也不敢用褻味而貴多品所以交于旦明之義也注水土之品言非人常所食旦當為神篆字之誤也疏籩豆之實水土之品也者謂籩豆所充實之物皆是水土所生品類非人所常食也不敢用褻味而貴多品者覆釋籩豆所以用水土品族之意言不敢用褻美食味而貴重衆多品族也何意如此所以交接神明之義也神道與人既異故不敢用人之食味神以多大為功故貴多品恆豆之葅水草之和氣也其醢陸産之物也加豆陸産也其醢水物也籩豆之薦水土之品也不敢用常褻味而貴多品所以交于神明之義也非食味之道也疏自恆豆之葅至之道也遍明諸侯祭祀之禮恆豆之葅者謂朝事恆常所薦之豆所盛之葅是水草和美之氣若昌本茆葅是也其所盛之醢陸地所産之物也加豆陸産也者謂祭末酳尸之後其葅陸地産生之物而為之若葵菹豚拍之屬是也其醢水物也者加豆所盛之醢用水中之物若螺醢魚醢是也籩豆之薦水土之品也者其籩豆所薦之物或水或土所生品類也前文唯云豆此連言籩者籩是配豆之物所盛亦有水土所生也周禮籩人云天子朝事之籩其鮑魚則水物也但籩之所有麷蕡白黑則土所生也陸産甚多也不敢用常褻味而貴多品者言所薦之物不敢用常褻美味貴其多有品類言物多而味不美也所以交于神明之義也非食味之道也者解所以物多不美之意所以交接神明之義取恭敬質素非如人事飲食美味之道也醯醢之美而煎鹽之尚貴天産也疏貴天産也者餘物皆人功和合為之鹽則天産自然言煎者煎此自然之鹽錬治之也皇氏云設之于醯醢之上故云尚熊氏云煎鹽祭天所用故云尚義俱通也祭統水草之葅陸産之醢小物備矣注水草之葅芹茆之屬陸産之醢蚳蝝之屬昆蟲之異草木之實隂陽之物備矣注昆蟲謂溫生寒死之蟲也內則可食之物有蜩范草木之實菱芡榛栗之屬凡天之所生地之所長苟可薦者莫不咸在注咸皆也疏苟可薦者悉在祭則上隂陽之物備矣是也國語楚語籩豆脯醢則上下共之不羞珍異不陳庶侈注共之以多少為羞也羞進也庶衆也侈猶多也陳氏禮書周官籩人醢人有朝事饋食之籩豆與加籩羞籩加豆羞豆凡二十有六祭祀之籩豆其數如此則饗食之禮豈過是哉禮器所謂天子之豆二十有六是也推此則諸公十有六諸侯十有二上大夫八下大夫六而少牢大夫四豆蓋大夫食于公與祭于己者異矣周官掌客上公豆四十侯伯豆三十有二子男豆二十有四而食皆稱之先儒謂豆正羞食庶羞庶羞亦豆也公食下大夫六豆上大夫八豆聘禮致饔餼于上大夫堂上八豆西夾六豆然則禮器之豆數用數也掌客之數陳數也春秋之時鄭享楚子加籩豆六品晉享季孫夙有加籩蓋古者籩豆有加者皆所以優尊之也豆實菹醢者也而晏子豚肩不掩豆菹醢濡物也而田獵所獲為乾豆者蓋豚肩不掩豆譏其用小牲非必以豆實豚也醢臡必乾折然後漬之非謂以豆實乾也鼎俎奇而籩豆偶而鄉飲酒六十者三豆七十者四豆八十者五豆九十者六豆而數不皆偶者此又視年髙下而隆殺之不可以常禮限之也右籩豆庶羞五禮通考卷六十五
