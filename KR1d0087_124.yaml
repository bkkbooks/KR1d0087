body:
  text: 五禮通考卷一百十四刑部尚書秦蕙田撰吉禮一百十四大夫士廟祭戰國䇿馮暖誡孟嘗君曰願請先王之祭器立宗廟於薛廟成還報孟嘗君隋書禮儀志後齊王及五等開國執事官散官從二品已上皆祀五世五等散品及執事官散官正三品已下從五品已上祭三世三品已上牲用一太牢五品已下少牢執事官正六品已下從七品已上祭二世用特牲正八品已下達于庶人祭于寢牲用特豚或亦祭祖禰諸廟悉依其宅堂之制其間數各依廟多少為限其牲皆子孫見官之牲文獻通考唐制一品二品四廟唐太宗貞觀六年侍中王圭通貴漸久而不營私廟四時蒸嘗猶祭於寢為法司所劾太宗優容之因官為立廟以愧其心開元禮三品以上時享其廟儀四品五品六品以下附前享五日筮於廟門之外主人公服立于門東西面掌事者各服其服立於門西東面北上設筮席於闑西閾外西面筮者開韇出册兼執之東面受命于主人主人曰孝曾孫某來日丁亥祗享於廟尚饗亥未必丁也直舉一日以言之則己亥辛亥茍有亥焉可筮者曰諾進就筮席西面以韇繫册遂述曰假爾太筮有常孝曾孫來日丁亥祗享於廟尚饗乃釋韇坐筮訖興降席東面稱占曰從筮吉退若不吉即筮逺日還如初儀贊禮者進主人之左告禮畢掌事者徹筮席先享三日主人及亞獻終獻并執事者各散齋二日於正寢致齋一日於廟所國官僚佐之長為亞獻其次為終獻無則親賔為之子孫及凡入廟者各於其家清齋皆一宿四品五品以上同六品以下若有廟者如五品以上之儀無廟者筮于正寢之堂主人公服立于堂上楹間近東西面掌事者近西東面北上設筮席于主人之西筮者開韇出册兼執之東面受命于主人主人曰孝孫某來日丁亥春祠其餘並同五品以上儀亞獻終獻親賔為之前一日之夕清掃內外掌廟者整拂神幄六品以下無廟者但清掃內外贊禮者設主人之位於東階西面亞獻終獻位於主人東南掌事者位於終獻東南俱重行西向北上設子孫之位於庭重行北面西上設贊唱者位於終獻西南西面又設亞獻以下位於門外之東執事者在南差退俱西向設牲於南門之外當門北面以西為上掌牲者位於牲西北東面諸祝位於牲後俱北向設亞獻省牲位於牲前近東西向設祭器之數每室樽二簋二簠二㽅二鉶二爼二籩豆一品二品各十三品八四品五品各六六品以下簋簠鉶㽅爼各一籩豆各二掌事者以樽入設前楹下各於室户六品以下無廟者不言室户之東北面西上皆加勺冪首座爵一餘座皆爵四置于坫四品五品六品以下皆置于樽下加勺冪設祭器於序東西向每座簋在前簠次之㽅次之鉶次之籩次之豆次之爼在後每座異之皆以南為上屈陳而下設洗於東階東南東西當東霤五品以上同六品以下當東榮餘同南北以堂深罍水在洗東加勺冪篚在西南肆實爵三巾二於篚加冪凡器物皆濯而陳之執樽罍洗篚者各於樽罍洗篚之後掌牲者以牲就榜位贊禮者引亞獻入詣東階升堂遍視滌濯於視滌執樽者皆舉冪告潔訖降就省牲位亞獻省牲掌牲者前東面舉手曰腯還本位諸祝各循牲一匝北面舉手曰充俱還本位祝與掌牲者以次牽牲付厨贊禮者引終獻詣省鼎鑊視濯溉亞獻以下每事訖各還齋所執饌者入徹簠簋籩豆爼鉶以出享日未明烹牲於厨夙興掌饌者實祭器牲體皆載右胖前腳三節節一段肩臂臑皆載之後腳三節節一段去下一節載上肫胳二節又取正脊脡脊橫脊短脅正脅代脅各二骨以並餘皆不設簋實稷黍簠實稻粱籩實石鹽乾脯棗栗之屬豆實醢醬韲菹之類六品以下簋實稷簠實黍籩實脯棗豆實菹醢餘同五品以上主人以下各服其服掌事者入實樽罍每室二樽一實玄酒為上一實醴齊次之祝版各置於坫四品五品六品于尊所諸祝與奄人四品五品無奄人六品以下于正寢室內入立於庭北面西上立定皆再拜訖升自東階以次出神主各置於座夫人之主奄人奉出俱並席處右四品五品祝奉訖升整拂几筵六品以下祝設神座于正寢室內祖在西東面禰在祖東北皆有几筵質明贊禮者引亞獻以下及子孫俱就門外位贊唱者先入就位諸祝與執樽罍者入立於庭北面西上立定贊唱者唱再拜祝以下俱再拜各就位掌饌者奉饌陳於門外贊禮者引主人入就位又贊禮者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引於階上各設於神座前籩居右豆居左簠簋㽅鉶居其間羊豕二爼橫重陳于右臘爼特于左四品五品六品特牲爼橫于前執爐炭蕭稷膟膋者各從其爼升置于室户外之左六品無廟則設于堂户外之左餘同其蕭稷各置于爐炭下施設訖掌饌以下降出諸祝各取蕭稷擩於脂燔於爐炭還樽所贊禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾於篚興進主人拭手執篚者受巾跪奠於篚遂取爵興以進主人受爵執罍者酌水主人洗爵執爵者又跪取巾於篚興進主人拭爵訖受巾跪奠於篚奉盤者跪奠盤興凡取物者跪俯伏而取以興奠物則奠訖俯伏而後興贊禮者引主人自東階升堂詣某祖酒樽所六品以下詣祖下倣此執樽者舉冪主人酌酒贊禮者引主人進詣某祖座前北面跪奠爵興出户北面立四品五品同六品以下西向奠爵興少退西向立祝持板進於室户外之右東面四品五品同六品以下祝持板進祖座之右北面跪讀祝文曰維某年歲次月朔日子孝曾孫某官封某無封者單稱官六品以下稱孝孫餘同無官者稱名敢昭告于某祖考某諡封祖妣某邑夫人某氏時維仲春夏云仲夏秋云仲秋冬云仲冬伏增逺感謹以柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦四品五品云柔毛剛鬣嘉薦普淖六品以下無柔毛餘同五品醴齊恭薦祠享春云祠夏云礿秋云嘗冬云蒸于某祖考某諡封某祖妣夫人某氏配尚饗祖考及孫各依尊卑稱號其祝文四品以下同訖興主人再拜祝進跪奠板於神座興還樽所贊禮者引主人以次酌獻如上儀唯不盥洗訖贊禮者引主人詣東序西向立四品五品同六品以下詣先祖座前近東西向立餘同諸祝各以爵酌福酒合置一爵一祝持爵進主人之左跪祭酒啐酒奠爵興諸祝各帥執饌者以爼入減神前爼肉共置一爼上又以籩遍取黍稷飯共置一籩祝先以飯籩進主人受以授左右祝又以爼次授主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復于坫四品五品六品復于尊所下倣此主人興再拜贊禮者引主人降自東階還板位西向立主人獻將畢贊禮者引亞獻詣罍洗盥手洗爵升自東階詣某祖酒樽所執樽者舉冪亞獻酌清酒贊禮者引亞獻進詣某祖神座前北向跪五品以上同六品以下詣先祖前西向跪奠爵興少退再拜奠爵興出户北向再拜贊禮者引亞獻如上儀訖贊禮者引亞獻詣東序西向立五品以上同六品諸祖座近東西向立諸祝各以爵酌福酒如初獻儀唯不受胙又贊禮者引終獻亦如初獻儀訖降復位諸祝皆進神座前跪徹豆興還樽所徹者籩豆各一少移于故處贊唱者曰再拜非飲福受胙者皆再拜贊唱者又曰再拜主人以下皆再拜贊禮者進主人之左白禮畢遂引主人出贊禮者引亞獻以下出子孫以次出諸祝及執樽罍篚者俱復執事位立定贊唱者曰再拜諸祝以下皆再拜執樽罍篚者出諸祝與奄人櫝神主納於坎室如常儀訖祝板焚於齋所四品五品以下無櫝神主褒聖侯祀孔宣父廟及王公以下皆用此禮惟祝文别三品以下祫享其廟前享五日筮於廟門之外齋及設位牲榜祭器省牲皆如時饗之儀掌事者以樽坫入設於廟堂上皆於神座左昭座之樽在前楹間北向始祖及穆座之樽在户外南面俱以近神為上皆加勺冪若始祖在曾祖以下則設樽依親廟之式其首座爵一餘座爵四各置於坫設祭器於序東西向每座簋在前簠次之㽅次之鉶次之籩次之豆次之爼在後每座異之皆以南為上屈陳而下設洗於東階東南東西當東霤南北以堂深罍水在洗東加勺冪篚在洗西南肆實爵三巾二於篚加冪凡器皆濯而陳之執樽罍篚冪者各位於樽罍篚冪之後享日未明牽牲於厨夙興掌饌者實祭器牲體折節所載及諸祭器所實如時享掌廟者設神座於廟堂之上自西序以東始祖座於西序東向昭座於始祖座東北南向穆座於東南北向俱西上若始封者仍在曾祖以下則空東面之座依昭穆南北設之每座皆有屏風几席設趺櫝如式主人以下各服其服掌事者入實樽罍每室四尊一實醴齊為上一實盎齊次之玄酒各實於上樽設玄酒者重古陳而不酌祝版各置於坫諸祝與奄者入立於庭北面西上掌事者持腰輿從入立於東階下西面立定祝與奄者皆再拜訖帥腰輿升自東階詣始祖廟入開坎室出神主置於輿出詣座前以主置於座以次出神主如上儀訖還齋所夫人之主奄人奉出俱並而出處右質明贊者引亞獻以下及子孫俱就門外位贊唱者先入就位諸祝與執樽罍者入立於庭北面西上立定贊唱者曰再拜祝以下皆再拜各就位掌饌者帥執饌者奉饌陳於門外贊禮者引主人入就位又贊者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引於階上各設於神座前籩居右豆居左簋簠㽅鉶居其間羊豕二爼橫陳重於右臘爼特於左執爐炭蕭稷膟膋者從其爼升設於神座之左少後其蕭稷各置於爐炭下施設訖掌饌者以下降出諸祝各取蕭稷擩於脂燔於爐炭還樽所贊禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾於篚興進主人拭手執篚者受巾跪奠於篚遂取爵興以進主人受爵執篚者酌水主人洗爵執篚者又跪取巾於篚興進主人拭爵訖受巾跪奠於篚奉盤者跪奠盤興贊禮者引主人自東階升堂詣始祖酒樽所執樽者舉冪主人酌醴齊贊禮者引主人進詣始祖神座前西向跪奠爵興少退西向立祝持板進神座之右北面跪讀祝文曰維某年歲次月朔日子孝曾孫某官封某官敢昭告於始祖考某諡封祖妣夫人某氏歲序推遷伏增逺感謹以柔毛剛鬛明粢薌萁嘉齊恭薦祫事于始祖考某諡封始祖妣夫人某氏配座尚饗祖考及子孫各依尊卑稱號其祝文同以案禮不王不禘大夫有事省于其君干祫及其髙祖三品下皆大夫士也祫祭先祖則可行也安得云禘享乎唐開元禮品官亦云薦禘事是僣禮也故前享五日節注中禘享設未毁廟之樽坫於前楹下享日設神座節注中禘又設未毁廟主各于其室出神主節注中禘又以次出毁廟主置于室內之座及祝文注禘云禘事一概削去訖興主人再拜進跪奠板於神座興還樽所贊禮者引主人依昭穆酌獻如上儀唯不盥洗訖贊禮者引主人詣東序西向立諸祝各依爵酌福酒合置一爵祝持爵進主人之左北向主人再拜受爵跪祭酒啐酒奠爵興諸祝各帥執饌者以爼進減神座前胙肉共置一爼上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以爼以次進主人每受以授左右訖主人遂飲卒爵祝進受爵復於坫主人降自東階還本位西向立主人獻將畢贊禮者引亞獻詣罍洗盥手洗爵升自東階詣始祖酒樽所執樽者舉冪亞獻酌盎齊贊禮者引亞獻進詣始祖神座前西向跪奠爵興少退西向再拜贊禮者引亞獻以次酌獻如上儀贊禮者引亞獻詣東序西向立諸祝各以爵酌福酒如初獻之儀唯不受胙又贊禮者引終獻升獻飲福如亞獻之儀訖降復位諸祝皆進神座前跪徹豆興還樽所贊禮曰再拜非飲福受胙者皆再拜贊唱者又曰再拜主人以下皆再拜贊禮者進主人之左白禮畢遂引主人出贊者引亞獻以下及子孫以次出諸祝與執樽罍篚者俱復執事位立定贊唱者曰再拜諸祝以下皆再拜執樽罍篚者出諸祝與奄者櫝神主置於輿納於坎室如常儀唐書禮樂志天寶十載京官正員四品清望及四品五品清官聽立廟勿限兼爵雖品及而建廟未逮亦聽寢祭廟之制三品以上九架厦兩旁三廟者五間中為三室左右厦一間前後虛之無重栱藻井室皆為石室一於西墉三之一近南距地四尺容二主廟垣周之為南門東門門屋三室而上間以廟增建神厨于廟東之少南齋院於東門之外少北制勿逾于廟三品以上有神主五品以上有几筵牲以少牢羊豕一六品以下特豚不以祖禰貴賤皆子孫之牲牲闕代以野獸五品以上室異牲六品以下共牲二品以上室以籩豆十三品以八四品五品以六五品以上室皆簠二簋二㽅二鉶二爼二尊二罍二勺二爵六盤一坫一篚一牙盤胙爼一祭服三品以上玄冕五品以上爵辨六品以下進賢冠各以其服凡祔皆給休五日時享皆四日散齋二日于正寢致齋一日于廟子孫陪者齋一宿于家始廟則署主而祔後喪闋乃祔喪二十八月上旬卜而祔始神事之矣王公之主載以輅大夫之主以翟車其餘皆以輿天子以四孟臘享太廟諸臣避之祭仲而不臘三歲一祫五歲一禘若祔若常享若禘祫十日齋戒省牲視滌濯鼎鑊亨牲實饌三獻飲福受胙進退之數大抵如宗廟之祀以國官亞終獻無則以親賔以子弟其後不卜日而筮用亥祭寢者春秋以分冬夏以至日若祭春分則廢元日然元正嵗之始冬至陽之復二節最重祭不欲數乃廢春分通為四祠器以烏漆差小常制祭服以進賢冠主婦花叉禮衣後或改衣冠從公服無則常服凡祭之在廟在寢既畢皆親賔子孫慰主人以常服見若宗子有故庶子攝祭則祝曰孝子某使介子某執其常事通祭三代而宗子卑則以上牲祭宗子家祝曰孝子某為其介子某薦其常事庶子官尊而立廟其主祭則以支庶封官依大宗主祭兄陪於位以廟由弟立己不得延神也或兄弟分官則各祭考妣于正寢凡殤及無後皆祔食於祖無祝而不拜設座祖左而西向亞獻者奠祝乃奠之一獻而止其後廟制設幄當中南向祔坐無所施皆祭室户外之東而西向親伯叔之無後者祔曾祖親昆弟及從父昆弟祔于祖親子姪祔于禰寢祭之位西上祖東向而昭穆南北則伯叔之祔者居禰下之穆位北昆弟從父昆弟居祖下之昭位南向子姪居伯叔之下穆位北向以序尊卑凡殤無後以周親及大功為斷古者廟于大門內奉出寢于陵側故王公亦建廟于墓既廟與居異則宮中有喪而祭三年之喪齊衰大功皆廢祭外喪齊衰以下行之圖書集成唐韓雲卿故中書令贈太子太師雀公家廟碑銘略尚書右僕射趙國公圓薨天子罷朝三日喪禮贈賻加異常數詔贈太子太師諡曰某嗣子褒敦率舊禮五月而葬二十五月而祥既祥始立廟于洛邑曰考廟皇考廟階二尺有七寸從四尋衡八尋三尺五楹外垂四阿圬塓采椽不施丹雘齋宮爨室庭垣稱之寢廟既成庭除既平備器撰服先饗七日致齋具物君子曰吾觀崔氏之饗有以知禘嘗之義焉古者諸侯立五廟廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭有樂不克立五廟而立三廟不銘于鼎而銘于碑文獻通考德宗貞元十三年敕贈太傅馬燧祔廟宜令所司供少牢仍給鹵簿憲宗元和七年十一月太子少傅判太常卿事鄭餘慶建立私廟將祔四代神主廟有二夫人疑于祔配請禮院詳定修撰官太學博士韋公肅議曰古者一娶九女自秦漢以下不行此禮遂有再娶之説前娶後繼並是正嫡則偕祔之義于禮無嫌謹案晉驃騎大將軍溫嶠相繼有三妻疑並為夫人以問太學博士陳舒議以妻雖先沒榮辱並隨夫也禮祔于祖姑祖姑有三人則各祔舅之所生如其禮意三人皆夫人也秦漢以來諸侯不復一娶九女既生娶以正禮沒不可貶自後諸儒咸用舒議且嫡繼于古則有殊制于今則無異等今王公再娶無非禮聘所以祔祀之議不得不同至於卿士之家寢祭亦二妻位同几席豈廟享之禮而有異乎是知古者廟無不嫡防姪娣之爭競今無所施矣古之繼室皆媵妾也今之繼室皆嫡妻也不宜援古一娶九女之制也而使子孫祭享不及或曰春秋聲子不入魯侯之廟如之何謹案魯惠公元妃孟子孟子卒繼室以聲子聲子之姪娣非正也自不合入惠公之廟明矣又武公生仲子則仲子歸于魯生桓公而惠公薨立宫而奉之追成父志别為宫也尋求禮意則當然矣未見前例如之何謹案晉南昌府君廟有荀氏薛氏景侯有夏侯氏羊氏聖廟睿宗廟有昭成皇后竇氏肅明皇后劉氏故太師顔魯公祖廟有夫人殷氏繼夫人柳氏其流甚多不可悉數略稽禮文參諸故事二夫人並祔于禮為宜蕙田案程子有只以元妃配享之説又有奉祀之人是再娶所生則以所生母配之説朱子並以為不然而曰凡是嫡母無先後皆當並祔合祭故知陳舒韋公肅之議為深得禮意圖書集成韓愈魏博節度觀察使沂國公先廟碑銘元和八年十一月壬子上命召比部郎中韓愈至政事堂傳詔曰田𢎞正始有廟京師朕惟𢎞正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子維𢎞正銜訓事嗣朝夕不怠以能迎天之休顯有丕功惟父子繼忠孝豫惟寵嘉之是以命汝愈銘伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲于其廟以假魯靈今天子嘉田侯服父訓不違用康靖我國家蓋寵銘之所以休寧田氏之祖考得立廟祭三代曾祖都水使者府君祭初室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室唐書韋彤傳會昌五年詔京城不許羣臣作私廟宰相李德裕等引彤所議古制廟必中門之外吉凶皆告以親而尊之不自専也今俾立廟京外不能得其意于禮宮之南九坊三坊曰圍外地荒立廟無嫌餘六坊可禁詔不許聽凖古即所居立廟蕙田案詔書是也立廟圍外豈得為家廟乎盧𢎞宣傳𢎞宣患士庶人家祭無定儀乃合十二家法損益其當次以為書文獻通考唐宣宗大中五年十一月太常禮院奏據崔龜從奏臣凖式合立私廟伏凖會昌五年二月一日敕旨百官並不得京內置廟如欲于京內置廟者但準古禮於所居處置即不失敬親之禮者伏以武宗時緣南郊行事見六門街左右諸坊有人家私廟遂令禁斷且不欲令御路左右有廟宇許人私第內置則近北諸坊漸逼宮闕十年之內悉是人家私廟今若人家居地寬廣或鄰里可吞併者必便置廟以展孝思或居處偏狹鄰里無可開廣者便是終身廢廟享之榮公私情理皆極不便國朝二百餘年在私家側近者不過三數家今古殊禮頗為褻黷其餘悉在近南逺坊通行已久今若緣南路不欲令置私廟却令居處建立廟宇即須種植松柏及白楊樹近北諸坊又恐未便以臣愚見天門街左右諸坊不許置廟其餘圍外逺坊本是隙地并舊是廢廟者許令建立即天門街側近既無私廟近北諸坊又免百官占地立廟并官至三品盡得升祔禰無乖禮經中外官僚已至三品者皆望有此釐革伏請下太常禮院重定立廟制度及去處庶得禮可遵行事無乖當奉今月一日敕宜依所奏下太常禮院審詳制度分析奏聞者伏以事亡如存典禮攸重今百官悉在京師若不許于京內置廟則蒸嘗之禮難復躬親孝思之心或乖薦奠若悉令于居處置廟又緣近北諸坊便於朝謁百官第宅布列坊中其間雜以居人棟宇悉皆連接今廣開則鄰無隙地廢廟貌則禮闕敬親若令依會昌五年敕文盡勒于所居置廟兼恐十數年間私廟漸逼于宮墻齊人必苦于吞併臣具詳本末冀便公私今請夾天門街左右諸坊不得立私廟其餘外圍逺坊任取舊廟及擇空間地建立廟宇應立廟之初先取禮司詳定兼請準開元禮二品以上祠四廟三品祠三廟三品以下不須爵者四廟外有始封通祠五廟三品以上不得過九架並厦兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虛之前後亦虛之每室廟垣合開南門東門並有門屋餘並請準開元禮及曲臺禮為定制其享獻之禮除依古禮用少牢特牲饋食外有設時新及今時熟饌者並聽仍請永為定式敕旨宜依蕙田案古者左廟右寢廟寢相連即神依乎人之義私廟設天門街與另覓逺坊隙地建立者皆非禮意也北夢瑣言唐劉舍人蛻桐廬人早以文學應進士舉其先德誡之曰任汝進取窮乏與達不望于汝吾若沒後慎勿祭祀乃乘扁舟以漁釣自娛竟不知其所適紫微歷登華貫出典商於霜露之恩于是乎止臨終亦誡其子如先考之命蜀禮部尚書纂即其息也嘗與同列言之君子曰名教之中重于喪祭劉氏先德是何人斯茍同隱逸之流何傷菽水之禮紫微以儒而進爵比通侯遵乃父之緒言紊先王之舊制報本之敬能便廢乎退朝録祕府有唐孟詵家祭儀孫氏仲饗儀數種大抵以士人家用臺卓享祀類几筵乃是凶祭其四仲吉祭當用平面氈條屏風而已蕙田案祭祀可廢耶禮先亡矣劉舍人從親之命直從其亂命而已家語仰視榱桷俯察凡筵祭統鋪筵設同几几筵豈定是凶祭臺卓既先人所曾用便是合用之物謂其類于凶祭不經甚矣宋史仁宗本紀慶厯元年十一月大赦改元臣僚許立家廟功臣不限品數賜戟禮志羣臣家廟本于周制適士以上祭于廟士庶以下祭于寢唐原周制崇尚私廟五季之亂禮文大壞士大夫無襲爵故不建廟而四時寓祭于室慶厯元年南郊赦書應中外文武官並許以舊式立家廟仁宗本紀皇祐二年十二月甲申定三品以上家廟制禮志羣臣家廟宋庠又以為言乃下兩制禮官詳定其制度官正一品平章事以上立四廟樞密使知樞密院事參知政事樞密副使同知樞密院事簽書院事見任前任同宣徽使尚書節度使東宮少保以上皆立三廟餘官祭于寢凡得立廟者使嫡子襲爵以主祭其襲爵世降一等死即不得作主祔廟别祭于寢自當立廟者即祔其主其子孫承代不計廟祭寢祭並以世數疏數遷祧始得立廟者不祧以比始封有不祧者通祭四廟五廟廟因衆子立而嫡長子在則祭以適長子主之適長子死即不傳其子而傳立廟者之子凡立廟聽于京師或所居州縣其在京師者不得于裏城及南郊御路之側仍别議襲爵之制既以有廟者之子孫或官微不可以承祭而朝廷又難盡推襲爵之恩事竟不行蕙田案廟制可復而襲爵決不可行以襲爵格礙廟制拘牽甚矣文獻通考至和二年宰臣宋庠言慶厯郊祀赦書許文武官立家廟而有司終不能推述先典明喻上仁因循顧望遂踰十載使王公薦享下同委巷衣冠昭穆雜用家人緣偷襲弊甚可嗟也臣嘗因進對屢聞聖言謂諸臣專殖第産不立私廟寧朝廷勸戒有所未孚將風教頽陵終不可復睿心至意形於太息臣每求諸臣所以未即建立者誠亦有由蓋古今異儀封爵殊制因疑成憚遂格詔書禮官既不講求私家何緣擅立且未信而望誠者上難必責從善而設教者下或有違若欲必如三代冡嫡始封之重山川國邑之常然後議之則墜典無可復之期夫建宗祏序昭穆别貴賤之等所以為孝乃有過于殖産利營居室以遺子孫之業或至與民爭利顧不以為恥逮夫立廟則曰不敢寧所謂去小違古而就大違古者諸臣之惑不亦甚乎於是下兩制與禮官詳定制度嘉祐三年禮部尚書同中書門下平章事文彥博言伏覩禮官詳定私廟制度平章事以上許立四廟臣欲乞于河南府營創私廟乞降敕指揮從之司馬溫公集文潞公先廟碑記先王之制自天子至于官師皆有廟君子將營宮室宗廟為先居室為後及秦非笑聖人蕩滅典禮務尊君卑臣于是天子之外無敢營宗廟者漢世公卿貴人多建祠堂于墓所在都邑則鮮焉魏晉以降漸復廟制其後遂著于令以官品為所祀世數之差唐侍中王圭不立私廟為執法所糾太宗命有司為之營構以恥之是以唐世貴臣皆有廟及五代蕩析士民求生有所未遑禮頽教壞廟制遂絶宋興夷亂蘇疲久而未講仁宗皇帝閔羣臣貴極公相而祖禰食于寢儕于庶人慶厯元年因郊祀赦聽文武官依舊式立家廟令雖下有司莫之舉士大夫亦以耳目不經往往不知廟之可設于家也皇祐二年天子宗祀禮成平章事宋公奏言請下禮官儒臣議定制度于是翰林承旨而下共奏請自平章事以上立四廟東宮少保以上三廟其餘器服儀範俟更參酌以聞是歲十二月詔如其請既而在職者違慢相尚迄今廟制卒不立公卿亦安故習常得諉以為辭無肯倡衆為之者獨平章事文公首奏乞立廟河南明年七月有詔可之然尚未知築構之式靡所循依至和初西鎮長安訪唐廟之存者得杜岐公遺迹止餘一堂四室及旁兩翼嘉祐元年始倣而營之三年增置前兩廡及門東廡以藏祭器西廡以藏家譜齋祊在中門之右省牲展饌滌濯在中門之左庖厨在其東南其外門再重西折而南出四年秋廟成公以入輔出藩未嘗踰時安處于洛元豐三年秋留守西都始釁廟而祀焉公以廟制未備不敢作主用晉荀安昌公祠制作神板采唐周元陽議祀以元日寒食春秋分冬夏至致齋一日又以或受詔之四方不常其居乃酌古諸侯載主之義作車奉神板以行此皆禮之從宜者也却掃編近世士大夫家祭祀多茍且不經惟杜正獻公家用其逺祖叔亷書儀四時之享以分至日不設椅卓惟用平面席褥不焚紙幣以子弟執事不雜以婢僕先事致齋之類頗為近古又韓忠獻公嘗集唐御史鄭正則等七家祭儀參酌而用之名曰韓氏參用古今家祭式其法與杜氏大略相似而參以時宜如分至之外元日端午重九七月十五日之祭皆不廢以為雖出于世俗然孝子之心不忍違衆而忘親也其説多近人情最為可行蘇頌傳頌皇祐五年召試館閣校勘同知太常禮院至和中文彥博為相請建家廟事下太常頌議以為禮大夫士有田則祭無田則薦是有土者乃為廟祭也有田則有爵無土無爵則子孫無以繼承宗祀是有廟者止于其躬子孫無爵祭乃廢也若參合古今之制依約封爵之令為之等差錫以土田然後廟制可議若猶未也即請考案唐賢寢堂祠饗儀止用燕器常食而已蕙田案頌議可謂泥古而不察理者圭田雖廢品官有祿可以無田而不廟耶退朝録皇祐中宗衮請置家廟下兩制禮官議以為廟堂當靈長若身沒而子孫官微即廟隨毁請以其子孫襲三品階勳及爵庶常得奉祀不報蕙田案父為大夫子為士祭以士不聞毁廟也宋臣之議極似以立廟邀恩宜其不報也異哉李涪刊誤禮嫡士立二廟庶人祭于寢纍代禮文不易斯義開元十二年敕一品許祭四廟三品許祭三廟五品二廟嫡士亦許祭二廟爾後禮令並無革易古者廟連于家家主之喪則殯于西階之上鄉人儺孔子朝服立于阼階又曰喪不慮居為無廟也則知居不違廟禮典昭然近代顯居上位率多祭寢亦嘗發問皆曰官品未宜有位至將相者奏請之詞則曰臣官階並及三品凖令合立私廟是不知舊制妄有論奏廟貌申敬用展孝思豈于霜露之情合俟朝廷之命蓋以將同列戟先白有司既展哀榮宜遵典故原其奏請之因蓋以廟不在其家或于坊選吉地乃為府縣申奏或有官居顯重慎慮是宜營構之初亦自聞奏相習既久致立廟須至聞奏司馬溫公書儀凡祭用仲月王制大夫士有田則祭無田則薦注祭以首時薦以仲月今國家惟享太廟孟月自周六廟濮王廟皆用仲月以此私家不敢用孟月主人即曰在此男家長也曲禮支子不祭曾子問宗子為士庶子為大夫以上牲祭于宗子之家古者諸侯卿大夫宗族聚于一國故可以如是今兄弟仕宦散之四方雖支子亦四時念親安得不祭也及弟子孫皆盛服親臨筮日於影堂外少牢饋食禮日用丁巳又主人曰來日丁亥注丁未必亥也直舉一日以言之耳禘于太廟禮曰日用丁亥不得丁亥則己亥辛亥亦用之無則茍有亥焉可也孟説家祭儀用二至二分然今仕宦者職業殊繁但時至事暇可以祭則卜筮亦不必亥日及分至也若不暇卜日則止依孟儀用分至于事亦便也仁宗時嘗有詔聽太子少保以上皆立家廟而有司終不為定制度惟文潞公立廟于西京他人皆莫之立故今但以影堂言之主人西向立衆男在其後共為一列以長幼為敘皆北上置卓子於主人之前設香爐香合及蓍于其上主人搢笏進焚香薰而命之曰某將以某日諏此歲時適其祖考尚饗乃退立以蓍授筮者令西向筮不吉則更命日或無能筮者則以杯珓代之既得吉日乃入影堂主人北向子孫在其後如門外之位西上主人搢笏進焚香退立祝懷辭書辭于紙出於主人之左東向搢笏出辭跪讀之曰孝孫具官無官則但稱名某將以某日祗薦歲事于先祖先妣占既得吉敢告卷辭懷之執笏興復位主人再拜皆出古者四時之祭習以為常故筮日宿尸賔而不告祖考今始變時俗筮日而祭故不得不告蓋人情當然前期三日主人帥諸丈夫致齋于外男十歲以上皆居宿于外主婦帥諸婦女致齋于內雖得飲酒而不至亂亂謂改其常度食肉不茹葷葷謂蔥韭蒜之類有臭氣之物不弔喪不聽樂凡凶穢之事皆不得預専致思於祭祀祭義曰齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見所為齋者前期一日主人帥衆丈夫及執事者灑掃祭所影堂迫隘則擇廳堂寬潔之處以為祭所滌濯祭器主人縱不親滌亦須監視務令蠲潔設椅卓考妣並位皆南向西上古者祭于室中故神坐東向自後漢以來公私廟皆同堂異室南向西上所以西上者神道尚右故也主婦主人之妻也禮舅沒則姑老不與于祭主人主婦必使長男及婦為之若或自欲預祭則特位於主婦之前參神畢升立於酒壺之北監視禮儀或老疾不能久立則休于他所俟受胙復來受胙辭神而已帥衆婦女滌釡鼎具祭饌注往歲士大夫家婦女皆親造祭饌近日婦女驕倨鮮肯入庖厨凡事父母姑舅雖有使令之人必身親之所以致其孝恭之心今縱不能親執刀七亦須監視庖厨務令精潔未祭之物勿令人先食之及為貓犬及鼠所盜汚開元禮六品以下祭亦有省牲陳祭器等儀案士大夫家祭其先者未必皆殺牲又簠簋籩豆鼎爼罍洗皆非私家所有今但能别置碗楪等器專供祭祀平時收貯勿供他用己善矣時蔬時果各五品膾今紅生炙今炙肉羮今炒肉殽今骨頭軒今白肉音獻脯今乾脯醢今肉醬庶羞豬羊之外珍異之味麵食如薄餅油餅胡餅蒸餅棗糕環餅捻頭餺飥之類是也米食謂黍稷稻粱粟所為飯及粢糕團粽餳之類皆是也共不過十五品若家貧或鄉土異宜或一時所無不能辦此則各隨其所有蔬果肉麵米食各數品可也執事者設盥盆有臺于阼階東南帨巾有架在其北盥濯手也帨手巾也此主人以下親戚所盥無阼階則以階之東偏為阼階西偏為西階又設盥盆帨巾無臺架者於其東此執事者所盥少牢饋食禮設洗于阼階東南設罍水于洗東有枓設篚于洗西南肆開元禮倣此又云贊禮者引主人詣罍洗執罍者酌水執洗者取盤承水主人盥手執篚者受巾遂進爵主人詣酒樽所執樽者舉冪私家乏人恐難備今但設盥盆帨巾使自盥手帨手以從簡易明日夙興主人以下皆盛服丈夫有官者具公服靴笏無官者幞頭衫帶婦人大袖裾帔各隨其所應服之盛者主人主婦帥執事者詣祭所於每位設蔬果各于卓子南端酒盞七筯茶盞托醬楪實以醬鹽醯於卓子北端禮主婦薦籩豆設黍稷主人舉鼎設爼今使主婦帥婦女薦蔬果粢盛主人帥衆男薦肉亦倣此執事者設玄酒一瓶其日取井華水充酒一瓶于東階上西上别以卓子設酒注酒盞刀子拭布于其東設香卓於堂中央置香爐香合於其上裝灰瓶設火爐湯瓶香匙火筯于西方對瓶實水于盥盆質明庖者告饌具主人主婦共詣影堂二執事舉祠版笥主人前導主婦主婦從後衆丈夫在左衆婦女在右從至祭所置于西階上火爐之西向主人主婦盥手帨手各奉祠版置于其位考先妣後主人帥衆丈夫共為一列長幼以序立于東階下北向西上主婦帥衆婦女如衆丈夫之敘婦以夫之長幼不以身之長幼立於西階下北向東上執事者立於其後共為一列亦西上位定俱再拜此參神也少牢饋食禮將祭主人朝服即位于阼階東西面祝告利成主人立于阼階上西面尸出入主人降立于阼階東西面此皆主人之正位也卒脀祝盥于洗升自西階主人盥升自阼階祝先入南面主人從尸內西面祝酌奠主人西面再拜稽首皆為几筵之在西也尸升筵主人西面立于户內拜妥尸尸醋主人主人西面奠爵拜皆為尸之在西也開元禮贊禮者設主人之位于東階下西面亞獻終獻位于主人東南掌事者位終獻東南俱重行西向北上設子孫之位于庭重行北面西上設贊唱者位于終獻西南西南向曰參神皆就此位案今民間祠祭必向神位而拜無神在北而西向拜者故此皆北向向神而立及拜脀諸應切醋音胙主人升自阼階立于香卓之南搢笏焚香古之祭者不知神之所在故灌用鬱鬯臭隂達于淵泉蕭合黍稷臭陽達于墻屋所以廣求其神也今此禮既難行于士民之家故但焚香酹酒以代之再拜降復位祝及執事者皆盥手帨手執事者一人升開酒拭瓶口實酒于注子取盞斟酒西向酹庖人先用飯牀陳饌于盥帨之東衆丈夫盥手帨手主人帥之搢笏奉肉食主人升自阼階衆丈夫升自西階以次設于曾祖考妣祖考妣考妣神座前蔬果之北降執笏復位衆婦女盥手帨手主婦帥之奉麵食升自西階以次設于肉食之北降奉米食升自西階以次設于麵食之北降復位主人升自阼階詣酒注所西向立執事者一人左手奉曾祖考酒盞右手奉曾祖妣酒盞一人奉祖考妣酒盞一人奉考妣酒盞皆如曾祖考妣之次就主人所主人搢笏執注以次斟酒執事奉之徐行反置故處主人出笏詣曾祖考妣神座前北向執事者一人奉曾祖考酒盞立於主人之左一人奉曾祖妣酒盞立于主人之右主人搢笏跪取曾祖考酒酹之授執事者盞返故處主人出笏俯伏興少退立祝懷辭出主人之左東向搢笏出辭跪讀之曰維年月日孝子曾孫具位某敢用柔毛牲用彘則曰剛鬛嘉薦普淖用薦歲事于曾祖考某官府君曾祖妣某封某氏配尚饗祝卷辭懷之執笏興主人再拜次詣祖考妣考妣神座皆如曾祖考妣之儀祝辭之異者祖曰孝孫薦歲事于祖考妣父曰孝子薦歲事于考妣獻畢祝及主人皆降位次亞獻終獻以主婦或近親為之盥手帨手若已嘗盥手者更不盥升自西階斟酒酹酒皆如上儀惟不讀祝既遍主人升自東階脫笏執注子遍就斟酒盞皆滿執笏退立于香卓東南北向主婦升自西階執七扱黍中西柄扱初洽切正筯立于香卓西南北向主人再拜主婦四拜少牢饋食禮七飯尸告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑勸也又曰尸又食上佐食舉肩尸不飯告飽主人不言拜侑注祝言而不拜主人不言而拜親踈之宜今主人斟酒主婦扱七正筯而拜亦不言侑食之意也執事者一人執器瀝去茶清一人以湯斟之皆自西始畢皆出祝闔門主人立于門東西向衆丈夫在其後主婦立于門西東向衆婦皆在其後特牲饋食曰尸謖注謖起也又曰佐食徹尸薦爼敦設于西北隅几在南厞用筵納一尊佐食闔牖户降注厞隱也不知神之所在或逺諸人乎尸謖而改饌為幽暗所以為厭飫此所謂當室之白為陽厭尸未入之前為隂厭祭義曰祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出户而聽愾然必有聞乎嘆息之聲鄭曰無尸者闔户若食間此則孝子廣求其親庶或享之忠愛之至也今既無尸故須設此儀若老弱羸疾不能久立則更休他所當留親者一兩人侍立于門外可也謖所六切敦音對厞扶米切僾音愛愾開大切如食間祝升當門外北向告啓門三士虞禮祝聲三啓户注聲者噫歆也將啓户驚覺神也及啓門執事者席于玄酒之北主人入就席西向立祝升自西階就曾祖位前搢笏舉酒徐行詣主人之右南向授主人搢笏跪受祭酒啐酒執事者授祝以器祝受器取七抄諸位之黍各少許置器中祝執黍行詣主人之左北向嘏于主人曰祖考命工祝承致多福于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉夀永年勿替引之主人置酒于席前執笏俯伏興再拜搢笏跪受黍嘗之實于左袂執事者一人立于主人之右主人授執事者器挂袂于手指取酒卒飲執事者一人立于主人之右受盞置酒注旁一人立于主人之左執盤置于地主人寫袂中之黍于盤執事者授以出主人執笏俯伏興立于東階上西向于主人之受黍也祝執笏退立于西階上東向主人既就位祝告利成降復位於是在位者皆再拜主人不拜此受胙也主人降與在位者皆再拜此辭神也主人主婦皆升奉祠版納于櫝笥妣先考後執事者二人舉之導從歸于影堂如來儀主婦還監徹酒盞不酹者及注中餘酒皆入于壺封之所謂福酒執事者徹祭饌返於厨傳於宴器主婦監滌祭器藏之主人監分祭饌為胙盤品取少許同置于合并福酒皆緘之貴于神餘不貴豐腆遣僕執書歸胙于親友之好禮者書辭在後執事者設餕席男女異座主人與衆丈夫坐於堂主婦與衆婦女坐于室設椅卓蔬果醢醯醬酒盞七筯畢入酒于注庖者溫祭饌男尊長就坐衆男獻夀若主人主婦之上更有尊長則主人帥衆男主婦帥婦女以獻夀敘立向尊長如祭所之位而男女皆以右為上如尊長南向則以東為上是也衆丈夫以長者或弟或子少進執事者一人執酒注立於右一人執酒盞立於左長男即衆丈夫之長也搢笏跪右手執注左手執盞斟酒祝曰祀事既成祖考嘉享伏願備膺五福保族宜家執注者退執盞者置酒於尊長之前長男俯伏興退復位與衆丈夫俱再拜興立尊長命執事者取酒注及長男酒盞置于前自斟之祝曰祀事克成五福之慶與汝曹共之執事者以盞致于長男長男搢笏跪受以授執事者置其位俯伏興立尊者命執事者遍斟衆丈夫酒畢長男及衆丈夫皆再拜尊者命坐乃就坐衆女獻女尊長于室女尊長酢衆婦女立斟立受不跪餘皆如衆丈夫之儀飲畢執事者獻肉食畢衆婦女詣堂獻男尊長夀婦女執事不能祝者默斟而已及尊長酢長女或妹或女長女立斟立受不跪婦長則使執事者就酢餘皆如衆丈夫之儀衆丈夫詣室獻女尊長夀如堂上之儀執事者薦麵食衆執事者獻男女尊長夀如婦女而不酢執事者薦米食然後泛行酒間以祭饌盞數惟尊長之命禮祭事既畢兄弟及賔迭相獻酬有無算爵所以因其接會使之交恩定好優勸之今亦取此儀凡歸胙及餕若酒不足則和以他酒饌不足則繼以他饌既罷據所酒饌主人頒胙于外僕主婦頒胙于內執事者遍及微賤其日皆盡孔子祭於公不宿肉不敢留神惠也凡祭主于盡愛敬之誠而已疾則量筋力而行之少壯者自當如儀蕙田案後世大夫士祭儀始詳見於開元禮大槩倣佛儀禮為之而於主婦薦獻及男婦酬酢等儀均未之及殆古今異宜未可行也司馬氏書儀其追仿儀禮實有精意而添入主婦諸婦及獻酬諸儀朱子從之朱子文集答郭子從問影堂序位曰古者一世自為一廟有門有堂有寢凡屋三重而墻四周焉自後漢以來乃為同堂異室之廟一世一室而以西為上如韓文中家廟碑有祭初室祭東室之語今國家亦用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故溫公諸家祭禮皆用以右為尊之説獨文潞公嘗立家廟今溫公集中有碑載其制度頗詳亦是一世一室而以右為上大抵今士大夫家只當且以溫公之法為定也聞見前録康節先生出行不擇日或告之以不利則不行蓋曰人未言則不知既言則有知而必行則神鬼敵也春秋祭祀約古今禮行之亦焚楮錢程伊川怪問之則曰明器之義也脫有一非豈孝子慈孫之心乎又曰吾髙曾今時人以簠簋籩豆薦牲不可也伯溫謹遵遺訓而行之也宋史王存傳存以右正議大夫致仕嘗悼近世學者貴為公卿而祭祀其先但備庶人之制及歸老築居首營家廟禮志大觀二年議禮局言所有臣庶祭禮請參酌古今訂論條上斷自聖衷于是議禮局議執政以上祭四廟餘通祭三廟古無祭四世者又侍從官以至士庶通祭一世無等差多寡之别豈禮意乎古者天子七世今太廟已增為九室則執政視古諸侯以事五世不為過矣先王制禮以齊萬有不同之情賤者不得僭貴者不得踰故事一世者雖有孝思追逺之心無得而越事五世者亦當跂以及焉今恐奪人之恩而使通祭三世徇流俗之情非先王制禮等差之義可文臣執政官武臣節度使以上祭五世文武升朝官祭三室餘祭二世應有私第者立廟于門內之左如狹隘聽於私第之側力所不及仍許隨宜又詔古者寢不踰廟禮之廢失久矣士庶堂寢踰度僭禮有七楹九楹者若一旦使就五世三世之數則當徹毁居宇以應禮制豈得為易行可自今立廟其間數視所祭世數寢間數不得踰廟事二世者寢聽用二間議禮局言禮記王制諸侯五廟二昭二穆與太祖之廟而五所謂太者蓋始封之祖不必五世又非臣下所可通稱今髙祖以上一祖未有名稱欲乞稱五世祖其家廟祭器正一品每室籩豆各十有二簠簋各四壺尊罍鉶鼎爼篚各二尊罍加勺羃各一爵各一諸室共用胙爼罍洗一從一品籩豆簠簋降殺以兩正二品籩豆各八簠簋各二餘皆如正一品之數詔禮制局制造仍取旨以給賜之蕙田案諸侯五廟上不及五世祖此祭及五世欲乞稱五世祖殊乖典禮楊存巾傳存中父祖及母皆死難存中既顯請于朝宗閔諡忠介震諡忠毅賜廟曰顯忠曰報忠又以家廟祭器為請遂許祭五世前所無也文獻通考孝宗隆興二年少師奉國軍節度使四川宣撫使吳璘請用存中例立廟賜器從之乾道八年九月戊寅以虞允文為少保武安軍節度使四川宣撫使封雍國公己丑賜虞允文家廟祭器右歷代大夫士廟祭上五禮通考卷一百十四
