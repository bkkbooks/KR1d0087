body:
  text: 五禮通考卷一百八十六刑部尚書秦蕙田撰嘉禮五十九觀象授時書堯典帝曰咨汝羲暨和期三百有六旬有六日傳咨嗟暨與也匝四時曰期則疏周天三百六十五度四分度之一而日日行一度一期三百六十五日四分日之一此言三百六十六日者王肅云四分日之一又入六日之内舉全數以言之故云三百六十六日也蕙田案此即推步家所謂歲周歲周者日行天一周也亦曰歲實歲實者一歲實行之數也八分之為八節二十四分之為中氣節氣七十二分之為候每候五日竒每氣三候凡十五日竒每一期之日三百六十大餘五小餘不及四分日之一欽定書經傳説彚纂期三百有六旬有六日葢舉成數言之即今歲實也前代諸家所定歲實不一漢志以天周為三百六十五度四分度之一在天為一度在律為一日是以天周即歲周也東晉虞喜分周天為三百六十五度二十六分乃四分之一有餘定歲周為三百六十五日二十四分為四分之一不足宋何承天改天周為三百六十五度二十五分半歲周為三百六十五日二十四分半元郭守敬考古準今定天周為三百六十五度二千五百七十五分歲周為三百六十五日二千四百二十五分然天周歲周俱用竒零勢難齊一惟邵子元會運世以三百六十為率葢天周為起數之宗天度既整然後以整馭零為法較易故今時憲書定天周為三百六十度度為六十分分為六十秒秒以下俱以六十逓析而歲周為三百六十五日二四二一八七五日為十二時時為八刻刻為十五分分為六十秒秒以下俱以六十逓析二四二一八七五當十二時中二時七刻零三分四十五秒列代以來雖餘分多寡稍有增損要皆本乎堯典之成數而修明之附漢以後歲實異同漢書志三統厯周天五十六萬二千一百二十統法一千五百三十九戴氏震曰周天即為歲周經歲三百六十五日併小餘也以統法為日分亦名度法周天滿統法得經歲其小餘三百八十五亦名度餘今設萬萬為日通分以較古今歲實通分乗小餘省乗進八位滿統法得二千五百有一萬六千二百四十四竒蕙田案此較四分稍强後放此推之後漢書志數之生也乃立儀表以校日景景長則日逺天度之端也日發其端周而為歲然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五日四分日之一為歲之日數日日行一度亦為天度四分術大周三十四萬三千三百三十五蔀月九百四十載氏震曰此以大周為周天蔀月為日分周天滿日分得經歲其小餘二百三十五以萬萬通之滿日分得二千五百萬晉書志漢靈帝時會稽東部尉劉洪始悟四分於天踈濶皆斗分太多故也更以五百八十九為紀法百四十五為斗分作乾象法周天二十一萬五千一百三十戴氏震曰此以紀法為日分周天滿紀法得經歲其小餘一百四十五謂之斗分者歲首冬至日躔起斗終斗故度餘屬之斗曰斗分餘宿皆整度以萬萬通斗分滿紀法得二千四百六十一萬七千九百九十六竒蕙田案是為減歲餘之始魏文帝黄初中太史丞韓翊以為乾象減斗分太過後當先天造黄初厯以四千八百八十三為紀法千二百五為斗分戴氏震曰以萬萬通斗分滿紀法得二千四百六十七萬七千四百五十二竒蕙田案此强於乾象景初厯周天六十七萬三千一百五十紀法千八百四十三又見宋志戴氏震曰周天滿紀法得經歲其小餘四百五十五以萬萬通之滿紀法得二千四百六十八萬八千有八竒蕙田案此强於黄初武帝時侍中平原劉智以斗厯改憲推四分法三百年而減一日以百五十為度法三十七為斗分戴氏震曰以萬萬通斗分滿度法得二千四百六十六萬六千六百六十六竒蕙田案此强於乾象弱於黄初後秦姚興時當孝武太元九年天水姜岌造三紀甲子元厯以二千四百五十一分之六百五為斗分周天八十九萬五千二百二十紀法二千四百五十一戴氏震曰以萬萬通斗分滿紀法得二千四百六十八萬三千八百有二竒蕙田案此强於黄初弱於景初魏書志神龜初正光厯周天分二百二十一萬三千三百七十七以度法通三百六十五度納斗分斗分一千四百七十七蔀法六千六十十二章為一蔀至此年小餘成日為度法戴氏震曰以萬萬通斗分滿蔀法得二千四百三十七萬二千九百三十七竒蕙田案此弱於乾象李業興甲子元厯周天六百一十五萬八千一十七度法通度内斗分之數斗分四千一百一十七從斗量周天至此不成度之分度法一萬六千八百六十三十乗章歲得此數戴氏震曰以萬萬通斗分滿度法得二千四百四十一萬八千七百四十二竒蕙田案此强於正光弱於黄初宋書志何承天元嘉厯以七十五為室分周天十一萬一千三十五度法三百四戴氏震曰何氏以雨水為日躔之初起室終室故謂度餘為室分以萬萬通室分滿度法得二千四百六十七萬一千有五十二竒蕙田案此强於劉智弱於黄初大明六年南徐州從事史祖冲之甲子元厯周天一千四百四十二萬四千六百六十四虚分萬四百四十九歲餘九千五百八十九紀法三萬九千四百九十一戴氏震曰祖氏以上元日度發自虚一故謂度餘為虚分以萬萬通虚分滿紀法得二千六百四十五萬九千一百九十三萬竒又以萬萬通歲餘滿紀法得二千四百二十八萬一千四百八十一竒蕙田案此歲餘不及度餘三萬九千四百九十一分之八百六十是為歲差分天自為天歲自為歲其法始見於此葢定為四十五六年差一度也歲餘比正光更弱隋書志開皇四年張賔等新厯依何承天法㣲加增損斗分二萬五千六十三蔀法一十萬二千九百六十戴氏震曰以萬萬通斗分滿蔀法得二千四百三十四萬二千四百六十四竒蕙田案此强於祖氏弱於正光大業四年戊辰所定算厯周天分一千五百五十七萬四千四百六十六斗分一萬八百八十六度法四萬二千六百四十歲分一千五百五十七萬三千九百六十三戴氏震曰以萬萬通斗分滿度法得二千五百四十八萬三千一百一十四竒歲分滿度法得經歲其小餘一萬有三百六十三以萬萬通之滿度法得二千四百三十萬有三千四百七十竒蕙田案此强於祖氏弱於張賔等新厯歲分不及周天分四萬二千六百四十分之五百有三是為歲差此定八十八九年而差一度劉焯皇極厯度法四萬六千六百四十四氣日法同周數千七百三萬七千七十六周分萬二千一十六歲數千七百三萬六千四百六十六半周差六百九半戴氏震曰以萬萬通周分滿度法得二千五百七十六萬一千有八十三竒周分即度餘也在天曰度法在歲曰氣日法歲數滿氣日法得經歲其小餘一萬一千四百有六半以萬萬通之滿氣日法得二千四百四十五萬四千三百七十七竒蕙田案此强於李業興甲子元厯弱於乾象歲數不及周數六百有九半謂之周差即歲差也定為七十六年過半而差一度唐書志唐始終二百九十餘年而厯八改初曰戊寅元厯曰麟徳甲子元厯曰開元大衍厯曰寳應五紀厯曰建中正元厯曰元和觀象厯曰長慶宣明厯曰景福崇𤣥厯而止矣傅仁均戊寅厯周分三百四十五萬六千八百四十五半斗分二千四百八十五半歲分三百四十五萬六千六百七十五歲餘二千三百一十五度法氣法九千四百六十四戴氏震曰以萬萬通斗分滿度法得二千六百二十六萬二千六百七十九竒又以萬萬通歲餘滿氣法得二千四百四十六萬一千一百一十五蕙田案此强於皇極弱於乾象其歲分不及周分九千四百六十四分之一百七十有半是為歲差此定五十五年過半差一度也李淳風麟徳甲子元厯推法千三百四十期實四十八萬九千四百二十八戴氏震曰期實滿推法得經歲其小餘三百二十八以萬萬通之滿推法得二千四百四十七萬七千六百一十一竒蕙田案此强於戊寅弱於乾象開元大衍厯日法曰通法歲分曰策實周天曰乾實餘分曰虚分乾實百一十一萬三百七十九太周天度三百六十五虚分七百七十九太歲差三十六太通法三千四十䇿實百一十一萬三百四十三䇿餘萬五千九百四十三戴氏震曰四分一為少三為太以萬萬通虚分滿通法得二千五百六十四萬九千六百七十一竒䇿餘者用三百六十日為整歲其大餘五日併小餘也以萬萬通之滿通法得五億二千四百四十四萬有七百八十九竒五億為大餘五日二千以下為小餘蕙田案此强於李業興甲子元厯弱於皇極厯其歲差八十年有竒而差一度寶應五紀厯乾實四十八萬九千四百四十二秒七十周天度三百六十五虚分三百四十二秒七十歲差十四秒七十䇿實四十八萬九千四百二十八䇿餘七千二十八通法千三百四十秒法百蕙田案此即用麟徳甲子元厯更立歲差耳䇿實即麟徳之期實通法即麟徳之推法䇿餘滿通法得大餘五日小餘同麟徳無異法也以萬萬通虚分滿通法得二千五百五十七萬四千六百二十六竒其歲差九十一年有竒而差一度建中正元厯乾實三十九萬九千九百五十五秒二周天度三百六十五虚分二百八十秒二歲差十二秒二秒母百通法千九十五䇿實三十九萬九千九百四十三載氏震曰以萬萬通虚分滿通法得二千五百五十七萬二千六百有二竒䇿餘滿通法得大餘五日小餘以萬萬通之滿通法得二千四百四十七萬四千八百八十五奇蕙田案此强於皇極弱於麟徳其歲差與五紀相近長慶宣明厯謂通法曰統法䇿實曰章歲䇿餘曰通餘乾實曰象數秒法三百以乗統法曰分統象數九億二千四十四萬六千一百九十九周天三百六十五度虚分二千一百五十三秒二百九十九歲差二萬九千六百九十九分統二百五十二萬秒母三百章歲三百六萬八千五十五通餘四萬四千五十五戴氏震曰象數滿分統得周天度其度餘六十四萬六千一百九十九滿秒母得虚分及秒以萬萬通度餘滿分統得二千五百六十四萬二千八百一十七竒道餘滿統法得大餘五日小餘以萬萬通之滿統法得二千四百四十六萬四千二百八十五竒蕙田案此强於戊寅元厯弱於正元厯其歲差八十四五年而差一度景福崇𤣥厯周天分四百九十三萬九百六十一秒二十四歲差百六十秒二十四周天三百六十五度虚分三千四百六十一秒二十四歲實四百九十三萬八百一歲餘七萬八百一通法萬三千五百戴氏震曰以萬萬通虚分滿通法得二千五百六十三萬八千八百一十四竒歲餘滿通法得大餘五日小餘以萬萬通之滿通法得二千四百四十五萬一千八百五十一竒蕙田案此强於大衍弱於戊寅其歲差八十三年有竒而差一度五代史司天考周顯徳二年王朴欽天術軌率二百六十二萬九千八百四十四秒八十軌䇿三百六十五分一千八百四十四秒八十歲率二百六十二萬九千七百六十秒四十歲策三百六十五分一千七百六十秒四十歲差八十四秒四十統法七千二百通法一百秒盈通法從分分盈統法從日戴氏震曰軌率軌䇿即周天度分秒也以萬萬通軌䇿之分秒滿統法得二千五百六十二萬二千二百二十二竒以萬萬通歲䇿之分秒滿統法得二千四百四十五萬蕙田案此强於大術弱於崇𤣥宋史志崇天厯周天分三百八十六萬八千六十五秒二周天度三百六十五加分二千七百一十五秒二歲差一百二十五秒二秒法一百歲周三百八十六萬七千九百四十歲餘五萬五千五百四十樞法一萬五百九十戴氏震曰去天度外以萬萬通其加分滿樞法得二千五百六十三萬七千四百一十二歲餘滿樞法得大餘五日小餘以萬萬通之滿樞法得二千四百四十五萬七千有三十四竒蕙田案此强於崇𤣥弱於戊寅其歲差八十四五年而差一度明天厯周天分二十二億七千九百二十萬四百四十七周天三百六十五度餘一百六十萬四百四十七歲差八萬四百四十七日度母六百二十四萬歲周一千四百二十四萬四千五百歲周三百六十五日餘九千五百元法三萬九千戴氏震曰以萬萬通周天度餘滿日度母得二千五百六十四萬八千一百八十九竒以萬萬通歲餘滿元法得二千四百三十五萬八千九百七十四竒蕙田案此强於張賔新術弱於正光其歲差七十七年過半而差一度觀天厯周天分四百三十九萬四千三十四秒五十七周天度三百六十五餘三千八十四秒五十七歲差一百五十四秒五十七秒母一萬歲周四百三十九萬三千八百八十歲餘六萬三千八十統法一萬二千三十戴氏震曰以萬萬通周天度餘滿統法得二千五百六十三萬五千九百五十七竒歲餘滿統法得大餘五日小餘以萬萬統之滿統法得二千四百三十五萬五千七百七十七竒蕙田案此强於張賔弱於明天其歲差七十八年有竒而差一度紀元厯周天分二億一千三百一萬八千一十七歲差七千九百三十七期實二百六十六萬二千六百二十六歲周三百六十五日餘一千七百七十六日法七千二百九十戴氏震曰日法八十倍得五十八萬三千二百為度法周天分滿度法得三百六十五度餘一十五萬一十七以萬萬通之滿度法得二千五百七十二萬三千七十九竒以萬萬通歲餘滿日法得二千四百三十六萬二千一百三十九竒蕙田案此强於明天弱於正光其歲差七十三年有竒而差一度統元厯周天二百五十三萬一千二百二十六秒八十七歲差八十八秒八十七秒法百歲周二百五十三萬一千一百三十八歲周日三百六十五餘一千六百八十八元法六千九百三十戴氏震曰周天滿元法得三百六十五度餘一千七百七十六及秒八十七以萬萬通之滿元法得二千五百六十四萬有二百五十九以萬萬通歲餘滿元法得二千四百三十五萬七千八百六十四蕙田案此强於觀天弱於明天其歲差七十七八年而差一度乾道厯周天分一千九十五萬七千七百一十七秒五歲差四百九秒五秒法百期實一千九十五萬七千三百八歲周三百六十五餘七千三百八元法三萬戴氏震曰周天滿元法得三百六十五度餘七千七百一十七及秒五以萬萬通之滿元法得二千五百七十二萬三千五百又以萬萬通歲餘滿元法得二千四百三十六萬蕙田案此强於明天弱於紀元其歲差與紀元相近淳熈推法乾實三億九百萬七千六百一十三歲差一萬一千五百一十三歲實二百五萬九千九百七十四歲周日三百六十五餘一千三百七十四元法五千六百四十戴氏震曰元法一百五十倍得八十四萬六千為度法乾實滿度法得三百六十五度餘二十一萬七千六百一十三以萬萬通之滿度法得二千五百七十二萬二千五百七十六竒歲餘滿元法得二千四百三十六萬一千七百有二竒蕙田案此强於乾道弱於紀元其歲差與紀元乾道相近會元厯氣率一千四百一十三萬四千九百三十二軌差五百二十五秒一十三秒法百統率三萬八千七百戴氏震曰氣率滿統率得經歲卜餘九千四百三十二以萬萬通之滿統率得二千四百三十七萬二千有九十三竒蕙田案此强於紀元弱於正光其歲差七十三年過半而差一度統天厯周天分四百二十八萬三千九十歲分四百三十八萬二千九百一十餘六萬二千九百一十䇿法萬二千戴氏震曰周天分滿䇿法得三百六十五度餘三千有九十以萬萬通之滿䇿法得二千五百七十五萬歲餘滿䇿法得大餘五日小餘以萬萬通之滿䇿法得二千四百二十五萬分蕙田案此更弱於祖沖之甲子元厯其歲差六十六七年而差一度開禧厯周天率六百一十七萬二千八百五十九秒一歲差二百五十一秒一歲率六百一十七萬二千六百八日法一萬六千九百戴氏震曰歲率滿日法得經歲小餘四千一百有八以萬萬通之滿日法得二千四百三十萬有七千六百九十二竒蕙田案此强於大業中術法弱於張賔等新術其歲差六十七年有竒而差一度金史志大明術周天分一百九十一萬二百九十三分五百三十秒歲差六十九分五百三十秒秒母一萬歲實一百九十一萬二百二十四分歲策三百六十五日餘一千二百七十四分日法五千二百三十分戴氏震曰周天分滿日法得三百六十五度餘一千三百四十三分五百三十秘以萬萬通之滿日法得二千五百六十七萬九千七百八十九竒歲餘滿日法得二千四百三十五萬九千四百六十四竒蕙田案此强於明天弱於乾道其歲差七十五六年而差一度元史志庚午元厯周天一百九十一萬二百九十二秒九十八歲差六十八秒九十八秒母一百歲實一百九十一萬二百二十四歲䇿三百六十五餘一千二百七十四日法五千二百三十戴氏震曰此據大明術減天周七十三秒則歲差亦少七十三秒授時厯周天分三百六十五萬二千五百七十五分歲實三百六十五萬二千四百二十五分歲差一百五十分日周一萬戴氏震曰授時之周天歲實歲差悉與宋統天同但不用日法一度即為萬分一日亦為萬分明史志囘囘法天周度三百六十毎度六十分每分六十秒微纎以下俱準此宫十二每宫三十度日周分一千四百四十時二十四每時六十分刻九十六每刻十五分其法不用閏月以三百六十五日為一歲歲十二宫宫有閏日凡百二十八年而宫閏三十一日戴氏震曰百二十八年閏三十一日則每歲三百六十五日之外餘百二十八分日之三十一也即以百三十一為日法以萬萬通三十一滿日法得二千四百二十一萬八千七百五十蕙田案此弱於授時崇禎新書依百分算定用平行歲實為三百六十五日二十四刻二十一分八十八秒六十四微戴氏震曰此刻分秒微皆以百迭析以萬萬較之是為二千四百二十一萬八千八百六十四蕙田案此强於囘囘弱於授時新法書西法歲三百六十五日四分日之一每四歲之小餘成一日因而置閏百年中為整年七十五閏年二十五共為三萬六年五百二十五日蕙田案此西人舊法即古法三百六十五日四分日之一也周髀算經以三百六十五日謂之經歲餘四分日之一故四年而閏一日西法之初葢本乎周髀其言地圓也亦周髀之緒餘洵乎西法原出自中土故列之以誌其所起當神宗十二年甲申十三年乙酉西域測前後兩春分得歲實三百六十五日二十三刻四分戴氏震曰每日九十六刻每刻十五分法同囘囘術以十五通九十六得一千四百四十分為日法以十五通二十三刻納四分得三百四十九分又以萬萬通之滿日法得二千四百二十三萬六千一百一十一竒蕙田案此强於崇禎新書所定弱於授時神宗十六年戊子第谷測春分時刻與前𢎞治元年戊申西域白耳那瓦所測相較定歲實三百六十五日二十三刻三分四十五秒戴氏震曰每日九十六刻以分秒通之得八萬六千四百秒為日法以十五通二十三刻納三分又以六十通之納四十五秒得二萬有九百二十五秒又以萬萬通之滿日法得二千四百二十一萬八千七百五十與囘囘同蕙田案西洋前法本之周髀後則本之囘囘雖以為自測驗得之要亦有所本而後加以測驗耳恒星依黄道東行六十九年一百九十一日七十三刻而行一度多禄某測一百餘年而行一度泥谷老後多禄某一千三百八十六年又以時史所記測得六十一年而行一度第谷用前賢之成法展轉㕘訂得每年行五十一秒七十年又七閲月而行一度蕙田案西人測恒星東行或六七十年一度或逾百年一度亦如漢以來言歲差者之疏宻不一葢步算積久漸宻檡其宻者用之随時測驗損益以合天可也又案第谷所定歲實本朝修時憲書用之其後西人奈端等又謂第谷所減太過酌定為三百六十五日五時三刻三分五十七秒四十一微有竒以萬萬通其小餘得二千四百二十三萬三千四百四十二竒在明神宗時西人前後兩測之間雍正以來用之又案歲實為推步最大節目歲實定然後所推氣候始真一切諸法皆輔翼乎此者也由漢而下一法輙更一歲實時損時益莫不有因宋統天術暗藏歲實消長之法以上考下推元授時用之明大統術一從授時惟不用消長梅氏仍主授時法江氏作辨以有恒率者為平歲實均分之為恒氣者也以随時實測損益者為汎歲實準於定氣者也氣既有恒有定則歲實有平有汎宜矣此千古未明之精義今録其辨如左附江氏永歲實消長辨江氏永曰歲實消長前人多論之者勿菴先生大約主授時而亦疑其百年消長一分以乗距算其數驟變殊覺不倫又謂今現行之歲實稍大於授時其為復長亦似有據因為髙衝近冬至而歲餘漸消過冬至而復漸長之説葢存此以俟後學之深思永别為之説謂平歲實本無消長而消長之故在髙衝之行與小輪之改兩歲節氣相距近髙衝者歲實稍贏近最髙者稍朒猶定朔定望定弦之不能均惟逐節氣算其時刻分秒而消長可勿論也管見如斯遂不能强同爰引先生之言逐節疏論於下梅氏文鼎答問授時以萬分為日故其歲實三百六十五萬二千四百二十五分其數自至元辛巳歲前天正冬至積至次年壬午歲前天正冬至共得三百六十五日二十四刻二十五分若逆推前一年亦是如此此歲實之數大統與授時並同江氏永曰歲實為算法大綱領得其真確之數為難四分術以前無論已魏晉以後漸知一歲小餘不及四分日之一随時測驗一法必更一斗分不久即有差此何以故葢步天者泥履端於始之義但以歲前冬至距今年冬至計其小餘時刻併入大餘以為歲實不知冬至距冬至所得者活汎之歲實而非經恒之歲實也欲得經恒歲實宜於近春分時測之元至元時嘗測定氣春分今歲春分距來歲春分苟得真時刻則得真歲實又以前後逺年測凖之春分計其日時分秒均之各歲則歲實之恒率確矣此何也太陽因有髙卑而生盈縮近數百年間春分則平行當郭氏作律時定氣春分之時正當並行之處此以前以後雖有差亦甚㣲故所得歲實為恒率得其恒乃可以求其定猶之月必有平朔之䇿而後可求定朔也郭太史改法自言創造簡儀髙表慿所測實數考正者七事一曰冬至二曰歲餘其於歲實攷之詳矣其求冬至也自丙子年立冬後依每日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定戊寅冬至在癸夘日夜半後三十三刻己夘冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻辛巳冬至在己未日夜半後六刻後甲子日始五十五日零六刻氣應五十五萬零六百分為律元其求歲餘也自劉宋大明以來測景驗氣得冬至時刻真數者有六用以相距各得其時合用歲餘考驗四年相符不差仍自宋大明壬寅年距至今八百一十九年每歲合得三百六十五日二十四刻二十五分減大明術一十一秒其二十五分為今律歲餘合周之數愚以此二條攷之即郭氏當年所定之歲實已有㣲差稽之於史又多牴牾其可以是為消長之凖乎夫一歲小餘二十四刻二十五分積之四歲正得九十七刻無餘無欠丁丑年冬至在戊戌日夜半後八刻半則辛巳年冬至宜在己未夜半後五刻半不應有六刻如以辛巳之六刻為確也則丁丑年宜在九刻不應只有八刻半此四年既皆實測所得則已多半刻矣而云相符不差何也丁丑年之八刻半雖約取整數未必正是半刻然已有數十分矣其本法上考已往百年而長一刻四年所長甚微不應有半刻以下然則當時冬至歲實刻下之小餘不止二十五分矣又考劉宋孝武帝大明五年辛丑祖冲之所測十月十日壬戌景長一丈七寸七分半十一月二十五日丁未一丈八寸一分太二十六日戊申一丈七寸五分强以壬戌戊申景相較餘二分二釐半為實以丁未戊申景相較餘六分五釐為法以法除實得三十四刻六十分以減距日四千六百刻餘四千五百六十五刻四十分折取其日二千二百八十二刻七十分加半日刻午正測景故加半日得二千三百三十二刻七十分命壬戌算外得十一月三日乙酉夜半後三十二刻七十分劉宋都建康比元大都里差應後五十七分則大都此日冬至三十二刻一十三分至案劉宋時太陽最髙衝在冬至前幾半宫則取冬前後二十餘日之景折取中數以求冬至仍有差詳見冬至權度辰初三刻冬至大都減半刻竒大明壬寅辛丑年之十一月即壬寅歲之始下距至元辛巳八百一十九年以授時歲實積之凡二十九萬九千一百三十三日六十刻七十五分以乙酉辰初三刻距己未丑初一刻凡二十九萬九千一百三十三日九十二刻較多三十三刻而云自大明壬寅距今每歲合得此數何也如郭氏百年長一之法以八百一十九總乗所長之數則壬寅冬至甲申日七十九刻太較當時所測算者又先五十餘刻失之愈逺矣詳冬至權度又云減大明術一十一秒考祖冲之大明術紀法與周天一歲小餘二十四刻二十八分一十四秒授時減去三分一十四秒亦非一十一秒也邢士登考謂金時趙知㣲重修大明術小餘二十四分三十六秒實多授時一十一秒郭所減者趙法非祖法也其説是然則授時所定歲實猶是近似活汎之數而不可以為恒欲定經恒之歲實則西法恒年表之恒率是矣案表一歲小餘五小時三刻三分四十五秒一日二十四小時一小時四刻一刻十五分一分六十秒以分通之三百四十八分有竒以秒通之二萬九百二十五秒一日八萬六千四百秒考其實則囘囘法已如此囘囘法一歲三百六十五日歲有十二宫宫有閏日一百二十八年閏三十一日然則一歲閏一百二十八分日之三十一正西法之歲餘也以一百二十八乗二萬九百二十五得二百六十七萬八千四百以八萬六千四百除之得三十一囘囘法以春分為歲首其歲餘由累測春分得之歐邏巴法遂用之至今不易雖分下之四十五秒未必無朓朒當亦甚微矣以此平率為凖随其時之最髙衝與最髙之行而進退焉冬至近髙衝則兩歲冬至之距必多於平率今時多一分弱夏至近最髙則兩歲夏至之距必少於平率今時少一分弱猶之太陰當朔時入轉兩朔相距之日時必多當望時近月孛兩望相距之日時必少若朔時近月孛望時近入轉兩朔相望相距反是又古時太陽本輪均輪半徑之差大於今日則加減均數亦大而冬至歲實當更增至元辛巳間髙衝約與冬至同度則歲實尤大其小餘刻下之分約有三十分而授時定為二十五分宜其自丁丑至辛巳四年之間即有半刻之差而郭氏未之覺也一年少五分四年少二十分幾於半刻之半矣丁丑年之八刻半本為約略之數半刻以下固難測算真的也二以西法歲餘依授時萬分日較之只有二十四刻十一分八十七秒半少授時歲餘三分一十二秒半當時冬至為盈初小輪半徑差又大其多於平率必不止三分有竒也梅氏又曰然授時原有消長之法是其新意其法自辛巳元順推至一百年則歲實當消一分若自辛巳元逆推至一百年則歲實當長一分每相距増一百年則歲實消長各増一分以是為上考下求之凖大統諸法悉遵授時獨不用消長之法上考下求總定為三百六十五日二十四刻二十五分此其異也江氏永曰案冬至相距之歲實大於平率最髙衝有行度而小輪均數又有大小宜其歲實有消長分數然必當時測定之歲實已真確又知其無可復加而後知將來之漸消若授時歲餘刻下之二十五分尚非確數其差分已見端於丁丑辛巳四年之間則辛巳以後能必其果消乎郭太史律考正者七事創法者五事皆不數歲實消長葢未能真知所以消長之故但暗用楊忠輔統天術為活法以推往古意謂下考將來亦如是耳明大統術悉遵授時獨不用消長之法當時術官元統非有確見實測知其不當用消分也以今觀之猶幸大統不用消分冬至縱有先天尚未甚逺倘遽改二十五分為二十四分其先天不愈多乎當至元時刻下小餘約有三十分授時一歲少五分百年約先天五刻梅氏又曰歲實即一年之日數自一年以至十百年共積若干是為積日亦謂之中積假如今康熈庚午歲相距四百零九算依授時法推得積日一十四萬九千三百八十四日零一刻八十九分大統不用消長則積日為一十四萬九千三百八十四日一十八刻二十五分兩法相差一十六刻三十六分江氏永曰天行盈縮進退必以漸無驟增驟減之理郭氏百年消長一分則是百年之内皆無所差至一百零一年驟増減一分又越百年皆平差一分至二百零一年又驟增減一分豈有此數與法乎即如其法算數百年後亦當逐節計其消分積而數之不當總計當消之分而以距算總乗之也自一百一年至二百年各消一分積一百分自二百一年至三百年積消二百分併前為三百分自三百一年至四百年積消三百分併前為六百分又自四百一年至四百九年積消三十六分併前總消六百三十六分為六刻三十六分若如郭氏總計消分以乗距算之法遂消去一十六刻三十六分較差一十刻而先天愈多矣此分算總算兩者皆不成法而總算尤為無理如大統厯康熈庚午冬至癸夘日夘初三刻授時則丑初三刻查時憲書乃是巳初一刻大統授時用消分不用消分均無當天行何哉當年所測歲實刻下小餘其數不真故也嵗實已弱矣而又消之安得不先天乎使當年改二十五分為三十分由辛巳以後漸而消之或庶幾耳曰至元歲餘若果二十四刻三十分則上考當長乎消乎曰上考亦消也葢至元時髙衝與冬至同度小輪均數又大故冬至歲實為長極之時而上考下考皆當消但消於三十分之内非消於二十五分之内也今時髙衝在冬至後七八度小輪又漸小冬至歲餘以萬分日計之約二十四刻二十八九分之間劉宋大明時髙衝在冬至前半宫以祖冲之紀法除其歲周當時歲實三百六十五日二十四刻二十八分一十四秒可見至元前後皆消于三十分之内其消甚遅約四百餘年始消一分葢小輪均數在初宫有若平差故也至一宫以外則漸疾矣若以春分平歲實相較則冬至歲實上下數千年皆在長限之中而至元時尤為長之極必俟髙衝行至春分則冬至歲實始平如今之春分又數千年髙衝行至夏至最髙行至冬至則冬至歲實始為消之極耳如今之夏至然冬至嵗實消則春分歲實長冬至歲實消之極則夏至歲實又為長之極矣抑今日本輪差小古時差大則消長中復有消長茍知此理則後之推步者但随時測髙衝之行與小輪之差以算定氣而歲實消長俱可勿論猶之太陰但實算定朔定望定弦不必復計此月與彼月多於朔䇿幾何少於朔䇿幾何也梅氏又曰問歲實既有一定之數授時何以有消長之法曰此非授時新法而宋統天之法然亦非統天億創之法而合古今累代之法而為之者也江氏永曰統天術宋寧宗時楊忠輔所造其歲實與授時正同以斗分乗距差為躔差暗藏加減之法約百年加減一分零六秒弱然行之未久鮑澣之造開禧術臧元震造成天術皆增歲實改各率紛紛迄無定論云梅氏又曰古法周天三百六十五度四分度之一一歲之日亦如之故四年而增一日其後漸覺後天皆以為斗分太强因稍損之江氏永曰古法四年而增一日其術甚踈雖古斗分宜多亦約百數十年即當後天一日何以自周迄漢久而後覺曰周之法却失之先天僖公五年辛亥日南至昭公二十年己丑日南至皆先天二三日積數百年以有餘之歲實盈其所先天之數乃適得其平約在周秦間厥後猶執四分之術漸失之後天故久而後覺耳梅氏又曰自漢而晉而唐而宋每次改法必有所減以合當時實測之數故用前代之法以順推後代必至後天以斗分强也若用後代之法據近測以逆溯徃代亦必後天以斗分弱也江氏永曰漢以前之冬至非實測先後天或至二三日後漢末劉洪始覺其後天而減斗分東晉虞喜始立歲差法後秦姜岌始知以月蝕衝檢日宿度所在而劉宋之初冬至猶後天三日大明時祖冲之始詳於測景以冬至前後二十餘日之景比對取中而定冬至然後冬至日躔漸得其實猶不能盡合也故唐一行謂麟徳術已前實録所記乃依時書之非候景所得郭太史謂自大明術以來測景驗氣得冬至時刻真數者有六然則實測之能合天者亦鮮矣梅氏又曰統天術見其然故為之法以通之於歲實平行之中加一古多今少之率則于前代諸法不相乖戾而又不違於今之實測此其用法之巧也然統天術藏其數於法之中而未嘗明言消長授時則明言之今遂以為授時之法耳郭太史自述創法五端初未及此也江氏永曰授時術實暗用統天之法者也其歲餘二十四刻二十五分與統天同而上推百年長一之法亦相似故授時術議謂自魯獻公戊寅至至元辛巳冬至日名共四十九事授時法合者三十九不合者十統天不合者唯獻公戊寅與授時異餘三十八與授時同二術推冬至略相似也然而劉宋大明壬寅歲前冬至乙酉夜半後三十二刻七十分則當時祖冲之測景推算所得者縱有未確亦不甚逺當時所算約後天十六刻詳見冬至權度依授時統天法皆推甲申日戌初初刻先天甚多豈可謂大明非而授時統天是歟郭氏謂自大明以來測景驗氣得冬至時刻真數者有六用以相距既以大明壬寅之冬至為得真數之首矣及用法推算即失此至乃謂日度失常其可乎以今觀之一由授時所定歲餘本未真一由長數當漸積不當總計長分而以八百一十九距算總乗之也統天距差乗躔差減汎積失亦略同梅氏又曰然則大統術何以不用消長曰此則元統之失也當時李徳芳固已上疏争之矣然在洪武時去授時立法不過百年所減不過一分積之不過一刻故雖不用消長無甚差殊也崇正律書謂元統得之測驗竊不謂然何也元統與徳芳辯但言未變舊法不言測驗有差又其所著通軌雖便初學殊昧根宗間有更張輙違經㫖豈能於冬至加時先後一刻之間而測得真數乎江氏永曰明初李徳芳與元統争歲實消長為術家一段公案闗係有明二百餘年之法邢士登恨元統不用消分致明神宗間節氣後天九刻有竒愚有以斷之據授時歲實上考固宜有長分矣然而授時之歲餘本未確則所據以為長之端者亦未真既言每百年長一分則當以漸而長乃總計長分以乗距算則又無此算法觀其推至大明壬寅已違當時之實測又何論春秋已前乎徳芳所據者謂魯獻公十五年戊寅天正甲寅冬至依授時法推得甲寅日夜子初三刻依大統法推得己未日午正三刻己未史誤作丁巳相差四日六時五刻當用至元辛巳為元及消長之法方合天道夫魯獻公之年史有舛錯本難慿信漢志謂獻公十五年甲寅冬至此自劉歆三統術逆推當年冬至是甲寅耳豈有實測紀之信史哉而徳芳以此駁元統其無卓識可知矣然元統之不用消長也初無實據但云上考下推不用消長以合天道又云天道無端惟數可以推其機天道至妙因數可以明其理理因數顯數從理出故理數可相倚而不可相違夫既未嘗實測而慿虚以言天道言理數宜其不能服徳芳也今日數學大明由後觀之前此二百餘年猶幸元統不用消分冬至加時先天尚未甚逺葢授時歲餘一歲約少五分自至元辛巳至洪武甲子一百零三年固已先天五刻矣使大統減一分又越百年二百年而更減之先天不愈多乎邢士登謂明神宗間大統術後天九刻此非有所測驗但據用消分與不用消分積算如此豈知明法皆失之先天乎觀前所舉康熈庚午年時憲書癸夘日巳初一刻冬至依大統算夘初三刻則先天一十四刻若依授時算丑初三刻則先天三十刻自辛酉溯戊辰五十餘年約減二三刻則戊辰以前大統率先天十一二刻若用授時法先天遂至二十七八刻矣此豈可厚非大統乎梅氏又曰然則消長必不可廢乎曰上古則不可知矣若春秋之日南至固可考據而唐宋諸家之實測有據者史冊亦具存也今以消長之法求之其數皆合若以大統法求之則皆後天而於春秋且差三日矣安可廢乎江氏永曰春秋算法最踈置閏或踈或宻日食或不在朔則步冬至違天可知僖公五年丙寅正月辛亥朔日南至以今法推此年平冬至乙夘日巳時定冬至在甲寅即令此時小輪均數大能使定氣移前一日半亦不過癸丑日之夜刻辛亥實先天二三日且定朔壬子亦非辛亥也昭公二十年己夘二月己丑日南至以今法推此年平冬至壬辰定冬至辛夘當時推己丑亦先天二日且己丑為此年正月朔安得為二月也授時推僖五年冬至以歲餘長十九分乗距算一千九百三十五加於中積得辛亥日寅初二刻是以總長分數乗距算而非積漸而長亦因傳有辛亥日南至之文强為此算以求合不知辛亥非實測也唐一行謂僖公登觀臺以望而書雲物出於表晷天驗非時史億度愚謂傅言書雲未嘗言測景其推昭二十年冬至以十八乗距算一千八百零二則不得己丑而得戊子日戌初三刻其先天愈甚矣此二事一合一否皆不足為據且既能上合一千九百餘年之冬至矣何以劉宋元嘉丙子十一月甲戌景長而推癸酉大明辛丑十一月乙酉冬至即壬寅天正冬至而推丙申此二事皆八百餘年反先天一日豈非總分乗距算之法非法故失之乎梅氏又曰然則統天授時之法同乎曰亦不同也統天逐年迭差而授時消長之分以百年為限則授時之法又不如統天矣江氏永曰統天以距差乗躔差其失亦與授時等由其根數未確梅氏又曰夫必百年而消長一分未嘗不是乃以乗距算其數驟變殊覺不倫鄭世子黄鐘推法所以有所酌改也江氏永曰授時之誤勿菴先生亦既覺之矣抑不唯如此而已年愈逺則失愈甚如推至春秋時一千九百年則歲餘二十四刻四十四分若一千九百零一年歲餘增一分此一分乗距算一千九百零一前一歲忽增一十九刻有竒則歲實有三百六十五日四十三刻有竒豈不甚可笑乎况又有逺於此者乎梅氏又曰問歲實消長之法既通于古亦宜合于今乃今實測之家又以為消極而長其説安在豈亦有所以然之故與曰授時雖承統天之法而用消長但以推之舊法而合耳初未嘗深言其故也惟新書則為之説曰歲實漸消者由日輪之轂漸近地心也余嘗竊疑其説今具論之夫西法以日天與地不同心疏盈縮加減之理其所謂加減皆加減於天周三百六十度之中非有所增損於其外也如最髙則視行見小而有所減最卑則視行見大而有所加加度則減時矣減度則加時矣然皆以最卑之所減補最髙之所加及其加減既周則其總數適合平行畧無餘欠也若果日輪之轂漸近地心不過其加減之數漸平耳加之數漸平則減之數亦漸平其為遅速相補而歸于平行一也豈有日輪心逺地心之時則加之數多而減之數少日輪心近地心時則減之數少而加之數多乎必不然矣江氏永曰冬至相距之日時古今有多少不過汎歲實與平歲實相差其相差又有舒疾之漸耳若知冬至有平有定本必不言消長必欲言其消長則其故有二一由髙衝離冬至有逺近一由日小輪古今有大小也髙衝自秋分行至冬至此三宫定冬至皆在平冬至前自冬至行至春分此三宫定冬至皆在平冬至後總此六宫上下約萬年以今時最髙衝行約之皆在長限以其冬至汎歲實皆多於平歲實故也惟髙衝正當秋分春分此兩歲歲實皆平即西法三百六十五日五小時四十八分四十五秒是也離此則漸有差前三宫由平而漸增多是為長中之長至髙衝與冬至同度則定冬至與平冬至同日同時是為長之極當郭太史定法正其時也後三宫由極多而漸減以至於平是為長中之消今時髙衝在冬至後八度其消尚未多也若髙衝過春分而行至夏至此三宫定冬至亦在平冬至後自夏至行至秋分此三宫定冬至又在平冬至前總此六宫亦約萬年皆在消限以其冬至汎歲實此少於平歲實故也前三宫由平而漸減是皆消中之消至髙衝與夏至同度則定冬至亦與平冬至同日同時是為消之極後三宫由極少而漸増以至於平是為消中之長此通髙衝行一周天而總論其消長也然而太陽兩小輪半徑三千五百八十四古多而今少多則小輪稍大日躔加減均亦稍大小則小輪稍小加減均亦稍小髙衝之行一年一分一秒十㣲西士後測此一分一秒十㣲若在均數稍大之中則度分變為時分之秒數以加減於平時者必稍多若在均數稍小之中則度分變為時分之秒數以加減於平時者必稍少如崇禎戊辰所立之加減差表初宫之初度十一宫之末度每一十分均數二十二秒髙衝一年行一分一秒十㣲約均數二秒有竒此二秒有竒變為時約五十七秒以加于平歲餘五小時三分四十五秒得五小時四分四十二秒如小輪稍大則初度一十分之均不止二十二秒而一歲髙衝之行不止得均二秒有竒其變時亦不止五十七秒矣如小輪稍小則初度十分不及二十二秒髙衝之行得均數不及二秒則變時亦不及五十七秒矣此略舉初度之均以為例其他可類推古今小輪之大小雖不可盡知以劉宋元嘉大明間屢年之實測算當時之不同心差葢四千有竒詳冬至權度則均數必稍强至元時授時術冬至盈初如分多於今日之加分則當時小輪半徑不止三千五百八十四自此以後至今日小輪漸小均數亦漸少髙衝行度所得之均數以減度加時者亦稍弱焉此又因輪轂漸近地心而微有消分也梅氏又曰又考日躔表彼固原未有消長之説日躔指言平歲用授時消分定歲則用最髙差及查恒年表之用則又只用平率是其説未有所決也江氏永曰術書非出一手故有不相應處其歲實平率出囘法囘法得之實測春分此術書最𦂳要處惜未明白剖析其日躔表説辨論從前言消長者之非則固有定説矣但小餘㣲有不同耳術書平嵗實小餘五小時三刻三分四十五秒以萬分通之是二四二一八七五也今考成亦用之而日躔表説二四二一八八六四較多一一四梅氏又曰術書言日輪漸近地心數千年後將合為一㸃若前之漸消由于兩心之漸近則今之消極而長兩心亦將由近極而逺數千年後又安能合為一㸃乎彼葢見授時消分有據而姑為此説非能極論夫消長之故者也江氏永曰七政皆有小輪獨日之小輪有改變竊意久亦必復豈有與地心合為一㸃之理自至元辛巳以後正是長極而消非消極而長也或曰今實測之冬至後於授時之中積分明是長而以為消何也曰前巳言之矣授時歲餘刻下之分當有三十分而郭氏定為二十五分也授時之歲實豈非出於實測然因其自述丁丑辛巳四年冬至得其自相乖違之處因以知至元時為長極而消之大界與日躔加減表十一宫末度以前均數漸減之理固相符也梅氏又曰然則將何以求其故曰授時以前之漸消既徴之經史而信矣而今現行之歲實又稍大於授時其為復長亦似有據竊考西法最髙卑今定於二至後七度依永年法每年行一分有竒則授時立法之時最髙卑正與二至同度而前此則在至前過此則在至後豈非髙衝漸近冬至而歲餘漸消及其過冬至而東久復漸長乎余觀七政書於康熈庚申年移改最髙卑度弱而其年歲實驟増一刻半强此亦一徵也存此以俟後之知法者江氏永曰歲實消長之故一由最髙衝之有行度先生因最髙改移歲實驟增而悟及此猶云存之以俟知者亦欲後人由此致思也然其所言消長若與實算相反何也日躔加減表初宫與十一宫同均而加減異號至元辛巳以前髙衝行未及冬至則用初宫之均度分秒加度而減時辛巳以後髙衝行已過冬至則用十一宫之均度分秒減度而加時前減時則定冬至在平冬至前後加時則定冬至在平冬至後初宫之初度與十一宫之末度其均最大則一歲髙衝之行所得均數最多變為時以加減於平時者亦最多故此處歲實極大皆最長之時也初宫若離初度稍逺則均漸少而變時以減平時者亦稍少歲實亦稍減矣十一宫若離末度稍逺則均漸少而變時以加平時者亦稍少歲實亦稍減矣故髙衝行漸近冬至其均由少而多歲實正漸增以至於極也而此謂歲餘漸消髙衝已過冬至其均由多而少歲實則由極少以漸減也而此謂復漸長豈非與實算相反乎葢先生論消長不主平歲實為根耳梅氏又曰王寅旭曰歲實消長其説不一謂由日輪之轂漸近地心其數浸消者非也日輪漸近則兩心差及所生均數亦異以論定歲誠有損益若平率歲實尚未及均數則消長之源與兩心差何與乎識者欲以黄赤極相距逺近求歲差朓朒與星歲相較為節氣消長終始循環之法夫距度既殊則分至諸限亦宜随易用求差數其理始全然必有平歲之歲差而後有朓朒之歲差有一定之歲實而後有消長之歲實以有定者紀共常以無定者通其變始可以永久而無弊江氏永曰古今言歲實消長者皆從冬至歲實言之非論平率歲實也因兩心差及所生均數異而定氣㣲有損益是亦消長之一根不可謂其無與若黄赤極相距逺近求差數此説恐未然其言有平歲之歲差而後有朓朒之歲差有一定之歲實而後有消長之歲實此數言極中肻綮一定之歲實從春分測定之平歲實是也苟知此則但言平冬至定冬至不必言消長亦可矣梅氏又曰寅旭此論是欲據黄赤之漸近以為歲實漸消之根葢見西測黄赤之緯古大今小今又覺稍贏故斷以為消極後長之故然黄赤逺近其差在緯歲實消長具差在經似非一根又西測距緯復贏者彼固自疑其前測最小數之未真則亦難為確據愚則以中法歲實起冬至而消極之時髙衝與冬至同度髙衝離至而歲實亦増以經度求經差似較親切江氏永曰經緯之辨最確而謂髙衝與冬至同度為消極之時永已論之於前梅氏又曰日行盈縮細考之則春分距夏至夏至距秋分雖皆縮算而其縮亦不同秋分距冬至冬至距春分雖皆盈算而其盈亦不同又且年年不同細求之則節節不同又細求之且日日不同矣其故何也葢最髙一㸃不在夏至而在其後數度又且年年移動此太陽盈縮之根而歲實所以有消長也江氏永曰以太陽盈縮之根推歲實所以有消長此先生之定見定説也梅氏又曰庚申年夏至至冬至一百八十三日十三刻六分辛未年夏至至冬至一百八十三日十四刻九分十二年中共長一刻三分壬戌年冬至至次年夏至一百八十二日九刻九分庚午年冬至至次年夏至一百八十二日八刻十分九年中共消十四分又合計癸亥夏至至前半周一百八十二日九刻九分冬至前半周一百八十三日十三刻十分相較一日四刻一分辛未夏至前半周一百八十二日八刻十分冬至前半周一百八十三日十四刻九分相較一日五刻十四分八年中較數増一刻十三分江氏永曰此以半年之氣前後相較驗最髙之東移若以兩歲冬至春分夏至秋分及各節氣兩歲相距皆各有其歲實而冬至為最大夏至為最小春秋分為近平又越數十年而諸歲實亦㣲有不同矣前代只知冬至歲實不知逐節氣皆有歲實也梅氏又曰然二分之相距則無甚差何也葢最髙移而東則夏至後多占最髙之度而減度加時之數益多故益長髙衝移而東則冬至後多占最卑之度而加度減時之數益多故益消其近二至處皆為加減差最大之處故消長之較已極也乃若二分與中距雖亦歲移而中距皆為平度不係加減其最髙前後視行小之度固全在春分後半周最髙衝前後視行大之度亦全在春分後半周毫無移動故無甚消長也江氏永曰二分無甚差故欲得平歲實須於近二分時測之若髙衝行至春分則二分之距又最大而二至反平矣梅氏又曰授時消分為不易之法今復有長者何耶西法最髙卑之㸃在兩至後數度歲歲東移故雖冬至亦有加減不得以恒為定也此是西法中一大節目其法自囘囘即有之然了凡先生頗采用囘囘法而不知此熊䃪石先生親與西儒論法而亦不言及何耶江氏永曰最髙卑之有行度誠西法中一大節目袁氏新書不知有最髙卑又何以能較論前代諸法之先後天乎梅氏又曰袁了凡新書通囘囘之立成於大統可謂苦心然竟削去最髙之算又直用大統之歲餘而棄授時之消長将逆推數百年已不效况數千萬年之久乎江氏永曰袁書逆推數百年已不效誠然若棄授時之消長則無足論授時本非不刋之法也今時用考成推步只有求天正冬至與求定冬至之法而不言消長紛紛之論可定矣觀承案法以疎而漸宻測以久而益精勿庵之術兼統中西誠為冠絶古今而江氏此篇推之更宻測之益精能補勿庵之所未備者其為青氷之出矣乎右歲實五禮通考卷一百八十六
