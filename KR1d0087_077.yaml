body:
  text: 五禮通考卷六十七刑部尚書秦蕙田撰吉禮六十七宗廟制度易繫辭黃帝堯舜垂衣裳而天下治蓋取諸乾坤注垂衣裳以辨貴賤乾尊坤卑之義也書益稷帝曰余欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施於五色作服汝明傳欲觀示法象之服制日月星為三辰華象草采華蟲雉也畫三辰山龍華蟲於衣服旌旗會五也以五采成此畫焉宗廟彜樽亦以山龍華蟲為飾藻水草有文者火為火字粉若粟冰米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡天子服日月而下諸侯自龍衮而下至黼黻士服藻火大夫加粉米上得兼下下不得僭上以五采明施於五色作尊卑之服汝明制之疏易繫辭云黃帝堯舜垂衣裳而天下治象物制服蓋因黃帝以還未知何代而具采章舜言已欲觀古知在舜之前耳日月星為三辰辰即時也三者皆是示人時節故並稱辰焉周禮大宗伯云實柴祀日月星辰鄭玄云星謂五緯也辰謂日月所會十二次也星辰異者彼鄭以遍祭天之諸神十二次亦當祭之故令神與星别此云畫之於衣日月合宿之辰非有形容可畫且左傳云三辰即日月星也草木雖皆有華而草華為美故云華象草華蟲雉也周禮司服有鷩冕鷩則雉焉雉五色象草華也月令五時皆云其蟲蟲是鳥獸之總名也下云作服汝明蓋知畫三辰山龍華蟲於衣服也又言旌旗者左傳言三辰旗旗周禮司常云日月為常三者禮有沿革後因於前故知舜時三辰亦畫之於旌旗也下傳云天子服日月而下則三辰畫之於衣服又畫於旌旗也周禮司服云享先王則衮冕衮者卷也言龍首卷然以衮為名則所畫自龍以下無日月星也郊特牲云祭之日王被衮冕以象天也又曰龍章而設日月以象天也鄭玄云謂有日月星辰之章設日月畫於衣服旌旗也據此記文衮冕之服亦畫日月鄭注禮記言特牲所云謂魯禮也要其文稱王被服衮冕非魯事也或當三代天子衣上亦畫三辰自龍章為首而使衮統名耳禮文殘缺不可得詳但如孔解舜時天子之衣畫日月耳鄭玄亦以為然王肅以為舜時三辰即畫於旌旗不在衣也天子山龍華蟲耳會者合聚之名下云以五采彰施於五色作服知會謂五色也禮衣畫而裳繡五色備謂之繡知畫亦備五色故云以五采成此畫焉謂畫之於衣宗彛文承作會之下故云宗廟彛樽亦以山龍華蟲為飾知不以日月星為飾者孔以三辰之尊不宜施於器物也周禮有山罍龍勺雞彜鳥彜以類言之知彛樽以山龍華蟲為飾亦畫之以為飾也周禮彛器所云犧象雞鳥者鄭玄皆為畫飾與孔意同也周禮彛器無山龍華蟲為飾者帝王革易所尚不同故有異也詩云魚在在藻是藻為水草草類多矣獨取此草者謂此草有文故也火為火字謂刺繡為火字也考工記云火以圜鄭司農云謂圜形似火也鄭玄云形如半環然記後人所作何必能得其真今之服章繡為火字者如孔所説也粉若粟氷者粉之在粟其狀如氷米若聚米者刺繡為文類聚米形也黼若斧形考工記云白與黑謂之黼釋器云斧謂之黼孫炎云黼文如斧形蓋半白半黑似斧刃白而身黑黻謂兩已相背謂刺繡為已字兩已字相背也考工記云黑與青謂之黻刺繡為兩已字以青黑線繡也詩葛覃云為絺為綌是絺用葛也玊藻云浴用二巾上絺下綌曲禮云為天子削瓜者副之巾以絺為國君者華之巾以綌皆以絺貴而綌賤是絺精而綌粗故葛之精者曰絺五色備謂之繡考工記文也計此所陳皆述祭服祭服玄纁為之後代無用絺者蓋於時仍質暑月染絺為纁而繡之以為祭服孔以華象草華蟲雉則合華蟲為一周禮鄭玄注亦然則以日月星辰山龍華蟲六章畫於衣也藻火粉米黼黻六章繡於裳也天之大數不過十二故王者制作皆以十二象天也顧氏取先儒等説以為日月星取其照臨山取能興雲雨龍取變化無方華取文章雉取耿介顧氏雖以華蟲為二其取象則同又云藻取有文火取炎上粉取潔白米取能養黼取能斷黻取善惡相背鄭玄云會讀為繪宗彛謂宗廟之鬱鬯樽也故虞夏以上蓋取虎彛蜼彛而已粉米白米也絺讀為黹黹紩也自日月至黼黻凡十二章天子以飾祭服凡畫者為繪刺者為繡此繡與繪各有六衣用繪裳用繡至周而變之以三辰為旗旗謂龍為衮宗彛為毳或損益上下更其等差鄭意以華蟲為一粉米為一加宗彛謂虎蜼也周禮宗廟彛器有虎彛蜼彛故以宗彛謂虎蜼也此經所云凡十二章日也月也星也山也龍也華蟲也六者畫以作繪施於衣也宗彛也藻也火也粉米也黼也黻也此六者紩以為繡施之於裳也鄭玄云至周而變易之損益上下更其等差周禮司服之注具引此文乃云此古天子冕服十二章也王者相變至周而以日月星畫於旌旗冕服九章登龍於山登火於宗彛尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彛皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻以絺為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎雉謂宗彛也其衣三章裳二章凡五也是鄭以冕服之名皆取章首為義衮冕九章以龍為首龍首卷然故以衮為名鷩冕七章華蟲為首華蟲即鷩雉也毳冕五章虎蜼為首虎雉毛淺毳是亂毛故以毳為名如鄭此解配文甚便於絺繡之義總為消帖但解宗彛為虎蜼取理太回未知所説誰得經旨此言作服汝明故傳辨其等差天子服日月而下十二章諸侯自龍衮而下至黼黻八章再言而下明天子諸侯皆至黼黻也士服藻火二章大夫加粉米四章孔注上篇五服謂天子諸侯卿大夫士則卿與大夫不同當加之以黼黻為六章孔略而不言孔意蓋以周禮制諸侯有三等之服此諸侯同八章者上古朴質諸侯俱南面之尊故合三為一等且禮諸侯多同為一等故雜記云天子九虞諸侯七虞左傳云天子七月而葬諸侯五月而葬是也孔以此經上句日月星辰山龍華蟲尊者在上下句藻火粉米黼黻尊者在下黼黻尊於粉米粉米尊於藻火故從上以尊卑差之士服藻火大夫加以粉米并藻火為四章馬融不見孔傳其注亦以為然以古有此言相傳為説也蓋以衣在上為陽陽統於上故所尊在先裳在下為隂隂統於下故所重在後詩稱玄衮及黼顧命云麻冕黼裳當以黼為裳故首舉黼以言其事如孔説也天子諸侯下至黼黻大夫粉米兼服藻火是上得兼下也士不得服粉米大夫不得服黼黻是下不得僭上也訓彰為明以五種之玄明制于五色作尊卑之服汝當分明制之令其勿使僭濫也鄭玄云牲曰采施曰色以本性施於繪帛故云以五采施於五色也鄭云作服者此十二章為五服天子備有焉公自山龍而下侯伯自華蟲而下子男自藻火而下卿大夫自粉米而下亦是以意説也此云作服惟據衣服所以經有宗彛及孔云旌旗亦以山龍華蟲為飾者但此雖以服為主上既云古人之象則法象分在器物皆悉明之非止衣服而已旌旗器物皆是采飾彼服以明尊卑故總云作服以結之蕙田案服章之見於經者始此傳惟釋宗彛亦以山龍華蟲為飾與康成不同先儒多不以為然疏釋天子衮冕十二章并採鄭氏郊特牲之注謂周衮冕之服亦畫三辰是孔之意直以鄭判三辰於旗而天子服止九章之説為不然特未敢顯背之而曰禮文殘缺不可得詳耳周禮考工記畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次也赤與黑相次也玄與黃相次也注此言畫繢六色取象及布采之次第繢以為衣繢疏畫繢並言者言畫是總語以其繢繡皆須畫之言則舉對方而言自東方以下是也自言東方謂之青至謂之黃六者先舉六方有六色之事青與白相次以下論繢於衣為對方之法也鄭氏鍔曰其色之别有六畫繢之事獨以五色為言何也蓋玄之與黑皆北方之色黑者隂之正北方者萬物歸根復命之地而純隂之所聚也乃取其正者以名之然亦可謂之玄焉自其辨而言之則玄淺而黑深自其體而言之初不甚相逺也然則畫玄黑者殆難辨也故特以雜五色言焉青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡注此言刺繡采所用繡以為裳疏此一經皆比方為繡次凡繡亦須畫乃刺之故畫繡二工共其職也鄭氏鍔曰黼畫為斧形斧之為物能斷制也非義則不能斷白與黑謂之黼者唯義唯智然後斷故也王巾皆黼王位設黼依皆取諸此而已矣此白黑所以謂之黼也黻兩己相背相背所以見其辨也黻衣繡裳以賜諸侯亦取諸此而已此黑青所以謂之黻也項氏安世曰青以白次赤以黑次玄以黃次此六色之相配者繢之以為衣青以赤繼赤以白繼白以黑繼黑以青繼此五色之相生者繡之以為裳陳氏澔曰繪事則青白赤黑玄黃而對方繡事則青赤赤白白黑黑青而比方何也繪陽事也陽則尊而不親故對方而不比繡隂事也隂則親而不尊故比方而不對土以黃其象方天時變注古人之畫無天地也為此記者見時有之耳鄭司農云天時變謂畫天隨四時色鄭氏鍔曰土者地也黃者地之中色故畫以黃地道成矩唯矩則方故畫地之形則以方惟天以一氣運而為四時四時之色春則為青夏則為赤秋則為白冬則為黑故畫天則隨時而變其色火以圜注鄭司農云為圜形似火也玄謂形如半環然在裳疏孔安國以為火字與此别也山以章注章讀為獐獐山物也在衣齊人謂麇為獐趙氏溥曰鄭改章作獐是山中物對下水以龍此未是蓋章是山之草木星辰天之章草木地之章畫山雖有形須畫出草木之文而成章王解引爾雅釋山曰上正章謂畫山雖畫其章亦必畫其上正之形謂畫一座山上頭尖要正當亦不必如此説蕙田案山以章其義本難解鄭氏改章為獐似無理山之禽獸何獨獐也趙氏以章為山之草木理則通矣然亦無據案爾雅釋山有曰上正章郭氏云山上平又邢氏上正章丘疏曰章亦平也王氏據以解此以上文火以圜例之為近是但畫山為平於義終未安竊意上文曰赤與白謂之章蓋山多石者其色近赤或以畫山之色赤白為章似稍有據觀承案赤白為章雖似有據然以此畫山之色恐無此形象不如姑以草木為地之章從趙氏説較穩不然則以章字對上火以圜二字只活看亦可蓋火雖炳爍不過摹作圜形山則青翠秀蔚千彚萬狀天地之文章莫過於是水以龍注龍水物在衣畫疏龍水物畫水者并龍趙氏溥曰龍水中神物畫水不畫龍則無以見變化之神蕙田案龍冕服九章之所有也水以龍者左傳曰龍水物也不能離水而立故畫龍者兼畫水猶後世之畫龍者必以雲耳疏及趙氏謂畫水必以龍誤矣古人未聞畫水而必以龍者且於此文之義亦無當也鳥獸蛇注所謂華蟲也在衣蟲之毛鱗有文采者言疏華言蟲者是有生之總號言鳥以其有翼獸以其有毛言蛇以其有鱗以首似鷩亦謂之鷩冕也故云蟲之毛鱗有文采也虞書有十二章於此唯言四章又兼言天地而不云日月星藻與宗彜者記人之言略説之耳鄭氏鍔曰是三物者有於旌旗而畫之有於衣服而畫之不畫言所取象之物者殆舉其一以見其二之意王氏昭禹曰古之畫繢之事以見於衣服車旗宮室器械之間者其為象豈一端而已仰以觀天之文俯以察地之理近取諸身逺取諸物或象其形與其性或象其色與其用道德之義性命之理皆寓於中將使天下之人目擊心喻而得乎不説之大法土以黃則象其色也其象方則象其形也天時變則象其用也火以闤則象其性也至於山以章水以龍鳥獸蛇之類亦皆象其形也春秋昭公二十五年左氏傳為九文六采五章以奉五色疏尚書益稷之文解者多有異説孔安國言日也月也星辰也山也龍也華也蟲也七者畫於衣服旌旗山龍華蟲四者亦畫於宗廟彛器藻也火也粉也米也黼也黻也六者繡之於裳如此數之則十三章矣天之大數不過十二若為十三無所法象或以為孔并華蟲為一其言華象草華蟲雉者言象草華之蟲故為雉也若華别似草安知蟲為雉乎未知孔意必然以否鄭玄讀會為繢謂畫也絺謂繡謂刺也宗彛謂虎蜼也周禮宗廟彛器有虎彛蜼彛故以宗彛名虎蜼也周禮有衮冕鷩冕毳冕其衮鷩毳者各是其服章首所畫舉其首章以名服耳如鄭此言則於尚書之文其章不次故於周禮之注具分辨之鄭於司服之注具引尚書之文乃云此古天子冕服十二章王者相變至周而以日月星辰畫於旌旗杜之此注亦以日月星辰畫於旌旗華若草華而不言蟲則華蟲各為一也粉米若白米是粉米共為一也世本云胡曹作冕注云胡曹黃帝臣也繫辭云黃帝堯舜垂衣裳而天下治蓋取諸乾坤則冕服起於黃帝也加飾起自唐虞即書云豫欲觀古人之象云云是也所以衣服畫日月星等者象王者之德昭臨天下如三光之耀也山體鎮重象王者之德鎮重安靜四方又能潤益含靈如山興雲致雨也龍者水物也象王者之德流通無塞如水利蒼生又龍舒卷變化無方象人君有無方之德也華蟲即鷩雉雉有文章表王者有文章之德也宗彛彛常也宗廟之常器有六彛今唯取虎蜼者虎取毛淺而有威蜼取毛深而有知以表王者有深淺之知威猛之德也藻者水草是鮮潔之物生於清水能隨短長象王者之德氷清玉潔隨機應物隨民設教不肅而成也火者火性炎上用表王者之德能使率土羣黎向歸上命也粉米者米能濟人之命表王者有濟養之德也黼白與黑形若斧斧能裁斷以象王者有裁斷之德也黻之言戾戾背也黑與青謂之黻作兩己字相背象王者能綏化兆民能使向已背惡以從善故為黻也日之質赤月星之質白山作獐考工記云山以獐也龍為騰躍之形蜼爾雅云卬鼻而長尾郭璞云似獮猴而大也章次如此者王者與天地合其德日月星天用昭明日最為盛所以居先月星光劣其次之也上以象天下宜法地地之形勢莫大於山故次三光也龍為水物水出於山故次之也華蟲象於禮樂文章以禮樂文章潤於萬物故以次龍也宗彛所以次華蟲者言王者既有禮樂須威知乃行無威則民不畏無知則教不成故以次也藻所以次宗彛者王者威知之德隨世而應故以次也火者言王者有德必向歸仰之如火向上故次之也米所以次火者民既歸王王須濟活濟活之理得米為生故次之也黼所以次米者言王者能濟活兆民宜裁斷合理如斧之斷決故以次之黻所以次黼者王既裁斷得所善惡各有分宜人皆背惡從善故以次之六采謂繢畫五色謂刺繡故令色采之文異耳鄭注尚書性曰采施曰色性色聲三事色居其中故杜言集此五章以奉成五色之用也禮記禮運五色六章十二衣還相為質也注五色六章畫繢事也疏云五色謂青赤黃白黑據五方也六章者兼天玄也以玄黑為同色則五中通玄繢以對五方則為六色為六章也為十二月之衣各以色為質故云還相為質爾雅釋言黼黻彰也衮黻也注衮衣有黻文但疏小雅采菽云玄衮及黼衮必兼有黼黻詩言及黼嫌於無黻故此釋之大戴禮五帝德黃帝黼黻衣大帶黼裳家語黃帝始垂衣裳作黼黻陳氏禮書冕服之作尚矣書稱曰豫欲觀古人之象作服日月星辰山龍華蟲作繪宗彛藻火粉米黼黻絺繡則黼黻而上象服也象服有冕禮記曰有虞氏皇而祭夏后氏收而祭商人冔而祭周人冕而祭則皇收而下皆冕也孔子稱禹致美乎黻冕書稱伊尹以冕服奉嗣王詩稱商之孫子常服黼冔則夏商服章蓋與古同矣古之服章十有二日月星辰在天成象者也山龍華蟲虎蜼藻火粉米黼黻在地成形者也在天成象者道之運乎上在地成形者道之散乎下道固始終於東北故山龍而降始山終黻莫不有序何則山居東北冬春交也龍春也華蟲夏也虎秋也蜼冬也周而復始則藻春也火夏也粉米中央也黼秋冬交也黻冬春交也龍與華蟲陽之陽也故繪而在衣虎與蜼陽之隂也故繡而在裳詩曰玄衮及黼又曰玄衮赤舄康成謂凡冕服皆玄衣纁裳特荀卿謂天子袾裷衣冕諸侯玄裷衣冕考之於禮王之五冕皆玄冕朱裏王之始冠玄冠丹組纓聘禮釋幣玄纁束昏禮納幣亦玄纁束聘禮之簋玄被纁裏昏禮之笲緇被纁裏方相氏玄衣朱裳銘物亦緇上頳末則玄緇所以體道丹黃所以象事體道者常在上象事者常在下故易稱垂衣裳以取乾坤天玄地黃而纁赤黃色則六服皆玄衣纁裳矣荀卿天子祩裷之説豈其所傳者異耶筍卿又曰天子山冕諸侯玄冠蓋山冕即衮冕也衮冕自登龍言之也山冕本山龍言之也考工記曰火以圜山以章水以龍爾雅釋丘曰上正章丘釋山曰上正章山禮記曰龍卷然則火圜山上正而卷曲矣周禮交龍為旗覲禮天子載大旗升龍降龍衣章之飾蓋亦如此則龍之一升一降乃不為亢君德之象也司服公之服自衮冕而下如王之服則公衮亦有升龍矣康成改章為獐謂天子有升龍降龍公衮無升龍誤也司尊彛有雞彛鳥彛斚彛黃彛虎彛蜼彛明堂位曰雞彛夏后氏之尊也斚彛商尊也黃目周尊也則虎彛蜼彛為有虞以前之彛可知矣先儒謂華非蟲粉非米宗彛有山龍華蟲之飾而服無宗彛之文山龍至華蟲尊者在上藻火至黼黻尊者在下皆臆論也五色備為繡葛之精者為絺孔頴逹申安國之傳謂古者尚質絺纁而繡之以為祭服後代無用絺者此説是也康成讀絺為黹豈非溺於後代以疑古歟史記亦曰舜被絺衣鼓琴又曰衣之所畫蓋五星與十二次也若旗則畫日月北斗七星而已故禮記言招搖在上穆天子傳稱天子葬盛姬建日月七星山古者衣韍尊圭楶皆有山飾考工記曰山以章荀卿曰天子山冕諸侯玄冠書大傳曰山龍青也龍古者衣韍旗旃儀禮有龍旃簨虞盾輴勺帷大記有龍輴皆飾以龍周禮曰交龍為旗覲禮曰升龍降龍爾雅曰升白龍於縿曲禮曰左青龍書大傳曰山龍青也龍有升降白者升於襂則青者降矣白隂而升青陽而降此交泰之道也許慎曰卷龍繡於下幅一龍蟠阿上鄉然龍繪於上幅非繡於下幅慎之説誤矣華蟲翟也翟不特施於王服而后之車服亦有焉所謂褘翟揄翟闕翟重翟厭翟是也不特后之車服而舞與喪禮亦用焉書與周禮言羽舞詩言秉翟大記言揄絞是也孔安國顧氏以華蟲為二章非是宗彛書曰班宗彛作分器周禮大約劑書於宗彛則宗彛宗廟之彛也先王致孝有尊有彛而衣特以彛為章者以虎蜼在焉故也書謂之宗彛周禮謂之毳冕康成頴達之徒謂毳畫虎蜼因號虎蜼為宗彛其實虎蜼而已此説非也書大傳曰宗彛白蓋宗彛白而虎蜼各象其色耳鄭司農以毳為罽孔安國謂宗彛亦以山龍華蟲為飾皆臆論也藻水草也施於衣與梲而已冕旒與玊繅亦曰藻皆取其文而且潔也書大傳曰藻火赤鄭氏釋巾車曰藻水草蒼色今藻色兼蒼赤蓋伏鄭各舉其一偏耳火左傳曰火龍黼黻昭其文也大記曰火三列明堂位曰殷火周龍章則火之所施多矣考工記曰火以圜鄭司農曰圜形如火鄭康成曰形如半環是也大傳曰火赤孔安國謂火為火字其説與考工記不合粉米鄭氏以粉米為一章則粉其米也粉其米散利養人之義也孔安國曰粉若粟氷米若聚米顧氏曰粉取潔白米取能養然粉亦米為之一物而為二章與章不類其説非也黼考工記曰白與黑謂之黼黼即斧也刃白而銎黑有剸斷之義故裘裳席巾中衣顈禪之領冒之殺覆椁之幕檀弓曰加斧於椁上飾棺用焉黻考工記曰黑與青謂之黻施於衣與荒翣見大記其文兩已相戾蓋左青而右黑此相辨之義也黻亦作揣茀而韍亦作黻左傳曰火龍黼黻昭其文也又曰衮冕黻珽昭其度也則黻珽之黻乃韍也白虎通曰黻譬君臣可否相濟見善改惡賈公彥曰黻取臣民背惡向善蕙田案陳氏駁先儒之説多是又案以上服章禮記王制有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭注皇冕屬也畫羽飾焉凡冕屬其服皆玄上纁下有虞氏十二章周九章夏殷未聞儀禮士冠禮記周辨殷冔夏收注辨名出于槃大也言所以自光大也冔名出于幠幠覆也言所以自覆飾也收言所以收斂髮也齊所服而祭也其制之異未聞三王共皮辨素積注質不變同疏欲見此是三代之冠百王之無别代之稱也禮記郊特牲周辨殷冔夏收三王共皮辨素積注周辨殷冔夏收齊所服而祭也三王共皮辨案積不易於先代方氏慤曰皮辨則以白鹿皮為之素積則以素為裳言裳則衣可知裳必疊幅故謂之積揚雄所謂襞幅為裳是已世本黃帝作冕服史記放勳黃收純衣論語惡衣服而致美乎黻冕注孔曰損其常服以盛祭服疏鄭注此云黻是祭服之衣冕其冠也左傳晉侯以黻冕命士會亦當然也黻蔽膝也祭服謂之黻其他謂之韠俱以韋為之制同而色異韠各從裳色黻其色皆赤尊卑以深淺為異天子純朱諸侯黃朱大夫赤而已大夫以上冕服悉皆有黻故禹言黻冕左傳亦言黻冕但冕服自有尊卑耳左傳士會黻冕當是希冕也此禹之黻冕則六冕皆是也詩大雅文王常服黼冔注黼白與黑也冔殷冠也夏后氏曰收周曰冕何氏楷曰蔡雍云冕冠周曰爵辨殷曰冔夏曰收皆以三十升漆布為殼廣八寸長尺二寸加爵冕其上周黑而赤如爵頭之色前小後大殷黑而微白前大後小夏純黑而赤前小後大皆有收以持笄陳氏禮書世本云黃帝造冕史記云堯黃收純衣王制云有虞氏皇而祭夏后氏收而祭商人冔而祭郊特牲與冠禮記云周辨商冔夏收鄭氏釋王制謂皇冕屬也畫羽飾焉釋冠禮記謂辨名出於槃槃大也言所以自光大也冔名出於幠幠覆也言所以自覆飾也收言所以收斂髮也白虎通曰辨攀也攀持其髮此雖不可以考然周禮掌次之皇邸樂師之皇舞皆以鳳凰之羽為之則皇冕畫羽飾可知也王制以皇收冔對冕言之又孔子稱禹致美乎黻冕詩稱商之孫子常服黼冔黼冔云者猶所謂黼冕也冠禮記與郊特牲以收冔對辨言之者三王共皮辨素積則夏商而上非無辨也然世之文質煩簡不同故夏商之用冕者周或用辨而已檀弓曰周人辨而葬商人冔而葬范氏曰爵辨一名冕廣八寸長尺二寸繪其上似爵頭色有收持笄所謂夏收殷冔者也其説不可考蕙田案陳氏此説最為通達禮記禮運衣其浣帛注浣帛練染以為祭服禮疏浣帛練染以為祭服亦異代周禮則先染絲乃織成為衣故玉藻云士不衣織陸氏佃曰衣其浣帛詩曰害浣害否傳以謂私服宜浣公服宜否婦人有副翬以接見君子見舅姑其餘則私也然則衣其浣帛蓋自褕狄而下且言浣帛則亦以著潔其衣服蕙田案衣其浣帛不專指后服陸説非是禮器禮有以文為貴者天子龍衮諸侯黼大夫黻士玄衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴者也注此祭冕服也朱緑似夏殷禮也周禮天子五采藻龍疏人君因天之文章以表於德德多則文備故天子衮諸侯以下文稍少也然周禮上公亦衮侯伯鷩子男毳孤卿希大夫元士爵辨玄衣纁裳今言諸侯黼大夫黻雜用夏殷禮也但夏殷衣有日月星辰山龍今云龍衮者舉多文為首耳日月之文不及龍也朱緑藻十有二旒亦是夏殷也周藻五采也十二謂旒數也諸侯九以下亦夏殷也周家旒數隨命數又士但爵辨無旒也熊氏曰朱緑以下是夏殷禮其天子龍衮諸侯黼大夫黻等皆周法無嫌諸侯雖九章七章以下其中有黼也孤希冕而下其中有黻特舉黼黻而言耳故詩采菽云玄衮及黼是特言黼也詩終南美秦襄公黻衣繡裳是特言黻也陳氏禮書天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三其制與辨師不同異代之禮也方氏慤曰凡服其章雖異至于玄衣纁裳則通上下如之然此止以言士者士之服無章以玄纁為主故也自大夫而上皆冕服也士則皮辨服而已藻必五采特曰朱緑則舉其華者以該之也亦與雜帶君朱緑同義蕙田案以上通論四代冕服周禮春官司服掌王之吉凶衣服辨其名物與其用事王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則玄冕注六服同冕者首飾尊也先公謂后稷之後太王之前不窋至諸盩饗射饗食賓客與諸侯射也羣小祀林澤墳衍四方百物之屬鄭司農云大裘羔裘也衮卷龍衣也鷩禆衣也毳罽衣也玄謂書曰豫欲觀古人之象日月星辰山龍華蟲作繢宗彛藻火粉米黼黻希繡此古天子冕服十二章舜欲觀焉華蟲五色之蟲繢人職曰鳥獸蛇雜四時五色以章之謂是也希讀為絺或作黹字之訛也王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章登龍于山登火于宗彜尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彜皆畫以為繪次六曰藻次七曰粉米次八曰黼次九曰雉黻皆希以為繡則衮之衣五章裳四章凡九也鷩畫以謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彜也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也玄者衣無文裳刺黻而已是以謂玄焉凡冕􅡘皆玄衣纁裳疏冕名雖同其旒數則亦有異但冕名同耳云衮卷龍衣也者案禮記曾子問云諸侯禆冕覲禮侯氏禆冕鄭注云禆之言卑也天子大裘為上其餘為禆若然則禆衣自衮以下皆是先鄭獨以鷩為禆衣其言不足信矣王氏昭禹曰以周之祖廟考之先公尊於先王而所服止於鷩冕祭亦各以其服授尸尸服如是王服衮以臨之非所以為敬故不敢陳氏禮書衮冕九章十二斿鷩冕九斿毳冕七斿希冕五斿玄冕三斿觀辨師於王言冕之表裏延紐而不及玉瑱於諸侯言玉瑱而不及冕之表裏延紐於王言繅不言斿於諸侯言繅斿不言玉數止言瑉玉三采言繅斿皆就而不言采數公之互冕皆三采言玉笄而不言紘是皆約辭以互發之則五采繅十有二就不言皆者其斿如康成之説信矣春秋傳曰上物不過十二郊特牲曰戴冕璪十有二旒則天數也玊藻曰天子玉藻十有二旒龍卷以祭是王衮冕十有二旒也典命曰上公以九為節則上公之衮冕九旒九玊辨師言繅十有二就以見斿亦十有二言繅斿九就以見斿與玊亦九於玉舉衮冕於諸侯舉上公之冕皆指其盛者言之也孔子曰麻冕禮也記曰玉藻前後邃延漢孫叔通之冕制版廣八寸而長倍之後方前圓後仰前俯則版質而麻飾之上玄為延下朱為裏約之以武設之以紐貫之以笄固之以紘五采玉則朱白蒼黃玄也皇氏沈氏謂五采玉依飾射侯之次從上而下初以朱次白次蒼次黃次玄五采玉貫編周而復始其三采者先朱次白次蒼二色者先朱後緑玉有十二則每玉間以寸也其玄朱方圓俯仰如此先儒謂前低寸而辨物之德應物之事不變之體無方之用莫不該存乎其間命之曰冕者禮為應物而設故也然服飾於下陰也故司服之服六冕飾於上陽也故辨師之冕五而已猶王后之服六而追師之首飾三而已副編次則大裘衮衣同冕猶三翟同副也康成謂大裘無衮其冕無旒於經無據玉藻曰龍卷以祭其文在朝日聽朔之上則祭昊天五帝先王之類皆以玉藻龍卷此又與郊特牲象天則天數之説合矣蓋先王祭服其內明衣加以中衣中衣繡黼丹朱然後加裘衮焉則大裘之所著見者領而已衮服玄衣繡裳而九章則龍也山也華蟲也火也宗彛也繪於衣藻也粉米也黼也黻也繡於裳前後邃延則前十二旒其玊百四十四後十二旒玊亦百四十有四鄭氏曰旒十有二前後邃延者言皆出冕前後而垂也釋名曰冕玄上纁下前後垂珠有文飾也其韍朱韍其帶素帶朱裏朱緑終辟執鎮圭搢大圭朝諸侯則執瑁圭佩白玉而玄組綬赤舄鷩冕七章鷩雉也雉之為物五色備而成章故曰夏翟亦曰華蟲猶中國謂之夏亦謂之華也司服又謂之鷩者别其名也考工記曰鳥獸蛇鳥而類於獸蛇者指其文也鄭氏曰華蟲之毛鱗有文采者鷩冕以祀先公饗射然先公尊矣所服止於此者非卑之於先王以為祭則各以其服授尸尸服如是而王服衮以臨之非所以為敬故弗敢也其制亦五采繅十有二就五采玊十有二前後皆九斿共玉二百一十六玄衣纁裳繪於衣者華蟲火宗彛也繡於裳者藻粉米黼黻也紱帶圭佩綬舄與衮冕同然則饗射亦以鷩冕者王朝覲諸侯以衮冕故饗與賓射以鷩冕祭祀以衮冕故大射亦以鷩冕以饗與賓射殺於朝覲而大射殺於祭祀故也燕射於寢則皮辨而已賈公彥謂賓射服皮辨燕射服朝服然鄭氏釋司服謂鷩冕饗射者饗食賓客與諸侯射則賓射不以皮辨矣又皮辨即王之朝服耳離而二之其説誤也左傳曰五雉為五工正爾雅有顱諸雉鷮雉鳪音卜雉鷩雉秩秩海雉鸐山雉雗汗雉鵫雉翬雉鷂雉南方曰􅔧東方曰鶅北方曰鵗西方曰鷷而衣章之所取者特鷩與翬鷂耳以其文尤著故也毳冕五章説文毳獸細毛也宗彛有虎蜼之飾而毳衣有宗彛之章故書謂之宗彛周禮謂之毳冕毳冕王所祀四望山川之服也五采繅十有二就五采玉十有二前後皆七旒共玉百六十有八繪於衣則宗彛藻粉米也繡於裳則黼黻也韍帶圭佩綬舄與鷩冕同詩曰毳衣如菼菼之初生其色玄則如菼言其衣也又曰毳衣如璊璊之為玉其色赤説文璊玉頳色則如璊言其裳也劉熙釋名以毳為藻文鄭司農以毳為罽衣與宗彛之制不合不足信也爾雅曰蜼卬鼻而長尾郭璞曰蜼似猴而色黑尾數尺鼻上向雨則以尾若兩指窒其鼻蓋虎取其義蜼取其智希冕三章王祭社稷五祀之服非卑之於饗射也以社稷五祀之所上止於利人故衣粉米而已謂之希以其章少故也鄭氏以希為絺以絺為刺謂希刺粉米無畫然畫陽事也在衣繡陰功也在裳希衣之粉米固亦畫矣繡而不畫則與餘章之在衣者不類其説非也唐以希冕為繡冕蓋亦襲鄭氏之失歟希冕亦五采繅十有二就五采玉十有二前後皆五旒共玉百二十賈公彥謂天子九章侯伯七章大章也章各依命數數章也則九章章皆十二七章章皆七若然則舜十二章之服日月星辰之類皆十二乎不必然也考之於禮升龍降龍為一章虎彛蜼彛為一章則山火而下蓋皆左右畫繡之也玄冕一章王祭羣小祀之服其衣玄而無文裳黻而已其章不足道也故以玄名之玄冕亦五采繅十有二就五采玉十有二前後三斿共玉七十二而王之齊服亦用焉荀卿曰絻而乘路即玄冕也諸侯之齊以玄冠不以玄冕及親迎則玄冕齊戒攝盛故也宗彛於十二章之服在裳於九章之服在衣粉米於七章之服在裳於五章之服在衣蓋次服之首章上服固已升之矣夫乾居西北而天事武故黼之色白黑艮居東北而成始終故黻之色青黑天下之理歸於所斷成於所辨故服章以黻終焉觀易陰陽之相代歸於復小而辨於物卦象之相推終於未濟之辨物居方舜命九官終於黜陟分北周官六計終於亷辨皆六服終黻之意也然剛斷者先王之所沉潛非嚮而上之也故黼依設於後席用黼純設於下而中衣繡黼設於中皆六服後黼之意也詩曰玄衮及黼黻衣繡裳常服黼冔書曰麻冕黼裳語曰致美乎黻冕記曰諸侯黼大夫黻爾雅曰衮黻也凡此皆舉其章之末者則餘章著矣禆冕覲禮侯氏禆冕曾子問曰大祝禆冕執束帛又曰大宰大宗大祝皆禆冕玉藻曰諸侯禆冕以朝樂記曰禆冕搢笏而虎賁之士説劍也荀卿曰大夫禆冕鄭康成釋覲禮曰禆之言埤也天子大裘為上其餘為禆釋玉藻曰禆冕公衮侯伯鷩子男毳是也鄭司農釋周禮特以鷩為禆衣拘矣蔡氏德晉曰衮冕衮衣而冕也下鷩冕等倣此享先王衮冕有二一則冕十二旒服十二章祭武王則服之一則服九章自山龍而下荀子所稱山冕禮記所稱龍衮即此其冕九旒祭太王王季文王則服之先公祖紺以上至后稷也六服但舉其大綱一服中顔色各異寒暑不同初非一例如十二章之服以大裘為上故舉此以例其餘必更有帛有絺綌而裘帛與絺綌必非一色康成謂凡冕服皆玄衣纁裳恐未必然以書顧命卿士邦君麻冕蟻裳蟻為玄色推之可見方氏苞曰公之服自衮冕而下如王之服則王備十二章可知矣享先王以衮冕則祀天地以十二章之服可知矣不敢服三辰之章以祀先王與不敢以衮冕祀先公其義一也郊特牲及明堂位皆特舉旗之章而不及於服者旗有旒而設日月乃周人創制若服之備十二章則邃古如斯不必言也典命職上公九命為伯其衣服禮儀皆以九為節則衣裳九章天子法天以十二為數蓋日月星辰麗天非人臣所敢服又曰九章之説羣儒辨之詳矣而學者終以三辰之服未見於經為疑不知六典乃設官分職之大經故服物采章文多不具或彼此互見此職第言衮而不及衮以上之三辰第言衮以下鷩以下毳以下玄以下而不及其繪繡之物則亦具詳於冬官可知矣蕙田案先儒辨鄭氏天子衮冕九章之説甚詳已見圜丘祀天門冕服條下茲方氏所云可謂簡而當也蓋十二章之服始於虞舜三代所同周制天子之禮皆以十二為節故圭尺二寸冕十二旒繁纓十二就則衣十二章明矣故事天及五帝冬至則內服大裘裘之外襲以玄衣備十二章名之為衮若五帝則唯立春為然餘則但服大裘外之衮衣至夏秋以紗為衣備十二章是祀天祀五帝其用十二章之衮無疑但欲以别於祀先王之服故不曰衮冕而曰大裘而冕也自鄭康成造為周以日月星辰畫於旗王與公同服九章之説則尊卑不分等威莫辨而與經文不合矣况質文相變每後增於前周尚文而反減冕服之章有是理乎蔡氏謂周衮冕有二一十二章以祭武王一九章以祭大王王季文王方氏謂不敢服三辰之章以祀先王與不敢服衮冕祀先公其義一方氏之説為是蓋日月星辰麗天之文則服以祀天宜矣先王雖尊若以三辰臨之恐褻天之章故服山龍以下若大王王季文王既經追王則皆謂之先王可也而又加區别非人子所敢出故鷩冕享先公陳氏謂非尊先王而卑先公蓋不敢以衮臨尸服其義精矣蔡氏所云未詳何據至方氏又云學者終以三辰不見於經為疑而以具於冬官為辭此雖理或有之然亦非據也要之周禮大抵多因前代因則不同於創無為特筆以著之又何必以三辰不見於經為疑也且不見於經亦唯曰周官無之爾尚書明言之矣可謂之不見於經乎即如唐虞之制璿璣玉衡見於書不必著於周禮五瑞之制見於周禮而不必詳於書蓋古人簡質不獨周禮一書文多互見即六經之文以互見為援據者不可勝數也若必以不見三辰為疑則固矣又謂旗有旒而設日月乃周人創制亦未確考郊特牲明堂位所言皆魯禮魯僭天子禮為日月之旗故陋儒誇言以示美若周天子則固有之無庸説也即曰創制亦只可曰魯人而不可曰周人也尚書孔傳云畫三辰於衣服旌旗疏言左傳有三辰旗旗周禮司常云日月為常三者禮有沿革後因於前故知舜時三辰亦畫之於旗也據此則亦非周人始創明矣宗元案天子法天以十二為數則服亦宜十二章此復何疑而仍訛襲陋者皆以九章為説不知只就公之服自衮冕而下九章如王之服一句可知王之服有在衮冕而上者合三辰而得十二章矣望溪先生此解可謂一語破的何舊説之憒憒也公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自玄冕而下如孤之服凡大祭祀共其衣服而奉之注自公之衮冕至卿大夫之玄冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆玄冕而祭於已雜記曰大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已大夫爵辨自祭家廟唯孤耳其餘皆玄冠與士同玄冠自祭其廟者其服朝服玄端諸侯之自相朝聘皆皮辨服此天子日視朝之服蔡氏德晉曰自公衮冕至大夫玄冕皆朝聘天子及助祭與受王命之服其餘事之重者亦用之如冠昏之禮是也助祭則隨事用之如王祭羣小祀玄冕則助祭者皆玄冕也若朝王及在國受王命與冠昏之禮則各服其上服上公則衮冕侯伯則鷩冕諸侯自祭鄭康成謂惟魯及二王後衮冕餘皆玄冕以大夫冕而祭於公辨而祭於已推之理或然也典命上公九命其衣服以九為節侯伯七命其衣服以七為節子男五命其衣服以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其衣服亦如之疏案大行人云上公冕服九章侯伯於上公降殺以兩子男比於侯伯又降殺以兩為差耳公之孤四命眂小國之君其卿三命其大夫再命其士一命其衣服各眂其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其衣服各眂其命之數疏四命者冕服四章三命者以三為節再命一命者亦以命數為降殺也但大夫玄冕一命者一章裳上刺黻而已衣無章故得玄名也則冕亦象衣無旒其士服爵辨並無章飾是以變冕言爵辨也秋官大行人以九儀辨諸侯之命上公之禮冕服九章諸侯之禮冕服七章諸伯如諸侯之禮諸子冕服五章諸男如諸子之禮注冕服著冕所服之衣也九章者自山龍以下七章者自華蟲以下五章者自宗彛以下也是疏凡服皆以冠冕表衣故言衣先言冕鄭恐冕服服此冕故云著冕所服之衣也凡大國之孤眂小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之詩秦風終南黻衣繡裳疏鄭於周禮之注差次章色黻皆在裳言黻衣者衣大名與繡裳異其文耳豳風九罭衮衣繡裳傳衮衣卷龍也九音義衮六冕之第二者也畫為章天子畫升龍於衣上公但畫降龍陳氏禮書凡裳前三幅後四幅賈公彥曰前為陽後為陰前三後四象陰陽也然則士喪記明衣裳不辟喪裳一袧則吉裳不特三袧而已明衣長及觳則凡裳不特及觳而已明衣有前後裳則凡裳前三後四以象陰陽可知也明衣裳縓綼緆緇純士昏禮爵辨纁裳緇袘曲禮素衣素裳素冠徹緣則凡裳有緣可知也玉藻曰衣正色裳間色然冕服玄衣纁裳皮辨服素衣素裳諸侯朝服緇衣素裳士爵辨服緇衣纁裳玄端服有玄裳黃裳雜裳玄端服惟三裳而已士昏禮使者玄端鄭氏曰有司緇裳無據深衣長衣裳之色同三翟三衣亦衣裳之色同緇衣非正色也黃素之裳非間色也蓋衣之玄緇所以象天道裳之黃所以象地德素陰之正也亦可以為裳纁陽之間也不可以為衣是衣之色常尊裳之色常卑非必衣色皆正裳色皆間也記且云爾者豈非以玄為天之正色纁非地之正色乎書言王麻冕黼裳卿士邦君皆麻冕蟻裳太保太史太宗皆麻冕彤裳孔安國曰蟻裳玄彤裳纁詩曰毳衣如璊又曰載玄載黃我朱孔陽為公子裳蓋裳以纁為主纁赤黃色以土無正位必託於火故也若夫玄裳素裳之類各象其事而服之孔頴達曰書之卿士邦君非執事者也故玄裳太保太史太宗執事者也故彤裳其説是也小雅采菽玄衮及黼箋玄衮玄衣而畫以卷龍黼黼黻謂絺衣也疏謂絺衣絺謂刺之言此黼黻絺刺之於衣衮黼之在衣也衮則畫之黼則刺之故言謂絺衣以對衮畫衣故也絺在裳言衣者衣總名也何氏楷曰據此詩玄衮明上公之衣亦玄色周禮言玄冕謂衣之無文者其本色是玄然則凡冕服之皆玄衣其説確矣公衣五章裳四章而衣以衮為首子男衣三章裳二章而裳以黼為首此言玄衮及黼者舉公及子男以該侯伯也又詩若概舉九章當始于衮終于黻故爾雅訓衮為黻黻者衮之盡也此不言黻者以卿大夫止有裳一章刺黻無黼故但言黼以别於卿大夫明此所錫豫者止於來朝之諸侯不為卿大夫設也凡此皆先王待諸侯之常制是時諸侯尚未來朝而王者已預為之儲具如此韓奕玄衮赤舄疏又賜身之所服以玄為衣而畫以衮龍足之所履配以赤色之舄何氏楷曰赤舄冕服之舄也上公九命得服衮冕故履赤舄與王同也論語服周之冕注包曰冕禮冠周之禮文而備取其黈纊塞耳不任視聼疏云冕禮冠周之禮文而備者冠者首服之大名冕者冠中之别號故云冕禮冠也謂之冕者冕俯也以其後髙前下有俯俯之形故因名焉蓋以在上位者失於驕矜欲令位彌髙而志彌下故制此服令貴者下賤也云取其黈纊塞耳不任視聼者黈纊黃綿也案今禮圖衮冕以下皆有充耳天子以黈纊諸侯以青纊以其冕旒垂目黈纊塞耳欲使無為清靜以化其民故不任視聼也禮記王制制三公一命卷若有加則賜也不過九命注卷俗讀也其通則曰衮三公八命矣復加一命則服龍衮與王者之後同多於此則賜非命服也虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服陳氏禮書公卿大夫之命以四以六以八陰數也公侯伯子男之命以五以七以九陽數也典命上公九命衣服以九為節司服所謂公之服自衮冕而下如王之服是也侯伯七命衣服以七為節司服所謂侯伯之服自鷩冕而下如公之服是也王之三公八命其卿六命其大夫四命及其出封皆加一等蓋八命加一等則是三公一命衮而衣服以九為節也其未出封則八命與侯伯同七章之服矣公與侯伯同七章之服則卿六命與子男同五章之服矣觀司服孤之服自希冕而下如子男之服卿大夫之服自玄冕而下如孤之服公之孤四命而服三章之希冕大國之卿三命大夫再命而服一章之玄冕則王之公卿大夫其衣服各降命數一等可知也詩言周大夫之服毳衣則王之上大夫卿也雜記曰大夫冕而祭於公則希冕玄冕也然則上公自衮冕而下其服五侯伯自鷩冕而下其服四子男自毳冕而下其服三孤自希冕而下其服二服雖不同而冕同賈公彥曰諸公繅玉同文惟有一冕以冠五服其説是也辨師諸侯繅斿九就瑉玉三采其餘如王之事繅斿皆就玊瑱玉笄諸侯及孤卿大夫之冕各以其等為之鄭氏謂上公繅九就用玉百六十二侯伯用玉九十八子男繅五就玉五十繅皆三采辨師瑉玉三采鄭氏曰瑉故書作璑説文璑三采玉孤繅四就玉三十二三命之卿繅三就玉十八再命之大夫繅再就玉八繅玉皆朱緑考之聘禮諸侯朝天子主繅朱白蒼大夫問諸侯圭繅朱緑則朱白蒼者君之繅朱緑者臣之繅冕繅之别蓋亦如此鄭氏之説是也希冕三章鄭氏謂孤繅四就蓋孤四命其宫室車旗衣服各眂其命之數則服雖三章而冕四斿斿四就無害其與服章異也晉武公之臣請服於周始曰無衣七兮次曰無衣六兮以示不敢上眂侯伯姑請六命之服列於天子之卿猶愈乎不也孔穎達謂卿從車六乘旌旗六旒辨飾六玉冠六辟積然則卿服雖五章而冕繅六斿斿六就猶大夫之服三章而繅四斿斿四就也不特人臣之冕如此王服九章而繅十有二斿斿十有二就是繅斿與服章不必同也鄭氏又曰一命之大夫冕而無斿然典命言各眂其命之數果一命之冕無斿則眂其命之數云者為虛言也夫冕之有斿為蔽明也繅之就數固雖不同蓋皆其垂過目而每就非止一寸每就一寸殆王之十有二就者然也賈公彥曰每玉相去一寸十二玉則十二寸就成也以一玉為一成結之使不相并也射人三公執璧執璧則服毳冕而已蓋王饗射降而服鷩冕則公於王射降而服毳冕矣鄭氏曰諸侯入為卿大夫各服本國服章與在朝仕者不同然卿大夫出則伸而加一等入則屈而降一等則各服本國服章之説無是理也書曰周公秉圭射人三公執璧蓋圭乃公之常禮璧特射時所執也王之卿大夫其所執亦羔雁特其飾與諸侯之卿大夫不同周語單子譏陳侯棄衮冕而南冠春秋伐楚之役許男卒而以衮斂夫陳侯有衮冕許男以衮斂者尊三恪而優死王事者也左氏曰凡諸侯薨於朝會加一等死王事加二等書大傳曰天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍故書曰天命有德五服五章哉又曰天子服五諸侯服四次國服三大夫服二士服一然大夫之服自玄冕而下士之服自皮辨而下固無藻火山龍矣既曰子男宗彛藻火山龍士山龍又曰次國服三大夫服二士服一是自戾也漢明帝時冕皆廣七寸長尺二寸前圓後方朱緑裏玄上前垂四寸後垂三寸繫白玊珠為十二旒三公諸侯服三龍九章冕七旒青玊為珠卿大夫服用華蟲七章冕五旒黑玉為珠皆有前無後以承大祭然旒有前無後非古制也又古者大夫冕而祭於公士辨而祭於公則大夫以上助祭皆冕服也明帝之時百官不執事者袀玄以從失之矣蕙田案侯國諸臣之服與諸侯之服不同諸侯之服章數依命數而諸臣之服不隨命數也故公之孤四命而服希冕三章若王朝諸臣之服以義推之則王之三公八命宜服七章之鷩冕卿六命服五章之毳冕大夫四命服三章之希冕士之三命再命同服無章之玄冕可知也陳氏謂王朝之卿大夫皆降其命一等同諸侯章服極是又從鄭氏云繅斿與章服不必同則非矣玉藻天子玉藻十有二旒前後邃延龍卷以祭注祭先王之服也雜采曰藻天子以五采藻為旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩延冕上覆也疏藻謂雜采之絲繩以貫於玉以玉飾藻故云玉藻也藻之前後各有十二旒疏十有二就每一就貫以玉就間相去一寸則旒長尺二寸故垂而齊肩也言天子齊肩則諸侯以下各有差降則九玉者九寸七玉者七寸以下皆依旒數垂而長短為差旒垂五采玉依飾射侯之次從上而下初以朱次白次蒼次黃次玄五采玉既貫遍周而復始三采者先朱次白次蒼二色者先朱後緑卷謂卷曲畫此龍形卷曲于衣以祭宗廟司服及覲禮卷皆作衮馬氏晞孟曰冕之為物後方而前圓後仰而前俯有延在上有旒在下視之則延長察之則深邃冕止於五則大裘而冕與衮冕一矣蓋祀昊天則大裘而加冕享先王則服衮而已周官於祀昊天不言衮則用衮可知也記於龍衮言以祭不言所祭則昊天先王可知也先儒有云大裘無冕衮而其冕無旒不知何據玄端而朝日於東門之外聼朔於南門之外注端當為冕字之誤也玄衣而冕冕服之下諸疏凡衣服皮辨尊次以諸侯之朝服次以玄端案下侯皮辨聼朔朝服視朝之服卑於聼朔今天子皮辨視朝若玄端聼朔則是聼朔之服卑於視朝與諸侯不類且聼朔大視朝小故鄭注知端當為冕謂玄冕也是冕服之下方氏慤曰經有曰玄冕有曰玄冠有曰玄端何也蓋玄端者祭服燕服之總名衣玄衣而加玄冕則為祭服衣玄衣而加玄冠則為燕服或冠冕通謂之端玄端而朝日則是玄冕者也玄端而居則是加玄冠冕也聽朔亦玄冕者敬朔事如祭故也諸侯玄端以祭皮辨以聽朔於太廟注祭先君也端亦當為冕字之誤也諸侯祭宗廟之服惟魯與天子同皮辨下天子也方氏慤曰玄端祭服也皮辨朝服也天子以祭服聽朔者示受之於天故神之也諸侯以朝服聽朔者示受之於祖故明之也陸氏佃曰玄端玄端而冕諸侯冕而祭于公玄端而冕祭子已據大夫冕而祭于公辨而祭于已然則玄端雖冕異于玄冕玄冕纁裳玄端而冕玄裳特牲主人冠玄端不言玄嫌裳或素天子言門諸侯言太廟言內朝斥近不敢以言天子也雜記大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭於己可也注辨爵辨也冠玄冠也祭於公助君祭也大夫爵辨而祭於己惟孤爾然則士辨而祭於己緣類欲許之也親迎雖亦己之事攝盛服耳非常也也疏此一節明大夫士公私祭服大夫謂孤也冕絺冕祭於己自祭廟也助祭為尊故服絺冕自祭為卑故服爵辨士以爵辨為上故用助祭冠玄冠為卑自祭不敢同助君之服故用玄冠也作記之人雖云士冠而祭於己以己既爵辨親迎親迎輕於祭尚用爵辨則自用爵辨自祭己廟於禮可用也是記者緣事類許之著爵辨也儀禮少牢上大夫自祭用玄冠此亦云辨而祭於己與少牢異故鄭注云惟孤爾知非卿者以少牢禮有卿賓尸下大夫不賓尸明卿亦玄冠不爵辨也親迎配偶一時之極故許其攝盛服祭祀須依班序著辨於理可也馬氏晞孟曰大夫則冕而祭於公辨而祭於己士辨而祭於公冠而祭於己者亦周官六服同冕之意也蓋王則異其服而大夫士則異其冕辨而已周禮又曰卿大夫之服自玄冕而下士之服自皮辨而下則大夫以玄冕為極而士以爵辨為極也非祭於公安敢用哉雖然士辨而親迎則士辨而祭於己可乎士可辨而祭於己則大夫亦可冕而祭於己矣雖然士之辨而親迎亦猶記所謂冕而親迎者也故哀公嘗疑其為己重而孔子非之諸侯以祭服而親迎則士以助祭服而親迎義之當然於是乎在苟辨而祭於己則非特嫌其同於公而又著其輕於昏矣故士之辨而祭於公者正也辨而親迎者權也辨而祭於己則不可也李氏某曰大夫冕而祭於公謂天子之大夫也儀禮曰大夫朝服而祭謂諸侯之大夫也復諸侯以褒衣冕服爵辨服注冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲見加賜之衣也褒猶進也用疏謂復時以始命褒賜之衣冕服爵辨服者諸侯既褒衣又以冕服爵辨服也凡服各依其命數則上公五冕之外更加爵辨服以下皮辨冠辨之等而滿九侯伯冕服之外亦加爵辨以下而滿七子男冕服之外加爵辨皮辨而滿五其褒衣若特所褒賜則宜在命數之外也故王制云三公一命衮若有加則賜是褒衣故不入命數也此褒衣或是冕之最上者陸氏佃曰先儒謂始命為諸侯及朝覲加賜之衣若秦仲受顯服其詩曰黻衣繡裳此其一隅黻衮也然則復諸侯以褒衣公襲衮衣一舉其有者也若以謂諸侯人得而有之非所謂褒喪大記君以卷大夫以玄赬士以爵辨注君以衮謂上公也赬赤也玄衣赤裳所謂卿大夫自玄冕而下之服也玄疏君以卷者謂上公以衮冕而下大夫以玄赬者用冕玄衣纁裳也士以爵辨者士亦用助祭上服六冕則以衣名冠諸侯爵辨則以冠名衣今言爵辨者但用其衣不用其辨也陳氏禮書諸侯祭服祭統曰夫人蠶於北郊以共冕服又曰君純冕立於阼玉藻曰諸侯玄端以祭禆冕以朝鄭氏謂諸侯祭宗廟之服惟魯及二王之後衮冕餘皆玄冕考之雜記大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己以其致隆於公不敢與己同其服則諸侯以鷩毳希冕祭於王端冕祭於己宜矣然玉藻玄端以祭言其服也玄端無章則三旒之冕可知鄭氏易端為冕過矣司服言及諸侯孤卿大夫士之服而繼之以其齊服有玄端素端則玄端素端非特士之齋服而已鄭氏曰端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一則其袂三尺三寸袂尺八寸然謂之端則衣袂與袪廣袤等矣無大夫士之辨也果士之袪殺於袂尺非端也大夫之袪侈以半而益一亦非端也深衣之袂圜長衣之袂長弔祭及餘衣之袂侈司服凡弔事辨絰服雜記凡辨絰服其衰侈袂少牢主婦衣宵衣侈袂儒行曰孔子衣逢掖之衣荀卿曰其衣逢則玄端之袂端可知矣古者端衣或施之於冕或施之於冠大戴禮曰武王端冕而受丹書樂記曰魏文侯端冕而聽古樂荀卿曰端衣玄裳絻而乘路此施於冕者也冠禮冠者玄端緇布冠既冠易服服玄冠玄端特牲禮主人冠端玄內則子事父母冠緌纓端韠紳劉定公曰吾端委以治民董安于曰臣端委以隨宰人公西華曰宗廟之事如會同端章甫以至晉侯端委以入武宫晏平仲端冕以立於虎門此施之於冠者也蓋玄端齋服也諸侯與士以為祭服玉藻玄端以祭特牲冠端玄是也大夫士以為私朝之服玉藻朝玄端是也天子至士亦以燕服玉藻天子卒食玄端而居內則事父母端韠是也然則端衣所用固不一矣記曰齋之玄也以隂幽思也故祭之冕服皆玄齊之端衣亦玄若夫朝服天子以素諸侯以緇未聞以玄端也儀禮大夫祭以朝服士祭以玄端冠禮主人朝服既冠冠者服玄端雜記公襲朝服一玄端一燧禮自西階受朝服自堂受玄端則朝服玄端異矣玄端皆玄裳或黃裳雜裳可也鄭氏曰上士玄裳中士黃裳下士雜裳雜裳前玄後黃荀卿曰端衣玄裳絻而乘路志不在於食葷蓋齊則衣裳皆玄非齊則裳不必玄未聞以素裳也鄭氏釋儀禮謂玄端即朝服之私易其裳耳釋玉藻曰朝服冠玄端素裳此説無據服玄端者冠則緇布冠齊則玄冠特天子齊用冕燕則玄冠而已然齊或用素端則其冠不玄矣鄭氏曰素端為札荒有所禱請是也蕙田案以上王祭服見諸臣服冕周禮夏官辨師掌王之五冕皆玄冕朱裏延紐注延冕之覆在上是以名焉紐小鼻在武上笄所貫也今時冠卷當簮者廣袤以冠縱其舊象與疏云皆玄冕者古者績麻三十升布染之上以玄下以朱衣之於冕之上下云延者即是上玄者紐者綴於冕兩旁垂之武兩旁作孔以笄貫之使其得牢固也凡冕體周禮無文叔孫通作漢禮器制度取法於周今還取彼以釋之案彼文凡冕以版廣八寸長尺六寸以此上玄下朱覆之乃以五采繅繩貫五采玉垂於延前後謂之邃延故玉藻云天子玉藻前後邃延龍卷以祭是也云延冕之覆在上者案玉藻汪延冕上覆言雖不同義則不異皆以玄表覆之在冕上也以爵辨前後平則得辨稱冕則前低一寸餘得冕名冕則俯也以低為號也云紐小鼻至其舊象與者古之紐武笄貫之處若今漢時冠卷當簮所貫者於上下之廣及隨縱之袤以冠縱者貫簮之處當冠縱之中央是周冕垂紐於武貫笄之舊象也言與者以無正文故云與以疑之鄭氏鍔曰王之吉服六服每一冕則宜六冕今止五冕者禮圖以大裘之冕無旒陸佃云大裘襲衮則戴繅冕十有二旒大裘與衮同一冕故服六而冕五此説得之五采繅十有二就皆五采玉十有二玉笄朱紘注繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂邃延也就成也繩之每一幣而貫五采玉十二斿則十二玉也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武繅不言皆有不皆者此為衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十玄衣之冕三斿用玉七十二為疏言五采藻十有二者此據衮冕而言謂合五采絲藻繩十二道為十二旒也就皆五采玉十有二者此合據一旒而言以玉有青赤黃白黑五色於一斿之上以此五色玉貫於藻繩之上每玉間相去一寸十二玉則十二寸就成也以一玉為一成結之使不相并也玉笄朱紘者以玉笄貫之又以組為紘仰屬結之也云繅雜文者若水草之藻有五采故云雜文之名也云紘一條屬兩端於武者謂以一條繩先屬一頭於左旁笄上以一頭繞於頥下至向上於右相笄上繞之是以鄭注士冠禮云有笄者屈組以為紘垂為飾無笄者纓而結其絛彼有笄據皮辨爵辨此五冕皆有笄與彼同此言屬於武者據笄貫武故以武言之其實在笄云繅不言皆有不皆者謂王之五冕繅則有十二有九有七有五有三其玉旒皆十二故繅不言皆有不皆者則九旒以下是也玉言皆則五冕旒皆十二玉也此經十二旒據衮冕而言是以鄭云此為衮衣之冕十二旒以其十二旒旒各十二玉前後二十四旒故用二百八十八已下訃可知王氏安石曰五采備采也十有二就備數也玉有十二備物也玉笄貫其上以象德也蔡氏德晉曰王之吉服六而言五冕者以玄冕無旒不數之也蕙田案天子之冕雖有九旒七旒五旒三旒之别而每旒之玉皆十二諸侯以下之冕則九旒者九玉七旒者七玉五旒者五玉而玉又用瑉也玄冕無旒故不數蔡氏較注疏為長諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄注侯當為公字之誤也三采朱白蒼也其餘謂延紐皆玄覆朱裏與王同也出此則異繅斿皆就皆三采也每繅九成則九旒也公之冕用玉百六十二玉瑱塞耳者故書瑉作璑鄭司農云繅當為藻繅古字也藻今字也同物同音璑惡玉名就疏諸公云繅九就又云繅斿皆就與上言繅十有二皆五采玉十有二異上繅玉别文則繅有差降玉無差降此諸公繅玉同文則惟有一冕而已故鄭計一冕為九旒旒各九玉據冕九旒不别計鷩冕以下以其一冕而已冠五服故也已下侯伯子男亦皆一冕冠數服也王不言玊瑱於此言之者王與諸侯互見為義是以王言玄冕朱裏延紐及朱紘明諸侯亦有之諸公言玉瑱明王亦有之是其互有也鄭知侯當為公者以下别見諸侯又此經云九就當上公以九為節故知是公也知三采朱白蒼者聘禮記公侯伯繅籍三采朱白蒼故知三采亦朱白蒼也云出此則異者異謂天子朱紘諸侯當青組紘之等不得與王同也鄭氏鍔曰凡冕天子皆十二旒諸侯皆九斿故記曰天子十有二旒諸侯九而辨師云諸侯九就諸侯蓋通稱繅即禮記所謂藻也易藻為繅繅雜文之名取其義之著也斿即禮記所謂旒也易旒為斿謂其垂於前後如旌旗之斿也諸侯九就蓋自公而推之以九以七以五皆可見矣蕙田案諸侯九就以上公言之也瑉玉三采則繅斿亦宜三采矣繅斿皆就郎完白謂侯伯七命則七就子男五命則五就皆如其命數以為就也陸農師謂諸侯九斿則上公十二斿鄭剛中謂天子皆十二旒説俱未是陳氏禮書延先儒謂冕上覆古者績麻三十升布上玄下朱以表裏冕版三十升則麻之尤精者也書稱康王麻冕黼裳卿士邦君麻冕蟻裳太保太史太宗皆麻冕彤裳孔子曰麻冕禮也今也純儉顔淵問為邦孔子曰服周之冕則古者五冕皆麻至孔子時乃去麻用純然郊冕猶用麻所以示復本也故荀卿曰郊之麻冕喪服之先散麻一也武組辨師五冕皆紐鄭氏曰紐小鼻在武上笄所貫也蓋武冠卷也古者居冠屬武則非燕居武不屬於冠也喪冠條屬則非有喪者纓武異材也鄭氏曰條屬者通屈一條繩若布為武垂下為纓屬之冠子姓之冠縞冠玄武不齒之冠玄冠縞武則非子姓與不齒者冠武同色也雜記曰委武玄縞而后蕤鄭氏謂秦人曰委齊東曰武則武亦謂之委以其若冠之足故曰武以其委於下故曰委蓋古者施冠於首然後加武以約之觀喪大記弔者襲裘加武則武之設所以約冠也紐垂於冕之兩旁其長及武笄以貫之繅鄭氏曰雜文之名也合五采絲為之繩垂於延之前後各十二所謂邃延繩每一匝貫五采玉諸侯繅旒皆就皆三采也每繅九成則九旒也侯伯繅七就子男繅五就孤繅四就卿繅三就大夫繅再就理或然也然冕五而已未有不設繅斿者鄭氏謂大裘之冕無旒爵辨如冕亦無旒此不可考紘纓辨師王之五冕皆朱紘禮記天子為藉冕而朱紘諸侯為藉冕而青紘士冠禮緇布冠青組纓皮辨笄爵辨笄緇組紘纁邊蓋朱者正陽之色天子以為紘青者少陽之色諸侯以為紘緇者陰之色而士以為紘卿大夫冕辨之紘無所經見禮器曰管仲鏤簋朱紘君子以為濫鄭氏謂大夫士當緇組紘纁邊理或然也一組繫於左笄繞頥而上屬於右笄垂餘以為飾謂之紘二組屬於笄順頥而下結之謂之纓纓之垂餘謂之緌檀弓曰蟬有緌鄭氏曰緌謂蜩喙長在腹下喪冠緇布冠纓而不緌冕辨紘而不纓春秋之時楚子玉瓊辨玉纓自漢以來冕纓各象其綬色冕辨而有纓非古制也夫縣鐘磬者亦謂之紘繫車蓋者亦謂之紘佩容臭者亦謂之纓馬之膺飾亦謂之纓旌旗之旒亦謂之緌禪被之識亦謂之紞則紘纓緌之名非特施於冠冕也緌詩曰葛屨五兩冠緌雙止檀弓曰范則冠而蟬有緌緌謂蜩喙長在腹下郊特牲曰太古冠布齊則緇之其緌也孔子曰吾未之聞也玉藻曰緇布冠繢緌諸侯之冠也縞冠素紕既祥之冠也垂緌五寸惰遊之士也自天子下達有事然後緌大帛不緌玄冠紫緌自魯桓公始也雜記曰大白冠緇布之冠皆不蕤委武玄縞而後蕤秦人曰委齊東曰武內則子事父母冠緌纓笄鬠笄辨師掌王之五冕皆玉笄諸侯玉笄士冠皮辨爵辨笄則冕辨有笄也國語范文子以杖擊其子折委笄則冠有笄也士喪服婦人吉笄有首尺二寸吉笄象笄也男子之笄亦或尺二寸大夫士之笄亦或象為之歟禮王祀以玉路朝以象路王玉爵諸侯象觚王玉笏諸侯象笏皆象次於玉然則諸侯玉笄大夫士用象可知賈公彥釋士冠禮大夫士笄當用象鄭氏釋士冠禮謂有笄者屈組為紘垂為飾無笄者纓而結其絛無笄蓋指緇布冠言之也雜記曰緇布不蕤則緇布非特無笄又纓而不緌矣古者笄亦謂之簪易曰朋盍簪鄭氏謂笄今之簪是也荀卿針賦曰簪以為父則簪形似針而巨也考之士喪禮鬠笄用桑長四寸纋中其母之喪內御者浴鬠無笄則鬠笄與冠辨之笄異矣鬠笄四寸所以安髮男子婦人皆有之男子死有髻笄而無冠辨之笄以其不冠故也婦人死不特無冠辨之笄亦無鬠笄以其不以髮為猶男子之冠故也家語曰孔子之喪襲而冠此王肅附會之論也荀子亦曰鬠而不笄瑱以充耳紞以垂瑱周官辨師王之五冕皆玉瑱詩於衛夫人言玉之瑱也於衛武公言充耳琇瑩於衛之臣言褎如充耳齊詩言充耳以素以青以黃尚之以瓊華瓊瑩瓊英則瑱不特施於男子也婦人亦有之不特施冕也辨亦有之故詩言充耳琇瑩繼之以會辨如星喪禮士無冕而瑱用白纊則辨亦有之可知也士瑱用白纊即詩所謂充耳以素者也人君用黈纊即詩所謂充耳以黃者也毛氏以充耳以素為士之服充耳以青為卿大夫之服充耳以黃為人君之服於説是也然以素為象瑱青為青玉黃為黃玉而用瓊華以飾象則是士瑱用二物與餘瑱不類非禮意也鄭氏以素為素紞青為青紞黃為黃紞人君五色人臣三色然魯語王后織玄紞夫人加紘綖內子為大帶命婦成祭服列士之妻加以朝服則夫人以至士妻特有所加而已其織玄紞一矣未聞有五色三色之别也又紞所以垂充耳而充耳不在紞為紞為充耳非也春秋傳曰縳之如一瑱則縳纊以為瑱自古然也其制蓋皆玄紞以垂之瓊玉以承之承之詩所謂尚之也梁制垂以珠瑱班固賦曰雕玉瑱以居楹礎石亦謂之瑱則瑱居纊下可知也賈公彥曰古者瑱不用纊士死則用白纊然士之襲禮皮辨禒衣緇帶韎韐竹笏之類皆用生時之物孰謂瑱用白纊特死者之飾哉檀弓小祥用角瑱楚語曰巴浦之犀犛兕象其可盡乎其又以規為瑱則古者之瑱亦以象與角為之王之皮辨會五采玉璂象邸玉笄注故書會作䯤鄭司農云讀如馬會之會謂以五采束髮也士喪禮曰鬠用組乃笄鬠讀與䯤同書之異耳語曰以組束髮乃著笄謂之檜沛國人謂反紒為䯤璂讀如綦車轂之綦玄謂會讀如大會之會會縫中也璂讀如薄借綦之綦綦結也皮辨之縫中每貫結五采玉十二以為飾謂之綦詩曰會辨如星又曰其辨伊綦是也邸下柢也以象骨為之疏先鄭以會為五采束髮讀經以為皮辨會五采引士喪禮及沛國之事後鄭皆不從故以會謂縫中解之先鄭讀從馬會取會結之義又讀璂如車轂綦之綦直取音同未知何義也玄謂會如大會之會漢歷有大會小會取會聚之義故為縫中漢時有薄借綦之語故讀從之亦取結義薄借之語未聞云皮辨之縫中每貫結五采玉十二以為飾謂之綦者天子以十二為節約同冕旒也詩會辨如星注云會謂辨之縫中飾之以玉皪皪而處狀似星也又曰其辨伊綦璂既為玉又得為結義得兩合耳云邸下柢也者謂於辨內頂上以象骨為柢易氏祓曰王之吉服其辨三皮辨用之于眂朝韋辨用之於兵事冠辨用之於田獵兵田之辨有時而用之者也皮辨眂朝則日眂朝之禮其用數矣此辨師所以特言皮辨之制若夫韋辨即爵辨也所謂爵辨絰䊷衣是已冠辨即玄端也所謂玄衣素裳是已二辨與皮辨素積相似微有損益言皮辨則韋辨冠辨在其間蔡氏德晉曰皮辨以皮六方縫之會其合縫處也玉笄貫於辨以為固也諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令注各以其等繅斿玉璂如其命數也冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫藻再就用玉八藻玉皆朱緑韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采一命之大夫冕而無旒士變冕為爵辨其韋辨皮辨之會無結飾辨絰之辨不辟積禁令者不得相僭踰也玉藻曰君未有命不敢即乘服不言冠辨冠辨兼於韋辨皮辨矣不言皮辨服辨自天子以下無飾無等疏云一命之大夫冕而無旒者此亦無文鄭知然者凡冕旒所以為文飾一命若有則止一旒一玉而已非華美又見一命大夫衣無章士又避之變冕為爵辨若一命大夫有旒士不須變冕為爵辨直服無旒之冕矣故知一命大夫無旒也若然爵辨制如冕但無旒為異則無旒之冕亦與爵辨不殊得謂之冕者但無旒之冕亦前低一寸餘故亦得冕名也易氏祓曰此言諸侯之冕辨而兼及卿大夫冕辨之制蔡氏德晉曰韋辨服王亦有之言於此互見也各以其等如其命數也孤卿大夫則如其命數而降一等故八命者七旒六命者五旒四命者三旒其三命者亦三旒再命一命者無旒士則不論三命及不命皆不服冕而服爵辨掌其禁令不得有僭踰也蕙田案蔡氏之説是也康成説侯伯子男玉數則是其説孤以下玉數則非陳氏禮書皮辨周禮辨師王之皮辨會五采玉璂象邸玉笄諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之儀禮士冠爵辨服纁裳純衣緇帶皮辨笄爵辨笄緇組紘纁邊賓同篋受皮辨右執項左執前鄭康成曰皮辨者以白鹿皮為之蓋皮辨存毛順物性而制之文質具焉韋辨去毛違物性而又染之文而已凡在下者為邸可以託宿者為邸玉璂則縫中貫玉而施於下者也象邸則下柢用象而託以皮者也爾雅邸謂之柢賈公彥曰邸下柢也謂於辨內項上以象骨為柢然謂之柢不特施於項上魏臺訪議曰邸以象骨周緣辨下根柢然則魏武所作升柢或古之遺制與諸侯及孤卿大夫之韋辨皮辨各以其等為之鄭康成曰侯伯璂飾七子男璂飾五玉亦三采孤璂飾四三命之卿璂飾三再命大夫璂飾二玉亦二采於理或然推此則公之玉九天子之玉十有二又可知也詩曰會辨如星言其玉也説文引詩䯤辨如星謂骨擲之可會髮者此不可據又曰其辨伊騏書曰綦辨執戈言其文也毛氏曰騏文也孔安國曰綦文鹿子皮説文綦蒼艾色蓋綦者陰陽之雜故禮以綦組纓為士之齋冠綦組綬為世子佩詩以綦巾為女巾皆其未成德者之服也則士辨以綦宜矣辨師言卿大夫之冕辨各以其等為之則士辨無玉飾康成讀玉璂為綦以綦為結是臆説也記曰三王共皮辨素積語曰素以麑裘則素衣其衣也素積其裳也士冠禮皮辨素積緇帶禮記雜帶君朱緑大夫玄華士緇辟則士之皮辨緇帶與君大夫皮辨之帶異矣士冠禮皮辨笄爵辨笄緇組紘纁邊辨師王朱紘禮記天子朱紘諸侯青紘則士皮辨緇組紘與天子諸侯皮辨之紘亦異矣蓋皮辨天子以視朝以宴詩曰側辨之俄以聽郊報以舞大夏諸侯以聽朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賓卿大夫以王命勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮辨服則皮辨之所施者衆矣蓋人為者多變自然者不易皮辨因其自然而已此所以三王共皮辨素積而周天子至士共用之也然喪服小記諸侯弔必皮辨錫衰郊特牲大蠟皮辨素服葛帶榛杖以送終則辨雖與吉禮同而服與吉服不同韋辨爵辨辨師諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之司服凡兵事韋辨服聘禮君使卿韋辨歸饔餼鄭氏釋周禮謂以韎韋為衣裳春秋傳曰晉郤至衣韎韋之跗注是也釋聘禮謂韎布以為衣而素裳既曰韎韋為衣又曰韎布為衣既曰韎韋為裳又曰素裳蓋以軍國之容不同故也然賈服之徒謂韎韋之跗注者袴屬於足跗也袴屬於足跗則非衣也詩於兵服曰制彼裳衣與子同袍與子同裳載是常服春秋傳曰袀服振振則兵事上下同服矣詳不可知也或曰周禮有韋辨無爵辨書與冠禮禮記有爵辨無韋辨士之服止於爵辨而荀卿曰士韋辨孔安國曰雀韋辨也劉熙釋名亦曰以爵韋為之謂之韋辨則爵辨即韋辨耳觀辨師司服韋辨先於皮辨書雀辨先於綦辨孔安國曰綦辨皮辨也士冠禮次加皮辨三加爵辨而以爵辨為尊聘禮主卿贊禮服皮辨及歸饔餼服韋辨而以韋為敬則皮辨之上非韋辨則爵辨耳此所以疑其為一物也爵辨士之祭服而王服之者王哭諸侯服爵辨而即戎服之爾士冠禮爵辨服纁裳純衣緇帶昏禮主人爵辨纁裳緇袘檀弓天子哭諸侯爵辨䊷衣書二人雀辨執惠立於畢門之內雜記復諸侯以褎衣冕服爵辨服子羊之襲皮辨一爵辨一玄冕一釁廟祝宗人宰夫雍人皆爵辨純衣則爵辨雖士之祭服而天子諸侯大夫皆服之鄭氏謂爵辨冕之次制如冕但無繅耳其布三十升然古文辨象形則其制上鋭若合手然非如冕也韋其質也爵其色也其笄紘玉飾各以其等為之如皮辨制鄭氏釋士冠禮謂爵辨赤而微黑如爵頭然則赤多黑少矣釋巾車又曰雀飾黑多赤少然雀之色固赤多而黑少鄭氏為之二説是自惑也其言爵辨赤亦無據蕙田案以上冕辨之制右服冕五禮通考卷六十七
