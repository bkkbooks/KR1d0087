body:
  text: 五禮通考卷一百八刑部尚書秦蕙田撰吉禮一百八諸侯廟祭禮記王制諸侯五廟二昭二穆與太祖之廟而五注太祖始封之君王者之後不為始封之君廟祖疏凡始封之君謂王之子弟封為諸侯為後世之太當此君之身不得立出王之廟則全無廟也故諸侯不敢祖天子若有大功徳王特命立之則可若魯有文王之廟鄭祖厲王是也此皆有功德特賜非禮之正此始封君之子得立一廟始封六世之孫始五廟備也若異姓始封如太公之屬初封則得立五廟從諸侯禮也若二王之後郊天之時則得以逺代之祖配天而祭陳氏禮書孔頴達曰若異姓始封如太公之屬得立五廟從諸侯禮然王者始受命所立不過四廟諸侯初封葢亦廟止髙祖而已謂得立五廟無是理也玉藻曰皮弁以聽朔於太廟而朔祭有牲是月祭及太祖也祭法謂王考皇考月祭之顯考祖考享嘗乃止非禮意也穀梁曰諸侯受朔於禰廟其說無据蕙田案陳氏謂王者始受命所立不過四廟與疏不同朱子答汪尚書曰政和之制二昭二穆之上通數髙祖之父以備五世夫既非始封之君又已親盡而服絶矣乃苟可以備夫五世而祀之於義何所當乎陳氏為優祭法諸侯五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼疏諸侯立五廟一壇一墠者降天子故止有五廟壇墠與天子同無功德之祖為二祧也曰考廟曰王考廟曰皇考廟皆月祭之者天子月祭五諸侯卑故唯得月祭三也顯考廟祖考廟享嘗乃止者顯考髙祖也祖考太祖也太祖乃不遷而與髙祖並不得月祭止預四時又降天子也去祖為壇者去祖謂去太祖也即髙祖之父諸侯無功徳二祧若髙祖之父亦遷即寄太祖而不得於太祖廟祭時祭唯有祈禱則去太祖而往墠受祭也陳氏禮書祭法言天子至士立廟之制多與禮異鄭氏謂凡鬼薦而不祭賈氏申之謂大夫之鬼薦於太祖壇士之鬼薦之於廟此尤無据右諸侯廟制曲禮君子將營宫室宗廟為先廐庫為次居室為後注重先祖及國之用王制寢不踰廟詩大雅緜其繩則直縮版以載作廟翼翼傳言不失繩直也乘謂之縮君子將營宫室宗廟為先廐庫為次居室為後築箋繩者營其廣輪方制之正也既正則以索縮其版上下相承而起廟成則嚴顯翼翼然乗聲之悮當為繩也何氏楷曰作起也亦剏造之謂廟宗廟也曹氏云此章俾立室家則定其規模面向若其營作則先於廟故其序如此右諸侯立廟大戴禮成廟將遷之新廟君前徙三日齋祝宗人及從者皆齋注謂親過髙祖則毁廟以昭穆遷之春秋穀梁傳曰作主壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也范寗云納新神故示有所加鄭𤣥士虞禮記注曰練而後遷也禮志云遷廟者更釁其廟而移故主焉按此篇成廟之文與榖梁相傅也徙之日君𤣥服從者皆𤣥服從至於廟注廟殯宫羣臣如朝位注列於廟門外如路門之位君入立於阼階下西向有司如朝位注立於門内如門外之位宗人擯舉手曰有司具請升君升祝奉幣從在左北面注祝主辭故在左神將遷故出在戸牖間南面矣再拜興祝聲三曰孝嗣侯某敢以嘉幣告於皇考某侯注言嗣以遷代不言國未忍有之也成廟將徙敢告注卒不奠幣者禮畢矣於此將有事於新廟君及祝再拜興祝曰請導君降立於階下奉衣服者皆奉以從祝注不言奉主而稱奉衣服者以毁易祖考誠人神之不忍從祝者祝所以導神也言皆者衣服非一稱周禮守祧職曰掌先王先公之廟祧其遺衣服藏焉奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃步君升車從者皆就車也注皆就車謂乘貳車者凡出入門及大溝渠祝下擯注神車祝為左故於步處則下至於新廟筵於戸牖間注始自外來故先於堂樽於西序下注四時之祭在室筵隩中在堂筵序下是以設樽恒於東方今惟布南面之席故置樽於西以因其便矣脯醢陳於房中注房西房也諸侯在右房也設洗當東榮南北以堂深注記因卿士當言東霤有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左注門左門西在位者皆辟也奉衣服者升堂皆反位君從升奠衣服於席上祝奠幣於几東君北向祝在左贊者盥升適房薦脯醢君盥酌奠於薦西反位君及祝再拜興祝聲三曰孝嗣侯某敢用嘉幣告於皇考某侯今月吉日可以徙於新廟敢告再拜君就東廂西面祝就西廂東面注東西俟也祝就西廂因其便也在位者皆反走辟如食間注走疾趨也擯者舉手曰請反位君反位祝從在左卿大夫及衆有司諸在位者皆反位祝聲三曰孝嗣侯某潔為而明薦之享注詩云潔蠲為饎是用孝享君及祝再拜君反位注東廂之位祝徹反位注西廂之位擯者曰遷廟事畢請就燕君出廟門卿大夫有司執事者皆出廟門告事畢注事謂内主藏衣服歛幣徹几筵之等乃曰擇日而祭焉注所以安神右諸侯遷廟蕙田案諸侯釁廟見前釁禮春秋莊公三年秋紀季以酅入於齊公羊傳魯子曰請後五廟以存姑姊妹注紀與齊為讐不直齊大紀小季知必亡故以酅首服先祖有罪於齊請為五廟後以酅共祭祀存姑姊妹也疏季為附庸而得有五廟者舊說云此諸侯之禮故直言以存姑姊妹不言兄弟子姪者謙不敢言之欲言兄弟子姪亦隨國亡但外出之女有所歸趣而已陳氏禮書公侯伯子男其衣服宫室車旗等衰雖殊其立五廟一也附庸之封雖不能五十里亦國君爾故亦五廟春秋書紀季以酅入於齊公羊傳曰紀季請後五廟以存姑姊妹則附庸之廟與諸侯同可知也右附庸五廟春秋莊公二十三年秋丹桓宫楹榖梁傳禮天子諸侯黝堊注黝堊黑色按黝黑也堊謂白堊也大夫蒼士黈注黈黄色丹楹非禮也二十四年春刻桓宫桷注桷榱也方曰桷員曰椽榖梁傳天子之桷斵之礱之加密石焉注以細石磨之諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也注非正謂刻桷丹楹也蕙田案此魯廟飾非禮也文公二年八月丁卯大事於太廟躋僖公注躋升也僖公閔庶兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之左氏傳逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮為其姊親而先姑也仲尼曰臧文仲不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虚器縱逆祀祀爰居三不知也注僖是閔兄不得為父子嘗為臣位應在下今居閔上故曰逆祀臣繼君猶子繼父帝乙㣲子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之同疏禮父子異昭穆兄弟昭穆同故僖閔不得為父子為穆耳當閔在僖上今升僖先閔故云逆祀二公位次之逆非昭穆亂也魯語云將躋僖公宗有司曰非昭穆也弗忌曰我為宗伯明者為昭其次為穆何常之有如彼所言似閔僖異昭穆者位次之逆如昭穆之亂假昭穆以言之非謂異昭穆也若兄弟相代即異昭穆設令兄弟四人皆立為君則祖父之廟即已從毁知其禮必不然故先儒無作此說公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖五年而再殷祭躋者何升也何言乎升僖公譏逆祀其逆祀奈何先禰而後祖也注太祖周公之廟陳者就陳列太祖前升謂西上禮昭穆指父子近取法春秋恵公與莊公當同南面西上隱桓與閔僖亦當同北面西上繼閔者在下文公縁僖公於閔公為庶兄置僖公於閔公上失先後之義故譏之傳曰後祖者僖公以臣繼閔公猶子繼父故閔公於文公亦猶祖也自先君言之隱桓及閔僖各當為兄弟顧有貴賤耳自繼代言之有父子君臣之道此恩義逆順各有所施也穀梁傳大事者何大是事也著祫嘗祫祭者毁廟之主陳於太祖未毁廟之主皆升合祭於太祖躋升也先親而後祖也逆祀也逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也故曰文無天無天者是無天而行也君子不以親親害尊尊此春秋之義也注舊說僖公閔公庶兄故文公升僖公之主於閔公之上耳僖公雖長已為臣矣閔公雖小已為君矣臣不可以先君猶子不可以先父故以昭穆父祖為喻寗曰即之於傳則無以知其然若引左氏以釋此傳則義雖有似而於文不辨髙宗殷之賢王猶祭豐於昵以致雉雊之變然後率修常禮文公顛倒祖考固不足多怪矣親謂僖祖謂莊猶疏先親而後祖親謂僖公祖謂閔公也僖繼閔而立子之繼父故傳以昭穆祖父為喻此於傳文不失而范氏謂莊公為祖其理非也范云文公顛倒祖考則是僖在莊上謂之夷狄猶自不然況乎有道之邦豈其若是國語夏父弗忌為宗伯烝將躋僖公宗有司曰非昭穆曰我為宗伯明者為昭其次為穆何常之有有司曰夫宗廟之有昭穆也以世次之長幼而等胄之親䟽也夫祀昭孝也各致齊敬於其皇祖昭孝之至也故工史書世宗祝書昭穆猶恐其踰也今將先禰而後祖自元王以及主癸莫若湯自稷以及王季莫若文武商周之烝也未嘗躋湯與文武為不踰也魯未若商周而改其常毋乃不可乎弗聽遂躋之注非昭穆謂非昭穆之次也父為昭子為穆僖為閔臣臣子一例而升閔上故曰非昭穆也明者為昭其次為穆明言僖有明徳當為昭閔次之當為穆也以僖為明而升之是先禰而後祖蕙田案昭穆之序百世不易兄弟同昭穆則同廟異室躋僖為先閔也兄弟叔姪之分不可以奪君臣而君臣不可以亂昭穆左傳杜注孔疏說皆不刋詳見前廟祧昭穆條下又案此魯廟逆祀非禮也春秋文公十有三年世室壞公羊傳世室魯公之廟也魯公周公子伯禽周公稱太廟魯公稱世室羣公稱宫疏周公稱太廟者即僖八年禘於太廟文二年大事於太廟是也魯公稱世室者即此經是也羣公稱宫者即武宫煬宫之屬是也此魯公之廟也曷為謂之世室世室猶世室也世世不毁也周公何以稱太廟於魯封魯公以為周公也榖梁傳大室屋壞者有壞道也譏不修也禮宗廟之事君親割夫人親舂敬之至也為社稷之主而先君之廟壞極稱之志不敬也蕙田案此魯不修廟非禮也成公三年新宫災三日哭公羊傳宣公之宫也注以無新宫知宣公之宫廟曷為謂之新宫不忍言也注親之精神所依而災孝子隱痛不忍正言也謂之新宫者因新入宫易其西北角示昭穆相繼代有所改更也其言三日哭何注指桓僖宫災不言三日哭廟災三日哭禮也注善得禮痛傷鬼神無所依歸故君臣素縞哭之哀公三年左氏傳五月辛卯桓宫僖宫災孔子在陳聞火曰其桓僖乎注言桓僖親盡而廟不毁宜為天所災疏禮諸侯親廟四焉髙祖之父即當毁其廟計桓之於哀八世祖也僖六世祖也親盡而廟不毁言其宜為天所災也服䖍云季氏出桓公又為僖公所立故不毁其廟其意或然公羊傳哀公三年五月辛卯桓宫僖宫災此皆毁廟也其言災何復立也何以書記災也注災不宜立其疏謂其宫不宜立若曰以不宜立故災之然禮記明堂位魯公之廟文世室也武公之廟武世室也注此二廟象周有文王武王之廟也世室者不毁之名疏文世室者魯公伯禽有文徳世世不毁其室故云文世室武世室者伯禽元孫武公有武徳其廟不毁故云武世室按成六年立武宫公羊左氏並譏之不宜立也又武公之廟立在武公卒後其廟不毁在成公之時作記之人因成王褒魯遂盛美魯家之事因武公其廟不毁遂連文而美之非實辭也王氏安石曰此言尤不可信周公為魯太祖而閒國實係魯公其廟不毁固有此理然不可援文王為比也若夫武公乃伯禽元孫春秋之初毁廟復立季氏為之也且季氏立已毁之廟者有二煬公之廟毁而復立煬公以弟繼兄者也武公之廟毁而復立武公舍長立少者也二者皆季氏不臣之心春秋書立武宫立煬宫以罪季氏鄭不考其故乃曰世室者不毁之廟夫昭穆逓遷則毁武公之廟禮也世室既逺毁而復立非禮也而比之於武之世室亦甚乖春秋之㫖矣陳氏禮書明堂位曰魯公之廟文世室武公之廟武世室然武公之於魯徇宣王立庶之非以階魯國攻殺之禍而豐功懿徳不著於世自武至閔其廟已在可遷之列矣春秋成公六年二月立武宫昭十五年有事於武宫左氏曰季文子以鞍之戰立武宫公羊曰武宫者何武公也立者不宜立也葢武宫立於成公之時歴襄及昭積世不毁故記者得以大之欲以比周之文武也蕙田案此魯紊廟制非禮也詩魯頌閟宫有侐實實枚枚傳閟閉也先妣姜嫄之廟在周常閉而無事孟仲子曰是禖宫也美箋閟神也姜嫄神所依故廟曰神宫廟疏毛以為將僖公先言上述逺祖周人立姜嫄之常閉而無事欲說姜嫄又先述其廟言其在周則謂魯無其廟以周立是非常故魯不得有也箋以詩人之作睹事興辭若魯無姜嫄之廟不當先述閟宫又卒章云新廟奕奕奚斯所作發首言閟宫於末言新廟則所新之廟新此閟宫首尾相承於理為順奚斯作之自然在魯不宜獨在周也且立廟而祭不宜以閟為名釋詁云毖神慎也俱訓為慎是閟神為神閟與毖字異音仝故閟為神也以其姜嫄神之所依故廟曰神宫凡廟皆是神宮以姜嫄之事說之於下故先言神宫以顯之徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若傳新廟閔公廟也有大夫公子奚斯者作是廟也荀子宥坐子貢觀於魯廟之北堂出而問於孔子曰鄉者賜觀於太廟之北堂未既輟還復瞻九葢被皆繼邪彼有說邪匠過絶邪注北堂神主所在也輟止也九當為北被當為彼傳寫悞耳葢音盍扇戸也皆繼謂其材木斷絶相接繼也子貢問北盍皆繼續彼有說邪匠過悞而遂絶之也家語作還瞻北葢皆斷焉彼有說邪匠過之也王肅注云觀北面之葢皆斷絶也孔子曰太廟之堂亦嘗有說注言舊曽說今則無也官致良工因麗節文注致極也官致良工謂初造太廟之時官極其良工良工則因隨其木之美麗節文而裁制之所以斷絶家語作官致良工之匠匠致良材盡其工巧葢貴之也楊氏曰家語作葢貴久矣尚有說也與此注少異非無良材葢曰貴之也非無良材大木不斷絶者葢所以貴文飾也附辨孔氏魯有九廟王制孔疏魯非但得立文王之廟又立姜嫄之廟及魯公武公之廟併周公及親廟除文王廟外猶八廟也蕙田案魯禘祭文王以周公配即在周公廟中亦猶周禘帝嚳於后稷之廟並未另立文王之廟謂魯有姜嫄廟葢據閟宫頌赫赫姜嫄言之然詩乃追述魯所由封而推本后稷之生以上及於姜嫄閟宫非祀姜嫄之詩魯亦何縁有姜嫄之廟孔說非也武宫煬宫旋廢旋立不在廟數魯實有七廟耳右魯廟孟子禮曰諸侯耕助以供齊盛夫人蠶繅以為衣服禮記曲禮國君下齊牛式宗廟注按齊右職云凡有牲事則前馬注云王見牲則拱而式又引曲禮云國君下宗廟式齊牛鄭注周官與此文異熊氏曰下齊牛式宗廟文悞當以周禮齊右注為正宜云下宗廟式齊牛祭統先期旬有一日宫宰宿夫人夫人亦散齋七日致齋三日君致齋於外夫人致齋於内然後㑹於太廟君純冕立於阼夫人副禕立於東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之君卷冕立於阼夫人副禕立於東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人授尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也禮器天道至教聖人至徳廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生於東月生於西此陰陽之分夫婦之位也君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也太廟之内敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位葢道求而未之得也設祭於堂為祊乎外故曰於彼乎於此乎祭統既内自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外内之官也官備則具備水草之菹陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣凡天之所生地之所長茍可薦者莫不咸在示盡物也外則盡物内則盡志此祭之心也祭義君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與詩云明𤼵不寐有懐二人文王之詩也祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀詩召南序采蘩夫人不失職也夫人可以奉祭祀則不失職矣箋奉祭祀者采蘩之事也不失職者夙夜在公也于以采蘩于沼于沚于以用之公侯之事傳公侯夫人執蘩菜以助祭神饗德與信不求備焉沼沚谿澗之草猶可以薦王后則荇菜也之事祭事也于以采蘩于澗之中于以用之公侯之宫傳宫廟也被之僮僮夙夜在公被之祁祁薄言還歸傳被首飾也僮僮竦敬也箋公事也早夜在事謂視濯溉饎爨之事禮記主婦髲髢云言我也祭事畢夫人釋祭服而去髲髢其威儀祁祁然而安舒無罷倦之失我還歸者自廟反其燕寢蕙田案諸侯祭禮其祼獻朝踐饋食酳尸之節皆上同天子已詳時享門至其等殺之㣲差儀文之小異則經傳無可考見今取傳記之言諸侯祭禮者著於篇學禮者通其意可也至通典所序諸侯祭禮與大夫士同恐未可據故不録右諸侯宗廟正祭禮記王制春曰礿夏曰禘秋曰嘗冬曰烝諸侯礿則不禘禘則不嘗嘗則不烝諸侯礿犆禘一犆一祫嘗祫烝祫蕙田案詳見禘祫門右諸侯時享犆祫周禮春官太史正歲年以序事頒之於官府及都鄙頒告朔於邦國注天子頒朔於諸侯諸侯藏之祖廟至朔朝於廟告而受行之疏鄭云天子班朔於諸侯諸侯藏之於祖廟者按禮記玉藻諸侯皮弁聽朔於太祖太祖即祖廟也至朔朝於廟告而受行之者諸侯約天子故縣之於中門匝日歛之藏之於祖廟月朔用羊告而受行之此經及論語稱告朔玉藻謂之聴朔春秋謂之視朔祝者人君入廟視之告者使有司讀祝以言之聽者聽治一月政令所從言之異耳鄭鍔曰恐其不告也故不曰頒正朔而謂之告朔春秋文公六年閏月不告月猶朝於廟注諸侯毎月必告朔聽政因朝宗廟文公以閏非常月故闕不告朔怠慢政事雖朝於廟則如勿朝故曰猶猶者可止之辭疏周禮太史頒告朔於邦國鄭𤣥云天子頒朔於諸侯諸侯藏之祖廟至朔朝於廟告而受行之論語云子貢欲去告朔之餼羊是用特羊告於廟謂之告朔人君即以此日聽視此朔之政謂之視朔十六年公四不視朔僖五年傳曰公既視朔是也視朔者聽治此月之政亦謂之聽朔玉藻云天子聽朔於南門之外是也其日又以禮祭於宗廟謂之朝廟周禮謂之朝享司尊彛云追享朝享是也其歲首為之則謂之朝正襄二十九年正月公在楚傳曰釋不朝正於廟是也告朔視朔聽朔朝廟朝享朝正二禮各有三名同日而為之也天子告朔於明堂朝享於五廟諸侯告朔於太廟朝享自皇考以下三廟耳皆先告朔後朝廟朝廟小於告朔文公廢其大而行其小故云猶朝於廟公羊傳曰猶者可止之辭也天子𤣥冕以視朔皮弁以日視朝諸侯皮弁以聽朔朝服以日視朝其閏月則聽朔於明堂闔門左扉立於其中聽政於路寢門終月故於文王在門為閏蕙田案周禮司尊彛四時之間祀追享朝享先鄭云謂禘祫也在四時之間故曰間祀其解已的而後鄭易之謂追享追祭遷廟之主以事有所請禱朝享謂受朝政於廟春秋傳曰閏月不告朔猶朝於廟此以祭法之壇墠有禱釋追享以五廟月祭釋朝享而又以告朔朝廟附㑹月祭之說故玉藻疏春秋疏穀梁疏公羊疏論語注疏並從後鄭不知祠禴烝嘗追享朝享所謂六享也宗廟六享乃去禘祫不數而以請禱告朔足之已自不倫況月祭乃薦新之祭與告朔朝廟何與與朝享祫祭又何與乎聽朔在明堂月祭則在五廟朝廟行於每月朝享間於四時各有攸當何可混三者而一之耶左氏傳閏月不告朔非禮也閏以正時時以作事事以厚生注經稱告月傳稱告朔明告月必以朔生民之道於是乎在矣不告閏朔棄時政也何以為民榖梁傳不告月者不告朔也不告朔則何為不言朔也閏月者附月之餘日也積分而成於月者也天子不以告朔而喪事不數也注閏是叢殘之數非月之正故吉凶大事皆不用也猶之為言可以已也公羊傳曷為不告朔天無是月也閏月矣何以謂之天無是月非常月也猶者何通可以已也啖氏助曰公榖言不告月為是非也按經文言不告月明當告也朱子曰閏者所以定四時成歲天子以為月而頒之為諸侯而不奉以告是輕正朔而慢時令也公穀以為附月之餘日又曰天子不以告朔此說已非而猶字之義諸傳皆以為可已之辭大率皆譏其舍大政而謹小禮獨胡傳以為幸其不已之辭以我愛其禮証之則此義精矣文公十六年夏五月公四不視朔注諸侯每月必告朔聽政因朝於廟今公以疾闕不得視二月三月四月五月朔也春秋十二公以疾不視朔非一也義無所取故特舉此以表行事因明公之實有疾左氏傳疾也榖梁傳天子告朔於諸侯諸侯受乎禰廟禮也注每月天子以朔政班於諸侯諸侯受而納之禰廟告廟以羊今公自二月不視朔至於五月是後祝朔之禮遂廢故子貢欲去其羊公四不視朔公不臣也以公為厭政以甚矣公羊傳公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也春秋襄公二十九年左氏傳春王正月公在楚釋不朝正於廟也注釋解也告廟在楚解公所以不朝正論語子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮注鄭曰牲生曰餼禮人君每月告朔於廟有祭謂之朝享魯自文公始不視朔子貢見其禮廢故欲去其羊包曰羊存猶以識其禮羊亡禮遂廢馮氏椅曰是時諸侯固自紀元而天子所存者僅正朔此禮葢甚重也蕙田案古天子頒正朔於天下均次每月所行之政以敬授民時諸侯受之王朝藏之祖廟毎月朔則請於祖廟而行政焉此敬天勤民尊王親祖之義也告朔之文見周禮大史頒告朔於邦國論語子貢欲去告朔之餼羊春秋文六年十六年左氏公羊榖梁傳並云告朔又曰告月見春秋文六年閏月不告月又曰視朔見文十六年公四不視朔又曰聽朔見玉藻天子聽朔於南門之外諸侯聽朔於太廟其在嵗首謂之朝正襄二十九年春王正月公在楚左氏傳曰釋不朝正於廟是也是五者稱名不同其禮則一但主乎告廟而言則曰告朔告月朝正主乎聽政而言則曰視朔聽朔言非一端亦各有當而已今以經傳所云告朔者入此巻其云聽朔者别入嘉禮朝賀門又案天子聽朔於明堂明其受之於天也諸侯聽朔於祖廟明其受之於祖也天子以特牛諸侯以特羊告廟之禮尊卑之次也春秋譏閏月不告朔葢一月有一月之政閏雖無常而政有常以閏月而不告則一月之政不舉故左氏以為棄時政是也公羊以為天無是月榖梁以䘮不數閏為証並以不當告為説其義非矣告朔必有朝廟之禮春秋書猶朝於廟是幸其禮之不盡廢公羊榖梁均以猶為可已之辭豈聖人愛禮之意乎告朔雖有特牲朝廟别無祭禮注疏皆引司尊彛朝享及祭法月祭為説豈知朝享乃大祫之祭且有祼獻朝踐饋食之文其禮煩重非每月可行之事月祭又薦新之祭與告朔朝廟無與牽合三禮為一禮則鄭賈孔之誤也右諸侯宗廟告朔通典後漢獻帝封曹操為魏公依諸侯禮立五廟於鄴後進爵為王無所改易圖書集成曹操春祠令曰議者以為祠廟上殿當解履吾受錫命帶劍不解履上殿今有事於廟而解履是尊先公而替王命敬父祖而簡君主故吾不敢解履上殿也又臨祭就洗以手擬水而不盥夫盥以潔為敬未聞擬而不盥之禮且祭神而神在故吾親受水而盥也又降神禮訖下階就幕而立須奏樂畢竟似若不愆烈祖遲祭不速訖也故吾坐俟樂闋送神乃起也受胙納神以授侍中此為敬恭不終實也古者親執祭祀故吾親納於神終抱而歸也仲尼曰雖違衆吾從下誠哉斯言也晉書髙陽王睦傳睦譙王遜之弟也魏安平亭侯武帝受禪封中山王睦自表乞依六蓼祀臯陶鄫把祀相立廟祀下太常議博士祭酒劉熹等議禮記王制諸侯五廟二昭二穆與太祖而五是則立始祖之廟謂嫡統承重一人得立耳假令支弟並為諸侯始封之君不得立廟也今睦非為正統若立祖廟中山不得並也後世中山乃得為睦立廟為後子孫之始祖耳詔下禮官博議通典兄弟俱封各得立禰廟議晉中山王睦上言乞依六蓼之祀臯陶把鄫之祀相立廟按睦譙王之弟兄弟俱封今求各立禰廟下太常議博士祭酒劉熹等議王制諸侯五廟是其立始祖為嫡統承重一人得立祖禰之廟羣弟雖並為諸侯始封之君未得立廟也唯令正統當立祖廟中山不得並也後代中山乃得為睦立廟為後代子孫之始耳司徒荀顗議以為宜各得立廟時詔從顗議又詔曰禮諸侯二昭二穆與太祖之廟而五太祖即始封君也其廟不毁前詔以譙王中山王父非諸侯尊同禮不相厭故欲令得各祭以申私恩也然考之典制事不經通若安平王諸子並封皆得立廟祭禰親盡數終其廟當毁無故下食支庶之國猥更隨昭穆而廢非尊祖敬宗之義也其如前奏施行虞喜曰譙與中山王皆始封之君父非諸侯尊同體敵無所為厭並立禰廟恩情兩伸荀議是也詔書所諭恐非禮意令上祭四代自以諸侯位尊得伸其恩祭及四代不論毁且不毁為始封之君則譙王雖承父統禰廟亦在應毁之例不得長立也又安平獻王自為始封諸子雖别封而同為諸侯諸侯尊同故不復各立此則公子為諸侯不得立禰廟也而譙王父非諸侯使與諸侯同列不得並祭或難曰禮庶子不祭禰明其宗也若俱得祭父則並統二嫡非明其宗也答曰若宗子與庶子位俱為士禰已有廟無為重設與公子為諸侯不立禰廟同也若尊卑不同則已恩得施並祭無嫌也禮大夫三廟太祖百世不遷者也使大夫之後有庶子為諸侯者當上祭四代四代之前不得復祭若當奪尊則大夫太祖為廢其祀以此推之明得兼祭一得恩得伸隨代而毁一者繼太祖百代不替也徐禪非荀是虞曰愚等謂尊祖敬宗禮之所同若列國秩同則祭歸嫡子所以明宗也嫡輕庶重禮有兼享所以致孝也今譙王為長既享以重祿中山之祀無以加焉二國兩祭禮無所取詔書禁之是也詔稱安平獻王諸子並封不可各令立廟是荀暢之議美矣然虞謂中山父非諸侯而祭更闕疑如禮意也虞徴士答衛將軍虞喜以嫡為大夫庶為諸侯諸侯禮重應各立廟禪謂為允矣喜曰尊同體敵恩情兩伸諸兄弟俱始為諸侯命數無降今士庶始封之君尚得上祭四代不拘於嫡以貴異之况已尊同五等更嫌不得其均用豐禮並祭四代所以寵之理非僭宗昔周公有王功魯立文王之廟鄭有平王東遷之勲特令祖厲是為榮之非許享之祭在於周室魯鄭豈得過之哉宋庾蔚之謂大夫士尊不相絶故必宗嫡而立宗承别子之嫡謂之宗子收族合食禮正一宗者也故特加齊衰三月之服至四小宗則物無所加唯昆弟之為人後姊妹雖出一降而已曽子問宗子為士庶子為大夫以上牲祭於宗子之家鄭云貴禄重宗也小記庶子不祭禰者明其宗也至諸侯尊絶大夫不得以太牢祭卿大夫之家是以經無諸侯為宗服文則知諸侯奪宗各自祭不復就宗祭也又諸侯别子封為國君亦得各祭四代何以知其然諸侯既不就祭人子不可終身不得享其祖考居然别祭四代或疑神不兩享舉魯鄭祭文祖厲足以塞矣徐以弟祿卑於兄不得兩祭虞以為可兩祭由於父非諸侯又未善也蕙田案兄弟並封祭歸嫡子無兩國並祭之禮劉喜虞喜之説同為正義至諸侯奪宗葢又别自為義不得牽混宗元按兄弟並封祭歸嫡子固宗法之常禮之正也然是乃但有封爵未嘗建國則同在京師自可助祭於宗子之家耳若遂建國則必宗廟與社稷並建方成為國豈有有社稷而無宗廟之國耶此禮不知如何夫王子出封則諸侯不得祖天子固不得立廟既非王子則或援宗子去國之禮而用庶子攝祭之儀但少減殺其數仍與宗法不亂其亦可通歟且王子始封竟曠世無宗廟亦恐非體或立廟而姑虚其位耶抑别有法以通之耶謹識所疑以俟明禮者正之通典晉安昌公荀氏進封大國祭六代荀氏祠祭云今祭六代末立廟蹔以㕔事為祭室須立廟如制備張祖髙問謝沈曰諸侯祭五廟先諏日卜吉而行事為祭五廟諸畢耶按儀視殺延尸厥明行事晏朝乃闋五廟盡爾將終日不了若異日未見其義沈答曰五廟同時助祭者多晏朝乃闋季氏逮闇繼之以燭雖有強力之容肅敬之心皆倦怠也子路為宰與祭室事交乎户堂事交乎階晏朝而退孔子聞之曰誰謂由不知禮賀循祭義云祭以首時及臘注首時者四時之初月嵗凡五祭將祭前期十日散齋不御不樂不弔前三日沐浴改服居於齋室不交外事不食葷辛靜志虚心思親之存及祭施位范注祀禮云凡夫婦者皆同席貴賤同也兄弟同席謂未婚也牲大夫少牢士以特豕祭前之夕及腊鼎陳於門外主人即位西面宗人袒告充主人視殺於門外主婦視饎於西堂下設洗於阼階東南酒醴甒於房戸牲皆體解平明設几筵東面為神位進食乃祝祝乃酌奠拜祝訖拜退西面立少頃酌酳禮一獻拜受酢飲畢拜婦亞獻薦棗栗受酢如主人其次長賔三獻亦以燔從如主人次及兄弟獻始進爼庶羞衆賔兄弟行酧一徧而止徹神爼羮飯為賔食食物如祭餕畢酌酳一周止佐徹神饋饌於室中西北隅以為厭祭既設閉牖户宗人告畢賔乃退凡明日將祭今夕宿賔祭日主人羣子孫宗人祝史皆詣㕔事西面立以北為上有薦新在四時仲月大夫士有田者既祭而又薦無田者薦而不祭禮貴勝財不尚苟豐貧而不逮無疑於降大夫降視士士從庶人可也晉賀循云古者六卿天子上大夫也今之九卿光祿大夫諸秩中二千石者當之古之大夫亞於六卿今之五營校尉郡守諸侯二千石者當之上士亞於大夫今之尚書丞郎御史及秩千石縣令在官六品者當之古之中士亞於上士今之東宫洗馬舍人六百石縣令在官七品者當之古之下士亞於中士今之諸縣長丞尉在官八品九品者當之又不及飯菽飲水皆足致敬無害於孝或問諸侯廟博士孫毓議曰禮諸侯五廟二昭二穆及太祖也今之諸王實古諸侯也諸侯不得祖天子當以始封之君為太祖百代不遷或謂之祧其非始封親盡則遷其冲幼紹位未踰年而薨者依漢舊制不列於宗廟四時祭祀於寢而已又王氏問謝沈云祖父特進衛將軍海陵亭恭侯應立五廟不沈答亭侯雖小然特進位髙似諸侯也又問曽祖父侍御史得入特進恭侯廟不答父為士子為諸侯尸以士服祭以諸侯之禮御史雖為士應自入恭侯廟也邵戢議桓宣武公立廟云禮父為士子為諸侯祭以諸侯則宜立親廟四封君之子則封君髙祖親盡廟毁封君之孫則封君曾祖親盡廟毁封君之曾孫則封君之祖親盡廟毁封君之元孫則封君之父親盡廟毁封君元孫之子則封君親盡廟宜毁然以太祖不毁五廟之數於是始備至封君元孫之孫則毁封君之子封君之子元孫之孫復毁封君之孫如此隨代迭毁以至百代蕙田案孫毓議極是可為諸侯宗廟之凖繩矣咸寜三年燕國遷廟主當之國博士孫繁議按禮凡告以特牲又禮盛主以簟笥載以齋車每舍殿焉今王之國迎廟主而行宜以𤼵日夙興告廟迎主今無齋車當以犢車二主同載共祠合於古宗祀國遷掌奉主祏當侍從主車在王鹵簿前設導從每頓止停主車於中門外左設脯醢醴酒之奠而後即安之蕙田案此遷廟議不悖於古宋劉裕初受晉命為宋王建宗廟於彭城從諸侯五廟之禮宋書禮志孝武帝孝建元年七月辛酉有司奏東平沖王年穉無後惟殤服五月雖臣不殤君應有主祭而國是追贈又無其臣未詳毁靈立廟為當他祔與不輒下禮官詳議太學博士臣徐宏議王既無後追贈無臣殤服既竟靈便合毁記曰殤與無後者從祖祔食又曰士大夫不得祔於諸侯祔與祖之為士大夫者按諸侯不得祔於天子沖王則宜祔諸祖之廟為王者應祔長沙景王廟詔可蕙田案沖王殤祔諸祖之廟為王者徐議是孝武帝大明六年十月丙寅有司奏故晉陵孝王子雲未有嗣安廟後三日國臣從權制除釋朔望周忌應還臨與不祭之日誰為主太常丞庾蔚之議既葬三日國臣從權制除而釋靈筵猶存朔望及期忌諸臣宜還臨哭變服衣巾夾使上卿主祭王既未有後又無三年服者期親服除之而國尚存便宜立廟為國之始祖服除之日神主暫祔食祖廟諸王不得祖天子宜袝從祖國廟還居新廟之室未有嗣之前四時饗薦常使上卿主之左丞徐爰參議以蔚之議為允詔可蕙田案始封無後暫祔王廟上卿主祭俟立後立廟此議甚允通典大明七年有司奏晉陵國立孝王廟依廬陵等國例一嵗五祭二國以王有衡陽王服今年不祀尋國未有嗣王三卿主祭應同無服之例與不左丞徐爰議嗣王未立將來承嗣未知疎近豈宜空計服屬以虧敬詔可宋書禮志大明八年有司奏故齊敬王子羽將來立後未詳便應作主立廟為須有後之日未立廟者為於何處祭祀游擊將軍徐爰議以為國無後於制除罷始封之君實存承嗣皇子追贈則為始祖臣不殤君事著前凖豈容虚闕烝嘗以俟有後謂立廟作主三卿主祭依舊通關博議以爰議為允令便立廟廟成作主依晉陵王近例先暫祔廬陵考獻王廟祭竟神主即還新廟未立後之前常使國上卿主祭蕙田案此與前庾蔚之議同北魏書禮志神龜初靈太后父司徒胡國珍薨贈太上秦公時疑其廟制太學博士王延業議曰按王制云諸侯祭二昭二穆與太祖之廟而五又小記云王者立四廟鄭𤣥云髙祖已下與始祖而五明立廟之正以親為限不過於四其外有大功者然後為祖宗然則無太祖者止於四世有太祖乃得為五禮之正文也文王世子云五廟之孫祖廟未毁雖為庶人冠娶妻必告鄭𤣥云實四廟而言五廟者容髙祖為始封君之子明始封之君在四世之外正位太祖乃得稱五廟之孫若未有太祖已祀五世則鄭無為釋髙祖為始封君之子也此先儒精義當今顯証也又䘮服傳曰若公子之子孫有封為國君者則世世祖是人也不祖公子鄭𤣥云謂後世為君者祖此受封之君不得祀别子也公子若在髙祖已下則如其親服後世遷之乃毁其廟爾明始封猶在親限故祀止髙祖又云如親而遷尤知髙祖之父不立廟矣此又立廟明法與今事相當者也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七注云言至子孫則初時未備也此又顯在緯籍區别若斯者也又晉初以宣帝是始封之君應為太祖而以猶在祖位故唯祀征西已下六世待世世相推宣帝出居太祖之位然後七廟乃備此又依凖前軌若重規襲矩者也竊謂太祖者功髙業大百世不遷故親廟之外特更崇立茍無其功不可獨居正位而遽見遷毁且三世以前廟及於五𤣥孫已後祀止於四一與一奪名位莫定求之典禮所未前聞今太上秦公疏爵列土大啓河山𫝊祚無窮永同帶礪實有始封之功方成不遷之廟但親在四世之内名班昭穆之序雖應為太祖而尚在禰位不可逺探髙祖之父以合五者之數太祖之室當須世世相推親盡之後乃出居正位以備五廟之典夫循文責實理貴允當考剏宗祊得禮為美不可茍薦虚名取榮多數求之經記竊謂為允又武始侯本無采地於皇朝制令名凖大夫案如禮意諸侯奪宗武始四時烝嘗宜於秦公之廟博士盧觀議諸侯有祖考之廟祭五世之禮五禮正祖為輕一朝頓立而祖考之廟要待六世之君六世以前虚而蔑主求之聖㫖未為通論曾子問曰廟無虚主虚主惟四祖考不與焉明太祖之廟必不空置且天子逆加二祧得併為七諸侯預立太祖何為不得為五乎今始封君子之立禰廟頗似成王之於祧孫卿曰有天子者事七世有一國者事五世假使八世天子乃得事七六世諸侯方通祭五推情凖理不其謬乎雖王侯用禮文辭不同三隅反之自然昭灼且文宣公方為太祖世居子孫今立五廟竊謂為是侍中太𫝊清河王懌議太學博士王延業及盧觀等各率異見案禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五並是後世追論備廟之文皆非當時據立神位之事也今相國秦公初構國廟追立神位惟當仰祀二昭二穆上及髙曾四世而已何者秦公身是始封之君將為不遷之祖若以功業隆重越居正室恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐數滿便毁非禮意也昔司馬懿立功於魏為晉太祖及至子晉公昭乃立五廟亦祀四世至於髙曾太祖之位虚俟宣文待其𤣥裔數滿乃止此亦前代之成事方今之殷鑒也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神仍依昭穆之序要待子孫世世相推然後出居正位耳宜依博士王延業議定立四主親止髙曾且虚太祖之位以待子孫而備五廟焉蕙田案王延業謂髙祖之父不當立廟義本注疏其理為長盧觀欲以髙祖之父權升太祖廟遞遷而遞毁之義無稽據懌左盧右王所見最的孝靜帝武定六年二月將營齊獻武王廟議定室數形制兼度支尚書崔昂等議案禮諸侯五廟太祖及親廟四今獻武王始封之君便是太祖既通親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一夾室厦頭徘徊鴟尾又案禮圖諸侯止開南門而二王後祔祭儀法執事立於廟東門之外既有東門明非一門獻武禮數既隆備物殊等凖據今廟宜開四門内院南面開三門餘面及外院四面皆一門其内院墻四面皆架為歩廊南出夾門各置一屋以置禮器及祭服内外門墻並用赭堊廟東門道南置齋坊道北置二坊西為典祠廨併厨宰東為廟長廨併置車輅其北為養犧牲之所詔從之隋書禮儀志北齊王及五等開國執事官散從二品以上皆祀五世牲用太牢通典唐制凡文武官二品以上祠四廟三品以上須兼爵四廟外有始封祖通祠五廟文獻通考髙宗儀鳯三年於文水縣置太原王武士彠廟徳宗貞元十三年敇贈太傅馬燧祔廟宜令所司供少牢仍給鹵簿燧北平莊武王宋史禮志髙宗時少府昭慶節度儀同三司平樂郡王韋淵請建家廟賜以祭器文獻通考宋淳熈五年權户部尚書韓彦古請以臨安前洋街賜第建父世忠家廟就賜舍宇房緡以給嵗時祭祀之用輔臣論世忠廟器中書舍人陳騤以禮難行駁之上問本朝羣臣廟制如何賜器如何時趙雄等奏仁宗雖因赦論建廟未暇行也唯文彦博曾酌唐制為之未嘗賜器政和始命禮制局範銅以賜宰臣蔡京等紹興又用京例賜秦檜其張俊楊存中吴璘軰皆援檜以請上曰漢唐而下既未有賜器祭者唯器與名不可以假人命禮官攷歴代及本朝之制八年十月乙卯中書舍人崔敦詩謂中興廟器斷自宸𠂻改用竹木省去雕文然一啓其端援者必衆謂宜詳講必傅古義乃協今宜禮賜圭瓚然後為鬯葢諸侯嗣位不敢専祭待命於天子必賜以圭瓚者祭祀交神唯灌為重舉其重以賜之而餘得自用初不盡賜之也臣謂銅為祭器可以傳逺今以竹木為之壊而不易則墜上之賜易而自製則棄君之命宜略倣古制命有司鑄爵勺各一賜之餘俾祀官定當用之式續圖以畀俾自製以竹木從之寜宗嘉泰元年太傅永興節度平原郡王韓侂胄奏曾祖𤦺效忠先朝奕世侑食而臣居止粗備家廟猶闕請下禮官考其制俾自建之頒祭器之式以竹木製毋紊有司詔下禮官討論毎位以籩豆皆十有二簠簋皆四壺尊壺罍鉶豆爼登洗皆二爵坫燭臺皆二坫一及巾杓篚以髹匣載以腰輿束以紫絛請下文思院製髹匣腰輿皆十紫紬帶二十十月己卯詔特鑄賜之二年通判嚴州張宗愈奏大父循忠烈王俊書勛盟府請以賜第舊址建家廟乞討論其制命文思院鐫誌祭器以賜詔令遵韓世忠廟器之制開禧三年忠州刺史劉伯震奏祖鄜武僖王光世復辟功請以賜第舊址立家廟從之王圻續通考孔氏家廟在衢州府西宣聖四十八代孫襲封衍聖公端友從宋髙宗南渡賜居衢州紹興六年詔權以衢州學為家廟賜田奉祀明太祖洪武二年立滁陽王廟以祀郭子興至是又立廟墓次祀之以其鄰家宥氏世為奉祀守王墳十六年冬十一月立揚王祠於墓次命有司嵗春秋祀之揚王淳皇后父陳某先是立祠太廟東嵗遣大臣祀已而中都守臣上言公葬地在下縣盱眙宜崇華表兼建廟祠太祖曰朕固聞之命中書省建廟盱眙墓次樹神道碑令儒臣宋濂撰文仍設祠祭署及灑掃户五家癸亥冬勅立滁陽王廟碑於墓所先是廟成上親稿王事實召太常司丞張來儀撰碑文稱王勇悍善戰唯不屈人下初元亂上避兵入濠王識上非常人遂以孝慈皇后妻之且屬以兵事多密謀以故上起兵定天下王之力也後王卒歸葬滁州王夫人張氏生三子長戰沒次為人所陷㓜與羣小隂謀伏罪次夫人張氏生一女入為上妃生蜀王豫王如意王洪武元年上正大位追思實帝業所始乃封為滁陽王建廟墓所命有司嵗時率滁人祭之至是勅賜樹碑是年立徐王廟於宿州王姓馬孝慈皇后父也王缺嗣息至是追封為王妻鄭氏為徐王夫人祠廟立於太廟東以祭既而稽古無文乃即王所生里立廟命有司春秋祭之禮部陶凱撰文立石仍設祠祭署以王鄰家武氏世為奉祠守王墳灑掃户九十家蕙田案自漢而後封建不復常行王朝卿士雖位極班聨而無分茅胙土之實此古今一大殊制也朱子答汪尚書曰古者天子之三公八命及其出封然後得用諸侯之禮葢仕於王朝者其禮反有所厭而不得伸則今之公卿宜亦未得全用諸侯之禮也此論似為得宜通典諸侯士大夫祭禮合為一門通考雖分為二然以未封爵之卿士俱入諸侯門似為未協今竊取朱子之意以晉爵為王者列於諸侯餘五等則歸一品二品班大夫士廟祭焉右漢至明諸侯廟祭五禮通考卷一百八
