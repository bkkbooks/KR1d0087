body:
  text: 五禮通考卷二百七刑部尚書秦蕙田撰嘉禮八十體國經野詩商頌𤣥鳥奄有九有九有九州也已疏言分天下為九分皆為有故知九有長發帝命式于九圍傳九圍九州也下疏謂九州為九圍益以九分天各為九處如規圍然故謂之九圍也書咸有一德以有九有之師爾雅釋地兩河間曰冀州注自東河至西河河南曰豫州注自南河至漢河西曰雝州注自西河至黒水漢南曰荆州注自漢南至衡山之陽江南曰揚州注自江南至海濟河間曰兖州注自河東至濟濟東曰徐州注自濟東至海燕曰幽州注自易水至北狄齊曰營州注自岱東至海此盖殷制疏此釋九州之名及其界域也李廵曰兩河清其氣清厥性相近故曰冀冀近也河南其氣著宻厥性安舒故曰豫豫舒也河西其氣蔽壅厥性急凶故曰雍也兼得梁州之地西北之位陽所不及隂壅也漢南其氣燥剛禀性强梁故曰荆荆强也江南其氣燥動厥性輕楊太康地記云以揚州漸太陽位天氣奮揚履正舎文故取名焉李廵曰濟河間其氣專質厥性從謙故曰兖衮信也淮海間其氣寛舒禀性安徐故曰徐徐舒也營州則青州之地也太康地記云東方少陽其色青其氣清歲之首事之始故以青為名云此蓋殷制者以此文上與禹貢不同下與周禮文異禹九州有青徐梁而無幽并營此夏制也周有青并幽而無徐梁營是周制也此有徐幽營而無青梁并疑是殷制也漢書地理志殷因於夏無所變改王氏應麟曰爾雅九州孫炎云此蓋殷制孔氏云孫炎以爾雅之文與禹貢不同於周禮又異故疑為殷制耳亦無明文言殷改夏也地理志云殷因於夏無所變改陸氏曰禹貢有青徐梁而無并幽營爾雅有徐幽營而無青梁并職方有青幽并而無徐梁營三代不同故也陳氏云商書言九有之師商頌言奄有九有式于九圍王制於商亦言九州千七百七十三國則商之九州蓋亦襲夏而已通典云塗山之㑹萬國四百年間遞相兼并殷湯受命其能存名三千餘國亦為九州冀州在兩河之間西則龍門之河東則降水大陸之河降水大陸今冀貝二州界胡氏渭曰爾雅之九州有冀幽而無并郭璞以為殷制兩河間曰冀州注云自東河至西河燕曰幽州注云自易水至北狄蓋殷分夏冀州之東北以為幽而正北并州之地仍屬冀視虞之冀則大矣爾雅河南曰豫州漢南曰荆州蓋荆豫二州禹貢以荆山為界爾雅則以漢水為界故郭注豫州云自南河至漢也殷割淮南江北之地以益徐故爾雅云江南曰揚州蓋視夏之揚為小然其西又得禹貢荆州之地何以知之按導水文漢至大别入江而爾雅云漢南曰荆州蓋漢水之名至大别山而止其曰漢南者謂大别以西漢水之南也荆揚之界當於此分然則殷揚州之境縮於北而贏於西與夏之揚廣狹適相當矣殷有荆而無梁爾雅漢南曰荆州注云自漢南至衡山之陽漢水出嶓冢梁州山也自嶓冢以東至大别凡在漢水之南者皆為荆州然則禹貢梁州之地荆亦兼之不盡歸於雍自大别以東江南之地為揚所侵而大别以西漢東之地亦皆入於豫荆州之境縮於東北而贏於西南殷因於夏所損益可知也爾雅濟河間曰兖州注云自河東至濟與禹貢同其徐州自濟東至海亦與禹貢同齊曰營州注云自岱東至海邢昺疏云營州即青州地也博物志云營與青同海東有青邱齊有營邱豈是名乎蓋殷改青曰營青地入營未嘗并於徐也林少穎謂爾雅不言青州者青并於徐也蔡傳取之不知攷矣爾雅濟東曰徐州郭注云自濟東至海似為禹貢徐州之舊域然堯時揚州之境跨江北至淮而爾雅云江南曰揚州蓋殷割淮南江北之地以益徐視堯時之徐則大矣爾雅河西曰雝州則華山以南不在界中可知殷之雍實小於禹貢也詳見周職方詩商頌𤣥鳥邦畿千里惟民所止地理通釋商都世紀契始封商在禹貢太華之陽上洛商是也括地志商州東八十里商洛縣本商邑古之商國卨所封漢𢎞農郡商縣世本曰契居番水經注渭水東逕巒都城北故潘邑契所居闞駰曰蕃鄭西今巒城世本昭明居砥石荀子成相云契𤣥王生昭明居於砥石遷於商注砥石地名未詳所在或曰即底柱也至相土乃遷商邱相土徙商邱故陶唐氏之火正閼伯之所居也春秋傳曰閼伯居商邱祀大火相土因之故商主大火謂之辰故辰為商星杜預云今梁國睢陽宋都括地志宋州城古閼伯之墟即商邱也今應天府宋城縣相土昭明子也書序湯始居亳從先王居史記正義括地志云宋州榖熟縣西南三十五里南亳故城即南亳湯都也宋州北五十里蒙城為景亳湯所盟地因景山為名河南偃師為西亳帝嚳及湯所都盤庚亦都之湯即位居南亳後徙西亳孔安國云帝嚳都亳湯自商邱遷故從先王居通典曹州考城有北亳亦曰景亳詩正義皇甫謐云學者咸以亳在河洛之間今河南偃師西二十里有尸鄉亭是也謐考孟子稱湯居亳與葛為鄰案地理志葛今梁國寜陵之葛鄉即今拱州之寜陵寜陵去偃師八百里而使亳衆為耕非其理也今梁國自有二亳南亳在穀熟即今南京之穀熟北亳在蒙即今拱州之考城古謂之蒙漢謂之薄非偃師也殷有三亳二在梁國一在河洛之間榖熟為南亳即湯都也蒙為北亳即景亳是湯所受命地偃師為西亳即盤庚所徙也立政曰三亳阪尹是也鄭康成注立政云三亳者湯舊都之民分為三邑其長居險故曰阪尹盖東成皋南轘轅西降谷也是鄭以三亳為分亳民於三處非三處有亳地也杜預以景亳為周地河南鞏縣西南有湯亭或說即偃師也漢書音義臣瓚案湯居亳今濟隂薄縣以經無正文各為異說地名變昜難得而詳林氏曰鄭氏云亳在河南偃師鄭說可從蓋偃師在河南其地與周洛邑相近乃四方朝覲貢賦道里取中之地商頌曰古帝命武湯正域彼四方邦畿千里惟民所止商邑翼翼四方之極使非河南則頌未必如此周禮疏曰堯治平陽舜治安邑唯湯居亳得地中通志亳故京兆杜縣有亳亭是也杜城今在長安南故太史公云禹興西𦍑湯起亳也及湯有天下始居宋地復命以亳今南京穀熟是也書正義契至湯八遷契居商昭明居砥石相土居商邱湯居亳有此四遷其餘四遷未詳聞也仲丁遷於囂世紀今河南之敖倉是也史說遷於隞正義括地志滎陽故城在鄭州滎澤縣西南十七里殷時敖地也世紀云仲丁自亳徙都敖周時名北制在敖山之陽後屬韓為滎陽縣河亶甲居相在河北括地志故殷城在相州内黄縣今屬大名府東南十三里即河亶甲所築都之故名殷城相州安陽本盤庚所都即北冢殷墟南去朝歌城百四十六里竹書紀年盤庚自奄遷於北冢曰殷墟南去鄴四十里是舊都城西南三十里有洹水南岸三里有安陽城西有城名殷墟所謂北冢也安陽城即相州外城水經注洹水逕殷墟項羽與章邯盟於此地類要安陽縣本殷墟所謂北冢者亶甲城在西北五里四十歩洹水南岸後魏天平四年立相州取河亶甲居相之義治鄴祖乙圮於耿為河所毁地理志河東皮氏縣耿鄉古耿國括地志絳州龍門縣東南十二里耿城故耿國史記祖乙遷於邢皇極經世祖乙圮于耿徙居邢通典邢州祖乙遷于邢即此地亦邢國也括地志邢國故城在邢州外城内西南角地理志襄國縣故邢國今信德府龍岡縣書正義汲冢古文云盤庚自奄遷于殷盖祖乙圯于耿遷于奄括地志兖州曲阜縣奄國之地盤庚五遷將治亳殷盤庚遷於殷曰先王不常厥邑於今五邦馬氏曰五邦謂商邱亳嚻相耿也林氏曰序言五遷自湯至盤庚併數之此言五邦又言今不承于古則是盤庚之前遷者有五考之前序但有亳囂相耿之四者併盤庚數之則盤庚歸亳不應謂之五邦太史公謂祖乙自耿遷邢汲蒙紀年謂祖乙遷奄此與序戾不可據意者更有遷而史失之皇極經世盤庚五遷復歸于亳改號曰殷三代世表云徙河南世紀盤庚復南居亳之殷地今偃師是也周氏曰商人稱殷自盤庚始自此以前惟稱商而已自盤庚遷都之後於是殷商兼稱或只稱殷通志溵水出陽城東至西華汝陽入于潁水與潁水合流古人并謂潁為溵故命以殷焉詩補傳曰殷以溵水得名溵㶏同音古溵水縣今陳州之商水縣也殷商兼商山溵水而言之史記武乙徙河北三代世表武丁徙河北世紀武丁徙居朝歌隋改為衛縣𨽻衞州朝歌故城在縣西二十二里衞縣熙寜中省為鎮入黎陽戰國策殷紂之國左孟門而右漳釜前帶河後被山史記吳起曰左孟門右太行常山在其北大河經其南括地志紂都朝歌在衛州東北七十三里朝歌故城是也本妹邑武丁始都之世紀云帝乙復濟河北徙朝歌其子紂仍都焉地理志河内本殷之舊都周既滅殷分其畿内為三國詩風弼鄘衞國是也注自紂城面北謂之弼南謂之庸東謂之衞左傳注殷虚朝歌也世紀紂自朝歌北築沙邱臺沙邱在鉅鹿東北七十里括地志在邢州平鄉東北二里史記貨殖傳昔唐人都河東殷人都河内周人都河南夫三河在天下之中若鼎足王者所更居也何氏楷曰自契初封商魯連子云在大華之陽皇甫謐云今上雒商是也即今陜西西安府之商州以地有商山故得商名契生昭明遷砥石事見世本其地不知所在昭明生相土遷商邱竹書載夏帝相十五年商侯相土作乗馬遂遷於商丘左傳所云陶唐氏之火正閼伯居商丘相土因之是也唐為宋州宋為睢陽郡在今為河南歸德府商邱縣季本云地稱商丘者其亦因契本封而以名邱與相土生昌若昌若生曹圉曹圉生㝠竹書載夏少康十一年使商侯㝠治河至帝杼十三年商侯㝠死於河中間計三十四年魯語及祭法所謂㝠勤其官而水死者㝠生振竹書以為殷侯子亥蓋振名而子亥其字也實始遷殷計三十七年而為有易之君綿臣所殺國統幾絶振生微字上甲乃殺綿臣而以殷興仍居殷地是則殷之遷雖在子亥而昌殷緒以基王業者乃在上甲故殷人報之也皇甫謐謂微字上甲其母以甲日生故也商家生子以日為名蓋自微始白虎通亦云殷道尚質故直以生日名子而譙周則謂死稱廟主曰甲蓋謂生稱其名死則以其生之名為廟主也于理或然微生報丁報丁生報乙報乙生報丙報丙生主壬主壬生主癸主癸生天乙是為成湯竹書載帝孔甲九年殷侯復歸於商丘上距微殺綿臣之歲凡一百單三年不知所謂殷侯者何名也自歸商丘之後又二十五年則為桀在位之十五年實成湯為商侯之元年於是復自商丘歸於亳書序謂自契至於成湯八遷湯始居亳從先王居作帝告釐沃今案所謂八遷者契始居商一也昭明居砥石二也相土居商丘三也㝠離商丘徃河治水四也子亥遷殷五也孔甲之時復歸商丘六也及湯自商丘遷亳不過七遷耳然古今相傳皆謂偃師榖熟皆湯所都而景亳則湯㑹諸侯之處是謂三亳皇甫謐云蒙北亳也榖熟南亳也偃師西亳也蒙即景亳與榖熟相近果湯曽都二亳則信有八遷矣然二亳遷居之先後則經傳無文嚴粲謂湯自南亳遷西亳似為可信蓋三亳中南亳北亳相去甚近北亳在今商丘北五十里地有景山故謂之景亳南亳在今商丘東南四十五里竹書載湯于桀十五年遷亳又書二十八年昆吾氏代商商㑹諸侯于景亳實在商封内不然國既被伐何得越境以㑹諸侯乎水經注云闞駰曰湯都偃師皇甫謐以為考之事實學者失之如孟子之言湯居亳與葛為鄰是即亳與葛比也湯地七十里葛又伯耳封域有限而寜陵去偃師八百里不得童子饋餉而為之耕今梁國自有二亳南亳在榖熟北亳在蒙非偃師也愚謂寜陵與商邱接壤皇甫解湯居亳之義是矣若謂湯未嘗都偃師則又不然以書序從先王居之文觀之先王孔安國以為指帝嚳也今按其書篇名曰帝告釐沃告當是通作嚳釐之言來蓋謂從帝嚳而來居于沃土云耳孔說非謬而水經注言帝嚳之墟在禹貢豫州河雒間今河南偃師城西二十里尸鄉亭是也使湯不都偃師何以云從先王居又孔穎達引中候格予命云天乙在亳東觀在雒鄭元亦云今河南偃師縣有湯亭地理志又謂尸鄉殷湯所都然則湯之居偃師明矣偃師乃周名以周武王克商偃息師徒於此其初名為西亳當是成湯命之湯之創業實始於此故曰朕哉自亳後雖遷居嚳墟而不忘其所自始故亦呼之為亳耳三亳惟亳為本名地在商丘故湯有天下尚仍商舊號若景亳則本名殷地在北蒙特以其近亳故曰景亳又曰北亳當上甲父子之世所謂遷于殷者即景亳也以竹書證之自成湯居亳之後歴外丙仲壬太甲沃丁小庚小甲雍已大戊八君皆仍居亳至仲丁始遷于囂歴外壬而河亶甲自囂遷于相繼之祖乙元年自相遷于耿二年圯于耿自耿遷于庇歴祖辛沃甲祖丁皆居庇及南庚二年遷于奄歴陽甲而盤庚至十四年自奄遷于北蒙曰殷書盤庚篇所謂先王恪謹天命不常厥邑于今五邦者合囂相耿庇奄而言也自相以下疑皆在河北至盤庚始遷河南書所謂惟渉河以民遷者史記惟言仲丁遷隞河亶甲居相祖乙遷邢與竹書小異然要之竹書為覈矣竹書稱北䝉曰殷于此始知殷之所在殷又名北亳故書序言盤庚五遷將治亳殷孔安國謂殷者亳之别名是也而後人皆言盤庚所遷在河南偃師誤矣湯在殷以㑹諸侯而不都殷故不更國號盤庚遷都殷實上甲微舊蹟因而更號曰殷其後歴小辛小乙以及武丁又傳四世至庚丁皆居殷及庚丁之子武乙始去殷遷河北也武丁修政行德天下咸驩殷道復興故于斯時追上甲絶而復續之功而行報祭之禮斯則𤣥鳥之詩之所為作故晰乎商殷變更之故則經傳史書若合符節古人重稽古之力夫豈誣乎都邑考契始封商今陜西西安府商州相土遷商丘今河南歸德府附郭商丘縣湯居亳歸德府東南廢穀熟縣是亦曰南亳府北四十里有大蒙城為北亳皇甫謐曰湯始興地景山在焉亦曰景亳又河南府偃師縣曰西亳湯即位居南亳後徙西亳也仲丁遷囂亦曰敖今開封府鄭州滎陽縣河亶甲居相今彰德府城西北五里洹水南岸有亶甲城祖乙圯于耿今山西平陽府蒲州河津縣遷于邢今直𨽻順德府附郭邢臺縣盤庚遷于殷即西亳也武乙徙朝歌今直𨽻大名府濬縣西七十里廢衞縣是間氏若璩曰余嘗讀貨殖列傳至唐人都河東殷人都河内周人都河南夫三河在天下之中若鼎足王者所更居也不覺歎曰異哉三河皆不出殷家邦畿之内而世或未知盖自湯居南亳以後紂居朝歌以前凡六百四十五年都河南者三焉都河北者四焉三者何一括地志南亳故城在宋州穀熟縣西南三十五里即湯所都者是一滎陽故城在鄭州滎澤縣西南十七里殷時敖地也即仲丁所遷是一亳邑故城在洛州偃師縣西四十里即盤庚所遷是四者何一故殷城在相州内黄縣東南十三里即河亶甲所築而都者是一耿城故耿國在絳州龍門縣東南十二里祖乙時圯是自祖乙前已為都矣一邢國故城在邢州外城内西南角即祖乙所遷是一朝歌故城在衛州東北七十三里本妹邑或曰武乙遷焉或曰武丁始都者是計南亳在極東耿城在極西相距雖未二千里要實不止千餘里則殷家之邦畿若是其遼廊乎余曰以周家鎬京方八百里顔師古云八八六十四為方百里者六十四也雒方六百里顔師古云六六三十六為方百里者三十六也二都共得方百里者百故詩云邦畿千里然則周所謂千里乃指國言豈如今路程之里數乎竊以周既然殷何獨不爾右商九有周禮天官惟王建國辨方正位體國經野注建立也周公居攝而作六典之禮謂之周禮營邑于土中七年致政成王使居雒邑治天下司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風両之所㑹也隂陽之所和也然則百物阜安乃建王國焉考工匠人建國水地以縣置𣙗以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕是别四方召誥曰太保朝至于洛卜宅厥既得卜則經營太保乃以庶殷攻位于洛汭越五日甲寅位成體猶分也經謂為之里數鄭司農云營國方九里國中九經九緯左祖右社面朝後市野則九夫為井四井為邑之屬是也夏官量人掌建國之法以分國為九州疏掌建國之法者以建國當先知逺近廣長之數也分國為九州謂分諸侯之國為九州日知錄顧氏炎武曰夏商以後沿上世九州之名各就其疆理所及而分之故毎代小有不同周禮量人掌建國之法以分國為九州曰分則不循於其舊可知矣職方氏掌天下之圖以掌天下之地東南曰揚州疏自此以下陳九州之事分為三道先從南方起周改禹貢以徐梁二州合于雍青分冀州地以為幽并易氏祓曰禹貢揚州之域東距海北距淮殷人以淮入徐故揚州止謂之江南周人復以入揚循禹之舊胡氏渭曰周揚州澤藪川浸不殊于禹貢特未知與殷制異同何如耳其山鎮曰㑹稽其澤藪曰具區其川三江易氏祓曰㑹稽漢志屬㑹稽之山隂縣山在東南二十里今州曰紹興府欽定義疏三江之目言人人殊曰松江婁江東江者此吳之一隅曰浙江錢清江剡江者此越之一隅浦陽江與剡漢合下流為曹娥江皆土人因其支别有三而名之不足當三江之正揚州之域北跨大江南逾㑹稽則岷江在北浙江在南而松江居其中此說無以易矣韋昭分浦陽與浙為二而浦陽特浙之支耳若禹貢東為北江東為中江則專就岷江而别之且在揚州之上流要非職方所指也歸氏有光曰古今論三江者班固韋昭桑欽之說近之但固以蕪湖東至陽羨入海昭分錢塘江浦陽江為二桑欽謂南江自牛渚上桐水過安吉歴長瀆為不習地勢程大昌辨之詳矣然孔安國蘇軾所論亦未必然也今從郭璞以岷江浙江松江為三江蓋自揚州斜轉東南揚子江吳松江錢塘江三處入海而皆以江名其為三江無疑直學邊實修崑山志言大海自西沖分南北由轉斜而西朱陳沙謂之揚子江口由徘徊頭而北黄魚垜謂之吳松江口浮于門而上謂之錢塘江口以此驗之禹迹無改蕙田案郭璞三江之說先儒多未敢從之因浙江松江不見禹貢為疑但周禮職方與禹貢不同故並存焉其浸五湖注浸可以為陂灌溉者欽定義疏張勃陸龜蒙輩皆謂五湖即太湖或云以周行五百里故名或云上禀咸池五車之氣或云環湖隨地異稱有菱湖莫湖游湖貢湖胥湖之别若然則經既言澤藪具區不必更言其浸五湖矣且揚州地域遼闊湖浸繁多胡舍其可紀者而必複舉具區之一以當二乎是則具區縱有五湖之名而必非職方之五湖也虞翻曰滆湖洮湖射湖貴湖及太湖為五韋昭曰胥湖蠡湖洮湖滆湖就太湖而五李圖以彭蠡巢湖鑑湖洞庭并太湖而五柯山以射陽湖丹陽湖彭蠡湖青草湖并太湖而五洞庭青草當屬荆州非揚域也大抵楚州之射陽洪州之彭蠡巢縣之巢湖暨洮滆鑑等皆為南方之浸或當數其尤大之五者而具區既列澤藪則不復數之與每州澤藪一舉其尤大者以表之猶山之有鎮也川與浸則或二或三或五以包其餘山一而川澤多者舟楫灌溉之利其用廣也正南曰荆州易氏祓曰禹貢荆及衡陽惟荆州其北境曰漢南以地理志考之荆山在南郡臨沮縣漢水又在其北正屬襄陽言漢南則跨荆山之北至周復以荆門之北屬豫州復禹封域其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛注潁出陽城宜屬豫州在此非也湛未聞勞疏據地理志合在豫州又昭元年左傳王使劉定公趙孟于潁亦在豫州易氏祓曰襄十六年左傳楚公子格帥師及晉師戰于湛阪杜注襄城昆陽縣北有湛水東入海案地志襄城即今汝州之襄城縣昆陽故城在今汝州之葉縣皆古豫州之地經以為荆州之浸必有脫誤處黄氏度曰鄭氏言潁宜屬豫州據禹貢也然周人畫地或有所更革湛水酈道元水經注出犨縣魚齒山西北東南流歴魚山下為湛浦注云未聞疎也案今汝州魯山縣即漢之犨縣魚齒山在龍興縣連接梁縣是則周荆州界自隨巴唐鄧東北至汝潁與豫州分界而荆牧治宛宣王封申伯胡氏渭曰周禮正南曰荆州衡山雲夢江漢皆禹貢荆州之山水唯其浸潁湛則有可疑鄭云潁出陽城宜屬豫州在此非也湛未聞今按漢志潁水出潁川陽城縣陽乾山至下蔡入淮湛水見杜預左傳注襄十六年晉楚戰于湛阪注云襄城昆陽縣北有湛水東入汝水經注湛水出犨縣北魚齒山東南流歴山下為湛浦春秋襄公十六年晉伐楚楚公子格及晉師戰于湛陂楚師敗績遂侵方城之外今水北山有長阪蓋即湛水以名阪故有湛阪之名湛水又東南逕昆陽縣浦城北而東入汝杜預亦以是水為湛水周禮荆州其浸潁湛鄭元云未聞蓋偶有不照也今考地則不乖其土言水則有符經文矣然湛與潁實皆在河南淮北之地若割以屬荆則斗入豫域七八百里畧似後世郡國犬牙相制之形非帝王分疆建牧之意潁湛二字或古文傳寫譌誤如兖州盧維之類未可知也河南曰豫州其山鎮曰華山易氏祓曰禹貢荆河豫州其封在大河之南南條荆山之北故曰荆河殷之豫州則南境距漢北境接河故曰河南周人于豫亦曰河南而南境則仍禹貢之舊其澤藪曰圃田注圃田在中牟易氏祓曰圃田澤漢志在河南郡中牟縣西唐以縣屬鄭州今屬開封府圃田澤一名原圃其川滎雒其浸波溠注波讀為播禹貢滎波既豬春秋傳楚子除道梁溠營軍臨隨則溠宜屬荆州在此非也胡氏渭曰周禮河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠華山圃田滎雒皆在禹貢豫州之域唯波溠可疑鄭注云波讀為播禹貢曰滎播既豬春秋傳曰楚子除道梁溠營軍臨隨則溠宜屬荆州在此非也今案滎即滎澤至周而已道為川故曰其川波則别是一水非滎播也水經􅓳水注云波水出霍陽西川大嶺東谷俗謂之歇馬嶺霍陽故縣在今汝州東南二十里霍山下即應劭所謂孤山波水所出也馬融廣成頌曰浸以波溠其水南逕蠻城下又南分三川於白亭東而俱南入􅓳水􅓳水自下兼波水之通稱也蓋洛别百答之外又有此波水道元以為豫州之浸浸可以為陂灌溉者也章懐注馬融傳云波水出在汝州魯山縣西北汝州今屬河南州西四十里廣成澤一名黄陂周百里有灌溉之利後漢於其地置廣成苑為遊獵之所澤水出狼皋山東南流合溫泉水波水自西來注之又東南合􅓳水入汝此即波溠之波也馬融精於周官其頌廣成明言浸以波溠鄭違其義非是禹貢之滎波自當作播職方之波溠當讀如字不可牽合溠水杜預云在義陽厥縣西東南入鄖水經注溠水出隨縣西北黄山南經㵐水縣西又東南逕隨縣故城西春秋莊公四年楚武王伐隨除道梁溠謂此水也又南流注于溳溠水流短溳水出蔡陽縣大洪山一名清發水東南逕隨縣至安陸入于沔溠既合溳自下可以通稱經所謂溠蓋即溳也豫州南界至漢殷時已然周人因之吕氏春秋云河漢之間曰豫州溠水在漢北其為豫浸又何疑焉正東曰青州胡氏渭曰周禮正東曰青州其疆域與禹貢大異鄭注云青州則徐州地也蓋以其山鎮曰沂山其川淮泗其浸沂沭知之禹貢曰海岱及淮惟徐州又曰淮沂其又又曰浮于淮泗是知徐并于青也賈疏云周之青州於禹貢侵豫州之地蓋以其澤藪望諸知之望諸即孟豬禹貢于豫州曰導菏澤被孟豬是知侵豫之地也疏又云周時幽州南侵豫州之地蓋以其澤藪曰貕養知之地理志琅邪長廣縣西有奚養澤琅邪郡屬徐州是知侵徐之地也渭案長廣故城在今登州府萊陽縣東漢屬徐州實古青州域幽之所侵乃青地非徐地也不但此也其川河濟其浸菑時皆青地為幽所侵而賈不言何其疎也蓋今青登萊三府之地在青域者周時皆割入幽其西又為兖所侵而損豫之東南境以益之徐則岱山大野皆入于兖是青亦不全得徐也鄭云青州即徐州亦言其大畧而已又曰周禮正東曰青州禹貢徐州之山水皆在焉蓋以徐為青青地大半入幽而徐之西則又入于兖云呂氏春秋泗上曰徐州鄭漁仲釋之曰泗水出陪尾山至下邳入淮源皆在徐州非若淮之與揚共濟之與兖共也故不韋亦得以為說焉其山鎮曰沂山注沂山沂水所出也在蓋志疏沂水出沂山水乃取名于山地理沂水出今泰山郡蓋縣易氏祓曰唐沂州沂水縣本漢東莞縣屬琅琊郡沂山在縣北一百二十四里欽定義疏漢志沂水出泰山郡蓋縣唐志沂州沂水縣有沂山實一山也延亘兩地耳在今山東青州府臨朐縣南百五十里其澤藪曰望諸注望諸明都也在睢陽諸疏案禹貢導菏澤被明都禹貢無望故從明都又案春秋宋藪澤有孟諸明都即孟諸也易氏祓曰孟諸澤唐志在宋州虞城縣西北十里漢屬沛郡今屬南京應天府孟諸俗號盟諸故書謂之孟諸周官謂之望諸漢志謂之孟都史記謂之明都其實一也其川淮泗疏案禹貢海岱及淮惟徐州又云淮沂其又此在青州者周以禹貢徐州地為青故也又禹貢淮出桐柏泗水在魯國出濟隂乘氏東又至睢陵入淮行千二百一十里江河淮泗漢洛等注不釋所出者以禹貢有成文如導洛自熊耳導淮自鳥䑕導河自積石導江自岷山導淮自桐柏導漢自嶓冢是也欽定義疏淮水發源河南南陽府桐柏縣桐柏山東流至光州固始潁上懷逺五河泗州盱眙入洪澤河出淮安府清河縣之清口與黄河㑹東則刷黄河以入海南則入運河以濟漕歴揚州府之寶應縣髙郵州抵江都縣入揚子江案江淮本未通春秋時吳伐齊於廣陵城東南築邗城城下掘深溝謂之邗江東北通射陽湖而北至末口屬淮此溝通江淮之故道也至晉永和中江都水斷乃於歐陽埭在江都縣西南引江至廣陵城而北出白馬湖合中瀆以至淮謂之山陽瀆隋時又開廣之以通戰艦明初陳瑄循故瀆開新運河以通漕即今之運道也泗水出山東兖州府泗水縣東五十里陪尾山四源並發故名西南流至兖州府城東金口壩分為二𣲖一越壩西南流至濟寕州界為泗河又西南至魯橋入運河一從壩上西流至兖州府城西為府河又西南至濟寜州東合洸水又西南至天井牐入運河其浸沂沭注沭出東莞至疏沭出東莞屬琅琊南下邳入泗蔡氏沈曰沂水地志云出泰山郡蓋縣艾山今沂州沂水縣也易氏祓曰沂水漢志在泰山郡蓋縣南至下邳入泗蓋縣在唐及今皆兖州之境下邳唐屬泗州今為淮揚軍沂水經下邳為二一於城北西南入泗一經城東亦注泗謂之小沂水沭水漢志在琅琊郡東莞縣南至下邳入泗案唐志沂州沂水縣本漢東莞縣地沭水所出東南至泗州下邳縣又東北至泗州漣水縣今為漣水軍至此與泗水合而入淮欽定義疏沂水出山東沂州府沂水縣西北一百七十里雕崖山鄭康成云沂水出沂山或云臨樂山酈道元云沂水出艾山蓋雕崖臨樂艾山皆沂山支阜之異名也接蒙隂縣界南流至江南淮安府宿遷縣北滙為駱馬湖又南入運河沭水縣北大弁山東南流逕莒州蘭山郯城界至江南沭陽縣逕桑漚湖為漣水河東曰兖州其山鎮曰岱山其澤藪曰大野其川河濟胡氏渭曰爾雅濟河間曰兖州注云自河東至濟周禮河東曰兖州而賈疏以為侵禹貢青徐之地者蓋以其山鎮為岱山其澤藪曰大野知之殷之兖州自河東至濟與禹貢同其徐州自濟東至海亦與禹貢同而周則言河不言濟蓋其境越濟而東得岱矣岱南為徐岱北為青徐州曰大野既豬是知侵禹貢青徐之地也兖界跨濟唯周制有然以言乎禹貢之衮州則悖矣其浸盧維注盧維當為雷雍之誤也禹貢雷夏既澤雍沮㑹同雷夏在城陽疏禹貢及地理志無盧維又字類雷雍故從之易氏祓曰注盧維當為雷雍蓋以濮州雷澤縣雷夏澤在其北又灉沮二水源俱出雷夏澤正兖州之境也欽定義疏雷夏今山東曹州府濮州東南有雷澤接菏澤縣界水經注云雷澤在大城陽故城西北十餘里其陂東西二十餘里南北十五里即舜所漁也元和志灉水沮水俱出濮州雷澤縣西北平地去縣四十里九域志濮州有沮溝即禹貢灉沮㑹同是也宋時河决曹濮間灉沮之源適當其衝久而泥滓填淤二水遂涸蔡氏沈以汳睢當之非是韓汝節云汳睢在豫徐之境無預于兖州而兖自有灉沮也顔師古曰盧水在濟北盧縣康成讀為雷非也唐以盧縣屬鄆州今廢入陽榖今濟南府長清縣西有廢盧縣蔡氏沈曰濰水地志云出琅邪郡箕縣今宻州莒縣案莒縣今沂州府莒州東北濰山北至都昌入海今濰州昌邑也案濰州今濰縣屬萊州府黄氏度曰濰水出宻州莒縣濰山北至濰州昌邑縣入海盧水水經注出宻州諸城縣盧山即久台水也西北入濰欽定義疏案康成以盧維為雷雍解自明白師古以縣水當之而黄氏度又謂即久台水久台水下流入濰水水經注謂之盧水較師古說又似易曉然兖地之浸俱在青州何也濰水出今山東沂州西北九十里箕屋山即濰山也土人名為淮河淮即濰字通作維惟並見漢書地理志其淮沂淮從佳與此異東流逕諸城縣西折而北至萊州府昌邑縣東北五十里入海正西曰雍州其山鎮曰嶽山易氏祓曰禹貢有雍有梁故梁為正西而雍為西北殷周皆省梁入雍故雍州為正西胡氏渭曰爾雅河西曰雍州注云自西河至黒水疏引李廵云兼得梁州之地周禮正西曰雍州疏云周之雍豫於禹貢兼梁州之地案梁併于雍說本漢志然雍州西北二邊世有戎翟之患自夏桀時畎夷入居邠岐之間成湯既興伐而攘之及殷室中衰諸夷皆叛至于武丁征西戎鬼方三年乃克故其詩曰昔有成湯自彼氐羗莫敢不來享莫敢不來王言武丁能繼湯之烈也及武乙暴虐犬戎冦邊周古公踰梁山而避于岐下及太丁之時季歴伐燕京之戎戎人大敗周師文王為西伯西有昆夷之患北有玁狁之難遂攘戎翟而戍之莫不賓服厲王無道戎狄宼掠乃入犬丘殺秦仲之族宣王承厲王之後玁狁孔熾整居焦穫侵鎬及方至于涇陽雍州之域為戎翟所侵陵如此則其疆埸未必能悉如禹貢梁州之山水無一入職方者故杜氏言梁州當夏殷之間為蠻夷之國蓋即牧誓所稱庸蜀盧彭等是也雍之併梁亦虚名耳今据周禮言之正東曰青州其南則有揚其北則有幽而西則不然目雍州以正西其西北西南兩隅皆缺焉然則梁地為羈縻之國固不待言而雍之西境如西傾積石豬野流沙三危黒水之區皆沒於戎翟禹貢之舊蹟不可復問矣爾雅目雝州以河西則華山以南不在界中可知其西北亦當虧損殷周之雍實小於禹貢或因併梁之說而反以為大此耳食之學未可與道古也殷有徐而無青營即青也周有青而無徐青即徐也青徐二州迭為有無獨梁則二代皆無之其故何也余按武王伐紂誓於牧野諸侯㑹師者稱之曰友邦冢君而庸蜀羗髳微盧彭濮八國則稱之曰人不以諸侯待之傳曰八國皆蠻夷戎狄屬文王者正義曰此皆西南夷也通典曰梁州當夏殷之間為蠻夷之國所謂巴賨彭濮之人由是觀之殷周之世梁地大半變於夷故此州遂廢先儒多言梁併於雍唯賈公彦云雍豫皆兼梁地而林少穎又云江漢發源梁州而職方為荆州川則荆亦兼梁地此言尤為精彩蓋殷周之荆豫皆以漢水為界梁州之地自嶓冢以東分屬荆揚而嶓冢以西則雍兼之其地皆為蠻夷雖併於雍而禹貢梁州之山川無一入職方者大抵如唐宋之羈縻州元明以來之土司簡其政令寛其賦歛以柔擾之使為不侵不叛之臣而已建州設牧非其所宜故終殷周之世梁州不復置也其澤藪曰弦蒲注弦蒲在汧蒲疏案地理志吳嶽山在汧縣西有弦之藪汧水出焉西北入渭易氏祓曰弦蒲漢志扶風汧縣北有蒲谷鄉弦中谷雍州藪也今屬隴州汧源縣其川涇汭注涇出涇陽汭在幽地詩大雅公劉篇汭鞫之即蔡氏沈曰涇水地志出安定郡涇陽縣西今原州百泉縣岍頭山也東南至馮翊陽陵縣入渭今髙陵縣也汭水地志作芮扶風汧縣弦蒲藪芮水出其西北東入涇今隴州汧源縣弦蒲藪有汭水焉易氏祓曰涇水漢志安定郡涇陽縣开頭山在其西涇水所出唐以涇陽縣為平涼屬原州今屬渭州又東南流至涇州臨涇保定二縣又東南至邠州之宜祿新平永夀三縣又東北流至京兆府之醴泉高陵雲陽三縣以入渭汭水者非禹貢所謂芮也禹貢言芮渭水之北此汭則雍州之川名漢志出右扶風汧縣之西北東流入涇此正公劉居豳之地詩所謂芮鞫之即也徐廣曰古豳城在邠州東北二十九里三水縣界唐志涇州臨涇縣有汭水西自隴州華亭縣流入一名宜祿川涇隴二州在邠州之西則非即邠州之汭然要皆雍州之川也欽定義疏涇水出陜西平凉府平凉縣西南笄頭山亦名崆峒山東至西安府髙陵縣西南入渭汭水出平涼府華亭縣有二源北源出湫頭山之朝那湫南源出齊山至縣東與北河合又東至涇州西北入涇其浸渭洛注洛出懷德貢疏洛即詩瞻彼洛矣之洛與禹導洛自熊耳者别蔡氏沈曰渭水地志出隴西郡首陽縣西南今渭州渭源縣鳥䑕山西北南谷山也東至京兆船司空縣入河今華州華隂縣也易氏祓曰渭水漢志出隴西郡首陽縣西南之鳥䑕同穴山唐省首陽入渭源今置渭源堡属熈州渭水有三源正東㣲南流至州之襄武縣又東流至鞏川之隴西縣又東流至秦州上邽縣又東流至隴州南田縣今省入吳山又東流至鳳翔府岐山縣又東流至京兆府萬年縣又東流至華州華隂縣東北入于河謂之渭口禹貢所謂汭是也洛水别是雍州一浸非禹貢導洛自熊耳之洛欽定義疏康成注洛出懐德本漢志其實北地郡之歸德縣乃洛水上源漢志所謂洛水出北蠻夷中入河是也漢志於歸德但曰洛水於懷德曰雍州浸原是一水歸德其源懐德其委耳入河即謂入渭也關中諸水自西而東者莫大于渭自南而北者莫大於洛易氏因鄭注而疑出慶州洛源者之别為一水非也漢歸德縣唐宋之洛源縣其下流曰洛川縣曰洛交縣皆因此水得名洛源今合水縣也東北曰幽州易氏祓曰舜十二州本有幽州水土既平因冀為帝都省幽入冀殷人南都河南之亳復舜幽州之名周人又以幽州兼殷之營州實禹貢青州隔海東北之境故曰東北其山鎮曰醫無閭注醫無閭在遼東易氏祓曰醫無閭漢志在遼東郡無慮縣無慮即醫無閭在今錦州府廣寜縣北其澤藪曰貕養注貕養在長廣杜子春讀貕為奚邪疏長廣縣名地理志長廣屬徐州琅郡有萊山周時幽州南侵徐州之地也易氏祓曰貕養漢志在琅邪郡長廣縣西幽州藪唐萊州昌陽本漢縣屬東萊郡今為萊陽縣貕養澤在縣東北四十里蓋澤介乎東萊琅邪兩郡之間其川河泲易氏祓曰經于兖州言其川河泲盖兖州北距河而南據泲禹貢言濟河惟兖州則為兖州之川宜也幽州逺在東北於河泲何與蓋幽州雖跨有遼水為東北而實西南越海兼有青州之東北境所以琅邪郡之貕養澤泰山郡之淄水千乘郡之時水皆幽州之域光武十三年以遼東屬青州二十四年還屬幽州是幽州實可以有青州王璜張揖云九河陷海中是九河未陷之前凡登萊海㟁及濱滄二州之東境皆在幽州之地與兖州東西分界故其州同列河泲其浸菑時注菑出萊蕪時出般陽蔡氏沈曰淄水地志云出泰山郡萊蕪縣原山今淄州淄川縣淄州縣今屬濟南府東南七十里原山也東至慱昌縣入濟今青州夀光縣也黄氏度曰淄水出淄州淄川縣原山北至博興縣入濟時水在臨淄縣齊城西平地出泉南北至二十五里亦謂之源水東北至千乘縣入淄易氏祓曰淄水漢志出泰山郡萊蕪縣原山至博昌入泲幽州浸攷輿地記則襲慶府萊蕪縣有原山淄水所出其地即漢之泰山郡東北流入淄川縣漢萊蕪故城在其東北過臨淄縣東又東北入于海與漢志入泲不同者蓋入泲乃禹迹之舊自泲之上流既涸故淄水入海時水在今青州臨淄縣本漢千乘郡之地漢志千乗郡博昌縣有時水東北至鉅定縣入馬車瀆幽州浸欽定義疏淄水出青州府益都縣西南顔神鎮東南二十五里岳陽山即原山也其山接濟南府章邱淄川泰安府萊蕪三縣淄水出於山之東谷東北流至青州府夀光縣北由清水泊入海時出般陽漢地理志濟南郡般陽縣不言時水出而千乘郡慱昌縣言時水東北至鉅定入馬車瀆志言其委耳今山東通志時水即烏河出青州府臨淄縣西南槐樹村北流受澅水系水逕新城縣之索鎮口東南入慱興縣界下注麻大泊河内曰冀州易氏祓曰舜時十有二州有幽有并有冀水土既平之後以冀為帝都省幽并入焉以餘州凖之則知禹貢冀州東西南三面距河而北境則越乎常山今之燕靈營平諸州皆其地也殷人以冀州北境復舜之幽州而東西南皆禹跡之舊蓋東河之西西河之東南河之北也故曰兩河間周人又分冀而復舜之并州故曰河内而已其山鎮曰霍山注霍山在彘漢疏厲王流於彘後為縣名改為永安縣易氏祓曰霍山漢志霍太山在河東郡彘縣東唐及今晉州霍邑本漢彘縣霍山一名太岳在縣東三十里欽定義疏霍山一名霍太山亦名太岳今為中鎮在山西平陽府霍州東三十里山周二百餘里南接岳陽趙城二縣北接靈石縣東接沁源縣界其澤藪曰楊紆注楊紆所在未聞其川漳其浸汾潞注汾出汾陽潞出歸徳疏汾陽歸德縣名蔡氏沈曰汾水出于太原經于太岳東入于河易氏祓曰汾水漢志出太原郡汾陽縣北山西南至汾隂入河冀州浸攷唐嵐州静樂縣今屬澤州即漢汾陽縣之地汾水東南流入太原府之交城陽曲太原清源文水五縣又東南流至汾州之溫城介休靈石汾西四縣又東南流入晉州之霍邑趙城洪洞臨汾四縣又東南流至絳州之正平積山龍平三縣又南流至河中府之寳鼎縣北入于河唐潞州潞城縣本漢潞縣屬上黨郡漳水一名潞水在縣北闞駰曰潞水在縣北為冀州浸即漳也蓋周以濁漳為潞清漳為漳黄氏度曰鄭注潞水出歸德今慶州華池縣無潞水杜佑曰潞出宻雲郡宻雲縣宻雲今檀州水經鮑邱水從塞外來經宻雲戍過幽州潞縣西酈道元曰鮑邱水入潞通得潞稱俗稱東潞此殆杜佑所謂宻雲之潞也是在幽界非冀浸矣酈道元謂他川無可為浸者巨浪長湍惟漳水耳又案今潞城縣為春秋赤狄潞子嬰兒之國是則潞之得名已久漳水至潞為浸可以灌溉或以是也欽定義疏潞水有二其一即濁漳乃一水而二名闞駰謂潞水即漳水今潞安府潞城縣因水得名者也其一自塞外經宻雲至天津入海者即今京東之北運河名為白河亦曰潞河杜佑通典所指也諸儒皆以濁漳當之則一水而既謂之川復謂之浸豈其流者謂之川而瀦者謂之浸與又漢時兩歸德縣一屬汝南一屬北地皆與河内冀州無渉漢志於北地郡歸德縣言洛水出非潞水也以康成之精博寜當以洛水為潞水平顔師古注漢書亦依鄭說不可曉也北地歸德今慶陽府東北雍州之域豈可以言冀州邪易氏黄氏以濁漳為潞正在冀州之地但川與浸同是一水可疑耳正北曰并州易氏祓曰舜時有并州禹貢以并入冀殷因之周復分冀立并州以天下之勢言之冀州在河西之東雍州在河西之西而并州之北故曰正北其山鎮曰恒山注恒山在上曲陽昜氏祓曰恒山一名常山漢志恒山郡上曲陽縣恒山北谷在西北并州山按唐定州恒陽縣有北嶽今改州為中山府縣為曲陽即漢之舊也蕙田案恒山詳見前其澤藪曰昭餘祁注昭餘祁在鄔黄氏度曰昭餘祁在汾州介休縣水經注汾水於大陵縣左迤為鄔澤地理志太原郡鄔縣九澤在北是為昭餘祁并州藪也吕氏春秋謂之大昭又侯甲水逕大谷謂之大谷水經祁縣故城南自縣連延西接鄔澤是謂祁藪樂史寰宇記昭餘祁俗名鄔城泊祁屬太原漢故縣也昭餘祁在今山西太原府祁縣東七里其川虖池嘔夷注虖池出鹵城嘔夷祁夷與出平舒易氏祓曰虖池河漢志代郡鹵城縣虖池河東至參合入虖别從河東至文安入海并州川其河自雁門縣西南流入崞與唐林二縣又西南流至忻州秀容縣又西南流入定襄縣又南流至太原府之盂縣又東流至恒州之靈夀真定九門藁城鼓城五縣又東流至定州之無極縣又東流入深州之饒陽鹿城安平三縣又東南流入瀛州之髙陽河間二縣又東流入莫州之唐興及莫縣以至任邱文安即漢志所謂至文安入海者也嘔夷鄭注疑即祁夷出平舒攷漢志代郡平舒縣有祁夷水北至桑乾入沽唐蔚州興唐縣本代郡地嘔夷一名滱水出縣西北之高氏山東北流至興唐縣又東流至瀛州之博野東入于河欽定義疏虖池水在今山西代州繁畤縣東北泰戯山至直𨽻天津府静海縣小直沽入海嘔夷水在今大同府蔚州靈丘縣西北髙氏山一名唐河至直𨽻保定府安州北合於易水又案鄭注疑嘔夷為祁夷酈道元注水經以嘔夷即滱水師古注漢書則以并州之川為滱與鄭注不同據水經注滱水出代郡靈丘縣髙氏山至長城入于易祁夷水出平舒縣至桑乾縣入濕水則祁夷之流短于滱不足槩一州之川似當以道元師古二説為是但鄭說未必無據並存之其浸淶易注淶出廣昌易出故安易氏祓曰淶水漢志代郡廣昌縣淶水東南至容城入河并州浸案唐蔚州飛狐縣即漢廣昌縣地有飛狐口淶水所出東南流至易州易縣又東北流至淶水縣又南流入容城縣即漢志所謂東至容城入河者也易水漢志易水出涿郡故安縣閻鄉東至范陽入濡并州浸此言易出故安則近幽州之境按唐蔚州飛狐縣周屬并自縣北入媯州之懐戎即古飛狐口易水所出東南流至易州易縣至北方是漢涿郡故安縣之地又東流至涿州之歸義縣又東北流入涿州范陽縣之南界即漢志所謂至范陽入淶是也黄氏度曰易水有三皆出易州易縣寰宇記北易一名安國河出縣西北窮獨山水經注所謂濡水也中易出閻鄉城寛中谷東南流至古易京城與北易合流入巨馬河水經注易水與濡水互攝通稱南易出縣東南即山燕王仙臺東石虎罡東流與雹河㑹又東至霸州容城縣南流入髙陽縣合􅋤水水經注又云易水至文安縣與虖池合班固闞駰皆以此為南易文安今霸州縣并之極東界欽定義疏淶水即拒馬河發源直𨽻易州廣昌縣流入紫荆闗過易州西北界至房山縣境分為二支一東流涿州經固安縣東南入桑乾河一南流淶山縣經定興新城入白溝河易水在易州南三十里發源易州寛中谷流至定興縣北河村合拒馬河入白溝河地理通釋周九州揚荆豫青兖雍幽冀并鄭氏注揚荆豫兖雍冀與禹貢略同青州則徐州地也幽州則青冀之北也無徐梁晉地理志云成王時改作禹貢徐梁入于青雍冀野析于幽并王氏云九州之序禹貢始於冀次以兖而終於雍職方氏則始於揚次以荆而終於并者蓋禹貢言治水之序也職方言逺近之序也治水則自帝都而始然後順水性所便自下而上故由兖至雍而止也以逺近言之則周之化自北而南為逺故闗睢鵲巢之詩分為二南漢廣亦言文王之道被于南國德化之所及以逺為至也始於揚則以揚在東南次以荆則以荆在正南終于并州以并在正北先逺而後近也左傳王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢我西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也漢賈捐之曰武丁成王殷周之大仁也然地東不過江黄西不過氐羗南不過蠻荆北不過朔方爾雅釋地魯有大野注今髙平鉅野縣東北大澤是也疏此下至周有焦䕶釋十藪之名也禹貢徐州云大野既豬晉有大陸注今鉅鹿北廣河澤是也疏禹貢冀州云大陸既作是也秦有楊陓注今在扶風汧縣西鄭疏周禮冀州云其澤藪曰楊陓注云所在未聞又雍州云其澤藪曰弦蒲鄭注云在汧今注亦云在汧然則周禮弦蒲即此楊陓也宋有孟諸注今在梁國睢陽縣東北也疏周禮青州其澤藪曰望諸鄭注云望諸明都禹貢豫州導菏澤被孟豬左傳亦作孟諸楚有雲夢注今南郡華容縣東南巴丘湖是也疏周禮荆州云其澤藪曰雲夢禹貢云雲土夢作又昭三年左傳楚子與鄭伯田於江南之夢定四年楚子渉睢濟江入于雲中雲夢一澤而每處有名者司馬相如子虚賦云雲夢者方九百里則此澤跨江南北亦得單稱雲單稱夢吳越之間有具區注今吳縣南太湖即震澤是也禹疏周禮揚州云其澤藪曰具區貢揚州云三江既入震澤厎定是也齊有海隅注海濱廣斥燕有昭余祁注今太原鄔陵縣九澤是也余疏周禮并州其澤藪曰昭祁鄭有圃田注今滎陽中牟縣西圃田澤是也左疏周禮豫州云其澤藪曰圃田僖三十三年傳云鄭之有原岡猶秦之有具囿也周有焦䕶注今扶風池陽縣瓠中是也是疏詩六月云玁狁匪茹整居焦䕶也陳氏曰九州山川澤藪各在職方不入諸侯之版觀詩不以囿田繫鄭春秋不以沙麓繫晉略可覩矣周季諸侯始擅不朌之利齊斡山海而桃林之塞郇瑕之地晉實私之此諸侯所以僭侈王室所以衰微也詩大雅生民即有邰家室傳堯見天因邰而生后稷故國后稷于邰箋堯改封于邰就其成國之家室無變更也傳疏世本云有邰氏女曰姜嫄故知邰是姜嫄之國也以此言封之于邰下言祭天之事故觧其意云堯見天因邰而生后稷謂使邰國之女生后稷也故國后稷于邰謂封為邰國之君后稷以前未有國于此始封之也此邰為后稷之母家其國當自有君所以得封后稷者或時君絶滅或遷之他所也公劉篤公劉匪居匪康廼埸廼疆廼積廼倉廼裹餱糧于橐于囊思輯用光弓矢斯張干戈戚揚爰方啟行傳公劉居于邰而遭夏人亂廹逐公劉公劉乃避中國之難遂平西戎而遷其民邑於豳焉蓋諸侯之從者十有八國度其夕陽豳居允荒傳山西曰夕陽荒大也陽箋夕陽者豳之所處也疏夕者總言豳人一國之所處也其界在山之西不知是何山也譜云豳在岐山之北書傳說太王去豳踰梁山註云梁山在岐山東北然則豳國之東有大山者其唯梁山乎篤公劉于豳斯館傳館舎也緜緜緜𤓰瓞民之初生自土沮漆傳興也緜緜不絶貌民周民也沮水漆水也豳箋喻后稷乃帝嚳之冑封于邰其後公劉失職遷于居沮漆之地至太王而徳益盛故本周之興云于沮漆也經疏鄭于生民之箋以姜嫄為髙辛氏世妃而生后稷云即有邰家室周本紀云舜封棄于邰號曰后稷是稷為帝嚳之胄封于邰也公劉云篤公劉于豳斯館是公劉失職遷于豳也周語云昔我先世后稷以服事虞夏及夏之衰也棄稷不務我先王不窋用失其官而自竄于戎狄之間韋昭云不窋失官去夏而遷于豳豳西近戎北近狄然則失職遷豳自不窋始矣言公劉遷豳者案公劉之篇説公劉避亂適豳其言甚詳不可得而改而外傳史記皆言不窋奔于戎狄盖不窋之時已嘗失官逃竄豳也猶尚徃來邰國未即定居于豳公劉者不窋之孫至公劉而盡以邰民遂徃居焉豳有漆沮之水故言居漆沮之地公劉以下常居沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇傳率循也滸水厓也胥相宇居也難箋循西水厓沮漆水側也疏古公避狄之其來以早朝之時疾走其馬循西方冰厓沮之側東行而至于岐山之下文王有聲文王受命有此武功既伐于崇作邑于豐箋作邑者徙都于豐以應天命考卜維王宅是鎬京維龜正之武王成之疏此章言武王之事而并言文王作邑于其傍者以二邑皆在豐傍舉豐而言可以并及文王欲連言之帝王世紀云豐鎬皆在長安之西南言豐邑在豐水之西鎬京在豐水之東以時驗而知之文王周雖舊邦其命維新箋太王聿來胥宇而國于周王迹起矣而未有天命至文王而受命閻氏若璩曰周雖舊邦鄭箋云太王聿來胥宇而國于周周字貼太王不若詩集傳以周受封始自后稷為真舊左傳我自夏以后稷魏駘芮岐畢吾西土也言受此五國世為西土之長釋例土地名曰魏河東河北縣芮馮翊臨晉縣芮鄉是畢在京兆長安縣西北駘在武功岐在美陽孔穎達曰今案其地芮在魏之西南百餘里耳岐在駘之西北無百里也詩稱后稷封邰與岐畢相近為之長可矣計魏在邰東六百餘里而令邰國與魏為長道路太遥公劉居豳又在岐西北四百餘里此傳極言逺竟而辭不及豳並不解其故余謂潁達毎好依阿康成元凱莫敢是正兹獨上攻及傳之正文殊可喜也宜亟標出之但云豳距岐四百餘里四當作二地理通釋周都世紀周后稷始封邰今扶風􅘭是也地理志右扶風􅘭縣后稷所封括地志故􅘭城一名武功城在雍州京兆府武功縣西南二十二里古邰國有后稷及姜嫄祠及公劉徙邑於豳詩稱于豳斯館今新平漆之東有豳亭是也后稷生不窋周語不窋失其官自竄戎狄之間括地志不窋故城在慶州𢎞化縣南三里即不窋在戎狄所居之地也豳州新平縣即漢漆縣詩豳國公劉所邑之地郡縣志古豳城在邠州三水縣西三十里公劉始都之處通典慶州安化縣尉李城在白馬兩川交口亦曰不窋城豳州開元十三年改豳為邠豳故栒邑是地理志右扶風栒邑有豳鄉詩豳國公劉所都栒邑故城在三水縣東北二十五里至太王避狄循漆水在鳳翔府普潤縣東入渭地理志在右扶風漆縣西踰梁山括地志在雍州好畤縣西北十八里康成云岐山西南好畤熈寜中屬鳳翔府徙邑於岐山之陽西北岐城舊址是也詩稱率西水滸至於岐下康成云循西水厓沮漆水側也南有周原故始改號曰周康成云周原在岐山之南詩閟宫曰居岐之陽地理志岐山在右扶風美陽西北中水鄉周太王所邑括地志故周城一名美陽城在雍州武功縣西北二十五里即太王城也通典美陽縣故城在武功縣北七里輿地廣記鳯翔府扶風縣岐陽鎮漢美陽縣地周太王邑於岐山之下即此詩所謂居岐之陽也文王始亦治焉唐岐陽縣元和三年省入扶風郡縣志岐山亦名天柱山在鳳翔府岐山縣東北十里孟子文王生于岐周王季徙程書序曰維周王季宅程是也孟子文王卒於畢郢史記正義周書云惟周王季宅郢郢故城在雍州咸陽縣東二十一里周之郢邑也詩正義周書稱文王在程作程寤程典皇甫謐云文王徙宅於程蓋謂此也地理志右扶風安陵闞駰以為本州之程邑也文王受命徙都於酆在今京兆之西詩既伐于崇作邑于豐說文酆文王所都在京兆杜陵西南括地志周豐宫文王宫也在雍州京兆府鄠縣東三十五里鄭康成云豐邑在豐水之西鎬京在豐水之東徐廣云豐鎬相去二十五里皆在長安南數十里地理志酆水出右扶風鄠縣東南通典岐州鳯翔府岐山縣文王徙于岐即此縣也孟子曰文王治岐尚書太傅春子曰文王治岐詩皇矣曰度其鮮原居岐之陽在渭之將鄭氏箋在岐山之南居渭水之側後竟徙都於豐正義云太王初遷已在岐山岐山之陽去舊都不逺豐則岐之東南三百里蘇氏云文王既克宻須於是相其髙原而徒都焉所謂程邑是與通典周文王作酆今京兆府長安縣西北靈臺鄉豐上是也殷有槀國在鄠縣界武王徙都鎬封文王子於酆括地志鎬在雍州西南三十二里滈水源出長安縣西北滈池長安志在縣西北十八里通典今長安縣昆明池北鎬陂是也詩宅是鎬京後漢志鎬在京兆上林苑中孟康云長安西南有鎬池水經注鎬水上承鎬池于昆明池北郡縣志周武王宫即鎬京也在長安縣西北十八里自漢武帝穿昆明池于此鎬京遺趾淪陷焉穆天子傳之于宗周注鎬京也通典周地西廹戎俗自岐之豐自豐之鎬是西逺戎而東即葉也程氏曰伐商作洛皆歩自宗周而徃以其事告于豐廟康有酆宫之朝康王雖仍都鎬其受朝仍在豐地及伐紂營洛邑而定鼎焉今洛陽西南洛水之北有鼎中觀是也史記周紀王白自洛汭延于伊汭居易毋固其有夏之居我南望三塗北望嶽鄙顧詹有河粤陽雒伊母逺天室營周居于雒邑而後去太史公曰學者皆稱周伐紂居洛邑綜其實不然武王營之成王使召公卜居居九鼎焉而周復都豐鎬周書度邑曰武王問太公曰吾將因有夏之居南望過于三塗北詹望于有河周公相成王以酆鎬偏處西方乃使召公卜居洛水之陽以即土中遂築新邑營定九鼎以為王之東都洛邑書我乃卜澗水東瀍水西惟洛食注今河南城也是為王城名曰東周公羊傳王城者何東周也地理志王城本郟鄏之地或謂之郟鄏春秋傳成王定鼎于郟鄏河南是也今東門名鼎門盖九鼎所從入也郟山名鄏邑名桓七年王遷盟向之民于郟襄二十四年齊人城郟郟王城括地志故王城一十二王皆居此城至敬王乃遷都成周赧王又居王城洛陽故城在洛陽縣東北二十六里周公所築即成周城也書我又卜瀍水東亦惟洛食注今洛陽也將定下都遷殷頑民故并卜之周語靈王二十二年穀洛鬬將毁王宫韋昭曰洛水在王城南穀水在王城北東入于瀍婁敬曰成王營成周都洛以為天下中諸侯四方納貢職道里鈞矣吕氏曰孔子序洛諾曰周公徃營成周則成周乃東都總名河南成周之王城也洛陽成周之下都也王城非天子時㑹諸侯則虚之下都則保釐大臣所居治事之地周人朝夕受事習見既久遂獨指以為成周矣通典郟鄏陌名成王既卜營洛邑建明堂朝諸侯復還酆鄗故書序曰還歸在豐歸于宗周至懿王徙犬邱秦謂之廢邱今京兆槐里是也世本懿王居犬邱地理志右扶風槐里縣周曰犬邱懿王都之括地志犬邱故城一名慶邱在雍州始平縣東南十里即周懿王所都漢髙祖三年更名槐里今京兆府興平縣秦紀非子居犬邱厲王出於彘今河東永安是也通典晉州霍邑縣漢彘縣詩序宣王復㑹諸侯于東都王氏曰成王于洛時㑹諸侯而已宣王時㑹諸侯于東都而車攻謂之復古平王徙居洛洛誥所謂新邑也吕氏曰平王定都王城地理志初洛邑與宗周通封畿東西長而南北短短長相覆為千里至襄王以河内賜晉文公又為諸侯所侵故其分墜小郡國志河南周公所城洛邑也春秋時謂之王城東城門名鼎門北城門名乾祭注博物記王城方七百二十丈郛方七十里南望雒水北至陜山地道記去雒城四十里及敬王避子朝之亂東居成周子朝居王城曰西王敬王居狄泉在王城之東曰東王春秋曰天王入于成周後六年王室定遂徙都成周晉率諸侯之徒修繕其城以成周城小不受王都故壤翟泉以廣馬翟泉地在成周東北郡國志雒陽周時號成周有狄泉在城中注摯虞曰古之周南今之雒陽世紀曰城東西六里十一歩南北九里一百步通典狄泉在今洛陽城東三十餘里吕氏曰洛都雖有二城而成周則其總名杜預孔穎達皆以下都為成周謂敬王繼子朝亂自王城徙都之其說不然大可以包小小不可包大苟成周信為下都之名則凡書之言洛皆謂之成周是以下都之名而包王城其不可信一也左氏未嘗有敬王自王城遷成周之明文苐言子朝既逐王入于成周而已敬王請城成周之辭亦謂成王合諸侯城成周以為東都則成周者洛邑之總名明矣其不可信二也至赧王又徙居西周吕氏曰平王東遷之後所謂西周者豐鎬也東周者東都也威烈王之後所謂西周者河南也東都者洛陽也周紀考王封其弟于河南是為桓公以續周公之官職惠公封其少子于鞏以奉王號東周惠公注於是有東西二周世本西周桓公掲居河南東周惠公班居洛陽赧王時東西周分治西周河南也東周鞏也趙世家成侯八年與韓分周以為兩徐廣曰顯王二年周紀無此吕氏曰東西周各為列國不復相闗自是而後稱東西周君者皆謂二周君也本紀云赧王時東西周分治非也報王特徙都西周耳當以趙世家為正白虎通夏曰夏邑殷曰商邑周曰京師詩公劉京師之野朱文公曰京師髙丘而衆居之也董氏曰所謂京師者起於此其後世因以所都為京師曰嬪于京依其在京則岐周之京也王配于京則鎬京也春秋所書京師則洛邑也皆仍其本號而稱之猶晉之云新絳故絳也洛邑亦謂之洛師正京師之意也林氏曰岐在邰西北無百里豳又在岐西北四百餘里豐在岐山東南二百餘里鎬在豐東二十五里方氏曰豐鎬宗廟所在故謂之宗周洛邑以王道成於此故謂之成周都邑考后稷始封邰今陜西西安府乾州武功縣西南二十里斄城是公劉遷豳今西安府邠州三水縣西三十里古豳城是太王居岐今鳯翔府扶風縣西北岐陽鎮是南有周原始號曰周王季宅程亦曰郢今西安府咸陽縣東二十一里安陵城是文王遷豐今西安府附郭長安縣西北靈臺鄉豐水上武王徙都鎬今長安縣西北十八里昆明池北鎬陂是鄭康成曰豐邑在豐水西鎬京在豐水東相去蓋二十五里成王營洛邑名曰東周今河南府治是至懿王徙犬邱今西安府興平縣東南十里槐里城是平王避犬戎之難東遷于洛即洛邑也右周職方顧氏棟髙春秋大事表周都洛邑王城今河南府洛陽縣城内西偏即王城故趾周公營洛邑澗水東瀍水西南繫乎洛水北因乎郟山自平王東遷至景王十一世皆居此敬王遷成周王城廢至赧王復居之郟鄩即郟山北邙山也在洛陽縣城北二里亦謂之郟桓七年遷盟向之民于郟杜註郟王城知郟鄏即王城之别名矣遷於成周在今河南府洛陽縣城東二十里周公營王城并營下都處殷頑民在瀍水之東與王城相去十八里亦謂之成周昭二十六年子朝奔楚其餘黨多在王城敬王畏之徙都成周成周狹小乃請諸侯城之自是迄春秋之末凡書京師者皆指成周翟泉杜註城内太倉西南池水也鄭氏曰狄泉本在下都城北城成周時乃繞翟泉于城内昭二十三年天王居于狄泉二十六年始入于成周此時狄泉與成周猶為兩地周邑鄔隱十一年王取鄔劉蒍䢴之田於鄭杜註鄔邑河南緱氏縣西南有鄔聚今在河南府偃師縣西南劉杜註劉邑緱氏縣西北有劉亭後漢書周大夫劉子邑也今在偃師縣劉子始封為匡王少子劉康公蒍東周大夫子國食邑謂之蒍國䢴在今懷慶府城北三十里有䢴臺村後地屬晉溫王與鄭人蘇忿生之田温原絺樊隰郕攢茅向盟州陘隤懷在今懐慶府温縣西南三十里後襄王更以賜晉晉以狐漆為温大夫原今懷慶府濟原縣西北有原鄉後賜晉晉以趙衰為原大夫絺今懐慶府河内縣西三十二里有故絺城樊一名陽樊今懷慶府濟源縣東南二十里有古陽城東遷後仲山甫子孫所封莊二十九年樊皮叛王即此後賜晉晉以予陽處父為食邑隰郕今懐慶府城西三十里有期城即其地一名隰城僖公二十五年殺太叔于隰城即此攢茅今懷慶府脩武縣西北二十里有攢城向今懷慶府濟源縣西南有向城盟今懷慶府孟縣西南三十里有古河陽城武王合諸侯于孟津即此地後歸晉謂之河陽僖二十八年天王狩于河陽是也州在今懷慶府東南三十里後屬晉初為郤稱邑後為欒豹邑昭三年晉人以賜鄭豐施七年子産歸州田于韓宣子宣子更以賜宋樂大心後宣子自徙居之陘即太行陘在今懷慶府西北三十里連山中斷曰陘太行首始河内北至幽州中有八陘此其一也隤在懷慶府修武縣北懷今懐慶府武陟縣西南十一里有懐城後屬晉宣六年赤狄伐晉圍懐即此酒泉莊二十一年王與虢公酒泉杜注周邑今陜西同州府澄城縣有甘泉出匱谷中造酒尤美名曰酒泉甘僖二十四年甘昭公有寵于惠后杜注王子帶食邑河南縣西南有甘水西二十五里有故甘城今俱在河南府洛陽縣西南毛狄伐周獲毛伯杜註毛伯采邑在今河南府宜陽縣界鄇田成十一年郤至與周爭鄇田杜註温别邑懐縣西南有鄇人亭在今懐慶府武陟縣界要餞昭二十二年子朝帥要餞之甲以逐劉子杜註周二邑水經注畛水出新安縣青要山新唐書河南郡諸府有餞濟揚劉子奔揚杜註周邑路史謂即山西之揚侯國宣王子尚文所封今山西平陽府洪洞縣東有揚城案傳云壬戌劉子奔揚癸亥如劉劉為今偃師縣劉亭浹日即至其地當不出百里外山西洪洞距偃師絶逺且地已屬晉决當為僖十年揚距泉皋之揚而非山西之揚侯國也前城王師敗績于前城杜注子朝所得邑服䖍曰前讀為泉即泉戎地在伊闕南京相墦曰在今洛陽西南五十里伊闕外解王師軍于汜于解于任人杜註王師分在三邑氾即鄭州氾水縣本鄭地王時駐軍于此解有大解小解後漢書大解城在今洛陽縣南小解城在縣西南也任人地闕鄩昭二十三年郊鄩潰杜注郊鄩二邑皆子朝所得括地志故鄩城在河南府鞏縣西南五十八里史記塞什谷之口徐廣曰即鄩邑澤邑王師在澤邑賈逵曰即翟泉墻人劉子取墻人直人路史曰今河南府新安縣東北有白墻村直人杜註子朝邑直伯柄國尹王入于尹杜註尹氏邑今山西汾州有尹吉甫墓即古尹城唐尹辛敗劉師于唐杜註周邑後漢志有唐聚在今河南府洛陽縣鞏昭二十五年尹文公渉于鞏杜註于鞏縣渉洛水周鞏伯邑即今鞏縣後西周惠公封少子班于此為東周今縣西南三十里有鞏王城萑谷昭二十六年王次于萑谷于胥靡于滑杜註皆周邑萑谷在洛陽縣東胥靡杜註本鄭邑今河南府偃師縣東南四十里有胥靡城滑杜注本鄭邑今偃師縣南緱氏故城即古滑地髙氏曰滑本國名秦滅之而不能有為晉所得然其地近鄭在所必爭成十七年鄭人所以侵晉虚滑也是時則歸王室逮定六年鄭伐周馮滑胥靡此鄭人爭滑之驗也莒隂忌奔莒杜注周邑按莒國之外又有三莒周莒齊莒魯莒父此周莒也其地未詳馮定六年鄭伐馮滑胥靡負黍狐人闕外杜註周邑東觀記曰魏之别封曰華侯華侯孫長卿食采于馮城即此負黍杜註周邑陽城西南有負黍亭在今河南府登封縣狐人杜注周邑後漢志潁隂縣有狐宗鄉古狐人亭也在今許州府臨潁縣闕外杜註周邑即伊闕外之邑也在今河南府洛陽縣南開塞山下榖城定八年單子伐榖城單子伐簡城劉子伐盂杜註在河南縣西在今河南府洛陽縣西北水經注城西臨穀水故名簡城杜註周邑周有簡師父簡城蓋其采地盂杜註周邑今懷慶府河南縣西北有邗臺鎮為古盂國周地伊川僖二十二年辛有適伊川杜注周地今為河南府嵩縣坎欿僖二十四年王遂出及坎欿杜註周地在今河南府鞏縣東邥垂文十七年甘􅍦敗戎于邥垂杜註垂亭在新城縣北今為汝州伊陽縣地溴梁襄十六年㑹于溴梁爾雅梁莫大于溴梁溴梁水堤也溴水源出懷慶府濟源縣西北至温縣入河轘轅襄二十一年使候出諸轘轅杜註轘轅闕名在今河南府鞏縣西南七十里雒汭昭元年趙孟館于洛汭水經注洛水入河之處亦名仆谷張儀謂下兵三川塞仆谷之口是也在今河南府鞏縣界三十里潁昭元年景王使劉定公勞趙孟于潁九年晉梁丙張趯率隂戎伐潁杜註潁水出陽城縣方輿紀要云陽城廢縣本周之穎邑在今河南府登封縣東南四十里戰國時屬鄭謂之陽城後入韓秦亦為陽城縣陳勝陽城人甘鹿昭十七年陸渾衆奔甘鹿杜註周地今河南府宜陽縣有鹿蹄山甘水所出榮錡氏昭二十二年王崩于榮錡氏杜註河南鞏縣西有榮錡澗方輿紀要括地志在縣西澗蓋在邑旁皇二十二年王猛居于皇杜註河南鞏縣西南有黄亭今在河南府鞏縣西北東圉單氏伐東圉路史周地杜註洛東靣有圉鄉社前城人敗陸渾于社杜註周地黄河西自偃師界至鞏縣洛水入之有五社渡又有五社津光武幸懐遣耿弇等軍五社津備滎陽以東即此隂晉籍談軍于隂漢平隂縣地今為河南府孟津縣治侯氏荀躒軍于侯氏杜注周地即緱氏今河南府偃師縣東南二十里有廢緱氏城谿泉賈辛軍于谿泉杜註鞏縣西南有明谿泉平隂昭二十三年晉師在平隂即隂漢為平隂縣地見前訾單子取訾路史曰訾有二西訾在洛東訾在鞏此盖西訾也二十四年河津人得子朝用于河之寶珪隂不佞拘之王定而獻與之東訾二十七年尹文公焚東訾始為鞏縣之訾杜氏混而一之則傳文東字為贅矣蒯尹辛攻蒯杜注河南縣西南蒯鄉今在河南府洛陽縣西南尸氏昭二十六年劉人敗王城之師于尸氏即尸鄉在河南府偃師縣西三十里田横自剄處渠劉子以王出次于渠杜註周地即陽渠也周公所鑿在河南鞏縣西通洛陽堤上遂軍圉澤次于堤上杜註周地漢書河决酸棗東潰金隄寰宇記金堤在洛陽縣西南二十三里時漢興未四十年河道始决金堤係三代時物明矣所云堤上疑即此周山川轘轅襄二十一年使侯出諸轘轅杜註轘轅闗在緱氏縣西南轘轅山名在今河南府鞏縣西南七十里其坂有十二曲將去復還故名闕塞昭二十六年晉知躒趙鞅納王使女寛守闕塞杜註洛陽西南伊闕口也闕塞山在今河南府治洛陽縣城南三十里一名龍門山一名伊闕一名闕口志云山之東曰香山西曰龍門大禹疏以通水兩山對峙石壁峭立望之若闕伊水歴其間故名伊闕北山昭二十二年王田于北山杜註北芒也一名邙山北邙山在今河南府治洛陽縣城北十里山連偃師孟津鞏三縣綿亘四百里在城之北故曰北山一名郟山成王定鼎于郟鄏即此亦謂之郟王城之别名桓七年遷盟向之民于郟襄二十四年齊人城郟杜註皆云郟王城也今府城西有郟鄏陌亦曰郟山亦曰邙山東漢諸陵及唐宋諸名臣墓多在此三塗昭四年傳四嶽三塗陽城太室九州之險杜註三塗在河南陸渾縣南三塗山在今河南府嵩縣南水經注曰伊水歴崖口山翼崖深髙壁立如闕伊水穿峽北流即古三塗山武王所謂南望三塗是也金志嵩縣有三塗山服䖍以三塗為道觀春秋晉伐陸渾有事于三塗即知是山明矣陽城杜註在陽城縣地陽城山在今河南府登封縣北三十八里志云城中有測景臺周公定此地為土中立圭測景漢唐因之太室杜註在陽城縣西南太室山在今河南府登封縣北十里漢志武帝置崇髙縣以奉太室是謂中嶽詩譜即外方山也嵩山三十六峯東曰太室西曰少室嵩髙其總名施谷昭二十六年王城人劉人戰于施谷萑谷丁丑王次于萑谷按大谷在今洛陽縣東後漢書孫堅進軍大谷距洛九十里其谷連亘至潁陽縣何進設八闗大谷其一也周之萑谷施谷蓋皆大谷之支徑河昭二十四年王子朝用成周之寳珪于河大河經河南府洛陽縣北境禹貢東過洛汭正當王城之東北故子朝用珪于河以求福也洛水昭元年趙孟館于洛汭杜註洛水在鞏縣南水曲流為汭雒汭在今河南府鞏縣東北三十里後漢書鞏縣注夏太康五弟徯于洛之汭即此水經注洛水入河之處清濁異流亦名什谷隋于此置洛口倉以洛水東逕洛汭北對琅邪渚入河謂之洛口伊水僖二十二年辛有適伊川伊源有二水經注伊水出南陽蔓渠山逕陸渾縣三塗山東注虢略其地即辛有過伊川見被髪而野祭處後漢書則云伊水出盧氏近志因謂之伊川出盧氏悶頓嶺東流經嵩縣洛陽偃師入洛水蓋原有二水合流諸家各言所見耳榖水襄二十四年傳注穀洛鬬毁王宫穀水在今河南府洛陽縣王城北門外昭二十四年士景伯立于乾祭杜註乾祭王城北門水經注榖水又東繞乾門北子朝之亂晉所開也其東即千金堨又東為東谷水水之西北即金墉城湟水昭二十二年王猛居于皇杜注河南鞏縣西南有黄亭按後漢志湟水即皇也水經注雒水合于谿泉又東濁水注之即古湟水京相璠曰黄亭在訾城北三里今在鞏縣西北溴水襄十六年㑹于溴梁杜註溴水出河内軹縣東南至溫入河案爾雅梁莫大于溴梁溴梁水隄也溴水濟出懷慶府濟源縣西北俗呼白澗水翟泉昭二十二年天王居狄泉亦曰翟杜註洛陽城内大倉西南池水也案敬王初居狄泉時尚在城外至昭公三十二年合諸侯于狄泉以其地大成周之城乃繞狄泉于城内今乾無水酒泉莊二十一年王與虢公酒泉杜註周邑今陜西同州府澄城縣有溫泉西注于洛又有甘泉出匱谷中造酒尤佳名曰酒泉蓋虢地跨河東西後入于晉平隂昭二十二年晉師在平隂今河隂縣按平隂古為津濟處陳平降漢王使驂乗監諸將南渡平隂津至洛陽是也後置平隂縣以縣在平津大河之間故名魏晉改曰河隂縣唐改曰河清縣至金移治于河南岸改曰孟津縣即今河南府之孟津縣治也杜註之河隂縣與鄭州之河隂縣有别右春秋周都邑山川五禮通考卷二百七
