body:
  text: 五禮通考目録禮類五通禮之屬卷首禮經作述源流歴代禮制沿革卷一吉禮一圜丘祀天郊名義四代郊正祭四代告祭卷二吉禮二圜丘祀天郊壇配帝日月從祀卷三吉禮三圜丘祀天玉帛親耕粢盛秬鬯酒醴犧牲籩豆之實器用卷四吉禮四圜丘祀天服冕車旗告廟卜誓戒擇士齊戒具陳設省眡卷五吉禮五圜丘祀天呼旦警戒除道警蹕祭日陳設省視祭時聴祭報王出郊燔柴作樂降神迎尸迎牲殺牲盥薦玉幣薦豆籩薦血腥朝踐王三獻宗伯四獻祝號享牲薦熟饋獻王三獻宗伯四獻薦黍稷饋食王五獻宗伯六獻諸臣七獻祀神之樂送尸徹告事畢代祭喪不廢祭卷六吉禮六圜丘祀天秦漢卷七吉禮七圜丘祀天後漢蜀漢魏呉晉宋卷八吉禮八圜丘祀天齊梁陳北魏北齊北周隋卷九吉禮九圜丘祀天唐卷十吉禮十圜丘祀天唐卷十一吉禮十一圜丘祀天唐五代卷十二吉禮十二圜丘祀天宋卷十三吉禮十三圜丘祀天宋卷十四吉禮十四圜丘祀天宋卷十五吉禮十五圜丘祀天宋卷十六吉禮十六圜丘祀天宋卷十七吉禮十七圜丘祀天遼金元卷十八吉禮十八圜丘祀天元卷十九吉禮十九圜丘祀天明卷二十吉禮二十圜丘祀天明卷二十一吉禮二十一祈穀經傳祈穀郊春秋書魯祈穀郊經傳論魯郊歴代祈穀卷二十二吉禮二十二大雩常雩因旱而雩魯大雩水旱雜禳漢至南北朝雩禮卷二十三吉禮二十三大雩隋至明雩禮卷二十四吉禮二十四明堂明堂制度明堂饗帝宗祀方岳明堂明堂附録卷二十五吉禮二十五明堂漢後漢魏晉宋齊梁陳卷二十六吉禮二十六明堂北魏北齊北周隋卷二十七吉禮二十七明堂唐卷二十八吉禮二十八明堂宋卷二十九吉禮二十九明堂宋卷三十吉禮三十明堂宋卷三十一吉禮三十一五帝五帝兆五帝義及配神迎氣祭五帝祭五帝儀秦四畤漢五畤東漢五郊迎氣卷三十二吉禮三十二五帝祭寒暑歴代祭五帝祭四時附寒暑坎壇享司暑司寒歴代享司寒卷三十三吉禮三十三日月日月坎壇正祭因事祭日月祭日月儀日月附録漢至唐祀日月卷三十四吉禮三十四日月唐至明祀日月卷三十五吉禮三十五星辰統祭星辰祭司中司命祭司民司禄祭分野星祭房星祭靈星農星歴代祭星辰附九宫貴人卷三十六吉禮三十六星辰附太一太嵗月將風師雨師附雲神雷神卷三十七吉禮三十七方丘祭地方丘正祭后土告祭祭地稱社祭日配神親耕粢盛醴酪玉幣犧牲器用服冕瘞埋樂尸祝儀節卷三十八吉禮三十八方丘祭地秦漢晉宋齊梁陳北魏北齊北周隋唐卷三十九吉禮三十九方丘祭地宋金元卷四十吉禮四十方丘祭地明卷四十一吉禮四十一社稷建設社稷社稷神位社稷壇社稷名義社稷配神天子社稷諸侯社稷勝國社稷卷四十二吉禮四十二社稷州社市社里社軍社社名社木社主社田君親誓社社稷祈報正祭牲酒醴粢盛冕服樂舞君親祭三獻受脈卜稼因事祭社稷變置社稷總論社稷卷四十三吉禮四十三社稷漢後漢魏晉宋齊梁陳北魏北周隋唐卷四十四吉禮四十四社稷宋金元卷四十五吉禮四十五社稷城隍附明歴代祭城隍卷四十六吉禮四十六四望山川四望壇秩望祀望正祭禮物儀節郊後望祈告望魯望列國望祈禳走羣望望祭法山川壇祭山川名義山川正祭祭山川之時祭山川禮物儀節因事祭山川禜祭山川卷四十七吉禮四十七四望山川秦兩漢三國魏晉宋梁北魏北齊北周隋唐後唐後晉後周宋卷四十八吉禮四十八四望山川遼金元明卷四十九吉禮四十九四望山川附傳記諸家論封禪秦始皇封禪漢武帝封禪後漢光武帝封禪卷五十吉禮五十四望山川附魏文帝封禪未行孫皓封禪附晉武帝不行封禪宋文帝孝武帝封禪未行梁武帝不行封禪北齊文宣帝封禪未行隋文帝不行封禪唐髙祖不行封禪唐太宗封禪未行卷五十一吉禮五十一四望山川附唐髙宗封禪武后封禪附唐𤣥宗封禪上卷五十二吉禮五十二四望山川附唐𤣥宗封禪下宋真宗封禪宋徽宗封禪未行明成祖論封禪卷五十三吉禮五十三五祀通論五祀五祀之義祀户祀竈祀中霤祀門祀行臘祭五祀祀五祀之儀因事祭五祀祀井祭法立祀五官之神歴代祭五祀卷五十四吉禮五十四六宗禋六宗歴代禋六宗卷五十五吉禮五十五四方四類髙禖四方坎壇四方正祭因事祭四方祭四方禮物樂舞六沴祀四方四類兆經傳祀髙禖歴代祀髙禖卷五十六吉禮五十六蜡臘蜡名義八蜡臘蜡祭禮物樂舞祝詞祭蜡飲酒正齒位蜡時之事歴代蜡卷五十七吉禮五十七儺酺盟詛釁經傳儺歴代儺祭酺經傳盟詛後世盟詛釁禮卷五十八吉禮五十八宗廟制度四代七廟之制世室經傳言廟不同卷五十九吉禮五十九宗廟制度廟祧昭穆卷六十吉禮六十宗廟制度廟門之制中庭碑堂塗階戺堂廉垂廟中房室之制卷六十一吉禮六十一宗廟制度堂制堂室屋宇之制屏坫寢卷六十二吉禮六十二宗廟制度尸主祏匰行師遷主宗廟守蔵祝卷六十三吉禮六十三宗廟制度彛瓉秬鬯尊罍酒齊爵斚奠獻卷六十四吉禮六十四宗廟制度簠簋粢盛鼎俎牲醴卷六十五吉禮六十五宗廟制度籩豆庶羞卷六十六吉禮六十六宗廟制度器用器用附卷六十七吉禮六十七宗廟制度服冕卷六十八吉禮六十八宗廟制度王后服飾舄屨韍韠帶佩卷六十九吉禮六十九宗廟制度服飾總卷七十吉禮七十宗廟制度虞廟享之樂夏廟享之樂商廟享之樂周廟享之樂卷七十一吉禮七十一宗廟制度周廟享之樂周祭畢繹祭之樂卷七十二吉禮七十二宗廟制度附律呂本原律呂名義黄鍾之實黄鍾生十一律三分損益黄鍾真度卷七十三吉禮七十三宗廟制度附五聲名義五聲弦度七音四調