body:
  text: 五禮通考卷一百五十七刑部尚書秦蕙田撰嘉禮三十饗燕禮儀禮燕禮鄭目録云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之於五禮屬嘉禮疏燕有四等諸侯無事而燕一也魯頌于胥樂兮是也卿大夫有王事之勞二也記賔及庭而奏肆夏是也卿大夫有聘而來還與之燕三也四牡勞使臣是也四方聘客與之燕四也郊特牲賔入大門而奏肆夏又聘禮燕與時賜是也燕禮小臣戒與者注小臣相君燕飲之法戒與者謂留羣臣也君以燕禮勞使臣若臣有功故與羣臣樂之小臣則警戒告語焉飲酒以合㑹為歡也疏周禮太僕職云王燕飲則相其法小臣職云凡大事佐太僕則王燕飲太僕相小臣佐之此諸侯禮降於天子故宜使小臣相朱子曰羣臣朝畢將退君欲與燕使小臣留之方氏苞曰檀弓記朝不坐燕不與則中下士亦有不與者矣欽定義疏夏官小臣爵上士則諸侯之小臣其中下士與所燕如本國臣子則戒於朝若異國聘客則當别戒於館膳宰具官饌於寢東注膳宰天子曰膳夫掌君飲食膳羞者也具官饌具其官之所饌謂酒也牲也脯醢也欽定義疏凡饗食在廟皆陳鼎於門外此燕在寢故具饌於寢東樂人縣注縣鐘磬也國君無故不撤縣言縣者為燕新之設洗篚於阼階東南當東霤罍水在東篚在洗西南肆設膳篚在其北西面注設此不言其官賤也當東霤者人君為殿屋也亦南北以堂深肆陳也膳篚者君象觚所饌也亦南陳言西面尊之異其文周疏漢時殿屋四向流水故舉漢以况言東霤明亦有西霤敖氏繼公曰諸篇但言設洗無連言篚者此篚字衍文洗與罍蓋瓦為之盛氏世佐曰二篚皆在堂下一盛諸臣飲器一盛君飲器而無堂上篚者蓋堂上之篚所以盛爵燕禮輕不用爵也司宫尊於東楹之西兩方壺左𤣥酒南上公尊瓦大兩有豐冪用綌若錫在尊南南上尊士旅食於門西兩圜壺注司宫天子曰小宰聴酒人之成要者也尊方壺為卿大夫士也臣道直方於東楹之西予君專此酒也玉藻曰惟君靣尊𤣥酒在南順君之靣也瓦大有虞氏之尊也禮器曰君尊瓦甒豐形似豆卑而大冪用綌若錫冬夏異也在尊南在方壺之南也尊士旅食者用圜壺變於卿大夫也旅衆也士衆食謂未得正禄所謂庶人在官者也今文錫為緆朱子曰在尊南者謂瓦大在方壺之南耳疏云冪未用而陳於方壺之南不雜於方壺瓦大之間誤也若然則正在二者之間矣何得言不雜耶盛氏世佐曰司宫即天官之宫人也周禮宫人凡寢中之事掃除執燭共爐炭凡勞事此燕於路寢故設尊筵賔以司宫為之下經云司宫執燭於西階上是其執燭之證矣天子之宫人位中士則諸侯司宫其下士與鄭以小宰當之誤蕙田案小宰諸侯之小卿不應下執賤役注説誤也公食大夫記司宫具几注司宫大宰之屬賈氏以天官之宫人當之與此互異當從彼注司宫筵賔於户西東上無加席也注筵席也席用蒲筵緇布純無加席燕私禮臣屈也諸侯之官無司几筵也蕙田案以上告戒設具射人告具注告事具於君射人主此禮以其或射也具疏大射告具之上有羮定此不言者文不敖氏繼公曰是時公蓋在阼階東南南鄉射人北靣告之小臣設公席於阼階上西鄉設加席公升即位於席西鄉注周禮諸侯酢席莞筵紛純加繅席畫純後設公席者凡禮卑者先即事尊者後也疏引周禮司几筵文祭祀受酢之席也引之者欲見燕席與酢席同朱子曰此篇與大射雖設席先後不同然皆公先升即位然後納賔非卑者先即事但言偶不同耳不當據文便生異義小臣納卿大夫卿大夫皆入門右北面東上士立於西方東靣北上祝史立於門東北面東上小臣師一人在東堂下南面士旅食者立於門西東上注納者以公命引而入也自士以下從而入即位耳師長也小臣之長一人猶天子大僕正君之服位者也凡入門而右由闑東左則由闑西始疏卿大夫入門右北面東上此是擬君揖位君爾之就庭位士立於西方東面北上此士之定位士賤不待君揖即就定位也注云入門而右由闑東者臣朝君之法左則由闑西者聘賔入門之法孔氏頴達曰士之朝位雖在西方東面入時仍依闑東公降立於阼階之東南南鄉爾卿卿西面北上爾大夫大夫皆少進注爾近也移也揖而移之近之也大夫猶北面少前敖氏繼公曰大夫不西面别於卿也蕙田案以上君臣各就位射人請賔注命當由君出也可疏其君南面射人北面知公曰命某為賔注某大夫也明疏知大夫非卿者以賔主相對宰夫為主人是大夫賔亦是大夫燕義云不以公卿為賔而以大夫為賔為疑也郝氏敬曰卿不為賔嫌偪也射人命賔賔少進禮辭注命賔者東靣南顧禮辭辭不敏也敖氏繼公曰命賔之辭蓋曰君命子為賔少進者宜違其位反命注射人以賔之辭告於君又命之賔再拜稽首許諾注又復射人反命注告賔許賔出立於門外東面注當更以賔禮入敖氏繼公曰大射儀云北面此東字蓋誤公揖卿大夫乃升就席注揖之入之也盛氏世佐曰此揖卿大夫共一揖也蓋略於爾之之時矣敖云亦異揖之恐未是蕙田案以上命賔小臣自阼階下北面請執冪者與羞膳者注執冪者執瓦大之冪也方圜壺無冪羞膳羞於公謂庶羞乃命執冪者執冪者升自西階立於尊南北面東上注以公命於西階前命之也東上𤣥酒之冪為上也羞膳者從而東由堂東升自北階房中西面南上不言之者不升堂略之也膳宰請羞於諸公卿者注小臣不請而使膳宰於卑者彌略也禮以異為敬蕙田案以上命執事者射人納賔注射人為擯者也今文曰擯者敖氏繼公曰納賔之辭蓋曰君湏矣吾子其入也賔入及庭公降一等揖之注及至也至庭謂既入而左北面時公升就席注以其將與主人為禮不参之也吕氏大臨曰賔入公降揖之公升席乃以宰夫為主人君不敢以己尊而略賔主之敬臣不敢以為賔而屈君之尊故燕禮之節禮之於賔主義之於君臣並行而不相悖蕙田案以上納賔賔升自西階主人亦升自西階賔右北面至再拜賔答再拜注主人宰夫也宰夫太宰之屬掌賔客之獻飲食者也其位在洗北西面君於其臣雖為賔不親獻以其尊莫敢伉禮也至再拜者拜賔來至也天子膳夫為獻主疏知主人是宰夫者燕義云使宰夫為獻主是也位在洗北西面者下文胥薦主人於洗北西面是也敖氏繼公曰諸侯之宰夫蓋以士為之其位亦在西方故賔進則主人從而升也張氏爾岐曰主人亦升自西階者代君為獻主不敢由阼階也蕙田案此宰夫與周禮天官宰夫不同周禮宰夫其位下大夫其職亞於小宰所掌賔客之牢禮膳獻飲食特舉其大綱耳此宰夫蓋即周官之膳夫王燕飲則膳夫為獻主諸侯則宰夫為獻主其職正同天子膳夫上士則此宰夫其中下士與注疏以周禮之宰夫當之誤矣又案以上拜至主人降洗洗南西北面注賔將從降鄉之賔降階西東面主人辭降賔對注對答李氏如圭曰鄉飲酒賔主異階故主人在階下辭賔降此宰夫與賔同由西階故於洗南辭降主人北面盥坐取觚洗賔少進辭洗主人坐奠觚於篚興對賔反位注賔少進者又辭宜違其位也獻不以爵辟正主也古文觚皆為觯疏宰夫非正主故用觚鄉飲酒鄉射是正主故用爵敖氏繼公曰獻公用象觚則此乃角觚也下放此主人卒洗賔揖乃升注賔每先升尊也主人升賔拜洗主人賔右奠觚答拜降盥注主人復盥為拜手坋塵也賔降主人辭賔對卒盥賔揖升主人升坐取觚注取觚將就瓦大酌膳執冪者舉冪主人酌膳執冪者反冪注君物曰膳膳之言善也酌君尊者尊賔也主人筵前獻賔賔西階上拜筵前受爵反位主人賔右拜送爵注賔既拜前受觚退復位敖氏繼公曰獻賔蓋亦西北面與鄉飲酒禮同故不著之膳宰薦脯醢賔升筵膳宰設折俎注折俎牲體骨也鄉飲酒記曰賔俎脊脅肩肺敖氏繼公曰公俎似當用肩賔俎用臂與鄉飲酒賔主之俎異賔坐左執爵右祭脯醢奠爵於薦右興取肺坐絶祭嚌之興加於俎坐捝手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告㫖執爵興主人答拜注降席席西也㫖美也疏降席坐奠爵拜鄭云降席席西不言面案前例降席席西拜者皆南面拜訖則告㫖賔西階上北面坐卒爵興坐奠爵遂拜主人答拜注遂拜拜既爵也蕙田案以上主人獻賔賔以虚爵降注將酢主人主人降賔洗南坐奠觚少進辭降主人東面對注上既言爵矣復言觚者嫌易之也大射禮曰主人西階西東面少進對今文從此以下觚皆為爵觚疏一升曰爵二升曰觚散文則觚亦稱爵此即前爵嫌易之故復言觚也敖氏繼公曰坐奠觚興少進皆西北面賔坐取觚奠於篚下盥洗注篚下篚南主人辭洗注謙也今文無洗賔坐奠觚於篚興對卒洗及階揖升主人升拜洗如賔禮賔降盥主人降賔辭降卒盥揖升酌膳執冪如初以酢主人於西階上主人北面拜受爵賔主人之左拜送爵注賔既南面授爵乃之左方氏苞曰賔酢主人亦酌膳者主人代君以獻則酌之如酢君不敢用散主人坐祭不啐酒注辟正主也未薦者臣也張氏爾岐曰正主人皆有啐酒惟不告㫖賔獻訖即薦脯醢此主人是臣故酢時不薦至獻大夫後乃薦於洗北不拜酒不告㫖注主人之義遂卒爵興坐奠爵拜執爵興賔答拜主人不崇酒以虚爵降奠於篚注崇充也不以酒惡謝賔甘美君物也賔降立於西階西注既受獻矣不敢安盛射人升賔賔升立於序内東面注東西墻謂之序大射禮曰擯者以命升賔敖氏繼公曰己之獻酬禮畢主人又將與君為禮故不敢居堂升賔者優之也序内東面鄉君也然則君位亦在東序内明矣蕙田案以上賔酢主人主人盥洗象觚升實之東北面獻於公注象觚觚有象骨飾也取象觚者東面欽定義疏獻酢之禮酬而後成未酬賔而獻公者尊公也先獻賔而後獻公燕之禮主於賔也成公意亦以尊公也公拜受爵主人降自西階阼階下北面拜送爵士薦脯醢膳宰設折俎升自西階注薦進也大射禮曰宰胥薦脯醢由左房疏凡此篇内公應先拜者皆後拜之尊公故也此公先拜受爵者受獻禮重也前獻賔薦脯醢及設折俎皆使膳宰賔卑故也今於公士薦脯醢膳宰設折俎異人以士尊於膳宰君尊故使士薦引大射禮者證此脯醢自左房來敖氏繼公曰升自西階者俎也著之者嫌公俎宜由阼也膳宰既設俎則少退東面而俟既賛授肺乃降欽定義疏主人之降皆自西階此著之者以當向阼階下明不敢由便而自阼階降也公祭如賔禮膳宰賛授肺不拜酒立卒爵坐奠爵拜執爵興注凡異者君尊變於賔也主人答拜升受爵以降奠於膳篚欽定義疏主人既拜送爵不即升俟答拜也其北面立以俟與主人受爵亦東北面其奠於膳篚亦東面蕙田案以上主人獻公更爵洗升酌膳酒以降酢於阼階下北面坐奠爵再拜稽首公答再拜注更爵者不敢襲至尊也古文更為受疏主人受公酢而自酌者不敢煩公尊君之義獻君自酢同用觚必更之者不敢因君之爵楊氏復曰主人獻公用象觚則别於賔矣主人阼階下拜送爵又更爵酢於阼階下君尊也君尊不酢其臣主人自酢成公意也雖更爵亦酌君之膳酒者明酢之之意出自君也敖氏繼公曰更爵者蓋取南篚之觯上下文酌膳皆無酒字此衍主人坐祭遂卒爵再拜稽首公答再拜主人奠爵於篚敖氏繼公曰亦興坐奠爵乃再拜稽首執爵興蕙田案以上主人自酢主人盥洗升媵觚於賔酌散西階上坐奠爵拜賔賔降筵北面答拜注媵送也讀或謂揚揚舉也酌散者酌方壺酒也於膳為散今文媵皆作騰疏案賔前受獻訖立於序内以來未有升筵之事且鄉飲酒大射酬前賔皆無逆在席者此言降筵蓋誤敖氏繼公曰洗洗角觯也觚當作觯欽定義疏獻以爵而酬以觶飲酒之大凡也獻或不以爵而以觚以角以散則皆有為而為之至酬則無不以觶者以非觶則不可以旅也此主人酬賔也則觚之當為觶審矣主人坐祭遂飲賔辭卒爵拜賔答拜注辭者辭其代君行酒不立飲也此降於正主酬也敖氏繼公曰賔見主人將飲故辭之蓋欲即受此觶不敢復煩主人之更酌己且逺辟媵爵於公之禮也媵爵於公者亦皆先自飲乃更酌之欽定義疏坐祭遂飲鄉飲鄉射之常初不於燕而異上文主人獻賔賔坐祭坐啐坐飲卒爵未嘗立飲賔酢主人亦然賔未嘗辭也可見代君酬本無降而立飲之禮則賔之辭非辭其坐飲明矣敖氏之義差長主人降洗賔降主人辭降賔辭洗卒洗揖升不拜洗注不拜洗酬而禮殺主人酌膳賔西階上拜注拜者拜其酌也受爵於筵前反位主人拜送爵賔升席坐祭酒遂奠於薦東注遂者因坐而奠不北面也奠之者酬不舉也賔疏案鄉飲酒鄉射主人酬賔皆主人實觶席前北靣始西階上拜此及大射主人始酌膳時賔已西階上拜者以其燕禮大射皆是主人代君勸酒而其賔是臣急承君勸不敢安暇故先拜也主人降復位賔降筵西東南靣立注賔不立於序内位彌尊也位彌尊者其禮彌卑位疏賔初得獻立序内此酬訖立席西漸近賔筵是彌尊酬禮漸殺故云禮彌卑也李氏如圭曰下經薦主人於洗北則洗北者主人之位蕙田案以上主人酬賔小臣自阼階下請媵爵者公命長楊氏復曰二人媵爵公取此媵爵以酬賔賔以旅酬於西階上此與鄉飲酒禮一人舉觶於賔以為旅酬始其義同而禮則不同敖氏繼公曰此媵爵以為旅酬始也長謂下大夫之長也不言下大夫者以下大夫媵爵有常職故小臣作下大夫二人媵爵注作使也卿為上大夫不使之者為其尊媵爵者阼階下皆北面再拜稽首公答再拜注再拜稽首拜君命也媵爵者立於洗南西面北上序進盥洗角觶升自西階序進酌散交於楹北降阼階下皆奠觶再拜稽首執觶興公答再拜注序次第也猶代也楹北西楹之北也交而相待於西階上既酌右還而反徃來以右為上疏西面北上未盥相待之位序進盥則北面向洗二大夫盥手洗爵訖先者升西階由西楹之北向東楹之西東面酌酒訖右還由西楹北向西階上北面後者升西階亦由西楹之北向東楹之西酌酒訖亦由西楹之北西階上北面相待乃次第而降故云交而相待於西階上蕙田案媵爵者亦當降自西階而拜於阼階下與主人獻公拜送爵之禮同後倣此媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜媵爵者執觶待於洗南注待君命也敖氏繼公曰洗南西面鄉者之位小臣請致者注請使一人與二人與優君也敖氏繼公曰致如致爵之致酒君物也以進於公故謂之致張氏爾岐曰或皆致或一人致取君進止若君命皆致則序進奠觶於篚阼階下皆再拜稽首公答再拜媵爵者洗象觶升實之序進坐奠於薦南北上降阼階下皆再拜稽首送觶公答再拜注序進徃來由尊北交於東楹之北奠於薦南不敢必君舉也大射禮曰媵爵者皆退反位疏前二人酌酒降自西階故交於西楹之北此酌酒奠於君所故交於東楹之北先酌者東面酌訖由尊北又於楹北往君所奠訖右還而反後酌者亦於尊北又於楹北與反者相交先者於南西過後者於北東行奠訖亦右還而反相随降自西階凡奠爵將舉者於右今媵爵於公為將舉旅當奠薦右而奠於薦左是不敢必君之舉也引大射禮者此經二人階下再拜送觶無反位之文故引大射媵爵者皆退反門右北面位蕙田案以上二人媵爵於公公坐取大夫所媵觶興以酬賔賔降西階下再拜稽首公命小臣辭賔升成拜注興以酬賔就其階而酬之也升成拜復再拜稽首也先時君辭之於禮若未成然西疏以賔降拜不於阼階下而於西階下故知公在賔階上也不言西階者以公尊空其文也凡臣於君雖為賔與君相酬不敢拜於堂上皆拜於堂下若君辭之聞命即升若堂下拜訖君辭之即升堂復再拜稽首所以然者以堂下再拜君辭之若未成然故復升堂再拜稽首以成之公坐奠觶答再拜執觶興立卒觶賔下拜小臣辭賔升再拜稽首注不言成拜者為拜故下實未拜也下不輙拜禮殺也此賔拜於君之左不言之者不敢敵偶於君公坐奠觶答再拜執觶興賔進受虛爵降奠於篚易觶洗注君尊不酌故也凡爵不相襲者於尊者言更自敵以下言易更作新易有故之辭進受虛爵尊君也不言公酬賔於西階上及公反位者亦尊君空其文也朱子曰更易二字注疏説雖詳然於例頗有不合疑本無異義不必强生分别楊氏復曰媵爵以酬賔此别是一禮與尋常酬賔不同此所謂公為賔舉旅也燕禮君使宰夫為獻主以臣莫敢與君伉禮也今君舉觶於西階之上以酬賔可乎蓋君臣之際其分甚嚴其情甚親使宰夫為獻主所以嚴君臣之分今舉觶以酬賔賔西階下拜小臣辭升成拜公奠觶答再拜公卒觶賔下拜公答再拜略去勢分極其謙卑所以通君臣之情也注云不言君酬賔於西階上及公反位尊君空其文也此又所以嚴君臣之分也公有命則不易不洗反升酌膳觶下拜小臣辭賔升再拜稽首注下拜下亦未拜凡下未拜有二或禮殺或君親辭君親辭則聞命即升升乃拜是亦不言成拜敖氏繼公曰命謂使之仍用象觶也不易不敢違君意也不洗者嫌也承尊者後而洗之嫌若不以為潔然觶字衍文大射儀無之酌膳者以為公所酬亦達其意也雖易觶猶酌膳公答再拜注拜於阼階下也於是賔請旅侍臣蕙田案以上公酬賔之禮終賔以旅酬於西階上注旅序也以次序勸卿大夫飲酒射人作大夫長升受旅注言作大夫則卿存矣長者尊先而卑後賔大夫之右坐奠觶拜執觶興大夫答拜注賔在右者相飲之位賔疏賔在西階上酬卿賔與卿並北面在東卿在西是賔在大夫之右賔位合在西而今在東者相飲之位也賔坐祭立飲卒觶不拜注酬而禮殺既疏對酢之時坐卒爵拜爵是禮盛也敖氏繼公曰賔獨祭酬酒者以此酒為君所酬異之也若膳觶也則降更觶洗升實散大夫拜受賔拜送注言更觶卿尊也張氏爾岐曰膳觶本非臣所可襲以君命故得一用至酌他人則必更矣注釋更字義亦未可信盛氏世佐曰此為公有命不易不洗者而言若既易則不更不洗而竟實散矣不酌膳異於公所酬也大夫辯受酬如受賔酬之禮不祭卒受者以虛觶降奠於篚注卒猶後也大射禮曰奠於篚復位今文辯皆作徧疏不祭者酬禮殺也經云降奠於篚不言反位故引大射奠爵於篚訖當復門右北面位張氏爾岐曰大夫辨受酬不及於士也蕙田案以上公為賔舉旅主人洗升實散獻卿於西階上注酬而後獻卿别尊卑也飲酒成於酬也疏此酬非謂尋常獻酬乃是賔為君舉旅行酬也飲酒之禮成於酬君尊臣卑是以君禮成卿乃得獻楊氏復曰卿者君之股肱腹心燕禮之所當先也獻禮後卿何也燕義曰不以公卿為賔而以大夫為賔為疑也明嫌之義也既命大夫為賔故先獻賔獻賔而後獻公又獻禮成於酬禮成而後酬卿此事之序禮之宜非後於卿也司宫兼卷重席設於賔左東上注言兼卷則每卿異席也重席重蒲筵緇布純也卿坐東上統於君也席自房來席疏公食大夫記云司宫具几與蒲筵常緇布純加萑尋𤣥帛純彼為異國之賔有蒲筵萑席兩重席故稱加此燕己臣子一種席重設之故不稱加卿升拜受觚主人拜送觚卿辭重席司宫徹之注徹猶去也重席雖非加猶為其重累去之辟君也張氏爾岐曰以君有加席兩重此雖蒲筵一種重設嫌其兩重與君同也乃薦脯醢卿升席坐左執爵右祭脯醢遂祭酒不啐酒降席西階上北面坐卒爵興坐奠爵拜執爵興主人答拜受爵卿降復位注不酢辟君也卿無俎者燕主於羞疏薦脯醢不言其人略之下記云羞卿者小膳宰是也張氏爾岐曰獻公主人酢於阼階下此不酢者嫌與獻公同也辯獻卿主人以虛爵降奠於篚注今文無奠於篚射人乃升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮注諸公者謂大國之孤也席於阼階西北面東上無加席注席孤北面為其大尊屈之也亦因阼階西位近君近君則屈親寵茍敬私昵之坐於疏記云賔為茍敬席於阼階之西以為敬此孤亦席阼階西故為茍敬私昵之坐也蕙田案以上主人獻公卿小臣又請媵爵者二大夫媵爵如初注又復請致者若命長致則媵爵者奠觶於篚一人待於洗南長致致者阼階下再拜稽首公答再拜注命長致者公或時未能舉自優暇也張氏爾岐曰前媵爵云若命皆致此媵爵云若命長致皆不定之辭非謂前必二人後必一人也欲互見其儀耳洗象觶升實之坐奠於薦南降與立於洗南者二人皆再拜稽首送觶公答再拜注奠於薦南者於公所用酬賔觶之處二人俱拜以其共勸君旅疏前二人媵觶奠於薦南北上其上觶已取為賔舉下觶仍在今大夫又媵一觶奠於薦南知是所用酬賔觶之䖏也楊氏復曰二大夫媵爵如初謂如前下大夫二人媵爵時之禮也然有同亦有異前二人媵爵此亦二人媵爵故序進酌散交於西楹之北降阼階下奠觶卒觶再拜稽首執觶待於洗南是則同前小臣請致者君命皆致故序進酌膳奠於薦南與後者交於東楹之北降而之阼階下再拜稽首送觶此則不然君命長致故一人待於洗南惟長一人進酌膳奠於薦南降而之阼階下與一人皆再拜稽首送觶無序進交於東楹北之事此其異也蕙田案以上再媵爵公又行一爵若賔若長唯公所酬注一爵先媵者之下觶也若賔若長則賔禮殺矣長公卿之尊者也賔則以酬長長則以酬賔敖氏繼公曰先若二人致則此一爵乃先致者之下觶先若一人致則此乃後致者之上觶也此酬主於公若卿乃或又酬賔者容遂尊者之所欲耳以旅於西階上如初大夫卒受者以虚觶降奠於篚疏言如初者一如上為賔舉旅之節楊氏復曰經云如初謂如前公為賔舉旅時禮也前君命二人皆致有兩觶奠於薦南後命長致有一觶奠於薦南前後凡有三觶燕禮自立司正以前凡有三舉旅用此三觶也初酬賔時公坐取所媵一觶以酬賔是行一觶也此公又行一爵若賔若長唯公所酬注云公又行一爵先媵者之下觶也下觶未舉今舉之是行二觶也工歌之後笙入之前公又舉奠觶唯公所賜以旅於西階上如初是行三觶也注疏之文不甚顯煥故表而出之又主人獻士之後賔媵觶於公公取此觶為大夫舉旅此又在三觶之外也蕙田案以上公為諸公卿舉旅主人洗升獻大夫於西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位注既盡也不拜之者禮又殺又疏前卿受獻不酢已是禮殺今大夫受獻不但不酢不拜既爵故云禮又殺張氏爾岐曰自此下至樂正告公主人獻大夫未及旅而樂作獻工後乃舉旅旅已奏笙間歌合樂爵樂更作以成三旅禮又殺而樂大備所以致和樂之情也胥薦主人於洗北西面脯醢無脀注胥膳宰之吏也主人大夫之下先大夫薦之尊之也不於上者上無其位也脀俎實大疏大射注云主人大夫不云下此云大夫之下者謂夫之中位次在下燕禮大夫堂上士在下獨此宰夫言堂上無位者以其主人位在阼階君已在阼故主人辟之位在下欽定義疏天子之宰夫為下大夫則諸侯之宰夫宜降一等天子以膳夫為獻主而膳夫為上士則諸侯之獻主又宜下之注謂大夫之下者言主人之爵視大夫為下正以明其為士也大射注曰下大夫也亦言其下於大夫耳未嘗直云主人大夫也疏蓋誤㑹注意辯獻大夫遂薦之繼賔以西東上注徧獻之乃薦略賤也亦獻而後布席也卒射人乃升大夫大夫皆升就席蕙田案以上主人獻大夫席工於西階上少東樂正先升北面立於其西注工瞽矇歌諷誦詩者也凡執技藝者稱工少牢饋食禮曰皇尸命工祝樂記師乙曰乙賤工也樂正於天子樂師也凡樂掌其序事樂成則告備小臣納工工四人二瑟小臣左何瑟面鼓執越内弦右手相入升自西階北面東上坐小臣坐授瑟乃降注工四人者燕禮輕從大夫制也面鼔者燕尚樂可鼓者在前也越瑟下孔也内弦弦為主也相扶工也後二人徒相天子大僕二人也小臣四人祭僕六人御僕十二人皆同官盛氏世佐曰小臣止四人而盡用之相工鄭疑其不足於他用故引周禮序官之文以見其同官者衆或可兼攝遞代也案小臣之職掌王之小命詔小法儀正燕服之位於諸侯當亦不異此篇戒羣臣設公席納卿大夫既而請執冪羞膳者請媵請致辭賔皆以小臣為之至是又納工而為之相前後職事各不相妨雖四人何慮其不給乎且小臣相工方行禮之時則然耳非專司其事也專司其事者眡瞭也周禮上瞽中瞽下瞽共三百人眡瞭之數亦如之每瞽一相必不可少也諸侯之眡瞭雖少於天子亦豈小臣所能充其數乎且眡瞭非官也而小臣則以上士為之於諸侯亦當為中士豈得以羣僕侍御之臣親兹細事乎眡瞭之相瞽常職也燕與大射納工之時小臣等官相之以樂賔故重其事非常職也舊説諸侯無眡瞭使小臣代之非工歌鹿鳴四牡皇皇者華注三者皆小雅篇也卒歌主人洗升獻工工不興左瑟一人拜受爵主人西階上拜送爵注工歌乃獻之賤者先就事也左瑟便其右一人工之長者也工拜於席疏工北面以西為左空其右受獻酒從東楹之西來故以右為便薦脯醢注輙薦之變於大夫也禮疏大夫徧獻乃薦此獻一人即薦尚異故變於大夫也使人相祭注使扶工者相其祭薦祭酒卒爵不拜注賤不備禮主人受爵注將復獻衆工也衆工不拜受爵坐祭遂卒爵辯有脯醢不祭主人受爵降奠於篚注遂猶因也古文曰卒爵不拜蕙田案以上工歌公又舉奠觶唯公所賜以旅於西階上如初注言賜者君又彌尊賔長彌卑張氏爾岐曰奠觶媵爵者奠於薦南之觶也公舉之為大夫旅酬也如初如為賔為卿舉旅之節也卒注旅畢也蕙田案以上公為大夫舉旅笙入立於縣中奏南陔白華華黍注以笙播此三篇之詩縣中縣中央也鄉飲酒禮曰磬南北面奏南陔白華華黍皆小雅篇也今亡其義未聞疏諸侯軒縣闕南面而已故得言縣中鄉飲酒惟有一磬縣而已不得言縣中故云磬南主人洗升獻笙於西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵不拜既爵升授主人注一人笙之長者也鄉射禮曰笙一人拜於下敖氏繼公曰升授主人下當有爵字如鄉飲鄉射禮此文脱耳衆笙不拜受爵降坐祭立卒爵辯有脯醢不祭疏辯有脯醢者亦獻訖薦於位之前乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀注間代也謂一歌則一吹也六者皆小雅篇也遂歌鄉樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋注周南召南國風篇也疏二南是大夫士樂故名鄉樂鄉飲酒不言鄉樂者以是己之樂不須言鄉此是諸侯禮下歌大夫士樂故以鄉樂言之又鄉飲酒注云合樂謂歌與衆聲俱作此經無合樂字其實亦與衆聲俱作大師告於樂正曰正歌備注大師上工也掌合隂陽之聲教六詩以六律為之音者也子貢問師乙曰吾聞聲歌各有宜也如賜者宜何歌也是明其掌而知之也正歌者升歌及笙各三終間歌三終合樂三終為一備備亦成也楊氏復曰燕禮歌笙間合四節與鄉飲酒禮同鄉飲酒禮則四節相繼而作燕禮於工歌三終之後公為大夫舉旅既舉旅之後乃笙入三終間歌三終合樂三終而後樂備蓋燕尚飲酒故於工歌之後笙入之前有旅酬之禮樂正由楹内東楹之東告於公乃降復位注言由楹内者以其立於堂亷也復位位在東縣之北敖氏繼公曰告於公亦北面不告賔者臣統於君與鄉禮異也復位則是反其初位矣鄉飲酒禮注云樂正降立西階東北面蕙田案降復之位敖説與注不同敖説近之又案以上樂終射人自阼階下請立司正公許射人遂為司正注君許其請因命用為司正君三舉爵樂備作矣將留賔飲酒更立司正以監之察儀法也射人俱相禮其事同郝氏敬曰初燕禮嚴終則易懈初酬賔卿大夫人少終酬士人衆故正之以司正也司正洗角觶南面坐奠於中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安注洗奠角觶於中庭明其事以自表威儀多也君意殷勤欲留賔飲酒命卿大夫以我故安或亦其實不主意於賔也少疏鄉飲酒司正洗觶執以升自西階不奠是威儀也不主意於賔者欲兼羣臣共安也司正降自西階南面坐取觶升酌散降南面坐奠觶右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首注右還將適觶南先西面也必從觶西為君之在東也少立者自嚴正慎其位也左還南面坐取觶洗南面反奠於其所注反奠虚觶不空位也郝氏敬曰其所即中庭初奠之所楊氏復曰燕禮大射禮司正洗角觶南面坐奠於中庭又降自西階南面取觶升酌散降南面坐奠觶又右還北面取觶卒觶奠之再拜稽首又左還南面坐取觶進退皆由觶西蓋君在阼不敢背君若從觶東而左還北面則背君故也鄉飲鄉射皆臣禮只有北面奠觶之文威儀簡故也蕙田案以上立司正升自西階東楹之東請徹俎降公許告於賔賔北面取俎以出膳宰徹公俎降自阼階以東注膳宰降自阼階以賔親徹若君親徹然階疏臣之升降當西階今不降西階而降自阼當君降處故云若君親徹降自阼階也欽定義疏凡請於君皆自阼階下乃司正之請安賔與此請徹俎則於東楹之東者既受安賔之命當以辯命於堂既承徹俎之命亦當以告於賔二者皆將有事於堂上故與他禮異也徹俎下降字疑當在告於賔下傳寫者誤耳鄉飲射禮司正既降命弟子復升立序端及賔徹俎乃受以出此禮賔自徹以出故直言降而已亦别於臣禮也卿大夫皆降東面北上注以將坐降待賔反也蕙田案以上徹俎賔反入及卿大夫皆説屨升就席公以賔及卿大夫皆坐乃安注凡燕坐必説屨屨賤不在堂也禮者尚敬敬多則不親燕安坐相親之心也疏不云君降説屨者據少儀尊者坐在室則説屨於户内今此燕在堂上則君尊説屨於堂上席側可知羞庶羞注謂􅍧肝膋狗胾醢也骨體所以致敬也庶羞所以盡愛也敬之愛之厚賢之道疏案大射云羞庶羞注云所進衆羞謂􅍧肝膋狗胾醢也或有炮鼈膾鯉雉兎鶉鴽大射先行燕禮明與彼同此注不言炮鼈已下注文不具也肝膋見内則用狗肝蒙之以其膋濡炙之大夫祭薦注燕乃祭薦不敢於盛成禮也疏謂未立司正之前立行禮受獻之時不祭脯醢祭先是成禮不敢成禮於盛時也敖氏繼公曰獻時不得祭薦故至是乃為之必祭者宜終此禮然後可以食庶羞也司正升受命皆命君曰無不醉賔及卿大夫皆興對曰諾敢不醉皆反坐注皆命者命賔命卿大夫也起對必降席司正退立西序端蕙田案以上説屨升坐主人洗升獻士於西階上士長升拜受觶主人拜送觶注獻士用觶士賤也士疏大夫已上獻用觚旅酬乃用觶獻即用觶士賤士坐祭立飲不拜既爵其他不拜坐祭立飲注他謂衆士也亦升受爵不拜郝氏敬曰士長士之尊者如司正司士等是也其他謂長以下不拜謂受送皆不拜也乃薦司正與射人一人司士一人執冪二人立於觶南東上注天子射人司士皆下大夫二人諸侯則上士其人數亦如之司正為上疏此等皆士而先薦者以其皆有事故先薦司士掌羣士爵禄廢置之事士中之尊故亦先薦司正為上者以其在庭長故設在上先薦之又士位在西有事者别在觶南北面東上也辯獻士士既獻者立於東方西面北上乃薦士注每已獻而即位於東方蓋尊之畢獻薦於其位疏庭中之位卿東方西面大夫北面士西方東面是東方尊今卿大夫得獻升堂位空故士得獻即東方卿位是尊之也欽定義疏士之變位其義有二一則以卿大夫既獻皆變而位於上故士亦既獻而變其位於東也二則以卿大夫既升則東方虛無人而東為君方故變士之位以從君也燕義所謂士以次就位於下者此也祝史小臣師亦就其位而薦之注次士獻之已不變位位自在東方疏上設位之時祝史在門東小臣在東堂下是先在東方也主人就旅食之尊而獻之旅食不拜受爵坐祭立飲注北面酌南鄉獻於尊南不洗者以其賤略之也亦畢獻乃薦之主人執虚爵奠於篚復位蕙田案以上主人獻士及旅食若射則大射正為司射如鄉射之禮注大射正射人之長者也如鄉射之禮者燕為樂卿大夫宜從其禮也如者如其告弓矢既具至退中與算也納射器而張侯其告請先於君乃以命賔及卿大夫其為司正者亦為司馬君與賔為耦鄉射記曰自君射至龍旜亦其異者也薦旅食乃射者是燕射主於飲酒張氏爾岐曰經云若射不定之辭或射或否唯君所命若不射則主人獻旅食後賔即媵觶舉酬註云薦旅食乃射是燕射主於飲酒以大射主於射未為大夫舉旅即射也蕙田案以上因燕而射賔降洗升媵觚於公酌散下拜公降一等小臣辭賔升再拜稽首公答再拜注此當言媵觶酬之禮皆用觶言觚者字之誤也古者觶字或作角旁氏由此誤爾郝氏敬曰酌散先自飲也公降一等敬其為賔也賔坐祭卒爵再拜稽首公答再拜賔降洗象觶升酌膳坐奠於薦南降拜小臣辭賔升成拜公答再拜賔反位注反位反席也欽定義疏賔之媵觶其義有四主人獻賔承公命也以卑不敢酢尊故賔酢主人而未嘗酢公至是而藉以示報焉所以成禮於公也明有尊也媵觶者下大夫而賔亦大夫也向者以君命而尊於其伍至是而亦事其事焉所以自伍於下大夫也明等夷也為賔卿舉旅使下大夫媵宜也為大夫舉旅亦用下大夫所媵之觶猶之可也若為士舉旅而媵以下大夫則非等矣於是賔自媵之所謂降尊以就卑也明下賤也酬之義主於周向者雖三舉旅未嘗及士至是賔則藉其所媵者以使在燕之長㓜卑尊無不飲公之徳公亦藉賔之所媵者以使在燕之長㓜卑尊無不飲賔之觶蓋君臣之分益明而賔主之道兩得矣明辯惠也蕙田案以上賔媵觶於公公坐取賔所媵觶興唯公所賜注至此又言興者明公崇禮不倦也今文觶又為觚敖氏繼公曰此酬主於士而所賜不及之以其賤而在下也受者如初受酬之禮張氏爾岐曰如其自賔降至進受虛爵也降更爵洗升酌膳下拜小臣辭升成拜公答拜乃就席坐行之注坐行之若今坐相勸酒有執爵者注士有盥升主酌授之者張氏爾岐曰前三舉旅皆酬者自酌授人至此乃有代酌授之者唯受於公者拜注公所賜者也其餘則否郝氏敬曰惟最初一人受公賜爵者拜其餘執爵者所送皆就席坐飲不拜也司正命執爵者爵辯卒受者興以酬士注欲令惠均張氏爾岐曰前三舉旅皆止於大夫今為士舉旅故命之相旅固司正職也執爵者爵辯卒受者興以酬士即其命之之辭大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜注興酬士者士立堂下無坐位大夫立卒爵不拜實之士拜受大夫拜送士旅於西階上辯注祝史小臣旅食皆及焉敖氏繼公曰拜受拜送旅酬之正禮也士始受旅故從其正禮至無算爵則旅不拜矣士旅酌注旅序也士以次序自酌相酬無執爵者卒蕙田案以上公為士舉旅主人洗升自西階獻庶子於阼階上如獻士之禮辯降洗遂獻左右正與内小臣皆於阼階上如獻庶子之禮注庶子掌正六牲之體及舞位使國子修徳學道世子之官也而與膳宰樂正聨事樂正亦教國子以舞左右正謂樂正僕人正也小樂正立於西縣之北僕人正僕人師僕人士立於其北北上大樂正立於東縣之北若射則僕人正僕人士陪於工後内小臣奄人掌君隂事隂令后夫人之官也皆獻於阼階上别於外内臣也獻正下及内小臣則磬人鐘人鑮人鼓人僕人之屬盡獻可知也凡獻皆薦也疏天子謂之諸子諸侯謂之庶子掌公卿大夫士之適子掌事實同故取諸子職觧之以掌正六牲之體得與膳宰聨事掌國子修徳學道得與樂正聨事言此者欲見膳宰得獻此庶子亦得獻之意云左右正者據中庭為左右敖氏繼公曰庶子謂卿大夫士之子周官亦多以庶子繼士而言正指此也燕義以此為諸子之官似失之獻之於阼階上變於其父所飲之位也庶子未必皆有爵乃先左右正獻之明不與之序也左右正未詳其官然與内小臣同獻意其亦為内臣也郝氏敬曰庶子左右正内小臣皆君侍從之臣主人於獻士後皆獻之庶子即公卿大夫子侍衛者左右君左右詩云膳夫左右正長也内小臣奄士以上三臣在君側就阼階上獻之盛氏世佐曰周禮宫伯職云掌王宮之士庶子大司馬職云王弔勞士庶子則相又云大㑹同則帥士庶子而掌其政令司士職周知卿大夫士庶子之數酒正職共饗士庶子之酒凡此皆以庶子繼士而言謂卿大夫士之支庶子也以貴㳺子弟且有宿衛之勞故獻之以其未有爵命故獻在士後若燕義所云庶子官即周禮之諸子其爵為下大夫於諸侯則上士也其位當在西方東面其獻亦當在西階上不於此也左右者侍衛近習之臣而正則其長也左右非一故不言其官然以詩書考之雲漢以膳夫共稱立政與擕僕並數則其職掌亦略可見矣蕙田案經云獻庶子於阼階上又云宵則庶子執燭於阼階上則庶子者公之近臣從公而位在阼階者也先鄭注周禮以為宿衛之官者得之注疏據燕義謂即諸子之官固非而敖氏郝氏盛氏以為卿大夫士之子恐亦未盡然也至解左右正則郝氏盛氏之説為長注疏失之鑿矣又案以上獻庶子以下無算爵注算數也爵行無次無數惟意所勸醉而止士也有執膳爵者有執散爵者敖氏繼公曰亦各序進盥洗其觶以升盛氏世佐曰膳爵象觶也以酌膳故曰膳爵散爵角觶也以酌散故曰散爵執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公答拜注席下席西也古文曰公答再拜拜疏自旅酬以前受公爵皆降拜升成拜至此不復降者禮殺故也賔與卿大夫席皆南面統於君皆以東為上故知席下為席西也受賜爵者以爵就席坐公卒爵然後飲注不敢先虚爵明此勸惠從尊者來也執膳爵者受公爵酌反奠之注宴歡在於飲酒成其意盛氏世佐曰公既卒爵不以降奠於篚而復實之者欲公重舉此觶也不與散爵並行而反奠於君所者象觶非臣所飲也受賜爵者興授執散爵執散爵者乃酌行之注予其所勸者唯受爵於公者拜卒受爵者興以酬士於西階上士升大夫不拜乃飲實爵注乃猶而也張氏爾岐曰此實爵當是大夫自酌與之不使人代士不拜受爵大夫就席士旅酌亦如之張氏爾岐曰亦旅於階下而不拜也公有命徹冪則卿大夫皆降西階下北面東上再拜稽首公命小臣辭公答再拜大夫皆辟注命徹冪者公意殷勤必盡酒也小臣辭不升成拜明雖醉正臣禮也不言賔賔彌臣也君答拜於上示不虚受也敖氏繼公曰冪兩甒之冪也命徹冪者命執冪者遂徹之示與臣下同此酒不自異也在堂者皆降拜謝君意也士不拜賤不敢與君為禮也云有命又云則見其然否不定也拜下臣之正禮也必辭之者以賔在其中也遂升反坐士終旅於上如初注卿大夫降而爵止於其反席卒之朱子曰士方旅而大夫降則爵止不行公辭而大夫復升士乃終旅於上無算樂注升歌間合無數也取歡而已其樂章亦然蕙田案以上無算爵宵則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭閽人為大燭於門外注宵夜也燭燋也甸人掌共薪蒸者庭大燭為位廣也閽人門人也為作也作大燭以俟賔客出劉氏彛曰燕以示慈惠則貴舒緩故飲至夜而不為過所以致其厚也饗以訓恭儉則貴謹飭故饗在朝而不為速所以致其敬也欽定義疏阼階上者為公燭也庶子時入直宿衛故主之西階上者為賔燭也司宫掌寢故主之庭者為士若旅食燭也甸人掌薪蒸故主之門外者為賔出燭也閽人掌出入故主之門外之燭曰為蓋樹而不執賔醉北面坐取其薦脯以降注取脯重得君賜敖氏繼公曰賔未醉不敢起既醉不敢留餘人之出者皆以賔為節也奏陔注陔陔夏樂章也賔出奏陔夏以為行節也凡夏以鐘鼓奏之賔所執脯以賜鐘人於門内霤遂出注必賜鐘人鐘人掌以鐘鼔奏九夏今奏陔以節已用賜脯以報之明雖醉不忘禮古文賜作錫卿大夫皆出注随賔出也公不送注賔禮訖是臣也蕙田案以上燕畢賔出公與客燕注謂四方之使者為疏燕異國卿大夫與臣子同惟戒賔異故於禮末見之曰寡君有不腆之酒以請吾子之與寡君須臾焉使某也以請注君使人戒客辭也禮使人各以其爵寡鮮也猶言少徳謙也腆善也上介出請入告對曰寡君君之私也君無所辱賜於使臣臣敢辭注上介出答主國使者辭也私謂獨受恩厚也君無所為辱賜於使臣謙不敢當也敢者怖懼用勢决之辭寡君固曰不腆使某固以請寡君君之私也君無所辱賜於使臣臣敢固辭注重傳命固如故朱子曰寡君君之私也以下是客對辭張氏爾岐曰使者重傳命戒客客重使上介致辭寡君固曰不腆使某固以請某固辭不得命敢不從注許之也於是出見主國使者辭以見許為得命朱子曰某固辭以下是客對辭致命曰寡君使某有不腆之酒以請吾子之與寡君須臾焉注親相見致君命辭也君貺寡君多矣又辱賜於使臣臣敢拜賜命注貺賜也猶爱也敢拜賜命從使者拜君之賜命猶謙不必辭也朱子曰君貺寡君以下是客對辭蕙田案以上公與客燕記燕朝服於寢注朝服者諸侯與其羣臣日視朝之服也謂冠𤣥端緇帶素韠白屨也燕於路寢相親昵也實疏冠𤣥端緇帶素韠白屨皆士冠禮文其諸侯當白舄其臣當白屨也蕙田案此記服及燕所其牲狗也亨於門外東方注亨於門外臣所掌也敖氏繼公曰門外東方爨所在也古者寢廟之門外皆有爨吉則在東凶則在西蕙田案此記牲若與四方之賔燕則公迎之於大門内揖讓升注四方之賔謂來聘者也自戒至於拜至皆如公食亦告饌具而後公即席小臣請執冪請羞者乃迎賔也欽定義疏必迎之者别於己臣也迎不於門外者别於朝賔也此所迎賔其正聘使也故下云賔為茍敬其介之為賔者當從聘使而入於公與賔揖讓時止於門外之位賔為茍敬席於阼階之西北面有脀不嚌肺不啐酒其介為賔注茍且也假也主國君饗時親進醴於賔今燕又且獻焉人臣不敢䙝煩尊者至此升堂而辭讓欲以臣禮燕為恭敬也於是席之如獻諸公之位言茍敬者賔實主國所宜敬也脀折俎也不嚌啐似若尊者然也介門西北面西上公降迎上介以為賔揖讓升如初禮主人獻賔獻公既獻茍敬乃媵觚羣臣即位如燕也為疏言茍敬者賔實主國所宜敬但為辭讓故以命介賔不得敬之今雖以介為賔不可全不敬於是席之於阼階西而且敬之故云茍敬也上燕己臣子之時獻賔獻公既即媵觶以酬賔今茍敬之前有薦有俎實與君同則知獻公後即獻茍敬乃可酬賔也敖氏繼公曰茍誠也實也燕主為賔而設賔於是時雖不為正賔而實為主君之所敬故云茍敬也公與賔既揖讓升公拜至賔答拜公乃揖賔各就席公降擯者以命命上介為賔上介禮辭許再拜稽首公答拜上介出公乃升就席擯者納賔皆如羣臣為賔之禮必以上介為賔者禮君與臣燕為賔者不以公卿而以大夫雖燕異國之臣亦如之賔卿也上介大夫也故以上介為賔也阼階之西諸公之位也席茍敬於是且有脀皆尊異之不嚌啐者辟正賔盛氏世佐曰燕禮輕於饗而外臣與己國之臣又有間若以聘賔為燕賔公親獻與則賔意有所不安且非所以通欵曲致殷勤也使宰獻與則與待己國之臣無異又非所以尊賔也於是席之於君側諸公之位不嚌不啐其禮似殺於賔而折俎之設又有非己國諸公所得同者則其敬之也不以文而以實矣故云茍敬也必以介為賔者聘禮公於賔一食再饗介一食一饗其與賔行禮之時介每為賔所厭而不得伸我敬故必特為介設食饗之禮至燕則合之而以介為正賔則所以待介者亦不薄也此其斟酌於尊卑豐殺之宜化裁乎賔主君臣之道信非聖人不能為也無膳尊無膳爵注降尊以就卑也敖氏繼公曰膳尊瓦大也膳爵象觚象觶也所燕者非己臣子故不宜自異蕙田案以上記與四方之賔燕與卿燕則大夫為賔與大夫燕亦大夫為賔注不以所與燕者為賔者燕為序歡心賔主敬也公父文伯飲南宫敬叔酒以路堵父為客此之謂也君但以大夫為賔者大夫卑雖尊之猶逺於君法疏此謂與己臣子燕也朱子曰公所與燕者雖不為賔亦當如異國之賔為茍敬欽定義疏饗食之主皆公自為之而燕則别立主者伸公尊也饗食之賔亦賔自為之而燕則别立賔者亦優尊也蓋燕以序歡心故正主與正賔皆不欲其僕僕爾亟拜也此燕禮之義也蕙田案此記為賔者羞膳者與執冪者皆士也注尊君也膳宰卑於士羞卿者小膳宰也注膳宰之佐也人疏以經不辨其人故記言之蕙田案此記羞者執冪者若以樂納賔則賔及庭奏肆夏賔拜酒主人答拜而樂闋公拜受爵而奏肆夏公卒爵主人升受爵以下而樂闋注肆夏樂章也今亡以鍾鎛播之鼓磬應之所謂金奏也記曰入門而縣興示易以敬也卿大夫有王事之勞則奏此樂焉九疏常燕己臣子無樂王事之勞或有或無故言若也夏皆詩篇名頌之族類也鍾師云掌金奏金謂鍾及鎛又云凡樂事以鐘鼓奏九夏鄭注云先擊鐘次擊鼓是奏肆夏時有鐘鎛鼓磬彼經注雖不言磬但縣内有此四者故鄭兼言磬也言賔及庭奏肆夏則非尋常大夫為賔與宰夫為主人相對者謂若賔為茍敬四方賔之類特奏肆夏其事既重若非有王事之勞何以致此故也陳氏𤾉曰賔及筵而樂作則闋於未卒爵之前公受爵而樂乃作則闋於卒爵之後欽定義疏此賔指所命之賔非謂所燕之賔也知者以賔拜酒主人答拜而樂闋决之也若所燕之賔入門而右而公爾之與拜酒之節逺矣升歌鹿鳴下管新宫笙入三成注新宫小雅逸篇也管之入三成謂三終也疏鹿鳴不言工歌新宫不言笙奏而言升歌下管欲明笙奏異於常燕常燕即上所陳四節是也特言下管新宫笙入三成者謂笙奏新宫三終申説下管之義敖氏繼公曰歌鹿鳴之三也大射云三終是也凡升歌皆歌三篇不止一篇而已下管亦然三成謂奏南陔白華華黍也於歌與管但言篇名於笙言三成文互見也欽定義疏樂以四節為正惟鄉射不歌不笙不間大射不間不合者主於射略於樂也燕以序歡所重在樂故上經所言原備四節此文升歌一也下管二也笙入三也合樂四也雖不間有管則盛矣如謂笙入即奏新宫是闕一節僅有三節也且笙入於下管之後則方管時笙尚在外何由與管為一乎遂合鄉樂注鄉樂周南召南六篇也言遂者不間也若舞則勺注勺頌篇告成大武之樂歌也其詩曰於鑠王師遵養時晦又曰實維爾公允師既合鄉樂萬舞而奏之所以美王侯勸有功也疏言若者或為之舞或不為之舞舞則作周萬舞之舞而奏勺詩傳曰萬者干舞也蕙田案以上記盛樂唯公與賔有俎注主於燕其餘可以無俎蕙田案此記有俎者獻公曰臣敢奏爵以聼命注授公釋此辭不敢必受之疏謂主人獻公及賔媵觶於公雖非獻亦釋此辭蕙田案此記獻公之辭凡公所辭皆栗階注栗蹙也謂越等急趨君命也凡栗階不過二等注其始升猶聚足連歩越二等左右足各一發而升堂足疏栗階不過二等據上等而言故鄭云其始升猶聚連步也聚足謂前足躡一等後足從之併連歩謂足相随不相過即聚足也至近上二等左右足各一發而升堂也郝氏敬曰凡公所辭辭拜下也蕙田案此記栗階之節凡公所酬既拜請旅侍臣注既拜謂自酌升拜時也儐者阼階下告於公還西階下告公許旅行也請行酒於羣臣必請者不專惠也敖氏繼公曰凡凡四舉旅之禮請請於擯者侍臣侍飲之臣也張氏爾岐曰賔受公虛爵自酌升拜公答拜於是時請之蕙田案此記受公酬者請旅之節凡薦與羞者小膳宰也注謂於卿大夫以下也上特言羞卿者小膳宰欲絶於賔羞賔者亦士欽定義疏薦君使士薦賔使膳宰經有明文羞膳羞卿上記言之故知此記為大夫以下發也薦賔者膳宰則羞賔者亦膳宰與有内羞注謂羞豆之實酏食糁食羞籩之實糗餌粉餈敖氏繼公曰内羞房中之羞也祭禮尊者之庶羞内羞同時進之蕙田案經云羞庶羞不及内羞故記者著之云有者見其出於君之加厚非常典也又案以上記薦與羞者及内羞君與射則為下射袒朱襦樂作而後就物注君尊小臣以巾授矢稍屬注君尊不搢矢陳氏祥道曰鄉射記大夫與士射袒纁襦此記言君射袒朱襦蓋大夫與士射士肉袒以拾蔽膚大夫則有纁襦在但以拾歛衣而已君與大夫射大夫肉袒以拾蔽膚君則有朱襦在但以拾歛衣而已敖氏繼公曰言與射則君於燕射或時不與矣稍屬者稍與發矢時相連屬也張氏爾岐曰稍屬者發一矢復授一矢不以樂志注辟不敏也敖氏繼公曰古文志識通每發不以樂之節為識而必欲應之亦優君也既發則小臣受弓以授弓人注俟復發也不使大射正燕射輕盛氏世佐曰大射儀公既發大射正受弓而俟此以弓人代之故云燕射輕也必由小臣授之者弓人疎且賤不敢親受之於君也然則其授公也亦小臣受之於弓人以授公與上射退於物一笴既發則答君而俟注答對也面鄉君也若飲君燕則夾爵注謂君在不勝之黨賔飲之如燕媵觚則又夾爵疏夾爵者將飲君先自飲及君飲訖又自飲也欽定義疏鄉射記若飲君如燕則夾爵此似脱一如字君在大夫射則肉袒注不纁襦厭於君袒疏鄉射大夫與士射則纁襦蕙田案以上記公射若與四方之賔燕媵爵曰臣受賜矣臣請賛執爵者注受賜謂公鄉者酌之至燕主人事賔之禮殺賔降洗升媵觶於公答恩惠也相者對曰吾子無自辱焉注辭之也對答也亦告公以公命答之也敖氏繼公曰此下當有賔再請而相者許之辭記不備見也蕙田案此記賔媵爵之辭有房中之樂注弦歌周南召南之詩而不用鐘鼓之節也謂之房中者后夫人之所諷誦以事其君子陳氏祥道曰毛氏以詩招我由房為房中樂鄭氏則以磬師之燕樂為房中樂又謂弦歌周南召南而不用鐘磬之節關睢之詩曰鐘鼓樂之而周官教燕樂以磬師則房中之樂非不用鐘磬也毛萇侯芭孫毓皆云有鐘磬王肅言無鐘磬與鄭氏同賈公彦曰房中樂以祭祀則有鐘磬以燕則無鐘磬張氏爾岐曰疏云承上文與四方之賔燕乃有之愚謂常燕有無算樂恐亦未必不有也蕙田案此記房中樂右儀禮燕禮禮記燕義古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治别其等正其位國有大事則率國子而致於大子唯所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗正凡國之政事國子存游卒使之修徳學道春合諸學秋合諸射以考其藝而進退之注職主也庶子猶諸子也周禮諸子之官司馬之屬也卒讀皆為倅諸子副代父者也戒令致於大子之事教治修徳學道位朝位也國子諸子也國子屬大子司馬雖有軍事不賦也游卒未仕者也燕禮有庶子官是以義載此以為説疏燕禮云主人升自西階獻庶子於阼階上又云庶子執燭是周禮有庶子官也此官職主諸侯及卿大夫衆庶之子所以官名庶子也庶衆也適子衆多故總謂之庶子非適子庶弟而稱庶子也必知適子者以其倅是副貳於父之言芮氏城曰此燕禮乃諸侯之禮與天子官何與周禮夏官諸子職掌與燕飲何與雖經内有獻庶子及庶子執燭之文然其受獻在士舉旅以後其執事與甸人閽人相聨乃諸侯官之最卑者燕禮之行貴者衆矣不舉其職而先最賤者何哉刪之為當欽定義疏此必他書斷簡掇拾者見下有士庶子就位於下字遂取以附此耳蕙田案此條决非燕義之文蓋簡帙脱亂誤編於此鄭賈解儀禮俱因此致誤諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也注定位者為其始入踧踖揖而安定也疏燕禮卿大夫皆入門右北面君南向爾卿卿西面北上爾大夫大夫皆少進皆北面所以然者定羣臣之位也莫敢適言臣下莫敢與君敵匹而為禮也陳氏祥道曰爾之者以示其相親而無嫌於䙝也定位則小卿次上卿大夫次小卿士庶子次就位是也阼階之上所以為主位而君席之所居者也蕙田案定位即卿大夫入門右立位非布席之位也陳氏以席次言之誤方氏慤曰卿大夫在北面故鄉而爾之欲其皆少進以定位也始則南鄉示君道也終則西面示主道也示君道者待之以臣禮示主道者待之以賔禮至於待之以賔禮猶莫敢居賔位以相敵焉是乃所以深明君臣之義也設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也明嫌之義也賔入中庭君降一等而揖之禮之也注設賔主者飲酒致歡也宰夫主膳食之官也天子使膳宰為主人公孤也疑自下上至之辭也公卿尊矣復以為賔則尊與君大相近疏公卿朝臣之尊賔又敵主之義為其嫌疑故使大夫為賔也疑擬也是在下比擬於上故云自下上至之辭陳氏祥道曰位不辨則名不正等不别則分不明故膳夫者國之膳食之司也使之為獻主而不以君言君為主而大夫為賔則禮相敵而有所亢矣大夫者知足以帥人者也使之為賔而不以卿言卿為賔而主之者在君則體相親而有所疑矣疑為其近君也亢為其不臣也易曰君子以辨上下定民志記亦曰禮所以别嫌明㣲此膳夫為獻主而大夫為賔之意也方氏慤曰宰夫乃天官之膳夫非天官之宰夫也亦謂之宰夫者皆以爕制為事故也杜蕢曰蕢也宰夫也非刀七是供蓋謂是矣使宰夫為主者王氏謂燕飲則君於羣臣亦有賔主之道故不可以無獻主然君臣之義不可以燕廢也故使膳夫為獻主而已蓋燕飲以食飲養賔而膳夫以食飲養王之官也使所以養王者養賔焉則王之厚意也所謂獻主者主人飲賔曰獻蓋攝主人而獻賔也君舉旅於賔及君所賜爵皆降再拜稽首升成拜明臣禮也君答拜之禮無不答明君上之禮也臣下竭力盡能以立功於國君必報之以爵禄故臣下皆務竭力盡能以立功是以國安而君寧禮無不答言上之不虛取於下也上必明正道以道民民道之而有功然後取其什一故上用足而下不匱也是以上下和親而不相怨也和寧禮之用也此君臣上下之大義也故曰燕禮者所以明君臣之義也注言聖人制禮因事以託政臣再拜稽首是其竭力也君答拜之是其報以禄位也賜疏君舉旅於賔者謂舉旅酬之酒以酬賔賜爵者特臣下之爵凡賔受君之酬及臣受君賜爵皆降自西階再拜稽首以受君恩又升堂更再拜稽首以成拜也燕禮凡臣之拜君無不答拜之示為上之道不虚取於下上必湏報之也上下既湏相報故在上明正道以教道於民民亦依君訓道有功報上君既薄歛於上民亦什一而税於下上下親睦而不相怨恨前明君臣相報此明君民上下相報也方氏慤曰舉旅即下言舉旅行酬也旅序也舉爵以序行酬酢之禮也鄉飲酒禮亦謂之相旅即中庸所謂旅酬是也君所賜爵謂旅酬之外君有特賜之爵也升成拜者既降階而拜又升而拜以成前拜之禮故也賔必再拜以明臣下竭力盡能以立功於國君必答拜以明君上發爵賜禄以報功於臣故曰明臣禮也又曰明君上之禮也或言君或言臣或言臣下或言君臣上下皆互相備也陳氏澔曰先是宰夫代主人行爵酬賔之後君命下大夫二人媵爵公取此媵爵以酬賔賔以旅酬於西階上旅序也以次序勸卿大夫飲酒也此之謂君舉旅於賔也君所賜爵則特賜臣下之爵也此二者賔皆降西階下再拜稽首公命小臣辭則賔升而成拜謂復再拜稽首也先時以君辭之於禮未成故云成拜也欽定義疏禮通於上下故拜無不答因答拜之禮推及君臣報功之道又因君臣之禮推及君民取與之義以見禮之可以為國也席小卿次上卿大夫次小卿士庶子以次就位於下獻君君舉旅行酬而后獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子俎豆牲體薦羞皆有等差所以明貴賤也注牲體俎實也薦謂脯醢也羞庶羞也在疏席小卿次上卿者案燕禮上卿在賔席之東小卿賔席之西而云次上卿以俱南面東上遥相次耳大夫次小卿者案燕禮大夫在小卿之西故燕禮云辯獻大夫遂薦之繼賔以西東上士庶子以次就位於下者燕禮於西階上獻士既受獻者立於阼階下西面北上獻庶子於阼階上既獻立於阼階下故云以次就位於下也公及卿大夫士等牲體薦羞之節皆有等差但燕禮不載無以言也吕氏大臨曰禮之所貴别而已矣親疎長㓜貴賤賢不肖皆别也大别之中又有細别存焉均親也而有斬衰大功小功緦麻袒免之異均長也而有父事兄事肩随之異故以賤事貴有十等焉所謂王公卿士皂輿𨽻僚僕臺也君者積尊而為之也茍無差等民可得而犯之貴貴之義有所不行此亂之所由生也燕禮之别故上卿小卿大夫士庶子其席其就位皆有次獻君獻卿獻大夫獻士獻庶子及舉旅行酬皆有序俎豆牲體薦羞皆有等差君臣貴賤之義極其宻察至於此者所以防亂也右燕義五禮通考卷一百五十七
