body:
  text: 五禮通考卷七十八刑部尚書秦蕙田撰吉禮七十八宗廟制度史紀始皇本紀二世皇帝元年下詔増始皇寢廟犧牲令羣臣議尊始皇廟羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世世不軼毁今始皇為極廟四海之内皆獻貢職増犧牲禮咸備毋以加先王廟或在西雍或在咸陽天子儀當獨奉酌祀始皇廟自襄公以下軼毁所置凡七廟羣臣以禮進祠以尊始皇廟為帝者祖廟蕙田案秦羣臣七廟之議與古禮合右秦廟制史記蕭相國世家漢二年漢王與諸侯擊楚何守闗中立宗廟社稷蕙田案漢初未有追王立廟之事况是時天下未定耶相國何所立當是因秦之舊而存其規制耳漢書髙祖本紀十年秋八月令諸侯王皆立太上皇廟於國都蕙田案此郡國立廟之始由是西漢宗廟之禮紕謬相沿仍而難正矣又案史不言京師立廟事豈因蕭何所建而奉主以祠耶郡國立廟乃是創見故特書之耳史記髙祖本紀十二年四月羣臣皆曰髙祖起㣲細撥亂世反之正平定天下為漢太祖功最髙上尊號為髙皇帝令郡國諸侯各立髙祖廟以嵗時祠孝惠五年思髙祖之悲樂沛以沛宫為髙祖原廟髙祖所教歌兒百二十人皆令為吹樂後有缺輒補之漢書禮樂志初髙祖旣定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝惠時以沛宫為原廟皆令歌兒習吹以相和常以百二十人為員叔孫通傳四年帝為東朝長樂宫孟康曰朝太后於長樂宫及間徃師古曰非大朝時中間小謁見數蹕煩民師古曰妨其徃来也作復道方築武庫南如淳曰作復道方始築武庫南也師古曰復音方目反叔孫通因請間曰陛下何自築復道髙帝寢衣冠月出游髙廟服䖍曰持髙廟中衣月旦以游于衆廟已而復之應劭曰月旦出髙帝衣冠傋法駕名曰游衣冠如淳曰髙祖之衣冠藏在宫中之寢三月出游其道正值今之所作復道下故言乗宗廟道上行也晉灼曰黄圖髙廟在長安城門街東寢在桂宫北服言衣藏于廟中如言宫中皆非也師古曰諸家之說皆未允也謂從髙帝陵寢出衣冠游于髙廟每月一為之漢制則然而後之學者不曉其意謂以月出之時而夜游衣冠失之逺矣子孫奈何乗宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟原重也先已有廟今更立之故云重也渭北衣冠月出游之益廣宗廟大孝之本上乃詔有司立原廟胡氏寅曰天子七廟致其誠敬足矣而又作原廟云益廣大孝之本則通之妄也其言曰人主無過舉有七廟又作原廟非過舉乎且衣冠出游於禮何據中庸記宗廟之禮陳其宗器設其裳衣非他所也謂廟中也非他時也謂祭祀之時也今以死者衣冠月出遊之於禮䙝矣然則通所以諌帝者無一而當則不若帝以數蹕煩民而築復道之為是也使後世有致隆於原廟而簡於太廟者則通說啓之矣楊氏復曰叔孫通既諌漢惠帝作複道又請以複道為原廟益廣大孝之本以一時率爾之言立千萬世不易之制其言欲益廣大孝之本不知宗廟之輕自此始也夫宗廟之禮貴乎嚴而不欲其䙝人主事宗廟之心欲其専不欲其分既有宗廟又有原廟則事死如事生事亡如事存之心有所分矣宗廟之體極乎嚴原廟之體幾乎䙝人情常憚於嚴而安於䙝則親祀之禮反移於原廟故宗廟之禮雖重而反為虛文矣如李清臣所謂略於七廟之室而祠於佛老之側窮工木之巧殫金碧之彩作于盛暑累月而後成費以十鉅萬禮官不議而有司不言及其成也不為木主而為之象不為禘祫烝嘗之禮而行一酌之奠之禮又楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通是也抑又有大不安於心者聖明相繼仁孝愛敬之至通乎神明而宗廟之禮未嘗親祀祗遣大臣攝行時享夫豈仁聖之本心哉蓋既有宗廟又有原廟則心分而不専末既有所重則本必有所輕其勢然也蕙田案原廟尤為不經啓後世凟神隳禮之弊者叔孫實始作俑胡氏馬氏論之審矣史記正義括地志云髙廟在長安縣西北十三里渭南三輔黄圖髙祖廟在長安西北故城中闗輔記曰秦廟中鐘四枚皆在漢髙祖廟中三輔舊事云髙廟鐘重十二萬觔文獻通考漢舊儀髙廟葢地六頃三十畝四步堂上東西五十步南北三十步祠日立九旗堂下撞千石鐘十枚聲聞百里寢廟者象生有衣冠履帶几杖起居日四上食臥牀帷帳原宗廟者朝廷行大禮封拜諸侯王酎金原宗廟在北城外游衣冠嘗百果漢書文帝本紀文帝四年秋九月作顧成廟服䖍曰廟在長安城南文帝作還顧見城故名之應劭曰文帝自為廟制度卑狹若顧望而成猶文王靈臺不日成之故曰顧成賈誼曰使顧成之廟為天下太宗與漢無極如淳曰身存而為廟若尚書之顧命也景帝廟號徳陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂游元帝廟號長壽成帝廟號陽池師古曰以還顧見城因即為名於義無取又書本不作城郭字應說近之景帝本紀元年冬十月詔曰葢聞古者祖有功而宗有德制禮樂各有由歌者所以發德也舞者所以明功也髙廟酌奏武德文始五行之舞孝惠廟酎奏文始五行之舞孝文皇帝臨天下通闗梁不異逺方除誹謗去肉刑賞賜長老收恤孤獨以遂羣生减嗜慾不受獻罪人不孥不誅亡罪不私其利也除宫刑出羙人重絶人之世也朕既不敏弗能勝識此皆上世之所不及而孝文皇帝親行之德厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以明休德然後祖宗之功德施於萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰陛下永思孝道立昭德之舞以明孝文皇帝之盛德皆臣嘉等愚所不及臣謹議世功莫大於髙皇帝德莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟請宣布天下制曰可蕙田案太祖太宗議是中四年春三月起德陽宫史記正義括地志德陽宫漢景帝廟在雍州咸陽縣東北二十九里自作之諱不言廟故言宫武帝本紀建元六年春二月遼東髙廟災夏四月髙園便殿火師古曰凡言便殿便坐者皆非正大之處所以就便安也園者於陵上作之既有正寢以象平生正殿又立便殿為休息閑宴之處耳說者不曉其意乃解云便殿便室皆是正名斯大惑矣尋石建韋𤣥成孔光等傳其義可知便讀如本字上素服五日文獻通考董仲舒對曰春秋之道舉往以明来案春秋魯定公哀公時季氏之惡已熟而孔子之聖方盛夫以盛聖而易熟惡季孫雖重魯君雖輕其勢可成也故定公二年兩觀災哀公三年桓宫釐宫災四年亳社災兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同天災若語陛下視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟乃可視近臣在國中處旁仄及貴而不正者忍而誅之如吾燔髙園殿乃可云爾在外而不正者雖貴如髙廟猶災燔之况諸侯乎在内而不正者雖貴如髙園殿猶災燔之况大臣乎此天意也真氏德秀曰仲舒對策言天人相與之際以為天心仁愛人君而欲止其亂又謂人君所為美惡之極與天地流通而往来相應此皆藥石之至言也至火災之對則傅會甚矣况又導人主以誅殺與前所謂尚德不尚刑者何其自相戾耶夫親戚之驕僣近臣之專横夫豈無道以裁制之豈必誅殺而後快哉史稱仲舒居家推説其意草藁未上主父偃竊其書奏焉上召視諸儒仲舒弟子呂步舒不知其師書以為大愚于是下仲舒吏當死詔赦之仲舒遂不敢復言災異其後淮南衡山反上思仲舒前言使吕步舒持斧鉞治淮南獄以春秋誼顓斷於外不請旣還事上皆是之史又言淮南衡山江都謀反迹見公卿尋端治之竟其黨與坐死者數萬人夫謀反不過數人而坐死者若是其衆豈非仲舒前言有以發帝之忍心與馬氏曰髙廟不當居遼東髙園殿不當居陵旁此正論也春秋桓宫僖宫災孔子在陳聞火曰其桓僖乎公羊傅亦曰毁廟不當復立故災若引是為對革正宗廟之重復䙝慢不如禮者以明尊無二上之義則不至流傳元成之時樂因循而憚改作以来衆議之紛紛矣今捨所當言而他及其非所宜何哉宣帝本紀本始二年夏五月詔曰朕以眇身奉承祖宗夙夜惟念孝武皇帝躬履仁義選明將討不服匈奴逺遁平氐羗昆明南越百蠻鄉風欵塞来享建太學脩郊祀定正朔協音律封泰山塞宣房符瑞應寶鼎出白麟獲功德茂盛不能盡宣而廟樂未稱其議奏有司奏請宜加尊號六月庚午尊孝武廟為世宗廟奏盛德文始五行之舞天子世世獻武帝巡狩所幸之郡國皆立廟賜民爵一級女子百户牛酒文獻通考時詔列侯二千石博士議羣臣大議庭中皆曰宜如詔書長信少府夏侯勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰無度天下虛耗百姓流離物故者半蝗蟲大起赤地數千里或人民相食畜積至今未復亡德澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非苟阿意順㫖議已出口雖死不悔於是丞相義御史大夫廣明劾奏勝非議詔書毁先帝不道及丞相長史黄霸阿縱勝不舉劾俱下獄有司遂請尊孝武廟為世宗廟奏盛德文始五行之舞天子世世獻納以明盛德武帝巡狩所幸郡國凡四十九皆立廟如髙祖太宗焉元康元年夏五月立皇考廟元帝本紀永光四年冬十月乙丑罷祖宗廟在郡國者韋𤣥成傳初髙祖時令諸侯王都皆立太上皇廟至惠帝尊髙祖廟為太祖廟景帝尊孝文廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始二年復尊孝武廟為世宗廟行所巡狩亦立焉凡祖宗廟在郡國六十八合百六十七所而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寢園與諸帝合凡三十所至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年迺下詔先議罷郡國廟曰朕聞明王之御世也遭時為法因事制宜徃者天下初定逺方未賔因嘗所親以立宗廟葢建威銷萌一民之至權也今賴天地之靈宗廟之福四方同軌蠻夷貢職久遵而不定令疏逺卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石二千石諸大夫博士議郎議丞相𤣥成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也由中出生於心也故惟聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之内各以其職来助祭尊親之大義五帝三王所共不易之道也詩云有来雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下士諸侯臣等愚以為宗廟在郡國宜無脩臣請勿復脩奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉文獻通考永光四年御史大夫貢禹奏罷祖宗皇后位坐獨祭皇帝而已蕙田案罷郡國廟是永光五年冬十二月乙酉毁太上皇孝惠皇帝寢廟園建昭元年冬罷孝文太后孝昭太后寢園韋𤣥成傳罷郡國廟後月餘復下詔曰葢聞明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗著親親也朕獲承祖宗之重惟大禮未傋戰栗恐懼不敢自顓其與將軍列侯中二千石二千石諸大夫博士議𤣥成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁毁廟之主藏乎太祖五年而再殷祭言一禘一祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖所自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親踈之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二世之業制禮作樂功德茂盛廟猶不世以行為謚而已禮廟在大門之内不敢逺親也臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故大司馬車騎將軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不孥不私其利出美人重絶人類賔賜長老收恤孤獨德厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諫大夫尹更始等十八人以為皇考廟上序于昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰葢聞王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也髙皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸吕作亂海内摇動然羣臣黎庶莫不一意北面而歸心猶謙讓固辭而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福德莫盛焉髙皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義一體孝景皇帝廟及皇考廟皆親盡宜正禮儀𤣥成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寢園皆無復脩奏可議者又以為清廟之詩言交神之禮無不清靜今衣冠出游有車騎之衆風雨之氣非所謂清靜也祭不欲數數則凟凟則不敬宜復古禮四時祭於廟諸寢園日月間祀皆可勿復脩上亦不改也明年𤣥成復言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寢身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寢祠園宜如禮勿復脩奏可蕙田案𤣥成奏罷寢園是謂天子五廟非五年夏六月庚申復戾園秋七月庚子復太上皇寢廟園原廟昭靈后武哀王昭哀后衛思后園郊祀志元帝好儒貢禹韋𤣥成匡衡等相繼為公卿禹建言漢家宗廟祭祀多不應古禮上是其言後韋𤣥成為丞相議罷郡國廟自太上皇孝惠帝諸園寢廟皆罷後元帝寢疾夢神靈譴罷諸廟祠上遂復焉韋𤣥成傳𤣥成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾久不平衡惶恐禱髙祖孝文孝武廟曰嗣曾孫皇帝恭承洪業夙夜不敢康寜思育休烈以章祖宗之盛功故動作接神必因古聖之經徃者有司以為前因所幸而立廟將以繫海内之心非為尊祖嚴親也今賴祖宗之靈六合之内莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明即告於祖宗而不敢失今皇帝有疾不豫乃夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹案上世帝王承祖禰之大義皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者嵗數不登百姓困乏郡國廟無以修立禮凶年則嵗事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊在溝瀆之中皇帝至孝肅慎宜蒙祐福惟髙皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉壽無疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毁廟曰徃者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬天子奉天故率其意而尊其制是以禘嘗之制靡有過五受命之君躬接於天萬世不堕繼立以下五廟而遷上陳太祖間嵗而祫其道應天故福禄永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止尊祖嚴父之義也寢日四上食園廟間祠皆可亡脩皇帝思慕悼懼未敢盡從惟念高皇帝聖德茂盛受命溥將欽若稽古承順天心子孫本支陳錫亡疆誠以為遷廟合祭長久之䇿髙皇帝之意乃敢不聽即以今日遷太上孝惠廟孝文太后孝昭太后寢將以昭祖宗之德順天人之序定無窮之業今皇帝未受兹福乃有不能供職之疾皇帝願復脩立承祀臣衡等咸以為禮不得如不合髙皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不佑鬼神不饗六藝所載皆言不當無所依縁以作其文事如失指罪乃在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天無極羣生百神有所歸息諸廟皆同文久之上疾連年遂盡復諸所罷寢廟園皆脩祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云容齋隨筆匡衡平生佞諛專附石顯以取大位而此一節獨据經守禮其禱廟之文殆與金縢之祝冊相似而不為後世所稱述漢史又不書于本傳憎而知其善可也元帝本紀竟寧元年春三月癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園五月毁太上皇孝惠孝景皇帝廟罷孝文孝昭太后昭靈后武哀王昭哀后寢園韋𤣥成傳匡衡奏言前以上體不平故復諸所罷祠卒不蒙福案衛思后戾太子戾后園親未盡孝惠孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可成帝本紀河平元年秋九月復太上皇寢廟園韋𤣥成傳初髙后時患臣下妄非議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后并食於太上寢廟如故又復擅議宗廟之命平當傳平當為給事中自元帝時韋𤣥成為丞相奏罷太上皇寢廟園當上書言臣聞孔子言如有王者必世而後仁三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與何德化休徴不應之久也禍福不虚必有因而至者焉宜深迹其道而務脩其本昔者帝堯南面而治先克明峻德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂脩嚴父配天之事知文王不欲以子臨父故推而序之上及於后稷而以配天此聖人之德無以加於孝也髙皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之世祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於無窮上納其言下詔復太上皇寢廟園文獻通考馬氏曰太上皇親盡也以髙帝之父而不毁悼皇考私親也以宣帝之父而不毁雖非禮之正猶云可也至武哀王則髙帝之兄昭哀后則髙帝之姊自當各有後裔奉其墳墓祭祀今乃立寢園與諸帝同而使天子世世祠之不經尤甚矣髙帝之姊而稱后於義尤不通圖書集成哀帝建平元年定迭毁之禮仍以孝武為世宗廟韋𤣥成傳哀帝即位丞相孔光大司空何武奏言永光五年制書髙皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所為擅議宗廟之意也臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗並列子孫雖欲襃大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷並侵獫狁最强於今匃奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至於太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁蠻荆來威故稱中興及至幽王犬戎來伐殺幽王取宗器自是之後南夷與北夷交侵中國不絶如綫春秋紀齊桓南伐楚北伐山戎孔子曰㣲管仲吾其被髮左衽矣是故棄桓之過而録其功以為伯首及漢興冒頓始强破東胡禽月氏并其土地地廣兵强為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆進屯京師及四邊嵗發屯備虜其為患久矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時迺遣大將軍驃騎伏波樓船之屬南滅百粤起七郡北攘匈奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起𤣥菟樂浪以斷匃奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以鬲婼羗裂匃奴之右肩單于孤特逺遁於幕北四垂無事斥地逺境起十餘郡功業既定乃封丞相為富民侯以大安天下富實百姓其規橅可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋榖梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也苟有功德則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰髙宗周公為無逸之戒舉殷三宗以勸成王由是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功徳禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德兼而有焉凡在於異姓猶將特祀之况於先祖或說天子五廟無見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親踈相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛說定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰太僕舜中壘校尉劉歆議可歆又以為禮去事有殺故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曾髙則月祀二祧則時享壇墠則嵗貢大禘則終王德盛而游廣親親之殺也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟自貢禹建迭毁之議惠景及太上寢園廢而為虛失禮意矣貢禹傳禹奏欲罷郡國廟定漢宗廟迭毁之禮皆未施行為御史大夫數月卒禹卒後上追思其議竟下詔罷郡國廟定迭毁之禮漢書平帝本紀元始四年夏尊孝宣廟為中宗孝元廟為髙宗世世獻祭蕙田案漢承秦敝七廟之典不修昭穆之禮不備其尤不經者原廟也寢園也郡國廟也凟亂繁雜三代之禮於焉盡矣元帝鋭意復古貢禹始有毁廟及罷郡國廟之議而韋𤣥成等卒成之至劉歆建宗不在七廟數中之説而後三昭三穆之序乃定漢廷經術之效於斯鉅矣乃或可而不行或廢而再復終使宗廟大禮竟漢代莫之能正惜哉觀承案秦漢之際古今一大變也唐虞三代之禮制幾掃盪無餘然秦有天下不過十有餘年而漢遂承之其時去古尚近若能考尋遺迹以復三代之制亦不難原廟寢園郡國廟固不應經典然宗廟之制尚存但去其不合立者而廟制自可復也匡貢韋劉之徒議論鑿鑿已漸有復古之兆惜乎東京明章二帝正當經學大盛之時而新主升祔不别立廟相沿為同廟異室之制而七廟自此而未能復矣右漢廟制文獻通考時王莽為安漢公欲謟太皇太后以斬郅支功奉尊元帝廟為髙宗太后晏駕後當以禮配食云及莽改號太后為新至文母絶之於漢不令得體元帝堕壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母篹食堂既成名曰長壽宫以太后在故未謂之廟莽置酒長壽宫請太后既至見孝元廟廢撤塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉飲酒不樂而罷漢兵起莽惡髙廟神靈遣虎賁武士入髙廟㧞劍四面提擊斧壞户牖桃湯赭鞭鞭灑屋壁令輕車校尉居其中王莽傳莽地皇元年望氣為數者多言有土功象莽又見四方盜賊多欲視為自安能建萬世之基者乃下書曰子受命遭陽九之戹百六之㑹府帑空虛百姓匱乏宗廟未脩且祫祭於明堂太廟夙夜永念非敢寧息深惟吉昌莫良於今年子乃卜波水之北郎池之南惟玉食予又卜金水之南明堂之西亦惟玉食予將親築焉於是遂營長安城南提封百頃九月甲申莽立載行視親舉築三下司徒王尋大司空王邑持節及侍中常侍執法杜林等數十人將作崔發張邯説莽曰德盛者文縟宜崇其制度宣視海内且令萬世之後無以復加也莽乃博徴天下工匠諸圖畫以望法度算及吏民以義入錢榖助作者絡繹道路壞徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽禄館凡十餘所取其材瓦以起九廟是月大雨六十餘日令民入米六百斛為郎其郎吏増秩賜爵至附城九廟一曰黄帝太初祖廟二曰帝虞始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王世祖昭廟五曰濟北愍王王祖穆廟凡五廟不堕云六曰濟南伯王尊禰昭廟七曰元城孺王尊禰穆廟八曰平陽頃王戚禰昭廟九曰新都顯王戚禰穆廟殿皆重屋太初祖廟東西南北各四十大髙十七丈餘廟半之為銅薄櫨飾以金銀琱文窮極百工之巧帶髙増下功費數百鉅萬卒徒死者萬數地皇三年正月九廟葢構成納神主莽謁見大駕乗六馬以五采毛為龍文衣著角長三尺華葢車元戎十乗在前因賜治廟者司徒大司空錢各千萬侍中中常侍以下皆封封都匠仇延為邯淡里附城右漢廟附後漢書世祖本紀建武二年正月壬子起髙廟於洛陽是月赤眉焚西京宫室發掘園陵大司徒鄧禹入長安遣府掾奉十一帝神主納於髙廟祭祀志建武二年正月立髙廟於雒陽鄧禹傳禹南至長安軍昆明池大饗士卒率諸將齊戒擇吉日脩禮謁祠髙廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉三輔故事光武至長安宫闕燒盡徙都洛陽取十二陵合為髙廟作十二室太常卿一人别治長安主知祭事謂之髙廟中元元年以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至髙廟太尉奉匱以告髙廟藏於廟室西壁石室髙主室之下明帝本紀中元二年有司奏上光武皇帝尊號曰世祖祭祀志明帝即位以光武帝撥亂中興更為起廟尊號曰世祖廟以元帝於光武為穆故雖非宗不毁也後遂為常文獻通考東漢制髙廟令一人六百石守廟掌案行掃除無丞世祖廟令一人六百石如髙廟漢儀帝之主九寸前方後圓圍一尺后主七寸圍九寸木用栗明帝本紀永平十八年八月遺詔無起寢廟藏主於光烈皇后更衣别室過百日惟四時設奠置吏卒數人供給灑掃弗開脩道敢有所興作者以擅議宗廟法從事章帝本紀永平十八年八月即皇帝位十二月癸巳有司奏言孝明皇帝聖德淳茂劬勞日昃身御浣衣食無兼珍澤臻四表逺人慕化僬僥儋耳欵塞自至克伐鬼方開道西域威靈廣被無思不服以烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六藝不舍晝夜聰明淵塞著在圖讖至德所感通於神明功烈光於四海仁風行於千載而深執謙讓自稱不德無起寢廟掃地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣别室天下聞之莫不悽愴陛下至孝蒸蒸奉順聖德臣愚以為更衣在中門之外處所殊别宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣共進武德之舞如孝文皇帝祫祭髙廟故事制曰可祭祀志明帝臨終遺詔遵儉無起寢廟藏主於世祖廟更衣孝章即位不敢違以更衣有小别上尊號曰顯宗廟間祠於更衣四時合祭於世祖廟語在章紀東觀書章帝初即位賜東平憲王蒼書曰朕夙夜伏思念先帝躬履九德對於八政勞謙克己終始之度比放三宗誠有其美今迫遺詔誡不起寢廟臣子悲結僉以為雖於更衣猶宜有所宗之號以克配功德宗廟至重朕幼無知寤寐憂懼先帝每有著述典義之事未嘗不延王以定厥中願王悉明處乃敢安之公卿議駁今皆并送及有可以扶危持顛宜勿隱思有所承公無困哉太尉熹等奏禮祖有功宗有德孝明皇帝功德茂盛宜上尊號曰顯宗四時祫食於世祖廟如孝文皇帝在髙廟之禮奏武德文始五行之舞蒼上言昔者孝文廟樂曰昭德之舞孝武廟樂曰盛德之舞今皆合食於髙祖昭德盛德之舞不進與髙廟同樂今孝明皇帝主在世祖廟當同樂盛德之樂無所施如自立廟當作舞樂者不當與世祖廟盛德之舞同名即不改作舞樂當進武德之舞上復報曰有司奏上尊號曰顯宗藏主更衣不敢違詔祫食世祖廟樂皆如王議以正月十八日始祠仰見榱桷俯視几筵眇眇小子哀懼戰慄無所奉承愛而勞之所望於王也章帝本紀章和二年春正月壬辰遺詔無起寢廟一如先帝法制和帝本紀章和二年二月壬辰即皇帝位三月辛酉有司上奏孝章皇帝崇𢎞鴻業德化普洽垂意黎民留念稼穡文加殊俗武暢方表戒惟人面無思不服巍巍蕩蕩莫與比隆周頌曰於穆清廟肅雝顯相請上尊廟曰肅宗共進武德之舞制曰可四月丙子謁髙廟丁丑謁世祖廟祭祀志章帝遺詔無起寢廟廟如先帝故事和帝即位不敢違上尊號曰肅宗後帝承尊皆藏主於世祖廟朱子曰漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆貢禹韋𤣥成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室章帝復如之後世遂不敢加而公私廟皆為同堂異室之制自是以來更歴魏晉隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而陰損其數孝子順孫之心宜亦有所不安矣丘氏濬曰古者天子七廟各自為室自漢明帝以後始為同堂異室之制行之千百餘年一旦革之以復古制葢亦難矣必欲酌古今之制果何如而可適今之宜而不失古人之意乎臣竊以謂宜如周人宗廟都宫之制七廟各為一室太祖之廟居中分為三昭三穆其中有功德者别出之以為世室如劉歆之説兄弟相繼者合為一世而各自為室每嵗四祭如周禮所謂祠禴嘗烝者春祠則犆祭夏秋冬則祫祭如王制之説春祠每嵗孟春自初一齋戒為始四日祭太祖廟間一日祭一廟前一日省視祭畢即繹歴十有四日徧七室每室各祭則羣廟之主各得自伸其尊而不厭於太祖矣至於夏之禴秋之嘗冬之烝則先期各於其廟告以時祫之意至日各迎其主合食於太祖之廟而已祧者不與焉則主祭者不勞而行之不難矣所謂大祫大禘者説者謂五年一禘三年一祫非古制大儒程頤有言立春祭先祖冬至祭始祖朱熹謂先祖之祭似祫始祖之祭似禘二儒之言雖為人臣而發然揆之於義而合推而上之似亦可行請於每嵗立春之日行大祫之禮凡毁廟未毁廟之主皆合食於太祖之廟大禘之禮則於冬至之日行之於始祖之廟而又推始祖所自出之帝而以始祖配之焉後世人主多是崛起未必皆如三代世系有所據依功業有所積累所謂始祖者創業之君也始祖所自出之帝據其所可知者也請以宋朝為比而即光宗之世論之所謂始祖者太祖也太祖者宋創業之君也太宗仁宗二帝有功德不祧以為兩世室神宗哲宗徽宗欽宗髙宗孝宗六室為親廟前此順翼宣三祖真英二宗皆在三昭三穆之外親盡而祧所謂僖祖者太祖之髙祖開國之初即追封以為親廟其所知者止此自此以上更不可考是為太祖所自出之帝宜别為一廟以藏其主而以順翼宣三祖祔其中遇行禘禮則請僖主出就太祖之廟祀之而以太祖配焉大祫則太祖正東向之位而凡毁廟未毁廟之主皆合食於太祖如常儀如此則太祖名號既與廟相稱而亦不失其所以追王崇祀僖祖之心矣若夫祭天享帝則惟以太祖配焉夫然則尊尊親親各得其宜而古禮庶幾可行之今乎是雖不盡合古人之制而古人之意或亦略得其彷彿矣傳曰非天子不議禮顧臣何人輒敢妄議葢述所聞以比擬前代之制非敢以為今日可行也臣昧死謹言蕙田案東漢明章廟制古今一大更易也五帝不相沿樂三王不相襲禮時移事異實有不能盡合古人之勢由後觀之殆如封建井田之難復矣朱子據經以立論乃尊祖敬宗之大義丘氏權宜以定規亦凖今酌古之深心也宗元案禮時為大但要根本不失制度即稍稍從時亦不妨朱子亦謂後有聖賢出必别有規模不用前人硬本子也然廟制不比封建井田封建井田必合天下以定規則古今異勢一時誠有所難挽若廟制只就一方營搆雖不免勞民動衆而所費尚非不訾後世如景靈玉清宫之類不惜金錢千百萬只移一宫之費以建七廟而有餘矣殤帝本紀延平元年三月甲申尊孝和皇帝廟曰穆宗安帝本紀延平元年八月即皇帝位九月庚子謁髙廟辛丑謁光武廟祭祀志殤帝生三百餘日鄧太后攝政以尚嬰孫故祀不立於廟就陵寢祭之而已安帝本紀延光四年四月己酉葬孝安皇帝於恭陵廟曰恭宗祭祀志安帝以讒害大臣廢太子及崩無上宗之奏後以自建武以來無毁者故遂常祭因以其陵號稱恭宗順帝本紀建康元年八月遺詔無起寢廟祭祀志上順帝尊號曰敬宗東觀書曰有司奏言孝順皇帝𢎞秉聖哲隆興統業稽乾則古欽奉鴻烈寛祫晏晏宣恩以極躬自菲薄以崇元黙遺詔貽約顧念萬國衣無製新玩好不飾塋陵損狹不起寢廟遵履前制敬勅慎終有始有卒孝經曰愛敬盡於事親而德教加於百姓詩云敬慎威儀維民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武德之舞如祖宗故事露布奏可質帝本紀永嘉元年正月迎帝入南宫即皇帝位甲申謁髙廟乙酉謁光武廟五月丙辰詔曰孝殤皇帝即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法周舉傳舉徴為大鴻臚及梁太后臨朝詔以殤帝廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂吕勃議是也太后下詔從之桓帝本紀本初元年迎帝入南宫即皇帝位秋七月辛巳謁髙廟光武廟祭祀志冲質帝皆小梁太后攝政以殤帝故事就陵寢祭凡祠廟訖三公分祭之靈帝本紀建寧元年二月辛酉上孝桓帝廟曰威宗庚午謁髙廟辛未謁世宗廟祭祀志桓帝無嗣靈帝以河間孝王曽孫解瀆侯即位靈帝時京都四時所祭髙廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢皆有副倅故髙廟三主親毁之後亦但殷祭之嵗奉祠決疑要注毁廟主藏廟外户之外西牖之中有石函名曰宗祏函中有笥以盛主親盡則廟毁毁廟之主藏於世祖之廟一世為祧祧猶四時祭之二世為壇三世為墠四世為鬼祫乃祭之有禱亦祭之祫於世祖之廟禱則迎主出陳於壇墠而祭之事訖還藏故室迎送皆蹕禮也蕙田案壇墠之禮仍祭法之訛也獻帝本紀初平元年冬十一月有司奏和安順桓四帝無功德不宜稱宗又恭懷敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可注和帝號穆宗安帝號恭宗順帝號敬宗桓帝號威宗和帝尊母梁貴人曰恭懷皇后安帝尊祖母宋貴人曰敬隱皇后順帝尊母李氏曰恭愍皇后祭祀志靈帝崩獻帝即位初平中相國董卓左中郎將蔡邕等以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之四時所祭髙廟一祖二宗及近帝四凡七廟注袁山松書載邕議曰漢承亡秦滅學之後宗廟之制不用周禮每帝即世輙立一廟不止於七不列昭穆不定迭毁元皇帝時丞相匡衡御史大夫貢禹始建大義請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣追崇孝武歴稱世宗中正大臣夏侯勝等猶執異議不應為宗至孝成皇帝議猶不定太僕王舜中壘校尉劉歆據經傳義謂不可毁上從其議古人考據慎重不敢私其君父若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝聖德聰明政參文宣廟稱顯宗孝章皇帝至孝烝烝仁恩博大廟稱肅宗比方前世得禮之宜自比以下政事多釁權移臣下嗣帝殷勤各欲裦崇至親而已臣下懦弱莫能執夏侯之直今聖朝尊古復禮以求厥中誠合禮議元帝世在第八光武世在第九故以元帝為考廟尊而奉之孝明尊述亦不敢毁孝和以下穆宗威宗之號皆省去五年而再殷祫食於太祖以遵先典議遂施行文獻通考馬氏曰西都郊祀之制因秦五畤未嘗有祭天之禮東都宗廟之制代代稱宗未嘗有祧遷之法此二失者因循既久不能革正然郊天之禮至王莽而後定七廟之法至董卓而後定葢權姦擅國意所欲行不復依違顧忌故反能矯累代之失然禮雖稍正而國且亡矣可勝慨哉又曰蔡邕所定髙祖廟一祖二宗及近帝四為七廟其説似矣但以和安順桓四帝功德無殊而有過差奏毁之則所謂近帝四者乃光武明帝章帝靈帝也案古之所謂天子七廟者自太祖及祖功宗德之後其下四世則當代人主之髙曽祖父也此四代者不以有功而存不以有過而廢今以獻帝言之靈其父也桓其祖也安其曽祖也和其髙祖也今捨其髙曾祖三世而以其父繼五世之祖於義何所當乎當時此議雖一出董卓帝無所預然東漢自和帝而後皇統屢絶安帝以清河王之子入繼和帝順桓二帝以河間王之孫入繼安帝靈帝以河間王之曾孫入繼桓帝至靈帝方有親子為獻帝是則獻帝之所謂父者親父所謂髙祖曾祖及祖者乃所繼之大宗也自安順以来既入嗣大位即以非禮崇其私親之父母而昧兩統二父之義徃徃於大宗私親隂有厚薄伯喈豈亦習聞時指隂有謟附耶不然何所祧毁者皆所嗣之大宗而竟以靈帝上繼章帝初不問其世次之懸隔是豈得為知禮者乎蔡邕獨斷宗廟之制古學以為人君之居前有廟後有寢終則前制廟以象朝後制寢以象寢廟以藏主列昭穆有衣冠几杖象生之具總謂之宫月令曰先薦寢廟詩云公侯之宫頌曰寢廟奕奕言相連也是皆其文也古不墓祭至秦始皇出寢起居於墓側漢因而不改故今陵上稱寢殿有起居衣冠象生之備皆古寢之意也居西都時髙帝以下毎帝各别立廟月備法駕遊衣冠又未定迭毁之禮元帝時丞相匡衡御史大夫貢禹乃以經義處正罷遊衣冠毁先帝親盡之廟髙帝為太祖孝文為太宗孝武為世宗孝宣為中宗祖宗廟皆世世奉祀其餘惠景以下皆毁五年而稱殷祭猶古之禘祫也殷祭則及諸毁廟非殷祭則祖宗而已光武中興都洛陽乃合髙祖以下至平帝為一廟藏十一帝主於其中元帝於光武為禰故雖非宗而不毁也後嗣遵承遂常奉祀光武舉天下以再受命復漢祚更起廟稱世祖孝明遺詔遵儉毋起寢廟藏主於世祖廟孝章不敢違是後遵承藏主於世祖廟皆如孝明之禮而園陵皆自起寢廟孝明曰顯宗孝章曰肅宗自後踵前孝和曰穆宗孝安曰恭宗孝順曰敬宗孝桓曰威宗惟殤冲質三少帝皆以未踰年不列於宗廟四時就陵上祭寢而已今洛陽諸陵皆以晦望二十四氣伏社臘及四時四上飯太官送用園令食監典省其親陵所宫人隨鼓漏理被枕具盥水陳嚴具天子以正月五日畢供後上原陵以次周徧公卿百官皆從四姓小侯諸侯家婦凡與先帝先后有𤓰葛者及諸侯王大夫郡國計吏匈奴朝者西國侍子皆會尚書官屬陛西除下先帝神座後大夫計吏皆當軒下占其郡榖價四方災異欲皆使先帝魂神具聞之遂於親陵各賜計吏而遣之正月上丁祠南郊禮畢次北郊明堂髙祖廟世祖廟謂之五供五供畢以次上陵也四時宗廟用牲十八太牢皆有副倅西廟五主髙帝文帝武帝宣帝元帝也髙帝為髙祖文帝為太宗武帝為世宗宣帝為中宗其廟皆不毁孝元功薄當毁光武復天下屬第於元帝為子以元帝為禰廟列於祖宗後嗣因承遂不毁也東廟七主光武明帝章帝和帝安帝順帝桓帝也光武為世祖明帝為顯宗章帝為肅宗和帝為穆宗安帝為恭宗順帝為敬宗桓帝為威宗廟皆不毁少帝未踰年而崩皆不入廟以陵寢為廟者三殤帝康陵冲帝懷陵質帝靜陵是也追號為后者三章帝宋貴人曰敬隱后葬北陵安帝祖母也清河孝德皇后安帝母也章帝梁貴人曰恭懷后葬西陵和帝母也安帝張貴人曰恭愍后葬北陵順帝母也兩廟十二主三少帝三后故用十八太牢也漢家不言禘祫五年而再殷祭則西廟惠帝景昭皆别祠成哀平三帝以非光武所後藏主長安故髙廟四時祠於東廟京兆尹侍祠衣冠車服太常祠行陵廟之禮順帝母故云姓李或姓張蕙田案伯喈獨斷序兩漢帝后廟寢最悉附存以備考右東漢廟制五禮通考卷七十八
