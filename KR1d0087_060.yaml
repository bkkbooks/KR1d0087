body:
  text: 五禮通考卷五十刑部尚書秦蕙田撰吉禮五十四望山川附封禪晉書禮志魏文帝黄初中䕶軍蔣濟曰夫帝王大禮廵守為先昭祖揚禰封禪為首是以自古革命受符未有不蹈梁父登泰山刋無竟之名紀天人之際者也故司馬相如謂有文以來七十二君或順所繇於前謹遺教於後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刋梁山之石無以顯帝王之功示兆庶不朽之觀也語曰當君而歎堯舜之美譬猶人子對厥親而生譽他人之父今大魏承百王之敝亂拯流遁之艱厄接千載之衰緒繼百代之廢業自文武至於聖躬所以參成天地之道綱維神人之化上天報應嘉瑞顯祥以比往古無所取喻至於歴世迄今未廢大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苗屈彊於江海大舜當廢東廵之儀徐夷跳梁於淮泗周成當止岱嶽之禮且去歲破呉虜於江漢今兹屠蜀賊於隴右其震蕩内潰在不復淹無累於封禪之事也此議久廢非倉卒所定宜下公卿廣撰其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞詔曰聞蔣濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間廣逺者千有餘年近者數百載其儀闕不可得記吾何德之修敢庶兹乎濟豈謂世無管仲以吾有桓公登泰山之志乎吾不欺天也濟之所言華則榮矣非助我者也公卿侍中尚書常侍省之而已勿有所議亦不須答詔也天子雖距濟議而實使髙堂隆草封禪之儀以天下未一不欲便行大禮㑹隆卒不復行之右魏文帝封禪未行吳志孫皓天璽元年陽羨山有石室所在表為天瑞乃遣司空董朝周處等封禪國山明年改元大赦以協石文右孫皓封禪附晉書禮志武帝平吳混一區宇太康元年九月庚寅尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉寔司空張華等奏曰臣聞肇自生靈則有后辟年載之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沈淪寂寞曾無遺聲者不可勝記大晉之德始自重黎實佐顓頊至于夏商世序天地其在于周不失其緒金德將升世濟明聖外平蜀漢海内歸心武功之興實由文德至於陛下受命踐祚𢎞建大業羣生仰毓惟獨江湖沅湘之表凶桀負固歴代不賔神謀獨斷命將出討兵威暫加數旬蕩定羈其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達於四極雖黄軒之征大禹逺略周之奕世何以尚今若夫元石素文底號前載象以數表言以事告雖古河圖洛書之徴不是過也宜宣大典禮中嶽封泰山禪梁父發徳號明至尊享天休篤黎庶勒千載之表播流後之聲俾百世之下莫不興起斯帝王之盛業天人之至望也詔曰今逋寇雖殄外則障塞有警内則百姓未寧此盛徳之事所未議也瓘等又奏曰今東漸於海西被於流沙大漠之陰日南北戸莫不通屬芒芒禹跡今實過之天人之道己周巍巍之功已著宜修禮地祗登封泰山致誠上帝以答人神之願也乞如前奏詔曰今陰陽未和刑政未當百姓未得其所豈可以勒功告成耶詔不許瓘等又奏曰臣聞處帝王之位者必有歴運之期天命之應濟兆庶之功者必有盛德之容告成之典無不可誣有不敢讓自古道也而明詔謙冲屢辭其禮雖盛徳攸在推而未居夫三公職典天地實掌人物國之大事取義於此故漢氏封禪非是官也不在其事臣等前奏葢陳祖考之功天命又應陛下之德合同四海迹古考今宜修此禮至於克定歲月雖五府上議然後奏聞詔曰雖蕩清江表皆臨事者之勞何足以告成方望羣后思隆大化以寧區夏百姓獲乂與之休息斯朕日夜之望無所復下諸府矣瓘等又奏臣聞唐虞三代濟世𢎞功之君莫不仰承天休俯協人志登介丘履梁父未有辭焉者葢不可讓也今陛下勲髙皇德無與二茂績宏規巍巍之業固非臣等所能究論而聖㫖勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞靈祗之欵望使大晉之典謨同風於三五臣等誠不敢奉詔請如前奏施行詔曰方當共思𢎞道以康庶績以俟他年無所復紛紜也王公有司又奏自古聖明光宅四海封禪名山著于史籍作者七十四君矣舜禹之有天下也廵守四岳躬行其道易著觀俗省方禮有升中於天詩頌陟其髙山皆載在方䇿文王為西伯以服事殷周公以魯藩列於諸侯或享于岐或有事于太山徒以聖徳猶得為其事自是以來功薄而僭其義者不可勝數號諡不泯以至於今況髙祖宣皇帝肇開王業海外有截世宗景皇帝濟以大功輯寧區夏太祖文皇帝受命造晉盪定蜀漢陛下應期龍興混一六合澤被羣生威震無外昔漢氏失統吳蜀鼎峙兵興以來近將百年地險俗殊人望絶塞今不羈之寇二代而平非聰明神武先天弗違孰能巍巍其成功若兹者歟臣等幸以千載得遭運㑹親服大化目覩太平至公至美誰與為讓宜祖述先明憲章古昔勒功岱岳登封告成𢎞禮樂之制正三雍之典揚名萬世以顯祖宗是以不勝大願敢昧死以聞請告太常具禮儀復上詔曰所議誠列代之盛事也然方今未可以爾便報絶之右晉武帝不行封禪宋書禮志太祖在位長久有意封禪遣使履行太山舊道詔學士山謙之草封禪儀注其後索虜南寇六州荒毁其意乃息世祖大明元年十一月戊申太宰江夏王義恭表曰惟皇天崇稱大道始行揖讓迄于有晉雖聿修前緒而跡淪言廢蔑記於竹素者焉可單書紹乾維建徽號流風聲被絲管自無懷以來可傳而不朽者七十有四君㒺仁厚而道滅鮮義澆而徳宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時葢陶唐姚姒商姬之主莫不由斯道也是以風化大洽光熙於後炎漢二帝亦踵曩則因百姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈況大宋表祥唐虞受終素徳山龍啟符金玉顯瑞異采騰於軫墟紫烟藹於邦甸錫冕兆九五之徴文豹赴天歴之㑹誠二祖之幽慶聖后之㝠休道冠軒堯惠深亭毒而猶執沖約未言封禪之事四海竊以恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和穹昊膺兹多福髙祖武皇帝明並日月光振八區拯己溺之晉濟横流之世撥亂寧民應天受命鴻徽洽於海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象歴明達通於神祗𤣥澤被乎上下仁孝命世叡武英挺遭運屯否三才湮滅迺龍飛五洲鳳翔九江身先八百之期斷出人鬼之表慶煙應髙牙之建風耀符發迹之辰親剪凶逆躬清昏􅝙天地革始夫婦更造豈與彼承業繼緒拓復禹跡車一其軌書罔異文者同年而議哉今龍麟已至鳯凰已儀比李已實靈茅已茂雕氣降雰於宫榭珍露呈味於禁林嘉禾積穗於殿甍連理合榦於園籞皆耀質離宫植根蘭囿至夫霜毫𤣥文素翮赬羽泉河山岳之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜沓粤不可勝言太平之應兹焉富矣宜其從天人之誠遵先王之則備萬乗整法駕修封泰山瘞玉岱趾延喬松於東序詔韓岐於西廂麾天閽使啟闗謁紫宫朝太一奏鈞天詠雲門贊揚幽奥超聲前古豈不盛哉伏願時命宗伯具兹典度詔曰太宰表如此昔之盛王永保鴻名常為稱首由斯道矣朕遭家多難入纂絶孝德薄勲淺鑒昧崩愧頃麟鳯表禎茅禾兼瑞雖符祥顯見恧乎猶深庶仰述矢志拓清中㝢禮祗謁神朕將試哉四年四月辛亥有司奏曰臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道𤣥勲上烈融章未分鳴光委緒歇而罔臧若其顯諡略騰軌則系綴聲采徴畧聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玉潤鏤迹以燻今鐫徳以麗逺而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自兹以降迄於季未莫不欲英𢎞徽位詳固洪聲豈徒深黙修文淵幽馭世而已諒以縢非虛奏書非妄埋擊雨恕神淳廕復樹安得紫壇肅祗竹宫載竚散火投郊流星奔座寶緯初基厭靈命歴德振弛維功濟淪象𤣥浸紛流華液幽潤規存永馭思詳樹逺太祖文皇帝以啟遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河竚翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈頽天重耀儲正凝位於兼明衮岳蕃華於元列故以祥映昌基繫發篆素重以班朝待典飾令詳儀纂綜淪蕪搜騰委逸奏玉郊宫禋珪丘畤景集天廟脉壤祥農節至昕陽川丘夙禮綱威廵駐表綏中甸史流其詠民挹其風於是涵迹視陰振聲威響歴代之渠沈于望内安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懷音革狀邉帛絶書爟光弛燭天岱發靈宗河開寶崇丘淪鼎振采泗淵雲皇王岳摛藻雲漢并角即音栖翔禁籞衮甲霜咮翾舞川肆榮泉流鏡後昭河源故以波沸外闗雲蒸内澤若其雪趾青毳𤣥文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬頴孳萌移華淵禁山輿竚衡雲鶼竦翼海鰈泳流江茅吐蔭校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神勰氣昌物瑞雲照蒱軒龜軫醴泉淳芳太宰江夏王臣義恭咀道遵英抽竒麗古該潤圖史施詳閟載表以功懋往初徳耀炎昊升文中岱登牒天闗耀冠榮名摛振聲號而道謙稱首禮以虚挹將使𤣥祇缺觀幽瑞乖期梁甫無盛徳之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徴聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鐘竦節陽路整衛正途清禁於是績環珮端玉藻鳴鳯竚律騰駕流文間綵比象之容昭明紀數之服徽焯天陣容藻神行翠葢懷陰羽華列照乃詔聨事掌祭賔客賛儀金支宿縣鏞石潤響命五神以相列闢九闗以集靈警衛兵而闗雲先雨祗以灑路霞凝生闕煙起成宫臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫夀固皇根谷動神音山傳稱響然後辨年問老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮㣲代往淪絶拘採遺文辨明訓誥闕四字簉訪鄒魯草縢書堙玉之禮具竦石繩金之儀和芝潤瑛鐫璽乾封懼弗軌屬上徽燀當王則謹奉儀注以聞詔曰天生神物昔王稱愧况在寡德敢當鴻貺今文軌未一可停此奏右宋文帝孝武帝封禪未行通典梁武帝天監中有請封㑹稽禪國山者帝命諸儒草封禪儀欲行之著作佐郎許懋建議上嘉納之因推演懋議稱制㫖以答請者由是遂止梁書許懋傳懋除征西鄱陽王諮議兼著作郎待詔文德省時有請封㑹稽禪國山者髙祖雅好禮因集儒學之士草封禪儀將欲行焉懋以為不可因建議曰臣案舜幸岱宗是為廵守而鄭引孝經鈎命决云封於太山考績柴燎禪乎梁父刻石紀號此緯書之曲說非正經之通義也依白虎通云封者言附廣也禪者言成功相傳也若以禪授為義則禹不應傳啟至桀十七世也湯又不應傳外丙至紂三十七世也又禮記云三皇禪奕奕謂盛德也五帝禪亭亭特立獨起於身也三王禪梁甫連延不絶父殁子繼也若謂禪奕奕為盛德者古義以伏羲神農黃帝是為三皇伏羲封太山禪云云黄帝封太山禪亭亭皆不禪奕奕而云盛徳則無所寄矣若謂五帝禪亭亭特立獨起於身者顓頊封太山禪云云帝嚳封太山禪云云堯封太山禪云云舜封太山禪云云亦不禪亭亭若合黄帝以為五帝者少昊即黄帝子又非獨立之義矣若謂三王禪梁甫連延不絶父殁子繼者禹封太山禪云云周成王封太山禪社首舊書如此異乎禮說皆道聽所得失其本文假使三王皆封太山禪梁甫者是為封太山則有傳世之義禪梁甫則有揖讓之懷或欲禪位或欲傳子義既矛盾理必不然又七十二君夷吾所記此中世數裁可得二十餘主伏羲神農女媧大庭柏皇中央栗陸驪連赫胥尊盧混沌昊英有巢朱襄葛天陰康無懷黄帝少昊顓頊髙辛堯舜禹湯文武中間乃有共工霸有九州非帝之數云何得有七十二君封禪之事且燧人以前至周之世未有君臣人心淳朴不應金泥玉檢升中刻石燧人伏羲神農三皇結繩而治書契未作未應有鐫文告成且無懷氏伏羲後第十六主云何得在伏羲前封太山禪云云夷吾又曰惟受命之君然後得封禪周成王非受命君云何而得封太山禪社首神農與炎帝是一主而云神農封太山禪云云炎帝封太山禪云云分為二人妄亦甚矣若是聖主不須封禪若是凡主不應封禪當時齊桓欲行此事管仲知其不可故舉怪物以屈之也秦始皇登太山中坂風雨暴至休松樹下封為五大夫而事不遂漢武帝宗信方士廣召儒生皮弁縉紳射牛行事獨與霍嬗俱上既而子侯暴卒厥足用傷至魏明使髙堂隆撰其禮儀聞隆殁歎息曰天不欲成吾事髙生舍我亡也晉武太始中欲封禪乃至太康議猶不定竟不果行孫皓遣兼司空董朝兼太常周處至陽羨封禪國山此朝君子有何功徳不思古道而欲封禪皆是主好名于上臣阿㫖于下也夫封禪者不出正經惟左傳說禹㑹諸侯于塗山執玉帛者萬國亦不謂為封禪鄭𤣥有參柴之風不能推尋正經專信緯候之書斯為謬矣葢禮云因天事天因地事地因名山升中於天因吉土享帝于郊燔柴岱宗即因山之謂矣故曲禮云天子祭天地是也又祈穀一報穀一禮乃不顯祈報地推文則有樂記云大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地百物不失者天生之地養之故知地亦有祈報是則一年三郊天三祭地周官有圜丘方澤者總為三事郊祭天地故小宗伯云兆五帝於四郊此即月令迎氣之郊也舜典有嵗二月東廵守至于岱宗夏南秋西冬北五年一周若為封禪何其數也此為九郊亦皆正義至如大旅於南郊者非常祭也大宗伯國有大故則旅上帝月令云仲春𤣥鳥至祀于髙禖亦非常祭故詩云克禋克祀以弗無子并有雩禱亦非常祭禮云雩禜水旱也是為合郊天地有三特郊天有九非常祀又有三孝經云宗祀文王于明堂以配上帝雩祭與明堂雖是祭天而不在郊是為天祀有十六地祭有三惟大禘祀不在此數大傳云王者禘其祖之所自出以其祖配之異于常祭以故云大於時祭案繫辭云易之為書也廣大悉備有天道焉有地道焉有人道焉兼三才而兩之故六六者非他三才之道也乾彖云大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成此則應六年一祭坤元亦爾誠敬之道盡此而備至於封禪非所敢聞髙祖嘉納之因推演懋議稱制㫖以答請者由是遂停胡氏寅讀史管見封禪之事漢唐之君往往行之曾無一人建議明白如許懋者賢哉懋乎其學可謂正矣漢唐以來緯書行而經學弛重以鄭元博聞寡要不知折衷於聖人而惟緯書之信世無稽古大儒稽古言以祛羣惑遂使有天下者于無事時肆其侈心千乘萬騎廵守侈費登山琢石夸大功徳或有秘祝以祈不死取笑當代貽譏後來彼梁武之資未必如漢光武之英也一聞懋言遂遏欲行之意推廣其義以答請者則賢于光武逺矣使其舉措每如此則金甌之業何缺壞之有右梁武帝不行封禪通典北齊有廵守之禮并登封之儀竟不行名臣奏議北齊文宣帝天保五年正月制詔問升中紀號秀州長吏樊孝謙對曰臣聞廵岳之禮勒在虞書省方之義著於易象往帝前王匪唯一姓封金刋玉億有餘人仲尼之觀梁甫不能盡識夷吾之對齊桓所存未幾然盛徳之事必待太平苟非其人更貽靈譴秦皇無道致風雨之災漢武奢淫有奉車之害及文叔受命炎精更輝四海安流天下輯睦劍賜騎士馬駕鼓車乃用張純之文始從伯陽之說至於魏晉雖各有君量徳而處莫能擬議蔣濟上言於前徒穢紙墨袁准發論于後終未施行世歴三朝年將十紀啟聖之期兹為昌㑹陛下以神武之姿天然之略馬多冀北將異山西涼風至白露下北上大行東臨碣石方欲吞巴蜀而掃崤函苑長洲而池江漢復恐迎風縱火芝艾共焚案此六軍未申九伐夫周發牙璋漢馳竹使義在濟民非聞好戰至如投䑕忌器之說葢是常談文徳懷逺之言豈識權道今三臺令子六郡良家蓄銳須時裹糧待詔未若龍駕虎服先收隴右之民電轉雷驚因取荆南之地昔秦舉長平金精食昴楚攻鉅鹿枉矢宵流況我威靈能無協讚但使彼之百姓一覩六軍似見周王若逢司𨽻然後除其苛令與其約法振旅而還止戈為武標金南海勒石東山紀天地之竒功被風聲於千載若令馬兒不死子陽尚在使欲案明堂之圖草射牛之禮比德論功多慙往列升中告禪臣用有疑右北齊文宣帝封禪未行隋書髙祖本紀開皇九年陳國平時朝野物議咸願登封秋七月丙午詔曰豈可命一將軍除一小國遐邇注意便謂太平以薄徳而封名山用虚言而干上帝非朕攸聞而今以後言及封禪宜即禁絶冬十一月壬辰考使定州刺史豆盧通等上表請封禪上不許禮儀志自古帝王之興皆禀五精之氣每易姓而起以致太平必封乎泰山所以告成功也封訖而禪乎梁甫梁甫者泰山之支山卑下者也能以其道配成髙德故禪乎梁甫亦以告太平也封禪者髙厚之謂也天以髙為尊地以厚為德増太山之髙以報天也厚梁甫之基以報地也明天之所命功成事就有益于天地若天地之更髙厚云記曰王者因天事天因地事地因名山升中於天而鳯凰降龜龍格齊桓公既霸而欲封禪管仲言之詳矣秦始皇既黜儒生而封泰山禪梁甫其封事皆祕之不可得而傳也漢武帝頗採方士之言造為玉牒而編以金繩封廣九尺髙一丈二尺光武中興聿遵其故晉宋齊梁及陳皆未遑其議後齊有廵守之禮并登封之儀竟不之行也開皇十四年羣臣請封禪髙祖不納晉王廣又率百官抗表固請帝命有司草儀注於是牛𢎞辛彦之許善心姚察虞世基等創定其禮奏之帝逡廵其事曰此事體大朕何德以堪之但當東守因拜岱山耳十五年春行幸兖州遂次岱岳為壇如南郊又壝外為柴壇飾神廟展宫懸於庭為埋埳二於南門外又陳樂設位於青帝壇如南郊帝服衮冕乗金輅備法駕而行禮畢遂詣青帝壇而祭焉舊唐書禮儀志隋開皇十四年晉王廣率百官抗表固請封禪十五年幸兖州遂於泰山下為壇設祭不升山而還右隋文帝不行封禪冊府元龜兖州刺史薛胄以天下太平登封告禪帝王盛烈遂遣博士登太山觀古跡撰封禪圖及儀上之髙祖謙讓不許右唐髙祖不行封禪舊唐書太宗本紀貞觀五年正月癸未朝集使請封禪冊府元龜貞觀五年正月朝集使趙郡王孝恭等僉議以為天下一統四夷來同詣闕上表請封禪帝手詔曰省表具懷自有隋失道四海横流百王之弊于斯為甚朕提劍鞠旅首啟戎行扶翼興運克成鴻業遂荷慈睠恭承大寶每日昃思治弗敢康寧兢兢夕惕用忘興寢履薄馭朽不足為喻頼三靈顯命百辟同心海外無塵逺夷慕義但流遁永久凋殘未復田疇多曠倉廩猶虚家給人足尚懷多愧豈可遽追前代取譏虚美所望恂恂濟濟叶力盡誠輔其不逮致之王道如得雅頌形于金石菽粟同於水火反朴還淳當如來議十二月己亥朝集使利州都督武士彠等詣朝堂又上表請封禪帝曰隋末分離羣兇競逐我提三尺劍數年之間正一四海是朕武功所定也突厥强梁世為紛更今乃襲我衣冠為我臣吏殊方異類輻輳鴻臚是朕文教所來也突厥破滅君臣為俘安養之情同于赤子是朕仁愛之道也林邑貢能言鳥新羅獻女樂憫其離本皆令反國是朕敦本也酬功録效必依賞格懲惡罰罪必據刑書割親愛捨嫌隙以𢎞至公之道是朕崇信也非朕苟自矜伐欲明聖人之教不徒然也比年榖稼頻登疾疚不作誠宜展禮名山以謝天地但以䘮亂之後民物凋殘憚于勞費所未遑也舊唐書禮儀志貞觀六年平突厥年榖屢登羣臣上言請封泰山太宗曰議者以封禪為大典如朕本心但使天下太平家給人足雖闕封禪之禮亦可比徳堯舜若百姓不足夷狄内侵縱修封禪之儀亦何異于桀紂昔秦始皇自謂德洽天心自稱皇帝登封岱宗奢侈自矜漢文帝竟不登封而躬行儉約刑措不用今皆稱始皇為暴虐之主漢文為有德之君以此而言無假封禪禮云至敬不壇掃地而祭足表至誠何必逺登髙山封數尺之土也侍中王珪曰陛下發徳音明封禪本末非愚臣之所及祕書監魏徴曰隋末大亂黎民遇陛下始有生望養之則至仁勞之則未可升中之禮須備千乗萬騎供悵之費動役數州戸口蕭條何以能給太宗深嘉徴言而中外表章不已上問禮官兩漢封山儀注因遣中書侍郎杜正倫行太山上七十二帝壇迹是年兩河水潦其事乃寢大唐新語貞觀中百官上表請封禪太宗許焉唯魏徴切諌以為不可太宗謂魏徴曰朕欲封禪卿極言之豈功不髙耶德不厚耶逺夷不服耶嘉瑞不至耶年榖不登耶何為不可徴對曰陛下功則髙矣而人未懷惠徳雖厚矣而澤未旁流諸夏雖安未足以供事逺夷慕義未足供其求符瑞雖臻罻羅猶密積歲一豐倉廩尚虚此臣所以竊謂未可臣未能逺譬但喻于人今有人十年長患瘵治且愈皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下之良醫除其疾苦雖已人安未甚充實告成天地臣竊有疑且陛下東封萬國咸集要荒之外莫不奔走自今伊洛洎于海岱灌莽巨澤茫茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻豈可引彼夷狄示之虛弱殫府竭財未厭逺人之望加年給復不償百姓之勞或水旱之災風雨之變庸夫横議悔不可追豈獨臣言兆人咸爾太宗不能奪乃罷封禪貞觀政要太宗謂房𤣥齡曰封禪是帝王盛事比表請者不絶公等以為何如魏徴對曰帝王在徳不在封禪自䘮亂以來近泰山州縣凋殘最甚若車駕既行不能全無使役此便是因封禪而勞役百姓太宗曰封禪之事不自取功績歸之於天譬如𤣥齡等功臣雖有益于國能自謙讓歸之于朕豈似不言而欲自取今向泰山功歸于天有似于此然朕意常以嵩髙既是中嶽何謝泰山公等評議冊府元龜貞觀六年公卿百竂以天下太平四夷賔服詣闕請封禪者首尾相屬帝不許嘗從容而言曰朕本諸公子也始望不及此屬天下䘮亂遂有救焚拯溺之志義師入闗之始羣凶鼎沸當此之時但得三分天下亦為足矣朕以不武内禀太上皇之謀外假士大夫之力數年之間六合大定升中告禪信亦其時然朕往昔蒙犯霜露遂嬰氣疾但恐登封之後彌増誡懼有乖營衛非所以益朕也少欲自怡用安年夀公卿等勿復為言舊唐書禮儀志貞觀十一年羣臣復勸封山始議其禮于是國子博士劉伯莊睦州刺史徐令言等各上封禪之事互設疑議所見不同多言新禮中封禪儀注簡畧未周太宗勅祕書少監顔師古諫議大夫朱子奢等與四方名儒博物之士參議得失議者數十家逓相駁難紛紜久不決于是左僕射房𤣥齡特進魏徴中書令楊師道博採衆議堪行用而於舊禮不同者奏之其議昊天上帝壇曰將封先祭義在告神且備謁敬之儀方展慶成之禮固當於壇下阯豫申齊潔贊享已畢然後登封既表重慎之深兼示行事有漸今請祭於泰山下設壇以祀上帝以太祖景皇帝配享壇長一十二丈髙一丈二尺又議製玉牒曰金玉重寶質性貞堅宗祀郊禋皆充器幣豈嫌華美實貴精確況乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉簡式緼靈竒傳之無窮永存不朽今請玉牒長一尺三寸廣厚各五寸玉簡厚二寸長短濶狹一如玉牒其印齒請隨璽大小仍纒以金繩五周又議玉䇿曰封禪之祭嚴配作主皆奠玉䇿肅奉䖍誠今玉䇿四枚各長一尺三寸廣一寸五分厚五分每䇿五簡俱以金編其一奠上帝一奠太祖座一奠皇地祗一奠髙祖座又議金匱曰登配之䇿盛以金匱歸格藝祖之廟室今請長短令容王䇿髙廣各六寸形制如今之表函纒以金繩封以金泥印以受命璽又議方石再累曰舊藏玉牒止用石函亦猶盛書筴笥所以或呼石篋今請方石三枚以為再累其十枚石簡刻方石四邉而立之纒以金繩封以金泥印以受命璽又議泰山上圜壇曰四出開道壇場通議南面入升於事為允今請介丘上圜壇廣五丈髙九尺用五色土加之四面各設一階御位在壇南升自南階而就上封玉牒又議圜壇上土封曰凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今請于圜壇之上安置方石璽緘既畢加土築以為封髙一丈二尺而廣二丈以五色土益封牒書藏于其内祀禪之所土封制亦同此又議玉璽曰謹詳前載方石緘封玉檢金泥必資印璽以為祕固今請依令用受命璽以封石檢其玉檢既與石檢大小不同請更造璽一枚方一寸二分文同受命璽以封玉牒石檢形制依漢建武時故事又議立碑曰勒石紀號顯揚功業登封降禪肆覲之壇立碑又議設告至壇曰既至山下禮行告至柴于東方上帝望秩遍禮羣神今請其壇方八丈一尺髙三尺陛仍四出其禪方壇及餘儀式請從今禮仍請柴祭望秩同時行事又議廢石闕及大小距石曰距石之設意取牢固本資實用豈云彫飾今既積土厚封足與天長地久其小距環壇石闕迴建事非經誥無益禮儀煩而非要請從減省太宗從其議仍令附之於禮顔師古傳帝將有事泰山詔公卿博士雜定其儀而論者爭為異端師古奏臣譔定封禪儀注書在十一年于時諸儒謂為適中于是以付有司多從其說冊府元龜貞觀十四年十月甲戍趙王元景等表請封禪奏曰夫功成道合古今以為隆平登封降禪聖賢謂之大典是以出震則天之后革夏變商之君繼韶夏而施尊名崇號諡而廣符瑞顧遲遲焉羣臣區區誠為此也原夫大始云構生靈厥萌黎庶布乎穹壤皇王司其右契遐哉上古以迄於兹歴選休徴未有如今日之盛也所以敢罄窺管無懼觸鱗瀝膽披肝言亦備矣援天引聖辭亦殫矣幸蒙亭育之澤降以聽覽之恩大賚雖敷猶申後命未便渙汗方事逡巡懷生之徒不遑寧處伏乞皇帝陛下則天成務應物為心協三才之㑹昌乃霈然而動色遂萬姓之延首俯凝旒而改容雖復龍圖告徴龜書襲吉尚諮諏于四岳建明謨于兆人欲使六合之中沃心通于朝野八紘之内下問浹于華戎凡在人靈疇無抃躍今兹百辟咸集九有攸同並執玉以來庭俱式歌而且舞逺則重譯僉議近則端笏參謀欣覩増天之髙願逢加地之厚絶域忘生而越險華髪忍死而爭趨中外之心克諧愚智之情允睦掌故事者草登封而待期執羈勒者儼車徒而俟命庶官率職三事夙興逺邇昌言明靈幽贊莫不傾視俯聽希陪肆覲之禮效祉呈祥欽承告成之慶山稱萬歲企和鑾而發竒雲浮五彩佇華葢而交蔭兩儀之情轉廹萬國之望愈深臣又聞之屈已從衆至人所以稱仁絲言顯發哲王以之敷信昨奉明詔許以試之實降皇情俯同人欲寛仁之利斯博示信之道宜𢎞即日庶尹馳心咸奉章而守闕列藩翹足各伏地以祈恩所冀天慈深加昭察制可羣竂之奏尅以發軫之期頒示普天申明絶典使夫一時之士欣獨髙于萬代八荒之酋荷周露于再造則臣等死日猶生之年不任誠懇之至謹與連牽方牧等奉表詣闕固請以聞帝冲讓不許至于再三於是下詔曰自古明王君臨區宇功濟天下道被生民内外無虞年榖豐稔莫不歸功上𤣥致禮厚地騰茂實于六合飛英聲于百代今公卿在列屢屬虚心岳牧具僚固陳僉願理在難奪敬依來請顧循諸已仍懷慙德唐書太宗本紀貞觀十五年四月辛卯詔以來歲二月有事于泰山六月己酉有星孛于太㣲丙辰停封泰山唐書禮樂志唐太宗已平突厥年榖屢豐羣臣請封太山太宗初頗非之已而遣中書侍郎杜正倫行太山上七十二君壇迹以是歲兩河大水而止其後羣臣言封禪者多至十五年將東幸行至洛陽而彗星見乃止冊府元龜貞觀十五年三月庚辰肅州言所部川原遍生芝草先是百僚及雍州父老詣朝堂上表請封禪四月辛卯朔下詔曰肇有蒸庶樹之司牧載籍所紀風烈猶存至于道洽品物功成宇縣天眷彰于符瑞人事表于隆平莫不増封岱宗廣禪梁甫榮鏡六合對越三神前聖所以垂其尊名後王所以仰其休烈葢由此也自火德既哀三光分裂金行失御九鼎沈淪諸華競逐彞倫大壞雖周室削平趙魏隋氏混一文軌而金革之事未戢于封疆雅頌之音弗聞於朝廷遂使至教闕如淳風莫反齊郊絶類帝之禮日觀缺升中之儀其已久矣朕丕膺景命嗣守洪基承大亂之餘當率土之責負扆興惕納隍在慮上憑宗社之靈下資士庶之力草昧伊始援干戈以靖亂區夏既平引禮樂以緯俗尉候無警菑畬有年比屋咸保其歡含氣不違其性殊方異域盡地界而來庭應圖合牒殫天符而表瑞緬懷前載詳求諸己豈伊寡德能致此乎固乃上𤣥所叶贊也而羣公卿士百辟庶僚因陳人祇之意請遵封禪之典推而不居至於數四文武之情彌切内外之議日聞誠請頻繁淹歴年載朕繼跡百王因心萬物上奉蒼昊義在薦功下撫黎元方祈厚福既廹兹理敢不祇從猥以眇身齊美上代永言夙志凛乎増惕可以來年二月有事泰山所司宜與公卿并諸儒士及朝臣有學業者詳定其儀博考聖賢之㫖以允古今之中務盡誠敬稱朕意焉于是詔太常卿韋挺為簡較封禪大使禮部侍郎令孤徳棻副焉朝廷參議其儀異端競起祕書少監顔師古乃奏稱臣撰定封禪之禮書在十一年春于時諸儒參詳以為適中詔公卿定其可否多從師古之禮六月己酉有星孛於太㣲宫犯帝位辛亥朝散大夫行起居郎禇遂良進曰陛下撥亂反正功超前烈告成升岳天下幸甚而行至雒陽彗星輒見此或有所未允合者也且漢武優柔数年始行岱禮臣愚伏願詳擇丙辰詔曰自古皇王受天之命建顯號於封禪揚洪名於竹帛者莫不功濟夷夏道叶人祇然登太山之髙刋梁甫之石未有七德靡記九部寂寥而欲齊聲於聖哲垂美於篆籀者也朕承宗廟之重當區宇之責寅畏三靈憂勤萬姓雖戡剪禍亂克定遐荒而至教猶鬱刑典未厝勝殘之化未洽于率土和平之風多慙于往烈是以覽經籍而自失想壇場而増懼亟寢縉紳之奏屢拒公卿之請逡巡大典荏苒歴載近者文武百僚州縣庶尹頻繁抗表殷勤固陳咸以為兩儀交泰四夷賔服禮讓興行年榖豐稔蒼昊呈符于上靈符不可以久替黎獻協心于下衆欲不可以固拒朕廹兹羣議敢不敬從欲薦功上𤣥大報后土升中之儀已具省方之期有日今太史奏有彗星出於西方朕撫躬自省深以戰慄良由功業之被六合猶有未著德化之覃八表尚多所闕遂使神祗垂祐警戒昭然朕畏天之威寢興靡措且曠代盛典禮數非一行途之間勞費不少冬夏凋弊多未克復將送儀仗轉運糧儲雖存節省之義終煩黎庶之力非唯上虧天意亦恐下失人心解而更張抑有故實前以來年二月有事太山宜停庶夙夜自修遂其罪已之志勤恤匪懈申其納隍之情倘蒙靈祗迴睠宗社介福朝廷同于大道風俗歸于朴素告成之美更思其宜仍命所司太山有前代帝王因封禪立碑及石函檢之類往遭離亂被賊毁發並修立瘞藏之二十年十一月司徒長孫無忌與百官及方岳等上表請封禪不許司徒長孫無忌與百僚又請封禪詔曰朕念逺役初寧頗須休息深知所請甚合機宜即事省方恐生勞擾俟百姓閑逸可徐議之十二月己丑司徒長孫無忌等又詣順天門抗表請封禪曰臣聞陰陽不測陶冶生靈之謂神道德𤣥通仁育黎元之謂聖聖也者自天之攸縱也神也者代天之理物也是以惟天稱辟靈心作其㑹昌惟辟奉天至誠表其封禪升中之道抑斯之謂歟由是先王急焉當仁不讓景中必彗時至則行務在告于成功故無俟于終日伏見綸㫖辭逺役之初寧緩此嘉期託俟人之逸豫豈容前歌拔拒戢武之後辭勞拓境開疆太平之秋有勌誠如睿慮未昭百姓之心假此空言實乖千里之應臣等伏膺麟閣縱觀太始之初沈研鳥文歴選櫓巢之上悠悠栗陸未辨犧牲淼淼大庭孰知罇俎衮衣為飾尚報太帝之功茹毛充薦輕展介丘之禮西敘窮乎積石東漸廹乎滄江化未覃于九夷貢有闕于三脊猶且範圍天地斡運羲舒揚翠旌于奉髙撫朱絃于岱岳迓百神而賔上帝契三靈而謁太壇玉牘靈文飛英華于萬古金繩祕檢騰清輝于八埏是知紀號垂名崇髙莫加于肆類推功輯瑞廣厚莫大于登封若乃靈貺所集人謀允洽雖固執於撝謙諒無得而辭也伏惟皇帝陛下研精探賾神無不照唯幾所鑒洞出象帝之初先天成則超貫混元之際由是大明揚彩麗雕軒以再中景宿騰輝藻璇題以霄映奔山車而疊軫促日馭之鳴鑾躍澤馬而相趨徴天駟之徐軔煙川清野蓄洩于奕奕之阿薫風驚途扇蕩于云云之嶠其㝠兆也如彼其顯應也若斯而陛下因事逡巡方稽大典使尊名顯號韜光于琰碑絶異殊无沮絢于瓊簡孰謂畏天之命順人之欲者歟率土悽悽深所未喻臣又聞之游海若者馮夷之宫為陋登太山者魯侯之邦葢小是知絳霄不極九垓網絡于胸中赤縣無涯四海括囊於度内何者升山巢睫竊比所以懸殊朝菌靈椿長短自然相度也若夫大樂云替封豨盜鐘大禮既湮長鯨裂冕酌撫石于無體鈞天之響鬱興採掃地于無形禋宗之道愈劭則女希慙其創制軒后歸其正名矣至若比屋見誅農夫化為京觀禀噍無類芻牧窮于染鍔重興粒食頌栖畆之餘糧首建驂騵詠徒行之兼乗則農皇貶于推轂羲氏退以扶輪矣既而凝旒闡化中外禔福負扆勝殘飛沈遂性亭育侔于宇宙就望體于雲日荷其徳以難名用其功而無謝故乃邈髙辛之順義孕顓頊之疏通矣加以刑清政肅委金科而㒺施毁犴空囹設畫衣而莫犯通闗梁于夐服共苑囿于黎蒸擊壤而謡傳清音于戎狄耕田而食建可封于皂𨽻外戸設而不扄神獸馴而靡觸故以光融伊帝景煥虞庭至于卑宫菲膳孝享通于鬼神大路越席致敬極于嚴配黄屋建三辰之旂垂範裕于千祀元冔垂九旒之藻設法懸于萬代小正調其玉燭應祥蓂而不虧中天朗其金鏡與真明而同晷則文命以是伏膺元王于兹負笈矣洎乎翦商除害夷項墾災戮冀野而復皇猷誅疇華而清帝道提倚天之長劍拯塗炭于遊魂揮駐日之雕戈暢懷生于仁夀則駭文武之仍代吞髙光之累葉矣詮彼數君時聞一善能兼之者實歸仁聖若乃提封海外總一寰中日域窮芳華之津月竁跨濛波之表顒顒向内並為冠帶之倫飄飄駕風總萃王庭之㑹賮北荒之明月牣天府以摛光筐南州之火毛鬻旗亭而吐曜龍伯釣鰲之旅咸編列于武臣鳯洲君子之渠各委質于文吏斯乃書契之所未覩超古先而絶類矣竊惟域中三大義均一體感通由乎影響彌綸切乎交際是知徳逾厚者貺逾深功尤髙者祥尤著當今皥穹儲祉浹天紘以宅心后土錫符總坤維而服化由是百官累息萬國聳神僉發叩閽之請佇副上靈之望伏願時紆睿紱逺振天聲徴鴻儒聘鯢齒考逸義緝遺編摭秦煨之逸文採魯璧之餘蠧酌雲經而定議憲河圖而繕儀然後五路乗春金鑣肅景五牛翻其折羽六龍輝其鏤錫鼓豐隆而驚翠㣲振列缺而清緑野疑笳發岫合萬嵗于山言飛葢登巒錯五松于林秀登圜壇而接武降曜魄而齊尊俾夫一代衣冠寘其名于冊府四方夷狄鑿其竅于靈宫則普天欣賴懷生再造朝聞夕死抃若登仙臣等深荷玉成不勝至願重竭愚瞽昧死以聞詔曰朕遐觀哲王煥在方冊功既成矣咸禮備以升中道既行焉必奉符而告禪所以發揮天命昭格上靈其有建顯號以創鴻徽施尊名而騰茂烈者莫不揚輝于鏤玉絢景于塗金昭昭然麗三辰而並運滔滔焉播四㝠而極深朕誠寡徳良深景慕曩者氓俗凋弊國步甫安勉致隆平日不暇給而槐卿守闕請繼美于云亭岳牧叩閽祈踵武于梁岱自惟菲薄至道未凝抗禮皥穹實懷疑懼緬尋幼齒運鍾交䘮忘其家以狥天下委其體以濟寰中翊戴先皇削平諸夏出於萬死首導五横之源不顧一生光錫兆人之命越自罏炭獲返營魂拔於鬼録並登仁夀竊惟天地之大徳存於施生朕以徑寸之懷小心襲於造育降期體泰諒或繇兹不然者何能致於此也遂得池隍象浦苑囿龍沙置一侯於鶼林同六爻於鰥水實資天睠賁以咸亨豈朕㣲庸而能及此今兹列辟卿士鴻生碩徳各述靈徴累陳丹欵既廹羣議當事敬從乃詔有司廣召縉紳先生議方石圜壇之制草封禪射牛之禮修造羽儀輦輅並送之雒陽宫唐書太宗本紀貞觀二十一年正月丁酉詔以來歲二月有事於泰山八月泉州海溢壬戌停封泰山冊府元龜貞觀二十一年正月丁酉詔曰朕聞天髙地大首播黎方媧皇燧人肇恭元籙是知施生為徳處崇髙而不言亭毒攸資委欽明以司契洎乎三正迭建五運相遷休烈存乎典墳至道流乎雅頌其有仰齊七政俯會百神察靈眷于祥符服元功于昭告莫不罄情梁岱繼踵云亭對越兩儀盡先聖之能事揚蕤三統垂曩哲之尊名懸鏡天衢罔不繇於此也自中陽絶組堙白水於窮流宫孽紹興阻黄星于天塹永嘉東播化金馬以為牛道武南徂飛蒼鵝以登祚周吞岳裔逮三葉而巢傾隋并舜後及二帝而舟覆莫不以凶易亂以暴代昏各肆巨壑之心規享上靈之佑郤行求進其可得乎由是寂寥千祀無懷之風不嗣泯棄七經子長之言殆絶遂使成山日觀久闕升中之儀汶上明堂疇聞類帝之義顧瞻禮樂深有可嗟朕幼踐危機愍斯窮運上同負翼下靡息肩負荷休徴投旗鞠旅肅恭儲祉吟雲躍鱗順朱鳥以行誅騫丹鳯而遐舉射九烏而懸日月區品物以煦陽和練五石以造乾坤濟摧角以全眉夀於是尊奉先帝凝旒于廟堂躬履兵鋒憂勤于燮輔既而仰逼威命俯順樂推越自唐侯言膺下武深惟憂責之重自朂若厲之懷遂致靈貺無涯剪毛頭而降錫遊魂削袵盡窮髪以開疆東苑蟠桃西池昧谷咸覃正朔並充和氣較凝禎於往代窮今古而罕聞考光澤於前皇罄練緗而莫覩豈朕眇身勤勞所逮諒由髙明垂鑒祚此隆平今兹三事大夫百僚庶尹各述天人之意請躡封禪之蹤顧惟寡薄推而不有杜絶羣言至於數四中外之情尤切企竚之望逾深朕又詳思荷財成於穹昊自古賢哲並歸功於大帝廹斯至理弗獲固辭展禮上𤣥實増慙懼可以貞觀二十二載仲春之月式遵故實有事於泰山諸内外具僚岳牧卿士既相敦喻將事告成各罄乃心無虧政道恪居職務以協時雍所司宜與縉紳先生載筆圓冠之士詳求通典裁其折中深加嚴敬稱朕意焉乃令天下諸州明揚仄陋其有學藝優洽文蔚翰林政術甄明才膺國器者並宜總集太山庶令作賦擲金不韞天庭之掞披褐懷玉無溺屠釣之間務得英竒當加不次也遣太常卿楊師道為簡較封禪大使戸部侍郎盧承慶為副後改令禮部尚書江夏郡王道宗為大使司空梁國公房𤣥齡等議云梁甫社首二山並是古昔禪祭之所去十五年議奏請禪梁甫今更奉詔詳議梁甫去太山七十里又在東南至於行事未為穩便社首去太山五里是周家禪處臣等參詳請禪社首有詔依奏餘並依十五年議八月壬戌詔曰朕聞探𤣥賾者先實而後賔體至公者本仁而末禮名歸於已往哲存而弗務徳利於人前聖徇而為急是用範圍天地權輕重以㑹時宜取則陰陽適變通以從衆欲由古之封禪無奪事機所謂奉天咸資務隙朕仰窺前志歴選哲王無懷有巢緬逾繩契之末龜文鳯紀越在俎豆之先扣寂寞以傳疑故可畧而言也至如三元立統百物正名步驟之軌非遥損益之源可挹雖堯心廣運局疆域於流沙禹跡遐宣限隄封於碣石猶且先引即敘次展玉帛之儀首創賔門方備云亭之典告成之義罔弗由兹況朕奄有方輿閫域該於千古仰承靈睠降福超於百王巨海所環莫非臣妾長河攸括並入封疆日者夷夏同文禎符狎至謂可鳴鑾日觀勒牒仙閭許以來春親行告禪而今延陁一姓流竄西陲控弦萬計初歸正朔新就縶維又以公卿庶僚各陳誠請遂有翠㣲之役非無版築之勞既而山谷阻深朝宗有礙重披丹懇請建玉華且復頻有興造恐致煩勞兼聞河北數州頗傷淹澇朕為人父母思濟黎元順動升中理無兼遂其介丘之禮宜且權停其玉華宫制度務從菲薄更令卑陋庶免風雨稱朕意焉唐書謝偃傳太宗時偃為𢎞文館直學士撰玉牒真紀以勸封禪唐實録貞觀五年正月朝集使趙郡王孝恭等請封禪手詔不許十二月己亥朝集使表請帝曰未遑六年百僚又請不許十一年帝將有事封禪國子博士劉伯莊等皆上封禪事言新禮簡畧勅名儒及顔師古朱子奢參議得失議者數十家遞相駁難不决于是𤣥齡徴師古采衆議以為永式十四年十月甲戌趙王元景等表請壬辰詔從十五年三月庚辰肅州言所部川原遍生芝草先是百僚及雍州父老詣朝堂表請四月辛卯朔詔以來歲二月有事於泰山詔太常卿韋挺為檢校封禪大使禮部侍郎令狐德棻副焉秘書少監顔師古奏臣撰禮書在十一年春詔公卿定可否多從師古之禮六月己酉有星孛太㣲宫辛亥起居郎禇遂良進曰行至洛陽彗星輒見或有未允合者丙辰停封泰山容齋隨筆漢光武建武三十年車駕東廵羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎何事汙七十二代之編録若郡縣逺遣吏上夀盛稱虚美必髠令屯田從此羣臣不敢復言後二年上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗感此文乃詔梁松等案索河雒䜟文言九世封禪事者遂奏三十六事于是求武帝元封故事以三月行封禪禮唐太宗貞觀五年羣臣以四夷咸服表請封禪詔不許六年復請上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇耶且事天掃地而祭何必登太山之巔封數尺之土然後可以展其誠敬乎已而欲從其請魏鄭公獨以為不可發六難以争之至以為崇虚名而受實害㑹河南北大水遂寢十年復使房喬裁定其禮將以十六年二月有事于太山㑹星孛太㣲而罷予謂二帝皆不世出盛徳之主灼知封禪之非形諸詔誥可謂著明然不能幾時自為翻覆光武感于䜟記太宗好大喜名以今觀之葢所以累善政耳蕙田案漢光武唐太宗皆一代令主灼知封禪之非而不免為累一則惑於讖記卒毅然行之一則上下往復歸於中止然光武之興也何由知非僕本以讖為始事故深信不疑雖初有欺天之語而亦不顧其心事固坦然明白也若太宗非力不能行特以終非盛徳之舉雖四方獻諛議協盈廷不過藉以頌述功德為快心之事故時與答勅而姑從之意在居其美而謝其名其用心更為深逺也不然以貞觀之時何難舉此一事豈彗星河決之所可止而鄭公所得而爭哉二主之心跡自不同矣右唐太宗封禪未行五禮通考卷五十
