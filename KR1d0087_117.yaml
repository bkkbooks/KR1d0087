body:
  text: 五禮通考卷一百七刑部尚書秦蕙田撰吉禮一百七太子廟禮記祭法王下祭殤五適子適孫適曾孫適元孫適來孫注祭適殤者重適也祭適殤于廟之奧謂之陰厭凡庶場不祭方氏慤曰言適則庶殤在所不祭矣重本故也然以尊而祭卑故曰下祭應氏鏞曰祭及于五所愛者逺也祭止于適所重正統也曾子問祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取于同姓可也祭殤必厭蓋弗成也注厭飫而已不成其為人祭成喪而無尸是殤之也注與不成人同孔子曰有陰厭有陽厭注言祭殤之禮有于陰厭之者有于陽厭之者馬氏彥醇曰厭不成禮之祭也厭于陰者宗子之殤而無後者厭于陽者凡殤與無後者其異何也宗子尊矣則以特牲即于陰者幽陰之義反諸幽求神之道也凡殤卑矣其祭也則就宗子之家當室之白則所謂堂事略矣宗子非不欲尊之也其所以不得成人者從祖祔祭而已曾子問曰殤不祔祭何謂陰厭陽厭孔子曰宗子為殤而死庶子弗為後也注族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮不疏孔子更為辨云若宗子為殤而死以未成人庶子得代為之後宗子禮不可闕明族人以其倫代之倫謂輩也謂與宗子同昭穆者則代之凡宗子為殤而死庶子既不得為後不以父服服之以其倫代之者各以本服服之也云不序昭穆者以宗子殤死無為人父之道故不序昭穆不得與代之者為父也其吉祭特牲祭殤不舉肺無肵俎無玄酒不告利成是謂隂厭注用特牲者尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭舉肺脊肵俎利成禮之施于尸者隂厭者是宗子而殤祭之于奧之禮小宗為殤其祭禮亦如之疏此宗子殤死祭于祖廟之奧陰暗之處是謂隂厭也鄭既云小宗為殤祭禮如大宗者以前經云宗子為殤而死不顯大小故知凡宗子殤祭之禮皆然必知此經指大宗者以何休公羊注云小宗無子則絶大宗無子則不絶重適之本上文庶子不為後謂大宗子在殤而死不得為後若非殤則得為後故知是大宗也凡宗子成人而死則得立子孫為後若立兄弟為後則不可故成十五年公羊傳譏仲嬰齊是公孫歸父之弟當云公孫嬰齊而云仲嬰齊者為歸父之後譏其亂眧穆故云仲是也言熊氏曰殤與無後者唯祔與除服二祭則止此吉祭者惟據祔與除服也凡殤與無後者祭于宗子之家當室之白尊于東房是謂陽厭注凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之內親共祖禰者言祭于宗子之家者為有異居之道無廟者為壇祭之親者共其牲物宗子皆主其禮當室之白尊于東房異于宗子之為殤當室之白謂西北隅得户明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止後疏凡殤謂非宗子之殤無後謂庶子之身無子孫為此二者皆宗子大功內親祭于宗子之家祖廟之內不敢在成人之處故于當室之明白顯露之處為之設尊于東房以其明是陽故為陽厭也凡殤有二一昆弟之子祭之當于宗子父廟二是從父昆弟祭之當于宗子祖廟其無後者亦有二一是昆弟無後祭之當于宗子祖廟一是諸父無後祭之當于宗子曾祖之廟凡殤得祭者以其身是適故也無後者成人無後則祭若在殤而死則不祭以其身是庶故也鄭必限以大功內親其祖禰者以上文云吉祭特牲唯據士僼適士二廟有祖有禰下士祖禰共廟故鄭限以祖禰同者唯大功之內親也蕙田案王下祭殤禮于經無見曾子問所言特士禮耳然以士禮推之曰陰厭曰陽厭則王之祭宗子殤其亦在廟乎疏昆弟之子祭之當于宗子父廟從父昆弟祭之當于宗子祖廟是雖指凡殤而言然適子之殤其不得别立廟也審矣凡殤不可無祭而况宗子乎况承天下社稷之重者乎禮陰厭主奧重大宗也祧則同祧為親盡也王下祭殤之禮可知也已右王下祭殤吳志孫登傳孫登字子高權長子也魏黃初二年以權為吳王是嵗立登為太子立凡二十二年年三十三卒諡曰宣太子吳書曰初葬句容置園邑奉守如法後三年改葬蔣陵晉書惠帝紀永熙元年秋八月壬午立廣陵王遹為皇太子元康九年十二月壬戌廢皇太子遹為庶人及其三子幽于金墉城永康元年三月癸未賈后矯詔害庶人遹于許昌夏四月甲午追復故皇太子位五月己巳立皇孫臧為皇太孫六月壬寅葬愍懷太子于顯平陵永寧元年正月乙亥趙王倫篡帝位廢皇太孫臧為濮陽王癸酉倫害濮陽王臧乘輿反正五月立襄陽王尚為皇太孫太安元年三月皇太孫尚薨懷帝本紀永嘉元年三月庚午立豫章王詮為皇太子元帝紀大興三年五月景寅孝懷太子詮遇害于平陽帝三日哭禮志惠帝世愍懷太子二子哀太孫臧沖太孫尚並祔廟元帝世懷帝殤太子又祔廟號為陰室四殤孝武帝太元十二年祠部郎中徐邈議太子太孫陰室四主儲嗣之重升祔皇祖所託之廟世逺應遷然後從食之孫與之俱毁愍懷太子傳愍懷太子遹字熙祖惠帝長子母曰謝才人惠帝即位立為皇太子元康九年十二月廢太子為庶人明年幽于許昌宫之别坊賈后使太醫令程據合巴豆杏仁丸矯詔使黃門孫慮齎至許昌以害太子時年二十三詔以廣陵王禮葬之及賈庶人死乃册復太子諡曰愍懷六月己卯葬于顯平陵三子霦臧尚並與父同幽金墉臧字敬文永康元年四月封臨淮王己巳立為皇太孫永寧元年正月趙王倫篡位廢為濮陽王與帝俱遷金墉尋被害太安初追諡曰哀尚字敬仁永康元年四月封為襄陽王永寧元年八月立為皇太孫太安元年三月癸卯薨諡曰沖太孫杜氏通典東晉孝武帝太元六年詔曰亡大兄以司馬珣之為國後祭祀何儀博士江熙議榖梁傳云公子之重視大夫則王子一例也請皇子廟祭用大夫禮三廟博士沈寂等議禮大夫三廟無貴賤之别然則上至皇子下及陪臣其理無二牲用少牢若繼嗣之身未準大夫祭用七禮按會稽王嗣子即簡文帝長子博士沈寂等議會稽王嗣子既以疾廢當降從之公子則皆如大夫牲用少牢宜權立行廟告嗣而後迎繼嗣之身江熙議皇子雖有廟然無子不立廟故詔使立後蒸嘗之祀稱皇帝有命命某繼嗣博士沈寂議皇子依如大夫禮應立後宜先告權為行廟告于禮無文宜先行廟告嗣而後迎繼嗣之身案禮君薨嗣子生太祝襅冕告于廟既葬嗣子生祝告于廟明夫宗廟者神靈之所宅是以存亡吉凶必先告于廟古今不革之制三代不易之典豈有興滅繼絶傳祀百代而誣亡者之靈滅告生之義耶緣情依禮謂宜先告于靈後迎繼嗣之身庾蔚之謂嗣子以無子不廟合有嗣乃立廟耶告生者是先自有廟不得引以為例南齊書禮志永明十一年文惠太子薨卒哭祔于太廟梁書昭明太子傳昭明太子統字德施高祖長子也母曰丁貴嬪以齊中興元年九月生天監元年十一月立為皇太子大通三年四月乙巳薨斂以衮冕諡曰昭明五月庚寅葬安寧陵哀太子傳哀太子大器字仁宗太宗嫡長子也普通四年五月丁酉生太清三年五月太宗即位六月癸酉立為皇太子大寶二年八月賊景廢太宗以太子有器度每常憚之恐為後患故先及禍承聖元年四月追諡哀太子愍懷太子傳愍懷太子方矩字德規世祖第四子也承聖元年十一月立為皇太子及西魏師陷荆城太子與世祖同為魏人所害敬帝承制追諡愍懷太子蕙田案自魏以前太子之薨立廟與否不可得稽晉則祔于太廟陰室元太常博士曰前代太子薨梁武帝諡統曰昭明齊武帝諡長懋曰文惠唐憲宗諡寧曰惠昭金世宗諡允恭曰宣孝又建别廟以奉神主準中祀以陳登歌然則立廟奏樂其始于齊梁間歟北魏書恭宗紀恭宗景穆皇帝太武皇帝之長子也延和元年正月丙午立為皇太子正平元年六月戊辰薨于東宫賜諡曰景穆唐書孝敬皇帝傳孝敬皇帝𢎞永徽六年始王代顯慶元年立為皇太子上元二年從幸合璧宫遇鴆薨詔曰太子攖沈瘵疾朕須其痊復將遜于位𢎞性仁厚既承命因感結疾日以加宜申往命諡為孝敬皇帝葬緱氏墓號恭陵制度盡用天子禮帝自制睿德紀刻石陵側妃薨諡哀皇后無子永昌初以楚王隆基嗣中宗立詔以主祔太廟號義宗開元中有司奏孝敬皇帝宜建廟東都以諡名廟詔可于是罷義宗廟蕙田案父在子沒追諡為帝此髙宗獨創之制舊唐書禮儀志天寶六載正月詔京城章懷節愍惠文宣太子與隱太子懿德太子同為一廟呼為七太子廟以便于祀享其後又有玄宗子靜德太子廟肅宗子恭懿太子廟蕙田案七太子章懷節愍懿德惠莊惠文惠宣及隱太子也此云惠文宣恐有脫字元宗子靜德太子亦當作靖恭太子通典大唐開元三年右拾遺陳貞節以諸太子廟不合守供祀享上疏伏見章懷太子等四廟逺則從祖近則堂昆並非有功于人立事于代而寢廟相屬獻祼連時事不師古以克永代臣實疑之今章懷太子等乃以陵廟分署官僚八處修營四時祭享物須官給人必公糧合樂登歌咸同列帝謹按周禮始祖以下猶稱小廟未知此廟厥名維何臣謂八署司存員寮且省四時祭祀供給咸停臣又聞磐石維城既開封建之典别子為祖非無大小之宗其四陵廟等應須祭祀者並令承後子孫自修其事崇此正典冀合禮經上令有司集禮官及羣臣詳議奏聞駕部員外郎裴子餘議曰謹按前件四廟等並前皇嫡允殞身昭代聖上哀骨肉之深錫蒸嘗之享憲章往昔垂範將來昔嫄廟列周戾園居漢並位非七代置在一時斯並前代宏規後賢令範又按春秋狐突適下國遇太子使登僕曰豫將以晉畀秦秦將祀豫此則太子之言無後明矣對曰神不歆非類人不祀非族君祀無乃殄乎比則晉有其祀立廟必矣又定公元年立煬宫經傳更無異説鄭元注云煬公伯禽之子季氏禱而立其宫也考之漢儲晉嫡則如彼言乎周廟魯宫則如此豈可使晉求秦祀戾非漢恩求枉者深所直者鮮黷神慢禮理必不然且尊以儲后位絶諸侯諡號既崇官吏有典去羊存朔非禮所安徇利忘禮何以為國太常博士段同泰議曰伏據隱太子等皆稟殊恩式創陵寢一著蘋藻驟移檀柘豈非睦親繼絶悼往推恩者歟况漢置戾園晉循虞祀書稱咸秩禮紀百神紛綸葳蕤可略言矣隱太子等並特降絲綸别營祠宇義殊太廟恩出當時借如逝者之錫蘋蘩亦猶生者之開茆土寵章所及誰謂非宜且自古帝王封建子孫寄以維城之固咸登别郡之榮豈必有功于人立事于代生者曾無異議逝者輒此奏停雖存沒之迹不同而君親之恩何别此則輕重非當情禮不均神道固是難誣人情孰云其可開元二十二年七月勑贈太子頃年官為立廟并致享祀雖欲歸厚而情且未安蒸嘗之時子孫不及若專令官祭是以疏間親遂此為常豈云教孝其諸贈太子有後者但官置廟各令子孫自主祭其署及官悉停若無後者宜依舊上元二年二月禮儀使太常卿杜鴻漸奏讓帝七廟等請停四時享獻每至禘祫之月則一祭焉樂用登歌一部牲獻樽爼之禮同太廟一室之儀唐書陳貞節傳貞節潁川人開元初為右拾遺初隱章懷懿德節愍四太子並建陵廟分八署置官列吏卒四時祠官進饗貞節以為非是上言王者制祠以功德者猶親盡而毁四太子廟皆别祖無功于人而園祠時薦有司守衛與列帝侔金奏登歌所以頌功德詩曰鐘鼓既設一朝饗之使無功而頌不曰舞詠非度耶周制始祖乃稱小廟未知四廟欲何名乎請罷卒吏詔祠官無領屬以應祀典古者别子為祖故有大小宗若謂祀未可絶宜許所後子孫奉之詔有司博議駕部員外郎裴子餘曰四太子皆先帝冢嗣列聖念懿屬而為之享春秋書晉世子曰將以晉畀秦秦將祀豫此不祀也又言神不歆非類君祀無乃戾乎此有廟也魯定公元年立煬宫煬伯禽子季氏逺祖尚不為限况天子篤親親以及旁期誰不曰然太常博士段同曰四陵廟皆天子睦親繼絶也逝者錫蘋蘩猶生者之開茅土古封建子弟詎皆有功生無所議死乃援禮停祠人其謂何隱于上伯祖也服緦章懷伯父也服期懿德節愍堂昆弟也服大功親未盡廟不可廢禮部尚書鄭惟忠等二十七人亦附其言于是四陵廟惟減吏卒半他如舊舊唐書音樂志享隱太子廟樂章六首貞觀中撰迎神用誠和道閟鶴關運纒鳩里門集大命俾歆嘉祀禮亞六瑚誠殫二簋有誠顒若神斯戾止登歌奠玉帛用肅和嵗肇春宗乾開震長瑶山既寂戾園斯享玉肅其事物昭其象絃誦成風笙歌合響迎俎用雍和明典肅陳神居遂起春伯聫事秋官相禮有來雍雍登歌濟濟𬗟惟主鬯庶歆芳醴送文舞出迎武舞入用舒和三縣已判歌鐘列六佾將間羽鏚分尚想燕飛來蔽日終疑鶴影降凌雲武舞用凱安天步昔將開商郊初欲踐撫戎金陳廓二極瑶圖闡雞戟遂崇儀龍樓期好善弄兵隳震業啓聖隆祠典送神用誠和詞同迎神又隱太子廟樂章二首太樂舊有此詞不詳所出迎神蒼震有位黃離蔽明江充禍結戾據災成銜寃昔痛贈典今榮享靈有秩奉樂以迎送神皇情悼往祀儀增設鐘鼓鏗鍠羽旄昭晰掌禮云備司筵告徹樂以送神靈其鑒闋章懷太子廟樂章六首神龍初作迎神第一姑洗宫副君昭象道應黃離銅樓備德玉裕成規仙氣靄靄靈從師師前驅戾止控鶴來儀登歌酌鬯第二南吕均之蕤賓羽忠孝本著羽翼先成寢門昭德馳道為程幣帛有典容衛無聲司存既肅廟享惟清迎爼及酌獻第三大吕羽通三錫胤明兩承英太山比赫伊水聞笙宗祧是寄禮樂其亨嘉辰薦爼以發聲明送文舞出迎武舞入第四蕤賓商羽籥崇文禮以畢干鏚奮武事將行用捨由來其有致壯志宣威樂太平武舞作第五夷則角緑林熾炎歷黃虞格有苗沙塵驚塞外帷幄命嫖姚七德干戈止三邊雲霧消寶祚長無極歌舞盛今朝送神第六詞同隱廟懿德太子廟樂章六首神龍初作迎神第一姑洗宫甲觀昭祥畫堂升位禮絶羣后望尊儲二啓誦慙德莊丕掩粹伊浦鳳翔緱峰鶴至登歌酌鬯第二南吕均之蕤賔羽譽闡元儲寄崇明兩玉裕雖晦銅樓可想絃誦輟音笙歌罷響幣帛言設禮容無爽迎爼酌獻第三大吕羽雍雍盛典肅肅靈祠賓天有聖對日無期飄颻羽服掣曵雲旗眷言主鬯心乎愴兹送文舞出迎武舞入苐四蕤賓商八音協奏陳金石六佾分行整禮容滄溟赴海還稱少素月開輪即是重武舞作第五夷則角隋季昔云終唐年初啓聖纂戎將禁暴崇儒更敷政威略近三邊仁恩覃萬姓送神第六詞同隱廟節愍太子廟樂章六首景雲中作迎神第一姑洗宫儲后望崇元良寄切寢門是仰馳道不絶仙袂雲會靈旗電晰煌煌而來禮物攸設登歌酌鬯第二南吕均之蕤賓羽灼灼重明仰承元首既賢且哲惟孝與友惟孝雖遙靈規不朽祀因誠致備潔玄酒迎爼及酌獻第三大吕羽嘉薦有典至誠莫愆畫梁雲亘雕爼星聨樂器周列禮容備宣依稀如在若未賓天送文舞出迎武舞入第四蕤賓商雍雍闡化憑文德赫赫宣威藉武功既執羽旄先拂吹還持玉鏚更揮空武舞作第五夷則角武德諒雍雍由來掃冦戎劒光揮作電旗影列成虹霧廓三邊靜波澄四海同睿圖今已盛相共舞皇風送神第六詞同隱太子廟隱太子傳隱太子建成髙祖受禪立為皇太子死年三十八太宗立追封建成為息王諡曰隱章懷太子傳章懷太子賢皇太子薨立賢為皇太子調露中廢為庶人開耀元年迫令自殺神龍初陪葬乾陵睿宗立追贈皇太子懿德太子傳懿德太子重潤髙宗改元永淳是嵗立為皇太孫中宗失位太孫府廢貶庶人武后杖殺之神龍初追贈皇太子及諡節愍太子傳節愍太子重俊神龍初為皇太子武三思挾韋后勢將圖逆內忌太子崇訓又三思子尚安樂公主常教主辱重俊三年七月重俊恚忿遂率李多祚矯發兵殺三思崇訓趨肅章門入索韋后后挾帝升元武門士倒戈斬多祚餘黨潰重俊亡入終南山為左右所殺睿宗立加贈諡陪葬定陵惠莊太子傳惠莊太子撝垂拱三年始王恆睿宗立進王申開元八年薨册書贈太子及諡陪葬橋陵惠文太子傳惠文太子範初王鄭進王岐開元十四年薨册書贈太子及諡陪葬橋陵惠宣太子傳惠宣太子業始王趙進王薛二十二年薨册書加贈及諡陪葬橋陵蕙田案以上諸太子即所謂七太子是也其實懿德惠莊惠文惠宣生時並未立為東宫殁後乃追册耳册府元龜王起為兵部尚書充皇太子侍讀兼判太常卿事開成三年二月起與太常少卿裴泰章太常少卿兼權勾當國子司業楊敬之太常博士崔立等狀奏準今月十日堂帖天寶初置七太子廟異室同堂國朝故事足以師法今欲聞奏以懷懿太子神主祔惠昭及悼懷太子廟不虧情禮又甚便宜送太常寺三卿與禮官同商量議狀者伏以三代已降廟制不同光武為總立一堂羣主異室親盡廟毁昭穆遞遷此蓋祖宗之廟也然則太子廟出於近或散在他處别置一室或尊卑序列共立一堂伏準國初太子廟散在諸方至天寶六載敕文章懷節愍惠宣等太子宜與隱太子列次同為一廟應緣祭事並合官給號為七太子廟又準大歷三年三月以榮王天寶中追贈靜恭太子神主未祔詔祔七太子廟加一室今懷懿太子為姪以姪祔叔獻享得宜請于惠昭太子廟添置一室擇日升祔從之靖恭太子傳靖恭太子琬始王鄄徙王榮及薨詔加贈諡恭懿太子傳恭懿太子紹始封興王上元元年薨册贈皇太子蕙田案此二太子廟亦係薨後追册者昭靖太子傳昭靖太子邈上元二年始王益昌進王鄭八年薨文敬太子傳文敬太子諒見愛于帝命為子貞元十五年薨追贈及諡陵及廟置令丞云惠昭太子傳惠昭太子寧貞元二十一年始王平原帝即位進王鄧于是國嗣未立李絳等建言聖人以天下為大器知一人不可獨化四海不可無本故建太子以自副然後人心定宗祏安有國不易之常道陛下受命四年而冢子未建是開窺覦之端乖慎重之義非所以承列聖示萬世帝曰善以寧為皇太子更名宙明年薨懷懿太子傳懷懿太子湊始王漳太和八年薨贈齊王帝哀湊被讒死不自明開成三年追贈悼懷太子傳悼懷太子普寶歷元年始王晉文宗愛之若已子嘗欲為嗣太和二年薨帝惻念不能已故贈恤加焉莊恪太子傳莊恪太子永太和四年始王魯六年遂立為皇太子開成三年暴薨蕙田案此六太子惟惠昭莊恪係生時立者餘皆追册又宋諸太子如昭成太子元僖悼獻太子祐獻愍太子茂皆追册者欽宗太子諶高宗元懿太子敷孝宗莊文太子愭寧宗景獻太子詢皆生時立者惜志傳俱不載其祔廟立廟之事莫得考焉遼史順宗傳順宗名濬道宗長子八嵗立為皇太子薨諡曰昭懷太子以天子禮改葬玉峰山金史熙宗二子傳濟安皇統二年二月戊子生于天開殿三月戊午册為皇太子十二月薨諡英悼太子葬興陵之側命工塑其像于儲慶寺海陵毁上京宫室寺亦隨毁蕙田案子殤塑像熙宗創也顯宗紀顯宗皇帝諱允恭世宗第二子大定五年六月立為皇太子二十五年六月庚申崩賜諡宣孝太子世宗欲加帝號以問羣臣翰林修撰趙可對曰唐髙追諡太子𢎞為孝敬皇帝左丞張汝弼曰此蓋出于武后遂止乃建廟于衍慶宫後祭用三獻樂用登歌禮志宣孝太子廟大定二十五年七月有司奏依唐典故太子置廟設官屬奉祀擬于法物庫東建殿三間南垣及外垣皆一屋三門東西垣各一屋一門門設九戟齋房神厨度地之宜又奉旨太子廟既安神主宜别建影殿有司定擬制度于見建廟稍西中間限以磚墉內建影殿三間南面一屋三門垣周以甓無缺角及東西門外垣正南建三門一屋左右翼廊二十間神厨齋室各二屋三間是歲十月廟成十一日奉安神主十四日奉遷畫像神主用栗依唐制諸侯用一尺刻諡于背省部遣官于本廟西南隅靣北設幄次監視製造訖其日晚奉神主官奉神主承以箱覆以帕捧詣題神主幄中次日丑前五刻題神主官與典儀并禮官詣幄次前題神主官詣罍洗位盥手帨手訖奉神主官先以香湯奉沐拭以羅巾題神主官就褥位題諡號于背云宣孝太子神主墨書用光漆摸訖授奉神主官承以箱覆以梅紅羅帕藉以素羅帕詣座置于匱乃下簾幃侍衛如式俟典儀俯伏跪請備腰輿傘扇詣神位道引侍衛皆減昭德廟儀祭有司言當隨祖廟四時祭享初獻于皇孫皇族亞獻或皇族或五品以下有差樂用登歌量減用二十五人具接神奏無射宫升降徹豆則歌夾鐘牲羊豕各一籩豆各八簠簋各二登鉶各一其餘祭食亦量減之二十六年十一月一日奉神主入廟牲牢樂縣官給影廟皇孫奉祀宣孝太子别廟登歌樂章初獻升殿夾鐘宫承安之曲有腯斯牲有馨斯齊美哉洋洋升降以禮禮容既莊樂亦諧止神之格思式歆明祀酌獻無射宫和寧之曲於惟光靈孝德昭宣高麗有奕來寧來燕於薦惟祫既時既蠲從我列祖載享億年亞終獻和寧之曲金石和奏豆籩惟豐祠宫奉事齋敬精衷笙吟伊浦鶴駐緱峰是保是饗靈德無窮徹豆夾鐘宫和安之曲寢廟奕奕今兹其時明稱肇祀將禮之儀侯安以懌羞嘉且時樂闋獻已神其饗思莊憲太子傳莊憲太子名守志宣宗長子也貞祐元年閏九月立為皇太子三年正月薨諡莊獻立其子鏗為皇太孫十二月薨四年正月賜諡沖懷太孫元史祭祀志至元二十二年十二月丁未皇太子薨太常博士議曰前代太子薨梁武帝諡統曰昭明齊武帝諡長懋曰文惠唐憲宗諡寧曰惠昭金世宗諡允恭曰宣孝又建别廟以奉神主準中祀以陳登歌例設令丞嵗供灑掃斯皆纍代之典莫不追美洪休時中書翰林諸老臣亦議宜加諡立别廟奉祀遂諡曰明孝太子作主用金三十年十月朔皇太子祔于太廟元史紀事本末三十年冬十月祔明孝太子主于廟先是皇太子珍戩卒太常博士議建别廟以奉神主至是祔于太廟裕宗傳裕宗文惠明孝皇帝諱珍戩世祖嫡子也中統十年二月立為皇太子二十二年薨文宗紀至順元年十二月辛亥立燕王阿喇特納實哩為皇太子二年正月辛卯皇太子阿喇特納實哩薨壬辰命宫相法里及給事者五十八人護靈輿北祔葬于山陵三月甲申繪皇太子真容奉安慶壽寺之東鹿頂殿祀之如纍朝神御殿儀續文獻通考文宗又命皇太子影殿造祭器如祖宗故事宗室世系表成宗皇帝皇太子德夀早薨泰定皇帝四子長皇太子阿里勒濟三錫錫太子四允丹藏布太子俱早殞文宗皇帝三子長皇太子阿喇特納實哩次二雅克特古斯太子次三太平訥太子俱早殞明史興宗傳興宗孝康皇帝標太祖長子也洪武元年正月立為皇太子薨祔葬孝陵東諡曰懿文懷獻太子傳懷獻太子見濟母杭妃始為郕王世子及郕王即位景泰三年五月廢汪后立杭妃為皇后立見濟為太子四年二月太子薨諡曰懷獻葬西山天順元年降稱懷獻世子悼恭太子傳悼恭太子祐極成化七年立為皇太子薨哀沖太子傳哀沖太子載基世宗第一子生二月而殤莊敬太子傳莊敬太子載嘉靖八年世宗將南巡立為皇太子二十八年薨帝命與哀沖太子並建寢園嵗時祭祀從諸陵後憲懷太子傳憲懷太子翊釴穆宗長子生五嵗殤贈裕世子隆慶元年追諡熹宗諸子傳懷沖太子慈然悼懷太子慈焴獻懷太子慈炅俱殤右歷代太子廟五禮通考卷一百七
