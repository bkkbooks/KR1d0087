body:
  text: 五禮通考卷二百六十二刑部尚書秦蕙田撰凶禮十七䘮禮儀禮士虞禮鄭目録云虞安也士既塟其父母迎精而反日中而祭之于殯宫以安之虞于五禮属㐫祔疏虞卒哭在寝乃在廟士虞禮特豕饋食注饋猶歸也虞疏卜日曰牲此虞為䘮祭又塟日因其吉日略無卜牲之禮故指豕體而言不云牲大夫以上亦當然以物與神及人皆言饋欽定義疏饋食吉祭之名以虞易奠為自㐫即吉之始故放饋食之禮行之未塟殷奠用特豚豚解而已遣奠用羊豕亦豚解而已此云特豕者見此豕之為體解而異於奠也不云特牲者吉祭曰特牲宜避之也周官大宗伯以肆獻祼享先王以饋食享先王謂吉祭也鬯人廟用脩鄭氏以為三年䘮畢之吉祭自饋食始不用祼鬯則天子諸侯之虞亦用饋食禮可知側亨於廟門外之右東面注側亨亨一胖也亨於爨用鑊不於門東未可以吉也是日也以虞易奠祔而以吉祭易䘮祭鬼神所在則曰廟尊言之疏案吉禮皆全左右胖皆亨此亨一胖者以其虞不致爵自獻賔以後則無主人主婦及賔已下之俎故唯亨一胖也特牲吉禮鼎鑊皆在門東此云門外之右是門之西未可以吉也張氏爾岐曰此虞在殯宫即適寝也而曰廟故注曰尊言之也魚腊爨亞之北上注爨竈則疏魚腊各别鑊言北上次在豕爨之南敖氏繼公曰于特豕云亨云東面魚腊云爨云北上文互見也張氏爾岐曰三鑊皆在西方饎爨在東壁西面注炊黍稷曰饎饎北上上齊于屋宇于虞有亨饎之爨彌吉疏案特牲云主婦視饎爨于西堂下今在東亦反吉也小斂大斂未有黍稷朔月薦新始有黍稷向吉仍未有爨至此始有亨饎之爨故云彌吉盛氏世佐曰饎爨在門内以婦人主之故也此士禮大夫則廩人掌之在門外設洗於西階西南水在洗西篚在東注反吉也亦當西榮南北以堂深疏吉時設洗皆當東榮尊於室中北墉下當户兩甒醴酒酒在東無禁冪用絺布加勺南枋注酒在東上醴也絺布葛屬疏吉禮𤣥酒在上今䘮祭禮無𤣥酒則醴在上素几葦席在西序下注有几始鬼神也至疏大斂奠時已有席虞乃有几若天子諸侯始死則几筵具周禮司几筵云每敦一几據始殯及塟時也苴刌茅長五寸束之實於篚饌於西坫上注苴猶藉也張氏爾岐曰刌度也截也苴刌茅者藉祭之刌茅也度而截之故謂刌茅饌兩豆菹醢於西楹之東醢在西一鉶亞之注醢在西南面取之得左取菹右取醢便其設之尸疏一鉶亞之菹以東也尸在奥東面設者西面設于前菹在南醢在北今于兩楹東饌之菹在東醢在西是南面取之得左菹右醢至尸前西面設之便也從獻豆兩亞之四籩亞之北上注豆從主人獻祝籩從主婦獻尸祝比上菹與棗不東陳别于正疏此從獻豆籩雖文承一鉶之下而云亞之下别云北上是不從鉶東為次宜于鉶東北以北為上向南陳之然則東北菹為首次南醢醢東栗栗北棗棗東棗棗南栗故鄭云北上菹與棗也云不東陳别于正者以二豆與鉶在尸為獻前為正此皆在獻後為非正故東北别也饌黍稷二敦於階間西上藉用葦席注藉猶薦也敖氏繼公曰藉敦未必有席席字盖因上文而衍也特牲禮藉用萑匜水錯於槃中南流在西階之南簞布在其東注流匜吐水口也敖氏繼公曰自設洗至此其陳設之位與特牲饋食異者皆為變于吉陳三鼎於門外之右北面北上設扃鼏注門外之右門西也匕俎在西塾之西注不饌于塾上統于鼎也塾有西者是室南鄉羞燔俎在内西塾上南順注南順于南面取縮執之便也肝俎在燔東郝氏敬曰羞俎之俎非正俎三鼎為正從薦為羞肉曰燔肝曰炙不言炙可知也蕙田案以上陳饌具主人及兄弟如葬服賔執事者如弔服皆即位於門外如朝夕臨位婦人及内兄弟服即位於堂亦如之注葬服者既夕曰丈夫髽散帶垂也賔執事者賔客來執事也賔疏始虞與葬服同三虞皆同至卒哭乃變麻服葛也客来執事以其虞為䘮祭主人未執事案曽子問士則朋友奠不足則取于大功以下敖氏繼公曰婦人及内兄弟其服皆如葬服其位皆如臨位婦人葬服經無所見盖與既殯之服同祝免澡葛絰帶布席於室中東面右几降出及宗人即位於門西東面南上注祝亦執事免者祭祀之禮祝所親也澡治也治葛以為首絰及帶接神宜變也然則士之屬官為其長弔服加麻矣至于既卒哭主人變服則除右几于席近南也張氏爾岐曰祝執事而免者以其身親祭祀之禮不嫌于重也宗人告有司具遂請拜賔如臨入門哭婦人哭注臨朝夕哭主人即位於堂衆主人及兄弟賔即位於西方如反哭位注既夕曰乃反哭入門升自西階東面衆主人堂下東面北上異于朝夕敖氏繼公曰反哭之位乃順孝子一時之心而為之本非正位自始虞至卒哭其位皆如之者盖因此以别于既祔以後吉祭也祝入門左北面注不與執事同位接神尊也執疏上兄弟賔即位于西方者皆是事宗人西階前北面注當詔主人及賔之事人疏宗人在堂下是主人在堂時若主在室則宗人升户外北面蕙田案以上主人及賔入即位祝盥升取苴降洗之升入設於几東席上東縮降洗觶升止哭注縮從也郝氏敬曰祝盥手于西階下槃内升堂取苴茅于西坫上降洗于西階下復升堂入室設于几東神席上東縮席向東茅順東西直布苴以藉祭佐食祭黍稷豕膚醴皆奠苴上故先設主人倚杖入祝從在左西面注主人北旋倚杖西序乃入䘮服小記曰虞杖不入於室祔杖不升於堂然則練杖不入於門明矣贊薦菹醢醢在北注主婦不薦齊斬之服不執事也曽子問曰士祭不足則取于兄弟大功以下者疏齊斬不執事唯為今時至于尸入之後亦執事兩籩棗栗設于㑹南至于祔祭雖隂厭亦主婦薦主人自執事也佐食及執事盥出舉長在左注舉舉鼎也長在左在西方位也凡事宗人詔之鼎入設於西階前東面北上匕俎從設左人抽扄鼎匕佐食及右人載注載載于俎佐食載則亦在右矣卒朼者逆退復位注復賔位也俎入設於豆東魚亞之腊特注亞次也贊設二敦於俎南黍其東稷注簋實奠黍也疏西黍東稷西上故云尊黍經言敦注言簋者敦有虞氏之器周制士用之同姓之士容得從周制用簋設一鉶於豆南注鉶菜羮也佐食出立於户西注饌已也敖氏繼公曰既設俎則出而立于此矣後言之亦終上事乃及之也贊者徹鼎注反于門外敖氏繼公曰此徹鼎亦當與設俎相屬為之言于此者與上文之意同祝酌醴命佐食啟㑹佐食許諾啟㑹郤於敦南復位注㑹合也謂敦盖也復位出立于户西張氏爾岐曰特牲少牢有酒無醴故厭亦用酒此酒醴兼設以醴隂厭以酒酳尸亦其異于吉祭也祝奠觶於鉶南復位注復位復主人之左主人再拜稽首祝饗注饗告神饗也饗神辭記所謂哀子某哀顯相夙興夜處不寜下至適爾皇祖某甫饗是也疏鄭注云饗辭勸强尸之辭也凡吉祭饗尸曰孝子則宜曰孝孫某圭為孝薦之饗是也敖氏繼公曰饗辭即記所云哀子某圭為而哀薦之饗者也命佐食祭注此祭祭于苴也佐食許諾鉤袒取黍稷祭於苴三取膚祭祭如初祝取奠觶祭亦如之不盡益反奠之主人再拜稽首注鉤袒如今擐衣也苴所以藉祭也孝子始将納尸以事其親為神疑于其位設苴以定之耳或曰苴主道也則特牲少牢當有主象而無可乎疏特牲少牢吉祭無苴案司巫云祭祀則共匰主及蒩館常祀亦有苴者以天子諸侯禮備故吉祭亦有苴㐫祭有苴可知祝祝卒主人拜如初哭出復位注祝祝者釋孝子祭辭少疏迎尸上釋孝子辭經記無文宜與牢迎尸祝孝子辭同但稱哀為異敖氏繼公曰祝祝之辭則記所謂哀子某哀顯相夙興夜處不寜下至適爾皇祖某甫者也觀承案上條鄭注引記饗神詞誤當移於此條祝祝卒之下則上文祝饗詞當如敖氏引記所云哀子某圭為而哀薦之饗十字以注之為是也蕙田案以上設饌饗神是為隂厭祝迎尸一人衰絰奉篚哭從尸注尸主也孝子之祭不見親之形象心無所繋立尸而主意焉一人主人兄弟檀弓曰既封主人贈而祝宿虞尸尸入門丈夫踊婦人踊注踊不同文者有先後也尸入主人不降者䘮事主哀不主敬疏主人在西序東面衆兄弟西階下亦東面婦人堂上當東序西面見尸有先後故踊有先後淳尸盥宗人授巾注淳沃也沃尸盥者賔執事者也尸及階祝延尸注延進也告之以升尸升宗人詔踊如初注言詔踊如初則凡踊宗人詔之尸入户踊如初哭止注哭止尊尸婦人入於房注辟執事者蕙田案以上迎尸主人及祝拜妥尸尸拜遂坐注妥安坐也敖氏繼公曰此皆變于吉祭也士之吉祭尸既坐主人乃拜妥尸祝不拜從者錯篚於尸左席上立於其北注北席北也俎疏此篚象特牲肵置于席北以擬盛尸之饌郝氏敬曰從者即一人衰絰奉篚者也尸取奠左執之取菹擩於醢祭於豆間祝命佐食墮祭注下祭曰墮墮之猶言墮下也周禮曰既祭則藏其墮謂此也今文墮為綏特牲少牢或為羞失古正矣齊魯之間謂祭為墮張氏爾岐曰尸取奠取祝所反奠于鉶南之觶也左執之者以右手将祭也下祭曰墮謂從俎豆上取下當祭之物以授尸使之祭佐食但下之而已疏以為向下祭之誤佐食取黍稷肺祭授尸尸祭之祭奠祝祝主人拜如初尸嘗醴奠之注如初亦祝祝卒乃再拜稽首薦疏其祝辭即下記云哀子某圭為而哀之饗盛氏世佐曰此祝辭疏以下記所云饗辭當之敖氏既以饗辭用之隂厭而于此則不言其所用竊意所釋之辭盖與上同一辭而再釋之者事神之道于彼乎于此乎庶幾其一聞之也蕙田案虞祭三次祝辭注與諸家説各不同未審誰是佐食舉肺脊授尸尸受振祭嚌之左手執之注右手将有事也尸食之時亦奠肺脊于豆尸疏案特牲祝命邇敦佐食邇黍稷于席上舉肺脊授彼舉肺脊在邇敦後此舉肺脊在邇孰前者吉㐫相變故也右手将有事為下文祭鉶嘗鉶是也張氏爾岐曰此肺脊至尸卒食佐食方受之實于篚中間食時亦須奠之于豆祝命佐食邇敦佐食舉黍錯於席上注邇近也尸祭鉶嘗鉶注右手也少牢曰以柶祭羊鉶遂以祭豕鉶嘗羊鉶張氏爾岐曰此但豕鉶祭之嘗之亦用柶泰羮湇自門入設於鉶南胾四豆設於左注博異味也湇肉汁也胾切肉也張氏爾岐曰鉶南觶北初設時留空處以待泰羮胾設于左正豆之北也欽定義疏菜羮鉶之正泰羮其加也菹醢二豆豆之正胾四豆其加也有正有加祭禮也泰羮湇自門入爨在門外新自爨来欲其熱也設於左不言所上四豆一物也尸飯播餘於篚注不反餘也古者飯用手吉時播餘于㑹三飯佐食舉幹尸受振祭嚌之實於篚注飯間㗖肉安食氣疏幹脅也又三飯舉胳祭如初佐食舉魚腊實於篚注尸不受魚腊以䘮不備味又三飯舉肩祭如初注後舉肩者貴要成也成疏周人貴肩故云貴者要也舉魚腊俎俎釋三个注釋猶遺也遺之者君子不盡人之歡不竭人之忠个猶枚也今俗或名枚曰個音相近此腊亦七體如其牲也肫疏俎釋三个不言牲體者下記云羮飪升左肩臂臑胳脊脇七體此佐食初舉脊次舉幹又舉胳終舉肩縂舉四體唯有臂肫臑三者佐食即當俎釋三个故直舉魚腊而已張氏爾岐曰牲七體魚腊各七佐食所舉以授尸者皆盛于篚所餘每俎三个将以改饌于西北隅也尸卒食佐食受肺脊實於篚反黍如初設注九飯而已士禮也篚猶吉祭之有肵俎云疏少牢大夫禮十一飯諸侯十三飯天子十五飯故九飯士禮也吉祭尸舉牲體振祭嚌之皆加于肵俎此尸舉牲體振祭嚌之皆實于篚故云猶肵俎也蕙田案以上饗尸尸九飯主人洗廢爵酌酒酳尸尸拜受爵主人北面答拜尸祭酒嘗之注爵無足曰廢爵酳安食也主人北面以酳酢變吉也凡異者皆變吉疏特牲少牢尸拜受主人西面拜送與北面相反賔長以肝從實於俎縮右鹽注縮從也從實肝炙於俎也䘮祭進柢右鹽于俎近北便尸取之也縮執俎言右鹽則肝鹽併也疏柢本也謂肝之本頭云右鹽于俎近北者據執俎之人左畔有肝右畔有鹽西面向尸尸東面以右手取肝于俎之右畔而擩鹽于左畔故云便尸取之尸左執爵右取肝擩鹽振祭嚌之加於俎賔降反俎於西塾復位注取肝右手也加于俎從其牲體也以䘮不志于味張氏爾岐曰加于俎盛牲體之俎賔所反則肝俎也復位復西階前衆兄弟之南東面位尸卒爵祝受不相爵主人拜尸答拜注不相爵䘮祭於禮畧相爵者特牲曰送爵皇尸卒爵蕙田案以上主人酳尸祝酌授尸尸以醋主人主人拜受爵尸答拜注醋報主人坐祭卒爵拜尸答拜楊氏復曰尸醋主人亦北面拜受坐祭卒爵及主人獻祝之時乃反西面位敖氏繼公曰尸無降席之禮故祝為酌之酢不洗爵尸禮也孝子于是時乃飲而卒爵者為尊者之賜也蕙田案以上尸醋主人醋與酢同古文通用楊氏復曰奠之所尚者在於醴前饗神之時祝酌醴奠觶于鉶南及尸既坐取所奠左手執之以右手祭菹祭黍稷肺乃祭奠于是祝祝主人再拜稽首而後尸嘗醴而奠之此是第一節牲之所重者在肺脊肺者氣之主也脊者體之正也故尸又先舉肺脊祭而嚌之又以左手執之乃以右手祭鉶而嘗之祝命邇黍敦錯於席上為尸之将飯也泰羮湇胾四豆至是新設之於俎豆之間以博異味也於是三飯舉幹祭而嚌之實於篚又三飯舉胳祭而嚌之實於篚又三飯舉肩祭而嚌之實於篚魚腊與豕為三鼎今所舉皆豕而魚腊則不食焉唯佐食舉之以實於篚以䘮不備味也尸卒食佐食乃受尸左手所執肺脊實于篚主人乃酌廢爵酒以酳尸賔長以肝從而獻禮成矣於是祝酌授尸尸以醋主人而主人獻尸之禮畢矣筵祝南面注祝接神尊也筵用萑席主人獻祝祝拜坐受爵主人答拜注獻祝因反西面位薦菹醢設俎祝左執爵祭薦奠爵興取肺坐祭嚌之興加於俎祭酒嘗之肝從祝取肝擩鹽振祭嚌之加於俎卒爵拜主人答拜祝坐授主人疏薦誤皆執事者敖氏繼公曰祝與佐食皆事尸者也故于酳尸獻尸之後獻焉不洗而獻者下尸也祭薦亦右手以菹擩醢祭于豆間也先奠爵乃取肺以祭離肺用二手也祭不言絶文省以肝從亦賔長也授主人下宜脱一爵字張氏爾岐曰授主人者虚爵也蕙田案以上主人獻祝主人酌獻佐食佐食北面拜坐受爵主人答拜佐食祭酒卒爵拜主人答拜受爵出實於篚升堂復位注篚在庭不復入事已也亦因取杖乃東面立入疏上文哭時主人升堂西序東面今升堂復位不復室因得取杖復東面位也欽定義疏佐食不設席薦俎設於階間而不在室又無從佐食卑也吉祭亦然蕙田案以上主人獻佐食主婦洗足爵於房中酌亞獻尸如主人儀注爵有足輕者飾也昏禮曰内洗在北堂直室東隅之疏如主人儀如上文主人酳尸儀也自反兩籩棗栗設于㑹南棗在西注尚棗棗美李氏如圭曰自反者自徃取之而反也此兩籩及下獻祝籩即上饌時亞豆東四籩也尸祭籩祭酒如初賔以燔從如初尸祭燔卒爵如初注初主人儀欽定義疏尸不酢主婦䘮祭禮殺也酌獻祝籩燔從獻佐食皆如初以虚爵入于房蕙田案以上主婦亞獻賔長洗繶爵三獻燔從如初儀注繶爵口足之間有篆又彌飾張氏爾岐曰當亦兼獻祝及佐食蕙田案以上賔長三獻婦人復位注復堂上西面位事已尸将出當哭踊欽定義疏尸将出而哭踊其節與尸入同也故復堂上位以俟之吉祭無堂上位䘮祭有之為哭踊也祝出户西面告利成主人哭注西面告告主人也利猶養也成畢也言養禮畢也不言養禮畢于尸間嫌皆哭注丈夫婦人于主人哭斯哭矣祝入尸謖注祝入而無事尸則知起矣不告尸者無遣尊者之道也從者奉篚哭如初注初哭從尸祝前尸出户踊如初降堂踊如初出門亦如之注前道也如初者出如入降如升三者之節悲哀同蕙田案以上祝告利成尸出祝反入徹設於西北隅如其設也几在南厞用席注攺設饌者不知鬼神之節改設之庶幾歆饗所以為厭飫也几在南變右文明東面不南面漸也厞隐也于厞隐之處從其幽闇也疏祝送尸出門而反入徹神前之饌改設于西北隅其設于西北隅次第一如奥中東面設上文隂厭時右几今云几在南明其同必變文者少牢大夫禮陽厭時南面亦几在南此言右几嫌與大夫同故云明東面也特牲改饌几在南與此同示向吉有漸故與吉祭同厞用席以席為障使之隐也熊氏朋來曰隂厭于室之奥陽厭于室之屋漏隂厭未迎尸陽厭尸已謖故二厭之時無尸大戴禮曰無尸者厭也蕙田案以上改設饌是為陽厭祝薦席徹入於房祝自執其俎出注徹薦席者執事者祝薦席則初自房来贊闔牖户注鬼神尚居幽闇或者逺人乎贊佐食者主人降賔出注宗人詔主人降賔則出廟門主人出門哭止皆復位注門外未入位宗人告事畢賔出主人送拜稽顙注送拜者明于大門外也賔執事者皆去則徹室中之饌者兄弟也蕙田案以上事畢送賔記虞沐浴不櫛注沐浴者将祭自潔清不櫛未在於飾也唯三年之䘮不櫛期以下櫛可也今文曰沐浴陳牲於廟門外北首西上寝右注言牲腊在其中西上變吉寝右者當升左胖也腊用棜檀弓曰既反哭主人與有司視虞牲疏士虞唯有一豕而云西上明知兼兎腊也少牢二牲東上是吉祭東上今西上是變吉也日中而行事注朝塟日中而虞君子舉事必用辰正也再虞三虞皆質明中疏辰正謂朝夕日蕙田案以上記沐浴陳牲及行事之期殺於廟門西主人不視豚解注主人視牲不視殺凡為䘮事畧也豚解解前後脛脊脇而已熟乃體解升于鼎也殺疏特牲吉祭故主人視牲又視羮飪升左肩臂臑肫胳脊脅離肺膚祭三取諸左膉上肺祭一實於上鼎注肉謂之羮飪熟也脊脅正脊正脅也䘮禮畧七體耳離肺舉肺也少牢饋食禮曰舉肺一長終肺祭肺三皆刌膉脰肉也畧疏士之正祭禮九體此七體故云膚脅革肉擇之取美者盛氏世佐曰膚祭三者隂厭時佐食為神祭于苴三是也必取諸左膉者近首貴也祭肺一則尸食時佐食取之并黍稷以授尸升魚鱄鮒九實於中鼎注差減之略疏特牲魚十有五此而用九升腊左胖髀不升實於下鼎注腊亦七體牲之類皆設扄鼏陳之注嫌既陳乃設扄鼏也載猶進柢魚進鬐注猶猶士䘮既夕言未可以吉也柢本也鬐脊也張氏爾岐曰吉祭牲進下魚進腴變于食生此䘮祭與吉反是未異于生人也祝俎髀脰脊脅離肺陳於階間敦東注不升于鼎賤也統于敦明神惠也祭以離肺下尸故疏尸祭用刲肺祝用離肺云下尸敖氏繼公曰此俎實自鑊而徑載于俎不復升于鼎者不敢與神俎同也尸三俎用豕魚腊祝唯用豕亦變于吉也蕙田案以上記牲殺體數鼎俎陳設之法淳尸盥執槃西面執匜東面執巾在其北東面宗人授巾南面注槃以盛棄水為淺汙人也執巾不授巾卑也蕙田案此記沃尸面位主人在室則宗人升户外北面注當詔主人室事盛氏世佐曰主人在堂則宗人立階前主人在室則宗人立户外詔禮者宜近其人也皆北面鄉之佐食無事則出户負依南面注室中尊不空立户牖之間謂之依蕙田案此記宗人佐食面位鉶芼用苦若薇有滑夏用葵冬用荁有柶注苦苦荼也荁堇類也乾則滑夏秋用生葵冬春用乾荁張氏爾岐曰夏葵冬荁皆所以為滑也豆實葵菹菹以西蠃醢籩棗烝栗擇注棗烝栗擇則菹刌也棗烝栗擇則豆不楬籩有縢也盛氏世佐曰豆籩之實宜異于奠其器則如初而已異于籩者向吉之漸如初者䘮不致飾也蕙田案此記鉶芼與豆籩之實尸入祝從尸注祝在主人前也嫌如初時主人倚杖入祝從之初時主人之心尚若親存宜自親之今既接神祝當詔侑尸也盛氏世佐曰經云尸及階祝延尸特牲少牢注皆云從後詔侑曰延則入門已後祝即轉居尸後矣言此者明其與出時異也尸出之時祝前尸坐不説屨注侍神不敢燕惰尸謖祝前鄉尸注前道也祝道尸必先鄉之為之節還出户又鄉尸還過主人又鄉尸還降階又鄉尸注過主人則西階上不言及階明主人見尸有踧踖之敬降階還及門如出户注及至也言還至門明其間無節也降階如升時将出門如出户時皆還向尸也每将還必有避退之容凡前尸之禮儀在此敖氏繼公曰祝前者當尸之前而行也鄉尸還謂先鄉尸而即還也上降階者祝也下降階者尸也祝先降而鄉尸及尸既降祝乃反面而行張氏爾岐曰祝之道尸必先以面鄉尸乃轉身前行謂之還上降階謂正降時此時祝以面鄉尸下降階謂既降時祝則轉身前行直至及門乃又鄉尸也尸出祝反入門左北面復位然後宗人詔降疏復位上文祝入門左北面之位詔降詔主人降蕙田案以上記祝相尸之節尸服卒者之上服注上服者如特牲士𤣥端也不以爵弁服為上者祭于君之服非所以自配鬼神士之妻則宵衣耳男男尸女女尸必使異姓不使賤者注異姓婦也賤者謂庶孫之妾也尸配尊者必使適也為疏尸須得孫列者孫與祖為尸孫婦還與夫之祖姑尸故不得使同姓女為尸也男尸先使適孫無適孫乃使庶孫女尸先使適孫妻無適孫妻使適孫妾又無妾乃使庶孫妻不得使庶孫妾自虞祭卒哭以後禫以前䘮中之祭皆男女别尸吉祭則男女共尸欽定義疏無適孫妻當使庶孫妻不使妾小記言妾祔於妾祖姑可見惟妾母之䘮乃以妾為尸耳其取孫倫之婦無服若輕服者為之與張氏爾岐曰必使異姓謂女尸以婦不以族女蕙田案以上記尸服及為尸者無尸則禮及薦饌皆如初注無尸謂無孫列可使者也殤亦是也禮謂衣服即位升降適疏禮記云無孫則取同姓之嫡如無孫又無同姓之是無孫列可使者也曽子問云祭成䘮者必有尸明殤死無尸可知張氏爾岐曰䘮祭而無尸者其衣服位面升降之禮與薦饌之具皆與有尸者同既饗祭於苴祝祝卒注記異者之節不綏祭無泰羮湇胾從獻注不綏言獻記終始也事尸之禮始于綏祭終于從獻綏當為墮主人哭出復位注於祝祝卒事疏謂祝祝卒無尸可迎既無上四主人遂即哭出復户外東面位祝闔牖户降復位于門西注門西北面位也男女拾踊三注拾更也三更踊踊疏凡言更踊者主人主婦踊賔乃踊三者三為拾也如食間注隐之如尸一食九飯之頃也祝升止哭聲三啟户注聲者噫歆也将啟户警覺神也主人入注親之欽定義疏無尸則不行三獻禮主婦與賔皆不入故于将徹時主人又入以致其敬若親送之者然亦倚杖乃入祝從啟牖鄉如初注牖先闔後啟扇在内也鄉牖一名也如初者主人入祝從在左主人哭出復位注堂上位也面疏仍前户外東卒徹祝佐食降復位注祝復門西北面位佐食復西方位不復設西北隅者重閉牖户䙝也宗人詔降如初注初贊闔牖户宗人詔主人降之上疏禮畢降堂宗人詔之亦如經也蕙田案以上記無尸者隂厭之禮始虞用柔日注葬之日日中虞欲安之柔日隂取其静張氏爾岐曰古人葬日例用柔日曰哀子某哀顯相夙興夜處不寜注曰辭也祝祝之辭也䘮祭稱哀顯相助祭者也顯明也相助也詩云於穆清廟肅雍顯相不寜悲思不安敢用絜牲剛鬛注敢昧冒之辭豕曰剛鬛香合注黍也大夫士于黍稷之號合言普淖而已此言香合盖記者誤爾辭次黍又不得在薦上號疏曲禮所云黍稷别是人君法嘉薦普淖注嘉薦菹醢也普淖黍稷也普大也淖和也德能大和乃有黍稷故以為號云明齊溲酒注明齊新水也言以新水溲釀此酒也郊特牲曰明水涚齊貴新也或曰當為明視謂兔腊也今文曰明粢粢稷也皆非其次敖氏繼公曰明齊盖言醴也郊特牲曰縮酌用茅明酌也又曰明水涚齊貴新也盖用明水涚醴齊故曰明齊也祝祝之時奠用醴而已不用酒也云溲酒似衍文盛氏世佐曰溲醙同白酒也上經云兩甒醴酒酒在東是醴與酒兼設矣明齊謂醴溲酒謂酒記文甚明先儒曲為之説特以饗神用醴而不用酒爾然酒以酳尸尸即神象也祝祝之時言醴而并及于酒不亦宜乎哀薦祫事注始虞謂之祫事者主欲祫先祖也以與先祖合為安適爾皇祖某甫注爾女也女死者告之以適皇祖所以安之也皇君也某甫皇祖字也若言尼甫饗注勸强之也敖氏繼公曰以祔祭例之當云尚饗盖庶其饗此祭也再虞皆如初曰哀薦虞事注丁日葬則已日再虞其祝辭異者一言耳張氏爾岐曰皆如初謂用日祝辭皆與初虞同三虞卒哭他用剛日亦如初曰哀薦成事注當祔于祖廟為神安于此後虞改用剛日剛日陽也陽取其動也士則庚日三虞壬日卒哭其祝辭異者亦一言耳他謂不及時而塟者䘮服小記曰報葬者報虞三月而後卒哭然則虞卒哭之間有祭事者亦用剛日其祭無名謂之他者假設言之文不在卒哭上者以其非常也令正者自相亞也檀弓曰葬日中而虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易䘮祭明日祔于祖父如是虞為䘮祭卒哭為吉祭敖氏繼公曰三虞卒哭謂既三虞遂卒朝夕哭也他者變易之辭猶今之言别矣不用柔日而别用剛日故曰他也他用剛日則三虞卒哭後于再虞三日矣蕙田案敖氏以三虞與卒哭合為一祭非是其詮解他字之義較注説為長又案以上記祭日及祝辭獻畢未徹乃餞注卒哭之祭既三獻也餞送行者之酒詩云出宿于泲飲餞于禰尸旦将始祔于皇祖是以餞送之餞疏虞卒哭同在寝祔則在廟故有送尸之禮張氏爾岐曰卒哭祭之明日将祔于廟故卒哭祭畢餞之于寝門之外此下所記即其儀也尊兩甒于廟門外之右少南水尊在酒西勺北枋注少南将有事于北有𤣥酒即吉也此在西尚㐫也言水者䘮質無冪不乆陳張氏爾岐曰廟門寝門也洗在尊東南水在洗東篚在西注在門之左又少南饌籩豆脯四脡注酒宜脯也盛氏世佐曰虞祭兩豆菹醢餞則一豆一籩是其異也脯籩實也不言豆實亦醢可知有乾肉折俎二尹縮祭半尹在西塾注乾肉牲體之脯也如今凉州鳥翅矣折以為俎實優尸也尹正也雖其折之必使正縮從也張氏爾岐曰二正體縮陳俎上又截正體之半以備授祭尸出執几從席從注祝入亦告利成入前尸尸乃出几席素几葦席也以几席從執事也尸出門右南面注俟設席也席設于尊西北東面几在南賔出復位注将入臨之位士䘮禮賔繼兄弟北上門東北面西上門西北面東上面方東面北上主人出即位于門東少南婦人出即位于主人之北皆西面哭不止注婦人出者重餞尸之疏婦人有事自堂及房而已今出寝門外故云重餞尸也尸即席坐唯主人不哭洗廢爵酌獻尸尸拜受主人拜送哭復位敖氏繼公曰唯主人不哭為将行禮也然則亞獻三獻之時主婦賔長亦不哭特於此見之也主人拜送盖亦北面如室中之儀盛氏世佐曰唯主人不哭見其餘哭自若也将獻者哭止獻主于敬不欲以哭亂之薦脯醢設俎于薦東朐在南注胊脯及乾肉之屈也屈者在南變于吉疏曲禮云以脯脩置者左朐右末是吉時屈者在左今尸東面而云朐在南則屈在右末在左故云變于吉也尸左執爵取脯擩醢祭之佐食授嚌注授乾肉之祭尸受振祭嚌反之祭酒卒爵奠于南方注反之反于佐食佐食反之于俎尸奠爵禮有終疏爵不酢而奠之是為禮有終主人及兄弟踊婦人亦如之敖氏繼公曰亦如之者亦及内兄弟之屬皆踊也主婦洗足爵亞獻如主人儀無從踊如初賔長洗繶爵三獻如亞獻踊如初佐食取俎實于篚郝氏敬曰無從無籩豆從薦也盛氏世佐曰餞尸之禮主人既不以肝從獻則主婦之不以燔從可知不待言也此云無從者指籩而言上經自反兩籩棗栗設于㑹南是也以其繼爵而進亦得云從并此而無之禮尤殺也尸謖從者奉篚哭從之祝前哭者皆從及大門内踊如初注男女從尸男由左女由右及至也從尸不出大門者由廟門外無事尸之禮也尸出門哭者止注以餞于外大門猶廟門賔出主人送拜稽顙注送賔拜于大門外疏從尸不出大門者有事尸限送賔大門外自是常禮但禮有終賔無答拜之禮也主婦亦拜賔注女賔也不言出不言送拜之于闈門之内闈門如今東西掖門丈夫説絰帶于廟門外注既卒哭當變麻受之以葛也夕日則服葛者為祔期疏䘮服注云大夫以上虞而受服士卒哭而受服約此文而言也今日為卒哭祭明旦為祔前日之夕為祔祭之期變麻服葛是因祔期即變之使賔知變節故也張氏爾岐曰是日之夕主人因告賔祔期則服葛帶也入徹主人不與注入徹者兄弟大功以下言主人不與則知丈夫婦人在其中婦人説首絰不説帶注不説帶齊斬婦人帶不説也婦人少變而重帶帶下體之上也大功小功者葛帶時亦不説者未可以輕文變于主婦之質至祔葛帶以即位檀弓曰婦人不葛帶疏大功以下夕時未變麻服葛者以其與主婦同在廟門外主婦不變大功以下亦不變夕後入室可以變故至祔旦以葛帶即位也張氏爾岐曰檀弓所言亦謂婦人服齊斬者大功以下是日雖不説麻明日祔祭則葛帶以即位矣蕙田案以上記卒哭餞尸之禮無尸則不餞猶出几席設如初拾踊三注以餞尸者本為送神也丈夫婦人亦從几席而出如疏雖無尸送神不異故云初哭止告事畢賔出蕙田案以上記無尸不餞之禮死三日而殯三月而葬遂卒哭注謂士也雜記曰大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭此記更從死起異人之間其義或殊疏士三日殯三月葬皆通死日死月數是以士之卒哭在三月内大夫以上殯葬除死日死月數大夫三月葬除死月則通四月又有五虞則卒哭在五月諸侯以上可知注異人謂記者不一人故言有更端将旦而祔則薦注薦謂卒哭之祭張氏爾岐曰旦謂明旦之旦卒辭曰哀子某來日某隮祔爾於爾皇祖某甫尚饗注卒辭卒哭之祝辭隮升也尚庶幾也不稱饌明主為告祔也疏迎尸之前祝釋孝子辭云爾女子曰皇祖妣某氏注女孫祔于祖母未疏此女子謂女未嫁而死或出而歸或廟見而死歸葬女氏之家既葬祔于祖母也婦曰孫婦于皇祖姑某氏注不言爾曰孫婦差疏也其他辭一也注来日某隮祔尚饗饗辭曰哀子某圭為而哀薦之饗注饗辭勸强尸之辭也圭絜也詩曰吉圭為饎凡吉祭饗尸曰孝子疏祔及練祥吉祭其辭亦用此但改哀為孝耳蕙田案以上記卒哭告祔之辭及饗辭明日以其班祔注卒哭之明日也班次也䘮服小記曰祔必以其昭穆亡則中一以上凡祔已復于寝如既祫主反其廟練而後遷廟祭疏祔祭與練祭祭在廟祭訖主反于寝其大祥與禫其主自然在寝祭之案下文禫月逢四時吉祭之月即得在廟祭但未配而已沐浴櫛搔翦注彌自飾也用專膚為折俎取諸脰膉注專猶厚也折俎謂主婦以下俎也體盡人多折骨以為之今以脰膉貶于純吉今文字為折俎而説以為肵俎亦甚誣矣張氏爾岐曰吉祭折俎用體骨此用膚為不同其他如饋食注如特牲饋食之事或云以左胖虞右胖祔今此如饋食則尸俎肵俎皆有肩臂豈復用虞臂乎其不然明矣以疏虞不致爵夫婦無俎此上文有俎則夫婦致爵矣祔時變麻服葛其辭稱孝夫婦致爵與特牲同注或云以下鄭君以經文破當時左胖虞右胖祔之説也敖氏繼公曰其他謂陳設之位與事神事尸之儀及執事者也用嗣尸注虞祔尚質未暇筮尸一疏用嗣尸者從虞以至祔祭惟用尸而已欽定義疏自虞至祔惟用一尸不易尸者固以䘮中不暇筮尸亦以數日之間欲令神之馮依有定不可倐彼而倐此也或曰孫于祖為嗣用嗣尸者即以虞尸為皇祖之尸而新祔之孫不另設尸也曰孝子某孝顯相夙興夜處小心畏忌不惰其身不寜注稱孝者吉祭用尹祭注尹祭脯也大夫士祭無云脯者今不言牲號而云尹祭亦記者誤矣嘉薦普淖普薦溲酒注普薦鉶羮不稱牲記其異者適爾皇祖某甫以隮祔爾孫某甫尚饗注欲其祔合兩告之曽子問曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟然則士之皇祖于卒哭亦反其廟無主則反廟之禮未聞以其幣告之乎張氏爾岐曰上句告死者下句謂皇祖蕙田案以上記祔祭之禮期而小祥注小祥祭名祥吉也檀弓曰歸祥肉曰薦此常事注祝辭之異者言常者期而祭禮也張氏爾岐曰此謂練祭又期而大祥曰薦此祥事注又復也大疏謂二十五月祥祭敖氏繼公曰凶事至是盡除故曰大祥而其辭曰祥事言大者對小之稱中月而禫注中猶間也禫祭名也與大祥間一月自䘮至中凡二十七月禫之言澹澹然平安意也是月也吉祭猶未配注是月是禫月也當四時之祭月則祭猶未以某妃配某氏哀未㤀也少牢饋食禮祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歳事于皇祖伯某以某妃配某氏尚饗疏謂是禫月得禫祭仍在寝此月當四時吉祭之月則于廟行四時之祭于羣廟而猶未得以某妃配敖氏繼公曰禫之月即安祭所以安神至是方云吉祭則于祔云其他如饋食者亦大約言之耳猶未配孝子之母雖先其父而卒者此時猶未以之配祭也盖此祭主于安其父之神靈故不及其母盛氏世佐曰别云是月則禫祭與吉祭同月而異日明矣吉祭謂以吉禮祀今亡者于廟也前此者虞不致爵小祥不旅酬大祥無無筭爵皆未吉也至此純以吉禮行之故曰吉祭一月而兩祭者禫尚在寝吉祭則以其新遷于廟而為是祭以妥其神也配謂以其妃之先卒者合食也婦人無廟其妃之先卒者鄉祔于皇祖姑今其夫遷廟之後乃合食焉是則所謂配也未配則祭考而已不及妣也未配之義有二一則以其在二十七月之内未忍純以鬼神之道事之一則䘮三年不祭是時羣廟之祭猶未舉固不得而獨私其母也盖此祭為新遷廟者不為舊在廟者至于羣廟之祭則必待三年䘮畢二十八月而後行之也疏以此祭為祭羣廟非蕙田案以上記大祥小祥禫祭吉祭右儀禮士虞禮附方氏苞儀禮喪服或問䘮服不及髙祖何也與曽祖同也何以知其同無可殺也何以知其非無服也未有旁服以是屬而反遺於正體者也服之有差所以責其誠以義則髙曽等重而恩亦未見其有差也後世易曾祖為五月髙祖三月而例以小功緦麻之月數未達於先王稱情以立文之義也父在為母齊衰期何也所以達父之情而便其事也期之外父居復寝樂作矣而子纍然哭泣於其旁是使父不自克也若父之䘮則母與子同戚憂故不慮其相感動也古者大夫有出疆之政則祭必攝期之外祭當攝而廢焉是使父不得伸敬於祖父也然則父殁為母三年何以不慮祭之廢子以哀而不得伸敬於祖父情也以子之哀而使父不得伸敬於祖父是傷父之志也然則後世加以三年易以斬衰而衆安焉何也古之為䘮也責其實後世之為䘮也侈其文古者服有厭降而居處飲食一如其常期是文雖屈而不害其實之伸也若實之亡而徒以三年為隆是相率而為偽也父母何别焉又况斬齊苴削象於外以為文者乎父殁為母齊衰三年何也不貳斬者原母之情而不敢並於父也加以再期原子之情而著其本不異於父也杖之削也絰之右本也取諸天地隂陽以為象焉耳非謂恩義之有重輕也記曰三年之䘮如斬期之䘮如剡不曰斬衰之䘮如斬齊衰之䘮如剡也然則父在為母期所以達父之情而非子之情有所殺便父之事而於子之事無所變也決矣慈母如母何也婦人同室志常不相得能使視他人之子如已子乎因其無子無母者而命之然後身以有所託而安情以無所分而篤又申之以母服盖重其義以生恩也又縁其恩以起義也婦為舅姑齊衰期何也稱情以立文其情適至是而止也婦之痛其舅姑信及子之半可以稱婦順矣其義之重比於孫之䘮其祖不可謂非隆矣虞杖不入於室祔杖不升於堂謂可以舍杖而仍焉是作偽於其親也婦為舅姑後世易以斬衰三年将責以誠乎抑任其偽乎此以知禮非聖人不能作也妾為君之黨服得與女君同妾為女君君之長子三年何也婦人之性惟猜妒為難化也故以禮明彰其義而潛移易焉一人有子三人緩帶所以同其喜服為女君君之長子三年所以同其憂如此則女教明家和理而下型於兄弟矣婦為舅姑期其情適至是而止妾為女君君之長子三年将責以誠乎責以誠也舅姑以考終常也長子死家之大變也先祖之正體摧君及女君痛如斬而不與同其憂非事人之道也其曰女君君之長子何也無適雖庶長不敢殺也繼母嫁從為之服期何也此以權制使背死而棄孤者無所逃其罪也夫無大功之親相養以生守死義也而孤則無與立矣嫁而以從於死者猶有説焉故母子之恩不可絶也古者同財相養何以不及小功之兄弟聖人不以衆人之所難者望人盖專其責於所親也因母嫁而從者無文何也其服同也何以知其同無可加也繼父同居者服期何也所以存孤而使人不獨子其子也􅜈之䘮其故雄者常䕶其子而卒莫能容非其族也能卵而翼之有父道焉故正其名重報以教民厚也不同居而齊衰三月者猶仍其父之名亦此義焉爾古者大宗收族而禮文復具此何也人事或有所窮也如單微轉徙之類為妻齊衰期何也古之為夫婦者嚴於始而厚於終故三月而後反馬微不當於舅姑而遂出焉其能成婦順則父母得其養兄弟姑姊妹得其親三黨得其和子姓得其式夫苟亡常以死責之其擔負至死而後弛故於其䘮服以期而非過也然則一同於母乎妻則期之外寝可復樂可作矣母則居處飲食猶三年也漢戴徳䘮服變除天子諸侯庶昆弟大夫庶子為其母哭泣飲食居處思慕猶三年也何以知其然也諸侯絶期而公族有死罪素服居外不舉不聽樂如其倫之喪况所生之痛如斬者乎大夫之適子何以不降其妻也舅姑為之大功則去期近矣祭之宜攝而廢也僅矣出妻之子為母與父在為母同何也父之匹敵身之所自出也雖去父之室服不可降於期然自是而終矣其無别于父之存殁何也為父後者無服則祭可攝矣義既絶於父雖達子之哀而不慮其相感動也其為外祖父母無服何也從服也母出則無所從矣轉而服繼母之黨矣别記曰妾從女君而出則不為女君之子服用此見婦而不婦不惟自絶於舅姑且絶其子於已之父母不惟自逺其子且絶其子於娣姪雖終於父母之室而終身怍焉所以重懲婦行之放佚而使不敢犯也大夫之庶子公之昆弟何以降也為為尸也卿大夫将為尸于公未受宿有齊衰内喪則廢是以降而大功也古者尸必以孫無親者然後以其屬傳曰公子厭于先君之餘尊信乎非也公妾大夫之妾為其子與父母皆不降則服之降非以尊厭審矣妾得伸以不與於祭焉爾大夫之庶子為適昆弟不降父之所不降則祭與尸皆無事焉爾父在為母期而世母叔母亦期母為衆子期而夫之昆弟之子亦期何也恩之所難屬也故重其義以維之幼失父母舍是無依也嫠而獨舍是無歸也故非其母也而母之所以責母之義也非其子也而子之所以責子之義也記曰叔母世母疏衰踊不絶地又曰叔母世母故主宗子食肉飲酒故知責以義為多古之詳於殤服何也先王之制喪禮一以哀死一以衛生也悲哀志懑氣盛故袒而踊之所以動體安心下氣也水漿糜粥量而後納恐其有所滯壅也哭泣奠告所以致其思慕也盖必備其禮達其情而後哀可節焉人之愛其子也於所親為甚服可除其情不可抑而絶也故子婦之愚惷者乃過時哭泣以傷長老其敬順者或攝隘以傷其生用此知古之道所以達人情之實而不可易也適孫為祖父母三年而報以期何也三年者代其父也原父之心致痛於尊者之惸獨無終極也故累而相承雖髙曽無殺焉適子之服既三年矣原子之心見父母之致哀於卑者惟恐其或過也故適孫以期斷此先王所以達人情權禮義而不可損益也曰適孫而不曰祖為適孫故知祖母同夫承髙曽之重則妻何服凡祭必夫婦親之父卒為祖父後者斬則妻從服如舅姑可知也髙曽視此矣然則母在宜何服原祖之情不忍以孫之亡而逺其婦縁婦之義不敢以夫之亡而逺其祖則服如舅姑可也然則婦姑同服可乎義之重均則髙曽之服同齊衰三月恩之輕均則從祖父母諸父昆弟同小功安在婦姑不可以同服也為人後者為所後者之祖父母妻妻之父母昆弟昆弟之子若子父舉正統而母黨則詳焉何也正統有重服嫌或同於庶子母黨有徒從嫌或同於前母之子故著之也母之黨然則父之黨無降殺可知矣為人後者為其父母昆弟姊妹適人者之外服不見經何也以親兄弟之子而相後則三者之外服皆同也以是知古之立後親者盡然後取於疏所以則天經而定民志也庶子之子為父之母服不見經何也大夫之庶子父在為母大功父殁遂則其子從服而每降焉可知也不嫌於以之配祖而卑其祖與庶子父殁為母三年不嫌於以之配父而卑其父也先王制禮恩與義並行而不相悖别記曰有從輕而重公子之妻為其皇姑則君夫人在既以正其姑之名而服以婦之服矣庶子得服母之黨庶子之子乃不得從父而服父之母乎然則妾母不世祭穀梁傳於子祭於孫止何也彼據適子而言之也庶子不祭禰故縁父之恩與兄弟之義而使其母得祔食焉易世以後則庶子之子自立禰廟以饗其親而上及於祖妣矣是以於適孫則止也周祀姜嫄盖斯禮之下達舊矣女子適人而無主者不為父母斬何也父母之於女服可加者仁之通女之於父母服不可加者義之限也服過於期則疑於去夫之室矣然則姪與兄弟之期何以報也期其本服也小功皆在他邦加一等况適人而無主後者於其兄弟乎故加期以報而無所嫌焉耳適孫婦服不見經何也文脱也庶孫婦緦則小功可知矣或曰適婦在則孫婦不得為適非禮意也凡祭必夫婦親之孫為祖後其婦從焉適婦嫠不得主祭凖以有適子無適孫之義則失之矣諸侯之大夫以時接見乎天子則為天子服世子誓於天子而不為天子服何也古者繼世以象賢故君薨子承嗣三年之喪畢類見於天子天子錫之命而後其位定未類見視天子之元士以君其國今父在承嗣與定位不可知故其服不可得而制也古者諸侯覲於天子既事肉袒請刑世子不為天子服皆所以使自戒懼而不忘其事守也然則無變乎䘮之通禮父有服宫中子不與於樂則既為之變矣國君絶期而為適子之長殤中殤大功何也痛先祖正體之摧也用此見父為長子三年通乎上下小功之親皆在他邦加一等不及知父母與兄弟居加一等何也以事之變而生其恩故不得服其常服也别記曰生不及從祖父母諸父昆弟而父税䘮已則否記文脱從辨見戴記或問情之所不屬不可作而致故并其服而去之所以責服其服者之誠也婦人為子婦小功而夫之昆弟之子婦大功何也報服也姑之於婦不可以言報夫之昆弟之子婦服不見經何也以婦服夫之世母叔母知其報也何以知其報也大夫之子於不降期唯子不報也世父叔父期則從祖宜大功而服小功何也大功之親皆屬乎祖與父者也從祖則屬於曽祖者也其恩不可强而同且服止於五而窮於緦若從祖大功則三從之緦施於六世矣朱子語類所載乃門人之問非朱子之答也母之姊妹之服乃隆於母之兄弟何也女子在父之室於姊妹為尤暱故親其姊妹之子常過於舅之親其甥故稱其情而為之服也戴記䘮禮或問在堊室之中非時見乎母不入門何也䘮禮莫嚴於御内既葬君食之則食之大夫父之友食之則食之不避粱肉祥禫而後未吉祭不得復寝盖食粱肉而凄然念所親者有之矣御内而不忘哀未之有也禮以防德非徒外之文既練居堊室悲憂則既殺矣使以見母而時接其内人哀敬之心移焉雖强居於外猶之乎作偽於其親也故見其母有時其入也有時其出也有時而母以外不得見所以示人心之危而俾自循省也期終䘮不御於内者父在為母為妻先王制禮非重妻而輕諸父兄弟也世父母叔父母兄弟姑姊妹子姓兄弟之子一斷以終䘮不御於内設本大枝繁而死䘮相繼則人道為之曠絶矣故近其期所以使中人易守也寡伯叔父兄弟者必終䘮不御於内妻一而已媵姪具於初婚内事以次攝非宗子娶不必再故其義可得而伸也何以言母妻而不言祖父母母與妻疑為父在而屈者也祖父母之伸則不以父在為疑者也婦人䘮父母既練而歸期九月者既葬而歸何也為人夫者無為哀其妻之親屬至於乆而不怠也使歸而入室焉則䘮之道息矣用此見古者士大夫必具姪娣以攝内事奉舅姑然後婦人得成禮於所親禮不下庶人此類是也妻妾之䘮食異於子姓何也子姓之哀惟恐其不及也妻妾則或慮其過一以自嫌一為其夫嫌也古者閨門有禮故妻有娠居側室夫不自見而使人日一問之妻不自言而使姆對及其終也男子不絶於婦人之手婦人不絶於男子之手所以彰羞惡之原以立人之道也公父文伯死其母戒其妾曰二三婦之辱共先祀者請無瘠色無憂容從禮而静是昭吾子也穆伯之䘮敬姜晝哭而帷殯達此義也夫為父母喪未練而出則三年既練而出則已未練而反則期既練而反則遂之既練而出服之既除者不可以再始也然反父母之室而吉服以臨祭奠間兄弟之衰麻可乎既練而反服之未除者不可以無終也然反夫之室而箭笄髽衰以侍舅姑而疑於為其夫可乎婦人持私親之服不歸夫家本義為不宜入室然亦恐疑於夫家之服舅姑意或惡之古者婦為舅姑期之外服青縑以俟夫之終䘮出與反者皆從是以終䘮而居處飲食則自致焉可也為君母後者君母卒則不為君母之黨服何也從服也君母卒則無所從矣父再娶從後母而服其黨父殁自服其母之黨父未殁不再娶則其不服君母之黨何也不可以徒從而紊於屬從也用此知古者妾有子則女君免於出先王制禮以立人道之防始婚具媵姪少者以次需所以禁男子之色過也妾有子女君免於出所以化婦人之嫉心也從服者所從亡則已屬從者所從雖殁也服徒從者四惟妾為女君之黨一同於屬從何也婦人之妒者恒視其妾如讐仇而先王制禮乃一同於天屬使幼而見焉長而思焉其哀吾子也不異於所生妾為女君之子與女君同其哀吾父母也不異於所生其哀吾親戚也不異於同生而義之重恩之深至於雖殁而無變焉非甚無良必且潛移其忍心而大怵於公義矣此禮之所以起教於㣲眇而絶惡於未萌也公子為其母練冠麻麻衣縓縁而其妻期何也子於所生服雖厭降中情不可得而奪也婦服其姑而異於嫡将有慢心焉故斷以期而正之曰皇姑間傳有從輕而重公子之妻為其皇姑所以示妾母之尊有獨伸而致其嚴也父卒然後為祖父後者服斬父沒未成服而祖又殁如之何服以斬成服以卒之先後其他如父母之喪偕父在祖殁未成服而父又殁如之何服以斬其成服不以殁之先後是何也父卒然後為祖後父之服未成則於祖無承也祖殁於父後而曽祖尚存如之何子為父斬不以祖之存殁異也則承父之重而為祖斬不以曽祖之存殁異可知矣父祖殁母在而祖母殁如之何父卒為祖斬不以母之存殁異也則祖卒而為祖母三年不以母之存没異可知矣繼祖母如因髙曾視祖妻從夫適孫之母同婦其他皆以是類焉可也祖父卒而后為祖母後者三年祖母殁未終䘮而祖父殁如之何禮如父母之䘮偕然則衰可更制乎女為父母未練而出則三年胡為不可以更制也既葬若君食之則食之大夫父之友食之則食之矣不避粱肉若有酒醴則辭父母大父母諸父至尊親而不得食之何也君大夫父之友之食不常也有服人召之食不徃大功以下既葬適人非其黨不食斬衰之䘮非有大事不之君所大夫父之友可知家人而姑息之愛行焉則䘮紀為之廢矣䘮三年不祭何也謂主孤不親即事也故曰惟祭天地社稷為越紼而行事盖宗廟之祭則宰宗人攝之商書伊尹祀于先王周官量人職凡宰祭與鬰人受斚歴宗伯職王不與祭則攝位曾子問天子崩諸侯薨祝取羣廟之主藏之祖廟卒哭成事而後主各反其廟未卒哭藏羣廟之主為不祭也主既反廟則時祭不可廢矣既殯五祀行于宫中况五廟七廟之祭而可廢至三年之乆乎五祀則祝史薦之詳見曾子問山川百祀則有司舉之主孤不親涖焉爾大夫士之禮所以異者何也尊者統逺卑者統近士大夫之祭止於曾祖亡者之祖若父也其情戚矣推生知死将見羶薌而不忍御焉雖廢祭可也諸侯之祭達於太祖豈惟家之承國體係焉天子之祭極於祖之所自出所承益逺矣其不親即事所以達孝子之情而祭不廢所以重先王先公之統也天地社稷越紼而行事則将脱衰而以嘉服乎天子者天地之宗子也以天地臨之私親可暫屈也諸侯之社稷天子之命祀也以天子臨之私親可暫屈也弁葛絰而葬與神交之道也而况天地社稷之重乎成王崩康王冕服以受顧命臨諸侯其去武王之䘮未逺也必周公之所嘗行也然則越紼而行事終事而反䘮服胡為其不可乎天地社稷可越紼而行事宗廟之祭何以必使人攝也古者父為繼祖之子斬祖為適孫齊統之上承彌重則憂之下逮彌逺故君始䘮祝取五廟七廟之主而藏於寝廟盖謂雖祭而不忍歆也既卒哭主各反其廟則時祭不可廢然縁祖考之心近者服猶未終逺者憂猶未弭不忍見䘮容之纍纍而易其服故使宰宗人攝焉所以達嗣子之哀而又以申其敬也君子不奪人之親而有君䘮服於身雖父母之䘮不敢私服何也使父母生而存固将斬齊而苴絰焉服有變除縁死者之心不敢以已之服而變除君之服也縁生者之義不敢以君之服而同於私服之有包有特也君之䘮服除而後殷祭亦此義焉耳曰殷祭包二祥也有君䘮服而可私舉虞祔何也葬有定期虞祔必連舉且以私服計之卒哭後有受而無變祥則變而即吉矣故不敢緦不祭何也以同宫為斷也為父後者為出母無服於母之恩尚以承祭絶之設大夫之子為士士之所以異者緦不祭乃以四世兄弟之服而廢皇考王考之祭不亦舛乎曾子問曰大夫之祭鼎俎既陳籩豆既設不得成禮廢者幾孔子曰天子崩后之䘮君薨夫人之䘮君之太廟火日食三年之䘮齊衰大功皆廢外䘮自齊衰以下行也諸侯之大夫為夫人期為天子七月祭皆廢然則外䘮齊衰為世父母叔父母兄弟不同宫者可知也以同宮為斷則祭之廢者寡矣吉凶異道不得相干故同宫雖臣妾葬而後祭况親屬乎大功者主人之䘮有三年者則必為之再祭朋友虞祔而已無三年者何以不為之練祥也無後者從祖祔食他日之主祭者即夫人也大功而主䘮必同祖之適長大功之服不及練祥則以時而祔食於祖可矣民不祀非族朋友何以得虞祔也天子諸侯祭因國之在其地而無主後者學者祭先聖先師皆以義屬耳而况兼以朋友之恩乎亡者無族既為之葬則迎精而反不可無以安之也魂魄無依不可不為之祔也然則何以不並主其練祥也朋友虞祔而退衆賔皆在焉故主其事而不為嫌練祥之祭嫠也自致其哀而以朋友參焉則凟矣然則妻可練祥而不得虞祔何也虞有禮於賔祔以告其祖而以婦人專之則凟矣姑姊妹其夫死而夫黨無兄弟使夫之族人主䘮妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之婦人出而不反然後私親主其䘮匪是而主之是儕嫠者於出婦也朋友死無所歸孔子曰於我殯奉使而死於異國從行者非無親屬觀祭筮尸可見而君大夫之弔介主之義各有所當也前後家東西家而曰無有者求其夫之朋友而不得也古者男女始生必書於閭史二十五家之長在鄉為閭胥遂為里宰里尹即宰也二十五家豈能别置史非里胥自為之則取於比長之知書者朋友之道窮然後里尹可屬焉周官黨正掌五族之䘮紀無子而服加以期恩以窮而益篤也不敢主其䘮義以變而益嚴也禮粗則偏是以非聖人不能制爾居君之母與妻之䘮居處飲食衎爾何也義不得致其哀也未亡人考終以從先君於地下是國之福夫人之幸也古者禮莫嚴於男女故嫂叔不通問姑姊妹女子子已嫁而反兄弟不與同席而坐同器而食小君之䘮而羣下致其哀君子以為傎矣視君之母與君之妻比之兄弟何謂也凡小功者謂之兄弟孔子曰居君之母與妻之䘮居處飲食衎爾兄弟之期其痛如剡胡可比也小功比葬食肉飲酒此曰𤼵諸顔色者亦不飲食國體存焉爾叔嫂之無服何也先王制禮使人知自别於禽獸故常以禽獸之道閑之叔嫂不通問姑姊妹女子子已嫁而反兄弟不與同席而坐同器而食大為之防而亂之生比由於此此以知聖人憂世之深也諸侯有父母之䘮而天子崩則如之何記曰君薨未殯臣有父母之䘮歸殯反於君所親未殯則子之情不可奪也親既殯則臣之義不可違也春秋傳曰周人有䘮魯人有䘮周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也未殯雖有天子之命猶不敢則既殯而徃可知矣夫人弔於大夫士何也君之懿親也服可除䘮紀不可得而廢五廟之孫祖廟未毁雖為庶人死必赴練祥則告况大夫士乎然則君與夫人之弔禮何以止於大夫士自庶人以下尊卑之體懸其力不足以周其事親與之為禮則受者以為難故聞其䘮為之變正其賵賻承含而弔弗親焉爾大夫之適子為君夫人大子如士服何義也古者孤卿大夫元士之適子並入於成均舍不帥教而屏之逺方鮮不為士者故雖未仕而掌於諸子董以師氏令於宫伯國之休戚壹與有位者同之諸子職國有大事帥國子而致于大子惟所用之若有甲兵之事以軍法治之㑹同賔客作以從王宫伯掌王宫之士庶子凡在版者有大事作宫衆則令之而况君夫人大子之大故乎然則士之子何以異也古之服䘮者必舍於公宫邑宰之士猶既練而歸孤卿大夫有室老私有司以承家事故其子可持服於公宫若士之子亦如之則室家之計天屬族婣疾病死䘮嘉好之事孰代承之此先王制禮所以稱物縁情而盡人之性也非元士之適子不入於成均非貴㳺子弟不學於虎門皆勢有不行然則與國民奚别焉父有服宫中子不與于樂則與國同憂之日逺矣生不及祖父母諸父昆弟而父税喪已則否何謂也文脱而傳者承其誤也降而在緦小功者猶税之而况正體至親之期乎從祖父母及所出之諸父昆弟於父為期為大功而已皆小功也小功不税謂此焉爾師之服不見於禮經何也古者自閭以達於國皆有師以課術業稽勤惰曰師曰弟子者乃有司之事守爾其時有乆近業有大小教有精粗誼有踈宻故其服不可得而制雖曰人生在三事之如一然道之足以稱此者鮮矣孔子之䘮門人疑所服盖前此未之聞也記曰服勤至死心䘮三年盖以孔氏之門人若䘮父而無服耳周官調人之職曰師長之讐視兄弟或嚴如父或儕於長而比之兄弟以義為衡可以自擇矣大夫士既葬公政入于家而庶人三年不從政何也非獨遂其哀心亦寛其財力俾得自營以更䘮之所費耳禫而從御吉祭而復寝何謂也䘮祭言寝者三既練舍外寝謂堊室也又期而大祥居復寝平日之外寝齊與小䘮之所次也惟吉祭而復寝乃燕私之寝耳廬堊室之中不與人坐焉大祥復外寝則婦人可從而與執事矣而未吉祭不忍復其燕私之居孟獻子禫比御而不入未吉祭故也寝則未復而使婦人與執事何也哀心必以乆而平常道必以漸而復先王知孝子之情不可使脱衰而御内而邪惡之民欲動情勝而不能自止也故權其節㑹制以文理而使自循省焉始食肉者先食乾肉始飲酒者先飲醴酒亦此義焉爾鄭氏謂從御御婦人杜預謂從政而御職事皆非也大祥居外寝齊䘮所次無御婦人之道既卒哭諸侯服王事大夫服國事既練諸侯謀國政大夫謀家事豈待既禫始從政御職事哉婦人不居廬不寝苫何義也深宫固門以自藏復幬重衾以自蔽雖至痛而不廬不苫所以示守身之嚴而不可苟也然必有次焉班序羣居而不敢適私室大記曰夫人世婦在其次則杖即位則使人執之曾子問曰壻親迎女在塗而有齊衰大功之䘮則如之何孔子曰男不入改服於外次女入改服於内次男女各有次限之以内外偕作並息雖有不肖者無由接於淫非此禮之所以閉其塗而禁於未𤼵也其不及小功以下何也恩則輕服則衆盡為之變則勢有所不行矣哀至則哭志懑則踊者人之情也哭踊有節則将抑而止焉将作而致焉若是乎禮之不即人心也荀子曰将由夫愚陋邪淫之人與則彼朝死而夕忘之然而縱之則是曾鳥獸之不若也彼安能相與羣居而無亂乎将由夫修飾之君子與則三年之䘮二十五月而畢若駟之過隙然而遂之則是無窮也用此推之哭踊必有節然後痛甚者依於禮而不敢遂不肖者勉要其節而中情不應其心必有動焉所以振其昏蒙而納之於人道也禮有㣲情者有以故興物者於此焉具之矣愴恍惚愾其節不能以自辨故商祝後主人而相焉廬不於殯宫何也近則習習則哀心不可繼而㣲常則安安則敬心不可攝而散且親方存子之起居飲食必異所懼其䙝也况在殯乎故無事不辟廟門朝夕褰帷而哭所以致哀而遂敬也廬於中門之外哭無時所以便事而達情也始䘮自君至於士哭以人代無停聲何義也所以使衆著於親上死長之義而不敢恝也所以使主人哀情時觸而不敢忘也禮有以故興物者此其凡也期九月之䘮皆三月不御於内大功之正服何以上比於期也此禮之所謂推而進也從父兄弟視同生有間矣而吾父視之猶子也泝之大父母則與吾一身也故縁祖若父之心而不忍遂離異焉兄弟之子婦踈矣而子猶吾子也故因服之有報而䘮之如適婦重其義以明恩所以厚人倫而正家則也居䘮之禮小功緦麻無别焉何也服不容無差而哀不能更有差也其復寝之制無聞何也以期大功之三月推之則終月而復焉為已促矣義之輕莫若姑姊妹之子然吾姑姊妹方心絶而志摧苟有人心者能宴然即安於私寝乎恩之淺莫若妻之父母然人喪其親我不能旬月為之變而狎於婢妾古者婦人䘮父母既練而歸尚望其誠孝於吾親而安其屬乎是謂察於人倫事淺而義博矣齊衰期者大功布衰九月者皆三月不御於内女入門遭䘮而未婚者何以必俟䘮之除也曾子問曰壻親迎女未至而有齊衰大功之䘮則如之何孔子曰男不入改服于外次女入改服于内次然後即位而哭曾子問曰除䘮不復婚禮乎孔子曰祭過時不祭禮也又何反於初御内之期斷以三月所以該事之變而計其所窮也始婚則一而不再吉凶異道不得相干小功既卒哭可以冠娶妻而下殤之小功不可則每上者可知矣除喪不復婚禮何也舅姑則既見矣盥饋則既親矣奠祭既與廟見之期既踰是以過時而不可復也親喪外除中月而禫則其曰三年之喪二十五月而畢何也祥而縞是月禫徙月樂祥以二十五月之始禫以是月之終是謂中月而禫是謂二十五月而畢爾凡為位非親喪齊衰以下皆哭盡哀而東免絰即位袒成踊襲拜賔反位成踊送賔反位相者告就次三日五哭卒主人出送賔衆主人兄弟皆出門哭止相者告事畢成服拜賔若所為位家逺則成服而後徃此聞諸父兄弟死於異國之禮也主人者或以親或以長而應主其人之喪者也告就次者聞喪不入内雖一夕必有次也若所為位家逺則成服而後徃近則不忍待也首言非親喪者若親喪在外則無逺近聞而奔不暇為位以哭也舊説此以私事出未奔者果爾則在他國不應有衆主人兄弟故復遷就其説謂既奔喪至家則䘮家之主人為之拜賔送賔衆主人亦謂在䘮家者文義情事俱不可通記曰相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退又曰知死而不知生傷而不弔何也一以語其常一以語其變也或相知於異國或同事於異時其子未之或知而徃弔則嫌於以父之行自居而使主人心愕焉故傷之而遂已焉爾所識其兄弟不同居者皆弔何謂也死者所識之兄弟也弔者弔其所識也伯髙死於衛孔子使子貢為之主而曰為爾哭也來者拜之朋友得為主而受弔則兄弟可知矣弔所以哀生也知死而不知生傷而不弔子且不弔况其兄弟不同居者乎大夫哭諸侯不敢拜賔何謂也君薨於異國子出迎諸臣在國者朝夕哭臨於朝國賔有入唁者則哭以答之而不敢拜也曾子問君出疆而薨其入也子皆從柩故知聞訃必出迎也知在國卿大夫哭臨者君雖未知䘮臣先服則哭臨不待子之歸明聘禮使者在他國君薨赴未至則哭於巷衰於館赴者至則衰而出諸臣在他國無受弔之禮而曰不敢拜賔者主國君臣及他國同時而為聘使者必相唁也與諸侯為兄弟為位而哭不曰不敢拜賔何也在禮非為後者不敢拜賔子姓且然况兄弟乎諸臣在他國及君之喪未至子未反而賔臨焉疑可以拜故著之也天子諸侯之喪斬衰者奠皆異姓也同姓不與焉衆主人是也大夫齊衰者奠其臣斬衰者不足然後取焉下文天子諸侯之䘮奠不斬衰者不與大夫齊衰者與故知其臣斬衰者不足然後取焉士則朋友奠不足取於兄弟大功以下者不使親者執事以間其哀上下所同也士取於疏者而大夫則取於親者何也執事者皆斬衰而以輕服間焉不稱也取於兄弟大功以下者明父之行不與也絶族無移服故出妻之子於外祖父母無服况異父之兄弟乎公叔术狄儀之問㳺夏二子之答記者之失其傳爾樂正子春之母死五日不食而自悔其不情何也不及乎禮不可不自强也過禮而强之則本心為之變易矣曾子執親之喪水漿不入於口者七日而不聞有悔者順其自然而無容心焉耳有殯聞逺兄弟之喪雖緦必徃非兄弟雖鄰不徃子張死曾子有母之喪齊衰而徃哭之何也孔子之喪門人祥禫而後歸徳之成義足以並所生道之合可以當同氣故曰禮雖先王未之有可以義起也古者過期而不葬則主喪者服不除故葬必服其初服也後世葬無期釋服而從吉乆矣而葬乃返其初服非即逺而輕之義也周官之法不樹者無槨不績者不衰所以使内痛於心而外怍於人也免䘮而後葬者著之令無改於常服有故焉使得從改葬之服可也重䘮未除而遭輕喪其服之有兼也兼其輕者不兼其重者盖輕者可包而重者不可二也斬衰之喪既虞卒哭遭齊衰之䘮輕者包重者特易其輕者不易其重者可易者以其痛之新不易者以其義之重也如前喪既虞卒哭受麻以葛以後喪之麻帶易前喪之葛帶而首仍前喪之葛絰麻有可以變葛者其恩本重也大功以上之麻有不可以變葛者其恩本輕也小功以下之麻麻以易葛而麻終仍反前喪之葛期大功卒哭以後則絰期大功之絰仍反練之故葛帶皆所以衡時義而達人情之實也卒哭曰成事是日也以吉祭易喪祭何謂也三虞卒哭祝辭曰哀薦成事明日而祔虞之後不聞更有卒哭之祭也以吉祭易喪祭謂以末虞之吉祭易初虞再虞之喪祭爾鄭氏據雜記上大夫虞以少牢卒哭成事祔皆太牢謂三虞後更有卒哭之祭非也禮於虞祔多連舉以卒哭為虞之一舉虞可包卒哭也間有虞卒哭並舉者亦不害末虞為卒哭也即以雜記之文言之安見非以末虞為卒哭而易牲以祭如士遣奠之以少牢哉如三年之喪則既顈其練祥皆行何謂也前後喪皆三年然後祭可補也餘喪有主者則彼自及時而行練祥即此人為主既顈後亦不得追舉知然者上言除服兼諸父昆弟而此獨舉三年之喪以别之也祭與除服事聨而義不相蒙小記曰期而祭禮也期而除喪道也祭不為除喪也故合行者其常也遭變則廢舉各以義起有君喪服則私服不得除而練祥可追舉君之喪服除而後殷祭是也詳見曾子問並私服則服皆得除而祭惟重喪可追舉此記是也祥主人之除也於夕為期朝服祥因其故服是祭之前夕已除前服故知除服與祭各為一事也注既顈虞後山隂陸氏以為禫後皆未安禫則後喪大祥俱畢然後補前喪練祭則過緩虞後則後喪甫三月餘而飲福衣朝服可乎禮文殘缺未知以顈代葛何據然以義揆之當為練後盖既練則後喪大祥亦近矣雖暫服前喪大祥之服無害也大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以娶婦已雖小功既卒哭可以冠取妻下殤之小功則不可此就父言父就子言子也大功小功之服有無輕重父與子不可得而同父可冠子取婦而子不可冠取妻不得冠取也已可冠取妻而父不可冠子取婦不得冠取也以喪冠者雖三年之喪可也而小功乃以卒哭為期何也用此知喪冠之禮不及於小功也大功以上其情戚而為期逺故因喪服而冠小功緦麻則俟焉而用吉可知矣人情之實也與曾子問不合此所傳或異代之禮妻視叔父母姑姊妹視兄弟長中下殤視成人姑姊妹之服輕於兄弟殤服降于成人而哀情則一也世叔父母之哀情有間矣而况妻乎謂宜一視者為厚於妻子而薄於世叔父母者言之爾大夫士父母之喪既練而歸朔日忌日則歸哭於宗室君之喪邑宰之士既練而歸朝廷之士與大夫同次公館以終喪况子之於父母而可以適庶别乎女子已嫁喪父母既練而歸子於父母而同於女子之已嫁乎既練居堊室非時見乎母不入門况反其私室與大夫士将與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出宫門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而後哭祭必齋齊者齊不齊以致其齊者也父母死使次於異宫而禁其哭踊哀痛中廹尚能齊一以交於神明乎周官凡禮事大宗伯掌之小宗伯佐之肆師又佐之所以代匱而備䘮疾也况百執事所共無常而不可攝乎下以拂人之情而上以凟神之祀先王之典禮必無是也士大夫不得祔於諸侯祔於諸祖父之為士大夫者祔廟者告新主之将入也祔而各立廟於其家則安用告若奉主以入諸祖父之廟是無故而祧人之祖也其孫之當祔者又将安祔乎公子祔於公子公子有宗道以收族爾羣公子死其子各立廟而祭之以為小宗謂宜祔於祖之兄弟妄也五禮通考卷二百六十二
