body:
  text: 五禮通考自序蕙田性拙鈍少讀書不敢為詞章淹博之學孰師授之經循行數墨恐恐然若失也嵗甲辰年甫逾冠偕同邑蔡學正宸錫吳主事大年學士尊彛兄弟為讀經之會相與謂三禮自秦漢諸儒抱殘守闕注疏雜入讖緯轇輵紛紜宋史載子朱子當日嘗欲取儀禮周官二戴記為本編次朝廷公卿大夫士民之禮盡取漢唐以下諸儒之説考訂辨正以為當代之典今觀所著經傳通解繼以黃勉齋楊信齋兩先生修述究未足為完書是以三禮疑義至今猶蔀乃於禮經之文如郊祀明堂宗廟禘嘗饗宴朝會冠昏賓祭宫室衣服器用等先之以經文之互見錯出足相印證者繼之以注疏諸儒之抵牾訾議者又益以唐宋以來専門名家之考論發明者每一事一義輒集百氏之説而諦審之審之久思之深往往如入山得徑榛蕪豁然又如掘井逢源溢然自出然猶未敢自信也半月一會問者難者辨者答者回旋反覆務期愜諸已信諸人而後乃筆之箋釋存之考辨如是者十有餘年而裒然漸有成帙矣丙辰通籍供奉內廷見聞所及時加釐正乙丑簡佐秩宗奉命校閲禮書時方纂修會典天子以聖人之德制作禮樂百度聿新蕙田職業攸司源流沿革不敢不益深考究丁卯戊辰治喪在籍杜門讀禮見崑山徐健菴先生通考規模義例具得朱子本意惟吉嘉賓軍四禮尚屬闕如惜宸錫大年相繼徂謝乃與學士吳君尊彝陳舊篋置抄胥發凡起例一依徐氏之本並取向所考定者分類排輯補所未及服闋後再任容臺遍覽典章日以增廣適同學桐山宜田領軍見而好之且許同訂宜田受其世父望溪先生家學夙精三禮郵籖往來多所啓發并促早為卒業施之剞氏以諗同志德水盧君抱孫元和宋君慤庭從而和之戊寅移長司寇兼攝司空事繁少暇嘉定錢宫允曉徵實襄參校之役辛巳冬爰始竣事凡為門類七十有五為卷二百六十有二自甲辰至是閲寒暑三十有八而年亦已六十矣顧以蕙田之謭陋遭遇聖明復理舊業以期無瘝厥職而已至于朱子之規模遺意未知果有合焉否也是為序金匱秦蕙田
