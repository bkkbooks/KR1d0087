body:
  text: 五禮通考卷一百九十二刑部尚書秦蕙田撰嘉禮六十五觀象授時春秋莊公七年夏四月辛卯夜恒星不見注恒常也謂常見之星辛卯四月五日月光尚㣲盖時無雲日光不以昏没夜疏夜者自昏至旦之總名但此經下言夜中則此言者夜未至中謂初昏之後耳非竟夜不見星也穀梁夜作昔傳曰日入至於星出謂之昔不見者可以見也必如彼言星出以前名之曰昔則名昔之時法當未有星矣何以怪其不見而書為異也明經所言夜者夜昏之後星應見之時而不見耳夜中星隕如雨注如而也夜半乃有雲星落而且雨其數多皆記異也日光不匿恒星不見而云夜中者以水漏知之左氏傳夏恒星不見夜明也星隕如雨與雨偕也注偕俱也公羊傳恒星者何列星也注恒常也常以時列見列星不見何以知夜之中星反也注反者星復其位鄉疏謂星反附在半夜之後則知者不見之時是夜中矣如雨者何非雨也非雨則曷為謂之如雨不脩春秋曰雨星不及地尺而復君子脩之曰星霣如雨注明其狀似雨爾何以書記異也注列星者天之常宿分守度諸侯之象周之四月夏之二月昏參伐狼注之宿當見參伐主斬艾立義狼注主持衡平也皆滅者法度廢絶威信陵遲之象星霣未墜而夜中星反者房心見其虚危斗房心天子明堂布政之宮也虚危齊分其後齊桓行霸穀梁傳恒星者經星也注經常也謂常列宿日入至於星出謂之昔不見者可以見也夜中星隕如雨注如而也星既隕而復雨其隕也如雨是夜中與春秋著以傳著疑以傳疑中之幾也而曰夜中著焉爾何用見其中也失變而録其時則夜中矣注失星變之始而録其已隕之時檢録漏刻以知夜中其不曰恒星之隕何也我知恒星之不見而不知其隕也我見其隕而接於地者則是雨說也著于上見于下謂之雨著于下不見于上謂之隕豈雨說哉注解經不得言雨星而言隕星也蕙田案恒星不見之說當以左氏為長盖列宿有名之星無隕墜之理隕而旋復益復誕妄惟夜中以前日光已没星當見而不見故以為異而記之其云夜中星隕者自謂無名之星或有隕墜者不當以恒星之不見為全隕也詩召南小星嘒彼小星三五在東傳嘒㣲貌小星衆無名者三心五噣四時更見御箋衆無名之星隨心噣在天猶衆妾隨夫人以次進于君也心在東方三月時也噣在東方正月時也如是終嵗列宿更見傳疏列宿之大房心參伐心三星故知三為心也綢繆曰三星參也者以其刺昏姻不得其時舉正時以刺之冬日之昏在天在户唯參為然故知非心也箋則三皆為心以其心實三星而列宿之尊故元命苞曰心為天王公羊又云心為大辰故言三星此及綢繆苕之華皆云心也元命苞云柳五星釋天云咮謂之柳天文志云柳謂鳥喙則喙者柳星也以其為鳥星之口故謂之喙心東方之宿栁南方之宿著明者嘒彼小星維參與昴傳參伐也昴留也在箋此言衆無名之星亦隨伐留天疏天文志云參白虎宿三星直下有三星鋭曰伐其外四星左右肩股也則參實三星故綢繆傳曰三星參也以伐與參連體參為列宿統名之若同一宿然但伐亦為大星與參互見皆得相統故周禮熊旂六旒以象伐明伐得統參也是以演孔圖曰參以斬伐公羊傳曰伐為大長皆互舉相見之文故言參伐也見同體之義元命苞云昴六星昴之為言留言物成就繋留是也唐風綢繆綢繆束薪三星在天傳三星參也在天謂始見東方也三星在天可以嫁娶矣月箋三星謂心星也心有尊卑夫婦父子之象又為二之合宿故嫁娶者以為候焉昏而火星不見嫁娶之時也今我束薪于野乃見其在天則三月之末四月之中見於東方矣故云不符其時疏參有三星漢書天文志云參白虎宿三星是也毛以秋冬為昏時故云三星在天可以嫁娶王肅云謂十月也孝經援神契云心三星中獨明是心亦三星也天文志云心為明堂大星天王前後星子屬然則心之三星大者尊小者卑大者象夫父小者象子婦也二月日體在戌而斗柄建卯初昏之時心星在於卯上二月之昏合於本位故稱合宿昏而火星不見謂仲春之月嫁娶之正時也綢繆束芻三星在隅傳隅東南隅也五箋心星在隅謂四月之末月之中綢繆束楚三星在户傳參星正月中直户也之箋心星在户謂五月之末六月中也小雅巷伯哆兮侈兮成是南箕傳哆大貌南箕箕星也箋箕星哆然踵狹而舌廣不疏箕四星二為踵二為舌若使踵本太狹舌雖小寛足以為箕由踵之二星已哆然而大舌又益大所以成為箕也大東維天有漢監亦有光傳漢天河也有光而無所明跂彼織女終日七襄注跂隅貌襄反也移箋襄駕也駕謂更其肆也從旦至莫七辰一因謂之七襄疏河圖括地象云河精上為天漢楊泉物理論云星者元氣之英也漢水之精也氣𤼵而著精華浮上宛轉隨流名曰天河一曰雲漢大雅倬彼雲漢是也孫毓云織女三星跂然如隅然則三星鼎足而成三角望之跂然故云隅貌襄反者謂從旦至暮七辰而復反于夜也天有十二次日月所止舎也在天為次在地為辰毎辰為肆畫夜雖各六辰數者舉其終始故七即自卯至酉也言終日是晝也晝不見而言七移者據其理當然矣雖則七襄不成報章傳不能反報成章也東箋織女有織名爾駕則有西無不如人織相報反成文章也睆彼牽牛不以服箱傳睆明星貌河鼔謂之牽牛服牝服也箱大車之箱也牽箋以用也牽牛不可用于牝服之箱十疏河鼓謂之牛釋天文也李巡曰河鼓牽牛皆二八宿名也孫炎曰河鼓之旗十二星在牽牛之北也或名為河鼓亦名為牽牛如爾雅之文則牽牛河鼓一星也如李巡孫炎之意則二星今不知其同異也有捄天畢載施之行傳捄畢貌畢所以掩兎也何嘗見其可用乎箋祭器有畢者所以助載鼎實今天畢則施于行列而已禁疏捄長貌此亦言畢之長也鴛鴦曰畢之羅之月令羅網畢翳毋出九門是田器有畢也特牲饋食禮曰宗人執畢是祭器有畢也彼注云畢狀如叉葢為其似畢星取名焉掩兎祭器之畢俱象畢星為之孫毓云祭器之畢狀如畢星名象所出也畢弋之畢又取名焉而因施網于其上雖可兩通箋義為長維南有箕不可以簸揚維北有斗不可以挹酒漿傳挹㪺也維南有箕載翕其舌維北有斗西柄之揭傳翕合也也箋翕猶引引舌者謂上星相近壁疏二十八宿連四方為名者唯箕斗井壁四星而已者室之外院箕在南則壁在室東故稱東壁鄭稱參傍有玉井則井星在參東故稱東井推此則箕斗並在南方之時箕在南而斗在北故言南箕北斗也以箕斗是人之用器故令相對為名漸漸之石月離于畢俾滂沱矣傳畢濁也月離隂星則雨疏以畢為月所離而雨是隂雨之星故謂之隂星洪範曰星有好風星有好雨者即此畢是也春秋緯云月離于箕風揚沙則好風者箕也苕之華三星在罶傳三星在罶言不可久也魚箋喻周將亡如心星之光耀見于笱之中其去須臾也大雅棫樸倬彼雲漢為章于天傳倬大也雲漢天河也雲漢倬彼雲漢昭囘于天傳囘轉也河箋雲漢謂天河也倬然天水氣也精光轉運于天春秋襄公九年左氏傳古之火正或食于心或食于咮以出内火是故咮為鶉火心為大火疏南方七星有井鬼柳星張翼軫七者共為朱鳥之宿星即七星也咮謂柳也春秋緯文耀鉤云咮謂鳥陽七星為頸宋均注云陽猶首也柳謂之咮咮鳥首也七星為朱鳥頸也咮與頸共在于午者鳥之止宿口屈在頸七星與咮體相接連故也東方七宿角亢氐房心尾箕七者共為蒼龍之宿釋天云大辰房心尾也大火謂之大辰孫炎曰龍星明者以為時候大火心也在中最明故時候主焉昭公元年左氏傳昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰注主祀辰星辰大火也商人是因故辰為商星遷實沈于大夏主參唐人是因以服事夏商及成王滅唐而封太叔焉故參為晉星昭公十七年左氏傳衛顓頊之虚也故為帝丘其星為大水注衛星營室營室水也蕙田案列宿之名見于書者曰鳥曰火曰虚曰昴見于詩者曰參曰昴曰定曰火曰南箕曰織女曰牽牛曰天畢曰北斗見于月令者曰營室曰東壁曰奎曰婁曰胃曰畢曰觜觽曰參曰東井曰弧曰柳曰七星曰翼曰軫曰角曰亢曰氐曰房曰火曰尾曰斗曰建星曰牽牛曰婺女曰虚曰危見于夏小正者曰參曰斗曰昴曰南門曰大火曰織女見于春秋内外傳者曰龍曰火曰大水曰龍尾曰咮曰辰曰參曰農祥曰天廟曰辰角曰天根曰本曰駟其有關於中星及日躔者别見前卷不重載爾雅釋天星名夀星角亢也注數起角亢列宿之長故曰夀天根氐也注角亢下繫于氐若木之有根天駟房也注龍為天馬故房四星謂之天駟大辰房心尾也注龍星明者以為時候故曰大長大火謂之大辰注大火心也在中最明故時候主焉析木謂之津箕斗之間漢津也注箕龍尾斗南斗天漢之津梁星紀斗牽牛也注牽牛斗者日月五星之所終始故謂之星紀𤣥枵虚也注虚在正北北方黒色枵之言耗耗亦虚意顓頊之虚虚也注顓頊水德位在北方北陸虚也注虚星之名凡四營室謂之定注定正也作宮室皆以營室之中為正娵觜之口營室東壁也注營室東壁星四方似口因名云降婁奎婁也注奎為溝瀆故名降大梁昴也西陸昴也注昴西方之宿别名旄頭濁謂之畢注掩兎之畢或呼為濁因星形以名咮謂之柳注咮朱鳥之名柳鶉火也注鶉鳥名火屬南方何鼓謂之牽牛注今荆楚人呼牽牛星為檐鼓檐者荷也蕙田案爾雅十二次闕實沈鶉首鶉尾實沈參也牧星參也鶉首東井輿鬼也鶉尾軫也龍角謂之靈星婺女謂之媭女尾謂之依昴謂之留軫謂之帑營室謂之大水娵訾之口謂之豕韋𤣥枵謂之天黿夀星大火析木之津東陸也星紀元枵娵訾之口北陸也降婁大梁實沈西陸也鶉首鶉火鶉尾南陸也軫至氐曰夀星氏至尾曰大火尾至南斗曰析木之津南斗至婺女曰星紀婺女至危曰𤣥枵危至東壁曰娵訾之口東壁至婁曰降婁婁至畢曰大梁畢至東井曰實沈東井至柳曰鶉首柳至張曰鶉火張至軫曰鶉尾建星星紀之維首也婺女𤣥枵之維首也虚北陸之中也爾雅所略用是補之又案史記律書二十八舍有建星無南斗有罰無觜觽有狼弧無東井輿鬼月令所紀諸星有弧建星無箕昴輿鬼張漢書天文志凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三晉書天文志馬績云天文在圖籍昭昭可知者經星常宿中外官凡一百一十八名積數七百八十三皆有州國官宮物類之象張衡云文曜麗乎天其動者有七日月五星是也日者陽精之宗月者隂精之宗五星五行之精衆星列布體生於地精成於天列居錯峙各有攸屬在野象物在朝象官在人象事其以神著有五列焉是為三十五名一居中央謂之北斗四布於方各七為二十八舍中外之官常明者百有二十四可名者三百二十為星二千五百㣲星之數葢萬有一千五百二十後武帝時太史令陳卓摠甘石巫咸三家所著星圖大凡二百八十三官一千四百六十四星以為定紀隋書天文志後漢張衡為太史令鑄渾天儀總序經星謂之靈憲其大略曰中外之官常明者百有二十可名者三百二十為星二千五百㣲星之數萬有一千五百二十衡所鑄之圗遭亂堙滅星官名數今亦不存三國時吳太史令陳卓始列甘氏石氏巫咸三家星官著於圖録并注占贊總有二百五十四官一千二百八十三星并二十八宿及輔官附坐一百八十二星總二百八十三官一千四百六十五星宋元嘉中太史令錢樂之所鑄渾天銅儀以朱墨白三色用殊三家而合陳卓之數髙祖平陳得善天官者周墳并宋氏渾儀之器乃令庾季才等參校周齊梁陳及祖暅孫僧化官私舊圗刋其大小正彼疎宻依凖三家星位以為葢圗以墳為太史令自此太史觀生始能識天官蕙田案晉隋二志述陳卓星圗總數只差一星未知孰是明史天文志崇禎初禮部尚書徐光啟督修天文上見界總星圗以為囘囘立成所載有黄道經緯度者止二百七十八星其繪圗者止十七座九十四星並無赤道經緯今皆崇禎元年所測黄赤二道經緯度畢具後又上赤道兩總星圖其説謂常現常隱之界隨北極髙下而殊圗不能限且天度近極則漸狹而見界圗從赤道以南其度反寛所繪星座不合仰觀因從赤道中剖渾天為二一以北極為心一以南極為心從心至周皆九十度合之得一百八十度者赤道緯度也周分三百六十度者赤道經度也乃依各星之經緯㸃之逺近位置形勢皆合天象至於恒星循黄道右旋惟黄道緯度無古今之異而赤道經緯則嵗嵗不同然亦有黄赤俱差甚至前後易次者如觜宿距星唐測在參前三度元測在參前五分今測已侵入參宿故舊法先觜後參今不得不先參後觜不可强也又有古多今少古有今無者如紫㣲垣中六甲六星今只有一華葢十六星今止有四傳舎九星今五天厨六星今五天牢六星今二又如天理四勢五帝内座天柱天牀大贊府大理女御内厨皆全無也天市垣之市樓六星今二太㣲垣之常陳七星今三郎位十五星今十長垣四星今二五諸侯五星全無也角宿中之庫樓十星今八亢宿中之折威七星今無氐宿中之亢池六星今四帝席三星今無尾宿中天龜五星今四斗宿中之鼈十四星今十三天籥農丈人俱無牛宿中之羅堰三星今二天田九星俱無女宿中之趙周秦代各二星今各一扶匡七星今四離珠五星今無虚宿中之司危司禄各二星今各一敗臼四星今二離瑜三星今二天壘城十三星今五危宿中之人五星今三杵三星今一臼四星今三車府七星今五天鉤九星今六天錢十星今四葢屋二星今一室宿中之羽林軍四十五星今二十六螣蛇二十二星今十五八魁九星今無壁宿中之天廏十星今三奎宿中之天溷七星今四畢宿中之天節八星今七咸池三星今無觜宿中之座旗九星今五井宿中之軍井十三星今五鬼宿中之外厨六星今五張宿中之天廟十四星今無翼宿中之東甌五星今無軫宿中之青邱七星今三其軍門土司空器府俱無也又有古無今有者策星旁有客星神宗元年新出先大今小南極諸星古所未有近年浮海之人至赤道以南徃徃見之因測其經緯度其餘増入之星甚多並詳恒星表其論雲漢起尾宿分兩派一經天江南海市樓過宗人宗星涉天津至螣蛇一由箕斗天弁河鼓左右旗涉天津至車府而會於螣蛇過造父直趨附路閣道大陵天船漸下而南行厯五車天關司怪水府傍東井入四瀆過闕邱弧矢天狗之墟抵天社海石之南踰南舡帶海山貫十字架蜜蜂傍馬腹經南門絡三角龜杵而屬於尾宿是為帶天一周以理推之隱界自應有雲漢其所見當不誣又謂雲漢為無數小星大陵鬼宿中積尸亦然考天官書言星漢皆金之散氣則星漢本同類得此可以相證又言昴宿有三十六星皆得之於窺逺鏡者凡測而入表之星共一千三百四十七㣲細無名者不與其大小分為六等内一等十六星二等六十七星三等二百零七星四等五百零三星五等三百三十八星六等二百一十六星悉具黄赤二道經緯度列表二卷續文獻通考明季西洋法入中國崇禎元年所測諸星悉具黄赤經緯度載於崇禎新書明史撮其大要入於天文志今案馬端臨象緯考云古今志天文者述天官星之名義大略皆同兩朝志亦出入晉隋二史但能言其去極若干度某宿若干度為異然亦惟赤道經緯度耳西法所測悉具黄赤經緯度至所上星圗其見界總星圗即一行葢天圗也然赤道以外衆星疎宻之狀唐書已云與仰觀小殊則從赤道分為南北二圗豈非著圗之良法歟明史云恒星有古多今少古有今無者後漢書註引張衡靈憲云三光有似珠玉神守精存麗其職而宣其明及其衰神歇精斁於是乎有隕星恒星之隱顯有無豈亦猶其説歟梅大鼎文集云西法黄道十二象與中土異而囘囘與歐邏巴復自不同至黄道内外之星或以為六十象或以為六十二象而貫索一星囘囘以為缺椀歐邏巴以為冕旒其餘星名亦多互異今所傳之圗皆因西法所列而變從中法之星座星名或以西星合古圗而有疑似不敢輒定遂並收之而有増附之星或以古星求西圗而弗得其處不能强合遂芟去之而成古有今亡之星要之皆徐李諸公譯西星而酌為之非西傳之舊此論最為明確今又有即其增附之星收入本座而與古合者矣惟大贊府古無是星步天歌云上衛少衛次上丞後門東邊大贊府葢或以垣墻丞衛諸星為贊襄之府或訛輔為府今不可考至近南極諸星與隱界雲漢理宜有之廣東諸省已有見者觀承案紫宮垣十五星東八而西七若以大贊府為星名則多一星而成十六星矣宋志載石氏説則東西兩蕃總十六星葢於西蕃七星内添一太尉星亦非所謂大贊府也可知大贊府只是虚句而非星名也梅氏文鼎揆日候星紀要大西儒測算凡可見可狀之星一千二十二若㣲小者或不常見者或朦黑者不與焉其大小分為六等人因其難以識認盡假取人物之像以别其名星非真有象也但人借名之耳毎合數星以成一像凡四十八像其多寡大小不等在黄道北者二十一像第一曰小熊内有七星外有一星二曰大熊内二十七外八三曰龍凡三十一星四曰黄帝内十一外二五曰守熊人内二十二外一六曰北冕旒凡八星七曰熊人内二十九外一八曰琵琶凡十星九曰鴈鵞内二十二外一其十曰岳母凡十三星十一曰大將内二十六外三十二曰御車凡十四星十三曰醫生又曰逐蛇一醫常取蛇合藥以救世其星如人逐蛇狀内二十四外五十四曰毒蛇凡十八星十五曰箭凡五星十六曰日鳥性喜視日内九外六十七曰魚將軍性好人間人歌樂即來聽呼其名漸來就人溺水則載之岸邊人取魚彼即領衆魚至呼之彼先躍過網衆魚則罹網矣凡十星十八曰駒凡四星十九曰飛馬凡二十星二十曰公主凡二十四星二十一曰三角形凡四星共在北者三百六十星一等三二等十八三等八十四四等一百七十四五等五十八六等十三昏者十在黄道中者十二像即十二宮一曰白羊即春分清明内十三外五二曰金牛即穀雨立夏内三十三外十一三曰雙兄即小滿芒種内十八外七四曰巨蟹即夏至小暑内九外四五曰獅子即大暑立秋内二十七外八六曰列女即處暑白露内二十六外六七曰天秤即秋分寒露内八外九八曰天蝎即霜降立冬内十一外三九曰人馬即小雪大雪凡三十一星十曰磨羯羊頭魚尾即冬至小寒凡二十八星十一曰寶瓶即大寒立春内四十二外三十二曰雙魚即雨水驚蟄内三十四外四共在中者三百四十六星一等五二等九三等六十四四等一百三十四五等一百缺六六等二十九昏者三在黄道南者十五像一曰海獸凡二十二星二曰獵户凡三十八星三曰天河凡三十四星四曰天兎凡十二星五曰大犬内十八外十一六曰小犬凡二星七曰船凡四十五星八曰水蛇内二十五外二九曰酒缾凡七星十曰烏雅凡七星十一曰半人牛凡三十七星十二曰豺狼凡十九星十三曰大臺凡七星十四曰南冕凡十三星十五曰南魚内十二外六共在南者三百十六星一等七二等十八三等六十四等一百六十八五等五十三六等九昏者一三方共一千二十二星分其大小一等共十五二等共四十五三等共二百缺八四等共四百七十四五等共一百十七六等共四十九昏者共十四新增十二像係近南極之星火鳥十水委三蛇首蛇腹蛇尾十五小斗七飛魚七南船五海山六十字架四馬尾四馬腹三蜜蜂四三角形三海石五金魚四夾臼二附臼一異雀十孔雀十波斯十一鳥喙六鶴十二共一百三十四星據西書言彼地天文家原載可見之星分為四十八象後自宏治十年丁巳有精於天文吳黙哥者行至極南見有無名多星復有西士安德肋者亦見諸星之旁尚有白氣二塊如天漢者嗣于明神宗十八年庚寅有西士胡本篤始測定南極各星經緯度數新增一十二像至四十八年庚申湯羅兩公航海過赤道南三月有竒見南極已髙三十餘度將前星一一對測經緯皆符但據云一十二像今又有二十一名何耶蕙田案南極旁諸星自古未有西人以目騐得之右恒星總論中元北極紫㣲宮北極五星在其中大帝之坐第二珠第三之星庶子居第一號曰為太子四為后宮五天樞史記天官書中宮天極星其一明者大乙常居也旁三星三公或曰子屬晉書天文志北極五星鈎陳六星皆在紫宮中北極北辰最尊者也其紐星天之樞也第一星主月太子也第二星主日帝王也亦太乙之坐謂最赤明者也第三星主五星庶子也紐隋書天文志賈逵張衡蔡邕王蕃陸績皆以北極星為樞是不動處也祖暅以儀凖候不動處在紐星之未猶一度有餘宋史天文志今清臺測去極四度半度宋兩朝天文志太子星去北極十五度入心宿三通志其第四星為后宮第五星為天樞張衡云二星並為后宮蕙田案史記所云其一明者謂第二星也云旁三星即第一第三第四附近大星者也紐星最小第五史記未言諸志以紐星當北辰祖暅已覺其誤宋中興天文志欲從紐星為第一數之初一曰帝次二曰后次三曰妃次四曰太子乃其赤明者也次五曰庶子徒附會北辰之説更改前人夫紐星既非北辰則帝星自取明大者前人立義似不可破左右四星是四輔星經四輔四星抱北極樞星通宋史天文志四輔四星在極星側去極各四度志張衡云抱極之細星也星經天一星在紫㣲宮門外右星南為天帝之神主戰鬬知吉凶宋兩朝天文志天一去極二十度半入亢宿一度半星經太一星在天一南半度亢宋兩朝天文志太一去極二十一度入宿一度左樞東一右樞西一夾南門兩面營衛一十五上宰東二少尉西二兩相對少宰東三上輔東四宋志作上弼西三次少輔東五宋志作少弼西四上衛東六西五少衛東七西六次上丞西七後門西邊大贊府門東喚作一少丞東八以次却向門前數史記天官書環之匡衛十二星藩臣皆曰紫宮北晉書天文志紫宮垣十五星其西藩七東藩八在斗北一曰紫㣲大帝之坐也天子之常居也主命主度也一曰長垣一曰天營一曰旗星為蕃衛備蕃臣也藩通志張衡云紫㣲垣十五星東藩八西藩七其東近閶闔門第一星為左樞第二星為上宰第三星為少宰第四星為上輔第五星為少輔第六星為上衛第七星為少衛第八星為少丞其西藩近閶闔門第一星為右樞第二星為少尉第三星為上輔第四星為少輔第五星為上衛第六星為少衛第七星為上丞兩藩正南開如門象名閶闔門一宋兩朝天文志左驂樞去極二十七度半入房宿度右驂樞去極二十一度入亢宿八度隂德二星隂德門裏兩黄聚星經隂德二星在尚書西不史記天官書前列直斗口三星隨北端兑若見若曰隂德或曰天一晉書天文志尚書西二星曰隂德陽德主周急振撫坐宋史天文志甘氏云隂德外坐在尚書右陽德外在隂德右太隂太陽入垣翊衛也入宋兩朝天文志隂德二星距東星去極十九度房宿二度尚書以次其位五星經五尚書在東南維主納言夙夜諮謀事也文晉書天文志門内東南維五星曰尚書宋史天志在紫㣲東藩内大理東北一云在天柱右稍前十宋兩朝天文志距西南星去極一十九度入尾宿四女史柱史各一户星經女史一星在天柱下柱史北掌記禁中傳漏動靜主時要事也晉書天文志柱史北一星曰女史婦人之㣲者主傳漏故漢有侍史宿宋兩朝天文志女史去極十七度半入斗二度星經柱下史在北辰東主左右史記遇事也一晉書天文志極東一星曰柱下史宋史天文志云在天柱前司上帝之言動宿宋兩朝天文志去極十八度入斗十三度御女四星今無天柱五星今無御女四星五天柱星經御女四星在鉤陳北主天子八十一御妻也妃后之官晉書天文志鉤陳北四星曰女御宮八十一御妻之象也一宋史天文志女御四星在大帝北一云在鈎陳腹云在帝坐東北御妻之象也宋兩朝天文志距西南星去極一十三度半入奎一度星經天柱五星在紫㣲宮内近東垣主建教一晉書天文志東垣下五星曰天柱宋史天文志曰在五帝左稍前三宋兩朝天文志距東南星去極十度半入危宿初度大理二星今無大理兩星隂德邊星經大理二星在宮門内主刑獄事也文晉書天文志宮門左星内二星曰大理宋史天志一云在尚書前十宋兩朝天文志距東星去極二三度半入心宿五度句陳尾指北極顛句陳六星六甲前天皇獨在句陳裏星經句陳六星在五帝下為後宮大帝正妃又主天子六軍將軍又主三公史記天官書天極星後句四星末大星正妃餘三星後宫之屬也元宋史天文志六星比陳象六宫之化其端大星曰始餘星乘之曰庶妾半宋兩朝天文志去極六度入壁宿五度星經六甲六星在華葢之下杠星之旁文晉書天文志華葢杠旁六星曰六甲宋兩朝天志距南星去極一十五度入奎宿四度星經天皇大帝一星在句陳中央也不記數皆是一星在五帝前坐其神曰耀魄寶晉書天文志鉤陳口中一星曰天皇大帝宿宋兩朝天文志去極八度半入室十一度五帝内座五星今無五帝内座後門是星經五帝内座在華葢下覆帝座也五帝同座也所晉書天文志華葢下五星曰五帝内座設叙順帝居也極宋兩朝天文志距中大星去十二度半入室宿六度華葢並杠十六星杠作柄象華葢形星經華葢十六星在五帝座上杠九星為華葢之柄也上七星為庶子之官晉書天文志大帝上九星曰華葢所以覆蔽大帝之坐也葢下九星曰杠葢之柄也宋史天文志華葢七星杠九星如葢有柄下垂以覆大帝之坐也在紫㣲宫臨句陳之上四宋兩朝天文志距中大星夫極二十六度入婁宿度葢上連連九箇星名曰傳舎如連丁星經傳舍九星在華葢上奚仲北近天河主賔客之館宋兩朝天文志距西第四星去極二十八度半入胃宿五度垣外左右各六珠右是内階左天厨星經内階六星在文昌北宋晉書天文志文昌北六星曰内階天皇之陛也史天文志在文昌東北極宋兩朝天文志距西南星去二十三度入井宿二十六度星經天厨六星在紫㣲宮東北維近傳舍北百官厨今光禄厨像之晉書天文志東北維外六星曰天厨距宋史天文志在扶筐北斗宋兩朝天文志大星去極二十四度入宿二十二度階前八星名八穀晉書天文志諸王西八星曰八穀主候嵗八穀八隋書天文志厲石北八星曰八穀宋史天文志穀八星在華葢西五車北一曰在諸王西武宻曰主候嵗豐儉一稻二黍三大麥四小麥五大豆六小豆七粟八麻甘氏曰八穀在宮北門之右司親耕司候嵗司尚食宋兩朝天文志距西南星去極三十一度半入畢宿三度厨下五箇天棓宿星經天棓五星入氐一度去北辰二十八度天史記天官書紫宮右五星曰天棓晉書天文志棓五星在女牀北天子先驅也搶棓皆所以備非常也度宋兩朝天文志距南星去極四十四度入箕宿三天牀六星今無天牀六星左樞在星經天牀六星在宮門外距宋史天文志一曰在二樞之間宋兩朝天文志西南星去樞二十二度入氐宿二度半内厨二星今無内厨兩星右樞對星經内厨二星在西北角文晉書天文志西南角外二星曰内厨宋兩朝天志距西南星去極十九度半入軫宿十一度文昌斗上半月形稀疎分明六箇星星經文昌六星如半月形在北斗魁前天府主營計天下事其六星各有名六司法大理史記天官書斗魁戴匡六星曰文昌宮一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司禄晉書天文志文昌六星天之六府也主集計天道一曰上將大將軍建威武二曰次將尚書正左右三曰貴相太常理文緒四曰司禄司中司隷賞功進五曰司命司怪太史主滅咎六曰司冦大理佐理寶所謂一者起北斗魁前近内階者也度宋兩朝天文志距西南星去極三十四半入栁宿二度半文昌之下曰三師晉書天文志魁第一星西三星曰三公初宋兩朝天文志距西星去極二十一度入張宿度半太尊一星太尊只嚮三公明晉書天文志中台之北一星曰太尊貴戚也天牢六星今一星天牢六星太尊邊星經天牢六星在北斗魁下貴人牢志宋史天文志甘氏云賤人之牢也宋兩朝天文距西北星去極二十八度半入張宿六度太陽守一星勢四星今無太陽之守四勢前星經太陽守在西北主大臣大將備天下不虞入張十三度去北極四十五度宋史天文志太陽守一星在相星西北斗第三星西南大將大臣之象一曰在下台北太尉官也在朝少傅行大司馬者晉書天文志太陽守西北四星曰勢勢腐刑人也官宋史天文志一曰在璣星北主助宣王命内常侍也十宋兩朝天文志去極三一度入翼宿二度蕙田案勢四星宋兩朝志不載距星宰相一星一箇宰相太陽側星經相星在北斗南入翼一度去北辰三十一度斗宋史天文志相一星在北斗第四星南一曰在中文昌之南在朝少師行太宰者宿宋兩朝天文志去極三十三度入軫四度更有三公相西偏星經三公三星在斗柄東三晉書天文志杓南三星及魁第一星西三星皆曰公宋史天文志三公三星在北斗杓南及魁第一星西一云在斗柄東為太尉司徒司空之象在魁西者名三師宋兩朝天文志距東星去極三十五度少入角宿六度元戈一星即是元戈一星圜星經元戈一星在招摇北一名巨戈入氐一度去北辰四十二度隋書天文志元戈二星在招摇北宋史天文志天戈一星又名元戈天理四星斗裏暗星經天理四星在北斗魁中主貴人牢為執法官宋晉書天文志魁中四星為貴人之牢曰天理也兩朝天文志距東南星去極二十八度入翼宿九度輔一星輔星近著開陽淡星經輔星象親近大臣之晉書天文志輔星傅乎開陽所以佐斗成功丞相象也隋書天文志輔一星在太㣲北又曰主危正矯不平見宋史天文志北斗第八星曰弼星在第七星右不漢志主幽州第九星曰輔星在第六星左常見漢志主并州案北斗與輔星為八而漢志云九星武宻及楊維德皆采用之史記索隱云北斗星間相去各九千里其二隂星不見者相去八千里而丹元子步天歌亦云九星漢書必有所本矣入宋兩朝天文志去極三十度角宿三度北斗之宿七星明第一主帝名樞精第二第三璇璣星第四名權第五衡開陽摇光六七名星經北斗星謂之七政天之諸侯亦為帝車魁四星為璇璣杓三星為玉衡齊七政斗為人君號令之主出號施令布政天中臨制四方第一名天樞亦曰政星也是天子象第二名璇女主之位第三名璣亦名令星第四名權為伐第五名衡為殺第六名開陽第七名摇光亦為應星樞入張一度去北辰十八度也衡去極十五度去辰十一度斗第六七指角第四五六指南斗第一二指觜史記天官書北斗七星所謂璇璣玉衡以齊七政杓擕龍角衡殷南斗魁枕參首用昏建者杓杓自華以西南夜半建者衡衡殷中州河濟之間平旦建者魁魁海岱以東北也斗為帝車運于中央臨制四方分隂陽建四時均五行移節度定諸紀皆繫于斗樞晉書天文志北斗七星在太㣲北魁第一星曰天二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰摇光一至四為魁五至七為杓樞為天璇為地璣為人權為時玉衡為音開陽為律摇光為星石氏曰第一曰正星主陽徳天子之象也二曰法星主隂形女主之位也三曰令星四曰伐星五曰殺星六曰危星七曰部星亦曰應星又一主天二主地三主火四主水五主土六主木七主金又曰一主秦二主楚三主梁四主吳五主燕六主趟七主齊宋史天文志一漢志主徐州二主益州三主冀州四主荆州五主兖州六主揚州七主豫州度宋兩朝天文志天樞去極二十三度半入張宿十摇光去樞三十五度入角宿九度摇光左三天槍紅星經天槍三星在北斗柄東主天鋒武備在紫㣲宮右以御也史記天官書紫宮左三星曰天槍晉書天文志天槍一曰天鉞半宋兩朝天文志距大星去極三十二度入氐宿初度蕙田案通志文獻通考俱無此一句今協紀辨方書有之觀承案末句有天槍星自宜補入但紅字非韻應是横字以北地聲相近而致訛耳若古韻則紅亦可讀横然此歌本不用古韻不宜獨叶此字似當正作横字為允紫㣲垣合象中央黑㸃近天樞星為赤極宋史天文志案步天歌載中宫紫㣲垣經星常宿可名者三十五坐積數一百六十有四而晉志所載太尊天戈天槍天棓皆屬太㣲垣八穀八星在天市垣與步天歌不同蕙田案晉志無以中官諸星分屬三垣之説以八榖屬天市尤於方位不合説見下右紫㣲垣上元太㣲宮昭昭列象在蒼穹端門只是門之中左右執法門西東今測左執法黄經九宮初度二十六分緯北一度二十五分右執法黄經八宮二十二度四十二分緯北初度四十三分赤經八宮二十三度三十五分緯北三度三十四分史記天官書衡太㣲三光之廷匡衛十二星藩臣西將東相南四星執法中端門門左右掖門晉書天文志太㣲天子庭也五帝之座也一曰太㣲為衡衡主平也又為天庭理法平辭監升授德列宿受符諸神考節舒情稽疑也南蕃中二星間曰端門東曰左執法廷尉之象也西曰右執法御史大夫之象也執法所以舉刺凶姦者也二宋兩朝天文志右執法去極八十四度入翼宿十度半左執法去極八十六度入軫宿初度半北通志太㣲垣在翼軫門左皂衣一謁者晉書天文志左執法東北一星曰竭者主贊賔客也宋史天文志乾象新書在太㣲垣門内左執法北八宋兩朝天文志去極十三度入軫宿一度以次即是烏三公晉書天文志謁者東北三星曰三公内坐朝會之所居也宋兩朝天文志距東星去極八十四度半入軫六度三黑九卿公背旁晉書天文志三公北三星曰九卿内坐治萬事天宋史天文志乾象新書在内五諸侯南宋兩朝文志距西北星去極七十五度入軫七度晉書天文志九卿西五星曰内五諸侯内侍天子不之國也宋史天文志乾象新書在郎位南宋兩朝天文志距西星去極七十度入軫一度四箇門西主軒屏今測内屏一星黄經八宮一十八度五十四分緯北六度零七分赤經八宮二十二度一十四分緯北一十度零一分十二星黄經八宮一十九度四十三分緯北四度三七分三星黄經八宮二十三度一十七分緯北八度三十四分六四星黄經八宮二十三度一十七分緯北度一十分晉書天文志屏四星在端門之内近右執法屏所以壅蔽帝庭也宋兩朝天文志距西南星去極八十度入翼十度五帝内坐於中正今測五帝座大星黄經八宮一十七度一十三分緯北一十二度一十八分赤經八宮二十三度一十三分緯北一十六度二十一分晉書天文志黄帝坐在太㣲十含樞紐之神也四帝星俠黄帝坐東方蒼帝靈威仰之神也南方赤帝赤熛怒之神也西方白帝白招拒之神也北方黑帝叶光紀之神也宋兩朝天文志距中大星去極七十一度半入翼十一度幸臣太子并從官烏列帝後從東定晉書天文志五帝坐北一星曰太子帝儲也太子北一星曰從官侍臣也帝坐東北一星曰幸臣宋兩朝天文志太子一星去極六十六度半入翼十一度半從官一星去極六十四度入翼八度半幸臣一星去極六十六度半入翼十五度郎將虎賁居左右晉書天文志郎將在郎位北主閔具所以為武備也武賁一星在太㣲西蕃北下台南靜室旄頭之騎官也十宋兩朝天文志郎將一星去極四十七度半入軫一度虎賁一星去極六十二度少入翼二度常陳郎位居其後常陳七星不相誤郎位陳東一十五史記天官書帝坐後聚一十五星蔚然曰郎位郎晉書天文志郎位十五星在帝坐東北一曰依烏府也周官之元士漢官之光禄中㪚諫議議郎三署郎中是其職也郎主守衛也常陳七星如畢狀在帝坐北天子宿衛武賁之士以設彊禦也度宋兩朝天文志郎位十五星距西南星去極六十入翼十八度常陳七星距東星去極五十一度半入軫初度兩面宮垣十星布左右執法是其數今測東上相黄經九宮五度四十六分緯北二度五十分赤經九宮六度二十五分緯北初度一十八分赤東次相黄經九宮七度零五分緯北八度四十分經九宮九度五十七分緯北五度零九分西上將黄經八宮一十四度一十八分緯北一度四十二分西次將黄經八宮一十三度零八分緯北六度零七分北西次相黄經八宮九度緯九度四十二分晉書天文志左執法之東左掖門也右執法之西右掖門也東藩四星南第一曰上相其北東太陽門也第二星曰次相其北中華東門也第三星曰次將其北東太隂門也第四星曰上將所謂四輔也西蕃四星南第一星曰上將其北西太陽門也第二星曰次將其北中華西門也第三星曰次相其北西太隂門也第四星曰上相亦曰四輔也蕙田案天官書及漢志俱稱匡衛十二星與晉隋以下諸志不合宮外明堂布政宮今測明堂一星黄經八宮一十七度零七分緯南初度三十三分二星黄經八宮二十度三十七分緯南三度零三分緯三星黄經八宮一十九度五十八分南五度四十一分晉書天文志太㣲西南角外三星曰明堂天子布政之宮三箇靈臺候雲雨今測靈臺一星黄經八宮一十度零五分緯北一度二十分二星黄經八宮九度三十三分緯南初度一十三分緯三星黄經八宮一十度三十分南二度二十九分晉書天文志明堂西三星曰靈臺觀臺也主觀雲物察符瑞候災變也少㣲四星西南隅史記天官書廷藩西有隋星五曰少㣲士大夫天漢書天文志廷藩西有隋星四名曰少㣲晉書文志少㣲四星在太㣲西一名處士或曰博士官一曰主衛掖門南第一星處士第二星議士第三星博士第四星大夫五宋兩朝天文志距東南大星去極六十度半入張宿十五度半長垣雙雙㣲西居晉書天文志少㣲南四星曰長垣主界域十宋兩朝天文志距南星去極七十六度入張宿四度北門西外接三台與垣相對無兵災史記天官書斗魁下六星兩兩相比者名曰三能蘇林曰能音台晉書天文志三台六星兩兩而居起文昌列抵太㣲一曰天柱三公之位也在人曰三公在天曰三台主開徳宣符也西近文昌二星曰上台為司命主夀次二星曰中台為司中主宗室東二星曰下台為司禄主兵又曰三台為天階太一躡以上下一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人度宋史天文志案上台二星在柳北其北星入柳六中台二星其北入張二度下台二星在太㣲垣西蕃北其北星入翼二度武宻書三台屬鬼又屬柳屬張乾象新書上台屬柳中台屬張下台屬翼太㣲垣合象宋史天文志右上元太㣲宮常星一十九座積數七十有八而晉志所載少㣲長垣各四星屬天市垣與步天歌不同蕙田案晉志天文經星分為三段一為中官一為二十八舍一為星官在二十八舍之外者古謂之外官其中官之星以北極紫宮為首而北斗次之文昌諸星在斗魁前者也太㣲諸星與斗衡相直者也自攝提大角以至貫索天紀織女漸臺輦道皆在斗杓下者也故次于北斗之後自平道以下至少㣲長垣俱在二十八宿之上故亦屬之中官其序則自東而北而西而南焉隋志星名較多於晉史至其分目次第一與晉志同葢古無以太㣲天市配紫宮為三垣者史記天官書祗有中宮而天市屬東宮太㣲屬南宮晉隋二志則分中外官與二十八舍為三條而太㣲天市亦雜叙於中官之内晉隋志俱出李淳風之手别無云三垣者則三垣之名在淳風以後矣上元太㣲下元天市始見於步天歌歌不著撰人名氏相傳以為唐王希明自號丹元子者所撰鄭夾漈獨非之以為丹元子隋之隱者然唐初尚無三垣之説則非隋人所撰審矣後世以中官之星分屬三垣又以二十八宿内外諸星案其經度分屬諸宿俱始於步天歌晉隋以前所未有也修宋史者不加詳考乃云晉志某星屬太㣲垣某星屬天市垣誣甚矣即如扶筐織女漸臺輦道北方之星也豈得越紫宮而南屬於太㣲乎大陵積尸天船積水天大將軍軒轅酒旗諸星西方南方之星也豈得越紫宮而東屬於天市乎略舉一二其謬顯然後皆放此觀承案天官星象史漢晉隋諸志或但分為五宮或又區為三列從無以太㣲天市配紫宮為三垣者然天本無度自人測之而立度地本無州自人畫之而分州其或増或減或合或分亦各隨其時以便於觀察綜理而已自丹元子分出三垣以統乎中宮分𨽻二十八宿以環于四野尤為綱舉目張而易于尋省斯亦以簡馭繁之㨗徑也第宋志反据此以例晉隋諸志不免以漢官之號而上議周官之名則是偶不經思而倒其前後之序耳後人分别觀之可也右太㣲垣下元一宮名天市兩扇垣墻二十二今測韓黄經十一宮四度四十九分緯北一十一度三十分赤經十一宮四度五十八分緯南九度五十分十楚黄經十宮二十九度零七分緯北一十六度三一分赤經十一宮初度二十七分緯南三度五十一分一梁黄經十宮二十七度五十五分緯北一十七度十九分赤經十宮二十九度三十分緯南二度五十分零巴黄經十宮一十九度五十七分緯北二十四度六分赤經十宮二十三度五十分緯北五度三十分十蜀黄經十宮一十七度四十分緯北二十五度三六分赤經十宮二十二度一十四分緯北七度三十分十宋黄經十一宮一十三度三十二分緯北七度一八分南海黄經十一宮二十度零七分緯北八度零四分八東海黄經初宮一度二十三分緯北二十度三十分赤經初宮一度一十八分緯南二度五十一分十徐黄經初宮一十一度二十分緯北二十六度五九分赤經初宮一十度零七分緯北三度五十三分星經天市垣五十六星在房心北主權衡一名天旗門左星入尾一度去北辰九十四度宋兩朝天文志天市垣二十二星東西列各一十一星其東垣南第一星曰宋第二星曰南海第三星曰燕第四星曰東海第五星曰徐第六星曰吳越第七星曰齊第八星曰中山第九星曰九河第十星曰趙第十一星曰魏其西垣第一星曰韓第二星曰楚第三星曰梁第四星曰巴第五星曰蜀第六星曰秦第七星曰周第八星曰鄭第九星曰晉第十星曰河間第十一星曰河中東垣南第一星宋去極一百五度半入尾宿七度西垣第一星韓去極九十八度半入心宿五度當門六箇黑市樓史記天官書天市中六星曰市樓之星經市樓六星在市門中主闤闠之司今市曹官職宋兩朝天文志距東南星去極九十八度入尾宿十二度門左兩星是車肆星經車肆二星在宮門門垣左星之西主市易價直之官隋書天文志車肆主衆賈之區宋兩朝天文志距西大星去極一百度入尾宿三度兩箇宗正四宗人今測宗正一星黄經十一宮二十度五十五分緯北二十八度零一分赤經十一宮二十一度五十八分緯北四度四十七分六二星黄經十一宮二十二度一十五分緯北二十度一十一分赤經十一宮二十三度零三分緯北二度五十三分星經宗正二星在帝座東南主宗正卿大夫宗人四星在宗正東主祠享先人宋兩朝天文志宗正二星距北星去極八十五度半入尾十六度宗人四星距大星去極八十六度入箕一度宗二星宗星一雙亦依次星經宗二星在候東主宗室為帝血脉之臣半宋兩朝天文志宗室二星距北大星去極八十度入箕五度帛度兩星屠肆前星經帛度二星在宗星東北主平量也志宋史天文志乾象新書在屠肆南宋兩朝天文距西星去極六十九度少人箕三度星經屠肆二星在帛度北主屠殺之位也兩宋史天文志乾象新書在天市垣内十五度宋朝天文志距西星去極六十八度半入箕三度候星還在帝座邊星經候星在市東主輔臣隂陽法官入箕三度去北辰七十二度晉書天文志候一星在帝坐東北主伺隂陽志宋史天文志候一作后十宋兩朝天文去極七十八度半入尾六度帝座一星常光明今測帝座星黄經十一宮一十二度四十分緯北三十七度二十三分赤經十一宮一十五度五十分緯北一十四度四十五分星經帝座一星在市中入尾十五度去北辰七十一度隋書天文志帝座在天市中候星西天庭也宋兩朝天文志去極七十五度入尾十度四箇㣲芒宦者星星經宦官四星在帝座西南侍帝之傍入尾十二度宋兩朝天文志宦者四星距南星去極七十六度半入尾九度半列肆二星以次兩星名列肆星經列肆二星在斛西北主貨珍寶金玉等也宋隋書天文志斛西北二星曰列肆主寶玉之貨兩朝天文志距東星去極八十六度入心宿三度半蕙田案諸書皆云列肆在斛西北今圗乃在斛西南與古異斗斛帝前依其次斗是五星斛是四星經斗五星在宦星西南主稱量志宋史天文志乾象新書在帝座西宋兩朝天文距東大星去極七十九度入尾六度半星經斛四星在斗南主斛食之事兩隋書天文志市樓北四星曰天斛主量者也宋朝天文志距西南星去極八十七度半入尾宿三度宋中興天文志天市垣中一星明大者謂之帝座帝座東北一星為后舊誤作候西南三星為妃舊失其位妃北一星在帝右后北一星在帝左是為左右常侍妃南四星為宦寺宦寺南一星為閽人閽人南四星為内屏此其别也而舊乃以右常侍一星及妃三星為宦者又以宦寺閽人合五星為斗又以内屏四星為斛皆誤也蕙田案此宮名天市故有列肆斗斛之名星經步天歌隋志並同宋中興志獨為異説於古無據今不取垣北九箇貫索星今測貫索一星黄經十宮七度四十九分緯北四十四度二十三分赤經十宮二十度二十分緯北二十七度五十分星經貫索九星在七公前為賤人牢右星入尾一度去北辰五十五度史記天官書有句圜十五星屬杓曰賤人之牢索隱曰其形如連環即貫索星也主晉書天文志貫索一曰連索一曰連營一曰天牢法律禁暴彊也牢口一星為門欲其開也索口横著七公成星經七公七星在招摇東氐北為天相主三公七政善惡西星入氐四度去北辰四十九度通志張衡曰七公横列貫索之口主執法列善惡之官也天紀恰似七公形數著分明多兩星星經天紀九星在貫索東主九卿萬事綱紀掌理怨訟西入尾五度去北辰五十一度紀北三星名女牀此座還依織女旁星經女牀三星在天紀北主後宮生女事侍帝及皇后入箕一度去北辰五十三度天市垣合象宋史天文志右天市垣常星可名者一十七坐積數八十有八而市樓天斛列肆車肆斗帛度屠肆等星晉志皆不載隋志有之屬天市垣與步天歌合又貫索七公女牀天紀晉志屬太㣲垣案乾象新書天紀在天市垣北女牀屬箕宿貫索屬房宿七公屬氐宿武宻以七公屬房又屬尾貫索屬房又屬氐屬心女牀屬于尾箕説皆不同蕙田案天官書以天市諸星屬東宮而貫索屬中宮晉志貫索七公女牀天紀次於招揺梗河之後以其近北斗也天市垣諸星次於平道進賢東西咸鍵閉鉤鈐之後以其近東方房心之宿也與天官書略同宋史乃謂貫索諸星晉志以屬太㣲失之甚矣右天市垣五禮通考卷一百九十二
