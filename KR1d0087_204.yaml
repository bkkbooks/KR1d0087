body:
  text: 五禮通考卷一百九十四刑部尚書秦蕙田撰嘉禮六十七觀象授時西方白虎七宿奎腰細頭尖似破鞋一十六星繞鞋生今測奎一星黃經三宮一十七度五十四分緯北一十五度五十八分赤經三宮一十分緯北二十一度四十七分史記天官書奎為封豖為溝瀆封晉書天文志奎十六星天之武庫一曰天豕亦曰豕主以兵禁暴又主溝瀆西南大星所謂天豕目亦曰大將欲其明史宋兩朝天文志距西南大星去極七十二度宋天文志漢永元銅儀以奎為十七度唐開元遊儀十六度舊去極七十六度景祐測驗同外屏七烏奎下橫今測外屏一星黃經三宮九度四十六分緯北二度一十一分二星黃經三宮一十三度零八分緯北一度零六分十三星黃經三宮一十五度二十九分緯南初度一二分四星黃經三宮一十八度四十三分緯南三度零三分一五星黃經三宮二十一度零六分緯南四度四十分六星黃經三宮二十三度零八分緯南七度五十六分五七星黃經三宮二十四度五十八分緯南九度零分赤經三宮二十六度二十七分緯北一度一十四分隋書天文志奎南七星曰外屏天宋史天文志外屏在奎南主障蔽臭穢宋兩朝文志距西星去極八十九度入壁宿八度半屏下七星天溷明隋書天文志外屏南七星曰天溷厠也宿宋兩朝天文志距西南星去極九十七度入奎三度土司空一星司空左畔土之精今測黃經二宮二十八度零六分緯南二十度四十七分赤經三宮六度五十四分緯南一十九度四十四分隋書天文志天溷南一星曰土司空主水土之事事宋史天文志土司空一星在奎南一曰天倉主土一宋兩朝天文志去極一百十五度少入壁宿九度軍南門一星奎上一宿軍南門晉書天文志天將軍南一星曰軍南門主誰何出入宋兩朝天文志去極六十六度入奎宿十五度河中六箇閣道形史記天官書紫宮後六星絶漢抵營室曰閣道至晉書天文志閣道六星在王良前飛道也從紫宮河神所乘也一曰閣道星天子遊别宮之道也度宋兩朝天文志距南星去極四十八度入奎宿四半附路一星附路一星道旁明晉書天文志傅路一星在閣道南旁别道也天文志附路一星在閣道南一曰在王良東宋史宋兩朝天文志去極三十五度半入奎宿五度五箇吐花王良星史記天官書漢中四星曰天駟旁一星曰王良御晉書天文志王良五星在奎北居河中天子奉車官也其四星為天駟旁一星曰王良亦曰天馬亦曰梁為天橋主禦風雨水道宋兩朝天文志距西星去極三十七度入壁宿初度䇿一星良星近上一䇿明晉書天文志王良前一星曰䇿星王良之御䇿也主天子之僕宋兩朝天文志去極三十三度半入壁宿五度奎宿之屬合象宋史天文志案步天歌以上諸星俱屬奎宿以晉志考之王良附路閣道軍南門䇿星俱在天市垣别無外屏天溷土司空諸星隋志有之而武密以王良外屏天溷皆屬于壁或以外屏又屬奎乾象新書以王良西一星屬壁東四星屬奎外屏西一星屬壁東六星屬奎與步天歌各有不合婁三星不勻近一頭今測婁一星黃經三宮二十九度三十三分緯北八度二十九分赤經三宮二十四度一十八分緯北一十九度一十五分九二星黃經三宮二十八度四十七分緯北七度零分三星黃經四宮三度一十六分緯北九度五十七分史記天官書婁為聚衆晉書天文志婁三星為天獄主苑牧犧牲供給郊祀宋兩朝天文志婁三星距中星去極七十五度半遊宋史天文志漢永元銅儀以婁為十二度唐開元儀十二度舊去極八十度景祐測驗婁宿十二度距中央大星去極八十度在赤道內十一度左更右更烏夾婁今測右更一星黃經三宮二十二度四十四分緯北九度二十四分二星黃經三宮二十二度二十四分緯北五度二十一分十三星黃經三宮二十二度三十一分緯北一度五二分四星黃經三宮二十三度二十二分緯北一度三十九分三五星黃經三宮二十三度一十八分緯南一度十九分隋書天文志婁東五星曰左更山虞也主澤藪竹木之屬亦主仁智婁西五星曰右更牧師也主養牛馬之屬亦主禮義二更秦爵名也入宋兩朝天文志左更距西南星去極七十六度半婁宿四度半右更距東北星去極七十五度入奎宿十四度天倉六箇婁下頭今測天倉一星黃經二宮二十六度三十三分緯南一十度零一分赤經三宮初度五十三分緯南一十度三十三分度三星黃經三宮一十一度五十三分緯南一十五四十七分赤經三宮一十七度零八分緯南九度四十九分晉書天文志天倉六星在婁南倉穀所藏也宿宋兩朝天文志距西北星去極一百四度半入奎十一天庾三星倉東腳晉書天文志天倉南四星曰天庾積厨粟之所也十宋兩朝天文志天庾三星距中大星去極一百二五度半入婁宿五度蕙田案晉隋宋諸史志俱云天庾四星惟宋兩朝志與步天歌合今靈臺測驗同婁上十一將軍侯或作十二晉書天文志天將軍十二星在婁北主武兵中央大星天之大將也宋史天文志天大將軍十一星宋兩朝天文志天大將軍十二星距大星去極六十度半入婁宿四度婁宿之屬合象宋史天文志案晉志天倉天庾在二十八宿之外天大將軍屬天市垣左更右更惟隋志有之乾象新書以天倉屬奎武密亦以屬奎又屬婁步天歌皆屬婁宿胃宿三星胃三星鼎足河之次今測胃一星黃經四宮一十二度三十三分緯北一十一度一十六分赤經四宮六度一十七分緯北二十六度二十分史記天官書胃為天倉厨藏主倉廩五穀府也晉書天文志胃三星天之宋史天文志漢永元銅儀胃宿十五度景祐測驗十四度七宋兩朝天文志距西南星去極六十度半天廩四星天廩胃下斜四星今測天廩一星黃經四宮一十九度一十分緯南五度五十七分三星黃經四宮一十七度二十八分緯南八度五十分緯四星黃經四宮一十六度四十六分南九度二十三分晉書天文志天廩四星在昴南一曰天倉主蓄黍稷以供饗祀春秋所謂御廩也宋兩朝天文志距南星去極八十五度半入胃宿十二度天囷十三如乙形今測天囷一星黃經四宮九度五十七分緯南一十二度三十七分赤經四宮一十一度三十分緯北二度五十分分三星黃經四宮一十度四十一分緯南七度五十四星黃經四宮七度一十七分緯南五度三十六分十五星黃經三宮二十九度三十七分緯南四度一九分六星黃經四宮三度零四分緯南五度五十二分分七星黃經四宮三度五十八分緯南九度一十三八星黃經四宮五度零四分緯南一十二度零三分赤經四宮六度四十七分緯北一度五十二分九星黃經四宮三度一十二分緯南一十四度三十二分赤經四宮五度五十四分緯南一度零五分晉書天文志天囷十三星在胃南囷倉廩之屬也主給御糧也宋兩朝天文志距大星去極九十一度半入胃宿六度半河中八星名大陵晉書天文志大陵八星在胃北亦曰積京主大喪也宋兩朝天文志距大星去極五十四度入胃宿七度陵北九箇天船名晉書天文志大陵北九星曰天船一曰舟星所以濟不通也通志天船九星居河中宋兩朝天文志距大星去極五十四度半入胃宿十度積尸一星陵中積尸一箇星晉書天文志大陵中一星曰積尸十通志張衡云一名積廩宋兩朝天文志去極五五度入胃宿四度積水一星積水船中一黑精晉書天文志天船中一星曰積水主候水災宋兩朝天文志去極五十三度入昴宿初度胃宿之屬合象宋史天文志案晉志大陵積尸天船積水俱屬天市垣天囷天廩在二十八宿之外武密以天囷大陵屬婁又屬胃天船屬胃又屬昴乾象新書天囷五星屬婁餘星屬胃大陵西三星屬婁東五星屬胃與步天歌有不同昴宿七星昴七星一聚實不少今測昴一星黃經四宮二十四度四十八分緯北四度一十分赤經四宮二十一度二十分緯北二十三度零三分十五星黃經四宮二十五度二五分緯北四度史記天官書昴曰髦頭胡星也為白衣會為晉書天文志昴七星天之耳也主西方主獄事又旄頭昴畢間為天街天子出旄頭罕畢以前驅此其義也銅通志甘氏云主口舌奏對宋史天文志漢永元儀昴宿十二度唐開元遊儀十一度舊去極七十四度景祐測驗昴宿十一度距西南星去極七十一度志宋兩朝天文去極七十度天阿一星月一星阿西月東各一星晉書天文志天髙西一星曰天河主察山林妖變宋宋史天文志天阿一星一作天河在天廩星北兩朝天文志天河一星去極六十六度入胃宿十度今測月一星黃經四宮二十九度零三分緯北一度一十二分隋書天文志天街西一星曰月蟾通志月一星在昴東宋史天文志在昴宿東南蜍也主日月之應女主臣下之象又主死喪之事入宋兩朝天文志月一星去極七十一度半昴宿五度天隂五星月下五黃天隂名今測天隂一星黃經四宮一十六度二十五分緯北一度四十七分二星黃經四宮一十七度三十一分緯北二度五十分隋書天文志畢柄西五星曰天隂兩宋史天文志天隂五星主從天子弋獵之臣宋朝天文志距西星去極七十五度半入胃宿七度隂下六烏芻藁營隋書天文志天苑西六星曰芻藁以供牛羊之食也通志一曰天積天子之藏府也宋兩朝天文志距西行中星去極一百八度入婁宿十一度營南十六天苑形今測天苑三星黃經四宮一十六度一十七分緯南二十八度四十七分赤經四宮二十一度五十五分緯南一十度五十四分度四星黃經四宮一十三度五十五分緯南二十七四十七分赤經四宮一十九度三十六分緯南一十度三十二分十五星黃經四宮九度二十六分緯南二十五度五九分赤經四宮一十五度一十分緯南一十度零二分四六星黃經四宮四度二十分緯南二十四度三十分赤經四宮一十度一十六分緯南一十度一十一分獸晉書天文志天苑十六星昴畢南天子之苑囿養之所也東通志天苑十六星如環狀昴宋兩朝天文志距北星去極一百七度半入宿七度河裏六星名卷舌晉書天文志卷舌六星在昴北主口語以知佞讒也通志張衡云主樞機宋兩朝天文志去極五十三度入昴宿初度蕙田案宋兩朝志不載距星天讒一星舌中黑點天讒星隋書天文志卷舌中一星曰天讒主巫醫宿宋兩朝天文志天讒一星去極六十一度半入昴半度礪石舌傍斜四丁今測礪石一星黃經五宮初度五十四分緯北七度五十五分三星黃經五宮三度四十二分緯北三度五十七分隋書天文志五車西五星曰厲石鋒宋史天文志礪石四星在五車星西主百工磨礪刃亦主候伺宋兩朝天文志距南第二星去極六十五度入昴宿六度蕙田案隋志礪作厲諸家皆云四星惟隋志五星亦不同昴宿之屬合象宋史天文志案晉志天河卷舌天讒俱屬天市垣天苑在二十八宿之外芻藁天隂月礪石晉志不載隋史有之武密又以芻藁屬胃卷舌屬胃又屬昴乾象新書以芻藁屬婁卷舌西三星屬胃東三星屬昴天苑西八星屬胃南八星屬昴步天歌以上諸星皆屬昴宿互有不合畢恰似爪叉八星出今測畢一星黃經五宮四度零三分緯南二度三十七分赤經五宮二度三十四分緯北一十八度二十六分分二星黃經五宮一度二十三分緯南五度四十七三星黃經五宮二度二十七分緯南四度零二分分四星黃經五宮三度三十二分緯南五度五十三五星黃經五宮五度二十三分緯南五度三十分六星黃經四宮二十分六度一十三分緯南八度零三史記天官書畢曰罕車為邊兵主弋獵四晉書天文志畢八星其大星曰天髙一曰邊將主夷之尉也畢通志甘氏云畢主街巷隂雨天之雨師也張衡云