body:
  text: 五禮通考卷一百四刑部尚書秦蕙田撰吉禮一百四后妃廟金史世宗本紀大定元年十月丙午即皇帝位十一月甲申追尊皇考豳王為皇帝諡簡肅廟號睿宗皇妣富察氏曰欽慈皇后李氏曰貞懿皇后戊子辭謁太祖廟及貞懿皇后園陵貞懿皇后傳后李氏世宗母遼陽人父綽爾齊仕遼官至桂州觀察使天輔間后入睿宗邸七年世宗生天會十三年睿宗薨世宗時年十三后祝髪為比邱尼號通慧圓明大師賜紫衣歸遼陽營建清安禪寺别為尼院居之貞元三年世宗為東京留守正隆六年五月后卒世宗即位於東京尊諡為貞懿皇后其寢園曰孝寧宫大定二年改𦵏睿宗於景陵初后自建浮圖於遼陽是為垂慶寺臨終謂世宗曰鄉土之念人情所同吾已用浮屠法置塔於此不必合𦵏也我死毋忘此言世宗深念遺命乃即東京清安寺建神御殿詔有司增大舊塔起奉慈殿於塔前九年神御殿更名曰報德殿十三年東京垂慶寺起神御殿禮志世宗大定二年有司援唐典昭德皇后合立别廟擬於太廟内垣東北起建從之三年十月七日太廟祫享升祔睿宗皇帝并昭德皇后神主同時製造題寫奉詣殿庭謁畢祔于祖姑欽仁皇后之左享祀畢奉主還本廟十二月二十一日臘享禮官言唐禮别廟薦享皆凖太廟一室之儀伏恐今廟享畢已過質明請别差官攝祭制可後以廟制小又於太廟之東别建一位十二年八月廟成正殿三間東西各空半間以兩間為室從西一間西壁上安置祏室廟置一便門與太廟相通仍以舊殿為冊寳殿祏室奏毁十三年六月二十一日奏告太廟祭告别廟二十三日奉安用前祫享通廟儀有司言當用鹵簿以廟相去不逺參酌議用清道二人次團扇二人次職掌二人次衙官二十六人為十三重供奉官充次腰輿輿士一十六人傘子二人次團扇十四為七重方扇四次排列職掌六人燈籠十對輦官並錦襖盤裹仍令皇太子率百官行禮前一日行事執事官就祀所清齋一宿仍習儀執事者眡醴饌太廟令帥其屬掃除廟之内外禮直官設皇太子西向位執事官位太子後近南西向各依品從立監察殿西階下東向立及親王百官位於廟庭北向西上又設祝案於神位之右設尊彛之位于左各加爵冪坫又設祭器皆藉以席左一籩實以鹿脯右一豆實以鹿臡又設盥洗爵洗位於横街之南稍東罍在洗東加勺篚在洗西南肆實以巾執罍篚者位於其後太廟令又設神位於室内北墉下當戸南向設直几一黼扆一莞席一繅席一次席二紫綾厚褥一紫綾䝉褥一并幄帳等諸物並如舊廟之儀又設望燎位於西神門外之北設燎柴於位之北預掘瘞坎于燎所所司陳儀衛于舊廟門之外奉安日未明二刻所司進方扇燭籠于舊廟殿門外設腰輿一繖一於殿階之下南向質明皇太子公服乗馬本宫官屬導從至廟門外下馬步入廟門至幕次引親王百官常服由廟門入於殿庭北向西上重行立定次引皇太子於百官前絶席位立贊者曰再拜皆再拜宫闈令升殿捧昭德皇后神主置於座贊者曰再拜皆再拜次引内常侍北向俯伏跪奉請昭德皇后神主奉安於新廟降殿升輿奏訖俯伏興捧几内侍先捧几匱跪置於輿又宫闈令接神主内侍前引跪置於輿上几後覆以紅羅帕内常侍以下分左右前引皇太子步自舊廟先從行親王次之百官分左右後從儀衞導從至别廟殿下北向内常侍于腰輿前俯伏興跪奏請降輿升殿内侍捧几匱前宫闈令捧接神主升殿置於座禮直官引皇太子以下親王百官入殿庭北向西上重行立皇太子在絶席立禮直官贊曰再拜皆再拜又贊曰行事官各就位禮直官引皇太子西向位立定禮直官少前贊曰有司謹具請行禮即引皇太子就盥洗位北向搢笏盥手帨手執笏詣爵洗位北向立搢笏洗爵拭爵以授執事者執笏升詣酒尊所西向立執事者以爵授皇太子搢笏執爵執事者舉冪酌酒皇太子以爵授執事者詣神位前北向搢笏跪執事者以爵授皇太子執爵三祭酒反爵于坫執笏俛伏興少立次引太祝舉祝官詣讀祝位東北向舉祝官跪舉祝版太祝讀祝訖置祝于案俛伏興舉祝官皆却立北向贊者曰再拜皇太子就兩拜降階復位舉祝讀祝官後從復本位禮直官曰再拜在位者皆再拜宫闈令納神主於室贊者曰再拜皆再拜禮畢退署令闔廟門瘞祝於坎儀物各還所司二十六年勅别建昭德皇后影廟于太廟内有司言宜建殿三間南面一屋三門垣周以甓外垣置櫺星門一神厨及西房各三間然禮無廟中别建影廟之例今皇后廟西有隙地廣三十四步袤五十四步可以興建制可仍於正南别創正門以坤儀為名仍留舊有便門遇禘祫祔享由之每歳五享并影廟行禮于正南門出入又於廟外起齋廊房二十三間世宗昭德皇后傳后烏凌阿氏其先居海倫河世為烏凌阿部長率部族來歸居上京與本朝為婚姻家父實勒扎哈以功授世襲穆昆為東京留守后歸世宗甚得婦道世宗在濟南海陵召后來中都后念若身死濟南海陵必殺世宗惟奉詔去濟南而死世宗可以免謂世宗曰我當自免不可累大王也后既離濟南從行者知后必不肯見海陵將自為之所防䕶甚謹行至良鄉去中都七十里從行者防之稍緩后得間即自殺海陵猶疑世宗教之使然世宗自濟南改西京留守過良鄉使魯國公主𦵏后於宛平縣土魯原大定二年追冊為昭德皇后立别廟勅有司改𦵏命皇太子致奠二十九年祔𦵏興陵章宗時有司奏太祖諡有昭德字改諡明德皇后樂志昭德皇后别廟郊祀前薦享登歌樂曲初獻盥洗夷則宫肅寜之曲神無常享時歆精誠惟誠惟潔感通神明先事盥滌注兹清泠巾篚既奠尊彛薦馨初獻升降殿仲吕宫嘉寧之曲有來肅肅登降以敬粲粲祇服鏘鏘佩聲金石節奏既協且平其儀不忒乃終有慶司徒奉爼奏夷則宫豐寧之曲馨我黍稷潔我牲牷升降有節薦是吉蠲工祝致告威儀肅然神之弔矣元吉其旋酌獻奏夷則宫儀坤之曲俔天之妹坤德利貞圜丘有事先薦以誠我酒既㫖我殽既盈神其居饗福禄來成徹豆奏仲吕宫豐寧之曲明昭祀事舊典無違樂既云闋神其聿歸禮之克成神保斯饗于萬斯年迓續丕貺昭德皇后時享登歌樂章初獻盥洗無射宫肅寧之曲時祀有章禮備樂舉爰潔其盥亦豐其爼俯仰升降中規中矩神其來格百福是與初獻升殿夾鍾宫嘉寧之曲三獻及司徒降同假哉神宫神宫有侐惟時吉蠲登升翼翼歌鍾鏘煌笙磬翕繹於昭肅恭靈釐來格司徒奉爼無射宫豐寧之曲宫庭枚枚鍾磬喤喤既儀圭鬯既奠膋薌齋莊奉饋籩豆大房靈之右饗流慶無疆酌獻無射宫儀坤之曲於皇坤德作合乾儀塗山懿範京室芳徽容聲如在典祀惟時神其克享薦祉來儀亞終獻無射宫儀坤之曲嘉羞實爼髙張在庭申獻合禮終獻改申為三坤德儀刑神其是聽用鬯清明清明既鬯來享來寧徹豆夾鍾宫豐寧之曲禮成于終神心禗禗膋蕭發馨樂闋獻已徒馭孔多靈輿載轙青元悠悠歸且億矣章宗欽懷皇后傳后富察氏上京路和碩河人也父丹舒克尚熙宗鄭國公主授駙馬都尉贈太尉越國公后之始生有紅光被體移時不退就養于姨冀國公主既長孝謹如事所生大定二十三年章宗為金源郡王備禮親迎詔親王宰執三品以上官及命婦會禮封金源郡王夫人後進封妃薨帝即位遂加追冊仍詔誥中外奉安神主于坤寧宫歳時致祭大安初祔𦵏於道陵右金后妃廟元史世祖本紀至元十八年十月乙未享於太廟貞懿順聖昭天睿文光應皇后祔禮樂志十八年冬十月昭睿順聖皇后將祔廟製昭睿順聖皇后室曲舞世祖皇后祔廟酌獻樂章太常集禮云卷牘所載徽柔懿哲温黙靜恭範儀宫閫任姒同風敷天寧謐内助多功淑德祔廟萬世昌隆世祖昭睿順聖皇后傳后鴻吉哩氏濟寧忠武王安春之女生裕宗中統初立為皇后至元十年三月授冊寳上尊號貞懿順聖昭天睿文光應皇后十四年二月崩成宗即位追諡昭懿順聖皇后升祔世祖廟蕙田案昭睿順聖至成宗時升祔世祖至元十八年世祖猶在位也而紀志俱云祔廟想亦由别廟而祔享焉耳如世祖在位時即已升祔亦何待成宗時哉但别廟之文志傳缺如今亦不可考矣順帝本紀元統元年十月庚辰奉文宗皇帝及太皇太后御容于大承天䕶聖寺命左丞相薩敦為隆祥使奉其祭祀庚寅中書省臣請集議武宗英宗明宗三朝皇后升祔丁酉享于太廟辛亥追諡濟雅圖皇帝為聖明元孝皇帝廟號文宗時寢廟未建於英宗室次權結綵殿以奉安神主逯魯曽傳曾除太常博士武宗一廟未立后主配享集羣臣廷議之魯曾抗言先朝以武宗皇后珍格無子不立其主時巴延為右丞相以為明宗之母伊竒哩氏可以配享徽政院傳太后㫖以文宗之母唐古氏可以配享巴延問魯曽曰先朝既以巴延皇后無子不為立主今所立者明宗母乎文宗母乎對曰珍格皇后在武宗朝已膺玉冊則為武宗皇后明宗文宗二母后固為妾也今以無子之故不為立主以妾后為正宫是為臣而廢先君之后為子而追封先父之妾於禮不可且燕王垂即位追廢其母后而立其先母為后以配享先王為萬世笑豈可復蹈其失乎集賢大學士陳顥素嫉魯曾出曰唐太宗冊曹王明之母是亦二后也豈不可乎魯曽曰堯之母為帝嚳庶妃堯立為帝未聞冊以為后而配嚳皇上為大元天子不法堯舜而法唐太宗耶衆服其議而巴延韙之遂以珍格皇后配焉至元元年三月丙申中書省臣言甘肅甘州路十字寺奉安世祖皇帝母伯竒太后於内請定祭禮從之庚子中書省臣言帝生母太后神主宜於太廟安奉命集議其禮五月壬午朔皇太后以膺受寳冊恭謝太廟十月辛未太后玉冊玉寳成遣官告祭於太廟右元后妃廟明史英宗後紀閏七月甲戌上宣宗廢后胡氏尊諡宣宗恭讓皇后傳宣宗恭讓皇后胡氏名善祥濟寧人永樂十五年選為皇太孫妃已為皇太子妃宣宗即位立為皇后時孫貴人有寵后未有子又善病三年春帝令后上表辭位乃退居長安宫賜號靜慈仙師而冊貴妃為后宣宗後亦悔嘗自解曰此朕少年事天順六年孫太后崩錢皇后為英宗言后賢而無罪廢為仙師其殁也人畏太后殮𦵏皆不如禮因勸復其位號英宗問大學士李賢賢對曰陛下此心天地鬼神實臨之然臣以陵寢享殿神主俱宜如奉先殿式庶稱陛下明孝七年七月上尊諡曰恭讓誠順康穆靜慈章皇后修陵寢不祔廟憲宗本紀成化四年六月甲寅慈懿皇太后崩九月庚申𦵏孝莊睿皇后於裕陵英宗孝莊皇后傳后錢氏海州人正統七年立為后后無子周貴妃有子立為皇太子英宗大漸遺命曰錢皇后千秋萬歳後與朕同𦵏大學士李賢退而書之冊憲宗立上兩宫徽號下廷臣議太監夏時希貴妃意傳諭獨尊貴妃為皇太后大學士李賢彭時力爭乃兩宫並尊而稱后為慈懿皇太后及營裕陵賢時請營三壙下廷議夏時復言不可事竟寢成化四年六月太后崩周太后不欲后合𦵏帝使夏時懷恩召大臣議彭時首對曰合𦵏裕陵主祔廟定禮也翼日帝召問時對如前帝曰朕豈不知慮他日妨母后耳時曰皇上孝事兩宫聖德彰聞禮之所合孝之所歸也商輅亦言不祔𦵏損聖徳劉定之曰孝從義不從命帝黙然久之曰不從命尚得為孝耶時力請合𦵏裕陵左而虛右以待周太后已復與大臣疏爭帝再下廷議吏部尚書李秉禮部尚書姚䕫集廷臣九十九人議皆請如時言帝曰卿等言是顧朕屢請太后未得命乖禮非孝違親亦非孝明日詹事柯潛給事中魏元等上疏又明日䕫等合疏上皆執議如初中㫖猶諭别擇葬地於是百官伏哭文華門外帝命羣臣退衆叩頭不得㫖不敢退自己至申乃得允衆呼萬歳出是年七月上尊諡曰孝莊獻穆𢎞惠顯仁恭天欽聖睿皇后祔太廟九月合𦵏裕陵異隧距英宗元堂數丈許中窒之虛右壙以待周太后其隧獨通而奉先殿祭亦不設后主𢎞治十七年周太后崩孝宗御便殿出裕陵圖示大學士劉健謝遷李東陽曰陵有二隧若者窒若者可通往來皆先朝内臣所為此未合禮昨見成化間彭時姚䕫等章奏先朝大臣為國如此先帝亦不得已耳欽天監言通隧上干先帝陵堂恐動地脈朕已面折之窒則天地閉塞通則風氣流行健等因力贊帝復問祔廟劉健等言祔二后自唐始也祔三后自宋始也漢以前一帝一后曩者定議合祔孝莊太后居左今大行太皇太后居右且引唐宋故事為証臣等以此不敢復論帝曰二后已非况復三后遷曰宋祔三后一繼立一生母也帝曰事須師古太皇太后鞠育朕躬朕豈敢忘顧私情耳祖宗來一帝一后今並祔壞禮自朕始且奉先殿祭皇祖特座一飯一匙而已夫孝穆皇太后朕生母也别祀之奉慈殿今仁壽宫前殿稍寛朕欲奉太皇太后於此他日奉孝穆皇太后於後歳時祭享如太廟於是命羣臣詳議議上將建新廟欽天監奏年方有礙廷議請暫祀周太后於奉慈殿稱孝肅太皇太后廟在奉先殿西帝以祀孝穆至是中奉孝肅而使孝穆居左焉蕙田案孝莊錢后雖係合𦵏祔廟正禮然與孝肅周后别廟事體相關故亦附載使讀者得屬詞比事便省覽焉孝宗本紀成化二十三年九月壬寅即皇帝位冬十月乙亥追尊皇太后周氏為太皇太后十七年三月壬戌太皇太后崩癸未定太廟各室一帝一后之制夏四月己酉𦵏孝肅皇太后孝肅周太后傳后英宗妃憲宗生母也昌平人天順元年封貴妃憲宗即位尊為皇太后二十三年四月上徽號曰聖慈仁壽皇太后孝宗立尊為太皇太后先是憲宗在位事太后至孝五日一朝燕享必親太后意所欲惟恐不懽至錢太后合𦵏裕陵太后殊難之憲宗委曲寛譬乃得請孝宗生西宫母妃紀氏薨太后育之宫中省視萬方及孝宗即位事太后亦至孝𢎞治十七年三月崩諡孝肅貞順康懿光烈輔天承聖睿皇后合𦵏裕陵以大學士劉健謝遷李東陽議别祀於奉慈殿不祔廟仍稱太皇太后嘉靖十五年與紀邵二太后並移祀陵殿題主曰皇后不繫帝諡以别嫡庶其後穆宗母孝恪神宗母孝定光宗母孝靖熹宗母孝和莊烈帝母孝純咸遵用其制成化二十三年冬十月壬辰追諡母淑妃為孝穆皇太后孝穆紀太后傳后孝宗生母也賀縣人本蠻土官女成化中征蠻俘入掖庭授女史警敏通文字命守内藏時萬貴妃專寵而妬後宫有娠者皆治使墮栢賢妃生悼恭太子亦為所害帝偶行内藏應對稱㫖悦幸之遂有身萬貴妃知而恚甚令婢鈎治之婢謬報曰病痞乃謫居安樂堂久之生孝宗使門監張敏溺焉敏驚曰上未有子奈何棄之稍哺粉餌飴蜜藏之他室貴妃日伺無所得至五六歳未敢剪胎髪時吳后廢居西内近安樂堂宻知其事往來哺養帝不知也帝自悼恭太子薨後久無嗣中外皆以為憂成化十一年帝召張敏櫛髪照鏡嘆曰老將至而無子敏伏地曰死罪萬歳已有子也帝愕然問安在對曰奴言即死萬歳當為皇子主于是太監懷恩頓首曰敏言是皇子潛養西内今已六歳矣匿不敢聞帝大喜即日幸西内遣使往迎皇子使至妃抱皇子泣曰兒去吾不得生兒見黄袍有鬚者即兒父也衣以小緋袍乗小輿擁至階下髪披地走投帝懷帝置之膝撫視久之悲喜泣下曰我子也類我使懷恩赴内閣具道其故羣臣皆大喜明日入賀頒詔天下移妃居永壽宫數召見萬貴妃日夜怨泣曰羣小紿我其年六月妃暴薨或曰貴妃致之死或曰自縊也諡恭恪莊僖淑妃敏懼亦吞金死敏同安人孝宗既立為皇太子時孝肅皇太后居仁壽宫語帝曰以兒付我太子遂居仁壽孝宗即位追諡淑妃為孝穆慈慧恭恪莊僖崇天承聖純皇后遷𦵏茂陵别祀奉慈殿禮志奉慈殿孝宗即位追上母妃孝穆太后紀氏諡祔𦵏茂陵以不得祔廟遂於奉先殿右别建奉慈殿以祀一歳五享薦新忌祭俱如太廟奉先殿儀𢎞治十七年孝肅周太后崩先是成化時預定周太后祔𦵏祔祭之議至是召輔臣議祔廟禮劉健等言議誠有之顧當年所引唐宋故事非漢以前制也帝以事當師古乃援孝穆太后别祭奉慈殿為言而命廷臣議健退復疏論其事以堅帝心于是英國公張懋吏部尚書馬文升等言宗廟之禮乃天下公議非子孫得以私之殷周七廟父昭子穆各有配座一帝一后禮之正儀春秋書考仲子之宫胡安國傳云孟子入惠公之廟仲子無祭享之所以此見魯秉周禮先王之制猶存祖廟無二配故也伏睹憲宗勅諭有曰朕心終不自安竊窺先帝至情以重違慈意因勉從並配之議羣臣欲權以濟事亦不得已而為此也據禮區處上副先帝在天遺志端有待於今日稽之周禮有祀先妣之文疏云姜嫄也詩所謂閟宫是已唐宋推尊太后不配食祖廟者則别立廟以享之亦得閟宫之義我朝祖宗迄今已溢九廟配皆無二今宜於奉先殿外建一新廟如詩之閟宫宋之别殿歳時薦享仍稱太皇太后則情義兩盡議上復召健等至素幄䄂出奉先圖指西一區曰此奉慈殿也又指東一區曰此神厨也欲於此地别建廟奉遷孝穆神主併祭於此健等皆對曰最當已而欽天監奏年方有礙廷議暫奉於奉慈殿正中徙孝穆居左及孝宗崩武宗即位禮部始進奉安孝肅神主儀前期致齋三日告奉先殿及孝宗几筵是日早帝具黑翼善冠淺淡色服黑犀帶告孝穆神座禮畢帝詣神座前請神主降座帝捧主立内執事移神座於殿左間帝奉安訖行叩頭禮至午帝詣清寧宫孝肅几筵行禮畢内侍進神主輿于殿前衣冠輿于丹陛上帝詣拜位親王吉服後隨四拜興帝捧神主由殿中門出奉安輿内執事捧衣冠置輿後隨帝率親王步從至寳善門外太皇太后皇太后率宫妃迎於門内先詣奉慈殿序立於殿西神主輿至奉先殿門外少駐帝詣輿前跪請神主詣奉先殿俛伏興捧神主由殿左門入至殿内褥位跪置神主帝行五拜三叩頭禮畢捧神主仍由左門出安輿内至奉慈殿門外帝捧神主由中門入奉安於神座訖行安神禮三獻如常儀太皇太后以下四拜禮畢内侍官設褥位於殿正中之南帝詣孝穆皇太后神座前跪請神主謁孝肅太皇太后跪置於褥位上俛伏興行五拜三叩頭禮畢帝捧主興仍安於神座訖行安神禮如前皇太后以下四拜世宗本紀嘉靖元年三月戊午上皇太后尊號曰壽安皇太后十一月庚申壽安皇太后崩七年秋七月己卯追尊孝惠皇太后曰太皇太后蕙田案孝惠傳生尊為壽安崩諡曰孝惠乃史無上諡一條葢踈漏也孝惠邵太后傳孝惠邵太后憲宗妃興獻帝母也父林昌化人貧甚鬻女於杭州鎮守太監妃由此入宫知書有容色成化十二年封宸妃尋進封貴妃興王之藩妃不得從世宗入繼大統妃已老目眚矣喜孫為皇帝摸世宗身自頂至踵己尊為皇太后嘉靖元年上尊號曰壽安十一月崩帝欲明年二月遷𦵏茂陵大學士楊廷和等言祖陵不當數興工作驚動神靈不從諡曰孝惠康肅温仁懿順協天祐聖皇太后别祀奉慈殿七年七月改稱太皇太后十五年遷主陵殿稱皇后與孝肅孝穆等嘉靖七年十月丁未皇后崩三月丙申𦵏悼靈皇后世宗孝潔皇后傳世宗孝潔皇后陳氏元城人嘉靖元年冊立為皇后帝性嚴厲一日與后同坐張方二妃進茗帝循視其手后恚投杯起帝大怒后驚悸堕娠崩七年十月也䘮禮從殺諡曰悼靈十五年禮部尚書夏言議請改諡時帝意久釋矣乃改諡曰孝潔穆宗即位禮臣議孝潔皇后大行皇帝元配宜合𦵏祔廟若遵遺制祔孝烈則舍元配也若同祔則二后也大行皇帝升祔時宜奉孝潔配遷𦵏永陵孝烈主宜别祀報可隆慶元年二月上尊諡曰孝潔恭懿慈睿安莊相天翊聖肅皇后禮志隆慶元年禮部言舊制太廟一歳五享而節序忌辰等祭則行於奉先殿今孝潔皇后既袝太廟則奉先殿亦宜奉安神位乃設神座儀物於第九室遣官祭告如儀禮志嘉靖元年世宗奉孝惠邵太后祔祀八年二月禮部尚書方獻夫等言悼靈皇后禮宜祔享太廟但今九廟之制己備考唐宋故事后于太廟未有本室則剏别廟故曲臺禮有别廟皇后禘祫於太廟之文又禮記䘮服小記婦祔於祖姑祖姑有三人則祔于親者釋之者曰親者謂舅所生母也今孝惠太皇太后實皇考獻皇帝之生母則悼靈皇后當祔於側詔可三月行祔廟禮先期祭告諸殿至期請悼靈后主詣奉慈殿奉安内侍捧神主諡冊衣冠隨帝至奉先殿謁見帝就位行五拜三叩頭禮次詣崇先殿次詣奉慈殿謁三太后内侍捧主安神座皇妃以下四拜世宗本紀嘉靖十五年九月庚午如天夀山禮志嘉靖十五年帝以三太后别祀奉慈殿不若奉于陵殿為宜廷臣議古天子宗廟唯一帝一后所生母薦於寢身没而已孝宗奉慈殿之祭葢子祀生母以盡終身之孝焉耳然禮妾母不世祭疏曰不世祭者謂子祭之于孫則止明繼祖重故不復顧其私祖母也今陛下於孝肅曾孫也孝穆孫屬也孝惠孫也禮不世祭議當祧考宋熙寧罷奉慈廟故事與今同宜遷主陵廟歳時祔享如故報可奉慈殿遂罷王圻續通考十五年秋遷三太后主於陵殿先是上傳㫖云廟重於陵禮制故嚴今廟凡帝以一后配惟陵則二三后以配𦵏夫如是其廟祀陵祀己不同今復建奉慈殿不如奉主於陵殿為合禮又梓宫既配𦵏於帝主無祔廟之禮宜在陵殿今别置之近於黜者非親之也此亦闗於典禮卿其會議以行明日又諭云崇先殿比古不同周人祀后稷係始祖之母今奉慈殿亦但存名耳四時之祭樂舞俱無便會議來時尚書夏言會同大學士李時武定侯郭勛吏部侍郎張邦奇等議謂禮嚴尊祖祀重廟享自古天子惟一帝一后配享於廟所生大母别薦于寢身殁而已斯禮之正是故禮有享先妣之文周之閟宫宋之别殿皆此義也國朝制稽古惟一后配帝禮莫嚴焉孝宗皇帝乃於奉先殿側特建奉慈殿别祭孝穆皇太后後祔孝肅太皇太后近復祔孝惠皇太后是葢子祀生母以盡終身之孝焉耳然禮於妾母不世祭者謂子祀之於孫則止葢父之所尊子不可以不承父之所異子不敢同明其宗耳葢繼祖重故不復顧其私祖母也今日陛下於孝肅太皇后曾孫也於孝穆太皇后孫屬也孝惠皇太后孫也禮不世祭義當擬祧若崇先殿之建則陛下事考廟當世享故世廟配太廟而作崇先殿配奉先殿而作也義不侔矣聖諭又以三太后梓宫既配𦵏於帝主不祔廟世不舉祭議欲遷主陵殿使獲所安是誠仁至義盡情中禮得足定天下之大典也臣等復考得宋熙寧罷奉慈廟故事與今事體略同但祧義惟遷主為是若當時瘞主陵園則襲古人栗主既立乃埋桑主之説而誤用之非禮也今遷主陵殿歳時祔享陵祀如故尤為曲盡非前代所及制曰可十五年八月上親幸天夀山奉安三太后於陵殿十五年禮部尚書夏言等奏悼靈皇后神主先因祔於所親暫祔奉慈殿孝惠太后之側兹三后神主既擬遷於陵殿則悼靈亦宜暫遷奉先殿旁室享祀祭告則一體設饌從之世宗本紀嘉靖二十六年十一月乙未皇后崩二十七年五月丙戌𦵏孝烈皇后二十九年冬十月祧仁宗祔孝烈皇后於太廟孝烈皇后傳孝烈皇后方氏世宗第三后也江寧人張后廢遂立為后二十一年宫婢楊金英等謀弑逆帝賴后救得免二十六年十一月乙未后崩詔曰皇后比救朕危奉天濟難其以元后禮𦵏預名𦵏地曰永陵諡孝烈親定諡禮視昔加隆焉禮成頒詔天下及大祥禮臣請安主奉先殿東夾室帝曰奉先殿夾室非正也可即祔太廟於是大學士嚴嵩等請設位於太廟東皇妣睿皇后之次後寢藏主則設幄于憲廟皇祖妣之右以從祔於祖姑之義帝曰祔禮至重豈可權就后非帝乃配帝者自有一定之序安有享從此而主從彼之禮其祧仁宗祔以新序即朕位次勿得亂禮嵩曰祔新序非臣下所敢言且隂不可當陽位乃命姑藏主睿皇后側二十九年十月帝終欲祔后太廟命再議尚書徐階言不可給事中楊思忠是階議餘無言者帝覘知狀及議疏入謂后正位中宫禮宜祔享但遽及廟次則臣子之情不唯不敢實不忍也宜設位奉先殿帝震怒階思忠惶恐言周建九廟三昭三穆國朝廟制同堂異室與周禮不同今太廟九室皆滿若以聖躬論仁宗當祧固不待言但此乃異日聖子神孫之事臣聞夏人之廟五商以七周以九禮由義起五可七七可九九之外亦可加也請於太廟及奉先殿各增二室以祔孝烈則仁宗可不必祧孝烈皇后可速正南面之位陛下亦無預祧以俟之嫌帝曰臣子之誼當祧當祔力請可也茍禮得其正何避豫為于是階等復會廷臣上言唐虞夏五廟其祀皆止四世周九廟三昭三穆然而兄弟相及亦不能盡足六世今仁宗為皇上五世祖以聖躬論仁宗於禮當祧孝烈皇后於禮當祔請祧仁宗祔孝烈皇后於太廟第九室因上祧祔儀注己而請忌日祭帝猶銜前議報曰孝烈繼后所奉者又入繼之君忌不祭亦可階等請益力帝曰非天子不議禮后當祔廟居朕室次禮官顧謂今日未宜徒飾説以惑衆聽因諭嚴嵩等曰禮官從朕言勉强耳即不忍祧仁宗且置后主别廟將來由臣下議處忌日令奠一巵酒不至傷情于是禮臣不敢復言第請如勅行乃許之隆慶初與孝潔皇后同日上尊諡曰孝烈端順敏恭惠誠祗天衞聖皇后移主𢎞孝殿禮志世宗孝烈后隆慶時祀𢎞孝殿萬歴三年遷祔奉先殿萬歴三年帝欲以孝烈孝恪二后神位奉安於奉先殿禮官謂世宗時議祔陵祭不議祔内殿帝曰奉先殿見有孝肅孝穆孝惠三后神位俱皇祖所定宜遵行祔安葢當時三后既各祔陵廟仍并祭于奉先殿而外廷莫知也命輔臣張居正等入視居正等言奉先殿奉安列聖祖妣凡推尊為后者俱得祔享内殿比之太廟一帝一后者不同今亦宜奉安祔享從之穆宗母孝恪皇太后隆慶初祀神霄殿又祔孝懿后於其側六年孝懿祔太廟萬歴三年孝恪遷祔奉先殿二殿俱罷蕙田案孝懿穆宗元配也薨於嘉靖三十七年四月穆宗即位追諡孝懿皇后時帝在位故權祔於孝恪之側後祔太廟明會典萬歴三年奉孝烈皇后及孝恪皇太后祔饗奉先殿其神主並遷於永陵改題孝恪神主曰孝恪淵純慈懿恭順贊天開聖皇后二后神位即以遷詣陵殿之日安於奉先殿而𢎞孝神霄之祭俱罷春明夢餘録萬歴三年上諭禮官曰朕思𢎞孝神霄二殿皇祖妣孝烈皇后孝恪皇太后神位宜奉安於奉先殿祔饗查議來行禮部查嘉靖十五年議祔陵祭不議祔内殿上曰奉先殿今見有孝肅孝穆孝惠三后神位俱係我皇祖欽定宜遵照祔安不必另擬乃奉安孝烈孝恪神位於肅皇帝室併罷𢎞孝神霄之祀而專祀於奉先殿孝恪杜太后傳后穆宗生母也大興人嘉靖十年封康嬪十五年進封妃三十三年正月薨穆宗立上諡曰孝恪淵純慈懿恭順贊天開聖皇太后遷𦵏永陵祀主神霄殿神宗本紀萬歴二十四年七月戊寅仁聖皇太后崩九月乙卯𦵏孝安莊皇后孝安皇后𫝊孝安皇后陳氏通州人嘉靖三十七年九月選為裕王繼妃隆慶元年册為皇后后無子多病居别宫神宗即位上尊號曰仁聖皇太后六年加上貞懿十年加康静二十四年七月崩諡曰孝安貞懿恭純温惠佐天𢎞聖皇后祀奉先殿别室四十二年二月辛卯慈聖皇太后崩六月甲午𦵏孝定皇后孝定李太后傳孝定李太后神宗生母也漷縣人侍穆宗於裕邸隆慶元年三月封貴妃生神宗即位上尊號曰慈聖皇太后三月加尊號曰宣文十年加明肅十二年同仁聖太后謁山陵二十九年加貞夀端獻三十四年加恭熹四十二年二月崩上尊諡曰孝定貞純欽仁端肅弼天祚聖皇太后合𦵏昭陵别祀崇先殿孝靖王太后𫝊孝靖皇太后光宗生母也初為慈寧宫宫人年長矣帝過慈寧私幸之有身十年四月封恭妃八月光宗生是為皇長子既而鄭貴妃生皇三子進封皇貴妃而恭妃不進封二十九年冊立皇長子為皇太子仍不封如故三十四年元孫生加慈聖徽號始進封皇貴妃四十年病革光宗請㫖得往省宫門猶閉抉鑰而入妃目眚手光宗衣而泣曰兒長大如此我死何恨遂薨光宗即位下詔曰朕嗣承基緒撫臨萬方遡厥慶源則我生母温肅端靖純懿皇貴妃恩莫大焉朕昔在青宫莫親温凊今居禁闥徒痛桮棬欲伸罔極之深悰惟有聿稱乎殷禮其凖皇祖穆宗皇帝尊生母榮淑康妃故事禮部詳議以聞會崩熹宗即位上尊諡曰孝靖温懿敬讓貞慈參天允聖皇太后遷𦵏定陵祀奉慈殿蕙田案孝靖薨𦵏追諡本紀俱不載兹特採傳以補其闕熹宗本紀天啓元年十一月丙子追諡生母孝和皇太后孝和王太后傳孝和王太后熹宗生母也順天人侍光宗東宫為選侍萬歴三十二年進才人四十七年三月薨熹宗即位上尊諡曰孝和恭獻温穆徽慈諧天鞠聖皇太后遷𦵏慶陵祀奉先殿崇禎十一年三月以加上孝純太后尊諡於御用監得后及孝靖太后玉冊玉寳始命有司獻於廟忠賢黨王體乾坐怠玩論死葢距上諡時十有八年矣莊烈帝本紀崇禎元年九月甲申追諡生母賢妃曰孝純皇后孝純劉太后傳孝純劉太后莊烈帝生母也海州人後籍宛平初入宫為淑女萬歴三十八年十二月生莊烈皇帝已失光宗意被譴薨光宗中悔恐神宗知之戒掖庭勿言𦵏於西山及莊烈帝長封信王追進賢妃時莊烈帝居朂勤宫問近侍曰西山有申懿王墳乎曰有傍有劉娘娘墳乎曰有每宻付金錢往祭及即位上尊諡曰孝純恭懿淑穆莊静毗天毓聖皇太后遷𦵏慶陵帝五歳失太后問左右遺像莫能得傅懿妃者舊與太后同為淑女比宫居自稱習太后言宫人中狀貌相類者命后母瀛國太夫人指示畫工可意得也圖成由正陽門具法駕迎入帝跪迎于午門懸之宫中呼老宫婢視之或曰似或曰否帝雨泣六宫皆泣故事生母忌日不設祭不服青十五年六月帝以太后故欲追前代生繼七后同建一廟以展孝思乃御德政殿召大學士及禮臣入問曰太廟之制一帝一后祧廟亦然歴朝繼后及生母凡七位皆不得與即宫中奉先殿亦尚無祭奈何禮部侍郎蔣德璟曰奉先殿外尚有奉慈殿所以奉繼后及生母者雖廢可舉也帝曰奉慈殿外尚有𢎞孝神霄本恩諸殿德璟曰内廷規制臣等未悉孝宗建奉慈殿嘉靖間廢之今未知尚有舊基否帝曰奉慈已撤惟奉先尚可拓也於是别置一殿祀孝純及七后云春明夢餘録崇禎十五年五月十七日上傳禮部堂上官禮科太常寺卿來中左門曰太廟之制一帝一后計九廟此外祧廟亦有九亦止一帝一后因屈指數自德懿熙仁四祖外仁宣英憲孝共九祧廟已滿各一帝一后其繼后及生母后七位即不得入太廟亦並無祧廟之主即宫中奉先殿亦原止一帝一后嘉靖後有以繼后生母后入者而以前七位尚無祭也上意似在生母孝純皇太后而又推及七位后悉入奉先殿亦未明言也禮臣林欲楫蔣德璟王錫衮奏奉先之外别有奉慈殿祀繼后及生母后處今雖廢尚可舉行上曰奉慈殿外尚有𢎞孝殿神霄宫本恩殿禮臣奏奉慈殿如未可復即在神霄殿奉祀未知可否上曰太廟一帝一后朕不敢輕動還只是奉先尚可恢拓前後加一層即祧廟亦當祫祭德璟奏大祫之禮歳暮已行於太廟似已妥當且奉先原只一帝一后與太廟同若並祧廟之主俱入未知妥否上曰奉先殿現有繼后及生母后七位璟奏此萬歴初添入上黙然此舉雖屬孝思然自古無二祧廟再建非禮也賴部上疏奏得止右明后妃廟後漢書光武本紀中元元年上薄太后尊號曰髙皇后遷吕后廟主於園蕙田案此入而復出之始祭祀志永元中以竇后配食章帝蕙田案兩漢皇后祔廟史俱不載惟見此兩條晉書禮志延康元年文帝繼王位七月追尊皇祖夫人曰太王后明帝太和三年六月又追尊髙祖夫人吳氏曰髙皇后並在鄴廟之所祠武帝泰始元年十二月景寅受禪丁卯追尊宣王妃張氏為宣穆皇后武帝本紀泰始二年冬十一月追尊景帝夫人夏侯氏為景懷皇后文明王皇后傳武帝受禪尊為皇太后宫曰崇化咸寧四年崩將遷祔帝手疏后徳行令史官為哀䇿元帝本紀太興三年八月戊午尊敬王后虞氏為敬皇后辛酉遷神主於太廟元敬虞皇后傳永嘉六年薨帝為晉王追尊為王后太興三年遣使持節兼太尉萬勝奉冊贈皇后璽綬祔於太廟蕙田案此帝在位而后先入廟之始成帝本紀咸康八年三月初以武悼楊皇后配饗武帝廟蕙田案二后並祔葢始於此劉健言祔二后自唐始葢誤記也諸臣之議詳載后妃廟中宋書武帝紀永初元年六月即皇帝位追尊皇妣為穆皇后禮志宋武帝初為宋王建宗廟於彭城初祠髙祖曾祖皇祖皇考武敬臧后永初初追尊皇妣趙氏為穆皇后三年孝懿蕭皇后崩又祔廟齊書禮志太祖即位立七廟廣陵府君太中府君淮隂府君即邱府君太常府君宣皇帝昭皇后為七廟蕙田案此以父母分兩廟建元二年太祖親祀太廟六室如儀拜伏竟至昭后室前儀注應倚立上以為疑欲使廟僚行事又欲以諸王代祝令於昭后室前執爵以問彭城丞劉瓛瓛對謂若都不至昭后坐前竊以為薄廟僚即是代上執爵饋奠耳祝令位卑恐諸王無容代之舊廟儀諸王得兼三公親事謂此為便從之蕙田案后先入廟以夫祭妻所以疑其儀注隋書禮儀志梁武初為梁公乃建臺於東城立四親廟并妃郗氏而為五廟梁書武帝紀天監元年四月丙寅即皇帝位追尊皇妣為獻皇后追諡妃郗氏為德皇后陳書髙祖本紀永定元年十月辛巳追尊皇妣董太夫人曰安皇后北魏書平文皇后王氏傳昭成十八年崩太祖即位配饗太廟昭成皇后慕容氏傳建國二十三年崩太祖即位配饗太廟獻明皇后賀氏傳皇始元年崩後追加尊諡配饗焉道武宣穆皇后劉氏傳太祖末年薨太宗即位追尊諡號配饗太廟自此後宫人為帝母皆正位配饗焉明元宻皇后杜氏傳泰常五年薨諡曰宻世祖即位追尊號諡配饗太廟太武敬哀皇后賀氏傳神䴥元年薨後追加號諡配饗太廟景穆恭皇后郁乆閭氏傳世祖末年薨髙宗即位追尊號諡配饗太廟文成元皇后李氏傳薨後諡曰元皇后配饗太廟獻文思皇后李氏傳皇興三年薨承明元年追崇號諡配饗太廟孝文昭皇后髙氏傳后自代如洛陽暴薨世宗踐祚尊崇配饗孝莊本紀永安二年二月甲午尊皇妣為文穆皇后四月癸未遷神主於太廟蕙田案魏及元明三史后妃入廟傳中無不書者最為詳悉北齊書文宣帝紀天保元年五月戊午即皇帝位追尊皇祖妣為文穆皇后周書孝閔帝紀元年正月辛丑即天王位追尊皇妣為文后隋書髙祖紀開皇元年二月甲子即皇帝位追尊皇妣為元明皇后唐書髙祖紀武德元年六月己卯追諡祖妣梁氏曰景烈皇后妣􅍦孤氏曰元貞皇后舊唐書禮儀志太常卿姜皎曰伏見太廟中則天皇后配髙宗天皇大帝題云天后聖帝武氏請除聖帝之字直題云則天皇后武氏從之景雲元年祔和思皇后趙氏神主於太廟唐書睿宗昭成順聖皇后竇氏傳后以子貴故先祔睿宗室肅明以開元二十年乃得祔廟蕙田案先祔妾母繼祔嫡母此嫡妾並祔之始順宗莊憲皇后王氏傳后暴崩咸通中詔后主祔於廟穆宗宣懿皇后韋氏傳武宗立追冊為皇太后奉后合食穆宗室五代史梁本紀太祖開平元年秋七月己亥追尊祖考為皇帝妣為皇后皇髙祖妣范氏諡曰宣僖曾祖妣楊氏諡曰光孝祖妣劉氏諡曰昭懿妣王氏諡曰文惠唐本紀莊宗同光元年追尊祖考為皇帝妣為皇后曾祖妣崔氏諡曰昭烈祖妣秦氏諡曰文景晉本紀髙祖天福二年追尊祖考為皇帝妣為皇后髙祖妣秦氏諡曰孝安曾祖妣安氏諡曰孝簡祖妣來氏諡曰孝平妣何氏諡曰孝元漢本紀二月辛未即皇帝位稱天福十二年閏七月庚辰追尊祖考為皇帝妣為皇后髙祖妣李氏諡曰明貞曾祖妣楊氏諡曰恭惠祖妣李氏諡曰昭穆妣安氏諡曰章懿周本紀廣順元年五月辛未追尊祖考為皇帝妣為皇后髙祖妣張氏諡曰睿恭曾祖妣申氏諡曰明孝祖妣韓氏諡曰翼敬妣王氏諡曰章德宋史太祖紀乾德元年九月丙午奉玉冊諡髙祖妣崔氏曰文懿皇后曾祖妣桑氏曰惠明皇后祖妣劉氏曰簡穆皇后禮志建隆二年十月祔明憲皇后杜氏於宣祖室太祖孝惠賀皇后傳建隆三年四月追冊為皇后神宗時祔太廟孝明王皇后傳乾德元年十二月崩太平興國二年祔享太廟孝章宋皇后傳至道元年四月崩神宗時升祔太廟太宗淑德尹皇后傳帝即位追冊為皇后後升祔太廟懿德符皇后傳帝即位追冊為皇后至道三年升祔太廟明德李皇后傳景德元年崩三年祔太宗廟李賢妃傳真宗即位進上尊號曰皇太后大中祥符六年升祔太廟章穆郭皇后傳景德四年崩仁宗即位升祔真宗廟仁宗本紀慶歴五年十月辛酉祔章獻明肅皇后章懿皇后神主於太廟章獻明肅劉皇后傳明道元年崩慶歴五年翰林學士王堯臣等請二后祔序於章穆之次從之李宸妃傳明道元年薨後章獻太后崩尊為皇太后慶歴中升祔太廟禮志元豐三年二月慈聖光獻皇后祔廟紹聖元年二月祔宣仁聖烈皇后於太廟徽宗本紀建中靖國元年五月丙戌祔欽聖獻肅皇后欽慈皇后神主於太廟崇寜元年六月己丑祔欽成皇后神主於太廟二年三月甲午躋欽成皇后神主於欽慈皇后之上政和三年六月癸卯袝昭懐皇后神主於太廟髙宗本紀紹興元年八月丁丑祔昭慈獻烈皇后神主於温州太廟哲宗昭慈聖獻孟皇后傳紹興元年崩祔神主於哲宗室位在昭懐皇后上徽宗顯恭王皇后傳大觀二年崩諡曰靜和紹興中始祔徽宗廟改今諡鄭皇后傳從上皇北遷崩於五國城紹興七年何蘇等使還始知諡顯肅祔主徽宗室髙宗本紀紹興二十九年十二月甲子祔顯仁皇后神主於太廟韋賢妃傳紹興二十九年崩祔神主太廟徽宗室欽宗朱皇后傳后既北遷不知崩問慶元三年上尊諡仁懐祔於太廟髙宗憲節刑皇后傳紹興九年后崩於五國城淳熙末祔髙宗廟孝宗成穆郭皇后傳紹興二十六年薨及受禪追冊為皇后諡恭懐尋改安穆又改成穆祔孝宗廟寧宗本紀紹熙五年上成穆皇后成恭皇后冊寳於本室慶元四年四月丙戌祔仁懐皇后神主慈烈皇后神主於太廟六年九月壬寅祔慈懿皇后神主於太廟開禧三年九月壬寅祔成肅皇后神主於太廟蕙田案寧宗以前宋之諸后自温成外無不入廟者若太祖之孝惠孝明孝章神宗之欽聖欽成欽慈徽宗之顯恭顯肅顯仁孝宗之成穆成恭成肅此三后並祔也太宗之淑德懿徳明德元德真宗之章懐章穆章獻章懿此四后並祔也金史熙宗本紀天會十四年八月丙辰追尊九代祖以下曰皇帝皇后禮志天會十四年八月庚戌上皇九代祖妣曰明懿皇后皇八代祖妣曰思皇后皇七代祖妣曰節皇后皇六代祖妣曰恭靖皇后皇五代祖妣曰威順皇后皇髙祖妣曰昭肅皇后皇曾祖妣曰簡翼皇后皇曾叔祖妣曰静宣皇后皇曾叔祖妣曰貞惠皇后皇伯祖妣曰敬僖皇后丙辰奉上尊諡大定二十九年五月祧獻祖昭祖升祔世宗明德皇后顯宗於廟明昌三年十二月尚書省奏明年親禘室當用犢一欽懐皇后祔於明德之廟昭聖皇后劉氏傳大定三年三月生宣宗卒宣宗即位尊為皇太后升祔顯宗廟元史祭祀志至元三年命平章政事趙壁等集議製尊諡廟號定為八室烈祖神元皇帝皇曾祖妣宣懿皇后第一室太祖聖武皇帝皇祖妣光獻后第二室太宗英文皇帝皇伯妣昭慈皇后第三室皇伯珠齊皇伯妣布屯綽克黙色第四室皇伯考察哈岱皇伯妣伊蘓婁第五室皇考睿宗景襄皇帝皇妣莊聖皇后第六室定宗簡平皇帝欽淑皇后第七室憲宗桓肅皇帝貞節皇后第八室十二年改作金主太祖主題曰青吉斯皇帝睿宗題曰太上皇伊克諾延皇后皆題名諱太宗昭慈皇后傳至元二年崩升祔太宗廟憲宗貞淑皇后傳至元二年追諡升祔憲宗廟世祖昭睿順聖皇后傳成宗即位追諡升祔世祖廟祭祀志元貞元年冬十月癸卯有事於太廟中書省臣言去歳世祖皇帝裕宗祔廟以綾代玉冊今玉冊玉寳成請納之各室命獻官迎導入廟成宗大德四年八月以皇妣皇后祔武宗本紀大德十一年五月甲申即皇帝位尊太母元妃曰皇后六月丁酉先元妃鴻吉哩氏實哩達喇宜諡曰貞慈静懿皇后祔成宗廟室祭祀志大德十一年武宗即位追尊先元妃為皇后祔成宗室蕙田案成宗大德十一年春崩皇后巴約特珍氏謀立安西王阿南達武宗即位廢居東安州賜死故以成宗元妃鴻吉哩氏升祔焉妃葢成宗元配未即位而先薨者英宗本紀至治二年十二月丙戌定諡太皇太后曰昭獻元聖遣太常院使多台以諡議告於太廟至治三年三月戊申祔昭獻元聖皇后於順宗室晉王即皇帝位追尊皇考晉王為皇帝廟號顯宗皇妣晉王妃為皇后武宗宣慈惠聖皇后傳泰定四年十一月崩升祔武宗廟祭祀志泰定四年諡武宗皇后曰宣慈惠聖英宗皇后曰莊靜懿聖祔太廟仁宗莊懿慈聖皇后𫝊至治二年崩升祔仁宗廟祭祀志泰定元年奉安仁宗及慈聖皇后二神主寧宗達哩伊徳黙色皇后傳至正二十八年崩升祔寧宗廟順帝本紀元統元年十月庚寅中書省臣請集議武宗英宗明宗三朝皇后升祔武宗一室以珍格皇后配焉明史禮志洪武元年上皇髙祖妣曰元皇后皇曾祖妣曰恒皇后皇祖妣曰裕皇后皇妣陳氏曰淳皇后十五年以孝慈皇后神主祔享太廟成祖仁孝徐皇后傳永樂五年七月乙卯崩仁宗即位祔太廟仁宗誠孝張皇后傳正統七年十月崩祔太廟宣宗孝恭孫皇后傳天順六年九月崩祔太廟英宗孝莊錢皇后傳成化四年六月太后崩七月祔太廟蕙田案當時大臣廷諍事載入后妃廟中憲宗孝貞王皇后傳正德十三年二月崩祔太廟孝宗孝康張皇后傳嘉靖二十年八月崩祔廟武宗孝靜夏皇后傳嘉靖十四年崩祔廟世宗孝潔陳皇后傳崩七年十月也穆宗即位禮臣議孝潔皇后大行皇帝元配宜合𦵏祔廟報可孝烈方皇后傳嘉靖二十六年十一月乙未崩祧仁宗祔於太廟隆慶初移主𢎞孝殿蕙田案此已祔而復出者其事詳載后妃廟穆宗孝懿李皇后傳嘉靖三十七年四月薨穆宗即位諡曰孝懿皇后神宗即位祔太廟神宗孝端王皇后傳萬歴四十八年四月崩光宗即位袝廟光宗孝元郭皇后傳萬歴四十一年十一月薨熹宗即位祔廟右后妃升祔五禮通考卷一百四
