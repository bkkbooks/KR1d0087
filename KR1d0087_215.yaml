body:
  text: 五禮通考卷二百五刑部尚書秦蕙田撰嘉禮七十八體國經野書禹貢導河積石至于龍門錐指傅氏曰自積石至于龍門計應三千餘里龍門而上積石而下禹功所不加也南至于華隂錐指河自龍門南流至華州北而東行易氏曰河自龍門口又二百里至陜州之西北對河為華州華隂縣蔡氏曰華隂華山之北也東至于底柱錐指傳曰底柱山名河水分流包山而過山見水中若柱然在西虢之界渭案西虢今河南府之陜州是也底柱在州東四十里黃河中又東至于孟津錐指傳曰孟津地名在洛北都道所湊古今以為津正義曰在孟地置津謂之孟津傳云地名謂孟為地名耳杜預云孟津河內河陽縣南孟津也在洛陽城北都道所湊古今常以為津武王渡之渭案河陽本晉邑漢置縣屬河內郡其故城在今河南懷慶府孟縣西南三十里東過洛汭至于大伾錐指傳曰洛汭洛入河處山再成曰伾至於大伾而北行正義曰洛入河處河南鞏縣東也鄭玄云大伾在修武武德之界張揖云成臯縣山也漢書音義有臣瓉者以為修武武德無此山也成臯縣山又不一成今黎陽縣山臨河豈不是大伾乎瓉言當然程氏曰黎陽山在大河垂欲北趨之地經之於河方其自南而東嘗即華隂以記折東之始今其流東已逺垂欲折北亦當以地之極東者記之參揣其敘則黎陽實為愜當而成臯則為太早也渭案鞏縣漢屬河南郡其故城在今河南府鞏縣西南三十里修武武德漢屬河內郡修武故城在今衛輝府獲嘉縣西北武德故城在今懷慶府武陟縣東成臯漢屬河南郡其故城在今開封府鄭州汜水縣西北黎陽漢屬魏郡其故城在今大名府濬縣東北大伾山在縣東南二里地理今釋大伾山亦名黎山在今直𨽻大名府濬縣東南二里周五里北過降水至於大陸錐指傳曰降水水名入河渭案宋張洎云降水即濁漳也字或作絳地理志上黨屯留縣下云桑欽言絳水出西南東入海酈道元引此文作入漳云絳水發源屯留下亂漳津與漳俱得通稱也通典云漳水橫流而入河在今廣平郡肥鄉縣界大陸地名見冀州河渠書云禹道河至於大伾以為河所從來者髙水湍悍難以行平地數為敗乃厮二渠以引其河北載之髙地過降水至於大陸二渠其一為漯川自黎陽大伾山南東北流至千乘入海其一則河之經流自大伾山西南折而北為宿胥口又東北徑鄴縣東至列人斥章縣界合漳水是為北過降水溝洫志王橫曰禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿宜更開空使緣西山足乘髙地而東北入海即此道也水經所敘漳水自平恩以下皆禹河之故道河自斥璋又東北徑平恩曲周以至巨鹿其西畔為大陸也漢巨鹿縣唐為平鄉巨鹿二縣屬邢州今屬順德府巨鹿故城即今平鄉縣治地理今釋降今本作洚水出今山西潞安府屯留縣西南八十里盤秀嶺至潞安府潞城縣入濁漳水而濁漳水由是亦名降矣胡氏渭曰禹河自汲縣東北流入黎陽縣界至大伾山西南折而北為宿胥口蘇代曰決宿胥之口魏無虛頓丘虛在朝歌界今濬縣西南有古朝歌城本殷虛頓丘在黎陽界今濬縣西有頓邱故城本衛邑時河已徙而東宿胥口塞故秦欲決之以灌二邑水經河水注云自淇口東至遮害亭亭在濬縣西南五十里又有宿胥口舊河水北入也淇水注云淇水東流徑枋城南在今濬縣西南即淇門渡也右合宿胥故瀆瀆受河於頓丘縣遮害亭東黎山西句北會淇水處立石堰遏水令更東北注魏武開白溝因宿胥故瀆而加功故蘇代曰決宿胥之口魏無虛頓丘即指是瀆也淇水又東北徑雍榆城南在濬縣西南又東北徑同山東在濬縣西南四十五里又北徑其城東東北徑帝嚳冡西元和志帝嚳陵在澶州頓邱縣北三十里又北徑白祠山東歷廣陽里徑顓頊冡西元和志顓頊陵在頓邱縣西北三十五里又北徑頓丘縣故城西在濬縣西又東北徑枉人山東牽城西湯隂縣志云枉人山在縣東南二十五里與濬縣接界又東北徑石柱岡枉人山北連跨巨岡石柱之類也又東過內黃縣南為白溝也即漢志清河今案宋李垂上導河形勢書請自汲郡東推禹故道出大伾上陽三山之間復西河故瀆酈道元所謂宿胥故瀆也濬縣舊志故瀆在縣西十里亦曰西河蓋禹迹漢時則流經縣東又縣北四十里有齊村相傳亦黃河故道也然淇水自東過內黃縣南為白溝而向北之河道不可得聞據本注云內黃縣故城右對黃澤即賈讓所見內黃界中有澤方數十里環之有隄者也內黃故城在今縣西北澤大方數十里當接安陽縣界疑此地亦禹河之所經河徙乃鍾為黃澤耳昔殷王河亶甲居相其子祖乙圮焉而又遷書序仲丁遷於囂河亶甲居相祖乙圮於耿傳云相地名在河北祖乙亶甲子圯於相遷於耿河水毁曰圯通典相州治安陽縣殷王河亶甲居相即其地元和志相州內黃縣東南十三里有故殷城河亶甲居相築此則禹河出內黃安陽之間明矣自此而北則為鄴東之故大河洹水注云洹水出上黨徑鄴縣南殷墟北竹書紀年曰盤庚即位自奄遷於此遂曰殷也據書序盤庚所遷之殷在河南與竹書異孔穎達云盤庚後王或有從河南亳地遷於洹水之南者非盤庚也今案楚語白公子張曰昔殷武丁能聳其德至於神明以入於河自河徂亳韋昭云從河內徙都亳也此必盤庚後王有自亳遷於奄者又有自奄遷於鄴南之殷者故武丁即位時殷都仍在河北尋復徂亳蓋亦圮而遷焉殷本紀曰武乙復去亳徙河北即紂都朝歌也武丁自鄴南復遷於亳至武乙則又自亳遷於朝歌淇水注引晉書地道記謂武丁遷居沫邑蓋誤以武乙為武丁耳禹河行臨漳之東又明矣自此東北歷成安至肥鄉而合漳是為北過降水也漳絳至此并為河矣及河南徙漳絳循河故道而下故東川復有漳絳之目水經注漳水自斥漳縣南至銅馬祠東寰宇記銅馬祠在巨鹿北七里皆漢巨鹿縣境也昔殷王祖乙遷於邢杜佑云即邢州今為順德府蓋亦瀕河之地故其後盤庚又圮而遷於亳殷書序祖乙圮於耿又祖乙傳云圮於相遷於耿殷本紀云祖乙遷於邢其説不同按耿在漢河東皮氏縣今為河津縣地傳直以圮為遷未安從史記較長抑或序圮於耿下脫遷於邢三字皇極經世云祖乙踐位圮於耿徙居邢此説是也仲丁河亶甲盤庚皆為遷事作書祖乙但圮而不遷何用作書其為遷邢而作無疑矣禹河行巨鹿之東又明矣以今輿地言之河自濬縣西南折而北歷內黃並屬直𨽻大名府湯隂安陽臨漳並屬河南彰德府魏縣屬直𨽻大名府成安肥鄉曲周並屬廣平府平鄉廣宗至巨鹿縣並屬順德府大陸澤在焉此即禹河北過降水至於大陸之故道也又北播為九河錐指傳曰北分為九河以殺其溢在兖州界渭案徒駭與冀分水八枝皆在兖域同為逆河入于海錐指傳曰同合為一大河名逆河而入于渤海蘇氏曰逆河者既分為九又合為一以一迎八而入于海即渤海也薛氏曰河入海處舊在平州石城縣東望碣石其後大風逆河皆漸于海舊道堙矣渭案石城縣唐初析平州盧龍縣地置其故城在今直𨽻永平府灤州南三十里蕙田案東過洛汭至於大伾北過洚水至於大陸又北播為九河同為逆河入于海此草九字中盡豫兖冀三州境內河所經行處矣洛汭在孟津之東即今鞏縣洛水從南來入河處也大伾在今濬縣洚水即清濁二漳水肥鄉曲周之境漳水入河處也大陸地名亦澤名在今巨鹿縣河從此東北行即分而為九九河在周已無其迹今著書家旁稽博考略得其槩終不能一一實指其地惟北為徒駭即經流南為鬲津當不謬耳逆河即九河會為一河入海處以海潮逆上故名當在今天津以東久為海水所沒無其地矣禹河初行之地此止就孟津以下言之在當時為冀豫兖三州之境以今地理言之則洛陽鞏縣原武陽武胙城皆在河之南濬縣內黃魏縣元城南宫冀州皆在河之東衡水武邑交河滄州又在河之南武陟獲嘉新鄉皆在河之北衛輝湯隂彰德臨漳成安肥鄉曲周巨鹿新河皆在河之西束鹿深州武強獻縣大城青縣天津皆在河之北此神禹初平水土大河所行境界也附黃河考河源發于崑崙禹貢曰導河自積石司馬遷云言九州山川尚書近之矣今曰河源發於崑崙者從其可信者言之也爾雅河出崑崙虛淮南子崑崙之墟河水出其東北陬水經注亦曰崑崙墟河水所出自古言河源者皆推本于崑崙史記大宛傳漢使窮河源河源出于闐天子按古圖書名河所出山曰崑崙漢書西南夷傳河兩源一源蔥嶺一出于闐鄭樵遂謂河有三源一出蔥嶺一出于闐南山其正源自崑崙又山海經洛書緯及扶南傳皆曰河出崑崙唐史長慶中劉元鼎為盟會使言河之上流由洪濟橋亦曰洪濟城在陜西西寧衛西南行千三里水益狹冬春可涉夏秋乃勝舟其南三百里有三山中髙而四下曰紫山直大羊同國今在西番朵甘衛古所謂崑崙者也虜曰悶摩黎山東距長安萬五千里河源其間流澄緩下稍合衆流水色赤行益逺他水并注則濁河源東北直莫賀延磧尾今西番火州境有莫賀城隱測其地蓋劍南之西元志至元十七年命招討使都實求河源實還報謂河源出吐蕃朵甘思西鄙有泉百餘泓沮洳散渙弗可逼視方可七八十里登髙望之如列星然是為星宿海也番名火敦腦兒羣流奔湊連滙二澤番名阿剌腦兒東流曰赤賔河益引而東凡二三百里羣川次第流合焉其流浸大遂名黃河然水淺可涉又東一二百里岐為九渡河通廣五七里又東五百里水益濁土人抱革囊乘馬以渡自是經兩山峽間廣可一里二里或半里其深叵測至朵甘思東北有大雪山番名亦耳麻不剌譯言騰乞里塔其山最髙多積雪即崑崙也自九度水至崑崙約二十日程崑崙山麓綿亘五百里河隨山足而東河源考河水北行至崑崙轉西北流又折而過崑崙北乃折而東北流又東北流千餘里有細黃河自西南來注之番名納鄰哈剌又東北四五百里至貴德州在西寧衛西南又四百餘里至積石州即禹貢導河之處矣自發源入中國計六千餘里南北溪澗絡繹灌注莫知紀極崑崙之西人鮮少山平水漫其東益髙地漸下至積石方林木暢茂世言河九折彼地有二折焉王氏鏊嘗言天下之山起于崑崙天下之水亦宜出于崑崙漢張騫歷西域諸國甚久東漢之世大秦條支安息至于海濵四萬里分重譯貢獻甘英嘗窮臨西海而還皆未覩所謂崑崙者元使所言何崑崙之近乎恐未可以一人之言廢千古之論也夫張騫固已鑿空甘英亦非專使考劉元鼎之説參以都實所見河源庶幾可考又曰河源本在西南張騫求之西北所謂差之毫釐謬以千里者歟地理今釋崑崙山在今西蕃界有三山一名阿克坦齊禽一名巴爾布哈一名巴顔喀拉總名枯爾坤譯言崑崙也在積石之西河源所出案漢書地理志金城郡臨羌縣西北至塞外有西王母石室西有弱水崑崙山祠此蔡傳所據以為崑崙在臨羌者也然漢志言西有崑崙山祠非言山在縣界漢臨羌縣在今陜西西寧衛西崑崙山不當若是之近通典云吐蕃自云崑崙山在國中西南河之所出唐書吐蕃傳云劉元鼎使還言自湟水入河處西南行二千三百里有紫山直大羊同國古所謂崑崙蕃曰悶摩黎山東距長安五千里河源其間蓋即今之枯爾坤也元史河源附録云吐蕃朵甘思東北有大雪山名亦耳麻不莫剌其山最髙譯言騰乞里塔即崑崙也案此即今蕃語所稱阿木你馬勒産母孫大雪山也在星宿海東其山綿亘三百餘里上有九峯最為髙大黃河經其南又繞其東北梁寅所謂河繞山之三面如玦然者但如其言則崑崙轉在河源下流似未為的案地圖河出今西番巴顔喀拉山東名阿爾坦河東北流三百餘里合鄂敦塔拉諸泉源大小千百泓錯列如星元史所謂呼敦諾爾即星宿海也滙為查靈鄂靈二海子各周三百餘里東西相距五十餘里元史所謂滙二巨澤名阿喇諾爾也折而北經蒙古托羅海山之南轉東南流千餘里南北受數十小水經烏藍莽乃山下有多母打秃昆多倫河多拉昆多倫河自東南來入之元史所謂納琳哈剌額爾瑪出二水也自此折而西北流三百餘里前後小水奔注不可勝計繞阿木你馬勒産母孫山之東即元史所謂崑崙山也流百五十餘里有齊普河呼呼烏蘇河自西來入之又迤邐東北流三百餘里會跲克圖衮俄羅濟諸水歷歸德堡元史作貴德州經積石山至陜西臨洮府河州入中國界過蘭州又折而東北經寧夏衛流出塞外河以內為河套地又東南至延安府府谷縣入塞河以東為山西界南流至潼關衛又折而東由河南山東界至江南淮安府安東縣入海胡氏渭曰崑崙國名蓋附近崑崙山者傳記言崑崙凡四處一在西域山海經云崑崙墟在西北河水出其東北隅釋氏西城記謂之阿耨達山水經注云按山海經自崑崙至積石一千七百四十里又引涼土異物志曰蔥嶺之水分流東西西入大海東為河源禹紀所云崑崙者是也一在海外大荒經云西海之南流砂之濵有大山名曰崑崙其下有弱水之淵環之此山與條支大秦國相近禹本紀云去嵩髙五萬里者是也一在酒泉漢志金城臨羌縣西北有西王母石室西有弱水崑崙山祠崔鴻十六國春秋云張駿時酒泉太守馬岌上言酒泉南山即崑崙之體周穆王見西王母樂而忘歸謂此山也上有石室王母堂珠璣鏤飾煥若神宫禹貢崑崙在臨羌之西即此明矣括地志云在酒泉縣西南八十里今肅州衛西南崑崙山是也一在吐蕃通典云吐蕃自云崑崙山在國中西南河之所出唐書吐蕃傳云劉元鼎使還言自湟水入河處西南行二千三百里有紫山直大羊同國古所謂崑崙虜曰悶摩黎山東距長安五千里河源其間是也渭按酒泉在雍州之域不可謂西戎西海距玉門陽關四萬餘里而崑崙更在西海之南去積石太逺其非禹貢之崑崙國甚明西域吐蕃未知孰是吐蕃悶摩黎山以劉元鼎言計之東北距大積石不過千餘里浮河甚便然自唐以前未有言崑崙在羌中者何可深信西域之崑崙據山海經云至積石一千七百餘里則浮河亦不難蓋崑崙與析支渠搜皆在雍州之外禹治雍身歷其境三國聞風慕義爭先入貢其過化存神之妙有如此也蕙田案崑崙國見于禹貢而崑崙山為河源見于山海經爾雅淮南子涼土異物志桑欽水經若其得之目擊者則唐書吐谷渾傳載任城王道宗侯君集次星宿川望積石覽觀河源吐蕃傳劉元鼎使還言自湟水入河處西南行二千三百里有紫山直大羊同國古所謂崑崙虜曰悶摩黎山東距長安五千餘里河源其間元史地理志載招討使都實求河源在土番朵甘思西鄙有泉百餘泓名火敦腦兒譯言星宿海東北有大雪山名亦耳麻不莫刺譯言騰乞里塔即崑崙也地理今釋崑崙山在今西番界有三山一名阿克坦齊禽一名巴爾布塔一名巴顔喀拉總名枯爾坤譯言崑崙也在積石之西河源所出劉元鼎所見悶摩黎山蓋即今之枯爾坤也由此觀之則崑崙山當以唐書吐蕃傳為定蓋在西域之西南明矣夏西戎即唐吐蕃今之西番也禹貢崑崙折支渠搜顔氏云崑崙國蓋附近崑崙山者崑崙即在雍州之外則劉元鼎所云東距長安五千餘里者近是而非如山海經水經所云矣案山海經之言崑崙也一曰槐江之山邱時之水出焉西南四百里曰崑崙之邱又曰海內崑崙之墟在西北又曰西海之南流沙之濵赤水之後黑水之前有大山名曰崑崙墟在西北去嵩髙五萬里地之中也蓋山海經多出偽撰止因禹貢有崑崙之名而附以荒誕不經之語水經則又因山海經而附會之與史記禹本紀去嵩髙五萬里者皆與大荒經相類乃胡朏明一一求其地以實之愚矣觀承案爾雅河出崑崙墟此言原不謬崑崙析支渠搜本見於禹貢所謂河源於崑崙者即此崑崙也導河只云自積石者就施功之始言之非以為源也西戎在崑崙之域者即以山名其國但崑崙甚太綿地甚逺後人窮河源而以為是星宿海非崑崙不知仍在崑崙之域耳崑崙苐統言之星宿則别言之其實一也故唐書吐谷渾傳及吐蕃傳劉元鼎所言為得其實而元史地理志都實求河源亦隱與之合也蓋崑崙即在雍州之外劉元鼎所云東距長安五千餘里者近是若山海經及史記禹本紀去嵩髙五萬里者皆荒誕不經之論而禹貢錐指更一一求其地以實之亦穿鑿附會之甚已至積石而入中國積石山在西寧衛西南百七十里大河經其下即禹迹所陟胡氏渭曰河自大積石山東北流徑陜西西寧衛西南塞外至河州西七十里入塞衛在行都司東南七百餘里黃河西自塞外流入經衛之東南與河州分水州在臨洮府西一百八十里西至生番界七十里有小積石山兩崖如削河流其中西南去大積石山千餘里又東經河州城北元志大河自積石州東流循河而行五日至河州安鄉關關在州西北百里是也今大河經州北六十里有大夏河經州東三十里又北入于河大夏河或云即灕水至蘭州境入河又東北流經蘭州城又東經金縣北大河自河州東北流至蘭州境其西則湟水合浩亹河流入焉其南則洮河流入焉又東北經州城境二里金城關在焉為河津之要隘又東北經金縣北六十里流入亂山中危湍仄澗凡二百餘里而入靖虜衛界又東北經靖逺衛北又東北經寧夏中衛南大河自金城亂山中而來㵼落平川奔流洶湧烏蘭橋之險在焉又東北出衛城北一里山峽險隘河經其中懸流數仭又東北二百餘里經寧夏中衛南十五里地勢稍平而河流益盛矣又東北經靈州所北又東北經寧夏衛東南大河自中衛而東幾三百里經靈州所城北其地亦謂之河曲蓋河自積石至中衛大抵東北流中衛至靈州所正東流由靈州至寧夏則益折而北故曰河曲也經寧夏衛東南四十里益引而北入廢豐州界又東北入榆林西境出塞經三受降城南又東折而南經榆林之東大河在榆林衛北千餘里自寧夏衛東北流六百餘里經古豐州之西又北折而東經三受降城南三城相距凡八百里至廢東勝州西廢東勝州在山西大同府西境大河之濵與榆林東故勝州隔河相望正當大河折旋之處乃折而南其西則榆林之東境其東則山西大同府朔州之西境也又南至黃甫川黃甫川近在榆林東境西為延安府府谷縣境東為太原府河曲縣境其間回環曲折幾三千里古為朔方地今謂河套又南經府谷縣東又經神木縣南而入葭州境經州城東河之東岸為山西河曲縣及保德州暨興縣之境大河在府谷縣城東百步西南流入神木縣境經縣南三十里又南經葭州城東一里而山西之河曲縣北去黃甫川二十餘里隔河相望也西南去府谷百餘里縣濵河為險而保德州西臨大河與府谷縣隔河相對府谷在黃河東北岸保德州在黃河西南岸河自黃甫川而下皆迤邐西南流也又南百五十里則岢嵐州興縣也縣西去大河五十里與葭州濵河為界又南經吳堡縣東又南經綏德州東河之東岸為山西臨縣及永寧州寧鄉縣之境大河自葭州而南八十里經吳堡縣城東一里又南百六十里經綏德州東境西去州城百二十里而山西之臨縣北去大河二十里與吳堡縣接界永寧州則西去大河百十里志云自州城渡河至綏德州二百五十里寧鄉縣西去黃河七十里皆綏德州濵河為境也又南經青澗縣東又南經延川縣及延長縣東河之東岸為山西石樓縣及永和縣大寧縣之西境大河在青澗縣東百里無定河自西北流入焉又南經延川縣東四十五里又南經延長縣東三十餘里而山西之石樓縣西距大河百里永和縣西距大河五十里西北接延川縣境大寧縣西距大河七十五里西北接延長縣境津流相通一葦可航也又南經宜川縣東河之東岸為山西吉州及寧鄉縣之西境大河在宜川縣東八十里而山西之吉州西距大河七十里與宜川接界孟門山壺口山皆在其地為河津險要又南為寧鄉縣西距大河八十里又西南接韓城縣界緣河兩岸羣山列峙稱險固焉又南經韓城縣東又南經郃陽縣東河之東岸為山西河津縣及滎河縣臨晉縣之西境大河在韓城東北八十里龍門山在焉大事記周威烈王十三年晉河岸傾壅龍門至于底柱吕氏云自春秋以後河患之見于史傳蓋始于此又南流經梁山東山在韓城縣南十九里春秋成五年梁山崩壅河三日不流即此矣又南經郃陽縣東南四十里而山西之河津縣即古耿邑也商祖乙都耿圮于河水書有盤庚之誥是矣今縣西去大河三十里亦有龍門山與韓城之龍門對峙所謂禹鑿龍門河經其中者非與又南經滎河縣城西城去大河不及一里汾水自西北流入焉又南經臨晉縣西三十里渡河而西又三十餘里即郃陽縣也臨晉有吳王渡郃陽有茶峪渡俱河津濟處胡氏渭曰以上禹導河積石至于龍門之所經也又南經朝邑縣東又南經華陰縣東北而渭水入焉河之東岸為蒲州城西又南過雷首山西乃折而東也大河自郃陽縣南百二十里而經朝邑縣東三十五里河濵有臨晉關又南五十餘里至華隂縣境則華山當其衝潼關在焉關西去華隂縣四十里又渭水流經華隂縣北至縣東北五十里而入于河即禹貢導渭入河處也而山西之蒲州大河自臨晉縣境南流五十餘里經其西門外有蒲津關亦曰臨晉關與朝邑縣臨晉關夾河相對為自古設險之處又沐水流入焉經雷首山西山在蒲州原南二十五里折而東其地亦謂之河曲春秋時秦晉戰于河曲是也河流自東勝州折而南幾千八百里自壺口龍門以至于潼關兩岸重山翼帶深險而華山復橫亘其南岡巒盤固河於是復折而東河山之勝甲天下矣胡氏渭曰此河水南至華隂之所經雍州文所稱龍門西河者也又曰穿渠引水非古也自溝洫之制廢而灌溉之事興利於田而河則病矣關中引水溉田自鄭國渠始及漢武時用鄭當時言穿渠引渭以漕且溉南山下用番係言引汾溉皮氏汾隂下引河溉汾隂蒲坂下又用嚴熊言引洛溉重泉以東為龍首渠宣房既塞用事者益爭言水利朔方西河河西酒泉皆引河及川谷以溉田關中則有靈軹渠成國渠湋渠六輔渠白渠皆溉田各萬餘頃它小渠及陂山通道者不可勝言故王莽時大司馬長史張戎議曰水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益髙於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣蓋河水多泥急則通利緩則淤澱今滎陽之下既有鴻溝華隂以上復有諸渠分水太多則河流日遲河身日髙故水暴至不能容漢人知此者鮮唯戎知之又東經閿鄉縣北又東經靈寶縣北河之北岸為芮城縣南境大河在閿鄉縣北七里又東經靈寶縣北十里而山西之芮城縣負山面河南距大河二十里與閿鄉縣夾河相望三十里蓋河自雷首西麓而南經芮城西二十里稍南即折而東芮城當其曲折之間而閿鄉縣亦為大河東折之衝東至靈寶縣七十餘里西距潼關六十里踞髙臨深為險塞又東經陜州城北又東經澠池縣及新安縣北河之北岸為平陸及垣曲縣境大河在陜州城北自靈寶縣東流六十里至州城西北三里大陽津在焉亦曰茅津河津要地也又東四十餘里為底柱山控扼中流波濤怒湍舟船經此稱為艱阻又東百餘里經澠池縣北境大河南去縣城六十餘里又東百里為新安縣境大河南去縣城四十餘里陵阪陂陀津途遙隔故二邑無濵河之稱也而山西之平陸縣城去大河東南距陜州不過五十六里南北往來常為津徑又東二百餘里至垣曲縣南二十里岡阜逶迤與河南岸兩相倚阻皆利涉之所也胡氏渭曰以上河水東至底柱之所經也又東經河南府北河之北岸為濟源縣南境大河在河南府城北二十里繞北邙山之麓北邙山在府城北十里層巒疊阜屹然保障志云大河自芮城閿鄉縣而東河之北岸則中條以接王屋南岸則崤函以接北邙夾河翼帶並趨而東雖底柱扼塞中流而旁無潰決之患則以岡陵包絡有自然之險固耳而濟源縣南距大河七十里西鄰垣曲南衛洛陽唐史聖歷二年河溢湮濟源民舍千餘家或以為山水暴發非河患也又東經孟津縣北河之北岸為孟縣南境大河在孟津縣北五里北岸至孟縣三十里今孟縣西南至孟津縣五十餘里蓋嘉靖中孟津益徙而西也即古之孟津也河橋在焉河陽三城置于此宋史乾德二年孟州水漲壞中灘橋金史大定十一年河決王村南京孟衛州界多被其害王村今山東濮州治也孟州即今孟縣南京即今開封府蓋下流壅故倒灌上流也明嘉靖十七年河漲孟津縣圮于水蓋河自孟津而上多循山麓行至孟津兩岸平濶河勢漸張潰溢之患于是乎見端矣夫決在下流河之患猶淺決在上流河之患乃深孟津河行平陸之上流也河患及此下流之壅閼必日甚橫決必且益多矣胡氏渭曰以上河水又東至孟津之所經也又東經鞏縣北洛水入焉河之北岸為溫縣之境濟水入焉大河在鞏縣北十里西去孟津縣八十里洛水自西南流入焉又東經溫縣南二十里濟水入焉導川里道紀自鞏縣東北至溫凡四十里宋太平興國二年河決孟州之溫縣蓋河既出險就平復南納洛川之注北并濟水之流縱橫震蕩勢不能已疏道無方鞏洛而下禹貢舊迹安得不月異而嵗不同哉又東經汜水縣北又東經滎陽縣北河之北岸為武涉縣之南境大河在汜水縣北一里里道紀渡河西北至溫縣二十五里又東經滎陽縣北二十五里洪武十五年河決滎陽命修塞之正統十三年河復決滎陽經曹濮衝張秋在山東東阿縣潰沙灣東堤沙灣在山東夀張縣奪濟汶入海尋自開封西南經陳留自亳入渦河又經蒙城至懷逺縣入淮陳留縣屬河南開封府亳州蒙城縣懷逺縣俱屬鳳陽府而開封城遂在河北久之始復故道而武涉南去大河五十里西南與滎陽縣接境沁水自北來至縣南入于大河沁水入河之處舊名沁黃口今曰南賈口宋熙寧十年河溢懷州黃沁口即其地也又東經河隂縣北又東經滎澤縣北河之北岸為獲嘉縣之南境大河在河隂縣北十五里里道記自河隂縣渡河至武涉縣五十六里縣西二十里有石門即古之滎口秦始皇二十三年攻魏引河溝灌大梁漢王橫言秦攻魏決河灌其都決處遂大不可復補即此也後漢初河自滎陽決入汴河隂故滎陽地永平十三年詔修汴渠隄自滎陽東至千乘海口千餘里蓋始功于此自河隂而東三十里經滎澤縣北五里滎澤地稍下古滎水所鍾也唐開成三年河決浸鄭州外城五代漢乾祐三年河決鄭州周廣順二年河復決于鄭州説者曰自滎澤縣決而南也五代史云河決原武或曰當古滎澤顯德初遣使修塞決河又五代史周廣順中河決河隂宋太平興國二年河決于滎澤熙寧十年河復決滎澤元延祐十年河決滎澤之塔海莊東堤塔海莊在縣東南七里久之始塞明正統十三年河決滎陽既而自孫家渡決而南孫家渡在縣東南五十里河南徙久之始塞𢎞治五年河大決于封邱撫臣徐恪請開孫家渡從之既而復塞河渠考先是𢎞治二年河決原武命户部侍郎白昻治之昻于滎澤縣楊橋開支渠引中牟尉氏決河由陳頴至夀州達淮楊橋在縣東南與孫家渡相近蓋引決河使入正統時南決舊道也至是河流橫潰張秋決口塞而復決恪上言決河湍悍之勢未可遽回今自滎澤孫家渡口舊河東經朱仙鎮下至項城南頃猶有涓涓之流若疏之由泗入準可殺上流之勢又黃陵岡有賈魯舊河南經曹縣梁靖口下通歸德卞家道口今梁靖以北淤塞將平計功力之施八十餘里若疏而濬之使由徐入淮以殺下流之勢則決口可塞運道可完也時多從其䇿而衛輝府之獲嘉縣南去大河六十里與滎澤河隂接壤宋太平興國二年河決懷州之獲嘉蓋亦隄防之處矣又東經原武縣北陽武縣南大河在原武縣北二十里五代周廣順中河決原武尋遣使修塞又顯德六年鄭州奏河決原武宋元豐元年河復決於此五年又決下流納梁山濼梁山濼在山東夀張縣宋志河決原武掃溢入利津河陽武溝刁馬河歸納梁山濼利津等河皆在陽武以東明洪武十四年河決原武及祥符中牟二十四年河決原武黑陽山在縣北二十里東經開封城北五里又南行至項城經頴州頴上縣東至夀州正陽鎮正陽鎮在夀州西六十里全入于淮而河之故道淤塞疏久之乃復舊𢎞治三年河復決原武支流為三一決封邱金龍口亦作荆隆口漫祥符及長垣北直長垣縣下曹濮衝張秋長隄一出中牟下尉氏一汜濫于蘭陽儀封考城歸德入宿州詔白昻修塞之河渠考昻為户部侍郎奉命治河築陽武長堤以防張秋之決引中牟決河出滎澤陽橋下達于淮濬宿州古卞河達泗州又濬睢河自歸德飲馬池中經符離橋至宿遷縣入漕河上築長隄下修減水閘又疏月河千餘以殺其勢塞決口三十六由河入汴汴入睢睢入泗泗入淮淮達海水患少息昻又以河南入淮非正道恐不能容乃復自魚臺歷德州至吳橋修古河隄又自東平北至興濟鑿小河十二道引水入清河及古黃河入海河口各作石堰以時啓閉昻意蓋欲于東北分其流于南東疏其淤也未幾河復決徙昻所規畫一時皆廢吳橋興濟今直𨽻屬縣也而陽武南距大河十餘里舊時大河經城北與衛輝府之新鄉汲縣接境自決塞不時河遂徙而南周廣順二年河決陽武尋修塞之時又決常樂驛或曰驛在陽武西宋乾德三年河決陽武開寶五年復決陽武金大定十年河決陽武之白溝白溝在縣東南三里明昌五年河決陽武故堤決口地名光祿村灌封邱而東元至元二十五年陽武諸處河決泰定三年河決陽武漂居民萬六千五百餘家尋復塞治明洪武一十五年河決陽武天啓元年河決陽武縣脾沙缸在縣東南二十里由封邱曹單至考城復入舊河自河出陽武之南而新鄉汲縣胙城之境皆去河漸逺禹迹之益不可問也自陽武之決塞始也大河舊道在陽武縣北又東經延津縣北又東經胙城縣北河之北岸為新鄉縣及汲縣之境此大河舊道也舊志云河在陽武縣北二十三里河之北岸為新鄉縣境縣南去大河三十里明昌中河決陽武入封邱于是河益東南下金史貞祐四年延州刺史溫薩可喜言近世河離故道自衛東南流由徐邳入海以此河南之地為狹臣竊見新鄉縣西河水可決使東北流其南有舊堤水不能溢行五十餘里與清河合則由濬州大名觀州清河柳口入海此河之舊道也皆有古堤補其罅漏足矣如此則山東大名等路皆在河南而河北諸郡亦得其半退足以為備禦之計進足以杜恢復之圖議者以河流東南已久決之非計遂寢清河謂水口柳口即今古直河也元至元九年河決新鄉元史云河決新鄉廣盈倉南河北岸蓋是時河猶出陽武新鄉間也由陽武而東二十里徑延津城北十七里延津古酸棗也漢文帝後元年河決酸棗東潰金隄東郡大興卒塞之五代周廣順二年河決酸棗顯德初遣使修塞明成化一十四年河溢延津明年復自縣南流入封邱其舊流則自延津折而東北經汲縣東南十七里又北徑胙城縣北一里里道記延津縣東北至縣城四十五里宋熙寧四年河溢衛州王供掃舊志云在州東三十里十年復溢王供掃及汲縣上下掃金大定一年河決衛州及延津縣瀰漫至歸德府二十六年河決衛州堤壞其城泛濫及于大名先是胙城𨽻開封府泰和八年以限大河改屬衛州貞祐三年徙州治于宜封新城以胙城為倚郭胙城為河北縣自金始也又東北經濬縣之南滑縣之北大河舊在濬縣城南一里河之南岸即滑縣界里道記滑縣西北至濬縣四十里濬縣南至胙城縣五十里大河經其間北曰黎陽津南曰白馬津自昔津濟之要今變為平陸矣漢建始四年河決東郡金隄顔氏曰在今滑州界唐元和八年河溢瓠子東泛滑距城十二里鄭滑帥薛平魏博帥田宏正共發卒鑿黎陽山東復入故瀆故瀆在黎陽西南時河流南徙薛平請于田宏正共發卒鑿古河十四里徑黎陽山東會于故瀆自是滑無水患開成三年河決浸滑州外城乾寧三年河漲將毁滑州朱全忠決為二河夾城而東為害滋甚石晉天福五年滑州河決九年滑州河決侵汴曹單濮鄆五州之境環梁山合于汶大發數道丁夫塞之五代漢乾祐元年河決滑州之魚池店在州西周廣順一年河決滑州靈河諸處靈河廢縣在今滑縣東南六十里五代史廣順中河決靈河魚池六明鎮諸處蓋皆在今滑縣境內命王浚修塞之三年義成帥白重贊奏塞決河宋乾德四年滑州河決壞靈河大堤太平興國三年河又決滑州之靈河八年大河決滑州之韓村在州東北泛澶濮曹濟東南流至彭城入於淮九年河復決滑州之房利亦在州東北既而巡河官梁睿言滑州土脈疏岸善隤每嵗河決南岸害民田請于迎陽掃鑿渠引水凡四十里至黎陽合河以防暴漲從之既而渠成又命鑿河開渠自韓村掃至州西鐵狗廟五十餘里復合于河以分水勢迎陽在州東北大河北岸大中祥符四年河決通利軍今濬縣合御河壞州城田廬州城即濬州城天禧三年滑州河溢城西北天臺旁俄復潰于城西南岸漫溢州城歷澶濮曹鄆注梁山泊又合清水古汴渠此清水謂泗水也東入于淮州邑罹患者十二三詔發丁夫塞治四年河復決于天臺山天聖五年塞河成以其近天臺山麓名曰天臺掃自是以後滑州之患大抵移于澶州矣元和三年河復決于蘇村在濬縣東北然其為害甚鮮重和初詔于滑州濬州界萬年堤廣植林木以護堤岸以壯地勢河自大伾以上猶禹貢時大河經流也大伾山在濬縣東二里漢賈讓欲決黎陽遮害亭亭在濬縣西南五十里放河使北入海西薄大山東薄金堤勢不能逺泛濫此即司馬遷河渠書所稱禹以為河所從來者髙水湍悍難以行平地數為敗乃釃二渠以引其河北載之髙地之説也其後王橫亦言禹行河水本隨西山下東北去宜更開空使緣西山足乘髙地而東北入海乃無水災宋李垂祖其説欲引河自大伾而北載之髙地其後孫民先亦主是説元豐中陳祐甫亦請修復禹故道夫滑州河患莫甚于宋之天禧以前於此時引河去北未為不可其後河亦益徙而北出于信都勃海間故道庶幾可復矣乃謀國者方且人持一説非迂踈拂逆之計則因循苟且之見而已矣胡氏渭曰以上河水東過洛汭至于大伾之所經也又曰凡二水並行一盛則一微自然之勢也宋元祐初蘇轍上疏有云黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理此格言也蓋上流宜合而不宜分合則流急而沙去分則流緩而沙停而禹顧於大伾之南釃為漯川者則以河勢欲東不得不分之以泄其怒以漯川一道分河流十之一二不使指大如股亦未為害耳及周之衰王政不修水官失職諸侯各擅其山川以為己利於是滎陽下引河為鴻溝者自是以後日漸穿通枝津交絡宋鄭陳蔡曹衛之郊無所不達至定王五年河遂南徙無他河水之入鴻溝者多則經流遲貯不能衝刷泥沙故也宿胥之塞實鴻溝致之不然禹功歷千嵗而不敝何獨至春秋一旦變遷也哉又東北經開州南長垣縣及東明縣之北大河舊在開州城南漢之濮陽宋之澶州皆其地也漢元光三年河水徙從頓丘東南流既而決瓠子在今州西南二十五里東南注巨野巨野澤在山東巨野縣通于淮泗此為黃河入淮之始邱氏以宋熙寧十年為黃河入淮之始誤也上使汲黯鄭當時興人徒塞之輒復壞元封二年自臨決河塞之作瓠子之歌是也五代周廣順三年澶州河溢宋乾德三年河決澶州開寶四年河復決澶州東滙于鄆濮壞民田舍五年河復決濮陽命潁州團練使曹輪往塞之淳化四年河復決澶州陷北城壞廬舍七千餘區景德元年河決澶州橫隴掃在州東自是遂為故道所謂橫隴河也四年又壞澶州五八掃在州西南大中祥符七年河決澶州大吳掃在州東天聖六年又決州之王楚掃在州西南景祐元年復決于橫隴掃慶歷八年又決州之商胡掃在州東北三十里自是遂為故道所謂商胡河也宋志商胡決河自魏北至恩冀乾寧入海為北流其二股河自魏恩東至德滄入海為東流嘉祐元年河復決于六塔河六塔河在州東北十七里自商胡東南通橫隴河之渠也先自皇祐二年河決館陶縣之郭固四年塞郭固而河勢猶盛議者請于澶州開六塔河以披其勢于是遣使相度詣銅城鎮海口以約古道髙下之勢歐陽修以塞商胡開橫隴回大河于故道計一千餘里役巨費煩速宜停罷李仲昌等固謂開六塔河使歸橫隴時橫隴湮塞已二十年商胡復決數嵗矣賈昌朝等又欲移決河于京東故道歐陽修曰六塔止是别河下流已為濵棣德博諸州患若全回大河其害必甚故道不可復不待智者而知也至是遂塞商胡北流入六塔河河不能容是夕遂決河北被患者數千里銅城鎮在濵州海口熙寧四年河溢澶州之曹村在州西南十年大決于曹村澶淵北流斷絶河道南徙東滙于梁山張澤濼梁山濼見前張澤濼或曰即今山東汶上縣之南旺湖分為二𣲖一合南清河入淮一合北清河入海南清河今泗水也北清河大清河也灌郡縣四十五濮濟鄆徐更甚元豐元年決口塞改曹邱掃曰靈平築堤斷河流復歸北三年澶州孫村陳掃及大吳小吳掃復決孫村等掃俱在州東四年小吳掃復大決自澶注入御河恩州危甚五年河溢內黃決大吳掃以紓靈平水患放之使北也蓋自河入御河之後而宋澶州之患稍緩至金大定以後河益徙而南澶州之流遂絶明正統十三年河決滎陽自陽武衝入故道直至州治南又東抵濮州壞張秋隄入海後復塞治蓋瓠子靈平之舊迹皆不可復識矣開州之東北為清豐縣之西內黃縣之東大河舊道在內黃縣東南及清豐縣西南水經注大河故瀆東北徑戚城西又經繁陽故城東隂安故城西是也戚城在開州繁陽在內黃隂安在清豐縣漢時河皆經此元光三年河徙從頓邱東南流頓邱今清豐縣境是也後決塞不時故道廢宋時澶州河屢決河復行北道開寶八年河決澶州之頓邱太平興國二年河復決于頓邱元祐八年河溢內黃掃元符二年河決內黃口灌邢洺諸州而東道之流遂絶又東北經南樂縣及大名縣元城縣之東水經注大河故瀆經昌樂故城東即南樂也宋時大河亦徑此嘉祐五年韓贇請分浚二股五股諸河于縣境以減下流恩冀之患治平元年始命都水監浚治熙寧初河自恩冀北注議者請開二股河漸閉北流三年張鞏等奏大河東徙北流淺小請閉北流從之未幾河自其南四十里許家港東北泛濫大名恩德滄永靜五州軍境詔遣官相度六年王安石奏自大名之東南開修直河狹大河還二股故道於是河勢增漲十年河遂大決于澶州此即宋人回河之誤也而大名元城縣亦皆大河所經也唐開元十四年魏州河溢宋嘉祐七年河決大名第五掃元豐七年河溢元城掃決橫堤冀洺北京皆被其害八年河決大名之小張口宋時以大名為北京隄防障遏無嵗不講也又東經館陶縣西又北經臨清州及髙唐州之境又北經清河縣南大河故道自元城冠縣間入館陶界冠縣館陶俱山東屬縣漢溝洫志自塞宣房即瓠子河在間州後河復北決于館陶分為屯氏河東北經魏郡清河信都勃海入海廣深與大河等因其自然不隄塞也屯氏河在館陶縣元帝永光五年河決清河靈鳴犢口而屯氏河絶廢靈縣鳴犢口今在直𨽻清河縣成帝建始二年河復決于館陶所決之河亦名屯氏别河及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣又鴻嘉四年勃海信都河水湓溢灌縣邑三十一新莽始建國三年河決魏郡泛清河以東數郡漢所稱魏郡大約主館陶以北言之漢書先是莽恐河決為元城冢墓害及決東去元城不憂水災故遂不隄塞水經注大河故瀆經甘陵故城南甘陵亦在清河縣又東北經靈縣故城南今廢靈縣在博平縣境似不在甘陵東北也河瀆于縣别出為鳴犢河又東徑鄃縣故城東鄃縣今髙唐州夏津縣也漢志云鄃居河北即此此即漢時河所出之道宋皇祐二年河決館陶縣之郭固在縣東北四年塞之即宋史所稱郭固塞而河勢猶盛議者請開澶州六塔河熙寧四年北京新隄第四第五掃決漂溺館陶永濟清陽以北永濟廢縣在今臨清州西仁宗皇祐元年河合永濟渠注乾寧軍縣以永濟渠而名也清陽廢縣亦在清河縣下屬恩冀合于御河五年河溢于夏津而清河即宋之恩州也熙寧元年河溢恩州烏欄堤在州東是年又決冀州棗強掃北注瀛州既又溢瀛州樂夀掃元祐四年又溢冀州南宫等五掃時都水監言前二年河決南宫下掃三年決上掃今四年決宗城中掃蓋皆自恩州決而北也政和二年河決冀州棗強掃都水孟揆言棗強東堤決溢其漫水行流多鹹鹵及積水之地不犯州軍止經數縣地分迤邐接御河歸納黃河今欲自決口上恩州之地水堤為始增補舊堤接續御河東岸簽合大河從之宣和三年河決恩州清河掃蓋自內黃決後河出清河之北至此下流漸壅故上流復決河又從瀛冀而西南矣又東經德州西又東北經景州及滄州之境入于海德州漢平原郡界也河之故道本在平原以北漢以前大槩從魏郡清河信都勃海界入海皆與平原接境不徑至平原也武帝建元三年河水溢于平原成帝建始三年河決館陶遂溢入平原千乘濟南界中河平三年河復決平原流入濟南千乘復堤塞之東漢永平中河流合汴泛濫兖豫明帝使王景治之絶水立門河汴分流自滎陽東至千乘海口千餘里十里立一水門令更相回注無復潰漏之患然則河經平原以南自漢建始中始而永平以後嘗為河之經流矣後漢以及南北朝時大河決塞史多失于記注水經注大河故瀆徑平原故城西又北徑修縣故城東修縣在今直𨽻景州又東北至東光縣故城西東光今直𨽻屬縣而合于漳水此亦約言西漢時大河所經之處也元時河仍自千乘入海不至東光合漳也宋自熙寧以後主回河之説滄景常多水患元豐四年河溢滄州南皮上下掃又溢清池又溢永靜軍阜城下掃既而河流益北大抵合御河西山諸水自深州武強瀛州樂夀掃至清州獨流寨三義口而入于海開州之東為觀城縣及朝城縣南河之南岸濮州之北水經注大河徑衛國縣南衛國縣即今觀城縣鄄城縣北鄄城舊縣濮州治也疑東漢以後大河故道即出於此五代晉開運三年河決澶州臨黃漢天福十二年河決觀城界楚里村堤在縣西南東北經臨黃觀城二縣臨黃廢縣今在觀城縣宋開寶五年河決濮陽濮陽即今濮州明道二年移朝城縣于社婆村移而北也避河患也明正統十三年河決滎陽衝曹濮宏治三年河復決原武衝曹濮濮州蓋舊道所經常為東下之衝矣又東經范縣北莘縣及聊城縣之南大河故道在范縣之北倉亭津在焉津在今縣東北舊經云自范縣渡河而北六十里即莘縣是也而聊城故博州治今東昌府治焉開元十年博州河決五代晉天福四年河決博州即此也又東經東阿縣北博平縣及茌平縣南東阿自昔大河之衝也南漲則淹東平東溢則浸濟南五代梁末唐遣李嗣源取鄆州守楊劉今在東阿縣梁人攻楊劉決河口以限晉兵決口益大連年為曹濮患同光二年命婁繼英督汴滑兵塞之未幾復壞晉天福二年河決鄆州自東阿決而南開運三年河決楊劉西入莘縣廣四十里自朝城北流自東阿決而西也周顯德初命宰相李榖治隄自陽榖抵張秋口遏塞之宋乾德二年河決鄆州之竹村在州西北三年鄆州河決太平興國七年河漲凌鄆州城將陷咸平三年河決鄆州王陵掃在州西浮巨野入淮泗水勢悍激侵迫州城明道二年廢鄆州土橋渡以避水渡在州東是時河流漲入小清河濟南淄川皆被其患後河勢益趨而北鄆州之患始少此五代及宋鄆州水患也而博平茌平為大河東出之道矣又東經長清縣北禹城縣南長清以西古大河所經也碻磝津在焉南北朝時大河皆經此矣大抵東阿以東往往挾濟而流又東北以達于海也又東經歷城縣北臨邑縣南臨邑東有四瀆津大河故道所經唐五行志永徽六年齊州河溢即此地也又東北經商河縣北武定州南此昔時大河所經也唐長夀二年河溢棣州又開元十年棣州河決太和二年河決壞棣州城宋祥符四年河決棣州聶家口在今武定州西南二十里舊州之西南五年又決于州東南李氏灣六年徙州治而北以避河患自是澶滑之間大河屢溢而棣州之流漸絶矣又東經濵州境合清河以入海水經注河水東徑濕沃津今蒲臺縣又東經千乘城北又東過利城北利城今博興縣訛為黎城又東北濟水從西來注之又東北入于海夫水流變遷其詳不可得而知今大清河自蒲臺利津縣東北入海惟小清河則經青州府博興樂安縣境而後入于海或謂宋初大河東行大抵從濵州境合于大清河或謂大清河即東漢以來大河經流之處水經注有南北二濟無大小清河之名其所言北濟者大槩與小清河相參錯或大清河即大河故瀆河遷而濟水注其中與夫自東漢至隋唐水之侵齧漲溢豈能盡免而由平原千乘間以入海則未經變異也然則治河如王景其成法詎不足遵與自梁晉夾河之戰苟且目前橫挑大釁梁段凝決河引水以限晉兵謂之護駕水此五代以後潰決之患所由致也延及宋季橫決無已金元河患皆與國為終始水經諸書既未能條貫源流兼綜終始史家紀載又往往參差同異茲略舉往迹為之差次古今之變覽者亦可知其梗槩矣右古大河終大河今自陽武縣南又東徑開封府城北封邱縣南大河今在開封府城北十里宋元符三年河決開封之蘇村舊志云府西三十餘里有蘇村元至元二十三年河決開封祥符等郡縣十五處皇慶三年河決開封陳留等縣延祐七年河決開封縣蘇村及七里寺諸處泰定二年河溢汴梁三年復壞汴梁樂利隄發民夫築塞明洪武七年河決開封隄十六年又決開封東隄自陳橋至陳留陳橋在府東北一十里二十年河復決開封城三十年河溢開封正統十三年河決滎陽尋自滎澤縣孫家渡決而東南開封遂在河北景泰中始復河渠考國初開封城北去大河四十里洪武二十四年河決原武而東經城北五里至此遂出府南築塞以後大河經城北不過十數里天順五年河溢決開封府北門𢎞治三年河決開封南入淮成化十四年河決開封府西杏祀營在府西二十里神宗十七年河決府西北劉獸醫等隄十餘處劉獸醫隄在府西北三十五里四十四年河決開封陶家店張灣陶家店在府西北二十里張家灣在府西北十五里由護城隄下經陳留等處入亳州渦河是冬決口淤河復舊道崇禎十五年賊決開封西北朱家寨在城西北十七里城陷大河自陳頴諸州漫入淮泗蓋大河出陽武之南開封城外皆為漫淫沮洳之場矣而河北之封丘縣南去大河五十一里舊時大河在縣西北四十餘里金明昌五年河決陽武灌封丘而東此封丘陽武在河北之始也元至大二年河決封丘順帝至元初河復決于封丘宏治一年河決原武其支流決封丘荆隆口在縣西南三十餘里漫祥符下曹濮衝張秋五年河復決于荆隆口濵儀封之黃陵岡更犯張秋壞會通河尋命劉大夏治之志云縣東南有陳橋集在縣東南四十餘里與祥符縣接界東連馬家口西抵荆隆口為大河衝要神宗十五年河復決于荆隆口長垣東明幾于陷溺堤防切焉自陽武而入封丘河益東南流荆隆口直東則經長垣東明出曹濮直趨大清河矣較之出徐沛合淮泗以入海者道為徑易夫河行之道宜直不宜紆入海之口宜近不宜逺河之兩岸宜濶而歸流宜深歸流即俗語所謂落槽也渾水則宜置斗門且多置之用王景更相回注之意使不至旁溢河未必不可東也雖然大河東則會通河廢會通河不廢則大河不可得而東兩者不並立矣又東經陳留縣及蘭陽縣之北河之北岸為長垣縣之境大河在陳留縣北三十里河防考大河北岸有陳留塞銅瓦廂為黃河衝激之處屬陳留界內又東三十五里至蘭陽縣縣北去大河十五里大河舊在縣北三十餘里志云大河經陳留蘭陽而東水流湓溢衝激曹鄆嘉靖七年于縣北開趙皮寨白河一帶以分殺水勢十三年河決趙皮寨口南入淮既而河流遷徙趙皮寨口復塞十九年兵部侍郎王以旗于縣東開李景髙支河在縣東北十里引河由蕭縣出徐州小浮橋凡六百餘里以濟二洪之涸時河決睢州而南也未幾復淤神宗十七年河決李景髙口入睢陳故道決河故道也尋塞之而長垣縣南數里有河隄舊為大河所經即宏治中劉大夏所築大行隄也河防考長垣縣南隄長九十七里而與封邱縣新豐村接界隄外有淘北河相傳即黃河故道今縣大河六十里而遙矣又東經儀封縣北河之北岸為東明縣界大河今在儀封縣北二十里元至元二十三年以後河屢決汴梁路河出蘭陽儀封之南大德元年河決杞縣蒲口儀封西南至杞縣九十五里蒲口在杞縣東北二年蒲口復決漂溺歸德屬縣田廬三年復決蒲口歸德郡縣皆罹水災明洪武十六年河決開封東隄尋決杞縣入于巴河宏治二年河決原武分流泛濫于儀封考城歸德趨宿州五年河決封丘荆隆口漬儀封黃陵岡在縣東十里衝張秋而河北之東明西接長垣東南舊有長堤為河流所徑今河益引而東南東明去河逺矣又東南徑睢州及考城縣之北又東南徑歸德府北河之北岸為曹縣界大河南至睢州七十里明嘉靖十九年河決睢州野雞岡在州北六十餘里其旁決處曰孫繼口由渦河徑亳州入淮徐州吕梁百步二洪皆涸尋修塞之又徑考城縣南去縣三里縣境右為河流之衝也河防考大河北岸有芝麻莊陳隆口為縣境隄防要地又東南徑歸德府北南去府城三十里自元以前歸德去河逺患頗少元至元二十三年河衝決河南郡縣歸德始被其患大德二年河決蒲口三年復決蒲口侵歸德郡縣至大二年河決歸德是時河南徙歸德常在河北至順以後河漸決而北歸德仍在河南明洪武二十三年河決歸德命修塞之自正統以後河決而南歸德又在河北正德以後則仍在河南其新集口及丁家道口皆河濵衝要也新集口在府北三十里稍東即丁家道口嘉靖三十七年新集河淤河流於是一變四十四年河淤益甚而運河大受其病未幾河復決新集塞龎家屯在府東北東出飛雲橋神宗二十九年河決蒙城集東南蕭家口蒙城集在府東北三十里以故蒙城而名河復南徙而曹縣在歸德府西北百里南至大河五十餘里縣為河流南下之衝一有潰決縣輒當其患金大定八年河決李固渡在縣西水潰曹州城分流于單州之境今曹縣故曹州也單縣故單州也自宋時大河北決以後尋復徙而南金史所載河患始見于此二十九年河復溢于曹州小堤之北元至順元年河決曹州北魏家道口至正四年河北決白茅堤在曹縣西北七十餘里與東明縣接界又北決金堤在濮州西南亦曰老堤五年河復決濟隂即曹州九年白茅河東注沛縣遂成巨浸乃命賈魯治之疏塞並舉河復故道南滙于淮又東入于海二十六年河復自州境北徙東明曹濮下迄濟寧民皆被害明洪武元年河決曹州從雙河口入魚臺正德四年河決曹縣楊家口在縣西奔流曹單二縣境東達王子河故河在單縣東接豐縣境抵豐沛舟楫通行遂為大河七年始塞之河臣劉愷築大隄自縣西北魏家灣東至雙堌集亘八十里趙瓉繼其職復增築三十里曹單始平八年河復決曹縣嘉靖七年河復決曹縣楊家口二十六年河決曹縣衝魚臺之谷亭三十七年河復自曹縣境東北出衝單縣之東南蓋歸德府北之新集淤而河流四溢也自嘉靖以前曹縣河患稱為首衝幾與宋之澶鄆同一轍矣曹縣河患論者謂始于金之大定中非也後漢永平中詔書稱河汴分流復其舊迹陶邱之北漸就壤墳然則曹州于漢世已曽為沮洳之場矣大約濬滑澶濮曹單數州縣間大河東出實為要膂之地疏濬無方病必先見自古及今其得免于墊溺者幾希矣又東為虞城縣及夏邑縣之北河之北岸為單縣之境大河在虞城縣北三十里又東徑夏邑縣北二十二里嘉靖十三年河自蘭陽趙皮寨南決入淮運河淤二洪涸繼而自夏邑縣太邱白村等集太邱集在縣東北三十里接永城縣界又西即回村集衝激數口轉向東北流經蕭縣城南出徐州小浮橋濟二洪之涸運道得以不阻趙皮寨尋塞而單縣南去大河二十餘里去夏邑縣八十餘里亦河流之衝也嘉靖六年河決單縣衝入沛縣九年河由單縣侯家村在縣東南決魚臺塌場口衝谷亭決而東北也塌場口在魚臺縣南四十里神宗二十一年河決單縣西南黃堌口近虞城縣界一出徐州小浮橋一出舊河達鎮口閘舊河沛縣南舊運河也鎮口閘在徐州之茶城二十五年河復大決于黃堌口二十九年河決單縣之蒙墻寺三十年河復決單縣之蘇莊在縣東南沖魚臺豐沛明年復決蘇莊衝入沛縣太行堤在縣西北灌昭陽湖入夏鎮橫衝運道于是泇河之議起蓋河患之劇曹單其最矣又東為碭山縣之北又東流經豐縣之南大河在碭山縣北二十里為豐沛上遊縣西北有堅城集為單縣接境之處舊築斜壩于其東以防墊溢又西劉霄等口亦為河流衝要志云大河舊經縣南三十里嘉靖三十八年河流北徙始出縣北又東經豐縣南二十里又東入蕭縣界又東徑沛縣之南蕭縣之北大河在沛縣南五十餘里此隆萬間河流也初大河自豐碭間經蕭縣沛去河逺雖有衝決之虞而非經流之所也正德四年河決曹縣直達豐沛既又決城南飛雲橋入運河嘉靖二年河決沛縣六年河自曹單境衝縣東北雞鳴臺七年河決而南縣北廟道口在縣西北三十里淤三十餘里八年飛雲橋之水北徙魚臺縣之谷亭舟行閘面九年沛縣北境之水決魚臺塌場口衝谷亭水經三年不去十三年廟道口復淤三十七年歸德新集口淤大河散溢支流衝入飛雲橋四十四年大河淤塞自蕭縣趙家圈泛濫而北至曹縣南棠林集復分二股南股繞沛縣戚山在縣西南三十里楊家集亦在縣西南入秦溝在徐州東北三十里至徐北股繞豐縣華山在縣東南三十八里由山東其村集漫入秦溝接大小溜溝大溜溝在徐州北五十里亦曰南溜溝小溜溝在州北六十里亦曰北溜溝溢入運河至徐其北股又自華山而東北分為一大股出飛雲橋散為十二股縱橫以入漕河至湖陵城口在沛縣北五十里又逾河漫入昭陽湖從沙河灌二洪浩渺無際而河變極矣明年河復決沛縣南二三等鋪衝入運河亦由湖陵城口入湖陂是時河臣朱衡潘季馴方改濬新河既而縣東馬家橋堤成馬家橋在沛縣東南四十里障水南趨橫流復定而蕭縣在大河南五十里亦隆萬間河流也舊時大河自縣西六十里之趙家圈經冀門集在今縣北西十三里出徐州之小浮橋皆安流無恙嘉靖三十七年大河北徙其後東西靡定一變為溜溝再變為濁河濁河在徐州西北二十餘里又變為秦溝嘉靖末大抵自縣西北崔家口右城集雁門集北陳溝梁樓溝胡澱溝東下小浮橋徑行陸地水深或僅一二尺比之故道髙三尺有餘停阻泛濫蕭縣境內一望瀰漫城內城外皆為澤國隆慶四年決溢崔家口五年河臣潘季馴上言大河原自新集口經虞城夏邑之北碭山之南至蕭縣冀門出小浮橋其後河流遷徙行水之處俱係民間住址陸地水不能刷衝不成槽雖一望茫然而深不及尺且大勢盡趨濁河出小浮橋者不過十之一二決裂之患正恐不免日者臣由夏鎮歷豐沛至崔家口復自崔家口歷河南至新集口則見黃河大勢已直趨潘家口鄉老言去此十二三里自丁家道口以下二百二十餘里舊河形迹見在可開臣即自潘家口歷丁家道口馬牧集韓家道口司家道口牛黃堌趙家圈至蕭縣一帶皆有河形中間淤平者四分之一河底俱係漫沙見水即可衝刷莫若修而復之河之復其利有五從潘家口小浮橋則新集迤東河道俱為平陸曹單豐沛永無昏墊一利也河身深廣受水必多每嵗可免泛溢之患虞夏豐沛之民皆得安居二利也河從南行去會通河甚逺閘渠無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦必因而深刷四利也小浮橋來流既逺則秦溝可免復衝茶城永無淤塞五利也報可既而季馴以言去遂中止神宗五年河衝蕭縣三十二年河臣李化龍言河自開封歸德而下合運入海其路有三由蘭陽出茶城徐邳名濁河為中路由曹單豐沛出飛雲橋秦溝名銀河為北路由潘家口入宿遷出小河口名符離河為南路南路近陵北路近運惟中路既逺于陵亦濟于運前興濬未竣今自堅城以至鎮口河形宛然宜仍舊開濬從之三十四年河工成自碭山朱旺口至小浮橋袤百七十里河歸故道自是蕭縣去大河十五里而近而沛縣去河益逺又東經徐州之北又東南經靈壁縣之北大河在徐州城東北今為漕黃交會之衝咽喉重地也嘉靖八年河決州北大溜溝三十二年河決州東南之房村在州東南五十里旋塞之四十四年河由秦溝衝茶城運道大阻神宗元年河決房村三十三年河決州北境之蘇家莊淹豐沛黃水逆流灌濟寧魚臺單縣而魚臺尤甚于是吕梁河澀明年復故三十九年河決狼矢溝在州東二十里塞之明年又決三山在州東南二十里灌睢寧諸處出白洋小河復合正河尋塞之四十四年復決狼矢溝由蛤蟃周柳等湖蛤湖蟃湖與周湖栁湖俱在邳州西北入泇河出直口直河口也復與黃會既而復故天啓三年河決徐州青田大龍口尋塞之四年黃水大漲灌州城乃遷州治于雲龍山而靈壁縣亦大河所經也大河在縣東北五十餘里隆慶四年河決縣西北之雙溝神宗十七年河又決雙溝單家口四十二年河決靈壁縣之陳鋪決口旋淤河流復故天啓元年河決雙溝黃鋪水由永姬湖在睢寧縣境出白小河口仍與黃會白洋河在宿遷縣故道湮涸復築塞之又東南經睢寧縣北邳州城南大河在睢寧縣西北五十里隆慶四年河決睢寧之曲頭集曲頭集王家口馬家淺新安集一帶皆縣北境之要口築塞之而邳州尤大河之襟要也大河在州城南二里城北有沂河從山東沂州界南流徑城下分東西流南入大河又州西北有泇河亦自山東嶧縣界流入境會沂水入于河隆慶六年邳州河決神宗二年河決邳州三年邳州河溢是時河決崔鎮逆灌邳徐既而潘季馴濬塞之河復舊道十七年季馴于河南岸睢寧界上築洋山至土山橫堤以防橫溢河安流三十二年泇河成而黃運分為兩途矣又東徑宿遷縣南又東徑桃源縣北大河在宿遷縣南十里東流為小河口睢水入大河之道也又東徑桃源縣城北西北四十里曰崔鎮口隆慶五年河決運河淺阻神宗六年河臣潘季馴始修塞之神宗二十六年于縣境開新河分導黃河入海既而復塞又東南經清河縣南而淮河來合焉大河在清河縣治南一里淮水自西南來合焉縣當淮黃交會之衝形勢特重志云黃河經流即泗水舊道也泗水亦名南清河縣因以名縣西三十里有三汊河口泗水至此分為大小二清河大清河徑縣治東北入淮俗訛為老黃河今湮其小清河在縣治西南入淮即今之清口也又東徑淮安府城北又東經安東縣南而入于海河淮合流經淮安府城北五里永樂十四年平江伯陳瑄經理漕渠于北河南岸淮人謂黃河為北河淮河為南河亦曰外河而漕河為裏河築堤四十餘里隆慶三年河溢自清河抵淮安城西淤三十餘里決方新二壩二壩在府城西北三十里清江浦隄之東出海平地水深尺餘四年淮決髙堰河決崔鎮在桃源縣橫流四溢連年不治神宗六年河臣潘季馴培髙堰以障淮水之東塞崔鎮以防大河之北而黃淮復合是時亦增築清江浦新城及鉢池山栁浦灣迤東堤岸稱為完固十四年河決范家口在府城東北水灌淮城全河幾奪又決天妃壩即清江浦口舊壩也淤福興等閘尋塞治之二十三年河淮決溢邳泗髙寶諸處皆患水災按臣牛應元言治河在闢清口浮沙次疏草灣下流達伍港灌口廣其渡入海治淮在開周家橋達芒稻河入江河臣楊一魁亦議先分黃次導淮分黃則開黃家嘴新河分泄黃水導淮則闢清河積沙數十里又于髙堰旁若周家橋武家墩稍引淮支流分入江海水患稍息天啓元年河決王公堤堤在清江浦北岸逼鄰大河志云自淮安西門外抵清江浦約三十里內外二河僅隔一堤相距不過尋丈王公堤勢最危急二瀆南徙衝刷日甚捲掃堤壩不可不密也河渠考天啓元年準安淫雨連旬黃淮暴漲水灌淮安城小民蟻城垣而居郡守宋統殷等力塞王公堤患始殺焉三年復決磨盤莊在城西二十餘里蓋淮郡為漕淮黃綰轂之口也而安東城在黃淮北岸海口漸近上流無壅水自奔趨以赴海矣右今大河地志大河之流自漢至今流移變異不可勝紀然孟津以上則禹迹宛然以海為壑則千古不易也由孟津而東由北東以趨于海則澶滑其必出之途由南道以趨于海則曹單其必經之地衝澶滑必由陽武之北而出汲縣胙城之間衝曹單必由陽武之南而出封邱蘭陽之下此河變之託始也由澶鄆而極之或出大名歷邢兾道滄瀛以入海或歷濮范趨博濟由濵棣以入海由曹單而極之或溢巨野浮濟鄆謂濟寧東平挾汶濟以入海或經豐沛出徐邳奪淮泗以入海此其究竟也要以北不出漳衛南不出長淮中間數百千里皆縱橫糜爛之區矣又自古大河深通獨為一瀆今九河故道既湮滅難知即歷代經流亦填淤莫據太抵決而北則掩漳衛決而東則侵清濟決而南則陵淮泗昔人謂河不兩行余謂自漢以來河殆未嘗獨行矣胡氏渭曰河一過大伾而東不決則已決則東南注于淮其勢甚易丘文莊以宋熙寧十年河決為入淮之始非也先是天禧三年河決滑州歷澶濮曹鄆注梁山濼合清水古汴渠東入于淮矣又先是咸平三年河決鄆州浮巨野入淮泗矣又先是太平興國八年河大決滑州泛澶濮曹濟東南流至彭城入于淮矣溯而上之則漢元光三年河決濮陽瓠子東南注巨野通于淮泗矣但皆未幾即塞其歷久而不變至今五百餘嵗河淮并為一瀆則自金明昌五年始蕙田案此言淮河合瀆之始又曰元末河復北徙自東明曹濮下及濟寧而運道壞明洪武初命徐達自曹州東引河至魚臺入泗以通運永樂九年又命宋禮自曹疏河經濮州東北入會通河是北流猶未絶也逮遷都之後仰給於會通者重始畏河之北北即塞之宏治中兩決金龍口直衝張秋議者為漕計遂築斷黃陵岡支渠而北流於是永絶始以清口一線受萬里長河之水陽武以下河之所經繕完故隄增卑倍薄但期不害於漕而漢之下䇿轉為明之上䇿矣至於黃淮既合則唯以堰閘為務堰者髙家堰家一作加閘者淮南諸湖閘口也堰閘以時修固則淮不南分助河衝刷黃沙使海口無壅潘氏季馴論治河之要曰河之性宜合不宜分宜急不宜緩合則流急急則蕩滌而河深分則流緩緩則停滯而沙淤此以隄束水借水攻沙為以水治水之良法也又曰通漕於河則治河即以治漕會河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海自漢以來治河者莫不以分水為長策唯張戎之論不然潘公深得其意觀其所言若無赫赫之功然百餘年來治河之善卒未有如潘公者蓋會通必不可廢則河唯宜注淮以入海雖有賈魯之才智亦無所施故邵文莊有治之以不治乃所以深治之之説古語云守病不治常得中醫此之謂也地志自古及今治河之説亦紛如矣然終未有竒䇿祕計也其稍異者亦曰移河而北載之髙地耳夫宋人回河而東為千古之誚今遽欲回河而北不復蹈前轍乎或曰别穿漕渠無藉于河河必無如我何夫漕渠縱無藉于河河可任其橫決乎淮濟諸州之民何罪而盡委之溪壑乎且自禹貢以至于今大河常為轉輸之道置河而言漕不猶因咽而廢食乎或曰棄地以畀河使遂其遊蕩夫九州之內莫大於海乃舍其歸宿之地而于都邑閭井間别求一貯水之壑此更不通之論也然則治河者將如何曰人事修舉而已矣所謂人事者疏也濬也隄也塞也無不可用也上流利用疏暴漲利用疏漢桓談新論曰河水濁一石水六斗泥而民僅引河溉田令河不通利至三月桃花水至則決以其噎不利也可禁民勿復引河此即後人河不兩行之左證也賈讓以多開水門為中䇿而説者非之似矣然今榆林寧夏以西皆引河灌溉有沃饒之利誠上流多為支分稍殺其悍激之勢未必非利也至漫漶四出之日濬塞之功茫然莫措于是多為支𣲖平其泛濫而後隨宜致功軌之于正疏可偏廢乎歸流宜用濬農隙水涸時宜用濬河出險就平中土夷曠孟鞏而東曽無崇山巨陵為之防重陂大澤為之節惟恃河身深濶庶幾順流無阻安可不察其堙障急為蕩滌又北方土阜水流迅直霜降水涸往往曽不容舫及伏秋淫潦百川灌輸澒洞之勢一㵼千里使不于淺涸無事時預為經理使深廣如一忽然奔潰而後圖之其有濟乎河流散漫宜用堤地勢卑薄宜用堤蓋河流易遷任其浸淫無以約之則變且不測隄以束之使順隄直趨無從旁溢所謂因其勢而為之防非逆其流而為之障也若其沙土疏薄形勢卑窪則必當規其逺近隨其夷險多方以制其侵嚙禦其奔衝若以勞費為虞是厝火于積薪之下也故道當因則新口宜塞正流欲利則旁支宜塞歐陽子謂故道不可復亦謂故道之湮滅難返者耳若源流未改而忽以一時之衝溢遂棄舊道于不問將隨其決裂何所底止又水之橫潰多在上流惟下流淤然後上流潰亦必上流緩然後下流淤此上流謂近海口之上流近海之處正當厚其力而迸其勢不當多為之途以弱其力也如草灣河新黃河之類非治河勝策也所謂塞亦可用者非乎要以與時變通因端順應本之以已飢已溺之心揆之于行所無事之智河未必終于不可治也夫蕙田案以上兩條論治河之要胡氏渭曰天官書曰中國山川東北流其維首在隴蜀尾沒於勃碣漢書天文志云勃海碣石一行言山河兩戒以河濟為北紀江淮為南紀由此觀之禹河從勃碣入海上應天文下協地理漢武帝所謂聖人作事為萬世功通於神明恐難改更者也殷本紀載湯誥之言曰東為江北為濟西為河南為淮四瀆已修萬民乃有居四瀆之由來尚矣爾雅江河淮濟為四瀆四瀆者發源注海者也劉熙釋名曰瀆獨也各獨出其所而入海也自王莽時河徙從千乘入海而北去碣石逺矣然猶未離乎勃海也自金明昌中河徙而河半不入勃海矣元至正中又徙而河全不入勃海矣河南之濟久枯河或行其故道今又與淮渾濤而入海淮不得擅瀆之名四瀆亡其二矣世習為固然恬不知怪愚嘗為杞人之憂萬一清口不利海口愈塞加之以淫潦而河淮上流一時並決挾阜陵洪澤諸湖衝蕩髙堰人力倉卒不能支勢必決入山鹽髙寶諸湖而淮南海口沙壅更甚於曩時怒不得泄則又必奪邗溝之路直趨瓜洲南注于江至通州入海四瀆并為一瀆拂天地之經姦南北之紀可不懼與欲絶此患莫如復禹舊迹然河之南徙日以逺矣濬滑汲胙之間無河新鄉獲嘉亦無河矣賈讓李垂之䇿將安所用之或曰金溫薩可喜請於新鄉縣西決河水使東北合清河至清州栁口入海其説不可行乎曰今新鄉流絶欲自武陟之東濬其故道約一百三四十里更於新鄉縣西決河使東北流鑿生地五十里勞費不訾民何以堪且滎陽以下每決必潰右隄未聞有決左隄而北者疑此地北髙南下新鄉縣西之故道去清河雖近未必能導之使北也蕙田案此言河不可使北又案為淮揚籌水患者皆言挽河北行使淮自淮而河自河則無潰決之患不知自周至金河未嘗與淮合而河患不已則河之善決豈待與淮合而後其勢始暴哉今竟移河北去淮離河則淮害息而河之為害於他處必有如前代者其費水衡之錢貽赤子之患如故耳況今日之河必不可遷之使北者以其為運道所關也國家數百萬漕糧豈可一悮倘引河入海必穿運河而東河一入運則運道必廢其利害有什百于河決者豈可輕議況河之故道自禹至金其迹有五將盡舍不用而别開一道耶抑即就此五道之中擇而復之耶復禹時故道則必開武陟原武獲嘉陽武新鄉之地使成河而後引河入衛衛河即清水禹時清但入河在今日則必由衛河以達漳河矣由衛入漳東由天津入海矣復周時故道則自衛輝以東必更開濬滑開州之地使成河鑿宋商胡故道過大名入衛河以北矣復漢時故道則自開州以東必更開清豐觀城范縣東阿平原德州之地使成河引河至蒲臺利津以入海矣宋與周二路相去不逺故不另出復金時北流故道則必開新鄉胙城長垣曹鄆夀張之地使成河引河至東平入大清河以入海矣掘地則數千百里歷州郡以數十計無論人力必不能勝即使能勝能保河之必如人意驅之即行行之無變乎即衛河漳河大清河皆今日之巨川也問其身之寬深隄岸之堅固能容全河之水而不虞其汜濫乎此大禹值此亦不敢毅然為之而略無所顧慮也禹之治河也自積石龍門以至洚水大陸必當時河形本屬如是禹特因而疏浚利導之必非河欲東而挽之使西河既南而遏之使北也河之南徙已非一日又安能另尋一路使之安流順軌而北去哉右禹貢隨山濬川五禮通考卷二百五
