body:
  text: 五禮通考卷八刑部尚書秦蕙田撰吉禮八圜丘祀天齊書禮志髙帝建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不議曹郎中裴昭明儀曹郎中孔逷議今年七月宜殷祀來年正月宜南郊殿中郎司馬憲議南郊無配饗祠如舊右僕射王儉議案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徵曰二年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因緣堯宜以髙祖配天魏髙堂隆議以舜配天蔣濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即爲前式蕙田案殷祭與郊自是兩事何先後之可議裴孔得之王儉則仍讖緯之習詞稍支矣其郊配之議則不可易儉議又云郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新絜也鄭𤣥云用辛日者為人君當齋戒自新絜也漢魏以來或丁或己而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑爲正牲宜尚白白虎通曰三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創歴郊廟用牲一依晉宋犧牲之色率由舊章蕙田案郊日用辛較之或丁或己固有據矣但不知其為祀天祈榖之日而非古人冬至南郊之正也齊併二郊為一祭用辛日于建寅之月所謂義在報天事兼祈榖兩失之矣建元二年春正月辛丑車駕親祀南郊樂志建元二年有司奏郊廟雅樂歌辭舊使學士博士撰搜簡採用請敕外凡肄學者普令製立參議太廟登歌宜用司徒褚淵餘悉用黄門郎謝超宗辭超宗所撰多刪顔延之謝莊辭以為新曲備改樂名永明二年太子步兵校尉伏曼容上表宜集英儒刪纂雅樂詔付外詳竟不行羣臣出入奏肅咸之樂夤承寶命嚴恭帝緒奄受敷錫升中拓宇亘地稱皇罄天作主月域來賓日際奉土開元首正禮文樂舉六典聨事九官列序此下除四句皆顔辭牲出入奏引牲之樂皇乎敬矣恭事上靈昭教國祀肅肅明明有牲在滌有潔在俎以薦王衷以答神祜此上四句顔辭陟配在京降德在民奔精望夜髙燎佇晨薦豆呈毛血奏嘉薦之樂我恭我享唯孟之春以孝以敬立我蒸民青壇奄靄翠幕端凝嘉俎重薦兼籍再升設業設簴展容玉庭肇禋配祀克對上靈此一篇増損謝辭迎神奏昭夏之樂惟聖饗帝唯孝饗親此下除四句禮行宗祀敬達郊禋金枝中樹廣樂四陳此下除月御案節星驅扶輪遥興逺駕曜曜振振告成大報受釐元神皇帝入壇東門奏永至之樂紫壇望靈翠幙佇神率天奉贄罄地來賓神貺並介泯祗合祉恭昭鑒享肅光孝祀威藹四靈洞曜三光皇德全備大禮流昌皇帝升壇奏登歌辭報唯事天祭實尊靈史正嘉兆神宅崇禎五畤昭鬯六宗彛序介丘望塵皇軒肅舉皇帝初獻奏文德宣烈之樂營太畤定天衷思心緒謀筮從此下除二句田燭置爟火通大孝昭國禮融此一句改餘皆顔辭此下又除二十二句次奏武德宣烈之樂功燭上宙德耀中天風移九域禮飾八埏四靈晨炳五緯宵明膺歴締運道茂前聲太祖髙皇帝配饗奏髙德宣烈之樂此章永明二年造奏尚書令王儉辭饗帝嚴親則天光大舄奕前古榮鏡無外日月宣華卿雲流靄五漢同休六幽咸泰皇帝飲福酒奏嘉胙之樂鬯嘉禮承休錫盛徳符景緯昌華應帝策聖藹耀昌基融祉暉世歴聲正涵月軌書文騰日迹寶瑞昭神圖靈貺流瑞液我皇崇暉祚重芬冠往籍送神奏昭夏之樂薦饗洽禮樂該神娛展辰斾囘洞雲路拂琁階柴雰藹青霄開睠皇都顧玉臺留昌德結聖懐皇帝就燎位奏昭逺之樂天以德降帝以禮報牲罇俯陳柴幣仰燎事展司采敬達瑄薌煙贄青昊震颺紫場陳馨示策肅志宗禋禮非物備福唯誠陳皇帝還便殿奏休成之樂重奏昭事上祀饗薦具陳囘鑾轉翠拂景翔宸綴縣敷暢鍾石昭融羽炫深晷籥曀行風肆序輟度肅禮停文四金聳衞六馭齊輪禮志建元四年世祖即位其秋有司奏前代嗣位或因前郊年或別始晉宋以來未有畫一今年正月己郊未審明年應郊與否尚書令王儉議檢晉明帝太寧五年南郊其年九月崩成帝即位明年改元即郊簡文咸安二年南郊其年七月崩孝武即位明年改元亦郊宋文帝元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此二代明例差可依倣祭酒張緒等並同詔可武帝本紀永明元年春正月辛亥車駕祀南郊大赦改元禮志永明元年當南郊而立春在郊後世祖欲遷郊尚書令王儉啟案王肅曰周以冬至祭天於圜丘以正月又祭天以祈穀祭法稱燔柴太壇則圜丘也春秋傳云啟蟄而郊則祈穀也中朝省二丘以并二郊即今之郊禮義在報天事兼祈穀既不全以祈農何必俟夫啟蟄史官唯見傳義未達禮㫖又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康五年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齋行之不疑今齋内合朔此即前准竊謂無煩遷日從之蕙田案王儉所云所謂調停之論也既不全以祈農則非月令元日之義何必俟夫啟蟄又非冬至報天之正意在遷就先郊後春不知適以彰其失也永明二年祠部郎中蔡履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂髙廟世祖廟謂之五供蔡邕所據亦然近世存省故郊堂共日來年郊祭宜有定準太學博士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議漢元鼎五年以辛巳行事自後郊日略無違異元封元年四月癸卯登封泰山坐明堂五年甲子以髙祖配漢家郊祀非盡天子之縣故祠祭之月事有不同後漢永平以來明堂兆於國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有說則從經禮無文難以意造是以必算良辰而不祭寅丑且禮之奠祭無同共者唯漢以朝日合於報天爾若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於明堂以文王配故宋氏創立明堂郊還即祭是用鄭志之說也蓋為志者失非𤣥意也𤣥之言曰未審周明堂以何月於月令則以季秋案𤣥注月令季秋大饗帝云大饗徧祭五帝又云大饗於明堂以文武配其時秋也去啟蟄逺矣又周禮大司樂凡大祭祀宿縣尋宿縣之㫖以日出行事故也若日闇而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云天郊夕牲之夜夜漏未盡八刻進熟明堂夕牲之夜夜漏未盡七刻進熟尋明堂之在郊前一刻而進獻奏樂方待郊還魏髙堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審於時定制是則周禮二漢及魏皆不共日矣禮以辛郊書以丁祀辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂司徒西閣祭酒梁王議孝經鄭𤣥注云上帝亦天別名如鄭㫖帝與天亦言不殊近代同辰良亦有據魏泰和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前準驍騎將軍江淹議郊旅上天堂祀五帝非謂一日再黷之謂無俟釐革尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日不共者義在必異也元始五年正月六日辛未郊髙皇帝以配天二十二日丁亥宗祀孝文於明堂配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年巡狩岱宗柴祭翌日祀五帝於明堂柴山祀帝尚不共日郊堂宜異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲逺五祀紹統五供與忠此奏皆為相符髙堂隆表二郊及明堂宗廟各一日摯虞新禮議明堂南郊間三兆禋天享帝共日之證也又上帝非天昔人言之已詳今明堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二今祀明堂不應大駕尚書郎王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂唯據自郊徂宮之義未達祀天旅帝之㫖何者郊壇旅天甫自詰朝還祀明堂便在日昃雖致祭有由而煩黷斯甚異日之議於理為宏春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉泰寧有詔未及遵遂咸和八年甫得營繕太常顧和秉議親奉康皇之世已經遵用宋氏因循未遑釐革今宜親祀北郊明年正月上辛祀昊天次辛瘞后土後辛祀明堂御並親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕衮冕之服諸祀咸用詔可蕙田案祀天以冬至祈穀以孟春北郊以仲夏明堂以季秋禮有定期未有并于一時而兼及宗廟者漢時本無兩郊及明堂宗廟之禮而謬為五供之舉豈可據為典要而援議哉永明諸臣不求諸古而尋之非禮宜其聚訟紛紜毫無準則徒見嗤於後世爾顧我鈞地天先食辨冬至祀天夏至祀地周禮之明文也解之者曰冬至一陽始生夏至一隂始生各迎其始而祀之此理之至當而無可疑者也後世不明禮意其改為合祭者失固不待言矣亦有分為南北郊者則又改冬至為孟春遂使昊天之祭有祈穀而無大報何歟其說以為地先天食理所不可而又援周正夏正之別以傳㑹之一若周人固有先後而後世之先後必不可以從周者甚矣其惑也夫冬至之日微陽始復積之丑月寅月而陽盛焉又進之卯辰巳三月而陽極焉則此微陽者固即來年之春夏所以生萬物長萬物者也至來年之夏至而一隂生焉是乃秋冬之所以遂萬物而成萬物也唯必迎其始以為敬故祭之乃在建寅正歲之前是則先之至也何反以為後乎一歲之有十二月也猶一日之有十二時也今將舉行大典則子夜而興昧爽而畢事論者不以為昨日之晚而皆知其為次日之早也何獨于冬至之為來歳始而疑之若夫三統之建子為天正丑為地正寅為人正固皆可以為嵗首至于二十四氣之運行則無可改也周人建子豈不知夏之在前冬之在後耶孔子言行夏之時但言歲首當從人正耳天開于子之義千古所同行夏正者不得改之為寅也不原制作之所以然而妄以一年之前後為次於是正月圜丘五月方澤迎隂氣者乗其始生迎陽氣者俟其大盛是為尊地而慢天也而反以先天為敬豈不悖哉武帝本紀三年正月辛卯車駕祠南郊大赦七年正月辛亥車駕祠南郊大赦九年正月辛丑車駕祠南郊詔京師見囚繫詳量原遣鬱林王本紀隆昌元年正月辛亥車駕祠南郊禮志建武二年通直散騎常侍庾曇隆啟伏見南郊壇員兆外内永明中起瓦屋形製宏壯檢案經史無所准據尋周禮祭天於圜丘取其因髙之義秦漢以來雖郊祀參差而壇域中間並無更立宮室宋元嘉南郊至時權作小陳帳以為退息太始薄加修廣永明初彌漸髙麗往年工匠遂啟立瓦屋前代帝皇豈于上天之祀而昧營搆所不為者深有情意至敬無文以素為貴竊謂郊事宜擬休偃不俟髙大以明謙恭肅敬之㫖太學博士賀瑒議周禮王旅上帝張氊案設皇邸國有故而祭亦曰旅氊案以氊為牀於幄中不聞郊所置宮宇兼左丞王摛議掃地而祭於郊謂無築室之議並同曇隆驍騎將軍虞炎議以為誠慤所施止在一壇漢之郊祀饗帝甘泉天子自竹宮望拜息殿去壇場既逺郊奉禮畢旋幸於此瓦殿之與帷宮謂無簡格祠部郎李撝議周禮凡祭祀張其旅幕張尸次尸則有幄仲師云尸次祭祀之尸所居更衣帳也凡祭之文既不止於郊祀立尸之言理應關於宗廟古則張幕今也房省宗廟旅幕可變為棟宇郊祀氊案何為不轉製檐甍曇隆議不行祠部郎何佟之奏曰案周禮大宗伯以蒼璧禮天黄琮禮地鄭𤣥又云皆有牲幣各倣其器之色如禮天圜丘用𤣥犢禮地方澤用黄牲矣牧人云凡陽祀用騂牲隂祀用黝牲鄭𤣥云騂赤黝黑也陽祀祭天南郊及宗廟隂祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於泰圻祭地也用騂犢鄭云地隂祀用黝牲與天俱用犢故連言之耳知此祭天地即南北郊矣今南北兩郊同用𤣥牡又明堂宗廟社稷俱用赤有違昔典又鄭𤣥云祭五帝於明堂勾芒等配食自晉以來并圜丘於南郊是以郊壇列五帝勾芒等今明堂祀五精更闕五神之位北郊祭地祗而設重黎之坐二三乖舛懼虧盛則前軍長史劉繪議語云犂牛之子騂且角雖欲勿用山川其舍諸未詳山川合為隂祀不若在隂祀則與黝乖矣佟之又議周禮以天地為大祀四望為次祀山川為小祀周人尚赤自四望以上牲色各依其方者以其祀大宜從本也山川以下牲色不見者以其小從所尚也則論禮二說豈不合符參議為允從之明帝本紀簡于出入竟不南郊東昏侯本紀永元元年正月辛卯車駕祠南郊三年正月辛亥車駕祠南郊大赦和帝本紀永元三年二月己巳羣臣上尊號立宗廟及南北郊蕭穎胄傳梁王屢表勸和帝即尊號穎胄使別駕宗史撰定禮儀于江陵立宗廟南北郊悉依建康右齊郊禮隋書禮儀志梁南郊為圜壇在國之南髙二丈七尺上徑十一丈下徑十八丈其外再壝四門常與北郊間歲正月上辛行事用一特牛祀天皇大帝於其上以皇考太祖文帝配禮以蒼璧制幣五方上帝五官之神太一天一日月五星二十八宿太微軒轅文昌北斗三台老人風伯司空雷電雨師皆從祀其五帝二十八宿及風雨師等座有坎五帝亦如之餘皆平地器以陶匏席用藁秸太史設燎壇於景地皇帝齋於萬夀殿乗玉輅駕以行禮禮畢變服通天冠而還樂志梁氏之初樂緣齊舊武帝素善鐘律詳悉舊事遂自制定禮樂國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止乎十二則天數也乃去階步之樂增撤食之雅焉衆官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒論選士之秀者而升之學曰俊士也二郊太廟明堂三朝同用焉皇帝出入宋孝建二年秋起居注奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用牲出入宋元徽二年儀注奏引牲齊及梁初亦同至是改為滌雅取禮記帝牛必在滌三月也薦毛血宋元徽三年儀注奏嘉薦齊及梁初亦同至是改為牷雅取春秋左氏傳牲牷肥腯也北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為諴雅取尚書至諴感神也皇帝飲福酒宋元徽三年儀注奏嘉祚至齊不改梁初改為永祚至是改為獻雅取禮記祭統尸飲五洗玉爵獻卿古之福酒亦古獻之義也北郊明堂太廟同用就燎位宋元徽三年儀注奏昭逺齊及梁不改就埋位齊永明六年儀注奏隷幽至是燎埋俱奏禋雅取周禮大宗伯以禋祀祀昊天上帝也其辭並沈約所製俊雅歌詩三曲四言設官分職髦俊攸俟髦俊伊何貴德尚齒唐又咸事周寧多士區區衞國猶賴君子漢之得人帝猷乃理開我八襲闢我九重珩佩流響纓紱有容衮衣前邁列辟雲從義兼東序事美西雍分階等肅異列齊恭重列北上分庭異陛百司揚職九賓相禮齊宋舅甥魯衞兄弟思皇藹藹羣龍濟濟我有嘉賓實唯愷悌皇雅三曲五言帝德實廣運車書靡不賓執瑁朝羣后垂旒御百神八荒重譯至萬國婉來親華葢拂紫微勾陳統太一容裔被緹組參差羅罕畢星囘照以爛天行徐且謐清蹕朝萬㝢端冕臨正陽青絇黄金繶衮衣文繡裳既散華蟲采復流日月光滌雅一曲四言將修盛禮其儀孔熾有腯斯牲國門是置不黎不㾞靡諐靡忌呈肌獻體永言昭事俯休皇德仰綏靈志百福具膺嘉祥允洎駿奔伊在慶覃遐嗣牷雅一曲四言反本興敬復古昭誠禮容宿設祀事孔明華俎待獻崇碑麗牲充哉繭握肅矣簪纓其膋既啟我豆既盈庖丁遊刃葛盧驗聲多祉攸集景福來并諴雅一曲三言南郊降神用懐忽慌瞻浩蕩盡諴潔致䖍想出杳㝠降無象皇情肅具僚仰人禮盛神途敞僾明靈申敬饗感蒼極洞𤣥壤諴雅一曲四言南北郊明堂太廟送神同用我有明德馨非稷黍牲玉孔備嘉薦唯旅金懸宿設和樂具舉禮達幽明敬行罇俎鼓鐘云送遐福是與獻雅一曲四言神宮肅肅天儀穆穆禮獻既同膺此釐福我有馨明無愧史祝禋雅一曲四言就燎紫宮昭煥太一微𤣥降臨下土尊髙上天載陳珪璧式備牲牷雲孤清引栒虡髙懸俯昭象物仰致髙煙肅彼靈祉咸達皇䖍普通中薦蔬之後改諸雅歌勅蕭子雲製詞既無牲宰遂省滌雅牷雅云歴代名臣奏議天監元年時議又以為周禮云若樂六變天神皆降神居上𤣥去還怳忽降則自至迎則無所可改迎為降而送依前式又周禮云若樂八變則地祗皆出可得而禮地宜依舊名逆神並從之初宋齊代祀天地祭宗廟准漢祠太一后土盡用宮懸又太常任昉亦據王肅議云周官以六律五聲八音六舞大合樂以致鬼神以和邦國以諧兆庶以安賓客以恱逺人是謂六同一時皆作今六代舞獨分用之不懕人心遂依肅議祭祀郊廟備六代樂梁書劉勰傳時七廟饗薦已用蔬果而二郊農社猶有犧牲勰乃表言二郊宜與七廟同改詔付尚書議依勰所陳蕙田案郊廟大典至無血食此不經之事有梁君臣其亦運會使然歟禮儀志天監三年左丞吳操之啟稱傳云啟蟄而郊郊應立春之後尚書左丞何佟之議今之郊祭是報昔歲之功而祈今年之福故取歲首上辛不拘立春之先後周冬至於圜丘大報天也夏正又郊以祈農事故有啟蟄之說自晉太始二年并圜丘方澤同於二郊是知今之郊禋禮兼祈報不得限以一途也帝曰圜丘自是祭天先農即是祈穀但就陽之位故在郊也冬至之夜陽氣起於甲子既祭昊天宜在冬至祈穀時可依古必須啟蟄在一郊壇分為二祭自是冬至謂之祀天啟蟄名為祈穀蕙田案武帝此言乃得周禮之正然卒未嘗至日郊祭真所謂知之非艱者歟何佟之又啟案鬯者盛以六彛覆以畫羃備其飾施之宗廟今南北二郊儀注有祼既乖尚質謂宜革變博士明山賔議以為表記天子親耕潔盛秬鬯以事上帝蓋明堂之祼耳郊不應祼帝從之又有司以為祀竟器席相承還庫請依典燒埋之佟之等議案禮祭器敝則埋之今一用便埋費而乖典帝曰薦藉輕物陶匏賤器方還付庫容復穢惡但敝則埋之蓋謂四時祭器耳自是從有司議燒埋之蕙田案祼地所以求神于隂天神在上故無祼秬鬯乃八尊所用不必祼也何議是明山賓謂秬鬯事上帝為明堂之祼則謬矣上帝即天郊既不祼明堂安得有祼其病正坐以天與上帝為二仍注家之弊也四年佟之云周禮天曰神今天不稱神天攢題宜曰皇天座又南郊明堂用沈香取本天之質陽所宜也帝從之梁書武帝紀四年正月戊申詔曰夫禋郊饗帝至敬攸在致誠盡慤猶懼有違而往代多令宮人縱觀兹禮幃宮廣設輜軿耀路非所以仰䖍蒼昊昭感上靈屬車之間見譏前世便可自今停止辛亥輿駕親祠南郊赦天下隋書禮儀志五年武帝明山賓稱伏尋制㫖周以建子祀天五月祭地殷以建丑祀天六月祭地夏以建寅祀天七月祭地自頃代以來南北二郊同用夏正詔更詳議山賔以為二儀並尊三朝慶始同以此日二郊為允并請迎五帝於郊皆以始祖配饗及郊廟受福唯皇帝再拜明上靈降祚臣下不敢同也詔並依議七年帝以一獻為質三獻則文事天之道理不應然詔下詳議博士陸瑋明山賓禮官司馬褧以為宗祧三獻義兼臣下上天之禮主在帝王約理申義一獻為允自是天地之祭皆一獻始省太尉亞獻光禄終獻又太常丞王僧崇稱五祀位在北郊圜丘不宜重設帝曰五行之氣天地俱有故宜兩從崇又曰風伯雨師即箕畢星矣而今郊祀箕畢二星復祭風伯雨師恐繁祀典帝曰箕畢自是二十八宿之名風伯雨師自是箕畢星下隷兩祭非嫌梁書許懋傳宋齊舊儀郊天祀帝皆用衮冕至天監七年懋始請造大裘何允傳髙祖遣領軍司馬王果宣㫖諭意允因謂果曰圜丘國郊舊典不同南郊祠五帝靈威仰之類圜丘祠天皇大帝北極大星是也往代合之郊丘先儒之巨失今梁德告始不宜遂因前謬卿宜詣闕陳之蕙田案何允棲身巖穴而因使獻言其真篤守鄭學者也然終梁之世郊丘不分後且并南郊從祀而去之則武帝亦知允言之非矣梁書武帝本紀天監八年正月辛巳輿駕親祠南郊赦天下内外文武各賜勞一年十年正月辛丑輿駕親祠南郊大赦天下居局治事賜勞二月隋書禮儀志十一年太祝牒北郊止有一海及二郊相承用染俎盛牲素案承玉又制南北二郊壇下衆神之座悉以白茅詔下詳議八座奏禮云觀天下之物無可以稱其徳則知郊祭為俎理不應染又藉用白茅禮無所出皇天大帝坐既用俎則知郊有俎義於是改用素俎并北郊置四海座五帝以下悉用蒲席藁薦并以素俎又帝曰禮祭月於坎良由月是隂義今五帝天神而更居坎又禮云祭日於壇祭月於坎並是別祭不關在郊故得各從隂陽而立壇坎兆於南郊就陽之義居於北郊就隂之義既云就陽義與隂異星月與祭理不為坎八座奏曰五帝之義不應居坎良由齊代圜丘小而且峻邊無安神之所今丘形既大易可取安請五帝座悉於壇上外域二十八宿及雨師等座悉停為坎自是南北二郊悉無坎位矣梁書武帝本紀十二年正月辛卯輿駕親祠南郊赦大辟以下天監十四年春正月辛亥輿駕親祠南郊詔曰朕恭祗明祀昭事上靈臨竹宮而登泰壇服裘冕而奉蒼璧柴望既升誠敬克展思所以對越乾元宏宣徳教而缺於治道政法多昧實佇羣才用康庶績可班下逺近博採英異若有確然鄉黨獨行州閭肥遯丘園不求聞達藏器待時未加收採或賢良方正孝悌力田並即騰奏具以名上當擢彼周行試以邦邑庶百司咸事兆民無隐又世輕世重隨時約法前以劓墨用代重辟猶念改悔其路已壅並可省除十六年春正月辛未輿駕親祠南郊隋書禮儀志十七年帝以威仰魄寶俱是天帝于壇則尊于下則卑且南郊所祭天皇其五帝別有明堂之祀不煩重設又郊祀二十八宿而無十二辰於義闕然于是南郊始除五帝祀加十二辰座與二十八宿各於其方而為壇梁書武帝紀天監十八年春正月辛卯輿駕親祠南郊孝悌力田賜爵一級普通二年春正月辛巳輿駕親祠南郊詔曰凡民有單老孤稚不能自存主者郡縣咸加收養贍給衣食每令周足以終其身又于京師置孤獨園孤幼有歸華髮不匱若終年命厚加料理尤窮之家勿收租賦夏四月乙卯改作南北郊三年八月作二郊及籍田畢班賜工匠各有差四年春正月辛卯輿駕親祀南郊大赦天下應諸窮疾咸加賑䘏并班下四方時理獄訟六年正月辛亥輿駕親祀南郊大赦天下大通元年春正月辛未輿駕親祀南郊詔曰奉時昭事䖍薦蒼璧思承天徳惠此下民凡因事去土流移他境者並聽復宅業蠲役五年尤貧之家勿收三調孝悌力田賜爵一級中大通元年正月辛酉輿駕親祠南郊大赦天下孝悌力田賜爵一級三年正月辛巳輿駕親祠南郊大赦天下孝悌力田賜爵一級五年春正月辛卯輿駕親祠南郊大赦天下孝悌力田賜爵一級大同二年六月詔曰南郊明堂陵廟等令與朝請同班于事為輕可改視散騎侍郎三年正月辛丑輿駕親祠南郊大赦天下孝悌力田賜爵一級五年春正月丁巳御史中丞參禮儀事賀琛奏今南北二郊及籍田往還並宜御輦不復乘輅二郊請用素輦籍田往還乘常輦皆以侍中陪乘停大將軍及太僕詔付尚書博議施行改素輦名大同輦辛未車駕親祠南郊詔孝悌力田及州閭鄉黨稱為善人者各賜爵一級七年正月辛巳車駕親祠南郊赦天下其有流移及失桑梓者各還田宅蠲課五年太清元年春正月辛酉輿駕親祠南郊詔曰天行彌綸覆幬之功博乾道變化資始之德成朕沐浴齋宮䖍恭上帝祗事槱燎髙熛太一大禮克遂感慶兼懐思與億兆同其福惠可大赦天下尤窮者無出即年租調清議禁錮並皆宥釋所討逋叛巧籍隠年闇丁匿口開恩百日各令自首不問往罪流移他鄉聽復宅業蠲課五年孝悌力田賜爵一級居局治事賞勞二年可班下逺近博採英異或德茂州閭道行鄉邑或獨行特立不求聞達咸使言上以時招聘右梁郊禮隋書禮儀志陳制亦以間歲正月上辛用特牛一祀天地於南北二郊永定元年武帝受禪修南郊圜壇髙二丈二尺五寸上廣十丈柴燎告天明年正月上辛有事南郊以皇考德皇帝配其餘準梁之舊陳書髙祖本紀永定二年春正月辛丑輿駕親祠南郊詔曰朕受命君臨初移星琯孟陬嘉月備禮泰壇景候昭華人祗允慶思令億兆咸與惟新且往代祅氛于今猶梗軍機未息徵賦咸繁事不獲已久知下弊言念黔黎無忘寢食夫罪無輕重已發覺未發覺在今昧爽以前皆赦除之西寇自王琳以下並許返迷一無所問近所募義軍本擬西寇並宜解遣留家附業輓訂軍資未送者並停元年軍糧逋餘者原其半州郡縣軍戍並不得輒遣使民間務存優養若有侵擾嚴為法制隋書禮儀志永定二年正月上辛有事南郊除十二辰座加五帝位文帝本紀天嘉元年春正月辛酉輿駕親祠南郊詔曰朕式饗上𤣥䖍奉牲玉髙禋禮畢誠敬兼宏且隂霾浹辰褰霽在日雲物韶朗風景清和慶動人祗忭流庶俗思俾黎元同此多祜可賜民爵一級天嘉三年春正月庚戌設帷宮於南郊幣告胡公以配天辛亥輿駕親祠南郊詔曰朕負荷寶圖函囘星琯兢兢業業庶㡬治定而德化不孚俗弊滋甚永言念之無忘日夜陽和布氣昭事上帝躬奉牲玉誠兼享敬思與黎元被斯寛惠可普賜民爵一級其孝悌力田別加一等隋書禮儀志文帝天嘉中南郊改以髙祖配太常卿許亨奏曰昔梁武帝云天數五地數五五行之氣天地俱有故南北郊内並祭五祀臣案周禮以血祭社稷五祀鄭𤣥云隂祀自血起貴氣臭也五祀五官之神也五神主五行隸于地故與埋沈疈辜同為隂祀既非煙柴無關陽祭故何休云周爵五等者法地有五行也五神位在北郊圜丘不宜重設制曰可又奏曰梁武帝議箕畢自是二十八宿之名風師雨師自是箕畢下隷非即星也故郊雩之所皆兩祭之臣案周禮大宗伯之職云槱燎祀司中司命風師雨師鄭衆云風師箕也雨師畢也詩云月離于畢俾滂沱矣如此則風伯雨師即箕畢星矣而今南郊祀箕畢二星復祭風伯雨師恐乖祀典制曰若郊設星位任即除之亨又奏曰梁儀注曰一獻為質三獻為文事天之事故不三獻臣案周禮司樽所言三獻施於宗祧而鄭注一獻施於羣小祀今用小祀之禮施於天神大帝梁武此義為不通矣且樽俎之物依於質文拜獻之禮主於䖍敬今請凡郊丘祀事準於宗祧三獻為允制曰依議廢帝紀光大元年正月辛卯輿駕親祠南郊隋書禮儀志宣帝即位以南北二郊卑下更議增廣久而不決至太建十一年尚書祠部郎王元規議曰案前漢黄圖上帝壇徑五丈髙九尺后土壇方五丈髙六尺梁南郊壇上徑十一丈下徑十八丈髙二丈七尺北郊壇上方十丈下方十二丈髙一丈即日南郊壇廣十丈髙二丈二尺五寸北郊壇廣九丈三尺髙一丈五寸今議增南郊壇上徑十二丈則天大數下徑十八丈取於三分益一髙二丈七尺取三倍九尺之堂北郊壇上方十丈以則地義下方十五丈亦取二分益一髙一丈二尺亦取二倍漢家之數禮記云為髙必因丘陵為下必因川澤因名山升中于天因吉土饗帝于郊周官云冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘祭法云燔柴於泰壇祭天也瘞埋於泰折祭地也記云至敬不壇掃地而祭於其質也以報覆燾持載之功爾雅亦云丘言非人所造為古圎方兩丘並因見有而祭本無髙廣之數後世隨事遷都而建立郊禮或有地吉而未必有丘或有見丘而不必廣絜故有築建之法而制丈尺之儀愚謂郊祀事重圓方二丘髙下廣狹既無明文但五帝不相㳂三王不相襲今謹述漢梁并即日三代壇不同及更增修丈尺如前聽㫖詔遂依用陳書姚察傳遷尚書祠部侍郎此曹職司郊廟昔魏王肅奏祀天地設宮縣之樂八佾之舞爾後因循不革梁武帝以為事人禮縟事神禮簡古無宮縣之文陳初承用莫有損益髙宗欲設備樂立義以梁武帝為非時朝端在位咸希上㫖察乃博引經籍獨違羣議據梁樂為是當時莫不慙服隋書音樂志陳初並梁樂陳書宣帝紀大建三年正月辛酉輿駕親祠南郊五年正月辛巳輿駕親祠南郊七年正月辛未輿駕親祠南郊隋書禮儀志後主嗣立無意典禮之事加舊儒碩學漸以凋喪至於朝亡竟無改作右陳郊禮魏書樂志天興元年冬詔尚書吏部郎鄧淵定律呂協音樂孟秋祀天西郊兆内壇西備列金石樂具皇帝入兆内行禮咸奏舞八佾之舞太祖本紀天興二年春正月甲子初祠上帝于南郊以始祖神元皇帝配降壇視燎成禮而反禮志為壇通四陛為壝埓三重天位在其上南面神元西面五精帝在壇内壝内四帝各於其方一帝在未日月五星二十八宿天一太一北斗司中司命司祿司民在中壝内各於其方其餘從食者合一千餘神餟在外壝内藉用藁秸玉用四珪幣用束帛牡用黝犢器用陶匏上帝神元用犢各一五方帝共用犢一日月等共用牛一祭畢燎牲體左于壇南已地從陽之義明年正月辛酉郊天其後冬至祭上帝于圜丘夏至祭地于方澤用牲幣之屬與二郊同樂志太祖初冬至祭天于南郊圜丘樂用皇矣奏雲和之舞事訖奏維皇將燎初侍中崔光臨淮王彧並為郊廟歌辭而迄不施用樂人傳習舊曲加以訛失了無章句後太樂令崔九龍條記上之樂署今見傳習其中復有所遺至于古雅尤多亡矣太祖本紀天賜二年夏四月車駕有事于西郊車旗盡黒禮志天賜二年夏四月復祀天于西郊為方壇一置木主七于上東為二陛無等周垣四門門各依其方色為名牲用白犢黄駒白羊各一祭之日帝御大駕百官及賓國諸部大人畢從至郊所帝立青門内近南壇西内朝臣皆位于帝北外朝臣及大人咸位于青門之外后率六宮從黑門入列於青門内近北並西面廩犧令掌牲陳于壇前女巫執鼔立於陛之東西面選帝之十族子弟七人執酒在巫南西面北上女巫升壇搖鼓帝拜后肅拜百官内外盡拜祀訖復拜拜訖乃殺牲執酒七人西向以酒灑天神主復拜如此者七禮畢而返自是之後歲一祭蕙田案歴代郊祀雖變更非一而帝后同拜則未之聞也然非禮之禮其來有自既可神祇共席夫婦同牢則内外躬親奚而不可故岷江始以濫觴豫章生乎兩葉引而伸之觸類而長之斯亦猶合祭並配之㫖已延興二年六月顯祖以西郊舊事歲增木主七易代則更兆其事無益于神明乃革前儀定制主七立碑於郊所髙祖本紀太和十年四月甲子帝初以法服御輦祀于西郊冬十月癸酉有司議依故事配始祖于南郊十二年閏月甲子帝觀築圜丘于南郊十三年正月辛亥車駕有事于圜丘于是始備大駕十五年八月壬辰議肆類于上帝禋于六宗之禮帝親臨決禮志髙閭請依先別處六宗之兆總為一祀而祭之帝曰詳定朝令祀為事首朕躬覽尚書之文稱肆類于上帝禋于六宗文相連屬理似一事上帝稱肆而無禋六宗言禋而不別其名以此推之上帝六宗當是一時之祀非別祭之名肆類非獨祭之月焚禋非他祀之用六宗者必是天皇大帝及五帝之神明矣禋是祭帝之事故稱禋以關其他故稱六以證之然則肆類上帝禋于六宗一祭也互舉以成之今祭圜丘五帝在焉其牲幣俱禋故稱肆類上帝禋于六宗一祀而六祀備焉六祭既備無煩復別立六宗之位便可依此附令永為定法蕙田案以六宗為祀天亦是創見髙祖本紀太和十六年正月辛酉始以太祖配南郊三月辛酉省西郊郊天雜事十八年三月罷西郊祭天禮志太和十九年十一月庚午帝幸委粟山議定圜丘己卯帝在合溫室引咸陽王禧司空公穆亮吏部尚書任城王澄及議禮之官詔曰朝集公卿欲論圜丘之禮今短晷斯極長日方至案周官祀昊天上帝于圜丘禮之大者而漢禮有參差魏晉猶亦未一我魏氏雖上參三皇下考叔世近代都祭圜丘之禮復未考周官為不刋之法令以此祭圜丘之禮示卿等欲與諸賢考之厥衷帝曰夕牲之禮無可依準近在代都已立其議殺牲祼神誠是一日之事終無夕而殺牲待明而祭員外散驍常侍劉芳對曰臣謹案周官牧人職正有夕展牲之禮實無殺牲之事祕書令李彪曰夕不殺牲誠如聖㫖未審告廟以不臣聞魯人將有事于上帝必先有事于泮宮注曰先人以此推之應有告廟帝曰卿言有理但朕先以郊配意欲廢告而卿引證有據當從卿議帝又曰圜丘之牲色無常準覽推古事乖互不一周家用騂解言是尚晉代靡知所據舜之命禹悉用堯辭復言𤣥牡告于后帝今我國家時用夏正至于牲色未知何準祕書令李彪曰觀古用𤣥是取天𤣥之義臣謂宜用𤣥至于五帝各象其方色亦有其義帝曰天何時不𤣥地何時不黄意欲從𤣥又曰我國家常聲鼓以集衆易稱二至之日商旅不行后不省方以助微陽微隂今若依舊鳴鼓得無闕寢鼓之義員外郎崔逸曰臣案周禮當祭之日靁鼓靁鼗八面而作猶不妨陽臣竊謂以鼔集衆無妨古義癸未詔三公衮冕八章太常鷩冕六章用以陪薦甲申長至祀昊天于委粟山髙祖本紀甲申有事于圜丘丙戌大赦天下崔元伯傳元伯同郡董謐入朝拜儀曹郎撰郊廟社稷之儀李業興傳衍散騎常侍朱异問業興曰魏洛中委粟山是南郊邪業興曰委粟是圜丘非南郊异曰比聞郊丘異所是用鄭義我此中用王義業興曰然洛京郊丘之處專用鄭解异曰若然女子逆降傍親亦從鄭以不業興曰此之一事亦不專從若卿此間用王義除禫應用二十五月何以王儉喪禮禫用二十七月也异遂不答蕙田案郊丘分合南北不同故業興朱异各是其是斯乃使命之體非關議禮之準也然南宗王肅因仍晉代中原之士堅守鄭學向非晉武為肅外孫則郊丘合一之說且不傳于後世矣禮志世宗景明二年十一月壬寅改築圜丘于伊水之陽乙卯仍有事焉恩倖傳每適郊廟趙修常驂陪蕙田案郊廟車駕乃以嬖人驂陪志亦荒矣肅宗本紀正光三年十一月乙巳車駕有事于圜丘大赦天下五年春正月辛丑車駕有事于南郊出帝紀永熙元年十一月丁酉日南至車駕有事于圜丘樂志二至郊天地四節祠五帝或公卿行事唯四月郊天帝常親行樂加鐘懸以為迎送之節齊書北魏傳城西有祠天壇立四十九木人長丈許白幘練裙馬尾被立壇上常以四月四日殺牛馬祭祀右北魏郊禮北齊書文宣帝本紀天保二年正月辛亥有事于圜丘以神武皇帝配隋書禮儀志後齊制圜丘方澤並三年一祭謂之禘祀圜丘在國南郊丘下廣輪二百七十尺上廣輪四十六尺髙四十五尺三成成髙十五尺上中二級四面各一陛下級方維八陛周以三壝去丘五十步中壝去内壝外壝去中壝各二十五步皆通八門又為大營於壝之外廣輪三百七十步其營壍廣一十二尺深一丈四面各通一門又為燎壇於中壝之外當丘之景地廣輪三十六尺髙三尺四面各有陛圜丘則以蒼璧束帛正月上辛祀昊天上帝于其上以髙祖神武皇帝配五精之帝從祀于其中丘面皆内向日月五星北斗二十八宿司中司命司人司祿風師雨師靈星于下立為衆星之位遷于内壝之中合用蒼牲九夕牲之旦太尉告廟陳幣于神武廟訖埋于兩楹間焉皇帝初獻太尉亞獻光祿終獻司徒獻五帝司空獻日月五星二十八宿太常丞已下薦衆星其後諸儒定禮圜丘改以冬至云北齊書文宣帝本紀八年八月詔丘郊禘祫時祀皆市取少牢不得剖割有司監視必令豐備孝昭帝本紀皇建二年正月辛亥祀圜丘隋書音樂志齊神武霸跡肇創遷都于鄴猶曰人臣故咸遵魏典及文宣初禪尚未改舊章武成之時始定四郊宗廟三朝之樂羣臣入出奏肆夏牲入出薦毛血並奏昭夏迎送神及皇帝初獻禮五方上帝並奏髙明之樂為覆燾之舞皇帝入壇門及升壇飲福酒就燎位還便殿並奏皇夏以髙祖配饗奏武德之樂為昭列之舞今列其辭云大禘圜丘及北郊歌辭夕牲羣臣入門奏肆夏樂辭肇應靈序奄字黎人乃朝萬國爰徵百神祗展方望幽顯咸臻禮崇聲協贄列珪陳翼差鱗次端笏垂紳來趨動色式贊天人迎神奏髙明樂辭登歌辭同唯神監矣皇靈肅止圓璧展事成文即始士備八能樂合六變風湊伊雅光華襲薦宸衞騰景靈駕霏煙嚴壇生白綺席凝𤣥牲出入奏昭夏辭剛柔設位唯皇配之言肅其禮念暢在兹飾牲舉獸載歌且舞既捨伊腯致精靈府物色唯典齋沐加恭宗族咸暨罔不率從薦毛血奏昭夏辭羣臣出奏肆夏進熟羣臣入奏肆夏辭同初入展禮上月肅事應時繭栗為用交暢有期弓矢斯發瓮簝將事圓神致祀率由先志和以鑾刀臭以血膋至哉敬矣厥義孔髙進熟皇帝入門奏皇夏辭帝敬昭宣皇誠肅致玉帛齊軌屏攝咸次三垓上列四陛旁升龍陳萬騎鳳動千乗神儀天藹晬容離曜金根停軫奉光先導皇帝升丘奏皇夏辭壇上登歌辭同紫壇雲曖紺幄霞褰我其陟止載致其䖍百靈竦聽萬邦咸仰人神咫尺𤣥應肸蠁皇帝初獻奏髙明樂辭上下眷旁午從爵以質獻以恭咸斯暢樂唯雍孝敬闡臨萬邦皇帝奠爵訖奏髙明樂覆燾之舞辭自天子之會昌神道丘陵肅事克光天保九關洞開百靈環列八樽呈備五聲投節皇帝獻太祖配饗神座奏武德之樂昭烈之舞辭皇帝小退當昊天上帝神座前奏皇夏辭同上皇夏配神登聖主極尊靈敬宣昭燭咸逹窅㝠禮宏化定樂奏功成穰穰介福下被羣生皇帝飲福酒奏皇夏之樂皇帝詣東陛還便座又奏皇夏辭同初入門皇心緬且感吉蠲奉至誠赫哉光盛德乾巛詔百靈報福歸昌運承祐播休明風雲馳九域龍蛟躍四溟浮幕呈光氣儷象燭華精濩武方知恥韶夏僅同聲送神降丘南陛奏髙明樂辭皇帝之望燎位又奏皇夏辭同上皇夏獻享畢懸佾周神之駕將上遊超北極絶河流懐萬國寧九州欣帝道心顧留帀上下荷皇休紫壇既燎奏昭夏樂辭皇帝自望燎還本位奏皇夏辭同上皇夏𤣥黄覆載元首照臨合德致禮有契其心敬申事闋潔誠云報玉帛載升棫樸斯燎寥廓幽曖播以馨香皇靈唯監降福無疆皇帝還便殿奏皇夏辭羣臣出奏肆夏辭同上肆夏祠感帝用圜丘辭天大親嚴匪敬伊孝永言肆饗宸明增耀陽丘既暢大典逾光乃安斯息欽若舊章天迴地旋鳴鑾引警且萬且億皇歴惟永陸卬傳齊之郊廟諸歌多卬所制後主紀天統三年正月辛卯祀圜丘蕙田按齊承魏制分立郊丘圜丘三年一祭謂之禘祀初以正月上辛祀昊天上帝後改以冬至南郊則歲一祀以正月上辛祀所感帝大抵從鄭康成禮注之謬而圜丘祀昊天以上辛則并與鄭氏不同矣考終齊之世祀圜丘者三祀南郊者一皆以春正月而冬至之祭卒未嘗行則失禮之中又失禮焉右北齊郊禮周書孝閔帝本紀元年春正月壬寅祠圜丘詔曰予本自神農其于二丘宜作厥主始祖獻侯啟土遼海肇有國基配南北郊文考德符五運受天明命祖于明堂以配上帝明帝本紀元年九月即天王位冬十月乙酉祠圜丘十一月丁未祀圜丘蕙田案孟冬仲冬連舉二祭史家亦不言其故或十月為即位告祭十一月為正祭歟武帝本紀保定元年春正月庚戌祀圜丘天和二年春正月丁亥初立郊丘壇壝制度宣帝本紀宣政元年即位七月丙午祀圜丘隋書禮儀志後周憲章姬周祭祀之式多依儀禮司量掌為壇之制圜丘三成成崇一丈二尺深二丈上徑六丈十有二階每等十有二節在國陽七里之郊圜壝徑三百步内壝半之方一成下崇一丈徑六丈八尺上崇五尺方四丈八方方一階階十級級一尺其祭圜丘及南郊並正月上辛圜丘則以其先炎帝神農氏配昊天上帝于其上五方上帝日月内官中官外官衆星並從祀皇帝乗蒼輅載𤣥冕備大駕而行預祭者皆蒼服音樂志周太祖迎魏武入關樂聲皆闕恭帝元年平荆州大獲梁氏樂器以屬有司制其歌舞竟未之行也天和元年武帝初造山雲舞以備六代南北郊雩壇太廟禘祫俱用六舞南郊則大夏降神大濩獻熟次作大武正德武德山雲之舞宣帝嗣位郊廟皆循用之無所改作今採其辭云圜丘歌辭降神奏昭夏重陽禋祀大報天景午封壇肅且圜孤竹之管雲和弦神光未下風肅然王城七里通天臺紫微斜照影徘徊連珠合璧重光來天策蹔轉鉤陳開皇帝將入門奏皇夏旌廻外壝蹕靜郊門千乗按轡萬騎雲屯藉茅無咎掃地唯尊揖讓展禮衡璜節步星漢就列風雲相顧取法于天降其永祚俎入奏昭夏日至大禮豐犧上辰牲牢修牧繭栗毛純俎豆斯立陶匏以陳大報反命居陽兆日六變鼔鐘三和琴瑟俎竒豆偶唯誠唯質奠玉帛奏昭夏員玉已奠蒼幣斯陳瑞形成象璧氣含春禮從天數知總員神為祈為祀至敬咸遵皇帝升壇奏皇夏七星是仰八陛有憑就陽之位如日之升思䖍肅肅施敬繩繩祝史陳信𤣥象斯格唯類之典唯靈之澤幽顯對揚人神咫尺皇帝初獻作雲門之舞獻以誠鬱以清山罍舉沈齊傾唯尚饗洽皇情降景福通神明皇帝初獻配帝作雲門之舞長丘逺歴大電遙源弓藏髙隴鼎沒寒門人生于祖物本于天尊神配德迄用康年皇帝初獻及獻配帝畢奏登歌歲之祥國之陽蒼靈敬翠雲長象為飾龍為章乗長日坯蟄户列雲漢迎風雨六呂歌雲門舞省滌濯奠牲牷鬱金酒鳳凰樽迴天睠顧中原皇帝飲福酒奏皇夏國命在禮君命在天陳誠唯肅飲福唯䖍洽斯百禮福以千年鉤陳掩映天駟徘徊凋禾飾斚翠羽承罍受斯茂祉從天之來撤奠奏雍夏禮將畢樂將闌迴日轡動天關翠鳳搖和鑾響五雲飛三步上風為馭雷為車無轍迹有煙霞暢皇情休靈命雨留甘雲餘慶帝就望燎位奏皇夏六典聨事九司咸則率由舊章於焉允塞掌禮儀次燔柴在焉煙升玉帛氣斂牲牷休氣馨香膋芳昭晣翼翼䖍心明明上徹帝還便座奏皇夏玉帛禮畢人神事分嚴承乃睠仰瞻迴雲輦路千門王城九軌式道移候司方迴指得一唯清於萬斯寧受兹景命于天告成蕙田案北周郊丘之祭大率與齊同而郊壇之制各異史載祀圜丘者四明帝元年十月宣帝元年七月告祭也明帝元年十一月武帝元年春正月似乎正祭然一以冬至一以孟春其典禮之無定可知矣右周郊禮隋書禮儀志髙祖受命欲新制度乃命國子祭酒辛彦之議定祀典為圜丘于國之南太陽門外道東二里其丘四成各髙八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈再歲冬至之日祀昊天上帝于其上以太祖武元皇帝配五方上帝日月五星内官四十二座次官一百三十六座外官一百一十一座衆星三百六十座並皆從祀上帝日月在丘之第二等北斗五星十二辰河漢内官在丘第三等二十八宿中官在丘第四等外官在内壝之内衆星在内壝之外其牲上帝配帝用蒼犢二五帝日月用方色犢各一五星已下用羊豕各九六月癸未詔以五徳相生赤為火色其郊及社廟服冕如朝會之服旗幟犧牲皆尚赤凡大祀齋官皆于其晨集尚書省受誓戒散齋四日致齋三日祭前一日晝漏上水五刻到祀所沐浴著明衣咸不得聞見衰絰哭泣昊天上帝五方上帝日月皇地祗神州社稷宗廟等為大祀星辰五祀四望等為中祀司中司命風師雨師及諸星諸山川等為小祀大祀養牲在滌九旬中祀三旬小祀一旬其牲方色難備者聽以純色代告祈之牲者不養祭祀犧牲不得捶扑其死則埋之音樂志隋去六代之樂又無四望先妣之祭今既與古祭法有別乃以神祇位次分樂配焉奏黄鍾歌大呂以祀圜丘其祠圜丘皇帝入至版位定奏昭夏之樂以降天神升壇奏皇夏之樂受玉帛登歌奏昭夏之樂皇帝降南陛詣罍洗洗爵訖升壇並奏皇夏初升壇俎入奏昭夏之樂皇帝初獻奏諴夏之樂皇帝既獻作文舞之舞皇帝飲福酒作需夏之樂皇帝反爵于坫還本位奏皇夏之樂武舞出作肆夏之樂送神作昭夏之樂就燎位還大次並奏皇夏圜丘降神奏昭夏辭肅祭典協良辰具嘉薦俟皇臻禮方成樂已變感靈心迴天睠闢華闕下乾宮乗精氣御祥風望爟火通四燭膺介圭受瑄玉神之臨慶隂隂煙衢洞宸路深善既福德斯輔流鴻祚徧區㝢皇帝升壇奏皇夏辭於穆我君昭明有融道濟區域功格𤣥穹百神警衞萬國承風仁深德厚信洽義豐明發思政勤憂在躬鴻基唯永福祚長隆登歌辭徳深禮大道髙饗穆就陽斯恭陟配唯肅血膋升氣冕裘標服誠感清𤣥信陳史祝祗承靈貺載膺多福皇帝初獻奏諴夏辭肇禋崇祀大報尊靈因髙盡敬掃地推誠六宗隨兆五緯陪營雲和發韻孤竹揚清我粢既絜我酌唯明𤣥神是鑒百祿來成皇帝既獻奏文舞辭皇矣上帝受命自天睿圖作極文教遐宣四方監觀萬品陶甄有苗斯格無得稱焉天地之經和樂具舉休徵咸萃要荒式序正位履端秋霜春雨皇帝飲福酒奏需夏辭禮以恭事薦以饗時載清𤣥酒備絜薌箕迴旒分爵思媚軒墀惠均撤俎祥降受釐十倫以具百福斯滋克昌厥德永祚鴻基武舞辭御歴膺期乗乾表則成功戡亂順時經國兵暢五材武宏七德憬彼遐裔化行充塞三道備舉二儀交泰情發自中義均莫大祀敬恭肅鐘鼔繁會萬國斯歡兆人斯賴享兹介福康哉元首惠我無疆天長地久送神奏昭夏辭享序洽祀禮施神之駕嚴將馳奔精驅長離耀牲煙逹潔誠照騰日馭鼔電鞭辭下土升上𤣥瞻寥廓杳無際澹羣心留餘惠皇帝就燎還大次並奏皇夏辭同上髙祖本紀開皇十年冬十一月辛丑有事于南郊十二年冬十一月辛亥有事于南郊十八年冬十一月癸未有事于南郊蕙田案隋髙祖本紀書有事于南郊者四書親祀感生帝者一感生帝自係南郊則所云南郊者其為圜丘無疑也史家不明郊丘之辨故以南郊為圜丘而南郊之祭不得不異其文以別之而正月之祭既用辛日當入祈穀此不列禮儀志初帝既受周禪恐黎元未愜多說符瑞以耀之其或造作而進者不可勝計仁夀元年冬至祠南郊置昊天上帝及五方天位並于壇上如封禪禮版曰維仁夀元年歲次作噩嗣天子臣堅敢昭告于昊天上帝琁璣運行大明南至臣蒙上天恩造羣靈降福撫臨率土安養兆人顧唯虚薄德化未暢夙夜憂懼不敢荒怠天地靈祇降錫休瑞鏡發區宇昭彰耳目爰始登極蒙授龜圖遷都定鼎醴泉出地平陳之歲龍引舟師省俗巡方展禮東岳盲者得視瘖者得言復有躄人忽然能步自開皇以來日近北極行于上道晷度延長天啟太平獸見一角改元仁夀楊樹生松石魚彰谷符之徵玉龜顯永昌之慶山圖石瑞前後繼出皆載臣姓名襃紀國祚經典諸緯爰及玉龜文字義理遞相符會宮城之内及在山谷石變為玉不可勝數桃區一嶺盡是琉璃黄銀出于神山碧玉生于瑞巘多楊山響三稱國興連雲山聲萬年臨國野鵞降天仍住池沼神鹿入苑頻賜引導騶虞見質遊驎在野鹿角生于楊樹龍湫出于荆谷慶雲發彩夀星垂耀宮殿樓閣咸出靈芝山澤川原多生寶物威香散馥零露凝甘敦煌烏山黑石變白宏祿巖嶺石華逺照𤣥狐𤣥豹白兔白狼赤雀蒼烏野蠶天豆嘉禾合穗珍木連理神瑞休徵洪恩景福降賜無疆不可具紀此皆昊天上帝爰降明靈矜愍蒼生寧靜海内故錫兹嘉慶咸使安樂豈臣微誠所能上感䖍心奉謝敬薦玉帛犧齊粢盛庶品燔祀于昊天上帝皇考太祖武元皇帝配神作主大業十年冬至祀圜丘帝不齋于次詰朝備法駕至便行禮是日大風帝獨獻上帝三公分獻五帝禮畢御馬疾驅而歸蕙田案隋唐之交割據紛起然皆草竊無文唯蕭銑自稱梁王築壇柴上帝又梁師都僭皇帝位祭天城南坎地瘞玉得印各見本傳今不列入右隋郊禮五禮通考卷八
