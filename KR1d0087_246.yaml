body:
  text: 五禮通考卷二百三十六刑部尚書秦蕙田撰軍禮四軍制文獻通考秦自非子為附庸至秦仲始大秦仲之孫襄公興兵討西戎以救周遂有岐豐之地修其車馬備其兵甲武事備矣至穆公霸西戎始作三軍殽之役三帥車三百乘魯定公五年秦子蒲子虎帥車五百乘救楚兵力益以強盛史記商君列傳秦孝公用商鞅定變法之令令民為什伍有軍功者各以率受上爵為私鬭者各以輕重被刑宗室非有軍功論不得為屬籍行之十年民勇於公戰怯於私鬭凡戰獲一首賜爵一級皆以戰功相君長漢書刑法志春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣雄桀之士作為權詐以相傾覆吳有孫武齊有孫臏魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時齊愍以技擊強孟康曰兵家之技巧技巧者習手足便器械積機關以立攻守之勝魏惠以武卒奮師古曰奮盛起秦昭以鋭士勝師古曰鋭勇利世方爭於功利而馳説者以孫吳為宗唯荀卿非之曰孫吳上勢利而貴變詐施於暴亂昏嫚之國君臣有間上下離心故可變而詐也仁人在上為下所仰猶子弟之衛父兄若手足之扞頭目何可當也魏氏武卒衣三屬之甲服虔曰作大甲三屬竟人身也蘇林曰兜鍪也盤領也髀禈也如淳曰上身一髀禈一脛繳一凡三屬也屬聫也操十二石之弩負矢五十個置戈其上冠胄帶劍贏三日之糧師古曰個枚也胄兜鍪也冠胄帶劍者著兜鍪而又帶劍也日中而趍百里中試則復其户利其田宅師古曰中試試之而中科條也復謂免其賦稅也利田宅者給其便利之處也如此其氣力數年而衰是危國之兵也秦人其生民也狹厄其使民也酷烈師古曰狹地小也厄險固也酷重辱也烈猛威也劫之以勢隱之以厄鄭氏曰秦地多隘隱其民于隘中也狃之以賞慶道之以刑罰使民所以要利於上者非戰無由也功賞相長五甲首而𨽻五家服虔曰能得著甲者五人首使得𨽻役五家也是最為有數故能有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳未有安制矜節之理也故雖地廣兵強鰓鰓常恐天下之一合而共軋已也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒𨽻之徒還為敵讐猋起雲合果共軋之斯為下矣史記秦始皇本紀分天下以為三十六郡收天下兵聚之咸陽銷以為鍾鐻金人十二重各千石文獻通考始皇并天下分三十六郡郡置材官講武之禮罷為角抵時北築長城四十餘萬南戍五嶺五十餘萬驪山阿房之役各七十餘萬兵不足用而後發謫其後里門之左切發之而勝廣起易氏曰始皇北築長城南戍五嶺又有驪山阿房之役兵不足用乃先發里門之左名閭左之戍未及發右而二世立復調材士五萬人以衛咸陽民不聊生天下騷動而勝廣起矣是時楚兵百萬而秦發近縣不及乃赦驪山徒奴産子以擊盜及關東盜賊益熾又發關中卒以擊之而章邯三歲將兵亡失已十數萬坑于降楚者又二十餘萬沛公入關而秦遂以亡原秦之亡皆起于兵備廢弛而倚辦于倉卒髙祖鑒其弊而于郡國京師兵備嚴整且內外有相制之勢漢法之善者也蕙田案秦得天下其意主於銷兵而不用及盜起而無以應之則又盡發民以為兵二者皆非也而其原則由於商鞅之廢周禮周之制鄉遂采地邦國調發多寡不同而從無羡卒盡發之事秦自鞅變法尚首功盡驅民以為兵始皇懲六國之紛爭既銷兵矣三十三年遂發諸嘗逋亡人贅壻賈人略取陸梁地為桂林象郡三十五年益發謫徙邊其後治獄不直者嘗有市籍者大父母父母嘗有市籍者皆發之民能堪乎夫惟無事無克詰之實故有事有驛騷之纍欲不亡不可得矣右秦兵制漢書刑法志髙祖置京師南北軍之屯文獻通考京師有南北軍之屯南軍衛尉主之掌宮城門內之兵武帝時置期門羽林皆宿衛士屬南軍北軍中尉主之掌京城門內之兵中尉秦官掌巡徼京師蕙田案以上總論南北軍漢書百官表中壘校尉掌北軍壘門文獻通考武帝增置八校更名中尉為執金吾左右京輔都尉尉丞兵卒皆屬中尉屬北軍後漢書百官志光祿勳掌宿衛宮殿門户典謁署郎更直執戟宿衛門户五官中郎將五官中郎五官侍郎五官郎中凡郎官皆主更直執戟宿衛諸殿門户出充車騎左右僕射主虎賁郎習射左右陛長主直虎賁朝會在殿中虎賁中郎侍郎郎中節從皆羽林中郎將羽林郎皆掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家子弟補王氏應麟漢制考周禮司門注司門若今城門校尉主王城十二門疏云都司總監十二門官故舉漢法况之漢書刑法志武帝平百粵內增七校晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也歲時講肄修武備蕙田案穆天子傳王勤七萃士文選王元長曲水詩序七萃連鑣虞子陽詩雲屯七萃士注萃聚也亦猶傳有七輿大夫聚集有智力者為王之爪牙白居易云周設七萃漢列八屯皆以拱衛王宮肅嚴徼道然則七萃之設非武帝創為之也又案城門校尉七校皆屬北軍錢文子補漢兵志南軍則衛士是也北軍在未央北為軍壘垣置中壘校尉以一校守之有事屯兵其中事已輒罷武帝時有諸校尉則常屯矣唐六典南軍若今諸衛也北軍若今左右羽林也易氏曰漢之兵制莫詳于京師南北軍之屯雖東西兩京沿革不常然皆居重馭輕而內外自足以相制兵制之善者也玉海秦之軍制內有屯衛外置材官漢南北軍之屯蓋因秦之屯衛而更其制古者前朝後市王宮在南故漢衛宮之兵在城內者為南軍衛城之兵在城外者為北軍蕙田案髙后本紀及外戚傳呂后以呂祿為上將軍居北軍呂産為相國居南軍又文帝本紀帝入未央宮夜拜宋昌為衛將軍領南北軍蓋漢宮城門內為南軍宮衛屯兵屬焉京城門外為北軍京輔兵卒𨽻焉其權為最重故呂后及文帝皆先置腹心以領二軍又案此南北軍設官李氏光地兵制論古者民與兵出於一故天子有六鄉六遂之兵諸侯有三郊三遂之兵此外又有都鄙丘甸之兵其實則皆比閭族黨井邑之民而已漢初亦然京師有南北軍之屯而已其餘則天下有事乃以虎符發調郡國之兵事已兵休則仍復于其故故三代漢無養兵之費而財用足三代則又不輕於用兵而民力裕其時有農隙講武追胥竭作之法固無患乎武備之不修也六朝日事戰爭而兵與民亦未嘗二至唐府衛之制雖善然已駸駸乎有兵之名而兵民始二矣於後藩鎮分裂始有長聚不散之兵而天下之費盡於養兵遂自宋至今不能改焉蕙田案山齋易氏謂漢時兵農未分南北兩軍實調諸民猶有古者井田之遺意馮唐謂吏卒皆家人子弟起田中從軍後漢禮儀志謂罷遣衛士必勸以農桑由是觀之知是時兵民不甚分也又案此論南北軍寓兵于農玉海蓋寬饒傳衛卒願更留一年是郡國番上于南軍之制黃霸為京兆尹發騎士詣北軍是三輔番上于北軍之制南軍猶調于郡國北軍苐調于京輔蕙田案唐李揆謂漢以南北軍相制故周勃能以北軍安劉氏易氏亦謂南軍以衛宮城而乃調之於郡國北軍以護京城而乃調之於三輔嘗考司馬子長三王世家載公户滿意之言曰古者天子必內有異姓大夫所以正骨肉也外有同姓大夫所以正異姓也蓋同姓親也於內為逼故處於外而使之正異族異姓疏也於親為有間故處於內而使之正族屬南北軍調兵之意殆猶是歟郡國去京師甚逺民情無所適莫而緩急為可恃故以之衛宮城而謂之南軍三輔距京師甚邇民情有閭里墳墓族屬之愛而利害必不相棄故以之護京城而謂之北軍其防微杜漸之意深矣以上二説深得漢制之妙竊謂漢制多近古觀南軍調郡國北軍調三輔則知周禮所謂鄉為六軍遂為十二軍雖立法如此然必非先虛其內以實其外調發之際即先徵邦國無所不可不得泥采芑之注而謂周家發兵專恃王畿以內也章俊卿山堂考索云杜佑通典謂漢重兵悉聚京師此非確論漢南北軍僅盈數萬而京軍不出征有所征伐調發皆郡國之兵為多此説得之又案此論南北軍征調玉海南軍北軍衛士皆調發郡國材官騎士為之自武帝增八校胡越騎皆屬中尉而北軍始有召募之兵又於光祿勳增羽林期門與衛尉同掌宮門而南軍始有長從之兵又發中尉卒征西羌而京師之兵始逺調昭言以後禁旅列屯有警則發雖金城之逺羽林胡越騎亦從中而遣自是之後募外兵以從軍如始元二年募吏民擊益州本始二年選伉健習騎射者從軍而更代之法寖弛蕙田案此論南北軍之廢又案以上漢京師之兵漢書刑法志高祖躬神武之才天下既定踵秦而置材官於郡國應劭漢官儀高祖令天下郡國選能引關蹶張材力武猛者為輕車騎士材官樓船常以立秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船杜佑通典略同張氏晏曰材官騎士習射御騎馳戰陳常以八月太守都尉令長丞會都試課殿最錢文子補兵志材官騎士屬郡都尉以歲八月太守都尉令長丞為會都試水處為樓船令丞尉亦各統其縣守尉不得專也大抵金城天水隴西安定北地河東上黨上郡多騎士三河潁川沛郡淮陽汝南巴蜀多材官江淮以南多樓船蕙田案申屠嘉周勃俱以材官起積功得至將相趙充國亦始為騎士而霍去病傳騎士孟已有功至賜爵關內侯其推遷之格如此文獻通考光武以幽冀并州兵定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵其後又以扶風都尉部在雍縣以涼州近羌數犯三輔將兵衛護園陵故俗稱雍營蕙田案此總論郡國兵及都試之法漢書高帝本紀十一年秋七月發上郡北地隴西車騎巴蜀材官軍霸上惠帝本紀七年冬十月發車騎材官詣滎陽太尉灌嬰將之文帝本紀三年五月發中尉材官屬衛將軍軍長安五行志文帝三年詔丞相灌嬰發車騎士八萬五千人詣高奴擊右賢王後六年春二月發材官屯隴西景帝中二年秋胸奴寇邊中尉不害將車騎材官士屯代髙栁景帝本紀後二年春發車騎材官屯雁門武帝本紀元光二年六月李息為材官將軍屯馬邑谷中六年秋韓安國為材官將軍屯漁陽韓安國傳漢伏車騎材官三千餘匿馬邑旁谷中宣帝本紀神爵元年發材官騎士詣金城趙充國傳神爵元年三月發三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士詣金城補兵志騎士材官樓船其興發量地逺近若宣帝以沛郡淮陽汝南征西羌蓋罷民矣玉海漢兵散于郡國雖郡守不得擅發其屬縣又郡國不擅斥騎士趙廣漢傳坐擅斥除騎士蕙田案此郡國兵征調文獻通考建武六年詔罷郡國都尉并職太守無都試之法惟京師欵兵如故七年罷天下輕車騎士材官樓船及軍假吏悉還民伍惟更賦如故九年省關中都尉十三年罷左右將軍二十三年罷諸邊郡亭侯吏卒明帝以後又歲募郡國中都官死罪繫囚出戍聽從妻子自占邊縣以為常凡徙者皆給弓弩衣糧於是北邊有變則置度遼營明帝時南蠻或叛則置象林兵和帝時羌犯三輔則置長安雍二尉安帝時鮮卑寇居庸則置漁陽營安帝時其後盜作緣海稍稍增兵順帝時而魏郡趙國常山中山六百一十六塢河內通谷衝要三十三塢扶風漢陽隴道三百塢西羌傳置屯多矣蕙田案漢郡國之兵如材官等其詳雖不可見大抵無事散遣有事調發武帝之後有選募有罪徒其選募曰勇敢曰奔命曰伉健曰豪吏曰應募其罪徒曰謫民曰惡少曰亡命曰徒曰犯刑曰罪人曰應募罪人至於中興併尉職罷都試材官騎士還復民伍于是長從募士多而郡國之兵壞矣應劭謂郡國罷材官騎士之後官無警備實啓戎心一方有難黔首囂然蓋漢兵制之壞自建武之罷都試材官騎士而專用募士始又案此郡國兵制之壞漢書髙祖本紀二年五月漢王屯滎陽蕭何發關中老弱未傅者悉詣軍注如淳曰律年二十三傅之漢官儀注民年二十三為正一歲為衛士二歲為材官騎士年五十六乃免就田里凡在官三十四年蕙田案五十六通考誤六十五又案此征發年歲之限玉海漢初調發猶近古高帝發中尉卒止軍霸上文帝發中尉材官止軍長安畿兵猶未逺出也元鼎六年中尉卒擊南越矣神爵元年羽林孤兒胡越騎詣金城矣京師之兵越臨邊境非古也蕙田案此征發道里之限文獻通考建武之初禁網尚闊但以璽書發兵未有虎符之信杜詩上疏曰臣聞兵者國之凶器聖人所謹舊制發兵皆以虎符其餘調發竹使而已符第合會取為大信所以明著國命斂持威重也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄召兵郡國宜有重謹可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之蕙田案此征發符璽之制更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更為卒更也貧者欲得雇更錢次直者出錢雇之月二千是為踐更也天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便往一歲一更諸不行者出錢三百入官以給戍者是謂過更也王氏應麟漢制考周禮胥徒注此民給徭役者今衛士矣疏今衛士亦給徭役故舉漢法况之貢禹傳云諸離宮及長樂宮衛可減太半寬繇役又曰周禮鄉大夫其舍者國中貴者服公事者老者疾者注云舍者謂有復除舍不收役事也謂若今宗室及關內侯皆復也服公事者謂若今吏有復除也老者謂若今八十九十復羡卒也疾者謂若今癃不可事者復之鹽鐵論云今寬力役之政二十三所以輔耆壯而息老艾也蕙田案此役法及免役章氏俊卿曰髙祖之世南北二軍不出而民兵散在郡國有事以羽檄召材官騎士以備軍旅文帝始以銅虎符代檄當時各因其地以中都官號將軍將之注如魏遫為北地將軍周竈為隴西將軍事已則罷京師止南北軍北軍屬太尉南軍屬衛尉武帝更太尉為大司馬大將軍以中尉材官出征恐京師無重兵而生變於是分北軍為八校以中壘領之又恐北軍之權太重故於光祿勳增羽林期門之兵此武帝以南北軍相制之意初時南北軍皆郡國番上無定在之兵也自武帝置八校大抵以習知胡越人充之則募兵始此期門羽林皆家世為之則長從始此期門父死子代羽林孤兒乃子孫見表志蓋自是有養兵之病而京師之兵制壞矣元狩以後兵革數動民多買復調發之士益鮮於是發及謫吏次及謫民次及謫戍次及七科謫初時以𨽻于都尉者充兵故其伍符甚整也及常兵不足調及它衆甲伍必紊而郡國之兵制又壞矣是以昭宣以來其弊日甚始元元年募民及發奔命者擊益州元鳯元年遣太常三輔徒免刑擊氐五年發三輔及郡國惡少吏有告劾亡者屯遼東本始二年又選郡國吏三百石伉健習騎射者從軍神爵元年又發三輔中都官徒弛刑及應募佽飛射士孤兒胡越騎詣金城以益邊夫募及奔命調及惡少發及刑徒選及三百石吏而又以羽林佽飛胡騎越騎從事是南北軍出矣紛紛無復舊制皆自武帝啓之及光武一起而變之兵制蕩然矣自光武罷都試而外兵不練雖疆場之間廣屯增戍列營置塢而國有征伐終藉京師之兵以出蓋自建武迄于漢衰北邊之寇鮮卑之寇歲歲有之或遣將出擊或移兵留屯如永平中北伐留兵伊吾廬城至肅宗二年罷之之類是也連年暴露奔命四方而禁旅無復鎮衛之職矣至安帝永初間募入錢榖得為虎賁羽林緹騎營士而營衛之選亦衰矣桓帝延熹間詔減羽林虎賁不任事者半俸則京師之兵亦單弱矣外之士兵不練而內之衛兵不精設若盜起一方則羽檄被於三邊興發甲卒取辦臨時戰非素具每出輒北於是羌冦轉盛移兵赴逺民不堪命永和二年交趾九真二郡之兵至於反叛無亦罷於奔命之過歟此其興兖豫之卒擊象林萬里之寇李固所以力爭也永建間方且令郡舉五人教習戰射又方募為陷陳羌傳任尚募以擊羌召為積射鮮卑傳鄧逺以擊鮮卑召為義從東漢有羌胡義從蓋取西邊羌胡之願從者為兵也大抵創立名號蕩無良法桓靈之世雖能委任段熲盡滅諸寇而中平元年黃巾遂作所在盜賊不可勝數於是置八都尉黃巾既殄而蕭墻之禍作蓋自中世以後令出房帷政歸臺閣宦戚更領兵權迭相傾奪然五營畏服中人陳蕃竇武欲誅宦官北軍不助武等而助宦官遂又夷滅何進袁紹懲其事故欲籍外兵以除之於是內置園校陽尊閹宦外重州牧實召邊將董卓以并州牧將兵閹宦雖除而董卓之禍已成義兵四起郡牧爭政漢遂三分原漢盛衰皆兵之由而光武實為之光武徒見自西都之季都試或以為患韓延壽以試士潛擬不道誅而翟義之討王莽李通之勸光武皆因秋試之日因勒軍旅誅守長號令起軍遂罷都試之法蕙田案此總論漢軍制右漢軍制晉書武帝本紀泰始元年十一月初置四護軍以統城外諸軍十二月戊辰置中軍將軍以統宿衛七軍職官志左右前後軍案魏明帝時有左軍則左軍魏官也至晉不改武帝初又置前軍右軍泰始八年又置後軍是為四軍右晉軍制文獻通考周太祖輔西魏時用蘇綽言始倣周典置六軍籍六等之民擇魁健材力之士以為之首書蠲租調而刺史以農隙教之合為百府每府一郎將主之分屬二十四軍開府各領一軍大將軍凡十二人每一將軍統二開府一柱國主二大將將復加持節都督以統焉凡柱國六員衆不滿五萬人隋兵制大抵仍周齊府兵之舊而加潤色其十二衛曰翊衛曰驍騎衛曰武衛曰屯衛曰禦衛曰候衛各分左右皆置將軍以分統諸府之兵有郎將副將坊主團主以相統治其外又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅此府兵之大略也隋書開皇十年五月乙未詔曰魏末役車歲動未遑休息權置坊府南征北伐居處無定朕甚愍之凡軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式蕙田案李繁傳載蘇綽初置府兵與此利害優劣不同蓋綽雖創始府兵之制然地狹民寡加以長征不返未得盡行其説及隋平陳乃定其制右周隋軍制唐書兵志府兵之制起自西魏後周而備於隋唐因之隋制十二衛曰翊衛曰驍騎衛曰武衛曰屯衛曰禦衛曰候衛為左右皆有將軍以分統諸府之兵又有驃騎車騎二府皆有將軍自髙祖武德初始置軍府以驃騎車騎兩將軍府領之析關中為十二道萬年道參旗軍長安道鼓旗軍富平道玄戈軍醴泉道井鉞軍同州道羽林軍華州道騎官軍寧州道折威軍岐州道平道軍豳州道招搖軍西麟州道苑遊軍涇州道天紀軍宜州道天節軍軍置將副各一人以驃騎車騎府統之後改驃騎曰統軍車騎曰别將太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各一人校尉六人唐會要武德三年置十二衛將軍取威名素重者為之分關內諸府𨽻焉關內置府二百六十一精兵二十六萬舉關中之衆以臨四方又置折衝府二百八十通給舊府六百三十三唐書兵志民年二十為兵六十而免其能騎而射者為越騎其餘為步兵其𨽻於衛也左右衛皆領六十府諸衛領五十至四十蕙田案地理志天下有府共五百六十六計七十五郡關內十九郡有府二百七十三河東十五郡有府百四十一河南河北十郡有府九十二河南六十三河北三十山南十隴右二十九淮南六江南二劍南十嶺南三除關內道餘九道有府二百九十三總而計之止五百六十六參之兵志置府六百三十四之數參差不齊而職官志又云六百三十三恐地理志所載猶有缺遺方鎮表高祖太宗之制兵列府以居外將列衛以居內有事則將以征伐事已各解而去兵者將之事也使得以用而不得以有之兵志府兵之制居無事時耕于野其番上者宿衛京師而已若四方有事則命將以出事解輒罷兵散于府將歸于朝故士不失業而將帥無握兵之重杜牧原十六衛曰國家始踵隋制開十六衛將軍總三十員屬官總百二十八員創宇分部夾峙禁省自今觀之十六衛本原事迹實天下之大命也始自貞觀中既武遂文內以十六衛蓄養戎臣褒公鄂公之徒並為諸衛將軍外開折衝果毅府五百七十四以儲兵伍或有不幸蠻夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一暴勃消削單車一符將命四走莫不信順此時戎臣當提兵居內當其居內也官為將軍綬有朱紫章有金銀千百騎趨奉朝廟第觀車馬歌兒舞女念功賞勞出於曲賜所部之兵散舍諸府上府不越千二百人五百七十四府凡有四十萬人三時耕稼襏襫耞耒一時治武騎劍兵矢禆衛以課父兄相言不得業他籍藏將府伍散田畝力解勢破人人自愛雖有蚩尤為帥亦不可使為亂及其居外也緣部之兵被檄乃來受命於朝不見妻子斧鉞在前爵賞在後以首爭首以力搏力飄暴交捽豈假異略雖有蚩尤為帥亦不能為叛自貞觀至於開元末百三十年間戎臣兵伍未始逆篡此聖人所以柄統輕重制障表裏聖算神術也蕙田案以上府兵初制凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行蕙田案此府兵調發凡當宿衛者番上兵部以逺近給番五百里為五番千里七番一千五百里八番二千里十番外為十二番皆以月上若簡留直衛者五百里為七番千里八番二千里十番外為十二番亦月上蕙田案此府兵宿衛先天二年詔曰往者分建府衛計户充兵裁足周事二十一入募六十一出軍多憚勞以規避匿今宜取年二十五以上五十而免屢征鎮者十年免之雖有其言而事不克行元宗開元六年始詔折衝府兵每六歲一簡蕙田案此府兵簡閲唐會要衛士初置以成丁而入六十出役其家不免王徭遂漸逃散年月漸久宿衛之數不給開元六年五月二十七日置折衝府每年一簡點十一年十一月二十日兵部尚書張説置長從宿衛兵十萬於南衙十三年二月二十一日號彍騎十六年二月二十五日改為左右羽林騎文獻通考自髙宗武后時天下久不用兵府兵之法寖壞番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共十二萬號長從宿衛歲一番命尚書左丞蕭嵩與州共選之明年更號曰彍騎然自是諸府事益多不補折衝將又積歲不得遷士人皆恥為之十三年始以彍騎分隸十二衛總十二萬為六番每衛萬人京兆彍騎六萬六千華州六千同州九千蒲州萬二千三百絳州三千六百晉州千五百岐州六千河南府三千陜虢汝鄭懷汴六州各六百內弩手六千其制皆擇下户白丁宗丁品子強壯五尺七寸以上不足則兼以户八等五尺以上皆免征鎮賦役為四籍兵部及州縣衛分掌之十人為火五火為團皆有首長蕙田案此府兵始變唐會要天寶八載五月九日停折衝府上下魚書以無兵可交至末年折衝府但有兵額官吏而戎器馱馬鍋幕糗糧並廢寶應元年四月十七日畿縣折衝府缺官本縣令攝判文獻通考自天寶以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器馱馬鍋幕糗糧並廢矣故時府人目番上宿衛者曰侍官言侍衛天子至衛佐悉以假人為童奴京師人恥之至相罵辱必曰侍官而六軍衛皆市人富者販繒綵食粱肉壯者為角抵拔河翹木扛鐵之戲及祿山反皆不能受甲矣蕙田案此府兵再變德宗貞元二年上與常侍李泌議復府兵泌因為上厯敘府兵自西魏以來興廢之由且言府兵平日皆安居田畝每府有折衝領之折衝以農隙教習戰陳國家有事徴發則以符契下其州及府參驗發之至所期處將帥按閲有教習不精者罪其折衝甚者罪及刺史軍還賜勳加賞便道罷之行者近不踰時逺不經歲髙宗以劉仁軌為洮河鎮守使以圖吐蕃于是始有久戍之役武后以來承平日久府兵浸墮為人所賤百姓恥之至蒸尉手足以避其役又牛仙客以積財得宰相邊將之山東戍卒多齎繒帛自隨邊將誘之寄於府庫晝則苦役夜縶地牢利其死而沒入其財故自天寶以後山東戍卒還者十無二其殘虐如此然未嘗有外叛內侮殺帥自擅者誠以顧戀田園恐纍宗族故也自開元之末張説始募長征兵謂之彍騎其後益為六軍及李林甫為相奏諸軍皆募人為兵兵不土著又無宗族不自重惜忘身徇利禍亂自生至今為梗嚮使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之三年上復問泌以復府兵之䇿對曰今歲徴關東卒戍京西者十七萬人計歲食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭飢亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然將奈何亟減戍卒歸之何如對曰陛下誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰果能如之何為不用對曰此須急為之過旬日則不及矣今吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因黨項以市之每頭不過二三匹計十八萬匹可致六萬餘頭又命詣冶鑄農器糴麥種分賜緣邊軍鎮募戍卒耕荒田而種之約明年麥熟倍償其種其餘據時價五分增一官為糴之來春種禾亦如之關中土沃而久荒所收必厚戍卒獲利耕者浸多邊地居人至少軍士月食官糧粟麥無所售其價必賤名為增價實比今歲所減多矣上曰善即時命行之泌又言邊地官多闕請募人入粟以補之可足今歲之糧上亦從之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之據應募之數移報本道雖河朔諸帥得免更代之煩亦喜聞矣不過數番則戍卒皆土著乃悉以府兵之法理之是變關中之疲弊為富強也上喜曰如此天下無復事矣既而戍卒應募願耕屯田者什五六胡氏寅讀史管見兵不可好好兵者必有不戢自焚之災亦不可惡惡兵者必有授人以柄之禍三代藏兵于農三時耕種一時講武若有征討則命卿將之天子六卿大國三卿次國二卿小國一卿大事則六軍盡行又召會諸侯諸侯之軍無王命不敢私用內外重輕之勢如此其不用也舉天下皆農桑之民其用也舉萬乘皆射御之士豈有兵少兵多之患哉唐自張説變革府衛日以陵夷李鄴侯言欲修復而不果也憲宗中興所宜討論舊制而急于近效不為逺圖惜哉蕙田案此議復府兵舊唐書地理志邊境置節度經略使式遏四夷凡節度使十經略守提使三大凡鎮兵四十九萬人戎馬八萬餘匹每歲經費衣賜則千二十萬匹段軍食則百九十萬石大凡千二百一十萬開元以前每年邊用不過二百萬天寶中至于是數唐六典凡天下之節度使有八一曰關內朔方二曰河東三曰河北幽州四曰河西五曰隴右六曰劍南七曰磧西八曰嶺南凡親王總戎則曰元帥文武官總統者曰總管以奉使言之則曰節度使有大使副大使副使判官通典每道置使其邊方有寇戎之地則加以旌節唐書兵志唐初兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之者曰道自武德至天寶以前邊防之制其軍城鎮守捉皆有使而道有大將一人曰大總管已而更曰大都督至太宗時行軍征討曰大總管在其本道曰大都督自高宗永徽後都督帶使持節者始謂之節度使然猶未以名官景雲二年以賀拔延嗣為涼州都督河西節度自此而後接乎開元朔方隴右河東河西諸鎮皆置節度使及范陽節度使安祿山反肅宗起靈武而諸鎮之兵共起誅賊其後祿山子慶緒及史思明父子繼起肅宗命李光弼討之號九節度之師久之大盜既滅而武夫戰卒以功起行陳列為侯王者皆除節度使由是方鎮相望於內地大者連州十餘小者猶兼三四故兵強則逐帥帥強則叛上或父死子握其兵而不肯代或取舍由於士卒往往自擇將吏號為留後以邀命於朝天子顧力不能制則忍恥含垢因而撫之號為姑息之政蓋姑息起於兵驕兵驕由於方鎮姑息愈甚則兵將愈俱驕由是號令自出以相侵奪虜其將帥并其土地天子熟視不知所為反為和解之莫肯聽命始時為朝廷患者號河朔三鎮及其末朱全忠以梁兵李克用以晉兵更犯京師而李茂貞韓建近據岐華妄一喜怒兵已至國門天子為殺大臣罪已悔過而後去及昭宗用崔允召梁兵以誅宦官宦官劫天子奔岐梁兵圍之逾年當此之時天下之兵無復勤王者向所謂三鎮徒能始禍而已其它大鎮南則吳浙荆湖閩廣西則岐蜀北則燕晉而梁盜據其中自國門以外皆分裂於方鎮方鎮表起景雲元年止天祐四年收功弭亂雖常倚鎮兵其亡亦以此李泌傳天寶中天下鎮兵四十九萬人馬八萬餘匹開元之前每歲供邊兵衣糧費不過二百萬天寶之後益兵浸多每歲用衣千二百萬匹糧百九十萬斛民始困矣蕙田案以上唐方鎮之兵唐書兵志天子禁軍者南北衙兵也南衙諸衛兵是也北衙者禁軍也初高祖以義兵起太原定天下悉罷遣歸其願留宿衛者三萬人以渭北白渠旁子棄腴田分給之號元從禁軍太宗擇善射者百人為二番於北門長上曰百騎又置左右屯營於玄武門領以諸衛將軍號飛騎高宗始取府兵越騎步射置左右羽林軍武后改百騎曰千騎睿宗改千騎曰萬騎分左右營玄宗以萬騎平韋氏改為左右龍武軍良家子避征戍者皆納資𨽻軍開元十二年詔羽林飛騎闕取京旁州府士末年禁兵寖耗祿山反天子西駕禁軍從者裁千人肅宗復北衙六軍又置衙前射生手分左右廂總號左右英武軍上元中以北衙軍使衛伯玉為神䇿軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍代宗避吐蕃幸陜朝恩舉神䇿軍迎扈京師平朝恩遂以軍歸禁中自將之然尚未與北軍齒永泰元年吐蕃復入寇朝恩又以神䇿軍屯苑中自是寖盛分左右廂勢居北軍右遂為天子禁軍非他軍比貞元中改射生軍曰左右神威軍自肅宗以後北軍名類頗多而廢置不一惟羽林龍武神武神䇿神威最盛總曰左右十軍其後京畿之西多以神䇿軍鎮之散處甸內皆恃勢凌暴中書御史府兵部不能歲比其籍京兆又不敢總舉名實長安姦人多寓占兩軍身不宿衛以錢代行益肆為暴吏禁之輒得罪邊兵衣餉不給諸將詭辭請遙𨽻神䇿軍廪賜遂贏舊三倍由是塞上往往稱神䇿行營皆內統于中人矣元和二年省神武軍明年又廢左右神威軍以其兵分𨽻左右神䇿軍僖宗幸蜀田令孜自為左右神䇿十軍兼十二衛觀軍容使景福二年昭宗以藩臣跋扈天子孤弱議以宗室典禁兵及伐李茂貞用嗣覃王允為京西招討使神䇿諸都指揮使李鐬副之兵自潰茂貞逼京師昭宗為斬神䇿中尉西門重遂李周乃引去同州節度使王行實入迫神䇿中尉駱全歡劉景宣請天子幸邠州縱火東市帝敕諸王率禁軍扞之帝出幸莎城石門月餘乃還三年左右神䇿中尉劉季述以兵千人廢帝幽之季述誅昭宗召朱全忠兵入誅宦官宦官覺劫天子幸鳯翔全忠圍之歲餘乃還長安悉誅宦官神䇿左右軍由此廢諸軍皆𨽻六軍以崔允判六軍十二衛事六軍者左右龍武神武羽林名存而已允死全忠兼判六軍十二衛于是天子無一人之衛唐亡蕙田案此唐禁軍又案三代以下之兵制未有如府兵之善者也以二府統十二軍以十二軍統天下之十道六百三十四府中外相制上下相維勢如臂指其利一士無失業可以省養兵之費其利二兵有定籍可以省召募之煩其利三無事則散耕有事則聽調三代寓兵于農而府兵則寓農于兵夫寓農于兵是兵農雖分猶不分也其利四調發之時更代番休使天下無長征久戍之兵而民力不困其利五兵興則命將兵罷則將歸使將帥不得有其兵其利六兵不精者罪其折衝甚則罪其刺史責成既專則士皆素鍊其利七兵皆土著安居田畝顧戀宗族人自戰家自守無逃亡轉徙之患其利八府兵之中有番上宿衛者則天下之兵皆天子之兵也故天子無需乎禁兵而長上者不過百騎其利九防邊屯戍不過以備府兵之不及而已故亦不專恃邊兵而屯戍不過軍鎮守捉安得有尾大不掉之患其利十自府兵壞而方鎮盛玄宗之西幸德代之播遷所藉以興復者皆方鎮力也能禁方鎮之不強盛而逆命乎方鎮既盛而天子之所恃以自衛者已無兵矣能不增置禁軍而建立羽林龍武神䇿神武之紛紛乎是府兵既廢之後方鎮禁軍二者皆有不得不盛之勢而其為害也亦最大方鎮之盛也甲兵險要財賦人民皆捐以委之而悍帥得挾兵權以劫天子禁軍之盛也藏姦民蓄逋逃無勝兵而存空籍又諸軍皆以宦官主之而中人得挾兵權以制天子僖宗以後方鎮與宦官相為仇讐天子袒中人則召外釁袒籓鎮則啓內釁于是禍亂之起皆天子當之推其原則皆廢府兵之故也説者謂一壞于張説之立彍騎再壞于魚朝恩之專神䇿此非探本之論也府兵之法則誠善矣而法必須人以守之訓鍊無法簡閲不精則府兵弊弊故不得不改蓋府兵耕戰之兵也彍騎召募之兵也耕戰之兵廢則召募之兵起府兵之壞壞于天寶之怠荒非彍騎之過也觀承案三代以下軍制以府兵為善而邊衛之兵則以屯田為宜乃屯田始於漢而後來尚有行之者府兵成於唐初即壞於唐季遂一往而不可復矣編中推論府兵之十利俱鑿鑿中名實可與趙營平便宜十二䇿並讀而追原府兵之壞由於天寶之惰荒尤為篤論焉右唐軍制宋史兵志太祖太宗懲纍朝籓鎮跋扈盡收天下徑兵列營京畿于時天下山澤之利悉入於官帑庾充牣得以贍給而備時使其分營於外者則曰就糧就糧者本京師兵而使廪食于外故聽擕家往其邊防要郡須兵屯守即遣自京師故有駐泊屯駐之名制兵之額有四曰禁兵曰廂兵曰鄉兵曰蕃兵分𨽻殿前侍衛總管司而籍藏樞密院凡召募廪給訓練屯戍揀選之政皆樞密院掌之蕙田案此宋軍制總論禁兵者天子之衛兵也殿前侍衛二司總之其最親近扈從者號諸班直其次總于御前忠佐軍頭司皇城騏驥院皆以守京師備征伐其在外者非屯駐屯泊則就糧軍也建隆元年詔殿前侍衛二司各閲所掌兵揀其驍勇升為上軍老弱怯懦置剩員以處之詔諸州長吏選所部兵送都下以補禁旅之闕又選強壯卒定為兵樣分送諸道其後代以木梃為高下之等散給諸州軍委長吏都監等召募教習俟其精練即送闕下二年改左右雄捷左右驍武軍並為驍捷左右備征為雲騎左右平逺為廣招左右懷德為懷順文獻通考至道初張洎奏曰漢高帝云吾以羽檄召天下兵未有至者孝武云吾初即位不欲出虎符發兵郡國知兵甲在外也惟南北軍期門羽林以備天子扈從籓衛之用唐承隋制置十二衛府兵皆農夫也及罷府兵始置神武神䇿為禁軍不過三數萬人以備天子扈從藩衛而已祿山犯闕朝廷驅市人接戰德宗蒙塵扈駕者四百餘騎兵甲散在郡國今天下甲卒數十萬衆戰馬數十萬匹萃在京師本固邦強國之利也蕙田案張洎之説蓋指其初制而未見其流弊非篤論也又案以上宋禁兵廂兵者諸州之鎮兵也內總于侍衛司一軍之額有分𨽻數州者或一州之管兼屯數州者在京諸司之額五𨽻宣徽院以分給畜牧繕修之役而諸州則各以其事屬焉太宗鑒唐末方鎮跋扈詔選州兵壯勇者悉部送京師以補禁衛餘留本城本城雖或更戍然罕教閲類多給役而已皇祐中河北水災農民流入京東三十餘萬安撫使富弼募以為兵拔其尤壯者得九指揮教以武技雖廪以廂兵而得禁兵之用且無驕橫難制之患詔以其騎兵為教閲騎射威邊步兵為教閲壯武威勇分置青萊淄徐沂密淮陽七州軍征役同禁軍陳氏傅良曰世言養兵之費自藝祖增置禁軍始考之則不然案祥符天聖諸部郡額二百二十三總為本城而已則天下無禁兵也所謂禁兵者皆三司之卒分屯而更戍今之屯駐駐泊之名也是為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅熙寧案天下廂軍之籍五十萬人而不足戰于是教閲之法起教閲之兵因别為額排立在就糧禁軍下由是禁軍始遍天下此不可不辨文獻通考嘉祐七年宰相韓琦上言祖宗時以兵定天下凡有征伐則募置事已則省併故兵日精而用不廣今二虜雖號通好而西北屯邊之兵常若待敵之至故竭天下之力而不能給不於此時先慮而速救之一旦邊垂用兵水旱相繼駭而圖之不可及也又三路就糧之兵雖勇徑服習然邊儲踊貴常苦難贍若其數過多復有尾大不掉之患京師之兵雖雜且少精然漕於東南廣而易供設其數多乃得強幹弱枝之勢也祖宗時就糧之兵不甚多邊垂有事則以京師兵益之其慮也深而其費也鮮願詔樞密院同三司量河北陜西河東及三司榷貨務歲入金帛之數約可贍京師及三路兵馬幾何然後以可贍之數立為定額額足罷募闕即增補額外數已盡而營數畸零則省併之既見定額則可以定某路馬步一營以若干人為額仍請核開寶至道天禧慶厯中外兵馬之數蓋開寶至道之兵太祖太宗以之定天下服四夷也天禧之兵真宗所以守成備豫也慶厯之兵乃西師後增置之數也以祖宗所養之兵視今數之多少則精冗易判裁制無疑矣於是詔中書樞密院同議樞密院掇祖宗以來兵數以聞蓋開寶之籍總三十七萬八千而禁軍馬步十九萬三千至道之籍總六十六萬六千而禁軍馬步三十五萬八千天禧之籍總九十一萬二千而禁軍馬步四十三萬二千慶厯之籍總一百二十五萬九千而禁軍馬步八十二萬六千視前募兵寖多自是稍加裁制以為定額蕙田案以上宋廂兵宋史兵志鄉兵者選自户籍或土民應募在所團結訓練以為防守之兵也周廣順中點秦州稅户充保毅軍宋因之自建隆四年分命使臣往關西道令調發鄉兵赴慶州咸平四年令陜西係稅人户家出一丁號曰保毅官給糧賜使之分番戍守五年陜西緣邊丁壯充保毅者至六萬八千七百七十五人時河北河東有神鋭忠勇強壯河北有忠順強人陜西有保毅寨戶強人強人弓手河東陜西有弓箭手河北東陜西有義勇麟州有義兵川峽有土丁壯丁荆湖南北有弩手土丁廣南東西有槍手土丁雍州有溪洞壯丁土丁廣南東西有壯丁慶厯二年籍河北強壯得二十九萬五千揀十之七為義勇且籍民丁以補其不足河東揀籍如河北法其後議者論義勇為河北伏兵以時講習無待儲廪得古寓兵於農之意惜其束於列郡止以為城守之備誠能令河北邢冀二州分東西兩路命二郡守分領以時閲習寇至即兩路義勇翔集赴援使其腹背受敵則河北三十餘所常伏鋭兵矣朝廷下其議河北帥臣李昭亮等議曰昔唐澤潞留後李抱真籍户丁男三選其一農隙則分曹角射歲終都試以示賞罰三年皆善射舉部內得徑卒二萬既無廪費府庫益實乃繕甲兵為戰具遂雄視山東是時天下稱昭義步兵冠於諸軍此近代之顯效而或謂民兵祗可城守難備戰陳非通論也但當無事時便分義勇為兩路置官統領以張用兵之勢外使敵人疑而生謀內亦搖動衆心非計之得姑令在所點集訓練三二年間武藝稍精漸習行陳遇有警得將臣如抱真者統馭制其陳隊示以賞罰何敵不可戰哉至於部分布列量敵應機繫於臨時便宜亦難預圖况河北河東皆邊州之地自置義勇州縣以時按閲耳目已熟行固無疑詔如所議治平元年宰相韓琦言古者籍民為兵數雖多而贍至薄唐置府兵最為近之後廢不能復今之義勇河北幾十五萬河東幾八萬勇悍純實出於天性而有物力資産父母妻子之所係若稍加練簡與唐府兵何異陜西嘗刺弓手為保捷河北河東陜西皆控西北事當一體請於陜西諸州亦點義勇止涅手背一時不無小擾終成長利天子納其言乃遣籍陜西義勇得十三萬八千四百六十五人於是三路鄉兵惟義勇為最盛宋史紀事本末熙寧中王安石行保甲法聨比其民以相保任十家為一保五十家為大保十大保為都保平日捕盜賊肄武事有事以為民兵元豐八年司馬光上疏乞罷保甲曰兵出民間雖云古法然古者八百家才出甲士三人步卒七十二人間民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今即鄉村之民丁取一以為保甲授以弓弩教之戰陳是農民半為兵也三四年來又令河北河東陜西置都教場無問四時五日一教是三路稼穡之事幾盡廢也自唐開元以來民兵法壞城守戰攻盡募長征兵士民間何嘗習兵一旦畎畝之民皆戎服執兵奔驅滿野耆舊嘆息以為不祥事既草創調發無法比户騷擾不遺一家農民之勞如此終何所用哉若使之捕盜賊衛鄉里則何必如此之多使之戍邊境事征伐則彼逺方之民以騎射為業以攻戰為俗自幼及長更無他務中國之民大半服田雖復授以兵械教之擊刺在教場中坐作進退有似嚴整若使之與敵人相遇鳴鏑始交奔北潰敗可以前料也豈不誤國事乎蕙田案以上宋鄉兵宋史兵志蕃兵者塞下內屬諸部落團結以為籓籬之兵也西北邊羌戎種落不相統一保塞者謂之熟户餘謂之生户陜西則秦鳯涇原環慶鄜延河東則石隰麟府其大首領為都軍主百帳以上為軍主其次為副軍主又有以功次補者其官職俸給有差蕙田案此宋蕃兵揀選之制自廂軍升禁軍禁軍升上軍上軍升班直升上軍及班直者皆臨軒親閲非材勇絶羣不以應餘皆自下選補蕙田案此論揀選遷補召募之制起於府衛之廢蓋籍天下良民以討有罪三代之兵與府衛是也收天下獷悍之兵以衛良民召募之兵是也初募時度人材閲走躍試瞻視然後為黵靣賜以緡錢衣屨而𨽻諸軍自國初以來其取非一途或土人就在所圑立或以營伍子弟聽從本軍或乘歲凶募飢民補本城或以有罪配𨽻給役是以天下失職獷悍之徒悉收籍之伉健者遷禁衛短弱者為廂軍平居食俸廪備征防一有警急勇者力戰鬪弱者給漕挽范氏鎮曰河北連歲招兵皆是坊市無賴子弟及隴畝力田之人謂為軍營子弟求刺為軍况田甚曠民甚稀賦斂甚重國用甚不足者正由兵多故也議者曰以為契丹備也且契丹五十年不敢南入為寇者金繒之利厚也就使棄利為害則大河以北婦人女子皆是乘城之人其城市無賴隴畝力田者又將焉用而預蓄養之以困民况契丹貪利而不敢動夫取兵於民則民稀民稀則田曠田曠則賦役重賦役重則民心離寓兵于民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固與其離民之心以備契丹契丹未至而民力先已匱孰若固民之心以備契丹契丹雖至而民力有餘國用有備其利害若視白黑若數一二也昔漢武以兵困天下者用兵以征胸奴空漠北得所欲也陛下以兵困天下者不用兵而養兵以至是也非以快所欲也何苦而為是乎五口之家尚知量入以為出况天下大計其可以不校出入乎其可以無經乎請罷今招兵敕大臣使具太祖太宗真宗每朝賦入若干兵若干官若干約今賦入之數與兵數官數約取中道三為輕制以賦入之數十分為率以七分養兵官給郊廟宮省諸費三分以備水旱緩急非常為之十年僅可以言治古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今自京師至天下州郡大率無儲蓄邊城甚者或無三數月之備不幸有連年水旱將何以養此兵乎此兵不足以養則其憂不在契丹也歐陽氏修原弊論國家自景德罷兵三十三嵗矣兵嘗經用者老死幾盡而後來者未嘗聞金鼓識戰陳也生于無事而飽于衣食其勢不得不驕惰今衛士入宿不自持被而使人持之禁兵給糧不自荷而雇人荷之其驕如此况肯冒辛苦以戰鬪乎使兵耐辛苦能戰鬪雖耗農民為之可也奈何有為兵之虛名而其實驕惰無用之人也古之民凡長大壯健者皆在南畝農隙則教之以戰今乃大異一遇凶歲則州郡吏以尺度量民之長大而試其壯健者招之去為禁兵其次不及尺度而稍怯懦者籍之以為廂兵吏招人多者有賞而民方窮時爭投之故一經凶荒則所留在南畝者惟老弱也而吏方曰不收為兵則恐為盜噫苟知一時之不為盜而不知終身驕惰而竊食也古之長大壯健者任耕而老弱者遊惰今之長大壯健者遊惰而老弱者留耕也何相反之甚耶然民盡力乎南畝者或不免乎狗彘之食而一去為兵則終身安佚而亨豐腴則南畝之民不得不日減也故曰有誘民之弊者謂此也司馬光論刺義勇曰祖宗平諸鎮一天下豈嘗有義勇哉自趙元昊反諸將覆師者相繼終不能出一旅之衆涉區脫之地以討其罪不免為姑息之計當是時三路鄉兵數十萬何嘗得一人之力乎議者必曰河北河東不用衣廪得勝兵數十萬閲教精熟皆可以戰又兵出民間合於古制臣謂不然彼數十萬者虛數也閲教精熟者外貌也兵出民間者多與古同而實異也蓋州縣承朝廷之意止求數多閲教之日觀者但見其旗號鮮明鉦鼓備具行列有序進退應節即嘆美以為真可以戰殊不知彼猶聚戲若聞寇敵則瓦解星散不知所之矣古者兵出民間民耕桑之所得皆以衣食其家故處則富足出則精鋭今既賦斂農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也如此則民之財力安得不屈臣愚以為河北河東已刺之民猶當放遣况陜西未刺之民乎馬氏端臨曰古之兵皆出于民者也故民附則兵多而勃然以興民叛則兵寡而忽焉以亡自三伐以來皆然矣秦漢始有募兵然猶與民兵參用也唐之中世始盡廢民兵而為募兵夫兵既盡出於召募于是兵與民始為二矣兵與民為二于是兵之多寡不關于國之盛衰國之存亡不關于民之叛服募兵之數日多養兵之費日浩繁而敗亡之形反基於此唐自天寶以來內外皆募兵也外兵則藩鎮擅之內兵則中人擅之其勢不相下而其力足以相制故安史反叛而郭子儀李光弼以節度之兵誅之朱泚僣亂而李晟渾瑊以神䇿之兵誅之及其衰也宦官則以內兵而劫制人主方鎮則以外兵而擅廣土地及朱溫舉兵內向盡誅中人廢神䇿而唐之鼎祚移于內楊行密錢鏐馬殷王建劉仁恭李茂貞之徒以卒伍竊據一方而唐之土宇裂于外而唐遂亡矣中更五代則國擅于將將擅于兵卒伍所推則為人主而國興焉非以得其民也其所廢則為獨夫而國亡焉非以失其民也宋有天下藝祖太宗以兵革削平海內暨一再傳則兵愈多而國勢愈弱元昊小醜稱兵構逆王旅所加動輒敗北卒不免因循苟且置之度外洎金人南牧徵召勤王之師動數十萬然援河北則潰於河北援京城則潰於京城于是中原拱手以授金人而王業偏安於江左建炎紹興之間驕兵潰卒布滿東南聚為大盜攻陷城邑荼毒生靈行都數百里外率為寇賊之淵藪而所謂寇賦者非民怨而叛也皆不能北向禦敵之兵也張韓劉嶽之徒以輔佐中興論功行賞視前代衛霍褒鄂曽無少異然究其勳庸亦多是削平內寇撫定東南耳一遇金人非敗則遁縱有小勝不能補過而卒不免用屈已講和之下䇿以成晏安江沱之計及其末也夏貴之于漢口賈似道之于魯港皆以數十萬之衆不戰自潰于是買降效用者非民也皆宋之將也先驅倒戈者亦非民也皆宋之兵也夫兵既不出民故兵愈多而國愈危民未叛而國已亡唐宋是也噫兵猶手足也國猶身也手足強壯則身存手足枯稿則身廢兵多則國存兵少則國亡未有以兵多而亡者今唐兵雖多強悍而不為用猶病狂易之人奮拳舉爪自陷其膺自屠其腸以至于殞身也宋兵雖多劣弱而不可用猶病痱癖之人恣其芻豢以養擁腫之四肢脛如腰指如股而病與之俱增以至于殞身也然則所以覆其國者乃兵也所以斃其身者乃手足也又古者籍民為兵其法不過因其户田之可賦者賦之年齒之可任者任之民固不容于幸免而亦不可濫入司馬法曰使智使勇使貪使愚蓋言户盡為兵則君子小人賢與不肖俱出其間也自募兵之法行于是擇其願應募者而所謂願應募者非遊手無藉之徒則負罪亡命之輩耳良民不為兵也故世之詈人者曰黔卒曰老兵蓋言其賤而可羞然則募兵所得者皆不肖之小人也夫兵所以耗國而皆得不肖之小人則國之所存者幸也紀綱尚立威令尚行則猶能驅之以親其上死其長否則潰敗四出反為生民之禍而國祚隨之矣可勝慨哉蕙田案以上論募兵之害廪給之制總內外廂禁諸軍且百萬國費最巨者出此然古者寓兵於民民既出常賦有事復裹糧而為兵後世兵農分常賦之外山澤關市之利稅悉以養兵然有警則以素所養者捍之民晏然無預征役也唐之時兵分藩鎮得專租稅天子禁衛之兵中外不過十餘萬人國朝收天下甲卒數十萬悉萃京師京師歲漕江淮粟六百萬石承平既久嘗餘數年之食以此臨制四方猶臂指之運也議者乃謂竭民賦稅以養不戰之卒豈知祖宗所以擾役強悍銷弭爭亂之深意哉蕙田案此亦言其初制豈知流弊有不可勝道者歐陽氏修論曰古之善用兵者可使之赴水火今廂禁之軍有司不敢役必不得已而暫用之則謂之借倩彼兵相謂亦曰官倩我而官之文符亦曰倩夫賞者所以酬勞也今以大禮之故不勞之賞三年而一遍所費八九十萬有司不敢緩月日之期兵之得賞不以無功知愧乃稱多量少比好嫌惡小不如意則持挺而呼羣聚欲擊天子之命吏無事之時猶若此以此知兵驕也兵之敢驕者以用之不得其術而法制不立也前日五代之亂可謂極矣五十三年之間易五姓十三君而亡國被弒者八長者不過十餘嵗甚者三四歲而亡其主豈皆愚耶其心豈樂禍亂而不欲為安人之計乎顧其力不能者時也當時東有汾晉西有岐蜀北有強胡南有江淮閩廣吳越荆潭天下分為十三四中國又有叛將強臣割而據之其君天下者類皆享國日淺威德未洽強君武主力而為之僅以自守不幸孱子弱孫不過一再傳而復亂敗是以養兵如子猶恐不為用今宋之為宋八十年矣外平僣亂無抗敵之國內削方鎮無強叛之臣天下為一海內晏然為國不為不久天下不為不廣也然而兵不足以威于外而敢驕于內制度不可為萬世法而日益叢雜一切苟且不異五代之時此甚可嘆也蘇軾應詔䇿曰自三代之衰井田廢兵農異處兵不得休而為民民不得息肩而無事于兵者千有餘年而未有如今日之極者也三代之制不可復追矣至於漢唐猶有可得而言者夫兵無事而食則不可使聚聚則不可使無事而食此二者相勝而不可並行其勢然也今夫有百頃之間田則足以牧馬千駟而不知費聚千駟之馬而輸百頃之芻則其費百倍此易曉也昔漢之制有踐更之卒而無營田之兵雖皆出于農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邊境有事諸侯有變皆以虎符調發郡國之兵至于事已而兵休則渙然各復其故是以其兵雖不離農而天下不至于弊者未嘗聚也唐有天下置十六衛府兵天下之府八百餘所而屯于關中者至有五百然皆無事則力耕而積榖不惟以自贍養而又足以廣縣官之儲是以兵雖聚于京師而天下亦不至于弊者未嘗無事而食也今天下之兵不耕而聚于畿輔者以數十萬計皆仰給于縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以兼受其弊而莫之分也天下之財近自淮甸而逺至于吳楚凡舟車所至人力所及莫不盡取以歸于京師晏然無事而賦斂之厚至于不可復加而三司之用猶苦其不給其弊皆起于不耕之兵聚于內而食四方之貢賦非特如此而已又有循環往來屯戍于郡縣者昔建國之初所在分裂擁兵而不服太祖太宗躬擐甲胄力戰而取之既降其君而籍其疆土矣然其故基餘孽猶有存者上之人見天下之難合而恐其復發也于是出禁兵以戍之大自藩府而小至於縣鎮往往皆有京師之兵由此觀之則是天下之地一尺一寸皆天子自為守也而可以長久而不變乎費莫大于養兵養兵之費莫大于征行今出禁兵而戍郡縣逺者或數千里其月廪歲給之外又日供其芻糧三歲而一遷往者紛紛來者纍纍雖不過數百為輩而要其歸無以異于數十萬之兵三歲而一出征也農夫之力安得不竭餽運之卒安得不疲且今天下未嘗有戰鬪之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息間居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而噪呼此何為者也天下一家且數十百年矣民之戴君至于海隅無以異于畿甸亦不必舉疑四方之兵而專信禁兵也曩者蜀之有均賦近歲貝州之亂未必非禁兵致之臣愚以為郡縣之土兵可以漸訓而陰奪其權則禁兵可以漸省而無用夫武健豈有常所哉山川之所習風氣之所咻四方之民一也昔者戰國嘗用之矣蜀人之怯懦吳人之短小皆嘗以抗衡于上國夫安得禁兵而用之今之土兵所以鈍弊劣弱而不振者彼見郡縣皆有禁兵而待之異等是以自棄于賤隸役夫之間而將吏亦莫訓也苟禁兵漸省而以其資糧益優郡縣之土兵則彼固以歡欣踴躍出于意外戴上之恩而願效其力又何遽不如禁兵耶夫土兵日以多禁兵日以少天子扈從捍城之外無所復用如此則內無屯聚仰給之費而外無遷徙供億之勞費之省者又已過半矣蕙田案此論養兵之害又案宋能革唐方鎮之弊而不能復唐府衛之制禁軍廂軍鄉兵蕃兵一皆出於召募其立法之謬蓋沿唐人中葉之秕政而又有甚焉者也何則唐內有禁軍外委方鎮當其勢足以相制則猶可並收其利至宋乃盡收四方徑兵列營京畿又立為更戍分遣禁旅戍守邊城往來交錯旁午道路于是無事而坐糜廪食有事而莫與分憂天下之大皆天子自為戰守也但有唐之弊而并無唐之利矣約而論之亦有三變其始當太祖太宗之世法制尚明威令猶肅亦足為治久之弊生兵皆不可用一變而為韓魏公之刺義勇再變而為王介甫之保甲三變而為童貫之增額矣遞變而遞衰皆因立法原未盡善故自漢以來戰功之無足稱國勢之弱未有如宋者范氏歐陽氏蘇氏司馬氏及馬貴與所論召募之害與廪給之患可謂深切著明矣後人可不鑒哉觀承案宋兵之三變極確然童貫之增額直不足道矣惜乎介甫之保甲其名甚高而法不簡要意不虛公本欲利民而適以禍民也夫右宋軍制金史兵志諸部之民無他徭役壯者皆兵平居則聽以漁佃射獵習為勞事有警則下令部內及遣使詣諸貝勒徵兵凡步騎之仗糗皆取備焉其部長曰貝勒行兵則稱曰明安穆昆從其多寡以為號明安者千人長也穆昆者百夫長也貝勒之副曰富勒琿士卒之副從曰伊勒希部卒之數初無定制右金軍制元史兵志世祖時內立五衛以總宿衛諸軍衛設親軍都指揮使外則萬户之下置總管千户之下置總把百户之下置彈壓立樞密院以總之遇方面有警則置行樞密院事已則廢而移都鎮撫司屬行省萬户千户百户分上中下萬户佩金虎符符趺為伏虎形首為明珠而有三珠二珠一珠之别千户金符百户銀符萬户千户死陳者子孫襲爵死病則降一等總把百户老死萬户遷他官皆不得襲是法尋廢後無大小皆世其官獨以罪去者則否若夫軍士則初有蒙古軍特默齊軍蒙古軍皆國人特默齊軍則諸部族也其法家有男子十五以上七十以下無衆寡盡僉為兵十人為一牌設牌頭上馬則備戰鬪下馬則屯聚牧養孩幼稍長又籍之曰漸丁軍既平中原發民為卒是為漢軍右元軍制明史兵志明革元舊制自京師達於郡縣皆立衛所外統之都司內統於五軍都督府而上十二衛為天子親軍者不與焉征伐則命將充總兵官調衛所軍領之既旋則將上所佩印官軍各回衛所蓋得唐府兵遺意于謙創立團營簡精鋭一號令兵將相習其法頗善憲孝武世四朝營制屢更而威益不振衛所之兵疲於番上京師之旅困於占役馴至末造尺籍久虛行伍衰耗矣蕙田案此明軍制總論王圻續通考明初立大都督府以朱文正為大都督節制中外諸軍事尋設左右都督都督同知都督僉事洪武十三年又以其權歸于一衙門設中左右前後五軍都督府分領在京各衛所在外都司衛所其在京錦衣等親軍上直衛又不𨽻五府若有征討之役以公侯伯及三等直署都督充總兵官名曰挂印將軍其在外鎮守地方武臣原為挂印蕙田案此五軍都督府明史兵志班軍者衛所之軍番上京師總為三大營者也初永樂十三年詔邊將及河南山東山西陜西各都司中都留守司江南北諸衛官簡所部卒赴北京以俟臨閲京操自此始京軍三大營一曰五軍一曰三千一曰神機其制皆備於永樂時于謙為兵部尚書謙以三大營各為教令臨期調撥兵將不相習乃請於諸營選勝兵十萬分十營團練每營都督一號頭官一都指揮二把總十領隊一百管隊二百於三營提督中推一人充總兵官監以內臣兵部尚書或都御史一人為提督其餘軍歸本營曰老家京軍之制一變憲宗立復之增為十二於是集九邊突騎家丁數萬人於京師名曰外四家立兩官廳選團營及勇士四衛軍於西官廳操練正德元年所選官軍操於東官廳自是兩官廳軍為選鋒而十二團營且為老家矣世宗立王邦瑞攝兵部因言國初京營徑旅不減七八十萬元戎宿將常不乏人自三大營變為十二團營又變為兩官廳雖浸不如初然額軍尚三十八萬有竒今武備積弛見籍止十四萬餘而操練者不過五六萬支糧則有調遣則無比敵騎深入戰守俱稱無軍即見在兵率老弱疲憊市井逰販之徒衣甲器械取給臨時此其弊不在逃亡而在占役不在軍士而在將領蓋提督坐營號頭把總諸官多世胄紈袴平時占役營軍以空名支餉臨􅋵則肆集市人呼舞博笑而已先年尚書王瓊毛伯溫劉天和常有意振飭然將領惡其害已陰謀阻撓軍士又習于驕惰競倡流言事復中止釀害至今乞大振乾綱遣官精核帝是其言命兵部議興革于是悉罷團營兩官廳復三大營舊制張居正當國綜核名實羣臣多條上兵事大旨在足兵選將營務頗飭久之帝厭政廷臣漸爭門户習於偷惰遂日廢弛大率京軍積弱由於占役買間其弊實起於紈袴之營帥監視之中官竟以亡國云王圻續通考景泰中土木變後兵漸耗散用兵部尚書于謙議擇三大營精鋭騎兵十萬分為十營團操以備警急是為團營餘步騎仍歸三大營曰老營天順初罷八年復置成化初罷三年復置分為十二營凡十二萬人曰奮武耀武練武顯武敢勇果勇效勇鼓勇立威伸威揚威振威毅皇帝集九邊家將突騎凡數萬人聚京師號威武營上自為大將軍而十二營自如嘉靖初兵政大廢弛邊報歲益急團營見兵少乃僅選三萬騎聽征號曰東西二官廳各都督一人總之而團營所餘者非老弱則入元帥中貴私家矣庚戍罷十二營併為三大營五軍營副將一員參將四員逰擊將軍四員神樞營副將一員佐擊將軍六員練勇參將六員神機營將校亦如之隆慶四年大學士趙貞吉奏將見操官軍分為左右中前後五營各擇一將分統責令開營訓練而以文臣廷核之收戎政印歸之內府有事則領敕挂印而命將閫外事完則繳敕納印而歸將營中下兵部議不盡合乃請仍舊制分五軍神樞神機三大營各以總兵一員統之各給敕關防而以文職大臣一員總理之餘如貞吉言楊一清請理戎政疏太祖設五府四十八衛太宗都燕京仍立五府增七十二衛設五軍神機三千大營操演武藝又以河南山東中都大寧四都司官軍輪聚京師歲教月練無事足以壯國威有警足以禦外侮厥後兵務漸弛正統己巳北狄侵侮幾危宗社景泰初于謙乃于三大營中挑選精鋭者分立十營團操是為團營四方有警或用一營二營三營以次挨撥而行不用臨期挑選後增為十二團營于時一有警報大軍一出四方懾服嗣後因陋就簡垂四十年而戎馬日耗士卒之殷實者出錢包班而其名徒存貧難者飢寒困苦而其形徒在衣裳襤䄛氣息奄奄平居且不能自存安能為國以捍禦百戰之敵哉每遇有警欲撥一二萬之兵未免於各營通行挑選欲再選撥一二萬恆以不足數為慮夫軍以衛民民以養軍今各營官軍月支米八萬一千五百有餘石以一歲計之該食米九十七萬八十餘石是皆百姓膏血之餘及選用戰兵求二三萬而不足當事豈不為之寒心哉至於統兵將官亦皆臨期選用將不知兵兵不知將遲緩日月旋置軍裝將官已至關口士卒尚在京城都人相傳為笑口是不堪用徒費芻糧也中外士夫亦皆以京軍為不足用正德年間山東北直𨽻等處羣盜縱橫乃調宣大陜西遼東邊軍征之踰年始得平定是豈強幹弱枝之意哉幸而其時三邊無警假使邊民不可掣調則內盜將置之不問乎今失此不為後益難圖乞敕提督官申教練之法加優恤之恩禁剝削之害嚴役占之條痛革宿弊修復舊規使耳目一新精采一變內治既舉外攘何難所以壯國家元氣而延生民之命脈者庶其在此也蕙田案以上明京營明史兵志親軍上二十二衛舊制止十二衛後增設金吾左以下十衛俱稱親軍指揮使司不屬五府又設騰驤等四衛亦係親軍并武功永清彭城及長陵等十五衛俱不屬府王圻續通考在京二十二衛錦衣至虎賁為上十二衛金吾至通州本北平都司衛為上十衛凡二十二衛名親軍指揮使司騰驤武驤左右四衛亦名親軍指揮使司武功三衛以匠故𨽻工部長陵景陵獻陵茂陵泰陵康陵七衛為陵衛並不𨽻都督府亦不稱親軍其餘分𨽻五府留守五衛者國初都鎮撫司總領禁衛改為留守五衛專巡察守衛京衛𨽻都督府者上府移兵部親軍衛直達兵部蕙田案以上不𨽻都督府又案以上俱係明京師之兵明史兵志太祖下集慶路為吳王罷諸翼統軍元帥置武德龍驤豹韜飛熊威武宣武羽林等十七衛親軍指揮使司革諸將襲元舊制樞密平章元帥總管萬户諸官號而其所部兵五千人為指揮千人為千户百人為百戶五十人為總旗十人為小旗天下既定度要害地係一郡者設所連郡者設衛大率五千六百人為衛千一百二十人為千户所百十有二人為百户所所設總旗二小旗十大小聨比以成軍其取兵有從征有歸附有謫發從征者諸將所部兵既定其地因以留戍歸附則勝國及僣偽諸降卒謫發以罪遷𨽻為兵者其軍皆世籍此其大略也十三年丞相胡惟庸謀反誅革中書省因改大都督府為五分統諸軍司衛所洪武二十六年定天下都司衛所共計都司十有七留守司一內外衛三百二十九守禦千户所六十五及成祖在位二十餘年多所增改其後措置不一後定天下都司衛所共計都司二十一留守司二內外衛四百九十三守禦屯田羣牧千户所三百五十九儀衛司三十三自儀衛司以下舊無後以次漸添設宣慰使司二招討使司二宣撫司六安撫司十六長官司七十原五十九番邊都司衛所等四百七後作四百六十三王圻續通考凡天下要害之地有係一郡者設所係連郡者設衛勢重則衛多其尤重者設鎮特官主之總鎮一方者為鎮守獨鎮一路者為分守各守一城一堡者為守備與主將同處一城者為協守又備倭提督提調巡視等官稱挂印專制者為總兵次為副總兵為參將為逰擊王氏圻曰明初破陳友諒帥舟師二十萬取姑蘇二十萬平中原二十五萬下雲南三十萬馮國公北征以三十萬乃出戰蓋一方如此建文初李景隆北征兵百萬至永樂中命淇國公以十萬騎北伐步騎五十餘萬而討安南兵又八十萬一時兵力之盛雄視千古自嘉靖八年桂萼上天下兵籍僅九十七萬至胡松考與地又止八十四萬五千八百而已然此又虛數也今西北騎少漸不支而東南拒倭征苗全藉調狼土募民兵而已不能得一卒之用也此無他北兵之所以削者日耗于攻戰而疲敝于調發中土及東南之所以削者上班也運糧也屯政之不修也明史兵志明都北平三靣近塞邊防甚重東起鴨緑西抵嘉峪綿亘萬里分地守禦初設遼東宣府大同延綏四鎮繼設寧夏甘肅薊州三鎮而太原總兵治偏頭三邊制府駐固原亦稱二鎮是為九邊蕙田案此明邊防天下衛所之外郡縣有民壯邊郡有土兵自正統以後皆以召募設立蕙田案此明鄉兵沿海自廣東樂會厯閩浙南直𨽻至鴨緑綿亘萬餘里在在設海防以備島寇倭夷又有江防諸汛以輔之蕙田案此明海防江防又案明制又有南京衛所親軍衛五軍都督府屬羈縻衛所其長為都督都指揮指揮千百户鎮撫等官賜敕書印記設都司統衛所西北諸部有指揮等官設衛西番有都指揮宣慰使設都指揮使司指揮司詳見明史兵志非軍制之要今從略又案明之初制與唐之初制大相類衛所都司猶唐之折衝府也五軍都督府猶唐之二府十二軍也其法最為盡善唐一變為彍騎明一變為團營皆不得不變者也然初制遂不可復若能參合唐明之初制而去其簡閲不精役重逃亡占役買間畨上疲困諸弊則可以久安長治矣蓋治法與治人二者相須軍制為尤甚云右明軍制五禮通考卷二百三十六
