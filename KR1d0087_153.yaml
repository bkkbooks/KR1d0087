body:
  text: 五禮通考卷一百四十三刑部尚書秦蕙田撰嘉禮十六飲食禮蕙田案周禮大宗伯以嘉禮親萬民以飲食之禮親宗族兄弟大𫝊云上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆别之以禮義人道竭矣小記曰親親以三爲五以五爲九上殺下殺旁殺而親畢矣坊記曰君子因睦以合族嗚呼此堯之所以克明峻德以親九族九族既睦平章百姓者也周之盛也内睦九族外尊事黄耈則有常棣行葦之詩及其衰也葛藟頍弁角弓杕杜刺焉先王之於宗族兄弟也親睦之因而燕樂之故有族燕之禮有族飫之禮文王世子若公與族燕則異姓爲賓膳宰為主人公與父兄齒族食世降一等周語王公立飫則有房烝親戚燕饗則有餚烝飫以顯物宴以合好夫曰燕曰飫皆所謂飲食之禮也陳氏禮書云古者合族之禮方其平居無事則有燕以申好及其有大疑謀則有飫以圖事燕則脱屨升堂坐而不立其牲體折節而餚烝所以致愛飫不脱屨升堂立而不坐其牲半解而房烝所以致嚴致愛致嚴其禮盛矣然燕之禮又有二有時燕有因祭而燕詩常棣儐爾籩豆飲酒之飫兄弟既具和樂且孺湛露厭厭夜飲在宗載考周語時燕不淫此時燕也詩楚茨諸父兄弟備言燕私既醉既飽小大稽首行葦戚戚兄弟莫逺具邇曾孫維主酒醴維醹坊記因其酒肉聚以宗族此因祭而燕也禮書云其禮之祥雖不可考要之服皮弁服即於路寢宰夫為主異姓為賓王與族人燕于堂后率内宗之屬燕于房其物餚烝所以合好也其食世降一等所以辨親疎也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脱屨而坐立監相視羞庶羞以盡愛爵樂無算以盡歡其大率與諸侯燕禮不異蓋先王之禮以孝弟治天下而孝弟莫始於親親親親之心無所不至則飲食之禮隆焉且不特天子諸侯而已儀禮特牲祝告利成徹庶羞設于西序下鄭康成註引書傳曰宗室有事族人皆侍終日大宗已侍于賓奠然後燕私燕私者何也祭巳而與族人飲此徹庶羞置西序下者爲將以燕飲與書傳云不醉而出是不親也醉而不出是媟宗也出而不止是不忠也親而甚敬忠而不倦若是則兄弟之道備故曰君子篤於親則民興於仁此物此志也夫大宗伯叙爲嘉禮第一通典通解通考皆莫詳今從周禮之次序於昏冠之上而九族三族錫姓命氏天子睦族宗子收族立後之法以類附焉觀於此者孝弟之心可以油然而生矣觀承案儀禮有公食大夫禮有鄉飲酒禮有燕禮鄉飲酒與燕其牲皆狗然骨體致敬庶饈盡愛亦可云食而曰飲者有舉有薦薦為舉設故曰飲也公食大夫其牲則牢其儀則具饌于東房而無尊雖酒亦實于觶加于豐而賓引奠于薦右而不飲其後有卒食之文而無卒爵之文故曰食禮食與飲之分各有其具者如此至王之食禮九舉公侯之食禮七舉王燕飲酒膳夫為獻主公侯燕飲酒宰夫為獻主是其等威之辨也而周禮酒人共賓客之禮酒飲酒而奉之注曰禮酒燕饗之酒飲酒食之酒曲禮之酒漿處右即食酒所謂酳也又酒正有三酒四飲之辨三酒事酒昔酒以飲清酒以祭四飲清醫漿酏皆以共食清即醴也凡醴啐而不飲故冠昏饗食之禮皆設醴而不酧酢間有酢者亦啐之而已此更飲與食所分之明証也夫饗禮鄭氏以爲無正文然體薦殽烝立以卒事其文具在由是推之則族飫之禮其即饗禮乎族食其即食禮乎族燕之有賓主固即燕禮而又曰族飲者亦即賓主以為言曰族燕不即賓主以爲言曰族飲非二禮也若公與族之私飲酒是固有私飲時或即詩與書傳所言燕私謂燕即族燕而以私為厚解如君之私于寡君人人以為孟嘗私已者似燕與私爲一事尚覺未安何也燕不可混于私也周禮膳夫凡王之稍事設薦脯注云稍事是小事與臣飲酒大事則有燕饗也故止設薦脯若此則王與族人圖大事設族飫其小事則私飲酒是在外臣有稍事之飲而在宗族即謂之私飲酒然則禮于異姓有饗有食有燕飲有稍事之飲而在同姓則有族飫族食族燕飲以及私飲酒之儀相配以成文于以見王道公私之無間禮文雖缺義可互叅因此通彼歴歴皆可遍觀而盡識也周禮大宗伯以飲食之禮親宗族兄弟注親者使之相親人君有食宗族飲酒之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗别綴之以食而弗殊百世而昏姻不通者周道然也飲疏此經云飲食亦尊卑通有下文别有饗燕則經云者非饗燕是私飲酒法其食可以通燕食俱有以其下不别云食故也注引文王世子據人君法引大傳據大夫士法則萬民亦有此飲食之禮也蕙田案注分飲食解雖細私飲酒謂在路寢不在庭即所謂族燕族飫是也與下饗燕自有别禮記大傳上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭繆别之以禮義人道竭矣注治猶正也繆讀為穆族疏旁治昆弟之時合㑹人以食之禮陳氏祥道曰飲食者人情之合歡者也觀文王燕兄弟而棠棣之羙作幽王不能宴樂同姓而頍弁之刺興則合族以食禮之大者也君與族人燕則膳宰為主人又曰族食世降一等詩曰厭厭夜飲在宗載考國語曰親戚享燕有殽烝又曰嵗飫不倦時宴不淫則族食之禮合之以時等之以世掌之以膳夫其薦也以殽烝其飲也或以夜不特如此而已序以昭穆别以禮義則尊者安於為尊卑者安于為卑然後孝慈友恭油然生於其間人道不竭于此矣乎蓋合族以食恩也昭穆禮義所以節恩者也無恩則離恩而無節之則亂先王之於宗族使不至于離且亂無他盡人道以治之而已汪氏克寛曰合族以食使之有所同而尊卑之禮一序以昭穆使之有所異而親疎之義明如此則皆有禮義之别而人之道盡於此矣同姓從宗合族屬異姓主名治際㑹注合謂合之宗子之家序昭穆也異姓謂來嫁者也主于母與婦之名耳際㑹昏姻交接之會也疏同姓從宗者同姓父族也從宗謂從大小宗也合族屬者謂合聚族人親疎使昭爲一行穆爲一行同時食故曰合族屬也繫之以姓而弗别綴之以食而弗殊疏綴之以食而弗殊者連綴族人以合食之禮而不殊異也陳氏祥道曰以飲食之禮親宗族兄弟所謂綴之以食也君有合族之道族人不得以其戚戚君位也疏合族者言設族食燕飲有㑹合族人之道陳氏祥道曰君之於族人主乎愛族人之于君主乎敬故有合族之道所以明其親親之恩不得以其戚戚君所以明其尊尊之義不能親睦九族燕樂同姓與夫恃親而不恭者豈知此哉吕氏祖謙曰君有合族之道如詩所謂飲食燕樂同姓是也右飲食通義文王世子若公與族燕則異姓爲賓膳宰爲主人公與父兄齒族食世降一等注異姓爲賓謂同宗無相賓客之道膳宰爲主人君尊不獻酒也與父兄齒親親也族食世降一等親者稠疎者稀疏明公與族人燕食之禮燕飲必立賓以行禮異姓為賓必對主人君尊不宜敵賓故使供膳之宰以爲主人使得抗禮酬酢也公既不爲主族人又不爲賓故與族人相齒見親親也族食謂與族人燕食也族人既有親疎燕食亦隨世降殺假令本是齊衰一年四㑹食若大功則一年三㑹食小功則一年二㑹食緦麻則一年一㑹食是世降一等也觀承案族食世降一等則至緦麻其降已窮綴食之屬疎同姓也不在此列明矣月令大合吹注云與族人大飲作樂於大寢以綴恩疏引綴食以釋綴恩之義似即指此爲綴食之時而其釋族人也又曰三族依然世降一等之族未及同姓又云食常無樂明此爲飲禮而非食禮也明堂禮季冬命國爲酒以合族亦然大率禮之言族皆九族不及同姓詩傳之言宴樂同姓多與族混不可為典要惟大傳言同姓與族之分最明其曰同姓從宗合族屬注云合之宗子之家序昭穆也其釋合也曰同食蓋先生慮恩之殫於逺也命以百世不遷之宗則同姓之屬即有百世相宗之誼從宗合族即所謂綴食弗殊也意自相承似不必别爲附㑹公與族燕則以齒而孝弟之道逹矣其族食世降一等親親之殺也注與族燕則以齒以至尊不自異于親之列殺差也疏公所以降己尊而與族人燕㑹爲列是欲使孝弟之道通逹於下也民有親屬者豈得相背棄哉每世而降一等是親親之殺陳氏澔曰族人雖衆其初一人之身也豈可以賓客之道外之故以異姓爲賓而使膳宰為主與之抗禮酬酢君尊而賓不敢敵也君雖尊而與父兄列位序尊卑之齒者篤親親之道也族食與族人燕食也世降一等謂族人既有親疎則燕食亦隨世降殺也方氏慤曰凡燕之禮必立賓以備酬酢之儀然主人者尊賓既謂之賓則尊之而已非親之也親莫親于同姓則凡于同姓固無賓之之禮也故燕族之賓不以同姓而以異姓為之也蕙田案此君與族人飲食之禮曰族燕曰族食燕之禮多食之禮殺也燕有樂而食常無樂月令季冬之月命樂師大合吹而罷注嵗將終與族人大飲作樂于大寢以綴恩也言罷者此用禮樂于族人最盛後年若時乃復然也凡用樂必有禮用禮則有不用樂者王居明堂禮季冬命國為酒以合三族君子説小人樂合疏與族人飲者以王居明堂禮云季冬命國為酒以三族故知與族人飲也云作樂於大寢者以其命樂師合吹故知作樂也大寢則路寢也與宗人圖事之處既飲族人故知于大寢云以綴恩者綴謂連綴恩謂恩親大傳云繫之以姓而弗别綴之以食而弗殊云罷者此用禮樂于族人最盛後年季冬乃復如此作樂以一年停頓故云罷大合吹必當有禮與族人燕飲今惟云命樂師故云用樂必有禮而食常無樂故云禮有不用樂也引明堂禮以合三族者三族父子及身則小記云親親以三爲五以五爲九是也君子説謂卿大夫士小人樂謂凡庶也蕙田案此宗族燕食之時與樂也逸禮王居明堂禮季冬命國爲酒以合三族汪氏克寛曰孝弟莫始於親親則燕之禮不得而廢設其器備其物辨其數立其文莫尊乎君也不以位加于父兄燕序必以齒逹乎孝弟之道也莫親乎同姓也不可以無殺燕則族人世降一等焉凡燕之禮必主賓以備酬酢而族燕之賓主則異姓與膳宰爲之者篤親親之道也夫飲食口腹之欲也而必節之以禮則驕奢淫佚平而無過也歌舞耳目之欲也而必和之以樂則言動揖遜易而無乖也莫不由親以篤乎恩有恩以著乎愛有愛以盡其禮焉詩小雅常棣序常棣燕兄弟也疏謂王者以兄弟至親宜加恩惠以時燕而樂之周公述其事而作此詩焉兄弟者共父之親推而廣之同姓同族皆是也常棣之華鄂不韡韡凡今之人莫如兄弟箋承華者曰鄂不當作拊拊鄂足也鄂足得華之光明則韡韡然盛喻弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然傳間常棣之言為今也此箋聞常棣之言始聞常棣華鄂之説也如則人之思親無如兄弟之最厚何氏楷曰常棣與唐棣異木爾雅云唐棣栘常棣棣案此則惟常棣得以棣名程子云今玉李也華鄂相承甚力陸氏曰江南呼爲麥李一跗輙生二萼兩兩相麗如垂絲海棠陸佃云栘從移棣從隶唐棣之華反而後合常棣華鄂上承下覆甚相親爾從棣言華萼相承輝榮相隶也隶仁也移義也兄弟尚親親仁也故常棣以燕兄弟宋祁云世人多悞以唐棣為常棣於兄弟用之唐棣栘也栘開而反合者也此兩物不相親鄂當作萼曹憲云花苞也唐明皇以華萼交輝名樓正取此詩義詩緝嚴氏粲曰玉李其華繁密其鄂豈不韡韡光明乎華以覆萼萼以承華華萼相承覆而光明猶兄弟相承覆而榮顯也凡今之人與我交接者皆莫如兄弟之至親也凡今之人總言下文朋友妻子也一章𤼵端姑言兄弟之常而辭氣抑揚之間已有感歎不盡之意其斯周公之心乎死䘮之威兄弟孔懷原隰裒矣兄弟求矣詩緝嚴氏粲曰一章以華萼相輝喻兄弟之求顯姑以安樂之時言之既而斷以凡人皆不如兄弟則安樂之時未足以見其情之切至於是二章以下皆以死䘮急難之事騐之死䘮可畏怖之事他人未必相念維兄弟甚相思念也方困窮流離羣聚于原野之時維兄弟則相求以相依也朱子詩傳言死䘮之禍他人所畏惡惟兄弟爲相恤耳至于積尸裒聚于原野之間亦惟兄弟爲相求也蕙田案孔懷謂兄弟之患難相恤爲可念即下句所言是也朱子説最爲𦂳切何氏楷曰此就常情而言上章所謂莫如兄弟者于此騐之最爲親切脊令在原兄弟急難每有良朋况也永歎朱子詩傳脊令雝渠水鳥也脊令飛則鳴行則摇有急難之意故以起興而言當此之時雖有良朋不過爲之長歎息而已力或不能相及也呂氏祖謙曰疎其所親而親其所疎此失其本心者也故此詩反覆言朋友之不如兄弟蓋示之以親疎之分使之反循其本也本心既得則由親及疎秩然有叙兄弟之親既篤朋友之義亦敦矣初非薄于朋友也茍雜施而不孫雖曰厚于朋友如無源之水朝滿夕除胡可保哉何氏楷曰禽經云脊令友悌張華注云脊令共母者飛鳴不相離故所以喻兄弟兄弟急難者言兄弟相急于患難謂相救也春秋傳急病譲夷戰國䇿以公子髙義能急人之困字法本此蕙田案此前後三章最情理之實非親歴者不能道亦不能知也非至聖烏能體貼至此兄弟鬩于墻外禦其務毎有良朋烝也無戎詩緝嚴氏粲曰兄弟或不相得鬪狠于墻内非令兄弟也然有他人來侵侮之則同心以外禦爲務不以小忿而敗親也良朋雖衆然無相助者言兄弟之不令者猶勝朋友之良者也輔氏廣曰二章至四章兄弟真切之情惟于此際而後得見分曉張氏叙曰二章正言兄弟休戚之相關三章四章又以朋友相校而徴其莫如也脊令水鳥在原則失所故興急難况怳通雖愴怳不寧徒付之長歎而已不能身與其難也烝盛氣貌戎兵也雖憤于横逆而無不反兵之理則亦無能興戎以禦之也急難者好兄弟也鬩墻者惡兄弟也兄弟不論好惡而皆勝於朋友謂之良朋亦非朋友之簿也義合之分止如是爾雖急難死生之際固有可托以濟者然非常也曰毎者則義亦不相礙矣䘮亂既平既安且寧雖有兄弟不如友生詩緝嚴氏粲曰情義之輕重當於死生患難之時觀之若䘮亂既平安寧無事之時則以爲兄弟不如友生矣何不於死䘮患難之時以觀之乎儐爾籩豆飲酒之飫兄弟既具和樂且孺傳儐陳飫私也不脱屨升堂謂之飫九族㑹曰和孺屬也王與親戚燕則尚毛朝箋私者圖非常之事若議大疑於堂則有飫禮焉聽爲公九族從已上至高祖下及𤣥孫之親也屬者以昭穆相次序疏此章言王者親宗族也王有大疑非常之事與宗族私議而圖之其時則陳列爾王之籩豆爲飲酒之飫禮以叙兄弟宗族爲好焉爲此飫及燕禮之時兄弟既已具集矣九族㑹聚和而且欣樂且復骨肉相親屬也言由王親宗族故宗族亦自相親也飫私釋言文孫炎曰飫非公朝私飲酒也周語有王公立飫又曰立成禮烝而已飫既爲私不在公朝在路門内也酒肉所陳不宜在庭則在堂矣燕禮云皆脱屨乃升堂少儀云堂上無跣燕則有之是燕由坐而脱屨明飫立則不脱矣故云不脱屨升堂謂之飫箋解飫為私之意以私在路寢堂上故謂之私若聽朝則爲公事對公故言私也知飫禮爲圖非常議大疑者以周語云王公之有飫禮將以講事成禮建大徳昭大物言講事昭物是有所謀矣明圖非常議大疑而爲飫禮也周語云王公立飫則冇房烝親戚燕饗則有殽烝又曰飫以顯物燕以合好則飫燕禮異序曰燕兄弟此陳飫者圖非常議大疑乃有飫禮則飫大於燕燕亦是王於族親之禮故陳之示親親也飫禮議其大疑則婦人不與立以成禮則不必和樂下章云妻子好合此傳曰王與族人燕則尚毛以此詩飫燕雜陳故下箋云王與族人燕則宗婦内宗之屬亦從后於房中是此章之中兼燕禮矣上二句爲飫下二句爲燕飫陳籩豆燕言兄弟互以相兼也孺屬釋言文李巡曰孺骨肉相親屬也中庸曰燕毛所以序齒文王世子曰公與族人燕則以齒而孝悌之道逹矣王與宗族人燕以毛髪年齒爲次第也司儀曰王燕則諸侯毛亦謂同姓諸侯也故彼注云謂以髪鬢爲坐朝事尊尊尚爵燕則親親尚齒云親親是燕同姓明矣妻子好合如鼔瑟琴兄弟既翕和樂且耽箋好合志意合也合者如鼓瑟琴之聲相應和也王與族人燕則宗婦内宗之屬亦從后於房中疏上章並陳飫燕之禮此又論内外之歡也王與族人燕於堂上則后與宗婦燕於房中王之族人見王燕其宗族知王親之皆傚王親親與其妻子自相和好志意合和如鼓瑟琴相應和於時兄弟既㑹聚矣其族人非直内和妻子又九族和好忻樂而且湛又以盡歡也箋此解天子自燕宗族兄弟所以得致妻子好合之意以其王與族人燕則宗婦内宗之屬亦從后於房中而燕故有妻子也宗婦者謂同宗卿大夫之妻也内宗者同宗之内女嫁於卿大夫者春秋莊二十四年夫人姜氏入大夫宗婦覿用幣謂之宗婦明是宗族之婦也故賈杜皆云宗婦同姓大夫之婦襄二年傳曰𦵏齊姜齊侯使諸姜宗婦來㑹𦵏諸姜謂齊同姓之女宗婦謂齊同姓之婦是同姓大夫之婦名爲宗婦也周禮春官序官云内宗凡女之有爵者注云内女王同姓之女謂之内宗有爵其嫁於大夫及士者是王同姓之女名爲内宗也天子燕宗族之禮亡所以知王與族人燕則宗婦内宗從后者湛露曰厭厭夜飲不醉無歸傳曰夜飲私燕也宗子將有事族人皆入侍不醉而出是不親也醉而不出是媟宗也箋云天子燕諸侯之禮亡此假宗子與族人燕爲説耳然則天子燕同姓諸侯之禮猶宗子燕族人則天子燕宗族兄弟爲朝廷臣者如宗子於族人可知案特牲饋食禮祭末乃曰徹庶羞設於西序下注云爲將餕去之庶羞主爲尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗已侍於賓奠然後燕私燕私者何也已而與族人飲也此徹庶羞置西序下者爲將以燕飲與然則自尸祝至於兄弟之庶羞宗子與族人燕飲於堂内賓宗婦之庶羞主婦以燕飲于房也鄭以彼特牲是宗子之祭禮族人及族婦皆助故經云宗婦執兩籩宗婦贊豆是宗婦及族人俱助宗子之祭及至末族人既爲宗子所燕明宗婦亦主婦燕之可知也且上文庶羞尸祝兄弟之等男子有庶羞宗婦及内賓婦人亦有庶羞今直云徹庶羞明二者俱徹二者俱燕也故云祝至於兄弟之庶羞宗子與族人燕飲於堂内賓宗婦之庶羞主婦以與燕飲於房中也曲禮曰男女不雜坐謂男子在堂上女子在房故族人在堂女子在房也宗婦得與於燕明内宗亦與其中可知宗子之禮既然故知天子燕族人之禮亦然故云王與族人燕則宗婦内宗之屬亦從后於房中此證妻子止當言宗婦井言内宗者内宗宗婦之類因言之此后燕及妻而連言子者此説族人室家和好其子長者從王在堂孩稚或從母亦在兼言焉蕙田案王與族人飲食之禮有二一曰族燕族食文王世子所稱者是也族燕族食皆燕也而亦有不同平居無事則爲燕以申好大傳所謂合族以食大戴記季冬命國爲酒以合三族是族燕也又因祭而燕楚茨諸父兄弟備言燕私中庸燕毛所以序齒是亦族燕也一曰族飫因圖事而飫與燕不同國語王公諸侯之有飫也將以講事成章建大德昭大物也故立成禮烝而已注立成不坐也烝升也升其滿物而已又曰嵗飫不倦時燕不淫據此則燕之禮主於親愛而和好飫之禮主於嚴肅而整齊嚴肅者易倦親愛者易淫故國語云然是燕與飫固大有别也此詩傳箋正義叙燕飫之禮頗詳然傳以第六章儐爾籩豆爲飫私又曰王與親戚燕則尚毛是一章而飫與燕兼之箋直據國語之文以証飫私之義疏遂以上二句爲飫下二句爲燕飫燕雜陳竊謂毛鄭特泥飫字而爲此解耳此詩專爲燕兄弟而作上五章備言兄弟所以當親愛之故至此乃入燕飲正文極道其和樂之情飫字苐冩其醉酒飽德之意非所謂圖非常議大疑之事也又六章妻子好合如鼓瑟琴兄弟既翕和樂且耽蓋亦申言飲食宴樂兄弟和好之義似亦不專指宗婦内宗燕於房者言故先儒説詩多不從箋疏之説今以其論燕飫之禮頗詳姑存之然亦不甚明晰李氏光地曰此二章言終兄弟之愛之道也人之㓜也兄弟同羣飲食必俱相親相思故曰孺慕也離居異食則意漸疎故必常陳酒食使兄弟具在則其和樂也且將如孺子時矣人方未有妻子兄弟之愛無衰也有妻子則有間之者俱有妻子則又有交相間者兄弟之愛徃徃不終矣夫妻室各緣異姓之合不能與我齊心固恒情也兼於各子其子則視兄弟愈隔故必使妻子與我好合如琴瑟之同調而無異聲則兄弟翕聚而不散其和樂也且將耽嗜以終身矣宜爾室家樂爾妻帑是究是圖亶其然乎詩緝嚴氏粲曰言爾能與兄弟翕合則可宜爾之室乎家樂爾之妻帑爾試窮究之圖謀之庶幾信吾之言李氏光地曰序以為周公所作其極情理之至信非聖人不能道然傳所謂弔二叔之不咸漢儒或指夏商之末其説近是序遂以管蔡之事當之反覆篇中言兄弟急難禦務𤼵乎天性正與管蔡相反如謂詭詞以哀之則又無復勸戒之意故朱傳但以燕飲兄弟為説文王之徳刑于寡妻至於兄弟由關雎以至麟趾之應故周公推以著訓首如此蕙田案此詩燕飲兄弟故極道兄弟天性之親切騐之死生急難而愈真情意之和樂推之妻子室家而大順要皆由燕飲兄弟以合之此飲食之禮所以重也詩大雅行葦序行葦忠厚也周家忠厚仁及草木故能内睦九族外尊事黄耉養老乞言以成其福禄焉箋九族自已上至髙祖下至𤣥孫之親也下疏親睦九族非直其父祖子孫而已故言上至髙祖至𤣥孫之親見髙祖五服之内皆親之文王世子云族食世降一等則天子所燕及者非獨五服之内此唯言九族者言親親以及逺舉九族以見同姓皆親之朱子詩傳此祭畢而燕父兄耆老之詩李氏光地曰燕同姓之詩也朱傳以爲祭畢者以列在大雅别於小雅之燕享云敦彼行葦牛羊勿踐履方苞方體惟葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几傳戚戚内相親也肆陳也或陳筵者或授几者而箋王與族人燕兄弟之親無逺無近俱揖族道之年稚者爲設筵而已老者加之以几詩緝嚴氏粲曰首章𤼵兄弟之愛也言敦敦然聚者是彼道旁之蘆葦勿令牛羊踐履之此葦方苞而成叢方體而成莖其葉初生泥泥然潤澤而可愛忍傷切之乎草之叢生如兄弟之聚也戚戚然親愛之兄弟莫疎逺宜俱相親近也真氏徳秀曰使人主能體此章之㫖則雖一草一木且不敢輕於摧折也况骨肉之戚而縱尋害乎此詩二章以下皆言燕樂兄弟之事然必以此心爲之本而後燕樂不爲虚文不然非所知也吕氏祖謙曰戚戚兄弟莫逺具爾忠厚之意藹然見於言語之外矣下章之燕樂皆所以樂於此也肆筵設席授几有緝御或獻或酢洗爵奠斚醓醢以薦或燔或炙嘉殽脾臄或歌或咢傳設席重席也歌者比於琴瑟也徒擊鼓曰咢人疏毛以爲承上肆筵設几之文更申其事言王於族既爲肆之筵上又設重席其授几之人尊敬老者則有致敬蹴踖之容既設几筵族人升堂受燕或乃主人進酒而獻之於賓賓既受卒爵或乃酌而酢答主人主人卒飲又洗爵酢以酬賓賓受而奠此斚不復舉之王與族燕以異姓爲賓使宰夫爲主人行此獻酢之禮也鄭以上二句特爲老者設文既為老者肆筵又重設席授之以几復有惇史相續代而侍之朱子詩傳言侍御獻醻飲食歌樂之盛也黄氏佐曰侍御以養其體飲以養其陽食以養其隂歌樂以和其心燕禮之盛如此所以示慈惠也敦弓既堅四鍭既鈞舍矢既均序賓以賢敦弓既句既挾四鍭四鍭如樹序賓以不侮朱子詩傳言既燕而射以爲樂也詩緝嚴氏粲曰既燕族人而射以爲樂李氏光地曰既燕而射以樂之且觀徳焉先序其賢多者雋也既序其不侮敬者優也雖同姓亦曰賔故下曽孫曰主曾孫維主酒醴維醹酌以大斗以祈黄耉黄耉台背以引以翼夀考維祺以介景福詩緝嚴氏粲曰述既射而復燕因以乞言也為之主者成王也其酒醴皆醇厚矣遂以長柄大斗従大器中酌之於樽以為禮而求於黄耉之人謂乞言也兄弟之中有老者焉古者燕飲於旅也語必因以求誨於老成人不徒為燕樂也大老告成王以善道引導輔翼以成其徳故自天佑之成王得夀考吉祥助其大福也李氏善曰侍御之盛言其人之不乏也獻醻之盛言其禮之無闕也飲食之盛言其物之豐也歌樂之盛言其聲之和也前二章未射而燕飲之始也故備言其禮樂之盛後二章既射而燕飲之終也故惟致其頌禱之誠言之固有序也蕙田案常棣行葦二詩古盛王以飲食之禮親宗族兄弟之實際也夫由身而推之分形同氣者莫如兄弟皆吾親之體也自五服之屬以及於無服之族皆吾祖一人之體也君子齊家以治國親親而仁民必自其所厚者始親之則思所以厚之厚之則思所以樂之此飲食之禮所以不能已也至親莫如兄弟其情非可以言説喻也常棣為燕飲之樂將以深致其莫可喻之情而反極之急難禦務以著其非良朋所得而擬而復道其燕會懽飫室家好合以感動其天性之良骨肉之愛所以體貼精到而反覆長言之者殆無以加矣行葦由物理以察人倫維葉泥泥戚戚兄弟之詞懇欵親切惻然惟恐傷之千載而下猶能使人興起聖人篤親親以化平天下其精意固如此矣至於禮樂牲醴之盛威儀節次之詳則又有可考焉先之以肆筵設几筵有席几有御陳設之備也繼之以獻酢奠斚賔主之禮也考燕禮諸侯燕其臣以膳宰為主人主人獻賔賔卒爵賔洗爵酢主人主人卒爵主人獻公公卒爵公酌酢主人主人卒爵於是主人酌以酬賔賔奠而不舉詩之或獻或酢洗爵奠斚正與禮合文王世子云族燕則異姓為賓膳宰為主人是也其牲牢酒醴則有醓有醢有燔有炙正饌之外則有嘉餚有脾臄有籩豆而從獻加爵之禮行矣若夫合樂以道和而或歌或咢燕射以為樂而序賓以賢序賓以不侮至於敬老乞言頌禱之事無不舉焉嗚呼可謂盛矣葢其合也禮樂之美兼有饗食之儀文而將之以親愛本之宗廟之昭穆而聨之以歡樂所謂别之以禮義而孝悌之道達者歟飲食之禮見於禮經者甚畧今詳疏其辭義以補逸禮之所未備云小雅湛露湛湛露斯在彼豐草厭厭夜飲在宗載考傳豐茂也夜飲必於宗室禮箋豐草喻同姓諸侯也載之言則也考成也夜飲之在宗室同姓諸侯則成之於庶姓其讓之則止彼疏豐草得露則湛湛然柯葉低垂以興王之燕飲于同姓諸侯此同姓諸侯得王燕飲則威儀寛縱也王與歡酣至於厭厭安閒之夜留之私飲雖則辭譲以其宗室之故則留之而成飲不許其讓以成親厚焉蕙田案此註疏以為同姓諸侯也楚茨諸父兄弟備言燕私傳燕而盡其私恩則箋祭禮畢歸賓客爼同姓留與之燕所以尊賓客親骨肉也燕疏其諸父兄弟留之使皆備具我當與之而盡其私恩也樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔恵孔時維其盡之子子孫孫勿替引之箋燕而祭時之樂復皆入奏以安後日之福禄骨肉安而君之福禄安女之殽羞已行同姓之臣無有怨者而皆慶君是其歡也小大猶長幼也同姓之臣燕已醉飽皆再拜稽首曰神乃歆嗜君之飲食使君夀且考此是慶詞同疏宗族不親則公室傾危故骨肉歡而君之福禄安姓無怨而皆慶是其歡矣神嗜飲食以下是虚詞也蔣氏悌生曰卒章同姓復燕於寢以厚其恩也中庸燕毛所以序齒也朱子章句燕毛祭畢而燕則以毛髮之色别長㓜為坐次也陳氏禮書先王之於同姓有時燕焉有因祭而燕焉國語曰時燕不淫此時燕也詩曰諸宰君婦廢徹不遲諸父兄弟備言燕私坊記曰因其酒肉聚其宗族以教民睦此因祭而燕也其禮之詳雖不可考要之服皮弁服即於路寢王皮弁以日視朝詩刺不能宴同姓而曰有頍者弁則皮弁也宰夫為主異姓為賓王與族人燕於堂后帥内宗之屬燕於房其物餚烝所以合好也其食世降一等所以辨親疎也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脱屨而坐立監相禮羞庶羞以盡愛爵樂無算以盡驩其大率葢與諸侯燕禮不異諸侯燕族人與父兄齒雖王之尊葢亦不以至尊廢至親也國語周語定王謂晉隨會曰郊禘之事則有全烝王公立飫則有房烝注禮之立成者為飫親戚燕饗則有餚烝注餚烝升體節解折之爼也謂之折俎今女非他也而叔父使士季實來唯是先王之宴禮欲以貽女余一人敢設飫禘焉夫王公諸侯之有飫也將以講事成章注章章程也建大徳昭大物也注大徳大功也大物大器也故立成禮烝而已注立成不坐也烝升也升其滿物而已飫以顯物燕以合好注顯物示物備也故嵗飫不倦時燕不淫敬王十年萇𢎞欲城周衛彪徯見單穆公曰昔武王克殷而作詩作此以為飫歌名之曰支以遺後之人使永監焉夫禮之立成者為飫昭明大節而已魯語公父文伯之母祭悼子康子與焉胙不受徹俎不宴宗不具不繹繹不盡飫則退注昭謂立曰飫坐曰燕言宗具則與繹繹畢而飲不盡飫禮而退恐有醉飽之失皆所以遠嫌也公父文伯之母欲室文伯饗其宗老請守龜卜之族師亥聞之曰善哉男女之饗不及宗臣宗室之謀不過宗人陳氏禮書古者合族之禮方其平居無事則有燕以申好及其有大疑謀則有飫以圖事燕則脱屨升堂坐而不立其牲體折節而殽烝所以致愛飫不脱屨升堂立而不坐其牲體半解而房烝所以致嚴周語曰王公之有飫禮立成禮烝而已又曰嵗飫不倦然則飫以圖事非必嵗為之也國語言嵗飫時燕葢明其疎數之異而已衛彪徯曰武王克商作詩以為飫歌名之曰支以遺後之人使永監焉以其戒慎尤在於厭飫之時也公父文伯之母祭悼子康子與焉繹不盡飫而退則飫非燕禮之多儀也詩王風葛藟序葛藟刺平王也周室道衰棄其九族焉疏棄其九族者不復以族食族燕之禮叙而親睦之故王之族人作此詩以刺王也緜緜葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧疏王族宜得王之恩施猶葛藟宜得河之潤澤王何故遺棄我宗族之人乎緜緜葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有疏上言謂他人父責王無父恩此言謂他人母責王無母恩也然則下章謂他人昆責王無兄恩也緜緜葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞小雅頍弁序頍弁諸公刺幽王也暴戾無親不能燕樂同姓親睦九族故作是詩也疏時同姓之諸公刺幽王也為不能燕樂同姓明諸公是同姓諸公也不能燕樂即不能親睦親睦由於燕樂以經責王之不燕樂今不親睦故分而言之耳有頍者弁寔維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟非他蔦與女蘿施於松栢未見君子憂心奕奕既見君子庶幾説懌箋禮天子諸侯朝服以燕天子之朝皮弁以日視朝女酒既美矣女殽既嘉矣何以不用與族人宴也王所當與宴者豈有異人疎逺者乎皆兄弟與王無他言至親刺其弗為也幽王久不與諸公宴諸公未得見幽王之時懼其將危亡故憂而心奕奕然若得見幽王諌正之則庶幾其改變意解懌也有頍者弁寔維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施於松上未見君子憂心怲怲既見君子庶幾有臧觀承案頍弁集傳謂燕兄弟親戚之詩不從傳専言同姓然禮族燕必以異姓為賓異姓古稱曰甥舅則雖燕同姓固有異姓之賓在且角弓之詩曰兄弟婚姻亦兼異姓為言序主九族傳又從之何一從而一否也是序説原未可廢苐傳曰燕序曰刺不燕樂意若相反然詩曰爾酒爾殽曰君子維宴安在其非燕乎曰死喪無日無幾相見安在其非刺乎一再讀之乃知詩固燕也燕而情不迨於棠棣文不備於行葦雖燕無以成懽故詩人傷心於集霰以著交瘉之漸迨胥逺胥傚斯角弓興悲而葛藟有終逺之誚杕杜抱獨行之感焉傳表其事序推其㣲文殊而義一也細繹之自得然則角弓諸詩為不合族者示戒也頍弁之詩又為合族而情文不具者示戒由是觀之飲食之於人道不綦重乎至伐木之詩曰民之失徳乾餱以愆又知非特兄弟族姓間為然矣角弓序角弓父兄刺幽王也不親九族而好讒佞骨月相怨故作是詩也騂騂角弓翩其反矣兄弟昏姻無胥逺矣爾之逺矣民胥然矣爾之教矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至於已斯亡老馬反為駒不顧其後如食宜饇如酌孔取傳饇飽也箋王如食老者則宜令之飽如飲老者則當孔取孔取謂度其所勝之多寡凡器之孔其量大小不同老者氣力弱故取義焉王有族食族燕之禮食疏言王有族食族燕之禮者解經所以有食酌之事則族食酌即族燕矣以食禮無飲燕法無食二事也蕙田案三詩據注疏謂皆刺王不能親睦兄弟之作夫有常棣行葦之盛則有葛藟頍弁角弓之衰盛衰之際所係顧不大歟唐風杕杜序杕杜刺時也君不能親其宗族骨月離散獨居而無兄弟將為沃所并爾有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有枤之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉蕙田案此係諸侯之詩故附於後春秋文公七年左氏傳宋昭公將去羣公子樂豫曰不可公族公之枝葉也若去之則本根無所庇蔭矣葛藟猶能庇其本根故君子以為比注謂詩人取以喻九族兄弟况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以徳皆股肱也誰敢携貳若之何去之不聴蕙田案飲食之禮所謂親之以徳也葛藟之喻警切動人右經傳飲食禮史記齊悼恵王世家孝恵帝二年齊王入朝恵帝與齊王燕飲亢禮如家人漢書中山靖王勝傳議者多寃鼂錯之䇿皆以諸侯連城數十泰彊欲稍侵削數奏暴其過惡諸侯自以骨月至親今或無罪為臣下所侵辱建元三年代王豋長沙王𤼵中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉昭帝本紀元鳳二年夏四月上自建章宫徙未央宫大置酒賜宗室子錢人二十萬後漢書世祖本紀建武十七年冬十月甲申幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悦相與語曰文叔少時謹信與人不欵曲唯直柔耳今乃能如此帝聞之大笑曰吾治天下亦欲以柔道行也和帝本紀十五年冬十月幸章陵會宗室於舊廬勞賜作樂後漢書注蔡質漢儀曰正月旦天子幸徳陽殿臨軒公卿大夫百官各陪朝賀宗室諸劉雜會萬人以上冊府元龜北魏孝文帝太和十九年正月辛未車駕在懸瓠朝享羣臣初帝嘗詔延四廟之子下逮元孫之胄申宗宴於皇信堂不以爵秩為列悉序昭穆為次用家人之禮燭至公卿辭退帝曰燭至辭退庶姓之禮在宗載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北魏書孝明帝本紀熙平二年八月戊戌宴太祖以來宗室年十五以上於顯陽殿申家人之禮隋書禮儀志北齊宴宗室禮皇帝常服别殿西廂東向七廟子孫皆公服無官者單衣介幘集神武門宗室尊卑次於殿庭七十者二人扶拜八十者扶而不拜升殿就位皇帝興宗室伏皇帝坐乃興拜而坐尊者南面卑者北面皆以西為上八十者一坐再至進絲竹之樂三爵畢宗室避席待詔而後復位乃行無算爵冊府元龜唐太宗貞觀十九年征遼迴幸定州時太子監國處定州詔定州管内孝行著聞者宜與宗室老人同賜宴會文宗開成元年十二月帝與禁中會宴諸王因命講讀劉仲武每雙月入内對諸王仍令尚書供食三年四月甲午帝幸十六宅賜諸王宴頒賜有差後唐莊宗同光三年正月甲午皇太后生辰御嘉慶殿召諸王家宴極歡而罷二月帝在鄴己巳擊毬於行宫之鞠場諸王弟從臣等供奉賜定州王都金鞍御馬鞠罷宴王都於武徳殿之山亭宣教坊樂陳百戯俳優角觝夜漏一鼓方罷甲戌文思殿宴王都頒賜有異夜久方罷戊子宴於思政殿三月帝在鄴戊戌宴於内殿丙午帝擊毬於行宫之鞠場皇弟存霸皇子繼岌預焉毬罷宴於迎春殿天成二年秦王從榮自鄴中至帝幸其第宣禁中女伎及教坊樂歡宴至晚從榮進馬及銀器錢絹帝賜諸伎樂及行從人等乘輿歸内四年潞王自河中入覲進金銀錢絹開内宴壬午宴於長春殿蕙田案五代史天成二年幸會節園羣臣買宴冊府元龜載羣臣共進錢絹請宴故秦王潞王均有金銀錢絹進也晉天福二年始停買宴錢宋史太宗本紀雍熙二年庚戌重九召諸王宴射御苑中禮志真宗景徳四年二月甲申上御五鳯樓觀酺宗室近臣侍坐樓前露臺奏教坊樂後二日上復御樓賜宗室宴於都亭驛十月詔皇太子宗室赴玉宸殿翠芳亭觀稻賜宴仍以稻分賜之大中祥符元年正月宴宗室於親王宫又宴宗室内職於都亭驛職官志大中祥符元年有司上都亭驛酺宴位圖皇從姪孫内殿崇班守節與從姪右衛將軍惟叙等同一班上曰族子諸父安可同列乃命重行設位禮志大中祥符八年三月戊戌宴宗室射於苑中七月丙子幸瑞聖園觀稼宴射於水心殿九月丁夘宴宗室射於後苑蕙田案此三宴得行葦詩義仁宗本紀天禧四年冬十月丙午召皇子宗室近臣玉宸殿觀稻賜宴八年三月壬申幸後苑遂宴太清樓八月丁亥詔近臣宗室觀祖宗御書於龍圖天章閣又觀瑞穀於元真殿遂宴蘂珠殿慶歴四年九月丁亥宴宗室太清樓射於苑中五年九月辛夘以重陽曲宴近臣宗室於太清樓遂射苑中十一月丁亥冬至宴宗室於崇徳殿七年冬十月甲子幸廣親宅謁太祖太宗神御殿宴宗室賜器幣有差遼史聖宗本紀統和四年六月皇太妃諸王公主迎上嶺表設御幄道傍置景宗御容率羣臣進酒陳俘獲於前遂大宴金史世宗本紀大定十六年正月辛未皇姑邀上至私第諸妃皆從宴飲甚歡公主每進酒上立飲之十七年五月尚書省奏定皇家袒免以上親宴饗班次並從唐制禮志大定十七年詔以皇族袒免以上親雖無官爵封邑若預宴當有班次禮官言案唐典皇家周親視三品大功親小功尊屬視四品小功親緦麻尊屬視五品緦麻袒免以上視六品上令以此制為班令二十四年二月癸酉上曰朕將往上京念本朝風俗重端午節比及端午到上京則宴勞鄉閭宗室父老五月己丑至上京戊戌宴於皇武殿上謂宗戚曰朕思故鄉積有日矣今既至此可極歡飲君臣同之賜諸王妃主各有差宗戚皆霑醉起舞竟日乃罷二十五年正月丁亥宴妃嬪親王公主於光徳殿宗室宗婦及五品以上命婦與坐者千七百餘人賞賚有差四月丁丑宴宗室宗婦於皇武殿大功親賜官三階小功二階緦麻一階年髙屬近者加宣武將軍及封宗女賜銀絹各有差曰朕尋常不飲酒今日甚欲沉醉此樂亦不易得也宗室婦女及羣臣故老以次起舞進酒上曰吾來數月未有一人歌本曲者吾為汝等歌之命宗室子弟叙坐殿下者皆坐殿上聽上自歌其詞道王業之艱難及繼述之不易至慨想祖宗宛然如覩慷慨悲咽不能成聲歌畢泣下宗戚捧觴上夀皆稱萬嵗於是諸夫人更歌本曲如私家之會既醉上復續調至一鼓乃罷元史太宗本紀六年春會諸王宴射於烏爾罕河夏五月帝在達闌達巴之地大會諸王八年春正月諸王各治具來會宴萬安宮落成明會典永樂六年令帝王生日先於宗廟具禮致祭然後序家人禮慶賀筵宴右漢至明飲食之禮書堯典克明峻徳以親九族九族既睦平章百姓傳髙祖元孫之親小疏九族同出髙曽皆當親之故言以親也禮記喪服記云親親以三為五以五為九又異義夏侯歐陽等以為九族者父族四母族三妻族二皆據異姓有服鄭𤣥駁云異姓之服不過緦麻言不廢昏又昏禮請期云惟是三族之不虞恐其廢昏明非外族也是鄭與孔同臯陶謨惇叙九族傳厚次叙九族先疏厚次叙九族猶堯之為政以親九族也仲虺之誥志自滿九族乃離疏九族舉親以明疎也漢代儒者説九族之義有二案戴禮及尚書緯歐陽説九族乃異姓有屬者父族四母族三妻族二古尚書説九族從髙祖至元孫凡九族此九族亦謂髙祖元孫之親也謂九族乃離實離之聖賢設言為戒容辭頗甚父子之間便以志滿相棄此言九族以為外姓九族有屬文便也周禮春官小宗伯掌三族之别以辨親疎其正室皆謂之門子掌其禁令注三族謂父子孫人屬之正名此疏此三族謂父子孫一本而言推而往其中則兼九族矣云辨親疎者據已上至髙祖下至元孫傍至緦麻重服者則親輕服者則疎也云正室皆謂之門子者還據九族之内但是適子正體主皆是正室亦謂之門子儀禮士昏禮請期曰惟是三族之不虞使某也請吉日注三族謂父昆弟已昆弟子昆弟此三族者已及子皆為服期期服則踰年欲及今之吉也禮記仲尼燕居閨門之内有禮故三族和注三族父子孫也䘮服小記親親以三為五以五為九上殺下殺旁殺而親畢矣注已上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親元孫九也疏親親以三者父子并已為三加祖及孫言五以曽祖親髙祖曽孫親元孫以四統五故為九也然已上親父下親子合應云以一為三而云以三為五者父子一體無可分之義故祖親之説不須分矣而分祖孫非已一體故有可分之義而親名著也又以祖親曾祖以孫親曾孫應云以五為七而言九者曾祖曽孫為情已逺非已一體所親故略其相親之㫖也庾氏云由祖以親曽高二祖由孫以親曽元二孫服之所同義由於此也爾雅釋親父為考母為妣注禮記云生曰父母妻死曰考妣嬪今世學者從之案書曰大傷厥考心事厥考厥長聰聴祖考之彛訓蒼頡篇曰考妣延年書曰嬪於虞詩曰聿嬪於京周禮有九嬪之官明此非死生之異稱矣其義猶今謂兄為晜妹為媦即是此例父之考為王父父之妣為王母注加王者尊之王父之考為曽祖王父王父之妣為曾祖王母注曽猶重也曾祖王父之考為高祖王父曽祖王父之妣為高祖王母注髙者言最在上父之世父叔父為從祖祖父父之世母叔母為從祖祖母注從祖而别世統異故父之晜弟先生為世父後生為叔父注世有為嫡者嗣世統故也疏繼世以嫡長先生於父則繼世者也故曰世父説文叔作尗許慎曰從上小言尊行之小也男子先生為兄後生為弟男子謂女子先生為姊後生為妹父之姊妹為姑父之從父晜弟為從祖父父之從祖晜弟為族父從祖父之子相謂為從祖晜弟通解今本皆脱此句族父之子相謂為族晜弟族晜弟之子相謂為親同姓注同姓親無服屬疏禮記大傳云親者屬也鄭注云有親者服各以其屬親疎此經言親同姓者謂五世之外比諸同姓猶親但無服屬爾兄之子弟之子相謂為從父晜弟注從父而别子之子為孫注孫猶後也從疏言繼後嗣也廣雅云孫順也許慎云從子系系續也言順續先祖之後也孫之子為曾孫注曽猶重也曾孫之子為元孫注元者言親屬㣲昧也元孫之子為來孫注言有往來之親來孫之子為晜孫注晜後也汲冡竹書曰不窋之晜孫王疏釋言文束晳傳曰太康元年汲郡民盗𤼵魏安釐冡得竹書漆字科斗之文其字頭粗尾細似科斗之蟲不窋后稷之子也晜孫之子為仍孫注仍亦重也仍孫之子為雲孫注言輕逺如浮雲王父之姊妹為王姑曽祖王父之姊妹為曽祖王姑髙祖王父之姊妹為髙祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母為從祖王母父之從祖晜弟之母為族祖王母父之兄妻為世母父之弟妻為叔母父之從父晜弟之妻為從祖母父之從祖晜弟之妻為族祖母父之從祖祖父為族曽王父父之從祖祖母為族曽王母父之妾為庶母祖王父也晜兄也注今江東人通言晜路史親親者治之始也禮小記曰親親者以三為五以五為九上殺下殺旁殺而親畢矣是所謂九族者也夫人生則有父壯則有子父子與已此小宗三族之别也父者子之祖因上推之以及於已之祖子者父之孫因下推之以及於已之孫此禮傳之以三為五也己之祖自己子視之則為曾祖王父自已孫視之則為高祖王父已之孫自已父視之則為曾孫自已祖視之則為元孫故又上推以及已之曽高下推以及已之曾元是所謂以五為九也陳氏禮書書與詩序皆言九族特周禮小宗伯儀禮士昏禮記仲尼燕居特言三族者三族父子孫也九族髙祖至元孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何𤦺如淳之徒以父族四母族三妻族二為九族其説蓋以詩之葛藟刺平王不親九族而言謂他人父謂他人母頍弁刺幽王不親九族而言豈伊異人兄弟甥舅角弓亦刺不親九族而言兄弟婚姻無胥遠矣則所謂九族者非特内宗而已是惡知詩人之所主者因内宗而𤼵哉彼謂父族四者父之姓為一族父女昆弟適人者子為二族己女昆弟適人者子為三族己女適人者子為四族母族三者母之父母為一族母之昆弟為二族母之女昆弟為三族妻族二者妻之父為一族妻之母為二族然於母之父母則合而為一族妻之父母則離而為二可乎爾雅於内宗皆曰族於母妻曰黨而已又禮小功之末可以嫁娶妻之黨固無妨於嫁娶昏禮不容慮其不虞也然則九族之説當從孔安國鄭康成為正何則小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣此九族隆殺之差也蓋已上親父下親子三也以父親祖以子親孫五也以祖親曽高以孫親曽元九也然已之所親以一為三祖孫所親以五為九記不言者以父子一體而髙元與曽同服故不辨異之也服父三年服祖期則曽祖宜大功髙祖宜小功而皆齊衰三月者不敢以大小功旁親之服加乎至尊故重其衰麻尊尊也减其日月恩殺也此所謂上殺服適子三年庶子朞適孫期庶孫大功適孫傳重者也有適子者無適孫則長子在皆為庶孫也則曽孫宜五月而與元孫皆緦麻三月者孫服曽祖三月曽祖報之亦三月曾祖尊也故加齊衰曽孫卑也故服緦麻此所謂下殺服祖朞則世叔宜大功以其與父一體故加以期從世叔則疎矣加所不及故服小功族世叔又疎矣故服緦麻此𤼵父而旁殺者也祖之兄弟小功曾祖兄弟緦麻髙祖兄弟無服此𤼵祖而旁殺者也同父至親朞同祖為從大功同曾祖為再從小功同髙祖為三從緦麻此𤼵兄弟而旁殺者也父為子朞兄弟之子宜九月不九月而朞者以其猶子而進之也従兄弟之子小功再從兄弟之子緦麻此𤼵子而旁殺者也祖為孫大功兄弟之孫小功從兄弟之孫緦麻此𤼵孫而旁殺者也葢服有加也有報也有降也祖之齊衰世叔從子之朞皆加也曾孫之三月與兄弟之孫五月皆報也若夫降有四品則非五服之正禮耳顧氏炎武日知録宗盟之列先同姓而後異姓喪服之紀重本屬而輕外親此必有所受之不自周人始矣克明峻徳以親九族孔傳以為自髙祖至元孫之親蓋本之喪服小記以三為五以五為九之説而百世不可易者也牧誓數商之罪但言昏棄厥遺王父母弟而不及外親吕刑申命有邦歴舉伯父伯兄仲叔季弟幼子童孫而不言甥舅古人所為先後之序從可知矣故爾雅謂於内宗曰族於母妻則曰黨而昏禮及仲尼燕居三族之文康成並釋為父子孫杜元凱乃謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子非已之同族皆外親有服而異族者左氏桓公六年傳注然則史官之稱帝堯舉其疎而遺其親無乃顛倒之甚乎且九族之為同姓經傳之中有明證矣春秋魯成公十五年宋共公卒傳曰二華戴族也司城莊族也六官者皆桓族也共公距戴公九世凡十三公内除同世者四公而唐六典宗正卿掌皇九族之屬籍以别昭穆之序紀親疎之别九廟之子孫其族五十有九先皇帝一族景皇帝之族六元皇帝之族三髙祖之族二十有一太宗之族十有三髙宗之族六中宗之族四睿宗之族五此在元宗之時已有七族中睿二宗同為一世若其歴世滋多則有不止於九者而五世親盡故經文之言族者自九而止也杜氏於襄十二年傳注曰同族謂髙祖以下則前説之非不待辨而明矣又孔氏正義謂髙祖元孫無相及之理桓六年不知髙祖之兄弟與元孫之兄弟固可以相及如後魏國子博士李琰之所謂夀有長短世有延促不可得而齊同者如宋洪邁容齋隨筆言嗣濮王士歆在隆興為從叔祖在紹熙為曽叔祖在慶元為髙叔祖其明證矣余丁未嵗在大同遇代府中尉俊析年近五十其世次於孝宗為昆弟而上距𢎞治之元已一百八十年秦晉二府見在者多其六七世孫亦何必帝堯之世髙祖元孫之族無一二人同在者乎疑其不相及而以外戚當之其亦昧於齊家治國之理矣蕙田案九族馬鄭説是也陳氏顧氏辨尤詳明不可易又案以上九族三族之義宗元案九族之説自當以馬鄭解為當在此條内尤宜主同姓本族之九也若尚書以親九族則不必然葢此句該盡修身齊家之道下文平章百姓則指國中民庶言協和萬邦則指天下諸侯言故蔡傳於九族雖主馬鄭而仍包母族妻族在内始無漏義耳許氏謙亦謂但自髙祖至元孫一以服斷則上殺下殺旁殺之餘外姓凡有服之親皆該在其中矣此説是也又案母之父母合為一族者正所以加厚母族耳妻之父母則分為二只當母之一族而已其視母族不已殺而又殺乎書禹貢錫土姓傳天子建徳因生以賜姓謂有徳之人生此地以此地名賜之姓以顯之䟽周語稱帝嘉禹徳賜姓曰姒胙四岳賜姓曰姜左傳稱周賜陳胡公之姓曰媯皆是因生賜姓之事也臣䝉賜姓其人少矣此事是用賢大者故舉以為言詩周南麟趾麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮傳公姓公同姓疎疏公姓公同姓言同姓於同祖上云公子為最親下云公族傳云公族公同祖則謂與公同髙祖有廟屬之親此同姓則五服以外故大傳云五世袒免殺同姓是也大傳注又云外髙祖為庶姓是同髙祖為一節也此有公子公族公姓對例為然案杕杜云不如我同父又曰不如我同姓傳曰同姓同祖此同姓同祖為異彼為一者以彼上云同父即云同姓同父之外次同祖更無異稱故為一也且皆對他人異姓不限逺近直舉祖父之同為親耳襄十二年左傳曰同姓於宗廟同宗於祖廟同族於禰廟又曰魯為諸姬臨於周廟謂同姓於文王為宗廟邢凡蔣茅胙祭臨於周公之廟是同宗於祖廟也同族謂五服之内彼自以五服之外逺近為宗姓與此又異此皆君親非異國也要皆同姓以對異姓異姓最為疎也禮記大傳四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣其庶姓别於上而戚單於下昏姻可以通乎注問之也元孫之子姓别於髙祖五世而無服姓氏所由生繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也注姓正姓始祖為正姓髙祖為庶姓繫之弗别謂若今宗室屬籍也周禮小史掌定繫世辨昭穆疏五世袒免殺同姓也者謂共承髙祖之父者也言服袒免而無正服减殺同姓也六世親屬竭矣者謂共承髙祖之祖者也言不服袒免同姓而已庶姓别異於上與髙祖不同各為氏族不共髙祖别自為宗是别於上也而戚單於下者戚親也單盡也謂四從兄弟恩親盡於下各自為宗不相尊敬庶衆也髙祖以外人轉廣逺分姓衆多故曰庶姓也髙祖以上復為五宗也問之者是記者以殷法而問周五世後昏姻可以通否元孫之子則四從兄弟承髙祖父之後至已五世而無服各事小宗因字因官為氏不同髙祖之父是庶姓别於上庻姓為衆姓也則氏族之謂也云姓氏所由生者據五世無服不相禀承各為氏姓故云姓氏所由生姓正姓者對氏族為正姓也云始祖為正姓者若炎帝姓姜黄帝姓姬周姓姬本於黄帝齊姓姜本於炎帝宋姓子本於契是始祖為正姓也云髙祖為庶姓者若魯之三桓慶父叔牙季友之後及鄭之七穆子㳺子國之後為㳺氏國氏之等云若今宗室屬籍也者以漢之同宗有屬籍則周家繫之以姓是也云小史掌定繫世者周禮小史之官掌定帝繫世本知世代昭穆故云定繫世辨昭穆也陳氏澔曰四世髙祖也同髙祖者服緦麻服盡於此矣故曰服之窮也五世袒免謂共承髙祖之父者相為袒免而已是减殺同姓也六世則共承髙祖之祖者并袒免亦無矣故曰親屬竭也上指髙祖以上也姓為正姓氏為庶姓故魯姬姓而三家各自為氏春秋諸國皆然是庶姓别異於上世也戚親也單盡也四從兄弟恩親已盡各自為宗是戚單於下也蕙田案疏庶姓氏族之謂後世之姓多氏族也故夾漈云三代以後姓氏混而為一蓋源於此春秋隱公八年在氏傳無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建徳注立有徳以為諸侯因生以賜姓注因其所由生以賜姓謂若舜由媯汭故陳為媯姓人疏陳世家云陳胡公滿者虞帝舜之後也昔舜為庶時居於媯汭其後因為氏姓姓媯氏武王克殷得媯滿封之於陳是舜由媯汭故陳為媯姓也案世本帝舜姚姓哀元年傳稱虞思妻少康以二姚是自舜以下猶姚姓也昭八年傳曰及胡公不淫故周賜之姓是胡公始姓媯耳史記以為胡公之前已姓媯非也胙之土而命之氏注報之以土而命氏曰陳疏胙訓報也有徳之人必有美報報之以土謂封之以國名以為之氏諸侯之氏則國名是也周語曰帝嘉禹徳賜姓曰姒氏曰有夏胙四岳國賜姓曰姜氏曰有吕亦與賜姓曰媯命氏曰陳其事同也姓者生也以此為祖令之相生雖下及百世而此姓不改族者屬也與其子孫共相連屬其旁支别屬則各自立氏禮記大傳曰繫之以姓而弗别百世而昏姻不通者周道然也是言子孫當共姓也其上文云庶姓别於上而戚單於下是子孫當别氏也氏猶家也傳稱盟於子晢氏逐瘈狗入於華臣氏如此之類皆謂家為氏氏族一也所從言之異耳釋例曰别而稱之謂之氏合而言之則曰族例言别合者若宋之華元華喜皆出戴公向魚鱗蕩皆出桓公獨舉其人則云華氏向氏并指其宗則云戴族桓族是其别合之異也記謂之庶姓者以始祖為正姓髙祖為庶姓亦氏族之别名也姓則受之於天子族則禀之時君天下之廣兆民之衆非君所賜皆有族者人君之賜姓賜族為此姓此族之始祖耳其不賜者各從父之姓族非復人人賜也晉語稱黄帝之子二十五人其得姓者十二人天子之子尚不得姓况餘人哉固當從其父耳黄帝之子兄弟異姓周之子孫皆姓姬者古今不同質文代革周代尚文欲令子孫相親故不使别姓其賜姓者亦少惟外姓媯滿之徒耳賜族者有大功徳宜世享祀者方始賜之無大功徳任其興衰者則不賜之不賜之者公之同姓葢亦自氏祖字其異姓則有舊族可稱不世其禄不盡賜也衆仲以天子得封建諸侯故云胙土命氏據諸侯言耳其王朝大夫不封為國君者亦當王賜之族何則春秋之世有尹氏武氏之徒明亦天子賜與諸侯之臣義無異也此無駭是卿羽父為之請族葢為卿乃賜族大夫以下或不賜也諸侯之臣卿其為極既登極位理合建家若其父祖㣲賤此人新升為卿以其位絶等倫其族不復因故身未被賜無族可稱魯挾鄭宛皆未賜族故單稱名也或身以才舉者升卿位功徳猶薄未足立家則雖為卿竟不賜族羽父為無駭請族知其皆由時命非例得之也華督生立華氏知其恐慮不得故早求之也由此而言明有竟無族者魯之翬挾柔溺名見於經而其後無聞是或不得族也其士會之孥處秦者為劉氏伍員之子在齊為王孫氏外傳稱知果知知伯之將滅自别其族為輔氏如此之類皆是身自為之非復君賜釋例曰子孫繁衍支布葉分始承其本末取其别故其流至於百姓萬姓其言自有百姓萬姓未必皆君賜也晉語稱炎帝姓姜則伯夷炎帝之後姜自是其本姓而云賜姓曰姜者黄帝之後别姓非一自以姜姓賜伯夷更使為一姓之祖耳非復因舊姓也猶后稷别姬姓不是因黄帝姓也諸侯以字注諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族注或使即先人之諡稱以為族族疏杜意諸侯以字言賜先人字為族也為諡因以為謂賜族雖以先人之字或用先人所為之諡因將為族以諡為族者衛齊惡宋戴惡之類是也而劉君乃稱以諡為族全無一人妄規杜氏非其義也死後賜族乃是正法春秋之世亦有非禮生賜族者華督是也釋例曰舊説以為大夫有功徳者則生賜族非也至於鄭祭仲為祭封人後升為卿經書祭仲以生賜族者檢傳既無同華氏之文則祭者是仲之舊氏也諸侯以字字有二等檀弓曰㓜名冠字五十以伯仲周道也然則二十有加冠之字又有伯仲叔季為長㓜之字二者皆可以為氏矣服䖍曰公之母弟則以長㓜為氏貴適統伯仲叔季是也庶公子則以配字為氏尊公族展氏臧氏是也案鄭子人者鄭厲公之弟桓十四年鄭伯使其弟語來盟即其人也而其後為子人氏不以仲叔為氏則服言公之母弟以長㓜為氏其事未必然也杜以慶父叔牙與莊公異母自然仲叔非母弟族矣其或以二十之字或以長㓜之字葢出自時君之命也叔肸稱叔不稱孫而三桓皆稱孫俱氏長㓜之字自不同也臧氏稱孫展氏不稱孫俱氏二十之字自不同也然則稱孫與不稱孫葢出其家之意未必由君賜也以字為族者謂公之曽孫以王父之字為族也諸侯之子稱公子公子之子稱公孫公子公孫繫公之常言非族也其或貶責則亦與族同成十四年叔孫僑如如齊逆女傳曰稱族尊君命也僑如以夫人婦姜氏至自齊傳曰舍族尊夫人也宣元年公子遂如齊逆女遂以夫人至事與僑如正同其傳直云尊君命尊夫人不言稱族舍族既非氏族則不待君賜自稱之矣至於公孫之子不復得稱公曽孫如無駭之輩直以名行及其死也則賜之族以其王父之字為族也此無駭是公之曽孫公之曽孫必須有族故據曽為文言以王父字耳公之曽孫正法死後賜族亦有未死而有族者則叔孫得臣是也公子公孫於身必無賜族之理經書季友仲遂叔肸者皆是以字配名連言之故杜注並云字也其蕩伯姬者公子蕩之妻不可言公子伯姬故繫於夫字言蕩伯姬蕩非當時之氏其傳云立叔孫氏臧僖伯臧哀伯叔孫戴伯之徒皆傳家據後追言之耳其公孟彄世本以為靈公之子字公孟名彄與季友仲遂相似俱以字配名劉炫不達此直妄規杜過非也必如劉解生賜族之文證在何處其公之曽孫元孫以外爰及異姓有新升為卿君賜之族葢以此卿之字即為此族案世本宋督是戴公之孫好父説之子華父是督之字計督是公孫耳未合賜族應死後其子乃賜族故杜云督未死而賜族督之妄也沈亦云督之子方可有族耳官有世功則有官族邑亦如之注謂取其舊官舊邑之稱以為族皆禀之時君則疏舊官謂若晉之士氏舊邑若韓魏趙氏非是君賜不得族嫌其居官邑不待公命故云皆禀之時君此謂同姓異姓皆然也服䖍止謂異姓又引宋司城韓魏為證韓與司城非異姓司城又自為樂氏不以司城為族也公命以字為展氏注諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏顧氏棟髙春秋大夫無生而賜氏論案春秋公之子稱公子公子之子稱公孫公孫之子以王父字為氏此定制也而胡文定於僖十六年季友卒𤼵傳云魯之大夫有生而賜氏者若季友仲遂是也葢季友於僖有擁戴之功仲遂於宣有援立之恩二君報之故生而賜氏俾世為卿春秋於此特書以志壊法亂紀之始謹履霜之戒其論甚正而其實不然三家稱仲孫叔孫季孫氏未嘗單舉仲叔季也莊三十二年傳立叔孫氏木嘗云立叔氏其有稱叔氏者則另為一族宣公弟叔肸之後經所稱叔弓叔鞅叔輒是也論語孟孫問孝於我檀弓云此季孫之賜也俱有孫字若生而賜為季氏則其子孫如季孫行父季孫宿季孫意如當云季行父季宿季意如矣何以復多贅一孫字乎且叔氏與叔孫氏又何分别也以是知季友賜氏之説非也仲遂之仲本是行次若已賜為仲氏則其子歸父當稱仲歸父不當便稱公孫歸父公孫者未賜族之稱也况遂父子止稱東門氏不稱仲氏宣十八年傳有遂逐東門氏可証至仲嬰齊乃更受賜仲氏耳以是知仲遂賜氏之説非也葢季友卒時尚不氏曰季至其孫行父始以王父字氏曰季孫不可以孫而彊誣其祖襄二十三年外史盟曰毋或如東門遂云云若仲氏果宣公所賜此係國之重典昭章耳目外史必不易其稱謂而曰東門氏杜於仲嬰齊卒註云嬰齊襄仲子宣十八年逐東門氏既而使嬰齊紹其後曰仲氏是則仲之有氏至嬰齊始受君賜以前止曰東門與仲無與而文定以為宣公生而賜為仲氏豈不誤哉夫因其子孫而罪其祖父并罪其祖父當日之君以莫須有之事遂為一成不可變之獄此則宋儒刻論之過也蕙田案注疏論姓氏族極詳國語晉語傳曰黄帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為己姓注此二人相與同徳故俱為己姓青陽金天氏帝少皥也青陽方雷氏之甥也夷鼓彤魚氏之甥也注方雷西陵氏之姓彤魚國名帝繫曰黄帝娶於西陵氏之子曰嫘祖寔生青陽姊妹之子曰甥其同生而異姓者四母之子别為十二姓凡黄帝之子二十五宗其得姓者十四人為十二姓注得姓以徳居宜而賜之姓也謂十四人而二人為姬二人為已故十二姓姬酉祁已滕葴任荀僖姞儇依是也唯青陽與蒼林氏同於黄帝故皆為姬姓注二十五宗唯青陽與蒼林徳及黄帝同姓為姬姓春秋文公十八年左氏傳昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈恵和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟共子孝内平外成昔帝鴻氏有不才子掩義隱賊好行㓙徳醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇餙惡言靖譛庸回服讒蒐慝以誣盛徳天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明徳以亂天常天下之民謂之檮杌此三族也世濟其凶増其惡名以至於堯堯不能去縉雲氏有不才子貪於飲食冒於貨賂侵欲崇侈不可盈厭聚歛積寔不知紀極不分孤寡不恤貧匱天下之民以比三凶謂之饕餮舜臣堯賔於四門流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四㓙也通考馬氏曰八愷出自髙陽八元出自髙辛驩兠出自帝鴻共工出自少皥鯀出自顓頊皆黄帝之裔也雖賢否不同而皆以帝者子孫為顯官於唐虞之世葢古之仕者世禄而五帝三代之世系未有不出自黄帝者故叙此叚以備唐虞以來公族世系之本末云襄公十二年左氏傳吳子夀夢卒臨於周廟禮也注周廟文王廟也周公出文王故魯立其廟凡諸侯之䘮異姓臨於外注於城外向其國同姓於宗廟注所出王之廟同宗於祖廟注始封君之廟同族於禰廟注父廟也同族謂髙祖以下是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟注即祖廟也六國皆周公之支子别封為國共祖周公家語衛公使其大夫求婚於季氏桓子問禮於孔子子曰同姓為宗有合族之義故繫之以姓而弗别綴之以食而弗殊雖百世婚姻不得通周道然也桓子曰魯衛之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊也下治子孫以親親也旁治昆弟所以敦睦也此先王不易之教也白虎通人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故世别類使生相愛死相哀同姓不得相娶者皆為重人倫也姓生也人所禀天氣所以生者也所以有氏者何所以貴功徳賤伎力或氏其官或氏其事問其氏即可知其徳所以勉人為善也或氏王父字何所以别諸侯之後為興滅國繼絶世也諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故魯有仲孫季孫叔孫楚有昭屈景齊有髙國崔也陳氏禮書姓非天子不可以賜而氏非諸侯不可以命姓所以繫百世之正統氏所以别子孫之旁出族則氏之所聚而已然氏亦可以謂之姓故大傳言繫之以姓又言庶姓别於上則氏庶姓一也氏又可以謂之族故羽父為無駭請族隱公命以為展氏則氏族一也蓋别姓則為氏即氏則有族族無不同氏氏有不同族故八元八愷出於髙陽氏髙辛氏而謂之十六族是氏有不同族也商氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋之華氏謂之戴族向氏謂之桓族是族無不同氏也古者或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿氏於事則巫乙匠陶而受姓命氏粲然衆矣鄭氏樵通志氏族畧序凡言姓氏者皆本世本公子譜二書二書皆本左傳然左氏所明者因生賜姓胙土命氏及以字以諡以官以邑五者而已今則不然論得姓受氏者有三十二類左氏之言隘矣一曰以國為氏二曰以邑為氏天子諸侯建國故以國為氏虞夏商周魯衛齊宋之類是也卿大夫立邑故以邑為氏崔盧鮑晏臧費栁楊之類是也三曰以鄉為氏四曰以亭為氏五等之封降國侯而為邑降邑侯而為關内侯降關内侯而為鄉侯降鄉侯而為亭侯關内邑者温原蘓毛甘樊祭尹之類是也裴陸龎閻之類封於鄉者故以鄉氏麋采歐陽之類封於亭者故以亭氏五曰以地為氏有封土者以封土命氏無封土者以地居命氏居傅巖者為傅氏徙嵇山者為嵇氏主東䝉之祀則為䝉氏守橋山之冡則為橋氏耏氏因耏班食於耏門頴氏因考叔為頴谷封人東門襄仲為東門氏桐門右師為桐門氏也隱逸之人居於禄里者為禄里氏居於綺里者為綺里氏美也優倡之人居於社南者為社南氏居於社北者為社北氏賤也又如介之推燭之武未必亡氏由國人所取信也故特標其地以異於衆也六曰以姓為氏姓與地之為氏其初皆因所居而命得賜者為姓不得賜者為地居於姚墟者賜以姚居於嬴濵者賜以嬴姬之得賜居於姬水故也姜之得賜居於姜水故也故曰因生以賜姓七曰以字為氏八曰以名為氏九曰以次為氏凡諸侯之子稱公子公子之子稱公孫公孫之子不可復言公孫則以王父字為氏如鄭穆公之子曰公子騑字子駟其子曰公孫夏其孫則曰駟帶駟乞宋桓公之子曰公子目夷字子魚其子曰公孫友其孫則曰魚府魚石此之謂以王父字為氏無氏者則以名魯孝公之子曰公子展其子曰公孫夷伯其孫則曰展無駭展禽鄭穆公之子曰公子豐其子曰公孫段其孫則曰豐卷豐施此諸侯之子也天子之子亦然王子狐之後為狐氏王子朝之後為朝氏是也無字者以名然亦有不以字而以名者如樊皮字子仲其後以皮為氏伍員字子胥其後以員為氏皆由以名行故也亦有不以王父字為氏而以父字為氏者如公子遂之子曰公孫歸父字子家其後為子家氏是也又如公孫枝字子桑其後為子桑氏者亦是也亦有不以王父名為氏而以父名為氏者如公子牙之子曰公孫兹字戴伯其後為兹氏是也又如季公鉏字子彌其後為公鉏氏者亦是也以次為氏者長㓜之次也伯仲叔季之類是也次亦為字人生其始也皆以長㓜呼及乎往來既多交親稍衆則長㓜有不勝呼然後命字焉長㓜之次可行於家里而已此次與字之别也所以魯國三家皆以次命氏而亦謂之字焉十曰以族為氏左傳云為諡因以為族楚辭云昭屈景楚之三族也昭氏景氏則以諡為族也屈氏者因王子瑕食邑於屈初不因諡則知為族之道多矣不可專言諡也族近於次族者氏之别也以親别疎以小别大以異别同以彼别此孟氏仲氏以兄弟别也伯氏叔氏以長少别也丁氏癸氏以先後别也祖氏禰氏以上下别也第五氏第八氏同居之别也南公氏南伯氏同禰之别也孔氏子孔氏旗氏子旗氏字之别也軒氏軒轅氏熊氏熊相氏名之别也季氏之有季孫氏仲氏之有仲孫氏叔氏之有叔孫氏適庶之别也韓氏之有韓餘氏傅氏之有傅餘氏梁氏之有梁餘氏餘子之别也遂人之族分而為四商人之族分而為七此枝分之别也齊有五王合而為一謂之五王氏楚有列宗合而為一謂之列宗氏此同條之别也公孫歸父字子家襄仲之子也歸父有二子一以王父字襄仲為仲氏一以父字子家為子家氏公子郢字子南其後為子南氏而復有子郢氏伏羲之後有伏虙二氏同音異文共叔叚之後有共氏又有叔氏又有叚氏凡此類無非辨族十一曰以官為氏十二曰以爵為氏有官者以官無官者以爵如周公之兄弟也周公為太宰康叔為司冦聃季為司空是皆有才能可任以官者也五叔無官是皆無才能不可任以官者也然文王之子武王周公之兄弟雖曰無官而未嘗無爵土如此之類乃氏以爵也以官為氏者太史太師司馬司空之類是也雲氏庾氏籍氏錢氏之類亦是也以爵為氏者皇王公侯是也公乗公士不更庶長亦是也十三曰以凶徳為氏十四曰以吉徳為氏此不論官爵惟以善惡顯著者為之以吉徳為氏者如趙衰人愛之如冬日其後為冬日氏古者賢人為人所尊尚號為老成子其後為老成氏以凶徳為氏者如英布被黥為黥氏楊元感梟首為梟氏齊武惡巴東王蕭子響為同姓故改蕭為蛸後魏惡安樂王元鍳為同姓故改元為兀十五曰以技為氏此不論行而論能巫者之後為巫氏屠者之後為屠氏卜人之後為卜氏匠氏之後為匠氏以至豢龍為氏御龍為氏干將為氏烏浴為氏者亦莫不然十六曰以事為氏此又不論行能但因其事而命之耳夏后遭有窮之難后緡方娠逃出自竇而生少康支孫以竇為氏漢武帝時田千秋為丞相以年老詔乘小車出入省中時號車丞相其後因以車為氏㣲子乘白馬朝周兹白馬氏之所始也魏初平中有隱者常乘青牛號青牛先生兹青牛氏之所始也十七曰以諡為氏周人以諱事神諡法所由立生有爵死有諡貴者之事也莊氏出於楚莊王僖氏出於魯僖公康氏者衛康叔之後也宣氏者魯宣伯之後也文氏武氏哀氏繆氏之類皆氏於諡者也凡複姓者所以明族也一字足以明此不足以明彼故益一字然後見分族之義言王氏則濫矣本其所系而言則有王叔氏王孫氏言公氏則濫矣本其所系而言則有公子氏公孫氏故十八曰以爵系為氏唐氏雖出於堯而唐孫氏又為堯之别族滕氏雖出於叔繡而滕叔氏又為叔繡之别族故十九曰以國系為氏季友之後傳家則稱季孫不傳家則去孫稱季叔牙之後傳家則稱叔孫不傳家則去孫稱叔故二十曰以族系為氏士季者字也有士氏又别出為士季氏伍參者字也有伍氏又别出為伍參氏此以名氏為氏者也又有如韓嬰者本出韓國加國以名為韓嬰氏如臧會者本出臧邑加邑以名為臧㑹氏如屠住者本出住鄉加鄉以名為屠住氏故二十一曰以名氏為氏而國邑鄉附焉禹之後為夏氏杞他奔魯受爵為侯又有夏侯氏出焉媯姓之國為息氏公子邊受爵為大夫又有息夫氏出焉此以國爵為氏者也白氏舊國也楚人取而邑之以其後為白侯氏故二十二曰以國爵為氏而邑爵附焉原氏以周邑而得氏申氏以楚邑而得氏及乎原加伯為原伯氏以别於原氏申加叔為申叔氏以别於申氏是之謂以邑系為氏魯有沂邑因沂大夫相魯而以沂相為氏周有甘邑因甘平公為王卿士而以甘士為氏故二十三曰以邑系為氏而邑官附焉師氏者太師氏也史氏者太史氏也師延之後為師延氏史晁之後為史晁氏此以名𨽻官是之謂以官名為氏吕不韋為秦相子孫為吕相氏酈食其之後為食其氏曾孫武為侍中改為侍其氏此以官氏為氏者也故二十四曰以官名為氏而官氏附焉以諡為氏所以别族也邑而加諡如苦成子之後為苦成氏臧文仲之後為臧文氏而加諡者如楚釐子之後為釐子氏鄭共叔之後為共叔氏爵而加諡者如衛成公之後為成公氏楚成王之後為成王氏故二十五曰以邑諡為氏二十六曰以諡氏為氏二十七曰以爵諡為氏也二十八曰代北複姓二十九曰關西複姓三十曰諸方複姓三十一曰代北三字姓也三十二曰代北四字姓此外則有四聲又有複姓四聲者以氏族不得其所系之本乃分為四聲以統之複姓者以諸有複姓而不得其所系之本者此附四聲之後氏族之道終焉又曰三代之前姓氏分而為二男子稱氏婦人稱姓氏以别貴賤貴者有氏賤者有名無氏故姓可呼為氏氏不可呼為姓姓所以别婚姻故有同姓異姓庶姓之别氏同姓不同者婚姻可通姓同氏不同者婚姻不可通三代之後姓氏合而為一皆所以别婚姻而以地望明貴賤于文女生為姓故姓之字多從女如姬姜嬴姒媯姞妘婤姶㚰嫪之類是也五帝之前無帝號有國者不稱國惟以名為氏所謂無懐氏葛天氏伏羲氏燧人氏者也至神農氏軒轅氏雖曰炎帝黄帝而猶以名為氏然不稱國至二帝而後國别唐虞也夏商因之雖有國號而天子世世稱名至周而後諱名用諡由是氏族之道生焉最明著者春秋之時也春秋之時諸侯稱國未嘗稱氏惟楚國之君世稱熊氏荆蠻之道也支庶稱氏未嘗稱國或適他國則稱國如宋公子朝在衛則稱宋朝衛公孫鞅秦則稱衛鞅是也秦滅六國子孫皆為民庶或以國為氏或以姓為氏或以氏為氏姓氏之失自此始故楚之子孫可稱楚亦可稱芊周之子孫可稱周子南君亦可稱姬嘉又如姚恢改姓為媯媯皓改姓為姚兹姓與氏混而為一者也顧氏棟髙春秋列國姓氏表序氏族之學至唐而極精亦至唐而極亂一亂于朝廷之賜姓再亂于支孽之冒姓三亂于外裔之入中國因蕃落以起姓何則自漢初已有賜項伯為劉纒賜婁敬為劉敬至唐而如李勣之徒不知其幾矣衛青以鄭季之子而冒姓衛氏曹操以夏侯氏之子而冒姓曹氏至唐而如楊國忠之徒不知其幾矣金日䃅以休屠王太子而姓金氏劉元海以呼韓邪之後而姓劉氏至唐而侯莫陳之為侯烏石闌之為石又不知其幾矣唐太宗既有天下以地望明貴賤特詔髙士亷岑文本之屬著姓氏譜先列天家次列后族及宰相凡長孫宇文皆登貴姓而于生民之初得姓受氏之由源委不可得而辨也善乎先儒史伯璿之論曰三代以後皆無所謂姓只有氏而已故後世但曰姓某氏而不敢曰某姓某氏葢姓不可考故得虚其姓於氏之上而寔其氏於下亮哉言乎愚謂欲考姓氏之分㫁須以左氏為樞紐葢盤古燧人之初未始有姓也至庖犧得風姓炎帝得姜姓黄帝得姬姓帝堯以伊祁而為祁舜以媯汭而為媯姓至三代迭王延及春秋之初分封之國存百有二十四稽其姓合中國與鄋瞞姬姜子姒風祁媯姞任嬴已偃妘曹芊熊曼歸隗允漆僅及二十有一是時諸侯之國公子公孫支分𣲖别列官分職世有掌司因以命氏而小國之卿大夫名字不列於經傳無可考者居十之九焉最著者姬姓則有周魯鄭衛姜姓則有齊子姓則有宋姒姓則有越與杞鄫芊姓則有楚其公族之析為氏者班班可考又陳媯姓自陳敬仲奔齊而為陳氏晉之范本祁姓士會封於范而為范氏其在秦者為劉氏吴夫槩奔楚為堂谿氏伍員屬其子於齊為王孫氏尤大彰明較著者也又春秋重世卿為之立後則置氏不必公族盡皆有氏也故春秋之初魯之翬挾柔溺鄭之宛齊之年皆無氏逮其後有沒而立氏者莊公季年立叔孫氏是也有邀鄰國以立之如四國為賂故立華氏是也鄭氏樵通志自隋唐而上官有簿狀家有譜系官之選舉必由於簿狀家之婚姻必由於譜系歴代並有圖譜局置郎令史以掌之仍用博通古今之儒知撰譜事凡百官族姓之有家狀者則上之官為考定詳寔藏於秘閣副在左户若私書有濫則糾之以官籍官籍不及則稽之以私書此近古之制以繩天下使貴有常尊賤有等威者也姓氏之學最盛於唐而國姓無定論林寳作元和姓纂而自姓不知所由來漢有鄧氏官譜應邵有氏族篇又有頴川太守聊氏萬姓譜魏立九品置中正州大中正主簿郡中正功曹各有簿狀以備選舉晉宋齊梁因之故晉散騎常侍賈弼太保王𢎞齊衛將軍王儉梁北中郎諮議叅軍知譜事王僧儒之徒各有百家譜徐勉又有百官譜宋何承天撰姓苑與後魏河南官氏志此二書尤為姓氏家所宗唐太宗命諸儒撰氏族志一百卷栁冲撰大唐姓系録二百卷路淳有衣冠譜韋述有開元譜栁芳有永泰譜栁燦有韻畧張九齡有韻譜林寳有姓纂邵思有姓解其書雖多大槩有三種一種論地望一種論聲一種論字論字者則以偏旁為主論聲者則以四聲為主論地望者則以貴賤為主然貴賤升沈何常之有安得専主地望以偏旁為主者可以為字書以四聲為主者可以為韻書此皆無與於姓氏蕙田案姓者因於生而受賜者也氏者分於姓而辨族者也族者本乎姓氏而别宗者也姓原於上古而少氏分於中古而多族淆於後世而雜氏本乎姓氏著而姓晦氏分為族族私而氏公故古者論氏後世論族而已書曰錫土姓左傳曰賜姓命氏前人論之詳矣大傳曰庶姓别於上故氏亦曰姓今之所謂姓者皆氏也即庶姓也善乎陳用之之言曰别姓則為氏即氏則有族族無不同氏氏有不同族盡之矣故曰古者論氏後世辨族辨族則譜系之學不可不講也右族姓氏五禮通考卷一百四十三
