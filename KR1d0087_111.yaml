body:
  text: 五禮通考卷一百一刑部尚書秦蕙田撰吉禮一百一薦新周禮天官䱷人春獻王鮪注王鮪鮪之大者月令季春薦鮪於寢廟疏謂季春三月春鮪新來言王鮪鮪之大者云獻者獻於廟之寢故鄭注引月令云薦鮪於寢廟取魚之法嵗有五案月令孟春云獺祭魚此時得取一也季春云薦鮪於寢廟即此所引者二也又案鼈人云秋獻龜魚三也王制云獺祭魚然後虞人入澤梁與孝經緯援神契云隂用事木葉落獺祭魚同時是十月取魚四也獺則春冬二時祭魚也案潜詩云季冬薦魚與月令季冬漁師始漁同五也是一嵗三時五取魚唯夏不取按魯語云宣公夏濫於泗淵以其非時禮記月令仲春之月天子乃鮮羔開冰先薦寢廟注鮮當為獻聲之悞也獻羔謂祭司寒也祭司寒而出冰薦於宗廟乃後賦之疏鮮當為獻者案詩豳風七月云四之日其早獻羔祭韭故知鮮為獻也云獻羔謂祭司寒者以經云獻羔啟冰先薦寢廟恐是獻羔寢廟故云祭司寒左傳直云獻羔而啟之知祭司寒者以傳云祭寒而蔵之既祭司寒明啟時亦祭之云薦於宗廟乃後賦之者薦於宗廟謂仲春也乃後賦之謂孟夏也故凌人云夏頒冰左傳云火出而畢賦是也季春之月天子始乘舟薦鮪於寢廟注進時美物云疏案爾雅釋魚鮥鮛鮪郭景純云似鱣而小建平人呼鮥子一本云王鮪似鱣口在頷下音義云大者為王鮪小者為鮛鮪似鱣長鼻體無鱗甲方氏慤曰必乘舟而後薦鮪者所以示親漁也蓋先王之饗親牲必親牽殺必親射凡以致其敬而已則乘舟而後薦鮪豈為過哉魚之品多矣然薦必以鮪者為其特大謂之王鮪者以此孟夏之月天子乃以彘嘗麥先薦寢廟注麥之新氣尤盛以彘食之散其熱也彘水畜方氏慤曰以彘嘗麥者以水勝火也仲春以雛嘗黍者以木生火也仲秋以犬嘗麻者以金勝木也季秋以犬嘗稻者以金合金也夫勝所以治之生所以養之合所以和之故食齊得其宜焉仲夏之月天子乃以雛嘗黍羞以含桃先薦寢廟注此嘗雛也而云以嘗黍不以牲主榖也必以黍者黍火榖氣之主也含桃櫻桃也疏黍是火榖於夏時與雛同薦之如鄭此言則黍非新成直取舊黍故下孟秋云農乃登榖注云黍稷於是始熟明仲夏未熟也蔡氏以為此時黍新熟今蟬鳴黍是也非鄭義也案月令諸月無薦果之文此獨羞含桃者以此果先成異於餘物故特記之其實諸果亦時薦之方氏慤曰雛蓋雞也以呂氏春秋見之必謂之雛者雞以雛為美故也若羊之類則以大為美耳孟秋之月農乃登榖天子嘗新先薦寢廟注黍稷之屬於是始熟方氏慤曰榖謂稷也以稷熟於此故農乃登焉然孟夏之麥仲夏之黍仲秋之麻季秋之稻皆榖也此以榖言稷者以其為五榖之長故也若稼穡之官謂之后稷土稷之神謂之社稷者以是而已仲秋之月以犬嘗麻先薦寢廟注麻始熟也季秋之月天子乃以犬嘗稻先薦寢廟注稻始熟也季冬之月命漁師始漁天子親往乃嘗魚先薦寢廟注天子必親往視漁明漁非常事重之也此時魚潔美往疏案仲秋以犬嘗麻季秋以犬嘗稻皆不云天子親今此天子親往特云嘗魚故云明漁非常事重之也以四時薦新是其常事魚則非常祭之物故云重之也馬氏晞孟曰此潜之詩所謂季冬薦魚也漁者牲類也宗廟之祭牲用親獵則漁必親往不亦宜乎少儀未嘗不食新注嘗謂薦新物於寢廟人疏嘗謂薦新物於寢廟也未嘗則子不忍前食新也方氏慤曰秋祭曰嘗以物新成而可嘗故也未嘗則親未嘗新矣孝子其忍食之乎月令毎言先薦寢廟者以此然新物不待秋而有此止以嘗言者以物成於秋故也月令特於孟秋言嘗新者以此左傳言不食新乃謂麥為新以夏為秋故也中庸薦其時食朱子集注時食四時之食各有其物如春行羔豚膳膏香之類是也陳氏禮書古者祭必卜日而薦新不擇日祭有尸而薦無尸以至不出神主奠而不祭有時物而無三牲黍稷此薦新之大畧也鄭注釋王制謂大夫士祭以首時然祭以致禮而有常月薦以致孝而無常時周禮王者享烝之畋皆在仲月是祭有常月也月令王者薦新或於孟月或於仲季唯其時物而已是薦無常時也詩豳風四之日其蚤獻羔祭韭箋月令仲春天子乃獻羔開冰先薦寢廟疏引之証經獻羔之事在二月也祭韭者蓋以時韭新出故用之王制云庶人春薦韭亦以新物故薦之也何氏楷曰其蚤孔云其蚤朝也愚案即二月朔也韭菜名禮祭宗廟韭曰豐本案夏小正正月囿有見韭韭乃陽菜春始發露故紀之舊傳以為即此四之日祭韭非也陸佃云開冰春祭也故獻羔祭韭禮曰春行羔豚又曰春薦韭是也曹氏云獻羔祭司寒也祭韭薦清廟也宋淳化中李至上言案詩四之日獻羔祭韭即今之二月也又月令開冰之祭當在春分非四月所當行也帝覽奏曰韭長可以苫屋矣何謂薦新令春分開冰祭司寒卜日薦冰於太廟詩序潛季冬薦魚春獻鮪也箋冬魚之性定春鮪新來薦獻之者謂於宗廟也疏潜詩者季冬薦魚春獻鮪之樂歌也經總言冬春雜陳魚鮪皆是薦獻之事也先言季冬而後言春者冬即次春故依先後為文且冬薦魚多故先言之冬言季冬春亦季春也月令季春薦鮪於寢廟天官漁人春獻王鮪注引月令季春之事是薦鮪在季春也不言季者以季春鮪魚新來正月未有鮪言春則季可知且文承季冬之下從而畧之也冬言薦春云獻者皆謂子孫獻進於先祖其義一也經言以享是冬亦為獻月令季春言薦鮪是冬亦有薦因時異而變文耳冬則衆魚皆可薦故總稱魚春惟獻鮪而已故特言鮪冬魚之性定者冬月既寒魚不行乃性定而肥充故冬薦之也天官庖人注云魚雁水涸而性定則十月已定矣但十月初定季冬始肥取其尤美之時薦之也月令季冬乃命漁師始漁天子親往乃嘗魚先薦寢廟注云此時魚潔美故特薦之白虎通云王者不親取魚以薦廟故親行非此則不可故隠五年公矢魚於棠春秋譏之是也魯語里革云古者大寒降土蟄發水虞於是乎講罛罶取名魚而嘗之寢廟言大寒降與此季冬同其言土蟄發則孟春也以春魚始動猶乘冬先肥氣序既移故又取以薦然則季冬孟春皆可以薦魚也韋昭以為薦魚惟在季冬國語云孟春者誤案月令孟春獺祭魚則魚肥而可薦但自禮文不具無其事耳里革稱古以言不當謬也言春鮪新來者陸璣云河南鞏縣東北崖上山腹有穴舊說云此穴與江湖通鮪從此穴而來北入河西上龍門入漆沮故張衡云王鮪岫居山穴為岫謂此穴也然則其來有時以春取而獻之明新來也序止言薦獻不言所在故言薦獻之者謂於宗廟也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福𫝊漆沮岐周之二水也潜椮也鰷箋猗與歎美之言也鱣大鯉也鮪鮥也鰷白也鰋鮎也介助景大也徐氏常吉曰享祀是薦非祭所謂備四時之異物順孝子之誠心也方氏慤曰王者於祖廟以人道事之則有寢以神道事之則有廟祭神道薦人道也何氏楷曰周禮獻人凡祭祀共其魚之鱻薧曲禮曰薧魚曰商祭鮮魚曰脡祭則王於凡祭祀其登爼者奚適而不用魚哉特季冬純用魚而春薦新則耑用鮪耳國語魯語里革曰古者大寒降土蟄發水虞于是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也陳氏禮書人子之於親飲食與藥必先嘗而後進四時新物必先獻而後食寢廟之薦新蓋亦推其事先之禮以盡其誠敬而已先儒謂廟藏神主而祭以四時寢藏衣冠几杖之具而祭之以新物然國語曰大寒取名魚登川禽嘗之寢廟月令四時新物皆先薦寝廟者蓋有寢者薦於寢無寢者薦於廟非謂薦止於寢也月令集記秦禮秦出寢於陵則月令所謂寢廟豈皆廟後之寢乎古者掌外事之兆有典祀掌廟有守祧掌寢有𨽻僕故典祀若以時祭祀則帥其屬而修除徵役於司𨽻而役之守祧其廟則有司修除之其祧則守祧黝堊之𨽻僕祭祀修寢則薦新蓋亦修焉觀詩序言薦魚獻鮪而詩言以享以祀月令言以共寢廟之祀則薦新亦謂之祀也祭僕大䘮復於小廟𨽻僕大䘮復於小寢大寢小寢髙祖以下之寢廟也大寢始祖之寢也復於廟則小廟而已于寢則及大寢者以廟嚴於寢故也方氏慤曰王者之於祖禰以人道事之則有寢以神道事之則有廟王者七廟而周官𨽻僕止掌五寢者以二祧將毁先除其寢去事有漸故也蕙田案僕𨽻掌五寢謂王之燕寢五也鄭氏以五寢為五廟之寢者非天子七廟無五寢之理方氏二祧先除其寢之說尤附㑹右寢廟薦新儀禮士䘮禮朔月奠用特豚魚腊陳三鼎注朔月月朔日也有薦新如朔奠徹朔奠先取醴酒其餘取先設者注薦五榖若時果物新出者一疏薦新如朔奠者牲牢籩豆如上朔奠也既夕禮朔月若薦新不饋于下室注以其殷奠有黍稷也禮記檀弓有薦新如朔奠注重新物為之殷奠味疏薦新謂未葬中間得新而薦亡者如朔奠者謂未𦵏前月朔大奠于殯宮大奠則牲饌豐也朔禮視大斂士則特豚三鼎今若有新物及五榖始熟薦於亡者則其禮牲物如朔之奠也大夫以上則朔望大奠士但朔而不望應氏鏞曰薦新重時物也薦新于廟死者已逺則感傷或淺薦新於殯其痛尚新則感傷必重朔祭謂之大奠其視禮大斂故薦新亦如之謂男女各即位内外各從事而其哭之義如一也是禮之同非其物之同注謂殷奠恐未然蓋經曰如朔奠非為之也蕙田案以上䘮奠薦新乃士禮也然推之天子諸侯其禮當亦有之矣右䘮奠薦新禮記祭法王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之諸侯立五廟曰考廟曰王考廟曰皇考廟皆月祭之疏五廟皆月月祭之享嘗四時祭祀文武特留故不月祭但四時祭而已陳氏禮書月祭者薦新之祭也月令獻羔開冰薦鮪羞含桃與夫嘗麥嘗榖嘗麻嘗魚皆先薦寢廟是也國語楚語觀射父曰古者先王日祭月享時類嵗祀注日祭於祖考月祭於髙曾時類及二祧嵗祀於壇墠也周語祭公謀父曰日祭月祀時享嵗貢終王注祭於祖考謂上食也月祀於髙曾時享於二祧嵗貢於壇墠終謂世終也推嗣王及即位而來見朱子曰左氏云特祀於寢而國語有日祭之文韋昭曰謂日上食於祖禰漢事亦然是主復寢猶日上食矣又曰國語日祭月祀時享既與周禮祀天神祭地祗享人鬼之名不合韋昭又謂日上食於祖禰月祀於髙曾時享於二祧亦但於祭法畧相表裏而不見於他經又主既復寢則其几筵未知當俟臨祭而後設耶或常設而不除也陳氏禮書周禮大宗伯以肆獻祼饋食享先王以春祠夏禴秋嘗冬烝享先王祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止諸侯五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止然則周禮有時祭無月祭祭法有月祭無時祭周語祭公謀父曰甸服者祭侯服者祀賔服者享要服者貢日祭月祀時享嵗貢楚語觀射父曰先王日祭月享時類嵗祀諸侯舍日卿大夫舍月士庶人舍時韋𤣥成韋昭之徒則曰天子日祭於祖考月祭於髙曾時享於二祧嵗貢於壇墠此與漢法日祭於寢月祭於廟時祭於便殿其事相類而甸侯賔要荒五服之制與禹貢相合蓋夏商之禮如此故左丘明荀卿司馬遷皆得以傳之也周禮小宗伯凡天地之大灾類社稷宗廟為位則類於宗廟者無常時與所謂王時類者異矣王制庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以雁則薦於四時者有常物與所謂庶人舍時者異矣然則玉藻言天子聽朔於南門之外諸侯聽朔於太廟春秋文公六年書閏月不告朔猶朝於廟論語曰子貢欲去告朔之餼羊鄭氏釋玉藻謂天子聽朔於明堂以特牲告其帝及神配以文王武王釋論語謂人君每月告朔有祭謂之朝享然周禮朝享非謂告朔而聽朔於明堂以特牲告其帝及神配以文王武王無所經見要之告朔於廟餼以特牲謂之月祭此先王之禮也魯文公不行告朔之禮但身至廟拜謁而已故春秋譏之榖梁言天子告朔於諸侯諸侯受於禰廟禮也又曰閏月不以告朔然受朔於禰則異於玉藻閏月不告朔則異於左氏左氏曰閏以正時時以作事事以厚生生民之道于是乎在不告朔棄時政也祭法諸侯月祭不及祖考其說與榖梁同不知何據然也蕙田案祭法有享嘗有月祭享嘗則四時之祭是巳月祭則注疏無明文又考之玉藻聽朔孔疏春秋告月孔疏公羊徐疏榖梁楊疏論語邢疏並以祭法月祭釋之案告朔天子以特牛諸侯以特羊此是告廟之禮並非祭禮告廟亦止在所藏之祖廟未必徧告五廟且據玉藻聽朔於南門之外南門之外則明堂是已王立七廟安得俱在南門之外乎長樂陳氏以月祭為薦新之祭其說為是今從之其周語祭公謀父所云月祀楚語觀射父所云月享之文並當訓為薦新之祭禮記亦以告朔牽合月祭恐未為的右月祭薦新漢書叔孫通傳惠帝嘗出游離宮叔孫通曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果之獻由此興後漢書鄧太后紀安帝七年正月庚戌謁宗廟命婦羣妾相禮儀與皇帝交獻成禮而還因下詔曰凡供薦新味多非其節或鬰養強孰或穿掘萌芽味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今奉祠陵廟須時乃上凡省二十三種三國魏志明帝本紀太和六年四月甲子初進新果於廟髙堂隆云案舊典天子諸侯月有祭事其孟則四時之祭也三牲黍稷時物咸備其仲月季月皆薦新之祭也大夫以上將之以羔或加以犬而已不備三牲也士以豚庶人則唯其時宜魚雁可也皆有黍稷禮器曰羔豚而祭百官皆足太牢而祭不必有餘羔豚則薦新之禮也太牢則時祭之禮也詩云四月其蚤獻羔祭韭周之四月則夏之二月也月令仲春天子乃獻羔開冰季春之月天子始乘舟薦鮪仲夏之月天子乃嘗魚咸薦之寢廟此則仲月季月薦新之禮也蜀譙周禮祭集志天子之廟始祖及髙曾祖考皆月朔加薦以像平生朔日也謂之月祭二祧之廟無月祭也凡五榖新熟珍物新成天子以薦宗廟禮未薦不敢食新孝敬之道也其月朔薦及臈薦薦新皆奠無尸故羣廟皆一日之間盡畢晉書武帝本紀咸寧二年六月癸丑薦荔枝於太廟冊府元龜太康元年五月丁卯薦渌酒於太廟北魏書髙祖本紀太和十五年八月壬辰詔郡國有時物可以薦宗廟者貢之通典唐四時各以孟月享太廟室各用一太牢若品物時新堪進御者有司先送太常令尚食相知簡擇務令潔淨仍以滋味與新物相宜者配之太常卿及少卿一人奉薦太廟卿及少卿有故即差五品以上攝有司行事不出神主仲春薦冰亦如之開元禮薦新於太廟儀薦新之日太廟令帥齋郎灑掃廟之内外太官先饌所薦之物於神厨若有酒者廟司設樽坫罍洗如式謁者引太常卿入立于門東之内道北靣南謁者贊引稱再拜太常卿再拜進饌者奉饌入自正門升自太階各詣於神座前籩豆蓋冪徹之如式訖降自東階以出謁者引太常卿升自東階詣獻祖室前盥洗酌獻訖再拜又再拜若無酒即俱再拜訖謁者引太常卿復位謁者贊拜訖謁者引出薦新物冬魚蕨筍蒲白韭堇小豆眢豆襄荷菱仁薑菱索春酒桑落酒竹根黄米粳米糯米粱米稷米茄子甘蔗芋子雞頭仁苜蓿蔓菁胡瓜冬瓜瓠子春魚水蘇枸杞芙茨子藕大麥麪瓜油蔴麥子椿頭蓮子栗冰甘子李櫻桃杏林檎橘椹菴蘿果棗兎脾麞鹿野雞凡薦新皆所司白時新堪供進者先送太常令尚食相與簡擇仍以滋味與新物相宜者配之以薦皆如上儀舊唐書禮儀志天寳十一載閏三月制自今已後每有朔望日宜令上食造食薦太廟每室一牙盤内官享薦仍五日一開室門灑掃宋史禮志開寳通禮薦新之儀詣僖祖室户前盥洗酌獻訖再拜次獻諸室如上禮遂詔曰夫順時蒐狩禮有舊章非樂畋遊將薦宗廟久墮前制闕孰甚焉爰遵時令暫狩近郊既躬獲禽用以薦爼其今月十一日畋獵親射所獲田禽並付所司以備太廟四時薦享著為令玉海太宗淳化三年正月二十六日詔仲春開冰獻羔祭韭宋史禮志仁宗景祐三年宗正丞趙良規言通禮著薦新凡五十餘物今太廟祭享之外唯薦冰其餘薦新之禮皆寢不行宜以品物時新所司送宗正令尚食簡擇滋味與新物相宜者配以薦之於是禮官宗正條定逐室時薦以京都新物畧依時訓協用典章請每嵗春孟月薦蔬以韭以菘配以卵仲月薦冰季月薦蔬以筍果以含桃夏孟月嘗麥配以彘仲月薦果以瓜以來禽季月薦果以芡以菱秋孟月嘗粟嘗穄配以雞果以棗以梨仲月嘗酒嘗稻蔬以茭筍季月嘗豆嘗蕎麥冬孟月羞以兎果以栗蔬以藷藇仲月羞以雁以麞季月羞以魚凡二十八種所司烹治自彘以下令御厨於四時牙盤食烹饌卜日薦獻一如開寳通禮又太常禮院言自來薦冰惟薦太廟逐室帝主后主皆闕謹案朔望毎室牙盤食帝后同薦又案禮有薦新如朔奠詳此獻祀帝后主别無異等之義今後前廟逐室后主欲乞四時薦新並如朔望牙盤例后廟奉慈廟如太廟之禮皇祐三年太常寺王洙言毎内降新物有司皆擇吉日至渉三四日而物已損敗自今令禮部預為闗報於次日薦之更不擇日呂公綽傳故事薦新諸物禮官議迺薦或後時陳敗公綽採月令諸書以四時新物及所當薦者配合為圗神宗元豐元年宗正寺奏據太常寺報選日薦新兎藷藇栗黄今三物久粥於市而廟猶未薦頗違禮意蓋節序有蚤晏物品有先後自當變通安能齊一又唐開元禮薦新不出神主今兩朝薦新及朔望上食並出神主請下禮官參定所宜詳定所言古者薦新於廟之寢無尸不卜日不出神主奠而不祭近時擇日而祭非也天子諸侯物熟則薦不以孟仲季為限呂氏月令一嵗之間八薦新物開元禮加以五十餘品景祐中禮官議以呂紀簡而近薄唐令雜而不經於是更定四時所薦凡二十八物除依時禮月令外又增多十有七品雖出一時之議然嵗時登薦行之已久依於古則大畧違於經則無法今欲稍加刋定取其間先王所嘗享用膳羞之物見於經者存之不經者去之請自今孟春薦韭以卵羞以葑仲春薦冰季春薦筍羞以含桃孟夏嘗麥以彘仲夏嘗雛以黍羞以瓜季夏羞以芡以菱孟秋嘗粟與稷羞以棗以梨仲秋嘗麻嘗稻羞以蒲季秋嘗菽羞以兎以栗孟冬羞以雁仲冬羞以麕季冬羞以魚今春不薦鮪誠為闕典請季春薦鮪無則闕之舊有林檎蕎麥藷藇之類及季秋嘗酒並合刪去凡新物及時出者即日登獻既非正祭則不當卜日漢儀嘗韭之屬皆於廟而不在寢故韋元成傳以為廟嵗二十五祠而薦新在焉自漢至於隋唐因仍其失薦新雖在廟然皆不出神主今出神主失禮尤甚請依五禮精義但設神主仍候廟成薦新於寢詔依所定如鮪闕即以魴鯉代之既而知宗正丞趙彦若言禮院以仲秋茭萌不經易以蒲白今仲秋蒲無白改從春獻大觀禮局亦言薦新雖繫以月如櫻筍三月當進或萌實未成轉至孟夏之類自當隨時之宜取新以薦文獻通考元豐七年詔舊制薦新米麥之屬皆取於市今後宜令玉津瓊林宜春瑞聖諸園及金明池後苑供具其所無者乃索之雜買務宋史禮志政和四年比部貟外郎何天衢言先王建祭祀之禮必得疏數之中未聞一日並行兩祭者也今太廟薦新有與朔祭同日者夫朔祭之禮行於一月之首不可易也若夫薦新則未嘗卜日一月内皆可薦也新物未備猶許次月薦之亦何必同朔祭之日哉自是薦新偶與朔祭同日詔用次日焉文獻通考宋禮部修立太廟薦新儀注陳設前一日有司設新物於太常卿齋所至日以行事設籩豆於毎室户外以新物實之毎室孟春豆三實以韭葑卵仲春豆一實以冰季春豆三實以筍蒲鮪魚籩一實以含桃孟夏豆三實以彘肉大小麥仲夏豆二實以雛雞黍籩一實以瓜季夏籩二實以蔆㮚孟秋豆二實以粟稷籩二實以棗梨仲秋豆二實以麻稻季秋豆二實以菽兎籩一實以栗孟冬豆一實以雁仲冬豆一實以麕季冬豆一實之以魚又設盥洗於阼階下直東霤北向罍在洗東加勺篚在洗西南肆實以巾設太常卿席位於殿下東南西向省饌前一日祠祭官引宫闈令詣太常卿齋所同眡新物應饌者有司詣厨省鑊以時率其屬臨造行事薦新日祠祭官行宮闈令先入詣殿庭内向立祠祭官曰再拜宮闈令再拜升自西階凡行事執事官升降皆自西階開室不出神主帥其屬掃除退就執事位次有司實新畢禮直官引太常卿常服入就殿下席位北向立贊再拜太常卿再拜次引詣盥洗位北向立搢笏盥手帨手執笏升殿詣僖祖室户外搢笏執事者以新物授太常卿太常卿受新物奉入詣神位前北向跪奠執笏俛伏興出户外北向再拜次詣宣祖室太祖室太宗室真宗室仁宗室英宗室神宗室哲宗室徽宗室欽宗室别廟懿節皇后室安穆皇后室安恭皇后室行禮並如上儀降復位少立退宮闈令闔户降退遼史太宗本紀天顯五年七月戊子薦時果於太祖廟六年七月壬子薦時果於太祖廟穆宗本紀應歴十三年七月乙丑薦時羞於太廟金史禮志海陵天徳二年命有司議薦新依典禮合用時物令太常卿行禮正月鮪明昌間用牛魚無則鯉代二月雁三月韭以卵以葑四月薦冰五月筍蒲羞以含桃六月彘肉小麥仁七月嘗雛雞以黍羞以瓜八月羞以茨以菱以栗九月嘗粟與稷羞以棗以梨十月嘗麻與稻羞以兎十一月羞以麕十二月羞以魚從之世宗大定三年有司言毎嵗太廟五享若復薦新似涉於數擬遇時享之月以所薦物附於籩豆薦之以合古者祭不欲數之義制可元史祭祀志至元四年二月初定一嵗十二月薦新時物薦新儀至日質明太常禮儀院官屬赴廟所皆公服俟於次太廟令率其屬升殿開室户不出神主設籩豆爼酒醴馬湩及室户内外褥位又設盥洗位於階下少東西向奉禮郎率儀鸞局設席褥版位於横街南又設盥盆巾帨二所於齊班幕前凡與祭執事官皆盥手訖太常官詣神厨㸃視神饌執事者奉所薦饌物各陳饌幕内太常官以下入就位東西重行北向立定禮直官贊皆再拜鞠躬拜興拜興平立各就位禮直官引太常次官一貟率執事者出詣饌所奉饌入自正門升自太階奠各室神位前執事者進時食院官搢笏受而奠之禮直官引太常禮儀使詣盥洗位盥手帨手升殿詣第一室神位前搢笏執事者注酒於杯三祭酒又注馬湩於杯亦三祭之奠杯於案出笏就拜興出室户外北向立再拜毎室俱畢降復位執事者皆降禮直官贊再拜鞠躬拜興拜興平立餘官率執事者升徹饌出殿闔户禮直官引太常官以下俱出東神門外圎揖王圻續通考元制世祖至元二十九年始命毎月薦新孟春鮪野彘仲春雁天鵞季春葑韭鴨雞卵孟夏冰羔羊仲夏櫻桃竹筍蒲筍羊季夏瓜豚大麥飯小麥麫孟秋雛雞仲秋菱芡栗黄䑕季秋梨棗黍粱鶿老孟冬芝蔴兎鹿稻米飯仲冬麕埜馬季冬鯉黄羊塔喇布哈其毎月配薦羊羔炙魚饅頭子西域湯餅圎米粥砂糖飯羮乳酪馬湩及春秋圍獵始獲之物元史祭祀志至大元年春正月皇太子言薦新増用影堂品物羊羔炙魚饅頭子西域湯餅圓米粥砂糖飯羮毎月用以配薦明㑹典薦新凡時物洪武二年令太常先薦宗廟然後進御毎月朔望薦新品物皆太常卿供事其在月薦之外者奉常卿奉㫖與内史監官各服常服捧獻不行禮薦新品物正月韭菜四斤生菜四斤薺菜四斤雞子二百六十箇鴨子三百四十箇二月芹菜三斤薹菜五斤冰蔞蒿五斤子鵞二十二隻三月茶筍一十五斤鯉魚二十五斤四月櫻桃十斤杏子二十斤青梅二十斤王瓜五十箇雉雞十五隻猪一口五月桃子十五斤李子二十斤夏至李子二十斤紅豆一斗沙糖一斤八兩來禽十五斤茄子一百五十箇大麥仁三斗小麥麫三十斤嫩雞三十五隻六月蓮蓬二百五十箇甜瓜三十箇西瓜三十箇冬瓜三十箇七月棗子二十斤葡萄二十斤梨二十斤鮮菱十五斤芡實十斤雪梨二十斤八月藕四十枝芋苖二十斤茭白二十斤嫩薑二十五斤粳米三斗粟米三斗稷米三斗鱖魚十五斤九月橙子二十斤栗子二十斤小紅豆三斗沙糖一斤八兩鯿魚十五斤十月柑子二十五斤橘子二十五斤山藥二十斤兎十五隻蜜一斤八兩十一月甘蔗一百三十根鹿一隻雁十五隻蕎麥麫三十斤紅豆一斗沙糖一斤八兩十二月菠菜十斤芥菜五斤鯽魚十五斤白魚十五斤明集禮薦新儀前期署官灑掃廟室内外設太常卿拜位於丹墀中道之西南北向内使監官及預祭官位於其後北向至日鐘鳴後直廟官闢廟門太常司官一同内使監官陳設時新之物并酒果常饌鵞湯飯於各廟神位前直廟内使啟櫝訖引禮官引太常卿内使監官及預祭官各服常服入就位贊禮唱鞠躬拜興拜興平身太常卿以下鞠躬拜興拜興平身贊禮唱請行禮引禮官引太常卿至神位前唱跪太常卿少前跪司香者取香跪進於太常卿之左引禮唱上香上香三上香太常卿上香上香三上香訖唱祭酒祭酒三祭酒奠爵司酒以爵授太常卿斟酒太常卿祭酒祭酒三祭酒奠爵引禮唱俯伏興平身少後鞠躬拜興拜興平身太常卿俯伏興平身少後鞠躬拜興拜興平身贊禮唱復位引禮官引太常卿由西門出復位少立贊禮唱徹豆執事者于神位前徹豆訖贊禮唱鞠躬拜興拜興平身太常卿以下俱鞠躬拜興拜興平身引禮引太常卿以下詣焚楮帛所焚訖贊禮唱禮畢直廟内使斂櫝引禮引太常卿以下出闔廟門各廟儀同獻新儀凡遇四方别進新物在月薦之外者太常卿奉㫖與内使監官各常服捧獻於太廟是日先報直廟内使闢廟門燃香燭啟神櫝太常卿捧獻於徳祖元皇帝神位前内使監官捧獻於徳祖元皇后神位前不行禮獻畢内使斂櫝各廟儀同薦新今在奉先殿毎月案定到品物或初二初三初四用鵞湯粳米飯時果五般案酒五般以品物赴光禄寺果薦生物薦熟右漢至明薦新五禮通考卷一百一
