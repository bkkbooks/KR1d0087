body:
  text: 五禮通考卷一百二十三刑部尚書秦蕙田撰吉禮一百二十三賢臣祀典蕙田案祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之所以崇德報功勸忠尚義而風勵于無窮也自淫祠繁興貞邪淆亂歷代以來祠宇之在天下者廢興不一或以正而被黜或以濫而見推典籍所垂蓋綦溷矣今根據正史旁及傳記舉勳庸德行忠節孝義卓然表見者著于篇其不在祀典及通考所載淫祠俱並削焉禮記祭法聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之劉氏彛曰法施于民者民賴其法成身者也以死勤事者忠于國者弗顧其生義于君者弗惜其死祀之則忠義勸于天下矣以勞定國者夙夜勞瘁弼成王業如伊尹之相湯升陑如呂望之鷹揚我武如周公之坐以待旦也能禦大災者如洪水為災而后土氏能平五土懷襄昏墊而夏后氏能滌九源既免民之魚鱉又敷土以播殖也能捍大患者如玁狁猾夏而宣王斥之管蔡亂國而周公征之楊墨亂教而孟子闢之皆俾大患弗克興焉陳氏祥道曰法施于民所謂民功曰庸也以死勤事以勞定國所謂事功曰勞也能禦天之天葘捍人之大患所謂治功曰力也右秩祀典書武城封比干墓傳封益其土比疏周本紀云命閎夭封干之墓禮記樂記封王子比干之墓注積土為封封比干墓宗賢也蕙田案封墓則有祀事可知廟與墓同吳越春秋夫差帥諸羣臣出國門祀子胥于江濱諸臣並在夫差乃言曰寡人昔不聽相國之言乃用讒佞之辭至令相國逺沒江海自亡以來濛濛惑惑如霧蔽日莫誰與言泣下沾襟哀不自勝左右羣僚莫不悲傷蕙田案此祀忠臣之始右周漢書昭帝本紀元鳳元年三月賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸詔曰朕閔勞以官職之事其務修孝悌以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢日知録漢書萬石君傳石慶為齊相齊人為立石相祠于定國傳父于公為縣獄吏郡中為之立生祠號曰于公祠漢紀欒布為燕相有治績民為之立生祠此後世立生祠之始後漢書明帝本紀永平二年十一月甲申遣使者以中牢祠蕭何霍光帝謁陵園過式其墓章帝本紀建初七年冬十月西巡狩幸長安丙辰遣使者以中牢祠蕭何霍光安帝本紀延光三年閏十月乙未遣使者祀太上皇于萬年以中牢祀蕭何曹參霍光桓帝本紀延熹八年夏四月丁巳壞郡國諸房祀注房謂祠堂也王渙傳曰時唯密縣存故太傅卓茂廟洛陽留今王渙祠桓談傳元和中肅宗行東巡狩至沛使使者祀談塜鄉里以為榮楊厚傳厚年八十二卒于家䇿書弔祭鄉人諡曰文父門人為立廟郡文學掾史春秋饗射常祀之孔融傳融為北海相郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社蕙田案兩漢風俗淳茂祀典所及見于史册者蕭曹與霍皆有相業功在社稷桓談以經學博聞名後世卓茂韓福等以行義稱至于民間亦立生祠有甘棠之愛焉百世而下猶為興起况當其時者乎逮漢末諸君子皆以行義風節相矜尚所由來者逺矣右兩漢宋書禮志劉禪景耀六年詔為丞相諸葛亮立廟於沔陽先是所居各請立廟不許百姓遂私祭之而言事者或以為可立于京師乃從人意皆不納步兵校尉習隆中書侍郎向允等言于禪曰昔周人懷召伯之美甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興以來小善小德而圖形立廟者多矣况亮德範遐邇勳蓋季世王室之不壞實斯人是賴而蒸嘗止于私門廟象闕而莫立百姓巷祭戎夷野祀非所以存德念功述追在昔也今若盡從人心則瀆而無典建之京師又逼宗廟此聖懷所以惟疑也愚意為因近其墓立之於沔陽使所屬以時賜祭凡其故臣欲奉祀者皆限立廟斷其私祀以崇正禮於是從之蕙田案孔明為漢季第一人物故當為三國祠祀之冠三國蜀志秦宓傳宓同郡王商為治中從事商為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲潛心著述有補于世泥蟠不滓行參聖師于今海內談詠厥辭邦有斯人以耀四逺怪子替之不立祠堂蜀本無學士文翁遣相如東受七經還教吏民于是蜀學比于齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不逹封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益于世者乎雖有王孫之纍猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘魏志賈逵傳逵子充嗣豫州吏民追思之為刻石立祠青龍中帝東征乘輦入逵祠詔曰昨過項見賈逵碑像念之愴然古人有言患名之不立不患年之不長逵存而忠勳沒而見思可謂死而不朽者矣其布告天下以勸將來魏略曰甘露二年車駕東征屯項復入逵祠下詔曰逵沒有遺愛歷世見祠追聞夙烈朕甚嘉之昔先帝東征亦幸於此親發德音褒揚逵美徘徊之心益有慨然夫禮賢之義或掃其墳墓或修其門閭所以崇敬也其掃除祠堂有穿漏者補之宋書禮志魏武帝少時漢太尉橋元獨先禮異焉故建安中遣使祀以太牢文帝黃初六年十二月過梁郡又以太牢祀之右三國晉書元帝本紀太興元年十二月癸巳詔曰漢髙經大梁美無忌之賢齊師入魯修柳下惠之墓其吳之髙德名賢或未旌録者其條列以聞蕙田案此後世鄉賢孝義旌表之意禮志故事祀臯陶於廷尉寺新禮移祀于律署以同祭先聖於太學也故事祀以社日新禮改以孟秋之月以應秋政摯虞以為案虞書臯陶作士師惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在斷獄之成不在律令之始也太學之設義重太常故祭于太學是崇聖而從重也律署之置卑于廷尉移祀于署是去重而就輕也律非正署廢興無常宜如舊祀于廷尉又祭用仲春義取重生改用孟秋以應刑殺理未足以相易宜定新禮皆如舊制可羊祜傳祜既卒襄陽百姓于峴山祜平生遊憩之所建碑立廟歲時饗祭焉望其碑者莫不流涕杜預因名為墮淚碑宋書傅亮為宋公修張良廟教義熙十二年髙祖北討軍次留城經張良廟下令文選傅亮撰夫盛德不泯義存祀典微管之歎撫事彌深張子房道亞黃中照鄰殆庶風雲元感蔚為帝師夷項定漢大拯橫流固已參軌伊望冠德如仁若乃神交圯上道契商洛顯默之際窅然難究淵論浩漾莫測其端矣途次舊沛駐駕留城靈廟荒頓遺像陳昧撫迹懷人永歎實深過大梁者或佇想于夷門遊九原者亦流連于隨會擬之若人亦足以云可改構棟宇修飾丹青蘋蘩行潦以時致薦抒懷古之情存不刋之烈主者施行宋書武帝本紀永初二年夏四月己卯朔詔曰淫祠惑民費財前典所絶可並下在所除諸房廟其先賢及以勳德立祠者不在此例禮志永初二年普禁淫祠由是蔣子文祠以下普皆毁絶劉穆之傳元嘉二十五年四月車駕行幸江寧經穆之墓詔曰故侍中司徒南康文宣公穆之秉德佐命翼亮景業謀猷經逺元勳克茂功銘鼎彛義彰典策故已嗣徽前哲宣風後代者矣近因遊踐瞻其塋域九原之想情深悼歎可致祭墓所以申永懷禮志漢時城陽國人以劉章有功于漢為之立祠青州諸郡轉相倣效濟南尤盛至魏武帝為濟南相皆毁絶之及秉大政普加除剪世之淫祀遂絶孝武帝孝建初年更修起蔣山祠文帝本紀元嘉二十六年遣使祭晉故司空忠肅公何無忌之母禮志孝武帝大明三年二月戊申行幸藉田經左光祿大夫袁湛墓遣使致祭五年庚午車駕行幸經司空殷景仁墓遣使致祭王𢎞傳大明五年車駕遊幸經𢎞墓下詔曰故侍中中書監太保録尚書事揚州刺史華容文昭公𢎞德猷光劭鑒識明逺故散騎常侍左光祿大夫太子詹事豫章文侯曇首夙尚恬素理心貞正並綢繆先眷契闊屯夷內亮王道外流徽譽以國圖令勛民思茂惠朕薄巡都外瞻覽墳塋永言想慨良深于懷便可遣使致祭墓所禮志大明七年十一月南巡乙酉遣使祭晉司馬桓溫征西將軍毛璩墓右晉宋北魏書孝文帝本紀太和十有八年春正月癸亥車駕南巡戊辰經比干之墓祭以太牢十有九年九月壬辰遣黃門侍郎以太牢祭比干之墓宣武帝本紀正始二年六月戊戍詔立周旦夷齊廟于首陽山北史劉芳傳芳轉太常卿以周公之祀不應𨽻太常乃上疏曰周公廟所以别在洛陽者蓋緣姬旦創成洛邑故傳世洛陽崇祠不絶以彰厥庸夷齊廟者亦世為洛陽界內神祠今並移太常恐乖其本詔曰所上乃有明據但先朝置立已久且可仍舊李孝伯傳孝伯兄子安世出為相州刺史假趙郡公敦農桑斷淫祠西門豹史起有功于人者為之修飾廟堂右北魏隋書煬帝本紀太業二年五月乙卯詔曰旌表先哲式存饗祀所以優禮賢能顯彰遺愛朕永鑒前修尚想名德何嘗不興歎九原屬懷千載其自古來賢人君子有能樹聲立德佐世匡時博利殊功有益于人者並宜營立祠宇以時致祭墳壟之處不得侵踐有司量為條式稱朕意焉舊唐書太宗本紀貞觀四年九月壬午敕自古賢臣烈士墳墓毋得芻牧令春秋致祭七年十二月丙辰狩于少陵原詔以少牢祭杜如晦杜淹李綱之墓髙宗本紀顯慶二年冬十月遣使祭鄭大夫國僑漢太邱長陳實墓文獻通考麟德二年車駕將封岱嶽至榮陽頓祭紀信墓唐書狄仁傑傳仁傑入拜冬官侍郎持節江南巡撫使吳楚俗多淫祠仁傑一禁止凡毁千七百房止留季札伍員而已天授二年以地官侍郎同鳳閣鸞臺平章事會為來俊臣所搆乃貶仁傑彭澤令邑人為置生祠萬歲通天中擢仁傑為魏州刺史民愛仰之復為立祠舊唐書元宗本紀開元十九年夏四月丙申令兩京及天下諸州各置太公尚父廟以張良配享春秋二時仲月上戊日祭之册府元龜開元十二年十一月幸東都敕有司所經忠臣烈士墓精意致祭以酒脯時果用代牲牢唐書禮樂志開元十九年始置太公尚父廟牲樂之制如文宣出師命將發日引辭于廟仍以古名將十人為十哲配享蕙田案祀尚父可也以古名將為十哲陋矣厥後更有七十二賢異哉册府元龜詔立太公廟制乾坤沖用隂陽所以運行帝王大業文武所以垂範故四序在乎平分五材資于並用式稽乾坤之意載明文武之道永言嘉章斯典未洽自我而始爰備闕文昔羲皇立弧矢之象黃帝有甲兵之事將以定禍亂濟生靈分二柄而齊設配兩儀而共久至若用之以仁義行之以禮樂龍豹卷舒而莫測星辰應變而無方誰其尸之則齊太公之道也故宣尼大聖立文以成化尚父惟師仗武而𢎞訓齊魯之道列親賢之教興鬱為政源崇我王業遂使金石之奏永播於蹲龍之庭蒸嘗之享不行于非熊之室文武並設斯不然矣豈王風云季禮沒于前修將帥是尊慶彰于今日式崇大典垂裕後昆宜令兩京及天下諸州各置太公尚父廟一所以張良配享春秋二時取仲月上戊日祭諸州賓貢武舉人準明經進士行鄉飲酒禮每出師命將辭訖發日便就廟引辭仍簡取自古為將功業顯著康濟生人者十人準十哲例預享舊唐書元宗本紀天寶元年冬十月辛丑改驪山為會昌山仍于秦坑儒之所立祠宇以祀遭難諸儒蕙田案諸儒不在祀典明皇此一祭真足千古册府元龜天寶七載五月詔曰式閭表墓追賢紀善事有勸于當時義無隔于異代其忠臣義士史籍所載德行彌髙者所在置一祠宇量時致祭文獻通考殷相傅説汲郡殷太師箕子汲郡宋公微子睢陽郡殷少師比干汲郡齊相管夷吾濟南郡齊相晏平仲濟南郡晉卿羊舌叔向絳郡魯卿季孫行父魯郡鄭卿東里子産滎陽郡燕上將軍樂毅上谷郡趙卿藺相如趙郡楚三閭大夫屈原長沙郡漢大將軍霍光平陽郡漢太傅蕭望之萬年縣漢丞相丙吉魯郡蜀丞相諸葛亮南陽郡已上忠臣一十六人周太王子吳太伯吳郡伯夷叔齊並河東郡吳延陵季札丹陽郡魏將假干木陜郡齊髙士魯仲連濟南郡楚大夫申包胥富水郡漢將軍紀信華陽郡已上義士八人周太王妃太薑新平郡周王季妃太任扶風郡周文王妃太姒長安縣配享文王廟魯大夫妻敬薑魯郡鄒孟軻母魯郡陳宣孝婦睢陽郡曹世叔妻大家扶風郡已上孝婦七人周宣王齊陵長沙郡衛太子恭薑汲郡楚莊樊姬富水郡楚昭王女富水郡宋恭伯姬睢陽郡梁宣髙行陳留郡齊杞梁妻濟南郡趙將趙括母趙郡漢元帝馮昭儀咸陽郡成帝班媫妤扶風郡漢太傅王陵母彭城郡漢御史大夫張湯母萬年縣漢河南尹嚴延年母束海郡漢淳于緹縈濟南郡已上烈女一十四人右並令郡縣長官春秋二時擇日準前致祭邱氏濬曰後世祭忠臣義士孝婦烈女始于此唐書肅宗本紀上元元年閏四月乙卯追封太公望為武成王禮樂志上元元年尊太公為武成王祭典與文宣王比以歷代良將為十哲象坐侍秦武安君白起漢淮隂侯韓信蜀丞相諸葛亮尚書右僕射衛國公李靖司空英國公李績列于左漢太子少傅張良齊大司馬田穰苴吳將軍孫武魏西河守吳起燕昌國君樂毅列于右後罷中祀遂不祭册府元龜上元元年詔曰定禍亂者必先于武德拯生靈者諒在于師貞周武創業克寧區夏惟師尚父實佐興王况德有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封為武成王有司依文宣王置廟享祭之典一同文宣蕙田案尚父之祠必欲以配文宣何哉建中二年五月有司奏定張良穰苴孫武吳起樂毅白起韓信諸葛亮李靖李績配武成王廟先是開元十九年始于兩京置齊太公廟以張良配乾元中追封齊太公為武成王令選歷代名將從祀然未之行祠宇日荒至是宰相盧杞京兆尹盧謀以盧齊之裔乃鳩其裔孫若盧崔丁呂之族合錢以崇飾之請擇自古名將如孔門十哲皆配享詔下史官乃定穰苴等至是始奏定焉蕙田案觀此則出于姦相之懷私崇飾審矣禮樂志建中二年禮儀使顔真卿奏治武成廟請如月令春秋釋奠其追封以王宜用諸侯之數樂奏軒縣詔史館考定可配享者列古今名將凡六十四人圖形焉越范蠡齊孫臏趙廉頗秦王翦漢曹參周勃李廣霍去病後漢鄧禹賈復冦恂馬援皇甫嵩魏張遼蜀關羽吳周瑜陸遜晉羊祜王濬東晉謝玄燕慕容恪宋檀道濟梁王僧辨北齊慕容紹宗周宇文憲隋韓擒虎史萬嵗唐尉遲敬德蘇定方張仁亶王晙王孝傑齊管仲田單趙趙奢李牧漢彭越周亞夫衛青趙充國後漢吳漢馮異耿弇段熲魏鄧艾蜀張飛吳呂蒙陸抗晉杜預陶侃前秦王猛後魏長孫嵩宋王鎮惡陳吳明徹北齊斛律光周于謹韋孝寬隋楊素賀若弼唐河間王孝恭裴行儉郭元振張齊丘郭子儀貞元二年刑部尚書關播奏太公古稱大賢下乃置亞聖義有未安而仲尼十哲皆當時弟子今以異時名將列之弟子非類也請但用古今名將配享去亞聖十哲之名自是惟享武成王及留侯而諸將不復祭矣貞元四年兵部侍郎李紓言開元中太公廟以張良配以太常卿少卿三獻祝文曰皇帝遣某敢昭告至上元元年贈太公以王爵祭典同文宣有司遂以太尉獻祝版親署夫太公周之太師張良漢之少傅今至尊屈禮于臣佐神何敢歆且文宣百世所宗故樂以宮縣獻以太尉尊師崇道也太公述作止韜略勳業著一代請祝辭不進署改昭告為敬祭留侯為致祭獻官用太常卿以下百官議之多請如紓言左司郎中嚴恱等議曰案紓援典訓尊卑之節當矣抑猶有未盡夫大名徽號不容虛美而太公兵權竒計之人耳當殷之失德諸侯歸周遂為佐命祀典不云乎法施于人則祀之如仲尼祖述堯舜憲章文武刪詩書定禮樂使君君臣臣父父子子皆宗之法施于人矣貞觀中以太公兵家者流始令磻溪立廟開元漸著上戊釋奠禮其進不薄矣上元之際執事者苟意于兵遂封王爵號擬文宣彼于聖人非倫也謂宜去武成王號復為太公廟奠享之制如紓請刑部員外郎陸淳議曰武成王殷臣也紂暴不諫而佐周傾之夫尊道者師其人使天下之人入是廟登是堂稽其人思其道則立節死義之士安所奮乎聖人宗堯舜賢夷齊不法桓文不贊伊尹殆謂此也武成之名與文宣偶非不刋之典也臣愚謂罷上元追封立廟復磻溪祠有司以時享斯得矣左領軍大將軍令狐建等二十四人議曰兵革未靖宜右武以起忠烈今特貶損非勸也且追王爵以祠祀為武教主文武並宗典禮已久改之非也乃詔以將軍為獻官餘用紓奏自是以上將軍大將軍將軍為三獻蕙田案尚父廟在唐追崇逾制獻享非禮幾同淫祠矣李紓陸淳議正大不刋文獻通考昭宗天祐二年封楚三閭大夫屈原為昭靈侯舜帝二妃祠為懿節祠右唐宋史太祖本紀建隆三年九月壬申修武成王廟禮志昭烈武成王自唐立太公廟春秋仲月上戊日行祭禮上元初封為武成王始置亞聖十哲等後又加七十二弟子梁廢從祀之祭後唐復之太祖建隆三年詔修武成王廟與國學相對命左諌議大夫崔頌董其役仍令頌檢閲唐末以來謀臣名將勳績尤著者以聞太祖本紀乾德元年七月丁卯幸武成王廟禮志建隆四年帝幸廟歷觀圖壁指白起曰此人殺已降不武之甚何受享于此命去之案本紀建隆四年十一月改元乾德文獻通考開寶三年十月詔前代功臣烈士宜令有司詳其勳業優劣以聞有司言齊孫臏晏嬰晉公孫杵臼燕樂毅漢曹參陳平韓信周亞夫衛青霍去病霍光蜀主昭烈關羽張飛諸葛亮唐房玄齡長孫無忌魏玄成李靖李績尉遲敬德渾瑊段秀實等皆勳業髙邁為當時之冠晉趙簡子齊孟嘗君趙趙奢漢丙吉唐髙士廉唐儉岑文本馬周為之次燕慕容德唐裴寂郭元振又其次詔孫臏等各置守塜三户趙簡子等各兩户悉蠲其役慕容德等禁樵採其有為盜賊取發者皆具棺槨朝服以葬掩坎日致祭長史奉其事邱氏濬曰宋有司所品第前代功臣烈士為三等皆據其有冡墓存者爾歷代勳德之名固不止此然其所品第者乃一人之見非萬世公論也開寶六年詔許州修朝錯廟真宗咸平四年詔西京修後唐河南尹張全義祠堂宋史真宗本紀景德元年冬十月壬午詔修葺歷代聖賢陵墓禮志景德元年詔前代名臣賢士義夫節婦墳壟並禁樵採摧毁者官為修築無主者碑碣石獸之類敢有壞者論如律仍每歲首所在舉行此令鄭州給唐相裴度守墳三户賜秦國忠懿王錢俶守墳三户宋史真宗本紀景德四年二月己巳幸西京經漢將軍紀信塜司徒魯恭廟贈信太尉恭太師癸酉置國子監武成王廟戊子加號列子增封唐孝子潘良瑗及其子季通墓仍禁樵採文獻通考景德四年以唐刑部尚書白居易孫利用為河南府教授常令修奉墳塋影堂又令鄭州給唐相裴度守墳三户宋史真宗本紀大中祥符元年十一月戊午追諡齊太公曰昭烈武成王令青州立廟周文公曰文憲王曲阜縣立廟文獻通考大中祥符元年十月詔曰周文公旦制禮作樂誕稟聖賢煥乎舊章垂之千載今以上封岱嶽案蹕魯郊遊覽遺風緬懷前烈始公胙土實維是邦故其嗣君得用王祭而祠宇未設闕孰甚焉特議褒崇以申旌顯可追封文憲王于曲阜縣建廟春秋委本州長吏致祭邱氏濬曰自唐以前並祀周公而以孔子配自後専祀孔子而周公無廟誠闕典也後世宜為建廟于魯地一視孔子有司歲祠用釋奠儀但不通祀于天下庶于報祀之典為稱宋史真宗本紀大中祥符四年二月乙酉詔葺夷齊祠文獻通考大中祥符四年祀汾隂駐蹕河中府令訪伯夷叔齊遣官致祭緣路名臣祠廟神帳畫壁並加葺治禁唐相婁師德墳墓樵採宋史仁宗本紀慶歷四年五月壬申幸武成廟禮志初建隆議升歷代功臣二十三人舊配享者退二十二人慶歷議自張良管仲而下依舊配享不用建隆升降之次文獻通考神宗元豐三年詔前代百辟卿士載于祀典者皆不名宋史神宗本紀元豐四年五月戊申封晉程嬰為成信侯公孫杵臼為忠智侯立廟于絳州文獻通考元豐四年承議郎吳處厚言程嬰公孫杵臼保全趙孤乞加封爵詔河東河北漕臣訪其祠墓嬰封成信侯杵臼封忠智侯立祠于墓側載之祀典青箱雜記神宗朝皇嗣屢闕余嘗詣閣門上書乞立程嬰公孫杵臼廟優加封爵以旌忠義庶幾鬼不為厲使國統有繼是時適值鄆王服藥上覽之矍然即批付中書授臣將作監丞敕河東路訪尋二人遺迹乃得其塜于絳州太平縣詔封嬰為成信侯杵臼為忠智侯因命絳州立廟歲時致祭余所上言略曰臣嘗讀史記世家考趙氏廢興之本末惟程嬰公孫杵臼二人各盡死不顧難以保全趙氏孤兒最為忠義乃知國家傳祚至今皆二人之力也蓋下宮之難屠岸賈殺趙朔趙同趙括趙嬰齊已赤族無噍類惟朔妻有遺腹匿于公宮既而免身生男屠岸賈聞知索于宮中甚急于是朔妻置男袴中祝曰趙宗不滅若無聲及索兒竟無聲乃得脫然則兒之無聲蓋天有所祚且天方啓趙氏生聖人以革五代之亂拯天下于湯火之中而奄有焉使聖子神孫繼繼承承而不已則兒又安敢有聲蓋有聲則不免不免則趙氏無復今日矣然雖天祚亦必賴公孫杵臼謬負他嬰匿于山中卒與俱死以絶其後患又必賴程嬰保持其孤遂至成人而立之以續趙祀即趙文子也于是趙宗復盛十世傳至武靈王而遂以強大與秦俱霸其後為秦所併子孫蕩析居散民間今常山真定中山則古之趙地也故趙氏世為保州人而僖祖順祖翼祖宣祖皆生于河朔以至太祖啓運太宗承祧真宗紹休仁宗守成英宗繼統陛下纘業向使趙氏無此二人以力衛襁褓孑然之孤使得以全則承祀無遺育矣又安能熾昌以至于此故臣深以謂國家傳祚至今皆二人之力也二人死皆以義甚可悼痛雖當時趙武為嬰服三年喪為之祭奠春秋祠之世世勿絶然今不知其祠所在竊慮其祠或廢而弗舉或舉而弗葺而弗封三者皆闕典也左氏曰鬼有所歸乃不為厲自宋有天下甲子百二十二年于兹矣而二人忠義未見褒表廟食弗顯故仁宗在位歷年至多而前星不耀儲嗣屢闕雖天命將啓先帝以授陛下然或慮二人精魂久無所歸而亦因是為厲也何哉蓋二人能保趙孤使趙宗復續其德甚厚則趙宗之續國統之繼皆自二人為之也况二人者忠誠精剛洞貫天地則其魂常遊于太空而百世不泯臣今欲朝廷指揮下河東北晉趙分域之內訪求二人墓廟特加封爵旌表如或自來未立廟貌即速令如法崇建著于甲令永為祀典如此則忠義有勸亦可見聖朝不負于二人者矣東軒筆録元豐中屢失皇子有承議郎吳處厚詣閣門上書願遣使尋訪程嬰公孫杵臼塜墓飾祠加封主上即命尋訪未數月得二塜于絳州太平縣之趙村大建廟以時致祭蕙田案二忠原有可祀之禮但以皇嗣為言非篤論也判應天府張方平言司農寺近降新制募人承買祠廟然閼伯主祀大火為國家盛德所乘微子開國于宋亦本朝受命建號所因張巡許逺以孤城死賊能捍大患請免此三廟以稱國家嚴奉之意詔司農寺鬻天下祠廟辱國瀆神莫此為甚可亟寢之令開封府劾官吏以聞宋史神宗本紀元豐六年丙午封三閭大夫屈平為忠潔侯大學衍義補元豐六年太常寺言請自今諸神祠加封無爵號者賜廟額已賜額者加封爵初封侯再封公次封王先有爵位者從其本號婦人之神封夫人再封妃其封號者初二字再加四字如此則錫命馭神恩禮有序從之邱氏濬曰前代鬼神皆有封號贈諡至本朝始詔革天下神封其詔略曰忠臣烈士雖可加以封號亦惟當時為宜夫禮所以明神人正名分不可以僭差今命依古定制凡歷代忠臣烈士亦皆當時初封以為寶號後世溢美之稱皆與革去庶幾神人之際名正言順于禮為當用稱朕以禮祀神之意嗚呼聖祖此詔一洗千古之謬可以為萬世法矣宋史禮志元豐中國子司業朱服言釋奠文宣王以國子祭酒司業為初獻丞為亞獻博士為終獻太祝奉禮並以監學官充及上戊釋奠武成王以祭酒司業為初獻其亞獻終獻又讀祝捧幣令三班院差使臣充之官制未行武學𨽻樞密院學官員數少故差右選今武學隸國子監長二丞簿官屬已多請並以本監官充攝行事仍令太常寺修入祀儀文獻通考哲宗元祐三年廣南經略司言儂冦之亂康州趙師旦封州曹覲雍州蘇緘戰死請為立祠載祀典從之宋史哲宗本紀元祐五年九月丁酉詔定州韓琦祠載祀典文獻通考詔相州商王河亶甲冢沂州顔真卿墓並載祀典元祐七年詔賜唐韓愈潮州廟為昌黎伯廟賜唐柳宗元羅池廟為靈文廟又詔蘇州吳泰伯廟以至德為額元祐八年賜安州雲夢縣楚令尹鬬榖於菟子文祠為忠應廟封崇德侯紹聖二年禮部侍郎黃裳請詔天下州軍籍所祠廟略敘本末如圖經命曰某州祀典從之邱氏濬曰天下之神祠多矣有一方専祀者又有天下通祀者専祀者則俾有司考求其所以為神之故有何功烈有何靈驗始于何代詳著其姓氏爵位及歷代有無封號其通祀者惟于所生及遊宦之地詳其始末其他處則著其建置祠宇歲月及在此靈應之迹命祠部輯為一書以備稽考宋史哲宗本紀紹聖三年六月癸亥真定立趙普廟文獻通考紹聖三年詔德州大中大夫東方朔廟以達隱為額又封辨智侯元符三年臣僚言案史記言韓厥之功不在程嬰杵臼之下請于祚德設位從祀從之宋史徽宗本紀崇寧元年六月癸丑詔封伯夷為清惠侯叔齊為仁惠侯政和元年正月壬申毁京師神祠一千三十八區禮志大觀中尚書省言神祠加封爵等未有定制乃並給告賜額降敕已而詔開封府毁神祠一千三十八區遷其像入寺觀及本廟仍禁軍民擅立大小祠祕書監何志同言諸州祠廟多有封爵未正如屈原廟在歸州者封清烈公在潭州者封忠潔侯永康軍李氷廟已封廣濟王近乃封靈應公如此之類皆未有祀典致前後差誤宜加稽考取一髙爵為定悉改正之他皆倣此故凡祠廟賜額封號多在熙寧元祐崇寧宣和之時其新立廟若何承矩李允則守雄州曹瑋帥秦州李繼和節度鎮戎軍則以有功一方者也韓琦在中山范仲淹在慶州孫冕在海州則以政有威惠者也王承偉築祁州河堤工部員外郎張夏築錢塘江岸則以為人除患者也封州曹覲德慶府趙師旦雍州蘇緘恩州通判董元亨指揮使馬遂則死于亂賊者也若王韶于熙河李憲于蘭州劉滬于水洛城郭成于懷慶軍折御卿于嵐州作坊使王吉于麟州神堂寨各以功業建廟冦凖死雷州人憐其忠而趙普祠中山韓琦祠相州則以鄉里皆載祀典焉邱氏濬曰徽宗之世崇尚神怪之事顧于神祠乃加毀壞其時雖非而所行則是也朱子謂後世有個坐的神道人心邪向他他便盛如狄仁傑只留泰伯伍子胥廟壞了許多廟其鬼亦不能為害這是他見得無這物事了上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神可見鬼神不能自神所以神不神由人心之向背也政和二年武學諭張滋言詩云赫赫南仲惟師尚父文武吉甫顯允方叔王命召虎程伯休父是均為周將功著聲詩今昔所尊惟一尚父而南仲吉甫之徒不預配食餘如卻縠之説禮樂敦詩書尉繚以言為學者師法不當棄而不録請並配食博士孫宗鑑亦請以黃石公配後有司討論不定國子監丞趙子嵩復言之宣和五年禮部言武成王從祀除本傳已有封爵者其未經封爵之人齊相管仲擬封涿水侯大司馬田穰苴橫山侯吳大將軍孫武滬瀆侯越相范蠡武遂侯燕將樂毅平虜侯蜀丞相諸葛亮順興侯魏西河守吳起封廣宗伯齊將孫臏武清伯田單昌平伯趙將亷頗臨城伯秦將王翦鎮山伯漢前將軍李廣懷柔伯吳將軍周瑜平虜伯于是釋奠日以張良配享殿上管仲孫武樂毅諸葛亮李績並西向田穰苴范蠡韓信李靖郭子儀並東向東廡白起孫臏廉頗李牧曹參周勃李廣霍去病鄧禹馮異吳漢馬援皇甫嵩鄧艾張飛呂蒙陸抗杜預陶侃慕容恪宇文憲韋孝寬楊素賀若弼李孝恭蘇定方王孝傑王晙李光弼並西向西廡吳起田單趙奢王翦彭越周亞夫衛青趙充國寇恂賈復耿弇段熲張遼關羽周瑜陸遜羊祜王濬謝玄王猛王鎮惡斛律光王僧辨于謹吳明徹韓擒虎史萬歲尉遲敬德裴行儉張仁亶郭元振李晟並東向凡七十二將云蕙田案七十二將以擬七十二賢不經甚矣王圻續通考徽宗宣和間加封徽州府烏聊山廣惠王廟隋末盜起郡人汪華有保障功後因立廟祀之燕翼貽謀録皇朝追褒先賢皆有所因仁宗景祐元年詔封扁鵲為神應侯以上疾愈醫者許希有請也徽宗崇寧元年二月封孔鯉泗水侯孔伋沂水侯崇先聖之祠也六月封伯夷清惠侯叔齊仁惠侯重節義之風也宣和元年封列禦冦沖虛觀妙真君莊周微妙元通真君尚虛無之教也然仁宗因醫者之請姑勉從之伯魚子思之封以配享從例封也伯夷叔齊遜千乘之國豈求身後虛名莊列物外又何羡真君之號不必封可也文獻通考髙宗建炎元年十一月丙寅郊赦歷代忠臣烈士有功于民載在祀典者命所在有司祭之後此赦皆如之宋史禮志紹興二年駕部員外郎李願奏程嬰公孫杵臼於趙最為功臣神宗命絳州立廟歲時奉祀今廟宇隔絶祭亦弗舉宜于行在所設位望祭從之髙宗本紀紹興十一年八月戊辰立祚德廟于臨安祀韓厥禮志紹興十一年五月國子監丞林保奏竊見昭烈武成王享以酒脯而不用牲牢雖時四方多事禮用綿蕝然非所以右武而勵將士乞今後上戊釋奠用牲牢以管仲至郭子儀十八人祀于殿上從之又紹興十一年中書舍人朱翌言謹案晉國屠岸賈之亂韓厥正言以拒之而程嬰杵臼皆以死匿其孤卒立趙武而趙祀不絶厥之功也宜載之祀典與嬰杵臼並享春秋之祀亦足為忠義無窮之勸禮寺言崇寧間已封厥義成侯今宜依舊立祚德廟致祭髙宗本紀紹興二十二年秋七月甲午朔加封程嬰公孫杵臼韓厥為公升中祀禮志紹興十六年加嬰忠節成信侯杵臼通勇忠智侯厥忠定義成侯後改封嬰強濟公杵臼英略公厥啓侑公升為中祀髙宗本紀紹興二十三年十一月壬寅詔立張叔夜廟于信州王圻續通考髙宗時李綱為相請褒恤仗節死義者乃贈李若水觀文殿學士諡忠憫霍安國延康殿學士劉韐資政殿學士安國立廟於河南懷州二人廟未詳所在死節副總管劉惟輔立廟于鞏昌成縣額號忠烈知徐州王復死節立忠烈廟知吉水熊彥明禦賊死立廟祀之金騎渡江武昌郡守李宜嬰城固守被殺建祠祀焉賜額忠義李彥仙守陜州拒金城陷死詔立廟以祀賜號忠烈知永豐趙訓之與尉陳自仁力禦金以衛孟太后皆遇害詔贈官立廟以祀左翼軍都統崔亮從髙宗駕南渡領兵戍漳州以討冦戰沒立廟死所賜額表忠趙令晟知黃州禦金不屈而死詔諡忠憫立廟祀之賜額顯忠延平府陳諫議祠祀陳忠肅公瓘賜雷州寇萊公祠額曰旌忠紹興時山隂蔡定父革坐法被繫時年七十餘法當免繫鞫胥持不可定詣府請代弗許定知父終不可贖也仰天呼曰父老而刑定生何益自赴河而死府帥聞之驚曰真孝子也立命出革厚為定具棺殮而撫周其家且請於朝為立廟賜額曰愍孝劉晏擊賊戚方於宣城被害贈官立廟楊邦乂死節于建康創祠聚寶門外額曰褒忠邦乂廬陵人廬陵舊有三忠祠祀歐陽修胡銓與邦乂嘉定末又益以周必大楊萬里為四忠一節祠一節指邦乂也酈瓊叛統制官喬仲福張景以不從亂被殺立廟祀之名喬張廟太行義士王忠植屢敗金師後以所部赴援為叛將趙惟忠執送金人而死事聞贈官建祠宿遷人魏勝起兵復山東後與金戰援兵不至墜馬死詔諡忠壯立廟鎮江之蒜山祀之額曰褒忠廣信州鄭驤張叔夜前後死節知州建雙廟合祀之金主亮南侵統制姚興力戰父子俱死詔即其地立廟及復淮西又立廟又于戰所立廟賜額曰旌忠滁州守劉位屢敗金兵金遣使招之位斬其使未幾出戰中流矢死詔建廟滁陽賜號剛烈揚州守將元怡梁宏張昭與金戰死立三將軍廟揚州統制王方魏全與金力戰而死立廟曰旌忠陳希造從父清流縣丞告老禦賊於武平死之汀人建祠祀焉澠池人張玘以家財募兵與金人戰于海州中流矢死孝宗命祀于戰所莆田郭義重事親至孝母喪廬于墳傍甘露降白鵲馴集及卒為立廟名郭孝子祠後元孫道卿子廷煒俱以孝聞并繪像以祀名三孝子祠武翼郎袁章與賊戰死立廟于仙遊邱祈亦戰死附祀焉廟名靈惠袁侯祠李亘為劉豫守大名密謀取豫歸宋事泄而死朝廷贈官立祠曰憫忠蕙田案南宋及金元賢臣祠祀王圻續考臚載頗詳苐年月多失考今芟其繁蕪摘其卓然不磨者彚附于每朝之末後同宋史孝宗本紀乾道三年二月甲申為知陳州陳亨祖立廟于光州賜名愍忠五年十一月丙寅為嶽飛立廟于鄂州禮志六年詔武成王廟升李晟于堂上降李績于李晟位次仍以曹彬從祀先是紹興間右正言都民望言李績邪説誤國唐祀幾滅李晟有再造王室之勳宜升李晟于堂上置李績于河間王孝恭之下至是著作郎傅伯夀言武成廟從祀出于唐開元間一歲銓次失于太雜如尹吉甫之伐玁狁召虎之平淮夷實亞鷹揚之烈陳湯傳介子馮奉世班超之流皆為有漢之雋功在晉則謝安祖逖在唐則王忠嗣張巡輩皆不得預從祀之列竊聞邇日議臣請以本朝名將從祀謂宜并詔有司討論歷代諸將為之去取然後與本朝名將繪于殿廡亦乞取建隆建炎以來驍俊忠槩之臣功烈暴于天下者參陪廟祀故有此命孝宗本紀淳熙元年二月辛巳為郭浩立廟于金州十一年冬十月壬午詔諸以忠義立廟者兩淮漕臣繕治之王圻續通考孝宗隆興初環慶路統制強霓及其弟震皆為金人所執不屈死贈官立廟額曰旌忠郴寇犯永州境都巡檢使王政被執罵賊以死賜廟額褒忠宋史寧宗本紀嘉泰四年夏四月甲午朔立韓世忠廟于鎮江府五月癸未追封嶽飛為鄂王王圻續通考寧宗時常熟令孫應時建吳公祠以祀子遊朱子記曰案太史公志孔門諸子多東州之士獨子遊為吳人縣有巷名子遊有橋名文學圖經又言公之故宅在縣西北而舊井存焉公為此縣之人不誣矣開禧中蘄州通判秦巨與郡守李誠之協力禦金人城破自刎死子渾浚從父皆死詔封誠之正節侯巨義烈侯立廟蘄州吳昉知荆門軍鍾相之黨攻城昉闔室被害二子雍澧在襁褓間得免詔立廟于軍城南賜額英愍楊震仲權知大安軍不從吳曦之叛飲藥死詔諡節憫賜廟曰旌忠南安洞賊入泰和大肆焚掠縣著姓蕭必顯蕭伯達起義兵保障一方事聞徴必達賜以爵凡死于陳者立廟祀之額曰忠義金人攻鳳陽統制韓存秦允以所部血戰死之立祠曰忠義江西洞寇犯南雄境郡守趙善偰督戰與其子汝振司法黃樞俱死立祠于保昌縣洞寇犯南雄境摧鋒將梁滿戰死立梁侯祠祀之理宗寶慶時南雄建四先生祠以祀周子二程及朱子真西山有記建朱文公祠于建安其季子在嫡孫鑑從士友之請也建安又有遊御史祠祀遊酢有胡文定祠祀胡安國皆在府學內有屏山劉文靖公祠祀劉子翬在府治南朱文公祠一在浦城一在晉江一在南安一在龍溪一在仙遊一在同安又建寧府守王野建書院以祀文公理宗賜額曰建安家廟南平縣有道南祠祀楊時而以羅李朱三公配循州興寧縣尉顔公衮禦賊遇害主簿徐千能等皆被害邑人立廟祀之建康都統吳從龍為元人所獲使至秦州城下誘降終不屈死之詔廟祀揚秦二州胡斌以殿司禆將從童德興討汀寇賊大至斌率兵死戰殺賊甚衆血凝兩肘雙刃既折復以鐵鞭擊之既而力不支至蓮塘前遇害死猶執鞭強立不仆數日郡人賴其拒戰獲奔免者數萬賊退後民哀泣為殮葬即其地創祠祀之事聞賜額曰忠勇端平時建興孝祠于東陽縣祀吳孝子斯敦晉孝子許孜許生唐孝子應先唐君裕馮子華凡六人黃復判滁州力禦元兵死立廟祀之建吕成公祠于金華府治西以公弟忠公配嘉熙中都承旨王野上武都郎趙師檟死賊為立廟祀之詔賜額曰忠愍廟在尤溪縣制置使丁黼子榮為其父明戰死立廟石埭額曰褒忠荆湖制置使孟珙以荆襄死節之臣請建祠致祭賜額曰愍忠淮安副總管耿世安為賈似道調往漣水軍增戍鏖戰而死贈官立廟淮安賜額忠武海州通判侯富與山東李松夀戰死詔即海州立廟賜額旌忠開慶中知臨江府軍陳元桂死節立廟死所賜額褒忠景定二年八月贈江淮大都督李璮檢校太師賜廟額曰顯忠璮李全之子自歸宋為元所殺三年建永慕廟于義烏孝子顔烏墓左烏秦時人負土築墳羣烏銜土助之口為之傷故縣名烏傷後改義烏度宗咸淳中蘭溪金景文事親至孝親沒廬墓夜有五色光熖爛然射墓上人以為孝感所致知縣沈應龍以景文及陳天隱董少舒名請于朝立碑建祠于學宫之後名三賢堂蘇州郡守袁説友建范文正公祠于義宅之東撥田以供常祀命其後主之又専建范氏祠堂于學內祀仲淹及其子純仁純禮純祐純粹又長山興化慶陽邠州皆有范文正公祠蓋其遺澤所存也靜江節度使牛富死于樊城詔贈官諡忠烈立廟于建康知沔州曹友聞與弟萬同禦元兵于雞冠隘死之贈諡曰節賜廟額曰褒忠邊居誠守新城竭力禦元師城陷自殺立廟王彥明守蘄州力禦元兵不敵卒家屬同沉水中立廟祀之永福縣黃大夫與元兵戰至洪面為賊所斬身首異處猶能持其頭就頸口憤憤欲言鄉人憐而祀之曰龜嶺廟密祐為江西都統禦元不敵被執不屈死立廟恭帝德祐元年建昌降于元吳楚材還其鄉糾集民兵力圖恢復後為敵所執遣降人府録訊之曰汝何為錯舉楚材曰不錯不錯如府録所為乃錯耳身上緑袍何自而得乃為敵用吾一鄙儒為國出力事雖不成正不錯也竟為冦所殺益王立于福州贈官朝奉郎即邵武境上立廟賜額忠勇元兵逼南雄僉判邱必明不屈為賊所殺白血流地立祠祀之元兵至安仁提刑謝枋得調淮士張孝忠逆戰孝忠擊殺百餘人尋中流矢死立祠祀之號張將軍廟馬發知潮州事元兵逼潮戰敗服鴆死立馬公祠祀之鞏信從文天祥趨永豐戰于方石嶺中數矢傷重不能戰自投崖石死立廟祀之吳興太守趙良禦元兵不屈夫婦俱死郡人立雙節廟湛侯重南昌縣人事親孝執親喪廬墓側致白兔馴擾人感其化立廟祀之武平縣有三公祠祀録參陳希造知縣顔東老縣尉鍾伯福以三公皆禦寇而死也卲武監軍劉純死節立廟祀之賜額曰忠贛州府學內有八先生祠祀周濓溪程明道伊川張橫渠朱晦菴張南軒呂東萊又增陳大中珦為八先生福建政和縣有陳徴君祠祀陳朝老蔡季通嘗覩其遺像曰徴君骨相巖稜宜其不享富貴朱子應聲曰富貴不如名節香光州有司馬溫公祠二一在光州儒學內一在光山縣治西右宋王圻續通考遼聖宗統和十六年以耶律休格留守南京禦宋有功詔立祠于南京道宗清寧間以耶律赫嚕佐太祖創業有功詔立祠于上京又以子質調和太后定世宗之位免穆宗于難有誅賊之功詔上京立祠樹碑夀隆五年以舊臣姚景行忠賢詔為立祠金史章宗本紀明昌五年正月乙亥以頁嚕古新始製女直字詔加封贈依倉頡立廟盩厔例祠于上京納爾琿莊歲時致祭令其子孫拜奠本路官一人及本千户春秋二祭禮志明昌五年正月陳言者謂頁嚕古新二賢創置女直文字乞各封贈名爵建立祠廟令女直漢人諸生隨拜孔子之後拜之有司謂頁嚕難以致祭若金源郡貞獻王古新則既以配享太廟矣亦難特立廟也有旨令再議之禮官言前代無創制文字入孔子廟故事如于廟後或左右置祠令諸儒就拜亦無害也尚書省謂若如此恐不副國家厚功臣之意遂詔令依蒼頡立廟于盩厔例官為立廟于上京納爾琿莊委本路官一員與本千戶春秋致祭所用諸物從宜給之完顔匡等言我朝創業功臣禮宜配祀于是以秦王宗翰同子房配武成王而降管仲以下又躋楚王宗雄宗望宗弼等侍武成王坐韓信而下降立于廡又黜王猛慕容恪等二十餘人而贈金臣遼王賽音等其祭武成王宗翰子房各羊一豕一餘共用羊八無豕宣宗遷汴于會朝門內闕庭之右營廟如制春秋上戊之祭仍舊王圻續通考宣宗興定中完顔陳華善死節于鈞州圗們呼圗克瑪勒死節于臨洮皆立像祀之廟曰褒忠右遼金元史祭祀志凡忠臣義士在祀典者所在有司主之武成王立廟于樞密院公堂之西以孫武子張良管仲樂毅諸葛亮以下十人從祀每歲春秋仲月上戊以羊一豕一犧尊象尊籩豆爼爵樞密院遣官行三獻禮武宗本紀至大四年二月庚子立淮安忠武王巴延祠于杭州祭祀志功臣之祠惟故淮安忠武王立廟於杭春秋二仲月次戊祀以少牢用籩豆簠簋行酌獻禮若衛國文正公許衡廟在大名順德忠獻王哈喇哈遜廟在順德武昌者皆歲時致祭仁宗本紀皇慶元年三月乙丑命河南省建故丞相阿珠祠堂延祐三年夏四月壬午敕衛輝昌平守臣修殷比干唐狄仁傑祠歲時致祭王圻續通考仁宗時寇犯吉安廬陵人羅明逺恢復郡城而死立廟祀之福州總管張仲儀建錢聖妃廟錢氏捐十萬緍創木蘭坡以護田救民坡垂成而敗錢氏投水死故祀之元史英宗本紀至治二年三月己丑命有司建穆呼哩祠于東平仍樹碑五月戊戌封諸葛忠武侯為威烈忠武顯靈仁濟王泰定帝本紀泰定四年秋七月建橫渠書院于郿縣祀宋儒張載六年五月丙子置建議書院于昌平祀劉蕡致和元年夏四月甲寅改封唐柳州刺史柳宗元曰文惠昭靈公文宗本紀至順元年冬十月賜伯夷叔齊廟額曰聖清歲春秋祀以少牢順帝本紀至元六年七月詔封微子為仁靖公箕子為仁獻公比干加封為仁顯忠烈公至正十三年二月甲寅中書省臣言徐州民願建廟宇生祠右丞相托克托從之王圻續通考順帝時遊𢎞道為化州路通判海寇犯境戰死祀于文廟側萬方李鉉守延平與寇戰沒立廟台州總管達兼善與方國珍戰死立祠祀之賜額曰崇節連江巡檢劉濬為江西賊王善斫其手指及兩腕兩足罵賊愈厲遂斷其喉舌以死立祠福州歲時致祭漳州路達嚕噶齊德哷默色死節建祠祀之賜額曰表忠王巴延知福寧州為卲武賊王善所執挺頸受刃頸斷湧白液如乳暴尸數日色不變子相與婦潘氏及三女亦同死御史余闕以狀聞命本州立廟祀之賜額曰節孝廟江州總管李黼與徐夀輝力戰同姪秉昭皆死諡忠文立廟九江賜額崇烈十二年陳友定據閩逼閩人詹翰使從己翰固拒不從死之里人為立祠墓側陳祐守會稽有惠政遇盜而死父老請留葬不得乃立祠祀之右元明史禮志鄱陽湖忠臣祠祀丁普郎等三十五人南昌忠臣祠祀趙德勝等十四人太平忠臣廟祠花雲王鼎許瑗金華忠臣祠祀胡大海皆太祖自定其典太祖時應天祀陳喬楊邦乂姚興王鉷成都祀李氷文翁張詠均州祀黃霸密縣祀卓茂松江祀陸遜陸抗陸凱龍州祀李龍遷建寧祀謝夷甫彭澤祀狄仁傑九江祀李黼安慶祀余闕韓建之李宗可王圻續通考明太祖吳元年命建忠臣祠于鄱湖之康郎山上謂中書省曰崇德報功國之大典自古兵爭忠臣烈士以身殉國英風義烈雖死猶生豫與陳友諒戰于鄱陽湖將臣效忠死敵照然可數然有功不報何以慰死者之心而激生者之志哉爾中書其議行之中書省以死事之臣丁普郎張志雄韓成宋貴陳兆先余旭昌文貴王勝李信陳弼劉義徐公輔李志髙王咬住薑潤石明王德朱鼎王清常德勝王鳳顯丁宇王仁江澤王理陳沖裴軫王喜仙袁華史德勝常推德曹信逯德山鄭興羅世榮等三十五人列進遂封勳爵有差建祠設像歲時祭之春明夢餘録洪武初禮部奏請如前代故事立武學仍建武成王廟上曰立武學是建文武為二輕天下無全才矣三代以上文武兼備用無不宜如太公之鷹揚而授丹書仲山甫之賦政而式古訓召虎之經營而陳文德豈比于後世武學止講韜略不事經書専習干戈不聞爼豆拘拘于一藝偏長哉今建武學又立武成王廟是近世之陋規也太公宜從祀帝王廟其武成王廟罷之蕙田案自唐建武成王廟見譏儒者至于從祀諸將忽進忽退忽升忽降尤無義理數百年間實為非禮之祀明祖此詔探本窮源如豁雲霧處置盡善厥後文臣多講武略如于少保王文成等並著竒勳豈非有以風勵使然哉觀承案孔廟外另立武成王廟此最不學無識者之所為也自唐始建而宋元因之直至明祖而始罷之卓矣哉振興一代文明之治于是乎權輿矣明史禮志漢秣陵尉蔣忠烈公子文晉咸陽卞忠貞公壼宋濟陽曹武惠王彬南唐劉忠肅王仁瞻元衛國忠肅公福夀俱以四孟朔嵗除應天府官祭惟蔣廟又有四月二十六日之祭并功臣廟為十一後復增四關公廟洪武二十七年建於雞籠山之陽稱漢前將軍夀亭侯嘉靖十年訂其誤改稱漢前將軍漢壽亭侯以四孟嵗暮應天府官祭五月十三日南京太常寺官祭天妃永樂七年封為護國庇民妙靈昭應𢎞仁普濟天妃以正月十五日三月二十三日南京太常寺官祭太倉神廟以仲春秋望日南京戶部官祭司馬馬祖先牧神廟以春秋仲月中旬擇日南京太僕寺官祭皆用少牢太祖本紀洪武二年春正月乙巳立功臣廟於雞籠山禮志太祖既以功臣配享太廟又命别立廟於雞籠山論次功臣二十有一人死者塑像生者虛其位正殿中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英羊二豕二西序越國武莊公胡大海梁國公趙得勝巢國武壯公華髙虢國忠烈公俞通海江國襄烈公吳良安國忠烈公曹良臣黔國威毅公吳復燕山忠愍侯孫興祖東序郢國公馮國用西海武莊公耿再成濟國公丁德興蔡國忠毅公張德勝海國襄毅公吳禎蘄國武毅公康茂才東海郡公茆成羊二豕二兩廡各設牌一總書故指揮千百戶衛所鎮撫之靈羊十豕十以四孟嵗暮遣駙馬都尉祭初胡大海等殁命肖像于卞壼蔣子文之廟及功臣廟成移祀焉太祖本紀洪武八年春正月增祀雞籠山功臣廟一百八人王圻續通考洪武中余忠宣廟在安慶府忠節坊祀元右丞余闕余為元死節推官黃大倫以下三十三十皆從闕死咸附祀知府許瑗與行樞密院判王鼎共守太平寇至城陷瑗鼎被執罵賊而死踰月城復立祠祀之忠烈公祠在開州治東元郭嘉盡忠所事洪武初旌其忠烈立祠致祭許逺廟在海寧逺西五代梁初建後增祀唐中丞張巡宋併祀南霽雲雷萬春姚誾洪武初以海寧故鹽官乃逺所生因獨祀逺嶽武穆王廟在杭州嶽飛墓側靈衛廟在杭州宋建炎間金兵犯臨安錢塘今朱蹕暨二將金勝祝威率民兵力戰死之明史禮志永樂三年以中山王勳德第一又命正旦清明中元孟冬冬至遣太常寺官祭於大功坊之家廟牲用少牢明會典宋文丞相祠永樂六年建每歲春秋仲月用羊一豕一果品五帛一遣順天府尹行禮春明夢餘録宋丞相文信國祠在郡學西乃元之柴市公授命所永樂六年太常博士劉履節奉命正祀典謂天祥忠于宋室而燕京乃其死節之所請祠祀從之祠堂三楹前為門又前為大門祠之西為懷忠會館江右士大夫歲時集會于此以祭公者也趙弼作文文山傳云公既赴義其日大風揚沙天日盡晦咫尺不辨城門晝閉自此連日隂晦宫中皆秉燭而行羣臣入朝亦爇炬前導世祖問張真人而悔之贈公特進金紫光祿大夫太保中書平章政事廬陵郡公諡忠武命王積翁書神主灑掃柴市設壇以祀之丞相孛羅行初奠禮忽狂飇旋地而起吹沙滚石不能啓目俄捲其神主于雲霄空中隱隱雷鳴如怒之聲天色愈暗乃改前宋少保右丞相信國公天俄開霽春明夢餘録永樂中始載夀亭侯祠于祀典王圻續通考仁宗洪熙中建方氏祠在寧海縣祀方正學孝孺父子明史禮志宣宗時髙郵祀耿遇德英宗時豫章祀韋丹許遜無錫祀張巡王圻續通考英宗正統三年都督方政征麓川力戰死節諡忠毅立祠祀之李忠定祠在卲武府正統四年改建在府學東祀李綱景帝景泰中永豐縣知縣鄧顒死節配享于張叔夜祠祠在廣信府英宗天順間慶逺府同知葉禎父子同死事贈官祀之明史禮志憲宗時崖山祀張世傑陸秀夫王圻續通考憲宗成化五年建褒忠廟在漳州府城東祀元漳州路達嚕噶齊德哷默色死節于少保忠節祠在崇文門內東表背巷公故賜宅也祠三楹祀少保兵部尚書于謙塑公像危坐歲春秋遣太常寺官致祭春明夢餘録漢夀亭侯廟在宛平縣東成化十三年建俗呼白馬廟隋之舊基也五月十三日遣太常官致祭王圻續通考𢎞治二十三年從太常寺奏祭宋丞相文天祥遣順天府堂上官行禮二十六年建曾侍郎祠時巡按周盤奏曾銑謀國隕身立祠黃嚴直𨽻提學御史陳子員言郡邑學宫設有鄉賢名宦二祠要以風勵表功庶幾有髙山景行之思苐昔掌握于上之採訪今多有待于下之請乞原所由來則以近世政出多門事權不一提學官不得専主之故也夫提學官奉天璽書品藻才賢振揚風教一方文獻皆所提衡則名宦鄉賢之秩祀皆當屬之提學官别衙門不得越爼則職掌既専祀典益正有禆風化允行明史禮志孝宗時新會祀宋慈元楊后延平祀羅從彥李侗建寧祀劉子翬烏撤祀談淵廬陵祀文天祥婺源祀朱熹都昌祀陳澔饒州祀江萬里福州祀陳文龍興化祀陳瓚湖廣祀李芾廣西祀馬忱武宗時真定祀顔杲卿真卿韶州附祀張九齡子拯沂州祀諸葛亮蕭山祀遊酢羅從彥王圻續通考武宗正德中建忠節祠于杭州祀明按察使王良宋大學士徐應鑣霸州寇起指揮馬震力戰死建祠祀之瑞金縣令萬公率兵禦流賊陳亡建祠明會典榮國恭靖公姚廣孝祠舊配享于太廟嘉靖九年移祀大興隆寺後寺燬移崇國寺每嵗春秋致祭王圻續通考世宗嘉靖元年建楓山祠於蘭溪縣祀尚書章懋萬歷中賜名崇儒十四年建陽明先生祠在餘姚縣龍泉山祀新建伯王守仁建顯忠祠在奉化縣祀拾遺戴德彛死建文難文節祠在貴池縣祠宋通判趙昴發元兵攻城昴發與妻雍氏死節嘉靖初知府田賦以邑黃觀妻女同死忠立雙忠六烈祠褒忠廟在石埭縣祀宋制置使丁黼黼知成都與寇戰死旌忠祠在南昌府祀忠臣孫燧許逵以馬思聰黃宏周憲宋以枋配忠烈祠在餘姚縣祀禮書孫燧恭愍祠在臨海縣祀光祿卿陳選明會典凡靖難革除間被罪諸臣隆慶六年令各地方官查其生長鄉邑或特為建祠或即附本處名賢忠節祠歲時以禮致祭萬歷二年令各撫按釐正名宦鄉賢有不應入祀者即行革黜王圻續通考萬歷初建表忠祠在武昌府祀革除忠臣姚廖升樊士信周拱辰寧夏遊擊梁琦守備馬承先百户陳緒等死難建祀致祭宋儒周敦頥父輔成從祀啓聖祠孫明復祠在濟南府以石守道配享謝文節祠在九江府祀宋臣謝枋得薛文清祠在平陽府祀侍郎薛瑄魏了翁祠在蘇州府祀宋參知政事魏文靖公陳忠愍公祠在常州府尚書陳公治死節交趾詔建祠正學祠在金華府祀宋儒何基王柏元儒金履祥許謙四人褒忠祠在汀州府祀伍驥丁泉大節祠在南昌府祀靖難死事諸臣黃子澄練子寧胡閏王良周是修曾鳳韶鄒瑾王髙彭與明魏冕蔡運顔伯瑋及其子有為參政賀興隆與賊周文貴戰沒立祠祀之忠節廟在奉新縣祀副使周憲吳一貫兩廡祀舍人周幹及征華林陳亡烈士九忠祠在台州府祀建文死節方孝孺葉惠仲王叔英徐垕鄭華盧元質鄭恕盧迥及東湖樵夫旌忠廟在揚州府宋紹興中統制王方魏全與金人戰死立廟致祭包孝肅公祠在肇慶府祀宋郡守包丞相拯忠烈廟在溫州府祀宋教授劉士英曹端祠在澠池縣學明史禮志太祖時有明一代之臣抗美前史者或以功勳或以學行或以直節或以死事臚于志乘刻於碑板匪一而足通州祀常遇春山海關祀徐達蘇州祀夏原吉周忱淮安祀陳瑄海州衛祀衛青徐安生甘州祀毛忠榆林祀余子俊杭州祀于謙蕭山祀魏驥汀州祀王得仁廣州祀楊信民毛吉雲南祀沐英沐晟貴州祀顧成廬陵祀劉球李時勉廣信祀鄧顒寶慶祀賀興隆上杭祀伍驥丁泉慶逺祀葉禎雲南祀王禕吳雲青田祀劉基平陽祀薛瑄杭州祀鄒濟徐善述金華祀章懋皆衆著耳目炳然可考日知録明一統志永平府名宦有唐張仲素德宗時以列將事盧龍節度使張久伸擢平州刺史久伸即詔仲素代為節度使同平章事考之新舊唐書列傳則云張仲武為盧龍節度使破降回鶻又破奚北部及山奚威加北翟纍擢檢校司徒同中書門下平章事卒子直方多不法畏下變起奔京師軍中以張允伸總後務詔賜旌節在鎮二十三年比歲豐登邉鄙無虞張公素為節度使性暴厲眸子多白燕人號白眼相公為李茂勳所襲奔京師貶福州司户參軍按盧龍節度使前後三人皆張姓曰仲武曰允伸曰公素今乃合二名而曰仲素及詳其歷官即公素也又其逐簡會在懿宗咸通十三年距德宗時甚逺且又安取此篡奪暴戾之人而載之名宦乎今灤州乃祀之名宦祠吁其辱朝廷之典而貽千秋之笑也矣又考唐時别有一張仲素字繪之元和中為翰林學士有詩名舊唐書楊於陵傳所謂屯田員外郎張仲素白居易燕子樓詩序所謂司勳員外郎張仲素即其人也然非盧龍節度使肇慶府志宋王亘淳熙中為博羅令築隨龍蘇村二堤民賴其利後知南恩一統志誤作王旦今博羅名宦稱宋丞相文正公前博羅令而不知文正未嘗為此官淳熙又孝宗年號也蓋士不讀書而祀典之荒唐也久矣右明五禮通考卷一百二十三
