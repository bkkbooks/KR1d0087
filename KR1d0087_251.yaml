body:
  text: 五禮通考卷二百四十一刑部尚書秦蕙田撰軍禮九車戰蕙田案古者戰陣之事有車有徒而無騎葢井田行則車有所出溝洫修則騎不得用故車戰之利戰守兼資不貴馳突而務為其不可敗然於險阨之地則亦不用車而用人従所宜也井田溝洫廢騎兵起而車戰不可復矣至於齎器械載衣糧車亦有不可廢者古者有兵車有田車有乗車三者其制大約相同詳見考工記輪人輿人輈人諸職若車人所為大車羊車柏車則其式與今日之車相似非戰車也其用以戰亦有卒伍之法已詳見前軍制門今取其規製職掌并漢以下事論次以備考周禮考工記車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等注此所謂兵車也軫輿後横木崇高也八尺曰尋倍尋曰常殳長丈二戈殳㦸矛皆揷車輢輢車傍也鄭司農云迆讀為猗移従風之移謂著戈於車邪倚也酋發聲直謂矛殳疏有刃曰戈矛㦸無刃曰殳主擊戈矛㦸主刺王氏曰輪六尺有六寸軹崇三尺有三寸加軫與轐之七寸為四尺是軫去地四尺矣故曰車軫四尺謂之一等自軫而上其事之等皆以四尺為差戈柲六尺有六寸則以四尺崇于軫故謂之二等人長八尺則以四尺崇于戈故謂之三等殳長尋有四尺則以四尺崇于人故謂之四等車㦸常則以四尺崇于殳故謂之五等酋矛常有四尺則以四尺崇于㦸故謂之六等王氏應電曰五兵之用逺則弓矢射之近則矛者句之句之矣然後殳者擊之戈矛者刺之司馬法曰弓矢圍殳矛守戈㦸助凡用此者皆長以衞短短以救長今此戈殳矛㦸皆置之車傍不言弓矢則乗車之人佩之蔡氏徳晉曰車謂兵車軫輿四旁横木所謂軫方以象地也四尺謂去地四尺也柲柄也建建于車輢也迤邪倚也崇高也戈柄建于輿上本六尺六寸以其邪倚故止四尺高也人長八尺立于輿上是高于戈四尺八尺曰尋尋有四尺丈二尺也比于人又高四尺倍尋曰常丈六尺也又高殳四尺酋長貌矛鎗也常有四尺二丈也又高㦸四尺自軫至酋矛其崇總以四尺為差此謂前驅車所建不然此車之上不可以建葢凡察車之道欲其樸屬而㣲至不樸屬無以為完久也不㣲至無以為戚速也輪已崇則人不能登也輪已庳則於馬終古登阤也故兵車之輪六尺有六寸注樸屬猶附著堅固貌齊人有名疾為戚者春秋傳曰葢以操之為已蹙矣速疾也鄭司農云㣲至謂輪至地者少言其圎甚著地者㣲耳著地者㣲則易轉也已太也甚也崇高也齊人之言終古猶言常也阤阪也輪庳則難引疏此云造輪有善惡高下大小之宜王氏曰輪過六尺六寸為太高人斯病於難登不及六尺六寸為太卑焉斯病於難引其引之也常作登阪然陳氏禮書古者服牛乗馬引重致逺以利天下則車之作尚矣或曰黄帝作軒冕不可考也車之制象天以為葢象地以為輿象斗以為杠轂象二十八星以為葢弓象日月以為輪輻前載而後戸前軌而後軫旁輢而首以較下軸而銜以轐對人者謂之對車如舟者謂之軸揉而相迎者謂牙輈之曲中謂之前疾軛之上平謂之衡衡之材與輿之下木皆曰任以其力任於此也轂之端與輢之下木皆曰軹以其旁止於此也軫可以名輿可以名車達常可以名部輅前横木可以名輅此又因一材而通名之也其為車也有長轂者有短轂者有杼輪者有侔輪者有反揉者有仄揉者有兩輪者有四輪者有有輻者有無輻者有曲轅者有直轅者輦直轅有一轅者有兩轅者有直輿者有曲輿者鈞車曲輿有廣箱者有方箱者有重較者有單較者或駕以馬或駕以牛或輓以人或飾以物或飾以漆或樸以素要皆因宜以為之制稱事以為之文也然禮有屈伸名有抑揚故論其任重則雖庶人牛車亦與大夫同稱大車論其等威則雖諸侯之正路於王門曰偏駕而已蕙田案周有五路玉路金路象路革路木路王行五路有先後之儀孔安國曰大路玉綴路金先路象次路革木也葢王之行也乗玉路而先之以象路次之以革路木路而金路綴于玉路之後故云綴路也而周禮車僕掌戎路之萃戎路即革路也然則革路即戎車兵車之類矣又案以上兵車之制春官巾車革路龍勒絛纓五就以即戎注革路鞔之以革而漆之無他飾即戎謂兵事車僕掌戎路之萃廣車之萃闕車之萃革車之萃輕車之萃凡師共革車各以其萃注萃猶副也夏官戎僕掌馭戎車注戎車革路也師出王乗以自将掌王倅車之政正其服掌凡戎車之儀注倅副也服謂衆乗戎車者之衣服凡戎車衆之兵車也書序曰武王戎車三百兩王氏應電曰戎車之副謂之倅者若衆子之倅其嫡以備卒也有時而佐焉田車之副謂之佐者如衆臣之佐其君謂之卿佐也常以佐之為事道車之副謂之貳者如世子之貳其父謂之貳儲也有故乃攝而代之其義各有所主也掌凡戎車之儀戎以威為主甲胄有不可犯之色則戎車之儀可知矣馭夫掌馭貳車従車使車分公馬而駕治之注貳車象路之副従車戎路田路之副使車驅逆之車王氏應電曰自大馭以至田僕皆王五路之馭者也馭夫則馭貳車従車使車而已貳車五路之副貳也従車公卿大夫従王之車也使車聴王役使之車三者皆公車故分公馬而駕治之三等之車既衆故其員亦六十人蕙田案以上掌戎車之官孟子武王之伐殷也革車三百兩書序武王戎車三百兩詩大雅大明牧野洋洋檀車煌煌駟騵彭彭傳洋洋廣也煌煌明也駵馬白腹曰騵言上周下殷也則箋言其戰地寛廣明不用權詐也兵車鮮明馬又強暇且整疏煌煌言車之鮮故為明也小雅六月戎車既飭傳飭正也其等有五箋戎車革路之等也疏春官巾車掌王之五路革路以即戎故知戎車革路之等也車僕掌戎路之萃廣車之萃闕車之萃闕車之萃輕車之萃注云此五者皆兵車所謂五戎是其等五也吉甫所乗兵車亦革路在軍所乗與王同但不知備五戎與否鄭因事解之不必備五也元戎十乗以先啟行傳元大也夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也戎車既安如輕如軒箋戎車之安従後視之如輊従前視之如軒然後適調也朱子集傳輊車之覆而前也軒車之却而後也采芑方叔涖止其車三千師干之試方叔率止乗其四騏四騏翼翼路車有奭簟茀魚服鉤膺鞗革傳方叔卿士也受命為将干扞試用也奭赤貌鉤膺樊纓也之箋方叔臨視此戎車三千乗其士卒皆有佐師扞敵用爾率者率此戎車士卒而行也茀之言蔽也車之蔽飾象席文也魚服矢服也鞗革轡首垂也疏言鉤膺樊纓者以此言鉤是金路故引金路之事以説之在膺之飾惟有樊纓故云鉤膺樊也巾車注云鉤婁頷之鉤也金路無錫有鉤亦以金為之是鉤用金在頷之飾也彼注又曰樊讀如鞶帶之鞶謂今馬大帶纓今馬鞅金路其樊及纓以五采罽飾之而九成是帶鞅在膺故言膺以表之也巾車金路同姓以封今方叔所乗者或方叔為同姓也又下云方叔元老則方叔五官之長是上公也上公雖非同姓或亦得乗金路矣不乗革路者以革路臨戰所乗此時受命率車未至戰時故不言戎車也方叔涖止其車三千旂旐央央方叔率止約軝錯衡八鸞瑲瑲傳軝長轂之軝也朱而約之錯衡文衡也瑲瑲聲也箋交龍為旂龜蛇為旐此言衆軍将帥之車皆備車疏説文云軝長轂也則轂謂之軝考工記謂説兵車乘其轂長于田車是為長轂也言朱而約之以朱色纒束車轂以為飾輪人云容轂必直陳篆必正注云容者治轂為之形容也篆轂約也並以皮纒之而上加以朱漆也知約以朱者以上言鉤膺是陳金路之事也金路以金為飾轂色宜與金同且言路車有奭奭是赤貌故知約必用朱也知錯衡必為文衡者錯者雜也雜物在衡是有文飾其飾之物注無云焉不知何所用也戎車嘽嘽嘽嘽焞焞如霆如雷傳嘽嘽衆也焞焞盛也箋言戎車既衆盛其威又如雷霆秦風小戎小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂駕我騏馵傳小戎兵車也俴淺也收軫也五五束也楘歴錄也梁輈輈上句衡也一輈五束束有歴錄游環靷環也游在背上所以禦出也脅驅慎駕具所以止入也隂揜軌也靷所以引也鋈白金也續續靷也暢轂長轂也朱子集傳車前後兩端横木所以收斂所載故名收凡車之制廣皆六尺六寸其平地所載者為大車則軫深八尺兵車則軫深四尺四寸比之為淺故曰俴收也梁輈従前軫以前稍曲而上至衡則向下鉤之衡横于輈下而輈形穹隆上曲如屋之梁又以皮革五處束之其文章歴錄然也游環以皮為環當兩服馬之背上游移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出左傳曰如驂之有靳是也脅驅亦以皮為之前係于衡之兩端後係于軫之兩端當服馬脅之外以驅驂馬使不得内入也隂揜軌也軌在軾前而以板横側揜之以其陰映此軌故謂之隂也靷以皮二條前係驂馬之頸後係隂板之上也鋈續隂板之上有續靷之處消白金沃灌其環以為飾也葢車衡之長唯六尺六寸止容二服驂馬之頸不當衡故别為二靷以引車亦謂之靷左傳曰兩靷将絶是也文茵車中所坐虎皮褥也暢長也大車之轂一尺有半兵車之轂三尺三寸比大車為長故曰暢轂四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜傳軜驂内轡也飾箋鋈之觼以白金為也朱子集傳觼環之有舌者置觼于軾前以繫軸故謂之觼軜亦銷沃白金以為飾也王氏曰晉欒鍼曰吾有二位於戎路襄十四年左晉侯獻楚俘王賜以戎路之服僖二十八年左乾時之戰魯莊公喪戎路莊九年漢淮之軍楚鬭丹獲戎車桓公八年皆其君之所乗者也然周之鋒車曰元戎秦之兵車曰小戎周禮車僕自廣車而下皆戎車也特不謂之戎路爾車僕凡師革車會同亦如之戎僕掌馭戎車凡巡狩及兵車之會亦如之會同巡狩王雖不乗戎車猶共以従不失備也陳氏禮書乗車之禮君處左車右處右僕處中故造車者必慎於左考工記所謂終日馳騁左不揵是也乗車者不敢曠左戎右所謂會同充革車是也器物不敢指之於左月令所謂載耒耜于參保介之御間是也後世魏公子虚左以迎侯生秦皇虚左以近太后皆古之遺制耳此特乗車為然若兵車則馭者在左戎右在右将帥居中昔晉伐齊郤克将中軍解張御鄭丘緩為右郤克傷矢流血及屨鼔音未絶曰余病矣解張曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病夫郤克傷矢而未絶鼓音則将在鼔下矣解張傷手而血殷左輪則御在車左矣此将帥所乗也兵車左人持弓右人持矛中人御故書戒左不攻於左右不攻於右御非馬之正言左右而又言御則御在中可知也左傳稱秦師過周北門左右免胄而下言左右下則御在中不下可知也僖三十三年楚樂伯曰致師者左射以菆是左人持弓也宣十二年欒鍼為晉侯右曰寡君使鍼持矛焉成十六年衞太子為簡子禱曰蒯瞶不敢自佚備持矛焉是右人持矛也哀二年葢御無定位右有常處故将帥車則御在左士卒車則御居中右人之持矛雖将帥士卒之車不同而所居常在右所職常持矛也凡此皆三人乗車之法也太僕凡軍旅田役贊王鼔王之乗車有御與戎右又有太僕則四駟乗矣春秋之時侯叔夏御莊叔綿房甥為右富父終甥駟乗杜預云駟乗四人乗車蕙田案此論乗車左右之禮六韜武王問於太公曰以車與騎步所當㡬何公曰車者軍之羽翼也所以陷堅陣要強敵遮北走易戰之法一車當步卒八十人八十人當一車一車當六騎六騎當一車十乗敗千人百乗敗萬人此其大數也置車之吏數五車而一長十車而一吏五十車而一卒百乗而一将易戰之法五車為列前後相去四十步左右十步險戰之法車必循道十車為聚二十車為屯前後相去二十步左右六步隊間三十六步五車一長縦横相去一里各返故道選車士之法取年四十以下長七尺五寸已上走能逐馬及馳而乗之前後左右上下周旋能超乗旌旗力彀八石弩射前後皆便習者武車之士不可不厚也車戰之地凡車之死地有十其勝地有八往而無還者車之死地也越絶險阻乗敵逺行者車之竭地也前易後險者車之困地也陷之險阻而難出者車之絶地也圯下漸澤黒土黏埴者車之勞地也左險右易上陵抑阪者車之逆地也殷草横畝犯歴深澤者車之拂地也車少地易與步不敵者車之敗地也後有溝瀆左有新水右有險阪者車之壞地也日夜霖雨旬日不止道路漬陷前不能進後不能解者車之陷地也此十者車之死地也敵之前後行陣未定即陷之旌旂擾亂人馬數動即陷之士卒前後相顧前往而疑後恐而怯即陷之三軍卒驚皆薄而起即陷之戰于易地暮不能解即陷之逺行而暮舍三軍恐懼即陷之此八者車之勝地也陳氏禮書古者之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衞将卒有所芘兵械衣裘有所齎詩曰君子所依小人所腓則車之為利大昔周伐鄭為魚麗之陳先偏後伍伍承彌縫桓公五年邲之戰楚君之戎分為二廣廣有一卒卒偏之兩宣公十二年楚巫臣使於呉以兩之一卒適呉舍偏兩之一焉成公七年考之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預云十五乗為大偏九乗為小偏其尤大者又有二十五乗之偏則周魚麗之偏二十五乗之偏也楚二廣之偏十五乗之偏也巫臣所舍之偏九乗之偏也先偏後伍伍従其偏也卒偏之兩兩従其偏也先其車足以當敵後其人足以待變則古者車戰之法畧可知也或者謂晉人以什共車必克房琯以車戰取敗遂以為用車不若用人與騎之愈是不知晉人之克非什之利用什之幸也房琯之敗非車之不利用車之罪也古者教民以射御為藝君子以射御為能故孔子曰吾執射乎執御乎詩稱叔叚之多才則曰叔善射忌又良御忌古人相率以射御如此則登車而不能御參乗而不能射者鮮矣房琯之用車有是人乎不然巫臣教呉以乗車而能取勝於楚何也戎車之制不可以考姑倣小戎以見之章氏潢曰車戰之法每車用甲士三人步卒七十二人行則以車為衞居則以車為營一車之間又有倅車見周禮車僕春秋如韓原之戰輅秦伯将止之鞌之戰韓厥中御而従齊侯鄢陵之戰郤至遇楚子韓厥従鄭伯邲之戰楚子乗廣以逐趙旃用車以戰而使敵人得與吾元帥相接則是環衞之車不設也葢古者車戰之法前後整齊必有䕶衞前後行列元帥未易動搖也至春秋列國所云往往軍伍不整而元帥每以車逐利混然左右率無定法故敵人得以及之終春秋之世致敗者未有不由車戰之無法而輕動搖也惟繻葛之戰二拒用事若原繁高渠彌以中軍奉公未嘗輕動搖深得古法馬氏端臨曰兵雖凶器然古之以車戰其坐作進退整暇有法未嘗掩人之不備而以竒取勝也故韓厥遇齊侯則奉觴加璧郤至遇楚子則免胄趨風可以死則為于犫之請矢可以無死則為庾公之叩輪所謂殺人之中又有禋焉雖春秋伯國之君臣其志在於争城争地然於勍敵之人初不迫人於險固如此至後世捨車而用徒然彼長於徒我長於車今捨吾之長技而與之搏是以兵子敵也故必設覆以誘之未陳而薄之然後可以取勝而車戰之法廢矣顧氏炎武曰古制一車甲士三人步卒七十二人炊家子十人固守衣裝五人廏養五人樵汲五人見司馬法隨車而動如足之腓也傳曰腓辟也箋曰腓當作芘皆未是步乗相資短長相衞行止相扶此所以為節制之師也繻葛之戰鄭原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫卒不隨車遇闕即補斯已異矣古時營陳遇闕處仍以車補周禋車僕掌闕車之萃注闕車所用補闕之車也左傳宣公十二年楚子使潘黨率游闕四十乘注游車補闕者大鹵之師魏舒請毁車以為行五乗為三伍注乗車者車三人五乗十五人今改去車更以五人為伍分為三伍為五陳以相離兩於前伍於後専為右角參為左角偏為前拒専任步卒以取捷速然亦必山林險阻之地而後可用也步不當騎於是趙武靈王為變服騎射之令而後世因之所以取勝於敵者益輕益速而一敗塗地亦無以自保然後知車戰之謀逺矣終春秋二百四十二年車戰之時未有斬首至於累萬者車戰廢而首功興矣先王之用兵服之而已不期於多殺也殺人之中又有禮焉以此毒天下而民従之不亦宜乎蕙田案以上七條論車戰之道觀承案車戰自是古法然與井田相待而成井田既廢已無車賦又無溝洫以限戎馬之足而猶泥古之跡侈言魚麗此房琯陳濤斜之敗所以貽笑於唐也右車戰詩大雅皇矣以爾鈎援與爾臨衝以伐崇墉臨衝閑閑崇墉言言臨衝茀茀崇墉仡仡傳鈎鈎梯也臨臨車也衝衝車也閑閑動摇也茀茀強盛也者箋言言猶孽孽将壞貌同疏臨者在上臨下之名衝従旁衝突之稱二車不兵書有作臨車衝車之法墨子有備衝之篇知臨衝俱是車也箋以詩美文王以徳服崇若臨衝本所不用則不應言之今詩言衝則是用以攻城故知言言仡仡皆将壞之貌陳氏禮書詩曰臨衝閑閑毛氏曰臨車衝車也葢臨車高衝車大高則可以臨下大則可以突前故荀卿曰渠衝入穴而求利楊子曰衝不薺皆言衝車之大也衝或作䡴説文曰陷陣車孫武曰攻城之法修其櫓輼轒輼四輪車葢衝車之類也楚子使解揚登樓車以告宋人葢臨車之類右攻城之車春秋隠公九年左氏傳北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也注徒步兵也軼突也公子突曰使勇而無剛者嘗冦而速去之注嘗試也勇則能徃無剛則不恥退君為三覆以待之注覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞従之戎人之前遇覆者奔祝𣆀逐之衷戎師前後擊之盡殪戎師大奔宣公十二年左氏傳邲之戰欒武子曰楚君之戎分為二廣注君之親兵廣有一卒卒偏之兩注十五乗為一廣司馬法百人為卒二十五人為兩車十乗為大偏今廣十五乗亦用舊偏法復以二十五人為承副右廣初駕數及日中左則受之以至于昏内官序當其夜注内官近官序次也以待不虞不可謂無備楚子為乗廣三十乗分為左右右廣雞鳴而駕日中而説注説舍也左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右注楚王更迭載之故各有御右成公七年左氏傳晉申公巫臣使于呉以兩之一卒適呉舍偏兩之一焉注司馬法百人為卒二十五人為兩車九乗為小偏十五乗為大偏葢留九乗車及一兩二十五人令呉習之也與其射御教呉乗車教之戰陣教之叛楚寘其子狐庸焉使為行人於呉昭公元年左氏傳晉中行穆子敗無終及羣狄于太原注即大鹵也無終山戎崇卒也注崇聚也将戰魏舒曰彼徒我車所遇又阨注地險不便車以什共車必克注更增十人以當一車之用困諸阨又克注車每困於阨道今去車故為必克請皆卒注去車為步卒自我始乃毁車以為行注魏舒先自毁其屬車為步陣五乗為三伍注乗車者車三人五乗十五人今改去更車以五人為伍分為三伍荀呉之嬖人不肯即卒斬以徇注魏舒輒斬之荀呉不恨所以能立功為五陳以相離兩於前伍於後専為右角參為左角偏為前拒注皆臨時處置之名以誘之翟人笑之未陳而薄之大敗之注傳言荀呉能用善謀右春秋車戰漢書夏侯嬰傳破李由軍于雍丘以兵車趣攻戰疾破之従擊章邯軍東阿濮陽下以兵車趣攻戰疾破之又擊秦軍雒陽東以兵車趣攻戰疾破之灌嬰傳嬰以御史大夫将車騎别追項籍至東城破之衞青傳青以武剛車自環為營張晏曰兵車也而縦五千騎往當單于李廣傳陵與單于相值圍陵軍陵居兩山間以大車為營引士出營外為陳連戰士卒中矢傷三創者載輦兩創者将車一創者持兵戰馬氏端臨曰先儒因考西漢書此數條以為車戰之制漢尚用之然詳考其辭則是以車載糗粱器械立則環以為營耳所謂甲士三人左持弓右持矛中執綏之法已不復存矣文獻通考後漢光武造戰車可駕牛上作樓櫓置於塞上以拒敵靈帝時陽璇為零陵守制車數十乘以禦賊蕙田案以上漢晉馬隆擊鮮卑樹機能以衆數萬據險拒之隆以山陿隘乃作扁箱車地廣則為鹿角車營路狹則為木屋施於車上轉戰而前行千餘里殺傷甚衆遂平凉州劉裕伐南燕以車四千乗為左右翼方軌徐進與燕兵戰于臨朐敗之裕伐秦假道於魏魏遣軍徼之裕遣白直隊主丁旿帥仗士七百人車百乗渡北岸去水百餘步為却月陣兩端抱河車置七仗士事畢使豎一白旄魏人不解其意皆未動裕先命寧朔将軍朱超石戒嚴白旄既舉超石率二千人馳往赴之齎大弩百張一車益二十人設彭排於轅上魏人圍之超石以大鎚及矟千餘禦之魏師奔潰蕙田案以上晉魏太武真君四年北征柔然騎十萬車十五萬兩旌旗千里遂渡大漠柔然怖畏不敢復南向蕙田案以上北魏通鑑隋開皇二年遣諸将與突厥戰戎車步騎相參與鹿角為方陳蕙田案以上隋唐書裴行儉傳調露元年突厥阿史徳温傳反詔行儉為定襄道大總管統兵討之先時饋糧數為敵鈔軍餒死行儉乃詐為糧車三百乗伏壯士伍輩齎陌刀勁弩以羸兵挽進又伏精兵衝其後敵果掠車羸兵走險賊驅就水草解鞍牧馬方取糧車中而壯士突出伏兵至殺獲㡬盡自是糧車無敢近者房琯傳琯将兵復兩京至便橋陳濤斜琯效春秋時戰法以牛車二千乗馬步夾之既戰賊乗風譟牛悉股栗賊縦火焚之人畜大亂官軍死傷者四萬人馬燧傳燧為河東節度使為戰車冒以狻猊象列戰于後行以載兵止則為陣遇險則制衝冒以討田悦推火車焚其將楊朝光柵進擊大破之蕙田案以上唐李燾長編宋真宗咸平四年呉淑請復古車戰之法曰衞青李陵田豫馬隆皆以車而勝近符彦卿破敵陽城亦拒馬為行塞夫北敵所長者騎兵也苟非連車以制之則何以禦其奔突哉故用車戰為便其制取常用車接其衝軛駕以牛車上置鎗以刃外向列士卒於車外賊至射之乃出騎兵擊之此制敵要術也戰之用車一陣之鎧甲也故可以行止為營陣賊至則斂兵附以拒之賊退則乗勝出兵以擊之出則藉此為所居之地入則以此為所居之宅故人心有依不懼胡騎之陵突也景徳初契丹入寇大将李徳隆以澶淵不足守命士卒掘濠塹以大車數十乗重壘環之步騎處中戎馬數萬來攻其營禦之遁去仁宗至和二年韓琦言郭固就民車約古制為兵車臨陣禦敵緩急易集其車前鋭後方上置七槍為前後二拒此馬燧戰車行載兵甲止為營陣也又以民車之箱増為重箱高四尺四寸用革輓之呉起所謂革兵揜户輓輪籠轂是也臣以為可用於平川之地臨陣以折奔衝下營以為寨脚今令固自賫車式進呈試之以固為衞尉寺丞范仲淹上議攻云延安之西慶州之東有賊界百餘里侵入漢地唐馬燧造戰車行載甲兵止為營陣此路山陂大車難進當用小車二十兩銀絹錢二十萬賞有功将吏神宗時以北邊将入寇遣中貴人取兩河民車為備民大驚擾上問沈括曰卿知籍車之事乎括曰車戰之利見於歴世但古人所謂輕車者兵車也今之民車重大以牛挽之日不能行三十里少蒙雨雪跬步不進故俗謂之太平車恐兵間不可用耳上喜曰無人如此語朕遂罷籍車之令徽宗時涇原邢恕建兵車之議下令創造買牛以駕凡數千乗已而蔡碩又請河北置五十将兵器仍為兵車萬乗蔡京主其説行之姦吏旁緣即日散行郡縣掠民緡錢矣崇寧三年河北陜西都轉運司皆奏兵車用許彦圭所定式則車大而費財實多依往年二十将兵車式輕小易用復可省費詔卒用許彦圭式行下時熙河轉運副使李復先奏曰古者師行固嘗用車然井田法廢已久且今之用兵與古不同古者兵不妄加征戰有禮不為詭遇動皆有法又多在平原易野故車可以行而敵人不敢輕犯今之用兵盡在極邊下寨駐車各以保險為利車不能上又戰陣之交一進一退車不能及或為敵所襲逐車又不及收臣於戎馬間觀之屢矣乃至糧糗衣服器械有不能為用者而況於車乎臣聞此議出於許彦圭彦圭因姚麟上其説為身謀朝廷但以麟邊人熟邊事遂然之而不知彦圭輕妄麟立私恩以誤國計昔唐房琯用車戰大敗於陳濤斜當時在畿邑平地尚如此況今欲用於峻坂溝谷之間乎且戰車比常車濶六七寸運不合轍昨東來者牽挽不行致兵夫典賣衣物自賃牛具終日而進六七里率多逃亡戰車棄於道路未造則有配買物材顧差夫匠之擾既成又艱於運致然則其為諸路之患其費不知其㡬千萬矣彦圭苟望一官之進上欺朝廷下害百姓此而不誅何以懲後臣今乞便罷造已造者不復運來以寛民力其後彦圭卒得罪欽宗靖康末樞宻将官劉浩在河北募兵創造戰車其法有左右角前後拒各用卒二十五人每車計百人文獻通考高宗建炎初宗澤造戰車法運車者十有一執器械輔車者四十有四每車計五十五人李綱造戰車法兩竿雙輪上設皮籬以捍矢石下施鐵裙以衞人足旁施鐵索聮可為營四人推竿以運車一人登車以發矢二十人執軍器發車之兩旁每車用二十五人其法竟不及施葢自渡江後東南沮洳之區險隘之地不以車為主也紹興二年布衣王大智獻車式上命為樞宻計議官明年車成而不可用罷之上謂輔臣曰車制雖古然用各有宜況其物料多南方所無且古人用車亦或不利如驂絓而止之類葢用車戰陣間亦非利器也席益曰古人之戰彼此皆用車至於彼徒我車已有侵軼之慮而後人每以車敵騎其敗固宜房琯陳濤斜是也孝宗隆興初宰臣進呈陳敏軍中措置教習車陣陳康伯曰數年前陳敏增制造行下三衙相度有車様陣圖見在上曰車戰古法平原曠野可以備馳突爾亦卒不用寧宗開禧初中郎将厲冲方者為歴陽守嘗造戰車九牛弩未及用而罷去周虎繼之用其戰車敗敵于清水鎮蕙田案以上宋又案車戰行于秦漢之下往往利少而害多故唐宋兵志皆不載車制畧之也右漢至宋車戰舟師蕙田案周禮卒徒車馬皆出于井田丘甸無所謂舟師者春秋之季荆呉始大而地界澤國水戰乃興易曰地險山川丘陵也孟子曰固國不以山谿之險然則欲争川與谿之險者其必不能廢舟矣後世用之者尤多明堂月令曰舫人習水而世所傳六韜亦有水戰篇今輯為一卷附車戰後春秋襄公二十四年左氏傳夏楚子為舟師以伐呉注舟師水軍不為軍政注不設賞罰之差無功而還昭公十七年左氏傳呉伐楚陽匄為令尹戰于長岸大敗呉師獲其乗舟餘皇注舟師使隨人後至者守之環之及泉注環周也盈其隧炭陳以待命注隧出入道呉公子光請於衆曰喪先王之乗舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人注長髭鬛與呉人異形詐為楚人潛伏於舟側曰我呼餘皇則對師夜従之三呼皆迭對楚人殺之楚師亂呉人大敗之取餘皇以歸二十四年左氏傳楚子為舟師以畧呉疆沈尹戍曰此行也楚必亡邑不撫民而勞之呉不動而速之注速召也呉踵楚注躡楚踵跡而疆場無備邑能無亡乎越大夫胥犴勞王於豫章之汭注汭水曲越公子倉歸王乗舟注歸遺也倉及夀夢帥師従王注夀夢越大夫王及圉陽而還注圉陽楚地呉人踵楚而邊人不備遂滅巢及鍾離而還定公四年左氏傳蔡侯呉子唐侯伐楚舍舟于淮汭注呉乗舟従淮來過蔡而舍之自豫章與楚夾漢注豫章漢東江北地名左司馬戍謂子常曰子沿漢而與之上下注沿漢上下遮勿令渡我悉方城外以毁其舟注以方城外人毁呉所舍舟還塞大隧直轅冥阨注三者漢東之隘道子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常注黒武城大夫曰呉用木也我用革也注用重器不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁呉舟于淮塞城口而入注城口三隘道之總名是獨克呉也子必速戰不然不免乃濟漢而陳自小别至於大别注禹貢漢水至大别南入江然則二别在江夏界三戰子常知不可欲奔史皇曰安求其事難而逃之将何所入子必死之十一月庚午二師陳于柏舉闔廬之弟夫概王以其屬先擊子常之卒大敗之呉従楚師及清發半濟而擊之又敗之雍澨五戰及郢哀公九年左氏傳呉城邗溝通江淮注于邗江築城穿溝東北通射陽湖西北至宋口入淮通糧道蕙田案舟師之制不始于春秋竹書紀年帝相二十七年澆伐斟大戰于濰覆其舟滅之楚辭天問覆舟斟鄩何道取之正謂此也可見舟師之制不特餘皇之呼淮汭之舍始見于經傳矣但夏后時事荒逺無稽不若春秋有據耳右春秋舟師漢書武帝本紀元鼎五年夏四月南越王相吕嘉反遣伏波将軍路博徳出桂陽下湟水樓船将軍楊僕出豫章下湞水歸義越侯嚴為戈船將軍出零陵下離水甲為下瀨将軍下蒼梧皆将罪人江淮以南樓船十萬人越馳義侯遺别将巴蜀罪人發夜郎兵下牂牁江咸會番禺注張晏曰嚴故越人降為歸義侯越人于水中負人船又有蛟龍之害故置戈于船下因以為名也臣瓉曰伍子胥書有戈船以載干戈因謂之戈船也離水出零陵師古曰以樓船之例言之則非為載干戈也此葢船下安戈㦸以御蛟鼉水蟲之害張説近之服䖍曰甲故越人歸漢者也臣瓉曰瀨湍也呉越謂之瀨中國謂之磧伍子胥書有下瀨船應劭曰遺亦越人也如淳曰番禺音潘愚尉佗所都師古曰即今之廣州西南夷列傳始楚威王時使将軍莊蹻将兵循江上畧巴黔中以西以其衆王滇建元六年大行王恢擊東粤因兵威使番陽令唐蒙風曉南粤蒙迺上書說上曰南粤王黄屋左纛地萬餘里實一州今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮牂牁出不意此制粤一竒也乃拜䝉以郎中将将千人食重萬餘人従巴莋闗入兩粤傳元鼎五年南粤反餘善上書請以卒八千従樓船擊吕嘉等兵至揭陽以海風波為解不行持兩端隂使南粤及漢破番禺樓船将軍僕上書願請引兵擊東粤上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命明年秋餘善聞樓船請誅之漢兵留境且往迺遂發兵距漢道號将軍騶力等為吞漢将軍入白砂武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒将屯不敢擊郤就便處皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言上遣横海将軍韓説出句章浮海従東方往樓船将軍僕出武林中尉王温舒出梅領粤侯為戈船下瀨将軍出如邪白沙元封元年冬咸入東粤東粤發兵距嶮使狥北将軍守武林敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬狥北将軍為語兒侯自兵未往故粤衍侯呉陽前在漢漢使歸諭餘善不聴及横海軍至陽以其邑七百人反攻粤軍於漢陽及故粤建成侯敖與繇王居股謀俱殺餘善以其衆降横海軍封居股為東成侯萬户封敖為開陵侯封陽為卯石侯横海将軍説為按道侯横海校尉福為繚嫈侯及東粤将多軍漢兵至棄軍降封無錫侯故甌駱将左黄同斬西于王封為下鄜侯蕙田案武帝開昆明池以習水戰然樓船下瀨伏波横海諸軍皆用之于南粤東夷耳餘固無所用之後漢書岑彭傳建武九年公孫述遣其将田戎等據荆門虎牙横江水起浮橋開樓立攢柱以絶水道結營跨山以塞陸路距漢兵岑彭屯津鄉數攻田戎不克十一年帝遣呉漢率誅虜将軍劉隆等三将發荆州兵凡六萬餘人騎五千匹與彭㑹荆門彭裝戰船數十艘呉漢以諸郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣一書言状帝報彭曰大司馬習用步騎不曉水戰荆門之事一由征南公為重而已彭令軍中募攻浮橋偏将軍魯竒應募而前時東風狂急竒船逆流而上直衝浮橋而攢柱有反把鉤竒船不得去竒等乗勢殊死戰因飛炬焚之風怒火盛橋樓崩燒彭悉順風並進所向無前蜀兵大亂溺死者數千人文獻通考建安十三年曺操南擊劉表取荆州追劉備於當陽備遣諸葛亮求救於孫權操遺權書曰今治水軍八十萬衆方與将軍會獵於呉長史張昭曰将軍大勢可以拒操者長江也今操得荆州奄有其地劉表治水軍蒙衝鬬艦乃以千數操悉浮以沿江此為長江之險已與我共之矣不如迎之周瑜曰今北土未平而操舍鞍馬仗舟楫與呉越争衡又今盛寒馬無槀草驅中國士衆逺涉江湖之間不習水土必生疾病此數者用兵之患而操皆犯之瑜請得精兵數萬人保為将軍破之權従之遣兵三萬人令瑜拒操與操遇於赤壁時操軍已有疾疫初一交戰不利引次江北瑜部将黄葢曰今寇衆我寡難與持久操軍方進船艦首尾相接可燒而走也乃取蒙衝鬭艦十艘載燥荻枯柴灌油其中裹以帷幕上建旌旗豫備走舸繫于其尾先以書遺操詐云欲降時東南風急葢以十艦最著前中江舉帆餘船以次俱進操軍吏士皆出立營觀指言葢降去北軍二里餘同時發火火烈風猛船往如箭燒盡北船延及岸上營落頃之烟炎張天人馬燒溺死者甚衆瑜等率輕鋭繼其後靁鼔大震北軍大壞操引軍従華容道步走引軍北遁二十四年孫權使吕蒙襲闗羽於江陵蒙至潯陽盡伏其精兵􅑳中使白衣搖櫓作商賈人服晝夜兼行羽所置江邊屯候盡收縛之故羽不聞知至江陵羽将士遂以城降蕙田案以上漢晉武帝謀伐呉詔王濬修舟艦乃作大船連舫百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來又畫鷁首怪獸于船首以懼江神舟楫之盛自古未有時造船木柹蔽江而下呉建平太守吳彦取以白呉主曰晉必有攻呉之計宜增建平兵皓不従太康元年王濬伐呉攻丹陽克之呉人于江磧要害之處並以鐵鏁横截之又作鐵錐長丈餘暗置江中以逆距船濬乃作大筏數十方百餘步縛草為人被甲持仗令善水者以筏先行遇鐵錐輒著筏去又作大炬長十丈大數十圍灌以麻油在船前遇鎖然炬燒之須臾融液斷絶於是船無所礙順流徑造三山孫皓遣游擊将軍張象率舟師萬人禦濬象望旗而降濬兵甲滿江旌旗燭天呉人大懼安帝義熙六年盧循因劉裕北伐乗虛襲建康率衆數萬方艦而下裕引兵南還拒之出輕利鬬艦躬提幡鼔衆軍騰勇争先軍中多萬鈞神弩所至摧陷裕自中流蹙之因風水之勢賊艦悉泊西岸岸上軍先備火萬具悉焚之賊衆大敗太尉劉裕率師伐秦王鎮惡請率水軍自河入渭直至渭橋鎮惡所乗皆蒙衝小艦行船者悉在艦内泝渭而進艦外不見有行船人北土素無舟楫莫不驚異以為神蕙田案以上晉唐書李靖傳蕭銑據江陵靖陳圖銑十策詔拜靖行軍總管攝趙郡王孝恭行軍長史武徳四年八月大閲兵䕫州時秋潦濤瀨漲惡銑以靖未能下不設備諸将亦請江平乃進靖曰兵機事以速為神今士始集銑不及知若乘水傅壘是震霆不及塞耳倉卒召兵無以禦我此必禽也孝恭従之九月舟師叩夷陵銑将文士宏以卒數萬屯清江孝恭欲擊之靖曰不可士宏健将下皆勇士今新失荆門悉鋭拒我此救敗之師不可當宜駐南岸待其氣衰乃取之孝恭不聴留靖守屯自往戰大敗還賊委舟散掠靖視其亂縦兵擊破之取四百餘艘溺死者萬人即率輕兵五千為先鋒趨江陵薄城而營破其将楊君茂鄭文秀銑懼檄召江南軍不及明日降蕙田案新唐書兵志不載舟師事無可考又案以上唐文獻通考宋太祖乾徳初鑿大池于京城之南引蔡水以注之造樓船百艘選精兵號水虎犍習戰池中開寳六年詔以新池為講武池七年将有事于江南是嵗凡五臨幸觀習水戰九年四月幸金明池習水戰上御水心殿命従臣列坐以觀戰艦角勝鼓譟以進往來馳突為迴旋擊刺之狀顧謂侍臣曰兵棹之技南方之事也今已平定固不復用但時習之不忘武功耳訖真宗朝嵗習不輟高宗建炎元年右僕射李綱言當於沿河㳂淮㳂江帥府置水兵二軍要郡别置水兵一軍招集善波操舟便利之人擬立軍號曰凌波樓船軍従之四年夏四月兀术入冦自明州囘歸韓世忠先屯焦山以邀其歸路兀术遣人約日會戰世忠伏兵擊之俘獲甚衆及其舟千餘艘敵終不得濟復使致詞願還所掠益以名馬求假道世忠不従與相持于黄天蕩世忠以海艦進泊金山下将戰世忠預命工鍛鐵相連為長綆貫一大鉤以授士之驍捷者平旦敵以舟噪而前世忠分海舟為兩道出其背每縋綆則曳一舟而入敵竟不得濟乃求與世忠語世忠酬答如響時於所佩金鳯瓶傳酒縦飲示之兀术見世忠整暇色益沮乃求假道甚恭世忠曰是不難但迎還兩宫復舊疆土歸報明主足相全也兀术既為世忠所阨欲自建康謀北歸不得去或教以蘆場地鑿大渠二十餘里上接江口在世忠之上遂傍冶城西南隅鑿渠一夜渠成次早出舟世忠大驚金人悉趍建康世忠尾擊敗之兀术乃揭榜募人獻所以破海舟之策有教其於舟中載土以平版鋪之穴船板以櫂漿俟風息則出江有風則勿出海舟無風不可動也以火箭射其篛蓬則不攻自破矣一夜造火箭成是曰引舟出江其疾如飛天霽無風海舟皆不能動以火箭射海舟篛蓬世忠軍亂遂潰還鎮江紹興三十一年金亮渝盟入寇李寳以舟師禦之至東海縣時金兵已圍海州寳麾兵登岸敵驚出意外亟引去於是魏勝出城迎寳寳遣辯士四人招納降附時山東豪傑王世修輩皆各以義旗聚衆争應為援寳與子公佐引舟師至宻之膠西石臼島而敵舟已出海口泊唐島相距止一山候風即南不知王師之猝至也寳伺敵未覺遣其将曺洋黄端禱于石臼神祈風助順忽風自南來衆喜争奮引帆握刃俄頃過山薄敵鼓聲震蕩敵驚失措敵帆皆以錦纈為之彌亘數里忽為波濤捲聚一隅窘促搖兀無復行次寳命以火箭射之烟焰隨發延燒數百火不及者猶欲前拒寳命健士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脱甲而降者三千餘人獲首完顔鄭家奴等六人斬之又獲其統軍印與偽詔文書器甲糧斛以萬計寳欲乘勝以進而聞逆亮已濟淮遂旋師駐東海視緩急為援遣小舟奏捷既至上命降詔奨之除寳靖海節度沿海制置使十一年亮親統細軍駐和州欲由采石而渡朝廷詔王權赴行在以李顯忠代之命虞允文趣顯忠交權兵時顯忠未至權聴留水軍舟舩咸在允文督軍士決戰于是統制張振王琪等列江岸以待之而以海鰍船載精兵駐中流迎敵布陣甫畢亮以小紅旗麾舟絶江而來諸将盡伏山崦敵未之覺一見大驚欲退不可敵舟皆旋為之底極不平舟中之人皆不能施盡為官軍所殺明日允文又命戚新引舟師直楊林河口駐舟江心齊力射敵敵見舟無歸路於下流縦火自焚官軍亦於上流焚其舟凡百八十亮引去孝宗隆興元年九月詔諸州召募水手于手上刺某州水軍字以革冒代之弊四年樞宻院言潮州守臣傅自修欲於本軍禁軍闕額人數内撥三指揮二百人専防海道以諳識水勢人充蕙田案以上宋明史兵志舟之制江海各異太祖于新江口設船四百永樂初命福建都司造海船百三十七又命江楚兩浙及鎮江諸府衞造海風船成化初濟州衞楊渠獻槳舟圖皆江舟也海舟以舟山之烏槽為首福船耐風濤且禦火浙之十装標號軟風蒼山亦利追逐廣東船鐵栗木為之視福船尤巨而堅其利用者二可發佛郎機可擲火毬大福船亦然能容百人底尖上闊首昻尾高柁樓三重帆桅二傍䕶以板上設木女牆及礟牀中為四層最下實土石次寢息所次左右六門中置水櫃揚帆炊爨皆在是最上露臺穴梯而上傍設翼板可凴以戰矢石火發則皆俯發可順風行海蒼視福船差小開浪船能容三五十人頭鋭四槳一櫓其行如飛艟􅬋船視海蒼又小蒼山船首尾皆闊帆櫓並用櫓設船傍近後每傍五枝每枝五跳跳二人以板閘跳上露首于外其制上下三層下實土石上為戰塲中寢處其張帆下椗皆在上層戚繼光云倭舟甚小一入裏海大福海蒼不能入必用蒼船逐之衝敵便捷温人謂之蒼山鐵也沙鷹二船相須成用沙船可接戰然無翼蔽鷹船兩端鋭進退如飛傍釘大茆竹竹間窗可發鋭箭内舷外隠人以蕩槳先駕此入賊隊沙船隨進短兵接戰無不勝漁船至小每舟三人一執布帆一執槳一執鳥嘴銃可掩賊不備網梭船形如梭竹桅布帆容二三人可哨探蜈蚣船象形也能駕佛郎機銃底尖面闊兩傍楫數十行如飛兩頭船旋轉在柁因風四馳諸船無逾其速葢自嘉靖以來東南日備倭故海舟之制特詳顧炎武海師説海道用師古人葢屢行之矣呉徐承率舟師自海入齊此蘇州下海至山東之路越王句踐命范蠡舌庸率師沿海泝淮以絶呉路此浙東下海至淮上之路唐太宗遣強偉於劍南伐木造舟艦自巫峽抵江揚趨萊州此廣陵下海至山東之路漢武帝遣樓船将軍楊僕従齊浮渤海擊朝鮮魏明帝遣汝南太守田豫督青州諸軍自海道討公孫淵秦苻堅遣石越率騎一萬自東萊出右逕襲和龍唐太宗伐高麗命張亮率舟師自東萊渡海趨平壤薛萬徹率甲士三萬自東萊渡海入鴨綠水此山東下海至遼東之路漢武帝遣中大夫嚴助發會稽兵浮海救東甌横海将軍韓說自句章浮海擊東越此浙江下海至福建之路劉裕遣孫處沈田子自海道襲番禺此京口下海至廣東之路隋伐陳呉州刺史蕭瓛遣燕榮以舟師自東海至呉此又淮北下海而至蘇州也公孫度越海攻東萊諸縣侯希逸自平盧浮海據青州此又遼東下海而至山東也宋李寳自江隂率舟師敗金兵于膠西之石臼島此又江南下海而至山東也此皆古人海道用師之效蕙田案以上明右漢至明舟師五禮通考卷二百四十一
