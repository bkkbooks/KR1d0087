body:
  text: 五禮通考卷二百二十七刑部尚書秦蕙田撰賓禮八天子遣使諸侯國蕙田案周禮大行人有間問歸賑賀慶致禬之禮而皇華一詩有咨親咨禮咨事咨難之敎盖天子遣使諸侯非特以聯上下之交通和好之志凡以同好惡恤灾難生靈之休戚國家之利病風俗之美惡皆于是乎觀故徧存徧頫徧省在所必勤策命反命在所必慎今輯經傳天子遣使之事以著于篇周禮秋官大行人間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之烖注此四者王使臣于諸侯之禮也間間者間歲一問諸侯謂存省之屬諭諸侯之志者諭言語諭書名其類也交或往或來者也贊助也致禬凶禮之弔禮禬禮也補諸侯灾者若春秋澶淵之㑹謀歸宋財疏云交者欲見臣有祭祀之事亦得歸胙于王故玉藻云臣致膳于君有葷桃茢亦歸胙于王也易氏祓曰大宗伯以脤膰賀慶分同姓異姓而大行人則一槩以為諸侯者大宗伯言其定制此言其通制也大宗伯之言賓禮不過朝覲宗遇㑹同聘頫八者而已如禬禮則見于凶禮脤膰賀慶則見于嘉禮盖行人以親諸侯為主凡嘉禮凶禮皆親諸侯之意不必定以賓禮為拘也鄭氏鍔曰時聘殷頫間問歸脤固有一定之制賀慶致禬則以時舉無常期邱氏濬曰大行人所掌者朝覲宗遇㑹同六者諸侯致覲于王者也間問歸脤賀慶致禬四者天子致愛于諸侯者也諸侯以禮致其敬天子以仁致其愛尊卑之意通上下之誠達尚何猜疑間貳之為患哉先王之所以親諸侯也如此王之所以撫邦國諸侯者歲徧存三歲徧頫五歲徧省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聼聲音十有一歲達瑞節同度量成牢禮同數器修法則注撫猶安也存頫省者王使臣于諸侯之禮所謂間問也歳者巡守之明歳以為始也屬猶聚也自五歳之後遂間歳徧省也七歲省而召其象胥九歳省而召其瞽史皆聚于天子之宫敎習之也鄭司農云象胥譯官也元謂瞽樂師也史太史小史也書名書文字也古曰名聘禮曰百名以上至十一歲又徧省焉達同成修皆謂齎其法式行至則齊等之劉氏彝曰存者問其安否頫者視其治效省者察其風俗王氏昭禹曰頫又詳于存省又詳于頫蔡氏徳晉曰屬㑹集也象胥掌通言語瞽掌樂史掌書三官王朝列國皆有之屬象胥者謂使王朝象胥往至牧伯之國㑹集列國象胥諭以言語使彼此通曉協其辭命使體制合同也屬瞽史者謂使王朝瞽史往至牧伯之國㑹集列國瞽史諭書名以同其文聴音聲以同其律也度量數器合方氏所掌牢禮掌客所掌法八正則八則達同成修皆謂行人齎其法式以行至則齊等之也小行人使適四方協九儀賓客之禮注適之也協合也疏使適四方向諸侯之國則合九等之儀九儀則大行人九儀命者五爵者四是也云賓客之禮者賓據命者五客據爵者四此稱賓客之例非通稱也蕙田案使適四方王使小行人適四方也若國扎䘮則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令慶賀之若國有禍烖則令哀弔之凡此五物者治其事故注故書賻作傅稿為槀鄭司農云賻補之謂賻䘮家補助其不足也若今時一室二尸則官與之棺也槀當為稿謂犒師也元謂師役者國有兵冦以致匱病也使鄰國合㑹財貨以與之春秋定五年夏歸粟于蔡是也宗伯職曰以襘禮哀圍敗禍灾水火王氏昭禹曰所作謂之事所逢謂之故北䘮凶荒禍烖出于所逢者也師役福事或出于所作及其萬民之利害為一書其禮俗政事敎治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札䘮凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命於王以周知天下之故注慝惡也猶圖也惡疏此總陳小行人使適四方所採風俗善之事各各條錄别為一書以報上也葉氏時曰觀此而知小行人之奉命以往無非究心邦國之民事反命以告亦無非究心邦國之民事掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之徳意志慮使咸知王之好惡辟行之注節以為行信幣以見諸侯也咸皆也辟讀如辟忌之辟使皆知王之所好者而行之知王所惡者辟而不為使和諸侯之好達萬民之說注有欲相與修好者則為和合之說所喜也達者達之于王若其國君蔡氏徳晉曰凡上下之情不通易至睽孤梗逆而不相親掌交以王之徳意志慮為諸侯萬民道之令皆避王所忌行王所好則上之情得通于下矣又使王于諸侯所好必調和之萬民所說必通達之則下之情得通于上矣夏官匡人掌達法則匡邦國而觀其慝使無敢反側以聼王命注法則八法八則也邦國之官府都鄙亦用焉慝姦偽之惡也反側猶背違法度也書曰無反無側王道正直撢人掌誦王志道國之政事以巡天下之邦國而語之注道猶言也以王之志與政事諭說諸侯使不迷惑使萬民和說而正王面注靣猶鄉也使民之心曉而正鄉王萬疏以上二事鄉諸侯說之使諸侯化民而民正向於王髙氏愈曰匡人主察諸侯之惡撢人主宣天子之善察其惡而人畏威宣其善而人懐徳後世有宣慰使之名盖近此撢人之意春官大宗伯以弔禮哀禍烖注禍烖謂遭水火宋大水魯莊公使人弔焉曰天作淫雨害于粢盛如之何不弔廐焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道以禬禮哀圍敗注同盟者㑹合財貨以更其所䘮春秋襄三十年冬㑹于澶淵宋灾故是其類以恤禮哀冦亂注恤憂也鄰國相憂兵作于外為冦作于内為亂蕙田案弔禬恤之禮通于邦交而天子遣使侯國亦有之以脤膰之禮親兄弟之國注脤膰社稷宗廟之肉以賜同姓之國同福祿也兄弟有共先王者魯定公十四年天王使石尚來歸脤國疏脤是社稷之肉膰是宗廟之肉此文雖主兄弟之至于二王後及異姓有大功者得與兄弟之國同故僖九年夏王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙注胙膰肉周禮以脤膰之禮親兄弟之國不以賜異姓敬齊侯比之賓客又僖公二十四年宋成公如楚還入于鄭鄭伯將享之皇武子曰宋先代之後也於周為客天子有事膰焉有䘮拜焉是二王後及異姓有大功者亦得脤膰之賜是以大行人直言歸脤以交諸侯之福不辨同姓異姓是容有非兄弟之國亦得脤膰也以賀慶之禮親異姓之國注異姓王昏姻甥舅可疏謂諸侯之國有喜可賀慶之事王使大夫往以物賀慶之舉異姓包同姓也大行人云賀慶以贊諸侯之喜不别同姓異姓則兼同姓可知吳氏澄曰脤膰者特厚之禮故於同姓言之賀慶者普徧之禮故於異姓言之蕙田案脤膰賀慶二者天子所以親諸侯也大宗伯以弔禬恤屬凶禮脤膰賀慶屬嘉禮而大行人又以歸脤賀慶致禬與朝宗覲遇會同頫聘間問同列盖凶嘉二禮之通于賓禮者今俱附入天子遣使侯國條内以從其類云右總論天子遣使之事春官外史掌書外令注王令下畿外若以書使于四方則書其令注書王令以授使者黄氏曰以書使于四方之書猶令之制書勅書也右王命夏官司士作士適四方使為介注士使謂自以王命使也介大夫之介也春秋傳曰天王使石尚來歸脤蕙田案作士使為介謂上卿使則大夫為介大夫使則士為介皆司士選之虎賁氏適四方使則從士大夫疏天子有下聘諸侯法大行人所云歳徧問之等時則使虎賁從行也秋官行夫使則介之注使謂大小行人也故書曰夷使鄭司農云夷使使于四夷則行夫主為之介元謂夷發聲蕙田案使則介之謂行人為使則行夫為之介也右介地官掌節掌守邦節而辨其用以輔王命注邦節者珍圭牙璋穀圭琬圭琰圭也王有命則别其節之用以授使者輔王命者執以行為信凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之注使節使卿大夫聘于天子諸侯行道所執之信也土平地也山多虎平地多人澤多龍以金為節鑄象焉必自以其國所多者于以相别為信明也今漢有銅虎符杜子春云蕩當為帑謂以函器盛此節或曰英蕩畫函蕙田案使節天子遣使於諸侯使者所執之節也山國謂使於山國下倣此觀承案英蕩解未安蕩宜從竹大竹也見禹貢特出者為英盖以竹之最大者以函節適逺故曰輔姑存此說以備考凡通達于天下者必有節以傳輔之注必有節言逺行無有不得節而出者也輔之以傳者節為信耳傳說所齎撡及所適秋官小行人達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之注此謂邦國之節也達之者使之四方亦皆齎法式以齊等之也諸侯使臣行頫聘則以金節授之以為行道之信也虎人龍者自其國象也道路謂鄉遂大夫也都鄙者公之子弟及卿大夫之采地之吏也凡邦國之民逺出至于他邦他邦之民若來入由國門者門人為之節由關者關人為之節其以徵令及家徙鄉遂大夫及采地吏為之節皆使人執節將之以達之亦有期以反節管節如今之竹使符也其有商者通之以符節如門關門關者與市聯事節可同也亦所以異于畿内也凡節有天子法式存于國侯疏此經亦是適四方之事言達天下之六節者據諸國而言掌節所云據畿内也虎節人節龍節三者據諸侯使臣出聘所執旌節符節管節三者據在國所用蕙田案節有二有守節有行節守節慿以為重行節持以為信其用以為節者有四或以玉或以角或以金或以竹皆篆刻文字而中分之有故則相合以為驗者也先王制節以防奸偽凡守土之官奉使之臣貨賄之出入小民之往來皆執此以為信驗盖雖一物之微而馭天下之機要在是故特設掌節之官以專司其事漢有符節令主符節事凡遣使掌授節猶古制也後世印章即古人符節之遺制古人用之列國其事簡後世用之案牘其事繁盖亦從時之宜矣春官典瑞珍圭以徵守以䘏凶荒注珍圭王使之瑞節制大小當與琬琰相依王使人徵諸侯憂凶荒之國則授之執以注致王命焉如今時使者持節矣恤者闓府庫振救之凡瑞節歸又執以反命牙璋以起軍旅以治兵守注鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋發兵若令時以銅虎符發兵元謂牙璋亦王使之瑞節兵守用兵所守若齊人戍遂諸侯戍周榖圭以和難以聘女注榖圭亦王使之瑞節榖善也其飾若粟文然難仇讐和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王其聘女則以納徵焉琬圭以治徳以結好注琬圭亦王使之瑞節諸侯有徳王命賜之及諸侯使大夫來聘既而為壇㑹之使大夫執以命事焉大行人職曰時聘以結諸侯之好鄭司農云琬圭無鋒芒故治徳以結好琰圭以易行以除慝注琰圭亦王使之瑞節鄭司農云琰圭有鋒芒傷害征代誅討之象故以易行除慝易惡行令為善者以此圭責讓喻告之也元謂除慝亦于諸侯使大夫來頫既而使大夫執而命事于壇大行人職曰殷頫以除邦國之慝行疏治徳與易行據諸侯自有善惡行王使人就本國治易之吳氏澄曰交好本于執徳之不囘故治徳為大而結好次之邦慝生于率行之不謹故易行為大而除慝次之考工記玉人琬圭九寸而繅以象徳注琬猶圜也王使之瑞節也諸侯有徳王命賜之使者執琬圭以致命焉繅籍也彼疏典瑞云治徳據使者而言此言象徳據圭體而說不言有繅此言有繅亦是互見為義琰圭九寸判䂓以除慝以易行注凡圭琰上寸半琰半以上又半為瑑飾諸侯有為不義使者征之執以為瑞節也除慝誅惡逆也易行去煩苛榖圭七寸天子以聘女牙璋中璋七寸射二寸厚寸以起軍旅以治兵守注二璋皆有駔牙之節於琰側先言牙璋有文飾也疏典瑞無中璋者以其大小等故不見也軍多用牙璋軍少用中璋蕙田案典瑞之珍圭玉人無之玉人之中璋典瑞無之典瑞云榖圭以和難以聘女而玉人無和難之文或彼此互見或互有脫簡也右節信夏官校人凡國之使者共其幣馬注使者所用私覿右幣詩小雅皇皇者華序皇皇者華君遣使臣也送之以禮樂言逺而有光華也疏光顯其君常不辱命于彼曹氏粹中曰燕以遣之所謂禮也歌以樂之所謂樂也程子曰天子遣使四方以觀省風俗采察善惡訪問病苦宣道化於天下下國䝉被聲敎是以光華皇皇者華于彼原隰傳皇皇猶煌煌也髙平曰原下濕曰隰忠臣奉使能光君命無逺無近如華不以髙下易其色也箋無逺無近唯所之則然駪駪征夫每懐靡及傳駪駪衆多之貌箋征夫衆行夫也朱子集傳此遣使臣之詩也君之使臣固欲其宣上徳而達下情而臣之受命亦唯恐其無以副君之意也故先王之遣使臣也美其行道之勤而述其心之所懐曰彼煌煌者華則于彼原隰矣此駪駪然之征夫則其所懐思常若有所不及矣盖亦因以為戒然其辭之婉而不廹如此詩之忠厚亦可見矣我馬維駒六轡如濡箋如濡言鮮澤也載馳載驅周爰咨諏箋爰于也程子曰採察求訪使臣之職朱子集傳使臣自以每懐靡及故廣詢博訪以補其不及而盡其職也我馬維騏六轡如丝傳言調忍也載馳載驅周爰咨謀傳咨事之難易為謀我馬維駱六轡沃若載馳載驅周爰咨度傳咨禮義所宜為度我馬維駰六轡既均傳隂白襍毛曰駰均調也載馳載驅周爰咨詢朱子集傳案序以此詩為君遣使臣春秋内外傳皆云君敎使臣儀禮亦見鹿鳴疑亦本為遣使臣而作其後乃移以他用也然叔孫穆子所謂君敎使臣曰每懐靡及諏謀度詢必咨于周敢不拜敎可謂得詩之意矣四牡序四牡勞使臣之來也疏事畢來歸也有功而見知則說矣嚴氏粲曰人臣之事皆職分所當為不計其君之知不知也此特序詩者之辭以為使臣有馳驅之勞而其君能深體之其心之喜恱當如何非使臣必待見知而後說也四牡騑騑周道倭遲傳騑騑行不止之貌倭遲厯逺之意豈不懐歸王事靡盬我心傷悲傳盬不堅固也思歸者私恩也靡盬者公義也傷悲者情思也箋無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事朱子集傳此勞使臣之詩也夫君之使臣臣之事君禮也故為臣者奔走於王事特以盡其職分之所當為而已何敢自以為勞哉然君之心則不敢以是而安也故燕享之際叙其情以閔其勞言駕此四牡而出使於外其道路之囘逺如此當是時豈不思歸乎特以王事不可以不堅固不敢狥私以廢公是以内顧而傷悲也臣勞於事而不自言君探其情而代之言上下之間可謂各盡其道矣四牡騑騑嘽嘽駱馬傳嘽嘽喘息之貌馬勞則喘息白馬黒鬛曰駱豈不懐歸王事靡盬不遑啟處傳遑暇啟跪處居也臣受命舍幣于禰乃行翩翩者鵻載飛載下集於苞栩傳鵻夫不也王事靡盬不遑將父傳將養也范氏處義曰忠臣孝子之行役未嘗不念其親君之使臣豈待其勞苦而自傷哉亦憂其憂如已而已矣此聖人之所以感人心也翩翩者鵻載飛載止集于苞杞傳杞枸檵也王事靡盬不遑將母駕彼四駱載驟駸駸傳駸駸驟貌豈不懐歸是用作歌將母來諗傳諗念也箋諗告也朱子集傳以其不獲養父母之情而來告於君也非使人作是歌也設言其情以勞之耳右遣使勞使春秋隱公七年天王使凡伯來聘杜注凡伯周卿士凡國伯爵也何注書者喜之也古者諸侯有較徳殊風異行天子聘問之當北面稱臣受之於太廟所以尊王命歸美于先君不敢以已當之榖梁傳凡伯者何天子之大夫也九年春天王使南季來聘注南季天子大夫也南氏季字也榖梁傳南氏姓也季字也聘問也問諸侯非正也注周禮天子時聘以結諸侯之好殷頫以除邦國之慝間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之灾許慎曰禮臣病君親問之天子有下聘之義傳曰聘諸侯非正甯所未詳蕙田案榖梁問諸侯非正之說於禮無据范氏據周禮大行人及許慎五經異義以證其非可謂不易之論矣特以時聘殷頫為天子下聘于諸侯則非盖周官之間問即天子下聘之時對文則大曰聘小曰問散文言之則問即聘也時聘殷頫自是諸侯聘于天子不容混而一之也張氏洽曰隱公十年之間宰咺凡伯南季三至魯庭以魯為周公之胄而欲親之也公不明尊王之義以正其國于是諸侯相效而王靈竭臣子則象而簒弑萌矣此春秋詳書王使之意也桓公四年春天王使宰渠伯糾來聘杜注宰官渠氏伯糾名也左氏傳父在故名公羊傳宰渠伯糾者何天子之大夫也其稱宰渠伯糾何下大夫也李氏亷曰宰糾書名左氏直譏其攝父職以出聘已昧于仍叔子之文而杜注又以伯糾為名則伯乃字稱而非名也公榖皆以為下大夫係官氏名且字以宰為官氏渠為名糾為字而以伯為老稱則單伯祭伯亦老稱乎盖欲言微者而經稱伯欲言尊卿則連名故為是臆說耳是皆不知春秋責宰相之書法也五年天王使仍叔之子來聘杜注仍叔天子之大夫稱仍叔之子本於又字㓜弱之辭也左氏傳弱也公羊傳仍叔之子者何天子之大夫也其稱仍叔之子何譏何譏爾譏父老子代父從政也榖梁傳任叔之子者錄父以使子也故微其君臣而著其父子不正父在子代仕之詞也注君闇劣于上臣苟進于下故叅譏之八年天王使家父來聘杜注家父天子大夫家氏父字僖公三十年天王使宰周公來聘杜注周公天子三公兼冡宰也左氏傳王使周公閲來聘享有昌歜白黒形塩注昌歜昌蒲葅白熬稻黒熬黍形塩塩形象虎辭曰國君文足昭也武可畏也則有備物之享以象其徳薦五味羞嘉榖塩虎形注嘉榖熬稻黍也以象其文也塩虎形以象武也以獻其功吾何以堪之宣公十年秋天王使王季子來聘杜注王季子者公羊以為天王之母弟然則字季子天子大夫稱字左氏傳秋劉康公來報聘注報孟獻子之聘即王季子也其後食采于劉公羊傳王季子者何天子之大夫也其稱王季子何貴也其貴者何母弟也榖梁傳其曰王季王子也其曰子尊之也聘問也胡氏安國曰公羊曰王季于者王之母弟也王有時聘以結諸侯之好禮也宣公享國至是十年不朝于周而比年朝齊不奔王䘮而奔齊侯䘮不遣貴卿㑹匡王葬而使歸父會齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不振矣自是王聘春秋亦不書矣右周聘魯春秋莊公元年王使榮叔來錫桓公命杜注榮叔周大夫榮氏叔字錫賜也追命桓公褒稱其徳若昭七年王追命衛襄之比公羊傳錫者何賜也命者何加我服也其言桓公何追命也榖梁傳禮有受命無來錫命錫命非正也生服之死行之禮也生不服死追錫之不正甚矣張氏洽曰莊公主王姬之昏故親魯而寵嘉其父遣使賜之策命李氏廉曰錫命有命辭有命物又或止有命辭而無命物有命辭有命物者如後世以璽書褒賞功臣增秩賜金是也止有命辭者如後世賜手詔褒美是也趙氏汸曰禮諸侯嗣位䘮畢以士服朝天子天子賜之黻冕圭璧謂之受命周官王命諸侯則大宗伯儐是也末世諸侯䘮畢不朝有請命者而後有來錫命有生不請命者而後有追錫之命文公元年天王使毛伯來錫公命杜注毛國伯爵諸侯為王卿士者諸侯即位天子賜以命圭合瑞為信僖十一年王賜晉侯命亦其比也榖梁傳禮有受命無來錫命錫命非正也胡氏安國曰諸侯終䘮入見則有錫歲時來朝則有錫能敵王所愾則有錫黼冕圭璧因其終䘮入見而錫之者也禮所謂䘮畢以士服見天子已見賜之黼冕圭璧然後歸是已車馬衮黼因其歲朝而錫之者也詩所謂君子來朝何錫予之雖無予之路車乘馬又何予之元衮及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賓中心貺之鐘鼓既設一朝享之是已今文公繼世䘮制未畢非初見繼朝而獻功也何為來錫命乎故榖梁子曰來錫命非正也成公八年秋七月天子使召伯來賜公命杜注諸侯即位天子賜以命圭與之合瑞八年乃來緩也天子天王王者之通稱榖梁傳禮有受命無來錫命錫命非正也曰天子何也曰見一稱也劉氏敞曰錫命者爵也有加而賜所謂賜命也故王者制三公一命卷若有加則賜也不過九命次國之君不過七命小國五命故賜者謂有加也以義觀之錫命者其世世相襲衮不廢矣賜命者服過其爵所以章有徳也成公未有大功明徳而服過其爵譏僭賞也襄公十有六年左氏傳王使劉定公賜齊侯命曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是賴今余命女環注環齊靈公名兹率舅氏之典纂乃祖考無忝乃舅敬之哉無廢朕命昭公七年左氏傳王使成簡公如衛弔注簡公王卿士也且追命襄公曰叔父陟恪在我先王之左右以佐事上帝注陟登也恪敬也帝天也叔父謂襄公命如今之哀䇿余敢忘髙圉亞圉注二圉周之先也為殷諸侯亦受殷王追命者國語周語襄王使召公過及内史過賜晉惠公命右周錫命春秋僖公九年左氏傳王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙注胙祭肉尊之比二王後二十四年左氏傳宋先代之後也於周為客天子有事膰焉注有事祭宗廟也膰祭肉尊之故賜以祭胙定公十四年天王使石尚來歸脤杜注石尚天子之士石氏尚名脤祭社之肉盛以脤器以賜同姓諸侯親兄弟之國與之共福公羊傳石尚者天子之士也脤者何爼寔也腥曰脤熟曰燔注禮諸侯朝天子助祭于宗廟然後受爼寔時魯不助祭而歸之故書以譏之榖梁傳脤者何也爼寔也祭肉也生曰脤熟曰膰其辭石尚士也何以知其士也天子之大夫不名石尚欲書春秋諫曰乆矣周之不行禮於魯也諸行脤貴復正也李氏亷曰案周禮行人歸脤以交諸侯之福謝氏曰王受神福賴諸侯所致則神福王宜與諸侯共之故天子分爼寔不曰賜而謂之歸右周歸脤春秋僖公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮杜注王人與諸侯盟不譏者王室有難故洮曹地公羊傳王人者何㣲者也曷為序乎諸侯之上先王命也榖梁傳王人之先諸侯何也貴王命也朝服雖敝必加於上弁冕雖舊必加于首周室雖衰必先諸侯兵車之會也九年公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘杜注周公宰孔也宰官周采地天子三公不字宋子襄公也傳例曰在䘮公侯曰子陳留外黄縣東有蔡丘二十九年夏六月㑹王人晉人宋公齊人陳人蔡人秦人盟于翟泉杜注翟泉今洛陽城内大倉西南池水也魯侯諱盟天子大夫諸侯大夫又違禮盟公侯王子虎違禮下盟故不言公㑹又皆稱人右周㑹盟春秋隱公元年秋七月天王使宰咺來歸惠公仲子之賵杜注宰官咺名也仲子者桓公之母婦人無謚故以字配姓來者自外之文歸者不及之辭左氏傳緩且子氏未薨故名注惠公葬在春秋前故曰緩也于氏仲子也薨在二年賵助䘮之物天子七月而𦵏同軌畢至注言同軌以别四夷之國諸侯五月同盟至注同在方岳之盟大夫三月同位至注古者行役不踰時士踰月外姻至注踰月度月也姻猶親也此言赴弔各以逺近為差因為葬節贈死不及尸注尸未𦵏之通稱弔生不及哀注諸侯以上既葬則縗麻除無哭位諒闇終䘮豫凶事非禮也注仲子在而來贈故曰豫凶事公羊傳宰者何官也咺者何名也曷為以官氏宰氏也賵者何䘮事有賵賵者盖以馬以乗馬束帛車馬曰賵貨財曰賻衣被曰禭文公元年天王使叔服來㑹葬杜注叔氏服字諸侯䘮天子使大夫會葬禮也公羊傳其言來會葬何㑹葬禮也榖梁傳葬曰㑹其志重天子之禮也五年春王正月王使榮叔歸含且賵杜注珠玉曰含含口寔車馬曰賵左氏傳禮也公羊傳含者何口實也其言歸含且賵何兼之兼之非禮也榖梁傳含一事也賵一事也兼歸之非正也其曰且志兼也其不言來不周事之用也賵以早注乘馬曰賵乗馬所以助葬成風未葬故書早而含以晚注已殯故言晚三月王使召伯來㑹葬杜注召伯天子之卿也召采地伯爵也來不及葬不譏者不失五月之内昭公七年左氏傳衛襄公卒衛齊惡告䘮于周王使成簡公如衛弔右周賵葬春秋隱公三年秋武氏子來求賻杜注武氏子大夫之嗣也平王䘮在殯新王未得行其爵命聼于冢宰故傳曰王未葬釋其所以稱父族又不稱使也魯不共奉王䘮致令有求經直文以示不敬故傳不復具釋也左氏傳王未葬也公羊傳武氏子者何天子之大夫也其稱武氏子何譏何譏爾父卒子未命也何以不書使當䘮未君也䘮事無求求賻非禮也桓公十有五年春二月天王使家父來求車左氏傳非禮也諸侯不貢車服注車服上之所以賜下天子不私求財注諸侯有常職者公羊傳何以書譏何譏爾王者無求求車非禮也榖梁傳古者諸侯時獻于天子以其國之所有故有辭讓而無徴求求車非禮也求金甚矣文公元年春毛伯來求金杜注求金以共𦵏事雖踰年而未𦵏故不稱王使左氏傳非禮也不書王命未葬也右周使求國語周語定王六年使單襄公聘于宋遂假道于陳以聘于楚火朝覿矣道茀不可行也注單襄公王卿士單朝也聘問也問者王之所以撫萬國存省之假道自宋適楚經陳也是時天子微弱故以諸侯相聘之禮假道也聘禮若過國至於境使次介假道束帛將命於廟候不在疆注候候人也掌送迎賓客者疆境也司空不視塗注司空卿官掌道路也澤不陂川不梁野有庾積場功未畢道無列樹墾田若蓻膳宰不致餼注膳宰膳夫也掌賓客之牢禮生曰餼司里不授館注司里里宰也掌授客館國無寄寓注寓亦寄也無寄寓者不為廬舎可以寄羇旅之客縣無施舎注四甸為縣縣方六十里施舎者所以施舍賓客負任之處民將築臺于夏氏及陳陳靈公與孔寜儀行父南冠以如夏氏留賓弗見注賓單襄公也單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而艸木節解駟見而隕霜火見而清風戒寒故先王之敎曰雨畢而除道水涸而成梁艸木節解而備藏隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁其時儆曰收而場功偫而畚挶營室之中土功其始火之初見期於司里此先王之所以不用財賄而廣施徳於天下者也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之敎也周制有之曰列樹以表道立鄙食以守路國有郊牧疆有寓望藪有圃草囿有林池所以禦灾也其餘無非榖土民無縣耜野無奥草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草間功成而不收民罷於逸樂是棄先王之法制者也周之秩官有之曰敵國賓至關尹以告行理以節逆之候人為𨗳卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司冦詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致饔廪人獻餼司馬陳芻工人展車百官官以物至賓入如歸是故小大莫不懐愛其貴國之賓至則以班加一等益䖍至於王使則皆官正莅事注正長也莅臨也上卿監之注監視也若王巡守則君親監之今雖朝也不才有分族於周承王命以為過賓於陳而司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰淫故凡我造國無從非彛無即慆淫各守爾典以承天休今陳侯不念允續之常棄其伉儷妃嬪而帥其卿佐以淫於夏氏不亦瀆姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彝乎是又犯先王之令也昔先王之敎茂帥其徳也猶恐隕越若廢其敎而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能乆乎八年陳侯殺於夏氏九年楚子入陳右過國遣使詣蕃附蕙田案經傳所言遣使之事皆天子於服内諸侯之禮九州之外未嘗通使秦漢以來封建廢而諸侯之禮闕邉事開而蕃國之禮興輯遣使詣蕃篇附焉漢書兩粤傳髙帝十一年遣陸賈立尉佗為南粤王與剖符通使使和輯百粤毋為南邉害陸賈傳賈至尉佗魋結箕踞見賈賈因說佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣於是佗乃蹶然起坐謝賈曰居蠻夷中乆殊失禮義留與飲數月文帝元年詔丞相舉可使粤者平言陸賈先帝時使粤上召賈為太中大夫謁者一人為副使賜佗書陸賈至南粤王恐乃頓首謝願奉明詔長為藩臣奉貢職後漢書南匈奴傳建武二十六年遣中郎將段郴副校尉王郁使南單于立其庭去五原西部塞八十里單于乃延迎使者使者曰單于當伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也三十一年單于薨中郎將段郴將兵赴吊祭以酒米分兵衛䕶之弟左賢王莫立帝遣使者齎璽書鎮慰拜授璽綬遺冠幘絳單衣三襲童子佩刀緄帶各一又賜繒綵四千匹令賞賜諸王骨都侯已下其後單于薨吊祭慰賜以此為常右兩漢遣使詣蕃唐開元禮皇帝遣使詣蕃宣勞前一日執事者設使者次於大門外道東南向其日使者至執事者引就次使者以下俱公服蕃主朝堂立於東階東南西面使者出次執事者引使者立於大門外之西東面使副立於使者西持節者立於使者之北少退令史二人對舉詔書案立於使副西南俱東向執事者引蕃主迎使者于門外之南北面再拜使者不答拜執事者引使者入持節者前𨗳持案者次之入門而左使者詣階間南面立持節者立於使者東少南西面