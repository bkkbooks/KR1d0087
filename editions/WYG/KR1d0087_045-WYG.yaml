body:
  text: 五禮通考卷三十五刑部尚書秦蕙田撰吉禮三十五星辰蕙田案祭法云王宫祭日夜明祭月幽宗祭星此日月與星辰異壇矣春朝朝日秋莫夕月此日月之正祭其星辰正祭不見於經而祭之之秩與日月相等故宗伯實柴典瑞圭璧月令祈年左𫝊禜祭皆以日月星辰連言至大宗伯以槱燎杞司中司命風師雨師天府祭天之司民司禄説者以為六者皆星若果皆星則何不統之實柴内而别以槱燎祀之以為非星則風師雨師非星可也司中司命司民司禄何得謂之非星以理揆之實柴槱燎乃祀之秩實柴所祀五緯十二辰二十八宿其餘衆星不與其衆星之中職有所司有功烈於民者乃列名祀之秩尊故燔柴實牲秩卑故槱燎不實牲此周禮所以别言之也其獻民數祭司民獻穀數祭司禄校人祭馬祖諸侯祭分野乃係専祭不在星辰壇至靈星所以祈農禮經不見僅見周頌絲衣詩序漢時頗崇祀亦係専祭與實柴槱燎之文無涉今以類相依以星辰門統之若後世所祀九宫太乙太歲等亦星辰之餘并附見焉禮記祭法幽宗祭星也注宗當為禜字之誤也幽禜亦謂星壇也星以昏始見禜之言營也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之疏幽宗祭星壇名也幽闇也宗廟為禜禜壇域也葢星至夜而始出故謂之幽也為營域而祭之故謂之幽禜也方氏慤曰幽言其隠而小揚雄曰視日月而知衆星之蔑故祭星之所謂之幽宗焉幽雩皆謂之宗宗尊也祭祀無所不用其尊詩曰靡神不宗無所不用其尊之謂也泰壇泰折不謂之宗者天地之大不嫌於不尊也蕙田案鄭氏改宗為禜似屬無據方氏訓如字自可通但鄭以禜為營䟽謂為營域而祭之方氏謂祭星之所謂之幽宗義固相同也然不言營域在何方何所今案祭祀之地見於經而有據者祀天於南郊祭地於北郊兆五帝於四郊朝日於壇在東門之外夕月於坎應在西門之外而祭寒暑先儒謂相近於日月之坎壇祭四方又有四坎壇雩宗則諸神自郊徂宫亦各有常祭之處唯祭時之泰昭祭星之幽宗則未甞别見今案此節所祭皆承上燔柴泰壇瘞埋泰折而言意者昭為陽明之意幽為陰闇之意豈四時乃天地之氣四方皆有之或在四郊壇兆之南南為離明相見之地故曰昭星乃天象隨月而見於夜或在西郊月坎之北坎為隠伏故曰幽與言泰言宗皆尊之之意註疏及方氏説義似未足今姑繹其字義而略為之説以俟考周禮春官大宗伯以實柴祀星辰注實柴實牛柴上也星謂五緯辰謂日月所㑹十二次西疏云星謂五緯者五緯即五星東方歲星南方熒惑方太白北方辰星中央鎮星言緯者二十八宿隨天左轉為經五星右旋為緯案元命包云文王之時五星以聚房也星備云五星初起牽牛此云星明是五緯又案星備云歲星一日行十二分度之一十二歲而周天熒惑日行三十三分度之一三十三歲而周天鎮星日行二十八分度之一二十八歲而周天太白日行八分度之一八歲而周天辰星日行一度一歲而周天是五緯所行度數之事且諸文皆星辰合解之故尚書堯典云歴象日月星辰洪範五紀亦云星辰鄭皆星辰合釋者餘文于義不得分為二故合釋此文上下不見祭五星之文故分星為五緯與辰别解若然辰雖據日月㑹時而言辰即二十八星也案昭七年左傳晉侯問伯瑕曰何謂六物對曰歲時日月星辰是也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是為辰故以配日是其事但二十八星面有七不當日月之㑹直謂之星若日月所㑹則謂之宿謂之辰謂之次亦謂之房故尚書𦙍征云辰弗集于房孔注云房日月所會是也蕙田案星兼經星緯星而言辰天之無星處皆是是以日月所㑹大略分之則為十二次耳非即指二十八宿也北辰辰之最尊者並無星象亦不在二十八宿之内是其徵矣注専以五緯釋星䟽即以二十八宿為辰皆非典瑞圭璧以祀星辰疏星辰所祭謂小宗伯四類亦如之注云禮風師雨師于郊之屬考工記玉人之事圭璧五寸以祀星辰春官大司樂乃奏黄鍾歌大吕舞雲門以祀天神注天神謂五帝日月星辰凡以神仕者掌三辰之灋以猶鬼神示之居辨其名物注猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神地祗人鬼之坐者謂布祭衆寡與其居句方疏神有衆寡多少或居為之或句曲為之也薛氏季宣曰日月星辰謂之三辰日陽也月隂也星辰亦有隂陽焉隂陽之氣有消息盈虚之理而三辰之法未甞不由之三辰之數有升降出入往來之變而鬼神示之居未甞不從之推陰陽而考三辰觀三辰以居鬼神祗非知幽明之故者不能也以冬日至致天神人鬼注天人陽也陽氣升而祭鬼神葢用祭天之明日疏大司樂冬日至于地上之圜丘奏之若樂六變天神皆降但其時天之神皆降仍于祭天之明日更祭此等小神祗故于此别之也當冬至之日正祭天神事繁不可兼祭此等雖無正文鄭以意解之故云葢用祭天之明日也肆師立次祀用牲幣立小祀用牲注鄭司農曰次祀日月星辰小祀司命以下禮記月令孟冬之月天子乃祈來年於天宗注謂祭日月星辰也春秋昭元年左氏傳日月星辰之神則雪霜風雨之不時於是乎禜之注禜祭為營攅用幣以祈福祥星辰之神若實沈者疏云星辰之神若實沈者言此禜祭祭其先世主星辰者之神矣非獨祭此星辰之神也爾雅釋天祭星曰布疏李巡曰祭星者以祭布露也故曰布孫炎曰既祭布散于地似星布列也蕙田案祭法一條見祭星辰之處大宗伯典瑞考工記大司樂四條見祭星辰之儀凡以神仕一條見祭星辰之時月令左傳二條見因事祭星辰爾雅一條總言祭星辰之名若其正祭則於經無見也故合為一類而以祭星辰統之右統祭星辰周禮春官大宗伯以槱燎祀司中司命注槱積也詩曰芃芃棫樸薪之槱之積柴實牲體焉燔燎而升烟所以報陽也鄭司農云司中三能三階也司命文昌宫星𤣥謂司中司命文昌第五第四星或曰中能上能也三疏先鄭云司中三能三階也者案武陵太守星𫝊云台一名天柱上台司命為太尉中台司中為司徒下台司禄為司空云司命文昌宫星者亦據星𫝊云文昌宫第四曰司命第五曰司中二文俱有司中司命故兩載之云云司中司命文昌第五第四星者此破先鄭也何則先鄭以為司中是三台司命是文昌星今案三台與文昌皆有司中司命何得分之故後鄭云文昌第五第四星必先言第五後言第四者案文昌第四云司命第五云司中此經先云司中後云司命後鄭欲先説司中故先引第五証司中後引第四証司命故文倒也案武陵太守星𫝊云文昌宫六星第一曰上將第二曰次將第三曰貴相第四曰司命第五曰司中第六曰司禄是其本次也云或曰中台者亦據武陵太守星𫝊而言云三台一名天柱上台司命為太尉中台司中為司徒下台司禄為司空引此破先鄭也楚辭九歌大司命朱子註周禮大宗伯以槱燎祀司中司命疏引星𫝊云三台上台曰司命又文昌宫第四星亦曰司命故有兩司命也少司命註案前篇註説有兩司命則彼固為上台而此則文昌第四星歟蕙田案司命之説二鄭訖無定論朱子亦但隨文解之葢楚俗祠祀固不足以考禮而名稱既古又分兩祭則知兩岐之説古已有之葢不始于二鄭矣黄氏幹曰司中司命文昌第五第四星未可信鄭又以為中能上能則當時已有兩説矣三代之禮散亡久矣諸儒之説于經有據而理安者方可信出于䜟緯不經與凡臆度義起而于理不安者皆難信楊氏復曰先鄭釋司中司命是一説後鄭又是一説竊謂惟皇上帝降中于民非帝之外别有司中之神也乾道變化各正性命非乾道之外别有司命之神也葢統言之則曰帝曰乾祀典専指一事之所指而祀之以報其徳則曰司中曰司命義與司民司禄同註家穿鑿異同又以星象言之過矣方氏苞曰先王制司命司中之祀葢以人受天地之中以生必有賦之以性者湯所謂降中是也既生而有形氣又必有制其死生脩短之數者孔子所謂命是也王者相協生民之中欲登之于仁夀而消其疵厲夭札故特立神號以祀之亦使民知所受之有中以正其徳所禀之有命以定其志也葢禮以義起者也既有典祀祝號然後天文家以三能文昌諸星當之蕙田案二鄭釋司中司命説雖不同然其以星名當之則一而已朱子註九歌兩司命則猶先鄭之意也楊氏謂統言之則曰帝曰乾専指則曰司中曰司命而不以星象言之是明與鄭異矣方氏謂既有典祀祝號天文家遂以星當之則舉兩説而合之矣夫謂之非星者失之空専以三台文昌言者失之鑿竊意宗伯祀典如五帝四方風雲雷雨一皆天地之氣化其始非必各有一神以黙主之而王者崇報之意因其有功於天地也故亦各為類以祀之司中主理司命主氣亦猶是耳至星象之見於天因其為精氣之所聚故義類感召亦遂各有所主此天文家所以以星當之也右祭司中司命周禮秋官小司寇孟冬祀司民獻民數於王王拜受之注司民星名謂軒轅角也小司寇于祀司民而獻民數于王重民也疏大比登民數于天府據三年大比而言此則據年年民數皆有增減于孟冬春官祭司民之時小司寇以民數多寡獻于王也司民三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數於王王拜受之登之於天府注鄭司農云文昌宫三能屬軒轅角相與為體近文昌為司命次司中次司禄次司民𤣥謂司民軒轅角也天府主祖廟之藏者疏曰及孟冬祀司民之日者謂司寇于春官孟冬祭祀司民星之日以與司寇為節此日司寇獻其民數于王云王拜受之登于天府者重此民數民為邦本故也先鄭云文昌宫三能屬軒轅角相與為體近文昌為司命次司中次司禄次司民武陵太守星𫝊文昌第一曰上將第二曰次將第三曰貴相第四曰司命第五曰司中第六曰司禄不見有司民三台六星兩兩相居起文昌東南則在太微亦無司民之事故後鄭不從云司民軒轅角也者案軒轅星有十七星如龍形有兩角角有大民小民故依之也鄭氏鍔曰軒轅之角有大民小民之星其神實主民説者謂春官祭之然春官天府但受其數耳司民之官言司寇及孟冬祀司民之日獻其數則司民之祀正司寇之所主明矣先王以為民之登耗必有神主之故毎歲孟冬物成之時使司寇祀之司寇刑官也宜無與于民數大比之年則以户口之數詔之何也以刑之繁簡民之息耗繫焉所以告之者使省刑而已司寇得其數于祀司民之日則獻于王以為民之所以生者屬乎天亦隠有神者相之而其權在王王能恤天之所生則已得以省刑矣司民天之星也王者以名官所以法之也髙氏愈曰司寇濫刑則民日耗故以民數詔之使不敢殘刑以逞也司民主民生死夀夭故祀之以祈繁衍王拜受者天地之性人為貴且以為邦本故也春官天府若祭天之司民司禄而獻民數榖數則受而藏之注司禄文昌第六星或曰下能也禄之言榖也年榖登乃後制禄祭此二星者以孟冬既祭之而上民榖之數于天府祭疏此主祭祀者祭天之司民司禄在孟冬之時鄭知此二星在孟冬者見月令孟冬云祈來年于天宗即日月星是知祭在孟冬也楊氏復曰當獻民數之時而祭司民所以報天生烝民之徳也當獻榖數之時而祭司禄所以報天生百榖之徳也然則所謂天者其昊天上帝歟曰莫非天也凡天之生物只氣數到自生天生烝民有烝民之氣數百穀雖植物亦有百榖之氣數氣數之所主處便自有神亦如五土之神五榖之神之類是也即一事之所主而名之曰司因一事之功而祭報之則曰司民司禄之神亦如司春司夏司寒司中司命之類是也其大者如乾坤六子之神日月星辰之神嶽瀆山川之神亦不越乎氣數所以成變化而行鬼神者此也先鄭後鄭以星言之人各一説此不可以為據文獻通考馬氏曰祀司中司命司民司禄出於周禮注家以為四司皆星也未知何據而星宿之名多出於緯書又先後鄭之説自為牴牾此後人之所以難據以為信也但信齋楊氏皆歸之於天與氣數而以為非有一星以主之則其説又似太𣺌茫葢天之有日月星辰猶君之有百司庶府也謂品物歲功一出於天而無日月星辰以司之猶謂政教號令一出於君而無百司庶府以行之也况金木水火土人間有此五物則天上亦有此五星以主之而洪範言星有好風星有好雨則司風雨者亦星也然則司中司命司民司禄何害其為星乎右祭司民司禄春秋襄公九年左氏傳古之火正或食於心或食於咮以出内火是故咮為鶉火心為大火注謂火正之官配食于火星建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民内火禁放火疏昭二十九年傳五行之官有木正火正金正水正土正後世祀之火正之官居職有功祀火星之時以此火正之神配食也有天下者祭百神天子祭天之時因祭四方之星諸侯祭其分野之星其祭火星皆以正配食也火正配火星而食有此傳文其金木水土之正不知配何神而食經典散亡不可知也陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火注閼伯髙辛氏之子傳曰遷閼伯于商丘主辰辰大火也今為宋星然則商丘在宋地相土契孫湯之祖也始代閼伯之後居商丘祀大火疏祀大火者閼伯祀此大火之星居商丘而祀大火星也相土因之復主大火是商丘之地屬大火也然則在地之上各有上天之分周禮保章氏以星土辨九州之地所封封域皆有分星鄭𤣥云星土星所主土也封猶界也大界則曰九州州中諸國之封域於星亦有分焉其書亡矣今其存可言者十二次之分也星紀吴越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也是言地屬于天各有其分之事也鄭唯云其存可言不知存者本是誰説其見于傳紀者則此云商主大火昭元年傳云參為晉星二十八年傳云龍宋鄭之星則蒼龍之方有宋鄭之分也又曰以害鳥帑周楚惡之則朱鳥之方有周楚之分也昭七年四月日食傳稱魯衛惡之去衛地如魯地則春分之日在魯衞之分也又十年傳曰今茲歲在顓頊之墟姜氏任氏實守其地則于時歲星在齊薛之分也又三十二年傳曰越得歲而吴伐之凶則于時歲星在吴越之分也晉語云實沈之墟晉人是居周語云歲在鶉火我有周之分野是有分野之言也天有十二次地有九州以此九州當彼十二次周禮雖云皆有分星不知其分誰分之也何必所分能當天地星紀在于東北吴越實在東南魯衞東方諸侯遥屬戌亥之次又三家分晉方始有趙而韓魏無分趙獨有之漢書地理志分郡國以配諸次其地分或多或少鶉首甚多鶉火極狹徒以相傳為説其源不可得而聞之堯封閼伯于商邱比及相土應歴數世故云代閼伯之後居商邱祀大火也昭公元年左氏傳子産曰昔高辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商丘主辰商人是因故辰為商星注商人湯先相土封商丘因閼伯故國祀星辰主疏襄九年傳云閼伯居商丘祀大火相土因之故商大火辰即大火星也故商人祀辰星商謂宋也宋商後故稱商人也遷實沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂已余命而子曰虞將與之唐屬之參及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也右祭分野星周禮夏官校人春祭馬祖注馬祖天駟也孝經説曰房為龍馬疏馬與人異無先祖可尋而言祭祖者則天駟也故取孝經説房為龍馬是馬之祖春時通淫求馬蕃息故祭馬祖詩小雅吉日吉日維戊既伯既禱疏伯長也馬祖始是長也鄭云馬祖天駟釋天云天駟房也孫炎曰龍為天馬故房四星謂之天駟鄭亦引孝經説房為天駟是也嚴氏粲曰伯是馬祖之神言既伯是既有事于馬祖謂祭之也右祭房星詩周頌絲衣序絲衣繹賔尸也高子曰靈星之尸也疏經之所陳皆繹祭始末之事也子夏作序則惟此一句而已後世有髙子者别論他事云靈星之尸言祭靈星之時以人為尸後人以髙子言靈星尚有尸宗廟之祭有尸必矣故引髙子之言以証賔尸之事高子者不知何人公孫丑稱髙子之言以問孟子則髙子與孟子同時靈星者不知何星漢書郊祀志云髙祖詔御史其今天下立靈星祠張晏曰龍星左角曰天田則農祥也晨見而祭之史傳之説靈星唯有此耳何楷世本古義曰絲衣祭靈星也靈星農祥也先王祀之而配以后稷歌絲衣之詩以樂之此詩有二説云繹賔尸也又引髙子曰靈星之尸也愚以本文絲衣其紑載弁俅俅自羊徂牛三語定之當從髙子之説陳祥道亦云髙子以絲衣之尸為靈星之尸是也靈星者農祥也東方蒼龍七宿房心通有農祥之稱周語虢文公曰農祥晨正土乃脈發韋昭以為房星也立春之日晨中于午農事之候故曰農祥又伶州鳩曰昔武王伐殷月在天駟月之所在辰馬農祥也我太祖后稷之所經緯也晉語董因曰大火閼伯之星也是謂大辰辰以成善后稷是相韋昭謂心星所在大辰辰次為天駟駟馬也故曰辰馬辰為農祥周先后稷之所以成善道戒農事也合前二説則房心皆謂農祥亦以二星相近故也而應劭則引賈逵説以為龍第三有天田星靈者神也故祀以報功辰之星為靈星故以壬辰日祀靈星于東南金勝木為土相也張晏亦曰龍星左角曰天田則農祥也晨見而祭之范氏亦引舊説以龍左角為天田星主榖祀用壬辰日祠之壬為水辰為龍從其類也據此則靈星乃専指天田而為之名攷星經則天田二星在角北者是也故服䖍以靈星為角星又有天田九星在牛東南非此天田也唐志云歲星主農祥后稷馮焉故周人常閲其禨祥以觀善敗其始王也次于鶉火以逹天黿其衰也淫于𤣥枵以害鳥帑逸周書作洛篇云周公作大邑成周于土中乃設丘兆于南郊以祀上帝配以后稷日月農星先王皆與食是則農星有祭自周公時已然以周家農事開基而此星獨主農祥故特著之祀典不與凡星同所謂后稷之所經緯者也杜佑通典載周制仲秋之月祭靈星于國之東南以為東南祭之就歲星之位也歲星五星之始最尊故就其位王充論衡亦云今靈星秋雩也而漢舊儀則謂古時歲再祭靈星春秋用太牢要之古禮無文俱莫能定其是否愚以是詩証之則正孟冬蜡祭時事其謂祭于仲秋謂春秋再祭者誤也何者蜡祭之禮皮弁素服他祭不然據此詩曰絲衣曰載弁此足表明其為蜡祭矣絲衣之為蜡祭者何也禮月令篇孟冬之月天子祈來年于天宗與祭八蜡祠大社門閭同時而舉即此祭也靈星之為天宗者何也祭法曰幽宗祭星也是星有宗之名虞書禋于六宗賈逵謂天宗三日月星地宗三河海岱是星又有天宗之名然星與日月雖並稱天宗而日月及他星皆無闗農事其晨見之時當歲功之始而獨主榖者唯靈星耳故周公郊祀特舉與日月並列固以重民事亦以彰祖徳美其名則曰靈星尊其神則曰天宗也漢興髙祖五年或言周興而邑立后稷之祠至今血食天下于是制詔御史其令天下立靈星祠言祀后稷而謂之靈星者以后稷配食星也亦名赤星祠龍左角色赤也牲用太牢縣邑令長侍祠舞者用童男十六人舞者象教田初為芟除次耕種耘耨驅爵及穫刈舂簸之形象其功也孝武遊登五岳尊祠靈星建武二年立靈星祠有司掌之晉令縣祀靈星唐以立秋後辰日祠靈星祝曰九榖方成三時不害馮茲多祐介其農穡開元祀于國城東南天寳四載升中祀宋皇祐中立靈星壇東西丈三尺南北亦如之葢歴代靈星之見于祀典者如是祠之設専為祈田毎𨽻郡邑唯周之肇祀反其所自始與后稷比隆制固淵乎逺矣風俗通載俗説縣令問主簿靈星在城東南何法主簿仰答曰唯靈星所以在東南者亦不知也毎思其詼諧啞然失笑嗚呼以髙子筆之于詩序之後而先儒猶未能明其制而信其是且詆以為誤彼縣令主簿皆俗吏其能知之也哉羅泌云于祭有尸見君子氤氲事神之盡也宗廟有尸以盡孝也而自天地社稷山川羣小祀一皆有尸則亦以事父母之心事之也大抵神鬼隂屬非附陽體則不可以見是故尸以託之繹賔之尸髙子以為靈星是三辰亦有尸矣蕙田案絲衣載弁乃士助祭之服何氏據此為蜡祭之証且以月令之天宗為専指靈星愚皆不敢以為然特所載靈星祀典頗詳故録以備考五經通義靈星為立尸故云絲衣其紑載弁俅俅言王者祭靈星公尸所服也逸周書作洛篇周公作大邑成周於土中乃設丘兆於南郊以祀上帝配以后稷日月農星先王皆與食通典周制仲秋之月祭靈星於國之東南注東南祭之就歲星之位也歲星為星之始最尊故就其位王者所以復祭靈星者為人祈時以種五榖故别報其功也風俗通祀典既以立稷又有先農無為靈祀后稷也左中郎將賈逵説以為龍第三有天田星靈者神也故祀以報功辰之神為靈星故以壬辰日祀靈星於東南金勝木為土相蕙田案髙子説詩雖無他証佐然可見靈星之祀葢自古有之不始於漢矣靈星或以為歲星或以為房星心星或以為天田星而天田又有二一在角北一在牛東南今亦無以的知其然否要其為農祥而祀之以祈民事則信而有徴也又考逸周書作洛之説農星亦從祀郊壇而農星或即靈星與又案歲在五緯中房心在二十八宿中皆當祭之於幽宗不應特祀於國之東南則以靈星為天田者近是右祭靈星農星史記封禪書秦并天下而雍有日月參辰南北斗熒惑太白歲星填星二十八宿風伯雨師四海九臣十四臣諸布諸嚴諸逑之屬百有餘廟於下邽有天神灃滈有昭明於社亳有夀星祠索隠曰漢書舊儀云祭參辰於池陽谷口夾道左右為壇也雍地名也爾雅祭星曰布或云諸布是祭星之處案樂彦引河圖云熒惑星散為昭明夀星葢南極老人星也見則天下理安故祠之以祈福也漢書郊祀志髙祖六年長安置祠祀官女巫荆巫祠司命以歲時祠宫中師古曰司命説者云文昌第四星也風俗通謹案詩云芃芃棫樸薪之槱之周禮槱燎司中司命文昌也司中文昌上六星也槱者積薪燔柴也今民間獨祀司命耳刻木長尺二寸為人像行者擔篋中居者别作小屋齊天地大尊重之汝南餘郡亦多有皆祠以腊率以春秋之月漢書郊祀志八年或言曰周興而邑立后稷之祠至今血食天下於是高祖制詔御史其令天下立靈星祠常以歲時祠以牛張晏曰龍星左角曰天田則農祥也晨見而祭之通典漢髙祖八年命郡國郡邑立靈星祠時或言周興而邑立后稷之祀至今血食以其有播種之功也于是髙祖命立靈星祠三輔故事長安城東十里有靈星祠一云靈星龍左角為天田主榖農祥晨見而祭之言祠后稷而謂之靈星者以后稷又配食星也常以歲時祠以牛古時歲再祭靈星春秋用少牢壬辰位祠之壬為水辰為龍就其類也縣邑令長侍祠舞者童男十六人即古之二羽舞象教田初為芟除次耕種次芸耨驅爵及穫刈舂簸之形象成功也唐類函嵩山記云漢武廵遊祭五嶽尊事靈星乃作殿堂周迴種松柏祠前兩傍立石碣以表之漢書郊祀志宣帝立歲星辰星太白熒惑南斗祠於長安城旁漢舊儀祭參辰星於池陽谷口夾道左右為壇塋各周三十六里漢書郊祀志成帝時匡衡奏罷雍舊祠二百三所唯山川諸星十五所為應禮云後漢書禮儀志仲秋之月祀老人星於國都南郊老人廟季秋之月祠心星於城南壇心星廟古今注元和三年初為郡國立稷及祠社靈星禮器也通典晉以仲秋月祀老人星於國都南逺郊老人星廟季秋祀心星於南郊壇心星廟文獻通考東晉以來靈星老人星心星配享南郊不復特祀隋書禮儀志陳制令太中署常以二月八日於署庭中以太牢祀老人星兼祀天皇大帝太一日月五星鈎陳北極北斗三台二十八宿丈人星子孫星都四十六座凡應預祠享之官大醫給除穢氣散藥先齋一日服之以自潔其儀本之齊制魏書禮志天興二年十月立星神一歲一祭常以十二月用馬鹿各一牛豕各一雞一太祖初有兩彗星見劉后使占者占之曰祈之則當掃定天下后從之故立其祀髙祖太和三年禱星於苑中十五年詔曰先恒有水火之神四十餘名及城北星辰今圜丘之下既祭風伯雨師司中司命明堂祭門户井竈中霤每神皆有此四十神計不須立悉可罷之北史劉芳𫝊芳轉太常卿以靈星之祀不應𨽻太常乃上䟽曰靈星本非禮事兆自漢初専為祈田恒𨽻郡縣郊祀志云髙祖五年制詔御史其令天下立靈星祀牲用太牢縣邑令長得祠晉祠令云郡縣國祀社稷先農縣又祠靈星此靈星在天下諸縣之明據也今移太常恐乖其本臣以庸蔽謬忝今職考括墳籍博采羣議既無異端謂粗可依據詔曰所上乃有明據但先朝置立已久且可從舊隋書禮儀志星辰四望等為中祀司中司命及諸星為小祀養牲在滌中祀三旬小祀一旬通典隋於國城西北十里亥地為司中司命司禄三壇同壝祠以立冬後亥日唐書禮樂志四時祭靈星司中司命司人司禄籩八豆八簋一簠一爼一五官五星三辰七宿皆少牢靈星司中司命司人司禄皆羊一文獻通考唐制立秋後辰日祀靈星於國城東南立冬後亥日祀司中司命司民司禄於國城西北不用樂籩豆各八簋俎等各一開元禮以星辰為中祀司中司命諸星之屬為小祀立冬後亥日祀司中司命司人司禄於國城西北有司行事毎座象罇二於壇上東南隅北向皆有坫以西為上設司中司命司人司禄神座於壇上近北南向以西為上初獻司中祝文曰時屬安寧兆庶康乂用率常禮報茲祉福次獻司命祝文曰賴兹正直黎庶康寧資此良辰用申常禮次獻司人祝文曰星紀已周兆庶寧阜備兹蠲吉式薦馨香次獻司禄祝文曰元英紀時歲事云畢聿遵典故修其常祀飲福行事如風師儀立秋後辰日祀靈星有司行事祝文曰維九榖方成三時不害憑兹多祐介其農穡舊唐書禮儀志開元二十四年七月己巳初置夀星壇祭老人星及角亢等七宿冊府元龜開元二十四年七月庚子有上封事者言月令云八月日月㑹於夀星居列宿之長五者土之數以生為大臣竊以夀者聖人之長也土者皇家之徳也陛下首出夀星之次旅於土徳之數示五運開元之期萬夀無疆之應伏請兩京各改一殿以萬夀為名至千秋節㑹百僚於此殿如受元之禮毎至八月社日配夀星祠至於大社壇享之詔曰徳莫大於生成福莫先於夀考苟有所主得無祀之今有上事者言仲秋日月㑹於夀星以為朕生於是月欲以配社而祭於義不倫且夀星角亢也既為列宿之長復有夀星之名豈唯朕躬獨享其應天下萬姓寧不是懐葢秦時已有夀星祠亦云舊矣宜令所司特置夀星壇甞以千秋節日修其祀典申勅夀星壇宜祭老人星及角亢七宿著之常式玉海天寳十四載三月時雨未降令給事中王維等分祭五星壇冊府元龜徳宗貞元六年春二月甲申復祀司中司命司人司禄及靈星五代史唐本紀同光二年九月壬子置水於城門以禳熒惑宋史禮志景徳三年太常禮院言案月令八月命有司享夀星於南郊注云秋分日祭夀星於南郊夀星南極老人星也爾雅云夀星角亢也注云數起角亢列宿之長故云夀星唐開元中特制夀星壇常以千秋節日祭老人星及角亢七宿請用祀靈星小祠禮其壇亦如靈星壇制築于南郊以秋分日祭之文獻通考知樞宻院事王欽若言夀星之祀肇自開元伏以陛下光闡鴻猷並秩羣祀而蕭薌之祭獨略此祠縉紳之談皆謂闕典加以周伯星出實居角亢之間天既垂休禮罔不答伏望特詔禮官俾崇祀事庶百祥之允集介萬夀以無疆詔有司詳定遂請以秋分日饗夀星及角亢七宿為壇南郊髙三尺周回八步四尺四陛下壝其祭器祀禮咸以靈星為凖奏可禮志諸星祠有夀星周伯靈星之祭大中祥符二年翰林天文邢中和言景徳中周伯星出角亢下案天文志角亢為太山之根果符上封之應望于親郊日特置周伯星位於亢宿間詔禮官與司天監定議且言周伯星出氐三度然亢氐相去不逺並鄭分兖州夀星之次宜如中和奏設位氐宿之間以為永式天禧四年從靈臺郎皇甫融請凡修河致祭増尾宿天江天記天社等諸星在天河内者凡五十位文獻通考慶歴四年靈臺郎王太明言案占書主河江淮濟溝渠溉灌之事十九星汴口祭河瀆七位而不及星司天監定亢池主渡水往來迎送之事北河為胡門北戒南河為越門南戒土司空掌水土功事皆不主江淮濟箕計奎三星顓注津瀆太明所遺請與東井天津天江咸池積水天淵天潢水位水府四凟九坎天船王良羅堰等十七星在天河内者當祠二月詔汴口祭河兼祠十七星宋史仁宗本紀康定元年十二月癸未詔南京祠大火禮志大火之祀康定初南京鴻慶宫灾集賢校理胡宿請修其祀而以閼伯配焉禮官議閼伯為髙辛火正實居商丘主祀大火後世因之祀為貴神配火侑食如周棄配稷后土配社之比下歴千載遂為重祀祖宗以來郊祀上帝而大辰已在從祀閼伯之廟每因赦文及春秋委京司長吏致奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火徳宜因興王之地商丘之舊為壇兆祀大火以閼伯配建辰建戌出内之月内降祝版留司長吏奉祭行事乃上壇制高五尺廣二丈四陛陛廣五尺一壝四面距壇各二十五步位牌以黒漆朱書曰大火位配位曰閼伯位牲用羊豕一器凖中祠歲以三月九月擇日令南京長吏以下分三獻州縣官攝太祝奉禮慶歴以立秋後辰日祀靈星其壇東西丈三尺南北丈二尺夀星壇方丈八尺皇祐定如唐制二壇皆周八步四尺其享禮籩八豆八在神位前左右重三行俎二在籩豆外簠簋一在二俎間象尊二在壇上東南隅北向西上七宿位各設籩一豆一在神位前左右俎一在籩豆外中設簋一簠一在俎左右爵一在神位正前壺尊二在神位右光禄實以法酒元豐中禮文所言時今秋冬享夀星於南郊熙寧祀儀于壇上設夀星一位南向又于壇下夘陛之南設角亢氐房心尾箕七位東向案爾雅所謂夀星角亢非此所謂秋分所享夀星也今于壇下設角亢位以氐房心尾箕同祀尤為無名又案晉天文志老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕沒于丁見則治平主夀昌常以秋分候之南郊後漢于國都南郊立老人星廟常以仲秋祀之則夀星謂老人矣請依後漢于壇上設夀星一位南向祀老人星其壇下七宿位不宜復設案通考作元豐四年元豐詳定局言周禮小宗伯之職兆五帝于四郊四類亦如之鄭氏曰兆為壇之營域星辰運行無常以氣類為之位兆司中司命于南郊以氣類祭之熙寧祀儀兆司中司命于國城西北亥地則是從其星位而不以氣類也請稽舊禮兆司中司命司禄于南郊祀以立冬後亥日其壇兆則從其氣類其祭辰則從其星位仍依熙寧儀以司民從司中司命司禄之位元符元年左司員外郎曾旼言今令文北極天皇而下皆用濕香至于衆星之位香不復設恐于義未盡于是每陛各設香又言先儒以為實柴所祀者無玉槱燎所祀者無幣今太常令式衆星皆不用幣葢出于此然考典瑞玉人之官皆曰圭璧以祀日月星辰則實柴所祀非無玉矣槱燎無幣恐或未然至是遂命衆星隨其方色用幣宋史樂志司中司命五首迎神欣安冠峩峩兮服章蕤蕤靈來下兮進止委蛇我涓我壇我潔我俎降輿卻旌于兹享御升降歛安神緌舒舒佩環鏗鏗陟降上下壇燎光明有盥于罍有帨于巾不吴不敖庶以安神奠幣容安我誠既潔我豆既豐神來降斯有儼其容薦此嘉幣肅肅雍雍何以侑之於樂鼓鐘酌獻雍安酌兹㫖酒既盈且芬式用來歆衎衎熏熏何以迎神薦有嘉籩何以錫民曰唯豐年送神欣安雲兮飄飄風兮稜稜颷馭反空杲日來昇歸斾揚揚衆樂鏘鏘我神式懽恵我嘉祥東坡志林紹聖二年五月望日敬造真一法酒成請羅浮道士鄧守安拜奠北斗真君將奠雨作已而清風肅然雲氣解駁月星皆見魁標皆爽徹奠隂雨如初禮志建中靖國元年又建陽徳觀以祀熒惑因翰林學士張康國言天下崇寧觀並建火徳真君殿仍詔正殿以離明為名太常博士羅畸請宜倣太一宫遣官薦獻或立壇于南郊如祀靈星之儀有司請以閼伯從祀離明殿又請增閼伯位案春秋傳曰五行之官分為上公祀為貴神祝融高辛氏之火正也閼伯陶唐氏之火正也祝融既為上公則閼伯亦當服上公衮冕九章之服既又建熒惑壇于南郊赤帝壇壝外令有司以時致祭增用圭璧火德熒惑以閼伯配俱南向五方火精神等為從祀壇廣四丈髙七尺四陛兩壝壝二十五歩從新儀所定徽宗本紀崇寧元年秋七月甲申朔建長生宫以祠熒惑四年秋七月辛丑置熒惑壇禮志政和新儀夀星壇改定壇高三尺東西袤丈三尺南北袤丈二尺四出陛一壝二十五步初乾興祀靈星值屠牲有禁乃屠于城外至是勅有司凡祭祀牲牢無避禁日著為令政和之制司中司命司民司禄為四壇各廣二十五步同壝又言周禮樂師之職凡國之小事用樂者令奏鐘鼓説者曰小祀也小師職注小祭祀謂司中司命是也既已有鐘鼓則是有樂明矣請有司祀司中司命用樂仍製樂章以為降神之節又言周禮小司徒之職凡小祭祀奉牛牲羞其肆又肆師云小祭祀用牲所謂小祭祀即司中司命司民司禄之類是也後世以有司攝事難于純用太牢猶宜下同大夫禮用羊豕可也今祀儀司中司命司民司禄用羊豕一祠令小祠牲入滌一月所以備潔養之法今每位肉以豕又取諸市與令文相戾請諸小祀祭以小牢仍月體解請司中司命止薦熟從之文獻通考政和三年四月議禮局議上五禮新儀立秋後辰日祀靈星高宗本紀紹興三年正月癸酉復祭大火禮志紹興三年詔祀大火太常寺言應天府祀大火今道路未通宜于行在春秋設位高宗本紀紹興七年五月壬申命禮官舉熒惑夀星之祀六月壬辰命歲辰戌月祀大火配以閼伯通考紹興七年太常博士黄積言立春後丑日祀風師立夏後申日祀雨師雷神秋分日饗夀星立夏日祀熒惑從之夀星禮料用籩一鹿脯豆一鹿臡著尊一實以法酒通考紹興十八年禮部侍郎沈該言國家乗火徳之運以王天下先朝建陽徳觀専奉火徳配以閼伯而祀以夏至舊典可舉望詔有司于宫觀内别建一殿専奉火徳配以火伯以時修祀益固炎圖詔禮部太常寺討論太常寺討論得應天府祀大火繫以季春秋擇日差官于本廟致祭今道路未通從宜于行在春秋設位臣僚言多事以來大火之祀弗舉比年多灾雖縁有司不戒然預防之計宜無所不用其至望命有司參酌舊典即行在每建辰戌出納之月設位望祭豈特昭炎徳昌熾之福亦弭灾之道尋太常寺請以季春出火日于東郊季秋納火日于西郊各建壇壝以大祀之禮禮火神禮料依感生帝宋史樂志紹興祀大火樂章十二首降神高安圜鍾為宫五緯相天各率其職司禮與視則維熒惑至陽之精屆我長嬴于以求之祀事孔明黄鍾為角有出有藏伏見靡常相我國家鑒觀四方視罔不正終然允臧神其來格明徳馨香太簇為徴小大率禮不愆于儀展采錯事秩祀孔時維今之故閱我數度修厥典常神其來顧姑洗為羽於赫我宋以火徳王永永丕圖繄神之相神之來矣維其時矣禮備樂奏神其知矣升殿正安有儼其容有潔其衷屹屹崇壇伊神與通神肯降格嘉神之休䖍恭降登神乎安留熒惑位奠玉幣嘉安馨香接神肹蠁恍惚求神以誠薦誠以物有藉斯玉有篚斯幣是用薦陳昭兹精意商丘宣明王位奠幣嘉安熒惑在天唯火與合繄神主火純一不雜作配熒惑祀功則然不腆之幣于兹告䖍捧俎豐安火遵其令無物不長視此牲牢務得其養豢以祀神有腯其肥非神之宜其將曷歸熒惑位酌獻祐安皇念有神介我戩榖登時休明有此美禄酌言獻之有飶其香神兮燕娭醉此嘉觴宣明王位酌獻祐安誰其祀神知神嗜好閼伯祀火為神所勞睠言配食既與火俱於樂㫖酒承神嘉虞亞終獻文安神既貺施嗜我飲食申以累獻以承靈億神方常羊咸畢我觴于再于三于誠之將送神用理安登降上下奠璧獻斚音送粥粥禮無違者已虞至旦神其將歸顧我國家遺以繁釐出火祀火辰十二首降神高安圜鍾為宫􅂱􅂱我宋火徳所畀用火紀時允維象類神自類歆誠繇類至有感斯通孚我陽燧黄鍾為角樂音上逹粤惟出虚火性炎上亦生于無我鏞我磬我笙我竽氣同聲應昭哉合符太簇為徴火在六氣獨處其兩感生維君繫辰克相何以騐之占兹垂象騰駕蒼虯歘其來饗姑洗為羽星入于戌與火俱詘火出于辰與星俱伸一伸一詘孰操縱之利用出入民咸用之升殿正安屹彼嘉壇赤伏始屆掞光曜明洋乎如在俛仰重離黙與精㑹隨我降升肅聴環珮大辰位奠玉幣嘉安維莫之春五陽發舒日之夕矣三星在隅莫量匪幣莫嘉匪玉明薦孔時神光下矚商丘宣明王位奠幣嘉安二七儲神與天地並孰儷厥徳聿唯南正功懋陶唐澤流億姓作配嚴禋贄列唯稱捧俎豐安有嚴在滌陳彼牲牢孔碩其俎薦此血毛厥初生民飲茹則然以燔以炙伊誰云先大辰位酌獻祐安孰為大辰唯北有斗曾是彗星斯名孔有幽禜報功潔齊敢後容與嘉觴式歆㫖酒宣明王位酌獻祐安周設司爟雖列夏官仍襲孔易闓端實難相彼商丘永懐初造不腆桂椒匪以為報亞終獻文安潛之伏矣柞槱既休有俶其來榆栁是求靈駕紛羽尚其安留飲我三爵言言油油送神理安五運唯火實宗衆陽宿壯用明千載愈光神保聿歸安處火房鬱攸不作炎圖永昌納火祀大辰十二首降神髙安圜鍾為宫赫赫皇圖炎炎火徳侈神之賜奄有方國粢盛既豐俎豆有飶於萬斯年報祀無斁黄鍾為角火星之躔有􅂱其光表于神位伏于戌方時和歲稔仁顯用藏告爾萬民出納有常太簇為徴季秋之月律中無射農事備收火功告畢克禋克祀有嚴有翼風馬雲車尚其來格姑洗為羽明明我后重祭欽祠有司肅事式薦晨儀禮唯其稱物唯其時神之聴之福禄來為升殿正安猗與明壇右平左墄冕服斯皇玉珮有節陟降惟寅匪徐匪疾式崇大祀禮文咸秩大辰位奠玉幣嘉安金行序晚玉露晨清齋戒豐潔肅恭神明嘉幣惟量嘉玉惟精于以奠之庶幾來聴商丘宣明王位奠幣嘉安恭惟火正自陶唐氏邑于商丘配食辰祀有功在民有徳在位敢替典常惟恭奉幣捧俎豐安萬彚攸成四方寧謐工祝致告普存民力迺薦斯牲為俎孔碩介以繁祉式和民則大辰位酌獻祐安庶功備矣休徳昭明天地釀和鬱鬯斯清玉瓚以酌瑤觴載盈周流常羊來燕來寧宣明王位酌獻祐安廣大建祀式崇其配馨香在兹清酒既載穆穆有暉洋洋如在聿懐嘉慶繫神之賚亞終獻文安幣玉肅陳笙簧具舉桂醑浮觴瓊羞溢俎禮有三獻式和且序神具醉止慶流寰宇送神理安神靈降鑒天地回旋唯馨薦矣既醉歆焉諸宰斯徹式禮莫愆隤祉降祥天子萬年禮志乾道五年太常少卿林栗等言本寺已擇九月十四日依㫖設位望祭應天府大火以商丘宣明王配二十一日内火祀大辰以閼伯配大辰即大火閼伯即商丘宣明王也縁國朝以宋建號以火紀徳推原發祥之所自崇建商丘之祠府曰應天廟曰光徳加封王爵錫謚宣明所以追嚴者備矣今有司旬日之間舉行二祭一稱其號一斥其名義所未安乞自今祀熒惑大辰其配位稱閼伯祝文位版並依應天府大火禮例改稱宣明王以稱國家崇奉火正之意元史世祖本紀至元五年十二月勅二分二至及聖誕節日祭星于司天臺王圻續通考十七年正月祭斗元史世祖本紀十八年春正月丁巳制以六祖李全祐嗣五祖李居夀祭斗二十二年八月辛酉命有司祭斗三日十二月辛夘勅有司祭北斗二十六年十二月丁亥命回回司天臺祭熒惑王圻續通考至元二十七年命回回司天臺祭熒惑二十八年命元教宗師張留孫寘醮祠星三日元祀儀皆禮官所擬而定于中書日星始祭于司天臺而回回司天臺遂以禜星為職事元史成宗本紀至元三十一年成宗即位五月壬子祭太陽太歲火土等星于司天臺庚申祭紫微星于雲仙臺元貞元年十二月庚子朔遣集賢院使額爾根薩里等祭星于司天臺大徳九年八月己夘命太常卿綽羅昭文館大學士靳徳進祭星于司天臺仁宗本紀武宗至大四年仁宗即位秋七月禜五星于司天臺皇慶二年夏四月甲子禜星于司天臺延祐五年五月戊辰遣平章政事王毅禜星于司天臺三晝夜六年春正月己夘禜星于司天臺二月丁亥改禜星于回回司天臺九月壬辰禜星于司天臺英宗本紀延祐七年英宗即位八月戊申禜星于司天監十二月乙丑禜星于回回司天監四十晝夜至治元年六月丁夘禜星于司天臺二年五月戊子禜星于五臺山泰定帝本紀至治三年泰定帝即位十一月乙夘禜星于司天監十二月壬申禜星于司天監泰定元年五月癸丑命司天監禜星七月丁未禜星于上都司天監十一月甲午禜星于回回司天監二年二月丁酉禜星于回回司天監七月甲寅禜星于上都司天監三年三月壬子禜星于司天監四年夏四月乙未禜星于回回司天臺文宗本紀天歴元年九月丁丑命司天監禜星辛巳命司天監禜星二年五月己未遣翰林學士承㫖額琳特穆爾北迎大駕命司天監禜星八月庚寅明宗崩己亥帝復即位于上都甲辰命司天監及回回司天監禜星至順元年秋七月壬子命西僧禜星順帝本紀至正八年六月丙戌立司天臺于上都明史禮志靈星諸神洪武元年大常寺奏周禮以槱燎祠司中司命風師雨師天府若祭天之司民司禄而獻民數榖數受而藏之漢高帝命郡國立靈星祠唐制立秋後辰日祀靈星立冬後亥日遣官祀司中司命司民司禄以少牢宋祀如唐而于秋分日祀夀星今擬如唐制分日而祀為壇于城南從之二年從禮部尚書崔亮奏每歲聖夀日祭夀星同日祭司中司命司民司禄示與民同受其福也八月望日祀靈星皆遣官行禮三年罷夀星等祀大政紀三年正月禮部定星辰祔祭于月壇明史禮志洪武三年帝謂中書省臣日月皆専壇祭而星辰乃祔祭于月壇非禮也禮部擬于城南諸神享祭壇正南向增九間朝日夕月祭周天星辰俱于是行禮朝日夕月仍以春秋分祭星辰則于天夀節前三日從之四年九月帝躬祀周天星辰正殿共十壇中設周天星辰位儀如朝日大政紀四年正月詔定親祭星辰用皮弁服陪祭官各服本品梁冠祭服九月乙亥詔親祀星辰齋三日降香齋一日著為令明史樂志洪武四年祀周天星辰樂章迎神凝和之曲星辰垂象布列元穹擇兹吉日祀禮是崇濯濯厥靈昭鑒我心謹候以迎庶幾來歆奠帛保和之曲詞同朝日初獻保和之曲神兮既留品物斯薦奉祀之初醴酒斯奠仰惟靈耀以享以歆何以侑觴樂奏八音亞獻中和之曲神既初享亞獻再升以酌醴齊仰薦于神洋洋在上式燕以寧庶表微衷交于神明終獻肅和之曲神既再享終獻斯備不腆菲儀式將其意薦兹酒醴成我常祀神其顧歆永言樂只徹豆豫和之曲祀事將畢神既歆只徹兹俎豆以成其禮唯神樂欣無間始終樂音再作庶達微悰送神雍和之曲詞同朝日望燎雍和之曲神既享祀靈馭今旋燎烟既升神帛斯焚巍巍霄漢倐焉以適拳拳余衷瞻望弗及禮志二十一年以星辰既從祀南郊罷禜星之祭右歴代祭星辰星辰附蕙田案禮經祀典但有星辰寒暑四時之祭葢星辰有分主職事分主土地若天子立六官之掌五等之封也寒暑四時則分主一時分主一氣若天子設羲和之官以正春夏秋冬者也至于歲之運行則不聞别祭其神者葢古人所云歲在鶉火歲在元枵皆以星紀為次而更無他神則已並列星辰而無庸别祀也自唐元宗信術士之言别立九宫貴神之祭後人或以為列星或曰司水旱風雨霜雹疾疫葢皆依倣之辭而實無攷究何也既謂之星則星辰本有正祭又當從祀圜丘不應獨遺此九星而須别祭也且稱之曰星則已有天蓬天内諸名矣而其神則又有太乙攝提諸號然則五行二十八宿諸星其神又當何號耶又以為司水旱風雨夫水旱風雨已非一神又與星辰各别何此九星者乃併古之三祀為一也又以為分方守位則應如九州分野之星而復云飛碁廵行二十五年而移一宫則又如五行迭旺之氣葢其説之支離膠擾大抵出於道家之附㑹而無當于禮典者也然唐宋及金舉行不一又不可缺而弗述今故于星辰之後為類以附而以太乙太歲月將繼其後葢甞以意測之天地運行其中必有主之者安得謂之無神然則九宫太乙者其大運之流行二十餘年而一易者乎太歲則歲之所建一年一易四時則時之所司一時一易者乎寒暑則時之所極積二時而一當其權月將則月之所值一月而一躔其位以是推之理亦宜然然古之聖人非不知歲與月之皆有神也而祭止于四時寒暑者豈非以歲之運行既以星辰主之固不必更生區别耶後世既秩于祀典今考而録之以備議禮者之參稽統低一字以小變其例云唐書𤣥宗本紀天寳三載十二月癸丑祠九宫貴神于東郊大赦舊唐書禮儀志天寳三載有術士蘇加慶上言請於京東朝日壇東置九宫貴神壇其壇三成成三尺四陛其上依位置九壇壇尺五寸東南曰招搖正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太乙西南曰攝提正西曰咸池西北曰青龍五為中戴九履一左三右七二四為上六八為下符于遁甲四孟月祭尊為九宫貴神禮次昊天上帝而在太清宫太廟上用牲牢璧幣類于天地神祗𤣥宗親祀之如有司行事即宰相為之文獻通考天寳三載術士蘇加慶上言請于城東置九宫神壇每歲四孟月祭尊為九宫貴神十月十六日勅無文咸秩有功必祀漢則八神是禱晉則六宗置壇皆議叶當時禮髙羣望惟九宫貴神實司水旱功佐上帝徳庇下民冀嘉榖歲登災害不作至于祀典歴代猶闕豈有享于幽贊之功而無昭報之禮宜令所司即擇處以來月甲子日立壇仍議其牲牢禮秩毎至四時初節令中書門下往攝祭者著以成式垂之不刋其年十二月二十四日親祀九宫貴神于東郊冊府元龜天寳三載十二月癸巳制曰唯神之主必恭禋祀率先之訓義在躬親朕欽若昊穹子育黎庶通明靈之徳以洽和平之理是修闕典咸秩無文如在之誠久陳於郊廟懐柔之至亦徧于山川况九宫所主百神之貴上分天極下統坤維隂騭生靈功深亭育故式昭新典肇建明祠將以為人載祈孚祐宜叶元辰之吉用申大祭之禮可以今月立春朕親祀九宫壇仍令中書門下與禮官等即詳定儀注奏聞癸丑親祠九宫貴神于東郊唐孫逖親祭九宫壇大赦文制曰勵精為理三紀于兹上荷宗廟延祥克開厥後下賴股肱叶徳以致雍熙而麟鳯龜龍近遊郊藪蠻夷戎狄逺輸琛賮乗時年之休運恢皇王之逺圖是以圜丘方澤之儀昇中告類之禮靡典不舉靡神不懐恭惟九宫明祀尚闕載深兢惕用建靈壇爰以元辰親執奠獻叶青陽發生之慶祈黔庶吉祐之福蕙田案開元禮頒行未幾天寳改元即為非禮作俑異哉唐書肅宗本紀乾元二年正月丁丑祀九宫貴神三年復祀九宫貴神舊唐書禮儀志乾元三年正月又親祀之初九宫神位四時改位呼為飛位乾元之後不易位太和二年八月監察御史舒元輿奏七月十八日祀九宫貴神臣次合監祭職當監察禮物伏見祝版九片臣伏讀既竟竊見陛下親署御名及稱臣于九宫之神臣伏以天子之尊除祭天地宗廟之外無合稱臣者王者父天母地兄日姊月比以九宫為目是宜分方而守其位臣又觀其名號乃太乙天乙招搖軒轅咸池青龍太隂天符攝提也此九神于天地猶子男也于日月猶侯伯也陛下尊為天子豈可反臣於天之子男耶臣竊以為過縱隂陽者流言其合祀則陛下當合稱皇帝遣某官致祭于九宫之神不宜稱臣與名臣實愚瞽不知其可伏縁行事在明日雞初鳴時成命己行臣不敢滯伏乞聖慈異日降明詔禮官詳議冀明萬乗之尊無所虧降悠久誤典因此可正詔都省議皆如元輿議乃降為中祠祝版稱皇帝不署文獻通考三年以祀九宫壇舊是大祠太常博士崔龜從議曰九宫貴神經典不載天寳中術士奏請遂立祠壇事出一時禮同郊祀臣詳其圖法皆是星名縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祀豈容九宫獨越常禮備列王事誡誓百官尊卑乖儀莫甚于此若以常在祀典不可廢除臣請降為中祀從之舊唐書禮儀志武宗㑹昌元年十二月中書門下奏凖天寳三載十月六日勅九宫貴神實司水旱功佐上帝徳庇下人冀嘉榖歲登災害不作毎至四時初節令中書門下往攝祭者凖禮九宫次昊天上帝壇在太清宫太廟上用牲牢璧幣類于天地天寳三載十二月𤣥宗親祠乾元二年正月肅宗親祠伏自累年以來水旱愆候恐是有司禱請誠敬稍虧今屬孟春合修祀典望至明年正月祭日差宰臣一人禱請向後四時祭並請差僕射少師少保尚書太常卿等官所冀稍重其事以申嚴敬臣等十一月二十五日己于延英面奏伏奉聖㫖合檢儀注進來者今欲祭時伏望令有司崇飾舊壇務于嚴潔勅㫖依奏舊唐書武宗本紀㑹昌二年春正月中書奏百官議九宫壇本大祠請降為中祠宰相崔珙陳夷行奏定左右僕射上事儀注禮儀志二年正月四日太常禮院奏凖監察御史闗牒今月十三日祀九宫貴神已勅宰相崔珙攝太尉行事合受誓誡及有司徒司空否伏以前件祭本稱大祠凖太和三年七月二十四日勅降為中祠昨據勅文秪稱崇飾舊壇務于嚴潔不令别進儀注更有改移伏恐不合却用大祀禮料伏候裁㫖中書門下奏曰臣凖天寳三載十月六日勅九宫貴神實司水旱臣等伏覩既經兩朝親祀必是祈請有徴况自太和己來水旱愆候陛下常憂稼穡每念烝黎臣等合副聖心以修墜典伏見太和三年禮官狀云縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祀竊詳其意以星辰不合比于天官曽不知統而言之則為天地在于辰象自有尊卑謹案後魏王鈞志北辰第二星盛而常明者元星路寢太帝常居始由道奥而為變通之迹又天皇大帝其精曜魄寳葢萬神之秘圖河海之命紀皆禀焉據元説即昊天上帝也天乙掌八氣九精之政令以佐天極徴明而有常則隂陽序大運興太乙掌十有六神之法度以輔人極徴明而得中則神人和而王道昇平又北斗有權衡二星天乙太乙參居其間所以財成天地輔相神道也若一槩以列宿論之實為淺近案漢書曰天神貴者太乙佐曰五帝古者天子以春秋祭太乙列于祀典其來久矣今五帝猶為大祀則太乙無宜降祀稍重其祀固為得所劉向有言曰祖宗所立神祗舊典誠未易動又曰古今異制經無明文至尊至重難以疑説正也其意不欲非祖宗舊典以劉向之博通尚難于改作况臣等學不究于天人識尤懵于祀典欲為參酌恐未得中伏望更令太常卿與學官同詳定庶獲明據從之檢校左僕射太常卿王起廣文博士盧就等獻議曰伏以九宫貴神位列星座往因致福詔立祠壇降至尊以稱臣就東郊以親拜在祀典雖云過禮庇羣生豈患無文恩福黔黎特申嚴奉誠聖人屈已以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祀今聖徳憂勤期臻夀域兵荒水旱寤寐軫懐爰命台臣緝興墜典伏惟九宫所稱之神即太乙攝提軒轅招搖天符青龍咸池太隂天乙者也謹案黄帝九宫經及蕭嵩五行大義一宫其神太乙其星天蓬其卦坎其行水其方白二宫其神攝提其星天内其卦坤其行土其方黒三宫其神軒轅其星天衝其卦震其行木其方碧四宫其神招搖其星天輔其卦㢲其行木其方緑五宫其神天符其星天禽其卦離其行土其方黄六宫其神青龍其星天心其卦乾其行金其方白七宫其神咸池其星天柱其卦兑其行金其方赤八宫其神太隂其星天任其卦艮其行土其方白九宫其神天乙其星天英其卦離其行火其方紫觀其統八卦運五行土飛于中數轉于極雖敬事迎釐不聞經見而範圍亭育有助昌時以此兩朝親祀而臻百祥也然以萬物之精上為列星星之運行必繋于物貴而居者則必統八氣􅄣萬神幹權化于混茫賦品彚于隂騭與天地日月誠相參也豈得繄賴于敷祐而屈降于等夷又據太尉攝祀九宫貴神舊儀前七日受誓誡于尚書省散齋四日致齋三日牲用犢祝版御署稱嗣天子臣圭幣樂成比類中祀則無等級今據江都集禮又開元禮蜡祭之日大明夜明二座及朝日夕月皇帝致祝皆率稱臣若以為非泰壇配祀之時得主日報天之儀卑縁厭屈尊用徳伸不以箸在中祠取類常祀此則中祠用大祠之義也又據太社大稷開元之制列在中祠天寳三載二月十四日勅改為大祠自後因循復用前禮長慶三年正月禮官獻議始凖前勅稱為大祠唯御署祝文稱天子謹遣某官某昭告文義以為殖物粒人則宜増秩致祝稱禱有異方丘不以伸為大祠遂屈尊稱此又大祠用中祠之禮也參之日月既如彼考之社稷又如此所謂功鉅者因之以殊禮位稱者不敢易其文是前聖後儒陟降之明徴也今九宫貴神既司水旱降福禳灾人將賴之追舉舊章誠為得禮然以立祠非古宅位有方分職既異其司存致祝必參乎等列求之折衷宜有變通稍重之儀有以為比伏請自今已後却用大祠之禮誓官備物無有降差唯御署祝文以社稷為本伏縁已稱臣于天帝無二尊故也勅㫖依之付所司蕙田案九宫貴神出于術士荒唐之言𤣥宗惑之崇祀類于天地在太廟之上可謂過矣文宗從崔龜從之議降為中祀稍得其平然不逕除之者以其名託星辰有其舉之莫敢廢也武宗崇信道家言時相逢其意遂復升大祀此與漢匡衡奏罷雍舊祠二百三所于祀典大有廓清之力乃未久而復二事頗相類夫邪説之不勝正論常也然自大道不明人心易惑彼邪説者雖一時為正論之所屈而旋息旋作鮮有久而不變者是以定禮制匡流俗不可不先正其本也宋史禮志太乙九宫神位在國門之東郊壇之制四陛外西南又為一陛曰坤道俾行事者升降由之其九宫神壇再成第一成東西南北各百八尺各相去一丈六尺初用中祀咸平中改為大祀壇増兩壝玉用兩圭有邸藉用稿秸加褥如幣色其御書祝禮如社稷尋以封禪别建九宫壇泰山下行宫之東壇二成成一尺面各長五丈二尺四陛及坤道各廣五丈上九小壇相去各八尺四隅各留五尺壇下兩壝依大祠禮及祀汾隂亦遣使祀焉自後親郊恭謝皆遣官于本壇别祭文獻通考宋制二仲祀九宫貴神為大祀咸平四年駕部員外郎直祕閣杜鎬上言案封禪書天神貴者太乙太乙之佐曰五帝今禮以五帝為大祠太乙為中祠况九宫所主風雨霜雹疾疫之事唐朝𤣥肅二宗並甞親祀㑹昌中陞次昊天上帝欲望復為大祀從之宋史樂志景徳祀九宫貴神三首降神高安倬彼垂象照臨下土躔次運行功徳周普九宫既位唯徳是輔神之至止皇皇斯覩奠玉幣酌獻嘉安靈禋既肅明神既秩在國之東協日之吉升歌有儀六變中律懐和萬靈降兹隂騭送神高安祗薦有常唯神無方回飈整馭垂休降祥文獻通考大中祥符元年東封泰山于行宫東築壇二成俱高三尺上成縱廣各五丈下成五丈二尺上為小壇餘如京城祀壇牲用太牢以祀九宫宋史禮志景祐二年學士章得象等定司天監生于淵役人單訓所請祀九宫太一依逐年飛移位次之法案郄良遇九宫法有飛碁立成圖毎歲一移推九州所主災福事又唐術士蘇加慶始置九宫神壇一成高三尺四陛上太一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符于遁甲此則九宫定位設祭以四孟隨歲改位行棋謂之飛位自乾元以後止依本位祭之遂不飛易仍減冬夏二祭國朝因之今于淵等所請合天寳初祭之禮又合良遇飛棋之圖然其法本術家時祭之文經理不載議者或謂不必飛宫若日月星辰躔次周流而祭有常所此則定位之祀所當從也若其推數于回後候神于恍惚因方弭沴隨氣考神則飛位之文固可遵用請依唐禮遇祭九宫之時遣司天監一員詣祠所隨毎年貴神飛棋之方旋定祭位仍自天聖己巳入歴太一在一宫歲進一位飛棋廵行周而復始詔可文獻通考九宫慶歴儀每座籩豆十二簠簋俎二皇祐増定壇如郊祀録三成成三尺四階上依位寘小壇九皆高尺五寸縱廣八尺西南為坤階治平初樞宻副使胡宿言九宫司水旱國家列于常祀至和中光禄小吏慢于祭而震死二人威靈所傳耳目未逺今春夏垂盡而時雨尚愆有惻上仁徧走羣望宜特遣近臣并祠九宫禮院以為舊制毎歲雩祀外水旱稍久皆遣官告天地宗廟社稷及諸寺觀宫廟貴神亦宜准此從之宋史禮志元豐中太常博士何洵直言熙寧祀儀九宫貴神祝文稱嗣天子臣某以禮秩論之當與社稷為比請依祀儀為大祀其祝版即依㑹昌故事及開寳通禮書御名不稱臣又近制諸祠祭牲數正配以全體觧割各用一牢貴神九位悉是正座異壇别祝尊為大祀而共用二少牢于腥熟之俎骨體不備謂宜毎位一牢凡九少牢詔下太常修入祀儀元祐七年監察御史安鼎言案漢武始祠太乙一位唐天寳初兼祀八宫謂之九宫貴神漢祀太乙日用一犢凡七日而止唐祀類于天地今春秋祀九宫太乙用羊豕其四立祭太乙宫十神皆無牲以素饌加酒焉載詳星經太乙一星在紫宫門右天一之南號曰天之貴神其佐曰五帝飛行諸方躡三能以上下以天極星其一明者為常居主使十六神知風雨水旱兵革饑饉疾疫災害之事唐書曰九宫貴神實司水旱太乙掌十六神之法度以輔人極國朝㑹典亦云天之尊神及十精十六度並主風雨由是觀之十神太乙九宫太乙與漢所祀太乙共是一神今十神皆用素饌而九宫並薦羊豕似非禮意詔禮官詳定十神九宫太乙各有所主即非一神故自唐迄今皆用牲牢别無祠壇用素食禮遂依舊制樂志元祐祀九宫貴神二首降神景安六變上天貴神九宫設位功徳及物乃秩明祀望拜紫壇赫然靈氣奠玉薦幣歆之無愧送神景安天之貴神推移九宫厥位靡常降康則同來集于壇顧歆恪恭歌以送之颷静旋穹禮志崇寧三年太常博士羅畸言九宫諸神位無禮神玉惟有燔玉竊謂宜用禮神玉少倣其幣之色薦於神坐議禮局言先王制禮用圭璧以祀日月星辰所謂圭璧者圭其邸為璧以取殺于上帝也今九宫神皆星名而其玉用兩圭有邸夫兩圭有邸祀地之玉以祀星辰非周禮也乞改用圭璧以應古制五禮新儀仲春仲秋祀九宫貴神壇三成一成縱廣十四丈再成縱廣十二丈三成縱廣十丈各高三尺其上依方位寘小壇九各高一尺五寸縱廣八尺四陛又西南為一陛曰坤道兩壝每壝二十五步禮志紹興十一年太常亟朱輅言九宫貴神所主風雨霜雪雹疫所係甚重請舉行祀典太常寺主簿林大鼐亦言十神太乙九宫太乙皆天之貴神國朝分為二並為大祀比一新太乙宫而九宫貴神尚寓屋而不壇乃詔臨安府于國城之東建築九宫壇壝其儀如祀上帝高宗本紀紹興十八年六月甲辰築九宫貴神壇于東郊樂志紹興祀九宫貴神十首降神景安圜鍾為宫紫闕幽宏唯神靈尊輔成泰元贊役乃坤曰雨曰𤾉緼豫調紛享薦隕光蒙祉如屯黄鍾為角載陽衍徳農祥孔昭賚兹元嘏穰穰黍苗象輿眇㝠金奏逺姚無閼厥靈丹衷匪恌太蔟為徴於赫九宫天神之貴煌煌彪列下土是莅幽贊髙穹隂騭萬類肅若舊典有嚴祗事姑洗為羽練時吉良聿崇明祀粢盛潔豐牲碩酒㫖肅唱和聲來燕來止嘉承天休賚及含齒初獻升壇正安於昭毖祀周旋有容歴階將事趨進鞠躬改步如初沒階彌恭左墄右平陟降雍雍太乙位奠玉幣嘉安煌煌九宫照臨下土隂騭庶類功施周普恪修祀典禮備樂舉嘉玉量幣馨非稷黍攝提權星招搖天符青龍咸池太隂太乙位樂曲並同奉俎豐安靈鑒匪逺誠心肅祗是烝是享俎實孔時禮行樂奏肸蠁是期雲車風馬神其燕娭太乙位酌獻嘉安惟天丕冒彪列九神財成元化隂騭下民有酒斯㫖登薦苾芬昭哉降鑒茀禄來臻亞終獻文安均調大化隂騭下民駿功有赫誕舉明禋嘉觴中貳執事惟寅清明鬯矣福禄攸臻送神景安薦獻有序降登無違禮樂備舉昭格燕娭雲車縹緲神曰還歸報以景貺翊我昌期王圻續通考金宣宗興定元年七月以久旱祀九宫貴神于東郊右九宫貴神五禮通考卷三十五
