body:
  text: 五禮通考卷一百三十六刑部尚書秦蕙田撰嘉禮九朝禮蕙田案古者有朝覲之禮無朝賀之文秦改封建為郡縣始有朝十月之禮漢叔孫通起朝儀其制始詳大朝㑹實始於此其冬至稱賀昉於魏晉千秋之節始於有唐前明以元正冬至聖節為三大節我朝因之盖以元正者一嵗之始冬至者一陽之始聖節者人君之始帝王所以臨御萬國臣子所以致敬君父将於是乎觀禮焉若唐五代宋以五月朔受大朝遼以重五稱賀元明則有郊祀慶成受賀其禮大畧相仿遼志别有賀祥瑞平難諸儀皆起於一時創制不合於古今編次五禮概不及録元正冬至朝賀晉書宋遼諸志俱入賓禮今以杜佑通典明集禮㑹典之例載入嘉禮云史記秦始皇本紀二十六年始皇推終始五徳之傳以為水徳之始改年始朝賀皆自十月朔衣服旄旌節旗皆上黒蕙田案三代盛時無所謂朝賀也每日則有視朝之儀月朔則有聽朔之禮聽朔者天子於明堂諸侯於祖廟行之故亦謂之朝廟不於朝也其在嵗首行之則謂之朝正春秋襄二十九年經書公在楚左氏傳云釋不朝正於廟也後世朝正之名盖始於此但古者於廟行告朔之禮所以尊祖後世於朝舉賀嵗之禮乃以尊君名同而實異秦朝賀儀雖不可考然漢叔孫通所起朝儀頗采用之當亦不甚相逺此後代正朔朝㑹之權輿也右秦正旦朝賀叔孫通傳漢已并天下髙帝悉去秦苛儀法為簡易羣臣飲酒爭功醉或妄呼抜劍擊柱髙帝患之叔孫通説上曰儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀髙帝曰得無難乎通曰禮者因時世人情為之節文臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通使徴魯諸生三十餘人及上左右為學者注左右謂近臣也為學謂素有學術與其弟子百餘人為綿蕞野外注應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子説反習之月餘通日上可試觀上使習禮曰吾能為此廼令羣臣習肄㑹十月漢七年長樂宫成諸侯羣臣皆朝十月注適㑹長樂宫新成漢時尚以十月為正月故行朝嵗之禮史家追書十月儀叙下儀法先平明未平明之前謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志傳曰趨傳聲教入者皆令趨謂疾行為敬也殿下郎中俠陛陛數百人俠與挾同挾其兩旁毎陛皆數百人功臣列侯諸将軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賓臚句傳上傳告下為臚下告上為句也大行掌賓客之禮今之鴻臚九賓則九儀也謂公侯伯子男卿大夫士也於是皇帝輦出房百官執㦸傳警傳聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不振恐肅敬至禮畢復置法酒法酒猶言禮酌謂不飲之至醉諸侍坐殿上皆伏抑首抑屈也謂依禮法不敢平坐而視以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝起曰吾乃今日知為皇帝之貴也乃拜叔孫通為太常賜金五百斤讀史管見胡氏寅曰帝王之禮因革損益至周而大備周八百年雖柄移祚迄其朝廷所用者無利害於爭戰從横之事雖秦火書滅籍亦必有知其畧者誠能深知詢求草創而潤色之縱不得其全亦當參互有見使聖帝明王制儀立度文章物采寓法象形禁戒之意後猶有考不亦美哉惜乎漢髙智不及此而叔孫通委己從人諧世而取寵也邱氏濬曰此後世嵗首行朝賀禮之始漢承秦制以十月為嵗首故也武帝始行夏正而以正月為嵗首然朝賀之禮則仍其舊用十月焉至後漢始命行朝㑹禮於正月此禮三代以前雖未有其制然嵗序更端之始萬物維新凡為臣子者畢來朝㑹以致其履端之慶亦義之當然也蕙田案朝賀之禮在嵗首正月朔秦漢以十月為正月其云朝十月者史家於太初改厯之後追書之顔師古注漢書其説甚明太初改用夏正則朝賀自當在正月武帝紀太初四年春正月朝諸侯王於甘泉宫後元二年春正月朝諸侯王於甘泉宫宣帝紀五鳯三年單于稱臣使弟奉珍朝賀正月甘露二年匈奴呼韓邪單于欵五原塞願奉珍以朝三年正月是其證也杜佑通典云武帝雖用夏正然毎月朔朝至于十月朔猶常享㑹葢漢儀諸侯王惟朝正月公卿則毎月常朝以十月舊為嵗首故亦有享㑹之禮瓊山邱氏據此以為西漢朝賀常在十月誤矣史記髙祖本紀九年未央宫成高祖大朝諸侯群臣置酒未央前殿高祖奉玉巵為太上皇夀殿上群臣皆呼萬嵗吕后本紀孝惠三年方築長安城六年城就諸侯來㑹十月朝賀漢書髙后本紀二年春詔曰髙皇帝匡飭天下諸有功者皆受分地為列侯萬民大安莫不受休徳朕思念至於久逺而功名不著亡以尊大誼施後世今欲差次列侯功以定朝位藏於髙廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相陳平言謹與絳侯臣勃曲周侯臣商潁陰侯臣嬰安國侯臣陵等議列侯幸得賜餐錢奉邑陛下加惠以功次定朝位臣請藏高廟奏可蕙田案高帝時已定蕭曹以下十八侯位次至高后二年詔丞相平盡差列侯之功則自陳濞以下至須無共一百三十七人其朝位則如淳注漢書謂功大者位在上是也南齊書禮志秦人以十月旦為嵗首漢初習以大饗㑹後用夏正饗㑹猶未廢十月旦會也蕙田案志所云可正邱氏以朝賀仍舊在十月之誤决疑要注古者朝㑹皆執贄侯伯執圭子男執璧孤執皮帛卿執羔大夫執鴈士執雉漢魏粗依其制正旦大㑹諸侯執玉璧薦以鹿皮公卿以下所執如古禮古者衣皮故用皮帛為幣玉以象德璧以稱事也大學衍義補漢有天子大㑹殿為周之外朝蕭何造未央宫言前殿宜有後殿大㑹殿為外朝宫中有後殿為治朝七年諸侯羣臣朝長樂宫葢大朝㑹之所蕙田案鄭康成注周禮槀人云今司徒府中有百官朝㑹之殿云天子與丞相舊決大事焉是外朝之存者與然則漢無大㑹殿之名也邱氏之説葢承葉石林之誤又漢時朝正月或在長樂宫或在未央宫或在甘泉宫或在建章宫隨上所在無定所不必常在長樂也右西漢正旦朝賀續漢書禮儀志毎月朔嵗首為大朝受賀其儀夜漏未盡七刻鐘鳴受賀及贄公侯璧中二千石二千石羔千石六百石鴈四百石以下雉獻帝起居注舊典市長執雁建安八年始令執雉百官賀正月二千石以上上殿稱萬嵗舉觴御坐前司空奉羮大司農奉飯奏食舉之樂百官受賜宴享大作樂其毎朔惟十月旦從故事者高祖定秦之月元年嵗首也蔡質漢儀正月旦天子幸德陽殿臨軒公卿將大夫百官各陪朝賀蠻貊胡羗朝貢畢見屬郡計吏皆陛覲庭燎宗室諸劉雜㑹萬人以上立西面定位公納薦太官賜酒食西入東出既定上夀計吏中庭北面立太官上食賜羣臣酒食貢事御史四人執法殿下虎賁羽林弧弓撮矢陛㦸左右戎頭偪脛陪前向後左右中郎將往東西羽林虎賁將往東北五官將往中央悉坐就賜作九賓徹樂舎利從西方來戯於庭極乃畢入殿前激水化為比目魚跳躍嗽水作霧障日畢化成黄龍長八丈出水遨戯於庭炫燿日光以兩大絲繩係兩柱中頭間相去數丈兩倡女對舞行於繩上對面道逢切肩不傾又蹋局藏形於斗中鐘磬並作樂畢作魚龍曼延小黄門吹三通謁者引公卿羣臣以次拜微行出罷卑官在前尊官在後徳陽殿周旋容萬人陛髙一丈皆文石作壇激沼水於殿下書屋朱梁玉階金柱刻鏤作宫掖之好厠以青翡翠一柱三帶韜以赤緹天子正旦節㑹朝百僚於此自到偃師去宫四十三里望朱雀五闕德陽其上鬱律與天連雒陽宫閣簿云德陽宫殿南北行七丈東西行三十七丈四尺蕙田案正旦朝㑹百僚為盛禮所在乃以雜技遊戯不經凟禮莫此為甚班固東都賦春王三朝㑹同漢京是日也天子受四海之圗籍膺萬國之貢珍内撫諸夏外接百蠻乃盛禮樂供帳置乎雲龍之庭陳百僚而贊羣后究皇儀而展帝容端門東有崇賢門次外有雲龍門於是庭實干品㫖酒萬鍾列金罍班玉觴嘉珍御太牢享爾乃食舉雍徹泰師奏樂陳金石布絲竹鐘鼔鏗鎗管絃􅂱煜抗五聲極六律歌九功舞八佾韶武備太古畢四夷間奏德廣所及伶佅兜離㒺不具集萬樂備百禮暨皇懽浹羣臣醉䧏烟煴調元氣然後撞鐘告罷百僚遂退蔡邕獨斷正月朝賀三公奉璧上殿向御座北面太常贊曰皇帝為君興三公伏皇帝坐乃進璧古語曰御坐則起此之謂也舊儀三公以後月朝後省常以六月朔十月朔旦朝後又以盛暑省六月朝故今獨以為正月十月朔朝也南齊書禮志東京以後正旦夜漏未盡七刻鳴鐘受賀張衡賦云皇輿夙駕登天光於扶桑然則雖云夙駕必辨色而行事矣宋書禮志舊有充庭之制臨軒大㑹陳乗輿車輦旌鼓於殿庭張衡賦云龍路充庭鸞旗拂霓後漢書朱暉傳驃騎將軍東平王蒼辟之甚禮敬焉正月朔日蒼當入賀故事少府給璧是時陰就為府卿貴驕吏傲不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰我數聞璧而未嘗見試請觀之主簿以授暉暉顧召令史奉之主簿大驚遽以白就就曰朱掾義士勿復求更以他璧朝蒼既罷召暉謂曰屬者掾自視孰與藺相如帝聞壯之陳翔傳翔拜侍御史時正旦朝賀大将軍梁冀威儀不整翔奏冀恃貴不敬請收案罪後漢書安帝本紀永初元年春正月元日㑹徹樂不陳充庭車毎大朝㑹必陳乗輿法物車輦於庭故曰充庭車以年饑故不陳晉書禮志漢建安中將正㑹而太史上言正旦當日蝕朝士疑㑹否共諮尚書令荀彧時廣平計吏劉邵在坐曰梓慎裨竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異預廢朝禮者或災消異伏或推術謬誤也彧及衆人咸善而從之遂朝㑹如舊日亦不蝕邵由此顯名南齊書禮志漢末蔡邕立漢朝㑹志竟不就蕙田案兩漢朝㑹樂章無可考蔡邕禮樂志云漢樂四品其三曰黄門鼓吹天子所以晏樂羣臣此即三朝食舉之樂也又云孝章皇帝親著歌詩四章列在食舉今其詩亦不傳右後漢正旦朝賀晉書禮志魏氏承漢末大亂舊章殄㓕命侍中王粲尚書衞覬草創朝儀南齊書禮志魏武都鄴正㑹文昌殿用漢儀又設百華燈文帝修洛陽宫室權都許昌宫殿狹小元日於城南立氊殿青帷以為門設樂享㑹後還洛陽依漢舊事宋書禮志何承天云魏元㑹儀無存者案何禎許都賦曰元正大饗壇彼西南旗幕峩峩檐宇𢎞深王沈正㑹賦又曰華幄映於飛雲朱幙張於前庭絙青帷於兩階象紫極之崢嶸咸百辟於和門等尊卑而奉璋此則大饗悉在城外不在宫内也臣案魏司空王朗奏事曰故事正月朔賀殿下設兩百華燈對於二階之間端門設庭燎火炬端門外設五尺三尺燈月照星明雖夜猶晝矣如此則不在城外也何王二賦本不在洛京何云許都賦時在許昌也王賦又云朝四國於東巡亦賦許昌正㑹也魏文帝本紀黄初元年注案諸書紀是時帝居北宫以建始殿朝羣臣門曰承明陳思王植詩曰謁帝承明廬是也宋書禮志魏黄初三年始奉璧朝賀魏志明帝本紀景初元年春正月有司奏以為魏得地統宜以建丑之月為正朝㑹建太白之旗宋書禮志景初三年十二月尚書盧毓以烈祖明皇帝以今年正日棄離萬國禮忌日不樂甲乙之謂也烈祖明皇帝建丑之月棄天下臣妾之情於此正月有甚甲乙今若以建丑正朝四方㑹羣臣設盛樂不合於禮博士樂祥議正日旦受朝貢羣臣奉贄後五日乃大宴㑹作樂大尉屬朱誕議今因宜改之際還修舊則元首建寅於制為便大将軍屬劉肇議宜過正一日乃朝賀大㑹明令天下知崩亡日不朝也詔曰烈祖明皇帝以正日棄天下毎與皇太后念此日至心有剝裂不可以此日朝羣辟受慶賀也月二日㑹又非故也聽當還夏正月雖違先帝通三統之義斯亦子孫哀慘永懷又夏正朔得天數者其以建寅之月為嵗首蕙田案禮記祭義云君子有終身之喪忌日之謂也鄭氏以忌日為親亡之日忌日不用舉他事魏明帝以元正日崩便是忌日朝賀之禮自應不舉適㑹其時改用丑正因改朝正之禮於建寅復用夏時事出偶然耳不然則如劉肇議過正一日朝㑹似亦可行也魏志鍾繇傳明帝時有疾拜起不便時華歆亦以高年疾病朝見皆使載輿虎賁士輿上殿就座是後三公有疾以為故事蕙田案魏志正始六年詔太傅乗輿升殿此又在鍾繇華歆之後但此等類非純臣之事史冊所載不可覼縷今盡刪去以存君臣上下之分此條以三公沿襲成例故存之晉書樂志杜䕫傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭及太和中左延年攺䕫騶虞伐檀文王三曲更自作聲節其名雖存而聲實異惟因䕫鹿鳴全不改易毎正旦大㑹太尉奉璧群后行禮東廂雅樂常作者是也後又改三篇之行禮詩第一曰於赫篇詠武帝聲節與古鹿鳴同第二曰巍巍篇詠文帝用延年所改騶虞聲第三曰洋洋篇詠明帝用延年所作文王聲第四曰復用鹿鳴鹿嗚之聲重用而除古伐檀蕙田案魏朝賀諸樂章俱不存右魏正旦朝賀晉書禮志晉氏受命武帝更定元㑹儀咸寜注是也傅𤣥元㑹賦曰考夏后之遺訓綜殷周之典藝採奏漢之舊儀定元正之嘉㑹此則兼採衆代可知矣咸寜注先正一日有司各宿設宋志守宫宿設王公卿校便坐於端門外大樂鼓吹又宿設四廂樂及牛馬帷閤於殿前夜漏未盡十刻羣臣集到庭燎起火上賀起謁報又賀皇后還從雲龍東中華門入詣東閤下便坐漏未盡七刻百官及受贄郎官以下至計吏皆入立其次其陛衞者如臨軒儀漏未盡五刻謁者僕射大鴻臚各各奏羣臣就位定漏盡侍中奏外辦皇帝出鐘鼔作百官皆拜伏太常𨗳皇帝升御座鐘鼔止百官起大鴻臚跪奏請朝賀掌禮郎讃皇帝延王登大鴻臚跪讃藩王臣某等奉白璧各一再拜賀太常報王悉登謁者引上殿當御座皇帝興王再拜皇帝坐復再拜跪置璧御座前復再拜成禮訖謁者引下殿還故位掌禮郎讃皇帝延太尉等於是公特進匈奴南單于金紫將軍當大鴻臚西中二千石二千石千石六百石當大行令西皆北面伏鴻臚跪讚太尉中二千石等奉璧皮帛羔鴈雉再拜賀太常讚皇帝延公等登掌禮引公至金紫将軍上殿皇帝興皆再拜皇帝坐又再拜跪置璧皮帛御座前復再拜成禮訖謁者引下殿還故位公置璧成禮時大行令並讚殿下中二千石以下同成禮訖以贄授贄郎郎以璧帛付諸謁者羔雁雉付太官太樂令跪奏雅樂樂以次作乗黄令乃出車皇帝罷入百官皆坐晝漏上水六刻諸蠻夷胡客以次入皆再拜訖坐御入後三刻又出鐘鼔作謁者僕射跪奏請群臣上謁者引王公二千石上殿千石六百石停本位謁者引王詣罇酌夀酒跪授侍中侍中跪置御坐前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬嵗四廂樂作百官再拜已飲又再拜謁者引王等還本位陛下者傳就席羣臣皆跪諾侍中中書令尚書令各於殿上上夀酒登歌樂升太官又行御酒御酒升階太官令跪授侍郎侍郎跪進御座前乃行百官酒太樂令跪奏奏登歌三終乃降太官令跪請具御飯到階羣臣皆起太官令持􅃵跪授司徒持飯跪授大司農尚食持案並授持節持節跪進御座前羣臣就席太樂令跪奏奏食舉樂太官行百官飯案徧食畢太樂令跪奏請進樂樂以次作鼔吹令又前跪奏請以次進衆妓乃召諸郡計吏前受敕戒於階下奏樂畢謁者一人跪奏請罷退鐘鼔作羣臣北面再拜出然則夜漏未盡七刻謂之晨賀書漏上三刻更出百官奉夀酒謂之晝㑹别置女樂三十人於黄帳外奏房中之歌蕙田案自漢以後晉書志朝儀始詳宗元案晉朝儀尚無不用庭燎者益知小雅宣王早朝詩不必据庭燎二字而以為非常朝之時也輿服志臨軒大㑹則陳乗輿車輦旌鼔於其殿庭象車漢鹵簿最在前武帝太康中平呉後南越獻馴象詔作大車駕之以載黄門鼔吹數十人使越人騎之元正大㑹駕象入庭南齊書禮志晉朝㑹儀夜漏未盡十刻庭燎起火羣臣集傅元朝㑹賦云華燈若乎火樹熾百枝之煌煌此則因魏儀與庭燎並設也史臣曰案晉中朝元㑹設卧騎倒騎顛騎自東華門馳往神武門此亦角抵雜戯之流也晉書樂志晉初食舉亦用鹿鳴至泰始五年尚書奏使太僕傅𤣥中書監荀朂黄門侍郎張華各造正旦行禮及王公上夀酒食舉樂歌詩荀朂云魏氏行禮食舉再取周詩鹿鳴以為樂章又鹿鳴以宴嘉賓無取於朝考之舊聞未知所應朂乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝宗之義又為正旦大㑹王公上夀歌詩并食舉樂歌詩合十三篇又以魏氏歌詩或二言或三言或四言或五言與古詩不類以問司律中郎將陳頎頎曰被之金石未必皆當故朂造晉歌皆為四言惟王公上夀酒一篇為三言五言焉張華以為魏上夀食舉詩及漢氏所施用其文句長短不齊未皆合古盖以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近之所能改二代三京襲而不變雖詩章辭異廢興隨時至其韻逗留曲折皆繫於舊有由然也是以一皆因就不敢有所改易此則華朂所明異㫖也時詔又使中書侍郎成公綏亦作焉今並採列之云宋書樂志晉四廂樂歌三首傅𤣥造天鑒有晉世祚聖皇時齊七政朝此萬方其一鐘鼔斯震九賓備禮正位在朝穆穆濟濟其二煌煌三辰寔麗於天君后是象威儀孔䖍其三率禮無愆莫匪邁德儀形聖皇萬邦惟則其四右天鑒四章章四句正旦大㑹行禮歌於赫明明聖德龍興三朝獻酒萬夀是膺敷佑四方如日之升自天降祚元吉有徴右於赫一章八句上夀酒歌天命大晉載育羣生於穆上徳隨時化成其一自祖配命皇皇后辟繼天創業宣文之績其二丕顯宣文先知稼穡克恭克儉足教足食其三既教食之𢎞濟艱難上帝是祐下民所安其四天祐聖皇萬邦來賀雖安勿安乾乾匪暇其五乃正丘郊乃定冡社廙廙作宗光宅天下其六惟敬朝饗爰奏食舉盡禮供御嘉樂有序其七樹羽設業笙鏞以間琴瑟齊列亦有箎塤其八喤喤鼓鐘鎗鎗磬管八音克諧載夷載簡其九既夷既簡其大不禦風化潜興如雲如雨其十如雲之覆如雨之潤聲教所暨無思不順其十一教以化之樂以和之和而養之時惟邕熈其十二禮順其儀樂節其聲於鑠皇繇既和且平其十三右天命十三章章四句食舉東西廂歌晉四廂樂歌十七篇荀朂造正旦大㑹行禮歌四篇於皇元首羣生資始履端大享敬御繁祉肆覲群后爰及卿士欽順則元允也天子於皇一章八句當於赫明明天子臨下有赫四表宅心惠浹荒貊柔逺能邇孔淑不逆來格祁祁邦家是若明明一章八句當巍巍光光邦國天篤其祜丕顯哲命顧柔三祖世徳作求奄有九土思我皇度彛倫攸序邦國一章八句當洋洋惟祖惟宗高朗緝熈對越在天駿惠在兹聿求厥成我皇崇之式固其猷徃敬用治祖宗一章八句當鹿鳴正旦大㑹王公上夀酒歌一篇踐元辰延顯融獻羽觴祈令終我皇夀而隆我皇茂而嵩本枝奮百世休祚鍾聖躬踐元辰一章八句當觴行食舉樂東西廂歌十二篇煌煌七燿重明交暢我有嘉賓是應是貺邦政既圖接以大饗人之好我式遵徳讓煌煌一章八句當鹿鳴賓之初筵藹藹濟濟既朝乃晏以洽百禮頒以位叙或庭或陛登擯台叜亦有兄弟胥子陪寮憲兹度楷觀頥養正䧏福孔偕賓之初筵一章十二句當於穆昔我三后大業是維今我聖皇焜燿前暉奕世重規明照九畿思輯用光時罔有違陟禹之跡莫不來威天被顯禄福履是綏三后一章十二句當昭昭赫矣太祖克廣明德廓開㝢宙正世立則變化不經民無瑕慝剏業垂統兆我晉國赫矣一章八句當華華烈文伯考時惟帝景夷險平亂威而不猛御衡不迷皇塗焕炳七德咸宜其寜惟永烈文一章八句當朝宴猗歟盛歟先皇聖文則天作孚大哉為君慎徽五典帝載是勤文武發揮茂建嘉勲修已濟治民用寜殷懷逺燭幽元氣氛氲善世不伐服事參分徳博化隆道冒無垠猗歟一章十六句當盛徳隆化洋洋帝命溥将登我晉道越惟聖皇龍飛革運臨燾八荒叡哲欽明配蹤虞唐封建厥福駿發其祥三朝習吉終然永臧其臧惟何總彼萬方元侯列辟四岳藩王時見世享率茲有常旅輯在庭嘉客在堂宋衞既臻陳留山陽我有賓使觀國之光貢賢納計獻璧奉璋保祐命之申錫無疆隆化一章二十八句當綏萬邦振鷺于飛鴻漸其翼京邑穆穆四方是式無競惟人王綱允敕君子來朝言觀其極振鷺一章八句當朝朝翼翼大君民之攸暨信理天工惠康不匱将逺不仁訓以淳粹幽明有倫俊乂在位九族既睦庶邦順比開元布憲四海鱗萃協時正統殊途同致厚徳載物靈心隆貴敷奏讜言納以無諱樹之典象誨之義類上教如風下應如卉一人有慶羣萌以遂我后宴喜令聞不墜翼翼一章二十六句當順天既宴既喜翕是萬邦禮儀卒度物其有容晢晢庭燎喤喤鼓鐘笙磬詠德萬舞象功八音克諧俗易化從其和如樂庶品時邕既宴一章十二句當陟天庭時邕份份六合同塵徃我祖宣威静殊鄰首定荆楚遂平燕秦娓娓文皇邁德流仁爰造草昧應乾順民靈瑞告符休徴饗震天地弗違以和神人既戡庸蜀吴㑹是賓肅慎率職楛矢來陳韓濊進樂均協清鈞西旅獻獒扶南效珍蠻裔重譯𤣥齒文身我皇撫之景命惟新時邕一章二十六句當參兩儀愔愔嘉㑹有聞無聲清酤既奠籩豆既馨禮充樂備簫韶九成愷樂飲酒酣而不盈率土歡豫邦國以寜王猷允塞萬載無傾嘉㑹一章十二句晉四廂樂歌十六篇張華造稱元慶奉夀觴后皇延遐祚安樂撫萬方右王公上夀詩一章明明在上丕顯厥繇翼翼三夀蕃后惟休羣生漸德六合承流三正元辰朝慶麟萃華夏奉職貢八荒覲殊類黻冕充廣庭鳴玉盈朝位濟濟朝位言觀其光儀序既以時禮文渙以彰思皇享多祜嘉樂永無央九賓在庭臚讚既通升瑞奠贄乃侯乃公穆穆天尊隆禮動容履端承元吉介福御萬邦朝享上下咸雍崇多儀繁禮容舞盛德歌九功揚芳烈播休蹤皇化洽洞幽明懷柔百神輯祥禎潛龍躍雕虎仁儀鳳鳥屆游鱗枯蠧榮竭泉流菌芝茂枳棘柔和氣應休徵絃此字疑誤協靈符彰帝期綏宇宙萬國和昊天成命賚皇家賚皇家本在第五章之末今按音節宜在此世資聖哲三后在天啟鴻烈啟鴻烈隆皇基率土謳吟欣戴於時恒文示象代氣著期泰始開元龍升在位四隅同風燮寜殊類五韙來備嘉生以遂凝庶績臻太康申繁祉允無疆本支百世繼緒不忘繼緒不忘休有烈光永言配命惟晉之祥聖明統世篤皇仁廣大配天地順動若陶鈞元化參自然至德通明神清風暢八極流澤被無垠於皇時晉奕世齊聖惟天降嘏神祗保定𢎞濟區夏允集大命有命既集光帝猷大明重耀鑑六幽聲教洋溢惠滂流惠滂流移風俗多士盈朝賢俊比厔敦世心斵雕反素樸反素樸懷庶方干戚舞階庭疏狄説遐荒扶南假重譯肅慎襲衣裳雲覆雨施德洽無疆旁作穆穆仁化翔朝元日賓王庭承宸極當盛明衍和樂竭祗誠仰嘉惠懷徳馨游淳風泳淑清協億兆同歡榮建皇極統天位運陰陽御六氣殷羣生成性類王道浹治功成人倫序俗化清䖍明祀秪三靈崇禮樂式儀形慶元吉宴三朝播金石詠泠簫奏九夏舞雲韶邁徳音流英聲八紘一六合寜六合寜承聖明王澤洽道登隆綏函夏總華戎齊徳教混殊風混殊風康萬國崇夷簡尚敦徳𢎞王度表遐則右食舉東西廂樂詩十一章於赫皇祖迪哲齊聖經緯大業基天之命克開洪緒誕篤天慶旁濟彛倫仰齊七政烈烈景皇克明克聰静封畧定勲功成民立政儀形萬邦式固崇軌光紹前蹤允文烈考濬哲應期參德天地比功四時大亨以正庶績咸熈肇啟晉宇遂登皇基明明我后𤣥德通神受終正位協應天人容民厚下育物流仁濟我王道暉光日新右雅樂正旦大㑹行禮詩四章蕙田案張華四廂樂歌十六篇晉書不載但以志考之旣述華朂異㫖即云今並採列之似亦録華所作疑傳寫脱之也今依宋志増入晉四廂歌十六篇成公綏造上夀酒樂未央大晉應天慶皇帝永無疆右詩一章王公上夀酒所用穆穆天子光臨萬國多士盈朝莫匪俊徳流化罔極王猷允塞嘉㑹置酒嘉賓充庭羽旄燿宸極鐘鼓振太清百辟朝三朝彧彧晉志作式式明儀形濟濟鏘鏘金振玊聲晉志作金聲玉振於韻不協禮樂具宴嘉賓眉夀祚聖皇景福惟日新羣后戾止有來雝雝獻酬納贄崇此禮容豐羞萬俎㫖酒千鍾嘉賓盡宴樂福禄咸攸同樂哉天下安寜道化行風俗清簫韶作詠九成年豐穰世太平至治哉樂無窮元首聰明股肱忠樹豐澤揚清風嘉瑞出靈應彰麒麟見鳯凰翔醴泉湧流中唐嘉禾生穗盈箱降繁祉祚聖皇承天位統萬國受命應期授聖徳四世重光宣開洪業景克昌文欽明徳彌彰肇啟晉邦流祚無疆泰始建元鳳凰龍興龍興伊何享祚萬乗奄有八荒化育黎蒸圖書煥炳金石有徵徳光大道熙隆被四表格皇穹奕奕萬嗣明明顯融此下疑有脱句髙朗令終保兹永祚與天比崇聖皇君四海順人應天期三葉合重光泰始開洪基明燿參日月功化侔四時宇宙清且泰黎庶咸雝熈善哉雝熈惟天降命翼仁祐聖於穆三皇載德彌盛總齊璿璣光統七政百揆時序化若神聖四海同風興至仁濟民育物擬陶鈞擬陶鈞垂惠潤皇皇羣賢峩峩英儁德化宣芬芳播來𦙍播來𦙍垂後昆清廟何穆穆皇極闢四門萬機無不綜娓娓晋志作亹亹翼翼樂不及荒饑不遑食大禮既行樂無極登崑崙上増城乗飛龍升泰清冠日月佩五星揚虹蜺建彗旌披慶雲䕃繁榮覽八極游天庭順天地和陰陽序四氣燿三光張帝網正皇綱播仁風流惠康邁洪化振靈威懷萬方納九夷朝閶闔宴紫㣲建五旗羅鐘簴列四縣奏韶武鏗金石揚旌羽縱八佾巴渝舞詠雅頌和律吕于胥樂樂聖主化蕩蕩清風泄總英雄御俊傑開宇宙掃四裔光緝熙美聖哲超百代揚休烈流景祚顯萬世皇皇顯祖翼世佐時寜濟六合受命應期神武鷹揚大化咸熙廓開皇衢用成帝基光光景皇無競維烈匡時拯俗休功葢世宇宙既康九域有截天命降監啟祚明哲穆穆烈考克明克儁實天生徳誕膺靈運肇建帝業開國有晉載徳奕世垂慶洪允明明聖龍飛在天與靈合契通徳幽元仰化清雲俯育重淵受靈之祐於萬斯年右雅樂正旦大㑹行禮詩十五章蕙田案成公綏王公上夀酒一章晉志失載依宋志增入宋書樂志晉鞞舞歌五篇又鐸舞歌一篇幡舞歌一篇鼔舞伎六曲並陳於元㑹江左又有拂舞陳於殿庭蕙田案漢鼙舞歌闗東有賢女章和二年中樂久長四方皇殿前生桂樹五篇魏鼙舞歌明明魏皇帝太和有聖帝魏歴長天生蒸民為君既不易五篇今俱不傳晉鐸舞歌二篇其一竟不可句讀拂舞歌五篇所詠俱無闗元㑹之事惟傅元所造鼙舞五篇一曰洪業二曰天命三曰景皇帝四曰大晉五曰明君歌詠晉德陳於元會為宜以非朝會正曲故不録晉書武帝本紀咸寜二年春正月以疾疫廢朝禮志武帝咸寧三年四年並以正旦合朔却元㑹改魏故事也惠帝本紀永平元年春正月乙酉朔臨朝不設樂禮志武帝以來國有大喪輙廢樂終三年惠帝太安元年太子喪未除及元㑹亦廢樂蕙田案孔子稱三年之喪食㫖不甘聞樂不樂晉故事國有大喪元㑹輟樂者三年於禮為合若恵帝以愍懷之喪未除而元㑹廢樂揆之春秋叔向譏景王之義亦為允協盖晉時儒者以凶禮為亟儀禮喪服一篇專門訓詁者亡慮十數家故國有大喪尚能據禮是正鄭王諸大儒之流風猶有存者未可概以清談薄之也江左多虞不復晨賀夜漏未盡十刻開宣陽門至平明始開殿門晝漏上水五刻皇帝乃出受賀皇太子出㑹者則在三恪下王公上正旦元㑹設白獸樽於殿庭樽葢上施白獸若有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也為白獸盖是後世所為示忌憚也蕙田案東晉朝賀因行酒舊制設白獸樽以招直言雖非古禮勝於伏謁上夀者多矣宋書樂志魏晉訖江左正旦朝賀有夏育扛鼎巨象行乳神龜抃舞背負靈岳桂樹白雪畫地成川之樂晉成帝咸康七年散騎侍郎顧臻表雜伎而傷人者皆宜除之於是除髙絙紫鹿跂行鼈食及齊王捲衣笮兒等樂又減其禀其後復髙絙紫鹿焉元帝本紀太興元年春正月戊申朔臨朝懸而不樂明帝本紀太寜二年春正月丁丑帝臨朝停饗宴之禮懸而不樂晉書禮志康帝建元元年太史上元日合朔後復疑應却㑹與否庾氷輔政寫劉邵議以示八座於是有謂邵為不得禮意荀彧從之是勝人之一失故蔡謨遂著議非之曰邵論災消異伏又以梓慎裨竈猶有錯失太史上言亦不必審其理誠然也而云聖人垂制不為變異預廢朝禮此則謬矣災祥之發所以譴告人君王者之所重誡故素服廢樂退避正寝百官降物用幣伐鼓躬親而救之夫敬誡之事與其疑而廢之寜慎而行之故孔子老􅆅助葬於巷黨以表不見星而行故日蝕而止柩曰安知其不見星也而邵廢之是棄聖賢之成規也魯桓公壬申有災而以乙亥嘗祭春秋譏之災事既過猶追懼未巳故廢宗廟之祭况聞天眚将至行慶樂之㑹於禮乖矣禮記所云諸侯入門不得終禮者謂日官不預言諸侯入見蝕乃知耳非先聞當蝕而朝㑹不廢也引此可謂失其義㫖劉邵所執者禮記也夫子老􅆅巷黨之事亦禮記所言復違而反之進退無據然荀令所言漢朝所從遂使此言至今見稱莫知其誤矣後君子将擬以為式故正之云耳於是氷從衆議遂以却㑹蕙田案蔡謨駁劉邵之議甚當宗元案劉邵之議一時巧辨非禮意也荀文若學術本疎故為強詞所奪而典禮幾廢得蔡謨此議乃能駁正前違開示衆惑誰謂晉人清談逺遜漢儒歟永和中殷浩輔政又欲從劉邵議不却㑹王彪之據咸寜建元故事又曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非謂先存其事而僥倖史官推術謬錯故不豫廢朝禮也於是又從彪之議恭帝本紀元熙元年春正月壬辰朔以山陵未厝不朝㑹右晉正旦朝賀南齊書禮志宋世晝漏至十刻乃受賀宋書樂志宋武帝永初元年十二月有司又奏依舊正旦設樂參詳屬三省改大樂諸歌舞詩黄門侍郎王韶之立三十二章合用教試日近宜逆誦習輙申攝施行詔可宋四廂樂歌五篇王韶之造於鑠我皇體仁包元齊明日月比量乾坤陶甄百王稽則黄軒訏謨定命辰告四蕃将将蕃后翼翼羣僚盛服待晨明發來朝饗以八珍樂以九韶仰祗天顔厥猷孔昭法章旣設初筵長舒濟濟列辟端委皇除飲和無盈威儀有餘温恭在位敬終如初九功旣歌六代惟時被徳在樂宣道以詩穆矣太和品物咸熙慶積自逺告成在兹右肆夏樂歌四章客入於四廂振作於鑠曲皇帝當陽四廂振作将将曲皇帝入變服四廂振作於鑠将将二曲又黄鐘太簇二廂作法章九功二曲大哉皇宋長發其祥纂系在漢統源伊唐徳之克明休有烈光配天作極辰居四方皇矣我后聖徳通靈有命自天誕授休禎龍飛紫極造我宋京光宅宇宙赫赫明明右大㑹行禮歌二章姑洗廂作獻夀爵慶聖皇靈祚窮二儀休明等三光右王公上夀歌一章黄鐘廂作明明大宋緝熙王道則天垂化光定天保天保既定肆覲萬方禮繁樂富穆穆皇皇沔彼流水朝宗天池洋洋貢職抑抑威儀既習威儀亦閑禮容一人有則作孚萬邦烝哉我皇固天誕聖履端惟始對越休慶如天斯久如日斯盛介兹景福永固駿命右殿前登歌三章别有金石晨羲載燿萬物咸覩嘉慶三朝禮樂備舉元正肇始典章暉明萬方畢來賀華裔充皇庭多士盈九位俯仰觀玉聲恂恂俯仰載爛其煇鼓鐘震大區禮容塞皇闈思樂窮休慶福履同所歸五玉既獻三帛是􅏪爾公爾侯鳴玉華殿皇皇聖后降禮南面元首納嘉禮萬邦同歡願休哉君臣嘉燕建五旗立四縣樂有文禮無倦融皇風窮一變體至和感陰陽徳無不柔繁休祥瑞徽璧應嘉鐘舞靈鳳躍潛龍景星見甘靈墜木連理禾同穂元化洽仁澤敷極禎瑞窮靈符懷荒裔綏齊民荷天祐靡不賓靡不賓長世宏盛昭明有融繁嘉慶繁嘉慶熙帝載合氣成和蒼生欣戴三靈協瑞惟新皇代王道四達流仁布徳窮理詠乾元垂訓順帝則靈化侔四時幽誠通元黙徳澤被八紘乾寜軌萬國皇猷緝咸熙泰禮儀焕帝庭要荒服遐外被髪襲纓冠左袵回衿帶天覆地載流澤汪濊聲教布濩徳光大開元辰畢來王奉貢職朝后皇鳴珩佩觀典章樂王度説徽芳陶盛化㳺太康丕昭明永克昌惟永初徳丕顯齊七政敷五典彛倫序洪化闡王澤流太平始樹聲教明皇紀和靈祇恭明祀衍景祚膺嘉祉禮有容樂有儀金石陳干羽施邁武濩均咸池歌南風舞徳稱文武焕頌聲興王道純徳彌淑寜八表康九服道禮讓移風俗移風俗永克融歌盛美造成功詠徽烈邈無窮右食舉歌十章黄鐘太簇二廂交作黄鐘作晨羲體至和王道開元辰禮有容五曲太簇作五玉懷荒裔皇猷緝惟永初王道純五曲宋前舞後舞歌二篇王韶之造於赫景明天監是臨樂來伊陽禮作惟陰歌自徳富儛由功深庭列宫縣陛羅瑟琴翿籥繁㑹笙歌諧音簫韶雖古九成在今道志和聲徳音孔宣光我帝基協靈配乾儀形六合化穆自然如彼雲漢為章于天熙熙萬類陶和當年擊轅中韶永世弗騫右前舞歌一章晉王徳之舞㽔賓廂作假樂聖后實天誕徳積美自中王猷四塞龍飛在天儀形萬國欽明惟神臨朝淵黙不言之化品物咸徳告成於天銘勲是勒翼翼厥猶娓娓其仁順命剏制因定和神海外有截九圍無塵冕瑬司契垂拱臨民乃舞大豫欽若天人純嘏孔休萬載彌新右後舞歌一章晉大豫之舞㽔賓廂作蕙田案宋志云晉泰始九年荀朂使郭瓊宋識等造正徳大豫之舞咸寜元年詔定祖宗之號而廟樂同用正徳大豫舞然則此二舞乃宗廟之樂及宋攺正徳曰前舞大豫曰後舞於元㑹四廂亦用之齊梁以後因而不攺今錄之以足三十二章之數云禮志宋文帝元嘉十一年皇太子出㑹升在三恪上樂志孝武帝孝建二年有司又奏元㑹登歌伎舊並於殿庭設作今元㑹登歌人亦上殿弦管在下詔可明帝本紀泰始二年春正月己丑朔以軍事不朝㑹泰豫元年春正月甲寅朔上有疾不朝㑹右宋正旦朝賀通典宋因晉制無所改易惟朝至十刻乃受朝賀升皇太子在三恪之上齊因之南齊書樂志元㑹大饗四廂樂歌辭宋黄門郎王韶之造肆夏四章行禮一章上夀一章登歌三章食舉十章前後舞歌一章齊微攺革多仍舊辭其前後舞二章新攺其臨軒樂亦奏肆夏於鑠四章肆夏樂歌辭四曲蕙田案齊肆夏樂歌四章即仍宋曲客入四廂奏於鑠曲皇帝當陽四廂奏将将曲皇帝入變服四廂并奏於鑠将将二曲又黄鐘太簇二廂作法章九功二曲亦與宋儀同今不重載大㑹行禮歌辭二曲姑洗廂奏蕙田案此二曲亦仍宋辭惟皇宋二字改為皇齊纂系在漢二句改為祚隆姬夏道邁虞唐宋京改為齊京上夀歌辭一曲黄鐘廂奏蕙田案此曲仍宋辭無改易殿前登歌辭三曲别用金石太樂令跪奏蕙田案三曲並仍宋辭惟大宋二字改為齊國又固天誕聖作實靈誕聖如天斯久作如天斯崇永固駿命作永固洪命亦小異食舉歌辭十章黄鐘先奏晨儀篇太簇奏五玉篇餘八篇二廂更奏之蕙田案十曲並仍宋辭惟永初二字改為建元又晨羲載燿作晨儀載煥萬物畢來賀二句作萬方來賀華裔充庭九位作九徳休哉君臣嘉燕作休哉休哉君臣熙宴荒裔作荒逺長世宏盛作長世盛合氣成和作含氣感和流仁布徳作流仁徳乾寜作禮章衍景祚作介景祚舞徳稱作徳永稱文武作文明小異前舞階步歌辭新辭天挺聖哲三方維綱川岳伊寜七耀重光茂育萬物衆庶咸康道用潛通仁施遐揚徳厚巛極功髙昊蒼舞象盛容徳以歌章八音既節龍躍鳳翔皇基永樹二儀等長前舞凱容歌辭舊辭蕙田案此曲仍宋辭無改後舞階歩歌辭新辭皇皇我后紹業聖明滌拂除穢宇宙載清允執中和以莅蒼生元化逺被兆世軌形何以崇徳乃作九成妍歩恂恂雅曲芬馨八風清鼔應以祥禎澤浩天下功濟百靈後舞凱容歌辭舊辭蕙田案此曲仍宋辭惟大豫二字改為凱容禮志建武二年朝㑹時世祖遏密未終朝議疑作樂不祠部郎何佟之議昔舜受終文祖義非嗣堯及放勲徂落遏宻三祀近代晉康帝繼成帝於時亦不作樂懷帝永嘉元年惠帝喪制未終於時江充議云古帝王相承雖世及有異而輕重同禮從之右齊正旦朝賀隋書禮儀志梁元㑹之禮未明庭燎設文物充庭臺門闢禁衛皆嚴有司各從其事太階東置白獸樽羣臣及諸蕃客並集各從其班而拜侍中奏中嚴王公卿尹各執珪璧入拜侍中乃奏外辦皇帝服衮冕乗輿以出侍中扶左常侍扶右黄門侍郎一人執曲直華盖從至階降輿納舄升坐有司御前施奉珪藉王公以下至阼階脱舄劍升殿席南奉贄珪璧禮畢下殿納舄佩劍詣本位主客郎徙珪璧於東廂帝興入徙御座於西壁下東向設皇太子王公以下位又奏中嚴皇帝服通天冠升御座王公上夀禮畢食食畢樂伎奏太官進御酒主書付黄甘逮二品以上尚書騶騎引計吏郡國各一人皆跪受詔侍中讀五條詔計吏毎應諾訖令陳便宜者聽詣白獸樽以次還座宴樂罷皇帝乗輿以入皇太子朝則逺遊冠服乗金輅鹵簿以行與㑹則劍履升座㑹訖先興蕙田案古宗廟之室以西為上朝覲之禮天子當依而立當宁而立自以南面為尊梁制徙御座於西壁下非也隋書音樂志梁天監元年定三朝之樂以武舞為大壯舞文舞為大觀舞國樂以雅為稱乃去階歩之樂増撤食之雅焉衆官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒論選士之秀者而升之學曰俊士也二郊太廟明堂三朝同用焉皇帝出入宋孝建二年秋起居注奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏允雅取詩君子萬年永錫祚允也王公出入奏寅雅取尚書周官貳公𢎞化寅亮天地也上夀酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上于天需君子以飲食宴樂也撤饌奏雍雅取禮記大饗客出以雍撤也並三朝用之蕙田案皇帝出入奏皇雅志不云三朝同用然皇帝出入三朝之大節不容無樂歌又志載周捨議以為禮王入入字上疑脱出字奏王夏大祭祀與朝㑹其用樂一也而漢制皇帝在廟奏永至樂朝㑹之日别有皇夏二樂有異於禮為乖宜除永至還用皇夏從之然則元㑹亦用皇夏審矣此應志之脱文不可不補觀承案雅頌之為樂章如文徳之歌大武之舞不必案切本事而皆可施用所以廣文武之徳於天下也後代樂章毎一節必綴以一歌詞煩意瑣豈所以重朝典而揚君徳乎周捨議去永至有以哉俊雅歌詩三曲四言設官分職髦俊攸俟髦俊伊何貴徳尚齒唐乂咸事周寜多士區區衛國猶賴君子漢之得人帝猷乃理開我八襲闢我九重珩佩流響纓紱有容衮衣前邁列辟雲從義兼東序事美西雍分階等肅異列齊恭重列北上分庭異陛百司揚職九賓相禮齊宋舅甥魯衛兄弟思皇藹藹羣龍濟濟我有嘉賓實惟愷悌皇雅三曲五言帝徳實廣運車書靡不賓執瑁朝羣后垂旒御百神八荒重譯至萬國婉來親華盖拂紫微勾陳繞太一容裔被緹組叅差羅䍐畢星囘照以爛天行徐且謐清蹕朝萬㝢端冕臨正陽青絇黄金繶衮衣文繡裳既散華蟲采復流日月光𦙍雅一曲四言自昔殷代哲王迭有降及周成惟器是守上天乃眷大梁既受灼灼重明仰承元首體乾作貳命服斯九置保置師居前居後前星比耀克隆萬夀寅雅一曲三言禮莫違樂具舉延藩辟朝帝所執桓蒲列齊莒垂衮毳紛容與升有儀降有序齊簪紱忘笑語始矜嚴終酣醑介雅三曲五言百福四象初萬夀三元始拜獻惟衮職同心協卿士北極永無窮南山何足擬夀隨百禮洽慶與三朝升惟皇集繁祉景福互相仍申錫永無遺穰簡必來應百味既含馨六飲莫能尚玉罍信湛湛金巵頗摇漾敬舉發天和祥祉流嘉貺需雅八曲七言實體平心待和味庶羞百品多為貴或鼎或鼒宜九沸楚桂胡鹽芼芳卉加籩列俎彫且蔚五味九變兼六和令芳甘㫖庶且多三危之露九期禾圓案方丈粲星羅皇舉斯樂同山河九州上腴非一族𤣥芝碧樹夀華木終朝采之不盈掬用拂腥羶和九穀既甘且飫致遐福人欲所大味為先興和盡敬咸在旃碧鱗朱尾獻嘉鮮紅毛綠翼墜輕翾臣拜稽首萬斯年擊鐘以俟惟大國况乃御天流至徳侑食斯舉揚盛則其禮不諐儀不忒風猷所被深且塞膳夫奉職獻芳滋不麛不夭咸以時調甘適苦别渑淄其徳不爽受福釐於焉逸豫永無期備味斯饗惟至聖咸降人神禮為盛或風或雅流歌詠負鼎言歸啟殷命悠悠四海同兹慶道我六穂羅八珍洪鼎自爨匪勞薪荆包海物必來陳滑甘滌瀡味和神以斯至徳被無垠雍雅三曲四言明明在上其儀有序終事靡諐收鉶撤俎乃升乃降和樂備舉天徳莫違人謀是與敬行禮達兹焉讌語我餕惟阜我肴孔庶嘉味既充食㫖斯飫屬厭無爽冲和在御擊壤齊歡懷生等豫蒸庶乃粒實由仁恕百司警列皇在在陛既飫且醑卒食成禮其容穆穆其儀濟濟凡百庶僚莫不愷悌奄有萬國抑由天啟大壮舞奏夷則大觀舞奏姑洗取其月王也二郊明堂太廟三朝並同用今列其歌詩二曲云大壯舞歌一曲四言髙髙在上實愛斯人眷求聖徳大拯彛倫率土方燎如火在薪黔首暮不及晨朱光啟燿兆發穹旻我皇鬱起龍躍漢津言屆牧野電激雷震闕鞏之甲彭濮之人或貔或武漂杵浮輪我邦雖舊其命維新六伐乃止七政必陳君臨萬國遂撫八寅大觀舞歌一曲四言皇矣帝烈大哉興聖奄有四方受天明命居上不怠臨下惟敬舉無諐則動無失正物從其本人遂其性昭播九功肅齊八柄寛以惠下徳以為政三趾晨儀重輪夕映棧壑忘阻梯山匪夐如日有恒與天無竟載陳金石式流舞詠咸英韶夏於兹比盛相和五引角引萌生觸發嵗在春咸池始奏徳尚仁惉滯以息和且均徵引執衡司事宅離方滔滔夏日火徳昌八音備舉樂無疆宫引八音資始君五聲興此和樂感百精優游律吕被咸英商引司秋紀兑奏西音激揚鐘石和瑟琴風流福被樂愔愔羽引𤣥英紀運冬水折物為音本和且悦窮髙測深長無絶舊三朝設樂有登歌以其頌祖宗之功烈非君臣之所獻也於是去之三朝第一奏相和五引第二衆官入奏俊雅第三皇帝入閤奏皇雅第四皇太子發西中華門奏𦙍雅第五皇帝進王公發足第六王公降殿同奏寅雅第七皇帝入儲變服第八皇帝變服出儲同奏皇雅第九公卿上夀酒奏介雅第十太子入預㑹奏𦙍雅十一皇帝食舉奏需雅十二撤食奏雍雅十三設大壯武舞十四設大觀文舞十五設雅歌五曲十六設俳伎十七設鼙舞十八設鐸舞十九設拂舞二十設巾舞並白紵二十一設舞盤伎二十二設舞輪伎二十三設刺長追花幢伎二十四設受猾伎二十五設車輪折脰伎二十六設長蹻伎二十七設須彌山黄山三峽等伎二十八設跳鈴伎二十九設跳劍伎三十設擲倒伎三十一設擲倒案伎三十二設青絲幢伎三十三設一繖花幢伎三十四設雷幢伎三十五設金輪幢伎三十六設白獸幢伎三十七設擲蹻伎三十八設獼猴幢伎三十九設啄木幢伎四十設五案幢咒願伎四十一設辟邪伎四十二設青紫鹿伎四十三設白武伎作訖将白鹿來迎下四十四設寺子遵安息孔雀鳳凰文鹿胡舞登連上雲樂歌舞伎四十五設縁髙絙伎四十六設變黄龍弄龜伎四十七皇太子起奏𦙍雅四十八衆官出奏俊雅四十九皇帝興奏皇雅自宋齊以來三朝有鳳凰銜書伎至是乃下詔曰朕君臨南面道風盖闕嘉祥時至為媿已多假令巢侔軒閣集同昌户猶當顧循寡徳推而不居况於名實頓爽自欺耳目一日元㑹大樂奏鳳凰銜書伎至乃舍人受書升殿跪奏誠復興乎前代率由自逺内省懷慙彌與事篤可罷之蕙田案此條載三朝樂次第最詳志既明云皇帝入閤奏皇雅皇帝入儲變服皇帝變服出儲同奏皇雅皇帝興奏皇雅知前文誤脱三朝字審矣通典徹食宜有樂議周官云王大食三侑皆合鐘鼓漢蔡邕云王者食舉以樂今但有食舉樂食畢則無樂案膳夫職以樂侑食禮記云客出以雍徹以振羽論語云三家者以雍徹如此則徹食宜有樂不容同用食舉也蕙田案徹食奏雅惟梁禮為然歴代皆無之通典三朝不宜奏登歌議禮記燕居入門而金作示情也升歌清廟示徳也下管象武示事也是故古之君子不必親相與言也以禮樂相示郊特牲云奠酬而工升歌發徳也歌者在上匏竹在下貴人聲也明堂位云升歌清廟下管象武太師職云大祭祀帥瞽登歌金奏擊拊小師職云大祭祀登歌擊拊尚書大傳云古者帝王升歌清廟之樂大琴練絃達越大瑟朱絃達越以韋為鼔竽瑟之聲亂人聲清廟升歌先人功烈徳深也周公升歌文王之功烈徳深苟在廟中嘗見文王者愀然如復見文王故書曰搏拊琴瑟以詠祖考來格此之謂也案登歌各頌祖宗之功烈去鐘徹竽以明至徳所以傳云其歌呼也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者徧聞之也檢以經記悉施郊廟耳非元日所宜奏也若三朝大慶百辟具陳升工席殿以歌祖宗君臣相對便應涕淚豈可獻酬舉爵以申歡宴邪若改辭易㫖苟㑹一時則非古人登歌之義蕙田案杜氏二議與梁禮合今附見其下隋書禮儀志天監六年詔曰頃代以來元日朝畢次㑹羣臣則移就西壁下東向坐求之古義王者讌萬國惟應南面何更居東面於是御座南向以西方為上皇太子以下在北壁坐者悉西邉東向尚書令以下在南方坐者悉東邉西向舊元日御座東向酒壺在東壁下御座既南向乃詔壺於南欄下又詔元日受五等贄珪璧並量付所司周捨案周禮冡宰大朝覲贊玉幣尚書古之冡宰頃王者不親撫玉則不復須冡宰贊助尋尚書主客曺郎既冡宰𨽻職今元日五等奠玉既竟請以主客郎受鄭元注覲禮云既受之後出付玉人於外漢時少府職掌珪璧請主客受玉付少府掌帝從之又尚書僕射沈約議正㑹儀注御出乗輿至太極殿前納舄升階尋路寝之設本是人君居處不容自敬宫室案漢氏則乗小車升殿請自今元正及大公事御宜乗小輿至太極階仍乗板輿升殿制可梁書簡文帝本紀大寶元年春正月辛亥朔以國哀不朝㑹右梁正旦朝賀隋書禮儀志陳制先元㑹十日百官並習儀注令僕以下悉公服監之設庭燎街闕城上殿前皆嚴兵百官各設部位而朝宫人皆於東廊隔綺疏而觀宫門既無藉外人但絳衣者亦得入觀是日上事人發白獸樽自餘亦多依梁禮云蕙田案朝㑹鉅典乃禮樂雍肅之地陳制嚴兵設部伍失嘉㑹合禮之意矣至今宫人隔綺疏而觀狎禮至是宜其及也隋書音樂志大建元年定三朝之樂採梁故事第一奏相和五引各隨王月則先奏其鐘惟衆官入奏俊雅林鍾作太簇叅應之取其臣道也鼓吹作皇帝出閣奏皇雅黄鍾作太簇夾鍾姑洗大吕皆應之鼓吹作皇太子入至十字陛奏允雅太簇作南吕叅應之取其二月少陽也皇帝延王公登奏寅雅夷則作夾鍾應之取其月法也皇帝入宁變服奏皇雅黄鍾作林鍾叅應之鼔吹作皇帝出宁及升座皆奏皇雅並如變服之作上夀酒奏介雅太簇作南吕參應之取其陽氣盛長萬物輻凑也食舉奏需雅蕤賓作大吕叅應之取火主於禮所謂食我以禮也徹饌奏雍雅無射作中吕叅應之取其津潤已竭也武舞奏大壯夷則作夾鍾參應之七月金始王取其堅斷也鼔吹引而去來文舞奏大觀姑洗作應鍾參應之三月萬物必榮取其布惠者也鼓吹引而去來衆官出奏俊雅蕤賓作林鍾夷則南吕無射應鍾太簇參應之鼓吹作皇帝起奏皇雅黄鍾作林鍾夷則南吕無射叅應之鼓吹作詞用宋曲宴准梁樂盖取人神不雜也制曰可六年十一月侍中尚書左僕射建昌侯徐陵儀曺郎中沈罕奏來年元㑹儀注稱舍人蔡景歴奉敕先㑹一日太樂展宫懸髙絙五案於殿庭客入奏相和五引帝出黄門侍郎舉麾於殿上掌故應之舉於階下奏康韶之樂詔延王公登奏變韶奉珪璧訖初引下殿奏亦如之帝興入便殿奏穆韶更衣又出奏亦如之帝舉酒奏綏韶進膳奏侑韶帝御茶果太常丞跪請進舞七徳繼之九序其鼔吹雜伎取晉宋之舊微更附益舊元㑹有黄龍變文鹿師子之類太建初定制皆除之至是蔡景歴奏悉復設焉右陳正旦朝賀魏書禮志太祖天興元年冬詔儀曺郎董謐撰朝覲饗宴之儀樂志天興元年冬詔尚書吏部郎鄧淵定律吕協音樂正月上日饗羣臣宣布政教備列宫懸正樂兼奏燕趙秦呉之音五方殊俗之曲髙祖本紀太和十年春正月癸亥朔帝始服衮冕朝饗萬國十八年春正月丁未朔朝羣臣於鄴宫澄鸞殿十九年春正月辛未朔朝饗羣臣於懸瓠二十二年春正月癸未朔朝饗羣臣於新野行宫二十三年春正月戊寅朔朝羣臣以帝疾瘳上夀大饗於澄鸞殿禮志熙平二年二月丁未侍中司空公領尚書令任城王澄度支尚書崔亮奏謹案禮記曾子問曰諸侯旅見天子不得成禮者幾孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝㑹孔子應云五而獨言四明不廢朝賀也又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公㑹劉子及諸侯於平邱詳考古禮未有以祭祀廢元㑹者臣等備位樞納可否必陳冒陳所見伏聽裁衷靈太后令曰可如所執神龜二年正月二日元會髙陽王雍以靈太后臨朝太上秦公喪制未畢欲罷百戲絲竹之樂清河王懌以為萬國慶集天子臨享宜應備設太后訪之於侍中崔光光從雍所執懌謂光曰宜以經典為證光據禮記縞冠元武子姓之冠父母有重喪子不純吉安定公親為外祖又有師恩太后不許公除衰麻在體正月朔日還家哭臨至尊輿駕奉慰記云朋友之墓有宿草焉而不哭是則朋友有朞年之哀子貢云夫子喪顔淵若喪子而無服喪子路亦然顔淵之喪饋練肉夫子受之彈琴而後食之若子之哀則容一朞不舉樂也孔子既大練五日彈琴父母之喪也由是喪夫子若喪父而無服心喪三年由此而制雖古義難追比來發詔每言師祖之尊是則一朞之内猶有餘哀且禮母有喪服聲之所聞子不舉樂今太后更無别宫所居嘉福去太極不為大逺鼓鐘於宫聲聞於外况在内宻邇也君之卿佐是謂股肱股肱或虧何痛如之知悼子喪未葬杜蕢所以諫晉平公也今相國雖已安厝裁三月爾陵墳未乾懌以理證為然乃從雍議出帝本紀永熙二年春正月庚寅朔朝饗羣臣於太極前殿右北魏正旦朝賀隋書禮儀志後齊正日侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黄塗飾上寫詔書三計㑹日侍中依儀勞郡國計吏問刺史太守安不及穀價麥苖善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黄塗飾上寫詔書正㑹日依儀宣示使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏主决獄平徭賦二曰人生在勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養凡使生有以自救沒有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公外内溷淆綱維不設所宜糾劾正㑹日侍中黄門宣詔勞諸郡上計勞訖付紙遣陳土宜字有脱誤者呼起席後立書迹濫劣者飲墨水一升文理孟浪無可取者奪容刀及席既而本曺郎中考其文迹才辭可取者錄牒吏部簡同流外三品叙元正大饗百官一品以下流外九品已上預㑹一品已下正三品已上開國公侯伯散品公侯及特命之官下逮刺史並升殿從三品已下從九品已上及奉正使人比流官者在階下勲品已下端門外蕙田案北齊於朝㑹日宣詔慰郡國使問穀價麥苖人間疾苦又頒五條誥誡以示訓行又付紙遣陳便宜以寓賞罰與古述職之義為近較之叔孫通所起朝儀僅以拜賀行酒畢事者誠不免諧世取寵之誚也隋書音樂志齊武成之時始定三朝之樂元㑹大饗協律不得升陛黄門舉麾於殿上今列其歌舞云賓入門四廂奏肆夏辭昊蒼眷命興王統天業髙帝始道邈皇先禮成化穆樂合風宣賓朝荒夏揚對穹𤣥皇帝出閤奏皇夏辭夏正肇旦周物充庭具僚在位俛伏無聲大君穆穆宸儀動睟日煦天廻萬靈胥萃皇帝當扆羣臣奉賀奏皇夏辭天子南面乾覆離明三千咸列萬國填并猶從禹㑹如次湯庭奉兹一徳上下和平皇帝入宁變服黄鍾太簇二廂奏皇夏辭我應天歴四海為家協同内外混一戎華鶴盖龍馬風乗雲車夏章戎服其㑹如麻九賓有儀八音有節肅肅於位飲和在列四序氤氲三光昭晰君哉大矣軒唐比轍皇帝變服移幄坐於西廂帝出升御坐姑洗奏皇夏辭皇運應籙廓定區㝢受終以文構業以武堯昔命舜舜亦命禹大人馭歴重規沓矩欽明在上昭納八夤從靈體極誕聖窮神化生羣品陶育蒸人展禮肆樂協此元春王公奠璧奏肆夏辭萬方咸暨三揖以申垂旒馮玉五瑞交陳拜稽有章升降有節聖皇負扆虞唐比烈上夀黄鍾廂奏上夀曲辭仰三光奏萬夀人皇御六氣天地同長久皇太子入至坐位酒至御殿上奏登歌辭大齊統歴道化光明馬圖呈寶龜籙告靈百蠻非衆八荒非逖同作堯人俱包禹迹其一天覆地載成以四時惟皇是則比大於兹羣星拱極衆川赴海萬㝢駿奔一朝咸在其二齊之以禮相趨帝庭應規蹈矩玉色金聲動之以樂和風四布龍申鳳舞鸞歌麟步其三食至御前奏食舉樂辭三端正啟萬方觀禮具物充庭二儀合體百華昭曉千門洞晨或華或裔奉贄惟新悠悠亘六合員首莫不臣仰施如雨晞和猶春風化表笙鏞歌謳被琴瑟誰言文軌異今朝混為一其一彤庭爛景丹陛流光懷黄綰白鵷鷺成行文贊百揆武鎮四方折衝鼓雷電獻替協陰陽大矣哉道邁上皇陋五帝狹三王窮禮物該樂章序冠帶垂衣裳其二天壤和家國穆悠悠萬類咸孕育契㝠化侔大造靈効珍神歸寶興雲氣飛龍蒼麟一角鳳五光朱雀降黄玉表九尾馴三足擾化之定至矣哉瑞感徳四方來其三囹圄空水火菽粟求賢振滯棄珠玉衣不靡宫以卑當陽端嘿垂拱無為云云萬有其樂不訾其四嗟此舉時逢至道肖形咸自持賦命無傷夭行氣進皇輿遊龍服帝皁聖主寜區宇乾坤永相保其五牧野征鳴條戰大齊家萬國拱揖應終禪奥主廓清都大君臨赤縣髙居深視當扆正殿旦暮之期今一見其六兩儀分牧以君陶有象化無垠大齊徳邈誰羣超鳳火冠龍雲露以絜風以薫榮光至氣氤氲其七神化逺人物協寒暑調風雨爕披泥檢受圖諜圖諜啟期運昌分四序綴三光延寶祚眇無疆其八惟皇道升平日河水清海不溢雲干吕風入律驅黔首入仁夀與天髙並地厚其九刑以厝頌聲揚皇情邈眷汾襄岱山髙配林壮亭亭聳云云望斾葳蕤駕騤騤刋金闕奠玉龜其十文舞将作先設階步辭我后降徳肇峻皇基摇鈴大號振鐸命期雲行雨洽天臨地持茫茫區宇萬代一時文來武肅成定於兹象容則舞歌徳言詩鏘鏘金石列列匏絲鳳儀龍至樂我雍熙文舞辭皇天有命歸我大齊受兹華玉爰錫𤣥珪奄家環海實子蒸黎圖開寶匣檢封芝泥無思不順自東徂西教南暨朔罔敢或􅂝比日之明如天之大神化斯洽率土無外眇眇舟車華戎畢㑹祠我春秋服我冠帶儀協震象樂均天籟蹈武在庭其容藹藹武舞将作先設階歩辭大齊統歴天監孔昭金人降汛火鳳來巢眇均虞徳干戚降苖夙沙攻主歸我軒朝禮符揖讓樂契咸韶蹈揚惟序律度時調武舞辭天眷横流宅心元聖祖功宗徳重光襲映我皇恭已誕膺靈命宇外斯燭域中咸鏡悠悠率土時惟保定微微動植莫違其性仁豐庶物施洽羣生海寜洛變契此休明雅宣茂烈頌紀英聲鏗鍠鐘鼓掩抑簫笙歌之不足舞以禮成鑠矣王度緬邁千齡皇帝入鐘鼓奏皇夏辭禮終三爵樂奏九成允也天子穹壤和平載色載笑反寝宴息一人有祉百神奏職右北齊正旦朝賀隋書音樂志周建徳二年十月六代樂成朝㑹則皇帝出入奏皇夏皇太子出入奏肆夏王公出入奏驁夏五等諸侯正日獻玉帛奏納夏宴族人奏族夏大㑹至尊執爵奏登歌十八曲食舉奏深夏舞六代大夏大濩大武正徳武徳山雲之舞蕙田案隋禮儀志不載周朝㑹之儀盖偶脱之其儀節之大者於音樂志可得其一二焉故錄於首北周書明帝本紀武成二年春正月癸丑朔大㑹羣臣於紫極殿始用百戯焉武帝本紀保定五年春正月甲申朔廢朝以庸國公王雄死王事故也天和四年春正月辛卯朔廢朝以齊武成王薨故也六年春正月己酉朔廢朝以路門未成故也建徳三年春正月壬戌朔朝羣臣於路門宣帝本紀大象元年春正月癸巳受朝於路門帝服通天冠絳紗袍羣臣皆服漢魏衣冠二年春正月丁亥帝受朝於道㑹苑右後周正旦朝賀五禮通考卷一百三十六
