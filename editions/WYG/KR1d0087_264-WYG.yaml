body:
  text: 五禮通考卷二百五十四刑部尚書秦蕙田撰凶禮九䘮禮儀禮䘮服不杖麻屨者注此亦齊衰言其異于上次疏此不杖章輕于上禫杖故之此章與上章雖杖與不杖不同其正服齊衰裳皆同五升而冠八升則不異也郝氏敬曰麻屨與疏屨異冠絰帶等皆與杖期同祖父母疏服之本制若為父期祖合大功為父母加隆至三年祖亦加隆至期也朱子曰父母本是期加成三年祖父母世父母叔父母本是大功加成期其從祖伯父母叔父母小功者乃正服之不加者耳汪氏琬曰或問禮與律有繼母而無繼祖母之文然則繼祖母不當服與曰非也言祖母則繼祖母綂其中矣葢繼祖母與庶祖母有辨繼祖母之殁也祔於廟而庶祖母不祔夫既祔於廟為之孫者方歲時饗祀之而可以無服乎故曰言祖母則繼祖母綂其中矣欽定義疏上經言繼母如母此不言繼祖母者古文簡約已包于祖母中也若庶祖母則無服妾母不世祭則庶子之子無服矣祖父在而祖母先殁祖父與父服杖期孫服不杖期父服四升祖孫皆服五升此降正精麤之别也注疏以父在為母之降服四升作正服五升非也傳曰何以期也至尊也敖氏繼公曰謂不可以大功之服服至尊故加而為期也郝氏敬曰祖父母之親不及父母而論分則父所尊也父所尊故亦曰至尊又曰此有父在之正禮父没適孫為其祖三年以代父也禮各舉其正者斬衰首父齊衰首母不杖期首祖父母舉其正而凡不備者皆可義推矣世父母叔父母注為姑在室亦如之欲疏世叔既卑于祖故次之伯言世者見繼世也為昆弟之子亦期不言報者以昆弟之子猶子若言報為疏故不言也云為姑在室亦如之者大功章云為姑嫁大功明未嫁在此期章姜氏兆錫曰案本傳有不足加尊故報之也之文則此兩列相為之服而不言報葢變文也夫為人後者為其父母期而其父母亦報之豈嫌言報為疏而不言報乎高氏愈曰世母叔母原其始而言則塗人也以其來配世父叔父而服亦同之初無降殺何也葢人之死䘮無常有不幸而遺其孤子孤女者非世母叔母為之慇懃教育必不能成立而其世母叔母之老寡無子者非依其兄弟之子則亦莫之相養而相葬也苟不重其服制則將視如路人而幼孤老寡之人其顛連而失所者必多矣是故先王引而近之非母也而以為世母叔母非子也而以為猶子欲其顧名思義使之彼此相收恤而無顛連無告之患也于以厚期民而善風俗豈細故哉盛氏世佐曰此謂昆弟之男子為之也其女子子未成人者為此四人服亦如之成人已後逆降在大功章與出嫁者同爾雅云父之晜弟先生為世父後生為叔父註云世有為嫡者嗣世綂故也父之先生者不皆世嫡而為祖後者亦存焉故謂之世此亦論其常耳若父是庶出或有廢疾不堪主宗廟而為祖後者乃其後生則此庶兄子亦謂之叔父而已世叔之稱要以其年之先後生于父為斷也説者謂父之晜惟繼世一人稱世父第二以下皆稱叔父非傳曰世父叔父何以期也與尊者一體也陳氏詮曰尊者父也所謂昆弟一體也雷氏曰非父之所尊嫌服重故問也黄氏􅆬曰世叔父者父之兄弟若據祖期則世叔父母宜九月而世叔父是父一體故加至期從世叔父母既疏加所不及據期而殺是以五月族世叔父母疏故緦敖氏繼公曰世叔父本是大功之服以其與父一體故當加一等也以五服差之族之親為四緦麻從祖之親為三小功則從父之親宜為二大功也而禮為從父昆弟大功世叔父期以此傳攷之則世叔父之期乃是加服從父昆弟之大功則其正服也此釋經文為世父叔父期之意郝氏敬曰伯叔父母非尊于祖父母何以與祖父母同服雖不尊于祖父母而實與祖為一體父至尊又與父為一體惟其一體所以同服然則昆弟之子何以亦期也旁尊也不足以加尊焉故報之也疏世叔文與二尊為體故加期昆弟之子無此義何以亦期故怪而致問也凡得降者皆由己尊也故降之世叔非正尊故生報也敖氏繼公曰加尊者謂以其尊加之也昆弟之子本服亦大功世叔父不以本服服之而報之以其為己加隆之服者以己非正尊不足以尊加之故也加尊而不報者如父于衆子祖于庶孫之類是也昆弟之子雖不在此條然以其即為世叔父之服者而世叔父亦以此服之義有不同故并釋之也張氏爾岐曰以其為旁尊不足以加尊于人故為昆弟之子亦如其服以報之若祖之正尊則孫為祖期而祖但為孫大功矣欽定義疏案檀弓兄弟之子猶子也葢引而進之也此為昆弟子服期之義也以其為己服也而服之又有報義焉昆弟子于世叔父之服為其與尊者一體則亦兼有引而進之之義凡此所以敦一本之愛而勸篤親也父子一體也夫妻一體也昆弟一體也故父子首足也夫妻牉合也昆弟四體也疏父子一體以下傳又廣明一體之義云父子一體者見世叔父與祖亦為一體也夫妻一體者亦見世叔母與世叔父為一體也昆弟一體者又見世叔父與父亦為一體也人身首足為上下父子亦是尊卑之上下故父子比于首足郊特牲云天地合而后萬物興焉是夫婦牉合子𦙍生焉是牉合為一體也四體謂二手二足在身之旁昆弟亦在父之旁故云四體敖氏繼公曰言首足牉合四體者皆所以釋其一體也此又申言與尊者一體之義雖以三者並言而其㫖則唯主于昆弟葢世叔父乃其父之昆弟所謂與尊者一體也盛氏世佐曰牉與判通半也周禮媒氏職云掌萬民之判鄭註引此傳文亦作判判合者陰陽各半合之乃成夫婦也欽定義疏牉者半也分也集韻牉合合其半以成夫婦也故昆弟之義無分然而有分者則辟子之私也子不私其父則不成為子故有東宮有西宮有南宮有北宮異居而同財有餘則歸之宗不足則資之宗注宗者世父為小宗典宗事者也資取也别疏昆弟之義無分者以手足四體本在一身不可分是昆弟之義不合分也然而分者則辟子之私也使昆弟之子各自私其父故須分也若兄弟同在一宮則不成為人子之法案内則云命士以上父子異宮不命之士父子同宫縱同宮亦有隔别為四方之宫也張子曰子不私其父則不成為子古之人曲盡人情如此若同宮有伯父叔父則為子者何以獨厚於其父為父者又烏得而當之敖氏繼公曰此承上文而言父子夫妻昆弟俱是一體然父子夫妻不分而昆弟則分似乖于一體之義故言其理之不容不分者以釋之東宫西宫南宫北宫葢古者有此稱亦或有以之為氏者故傳引之以證古之昆弟亦有分而不同宫者焉異居而同財則其所以分之意可見矣郝氏敬曰辟避同子各事其父故昆弟不得不避之是以分耳宫謂父子各居别宮各事其所尊宗小宗即世父母之宫張氏爾岐曰言有餘不足皆綂于宗仍以明一體之義盛氏世佐曰東宫西宫南宫北宫皆古者兄弟異居之宫名也有餘不足謂支子之私財支庶之贏餘匱乏皆宗子總攬其大綱而為之裒益于其間故宗法立而天下無貧富不平之患矣欽定義疏古者大功同門同財縱有異門者亦同財葢以祖綂孫凡同祖者則皆不私其財也曰同財則固不必同㸑矣小功以下人滋蕃而情漸疏勢難久合葢理一分殊之道然也註云宗事謂同宗之人冠昏嫁䘮祭諸事世母叔母何以亦期也以名服也疏以配世叔父而生母名則當隨世叔父而服之敖氏繼公曰此釋經文也言以名服見其恩疏張氏爾岐曰二母本是路人以牉合于世叔父故有母名因而服之即上所云夫妻一體也大夫之適子為妻疏大夫之適子為妻在此不杖章則上杖章為妻者是庶子為妻父没後適子亦為妻杖亦在彼章也敖氏繼公曰傳曰父在則為妻不杖則是凡父在為妻而非有所降者其服皆然不别適庶也此乃特見大夫之適子葢謂大夫庶子為妻則異于是唯其適子為妻如邦人故特舉以明之凡大夫之子之服例在正服後今序于昆弟之上者葢以此包上下而言故舉衆人為妻之處若重出者乃在正服後也張氏爾岐曰案下經大夫庶子為妻大功不知註疏何以云當杖盛氏世佐曰為妻不杖尊者在不敢盡禮於私䘮也一云以父為之主也大夫之適子有父之辭也不云父在為妻而云大夫之適子者見此禮之通乎上下也嫌大夫以上為尊者所壓或不得伸其私服故言此以明之小記云世子不降妻之父母其為妻也與大夫之適子同則天子諸侯之適子皆然而士以下更不待言矣適子為父後者也特言適者見庶子之異于是也自天子以至于士其庶子父在為妻之服各異即父没之後亦有不能盡同者此當以上章妻大功章公之庶昆弟大夫之庶子為妻及記公子為其妻參看其義自見欽定義疏小記世子為妻與大夫之適子同是天子諸侯之適子亦然也君于庶子庶婦有降殺而于適子適婦無異同故敖云包上下傳曰何以期也父之所不降子亦不敢降也何以不杖也父在則為妻不杖注大夫不以尊降適婦者重適也凡不降者謂如其親服服之降有四品君大夫以尊降公子大夫之子以厭降公之昆弟以旁尊降為人後者女子子嫁者以出降疏父之所不降者大功章有適婦是父不降適婦也子亦不敢降者謂不敢降至大功與庶子同也父在為妻不杖者父為適子之婦為䘮主故適子不敢伸而杖也若然適子為妻通貴賤今唯據大夫者以五十始爵為降服之始嫌降適婦其子亦降其妻故明舉大夫不降天子諸侯雖尊不降可知注云降有四品者總解䘮服上下降服之義君大夫以尊降者天子諸侯為正綂之親后夫人與長子長子之妻等不降餘親則絶天子諸侯絶者大夫降一等即大夫為衆子大功之等是也公子大夫之子以厭降者此非身自尊受父之厭屈以降下記云公子為其母練冠麻麻衣縓緣為其妻縓冠葛絰帶麻衣父卒乃大功是也大夫之子即小功章云大夫之子為從父昆弟在小功皆是也公之昆弟以旁尊降者此亦非已尊旁及昆弟故亦降其諸親即小功章云公之昆弟為從父母昆弟是也案大功章云公之庶昆弟為母妻昆弟傳曰先君餘尊之所厭不得過大功若然公之昆弟有兩義既以旁尊又為餘尊厭也為人後者女子子嫁者以出降者此章云為人後者為其父母報又下文云女子適人者為其父母昆弟為父後者此二者是出也大夫之服例在正服後今在昆弟上者以其妻本在杖期直以父為王故降入不杖章是以進之在昆弟上也敖氏繼公曰父之所不降謂大夫為適婦亦大功如衆人故子亦為之不杖期如衆人也若大夫于庶婦降之而至于不服其子亦降之而至于大功所謂大夫之子則從乎大夫而降也父在則為妻不杖者不敢同于父在為母之服也故父没為母三年乃得為妻杖是其差也降有三品大夫以尊而降公之昆弟大夫之子以其父之所厭而降為人後者女子子適人者以其出而降子亦不敢降之説見後郝氏敬曰夫為妻杖期舅為適婦大功常也大夫適子妻仍期不降何也大夫不以貴降適其于適子婦大功仍大功也父不降而子又安可降乎所以大夫適子仍得為妻期然不杖何也父在適婦之䘮父主之父為主子杖是奪其父主不敢也然則大夫庶子為妻宜如何曰宜大功是父所降也欲為期不可得也然則大夫庶婦䘮亦為主乎曰否則大夫以上降其妻乎曰否則何以獨言大夫期降自大夫始又曰降服四品以尊降者為辨分以出降者為情殺可也若夫厭降者已非諸侯大夫而徒以父之所降已亦降旁尊降者已非君公而徒以為公昆弟于所親降則似迂矣故縣子曰古者無降上下各以其親世運有隆替親有不得不殺恩有不得不窮非古也權其通者唯達人乎張氏爾岐曰下經適婦在大功章庶婦在小功章父之所不降謂不降在小功也子亦不敢降大夫衆子為妻皆大功今適子為妻期是亦不敢降也前章註云父在子為妻以杖即位謂庶子者葢士禮也若大夫之庶子父在僅得服大功何得以杖即位乎欽定義疏小功章庶婦士之本服也非由大夫尊降而然疏謂大夫為庶子之婦小功誤矣大夫以尊降當緦麻而大夫無緦麻故至于不服父為適子之婦為䘮主九月而除子則祥而除之不禫故不杖昆弟注昆兄也為姊妹在室亦如之以疏昆弟卑于世叔故次之昆明也以其次長故明為稱弟第也以其小故以次第為名郝氏敬曰昆同也同本曰昆凡親族齒相若稱兄弟同父稱昆弟後倣此為衆子注衆子者長子之弟及妾子女子子在室亦如之士謂之衆子未能遠别也大夫則謂之庶子降之為大功天子國君不服之内則曰冢子未食而見必執其右手適子庶子已食而見必循其首疏衆子卑于昆弟故次之士謂之衆子大夫之子皆云庶子天子國君絶旁親故不服也引内則者證言庶子别于適長者也敖氏繼公曰衆子即庶子也對長子立文故曰衆子庶則對適之稱也實則一耳父母為衆子乃期者以尊加之也士妻為妾子亦期凡適而非長父母為之亦與衆子同盛氏世佐曰衆子謂適妻所生第二已下及妾子皆是變庶言衆者庶是對適之稱衆則適而非長者亦存焉註引内則者明父待子之禮自第二已下雖適妻所生亦無異于庶也但内則所謂適子與此經小異此經適子指適長而言内則謂之冢子彼所謂適子庶子則此之衆子也昆弟之子疏昆弟子疏于親子故次之世叔父為之敖氏繼公曰其女子子在室者亦如之姜氏兆錫曰子葢該男子子女子子在其中矣傳曰何以期也報之也注檀弓曰䘮服兄弟之子猶子也葢引而進之盛氏世佐曰為子期則為昆弟之子當大功今乃同之于子者以其為己服期故亦以是報之上傳曰旁尊也不足以加尊焉故報之也與此相發明檀弓説又自一義葢各記所聞耳欽定義疏此兩相為服傳言報者著其實也經不言報者欲以倫類為次而兩見之也世叔父次于祖父之下則見其為祖父一體之所分而親之當如父矣昆弟之子次于昆弟衆子之下則見昆弟與吾一體而親昆弟之子當如子矣大夫之庶子為適昆弟注兩言之者適子或為兄或為弟疏此大夫之妾子故言庶若適妻所生第二下當直云昆弟不言庶也敖氏繼公曰大夫之庶子為昆弟大功嫌于適亦然故以明之不言適子者嫌自為其子也盛氏世佐曰庶子猶衆子言庶者對適立文也適昆弟謂其為父後者一人也立子以適不以長故容有弟而為父後者其庶兄為之亦如斯例也若適妻所生第二以下則否矣適妻所生第二已下為其兄之為父後者與妾子為宗子同傳曰何以期也父之所不降子亦不敢降也注大夫雖尊不敢降其適重之也適子為庶昆弟庶昆弟相為亦如大夫為之疏云父之所不降者即斬章父為長子是也云子亦不敢降者于此服期是也案後經大夫為庶子降服大功適子為庶昆弟庶昆弟相為並大功故註曰如大夫為之敖氏繼公曰大夫之子于昆弟之屬或有所降者以從乎其父而不得不降之耳若為其父之適及尊同者乃其父之所不降者故已亦得遂其服焉非謂以其父不降之故欲降之而不敢降也凡後傳之言若此者不復見之盛氏世佐曰父于長子三年庶子期昆弟相為亦期服之正也大夫以尊故降庶子于大功而于長子自若三年是父之所不降也大夫之庶子厭于父降其庶昆弟于大功而于適昆弟自若期是子亦不敢降也庶昆弟為適昆弟之服如此而適昆弟之所以服之者亦大功則以大夫之適子得行大夫禮故也且父之所降子亦不敢不降也欽定義疏此服亦通上下天子諸侯為長子服斬則天子諸侯之庶子于適昆弟亦服其本服可知專言大夫者以下經為君之長子自有本條且義例可於大夫之適子為妻通之也公之庶子父在為庶昆弟無服父卒乃服大功天子之庶子相為當亦然若俱出封為諸侯則各如其服服之父厭庶子而天子不厭諸侯始封之君不臣昆弟故得服之也惟長子于庶昆弟皆不服之以冢適有君道不但為父尊所厭而已大夫之適子于庶昆弟則降之自天子以下至于士皆加隆于適而庶則或降焉或絶焉此宗法也大夫士之宗法本自天子諸侯而推也然則謂不可以大夫士之宗法通于天子者其繆矣乎賈氏大夫之子得降庶庶又自相降者宗法自大夫以上彌隆而適彌重故子不得不從乎父也父為大夫子為士葬以大夫祭以士則知大夫之子不得直用大夫禮矣適孫疏孫卑于昆弟故次之此謂適子死其適孫承重者祖為之期傳曰何以期也不敢降其適也有適子者無適孫孫婦亦如之注周之道適子死則立適孫是適孫將上為祖後者也長子在則皆為庶孫耳孫婦亦如之適婦在亦為庶孫之婦凡父于將為後者非長子皆期也疏云周道者以其殷道適子死弟乃當先立故言周道也䘮服小記云適婦不為舅後者則姑為之小功註云謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重于適及將傳重者非適服之皆如衆子庶婦也然長子為父斬父亦為斬適孫承重為祖斬祖為之期不報之斬者父子一體本有三年之情故特為祖斬祖為孫本非一體但以報期故不得斬也敖氏繼公曰祖於孫宜降於子一等而大功此期者亦異其為適加隆焉爾非不降之謂也有適子者無適孫孫婦亦如之皆謂適不可二也案註云凡父於將為後者非長子皆期者葢以斬衰章唯言父為長子故也鄭言此者為適子死而無適孫者見之且明為適孫亦期之意也適孫為祖父後服與子同顧氏炎武曰冡子身之副也家無二主亦無二副故有適子者無適孫唐高宗有太子而復立太孫非矣盛氏世佐曰云有適子者無適孫者謂適子在則適子之子雖屬適長而祖視之無殊于庶孫也服之皆大功云孫婦亦如之者如其有適婦者無適孫婦也適子婦皆没以孫為後則其為婦小功殊之于庻也適子婦有一在則為孫婦緦無適庶之别也華氏學泉曰或問夫為祖曽高承重者姑在妻從服歟曰然孫為祖曽高後稱承重承宗廟之重也其夫主宗廟之重則其婦當同主宗廟而助祭夫為祖曽高服斬妻安得不從服萬氏斯大承重妻從服説晉賀循曰夫為祖曽高祖後者妻從服如舅姑此從䘮服傳父卒然後為祖後者服斬之文而推之也故家禮及今制妻為夫黨服圖于凡承重皆云並從夫服而世俗承重者母在則妻不從其悞實始于虞喜孔瑚問喜曰元孫為後者其妻從服姑止服緦近輕遠重情實有疑喜荅以有嫡子者無嫡孫又若宗子之母在則不服宗子妻推此知元孫為後姑在婦猶為庶不得傳重傳重之服理當在姑宋庾蔚之更推之曰有適婦無適孫婦祖服自以姑為適由是世俗相沿姑在婦不從服迄于今不變愚謂宗子母在而族人不服其妻葢體宗子不死其父之心而尊其所尊且以婦壓于姑故不為之服非以重在姑也夫承重而妻從服為䘮禮之内主也兩者義别各不相䝉内則云舅没則姑老冡婦所祭祀賔客每事必請于姑觀此則知宗子母雖存而凡吉凶内主之重皆其妻承之故䘮服傳云有適子者無適孫孫婦亦如之亦如云者就嫡孫而言無適孫亦無適孫婦也適子死而立適已娶即為適孫婦于其祖之䘮也母在則服婦服之常孫婦主䘮者則進服婦為舅姑之服各盡其道並行不悖虞喜之言抑何據所非據乎且古來吉凶之禮率成于夫婦故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷昏禮父命子親迎曰往迎爾相承我宗事故凡儀禮䘮祭稱為主人者皆宗子也稱為主婦者皆宗子之妻也此之謂夫婦親之安有宗子既娶妻而母尚主重之事哉賈氏不察于宗子母在族人不為其妻服援王制八十齊䘮不及謂宗子未七十母自與祭不知王制指男子為言婦人舅没姑老則固不以年記也蔚之又云舅没姑老授祭事于子婦是既知孫承重者妻承重已乃其云有適婦無適孫婦祖服自以姑為適何也如其言是一孫婦之身主祭則為適服祖則為庶義無一定若謂雖主祭亦庶也吾未聞庶孫婦而可以主祭亦未聞夫既為適孫而妻不得為適孫婦者也故夫父死母為内主者唯子幼未娶者耳已娶未有不主重者也主重未有不從服者也即元孫為後妻主姑存者重存為主不論遠近縱姑緦婦服主得其常豈近輕遠重之謂乎若必如虞説將古禮無曾元婦服者其夫服斬而其妻吉服以為主可乎故曰婦人從夫欽定義疏案父于將為後者非長子皆期是適子之綂亦不貳也適子死若廢疾而立適孫死則為之服期固已若庶子將為後者死亦為之服期此謂士耳天子諸侯為庶子無服大夫為庶子大功雖將為後死亦不為之加服註云服之皆如衆子庶婦明不異于其本也賀循曰其夫為祖曽祖髙祖後者妻從服如舅姑案父䘮母在則母為主婦以其服則斬衰拜則稽顙自宜為主適婦從夫服期不為主而拜賔是則主婦不必主人之妻當從服制之重者也其母先不在者婦服期拜不稽顙而適婦則為主矣承祖父之重者祖母在祖母自為主母服期孫婦服大功若從夫而服期則嫌于母䘮且不為主無庸加服也若祖母與母俱不在孫婦自當服期而為主矣若祖母不在而母在不應舍服期之母而加孫婦之服以代之也承曽祖父之重者曽祖母在自為主祖母服期母服大功曽孫婦服緦曽祖母為主不嫌于夫斬而婦緦也若從夫服期不但姑輕婦重亦嫌于二主矣若曽祖母祖母俱不在而母在緣亡夫之義母能不服期乎母服期則曽孫婦緦自若可也曽孫婦服期而姑大功不疑自居于適而以姑為庶乎賀循之説似是而非不可用也蕙田案宋庾蔚之云舅没則姑老是授祭事于子婦至于祖服自以姑為嫡義疏主婦不必主人之妻是也然與華氏萬氏異義宜㕘之為人後者為其父母報疏此謂其子後人反來為父母在者欲其厚于所後薄于本親抑之故次在孫後也若然既為本生不降斬至禫杖章者亦是深抑而厚于大宗也言報者既深抑之使同本疏往來相報之法故也雷氏次宗曰據無所厭屈則期為輕言報者明子于彼則名判于此故推之于無尊遠之以報服女雖受族于人猶在父子之名故得加尊而降之程子曰既為人後便須將所後者呼之以為父以為母不如是則不正也後之立疑義者見禮有為其父母報便道須是稱親禮文葢言出為人後則本生父母反呼之以為叔父伯父故須著道為其父母以别之非謂將本生父母亦稱為父母也張子曰為其父母不論其族遠近並以期服服之朱子語録問常安習故是如何曰如親生父母子合當安之到得立為伯叔父後疑于伯叔父有不安者這也是理合當如此然而自古却有大宗無子則小宗之子為之後這道理又却重只得安于伯叔父母而不可安於所主父母䘮服則為所後父母服三年所生父母只齊衰不杖期有問濮議曰歐公説不是韓公曽公亮和之温公王珪議是范鎮呂誨范純仁呂大防皆彈歐公但温公又於濮安懿王邊禮數太薄須於中自有斟酌可也歐公之説斷然不可且如今有人為人後者一日所後之父與所生之父相對坐其子來喚所後父為父終不成又喚所生父為父這自是道理不如此試坐仁宗於此亦坐濮王於此英宗過焉終不成都喚兩人為父只緣衆人道是死後為鬼神不可考胡亂喚都不妨都不思道理不可如此先時仁宗有詔云朕皇兄濮安懿王之子猶朕之子也此甚分明當時只以此為據足矣黄氏震曰歐公被陰私之謗皆激於當日主濮議之力公集濮議四卷又設為或問以發明之滔滔數萬言皆以禮經為其父母一語謂未嘗因降服而不稱父母耳然既明言所後者三年而於所生者降服則尊無二上明矣謂所生父母者葢本其初而名之非有兩父母也未為人後之時以生我者為父母也為人後則以命我者為父母立言者於既命之後而追本生之稱自宜因其舊以父母稱未必其人一時並稱兩父母也公亦何苦力辨而至於困辱危身哉况帝王正綂相傳有自非可常人比邪顧氏炎武曰為人後者為其父母此臨文之不得不然隋書劉子翊云其者因彼之辭是也後儒謂以所後為父母而所生為伯叔父母於經未有所攷亦自尊無二上之義而推之也經文言其父母其昆弟者大抵皆私親之辭觀先朝嘉靖之事至於入廟稱宗而後知聖人制禮别嫌明㣲之至也永叔博聞之儒而未見及此學者所以貴務乎格物報謂所生之父母報之亦為之服期也重其繼大宗也故不以出降欽定義疏不杖期而報世叔父母與昆弟子相為之服也稱情以立名緣名以制服程朱之言萬世人倫之凖也或有疑于此者盍取聖人正名之説而三復之乎古人世叔父于昆弟之子亦直稱父子漢疏廣謂兄子受曰宦成名立懼有後悔豈如父子相隨出闗蔡邕與叔父質為程璜所陷邕自陳曰如臣父子欲相傷陷則為人後者呼其本生為父母亦自可通然此乃泛稱之辭要其上承祖宗旁治昆弟則必以世叔父母視之非直以為父母也若直以為父母則二本也名不正言不順矣議禮者乃呶呶于此不亦末乎朱子謂所後父與所生父並在不可並稱為父此猶為大夫士言之若為天子諸侯後者則于君前當名其所生父矣伯叔父且不可稱也而况稱父乎惑于此者可以解矣又案為人後者若係親昆弟之子則不杖期其本服也其他則自小功以至于無服而皆為之不杖期以其本生親之也是則隆于大宗亦未嘗薄于本生大宗至重以正尊尊之本生次重以旁親之首尊者尊之聖人之度量權衡夫豈苟哉傳曰何以期也不貳斬也何以不貳斬也持重于大宗者降其小宗也疏此問雖兼母荅專據父故以斬而言案䘮服小記云别子為祖繼别為大宗謂若魯桓公適夫人文姜生太子名同後為君次子慶父叔牙季友此三子謂之别子别子者皆以臣道事君無兄弟相宗之法與太子有别又與後世為始故稱别子也大宗有一小宗有四大宗一者别子之子適者為弟來宗之即謂之大宗自此以下適適相承謂之百世不遷之宗五服之内親者月筭如邦人五服之外皆來宗之為之齊衰齊衰三月章為宗子之母妻是也小宗有四者謂大宗之後生者謂别子之弟小記註云别子之世長子兄弟宗之第二已下長者親弟來宗之為繼禰小宗更一世長者非直親兄弟又從父昆弟亦來宗之為繼祖小宗更一世長者非直親昆弟從父昆弟又有從祖昆弟來宗之為繼曽祖小宗更一世長者非直有親昆弟從父昆弟從祖昆弟來宗之又有從曽祖昆弟來宗之為繼高祖小宗也更一世絶服不復來事以彼自事五服内繼高祖已下者也四者皆是小宗則家家皆有兄弟相事長者之小宗雖家家盡有小宗仍世事繼髙祖已下之小宗也是以上傳云有餘則歸之宗亦謂當家之長為小宗者也敖氏繼公曰此一節釋所以服期之意為父固當斬衰然父不可二斬不並行既為所後之父斬則於所生之父不得不降而為期葢一重則一輕禮宜然也大宗者繼别子之後者也小宗者凡庶子之長子適孫之屬皆是也此為大宗子矣乃復謂所生之家為小宗者以其本為支子故也持猶主也盛氏世佐曰持猶守也重謂宗祀大宗謂其所後小宗則其本宗也為人後者為其本宗父母昆弟之屬皆降一等是降其小宗矣所以然者䘮三年不祭既為大宗守宗廟祭祀之重則不得舍是而復以尊服服其所生也欽定義疏不二斬者不二父也一語得其宗矣歐陽紛紛昧此耳蕙田案不二斬是正義非止以䘮三年不祭之故而降之也為人後者孰後後大宗也曷為後大宗大宗者尊之綂也禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊綂上卑者尊綂下大宗者尊之綂也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗注都邑之士則知尊禰近政化也大祖始封之君始祖者感神靈而生若稷契也自由也及始祖之所由出謂祭天也上猶遠也下猶近也收族者謂别親疎序昭穆大傳曰繫之以姓而弗别綴之以食而弗殊雖百世婚姻不通者周道然也疏後大宗者案何休云小宗無後當絶故知後大宗也大宗尊之綂者明宗子尊綂領族人不可絶也禽獸已下因上尊宗子遂廣申尊祖以及宗子之事也學士謂鄉庠序及國大學小學之學士雖未有官爵以其習知四術閑之六藝知祖義父仁之禮故敬父遂尊祖得與大夫之貴同也諸侯及其大祖天子及其始祖皆是爵尊者其德所及遠也大宗收族以下論大宗立後之意適子不得後大宗者以其自當主家事并承重祭祀之事故也天子始祖諸侯及大祖並于親廟外祭之是尊綂遠大夫三廟適士二廟中下士一廟是卑者尊綂近也若然此論大宗子而言天子諸侯大夫士之等者欲見大宗子綂領百世而不遷又上祭大祖而不易亦是尊綂遠小宗子惟綂五服之内是尊綂近故傳言尊綂遠近而云大宗綂遠之事也敖氏繼公曰此一節承上文言所以後大宗之意尊之綂為尊者之綂也小宗者族人之所尊而大宗又綂乎小宗故言尊之綂見其至尊也大宗為尊者之綂而收族人故族人不得不為之立後諸侯言太祖天子言始祖則始祖太祖異矣周祖后稷又祖文王白虎通義云后稷為始祖文王為太祖此其徴也及謂祭及之也及其始祖之所自出謂禘也始祖之所自出若殷周之帝嚳也諸侯之太祖世世祭之天子不唯世世祭其太祖又祭其始祖又祭其始祖之所自出葢所祭者之尊不同故也尊者天子卑者諸侯此尊綂謂為祖禰之綂者也尊綂上天子始祖之所自出者也尊綂下諸侯之太祖也此與大宗為族人之尊綂者義不相闗意畧相類故假此以發明之適子不得後大宗則大宗亦有時而絶矣蕙田案適子不得後大宗葢以申言支子為後之義並非謂大宗可絶也既有大宗小宗則支子之可為後者自近及遠必有其人豈有舉皆適子而不可為人後之事如果無之則寧以適子後大宗大宗不可絶也敖氏此言頗為害理觀承案適子不得後大宗正以申言支子為後之義並非謂大宗可絶敖氏大宗亦有時而絶之説誠非矣然適子所以不得後大宗者固以明大宗之不可絶并以明小宗亦不可絶云爾葢大宗所綂者遠既已無子則俱非親子而凡在同宗皆可為後何必適子若小宗則所綂者近人少不必皆有衆子乃本有適子以出後大宗則本宗反有時絶矣此義向似未發須并詳之注以始祖所自出為祭天者葢混禘與郊為一此是康成謬解之必不可從者汪氏琬曰公子有宗道大夫亦然庶姓而起為大夫則得别于族人之不仕者禮别子為祖繼别為宗大夫獨非大宗與然則大夫與公子若是班乎曰然公子不敢援諸侯故公子為别子大夫之族不敢援大夫故大夫亦為别子也如之何其可無後也子夏曰適子不得後大宗然則莫尚于大宗矣奚為不使適子後之也曰以其傳重也古人敬宗而尊祖禰適子者繼祖禰者也故不可以為人後也然則無宗支適庶而皆為之置後今人之所行古人之所禁也不亦大悖于禮與曰此禮之變也葢自宗法廢而宗子不能收族矣宗子不能收族則無後者求祔食而無所其母乃驅之為厲乎故不得已為之置後也變也然則今之置後者必親昆弟之子次則從父昆弟之子則于古有合與曰不然也禮同宗皆可為之後也大夫有適子則後適子有庶子而無適子則卜所以為後者如衞之石祁子是也况無子而為之置後其有不聽于神乎吾是以知其不然也卜之則勿問其孰為親孰為疏可也是可行于古亦可行于今者也華氏學泉曰或問為人後者不皆親昆弟之子或小功緦麻及族人之無服者為之于其本生父母之服何如曰禮為人後者為其父母期不聞以所後者之親疏異也為人後者為其兄弟大功亦不聞以所後者之親疏異也葢人子不得已而為人後降其親一等以伸所後之尊足矣不容計所後之親疏遠近而異其服也其所以必降其親者何也隆于所後也其所以不計其親疏者何也隆于所後亦不得薄于所生也先王之制服所以交致其情而无憾也曰降其父母之服不易其父母之名何也曰記禮者為著其服不得不係之其父母也非為人後者自稱之辭也既已為所後者謂之父母又仍其父母之稱而不易非不二綂之㫖矣夫人子之于其所生也其恩罔極也一旦出而為人後誠有所大不忍于其父母聖人斷之以義為降其父母之服使之同于世叔父母而其父母亦降其尊而為之報以同其子于昆弟之子凡此者皆所以重大宗使割其私恩而制之以義也夫惟衆人常以恩揜義而聖人必以義勝恩使人子之不忍于其親者不得不抑而就聖人之制而猶懼人情之以私恩而干公議也烏有仍其父母之稱使名與實相違也哉然則曽子固歐陽公為人後之議所主稱親之説非歟曰非也歐曾之説主于恩者也吾折衷之于朱子朱子之説主于義者也歐曽之言曰為人後者不當易其父母之稱朱子曰今設有為人後者于此一日所後之父與所生之父並坐而其子侍側稱所後父曰父稱所生父又曰父自是道理不可朱子之所謂不可者主以理也而未嘗非情歐曽之所言者主以情也而于理有所不可矣蔡氏德晉曰華氏論為人後者為其父母服及其稱名之義當矣或又問如宋胡寅以五日子父母棄之為叔父安國所舉遂不持本生父母服明胡廣本姓黄父母以五日子棄之江後父得而養之亦不持本生父母服若是者何如也曰父母生子欲棄而殺之固自絶于子矣然人子于身所由來不可忘也以為人後者為其父母之服服之可也故胡廣則已薄矣胡寅既以伯父之服服之則無可議也欽定義疏大宗無後則同父仲叔季之子皆可後之凡同祖司曽祖同髙祖以及無服之子皆可後之但取同繼别之宗者而已傳恐人拘于倫叙之戚疏而取必于其戚者則絶已以後人殊非為後者之所安而舍多奪少亦非均安之道故云小宗之適子自繼小宗不可以後大宗正與前傳同宗則可為之後相發也又案適子不得後大宗則小宗亦不可輕絶明矣小宗無後者不立後古法也以支子後之要亦非聖人之所禁者漢書哀帝元帝庶孫定陶共王子也母曰丁姬年十三嗣立為王成帝無子徴立為皇太子上以太子奉大宗後不得顧私親乃立楚思王子景為定陶王奉共王後成帝崩太子即位成帝母稱太皇太后成帝趙皇后稱皇太后而祖母傅與母丁自以定陶共王為稱已而傅必欲稱尊號于是追尊傅為定陶共皇太后丁為共皇后郎中令冷褒黄門郎叚猶等復奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號又宜為共王立廟京師師丹議曰為人後者為之子故為所後服斬衰三年而降其父母期明尊本祖而重正綂也孝成皇帝聖恩深遠故為共王立後奉承祭祀恩義已備陛下繼體先帝持重大宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟宋史濮安懿王允讓商王元份子也仁宗在位久無子乃以王第十三子宗實為皇子仁宗崩王子即位是為英宗治平二年四月詔議崇奉濮典禮天章閣待制司馬光等議曰禮為人後者不敢顧私親聖人制禮尊無二上自漢以來帝王有自旁支入繼大綂或推尊父母以為帝后皆見非當時取譏後世今日崇奉典禮宜凖先朝封贈期親尊屬故事髙官大國極其尊崇濮王于仁宗為兄陛下宜稱皇伯父而不名歐陽脩著濮議曰為人後者為其父母期謂之降服親不可降降其外物爾䘮服是也聖人降三年為期而不没其父母之名以見服可降而名不可没也議者欲以為人後之故使一旦視父母若未嘗生我者其絶之也甚矣程子代侍御史彭思永疏曰陛下嗣承祖宗大綂則仁廟陛下之皇考陛下仁廟之適子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為姪此天地大義生人大倫不可變易者也苟亂大倫人理滅矣更稱濮王為親是有二親是非之理昭然明也設如仁皇在位濮王居藩陛下既為冢嗣復以親稱濮王則仁皇豈不震怒濮王豈不側懼君臣兄弟立致釁隙其視陛下當如何也神靈如在亦豈不然明史世宗厚熜憲宗孫也父興獻王國安陸正德十四年薨帝年十三以世子理國事十六年三月襲封武宗崩無嗣慈壽皇太后與大學士楊廷和定策以遺詔迎王于興邸即皇帝位秋七月進士張璁言繼綂不繼嗣請追崇所生立興獻王廟于京師初禮臣議考孝宗改稱興獻王皇叔父援宋程頥議濮王禮以進不允至是下璁奏命廷臣集議楊廷和等抗疏力爭皆不聽冬十月己卯朔追尊父興獻王為興獻帝祖母憲宗貴妃邵氏為皇太后母妃為興獻后嘉靖元年正月命稱孝宗皇考興獻帝后為本生父母三月上􅄌壽皇太后尊號曰昭聖􅄌壽皇太后武宗后曰莊肅皇后上皇太后尊號曰壽安皇太后興獻后曰興國太后三年正月南京刑部主事桂萼請改稱孝宗皇伯考夏四月上興國太后尊號曰本生聖母章聖皇太后追尊興獻帝為本生皇考恭穆獻皇帝九月丙寅定稱孝宗為皇伯考昭聖皇太后為皇伯母獻皇帝為皇考章聖皇太后為聖母武宗為皇兄武宗后為皇嫂案張璁以世宗入繼為繼綂不繼嗣直抉為人後之藩籬乃俾世宗得以恣行其私而無忌計誠狡矣夫繼綂不繼嗣者舜之受堯禹之受舜則然或更如光武之中興昭烈之存漢則亦可云爾興王非異姓之禪受也未有力征之經營也受武宗遺詔而踐帝位何云非繼嗣乎苟非嗣何有綂綂與嗣可相離乎析綂與嗣而二之璁之創論前古所未有也若質言之不過取其天下而絶其嗣云爾而飾辭曰繼綂不繼嗣豈非掩耳盜鈴之術乎且夫綂者自太祖而下至于髙曽祖禰以相屬者也綂承武宗嗣繼孝宗繼孝宗猶之繼武宗也此則兄終弟及之道也今不考孝宗而考興獻王興獻王固不得禰憲宗也如是則不但孝宗武宗之綂絶即憲宗以上至太祖之綂胥絶矣何繼之有論者謂士大夫之宗法不可施于天子故與為人後之禮别然則士大夫大宗不可絶可絶者獨天子也有是理乎璁既顯言不繼嗣則固決意絶孝宗之嗣矣孝宗何士大夫之不若乎論者謂有武宗故不得考孝宗若考孝宗則置武宗于何地故不得考孝宗也然則無武宗乃考孝宗孝宗轉以有武宗而致絶也不知考孝宗則孝宗有二子兄終而弟及孝宗有子而武宗有弟則武宗亦不絶矣不考孝宗則孝宗終無子而武宗則無弟兩世不胥絶乎且其興國則承之于獻王天位則受之于先帝不考孝宗則無所承受律以春秋之義不可謂得國之正也當武宗荒淫倉卒棄世江彬錢寧軰肘腋可虞天下岌岌諸大臣欲急定危疑故遺詔草率爾興王獨子不可以後人固當立他藩之支子以為武宗嗣斯應經義設爾興王敢執辭以爭乎即執辭以爭亦必曰吾以倫序當為孝宗後必不敢曰吾當受天下不願為後也倫序當立之説經傳所無同宗則可為之後何必興王耶設遺詔中不曰倫序當立但云立某為皇太弟繼孝宗皇帝後彼雖無良其敢顯然而悖之耶抑能篤于所生決然舍去而就藩耶夫不以天下易親者人倫之至也不肯後人即當辟位大枋在手箝天下之口而以狠愎暴戾行之此豈棄天下如敝屣者乎璁萼諸人迎合希寵與冷褒叚猶心事如一不但人倫之辠人亦經學之蟊蠧也議禮者無為簧舌所惑又案歐陽謂濮王宜稱親尚考仁宗也固賢于璁萼之不考孝宗者然解經實繆其拘牽字句正所謂以文害辭以辭害意者乃撓千古之公論助姦匪之聲援且若預作璁萼之嵎者其為禍亦烈矣天之生物聖人之制禮使之一本而脩使之二本其為白圭之玷不既多乎蕙田案自古小人逢君每缘飾經義以文奸言未有如璁萼之滅裂經義以肆其邪説者儀禮言為人後即為子之説也然言為子則尚輕而為後則尤重葢有為子而不為後者矣未有為後而不為子者也而璁萼乃為繼綂不繼嗣之説夫嗣在斯綂在不繼嗣何以偏繼綂耶當時薛蕙辨之云不為後則不成子也若不成子安所得綂而繼之故為後也者成子也成子而後繼綂又將以絶同宗覬覦之心焉徐氏乾學曰為人後者為之子自天子至于庶人一也曰為人後則不言為之子而分定矣猶適子衆子或稱為父後或不為父後或為母後或不為母後或孫為祖後為後者子之尤重者也可謂一語破的矣義疏稱璁萼所言不過取其天下而絶其嗣律以春秋之義不可謂得國之正義正詞嚴千秋定案餘詳私親廟門盛氏世佐曰此皆論大宗不可絶族人當以支子後之之義葢為小宗之支子者一旦棄其本宗而為大宗後人子之心或有所不安于此故以大義斷之而曰後大宗者即所以尊祖也則族人皆知義之無所逃而不得以親疎易位為嫌矣尊謂别子之為祖者也大宗者尊之綂也者謂祖之正綂在大宗也以母比父則父尊父在為母期是也以禰比祖則祖又尊不以父命辭王父命是也推而上之至别子之為祖者而尊止矣大夫不得祖諸侯諸侯不得祖天子故諸侯宗廟之祭得及其始受封之太祖天子禘祭得及其始祖之所自出之帝祭之所及綂之所自起也德有厚薄爵有尊卑綂亦有遠近要為不可絶其義一也適子不得後大宗者重絶人之祀也族人多矣寧必以其適為後哉言此者亦所以杜爭繼之釁也女子子適人者為其父母昆弟之為父後者疏女子卑于男子故次男子後敖氏繼公曰此昆弟不言報是亦為之大功耳張氏爾岐曰出嫁之女為本宗期者三父一母一昆弟為父後者一盛氏世佐曰為其父母期以出降也為其昆弟之為父後者亦期不敢降其宗也傳曰為父何以期也婦人不貳斬也婦人不貳斬者何也婦人有三從之義無專用之道故未嫁從父出嫁從夫夫死從子故父者子之天也夫者妻之天也婦人不貳斬者猶曰不貳天也婦人不能貳尊也注從者從其教令疏經兼言父母傳特問父不問母者家無二尊故父在為母期今出嫁仍期但不杖禫而已未多懸絶故不問案雜記云與諸侯為兄弟者服斬是婦人為夫并為君得二斬此云婦人不貳斬者在家為父斬出嫁為夫斬此其事常彼為君不可以輕服服君非常之事不得決此也婦人有三從所從即為之斬夫死從子不為子斬者子為母齊衰母為子不得過齊衰也敖氏繼公曰此一節釋為其父母也從者順其所為而不違之所謂以順為正者也天者取其尊大之義人所尊大者無如天故以之為比欽定義疏案李氏如圭曰所謂與諸侯為兄弟者服斬者自主男子言之婦人不貳斬何義而以斬服服君乎為夫之君應服期案李氏所辨最析且不獨内宗外宗即王姬之已降者亦然也曰敢以輕服服至尊乎曰大功已下為輕齊衰則猶重也既嫁天夫父不奪之君豈奪之乎為昆弟之為父後者何以亦期也婦人雖在外必有歸宗曰小宗故服期也注歸宗者父雖卒猶自歸宗其為父後服重者不自絶於其族類也曰小宗者言是乃小宗也小宗明非一也小宗有四丈夫婦人之為小宗各如其親之服避大宗疏云小宗故服期者欲見大宗子百世不遷宗内丈夫婦人為之齊衰三月小宗父之適長者為之婦人所歸不歸大宗歸此小宗遂為之期與大宗别傳恐人疑為大宗故辨之註云父雖卒猶自歸宗者若父母在嫁女自當歸寧父母何須歸宗乎傳言婦人雖在外必歸宗明是據父母卒者而言若然天子諸侯夫人父母卒不得歸宗以其人君絶宗故許穆夫人衞侯之女父死不得歸賦載馳詩是也云丈夫婦人為小宗各如其親之服者謂各如五服尊卑服之無所加減大宗則丈夫婦人五服外皆齊衰三月五服内月算如邦人亦皆齊衰無大功小功緦麻故云避大宗也馬氏融曰歸宗者歸父母之宗也昆弟之為父後者曰小宗王氏肅曰嫌所宗者唯大宗故曰小宗明各自宗其為父後者也敖氏繼公曰此一節釋為其昆弟之為父後者也歸宗者所歸之宗也婦人雖外成然終不可忘其所由生故以本宗為歸宗也歸云者若曰婦人或不安于夫家必以此為歸然也其于為父後者特重以其為宗子也以私親言之故曰小宗其昆弟雖繼别猶謂之小所以别于夫家之宗也張氏爾岐曰婦人雖已嫁在外必有所歸之宗此昆弟之為父後者即繼禰之小宗故為之服期也盛氏世佐曰案女子子適人者謂其宗子為歸宗所以别于夫家之宗也爾雅云謂姪之子為歸孫亦是此意由繼禰之小宗推之則繼祖以上之小宗及繼别之大宗此女服之亦與在室者同可知矣欽定義疏案此小宗直指昆弟之為父後者不但非繼别之宗亦并非繼髙繼曽繼祖之宗也婦人已嫁而反父在則歸于父父不在則歸于昆弟之為父後者如昆弟之為父後者又不在則所謂有所取無所歸者而夫亦不去之矣以其不可歸于從父昆弟亦不可歸于庶昆弟與昆弟之子也古者婦人父母亡無歸寧之法惟見出乃歸宗爾云必有者歸宗雖或然之事而必有可歸之宗他年或歸則歸此昆弟之為父後者故不降而為之期也以此見婦人在家恒凛凛乎有不克終之戒焉繼父同居者疏繼父本非骨肉故次在女子子之下案郊特牲云夫死不嫁終身不改詩共姜自誓不許再歸此得有婦人將子嫁而有繼父者彼不嫁者自是貞女守志亦有嫁者雖不如不嫁而聖人許之敖氏繼公曰繼父因母之後夫也其或從繼母而嫁者若為其夫服亦宜如之郝氏敬曰前夫子謂母再嫁之夫曰繼父同居則恩猶父也雖非血屬死亦為期又曰婦人二夫女德虧矣䘮服有繼父叔季委巷之禮非古聖經制議禮者不可不思盛氏世佐曰案俗之薄也栢舟之節未可槩諸凡人凱風之嘆時或興于孝子聖人慮後世失節之婦必有棄其遺孤而莫之恤者故于齊衰杖期章為制繼母嫁從之服而于此章又著繼父同居之文使之相收相養而六尺之孤庶不至轉于溝壑焉此聖人之㣲權也疏以為許婦人改嫁誤矣郝又因是而訾聖經是烏知禮意哉傳曰何以期也傳曰夫死妻稺子幼子無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宫廟歲時使之祀焉妻不敢與焉若是則繼父之道也同居則服齊衰期異居則服齊衰三月必嘗同居然後為異居未同居則不為異居注妻稺謂年未滿五十子幼謂年十五已下子無大功之親謂同財者也為之築宫廟于家門之外神不歆非族妻不敢與焉恩雖至親族已絶矣夫不可二此以恩服爾未嘗同居則不服之父疏子家無大功之内親繼父家亦無大功之内親繼以財貨為此子築宫廟使此子四時祭祀不絶三者皆具即為同居子為之期恩深故也三者若闕一事則為異居假令前三者皆具後或繼父有子即是繼父有大功内親亦為異居矣如此則為之齊衰三月而已若初與母往繼父家時或繼父有大功内親或已有大功内親或繼父不為己築宫廟三者一事闕雖同在繼父家亦名不同居繼父全不服之矣為之築宫廟于家門之外者以其中門外有己宗廟則知此在大門外築之也隨母嫁得有廟者非必正廟但是鬼神所居曰廟若祭法云庶人祭于寢也杜氏佑曰大唐聖厯元年太子左庶子王方慶嘗書問太子文學徐堅曰女子年幼小而早孤其母貧窶不能守志擕以適人為後夫之鞠養及長出嫁不復同居今母後夫亡欲制繼父服不知可不人間此例甚衆至于服紀有何等差前代通儒若何議論堅荅曰儀禮䘮服經繼父同居齊衰所謂子無大功之親與之適人所適亦無大功之親而所適者以貨財為之築宫廟歳時使之祀焉者也鄭康成曰大功之親同財者也築宫廟者于家之門外神不歆非族也以恩服耳未嘗同居即不服也小戴禮記繼父服並有明文斯禮經之正説也至于馬融王肅賀循等並稱大儒達禮更無異文惟傅元著書以為父無可繼之理不當制服此禮焚書之後俗儒妄造也袁准作論亦以為此則自制父也亂名之大者竊以父猶天也愛敬斯極豈宜靦貌繼以他人哉然而藐爾窮孤不能自立既隨其母託命他宗本族無養之人因記得存其繼嗣在生也實賴其長育及其死也頓同之行路重其生而輕其死篤其始而薄其終稱情立文豈應如是故袁傅之駁不可為同居者施焉昔朋友之死同㸑之䘮並制緦麻詳諸經典比之于此葢亦何嫌繼父之服宜依正禮今女子母擕重適人寄養他門所適􅄌流情均膝下長而出嫁始不同居此則笄總之儀無不畢備與築宫立廟無異焉葢有繼父之道也戴德䘮服記曰女子子適人者為繼父服齊衰三月不分别同居異居梁氏集説亦云女子子適人者服繼父與不同居者服同今為齊衰三月竊為折衷方慶深善此答敖氏繼公曰傳之言若此則是子于繼父本無服特以三者具且同居故為服此服若先同居後異居則降而三月是又于三者之外以居之同異為恩之深淺而定服之重輕也然則三者或闕其一雖同居亦無服矣小記言同居異居者與此異更詳之蕙田案小記以皆無主後同財而祭其祖禰為同居有主後者為異居是即以三者具為同居也敖氏三者具且同居似同居又在三者之外故言小記與此異恐未然郝氏敬曰傳引舊傳明同居之義見所以為服非苟也妻稺夫死子幼無親與子再適人非得已也子稱其人為同居繼父非泛然同居也設使子有大功之親則不得依他人為父使其人有大功之親則亦不得養他人為子或私其財貨不與同利易其宗姓使不得自奉其先祀或私其妻預既絶之禮使鬼神不享有一于此則恩誼薄烏得稱父必是數者兼備又獨父孤子終身相依如此真繼父矣然後可為齊衰期年若三者備始同居而後異居則但可為齊衰三月若初未嘗同居于前數者無一焉路人耳三月不可况期年乎顧氏炎武曰夫物之不齊物之情也雖三王之世不能使天下無孤寡之人亦不能使天下無再適人之婦且有前後家東西家而為䘮主者矣假令婦年尚少夫死而有三五歳之子則其本宗大功之親自當為之收恤又無大功之親而不許之從其嫁母則轉于溝壑而已于是其母所嫁之夫視之如子而撫之以至于成人此子之于若人也名之為何不得不稱為繼父矣長而同居則為之服齊衰期先同居而後别居則齊衰三月以其撫育之恩次于生我也為此制者所以寓恤孤之仁而勸天下之人不獨子其子也苦曰以其貨財為之築宫廟此後儒不得其説而為之辭張氏爾岐曰必嘗同居然後為異居者前時三者具為同居後三者一事闕即為異居乃為齊衰三月若初往繼父家時三者即不具是未嘗同居全不為之服姜氏兆錫曰稺當謂年未滿三十盛氏世佐曰案同居則服齊衰期謂始終同居者也異居則服齊衰三月謂始同終異者也小記云繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居正與此傳相發明皆無主後即傳所謂子無大功之親所適者亦無大功之親也同財而祭其祖禰即傳所謂以其貨則為之築宫廟歲時使之祀焉也三者具為同居一不具即為異居云有主後者為異居舉一以例其餘耳華氏學泉曰或問儀禮有繼父之服父何繼乎絶族無施服母出嫁與廟絶而繼父為之齊衰乎曰此以恩服也聖人所以通人道之窮使鰥寡孤獨各得其所舉天下無顛連無告之民者也夫夫死妻稺子幼無大功之親真天下之窮民而無告者也婦人不二夫禮之常也夫死妻稺子幼遇之變也而又無大功之親以相周恤則此㷀㷀孤子係祖父再世之血食設一旦轉死溝壑棄兩世之孤斬先人之祀聖人之所大不忍也是故既立宗子之法以收族而又恐窮鄉庶姓或吾法之所不能及且恐宗子之法久而不能無廢墜也不得已為通其窮制同居繼父之服而傳為之申明其制曰夫死妻稺子幼無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宫廟歲時使之祀焉妻不敢與焉若是則繼父之道也嗚呼傳之言盡之矣失其所以適人而所適亦無大功之親此其孤單獨立年老無倚與稺妻幼子窮相埓耳是故兩人之窮常兩相恤兩相倚聖人之所以不禁也而第為之教曰所適者能以其貨財為若子築宫廟不絶其先祖之血食而又為之不悖于禮恩莫隆焉是則有繼父之道矣聖人固許之為父子矣許之為父子而後天下之為繼父者能盡其心以相卹亦惟命之為父子而後天下之待繼父者不背其恩以相棄使所適者幸而他日有子則若子歸其本宗而為異居繼父仍不敢忘其前日之恩為制齊衰三月之服以報之若不幸而所適者終于無子則以恩相終始而為同居繼父生則為之養死則為之齊衰期此亦情之不容諉義之無可辭者也然必妻稺子幼無大功之親而後許之適人非是不得藉口以適人矣必所適者以其貨財為之築宫廟以存其先祀而後謂之繼父非是不得託名于繼父矣必兩無大功之親同財而祭其祖禰而後謂之同居繼父非是不得比恩于同居矣且其所以必為之築宫廟于家門之外者神不歆非族而不敢以非禮凟也其所以妻不敢與焉者婦人不二夫而不敢以非禮干也其所以專舉築宫廟歲祀為繼父之道者恩莫隆于崇其先美莫重于尊其祖而不敢以私恩混也此禮之作所謂仁至義盡非聖人莫之能定者也俗儒不知推求聖人之制顧謂周立宗子之法以收族安有顛連而入繼父之家者疑其非周公之舊夫宗子之法所以仁一世也然其法不能不廢故繼父之服以通人道之窮所以仁萬世也禮之作合經權常變以垂則于萬世而豈拘拘守一法以為盡善而不為法外之慮哉嗟乎三禮惟儀禮最古而又從而疑之奮其拘曲之説以詆毁之則是天下舉無可信之書也甚矣其妄也欽定義疏繼父之有服所謂亡于禮者之禮也義生于恩之服也俱無大功親兩煢若相依為命者然又慮其亡父之餒也而别為之所使孤兒得以伸其孝敬此于生者死者兩有恩焉雖非父也而可方諸伯叔父之倫是以為之服期也父無可繼之理聖人寧不知之而必制此者所以備時事之窮而周其變也然必三者具又始終同居然後服之則其法嚴矣世之合此者僅矣異姓亂宗之端亦可以弭矣註謂妻穉年未滿五十言其極爾其實未滿二十三十四十者並賅焉又案築宫廟非必備廟制也畧為之所而已其祭未必有尸也稷饋而已子未成人未必三獻也隂厭而已然則此禮葢為庶人設與抑士之單㣲者亦偶有之與又案小記有主後者為異居謂繼父他年自有子者也然則為之服者不獨以其恩亦憐其無主彼若有主則此之情殺矣合小記觀之尤備為夫之君疏此以從服故次繼父下但臣之妻皆禀命于君之夫人不從服小君者欲明夫人命亦由君來故臣妻于夫人無服也盛氏世佐曰案雜記云外宗為君夫人猶内宗也鄭註云皆謂嫁于國中者也為君服斬夫人衰不敢以其親服服至尊也外宗謂姑姊妹之女及舅之女及從母皆是也内宗五屬之女也其無服而嫁于諸臣者從為夫之君嫁于庶人從為國君然則為夫之君在此章者謂諸臣之妻本與君無服者耳不服斬又不服夫人是其異于外宗内宗者也欽定義疏諸侯夫人畿内公卿大夫士之妻為天子侯國公卿大夫士之妻為國君凡公卿大夫士之臣之妻為其君皆是也臣妻不服君夫人者以從服直一從而已不累從也傳曰何以期也從服也疏從服者以夫為君斬故妻從之服期也郝氏敬曰臣為君斬臣妻為君期夫之所尊妻從服也凡從服降正服一等姑姊妹女子子適人無主者姑姊妹報疏此等親出適已降在大功雖矜之服期不絶于夫氏故次義服之下女子子不言報者女子子出適大功反為父母自然猶期不須言報姑對姪姊妹對兄弟出適反為姪與兄弟大功姪與兄弟為之降至大功今還相為期故言報也敖氏繼公曰為姑姊妹女子子出適者降為大功今以其無主乃加于降服一等而為之期其姑姊妹于昆弟姪亦不容不以其所加者服之云報者服期之義生于已而不在彼故也女子子適人者為父母自當期固不必言報矣然父母為己加一等而已于父母不復加者其亦以婦人不能貳斬也與郝氏敬曰姑于姪姊妹于昆弟女子子于父母適人死父母昆弟姪為大功常也若無後為主則為期加憐也姑姊妹于姪昆弟死無主亦然以報也有主姑姊妹適人者為大功盛氏世佐曰案此等皆期親因出而降于大功復因無主而升于期者無主謂死而無主其䘮者也凡因出而降者為其有受我而厚之者也既無主則無受我而厚之者矣故不忍降也報謂姑姊妹之無主者亦以期服報其姪與昆弟也由是推之則姪與昆弟之無主者姑姊妹其亦為之服期而相報與又案適人無主與被出而反在室者大畧相似惟女子子之為父母服則異子嫁反在室為父在斬衰章其無主者仍為父母期而已欽定義疏女子子適人無主者父為之期而彼不為父斬者彼已為夫斬故也父母之于女服可加者仁之通女之于父母服不可加者義之限也服過于期則疑于見出而去夫之室者矣然則于姪與昆弟何以報也期其本服也憐我而厚我不可以徒受也此主謂大夫士小宗不立後者若大宗立後則無無主者矣杜佑謂天子為姑姊妹女子子嫁于王者後無主者服與此同君夫人雖無後不應無祭主果有之其在季世與傳曰無主者謂其無祭主者也何以期也為其無祭主故也注無主後者人之所哀憐不忍降之無疏無主有二謂䘮主祭主傳不言䘮主者䘮有後無無主者若當家無䘮主或取五服之内親又無五服親則取東西家若無則里尹主之今無主者謂無祭主也註云人之所哀憐者謂行路之人見此無夫復無子而不嫁猶生哀愍况姪與兄弟及父母故不忍降之也除此之外餘人為服者仍依出降之服而不加以其恩疏故也不言嫁而言適人者言適人即謂士若言嫁乃嫁于大夫于本親又以尊降不得言報矣敖氏繼公曰祭主者夫若子若孫也死而無祭主尤可哀憐故加一等得加一等者以其本服如是也欽定義疏婦人無祭主以其夫無祭主也其夫無祭主猶得祔食于宗子之家婦人則竟已矣故父母昆弟姪尤矜之也曰不從夫而祔食乎適子自祭其祖禰尚有吉祭未配者無後者與殤者等禮從其略焉得配耶然則父昆弟為之加服而不為之祭者何也曰婦人外成分有所限則氣亦不屬也為君之父母妻長子祖父母疏此亦從服輕于夫之君及姑姊妹女子子無主故次之敖氏繼公曰祖父母尊也乃在下者見其為變服也孫與祖父母其正服期郝氏敬曰君凡有地者之通稱臣為君之父母與妻與長子與祖父母皆期六者皆君至親君服臣從服盛氏世佐曰案此君之父與祖父皆謂未嘗為君者也若既為君而薨則臣當為之服斬不在此例矣君之母謂卒于君之父之後者也君之祖母則又卒于君之父若祖之後者也故君皆為之齊衰三年而臣從服期若君之父在而母與祖母卒及父卒祖在而祖母卒則君但為之期而臣不從服矣先言君之父母妻長子而後言祖父母者葢君為祖父母三年而臣從服期必其君之父先卒者也君之妻長子之䘮則不因君之父之存没而異故其立言之次如此又案服問云大夫之適子為君夫人太子如士服然則君之妻長子之䘮其服及于大夫之適子而君之父母與祖父母則否矣是亦其異也所以異者以小君儲君臣下自應有服其他則從君服而已見為臣則從未為臣則否傳曰何以期也從服也父母長子君服斬妻則小君也父卒然後為祖後者服斬注此為君矣而有父若祖之䘮者謂始封之君也若是繼體則其父若祖有廢疾不立者父卒者父為君之孫冝嗣位而早卒今君受國于曾祖疏云父母長子君服斬者欲見臣從君服期君之母當齊衰而言斬者以母亦有三年之服故并言之云妻則小君也者欲見臣為小君期是常非從服之例注云謂始封之君也者始封之君非繼體容有祖父不為君而死君為之斬臣亦從服期也若是繼體則其父若祖合立為廢疾不立已當立是受國于曽祖若今君受國于祖祖薨則羣臣為之斬何得從服期故鄭以新君受國于曽祖若然曽祖為君薨羣臣自當服斬若君之祖薨君為之服斬則臣從服期也趙商問已為諸侯父有廢疾不任國政不任䘮事而為其祖服制度之宜年月之斷云何答云父卒為祖後者三年斬何疑趙商又問父卒為祖後者三年已聞矣所問者父在為祖如何欲言三年則父在欲言期復無主斬杖之宜主䘮之制未知所定答曰天子諸侯之䘮皆斬衰無期彼志與此註相兼乃具也朱子曰孫為祖承重頃在朝檢此條不見後歸家檢儀禮疏説得甚詳正與今日之事一般乃知書多看不徧舊來有明經科便有人去讀這般書註疏都讀過自王介甫新經出廢明經學究科人更不讀書卒有禮文之變更無人曉得為害不細凖五服年月格斬衰三年嫡孫為祖謂承重者法意甚明而禮經無文但專云父没而為祖後者服斬然而不見本經未詳何據但小記云祖父没而為祖母後者三年可以旁照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任䘮事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖服向來入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此説方得無疑乃知學之不講其害如此而禮經之文誠有闕略不無待於後人向使無鄭康成則此事終未有斷決不可直謂古經定制一字之不可増損也黄氏􅆬曰晉蔣萬問范宣嫡孫亡無後次子之後可得傳祖重不宣答曰禮為祖後者三年不言適庶則通之矣無後猶取繼况見有孫而不承之耶庶孫之異於適者但父不為之三年祖不為之周而孫服父祖不得殊也本朝皇祐元年十一月三日大理評事石祖仁言先於八月十五日祖父太子太傅致仕中立身亡叔國子博士從簡成服後於十月十五日身亡祖仁是適長孫欲乞下太常禮院定奪合與不合承祖父重服詔禮院詳定博士宋敏求議曰案子在父䘮而亡嫡孫承重禮令無文通典晉人徐邈嫡孫承重在䘮中亡其從弟已孤未有子姪相繼疑於祭事邈答曰今見有諸孫而事同無後甚非禮意禮宗子在外則庶子攝祭可使一孫攝主而服本服期除則當應服三年不何承天答曰既有次孫不得無服但次孫先已制齊衰今不得更易服當須中祥乃服練裴松之曰次孫本無三年之道無縁忽於中祥重制如應為後者次孫宜為䘮主終三年不得服三年之服而司馬操駁之謂二説無明據其服宜三年也自開元禮以前嫡孫卒則次孫承重况從簡為中子已卒而祖仁為嫡孫乎大凡外襄中事内奉靈席有練祭祥祭禫祭可無主之者乎今中立之䘮未有主之者祖仁名嫡孫而不承其重乃曰從簡已當之矣而可乎且三年之䘮必以日月之久而服之有變也今中立未及葬未卒哭從簡已卒是日月未久而服未經變也焉可無所承哉或謂已服期今不當接服斬而更為重制案儀禮子嫁反在父之室為父三年鄭康成註謂遭䘮而出者始服齊衰期出而虞則以三年之䘮受杜佑號通儒引其義附前問答之次况徐邈范宣之説已為操駁之是服可再制明矣又舉葬必有服今祖仁宜解官因其葬而制斬衰其服三年後有如其𩔖而已葬者用再制服通厯代之闕折衷禮文以沿人情謂當如是請著為定式詔如敏求議熈寧八年閏四月集賢校理同知太常禮院李清臣言檢㑹五服年月勅斬衰三年加服條嫡孫為祖註謂承重者為曽祖髙祖後者亦如之又祖為嫡孫正服條註云有適子則無適孫又凖封爵令公侯伯子男皆子孫承適者傳襲若無適子及有罪疾立適孫無適孫以次立適子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曽孫以下凖此究尋禮令之意明是嫡子先死而祖亡以適孫承重則體無庶叔不繫諸叔存亡其適孫自當服三年之服而衆子亦服為父之服若無適孫為祖承重則須依封爵令適庶遠近以次推之而五服年月敕不立庶孫承重本條故四方士民尚疑為祖承重之服或不及上禀朝廷則多致差悞欲乞特降朝㫖諸祖亡無適孫承重依封爵令傳襲條子孫各服本服如此則明示天下人知禮制祖得繼傳綂緒不絶聖主之澤也事下太常禮院詳定於是禮房看詳古者封建國邑而立宗子故周禮適子死雖有諸子猶令適孫傳重所以一本綂明遵之義也至于商禮則適子死立衆子然後立孫今既不立宗子又不常封建國邑則不宜純用周禮欲於五服年月敇適孫為祖條脩定註詞云謂承重者為髙祖曽祖後亦如之適子死無衆子然後適孫承重即適孫傳襲封爵者雖有衆子猶承重從之今服制令諸適子死無兄弟則嫡孫承重若適子兄弟未終䘮而亡者適孫亦承重其亡在小祥前者則於小祥受服在小祥後者則申心䘮並通三年而除無適孫則適孫同母弟無同母弟則衆長孫承重即傳襲封爵者不以適庶長幼雖有適子兄弟皆承重曽孫元孫亦如之蕙田案石祖仁祖死無父身為適孫自應承重不待叔父死而後請承重也宋法有伯叔者嫡孫皆不承重於禮不合至立嫡之法以李清臣所引封爵令無嫡子立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫其説為的襲爵如是重服如是條理井然禮之所以定親疎決嫌疑也又案熈寧八年所定傳襲封爵者皆承重此即鄭志天子諸侯之䘮皆斬衰無期之㫖所謂一言而為萬世法者與敖氏繼公曰此先總言從服則夫人之服亦在其中矣以其非從斬而期故復以小君别言之為小君亦謂之從服者謂其德配于君乃有小君之稱故也為母齊衰亦云斬者以皆三年而略從其文耳父卒然後為祖後者服斬則是父在而祖之不為君者卒君雖為之後亦唯服期以父在故爾惟祖後于父而卒者君乃為之斬也葢其斬與期惟以父之存没為制君服斬然後臣從服期也又此言為君之母與其祖母皆指其卒于夫死之後者也其夫若在君為之期則臣無服也郝氏敬曰凡孫為祖期以有父為後也若孫無父後祖亦服斬故君有以適孫繼祖服斬者臣亦從服期凡從服降一等又曰鄭謂此始封之君其祖與父未嘗為君故臣無服從君之服是也又謂父卒者為君之孫宜嗣位早卒今君受國于曾祖非也父卒為祖後服斬此禮不專為君設凡孫于祖皆然此因臣從服君祖父母期明君所以服斬之敬衛輒繼祖援此禮但此祖父未嘗為君嘗為君則臣亦服斬矣汪氏琬曰禮父在為祖期父卒為祖後者服斬此䘮服傳之明文也後儒若賀循徐廣之徒乃言父亡未殯而祖亡適孫不敢服祖重謂父屍尚在不忍變于父在也愚竊以為不然禮殯而後成服父既前卒則先成父服而後成祖服當其成祖服之時父屍已殯矣夫何不敢服重之有祖無適子而猥云不忍不忍于父而忍于其祖則父之心能安父之目能􅉂耶為長子傳曰正體于上又乃將所傳重也是父生成已許其子傳祖父之重矣及其殁也適孫顧不敢申祖服然則主祖之䘮者當誰屬乎將遂無主乎抑别立支子為之主也其于傳重之義失之遠矣小記父母之䘮偕先葬者不虞待後事雜記有父之䘮如未殁䘮而母死其除父之䘮也服其除服卒事反䘮服如三年之䘮則既頮其練祥皆行由是言之父卒尚不得以餘尊厭母安有適孫為祖而不敢服重者哉然後知賀徐皆妄説也庾蔚之言賀循所記謂大夫士又非也為祖後者自天子達士庶皆同則其服不得有異盛氏世佐曰案父卒然後為祖後者服斬此適孫承重之通例也言于此者明此為君之祖期者以君之父先卒故也若君之父在君雖為祖後亦服期而臣無服矣然此但指祖之不為君者而言耳若祖為君而薨父雖在有廢疾不任䘮事則後祖而為君者當與其臣同服斬也宋之寧宗是其例矣註云今君受國于曽祖者見其父若祖二世皆不為君也又案天子諸侯之禮宜與士大夫家異士大夫之禮孫為祖期而已若天子諸侯則祖也而兼有君之尊孫也而兼有臣之義禮族人不敢以其戚戚君内宗外宗之女猶為其君服斬而况于孫乎以此斷之孫為祖之為君者無論承重與否皆當服斬不得以父在為嫌而父在為祖斬之義不待趙商之問而自明矣曾元以下皆然欽定義疏如宋孝宗之䘮光宗雖在寧宗嗣位既受重則必服斬葢未有羣臣皆服重而嗣君反可以輕服者也以此推之于大夫士凡祖父之䘮父有廢疾不能受重則適孫受重而服斬禮亦同之或云父雖廢疾可以斬衰被之而孫則仍以期服攝主䘮之事非也重必有所傳有所受子不能受于父則孫受之于祖矣受重者有輕服乎若光宗之䘮則寧宗自為父斬衰羣臣當從君降一等而為之服期以其未成乎君也堯老舜攝堯尚為君若堯時舜先没則諸侯不為舜三年䘮唐之肅代宋之髙孝當從此例若光宗與明之光宗則但可從春秋王子猛之例又案祖没于父後而曽祖尚存如之何子為父斬不以祖之存没異也則承父之重而為祖斬不以曽祖之存没異可知矣父祖没母在而有祖母之䘮如之何父卒為祖斬不以母之存没異也則祖父卒而為祖母三年不以母之存没異可知矣孫為祖承重而曽祖尚存則不以杖即位以曽祖服斬為之䘮主也曽祖存重在曽祖孫為祖服斬者亦可以稱承重乎曰重雖在曽祖年既老則亦可傳矣舍承重則無他稱是亦宗子不孤之類也又案承重之服經無正條于此傳見之間有附見于斬齊三年并杖期章者讀者互考之可也妾為女君疏妾事女君使與臣事君同故次之敖氏繼公曰此服期與臣為小君之義相類盛氏世佐曰案妾以夫為君故名夫之適妻為女君以其與夫體敵故也傳曰何以期也妾之事女君與婦之事舅姑等注女君君適妻也女君于妾無服報之則重降之則嫌故疏婦之事舅姑亦期故云等但並后匹適傾覆之階抑之雖或姪娣使如子之妻與婦事舅姑同也諸經傳無女君服妾之文故云無服云報之則重降之則嫌者還報以期無尊卑降殺則太重若降之大功小功則似舅姑為適婦庶婦之嫌故使女君為妾無服也敖氏繼公曰禮夫妻體敵妾為君斬衰三年而為女君期嫌其服輕故發問也妾之至尊者君也而女君次之婦之至尊者夫也而舅姑次之二事相類故以為况妾之事女君既與婦之事舅姑等則其為女君服亦不宜遇于婦為舅姑服但當期而已然妾于女君其有親者或大功或小功緦麻乃皆不敢以其服服之而必為之期又所以見其尊之也女君于妾不著其服者親疎不同則其服亦異故也唯緦麻章見貴妾之服彼葢主于士也若以士之妻言之乃為其無親者耳若有親者則宜以出降一等者服之郝氏敬曰鄭謂女君于妾無服非也既云妾事女君如婦事舅姑則女君視妾如舅姑視婦可知舅姑于適婦大功庶婦小功女君于妾亦然張氏爾岐曰註報之則重二句解女君于妾無服之故嫌謂嫌若姑為婦也姜氏兆錫曰小君與妾猶君與臣臣雖無服葢亦有錫衰緦衰疑衰弔服加麻之屬矣舊謂降之則嫌者非欽定義疏案報之則誠重也降之果何嫌乎豈其姊妹姪本有功緦之服者以共事一人之故而反不為之服乎註説非也緦章貴妾之服夫君服之也敖氏引之葢謂夫妻同服耳為妾之有子者當亦同之唯無子又賤者則無服耳大夫之内子無緦服其在大功者降一等服之王后國君夫人于妾並無服婦為舅姑疏文在此者既欲抑妾事女君使如事舅姑故婦為舅姑在下欲使妾情先于婦故婦文在後也劉系之問子婦為姑既周綵衣耶荀納答曰子婦為姑既周除服時人以夫家有䘮猶白衣張子曰古者為舅姑齊衰期正服也今斬衰三年從夫也黄氏榦曰本朝乾德三年十一月秘書監大理寺汝隂尹拙等言案律婦為舅姑服期儀禮䘮服傳開元禮義纂五禮精義續㑹要三禮圖等所載婦為舅姑服期後唐劉岳書儀稱婦為舅姑服三年與禮律不同然亦集勅行用請别裁定之詔百官集議尚書省左僕射魏仁浦等二十一人奏議曰謹案内則云婦事舅姑如事父母則舅姑與父母一也古禮有期年之説雖于義可稽書儀著三年之文實在禮為當葢五服制度前代損益已多只如嫂叔無服唐太宗令服小功曽祖父母舊服三月増為五月適子婦大功増為期衆子婦小功増為大功父在為母服周髙宗増為三年婦人為夫之姨舅無服明皇令從夫而服又増舅母服緦麻又堂姨舅服袒免訖今遵行遂為典制又况三年之内几筵尚存豈可夫衣麤衰婦襲紈綺夫婦齊體哀樂不同求之人情實傷至治况婦人為夫有三年之服于舅姑而止服周是尊夫而卑舅姑也且昭憲皇太后䘮孝明皇后親行三年之服可以為萬代法矣十二月丁酉始令婦為舅姑三年齊衰一從其夫祖今服制令婦為舅斬衰三年夫為祖曽髙後者其妻從服亦如之呉氏澄曰女子子在室為父斬既嫁則為夫斬而為父母期葢曰子之所天者父妻之所天者夫嫁而移所天于夫則降其父婦人不貳斬者不二天也降已之父母而期為夫之父母亦期期之後夫未除服婦已除服而居䘮之實如其夫是舅姑之服期而實三年也豈必從夫服斬而後為三年哉顧氏炎武曰婦事舅姑如事父母而服止于期不貳斬也然而心䘮則未嘗不三年矣故曰與更三年䘮不去姑何孟春餘冬序錄引唐李涪論曰䘮服傳婦為舅齊衰五升布十一月而練十三月而祥十五月而禫禫後門庭尚素婦服青縑衣以俟夫之終䘮習俗以婦之服青縑謂其尚在䘮制故因循亦同夫之䘮紀再周而後吉貞元十一年河中府倉曹㕘軍簫據狀稱堂兄至女適李氏壻見居䘮今時俗婦為舅姑服三年恐為非禮請禮院詳定下詳定判官前太常博士李岧議曰開元禮五服制度婦為舅姑及女子適人為其父母皆齊衰不杖期葢以為婦之道專一不得自達必繫于人故女子適人服夫以斬而降其父母䘮服篇曰女子子適人者為其父母傳曰為父何以期也婦人不貳斬也婦人不貳斬者何也婦人有三從之義無專用之道故未嫁從父既嫁從夫夫死從子故父者子之天也夫者妻之天也婦人不貳斬者猶曰不貳天也先聖格言歴代不敢易以此論之父母之䘮尚止周歲舅姑之服無容三年今之學者不本其義輕重紊亂寖以成俗開元禮元宗所修布在有司頒行天下伏請正牒以明典章李岧之論可謂正矣宋朝詒謀錄乾德三年詔舅姑之䘮婦從其夫齊斬三年遂為定制宋人葢未講服青縑之制故也汪氏琬曰或問禮為舅姑齊衰期故為本生舅姑大功今律文既易朝為三年斬矣而獨于夫本生如故其降等不太甚與曰不然也兄弟之子服伯叔父母期則為人後者服本生父母如之兄弟之子之父服夫之諸父諸母大功則夫為人後者服夫本生亦如之此固相凖而制服者也律文未嘗與禮異也何降等太甚之有當或問禮無繼姑之服何也曰非無服也先儒謂子以父服為正父若服以為妻則子亦應服之此可類而推也傳曰婦人既嫁從夫夫者婦之天也夫既以為母矣其敢不以為姑乎然則從夫而服又何惑哉高氏愈曰古人婦為舅姑服齊衰期葢引而與己之親父母同則亦恩義之盡矣夫婦人之義以夫為天不容有二故雖以舅姑之尊不得並于其夫傳所謂婦人不二斬者也華氏學泉曰或問儀禮婦為舅姑齊衰期何也曰先王之制禮稱情而立文弗敢過也弗敢不及也至親以期斷天地則已易矣四時則已變矣其在天地之中者莫不更始焉期而除禮之中情之節也孫為其祖父母期至尊也婦之于舅姑其尊如孫之于祖斯已矣子為母齊衰母至親也婦之于舅姑其親如子之于母斯已矣夫䘮服非以為名也必稱其實焉斬者斬也三年之䘮如斬所以為至痛極也斬衰貌若苴色容稱其情也惻怛之心痛疾之意傷腎乾肝焦肺身病體羸其哭也往而不返其思慕而不得見也若將從之此人情之至極也先王以為惟妻之于其也夫孝子之于其親其情爾矣非可以責婦之于舅姑先王約人情之中而為之節使之不敢過不敢不及是故以期為斷也或曰女子在室為父母三年出則降而期以事父母者事舅姑故降父母之服以服舅姑使知舅姑之尊所以專其情而不敢二也曰此後王改禮之意則然矣先王之制禮不如是也禮女子適人而降其父期傳曰不二斬也不二斬者不二天也婦人之于其夫也臣之于其君也子之于其父也三綱也臣以君為天子以父為天婦人以夫為天一也臣為君服斬而為君之父母期子為父服斬而為父之父母期妻為夫服斬而為夫之父母期稱情而為之弗可易也且古之視斬也重今之視斬也輕古不二斬雖以母之尊不敢上同于父而女子一適人則為之降其父以尊其夫尊其夫烏有不尊其夫之父母者雖僅為之服齊衰期而其情有降焉者矣後世易舅姑之齊衰而加之以斬則于先王制服之意所謂稱情而為之文有不可問者矣欽定義疏臣之于其君子之于其父婦之于其夫三綱也臣以君為天子以父為天婦以夫為天一也臣為君服斬而為君之父母期子為父服斬而為父之父母期妻為夫服斬而為夫之父母期稱情而為之聖人之權度審矣舅不可以為天則雖不為之斬也不亦宜乎婦事舅姑如事父母而服止于期然夫必三年而復寢則猶是三年也故曰與更三年䘮不去又案妾為君之黨服得與女君同則妾雖不得正名之曰舅姑而服亦期矣繼母如母則繼母如姑可知夫之􅄌母亦當同服又案子為父母再期大祥中月而禫婦必從其夫未及祥禫之月婦安得别有祥禫且虞練丈夫兩番受服亦彌輕婦人既練除要帶則服盡除而即吉可知矣其父在為母者雖期服祥禫婦亦既練除服不俟祥禫也若俟祥禫則姑服反重于舅服也而可乎涪葢未詳考經傳而意其或然故誤也婦既練除服則十五升吉布可也有禮事而服禮服亦可也后夫人内子各以等衰為之法服豈白縑青縑云爾乎士妻居常白縑青縑無所不可然縑乃織絲白非凶服未見其異于紈綺也取必于縑或反華于吉布矣是白縑青縑亦非也然則夫在䘮而妻以吉服與祭可乎曰可虞之祭賔弔服練之祭賔吉服凡齊衰者皆除矣祥禫之祭婦吉服諸孫昆弟昆弟之子並同奚為而不可乎傳曰何以期也從服也疏本是路人與子牉合得體其子為親故重服為其舅姑也敖氏繼公曰子為父母三年加隆之服也妻從其加服故降一等而為期然則從服者惟順所從者之重輕而為之固不辨其加與正也餘不見者放此郝氏敬曰夫所至尊至親妻從夫服也匪夫則路人耳誼雖戚不得不謂從夫之昆弟之子注男女皆是進疏檀弓云兄弟之子猶子也葢引而之進同己子故二母為之亦如己子服期也義服情輕故次在下敖氏繼公曰世母叔母服之也其女子子在室亦如之盛氏世佐曰案此唯謂男子也女子子則異于是其未成人者以殤降成人而未嫁者逆降其旁親旁親亦當逆降之矣女子嫁者未嫁者為世叔母在大功章傳曰何以期也報之也疏二母與子本是路人為配二父而有母名為之服期故二母報子還服期欽定義疏陳氏詮曰從于夫宜服大功今乃期者報之也案婦人為夫黨之卑行與夫同陳説未的此服夫妻同皆報也公妾大夫之妾為其子疏二妾為其子應降而不降重出此文故次之敖氏繼公曰二妾之子為母之服異于衆人嫌母為其子亦然故以明之公國君也傳曰何以期也妾不得體君為其子得遂也注此言二妾不得從于女君尊降其子也女君與君一體唯為長子三年其餘以尊降之與妾子同也疏諸侯絶旁期為衆子無服大夫降一等為衆子大功其妻體君皆從夫而降之至于二妾賤皆不得體君君不厭妾故自為其子得伸遂而服期也雷氏次宗曰夫人與君同體以尊降其子也公子與君同體以厭其親也妾無夫人之尊故不降其子無公子之厭故得遂其親也而事隣于體君跡幾于不遂故每以不體得遂為言也敖氏繼公曰公與大夫于其子有以正服服之者有以尊降之若絶之者其妻與夫為一體而從之故不問己子與妾子其為服若不服亦然二妾于君之子亦從乎其君而為之其為服若不服皆與女君同唯為其子得遂獨與女君異者則以不得體君故也葢母之于子本有期服初非因君而有之故不得體君則此服無從君之義是以得遂也欽定義疏父在且服父没可知子之于母或在五服之外或降而大功而母之于子乃以本服服之者子在外則父之所厭者不得不屈妾在内則君之所厭于己之子者可得而伸且婦人以有出為榮亦使得伸其情于所出也此與公子之妻服其皇姑之意相類案大夫之妾為君之庶子大功公之妾無服可知是妾為君之黨服得與女君同然己之子君與女君或絶或降而已則服之如衆人此非不以尊降之例也傳得經意亦以敖氏推勘而明女子子為祖父母疏章首已言為祖父母兼男女彼女據成人之女此言女子子謂十五許嫁者亦以重出其文故次在此也馬氏融曰不言女孫言女子子者婦質者親親故繫父言之出入服同故不言在室適人也敖氏繼公曰斬衰章曰女子子在室為父對適人者言之也此惟云女子子而已所以見其在室適人同也然章首已見祖父母則是服亦在其中可知矣必復著之者嫌出則亦或降之如其為父母然也郝氏敬曰前為祖父母則男女包舉矣此復舉為女子子有適人者也不言適人何也嫌異于在室者也專言女子子明適人在室同也姜氏兆錫曰章首云祖父母據男子子此言女子子也傳曰何以期也不敢降其祖也注經似在室傳似已嫁明雖有出道猶不降疏祖父母正期也已嫁之女可降旁親祖父母正期故不敢降也經直云女子子無嫁文故云似在室傳言不敢是雖嫁而不敢降祖故似已嫁經傳互言之欲見在室出嫁同不降也陳氏詮曰言雖已嫁猶不敢降也駁鄭康成曰經似在室失其㫖也在室之女則與男同已見章首何為重出言不敢降者明其已嫁敖氏繼公曰傳以經意為主于適人者而發故云然女子子適人不降其祖者不敢以兄弟之服服至尊也郝氏敬曰祖至尊也以適人降則大功與昆弟等昆弟可降祖不可降也然則父母何以降父母降與祖同猶可祖降與昆弟同不可盛氏世佐曰案女子子在室與男子同為祖父母期其理易明故傳唯據已嫁者釋之大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者惟子不報注命者加爵服之名自士至上公凡九等君命其夫則后夫人亦命其妻矣此所為者凡六命夫六命婦疏此言大夫之子為此六命夫六命婦服期不降之事其中雖有子女重出其文其餘並是應降而不降故次在女子為祖下但大夫尊降旁親一等此男女皆合降至大功為作大夫與己尊同故不降還服期若姑姊妹女子子若出嫁大功適士又降至小功今嫁大夫雖降至大功為無祭主哀憐之不忍降還服期也註云命爵九等者大宗伯及典命文六命夫謂世父一也叔父二也子三也昆四也弟五也昆弟之子六也六命婦者世母一也叔母二也姑三也姊四也妹五也女子子六也敖氏繼公曰大夫之子從其父亦降旁親一等世叔父母子昆弟昆弟之子為大夫命婦與其父尊同故不降而服期若姑姊妹女子子服亦本期也其在室者則以大夫之尊厭降為大功若適士則又以出降為小功今以其為命婦故不復以尊降唯以出嫁為大功若又無祭主乃加一等而為期大夫之妻謂之命婦者君命其夫為大夫則亦命其妻矣此于其子不别適庶以父在故爾傳曰有適子者無適孫是也是章有大夫為適孫為士者之服則此昆弟之子為其父之適孫者雖不為大夫已亦不降之也又姑姊妹女子子云無主則是夫先卒也夫為大夫而先卒其妻猶用命婦之禮焉以是推之則嘗為大夫而已者亦用大夫之禮可知郝氏敬曰大夫之子厭于父凡旁期以下不得自遂父所降子不得不降至于父所不降子安敢降也然則何不直言大夫言大夫子葢子之世叔亦即父之昆弟也其世叔父之子亦即父之昆弟子也其昆弟即父之衆子也其姑即父之姊妹也其姊妹即父之女子子也其倫同其為服可互見也禮為世叔父母昆弟昆弟子皆期大夫降為大功而死者皆大夫貴敵則皆從期其世叔父母之子已謂從兄弟大功常也在父謂昆弟之子以彼為大夫父既為期矣子之昆弟子貴者不降又可降父之昆弟子貴者乎故亦為期父為衆子期已昆弟即父衆子以彼其貴父且不降子兄弟貴同者又可降乎此傳所謂男子之為大夫父所不降子亦不敢降也其婦人之為命婦者世母叔母見前父之姊妹曰姑女兄曰姊女弟曰妹與己所生女子子四婦者適人死為大功常也大夫降為小功以彼為命婦貴敵則仍大功又以其無後加隆為期大夫姑姊妹女子如此大夫子于姑姊妹女子亦然此傳所謂婦人之為大夫妻者父不降子亦不敢降也凡服人而人以其服反服之曰報世叔父母與子昆弟昆弟子姑姊妹皆以此服報之爵同親同無後同則其當降不降加等同也唯女子既適人者于父母不杖期定禮不論貴賤有後無後不在報例張氏爾岐曰大夫之子得行大夫禮降其旁親一等此十二人皆合降至大功以其為大夫為命婦尊與己同故不降唯子不報者子為父母三年女子適人自當服期不得言報餘人則皆報也盛氏世佐曰案大夫之子兼適庶而言也言大夫之子則大夫可知矣此等皆厭于父當降者以其尊同故仍服期世叔父父之庶昆弟也若父之適昆弟雖不為大夫亦不降子衆子也不言衆文省若適長雖不為大夫而大夫之適子服之當斬上斬章云父為長子是也父以子在無適孫子不以父在無適子敖云此于其子不别適庶以父在故非郝以是為世叔父之子尤非世叔父之子禮經謂之從父昆弟在大功章大夫之子當降服小功若以尊同不降期可矣豈及増之為服期乎昆弟亦謂庶昆弟也適昆弟本當服期不必其為大夫也昆弟之子父之庶孫也姑姊妹女子子無主者服見上此亦以其為命婦故不降也若為士妻而無主及為命婦而有主者則皆服大功與凡此應降不降之意與父同而服則各視其親疎不必同也世叔父與父為昆弟昆弟于父為衆子姑于父為姊妹姊妹于父為女子子此四命夫三命婦父子皆服期子昆弟之子于父皆為庶孫服大功世叔母于父為兄弟之妻無服女子子于父為女孫出適者降服小功若適士又當降為緦而卿大夫無緦是無服也今以尊同不降仍服小功不以其無主而加服者祖與女孫之情疎也此二命夫三命婦父子服之各異也自子而外彼十人者于此大夫之子本當服期必云報者嫌其或以命夫命婦故降此大夫之子也大夫之庶子相為大功今亦報以期者尊與父同故得遂也欽定義疏案此著其不降者明乎非此則皆降也大夫以尊降其期親可也大夫之子有何尊而亦降之乎凡䘮事父子皆有列焉世叔父昆弟已與父服同哭踊之儀子不可有加于父變除之節子不可獨後于父也故父降之子亦降之也此既從父而降則世叔母雖父之所不服及子昆弟之子女子子父服降于己一等者不得不于己之常服而降之不則參差錯雜而不可以行矣又案父為大夫而已之子弟之子又有為大夫者可見五十命為大夫之法不可執也祖孫同為大夫又見一國之大夫不止五也其或老而致事又見致事者之同于見為大夫者也傳曰大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也無主者命婦之無祭主者也何以言唯子不報也女子子適人者為其父母期故言不報也言其餘皆報也何以期也父之所不降子亦不敢降也大夫曷為不降命婦也夫尊於朝妻貴於室矣注無主者命婦之無祭主謂姑姊妹女子子也其有祭主者如衆人惟子不報男女同不報爾傳唯據女子子似失之矣大夫曷為不降命婦據大夫于姑姊妹女子子既已出降大功其適士者又以尊降在小功也夫尊于朝與己同婦貴于室從夫爵也經疏注云無主者命婦之無祭主謂姑姊妹女子子者六命婦中有世母叔母故鄭辨之以其世母叔母無主有主皆為之期故知惟據此四人而言其有祭主者自為大功矣云唯子不報男女同不報者以其男女俱為父母三年父母唯為長子斬其餘降何得言報故知子中兼男女傳惟據女子子失之矣案曲禮云四十强而仕五十艾服官政為大夫何得大夫子又為大夫又何得有弟之子為大夫者五十命為大夫自是常法大夫之子有德行茂盛者豈待五十乃命之乎是以殤小功有大夫為其昆弟之長殤大夫既為兄弟殤明是幼為大夫舉此一隅不得以常法相難也敖氏繼公曰世父母叔父母昆弟昆弟之子為大夫命婦乃于大夫之子亦報之者葢以其父之故不敢以降等者服之亦貴貴之意也唯父卒乃如衆人大夫曷為不降命婦承父之所不降者而問也此不降命婦據大夫于其子之姑姊妹女子子也大夫為此四命婦或大功或小功皆不以尊降之唯以出降耳問者葢怪命婦之無爵而不降之夫尊于朝則妻貴于室言其夫妻一體同尊卑也是以不降之尊于朝謂為大夫貴于室謂為内子盛氏世佐曰案唯子不報經兼男女傳唯據女子子言者以男子為父斬不在報中明矣女子子適人者為其父之服與其餘十人同嫌亦在報中故辨之鄭譏傳失葢未達斯意也上經云姑姊妹女子子適人無主者姑姊妹報而不及女子子是女子子不在報中之證大夫曷為不降命婦以下泛論夫妻體敵命婦得與大夫尊同之義凡親屬中有為命婦者大夫皆不得以尊降之而為命婦者亦得降其旁親也註唯據姑姊妹女子子言敖唯據子之姑姊妹女子子言皆為未備大夫為祖父母適孫為士者疏祖與孫為士卑故次在此也敖氏繼公曰此祖父適孫為士也乃合祖母言之所謂妻從夫爵者也上已見祖父母適孫矣此復著大夫之禮則經凡不見為服之人者雖曰通上下言之而實則主于士也明矣盛氏世佐曰案大夫為祖父母謂父在者也父卒而不為祖後者亦存焉父卒為祖後者服斬祖父卒為祖母後者三年此禮通乎上下適孫謂適子早卒者也必云為士者見其雖賤不降也傳曰何以期也大夫不敢降其祖與適也注不敢降其祖與適則可降其旁親也敖氏繼公曰大夫于為士者之服則降之此亦為士也乃不降者以其為祖與適也大夫所以降其旁親而不降祖與適者聖人制禮使之然也非謂大夫之意亦欲降此親但以其為祖與適故不敢降之也此傳之言似有害于義理盛氏世佐曰案凡傳所云不敢降者皆原制禮之故禮縁人情而制者也人情所不敢降者而故降之則是强世而行不可以久故聖人于此權其輕重之宜定為隆殺之等而無一毫造作于其間也敖氏之言失傳意矣公妾以及士妾為其父母疏以出嫁為其父母亦重出其文故次在此馬氏融曰公謂諸侯其間有卿大夫妾故言以及士妾敖氏繼公曰上云女子子適人者為其父母則是服已在其中矣復言此者嫌為人妾者屈于其君則為其私親或與為人妻者異故以明之云公妾以及士妾又以見是服不以其君之尊卑而異也郝氏敬曰此與前章妾為子期義同舉國君及士見凡為妾者皆得為父母期也欽定義疏案戴記婦人奔䘮不别妻妾則妾亦奔父母之䘮與傳曰何以期也妾不得體君得為其父母遂也注然則女君有以尊降其父母者與春秋之義雖為天王后猶曰吾季姜是言子尊不加于父母此傳似誤矣禮妾從女君而服其黨服是嫌不自服其父母故以明之無疏傳以公子為君厭為己母不在五服又為己母黨服公妾既不得體君君不厭故妾為其父母得伸遂而服期也鄭欲破傳義故據傳云妾不得體君得為其父母遂也然則女君體君有以尊降其父母者與言與猶不正執之辭也云春秋之義者桓九年傳文云禮妾從女君而服其黨服者雜記文也鄭既以傳為誤故自解之一則以女君不可降其父母二則經文兼有卿大夫士何得專據公子以決父母乎是以傳為誤也陳氏詮曰以妾卑賤不得體君又嫌君之尊不得服其父母故傳明之卑賤不得體君雷氏次宗曰今明妾以卑賤不得體君厭所不及故得為其父母遂也敖氏繼公曰傳意葢謂妾于其父母亦本自有服非因君而服之故不得體君則為之得遂然妾以不得體君之故而遂其服者唯自為其子耳若其私親則無與于不體君之義葢女君雖體君亦未見有重降其私親者傳義似誤也郝氏敬曰鄭謂父母期雖女君不得降以傳體君之説為誤非也傳未嘗謂女君可降其父母也謂妾之父母君同凡人妾自為重服違君自遂似乎不可耳今以國君之貴尚不厭妾此父母之䘮所以為重傳安得誤盛氏世佐曰案經重出此條嫌其或在厭降之例也傳之此言所以明君不厭妾之義與經合後儒皆錯㑹其意故指為誤耳士妾亦有厭降之嫌者妾謂夫為君通上下之辭也欽定義疏鄭敖二義相兼乃備一則嫌為妾者屈于其君或不得服其私親一則嫌為女君之黨服則不為已之黨服也禮所以決嫌疑定猶豫其此類乎右齊衰不杖期五禮通考卷二百五十四
