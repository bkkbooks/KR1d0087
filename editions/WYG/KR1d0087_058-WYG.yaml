嶽瀆名山大川元史泰定帝本紀泰定三年三月乙巳朔帝以不雨遣使分祀五嶽四瀆名山大川及京城寺觀秋七月甲辰遣使祀海神天妃八月辛丑作天妃宫于海津鎮鹽官州大風海溢遣使祭海神十一月戊午加封盧陵江神曰顯應四年秋七月乙丑遣使祀海神天妃閏九月甲戌命致祭五嶽四瀆名山大川冬十月甲辰改封建徳路烏龍山神曰忠顯靈澤普祐孚惠王致和元年春正月甲申遣使祀海神天妃加封幸淵龍神福應昭惠公三月甲申遣户部尚書李嘉努往鹽官祀海神仍集議修海岸夏四月甲寅改封蒙山神曰嘉惠昭應王鹽池神曰靈富公洞庭廟神曰忠惠順利靈濟昭佑王文宗本紀天歴元年九月壬戌遣使祭五嶽四瀆二年冬十月己亥加封天妃爲䕶國庇民廣濟福惠明著天妃賜廟額曰靈慈遣使致祭遣使代祀嶽瀆山川十一月戊午遣使代祀天妃王圻續通考至順二年冬十月遣秘書太監王珪等代祀嶽鎮海瀆三年遣使分祀嶽鎮海瀆五年加北嶽之神爲安天大貞元皇帝順帝至元元年加封真定路滹沱河神爲昭佑靈源侯元史順帝本紀至正二年春正月癸巳遣翰林學士三寳等代祀五嶽四瀆九年九月遣御史中丞李獻代祀河瀆王圻續通考十年詔加封河瀆神爲靈源神祐𢎞濟王仍重建河瀆及西海神廟元史順帝本紀十四年冬十月詔加海神爲輔國䕶聖庇民廣濟福惠明著天妃二十一年十一月戊辰黄河自平陸三門磧下至孟津五百餘里皆清凡七日命秘書少監程徐祀之右元祀山川明㑹典國初建山川壇于天地壇之西正殿七間祭太歲風雲雷雨五嶽五鎮四海四瀆鍾山之神東西廡各十五間祭京畿山川春夏秋冬四季月將及都城隍之神壇西南有先農壇東有旗纛廟南有籍田明史禮志嶽鎮海瀆山川之祀洪武二年太祖以嶽瀆諸神合祭城南未有專祀又享祀之所屋而不壇非尊神之道禮官言宜以嶽鎮海瀆及天下山川城隍諸地祗合爲一壇與天神埒春秋專祀遂定祭日以清明霜降前期一日皇帝躬省牲至日服通天冠絳紗袍詣嶽鎮海瀆前行三獻禮山川城隍分獻官行禮是年命官十八人祭天下嶽鎮海瀆之神帝皮弁御奉天殿躬署御名以香祝授使者百官公服送至中書省使者奉以行黄金合貯香黄綺幡二白金二十五兩市祭物春明夢餘録洪武二年以嶽鎮海瀆山川之神享祀之所未有壇壝非隆敬神祗之道命禮官考古制以聞禮官奏嶽鎮海瀆之祀虞舜以四仲月廵狩而祭四嶽東嶽泰山四嶽之宗也故文曰岱宗南嶽曰衡山西嶽曰華山北嶽曰恒山而未言五嶽王制曰天子祭天下名山大川五嶽四瀆始有五嶽之稱葢以中嶽嵩山並列又周官小宗伯兆四望于四郊鄭𤣥謂四望爲四嶽四瀆四瀆者江河淮濟也四鎮者東曰沂山西曰吳山南曰㑹稽北曰醫無閭詩又曰廵狩而祀四嶽河海則又有四海之祭葢天子方望之祀無所不通而嶽鎮海瀆在諸侯封内諸侯亦各以其方祀之秦罷封建嶽瀆皆領于祠官及漢復建諸侯則侯國各祀其封内山川天子無預焉武帝時諸侯或分或廢五嶽皆在天子之邦宣帝時嶽瀆始有使者持節祀之禮由魏及隋嶽鎮海瀆皆即其地立祠命有司致祭唐宋之制有命本界刺史縣令之祀有因郊祀而望祭之祀又有遣祭之祀元遣使祭嶽鎮海瀆分東西南北中爲五道其天下山川之祀虞書望于山川徧于羣神周頌曰懐柔百神周禮小宗伯兆山川丘陵墳衍各因其方王制凡山川之小者其祭秩視伯子男劉向謂山川能生物出雲雨施潤澤品類以百數故視伯子男其在諸侯封内者諸侯又自祭之如楚祭睢漳晉祭惡池齊祭配林是也秦罷封建則皆領于祠官焉由漢唐以及宋元嶽鎮海瀆之外又有其餘山川之祀不獨嶽瀆也今國家開創之初嘗以嶽鎮海瀆及天下山川與太歲風雲雷雨城隍皆祀于城南享祀之所既非專祀又室而不壇非理所宜夫海嶽之神其氣本流通暢達無有限隔今宜以嶽鎮海瀆及天下山川與太歲風雲雷雨城隍合爲一壇春秋祀之詔可明史禮志洪武二年建山川壇于正陽門外天地壇西合祀諸神凡設壇十九太歲春夏秋冬四季月將爲第一次風雲雷雨次五嶽次五鎮次四海次四瀆次京都鍾山次江東次江西次湖廣次淮東淮西次浙東浙西福建次廣東廣西海南海北次山東山西河南河北次北平陜西次左江右江次安南高麗占城諸國山川次京都城隍次六纛大神旗纛大將五方旗神戰舡金鼔銃礟弓弩飛鎗飛石陣前陣後諸神皆躬自行禮先祭禮官奏祝文太歲以下至四海凡五壇稱臣者親署御名其鍾山諸神稱余者請令禮官代署帝曰朋友書牘尚親題姓名况神明乎遂加親署後又定驚蟄秋分後三日遣官祭山川壇諸神七年令春秋仲月上旬擇日以祭明㑹典洪武三年正嶽鎮海瀆城隍諸神號合祀太歲月將風雲雷雨嶽鎮海瀆山川城隍旗纛諸神又令毎歲用驚蟄秋分各後三日遣官祭山川壇諸神是日上皮弁服御奉天殿降香中嚴坐殿上獻官復命解嚴還宫是年又合祭東嶽泰山于山川壇明史禮志洪武三年詔定嶽鎮海瀆神號略曰爲治之道必本于禮今依古定制並去前代所封名號五嶽稱東嶽泰山之神南嶽衡山之神中嶽嵩山之神西嶽華山之神北嶽恒山之神五鎮稱東鎮沂山之神南鎮㑹稽山之神中鎮霍山之神西鎮吳山之神北鎮醫無閭山之神四海稱東海之神南海之神西海之神北海之神四瀆稱東瀆大淮之神南瀆大江之神西瀆大河之神北瀆大濟之神帝躬署名于祝文遣官以更定神號告祭日知録洪武三年六月癸亥詔曰五嶽五鎮四海四瀆之封起自唐世崇名羙號歴代有加在朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至于今英靈之氣萃而爲神必皆受命于上帝幽㣲莫測豈國家封號之所可加瀆禮不經莫此爲甚至如忠臣烈士雖可加以封號亦惟當時爲宜夫禮所以明神人正名分不可以僣差今宜依古定制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神郡縣城隍神號一體改正歴代忠臣烈士亦依當時初封以爲實號後世溢羙之稱皆與革去庶㡬神人之際名正言順于禮爲當用稱朕以禮事神之意其東嶽祝文曰神有歴代之封號予詳之再三畏不敢效可謂卓絶千古之見丘氏濬曰我聖祖此詔可謂考諸三王而不謬質諸鬼神而無疑百世以俟聖人而不惑一滌千古之謬臣知上帝在天之靈必有以簡在于㝠㝠之中而山川鬼神亦莫不各受其職矣明史禮志其他山川之神洪武元年躬祀汴梁諸神仍遣官祭境内山川二年以天下山川祔祭嶽瀆壇帝又以安南高麗皆臣附其國内山川宜與中國同祭諭中書及禮官考之安南之山二十一其江六其水六高麗之山三其水四命著祀典設位以祭三年遣使徃安南髙麗占城祀其國山川帝齋戒親爲祝文仍遣官頒革正山川神號詔于安南占城高麗六年琉球諸國已朝貢祀其國山川八年禮部尚書牛諒言京都既罷祭天下山川其外國山川亦非天子所當親祀中書及禮臣請附祭各省從之廣西附祭安南占城真臈暹羅鎖里廣東附祭三佛齊瓜哇福建附祭日本琉球渤泥遼東附祭高麗陜西附祭甘肅朶甘烏斯藏京城不復祭又從禮官言各省山川居中南向外國山川東西向同壇共祀明集禮專祀嶽鎮海瀆天下山川國朝既於方丘以嶽鎮海瀆天下名山從祀復於春秋清明霜降日遣官專祀嶽鎮海瀆天下山川于國城之南至于外夷山川亦列祀典若國有祈禱則又遣使降香專祀于其本界之廟若夫山川之在王國則自以時致祭瘞坎嶽鎮海瀆祭畢其祝幣牲饌嶽鎮則瘞之于坎海瀆則沈之于水其國南羣祀壇則並置于瘞坎祝版親祀祝文自署御名遣官代祀祝文稱嗣天子某謹遣臣某官姓名敢昭告于東嶽泰山之神唯神磅礴英靈參贊化育位于東方爲嶽之首及出膚寸之雲不崇朝而雨天下有滋稼苗民賴以生功被于世歴代帝王咸敦祀典或躬臨而奉祭或遣使以伸忱朕允膺天命肇造丕基禮宜親臨致祀今國治未周新附未撫或居以圖治或出而視師是用命使以表朕衷惟神鑒焉尚享西嶽曰惟神氣應金方靈鍾兑位奠於西極屹立巍巍長物養民功被于世歴代云云同前下並同南嶽曰惟神祝融諸峯奠彼南服崇高峻極徳配離明長物養民功被于世北嶽曰惟神鎮并臨代峙立朔方終始陰陽徳著悠久養民阜物功被寰中中嶽曰惟神嵩髙攸宅表此中區四嶽攸宗羣山環拱養民育物功被寰中東海曰惟神百川朝宗涵育深廣靈鍾坎徳潤衍震宗滋物養民功被於世歴代云云同前下並同西海曰惟神灝靈所鍾道里遼邈坎德深廣衍潤兑方滋物養民功被于世南海曰惟神環兹粤壤物巨靈鍾坎德深大離明斯配潤物養民功被于世北海曰惟神𤣥㝠攸司遐逺莫即鍾靈坎德奠位隂方潤物養民功被于世江瀆曰惟神岷蜀發源浩𣺌萬里朝宗於海坎徳靈長潤物養民澤被于世歴代云云同前下並同河瀆曰惟神發源崐崘亘絡中土配精天漢坎徳靈長潤物養民澤被于世淮瀆曰惟神源深桐柏演迤楚甸出雲致雨潤物養民坎徳靈長澤被于世濟瀆曰惟神沈浸覃懐功配三瀆流澄蕩濁潤物養民坎德靈長澤被于世東鎮曰惟神鎮彼瑯琊羣山所仰宣澤布氣毓秀鍾靈生物養民功被于世歴代云云同前下鎮並同西鎮曰惟神作鎮汧陽羣山所仰宣澤布氣育秀鍾靈生物養民功被于世南鎮曰惟神作鎮㑹稽羣山所仰宣澤布氣育秀鍾靈阜物養民功被于世北鎮曰惟神鎮彼平營羣山所仰宣澤布氣育秀鍾靈阜物養民功被于世中鎮曰惟神鎮彼霍邑三晉所瞻育秀暢靈奠兹中土生殖庶物功被寰宇洪武三年正月專遣使致祭于外夷山川其安南祝文曰惟神磅礴深廣流峙西南靈秀所鍾福庇一方使其國君世保境土當歴代中國帝王之興即能慕義歸化得免兵戈靖安民庶神功爲大朕本布衣因四方雲擾廓清羣雄混一天下以承正統皆賴天地神明而至于此自臨御以來海嶽鎮瀆俱已致祭邇者安南奉表稱臣考之典禮天子于山川之祀無所不通故特遣使以牲幣之祭徃答神靈尚享其髙麗祝文曰高麗爲國奠于海東山勢磅礴水徳汪洋實皆靈氣所鍾故能使境土安寧國君世享富貴尊慕中國以保生民神功爲大朕起自布衣今混一天下以承正統比者高麗奉表稱臣朕嘉其誠已封王爵考之古典天子于山川之祀無所不通是用遣使敬將牲帛修其祀事以答神靈惟神鑒之尚享其占城祝文曰惟神靈秀磅礴源流深廣以濟民物保安海邦使其國君世守境土尊附中國其功多矣朕起自布衣仰荷天地眷祐混一疆宇以承正統邇者占城奉表稱臣考之典禮天子于天下山川之祀無所不通故特遣使以牲幣之祭往答神靈惟神鑒之尚享五月降詔嶽鎮海瀆復遣使代祀其祝文曰惟洪武三年歲次庚戌六月戊午朔越二十二日己卯某官臣某今蒙中書省㸃差欽賫祝文致祭于東嶽泰山之神皇帝制曰磅礴東海之西中國之東參穹靈秀生同天地形勢巍然古昔帝王登之觀滄海察地利以安生民故祀曰泰山于敬則誠于禮則宜自唐始加神之封號歴代相因至今曩者元君失馭海内鼎沸生民塗炭余起布衣承上天后土之命百神陰佑削平暴亂正位稱尊職當奉天地享鬼神以依時統一人民法當式古今寰宇既清特修祀儀因神有歴代之封號予起寒㣲詳之再三畏不敢效葢神與穹壤同始靈鎮東方其來不知歲月幾何神之所以靈人莫能測其職必受命于上天后土爲人君者何敢預焉予懼不敢加號特以東嶽泰山名其名依時祀神唯神鑒知尚享南嶽中嶽西嶽北嶽祝文並同其東鎮祝文曰屹立沂州作鎮東方生同天地形勢巍然古先帝王察地利以安民生故祀之曰沂山于敬則誠于禮則宜自唐始加神之封號歴代相因至今曩者元君失馭海内鼎沸生民塗炭予起布衣承上天后土之命百神陰佑削平暴亂正位稱尊職當奉天地享鬼神以依時統一人民法當式古今寰宇既清特修祀儀因神有歴代之封號予起寒㣲詳之再三畏不敢效葢神與穹壤同始靈鎮東方其來不知歲月幾何神之所以靈人莫能測其職必受命于上天后土爲人君者何敢預焉予懼不敢加號特以東鎮沂山名其名依時祀神惟神鑒知尚享其起句南鎮則曰屹立㑹稽作鎮南方中鎮則曰屹立霍州作鎮中央西鎮則曰屹立隴州作鎮西方北鎮則曰屹立營州作鎮北方餘並同東鎮其東海祝文曰生同天地浩瀚之勢既雄深淺之處莫測古昔人君名之曰海神而祀之于敬則誠于禮則宜自唐以及近代皆加以封號予因元君失馭四方鼎沸起自布衣承上天后土之佑百神之助削平暴亂以主中國職當奉天地享鬼神以依時式古法以昭民今寰宇既清特修祀儀因神有歴代之封號予起寒㣲詳之再三畏不敢效葢觀神之所以生與穹壌同立於世其來不知歲月幾何凡施爲造化人莫可知其職必受命于上天后土爲人君者何敢預焉予懼不敢加號特以東海名其名依時祭祀神其鑒知尚享南海西海北海文並同其東瀆大淮祝文曰源始桐柏潔而東逝納諸川以歸海古者人君尊曰淮瀆之神未嘗加號于敬則誠于禮則宜自唐始加神之封號歴代相因至今曩者元君失馭海内鼎沸予起布衣承上天后土之命百神陰佑削平暴亂正位稱尊職當奉天地享鬼神以依時統一人民法宜式古今寰宇既清特修祀儀因神有歴代之封號予起寒㣲詳之再三畏不敢效葢神與穹壌同始其來不知歲月㡬何神之所以靈人莫能知其造化必受命于上天后土爲人君者何敢預焉予懼不敢加號特以東瀆大淮名其名依時祀神惟神鑒知尚享其南瀆則曰源于岷山生同天地廣納諸川東逝于海古者人君尊曰江瀆之神餘文並同東鎮其西瀆則曰源于崐崘其行也屈曲其激也有聲于山不徙于平壌則流蕩洶湧莫測自有天地則有之古之人君尊曰河瀆之神餘文並同東鎮其北瀆則曰源始王屋伏流而出潔異衆水古者人君尊曰曰濟瀆之神餘文並同東鎮代祀嶽鎮海瀆碑文洪武二年春正月四日羣臣來朝皇帝若曰朕自起義臨濠率服渡江宅於金陵毎獲城池必祭其境内山川于今十有五年㒺敢或怠邇者命將出師中原底定嶽鎮海瀆悉在封域朕托天地祖宗之靈武功之成雖藉人力然山川之神嘿實相予自古帝王之有天下莫不禮秩尊崇朕曷敢違于是親選敦朴廉潔之臣賜以衣冠俾齊沐端竦以俟遂以十月五日授祝幣而遣焉臣某承詔將事惟謹某月某日祭于祠下威靈歆格祀事孔明礱石鐫文用垂悠久惟神收藏萬類奠于東方西南北随方改用典禮既崇綱維斯在尚期隂陽以和風雨以時物不疵癘民庶乂安是我聖天子之所望于神明者而亦神明助我邦家之靈騐也代祀外夷山川碑文洪武三年春正月三日癸巳皇帝御奉天殿受羣臣朝乃言曰朕賴天地祖宗眷祐位于臣民之上郊廟社稷以及嶽鎮海瀆之祭不敢不恭邇者占城安南髙麗並同遣使奉表稱臣朕已封其王爲占城國王安南髙麗同則其國之境内山川既歸職方考諸古典天子望祭雖無不通然未聞行實禮達其境者今當具牲幣遣朝天宫道士某人前徃用答神靈禮部尚書崔亮欽承上㫖惟謹乃諭臣某致其誠潔以俟于是上齋戒七日親爲祝文至十日庚子上臨朝以香授臣某將命而行臣某以某月某日至其國設壇城南某月某日敬行祀事于某國某山及諸山之神某水及諸水之神禮用告成臣某聞帝王之勤民者必致敬于神欽惟皇上受天明命丕承正統四海内外悉皆臣屬思與普天之下共享昇平之治故遣臣某致祭于神神既歆格必能庇其國王世保境土使風雨以時年榖豐登民庶得以靖安庶昭聖天子一視同仁之意是用刻文于石以垂示永久臣某謹記某國王臣某陪臣某官某祭器合祭嶽鎮海瀆天下山川及遣使分祀毎壇各尊三籩八豆八簠二簋二登二州縣祀本境山川則尊二籩二豆二簠一簋一玉幣望祀用幣不用玉諸王同遣使奉祠嶽鎮海瀆各降真香一炷沉香一合金香合一共一觔黄紵絲旛一對幣帛一段長丈有八尺銀三十五兩其外夷山川則高麗旛用青安南占城旛用紅餘並同嶽鎮海瀆牲合祭嶽鎮海瀆山川各用犢一羊一豕一遣使代祀各廟並同州縣祭本境山川用羊一豕一酒齊合祭嶽鎮海瀆天下山川及遣使代祀犠尊實醴齊象尊實沈齊山罍實事酒州縣祭本境山川則象尊實緹齊壺尊實事酒粢盛合祭嶽鎮海瀆天下山川及遣使分祀並如宋制其州縣祭本境山川簠實以稷簋實以粱籩豆之實合祭嶽鎮海瀆於國城之南及毎歲遣使分祀各廟並籩實以石鹽魚鱐􅀥栗榛菱芡脯豆實以韭葅醯醢菁葅鹿醢芹葅兎醢筍葅魚醢州縣祭本境山川則籩實以栗脯豆實以葵葅鹿醢樂望祀用雅樂諸王祭本國山川則用大樂遣使代祀不用樂祭服遣官攝祀並用公服專祀地􅅘壇諸神樂章迎神保和之曲吉日良辰祀典式陳惟地之􅅘百靈繽紛嶽鎮海瀆山川城隍内而中國外及四方濯濯厥靈昭鑒我心以俟以迎來格來歆奠幣安和之曲靈旗涖止有赫其威一念潛通幽明弗違有幣在篚物薄而㣲神兮安留尚其饗之初獻中和之曲神兮我留有薦必受享祀之初奠兹醴酒晨光初升祥徵應候何以侑觴樂陳雅奏亞獻肅和之曲我祀維何奉兹犧牲爰酌醴齊貳觴載升洋洋如在式燕以寧庶表㣲衷交于神明終獻凝和之曲執事有嚴品物斯祭黍稷非馨式將其意薦兹