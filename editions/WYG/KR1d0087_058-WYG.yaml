處侍郎趙孔昭祭大江大淮之神廵撫山東都御史姜廷頤祭東嶽泰山東鎮沂山之神廵撫都御史谷中虚祭東海南鎮㑹稽之神廵撫保定都御史朱大器祭北嶽恒山之神明史萬歴十四年廵撫胡來貢請改祀北嶽于渾源州禮臣言大明集禮載漢唐宋北嶽之祭皆在定州曲陽縣與史俱合渾源之稱北嶽止見州誌碑文經傳無可考仍祀曲陽是春明夢餘録北嶽在今真定府定州曲陽縣漢爲常山郡上曲陽縣史記封禪書常山王有罪遷天子封其弟於真定以續先王祀而以常山爲郡然後五嶽皆在天子之邦漢書郊祀志祠北嶽常山于上曲陽後漢書章帝紀元和三年幸中山遣使者祠北嶽于上曲陽魏書和平元年如中山過恒嶽禮其神而返二年如中山遣使者禮恒嶽隋書大業四年帝廵河北親祀恒嶽唐書地理志定州曲陽縣元和十五年更恒嶽曰鎮嶽有嶽祠張嘉徵傳爲州刺史至州于恒嶽廟中立頌自爲文書于石其碑用白石爲之素質黒文甚爲竒麗光是嶽祠爲逺近祈賽有錢數百萬嘉徴自以爲頌文之功納其數萬自漢及唐北嶽之祭皆在曲陽一統志乃謂恒山在渾源州南二十里山西志又謂宋時因山北諸州䧟于契丹乃即曲陽致祭此謬説也大學衍義補丘氏濬曰中國之地在三代不出九州之外惟揚徐青冀四州濵海而已四海惟東北濵中國而南海北海則越在荒服之外自漢以後南越始入中國而有南海然西海竟不知所在故今祀東海于登州祀南海于廣州二祀皆臨海而祭西海則望祀于蒲州北海則望祀于懐慶夫宋都汴梁而懐慶在其北是時失幽燕而以白溝河爲界無縁至遼薊之域出國門而北望以祭之可也國初都金陵因之以祭亦不爲過若今日建都於燕徃南而祭北海豈天子宅中以臨四海之義哉且古謂青州爲北海郡青去登不逺猶以是名今京師東北乃古碣石淪海之處于此立祠就海而祭于勢爲順于理爲宜况今北鎮醫巫閭山在于遼海山既可以爲北鎮川獨不可以爲北海乎若夫中國之正西在于秦隴西南則蜀稍南則滇也滇之極西百夷之外聞有大海通西南島夷此地在前代未入中國今既爲羈縻之地則王化之所及也宜于雲南望祀之如此則四海之祀皆在吾域中矣議禮之事非臣下所敢專者謹録愚見以俟採擇焉又曰臣案所謂四望者葢以五嶽四鎮四瀆乃天下山川之大者天子兼有天下之大不能親臨其地故遥望而祭之也若夫所謂山川者随所在而有則各隨其地而祭之焉本朝郊壇之外既各爲壇以分祭五嶽四鎮四瀆四海又于郊壇之右以專祀之初春大祀則從享于天地仲秋報祀天子乃躬獻于其壇焉是則所謂四望之祭也又列南京鍾山之神北京天壽山之神與之同壇而祭所謂山川之祭也又于凡天下藩府郡縣既立山川壇總祭其一方之山川又表其山林川澤之有名者以專祀之使有司躬涖其所在祀焉右明祀山川五禮通考卷四十八
