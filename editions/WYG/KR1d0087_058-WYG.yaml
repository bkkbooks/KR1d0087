body:
  text: 五禮通考卷四十八刑部尚書秦蕙田撰吉禮四十八四望山川遼史太祖本紀太祖七年十一月祠木葉山禮志太祖幸幽州大悲閣遷白衣觀音像建廟木葉山尊爲家神于拜山儀過樹之後増詣菩薩堂儀一節然後拜神非和掄罕之故也太祖本紀天贊三年八月登阿勒坦音徳爾山以麃鹿祭王圻續通考太宗天顯四年三月望祀羣神遼史太宗本紀天顯四年秋七月戊寅祠木葉山王圻續通考㑹同二年十月晉遣使請親祀南嶽從之遼史穆宗本紀應歴十二年六月甲午祀木葉山及潢河應歴十四年七月以酒脯祀黒山景宗本紀保寧元年十一月甲辰朔行柴冊禮祠木葉山聖宗本紀統和七年二月遣巫覡祭名山大川三月壬午朔遣使祭木葉山十三年八月詔修山澤祠宇以時祀之興宗本紀重熙十四年冬十月甲子望祀木葉山禮志興宗先有事于菩薩堂及木葉山遼河神然後行拜山儀冠服節文多所變更後因以爲常右遼祀山川金史世宗本紀大定四年六月甲子以雨足命有司祭謝嶽鎮海瀆于北郊定祭四嶽五瀆禮禮志大定四年禮官言嶽鎮海瀆當以五郊迎氣日祭之詔依典禮以四至土旺日就本廟致祭其在他界者遥祀立春祭東嶽于泰安州東鎮于益都府東海于萊州東瀆大淮于唐州立夏望祭南嶽衡山南鎮㑹稽山于河南府南海南瀆大江于萊州季夏土旺日祭中嶽于河南府中鎮霍山于平陽府立秋祭西嶽華山于華州西鎮吳山于隴州望祭西海西瀆于河中府立冬祭北嶽恒山于定州北鎮醫無閭山于廣寕府望祭北海北瀆大濟于孟州其封爵並仍唐宋之舊王圻續通考七年或有言前代都長安及汴洛以太華等山列爲五嶽令既都燕當别議五嶽名時太常寺官或取嵩高䟽周都豐鎬以吳嶽爲西嶽范拱以爲非是議略曰軒轅居上谷在恒山之西舜居蒲阪在華山之北以此言之未嘗據所都而改嶽祀也後遂不改金史世宗本紀大定八年五月庚寅改旺國崖曰靜寧山哈斯滸東川曰金蓮川禮志鎮安公舊名旺國崖太祖伐遼嘗駐蹕于此大定八年五月更名靜寧山後建廟大定十二年有司言長白山在興王之地禮合尊崇議封爵建廟宇十二月禮部太常學士院奏奉勅㫖封興國靈應王即其北山地建廟宇大定十五年三月奏定長白山封冊儀物冠九旒服九章玊圭玊冊函香幣祝冊遣使副各一員詣㑹寧府行禮官散齋二日致齋一日所司于廟中陳設如儀廟門外設玊冊衮冕幄次牙仗旗鼔從物等視一品儀禮用三獻祭如嶽鎮其冊文云皇帝若曰自兩儀剖判山嶽神秀各鍾于其分野國將興者天實作之對越神休必以祀事故肇基王迹有若岐陽望秩山川於稽虞典厥惟長白載我金德仰止其高實惟我舊邦之鎮混同流光源所從出秩秩幽幽有相之道列聖蕃衍熾昌迄于太祖神武徵應無敵于天下爰作神主肆予冲人紹休聖緒四海之内名山大川靡不咸秩矧王業所因瞻彼旱麓可儉其禮服章爵號非位于公侯之上不足以稱焉今遣某官某持節偹物冊命兹山之神爲興國靈應王仍勅有司歲時奉祀於戲廟食之享亘萬億年惟金之禎與山無極豈不偉歟自是毎嵗降香命有司春秋二仲擇日致祭昭應順濟聖后大定十七年都水監言陽武上埽黄河神聖后廟宜依唐仲春祭五龍祠故事大定十九年有司言盧溝河水勢泛決嚙民田乞官爲封冊神號禮官以祀典所不載難之已而特封安平侯建廟二十一年冊封山陵地大房山神爲保陵公冕八旒服七章圭冊香幣使副持節行禮並如冊長白山之儀其冊文云皇帝若曰古之建邦設都必有名山大川以爲形勝我國既定鼎于燕西顧郊圻巍然大房秀㧞混厚雲雨之所出萬物之所瞻祖宗陵寢于是焉依仰惟嶽鎮古有秩序皆載祀典矧兹大房禮可闕歟其爵號服章俾列于侯伯之上庶足以稱今遣某官某備物冊命神爲保陵公申勅有司歲時奉祀其封域之内禁無得樵採弋獵著爲令是後遣使山陵行禮畢山陵官以一獻禮致奠混同江大定二十五年有司言昔太祖征遼䇿馬徑渡江神助順靈應昭著宜修祠宇加賜封爵迺封神爲興國應聖公致祭如長白山儀冊禮如保陵公故事其冊文云昔我太祖武元皇帝受天明命掃遼季荒茀成師以出至于大江浩浩洪流不舟而濟雖穆滿渡江而鼋梁光武濟河而水冰自今觀之無足言矣執徐之歲四月孟夏朕時邁舊邦臨江水嘆仰藝祖之開基佳江神之效靈至止上都議所以尊崇之典葢古者五嶽視三公四瀆視諸侯至有唐以來遂享帝王之尊稱非直後世彌文而崇徳報功理亦有當然者矧兹江源出于長白經營帝鄉實相興運非錫以上公之號則無以昭答神休今遣某官某持節備物冊命神爲興國應聖公申命有司歲時奉祀於戲嚴廟貌正封爵禮亦至矣惟神其衍靈長之徳用輔我國家彌億年神亦享廟食于無窮豈不休哉嘉蔭侯大定二十五年勅封上京䕶國林神爲䕶國嘉蔭侯毳冕七旒服五章圭同信圭遣使詣廟以三獻禮祭告其祝文曰蔚彼長林實壯天邑廣袤百里惟神主之廟貌有嚴侯封是享歆時蠲潔相厥滋榮是後遇月七日上京幕官一員行香著為令大定二十七年春正月尚書省言鄭州河隂縣聖后廟前代河水爲患屢禱有應嘗加封號廟額今因禱祈河遂安流乞加褒贈上從其請特加號曰昭應順濟聖后廟曰靈徳善利之廟毎歲委本縣長官春秋致祭如令盧溝河神大定二十七年奉㫖毎歲委本縣長官春秋致祭如令章宗本紀明昌四年十二月甲寅冊長白山之神爲開天𢎞道聖帝禮志明昌四年十月備衮冕玉冊儀物上御大安殿用黄麾立仗八百人行仗五百人復冊爲開天𢎞道聖帝章宗本紀明昌六年九月甲申冊靜寧山神爲鎮安公呼圗哩巴山神爲瑞聖公十二月乙亥詔加五鎮四瀆王爵禮志明昌六年八月以冕服玉冊冊靜寜山神爲鎮安公冊文曰皇帝若曰古之名山咸在祀典軒皇之世神靈所奉者七千虞氏之世望秩毎及于五載葢惟有益于國是以必報其功逮乎後王申以徽冊至于嶽鎮之外或亦封爵之加故太白有神應之稱而終南有廣惠之號禮由義起事與時偕載籍所傳于今猶監朕修和有夏咸秩無文眷兹静寧秀峙朔野緼澤布氣幽贊乎坤元導風出雲協符乎乾造一方之表萬物所瞻南直都畿北維障徼連延廣厚寳藏攸興盤固髙明謻宫斯奠昔有遼嘗恃以富國迄大定更爲之錫名洪惟世宗功昭列聖亦越顯考徳利生民爰即歳時駕言臨幸兵革不試逺人輯寧雨暘常調品彚蕃廡此上帝無疆之貺亦英靈有相之符比即輿情載修故事顧先皇駐蹕之地開累世承平之風迓續遺休式甄神祐肆象徳以畀號仍班台而闡儀宇象一新采章具舉今遣使某副某持節備物冊命神爲鎮安公仍勅歲時奉祀於戲容典焜燿精明感通惟永億年翊我昌運神其受職豈不偉歟瑞聖公即瑪達哈山也章宗生于此世宗愛此山勢衍氣清故命章宗名之後更名呼圗哩巴山建廟明昌六年八月以衮服玉冊封山神爲瑞聖公建廟命撫州有司春秋二仲擇日致祭爲常其冊文曰皇帝若曰國家之興命歴攸屬天地元化惟時合符山川百神無不受職粹精薦瑞明聖繼生著丕應于殊禎啟昌期于幽贊裒對信猶之典咸修望秩之文嘉乃名山奠兹勝地下綿乾分上直樞靜盤析木之津達中原之氣廓除氛祲函毓太和仰惟光烈昭垂徽音如在即髙明而清暑克靜壽以安仁周廬安寧厚澤浹洽朕祗循祖武順講時廵感羙號以興懐佩聖謨而介福言念誕彌之初度抑由翊衛之効靈然猶祀秩無章神居不屋非所以盡報功崇徳之義副追始樂原之心爰飾名稱載新祠宇勒忱辭于貞琰涓良日于元龜彰服采以辨威潔庪縣而致祭闡揚茂實敷繹多儀今遣使某副某持節備物冊命神爲瑞聖公仍勅有司歲時奉祀於戲尚其聰明歆此誠意孚休惟永亦莫不寧王圻續通考料石岡祠海陵嘗過此祠持杯筊禱曰使吾有天命當得吉卜投之吉又禱曰果如所卜他日當有報否則毁爾祠宇投之又吉及即位貞元元年十月封料石岡神爲靈應侯章宗明昌六年十二月詔加五嶽四瀆王爵金史禮志明昌間從沂山道士楊道全請封沂山爲東安王吳山爲成徳王霍山爲應靈王㑹稽山爲永興王醫無閭山爲廣寜王淮爲長源王江爲㑹源王河爲顯聖靈源王濟爲清源王毎歲遣使奉御署祝版奩薌乗驛詣所在率郡邑長貳官行事禮用三獻讀祝官一捧祝官二盥洗官二爵洗官二奉爵官一司尊彛一禮直官四以州府司吏充前三日應行事執事官散齋二日治事如故宿于正寢如常儀前二日有司設行事執事官次於廟門外掌廟者掃除廟之内外前一日有司牽牲詣祠所享官以下常服閲饌物視牲充腯享日丑前五刻執事者設祝版于神位之右置于坫及以血豆陳于饌所次設祭器皆藉以席掌饌者實之左十籩爲三行以右爲上實以乾䕩乾􅀥形鹽魚鱐鹿脯榛實乾桃菱芡栗右十豆爲三行以左爲上實以芹菹筍菹韭菹菁菹葵菹魚醢兎醢豚拍鹿臡醓醢次設犧尊二象尊二在堂上東南隅北向西上犧尊在前實以法酒犧尊初獻官酌象尊亞終獻酌又設太尊一山尊一在神位前設而不酌有司設燭于神位前洗二在東階之下直東霤北向罍在洗東加勺篚在洗西南肆實以巾執罍篚者位于其後又設揖位于廟門外初獻在西東向亞終及祝在東南向北上開瘞坎于廟内庭之壬地享日丑前五刻執事官各就次掌饌者帥其屬實饌具畢凡祭官各服其服與執事官行止皆贊者引㸃視陳設訖退就次引初獻以下詣廟南門外揖位立定贊禮者贊揖次引祝升堂就位立次引初獻詣盥洗位北向立搢笏盥手帨手執笏詣爵洗位北向立搢笏洗爵以爵授執事者執笏升堂詣酌罇所西向立執事者以爵授初獻初獻搢笏執爵執罇者舉冪執事者酌酒初獻以爵授執事者執笏詣神座前北向立搢笏跪執事者以爵授初獻初獻執爵三祭酒奠爵訖執笏俛伏興少立次引祝詣神位前東向立搢笏跪讀祝訖執笏興退復位初獻再拜贊禮者引初獻復位次引亞獻酌獻並如初獻之儀次引終獻並如亞獻之儀贊者引初獻官詣神位前北向立執事者以爵酌清酒進初獻之右初獻跪祭酒啐酒奠爵執事者以爼進減神座前胙肉前腳第二節共置一爼上以授初獻初獻以授執事者初獻取爵遂飲卒爵執事者進受爵復于坫初獻興再拜贊者引初獻復位贊者曰已飲福受胙者不拜亞獻官以下皆再拜拜訖次引初獻以下就望瘞位以饌物進于坎東西廂各二人贊者曰可瘞寘土半坎又曰禮畢遂引初獻官以下出祝與執尊罍篚冪者俱復位立定贊者曰再拜再拜訖遂出祝版燔于齋所宣宗本紀貞祐三年十一月壬申遣參知政事侯摯祭河神于宜村王圻續通考哀帝天興三年正月冊柴潭神爲䕶國靈應王右金祀山川元史世宗本紀中統二年秋七月乙丑遣使持香幣祀嶽瀆冬十月辛卯遣道士訾洞春代祀東海廣徳王廟祭祀志嶽鎮海瀆代祀自中統二年始凡十有九處分五道後乃以東嶽東海東鎮北鎮爲東道中嶽淮瀆濟瀆北海南嶽南海南鎮爲南道北嶽西嶽后土河瀆中鎮面海西鎮江瀆爲西道既而又以驛騎迂逺復爲五道道遣使二人集賢院奏遣漢官翰林院奏遣蒙古官出璽書給驛以行中統初遣道士或副以漢官世祖本紀至元三年秋七月丙午遣使祀五嶽四瀆祭祀志至元三年夏四月定歲祀嶽鎮海瀆之制正月東嶽鎮海瀆土旺日祀泰山于泰安州沂山于益都府界立春日祀東海于萊州界大淮于唐州界三月南嶽鎮海瀆立夏日遥祭衡山土旺日遥祭㑹稽山皆于河南府界立夏日遥祭南海大江