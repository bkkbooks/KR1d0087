body:
  text: 五禮通考卷一百八十二刑部尚書秦蕙田撰嘉禮五十五觀象授時易繋辭𫝊日月運行一寒一暑呉氏澄曰離為日坎為月艮山在西北嚴凝之方為寒兌澤在東南温熱之方為暑左離次以兑者日之運行而為暑也右坎次以艮者月之運行而為寒也邵子曰日為暑月為寒書曰日月之行則有冬有夏日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉書洪範星有好風星有好雨𫝊箕星好風畢星好雨日月之行則有冬有夏月之従星則以風雨注月經於箕則多風離於畢則多雨疏正義曰張衡蔡邕王蕃等説渾天者皆云周天三百六十五度四分度之一天體圓如彈丸北髙南下北極出地上三十六度南極入地下三十六度北極去南極直徑一百八十二度弱其依天體隆曲南極去北極一百八十二度彊正當天之中央南北二極中等之處謂之赤道去南北極各九十一度春分日行赤道従此漸北夏至赤道之北二十四度去北極六十七度去南極一百一十五度日行黒道従夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南二十四度去南極六十七度去北極一百一十五度其日之行處謂之黄道又有月行之道與日道相近交路而過半在日道之裏半在日道之表其當交則兩道相合交去極逺處兩道相去六度此其日月行道之大畧也詩云月離于畢俾滂沱矣鄭𤣥引春秋緯云月離于箕則風揚沙李氏光地曰日行月行俱經列宿而獨云月之従星何哉所謂月之從星云者不獨謂風雨隂類月實主之葢其行度一日而離一宿故以二十八日徧閱周天二十八舍此則月従星之義也蕙田案洪範所云日月之行則有冬有夏月之従星則以風雨者有冬有夏因乎日月之行以風以雨因乎月之従星二語一貫冬夏有常故曰有風雨不常故曰以易繋辭𫝊曰日月運行一寒一暑亦謂一寒一暑之迭為循環由日月運行則然與洪範義正同日月之行有常故冬夏寒暑有常自注疏以有冬有夏為有冬行之道有夏行之道是冬夏二字僅當南此二字况南北道已包在日月之行一句中下句乃所以明天行之妙寒暑進退成變化而生萬物悉由於日月之行也若日行有盈縮月行有遲疾術家或以有冬有夏當之亦非洪範之義月行每月一南北借冬夏二字言南北尤於辭義未瑩又案日道有發歛是以有冬有夏何以兼言月月實寒體故也日往則寒日來則暑寒得月益甚暑得月稍平暑屬日寒屬月也月以寒體又去地近故寒氣至盛然卒不勝日日來則寒解矣日去則寒至矣有冬有夏所以必兼日月言也周髀算經凡為日月運行之圓周七衡周而六間以當六月節六月為百八十二日八分日之五故日夏至在東井極内衡日冬至在牽牛極外衡也注東井牽牛為長短之限内外之極也衡復更終冬至故曰一嵗三百六十五日四分日之一一嵗一内極一外極三十日十六分日之七月一外極一内極漢趙君卿七衡圗注第一夏至日道也出第四春秋分日道也外第七冬至日道也皆隨黄道冬至從南而北夏至從北而南終而復始也戴氏震曰古未有黄赤道之名但謂之衡虞書之璿璣既為黄極則玉衡以界黄道而定節氣黄道必别為側絡之衡凖黄極取正赤道凖赤極取正也此七衡皆凖赤極取正以側剖黄道為六間虞書不必定有七衡而衡之名出于古無疑日在内一衡夏至右旋發南交於次二衡大暑交於次三衡處暑交於次四衡秋分交於次五衡霜降交於次六衡小雪終次七衡冬至右旋歛北交於次六衡大寒交於次五衡雨水交於次四衡春分交於次三衡穀雨交於次二衡小滿復至内一衡夏至七衡者十二中氣日所至黄極晝夜左旋而成之規畫也黄道者日右旋發歛之本也七衡日所至是謂定氣與土圭測景相應然則定氣自古用之矣至若月道南北之距或極七衡之外或僅當内外衡或在内外衡之内非七衡加之而九日有七衡六間月有九道八行漢唐志各自為説必有所受據九道八行乃就黄道上均分四正四維故八併黄道而九葢當交在黄道去交則各循其道以八行辨月道出入明交終所差驗食限有無猶振衣之舉其領治絲之尋其端至簡易也律家未能盡九道之用誠因其術久廢後漢志言之矣沈存中乃以九道為月行遲速之段目豈其然哉冬至日在牽牛夏至在東井特周時為然第四衡曰中衡即赤道漢書天文志日有中道月有九行中道者黄道一曰光道光道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛逺極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極逺近之差晷景長短之制也去極逺近難知要以晷景晷景者所以知日之南北也蕙田案列宿有嵗差之移晷景有南北之别此所舉牽牛東井婁角及景長短據一時一方言之耳晉書天文志王蕃曰赤道帶天之紘去兩極各九十一度少彊黄道日之所行也半在赤道外半在赤道内與赤道東交於角五少弱西交於奎十四少彊其出赤道外極逺者去赤道二十四度斗二十一度是也其入赤道内極逺者亦二十四度井二十五度是也日南至在斗二十一度去極北一十五度少彊是也日最南去極最逺故景最長黄道斗二十一度出辰入申故日亦出辰入申日晝行地上百四十六度彊故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度稍北故日稍北以至於夏至日在井二十五度去極六十七度稍彊是日最北去極最近景最短黄道井二十五度出寅入戌故日亦出寅入戌日晝行地上二百一十九度少弱故日長夜行地下百四十六度彊故夜短自夏至之後日去極稍逺故景稍長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故日出稍南以至於南至而復初焉斗二十一井二十五南北相應四十八度春分日在奎十四少彊秋分日在角五少弱此黄赤二道之交中也去極俱九十一度少彊南北處斗二十一井二十五之中故景居二至長短之中奎十四角五出卯入酉故日亦出卯入酉日晝行地上夜行地下俱百八十二度半彊故日見之漏五十刻不見之漏五十刻謂之晝夜同夫天之晝夜以日出没為分人之晝夜以昏明為限日未出二刻半而明日入二刻半而昏故損夜五刻以益晝是以春秋分漏晝五十五刻蕙田案春分交於奎十四度少彊秋分交於角五度少弱夏至日在井二十五度冬至日在斗二十一度特據漢時為然其黄道去赤道二十四度之距今謂之黄赤距緯古闊而今漸狹赤道即周髀之中衡出赤道外二十四度即外衡入赤道内二十四度即内衡元史志黄道出入赤道冬至去極一百一十五度二十一分七十三秒夏至去極六十七度四十一分一十三秒蕙田案冬至去極度分内減夏至去極度分得内外衡相距四十七度八十分六十秒半之即黄赤距緯二十三度九十分三十秒新法算書黄赤二道位置不等其各兩極不等二經二緯縦横不等交互不等故令星行不等其差亦不等有名為有差而絶不可謂差者黄道之經度是也恒星依黄道東行如載籍相𫝊堯時冬至日躔約在虚七度今躔箕四度四千年間而日退行若干度者即星之進行若干度也古法謂之嵗差各立年率郭守敬以為六十六年有竒而差一度今者斟酌異同辨析㣲眇定為毎嵗東行一分四十三秒七十三㣲二十六纎六十九年一百九十一日七十三刻而行一度凡二萬五千二百二年九十一日二十五刻而行天一周終古恒然也此立名為差而實有定法不可謂差者也有行度不爽而兩道參差致生違異者赤道之經度是也星依黄道行與赤道諸緯皆以斜角相遇兩經相較是生廣狹因其廣狹是生疾遲又因其斜迤而従赤極分經古今各測復生㕘錯其南北東西亟舒寛迮互有乗除一再迴易即還故處此則星經不異而以交道為異者也有星本平行而兩距變易致成升降者赤道之緯度是也黄赤兩至之距為二十三度八十六分有竒星従南至行北距如是既迄象限與赤同行迨於半周則其距南亦復乃爾計行半周而南北距差四十七度七十二分有竒盡一周而復是其星行不異而以距度為異者也至若黄赤二道兩至之距古來皆稱二十四度今測定為二十三度八十六分七十六秒考之西史所載周顯王時一測西漢景帝時一測東漢順帝時一測三史折衷為二十四度一十八分三十秒以較今測差三十一分五十四秒此為二道之兩至距度二千年間昔逺今近漸次移易之數也故有不係星行不闗經度而躔道自為近就者黄道之緯度是也惟黄緯一差不知逺于何始不知近于何終逺極或當先近不知改于何年近極或當返逺不知轉于何日此則非理數所能窮非思路所能及也蕙田案黄赤距度古今不同後漢張衡靈憲稱黄道出入赤道二十四度元郭守敬測為二十三度九十分三十秒以今度法約之為二十三度三十三分三十二秒西人苐谷所測為二十三度三十一分三十秒刻白爾改為二十三度三十分後利酌理噶西尼又改為二十三度二十九分其漸次移易之故非巧算所能及惟在隨時宻測以合天行而已又案黄赤距緯度分即黄赤二極相去度分倍之為内外衡相距之數即黄極環繞赤極而成規之徑然則紐星漸逺赤極亦由黄赤極漸近也右黄赤道附黄赤距緯漢書天文志黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分東従青道立秋秋分西従白道立冬冬至北從黒道立夏夏至南從赤道唐書天文志凡月合朔所交冬在隂律夏在陽律月行青道冬至夏至後青道半交在春分之宿當黄道東立冬立夏後青道半交在立春之宿當黄道東南至所衝之宿亦如之冬在陽律夏在隂律月行白道冬至夏至後白道半交在秋分之宿當黄道西立冬立夏後白道半交在立秋之宿當黄道西北至所衝之宿亦如之春在陽律秋在隂律月行朱道春分秋分後朱道半交在夏至之宿當黄道南立春立秋後朱道半交在立夏之宿當黄道西南至所衝之宿亦如之春在隂律秋在陽律月行黒道春分秋分後黒道半交在冬至之宿當黄道北立春立秋後黒道半交在立冬之宿當黄道東北至所衝之宿亦如之四序離偽八節至隂陽之所交行與黄道㑹故月有九行各視月交所入七十二候距交初中黄道日度蕙田案初交中交黄道之日度也毎五度為限亦初數十二毎限減一數終於四乃一度彊依平更従四起毎限増一終於十二而至半交其去黄道六度又自十二毎限減一數終於四亦一度彊依平更從四起毎限増一終於十二復與日軌相㑹凡日以赤道内為隂外為陽月以黄道内為隂外為陽故月行宿度入春分交後行隂律秋分交後行陽律皆為同名若入春分交後行陽律秋分交後行隂律皆為異名大衍術議曰推隂陽律交在冬至夏至則月行青道白道所交則同而出入之行異故青道至春分之宿及其所衝皆在黄道正東白道至秋分之宿及其所衝皆在黄道正西若隂陽律交在立春立秋則月循朱道黒道所交則同而出入之行異故朱道至立夏之宿及其所衝皆在黄道西南黒道至立冬之宿及其所衝皆在黄道東北若隂陽律交在春分秋分之宿則月行朱道黒道所交則同而出入之行異故朱道至夏至之宿及其所衝皆在黄道正南黒道至冬至之宿及其所衝皆在黄道正北若隂陽律交在立夏立冬則月循青道白道所交則同而出入之行異故青道至立春之宿及其所衝皆在黄道東南白道至立秋之宿及其所衝皆在黄道西北其大紀皆兼二道而實分主八節合於四正四維案隂陽律中終之所交則月行正當黄道去交七日其行九十一度齊於一象之率而得八行之中八行與中道而九是謂九道凡八行正於春秋其去黄道六度則交在冬夏正於冬夏其去黄道六度則交在春秋日出入赤道二十四度月出入黄道六度凡月交一終退前所交一度及餘八萬九千七百七十三分度之四萬二千五百三少半積二百二十一月及分七千七百五十三而交道周天矣因而半之將九年而九道終以四象考之各據合朔所交入七十二候則其八道之行也以朔交為交初望交為交中若交初在冬至初候而入隂律則行青道又十三日七十六分日之四十六至交中得所衝之宿變入陽律亦行青道若交初入陽律則白道也故考交初所入而周天之度可知若望交在冬至初候則減十三日四十六分視大雪初候隂陽律而正其行也蕙田案月道出入黄道當其出入過度謂之初交中交乃兩道相交之處也其初交自黄道外而入内其中交在對衝之處必自内而出外其初交自黄道内而出外其中交在對衝之處必自外而入内入曰行隂律出曰行陽律葢月道斜絡黄道猶黄道之斜絡赤道月之交猶日之有春秋分也月道出入黄道内外自初交而至中交由中交而至初交相距皆一百八十度其行一象限九十度處為兩交之半皆名為半交距黄道六度自初交至半交距度則自近而逺自半交而至中交則自逺而近自中交至半交初交亦然唐志所云毎五度為限而増減之也大衍術議交在冬至夏至則月行青道白道所交則同而出入之行異者指當交而言也青道至春分之宿及其所衝皆在黄道正東白道至秋分之宿及其所衝皆在黄道正西者指半交而言也餘交並同葢月行二十七日有竒而一周天毎周則必有初交中交之兩候一周則退前所交一度半弱是離原交處無定所故各據合朔所交七十二候凖之以陽律隂律而八道可分其青朱白黒特以其在黄道四正四維而别其名耳若推算則皆以冬至初候為率也宋志同元史志當二極南北之中横絡天體以紀宿度者赤道也出入赤道為日行之軌者黄道也所謂白道與黄道交貫月行之所由也古人隨方立名分為八行與黄道而九究而言之其實一也惟其隨交遷徙變動不居故强以方色名之月道出入日道兩相交值當朔則日為月所掩當望則月為日所衝故皆有食然涉交有逺近食分有深淺皆可以數推之所謂交周者月道出入日道一周之日也日道距赤道之逺為度二十有四月道出入日道不踰六度其距赤道也逺不過三十度近不下十八度出黄道外為陽入黄道内為隂隂陽一周分為四象月當黄道為正交出黄道外六度為半交復當黄道為中交入黄道内六度為半交是為四象象别七日各行九十一度四象周徧是謂一交之終以日計之得二十七日二十一刻二十二分二十四秒毎一交退天一度二百分度之九十三凡二百四十九交退天一周有竒終而復始正交在春正半交出黄道外六度在赤道内十八度正交在秋正半交出黄道外六度在赤道外三十度中交在春正半交入黄道内六度在赤道内三十度中交在秋正半交入黄道内六度在赤道外十八度月道與赤道正交距春秋二正黄赤道正交宿度東西不及十四度三分度之二夏至在隂律内冬至在陽律外月道與赤道所差者多夏至在陽律外冬至在隂律内月道與赤道所差者少葢白道二交有斜有直隂陽二律有内有外直者宻而狹斜者疎而闊其差亦從而異今立象置法求之差數多者不過三度五十分少者不下一度三十分是為月道與赤道多少之差新法算書正中交者黄白二道之兩交也正交亦曰羅㬋亦曰天首西法謂之龍頭中交亦曰計都亦曰天尾西法謂之龍尾月行及于黄道曰交月本圏之自行度曰轉而轉終分多於交終分故轉滿一周交終未及恒居其後交不及轉之度即兩交退行之度故謂兩交為逆行也月平行一日一十三度一十三分四十六秒是為月行距交之度以交為界順行月平行一日十三度一十分三十五秒竒是為月行距宫次之度以宫次為界亦順行兩數之較得三分一十一秒是則兩交一日逆行之數所謂羅計行度也交有平行又有自行與日月相似自行有遲有疾黄白二道之相距亦時多時少古來未覺有此苐谷累年宻測得交行惟朔望時無加減與日在最髙最髙衝同理恒得五度弱過此漸加至兩弦而極自行恒半月滿一周與太隂次輪行度同理朔望時兩交之大距為四度五十八分三十秒兩弦時兩交之大距為五度一十七分三十秒蕙田案西法以白道入黄道北為正交出黄道南為中交與古法正相反然名殊而理不殊也古測黄白大距六度以今度法約之則為五度五十五分强於西術新法算引月道惟一古謂月行九道者乃白道正交行及四正隂陽二限各異命之因有八名加以公名共有九耳非真有九道也白道兩交黄道論最逺之距謂為五度此係二限未甚大差之數新法測得凡朔望外相距皆過五度上下二弦則為五度一十七分三十秒推知二道相交之角非定而不動者要其廣狹之行恒以十五日為限也續文獻通考案尚書洪範云日月之行則有冬有夏蔡𫝊本於漢志其言日行四時所至亦據漢書而言後此則宿度漸差然其為有冬有夏則一也至於月行有冬夏則周禮致月周髀七衡之說義甚簡明漢志轉與經義相逺周禮馮相氏冬夏致日春秋致月鄭氏注曰冬至日在牽牛景長三尺夏至日在東井景尺五寸此長短之極賈公彦疏曰春分日在婁月上弦於東井望於角下弦於牽牛秋分日在角月上弦於牽牛望於婁下弦於東井周髀曰凡為日月運行之圜周七衡周而六間以當六月節日夏至在東井極内衡冬至在牽牛極外衡故日三百六十五日四分日之一一嵗一外極一内極三十日十六分日之七月一外極一内極葢黄道與赤道斜交出入赤道南北二十四度今測為二十三度半日行黄道一嵗一周天春秋分正當赤道夏至入赤道北冬至出赤道南周禮言冬夏致日周髀言日一嵗一内極一外極皆一義也七衡六間云者内一衡為夏至之日道次二衡為小滿大暑之日道次三衡為穀雨處暑之日道次四衡為春分秋分之日道次五衡為雨水霜降之日道次六衡為大寒小雪之日道次七衡為冬至之日道即隨天西轉之日軌也月道與日道斜交出入黄道南北六度今測為五度半兩交正當黄道出黄道南為陽律為正交入黄道北為隂律為中交距交一象限去黄道六度為半交月行二十七日有竒而交一終毎交退天一度半弱十八年有竒而退天一周朔當交則日食望當交則月食日行一嵗惟兩次值交而月行一月必與日一㑹如朔在春分交在二至則月上弦行夏至道下弦行冬至道朔在秋分交在二至則月上弦行冬至道下弦行夏至道此月行冬極外衡夏極内衡之正軌也又如朔在春分入陽律望在秋分入隂律則月上弦行夏至南六度下弦行冬至北六度朔在秋分入隂律望在春分入陽律則月上弦行冬至北六度下弦行夏至南六度此月行冬不及外衡夏不及内衡之極致也又如朔在春分入隂律望在秋分入陽律則月上弦行夏至北六度下弦行冬至南六度朔在秋分入陽律望在春分入隂律則月上弦行冬至南六度下弦行夏至北六度此月行冬過外衡夏過内衡之極致也然月行雖有過不及之殊而其為有冬夏則一毎月亦皆有冬夏但不能皆在午中故月行一月之間有冬有夏與日行一嵗同而惟春秋得以兩見周禮言春秋致月周髀言月一月一内極一外極亦一義也洪範𫝊云月有九行若以過内衡外衡而言則内衡之北外衡之南各有一道並七衡而為九即隨天西轉之月軌也前漢天文志云黒道二出黄道北赤道二出黄道南此赤道非天之赤道唐宋志别名曰朱道白道二出黄道西青道二出黄道東立春春分東從青道立秋秋分西從白道立冬冬至北從黒道立夏夏至南從赤道一似一嵗始行交一終又似一嵗已徧閱九道讀者多不可曉今以唐宋志考之月道以朔交為交初望交為交中入黄道内為隂出黄道外為陽内則北外即南因月道有方色故以内外别之交初在冬至入隂則月行青道入陽則月行白道葢冬至之朔日月同在北方之宿自北而西入黄道内則必在黄道東故為青道出黄道外則必在黄道西故為白道凡月行一道必匝天一周交初在冬至之宿交中必在夏至之宿而交初後半交則在春分之宿交中後半交則在秋分之宿以其出黄道東而為青道故専舉春分之宿而言其實一周皆青道也以其出黄道西而為白道故専舉秋分之宿而言其實一周皆白道也八行皆倣此例至於合宿雖毎年一周天而月道之交毎年僅退天二十度弱月行二十七日有竒而交一終毎年行十三交有竒毎交退天一度半弱毎年約退天二十度弱計四年半有竒交行退天九十度而月道始移一方自立春之宿出黄道東南為青道行四十五度至春分之宿出黄道正東仍為青道行四十五度至立夏之宿始為朱道故至四年半交行退天九十度而月道始移一方也故率以四年半行二青道四年半行二朱道四年半行二白道四年半行二黒道計十八年有竒而九道一周然則青朱白黒特以方色為名春夏秋冬亦各隨方而舉究之九道實一道耳是故唐宋以來以九道為月道之總名而推算之法則一元授時則直以月道為白道明大統及西法皆與授時同以推月行經緯悉無違失至於測月軌之髙下則必兼論黄道與周禮周髀相合後漢志云九道術久廢永元中復命史官以九道法候弦望驗無有差亦與周禮鄭注近似馬端臨考載沈括云月行有遲有速難可以一術御故分為數段毎段以一色名之以别算位而已天官家不知其意遂以為實有九道甚可嗤也雖未能明言其故而已心議其非豈史志九道皆失洪範本義而周禮周髀獨存古遺法歟蕙田案月行之出入黄道猶日行之出入赤道也赤道正而黄道斜絡之一嵗之中冬至極南二十四度夏至極北二十四度春秋分則交赤道合二至二分而日道周焉黄道斜而月行環繞之一月一周朔交為交初望交為交中初交中交之半為半交内外皆距黄道六度交一終而左旋退一度半弱至十八年有竒而月道周焉交無定處而行度有常古人統之以八節而交候之大綱舉矣交有出入而行有定位統之以四正四維而交道之定軌彰矣自漢迄宋皆以九道求之所以表其分也元以後則以赤道距度求之而概名曰白道所以著其合也一道原有九行九道實則一道分而合合而分者也通考又以七衡凖之意欲明月道之不離黄道雖與古法異名其實亦無二指而洪範周禮經義則尤見發明矣至月道有交行而交行又有遲疾及距赤緯之不等其故皆由於月道極環繞黄極也别詳於後右月道後漢書志在天成度在律成日律數之生也乃立儀表以校日景景長則日逺天度之端也日發其端周而為嵗然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五度四分度之一為嵗之日數日日行一度亦為天度戴氏震曰古書度法以日一晝夜之行為一度周髀算經及四分術皆周天三百六十五度四分度之一即為嵗實而漢太初法嵗餘一千五百三十九分日之三百八十五以是為周天猶强於四分矣太初冬至日起牽牛其後漸覺在斗故歸餘分於斗謂之斗分後漢劉洪作乾象術謂四分於天疎闊由斗分太多始減斗分則整度之外餘分不及四之一韓翊以乾象減斗分太過復増其數然亦不滿四之一也東晉虞喜始立嵗差劉焯皇極術因分天自為天嵗自為嵗自是天度復過四之一嵗餘不及四之一由漢太初迄今一術輒更一天周度下餘分竒零不齊且屢更之後無所適從故舉天度者但以四分為言要其無當於天已久矣况嵗周不及天周其説非也日行黄道一周然後發歛終而成嵗使有不及則發歛未終未成嵗矣是嵗周與天周不當分而為二日行無有不及故也一嵗之終星回於天不能復其原處昔人謂之嵗差者星自移而東耳當分星自為星不當併星移之度統謂之天周而以為日行不及由是言之自有嵗差之説而天與嵗分明乎嵗差非日行不及而天與嵗復合天與嵗合則在天成度在律成日其法固因乎天之本然推日躔為一度法以恒嵗實為之可也推月離為一度法以經朔為之可也二者相乗以通之為周天之小分可也邵子皇極經世圜者六變六六而進之故六十變而三百六十矣冬至之子中隂之極春分之卯中陽之中夏至之午中陽之極秋分之酉中隂之中凡三百六十中分之則一百八十此二分二至相去之數也邵伯温曰皇極經世其法皆以十二三十相乗十二三十日月之數也蔡氏元定曰陽數以三十起者一月有三十日一世有三十年也隂數以十二起者一日有十二辰一嵗有十二月也或曰氣盈於三百六十六朔虚於三百五十四今經世之數概以三百六十為率何也曰所以蔵諸用也消息盈虚之法在其間矣蕙田案象數之興其起於甲子乎十日十二子數窮六十因而六之則三百六十矣易乾坤之䇿合之亦三百六十日之數十因而三之則三十以十二三十相乗亦三百六十周天分十二次以日月十二㑹而成嵗也故十二子謂之十二辰合乎天位毎一次以三十均分之則周天三百六十度矣一嵗之日周乎三百六十之間故易曰凡三百有六十當期之日此古人部分天位之定法非截去竒數不言也周禮十日十有二辰㑹合為候謂之天位六其六十以極天位之數由來久矣漢後諸家但以此考氣盈朔虚毎月過三十為氣盈不滿三十為朔虚至邵子書乃悉以十二三十相乘為用蔡氏謂蔵諸用者得其故矣消息盈虛在其間是則以整御零之大用也唐時有西域九執法元有濟嚕瑪丹萬年法明初有西域黙徳納國王瑪哈穆特回回法考回回日元用隋開皇已未葢在九執法之先九執即其法明崇禎中議用西洋歐邏巴之法其法亦本於回回楊光先言歐邏巴以重資從回回得其法此客與宋人買不龜手之方者也西域諸法並用三百六十整度合乎邵子蔵諸用之道數之自然推而放諸四海而準有日行之度為體有整度為用二者並行而不相悖也觀承案數術大抵古疎而今宻獨三百六十度之法今反以疎而勝古之宻葢觀象授時總以定日躔為主日躔定而置閏嵗差皆可坐而致矣舊惟以恒星為天體於是天一日一周而又過一度者日則一日一周恰好而在天為不及一度則竒零參差之數愈析愈多而難以齊同不知太虛天體本無度可紀恒星乃自行而非天體也故惟以日行為定而以周天三百整度準之則上推而知恒星之東西差南北差而嵗差可見下推而知月之為氣盈為朔虛而置閏可得是為以整馭零以簡治繁之妙法似疎而反勝於宻者也宋邵子讀易有得而定為此數今法乃循而用之不得以西域九執回回日元似之而反客為主焉可耳朱子曰推步法蔡季通說當先論天行次及七政此亦未善要當先論太虛以見三百六十五度四分度之一一一定位然後論天行以見天度加損虚度之嵗分嵗分既定然後七政乃可齊耳戴氏震曰朱子謂先論太虚以見三百六十五度四分度之一一一定位者此欲以三百六十五度四分度之一為太虚之度使之定而有常也所謂然後論天行以見天度加損虛度之嵗分者此以日行一周天之嵗餘較之天度不等加嵗分若干而與天度等或損虚度若干而與嵗餘等是亦分天自為天嵗自為嵗矣然與嵗差之説分之以明其差者所見不同此欲定太虚之位然後驗一嵗日行周此太虚其嵗實分數必有天度然後能考較之嵗實滿天度而一必不及一日天度滿嵗實而一必過乎一度在天一度既與日一晝夜之行不齊猶用此竒零之度則因前人舊法言之耳明史天文志回回法天周度三百六十每度六十分毎分六十秒㣲纎以下俱準此宫十二毎宫三十度蕙田案唐志云九執術者出於西域周天三百六十度無餘分又言其名數詭異不著其詳要之回回法在其前矣又有歐邏巴法出於回回度分並同無有更易整度必用三百六十者以其與一嵗之日相近毎日不及一度成加損之法其實生於零度者也右古今度法梅氏文鼎曰問古法三百六十五度四分之一而今定為三百六十何也豈天度亦可増損與曰天度何可增減葢亦人所命耳有布帛於此以周尺度之則於度有餘以漢尺度之則適足尺有長短耳於布帛豈有増損哉曰天無度以日所行為度毎嵗之日既三百六十五日又四之一矣古法據此以紀天度宜為不易奈何改之曰古法以太陽一日所行命之為度然所謂四之一者訖無定率故古今公論以四分術最為疎闊而累代斗分諸家互異至授時而有減嵗餘増天周之法則日行與天度較然分矣又况有冬盈夏縮之異終嵗之間固未有數日平行者哉故與其為畸零之度而初不能合於日行即不如以天為整度而用為起數之宗固推步善法矣周天者數從所起而先有畸零故析之而為半周天為象限為十二宫為二十四氣七十二候莫不先有畸零而日行之盈縮不與焉故推步稍難今以周天為整數而但求盈縮是以整御零為法倍易且所謂度生於日者經度耳而術家所難尤在緯度今以三百六十命度則經緯通為一法故黄赤雖有正斜而度分可以互求七曜之天雖有内外大小而比例可以相較以其為三百六十者同也半之則一百八十四分之則九十而八線之法縁之以生故以製測器則度數易分以測七曜則度分易得以算三角則理法易明吾取其適於用而已矣三百六十立算實本回回至歐邏巴乃發明之耳况七曜之順逆諸行進退損益全在小輪為推步之要𦕈然而小輪之與大輪比例懸殊若鎰與銖而黍累不失者以其度皆三百六十也以至太隂之㑹望轉交五星之嵗輪無一不以三百六十為法而地球亦然故以日躔紀度但可施於黄道之經而整度之用該括萬殊斜側縦横周通環應可謂執簡御棼法之最善者矣問古者但言北辰渾天家則因北極而推其有南極今西法乃復立黄道之南北極一天而有四極何也曰求經緯之度不得不然也葢古人言天以赤道為主而黄道從之故周天三百六十五度皆從赤道分其度一一與赤道十字相交引而長之以㑹於兩極若黄道之度雖亦匀分周天三百六十五而有經度無緯度則所分者只黄道之一線初不據以分宫故授時十二宫惟赤道匀分各得三十度竒黄道則近二至者一宫或只二十八度近二分者一宫多至三十二度皆約整數若是其闊狹懸殊者何哉過宫雖在黄道而分宫仍依赤道赤道之勻度抵黄道而成斜交勢有横斜遂生闊狹故曰以赤道為主而黄道從之也向使術家只步日躔此法已足無如月五星皆依黄道行而又有出入其行度之舒亟轉變為法多端皆以所當黄道及其距黄之逺近内外為根故必先求黄道之經緯西法一切以黄道為主其法匀分黄道周天度為十二宫其分宫分度之經度線皆一一與黄道十字相交自此引之各成經度大圏以周于天體則其各圏相交以為各度輳心之處者不在赤道南北極而别有其心是為黄道之南北極自黄道兩極出線至黄道其緯各得九十度而均極距黄道四面皆均故分宫分度線上之緯度皆均以此各線之緯聨為圏線皆與黄道平行自黄道上相離一度起逐度作圏但其圏漸小以至九十度則成一㸃而㑹於黄極是為緯圏一名距等圈曰黄道既有經緯則必有所宗之極測算所需固已然則為測算家所立歟抑真有是以為運轉之樞耶曰以恒星東移言之則真有是矣何則古法嵗差亦只在黄道之一線今以恒星東移則普天星斗盡有古今之差惟黄道極終古不動豈非真有黄極以為運轉之樞哉曰然則北辰非黄極也今曰惟黄極不動豈北辰亦動歟曰以毎日之周轉言則周天星度皆東升西没惟北辰不動以恒星東移之差言則雖北辰亦有動移而惟黄極不動葢動天西旋以赤道之極為樞而恒星東移以黄道之極為樞皆本實測各有至理也問黄道有極以分經緯然則經緯之度惟黄道有之乎曰天地之間葢無在無經緯耳約畧言之則有有形之經緯有無形之經緯而又各分兩條曷言乎無形之經緯凡經緯之與地相應者其位置雖在地而實在無形之天朱子所謂先論太虚一一定位者此也曷言乎有形之經緯凡經緯之在天者雖去人甚逺而有象可徴即黄赤道也是故黄道有經緯赤道亦有經緯兩道之經度皆與本道十字相交引而成大圈經度皆三百六十兩度相對者連而成大圈故大圈皆一百八十其圈相㑹相交必皆㑹於其極兩道之緯圈皆與本道平行而逐度漸小以至於本極而成一㸃此經緯之度兩道同法也然而兩道之相差二十三度半故其極亦相差二十三度半而兩道緯圈之差數如之矣以黄緯為主則赤緯之斜二十三度半以赤緯為主而觀黄緯則其差亦然若其經度則兩道之相同者惟有一圈惟磨蝎巨蟹之初度初分聨而為一圈此圈能過黄赤兩極其餘則皆有相差之度而其差又不等惟一圈能過兩極則黄赤兩經圈合而為一圈以黄赤兩極同居磨蝎巨蟹之初也此外則黄道經圈只能過黄極而不過赤極赤道經圏亦只過赤極而不過黄極離磨蝎巨蟹初度益逺其勢並斜其差益多故逐度不等此其勢如以兩重罾網冒于圓球則網目交加縦横錯午而各循其頂以求之條理井然至􅄨而不可亂故曰在天之經緯有形而又分黄赤兩條也問經緯之與地相應者一而已矣何以亦分兩條曰黄赤之分兩條者有斜有正也地度之分兩條者有横有立也今以地平分三百六十經度三十度為一宫共十二宫再剖之則二十四向四面八方皆與地平圈為十字而引長之成曲線以輳于天頂皆相遇成一㸃故天頂者地平經度之極也其經度下達而輳于地心亦然又將此曲線各匀分九十緯度即地平上髙度又謂之漸升度而逐度聮之作横圈與地面平行而漸髙則漸小㑹于天頂則成一㸃即地平緯圈也其地平下作緯圈至地心亦然如太陽朦影十八度而盡太隂十二度而見之類皆用此度也此地平經緯之度為測驗所首重其實與太虚之定位相應者也然此特直立之經緯耳其經緯以天頂地心為兩極是直立也其地平即腰圍廣處而緯圈與地平平行漸小而至天頂亦成直上之形矣又有横偃之經緯焉其法以卯酉圈均分三百六十度亦三十度為一宫此圈上過天頂下過地心而正交地平于卯酉之中即地平經圈之一也其三百六十度亦即經圈上所分緯度但今所用只圈上分度之一㸃而不更作與地平平行之緯圈從此度分作十字相交之線引而成大圈其圈一百八十半在地平之上半在其下其地平上半圈皆具半周天度勢皆自正北趨正南穹隆之勢與天相際度間所容中闊而兩末鋭畧如剖瓜其兩鋭在南北其中闊在卯酉大圈相遇相交皆㑹于正子午而正切地平即子午規與地平規相交之一㸃在地平直立經緯原用子午規卯酉規為經圏地平規為腰圍之緯圏今則以卯酉規為腰圍而子午規與地平規則同為經度圏此一㸃即為經度之極而經度宗焉立象學安十二宫用此度也又自卯酉規向南向北逐度各作半圏如虹橋狀而皆與卯酉規平行地平下半圏亦然合之則各成全圈但離卯酉規漸逺亦即漸小以㑹於其極即地平規之正子午一㸃是其緯圈也測算家以立晷取倒影定時用此度也此一種經緯則為横偃之度其經緯以地平之子午為兩極而以卯酉規為其腰圍是横偃之勢一直立一横偃其度皆與太虛之定位相應故曰無形之經緯亦分兩條也不但此也凡此無形之經緯皆以人所居之地平起算所居相距不過二百五十里即差一度此以南北之里數言也若東西則有不二百五十里而差一度者矣何也地圓故也而所當之天頂地平俱變矣地平移則髙度改天頂易則方向殊跬步違離輾轉異視殆千變而未有所窮故曰天地之間無在無經緯也凡經緯度之法其數皆相待而成有全則有分有正則有對即顯見隠舉一知三故可以經度求緯亦可以緯度求經有地平之經緯即可以求黄赤有黄赤之經緯亦可以知地平而且以黄之經求赤之經亦可以黄之緯求赤之經以黄之緯求赤之緯亦可以黄之經求赤之緯用赤求黄亦復皆然宛轉相求莫不脗合施於用從衡變化而不失其常求其源渾行無窮而莫得其隙夫是以布之于算而能窮差變筆之于圗而能肖星躔制之于器而不違懸象也曰經緯之度既然以為十二宫則何如曰十二宫者經緯中之一法耳渾圎之體析之則為周天經緯之度周天之度合之成一渾圎而十二分之則十二宫矣然有直十二宫焉有衡十二宫焉有斜十二宫焉又有百游之十二宫焉以天頂為極依地平經度而分者直十二宫也其位自子至卯左旋周十二辰辨方正位于是焉用之以子午之在地平者為極而以地平子午二規為界界各三宫者衡十二宫也其位自東地平為第一宫起右旋至地心又至西地平而歴午規以復于東立象安命于是乎取之赤道十二宫従赤道極而分極出地有髙下而成斜立是斜十二宫也加時之法于是乎取之則其定也西行之度于是乎紀之則其游也黄道十二宫從黄道極而分黄道極繞赤道之極而左旋而黄道之在地上者從之轉側不惟日異而且時移晷刻之間周流遷轉正邪升降之度于是乎取之故曰百游十二宫也然亦有定有游定者分至之限游者恒星嵗差之行也知此數種十二宫而俯仰之間縷如掌紋矣然猶經度也未及其緯故曰經緯中之一法也戴氏震曰天本無度因日躔而有度故曰在天成度在律成日此古法也自嵗差之説謂日躔不及天度而分天周嵗周然則天度與日躔既非一致猶設為度之竒零者以合天其於天果合乎否也今細考之黄極在天環繞一嵗而周四游無有不及黄道每晝夜隨極之左旋而俱左因人生迴環逆溯之勢太陽在其上自春分黄道赤道交點漸歛嚮北夏至在最北由北漸發嚮南至秋分黄道赤道交㸃適半周天秋分後仍漸發嚮南冬至在最南由南又漸歛嚮北而復于春分交㸃適一周天此日躔一嵗之發歛亦無有不及也二者相應所以成寒暑往來有不及則未成嵗矣以是言之分天周嵗周者未宻也推其故由不知差在恒星不在太虚中之天周朱子所云當先論太虚誠步算家之要言葢天自為天恒星自為恒星不可不辨至若太陽行天一周而成嵗則天周嵗周本一致古人在天成度在律成日之意未始不善而授時減嵗餘增天周之法究與天違也今周天用三百六十度無餘分唐時西域九執法已然昔廢而今始顯更逐度剖之為八線表施於經緯縱横以盡互相推測之能事洵算家之至巧然古度法亦不可廢古竒零之度準乎嵗實之有竒零本法也今之以整御零借法也兼而用之可也右黄赤道經緯度附地平經緯度漢書志武帝元封七年漢興百二嵗矣太中大夫公孫卿壺遂太史令司馬遷等言紀律壊廢宜改正朔遂詔卿遂遷與侍郎尊大典星射姓等議造漢律迺定東西立晷儀下漏刻以追二十八宿相距於四方以定朔晦分至躔離弦望角十二亢九氐十五房五心五尾十八箕十一東七十五度斗二十六牛八女十二虛十危十七營室十六壁九北九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西八十度井三十三鬼四栁十五星七張十八翼十八軫十七南百一十二度蕙田案周禮馮相氏掌二十八星之位則以二十八宿分天位其來久矣此漢初所定赤道宿度宿皆整度後漢志四分歴北方斗七宿又有餘分四之一想前漢志北方七宿亦當有餘分或畧而未載與舊唐書志畢觜參及輿鬼四宿度數與古不同今並依天以儀測定用為常數畢十七觜一參十鬼三宋史志漢赤道宿度相承用之唐初李淳風造渾儀亦無所改開元中一行作大衍術詔梁令瓉作黄道游儀測知畢觜參及輿鬼四宿赤道宿度與舊不同自一行之後因相沿襲下更五代無所増損至仁宗皇祐初始有詔造黄道渾儀鑄銅為之自後測驗赤道宿度又一十四宿與一行所測不同氐十六度心六度尾十九度箕十度斗二十五度牛七度女十一度危十六度室十七度胃十五度畢十八度井三十四度鬼二度栁十四度葢古今之人以八尺圜器欲以盡天體決知其難矣又况圗本所指距星𫝊習有差故今赤道宿度與古不同蕙田案觜參二宿與唐測同餘並同漢測崇寧紀元術亢九少房五太心六少尾十九少箕十半牛七少女十一少虛九少秒七十二危十五半壁八太奎十六半昴十一少畢十七少觜半參十半井三十三少鬼二半柳十三太星六太張十七少翼十八太案諸法赤道宿次就立全度頗失真數今依宋朝渾儀校測距度分定太半少用為常數校之天道最為宻近蕙田案南斗營室胃氐四宿與皇祐測同惟角婁軫三宿仍漢測之舊又有元豐所測在紀元之前房六度虛九度少强張十七翼十九箕同漢測畢同唐測餘並同皇祐宋天文志又言紹聖二年清臺以赤道度數有差復命考正惟牛尾室柳四宿與舊法合葢宋人於宿度屢更而未有定如是元史志列宿著於天為舍二十有八為度三百六十五有竒非日躔無以校其度非列舍無以紀其度周天之度因二者以得之天體渾圜當二極南北之中絡以赤道日月五星之行常出入於此天左旋日月五星遡而右轉然列舍相距度數累代所測不同非㣲有動移則前人所測或有未宻古用闚管今新制渾儀測用二綫角十二度十分亢九度二十分氐十六度三十分房五度六十分心六度五十分尾十九度十分箕十度四十分東方七十九度二十分斗二十五度二十分牛七度二十分女十一度三十五分虚八度九十五分太危十五度四十分室十七度十分壁八度六十分北方九十三度八十分太奎十六度六十分婁十一度八十分胃十五度六十分昴十一度三十分畢十七度四十分觜五分參十一度十分西方八十三度八十五分井三十三度三十分鬼二度二十分栁十三度三十分星六度三十分張十七度二十五分翼十八度七十五分軫十七度三十分南方百八度四十分明史天文志崇禎元年所測赤道宿度周天三百六十度毎度六十分角十一度四十四分亢九度十九分氐十六度四十一分房五度二十八分心六度九分尾二十一度六分箕八度四十六分斗二十四度二十四分牛六度五十分女十一度七分虚八度四十一分危十四度五十三分室十七度壁十度二十八分奎十四度三十分婁十二度四分胃十五度四十五分昴十度二十四分畢十六度三十四分參二十四分觜十一度二十四分井三十二度四十九分鬼二度二十一分柳十二度四分星五度四十八分張十七度十九分翼二十度二十八分軫十五度三十分戴氏震曰列宿循黄道東移其去赤極漸差以赤極為中而均分之嚮之平者今或轉移而側嚮之側者今或轉移而平平則所當度廣側則所當度狹非星距之有變易也所當度隨體勢而殊觀耳元史疑其㣲有動移以此夫既所差甚㣲則一經測驗定其度分與中星同法久而後不得不改未久亦不必改也續文獻通考明史云觜宿距星唐測在參前三度唐書作二度元史作一度元測在參前五分今測已侵入參宿者乃據赤道而言葢參宿距星赤道之嵗差少觜宿距星赤道之嵗差多故古測觜在參前今測則觜在參後然列宿在天黄道皆有定次若據赤道而論非維觜能過參後鬼亦能過柳後推之中外各官星凡二星經度相近者皆將前後易位則欲以星紀度者反以度紊星烏所謂齊七政而協五紀者乎故列宿之次當以黄道為主且各宿距星惟人所指古今亦有不同唐書天文志曰奎誤距以西大星故壁損二度奎増二度今復距西南大星即奎壁各得本度張中央四星為朱鳥嗉外二星為翼比距以翼而不距以膺故張増二度半七星減二度半今復距以膺則七星張各得本度由是觀之則宿之距星古已有更易者矣至於觜參二宿其以何星作距古無明文唐書云古以參右肩為距失之太逺通考載宋兩朝天文志云觜三星距西南星參十星距中星西第一星西法觜宿距中上星參宿亦距中西一星今案觜宿西南星在中上星前僅一分五十秒可以不計而西南星小中上星大則以中上星作距可也若參宿以中西一星作距星則觜宿黄道度已在參宿後用嵗差推其赤道度亦與古測不符惟以參宿中東一星作距星則觜宿黄道恒在參宿前一度弱與古法先觜後參之序合今已依次改正蕙田案以上赤道宿度後漢書志賈逵論曰臣前上傅安等用黄道度日月弦望多近史官一以赤道度之不與日月同於今法弦望至差一日以上輒奏以為變至以為日却縮退行於黄道日得行度不為變願請太史官日月宿簿及星度課與待詔星象考校奏可臣謹案前對言冬至日去極一百十五度夏至日去極六十七度春秋分日去極九十一度洪範日月之行則有冬夏五紀論日月循黄道南至牽牛北至東井率日日行一度月行十三度十九分度七也今史官一以赤道為度不與日月行同其斗牽牛輿鬼赤道得十五而黄道得十三度半行東壁奎婁軫角亢赤道十度黄道八度或月行多而日月相去反少謂之日却案黄道值牽牛出赤道南二十五度其直東井輿鬼出赤道北五度赤道者為中天去極俱九十度非日月道而以遙準度日月失其實行故也以今太史官候注考元和二年九月已來月行牽牛東井四十九事無行十一度者行婁角三十七事無行十五六度者如安言問典星待詔姚崇井畢等十二人皆曰星圗有規法日月實從黄道官無其器不知施行案甘露二年大司農中丞耿夀昌奏以圗儀度日月行考驗天運狀日月行至牽牛東井日過度月行十五度至婁角日行一度月行十三度赤道使然此前世所共知也如言黄道有驗合天日無前却弦望不差一日比用赤道宻近宜施用上中多臣校案逵論永元四年也至十五年七月甲辰詔書造太史黄道銅儀以角為十三度亢十氐十六房五心五尾十八箕十斗二十四四分度之一牽牛七須女十一虛十危十六營室十八東壁十奎十七婁十二胃十五昴十二畢十六觜三參八東井三十輿鬼四柳十四星七張十七翼十九軫十八凡三百六十五度四分度之一冬至日在斗十九度四分度之一宋史天文志黄道横絡天體列宿躔度自隨嵗差而増減中興以來用統元紀元及乾道淳熈開禧統天㑹元毎一法更一黄道其多寡之異有不可勝載者而步占家亦隨各書之躔度焉梅氏文鼎曰各宿黄道度皆生于赤道赤道三百六十五度二五七五黄道亦三百六十五度二五七五而其各宿度數不同者則以二至二分所躔不同也赤道近二至則其變黄道度也損而少赤道近二分則其變黄道度也益而多葢赤道平分天腹適當二極之中所紀之度終古不易黄道不然其冬至則近南極在赤道外二十三度九十分其夏至則近北極在赤道内亦二十三度九十分其自南而北自赤道外而入于其内也則交于春分之宿其自北而南自赤道内而出于其外也則交于秋分之宿交則斜以斜較平視赤道之度必多此處既多則二至黄道視赤道之數必少理勢然也蕙田案漢以來皆用赤道變黄道又隨嵗差而移故一法輒更一黄道宿度皆非實測無足載也梅氏猶據舊説存之以見古術家黄道度之大畧明史天文志崇禎元年所測二十八宿黄赤度分皆不合於古夫星既依黄道行而赤道與黄道斜交其度不能無増減者勢也而黄道度亦有増減者或推測有得失抑恒星之行亦或各有遲速歟黄道宿度角十度三十五分亢十度四十分氐十七度五十四分房四度四十六分心七度三十三分尾十五度三十六分箕九度二十分斗二十三度五十一分牛七度四十一分女十一度三十九分虚九度五十九分危二十度零七分室十五度四十一分壁十三度一十六分奎十一度二十九分婁十三度胃十三度一分昴八度二十九分畢十三度五十八分參一度二十一分觜十一度三十三分井三十度二十五分鬼五度三十分柳十六度六分星八度二十三分張十八度四分翼十七度軫十三度三分續文獻通考案二十八宿距度古測皆以赤道為定前漢未有黄道宿度後漢雖有黄道宿度而未知有嵗差無論矣隋以後知有嵗差而宿距猶以赤道為定葢以恒星為不動而節氣西移則赤道宿度應古今皆同而黄道宿度應嵗有増減故惟測定赤道度而黄道度則以比例求之隋志云赤道常定紘帶天中儀極攸準是也至於赤道宿度古今不同則自唐迄元皆未能知其故由今考之恒星循黄道東行其東行之度各宿皆相等則各宿之相距亦宜恒相等若赤道與黄道斜交其嵗差之度各宿皆不同則各宿之相距自亦古今不同宋史云赤道古今不移星舍宜無盈縮元史云列宿相距度數古今所測不同非㣲有動移則前人所測或有未宻是皆未知赤道度數之本應古今不同也葢天體至大其行至速而其度有常其中㣲𣺌之差必積久而始著故自唐虞至晉始覺嵗之有差覺有差矣而嵗之差而西即天之差而東日之節氣屬嵗星之次舍屬天則差之在嵗與在天已難辨且天帶赤道左旋日星雖循黄道右旋而亦隨天西轉則差之由黄道與由赤道更難知矣宋史云自漢太初後至唐開元初八百年間悉無更易今雖測驗與古不同亦嵗月未久新法兩備其數誠知其難矣至以赤道度求黄道度用比例率其術甚疎則其黄道宿度尤不足據宋史云天度不齊古人特持其大綱後世漸極於精宻理固然亦勢使然也西法合古今之測候始知恒星循黄道東行故宿距専以黄道為定黄道宿度既定毎年遞加嵗差五十一秒即得逐年黄道宿度各宿之嵗差皆同則各宿之相距亦同至以黄道度求赤道度用弧線三角法推算視古為精而各宿所差不等則各宿之相距亦自古今不等也明史云崇禎元年所測各宿黄赤度分皆與古不合固其宜已然自崇禎元年至今黄道宿度亦㣲有不合即新法内之各表與指亦有互異葢當時甫經創修差有纎㣲積久始著惟在隨時精測順天求合斯古今不易之良法耳蕙田案以上黄道宿度右黄赤道宿度漢書志凡十二次日至其初為節至其中為中星紀初斗十二度大雪中牽牛初冬至於夏為十一月商為十二月周為正月終於婺女七度𤣥枵初婺女八度小寒中危初大寒於夏為十二月商為正月周為二月終於危十五度娵訾初危十六度立春中營室十四度驚蟄今曰雨水於夏為正月商為二月周為三月終於奎四度降婁初奎五度雨水今曰驚蟄中婁四度春分於夏為二月商為三月周為四月終於胃六度大梁初胃七度穀雨今曰清明中昴八度清明今曰穀雨於夏為三月商為四月周為五月終於畢十一度實沈初畢十二度立夏中井初小滿於夏為四月商為五月周為六月終於井十五度鶉首初井十六度芒種中井三十一度夏至於夏為五月商為六月周為七月終於柳八度鶉火初柳九度小暑中張三度大暑於夏為六月商為七月周為八月終於張十七度鶉尾初張十八度立秋中翼十五度處暑於夏為七月商為八月周為九月終於軫十一度夀星初軫十二度白露中角十度秋分於夏為八月商為九月周為十月終於氐四度大火初氐五度寒露中房五度霜降於夏為九月商為十月周為十一月終於尾九度析木初尾十度立冬中箕七度小雪於夏為十月商為十一月周為十二月終於斗十一度蕙田案十二次之名見於春秋𫝊國語爾雅葢周時部分天位之法列宿相距廣狹不等十二次則均分之而其名恒依星象秦漢間舊法一嵗二十四氣因繫之十二次由不知列宿有嵗差十二次漸移而東則節氣漸退而西次名従乎列宿不従節氣也漢初冬至日已在斗猶仍舊法以為起牽牛之初此一誤也以牽牛初當星紀正中此又一誤也春秋𫝊曰𤣥枵虛中也兹則虛非𤣥枵正中而危初乃當正中春秋𫝊婺女星紀之維首兹則婺女之半乃入星紀十二次名界葢與古相差五六度雖未甚懸殊不可據以為古蔡邕月令章句周天三百六十五度四分度之一分為十二次日月之所躔也地有十二分王侯之所國也毎次三十度三十二分之十四日至其初為節至其中為中氣自危十度至壁八度謂之豕韋之次立春雨水居之衞之分野自壁八度至胃一度謂之降婁之次驚蟄春分居之魯之分野自胃一度至畢六度謂之大梁之次清明穀雨居之趙之分野自畢六度至井十度謂之實沈之次立夏小滿居之晉之分野自井十度至柳三度謂之鶉首之次芒種夏至居之秦之分野自柳三度至張十二度謂之鶉火之次小暑大暑居之周之分野自張十二度至軫六度謂之鶉尾之次立秋處暑居之楚之分野自軫六度至亢八度謂之夀星之次白露秋分居之鄭之分野自亢八度至尾四度謂之大火之次寒露霜降居之宋之分野自尾四度至斗六度謂之析木之次立冬小雪居之燕之分野自斗六度至須女二度謂之星紀之次大雪冬至居之越之分野自須女二度至危十度謂之𤣥枵之次小寒大寒居之齊之分野皇甫謐帝王世紀自天地設闢未有經界之制三皇尚矣諸子稱神農之王天下也地東西九十萬里南北八十五萬里及黄帝受命始作舟車以濟不通乃推分星次自斗十一度至婺女七度一名須女曰星紀之次於辰在丑今呉越分野自婺女八度至危十六度曰𤣥枵之次一名天黿於辰在子今齊分野自危十七度至奎四度曰豕韋之次一名娵訾於辰在亥今衞分野自奎五度至胃六度曰降婁之次於辰在戌今魯分野自胃七度至畢十一度曰大梁之次於辰在酉今趙分野自畢十二度至東井十五度曰實沈之次於辰在申今晉魏分野自井十六度至柳八度曰鶉首之次於辰在未今秦分野自柳九度至張十七度曰鶉火之次於辰在午今周分野自張十八度至軫十一度曰鶉尾之次於辰在巳今楚分野自軫十二度至氐四度曰夀星之次於辰在辰今韓分野自氐五度至尾九度曰大火之次於辰在卯今宋分野自尾十度至斗七度百三十五分而終曰析木之次於辰在寅今燕分野凡天有十二次日月之所躔也地有十二分王侯之所國也故四方方七宿四七二十八宿合一百八十二星東方蒼龍三十二星七十五度北方𤣥武三十五星九十八度四分度之一西方白虎五十一星八十度南方朱雀六十四星百一十二度周天三百六十五度四分度之一分為十二次一次三十度三十二分度之十四各以附其七宿蕙田案後漢四分術冬至日在斗二十度竒以星紀中為冬至所居故前志三統術星紀初斗十二度者月令章句用四分術退在斗六度十二次並退六七度其名界適與古相近葢偶合也皇甫謐復用三統分十二次特以其在前疑為出于古耳自周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥梓慎禆竈史墨之徒専以是為知天道分野之說固有所従來然謂之星土分星則星為主而不主節氣明矣若十二次與節氣推移分野不據分星乃隨節氣而異古無是法以是㫁之必不可以節氣定十二次之名界也宋書志祖冲之曰臣以為辰極居中而列曜貞觀羣象殊體而隂陽區别故羽介咸陳則水火有位蒼素齊設則東西可準非以日之所在定其名號也何以明之夫陽爻初九氣始正北𤣥武七列虚當子位若圎儀辨方以日為主冬至所舍當在𤣥枵而今之南極乃處東維違體失中其義何附若南北以冬夏禀稱則卯酉以生殺定號豈得春躔義方秋麗仁域名舛理乖若此之反哉因兹以言固知天以列宿分方而不在於四時景緯環序日不獨守故轍矣次隨方名義合宿體分至雖遷而厥位不改蕙田案此論極精覈漢初未知嵗差故以節氣繫於十二次後漢賈逵知冬至日在斗不在牽牛猶未顯然㫁為嵗差也十二次名界轉隨冬至日所在而移嵗差之説肇自晉虞喜而祖冲之尤言之詳厥後十二次不隨節氣遷徙但變赤道十二次於黄道近二至度少近二分度多以勢有横有斜而生廣狹日躔某次為太陽過宫其十二次之界或據三統術或據月令章句損益其間均非定論無足載也右列宿十二次明史天文志十二宫之名見於爾雅大抵皆依星宿而定如婁奎為降婁心為大火朱鳥七宿為鶉首鶉尾之類故宫有一定之宿宿有常居之宫由來尚矣唐以後始用嵗差然亦天自為天嵗自為嵗宫與星仍舊不易西洋之法以中氣過宫如日躔冬至即為星紀宫之類而恒星既有嵗進之差於是宫無定宿而宿可以遞居各宫此變古法之大端也兹以崇禎元年各宿交宫之黄赤度分列于左方以志權輿云赤道交宫宿度箕三度零七分入星紀斗二十四度二十一分入𤣥枵危三度一十九分入娵訾壁一度二十六分入降婁婁六度二十八分入大梁昴八度三十九分入實沈觜一十一度一十七分入鶉首井二十九度五十三分入鶉火張六度五十一分入鶉尾翼一十九度三十二分入夀星亢一度五十分入大火心初度二十二分入析木黄道交宫宿度箕四度一十七分入星紀牛一度零六分入𤣥枵危一度四十七分入娵訾室一十一度四十分入降婁婁一度一十四分入大梁昴五度一十三分入實沈觜一十一度二十五分入鶉首井二十九度五十二分入鶉火星七度五十一分入鶉尾翼一十一度二十四分入夀星亢初度四十六分入大火房二度一十二分入析木戴氏震曰歐邏巴之法本之回回而回回法則本之中土漢時故中法有二十八宿彼亦二十八中法分十二次彼亦十二其中氣過宫者本漢人至其初為節至其中為中氣之法而互易之猶之午正以後為次日及經緯正交中交之名一一與古相反究之同一實耳中法後用嵗差節氣不復繫于星次是中法革而不用者彼猶仍之遂令十二次之名隨嵗差遷徙名與實爽中法知有嵗差則顯革之彼因而暗移其法于黄道中法即以節氣中氣為一嵗之界彼乃襲星次為界而不知其不可襲也梅氏疑文補問舊法太陽過宫與中氣不同今何以復合為一曰新法之測算精矣然其中不無可商當俟後來詳定者則此其一端也何則天上有十二宫宫各三十度毎嵗太陽以一中氣一節氣共行三十度如冬至小寒共行三十度大寒立春又共行三十度其餘並同滿二十四氣則十二宫行一周故術家恒言太陽一嵗周天也然而實考其度則一嵗日躔所行必稍有不足雖其所欠甚㣲約其差不過百分度之一有半積至年深遂差多度六七十年差一度六七百年即差十度是為嵗差術家所以有天周嵗周之名天上星辰勻分十二宫共三百六十度是為天周毎嵗太陽十二中氣共行三百六十度㣲弱是為嵗周漢人未知嵗差誤合為一故即以冬至日交星紀而定之於牽牛逮晉虞喜等始覺之五代宋何承天祖冲之隋劉焯等言之益詳顧治書者株守成説不敢輒用嵗差也至唐初傅仁均造戊寅元術始用嵗差而朝論多不以為然故李淳風麟徳術復去嵗差不用直至𤣥宗開元某年僧一行作大衍術乃始博徴廣證以大暢厥㫖於是分天自為天即周天十二次宫度其度終古不變嵗自為嵗即周嵗十二中氣日躔所行天度其度嵗嵗㣲移累代遵用所定嵗差年數㣲有不同而大致無異元世祖時用授時法郭守敬測定六十六年有八月而差一度回回泰西差法畧同今定為七十年差一度數亦非逺故冬至日一嵗日躔之度已週尚不能復於星紀之元度必再行若干日時而至星紀十二中氣皆同一理所以大陽過宫與中氣必不同日其法原無錯誤其理亦甚易知徐李諸公深於數術豈反不明斯事乃復合為一真不可解推原厥故葢譯西書時誤仍回回法太陽年之十二月名耳問回回法亦知嵗差何以誤用宫名為月名曰回回法既以十二個月為太隂年而用之嵗紀不用閏月然如是則四時之寒燠温凉錯亂無紀因别立太陽年以周嵗日躔勻分三百六十度又勻分為十二月以為耕歛之節而起算春分是亦事勢之不得不然堯典寅賔出日始於仲春即此一事亦足徴西法之本於羲和但彼以春分為太陽年之第一月第一日遂不得復用古人分至啟閉之法及春夏秋冬正名古者以立春立夏立秋立冬春立分秋分冬至夏至為八節其四並在四孟月之首以為四時之節謂之啟閉二分二至並在四仲月之中居春夏秋冬各九十一日之半皆自然之序不可移易今回回之太陽年既以春分為嵗首則是以仲春之後半月為正旦而割其前半個月以益孟春共四十五日竒遂一併移之於嵗終而孟春之前半改為十一月之後半孟春之後半合仲春之前半共三十日改為十二月即春夏秋冬之四時及分至啟閉之八節孟仲季之月名無一與之相應名不正則言不順遂不復可得而用矣故遂借白羊等十二宫以名其太陽年之月彼非不知天度有嵗差白羊不能板定於春分然以其時春分正在白羊姑借名之以紀月數即此而知回回初起時其年代去今非逺歐邏巴之法因回回而加精大致並同回法故遂亦因之耳徐文定公譯西書謂鎔西洋之精算入大統之型模則此處宜為改定使天自為天嵗自為嵗則嵗差之理明而天上星辰宫度各正其位矣如晝夜平即為二分晝極長即為夏至不必問其日躔是何宫度是之謂嵗自為嵗也必太陽行至降婁始命為日躔降婁之次太陽行至鶉首始命為日躔鶉首之次不必問其為春分後㡬日夏至後㡬日是之謂天自為天也顧乃因仍回回之宫名而以中氣日即為交宫之日則嵗周與天周復混而為一於是嵗差之理不明知星紀之次常有定度而冬至之日度漸移是生嵗差若冬至日即躔星紀嵗嵗相同安得復有嵗差而天上十二次宫度名實俱亂天上十二宫各有定星定度若隨節氣移動則名實俱左後篇詳之是故算法至今日推步之法已極詳明而不無有待商酌以求盡善者此其一端也江氏永曰天上十二宫當分為二有黄道十二宫有列宿天十二宫黄道十二宫亦三百六十度太陽一嵗周徧未嘗稍有不足較之列宿天似㣲欠者非太陽之不能周天也恒星自移而東耳新法之誤在去列宿十二宫専主黄道十二宫遂合兩為一且併星次之名而冒之勿菴謂誤仍回回太陽年之十二月名固是一説愚則謂别有其故太陽者衆曜之主也黄道者諸道之宗也一嵗寒暑進退皆由太陽行黄道使然則黄道上自有一定之宫不惟日與五星遊泊其間雖普天星宿亦循黄道而行閱萬餘年赤道外二十三度之星且移至赤道内二十三度則安得不以黄道為主星宿為客乎又曰論恒星之宗黄極循黄道則太陽為主恒星為客論七政之躔列宿則列宿又為主七政為客葢黄道之宫虛而列宿之次實也七政之天在下而恒星之天在上也則亦互為主客耳觀一嵗七政書不能虛紀宫度必以某宿某度記之則列宿豈不猶州縣而七政豈不猶人之行程乎分列宿之宫猶分天下之省直也若列宿天之宫界雖若難辨而中法與西法皆以虛六度為子半當必有所𫝊葢虛宿十度六度正當其半以此為正北而各宫之界皆可定矣梅氏疑問補問天上十二宫亦人取名今隨中氣而移亦何不可之有曰十二宫名雖人所為然其來久矣今考宫名皆依天上星宿而定非漫設者如南方七宿為朱鳥之象史記天官書柳為鳥注注即咮咮者朱鳥之喙也七星頸為員官頸朱鳥頸也員官嚨喉也張為素素即嗉鳥受食之處也翼為羽翮朱鳥之翼故名其宫曰鶉首鶉火鶉尾鶉即朱鳥乃鳯也東方七宿為蒼龍天官書東宫蒼龍房心心為明堂今案角二星象角故一名龍角氐房心象龍身心即其當心之處故心為明堂尾宿即龍之尾故其宫曰夀星封禪書武帝詔天下尊祀靈星正義靈星即龍星也張晏曰龍星左角曰天田則農祥也見而祀之曰大火心為大火曰析木一名析木之津以尾箕近天河也北方七宿為𤣥武天官書北宫𤣥武其宫曰星紀古以斗牛為列宿之首故星自此紀也曰𤣥枵枵者虚也即虛危也又象龜蛇為𤣥武也曰娵訾一名娵訾之口以室壁二宿各二星兩兩相對而形正方故象口也西方七宿為白虎天官書奎曰封豕參為白虎三星直者是為衡其外四星左右肩股也小三星隅置曰觜觽為虎首其宫曰降婁以婁宿得名也曰大梁曰實沈由是以觀十二宫名皆依星象而取非漫設也堯典日中星鳥以其時春分昏刻朱鳥七宿正在南方午地也日永星火以其時夏至初昏大火宫在正午也火即心宿宵中星虚以其時秋分昏中者𤣥枵宫也即虛危也日短星昴以其時冬至昏中者昴宿也即大梁宫也術家以嵗差考之堯甲辰至今已四千餘嵗嵗差之度已及二宫以西率七十年差一度約之凡差六十餘度然而天上二十八舍之星宿未嘗變動故其十二宫亦終古不變也若夫二十四節氣太陽躔度盡依嵗差之度而移則嵗嵗不同七十年即差一度亦據今西術推之安得以十二中氣即過宫乎試以近事徴之元世祖至元十七年辛巳冬至度在箕十度至今康熈五十八年己亥冬至在箕三度其差葢已將七度而即以箕三度交星紀宫則是至元辛巳之冬至宿箕十度已改為星紀宫之七度再一二百年則今己亥之冬至宿箕三度為星紀宫之初度者又即為星紀宫之第三度而尾宿且浸入星紀矣積而久之必將析木之宫尾箕盡變為星紀大火之宫氐房心盡變為析木而十二宫之星宿皆差一宫準上論之角亢必為大火翼軫必為夀星柳星張必為鶉尾井鬼必為鶉火而觜參為鶉首胃昴畢為實沈奎婁為大梁而娵訾為降婁虚危為娵訾斗牛為𤣥枵二十八宿皆差宫即十二宫之名與其宿一一相左又安用此名乎再積而久之至數千年後東宫蒼龍七宿悉變𤣥武嵗差至九十度時角亢氐尾心房箕必盡變為星紀𤣥枵娵訾並倣此南宫朱鳥七宿反為蒼龍西宫白虎七宿反為朱鳥北宫𤣥武七宿反為白虎國家頒朔授時以欽若昊天而使天上宿度宫名顛倒錯亂如此其可以不亟為釐定乎又試以西術之十二宫言之夫西洋分黄道上星為十二象雖與羲和之舊不同然亦皆依星象而名非漫設者如彼以積尸氣為巨蟹第一星葢因鬼宿四星而中央白氣有似蟹筐也所云天蝎者則以尾宿九星卷而曲其末二星相並如蝎尾之有岐也所云人馬者謂其所圗星象類人騎馬上之形也其餘如寶瓶如雙魚如白羊如金牛如隂陽如師子如雙女如天秤以彼之星圖觀之皆依稀彷彿有相似之象故因象立名今若因節氣而毎嵗移其宫度積而久之宫名與星象相離俱非其舊而名實盡淆矣西法言嵗差謂是黄道東行未嘗不是如今日鬼宿已全入大暑日躔之東在中法嵗差則是大暑日躔退回鬼宿之西也在西法則是鬼宿隨黄道東行而行過大暑日躔之東其理原非有二尾宿之行入小雪日躔東亦然夫既鬼宿已行過大暑東而猶以大暑日交鶉火之次則不得復為巨蟹之星而變為師子矣尾宿已行過小雪後而猶以小雪日交析木之次則尾宿不得為天蝎而變為人馬宫星矣即詢之西來知象之人有不啞然失笑者乎又曰周天列宿分十二宫古今之法各各迥異要其大端之改易有三自隋以前未用嵗差故天之十二宫皆隨氣而定如冬至日躔度即為丑初之類一也唐一行始定用嵗差分天自為天嵗自為嵗故冬至漸移而宫度不變以後術家遵用之所以明季言太陽過宫以雨水三朝過亥二也若今西法則未嘗不用嵗差而十二宫又復隨節氣而移三也三者之法未敢㫁其孰優然以平心論之則一行似勝何以言之葢既用嵗差則節氣之躔度年年不同故帝堯冬至日在虛而今在箕已差五十餘度若再積其差冬至必且在尾在心在氐房在角亢顧猶以冬至之故而名之曰丑宫則東方七宿不得為蒼龍而皆變𤣥武北方宿反為白虎西方宿反為朱鳥而南方朱鳥為蒼龍名實盡乖即西法之金牛白羊諸宫皆將易位非命名取象之初㫖即不如天自為天嵗自為嵗之為無弊矣故新法之推步實精而此等尚在可酌不無俟於後來之論定耳蕙田案十二宫之古今三變推論其故皆為失之未用嵗差以為日躔列宿天一嵗而周十二次無有不足失在混宿次與黄道為一葢日躔黄道雖適一周而宿次則有推移毎嵗㣲差也既用嵗差以為嵗周不及天周太陽之行一嵗猶有未滿亦失在混宿次與黄道為一葢差不在黄道乃宿次漸離黄道元處也西人知嵗差由列宿推移矣而又以中氣為太陽過宫襲列宿十二次之名以名黄道上十二宫失在名實相淆葢有宿次之名而不用其實有黄道十二宫之實而不能正其名也續文獻通考案星紀至析木十二宫名皆以二十八宿取義是宫本因星而定者也西法以太陽中氣過宫而恒星嵗差有東行之度於是星行遞進宫次遞遷以致名義不符論者以為變古法之大端由今考之爾雅夀星角亢等名與北極北辰並列葢皆所以釋星名與太陽節氣過宫無涉也前漢志云星紀初斗十二度大雪中牽牛初冬至葢宫次固以星名而初中非有定度當其時大雪日躔斗十二度冬至日躔牛初度故即命斗十二度為星紀初牛初度為星紀中耳後漢志注月令章句云周天分為十二次日至其初為節至其中為中氣自斗六度至須女二度謂之星紀之次大雪冬至居之則是後漢之時星已差東六度矣唐志日度議云古法日有常度天周為嵗終故係星度於節氣其說似是而非故久而益差虞喜覺之使天為天嵗為嵗宋志云自漢太初至今已差一氣有餘大約中氣前後乃得本月宫次又云説者不知嵗差之法以堯典校之月令逮於今日已不啻差一次求其説而不得遂以節氣有初中之殊失之逺矣由是觀之自漢至宋已差一氣有餘而自堯時至漢又不止差一氣則是星紀初大雪中冬至云者乃前漢時之適然而前古與後今皆不得合者也後漢差度無㡬故減星度以就宫唐以後差度漸逺節氣與星次既不得合故以天自為天嵗自為嵗然日有盈縮而節氣用平分星行黄道而紀宫以赤道則嵗與天猶非其真元授時黄道十二次皆比前漢少數度其度不均明大統因之而𢎞治間日躔過宫乃在中氣後三日至十二日不等葢日行有盈縮黄道有斜正故交宫之日度多寡不同若積之又久則交宫將過次月節而交宫之宿度又不可用則其黄道十二次亦未可為定率也西法之興始於多禄某於中國為漢順帝時其以中氣過宫亦與漢之節氣過宫正等葢當其時交宫已近中氣故又移中氣之星度以就宫而分至為黄赤起算之端則以中氣過宫尤為整齊簡要但當時中氣所差之度未及一宿而至今則所差之宿已過一宫故論者每致辯於名義之不符然欲不以中氣過宫而仍係宫於星則又有不可者葢古法惟有宿度故交節與過宫兩不相妨今法有經度又有宿度宫可以不係於宿而經度不可不係於官此其立法之不同而不可以强合者也今案天有九重宗動天以赤極為樞挈恒星以内八重天左旋一日一周恒星以内八重天又同以黄極為樞而各有右旋之度節氣過宫太陽天也列宿嵗差恒星天也日與恒星既各居一重天則日天與恒星天宜各有十二次合之則名義不符分之則日星各正然則太陽冬至宜直曰入丑宫或曰初宫不必曰星紀之次大寒宜直曰入子宫或曰一宫不必曰𤣥枵之次十二氣莫不皆然則節氣在太陽天有常度而不紊於恒星是乃嵗自為嵗也其嵗差之度不曰恒星東行而曰恒星天右旋葢以恒星為東行故宫有定而星無定且星惟當黄道者其東行為大圈若在黄道南北者其東行則皆距等圈凡日月星在天之行皆係大圈無有行距等圈之理隋天文志葛洪云茍辰宿不麗於天天為無用便可言無何必復曰有之而不動今曰恒星天右旋則天行為大圈星與宫在恒星天皆有常位而不紊於節氣是乃天自為天也至於列宿之在天前漢以斗十二度起星紀初最為近古其宿分亦適均惟以今之實測黄道宿度均布於十二宫而以今之律元冬至日躔不及斗十二度之差為星紀初距冬至之應與日躔宫度相減再減律元後之嵗差即日天當恒星天之度也如此則日躔猶是宿度亦猶是而前古後今皆合論定者當有所折衷矣蕙田案列宿亦循黄道而宗黄極然列宿之天逺太陽之天近逺近分而行度遂殊葢黄極毎晝夜環繞赤極一周而又過一度古度法太陽與列宿並隨極之左旋而俱左是毎晝夜皆一周而過一度也然二者又有迴環右轉之機列宿逺左旋勢𦂳而右轉甚緩其差㡬於不覺太陽近左旋勢舒而右轉少疾其差則及一度因差一度而晝夜由是成乃以太陽為中數故黄極為過一度也以是言之列宿左旋雖過於太陽而不及黄極故黄極毎晝夜左旋過一度者至一嵗而適足一周天列宿毎晝夜左旋㡬過一度至一嵗而未及一周天以成嵗差太陽之毎日右轉則與黄極之左旋相應而相差一度故黄極左一周太陽則右一周適足此在天之實理太虚之度日躔適足列宿有差謂日躔稍有不足者非也唐一行分天自為天嵗自為嵗其云天者指列宿之天耳若太虛之天周日躔一嵗適足嵗與天本合為一當曰列宿自為列宿嵗自為嵗又曰天自為天列宿自為列宿如是則分合不致錯誤又併嵗差之名改之曰列宿差或曰恒星差然後考太陽過宫所過者太虚中之十二宫非列宿之十二次太陽過宫主乎黄道均分黄道為十二宫其宫逆布起冬至最南是為第一宫之初大寒過第二宫雨水過第三宫春分交於赤道是為第四宫之初穀雨過第五宫小滿過第六宫夏至最北是為第七宫之初大暑過第八宫處暑過第九宫秋分交於赤道是為第十宫之初霜降過第十一宫小雪過第十二宫冬至復於一宫自冬至嚮夏至為歛自夏至嚮冬至為發二至發歛所極二分發歛之中寒往暑來悉準乎是終古不變者也故曰太虛之度日躔適足太虛中之十二宫既辨乃可考列宿差唐虞時虛宿冬至值黄道第一宫之初今則值第二宫之末唐虞時昴宿春分值黄道第四宫之初今則值第五宫之末而近胃昴諸星自赤道外漸移在赤道内矣唐虞時七星夏至值黄道第七宫之初今則值第八宫之末唐虞時氐宿秋分值第十宫之初今則值第十一宫之末而近氐房諸星自赤道内漸移至赤道外矣故曰太虛之度列宿有差祖冲之有云次隨星名義合宿體分至雖遷而厥位不改西人誤以星次之名用之於黄道十二宫於是冬至日在箕而曰星紀夏至日在參而曰鶉首使列宿離次名與實爽梅氏欲為改定甚當葢西人雖襲十二次之名而實暗移之於黄道固不如各正其名使黄道自為黄道列宿自為列宿也又案列宿十二次古法用之黄道十二宫今法用之宿次仰觀即覩易以明民而黄道之宫究隠而難顯又左旋右轉時刻變動欲言其宫度徒空言之曰某宫某度而已試問在天何所則已不能定指此古人所以不用而止用星次也况嵗差之法每嵗僅差七十分之一毎日躔一宫僅差八百四十分之一是的指一宿度為分至及各節氣日躔其所差固不多也若以入算更減所差之㣲則益宻矣此今所以雖用黄道十二宫而不能不用宿度記日月五星所在也觀承案十二宫次本以列宿之次得名今測得列宿東移則宫次漸離其所而名實混矣不知列宿之行有移而太虛之天不改太虛之度難分而太陽之周適足故當直以十二辰名其宫則日天與太虛天自合而列宿之差見矣但太虛既已無形則其度不可得而紀故仍以宿度紀其日月五星之所在則名實既不相混而今昔之差數可分也此論可謂剖析㣲茫之至蕙田案以上論日躔交宫不當襲宿次之名右周天十二宫次五禮通考卷一百八十二
