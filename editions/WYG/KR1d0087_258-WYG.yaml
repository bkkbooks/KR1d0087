body:
  text: 五禮通考卷二百四十八刑部尚書秦􅈍田撰凶禮三荒禮後漢書順帝本紀永建三年春正月丙子京師地震漢陽地陷裂甲午詔實覈傷害者賜年七嵗以上錢人二千魏書宣武帝本紀延昌二年夏四月庚子以絹十五萬匹賑恤河南郡饑民冊府元龜武徳二年閏二月出庫物三萬段以賑窮乏永貞元年十一月以久雨京師鹽貴出庫鹽一萬石以恵饑民長慶二年十二月命以絹二百疋賑京師東市西市窮乏者荒政考略宋天聖七年詔曰河北大水壊澶州浮橋其被災之民見存三口者給錢二千不及者半之宋史仁宗本紀景祐四年八月越州水賜被溺民家錢有差慶歴四年二月出奉宸庫銀三萬兩振陜西饑民嘉祐元年七月出内藏銀絹三十萬振貸河北哲宗本紀紹聖二年二月出内庫錢帛二十萬助河北振饑孝宗本紀乾道四年七月以經總制餘剰錢二十一萬緡樁留卭蜀州以備振濟王圻續通考嘉定七年出内帑錢賑臨安府貧民紹定四年詔出封樁庫緡錢三十萬賑臨安貧民嘉熈元年五月詔出内庫緡錢二十萬給被災之家淳祐二年詔出封樁庫十七界楮幣十萬賑贍紹興處婺水澇之民宋史度宗本紀咸淳元年閏五月久雨發錢二十萬賑在京小民遼史道宗本紀大安二年七月賜興聖積慶二宫貧民錢三年四月賜中京貧民帛賜威烏爾古部貧民帛七月出雜帛賜興聖宫貧民夀隆六年二月出絹賜五院貧民金史章宗本紀泰和五年十一月山東闕食賜錢三萬貫以振之元史食貨志中統三年七月以課銀一百五十錠濟甘州貧民至元二年以鈔百定賑庫庫楚所部軍二十年以帛千疋鈔三百定賑碩達勒達地貧民二十四年鄂端民饑賑鈔萬定大德七年以鈔萬定賑歸德饑民王圻續通考洪武二十五年令山東災傷去處每戸給鈔五定明㑹典嘉靖元年令將太倉銀庫見貯銀兩差官秤盤二十萬兩運赴陜西蝗旱地方支用二年令將滸墅鈔闗收貯嘉靖元年秋冬二季二年春夏二季共四季銀兩照數查取在官類解南直𨽻巡撫衙門相兼原查餘鹽等銀通融賑濟災傷地方又令將湖廣正德十四年起至嘉靖二年止解京銀三萬五千兩給發賑濟荆州府荆門石首等州縣旱災又令將嘉靖三年分净樂宫庫藏查盤節年所積香錢暫支二千兩賑濟湖廣地方旱災王圻續通考嘉靖三十四年歳祲詔發内帑銀三萬兩賑濟饑民隆慶元年六月以霖雨壞民廬舎令五城御史以房號錢巡按御史以贓罰銀分賑之貧者每戸給銀五錢次三錢仍諭都察院左都御史王廷等督御史嚴加稽察使貧民得沾實惠二年七月詔戸部發太倉銀二萬兩遣于災重處亟行賑濟三年十月兩淮巡鹽御史李學詩以鹽場水災請扣留商人正鹽納銀每引一分挑河銀二萬兩賑恤竈丁從之蕙田案以上賑銀鈔絹帛諸物漢書元帝本紀初元二年七月詔曰歳比災害民有菜色慘怛于心已詔吏虛倉廪開府庫振救魏書明元帝本紀神瑞二年十月詔曰頃者以來頻遇霜旱年穀不登百姓饑寒不能自存者甚衆其出布帛倉穀以賑貧窮冊府元龜唐貞觀十一年七月詔以水災其雒州諸縣百姓漂失資産乏絶糧食者宜令使人與之相知量以義倉賑給庚子賜遭水旱之家帛十五匹半毁者八匹舊唐書徳宗本紀貞元十八年秋七月蔡申光三州春水夏旱賜帛五萬段米十萬石鹽三千石宋史仁宗本紀天聖五年七月振秦州水災賜被溺家錢米嘉祐元年七月賜河北流民米壓溺死者賜其家錢有差曾鞏救災議河北地震水災隳城郭壞廬舎百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患于暴露非錢不可以立屋廬患于乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞于上使者旁午于下無以救其患塞其求也有司建言請發倉廪與之粟壯者人日二升㓜者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見于衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廪于上則其𫝑必不暇乎他為使農不復得修其畎畝商不復得治其貨賄工不復得利其器用閒民不復得轉移執事一切棄百事而專意于待升合之食以偷爲性命之計是直以餓殍之飬飬之而已非深思逺慮爲百姓長計也以中戸計之戸爲十人壯者六人月當受粟三石六斗㓜者四人月當受粟一石二斗率一戸月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來歳麥熟之時未可以罷自今至于來歳麥熟凡十月一戸當受粟五十石今被災者十餘州州以二萬戸計之中戸以上及非災害所被不仰食縣官者去其半則仰食縣官者爲十萬戸食之不徧則爲施不均而民猶有無告者也食之徧則當用粟五百萬石而足何以辦此又非深思逺慮爲公家長計也至于給授之際有淹速有均否有真僞有㑹集之擾有辨察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其于屋廬搆築之費將安取哉屋廬搆築之費既無所取而就食于州縣必相率而去其故居雖有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺馬牛而去者有之伐桑􅀥而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如是不可止則將空近塞之地空近塞之地則失戰闘之民此衆士大夫之所慮而不可謂無患者也空近塞之地則失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰闘之民異時有警邊戍不可以不増爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出于無聊之計有窺倉庫盜一􅌩之粟一束之帛者彼知己負有司之禁則必鳥駭䑕竄竊弄鋤梃于草茅之中以扞游徼之吏强者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能宴然而已乎况夫外有夷狄之可慮内有郊社之將行安得不防之于未然銷之于未萌也然則爲今之䇿下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則令被災之州爲十萬戸如一戸得粟十石得錢五千下戸常産之資平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用閒民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廪于上而𫝑不暇乎他爲豈不逺哉此可謂深思逺慮爲百姓長計者也由有司之説則用十月之費爲粟五百萬石由今之説則用兩月之費爲粟一百萬石况貸之于今而收之于後足以振其艱乏而終無損于儲峙之實所實費者錢五鉅萬貫而已此可爲深思逺慮爲公家長計者也又無給授之弊疾癘之憂民不必去其故居苟有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失况于全牛馬保桑􅀥其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則𫝑不暇乎他爲雖驅之不去誘之不爲盜矣夫饑歳聚餓殍之民而與之升合之食無益于救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安于畎畝之中負錢與粟而歸與父母妻子脱于流亡轉死之禍則戴上之施而懷欲報之心豈有已哉不早出此或至于一有枹鼓之警則雖欲爲之將不及矣且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望今有司于糴粟常價斗増一二十錢非獨足以利農其于増糴一百萬石易矣斗増一二十錢吾權一時之事有以爲之耳以實錢給其常價以茶荈香藥之類佐其虛估不過損茶荈香藥之類爲錢數鉅萬貫而其費已足茶荈香藥之類與百姓之命孰爲可惜不待議而可知者也夫費錢五鉅萬貫又捐茶荈香藥之類爲錢數鉅萬貫而足以救一時之患爲天下之計利害輕重又非難明者顧吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉丘氏濬曰曽鞏此議所謂賜之錢貸之粟比之有司日逐給粟之説其為利病相去甚逺所謂深思逺慮以為百姓長計者真誠有之但饑民一戸貸之米十石一旦責其如數償之難矣不若因時量力稍有力者償其半無力者併與之或立為次第之限可也文獻通考元祐六年翰林學士承㫖知杭州蘇軾言浙西二年諸郡災傷今歳大水蘇湖常三州水通爲一杭州民死者五十餘萬蘇州三十萬未數他郡今既秋田不種正使來歳豐稔亦須七月方見新穀變故未易度量乞令轉運司約度諸郡合糶米斛數目下諸路封樁及年計上供赴浙西諸郡糶賣詔賜米百萬斛錢二十餘萬緡賑濟災傷宋史哲宗本紀元祐八年十二月出錢粟十萬賑流民食貨志紹興三十一年正月雪寒民多艱食詔臨安府城内外貧乏之家人給錢二百米一斗及柴炭錢並于内藏給之輔郡之民令諸州以常平錢依臨安府振之王圻續通考乾道四年降僧牒一百道付建寧府戸部降米五千石賑衢州饑荆南府僧牒二百道衢州一百道饒信米各三萬石雷州水賜十道詔諸路運司行下所屬將災傷處各選清强官遍詣地頭盡行檢放或不實不盡有􅃜公私被差官并所差不當官司並重作行遣其被水甚處令監司守臣條具合措置存恤事件聞奏知温州趙與可以支常平錢五百貫并係省錢五百貫賑給被災人戸自劾上曰國家積常平米正爲此也可赦罪宋史孝宗本紀淳熈十四年八月賜度牒一百道米四萬五千石備振紹興府饑王圻續通考寳慶元年滁州大水詔撥㑹子三千緡米千六百石賑恤被災之家紹定三年浙東大水汪綱發粟三萬八千餘緡錢五萬賑給之景定二年十月詔物價未平出封樁庫楮幣二十萬賑二衛諸軍出豐儲倉米五萬石賑都民遼史道宗本紀太康元年九月以南京饑出錢粟賑之大安三年正月出錢粟振南京貧民元史食貨志中統四年以錢糧幣帛賑東平濟河貧民鈔四千錠賑諸王濟必特穆爾部貧民大德十一年以饑賑安州髙陽等縣糧五千石漷州穀一萬石奉符等處鈔二千定兩浙江東等處鈔三萬餘定糧二十萬餘石又勸率富戸賑糶糧一百四十餘萬石凡施米者騐其數之多寡而授以院務等官是年又以鈔一十四萬七千餘定鹽引五千道糧三十萬石賑紹與慶元台州三路饑民自延祐之後腹裏江南饑民歳加賑恤其所賑或以糧或以鹽引或以鈔蕙田案元史本紀所載賑恤之事無歳無之不能悉載其大要已該于數言矣明㑹典成化二年奏准今後若有侵欺賑濟銀糧或將官銀假以煎銷均散爲名􅁍乃揷和銅鉛給與貧民者一體解京發落王圻續通考嘉靖二年南北二京及山東河南湖廣江西俱旱災戸部孫交請留蘇松折兑銀粳白米兩浙鹽價滸墅闗鈔課應天缺官薪皂贖鍰兼賑又請發太倉銀二十萬折漕米九十萬徃賑從之明㑹典嘉靖五年奏准湖廣地方災傷將合屬各預備倉原積穀米雜糧八十二萬石銀四萬兩并太和山嘉靖四年五年分香錢銀兩見在實數十分内摘取六分酌量輕重賑濟七年奏准河南災荒將所屬庫貯各項錢糧動支及准留攺折兊軍米十萬石賑濟被災府分饑民又諭巡撫官督令司府州縣等官將極貧人戸先儘見在倉糧量爲給賑若有不敷將各項官銀給發蕙田案以上銀米兼賑禮記檀弓公叔文子卒其子戍請諡於君君曰昔者衛國凶饑夫子爲粥與國之餓者是不亦惠乎齊大饑黔敖爲食於路以待餓者而食之有餓者䝉􅃑輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至于斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食後漢書獻帝本紀興平元年七月三輔大旱自四月至于是月帝避正殿請雨是歳穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為饑人作糜粥經日而死者無數帝疑賦䘏有虛乃親于御座前量試作糜乃知非實使侍中劉艾出讓有司于是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟魏書孝文帝本紀太和七年三月以冀定二州民饑詔郡縣爲粥于路以食之六月定州上言爲粥給饑人所活九十四萬七千餘口九月冀州上言爲粥給饑民所活七十五萬一千七百餘口食貨志太和十一年大旱京都民饑加以牛疫公私闕乏時有馬驢及橐駝供駕輓耕載詔聽民就豐行者十五六道路給糧禀至所在三長贍飬之遣使者時省察焉留業者皆令主司審覈開倉賑貸其有特不自存者悉檢集爲粥于街衢以救其困然主者不明牧察郊甸間甚多餧死者薛安都傳安都從祖弟真度爲豫州刺史景明初豫州大饑真度表曰去歳不收饑饉十五今又災雪三尺民人萎餒無以濟之臣輙日别出州倉米五十斛爲粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯䘏陳郡儲粟雖復不多亦可分贍尚書量賑以聞冊府元龜唐乾元三年二月以米貴斗至五百文多餓死令中使于西市煮粥以飼餓者後周顯德四年三月命供奉官田處嵓梁希進等于夀州城内煮粥以救饑民六年三月楚州上言詔准煮粥以救饑民宋史太祖本紀建隆元年夏四月乙酉遣使分詣京城門賜饑民粥真宗本紀大中祥符六年四月詔淮南給饑民粥麥登乃止天禧元年三月令作淖糜濟懷衛流民二年二月遣使諭京東官吏安撫饑民又命諸路振以淖糜仁宗本紀景祐元年正月詔開封府界諸縣作糜粥以濟饑民諸災傷州軍亦如之嘉祐四年正月遣官分行畿縣委令佐爲糜粥濟饑神宗本紀熈寧八年正月洮西安撫司以歳旱請爲粥以食羌戸饑者程頤賑濟論不制民之産無儲蓄之備饑而後發廪以食之廪有竭而饑者不可勝濟也今不暇論其本且救目前之死亡惟有節則所及者廣常見今時州縣濟饑之法或給之米豆或食之粥飯來者與之不復有辨中雖欲辨之亦不能也穀貴之時何人不願得食倉廪既竭則殍死者在前無以救之矣數年前一親戚爲郡守愛恤之心可謂至矣雞鳴而起親視俵散官吏後至者必責怒之于是流民歌詠至者日衆未幾穀盡殍者滿道愚嘗憐其用心而嗤其不善處事救饑者使之免死而已非欲其豐肥也當擇寛廣之處宿戒使晨入至已則闔門不納午而後與之食申而出之給米者午即出日得一食則不死矣其力自能營一食者皆不來矣比之不擇而與者當活數倍之多也凡濟饑當分兩處擇羸弱者作稀粥早晚兩給勿使至飽俟氣稍完然後一給第一先營廣居處切不得令相枕藉如作粥須官員親嘗恐生及入石􅁅不給浮浪無此理也平日當禁游惰至其饑餓哀矜之一也宋史孝宗本紀淳熈八年十一月再詔臨安府爲粥食饑民金史章宗本紀承安二年冬十月大雪以米千石賜普濟院令爲粥以食貧民四年冬十月敕京府州縣設普濟院每歳十月至明年四月設粥以食貧民泰和五年三月命給米諸寺自十月十五日至次年正月十五日作糜以食貧民廣治平畧嘉靖元年南京兵部侍郎席書言南畿民饑殊甚考古荒政可行于今日者惟作粥一法不煩審戸不待防奸至簡至要可以舉行而世俗咸謂不便蓋縁曽有舉于一城不知散布諸縣以致四逺饑民聞風併集主者𫝑不能給致民相聚而死遂謂此法難行臣今總計南畿作粥江南北可四十二州縣大都大縣設粥十二所中縣減三之一小減十之五諸所設粥處約日並舉凡以饑來者無論本處鄰境軍民男女老㓜戸口多寡均粥給濟起今十一月半抵麥熟止計用米不過十六萬石可活人二十餘萬取用有數未至太靡賑恤有等不至虛費此法一行垂死之人晨得而暮起其效甚速其功甚大戸部覆此法不特宜于南畿宜通行天下災荒處所一體施行江南通志神宗十六年吳中大荒發大僕寺馬價及南京戸部銀共三十萬兩命戸科楊文舉賑濟有司各處設厰煮粥賑饑王圻續通考賑貸羣議議煮粥蓋凶荒時人民流徙饑餒疾病扶老挈㓜驅之不前緩之則斃資之錢幣則價踴而難糴散之菽粟則廪歉人衆而難遍惟煮粥庶可救燃眉然舉行固自有法蓋處之宜廣不宜隘舉之宜同不宜異令行宜嚴不宜寛食之口宜散不宜聚授之餐宜遍不宜頻是在賢守令善行之而已蕙田案以上賑粥漢書昭帝本紀始元二年三月遣使者振貸貧民毋種食者八月詔曰徃年災害多今年􅁞麥傷所振貸種食勿收責宣帝本紀地節三年冬十月詔流民還歸者假公田貸種食元帝本紀初元元年三月以三輔太常郡國公田及苑可省者振業貧民貲不滿千錢者賦貸種食後漢書和帝本紀永元十二年二月詔貸被災諸郡民種糧十六年正月詔貧民有田業而以匱乏不能自農者貸種糧四月遣三府掾分行四州貧民無以耕者爲雇犂牛直安帝本紀永初三年七月詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉順帝本紀陽嘉二年二月詔以吳郡㑹稽饑荒貸人種糧宋史文帝本紀元嘉二十年諸州郡水旱傷稼民大饑遣使給賜糧種二十一年正月尤弊之處遣使就郡縣隨宜賑䘏凡欲附農而種糧匱乏者並加給貸二十九年正月詔曰經㓂六州居業未能仍值災澇饑困薦臻可速符諸鎮優量救䘏今農事行興務盡地利若須田種隨宜給之孝武帝本紀大明二年正月詔曰去歳東土多經水災春務已及宜加優課糧種所須以時貸給七年九月詔曰近炎精亢序苗稼多傷今二麥未晚甘澤頻降可下東境郡勤課墾殖尤弊之家量貸麥種冊府元龜唐貞觀二十一年十月絳陜二州旱詔令賑貸湖州給貸種食二十二年瀘州交州越州渝州徐州水戎州䑕傷稼開州萬州旱通州秋蝗損稼並賑貸種食舊唐書𤣥宗本紀開元二十二年正月懷衛邢相等五州乏糧遣中書舎人裴敦復巡問量給種子冊府元龜天寳十四載正月以歳饑乏故詔天下府縣百姓去載有損交不支濟者仰所由審勘責除有倉糧之外仍便據籍地頃畝量與種子京兆府及華陽馮翊扶風等郡既是近輔須别優矜雖非損戸或有乏少種子者亦仰每鄉量宜准給貞元元年二月詔曰諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其産業以所進牛均平給賜其有田五十畝以下人不在給限給事中𡊮高奏曰聖慈所憂切在貧下百姓有田不滿五十畝者尤是貧人請量三兩戸共給牛一頭以濟農事從之是時蝗旱之後牛多疫死諸道節度韋臯李叔明等咸進耕牛故有是命四年正月詔曰諸州遭水旱委長吏貸種六年七月以麥不登賜京兆府種五萬石舊唐書徳宗本紀貞元十九年七月貸京畿民麥種敬宗本紀寳歴元年十二月敕農功所切實在耕牛疲氓多乏須議給賜委度支徃河東振武靈夏等州市耕牛一萬頭分給畿内貧下百姓冊府元龜太和三年七月齊徳州奏百姓自用兵已來流移十分只有二分伏乞賜麥種耕牛等敕量賜麥三千石牛五百頭共給綾一萬疋充價值仍各委本州自以側近市糴分給後唐長興三年宋亳潁三州水災尤甚樞宻使范延光趙延夀從容奏曰今秋宋亳潁等州水災甚民戸流亡粟價暴貴臣等量欲與本州官倉斛㪷依如今時估出糶以救貧民大水之後頗宜宿麥窮民不便種子亦望本州據民戸等第支借麥種自十石至三石候來年收麥據原借數納官從之宋史真宗本紀大中祥符元年正月幽州旱求市麥種許之五年五月江淮兩浙旱給占城稻種教民種之食貨志帝以江淮兩浙稍旱即水田不登遣使就福建取占城稻三萬斛分給三路爲種擇民田髙仰者蒔之蓋早稻也内出種法命轉運使揭榜示民天禧元年諸路蝗民饑鎮戎軍風雹害稼詔貸其種糧二年三月先貸貧民糧種止勿收四年三月以淄州民饑貸牛種仁宗本紀天聖六年四月貸河北流民復業者種食皇祐元年正月詔以緡錢二十萬市穀種分給河北貧民嘉祐元年七月貸被水災民麥種髙宗本紀建炎二年正月録兩河流亡吏士沿河給流民官田牛種紹興十八年十一月借給被災農民春耕費孝宗本紀淳熈三年正月振淮東饑仍命貸貧民種八年五月以久雨貸貧民稻種錢九年正月詔江浙兩淮旱傷州縣貸民稻種計度不足者貸以樁積錢朱子乞給借稻種狀本司凖淳熈九年正月二十日尚書省劄子勘㑹春耕是時深慮江浙兩淮州縣去歳旱傷之後貧民下戸并流移歸業之人艱得稻種􅁍致妨廢農務理宜措置正月十九日三省同奉聖㫖令逐路轉運提舉司疾速行下去歳旱傷州縣多方措置稻種勘量給借務令及時布種候豐熟􅁍行拘還具已借支數目聞奏仍多出文榜曉諭本司照對紹興府去歳旱傷爲甚衢婺州爲次遂那撥錢發下紹興府及下衢婺兩州諸縣㳟禀聖㫖指揮措置給借并鏤版曉諭人戸通知先據婺州申本州鄉俗體例並是田主之家給借今措置欲依鄉俗體例各請田主每一石地借與租戸種穀三升應副及時布種候收成日帶還不得因而收息如有少欠官司專與催理不同尋常債負已下諸縣從此施行蕙田案此令田主出穀種貸租戸至收成之日官爲催還朱子提舉浙東日於衢婺二州行之寧宗本紀嘉定二年七月命兩淮轉運司給諸州民麥種十月命兩淮轉運司給諸路民稻種食貨志嘉定八年左司諫黄序奏雨澤愆期地多荒白知餘杭縣趙師恕請勸民雜種麻粟豆麥之屬蓋種稻則費少利多雜種則勞多𫉬少慮收成之日田主欲分官課責輸則非徒無益若使之從便雜種多寡皆爲己有則不勸而勤民可無饑望如所陳下兩浙兩淮江東西等路凡有耕種失時者並令雜種主毋分其地利官無取其秋苗庶幾農民得以續食官免振救之費從之蕙田案水旱之後播種失時惟廣種雜糧稍可𫉬利而又縣官不徴其課田主不責其租庶凋瘵之民不致甚失所此當籌畫于既荒之後者也理宗本紀嘉熈二年三月詔四川帥臣招集流民復業給種與牛優與振贍遼史食貨志開泰元年詔曰朕惟百姓徭役煩重則多給工價田園蕪廢者則給牛種以助之金史宣宗本紀興定元年四月單州雨雹傷稼詔遣官勸諭農民改蒔秋田官給其種五月延州原武縣雨雹傷稼詔官貸民種改蒔元史世祖本紀至元四年七月詔額齊訥新附貧民給牛具種實及糧食二十二年十月都䕶府言哈喇和卓民饑戸給牛二頭種二石二十三年十二月遣布察濟貧民墾甘肅閒田官給牛種農具明㑹典嘉靖三十八年令發太倉銀六萬兩賑薊遼饑荒另發銀五萬兩以給牛種蕙田案以上貸穀種及牛具又案説文振舉救也賑富也振賑二字義訓不同後世以賑字代振救之振失其義矣凡以物救人之急皆謂之振救災之法給以錢粟而不責其償則曰振濟先給之而後徴之則曰振貸以粟減直出糶以利民則曰振糶其濟之貸之也或以米或以銀錢或以絹帛鹽鈔諸物或以粥或以耔種牛具列代史書所載其法具在分類比附俾言荒政者有所考其但云振恤振給而不著其振之法者不能備載云通典元嘉中三吳水潦穀貴人饑彭城王義康立議以東土災荒人凋穀踊富商蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆敕使糴貨爲制平價此所謂常道行于百代權宜用于一時也周書武帝本紀建徳三年正月詔以徃歳年穀不登民多乏絶令公卿道俗凡有貯積粟麥者皆准口聽留以外盡糶舊唐書高宗本紀永徽六年八月大雨道路不通京師米價暴貴出倉粟糶之永隆元年十一月洛州饑減價出糶以救饑人冊府元龜開元二年閏二月十八日敕年歳不稔有無須通所在州縣不得閉糴各令當處長吏簡較十二年八月詔曰蒲同兩州自春偏旱慮至來歳貧下少糧宜令太原倉出十五萬石米付蒲州永豐倉出十五萬石米付同州減時價十錢糶與百姓舊唐書𤣥宗本紀天寳十二載八月京城霖雨米貴令出太倉米十萬石減價糶與貧人十三載秋霖雨積六十餘日京城垣屋頽壞殆盡物價暴貴人多乏食令出太倉米一百萬石開十塲賤糶以濟貧民冊府元龜天寳十四載正月詔曰豐熟已來歳時頗久爰自二載稍異有年粟麥之間或聞未贍此開倉賤糶以濟時須雖且得支持而價未全減今更出倉務令家給俾其樂業式副朕心宜于太倉出糶一百萬石分付京兆府與諸縣糶每斗減于時價十文河南府畿縣出三十萬石太原府出三十萬石滎陽臨汝等郡各出粟二十萬石河内郡出米十萬石陜郡出米二萬石并每斗減時價十文糶與當處百姓應縁開場差官分配多少一時各委府郡縣長官處置乃令採訪使各自勾當其太倉含嘉出粟兼令監倉使與府縣計㑹處分其奉先同官華原等縣與中部郡地近宜准諸縣例數便于中部請受其餘縣有司者仰准此舊唐書代宗本紀大歴四年八月丙申朔自夏四月連雨至此月京城米斗八百文官出米二萬石減估而糶以惠貧民冊府元龜興元元年十月詔曰歴河朔而至太原自淮沂而被雒汭蟲螟爲害雨澤愆時其宋亳淄青澤潞河東常冀幽州易定魏博等八節度管内各賜米五萬石河陽東都畿二節度管内各賜三萬石所司即搬運于楚州分付各委本道領受賑給將士百姓江淮之間連歳豐稔迫于供賦頗亦傷農收其有餘濟彼不足宜令度支于淮南浙江東西道加價和糴米三五十萬石差官搬運于諸道減價出糶貴從權便以利于人蕙田案平糴之法始于李悝蓋因穀賤而取之穀貴而出之取有餘補不足使農民交利而已軍國之用未嘗仰給于此也唐開元以後始有和糴之名大抵取以充他用不復爲凶荒平糶之計矣其始也官出錢民出穀彼此交易兩得其便民無科抑之累官有儲蓄之利故云和糴及其弊也善價不及鄉閭美利皆歸司局配戸勒限甚于税賦此白居易有和糴有害無利之疏也宋時飬兵之費愈増備邊之計愈亟於是和糴結糴俵糴均糴博糴兊糴括糴之名目亦愈繁然穀之糴于官者多則藏于民者必少一有凶歉即無以接濟而官吏抑配括索之弊又有不可勝言者故和糴之舉特籌國用之一法而未必便于農也德宗此詔以江淮和糴之米運至諸道減價出糶得周禮通財之意故特録之而附論其利弊如此貞元九年正月詔曰分災救患法有常䂓通商惠人國之令典自今宜令州府不得輙有閉糴仍委鹽鐡使及觀察使訪察聞奏十四年六月詔曰訪聞蒸庶之間米價稍貴念兹貧乏每用憂懐苟利于人所宜通濟今令度支出官米十萬石于街東西各五萬石每斗賤較時價糶與百姓七月令賑給京兆府百姓麥種二萬石舊唐書徳宗本紀貞元十四年十月以歳凶穀貴出太倉粟三十萬石開塲糶以惠民十二月出東都含嘉倉粟七萬石開塲糶以惠河南饑民十五年二月出太倉粟十八萬石糶京畿諸縣食貨志元和九年四月詔出太倉粟七十萬石開六塲糶之并賑貸外縣百姓至秋熟徴納便于外縣收貯以防水旱十二年四月詔出粟二十五萬石分兩街降估出糶穆宗本紀長慶二年閏十月詔江淮諸州旱損頗多所在米價不免踴貴眷言疲困須議優矜宜委淮南浙西東宣歙江西福建等道觀察使各于當道有水旱處取常平義倉斛㪷據時估減半價出糶以惠貧民冊府元龜長慶四年二月詔如聞京城米穀翔貴百姓乏食者多夏麥未登須有救恤宜出太倉陳粟四十萬石委度支京兆府類㑹減時價于東西街置塲出糶其價錢仍司府收貯至秋收糴七月敕近日訪聞京城米價稍貴須有通變以便公私宜令戸部應給百官俸料其中一半合給疋段者逥給官中所糴粟每斗折錢五十文其疋段委别收貯至冬糴粟填納太倉時人以爲甚便蕙田案此官俸折米之始太和六年二月戸部侍郎庾敬休奏兩州米價騰貴百姓流亡至多請糴兩州闕宫職田禄米以救貧人從之八年九月詔江淮浙西等道仍歳水潦遣殿中侍御史任畹馳徃慰勞以比年賑貸多爲奸吏所欺徒有其名惠不及下宜委所在長吏以軍州自貯官倉米減一半價出糶各給貧弱如無貯蓄處即以常平義倉米出糶又詔諸道有饑疫處軍糧蓄積之外其屬度支户部雜穀並令減價以出糶濟貧人開成元年十二月鹽鐡轉運使奏據江淮留後盧鋼以江淮諸州人將阻饑請于來年運米數内量留收貯至春夏百姓饑乏之際減價出糶收其直待熟償之無損于官有利于人帝嘉之詔留常運米三十萬石蕙田案此截留漕米以爲平糶之用後唐同光四年正月詔曰輦轂之中郊甸之内時物踊貴人戸饑窮訪聞自陜已西遐及邠鳯積年時熟百穀價和縱未能别備于貢輸亦宜廣通于和糴近聞輙有税索已曽降敕指揮尚恐闗鎮阻滯行塗増長物價仰所在長吏切加檢御以濟徃來推救災䘏患之心明奉國憂人之道又京圻之内自張全義制置已數十年每聞開墾荒蕪勸課稼穡曽無歉歳甚有餘糧公私貯蓄及多收藏未肯出糶更俟厚價頗失衆情宜令中書門下條疏應在京及諸縣有貯斛㪷並令減價出糶以濟公私後周廣順元年四月敕天災流行分野代有苟或閉糴豈是愛人宜令㳂淮渡口鎮鋪不得止淮南人糴易三年十一月敕膳部員外郎劉表微徃兖州開倉減價糶粟以水害稼救饑民也丙午單州刺吏劉禧言滄州充給歳餘軍糧外有大麥六萬石欲開倉官糶以濟貧民從之十二月以亳州潁州大水民饑所有倉儲及永城倉度支給軍食一年外遣使減價出糶顯德元年正月分命朝臣杜􅋫等五人徃潁亳濮永城固河口開食減價出糶以濟饑民六年正月命廬州開倉出陳麥以糶之蓋克復之後民多阻饑故廉其價以惠之也二月濠州上言准宣出糶省倉陳麥以利饑民宋史太宗本紀淳化元年七月京師貴糴遣使開廪減價分糶真宗本紀大中祥符五年京城河北淮南饑減直鬻穀以濟流民玉海天禧元年詔災傷州以常平倉元糴價出糶荒政考畧天禧元年濮州侯日成上言本州富民儲蓄不少近價值日増乞差使臣與通判㸃檢量留一年支費餘悉令糶真宗有㫖勸誘出糶不得擾富民真宗本紀天禧四年閏十二月京城穀貴減直發常平倉仁宗本紀天聖四年四月詔京東西河北淮南平穀價慶歴元年十一月發廪粟減價以濟京城八年十一月出廪米減價以濟畿内貧民至和二年四月出米京城門下其價以濟流民吳及傳嘉祐四年及管勾登聞檢院上書言春秋有告糴陛下恩施動植視人如傷然州郡官司各專其民擅造閉糴之令一路饑則鄰路爲之閉糴一郡饑則鄰郡爲之閉糴夫二千石以上所宜同國休戚而坐視流離豈聖朝子育兆民之意哉遂詔鄰州鄰路災傷而輙閉糴論如違制律言行録熈寧中趙清獻公抃以大資政知越州兩浙旱蝗米價踴貴諸州皆榜衢路禁人増米價公獨榜衢路令有米者増價糶之於是諸州米商輻湊詣越米價更賤民無餓死者蘇頌乞糶官米濟民疏臣竊聞近日甚有近北災傷人民流移徃鄰路州軍逐熟尋有㫖下諸路令州縣常切存恤恭惟聖恩溥施靡所不逮然恐州縣虛文不能上副仁憫之意何則其流民所之惟是歳豐物賤便爲安居之地今並淮諸郡雖稍登稔若食口既多必是物價騰踴萬一將來秋成失望漂泊之民未有歸業之期坐食貴穀便見失所彼時須煩縣官賑救爲惠差遲則其無益甚矣臣以謂存恤之法莫先於平物價欲物貨之平則莫若官爲糶給使之常食賤價之物則不覺轉移流徙之爲患也臣欲望特降朝㫖應有流民所聚州縣權將上供或軍糧米斛比見今在市實直量減分數估定價例將來更不得添長專差强幹官一員置塲出糶直候流民歸業日即罷其約束事件並依昨來在京糶場施行收到價錢􅁍委轉運司和糴斛㪷充數如此擘畫比之出粟賑濟所費寡而所惠博惟朝廷垂意幸甚宋史徽宗本紀元符三年正月即皇帝位十二月出廪粟減價以濟民高宗本紀建炎二年十月禁江浙閉糴三年二月出米十萬斛即杭秀常湖州平江府損直以糶濟東北流寓之人紹興十三年三月振淮南饑民仍禁遏糴食貨志紹興三十一年正月雪寒民多艱食詔臨安府并屬縣以常平米減時之半振糶十日朱子與星子諸縣議荒政書一將來糶米亦請一面早與上戸及糴米人戸公共商議置塲去處務令公私貧富逺近之人各得其便大抵官米只于縣市出糶上戸米穀即與近便鄉村置塲出糶不須般載徃來徒有勞費如有大段有餘不足去處及將來發糶常平米斛即具因依申來切待别行措置與建寧諸司論賑濟劄子一安撫司賑濟米合于冬前差船般運免至冬後與民間般載租米互有相妨或致延滯一廣南最係米多去處常歳商賈轉販舶在海中今欲招邀合從兩司多印文牓發下福州沿海諸縣優立價直委官收糴自然輻湊然後􅁍用溪船節次津般前來建寧府交卸一般運米須得十餘萬石方可濟用合從使府兩司及早撥定本錢選差官員使臣或募土豪給與在路錢糧令及冬前速到地頭趂熟收糴潮惠州與本路界相近徃囬别無踈虞即與支賞約運到米一千石支錢三十貫充賞其糴到米數最多之人仍與别議保奏推賞施行一上件福廣米既到府城即城下居人自無闕食之理不須過有招邀上溪船米反致鄉村匱乏將來却煩官司般米賑濟勞費百端今合先次出牓曉諭諸縣産戸寺院除日逐出糶不得閉糴外每産錢一貫樁米三十石省禾亦依此紀數兩貫以下不樁委社首遍行勸諭親自封樁開具本都樁管米數及所樁去處限十一月内申縣祗備覆實不得輙徇顔情虛申數目及妄挾怨􅄷生事騷擾其社首家禾即委隅官封樁一鄉下有外里産户等寄莊即仰社首及本處居人指定經官陳説封樁十分之七一鄉下有産錢低小而停積禾米之家仰鄰保重立罪賞陳告亦與量數封樁十分之五並依前法一上戸有願於合樁數外别行樁糶之人許具實數經縣自陳收附出糶量行旌賞一所樁禾米更不預定價直將來隨鄉原髙下量估平價出糶不使太貴以病細民亦不使太賤以􅃜上戸一所樁禾米自來年正月爲始以十分爲率至每月終即給一分還元樁産戸自行出糶直至稍覺民饑即據見數五日一次差隅官監糶大人一斗婦人七升小兒四升如至六月中旬民間不甚告饑即盡數給還産戸自行出糶一府城縣郭及鄉村居民合糴禾米之家合預行括責取見戸口實數即見合用米數及將來分定坊保給闗收糴庶免欺弊大人婦人小兒逐戸分作三項一上户自有蓄積軍人自有衣糧公吏自有廪禄市戸自有經紀工匠自有手作僧道自有常住並不在收糴之限一鰥寡孤獨老病無錢糴米之人候三四月間别議措置如是饑荒須令得所右謹具呈第一項至第三項乞使府兩司早賜詳度定議第四項以後乞使府出牓通衢恐有未盡未便之處令諸色人詳其利害疾速具狀陳述廣詢審議然後施行庶使大戸細民兩得安便伏候台㫖此米須留以待來歳之用目今秋成在邇般運到人已食新切乞存留無爲虛費樁米多則上戸不易少又儲蓄不足此數更乞裁酌更以戸口之數計之方見實用米數寳慶三年監察御史汪剛中言豐穰之地穀賤傷農凶歉之地濟糴無䇿惟以其所有餘濟其所不足則饑者不至于貴糴而農民亦可以得利乞申嚴遏糴之禁凡兩浙東江西湖南北州縣有米處並聽販鬻流通違許被害者越訴官按劾吏決配庶幾令出惟行不致文具從之王圻續通考紹定元年資政殿學士知潭州曽從龍奏州縣賑民之法有三曰濟曰貸曰糶濟不可常惟貸與糶爲利可久今撥緡錢一千萬有竒分下潭州十縣委令佐糴米置惠民倉乞比附常平法從之六年正月監察御史何處久奏乞申飭諸道轉運司嚴飭所部州縣不許遏糴如歉郡招誘客販委官告糴仍具數上之朝廷其阻糴苛税者令御史臺劾奏從之宋史度宗本紀咸淳元年閏五月久雨京城減直糶米三萬石自是米價高即發廪平糶以爲常食貨志咸淳元年有㫖豐儲倉撥公田米五十萬石付平糴倉遇米貴平價出糶二年監察御史趙順孫言今日急務莫過于平糴乾道間郡有米斗直五六百錢者孝宗聞之即罷其守更用賢守此今日所當法者今粒食翔踴未知所由市井之間見楮而不見米推原其由寔富家大姓所至閉廪所以糴價愈高而楮價隂減陛下念小民之艱食爲之發常平義倉然爲數有限安得人人而濟之願陛下課官吏使之任牛羊芻牧之責勸富民使之無秦越肥瘠之視糴價一平則楮價不因之而輕物價不因之而重矣七年以咸淳三年以前諸路義米一百一十二萬九千餘石減價發糶薄收郡縣聽民不拘闗㑹見錢收糶金史世宗本紀大定九年三月以大名路諸明安民戸艱食遣使發倉廪減價出之食貨志大定二十一年中都大水命都城減價以糶明昌四年七月諭㫖戸部官聞通州米粟甚賤若以平價官糴之何如于是有司奏中都路去歳不熟今其價稍減者以商旅運販繼至故也若即差官争糴切恐市價騰踴貧民愈病請俟秋收日依常平倉條理收糴詔從之五年五月上曰聞米價騰踴今官運至者有餘可減直以糶之其明告民不須貴價私糴也章宗本紀承安元年六月上以百姓艱食詔出倉粟十萬石減價以糶之高汝礪傳貞祐二年六月宣宗南遷次邯鄲拜汝礪爲叅知政事次湯隂上聞汴京穀價騰踴慮扈從人至則愈貴問宰臣何以處之皆請命留守司約束汝礪獨曰物價低昂朝夕或異然糴多糶少則貴蓋諸路之人輻輳河南糴者既多安得不貴若禁止之有物之家皆將閉而不出商旅轉販亦不復入城則糴者益急而貴益甚矣事有難易不可不知今少而難得者穀也多而易致者鈔也自當先其所難後其所易多方開誘務使出粟更鈔則穀價自平矣上從之蕙田案米價騰貴之時無抑之使平之理汝礪此議與趙清獻榜衢路令増價出糶之意合侯摯傳貞祐四年正月拜尚書右丞是時河北大饑摯上言曰今河朔饑甚人至相食觀滄等州斗米銀十餘兩殍殣相屬伏見沿河上下許販粟北渡然每石官糴其八彼商人非有濟物之心也所以渉河徃來者特利其厚息而已利既無有誰復爲之是雖有濟物之名而實無所渡之物其與不渡何異昔春秋列國各列疆界然晉饑則秦輸之粟及秦饑晉閉之糴千古譏之况今天下一家河朔之民皆陛下赤子而遭罹兵革尤爲可哀其忍坐視其死而不救歟人心惟危臣恐弄兵之徒得以藉口而起也願止其糴縱民輸販爲便詔尚書省行之元史食貨志京師賑糶之制至元二十二年始行其法於京城南城設鋪各三所分遣官吏發海運之糧減其市直以賑糶焉凡白米每石減鈔五兩南粳米減鈔三兩歳以爲常成宗元貞元年以京師米貴益廣世祖之制設肆三十所發糧七萬餘石糶之白粳米每石中統鈔一十五兩白米每石一十二兩糙米每石六兩五錢二年減米肆爲一十所其每年所糶多至四十餘萬石少亦不下二十餘萬石至大元年増兩城米肆爲一十五所每肆日糶米一百石四年増所糶米價爲中統鈔二十五貫自是每年所糶率五十餘萬石泰定二年減米價爲二十貫致和元年又減爲一十五貫云賑糶糧之外復有紅貼粮紅貼粮者成宗大徳五年始行初賑糶糧多爲豪强嗜利之徒用計巧取弗能周及貧民於是令有司籍兩京貧乏戸口之數置半印號簿文貼各書其姓名口數逐月對貼以給大口三斗小口半之其價視賑糶之直三分常減其一與賑糶並行每年撥米總二十萬四千九百餘石閏月不與焉其愛民之仁于此亦可見矣廣治平畧周忱巡撫直𨽻初至蘇松屬大饑穀貴忱廉得江浙湖廣大稔令人槖金至其地故抑其直勿糴且紿言吳中米價髙甚用是三省大賈載米數百艘來集忱乃下令盡發官廪貸民半收其直城中米價驟減各賈懷觀望只得賤糶忱復椎牛釃酒謝之各賈悉大歡而去米價既平乃復官糴以實廪此巧行其平糴者也杭州府志正統六年二月巡按浙江監察御史康榮奏杭州府地狹人稠浮食者多仰給蘇松諸府今彼地水旱相仍穀米不至杭州遂困又湖州府比因歳凶米亦甚貴竊計二府官廪尚有二十年之積恐年久紅腐請發三十五萬糶于民間令依時值償納則朝廷不費而民受其惠矣從之荒政考畧成化七年京畿饑敕戸部發太倉粟一百萬斛減價糶以利民凡糴惟以升斗計滿一石不與饑者獲濟明㑹典成化六年奏准將京通二倉糧米發糶五十萬石每秔米收銀六錢粟米五錢以殺京城米價騰貴王圻續通考成化十八年正月命南京糶常平倉糧時歳饑米貴南京戸部議減價糶以濟民饑秋成平糴還倉明㑹典嘉靖九年令天下各府州縣有積久米粟盡數平糶以濟貧窮候收成買貯新穀務足前數通紀㑹纂神宗十五年申時行請禁遏糴疏曰治本在使民得食頃者因荒大發帑銀遣使分賑恩至渥矣然賑銀有限而饑民無窮惟是鄰近恊助市糴通行乃可延旦夕之命近訪河南等處徃徃閉糴彼固各愛其民然自朝廷視之莫非赤子災民既缺食于本土又絶望于他方是激之爲變也乞禁止遏糴之令聽商民糴買接濟則百姓不至嗷嗷待斃洶洶思亂也上從之蕙田案以上平糶荒政考畧唐高宗儀鳯間王方翼爲肅州刺史蝗獨不至其境隣郡民皆重繭走之乃出私錢作水磑薄其直以濟饑瘵起舎數十百楹居之全活甚衆古今治平畧皇祐間吳中大饑范仲淹領浙西乃縱民競渡與僚佐日出燕湖上諭諸守者以荒歳價亷可大興土木于是諸寺工作鼎新又新倉厫吏舎日役千夫監司劾奏杭州不䘏荒政游宴興作傷財勞民公乃條奏所以如此正欲廢有餘之財以惠貧者使工技傭力之人皆得仰食于公私不至轉徙填壑荒政之施莫此爲大是歳惟杭饑而不害文獻通考熈寧六年詔自今災傷用司農常法賑救不足者並預且當修農田水利工役募夫數及其直上聞乃發常平錢斛募飢民興修不如法賑救者委司農劾之曾鞏越州趙公救菑記熈寧八年吳越大旱知越州趙公僦民完城四千一百丈爲工三萬八千計其傭與錢又與粟再倍之朱子奏救荒畫一事件狀一檢凖常平免役令諸興修農田水利而募被災饑流民充役者其工直糧食以常平錢穀給臣契勘本路水利極有廢壊去處亦有全未興創去處欲俟將來給到錢物即令逐州計度合興修處雇募作役既濟饑民又成永久之利實爲兩便奏救荒事宜畫一狀一臣昨所奏逐項事理並䝉開􅁢獨有依凖舊制募饑民修水利一事未䝉施行臣竊見連年災旱國家不忍坐視夫民之死大發倉廪以拯救之其費以巨億計蓋其賑給者固不復收其賑糶者雖曰得錢而所折閲亦不勝計仁聖之心於此固無所吝然饑民百萬安坐飽食而於公私無毫髪之補則議者亦深惜之故臣嘗竊仰稽令甲私計以爲若㣲於數外有所増加以爲募民興役之資則救災興利一舉而兩得之其與見行糶給之法利害之算相去甚逺故不自揆既以奏聞而輙下諸州委是通判詢究水利合興復處以俟報可至於近日巡歴又得親見所至原野極目蕭條唯是有陂塘處則其苗之蔚茂秀實無以異於豐歳於是竊嘆益知水利之不可不脩自謂若得奉承明詔悉力經營令逐村逐保各有陂塘之利如此則民間永無流離餓莩之患而國家亦永無蠲減糶濟之費矣不謂言語疎畧未䝉鍳照敢竭其愚重以爲請伏望聖慈深察上件事理許臣前項所請百七十萬貫者而令於内量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即令繳納糶給由歴就雇入役俟畢工日糶給如舊則所損不至甚多而可以成永久之利絶凶年之憂費短利長未爲失䇿候聖㫖簽黄臣又竊恐興修水利所費太多難以支給即乞且令貸與食利人戸雇工興役􅁍候將來豐熟年分紐計米數量分料次赴官送納樁管在官尤爲利便伏候聖㫖宋史寧宗本紀嘉定二年十一月詔浙西監司募饑民修水利蕙田案興工代賑之法起於後代然周宣王之集流民則云百堵皆作臧文仲之述旱備則云修城郭夫非古人已行之事乎且聚數千百饑人仰首而待食于上而於縣官無絲髮之補詎若使之自食其力巧者効其技强者効其勤於小民既覺得所於公家亦爲有益尤一舉而兩得也宋時又有募饑民為兵之法亦是量其才力俾得就食于官與此同意觀承案興工代賑官民俱利此法誠善他若増價來米及饑民爲兵亦可參用蓋米多則價自平爲兵則盜自弭惟在司牧者權其情𫝑輕重而兼行之可也蕙田案以上以工代賑金史章宗本紀明昌三年六月諭戸部可預給百官冬季俸令就倉以時直糶與貧民秋成各以其貲糴之其所得必多矣而上下便之其承應人不願者聽明㑹典成化六年以京城米價騰貴將文武官吏俸糧預支三個月蕙田案以上預支俸米明史食貨志𢎞治五年戸部尚書葉淇言蘇松諸府連歳荒歉民買漕米每石銀二兩而北直𨽻山東河南歳供宣大二邊糧料每石亦銀一兩去歳蘇州兊運已折五十萬石每石銀一兩今請推行于諸府而稍差其直災重者石七錢稍輕者石仍一兩俱解部轉發各邊抵北直𨽻三處歳供之數而收三處本色以輸京倉則費省而事易集從之自後歳災輙權宜折銀以水次倉支運之糧充其數而折價以六七錢爲率無復至一兩者蕙田案明㑹典成化十九年鳯陽等府被災秋糧減免三分其餘七分除存留外起運者照江南折銀則例每石徴銀二錢五分是折銀之例不始于孝宗之世王圻續通考神宗二十九年十一月戸部覆直𨽻巡按何熊祥題蘇松水災異常乞將嘉定縣永折漕糧姑准減折一年毋分正改毎石折徴銀五錢以後仍照原題起解被災十分江隂一縣被災九分以上太倉州吳江崑山武進江隂宜興金壇七縣本年漕糧俱准折七分仍徴本色三分被災八分以上長洲吳縣常熟華亭上海青浦無錫丹徒丹陽九縣俱准改折五分仍徴本色五分其改折之數不分正改照例每石折銀五錢連蓆板耗脚輕齎在内每同本色齊徴其改折項下運軍月糧亦准扣數免編及查靖江縣被災雖止七分以上姑念疲邑准將該年應解南京光禄寺白糧每石折銀八錢四門倉糙米每石折銀六錢與别縣本色一同徴解南京戸部其正徴帶徴金花銀兩等項已經差官守催速令追完解進及南京各衛倉米已經題准改折毋容别議奉㫖是蕙田案以上改折漕糧右散利下五禮通考卷二百四十八
