body:
  text: 五禮通考卷一百十一刑部尚書秦蕙田撰吉禮大夫士廟祭儀禮少牢饋食禮鄭目錄云諸侯之卿大夫祭其祖禰于廟之禮于五禮屬吉禮疏鄭知諸侯之卿大夫者曲禮下云大夫以索牛用太牢是天子卿大夫明此用少牢為諸侯之卿大夫可知賔尸是卿不賔尸為下大夫為異也敖氏繼公曰此篇言大夫祭其祖之禮欽定義疏特牲少牢皆無言及廟主之文漢儒因謂大夫士無主然左氏傳哀十六年衛孔悝出奔宋使貳車反祏于西圃杜注云祏藏主石函則大夫有主矣大夫有主則士亦未必無之若無主則廟中以何者依神而祖禰何以别乎此經不言主者亦以犆祭無迎主之事故也少牢饋食之禮注禮將祭祀必先擇牲繫于牢而芻之羊豕曰少牢諸侯之卿大夫祭宗廟之牲若疏羊豕曰少牢三牲具為太牢但非一牲即得牢稱一牲即不得牢名故郊特牲與士特牲皆不言牢也日用丁巳注内事用柔日必丁巳者取其令名自丁寧自變改皆為謹敬必先諏此日明日乃筮日疏舉事尚朝旦不可今日謀日即筮是以此文云用丁巳乃云筮旬有一日是别于後日乃筮也蕙田案日用丁巳用丁若巳之日巳十干戊巳之巳非十二支辰巳之巳筮旬有一日注旬十日也以先月下旬之巳筮來月上旬之巳疏若丁巳之外辛乙之等皆然鄭必言來月上旬不用中旬下旬者吉事先近日故也筮於廟門之外主人朝服西面於門東史朝服左執筮右抽上韇兼與筮執之東面受命于主人注史家臣主筮事者是疏主人朝服者為祭而筮還服祭服以上篇特牲筮亦服祭服𤣥端以此而言天子諸侯為祭卜筮亦服祭服若為他事卜筮則異于此敖氏繼公曰特牲言筮人此言史葢互文也以丁巳之日而筮丁巳乃云旬有一日則是并筮日之日而數之也古者數日之法於此可見主人曰孝孫某來日丁亥用薦歳事於皇祖伯某以某妃配某氏尚饗注丁未必亥也直舉一日以言之耳禘于太廟禮曰日用丁亥不得丁亥則己亥辛亥亦用之無則苟有亥焉可也薦進也進嵗時之祭事也皇君也伯某祖字也大夫或因字為諡春秋傳曰魯無駭卒請諡與族公命以字為展氏是也若仲叔季亦曰仲某叔某季某也某妃某妻也合食曰配某氏若言姜氏子氏也大疏春秋宣八年辛巳有事于太廟文二年八月丁卯事于太廟昭十五年二月癸酉有事于武宮桓十四年己亥嘗此等皆不獨用丁巳之日也楊氏復曰上文日用丁巳謂十干丁日巳日也如丁亥己亥之類是也下文來日丁亥亦舉一端以明之耳注家乃云不得丁亥則己亥辛亥無則苟有亥焉可也此則不論十干之丁巳而專取十二支之亥以為解其失經文之意逺矣敖氏繼公曰此惟云丁亥特見其一耳必言丁亥者以其為六丁之末者故設言之也末者且用則其上者可知矣已日亦宜如之欽定義疏疏引春秋諸祭日見凡柔日皆可用不但丁巳也上云丁巳亦舉之以見例耳歲事四時之祭事春露秋霜之義亦不疏不數之期也則歲以四舉明矣稱祖之字諱名不諱字如子思作中庸稱仲尼是也注謂大夫因字為諡葢生時名字兩稱卒哭乃諱則諱其名而專稱字字有諡之義非以此直為諡法之諡也以某妃配某氏所謂同几精氣合也隂統于陽故但祭其祖而妣已兼之矣若祖殁而妣尚存者不用此辭可知也以某妃配若言伯某之妃也又舉某氏以實之史曰諾西面於門西抽下韇左執筮右兼執韇以擊筮注將問吉凶焉故擊之以動其神易曰蓍之德圓而神遂述命曰假爾大筮有常孝孫某來日丁亥用薦歲事於皇祖伯某以某妃配某氏尚饗注述循也重以主人辭告筮也假借也言因蓍之靈以問之常吉凶之占繇敖氏繼公曰大者尊之之辭有常謂其常常如此也孝孫某以下之辭則所謂述命也蕙田案有常乃吉凶不差忒之義敖氏訓常常如此未的假爾大筮以下即述命之辭疏云述命訖乃連言離而為二非也乃釋韇立筮注卿大夫之蓍長五尺立筮由便卦者在左坐卦以木卒筮乃書卦于木示主人乃退占注卦者史之屬也卦以木者毎一爻畫地以識之六爻備書于板史受以示主人退占東面旅占之敖氏繼公曰退退于其位也此占者亦當三人吉則史韇筮史兼執筮與卦以告於主人占曰從注從者求吉得吉之言本疏筮而得吉是從主人心故曰從乃官戒宗人命滌宰命為酒乃退注官戒戒諸官也當共祭祀事者使之具其物且齊也滌溉濯祭器埽除宗廟若不吉則及逺日又筮日如初注及至也逺日後丁若後巳蕙田案以上前十日筮日宿注宿讀為肅肅進也大夫尊儀益多筮日既戒諸官以齋戒矣至前祭一日又戒以進之使知祭日當來古文宿皆作羞前宿一日宿戒尸注前肅諸官之日又先肅尸者重所用為尸者又為將筮惟疏肅諸官之日前又先肅尸當祭前二日也肅諸官一肅尸有再肅是重所用為尸者故也宿與戒前後名不同今合言之者以前有十日之戒後有一日之宿若單言戒嫌同十日若單言宿嫌同一日故宿戒並言明其别也敖氏繼公曰宿戒尸者凡可為尸者皆宿戒之為將筮也蕙田案前宿一日祭前三日也疏云當祭前二日盛世佐云祭前四日俱非明日朝服筮尸如筮日之儀命曰孝孫某來日丁亥用薦歲事於皇祖伯某以某妃配某氏以某之某為尸尚饗筮卦占如初注某之某者字尸父而名尸也字尸父尊鬼神也不前期三日筮尸者大夫下人君祭之朝乃視濯與士異人疏曲禮父在不為尸注云尸卜筮無父者若然凡為尸者父皆死矣死者當諱其名故上某是尸之父字下某為尸名以不稱名是尊鬼神也蕙田案此祭前二日也盛世佐謂戒尸之明日即宿諸官之日而以特牲禮前期三日之朝筮尸為與此同其説非是吉則乃遂宿尸祝擯注筮吉又遂肅尸重尸也既肅尸乃肅諸官及執事者祝為擯者尸神象不疏案特牲使宗人擯主人辭又有祝共傳命者士卑嫌兩有與人君同此大夫尊下人君故闕之蕙田案云乃遂則即筮尸之日盛氏世佐以為此前祭一日事與筮尸隔越兩日亦非是下云若不吉則遂改筮尸文在宿尸之後則筮尸宿尸同為一日益明主人再拜稽首祝告曰孝孫某來日丁亥用薦歲事於皇祖伯某以某妃配某氏敢宿注告尸以主人為此事來尸拜許諾主人又再拜稽首主人退尸送揖不拜注尸不拜者尸尊若不吉則遂改筮尸注即改筮之不及逺日日疏此决上文筮日不吉筮逺日者以為祭祀本須取丁巳之類故須取逺日後旬丁此筮尸不吉不須退至後旬故筮不待逺日也蕙田案以上筮尸宿尸及宿諸官既宿尸反為期于廟門之外注為期肅諸官而皆至定祭早晏之期為期亦夕時也言既肅尸反為期明大夫尊肅尸而已其為賔及執事者使人肅之疏宿尸及宿諸官與為期皆于祭前之日主人門東南面宗人朝服北面曰請祭期主人曰比于子注比次早晏在于子也主人不西面者大夫尊于諸官有君道也為期亦唯尸不來也郝氏敬曰比猶隨也宗人曰旦明行事主人曰諾乃退注旦明旦日質明蕙田案特牲祭前三日筮尸前二日宿尸宿賔前一日陳鼎告期少牢前三日宿戒尸前二日筮尸宿尸前一日請期皆可凖經以推而諸説多淆雜如特牲筮尸經明言前期三日之朝矣下云乃宿尸宿賔則未知其為即日為明日今據宿賔下云厥明夕有陳鼎拜賔視牲告期等事又云夙興則祭日視殺陳設等事矣則宿尸宿賔之為前二日于此可推若依敖君善筮尸宿尸宿賔同在祭前三日則下云厥明夕云夙興文不相接輳其悞可知少牢云前宿一日宿戒尸此祭前三日注疏以為前二日盛世佐以為前四日皆非是云明日朝筮尸此祭前二日注疏以為前一日盛氏以為前三日同於特牲筮尸之期亦皆非是云吉則乃遂宿尸言乃遂明同日為之盛氏以為前祭一日亦非是至宗人請期曰旦明行事則祭前一日之事諸家並同無悞二禮所以不同者少牢有宿戒尸而特牲無之大夫尊尸益重儀益詳也特牲筮尸前三日而少牢前二日士無宿戒然當三日致齊之時未可缺然無事故筮尸較移前一日且第二日宿尸又多一宿賔之事難以一日併行也特牲宿賔而少牢不宿賔者大夫於賔有君臣之分無煩親肅不宿賔而止宿尸可與筮尸同日行之也諸家以意推測與經不符而郝京山則云禮文多錯舉一日至三日皆可筮則尤為鶻突矣蕙田案以上宗人請祭期楊氏復曰少牢禮與特牲禮輕重詳畧不同少牢禮日用丁巳者注云取其令名丁自丁寧巳自變改皆為敬謹之意特牲不諏日者士卑時至事暇可以祭則筮其日矣不必諏丁巳之日如大夫禮𤣥冠一冠冠兩服其一𤣥端其一朝服朝服重於𤣥端特牲士禮故筮則𤣥端至祭而後朝服少牢大夫禮筮與祭皆朝服也特牲筮人筮筮人者官名周禮春官有簭人是也少牢禮史筮史者家臣主筮事者所謂府史是也特牲坐筮少牢立筮不同者注云士蓍短故坐筮卿大夫蓍長五尺故立筮各由其便也特牲少牢皆筮尸但特牲無宿戒尸之文少牢宿戒尸而後筮者重所用為尸者亦大夫尊儀益多也特牲有宿賔之禮少牢不宿賔者大夫尊肅尸而已其為賔執事者使人肅之特牲無為期少牢為期者重其事也為期之日主人門東南面不西南者大夫尊于諸官有君道也陳氏禮書士前祭立于廟門者五筮日一也筮尸二也前祭之夕將視濯具揖入三也既視復外位而請期四也祭之日視殺揖入五也大夫前祭立于廟門者四筮日一也筮尸二也既宿尸而請期三也祭之日視殺入四也明日主人朝服即位于廟門之外東方南面宰宗人西面北上牲北首東上司馬刲羊司士擊豕宗人告備乃退注刲擊皆謂殺之此實既省告備乃殺之文互者省文也尚書傳羊屬火豕屬水疏案特牲視牲與視殺别日今少牢不言視牲直言刲擊告備乃退者省文也祭義云君牽牲穆荅君卿大夫序從既入門麗于碑卿大夫􅃝而毛牛尚耳諸侯禮殺于門内此大夫與特牲士皆殺于門外者辟人君也楊氏復曰雜記曰大夫冕而祭于公弁而祭于已士弁而祭于公冠而祭于巳大夫爵弁自祭家廟惟孤耳其餘皆𤣥冠與士同陳氏禮書大夫士無祼禮故殺牲而後迎牲迎牲而後迎尸天子諸侯有祼禮故迎尸而後迎牲欽定義疏東上羊在東豕在西也蕙田案以上視殺雍人摡鼎七爼于雍㸑雍㸑在門東南北上注雍人掌割亨之事者㸑竈也在門東南統于主人北上羊豕魚腊皆有竈竈西有鑊凡摡者皆陳之而後告潔敖氏繼公曰摡猶拭也既筮日而宗人命滌皆已濯之故此但摡之為去塵也廪人摡甑甗七與敦于廪㸑廪㸑在雍㸑之北注廪人掌米入之藏者甗如甑一孔七所以七黍稷者也古文甑為烝疏案冬官陶人職云甗實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鄭司農云甗無底甑以其無底故以一孔解之上雍人七肉此廩人七黍稷敖氏繼公曰甑則炊之七則出之司宮摡豆籩勺爵觚觶几洗篚于東堂下勺爵觚觶實于篚卒摡饌豆籩與篚于房中放于西方設洗于阼階東南當東榮注放猶依也大夫攝官司宮兼掌祭器也郝氏敬曰豆至篚共九器而篚即盛勺爵觚觶者卒摡拭畢也房中之篚盛主婦獻酬之易爵也放置也陳氏禮書士逺君而伸故視濯具與視殺異日大夫近君而屈故視濯具與視殺同日蕙田案以上摡器􅃵定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西注魚腊從羊膚從豕統于牲當疏上文摡鼎時鄭云羊豕魚腊皆有竈今陳鼎宜各其鑊此三鼎在羊鑊之西二鼎在豕鑊之西故云魚腊從羊膚從豕其實羊豕魚腊各有鑊也士虞禮側亨于廟門外之右東面魚腊㸑在其南士之魚腊皆有㸑則大夫魚腊皆有鑊有竈也郝氏敬曰陳鼎五羊豕魚腊膚也鑊大釡以煮肉陳鼎就鑊以便升也司馬升羊右胖髀不升肩臂臑膞胳正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實于一鼎注升猶上也上右胖周所貴也髀不升近竅賤也肩臂臑肱骨膞胳股骨脊從前為正脅旁中為正脊先前脅先後屈而反猶器之䋫也並併也脊脅骨多六體各取二骨併之以多為貴舉肺一尸食所先舉也祭肺三為尸主人主婦疏上十一體言一者見其體也下言皆二骨以並見一體皆有二骨也凡牲體四支為貴故先序肩臂臑膞胳于上是尊然後序脊脅于下是卑二骨以並据脊脅可知也司士升豕右胖髀不升肩臂臑膞骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並舉肺一祭肺三實於一鼎注豕無腸胃君子不食溷腴雍人倫膚九實於一鼎注倫擇也膚脅革肉擇之取美者脅疏下文云膚九而爼亦横載革順故知膚是革肉也司士又升魚腊魚十有五而鼎腊一純而鼎腊用麋注司士又升副倅者合升左右胖曰純純猶全也亦疏下經云司士三人明是副倅者非升豕者可知倅副之别名卒脀皆設扃鼏乃舉陳鼎于廟門之外東方北面北上注北面北上鄉内相隨郝氏敬曰脀烝同升也卒脀升鼎畢也蕙田案牲體説詳見前宗廟制度門司宮尊兩甒于房户之間同棜皆有冪甒有𤣥酒注房户之間房西室户東也棜無足禁者酒戒也大夫去足改名優尊者若不為之戒然疏特牲用棜仍云禁此改名棜是優尊者若不為神戒然鄉飲酒雖是大夫禮猶名斯禁者尋常飲酒異於祭祀也敖氏繼公曰棜即所謂棜禁也惟言棜文省耳設尊即加冪者甑其無葢與司宮設罍水于洗東有枓設篚于洗西南肆注枓􅆽水器也凡設水用罍沃盥用枓禮在此也須疏設水用罍沃盥用枓言凡總儀禮内凡用水者皆罍盛之沃盥水者皆用枓為之士冠禮直言水在洗東士昏鄉飲酒特牲記亦云然皆不言罍器亦不云有枓其燕禮大射雖云罍水又不言有枓故注總云凡此等設水用罍沃盥用枓其禮具在此故餘文不具改饌豆籩于房中南面如饋之設實豆籩之實注改更也為實之更之威儀多也如饋之設如其陳之左右也饋設東面敖氏繼公曰案注云饋設東面以見其異者此耳小祝設槃匜與簞巾於西階東注為尸將盥蕙田案以上實鼎陳設器饌敖氏繼公曰禮文多互見如特牲言腊髀不升則函髀可知獨尸爼云不用髀則是獨牲爼猶用也故祝爼有豕髀少牢神爼言羊豕髀不升則特牲神爼可知少牢腊用麋特牲用兔可知少牢尊兩甒𤣥酒棜禁冪不言覆兩甒明日卒奠皆互見也他可類推主人朝服即位於阼階東西面注為將祭也時疏自此盡革順論祭將至布設舉鼎七載之事司宮筵於奥祝設几於筵上右之注布陳神坐也室中西南隅謂之奥席東面近南為右故疏案特牲云祝筵几此司宮設席祝設几大夫官多使兩官共事亦是接神故祝設几也蕙田案以上即位設筵几主人出迎鼎除鼏士盥舉鼎主人先入注道之也主人不盥不舉疏特牲主人降及賔盥士禮自舉鼎大夫尊不舉故不盥司宮取二勺於篚洗之兼執以升乃啟二尊之葢冪奠於棜上加二勺於二尊覆之南枋注二尊兩甒也重疏二勺兩尊用之𤣥酒雖有不酌古如酌者然也鼎序入饔正執一七以從饔府執四七以從司士合執二爼以從司士贊者二人皆合執二爼以相從入注相助敖氏繼公曰饔正饔人之長府其佐也七先爼後變于君禮也陳鼎於東方當序南於洗西皆西面北上膚為下七皆加於鼎東枋注膚為下以其加也南于洗西陳于洗西南疏膚為下門外陳鼎時不言至此言之者以膚者豕之實前陳鼎在門外時未有爼據鼎所陳則膚在魚上今將載于爼設之最在後故須分别之也羊無别爼而豕有膚爼故謂之加郝氏敬曰陳鼎以羊豕魚腊膚為序爼皆設於鼎西西肆肵爼在羊爼之北亦西肆注肵爼在北將先載也異其設文不當鼎宗人遣賔就主人皆盥于洗長朼注長朼者長賔先次賔後也主人不朼言就主人者明親臨之古文朼作匕欽定義疏下文明言佐食二人升羊豕司士三人升魚腊膚升之者即朼之者也據公食禮大夫長七舉鼎之左人載士虞禮佐食及執事舉鼎入長在左左人七佐食及右人載皆一七一載對言若一人七又一人升則無位置之法矣注以賔為長賔次賔于下經不合又案易稱震驚百里不䘮七鬯百里者諸侯之象是諸侯于廟祭七牲薦鬯必親之也周官大僕贊王牲事注謂殺牲七載之屬是天子亦視之也少牢大夫不親七下人君也特牲士親七卑不嫌也佐食上利升牢心舌載於肵爼心皆安下切上午割勿沒其載於肵爼末在上舌皆切本末亦午割勿沒其載於肵横之皆如初為之於㸑也注牢羊豕也安平也平割其下於載便也凡割本末食必正也午割使可絶勿沒為其分散肵之為言敬也所以敬尸也周禮祭尚肺事尸尚心舌心舌知滋味今文切皆為刌郝氏敬曰佐食二人長為上利利食也佐食之號午割一縱一横割勿沒不斷也佐食遷肵爼於阼階西西縮乃反佐食二人上利升羊載右胖髀不升肩臂臑膞骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三長皆及爼拒舉肺一長終肺祭肺三皆切肩臂臑膞骼在兩端脊脅肺肩在上注升之以尊卑載之以體次各有宜也拒讀為介距之距爼距脛中當横節也凡牲體之數及載備于此爼疏云肩臂臑膞骼在兩端脊脅肺肩在上者此是在之次爼有上下猶牲體有前後故肩臑在上端膞骼在下端脊脅肺在中其載之次序肩臂臑正脊脡脊横脊代脅長脅短脅肺腸胃膞骼也在雞足為距在爼則爼足中央横者也此經即折前體肩臂臑兩相為六後體膞骼兩相為四短脅正脅代脅兩相為六脊有三總為十九體唯不數觳二通之為二十一體二觳正祭不薦于神尸故不言是牲體之數備於此上經云升于鼎此經云載于爼是載備于此也蕙田案凡牲體有豚解有體解豚解者解牲為七體一脊兩脅兩肱兩股也脅者肋骨亦謂之胉肱者前脛骨謂之肩股者後脛骨謂之髀胉及肩髀皆以左右分通一脊而為七體體解者即豚解之七體而折解之為二十一體折脊骨為三前為正脊中為服脊後為横脊脅骨三前為代脅中為長脅亦名正脅亦名幹後為短脅合左右兩脅為六肱骨三上為肩中為臂下為臑合左右兩肱為六股骨三上為髀中為肫亦名膞下為骼合左右兩股為六也至正脊之前肩之上當頸處謂之脰亦謂之膉胳之下後足之末近蹄者謂之觳膉一而觳兩皆不在正體之數少牢饋食所陳凡十一體而鄭氏以為牲體之數備於此者葢肩臂臑合兩胖為六膞骼合兩胖為四短脅正脅代脅合兩胖亦六脊有三總為十九體兩髀雖以近竅之故賤之而不升然究屬正體通數之得二十一體則牲體之數備矣特牲尸爼用九體肩臂臑膞骼正脊横脊長脅短脅而無脡脅代脅又案肺上不言腸胃省文耳敖氏以為文脱張爾岐以肩為胃字之誤皆非下利升豕其載如羊無腸胃體其載于爼皆進下注進下變于食生也所以交于神明不敢以食道敬之至也鄉飲酒禮進腠羊次其體豕言進下互相見張氏爾岐曰食生人之法進輳輳骨之本下骨之末進下者以骨之末向神也敖氏繼公曰進下謂以毎體之下鄉神位盛氏世佐曰無腸胃著其異于羊者司士三人升魚腊膚魚用鮒十有五而爼縮載右首進腴注右首進腴亦變于食生也有司載魚横之少儀曰羞濡魚者進尾敖氏繼公曰魚之進腴猶牲之進下也魚以腴為下鬐為上右首而進腴則亦寢右矣士䘮奠用食生之禮其魚則左首進鬐與此異蔡氏徳晉曰鮒鯽魚也其性相附故曰鮒腊一純而爼亦進下肩在上注如羊豕凡腊之體載禮在此疏諸經唯有腊文無升載之事唯此有之蕙田案獸肉之乾者謂之腊腊亦先豚解次體解與解牲之制同一純而爼謂全載于爼如牲也膚九而爼亦横載革順注列載于爼令其皮相順亦者亦其骨體疏此膚言横則上羊豕骨體亦横載可知郝氏敬曰革皮也以肉皮向上相順比也蕙田案以上舉鼎七載卒脀祝盥於洗升自西階主人盥升自阼階祝先入南面主人從戸内西面注將納祭也先疏自此盡主人又再拜稽首論設置為隂厭之事也主婦被錫衣侈袂薦自東房韭菹醓醢坐奠於筵前主婦贊者一人亦被錫衣侈袂執葵菹蠃醢以授主婦主婦不興遂受陪設於東韭菹在南葵菹在北主婦興入於房注被錫讀為髲鬄古者剔賤者刑者之髪以被婦人之紒為飾因名髲鬄焉此周禮所謂次也不纚笄者大夫妻尊亦衣綃衣而侈其袂耳侈者葢半士妻之袂以益之衣三尺三寸袂尺八寸韭菹醓醢朝事之豆也而饋食用之豐大夫禮葵菹在北䋫今文錫為緆蠃為蝸疏云贊一人亦被錫則其餘當與士妻同纚笄綃衣士妻與婦人助祭皆綃衣服窮則同也欽定義疏召南詩被之僮僮毛傳云被首飾也鄭箋云此即周官所謂次也孔疏云被即次也追師掌為副編次注云次次第長短髪為之據此則被乃婦人首飾之名周官追師掌王后首服副編次注疏謂三翟衣首服副副所以覆首鞠衣展衣首服編編編列髪為之褖衣首服次次次第髪長短為之所謂髲髢禮記夫人副禕立于東房詩衛風副笄六珈此副也詩召南被之僮僮被之祁祁此主婦被則次也敖氏繼公曰錫緆通皆當作縁字之誤也緣褖通内司服職曰緣衣素沙是也内子祭服緣衣而又侈其袂焉所以甚别於士妻之祭服也卿大夫之妻展衣為上緣衣次之此自祭于家故服其次者辟助祭于公也郝氏敬曰錫光澤也如錫衰之錫漢人云曳阿錫侈􅃑大䄂也欽定義疏周官内司服掌王后之六服禕衣揄翟闕翟鞠衣展衣緣衣鄭注賈疏三翟衣皆祭服王后禕衣二王後之夫人亦禕衣侯伯夫人揄翟子男夫人闕翟内命婦之服鞠衣九嬪也展衣世婦也緣衣女御也外命婦其夫孤則服鞠衣卿大夫則服展衣士則服緣衣也此六服之序上文主婦之被既為次則錫衣當是緣衣缘字與緆相似一訛而為緆再訛而為錫有由然也又案玉藻士禒衣亦謂其妻也追師注衣鞠衣展衣者服編衣緣衣者服次次亦名髲鬄采蘩詩又謂之被則被字自可以髲鬄釋之不必改讀被錫二字為髲鬄也古者男女吉凶之衣衣身二尺二寸􅃑亦二尺二寸祛則一尺二寸其下圜殺之侈􅃑者葢不圜殺其下而􅃑亦二尺二寸耳婦服雖連衣裳而衣裳固各自為度也若三尺三寸則衣太長裳太短不稱其體矣况男子之殊衣裳者乎説見䘮服記又案特牲士妻主婦綃衣疏云綃衣六服外之下者以士妻緣衣外更無衣故特牲自祭辟助祭於公則服六服外之綃衣若大夫妻助祭於公服展衣少牢自祭則有士妻之褖衣可服又何必服六服外之綃衣耶鄭注大夫妻尊亦衣綃衣未確蕙田案莊子秃而施髲即此被字錫漢樂府云曳阿錫注云細布言布滑易如錫也以細布為衣而侈其袂即褖衣也褖衣與綃衣俱以布為之服禒衣者首服次次即被也佐食上利執羊爼下利執豕爼司士三人執魚腊膚爼序升自西階相從入設爼羊在豆東豕亞其北魚在羊東腊在豕東特膚當爼北端注相助也蕙田案此設五爼于尸席執爼之人以序而升相從而入相如字不必讀作去聲主婦自東房執一金敦黍有葢坐設於羊爼之南婦贊者執敦稷以授主婦主婦興受坐設於魚爼南又興受贊者敦黍坐設於稷南又興受贊者敦稷坐設於黍南敦皆南首主婦興入於房注敦有首者尊者器飾也飾葢象龜周之禮飾器各以其類龜有上下甲敖氏繼公曰金敦以金飾之也四敦皆然特見其一耳欽定義疏凡敦皆有首足士䘮禮用瓦敦而曰面足有足則有首可知是首非飾也啟㑹而猶云面足則首足之象亦不専在於葢矣此以金為飾則瓦敦其不飾者與特牲禮先云兩敦後云佐食分簋鉶二者互言之則一器而二名明矣至其形制前人訖無定説闕之可也蕙田案此主婦親設四敦敦形似獸而首向南耳注何所據而必象龜形耶祝酌奠遂命佐食啟會佐食啟會葢二以重設於敦南注酌奠酌酒為神奠之後酌者酒尊要成也特牲饋食禮曰祝洗酌奠奠于鉶南重累之疏迎尸之前將為隂厭為神不為尸故云為神奠之髙氏愈曰諸侯有鬱鬯以灌地降神大夫無之止酌酒奠神而神若來享之故祝遂出迎尸也主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歳事於皇祖伯某以某妃配某氏尚饗主人又再拜稽首注羊曰柔毛豕曰剛鬛嘉薦菹醢也普淖黍稷也普大也淖和也徳能大和乃有黍稷春秋傳曰奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也張氏爾岐曰牲物異號以殊人用也蕙田案以上迎尸之前設饌祝神曰隂厭祝出迎尸於廟門之外主人降立於阼階東西面祝先入門右尸入門左注主人不出迎尸伸尊也特牲饋食禮曰尸入主人及賔皆辟位出亦如之祝入門右者辟尸盥也既則後尸之疏自此盡牢肺正脊加于肵論尸入正祭事宗人奉槃東面于庭南一宗人奉匜水西面于槃東一宗人奉簞巾南面于槃北乃沃尸盥于槃上卒盥坐奠簞取巾興振之三以授尸坐取簞興以受尸巾注庭南沒霤近疏庭南者于庭南是沒盡門屋霤近門而盥也是以特牲亦云尸入門北面盥繼門而言即亦此沒霤者也蕙田案舊監本脱以授尸坐取簞興七字今依敖氏本及新刊本添入祝延尸尸升自西階入祝從注由後詔相之曰延延進也周禮曰大祝相尸禮祝從從尸升自西階主人升自阼階祝先入主人從注祝接神先入宜也蕙田案以上尸入尸升筵祝主人西面立于户内祝在左注主人由祝後而居右尊也祝從尸尸即席乃卻居主人左祝主人皆拜妥尸尸不言尸答拜遂坐注拜妥啐拜之使安坐也尸自此答拜遂坐而卒食其間有不奠不嘗鉶不告㫖大夫之禮尸彌尊也不告㫖者為初亦不饗所謂曲而殺盛氏世佐曰不祝饗與士禮異者以有儐尸于堂之禮故畧之與祝反南面注未有事也堕祭爾敦官各肅其職不命敖氏繼公曰妥尸事畢也南面云反以見從尸入時位在此蕙田案以上妥尸尸取韭菹辨㨎於三豆祭於豆間上佐食取黍稷于四敦下佐食取牢一切肺於爼以授上佐食上佐食兼與黍以授尸尸受同祭於豆祭注牢羊豕也同合也合祭於爼豆之祭也黍稷之祭為墮祭將食神餘尊之而祭之今文辨為徧亦疏隂厭是神食後尸來即席食尸餕鬼神之餘故尸尊神而祭之楊氏復曰切肺祭肺也三取其一也爼豆當作菹豆上佐食舉尸牢肺正脊以授尸上佐食爾上敦黍於筵上右之注爾近也或曰移也右之便尸食也重言上佐食明更起不相因楊氏復曰案賈疏授尸下有尸受祭肺四字主人羞肵爼升自阼階置於膚北注羞進也肵敬也親進之主人敬尸之加加疏為尸特故云加蕙田案此主人親設肵爼上佐食羞兩鉶取一羊鉶於房中坐設於韭菹之南下佐食又取一豕鉶於房中以從上佐食受坐設於羊鉶之南皆芼皆有柶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶注芼菜也羊用苦豕用薇皆有滑者疏芼菜者菜是地之芼知羊用苦豕用薇皆有滑按公食大夫記云鉶芼牛藿羊苦豕薇皆有滑是也蕙田案此二佐食羞羊鉶豕鉶食舉注舉牢肺正脊也先食啗之以為道也貴疏特牲舉肺脊以授尸注肺氣之主也脊體之也先食啗之所以道食通氣是也三飯注食以黍上佐食舉尸牢幹尸受振祭嚌之佐食受加於肵注幹正脅也古文幹為肝亦疏上文食舉是正脊故知此食幹先取正脅也上佐食羞胾兩瓦豆有醢亦用瓦豆設於薦豆之北注設于薦豆之北以其加也四豆亦䋫羊胾在南豕胾在北無臐膮者尚牲不尚味尸又食食胾上佐食舉尸一魚尸受振祭嚌之佐食受加於肵横之注又復也或言食或言飯食大名小數曰飯魚横之者異于肉疏少牢特牲言三飯五飯九飯之等据一口謂之一飯五口謂之五飯故云小數曰飯又食上佐食舉尸腊肩尸受振祭嚌之上佐食受加于肵注腊魚皆一舉者少牢二牲畧之腊必舉肩以肩為終也别舉魚腊崇威儀魚疏特牲獸魚常一時同舉而此獸别舉故云崇威儀又食上佐食舉尸牢骼如初注如舉幹也又食注不舉者卿大夫之禮不過五舉須侑尸疏云五舉者舉牢肺脊一也牢幹二也一魚三也腊肩四也牢骼五也尸告飽祝西面於主人之南獨侑不拜侑曰皇尸未實侑注侑勸也祝獨勸者更則尸飽實猶飽也祝既侑復反南面祝疏此與特牲皆有尸飯法天子諸侯亦當有之故大九拜之下云以享侑祭祀注云侑勸尸食而拜若然士三飯即告飽而侑大夫七飯告飽而侑諸侯九飯告飽而侑天子十一飯而侑也陳氏禮書飯必告飽而告飽必侑侑禮有拜以致其敬有辭以道其勤有樂以樂其心特牲尸告飽祝侑主人拜少牢尸告飽主人拜侑此拜以致其敬也少牢祝侑曰皇尸未實侑此辭以道其勤也大祝逆尸令鐘鼓侑亦如之此樂以樂其心也然特牲三飯告飽而侑少牢七飯告飽而侑則九飯三侑飯寡而侑多十一飯再侑飯多而侑寡者葢禮殺者儀蹙故告飽速而侑多禮隆者儀紓故告飽遲而侑少此侑禮所以不同也尸又食上佐食舉尸牢肩尸受振祭嚌之佐食受加於肵注四舉牢體始于正脊終于肩尊于始終後疏正脊及肩皆體之貴者故先舉正脊為食之始舉肩為食之終尸不飯告飽祝西面於主人之南注祝當贊主人辭䟽以其西面是祝之有事之位故從南向西面位也主人不言拜侑注祝言而不拜主人不言而拜親踈之宜尸又三飯注為祝一飯為主人三飯尊卑之差凡十一飯下人君也上佐食受尸牢肺正脊加於肵注言受者尸授之也尸授牢幹而實舉于菹豆食畢操以授佐食焉疏上文初食舉不言置舉之所至此尸十一飯後乃言上佐食受尸牢肺正脊加于肵者約特牲舉肺脊其時尸實舉于菹豆今尸食畢尸乃于菹豆上取而授上佐食蕙田案以上正祭尸食蕙田案禮以饋食為名故正祭先饋黍牢至酳尸乃酌酒獻為初獻主人降洗爵升北面酌酒乃酳尸尸拜受主人拜送注酳猶羡也既食之而又飲之所以樂之古文酳作酌故疏自此盡折一膚論主人酳尸之事酳取饒羡之義以為樂之也尸祭酒啐酒賔長羞牢肝用爼縮執爼肝亦縮進末鹽在右注羞進也縮從也鹽在肝右便尸擩之古文縮為蹙疏在尸之左尸左執爵右兼取肝㨎於爼鹽振祭嚌之加于菹豆卒爵主人拜祝受尸爵尸答拜注兼兼羊豕蕙田案以上主人酳尸祝酌受尸尸醋主人主人拜受爵尸答拜主人西面奠爵又拜注主人受酢酒俠爵拜彌尊尸俠疏使祝代酌已是尊尸主人拜受訖又拜為拜是彌尊尸也蕙田案祝酌受尸受當作授敖本及新刊本並同上佐食取四敦黍稷下佐食取牢一切肺以授上佐食上佐食以綏祭注綏或作挼挼讀為堕將受嘏亦尊尸餘而祭之疏周禮守祧既葬則藏其堕取堕減之義也主人受嘏之時先堕祭是以佐食授黍稷與主人為堕禮主人左執爵右受佐食坐祭之又祭酒不興遂啐酒注右受佐食右手受堕于佐食也至此言坐祭之者明尸與主人為禮也尸恒坐有事則起主人恒立有事則坐疏禮器云周坐尸曲禮立如齊鄭云齊謂祭祀時祝與二佐食皆出盥於洗入二佐食各取黍於一敦上佐食兼受摶之以授尸尸執以命祝注命祝以嘏辭以疏謂命祝使出嘏辭嘏于主人下文是也敖氏繼公曰三人皆為將執所嘏之物而盥敬其事也卒命祝祝受以東北面于户西以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之注嘏大也予主人以大福工官也承猶傳也來讀曰釐釐賜也耕種曰稼勿猶無也替廢也引長也言無廢止時長如是也疏案特牲尸親嘏主人此使祝嘏者大夫尸尊故不親特牲無嘏文不具也蕙田案敖氏讀來如來禹之來為是主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懐之實于左袂挂于季指執爵以興坐卒爵執爵以興坐奠爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納諸内注詩猶承也實于左袂便右手也季猶小也出出户也宰夫掌飲食之事者收歛曰嗇明豐年乃有黍稷也復嘗之者重之至也納猶入也蕙田案以上尸醋主人命祝嘏主人獻祝設席南面祝拜於席上坐受注室中迫狹室疏大夫士廟皆兩下五架正中曰棟棟南兩架北亦兩架棟南一架名曰楣前承簷以前名曰􅔑棟北一架為室南壁而開户即是一架之開廣為室故云迫狹也蕙田案室在堂北室於堂居四之一天子至大夫士並同不獨大夫士為迫狹亦不因四注而下分廣狹也郝仲輿謂室為事神行禮陳設之所非狹也禮豈因地狹遂簡是也主人西面答拜注不言拜送下尸薦兩豆菹醢注葵菹蠃醢是疏葵菹蠃醢饋食之豆當饋食之節今祝用之亦其常事蕙田案薦者敖氏以為宰夫姜上均以為主婦盛世佐泛云有司當以盛説為是敖氏又以朝事之豆易饋食之豆亦不可從佐食設爼牢髀横脊一短脅一腸一胃一膚三魚一横之腊兩髀屬於尻注皆升下體祝賤也魚横者四物共爼殊之也腊兩髀屬于尻尤賤不殊體疏髀與短脅横脊皆羊豕之下體屬于尻又腊之下為祝賤故也魚獨在爼縮載今横者為四物共爼横而殊之也縮有七物而云四物者据羊豕魚腊也羊豕體不屬于尻以腊用左右胖故有兩髀尻在中髀與尻相連屬不殊是尤賤也蕙田案祝爼一而雜用五爼之物是祝賤之敖氏以為見其尊未的祝取菹㨎于醢祭於豆間祝祭爼注大夫祝爼無肺祭用膚逺下尸不嚌之膚不盛尸疏特牲尸爼有祭肺離肺祝爼有離肺無祭肺是下今大夫祝離肺祭肺俱無是逺下尸也離肺祭訖嚌之加于爼今以膚替肺是不盛故不嚌祭酒啐酒肝牢從祝取肝㨎于鹽振祭嚌之不興加于爼卒爵興注亦如佐食授爵乃興不拜既爵大夫祝賤也士疏特牲祝卒爵則拜卑故祝不賤蕙田案肝牢當從敖氏作牢肝主人酌獻上佐食上佐食戸内牖東北面拜坐受爵主人西面答拜佐食祭酒卒爵拜坐授爵興注不啐而卒爵者大夫之佐食賤禮畧子疏特牲佐食亦啐天子諸侯禮雖亡或對天諸侯佐食啐乃卒爵貴故也敖氏繼公曰凡室中北面拜者皆在戸牖間卒爵拜之拜葢衍文爼設於兩階之間其爼折一膚注佐食不得成禮于室中折者擇取牢正體餘骨折分用之郝氏敬曰折一膚豕肉一片折分也主人又獻下佐食亦如之其脀亦設於階間西上亦折一膚注上佐食既獻則出就其爼特牲記曰佐食無事則中庭北面謂此時蕙田案以上主人獻祝佐食蕙田案自主人降洗爵至此初獻禮竟有司贊者取爵于篚以升授主婦贊者于房户注男女不相因婦贊者受以授主婦主婦洗於房中出酌入户西面拜獻尸注入户西面拜由便也不北面者辟人君夫人也拜而後獻者當俠拜也昏禮曰婦洗在北堂直室東隅郝氏敬曰出酌出房酌酒于房户間之甒尸拜受主婦主人之北西面拜送爵注拜于主人之北西面婦人位在内此拜于北則上拜于南由便也郝氏敬曰主婦又拜送所謂俠拜也尸祭酒卒爵主婦拜祝受尸爵尸答拜易爵洗酌授尸注祝出易爵男女不同爵髙氏愈曰士禮亞獻之時主婦有設兩籩及兄弟長以燔從之禮此不設者以後有儐尸之禮故也主婦拜受爵尸答拜上佐食綏祭主婦西面于主人之北受祭祭之其綏祭如主人之禮不嘏卒爵拜尸答拜注不嘏夫婦一體敖氏繼公曰士妻撫祭内子受祭又有于房于室之異皆相變也蕙田案以上主婦獻尸尸酢主婦以爵出贊者受易爵于篚以授主婦于房中注贊者有司贊者也易爵亦以授婦贊者婦贊者受房户外入授主婦主婦洗酌獻祝祝拜坐受爵主婦答拜于主人之北卒爵不興坐授主婦注不狹拜下尸也主婦受酌獻上佐食于户内佐食北面拜坐受爵主婦西面答拜祭酒卒爵坐授主婦主婦獻下佐食亦如之主婦受爵以入于房注不言拜于主人之北可知也爵奠于内篚蕙田案以上主婦獻祝佐食蕙田案亞獻禮至此竟賔長洗爵獻于尸尸拜受爵賔户西北面拜送爵尸祭酒卒爵賔拜祝受尸爵尸答拜祝酌授尸賔拜受爵尸拜送爵賔坐奠爵遂拜執爵以興坐祭遂飲卒爵執爵以興坐奠爵拜尸答拜蕙田案以上賔長獻尸尸酢賔酌獻祝祝拜坐受爵賔北面答拜祝祭酒啐酒奠爵于其筵前注啐酒而不卒爵祭事畢示醉也不獻佐食將儐尸禮殺楊氏復曰案啐爵當作卒爵蕙田案以上賔長獻祝蕙田案終獻禮至此竟主人出立於阼階上西面祝出立於西階上東面祝告曰利成注利猶養也成畢也孝子之養禮畢事疏自此盡廟門論祭把畢尸出廟之敖氏繼公曰階上亦皆序内也祝入尸謖主人降立於阼階東西面注謖起也謖或作休祝先尸從遂出於廟門注事尸之禮訖於廟門外于疏上祝迎尸于廟門今禮畢又送尸廟門按祭統尸在廟門外則疑于臣是以据廟門為斷蕙田案以上祭畢尸出廟祝反復位于室中主人亦入於室復位祝命佐食徹肵爼降設於堂下阼階南注徹肵爼不出門將儐尸也不云尸爼未歸尸司宮設對席乃四人􅅪注大夫禮四人餕明惠大也也疏祭統云凡餕之道布興施惠之象特牲二人餕惠之小者大夫四人餕明惠之大者也上佐食盥升下佐食對之賔長二人備注備四人餕也三餕亦盥升下疏對者不謂東西相當直取東面西面為對佐食西面近北也賔長二人亦不相當故云備不言對也司士進一敦黍於上佐食又進一敦黍于下佐食皆右之于席上注右之者東面在南西面在北疏東面在南据上佐食西面在北据下佐食右之者飯用手右之便故也資黍于羊爼兩端兩下是餕注資猶减也减置于羊爼兩端則一賔長在上佐食之北一賔長在下佐食之南疏兩下者据二賔長地道尊右故二佐食皆在右上佐食居尸坐處明知位次如此司士乃辨舉􅅪者皆祭黍祭舉注舉舉膚今文辨為徧舉疏以尸舉肺餕者下尸當膚主人西面三拜􅅪者􅅪者奠舉於爼皆答拜皆反取舉注三拜旅之示徧也言反者拜時或反其席在東面席者東面拜在西面席者皆南面拜疏在西面席者以主人在南西面不得與主人同面而拜明迴身南面向主人而拜也司士進一鉶於上􅅪又進一鉶於次􅅪又進二豆湆於兩下乃皆食食舉注湆肉汁也有疏神坐之上止羊豕二鉶一進與上佐食一進與下佐食故更羞二豆湆于兩下湆從門外鑊中來以兩下無鉶故進湆也敖氏繼公曰二豆湆亦羊豕各一卒食主人洗一爵升酌以授上􅅪贊者洗三爵酌主人受於户内以授次􅅪若是以辨皆不拜受爵主人西面三拜􅅪者􅅪者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜注不拜受爵者大夫餕者賤也答一拜畧也古文一為壹也欽定義疏特牲􅅪者拜受爵少牢􅅪者不拜受爵亦禮之相變也非關餕者之貴賤而然凡餕之道每變以衆君卿大夫皆餕焉豈有主祭者尊而􅅪反賤乎􅅪者三人興出注出降反賔位上􅅪止主人受上􅅪爵酌以醋于户内西面坐奠爵拜上􅅪答拜坐祭酒啐酒注主人自酢者上􅅪獨止當尸位尊不酌也上􅅪親嘏曰主人受祭之福胡夀保建家室注親嘏不使祝授之亦以黍敖氏繼公曰胡如胡福之胡欽定義疏特牲禮有祝辭無嘏辭祝曰􅅪有以也見興惠逮下之意以士之餕者嗣子及長兄弟親者也親主於愛少牢禮有嘏辭無祝辭嘏曰主人受祭之福胡夀保建家室則歸福于主人之意以大夫之餕者佐食及賔疏者也疏主于敬故也士冠禮注云胡猶遐也逺也蕙田案注云以黍敖云不用黍惟以辭别于尸据經無以黍之文當從敖氏主人興坐奠爵拜執爵以興坐卒爵拜上􅅪答拜上􅅪興出主人送乃退注送佐食不拜賤佐疏賔主之禮賔出主人皆拜送此食送之而不拜故云賤也欽定義疏大夫不以嗣舉奠辟諸侯世子之禮也既不舉奠故亦不與于餕下篇佐食不與于賔尸之禮葢自餕而後佐食無事矣長賔在上佐食之左東面衆賔長在下佐食之左西面蕙田案以上餕蕙田案少牢大夫禮較特牲士禮加隆乃此經自主婦獻尸以至尸謖其儀節視特牲大簡以特牲不儐尸而少牢有儐尸禮此聖人制禮損益之節也右儀禮少牢饋食禮五禮通考卷一百十一
