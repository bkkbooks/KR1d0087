body:
  text: 五禮通考卷一百五刑部尚書秦蕙田撰吉禮一百五私親廟中庸舜其大孝也與德為聖人尊為天子富有四海之内宗廟饗之子孫保之疏子孫保之者師說云舜禪與禹何言保者此子孫承保祭祀故云保周時陳國是舜之後也朱子集註子孫謂虞思陳胡公之屬纂箋夏后之時猶封虞思虞遂至周武王克殷乃復求舜後封於陳為胡公章句以舜子孫不止此故以之屬二字該之蕙田案此舜宗廟饗之子孫保之迺萬世私親廟之凖則也書曰受終于文祖又曰格于文祖是將攝位即位而告於堯廟之祖也又曰受命于神宗是將禪位於禹而告於宗堯之廟也舜嗣堯故宗堯而不為瞽瞍立考廟此云宗廟當是虞國之廟國語所稱祖顓頊與虞幕能聽協風以成樂物生有虞氏報焉者葢舜以大德而為天子以其身宗堯之統别為虞氏立祖考之廟俾子孫承其祀厥後虞思陳胡公之屬享國弗替焉此正中庸所稱大孝之實也若使舜為天子而自立宗廟傳禹而後子孫安得有之哉故知宗廟饗子孫保是一順事非後世立廟稱宗追尊升祔者所得而藉口也詳見廟制條右有虞氏漢書宣帝本紀孝宣皇帝武帝曾孫戾太子孫也太子納史良娣生史皇孫皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事元平元年四月昭帝崩無嗣大將軍霍光請皇后徴昌邑王六月丙寅王受皇帝璽綬癸已光奏王滛亂請廢秋七月光奏議曰禮人道親親故尊祖尊祖故敬宗大宗無嗣擇支子孫賢者為嗣孝武皇帝曾孫病已有詔掖庭養視至今年十八操行節儉仁慈愛人可以入嗣孝昭皇帝後奏可遣迎入未央宫封陽武侯已而羣臣奏上璽綬即皇帝位本始元年六月詔曰故皇太子在湖未有號謚歲時祠其議謚及園邑武五子傳有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰閑謹行視孝昭帝所為故皇太子起位在湖史良娣冢在博望苑北親史皇孫位在廣明郭北謚法曰謚者行之迹也愚以為親謚宜曰悼母曰悼后比諸侯王園置奉邑三百家故皇太子謚曰戾置奉邑二百家史良娣曰戾夫人置守冢三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園長安白亭東為戾后園廣明成鄉為悼園皆改葬焉後八歲有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉明縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家元康元年夏五月立皇考廟益奉明園户為奉明縣師古曰奉明園即皇考史皇孫之所葬也本名廣明後追改􅅊𤣥成傳平帝元始中大司馬王莽奏本始元年丞相義等議蔡義也謚孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏師古曰魏相也父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉明園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此兩統貳父違於禮制案義奏親謚曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖繆本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之髙祖受命而王者也非謂繼祖統為後者也臣請皇髙祖考廟奉明園毁勿修罷南陵雲陵為縣奏可文獻通考胡氏寅曰禮曰為人後者為其父母降不敢貳尊也既名其所後為父母則不得名其所生曰父母矣而禮有為其父母降是猶以父母名之何此所謂不以辭害意也立言者顧不可曰為其伯父伯母叔父叔母降故假曰父母以明當降之義降則不可名之曰父母矣宣帝初有司奏請戾太子及悼后之諡首言為人後者云云後言故太子諡曰戾云云首尾皆是也而中有稱親之言則非也詔書問故太子未及史皇孫雖包含意指有司直對太子良娣之謚可也而前據經義後上戾名中特稱親以中帝意豈非姦說乎夫親深言之則非父不可當若曰文王之為世子有父之親是也泛言之則所厚者皆可稱若曰親者無失其為親是也有司之言果何從歟若避曰考故以親言是疏之也知其不可稱考而姑曰親以包舉之是不正名亦疏之也以其不得於言知其不契於理既為伯叔父母之後而父母之則當降所生父母而伯父母之叔父母之昭昭然矣馬氏廷鸞曰胡氏之說辨則辨矣而施之宣帝之世則不可敢問宣帝而欲稱其所生之父母也將為伯父乎為叔父乎於所後父為兄則伯父也於所後父為弟則叔父也而宣帝則有所後祖無所後父者也昭帝崩無嗣宣帝以兄孫為叔祖後者也不得其所後之父而父之則何以稱其所生之父乎先是昌邑王以兄子入繼則考昭帝可也昭帝葬矣易月之制終矣昌邑廢矣宣帝始以兄孫入繼當時唯言嗣孝昭皇帝後而已則未知其為子乎為孫乎必也升一等而考昭帝則又將降一等而兄史皇孫矣可乎不可有司未有所處姑縁其所生父直稱之曰皇考而已故曰胡氏辨則辨矣施之宣帝之世則不可當俟通儒而質之戴氏震曰漢宣帝之入嗣也後昭帝有所後祖無所後父丞相相等奏悼園宜尊稱號曰皇考立廟胡氏之論曰既為伯叔父母之後而父母之則當降所生父母而伯叔父母之稱昭昭然矣馬氏駁之曰宣帝以兄孫為叔祖後者也不得其所後之父而父之則何以稱其所生之父乎有司未有所處姑縁其所生父直稱之曰皇考而已今案奏者議者皆非也禮王考廟考廟相逮之道也如宣帝不入嗣固考史皇孫而祖戾太子今既祖昭帝不得祖戾太子矣獨考史皇孫則其稱名疑為疑於昭帝史皇孫之為相逮也者為疑於戾太子史皇孫之非相逮也者疑故不可稱也然則以孫後祖可乎曰可䘮服斬衰章為人後者雷氏曰為人後者為所後之父闕此五字以其所後之父或早卒今所後其人不定或後祖父或後曽髙祖故闕之也此闕之雷氏之云當矣猶未盡葢有承殤而後祖者則無所後之父雷氏但據有所後之父言耳右古人後祖證一孔子曰宗子為殤而死庶子弗為後也鄭注曰明不序昭穆立之廟其祭之就其祖而已代之者主其禮孔頴逹曰以其未成人庶子不得代為之後不以父服服之鄭以殤不立廟解弗為後孔以不從父服解弗為後葢入廟則全乎子服斬則全乎子承殤不為之子也䘮服斬衰有為人後者之條故此言弗為後以别之右古人後祖證二小記為殤後者以其服服之鄭注曰言為後者據承之也殤無為人父之道以本親之服服之夫孔子言弗為後而此又言為殤後鄭以據承之明其為辭之借然不特爾也明乎弗為後之義則於殤者昭穆同列皆得入繼其殤者兄弟也明乎為殤後而不服斬衰之義則於殤者降等皆得入繼其殤者雖叔父也而承之不必子之右古人後祖證三三者互相為義例者也後祖之為昭穆奈何曰惟父子則昭穆異兄弟則昭穆同祖孫則昭穆同上治祖禰下治子孫旁治兄弟推之百世而不易然則祖孫相接無所後父何也曰古經不曰為人子而曰為人後通乎不為子而為後之辭也孫可後祖而非禰祖弟可後兄而非禰兄魯人傷歸父之無後使仲嬰齊為之後弟後兄也後者承先辭也父子之道窮而先後之義起以父子則親重以先後則統重䘮服子夏傳曰特重大宗者降其小宗也大宗者尊之統也此言親不勝統寧屈親親之分以伸大統之尊生乎道之窮斷以義之正有如是者或曰推而至於宣帝有所後祖無所後父禮固有然矣其稱史皇孫也直曰皇考既名疑曰皇伯考若叔考名又無所縁定若之何曰凡為人後者不可一時兩稱父不可曠而無父宋濮議以生例沒斷然當稱皇伯考不可一時兩稱父故也漢宣帝即親存初無一時兩稱之嫌惟以不可曠而無父論之禮雖可以後祖其無所後父者於本生父母私言則曰父母公言則曰本生以别之曰本生父母人豈有非之者哉禮重辨嫌疑而已宣帝不在辨嫌而在辨疑辨嫌不可直稱皇考辨疑亦不可立之廟而直稱皇考不可曠而無父則併不得同於有所後父者之稱皇伯考是故祭告之辭私於所祭之地稱皇考可也公言之曰本生皇考可也丞相義等之議謚曰悼園置邑三百家而不立廟義之正也蕙田案漢宣帝時有司奏稱親史皇孫又稱親謚宜曰悼母曰悼后親之為言即父也倘但曰史皇孫曰王夫人顧不可為其推而逺之幾不知為宣帝何人矣胡氏謂稱親為姦説葢怵于後世之事而為是言耶夫使必禁其稱親將禮所云為人後者為其父母報父母二字亦必不可施於語言乎此有宋濮議所以啟歐陽公之辨也夫辭窮則反本是故謂之其父母則己别於所後父母矣宣帝無所後父母者也有司必不敢曰考曰妣而曰親曰母又僅比諸侯王此亦嚴核于名實矣但厥後直曰皇考則未得禮若曰本生皇考亦無妨也猶之禮曰其父母也至因園為寢而曰皇考廟則疑上與昭帝相承無别雖在廟制之外然非禮矣右漢宣帝哀帝本紀孝哀皇帝元帝庶孫定陶共王子也母曰丁姫成帝亡子立為皇太子後月餘立楚孝王孫景為定陶王奉共王嗣所以奬厲太子專為後之誼綏和二年三月成帝崩四月丙午太子即皇帝位太皇太后詔尊定陶共王為共皇五月詔曰春秋母以子貴尊定陶太后曰恭皇太后丁姬曰恭皇后建平二年詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后恭皇后曰帝太后立恭皇廟于京師六月庚申帝太后丁氏崩上曰朕聞夫婦一體詩云穀則異室死則同穴祔葬之禮自周興焉帝太后宜起陵恭皇之園遂葬定陶發陳留濟隂近郡國五萬人穿復土蕙田案此立私親廟于京師之始定陶共王傳定陶共王康永光三年立為濟陽王八年徙為山陽王八年徙定陶王十九年薨子欣嗣十五年成帝無子徴入為皇太子上以太子奉大宗後不得顧私親乃立楚思王子景為定陶王奉共王後成帝崩太子即位是為孝哀帝即位二年追尊共王為共皇帝置寢廟京師序昭穆儀如孝元帝如淳曰恭王元帝子也為廟京師列昭穆之次如元帝言如天子之儀徙定陶王景為信都王云如淳曰不復為定陶王立後者哀帝自以己為後故孝元傅昭儀傳孝元傅昭儀哀帝祖母也產一男一女女為平都公主男為定陶共王元帝崩隨王歸國稱定陶太后共王薨子代為王王母曰丁姬成帝無繼嗣徴立為太子哀帝即位髙昌侯董宏希㫖上書言宜立丁姬為帝太后師丹劾奏宏懷邪誤朝不道上初即位謙讓從師丹言止後廼白令皇太后下詔尊定陶共王為共皇哀帝因是曰春秋母以子貴尊傅太后為共皇太后丁姬為共皇后後歲餘為共皇立寢廟於京師比宣帝父悼皇考制度序昭穆于前殿師丹傳郎中令冷褒黄門郎段猶等奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號車馬衣服宜皆稱皇之意師古曰副稱之也置吏二千石以下各供厥職又宜為共皇立廟京師上覆下其議有司皆以為宜如褒猶言丹獨議曰聖王制禮取法於天地尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共皇為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊無二上之義也定陶共皇號謚已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不堕之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合上意免為庶人平帝即位新都侯王莽白太皇太后發掘傅太后丁太后冢奪其璽綬更以民葬之定陶堕廢共皇廟蕙田案宣帝稱親曰皇考如離騷篇首朕皇考曰伯庸似古人通稱皇之為言美也大也君也亦猶禮曰其父母也至此定陶共皇之稱非宣帝稱皇考比也皇即帝也不曰帝而曰皇明知必不可尊稱帝也然以皇代之其理不直其名不正固顯然矣又立寢廟于京師列昭穆之次更非宣帝因園為寢之比師丹言定陶共皇謚已前定不得復改而堅持立廟京師使臣下祭之為無主明前之失在私尊定陶共皇後之失乃以共皇而亂天子宗廟鉅制也無主之言大義凛然及後王莽假經義以竊權既請皇髙祖考廟奉明園毁勿修又堕廢共皇廟甚且掘傅太后丁太后冢奪其璽綬雖小人悖罔罪不容誅然其所以致之者可不思哉右漢哀帝平帝本紀孝平皇帝元帝庶孫中山孝王子也母曰衛姬年三歳嗣立為王元夀二年六月哀帝崩九月辛酉中山王即皇帝位元始元年立故桃鄉頃侯子成都為中山王中山衛姬傳衛姬平帝母也配孝王生平帝孝王薨代為王哀帝崩無嗣迎立為帝莽懲丁傅行事以帝為成帝後母衞姬及外家不當得至京師廼更宗室桃鄉侯子成都為中山王奉孝王後蕙田案平帝未立私親廟右漢平帝後漢書光武本紀建武三年正月辛巳立皇考南頓君以上四廟張純傳純以宗廟未定昭穆失序十九年乃與太僕朱浮共奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元帝以來宗廟奉祠髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事大宗則降其私親今禘祫髙廟陳叙昭穆而舂陵四世君臣並列以卑厠尊不合禮意昔髙祖以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴涉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩帝從之祭祀志建武十九年上可涉等議詔曰以宗廟處所未定且合祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵歲時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽髙廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故髙廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬰林太守稱皇曾祖考廟節侯稱皇髙祖考廟在所郡縣侍祠漢官儀曰光武第雖十二於父子之次於成帝為兄弟於哀帝為諸父於平帝為祖父皆不可為之後上至元帝於光武為父故上繼元帝而為九代故河圖云赤九會昌謂光武也然則宣帝為曽祖故追尊及祠之劉攽曰注案世數宣帝于光武猶是祖此多一曾字文獻通考胡氏寅曰西漢自孝成而後三世無嗣王莽簒時漢祚既絶光武掃平禍亂奮然崛起雖祖髙祖而帝四親非與哀朝尊崇藩統同事於義未有大不可者然一聞純等建議斷然從之曾無留難章陵四祠蔑有異等彼何所為而然耶寡恩之誚既不聞於當年失禮之議又不生於後代以是較之宣哀過舉益明而禮所載為人後者為其父母降而不得祭豈可違而不守哉右後漢光武帝安帝本紀恭宗孝安皇帝諱祐肅宗孫也父清河王慶母左姬延平元年慶始就國鄧太后特詔留帝清河邸八月殤帝崩太后與兄車騎將軍鄧隲定䇿迎帝齋于殿中拜長安侯皇太后詔曰長安侯祐年已十三有成人之志親德係後莫宜于祐禮昆弟之子猶己子春秋之義為人後者為之子不以父命辭王父命其以祐為孝和皇帝嗣又作䇿命曰惟延平元年秋八月癸丑皇太后曰咨長安侯祐孝和皇帝懿德巍巍光于四海朕惟侯孝章皇帝世嫡皇孫宜奉郊廟今以侯嗣孝和皇帝後讀䇿畢太尉奉上璽綬即皇帝位十二月甲午清河王薨使司農持節弔祭永初元年三月甲申葬清河孝王贈龍旂虎賁祭祀志安帝以清河孝王子即位建光元年追尊父清河孝王曰孝德皇母曰孝德后清河嗣王奉祭而已清河孝王慶傳慶母宋貴人慶就國鄧太后以殤帝襁抱逺慮不虞留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黄門送耿姬歸國帝所生母左姬卒葬于京師慶立凡二十五年薨永初元年太后崩有司言清河孝王至德淳懿載育明聖承天奉祚為郊廟主漢興髙皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑大宗之義舊章不忘宜上尊號曰孝德皇皇妣左氏曰孝德后孝德皇母宋貴人追謚曰敬隱后乃告祠髙廟使司徒持節與大鴻臚奉冊書璽綬清河追上尊號又遣中常侍奉太牢祠典䕶禮儀侍中劉珍等及宗室列侯皆往會事尊陵曰甘陵廟曰昭廟置令丞設兵車周衞比章陵復尊耿姬為甘陵大貴人蕙田案清河孝王雖加尊號崇奉陵廟然未立廟京師但嗣王奉祀于其國而已右後漢安帝質帝本紀孝質皇帝諱纘肅宗元孫曾祖千乘貞王伉祖樂安夷王寵父勃海孝王鴻母陳美人冲帝不豫大將軍冀徴帝到洛陽都亭冲帝崩太后與冀定䇿禁中丙辰迎帝入南宮丁巳封建平侯其日即皇帝位蕙田案質帝之不得追尊其父蔡邕以為偪于梁后及梁冀也右後漢質帝桓帝本紀孝桓皇帝諱志肅宗曽孫也祖河間孝王開父蠡吾侯翼母匽氏翼卒帝襲為侯本初元年梁太后徴帝到夏門門亭將妻以女弟㑹質帝崩太后與兄大將軍冀迎帝入南宮即皇帝位時年十五九月戊戌追尊皇祖河間孝王曰孝穆皇夫人趙氏曰孝穆皇后皇考蠡吾侯曰孝崇皇冬十月甲午尊皇母匽氏為孝崇博園貴人建和二年四月封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人馬氏為孝崇園貴人和平元年五月尊博園匽貴人曰孝崇皇后二年四月孝崇皇后匽氏崩五月葬孝崇皇后于博陵延熹元年六月分中山置博陵郡以奉孝崇皇園陵河間孝王開傳蠡吾侯翼元初六年鄧太后徴河間王諸子詣京師竒翼美儀容故以為平原懷王後焉歲餘貶為都鄉侯翼卒子志嗣為大將軍梁冀所立是為桓帝梁太后詔追尊河間孝王為孝穆皇夫人趙氏曰孝穆后廟曰清廟陵曰樂成陵蠡吾先侯曰孝崇皇廟曰烈廟陵曰博陵皆置令丞使司徒持節奉冊書璽綬祠以太牢建和二年更封帝兄都鄉侯顧為平原王留博陵奉翼後祭祀志桓帝以清河孝王孫蠡吾侯即位亦追尊祖考王國奉祀蕙田案桓靈祖父皆有廟名如祭祀志所言則廟雖立仍不過以嗣王奉祠也右後漢桓帝靈帝本紀孝靈皇帝諱宏肅宗元孫也曽祖河間孝王開祖淑父萇世封解瀆亭侯帝襲侯爵母董夫人桓帝崩無子太后與父城門校尉竇武定䇿禁中使持節至河間奉迎建寧元年正月庚子即皇帝位時年十二閏二月甲午追尊皇祖為孝元皇夫人夏氏為孝元皇后考為孝仁皇夫人董氏為慎園貴人熹平三年六月封河間王利子康為濟南王奉孝仁皇祀河間孝王傳解瀆亭侯淑以河間王子封淑卒子萇嗣萇卒子宏嗣為大將軍竇武所立是為靈帝建寧元年竇太后詔追尊皇祖淑為孝元皇夫人夏氏曰孝元后陵曰敦陵廟曰靖廟皇考萇為仁皇夫人董氏為慎園貴人陵曰慎陵廟曰奐廟皆置令丞使司徒持節之河間奉䇿書璽綬祠以太牢常以嵗時遣中常侍持節之河間奉祠熹平三年使使拜河間安王利子康為濟南王奉孝仁皇祠祭祀志桓帝無嗣靈帝以河間孝王曾孫解瀆侯即位亦追尊祖考右後漢靈帝蔡邕獨斷髙祖得天下而父在上尊號曰太上皇不言帝非天子也孝宣繼孝昭帝其父曰史皇孫祖父曰衛太子太子以罪廢及皇孫皆死宣帝起園陵長丞奉守不敢加尊號於祖父也光武繼孝元亦不敢加尊號於祖父也世祖父南頓令曰皇考祖鉅鹿都尉曰皇祖曾祖鬱林太守曰皇曾祖髙祖舂陵節侯曰皇髙祖起陵廟置章陵以奉祀之而已至殤帝崩無子弟安帝以和帝兄子從清河王子即尊號依髙帝尊父為太上皇之義追號父清河王曰孝德皇順帝崩冲帝無子弟立安樂王子是為質帝帝偪于順烈梁后父大將軍梁冀未得尊其父而崩桓帝以蠡吾侯子即尊位追尊父蠡吾先侯曰孝崇皇母匽太夫人曰孝崇后祖父河間孝王曰孝穆皇祖母妃曰孝穆后桓帝崩無子今上即位追尊父解瀆亭侯曰孝仁皇母董夫人曰孝仁后祖父河間敬王曰孝元皇祖母夏妃曰孝元后徐氏乾學曰受命之君追王先世固非奉藩稱臣者所可比蔡氏以太上皇與追崇諸皇相提並論似未協師丹之議蕙田案漢之追尊本生父稱皇大抵依據太上皇之號爾然此號不可襲也宣帝以孫後祖但稱本生父曰皇考而已稱皇實始於哀帝追尊定陶共皇厥後安帝父清河孝王曰孝德皇桓帝父蠡吾侯曰孝崇皇祖河間孝王曰孝穆皇靈帝父解瀆亭侯曰孝仁皇祖曰孝元皇俱相繼起而漢人諱言哀帝但曰法宣帝是誣也惟哀帝既承大統又自以己為定陶共皇後廢前所立定陶王後安帝而下雖追尊本生祖父仍就王國奉祀不立廟京師非特法宣帝光武帝亦鑑於哀帝也蔡邕獨斷叙追號起於安帝豈不欲道哀帝之事與三國魏志明帝紀明帝太和三年詔曰禮王后無嗣擇建支子以繼大宗則當纂正統以奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦惑誤朝議遂尊共皇立廟京師又寵藩妾使比長信僣差無禮人神弗佑罪師丹忠正之諫致丁傅焚如之禍自是之後相踵行之其令公卿有司深以前世為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪𨗳諛君上妄建非正之號謂考為皇稱妣為后則股肱大臣誅之無赦其書之金䇿藏之宗廟是後髙貴常道援立皆不外尊蕙田案明帝此詔大義卓然可法又案悼考曰皇考非直加以皇號也如定陶共皇之稱乃為加以皇號然後世之追稱皇者諱漢哀帝之事而曰法宣帝又後人不得如古者之以皇考為通稱故是詔曰宣帝加悼考以皇也右三國魏明帝論為後附吳志孫皓傳元興元年八月追謚父和曰文皇帝尊母何為太后孫皓傳孫休立封和子皓為烏程侯自新都至本國休薨皓即祚其年追謚父和為文皇帝改葬明陵置園邑二百家令丞奉守後年正月又分吳郡丹陽九縣為吳興郡治烏程置太守四時奉祠有司奏言宜立廟京師寳鼎二年七月使守大匠薛珝營立寢堂號曰清廟十二月遣守丞相孟仁太常姚信等備官僚中軍步騎二千人以靈輿法駕東迎神于明陵皓引見仁親拜送於庭靈輿當至使丞相陸凱奉三牲祭於近郊皓于金城外露宿明日望拜于東門之外其翌日拜廟薦祭歔欷悲感比七日三祭倡伎晝夜娛樂有司奏言祭不欲數數則黷宜以禮斷情然後止吳書曰比仁還中使手詔曰使相繼奉問神靈起居動止巫覡言見和被服顔色如平生日皓悲喜涕淚悉召公卿尚書詣闕門下受賜蕙田案終漢之世追尊本生父但稱皇至吳主皓始稱皇帝右三國吳主皓附晉書孝愍帝本紀孝愍皇帝諱鄴武帝孫吳孝王晏之子也出繼後伯父秦獻王柬襲封秦王建興元年夏四月壬申即皇帝位宋書禮志愍帝建興四年司徒梁芬議追尊之禮帝既不從而右僕射索綝等亦稱引魏志以為不可故追贈吳王為太保而已吳孝王晏傳洛京傾覆晏亦遇害愍帝即位追贈太保右晉愍帝宋書禮志元帝泰興二年有司言琅邪恭王宜稱皇考賀循議云禮典之義子不敢以己爵加其父帝從之二漢此典棄矣琅邪武王伷傳琅邪武王伷太康四年薨恭王覲立太熙元年薨子睿立是為元帝中興初以皇子裒為琅邪王奉恭王祀裒早薨更以皇子煥為琅邪王其日薨復以皇子昱為琅邪王咸和之初既徙封會稽成帝又以康帝為琅邪王康帝即位封成帝長子哀帝為琅邪王哀帝即位以廢帝為琅邪王廢帝即位以會稽王攝行琅邪國祀簡文帝登祚琅邪王無嗣及帝臨崩封少子道子為琅邪王道子後為會稽王更以恭帝為琅邪王帝既即位琅邪國除右晉元帝南齊書明帝本紀髙宗明皇帝始安貞王道生子也隆昌元年太后令廢海陵王以上入纂太祖為第三子建武元年冬十月癸亥即皇帝位十一月乙酉追尊始安貞王為景皇帝妃為懿后建武二年五月甲午寢廟成始安貞王道生傳建武元年追尊為景皇帝妃江氏為后立寢廟於御道西陵曰脩安右齊明帝陳書世祖本紀世祖文皇帝始興昭烈王長子也永定三年六月景午髙祖崩遺詔徴世祖入纂即皇帝位八月庚戌封皇子伯茂為始興王奉昭烈王後髙宗本紀髙宗孝宣皇帝始興昭烈王第二子也天康二年十一月甲寅慈訓太后令廢帝為臨海王以髙宗入纂天建元年春正月甲午即皇帝位立皇子南中即將江州刺史康樂侯叔陵為始興王奉昭烈王祀隋書禮儀志陳文帝入嗣而皇考始興昭烈王廟在始興國謂之東廟天嘉四年徙東廟神主祔于梁之小廟改曰國廟祭用天子儀陳書始興王傳始興王伯茂字鬰之世祖第二子也初髙祖兄始興昭烈王道談仕于梁世為東宮直閤將軍侯景之亂中流矢卒紹泰二年追贈義興郡公謚曰昭烈髙祖受禪改封始興郡王王生世祖及髙宗髙宗以梁承聖末遷於闗右至是髙祖遥以髙宗襲封始興嗣王以奉昭烈王祀永定三年六月髙祖崩是月世祖入纂帝位時髙宗在周未還世祖以本宗乏饗其年十月詔徙封嗣王頊為安成王封第二子伯茂為始興王以奉昭烈王祀右陳文帝宣帝北魏書彭城王傳彭城王勰永平元年薨謚曰武宣王及莊帝即位追號文穆皇帝妃李氏為文穆皇后遷神主於太廟前廢帝時去其神主蕙田案以藩王入繼大統而追崇所生祔主太廟并黜廟中已祔之主降稱伯考實自北魏孝莊始魏收曰髙祖不祀武宣享廟三后降鑒福禄固不永矣誠哉是言也臨淮諫諍事詳見廟制門右北魏孝莊帝前廢帝廣陵王紀前廢帝廣陵王宇之子也莊帝崩爾朱世隆等奉王東郭之外行禪讓之禮普泰元年九月癸已追尊皇考為先帝皇妣王氏為先太妃右北魏廢帝出帝紀出帝廣平武穆王懐之第三子也中興二年夏四月安定王自以疏屬請遜大位齊獻武王與百寮會議僉謂髙祖不可無後乃共奉王戊子即帝位泰昌二年正月丁巳追尊皇考為武穆帝皇太妃馮氏為武穆后皇妣李氏為皇太妃右北魏出帝五代史唐本紀天成二年十二月丙午追尊祖考為皇帝髙祖聿廟號惠祖曾祖敖廟號毅祖祖琰廟號烈祖考廟號德祖立廟於應州馬縞傳縞判太常卿明宗入立繼唐太祖莊宗而不立親廟縞言漢諸侯王入繼統者必别立親廟光武皇帝立四親廟于南陽請如漢故事立廟以申孝享明宗下其議禮部尚書蕭頃等請如縞議宰相鄭珏等議引漢桓靈為比以為桓帝尊其祖解瀆亭侯淑為孝元皇父萇為孝仁皇請下有司定謚四代祖考為皇置園陵如漢故事事下太常博士王丕議漢桓帝尊祖為孝穆皇帝父為孝崇皇帝縞以謂孝穆孝崇有皇而無帝惟吳孫皓尊其父和為文皇帝不可以為法右僕射李琪等議與縞同明宗詔宰臣集百官于中書各陳所見李琪等請尊祖禰為皇帝曾髙為皇宰相鄭珏合羣議奏請四代祖考皆加帝如詔㫖而立廟京師詔可其加帝而立廟應州文獻通考馬氏端臨曰案莊宗以沙陀為唐之嗣明宗又以代北狄裔為莊宗之嗣故後唐之所謂七廟者以沙陀之獻祖國昌太祖克用莊宗存朂而上繼唐之髙祖太宗僖宗昭宗而此所謂四廟者又明宗代北之髙曾祖父也右後唐明帝宋史英宗本紀治平三年正月丁丑皇太后下書中書門下封濮安懿王宜如前代故事王夫人王氏韓氏任氏皇帝可稱親尊濮安懿王為皇夫人為后詔遵慈訓以塋為園置守衞吏即園立廟俾王子孫主祠事如皇太后㫖辛巳詔臣民避濮安懿王諱以王子宗懿為濮國公濮安懿王傳濮安懿王允讓慶厯四年封汝南郡王嘉祐四年薨追封濮王謚安懿仁宗在位久無子乃以王第十三子宗實為皇子仁宗崩皇子即位是為英宗治平元年宰相韓琦等奏請下有司議濮安懿王及譙國夫人王氏襄國夫人韓氏仙遊縣君任氏合行典禮詔須大祥後議之二年乃詔禮官與待制以上議翰林學士王珪等奏曰謹案儀禮䘮服為人後者傳曰何以三年也受重者必以尊服服之為所後者之祖父母妻妻之父母昆弟昆弟之子若子謂皆如親子也又為人後者為其父母傳曰何以期不二斬持重於大宗降其小宗也為人後者為其昆弟傳曰何以大功為人後者降其昆弟也先王制禮尊無二上若恭愛之心分於彼則不得專於此故也是以秦漢以來帝王有自旁支入承大統者或推尊其父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法况前代入繼者多宮車晏駕之後援立之䇿或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下所以負扆端冕富有四海子子孫孫萬世相承皆先帝德也臣等竊以為濮王宜凖先朝封贈期親尊屬故事尊以髙官大國譙國襄國仙遊並封太夫人攷之古今為宜稱於是中書奏王珪等所議未見詳定濮安懿王當稱何親名與不名珪等議濮王於仁宗為兄於皇帝宜稱皇伯而不名如楚王涇王故事中書又奏禮與令及五服年月勅出繼之子於所繼所生皆父母又漢宣帝光武皆稱父為皇考今珪等議稱濮王為皇伯於典禮未有明據請下尚書省集三省御史臺議奏方議而皇太后手詔切責執政於是詔曰如聞集議不一權宜罷議令有司博求典故以聞禮官范鎮等又奏漢之稱皇考稱帝稱皇立寢廟序昭穆皆非陛下聖明之所法宜如前議為便自是御史呂誨等弹奏歐陽修首建邪議韓琦曾公亮趙槩附會不正之罪固請如王珪等議既而内出皇太后手詔曰吾聞羣臣議請皇帝封崇濮安懿王至今未見施行吾載閲前史乃知自有故事濮安懿王譙國夫人王氏襄國夫人韓氏仙遊縣君任氏可令皇帝稱親濮安懿王稱皇王氏韓氏任氏並稱后事方施行而英宗即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟俾王子孫主奉祠事翌日誨等以所論列彈奏不見聽用繳納御史勅告家居待罪誨等所列大抵以為前詔稱權罷集議後詔又稱且欲以塋為園即追崇之意未已英宗命閤門以告還之誨等力辭臺職誨等既出而濮議亦寢至神宗元豐二年詔以濮安懿王三夫人可並稱王夫人云治平三年立濮王園廟司馬光傳帝疾愈光料必有追隆本生事即奏言漢宣帝為孝昭後終不追尊衞太子史皇孫光武上繼元帝亦不追尊鉅鹿南頓君此萬世法也後詔兩制集議濮王典禮學士王珪等相視莫敢先光獨奮筆書曰為人後者為之子不得顧私親正宜凖封贈期親尊屬故事稱為皇伯髙官大國極其尊榮議成珪即命吏其以手藁為案既上與大臣意殊御史六人争之力皆斥去光乞留之不可遂請與俱貶彭思永傳治平中召為御史中丞濮王有稱親之議言事者爭之皆斥去思永更上疏極論曰濮王生陛下而仁宗以陛下為嗣是仁宗為皇考而濮王于屬為伯此天地大義生人大倫如乾坤定位不可得而變也陛下為仁廟子曰考曰親乃仁廟也若更施於濮王是有二親矣使王與諸父夷等無有殊别則於大孝之心亦為難安臣以為當尊為濮國太王祭告之辭則曰姪嗣皇帝書名昭告於皇伯父在王則極尊崇之道而於仁廟亦無所嫌矣此萬世之法也疏入英宗感其切至垂欲施行而中書持之甚力卒不果蕙田案伊川程子代彭思永論濮王典禮疏見徐氏讀禮通考不重載又案濮議此二奏盡之後廷論紛爭皆歐陽公為人後議發之耳歐陽修傳帝將追崇濮王命有司議皆謂當稱皇伯改封大國修引䘮服記以為為人後者為其父母服降三年為期而不沒父母之名以見服可降而名不可沒也若本生之親改稱皇伯厯考前世皆無典據進封大國則又禮無加爵之道故中書之議不與衆同趙瞻傳時議追崇濮安懿王瞻引漢師丹董宏事謂其屬薛温其曰事將類此吾必以死爭固吾所也中書請安懿稱親瞻爭曰仁宗既下明詔子陛下議者顧惑禮律所生所飬之名要相訾難彼明知禮無两父二斬之義敢裂一字之詞以亂厥真且文有去婦出母者去已非婦出不為母辭窮直書豈足援以斷大議哉會假太常少卿接契丹賀正使入對英宗問前事對曰陛下為仁宗子而濮王又稱皇考則是二父二父非禮英宗曰御史嘗見朕欲皇考濮王乎瞻曰此乃大臣之議陛下未嘗自言英宗曰是中書過耳朕自數嵗時先帝養為子豈敢稱濮考瞻曰臣請退諭中書作詔以曉天下英宗曰朕意已决無容宣告及使還聞呂誨等諫濮議皆罷去乞與同貶趣入對英宗曰卿欲就龍逢比干之名孰若效伊尹傅說哉瞻皇懼言臣不敢奉詔使朝廷有同罪異罰之譏遂通判汾州傅堯俞傳大臣建言濮安懿王宜稱皇考堯俞曰此於人情禮文皆大謬戾與侍御史呂誨同上十餘疏其言極切主議者知洶洶不可遏遂易考稱親堯俞又言親非父母而何亦不可也夫恩義存亡一也先帝既以陛下為子當是時設濮王尚無恙陛下得以父名之乎俄命堯俞與趙瞻使契丹比還呂誨呂大防范純仁皆以諫濮議罷堯俞拜疏求罷遂出知和州呂誨傳濮議起侍從請稱王為皇伯中書不以為然誨引義固争七上章不聽遂劾宰相韓琦不忠五罪曰昭陵之土未乾遽欲追崇濮王使陛下厚所生而薄所繼隆小宗而絶大宗言者論辨累月琦猶遂非不為改正中外憤鬰萬口一詞願黜居外藩以慰士論又與御史范純仁呂大防共劾歐陽修首開邪議以枉道說人主以近利負先帝陷陛下於過舉皆不報范純仁傳治平中遷侍御史時方議濮王典禮純仁言陛下受命仁宗而為之子與前代定䇿入繼之主異宜如王珪等議呂大防傳執政議濮王稱考大防上言先帝起陛下為皇子館於宮中憑几之命緒言在耳皇天后土寔知所托設使先帝萬壽陛下猶為皇子則安懿之稱伯於理不疑豈可生以為子沒而背之哉夫人君臨御之始宜有至公大義厭服天下以結其心今大臣首欲加王以非正之號使陛下顧私恩而違公義非所以結天下之心也范鎮傳中書議追尊濮王鎮判太常寺率其屬言漢宣帝於昭帝為孫光武於平帝為祖其父容可稱皇考議者猶非之謂其以小宗奪大宗之統也今陛下既以仁宗為考又加於濮王則其失非特漢二帝比凡稱帝若考若寢廟皆非是司馬光再上濮安懿王典禮議向詔羣臣議濮安懿王典禮王珪等二十餘人皆以為宜凖先朝封贈期親尊屬故事凡兩次會議無一人異詞而政府之意獨欲尊濮王為皇考巧詞飾說惑誤聖德政府言儀禮本文五服年月勅皆曰為人後者為其父母即出繼之子於所生皆稱父母臣案禮法必須指事立文使人曉解今欲言為人後者為其父母之服若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣案宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖者以與昭帝同昭穆也光武起布衣誅王莽冒矢石以得天下名為中興其實創業雖自立七廟猶非大過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎政府前以二帝不加尊號于祖父引以為法則可矣若謂皇考之名亦可施於今日則事恐不侔設使仁宗尚御天下濮王亦萬福當是之時命陛下為皇子則必不謂濮王為父而為伯若先帝在則稱伯沒則稱父臣計陛下必不為此行也朱子語録有問濮議曰歐陽說不是韓公曾公亮和之溫公王公議是范鎮呂誨范純仁呂大防皆弹歐公但溫公又於濮安懿王邊禮數太薄須於中自有斟酌可也歐公之說斷然不可且如今有人為人後者一日所後之父與所生之父相對坐其子來喚所後父為父終不成又喚所生父為父這自是道理不如此試坐仁宗於此亦坐濮王於此英宗過焉終不成都喚兩人為父先時仁宗有詔云朕皇兄濮安懿王之子猶朕之子也此甚分明當時只以此為據足矣問先儒爭濮議事曰此只是理會稱親當時葢有引戾園事欲稱皇考者又問稱皇考是否曰不是又問為人後者為其父母服期年有父母之稱濮議引此為證欲稱皇考當時雖以衆人爭之得止而至今士大夫猶以為未然葢不知禮經中若不稱為其父母别無稱呼只得如此也黄氏日鈔歐公被隂私之謗皆激於當日主濮議之力公集濮議四卷又設為或問以發明之滔滔數萬言皆以禮經為其父母一語謂未嘗因降服而不稱父母耳然既明言所後者三年而於所生者降服則尊無二上明矣謂所生父母者葢本其初而名之非有兩父母也未為人後之時以生我者為父母己為人後則以命我者為父母立言者於既命之後而追本生之稱自宜因其舊以父母稱未必其人一時稱兩又母也况帝王正統相傳有自非可常人比耶永叔博聞之儒而未見及此學者所以貴乎格物日知録顧氏炎武曰為人後者為其父母此臨文之不得不然隋書劉子翊云其者因彼之辭是也後儒謂以所後為父母而所生為伯叔父母於經未有所考亦自尊無二上之義而推之也宋歐陽氏據此文以為聖人未嘗沒其父母之名辨之至數千言然不若趙瞻之言辭窮直書為簡而當也蕙田案宋濮王典禮司馬公王公程子之論正矣其啓盈庭之言久而不决者歐陽公為人後議實有以致之當時攻斥者不遺餘力皆以死生去就爭之英宗亦曰是中書過耳先帝養為子豈敢稱濮考嗚呼是可見天理之當然人心之同然也夫禮之立後重大宗也大宗祖之統也大宗不可絶尊祖也尊祖則小宗不得有其子而後大宗後大宗則繼其祖之統而非止為其所後之嗣也既繼其統則繼其嗣繼其嗣則不貳斬不貳斬則不得有二父故降其父母期期則同於世父叔父矣世父叔父亦父道也故曰兄弟之子猶子其去子一間也特尊無二上爾司馬公王公程子之議其義固如是也宗法大夫别子之禮也而况有國乎况天子為天地社稷生靈之主乎故濮王不稱考而後尊祖之統定尊祖之統定而天下後世之為父子者定當時乃以稱伯父為無據豈篤論乎歐公執禮經之文義而曲詞以説之其不足協人心必矣故列序正史及諸家正說而歐公為後或問附焉至曾子固為人後議及持兩端之論者皆不録附歐陽氏修為後或問上篇曰為人後者不絶其所生之親可乎曰可矣古之人不絶也而降之何以知之曰于經見之何謂降而不絶曰降者所以不絶若絶則不待降也所謂降而不絶者禮為人後者降其所生父母三年之服以為期而不改其父母之名者是也問者曰今之議者以謂為人後者必使視其所生若未嘗生已者一以所後父為尊卑疎戚若于所後父為兄則以為伯父為弟則以為叔父如此則如之何余曰吾不知其何所稽也茍如其說沒其父母之名而一以所後父為尊卑踈戚則宗從世數各隨其逺近輕重自有服矣聖人何必特為制降服乎此余所謂若絶則不待降者也稽之聖人則不然昔者聖人之制禮也為人後者于其父母不以所後之父尊卑疎戚為别也直自於其父子之間為降殺耳親不可降降者降其外物耳䘮服是也其必降者示有所屈也以其承大宗之重尊祖而為之屈耳屈于此以伸于彼也生莫重于父母而為之屈者以見承大宗者亦重也所以勉為人後者知所承之重以專任人之事也此以義制者也父子之道天性也臨之以大義有可以降其外物而本之于至仁則不可絶其天性絶人道而滅天理此不仁者之或不為也故聖人之于制服也為降三年以為朞而不沒其父母之名以著于六經曰為人後者為其父母報以見服可降而父母之名不可沒也此所謂降而不絶者以仁存也夫事有不可兩得勢有不可兩遂為子于此則不能為子于彼矣此里巷之人所共知也故其言曰為人後者為之子此一切之論非聖人之言也是漢儒之說也乃衆人之所能道也質諸禮則不然方子夏之傳䘮服也茍如衆人一切之論則不待多言也直為一言曰為人後者為之子則自然視其父母絶若未嘗生己者矣自然一以所後父為尊卑踈戚矣奈何彼子夏者獨不然也其于傳經也委曲而詳言之曰視所後之某親某親則若子若子者若所後父之真子以自處而視其族親一以所後父為尊卑踈戚也故曰為所後者之祖父母妻妻之父母兄弟兄弟之子若子猶嫌其未備也又曰為所後者之兄弟之子若子其言詳矣獨于其所生父母不然而别自為服曰為其父母報葢於其所生父母不使若為所後者之真子者以謂遂若所後者之真子以自處則視其所生如未嘗生己者矣其絶之不已甚乎此人情之所不忍者聖人亦所不為也今議者以其所生于所後為兄者遂以為伯父則是若所後者之真子以自處矣為伯父則自有服不得為齊衰朞矣亦不得云為其父母報矣凡見于經而子夏之所區區分别者皆不取而又忍為人情之所不忍者吾不知其何所稽也此大義也不用禮經而用無稽之說可乎不可也問者曰古之人皆不絶其所生而今人何以不然曰是何言歟今之人亦皆然也而又有加于古焉今開寳禮及五服圖乃國家之典禮也皆曰為人後者為其所生父母齊衰朞服雖降矣必為正服者示父母之道在也為所後父斬衰三年服雖重矣必為義服者示以義制也而律令之文亦同五服者皆不改其父母之名質于禮經皆合無少異而五服之圖又加以心䘮三年以謂三年者父母之䘮也雖以為人後之故降其服于身猶使行其父母之䘮于其心示于所生之恩不得絶于心也則今人之為禮比于古人又有加焉何謂今人之不然也戴氏震曰皇伯考之稱歐陽公以為無據而據為人後者為其父母之文禮云為其父母本屬辭窮且著書者立言之體非為人後者口稱於尊長前也由是言之直稱皇考與稱皇伯考同為無據兩者於經既無據當以至情大義斷之宋英宗與趙瞻言朕自數嵗時先帝養為子豈敢稱濮考司馬溫公言設使仁宗尚御天下濮王亦萬福當是之時令陛下為皇子則必不謂濮王為父而為伯當先帝在則稱伯沒則稱父臣計陛下必不為此行也此以至情大義斷之濮王不可稱皇考據英宗之言為定當稱皇伯考據溫公之言為定無論古人有皇伯考之稱與否况後世稱謂之辭古人未有者多矣如悖於至情大義雖古有而不可襲用如合於至情大義雖古未有而不妨因革從宜至情大義本也株守典故末也檀弓魯人欲勿殤童汪踦孔子曰能執干戈以衞社稷一言斷之順情合義豈嘗援典故舊文乎哉歐陽公之論泥矣觀承案濮議諸人皆君子也但所見各有偏處一時遂如水火溫公專重承統之義而未嘗謂宜薄其所生歐公雖据禮經之文而未嘗謂宜亂其所統但以皇伯考之稱畢竟無稽故欲正其名耳諸公無以折之趙瞻則謂禮文乃詞窮直書豈足援以斷大義然既曰詞窮可知理屈既云直書豈容曲諱哉况本生父母非去婦出母之比又何擬人不於其倫乎愚意英宗賢君不似明世宗之剛愎自用茍斟酌至當無不允行惜程子大賢其代彭思永奏議亦欲改稱皇伯考卒至王陶撃韓公蔣之竒撃歐公遂無収煞而濮王亦歸於兩無所稱而已也自今觀之其於仁宗稱考稱子一如父子相繼之常固為定典彼此原無别議而於濮園則當稱本生考濮國大王而不稱皇自稱降服子皇帝某而書名則既不蔑所生亦不亂所統豈不恩義兩全名實俱正而可為萬世為人後者大公至正之常法也乎右宋英宗宋史孝宗本紀孝宗皇帝太祖七世孫也初太祖少子秦王德芳生英國公惟憲惟憲生新興侯從郁從郁生華隂侯世將世將生慶國公令譮令譮生子偁是為秀王以建炎元年十月戊寅生帝於秀州青杉牐之官舍命名伯琮及元懿太子薨髙宗未有後詔選太祖之後紹興二年五月選帝育於禁中三年賜名瑗十三年九月秀王殁于秀州用廷臣議聽觧官行服三十年立為皇子更名瑋五月甲子立為皇太子改名眘乙亥内降御札皇太子可即皇帝位朕稱太上皇帝退處德夀宮皇后稱太上皇后秀王子偁傳安僖秀王子偁秦康惠王之後髙宗族兄也子伯琮生後被選入宮是為孝宗累官左朝奉大夫紹興十三年致仕明年卒于秀州時孝宗為普安郡王疑所服詔侍從臺諫議秦熺等請解官如南班故事普安亦自請持服許之孝宗受禪稱皇伯園廟之制未備紹熙元年始即湖州秀園立廟奉神主建祠臨安府以藏神廟如濮王故事仍班諱光宗本紀紹熈元年三月丁夘詔秀王襲封置園廟班安僖王諱七月癸酉建秀王祠堂于行在禮志秀安僖王廟紹熙元年三月詔秀王襲封等典禮禮部太常寺乞依濮安懿王典禮避秀安僖王名一字詔恭依乃置園廟四月詔皇伯滎陽郡王伯圭除太保依前安德軍節度使充萬夀觀使嗣秀王以奉王祀汪應辰傳三十二年建儲集議秀王封爵應辰定其稱曰太子本生之親議入内降曰皇太子所生父可封秀王唐文若傳上將内禪前數日手詔追崇皇太子所生父文若既書黄因過周必大誦聖德而疑名稱未安歸白宰相請更黄堂吏不可文若執不已宰相以聞詔改稱本生親尋又改宗室子偁其後詔稱皇兄蕙田案孝宗事同濮王而稱皇伯當時無一人言者葢久而上下志定矣右宋孝宗理宗本紀理宗皇帝太祖十世孫父希瓐追封榮王以開禧元年正月癸亥生於邑中虹橋里第是時寧宗弟沂靖惠王亮無嗣以宗室希瓐子賜名均為沂王後尋改賜名貴和嘉定十三年八月景獻太子卒寧宗以國本未立選太祖十世孫年十五以上者教育如髙宗擇普安恩平故事遂以十四年六月丙寅立貴和為皇子改賜名竑而以帝嗣沂王賜名貴誠十七年八月寧宗違豫彌逺稱詔以貴誠為皇子改賜名昀閏月丁酉帝崩於福寧殿彌逺入白楊皇后稱遺㫖以皇子竑開府儀同三司進封濟陽郡王命子昀嗣皇帝位端平元年正月丙寅詔太師中書令榮王已進王爵宜封三代曾祖子奭贈太師吳國公祖伯旴贈太師益國公父師意贈太師越國公右宋理宗度宗本紀度宗皇帝太祖十一世孫父嗣榮王與芮理宗母弟也嘉熙四年四月九日生於紹興府榮邸理宗在位嵗久無子乃屬意託神器焉寳祐元年正月庚辰詔立為皇太子改賜今名五年十月丁夘理宗崩受遺詔太子即皇帝位十一月加封嗣榮王與芮武康寧江軍節度使右宋度宗蕙田案理宗度宗追尊所生曰王曰節度使葢益謙矣而當時後世不聞以為薄者濮議諸臣排折政府之力也事久論定豈非人心之公天理之正哉乃後人猶有袒歐陽之說者其亦冷褒段猶之流也夫五禮通考卷一百五
