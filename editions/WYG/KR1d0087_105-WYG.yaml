上儀具舉明徳薦馨已事而竣歡通三靈先祖是皇來燕來寧文宗天歴三年明宗祔廟酌獻奏永成之曲無射宫猗那皇明世纘神武敬天弗違時潛時旅龍旂在塗言受率土不遐有臨永錫多嘏順帝本紀元統二年罷夏季時享七月辛卯祭太祖太宗睿宗三朝御容罷秋季時享十月戊午享於太廟至元元年七月丁亥享於太廟二年十月己卯享於太廟三年十二月己巳享於太廟四年十月辛卯享於太廟至元六年四月己丑享於太廟五月丙子車駕時廵上都置月祭各影堂香于大明殿遇行禮時令省臣就殿迎香祭之七月戊午享於太廟祭祀志至元六年六月監察御史呈嘗聞五行傳曰簡宗廟廢祭祀則水不潤下近年雨澤愆期四方多旱而嵗減祀事變更成憲原其所致恐有感召古者宗廟四時之祭皆天子親享莫敢使有司攝也盖天子之職莫大於禮禮莫大於孝孝莫大於祭世祖皇帝自新都城首建太廟可謂知所本矣春秋之法國君即位逾年改元必行告廟之禮伏自陛下即位以來于今七年未嘗躬詣太廟似為闕典方今政化更新並遵舊制告廟之典理宜親享時帝在上都臺臣以聞奉㫖若曰俟到大都親自祭也九月二十七日中書省奏以十月初四日皇帝親祀太廟制曰可前期告示以太師右丞相滿濟勒台爲亞獻官樞宻知院阿嚕圖爲終獻官知院普爾普翰林承㫖婁章爲助奠官大司農阿雅噶齊爲七祀獻官侍中二人門下侍郎一人大禮使一人執劈正斧一人禮儀使四人餘名如故事有司具儀注云享前一日質明所司備法駕於崇天門外侍儀官引擎執同導駕官具公服于致齋殿前左右分班侍立承奉舍人引門下侍郎侍中入殿門下侍郎相向立侍中跪奏臣某等官請皇帝中嚴就拜興退出少頃引侍中版奏外辦就拜興退皇帝出齋室侍中跪奏請皇帝升輿廵輦路由正門至大明殿西陛下侍中跪奏請皇帝降輿升殿就拜興引皇帝即御座執事官于午陛下起居訖舍人引侍中門下侍郎入殿至御榻前門下侍郎相向立侍中跪奏請皇帝降殿升輿就拜興導至大明殿外侍中跪奏請皇帝升輿就拜興至大明門外太僕卿進御馬侍中跪奏請皇帝降輿乗馬訖門下侍郎跪奏請車駕進發就拜興進發時稱警蹕至崇天門外門下侍郎跪奏請車駕少駐勅衆官上馬就拜興侍中承㫖退稱曰制可贊者承傳勅衆官上馬少頃門下侍郎跪奏請車駕進發就拜興進發時稱警蹕導至太廟外紅門内門下侍郎跪奏請車駕權停勅衆官下馬就拜興贊者承傳勅衆官下馬門下侍郎跪奏請車駕進發至石橋南侍中跪奏請皇帝下馬歩入神門就拜興皇帝下馬侍儀官同導駕官前導皇帝歩入神門稍西侍中跪奏請皇帝升輿就拜興至大次殿門前侍中跪奏請皇帝降輿入就大次就拜興簾降宿衛如式侍中入跪奏勅衆官還齋次承㫖贊者承傳勅衆官各還齋次俟行禮時至丑時二刻頃侍儀官備擎執同導駕官于大次殿門前舍人引侍中門下侍郎入大次座前侍中跪奏請皇帝中嚴服衮冕就拜興退少頃再引侍中跪奏外辦就拜興退禮儀使跪奏請皇帝行禮侍儀官同導駕官導引皇帝至西神門擎執侍儀官同導駕官止行禮畢皇帝由西神門出侍儀官備擎執同導駕官引導皇帝還至大次舍人引侍中入跪奏請皇帝解嚴釋冕服尚食進膳如式畢侍中跪版奏外辦就拜興退導皇帝出大次侍中跪奏請皇帝升輿就拜興侍儀官同導駕官前導至神門外太僕卿進御馬侍中跪奏請皇帝降輿乗馬就拜興乗馬訖門下侍郎跪奏請車駕進發就拜興退進發時稱警蹕至櫺星門外門下侍郎跪奏請車駕少駐勅衆官上馬就拜興侍中承㫖退稱曰制可贊者承傳勅衆官上馬少頃門下侍郎跪奏請車駕進發就拜興進發時稱警蹕教坊樂振作至麗正門裏石橋北引門下侍郎跪奏請車駕權停勅衆官下馬就拜興贊者承傳勅衆官下馬門下侍郎跪奏請車駕進發侍儀官引擎執同導駕官前導執事官後從皇帝由紅門裏輦路至大明門外侍中跪請皇帝降馬乗輿就拜興侍儀官擎執同導駕官導至大明殿諸執事殿下相向立俟皇帝入殿升座侍中跪奏勅衆官皆退贊者承傳勅衆官皆退順帝本紀至正元年正月丁巳享於太廟四月甲申享於太廟七月己卯享於太廟十月丁未享於太廟二年正月丁丑享於太廟四月乙巳享於太廟七月辛未享於太廟十月丁未享於太廟三年正月丁丑享於太廟四月乙巳享於太廟七月丁卯享於太廟十一月辛未享於太廟四年正月辛未享於太廟七月己丑享於太廟李黼傳黼遷禮部主事拜監察御史首言禴祀烝嘗古今大祭今太廟惟二祭而日享佛祠神御非禮也宜據經行之王圻續通考時方永貞請真定玉華宫罷遣太常禮樂議曰原廟之制隆古未聞漢孝惠從叔孫通之請始詔有司立原廟遂有衣冠月出遊之名其後郡國所在因各立廟至元帝永平四年貢禹奏郡國祖宗廟不應古禮天子是其議罷之謹案尚書黷于祭祀時謂弗欽春秋之義父不祭於支庶君不祭於臣僕之家伏覩聖朝建立七廟崇奉孝享可謂至矣而睿宗皇帝神御别在真定路玉華宫竊惟有功徳於天下者莫如太祖皇帝世祖皇帝太祖皇帝不聞有原廟世祖皇帝神御奉安大聖夀萬安寺嵗時差官以家人禮祭供不用太常禮樂今玉華宫原廟列在郡國又非龍興降誕之地主者以臣僕之賤供奉御容非禮之甚伏望朝廷稽前漢故事致隆太廟玉華宫照依京師諸寺影堂例止命有司以時祭供罷遣太常禮樂非獨聖朝得典禮之正而在天之靈無䙝凟之煩禮官免失禮之責矣至正六年四月乙卯享於太廟七月己卯享於太廟七年正月己酉享於太廟十月辛未享於太廟八年正月丁未享於太廟九年正月丁酉享於太廟四月丁卯享於太廟十月辛卯享於太廟十一年正月乙卯享