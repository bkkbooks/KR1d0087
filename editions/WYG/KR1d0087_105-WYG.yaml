body:
  text: 五禮通考卷九十五刑部尚書秦蕙田撰吉禮九十五宗廟時享元史世祖本紀中統元年十二月乙巳始制祭享太廟祭器法服祭祀志元祖宗祭享之禮割牲奠馬湩以蒙古巫祝致辭盖國俗也世祖元年秋七月丁丑設神位于中書省用登歌樂遣筆且齊致祭焉筆且齊譯典書記者十二月初命制太廟祭器法服國俗舊禮每嵗太廟四祭用司禋監官一員名蒙古巫祝當省牲時法服同三獻官升殿詣室户告腯還至牲所以國語呼累朝帝后名諱而告之明旦三獻禮畢獻官御史太常卿博士復陞殿分詣各室蒙古博爾齊跪割牲太僕卿以朱漆盂奉馬乳酌奠巫祝以國語告神訖太祝奉祝幣詣燎位獻官以下復版位載拜禮畢世祖本紀中統三年十二月癸亥享太廟祭祀志即中書省備三獻官大禮使司徒攝祀事禮畢神主復藏瑞像殿四年三月癸卯詔建太廟于燕京十一月丙戌仍寓祀亊中書以親王哈丹塔察爾王盤張文謙攝事攝事儀其目有九一曰齋戒享前三日三獻官以下凡與祭員皆公服受誓戒于中書省是日質明有司設金椅于省庭一人執紅羅繖立于其左奉禮郎率儀鸞局陳設版位獻官諸執事位俱藉以席仍加紫綾褥設初獻太尉位於省階少西南向大禮使立於其東少南西向監祭御史位二于通道之西東向監禮博士於通道之東西向俱北上設司徒亞終獻位於其南北向西上次助奠七祀獻官次太常卿光禄卿光禄丞書祝官讀祝官太官令良醖令廩犧令司尊彛舉祝官太官丞廪犧丞奉爵官奉瓚官盥爵官二巾篚官蒙古太祝巫祝㸃視儀衞清道官及與祭官依品級陳設皆異位重行太廟令太樂令郊社令太祝位于通道之西北向東上太廟丞太樂丞郊社丞奉禮郎協律郎司天生位于通道之東北向西上齋郎位于其後贊者引行事等官各就位立定次引初獻官立定禮直官搢笏讀誓文曰某年某月某日享於太廟各揚其職其或不敬國有常刑散齋二日宿於正寢致齋一日宿於祠所散齋日治事如故不弔䘮問疾不作樂不判署刑殺文字不决罰罪人不與穢惡事致齋日惟享事得行餘悉禁凡與享之官已齋而闕者通攝行事七品以下官先退餘官再拜禮直官贊鞠躬拜興拜興平立禮畢守廟兵衛與太樂工人俱清齋一宿赴祝所之日官給酒饌二曰陳設享前二日所司設兵衛于廟門禁斷行人儀鸞局設幄幔于饌殿所司設三獻官以下行事執事官次于齋房之所前一日太樂令率其屬設宫縣之樂於庭中東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編縣之閒各依神位樹建鼔于四隅置柷敔于北縣之内柷一在道東敔一在道西路鼓一在柷之東南晉鼓一在其後又路鼔一在柷之西南諸工人各于其後東方西方以北為上南方北方以西為上文舞在北武舞在南立舞表于酇綴之間又設登歌之樂于殿上前楹間玉磬一簴在西金鐘一簴在東柷一在金鐘北稍西敔一在玉磬北稍東搏拊二一在敔北一在柷北東西相向歌工次之餘工各位于縣後其匏竹者立於階間重行北向相對為首享前一日太廟令率其屬掃除廟庭之内外樞宻院軍官一員率軍人剗除草穢平治道路又設七祀燎柴于廟門之外又於室内鋪設神位於北牖下當户南向每位設黼扆一紫綾厚褥一薄褥一莞席一繅席一虎皮次席二時暄則用桃枝竹席几在筵上又設三獻官拜跪褥位二一在室内一在室外學士院定撰祝􅁽訖書祝官於饌幕具公服書祝訖請初獻官署御名訖以授太廟令又設祝案于室户外之右又設三獻官位于殿下横街之南稍西東向亞獻終獻位稍却助奠七祀獻官又於其南書祝官讀祝官舉祝官太廟令太官令良醖令廪犧令太廟丞太官丞位又於其南司尊彜奉瓚官奉爵官盥洗巾篚爵洗巾篚蒙古太祝蒙古巫祝太祝宫闈令及七祀司尊彛盥洗巾篚以次而南又設齋郎位於其後每等異位重行東向北上又設大禮使位於南神門東偏門稍北北向又設司徒太常卿等位於橫街之南稍東西向與亞終獻相對司徒位在北太常卿稍却太常同知光禄卿僉院同僉院判光禄丞拱衛使以次而南又設監祭御史位二監禮博士位二於横街之北西向以北為上又設協律郎位在宫縣樂簴西北東向大樂丞在樂簴之間又設大樂令協律郎位于登歌樂簴之間又設牲榜于東神門外南向設太常卿位於牲位南向監祭御史位在太常卿之左太官令次之光禄丞太官丞又次之廪犧令位在牲西南廪犧丞稍却俱北向以右為上又設諸太祝位於牲東西向以北為上又設蒙古巫祝位于牲東南北向又設省饌位於省饌殿前太常卿光祿卿光祿丞太官令位于東西向監祭監禮位于西東向皆北上太廟令陳祝版於室右之祝案又率祠祭局設籩豆簠簋每室左十有二籩右十有二豆俱為四行豋三在籩豆之間鉶三次之簠二簋二又次之簠左簋右俎七在簠簋之南香案一次之沙池又次之又設每室尊罍於通廊斚彛黄彛各一春夏用雞彛鳥彛犧尊二象尊二秋冬用著尊壺尊著尊二山罍二以次在本室南之左皆加勺冪為酌尊所北向西上彛有舟坫冪又設壺尊二太尊二山罍四在殿下階間俱北向望室户之左皆有坫加冪設而不酌凡祭器皆藉以席又設七祀位于横街之南道東西向以北為上席皆以莞設神版位各于座首又設祭器每位左二籩右二豆簠一簋一在籩豆間俎一在籩前爵坫一次之壺尊二在神位之西東向以北為上皆有坫勺冪又設三獻盥洗爵洗在通街之西横街之南北向罍在洗西加勺篚在洗東皆實以巾爵洗仍實以瓚爵加盤坫執罍篚者各位於後又設七祀獻官盥洗位於七祀神位前稍北罍在洗西篚在洗東實以巾又實爵于坫執罍篚者各位于後三曰習儀享前二日三獻以下諸執事官員赴太廟習儀次日早各具公服乗馬赴東華門迎接御香至廟省牲四曰迎香享前一日有司告諭坊市灑掃經行衢路祗備香案享前一日質明三獻官以下及諸執事官各具公服六品以下官皆借紫服詣崇天門下太常禮儀院官一員奉御香一員奉酒二員奉馬湩自内出監祭監禮奉禮郎太祝分兩班前導控鶴五人一人執繖從者四人執儀仗在前行至大明門由正門出教坊大樂作至崇天門外奉香酒馬湩者安置腰輿導引如前行至外垣櫺星門外百官上馬分兩班行於儀仗之外清道官行於儀衛之先兵馬司廵兵夹道次之金鼓又次之京尹儀從又次之教坊大樂為一隊次之控鶴弩手各服其服執儀仗左右成列次之拱衛使居其中儀鳳司細樂又次之太常卿與博士御史導於輿前獻官司徒大禮使助奠官從于輿後至廟入自南門至神門外百官及儀衛官止太常卿博士御史導輿三獻官司徒大禮使助奠官從入至殿下獻官奉香酒馬湩升自泰階入殿内通廊正位安置禮直官引獻官降自東階由東神門北偏門出釋服五曰省牲器見親祀儀六曰晨祼祀日丑前五刻太常卿光禄卿太廟令率其屬設燭於神位遂同三獻官司徒大禮使等每室一人分設御香酒醴以金玉爵斚酌馬湩蒲萄尚醖酒奠於神案又陳籩豆之實籩四行以右為上第一行魚鱐在前糗餌粉餈次之第二行乾橑在前乾棗形鹽次之第三行鹿脯在前榛實乾桃次之第四行菱在前芡栗次之豆四行以左為上第一行芹菹在前筍菹葵菹次之第二行菁菹在前韭菹􅓞食次之第三行魚醢在前醢豚拍次之第四行鹿臡在前醓醢糝食次之簠實以稻粱簋實以黍稷豋實以太羮鉶實以和羮尊彛斚彛實以明水黄彛實以鬱鬯犧尊實以泛齊象尊實以醴齊著尊實以盎齊山罍實以三酒壺尊實以醍齊太尊實以沈齊凡齊之上尊實以明水酒之上尊實以元酒其酒齊皆以上醖代之又實七祀之祭器每位左二籩栗在前鹿脯次之右二豆菁菹在前鹿臡次之簠實以黍簋實以稷壺尊實以醍齊其酒齊亦以上醖代之陳設訖獻官以下行事執事官各服其服會于齊班㕔禮直官引太常卿監祭監禮太廟令太祝宫闈令諸執事官齋郎自南神門東偏門入就位東西相向立定候監祭監禮案視殿之上下徹去盖冪糾察不如儀者退復位禮直官引太常卿監祭監禮太廟令太祝宫闈令陞自東階詣太祖室蒙古太祝起帝主神冪宫闈令起后主神冪次詣每室並如常儀畢禮直官引太常卿以下諸執事官當横街間重行以西為上北向立定奉禮郎贊曰奉神主訖再拜禮直官承傳太常卿以下皆再拜訖奉禮郎又贊曰各就位禮直官引諸執事官各就位次引太官令率齋郎由南神門東偏門以次出贊者引三獻官司徒大禮使七祀獻官諸行事官由南神門東偏門入各就位立定禮直官進于初獻官之左贊曰有司謹具請行事退復位協律郎跪俛伏興舉麾興工鼓柷宫縣樂奏思成之曲九成文舞九變奉禮郎贊再拜在位者皆再拜奉禮郎又贊諸執事者各就位禮直官引奉瓚奉爵盥爵洗巾篚執事官各就位立定禮直官引初獻官詣盥洗位宫縣樂作無射宫肅寧之曲至位北向立定搢笏盥手帨手執笏詣爵洗位至位北向立定搢笏執瓚洗瓚拭瓚以瓚授執事者執笏樂止登歌樂作奏夹鍾宫肅寧之曲升自東階樂止詣太祖酌尊所西向立搢笏執事者以瓚授初獻官執瓚司尊彜跪舉冪良醖令跪酌黄彛鬱鬯初獻以瓚授執事者執笏詣太祖神位前北向立搢笏跪三上香執事者以瓚授初獻初獻執瓚以鬯灌於沙池以瓚授執事者執笏俛伏興出室户外北向立再拜訖詣每室祼鬯如上儀俱畢禮直官引初獻降自東階登歌樂作奏夾鐘宫肅寧之曲復位樂止七曰饋食初獻既祼如前進饌儀八曰酌獻太祝立茅苴于盤禮直官引初獻詣盥洗位宫縣樂作奏無射宫肅寧之曲至位北向立搢笏盥手帨手執笏詣爵洗位至位搢笏執爵洗爵拭爵以爵授執事者執笏樂止登歌樂作奏夾鐘宫肅寧之曲陞自東階樂止詣太祖酒尊所西向立搢笏執爵司尊彛搢笏跪舉冪良醖令搢笏跪酌犧尊之泛齊以爵授執事者執笏宫縣樂作奏無射宫開成之曲詣太祖神座前北向立稍前搢笏跪三上香執爵三祭酒於茅苴以爵授執事者執笏俛伏興平立請出室户外北向立樂止俟讀祝舉祝官搢笏跪對舉祝版讀祝官跪讀祝文讀訖舉祝官奠祝版於案執笏興讀祝官俛伏興禮直官贊再拜訖次詣每室酌獻如上儀各奏本室之樂獻畢宫縣樂止降自東階登歌樂作奏夾鐘宫肅寧之曲初獻復位立定文舞退武舞進宫縣樂作奏無射宫肅寧之曲舞者立定樂止禮直官引亞獻詣盥洗位至位北向立搢笏執爵洗爵拭爵以爵授執事者陞自東階詣太祖酌尊所西向立搢笏執爵司尊彛搢笏跪舉冪良醖令搢笏跪酌象尊之醴齊以爵授執事者執笏宫縣樂作奏無射宫肅寧之曲詣太祖神座前北向立稍前搢笏跪三上香執爵三祭酒於茅苴以爵授執事者執笏俛伏興平立請出室戸外北向立再拜訖次詣每室酌獻並如上儀獻畢樂止降自東階復位立定禮直官引終獻如亞獻之儀唯酌著尊之盎齊禮畢降復位初終獻將行贊者引七祀獻官詣盥洗位搢笏盥手帨手訖執笏詣酒尊所搢笏執爵酌酒以爵授執事者執笏詣首位神座前東向立稍前搢笏跪執爵三祭酒於沙池奠爵于案執笏俛伏興少退立再拜訖每位並如上儀俱畢七祀獻官俟終獻官降復位立定九曰祭馬湩終獻酌獻將畢禮直官分引初獻亞獻官司徒大禮使助奠官七祀獻官太常卿監祭監禮太廟令丞蒙古庖人巫祝等升殿每室獻官一員各立於户外太常卿監祭監禮以下立於其後禮直官引獻官詣神座前蒙古庖人割牲體以授獻官獻官搢笏跪奠於帝主神位前次奠於后主神位前訖出