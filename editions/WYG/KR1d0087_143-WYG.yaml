body:
  text: 五禮通考卷一百三十三刑部尚書秦蕙田撰嘉禮六朝禮蕙田案周制天子三朝惟路門外之朝曰治朝王日眡朝于此即後世所謂常朝也古者三公坐而論道王眡朝則冡宰贊聽治大僕正位百官各從表著之位上下之分至嚴君臣之情至親凡邦國之利病政事之得失民生之疾苦無有壅于上聞者秦漢以䧏迄于南北朝史志詳于朝㑹之儀注而常朝闕如自唐以後其儀始僃唐常朝于太極殿其在大明宫則于宣政殿貞觀初每日臨朝十三年三日一朝永徽中五日一朝仍有朔望朝開元禮有朔日受朝其後又有紫宸殿入閤中葉以還又有開延英召對敬宗定以朔望入閤昭宣帝時定一五九日開延英後唐明宗始詔羣臣五日一詣内殿起居仍復朔望入閤宋制文武官每日赴文明殿正衙曰常恭五日一赴崇徳殿或垂拱殿曰起居而外别有入閤之儀但唐之入閤御便殿也其禮視正衙為簡宋之入閤御前殿也其禮視正衙為繁則非唐舊矣熙寜以後罷入閤儀重定朔望御殿之制政和新儀有文徳殿月朔視朝紫宸殿望恭垂拱殿四恭紫宸殿日恭垂拱殿日叅崇政殿假日起居遼有常朝起居儀太宗至燕御元和殿入閤金以朔望日為朝恭餘日為常朝元惟宰執每日入延春閤及别殿奏事明常朝有御殿儀有御門儀每日晨興御奉天門至午晩復出坐朝其後御殿之禮廢午晩二朝亦廢景泰𢎞治始復午朝未幾旋罷至世宗神宗之世常朝御門數十年不一舉焉常朝儀宋志列之賔禮今依通典明集禮㑹典作嘉禮而繼周官朝禮之後盖視朝之正禮也史記秦始皇本紀三十五年始皇以為咸陽人多先王之宫廷小吾聞周文王都豐武王都鎬豐鎬之間帝王之都也乃營作朝宫聽事羣吏受决事悉于咸陽宫二世二年趙髙説二世曰先帝臨制天下久故羣臣不敢為非進邪説今陛下富于春秋初即位奈何與公卿廷决事事即有誤示羣臣短也天子稱朕固不聞聲于是二世常居禁中與髙决諸事其後公卿希得朝見蕙田案周制王日眡朝秦去古未逺故始皇梁父刻石云既平天下不懈于治夙興夜寐建設長利則猶知聽政之勤也至二世信趙髙邪説居禁中與髙决事而朝禮始廢矣漢書宣帝本紀地節二年上始親政事五日一聽事續漢書禮儀志注胡廣曰舊儀公卿以下每月常朝先帝以其頻故省惟六月十月朔朝後復以六月朔盛暑省之三國魏志文帝本紀黄初五年五月有司以公卿朝朔望日因奏疑事聽斷大政論辨得失魏志齊王本紀景初元年正月即位七月始親臨朝聽公卿奏事宋書孝武帝本紀孝建三年二月丁丑始制朔望臨西堂接羣下梁書武帝本紀大同六年八月辛未詔曰經國有體必詢諸朝所以尚書置令僕丞郎旦旦上朝以議時事前共籌懷然後奏聞頃者不爾每有疑事倚立求决古人有云主非堯舜何得發言便是是故放勲之聖猶咨四岳重華之叡亦待多士豈朕寡徳所能獨斷自今尚書中有疑事前于朝堂參議然後啟聞不得習常其軍機要切前須諮審自依舊典北魏書穆亮傳髙祖臨朝堂謂亮曰三代之禮日出視朝自漢魏已䧏禮儀漸殺晉令有朔望集公卿于朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否遂命讀奏案髙祖親自决之蕙田案讀奏案親自决之今之御門大學士進御前内閣學士讀本請㫖即其意也前廢帝本紀普泰元年四月詔員外諌議大夫歩兵校尉奉車都尉羽林監給事中積射将軍奉朝請其七品以上朔望入朝㐀齊書孝昭本紀帝日昃臨朝訪問左右冀獲直言後周書武帝本紀保定三年五月甲子朔避正寝不受朝旱故也建徳二年秋七月自春末不雨至于是月壬申集百寮于大徳殿帝責躬罪已問以政治得失隋書髙祖本紀上每旦臨朝日昃忘倦右秦至隋常朝唐六典太極殿朔望坐而視朝兩儀殿常日聽朝而視事唐書職官志文武官職事九品以上及二王後朝朔望文官五品以上及兩省供奉官監察御史員外郎太常博士日恭號常恭官武官三品以上三日一朝號九恭官五品以上及折衝當番者五日一朝號六恭官𢎞文崇文館國子監學生四時恭凡諸王入朝及以恩追至者日恭九品以上自十月至二月袴褶以朝五品以上有珂蕃官及四品非清官則否文獻通考貞觀元年十一月梁州都督竇軌請入朝上曰君臣共事情猶父子外官久不入朝情或疑懼朕亦須數見之問以人間風俗許令入朝蕙田案此外官入朝也貞觀十三年十月尚書左僕射房𤣥齡奏天下太平萬機事簡請三日一臨朝許之通典貞觀十五年正月太宗謂侍臣曰古者諸侯入朝有湯沐邑芻禾百車待以客禮漢家故事為諸州刺史郡守創立邸舍于京城頃聞都督刺史充考使至京師皆賃房與商人雜居旣優禮之不足必是人多不便至十七年十月下詔令就京城内閑坊為諸州朝集使各造邸第三百餘所太宗親觀幸焉貞觀二十二年十月令百僚朔望服袴褶以朝冊府元龜髙宗以貞觀二十三年即位九月十一日太尉無忌等奏請視朝坐日上報曰朕登大位日夕孜孜猶恐擁滯衆務自今以後毎日常坐永徽二年八月二十九日詔來月一日太極殿受朝此後毎五日一度太極殿視朝朔望朝即永為常式京官文武五品依舊五日一恭顯慶二年太尉長孫無忌等奏以天下無虞請隔日視事許之文獻通考中宗神龍元年初令文武官五品以上毎朔望恭日升殿食四月上以時屬炎暑制令毎隔日不坐右拾遺靳恒上疏諌曰臣聞昔漢制反支日亦通奏事又光武在軍躬自覽疏明帝撫運夜必讀書豈以四氣炎寒妨於政理竊為陛下不取冊府元龜先天二年二月太上皇誥正月十五日朝改取十一日毎年皆然又非朔望而同朔望受朝者前後有誥非一文獻通考先天二年勅文武官朝恭應著袴褶珂繖者其有不著入班者各奪一月俸若無故不到者奪一季祿其行香拜表不到亦凖此頻犯者量事貶䧏其衣冠珂繖仍許著到􅈠司十月勅諸蕃使都府管覊縻州其數極廣毎州遣使朝集頗成勞擾應須朝賀委當蕃都督與上佐及管内刺史自相通融明為次第毎年一蕃令一人入朝給左右不得過二人仍各分領諸州貢物於都府㸃檢一時錄奏開元中蕭嵩奏毎月朔望皇帝受朝於宣政殿先列仗衛及文武四品以下於庭侍中進外辦上乃歩自西序門出昇御座朝罷又自御座起歩入東序門然後放仗散臣以為宸儀肅穆升䧏俯仰衆人不合得而見之乃請備羽扇於殿兩廂上将出所司承㫖索扇扇合土座定乃去扇給事中奏無事上将退又索扇如初今以為常蕙田案開元禮朔日受朝儀與此畧同而加詳彼云受朝於太極殿據在大内而言此云宣政殿據在大明宫而言也唐開元禮朔日受朝其朔日讀時令則不行此禮前一日尚舍奉御設御幄於太極殿北壁南向守宫設文官次於朝堂如常儀太樂令展宫懸於殿庭設舉麾位於殿上西階之西東向一位於樂懸東南西向並如常儀其日典儀設文官三品以上位於横街之南道東設武官三品以上位於道西俱毎等異位重行北面相對為首設文官四品五品位於懸東六品以下於横街之南毎等異位重行西面北上設武官四品五品位於懸西六品以下於横街之南當文官毎等異位重行東面北上設典儀位於樂懸東北贊者二人在南少退又奉禮設門外位文官於東朝堂西面武官於西朝堂東面皆毎等異位重行北上其日依時刻諸衛勒所部列仗屯門及陳於殿庭如常儀羣官朝集官俱就次各服公服吏部兵部贊羣官俱出次通事舍人各引就朝堂前位侍中版奏請中嚴鈒㦸近仗入陳於殿太樂令帥工人入就位協律郎入就舉麾位諸衛之官各服其器服符寶郎奉寶俱詣閤奉迎典儀司贊者入就位通事舍人引四品以上先入就位侍中版奏外辦有司承㫖索扇皇帝弁服絳紗衣御輿以出曲直華葢警蹕侍衛如常儀皇帝将出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂皇帝出自西房即御座南向坐符寶郎奉寶置於御座如常儀協律郎偃麾戛敔樂止通事舍人引三品以上以次入就位公初入門舒和之樂作至位樂止立定典儀曰再拜贊者承傳在位者皆再拜典儀又曰再拜贊者承傳羣官在位者又再拜舍人引羣官北面位者以次出公初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位有司承㫖索扇皇帝興太樂令令撞蕤賓之鐘左五鐘皆應奏太和之樂皇帝䧏座御輿入自東房侍衛警蹕如來儀侍臣從至閤樂止舍人引東西面位者以次出皇帝若御翼善冠則羣臣皆服袴褶不設樂懸去警蹕朝集使引見奉辭附前一日尚舍奉御先奏於御殿所設御座如常儀其日依時刻所司量加隊仗陳列如常式典儀於殿庭横街之南北設版位如常儀其日朝集使夙興並集朝堂各服其服朝京官文武九品以上並服袴褶諸侍奉官及京官文武四品以上就位如式通事舍人引京官文武三品以上及朝集使俱就所御殿門外序立以次侍中進奏外辦皇帝常服即御座南向坐侍衛如常儀通事舍人分引京官文武三品以上詣横街南相對北面位立定典儀曰再拜羣官在位者皆再拜訖通事舍人各引就街北東西班停立又通事舍人分引朝集使入北面位東方南方在東西方北方在西立定典儀曰再拜朝集使等俱再拜通事舍人承㫖詣朝集使東北面立稱有制朝集使等皆再拜舍人宣勅訖又再拜答制先定行首一人跪奏舍人為奏聽進止若承恩慰問即舞蹈訖又再拜舍人宣勅訖侍中奏禮畢皇帝還宫如來儀侍臣退羣官等以次退其朝集使奉辭皆凖奉恭之儀其京官但常恭官列版位其朝集使三品以上引升殿賜食四品以下於廊下賜食並臨時奏聽進止冊府元龜開元二十二年閏十一月詔諸州考使六品以下朔望日朝宜凖例賜食通典天寶三載二月勅百官朔望朝恭應服袴褶并著珂􅐸至閏二月一日宜停自今以後毎逢此閏仍永為恒式舊唐書元宗本紀天寶五載夏五月庚申勅今後毎至旬節休暇中書門下文武百僚不須入朝外官不須衙集通典天寶六載九月勅自今以後毎朔望於常儀一刻進外辦毎坐喚仗令朝官從容至閤門入至障外不須趨走百司無事至午後放歸無為守成宜知朕意蕙田案入閤之禮始於此文獻通考入閤唐制起於天寶明皇以無為守成詔宴朝喚仗百官從容至閤門入盖唐前含元殿非正至大朝㑹不御次宣政殿謂之正衙毎坐朝必立仗於正衙或御紫宸殿即喚正衙仗自宣政殿兩門而入是謂東西上閤門故謂之入閤其後遂為常朝之儀宋史禮志唐制天子日御正衙以見羣臣必立仗朔望薦食陵寝不能臨前殿則御便殿乃自正衙喚仗由宣政兩門而入是謂東西上閤門羣臣俟於正衙者因隨以入故謂之入閤五代以來正衙既廢而入閤亦希闊不講宋復行之蕙田案通考與宋志所載入閤之説不同今以冊府元龜考之則通考為得之矣盖唐制正衙毎日有立仗𤣥宗以正衙體嚴而御便殿以接羣下喚仗入閤示無為守成之意故不特朔望入閤常日亦可入閤何者御便殿原無常期也册府元龜載大歴中間日坐朝雙日不復入閤然則入閤可間日行之何必朔望耶冊府元龜又云故事朔望日皇帝御宣政殿謂之大朝此即開元禮所載元宗始以朔望陵寝薦食不聽政其後遂以為常憲宗元和十年三月朔御延英殿召對宰臣特以事召非故事也夫入閤接見羣臣所以聽政曰不聽政則并入閤亦廢之矣且入閤之儀於紫宸殿行之雖云便殿固内朝之正殿也延英則非正殿矣朔望薦食延英且不御况御紫宸乎竊意天寶以後元宗怠于政事始則借為守成之名變正衙之朝而為入閤繼則借薦食陵寝之説并朔望入閤亦廢之其後習以為常有常日入閤無朔望入閤矣徳宗以後率於延英召對宰臣而常日入閤又復不講至敬宗復入閤之儀則專於朔望行之此禮之變也宋志以朔望薦食不聽政亦起於元宗遂與入閤并為一事誤矣又案宋張洎宋庠宋敏求皆以入閤為唐隻日紫宸殿受常朝之儀不云朔望其説得之冊府元龜天寶六載正月詔曰今勝殘在運無事為心顧此朝儀當符至理既時非旰食将致昇平而廷設殺刑何成在宥其每日立仗食及杖鍉等並宜停廢十一月辛夘朔引朝集使及貢舉人見十二月丙寅仗下後百官於尚書省閲貢物通典天寶十二載十一月御史中丞吉温奏請京宫朔望朝恭著朱衣袴褶五品以上著珂􅐸制曰可蕙田案此朱衣袴褶之始文獻通考肅宗乾元三年勅員外郎五品以上常恭官自今以後非朔望日許不入賊平之後依舊常叅時安史據河洛通典代宗廣徳二年勅常恭官遇泥雨准儀制令例停朝恭今軍國事殷若准式停恐有廢闕泥既深阻許延三刻傳㸃待道路通依常式以後亦宜准此冊府元龜大歴九年十一月是時四方無事間日坐朝雙日不復入閤十二年八月以久雨宥常恭百寮不許御史㸃班舊唐書徳宗本紀建中元年十一月辛酉朔朝集使及貢士見於宣政殿兵興以來四方州府不上計内外不㑹同者二十五年至此始復舊典州府計吏至者一百七十有三文獻通考建中二年御史中丞竇㕘奏准儀制令泥雨合停朝㕘伏以軍國事殷恐有廢闕請令毎司長官一人入朝有兩員併副貳亦許分日其夜甚雨至明不止許令仗下到廊食訖入中書其餘官及王府長官並請停朝任於本司勾當公事泥雨經旬亦望准此是年舉故事置武班朝亦其廊下食等宜加給冊府元龜貞元元年七月闗中蝗食禾稼無孑遺八月甲子詔不御正殿奏事悉於延英庚寅視朝於延英殿羣臣列位於延英殿門外申甲子之詔也丁丑雨戊寅中書門下上言陛下前以愆陽經時避居正殿凡在臣庶無任兢惶今至誠感通嘉雨霑洽兇渠授首同類格心臣等敢昧死請自今以後依常儀御正殿詔曰可蕙田案開延英殿始見於此文獻通考開延英儀内中有公事商量即䧏宣頭付閤門開延英閤門翻宣申中書并㮄正衙門如中書有公事敷奏即宰臣入㮄子奏請開延英祗是宰臣赴對閤門使奏宰臣某已下延英候對宣徽使殿上宣通次閤門使奏中書門下到次宣徽使喚次閤門使傳聲喚次通事舍人引宰臣當殿立贊兩拜搢笏舞蹈又三拜奏聖躬萬福又兩拜金口宣上來又兩拜通事舍人引上殿至御座前又兩拜問聖體皇帝宣安又兩拜三呼萬嵗各分班案前立定兩樞密使在御榻兩面祗候其餘臣僚並約赴外次奏事訖宣賜茶又兩拜三呼萬嵗賜坐吃茶對訖下殿兩拜宣賜酒食舞蹈謝恩訖宣徽使喝好去就中書喫食延英畢次兩省官轉對閤門使當殿奏某已下轉對宣徽使殿上宣通次閤門使奏某已下到次宣徽使喚次閤門使傳聲喚次通事舍人引當殿立定贊兩拜搢笏舞蹈又三拜奏聖躬萬福又兩拜殿下奏事訖宣賜酒食又兩拜舞蹈謝訖閤門使喝好去南班揖殿出於省就食次對官御史中丞三司使京兆尹並各奏所司公事次閤門使奏某祗候次對宣徽使殿上宣通次閤門使奏某到次宣徽使喚次閤門使傳聲喚次通事舍人引當殿立定贊兩拜搢笏舞蹈三呼萬嵗又三拜訖奏聖躬萬福又兩拜奏所司公事宣賜酒食又兩拜舞蹈謝訖閤門使喝好去南班揖殿出於客省就食合赴延英中謝官文武兩班三品及御史中丞左右丞諸侍郎諌議給事中書舍人并諸道節度觀察防禦團練使刺史兩縣令皆入謝並通喚文武四品以下及諸道行軍司馬節度副使兩使判官書記支使推巡令錄等舊例并不對􅆒中謝祗於正衙朝謝蕙田案馬氏通考載開延英儀於貞元二年勅之後然閤門使宣徽使三司使唐時無此官制而宋又無開延英之儀當是五代所定之儀或昭宣帝時開延英有之今不可定以延英奏事始於貞元故附見於此并存疑以俟考舊唐書徳宗本紀貞元三年春三月庚寅詔今年朝集使宜停文獻通考貞元七年詔常叅官入閤不得奔走其有周以下喪者禁襂服朝㑹復衣綾袍金玉帶初金吾将軍沈房有弟䘮公服不衣襂服入門上問宰臣董晉對曰准式朝官有周以下䘮者許服絁縵衣不合淺色上曰南班何得有之對曰因循而然又曰在式朝官皆以綾為袍五品以上服金玉帶取其文綵華飾以奉上也昔尚書郎含香此意也冊府元龜貞元十三年正月御史臺奏諸司常恭文武隔假三月以上並横行恭假其武班毎日先配九恭六恭比來或經冬至及嵗首寒食等三節假滿不是本配入日並不横行事實乖闕請從今以後毎經三節假滿不是本配入日其前件官請依文官例横行恭假庶幾周行式序可之五月帝以累月天陰街鼓聲暗百官入朝多走馬奔馳令宣示宰臣及百官曰卿等朝謁是常或陰雨不聞鼓聲則不免奔波走馬忽有墜損深軫朕懷自今以後縱鼓聲差池亦不得走馬并時暑稍甚及雨雪泥潦亦量放朝恭宰臣等上表陳謝文獻通考憲宗元和元年三月准吏部兵部尚書侍郎郎官并禮部侍郎御史中丞武元衡奏近起十月至來年三月稱在𨕖舉限内不奉朝􅄁令式無文禮敬斯闕一年之内半嵗不朝去貞元十二年中丞王顔奉勅釐革載在明文尋又因循輙自更改若以兵吏禮部舉選限内事繁即中書門下御史臺度支京兆府公事至重朝請如常又况旬節已賜歸休常恭又許分日一月之内才奉十日朝􅄁其間甚熱甚寒皆蒙班放臣以為王顔舉奏甚詳當時勅文甚備准貞元十一年四月勅㫖自今以後永為常式他年妄改條請委臺司彈奏庶使班行式叙典法無虧依奏舊唐書憲宗本紀元和元年三月己未武元衡奏常恭官兼御史大夫中丞者准檢校省官例立在本品同類之上二年十二月癸亥御史臺奏文武常恭官准乾元元年三月十四日勅如有朝堂相弔慰及跪拜待漏行立失序語笑喧嘩入衙入閤執笏不端行立遲慢立班不正趨拜失儀言語微喧穿班穿仗出入閤門無故離位廊下飲食行坐失儀諠閙入朝及退不從正衙出入非公事入中書等毎犯奪一月俸班列不肅所由指摘猶或飾非即具聞奏貶責臣等商量於舊條毎罰各減一半所貴有犯必舉從之冊府元龜元和二年二月己巳宰臣延英罷對起居舍人鄭隨次對詔入面受進止令宣付兩省供奉官自今以後有事即進状來其次對宜停初貞元七年詔毎御延英引見常恭官二人訪以政道謂之次對官所以廣視聽也宰臣奏罷時議非之六月丁巳朔百官初入待漏院候禁門啟入朝故事建福望仙等門昏而闔五更而啟與諸里門同時至徳中有吐蕃内自金吾仗亡命因勅晩開宰相待漏於太僕寺車坊至是始命有司各據班品置院於建福門外唐國史補舊百官早朝必立馬於望仙建福門外宰相於光宅車坊以避風雨元和初始制待漏院蕙田案此制待漏院之始冊府元龜元和六年十二月庚午以苦寒放朝五日七年四月壬子開延英對宰臣以下八年十月丙辰以大雪放朝三日九年六月癸卯以時暑甚放百官五日參十年三月壬申朔御延英殿召對宰臣故事朔望日皇帝御宣政殿見羣臣謂之大朝元宗始以朔望陵寝薦食不聽政其後遂以為常今之見宰臣特以事召也六月勅御史臺自今以後常叅官入朝以見到人名銜進來其朔望及雙日莫進舊唐書憲宗本紀元和十四年上謂宰臣曰天下事重一日不可曠廢若遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列将退上止之曰數日一見卿等時雖暑熱朕不為勞久之方罷冊府元龜穆宗長慶二年八月詔曰夏秋之間常多水潦如縁暮夜暴雨道路不通車馬宜便放其日朝恭委御史臺勾當仍毎日奏如雨不至甚即不在此例敬宗以長慶四年正月即位二月辛丑御紫宸殿羣臣初展入閤之儀葉氏夢得曰唐正衙日見羣臣百官皆在謂之常㕘喚仗入閤百官亦隨以入則唐制天子未嘗不日見百官也其後不御正衙紫宸所見惟大臣及内諸司百官俟朝於正衙者傳聞不坐即退則百官無復見天子矣敬宗再舉入閤禮之後百官復存朔望兩朝唐書李渤傳渤諌議大夫時敬宗晏朝紫宸入閤帝久不出羣臣立屏外至頓仆渤見宰相曰昨論晏朝事今益晩是諌官不能移人主意渤請出閤待罪㑹喚仗乃止退上疏曰今日入閤陛下不時見羣臣羣臣皆布路跛倚夫跛􅀝形諸外則憂思結諸内憂倦既積災釁必生小則為旱為孽大則為兵為亂禮三諌不聽則逃之陛下新即位臣至三諌恐危及社稷又言左右常侍職規諌循黙不事若設官不責實不如罷之舊唐書文宗本紀太和元年六月辛卯朔勅文武常叅官朝叅不到據料錢多少毎貫罰二十五文冊府元龜開成元年正月己酉詔以入閤日次對官班退立於東階松樹下須宰臣奏事畢齊至香案前各言本司事左右起居又待次對官奏事畢方出舊唐書昭宣帝本紀天祐二年十二月辛丑勅漢宣帝中興五日一聽朝歴代通規永為常式近代不循舊儀輟隳制度致姦邪之得計致臨視之失常須守舊規以循定制宜毎月只許一五九日開延英計九度其入閤日仍於延英日一度指揮如有大叚公事中書門下具牓子奏請開延英不計日數付所司又勅宫嬪女職本備内任近年以來稍失儀制宫人出内宣命寀御叅隨侍朝乃失舊規須為永制今後毎遇延英坐朝日只令小黄門祗候引從宫人不得擅出内門庶循典儀免至紛雜見聞録唐㑹要天祐二年勅令後毎遇延英坐朝日只令小黄門祗候引從宫人不得擅出内乃知杜詩户外昭容紫䄂垂雙瞻御座引朝儀者真出殿引坐而鄭谷入閤詩亦言導引出宫鈿盖至天祐始罷三年六月壬寅勅文武百寮毎月一度入閤於貞觀殿朝廷正衙遇至正之辰受羣臣朝賀比來視朝未正規儀今後於崇勲殿入閤付所司蕙田案昭宣帝以天祐元年八月即位不改元四年而禪梁冊府元龜載此二勅以為昭宗天復二年三年之事文獻通考則云昭宗天祐二年三年不知昭宗崩在元年皆誤也今以舊唐書本紀為正冊府元龜天祐二年四月勅自今年五月一日後常朝出入取東上閤門或遇奉慰即開西上閤門永為定制蕙田案冊府元龜載天復三年文武兩班官員遇一五九朝日元帥朱全忠請排廊餐賜詔奨飭仍付所司案一五九日開延英之制既定於天祐二年則此事亦當在天祐三年可知今附見於此右唐常朝冊府元龜後唐荘宗同光元年十二月中書門下奏毎日常朝百官皆拜獨兩省官不拜准本朝故事朝退於廊下賜食謂之廊餐百僚遂有謝食拜惟兩省官本省有厨不赴廊餐故不拜伏自僖宗幸蜀廻以多事之後遂廢廊餐百官拜儀至今未改将五十載禮恐難停惟兩省官獨尚不拜豈可終日趨朝曽不一拜獨於班列有所異同若言官是近臣於禮尤宜肅敬起今後逐日常朝宣不坐除職事官押班不拜外其兩省官與東西兩班並齊拜從之二年正月庚申四方館奏常朝諸職員多有參雜今後除隨駕将校外方進奉專使文武兩班三品以上官可於内殿對見其餘並詣正衙以申常禮從之八月癸巳宣㫖放三日朝恭以霖雨甚故也三年正月以百官扈從之勞放十九日至二十日朝叅六月癸酉勅泥􅂗稍甚放文武常恭三日丁亥以霖雨放朝七月乙未勅霖雨未止泥􅂗頗甚宜放五日六日朝恭戊戌勅泥􅂗頗甚放八日九日朝恭丁亥以霖雨放朝八月己丑勅如聞天津橋未通往來百官以舟船濟渡因滋傾覆兼踣泥􅂗自今文武百官三日一趨朝宰臣即毎日中書視事明宗天成元年五月丁巳内出御劄一封賜宰臣曉示文武百僚毎日正衙常朝外五日一度赴内殿起居宰臣百官班於文明殿庭謝其中書非時有急切公事請開延英不在此限乙酉勅毎月十五日賜廊下食本朝承平時常㕘官毎日退朝賜食廊下謂之廊餐自乾符亂離已後庶事草創有司經費不足無毎日之賜但遇月旦入閤日賜食帝初即位始因諌官疏奏請文武百寮五日一起居見帝於便殿李琪以為非故事以五日為繁請毎月朔望日皆入閤賜廊下食罷五日起居之儀至是宣毎月朔望皆入閤依奏五日一度起居不得停廢遂以為常五代史李琪傳唐末喪亂朝廷之禮壞天子未嘗視朝而入閤之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事日一見便殿而侍從内諸司日再朝而已明宗初即位乃詔羣臣五日一隨宰相入見内殿謂之起居琪以為非唐故事請罷五日起居而復朔望入閤明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閤可復然唐故事天子日御殿見羣臣曰常㕘朔望薦食諸陵寝有思慕之心不能臨前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入閤官俟朝於衙者因隨以入見故謂之入閤然衙朝也其禮尊閤宴見也其禮殺自乾符以後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤琪皆不能正也琪又建言入閤有待制次對官論事而内殿起居一見而退欲有言者無由自陳非所以數見羣臣之意也明宗又詔起居日有言事者許出行自陳又詔百官以次轉對五代㑹要天成元年五月十九日勅本朝舊日趨朝官置待漏院候子城門開便入立班如遇不坐前一日晩便宣來日兩衙不坐其日纔明閤門立班便宣不坐百官各退歸司近年以來雖遇不坐正殿或是延英對宰臣或是内殿親決機務所司不循舊制往往及辰巳之時尚未放班既日色已髙人心咸倦今後若遇不坐日未御内殿前便令閤門使宣不坐放朝班退冊府元龜天成元年八月壬辰以積雨泥甚放百僚朝參己亥帝御文明殿百官入閤如月朔之儀從新例也九月丙辰帝御文明殿入閤新制次日例也十月右拾遺曹珍上疏内一件百寮朔望入閤及五日一度内殿起居請許三署寺監官輪次轉對奏事從之二年正月丙申詔曰君使臣以禮臣事君以忠禮不可一日不修忠不可一夕不念二者全則上下順一途廢則出入差須振綱維以嚴規矩凡在策名之列皆知辨色而朝儻不夙興是虧匪􅈈君上思政猶自求衣未明為下服勤固合假寐待旦宜令御史臺編示文武兩班自此毎日早赴朝恭職司既得整齊公事的無壅滯如或尚兹􅈈怠具錄奏聞文獻通考三年中書門下奏逐日常朝宣奉勅不坐兩省官與東西兩班並拜押班宰臣不拜或聞班行所論承前有廊餐百官謝食兩省即各有常厨從來不拜或云有侍臣不拜檢尋故實不見明規百官拜為廊餐即承㫖合宣有勅賜食供奉官不拜亦恐非儀且左右前後之臣日面天顔豈可不拜臣等商量今後常朝押班宰臣亦拜通事舍人亦拜閤門外放仗亦拜從之冊府元龜長興元年二月郊祀畢丙辰勅宜放兩日朝叅以百官行事之勞故也五月庚寅詔諸州得替防禦團練使刺史並宜於班行比擬如未有員闕可隨常叅官逐日立班新例也二年八月癸酉詔文武百官五日内殿起居仍舊其輪次對宜停若有封事許非時上表朔望入閤待制候對一依舊制三年三月乙酉勅文武兩班毎遇入閤從官並賜酒食從前臺官及諸朝官皆在敷政門外兩廊下就食惟北省官於敷政門内既為隔門各不相見致行坐不齊難於整肅今後毎遇入閤賜食北省官亦宜令於敷政門外東廊下設席以北為首待班齊一時就坐六月己未勅以霖雨經旬街衢泥濘文武兩班宜放今月八日朝恭甲子朔勅放三日朝叅大雨故也四年八月辛亥以霖雨甚宣㫖放入閤五代史盧文紀傳文紀拜中書侍郎同中書門下平章事是時天下多事廢帝數以責文紀文紀因請罷五日起居復唐故事開延英冀得從容奏議天下事廢帝以為五日起居明宗所以見羣臣也不可罷而便殿論事可以從容何必延英因詔宰相有事不以時詣閤門請對冊府元龜末帝清泰元年六月辛夘御史中丞張鵬奏文武常叅官入閤内廊下設食毎宣放仗拜後就食相承以為謝食拜臣以毎日常朝宣不坐後拜退豈謝食之謂乎如臣所見自今宣放仗拜後且就次候将設食别降使於敷政門外宣賜酒食羣臣謝恩後食從之十一月己巳御史臺奏前任節度防禦團練使等刺史行軍副使近儀五日一度内殿起居皆綴班序立元係班簿雖曰便殿起居其遇全班起居時亦合綴班從之二年三月庚戌御文明殿羣臣入閤刑法官劇可久待制官李慎儀次對後晉髙祖天福二年三月己未御史臺奏唐朝定令式南衙常叅文武百僚毎日朝退於廊下賜食謂之堂食自唐末亂離堂食漸廢仍於入閤起居日賜食毎入閤禮畢閤門宣放仗羣官俱拜謂之謝食至偽主清泰元年中入閤禮畢更差中使至正衙門口宣賜食百寮立班重謝此則交失有唐堂食之意於禮實為太煩臣恐因循漸失根本起今後入閤賜食望不差中使口宣請准唐明宗朝事例處分從之四月丙午御史臺奏文武百寮毎五日一度内殿起居在京城時百官於朝堂幕次自文明殿門入穿文明殿庭入東上閤門至天福殿序班令隨駕百官自到行朝毎遇起居日於幕次東出升龍門與諸色人排肩雜進自外繚繞方入内門臣竊見升龍門外庭宇不寛人徒大集或是諸司掌事或是諸道使臣方集貢輸不可止約若令與衣冠雜進朝士並趨則恐有壞天官見輕朝序權時之義事理難安起今後毎遇百官赴内殿起居日請依在京事體百官於幕次自正衙門入東出横門既協京國常儀兼在行朝便穏從之庚戌御史臺奏文武百寮毎月朔望入閤禮畢賜廊下食在京時祗於朝堂幕次兩廊下今在行朝於正衙門外權為幕次房廊湫隘間架絶少伏恐五月一日朝㑹禮畢准例賜食即與幕次難為排比伏見唐明宗時兩省官於文明殿前廊下賜食今未審每遇入閤日權於正衙門内兩廊下排比賜食為復别有處分者勅㫖宜依明宗時舊規六月甲午太妃将至行闕放文武朝一日十一日中書奏准唐貞元二年九月五日勅文官充翰林學士及皇太子諸王侍讀武官充禁軍職事並不常朝恭其在三館等諸職事者並朝叅訖各歸所務自累朝以來文武在内廷充職兼判三司或帶職額及六軍判官等例不赴常朝元無正勅准近勅文武職事官未升朝者案舊制並赴朔望朝恭其翰林學士侍讀三館諸職事望准元勅處分其在内廷諸司使等毎受正官之時來赴正衙謝後不赴常朝大㑹不離禁廷位次三次職官免常朝惟赴大朝㑹其京司未升朝官員祗赴朔望朝恭帶諸司職掌者不在此例文官除端明殿翰林學士樞密院學士中書省知制誥外有兼官兼職者仍各發遣本司供事可之四年七月壬寅朔帝御崇元殿百官入閤如常禮朔不入閤日蝕故也閏七月庚子朔百官不入閤雨霑服也十二月丁酉朔百官不入閤大雪故也五年正月壬辰馮道奏曰宰臣朝見辭謝在朝堂横街之南逮至餘官則悉於崇元門内夫表著之列豈可踰之故古先明王必正其位服此實事因偶爾習以為常又入閤禮畢之時羣官退於門外定班如初俟宣放仗唯翰林學士前任郡守等不隨百辟即時直出二者禮僣序失其使正之帝深然其言於是下詔曰官爵之班即分髙下見謝之位豈有異同宜格通規以為定制今後宰臣使相朝見辭謝並於崇元門内與諸官重行異位一時列班横行以從舊例又入閤之義序班為重宣喚則齊趨正殿各出朝門何起居之禮即同而進退之規有異其翰林學士及前任郡守等今後入閤退朝宜依百官班制七年五月己亥中書門下奏時屬炎蒸事宜簡省應五日百官起居即令押班宰臣一員押官班其轉對官兩員封事付閤門使引進本官起居後隨百寮退不用别出謝恩其文武内外官寮乞假寜親移家及昏葬病損並門見門辭諸道進奉物等不用殿前排列引進使引至殿前奏云某等進奉奏訖其進奉物便出其進奉專使朝見日班首一人致詞都附起居州刺史并行軍副使諸道馬歩軍都指揮使已下差人到闕並門見門辭州縣官謝恩日甲頭一人都致詞不用逐人告官其供奉官殿直等如是當直及於合殿前排立者即入起居如不當直排立者不用毎日起居委宣徽院專切㸃檢常須整齊從之開運元年八月癸卯倉部郎中知制誥陶穀奏内外臣寮正衙辭謝内則諸司小吏與宰相差肩外則屬郡末寮共元戎接武欲望宰臣使相依舊押班其郡牧藩侯臺省少監長吏等不得令部内本司卑冗官員同班辭謝勅從其奏十一月乙亥吏部侍郎張昭逺奏文武常參官毎日於正衙立班閤門使宣不坐後百僚俱拜舊制惟押班宰相押樓御史通事舍人各縁提舉贊揚所以不隨庶官俱拜自唐天成末議者不悉朝儀遽違舊典遂令押班之職一例折腰此則深忽禮文殊乖故實且宰相居庶寮之首御史持百職之綱嚴肅禁庭糾繩班列慮於拜揖之際或爽進退之宜於是凝立静觀檢其去就若令旅拜旅揖實恐非宜况事要酌中恭須近禮人臣愛主不在於斯其通事舍人職司贊導比者兩班進退皆相其儀今則在文班武班之前居一品二品之上端笏齊拜禮實未聞其押班相押樓御史通事舍人並請依天成三年以前禮例施行無至差忒殿中侍御史賈元珪奏是非既異沿革不同舉之則雖有舊規考之則全無故實且夫酌人心而致禮依神道而設教此乃經國之大端也况通事舍人居贊導之職押樓御史當糾察之司一則示於紀綱一則防於謬誤所以静觀進退詳視等威實非抗禮於庭所謂各司其局俾令不拜雅合其宜伏以宰相押班率千官而設拜起居内殿統百辟以致詞儀刑文武之班表式鵷鷺之列不得比贊導之職詎可同糾察之司統冠羣僚所宜列拜臣位居憲府迹厠同班言或庶其得中罪難逃於多上帝從之蕙田案御史司糾察舍人主贊導朝謁之時不令一體列拜所以肅朝儀也宰相百僚之師表既云押班自應率領諸司一體跪拜賈元珪之議允為得中二年六月乙丑朔帝御崇元殿百官入閤後漢𨼆帝乾祐二年五月中書舍人艾頴上言近制一月兩度入閤五日一度起居近年以來入閤多廢毎遇朔望不面天顔臣請今後朔望入閤即從常禮如不入閤即請朔望日起居冀面聖顔以伸誠敬周太祖廣順元年四月壬辰朔帝御廣政殿羣臣起居十月壬寅雪尺餘放朝二年十一月癸丑朔入閤顯徳元年八月壬寅朔帝御崇元殿文武百寮入閤仗衛如儀十一月辛未朔帝御崇元殿文武百官入閤仗衛如儀二年四月己亥帝御崇元殿文武百官入閤仗衛如儀八月丁酉朔帝御崇元殿百官入閤如儀三年六月壬戌朔帝御崇元殿文武百官入閤仗衛如儀四年二月辛酉詔曰文武百寮起今後毎遇入閤日宣賜廊餐此有唐之舊制也自晉氏多故寝而不行上以寵待廷臣故復有是命五月丁亥朔帝御崇元殿視朝太常樂懸金吾仗衛如儀八月乙卯朔帝御崇元殿文武百官入閤如儀既罷賜百官廊餐時帝御廣徳殿西樓以觀焉命中黄門閲視酒􅄿無不腆右五代常朝五禮通考卷一百三十三
