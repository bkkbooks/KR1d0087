body:
  text: 五禮通考卷一百九十一刑部尚書秦蕙田撰嘉禮六十四觀象授時書舜典在璿璣玉衡以齊七政傳七政日月五星各異政疏七政謂日月五星也木曰嵗星火曰熒惑土曰鎮星金曰太白水曰辰星蕙田案史記天官書馬融尚書注以北斗七星為七政尚書大傳以春秋冬夏天文地理人道為七政皆未甚的今以孔鄭之說為正詩小雅大東東有啟明西有長庚傳日旦出謂明星為啟明日既入謂明星為長庚庚續也東疏釋天云明星謂之啟明孫炎曰明星太白也旦出方髙三含今曰明星昏出西方髙三含今曰太白然則啟明是太白矣長庚不知是何星也或一星出在東西而異名或二者别名未能審也朱子集傳啟明長庚皆金星也以其先日而出故謂之啟明以其後日而入故謂之長庚葢金水二星常附日行而或先或後但金大水小故獨以金星為言也何氏楷曰太白名號甚多獨不見長庚之稱其廣如一匹布著天者亦名長庚此妖異之星非常見者不應與啟明對言鄭樵則以長庚為水星謂金水二星附日而行金在日西故日將出則東見水在日東故日將没則西見夫水星自名辰星古來載籍未聞以長庚呼水星也且據史記稱太白出以辰戌入以丑未辰星出入亦常以辰戌丑未安得每日東西見乎及考張揖廣雅則云太白謂之長庚或謂之太囂始知長庚啟明本是一星而李白之生母夢長庚星因以白為名而字太白非無據也特從來解說東西二字不明似乎每日東西兩見者然夫東西原非同時當其晨見東方去夕見之期甚逺及其夕見西方去晨見之期甚逺啟明長庚正因東西見而異其名乎鄭風女曰雞鳴子興視夜明星有爛傳言小星已不見也爾雅釋天明星謂之啟明注太白星也晨見東方為啟明昏見西方為太白星春秋襄公九年左氏傳晉侯以公宴於河上問公年季武子對曰會於沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也注嵗星十二嵗而一周天古疏直言一星終知是嵗星者以今律法推步五星金水日行一度土三百七十七日行星十二度火七百八十日行星四百一十五度四者皆不得十二年而一終唯木三百九十八日行星三十二度十二年而强一周舉其大數十二年而一終故知是嵗星蕙田案古今術家皆以嵗星一年行一次有竒云十二年一終者舉其成數非宻率也國語周語昔武王伐殷嵗在鶉火注嵗嵗星也鶉火次名周分野也從栁九度至張十七度為鶉火星在天黿注星辰星也天黿次名一曰元枵從須女八度至危十五度為天黿謂周正月辛卯朔二日壬辰辰星始見二十九日己未晦冬至辰星在須女伏天黿之首漢書志三統上元至伐紂之嵗十四萬二千一百九嵗嵗在鶉火張十三度故傳曰嵗在鶉火則我有周之分野也周正月辛卯朔明日壬辰晨星始見師古日晨古晨字癸巳武王始𤼵丙午逮師戊午渡於孟津孟津去周九百里明日己未冬至晨星與婺女伏閱建星及牽牛至於婺女天黿之首故傳曰星在天黿蕙田案三統術推武王克商之嵗嵗星及辰星所在與國語合五星惟嵗星見於經傳獨多葢古人用以紀嵗然亦僅約其大率非實測其伏見之行此云星在天黿劉子駿以五步求之得是嵗天正冬至日辰星伏于婺女正當天黿之首然則五緯之伏見古人亦必有推步之術今不可考矣晉語董因曰君之行嵗在大火注謂魯僖公五年重耳出奔時嵗在大火君以辰出而以參入必獲諸侯注辰大火也參伐也參在實沈之次重耳處狄十二年而行過衛五鹿乞食於壄人壄人舉土以與之子犯曰天事必象十有二年必獲此土二三子志之嵗在夀星及鶉尾其有此土乎天以命矣復於夀星必獲諸侯天之道也注嵗在夀星謂得塊之嵗魯僖十六年也後十一年嵗在鶉尾必有此五鹿地也魯僖二十七年嵗在鶉尾二十八年嵗復在夀星晉文公伐衛正月六日戊申取五鹿周正月夏十一月也正天時以夏正故嵗在鶉尾嵗復在夀星謂魯僖二十八年也是嵗文公敗楚師于城濮王䇿命之以為侯伯故得諸侯春秋襄公二十八年左氏傳春無氷梓慎曰今兹宋鄭其饑乎嵗在星紀而滛於𤣥枵注嵗嵗星也星紀在丑斗牛之次𤣥枵在子虚危之次十八年晉董叔曰天道多在西北是嵗嵗星在亥至此年十一嵗故在星紀明年乃當在𤣥枵今已在𤣥枵滛行失次之疏天有十二次地有十二辰五子亥北方之辰也次與辰上下相值故云星紀在丑𤣥枵在子漢書志載劉歆三統術以為嵗星一百四十四年行天一百四十五次一千七百二十八年為嵗星嵗數言數滿此年剩得行天一周也三統之術以庚戌為上元此年距上元積十四萬二千六百八十六嵗置此嵗數以嵗星嵗數一千七百二十八除之得積終去之嵗餘九百四十以百四十五乘嵗餘得十四萬三千五百五十以百四十四除之得九百九十六為積次不盡一百二十六為次餘以十二除之得八十三去之盡是為此年更𤼵初在星紀也欲知此入次度者以次餘一百二十六乘一次三十度以百四十四除之得二十六度餘是嵗星本平行此年之初已入星紀之次二十六度餘當在􅄔女四度於法未入於𤣥枵也傳言滛于𤣥枵未知已在𤣥枵幾度此舉其大率耳而五星之行有遲有疾有留伏逆順于法更自别有推步之術此不可詳也以有時菑隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必饑𤣥枵虚中也枵耗名也土虚而民耗不饑何為禆竈曰今兹周王及楚子皆將死嵗棄其次而旅於明年之次以害鳥帑周楚惡之注旅客處也嵗星棄星紀之次客在𤣥枵嵗星所在其國有福失次于北禍衝在南南為朱鳥鳥尾曰帑周楚之分蕙田案三統術法以嵗星毎嵗行天一次又百四十四分次之一嵗行一次既有餘分則星行一嵗之内常跨兩次所云嵗在某次者以通率約之非嵗内常居此次也襄公二十八年以三統法推之已入星紀宮之二十七度又星行有遲疾不同其過次而在元枵理所應有至其占騐之法則未之詳焉襄公三十年左氏傳於子蟜之卒也注在十九年將葬公孫揮與禆竈晨會事焉過伯有氏其門上有莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦注降婁奎婁也周七月今五月降婁中而天明禆竈指之曰猶可以終嵗注指降婁也嵗星十二年而一周嵗不及此次也已及其亡也嵗在娵訾之口注娵訾營室東壁也二十八年嵗星滛在元枵今三十年在娵訾是嵗星停在元枵二年其明年乃及降婁蕙田案襄公二十八年嵗在星紀據通率而言也其滛于元枵據律官實測見伏之行而言也此傳所云嵗在娵訾之口仍舉通率言之杜氏謂嵗星停在元枵二年者非也昭公八年左氏傳晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也嵗在鶉火是以卒滅陳將如之注顓頊氏以嵗在鶉火而滅火盛而水滅疏顓頊崩年嵗星在鶉火之次子是猶有書傳言之故史趙得而知也嵗星天之貴神所在必昌鶉火得嵗而火益盛顓頊水德故以此年終也今在析木之津猶將復由注箕斗之間有天漢故謂之析木之津由用也疏襄三十年傳稱嵗星在娵訾之口其明年乃及降婁嵗星嵗行一次降婁距此九年故此年嵗在析木之津也九年左氏傳夏四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年注是嵗嵗在星紀五嵗及大梁而陳復封自大梁四嵗而及鶉火後四周四十八嵗凡五及鶉火五十二年天數以五為紀故五及鶉火火盛水衰疏如杜所注嵗星每年而行一次至昭三十二年則嵗星在寅未至於且其傳云越得嵗而吳伐之故服氏以為有事于武宮之嵗龍度天門謂十五年嵗星從申越未而至午術家以周天十二次次别為百四十四分嵗星每年行一百四十五分是嵗星行一次外剩得一分積一百四十四年乃剩行一次故昭十五年得超一辰今杜氏既無此義而三十二年嵗星得在丑者嵗星之行天之常數超辰之義不言自顯故杜不注若然楚卒滅陳在哀十七年嵗星當逾鶉火至鶉尾而云五及鶉火者以顓頊嵗在鶉火而滅故禆竈舉大畧而言云五及鶉火不復細言殘數十年左氏傳春王正月有星出於婺女鄭禆竈曰今兹嵗在顓頊之虚注嵗嵗星也顓頊之虚謂𤣥枵姜氏任氏實守其地注姜齊姓任薛姓齊薛二國守𤣥枵之地居其維首而有妖星焉注客星居𤣥枵之維首疏𤣥枵次有三宿女為其初女是次之綱維也居其維首謂星居之也十一年左氏傳景王問於萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之嵗也嵗在豕韋注襄三十年蔡世子般弑其君嵗在豕韋至今十三嵗嵗復在豕韋般即靈侯也弗過此矣楚將有之然壅也嵗及大梁蔡復楚凶天之道也注楚靈王弑立之嵗嵗在大梁到昭十三年嵗復在大梁美惡周必復故知楚凶三十年左氏傳吳伐越始用師于越也史墨曰不及四十年越其有吳乎注嵗星三周三十六嵗故曰不及四十年哀二十二年越滅吳至此三十八嵗越得嵗而吳伐之必受其凶注此年嵗在星紀星紀吳越之分也嵗星所在其國有福吳先用兵故反受其殃星疏十一年傳萇𢎞對景王云嵗在豕韋言十一年嵗在豕韋也又云嵗在大梁蔡復楚凶謂十三年嵗星在大梁也十三年距此十九年耳嵗星嵗行一次十二年而行天一周則二十五年復在大梁從彼而數之則此年始至析本之津而此年數在星紀者嵗行一次舉大數耳其實一嵗之行有餘一次故劉歆三統之術以為嵗星一百四十四年行天一百四十五次計一千七百二十八年為嵗星嵗數言數滿此年剰得行天一周三統術從上元至襄二十八年積十四萬二千六百八十六嵗以嵗星嵗數去之嵗餘九百四十以百四十五乘嵗餘以百四十四除之得九百九十六為積次不盡一百二十六為次餘從襄二十八年至昭十五年合有一十八年嵗星年行一次年有一餘以次加次得一千一十四以餘加餘得一千四十四餘數滿法又成一次以從積次得一千一十五也以十二去之餘七命起星紀算外得鶉火是昭十五年嵗星在鶉火也計十三年在大梁十五年當在鶉首而在鶉火者由其餘分數滿剩得一次如閏餘滿而成一月也以十五年嵗在鶉火而數之則二十七年復在鶉火故此年在星紀也于十二次分野星紀是吳越之分也蕙田案以嵗星十二年一終之率約之是嵗當在析木之津未及星紀之次而史墨已有越得嵗之占可知五緯行天古來亦必有推步之術而劉歆三統術定五星一周嵗數及伏見日數要亦有所傳授非臆造也又案以上經傳紀五星之事星備嵗星一日行十二分度之一十二嵗而周天熒惑日行三十三分度之一三十三嵗而周天鎮星日行二十八分度之一二十八嵗而周天太白日行八分度之一八嵗而周天辰星日行一度一嵗而一周天蕙田案此條見周禮疏其云熒惑三十三嵗一周天太白八嵗一周皆疎謬之甚史記天官書嵗星嵗行三十度十六分度之七率日行十二分度之一十二嵗而周天填星嵗行十二度百十二分度之五日行二十八分度之一二十八嵗周天太白大率嵗一周天漢書志木壹見三百九十八日五百一十六萬三千一百二分行星三十三度三百三十三萬四千七百三十七分通其率故曰日行千七百二十八分度之百四十五金壹復五百八十四日百二十九萬五千三百五十二分行星亦如之故曰日行一度土壹見三百七十七日千八百三萬二千六百二十五分行星十二度千三百二十一萬五百分通其率故曰日行四千三百二十分度之百四十五火壹見七百八十日千五百六十八萬九千七百分行星四百十五度八百二十一萬八千五分通其率故曰日行萬三千八百二十四分度之七千三百五十五水壹復百一十五日一億二千二百二萬九千六百五分行星亦如之故曰日行一度蕙田案五星步術古法已無考三統術始定各星見復日數及順逆遲疾之率後代因其成法加以實測更立盈縮損益之限以求宻合然較其合見日率相去亦不甚逺則創始之功固未可没也後漢書志月有晦朔星有合見月有弦望星有留逆其歸一也步術生焉金水承陽先後日下速則先日遲而後留留而後逆逆與日違違而後速速與日競競又先日遲速順逆晨夕生焉見伏有日留行有度而率數生焉參差齊之多少均之會數生焉蕙田案五星合見之行皆由距日而生星與日同度謂之合星光為日所揜故伏而不見如月之合朔也既合以後星行遲日行速星在日後故晨見東方如月之生明東方也始見順行最疾已而漸遲及距日一象限而留不行如月之上弦也既留之後星始退行由遲而疾距日半周謂之衝日如月之望也衝日以後星之退行由疾而遲日又漸與星近至距日一象限而復留不行如月之下弦也既留之後又復順行由遲而疾去日漸近復與日同度而伏是為一終合伏以後星後于日謂之晨見衝日以後星先于日謂之夕見此土木火伏見之理也金水之行速於日無與日衝之時方其與日同度亦為合伏既合之後星速日遲星在日前故夕見西方始見順行由疾而遲距日漸逺始留不行自是漸退行亦由遲而疾復與日同度而伏謂之退合退合以後星在日後故晨見東方退行由疾而遲距日漸逺復留不行自是復順行由遲而疾追及於日復與同度而伏是為一終土木火有合有衝金水有晨夕兩合此其異也秦漢之際古法失傳班固天文志以為五星無逆行之理乃天變使然由未明數術故也劉歆三統術始有五步之術四分術因之又以月之晦朔弦望與星之合見留逆為例其理最確古今步法雖疎宻不同要無有易其說者矣晉書志五星者木曰嵗星火曰熒惑土曰填星金曰太白水曰辰星凡五星之行有遲有疾有留有逆遲疾留逆互相遞及星與日會同宿共度則謂之合從合至合之日則謂之終北史藝術傳張胄元術超古獨異者有七事其一古法五星行度皆守恒率見伏盈縮悉無格凖胄元侯之各得真率合見之數與古不同其差多者至加減三十許日即如熒惑平見在雨水氣即均加二十九日見在小雪氣則均減二十五日加減平見以為定見諸星各有盈縮之數皆如此例但差數不同特其積候所知時人不能原其㫖其二辰星舊率一終再見凡諸古術皆以為然應見不見人未能測胄元積候知辰星一終之中有時一見及同類感召相隨而出即如辰星平晨見在雨水者應見即不見若平晨見在啟蟄者去日十八度外三十六度内晨有木火土金一星者亦相隨見其三古推步術行有定限自見已後依率而推進退之期莫知多少胄元積候知五星遲速留退真數皆與古法不同多者差八十餘日留囘所在亦差八十餘度即如熒惑前疾初見在立冬初則二百五十日行一百七十七度定見夏至初則一百七十日行九十二度追步天驗今古皆宻蕙田案五緯步術以盈縮差分加減恒率自張胄元始𤼵之宋史志五星見伏皆以日度為規日度之運既進退不常星行之差亦隨而増損是以五星見伏先考日度之行今則審日行盈縮究星躔進退五星見伏率皆宻近舊說水星晨應見不見在雨水後榖雨前夕應見不見在處暑後霜降前又云五星在卯酉南則見遲伏早在卯酉北則見早伏遲盖天勢使之然也鄭世子書古法推步五緯不知變數之加減北齊張子信仰觀嵗久知五緯有盈縮之變當加減以求逐日之躔盖五緯出入黄道内外各自有其道視日逺近為遲疾其變數之加減如里路之徑直斜曲也宋人有言曰五星行度惟留退之際最多差自内而進者其退必向外自外而進者其退必由内其迹如循柳葉兩末鋭于中間徃還之道相去甚逺故星行兩末度稍遲以其斜行故也中行度稍速以其徑㨗故也前代之書止増損舊法而已未嘗實考天度其法須測驗每夜昏曉夜半月及五星所在度秒置簿録之滿五年其間去隂雲晝見日數外可得三年實行然後可以算術綴之也明史志崇禎六年李天經進五緯之議三一曰五星應用太陽視行不得以段目定之盖五星皆以太陽為主與太陽合則疾行衝則退行且太陽之行有遲疾則五星合伏日數時寡時多自不可以段目定其度分二曰五星應加緯行盖五星出入黄逆各有定距度又木土火三星衝太陽緯大合太陽緯小金水二星順伏緯小逆伏緯大三曰測五星當用恒星為凖則盖測星用黄道儀外宜用弧矢等儀以所測緯星視距二恒星若干度分依法布算方得本星真經緯度分或繪圗亦可免算新法算書測五星經度平行凡星之距太陽度分等或皆在日之左或皆在日之右其在黄道經度亦等則其行必滿周而復於故處其中積之年日數必等所以欲得距太陽等度者星之次行以太陽為行動之原距有逺近則行有遲疾髙庳若距度等者即星之前後兩測其遲疾等其髙庳亦等其行必滿周也所以求黄道經度等者謂太陽亦在元經度則太陽無髙庳遲疾之差又日同經度則星在本圈之故處也古史依上法算各星平行土星以五十九平年又一日四分日之一弱行次行圈五十七周會日五十七次對衝亦五十七次行天周二周又一度四十三分木星以七十一年不及四日又六十分日之五十四行次行圈六十五周星行本圈六周不及四度又五十分火星以七十九年又三日六十分日之一十六行次行圈三十七周經周行四十二周又三度一十分右三星皆于中積年數減本星次行之周數其較為星本行周天之數金星以八年不及二日又六十分日之一十八行次行圈五周水星以四十六年又一日六十分日之三行次行圈一百四十五周其平行皆與太陽同新法算引五緯之行各有二種其一為本行如填星約三十年行天一周日二分嵗星約十二年一周天日五分熒惑將滿二年一周天日三十五分太白辰星皆隨太陽每年旋天一周各有盈縮各有加減分各有本天之最髙與最髙衝即其最髙又各有本行論其行界亦分四種非若囘囘法總一最髙也其二在於本行之外西法稱為嵗行盖各星會太陽一次成一周也因此嵗行之規亦名小輪推知各星順逆留疾諸情故依新法圖五緯各有一不同心圈一均圈一小輪凡星在小輪極逺之所必合太陽其行順而疾其體見小凡在小輪極近之所其行逆而疾其體見大土木火行逆則衝太陽金水行逆夕復而合行順晨伏而合其各順行轉逆逆行轉順之兩中界為留留非不行乃際於極遲行之所也留段前後或順或逆皆有遲行其土木火行逆即衝太陽而金水則否者縁土木火之本天大皆以太陽為心而包地得與太陽衝而金水之本天雖亦以太陽為心而不包地不能衝太陽也金水不能衝太陽而能與之離金離太陽四十八度水離二十四度梅氏文鼎曰七政皆從天以生本輪而月五星又從乎日以生次輪天西行故七政之本輪皆從天而西轉其行皆向最髙也日月五星之在本輪俱向本天最髙其本輪心離最髙一度本輪周亦行一度似為所攝日天東移故月五星之合望次輪皆從日而東運其行皆向日也月五星離日若干次輪度亦行若干是為日所攝惟本輪從天于是有最髙卑之加減而其行度必始于最髙本輪行始于本天最髙而均輪即始于本輪之最髙卑故本輪均輪至最髙卑皆無加減為起算之端惟次輪從日于是有離日之加減而其行度必始于會日月次輪行始于朔望星次輪始于合伏故月至朔望五星合日冲日皆無次輪加減是故七政皆以半周天之宿度行縮律半周天之宿度行盈律閱宿度三百六十而本輪一周起最髙終最髙也因最髙有行分故視周天稍羸然大致不變月之遲疾亦然次輪則月以閱黄道一周而又過之凡三百八十九度竒而行二周起朔望終朔望也五星嵗輪即次輪則土以行黄道十二度竒木以三十三度竒火以四百八度竒金以五百七十五度竒水以一百十四度竒而皆一周起合伏終合伏也治律者用三小輪以求七政之視行惟此二者故曰兩事也金水二星㑹日後皆行黄道宿一周又復過之然後再與日會問諸家多以五星自行度為距日度然乎曰自行度生于距日逺近然非距日之度何也星在黄道有順有逆有疾有遲其距太陽無一平行而自行度終古平行故但可謂之距合伏之行而非距日之度也此在中土舊法則為段目其法合計前後兩合伏日數以為周率周率析之為疾行遲行退行及留而不行諸段之目疾與遲皆有順行度數退則有逆行度數其度皆黄道上實度也囘術不然其法則以前合伏至後合伏成一小輪小輪之心行于黄道而星體所行非黄道也乃行于小輪周耳近合伏前後行輪上半順輪心東行而見其疾衝日前後行輪下半則逆輪心西行而見其遲留且退其實星在輪周環轉自平行也故以輪周勻分三百六十度為實前合伏至後合伏日率為法除之得輪周每日星行之平度是之謂自行度也若以距太陽言則順輪心而見疾距日之度必少逆輪心而遲退距日之度必多安所得平行之率哉故曰自行者星距合伏之行而非距日之行也曰自行度既非距日度又謂其生于距日何也曰星既在輪周行矣而輪之心實行于黄道與太陽同為右旋而有遲速當合伏時星與輪心與太陽皆同一度星在輪之頂作直線過輪心至太陽直射地心皆在黄道上同度如月之合朔然不過晷刻之間而已自是以後太陽離輪心而東輪心亦隨太陽而東太陽速輪心遲輪心所到必在太陽之後以遲減速而得輪心每日不及太陽之恒率是則為距日行也即平行距日然而輪心隨太陽東行星在輪周亦向太陽而東行太陽離輪心相距一度黄道上度星在輪周從合伏處輪頂東行亦離一度小輪上度太陽離輪心一象限如月上弦星在輪周亦離合伏一象限乃至太陽離輪心半周與輪心冲星在輪周亦離合伏半周居輪之底復與輪心同度而衝太陽自輪頂合伏度作線過輪心至星之體又過地心以至太陽黄道上躔度皆成一直線如月之望再積其度太陽離輪心之衝度而東輪心亦自太陽之衝度而東然過此以徃太陽反在輪心之後假如輪心不及太陽積至三象限則太陽在輪心後只一象限因其環行故太陽之行速在前者半周以後太陽反在輪心之後若追輪心不及者然如月下弦星在輪周亦然自輪底行一象限則離輪頂合伏為三象限而將復及合伏尚差一象限逮太陽離輪心之度滿一全周而輪心與太陽復為同度則星在輪周亦復至合伏之度而自行一周矣星輪心太陽三者皆復同為一直線以直射地心如月第二合朔凡此星行輪周之度無一不與輪心距日之度相應主日而言則為太陽離輪心之度主星而言則為輪心不及太陽之距度其義一也故曰自行之度生于距日然是輪心距日非星距日也問輪心距日與星距日何以不同乎曰輪心距日平行星距日不平行惟其不平行是與自行度之平行者判然為二故斷其非距日度也惟其平行是與自行度相應故又知其生於距日也然則自行度不得為星距日度獨不得為輪心距日度乎曰輪心距日雖與自行相應能生其度然其度不同輪心是隨日東行倒算其不及于日之度星在輪周環行是順數其行過合伏之度不同一也又輪心距日是黄道度七政所同星離合伏自行是小輪周度小於黄道度又各星異率小輪小于黄道而小輪周亦勻分三百六十度其度必小于黄道度而各星之小輪周徑各異度亦從之而異不同二也若但以自行之初與日同度自行半周每與日冲而徑以距日與自行混而為一豈不毫釐千里哉蕙田案以上論五星平行及伏見行之理梅氏文鼎曰問五星天皆以日為心然乎曰西人舊説以七政天各重相裹厥後測得金星有弦望之形故新圗皆以日為心但上三星輪大而能包地金水輪小不能包地故有經天不經天之殊然以實數考之惟金水包日為輪確然可信若木火土亦以日為心者乃其次輪上星行距日之跡非真形也凡上三星合伏後必在太陽之西而晨見于是自嵗輪最逺處東行而漸向下及距日之西漸逺至一象限内外星在嵗輪行至下半為遲留之界再下而退行衝日則居嵗輪之底此合伏至衝日在日西半周也衝日以後轉在日東而夕見又自輪底行而向上過遲留之界而復與日合矣此衝日至合伏在日東半周也故嵗輪上星行髙下本是在嵗輪上下而自太陽之相距觀之即成大圓而為圍日之形以日為心矣其理與本輪行度成不同心天者同也但如此則上三星之圓周左旋與金水異夫七政本輪皆行天一周而髙卑之數以畢雖有最髙之行所差無幾故可以本輪言者亦可以不同心天言也若嵗輪則不然如土星嵗輪一周其輪心行天不過十二度竒木星則三十三度竒上下旋轉止在此經度内不得另有天周之行故知為距日之虚跡也又如金星嵗輪一周其輪心平行五百七十餘度則大于天周二百餘度水星嵗輪一周輪心平行一百一十五度竒則居天度三之一皆不可以天周言惟火星嵗輪之周其平行四百餘度與天周差四十度數畧相近故律指竟云以太陽為心而要之總是借虚率以求真度非實義也問五星之法至西律而詳明然其舊説五星各一重天大小相函而皆以地為心其新説五星天雖亦大小相函而以日為心若是其不同何也曰無不同也西人九重天之説第一宗動天次恒星次土次木次火次太陽次金次水次太隂是皆以其行度之遲速而知其距地有逺近因以知其天周有大小理之可信者也星之天有大小既皆以距地之逺近而知則皆以地心為心矣是故土木火三星距地心甚逺故其天皆大於太陽之天而包于外金水二星距地心漸近故其天皆小于太陽之天而在其内為太陽天所包是其本天皆以地為心無可疑者惟是五星之行各有嵗輪嵗輪亦圓象五星各以其本天載嵗輪嵗輪心行于本天之周星之體則行於嵗輪之周以成遲疾留逆嵗輪心行于本天周皆平行也星行于嵗輪之周亦平行也人自地測之則有合有冲有疾有遲有留有逆自然之理也若以嵗輪上星行之度聨之亦成圓象而以太陽為心西洋新説謂五星皆以日為心盖以此耳然此圍日圓象原是嵗輪周行度所成而嵗輪之心又行于本天之周本天原以地為心三者相待而成原非兩法故曰無不同也上三星在嵗輪上右旋金水在嵗輪上左旋皆挨度平行夫圍日圓象既為嵗輪周星行之跡則遲留逆伏之度兩輪皆有之故以嵗輪立算可以得其遲留逆伏之度以圍日圓輪立算所得不殊立法者溯本窮源用法者從簡便算如算書上三星用嵗輪金水二星用伏見輪皆可以求次均立算雖殊其歸一也或者不察遂謂五星之天真以日為心失其指矣夫太陽去地亦甚逺矣五星本天既以地為心而又能以日為心將日與地竟合為一乎必不然矣西人又嘗言火星天獨以日為心不與四星同予嘗斷其非是作圖以推明地谷立法之根原以地為本天之心其說甚明其金水二星舊說多淆亦久疑其非今得門人劉允恭悟得金水二星之有嵗輪其理的確而不可易可謂𤼵前人之未𤼵矣蕙田案以上論五星皆以地為心問金水二星之求次均也即遲疾留逆用伏見輪律指謂其即嵗輪其説非歟曰非也伏見輪之法起于囘囘而歐邏因之若果即嵗輪何為别立此名乎由今以觀盖即嵗輪上星行繞日之圓象耳王寅旭書亦云伏見輪非嵗輪然則伏見輪既為圍日之跡上三星宜皆有之何以不用而獨用之金水曰以其便用也盖五星行于嵗輪起合伏終合伏皆從距日而生故五星之嵗輪並與日天同大而嵗輪之心原在本天周故其圍日象又並與本天同大上三星之本天包太陽外其大無倫又其行皆左旋所以左旋之故詳具後論頗費解説故只用嵗輪也至于金水本天在太陽天内伏見輪既與之同大又其度順行故用伏見輪亦即繞日圓象若用嵗輪則金水之嵗輪反大于本天以嵗輪與日天同大故皆大于本天故不用嵗輪非無嵗輪也承用者未能深考立法之根輒謂伏見輪即嵗輪其說似是而非不可不知也伏見亦起合伏終合伏有似嵗輪之心行于本天之周而伏見輪以太陽為心故遂以太陽之平行為平行皆相因而誤者也然則金水既非以太陽之平行為平行又何以求其平行曰嵗輪之心行于本天是為平行乃實度也實度者周度也以本天分三百六十度而以各星周率平分之則得其每日平行如土星二十九年竒而行本天一周則二十九日而行一度毎日平行二十九分度之一是為最遲水星十二年周天每日平行約為十二分度之一火星二年周天約為每日平行半度金星二百二十餘日周天約每日平行一度半强水星八十八日竒而周天約毎日平行四度皆平行實度若嵗輪及伏見輪雖亦各分三百六十度亦各有其平行然而非實度也既非本天上平行之度又非從地心實測之平行度乃各星之離度耳因此離度用三角法從地心測之則得其遲留伏逆之狀亦為實度矣此實度不平行與本天之平行實度不同本天之度平行實度也嵗輪及伏見乃離度也離度為虚數故皆以半徑之大小為大小伏見輪上行度與嵗輪同所不同者半徑也伏見之半徑皆同本天嵗輪之半徑皆同日天問何以謂之離度曰於星平行内減去太陽之平行故曰離度乃離日之行也以太隂譬之其每日平行十三度竒者太隂平行實度每日十二度竒者太隂之離度也於太隂平行内減太陽平行是故金星每日行大半度竒水星每日約行三度皆于星平行内減太陽之平行因金水行速其離度在大陽之前乃星離于日之度故其度右旋順行與太隂同法也若上三星則當于太陽平行内減去星行是為離度盖以上三星行遲在太陽之後乃星不及于日之度其度左旋而成逆行與太隂相反然其為離日之行度一而已矣平行者對實行而言也然實行有二一是本天最髙卑之行亦曰實行一是黄道上遲留逆伏實測亦曰視行是二者皆必以本天之平行為宗若金水獨以太陽之平行為行是廢本天之平行矣又何以求最髙卑乎圍日之輪即伏見輪起合伏終合伏是即古法之合率也本天之行則古法之周率也最髙卑則古法之律率也又有正交中交以定緯度即如古法之太隂交率也此一法是西法勝中法之一大端是數者皆必以本天取之故不得以圍日之輪為本天律指言金星正交定于最髙前十六度水星正交與最髙同度其所指皆本天之度非伏見行之度則伏見輪不得為本天明矣今以七政書徵之不惟最髙卑之盈縮有定度即其交南北亦有定度故金星恒以二百二十餘日而南北之交一終水星則八十八日竒而交終此皆論本天實度原不論伏見行是尤其較著者矣江氏永曰七政皆有本天本天皆有平行之實度月與五星皆有次輪而五星次輪亦曰嵗輪皆因離日逺近而生離度月之離度起合朔終合朔五星離度起合伏終合伏土木火三星在日之上其本天大其右行之度遲則於太陽平行度内減其心之行度是為嵗輪上離度合伏至衝日半輪星西而日東衝日至合伏半輪星東而日西金水二星在日之下其本天小其右行之度速則于本天平行度内減太陽平行度為嵗輪上離度合伏至衝日星東而日西衝日至合伏星西而日東金水本天雖小而嵗輪亦如上三星與日天等大星在嵗輪上半周則嵗輪負星出日上至下半周乃在日天下其繞日之圓象實由嵗輪上星行軌迹所成與上三星成繞日大圓者同理而術家别名為伏見輪但於伏見輪上離度算其距日實行則與嵗輪所得不殊又即以太陽之平行為二星之平行皆徑㨗之權法而承用者遂以伏見當嵗輪以日天為二星本天且置本輪均輪於日天上由是二星之本天與嵗輪皆隱矣凡星體皆載於嵗輪上嵗輪之心在均輪均輪之心在本輪本輪之心在本天其大遲速在本天之行其小盈縮在本輪之轉五星皆同嵗輪由星為太陽所攝而生嵗輪隨本天旋轉聨其行迹自成繞日之輪其輪各與本天等大若主太陽言之似星本繞日因星在繞日輪上旋轉而成與太陽本天等大之嵗輪西士謂五星皆以日為心若主本天言之則繞日輪生于嵗輪勿菴先生始謂上三星之繞日為虚跡非實象後又謂金水伏見輪亦如圍日之圓象實為嵗輪周行度所成然則本天與嵗輪猶表也繞日圈伏見輪猶景也置本輪均輪於金水嵗輪上與伏見輪上所算之黄道度不殊然則上三星亦可置本輪均輪於繞日圈上立算此天能之巧妙若上三星用嵗輪金水用伏見輪則步算之權宜也各星本輪均輪止一耳何以隨人兩置之而皆可由其本同故也其所以然者不出三角之理術家於金水何以不用嵗輪立算伏見顯而嵗輪隱也然則術家既便於伏見立算矣必不用嵗輪之隱而曲勿菴先生之說亦可置勿論乎曰不然疇人之所便用者法也儒家之所講求者理也有勿菴之説而後知二星亦有本天有嵗輪與上三星一貫因其本天在日天下故其左旋者漸遲右旋者漸速下至太隂上至恒星髙下遲速各以其等而西人始言天有重數之說得此益明故愚以為甚有功也否則但以二星之行與日等其本天與日天混而為一烏覩所謂九重者乎伏見輪雖曰以太陽為心其實亦非真以太陽之形體為心也乃是太陽本輪之心為之心耳故算次均角不因太陽之盈縮髙卑而改變惟算合伏與退合兩日以太陽實行定其實合伏實退合之時刻以此例之土木二星繞日圈其真心亦是太陽本輪心非太陽之形體也惟火星不然耳蕙田案以上論金水二星自有嵗輪又案七曜之平行有遲速不同由其本天自有髙下土星天最髙故右移之度最遲木星天在土星之下故其遲次之火星天在木星之下故其遲又次之太陽天在火星之下故其遲又次之太隂天最卑故右移亦最速金水二星天在太陽之下太隂之上其右移之度宜遲於太隂速於大陽古今術家測金水平行皆與太陽等此就星所當黄道之度測之非本天之平行也梅氏江氏始謂二星各有嵗輪嵗輪心行本天之周金以二百二十餘日而一周約日行一度有半水以八十八日竒而一周約日行四度是為二星平行之度然則五星之行可以一理通之由髙下而生遲速亦各以其等而不紊雖不可以自測而可以理信可以算得實為古今未𤼵之精義新法算引五星之道雖相距緯度各異而其斜絡黄道則與月道同理故皆借月道諸名名之其兩交之所亦謂正交中交其在南在北兩半周亦謂隂陽二限審是而五星緯行庶可詳求矣葢各本道外之嵗行小輪恒與黄道為平行而又斜交於本道其上半恒在黄本二道中凡星躔於此則減本道之緯其下半恒在本道外星躔於此則加其緯然此小輪之緯向則恒不變如土星三十年行天一周其在正中二交之下必無緯度分十五年恒北十五年恒南耳凡衝太陽因在小輪下半即加本道緯度凡會太陽因在小輪上半即減緯度他星亦猶是也其或行近於地小輪加緯益多太白至夕伏合之際因其近地其緯幾及八度矣中法不諳緯行之原一見金星在緯南北七八九度即詫謂本星失行豈非誣乎新法表異金星或合太陽而不伏水星離太陽而不見所以然者金緯甚大凡逆行緯在北七度餘而合太陽於夀星大火二宮則雖與日合其光不伏一日晨夕兩見者皆坐此故水緯僅四度餘設令緯向是南合太陽於夀星嗣後雖離四度夕猶不見也合太陽於降婁嗣後雖離四度晨猶不見也此二則用渾儀一測便見非舊法所能知也江氏永曰水星與金星不同有二事其一則均輪也他星均輪最髙時起最近㸃右旋而倍引數獨水星均輪最髙時起最逺㸃右旋三倍引數引數一度均輪三度其一則交角也金星交角三度二十九分惟一耳水星交角則時時不同伏見輪心在大距與黄道交角五度四十分伏見輪心在正交當黄道北則減南則加伏見輪心在中交當黄道北則加南則減其加減各有與大距交角相較之數以距交實行逐度算其交角差加減交角而得實交角此二事葢相因其理極精㣲蕙田案以上論五星交周及緯度右五星五禮通考卷一百九十一
