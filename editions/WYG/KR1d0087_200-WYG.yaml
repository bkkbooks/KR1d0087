body:
  text: 五禮通考卷一百九十刑部尚書秦蕙田撰嘉禮六十三觀象授時夏書𦙍征惟時羲和顛覆厥德沉亂於酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集於房傳辰日月所會房所含之次集合也不合即日食可知瞽奏鼔嗇夫馳庶人走傳凡日食天子伐鼓于社瞽樂官樂官進鼔則伐之嗇夫主幣之官馳取幣禮天神衆人走供救日食之百役也羲和尸厥官罔聞知昬迷于天象以干先王之誅政典曰先時者殺無赦傳政典夏后為政之典籍若周官六卿之治典先時謂律象之法四時節氣弦望晦朔先天時則罪死無赦不及時者殺無赦傳不及謂推象後天時雖治其官苟有先後之差則無赦況廢官乎日疏昭七年左傳曰晉侯問于士文伯曰何謂辰對曰月之會是謂辰日月俱右行于天日行遲月行疾日每日行一度月日行十三度十九分度之七計二十七日過半月已行天一周又逐及日而與日聚會謂此聚會為辰一嵗十二會故為十二辰即子丑寅卯之屬是也房謂室之房也故為所含之次日月當聚會共含今言日月不合于含則是日食可知也日食者月掩之也月體掩日日被月映即不成共處故以不集言日食也或以為房謂房星九月日月會于大火之次房心共為大火言辰在房星事有似矣知不然者以集是止含之處言其不集于含故得以表日食若言不集于房星似太遲太疾惟可見算錯不得以表日食也且日之所在星宿不見止可推算以知之非能舉目見之君子慎疑寜當以日在之宿為文以此知其必非房星也先時不及者謂此推象之法四時節氣弦望晦朔不得先天時不得後天時四時時各九十日有餘分為八節節各四十五日有餘也節氣者周天三百六十五日四分日之一四時分之均分為十二月則月各得三十日十六分日之七以初為節氣半為中氣故一嵗有二十四氣也計十二月每月二十九日彊半也以月初為朔月盡為晦當月之中日月相望故以月半為望望去晦朔皆不滿十五日也又半此望去晦朔之數名之曰弦弦者言其月光正半如弓弦也晦者月盡無月言其闇也朔者蘇也言月死而更蘇也先天時者所名之日在天時之先假令天之正時當以甲子為朔今律乃以癸亥為朔是造律先天時也若以乙丑為朔是造律後天時也律後即是不及時也其氣望等皆亦如此大衍議書曰乃季秋月朔辰弗集于房劉炫曰房所含之次也集會也會合也不合則日蝕可知或以房為房星知不然者日之所在正可推而知之君子慎疑寜當以日在之宿為文近代善術者推仲康時九月合朔已在房星北矣案古文集與輯義同日月嘉會而隂陽輯睦則陽不疚乎位以常其明隂亦含章示冲以隱其形若變而相傷則不輯矣房者辰之所次星者所次之名其揆一也又春秋傳辰在斗柄天策焞焞降婁之初辰尾之末君子言之不以為謬何獨慎疑于房星哉新術仲康五年癸巳嵗九月庚戌朔日蝕在房二度炫以五子之歌仲康當是其一肇位四海復修大禹之典其五年羲和失職則王命徂征虞􅒠以為仲康元年非也蕙田案掩食為不安輯因呈象而置辭耳房如皆火房也之房非房宿也仍當從舊説或因小雅十月之詩有月食其常日食不臧之文疑古人但推月食不推日食非也左傳梓慎曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽弗克也古人精于天象其言有本盖如此小雅詩人去春秋時不甚逺豈相懸至此詩特為憂時致儆之詞耳陳師凱云觀篇中有渠魁脇從之語羲和聚黨助羿明矣仲康乘日食之變正其昏迷之罪羿亦不得而庇之使非聚黨助逆則禠職奪邑司冦行戮足矣何至興師誓衆哉此論雖似得當時情事特日食亦非借辭也羲和司天之官凡天變皆當測驗先時後時乃司天者之大戒況如交食又為顯明向使羲和克舉厥職早為測定則君臣上下預先誡傋何至臨時瞽與嗇夫庶人忽奏忽馳忽走為此倉惶驚駭之狀哉觀瞽與嗇夫三句可知伐鼓用幣之禮古已有之而日食之必為推騐無疑矣況欽若授時經上古數聖人精心創制迥非後人沿襲推算者所可及寜有天象之變如日食之大者而顧不及耶堯典命羲和乃統舉大綱語其常而不及其變耳觀承案羲和之事引證自無不可解經則自以陳説為長盖日食失占鰥官之罪難辭然非常赦不原者何至興師動衆必欲滅此而殺無赦哉且仲康原是乘其有罪而討之初非借詞則知罪固有浮於此者特因是以誅之可以冺然無迹則聖賢自有作用原非宋襄仁義可比者耳詩小雅十月之交朔日辛卯日有食之亦孔之醜傳之交日月之交會醜惡也而箋周之十月夏之八月也八月朔日日月交會日食隂侵陽臣侵君之象彼月而㣲此日而㣲傳月臣道日君道月箋㣲謂不明也在疏每月皆交會而或在日道表或日道裏故不食其食要于交㑹又月與日同道乃食也日者太陽之精至尊之物不宜有所侵侵之則為異計古今之天度數一也日月之食本無常時故律象為日月交會之術大率以百七十三日有竒為限而日月行天各自有道雖至朔相逢而道有表裏若月先在裏依限而食者多若月先在表雖依限而食者少日月之食于算可推而知則是數自當然而云為異者人君者位貴居尊恐其志移心易聖人假之靈神作為鑒戒耳夫以昭昭大明照臨下土忽爾殱亡俾晝作夜其為怪異莫斯之甚故有伐鼔用幣之儀貶膳去樂之數皆所以重天變警人君者也而天道深逺有時而騐或亦人之禍釁偶與相逢故聖人得因其變常假為勸戒使智達之士識先聖之深情中下之主信妖祥以自懼但神道可以助教而不可以為教神之則惑衆去之則害宜故其言若有若無其事若信若不信期于大通而已矣戴氏震詩補傳交者月道交于黄道也月以黄道為中其南至則在黄道南不滿六度步算家謂之陽律其北至則在黄道北不滿六度謂之隂律其自北而南古名為正交今名為中交自南而北古名為中交今名為正交斜穿黄道而過是為交交乃有食以步算之法上推幽王六年乙丑建酉之月辛卯朔辰時日食詩據周正十月非夏正以為夏十月周十二月建亥者誤也凡日食月掩日也月在日之下人又在月之下三者相凖則有日食故日食恒在朔日月正相對而地在中央三者相凖則有月食故月食恒在望月食由于地影日食則主人目盖月卑日髙相去尚逺人自地視之其食分之淺深及虧復之時刻隨南北東西而移故視會與實會不同步算家立三差求之髙下差也東西差也南北差也前人之為術疎有當食不食不當食而食之説占家之妄也然則日月之行有常度終古不變聖人以為天變而懼何也曰日月之主乎明者常也其有所掩之者則為變也君道比于日故以日引喻尤切宜常明而不宜有蔽者也聖人恐懼修省無時不然所謂日食修德月食修刑又其敬天變而加警惕耳古人鑒白圭之玷而慎言豈以圭之玷為災異乎此詩借日食以警王欲王自知其掩蔽也知其為一時所揜蔽而醜之則修德而復乎常明之體矣日月告凶不用其行四國無政不用其良箋行道度也不用之者謂相干犯也彼月而食則惟其常此日而食于何不臧戴氏震詩補傳行道也日月以常明為道有時虧食以告凶于上是不用其道也告凶所謂日月之災是也君當用善以為政今四國無政是不用其良也日之所繫大矣故其食非月食之比以喻君之所繫大也詩中凡理道皆曰行如示我周行女子有行之類先儒誤以為行度遂有日失行之説誤矣觀承案行即道也道即度也赤道黄道是日月之道即是日月之度各行其道故日月並明即交於其道亦不相掩食是之謂能用其行也盖行道之道即道理之道無二道也今必謂日月行度本不失其常乃是失其常明之道理試思下人見為交食而無光者天上視之其常明之道理並無少損也其故全在交道之行非如常行之度耳則謂失其常行之度者亦何不可戴氏此解不免執己見以改舊說矣春秋隱公三年春王二月己巳日有食之公羊傳何以書記異也日食則曷為或日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也其或日或不日或失之前或失之後失之前者朔在前也注謂二日食失之後者朔在後也注謂晦日食穀梁傳言日不言朔食晦日也其日有食之何也吐者外壤食者内壤注凡所吐出者其壤在外其所吞咽者壤入于内闕然不見其壤有食之者也有内辭也或外辭也有食之者内于日也注内于日以壤不見于外其不言食之者何也知其不可知知也疏徐邈云己巳謂二月晦則三月不得有庚戌也明宣十年四月丙辰十七年六月癸卯皆是前月之晦也則此己巳正月晦冠以二月者盖交會之正必主于朔今雖未朔而食著之此月所以正其本亦猶成十七年十月壬申而繫之十一月也取前月之日而冠以後月故不得稱晦以其不得稱晦知非二月晦也穀梁之例書日食凡有四種之别言日不言朔食晦日也言朔不言日食既朔也不言日不言朔夜食也言日言朔食正朔也李氏光地曰日食書日書朔朔日食也書日不書朔朔後食也書朔不書日朔前食也不書日不書朔隂雨食也隂雨食則國都不見而他處見之非靈臺所覩測則未知其為正朔與朔之前後與是以闕之也若夫夜食之説則非日食不占夜猶月食不占晝是以唐一行之作律也上溯徃古必使千有餘年日食必在晝月食必在夜也襄之二十一年連月日食非變也盖史者異文或曰九月庚戌或曰十月庚辰而夫子兩存之以闕疑如甲戌己丑陳侯鮑卒之例梅氏文鼎曰案古日食毎不在朔者以古用平朔耳古所以用平朔者以日月並紀平度也東漢劉洪作乾象術始知月有遲疾北齊張子信積修二十年始知日有盈縮有此二端以生定朔然而人猶不敢用也至唐李淳風僧一行始用之至今遵用乃騐律之要然非有洛下閎之渾儀張衡之靈憲則測騐且無其器又何以能加宻測愚故曰古人之功不可沒也桓公三年秋七月壬辰朔日有食之既杜注既盡也術家之説日月同會月掩日故日食食有上下者行有髙下日光輪存而中食者相揜宻故日光溢出皆既者正相當而相揜間疏也然聖人不言月食日而以自食為文闕于所不見疏食既者謂日光盡也術家之説當日之衝有大如日者謂之闇虚闇虚當月則月必滅光故為月食張衡靈憲曰當日之衝光常不合是謂闇虚在星則星㣲遇月則月食若是應毎望常食而望亦有不食者由其道度異也日月異道有時而交交則相犯故日月遞食交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食大率一百七十三日有餘而道始一交非交則不相侵犯故朔望不常有食也道不正交則日斜照月故月光更盛道若正交則日衝當月故月光即滅日月同會道度相交月揜日光故日食言月食是日光所衝日食是月體所映故日食常在朔月食常在望也食有上下者行有髙下謂月在日南從南入食南下北髙則食起于下月在日北從北入食則食𤼵于髙是其行有髙下故食不同也故異義云月髙則其食虧于上月下則其食虧于下也相揜宻者二體相近正映其形故光得溢出而中食也相揜疎者二體相逺月近則日逺自人望之則月之所映者廣故日光不復能見而日食既也日食者實是月映之也但日之所在則月體不見聖人不言月來食日而云有物食之以自食為文闕于所不見也公羊傳既者何盡也注光明滅盡也穀梁傳言日朔食正朔也注朔日食也既者盡也有繼之辭也注盡而復生謂之既十有七年冬十月朔日有食之注甲乙者數之紀也晦朔者日月之會也日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例左氏傳冬十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝穀梁傳言朔不言日食既朔也莊公十有八年春王三月日有食之穀梁傳不言日不言朔夜食也何以知其夜食也曰王者朝日注何休曰春秋不言月食日者以其無形故闕疑其夜食何縁書乎鄭君釋之曰一日一夜合為一日今朔日日始出其食有虧傷之處未復故知此自以夜食夜食則亦屬前月之晦故穀梁子不以為疑故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔二十五年夏六月辛未朔日有食之鼓用牲于社左氏傳夏六月辛未朔日有食之鼔用牲于社非常也注非常鼔之月長律推之辛未實七月朔置閏失所故致月錯唯正月之朔慝未作注正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣日有食之于是乎用幣于社伐鼓于朝公羊傳日食則曷為鼓用牲于社求乎隂之道也以朱絲營社或曰脇之或曰為闇恐人犯之故營之穀梁傳言日言朔食正朔鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也注凡有聲皆陽事以壓隂氣充實也者疏五麾者麋信云各以方色之旌置之五處也五兵徐邈云矛在東㦸在南鉞在西楯在北弓矢在中央麋信與范數五兵與之同是相傳説也五鼓者麋信徐邈並云東方青鼓南方赤鼓西方白鼓北方黒鼓中央黄鼓諸侯三者則云降殺以雨去黑黄二色二十有六年冬十有二月癸亥朔日有食之三十年秋九月庚午朔日有食之鼓用牲于社僖公五年秋九月戊申朔日有食之十有二年春王三月庚午日有食之十有五年夏五月日有食之左氏傳夏五月日有食之不書朔與日官失之也文公元年春二月癸亥日有食之十有五年夏六月辛丑朔日有食之鼓用牲于社左氏傳六月辛丑朔日有食之鼓用牲于社非禮也注得常鼓之月而于社用牲為非禮日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也宣公八年秋七月甲子日有食之十年夏四月丙辰日有食之十有七年夏六月癸卯日有食之成公十有六年夏六月丙寅朔日有食之十有七年冬十有二月丁巳朔日有食之襄公十有四年春二月乙未朔日有食之十有五年秋八月丁巳日有食之二十年冬十月丙辰朔日有食之二十有一年秋九月庚戌朔日有食之冬十月庚辰朔日有食之二十有三年春王二月癸酉朔日有食之二十有四年秋七月甲子朔日有食之既疏七月日食既而八月又食于推步之術必無此理盖古書磨滅致有錯誤劉炫云漢末以來八百餘載考其注記莫不皆爾都無頻月日食之事計天道轉運古今一也後世既無其事前世理亦當然此與二十一年頻月日食理必不然但其字則變古為篆改篆為隷書則縑以代簡紙以代縑多厯世代或轉寫誤失其本真執文求義理必不通後之學者宜知此意也八月癸巳朔日有食之二十有七年冬十有二月乙亥朔日有食之注今長律推十一月朔非十二月傳曰辰在申再失閏若是十二月則為三失閏故知經誤左氏傳十一月乙亥朔日有食之辰在申司律過也再失閏矣注文十一年三月甲子至今年七十一嵗應有二十六閏今長律推得二十四閏通計少再閏疏古法十九年為一章章有七閏從文十一年至襄十三年凡五十七年已成三章當有二十一閏又從襄十四年至今為十四年又當有五閏故為應有二十六閏也魯之司律漸失其閏至此年日食之月以儀審望于是始覺其謬遂頓置兩閏以應天正以叙事期然則前閏月為建酉後閏月為建戍十二月為建亥而嵗終焉是故明年經書春無氷傳以為時災也若不復頓置二閏則明年春是今之九月十月十一月也今之九月十月十一月無氷非天時之異無縁總書春也昭公七年夏四月甲辰朔日有食之左氏傳夏四月甲辰朔日有食之晉侯問于士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地注衛地豕韋也魯地降婁也日食于豕韋之末及降婁之始乃息故禍在衛大在魯小也周四月今二月故曰在降婁名疏娵訾之次一豕韋于是有災魯實受之注災𤼵于衛而魯受其餘禍其大咎其衛君乎魯將上卿注八月衛侯卒十一月季孫宿卒公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災十有五年夏六月丁巳朔日有食之十有七年夏六月甲戌朔日有食之左氏傳夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也平子禦之曰止也唯正月朔慝未作日有食之于是乎有伐鼓用幣禮也其餘則否太史曰在此月也注正月謂建巳正陽之月也于周為六月于夏為四月四月純陽用事隂氣未動而侵陽災重故有伐鼔用幣之禮也平子以為六月非正月故太史答言在此月也日過分而未至注過春分而未夏至三辰有災于是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣二十有一年秋七月壬午朔日有食之左氏傳秋七月壬午朔日有食之公問于梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也注二分日夜等故言同道二至長短極故相過疏日之行天一日一周月之行天二十九日有餘已得一周日月異道互相交錯月之一周必半在日道裏從外而入内也半在日道表從内而出外也或六入七出或七入六出凡十三出入而與日一會律家謂之交道通而計之一百七十三日有餘而有一交交在望前朔則日食望則月食交在望後望則月食後月朔則日食此自然之常數也交數滿則相過非二至乃相過也其他月則為災陽不克也故常為水于是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒二十有二年冬十有二月癸酉朔日有食之杜注此月有庚戌又以長律推校前後當為癸卯朔書癸酉誤十疏案傳十二月庚戌晉籍談云云庚戌上去癸酉二七日若此月癸酉朔其月不得有庚戌也又傳十二月下有閏月晉箕遺云云又云辛丑伐京辛丑是壬寅之前日也二十三年傳曰正月壬寅朔二師圍郊則辛丑是閏月之晦日也又計明年正月之朔與今年十二月朔中有一閏相去當為五十九日此年十二月當為癸卯朔經書癸酉明是誤也故言長律推交十一月小甲戌朔傳有乙酉十二日也又有己丑十六日也十二月大癸卯朔傳有庚戌八日也閏月小癸酉朔傳有閏月辛丑二十九日也明年正月壬寅朔則上下符合矣二十四年夏五月乙未朔日有食之左氏傳夏五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也三十有一年冬十有二月辛亥朔日有食之左氏傳十有二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌旦占諸史墨曰吾夢若是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰注庚日有變日在辰尾故曰以庚辰定四年十一月庚辰吳入郢疏于天文房心尾為大辰尾是辰後之星也日在辰尾自謂在辰星庚辰入郢乃謂日是辰日二辰不同而以日在辰尾配庚為庚辰者二辰實雖不同而同名曰辰以其名同故取以為占此則史墨能知非是人情所測此十二月日食彼十一月入郢則是未復其月而云及此月者長律定四年閏十月庚辰吳入郢是十一月二十九日杜云昭二十一年傳曰六年十二月庚辰吳入郢今十一月者并閏數也然則彼是新閏之後且十一月二十九日又其月垂盡故得為及此月也日月在辰尾注辰尾龍尾也周十二月今之十月日月合朔于辰尾而食庚午之日日始有謫火勝金故弗克注謫變氣也庚午十月十九日去辛亥朔四十一日雖食在辛亥更以始變為占也午南方楚之位也午火庚金也日以庚午有變故災在楚楚之仇敵惟吳故知入郢必吳火勝金者金為火妃食在辛亥亥水也水數六故六年也疏長律此年十月壬子朔故庚午是十月十九日也從庚午下去十二月辛亥朔為四十一日雖食在辛亥之日而更以庚午為占舎近而取逺自是史墨所見其意不可知也定公五年春王三月辛亥朔日有食之十有二年冬十有一月丙寅朔日有食之十有五年秋八月庚辰朔日有食之陸氏九淵曰春秋日食三十六而食之既者三日之食與食之深淺皆術家所能知是盖有數疑若不為變也然天人之際實相感通雖有其數亦有其道昔之聖人未嘗不因天變以自治洊雷震君子以恐懼修省君子無終食之間違仁造次必于是顛沛必于是所以修其身者素矣然洊震之時必因以恐懼修省此君子所以無失德而盡是天之道焉況日月之𤯝見于上乎遇災而懼側身修行欲銷去之此宣王之所以中興也知天災有可銷去之理則無疑于天人之際而知所以自求多福矣日者陽也陽為君為父茍有食之斯為變矣食至于既變又大矣言日不言朔食不在朔也日之食必在朔食不在朔律差也觀承案象山此論至為精當此天人感通之理非有道者不能知考禮者雖得其數不可不以此理立其本也哀公十有四年左氏傳夏五月庚申朔日有食之後漢書志朔會望衡鄰于所交虧薄生焉宋書志曰行黄道陽路也月者隂精不由陽路故或出其外或入其内出入去黄道不得過六度入十三日有竒而出出亦十三日有竒而入凡二十七日而一入一出矣交于黄道之上與日相揜則蝕焉唐書志大衍日蝕議小雅十月之交朔日辛卯虞􅒠以數推之在幽王六年開元術定交分四萬三千四百二十九入蝕限加時在晝交會而蝕數之常也詩云彼月而食則維其常此日而食于何不臧日君道也無朏魄之變月臣道也逺日益明近日益虧望與日軌相會則徙而寖逺逺極又徙而近交所以著臣人之象也望而正于黄道是謂臣干君明則陽斯蝕之矣朔而正于黄道是謂臣壅君明則陽為之蝕矣且十月之交于數當蝕君子猶以為變詩人悼之然則古之太平日不蝕星不孛盖有之矣若過至未分月或變行而避之或五星潛在日下禦侮而救之或涉交數淺或在陽律陽盛隂㣲則不蝕或德之休明而有小𤯝焉則天為之隱雖交而不蝕此四者皆德教之所由生也四序之中分同道至相過交而有蝕則天道之常如劉歆賈逵皆近古大儒豈不知軌道所交朔望同術哉以日蝕非常故闕而不論黄初已來治律者始課日蝕疎宻及張子信而益詳劉焯張胄元之徒自負其術謂日月皆可以宻率求是專于律紀者也以戊寅麟德術推春秋日蝕大最皆入蝕限于數應蝕而春秋不書者尚多則日蝕必在交限其入限者不必盡蝕開元十二年七月戊午朔于數當蝕半彊自交趾至于朔方候之不蝕十三年十二月庚戌朔于厯當蝕太半時東封泰山還次梁宋間皇帝徹膳不舉樂不葢素服日亦不蝕時羣臣與八荒君長之來助祭者降物以需不可勝數皆奉夀稱慶肅然神服雖算術乖舛不宜如此然後知德之動天不俟終日矣若因開元二蝕曲變交限而從之則差者益多自開元治律史官每嵗較節氣中晷因撿加時小餘雖大數有常然亦與時推移每嵗不等晷變而長則日行黄道南晷變而短則日行黄道北行而南則隂律之交也或失行而北則陽律之交也或失日在黄道之中且猶有變況月行九道乎杜預云日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不蝕者或有頻交而蝕者是也故交必稽古史虧蝕深淺加時朓朒隂陽其數相叶者反覆相求由律數之中以合辰象之變觀辰象之變反求律數之中類其所同而中可知矣辯其所異而變可知矣其循度則合于律失行則合于占占道順成常執中以追變律道逆數常執中以俟變知此之説者天道如視諸掌使日蝕皆不可以常數求則無以稽律數之疎宻若皆可以常數求則無以知政教之休咎今更設考日蝕或限術得常則合于數又日月交會大小相若而月在日下自京師斜射而望之假中國食既則南方戴日之下所虧纔半月外反觀則交而不蝕步九服日晷以定蝕分晨昏漏刻與地偕變則宇宙雖廣可以一術齊之矣蕙田案日食雖云數有定而其為天變固顯然者不知其數一定非也知其一定而不謹天變不加警惕亦非也唐時推日食猶未能宻合又不知變差氣差等在尋常食法之外而亦具一定之故謬為月變行五星禦侮之説弗知妄作矣其言里差則有可取畧識梗概而已宋史志四正食差正交如累璧漸減則有差在内食分多在外食分少交淺則間遥交深則相薄所觀之地又偏所食之時亦别茍非地中皆隨所在而漸異縱交分正等同在南方冬食則多夏食乃少假均冬夏早晚又殊處南辰則髙居東西則下視有斜正理不可均元史志術法疎宻騐在交食然推步之術難得其宻加時有早晚食分有淺深取其宻合不容偶然推術加時必本于躔離朓朒考求食分必本于距交逺近茍入氣盈縮入轉遲疾未得其正則合朔不失之先必失之後合朔失之先後則虧食時刻其能宻乎日月俱東行而日遲月疾月追日及是為一會交直之道有陽律隂律交會之期有中前中後加以地形南北東西之不同人目髙下邪直之各異此食分多寡理不得一者也今合朔既正則加時無早晚之差氣刻適中則食分無强弱之失推而上之自詩書春秋及三國以來所載虧食無不合焉者合于既徃則行之悠久自可無弊矣明史志正德十五年禮部員外郎鄭善夫言日月交食日食最為難測葢月食分數但論距交逺近别無四時加減且月小闇虚大八方所見皆同若日為月所揜則日大而月小日上而月下日逺而月近日行有四時之異月行有九道之分故南北殊觀時刻亦異必須據地定表因時求合如正德九年八月辛卯日食臺官報食八分六十七秒而閩廣之地遂至食既時刻分秒安得而同今宜案交食以更律元時刻分秒必使竒零剖析詳盡不然積以嵗月躔離朓朒又不合矣鄭世子書日道與月道相交處有二若正會于交則食既若但在交前後相近者則食而不既此天之交限也又有人之交限假令中國食既戴日之下所虧纔半化外之地則交而不食易地反觀亦如之何則日如大赤丸月如小黑丸共縣一線日上而月下即其下正望之黑丸必揜赤丸似食之既及旁觀有逺近之差則食數有多寡矣春分已後日行赤道北畔交外偏多交内偏少秋分已後日行赤道南畔交外偏少交内偏多是故有南北差冬至已後日行黄道東畔午前偏多午後偏少夏至已後日行黄道西畔午前偏少午後偏多是故有東西差日中仰視則髙旦暮平視則低是故有距午差食于中前見早食于中後見遲是故有時差凡此諸差唯日有之月則無也故推交食惟日頗難欲推九服之變必各據其處考晷景之短長揆辰極之髙下庶幾得之術經推定之數徒以燕都所見者言之耳舊云月行内道食多有騐月行外道食多不騐又云天之交限雖係内道若在人之交限之外類同外道日亦不食此說似矣而未盡也假若夏至前後日食于寅卯酉戌之間人向東北西北觀之則外道食分反多于内道矣日體大于月月不能盡揜之或遇食既而日光四溢形如金環故日無食十分之理雖既亦止九分八十秒授時術日食陽律限六度定法六十隂律限八度定法八十各置其限度如其定法而一皆得十分今于其定法下各加一數以除限度則得九分八十餘秒也崇禎四年夏四月戊午夜望月食光啟預推分秒時刻方位奏言日食隨地不同則用地緯度算其食分多少用地經度算其加時早宴月食分秒海内並同止用地經度推求先後時刻臣從輿地圗約畧推步開載各布政司月食初虧度分葢食分多少既天下皆同則餘率可以類推不若日食之經緯各殊必須詳備也又月體一十五分則盡入闇虚亦十五分止耳今推二十六分六十秒者葢闇虚體大于月若食時去交稍逺則月體不能全入闇虚止從月體論其分數是夕之食極近于交故月入闇虚十五分方為食既更進一十五分有竒乃得生光故為二十六分有竒如囘囘術推十八分四十七秒畧同此法也冬十月辛丑朔日食新法預推順天見食二分一十二秒應天以南不食大漠以北食既例以京師見食不及三分不救䕶光啟言月食在夜加時早晚苦無定據惟日食案晷定時無可遷就故立法疎宻此為的證臣等纂輯新法漸次就緒而向後交食為期尚逺此時不與監臣共見至成書後將何徵信且是食之必當測候更有説焉舊法食在正中則無時差今此食既在日中而新法仍有時差者葢以七政運行皆依黄道不由赤道舊法所謂中乃赤道之午中非黄道之正中也黄赤二道之中獨冬夏至加時正午乃得同度今十月朔去冬至度數尚逺兩中之差二十三度有竒豈可因加時近午不加不減乎適際此日又值此時足可騐時差之正術一也本方之地經度未得真率則加時難定其法必從交食時測騐數次乃可較勘畫一今此食依新術測候其加時刻分或前後未合當取從前所記地經度分斟酌改定此可以求里差之真率二也時差一法但知中無加減而不知中分黄赤今一經目見人人知加時之因黄道因此推彼他術皆然足以知學習之甚易三也即分數甚少亦宜詳加測候以求顯騐帝是其言至期光啟率監臣預㸃日晷調壺漏用測髙儀器測食甚日晷髙度又于宻室中斜開一隙置窺筩逺鏡以測虧圓盡曰體分數圗板以定食方其時刻髙度悉合惟食甚分數未及二分于是光啟言今食甚之度分宻合則經度里差已無煩更定矣獨食分未合原推者葢因太陽光大能減月魄必食及四五分以上乃得與原推相合然此測用宻室窺筩故能得此分數倘止慿目力或水盆照映則眩耀不定恐少尚不止此也又曰宋仁宗天聖二年甲子嵗五月丁亥朔司天推當食不食諸術推算皆云當食夫于法則實當食而于時則實不食今當何以解之葢日食有變差一法月在隂律距交十度强于法當食而獨此日此地之南北差變為東西差故論天行則地心與日月相參值實不失食而從人目所見則日月相距近變為逺實不得食顧獨汴京為然若從汴以東數千里則漸見食至東北萬餘里外則全見食也夫變差時時不同或多變為少或少變為多或有變為無或無變為有推步之難全在此等五年九月十五日月食監推初虧在卯初一刻光啟推在卯初三刻囘囘科推在辰初初刻三法異同致奉詰問至期測候隂雲不見無可徵騐光啟具陳三法不同之故言時刻之加減由于盈縮遲疾兩差而盈縮差舊法起冬夏至新法起最髙最髙有行分惟宋紹興間與夏至同度郭守敬後此百年去離一度有竒故未覺今最髙在夏至後六度此兩法之盈縮差所以不同也遲疾差舊法只用一轉周新法謂之自行輪自行之外又有兩次輪此兩法之遲疾差所以不同也至于囘囘又異者或由于四應或由于里差臣實未曉其故總之三家俱依本法推步不能變法遷就也將來有宜講求者二端一曰食分多寡日食時陽晶晃耀每先食而後見月食時游氣紛侵每先見而後食其差至一分以上今欲灼見實分有近造窺筩日食時于宻室中取其光景映照尺素之上初虧至復圓分數真確畫然不爽月食用以仰觀二體離合之際鄞鄂著明與目測迥異此定分法也一曰加時早晚定時之術壺漏為古法輪鐘為新法然不若求端于日星晝則用日夜則任用一星皆以儀器測取經緯度數推算得之此定時法也二法既立則諸術之疎宻毫末莫遁矣古今月食諸史不載日食自漢至隋凡二百九十三而食于晦者七十七晦前一日者三初二日者三其疎如此唐至五代凡一百一十而食于晦者一初二日者一稍宻矣宋凡一百四十八無晦食者更宻矣猶有推食而不食者十三元凡四十五亦無晦食猶有推食而不食者一食而失推者一夜食而書晝者一至加時差至四五刻者當其時已然可知髙逺無窮之事必積時累世乃稍見其端倪故漢至今千七百嵗立法者十有三家而守敬為最優尚不能無數刻之差而況于沿習舊法者何能責其精宻哉六年李天經進交食之議四一曰日月景徑分恒不一盖日月有時行最髙有時行最卑因相距有逺近見有大小又因逺近得太隂過景時有厚薄所以徑分不能為一二曰日食午正非中限乃以黄道九十度限為中限葢南北東西差俱依黄道則時差安得不從黄道論其初末以求中限乎且黄道出地平上兩象限自有其髙亦自有其中此理未明或宜加反減宜減反加時不合者由此也三曰日食初虧復圓時刻多寡恒不等非二時折半之説葢視差能變實行為視行則以視差較食甚前後鮮有不參差者夫視差既食甚前後不一又安能令視行前後一乎今以視行推變時刻則初虧復圓其不能相等也明矣四曰諸方各以地經推算時刻及日食分葢地面上東西見日月出沒各有前後不同即所得時刻亦不同故見食雖一而時刻異此日月食皆一理若日食則因視差隨地不一即太隂視距不一所見食分亦異焉新法算書步交食之術有二一曰加時早晚一曰食分淺深加時者日食于朔月食于望當豫定其食甚在某時刻分秒也食分者月所借之日光食于地景地所受之日光食于月景當豫定其失光幾何分秒也加時早晚非在日月正相㑹相望之實時而在人目所見儀器所測之視時乃視時無均度可推故日月兩食皆先求其實時既得實時然後從視處宻求日食之定時惟月食則實時即近視時也然日與月實相會之度分未定即欲求其實時無從可得故須先推中會時計其平行及自行而得均數然後以均數加減求得其實會因得其實時矣若食甚之前為初虧食甚之後為復圓此兩限間亦應推定時刻分秒其法于前後數刻間推步日躔月離求其實行視行月有遲疾經時則生變易故宜近取以得起復之間時刻久近也食分多寡謂日食時月體揜日體若干月食時月體入地景若干也其法以日月兩半徑較太隂距黄道度分得其大小次求二曜距交逺近與古法不異第日月各有最髙庳景徑因之小大黄白距度有廣狹食限為之多少至於日食三差尤多曲折此為異矣欲定本地之日食分必先定本地之䝉氣差以限本地之視徑又宜累騐本地之食分加時然後酌量消息䝉差視徑可得而定也今所考求酌定者太陽在最髙得徑三十分在最庳徑三十一分太隂不分朔望䝉氣稍薄故也在最髙視徑三十分三十秒在最庳視徑三十四分四十秒地景最小者四十三分最大者四十七分日月行最髙最庳處之間視徑亦漸次不一食限者日月行兩道各推其經度距交若干為有食之始也而日與月不同月食則太隂與地景相遇兩周相切以其兩視半徑較白道距黄道度又以距度推交周度定食限若日食則太陽與太隂相遇雖兩周相切其兩視半徑未可定兩道之距度為有視差必以之相加而得距度故特論半徑則日食之二徑狹月食之二徑廣論日食之限反大于月食之限以視差也太隂食限表中地景半徑最大者先定四十七分太隂半徑最大者一十七分二十秒并得一度四分二十秒日月兩道之距在此數以内可有月食可食者可不食也以此距度推其相值之交常得一十二度二十八分為月食限推法最大距度四度五十八分半與象限九十度若距度與交常之弧也其最小者地半景定四十三分月半徑一十五分一十五秒并得五十八分一十五秒若距度與之等者依前法推交常度得一十一度一十六分此限以内月過景必有食也必食者無不食也抑此兩者皆論實望時之食限耳若論平望其限尤寛太陽食限表中太陽之最大半徑一十五分三十秒太隂之最大半徑一十七分二十秒并得三十二分五十秒所謂二徑折半也以此推相值之交常為六度四十分是太陽不論視差不分南北正居實會之食限也第日食不在天頂即有髙庳視差太隂每偏而在下交會時以此差故或就近於太陽或移逺隨地隨時各各不同安得以實度遽定日食之限乎測太隂交食時最大髙庳差得一度四分因距逺五十四地半徑故減太陽之最大髙庳差三分餘一度一分此為太隂偏南之極多者凡日食時必有一方能見其然是為大地公共之最大差以加二徑折半得總視距度一度三十三分五十秒外此即無日食在其内則可食依前法求食限得兩交前後各一十八度五十分為兩大視徑折半之限也若以小半徑求食限與前差度并得一度三十一分有竒推相值之交周度一十七度四十八分為小視徑折半之日食限若日月會入此限内者日必食但非總大地能見必有地能見耳若以中會論食限又須加入實會距中會之度其最大弧三度則中會有食之限二十餘度欲知此月内有無交食則以食限求之欲知此食食分幾何則以距度求之距度者在月食為太隂心實距地景之心兩心愈相近月食分愈多在日食為日月兩心以視度相距其近其逺皆以目視為凖不依實推葢定朔為實交會天下所同而人見日食東西南北各異所以然者皆視度所為也太隂在食限内過地景其兩心最相近時為食甚而食分必多欲知食甚之處用距度求之葢距度與地半景及月半徑相減得月入景之分此言分者天周度數之分非平分月徑之分也如兩半徑得一度距度四十分相減餘二十分為所求月入景之分也但距度與半景或等或不等若過不及之分小于月半徑則月不全入景而止食其半或大半或少半而已若距度小于半景者為太隂之正半徑則雖全食隨復生光其食分即太隂之全徑以月自行推之若絶無距度即太隂遇景正在兩交則并其兩半徑可推月食之分也食甚前初虧也食甚後復圓也兩限間之時刻多寡其縁有三一在太隂本時距度因距度或多或寡每食不同即太隂入景淺深不同淺則時刻必少深則時刻必多其二在月及景兩視半徑半徑小太隂過之所須時刻少半徑大太隂過之所須時刻多其三在太隂自行自行有時速有時遲雖則距度同視徑同而自行遲疾不同即所須時刻不同矣月食生於地景景生於日故天上之實食即人所見之視食無二食也日食不然有天上之實食有人所見之視食其食分之有無多寡加時之早晚先後各各不同推步日食難于太隂者以此其推算視食則依人目與地面為凖凡交會者必參相直不參直不相揜也日之有實食也地心與月與日參居一線之上也其有視食也人目與月與日參居一線之上也人目居地面之上與地心相距之差為大地之半徑則所見日食與實食恒偏左偏右其所指不得同度分是生視差而人目所參對之線不得為實會而特為視會視會與實會無異者惟有正當天頂之一㸃過此以地半徑以日月距地之逺測太陽及太隂實有三等視差其法以地半徑為一邊以太陽太隂各距地之逺為一邊以二曜髙度為一邊成三角形用以得髙庳差一也又偏南而變緯度得南北差二也以黄道九十度限偏左偏右而變經度得東西差三也因東西視差故太陽與太隂會有先後遲速之變二曜之會在黄平象限東即未得實㑹而先得視會若在黄平象限西則先得實會而後得視會所謂中前宜減中後宜加者也因南北視差故太隂距度有廣狹食分有大小之變如人在夏至之北測太隂得南北視差即以加于太隂實距南度以減於實距北度又東西南北兩視差皆以黄平象限為主葢正當九十度限絶無東西差而反得最大南北差距九十度漸逺南北差漸小東西差漸大至最逺乃全與髙庳差為一也三差恒合為句股形髙庳其弦南北其股東西其句至極南則弦與股合至極東極西則弦與句合也東西南北髙庳三差之外復有三差不生於日月地之三徑而生於氣氣有輕重有厚薄各因地因時而三光之視差為之變易有三一曰清䝉髙差是近於地平為地面所出清蒙之氣變易髙下也二曰清蒙徑差亦因地上清蒙之氣而人目所見大陽本徑之大小為所變易也三曰本氣徑差本氣者四行之一即内經素問所謂大氣地面以上月天以下充塞太空者是也此比於地上清蒙更為精㣲無形質而亦能變易太陽之光照使目所見之視度隨地隨時小大不一也梅氏文鼎日食附説恒年表以首朔為根何也曰首朔者年前冬至後第一朔也因算交會必于朔望故以此為根也太陽平引與其經度不同何也曰太陽引數從最髙衝起算經度從冬至起算也冬至定于初宮初度最髙衝在冬至後六七度且每年有行分此西法與古法異者也日定均者即古法之盈縮差也月定均者遲疾差也距弧者平朔與實朔進退之度也距時者平朔實朔進退之日時也因兩定均生距弧因距弧生距時即古法之加減差也平朔既有進退矣則此進退之時刻内亦必有平行之數故各以加減平行而為實引也實引既不同平引則其均數亦異故又有實均以生實距弧及實距時也夫然後以之加減平朔而為實朔也平朔古云經朔實朔古云定朔然古法定朔即定于加減差定盈縮定遲疾則惟于算交食用之而西法用于定朔此其㣲異者也朔有進退則交周亦有進退故有實交周案古法亦有定交周其法相同問平朔者古經朔也實朔者古定朔也何以又有視朔曰此測騐之理因加減時得之古法所無也何以謂之加減時曰所以求實朔時太陽加時之位也時刻有二其一為時刻之數其一為時刻之位凡布算者稱太陽右移一度稍弱為一日又或動天左旋行三百六十一度稍弱為一日此則天行之健依赤道而平轉其數有常于是自子正厯丑寅復至子正因其運行之一周而均截之為時為刻以紀節候以求中積所謂時刻之數也凡測候者稱太陽行至某方位為某時為某刻此則太虚之體依赤道以平分其位一定于是亦自子正歴丑寅復至子正因其定位之一周而均分之為時為刻以測加時以候凌犯所謂時刻之位也之二者並宗赤道宜其同矣然惟二分之日黄赤同㸃經緯並同二至之日黄赤同經緯異經同則數與位合所算時刻之數太陽即居本位與所測加時之位一一相符不用加減時其過此以徃則二分後有加分加分者太陽所到之位在實時西二至後有減分減分者太陽所到之位在實時東也然則所算實朔尚非實時乎曰實時也實時何以復有此加減曰正惟實時故有此加減若無此加減非實時矣葢此加減時分不因里差而異九州萬國加減悉同非同南北東西差之隨地而變亦不因地平上髙弧而改髙弧雖有髙下加減時並同非若地半徑及䝉氣等差之以近地平多近天頂少而獨與實時相應但問所得實時入某節氣或在分至以後或在分至以前其距分至若同即其加減時亦同是與實時相應也故求加減時者本之實時而欲辨實時之真者亦即徴諸加減時矣其以二分後加二至後減何也曰升度之理也凡二分以後黄道斜而赤道直故赤道升度少升度少則時刻加矣二至以後黄道以腰圍大度行赤道殺狹之度故赤道升度多升度多則時刻減矣加減時即視時也一曰用時其實朔時一曰平時加減時之用有二其一加減實時為視時則施之測騐可以得其正位其一反用加減以變視時為實時則施之推步可以得其正算然其理無二故其數亦同也古今測騐而得者並以太陽所到之位為時故曰加時言太陽加臨其地也然則皆視時而已月距地者何即月天之半徑也月天半徑而謂之距地者地處天中故也地恒處天中則半徑宜有恒距而時時不同者生于小輪也月行小輪在其髙度則距地逺矣在其卑度則距地近矣每度之髙卑各異故其距地亦時時不同也日半徑月半徑者言其體之視徑也論其真體日必大于月論其視徑日月畧相等所以能然者日去人逺月去人近也然細測之則其兩視徑亦時時不等此其故亦以小輪也日月在小輪髙處則以逺目而損其視徑在其卑處則以近目而増其視徑矣并徑者日月兩半徑之總數也兩半徑時時不同故其并徑亦時時不同而食分之深淺因之虧復之距分因之矣總時者何也以求合朔時午正黄道度分也何以不言度而言時以便與視朔相加也然則何不以視朔變為度曰日實度者黄道度也時分者赤道度也若以視朔時變赤道度亦必以日實度變赤道度然後可以相加今以日實度變為時即如預變赤道矣此巧算之法也其必欲求午正黄道何也曰以求黄平象限也即表中九十度限何以為黄平象限曰以大圈相交必互相均剖為兩平分故黄赤二道之交地平也必皆有半周百八十度在地平之上黄道赤道地平並為渾圓上大圏故其相交必皆中剖其勢如虹若中剖虹腰則為半周最髙之處而兩旁各九十度故謂之九十度限也此九十度限黄赤道並有之然在赤道則其度常居正午以其兩端交地平常在卯正酉正也黄道則不然其九十度限或在午正之東或在午正之西時時不等惟二至度在午正則九十度限亦在午正與赤道同法此外則無在午正者而且時時不同矣其兩端交地平亦必不常在卯正酉正亦惟二至度在午正為九十度限則其交地平之處即二分㸃而黄道與赤道同居卯酉此外則惟赤道常居卯酉而黄道之交于地平必一端在赤道之外而居卯酉南一端在赤道之内而居卯酉北而時時不等故也黄道東交地平在卯正南其西交必酉正北而九十度限偏于午䂓之西若東交地平在卯正北其西交地平必酉正南而九十度限偏于午正之東則半周如虹時時轉動勢使然也葢黄道在地平上半周之度自此中分則兩皆象限若從天頂作線過此以至地平必成三角而其勢平過如十字故又曰黄平象限也地平圈為黄道所分亦成兩半周若從天頂作弧線過黄平象限而引長之成地平經度半周必分地平之兩半周為四象限而此經線必北過黄極與黄經合而為一問黄平象限在午正必二至日有之乎曰否毎日有之也凡太陽東陞西沒成一晝夜則周天三百六十度皆過午正而西故每日必有夏至冬至度在午正時此時此刻即黄平象限與子午規合而為一每日只有二次也自此二次之外二至必不在午正而黄平象限亦必不在二至矣黄平象限表以極出地分何也曰地平上黄道半周中折之為黄平象限其兩端距地平不等而自非二至在午正則黄道之交地平必一端近北一端近南極出地漸以髙則近北之黄道漸以出近南之黄道漸以沒而黄平象限亦漸以移此所以隨地立表也求黄平象限何以必用總時曰黄平象限時時不同即午規之度亦時時不同是午正黄道與黄平象限同移也則其度必相應是故得午正即得黄平黄平限為某度其午正必為某度謂之相應然則午正為某度即黄平限必某度矣故得此可以知彼而總時者午正之度也此必用總時之理也日距限分東西何也曰所以定時差之加減也凡用時差日在限西則加日在限東則減日距地髙何也曰所以求黄道之交角也時差氣差並生于交角又生于限距地及限距日二者交食之關鍵而非黄平象限無以知之矣日距地髙何也謂合朔時太陽之地平緯度也亦曰髙弧髙弧之度隨節氣而殊故論赤緯之南北赤緯之南北同矣又因里差而異故論極出地極出地同矣又以加時而變故又論距午刻分極出地者南北里差距午刻分者東西里差也合是數者而日距地平之髙可見矣其必求髙弧者何也所以求月髙下差也髙下差在月而求日距地髙者日食時經緯必同度故日在地平之髙即月髙也何以為月髙下差曰合朔時太隂之視髙必下于真髙其故何也月天在日天之内其間尚有空際故地心與地面各殊地面所見謂之視髙以較地心所見之真髙徃徃變髙為下以人在地面旁視而見其空際也故謂之月髙下差地心見食謂之真食地面見食謂之視食有時反不見食見視食時反非地心之真食縱使地心地面同得見食而食分淺深亦必不同凡此皆月髙下差所為也月髙下差時時不同其縁有二其一為月小輪髙卑在小輪卑處月去人近則距日逺而空際多髙下差因之而大矣在小輪髙處月去人逺則距日近而空際少髙下差因之而小矣其一為髙弧髙弧近地平從旁視而所見空際多則髙下差大矣髙弧近天頂即同正視而所見空際少則髙下差小矣若髙弧竟在天頂即與地心所見無殊無髙下差小輪髙卑天下所同髙弧損益隨地各異故當兼論也兩圈交角何也曰日所行為黄道圈以黄極為宗者也人在地平上所見太陽之髙下為地平經圈以天頂為宗者也此兩圈者各宗其極則其相遇也必成交角矣因此交角遂生三差日食必求三差故先論交角也三差之内其一為地平緯差即髙下差其一為黄道經差即東西差其一為黄道緯差即南北差此三差者惟日食在九十度限則黄道經圈與地平經圈相合為一而無經差故但有一差無經差則但有緯差是無東西差而有南北差也而兩經緯既合為一則地平之髙下差又即為黄道之南北差而成一差若日食不在九十度而或在其東或在其西則兩徑圈不能相合為一遂有三差月髙下差恒為地平髙弧之緯差而黄道經圈自與黄道為十字正角不與地平經合以生經度之差角是為東西差又黄道上緯度自與黄道為平行不與地平緯度合以生緯度之差角是為南北差東西南北並主黄道為言與地平之髙下差相得而成句股形則東西差如句南北差如股而髙下差常為之弦合之則成三差也因此三差有此方見日食彼方不見或此見食分深彼見食分淺之殊故交食重之而其源皆出于交角三差既為句股形則有兩圈之交角即有其餘角而交角所對者為氣差即南北差餘角所對者為時差即東西差定交角何也所以求三差之真數也何以為三差真數曰日食三差皆人所見太隂之視差而其根生于交角則黄道之交角也殊不知太隂自行白道與黄道斜交其交于地平經圈也必與黄道之交不同角則所得之差容有未真今以月道交黄道之角加減之為定交角以比兩圈交角之用為親切耳時差古云東西差其法日食在東則差而東為減差減差者時刻差早也日食在西則差而西為加差加差者時刻差遲也其故何也太陽之天在外太隂之天在内並東升而西降而人在地面所見之月度既低于真度則其視差之變髙為下者必順于黄道之勢故合朔在東陞之九十度必未食而先見限東一象限東下西髙故月之真度尚在太陽之西未能追及于日而以視差之變髙為下亦遂能順黄道之勢變西為東見其掩日矣若合朔在西降之九十度必先食而後見限西一象限黄道西下東髙故月之真度雖已侵及太陽之體宜得相揜而以視差之故變髙為下遂順黄道之勢變東而西但見其在太陽之西尚逺而不能揜日矣而東西之界並自黄道九十度限而分此黄平象限之實用也問日月以午前東升午後西降何不以午正為限而用黄平象限乎曰此西法之合理處也何以言之日月之東升西降自午正而分者赤道之位終古常然者也日月之視差東減西加自九十度限而分者黄道之勢頃刻不同者也若但從午正而分則加減或至于相反授時古法之交食有時而疎此其一端也問加減何以相反曰黄平限既與午正不同度則在限為西者或反為午正之東在限為東者或反為午正之西日食遇之則加減相違矣近時距分者何也即視朔時或加或減之時刻分也所以有此加減者時差所為也然何以不徑用時差曰時差者度分也以此度分求月之所行則為時分矣近時何也所推視朔時與真朔相近之時也食在限東此近時必在視朔時以前故減食在限西近時必在視朔時以後故加近總時何也近時之午正黄道度也朔有進退午正之黄道亦因之進退故仍以近時距分加減視朔午正度為本求之近時午正度既有近時又有近時之午正度則近時下之日距限及限距地髙日距地髙以及月髙下差兩圈交角凡在近時應有之數一一可推因以得近時之時差矣既得時差可求視行視行者何也即近時距分内人目所見月行之度也何以有此視行曰時差所為也葢視朔既有時差則此時差所到之度即視朔時人所見月行所到差于實行之較也視朔既改為近時則近時亦有時差而又即為人所見近時月行所到差于實行之較矣此二者必有不同則此不同之較即近時距分内人所見月行差于月實行之較矣故以此較分加減時差為視行也本宜用前後兩小時之時差較加減月實行為視行如用距分減視朔者則取視朔前一小時之時差若距分加視朔者則取視朔後一小時之時差各取視朔時差相減得較以加減月實行即為一小時之視行再用三率比例得真時距分法為月視行與一小時若時差度與真時距分也今以近時内之視行取之其所得真時距分等何以明其然也曰先得時差即近時距分之實行也實行之比例等則視行之比例亦等問視行之較一也而或以加或以減其理云何曰凡距分之時刻變大則所行之度分變少故減實行為視行若距分之時刻變小則所行之度分變大故加實行為視行假如視朔在黄平限之東時差為減差而近時必更在其東其時差亦為減差乃近時之時差所減大于視朔所減是為先小後大其距分必大于近時距分而視行小于實行其較為減又如視朔在黄平限之西時差為加差而近時必更在其西時差亦為加差乃近時之時差所加大于視朔所加是亦為先小後大其距分亦大于近時距分而視行亦小于實行故其較亦減二者東西一理也若視朔在黄平限東其時差為減而近時時差之所減反小于視朔所減又若視朔在黄平限西其時差為加而近時時差之所加反小于視朔所加此二者並先大後小則其距分之時刻變小矣時刻變小則視行大于實行而其較應加東西一理也真時距分者何也即視朔時或加或減之真時刻也其數有時而大于近時距分亦有時而小于近時距分皆視行所生也視行小于實行則真時距分大于近時距分矣視行大于實行則真時距分小于近時距分矣其比例為視行度于近時距分若時差度與真時距分也真時何也所推視朔之真時刻也真時在限東則必早于視朔之時真時在限西則必遲于視朔之時此其于視朔並以東減西加與近時同惟是真時之加減有時而大于近時有時而小于近時則惟以真時距分為斷不論東西皆一法也若真時距分大于近時距分而在限東則真時更先于近時在限西則真時更後于近時是東減西加皆比近時為大也若真時距分小于近時距分而在限東則真時後于近時在限西則真時先于近時是東減西加皆比近時為小也真總時何也真時之午正黄道也故仍以真時距分加減視朔之總時為總時即是改視朔午正度為真時午正度近時既改為真時即食甚時也然容有未真故復考之考之則必于真時復求其時差而所以求之之具並無異于近時所異者皆真時數耳謂日距限限距地髙日距地髙月髙下差兩圈交角等項並從真時立算是之謂真時差既得真時差乃别求真距度以相參考則食甚定矣考定真時全在此處何以為真距度曰即真時距分内應有之月實行也葢真時差是從真時逆推至視朔之度真時距分内實行是從視朔順推至真時之度此二者必相等故以此考之考之而等則真時無誤故即命為食甚定時也其或有不等之較分則以法變為時分而損益之于是乎不等者亦歸于相等是以有距較度分考定之法也距較度分者距度之較也損益分者距時之較也其比例亦如先得時差度與真時距分故可以三率求也真時差大者其距時亦大故以益真時距分益之則減者益其減原在限東而真時早者今乃益早若加者亦益其加原在限西而真時遲者今則益遲矣真時差小者其距時亦小故以損真時距分損之則減者損其減原在限東而真時早者今改而稍遲若加者亦損其加原在限西而真時遲者今改而稍早矣如是考定真時距分以加減視朔為真時即知無誤可謂之考定食甚時也氣差古云南北差凖前論月在日内人在地内得見其間空際故月緯降髙為下夫降髙為下則亦降北為南矣此所以有南北差也南北差生于地勢中國所居在赤道之北北髙南下故也然又與髙下差異者自天預言之曰髙下自黄道言之曰南北惟在正午則兩者合而為一髙下差即為南北差其餘則否氣差與時差同根故有時差即有氣差而前此諸求但用時差者以食甚之時未定重在求時也今則既有真時矣當求食分故遂取氣差也時差氣差並至真時始確定交周者何也真時之月距交度也食甚既定于真時則一切視差皆以食甚起算故必以實朔交周改為食甚之交周斯之謂定交周也月實黄緯者食甚時月行實距黄道南北之緯度也月視黄緯者食甚時人所見月距黄道南北緯度則氣差之所生也月行白道日行黄道惟正交中交二㸃月穿黄道而過正在黄道上而無距緯其距交前後並有距緯而每度不同然有一定之距是為實緯實緯因南北差之故變為視緯即無一定之距隨地隨時而異但其變也皆變北為南假如月實緯在黄道北則與黄道實逺者視之若近焉故以氣差減也若月實緯在黄道南則與黄道實近者視之若逺焉故以氣差加也至若氣差反大于實緯則月雖實在黄道北而視之若在南故其氣差内減去在北之實緯而用其餘數為在南之視緯也并徑減距者何也并徑所以定食分減距所以定不食之分也距者何也即視緯也并徑則日月兩半徑之合數也假令月行黄道北其北緯與南北差同則無視緯可減而并徑全為食分其食必既其餘則皆有距緯之減而距大者所減多其食必淺距小者所減少其食必深是故并徑減餘之大小即食分之所由深淺也若距緯大于并徑則日月不相及或距緯等于并徑則日月之體相摩而過不能相掩必無食分矣并徑内又先減一分何也曰太陽之光極大故人所見之食分必小于真食之分故預減一分也然則食一分者即不入算乎曰非也并徑之分度下分也毎六十分為一度食分之分太陽全徑之分也以太陽全徑十平分之假令太陽全徑三十分則以三為一分是故并徑所減之一分于食分只二十餘秒問日月兩半徑既時時不同則食分何以定曰半徑雖無定而比例則有定但以并徑減餘與太陽全徑相比則分數覩矣分太陽全徑為十分即用為法以分并徑減距之餘分定其所食為十分中幾分有時太隂徑小于太陽則雖兩心正相掩而四面露光術家謂之金環是其并徑亦小于太陽全徑雖無距緯可減而不得有十分之食故也日食月行分者何也乃自虧至甚之月行度分也自甚至復同用其法以并徑減一分常為弦視緯常為句句弦求股即得自食甚距虧與復之月行度分矣前總時何也即食甚前一小時之午正度也得此午正度即可得諸數以求前一小時之時差謂之前時差前時差與真時差之差分即視行與實行之差分故以差分加減實行得視行也假如日在限西而前時差大于真時差是初虧所加多而食甚所加反少也以此求虧至甚之時刻則變而小矣時刻小則行分大故以差分加實行為視行若日在限西而前時差小于真時差是初虧所加少而食甚所加漸多也以此求虧至甚之時刻則變而大矣時刻大則行分必小故以差分減實行為視行日在限東而前時差大于真時差是初虧所減多而食甚所減漸少也以此求虧至甚之時刻則變而大矣時刻大者行分小故以差分減實行為視行若日在限東而前時差小于真時差是初虧所減少而食甚所減反多也以此求虧至甚之時刻則變而小矣時刻小者行分大故以差分加實行為視行食甚定交角滿象限不用差分何也無差分也何以無差分曰差分者時差之較也食甚在限度即無食甚時差無可相較故初虧徑用前時差復圓徑用後時差又食甚在限度則初虧距限東而前時差恒減復圓距限西而後時差恒加減時差則初虧差而早加時差則復圓差而遲其距食甚之時刻並變而大也時刻大者行分小故皆減實行為視行又若初虧復圓時定交角滿象限亦無差分而徑用食甚之時差減實行為視行與此同法其初虧復圓距食甚之刻分亦皆變大而行分變小也視行之理此為較著初虧距時分者初虧距食甚之時刻也用上法得視行為食甚前一小時之數而初虧原在食甚前則其比例為視行之于一小時猶日食月行之于初虧距時故可以三率取之也既得此初虧距分則以減食甚而得初虧時刻也後總時者即食甚後一小時之午正度分也用此午正度得諸數以求後一小時之時差為後時差又以後時差與真時差相較得差分以加減實行為視行並同初虧但加減之法並與初虧相反假如日在限西而後時差大于真時差是食甚所加少而復圓所加多則甚至復之時刻亦變而大矣時刻大者行分小故以差分減實行為視行若日在限西而後時差小于真時差是食甚所加多而復圓所加反少則甚至復之時刻亦變而小矣時刻小者行分大故以差分加實行為視行假如日在限東而後時差大于真時差是食甚所減少而復圓所減反多則甚至復之時刻變而小矣時刻小者行分大故以差分加實行為視行若日在限東而後時差小于真時差是食甚所減多而復圓所減少則甚至復之時刻變而大矣時刻大者行分小故以差分減實行為視行復圓距時分三率之理並與初虧同惟復圓原在食甚後故加食甚時刻為復圓時刻問定交角滿象限以上反其加減何也曰此變例也西法西加東減並以黄道九十度限為宗今用定交角則是以白道九十度限為宗而加減因之變矣問白道亦有九十度限乎曰以大圈相交割之理徵之則宜有之矣何則月行白道亦分十二宮則亦為大圈其交于地平也亦半周在地平上則其折半之處必為白道最髙之處而亦可名之為九十度限矣或可名白道度限若從天頂作髙弧過此度以至地平則成十字正角而其圈必上過白道之極成白道經圈與黄平象限同黄平象限上十字經圈串天頂與黄道極故亦成黄道經圈與此同理月在此度即無東西差而南北差最大與髙下差等前論月在黄平象限無東西差而即以髙下差為南北差其理正是如此但月行白道當以白道為主而論其東西南北始為親切若月在此度以東則差而早宜有減差在此度以西則差而遲宜有加差但其加減有時而與黄平象限同有時而與黄平象限異故有反其加減之用也問如是則白道亦有極矣極在何所曰白道有經有緯凡東西差皆白道經度南北差皆白道緯度則亦有南北二極為其經緯之所宗但其極與黄極恒相距五度以為定緯雖亦有小小増減而大致不變其經度則嵗嵗遷動至滿二百四十九交而徧於黄道之十二宮則又復其始約其數十九年有竒法當以黄極為心左右各以五緯度為半徑作一小圓以為載白道極之圈再以正交中交所在宮度折半取中即于此度作十字經圈必串白道極與黄道極矣則此圈之割小圓㸃即白道極也問何以知此圈能過黄白兩極也曰此圈于黄道白道並作十字正角故也凡大圈上作十字圈必過其極問此圈能串兩極則限度常在此度乎曰不然也此度能串黄白兩極而未必其串天頂如黄道上極至交圈也若限度則必串天頂以過白極而未必其過黄極如黄道上之黄平限也是故白道上度處處可為限度亦如黄道上度處處可為黄平限但今在地平上之白道半周某度最髙即其兩邊距地平各一象限從此度作十字經圈必過天頂而串白道之兩極何也此圈過地平處亦皆十字角即與地平經圈合而為一所謂月髙下差即在此圈之上矣惟白道半交為限度能與黄平限同度此外則否況近交乎故必用定交角也問定交角者所以變黄道交角為白道交角也然何以不先求白道限度曰交角者生於限度者也交角變則限度移矣故先得限度可以知交角交角之向背以距限東西而異交角之大小以距限逺近而殊而既得交角亦可以知限度故不必復求限度也其加減以五度何也曰取整數也古測黄白大距為六度以西度通之得五度五十四分竒西測只五度竒而至于朔望又只四度五十八分半今論交角故祗用整數也若用弧三角法求白道限度所在及其距地之髙並可得交角細數然所差不多盖算交食必在朔望又必在交前交後故也問五度加減後何以有異號不異號之殊曰近交時白道與黄道低昻異勢者也惟月在半交能與黄道平行亦如二至黄道之與赤道平行也若交前交後斜穿黄道而過不能與黄道平行亦如二分黄道之斜過赤道也故低昻異勢然又有順逆之分而加減殊焉其白道斜行之勢與黄道相順者則恒減減惟一法減者角損而小也雖改其度不變其向若白道與黄道相逆者則恒加加者多變遂有異號之用矣加者角増而大也増之極或滿象限或象限以上遂至改向是故限西黄道皆西下而東髙限東黄道皆西髙而東下此黄道低昻之勢因黄平象限而異者也而白道正交初宮十一宮也即古法之中交自黄道南而出于其北亦為西下而東髙黄道半周在地平上者偏于天頂之南以南為下北為上正交白道自南而北如先在黄道之下而出于其上故比之黄道為西下而東髙也白道中交五宮六宮也即古法之中交自黄道北而出于其南亦為西髙而東下白道自北而南如先在黄道之上而出于其下故比之黄道為西髙而東下也假如日食正交而在限西日食中交而在限東是為相順相順者率于交角減五度為定交角是角變而小矣角愈小者東西差愈大故低昻之勢増甚而其向不易也限西黄道本西下東髙而正交白道又比黄道為西下東髙則向西之角度變小而差西度増大其時刻遲者益遲矣限東黄道本西髙東下而中交白道又比黄道為西髙東下則向東之角度變小而差東之度増大其時刻早者益早矣是東西之向不易而且増其勢也假如日食正交而在限東日食中交而在限西是為相逆相逆者率于交角加五度為定交角是角變而大矣角愈大者東西差愈小故低昻之勢漸平而甚或至于異向也限東黄道本西髙東下而正交白道比黄道為西下東髙則向東之角漸大而差東度改小時刻差早者亦漸平若加滿象限則無時差乃至滿象限以上則向東者改而向西時刻宜早者反差遲矣限西黄道本西下東髙而中交白道為西髙東下則向西之角漸大而差西度改小時刻差遲者亦漸平若加滿象限則無時差乃至滿象限以上則向西者改而向東而時刻宜遲者反差而早矣凡東西差為見食甚早晚之根如上所論定交角所生之差與黄道交角無一同者則欲定真時刻非定交角不可也若但論黄道交角時刻不真矣凡東西差與南北差互相為消長而南北差即食分多少之根如上所論則欲定食分非定交角不能也但論黄道交角食分亦誤矣右日月交食五禮通考卷一百九十
