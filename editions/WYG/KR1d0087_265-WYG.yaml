body:
  text: 五禮通考卷二百五十五刑部尚書秦􅈍田撰凶禮十喪禮儀禮喪服疏衰裳齊牡麻絰無受者注無受者服是服而除不以輕服受之不著月數者天子諸侯葬異月也小記曰齊衰三月與大功同者繩屨疏此章以其義服日月又少故在不杖章下此及下𫝊大功皆不言冠帶者以其輕故略之至正大功言冠見其正猶不言帶緦麻又直言緦麻餘又畧之注云不以輕服受之者凡變除皆因葬練祥乃行此服至葬即除無變服之理天子七月葬諸侯五月葬為之齊衰者皆三月蔵其服至葬更服之葬後乃除譙氏周曰齊衰三月不居堊室敖氏繼公曰受者以輕衰受重衰也成人齊衰之服而無受則唯三月可知故不復見月數郝氏敬曰此齊衰之義服也親不足而尊有餘故為三月齊衰處之不言冠帶屨與不杖同也不言三月言無受三月可知也禮三月既葬以初喪冠布易故衰曰受受接也義服稍輕三月即除故無受案疏衰重于大功大功九月而疏衰反三月何也重其衰所以隆尊也減其日月以殺恩也疏衰三月者分尊恩輕大功九月者分卑而恩重也張氏爾岐曰大夫士三月葬故以三月為主姜氏兆錫曰下文各傳皆言齊衰三月故經雖不著月而疏以三月言之然其服雖三月而為王侯服者皆不即除而蔵以待葬服故傳雖言三月而經不著其月也葢經傳互文相足之義類如此蔡氏徳晉曰此章本不言月數而傳皆以為齊衰三月葢以禮既葬而受服大夫士三月而葬故以為斷也康成雖有天子諸侯葬異月之説然又以為天子七月葬諸侯五月葬為之齊衰者皆三月蔵其服至葬更服之葬後乃除愚意謂天子諸侯未葬恐不應釋服且既釋矣至葬而更服相去不過一二月餘而倐釋倐服忽吉忽凶恐先王制禮不若是白虎通謂民始哭素服先葬三月成齊衰亦非安有聞喪不服越二月而始服者夫帝堯殂落百姓如喪考妣三載四海遏宻八音後世始喪服之既葬而除又豈久乎疑此章本有三月五月七月之服𫝊者失之也􅈍田案𫝊文雖以三月為斷而曽祖父條開元禮増齊衰五月至今猶然則蔡氏之説或者其可通與寄公為所寓注寓亦寄也為所寄之國君服疏此章論義服故以疏者為首傳曰寄公者何也失地之君也何以為所寓服齊衰三月也言與民同也注諸侯五月而葬而服齊衰三月者三月而蔵其服至葬又更服之既葬而除之黜疏失地君者謂若禮記射義貢士不得其人數有譲爵削地盡君則寄在他國也云言與民同者以客在主國得主君之恩故報與民同三月也敖氏繼公曰經傳不見諸侯相為服之禮是無服也寄公已失國則異于諸侯又寓于他邦之地則不可不為其君服然非臣也故但齊衰三月而與民同國君五月而葬此為之服者則止于三月以齊衰之輕者惟有此耳故不以其葬月為節也不特制為國君服者辟天子也諸侯之大夫為天子繐衰既葬除之特制之服也蔡氏徳晉曰案郝仲輿謂先王盛世何得有寄公此葢衰世之禮其説近是而未盡也葢封建肇于黄農歴唐虞夏商治亂不一故禹會諸侯于塗山執玉帛者萬國至周初止千八百國而已則其間失國而為寄公者必多而寄公為所寓之君服其由來舊矣周之制禮非用于一寄公為所寓之君服既合于理而可為後世用先王固宜存之于經而不削也盛氏世佐曰案禮為隣國君失地則同于民者賤之也不臣之者客也庶人為國君亦在此章故曰與民同欽定義疏同于民者寄公之自視則然所寓之君待之則以賔禮喪犬記可據也丈夫婦人為宗子宗子之母妻注婦人女子子在室及嫁歸宗者也宗子繼别之後百世不遷所謂大宗也故疏此與大宗同宗親如寄公為所寓次在此敖氏繼公曰丈夫者男子之與大宗絶屬者也婦人者謂絶屬之女子子在室者及宗婦也丈夫婦人于宗子宗子之母妻若在嫂叔之列者則不服之葢親者且無服疏者可知盛氏世佐曰案𫝊云婦人雖在外必有歸宗是婦人不以出降其宗明矣此婦人内亦當兼有宗女出嫁者族人為宗子之母妻服猶臣服君之母妻之義也此服因宗而生不因嫂叔而生故丈夫于宗子之母妻婦人于宗子雖或有在嫂叔之倫者無不服也敖説非與大宗絶屬者如此若在五服内月算如邦人亦皆齊衰無大功小功緦麻蔡氏徳晉曰大宗至尊五服之外皆服齊衰三月其在五服中者亦不當以功緦之服服之故無大功小功緦麻皆服齊衰三月而除與五屬之外同若大功小功之親既服齊衰三月乃受以大功小功之衰以足其月數而止此條中當有齊衰九月五月三月之服也傳曰何以服齊衰三月也尊祖也尊祖故敬宗敬宗者尊祖之義也宗子之母在則不為宗子之妻服也疏祖謂别子為祖百世不遷者當祭之日同宗皆來陪位及助祭故云尊祖也大宗者尊之統故同宗敬之尊祖之義也宗子之母在則不為宗子之妻服也者謂宗子父已卒宗子主其祭王制云八十齊衰之事不與則母七十亦不與今宗子母在年未七十母自與祭母死宗人為之服宗子母七十以上則宗子妻得與祭宗人乃為宗子妻服也必為宗子母妻服者以宗子燕食族人于堂其母妻亦燕食族人之婦于房皆序以昭穆故族人為之服也敖氏繼公曰别子為祖繼别為宗祖者已之所自出也尊之重本也然其尊祖之誠無由自盡故于敬宗見之葢敬其為别子之後者乃所以尊别子也故曰敬宗者尊祖之義也此為宗子與其母妻服皆敬宗之事故傳言之宗子之母在則不為宗子之妻服者謂族人于宗子之妻其服與否唯以其母之在不在為節則宗子之母雖老而妻代主家事若先其母而卒族人亦不為此服葢其母尚在故也此義與宗子不孤而死族人不以宗子服之者意實相類顧氏炎武曰正義謂母年未七十尚與祭非也祭統曰夫祭也者必夫婦親之是以舅没而姑老明其不與祭矣雖老固嘗為主祭之人而禮無二敬故為宗子之母服則不為妻服杜氏通典有夫為祖曽祖髙祖父母特重妻從服議一條云孔瑚問虞喜曰假使元孫為後元孫之婦從服期曽孫之婦尚在纔緦麻近輕逺重情實有疑喜荅曰有嫡子者無嫡孫又若為宗子母服則不服宗子婦以此推之若𤣥孫為後而其母尚存元孫之婦猶為庶不得傳重傳重之服理當在姑矣宋庾蔚之謂舅殁則姑老是授祭事于子婦至于祖服自以姑為嫡與此條之意互相𤼵明姜氏兆錫曰案内則舅殁則姑老則姑雖年未七十亦不主亞獻之禮其亞獻禮皆應宗子之妻佐宗子行之至其服則不為宗子之妻服者猶有適子無適孫之意以一宗無二服故也由是以推則服與祭義各有主不得牽連為義疏殆未之考與􅈍田案疏文以與祭不與祭定服與不服並非𫝊意諸家破之是也為舊君君之母妻疏舊君舊䝉恩深以對于父今雖退歸田野不忘舊徳故次在宗子之下也但為舊君有二一則致仕二則待放未去此則致仕者也敖氏繼公曰君亦謂舊君也在國而云舊君者明其不見為臣也此服大夫士同之郝氏敬曰舊君舊嘗仕于其國非故家世官也偶見用而遂去之恩輕誼薄如中下士庶人在官輩與民未逺今不仕與民同服君之母謂民為本國君之母夫人服也君之妻謂民為本國君夫人服也國人皆稱小君與君同尊故皆為齊衰三月非謂舊仕者也顧氏炎武曰與民同者為其君齊衰三月也不與民同者君之母妻民不服而嘗仕者獨為之服也古之卿大夫有見小君之禮而妻之爵服則又君夫人命之是以不容無服盛氏世佐曰案章内言舊君者三此則凡為舊臣之通禮也君謂有地者也臣為君服斬今降在此者以不在其國故也不在其國而猶為之服者子思所謂進以禮退以禮孟子所謂三有禮焉者也臣為君之母妻在不杖期章此亦以去位降也郝云民為小君服非傳曰為舊君者孰謂也仕焉而已者也何以服齊衰三月也言與民同也君之母妻則小君也注仕焉而已者謂老若有廢疾而致仕者也為小君服者恩深于民𫝊疏此經上下臣為舊君有二故𤼵問云仕焉而已者意以下為舊君是待放之臣以此為致仕之臣也云何以服齊衰三月者怪其舊服斬衰今服三月也言與民同也者以本義合但今義已㫁故抑之使與民同也下文庶人為國君無小君是恩淺此為小君是恩深于民也虞氏喜曰或問曰喪服經𫝊為舊君謂仕焉而已者鄭註曰仕焉而已謂老若廢疾而致仕者也今致仕與廢疾理得同不喜正之曰癈疾沉淪固同人伍不淪臣道齊衰三月可也老而致仕臣禮既全恩紀無替自應三年不得三月傳言仕焉而已者謂既仕而去義同人伍耳殷泉源問天子諸侯臣致仕服有同異范宣答曰夫禮制殘缺天子之典多不全具唯國君之禮往往有之臣之致仕則為舊君齊衰三月天子之臣則亦然矣天子之與國君雖名號差異至于臣子奉之與王者無殊矣敖氏繼公曰己猶止也鄭氏以為致仕是也此嘗仕矣今又在國其服宜異于民乃亦齊衰三月者葢不在其位則不宜服斬以同于見為臣者而臣于君又無期服故但齊衰三月而不嫌其與民同也然又為小君服則亦異于民矣欽定義疏身雖致仕所食者君之禄也若大夫則所乗者君之車也國政猶與聞焉恩誼深矣然一切典禮不可參錯于見為臣者之班是以服同于民也𫝊于寄公及致仕者皆言與民同見齊衰三月本為民服君之服也古人臣進退不苟細故㣲嫌有奉身而退者如楚子文三仕三已柳下恵為士師三黜略可見也註以老與廢疾者言之似未賅􅈍田案疏及諸家皆主在國者言盛氏依虞喜主去國者言則與下文舊君無别故盛説不載庶人為國君注不言民而言庶人庶人或有在官者天子畿内之民服天子亦如之疏云庶人在官者謂府史胥徒經言庶人兼在官者而言之云天子畿内之民亦如之者以其畿外上公五百里侯四百里以下其民皆服君三月則畿内千里専屬天子亦如諸侯之境内也問儀禮諸侯為天子斬衰三年庶人為國君齊衰三月註天子畿内之民服天子亦如之自古無有通天下為天子三年之制前輩恐未之考朱子曰後世士庶人既無本國之君服又無至尊服則是無君亦不可不去其變如今凉衫亦不害此亦只存得些影子或問有官人嫁娶在祔廟後朱子曰只不可帶花用樂少示其變君之喪士庶亦可聚哭但不可設位敖氏繼公曰庶人此服夫妻同之非當家者則不服也畿内之民其服天子亦當如此乃不著者則此經唯主為侯國而作益可見矣欽定義疏敖氏謂非在官者不服非也民無不服之理上傳再言與民同足以見之矣民之于君逺矣不可同于臣又不敢以輕服服之是以齊衰三月也侯國之民不服天子者勢彌逺而分逾尊故不可制服也然遏宻八音亦足以致其情矣為公卿夫夫之君無服諸侯世大夫不世經特言國君以此庶人為君之母妻無服大夫在外其妻長子為舊國君注在外待放已去者為疏此大夫在外不言本君服與不服者案雜記云違諸侯之夫夫不反服違大夫之諸侯不反服以其尊卑不敵若所仕敵乃反服舊君則此大夫已去他國不言服者是其君尊卑不敵不反服者也是以直言其妻長子為舊國君鄭氏昕曰禮為夫之君期今夫雖在外妻尚未去恐或者嫌猶宜期故言與民同則出國無服可知也所以别言之者明夫既去位妻便同于人耳敖氏繼公曰此承庶人之下故但據其妻與長子言之云舊國君明妻子亦在外也大夫與舊君恩深故雖去國而于己服之外妻子又為之服也去國且若是則在國可知大夫在位與其長子俱為君服斬妻服期去位則皆為之齊衰三月而已又為君之母妻若去國則夫不服其母妻也士之異于夫夫者長子無服若去其國則夫妻亦不服之矣盛氏世佐曰案大夫在外為舊君服已見上矣此則主為其妻長子言也其妻長子亦與大夫俱去者不曰舊君而曰舊國君見不在其國也大夫妻為君服在不杖期章服問云大夫之適子為君如士服今皆降在此者亦以其去國故也唯云大夫則士之妻長子去國者無服矣傳曰何以服齊衰三月也妻言與民同也長子言未去也注妻雖從夫而出古者大夫不外娶婦人歸宗往來猶民也春秋傳曰大夫越境逆女非禮君臣有合離之義長子去可以無服敖氏繼公曰其為服之意若但如是而已則士之在外者妻與長子亦宜然也何必大夫乎傳似失之郝氏敬曰大夫奔他國攜其妻子去妻嘗為命婦去則與國人同其宗族在舊國其長子或不去則與民同去則無服鄭謂古者大夫不外娶婦人歸宗往來猶民鑿説也所引春秋傳非經義先王封建小者不過五十里若大夫皆限境内婚同姓又不通則女亦不足矣盛氏世佐曰案妻舊命婦也已去而猶同之于民以其受恩深也云長子言未去也者謂此長子是大夫在國時所生故為舊國君反服若生于去國之後則無服矣聖人不為恩義所不及者制服也言此則妻亦在國時所娶可知于妻言與民同于長子言未去文互見也傳意本是如此後人錯會其意乃以未去為留在國者夫身居其國即庶人尚為國君有服寧獨故大夫之長子乎倘庶子遂無服耶且在國者亦不得目其君為舊國君也以是數者推之註疏之誤顯然矣然則大夫在外其長子留在國于君宜何服曰大夫以罪去國長子雖留亦與民同以其義已㫁故也又案古者君臣一體適子既冠則奠摯見于君死則赴于君士禮且然矧大夫乎大夫雖無世及之義而大夫之子得行大夫禮則其受君􅃂眷深矣故其父在位則亦為君服斬已去猶與民同服所以報也留在國者亦無加焉抑之也若大夫致仕者之長子則仍如士服矣欽定義疏案妻若隨夫去則不必與民同矣未去則雖外娶者亦與民同義不繫于歸宗往來也士昏禮有若異邦之文士且外娶况大夫乎公羊之言亦不可為典要敖氏推勘大夫與士應有不同固為入細然反復經文則以妻長子為已去者終覺未安傳云未去亦謂將去而未去適遇君喪者爾􅈍田案大夫為舊君服見上下文此主為其妻長子將去未去適遇君喪者言鄭氏昕及義疏説是也敖氏盛氏以為已去與傳文不協鄭註分妻為已去長子為未去尤未安盛氏妻是在國時所娶子是在國時所生亦為鑿説繼父不同居者注嘗同居今不同居疏此則期章云必嘗同居然後為異者也無傳者已于期章釋訖是以不言也敖氏繼公曰為繼父同居者期而為異居者不降一等為大功乃服此服者恩同于父不敢以卑服䙝之也繼父于子同居異居皆不為服知不為服者二章無報文且齊衰三月不可用于卑者也郝氏敬曰謂不同居謂繼父續生子使其妻前夫之子别居昔嘗同居恩深故為齊衰三月汪氏琬曰或問律文繼父同居而兩有大功親者為之齊衰三月借令一有大功以上親一無大功以上親則如之何曰小記皆無主後同財而祭其祖禰為同居有主後為異居疏謂此子有子亦為異居也然則律文雖與禮不同而其義即皆有主後者也或問果應服乎曰父不當繼繼父亦不當同居而禮與律有同居異居之别此服制之變末世之不得已也亦為人子者之不得已也欽定義疏先嘗同居則固兩無大功之親相依年久且又以彼貨財築此宫廟而嵗時藉以奉祀矣其後或繼父自有子或立同宗為後乃異居而其初同居之誼猶夫故也以異居故不服期以先嘗同居故齊衰未可改也恩同于父亦非過論又案檀弓有論同母異父之昆弟之服者葢指此嘗同居後異居者也繼父後有子乃相為昆弟服繼父故并論其子之相為服而或以為大功或以為齊衰耳若本非同居則嫁母且絶不為親矣母之後夫與後夫所生之子皆路人也何服之可議乎要之先即同居而異父之昆弟不應有服故經無其文而子夏以為未之前聞也齊功紛紜殊為多事又案父子祖孫服有重輕無不相為服者繼父而不報則踰于祖父矣無此理也不杖期可施于卑者乃靳此三月乎經不言報或傳寫失之曽祖父母疏曽髙本合小功加至齊衰故次繼父之下此經直云曽祖不言髙祖案族祖父以髙祖之孫而緦麻則髙祖有服明矣故此註兼曽髙而説也經不言者見其同服可知袁氏准曰案喪服云為曽祖父母齊衰三月自天子至于士一也祖期則曽祖大功髙祖小功而云三月者此通逺祖之言也今有彭祖之夀無名之祖存焉爾雅有來孫雲孫仍孫昆孫有相及者故也十代之祖在堂則不可以無服也郯子曰我髙祖少皥摯之立也非五代祖也蒯瞶禱康叔自稱曽孫非四代之曽孫然則髙逺也無名之祖希及之矣故不復分别而重言之也問魏徴加服朱子曰觀當時所加曽祖之服仍為齊衰而五月非降為小功也今五服格仍遵用之雖於古為有加然恐亦未為不可也沈氏括曰喪服但有曽祖曽孫而無髙祖元孫或曰經之所不言則不服是不然曽重也自祖而上者皆曽祖也自孫而下者皆曽孫也雖百世可也苟有相逮者則必為服喪三月故雖成王之于后稷亦稱曽孫而祭禮祝文無逺近皆曰曽孫黄氏榦曰唐貞觀十四年侍中魏徴奏謹案髙祖曽祖舊服齊衰三月請加為齊衰五月開元禮為曽祖父母齊衰五月髙祖父母齊衰三月齊今服制令為曽祖父母齊衰五月為髙祖父母衰三月敖氏繼公曰曽猶重也謂祖之上又有祖也顧氏炎武曰禮記祭法言適子適孫適曽孫適𤣥孫適來孫左傳王子虎盟諸侯亦曰及而𤣥孫無有老幼𤣥孫之文見于記傳者如此然宗廟之中並無此稱詩維天之命駿恵我文王曽孫篤之鄭氏箋曰曽猶重也自孫之子而下事先祖皆稱曽孫禮記郊特牲稱曽孫某註謂諸侯事五廟也于曽祖已上稱曽孫而已左傳哀公二年衞太子禱文王稱曽孫蒯聵晉書鍾雅傳元帝詔曰禮事宗廟自曽孫已下皆稱曽孫義取于重孫可歴世共其名無所改也文曽祖父母齊衰三月而不言曽祖父之父母非經之脱漏也葢以是而推之矣凡人祖孫相見其得至于五世者鮮矣夀至八九十而後可以見曽孫之子百有餘年而曽孫之子之子亦可見矣人之夀以百年為限故服至五世而窮苟六世而相見焉其服不異于曽祖也經于曽祖已上不言者以是而推之也觀于祭之稱曽孫不論世數而知曽祖之名統上世而言之矣盛氏世佐曰案爾雅云曽祖王父之考為髙祖王父曽祖王父之妣為髙祖王母然則髙祖之名非起于後人矣爾雅又云曽孫之子為𤣥孫𤣥孫之子為來孫來孫之子為晜孫晜孫之子為礽孫礽孫之子為雲孫自𤣥孫而下五世各有名稱而宗廟之中自孫之子而下皆稱曽孫者不惟義取于重且以𤣥孫等皆疏逺之名故不稱也異其名者所以别世數同其稱者見其世雖逺而事先之情如一也然爾雅孫之名及于八世而祖之名止于四世髙祖父之父母其謂之何曰自髙祖王父之考以上統謂之祖而已祭法云王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟所謂祖考者即髙祖王父之考也而直云祖考則自此以上都無異名可知喪服經但著曽祖父母之服而髙祖已上略而不言以其相及者鮮且自曽祖而推之可知也顧云苟六世而相見焉其服不異于曽祖是也云曽祖之名統上世而言之則非矣傳曰何以齊衰三月也小功者兄弟之服也不敢以兄弟之服服至尊也注正言小功者服之數盡于五則髙祖宜緦麻曽祖宜小功也據祖期則曽祖大功髙祖宜小功也髙祖曽祖皆有小功之差則曽孫𤣥孫為之服同也重其衰麻尊尊也減其日月恩殺也何疏三年問云何以至期也曰至親以期㫁又云然則以三年也曰加隆焉爾也是本為父母期而加隆至三年若謂為父母期則為祖宜大功曽祖宜小功髙祖宜緦麻若為父加隆三年則為祖宜期曽祖宜大功髙祖宜小功是髙祖曽祖皆有小功之差也曽祖中既兼有髙祖是以云曽孫𤣥孫各為之齊衰三月也敖氏繼公曰足弟之服大功以下皆是也小功者據當為曽祖之本服言也曽祖本小功以其為兄弟之服不宜施于至尊故服以齊衰三月焉此其日月雖減于小功而衰麻之屬實過于大功且専為尊者之服是以日月之多寡有所不計禮有似殺而實隆者此之謂與曽祖之父本服在緦麻若以此傳義推之則亦當齊衰而經不言之者葢髙祖𤣥孫亦鮮有相及者也郝氏敬曰五服論布斬衰三升齊衰四升繐衰四升半大功八升九升小功緦麻十升十一升其繐衰唯諸侯之大夫為天子服餘五服父斬母齊祖大功曽祖小功髙祖緦麻此常數應爾然大功従兄弟之服也故不以服祖而以齊衰期年小功従祖兄弟之服也豈可以服其曽祖乎故為之齊衰三月此謂不敢以兄弟之服服至尊然則髙祖又可以緦麻之服服乎亦齊衰可知案齊衰三月専為尊者之義服功為兄弟之服緦為外親之服大較似此華氏學泉曰或問儀禮不載髙祖之服何也曰髙曽同服也其髙曽同服何也曰齊衰三月為尊者之服也故臣為舊君則服庶人為國君則服大夫士為宗子宗婦則服以是為尊尊之服不可有所隆替故髙曽同服也聖人之制服恩與義而已自仁率親等而上之至于祖名曰輕其恩輕也自義率祖順而下之至于禰名曰重其義重也義莫重于尊祖自曽祖而上之其尊同也自髙祖而上之其尊同也尊同故服之皆以齊衰無隆殺也髙曽之服主以義不主以恩其恩皆輕故服之同以三月無久近也唐貞觀間更定為曽祖齊衰五月為髙祖齊衰三月例以小功緦麻之月數而髙曽祖之服亦以次而降殺非制禮之初意矣蔡氏徳晉曰髙曽父母服至三月無可復減然恩之隆殺服之輕重以曽祖擬髙祖當有差等則唐太宗之増曽祖為五月雖聖人復起弗可改也已欽定義疏案天子諸侯之曽祖父母即開創始封亦罕相及相及則服從同若天子諸侯之曽孫為其曽祖父則當以臣為君之服服之康成云天子諸侯之喪皆斬衰無期是也大夫為宗子疏大夫尊降旁親皆一等尊祖故敬宗是以大夫雖尊不降宗子為之三月宗子既不降母妻不降可知敖氏繼公曰亦與宗子絶屬者也前條云丈夫婦人為宗子宗子之母妻大夫此服既如衆人則命婦亦宜然也此但云大夫為宗子不云命婦又不云宗子之母妻各見其尊者爾郝氏敬曰前言大夫婦人為宗子此又言大夫疑大夫貴可降耳大夫不降則宗子重可知盛氏世佐曰案唯云宗子則宗子之母妻葢無服矣此則其異于衆人者也下文言舊君而不及君之母妻意亦類此傳曰何以服齊衰三月也大夫不敢降其宗也敖氏繼公曰言不敢降則是宗子為士也絶屬者且不降則有親者亦服之如邦人可知矣欽定義疏此本無服以重大宗故服之非不降例也曰不敢降亦立文不得不然耳宗子為大夫則尊同其為士者應以尊降此云不降蒙前條之皆為士者也􅈍田案喪服言宗子之服皆指大宗言或云兼四小宗者非是四小宗自有本服不另立服也舊君注大夫待放未去者此疏舊君以重出故次在雷氏次宗曰經前已有為舊君今復有此舊君傳所以知前經是仕焉而已後經是待放未去者葢以兼服小君知恩有深淺也仕焉而退君臣道足恩義既施恩及母妻今被放而去名義盡矣若君不能掃其宗廟則但不為戎首而已以其猶復未絶故得同于人庶適足以反服于君不獲及其親也敖氏繼公曰此即在外之大夫為之也子思子曰古之君子進人以禮退人以禮故有舊君反服之禮孟子曰諫行言聴膏澤下于民有故而去則君使人導之出疆又先於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣為舊君之義盡之郝氏敬曰前言舊君謂嘗仕焉而已者此則仕而貴為大夫者也盛氏世佐曰案此亦大夫為之也何大夫之謂乎去而復仕于他國者也上己言舊君矣此復著之者嫌其或以後貴而降也舊君諸侯之被廢者也下文云為士者即其人矣諸侯被廢不必又為士而用士禮終其身故亦以為士者言之記言諸侯失國而死祭以士禮尸服以士服此之謂也經大夫為宗子舊君曽祖父母為士者如衆人十七字宜作一句讀其義自見四人之服皆已見于上而重出者上為衆人言此為大夫服之亦如是也經文本是連貫自後儒以傳文散屬其下而經文遂裂舊君二字上無所承下無所屬註家嫌其重出則以大夫待放未去者為經而解義失矣又案周之盛時諸侯黜陟之權操于天子巡狩述職貢士諸大典皆所以考察其賢否而誅賞之也如王制射義所言則其時固有貶爵削地而無所姑息者矣故寄公為所寓大夫為舊君為士者皆為制服列之于經此諸侯所以不敢放恣也以後事證之黎侯之于衞君是寄公為所寓也百里奚之于虞公是大夫為舊君為士者也􅈍田案此章言舊君者三前一條以在國之臣言之後二條以去國之臣言之前條則指凡仕者此條則指為大夫者非待放未去之謂亦不指被廢之諸侯諸侯失國祭以士禮于記有之然如盛氏謂諸侯失國而為士則恐未然此條但蒙上大夫為文不合以下為士者為文傳曰大夫為舊君何以服齊衰三月也大夫去君埽其宗廟故服齊衰三月也言與民同也何大夫之謂乎言其以道去君而猶未絶也注以道去君謂三諫不従待放于郊未絶者言爵祿尚有列于朝出入有詔于國妻子自若民也放疏不言士者此主為待放未絶大夫有此法士無待之法不言公卿及孤者詩云三事大夫則公卿亦號大夫敖氏繼公曰云君埽其宗廟見猶望其復反之意所謂猶未絶者此也然則已絶者其不為此服乎亦似與經意異矣郝氏敬曰埽其宗廟謂故家世族誼無可絶以禮致仕非奔放之比前舊君服言與民同者無官削籍本與民同此與民同者致臣而去退自處于編氓者也故傳設言何大夫以明之張氏爾岐曰此章言為舊君者三為舊君及其母妻此昔仕今已在其故國者也大夫在外此其身已去其子尚存本國者也此言舊君則大夫去而未絶孟子所謂三有禮者也埽其宗廟謂使宗族為之祭祀爵禄有列謂舊位仍在出入有詔于國疏以為兄弟宗族猶存吉凶書信相告不絶盛氏世佐曰案傳云大夫為舊君蒙上文大夫而言也然經所陳乃去而復仕之大夫傳以去而未絶者釋之似少異矣云君埽其宗廟者謂使族人攝祭糞除其宗廟也以道去君見不以罪逐也未絶者言君臣之義猶未絶此傳與子思孟子之言相類欽定義疏鄭氏大夫待放未去者案傳言已去註何云未去乎若未去豈煩君之埽其宗廟耶註欲與前經大夫在外條區而為二故强别之且人臣進以禮退以義去國之道多端孔子席不暇煖燔肉不至不税冕而行孟子亦言所去三所就三矣豈必皆待放者乎又案為舊君凡三條第一條大夫士仕焉而已者在國者也在國故服君而并服其母妻也第二條大夫身已去國而妻若長子尚留者也妻長子服君則不服君之母妻矣身在外未仕則服已仕則不服也第三條則指言大夫去國而未仕者其妻若子皆已去可知􅈍田案義疏分解舊君三條最為明晰徐乾學解大夫在外以為惟妻與長子行服而其身則不服似未安黄乾行遂以為君收其宗廟不使為祭祀如孟子所謂去之日遂收其田里者是以大夫無服惟其妻與長子服案果如此則是恩義已絶大夫之無服宜矣然妻従夫服何以夫不服而妻反服之耶説似難通曽祖父母為士者如衆人敖氏繼公曰不云如士而云如衆人是庶人之服亦如士禮矣張氏爾岐曰此上三節並承大夫為三字盛氏世佐曰案為士者統謂宗子舊君曽祖父母也如衆人言大夫為此四人服不異于衆人之齊衰三月也言此者嫌其當以尊降傳曰何以齊衰三月也大夫不敢降其祖也疏經不言大夫傳為大夫解之者以其言曽祖為士者故知對大夫下為之服敖氏繼公曰經言大夫為宗子舊君曽祖父母為士者葢連文也故傳于此以大夫言之非専取為士之文也女子子嫁者未嫁者為曽祖父母疏此亦重出故次在男子曽孫下也但未嫁者同于前為曽祖父母今并言嫁者女子子有嫁逆降之理故因已嫁并言未嫁敖氏繼公曰此不降之服似不必言未嫁者經葢顧大功章立文耳女子子之適人者降其父母一等乃不降其祖與曽祖者葢尊服止于齊衰三月其自大功以下則服至尊者不用焉故父母之三年可降而為齊衰期而祖之齊衰期不可降而為大功曽祖之齊衰三月又不可降而無服此所以祖及曽祖之服俱不降也欽定義疏大功章女子子嫁者未嫁者為世父母叔父母姑姊妹則成人未嫁者得降其旁親也彼降此不降而兼言未嫁者則同故敖氏云然此經主為士之女子子言之而大夫以上至天子之女子子並同即大夫女為諸侯夫人諸侯女為天王后者於曽祖父母無不服也若於其曽祖父母為天子諸侯者則又不止三月而已傳曰嫁者其嫁於大夫者也未嫁者其成人而未嫁者也何以服齊衰三月不敢降其祖也注言嫁于大夫者明雖尊猶不降也成人謂年二十已笄醴者也此者不降明有所降二疏雖尊猶不降則適士以下不降可知云成人謂年十已笄以醴禮之若十五許嫁亦笄為成人但鄭據二十笄者而言之云此者不降明有所降者案大功章女子子嫁者未嫁者為世叔父母如此類是有所降也敖氏繼公曰傳意謂嫁于大夫者雖尊猶不敢降其祖然則大夫妻亦有降其本族之旁親與士妻異者乎又所謂成人而未嫁者與不敢降之意尤不相通傳似失其㫖矣郝氏敬曰𫝊知為大夫妻者承上大夫言唯大夫妻有降服未嫁不降人知之己嫁不降人不知成人乃備禮故曰其成人未嫁者也盛氏世佐曰案女子子嫁者于其旁親皆降一等以出降也若為命婦則于其旁親之為士者又降一等以尊降也唯于祖父母曽祖父母則各以本服服之二者之降皆無焉正尊故也云成人而未嫁者女子子在室與男子同不待言也成人則有出道嫌或有所降故傳據此言之欽定義疏大夫妻于本族之旁親不降一等以異于士之妻者父族之為士者為其姑姊妹女子子之適人者不可以其嫁于大夫而為之加服故還為父族服者雖旁親無降之之法也若大夫女為諸侯夫人諸侯女為天王后者則惟服其正尊與昆弟之為父後者而旁親無服矣此經本意惟對出降而言故云嫁者未嫁者明嫁者與未嫁者同不以出適而降也𫝊乃以嫁于大夫為辭故敖氏以為失其㫖右齊衰無受五禮通考卷二百五十五
