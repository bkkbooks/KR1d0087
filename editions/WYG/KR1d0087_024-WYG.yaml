body:
  text: 五禮通考巻十四刑部尚書秦蕙田撰吉禮十四圜丘祀天宋史哲宗本紀元祐七年九月戊戌詔冬至日南郊宜依故事設皇地祇禮畢別議方澤之儀以聞十一月庚寅帝齋大慶殿辛夘朝獻景靈宮壬辰饗太廟癸巳祀天地于圜丘赦天下中外羣臣加恩文獻通考先時元祐五年五月夏至祭皇地祇命尚書右丞許將攝事將言王者父天母地三嵗冬至天子親祠徧享宗廟祀天圜丘而夏至方澤之祭乃止遣上公則皇地祇遂永不在親祠之典此大闕禮望博詔儒臣講求典故明正祀典為萬世法詔禮部太常寺及兩省侍從官集議以聞于是翰林學士兼侍讀顧臨等八人請合祭天地如祖宗故事俟將來親行北郊之禮則合祭可罷臨與祖禹又言天地特祭經有明文然自漢以來千有餘年不能行之矣宋興一祖六宗皆合祭天地其不合祭者唯元豐六年一郊耳去所易而就所難虚地祇之大祭失今不定後必悔之吏部侍郎范純禮彭汝礪户部侍郎范子竒禮部侍郎曾肇刑部侍郎王覿豐稷權知開封府韓宗道樞宻都承㫖劉安世中書舍人孔武仲陳軒太常少卿盛陶宇文昌齡侍御史王畏監察御史董敦逸黄慶基左司諫虞䇿禮部郎中孫路貟外郎歐陽棐太常丞韓治博士朱彦宋景年閻本等二十二人皆主北郊之議而武仲又請以孟冬純隂之月詣北郊親祠如神州地祇之祭杜純議請南郊之嵗設望祠位於苑中置爟火夏至命上公攝事每獻舉爟火詔依王欽臣議宜如祖宗故事並祭天地一次汝礪肇復上疏論合祭非是文多不載九月三省上顧臨等議太皇太后曰宜依仁宗皇帝故事呂大防言國朝以來大率三嵗一親郊並祭天地宗廟因行赦宥頒賞軍士遂以為常今諸儒獻議欲南郊不設皇地祇位唯祭昊天上帝于祖宗之制未見其可蘇轍曰自熈寧十年神宗皇帝親祠南郊合祭天地今十五年矣皇帝即位又已八年未嘗親見地祇乃朝廷缺典不可不正范百祿言圜丘無祭地之禮記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改大防又言先帝因禮文所建議遂令諸儒議定北郊祀地之禮然未經親行今皇帝臨御之始當親見天地而地祇之位獨不設恐亦未安況本朝祖宗以恩霈四方慶賚將士非三嵗一行則國力有限今日宜為國事勉行權制俟异時議定北郊制度及太廟享禮行之未晚太皇太后以呂大防之言為是而蘇頌鄭雍皆以古者人君嗣位之初必郊見天地今皇帝初郊而不祀地恐未合古乃下詔曰國家郊廟特祀祖宗以來命官攝事則三嵗一親郊則先享清廟冬至合祭天地於圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祠北郊之儀未之及行是嵗郊祀不設皇地祇之位而宗廟之享率如權制朕方修郊見天地之始其冬至日南郊宜依熈寧十年故事設皇地祇位以嚴並況之報厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢集官詳議典禮以聞厯代名臣奏議劉安世上議略臣等昨奉詔㫖講議大典皆祖周制而或者欲于當郊之嵗以十月神州地祇之祭易夏至方澤之祀可以免盛暑舉事之勞夫神州地祇乃天子建都之所一方之神爾非皇地祇之比也或者又欲于夏至之日上不親郊止設爟火天子望祀于禁中如西漢行宮故事此皆出于臆說違經害義不可施行臣等更不復議内有蘇軾一狀最為强辯案軾以為合祭圜丘于禮為得不可復有改更臣等謹案周禮天子親祀上帝一嵗凡九國朝因前代之制三嵗方一郊天仍于其間或用他禮比之周室固以疎濶苟更因循謬誤不加考正則何以副聖上嚴禋之意哉夫祭祀之禮莫大于天地孝經曰昔者明王事父孝故事天明事母孝故事地察二儀敵體禮宜均一豈可親祠乃有隆殺古者謂求神以類繫辭曰乾為天陽物也故祭之于冬至一陽生之日就國之南圜丘以行禮牲牢器幣樂舞皆尚陽數坤為地隂物也故祭之于夏至一隂生之日就國之北方澤以行禮牲牢器幣樂舞皆尚隂數此所謂求神以類者也今議者猥用王莽不經之說至引夫婦同牢私媟之語黷亂天地臣等雖謭陋決不可從非禮之禮秦漢而下去聖寖逺禮崩樂壊無能改革神宗詔有司稽考未遑改制陛下繼志述事講究墜典此正方今之先務也議者乃引周頌昊天有成命以為合祭之證竊詳詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之終篇未嘗有合祭之文所謂郊祀天地乃後儒叙詩者之辭耳非經語也盖成周之世圜丘祭天歌此詩以為樂章方澤祀地亦歌此詩以為樂章而已非謂易北郊之祀使就享于南郊也借如其說臣等不敢別引他經止就周頌中舉詩以難之潛詩之序曰潛季冬獻魚春薦鮪也不識謂一祭耶抑二祭耶又豐年詩之序曰豐年秋冬報也噫嘻詩之序曰春夏祈榖于上帝也如此之類未審止是一祭復為二祭三詩即互用于異時則昊天有成命雖歌于圜丘豈不可用于方澤乎彭如礪上南北郊分祭議略臣聞禮者體也體不備君子謂之不成人設之不當猶不備也故先王之交于神明也既祭之以禮又求之以類其時日牲幣器服聲音顔色無或非其類者或非其類謂之非禮非禮之祭鬼神不享臣謹以一事明之春為陽故以正月迎于東郊秋為隂故以七月迎于西郊使迎春則在西郊而用秋之時迎秋則在東郊而用春之時樵野猶怪而況于鬼神乎夫天之與人非有異也今應祭方澤也而命于圜丘應用夏至也而用冬至葢何以異此先皇帝欽若稽古是正太常今何疑何恤而欲紛更之也家人小祀尚慎廢舉天地重大豈容輕議臣聞之神無常享享于至誠天無私親親于有德朝廷誠能富民阜財明道崇義致帝者之用成天地之化使粒食之民宴也粲也則上帝是祐而諸福之物皆可畢致務改祀命實非所願惟朝廷慎之重之反覆之務求至當以稱先帝所以尊奉聖靈之意焉又曰合祭之議臣等謂不可者二十二人謂可者八人楊子曰人各是其所是非其所非將誰使正之曰萬物紛錯而占諸天衆言淆亂則折諸聖在則人亡則書周禮聖人之言也合祭肇于漢末時其言甚不經朝廷制度考文方告之宗廟行之天地布之天下以憲萬世或委聖言而從不經不可也或曰合祭歴世行之莫之改也夫莫之改者猶行之不可也先帝既改之善矣欲變之不可也或曰親祠未能且從合祭可乎曰親祠非不可行以有事而攝焉亦禮也合祭非禮也舍禮不用而從非禮不可也夫規矩誠設不可欺以方圎繩墨誠陳不可欺以曲直今議祭祀而不從禮議禮而不從經則是非並起終無所歸是猶舍規矩而察方圎舍繩墨而觀曲直不可也七年禮部侍郎曾肇上奏乞分祭略曰伏以天地合祭非先王禮學士大夫所共知之不待臣言而信也然使合祭于承事神祇無不順之理雖非先王之禮何為而不可行蓋以聖人之于祭求之于茫昧不可知之中故必因其方順其時而用其類以致之是以因髙以事天因下以事地兆五帝于四郊朝日于東夕月于西兆司中司命于南風師雨師于北兆山川丘陵墳衍各因其方而春夏秋冬各順隂陽之性其于祭事或燔或瘞或埋或沈以至圭璧幣牲坎壇樂舞各從其類先王非苟為之以謂求之如此之盡然後庶幾神之來享也苟為反是則其于格神也難矣今論者以罷合祭則天子未有親見地祇之時夏至親祀北郊則以五月行禮為難欲因南郊并舉地祭此施于人事以求自便則可矣以此為親見地祇之實則未也何則事之非其方致之非其類又違其時施于羣小祀且猶不可況地祇之尊乎以此事地地祇未必來享而便謂此為親見地祇之實此臣所未諭也且屈已從神與屈神以從已二者孰安今以五月行禮為難而引地祇以就冬祭苟從人事之便恐失陛下恭事地祇之意此又臣所未諭也臣謂合祭不可復親祀不可廢但當斟酌時宜省去繁文末節則親祀之禮無不可為已于前狀論之矣肇又奏曰南郊非祭地之處冬至非見地之時樂以圜鍾為宮其變以六非致地祇之音燔柴升烟非祭地祇之禮不問神之享與不享姑欲便于人事不近于怠乎今世之人家有尊長所居異宮子弟致敬必即其處尚不敢屈致一堂況天子事地可不如家人之禮哉前日以合祭為非而罷之今日復行異日復罷謂神無象廢置自由不近于瀆乎陛下即位八年兩行明堂大享之禮今兹有事南郊凡與天神舉皆從祀次第行之則將來郊祀之嵗親祀北郊并及諸神固未為晚何遽為此舉以涉非禮之議哉況五月祭地前世之所常行本朝開寶中亦曾四月行雩祀之禮古人尚以六月出師孰謂夏至有不可行禮者哉宇文昌齡傳昌齡遷太常少卿詔議郊祀合祭論者不一昌齡曰天地之數以髙卑則異位以禮制則異宜以樂舞則異數至于衣服之章器用之具日至之時皆有辨而不亂夫祀者自有以感于無自實以通于虚必以類應類以氣合氣然後可以得而親可以冀其格今祭地于圜丘以氣則非所合以類則非所應而求髙厚之來享不亦難乎後竟用其議蕙田案元祐再議主分祭者二十二人今可考其文者劉安世彭汝礪曾肇宇文昌齡四人其言皆質實典重俱有發明惜其餘之不盡見也文獻通考南郊鹵簿使兵部尚書蘇軾奏臣謹案漢成帝郊祀甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母忻然而上夀兮屏玉女而却虙妃言婦女不當與齋祀之間也臣今備位夏官職在鹵簿準故事郊祀既成乗輿還齋宮改服通天冠絳紗袍教坊鈞容作樂還内然後后妃之屬中道迎謁已非典禮而況方當祀事未畢而中宮掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悅服今車駕方宿齋太廟而内中車子不避仗衞爭道亂行臣愚竊恐于觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行取進止時軾為鹵簿使導駕内中朱紅車子十餘輛有張紅蓋者爭道亂行于乾明寺前軾于車中草此奏奏入上在太廟馳遣人以疏白太皇太后明日中使傳命申勅有司嚴整仗衞自皇后以下皆不復迎謁中道宋史蘇軾傳是嵗南郊軾為鹵簿使導駕入太廟有赭繖犢車并青蓋犢車十餘爭道不避儀仗軾使御營巡檢使問之乃皇太后及大長公主時御史中丞李之純為儀仗使軾曰中丞職當肅政不可不以聞之純不敢言軾于車中奏之哲宗遣使齎疏馳白太皇太后明日詔整肅儀衞自皇后而下皆毋得迎謁哲宗本紀元祐八年四月丁已詔南郊合祭天地罷禮部集官詳議禮志元祐八年禮部尚書蘇軾復陳合祭六議令禮官集議以聞已而下詔依元祐七年故事合祭天地于南郊仍罷集議文獻通考禮部尚書蘇軾言恭睹陛下近者至日親祀郊廟神祇享答實蒙休應然則圜丘合祭允當天地之心不宜復有更改竊惟議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天于南郊陽時陽位也夏至祀地于北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然冬至南郊既祀上帝則天地百神莫不從祀古者秋分夕月于西郊亦可謂隂時隂位矣至于從祀上帝則冬至而祀月于南郊議者不以為疑今皇地祇亦從上帝而合祭於圜丘獨以為不可則過矣書曰肆類于上帝禋于六宗望于山川徧于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祇豈有此理哉武王克商庚戌柴望柴祭上帝望祭山川也一日之間自上帝而及山川必無南北郊之別也而獨略地祇豈有此理哉臣以此知古者祀上帝并祀地祇矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而說者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祭而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔嘉歌于秋可也歌于冬亦可也昊天成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之終篇言天而不及地頌以告神明也未有歌其所不祭祭其所不歌也今祭地于北郊獨歌天而不歌地豈有此理哉臣以知周之世祀上帝則地祇在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也議者乃謂合祭天地始于王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也嘗采用元始合祭故事謹案後漢書郊祀志建武二年初制郊兆于洛陽為圜丘八陛中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又案水經注伊水東北至洛陽縣圜丘東大魏郊天之所準漢故事為圜丘壇八階中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事于南郊賈曾議曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀郊之與廟皆有禘也禘于廟則祖宗合食于太祖禘于郊則地祇羣望皆合食于圜丘以始祖配享盖有事之大祭非常祀也三輔故事祭于圜丘上帝后土位皆南面則漢嘗合祭矣時禇無量郭山惲等皆以曾言為然明皇天寶元年二月勅曰凡所祠享必在躬親朕不親祭禮將有缺其皇地示宜就南郊合祭是月二十日合祭天地于南郊自後有事于圜丘皆合祭此則唐世合祭天地之明驗也今議者欲冬至祀天夏至祀地盖以為用周禮也臣請言周禮與今禮之別古者一嵗祀天者二明堂享帝者一四時迎氣者五祭地者二享宗廟者四此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先享宗廟乃祀天地自真宗以來三嵗一郊必先有事景靈宮享太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗嵗行之不以為難今之禮親祭如此其少而三嵗一行不以為易其故何也古者天子出入儀物不繁兵衞甚簡用財有節而宗廟在大門之内朝諸侯出爵賞必于太廟不止時祭而已天子所治不過王畿千里唯以齊祭禮樂為政事能守此則天下服矣是故嵗嵗行之率以為常至于後世海内為一四方萬里皆聽命于上機務之繁億萬倍于古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至于今非復如古之簡易也今之所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得䕃補親屬非周禮也自宰相宗室以下至百官皆有賜賚非周禮也此皆不改而獨于地示則曰周禮不當祭于圜丘此何義也哉議者必又曰夏至不能行禮則遣官攝祭亦有故事此非臣之所知也周禮大宗伯若王不與祭祀則攝位鄭氏注曰王有故則代行其祭祀賈公彦疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮後世人主不能嵗嵗親祭故命有司行事其所從來久矣若親郊之嵗遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一嵗可以再郊臣將應之曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宮入廟自廟出郊冠通天乘大輅日中而舍百官衛兵暴露于道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏異事天則備事地則簡是于父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異于前世自唐之時未有軍賞猶不能嵗嵗親祠天子出郊兵衞不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈有復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊已為疎濶若獨祭地而不祭天是因事地而愈疎于事天自古未有六年一祀天者如此則典禮愈壊欲復古而背古益逺神示必不顧享非所以為禮也議者必又曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者為欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶變禮之權耶若變禮從權而可則合祭圜丘何擉不可乎十月親祀地十一月親祀天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之嵗以夏至祀地示于方澤上不親郊而通爟火天子于禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在四郊者故逺望而祭也今所在之處俛則見地而云望祭是為京師不見地乎此六議者合祭可否之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圜丘方澤皆親祭之為是也盖以時不可行是故參酌古今上合典禮下合時宜較其所得已多于漢唐矣天地宗廟之祭皆當嵗徧今不得嵗徧是故徧于三年當郊之嵗又不能于一嵗之中再舉大禮是故徧于三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親往二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當祀地之嵗而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行願陛下謹守太祖建隆神宗熈寧之禮無更改易郊祀廟享以億寧上下神示仍乞下臣此章付有司集議如有異論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可但執周禮更不論今可與不可施行所貴嚴祀大典以時決定取進止貼黄稱唐制將有事于南郊則先朝獻太清宮朝享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹案武王克商丁未祀周廟庚戌柴望相去三日則先廟後郊亦三代之禮也初詔議北郊典禮蘇軾主合祭之說從之者五人劉安世主分祭之說從之者四十人又有三人欲于十月以神州地示之祭易夏至方丘之祀又有一人欲上不親祠而通爟火天子于禁中望拜既而朝廷復送下三狀再令詳定安世復議略云蘇軾謂合祭圜丘于禮為得不可復改臣等謹案周禮天子親祀上帝凡九國朝三嵗一郊固已疎濶豈可因循謬誤不加攷正古者求神以類天陽物也地隂物也嵗月日時方位牲器樂舞皆從其類今議者于聖人成法則棄而不行猥用王莽不經之說至引夫婦同牢私褻之語黷亂天地又引昊天有成命之詩以為證臣等切詳此詩終篇未嘗有合祭之文序乃後儒之辭亦謂成周之世圜丘方澤各歌此詩以為樂章耳如潛之序曰季冬獻魚春薦鮪也豐年之序曰豐年秋冬報也噫嘻之詩曰春夏祈榖于上帝也如此之類不知為一祭耶抑二祭耶若郊祀賜予乃五代姑息之弊法聖朝寛仁不欲遽罷若分而為二何所不可議者乃欲因此造為險語以動上聽又引禍福殃咎之說劫持朝廷必欲從已甚無謂也大抵臣等所守乃先王之正禮而蘇軾之議皆後世之便宜權之與正決不可合伏望聖慈詳審其當上以體神考之志下以正千載之惑不勝幸甚方送同議官簽書其徒馳告軾曰若劉承㫖議上決恐難答時蘇轍為門下侍郎遂白轍令請降㫖罷議安世議竟不得上蕙田案此元祐再議也蘇軾所發六議辨矣然衷而論之有十二失焉古者祭天特牲後世乃有從祀百神若果百神從祀則虞書類上帝之下不應又禋六宗望山川徧羣神矣軾乃以百神從祀之故謂皇地示亦宜從上帝而合祭于圜丘其失一也謂古者秋分夕月于西郊亦可謂隂時隂位矣至于從祀上帝則冬至而禮月于南郊以破陽時陽位不可求隂之說夫既不以配月從祀之故而廢秋分之夕月何得以地示從祀之故而廢夏至之方澤耶其失二也告祭不及地示或經偶遺之昊天有成命不足為郊祀天地之証劉安世之駁甚明軾引此為証其失三也謂光武親誅莽亦采用元始合祭故事不當以莽為不足法然沛公親滅秦而所用皆秦法非秦法果足尚也武王受命未遑制作必有待於周公今以光武襲莽故事遂謂不當以人廢其失四也漢魏及唐誰則能復古禮者不以三代聖人為法而以漢魏唐一切苟簡之世為法其失五也又陳周禮今禮之別大意謂周禮必不可行今禮決不可改而不辨周禮之是與今禮之非其失六也謂今所行皆非周禮獨於祭地示欲從周禮為非義則是孔子應以魯季世之禮為禮而餼羊決不可復存其失七也謂古天子王畿不過千里故周禮可行後世四海為一機務之煩億萬倍于古則周禮不可行然古之帝王或盤于逰畋或不遑暇食或總攬大綱而有餘或親決庶務而不足俱在人主之自為而禮之可行不可行曾不在是軾之所言是不為也非不能也其失八也天子儀物日以滋多此後世君日尊臣日卑之陋習也不改陋習而欲改古禮其失九也郊天祭地天子嵗必親行三年一郊非禮之正今以是為國朝之禮非子孫所可輕易者何其陋耶其失十也又謂盛夏出郊官兵暴露人馬喘汗皆非夏至所能堪是盛夏之日君若臣俱當棲遲偃仰而謂敬不足行謂祭無益也其失十一也又郊有肆赦有優賞諸軍有䕃補親屬有百官賜賚既知其非禮矣而曰一年再賞力將不給分而與之人情豈不失望軾之意難于失人情而不難于改古禮抑亦異矣其失十二也至于六年一祭之議十月祭地之議禁中望祀之議説本悠謬原不足辯劉安世曰臣等所守乃先王之正禮蘇軾之議皆後世之便宜可謂得其情矣明艾南英論宋天地合祭嗚呼始為天地合祭之說者誰歟何其鄙誕而不經也天地之形雖分而同屬于隂陽之氣則合隂陽之氣天與地皆在其中其分隂分陽者一氣而已天地之氣往而伸則為陽閉而息則為隂非天專有陽地專有隂也譬之人身一呼吸之間而已非以呼者專屬之精魂以其吸者專屬之骨骸也冬日至祀天于南郊之圜丘所以迎陽氣之始也非祀天之形也一氣漸萌于黄鐘之宮地之陽氣與天俱升矣易曰復其見天地之心乎夏日至祀地于北郊之方澤所以迎隂氣之始也非祀地之形也霜露冰雪以漸而至天之隂氣亦自是始升矣天地可以形分而隂陽之氣不可以分屬天地南北郊之祭蓋分隂陽之氣而迎之非分天地而祀之也議者徒見孝經有父事天母事地之文遂有天地合祭若夫婦同牢之義而以人神禮之如是則所謂地者殆將姑嫗其貌勢必至如道家之妄于山川后土之神一切冠以天妃聖母碧霞元君之像而後已嗚呼何其鄙誕而不經歟中庸曰郊社之禮所以事上帝也並舉郊社非大社也盖指皇地祇而言以其為覆物載物之始故皆稱上帝然則南北郊之祭雖謂之皆祀天可也豈待後世紛更而配合之哉況器用陶匏牲用犢異于明堂之祭者不以人道事之而已而又為之合祭以類其配偶是以人道事天地也嗚呼何其誕歟至其最陋而不通于是南郊之壇其位次遍及于周天之宿北郊之壇及于嶽鎮海瀆丘陵墳衍是真以南北郊之祭為分祀天地之形無怪其亟亟然欲合之也有南郊而無北郊迎陽而不迎隂然則獨陽不生乾坤之策㡬乎毀矣其何以配天立極為天下神明之主乎若夫萬乘之尊不可以暴暑推恩太繁六軍望倖大裘不宜于仲夏之月以其小不便而廢先王對越天地之禮者其議乃出于宋之名臣嗚呼又何足怪也觀承案父天母地乃實理亦實事六經言之甚詳不但孝經也至王莽援之而謂夫婦同牢父母可以合食因以為合祭天地之徵則非耳前人論此已明東坡圜丘六議亦屬曲説而違經不足論也艾氏説力主分祭極是其謂冬至迎陽氣之始夏至迎隂氣之始非祀天地之形則是迎氣之祭而非所謂大報本反始矣兩郊之禮固非祀天地之形然天髙地下昭然在目不比他鬼神之有氣無形則雖不以形祀亦豈徒以氣求者且謂分隂陽之氣而迎之非分天地而祀之不適為合祭者之藉口乎王者父天母地無時無處而不然然猶虚而無迹惟郊祀之時乃盡其父事母事之實說者欲破合食之論當曰一陽始生事天於南郊以就陽位乃所謂父事天也一隂始生祭地於北郊以就隂位乃所謂母事地也若合食於南郊則亂其隂陽之位是父天而亦父地矣且廢其北郊之祭是有父而已無母矣而謂父天母地也可乎是即以父天母地之義折之而合祭之非禮已立判矣又何待別為之説哉宗元案兩郊之宜分不宜合禮經既有明文前儒又有定論其是非得失本可一言而定漢唐以下尚紛然聚訟者是未窺夫聖人制禮之精義而徒分爭於儀文器數之末牽引於箋疏紀志之文且但就兩郊分合論之而不知總郊社禘嘗而思之耳虞書秩宗典朕三禮三禮者天神地示人鬼三才之禮也聖人制禮先洞徹乎三才一貫之大源而後定為報本反始之三大祭欲合幽明上下而一之必先辨幽明上下而分之蓋人鬼則自親及尊由衆而萃於一天神地示則自尊及親由一而渙於衆故夫宗廟之禮以三為五以五為九進羣廟祧廟而合之太廟又進太廟而追所自出之一人則惟配以太祖一位而不及其餘此之謂自親以及尊而衆萃於一也於是達之天地而冬至祭天於南郊即以其太祖一人配而後分為五帝六宗百神之羣祀則漸近於人矣夏至祭地於北郊亦以其太祖一人配而後分為山川社稷百族之羣祀則漸近於人矣此之謂自尊及親而一渙於衆也而皆配以太祖之一人則三才一貫矣夫配惟一人而自出昊天后土為三大祭之主者其反容有二乎蓋禘與兩郊所以立三禮之大宗惟截然各為一祭而不相混乃為專志一心而格上下達幽明此聖人報本反始三大祭之精義也若兩郊可合則三禮已缺其一矣何以為三才立極而成位於天地之中也哉因前人論郊祀分合者皆未及此義故略推言之哲宗本紀紹聖元年五月甲寅右正言張商英言先帝謂天地合祭非古詔禮部太常詳議以聞禮志紹聖元年以右正言張商英言先帝制詳定禮文所謂合祭非古据經而正之元祐之臣乃復行合祭請再下禮官議御史中丞黄履謂南郊合祭因王莽諂事元后遂躋地位合席同牢迨先帝親郊大臣以宣仁同政復用莽意合祀瀆亂典禮帝以詢輔臣章惇曰北郊止可謂之社黄履曰郊者交於神明之義所以天地皆稱郊社者土之神爾豈有祭大祇亦可謂之社乎乃以履奏送禮部太常寺權禮部侍郎盛陶太常丞王誼等言宜用先帝北郊儀注以時躬行罷合祭禮已而三省言合祭既非禮典但盛夏祭地祇必難親行詔令兩省臺諫禮官同議可親祀北郊然後罷合祭之禮曾布錢勰范純禮韓宗師王古井亮采常安民李琮虞策劉定傅楫黄裳豐稷葉祖洽等言互有是否蔡京林希蔡卞黄履呉安持晁端彦翟思郭知章劉拯黄慶基董敦逸等請罷合祭詔從之然北郊親祀終帝之世未克舉云文獻通考紹聖元年詔罷合祭天地自今因大禮之嵗夏至之日躬祭地于北郊應緣祀事儀物及壇壝道路帷宮等宜令有司參酌詳具以聞蓋用蔡京等議然北郊親祠終帝世未克舉云宋會要紹聖元年五月右正言張商英言神宗以歴代典禮訛謬謂合天地非古也據經而正之元祐之臣乃率其私意剗蕩前美既獲權且合祭指揮于前蘇軾又發六議于後太常博士陳祥道又以昊天有成命郊祀天地之詩為合不可破之論或折祥道曰審如子言則春夏祈榖于上帝豈以夏祈而合春乎般巡守而祀四岳河海也詩曰允猶翕河豈以海岳之祀而合于河乎祥道屈無以對御史中丞黄履言昊天有成命郊祀天地詩之終篇雖不言地而用可通是以序兼言之亦猶天作祀先王先公般巡守祀四岳河海詩不言其指皆同由是推之天地不可合祀亦昭然矣後黄履林希等議請罷合祭天地自後間因大禮嵗以夏至之日親祠北郊其親祠北郊嵗更不親祠南郊蕙田案此紹聖三議也張商英黄履之言甚正然人主以親祠為難古禮亦無復可説哲宗本紀元符元年十一月甲子祀昊天上帝于圜丘赦天下禮志元符元年左司員外郎曾􅌈言周人以氣臭事神近世易之以香按何佟之議以為南郊明堂用沈香本天之質陽所宜也北郊用上和香以地于人親宜加雜馥今令文北極天皇而下皆用濕香至于衆星之位香不復設恐於義未盡于是每陛各設香又言先儒以為實柴所祀者無玉槱燎所祀者無幣今太常令式衆星皆不用幣蓋出于此然考典瑞玉人之官皆曰圭璧以祀日月星辰則實柴所祀非無玉矣槱燎無幣恐或未然至是遂命衆星隨其方色用幣樂志元符親郊五首餘同咸平凡闕者皆用舊詞降神景安六變辭同無為靡逺深厚廣圻祭神恭在弁冕衮衣粢盛豐美明徳馨輝以祥以佑非眇專祈升降乾安罍洗飲福並奏神靈擁衞景從雲隨玉色温粹天步舒遲周旋陟降皇心肅祇千靈是保百福攸宜退文舞迎武舞正安左手執籥右手秉翟進旅退旅萬舞有奕徹豆熙安陟彼郊丘大祀是承其豆孔庶其香始升上帝時歆以我齊明卒事而徹福祿來成送神景安馨遺八尊器空二簋至祀至䖍穹祇貺祉徽宗本紀建中靖國元年十一月辛未出御製南郊親祀樂章庚辰祀天地于圜丘赦天下范百禄傳是嵗郊祀議合祭天地禮官以昊天有成命為言百祿曰此三代之禮奈何復欲合祭乎成命之頌祀天祭地均歌此詩亦如春夏祈榖而歌噫嘻亦豈為一祭哉爭久不決質于帝前宰相曰百祿之言禮經也今日之用權制也陛下始郊見宜以並事天地為恭于是合祭文獻通考建中靖國元年詔初祀南郊權合祭天地于圜丘起居郎周常等以合祭為非禮曾布主其說乃詔罷合祭是嵗帝初郊十一月戊寅玉輅至景靈宮行禮畢赴太廟大雪上遣内臣問二相若大風雪不止何以出郊右相曾布奏云郊禮尚在後日雪勢暴必不久況乘輿順動理無不晴若更大雪亦須出郊必不可升壇則須于端誠殿望祭此不易之理已降御札頒告天下何可中輟左相韓忠彦欲于大慶殿望祭布不可以為若還就大慶是日却晴霽奈何議遂定中夜雪果止五更上朝享九室已見月色己夘黎明自太廟齊殿步出廟門升玉輅景色已開霽時見日色己午間至青城晚遂晴五使巡仗至玉津園夕陽滿野庚辰四鼔赴郊壇行禮天色晴明星斗粲然五鼔二府稱賀于端誠殿黎明升輦還内盛陶傳召為太常少卿議合祭天地請從先帝北郊之㫖既而合祭陶即奉行亦不復辯執也宋史樂志政和親郊三首皇帝升降乾安因山為髙爰陟其首玉趾躩如在帝左右帝謂我王予懐仁厚眷言顧之永綏九有配位酌獻大寧於穆文祖妙道九徳黙契靈心肇基王迹啟佑後人垂裕罔極合食昭薦孝思維則於皇順祖積徳累祥發源深厚不耀其光基天明命厥厚克昌是孝是享申錫無疆蕙田案建中靖國元年所製即此樂章以政和紀年稍長遂書政和耳徽宗本紀崇寧三年十一月丙申祀昊天上帝于圜丘大觀四年十一月丁夘祀昊天上帝于圜丘赦天下改明年元政和三年十一月癸未祀昊天上帝于圜丘大赦天下禮志政和三年詔有司討論壇壝之制十月禮制局言壇舊制四成一成二十丈再成十五丈三成十丈四成五丈成髙八尺一寸十有二陛陛十有二級三壝二十五步古所謂地上圜丘澤中方丘皆因地形之自然王者建國或無自然之丘則于郊擇吉土以兆壇位為壇之制當用陽數今定為壇三成一成用九九之數廣八十一丈再成用六九之數廣五十四丈三成用三九之數廣二十七丈每成髙二十七尺三成總二百七十有六乾之策也為三壝壝三十六步亦乾之策也成與壝俱三參天地之數也詔行之蕙田案乾策二百一十六七為誤字顯然每成髙二十七尺以下當有脫文蓋毎成二十七尺三成則八十一尺合九九之數其合乾策者乃陛級之數也以是年所定方壇制度參考可見政和三年議禮局上五禮新儀皇帝祀昊天上帝太史設神位版昊天上帝位于壇上北方南向席以槀秸太祖位于壇上東方南向席以蒲越天皇大帝五帝大明夜明北極九位于第一龕北斗太一帝坐五帝内坐五星十二辰河漢等内官神位五十有四于第二龕二十八宿等中官神位百五十有九于第三龕外官神位一百有六于内壝之内衆星三百有六十于内壝之外第一龕席以藁秸餘以莞席皆内向其位版之制上帝位版長三尺取參天之數厚九寸取乾元用九之數廣尺二寸取天之備數書徽號以蒼色取蒼璧之義文獻通考政和三年冬十一月癸未郊上搢大圭執元圭以道士百人執儀衞前導蔡攸為執綏官玉輅出南熏門至玉津園上忽曰玉津園東若有樓殿重複是何處也攸即奏見雲間樓殿臺閣隠隠數重既而審視皆去地數十丈頃之上又曰見人物否攸即奏若有道流童子持幡節蓋相繼而出雲間衣服眉目歴歴可識攸請付史館宰相蔡京率百僚稱賀宋史徽宗本紀政和六年九月辛卯朔詣玉清和陽宮上太上開天執符御厯含真體道昊天玉皇上帝徽號寶冊丙申赦天下十一月丁酉朝獻景靈宮戊戌享太廟己亥祀昊天上帝于圜丘赦天下宣和元年十一月乙卯祀昊天上帝于圜丘赦天下四年十一月庚午祀昊天上帝于圜丘赦天下七年十一月丙戌祀昊天上帝于圜丘赦天下輿服志政和議禮局上大裘青衣纁裏黑羔皮為領褾襈朱裳被以衮服冬至祀昊天上帝服之立冬祀黒帝立冬後祭神州地祇亦如之陸佃傳佃拜尚書右丞徽宗祀南郊有司欲飾大裘匣度用黄金多佃請易以銀徽宗曰匣必用飾耶對曰大裘尚質後世加飾焉非禮也徽宗曰然則罷之可乎數日来豐稷屢言之矣佃因贊曰陛下及此盛徳之舉也五禮通考卷十四
