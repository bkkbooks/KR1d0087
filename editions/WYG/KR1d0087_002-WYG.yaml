body:
  text: 五禮通考目録卷一百二十八嘉禮一即位改元唐虞夏商周秦漢後漢蜀漢晉卷一百二十九嘉禮二即位改元宋齊梁陳隋唐後梁後唐後晉後漢後周宋元明卷一百三十嘉禮三上尊號唐宋遼金元卷一百三十一嘉禮四朝禮天子諸侯三朝卿大夫私朝附后夫人内宮之朝附天子五門諸侯三門臺門門屏宁卷一百三十二嘉禮五朝禮朝服朝車聴朔臣將適君所臣入門君出視朝揖正位聴治退朝在朝言語之節視朝變禮夕見外朝詢事聴政卷一百三十三嘉禮六朝禮秦至隋常朝唐常朝五代常朝卷一百三十四嘉禮七朝禮宋常朝卷一百三十五嘉禮八朝禮遼常朝金常朝元常朝明常朝卷一百三十六嘉禮九朝禮秦正旦朝賀漢正旦朝賀後漢正旦朝賀魏正旦朝賀晉正旦朝賀宋正旦朝賀齊正旦朝賀梁正旦朝賀陳正旦朝賀北魏正旦朝賀北齊正旦朝賀北周正旦朝賀卷一百三十七嘉禮十朝禮隋正旦朝賀唐正旦朝賀五代正旦朝賀卷一百三十八嘉禮十一朝禮宋正旦朝賀卷一百三十九嘉禮十二朝禮遼正旦朝賀金正旦朝賀元正旦朝賀明正旦朝賀卷一百四十嘉禮十三朝禮冬至朝賀聖節朝賀卷一百四十一嘉禮十四朝禮皇后受賀皇太子受賀皇太后臨朝聴政卷一百四十二嘉禮十五尊親禮追尊尊太上皇禮上皇太后太皇太后尊號徽號禮卷一百四十三嘉禮十六飲食禮飲食通義經𫝊飲食禮漢至明飲食之禮族姓氏卷一百四十四嘉禮十七飲食禮正公族漢至明惇敘宗室卷一百四十五嘉禮十八飲食禮宗法宗子收族卷一百四十六嘉禮十九飲食禮宗子立後為後律令立後之正立後之權卷一百四十七嘉禮二十飲食禮為人後阴立後之失為後歸宗卷一百四十八嘉禮二十一冠禮儀禮士冠禮經傳天子諸侯大夫冠禮冠年告廟祭禰有喪而冠冠義卷一百四十九嘉禮二十二冠禮秦漢三國南北朝隋唐巻一百五十嘉禮二十三冠禮宋金明女子笄卷一百五十一嘉禮二十四昏禮昏大義名稱取異姓昏年昏時天子諸侯昏王姬下嫁附大夫昏卷一百五十二嘉禮二十五昏禮儀禮士昏禮卷一百五十三嘉禮二十六昏禮庶人昏昏義昏禮之變娣媵繼室媒妁卷一百五十四嘉禮二十七昏禮漢魏晉宋齊梁陳北魏北齊北周隋唐卷一百五十五嘉禮二十八昏禮宋遼金元明卷一百五十六嘉禮二十九饗燕禮饗禮饗變禮饗失禮卷一百五十七嘉禮三十饗燕禮儀禮燕禮燕義卷一百五十八嘉禮三十一饗燕禮經傳燕禮春秋饗燕卷一百五十九嘉禮三十二饗燕禮儀禮公食大夫禮經傳食禮卷一百六十嘉禮三十三饗燕禮兩漢宴饗魏晉至隋宴饗唐宴饗五代宴饗宋宴饗遼金元宴饗明宴饗卷一百六十一嘉禮三十四射禮儀禮大射儀卷一百六十二嘉禮三十五射禮儀禮鄉射禮卷一百六十三嘉禮三十六射禮射禮總論大射賓射燕射鄉射卷一百六十四嘉禮三十七射禮射雜儀射器卷一百六十五嘉禮三十八射禮投壺卷一百六十六嘉禮三十九射禮歴代射禮卷一百六十七嘉禮四十鄉飲酒禮儀禮鄉飲酒禮經傳鄉飲諸儀鄉飲酒義卷一百六十八嘉禮四十一鄉飲酒禮歴代鄉飲酒禮卷一百六十九嘉禮四十二學禮天子五學郊外小學附門闈小學鄉遂學諸侯學諸候鄉學卷一百七十嘉禮四十三學禮教學之法入學考校簡不帥教卷一百七十一嘉禮四十四學禮漢國學後漢國學魏呉國學晉國學南北朝國學隋國學唐國學後唐國學宋國學金國學元國學明國學歴代郡縣學卷一百七十二嘉禮四十五學禮天子諸侯視學歴代視學世子齒學經筵日講卷一百七十三嘉禮四十六學禮取士兩漢取士魏晉至隋取士唐取士五代取士卷一百七十四嘉禮四十七學禮宋取士卷一百七十五嘉禮四十八學禮遼金取士元取士明取士卷一百七十六嘉禮四十九學禮養老之禮優老之禮卷一百七十七嘉禮五十學禮歴代視學養老之禮歴代優老之禮卷一百七十八嘉禮五十一巡狩巡狩名義巡狩之期虞巡狩之禮周巡狩之禮卷一百七十九嘉禮五十二巡狩秦漢後漢魏晉南北朝隋唐卷一百八十嘉禮五十三巡狩宋遼金元明卷一百八十一嘉禮五十四觀象授時天行天九重天地之體北極黄極月五星恒星之極天左旋右旋卷一百八十二嘉禮五十五觀象授時黄赤道月道古今度法黄赤道經緯度黄赤道宿度周天十二宮次卷一百八十三嘉禮五十六觀象授時觀象名義上古觀象虞夏觀象殷周觀象漢以來觀象卷一百八十四嘉禮五十七觀象授時測景之法測日景求地中以定里差卷一百八十五嘉禮五十八觀象授時測中星考日躔以定嵗差致日月以正節氣漏刻星晷卷一百八十六嘉禮五十九觀象授時嵗實卷一百八十七嘉禮六十觀象授時測日行盈縮以推定氣卷一百八十八嘉禮六十一觀象授時考冬至以正氣序卷一百八十九嘉禮六十二觀象授時置閏朔實月行遲疾卷一百九十嘉禮六十三觀象授時日月交食卷一百九十一嘉禮六十四觀象授時五星卷一百九十二嘉禮六十五觀象授時恒星總論紫㣲垣太㣲垣天市垣卷一百九十三嘉禮六十六觀象授時東方蒼龍七宿北方𤣥武七宿卷一百九十四嘉禮六十七觀象授時西方白虎七宿南方朱鳥七宿卷一百九十五嘉禮六十八觀象授時推步法上卷一百九十六嘉禮六十九觀象授時推步法中卷一百九十七嘉禮七十觀象授時推步法下卷一百九十八嘉禮七十一觀象授時三正論統唐虞夏正朔商正朔周正朔秦正朔漢改正朔魏改正朔唐改正朔卷一百九十九嘉禮七十二觀象授時時令上卷二百嘉禮七十三觀象授時時令下後漢至唐讀時令卷二百一嘉禮七十四體國經野虞十二州禹貢冀兖青三州卷二百二嘉禮七十五體國經野禹貢徐揚荆三州卷二百三嘉禮七十六體國經野禹貢豫梁雍三州卷二百四嘉禮七十七體國經野禹貢隨山濬川卷二百五嘉禮七十八體國經野禹貢隨山濬川卷二百六嘉禮七十九體國經野禹貢隨山濬川卷二百七嘉禮八十體國經野商九有周職方春秋周都邑山川卷二百八嘉禮八十一體國經野春秋列國都邑山川卷二百九嘉禮八十二體國經野春秋列國都邑山川卷二百十嘉禮八十三體國經野春秋列國都邑山川附四書釋地戰國七雄卷二百十一嘉禮八十四體國經野秦漢後漢三國晉南北朝隋唐卷二百十二嘉禮八十五體國經野五代宋遼金元明卷二百十三嘉禮八十六設官分職官制總論上古官制唐虞官制夏商官制周初官制卷二百十四嘉禮八十七設官分職周禮官制上卷二百十五嘉禮八十八設官分職周禮官制下周侯國官制卷二百十六嘉禮八十九設官分職春秋官制卷二百十七嘉禮九十設官分職秦官制漢官制魏官制晉官制南北朝官制隋官制卷二百十八嘉禮九十一設官分職唐官制宋官制卷二百十九嘉禮九十二設官分職遼官制金官制元官制明官制卷二百二十賓禮一天子受諸侯朝朝覲宗遇名義朝覲之期圭璧裼襲卷二百二十一賓禮二天子受諸侯朝朝覲服冕車旗几筵玉幣擯介天子諸侯稱謂諸侯朝覲告祭在途至郊委積郊勞后勞在館送迎之節將幣貢物錫予致饔餼饗食之等朝宿之邑朝變禮朝覲失禮類見蕃國入貢朝事義卷二百二十二賓禮三覲禮儀禮覲禮卷二百二十三賓禮四天子受諸侯蕃國朝覲唐虞朝覲夏朝覲殷朝覲周兩漢魏晉至隋唐宋元明卷二百二十四賓禮五㑹同㑹同名義㑹同告祭㑹同先事戒具㑹同在路委積及市政㑹同所過供膳㑹同車旗㑹同次舍㑹同壇壝宮行禮之節㑹同牢禮㑹同賜予㑹同盟約㑹同禱祠㑹同而射諸侯來問小㑹同卷二百二十五賓禮六三恪二王後通論虞夏商周兩漢魏晉南北朝唐五代宋金元明卷二百二十六賓禮七諸侯聘於天子附蕃使朝貢聘頫名義聘頫儀節春秋諸國聘周兩漢蕃使朝貢唐蕃使朝貢宋蕃使朝貢遼蕃使朝貢金蕃使朝貢元蕃使朝貢明蕃使朝貢卷二百二十七賓禮八天子遣使諸侯國附遣使詣蕃總論天子遣使之事王命介節信幣遣使勞使周聘魯周錫命周歸脤周㑹盟周賵葬周使來過國兩漢遣使詣蕃唐遣使詣蕃宋遣使詣蕃諸遼遣使附元遣使詣蕃明遣使詣蕃卷二百二十八賓禮九諸侯相朝總論告祭聴朝館舍壇行禮之節擯介之容致禮大夫従君不私覿諸侯相朝失禮春秋諸侯相朝卷二百二十九賔禮十諸侯㑹盟遇㑹盟遇名義㑹盟遇卷二百三十賓禮十一諸侯遣使交聘儀禮聘禮卷二百三十一賓禮十二諸侯遣使交聘聘問名義行禮之節圭幣聘使稱謂主國待賔聘使之容賓出入公門賓介見主君禮賓及牢禮之等聘變禮春秋交聘卷二百三十二賓禮十三士相見禮儀禮士相見禮經傳相見禮列代相見禮贄卷二百三十三軍禮一軍制軍禮之綱出軍之制上卷二百三十四軍禮二軍制出軍之制中出軍之制下卷二百三十五軍禮三軍制邦國軍制春秋邦國軍制之變卷二百三十六軍禮四軍制秦軍制漢軍制晉軍制周隋軍制唐軍制宋軍制金軍制元軍制明軍制卷二百三十七軍禮五出師師名義出師時令親征諸侯専征類上帝宜社造廟禡附祭旗纛受命于祖受成于學卷二百三十八軍禮六出師命將告廟軷祭所過山川誓師勞師卷二百三十九軍禮七出師軍中職事營陣行列車輅旌旗兵器軍容坐作進退擊刺之節軍中刑賞軍中之祭致師用師名目凱旋告祭獻俘獻捷受降飲至論功行賞師不功遣戍卷二百四十軍禮八校閲校閲漢三國晉南北朝隋唐五代宋遼金元明卷二百四十一軍禮九車戰舟師車戰攻城之車春秋車戰漢至宋車戰春秋舟師漢至明舟師卷二百四十二軍禮十田獵田獵名義田獵時令田獵官司戒具田獵徴發政令田獵祭祀春蒐夏苗秋獮冬狩頒禽供祭諸侯從天子田獵諸侯田獵大夫田獵田獵取物之仁經傳田獵之事卷二百四十三軍禮十一田獵漢三國南北朝隋唐五代宋遼金元明火田附卷二百四十四軍禮十二馬政辨馬之名物經傳馬政秦漢南北朝隋唐五代卷二百四十五軍禮十三馬政宋遼金元明卷二百四十六凶禮一荒禮荒禮通論備荒之政檢勘災傷遣使存恤卷二百四十七凶禮二荒禮散利上卷二百四十八凶禮三荒禮散利下卷二百四十九凶禮四荒禮薄征緩刑弛力舍禁去㡬眚禮殺哀蕃樂多昏卷二百五十凶禮五荒禮索鬼神除盜賊勸分移民通財統論荒政卷二百五十一凶禮六札禮恤禮烖禮唁禮禬禮禮問疾札禮經傳烖禮經傳弔烖禮救日月伐鼓禬禮恤禮唁禮問疾禮卷二百五十二凶禮七喪禮儀禮喪服斬衰三年卷二百五十三凶禮八喪禮儀禮喪服齊衰三年齊衰杖期卷二百五十四凶禮九喪禮儀禮喪服齊衰不杖期卷二百五十五凶禮十喪禮儀禮喪服齊衰無受卷二百五十六凶禮十一喪禮儀禮喪服大功九月卷二百五十七凶禮十二喪禮儀禮喪服繐衰葬除之小功五月殤小功五月卷二百五十八凶禮十三喪禮儀禮喪服緦麻三月卷二百五十九凶禮十四喪禮儀禮喪服記卷二百六十凶禮十五喪禮儀禮士喪禮卷二百六十一凶禮十六喪禮儀禮既夕禮卷二百六十二凶禮十七喪禮儀禮士虞禮臣等謹案五禮通考二百六十二卷國朝秦蕙田撰蕙田字樹峯金匱人乾隆丙辰進士第三官至刑部尚書諡文恭是書因徐乾學讀禮通考惟詳喪𦵏一門而周官大宗伯所列五禮之目古經散亡鮮能窮端竟委乃因徐氏體例網羅衆説以成一書凡為門類七十有五以樂律附於吉禮宗廟制度之後以天文推步勾股割圓立觀象授時一題統之以古今州國都邑山川地名立體國經野一題統之並載入嘉禮雖事屬旁涉非五禮所應該不免有炫􅀶之意然周代六官總名曰禮禮之用精粗條貫所賅本博故朱子儀禮經傳通解於學禮載鍾律詩樂又欲取許氏説文解字序説及九章筭經為書數篇而未成則蕙田之以類纂附尚不為無據其他考證經史原原本本具有經緯非剽竊餖飣挂一漏萬者可比較陳祥道所作過之逺矣乾隆四十三年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
