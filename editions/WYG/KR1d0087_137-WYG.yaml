body:
  text: 五禮通考卷一百二十七刑部尚書秦蕙田撰吉禮一百二十七享先火周禮夏官司爟凡祭祀則祭爟注報其為明之功禮如祭㸑疏禮如祭㸑者祭㸑祭老婦也則此祭爟謂祭先出火之人髙氏愈曰舉火曰爟又火神之名也謂祝融回祿或謂始鑚燧出火者凡民非火不活故祭而報其功先王於有功之人未嘗忘報如先蠶先農先卜皆有祭而况鑚本出火以教人者乎右享先火享先炊禮記禮器孔子曰臧文仲焉知禮燔柴於奥夫奥者老婦之祭也盛於盆尊於瓶注奥當為㸑字之誤也或作竈禮尸卒食而祭饎㸑饔㸑也時人以為祭火神乃燔柴老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴似失之䟽老婦之祭故知非奥奥者夏祀竈神其禮尊以老婦配之耳故中霤禮祭竈先薦於奥有主有尸用特牲迎尸以下畧如祭宗廟之禮是其事大也㸑者宗廟祭祀尸卒食之後特祭老婦盛於盆尊於瓶是其事小也特牲記注舊說云宗婦祭饎㸑亨人祭饔㸑用黍肉而巳無籩豆爼右享先炊享先卜周禮春官龜人上春釁龜祭祀先卜注先卜始用卜筮者言祭言祀尊焉天地之也世本曰巫咸作卜筮未聞其人也焉䟽先卜是人應曰享而云祭祀與天地同稱故云尊天地之也易所作即伏羲為之但未有揲蓍之法至巫咸乃教人為之故巫咸得作筮之名未聞其源世本又不言其人故云未聞其人也髙氏愈曰祭祀先卜祭字疑羡文先卜始為卜筮者用其術而因祀之不敢忘本也右享先卜享先醫蕙田案三皇之祭唐宋以来有之元始定為先醫明仍之元史祭祀志元貞元年初命郡縣通祀三皇如宣聖釋奠禮太皥伏羲氏以勾芒氏之神配炎帝神農氏以祝融氏之神配軒轅黄帝氏以風后氏力牧氏之神配黄帝臣俞跗以下十人姓名載於醫書者從祀兩廡有司歲春秋二季行事而以醫師主之王圻續通考成宗元貞間建三皇廟在明照坊内有三皇并歴代名醫像東有神機堂内置銅人鍼灸圖二十有四明史禮志三皇明初仍元制以三月三日九月九日通祀三皇洪武元年令以太牢祀二年命以勾芒祝融風后力牧左右配俞跗桐君僦貸季少師雷公鬼㬰區伯髙岐伯少俞髙陽十大名醫從祀儀同釋奠四年帝以天下郡邑通祀三皇為凟禮臣議唐𤣥宗嘗立三皇五帝廟於京師至元成宗時乃立三皇廟於府州縣春秋通祀而以醫藥主之甚非禮也帝曰三皇繼天立極開萬世教化之源汨於藥師可乎命天下郡縣毋得䙝祀正徳十一年立伏羲氏廟於秦州秦州古成紀地從廵按御史馮時雄奏也明㑹典嘉靖十五年建聖濟殿於文華殿後以祀先醫歲用羊一豕一鉶二簠簋各二籩豆各八帛一遣太醫院正官行禮二十一年又建景恵殿於太醫院上祀三皇配以勾芒祝融風后力牧而附歴代醫師於兩廡凡二十八人嵗遣禮部堂上官一員行禮太醫院堂上官二員分獻二殿之祭並以春秋二仲上甲日一陳設殿中正壇犢一羊一豕一登二鉶二籩豆各十簠簋各二爵三酒尊一帛一篚一祝案一東配位一壇羊一豕一鉶一籩豆各十簠簋各一爵六帛一篚一西配位一壇陳設同東廡醫師十四位分設三壇僦貸季天師岐伯伯髙鬼臾區俞跗少俞少師桐君太乙雷公馬師皇伊尹神應王扁鵲倉公淳于意張機每壇豕一析為三壇籩豆各六簠簋各一酒盞五爵三帛一篚一西廡醫師十四位華陀王叔和皇甫謐抱朴子葛洪巢元方真人孫思邈藥王韋慈藏唘元子王氷錢乙朱肱李杲劉完素張元素朱彦修陳設同一正祭賛引對引導遣官至咸濟門賛詣盥洗所賛搢笏洗訖賛出笏典儀唱執事官各司其事贊引贊就位典儀唱迎神贊四拜贊引贊陞壇導遣官至中香案前贊跪贊搢笏贊上香贊引引至東香案前贊跪上香訖引至西香案前贊跪上香訖贊出笏贊復位太醫院堂上官於兩配位香案前上香訖典儀唱奠帛行初獻禮贊引贊陞壇引至神位前贊搢笏贊獻帛贊三獻爵獻訖贊出笏贊詣讀祝位贊跪贊讀祝讀訖贊俯伏興平身贊復位兩配位執事自獻兩廡儀同殿典儀唱亞獻禮終獻禮儀同初獻惟不獻帛不讀祝典儀唱徹􅄿執事徹訖典儀唱送神贊引贊四拜典儀唱讀祝官捧祝掌祭官捧帛􅄿各詣燎位贊引贊禮畢春明夢餘錄嘉靖二十一年以太醫院廟制湫隘弗稱命展拓今廟随從禮官議增從祀僦貸季等二十八人隆慶四年禮部侍郎王希烈議三皇既祀於帝王廟請罷太醫院廟祭専遣太醫院官祭先醫不允明闕名改建太醫院廟制奏議葢聞上古聖人繼天立極開物成務壽世福民其功尤繫於醫伏羲觀天象明歴氣神農嘗百藥制本草黄帝與岐伯問答而有素問之書醫道葢昉於此矣周禮小宗伯兆五帝於四郊說者謂祭以天帝配食以五人帝春以太昊夏以炎帝季夏以黄帝然此主於五方之位未有醫之専祀也至於元自國都以至郡縣皆立三皇廟於醫者之學如宣聖釋奠禮太昊伏羲氏以勾芒氏之神配炎帝神農氏以祝融氏之神配黄帝軒轅氏以風后力牧氏之神配及黄帝臣俞跗以下十人姓氏載於醫書者從祀兩廡有司歲春秋二季行事而以醫師主之其臣虞集有言三聖人之所以惠利生人者不必以醫之一技而求夫爲醫之道不上達於三聖人則不足以盡其至聖之能事是其祭雖専為醫而設然徧於郡縣則又不免失之凟矣肆我成祖御宇諏經稽典正名定祀尤以醫道闗係民生至重乃即太醫院立廟以崇祀三皇正統間加修葺聖祖神宗先後一揆咸欲躋斯世斯人於仁壽之域而永貽燕翼之令圖也洪惟皇上創矩以盡度備物以章䖍臣等切惟廟必有制祀必合法不為畫一之制則恐襲前人之故轍而無以稱觀瞻不正從祀之名則恐失醫聖之心𫝊而無以垂法守臣等将合行䂓制恭擬上進伏乞裁定施行右享先醫祭厲蕙田案厲祭列於七祀見於祭法聖人知鬼神之情状而神道設教於無窮也記曰人死歸復於土其氣發揚於上為昭明焄蒿悽愴此百物之精也子産曰鬼有所歸乃不爲厲人生始化曰魄既生魄陽曰魂用物精多則魂魄强匹夫匹婦强死其魂魄猶能依於人以為淫厲帝王治天下建宗伯秩三禮俾神人上下無一不治且和雖鬼之不得其所者亦惻然有所不􅃘而思以慰之俾有血食以安其類其義固深且逺矣周人附於七祀之列漢立五祀而鄭氏注漢時民家皆秋祀厲則固未嘗廢也唐開元制七祀宋仍之逮明初仍立五祀而另立祭厲之禮上自國都下至州縣里社並得祀焉至於今不廢固祀典之正而非􅁋祠之比也今畧附見五祀門内考其原流列諸吉禮之末亦可見聖人制作之精意云禮記祭法王為羣姓立七祀曰泰厲諸侯為國立五祀曰公厲大夫立三祀曰族厲注厲主殺伐士喪禮曰疾病禱於五祀司命與厲其時不著今時民家或春秋祠司命行神山神門户竈在旁是必春祠司命秋祀厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎春秋傳曰鬼有所歸乃不為厲䟽曰泰厲者謂古帝王無後者也此鬼無所依歸好為民作禍故祀之也曰公厲者謂古諸侯無後者諸侯稱公其鬼為厲故曰公厲曰族厲者謂古大夫無後者鬼也族衆也大夫衆多其鬼無後者衆故言族厲士喪禮曰疾病禱於五祀者證士亦有五祀云司命與厲其時不著者以其餘五祀月令所祀皆著其時唯司命與厲祀時不顯著云今時民家或春秋祠司命行神山神門户竈在旁者鄭以無文故引今漢時民家或有春秋二時祠司命行神山神也民或然故云或也其祀此司命行神山神之時門戸竈三神在諸神之旁列位而祭也云是必春祠司命秋祠厲也者漢時既春秋俱祠司命與山神則是周時必應春祠司命司命主長養故祠在春厲主殺害故祠在秋云或者合而祠之者鄭又疑之以見漢時司命與山神春秋合祭故云或者合而祠之云山即厲也者以漢時祭司命行神山神門户竈等此經亦有司命門行户竈等漢時有山而無厲此有厲而無山故云山即厲也云民惡言厲巫祝以厲山為之者鄭解厲稱山之意漢時人民嫌惡厲漢時巫祝之人意以厲神是厲山氏之鬼為之故云厲山云謬乎者謂巫祝以厲為厲山之鬼於理謬乎所以為謬者鬼之無後於是為厲厲山氏有子曰柱世祀厲山之神何得其鬼為厲故云謬也引春秋傳者昭七年左傳文於時鄭良霄被殺而死其鬼為厲子産立良霄之子良止為後子太叔問其故子産曰鬼有所歸乃不為厲引之者證厲山氏既有所歸不得為厲蕙田案厲字義與和字相反泰大也天子主天下凡天下之大其厲皆當祀之曰泰厲諸侯主一國凡一國之無主者皆公厲也公與私對大夫主一家凡一家之無祀者皆族厲也族同姓之謂康成以公厲為諸侯之無後者諸侯稱公為公厲族厲為大夫之無後者大夫衆多故曰族厲非唯理義拘礙隘而不宏而王之泰厲又將何以訓之明集禮祭厲文得之矣春秋昭公七年左氏傳鄭子產聘於晉晉侯有疾韓宣子逆客私焉曰寡君寝疾於今三月矣並走羣望有加而無瘳今夣黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀於羽山其神化為黄熊以入於羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎鄭人相驚以伯有曰伯有至矣則皆走不知所往注襄三十年鄭人殺伯有言其鬼至鑄刑書之歲二月注在前年或夢伯有介而行注介甲也曰壬子余將殺帶也明年壬寅余又将殺段也及壬子駟帶卒國人益懼齊燕平之月注此年正月壬寅公孫段卒國人愈懼其明月子産立公孫洩及良止以撫之乃止注公孫洩子孔之子也襄十九年鄭殺子孔良止伯有子也立以為大夫使有宗廟子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也太叔曰公孫洩何爲注子孔不為厲問何故復立洩子産曰説也為身無義而圖說注伯有無義以妖鬼故立之恐惑民并立洩使若自以大義存誅絶之後者以解説民心從政有所反之以取媚也注民不可使知之故治政者或當反道以求媚於民也䟽反之者謂反正道也媚愛也從其政事治國家者有所反於正道以取民愛也反正道者子孔誅絶於道理不合立公孫洩今既立良止恐民以鬼神為惑故反違正道兼立公孫洩以取媚於民令民不惑也叚與帶之卒自當命盡而終耳未必良霄所能殺也但良霄為厲因此恐民民心不安義須止遏故立祀山厲所以安下民也何休膏肓難此言孔子不語怪力亂神以鬼神為政必惑衆故不言也今左氏以此令後世信其然廢仁義而祈福於鬼神此大亂之道也子産雖立良止以託繼絶此以鬼賞罰要不免於惑衆豈當述之以示季末鄭𤣥答之曰伯有惡人也其鬼為厲鬼厲者陰陽之氣相乘不和之名尚書五行𫝊六厲是也人死體魄則降魂氣在上有尚徳者附和氣而興利孟夏之月令雩祀百辟卿士有益於民者由此也為厲者因害氣而施災故謂之厲鬼月令民多厲疾五行傳有禦六厲之禮禮天子立七祀有大厲諸侯立五祀有國厲欲以安鬼神弭其害也子産立良止使祀伯有以弭害乃禮與洪範之事也子所不語怪力亂神謂虚陳靈象於今無騐也伯有為厲鬼著明若此而何不語乎子産固為衆愚将惑故并立公孫洩云從政者有所反之以取媚也孔子曰民可使由之不可使知之子産達於此也不媚不信注説而後信之不信民不從也及子産適晉趙景子問焉曰伯有猶能爲鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄强是以有精爽至於神明匹夫匹婦强死其魂魄猶能慿依於人以為􅁋厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而强死能為鬼不亦宜乎蕙田案左氏兩條可證明厲字之義右古祭厲通典後漢人家祀山神門户注山即厲也唐開元中祭七祀門厲以秋文獻通考宋制七祀秋祀厲明史禮志泰厲壇祭無祀鬼神春秋傳曰鬼有所歸乃不為厲此其義也祭法王祭泰厲諸侯祭公厲大夫祭族厲鄭注謂漢時民間皆秋祠厲則此祠達於上下矣然後世皆不舉行洪武三年定制京都祭泰厲設壇元武湖中嵗以清明及十月朔日遣官致祭前期七日檄京都城隍祭日設京省城隍神位於壇上無祀鬼神等位於壇下之東西羊三豕三飯米三石王國祭國厲府州祭郡厲縣祭邑厲皆設壇城北一年二祭如亰師里社則祭鄉厲後定郡邑厲鄉厲皆以清明日七月十五日十月朔日大明集禮古者七祀於前代帝王諸侯卿大夫之無後者皆致其祭後世以爲渉於􅁋諂非禮之正遂不舉行而此等無依之厲乃或依附土木為民禍福以邀祀享者葢無足怪國朝於亰都則祭泰厲於王國則祭國厲於各府州縣則祭郡邑厲於里社則祭鄉厲而於天下之􅁋祀一切屏除使厲之無所歸依者不失祭享其爲民除害之意可謂至矣祭日泰厲國厲郡邑厲皆一年二祭春以三月清明日冬以十月初一日鄉厲則一年三祭春以清明後三日秋以七月十五日冬以十月三日祭所亰都壇在元武湖中其各府州縣則皆設壇於城北其縣里長則又各自立一祭壇祭物凡祭用少牢羊三豕三飯米三石祭儀凡祭前期移文告於亰都城隍京都七日前告各府州縣三日前告其各府州縣則随其地而易之曰某處城隍正祭日設城隍神位及天下城隍神位於壇上其各府州縣則獨設某處城隍於壇上之正東設無祀神鬼等衆位於壇下之東西祭泰厲文維某年某月某日中書省某官欽奉聖㫖謹備牲醴羮飯致祭於天下無祀神鬼等衆有制諭爾爾其恭聽皇帝制曰普天之下后土之上無不有人無不有鬼神人鬼之道幽明雖殊其理則一故天下之廣兆民之衆必立君以主之君總其大又設官分職於府州縣以各長之各府州縣又於每一百戸内設一里長以統領之上下之職綱紀不紊此治人之法如此天子祭天地神祗及天下山川王國各府州縣祭境内山川及祀典神祗庶民祭其祖先及里社土榖之神上下之禮各有等第此事神之道如此尚念㝠㝠之中無祀神鬼昔為生民未知何故而殁其間有遭兵刃而横傷者有死於水火盗賊者有被人取財而逼死者有被人强奪妻妾而死者有遭刑禍而負屈死者有天災流行而疫死者有為猛獸毒蟲所害者有為饑餓凍死者有因戰鬭而殞身者有因危急而自縊者有因牆屋傾頽而壓死者有死後無子孫者此等鬼魂或終於前代或殁於近世或兵戈擾攘流移於他鄉或人烟斷絶久缺其祭祀姓名泯沒於一時祀典無聞而不載此等孤魂死無所依精魄未散結為陰靈或倚草附木或作為妖怪悲號於星月之下呻吟於風雨之時凡遇人間節令心思陽世魂杳杳以無歸身墮沉淪意懸懸而望祭興言及此憐其慘悽巳𠡠天下有司依時享祭在王國有國厲之祭在各府州有郡厲之祭在各縣有邑厲之祭在一里又有鄉厲之祭期於神依人而血食人敬神而知禮猶慮四海之廣未能徧及今遇三月清明日十月初一日特設壇於元武湖中遣官致備牲醴普祭天下鬼魂等衆先期已告京都城隍移文徧歴所在招集汝等鬼靈於今日悉赴此壇普享一祭城隍在此鑒察爾等或生於良善或素為兇頑善惡之報神必無私汝等既享之後聽命於城隍各安其分告城隍文中書省為祭天下無祀神鬼等衆事欽奉聖㫖云云猶慮四海之廣未能徧及特於亰城之北元武湖中設壇遣官普祭天下無祀神鬼等衆然幽明異境人力難為必資神力庶得感通故命移文於神先期分遣諸将徧歴所在召集鬼靈等衆於是日悉赴壇所普享一祭至日請神鎮控壇場鑒諸鬼等類其中果有生為良善誤遭刑禍死於無辜者神當達於所司使之還生中國来享太平之福如有素為凶頑身死刑憲雖獲善終亦出僥倖者神當達於所司屏之四裔善惡之報神必無私永垂昭格欽此除欽遵外合行移咨請照欽依施行各府祭郡厲文州縣倣此維某年月日某府官某遵承禮部符文為祭祀本府闔境無祀神鬼等衆事該欽奉皇帝聖㫖云云欽奉如此今某等不敢有違謹設於城北以三月清明日十月初一日置備牲醴羮飯専祭本府闔境無祀神鬼等衆靈其不昧來享此祭凡我一府境内人民倘有忤逆不孝不敬六親者有姦盗詐偽不畏公法者有拗曲作直欺壓良善者有􅝔避差徭靠損貧戸者似此頑惡奸邪不良之徒神必報於城隍發露其事使遭官府輕則笞决杖斷不得號為良民重則徒流絞斬不得生還鄉里若事未發露必遭陰譴使舉家並染瘟疫六畜田蠶不利如有孝順父母和睦親族畏懼官府遵守禮法不作非違良善正直之人神必達之城隍陰加䕶佑使其家道安和農事順序父母妻子保守鄉里我等闔府官吏人等如有上欺朝廷下枉良善貪財作弊蠧政害民者靈必無私一體昭報如此則鬼神有鑒察之明官府非諂諛之祭尚享祭告城隍文某府遵承禮部符文爲祭祀本府無祀神鬼事該欽奉聖㫖云云欽奉如此今某等不敢有違謹於年月日於城北設壇致備牲酒羮飯享祭本府無祀神鬼等衆然幽明異境人力難為必資神力庶得感通今特移文於神先期分遣諸將召集本府闔境鬼靈等衆至日悉赴壇所普享一祭神當欽承𠡠命鎮控壇場鑒察善惡無私昭報為此合行移牒請照騐欽依施行祭鄉厲文某縣某鄉某村某里某社里長某人承本縣官裁㫖該欽奉皇帝聖㫖云云欽奉如此今某等不敢有違謹設壇於本里以三月日謂清明後三日七月十五日十月初三日率領某人等百家聨名於此置備羮飯肴物専祭爾等本里神鬼靈其不昧依期来享凡我一里之中百家之内倘有忤逆不孝不敬六親者有姦盗詐偽不畏公法者有拗曲作直欺壓良善者有􅝔避差徭靠損貧戸者似此頑惡奸邪不良之徒神必報於城隍發露其事使遭官府輕則笞决杖斷不得號為良民重則徒流絞斬不得生還鄉里若事未發露必遭隂譴使舉家並染瘟疫六畜田蠶不利如有孝順父母和睦親族畏懼官府遵守禮法不作非違良善正直之人神必達之城隍陰加䕶佑使其家道安和農事順序父母妻子保守鄉里如此則鬼神有鑒察之明我民無諂諛之祭靈其無私永垂昭格尚享告祭城隍文某府某縣某鄉某村某里里長某人率領本里人民某人等聨名謹具状告於本縣城隍之神今来某等承奉縣官裁㫖遵依上司所行為祭祀本鄉無祀神鬼事該欽奉聖㫖云云欽奉如此今某等不敢有違欽依於年月日就本里設壇謹備羮飯肴物享祭於本鄉無祀神鬼等衆然幽明異境人力難為必資神力庶得感通今特䖍告於神先期分遣諸将徧歴所在招集本里鬼靈等衆至日悉赴壇所受祭神當欽承𠡠命鎮控壇場鑒察善惡無私昭報為此謹用状告本縣城隍之神俯垂昭鑒謹状蕙田案觀集禮所載明太祖祭厲及告城隍文知其用意深逺何也其於厲也既憫之憐之又令其聽命於城隍各安其分其於城隍也又分别善惡以區處之憫之仁也區處之義也其於府州縣也不特憫之區處之反令伺察生人之善惡以告於神是併有所以用之俾聞之者知虚㝠之中昭佈森列赫然有以動其謹畏之心舉一小祀而䂓模條理精密如此祀典之所係豈不鉅哉右歴代祭厲五禮通考卷一百二十七
