body:
  text: 五禮通考卷二百三十五刑部尚書秦蕙田撰軍禮三軍制周禮夏官大司馬凡制軍大國三軍次國二軍小國一軍注鄭司農云春秋傳有大國次國小國又曰成國半天子之軍周為六軍諸侯之大者三軍可也疏此大國次國小國者皆以命數同者軍數亦同則上公為大國侯伯為次國子男為小國也大國次國小國春秋正文成三年冬十一月晋侯使荀庚來聘衞侯使孫良夫來聘公問臧宣叔曰中行伯之于晋其位在三孫子之于衞位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晋不得為次國晋為盟主其將先之葢指此為大國次國也春秋襄公十四年左傳疏夏官大國三軍云云當以公侯為大國伯為次國子男為小國也諸侯五等惟有三等之命伯之命數可以同於侯其軍則計地大小故伯國之軍不得悉同於侯蕙田案王制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命康成雖以為殷制亦兼夏及引周禮釋之然則大國者專指公而言春秋正義以公侯皆為大國與賈疏二説不同宜從賈説惟魯侯爵而得有千乘與他國異觀承案因地出車因車成軍公侯皆方百里伯七十里子男五十里武成分土惟三之舊制也則以公侯為大國而出三軍伯為次國子男為小國而出二軍一軍者為宜若只以公為大國則周制惟有虞虢及宋為公爵而齊魯晉衞皆止侯爵皆不得為大國是侯國之得備三軍者絶少矣豈其然乎春秋襄公十一年榖梁傳古者天子六師諸侯一軍注周禮司馬法曰萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍其將皆命卿二千五百人為師然則此言天子六師凡萬有五千人大國三軍則三萬七千五百人諸侯制踰天子非義也總云諸侯一軍又非制也蕙田案榖梁傳與周禮不合范甯駁之極是陳氏禮書榖梁傳云古者天子六師諸侯一軍啖助云天子六軍大國三之一小國半大國數不必常所以示稱其制與周禮不合是臆説耳蕙田案大國三軍凡三萬七千五百人車五百乘次國二軍凡二萬五千人車三百三十三乘餘二十五人小國一軍凡一萬二千五百人車一百六十六乘餘六十二人十之五此皆邦國常征之所用其畸零不滿一乘者葢險野徒為主易野車為主古有徒兵不盡為車抑或以鄉之所出與境内所出通融配合如孔氏所云元科之兵不必定屬本車者耶考之説文軍從車從包是知軍以車成當以後説為正春秋襄公十四年左氏傳成國不過半天子之軍薛氏衡曰一封出車千乘以杜氏法積算十同千乘當有戎馬四千匹牛一萬二千頭甲士三千人歩卒七萬二千人合士卒之數可以為六軍然而大國不過三軍其有六軍者猶天子六鄉六遂迭用之耳陳氏禮書記曰制國千乘語曰道千乘之國然賦雖至於千乘而兵不過三軍三軍則五百乘而已葢五百乘三鄉之所出也千乘闔境之所出也蕙田案此條剖晰邦國常征盡發二法極為明了知此則包咸之妄可破魯頌兩言之疑亦可決矣唐氏仲友曰學者見司徒建邦國封疆與武成分土之等孟子頒禄之制不合因謂周禮非周公之制為周禮者又强為之説曰周九州之男方七千里周公變商湯之制雖小國地皆方百里是皆未深考之耳費誓曰魯人三郊三遂左氏曰成國不過半天子之軍諸侯之大者三軍可也然則大國三軍出于三郊三遂副之周制然矣牧誓曰武王戎車三百兩虎賁三千人御事司徒司馬司空然則大國三軍三卿為之帥一軍之戎車百二十五乘商制然矣商周諸侯之軍制既同分土之制安得而異周之九服即禹之五服烏覩所謂七千里者周公相武王滅國者五十而所立七十一國分土之制遽過于商大者二十四倍小者猶三倍何所容之後儒不能通則曰是兼附庸誠是也抑不思百里之提封萬井三分去一為六萬夫之地悉以家一人率之為兵六萬尚不足三郊三遂七萬五千人之數為車六百乘亦不足千乘之數所謂園㕓宅田士田賈田官田賞田牛田牧田與卿大夫公子弟之采邑于何容之家既役其一人百畝又征其什一它無餘地車輦馬牛干戈之屬于何出之百畆之分以中農計之足食七人什取其一則十夫而食七人古庶人在官次第之禄也六萬夫之税足當中農夫六千人而已三鄉之吏九千四百六十人于何給之尚未足食鄉遂之吏與其百官之衆府史胥徒之禄宗廟朝廷之禮王國之朝貢四鄰之邦交于何取用也百里之地不足為公侯之國明甚况七十里止二萬九千四百夫之地五十里止一萬五千夫之地其不能為諸侯之國抑又明矣然則子産孟子之言非歟曰二子何可非也抑古人之為言省文而互見詳而攷之未有不合者古之為國有軍有賦王六軍大國三軍次國二軍小國一軍此軍也出于國之郊者也天子萬乘諸侯千乘此賦也出于成國者也自軍言之則方百里而具三軍方七十里而具二軍方五十里而具一軍推而上之方二百里而具六軍自賦言之則方千里而具萬乘二百一十里而具千乘通軍與賦而言之則方千里者為兵車萬九百乘推而下之方百里者為方五十里者四五十里具一軍又五十里者為一遂合為兵車二百五十乘餘方五十里者一定出賦五十乘軍賦合三百乘男之國也由是推而上之七十里而具二軍又七十里而具二遂略當一同合為兵車五百乘加一同定出賦百乘軍賦合六百乘伯之國也百里而具三軍又百里而具三遂合為兵軍七百五十乘加二同有半定出賦二百五十乘軍賦合千乘公之國也伯二同則方百四十一里公同有半則方二百一十一里子下同于男侯上同于公是謂分土唯三自是而外則附庸也山川也土田也雖未必皆其所有皆在封疆之内矣今夫顓臾昔者先王以為東蒙主且在邦域之中矣此附庸在封疆之證也居常與許復周公之宇此土田在封疆之證也奄有龜蒙遂荒大東奄有鳬繹遂荒徐宅此山川在封疆之證也封疆之内附庸山川土田皆在焉然皆非出軍制賦之壤故地方七百里而止于革車于乘則舉封疆而言雖七百里猶可而况五百里四百里三百里二百里百里乎故于天子言千里者兼軍賦而言於諸侯言百里七十里五十里者獨舉軍制而言也于天子言萬乘者以賦法通率也于諸侯言千乘者兼軍賦而言之也于諸公言五百里諸侯言四百里伯言三百里子言二百里包山川土田附庸于封疆也于諸侯男言百里者獨指其出軍賦之封疆也凡此者皆省文而互見若異而相通何嘗纎毫牴牾哉且先王之于諸侯豈其封疆一定而遂無所勸懲乎慶而益責而削皆在封疆之中矣此周公之定制而成王廣魯以七百里則康周公云爾非周公之制所得而拘也于齊有賜履焉于衛有封畛土略焉于韓侯有奄受北國焉山川土田附庸或得其全或得其偏皆封疆之數也與武成孟子之言葢相表裏矣蕙田案唐氏以百里不足爲公侯之封其説甚確其餘皆以意立説無所據依萬井之田而云為兵六萬與井牧不合其謬一也載師九等田去其二存其七以畿内為邦國之制其謬二也天子逺郊百里公逺郊五十里侯伯三十里子男十里三鄉二鄉一鄉在焉三軍二軍一軍出焉三軍三萬七千五百人計五百乘二軍二萬五千人計三百三十三乘餘二十五人一軍萬二千五百人計一百六十六乘餘六十二人十之五然則百里者天子六軍之所出而以為大國三軍之所出其謬三也又推而上之方二百里而具六軍不知方二百里則十二軍矣其謬四也大國地共不過五百里而以百里爲郊次國七十里為郊小國五十里為郊與鄭釋聘禮全不合其謬五也千里之中而出萬乘經有明文天子逺郊百里之内六軍千乘注有確據今改爲二百一十里出千乘千里出一萬九百乘何所據乎其謬六也詩大雅公劉其軍三單度其隰原徹田爲糧傳三單相襲也箋邰后稷上公之封大國之制三軍以其餘卒為羡今公劉遷于豳民始從之丁夫適滿三軍之數單者無羡卒也稷疏知后稷上公之封者公羊傳曰王者之後稱公后本是三王之後以有大功而改封于邰明為大國公爵公劉是其曾孫耳故知仍為大國當作三軍地官小司徒云凡起徒役無過家一人以其餘為羡羡謂家之副丁也今言其軍三單則是单而無副故知公劉遷豳民始從之其衆未多丁夫適滿三單之數無復羡卒故稱單也以周禮言之三軍三萬七千五百人然則從公劉之遷其家不滿此數故通取羡卒始滿三軍也大國三軍亦是周制而謂公劉之時已作三軍者以三代損益事多相因甘誓云大戰于甘乃召六卿王曰嗟六事之人是夏時天子六軍之將皆命卿其法與周同也于時大國亦立三卿則知亦作三軍而周制因之耳夏殷大國百里周則大國五百里大小懸絶而軍數得同者周之軍賦皆出于鄉家出一人故鄉為一軍諸侯三軍出其三鄉而已其餘公邑采地不以為軍若夏殷之世則通計一國之人以為軍數故此言丁夫適滿三軍是通一國之人總計之大國百里為方一里者萬為田九萬夫田有不易一易再易通率二而當一半之得四萬五千家以三萬七千五百家為三軍尚餘七千五百舉大數故得為三軍也次國七十里為方一里者四千九百為田四萬四千一百半之得二萬二千五十家二軍當用二萬五千二千九百五十人以羡卒充之舉大數亦得為二軍也小國五十里為方一里者二千五百為田二萬二千五百夫半之得一萬一千二百五十家以萬二千五百人為軍少一千二百五十人不滿一軍舉大數亦得為一軍也如此計之夏殷國地雖狹亦得為三軍矣蕙田案大國地方百里見於王制康成因其與周制不合觧爲夏殷之制此亦臆説於經初無明證孔頴達依此因謂周大國三軍出於三鄉夏殷大國三軍出於一國但出賦之法重於近輕於逺三代宜皆同此如孔言則是夏殷之賦比周獨重也况大國不過百里但用二而當一算之竟無三分去一於法尤屬不合又其中或有應以六家受十三夫者或有應除去三十六存六十四者其治洫治澮亦當除去穎達之説殊不能通竊以夏殷之大國其地百里其賦三軍二者必有一謬必欲從鄭則未免强為之說矣棫樸周王于邁六師及之傳天子六軍也箋周王往行謂出兵征伐二千五百人為師今王興師行者殷末之制未有周禮五師為軍軍萬二千五百人疏二千五百人為師夏官序官文禮天子六軍諸侯大國三軍今周王不以軍而興師行者殷末之制未有周禮故也若如周禮夏官序則五師為軍軍萬二千五百人也鄭之此言未是定説鄭志趙商問此箋引常武整我六師宣王之時不稱六軍而稱六師不達其意答曰師者衆之通名故人多云焉欲著其大數則乃言軍耳此正答常武六師而不申此箋之意是其自持疑也又臨碩并引詩三處六師之文以難周禮鄭釋之云春秋之兵雖累萬之衆皆稱師詩之六師謂六軍之師是亦以此為六軍之意也軍之言師乃是常稱不當于此獨設異端當是所注者廣未及改之耳蕙田案師軍固屬通稱但是時文王未嘗爲天子未必有六軍故鄭以二千五百人為師六師一萬五千人解之穎達之辨亦覈特未會鄭意耳觀承案文王未嘗有六軍固不得稱六師然文王未嘗為天子先不得稱周王矣此葢追王後頌美之詩故不妨稱王稱六師耳詩乃咏歌之文非記事之史其間典禮固非脱空妄語然亦有鋪張揚厲之處自是行文活法必欲字字疏鑿句句實塡則觸處成礙者多多矣即如六師若執定師字觧之二千五百人爲師六師亦只有一萬五千人是一軍之外只餘二千五百人且不滿二軍之數其衆亦甚單弱矣詩人何用艷稱之耶書費誓魯人三郊三遂疏三郊三遂謂魯人三軍周禮司徒萬二千五百家為鄉司馬法萬二千五百人為軍小司徒云凡起徒役無過家一人是家出一人一鄉為一軍天子六軍出自六鄉則諸侯大國三軍亦當出自三鄉也周禮又云萬二千五百人為遂遂人職云以歳時稽其人民簡其兵器以起征役則六遂亦當出六軍鄉為正遂為副也鄭衆云六遂之地在王國百里之外然則王國百里為郊鄉在郊内遂在郊外釋地云邑外謂之郊孫炎云邑國都也設百里之國去國十里為郊則諸侯之制亦當鄉在郊内遂在郊外此言三郊三遂者三郊謂三鄉也葢使三鄉之民分在四郊之内三遂之民分在四郊之外鄉近于郊故以郊言之陳氏禮書鄭氏釋聘禮謂周制天子畿内千里逺郊百里以此差之則上公逺郊五十里侯伯三十里子男十里近郊各半之鄭氏鍔曰鄉遂之制上公之國三鄉三遂侯伯之國二鄉二遂子男之國一鄉一遂大宗伯乃頒祀于都家鄉邑大司馬簡稽鄉民以用邦國則邦國亦有鄉遂明矣春秋成公元年疏諸侯出兵先盡三鄉三遂鄉遂不足然後總徵境内之兵春秋莊公十六年左氏傳王使虢公命曲沃伯以一軍爲晉侯注曲沃武公遂并晉國僖王因就命為晉侯小國故一軍疏桓八年傳稱曲沃武公滅翼其年冬王命虢仲立晉哀侯之弟緡于晉至是乃并之也晉世家云曲沃武公并晋已即位三十七年矣自桓叔封曲沃至武公滅晋凡六十七歲周禮小國一軍晋土地雖大以初并晋國故以小國之禮命之蕙田案此雖一軍未必只有萬二千五百人也閔公元年左氏傳晉侯作二軍公將上軍太子申生將下軍注晉本一軍襄公十四年左氏傳晉侯舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也於是知朔生盈而死盈生六年而武子卒彘裘亦㓜皆未可立也新軍無帥故舍之注荀罃士魴卒其子皆㓜未任為卿故新軍無帥遂舍之疏周禮大宗伯以九儀之命正邦國之法五命賜則七命賜國鄭𤣥云則地未成國之名王之下大夫四命出封加一等五命賜之以方百里二百里三百里之地方四百里以上為成國如鄭之言成國者惟公與侯耳伯雖與侯同命地方三百里未得為成國也成國乃得半天子之軍未成則不得也蕙田案以上三條皆春秋邦國之軍近於周禮者故列于此又案以上邦國鄉遂之軍漢書刑法志地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有税有賦故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人歩卒七十二人干戈備具是謂乘馬之法師古曰税者田租也賦者謂發斂財也鄭氏曰甲士在車上也蕙田案成與甸一法也成通治洫甸據出賦故並舉之然此一叚本係班氏撮敘古者軍賦之大要今六十四井出七十五人為邦國郊外之制偏舉一端言之者古者軍賦雖鄉遂家一人都鄙或四家或六家一人邦國國中家一人郊外七家一人各自不同其臨陣對敵皆一車七十五人而七家一人之制與之同故舉以為言其餘不備列也論語道千乘之國注馬曰司馬法六尺為歩歩百為畆畆百為夫夫三為屋屋三為井井十為通通十為成成出革車一乘然則千乘之賦其地千成居地方三百一十六里有畸惟公侯之封乃能容之雖大國之賦亦不是過焉包曰千乘之國者百里之國也古者井田方里為井十井為乘百里之國適千乘也融依周禮包依王制孟子義疑故兩存焉為疏千成地方三百一十六里有畸者以方百里者一方十里者百方三百里者三三而九則為方百里者九合成方十里者九百得九百乘也計千乘猶少百乘方百里者一也以此方百里者一六分破之每分得廣十六里長百里引而接之則長六百里廣十六里也半折之各長三百里將埤前三百里南西兩邊是方三百一十六里也然西南角猶缺方十六里者一方十六里者一為方一里者二百五十六然曏割方百里者為六分餘方一里者四百今以方一里者二百五十六埤西南角猶餘方一里者一百四十四又復破而埤三百一十六里兩邊則每邊不復得半里故云三百一十六里有畸也云公侯之封乃能容之者案周禮大司徒云諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方百里千乘之國地方三百一十六里有畸伯子男自方三百而下則莫能容故云惟公侯之封乃能容之也坊記云制國不過千乘明堂位云封周公于曲阜地方七百里革車千乘包云千乘百里之國者包以古之大國不過百里每十井為一乘是方一里者十為一乘則方一里者百為十乘開方之法方百里者一為方十里者百每方十里者一為方一里者百其賦十乘方十里者百則其賦千乘故曰適千乘也馬依周禮大司徒文諸公之地方五百里侯四百里以下也包依王制云凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國孟子云天子之制地方千里公侯皆方百里伯七十里子男五十里賈氏公彦曰成革車一乘士十人徒二十人此天子畿内邦國法鄭注論語道千乘之國亦引司馬法彼是畿外邦國法彼革車一乘甲士三人歩卒七十二人甲士少歩卒多此士十人徒二十人比畿外甲士多歩卒少外内有異故也陳氏禮書易曰震驚自里王制曰公侯之田方百里孟子曰諸侯不百里不足以守宗廟之典籍周公封于魯太公封于齊地非不足而儉于百里春秋傳曰列國一同明堂位曰魯革車千乘坊記曰制國不過千乘論語曰道千乘之國蓋諸侯地不過百里車不過千乘以開方之法計之方十里者為方一里者百方百里者為方一里者萬方一里者百其賦千乘方一里者萬則其賦千乘又曰周三等之國以地言之公侯百里大國也伯七十里次國也子男五十里小國也軍之多寡係地之廣狹公侯田皆百里則皆三軍矣何氏楷曰包氏注論語直謂古者井田方里爲井十井爲乘百里之國適千乘也夫魯成公作丘甲而春秋譏之丘者十六井也以十六井出一甸之賦然且不可今乃使十井出一乘其虐又過於成公矣而謂古有此制乎蕙田案大國三軍車五百乘若計地出賦則得千乘千乘出賦之法則服䖍注左傳所引司馬法所謂甸六十四井出車一乘士卒共七十五人者是馬鄭注論語引之欲見邦國疆域實數故攺甸為成其實一耳孫子云興師十萬日費千金怠於操事者七十萬家葢謂七家而賦一兵也今以此法推六十四井五百七十六家可出八十二人尚餘二夫今祗出七十五人則是七家又十之五强出一人也此說本無可疑自何休注公羊傳初税畆云聖人制井田之法十井共出兵車一乘包咸因之亦謂十井爲乘百里之國應千乘也何元子辨之謂使十井出一甸之賦則其虐又過於成公之丘甲矣此説最精顧後儒猶有惑於其説者則以邦國疆域諸説參錯不合也王制云公侯田方百里伯七十里子男五十里孟子云諸侯之地方百里不百里不足以守宗廟之典籍周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足而儉於百里今考王制云云康成以為夏制五等之爵三等受地至殷變爵為三等合子男與伯以為一其地亦三等不變則白虎通詳言之武王克商復増子男爵為五等其受地則與夏殷三等同武成所謂列爵惟五分土惟三是也齊魯之封皆在武王之世孟子所謂地非不足而儉於百里者大都據初制而言賈公彦職方氏疏申鄭意謂其時九州之界尚狹至武王崩成王幼周公攝政致太平制禮成武王之意斥大九州於是五等之爵以五等受地則周禮大司徒云凡建邦國諸公之地封疆方五百里諸侯之地封疆方四百里諸伯之地封疆方三百里諸子之地封疆方二百里諸男之地封疆方百里是也馬融以為千乘地三百一十六里有竒而又云惟公侯之封乃能容之雖大國之賦亦不是過焉數語最可玩味葢左氏傳言不過半天子之軍坊記言不過千乘不過云者謂軍賦以是為限非地止三百一十六里故云大國亦不是過史記云周封伯禽于魯地方四百里明堂位則以成王欲廣魯於天下故封周公于曲阜地方七百里然其言魯之賦則亦不過革車千乘而已若孟子對北宮錡曰周室班爵禄公侯皆方百里伯七十里子男五十里不能五十里不達於天子附于諸侯曰附庸趙岐注諸侯方百里象雷震也此以夏制為周制者其言曰軻也嘗聞其略則為傳聞約略之詞而非載籍之明據可知王與之云孟子見戰國爭雄壤地廣袤遂援百里七十里五十里之制以抑當時并吞無厭之心若今之偏州下邑奚啻百里周禮所載不為過也此說得之葢千乗其地千成則九萬井有餘其為百里已九有竒矣尚得以為百里乎左傳襄二十五年鄭子産適晉獻捷晉人責之何故侵小子産對曰昔天子之地一圻列國之地一同今大國多數圻矣若無侵小何以至焉此亦救時之談非核實之論也至於先儒欲合異為同説愈多而愈舛一則陳君舉説謂周禮封疆方五百里是周圍五百里徑只百二十五里方四百里徑只百里方三百里徑只七十五里方二百里徑只五十里方百里徑只二十五里自竒其説與王制合朱子辨之云本文方千里之地以封公則四公以封侯則六侯以封伯則七伯以封子則二十五子以封男則百男其地已有定數君舉說如何可通此其言非也一則陳用之説以為百里七十里五十里乃正封之實地而五百里四百里三百里則兼所統之附庸然方五百里則為方百里者二十五豈公之正封僅得方百里者一而附庸反得二十四乎方四百里則為方百里者十六豈侯之正封僅得方百里者一而附庸反得十有五乎推之伯子男皆不能通此其言亦非也今説千乘一以馬鄭及朱子之言為斷餘説皆不取子曰由也千乘之國可使治其賦也子路曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也禮記坊記制國不過千乘注古者方十里其中六十四井出兵車一乘此兵賦之法也成國之賦千乘是疏左傳成國不過半天子之軍謂滿千乘則為成國公侯之封也案千乘之賦地方三百一十六里有竒案周禮公五百里侯四百里則是過千乘云不過千乘者其地雖過其兵賦惟千乘故論語注云雖大國之賦亦不是過焉孟子千乘之國注千乘兵車千乘謂諸侯也詩魯頌閟宫公車千乘朱英綠縢二矛重弓傳大國之賦千乘疏明堂位云封周公于曲阜地方七百里革車千乘今復其故也司馬法成方十里出革車一乘計魯方七百里為車多矣而云千乗者坊記云制國不過千乘然則地雖廣大以千乘為限故云大國之賦千乘司馬法兵車一乘甲士三人歩卒七十二人計千乘有七萬五千人則是六軍矣與下公徒三萬數不合者二者事不同也禮天子六軍自出六鄉萬二千五百家為鄉萬二千五百人為軍地官小司徒曰凡起徒役無過家一人是家出一人鄉為一軍此則出軍之常也天子六軍既出六鄉則諸侯三軍出自三鄉下云公徒三萬自謂鄉之所出非彼千乘之衆也此云公車千乘自謂計地出兵非彼三軍之事也二者不同故數不相合所以必有二法者聖王治國安不忘危故令所在皆有出軍之制若從王伯之命則侯國之大小出三軍二軍若其前敵不服用兵未已則盡其境内皆使從軍故復有此計地出軍之法但鄉之出軍是正故家出一人計地所出則非常故成出一車以其非常故優之也公徒三萬貝胄朱綅烝徒增增箋萬二千五百人為軍大國三軍合三萬七千五百人言三萬者舉成數也成疏萬二千五百人為軍大國三軍皆夏官序文也舉數者謂略其七千五百直言三萬耳如此箋以為僖公當時實有三軍矣荅臨碩云魯頌公徒言三萬是三軍之大數又以此為三軍者以周公受七百里之封明知當時從上公之制備三軍之數此敘云復周公之宇故此箋以三萬為三軍言其復古制也又以凡舉大數皆舉所近者若是三萬七千五百大數可為四萬此頌美僖公宜侈大其事不應減退其數以為三萬故荅臨碩謂此為二軍以其不安故兩觧之也今以春秋檢之則僖公無三軍襄十一年經書作三軍明已前無三軍也昭五年又書舍中軍若僖公有三軍則作之當書也自文至襄復減為二則舍亦當書也春秋之例以軍賦事重作舍皆書于僖公之世無作舍之文便知當時無三軍也鄭以周公伯禽之世合有三軍僖公能復周公之宇遵伯禽之法故以三軍解之其實于時唯二軍耳周禮大司馬正義大國三軍上公為大國魯是侯爵而頌云公徒三萬注大國三軍三萬七千五百人三萬舉成數也然當僖公時其實二軍故襄公十二年作三軍則前無三軍矣作詩之人舉盛時而言若然魯公伯禽之時則三軍魯語季武子為三軍叔孫昭子曰不可今我小侯也明大侯之時有三軍矣鄭答林碩爲二萬大數者以實言之也何氏楷曰千乘之制鮮有能明之者先儒皆據漢書井十為通通十為成成十為終終十為同同十為封一封三百一十六里提封十萬井定出賦六萬四千井車千乘然王制孟子皆言大國百里何從有三百一十六里及考周禮公五百里侯四百里與左孟不合因再四尋繹更以詩公車千乘之制求之然後知周禮之果不謬而諸儒凡解千乘曾未拈出者何也案大司徒職云凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食四之一鄭賈謂公受地廣税物多但留半即足其國俗䘮紀及畜積之用以半為餘貢入天子其侯伯受地差少則其税亦少故三分之二留自用以一分為餘貢入天子子男受地又少其税轉少故留四分之三亦以一分為餘貢入天子大國貢重正之也小國貢輕字之也據此説則所謂其食者謂王食其土之入耳今即依此法以諸侯之地推算計封疆方四百里為田當十六萬井除山林園囿城郭溝塗之類大率三分去一實當存十萬六千六百六十六井又三分之而貢其一于王尚餘二分應六萬六千一百零五井則留供本國之用者也以丘甸法合之四井為邑四邑為丘丘十六井也出戎馬一匹牛三頭四丘為甸甸六十四井也出長轂一乘戎馬四匹牛十二頭甲士三人歩卒七十二人由此積之則六百四十井出十乘六千四百井出百乘至六萬四千井即當出千乘矣此外所餘二千一百餘井尚當出車三十餘乘而經傳但以千乘之國為言者舉成數耳司焉法漢書求其説而不得于是增同十為封一條以求合于千乘之數而其實無此制也蕙田案何氏以方四百里者推算甸六十四井出車一乘之法恰得千乘自謂剏獲不知丘甸之制本有二法有甸出車一乘據六十四井實出税者而言有成出車一乗旁通加一里治溝洫者而言何氏忘却旁加之成但以甸算何立説之未詳也至於食者半食者參之一食者四之一指貢入天子而言與軍賦本不相渉强為牽合亦不可從戴氏震曰公車千乗公徒三萬者葢一車士卒共三十人千乗適三萬分言之則曰士曰徒合言之則皆公徒爾武王革車三百乗虎賁三千人齊侯使公子無虧帥車三百乗甲士三千人葢不言歩卒而但舉甲士其數亦合杜預注春秋作丘甲謂四井為邑四邑為丘丘十六井有戎馬一匹牛三頭四丘為甸甸六十四井有戎馬四匹兵車一乗牛十二頭甲士三人歩卒七十二人其説引周禮而以漢刑法志雜之刑法志亦本司馬法然司馬法與周禮有合有不合其合者方可據不合者不可執以定周禮也康成據司馬法甸出車一乗每車士卒共七十五人之説謂千乗闔境所出五百乗常征所用計應三萬七千五百人舉成數故言三萬其説非是蕙田案司馬法文引之者非一其曰六尺為歩歩百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乗士十人徒二十人十成為終終千井三千家革車十乗士百人徒二百人十終為同同方百里萬井三萬家革車百乗士千人徒二千人此鄭小司徒注所引小雅甫田箋亦用之者也其曰四邑為丘有戎馬一匹牛三頭是曰匹馬丘牛四丘為甸甸六十四井出長轂一乗馬四匹牛十二頭甲士三人歩卒七十二人戈楯具備謂之乗馬此則服䖍左傳注所引見于小雅信南山正義者也為通為成云云通治溝洫者而言為丘為甸云云據實出税者而言兩者互相明實即一法無可疑獨一車三十人一車七十五人二者不同鄭注論語道千乗之國亦引司馬法但欲見地方三百一十六里有竒故不引丘甸而引通成其下又引一車七十五人參合二文為一則小司徒正義云鄭注論語是畿外邦國法甲士少歩卒多此士十人徒二十人比畿外甲士多歩卒少外内有異故也是司馬法本有二法賈氏之言甚明觀鄭於論語注服杜於春秋左氏傳所言皆邦國事同引七十五人説獨於小司徒畿内事則引三十人説足知賈説之精矣今魯頌正邦國事戴氏以都鄙事説之非也又古者每車士徒共七十五人此定法也孔頴達於書牧誓正義禮記坊記正義春秋成公元年正義皆謂徴課出兵之數與臨陣對敵之數不同科兵既至臨時配割其車雖在其人分散前配車之人不必還屬本車如此則雖七十五人恰與軍法相合亦不必符原科之兵若三十人之法自屬元科非軍法明矣至武王所用革車三百乗虎賁三千人此孟子文戴氏据之謂一車甲士十人書序又作三百人孔傳謂虎賁即係甲士亦即百夫長頴達疏之又謂一車士徒共百人而甲士惟一人皆非也革車之外又有虎賁二者本不相渉耳至公子無虧所帥杜氏明云車甲之賦異於常當日衛為狄滅戴公廬曹使人職守非尋常征戰事可比以之為証更未足據漢書刑法志井十為通通十為成成方十里成十為終終十為同同方百里同十為封一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乗此諸侯之大者也是謂千乗之國蕙田案以上邦國境内之軍何氏休公羊傳注古者諸侯有司徒司空上卿各一下卿各二司馬事省上下卿各一上士相上卿下士相下卿公羊傳疏隱五年注禮天子六師方伯二師諸侯一師王官之伯宜半天子乃有三軍魯為州牧亦但二軍止置司徒司空以為將下各有小卿二人輔助其政其司馬事省葢總監而已故但有一小卿輔之知古但有司徒司空典事者詩云乃召司徒乃召司空不見司馬故知司馬事省總監而已然則司徒卿一人其大夫二人司空卿一人其大夫二人司馬卿一人其大夫一人所謂諸侯之制三卿五大夫矣王氏與之曰王制謂大國三卿皆命於天子次國三卿二卿命于天子一卿命于其君小國二卿一卿命于天子一卿命于其君經文作二卿皆命於君者注以為誤葢欲為將者皆出於天子所命之卿以見兵制雖備於邦國兵權不屬於私人此聖人統御諸侯防患之深意薛氏衡曰晉悼公時魏綘為司馬張老為侯奄鐸遏㓂為上軍尉籍偃為司馬使訓卒乗注以為軍將皆命卿猶有先王之遺意雜説軍制有隆殺而軍帥無隆殺軍制有隆殺所以明分軍帥無隆殺所以愛民故雖一軍亦以命卿主之重民也春秋于將卑師衆者則譏焉聖人不忍以卒與敵也如是夫蕙田案以上邦國軍將禮記坊記家富不過百乗疏家富不過百乗者諸侯之卿采地也故左傳云惟卿備百邑地方百里也直云惟卿百邑未知天子諸侯公卿大夫采地大小案鄭注大司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸又云采地食者皆四之一説者據此以為公食百里卿食五十里大夫食二十五里其諸侯之卿大夫傳云卿備百邑論語云百乗之家此據諸侯臣之采地則公之孤侯伯之卿與天子之公同俱方百里公之卿與侯伯之大夫俱方五十里公之大夫與侯伯之下大夫俱方二十五里其子男之地惟方二百里以下其卿之采地不復得方百里案易訟卦注云小國之下大夫采地方一成其税三百家惟有此文其子男中都大都無以言之案鄭注論語伯氏駢邑三百云此齊下大夫之制則似公侯伯之制下大夫惟三百家者但春秋時齊强臣多故伯氏惟食三百家之邑不與禮同也此皆皇氏之説熊氏以為卿備百邑者鄭志以為邑方二里與百乗别又以諸侯之臣賜地無常得地者卿百乗下大夫則得十里之成孟子百乗之家注百乗之家謂大國之卿食采邑有兵車百乗之賦者也若齊崔衛寗晉六卿等漢書刑法志成十為終終十為同同方百里一同百里提封萬井除山川沉斥城池邑居園囿術路三千六百井定出賦六千四百井馬四百匹此卿大夫采地之大者也是謂百乗之家蕙田案以上邦國卿大夫家軍制右邦國軍制春秋成公元年三月作丘甲杜注周禮四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使丘出之譏重斂故書人疏鄭注小司徒引司馬法云成出革車一乗甲士十徒二十人十成為終干井革車十乗甲士百人徒二百人十終為同萬井革車百乗甲士千人徒二千人與此車一乗甲士三人歩卒七十二人不同者小司徒辨畿内都鄙之地域鄭所引士十人徒二十人者謂公卿大夫畿内采地之制此之所謂諸侯邦國出軍之法故不同也一乗甲兵甸之所賦今魯使丘出甸賦乃四倍于常也左氏傳為齊難故作丘甲注前年魯乞師于楚欲以伐齊楚師不出故懼而作丘甲疏左氏經傳並言作丘甲耳重斂之事傳無明文而知為丘作甸甲者以傳云為齊難故作丘甲以慮有齊難而多作甲兵知倍作之也初税畝言初此不言初者此備齊難暫為之耳非是終用故不言初然則築城備難非時不譏此亦備難而譏之者魯是大國甲兵先多僖公之世頌云公車千乗昭公之蒐傳稱革車千乗其甲足以拒敵而又加之重斂故譏之顔師古漢書注丘十六井也止出戎馬一匹牛三頭四丘為甸甸六十四井也乃出戎馬四匹兵車一乗牛十二頭甲士三人卒七十二人耳今乃使丘出甸賦違常制也李氏景齊曰成公作丘甲春秋譏之葢常賦于一甸而魯於一丘為之則軍賦極重耳杜氏佑曰魯自禽父封於曲阜及僖公能復周公之宇其詩曰公車千乗説者以為大國之賦也又公徒三萬説者以為大國之軍也故知三軍魯之舊其曰三萬舉成數也實三萬七千五百人宣公奢泰初税畝什二而税既益民税及成公謀伐齊元年作丘甲丘各一甲又益民賦率一丘而出歩卒二十四人甲士一人三甸而加一乗兵車之賦非復司馬法之舊矣陳氏禮書周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸方八里六十四井出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人又成方十里出長轂一乗古者或以甸為乗或以乗為甸以甸為乗稍人掌丘乗之政令禮記為社丘乗粢盛是也以乗為甸衛良夫乗衷甸兩牡是也葢乗者甸之賦甸者乗之地甸方八里據地言之成方十里通治洫言之其實一也今作丘甲者即丘出甲一人是一甸之中共百人為兵也榖梁以為甲非人人之所能為杜預以為邱出甸賦加四倍誤矣鄭氏伯謙曰宣公初税畝是於公田之外復履私田之畝而行什一之税然賦則尚無恙也至於成公之作丘甲則每三甸而加一乗兵車之賦非復司馬法之舊矣蕙田案杜佑通典謂丘甲者丘出甲士一人既出甲士即有歩卒二十四人從之是實出二十五人即一兩之數也三丘共出七十五人為一乗之數則甲士三人歩卒七十二人也四丘為甸則百人為兵矣如杜預説一甸増加二百二十五人也如杜佑説一甸増加二十五人也凡三甸而加一乗就諸説中二説皆為近理今亦未有以定二説之去取陳氏祥道鄭氏伯謙及近時吳氏鼐皆從杜佑吳氏鼐曰一甸六十四井四旁各加一里則為百井内去山川林麓三十六井實出賦者六十四井八家同井六十四井五百一十二家出七十五人是七家而賦一兵其云甲何也五伍為一甲以一甲統之凡三甲而成一乗不云乗者甲以統卒而為車馬器械之總持故不曰乗而曰甲也作丘甲者繋甲于丘使丘作一甲也以甸賦則一丘所出祗十八人耳毁甸賦而以丘賦則一甸之中百人為兵矣五百一十二家而出百人是五家而賦一兵非古也蕙田案吳氏改山陵林麓為山川林麓又即以此當鄭氏治溝洫之數不知山陵林麓三分去一乃據其大略而言若細推之則當以百井之内除去三十六井存六十四井方合但因此數與鄭氏出税治溝洫之數相符故後人每誤認故鄭氏於一成内除治洫定出税云云者本係已經除去山陵林麓然後為此法今又欲于此中再除山陵等而治洫之夫反不計及則疏矣又古人言税賦皆不除公田葢公田即賦也除之而計其賦即加賦矣吳氏五百一十二家云云亦非也又改周禮五伍為兩為五伍為甲丘出二十五人甸出百人此説出于通典今姑存于此又以甸賦則一丘出十八人又十之七强吳氏云十八人舉其略耳觀承案四丘出甲者專据甲士三人而言尚有歩卒七十二人合七十五人而成一車也葢一丘不能獨出一甲合四丘為甸始能共出三甲耳如杜預説使一丘已出甲士三人歩卒七十二人為兵車一乗則四丘為甸可得甲士十二人歩卒二百八十八人有兵車四乗矣魯雖加賦亦必借端漸増豈能頓加數倍一甸而忽出四甸之賦即民力亦何以堪惟杜君卿之説稍為近理可信葢四丘而出三甲者今使一丘而出一甲則四丘為甸而得四甲是一車之外而餘甲士一人歩卒二十四人合三甸而多一車可以増一乗矣此為巧取於民之術三分而増一分大變舊時車賦之常制也春秋書曰作丘甲所以譏之如此觧則丘甲二字亦有著落耳公羊傳作丘甲何以書譏何譏爾譏始丘使也注甲鎧也譏始使民作鎧也古者有四民一曰徳能居位曰士二曰辟土殖榖曰農三曰巧心勞手以成器物曰工四曰通財粥貨曰商四民不相兼然後財用足榖梁傳作為也丘為甲也丘甲國之事也丘作甲非正也丘作甲之為非正何也古者立國家百官具農工皆有職以事上古者有四民有士民有商民有農民有工民夫甲非人人之所能為丘作甲非正也注丘十六井使一丘之民皆作甲蕙田案作丘甲一事杜氏注與公羊榖梁異然細考之似當從杜氏葢左傳雖無明文而既為備難自必益兵若從公榖徒然益甲而不益兵非備難意且所謂人人作甲者其説亦太迂謬必無此事當日魯君臣雖愚使甲高於丘山而國不加賦豈不可笑耶顔師古説與杜氏同襄公十一年春王正月作三軍杜注増立中軍明疏昭五年云舍中軍此年作而彼年舍故知舊有二軍今増立中軍也左氏傳季武子將作三軍注魯本無中軍惟上下二軍皆屬于公有事三卿更帥以征伐季氏欲專其民人故假立中軍因以改作疏禮明堂位云成王封周公于曲阜地方七百里其時必有三軍詩魯頌閟宮頌僖公能復周公之宇云公徒三萬則僖公復古亦制三軍葢自文公以來霸主之令軍多則貢事多自減為二軍耳非是魯衆不滿三軍也若然昭五年舍中軍書之于經從前若減一軍亦應書之而經不書者作三軍與舍中軍皆自變故改常卑弱公室季氏秉權專擅改作故史特書之耳若國家自量强弱其軍或減或益國史不須書也何則僖公復古始有三萬則以前無三萬矣僖公作亦不書何怪舍不書也蘇氏亦云僖公之時實有三軍自文以後舍其一軍非是故有所舍故不書周禮小司徒云凡起徒役無過家一人是家出一人故鄉為一軍天子六軍出自六鄉則大國三軍出自三鄉其餘公邑采地之民不在三軍之數季武子今為三軍則異于是矣以魯國屬公之民皆分為三亦謂之三軍其軍之民不止一萬二千五百家也何則魯國合境之民屬公者豈惟三萬七千五百家乎明其決不然矣由此言之此作三軍與禮之三軍名同而實異也告叔孫穆子曰請為三軍各征其軍注征賦税也三家各征其軍穆子曰政將及子子必不能注政者霸國之政令禮大國三軍魯為大國之制貢賦必重故憂不能堪武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乗注三分國之民衆各有其一又各自壞其車乗分以足成三軍季氏使其乗之人以其役邑入者無征不入者倍征注使軍乗之人率其役邑以入季氏者無公征不入季氏者則使公家倍征之設利病欲驅使入已民辟倍征故盡屬季氏孟氏使半為臣若子若弟注取其子弟之半也四分其乗之人以三歸公而取其一叔孫氏使盡為臣注盡取子弟以其父兄歸公不然不舍注制軍分民不如是則三家不舍其故而改作也此三家盟詛之本言疏如上所分三家所得又各分為四季氏盡取四分叔孫氏取二分孟氏取一分葢分國民以為十二三家得其七公得其五也榖梁傳作為也古者天子六師諸侯一軍作三軍非正也注昭五年經曰舍中軍傳曰貴復正也然則魯有二軍今云作三軍増置中軍耳魯為次國于此為明釋曰魯本周公之後地方七百里而云次國者據春秋時言之也蕙田案榖梁説軍制與大司馬文相違范甯辨已見前其説作三軍為増置中軍亦與左氏杜預合公羊傳三軍者何三卿也注為軍置三卿官也半疏公羊以為王官之伯宜天子乃有三軍魯為州牧但合二軍司徒司空將之而已今更益司馬之軍添滿三軍是以書而譏之隱五年注禮天子六師方伯二師諸侯一師又云魯人前此止置司徒司空以為將下各有小卿二人輔助其政其司馬事省葢總監而已故但有一小卿輔之今更置中軍司馬將之亦置二小卿輔助其政故曰為軍置三卿官也作三軍何以書譏何譏爾古者上卿上士下士注此説古制司馬官數古者諸侯有司徒司空上卿各一下卿各二司馬事省上下卿各一上士相上卿下士相下卿足以為治襄公委任强臣國家内亂兵革四起軍職不共不推其原乃益司馬作中卿官踰王制故議之蕙田案公羊傳及注疏論諸侯軍將則是其説已采于前其論襄公立中軍之官則非也如此則所謂作三軍者將謂不過増置司馬以下之一大夫耶軍不増而増將義何所取將謂増置一官即當増置一軍耶地不加闢而忽添一軍亦何自而出也且此事原為三家欲專公室之民人而作之葢通合境之民擅加分析左氏有明文杜注及疏更為精確今反謂襄公之意多設大夫官踰王制與左氏大相矛盾不可從昭公五年春王正月舍中軍左氏傳舍中軍卑公室也注罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名疏襄十一年初作三軍十二分其國民三家得七公得五國民不盡屬公公室已是卑矣今舍中軍四分公室三家自取其税減已税以貢于公國民不復屬公公室彌益卑矣作三軍卑公室之漸舍中軍卑公室之極初作云作三軍今不云舍三軍者初云作者舊有二軍今更増一軍人數不足故總皆毁破足成三軍故云作三軍此則惟舍中軍之衆屬上下二軍其上下二軍依舊不動故惟云舍中軍也哀十一年齊師伐魯傳稱孟孺子泄帥右師冉求帥左師季氏宰也又言叔孫武叔退而蒐乗更無别稱知自以叔孫為軍名也毁中軍於施氏成諸臧氏注季孫不欲親其議勑二家會諸大夫發毁置之計又取其令名初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉注初作三家各有一軍家屬季氏無所入於公叔孫氏以父兄歸公孟氏復以子弟之半歸公及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公注季氏簡擇取二分二子各一則國人盡屬三家三家隨時獻公而已榖梁傳舍中軍貴復正也注魯次國舊二軍襄十一年立三軍今毁之故曰復正蕙田案大國三軍次國二軍小國一軍此周禮定制魯初封為大國後削弱降為次國則其國本可以為三軍可以為二軍故康成于魯頌亦用二法觧之至于作三軍者乃三家欲專公室之民故為此制通一國之民分為三耳與大司馬三軍無渉説見正義然當作三軍時公猶有民也至舍中軍則民皆屬三家公無民矣其與周禮二軍有何關渉而榖梁反以為復正以權臣擅國之事指為復古反正之功何其愚乎公羊傳舍中軍者何復古也注善復古也然則曷為不言三卿注二師觧言三卿因以為難五亦有中三亦有中疏襄十一年益司馬之職更令將軍正是作中軍而不言中者正以五亦有中若言作中軍嫌是五之中故變言三軍若實而言之正是作中軍故至舍時云中軍矣蕙田案以舍中軍為復周禮二軍之制最謬辨已見前牽入官制尤無謂陳氏禮書春秋傳曰成國不過半天子之軍諸侯之大者三軍可也魯千周為侯而地方百里頌稱公徒三萬此大國三軍之數也春秋襄十一年作三軍昭五年舍中軍則魯之三軍葢嘗變于僖公之後至襄而復作至昭而又舍也國語云季武子為三軍叔孫穆子曰不可今我小侯也處大國之間繕貢賦以共從者猶懼有討若為元侯之所以怒大國無乃不可乎弗從遂作中軍自是齊楚代討魯襄昭皆如楚由此觀之魯于春秋之時尊事齊楚為不暇則其國次國而已作三軍非正也故春秋書作以譏之及舍中軍公羊曰舍中軍復古也榖梁曰復正也其説是也蕙田案陳氏之説未是辨見前昭公八年秋蒐于紅杜注革車千乗不言大者經文闕也紅魯地左氐傳秋大蒐于紅自根牟至於商衛革車千乗注根牟魯東界商宋地魯西竟言千乗明大蒐且見魯衆之大數也胡氏安國曰昭公八年蒐于紅自根牟至于商衛革車千乗故邾人告吳曰魯賦八百乗邾六百乗葢竭作也考之春秋書蒐五皆在昭定之世自蒐紅之後繼大蒐于此蒲十一年于昌間二十二年又于比蒲者再定公十三年十四年獨異於它公者用見二公在位君不得有其國而奪於大夫大夫不得專其政而制於陪臣各恃兵威以為强假大蒐之名陰擇其材力可任者以植私黨使國人莫敢睥睨終於不可制葢傷公室削弱疾臣下恣横也迄哀公十二年用田賦又分夫田而賦軍旅之征悉變丘乗之制民無餘力矣哀公十二年左氏傳季孫欲以田賦注丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦一疏司馬法四丘為甸有馬四匹牛十二頭是為革車乗今用田賦賈逵以為欲令一井之間出一丘之税并别出馬一匹牛三頭如此則一丘之内有一十六井其出馬牛乃多于常一十六倍杜以如此則非民所能給故改之舊制丘賦一馬三牛今别其田及家資各為一賦計一丘民之家資令出一馬三牛田之所收更出一馬三牛是倍于常也使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私于冉有曰君子之行也度于禮施取其厚事舉其中斂從其薄如是則以丘亦足矣注丘十六井出馬一匹牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽十二年春王正月用田賦榖梁傳哀公十有二年春用田賦注古者九夫為井十六井為丘丘賦之法因其田財通共出馬一匹牛三頭今别其田及家財各出此賦疏井方一里九夫邑方二里四井三十六夫丘方四里十六井百四十四夫甸方八里六十四井五百七十六夫軍賦之法丘出馬一匹牛三頭甸出長轂一乗馬四匹牛十二頭甲士三人歩卒七十二人今用田賦非正也古者公田什一用田賦非正也注古者五口之家受田百畝為官田十畝是為私得其什而官税其一故曰什一周謂之徹殷謂之助夏謂之貢其實一也皆通法也今乃棄中平之法而田財並賦言其賦民甚矣皆疏凡受農田皆私田百畝公田十畝但由公田私田公家所授故總曰公田什一則以田之什一及家財而出馬牛之賦是其正也魯用田與財各出賦非正也周禮七人六人五人三等范惟言五口之家受田百畝其實六人七人亦受田百畝與周禮不異也為官田十畝者漢書食貨志井田一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝為廬舍則家得二畝半凡家受田一百十二畝半也公田十一者舉其全數據出税言之周謂之徹殷謂之助夏謂之貢其實一也夏后計其五十畝而貢五畝于公殷人計其七十畝而助七畝于公周人盡計一百一十畝而徹十畝于公什一而税為天下通法范説不與先儒同先儒皆云什一者什中税一耳蕙田案用田賦一條當以杜氏之説為正賈逵所云欲令井出丘税此必無之事不必辨范甯觧榖梁謂别其田及家財各出賦與杜氏合其説是也至云周時一家受田一百一十二畝半夏后氏計其五十畝貢五畝于公殷人計其七十畝助七畝于公周人盡計一百一十畝徹十畝于公如此則是貢助為什中税一而徹為十外税一合之為二十一而取其二非通為什一之義也與康成之説不合不可從其辨已詳見前公羊傳用田賦何以書譏何譏爾譏始用田賦也注田謂一井之田賦者斂取其財物也言用田賦者若今漢家斂民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之禮税民公田不過什一軍賦十井不過一乗哀公外慕强吳空盡國儲故復用田賦過什一疏家語正論篇云季康子欲以一井田出賦法焉魯語下篇云孔子謂冉求曰田一井出稯禾秉芻正米不是過也彼二文皆論此經用田賦之事而言一井故知然又凡言田者指墾土之處言井者但是方里之名若言用井賦則嫌城郭里巷之内但有一井之處悉皆賦之故云不言井者城郭里巷亦有井嫌悉賦之云軍賦十井不過一乗者何氏以為公侯方百里案諸典籍每有千乗之意若不十井為一乗則不合鄭氏云公侯方百里井十則賦出革車一乗者義亦通于此蕙田案公羊傳於用田賦但加一始字本無明文何休忽改為口率出錢之事無據依恐非是至其所云十井不過一乗其説與包咸同尤謬其辨已詳見前矣且衍沃之地九夫為井則井之名所以異于宮室塗巷等類者正以其盡為田也今反云城郭里巷亦有井而疏申其義云凡言田者指墾土之處言井者但是方里之名其謬甚矣又因此而推知本用井賦嫌悉賦之故言田賦尤為迂曲又案以上魯變軍制管子中匡篇昔者聖王之治其民也參其國而伍其鄙參國奈何制國以為二十一鄉商工之鄉六士農之鄉十五公帥十一鄉高子帥五鄉國子帥五鄉五家為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥伍鄙奈何五家為軌軌有長六軌為邑邑有司十邑為率率有長十率為鄉鄉有良人三鄉為屬屬有帥文獻通考齊桓公問管仲行伯用師之道傳曰公欲定卒伍修甲兵大國亦將修之而小國設備則難以速得志矣乃作内政而寓軍令焉三分其國為二十一鄉工商之鄉六工商各三也二者不從戎役士鄉十五韋昭謂此士軍士也士十五鄉合三萬人是為三軍農野處而不暱不在都邑之數則下云五鄙是也參國起案以為三官臣立三宰工立三族市立三卿澤立三虞山立三衡作内政而寄軍令焉五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之居則為軌出則為征所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車也詩云小戎俴收四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之公將其一工商之鄉隷公國子帥五鄉焉高子帥五鄉焉三軍故有中軍之鼓有國子之鼓有高子之鼓春以蒐振旅秋以獮治兵是故卒伍整於里軍旅整於郊内教既承令勿遷徙夜戰聲相聞足以不乖晝戰目相視足以相識凡三軍教士三萬人車八百乗周制戎車一乗歩卒七十二人萬二千五百人為軍今齊車一乗五十人萬人為軍以齊法參周制車増三百乗徒損三萬人吳子云齊桓募士五萬人未詳如鄉之法制五鄙三十家為邑邑有司制野鄙之政此以下與郊内之政異十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬立五大夫各使治一屬焉立五正長也各使聽一屬焉是故正之政聽焉正五正聽大夫之治牧政聽縣牧五屬大夫聽縣帥之治下政聽鄉下政縣帥聽鄉帥之治自邑積至於五屬為四十五萬家率九家得一兵得甲十萬九十家一車得車五千乗可為三軍者四長勺之戰桓公自謂有帶甲十萬車五千乗葢斥地甚大非齊舊制如遂之法以通國之數而逓征之率車用六之一士用十之三大略依周變從輕便當時地廣參用王畿之制蘇氏曰嘗讀周官司馬法得軍旅什五之數其後讀管夷吾書又得管子所以變周之制葢王者之兵出于不得已而非以求勝敵也故其為法要以不可敗而已至于威文非決勝無以定霸故其法在必勝繁而曲者所以為不可敗地簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數奇而不齊是以知其所以為繁且曲也今夫天度三百六十均之十二辰得三十者此其正也五日四分之一者此其奇也使天度而無奇則千載之日雖婦人孺子皆可以坐而計唯其奇而不齊是故巧厯有所不能盡也聖人知其然故為之章會紀元以盡其數以極其變司馬曰五人為伍五伍為兩萬二千五百人而為軍二百五十十取三焉而為竒其餘七以為正四竒四正而八陣生焉夫以萬二千五百人而均之八陣之中宜其有奇而不齊者是以多為之曲折以盡其數以極其變鉤聨蟠屈各有條理故三代之興治其兵農軍賦皆數十百年而後得志于天下自周之亡秦漢陣法不復三代其後諸葛獨識其遺制以為可用以取天下然相持數歲魏人不敢決戰而孔明亦卒無尺寸之功豈八陣者先王所以為不可敗而非以逐利争勝者耶若夫管仲之制兵其可謂截然而易曉矣三分其國以為三軍五人為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥萬人為一軍公將其一高國將其二三軍三萬人如貫繩如畵棋局疎暢洞達雖有智者無所施其巧故法令簡一而民有餘力以致其死昔者嘗讀左氏春秋以為丘明最好兵法葢三代之制至于列國猶有存者以區區之鄭而魚麗鵞鸛之陣見于其書及至管仲陣法不少概見者何哉葢管仲欲以歲月服天下故變古司馬法而為是簡略速勝之兵是莫得而見其法也其後吳晉爭長于黃池王孫雄教夫差以三萬人壓晉壘而戰百人為行百行為陣行陣皆徹無有隱蔽援桴而鼓之勇怯盡應三軍皆讙晉師大駭卒于得志由此觀之不簡而直不可以決勝深惟後世不達繁簡之宜以取敗北而三代什伍之數與管子所以治齊之兵雖不可盡用而其近于繁而曲者以之固守近于簡而直者以之決戰則庶乎其不可敗而有所必勝矣周禮小司徒正義管子作内政寄軍令謂在鄉五家為比以營農事比長領之在軍五人為伍伍長領之在家閭胥領一閭在軍兩司馬領之在家為族師在軍為卒長在家為黨正在軍為旅師在家為州長在軍為師帥在鄉為大夫在軍為軍將是管子與周禮同制蕙田案以上齊變軍制春秋僖公二十八年左氏傳晉軍七百乗韅靷鞅靽注五萬二千五百人成公二年左氏傳臧宣叔如晉乞師主郤獻子晉侯許之七百乗郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乗許之注七百乗五萬二千五百人八百乗六萬人昭公十三年左氏傳晉成虒祁諸侯朝而歸者皆有貳心叔向曰諸侯不可以不示威七月丙寅治兵於邾南甲車四千乗羊舌鮒攝司馬遂合諸侯于平丘邾人莒人愬于晉晉侯不見公使叔向來辭曰寡人有甲車四千乗雖以無道行之必可畏也注四千乗三十萬人十疏計四千士卒成二四軍時晉國惟立三軍則甲車四千屬三軍耳其軍豈止一萬二千五百人乎蕙田案侯國出兵之多未有過於此者合諸侯為好會而出兵之數較宣王之伐玁狁又増千乗焉其僣也甚矣其下傳云鮮虞人聞晉師之悉起也葢合境皆起虐政之尤也文獻通考晉曲沃武公并翼僖王使虢公命曲沃伯以一軍為晉侯莊十六年獻公之十六年始作二軍公將上軍太子申生將下軍以滅耿滅霍滅魏惠公韓之敗作州兵僖十五年惠公獲晉呂甥言於衆曰征繕以輔孺子甲兵益多庶有益乎衆説晉于是乎作州兵五黨為州州二千五百家也率一家起五人則是一萬二千五百人古制也孔頴達曰周禮鄉大夫以歲時登其夫家之衆寡辨其可任者州長則否今以州長管人既少督察易精故使州長治之文公蒐于被廬作三軍僖公二十七年郤縠將中軍郤溱佐之狐毛將上軍狐偃佐之欒枝將下軍先軫佐之二軍則上軍為尊三軍則中軍為尊城濮之戰賦車七百乗五萬二千五百人案楚蒍啟疆曰晉十家九縣長轂九百其餘四十縣遺守四千而平公治兵邾南甲車四千乗則晉通國率亦五千乗用七百乗猶齊之法其後作三行以禦狄二十八年荀林父將中行屠擊將右行先蔑將左行成國不過三軍今復置三行以避天子六軍之名而實則為六軍案吳子晉文公始為前行四萬以獲其志意即三行清原之蒐遂作五軍三十年葢文公雖増置三行自知其僣故罷之更為上下新軍襄公蒐于夷文公六年舍二軍以復三軍之制景公邲之戰宣十二年三軍増置大夫各一人則猶三行也至鞌之戰成二年郤克請車八百乗始作六軍賞鞌之功上中下各増新軍成三軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿僣更王度若此厲公鄢陵之戰罷新上軍十六年悼公初尚四軍襄公八年楚伐鄭子展曰四軍無闕其後新軍無帥公使其什吏帥其卒乗官屬以從於下軍明年遂舍之襄十四年傳曰禮也成國不過半天子之軍葢自文公僣王度至悼公方革焉陳氏禮書春秋莊十六年王命曲沃伯以一軍為晉侯其後晉作三行以増上中下而當六軍則世衰禮廢諸侯僣天子不足怪也呂氏祖謙曰嘗聞周室軍旅之制乎一軍之制為人萬二千五百大國之三軍也地方百里而其人僅足以制三軍次國之二軍也地方七十里而其人僅足以具二軍小國之一軍也地方五十里而其人僅足以具一軍地有限則人有限人有限則軍有限雖欲僣侈亦窘于無人而不得騁矣王者于諸侯典禮陵節所當問也宮室改度所當問也樂舞踰數所當問也獨軍旅之制有所不必問王綱上舉侯度下修大不侵小强不犯弱地有常地人有常人軍有常軍雖欲如晉之僣豈可得哉晉之所以能僣六軍者適當周室失政之時南吞北噬以斥大其國増地必増人増人必増軍野曠則風勁川漲則舟髙國大則兵衆矣夫何疑耶既容其兼并而又責其軍制之僣是猶多與之財而責其奢多縱之酒而責之醉也何氏楷曰三代以前爵有五等天子之田方千里公侯百里伯七十里子男五十里地小易制力弱易使也周公始斥大土㝢廣其封公侯五百里伯三百里子男百里然其時猶以為五百乗三鄉所出千乗合境所出兵制之變始壞於齊之内政而家一人焉繼壊於晉之州兵而家五人焉長勺之戰桓公自謂帶甲十萬車五千乗楚薳啟疆謂晉十家九縣長載九百其餘四十縣遺守四千叔向亦謂寡君有甲車四千乗則兵制之増益於古可知矣蕙田案王國邦國皆外内有異别為二法邦國國中亦家出一人郊遂之外則甸出一乗詳見魯頌正義其後春秋時諸侯有軍至五者車至四千者何也一則兼併小弱一則以計地出兵之法概施之於境内故耳又案管子内政賈公彦謂其與周禮同制葢家出一人行之三鄉原無不可非異於周禮也惟桓公自言五千乗則奢僣甚矣又案以上晉變軍制春秋昭公四年左氏傳鄭子産作丘賦注丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦一疏服䖍以為子産作丘賦者賦此一丘之田使之出馬三牛復古法耳丘賦之法不行久矣今子産復修古法民以為貪故謗之案春秋之世兵革數興鄭在晉楚之間尤當其劇正當重于古不應廢古法也若往前不修此法豈得全無賦乎故杜以為今子産于牛馬之外别賦其田謂賦斂家資使出牛馬别賦其田使之出粟是一丘出兩丘之税蕙田案此鄭變軍制文獻通考楚自若敖蚡冒蓽路藍縷以啟山林武王始為軍政作荆尸以伐隨授師孑以立陳法莊四年楚武王荆尸授師孑焉以伐隨案宣十二年隨子論楚之兵曰荆尸而舉杜預曰荆楚也尸陳也楚武王始更此為陳法遂以為名孑鎗屬亦楚陳所利大抵陳中有利于長兵者有利于短兵者弓矢利逺是長兵孑是短兵葢楚參用孑為陳成王地方千里城濮之役僖二十八年子玉請戰王怒少與之師唯西廣東宮與若敖之六卒從之大抵皆非正軍制亦非古杜預注曰六卒子玉宗人之兵六百人言不悉以益之于時子玉既為令尹而乃請戰葢欲増兵耳若敖之六卒乃子玉家兵觀宣公四年楚子與若敖氏戰于臯滸敢于敵君戰則兵强可知穆王接晉文襄霸之後楚益强大時則嚴環衛之屬文元年傳潘崇掌環列之尹杜注宮衛之官列兵而環王宮又宣十二年傳内官序當其夜以待不虞注官當同環列之尹都君子王馬之屬所以親衛于王出入共之厥貉之會陳鄭及宋受役于司馬以田孟諸時則有右盂左盂兩甄之制文十年會于厥貉宋道楚子以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬杜注盂田獵陳名將獵張兩甄故置二左司馬葢期思公復遂一人為右司馬當中央則左司馬二人為兩甄矣兩甄猶言兩翼莊王霸强克庸以來文十六年無日不討國人而訓之于民生之不易在軍無日不討軍實而申儆之于勝之不可保逮邲之戰宣十二年軍制備矣葢兆於武王備於荘王傳莫詳焉三軍以為正軍傳曰楚子北師次于郔沈尹將中軍子重將左軍子反將右軍此三軍者葢正軍也是時孫叔敖為令尹秉政不在三軍之數如南轅反斾軍進退皆由之故知令尹為兼統三軍矣二廣以為親軍傳載欒武子言楚軍制曰其軍之戎分為二廣右廣初駕數及日中左受之至于昏内官序當夜鄭氏曰廣平橫陳之車杜預注二廣君之親兵案傳楚子分左右廣雞鳴而駕日中而説左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右王乗左廣以逐趙旃杜預注楚王更迭載之故各有御傳又曰王見右廣將從之乗屈蕩尸之曰君以此始亦必以終自是楚之乗廣先左葢左右二廣為王親軍右廣初駕以及日中左廣受之以及日入嘗在王側内官序當其夜若今之當更循環衛敵安當掩襲親軍之制詳矣僖二十八年西廣從之子玉時子玉專軍政故分西廣以屬之今邲之戰則二廣皆以侯王迭載其曰楚之乗廣先左杜預雖云以乗左得勝然實則楚人尚左故親軍分為二廣而王則乗左游闕以為游兵傳使潘黨率游闕四十乗從唐侯游闕葢游兵往來游補闕者觀兵陳何處為薄則從而補之所謂竒軍以防敗失由正軍中逐旋分出不係歩伍之數廣有一卒卒偏之兩傳曰廣有一卒卒偏之兩又曰楚子為乗廣三十乗分為左右司馬法百人為卒卒二十五人為兩車十五乗為大偏九乗為小偏其尤大者又有二十五乗之偏今一廣十五乗則古大偏之法而曰卒偏之兩者孔頴達謂兩廣之别各有一卒之兵者人也葢防正軍有敗則以偏卒易之正卒有闕則以偏卒補之於陳則分左右二拒傳工尹齊將右拒卒以逐下軍使潘黨率游闕四十乗從唐侯以為左拒以從上軍亦猶鄭二拒葢楚子在中軍與晉中軍相對臨戰分此二拒右拒當晉下軍左拒當晉上軍故杜預謂為陳名矣調卒之法商農工賈不敗其業卒乗輯睦不奸於事行軍之典則右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備軍行右轅左追蓐凡兵車有甲士有歩卒甲士在車不供碎役分歩卒為前左右三處兵車一轅服馬夾之而言夾轅者歩卒分被左右者軍行時又分之在兩廂挾轅以為戰備傳曰令尹南轅又曰改乘轅楚陳以轅為主以轅表車正是挾車嚴兵以備不虞其應左右者使之追歩草蓐令離道求草不近兵車蓐謂卧止之草以為宿備豫定左右之别在道分使之故云軍行至于對陳則在車左右前茅慮無爾雅曰茅明也在前者明為思慮所無之事恐卒有非常則預告軍衆使知而為備如今軍行令人逺在軍前斥度候望虞有伏兵使蹹行之持以綘及白為幡與軍人為私號曲禮前有水則載青旌之類是也中權是中軍大將軍進退之權三軍之心在此權者謂謀之高下輕重皆當後勁以精兵為殿後世勁兵多在前或被擊敗則後無應勁兵之後此最良法百官象物而動物猶類也謂旌旗畵物類也百官尊卑不同蒙其所建之物而行動軍之政教不待號令而自備周禮大司馬仲秋教治兵辨旗物之用王載太常諸侯載旂軍吏載旗師都載旃鄉遂載物郊野載旐百官載旟凡旗有軍衆者畵異物無者帛而已尊卑所建各有物類此云象物而動謂軍行時當指治兵之法行軍之翼日則輜重至乙卯王乘左廣以逐趙旃及昏楚師軍於邲晉之餘師不能軍丙辰楚重至於邲杜注輜重也楚輜重嘗後正軍一日葢楚軍有法輜重若與正軍過逺則有邀擊之患過近則重兵纔亂正軍亦潰後世用兵先擊輜重取勝者多葢以非太近則太逺以是知楚輜重逺大兵一日為得宜也凡此皆軍政之善者也若共王之世公子嬰齊為簡之師組甲被練皆創名之襄三年傳楚子重伐吳為簡之師使鄧廖帥組甲三百被練三千簡謂選擇也杜預注組甲被練皆戰備也組甲漆甲成文被練練袍賈云組甲以組綴甲車士服之被練帛也以帛綴甲歩卒服之呂祖謙曰組甲被練皆擇兵之精者被練若今之軟纒之類康王以蒍掩為司馬始井衍沃牧隰臯賦車籍馬而有車兵徒兵甲楯之數襄二十五年楚蒍掩為司馬子木使庀賦數甲兵掩書土田牧隰臯井衍沃量入脩賦賦車籍馬賦車兵徒卒甲楯之數既成以授子木靈王斥地益大陳蔡不羮邑賦千乘於是有五帥左氏傳吳人敗諸豫章獲其五帥平王簡上國東國之兵都外都師精練有法至若戍丁則若申息之子弟僖二十八年楚子入居于申子玉城濮之敗王使謂之曰大夫若入其若申息之老何杜預曰申息二邑子弟皆從子玉而死士兵則若都君子校人則若王馬之屬昭二十七年傳左司馬戍帥都君子與王馬之屬以濟師杜注在都邑之士有復除者賈逵云平常免其行役事急乃使之耳君子既有士則不調發唯吳楚多有此事急則從如越有君子六千人是也王馬之屬王養馬官屬校人之類凡此皆以急調役非常法也其為舟師以待吳寇而卒莫能以得志故曰吳用木也我用革也楚用舟師自康王始考之經傳吳自成七年吳入州來暨共王卒繼侵楚明年敗楚于臯舟之隘自吳利在舟師楚懼無以敵吳後十年康王始為舟師以備吳强而吳乃滅巢昭王時救潜之役令尸子常以舟師及河汭而還竟無成功其後囊瓦伐吳師于豫章吳人見舟豫章而潜師于巢遂敗楚師入郢之後吳太子終纍又敗楚舟師獲其帥葢楚雖以備吳置舟師而實莫能勝亦地形用便有不同耳蕙田案此楚變軍制右春秋邦國軍制之變五禮通考卷二百三十五
