body:
  text: 五禮通考卷一百四十刑部尚書秦蕙田撰嘉禮十三朝禮宋書禮志漢以髙帝十月定秦且為歲首至武帝雖改用夏正然朔猶常饗會如元正之儀魏晉則冬至日受萬國及百寮稱賀因小會其儀亞於歲旦晉有其注晉書樂志冬至初歲小會歌張華日月不留四氣回周節慶代序萬國同休庻允羣后奉夀升朝我有夀禮式宴百寮繁肴綺錯㫖酒泉渟笙鏞和奏磬管流聲上隆其愛下盡其心宣其壅滯訓之徳音乃宣乃訓配享交泰永戴仁風長撫無外邱氏濬曰案此後世冬至行朝賀禮之始蔡邕獨斷曰冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀宋人於五月朔亦賀非是蕙田案冬至朝賀於古無聞至魏晉始有之據晉宋禮志則是因漢有十月享會始移之冬至而漢儀無之也然蔡邕獨斷已有冬至陽氣起君道長故賀之説則似後漢先有之矣宋書禮志宋永初元年八月詔曰慶冬使或遣不役宜省今可悉停惟元正大慶不得廢耳郡縣遣冬使詣州及都督府者亦宜同停冊府元龜後魏孝文太和十五年十一月丙戌初罷小歲賀小歲謂冬至蕙田案隋禮儀志後齊天保元年皇太子監國在西林園冬會二年於北城第内冬會則後齊亦有冬會之禮而儀注未聞隋書禮儀志隋制正旦及冬至文物充庭蕙田案隋志全文已見正旦朝賀門不重載唐六典凡冬至大陳設如元正之儀其異者皇帝服通天冠無諸州表奏祥瑞貢獻冊府元龜開元八年十一月中書門下奏曰伏以冬至一陽初生萬物潛動所以自古聖帝明王皆於此日朝萬國視雲物禮之大者莫逾是時其日亦祀圜丘皆令攝官行事質明既畢日出視朝國家以來更無改易縁新格將其日祀圜丘遂改用小冬至日受朝若親拜南郊受朝須改既令攝祭禮不可移伏請改正從之因勅自今冬至日受朝永為常式十六年十一月乙巳日南至御含元殿受朝賀如常儀唐開元禮皇帝皇后正至受皇太子朝賀皇帝皇后正至受皇太子妃朝賀皇帝正至受羣臣朝賀蕙田案開元禮於開元二十年頒行其儀注全文已見正旦朝賀門惟冬至賀詞稱天正長至伏惟陛下如日之升宣制稱履長之慶皇帝受朝服通天冠絳紗袍不奏祥瑞貢物無諸方表為不同耳今不重載冊府元龜二十二年閏十一月壬午朔日有食之是日長至停朝癸未御應天樓受朝賀文獻通考天寶三載十一月五日甲子冬至勅伏以昊天上帝義在尊嚴恭惟祀典毎用冬至既於是日有事圜丘更受朝賀實深兢愓自今以後冬至宜取以次日受朝仍永為常式蕙田案冬至既祀圜丘復受朝賀煩勞非體攝而行事尢非敬天之義不如以次日受朝為便冊府元龜天寶十載十一月丙午冬至御觀風樓受朝賀肅宗乾元元年建子月戊戌冬至受朝賀禮畢朝聖皇於西宫二年十一月丁亥冬至帝朝聖皇於興慶宫翌日受朝於含元殿代宗廣徳二年十一月甲寅是日長至御含元殿受朝賀永泰元年十一月己未長至御含元殿受朝賀仗衛如常儀二年十一月甲子長至含元殿下制大赦改元大歴宣制畢乃受朝賀大歴二年十一月己巳長至御含元殿受朝賀仗衛如常儀三年十一月甲戌長至御含元殿受朝賀仗衛如常儀八年閏十一月壬寅朔冬至御含元殿受朝賀仗衛如常儀九年十一月甲戌長至御含元殿受朝賀仗衛如常儀十年十一月丙午長至詔停賀邇梁王葬期也十一年十一月丁巳冬至御含元殿受朝賀仗衛如常儀十三年十一月丁夘長至命有司祀昊天上帝於南郊不視朝戊辰上御含元殿朝賀仗衛如常儀德宗建中元年十一月丁丑日南至戊寅御含元殿受朝賀文獻通考建中二年十一月二十日勅宜以冬至日受朝賀冊府元龜貞元七年十一月丁亥日南至不視朝十一年十一月丙辰日南至不受朝賀十五年十一月罷冬至朝賀以興兵討蔡州吳少誠也十六年十一月罷冬王朝賀以襄王第五男薨廢朝憲宗元和三年十一月甲申日南至權停朝賀六年十一月乙巳勅令今年冬至朝賀宜權停八年十一月庚戌朔勅權停冬至朝賀穆宗長慶元年十一月丁酉以討鎮州權停今年冬至朝賀文宗太和八年十一月庚申日南至宰臣率百寮等奉賀如常儀後唐莊宗同光元年十一月丁未日長至帝不受朝賀百官詣東上閤門拜表稱慶議者以為長至元會歲中之大朝斯為盛禮著於令式是日合陳樂懸排細仗一人當陽昭國容也兵興以來而斯禮或闕帝初一函夏不復唐典無故輟禮議者惜之明宗天成元年十一月癸亥日南至帝御文徳殿百竂稱賀二年十一月戊辰日南至百官詣閤門拜表稱賀三年十月壬戌中書奏案貞元四年中書侍郎李泌奏冬至日受朝賀請准元日從之十一月癸酉冬至帝御崇元殿受朝賀仗衛如式四年十一月己夘日長至帝御文明殿受朝賀樂懸仗衛如常儀長興元年十一月庚申日長至帝御文明殿受朝賀樂懸仗衛如常儀二年十一月己丑日長至帝御文明殿百竂稱賀三年十一月甲子日長至帝御文明殿百竂稱賀末帝清泰元年十月庚子太常言冬至不視朝百竂表賀是日太府設表案席褥禮部進表至閤門班首一員跪奉表授閤門使羣臣俱拜舞蹈訖表入久之閤門使出宣曰履長之慶與卿等同之羣臣復拜舞訖而退晉髙祖天福三年十一月丙寅冬至帝御崇元殿受朝賀五年十一月冬至帝受朝於崇元殿王公上夀列二舞於樂懸之北舉觴奏元同之樂三爵奏文同之樂帝舉食文武歌昭徳之舞又歌成功之舞上舉四爵登歌作羣臣飲懸下樂作又奏龜茲樂一部以俟食畢周太祖廣順二年十一月己夘日南至帝御崇元殿羣臣服朝服稱賀退班於永福殿庭上夀賜羣臣酒三爵而罷三年十一月乙酉日南至帝不受朝賀羣臣閤門拜表班退賜茶酒世宗顯徳元年十一月庚寅日南至帝不御殿文武百竂詣閤拜表稱賀三年十一月庚子日南至帝不御殿以宣懿皇后之䘮在近故也宰臣率百官詣閤門拜表稱賀五年十一月辛亥日南至帝御崇元殿受朝賀金吾仗衛太常樂懸如儀禮畢宰臣率百竂常服詣永徳殿上夀而退宋史禮志宋承前代之制以元日五月朔冬至行大朝會之禮文獻通考太祖建隆元年十一月冬至上親征揚州不受朝宰臣率百官詣行宫拜表稱賀乾德三年冬至受朝賀於文明殿帝服通天冠絳紗袍設宫懸仗衛如元會四年冬至朝元殿受朝畢常服御大明殿羣臣上夀始用雅樂登歌二舞羣臣酒五行而罷毎行酒太官令奏巡周饋食稱食徧宋史太宗本紀太平興國二年十一月庚寅日南至帝始受朝樂志太平興國二年冬至上夀復用教坊樂真宗本紀咸平三年十一月辛夘日南至御朝元殿受朝景德四年十一月戊辰日南至御朝元殿受朝仁宗本紀天聖七年十一月癸亥冬至率百官上皇太后夀於會慶殿遂御天安殿受朝明道元年冬十一月己夘冬至率百官賀皇太后於文徳殿御天安殿受朝禮志神宗元豐元年龍圖閣直學士史館修撰宋敏求上朝會儀二篇令式四十篇詔頒行之蕙田案元正冬至大朝會儀注一篇已載正旦朝賀門其異於元正者惟不設貢物給事中位祥瑞案臣僚致詞則云晷運推移日南長至宣答則云履長之慶耳又案文獻通考太祖乾徳三年四年五年開寶二年三年太宗太平興國二年端拱元年淳化四年真宗咸平三年景德四年大中祥符八年仁宗天聖七年明道元年神宗熙寧二年徽宗政和二年並冬會終汴京冬至朝賀之禮凡十五舉而已陳隨隠上夀拜舞記凡冬至朝賀一十三拜一舞蹈初百官面西立儀仗以下起居知閤次之次讀奏自舍人宣班首以下起居稱賀北面躬身聽贊拜兩拜起舞蹈如初起躬身俟班首奏聖躬萬福聽贊拜兩拜起直身立俟樞密升殿班首致詞宣答如正旦禮王圻續通考理宗寶慶二年十一月日南至御大慶殿受朝端平二年十一月日南至羣臣朝賀遼史禮志冬至朝賀儀臣僚齊班如正旦儀皇帝皇后拜日臣僚陪位再拜皇帝皇后升殿坐契丹舍人通臣僚入合班親王祝夀宣答皆如正旦之儀謝訖舞蹈五拜鞠躬出班奏聖躬萬福復位再拜鞠躬班首出班俛伏跪祝夀訖伏興舞蹈五拜鞠躬贊各祗候分班不出合班御牀入再拜鞠躬贊進酒臣僚平身引親王左階上殿就欄内褥位搢笏執臺琖進酒皇帝皇后受琖訖退就褥位置臺琖出笏俛伏跪少前自通全銜臣某等謹進千萬歲夀酒俛伏興退復褥位再拜鞠躬殿下臣僚皆再拜鞠躬宣答如正旦儀親王搢笏執臺琖分班皇帝皇后飲酒奏樂殿上下臣僚皆拜稱萬歲夀樂止教坊再拜臣僚合班親王進受琖至褥位置臺琖出笏引左階下殿御牀出親王復丹墀位再拜鞠躬贊祗候分班引出班首右階上殿奉表目進奏諸道進奉教坊進奉訖賛進奉收班首舞蹈五拜鞠躬贊各祗候班首出臣僚復入合班謝舞蹈五拜鞠躬贊各祗候分班引出聲警皇帝皇后起赴北殿皇太后於御容殿與皇帝皇后率臣僚再拜皇太后上香皆再拜贊各祗候可矮墩以上上殿皇太后三進御容酒陪位皆拜皇太后升殿坐皇帝就露臺上褥位親王押北南臣僚班丹墀内立皇帝再拜臣僚皆拜鞠躬皇帝欄内跪祝皇太后夀訖復位再拜凡拜皆稱萬歲贊各祗候臣僚不出皇帝皇后側坐親王進酒臣僚陪拜皇太后宣答皆如正旦之儀臣僚分班不出班首右階上殿奏表目合班謝宣宴上殿就位如儀御牀入皇帝進皇太后酒如初各就坐行酒宣飲盡如皇太后生辰之儀皇后進酒如皇帝之儀三進酒行茶教坊致語行殽饍大饌七進酒曲破臣僚起御牀出謝宴皆如皇太后生辰儀蕙田案遼冬至朝賀儀畧同正旦惟帝后並升殿坐與正旦異元朝賀禮葢本於此太宗本紀會同四年冬十一月壬午以冬至受賀著令穆宗本紀應歴十八年十一月癸夘冬至被酒不受賀道宗本紀清寧元年冬十一月戊寅冬至有事於太祖景宗興宗廟不受羣臣賀蕙田案金史禮志無冬至受朝賀之禮惟章宗本紀承安元年十一月戊戌有事於南郊大赦改元己亥曹王永升率親王百官賀然此以南郊禮成受賀非冬至受賀也冬會之禮終金之世竟未之行也又案元史禮志亦無賀冬之禮惟元正天夀受賀而已徧檢諸帝紀亦無之則元亦未行冬會之禮也明太祖實録洪武元年定冬至朝會儀蕙田案冬至朝賀儀注與正旦同其致詞則云律應黄鐘日當長至宣制則云履長之慶郭正域典禮志五年八月命罷天下進賀冬至表箋太祖實錄十二年十一月癸丑冬至以孝慈皇后䘮帝常服御奉天殿百官常服行五拜禮續文獻通考二十六年六月壬寅命禮官重定正旦冬至朝會儀詳見正旦朝賀門永樂二十二年十一月庚寅禮部尚書吕震奏冬至節請御正殿受賀帝以山陵未終不許時仁宗已即位天順五年十一月丁未以冬至萬夀節同日改致詞宣表等儀明會典𢎞治十七年奏准今後天下都布按三司慶賀表箋除萬夀聖節照例差委堂上官齎進外其餘冬至等節如果堂上官差占照例於本司首領官及所屬府縣衛所佐貳官員内差委不許濫差雜職官員齎進孝宗實錄𢎞治十七年十一月癸巳冬至御奉天門百官致詞行禮以太皇太后䘮武宗實錄正德十二年十一月辛丑冬至帝在宣府羣臣朝服於奉天門行遥賀禮十四年十一月冬至帝在清江浦受賀於太監張陽第明會典冬至大祀禮成儀嘉靖七年定上大祀慶成駕還百官具朝服於承天門外橋南立迎駕隨至奉天殿丹墀内侍立執事官先至華葢殿前東西拱立候上御華葢殿具衮冕服陞座鴻臚寺堂上官跪奏執事官行禮鳴贊贊入班鞠躬五拜叩頭興平身各供事鴻臚寺堂上官跪奏請陞殿教坊司樂作上御奉天殿陞座樂止錦衣衛官傳鳴鞭鴻臚寺堂上官傳排班鳴贊贊排班班齊鞠躬四拜興平身贊跪鴻臚寺堂上官於丹陛中道跪致詞曰公侯駙馬伯文武百官某官臣某等恭惟圜丘大報載成禮當慶賀致詞畢由殿東門入殿内侍立鳴贊贊俯伏興鞠躬樂作四拜興平身樂止鴻臚寺堂上官於殿内跪奏禮畢𫝊贊禮畢錦衣官傳鳴鞭上還宫百官退嘉靖九年分祀二郊以冬至大報是日行慶成禮次日行冬至朝賀禮畢舉慶成宴本年再定次日上詣内殿行節祭禮又詣母后前行賀禮畢始御奉天殿受賀蕙田案慶成禮始於洪武十二年以後葢孟春元日合祀天地於南郊還御正朝受賀也世宗追復洪武初年之制分祀天地則惟冬至行郊天禮而元日無之故慶成禮專行於冬至考世宗分祀之詔起於九年二月是此條會典所載屬九年者甚是而前條云冬至大祀禮成儀嘉靖七年定則誤矣七年歲首尚有大祀而不在冬至若指歲首大祀言則自洪武十二年以來未之有改不待嘉靖七年始定矣世宗實錄十四年十一月乙亥冬至次日帝御奉天殿羣臣公服行慶賀禮王府邊鎮四夷所進表文方物皆免陳設宣奏續文獻通考十六年更定正旦冬至禮詳見正旦門大政紀十七年十月辛酉定冬至日大祀次日廟享行慶賀禮毎歲冬至節帝祀圜丘還御殿百官行慶成禮即日百官仍賀冬至賜慶成宴是年十一月二十一日冬至禮官遵奉定儀預請習儀帝已俞之矣尋諭内閣朕連日復思慶賀事宜有失次第心甚不安卿等可即會禮官令二十一日朕囘謁祖考畢依原擬受大祀慶成賀不宜同日並受至日之賀二十二日清晨朕於内殿行祭禮畢出受至日賀囘宮俟設宴畢停當行大宴禮自是以後遂為定制云蕙田案冬至行慶成禮次日行冬至朝賀會典及郭正域典禮志及明史禮志皆然今考實録於九年冬至日止言羣臣行慶成禮不言次日朝賀而十二年之以疾免賀十三年之行慶賀禮十四年之公服行禮則皆在冬至之次日葢十七年以前已有次日慶賀之事而十五年則云冬至日免百官慶賀十六年則云冬至日以足疾免朝賀其云冬至日者猶言冬至節耳非定指本日而言葢記者行文之畧耳非前後不同也至十七年之詔因以前次日行禮固未著之為令至是年而始定歟明世宗實錄二十五年十一月壬申禮部請冬至仍於奉天門行禮尚書費寀言積雪初霽天氣凝寒冬至朝賀恐煩聖躬請如昨歲例臣等朝服於奉天門行禮少伸臣子拜祝之忱帝以其言為忠敬報可右冬至朝賀蕙田案古者有上夀之辭無賀生辰之禮詩稱躋彼公堂稱彼兕觥萬夀無疆又云虎拜稽首天子萬夀人臣受恩於君無以報稱惟有祝君夀考而已至生日之説自古無之惟隋髙祖仁夀二年詔六月十三日是朕生日宜令海内為武元皇帝元明皇后斷屠唐太宗亦以生日幸慶善宫賦詩賜宴是帝皇稱生日之始然未置酒稱賀至𤣥宗因源乾曜張説之請以生日為千秋節御花萼樓受賀然御花萼樓則尚非正衙也且終唐之世惟穆宗文宗復行之其餘諸帝率集沙門道士講論祈福不稱賀也五代晉漢周亦舉上夀故事宋世聖節上夀或在紫宸殿或在垂拱殿或在崇徳殿較之正冬御乾元殿其禮猶殺也金史以元日聖誕上夀并為一儀則與元正禮等元明以來葢承用之唐宋遼金毎一帝必别立節名元則稱天夀節或云聖誕節明則惟稱萬夀節焉冊府元龜唐𤣥宗以垂拱元年八月五日生於東都開元十七年八月癸亥以降誕之日大置酒張樂宴百寮於花萼樓下終宴尚書左丞相源乾曜右丞相張説率文武百官等上表曰臣聞聖人出則日月記其初王澤深則風俗傳其後故少昊著流虹之感商湯本元鳥之命孟夏有佛生之供仲春修道祖之籙追始樂原其義一也伏惟開元神武皇帝陛下二氣合神九龍浴聖清明總於玉露爽朗冠於金天月惟仲秋日在端午常星不見之辰祥光照室之期羣臣相賀曰誕聖之辰也焉可不以為嘉節乎比夫曲水禊亭重陽射圃五日綵線七夕粉筵豈同年而語也臣等不勝大願請以八月五日為千秋節著之甲令播於天下咸令宴樂休暇三日羣臣以是日獻甘露醇酎上萬歲夀酒王公戚里進金鏡綬帶士庻以絲結承露囊更相遺問村社作夀酒宴樂名為賽白帝報田神上明元天光啟大聖下彰皇化垂裕無窮異域占風同見美俗帝手詔報曰凡是節日或以天氣推移或因人事表記八月五日當朕生辰感先聖之慶靈荷皇天之眷命卿等請為令節上獻嘉名勝地良游清秋髙興百榖方熟萬寶以成自我作古舉無越禮朝野同歡是為美事依卿來請宣付所司王氏欽若等曰誕聖節名始於此舊唐書元宗本紀開元十八年秋八月丁亥上御花萼樓以千秋節百官獻賀唐六典凡千秋節皇帝御樓設九部之樂百官袴褶陪位上公稱觴獻夀開元禮皇帝千秋節受羣臣朝賀并會前三日所司供備如式前一日尚舍鋪御座内外張設並如常御樓之儀尚舍光禄供辦如式尚舍先置夀罇於樓上御座之東又置夀罇於樓前之東南皆有盞單其日平曉陳引仗衛如常儀百官常服咸就横街南依東西班序立侍中版奏外辦皇帝常服御座候褰簾通事舍人引羣官詣横街北夀罇之南俱北面中書門下及供奉官如常式立定典儀贊再拜横街南北百官俱再拜訖尚食奉御酌夀酒以授殿中監殿中監以授侍中侍中執酒以立殿中監受侍中之酒侍中執笏稍前跪奏稱千秋令節臣等不勝大慶謹上千萬歲夀奏訖興再拜羣臣上下皆再拜内所司酌夀罇之酒以進皇帝受酒承制宣云得卿等夀酒與卿等内外同慶皇帝舉酒羣官上下又再拜三呼萬歲舞蹈又再拜訖詣座所太官令酌酒以進侍中執酒以出羣官等俱出謝酒訖就座太常卿引樂作止如常儀其横街南羣官應有常食者引就座如式餘退其羣官所