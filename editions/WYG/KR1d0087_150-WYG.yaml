從人起曲破臣僚使副起餘皆如正旦之儀太宗本紀天顯三年冬十月甲子天授節上御五鸞殿受羣臣及諸國使賀會同四年十一月以永寧天授二節並受賀著令穆宗本紀應歴十四年秋八月戊申以生日值天赦不受賀十七年八月辛酉生日以政事令阿不底病亟不受賀聖宗本紀統和元年冬十二月戊申千齡節祭日月禮畢百僚稱賀二十七年冬十二月辛夘皇太后崩於行宫己酉詔免賀千齡節金史禮志元日聖誕上夀儀具元旦朝賀門蕙田案上夀儀與元日同惟致詞則云萬春令節謹上夀巵伏惟皇帝陛下萬歲萬歲萬萬歲宣答云得卿夀酒與卿等内外同慶熙宗本紀皇統三年正月乙巳萬春節如正旦儀世宗本紀大定二十八年三月丁酉朔萬春節御慶和殿受羣臣朝復宴於神龍殿諸王公主以次捧觴上夀上驩甚以本國音自度曲葢言臨御久春秋髙𣺌然思國家基緒之重萬世無窮之託以戒皇太孫當修身養德善於持守及命太尉左丞相克寧盡忠輔導之意於是上自歌之皇太孫及克寧和之極驩而罷章宗本紀明昌元年九月壬子朔天夀節以世宗䘮不受朝二年九月丁未朔天夀節以皇太后䘮不受朝三年九月庚午朔天夀節以皇太后䘮不受朝四年九月甲子朔天夀節御大安殿受親王百官及宋髙麗夏使朝賀承安二年秋七月戊辰天夀節御紫宸殿受朝宣宗本紀貞祐四年二月戊戌免親王公主長春節入賀致禮興定元年二月庚戌諭㫖曰時方多難將來長春節亦免賀禮三年二月己夘長春節免朝賀四年三月癸夘長春節詔免朝五年三月戊戌長春節免朝元光二年三月丙辰長春節免朝哀宗本紀天興二年九月乙未萬年節州郡以表來賀二十餘所元史世祖本紀至元八年八月己未聖誕節初立内外仗及雲和署樂位十一月乙亥劉秉忠及王磐圗克坦履等言元正朝會聖誕詔赦及百官宣勅具公服迎拜行禮從之禮樂志天夀聖節受朝儀如元正儀世祖至元八年秋八月己未初起朝儀先是至元六年春正月甲寅太保劉秉忠大司農博羅奉㫖命趙秉温史扛訪前代知禮儀者肄習朝儀既而秉忠奏曰一人習之雖知之莫能行也得㫖許用十人遂徴儒生周鐸劉允中尚文岳忱闗思義侯祐賢蕭琬徐汝嘉從亡金故老烏固倫居貞完顔復昭完顔從愈葛從亮于伯儀及國子祭酒許衡太常卿徐世隆稽諸古典參以時宜沿情定制而肄習之百日而畢秉忠復奏曰無樂以相須則禮不備奉㫖搜訪舊教坊樂工得杖鼓色楊皓笛色曹楫前行色劉進教師鄭忠依律運譜被諸樂歌六月而成音聲克諧陳於萬夀山便殿帝聽而善之秉忠及翰林太常奏曰今朝儀既定請備執禮員有㫖命丞相安圗大司農孛羅擇䝉古宿衛士可習容止者二百餘人肄之期月七年春二月奏以丙子觀禮前期一日布綿蕝金帳殿前帝及皇后臨觀於露階禮文樂節悉無遺失冬十有一月戊寅秉忠等奏請建官典朝儀帝命與尚書省論定以聞八年春二月立侍儀司以呼圗克伊蘓額森乃為左右侍儀奉御趙秉温為禮部侍郎兼侍儀司事周鐸劉允中為左右侍儀使尚文岳忱為左右直侍儀事關思義侯祐賢為左右侍儀副使蕭琬徐汝嘉為僉左右侍儀事烏固倫居貞為承奉班都知完顔復昭為引進副使葛從亮為侍儀署令于伯儀為尚衣局大使夏四月侍儀司奏請製内外仗如歴代故事從之秋七月内外仗成遇八月帝生日號曰天夀聖節用朝儀自此始成宗本紀元貞二年秋九月辛未聖誕節帝駐蹕安同泊受諸王百官賀大德二年秋九月己丑聖誕節駐蹕阻媯之地受諸王百官賀三年秋九月癸未聖誕節駐蹕古柵受諸王百官賀九年秋九月戊申聖誕節帝駐蹕於夀寧宮受朝賀文宗本紀至順元年春二月中書省臣言舊制正旦天夀節内外諸司各有贄獻頃者罷之今江浙省臣言聖恩公溥覆幬無疆而臣等殊無補報凡遇慶禮進表稱賀請如舊制為宜從之順帝本紀至元十九年夏四月以天下多故却天夀節朝賀詔羣臣曰朕方今宜敬天地法祖宗以自修省朕初度之日羣臣毋賀庚午左丞相太平暨文武百官奏曰天夀節朝賀乃臣子報本實合禮典今謙讓不受固陛下盛德然今軍旅征進君臣名分正宜舉行不允壬申皇太子復率羣臣上奏曰朝賀祝夀是祖宗以來舊行典故今不行有乖於禮帝曰今盜賊未息萬姓荼毒正朕恐懼修省敬天之時奈何受賀以自樂乙亥御史大夫特哩特穆爾復奏曰天夀朝賀之禮葢出於臣子之誠伏望陛下曲狥所請若朝賀之後内廷燕集特賜除免亦古者人君减膳之意仍乞宣示中書使内外知聖天子憂勤惕厲至於如此帝曰為朕缺於修省以致萬姓塗炭今復朝賀燕集是重朕之不德當候天下安寧行之未晚卿等其無復言卒不聽王圻續通考洪武元年定朝賀儀凡冬至聖節朝會宴享皆同其聖節致詞皇太子則云兹遇父皇陛下聖誕之辰謹率諸弟某等敬祝萬萬歲夀丞相則云兹遇皇帝陛下聖誕之辰謹率文武百僚敬祝萬萬歲夀不傳制明太祖實録五年八月庚辰帝曰正旦為歲之首天運維新人君法天出治禮亦宜之生辰冬至於文繁矣昔唐太宗謂生辰是父母劬勞之日况朕皇考皇妣早逝每於是日不勝悲悼忍受天下賀乎宜皆罷之王圻續通考洪武十三年九月上以古人父母既沒生日當倍悲痛即位以來常不受賀至是李善長等累請乃許之其在位諸司五品以上者自明年始聽其表賀明會典萬夀聖節百官朝賀儀洪武二十六年定儀與正旦冬至同但致詞云恭惟皇帝陛下萬夀令節臣某等誠懽誠忭敬祝萬萬歲夀不傳制凡進表箋洪武二十六年定天夀聖節在外五品以上衙門止進表文一通續文獻通考天順五年十一月丁未以冬至萬夀節同日改致詞宣表等儀禮部言二節慶賀致詞各異又冬至傳制聖節不傳制今請通致詞曰兹遇律應黄鐘日當長至恭惟皇帝陛下萬夀聖節膺乾納佑奉天永昌臣某等誠懽誠忭敬祝萬萬歲夀然後惟以冬至制詞傳答羣臣其各王府及在外文武衙門二節賀表若前後宣讀不無重􅃨請通宣表目又通宣表文曰忻逢長至恭遇聖旦其在外文武衙門至日行告天祝夀禮宜曰今兹冬至恭遇聖旦聖夀益増從之明會典𢎞治十七年敬皇帝萬夀聖節以孝肅太皇太后山陵襄事百官服錦繡於奉天門行五拜三叩頭禮正德十六年肅皇帝萬夀聖節以武宗山陵未畢令天下齎進表文並公侯駙馬伯儀賓進賀綵縀俱免宣讀陳設嘉靖二年肅皇后萬夀聖節以孝惠皇太后服制未滿先期免習儀至日早於奉先殿行孝慈髙皇后忌辰祭禮畢上服黄袍御奉天殿錦衣衛設鹵簿大駕如常儀鳴鐘鼓鳴鞭教坊司作樂文武百官具朝服先行四拜禮致詞又四拜免雞唱山呼舞蹈等禮表文綵縀免宣讀陳設世宗實錄嘉靖十四年八月中萬夀聖節禮部請先期習儀詔以廟建未成祖考未安朕生辰豈宜受賀至日止常服御殿如朔望日儀禮部又請是日教坊司設樂於奉天門北面百官公服鴻臚寺仍具班首官名致詞行五拜禮其表文方物俱免陳設從之右聖節朝賀五禮通考巻一百四十
