body:
  text: 五禮通考卷二百四十刑部尚書秦蕙田撰軍禮八校閲蕙田案古者寓兵於農有校閲之禮有田獵之禮考周禮大田之禮簡衆也又云聴師田以簡稽春而振旅夏而茇舍秋而治兵冬而大閲非徒以饁禽取獸供賔客宗廟之用而已葢安不忘危講武之儀即寓於游田之内故校閱即田獵田獵即校閱二者不可分也然觀月令講武飭事之文則其事亦有不為田獵者即康成注亦未嘗與冬狩混而為一也至春秋一經所書大閱治兵之事尤多葢列國多故臨戰而習武以是為權禮焉漢唐以下其事益分古今異宜無容泥古也今分為二門而於大司馬四時之狩悉歸之田獵云春秋莊公八年公羊傳治兵者何出曰治兵入曰振旅其禮一也皆習戰也國語周語三時務農而一時講武故征則有威守則有財蕙田案以上總論禮記月令孟冬之月天子乃命将帥講武習射御角力注為簡習之亦因營室主武士也仲冬之月飭死事注飭軍士戰必有死志必疏因死氣之盛以飭軍士使戰者有死志故曰飭死事也蕙田案以上王畿校閲之禮春秋桓公六年秋八月壬午大閲杜注齊為大國以戎事徵諸侯之戍嘉美鄭忽而忽欲以有功為班首怒而訴齊人魯人懼之故以非時簡車馬疏公狩于郎公狩于禚皆書公大蒐大閲不書公者周禮雖四時教戰而遂以田獵但蒐閲車馬未必皆因田獵田獵従禽未必皆閲車馬何則怠慢之主外作禽荒豈待教戰方始獵也公及齊人狩于禚乃與鄰國共獵必非自教民戰以矢魚于棠非教戰之事至為游戯而斥言公則狩于郎禚亦主為游戯故特書公也大蒐大閲國家之常禮公身雖在非為游戯如此之類例不書公定十四年大蒐于比蒲邾子來會公公身在蒐而經不書公知其法所不書以其國家大事非公私欲故也且比蒲昌間皆舉蒐地此不言地者葢在國簡閲未必田獵昭十八年鄭人簡兵大蒐在于城内此亦當在城内左氏傳秋大閱簡車馬也公羊傳大閲者何簡車徒也何以書葢以罕書也注大簡閱兵車使可任用而習之也比年簡徒謂之蒐三年簡車謂之大閲五年大蒐車徒謂之大蒐穀梁傳大閲者何閲兵車也修教明諭國以道也平而修戎事非正也注因四時田獵以習用戎事平謂不因田獵無事而修之蕙田案杜預以大閲為因事習武何休以大閱為五年定制二説不同然皆以為與田獵異事書之於策非有所譏也觀孔氏正義自明乃穀梁以為非正范甯以不因田獵貶之恐非經意莊公八年春王正月師次于郎以俟陳人蔡人甲午治兵杜注治兵于廟習號令将以圍郕兵疏周禮仲春教振旅仲秋教治兵穀梁云出曰治習戰也入曰振旅習戰也釋天云出為治兵尚威武也入為振旅定尊卑也孫炎云出則幼賤在前貴勇力也入則尊老在前復常法也彼言治兵振旅皆謂因田獵而選車徒教戰法習號令知此治兵亦是習號令此治兵于廟欲就尊嚴之處使之畏威用命耳但軍旅之衆非廟内所容止應告于宗廟出在門巷習之昭十八年傳稱鄭人簡兵大蒐将為蒐除注云治兵于廟城内地迫故除廣云是告于廟習于巷也下有圍郕知治兵為圍郕也沈云周禮中秋治兵月令孟春云是月也不可以稱兵稱兵必天殃所以甲午治兵者以為圍郕故非時治兵猶如備難而城雖非時不譏沈又云治兵之禮必須告廟告廟雖是内事治兵乃是外事故雖告廟仍用甲午且治兵則征伐之類又為圍郕雖在郊内亦用剛日甲午治兵公羊以為治兵殺牲饗士卒穀梁傳出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣注師次于郎以俟陳人蔡人兵事以嚴終故曰善陳者不戰此之謂也善為國者不師注道徳齊禮鄰國望之歡如親戚何師之為善師者不陣注師衆素嚴不須耀兵列陣善陣者不戰注軍陣嚴整敵望而畏之莫敢與戰善戰者不死注役兵勝地故無死者善死者不亡注民盡其命無奔敵皆亡蕙田案以上魯校閱之禮國語齊語管仲作内政而寄軍令制三軍有中軍之鼔有國子之鼔有高子之鼔春以振旅秋以治兵是故卒伍整于里軍旅整于郊蕙田案以上齊校閲之禮春秋昭公十四年左氏傳夏楚子使然丹簡上國之兵于宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡救罪戾詰奸慝舉淹滯禮新敘舊祿勲合親任良物官注上國在國都之西西方居上流故謂之上國宗丘楚地特單身民收聚不使流散物事也矛疏周禮司兵掌五兵鄭衆云五兵者戈殳㦸酋矛夷鄭𤣥云步卒之五兵則無夷矛而有弓矢然則兵者戰器之名戰必令人執兵因即名人為兵也此簡上國之兵謂簡料人丁之強弱于宗丘之地集而簡之使屈罷簡東國之兵于召陵亦如之注兵在國都之東者好于邊疆息民五年而後用師禮也蕙田案以上楚校閱之禮僖公二十七年左氏傳楚子将圍宋使子文治兵于暌注子文時不為令尹故云使治兵習號令也暌楚邑也終朝而畢不戮一人注終朝自旦及食時也子文欲委重于子玉故略其事子玉復治兵于蒍注子玊為令尹故蒍楚邑終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒注賀子玊堪其事蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政于子玉曰以靖國也靖諸内而敗諸外所獲㡬何子玉之敗子之舉也舉以敗國将何賀焉子玉剛而無禮不可以治民過三百乗其不能以入矣苟入而賀何後之有注三百乗二萬二千五百人言子玉力小任重将不能以入其衆而治之也苟子玉能入其衆而舉賀典未為後時而失禮言不勝其任不足賀蕙田案以上校閲失禮之事右校閲通典漢興設南北軍之備外命天下郡國選能引強蹶張材力武猛者以為輕車騎士材官樓船常以立秋後郊禮畢斬牲於東門以薦陵廟肄孫呉兵法六十四陣每十月都試金革騎士各有員數蕙田案劉昭注續漢志引魏書漢承秦制十月會五營士為八乗進退名曰乗之晉志亦曰都講續漢禮儀志漢儀立秋之日自郊禮畢始揚威武斬牲於郊東門以薦陵廟乗輿御戎輅白馬朱鬛躬執弩射牲太宰命謁者各一人載以獲車馳送陵廟還宫遣使者齎束帛以賜武官武官肄兵習戰陣之儀斬牲之禮名曰貙劉兵官皆肄孫呉兵法六十四陣名曰乗之晉書禮志既還公卿以下陳雒陽街乗輿到公卿以下拜天子下車公卿親識顔色然後還宫漢書文帝本紀十四年冬匈奴冦邊殺北地都尉卬遣三将軍軍隴西北地上郡中尉周舍為衞将軍郎中令張武為車騎将軍軍渭北車千乗騎卒十萬人上親勞軍勒兵申教令賜吏卒武帝本紀元封元年冬十月詔曰南越東甌咸伏其辜西蠻北裔頗未輯睦朕将巡邊陲擇兵振旅躬秉武節置十二部将軍親帥師焉行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里郊祀志冬上議曰古者先振兵釋旅然後封禪遂北巡朔方勒兵十餘萬騎還祭黄帝冢橋山釋兵凉如注李竒曰凉如地名後漢書世祖本紀建武六年初罷郡國都尉官劉氏攽曰郡有都尉國有中尉此時罷郡都尉耳不應有國字章如愚曰光武見翟義反隗囂叛皆以秋試勒車騎誅守長以起事也是以罷郡國都尉無都試之法惟京師肄兵如故順帝本紀永建元年夏五月嚴飭障塞繕設屯備立秋之後簡習戎馬冬十月庚寅遣黎陽營兵出屯中山北界告幽州刺史令緣邊増置步兵列屯塞下調五營弩師郡舉五人令教習戰射注調選也五營五校也謂長水步兵射聲胡騎車騎五校尉何進傳靈帝中平五年天下滋亂望氣者以為京師當有大兵兩宫流血大将軍司馬許凉假司馬伍宕説進曰太公六韜有天子将兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華葢高十丈壇東北為小壇復建九重華葢高九丈列步兵騎士數萬人結營為陣天子親出臨軍駐大華葢下進駐小華葢下禮畢帝躬擐介馬稱無上将軍行陣三匝而還詔使進悉領兵屯於觀下是時置西園八校尉以小黄門蹇碩為上軍校尉虎賁中郎将袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉議郎曺操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武略特親任之以為元帥督司隷校尉以下雖大将軍亦領屬焉魏志武帝本紀建安十三年春正月作元武池以肄舟師晉書禮志獻帝建安二十一年魏國有司奏古四時講武皆於農隙漢西京承秦制三時不講惟十月都試今金革未偃士衆素習可無四時講武但以立秋擇吉日大朝車騎號曰治兵上合禮名下承漢制奏可是秋閱兵魏王親執金鼓以令進退右漢晉書禮志延康元年魏文帝為魏王是年六月立秋治兵于東郊公卿相儀王御華葢親令金鼓之節魏志文帝本紀黄初六年十月行幸廣陵故城臨江觀兵明帝本紀太和元年冬十月丙寅治兵於東郊蜀志後主建興十年亮休士勸農於黄沙作流馬木牛畢教兵講武右三國晉書武帝本紀咸寧元年十一月癸亥大閲於宣武觀三年十一月丙戌帝臨宣武觀大閲太康四年十二月庚午大閱於宣武觀六年十二月甲申大閱於宣武觀旬日而罷禮志元帝太興四年詔左右衞及諸營教習依大習儀作鴈羽仗成帝本紀咸和元年十一月壬子大閲於南郊文獻通考咸寧元年太康四年六年皆大閲習衆然不自令進退自恵帝以後其禮遂廢成帝咸和中詔内外諸軍戯兵於南郊之場故其地因名鬬場自後蕃鎮桓庾諸方伯往往閲習朝廷無事焉右晉宋書文帝本紀元嘉二十年二月甲寅車駕於白下閱武二十五年春正月庚寅詔曰安不忘虞經世之所同治兵教戰有國之恒典故服訓明恥然後少長知禁頃戎政雖修而號令未審今宣武場始成便可刻日大習衆軍當因校獵肄武講事孝武帝本紀孝建二年九月丁亥車駕於武場閱武大明五年二月癸巳車駕閱武詔曰昔人稱人道何先于兵為首雖淹紀勿用忘之必危朕以聴覽餘閒因時講事坐作有儀進退無爽軍幢以下普量班錫七年春正月癸未詔曰春蒐之禮著自周令講事之語書於魯史所以昭宣徳度示民軌則今嵗稔氣榮中外寧晏當因農隙葺是舊章可尅日於元武湖大閱水師并巡江右講武校獵十一月癸巳車駕習水軍於梁山南齊書武帝本紀永明二年八月戊申車駕幸元武湖講武三年閏月戊午車駕幸宣武堂詔曰今親閱六師少長有禮領馭群帥可量班賜四年九月戊辰車駕幸琅邪城講武觀者傾都普頒酒肉陳書後主本紀禎明四年秋九月甲午車駕幸元武湖肄艫艦閲武宴羣臣賦詩魏書昭成帝本紀建國五年秋七月七日諸部畢集設壇埒講武馳射因以為常道武帝本紀登國六年秋七月壬申講武於牛川八年秋七月車駕臨幸新壇庚寅宴羣臣仍講武十年八月帝親治兵於河南皇始元年八月庚寅治兵於東郊天興二年秋七月辛酉大閲於鹿苑享賜各有差五年春正月帝聞姚興将冦邊庚寅大簡輿徒詔并州諸軍積穀於平陽之乾壁六月治兵於東郊部分衆軍明元帝本紀永興二年秋七月丁巳立馬射臺於陂西仍講武教戰五年春正月己巳大閱畿内男子十二以上悉集己卯幸西宫拔大渠帥四十餘人詣闕賜以繒帛錦罽各有差乙酉詔諸州六十户出戎馬一匹庚寅大閲於東郊部署将帥以山陽侯奚斤為前軍衆三萬陽平王熙等十二将各萬騎帝臨白登躬自校覽焉二月戊申賜陽平王熙及諸王公侯将士布帛各有差庚戌幸高栁川甲寅車駕還宫太武帝本紀始光元年九月大簡輿徒治兵於東郊部分諸軍五萬騎二年冬十月治兵於西郊四年夏四月治兵講武延和元年夏五月大簡輿徒於南郊九年九月乙酉治兵於西郊十一年八月癸未治兵於西郊文成帝本紀興安二年九月壬子閲武於南郊冊府元龜太安四年七月壬子詔曰朕每嵗以秋月閒日命羣官講武平壌所幸之處必立宫壇糜費之功勞損非一宜仍舊貫何必改作也文獻通考文成帝和平三年因嵗除大儺遂耀兵示武更為制令步兵陳於南騎士陳於北各擊鐘鼔以為節度其步兵所衣青赤黒黄别為部隊楯矟矛㦸相次周迴轉易以相赴就有飛龍騰蛇之變為車箱魚鱗四門之陣凡十餘法跪起前卻莫不應節陣畢南北二軍皆鳴鼓角衆盡大譟各令騎将六千人去來挑戰步兵更進退以相拒擊南敗北捷以為威觀自後以為常魏書孝文帝本紀延興四年八月戊申大閲於北郊五年冬十月太上皇帝大閲於北郊太和五年二月己酉講武於唐水之陽三月辛酉朔車駕幸肆州癸亥講武於雲水之陽九月庚午閱武於南郊大享羣臣十六年八月癸丑詔曰文武之道自古並行威福之施必也相藉故三五至仁尚有征伐之事夏殷明叡未舍甲兵之行然則天下雖平忘戰者殆不教民戰可謂棄之是以周立司馬之官漢制将軍之職皆所以輔文强武威肅四方者矣國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡今則訓文有典教武闕然将於馬射之前先行講武之式可勅有司豫修場埒其列陣之儀五戎之數别俟後勅十八年八月丁未幸閲武臺臨觀講武十九年春正月壬午講武於汝水之西大賚六軍二十年九月戊辰車駕閲武於小平津癸酉還宫二十二年三月庚寅行幸樊城觀兵襄􅃆耀武而還宣武帝本紀景明三年九月丁巳車駕行幸鄴戊寅閲武於鄴南隋書禮儀志後齊常以季秋皇帝講武于都外有司先萊野為場為三軍進止之節又别墠於北場輿駕停觀遂命将簡士教衆為戰陣之法凡為陳少者在前長者在後其還則長者在前少者在後長者持弓矢短者持旌旗勇者持鉦鼓刀楯為前行㦸槊者次之弓箭為後行将帥先教士目使習見旌旗指揮之蹤發起之意旗卧則教士耳使習金鼔動止之節聲鼔則進鳴金則止教士心使知刑罰之苦賞賜之利教士手使習持五兵之使戰鬬之備教士足使習跪及行列嶮泥之塗前五日皆請兵嚴於場所依方色建旗為和門都墠之中及四角皆建五采牙旗應講武者各集于其軍戒鼓一通軍士皆嚴備二通将士貫甲三通步軍各為直陳以相俟大将各處軍中立旗鼓下有司陳小駕鹵簿皇帝武弁乗革輅大司馬介胄乗奉引入行殿百司陪列位定二軍迭為客主先舉為客後舉為主従五行相勝法為陣以應之周書太祖本紀大統三年進太祖柱國大将軍五年冬大閲於華隂九年冬十月大閲於櫟陽還屯華州十年冬十月大閲於白水十一年冬十月大閲於白水遂西狩岐陽武帝本紀保定二年冬十月辛亥帝御大武殿大射公卿列将皆㑹戊午講武於少陵原三年冬十月丁亥上親率六軍講武於城南京邑觀者輿馬彌漫數十里諸蕃使咸在焉天和六年冬十月壬寅上親率六軍講武于城南建徳元年十一月丙午上親帥六軍講武城南二年十一月辛巳帝親率大軍講武於城東癸未集諸軍都督以上五十人於道㑹苑大射帝親臨射宫大備軍容三年六月丁未集諸軍将教以戰陣之法十一月行幸同州己巳大閱於城東十二月癸卯集諸軍講武於臨臯澤宣帝本紀宣政元年十一月己亥講武於道㑹苑帝親擐甲胄右南北朝隋書文帝本紀開皇二年十二月辛未上講武於後園煬帝本紀大業五年癸亥出臨津闗渡黄河至西平陳兵講武通典隋大業七年征遼東衆軍将發御臨朔宫親授節度每軍大将亞将各一人騎兵四十隊隊百人百人置一纛十隊為一團團有偏将一人第一團皆青絲連光甲鐵具装青纓拂建狻猊旗第二團絳絲連珠犀甲獸文具装赤纓拂建豼貅旗第三團白絲連明光甲銑具装素纓拂建辟邪旗第四團烏絲連𤣥犀甲獸文具装建六駿旗前部鼓吹一部大鼓小鼓及鼙長鳴中鳴等各十八具柵鼓金鉦各一具後部鐃吹一部鐃一面歌簫及笳各四具節鼓一面篳篥横笛各四具大角十八具又步卒八十隊分為四團團有偏将一人第一團每隊給青隼盪幡一第二團每隊給黄隼盪幡一第三團每隊給蒼隼盪幡一第四團每隊給烏隼盪幡一長槊楯弩及甲眊等各稱兵數受降使者一人給二馬軺車一乗白獸幡及節每一騎吏三人車輻自従十二人承詔慰撫不受大将節制戰前則為監軍軍将發候大角一通步卒第一團出營東門東向陣第二團出營南門南向陣第三團出營西門西向陣第四團出營北門北向陣陣四面團營然後請團嚴駕立大角三通則鐃鼓俱振第一團引行隊間相去各十五步次第二團次前部鼓吹次弓矢一隊各二百騎建蹲獸旗爬槊二張大将在其次䩠馬二十匹次大角次後部鐃吹次第四團受降使者次及輜重戎車散兵等亦有四團第一輜重出收東面陣分為兩道夾以行第二輜重出收南面陣夾以行第三輜重出收西面陣夾以行第四輜重出收北面陣夾以行亞将領五百騎建騰豹旗殿軍後至營則第一團騎陣於東面第二團騎陣於南面鼓翊大将軍居中駐馬南面第三團騎陣於西面第四團騎陣於北面合為方陣四方外向步卒翊輜重入於陣内以次安營定四面陣者引入營亞将率驍騎遊奕督察其安營之制以車外布間設馬槍次施兵幕安内雜畜事大将亞将等各就牙帳馬步陣與軍中散兵交為兩番五日而代於是每一日遣一軍發相去四十里連營漸進二十四日續發而進首尾相繼鼓角相聞旌旗亘九百六十里天子六軍次發兩部前後先置又亘八十里通諸道合三十軍亘千四十里諸軍各以帛為帶長尺五寸闊二寸題其軍號為記御營内者合十衞三臺五省九寺並分𨽻内外前後左右六軍亦各題其號不得自言臺省王公以下至於兵馬私𨽻悉以綴於衣領名軍記帶諸軍並給幡數百有餘事使人交相去來執以行執幡而離本軍者他軍騐記帶知非本部兵則所在斬之蕙田案此為征遼東事當屬出師然其儀節實係将出兵之前先定其訓練簡閲之禮也右隋唐開元禮皇帝講武仲冬之月講武於都外前期十有一日所司奏講武兵部承詔遂命将帥簡軍士有司先芟萊除地為場方一千二百步四出為和門又於其内墠地為步騎六軍營域處所左右廂各為三軍位上軍在北中軍次之下軍在南東西相向中間相去三百步五十步立表行凡立五行表間前後各相去五十步為三軍進止之節又别墠地於北廂南向為車駕停觀之處前三日尚舍奉御設大次及御座於其中如常儀前一日講武将帥及士卒集於墠所禁止諠譁依方色建旗為和門於都墠之中及四角皆建以五綵牙旗旗鼔甲仗威儀悉備於墠所大将以下各有統帥如常式步軍大将被甲胄乗馬教騎大将亦乗馬教習士衆為戰隊之法講武日未明七刻搥一鼓為一嚴侍中奏開宫殿門及城門未明五刻搥二鼓為再嚴侍中版奏請中嚴文武官應従者俱先至文武官皆公服所司為小駕依圗陳設未明二刻搥三鼓為三嚴諸衞各督其隊與鈒㦸以次入陳於殿庭諸侍衞之官各服其器服諸侍臣俱詣西階下奉迎侍中負璽如式乗黄令進革輅於太極殿前皇帝服武弁之服餘並如圜丘儀駕至墠所兵部尚書介胄乗馬奉引至講武所入自都墠北和門兩步軍之北當空南向黄門侍郎奏稱請降輅還侍位皇帝降輅入大次而觀兵部尚書停於東廂西向三仗小退以通觀路領軍減小駕騎士立於都墠之四周侍臣依左右廂立於大次之前東西面北上文武九品以上皆公服文東武西在侍臣之外十步重行北上諸州使人及蕃客先集於都墠北和門外東方南方立於道東西方北方立於道西皆向輅而立以北為上駕至和門奉禮曰再拜在位者皆拜訖皇帝入次謁者引諸州使人鴻臚卿引蕃客東方南方立於大次東北南向以西為上西方北方立於大次西北南向以東為上若有觀者立於都墠騎士仗外四周任意然後講武諸州使人及蕃客立定吹大角一通中軍将各以鞞命鼔二軍俱擊鼔三鼓有司偃旗步卒皆跪二軍諸帥果毅以上各集於中軍大将旗鼓之下左廂中軍大将立於旗鼔之東西面諸軍将立於旗鼔之南北面東上右廂中軍大将立於旗鼓之西東面諸軍将立於旗鼓之南北面西上以聴誓大将誓曰今行講武以教人戰進退左右一如軍法用命有常賞不用命有常刑可不勉之誓訖左右三軍各長史二人振鐸分巡以警衆諸果毅各以誓詞遍告其所部遂聲鼔有司舉旗士衆皆起騎従皆行及表擊鉦騎従乃止又擊三鼓有司偃旗士衆皆跪又擊有司舉旗士衆皆起騎驟徒趨及表乃止整列位定東軍一鼓舉青旗為直陣西軍亦鼓而舉白旗為方陣以應之次南軍一鼓而舉赤旗為鋭陣北軍亦鼓而舉黑旗為曲陣以應之次東軍鼔而舉黄旗為圎陣西軍亦鼔而舉青旗為直陣以應之次西軍鼓而舉白旗為方陣東軍亦鼔而舉赤旗為鋭陣以應之次東軍鼔而舉黑旗為曲陣西軍亦鼓而舉黄旗為圎陣以應之凡陣迭為主客先舉者為客後舉者為主従五行相勝之法為陣以應之每變陣二軍各選刀楯之士五十人挑戰於兩軍之前第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝敗之形每将變陣先鼔而為直陣然後變従餘陣之法五陣畢兩軍俱為直陣又擊三鼔有司偃旗士衆皆跪又聲鼔舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每退至一行表跪起如前遂復本列侍中跪奏諸觀騎軍又侍中稱制曰可侍中俛伏興二軍吹角擊鼔誓衆俱進及表乃止皆如步軍唯無跪起耳騎軍東西迭為主客為五變之陣皆如步軍之法每陣各八騎挑戰於兩陣之間如步軍法五陣畢俱大擊鼓而前盤馬相擬擊而罷遂振旅而還凡步騎二軍之士備則滿數省則半之損益隨時唯不得減将帥凡相擬擊皆不得以刃相及凡步士逐退過中表二十步而止不得過也騎士不在此例若由田狩則令講武軍士之外先期為圍觀訖乗馬鼓行親禽如别禮狩訖乗輅振旅而還如常儀講武罷侍中跪奏稱侍中臣具言講武禮畢請還俛伏興皇帝降御輿侍衞如常儀皇帝升輅太僕御立授綏升訖勅車右升千牛将軍升輅陪乗黄門侍郎奏請鑾駕發引以下如圜丘還宫儀唯不作鼔吹不撞蕤賔解嚴訖将士各還明日羣官奉㕘起居如别儀蕙田案以上開元禮與隋書禮儀志有同者今刪併又見唐書禮樂志亦不復複載唐書兵志每嵗季冬折衝都尉率五校兵馬之在府者置左右二校尉位相距百步每校為步隊十騎隊一皆卷矟幡展刃旗散立以俟角手吹大角一通諸校皆斂人騎為隊二通偃旗矟解幡三通旗矟舉左右校擊鼔二校合譟而進右校擊鉦隊少却左校進逐至右校立所左校擊鉦隊少却右校進逐至左校立所右校復擊鉦隊還左校復薄戰皆擊鉦隊各還大角復鳴一通皆卷幡攝矢弛弓匣刃二通隊皆進三通左右校皆引還蕙田案開元禮所載天子親自臨閲京師所行也兵志所載折衝都尉臨閱郡國所行也唐書高祖本紀武徳元年十月辛丑大閱冊府元龜唐高祖武徳元年十月詔曰安人静俗文教為先禁暴懲凶武略斯重比以喪亂日久黎庶凋殘是用務本勸農冀在豐贍而人蠧未盡寇盜尚繁欲暢兵威須加練習今農收已畢殺氣方嚴宜順天時申耀威武可依别勅大集諸軍朕将躬自循撫親臨校閱舊唐書高祖本紀武徳五年十一月丙申幸宜州簡閲将士八年十一月辛卯如宜州庚子講武於同官九年三月幸昆明池習水戰太宗本紀武徳九年八月癸亥高祖傳位於皇太子太宗即位九月丁未引諸衞騎兵統将等習射於顯徳殿庭謂将軍以下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐玁狁周宣馳驅方召亦能制勝太原至漢晉之君逮於隋代不使兵士素習干戈突厥來侵莫能抗禦致遺中國生民塗炭於冦手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士惟習弓馬庶使汝鬬戰亦望汝前無横敵于是每日引數百人於殿前教射帝親自臨試射中者隨賞弓刀布帛朝臣多有諫者曰先王制法有以兵刃至御所者刑之所以防萌杜漸備不虞也今引禆卒之人彎弧縱矢於軒陛之側陛下親在其間正恐禍出非意非所以為社稷計也上不納自是後士卒皆為精鋭唐書太宗本紀貞觀八年十二月丁卯従太上皇閲武於城西舊唐書高祖本紀貞觀八年是嵗閲武於城西高祖親自臨視勞将士而還唐書高宗本紀顯慶二年十一月乙巳獵于滍南壬子講武於新鄭唐㑹要高宗顯慶二年十一月二十一日講武於滍水之南行三驅之禮上設次於尚書臺以觀之許州長史封道宏奏言後漢南郡太守馬融講尚書于此因為名今請改為觀武臺從之五年三月八日又講武於并州城北上御飛閤羣臣臨觀之左衞大将軍張延師為左軍左右驍武等六衞左羽林騎士屬焉左武衞大将軍梁建方為右軍左右威武等六衞右羽林騎士屬焉一鼓而誓衆再鼓而整列三鼓而交前左為曲直圎鋭之陣右為方鋭直圎之陣三挑而五變步退而騎進五合而各復許敬宗奏曰延師整而堅建方敢而鋭皆良将也上曰講閲者安不忘危之道也梁朝衣冠甚盛人物亦多侯景以數千人渡江一朝瓦解武不可黷人不可棄此之謂也蕙田案此事亦見新唐書高宗本紀及冊府元龜冊府元龜麟徳二年四月丙寅講武於邙山之陽帝御城北門樓以觀之文獻通考武太后聖歴二年欲以季冬講武有司請延至孟春王方慶上疏曰謹案禮記月令孟冬之月天子命将帥講武習射御角力此乃三時務農一時講武葢王者常事安不忘危之道也孟春之月不可以稱兵者兵金也金性克木春盛徳在木金氣以害盛徳逆生氣孟春行冬令則水潦為敗霜雪大摰首種不入案蔡邕月令章句太隂休少陽尚㣲而行冬令以道水氣故水潦至而敗生物也雪霜大摰催傷者也太隂干時雨雪而霜故傷首種謂宿麥也麥以秋種故謂之首種今孟春講武是行冬令以隂犯陽氣害發生之徳臣恐水潦敗物霜雪損稼宿麥不登無所收入也請至明年孟冬教習以順天道従之冊府元龜𤣥宗先天二年十月癸亥親講武於驪山之下徴兵二十萬旌旗連互五十餘里戈鋋金甲照耀天地列大陣於長川坐作進退以金鼓之聲節之三軍出入號令如一帝親擐戎服持沈香大鎗立于陣前威振宇宙長安士庶奔走縱觀填塞道路兵部尚書郭元振以虧失軍容坐於纛下将斬之宰相劉幽求張説跪於馬前諫曰元振翊戴上皇有大功於國雖犯軍令不可加刑伏願寛宥以従人望帝乃赦之配流新州給事中知禮儀事唐紹以草軍儀有失坐於纛下斬之禮畢乃下制曰傳不云乎兵之設久矣所以威不軌而昭文徳聖人以興亂人以廢皆兵之由也故文事必有武備耀徳在於觀兵所以外清蠻貊内輯華夏其經濟之致歟自有隋失道三靈改卜我唐受命百姓與能四罪而天下服一戎而天下定航海梯山罔不率俾休牛歸馬永不復用徳逮羣物刑清百年然而制軍為旅先王分職在祀與戎前史垂訓則未學也孰可棄之往以韋氏搆逆兇魁作禍則我之宗祀危如綴旒故斬長蛇截封豨戮梟獍掃攙槍使武之不修則兆人何人朕以薄徳皆奉聖謨濟邦家之多難畏君父之嚴㫖自撫兹億兆若臨淵谷雖重譯雲歸和親日至遂五兵之不教慮七徳之未康今葢𤣥冬戒時農事爰隙驪山之下鴻門在望横層阜以南屬耿長川而北流嚴霜初隕疾風始至以時而命羣帥得地以講武功料其勝負詳其進退以振國威用蒐軍實故披堅執鋭干戈有容練卒陳師金鼓有節上應於天也下順於人也三光之靈可接五行之徳斯用将孫呉不逺頗牧同時非熊所期怒蛙亦勸布三令調九章且閱宣場之儀若觀莘墟之禮情兼慰賞義宏寵錫惟此畿甸比經水旱總集士馬頗有煩勞中念元元更資勤恤其講武使各賜物一百段将軍各八十段中郎将各六十段郎将及左右軍長史各四十段折衝果毅各三十段押官六品以下各二十段新豐百姓宜免來年地税置頓使賜物一百段縁頓踏踐麥苖給米酬直開元二年八月辛巳上以河隴之故命有司大募壯勇士従軍既募引見置酒於朝堂享之詔曰朕光宅四海撫御百蠻屬疆場未寧軍國多費每欲指揮方略親率軍師故召募爾等擬従朕行知爾等材力冠羣藝能拔萃但以不教人戰豈知金鼓之聲授以兵律方辨干戈之勢所以且遣薛訥等於隴右防禦使令教習爾等既練韜鈐須明隊伍使投石拔劍以勵威鋒裹糧坐甲待清逋寇若能因機立效遇敵邀勲酬以官榮必超格例然後陪朕輿駕従戎塞垣俾爾先驅敬聴後命今宴勞爾等并賜錢三千貫可節級領取即宜好去十月薛訥克吐蕃帝遂停親征詔曰比來緣邊鎮軍每年更代兵不識将将不識兵豈有緣路疲人葢是以卒與敵其以西北軍鎮宜加兵數先以側近兵人充並精加簡擇其有勞考等色所司其以條例奏聞戰兵别簡為隊伍専令教練不得輒有使役仍令兵部侍郎裴璀太常少卿姜晦往軍州計㑹便簡支配有見集後軍兵宜令兵部侍郎韋抗紫㣲舍人王珽即簡擇以聞八年八月詔曰國家偃武教修文徳百年於兹矣自運屬清平人忘争戰俎豆之事嘗聞之矣軍戎之禮我所未暇且五材並用誰能去兵四方雖安不可忘戰故周禮以軍禁糾邦國以蒐狩習戎旅不教人戰是為棄之宜差使於兩京及諸州且揀取十萬人務求灼然驍勇不須限以蕃漢皆放畨役差科惟令團伍教練辨其旗物簡其車徒習攻取進退之方陳威儀貴賤之等俾夫少長有禮疾徐有節将以伐叛懷服将以保大定功叶于師貞以宏武備應須集期及有蠲免所司明為條制别作優異法奏聞仍勅幽州刺史邵寵於幽易兩州選二萬灼然驍勇者充幽州經畧軍健兒不得雜使租庸資課並放免肅宗至徳二載八月帝在鳯翔癸巳六軍大閱帝御府城樓觀軍陣之容舊唐書肅宗本紀至徳三載正月庚寅大閲諸軍於含元殿庭上御棲鸞閣觀之冊府元龜代宗寳應元年九月壬寅大閲兵馬於鳴鳯門街舊唐書代宗本紀大歴九年四月乙酉詔郭子儀等大閲兵師以備吐蕃徳宗本紀貞元十六年春正月庚子朔乙巳上閲兵於麟徳殿前冊府元龜宣宗大中五年五月勅如聞諸道軍将及官健兒等近日所在将帥多務因循當召募之時巳不選擇及收補之後曾莫教招遂使名在戎行少能知其弓矢職居列校罕見識於韜鈐緩急忽有徴差便取現在應數惟憂就役豈暇圗功虚費資糧莫克讎敵為弊頗久須有舉明自今以後委諸道觀察節度都防禦團練經略等使每道慎擇㑹兵法及能弓馬解槍弩及筒射等軍将兩人充教練使每年至合教習時分畨各以本藝閲試其間或有伎藝超異者量加優賞仍作等第節級與進改職名每至年終都具所教習焉步及各執所藝人數申兵部及中書門下仍委兵部簡勘都開件奏聞所冀各盡伎能自成勁鋭其支部有兵處亦委本道㸃簡訓練准詔處分右唐五代史梁太祖本紀開平元年冬十月己未講武於繁臺霍存傳太祖已即位閲騎兵於繁臺顧諸将曰使霍存在豈勞吾親閲耶諸軍寧復思之乎它日語又如此開平四年春正月丁未講武於榆林乾化元年八月戊寅大閲於興安鞠場冬十月丙子大閲於魏東郊唐莊宗本紀天祐十有五年八月大閲於魏東郊冊府元龜明宗天成二年十月癸未御興教門觀兵自卯至午隊伍方絶晉高祖天福二年十月勅習戰講武歴代通規選士練兵其來舊制宜以每年農隙時講武仍准令式處分五代史晉出帝本紀開運元年春正月辛卯講武於澶州二年二月丙子大閲於戚城周世祖本紀顯徳元年三月壬辰次澤州閲兵於北郊右五代宋史禮志閲武仍前代制太祖太宗征伐四方親講武事故不盡用定儀亦不常其處鑿講武池朱明門外以習水戰復築講武臺城西楊村秋九月大閲與従臣登臺觀焉真宗詔有司擇地含輝門外之東武村為廣場憑髙為臺臺上設屋搆行宫其夜三鼓殿前侍衞馬步諸軍分出諸門詰旦帝乗馬従官並戎服賜以窄袍至行宫諸軍陣臺前左右相向步騎交屬亘二十里諸班衞士翼従于後有司奏成列帝升臺東向御戎帳召従臣坐觀之殿前都指揮使執五方旗以節進退又於兩陣中起候臺相望使人執旗如臺上之數以相應初舉黄旗諸軍旅拜舉赤旗則騎進舉青旗則步進每旗動則鼓駴大譟聲震百里外皆三挑乃退次舉白旗諸軍復再拜呼萬嵗遂舉黒旗以振旅軍於左者略右陣以還由臺前出西北隅軍於右者畧左陣以還由臺前出西南隅並凱旋以退乃召従臣宴教坊奏樂回御東華門閲諸軍還營鈞容奏樂於樓下復召従臣坐賜飲明日又賜近臣飲於中書諸軍将校飲於營中内職飲於軍器庫諸班衞士飲於殿門外兵志訓練之制禁軍月奉五百以上皆日習武技三百以下或給役或習技其後别募廂兵亦閲習武技號教閲廂軍戍川廣者舊不訓練嘉祐以後稍習焉凡諸日習之法以鼔聲為節騎兵五習步兵四習以其坐作進退非施於兩軍相當者然自宋初以來諸軍皆用之宋史太祖本紀建隆元年十一月丁未命諸軍習戰艦於迎鑾三年十月丙戌幸太清觀遂幸造船務觀習水戰己亥幸岳臺命諸軍習騎射乾徳四年四月庚寅出内錢募諸軍子弟鑿習戰池乙巳幸玊津園閲諸軍騎射六月己酉命習水戰於新池七月丁卯幸武成王廟遂幸新池觀習水戰文獻通考開寳九年四月幸金明池習水戰上御水心殿命從臣列坐以觀戰艦角勝鼓譟以進往來馳突為迴旋擊刺之狀顧謂侍臣曰兵棹之技南方之事也今已平定固不復用但時習之不忘武功耳迄真宗朝嵗習不輟太宗本紀太平興國二年秋九月辛亥幸講武臺大閲崔翰傳太平興國二年秋講武於西郊時殿前都指揮使楊信病瘖命翰代之翰分布士伍南北綿亘二十里建五色旗號令将卒望其所舉以為進退六師周旋如一上御臺臨觀大悦以藩邸時金帶賜之謂左右曰晉朝之将必無如崔翰者文獻通考太平興國二年将伐太原詔築講武臺於西郊九月大閲上與従官登而觀焉是冬又觀飛山兵射連弩發機石於臺下宋史太宗本紀太平興國五年三月庚午幸講武池觀習樓船十二月甲戌大閲遂宴幄殿山堂攷索太平興國九年上親閲諸軍參考勞績升絀之上曰兵雖衆苟不簡閲即與無兵同先帝訓練之方咸盡其要朕因講習漸至精鋭倘統帥得人何敵不克兵志至道元年帝閲禁兵有挽彊弩至一石五斗連二十發而有餘力者顧謂左右曰今宇内阜安材武間出弧矢之妙亦近代罕有也又令騎步兵各數百東西列陳挽強彀弩視其進退發矢如一容止中節因曰此殿庭間數百人爾猶兵威可觀況堂堂之陣數萬成列者乎曲洧舊聞真宗咸平二年秋大閲其日殿前侍衞馬步軍二十萬是夜三鼓初分出諸門遲明乃絶詰旦上按轡出東華門従行臣僚並賜戎服既回御東華門閲諸軍還營奏樂於樓下真宗本紀咸平三年春正月丁亥幸紫極宫還登子城閲騎射夏四月閲河北防城舉人康克勤等擊射十二月丁巳閲武藝遂宴射苑中六年十一月己亥閲捧日軍士教三陣於崇政殿山堂攷索太宗祥符六年詔在京諸軍選江淮水卒於金明池按試戰櫂立為水虎翼軍置營於側其江浙淮南諸州亦令准此選卒置營初太祖立神衞水軍及江淮平定不復舉上以兵備不可廢故復置焉兵志明道二年樞宻使王曙言本廂下軍止給役而未嘗習武技宜取材勇者訓肄升補禁軍上可其奏仁宗康定元年帝御便殿閲諸軍陣法議者謂諸軍止教坐作進退雖整肅可觀然臨敵難用請自今遣官閲陣畢令解鐙以弓弩射營置弓三等自一石至八斗弩四等自二石八斗至二石五斗以次閱習詔行之陜西河東河北路是嵗詔教士不袵帶金革緩急不足以應敵自今諸軍各予鎧甲十馬甲五令迭披帶又命諸軍班聴習雜武技勿輒禁止慶歴元年徙邊兵不教者於内郡俟習武技即遣戍邊二年諸軍以射親疎為賞罰中的者免是月諸役仍籍其名闕校長則按籍取中多者補樞宻直學士楊楷請教騎兵止射九斗至七斗三等弓畫的為五暈去的二十步引満即發射中者視暈數給錢為賞騎兵佩劈陣刀訓肄時以木捍代之奏可四年詔騎兵帶甲射不能發矢者奪所乗馬與本營藝優士卒韓琦言教惟事體容及彊弓不習射親不可以臨陣臣至邊嘗定弓弩挽彊蹠硬射親格願行諸軍立賞肄習嵗以春秋二時各一閲諸營先上射親吏卒之數命近臣與殿前馬步軍司閲之其射親入第四至第七等量先給賜入第三等以上及挽彊蹠硬中格悉引對親閲等數多者其正副指揮使亦第賜金帛詔以所定格班教諸軍四年遣官以陜西陣法分教河北軍士五年宻詔益利梓䕫路鈐轄司以弓弩習士卒候民間觀聴䆮熟即便以短兵日教三十人十日一易知并州明鎬言近臣籍諸營武藝之卒使帶甲試充竒兵外為三等庶㡬主将悉知軍中武技強弱臨敵可用詔頒其法三路范仲淹請以帶甲射一石充竒兵餘自九斗至七斗第為三等射力及等即升之詔著為令六年詔諸軍夏三月母教弓弩止習短兵又詔以春秋大教弓射一石四斗弩彍三石八挺槍刀手勝二人者立為武藝出衆格中者本營闕階級即以次補至和元年詔諸軍選将校武藝以射親為上韓𤦺又言奉詔軍士弩彍四石二斗并弓箭槍手應舊規選中者即給挺補守闕押官然則排連舊制為虚文矣請三路兵遇春秋大教武技出衆者優給賞物免本營他役候階級闕如舊制選補奏可仁宗本紀至和二年七月辛巳詔河北諸道總管分遣兵官教閲所部軍兵志治平二年詔河北戰卒三十萬一千陜西四十五萬九百并義勇等委總管司訓練毋得冗占神宗熙寧元年詔曰國家置兵以備戰守而主官之兵冗占者衆肄習弗時或誤軍事帥臣按撫監司其察所部有占兵不如令者以聞十月樞宻院請陜西河東選三班使臣及士人任殿侍者以為河北諸路指使教習騎軍或言河朔兵有教閲之名而無其實請教法於其軍久而弗能者罷為廂軍奏可二年帝嘗語執政並邊訓練士卒何以得其精熟安石對曰京東所教兵已精强願陛下推此法以責邊将間詔其兵親臨閲試訓練簡閲有不如詔者罰之而賞其能者賞不遺賤罰不避貴則法行而将吏加勸士卒無不奮勵矣九月選置指使巡教諸軍殿前司四人馬步軍司各三人山堂攷索神宗熙寧二年樞宻院言廂軍近已團結教閲武藝欲給威邊指揮請以州軍大小定人數自三百人至百人仍改軍額淮南曰壯武江南曰雄武荆湖曰静江兩浙曰崇節福建曰保節並加教閲二字於軍額上従之宋史兵志熙寧三年帝親閲河東所教排手進退輕㨗不畏矢石遂詔殿前司步軍指揮當出戍者内擇槍刀手伉健者百人教如河東法藝精者役使以優奨之五年四月詔在京殿前馬步諸軍巡教使臣並以春秋分行校試射命中者第賜銀楪兵房置籍考校以多少定殿最五月詔以涇原路蔡挺衙教陣隊於崇政殿引見仍頒諸路其法五伍為隊五隊為陣陣横列騎兵二隊亦五伍列之其出皆以鼓為節束草象人而射焉中者有賞馬步皆前三行槍刀後二行弓弩附隊以虎蹲弩牀子弩各一射與擊刺迭出皆聞金即退預籍人馬之彊者隠於隊中遇可用則别出為竒帝以其㸃閲周悉常有出野之備故今頒行李氏燾長編神宗閲左蔵庫副使开斌所教排手於崇政殿乃命殿前步軍司擇驍健者依法教習自是營屯及更戍諸軍畿甸三路民兵皆隨伎藝召見親閲焉凡閱試禁衞戍軍民兵總率第其精觕賜以金帛而超等高者至命為吏選官其典領者優加職秩涇原經畧蔡挺肄習諸将軍馬㸃閲周悉隊伍有法入為樞宻副使因言於上而引試之舊以七軍營陣校試而分數不齊前後牴牾命校試官采綴定為八軍法及軍法成頒行諸路既又定九軍法以一軍營陣即城南好草坡閲之皆有賞賚其按閲砲塲連弩及便坐日閲召募新軍時令習戰如故事文獻通考神宗諭近臣曰黄帝始置八陣法敗蚩尤於涿鹿諸葛亮造八陣圗於魚復平沙之上壘石為八行晉桓温見之曰常山蛇勢也文武皆莫能識之此即九軍陣法也後至隋韓擒虎深明其法以授其甥李靖靖以時遇久亂将臣通曉其法者頗多故造六花陣以變九軍之法使世人不能曉之大抵八陣即九軍九軍者方陣也六花陣即七軍七軍者圎陣也葢陣以圎為體方陣者内圎而外方圎陣即内外俱圎矣故以圎物驗之則方以八包一圎以六包一此九軍六花陣之大體也七軍者左右虞候軍各一為二虞候軍左右廂各二為四廂軍與中軍共為七軍八陣者加前後二軍共為九軍本朝祖宗以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衞四廂是為四廂軍也中軍帥總制九軍即殿前都虞候専總中軍一軍之事務是其名實與古九軍及六花陣相符而不少差也今論兵者俱以唐李筌太白隂經中所載陣圗為法失之逺矣朕嘗覽近日臣僚所獻陣圗皆妄相眩惑無一可取果如此輩之説則兩敵相遇必須遣使豫約戰日擇一寛平之地仍夷阜塞壑誅草伐木如射圃教場方可盡其法耳以理推之知其不可用也決矣今可約李靖法為九軍營陣之制然李筌之圗乃營法非陣法也朕採古之法酌今之宜曰營曰陣本出於一法而已止曰營行曰陣在竒正言之則營為正陣為竒也於是以八月大閲八軍陣於城南荆家陂已事拆營回軍賜遂等以下指揮焉步諸軍銀絹有差宋史兵志六年詔河北四路承平日久重於改作遂因循益隳軍制其以京東武衞等六十二營𨽻屬諸路分番教習餘兵並分遣主兵官訓練九月詔自今巡教使臣校殿最雖以十分為率其事藝第一等及九分以上或射親及四分雖殿除其罰第二等事藝及八分或射親不及三分雖最削其賞十月選涇原土兵之善射者以教河朔騎軍馳驟野戰帝曰裁併軍營凡省軍員四千餘人此十萬軍之資也儻訓練精勇人得其用不惟勝敵亦以省財安石等曰陛下頻年選擇使臣専務訓練間御便殿躬親試閲賞罰既明士卒皆奮觀其技藝之精一人為數夫之敵此實國家安危所繫也是時帝初置内教法旬一御便殿閲武校程其能否而勸沮之士無不争勸者七年詔教閱戰法主将度地之形隨宜施行二月詔自今嵗遣一使按視五路安撫使以下及提舉教閲諸軍義勇保甲官課其優劣以聞而誅賞之七年命呂恵卿曽孝寛比校三五結隊法十月以新定結隊法并賞罰格及置陣形勢等遣近侍李憲付趙卨曰陣法之詳已令憲面諭今所圗止是一小陣卿其従容析問憲必一一有説然置陣法度久失其傳今朕一旦據意所得率爾為法恐有未盡宜無避忌但具奏來繼又詔曰近令李憲齎新定結隊法并賞罰格付卿同議可否因以團立将官更置陣法卿必深悉朝廷經畫之意如近日可了宜令李憲齎赴闕卨奏曰置陣之法以結隊為先李靖以五十人為一隊每三人自相得者結為一小隊合三小隊為一中隊合五中隊為一大隊餘押官隊頭副隊頭左右傔旗五人即充五十並相依附今聖制每一大隊合五中隊五十人為之中隊合小隊九人為之小隊合三人為之亦擇心意相得者又選壯勇善槍者一人為旗頭令自擇如已藝心相得者二人為左右傔自選勇悍者一人為引戰又選軍校一人執刀在後為擁隊凡隊内一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如通撓觀望不即赴救致有陷失者本隊委擁軍校次隊委本轄隊将審觀不救所由斬之其有不可救或赴救不及或身自受敵體被重創但非可救者皆不坐其説雖與古同而用法尤為精宻此葢陛下天錫勇智不學而能也然議者謂四十五人而一長不若五人而一長之宻且以五人而一長即五十人而十長也推之于百千萬則為長者多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為師屬之州長五師為軍屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂自廂都指揮而下各有節級有員品亦昔之比長閭胥族師黨正之任也議者謂什伍之制於都法為便然都法恐非臨陣對敵決勝之術也况八陣之法久失其傳聖制一新稽之前聞若合符節夫法一定易以制人敵好擊虚吾以虚形之敵好背實吾以實形之然而所擊者非其虚所背者非其實故逸能勞之飽能飢之此所謂致人而不致於人也七月詔諸路安撫使各具可用陣隊法及訪求知陣隊法者以聞九月崇儀使郭固以同詳定古今陣法賜對於是内出攻守圖二十五部付河北蕙田案志稱太宗選州兵壯勇者補禁衞餘留本城於是兵勢重於内輕於外本城但更戍而不教閲矣故陳傅良言熙寧按天下廂軍之籍五十萬人皆不足戰而教閱之法起教閱者拔之廂軍之中而排立在就糧禁軍之下於是禁軍始遍天下然吾觀神宗教閲之法如此其詳矯前人之弊防兵力之弱如此其至而當時如王韶輩僅能小得志於南詔瀘夷而已至以當西夏動輒敗北李復圭李信劉甫挫衂於前韓綘种諤李憲高遵裕王中正劉昌祚徐禧曲珍等喪師於後諸将濫邀功賞皆以城築而已然則當日教閲亦徒有其名未嘗獲一勁旅之用也故太宗之失失在略外而不在置禁軍之多神宗之失失在務名而不在更廂兵之制八年詔在京諸軍營屯迫隘馬無所調習比剏四教場益寛大可以馳騁其令騎軍就教者日輪一營以馬走驟閲習五月臧景陳馬射六事一順騣直射二背射三盤馬射四射親五野戰六輪弄各為説以曉射者詔依此教習八月帝令曽孝寛視教營陣大閲八軍陣於荆家陂訖事大賞神宗本紀熙寧九年十月乙未詔東南諸路教閲新軍兵志元豐元年十月詔立在京校試諸軍技藝格第為上中下三等步射六發而三中為一等二中為二等一中為三等馬射五發驟馬直射三矢背射二矢中數等如步射弩射自六中至二中牀子弩及砲自三中至一中為及等並賞銀有差槍刀并標排手角勝負計所勝第賞其弓弩墜落或縱矢不及堋或挽弓破體或局而不張或矢不滿或弩蹠不上牙或擭不發或身倒足落並為不合格即射已中賞餘箭不合格者降一等無可降者罷之是月賈達燕達等言近者増損東南排弩隊法與東南所用兵械不同請止依東南隊法以弩手代小排若去敵稍逺則施箭近則左手持弩如小排架隔右手執刀以備斬伐與長兵相參為用詔可其槍手仍以標排兼習十一月西京将劉元言馬軍教習不成請降步軍又不成降廂軍乃下令諸軍約一季不能學者如所請降之十二月詔開封府界京東西将兵十人以一人習馬射受教於中都所遣教頭在京步軍諸營弓箭手亦十人以一人習馬射受教於教習馬軍所藝成則展轉分教於其軍二年四月遣内侍石得一閲視京西第五将所教馬軍五月得一言其教習無狀詔本将陳宗等具析宗等引罪帝責曰朝廷比以四方驕悍為可虞選置将臣分總禁旅俾時訓肄以待非常至於部勒規模悉經朕慮前後告戒已極周詳使宗等稍異木石亦宜畧知人意尸禄日久既頑且慵苟遂矜寛實難勵衆可並勒停是月詔殿前步軍司兵各置都教頭掌𨽻教習之事弩手五營弓箭手十營槍刀槍標排手五營各選一人武藝優者奏補逐司各舉散直二人為指使罷巡教使臣是日詔河東陜西諸路舊制馬軍自十月一日馳射野戰至穀雨日止塞上地凉自今教起八月止五月一日七月詔諸路教閲禁軍毋過兩時九月内出教法格并圖象頒行之步射執弓發矢運手舉足移步及馬射馬使蕃槍馬上野戰格鬭步用標排皆有法象凡千餘言使軍士習誦焉十一月始立府界集教大保長法以昭宣使入内侍省副都知王中正東上閤門使狄諮兼提舉府界教保甲大保長總二十二縣為教場十一所大保長凡二千八百二十五人每十人一色事藝置教頭一凡禁軍教頭二百七十都教頭三十使臣十弓以八斗九斗一石為三等弩以二石四斗二石七斗三石為三等馬射九斗八斗為二等其材力超拔者為出等當教時月給錢三千日給食官予戎械戰袍具銀楪酒醪以為賞犒三年大保長藝成乃立團教法以大保長為教頭教保丁焉凡一都保相近者分為五團即本團都副保正所居空地聚教之以大保長藝成者十人滚教五日一周五分其丁以其一為騎二為弓三為弩府界法成乃推之三路各置文武官一人提舉河北則狄諮劉定陜西則張山甫河東則黄亷王崇極以封樁養贍義勇保甲錢糧給其費是嵗引府界保甲武藝成帝親閲録用能者餘賜金帛神宗本紀元豐四年三月乙巳命官閲九軍營陣法於京城南戊申大閲九月壬寅閲河北保甲於崇政殿官其優者三十六人蕙田案熙豐教閲之法何紛紛也宋之初制所重者禁軍廂軍令二者勢無畸重訓練必精自足以壯威戡亂鄉兵蕃兵備數而已韓魏公刺陜西義勇而鄉兵日増然害猶未甚也浸假變為王安石之保甲法一切募荷耡之農氓游手之無賴為之而鄉兵之冗甚矣於是或立集教法或立團教法或頒教閲新法或遣提舉或遣近臣内侍長為保長丁為保丁於是元豐四年祗就河北河東陜西路㑹校保甲都保凡三千二百六十六正長壯丁凡六十萬一千九百四十五其時綜計繋籍義勇保甲及民兵直至七百一十八萬三千二十八人嵗費緡錢至㡬百萬又有銀楪賞錢之賜此皆在常額之外者也夫廂軍取之欲精教之欲熟不此之求而别立名目多為擾費因廂兵之冗占而為保甲因保甲之新募而施教法因教法之専於保丁而廂兵益以懈弛此非熙豐之弊政而何又案志稱四年改五路義勇為保甲則是時義勇即保甲也五路當即河北河東陜西京東京西兵志元豐四年以九軍法一軍營陣按閲於城南好艸坡已事奨諭熙寧七年詔已降五陣法令諸将教習其舊教陣法並罷葢九軍營陣為方圎曲直鋭凡五變是為五陣神宗本紀元豐六年正月御崇政殿閲武士七年三月庚申御崇政殿大閱兵志元祐元年四月右司諫蘇轍上言諸道禁軍自置将以來日夜按習武藝将兵皆早晚兩教新募之士或終日不得休息今平居無事朝夕虐之以教閲使無遺力以治生事衣食殫盡憔悴無聊緩急安得其死力請使禁軍除新募未習之人其餘月止一教是月朝請郎任公裕言軍中誦習新法愚懵者頗以為苦夫射志於中而擊刺格鬬期於勝豈必盡能如法樞宻院亦以為元降教閲新法自合教者指授不當令兵衆例誦詔従之九月樞宻院奏異時馬軍教御陣外更教馬射其法全隊馳馬皆重行為之字透空發矢可迭出最便利近嵗専用順鬃直射抺鞦背射法止可輕騎挑戰即用衆乃不能重列非便請自今營閲排日馬軍之字射與立背射隔日互教詔可哲宗本紀元祐二年七月幸亥夏人寇鎮戎詔府界三路教閲保甲兵志三年五月罷提舉教習馬軍所哲宗本紀元祐五年十二月丙辰禁軍大閲賜以銀楪匹帛兵志紹聖元年三月樞宻院言禁軍春秋大教賞法每千人増取二百一十人給賞有差従之三年五月詔在京府界諸路禁軍格鬬法自今並依元豐條法教習七月詔選弩手兼習神臂弓八月詔殿前馬步軍司見管教頭别選事藝精強通曉教像體法者展轉教習其弓箭手馬步射射親用㸃藥包指及第二指知鏃並如元豐格法是月又詔復神臂弓射法為百二十步徽宗本紀崇寧四年九月乙巳詔京畿三路保甲並於農隙教閱兵志大觀元年詔以五陣法頒行諸路蕙田案五陣法謂方陣圎陣曲陣直陣鋭陣也五陣法前此曽罷矣崇寧大觀間紹復熙豐故有此命政和元年三月詔春秋大教諸軍弓弩斗力並依元豐舊制四年五月臣僚上言神臂弓垜逺百二十步給箭十隻取五中為合格軍中少得該賞恐惰於習射送殿前馬步軍司勘㑹将中貼箭數並改為上垜其一中貼此兩上垜従之五年三月詔自今敢占留将兵不赴教閱並以違御筆論不按舉者如其罪十一月臣僚言春秋大教諸軍弓弩上取斗力高强其射親中多者激賞太薄無以為勸詔依元豐法八年詔州郡禁軍出戍外常留五分在州教閲従毛友之請也重和元年正月兵部侍郎宇文粹中進對論訓練不精多充雜役帝曰祖宗軍旅之法最為宻緻神考尢加意訓習近來兵官䆮以弛慢古者春振旅夏苃舍秋治兵冬大閱皆于農隙以講事大司馬教戰之法大宗伯大田之禮細論周制大抵軍旅之政六卿無有不總之者今士人作守倅任勸農事不以勸耕稼為職管軍府事不以督訓練為意自今如役使班直及禁衞者當差人捉探懲戒更候日長即親御教閲激賞尋以粹中所奏參照條令行之宣和三年四月立騎射賞法其背射上垜中貼者依步射法推賞欽宗本紀靖康元年冬十月己酉閲砲飛山營兵志靖康元年二月詔軍兵久教習汰冗濫今三衙與諸将招軍惟務増數希賞但及等格不問勇怯招收既不精當教習又不以時雜色占破十居三四今宜招兵之際精加揀擇既係軍籍専使教習不得以雜色拘占又神臂弓馬黄弩乃中國長技宜多行教習以扞邊騎仍令間用衣甲教閱庶使習熟四月詔復置教場春秋大閱及復内教法以激賞之蕙田案靖康之詔切中當日之弊東坡云三代之法兵農為一唐中葉盡變府兵為長征之卒自爾以來農出穀帛以養兵兵出性命以衞農天下便之聖人復起不能易也熙豐以降訖于靖康教閲繁宻而兵不足用豈非安石改制之罪耶高宗建炎元年始頒樞宻院教閲法専習制禦摧鋒破敵之藝全副執帶出入短樁神臂弓長柄刀馬射穿甲木挺每嵗儗春秋教閱法立新格神臂弓日給箭二十射親去垜百二十步刀長丈二尺以上氈皮裹之引鬬五十二次不令刀頭至地每營選二十人閱習經兩閲者五十人為一隊教習分合隨隊多少分𨽻五軍每軍各置旗號前軍緋旗飛鳥為號後軍皂旗龜為號左軍青旗蛟為號右軍白旗虎為號中軍黄旗神人為號又别以五色物號制招旗分旗舉招旗則五軍以旗相應合而成陣舉分旗則五軍以旗相應分而成隊左右前却或分蔵為㐲或分出為竒皆舉旗為號更鳴小金應鼓備瞻望不及者豫約伏蔵之所緩鳴小金即止急鳴應鼓即竒兵出陣趨戰急鳴小金即㐲兵出其春秋大教推賞依海行格法李綱言水戰之利南方所宜沿河淮海江帥府要郡宜傚古制造戰船以運轉輕捷安穏為良又習火攻以焚敵舟詔命楊觀復往江浙措置河淮别委官高宗本紀建炎二年冬十月甲寅命揚州濬隍修城閲江淮州郡水軍三年七月乙巳詔江西閩廣荆湖諸路團教峒丁槍杖手山堂攷索紹興三年十二月辛亥司封員外郎鄭士彦奏國以兵故強兵以教故精孔子曰以不教民戰是謂棄之甚言其教之不可廢也惟國家方承平之際禁軍教習之法最嚴且宻況當艱虞之時其可忽諸方今諸州軍往往冗占樁留實妨教閲大抵以将迎為急務而以教習為虚文伏望深詔有司㕘酌祖宗成法申嚴而行之每州遴選兵官三兩員専主教習庶責任嚴而成效速嵗終則較其精粗而賞罰之如此則兵精而國振矣詔劄與諸路帥司措置施行紹興四年冬十月丁酉詔州縣團教弓手土兵五年春正月庚申置諸州軍教場選兵専習弓弩立格按試禮志紹興五年正月始御射殿閲諸班直殿前司諸軍指教使臣親従宿衞親兵并提轄部押親兵使臣射射共一千二百六十人每六十人作一撥遂詔户部支金千兩付樞宻院激賞庫充犒用三月御射殿閱等子趙青等五十人角力轉資支賜錢銀有差八月御射殿閲廣東路經略司解發到韶州士庶子弟陳裕試神臂弓特補進武校尉賜紫羅穿衫銀束帶差充本路經畧司指使高宗本紀紹興十四年十一月甲子復内教即禁中閲試三衙将士禮志十四年十一月閲殿前馬步軍将士藝精者賞有差自是嵗以冬月行之號曰冬教兵志二十四年臣僚言州郡禁卒逺方縱弛多不訓練春秋教閱臨時備數乞申嚴舊制高宗本紀紹興三十年秋七月甲申詔諸路帥司春秋教閲禁兵弓弩手三十一年五月壬辰選兩浙江東福建諸州禁軍弓弩手之半部送樞宻院按試秋七月丙子詔諸路帥臣教閲土兵弓手兵志三十一年詔比聞諸路州廂禁軍土軍有司擅私役妨教閲帥府其嚴責守兵勒兵歸營訓練精熟以備㸃視禮志三十二年四月二十五日御射殿閲射乾道二年十一月幸侯潮門外大教場次幸白石教場應従駕臣僚自祥曦殿並戎服起居従駕往囘内管軍御帶環衞官従駕宰執以下免従就逐幕次賜食俟進晚膳畢免奏萬福并免茶従駕還内二十四日幸候潮門外大教場進早膳次幸白石教場閲兵三衙率将佐等導駕詣白石皇帝登臺三衙統制統領官等起居畢舉黄旗諸軍皆三呼萬嵗拜訖三衙管軍奏報取㫖馬軍上馬打圍教場舉白旗三司馬軍首尾相接舉紅旗向臺合圍聴一金止軍馬各就圍地作圎形排立射生官兵隨鼔聲出馬射獐兔一金止疊金射生官兵各歸陣隊舉黄旗射生官兵就御臺下獻所獲帝遂慰勞賜賚諸将鞍馬金帶以及士卒諸軍懽騰鼓舞就列百姓觀者如山時久隂曀暨帝出郊雲霧解駁風日開霽帝遣諭主管殿前司王琪等曰前日之教師律整嚴人無譁囂分合應度朕甚悦之皆卿等力也琪等曰此陛下神武之化六軍恭謹所致臣願得以此為陛下剪絶奸宄四年十月殿前司官相視龍王堂北江岸以東茅灘一帶平地可作教場已脩築将臺将來三司馬步軍並各全装披帶衣甲執色器械至日先赴教場下營排辦俟駕登臺聴金鼓起居畢依資次變陣教閲所有聖駕出郊除禁衞外欲于本司入陣馬軍内摘差䕶聖駕軍八百人騎弓箭器械作十六隊于儀衞前後引従各分八隊隊各五十人往囘沿路各奏隨軍鼓笛大樂及摘差本司入教陣内諸軍步親隨一千人并統領将官三員至日先赴将臺下各分左右于後壁周圍留空地三十步以容禁衞外作三重環立十六日車駕至灘上諸軍人馬前一日于教場東列幕宿營是日三衞管軍與各軍統領將佐導駕乗馬至護聖步軍大教場亭更御甲胄至灘上皇帝登臺三衙起居畢權主管殿前司王逵奏三司人馬齊舉黄旗諸軍呼拜者三逵奏請従頭教閲中軍鳴角倒門角旗出營馬步軍簇隊成收鼔訖連三鼓馬軍上馬步人撮起旗槍四鼓舉白旗中軍鼓聲旗應變方陣為備敵之形别高一鼔步軍四向作禦敵之勢且戰且前馬軍出陣作戰鬬之勢别高一鼔各分歸地分五鼔舉黄旗變圎陣為自環内固之形如前節次訖三鼓舉赤旗變鋭陣諸軍相屬魚貫斜列前利後張為衝敵之形亦依前節次訖王逵奏人馬教絶取㫖舉青旗變放教直陣收鼓訖一金止重鼓三馬軍下馬步人齪落旗槍皆應規矩帝大悦犒賞倍之士卒歡呼謝恩如儀鳴角聲簇隊訖放教拽隊步人分東西引拽馬軍交頭于御臺下隨隊呈試驍鋭大刀武藝繼而進呈車砲火砲烟槍及赭山打圍射生馬步軍統制官蕭鷓巴以所獲獐鹿等就御臺下進獻人馬拽絶皇帝復御常服乗馬至車子院宣喚殿前司撥發官馬定逺侯彦昌各賜馬一匹彦昌仍自凖備将特陞副将進御酒上謂王逵曰今日教閲進止分合軍律整肅皆卿之力也逵奏陛下神武四海共知六師軍容孰敢不肅時賜酒俱以十分逵奏以軍馬事不敢飲帝曰少飲之親減大半飲畢謝恩退又宣問主管侍衞馬軍司李舜舉今日按閲之兵比向時所用之師何如舜舉奏曰今日所治之兵皆陛下平時躬親訓練撫以深恩賜之重賞忠勇百倍非昔日可比蕙田案乾道二年四年凡兩大閱俱見兵志而禮志為詳禮志所載儀節與序事頗有不同二年舉白旗紅旗軍馬各就圍地作圎形而其儀則教直鋭圎三陣也二年射生官射獐兔而其儀則無射生事也二年獻獲頒賜畢即訖事退而其儀則於教閲畢後尚有宰執等進御茶御酒諸儀也至四年于禁衞外又摘䕶聖馬軍作引従而二年及儀並無之其餘與儀同葢四年之閲較二年特為詳備且二年未有茅灘教場祗就白石行之廣狹不同耳孝宗本紀乾道六年十二月戊申大閱兵志乾道中詔弓箭手元射一石四斗力升加三斗元射一石力升加五斗弩手元射四石力升加五斗元射兩石七斗力升加八斗進秩推賞有差宰執進射親賞格虞允文曰拍試以斗力升請給今用射親定賞恐不加意斗力上曰然他日雖強弓弩可以取勝若止習射親則斗力不進此賞格不須行孝宗本紀七年三月乙亥詔訓習水軍五月遣知閤門事王樸㸃閲荆襄軍馬淳熙四年春正月戊申詔自今内外諸軍嵗一閱庚申詔沿江諸軍嵗再習水戰十二月乙亥大閱十年十一月甲戌幸龍山大閱兵志淳熙間立槍手及射鐵簾格上謂輔臣曰聞射鐵簾諸軍鼔躍奮厲周必大曰兵久不用此輩無進取自然氣惰今陛下激勸告戒人人皆勝兵于是殿前步軍司諸軍及馬軍舊司弓弩手射鐵簾合格兵共一千八百四十餘詔中垜簾弓箭手一石二斗力十箭弩手四石力八箭依格進兩秩各賜錢百緡弓箭手一石力十箭以上弩手三石力八箭各進兩秩詔中外諸軍賞格亦如之禮志慶元元年十月以在諒闇令宰執于大教場教閲寧宗本紀慶元二年冬十月甲戌大閲嘉泰二年十二月庚寅大閱三年冬十一月丙子命兩淮諸州以仲冬教閱民兵弓弩手兵志寳慶二年莫澤言州郡禁軍平時則以防冦盜有事則以備戎行實録於朝廷非州郡可得私役比年州郡軍政隳廢吝于廩給闕額恒多郡官主兵官有窠占寓公有借事存留者不什一當教閲時鈐總路分雖號主兵僅守虚籍莫敢號召入教之次坐作進退殆同兒戱守臣利虚券不招填主兵受厚賂改年甲且一兵請給嵗不下百緡以小計之一郡占三百人是虚費三萬緡也私役禁軍素有常憲守帥闢園池建第宅不給餐錢寓公去城遼絶類得借兵擾害鄉閭近而輔郡至有寓公占四五百兵者良由兵官之權輕而私占之禁弛也乞嚴戒監司守倅等止許借廂軍仍不得妨教閱餘官雖廂軍亦勿借王圻續通考嘉熙四年閏十二月閱軍頭司武伎淳祐十一年十二月上諭輔臣曰邊事未息武備當嚴五兵所先莫如弧矢昔种世衡守青澗日教習射羌人畏之其法可以推行詔今諸路帥閫守臣講明區畫詳議激勸使各令自衞鄉井弓弩箭隻聴従其便宋史度宗本紀咸淳元年八月庚辰命陳奕沿江按閱軍防賜錢二十萬給用兵志咸淳初臣僚言諸軍統領統制正将副将正欲在軍訓練閑于武事一有調用令下即行士悉将智将悉士勇所向無敵今江南州郡沿江制閫置帳前官専任營運不為軍計實為家謀絶無戰陳新功率従帳前升差大畧一軍僅二三千而使臣至五六百以供雜役王圻續通考淳祐中董槐知建康府時軍政弛弗治乃為賞三等以教射嵗餘盡為精鋭矣宋史度宗本紀咸淳二年五月癸丑詔諸節制将帥討軍實節浮費毋占役兵士致妨訓練兵志九年臣僚言比者招募軍兵一時徒取充數以覬賞格湼刺之後更不教閱主兵官苦以勞役日夜罔休一或少違即罹囹圄搒掠之酷兵不堪命而死者逃者接踵也今請以新招軍分𨽻諸隊使之熟紀律習事藝或旬或月上各郡閱試葢弊至于此而訓練之制大壞矣禮志教閱儀皇帝至祥曦殿行門禁衞等並戎服迎駕常起居皇帝至知閤門官以下並戎服常起居訖皇帝乗馬出従駕官従駕至候潮門外大教場御幄殿下馬入幄更衣訖皇帝被金甲出幄行門禁衞等迎駕奏萬福皇帝乗馬至教場臺下馬升臺入幄従駕官宰執親王使相正任知閤御帶環衞官升臺於幄殿分東西相向立管軍並令全装衣甲帶御器械執骨朶升臺于幄殿稍南面西立俟入内官喝排立皇帝出幄行門禁衞等迎駕奏萬福皇帝出閤門分引殿前馬步三司統制統領官常起居訖次三司将佐以下聴鼔聲常起居次殿帥執骨朶赴御座前奏教直陣俟教閱畢再赴御座前奏教圎陣俟教閱畢再赴御座前奏教鋭陣俟教閲畢再赴御座前奏教閱畢歸侍立内侍傳㫖與殿前太尉某諸軍謝恩承㫖訖轉與撥發官引三司統制統領将佐再拜謝恩訖各歸本軍皇帝起入幄更衣訖皇帝出幄皇帝座舍人引宰執墩後立俟進御茶牀舍人贊就坐宰執躬身應喏訖直身立就坐進第一盞酒起立墩後俟皇帝飲酒訖舍人贊就坐躬身應喏訖直身俟宰執酒至接盞飲酒訖盞付殿侍次舍人贊食並如儀至第四盞傳㫖宣勸訖御藥傳㫖不拜舍人承㫖贊不拜贊就坐第五盞宣勸如第四盞儀酒食畢舉御茶牀舍人分引宰執于幄殿重行立御藥傳㫖不拜舍人承㫖訖揖宰執躬身贊不拜各祗候直身立降踏道歸幕次皇帝起乗馬至車子院下馬皇帝出幄至車子院門樓上出賜親王酒再拜謝訖次賜使相正任並管軍知閤御帶環衞官酒訖逐班再拜謝訖依舊向立次親王執盞進皇帝酒皇帝飲酒訖一班再拜謝訖俟皇帝觀畢起降車子院門樓歸幄親王以下退皇帝乗馬出車子院門行門禁衞等迎駕奏萬福皇帝乗馬至侯潮門外大教場應従駕官並戎服乗馬従駕囘皇帝乗馬入和寧門至祥曦殿上下馬還宫乾淳御教記大閲先一日諸軍人馬金装執色于教場東布列軍幕宿營至日殿前馬步諸軍先赴教場下方營并親隨軍排列将壇之後質明三衙管軍官並金装従駕上自祥曦殿戎服乗馬太子親王宰執近臣並戎服乗馬以従護聖駕馬軍八百騎分執鎗旗弓矢軍器前後奏隨軍番部大樂等駕入教場升幄殿殿帥執撾躬身奏諸司人馬排立齊舉黄旗招諸軍向御殿梆子一鼓唱喏一鼓呼萬嵗再一鼔又呼萬嵗疊鼔呼萬萬嵗又一鼔唱喏殿帥奏取聖㫖鳴角發嚴上御金裝甲胄登將壇幄殿鳴角戒嚴殿帥奏取聖㫖馬步軍整隊成屯以備教戰連三鼔馬軍上馬步軍起旗槍分東西為應敵之勢舉白旗教方陣黄旗變圎陣皂旗變曲陣青旗變直陣緋旗變鋭陣緋心皂旗作長蛇陣緋心白旗作伏虎陣殿帥奏取聖㫖兩陣各遣勇将挑戰變八圎陣叠鼓舉旗左馬軍戰右步軍右馬軍戰左步軍再叠鼔交旗擊刺混戰三叠金分陣大勢馬軍四面大戰三叠金分陣殿帥奏教陣訖取㫖人馬排列當頭鳴角簇隊以俟放教諸軍呈大刀車砲煙槍諸色武藝御前傳宣撫諭将士射生官進獻獐鹿上更戎服賜宰臣已下對御酒五行殿帥奏取㫖謝恩如前唱喏訖駕出教場蕙田案南宋自慶元嘉泰以後禁衞之訓練猶間行之而外郡之兵多為州軍官所占役謂之軍匠甚至雕鏤組繡攻金設色之事皆兵為之葢光寧怠廢重以韓賈諸姦姑息之習成虚糜之政煩也右宋遼史太宗本紀天顯元年十二月甲辰閱旗鼔二年春正月己酉閲北尅兵籍庚戌閲南尅兵籍丁巳閱皮室伊喇摩哩三軍四年冬十月甲辰幸諸營閱軍籍庚戌以雲中郡縣未平大閱六軍㑹同三年五月戊子閱騎兵于南郊六月丙申閲步卒于南郊七年十二月癸卯南伐甲子次古北口閏月己巳閱諸道兵于温榆河九年八月自將南伐九月壬辰閱諸道兵于漁陽西棗林淀聖宗本紀統和元年冬十月上将征高麗親閱東京留守耶律未只所總兵馬三年七月丁卯遣使閲東京諸軍兵器及東征道路四年十二月癸酉御正殿大勞南征将校丙子南伐次狹底堝皇太后親閱輜重兵甲十四年冬十月丙辰命劉遂教南京神武軍士劍法賜袍帶錦幣興宗本紀重熙四年十二月癸丑詔諸軍砲弩弓劍手以時閱習道宗本紀夀隆元年九月丙辰詔西京砲人弩人教西北路漢軍蕙田案遼史兵衞志初分徳哷部為二又分舒紳軍皮室軍此御帳親軍也各宫有正丁轉丁騎軍各京有提轄司此宫衞騎軍也親王大臣所置私甲則大首領部族軍及衆部族軍也此皆屬禁衞至五京鄉丁則分屬州縣者矣其校閲之事祗見於本紀而志不及以今推之本紀所載國主自臨閱者皆禁衞之軍其宫衞騎軍當使提轄司臨閱首領部族軍當使招討司統軍司部署司兵馬司臨閲也金史太宗本紀天㑹三年八月壬子詔有司揀閲善射勇健之士以備宋王圻續通考天㑹三年十月詔分遣呼沙呼等十三人閲諸路丁壯調赴軍金史世宗本紀大定二十二年三月命尚書省申勅西北路招討司勒明安穆昆官督部人習武備二十六年九月庚寅上謂宰臣曰西南西北兩路招討司地隘明安人户無處圍獵不能閑習騎射委各明安穆昆官依時教練其弛慢過期及不親監視並決罰之章宗本紀明昌六年五月乙巳詔諸路明安穆昆農隙講武本路提刑司察其惰者罰之承安三年正月丁巳併上京東京兩路提刑司為一提刑使副兼安撫使副安撫専掌教習武事毋令改其本俗王圻續通考承安四年九月詔訓練軍士金史宣宗本紀貞祐三年三月丙寅勅河東河北大名長貳官訓練隨處義兵隣境有警責其救援興定二年六月甲辰樞宻院言諸路表稱大元集兵應州飛狐将分道南下觀其意不在河北而在陜西河東各路義士土兵蕃漢弓箭手宜于農隙教閲以備緩急蕙田案金兵志諸部長為貝勒千夫長為明安百夫長為穆昆天㑹二年罷是制凡諸部降人但置長吏以下従漢官之號燕山八路民兵𨽻諸萬户葢金之初起将志一而兵力齊其時校閱訓練之制史志無文殆不教而自精也明章以下襍用漢制兵之訓練大約責成於招討安撫二司矣元史兵志至元九年正月河南省請益兵勅諸路僉軍三萬詔元帥府統軍司總管萬户府閲實軍籍世祖本紀至元十六年十一月戊子命湖北道宣慰使劉深教練鄂州漢陽新附水軍二十二年十二月己亥江淮行省以戰船千艘習水戰江中二十五年六月乙丑詔蒙古人總漢軍閲習水戰成宗本紀大徳五年十一月丁未選六御扈従漢軍習武事仍禁萬户以下毋令私代犯者斷罪有差仁宗本紀至大四年冬十月壬辰勅諸衞漢軍練習武事皇慶元年夏四月庚午命浙東都元帥鄭祐同江浙軍官教練水軍延祐元年十月監察御史言乞命樞宻院設法教練士卒一應軍官襲職者試以武事而後任之詔曰可英宗本紀延祐七年十一月遣使閲實各行省戍兵至治三年春正月遣囘囘砲手萬户赴汝寧新蔡遵世祖舊制教習砲法泰定帝本紀泰定三年八月乙亥遣納瑪台簡閲邊兵十一月御史言比年營繕以衞軍供役廢武事不講請遵世祖舊制教習五衞親軍以備扈従不報四年二月詔同僉樞宻院事雅克特穆爾教閲諸衞軍蕙田案元史兵志國初典兵之官長萬夫者為萬户千夫者為千户百夫者為百户世祖脩官制内立五衞以總宿衞諸軍衞設親軍都指揮使外則萬户之下置總管千户之下置總把百户之下置彈壓立樞宻院以總之遇方面有警則置行樞宻院事已則廢而移都鎮撫司屬行省以上皆軍官也然其校閲之事則不専於以上諸官其在外則令元帥府統軍司主之或宣慰使或都元帥其在内或特遣人如泰定三年之遣納瑪台四年之遣雅克特穆爾是也此正當日内外相維文武相制之深意右遼金元王圻續通考明太祖呉元年春三月大閲時張士誠據兩淮未下大祖議征討遂揀将士更制編伍命鎮撫居明領之分隊習戰勝者賞銀十兩其傷而不退者亦稱勇敢士賞銀有差因諭之曰刀不素持必致血指舟不素操必致傾業弓馬不善習而欲攻戰未有不敗者吾故令汝等練之汝等勇健若此臨敵何憂不克爵賞富貴惟有功者得之又謂起居注詹同曰兵不貴多而貴精多而不精徒累行陣近來軍中募兵多有冗濫故特戒之冀得精鋭庶㡬有用也初定鼎金陵置五軍營設大教場在都城外南二里小教場在國子監之右望皇城迤西大政紀洪武六年正月壬子命吉安侯陸仲亨偕大同都督何文輝往北平練兵防禦戊午命中書省臣同大都督府御史臺六部議教練軍士律明㑹典凡操練洪武六年定操練軍士律騎卒必善馳射及鎗刀步兵必善弓弩及鎗凡射十二箭内六箭逺可到近可中為試中逺可到将士以一百六十步軍士以一百二十步近可中以五十步凡射弩每用十二箭内五箭逺可到蹶張以八十步划車以六十步凡用鎗以進退習熟為試中凡在京衞所每一衞以五千人為則内取一千人令所管指揮千百户總小旗領赴御前試驗餘以次輪班在外都司衞所每衞五千人取一千人令千百戸總小旗領赴京師一體驗試餘以次輪班其所試軍士如騎卒騎射便熟善鎗刀步軍善弓弩及鎗者所管指揮千百户總小旗各以其能受賞不中者降罰軍士中者受賞不中者亦給錢六百文為道里費指揮所管軍士一千人内三百人至四百人不中者住俸四箇月四百至五百人不中者住俸半年五百人至六百人不中者住俸十箇月六百人至七百人不中者住俸一年七百人以上不中者指揮使降同知同知降僉事僉事降千户千户所管軍士一千人内二百人至四百人不中者住俸半年四百人至六百人不中者住俸一年六百人以上不中者降百户百户所管軍士一百人内二十人至四十人不中者住俸半年四十人至六十人不中者住俸一年六十人以上不中降充總旗總旗所管五十人内二十五人以上不中小旗所管十人内五人以上不中者皆降為軍在京衞所發廣西南寧栁州守禦在外衞所北方者發南烟瘴地方南方者發迤北極邊衞分守禦各都指揮使司所試軍士四分以上不中者住俸一年六分以上不中者都指揮罷職蕙田案此校閱律令格式大政紀洪武十年正月命都督僉事藍玉練兵東昌十一年正月命信國公湯和率列侯韓政郭興俞通源黄彬練兵臨清以聴調遣明史兵志洪武十六年令天下衞所善射者十選一於農隙分番赴京較閱以優劣為千百户賞罰邊軍本衞較射太祖本紀二十年二月壬午閲武兵志洪武二十年命衞士習射於午門丹墀明年復令天下衞所馬步軍士各分十班将弁以蔭敘久次陞者統之冬月至京閱試指揮千百戸年深慣戰及屯田者免明年詔五軍府比試軍士分三等賞鈔又各給鈔三錠為路費不中者亦給之明年再試不如式軍移戍雲南官謫従征總小旗降為軍武臣子弟襲職試騎步射不中程令還衛與半俸二年後仍試如故者亦降為軍太祖本紀二十四年五月戊戌漢衞谷慶寧岷六王練兵臨清二十五年二月戊午靖寧侯葉昇等練兵於河南及臨鞏閏月戊戌馮勝為總兵官傅友徳副之練兵山西河南二十六年三月辛亥長興侯耿炳文練兵陜西三十年秋八月甲午李景隆為征虜大将軍練兵河南王圻續通考初立大小教場以練五軍将士永樂初既有五軍又有三千營以司寳纛令旗神機營以司神鎗火器是為三大營各營管操者曰提督各哨分管官曰坐司俱奏請于公侯伯都督都指揮内推選永樂間始間用内臣而神機火器則特命内臣監之曰監鎗又有掌號把總把司牌等官皆于都指揮内推選又京營之制主訓練在京官軍永樂遷都又于中都大寧山東河南附近衞所摘撥官軍輪班上操以内衞京師外備四方征伐云五軍營曰中軍曰左掖曰右掖曰左哨曰右哨管操練京衞及中都留守司山東河南大寧三都司各衞輪班馬步軍又有十二營管隨駕擺列馬隊官軍圍子手營管操練上直又刀手及京衞步隊官軍幼官舍人營管操練京衞幼官及應襲舍人殫忠効義營管操練京衞報効舍人餘丁皆五軍之支分也永樂初始以龍旗寳纛勇字旗負御寳及兵仗局什物等件上直官軍一管左右二十隊勇字旗大駕旗纛金鼔等件上直官軍一管傳令旗令牌御用監盔甲尚冠尚衣尚履什物等件上直官軍一管執大駕勇字旗五軍紅盔貼直官軍一管殺虎手馬轎及前哨馬營上直明甲官軍又有隨侍營隨侍東宫官舍遼東備禦囬還官軍此則三千營之支分也後永樂間因征交趾得其神機火箭之法遂立神機營亦設中軍左掖右掖左哨右哨各有坐營把司把牌等官管操演神銃神砲等項火器又有五千下者因得都督譚廣馬五千匹今謂之譚家馬者即此亦另置坐營把司等官統之此則神機營之支分也明史兵志文皇即位五駕北征六師嘗自較閱又嘗勅秦晉周肅諸王各選䕶衞軍五千命官督赴真定操練陜西甘肅寧夏大同遼東諸守将及中都留守河南等都司徐宿等衞遣将統馬步軍分駐真定徳州操練候赴京閱視蕙田案永樂中選步騎兵遣能幹指揮千户百戸統領赴京閱視此京操與輪操並重之始也考大事記於正史所舉諸處外尚有陜西守将山東山西陜西都司淮邳淮安揚州武平歸徳睢陽潼闗諸衞較正史更詳備大政紀永樂八年二月丁巳駐蹕宣府閱武營内癸亥命鎮守大同江隂侯呉高操練山西大同天城陽和等處軍馬整理城池節制山西都司行都司及太原三䕶衞官軍甲子駐蹕興和閱武營外上指揮将士坐作進退折旋無不如㫖十二年三月庚寅車駕發北京四月甲辰朔駐蹕興和己酉大閱軍士于沙城五月癸酉朔駐蹕楊林戍大閱武明㑹典凡行軍號令永樂十二年令凡交鋒之際突入賊陣透出其背殺敗賊衆者敢勇入陣斬将搴旗者本隊已敗賊衆别隊勝負未決而能救援克敵者受命能任其事出竒破賊成功者皆為竒功齊力進前首先敗賊者前隊交鋒未決後隊向前殺敗賊衆者皆為頭功凡建立竒功頭功者其親管頭目即為報知妄報者治以重罪行營及下營之時擒獲奸細者陞賞准頭功哨馬生擒冦賊一人者賞銀三十兩斬首一級者二十兩凡行營之時遇有鞍馬衣服器械不同者衣甲器械相同而喝問答號不同者皆即擒之來降冦賊所攜人口財畜分毫不許侵犯即時來報凡與賊對陣須齊力殺賊不許聚為一處掣拽空缺如力不能支不能決勝無勇無謀及不盡力殺賊者全伍皆斬凡隊伍已定不許馬軍入歩隊步軍入馬隊違者重罪如臨陣混戰失其本隊揷入别隊者不拘凡殺敗冦賊須盡力進勦不許搶掠人畜財物違者重罪如所乗馬困乏許以所擒賊馬換乗凡對敵之際一隊遞㸔一隊有不齊力前進者戰勝之後連隊之人首告治以重罪容情不首告者罪同凡管軍頭目須愛恤軍士亦聴令不許怠慢如伍中有一人不在小旗報總旗總旗報百户以次報至總兵官總兵官奏知従征官軍有在逃者斬該管頭目不報者重罪凡軍士須人馬相應不許以輭弱不堪者揷入隊伍如人壯馬弱或馬壯人弱者許弱者以馬與壯者若自己有馬臨戰之際能借與驍勇者殺賊有功許借馬人分賞不願分者聴其戰馬臨敵許騎無事騎者治罪各營馬驢須愛恤䭾載該管官時常㸃閱有故違及将軍器抛失或盜賣者俱重罪凡軍士行糧該管官旗時行㸃閲有過用及遺棄者并該管頭目皆斬凡軍行及下營之時須各認隊伍不許擅離及雜入别營别隊違者併該管頭目俱重罪凡夜行相遇即喝問有答號不得者擒送辨驗果是奸細照例陞賞故不答號及見而不擒者事覺俱治以重罪凡軍中遇夜以各様大小銅角笛聲為號不許聲音相同各聴號聲識認隊伍不許呌營違者論罪但夜間有喧譁者即問所起之處及左右應聲之人與該管頭目皆治以重罪凡行營須待大營旗纛起行或聴駕前銅角聲各營方許起行每日下營量撥步軍或五隊十隊馬軍五隊或三四隊步軍披甲馬軍不摘鞍伺侯長圍及架砲者布列已定方許入營休息有盜人衣糧諸物及盜驢馬宰殺并檢括隠蔵人遺失物者俱斬知情實首者給賞知而不首者同罪若收得馬驢騾垜者即送該軍轉送大營召人識認如有遺失被後哨官軍收獲者收後官治以重罪凡各營有失火者即是與賊遞送消息并該管頭目俱重罪其每日行營不許在途炊飯違者并本管頭目皆斬下營掘井必令人監守不許作踐及占蔵自用凡軍中有病者管隊官旗即令醫療掌藥料官及醫士常加廵視不許勒取財物違者重罪凡長圍及坐冷者須晝夜闗防各營架砲者務依方瞭望有灰塵揚起人馬往來若聞哨馬營及四面砲響即時傳報其管事官遇有事隨即飛報不許頃刻遲慢凡掠陣官臨敵時視有畏避退後者即斬之紀功過官遇有功者即紀之有過者即録之以憑賞罰凡臨陣令内官持象牙牌視有勇敢當先殺賊能立竒功頭功者即與牙牌收執徑赴大營給與勘合以憑陞賞凡軍中有妄談灾異及妖言或漏洩軍機者皆斬知情不首者罪同首實者重賞凡見鹿及野馬黄羊諸物驚走突入營伍及望見塵起及旋風揚沙野獸騰踏及見死馬牛羊與牛羊駝馬遺穢蹤跡或拾得一應物件若男女衣服首飾并文字等項不論久近隨即報知凡軍行在道不許圍獵或逺望似馬非馬似鹿非鹿似人非人白日見烟入夜見火不論是非即報凡功次務須實報有虚誑者重罪所報實者給與勘合無勘合者不准陞賞凡號令總兵官告都指揮都指揮告指揮指揮告千户千户告百户百户告總旗總旗告小旗小旗告軍士務令遵守蕙田案此申明行軍號令明史成祖本紀永樂二十年夏四月乙卯次雲州大閱五月乙丑獵于偏嶺丁卯大閱辛未次西凉亭壬申大閱二十一年秋七月戊申次宣府八月己酉大閱二十二年三月戊寅大閱仁宗本紀永樂二十二年十一月乙亥始命近畿諸衞官軍更番詣京師操練宣宗本紀宣徳元年春正月己未遣侍郎黄宗載十五人清理天下軍伍後遣使著為令明㑹典凡輪操宣徳元年調河南山東大寧都司中都留守司直𨽻淮揚等衞及宣府軍士至京操備令每嵗輪班往來明通紀宣徳三年八月車駕巡邊閱武四年七月上巡邊校獵閲武尋還京大政紀正統元年十月望車駕閱武于将臺上命諸将騎射以三矢為率受命者萬餘十一年十月閱武近郊明史英宗前紀正統十四年六月戊寅平鄉伯陳懷駙馬都尉井源都督王貴呉克勤太監林夀分練京軍於大同宣府明㑹典正統十四年令外衞輪班京操者前班三月還八月到後班八月還次年三月到河南山東北直𨽻强壯官軍皆𨽻前班蕙田案洪武之際國勢草創其練兵也皆因出師征討而無事之時未有定式永樂有定式矣然天子自行大閱者亦為命将出師或親征行之也仁宣之世亦然景泰以後因土木之變國家多故特重京撡隆萬以還操練更頻數矣然兵反不如洪武者戚繼光所謂但練花法與陣上所用全不相涉耳明史景帝本紀景泰三年十二月癸巳始立團營太監阮譲都督楊俊等分統之聽于謙石亨太監劉永誠曺吉祥節制王圻續通考明景泰三年始立京營團操法先是京軍分立三大營及土木變後卒伍耗弱屬邊報時警京師戒嚴兵部尚書于謙建議云此三營不相統一每遇調遣選摘號令不同兵将不相識或因而誤事請揀選諸營五步官軍一十五萬分為十營團操以備警急是團營每營官軍一萬五千員名各以都督領之每兵五千用都指揮一員十營共指揮三十員每營中每千用都指揮或指揮一員共十五員指總共五百名分管每隊用管隊官二員又命兵部尚書或都御史一員提督之嘗令在營操練統體相維兵将相識出征就令原都督等統領前去庶號令歸一而行伍不亂制曰可成化三年始立十二團營法時議抽選京衞伉健八萬外衞八萬外衞者分二班每班四萬連京衞共十二萬分為十二營曰奮武曰耀武曰練武曰顯武曰敢勇曰果勇曰效勇曰皷勇曰立威曰伸威曰揚威曰振威是為十二團營而三大營官軍之數不與焉每營各分五軍三千神機三營五軍營管内外馬步官軍三千營管内外馬隊官軍神機營管内外步隊官軍每營各設坐營把總等官統之若遇出征即量調而行三大營所揀存老弱者名曰老家兒専備營造差撥等用十二團營益以北直𨽻各衞曰京衞及山東河南江北各都司衞所精兵曰外衞并三大營兵共二十五萬實之分為春秋二班團操聴征十二營之制又自此始大政紀成化三年四月復十二團營命太子少保兵部尚書白圭不妨部事提督操練明通紀成化九年十月上閲武于内苑公侯而下皆騎射英國公張懋三發連中上大喜錫鈔千貫白金五十兩金帶一束尋命掌中軍都督府事提督五軍營𢎞治十五年春發保定京操軍回衞團操先是上欲于附近地方團操人馬以為京師左右掖以問劉大夏對曰京西保定府地方獨設都司統五衞仰思祖宗恐亦是此意未㡬一御史陳言奏将保定兩班一萬餘人回衞團練奏入上可之遂勅都指揮戴儀往任其事乃有造飛語帖子于宫門以誣大夏上曰宫門豈外人可到必此曺忿不得私役此軍者所為耳王圻續通考嘉靖十四年設池河演武場在定逺縣東二十里時雖遷都于北而在南兵衞不廢且練習以時皆轄于兵部及操江都御史葢以重根本而飭江防云十五年都御史兼提督團營王廷相上疏云即今團營内外官軍雖有十二萬之數而京衞撥去捕盜已五千六百員名外衞撥去各處做工及拽木等項常不下二萬有零雖云暫時借用而營伍經年空缺其見操者中間老弱疲羸不能執弓習藝者甚衆校閱之際已不堪觀脱有𦂳急邊情調遣又安望其投石超距奮勇以禦敵哉又團營軍士泒之雜差撥之做工留之拽木終嵗不得入操困苦以勞其身而敵愾之氣縮畚鍤以奪其習而弓馬之藝疎雖有團營聴征之名實與田畝常耕之夫無異是不能養其氣于未戰之先又軍士替役之難緣吏胥需索重賄貧軍不能辦此是以終年累月老弱在營苟且應役而精壯子弟不得收練是當革其弊于搭補之時又三大營挑選精壯以聴征有等富貴奸猾之徒懼營操出征之苦賄該管人員偽為不堪之數揀存本營其貧者不能營幹常川操練是當革三大營買差之弊由斯三者軍士之所以不精力也丙申詔改大興隆寺為講武堂先是兵部以為言上諭輔臣改之又諭禮部尚書夏言曰雖是兵事係典禮卿部裏可具奏來言奏曰周禮大司馬每遇仲月因時教武惟冬農隙則大閱之在漢有㑹都平樂觀之講唐有都外驪山之講宋有近郊西郊之講歴代之典雖各不同然倣古周制思患預防葢未始有二也太祖高皇帝經理淮甸親閲試将士太宗文皇帝靖難之後亦時加簡練是以國初名将叠出類皆文武兼資韜略素習威震沙漠策勲闕庭漢唐宋以來所未有也及今百七十餘年承平日久武備漸弛将驕卒惰㡬不知兵宜有足厪聖慮者講武事誠不可緩上嘉納之言因條三事以進一曰専教将領一曰尊崇廟祀一曰時加懲勸大政紀隆慶二年八月大學士張居正疏陳六事一飭武備今議者皆曰兵不多食不足将帥不得其人臣以為此三者皆不足患也夫兵不患少而患弱今軍伍雖缺而糧籍具存若能按籍徴求清查影占隨宜募補著實訓練何患無兵捐無用不急之費併其才力以撫養鬬戰之士何患無財懸重賞以勸有功寛文法以伸将權則忠勇之夫孰不思奮又何患于無将臣之所患特患於無奮勵激發之志耳故願皇上急先自治之圖堅定必為之志屬任謀臣脩舉實政不求近功不忘有事熟計而審行之不出五年敵可圖矣至于目前自守之策莫要于選擇邊吏團操鄉兵併守墩堡令民收保時簡精鋭出其空虚以制之即敵入犯亦可不至大失又考之古禮及我祖宗故事俱有大閱之禮以習武事而戒不虞今京城内外守備單弱臣嘗以為憂伏乞勅下戎政大臣申嚴軍政設法訓練每嵗或間嵗季冬農隙之時恭請聖駕親臨校閱一以試将官之能否一以觀軍士之勇怯注意武備整飭戎事亦足以伐狂寇之謀銷未萌之患誠轉弱為强之一機也疏入上曰覽卿奏皆深切時務具見謀國忠懇該部㸔議以聞兵部議覆飭武備事宜其一議兵祖宗朝九邊兵以百萬計今尚存六十萬有竒其逃者若能設法請補原額亦可盡復至于團練之法當令各邊選編見在軍士五人為伍五伍為一隊各立之長長各擇教師教以武藝其一議食冗兵汰則冒替之糧減主兵練則客兵之餉省我兵能戰而敵一遭剉則數年不擾而行糧可免敵既逺遁則我之威力能制屬裔之死命而撫賞亦可罷是足食之方已寓于練兵之中矣至于興屯監以復本色視豐儉以為折支又在户部酌議施行其一議将将才難得亦難任今邊臣不肯效死者弊在操切太過爵賞太輕請令督撫兵備官一切閫外之務悉聴總兵而下自擇進止不得拘以文法其一議選擇邊吏各邊守令務得真才其一議團練鄉兵凡沿邊郡縣不分城市村堡軍餘民舍皆列為鄉兵如邊軍隊伍之制各不妨農務隨時訓習遇有寇警移檄郡縣轉相告諭各率鄉兵乗機防守賊退而鄉兵有斬獲者仍照軍例陞賞雖無斬獲而防守無失者亦量犒之其一議守城堡寇賊臨墻不能拒之邊外則當急入收堡而邊内城堡又不能盡守則當擇適中之處将附近小堡併入大堡脩城浚濠務得堅固其軍民有自願包磚者聴亦量助之其一議整飭京營祖宗設立京營屯兵數十萬嵗久逃亡者衆見存僅九萬餘人中又多四方竄籍之人有以一人而應三五役者即春秋操演亦虚文耳今宜盡數報冊有名者行衞查補無名者發單清勾兵數既足仍行戎政大臣従實操練季冬㑹同巡視科道官視勤惰以聞至于大閲之禮宣宗嘗行之兔兒山英宗嘗行之北郊又嘗行之西苑望自隆慶二年為始于季冬農隙之候恭請聖駕親臨校閱一以甄别将官驗其教練之多寡以為黜陟之次第一以考校軍士視其技藝之高下以為賞賚之等差但有老弱即行汰易上曰然大閱既祖宗成憲允宜脩舉兵部宜與戎政官先期整飭俟明年八月内來聞餘悉如議明㑹典隆慶二年題准大閲儀注先一日預告於内殿用告詞行四拜禮如出郊常儀是日司禮監設御幄于将臺下總協戎政大臣巡視科道官督率将領軍兵預肅教場内外至日早遣官於教場内祭旗纛之神三大營官軍俱各披戴陳旌旗器械于本營擺列仍選撥将官四員統領有馬戰兵二十名于長安左門外伺候扈駕文職各堂上官六科十三道掌印官并禮科兵科禮部儀制司兵部四司官及糾儀官監射御史鴻臚寺供事官武職除應該操閱外其餘都督以上并錦衣衞堂上及南鎮撫司掌印僉書官各具大紅便服闗領扈従牙牌懸帶俱詣教場伺候一是日免朝錦衣衞備鹵簿駕設輦于皇極門下上常服乗輦由長安左門出扈駕官軍前後導従鉦鼓響器振作従安定門出至閱武門外總協戎政官率領大小将佐官戎服跪迎候駕過方起隨入将臺下北向序立駕進閱武門内中軍舉號砲三各營鉦鼔響器振作扈従官序立于行宫門外迎駕上到行宫門降輦兵部官導上入行宫鳴金止鼓候上升座扈従官行一拜叩頭禮傳賜酒飯各官仍叩頭謝恩畢即退出於将臺下東面序立兵部官跪奏請登臺大閱兵部鴻臚寺官導上登臺陞御幄舉號砲三鴻臚寺官跪奏京營将士叩頭贊一拜叩頭禮畢分東西侍立總協戎政官列于扈従官之北其餘将佐列於扈従官之南兵部尚書跪奏請令各營整搠人馬承㫖畢将臺上吹號笛麾黄旗總協戎政官指揮副㕘遊佐等官各歸所部整搠人馬兵部尚書跪奏請閱陣號砲三馬步官軍演陣悉如常法演畢将臺上吹號笛麾黄旗各将官軍士俱各回營少頃兵部尚書跪奏請閲射總協戎政官指揮副遊㕘佐坐營號頭中軍千總等官及聴射公侯駙馬伯錦衣衞等官俱於将臺下比較射藝馬上人各三箭步下人各六箭中的者鳴鼔以報用御史二員兵部司官二員監視紀録其餘把總以下及家丁軍士射箭以府部大臣并御史及兵部司官各四員於東西㕔分投校閱一體紀録其刀鎗火器等藝聴總協戎政官各量取一隊於御前呈驗訖兵部尚書跪奏大閱畢将臺上舉號旗總協戎政官及大小将領俱詣将臺下北向序立鴻臚寺官奏傳制贊跪各官皆跪鴻臚寺官宣制訖贊叩頭各官叩頭訖先退出閲武門外伺候仍贊扈従官行叩頭禮訖鴻臚寺官奏禮畢上回行宫少憩扈従官趨至閱武門内序立伺候送駕上陞輦中軍舉號砲三各營鼓吹齊鳴鹵簿及馬戰兵導従如來儀鉦鼔響器與大樂相應振作總協戎政以下官候駕至跪叩頭退馬戰兵至長安左門外止鹵簿大樂至午門外止上還仍詣内殿㕘謁如前儀是日百官不係扈従者各具吉服於承天門外橋南向北序立恭送候駕出長安左門退于本衙辦事駕還之時仍前序立迎候駕入午門百官退蕙田案以上専論京營及輪班馬軍教練之儀又案明太祖初即位即命元勛宿将如馮勝傅友徳輩分道練兵但未有定制其後洪武二十一年始下操練法俾遵行不如法及不嫻習者罰是時操練之制葢内外並重也景泰初始立十團營給事中鄧林進軒轅圖即八陣法因用以教軍成化間増團營為十二命月二次㑹操起仲春十五日止仲夏十五日秋冬亦如之嘉靖六年又申其制隆慶初命各營将領以教練軍士分數多寡為黜陟全營教練者加都督僉事以次減全不教練者降祖職一級革任回衞三年内教練有成撡協大臣奨諭恩錄無功績者議罰於是撡練乃特重于京營矣其衞所兵撡練之制兵志畧而不言然京營之重如此而及其末造兵力衰弱不振者何歟此則志所謂規制雖立将卒惰媮􅋵演徒為具文故也又案輪班馬軍本衞所之軍而番上京師者也始於永樂十三年其制頗有唐府兵番上宿衞之遺意此雖屬外兵實與京營同教練者又案王圻續通考及㑹典所載永樂摘撥官軍輪班之制但有中都大寧山東河南四處明史兵志則併及山西陜西各都司及江南北諸衞其説不同竊以既調官軍輪班不應但舉四處當以正史為據大政紀隆慶三年八月大閱将士于京營教場是日上戎服登壇軍容整肅五年正月以嵗終閲視京營将士明史兵志穆宗従給事中呉時來請命戚繼光練兵薊門薊兵精整者數十年繼光著練兵實紀以訓士一曰練伍首騎次步次車次輜重先選伍次較藝總之以合營二曰練膽氣使明作止進退及上下統屬相友相助之義三曰練耳使明號令四曰練手足使熟技藝五曰練營陣詳布陣起行結營及交鋒之正變終之以練将明㑹典神宗九年上親大閲一如隆慶中故事蕙田案明之軍制變於團營操演教閲此為最重一罷於英宗天順元年四月至憲宗成化二年四月而復再罷於武宗正徳十六年三月至穆宗隆慶二年而復復之是也然而憲孝以上以團營而盛嘉隆以後以團營而衰孝宗十八年已有工作不得擅役團營軍士之詔及觀王廷相所陳則占役買閑積弊尤甚矣李夢陽亦言十二團營近日欲遣将北伐拔之不満三萬狼狽若此何也官不恤軍豪勢多占壯丁各營其身老弱出而應㸃冗食而無補空名而鮮實也明史兵志謂京軍積弱由於占役買閑而其弊實始於紈袴之營帥監視之中官後人可不鑒哉右明五禮通考卷二百四十
