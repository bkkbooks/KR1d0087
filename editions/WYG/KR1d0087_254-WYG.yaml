body:
  text: 五禮通考二百四十四刑部尚書秦蕙田撰軍禮十二馬政上蕙田案馬者國之大用故政官以司馬名之重其事也考古天子之馬有二一曰國馬亦曰王馬一曰民賦之馬民賦者井邑丘甸中所出戎馬一甸出戎馬四疋畿内提封萬井出戎馬四萬疋是皆民養之平日有軍旅則賦之故曰萬乗千乗百乗此軍政也國馬則天子使人自養之周禮校人以下趣馬牧師廋人圉師及馬質等皆以養馬為職其事則牧之有地聚之有廏孳息有候阜育有方制馭有法勞逸有節所以養之教之盡物之性以供國之用者皆馬政也自井田法廢馬不賦于民而盡養于官漢唐以來言馬政者日亟其盛衰得失之由闗于軍國者鉅矣故詳述其源流以備考鑒周禮夏官校人掌王馬之政注政謂差擇養乗之數也月令曰頒馬政疏辨六馬是差擇也頒良馬而養乗是養乗也馬政謂齊其色度其力吕氏忱曰自黄帝堯舜觀象立制服牛乗馬自此馬始為用考三代之制天子萬乗諸侯千乗大夫百乗立國制賦之法莫不以馬為本所以乗馬之法在古今最為精宻然大而天子次而諸侯下而大夫乗馬之數多寡不同細考當時之數所謂牧養之馬有養之于官有蔵之于民如丘甸嵗取一匹之類皆是蔵之于民不仰國家芻秣如有事田獵征伐臨時徴召在天子之都諸侯之國大夫之家未嘗不自蓄馬此是養之于官者蔡氏徳晉曰兵政莫急于馬故校人為政官重職而以中大夫為之校人所養皆公家之馬萬有餘匹自路馬而外凡郎衞兵衞従王師田巡狩者皆當以此給之也蕙田案馬政之利病多矣然其要必在民馬與官馬分而其法始經久而無弊何則兵之所資者民馬也兵衆則馬亦衆非賦于民其何以給故三代之時俾人自養其馬則馬得所養而國無養馬之費此民馬之不可以官與焉者也國之所用者王馬也王馬之所任者國事非養于官何以為政故校人以下俾官共養吾馬則馬得蕃息而民無養馬之累若官馬而以民與之則為户馬為保馬為括馬而其害不可勝言矣此校人職特著明曰王馬之政可知民馬之無與于官官馬之不資于民而馬政之大綱舉矣易坤彖傳牝馬地類行地無疆繫辭傳服牛乗馬引重致逺以利天下葢取諸隨蕙田案以上二條言馬之用説卦傳乾為馬疏乾象天天行健故為馬也項氏安世曰造化權輿云乾陽物也馬故蹄圎坤隂物也牛故蹄拆陽病則隂故馬疾則卧隂病則陽故牛疾則立馬陽物故起先前足卧先後足牛隂物故起先後足卧先前足為良馬為老馬為瘠馬為駁馬疏良馬取其行健之善也老馬取其行健之久也瘠馬取其行健之甚瘠馬骨多也駁馬有牙如鋸能食虎豹取其至健也震其於馬也為善鳴為馵足為作足為的顙疏善嗚取雷聲之逺聞也馬後足白為馵取其動而見也作足取其動而行健也的顙白額為的顙亦取動而見也坎其於馬也為美脊為亟心為下首為薄蹄為曳疏美脊取其陽在中也亟急也取其中堅内動也為下首取其水流向下也為薄蹄取水流迫地而行也曳取水麾地而行也崔氏憬曰内陽剛動故為亟心蕙田案以上馬取象周禮夏官校人辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物注種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役鄭氏鍔曰種馬者馬之最善育其種類使生生不窮馬質馬量三物一曰戎馬二曰田馬三曰駑馬蔡氏徳晉曰戎馬以即戎田馬以出獵駑馬以供冗役之用髙氏愈曰校人職馬有六種而此止言三物者葢種馬不常有齊馬道馬皆王所乗以給臣民之用者唯三物而已廋人馬八尺以上為龍七尺以上為騋六尺以上為馬王氏應電曰八尺以上天子以備五路者月令所謂駕蒼龍也七尺以上諸侯之上駟詩所謂騋牝三千也六尺以上常馬耳蕙田案後世論馬皆以尺計葢本此詩魯頌駉駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯减傳駉駉良馬腹幹肥張也驪馬白跨曰驈黄白曰皇純黒曰驪黄騂曰黄駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才傳蒼白雜毛曰騅黄白雜毛曰駓赤黄曰騂蒼黒曰騏駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作傳青驪驎曰驒白馬黒鬛曰駱赤身黒鬛曰駵黒身白鬛曰雒駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂傳隂白雜毛曰駰彤白雜毛曰騢豪骭曰驔二目白曰魚邶風定之方中騋牝三千箋國馬之制天子十有二閑馬六種三千四百五十六匹邦國六閑馬四種千二百九十六匹禮記明堂位夏后氏駱馬黒鬛殷人白馬黒首周人黄馬蕃鬛爾雅釋畜騊駼馬野馬駮如馬倨牙食虎豹騉蹄趼善陞甗騉駼枝蹄趼善陞甗小領盜驪絶有力駥膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啟左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顛白達素縣面顙皆白惟駹回毛在膺宜乗在肘後減陽在幹茀方在背闋廣逆毛居馻騋牝驪牡𤣥駒褭驂牡曰隲牝曰騇駵白駁黄白騜駵馬黄脊騝驪馬黄脊騽青驪駽青驪麟驒青驪繁鬛騥驪白雜毛鴇黄白雜毛駓陰白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黒鬛駱白馬黒脣駩黒喙騧一目白瞷二目白魚注騊駼山海經云北海有獸状如馬名騊駼色青野馬如馬而小出塞外駮山海經云駮如白馬黒尾音如鼓食虎豹甗山形似甑上大下小騉蹄蹄如趼而健上山秦時有騉蹄苑騉駼亦似馬而牛蹄穆天子傳曰天子之駿盜驪騄耳又曰右服盜驪盜驪千里馬駥即馬髙八尺骹膝下也首俗呼為踏雪馬啟左傳曰啟服左白前左脚白右白後左脚白易曰震為馵足駵赤色黒鬛驪黒色跨髀間州竅尾本白尾株白尾白但尾毛白馰顙戴星馬也素鼻莖也俗所謂漫髗徹齒顙額回毛在膺樊光云俗呼之官府馬伯樂相馬法旋毛在腹下如乳者千里馬幹脅皆别旋毛所在之名逆毛馬毛逆刺騋牝詩云騋牝三千馬七尺以上為騋見周禮𤣥駒小馬别名褭驂耳或曰此即騕褭古之良馬名隲今江東呼駁馬為隲騇草馬名駁騜詩曰皇駁其馬騝騽皆背脊毛黄駽今之鐵驄驒色有深淺斑駁隠粼今之連錢驄禮記曰周人黄馬繁鬛繁鬛兩被毛或云美髦鬛鴇今之烏驄駓今之桃花馬陰淺黒今之泥驄騅詩曰有騅有駓騢即今之赭白馬形赤禮記曰夏后氏駱馬黒鬛騧今之淺黄色者為騧馬魚似魚目也詩曰有驔有魚論語驥不稱其力稱其徳也伯樂相馬經馬頭為王欲得方目為丞相欲得光脊為将軍欲得强腹脇為城郭欲得張四下為令欲得長眼欲得髙有紫艶光鼻孔欲得大鼻頭有王火字膺門欲開汗溝欲深口中欲得赤權頰欲滿如月膝骨圎而長耳欲得相近而前􅆆小而厚膺門馬前胸汗溝馬中脊也又曰伏龍骨欲得成頸欲得長雙趺欲得大而突蹄欲得厚腹下欲得平有八字尾骨欲得髙而垂眼下懸蠶懸鑿欲得成埤雅舊説相馬眼欲得有紫艶口欲得有紅光上唇欲得緩下唇欲得急上齒欲鉤鉤則夀下齒欲鋸鋸則怒耳欲如劈竹睛欲如懸鈴頭欲髙如剝兔項欲起如飛龍又曰人眼鳥目鹿背麟腹虎胸龜尾擎頭如膺垂尾如彗又曰望之大就之小筋馬也望之小就之大肉馬也前視見目傍視見腹後視見足駿馬也毛束皮皮束筋筋束肉肉束骨五者兼備天下之馬也又曰口中紅白間色者夀鼻中紅色如米點書者夀眼中赤色如字形者夀齊民要術耳小識人意鼻大則能奔目大則猛利不驚目四滿則朝暮健腎欲得小臁腹小則易養致瘦欲得見其肉謂前肩守肉等類致肥欲得見其骨謂頭顱等類龍顱突目平脊大腹䏶重有肉此三事備者亦千里馬也䏶胃腕也頷下欲深嗣骨欲廉如織杼而闊又欲長頰下側八骨是牙欲去齒一寸牙如劍鋒則千里額欲方平􅟰欲戴中骨髙二寸􅟰中骨也胸欲直而出頸骨欲大背欲短而方脊欲大而抗脢筋欲大脢筋夾脊筋也三府欲齊兩駱及中骨也附蟬欲大夜眼也肘後欲開髀骨欲短兩肩骨欲深蹄欲厚三寸硬如石下欲深而明其後開如鷂翼能久走國憲家猷汗溝欲深入如斬竹口中色如日月光者行千里口中有黒者曰御烏短夀白額入口名梅雁一名的盧安驥書頭宜少肉如剝兔頭口中欲鮮明舌欲方而薄長而大如朱相馬經馬生下墮地無毛行千里尿舉一脚行五百里蘭筋豎者千里旋毛在腹下如乳者千里膝如團麴三軍莫逐但知所發不知所宿一云蹄團如麴目成人者行千里一筋従元中出謂之蘭筋元中者目上陷如井字目成人者曈子中人頭足皆見國策張儀曰秦馬之良探前趹後蹄間三尋三尋三尺也海客日談凡善走之馬前蹄之痕印地則後蹄之痕反在前蹄之先謂之跨竈馬蹄之下有兩空處名曰竈門全雅馬之駿者溺皆射前足列子伯樂對秦穆公曰良馬可以形容筋骨相也天下之馬若滅若没若亡若失若此者絶塵弭轍臣有所與九方臯其相馬非臣之下也公使行求馬三月而反報曰已得之在沙丘公曰何色對曰牝而黄往取之牡而驪公曰物色牝牡尚弗能知何馬之能知伯樂曰若臯之所觀天機也得其精而忘其粗在其内而忘其外馬至果天下之馬也若滅若没若亡若失言恍惚而不定不可以形求也集異記寧王得二馬其一價一千緡一五百緡坐客觀之不相上下莫測其價之懸殊寧王令騐之馳驅數四乃顧千緡者曰此馬緩急百返蹄下不起纎塵復顧五百緡者曰此馬往來十過足下頗生塵埃以此品其髙下焉相馬經凡相馬之法先除三羸五駑乃相其餘大頭小頸一羸弱脊大腹二羸小脛大蹄三羸五駑者大頭緩耳一駑長頸不折二駑短上長下三駑大骼短脅四駑淺髖薄髀五駑國憲家猷秣馬之法必視其齒厯勞逸而調息之馬四年而兩齒五年而四齒六年而六齒成矣七年而右一齒缺八年而上下兩邊各一齒缺九年而上下盡缺十年而下兩齒齨十一年而下四齒齨十二年盡齨十七年上四齒齨十八年盡齨十九年上兩齒平二十年上四齒平年之長少惟馬齒最凖故人自謙曰犬馬之齒長矣相馬經馬一嵗上下齒二十四嵗齒黄三十四嵗齒落不復出馬經釋義案内經頭為諸陽之首具五官通七竅六腑清陽之氣五藏精華之血皆會於頭故庭闕宜張蕃蔽欲見心氣通舌心主血也肝氣通目肝主筋也脾氣通口脾主肉也肺氣通鼻肺主氣也腎氣通耳腎主骨也腰脊者身之大闗節也腹脅者臓腑之郭也膺門者氣海之所藏也跂脛者所以管趨翔也又五臓六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子腎所屬也筋之精為黒眼肝所屬也血之精為絡心所屬也其窠氣之精為白眼肺所屬也肌肉之精為約束脾所屬也蕙田案以上辨馬之名物周禮夏官校人凡頒良馬而養乗之乗馬一師四圉三乗為皂皂一趣馬三皂為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫注良善也善馬五路之馬鄭司農云四疋為乗養馬為圉故春秋傳曰馬有圉牛有牧𤣥謂二耦為乗師趣馬馭夫僕夫帥之名也趣馬下士馭夫中士則僕夫上士也自乗至廏其數二百一十六匹易乾為馬此應乾之筴也至校變言成者明六馬各一廏而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備麗耦也駑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬七十二匹則馭夫四百三十二匹矣然後従而三之既三之無僕夫者不駕於五路卑之也鄭氏鍔曰養之冀其繁盛乘之冀其調良乗馬一師而四圉之則牧馬之僕也師則教圉以養乘之法也四馬為一圉則養之必専四圉為一師則教之必審合三乗為十二匹則同一皂傳曰牛驥同皂皂言皂𨽻之所掌也合三皂而三十六匹則同一繫繫則繫屬而不散之義合六繫而二百一十六匹則同一廏廏則數至于此而已終既也先儒謂乾之策二百一十有六于易乾為馬天子之馬應爻之策其數盡于此故以廏名之合六廏而成一校而六廏又分為左右則十二閑矣王氏應電曰舊説謂駑馬一千二百九十六匹是駑馬為良馬三之一非三良馬之數矣八麗十六匹一圉師教之八師一百二十八匹也一趣馬督之八趣馬一千二十四匹也一馭夫領之止于馭夫而不屬于僕夫者以駑馬止充雜用而不當王之五路也凡七馭夫為馬七千一百六十八匹則與三良馬之數畧相當矣蔡氏徳晉曰一千二百四十匹而一馭夫自師至馭夫皆以八登之則有八馭夫可知矣然則合天子良馬駑馬之數計之共得馬一萬七百八十四匹而民間之馬不與也舊解誤王氏昭禹曰良馬自圉師至于校人則以中大夫為之其官為稍尊駑馬自圉師至馭夫而止者以其材下工良馬故掌養乗之者兼其數而掌其事則官至于中士之馭夫而已葢八趣馬則一馭夫掌之亦兼總于校人矣等馭夫之祿宫中之稍食注馭夫于趣馬僕夫為中舉中見上下稍食師圉夫史以下廋人正校人員選注校人謂師圉也正員選者選擇可備員者平之王氏應電曰馭夫而下可以備員于校人而中其選者廋人差而正之也蕙田案以上畜馬官職祿食及選舉之政校人天子十有二閑馬六種邦國六閑馬四種家四閑馬二種注降殺之差每廏為一閑諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬則皆分為三焉蔡氏徳晉曰十二閑良馬四閑三廏為一閑駑馬八閑每馭夫為一閑也邦國諸侯之國六閑良馬二閑駑馬四閑也四種無種馬戎馬也家天子公卿之家四閑二種田馬一閑駑馬三閑也又曰邦國六閑良馬二閑為一千二百九十六匹駑馬四閑為四千九十六匹合計之當得五千三百九十二匹衞文公騋牝三千齊景公有馬千駟未嘗過制也而陳用之譏其僭侈踰禮亦考之不詳矣鄭氏鍔曰周制自上而下禮之降殺各以兩獨諸侯之於天子不止於兩而已天子六軍諸侯則三軍天子之馬十二閑諸侯則六閑其降殺不止於兩者為其地近而嫌也故曰成國半天子之軍則馬之閑半乎天子豈不宜哉天子法天之大數故馬六種分為十二閑諸侯馬四種分為六閑半天子之制也大夫有田馬駑馬二種分為四閑又半諸侯也以司馬法論之甸方八里有戎馬四匹長轂一乗大夫采地四甸一甸供王其餘三甸纔有馬十二匹謂與校人之職甚異康成以為司馬法為民出軍賦無與於天子國馬之數余以其説考之古者天子有國馬有民賦之馬民馬出於井田之賦如所謂提封萬乗馬四萬匹提封千乗馬四千匹者是也若乃國馬則國所自養牧以待用者即此校人以下所云是也葢養於國者為車路之備出於民者為用兵之防此所以各足其事而不相傷也凡馬特居四之一注欲其乗之性相似也物同氣則心一鄭司農云四之一者三牝一牡鄭氏鍔曰特謂牡馬也詩云實惟我特又曰百夫之特則特者雄而特立之義蕙田案特與牡有異牡對牝而言特又别于牡而言牡所以駕服特所以蕃孳也閑中之馬特馬居牡馬四之一所以仲月通淫月令季春合累牛騰馬遊牝于牧者也故廋人佚特用之不使甚勞所以安其氣血校人夏攻特以牝馬方孕攻去其特勿使近牝以為蕃馬之本皆先王順時育物能盡物性之義又案以上養馬之數牧師掌牧地皆有厲禁而頒之注頒授圉者所牧處馬疏言厲禁者謂可牧之處亦使其地之民遮䕶禁止不得使人輒牧牛馬也鄭氏鍔曰水草繁多之地可以放牧馬之就牧者甚衆而官之所掌各有數之多寡故頒之以地也蕙田案馬必就牧雖官馬之在閑者當水草茂盛之候亦皆當置之牧地也孟春焚牧注焚牧地以除陳生新草鄭氏鍔曰孟春草将生焚去地之陳根使發生新芽則馬食而充肥蕙田案以上牧馬之地後世謂之牧厰設監以治之唐之四十八監等是也中春通淫注中春隂陽交萬物生之時可以合馬之牝牡也月令季春乃合累牛騰馬遊牝于牧秦時書也秦地寒凉萬物後動禮記月令季春之月乃合累牛騰馬遊牝于牧注所合牛馬皆繫在廏者其牝欲遊則就牧之牡而合之方氏慤曰合牛馬而遊牝于牧所以順隂陽之性且欲其孳生之繁也牧葢畜養之地蕙田案此遊牧孳息之令周禮夏官圉人掌養馬芻牧之事以役圉師王氏昭禹曰芻以食馬牧以放馬皆所以養之蕙田案芻牧以芻牧之所謂牧養也王氏説與牧師複又案此條馬之芻牧序官圉夫良馬匹一人駑馬麗一人圉師掌教圉人養馬春除蓐釁廏始牧夏庌馬冬獻馬疏莊公二十九年左傳春新延廏不時也凡馬日中而出日中而入謂春分秋分治廏當于是時劉氏彛曰冬寒以草藉馬曰蓐春則除之去其穢也釁廏辟去其惡也蔡氏徳晉曰始牧始出牧放也庌廡也夏酷暑而馬尤畏熱故為廡以凉之養馬之事莫要于温凉出入之以時故特舉之趣馬辨四時之居治以聴馭夫注居謂牧庌所處治謂執駒攻駒之屬疏云辨四時之居治者謂二月以前八月以後在廏二月以後八月以前在牧故云四時也云牧庌者放牧之處皆有庌厰以廕馬也蕙田案此條因時廏牧之政校人春執駒注鄭司農云執駒無令近母猶攻駒也二嵗曰駒三嵗曰駣𤣥謂執猶拘也春通淫之時駒弱血氣未定為其乗疋傷之夏頒馬攻特注夏通淫之後攻其特為其蹄齧不可乘用鄭司農云謂騬之蕙田案先鄭云騬之騬去勢也馬必騬而後可用春執駒已騬之矣及夏而通淫之特亦并騬之使供用也禮記月令仲夏之月游牝别羣則縶騰駒周禮夏官廋人掌十有二閑之政教以阜馬佚特教駣攻駒及執拘散馬耳圉馬注阜盛壮也鄭司農云散謂括馬耳毋令善驚也𤣥謂佚者用之不使甚勞安其血氣也教駣始乗習之也攻駒制其蹄齧者散馬耳以竹括押其耳頭動摇則括中物後遂串習不復驚王氏應電曰每圉二廋人一廋人所統三馭夫九趣馬二十七圉師一百八圉人政以治之教以導之自阜馬以至圉馬皆是也阜者秣飼以時使之壯盛佚者駕乗有節使不過勞三嵗曰駣始教以乗習二嵗曰駒攻治其蹄齧執駒以熟其性圉馬以就牢籠然後馬之惡者可使馴柔者可使良而無覂駕驚奔之患馬質綱惡馬注謂以縻索綱維狎習之也蕙田案先王所以盡馬之性者亦唯養之教之而已校人總其綱廋人馬質兼掌之巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人注乗謂驅步以發其疾知所疾處乃治之相助也疏財謂共祈具及藥直天官獸醫凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之蕙田案以上療馬疾夏官校人秋臧僕冬獻馬講圉夫注臧僕謂簡練馭者令皆善也𤣥謂馭五路之僕獻馬者見成馬于王也馭夫馭貳車從車使車者講猶簡習疏云講猶簡習者亦謂秋時物成講之使成也趣馬賞贊正良馬而齊其飲食簡其六節注贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等劉氏彛曰目以知其膽之不驚口以知其性之不悖耳以知其力之不殫鬛以知其血之有餘毛以知其氣之不暴蹄以知其行之不給六者簡馬之大節也王氏應電曰簡其六節者凡馬驅之而晉旋之而反此進退之節提之而走控之而止此行止之節驟之而趨馳之而奔此馳驟之節簡者督策之使合節此教導之法也蕙田案此養馬調馬之佐校人者六節王氏與注及劉執中説不同王氏為優葢此言贊正良馬則駑馬應不在内且與節字親切簡馬之道六者不可廢也掌説駕之頒疏凡用馬當均勞逸故脱駕須依次第馬質馬及行則以任齊其行注謂其所載輕重及道里齊其勞逸乃復用之蕙田案齊飲食簡六節掌説駕等皆所以臧僕而講馭夫之事歸於善養善教善用之馬政之實際也詩小雅吉日既差我馬傳差擇也爾雅釋畜既差我馬差擇也宗廟齊毫戎事齊力田獵齊足注齊毫尚純齊力尚強齊足尚疾周禮夏官校人凡軍事物馬而頒之注物馬齊其力蕙田案以上差擇頒馬之政馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈注此三馬買以給官府之使無種也鄭司農云皆有物賈皆有物色及賈直蔡氏徳晉曰質平也馬之價直不等故立馬質平之謂買馬則騐其駑良平其價直也易氏祓曰此言市馬之政凡受馬于有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否注鄭司農云更謂償也𤣥謂旬之内死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪日疏旬之内日少若養之善未能致死也故更旬之外多任之過馬力既竭雖養之善容得致死故不償若有馬訟則聴之注訟謂買賣之言相負巫馬馬死則使其賈粥之入其布於校人蕙田案以上市馬之事馬質禁原蠶者注原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁原蠶為其傷馬歟蕙田案此養馬之禁校人春祭馬祖注馬祖天駟也孝經説曰房為龍馬鄭氏鍔曰馬未嘗有祖此言馬祖者賈氏謂天駟也以天文考之天駟房星也房為龍馬馬生者其氣實本諸此則馬祖為天駟可知於春則祭春者萬物始生之時夏祭先牧注先牧始養馬者其人未聞鄭氏鍔曰先牧始教人以放牧者也夏草方茂馬皆出而就牧思其始教以養牧之法故祭於夏秋祭馬社注馬社始乗馬者世本曰相土作乗馬王氏昭禹曰馬社廏中之土􅅘凡馬日中而出日中而入秋馬入廏之時故祭馬社鄭氏鍔曰皂廏所在必有神焉賴乎土神以安其所處故祭馬社蕙田案王氏鄭氏説與注不同似更優冬祭馬步注馬步神為災害馬者鄭氏鍔曰寒氣總至馬方在廏必存其神使不為災唐人之頌曰冬祭馬步存神也馬之難育也必祈諸神以為之助四時祭之順其時各有蕃馬之法廋人掌祭馬祖祭閑之先牧注閑之先牧先牧制閑者鄭氏鍔曰廋人職卑安得主馬祖之祭於校人祭馬祖之時已則祭閑之先牧校人祭先牧迺祭始教牧之人此祭閑之先牧則祭始作閑以牧馬之神春官甸祝禂牲禂馬皆掌其祝注杜子春云禂禱也為馬禱無疾為田禱多獲禽詩云既伯既禱爾雅云馬祭也𤣥謂禂讀如伏誅之誅今侏大字也為牲祭求肥充為馬祭求肥健疏知此皆有祭者以其言皆掌其祝號是有祭事蕙田案以上馬政祭祀又案三代以後國之需馬益急養馬之政益煩而卒至于耗弊而無實者究由畜牧之不精也今考周禮校人趣馬巫馬牧師廋人圉師圉人等職大小相維詳要具舉則官得其人矣牧地有厲禁廏牧有時令則天地之和協矣芻秣有専司疾病有醫療而養之極其精矣贊正良馬而教駣攻駒散馬耳綱惡馬則教之極其馴矣至于仲月通淫游牝攻特則又全其孳息之性焉後世論牧政者所當詳究也右周馬政史記秦本紀造父以善御幸于周穆王得驥温驪驊駵騄耳之駟其後又有非子居犬丘好馬及畜善養息之孝王召使主馬于汧渭之間馬大蕃息貨殖傳烏氏倮韋昭曰烏氏縣名倮名也畜牧及衆斥賣求竒繒物間獻遺戎王戎王什倍其償與之畜畜至用谷量馬牛秦始皇帝令倮比封君以時與列臣朝請歸氏有光曰周禮牧馬之事皆自古以來傳其法所以能盡物之性者也或謂周葢令民間養馬考其實不然丘甸之馬國有賦調民自具馬以即戎民之平日養馬官何與焉唯校人以下之職乃為王馬而天子使人自養之者也牧師所謂牧地皆在草莽水泉之區若今之苑馬然其後天子亦不盡如其制而自以其意使人養馬穆王時造父馭八駿孝王命非子主馬汧渭之間皆非如周禮有一定之官也春秋時魯衞弱國而魯僖公坰牧之盛衞文公騋牝三千詩人歌頌之秦起西北牧多健馬其詩曰駟驖孔阜六轡在手又曰騏駵是中騧驪是驂言秦馬之良也諸侯力政國各有馬至千萬騎後秦併六國馬皆入之秦及山東豪俊起章邯以百萬之師數進數卻竟以敗降秦馬無聞焉漢書百官公卿表太僕秦官應劭曰周穆王所置也盖大御衆僕之長中大夫也掌輿馬有兩丞屬官有大廏未央家馬三令各五丞一尉師古曰家馬者主供天子私用非大祀戎事軍國所須故謂之家馬也又車府路軨騎馬駿馬四令丞伏儼曰主乗輿路車又主凡小車軨今之小馬車曲輿也師古曰軨音零又龍馬閑駒橐泉騊駼丞華五監長丞如淳曰橐泉廏在槖泉宫下師古曰閑闌養馬之所也故曰閑駒騊駼出北海中其状如馬又邊郡六牧師菀令各三丞師古曰漢官儀云牧師諸菀三十六所分置北邊西邊分養馬三十萬頭又牧橐昆蹏令丞如淳曰爾雅曰昆蹏研善升甗者也因以為廏名師古曰牧橐言牧養橐駞也昆獸名也號研者謂其蹏下平也善升甗者謂山形如甑而能升之也蹏即古蹄字耳皆屬焉金日磾傳輸黄門養馬牽馬過殿下馬又肥好拜為馬監史記平準書漢興丈夫従軍旅老弱轉糧饟作業劇而財匱自天子不能具鈞駟而将相或乗牛車為秦錢重難用更令民鑄一黄金一斤約法省禁而不軌逐利之民蓄積餘業以稽市物物踊騰糶米至石萬錢馬一匹則百金至今上即位數嵗國家無事衆庶街巷有馬阡陌之間成羣而乗字牝者儐而不得與會漢書文帝本紀二年詔太僕見馬遺財足師古曰遺留也減留纔足充事而已餘皆以給傳置蕙田案此裁省廏馬之始食貨志鼂錯曰今令民有車騎馬一匹者復卒三人車騎者天下武備也故為去聲復卒蕙田案此養馬復卒之始孝景二年始造苑馬以廣用宫室列館車馬益増修矣景帝本紀四年御史大夫綰奏禁馬髙五尺九寸以上齒未平不得出闗漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬匹武帝本紀建元元年罷苑馬以賜貧民師古曰養馬之苑舊禁百姓不得芻牧采樵今罷之蕙田案此牧地弛禁之始史記平準書大将軍再出擊胡漢軍士馬死者十餘萬天子為伐胡盛養馬馬之來食長安者數萬疋卒牽掌者闗中不足乃調旁近郡而胡降者皆衣食縣官縣官不給天子乃損膳解乗輿駟出御府禁臧以贍之匈奴列傳初漢兩将大出圍單于所殺虜八九萬而漢士物故者亦萬數漢馬死者十餘萬疋匈奴雖病逺去而漢馬亦少無以復往漢書食貨志令民得蓄邊縣孟康曰令得蓄物于邊縣官假馬母三嵗而歸及息什一以除告緡用充入新秦中李竒曰邉有官馬今令民能蓄官母馬者滿三嵗歸之十母馬還官一駒此為息什一也師古曰官得母馬之息以給用度得充實秦中故除告緡之令明年車騎馬乏縣官錢少買馬難得迺著令令封君以下至三百石吏以上差出牡馬天下亭亭有蓄字馬嵗課息蕙田案建元罷苑馬而畜馬之本傷矣數出師而用馬之力殆矣于是為假母歸息之令而車騎之馬遂乏甚至官吏出馬不踰時更籍吏民馬矣史記貨殖傳塞之斥也唯橋姚已致馬千疋牛倍之羊萬頭注塞斥者言因斥開邊塞更令寛廣故橋姚得恣其畜牧也漢書武帝本紀元鼎四年馬生渥洼水中李斐曰南陽新野有暴利長遭刑屯田燉煌界數于此水旁見羣野馬中有竒異者與凡馬來飲此水利長先作土人持勒靽于水旁後馬玩習久之代土人持勒靽收得其馬獻之欲神異此馬云従水中出作天馬之歌史記大宛列傳張騫為天子言大宛多善馬馬汗血其先天馬子也漠使烏孫烏孫使使獻馬初天子發書易云神馬當従西北來得烏孫馬好名曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極名大宛馬曰天馬云漢使者往既多言宛有善馬在貳師城匿不肯與漢使天子既好宛馬聞之甘心使壯士請宛王貳師城善馬宛謀曰貳師馬宛寶馬也不肯與漢使天子大怒拜李廣利為貳師将軍期至貳師城取善馬是嵗太初元年也漢書李廣利傳太初元年以廣利為貳師将軍期至貳師城取善馬故號貳師将軍拜習馬者二人為執驅馬校尉備破宛擇取其善馬圍其城宛大恐遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聴我我盡殺善馬貳師許宛之約宛大出其馬令漢自擇之漢軍取其善馬數十匹中馬以下牝牡三千餘匹西域傳大宛俗嗜酒馬耆目宿宛别邑七十餘城多善馬馬汗血言其先天馬子也師古曰言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始為武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至愛其寶馬不肯與漢使妄言師古曰謂詈辱宛王宛遂攻殺漢使取其財物于是天子遣貳師将軍李廣利将兵前後十餘萬人伐宛連四年宛人斬其王母寡首獻馬三千匹漢軍乃還語在張騫傳貳師既斬宛王更立貴人素遇漢善者名昧蔡為宛王後嵗餘宛貴人以為昧蔡讇使我國遇屠師古曰讇古諂字相與共殺昧蔡立母寡弟蟬封為王遣子入侍質于漢漢因使使賂賜鎮撫之又發使十餘輩抵宛西諸國求竒物因風諭以伐宛之威師古曰風讀曰諷宛王蟬封與漢約嵗獻天馬二匹漢使采蒲陶目宿種歸天子以天馬多又外國使來衆益種蒲陶目宿離宫館旁極望焉師古曰今北道諸州舊安定北地之境往往有目宿者皆漢使所種也後漢書馬援傳孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門武帝本紀太初二年籍吏民馬補車騎馬師古曰籍者總入籍録而取之西域傳征和中上下詔深陳既往之悔禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已孟康曰先是令長吏各以秩養馬亭有牝馬民養馬皆復不事後馬多絶乏至此復修之也師古曰此説非也馬復因養馬以免徭賦也郡國二千石各上進畜馬方畧補邊狀與計對師古曰與上計者同來赴對也徐氏曰案晁錯疏言民有車騎馬一匹者復卒三人即馬復令也昭帝本紀始元四年秋七月詔往時令民共出馬其止勿出諸給中都官者且減之五年夏罷天下亭母馬及馬弩闗應劭曰武帝令天下諸亭養母馬欲令其繁孳又作馬上弩機闗今悉罷之孟康曰舊馬高五尺九寸以上齒未平弩十石以上者皆不得出闗今不禁也元鳯二年六月詔曰朕閔百姓未贍前年減漕三百萬石頗省乗輿馬及苑馬以補邊郡三輔傳馬其令郡國毋斂今年馬口錢文穎曰往時有馬口出斂錢今省如淳曰所謂租及六畜也蕙田案此係昭帝元鳯二年事文獻通考以為宣帝五鳯二年誤元帝本紀初元元年六月省苑馬以振困乏九月詔太僕減穀食馬二年三月詔罷黄門乗輿狗馬五年四月詔大官所具各減半乗輿秣馬無乏正事而已貢禹傳禹奏言髙祖孝文孝景皇帝循古節儉廏馬百餘匹方今廏馬食粟将萬疋今民大飢而廏馬食粟苦其大肥氣盛怒至乃日步作之願減損乗輿服御廏馬亡過數十匹天子納善其忠乃下詔太僕減食穀馬成帝本紀建始二年秋減乗輿廏馬林氏曰漢初民出善賦以備車馬武帝於口賦錢人増三錢以補車騎馬昭帝元鳯二年令郡國毋斂今年馬口錢又稍復古制勸民養馬有一匹者復卒三人葢居閑則免三人之算有事則當三人之卒此内郡之制也至於邊塞則縦民畜牧而官不禁烏氏居塞則馬數千羣橋姚居塞則致馬千匹貨殖傳于時内郡之盛則衆庶有馬阡陌成羣食貨志邊郡之盛則三十六苑分置西北漢儀注武帝初年單于入塞見馬布野而無人牧者征伐四彛而馬往來食長安者數萬疋既數出師馬大耗乏乃行一切之令自封君而下至三百石吏以次出馬則内郡庶民之有馬者欲望復卒難矣又令民得畜邊者従官假馬母而歸其息十一則邊郡之欲廣蓄牧難矣又匿馬者有罪有以列侯匿馬而至腰斬者功臣表黎頃侯召奴有以民或匿馬馬不具而長安令㡬坐死者汲黯傳故内郡不足則籍民馬以補車騎邊郡不足則發酒泉騾駞負石至玉門闗武紀太初三年輪臺之恨始修馬令吁亦晚矣歸氏有光曰漢馬莫盛于孝武之世後以馬耗故為假馬母歸息諸一切法此後世民養官馬之始也然不久而罷漢太僕所領若車府路軨騎馬駿馬龍馬閑駒騊駼諸監廏皆内馬也邊郡六牧師苑及漢陽流馬苑此皆在外而諸牧師苑分在河西六郡中北地靈州有河竒苑號非苑歸徳有堵苑白馬苑郁郅有牧師苑襄平有牧師官鴻州有天封苑太官有家馬官其後又置越嶲長利髙望始昌三苑益州有萬嵗苑犍為有漢平苑皆太僕屬也後漢書百官志太僕卿一人掌車馬丞二人未央廏令一人主乗輿及廏中諸馬長樂廏丞一人舊有六廏中興省約但置一廏後置左駿令廏别主乗輿御馬後或併省又有牧師苑皆令官主養馬分在河西六郡界中中興皆省唯漢陽有流馬苑但以羽林郎監領馬援傳援好騎善别名馬於交趾得駱越銅鼔乃鑄為馬式還上之因表曰夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有騐效臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後臣謹依儀氏䩭中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法馬髙三尺五寸圍四尺五寸有詔置於宣徳殿下以為名馬式焉注援銅馬相法曰水火欲分明水火在鼻孔兩間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深劍下唇欲緩牙欲前向牙欲去齒一寸則四百里牙鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長縣薄欲厚而緩縣薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石和帝本紀永元五年二月詔有司省減内外廏及凉州諸苑馬安帝本紀永初元年九月詔廏馬非乗輿常所御者皆減半食六年春正月詔越嶲置長利髙望始昌三苑又令益州郡置萬嵗苑犍為置漢平苑順帝本紀漢安元年始置承華廏東觀記曰時以逺近獻馬衆多園廏充滿故置馬氏端臨曰當時隠士魏桓被徵不出謂人曰廏馬萬疋其可減乎葢當時畜馬未嘗以資軍國之用徒侈服御糜廩粟而已靈帝本紀光和四年正月初置騄驥廏丞領受郡國調馬注調謂徴發也豪右辜榷馬一匹至二百萬注辜障也榷専也謂障餘人賣買而自取其利中平元年三月詔公卿出馬弩十一月詔廏馬非郊祭之用悉出給軍右秦漢晉書職官志太僕統典牧乗黄廏驊騮廏龍馬廏等令太僕自元帝渡江之後或省或置太僕省故驊騮為門下之職馬政志梁置太僕卿與太府少府為夏卿太僕漢為中二千石梁列為十二卿至後魏第二品最高品矣後與九卿並第三品大氐以後品皆第三時南北二朝南朝有廢置北朝無廢置魏書太宗紀永興五年詔諸州六十户輸戎馬一疋泰常六年春二月調民二十戸輸戎馬一疋大牛一頭三月乙亥制六部民羊滿百口輸戎馬一疋世祖紀太延二年十一月行幸棝陽驅野馬於雲中置野馬苑宇文福傳太和十七年車駕遷洛勅福檢行牧馬之所福規汳濟以西河内以東拒黄河南北千里為牧地事尋施行今之馬場是也及徙代移雜畜于牧所福善於将養並無耗損髙祖嘉之轉驍騎将軍仍領太僕典牧令食貨志世祖之平統萬定秦隴以河西水草善乃以為牧地畜産滋息馬至二百餘萬疋橐駞将半之牛羊則無數髙祖即位之後復以河陽為牧場恒置戎馬十萬疋毎嵗自河西徙牧於并州以漸南轉欲其習水土而無死傷也而河西之牧彌滋矣正光以後天下喪亂遂為羣盜所盜掠焉隋書百官志後齊太僕寺掌諸車輦馬牛畜産之屬統驊騮掌御馬及諸鞍乗左右龍左右牝掌駝馬等署令丞驊騮署又有奉承直長二人左龍署有左龍局右龍署有右龍局左牝署有左牝局右牝署有右牝局右南北朝隋太僕寺又有獸醫博士員一百二十八統驊騮乗黄龍廏等署各置令二人乗黄減一人隴右牧置總監副監丞以統諸牧其驊騮牧及二十四軍馬牧每牧置儀同及尉大都督帥都督等員驢騾牧置帥都督及尉苑川十二馬牧毎牧置大都督及尉各一人帥都督二人緣邊交市監及諸屯監每監置監副監各一人畿内者𨽻司農自外𨽻諸州焉煬帝即位太僕減驊騮署入殿内尚乗局改龍廏曰典廏署有左右駁皂二廏加置主乗司庫司廩官尚乗局置左右六閑一左右飛黄閑二左右吉良閑三左右龍媒閑四左右騊駼閑五左右駃騠閑六左右天苑閑有直長十四人又有奉乗十人禮儀志隋制常以仲春用少牢祭馬祖於大澤諸預祭官於祭所致齋一日積柴於燎壇禮畢就燎仲夏祭先牧仲秋祭馬社仲冬祭馬步並於大澤皆以剛日牲用少牢如祭馬祖埋而不燎唐書兵志唐之初起得突厥馬二千疋又得隋馬三千於赤岸澤徙之隴右監牧之制始於此其官領以太僕其屬有牧監副監監有丞有主簿直司團官牧尉排馬牧長羣頭有正有副凡羣置長一人十五長置尉一人嵗課功進排馬又有掌閑調馬習上又以尚乗掌天子之御左右六閑一曰飛黄二曰吉良三曰龍媒四四騊駼五曰駃騠六曰天苑總十有二閑為二廏一曰祥麟二曰鳯苑以繫飼之其後禁中又増置飛龍廏初用太僕少卿張萬嵗領羣牧自貞觀至麟徳四十年間馬七十萬六千置八坊岐豳涇寧間地廣千里一曰保樂二曰甘露三曰南普閏四曰北普閏五曰岐陽六曰太平七曰宜祿八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列布河西豐曠之野凡馬五千為上監三千為中監餘為下監監皆有左右因地為之名方其時天下以一縑易一馬萬嵗掌馬久恩信行於隴右後以大僕少卿鮮于匡俗檢校隴右牧監儀鳯中以太僕少卿李思文檢校隴右諸牧監使監牧有使自是始後又有羣牧都使有閑廏使使皆置副有判官又立四使南使十五西使十六北使七東使九諸坊若涇川亭川闕水洛赤城南使統之清泉溫泉西使統之烏氏北使統之木硤萬福東使統之他皆失傳其後益置八監於鹽州三監於嵐州鹽州使八統白馬等坊嵐州使三統樓煩元池天池之監凡征伐而發牧馬先盡強壯不足則取其次錄色嵗膚第印記主名送軍以帳䭾之數上於省自萬嵗失職馬政頗廢永隆中夏州牧馬之死失者十八萬四千九百九十景雲二年詔羣牧嵗出高品御史案察之開元初國馬益耗太常少卿姜誨乃請以空名告身市馬於六胡州率三十疋讐一游擊将軍命王毛仲領内外閑廏九年又詔天下之有馬者州縣皆先以郵遞軍旅之役定户復緣以升之百姓畏苦乃多不畜馬故騎射之士減曩時自今諸州民勿限有無廕能家畜十馬以下免帖驛郵遞征行定戸無以馬為貲毛仲既領閑廏馬稍稍復始二十四萬至十三年乃四十三萬其後突厥欵塞明皇厚撫之嵗許朔方軍西受降城為互市以金帛市馬於河東朔方隴右牧之既雜胡種馬乃益壯天寶後諸軍戰馬動以萬計王侯将相外戚牛駝羊馬之牧布諸道百倍於縣官皆以封邑號名為印自别将校亦備私馬議者謂秦漢以來唐馬最盛天子又鋭志武事遂弱西北蕃十一載詔二京旁五百里勿置私牧十三載隴右羣牧都使奏牛馬駝羊總六十萬五千六百而馬三十二萬五千七百安祿山以内外閑廏都使兼知樓煩監陰選勝甲馬歸范陽故其兵力傾天下而卒反肅宗收兵至彭原率官吏馬抵平凉蒐監牧及私羣得馬數萬軍遂振至鳯翔又詔公卿百寮以後乗助軍其後邊無重兵吐蕃乗隙陷隴右苑牧畜馬皆沒矣乾元後回紇恃功嵗入馬取繒馬皆病弱不可用永泰元年代宗欲親擊吐蕃魚朝恩乃請大搜城中百官士庶馬輸官曰團練馬下制禁馬出城者已而復罷徳宗建中元年市闗輔馬三萬實内廏貞元三年吐蕃𦍑渾犯塞詔禁大馬出潼蒲武闗者元和十一年伐蔡命中使以絹二萬市馬河曲其始置四十八監地據隴西金城平凉天水員廣千里繇京度隴置八坊為會計都領其間善水草腴田皆隸之後監牧使與坊皆廢故地存者一歸閑廏旋以給貧民及軍吏間又賜佛寺道館㡬千頃十二年閑廏使張茂宗舉故事盡收岐陽坊地失業者甚衆十三年以蔡州牧地為龍陂監十四年置臨漢監於襄州牧馬二千二百費田四百頃穆宗即位岐人叩闕訟茂宗所奪田事下御史案治悉子民太和七年度支鹽鐵使言銀州水甘草豐請詔刺史劉源市馬三千河西置銀州監以源為使襄陽節度使裴度奏停臨漢監開成二年劉源奏銀州馬已七千若水草乏則徙牧綏州境今綏南二百里四隅險絶寇路不能通以數十人守要畜牧無他患乃以𨽻銀州監其後闕不復可紀歸氏有光曰漢以來牧官後世不聞唯唐張萬歳王毛仲此兩人名最著而馬特盛議者以為唐得人専其職也初置監牧秦渭二州北會州南蘭州狄道西葢跨隴西金城平凉天水四郡之地漢志云武威以西本匈奴昆邪王休屠王地習俗頗殊地廣民稀水草宜畜牧故凉州之畜為天下饒皆唐之牧地之所包絡也舊唐書禮儀志仲春祭馬祖仲夏祭先牧仲秋祭馬社仲冬祭馬步並於大澤用剛日牲各用羊一籩豆各二簠簋各一明集禮唐設壇於長安四十里外龍豪澤中其制髙三尺周迴九步開元禮仲春祀馬祖将祀有司筮日如别儀以下先牧馬社馬步皆筮日前祀三日應饗之官散齋二日致齋一日如别儀前祀二日守宫設祀官次於東壝外道南北向西上陳饌幔於内壝外郊社令積柴於燎壇方髙五尺太官令具特牲之饌未明二刻太史令郊社令升設神座於壇上席以莞南向奉禮設獻官位於壇東南西向執事位又於東南俱西向北上設奉禮位於獻官西南贊者二人在南差退又設奉禮贊者位於燎壇東北俱西向北上望燎位當柴壇北南向設祀官等門外位於東壝外道南西上郊社令設酒罇於壇上東南隅北向洗於壇東南北向執罇篚者如常未明一刻太祝獻官等各服其服郊社令與良醖令入實罇罍及幣質明謁者引獻官以下俱就門外位奉禮郎帥贊者先入就位贊引引太祝與執罇罍篚冪者入當壇南重行北面西上立定奉禮曰再拜贊者承傳太祝以下俱再拜太祝與執罇者升東階至罇所執罍洗篚冪者各就位謁者引獻官以下入就位立定奉禮曰再拜在位者俱再拜謁者進獻官之左白有司謹具請行事退復位太官令出詣饌所太祝跪取弊於篚興立罇所謁者引獻官詣神座前北面立太祝奉幣東向授獻官獻官受幣進北面跪奠於神座俛伏興少退北面再拜謁者引獻官還本位太官令引饌入升南陛太祝迎引於壇上設於神座前訖太官令以下降復位太祝還罇所謁者引獻官諸罍洗盥手洗爵訖謁者引獻官升自南陛詣酒罇所執罇者舉冪獻官酌酒謁者引獻官進神座前北向跪奠爵俛伏興少退北向立太祝持版進於神座之右東向跪讀祝文曰維某年嵗次月朔日天子謹遣具官臣姓名昭告於馬祖天駟之神爰以春季遊牝於牧祗薦制幣犧齊粢盛庶品明薦於馬祖天駟之神尚饗訖興獻官再拜太祀進跪奠版於神座俛伏興還罇所太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進受爵於坫獻官俛伏興太祝帥齋郎進俎減神前胙肉以授獻官受以授齋郎謁者引獻官降自南陛還本位立太祝進跪徹豆俛伏興還罇所奉禮曰再拜在位者皆再拜已飲福受胙者不拜奉禮曰再拜在位者俱再拜謁者進獻官之左白請就望燎位謁者引獻官就望燎位南向立奉禮又帥贊者退立於燎壇東北位太祝進神座前跪取制幣祝版爵酒又以俎載牲體黍飯興當柴壇東南行自南陛登柴壇以幣酒祝版饌置柴上訖奉禮曰可燎東西南各二人以炬燎火者以炬投壇上火半柴謁者進獻官之左白禮畢遂引獻官以下出奉禮贊者還本位贊引引太祝以下俱復執事位立定奉禮曰再拜太祝以下皆再拜贊引引出仲夏饗先牧秋祭馬社仲冬祭馬步同前饗三日應饗之官散齋二日於正寢致齋一日於饗所右校埽除壇之内外為瘞塪於壇之壬地方深取足容物衞尉設饗官次於東壝外道南北向西上太官令具特牲之饌其日未明二刻以下至設贊者位於瘞塪西南同馬祖儀設瘞塪位於壇之西南北向設饗官以下門外位以下至讀祝文如馬祖儀祝文曰昭告於先牧之神肇開牧養厥利無窮式因頒馬爰以制幣云云尚饗訖興獻官再拜太祝進跪徹以下至燔版如馬祖儀其塪寘土東西各二人祭馬社祝文曰惟神肇教人乗用賴於今式用肆僕爰以制幣云云尚饗馬步祝文曰惟神為國所重在於閑牧神其屛茲凶慝使無有害載因獻校爰以制幣云云尚饗冊府元龜永泰五年四月丙午命太常寺復置馬祖壇依常式饗祭右隋唐五代會要後梁開平四年頒奪馬令冒禁者罪之先是梁師攻戰得敵人之馬必納官故出令命獲者有之後唐同光三年下河南河北諸州和市戰馬官吏除一疋外匿者有罪長興四年勅沿邊藩鎮或有蕃部賣馬可擇其良壯者給券具數以聞先是上問見管馬數樞宻使范延光奏天下常支草粟者近五萬匹見今西北諸蕃賣馬者往來者如市其郵傳之費中估之直日四十五貫以臣計之國力十耗其七馬無所使財賦漸鎖朝廷甚非所利上善之故有是勅晉天福九年發使於諸道州府括取公私馬以備禦契丹右五代五禮通考卷二百四十四
