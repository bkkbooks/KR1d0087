body:
  text: 五禮通考卷五十二刑部尚書秦蕙田撰吉禮五十二四望山川附封禪舊唐書𤣥宗本紀開元十八年百寮及華州父老累表請上尊號并封西嶽不允開元禮封禪儀鑾駕進發禪儀無此篇皇帝將有事于太山有司卜日如别儀告昊天上帝太廟太社皆如廵狩之禮告太廟高祖祝文加封祀配神作主之意告睿宗祝文加禪祭配神作主之意皇帝出宮備大駕鹵簿軷于國門祭所過山川古先帝王名臣烈士皆如廵狩之禮通事舍人承制問百年所經州縣刺史縣令先待于境至太山下柴告昊天上帝于圜丘壇如廵狩告至之禮有司攝事前期所司以太牢祭于太山神廟如常式齋戒前七日太尉戒誓百官封云封于太山禪云禪于社首山齋儀同封祀皇帝散齋于行宮後殿四日致齋于前殿三日服衮冕結佩等並如圜丘儀百官如别儀制度將作大匠先領徒于太山上立圜臺廣五丈高九尺土色各依其方又于圜臺上起方壇廣一丈二尺高九尺其臺壇四靣各為一陛玉版長一尺三寸廣五寸厚五寸刻牒為字以金填之用金匱盛其玉牒文中書門下進取進止所由承㫖請内鐫其名檢等並如後制郊社令積柴為燎壇于山上圜臺之東南量地之宜柴高一丈二尺方一丈開上南出户方六尺又為圜壇于山下三成十二陛如圜丘之制随地之宜壇上飾以𤣥四靣依方色壇外為三壝郊社令又積柴于壇南燎如山上之儀又為玉册皆以金绳連編玉牒為之每牒長一尺二寸廣一寸二分厚三分刻玉填金為字少府監量文多少為之又為玉匱一長一尺三寸并檢方五寸當纒繩處刻為五道當封寶處刻深二分方取容受命寶印以藏正座玉册制度如玉櫃又為黄金繩以纒玉匱金匱又為石䃭以藏玉匱用方石再累各方五尺厚一尺縱鑿石中廣深令容玉匱䃭旁施檢處皆刻深三寸三分闊一尺南北各二東西各三去隅皆七寸纒繩處皆刻深三分闊一寸五分為石檢十枚檢石䃭皆長三寸闊一尺厚七寸皆刻為三道廣一寸五分深四寸當封處大小取容寶印深二寸七分皆有小石葢制與封刻處相應以檢擫封印其檢立于䃭旁當刻處又為金繩三以纒石䃭各五周徑三分為石泥以封石䃭以石末和方色土為其封玉匱金匱石䃭同用受命寶並所司量時先奏請出之為距石十二枚皆闊二尺厚一尺長一丈斜刻其首令與䃭隅相應分距䃭四隅皆再累為五色土圓封以封石䃭上徑一丈二尺下徑三丈九尺禪禮制度將祭將作先于社首山禪所為禪祭壇如方丘之制八角三成每等髙四尺上闊十六歩設八陛上等陛廣八尺中等陛廣一丈下等陛廣一丈二尺為三重壝量地之宜四靣開門玉册石䃭玉匱金匱金泥檢距圓封立碑等並如封祀之儀陳設前祀三日衛尉設文武侍臣次于山下封祀壇外壝東門之内道北皆文官在左武官在右俱南向設諸祭官次于東壝之外道南北向西上三師南壝之外道東諸王于三師之南俱西向北上文官從一品以下九品以上于祀官之東皇親五等以上諸親三等以上于文官之東東方諸州刺史縣令又于文官之東俱北向西上介公酅公于南壝之外道西東向諸州使人于介公酅公之西東向諸方之客東方南方於諸王東南西向西方北方于介公酅公西南東向皆以北為上武官三品以下九品以上於西壝之外道南北向東上設諸饌幔各於内壝東門西門之外道北南向北門之外道東西向壇工及東方之饌陳于東門外南方及西方之饌陳于西門外北方之饌陳于北門外前祀二日太樂令設宮懸之樂于山下封祀壇之南内壝之外如圜丘儀右校掃除壇之内外禪儀祭前三日尚舍壇長施大次于外壝東門内道北尚舍鋪御座守宫設文武官次于大次前東西相向諸祭官于東壝外文官九品以上于祭官東皇親諸親又于其東蕃官又于其東介公酅公于西壝外道南武官九品于介公酅公西蕃客又于其西褒聖侯于三品文官下有諸州使分于文武官後設陳饌幔于内壝東西門外道北南向其壇上及東方饌陳于東門之外南方西方北方饌陳于西門外其陳樂懸則樹靈鼔右校掃除又為瘞埳于壇壬地前祀一日奉禮郎設祀官公卿位于山下封祀壇内壝東門之外道南分獻之官于公卿之南執事者位于其後每等異位重行西向北上設御史位于壇上一位于東陛之南西向一位于西陛之南東向設奉禮位于樂懸東北贊者二人在南差退俱西向設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向設從祀之官位三師位于懸南道東諸王位于三師之東俱北靣西上介公酅公位于道西北靣東上文官從一品以下九品以上于執事之南東方諸州刺史縣令又于文官之南每等異位重行西向俱以北為上武官三品以下九品以上位于西方值文官皇親五等以上諸親三等以上于武官之南每等異位重行東向諸州使人位于内壝南門之外道西重行東靣皆以北為上設諸位客使位于内壝東門之外東方于諸王東南每國異位重行北向以西為上西方北方于介公酅公西南每國異位重行北靣以東為上其褒聖侯文官三品之下諸州使人各于文武官後禪儀奉禮設御位于壇東南設祭官位于内壝東門外道南分獻官于祭官南執事者位于後設御史位二于壇東南西向令史陪後設奉禮位于懸東北贊者二人在南差退協律郎于壇上太樂令于北懸間並如常設望瘞位于壇東北從祭官于執事南皇親又于南諸州刺史縣令又于南蕃客又于南介公酅公于内壝西門外道南武官于後蕃客于武官南設門外位于東西壝門外道南皆如設次之式設牲牓于山下封祝壇之外當門西向蒼牲一居前正座又蒼牲一配座青牲一在北少退南上次赤牲一次黄牲一次白牲一次元牲一以上五方帝座又青牲一大明又牲一夜明禪禮設牲牓于東壝外如式正座黄牲一居前配座黄牲一在北少退神州黝牲一在南少退設廪犧令位於牲西南史陪其後俱北向設太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設昊天上帝酒罇於圓臺之上下太罇二著罇二犧罇二山罍二在壇上於東南隅北向象罇二壺罇二山罍四在壇下於南陛之東北靣西上設配帝著罇二犧罇二象罇二山罍二在壇上皆於昊天上帝酒罇之東北向西上其山下封祀壇設五帝日月俱太罇二在神座之左其内官每陛間各象罇二在第二等中官每陛間各壺罇二在第三等外官每陛間各概罇二於内壝之内衆星每道間各散罇二於内壝之外凡罇各設於神座之左而右向五帝日月以上之罇置于坫内官以下罇俱藉以席皆加勺冪設爵于罇下禪儀設皇地祗太罇二著罇二犧罇二山罍二在壇上東南隅北向象罇二壺罇二山罍四在壇下南陛之東北向俱西上設配帝著罇二犧罇二象罇二山罍二在壇上正座罇東北向西上神州太罇二在第一等每方嶽鎮海瀆俱山罇二山川林澤各蜃罇二邱陵以下各散罇二皆于壇下皆加勺冪設罍洗各于壇南陛東南亞獻之洗又于壇東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設分獻罍洗篚羃各於其方陛道之左俱西向執罇罍篚羃者各於罇罍篚羃之後各設玉幣之篚于壇之上下罇坫之所祀日未明五刻太史令郊社令各服其服升設昊天上帝神座于山圓臺之上北方南向以三脊茅為神藉設髙祖神堯皇帝神座于東方西向席以莞神座皆於座首又太史令郊社令設五天帝日月神座于山下封祀壇之上青帝于東陛之北赤帝于南陛之東黄帝于南陛之西白帝于西陛之南黒帝于北陛之西大明于東陛之南夜明于西陛之北席皆以藁秸設五星十二辰河漢及内官之座于第二等十有二陛之間各依方靣凡席皆内向其内官中有北斗北辰位南陛之内差在行位前設二十八宿及中官之座于第三等亦如之布外官席位于内壝之内衆星席位于内壝之外各依方次席皆以莞設神位各于座首禪禮神位皇地祗神座于壇上北方南向席以藁秸睿宗大聖真皇帝座于東方西向席以莞神州于第一等席以藁秸東南方嶽鎮以下于内壝内各于其方嵩嶽以下于壇西南俱内向席皆以莞所司陳其異寶及嘉瑞等于樂懸之東西廂禪禮無瑞物省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令丞帥府史三人及齋郎以罇坫罍洗篚冪入設于位凡升壇者各由其陛贊引引御史諸太祝七人與祝史行掃除于下其五星以下羊豕所司各依令先備如常儀並如别儀禪禮無五星以下羊豕餘同鑾駕上山禪無上山儀前祀三日本司宣攝内外各供其職衛尉設祀官從祀羣官五品以上便次於行宫朝堂如常儀前祀二日尚舍直長施大次于圓臺東門外道北又于山中道設止息大次俱南向尚舍奉御鋪御座衛尉設從駕文武羣官及諸方使應從升者於圓臺南門之外文東武西並如常儀郊社令設御洗於圓臺南陛之東北向罍水在洗東篚在洗西南肆設巾冪其日奉禮設御位於圓臺南當壇北向設羣官五品以上版位於御位之南文東武西重行北向相對為首設東方諸州刺史縣令位於文官之東諸州使人位于武官之後設國客位東方南方於文官東南每國異位北靣西上西方北方於武官西南每國異位北靣東上設御史位於圓臺東西如祀禮設奉禮贊者位於羣官東北西靣設執事位於東門之内道南西靣皆北上前祀一日未明七刻搥一鼓為一嚴三嚴時節祀前二日侍中奏裁未明五刻搥二鼔為再嚴侍中版奏請中嚴從祀官五品以上俱就次各服其服所司陳大駕鹵簿未明二刻搥三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次陳於行宫門外謁者贊引引祀官通事舍人分引從祀羣官諸侍臣結佩俱詣行宫門外奉迎侍中負寶如式乘黄令進輦於行宫門外南向侍中版奏請登山皇帝服衮冕乘輦以出稱警蹕如常儀黄門侍郎進當輦前跪奏稱黄門侍郎臣某言請鑾輿進發俛伏興退復位鑾輿動又稱警蹕黄門侍郎侍中中書令以下夾引以出千牛將軍夾輿而趨駕至侍臣上馬所黄門侍郎奏請鑾輿權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊鑾輿在黄麾内符寶郎奉六寶與殿中監後部從在黄鉞内侍臣上馬畢黄門侍郎奏請鑾輿進發退復位鑾駕動稱警蹕如常鼓吹不鳴不得諠譁從祀官在𤣥武隊後如常若復先置則聽臨時節度車輅鼓吹皆待于山下御史大夫刺史縣令前導如式至中道止息大次前迴輦南向侍中奏請降輦如常皇帝降輦之大次羣臣皆随便而舍停大次三刻頃侍中奏請皇帝出次升輦進發如初駕至臺東門外大次前迴輦南向侍中進當駕前跪奏稱侍中臣某言請降輅俛伏興皇帝降輦之大次如常儀通事舍人承㫖勅從祀羣官退就門外位禪儀鑾駕出行宫如封太山之儀薦玉幣祀日未明三刻諸祀官各服其服郊社令率其屬以玉幣及玉册置于山上圓臺壇上坫所禮神之玉蒼璧幣以蒼配座之幣亦如之又以玉匱金匱金繩金泥盛于篚置于石䃭之側良醖令帥其屬各入實罇罍玉幣凡六罇之次太罇為上實以汎齊著罇次之實以醴齊犧罇次之實以盎齊象罇次之實以醍齊壺罇次之實以沈齊山罍為下實以三酒配帝著罇為上實以沈齊犧罇次之實以醴齊象罇次之實以盎齊山罍為下實以清酒其𤣥酒各實于五齊之上罇禮神之玉昊天上帝以蒼璧昊天上帝及配帝之幣以蒼禪祭日未明三刻以下實罇至饌幔内與夏至北郊同也太官令帥進饌者實諸籩豆簠簋各設於饌幔内未