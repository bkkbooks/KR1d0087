中前跪奏曰請就望燎位太常卿引皇帝就望燎位太祝奉玉幣等就柴壇置於柴上戸内訖奉禮曰可燎東西靣各六人以炬燎火半柴侍中前跪奏禮畢太常卿引皇帝出贊引引祀官以下皆出其山下封祀壇獻官獻畢奉禮曰請就望燎位諸獻官俱就望燎位諸太祝各取玉幣等就柴壇自南陛下置於柴上戸内訖奉禮曰可燎東西靣各六人以炬燎火半柴訖奉禮曰禮畢獻官以下皆出禪儀皇帝既升奠玉幣下至跪奠爵俛伏興與方丘同太常卿引皇帝少退北向立樂止太祝二人持玉册進于神座之右東向跪又太祝一人跪讀册文訖俛伏興皇帝再拜祝文並中書門下進少府監刻初讀祝文訖至配座讀册皆亦如之其拜奠並同方丘配座初讀册訖至寘土半埳太常卿引皇帝還版位與方丘同封玉册封檢附燔燎畢禪儀皇帝既就望瘞位侍中跪奏稱具官臣某言請封玉册太常卿引皇帝自南陛升壇北向立近侍者從升如式少府監具金繩金泥等並所用物立于御側符寳郎奉受命寶立于侍中之側謁者引太尉進昊天上帝神座前禪儀進皇地祗神座前跪取玉册置於案進皇帝受玉册跪疊之内於玉匱中纒以金繩封以金泥侍中取受命寶跪以進皇帝取寶以印玉匱訖興侍中受寶以授符寶郎通事舍人引太尉進皇帝跪捧玉匱授太尉太尉跪受皇帝興太尉退復位側身奉玉匱太常卿前奏請再拜皇帝再拜訖入次如常儀太尉奉玉匱之案於石䃭南北向立執事者發石葢太尉奉玉匱跪藏于石䃭内執事者覆石葢檢以石檢纒以金繩封以石泥訖太尉以玉寶徧印訖引降復位將作帥執事者以石距封固又以五色土圜封後續令畢其功禪儀同配座玉牒禪儀太尉又進睿宗大聖真皇帝座跪取玉册内金匱封于金匱皆如封玉匱之儀訖太尉奉金匱從降俱復位封禪還以金匱内太廟藏于高祖神堯皇帝之左室如别儀太常卿前奏禮畢若有祥瑞則太史監跪奏訖侍臣奉賀再拜三稱萬嵗内外皆稱萬嵗訖又再拜太常卿引皇帝還大次樂作皇帝出東門禪儀皇帝出中壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華葢侍衛如常儀皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官以次出復位立定奉禮曰再拜衆官在位者皆再拜訖贊引引出工人二舞以次出禪禮祭訖以竒禽異獸合瑞典者皆縱之神祝所鑾駕還行宫皇帝既還大次侍中版奏請觧嚴將士不得輒離部位轉仗衛於還途如來儀二刻頃侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服皇帝出次升輦降山下至圓壇所權停乗黄令進玉輅太僕升執轡以下入宮並如圜丘儀禪儀同朝覲羣臣禪祭訖行此禮禪之明日朝覲羣臣及岳牧以下於朝覲壇如廵狩儀皇帝服衮冕乘輿以出曲直華葢警蹕侍衛入自北壝門由北陛升壇即御座符寶郎奉寶置於座扇開樂止通事舍人引三品以上及岳牧以下入就位如常儀通事舍人引上公一人舒和之樂作公至西陛就觧劍席樂止脱舄跪觧劍置於席興相禮者與通事舍人引進當御座前北靣跪稱具官臣名等言天封肇建景福惟新伏惟開元神武皇帝陛下萬壽無疆俛伏興通事舍人引上公降壇詣觧劍席跪帶劍納舄樂作通事舍人引復位立定樂止典儀曰再拜贊者承傳上公以下皆再拜侍中前承制降詣上公之東北西向稱有制上公及羣官皆再拜訖宣云封禪之慶與公等同之上公及羣官又再拜舞蹈三稱萬嵗訖又再拜引退考制度如廵狩儀册府元龜開元二十三年九月丁卯文武百官尚書左丞相蕭嵩等累表請封嵩華二嶽表曰臣聞封巒之運王者告成當休明而闕典乃臣子之深過伏惟神武皇帝陛下受命繼天應期光宅垂慶雲而覆露暢和氣以生成物荷深仁時惟天道文明之化洽矣穆清之風被矣淳源既泳福應咸臻盈于天壤昭于方䇿葢非愚下所能頌美且天之在上日監在兹嘉大聖之神功降𤣥符以表德恭伸昭報祗事升中古昔大猷孰先兹道臣等覩休徴以上請陛下崇謙讓以固辭事恐勞人抑其勤願德音所逮自古未聞昔虞廵四岳周在一嵗書稱其美不以為煩寧彼華嵩皆列近甸復兹豐稔又倍他年嵗熟則餘糧地近則易給况費務葢寡咸有司存儲峙無多豈煩黎庻吏當首路以望屬車陛下往封泰山不祕玉牒嚴禋上帝本為蒼生今其如何而闕斯禮伏願發揮盛事差擇元辰先檢玉于嵩山次泥金于華岳天休既答人望見從上下交歡生靈幸甚臣等昧死敢此竭誠理在至公祈于俯遂無任悃欵之至謹詣朝堂陳請以聞帝固讓不從手詔報曰升中于天帝王盛禮葢謂臻兹淳化告厥成功今兆庻雖安尚竭豐年之慶邊疆則靜猶有踐更之勞况自愧于隆周敢追跡于大舜頃年迫于萬方之請難違多士之心東封泰山于今惕厲豈可更議嵩華自貽慙恧雖藉公卿共康庻政永惟菲薄何以克堪朕意必誠宜斷來表也唐書𤣥宗本紀天寶九年正月丁巳詔以十一月封華嶽三月辛亥華嶽廟災闗内旱乃停封冊府元龜天寶九載正月文武百寮禮部尚書崔翹等累上表請封西嶽刻石紀榮號帝固拒不許翹等又奉表懇請曰自今月辛亥至于癸丑累表誠祈請紀榮號聖心恭黙冲讓再三臣等伏讀綸言退増祗慄敢重瀝愚懇期諸必遂臣聞聖人之言與春秋而同信上天之宰將影響而合符昭報不可以久稽成命不可以固拒今靈山警蹕望玉鑾之升中儒林展儀思金匱之盛禮發祥儲祉喻以封山人事天時不可失也伏惟開元天地大寶聖文神武應道皇帝陛下祖武宗文重熈累洽霑風化而砥礪在動植而昭蘇外户不扃餘糧栖畆其神功至道廣瑞殊祥前表縷陳安敢浮説夫修徳以俟命勒功以告成將欲竭欵神祗雍熈帝載未為過越也伏惟覽公卿之議考封禪之禮陟華葢于翠微轉鉤陳于雲路泥金于菡蓞之上刻玉于明星之前使三五六經復再聞于唐典七十二姓不獨紀于夷吾敷景福以浸黎元錫大慶而報天地蒼生之望也朝廷之幸也無任誠懇悃欵之至謹詣朝堂奉表陳請以聞帝手詔不許曰輕修大典所不願為時或傳中㫖請紀榮號何如空云請封西嶽乙卯羣臣又奉表請封西嶽曰臣翹等伏稽古訓上請増封再奉明㫖未蒙允諾臣等承詔惶駭失圖臣聞省方展義君人之大典登封告成王者之丕業是以古先哲后道洽則封所以答神祗之功増兆庻之福無私于已故行之者不思必順于天故言之者難奪敢昧萬責竭誠終請伏惟開元天地大寶聖文神武應道皇帝陛下紹文武之丕烈合君臣于昌運均雨露和隂陽四海無波而靜黙羣生自樂而仁壽繇是德懷蠻貊澤洎昆蟲宗廟祀典罔不祗肅要荒殊俗亦莫不庭自皇王以來載籍所記未有混區宇窮禎祥地平天成德茂道洽若今日之盛者也固可告太平之功展封崇之禮故臣與王公侯伯黎老緇黄累陳白奏備竭丹懇豈謂聖恩猶阻皇鑒未迴伏奉癸丑詔書曰輕修大典所不願為臣等戰慄匪遑寧處實以陛下功成道洽理實升中且夫龜龍咸格天意也夷夏大同人事也時和年豐太平也無為清淨至理也允應大典豈謂輕修乎奉若靈命安可不為乎臣等敢冒宸極重明其義竊以西嶽華山實鎮京國皇虞之所循省靈仙之所依憑固可封也况金方正位合陛下本命之符白帝臨壇告陛下長生之籙發祥作聖抑有明徴又可封也昔周成王以剪桐為戯唐叔因而定封葢人君之言動有成憲斯事至細猶不忽也况陛下眷言封祀宿著神明道已洽于升平事未符于琬琰豈可抑至公于私讓棄誠信于神明乎固不可得而辭也日者封章累奏嘉應必臻一獻而甘雨流再陳而瑞雪降則知人天之意影響合符若然者陛下安得稽天命以固辭違人事以久讓太平不告其若休祥何至理不答其若神祗何伏願仰答天心允祗靈貺上以揚祖宗之盛烈下以副億兆之懇誠克崇上報永光大典臣等幸甚宗子又上表曰臣徹等伏見禎祥委積河海澄清長瞻北極之尊屢獻西封之䟽誠懇不逹天鑒未從徘徊闕庭隕越無地陛下再造區㝢肇康生人與天合符與道合契故得靈芝表瑞玉版呈文九榖嵗衍于京坻百蠻盡習其冠帶能事備于典䇿盛德光于祖宗升中告成是屬今日惟夫太華髙冠羣山當其少隂鎮此西土自有虞廵守歴祀三千夏殷以還罕能肆覲陛下雖加進寵號増崇廟宇而大禮未施精意空潔又陛下頃嵗建碑曰嘗勤報德之願未暇封崇之禮萬姓瞻予言可復也臣以為天地之主豈徒言哉神祗候望故已久矣伏願俯順百辟兆人之請明徴刻石銘山之記蹔遷萬乘降被三峯奠珪璧于中壇奏笙鏞于上帝使普天蒙福重賜無疆頻冒宸嚴並期必遂無任懇切屏營之至謹詣朝堂奉表陳請以聞凡三上表上乃許之丁巳詔曰以今載十一月有事華山中書門下及禮官詳儀注奏聞務從省便是載三月西嶽祠廟災時闗中久旱詔曰自春以來久􅄽時雨登封告禪情所未遑所封西嶽宜停范氏祖禹曰封禪實自秦始古無有也且三代不封禪而王秦封禪而亡人主不法三代而法秦以為太平盛事亦已謬矣太宗初年朝多賢臣而侫者尤倡其議獨魏徴以為時未可而亦不以其事為非也其後使顔師古議其事房喬裁定之徴亦預焉貞觀之末屢欲東封以事而止高宗明皇遂徑行之終唐之世惟栁宗元以封禪為非雖韓愈之賢猶勸憲宗則其餘無足怪也嗚呼禮之失也久矣世俗之惑可勝救哉右唐𤣥宗封禪宋史太宗本紀太平興國八年六月己酉兖州泰山父老及瑕丘等七縣民詣闕請封禪雍熙元年夏四月乙酉泰山父老詣闕請封禪戊子羣臣表請凡三上許之五月丁丑乾元文明二殿災六月壬寅詔罷封泰山扈蒙傳太宗將東封蒙定議曰嚴父莫大于配天請以宣祖配天自雍熈元年罷封禪為郊祀遂行其禮議者非之真宗本紀大中祥符元年春正月乙丑有黄帛曵左承天門南鴟尾上守門卒塗榮告有司以聞上詔羣臣拜迎于朝元殿啟封號稱天書丁卯紫雲見如龍鳯覆宮殿戊辰大赦改元羣臣加恩賜京師酺三月甲戌兖州父老千二百人詣闕請封禪丁夘兖州并諸路進士等八百四十人詣闕請封禪壬午文武官將校蠻夷耆壽僧道二萬四千三百七十餘人詣闕請封禪不允自是表凡五上夏四月甲午詔以十月有事于泰山遣官告天地宗廟嶽瀆諸祠乙未以知樞宻院事王欽若叅知政事趙安仁為泰山封禪經度制置使丙申以王旦為封禪大禮使馮拯陳堯叟分掌禮儀使曹濟州廣濟軍耆老二千二百人詣闕請臨幸五月壬戌王欽若言泰山醴泉出錫山蒼龍見壬午詔縁路行宮舊屋止加塗塈毋别創癸未置天書儀衛使副扶侍使都監夾侍凡有大禮即命之詔離京至封禪以前不舉樂所經州縣勿以聲伎來迓六月乙未天書再降于泰山醴泉北壬寅迎泰山天書于含芳園雲五色見俄黄氣如鳯駐殿上庚戌曲赦兖州繋囚流罪以下九月戊寅西京諸州民以車駕東廵貢獻召對勞賜之己卯以馬知節為行營都部署庚辰趙安仁獻五色金玉丹紫芝八千七百餘本乙酉親習封禪儀于崇德殿冬十月戊子上御蔬食庚寅以廵幸置考制度使副凡廵幸則命之是夕五星順行同色辛卯車駕發京師扶侍使奉天書先道丙申次澶州宴周瑩于行宮戊戌許鄆齊等州長吏赴泰山陪位辛丑駐蹕鄆州神光起昊天玉冊上甲辰詔扈從人毋壞民舍什器樹木丁未法駕入乾符縣奉高宮戊申王欽若等獻泰山芝草三萬八千餘本己酉五色雲起嶽頂庚戌法駕臨山門黄雲覆輦道經險峻降輦歩進先夕大風至是頓息辛亥享昊天上帝于圜臺陳天書于左以太祖太宗配帝衮冕奠獻慶雲繞壇月有黄光命羣臣享五方帝諸神于山下封祀壇上下傳呼萬嵗振動山谷降谷口日有冠戴黄氣紛郁壬子禪社首如封祀儀紫氣下覆黄光如星繞天書匣縱四方所獻珍禽竒獸還奉髙宮日重輪五色雲見作㑹真宫癸丑御朝覲壇之壽昌殿受羣臣朝賀大赦天下十一月丁丑帝至自泰山禮志大中祥符元年兖州父老呂良等千二百八十七人及諸道貢舉之士八百四十六人詣闕陳請而宰臣王旦等又率百官諸軍將校州縣官吏蕃夷僧道父老二萬四千三百七十人五上表請始詔今年十月有事于泰山遣官告天地宗廟社稷太一宮及在京祠廟嶽瀆命翰林太常禮院詳定儀注知樞宻院王欽若叅知政事趙安仁為封禪經度制置使並判兖州三司使丁謂計度糧草引進使曹利用宣政使李神福修行宫道路皇城使劉承珪等計度發運詔禁縁路採捕及車騎蹂踐田稼以行宫側官舍佛寺為百官宿頓之所調兖鄆兵充山下丁役行宫除前後殿外並張幕為屋覆以油帊仍増自京至泰山驛馬令三司沿汴蔡御河入廣濟河運儀仗什物赴兖州發上供木由黄河浮筏至鄆州給置頓費用省輦送之役以王旦為大禮使王欽若為禮儀使叅知政事馬拯為儀仗使知樞宻院陳堯叟為鹵簿使趙安仁為橋道頓遞使仍鑄五使印及經度制置使印給之遣使詣岳州採三脊茅三十束有老人黄皓識之補州助教賜以粟帛初太平興國中有得唐𤣥宗社首玉冊蒼璧至是令瘞于舊所其前代封禪壇址摧圯者命修完之山上置圜臺徑五丈高九尺四陛上飾以青四靣如其方色一壝廣一丈圍以青繩三周燎壇在其東南髙丈二尺方一丈開上南出户方六尺山下封祀壇四成十二陛如圜丘制上飾以𤣥四靣如方色外為三壝燎壇如山上壇制社首壇八角三成每等髙四尺上闊十六歩八陛上等廣八尺中等廣一丈下等廣一丈二尺三壝四門如方丘制又為瘞埳于壬地外壝之内以玉為五牒牒各長尺二寸廣五寸厚一寸刻字而填以金聨以金繩緘以玉匱置石䃭中金脆難用以金塗繩成之正座配座用玉冊六副每簡長一尺二寸廣一寸二分厚三分簡數量文多少匱長一尺三寸檢長如匱厚二寸闊五寸纒金繩五周當纒繩處刻為五道而封以金泥泥和金粉乳香為之印以受命寶封匱當寶處刻深二分用石䃭藏之其䃭用石再累各方五尺厚一尺鑿中廣深令容玉匱䃭旁施檢處皆刻深七寸闊一尺南北各三東西各二去隅皆七寸纒繩處皆刻三道廣一寸五分深三分為石檢十以擫䃭皆長三尺闊一尺厚七寸刻三道廣深如纒繩其當封處刻深二寸取足容寶皆有小石葢與封刻相應其檢立䃭旁當刻處又為金繩三以纒䃭皆五周徑三分為石泥封䃭泥用石末和方色土為之用金鑄寶曰天下同文如御前寶以封䃭際距石十二分距四隅皆闊二尺厚一尺長一丈斜刻其道與䃭隅相應皆再累為五色土圜封䃭上徑一丈二尺下徑三丈九尺命直史館劉鍇内侍張承素領徒封圜臺石䃭直集賢院宋臯内侍郝昭信封社首石䃭並先往規度之詳定所言朝覲壇在行宮南方九丈六尺高九尺四陛陛南靣兩陛餘三靣各一陛一壝二分在南一分在北又案唐封禪備法駕凖故事乘輿出京並用法駕所過州縣不備儀仗其圜臺上設登歌鐘磬各一具封祀壇宮架二十虡四隅立建鼓二舞社首壇設登歌如圜臺壇下宮架二舞如封祀壇朝覲壇宮架二十虡不用熊罷十二案又案六典南郊合祀天地服衮冕垂白珠十有二黝衣纁裳十二章欲望封禪日依南郊例洎禮畢御朝覲壇諸州所貢方物陳列如元正儀令尚書戸部告示並先集泰山下仍詔出京日具小駕儀仗太常寺三百二十五人兵部五百六十六人殿中省九十一人太僕寺二百九十九人六軍諸衛四百六十八人左右金吾仗各一百七十六人司天監三十七人有司言南郊惟昊天皇地祗配帝日月五方神州各用幣内官而下别設六十六段分充案開寶通禮嶽鎮海瀆幣從方色即明皆有制幣今請封祀壇内官至外官三百一十人位社首壇嶽鎮以下一十八位並用方色幣又南郊牲正坐配坐用犢五方帝日月神州共用羊豕二十二從祀七百三十七位仍以前數分充今請神州而上十二位用犢其舊供羊豕改充從祀牲又景徳中升天皇北極在第一等今請亦于從祀牲内體薦舊制郊祀正坐配坐褥以黄皇帝拜褥以緋至是詔配坐以緋拜褥以紫又以靈山清潔命祀官差減其數或令兼攝有期䘮未滿餘服未卒哭者不得預祭内侍諸司官除掌事宿衛外從升者裁二十四人諸司職掌九十三人其文武官升山者皆公服詳定所言漢書八神與歴代封禪帝王及所禪山並于前祀七日遣官致祭以太牢祀泰山少牢祀社首九月詔審刑院開封府毋奏大辟案帝習儀于崇徳殿初禮官言無帝王親習之文帝曰朕以逹寅恭之意豈憚勞也禮畢帝見禮文有未便諭宰臣與禮官再議于是詳定所言案開寶禮則燔燎畢封冊開元故事則封䃭後燔燎今如不對神封冊則未稱寅恭或封䃭後送神則并為諠凟欲望俟終獻畢皇帝升壇封玉匱置䃭中泥印訖復位飲福送神樂止舉燎火次天書降次金匱降禮儀使奏禮畢皇帝還大次俟封䃭畢皇帝再升壇省視縁祀禮已畢便不舉樂省託降壇仍詔山上亞獻終獻登歌作樂十月戊子朔禁天下屠殺一月帝自告廟即屏葷蔬食自進發至行禮前並禁音樂有司請登封日圜臺立黄麾仗至山下壇設爟火將行禮然炬相屬又出朱字漆牌遣執仗者傳付山下牌至公卿就位皇帝就望燎位山上傳呼萬嵗下即舉燎皇帝還大次觧嚴又傳呼而下祀官始退社首瘞坎亦設爟火三為準遣司天設漏壺山之上下命中官覆校日景復于壇側撃板相應自太平頂天門黄峴嶺岱岳觀各豎長竿揭籠燈下照以相參候辛卯發京師以玉輅載天書先行次日如之至鄆州令從官衛士蔬食丁未次奉高宮戊申齋于穆清殿諸升山者官給衣令祀日沐浴服之庚戌帝服通天冠絳紗袍乘金輅備法駕至山門幄次改服鞾袍乘歩輦登山鹵簿儀衛列山下天書仗不上山與法駕仗間立知制誥朱巽奉玉冊牒及圜臺行事官先升且以回馬嶺至天門路峻絶人給横板二長三尺許繋綵兩端施于背膺選從卒推引而上衛士皆給釘鞵供奉馬止于中路自山趾盤道至太平頂凡兩歩一人綵繒相間樹當道者不伐止縈以繒帝每經陿險必降輦徒歩亞獻寧王元偓終獻舒王元偁鹵簿使陳堯叟從祀官㸃饌習儀于圜壇是夕山下罷警場辛亥設昊天上帝位于圜臺奉天書于坐左太祖太宗並配西北側向帝服衮冕升臺奠獻悉去侍衛拂擢止于壝門籠燭前導亦徹之玉冊文曰嗣天子臣某敢昭告于昊天上帝臣嗣膺景命昭事上穹昔太祖揖讓開基太宗憂勤致治廓清寰宇混一車書固抑升中以延積慶元符錫祚衆寶效祥異域咸懐豐年屢應䖍修封祀祈福黎元謹以玉帛犧牲粢盛庻品備兹禋燎式薦至誠皇伯考太祖皇帝皇考太宗皇帝配神作主尚享玉牒文曰有宋嗣天子臣某敢昭告于昊天上帝啓運大同惟宋受命太祖肇基功成治定太宗膺圖重熙累盛粤惟冲人丕承列聖寅恭奉天憂勤聽政一紀于兹四隩來暨丕貺殊尤元符章示儲慶發祥清浄可致時和年豐羣生咸遂仰荷顧懐敢㤀繼志僉議大封聿申昭事躬陟喬嶽對越上天率禮祗肅備物吉蠲以仁守位以孝奉先祈福逮下佑神昭德惠綏黎元懋建皇極天禄無疆靈休允廸萬葉其昌永保純錫命羣官享五方帝及諸神于山下封祀壇上飲福酒攝中書令王旦跪稱曰天賜皇帝太一神䇿周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置于石䃭攝太尉馮拯奉金匱以降將作監領徒封䃭帝登圜臺閲視訖還御幄宰臣率從官稱賀山下傳呼萬嵗聲動山谷即日仗還奉高宫百官奉迎于谷口帝復齋于穆清殿壬子禪祭皇地祗于社首山奉天書升壇以祖宗配玉冊文曰嗣天子臣某敢昭告于皇地祗無私垂佑有宋肇基命惟天啓慶賴坤儀太祖神武威鎮萬寓太宗聖文德綏九土臣恭膺寶命纂承丕緒穹昊降祥靈符下付景祚延鴻祕文昭著八表以寧五兵不試九榖豐穰百姓親比方輿所資凉德是愧溥率同詞縉紳協議因以時廵亦既肆類躬承典禮祗事厚載致孝祖宗潔誠嚴配以申大報聿修明祀本支百世黎元受祉謹以玉帛犧牲粢盛庻品備兹禋瘞式薦至誠皇伯考太祖皇帝皇考太宗皇帝配神作主尚饗帝至山下服鞾袍歩出大次癸丑有司設仗衛宫懸于澶下帝服衮冕御封禪壇上之壽昌殿受朝賀大赦天下文武逓進官勲減免賦税工役各有差改乾封縣曰奉符縣宴百官卿監以下于穆清殿泰山父老于殿門甲寅發奉符始進常膳帝之廵祭也往還四十七日未嘗遇雨雪嚴冬之候景氣恬和祥應紛委前祀之夕隂雺風勁不可以燭及行事風頓止天宇澄霽燭焰凝然封䃭訖紫氣蒙壇黄光如帛繞天書匣悉縱四方所獻珍烏異獸山下法駕還奉髙宮日重輪五色雲見鼓吹振作觀者塞路歡呼動天地改奉高宮曰㑹真宫九天司命上卿加號保生天尊青帝加號廣生帝君天齊王加號神聖各遣使祭告詔王旦撰封祀壇頌欽若撰社首壇頌陳堯叟撰朝覲壇頌圜臺奉祀官並于山上刻名封祀九宫社首壇奉祀官並于社首頌碑隂刻名扈從升朝官及内殿崇班軍校領刺史以上與番夷酋長並于朝覲頌碑隂刻名樂志大中祥符封禪十首餘同南北郊山上圜臺降神高安巖巖泰山配德于天奉符展栗翼翼乾乾滌濯靜嘉罔有弗蠲上帝顧諟泠風肅然昊天上帝坐酌獻奉安皇天上帝隂騭下民道崇廣覆化洽鴻鈞靈文誕錫寶命惟新増高欽事式奉嚴禋太祖配坐酌獻封安於穆聖祖肇開鴻業我武惟揚皇威有曄四隩混同百靈震叠陟配高穹明靈是接太宗配坐酌獻封安祗若封祀神宗配天禮樂明備奠獻精䖍景靈來格休祥藹然於昭垂慶億萬斯年亞獻恭安因髙定位禮修物備薦鬯卜牲䖍恭寅畏八音克諧天神咸暨降福穣穣永錫爾類終獻順安浩浩元精無臭無聲臨下有赫得一以清備物致享薦兹至誠㤗尊奠獻夙夜齊明社首壇降神靖安至哉坤元資生伊始博厚稱徳沈潛柔止降禪方位聿修明祀寅恭吉蠲永錫蕃祉皇地祗坐酌獻禪安坤德直方博厚無疆乘隂得一靜而有常寶藏以發乃育百昌肅兹禪祭錫祉穣穣太祖配坐酌獻禪安皇矣聖祖丕赫神武秉運宅中威加九土德厚功崇頌聲載路陟配方祗對天之祜太宗配坐酌獻禪安毖祀柔祗報功厚載思文太宗侑神嚴配鐘石斯和籩豆咸在永錫坤珍資生為大又封禪四首導引民康俗阜萬國樂升平慶海晏河清唐堯虞舜垂衣化詎比我皇明九天寶命垂丕貺雲物效祥英星羅羽衛登喬嶽親告禪云亭汾隂云星羅羽衛臨汾曲親享答資生我皇垂拱恵化洽文明盛禮慶重行登封降禪燔柴畢汾隂云告䖍脽上皇儀畢天仗入神京雲雷布澤徧寰瀛遐邇振歡聲巍巍聖壽南山固千載賀承平六州良夜永玉漏正遲遲丹禁肅周廬列羽衛繞皇闈嚴鼓動畫角聲齊金管飄雅韻逺逐輕颸薦嘉玉躬祀神祗祈動為黔黎升中盛禮増髙益厚登豐檢玉時邁合周詩汾隂云方丘盛禮精嚴越古陳牲檢玉時邁展鴻儀𤣥文錫慶雲五色相随甘露降醴泉涌汾隂云嘉禾合三秀發靈芝皇猷播史冊光耀受鴻禧萬年永固丕基吾君德蕩蕩巍巍邁堯舜文思從今寰宇休牛歸馬耕田鑿井鼓腹樂昌期文獻通考先是殿中侍御史趙湘請封禪上拱揖不答王旦等曰封禪之禮曠廢已久若非盛世承平豈能振舉初王欽若既以城下之盟毁冦準上自是常怏怏他日問欽若曰今將奈何欽若度上厭兵即謬曰陛下以兵取幽薊乃可刷此恥也上令思其次欽若因請封禪以鎮服四海誇示契丹又言封禪當得天瑞又言天瑞葢有以人力為之陛下謂河圖洛書果有之乎聖人以神道設教耳上曰王旦得無不可欽若遂以上意諭旦旦黽勉而從丁晉公談録真宗欲束封泰山問兩地大臣可否大臣曰聖駕行幸豈無甲兵随駕只恐糧草不備時晉公為三司使真宗遂問曰朕東封糧草得備否晉公日有備真宗又曰如何是備晉公曰随駕兵士大約不過十萬人毎日請口食米二升半一日只支計米二千五百石或遇駐蹕處所不過三日只支得米七千五百石何處州縣無七千五百石斛斗往回之間俱可有備真宗甚喜又問只與二升半米亦須與他些麫食晉公日今來所經州郡只可借路而過使逐程百姓榮觀國家大禮固不可科率臣欲省司行文字告示沿路所經州軍必恐有公用錢州軍及應文武臣僚州縣官僚僧道百姓有進蒸餬者仰先具州縣官位姓名蒸餬數目申來待憑進呈若係省錢支與一倍價錢回賜仍大駕往東封日進蒸餬回日並許進酒肉縁有公使節帥防團刺史有人可以勾當仰于經過縣鎮草市處排當經過者是州縣官員僧道百姓可于經過本州縣處進真宗聞之又甚喜又問曰或遇泥雨非次支賜鞋輪錢動要五七萬貫如何有備晉公對曰臣亦已有擘晝伏縁随駕軍士各是披帶稍重到處若遇有支賜錢物如何將行臣欲先令殿前指揮使曹璨問諸六軍或遇路中有非次支賜置随駕便錢一司仍各與頭子支便于軍士住營處或指定州軍便支與各人骨肉請領一則便于軍士請令二則軍士随駕骨肉在營得便倒支錢物因兹甚安人心尋曹燦問諸六軍皆曰随駕請得何用兼難以將行若聖恩如此皆感戴官家真宗聞之又甚喜于是以此告諸两地臣僚遂定東封聖駕往回路無闕誤真宗于是因晉公奏事次宻謂晉公曰今來封禪禮畢大駕往回凡百事須俱總辦集感卿用心晉公曰臣菲方遭逢陛下過有委任臣寔無所能今大禮已畢輒有二事上告陛下朝廷每有除改外靣多謗議云某乙甚人主張某乙是甚人親戚此後每有除改外面多謗望聖聰不聼上曰朕深知不聼其如臣僚何晉公又曰只如毎遇南郊大禮外靣多竊議中書密院臣僚别有動静今來禮畢望陛下兩地臣僚並令依舊免動人心真宗聞之甚喜彌加眷遇首台掌武聞之益多其奏議宋史真宗本紀大中祥符二年春正月癸亥以封禪慶成賜宗室輔臣襲衣金帶器幣十二月辛丑丁謂上封禪朝覲祥瑞圖劉承珪上天書儀仗圖三年九月華州言父老二千餘人請幸西嶽冬十月庚申丁謂等上大中祥符封禪記右宋真宗封禪禮志徽宗政和三年兖鄆耆壽道釋等及知開徳府張為等五十二人表請東封優詔不允六年知兖州宋康年請下祕閣檢㝷祥符東封典故付臣經畫時蔡京當國將講封禪以文太平預具金繩玉檢及他物甚備造舟四千艘雨具亦千萬計迄不能行右宋徽宗封禪未行明典彚永樂七年三月朔車駕廵狩北京駐蹕東平州望祭泰山畢顧侍臣曰昔舜廵狩至泰山舉祀禮覲諸侯一正朔考制度而已葢欲使天下同風後來秦皇漢武皆有侈心登封泰山薦道德功以誇示後世終不免後世之非議太祖一天下立法制五六十年國不異政家不殊俗朕謹遵成憲此行亦惟欲親廵撫使軍民各得其所耳十四年夏祠祭郎中周訥請封禪尚書呂震請如訥言上曰今天下雖無事然水旱疾疫亦間有之朕每聞郡縣上奏未嘗不惕然于心豈敢自謂太平之世且聖經未嘗言封禪唐太宗亦不為封禪魏徴每以堯舜之聖望太宗爾欲處朕于太宗之下亦異乎徴之愛君矣爾嘗以古人自勉庻幾不忝宗伯之任蕙田案封禪之事自宋以後無有踵而行者未必非成祖之言之力也且云聖經不言封禪唐太宗亦不為封禪可知雄才大略之主舉動非可偶然成祖葢以自况彼庸庸者固無足議耳前謂唐太宗之用心深逺至是果驗右明成祖論封禪五禮通考卷五十二
