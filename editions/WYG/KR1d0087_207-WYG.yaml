第六術句與股弦和求其弦或求其股句自椉股弦和除之得股弦較以加股弦和半之得弦以減股弦和半之得股股與句弦和求句弦術同凡句與股之名可互易故不兩列句股第七術截圜徑得矢求弧背之弦用第四術命矢為小矢於圜徑減小矢餘為大矢以小矢大矢相椉四之開方得弧背之弦若不四其實則得半弧弦凡方面倍其積必四倍或不用和較率則矢與圜半徑相減餘為股圜半徑為弦用第三術得句倍句為弧背之弦句股第八術弧背之弦與矢求其圜徑用第五術弦折半自椉矢除之若弦自棄則四其矢除之加矢為圜徑減句於圜半徑餘為次弧背之矢倍股為次弧弦減次弧背之矢於圜徑餘為句弦和其矢為句弦較和較相椉為股之方句股第九術圜徑平截之得弧背之弦求其矢弦折半與圜半徑相減得次弧背之矢即句弦較若相加則得句弦和用第七術得次半弧背之弦於圜半徑減次半弧背之弦得矢或不用和較率則弧背之弦半之為句圜半徑為弦用第二術得股股即次半弧背之弦也引徑隅於弧背外成句股弦弧背外之句謂之矩分弦謂之徑引數股得圜半徑也次弧背外之股謂之次矩分弦謂之次引數句得圜半徑也方圜相函之體用圜一帀而函句股和較之率四分圜周之一如之方四帀而函圜之周凡四觚如之句股􅓛三帀而函圜之半周凡三觚如之句股第十術凡凖望折而成方者皆為句股形其方折倨句中矩吴曰今亦名直角又名正方角適四分圜周之一餘兩觚測知一觚弧度以減四分圜周之一餘為所未測一觚之度若三觚形不折而成方其觚或倨吴曰今名鈍角或句吴曰今名銳角於圜半周減一觚弧度餘為兩觚之和減兩觚則餘一觚圜周之外内所成句股弦皆方數也隨徑隅所指割圜周成弧背皆圜度也度同則外内相權句股弦三矩通一為道外内相權句股弦三矩通一為道斯可以小大互求矣小句小股小弦表一大句大股大弦表二句股第十一術以原有之兩矩定其率今有之一矩與之相權異椉同除如前表隔表相權異名椉同名除凡用表倣此得所求之一矩凡推步大句小句除之得大股也若重測於表長減人目髙以椉兩表閒前後表相去之數古人謂之表閒積人目前後去表兩數相減為較除之加表得所測之髙此小股椉兩大句之較兩小句之較除之得大股也若以人目去前表之數或去後表之數椉表閒人目前後去表兩數較除之得前表或後表距所測處之逺此任以一小句椉兩大句之較兩小句之較除之各得其一大句也凡表為小股人目去前後表各為一小句其較為兩小句之較所測髙為大股前後表距所測處各為一大句兩表閒為兩大句之較其前後各成同度之大小句股故能以小知大迭更互求無所不通髙深廣逺一理皆句股比例之一端附論之圜之半容句股則圜徑為句股之弦句與股復為弦而析之成同度之句股三吳曰第七第八第九三術之理以所成之句股同度故可互求圜内函同度三句股即以為句股弦和較之率又即句實股實倂之適與弦實相等之故盖第一術至第九術一理相貫也四分圜周之一隨徑隅所指成同度之句股三句股弦内矩分次内矩分徑隅表一矩分圜半徑徑引數表二圜半徑次矩分次引數表三用表互求如前第十一術凡同度相權之法句股之大恒也句股應矩之方變而三觚不應矩之方以句股御之截為句股六而同度者各二三三交錯是以展轉互權三觚句於句股吴曰今之三銳角内弧吴曰凡銳角用本角弧度三觚一倨於句股吴曰今之一鈍角二鋭角外弧吴曰惟鈍角用外角弧度凡三觚三距對所知之距其觚曰正觚弧度曰正弧餘兩觚或右或左正弧内矩分為句對正觚之矩為之弦右弧内矩分為句對右觚之距為之弦若左弧内矩分為句則對左觚之距為之弦以句求弦其先知兩觚者也知兩觚一距以􅓛求句其先知兩距者也知一觚兩距句矩與形通一為道句此形之實數弦正弧内矩分截右觚之距對正觚之距表一右弧内矩分截正觚之距對右觚之距表二句句弦正弧内矩分截左觚之距對正觚之距表一左弧内矩分截正觚之距對左觚之距表二句句弦右弧内矩分截左觚之距對右觚之距表一左弧内矩分截右觚之距對左觚之距表二句股第十二術吴曰今名兩角夾一邊求餘角餘邊所知之兩角不夾所知之一邊術同凡三距成三觚之形自右至左兩測所得弧度及兩測相距之數求餘兩距於圜半周減兩測弧度餘為對所知一距之觚弧度是為正觚正弧兩測為對所求兩距之觚弧度以所知之距椉對所求一距之觚弧度内矩分正弧内矩分除之得所求之距凡倨於句股之一觚其弧過四分圜周之一用外弧内矩分互求之術並同句股第十三術吴曰今名兩邊一角角有所對之邊求餘角餘邊知兩距及一觚弧度所知之一距與所知之觚相對其觚為正觚弧度為正弧其距為對正觚之距餘一距與所求之觚相對以正弧内矩分椉餘一距所知兩距之一對正觚之距除之得所求之觚弧度内矩分既知兩觚兩距則如前第十二術可推其餘若先知兩距一觚而無正觚則所知之觚曰本觚弧度曰本弧以弧矢術御之於圜半周減本弧餘為兩弧之和割圜成弧背弧背之弦與兩弧内矩分成同度之句股二兩弧内矩分為句弧背之弦為其兩弦之和半之得半弧背内矩分為半和弦句與弦通一為道半弧背之外内矩分通一為道半弧背也者所求兩觚之半和度也所知之兩距實對所求兩觚之距故兩距之和較與半和度半較度之矩分通一為道句股第十四術吴曰今名兩邊夾一角求餘角餘邊用梅勿菴切綫分外角法知兩距及一觚弧度不知其觚所對之距及兩距所對之觚於圜半周減所知一觚弧度餘為所求兩觚弧度之和吴曰亦名外角半之為半和度以所知兩距相減之較椉半和度矩分所知兩距相併之和除之得半較度矩分以半較度半和度相減得對所知小距之觚弧度若相加則得對所知大距之觚弧度既知三觚兩距則如前第十二術可推其一凡矩分隨數之和較得以相權凡内矩分不隨和較全半相權也吳曰三角形任以兩邊為弦餘一邊或為兩句之和銳角形之邊或對鈍角之邊或為兩句之較鈍角旁之邊截之成句股二兩弦之和較相椉得長方冪同於兩句之和較相椉所得長方冪也以兩句之和除之得兩句之較若較除之則得和以是為三邊求角之率分三角形為兩句股然後用句股求角法以八綫表之半徑全數或十萬或千萬與句相椉弦除之得句弦所交之角餘弦此術為平三角法邊角互求之一記中所不載者又術凡三角之容圜半徑截三邊為六而相等者各二成角旁相等之邊以為股皆以容圜之半徑為之句三邊相併半之為半和三邊各與半和相減而得三較角所對邊之較即邊所對角兩旁相等之邊也先知三邊求其角以三較連椉連椉者兩較相椉得數餘一較又椉之半和除之開方得容圜半徑以八綫表半徑全數與容圜半徑相椉角所對邊之較除之得半角之正切倍之得角若三較連椉又椉以半和則開方得三角形積半和除之得容圜半徑三角形積者容圜半徑與半和相椉之冪也此求角求積及容圜三術交通皆不論角之銳鈍頗為便用附存之句股割圜記中渾圜中其圜而規之二規之交循圜半周而得再交如赤道為一規黄道為一規赤道即周髀之中衡黄道自南而北交於春分自北而南交於秋分二分相距半天周距交四分圜周之一規之翕闢之節也如分至相距四分天周之一更為一規過二至二極為玉衡之中維吴曰今名二極二至交圈赤道距北極黄道距北極璿璣吴曰今名黄道極皆四分天周之一北極璿璣距正北極與黄道距赤道相等縁是以為經謂之經度横截經度之外謂之緯度太傅禮東西為緯南北為經故古法皆以黄赤道之度為緯度二道二極相距之度為經度吴曰今歐邏巴反之緯度之宗赤道是也經度之宗玉衡中維是也黄赤道二至相距之度授時術草謂之二至内外半弧背夏至為内冬至為外吴曰今名黄赤大距赤道離二至之度授時術草謂之赤道半弧背吴曰今從二分起數則為赤道餘弧經之内規之謂之經弧緯之内截其規謂之緯弧經弧如各度黄赤道相距之數授時術草謂之黄赤道内外半弧背春分後為内秋分後為外吴曰今名黄赤距緯緯弧如日躔黄道離二至之數授時術草謂之黄道半弧背吴曰今為黄道餘弧經緯之度界其外經緯之弧截其内是為半弧背者四以句股御之半弧背之外内矩分平行相應得同度之句股􅓛各四古弧矢術之方直儀也儀不具次矩分之句股弦面各一圜半徑為句次矩分為股次引數為弦與本弧外内矩分之句股弦三三相應詳上篇第十二圖方直儀所不必具而可知者加一於四而五是故參其體兩其用用也者旁行而觀之也旁行以用於經度則經弧矩分為句緯度次内矩分為之股經弧内矩分為句緯弧次内矩分為之弦句股弦互求率一經度矩分圜半徑經度徑引數表一經度内矩分經度次内矩分徑隅表二圜半徑經度次矩分經度次引數表三經弧矩分緯度次内矩分虚表四經弧内矩分虚緯弧次内矩分表五表一表二表三皆經度本有之句股弦所謂參其體也表四表五平行相應之句股弦所謂兩其用也體與用可以按表互求旁行用於緯度則緯弧矩分為句經度次内矩分為之股緯弧内矩分為句經弧次内矩分為之弦句股弦互求率二緯度矩分圜半徑緯度徑引數表一緯度内矩分緯度次内矩分徑隅表二圜半徑緯度次矩分緯度次引數表三緯弧矩分經度次内矩分虚表四緯弧内矩分虚經弧次内矩分表五旁行用於經弧則經度矩分為句緯度徑引數為之股經度内矩分為句緯弧徑引數為之弦句股弦互求率三經弧矩分圜半徑經弧徑引數表一經弧内矩分經弧次内矩分徑隅表二圜半徑經弧次矩分經弧次引數表三經度矩分緯度徑引數虚表四經度内矩分虚緯弧徑引數表五旁行用於緯弧則緯度矩分為句經度徑引數為之股緯度内矩分為句經弧徑引數為之弦句股弦互求率四緯弧矩分圜半徑緯弧徑引數表一緯弧内矩分緯弧次内矩分徑隅表二圜半徑緯弧次矩分緯弧次引數表三緯度矩分經度徑引數虚表四緯度内矩分虚經弧徑引數表五儀之立也為方四成旁行而得同度之句股四經度矩分為句則緯度矩分為之股經度内矩分為句則緯弧矩分為之股經弧矩分為句則緯度内矩分為之股經弧内矩分為句則緯弧内矩分為之股句股弦互求率五經度矩分緯度矩分虚表一經度内矩分緯弧矩分虚表二經弧矩分緯度内矩分虚表三經弧内矩分緯弧内矩分虚表四凡句股二十有四為互求之率五遵古已降推步起日至斯其本法也句股第十五術有經度吳曰如黄赤大距亦名黄赤交角有緯弧吳曰如黄道離二至度若起二分則為黄道餘弧求經弧吳曰如黄赤距緯以經度内矩分椉緯弧次内矩分徑隅除之得經弧内矩分於前表中擇其用徑隅半徑省除者餘並不其列授時術草云置黄赤道小弦緯弧次内矩分旁行用於經度故名黄赤道小弦以二至内外半弧弦即經度内矩分椉之為實黄赤大弦即經度徑隅為法除之得黄赤道内外半弧弦即經弧内矩分句股第十六術有經度有緯弧求緯度吳曰如起一至赤道離度若起二分則為赤道餘弧以緯弧矩分椉經度徑引數圜半徑除之得緯度矩分句股第十七術有經度有經弧求緯弧以經度次引數椉經弧内矩分圜半徑除之得緯弧次内矩分句股第十八術有經度有經弧求緯度以經度次矩分椉經