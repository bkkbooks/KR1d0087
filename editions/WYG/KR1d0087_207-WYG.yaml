第三十術以經度次引數椉外規度次内矩分圜半徑除之得股度次内矩分若所求之一距不論句度股度恒以句度當之經度恒為對所求一距之觚規度則與前術同已上兩觚求一距者三吴曰如黄赤交角及黄道交極圈角求黄道赤道黄赤距凡兩觚與距互求其術六擇諸儀省便於算者用之不可勝用也術中無煩具列吳曰就黄赤道起二分言之黄道赤道黄赤距為正弧三角之三邊其三角一直角為赤道交極圈角兩銳角為黄赤交角黄道交極圈角置直角不須求三邊互求者三黄赤交角與三邊互求者九黄道交極圈角與三邊互求者亦九理同黄赤交角與三邊互求合兩角與邊互求者又得九黄赤交角與三邊求黄道交極圈角者三黄道交極圈角與三邊求黄赤交角者亦三同屬一理共三十事斯記約其術十有八句股割圜記下三觚非弧矢術之正以句股弧矢御之渾圜之規度正視之中繩側視之隨其髙下而羨惟平視之中規胥以平寫之循規度之端竟半周得圜徑衡截圜徑齊規度之未抵外周得規度所為半弧弦弧與􅓛易正側之勢以為平於是命外周之度為其規度凡矢屬於規度之端弦屬於規度之末一從一衡相遇也用矢用内矩分凖是率率之過四分圜周之一用大矢過半周如之適四分圜周之一矢與半弧弦皆適圜半徑用半徑為矢為内矩分適四分圜周之三如之適圜半周大矢宜甚大滿圜徑用圜徑為矢過四分圜周之三猶徃而復仍用小矢凡過四分圜周之一以減半周而得餘弧過半周以半周減之而得􅓑弧減餘弧􅓑弧之矢於圜徑得大矢惟過四分圜周之三以減圜周用其餘弧之矢四分圜周之一古推步法謂之一象周天分四象是為規度之大限率之變也減兩距於圜半周用其餘弧為兩距減對兩距之觚於圜半周用其外弧為兩觚内矩分共用之半弧弦也餘一距及其對觚共用之觚與距也若三觚各以為渾圜之一極距觚四分圜周之一規之三規之交成三觚三距則觚同其距之規度距同其觚之規度前術大小倨句之體更也後術觚與距之體更也吴曰今之斜弧三角法有銳角有鈍角或三角俱銳或兩銳一鈍或兩鈍一銳或三角俱鈍其三邊或俱不滿一象或一邊過之或兩邊過一象或三邊俱過約其大致有相對之邊角及對所求之邊角用邊角互求法有相對之邊角又有一邊或一角非對所求之邊角則用垂弧法截為兩正弧三角若有兩邊一角求對角之邊或有三邊求角則用矢較法不能直用三法者如上前後二術易大邊為小邊易鈍角為銳角及邊易為角角易為邊然後隨其體勢總不出三法之範圍矣句股相權之大恒觚之規度内矩分各與對距相應三距為渾圜之規度則觚之内距分與對距之内矩分相應相應而展轉互權矣所知之觚與所知之距為相對之觚與距其觚曰正觚其距曰對正觚之距所知之觚與所求之距為相對之觚與距其觚曰對所求一距之觚或所知之距與所求之觚相對其距曰對所求一觚之距凡觚與距適四分圍周之一者内矩分適圜半徑句股第四十五術吳曰此邉角互求法以對角求對邊以對正觚之距内矩分椉對所求一距之觚内矩分正觚内矩分除之得所求之距内矩分句股第四十六術吴曰此亦邊角互求法以對邊求對角以正觚内矩分椉對所求一觚之距内矩分對正觚之距内矩分除之得所求之觚内矩分若所求為倨於句股之觚則所得為其外弧内矩分以外弧減圜半周得所求之觚所求非對距對觚則截之成圜度句股弦者二各視次緯儀之率通之句股第四十七術吳曰此垂弧法及作垂弧于次形法三觚皆句於句股自内截之分一觚及其對距為二成圜度之句股弦者二三觚一倨於句股或自内截之分倨於句股之一觚及其對距為二或自外截之而倨於句股之觚有外弧亦皆成圜度之句股弦者二若兩觚倨於句股或三觚並倨用前變率大小倨句之體更别成一三觚然後或截其内或截其外既得圜度之句股弦隨其體勢無不與次緯儀相應按中篇諸術求之凡内矩分為半弧弦其弧背渾圜大規也半弧􅓛不滿圜半徑者以矢為樞以半弧弦規之成渾圜之小規吳曰今名距等圈其周徑距大圈之周徑平行相等衡截正視側視之規移其度為平視側視之規亦截小規而與中圍之大規相應截小規之徑為大小矢則與中圍大規之徑為大小矢相應三觚之用兩距和較也所求之觚或所知之觚所知之兩距旁之其觚謂之本觚旁於本觚之右距以平寫之為平視之規則左距為側視之規截左距之末成小規而識左距於平兩距和度較度之矢較半之為矢半較以為句小規之半徑為之弦以較度與對本觚之距兩矢較為句左距側視之規截小規之徑成大小矢為之弦如是得同度之句股二而句與弦通一為道凡觚之規度中圍大規也大小規之半徑及其矢並通一為道句弦本觚規度矢半較和度較度小規半徑大規半徑表一失較較度對距小規之矢大規之矢表二若左距適四分圜周之一則所成之規適為中圍大規小規之半徑即左距所為半弧背之弦凡半弧背適四分圜周之一者半弧弦亦適圜半徑若左右距相等無較度則和度之矢半之為句小規之半徑為之弦對距之矢為句小規之大小矢為之弦若無較度而左距又適四分圜周之一和度必適園半周以圜徑為之矢半之即半徑不復成句股對距之矢即為本觚之矢亦不復成句股對距之度即本觚規度直不須求矣吳曰據八綫表減餘弦於半徑全數為正矢即小矢併餘弦半徑為大矢梅勿菴環中黍尺卷五云角旁兩弧度即左距右距相加為總即兩距之和度相減為存即兩距之較度視總弧過象限以總存兩餘弦相加不過象限則相減並折半為初數若總弧過兩象限與過象限法同其餘弦仍相加過三象限與在象限内同其餘弦仍相減若存弧亦過象限則反其加減總弧過象限或過半周宜相加今反以相減若總弧過于三象限宜相減今反以相加並以兩餘弦同在一半徑相減不然則加也如勿菴法用時宜審餘弦同在半徑不同在半徑盖過一象限過半周餘弦皆在外半徑不過象限過三象限餘弦皆在内半徑知此庶幾加減不誤又過一象限過半周皆與半周相減而用餘弧剰弧之餘弦過三象限與圜周相減而用其餘弧之餘弦知此庶幾用餘弦不誤二條當為勿菴補其例其書又云或總弧適足半周用半徑為總弧餘弦若角旁兩弧同數則無存弧用半徑為存弧餘弦此勿菴遷就之法非算理也適足半周無餘弦戴君所謂大矢宜甚大滿圜徑耳不當設半徑為餘弦又無存弧者無由有存弧之餘弦而空設半徑以入加減二者不可以算理揆之因知兩餘弦加減立法之根殆屬假借斯記立新法改用兩矢較半之與勿菴所得初數同不須强設且免詳審加減之煩以觚求距求對距之矢也以距求觚求本觚規度之大小矢也句股第四十八術吳曰此矢較法今名兩邊夾一角求對邊及兩角夾一邊求對角知一觚兩距而距在觚之左右求對觚之距其觚曰本觚以左右兩距相併為和度相減為較度和度較度之矢相減半之為矢半較吳曰即所謂初數又名中數但彼用餘弦此用矢立法不同耳椉本觚之矢圜半徑除之得對距與較度之兩矢較加較度矢即對距之矢凡無較度則用和度之矢半之椉本觚之矢所得即對距之矢若知兩觚一距而觚在距之兩端凖前易觚為距易距為觚則其術同句股第四十九術吳曰此亦矢較法今名三邊求角及三角求邊知三距求觚所求之觚曰本觚以旁兩距相併為和度相減為較度對距之矢與較度之矢相減為兩矢較與圜半徑相椉和度較度之矢半較除之得本觚之矢凡無較度則圜半徑椉對距之矢和度之矢半之除得本觚之矢若三觚求距凖前易觚為距易距為觚則亦三距求觚矣凡矢或小矢或大矢例已見前總三篇凡為圖五十有五為術四十有九記二千四百一十四字因周髀首章之言衍而極之以備歩算之大全補六藝之逸簡治經之士於博見洽聞或有涉乎此也吳曰凖望簡法首章云為矩以凖望凡百分大其器則分十之謂之小分矩積其分萬小分百萬以矩之百分為圜半徑自一觚規之規度適四分圜周之一其觚設垂綫截規度成半弧背者二弧背外方謂之矩分半弧弦謂之内矩分垂綫在弧内謂之徑隅圜半徑徑隅一也抵弧外與矩分相應謂之徑引數矩分過滿百不與垂綫值垂綫所指知次弧背之矩分矩積為實次矩分為法實如法而一得過滿百之矩分減半弧背於規度是為次半弧背半之以其矩分加於半弧背之矩分得徑引數内矩分與弧外方數平行相應也規度全圜凡百應晝夜之數度六十分以十分為一小度應書夜之刻分分不容六千則參分其小度命以太少三之一曰少半度三之二曰太半度一矩之規小度百有五十方圜之致備矣非圜無以盡方之變非方無以明圜之用又曰天本無度步算家設度以推測日月星之行古法三百六十五度四分度之一古嵗實三百六十五日四分日之一畧舉大致耳盖隨宜修改不與天爭時每晝夜日右旋一度度也者行而過之之名今用三百六十整度則每晝夜日行不及一度雖失名度之義算器無妨用之此擬周髀製矩故用古刻法為度法古晝夜百刻刻六十分凡十分為一小刻𨽻十二辰每一辰八大刻二小刻梁天監中改為晝夜九十六整刻今刻法用之得名度者日左旋一刻所度也五禮通考卷一百九十七
