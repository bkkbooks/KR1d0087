body:
  text: 五禮通考卷一百九十七刑部尚書秦蕙田撰嘉禮六十八觀象授時會典推木火土三星法土星用數土星每日平行一百二十秒六二二五五一江氏永曰土星距地最逺行最遲算土木火三星平行之法用前後兩測取其距恒星之度分等距太陽之逺近左右亦等乃計其前後相距中積若干時日及星行滿次輪若干周即可得其平行之率新法算書載古測定二萬一千五百五十一日又十分日之三土星行次輪五十七周置中積日分為實星行次輪周數五十七為法除之得周率三百七十八日零一百分日之九分二九八二乃以毎周三百六十度為實周率三百七十八日零為法除之得五十七分零七秒四十二㣲四十一纎四十四忽三十三芒為毎日土星距太陽之行與每日太陽平行五十九分零八秒一十九㣲四十九纎五十一忽三十九芒相減餘二分零三十六㣲零八纎零七忽零六芒為毎日土星平行經度凡星平行者本輪心平行於本天也最髙每日平行十分秒之二又一九五八三江氏永曰諸星皆有本輪即有最髙最髙即有行度猶太陽之最卑行太隂之月孛行也其行右旋正交每日平行十分秒之一又一四六七二八江氏永曰諸星各有本道與黄道交正交者自南而交入於北也交行左旋本天半徑一千萬江氏永曰各本天大小極不等半徑恒設一千萬者整數便算也欲得其距地之數以太陽距地髙卑之中數與次輪半徑較而可知如太陽距地一千一百四十一地半徑而土星次輪一百零四萬有竒則本天半徑比本陽本天半徑約大十倍弱也木火本天倣此本輪半徑八十六萬五千五百八十七均輪半徑二十九萬六千四百一十三江氏永曰本輪之心在本天均輪之心在本輪本輪左旋均輪右旋均輪半徑比本輪半徑三之一而稍强次輪半徑一百四萬二千六百江氏永曰次輪所以載星而右旋其頂合日其底衝日其心在均輪上次輪原與太陽本天等大因星之本天甚大故其半徑僅當本天半徑十之一有竒本道與黄道交角二度三十一分江氏永曰猶黄道與赤道白道與黄道有距度也諸交角倣此土星平行應七宮二十三度十九分四十四秒五十五㣲江氏永曰律元天正冬至次日壬申子正時土星平行宮度也諸應倣此最髙應十一宮二十八度二十六分六秒五㣲正交應六宮二十一度二十分五十七秒二十四㣲木星用數木星每日平行二百九十九秒二八五二九六八江氏永曰測木星平行之法亦用前後兩測與土星同新法算書載古測定二萬五千九百二十七日又千分日之六百一十七木星行次輪六十五周置中積日分為實星行次輪周數六十五為法除之得周率三百九十八日零十分日之八分八六四一五乃以每周三百六十度為實周率三百九十八日零為法除之得五十四分零九秒零二㣲四十二纎四十七忽三十二芒為毎日木星距太陽之行與每日太陽平行相減餘四分五十九秒一十七㣲零七纎零四忽零七芒為每日木星平行經度最髙每日平行十分秒之一又五八四三三正交每日平行百分秒之三又七二三五五七本天半徑一千萬本輪半徑七十萬五千三百二十均輪半徑二十四萬七千九百八十江氏永曰均輪半徑比本輪半徑三之一而强次輪半徑一百九十二萬九千四百八十江氏永曰次輪亦與太陽本天等大半徑比本天半徑五之一而弱本道與黄道交角一度一十九分四十秒本星平行應八宮九度一十三分一十三秒一十一㣲最髙應九宫九度五十一分五十九秒二十七㣲正交應六宮七度二十一分四十九秒三十五㣲火星用數火星每日平行一千八百八十六秒七七三五八江氏永曰測火星平行之法亦用前後兩測與土木二星同新法算書載古測定二萬八千八百五十七日又千分日之八百八十三火星行次輪三十七周置中積日分為實星行次輪周數三十七為法除之得周率七百七十九日零十分日之九分四二七八三乃以毎周三百六十度為實周率為法除之得二十七分四十一秒三十九㣲三十七纎四十三忽五十五芒為每日火星距太陽之行與每日太陽平行相減餘三十一分二十六秒四十㣲一十二纎零七忽四十四芒為毎日火星平行經度最髙每日平行十分秒之一又八三四三九九正交毎日平行十分秒之一又四四九七二三本天半徑一千萬本輪半徑一百四十八萬四千均輪半徑三十七萬一千江氏永曰均輪半徑比本輪半徑四之一最小次輪半徑六百三十萬二千七百五十江氏永曰火星次輪時時不同本輪髙而太陽又髙者最大本輪卑而太陽又卑者最小二者皆在髙卑之中則與太陽本天等大此設星在最卑又當太陽行最卑次輪最小半徑如此本天髙卑大差二十五萬八千五百太陽髙卑大差二十三萬五千江氏永曰合兩大差四十九萬三千五百半之二十四萬六千七百五十加於最小次輪半徑凡六百五十四萬九千五百為次輪不大不小之半徑亦與太陽本天等大而在本天只得三之二弱耳本道與黄道交角一度五十分火星平行應二宮一十三度三十九分五十二秒十五㣲最髙應八宮初度三十三分一十一秒五十四㣲正交應四宮一十七度五十一分五十四秒七㣲求天正冬至詳日躔求本星平行以積日詳月離與本星每日平行相乘滿周天秒數去之餘數收為宮度分為積日平行以加平行應得本星年根上考徃古則置平行應減積日平行又置本星每日平行以所設距天正冬至之日數乘之得數與年根相併得本星平行求最髙平行以積日與最髙每日平行相乘得數為積日平行以加最髙應得最髙年根上考徃古則置最髙應減積日平行又置最髙每日平行以所設詎天正冬至之日數乘之得數與年根相併得最髙平行求正交平行以積日與正交毎日平行相乘得數為積日平行以加正交應得正交年根上考徃古則置正交應減積日平行又置正交每日平行以所設距天正冬至之日數乘之得數與年根相併得正交平行求初實行置本星平行減最髙平行得引數江氏永曰本輪心平行距最髙之數亦即均輪心左旋於本輪距初宮初度之數也用直角三角形江氏永曰小句股形也以本輪半徑内減去均輪半徑為對直角之邊江氏永曰土星本輪半徑八十六萬五千五百八十七減均輪半徑餘五十六萬九千一百七十四木星本輪半徑七十萬五千三百二十減均輪半徑餘四十五萬七千三百四十火星本輪半徑一百四十八萬四千減均輪半徑餘一百一十一萬三千此邊為小弦從本輪心抵均輪底與直角相對以引數為一角江氏永曰此角輳本輪心引數度在本輪周即其角之度求得對引數角之邊江氏永曰此邊為小句用正弦比例半徑千萬為一率引數度正弦為二率對直角之邊為三率求得四率為對角之邊從直角抵均輪底與小弦相交行引數過象限以後用二率之法詳日躔實條及對餘角之邊江氏永曰此邊為小股用餘弦比例半徑千萬為一率引數度餘弦為二率對直角之邊為三率求得四率為對餘角之邊從直角抵本輪心用二率之法同上又用直角三角形江氏永曰大句股形也以對引數角之邊與均輪之通弦相加求通弦詳月離用江氏永曰本輪左旋一度均輪右旋兩度故均輪上通弦通弦者引數之倍度也求法半徑千萬為一率引數角之正弦為二率均輪半徑為三率求得四率倍之即通弦火星均輪半徑得本輪半徑四之一則對引數角之邊三分去一即為通弦為小邊江氏永曰此邊為大句從本輪心横抵均輪倍度之處即次輪心所在以對餘角之邊與本天半徑相加減引數三宮至八宮相加九宮至二宮相減宮江氏永曰引數起最髙初宮在頂六宮在底當云九至二宮相加三宮至八宮相減此註偶誤為大邊直角在兩邊中大江氏永曰此邊為股求得對小邊之角為初均數江氏永曰用切線比例大邊為一率小邊為二率半徑千萬為三率求得四率為正切以正切檢表得角度此角輳地心并求得對直角之邊為次輪心距地心線為求次均之用用江氏永曰從地心出斜線至次輪心為大句股之弦割線比例本天半徑為一率初均數度之正割為二率大邊為三率求得四率為次輪心距地心線以初均數加減本星平行引數初宮至五宮為減六宮至十一宮為加得初實行江氏永曰次輪心所當本天之度也次輪心距地心線已過本天截至本天當其度未至本天當引長之至本天當其度求本道實行置本日太陽實行減初實行得次引即星距太陽度輪江氏永曰土木火皆在太陽上星與太陽合伏在次之頂自是遂日有距太陽度其行右旋距度即次輪上之宫度用三角形江氏永曰斜三角也以次輪心距地心線為一邊次輪半徑為一邊惟火星次輪時時不同須加減用之法詳後江氏永曰火星與太陽有定距故次輪因髙卑而有大小次引為所夾之外角過半周者與全周相減用其餘求得對次輪半徑之角為次均數江氏永曰當用切線分外角法求之兩邊相併為一率兩邊相減之餘為二率半外角切線為三率求得四率為半較角切線以半較角減半外角其餘為對次輪半徑之角并求得對次引角之邊為星距地心線為求視緯之用出江氏永曰此次引角皆謂兩邊所夾之本角從地心斜線指星對之次均角正弦為一率次引角正弦為二率次輪半徑為三率求得四率為星距地心線乃以次均數加減初實行次引初宮至五宮為加六宮至十一宮為減得本道實行江氏永曰星體行於本道也求火星次輪半徑以火星本輪全徑命為二千萬最江氏永曰即大之矢也為一率本天髙卑大差為二率均輪心距最卑之矢為三率引數與半周相減即均輪心距最卑度不過象限則以餘弦減半徑為正矢若過象限以餘弦加半徑為大矢加江氏永曰八線表無矢線以餘弦減半徑即得求得四率為本天髙卑又以太陽全徑亦命為二千萬輪江氏永曰太陽之本全徑為一率太陽髙卑大差為二率本日太陽引數之矢為三率引數過半周者與全周相減用其餘卑江氏永曰太陽引數起最求得四率為太陽髙卑差乃置火星次輪最小半徑以兩髙卑差加之得次輪半徑江氏永曰他星繞日繞其本輪心耳火日同類獨以太陽實體為心故次輪大小兼論太陽之髙卑求黄道實行置初實行減正交平行得距交實行次輪心距正交之度乃以本天半徑為一率本道與黄道交角之餘弦為二率江氏永曰土星交角餘弦九九九四木星交角餘弦九九九七三火星交角餘弦九九九四九距交實行之正切為三率求得四率為正切檢表得黄道度與距交實行相減餘為升度差以加減本道實行距交實行不過象限及過二象限為減過象限及過三象限為加得黄道實行江氏永曰星行本道與黄道相當之經度也求視緯以本天半徑為一率本道與黄道交角之正弦為二率江氏永曰土星交角正弦四三九一木星交角正弦二三一七火星交角正弦三一九九距交實行之正弦為三率求得四率為正弦檢表為初緯江氏永曰此次輪心距交逺近之本緯也正當交無緯滿九十度緯最大各如交角又以本天半徑為一率初緯之正弦為二率次輪心距地心線為三率求得四率為星距道線江氏永曰此次輪有髙下而初緯變在本天半徑之上者緯加大半徑之下者緯變小是為星距黄道線星者通次輪言之猶非星之實體也乃以星距地心線為一率星距黄道線為二率本天半徑為三率求得四率為正弦檢表得視緯江氏永曰此人視星之緯也星有髙下而距線又變在本天半徑之上者距線變小半徑之下者距線加大也隨定其南北距交實行初宮