body:
  text: 五禮通考卷首第四刑部尚書秦蕙田撰禮制因革下宋史太祖本紀開寳六年行開寳通禮禮志太祖受周禪即位之明年因太常博士聶崇義上重集三禮圖詔太子詹事尹拙集儒學之士詳定之開寳四年四方漸平民稍休息乃命御史中丞劉温叟中書舎人李昉兵部員外郎知制誥盧多遜左司員外郎知制誥扈蒙太子詹事楊昭儉左補闕賈黄中司勛員外郎和峴太子中舎陳鄂撰開寳通禮二百卷本唐開元禮而損益之既又定通禮義纂一百卷長編云通禮二百卷六年四月與義纂同上太宗勤于政治修明典章真宗承重熈之後天下無事于是封泰山祀汾隂天書聖祖崇奉迭興専制詳定所命執政翰林禮官參領之尋改為禮儀院仍嵗増修纎微委曲縁情稱宜葢一時彌文之制也自通禮之後其制度儀注傳于有司者殆數百篇先是天禧中陳寛編次禮院所承新舊詔勅不就天聖初王皥始類成書盡乾興為禮閣新編六十卷大率吏文無著述體而本末完具有司便之玉海天聖五年太常博士同知禮院王皥所撰禮閣新編六十卷或作五十卷書盡乾興初天禧中同判太常禮院陳寛請編次本院所承詔勅其後不能就皥因取國初乾興所下詔勅刪去重複凡千八百三十道類以五禮之目成書上之賜五品服仁宗本紀景祐三年二月壬戌詔兩制禮官詳定京師士民服用居室之制八月己酉班民間冠服居室車馬器用犯制之禁玉海寳元二年六月丁卯天章待制賈昌朝直史館宋祁同修纂禮書宋史職官志宋初舊制判寺無常員以兩制以上充丞一人以禮官久次官髙者充别置太常禮院雖𨽻本寺其實専達有判院同知院四人寺與禮院事不相兼康定元年置判寺同判寺始並兼禮院事元豐正名始専其職分案五置吏十一玉海康定元年四月修成閣門儀制十二卷四方館條例一卷客省條例七卷十月癸巳館閣校勘刁約歐陽修同修禮書宋史禮志景祐四年賈昌朝撰太常新禮及祀儀止于慶厯三年皇祐中文彦博撰大享明堂記二十卷嘉祐六年七月乙丑命姚闢蘇洵同禮官編纂禮書初判太常寺歐陽修言太常典禮所在而文字散失請命官纂集庶備討論而傳後世時朝廷重寘局止命禮院官是嵗秘閣校理張洞奏請擇文學該贍者三四人寘局命判寺一員總領知制誥張􅅛又奏欲謹擇有學術方正大臣與禮官精議是非釐正紬繹然後成書時修為參政又命之提舉治平二年九月辛酉書成凡百卷有序一篇目録一卷以開寳通禮為之主而記其變以類相従其無所沿于通禮者謂之新禮通禮所有而建隆以來不復舉者謂之廢禮凡立廟有議論謂之廟議餘即用通禮條目修與判寺李東之等上之詔賜名曰太常因革禮自建隆迄嘉祐藏之秘閣異于舊者十三四焉國史志開寳以後三輯禮書推其要歸嘉祐尤悉然繁簡失中訛缺不備豈有所拘而不得騁乎李燾長編寳元二年詳定閤門客省四方館儀制所上新編儀制十三卷治平元年詔閤門一月一次進班簿合璧事類慶厯四年上新修太常禮四十三卷慶厯祀儀六十三卷神宗本紀熈寜七年八月癸巳集賢院學士宋敏求上編修閤門儀制禮志熈寜十年禮院取慶厯以後奉祀制度别定禮儀其一留中其二付有司知諫院黄履言郊祀禮樂未合古制請命有司考正羣祀詔履與禮官講求以聞元豐元年始命太常寺寘局以樞宻直學士陳襄等為詳定官太常博士楊完等為檢討官襄等言國朝大率皆循唐故至于壇壝神位法駕輿輦仗衞儀物亦兼用歴代之制其間情文訛舛多戾于古葢有規摹茍畧因仍既久而重于改作者有出于一時之儀而不足以為法者請先條奏候訓敕以為禮式未幾又命龍圖直學士宋敏求同御史臺閤門禮院詳定朝㑹儀注總四十六卷曰閤門儀曰朝㑹禮文曰儀注曰徽號寶冊儀祭祀總百九十一卷曰祀儀曰南郊式曰大禮式曰郊廟奉祀禮文曰明堂祫享今式曰天興殿儀曰四孟朝獻儀曰景靈官供奉勅令格式曰儀禮敕令格式祈禳總四十卷曰祀賽式曰齊醮式曰金籙儀蕃國總七十一卷曰大遼令式曰髙麗入貢儀曰女真排辦儀曰諸蕃進貢令式喪葬總百六十三卷曰葬式曰宗室外臣葬勅令格式曰孝贈式其損益之制視前多矣元豐七年尚書禮部言歐陽修等修因革禮始于建隆迄于元祐為百卷嘉祐以後缺而不録熈寜以來禮文制作足以垂萬世法宜下太常委博士接續修纂以備討閲從之九月詔禮官續編訖于元祐初知太常禮院蘇頌請重修纂五禮疏曰六經在禮有三種之别周官著有司典領之事儀禮載升降隆殺之節戴記叙古今因革之文雖聖賢作述之不同而語其歸趣實相為表裏也後世言禮者皆不出此三體漢晉洎隋雖代有作者而茍簡一時法制無取唐明皇命學士等因貞觀顯慶所修五禮討論刪改集成一百五十卷是為大唐開元禮行于累朝設于科舉傳其學者則有義鑑義羅之類比于近代之書最為詳悉故今世漢晉洎隋皆無傳而開元禮獨不廢者以其法制存焉故也太祖皇帝特詔儒臣劉温叟盧多遜扈蒙等祖述其書傅以今事仍以増損足成二百卷是為開寳通禮又有義纂一百卷以發明其㫖要仍依開元禮設科取士逮今官司遵用斯為不刋況之六經儀禮之别也然此特一經也在于有司典領之事古今沿革之文猶缺而不立故舉行之際尚或未備自開寳以後百年之間累聖躬行聲明浸盛非有繼述後世何觀嘉祐初太常歐陽修奏請編撰彼時臣任博士職預纂修常以恭謝一門分為三目其一自降御札公卿百司奉行辦備之事謂之有司其二自前期陳設至裸獻禮畢謂之儀注其三采古今曲臺論議更剏之制謂之沿革以此一門為例他悉倣之修己議定具草㑹臣罷官領他職復奏姚闢蘇洵繼掌其事闢洵離析舊文更立新體撰成一百卷是為太常因革禮雖號簡要幾同鈔節姑可以備有司之檢閲誠未足以發揚聖朝制作之盛也陛下留意典章修舉廢墜前嵗詔命近臣詳定禮文自郊廟至于羣臣朝㑹與夫燕享器服之名數舞樂之音容考古揆今審求至當皆三代之所放失漢唐之所闕遺㫁自清衷舉行殆徧固當著于訓典與六經並行為萬世矜式也望再命諸儒討論國朝以來自開寳通禮至近嵗詳定禮文以及有司儀注沿革依三禮隨類分門著為大宋元豐新禮付之太常頒于學官使博士弟子講習大義或施于科舉則數歳之後必有詳練疏通之人上副拔擢可以為朝廷講議之官庶幾天下尚風皆如禮教謙恭撙節不學而能於變時雍可跂而待也中興書目皇朝儀物志三卷記皇朝見行禮儀及名物制度訖于神宗朝紹聖後累詔續編起治平訖政和凡五十一年為書三百卷今皆不傳歴代名臣奏議哲宗元祐元年右司諫朱光廷上奏曰為治之道無先于禮葢人情之檢柙王政之綱維莫不由此夫禮廢而不講久矣今天下之人自丱角已衣成人之服則是何嘗有冠禮也鄙俗雜亂不識親迎人倫之重則是何嘗有婚禮也火焚水溺隂陽拘忌嵗月無限死者不葬葬者無法五服之制不明輕重則是何嘗有喪禮也春秋不知當祭之時祭日不知早晚之節器皿今古之或異牲牢生熟之不同則是何嘗有祭禮也冠婚喪祭禮之大者莫知所當行之法朝廷之上未嘗講修但沿襲故事而已曾未盡聖人之藴公卿士大夫之間亦未曾講修但各守家法而已何以為天下之法車輿服食器用玩好法禁不立僭侈尤甚富室擬于王公皂𨽻等于卿士風俗如此一出于無禮而然也臣今欲乞陛下詔執政大臣各舉明禮官參議五禮上自朝廷所行之制度下至民庶所守之規矩纎悉講明究極先聖人之藴以古參今酌人情之所安天下可通行以為法者著為一代之大典垂諸象魏頒諸四海以正人倫以變禮俗此則三王之舉也給事中范祖禹乞看詳陳祥道禮書劄子臣竊以國家之用典禮為急典禮之學制度尤難太祖皇帝時命國子司業兼太常博士聶崇義考正禮圖采唐張鎰等舊圖凡六本撰成三禮圖二十卷奏之太祖下詔嘉奨令太子詹事尹拙等集儒學三五人更同參議又下工部尚書竇儀裁定其三禮圖畫于國子監講堂臣伏見太常博士陳祥道専意禮樂二十餘年近世儒者未見其比著禮書一百五十卷詳究先儒義説比之聶崇義圖尤為精當該洽昨臣僚上言乞朝廷給紙札差書吏畫工付祥道録進今聞已奏御降付三省臣愚欲乞送學士院及兩制或經筵看詳如可施行即乞付太常寺與聶崇義三禮圖相參行用必有補朝廷制作宋史徽宗本紀大觀元年置議禮局於尚書省二年詔禮緣人情以義而起因時之宜御今之俗善法古者不法其法法其所以為法之意也已禮志大觀初置議禮局命詳議檢討官具禮制本末議定請㫖三年書成為吉禮二百三十一卷祭服制度十六卷頒焉議禮局請分秩五禮詔依開寳通禮之序政和元年續修成四百七十七卷且命倣是修定儀注三年五禮新儀成凡二百二十卷増置禮直官許士庶就問新儀而詔開封尹王革編類通行者刋本給天下使悉知禮意其不奉行者論罪宣和初有言其煩擾者遂罷之初議禮局之置也詔求天下古器更制尊爵鼎彛之屬其後又置禮制局于編類御筆所于是郊廟禋祀之器多更其舊既有詔討論冠服遂廢鞾用履其他無所改議而禮制局亦罷大抵累朝典禮講論最詳記禮修于元豐而成于元祐至崇寜復有所増損其存于有司者唯元豐郊廟禮文及政和五禮新儀而已乃若圜丘之罷合祭天地明堂専以英宗配帝悉罷從祀羣臣大蜡分四郊夀星改祀老人禧祖已祧而復遂為始祖即景靈宫建諸神御殿以四孟薦享虚禘祭去牙槃食卻尊號罷入閣議并常朝及正衙横行此熈寜元豐變禮之最大者也元祐冊后政和冠皇子元符剏景靈西宫崇寜親祀方澤作明堂立九廟鑄九鼎祀熒惑大觀受八寳大祀皆前期十日而戒凡此葢治平以前所未嘗行者職官志政和三年五禮儀注成罷儀禮局中興書目政和五禮新儀二百四十卷鄭居中等撰二百二十卷御製序一卷御筆指揮九卷御製冠禮十卷合二百四十卷又目録六卷在外玉海政和三年頒行五禮新儀先是大觀元年詔講求典禮尚書省置議禮局二年御製冠禮沿革十一卷付議禮局餘五禮令視此編次四年修成大觀新編禮書吉禮二百三十一卷祭服制度十六卷祭服圖一冊詔行之政和元年續編成賓軍等四禮四百九十七卷詔頒行于是鄭居中等奏編成政和五禮新儀并序例總二百二十二卷目録六卷三年御製序曰循古之意而勿泥于古適今之宜而勿牽于今議禮局請刻石太常寺七月詔比裒集三代鼎彞簠簋盤匜爵豆之類五百餘器載于圖詔有司改造祭器置禮制局討論古今沿革以成一代之典政和續因革禮四年葛勝仲為太常少卿自建隆至治平初所行典禮嘗為書百篇勝仲續其書自治平迄政和四年部居條目皆視歐陽修之舊總例凡五十三卷吉禮九十四卷賓禮十三卷軍禮四卷嘉禮三十三卷凶禮七十七卷廟議二十七卷合三百卷目録三卷與前書并藏奉常又編纂太常祠祀儀制格目毎嵗大祠凡九十有六中祠凡二十有九小祠凡一十有四毎祀為一卷嵗再祠或四時祠或月祠若祭名異而祠儀相類則合一卷凡四十八卷標録二卷政和六年閏正月太府丞王鼎言新儀藏在有司民未通曉望依新樂頒行令州縣召禮生肄業使之推行民間并以新儀従事朱子曰祭器經政和改制盡取古器物之存于今者以為法今郊廟所用則其制也而州縣専取聶氏三禮制度非復古制葛勝仲傳勝仲遷太常卿宋自建隆治平所行典禮歐陽修嘗裒集為書凡百篇號太常因革禮詔勝仲續之増為三百卷退朝録嘉祐初兖國公主降李瑋時少師歐陽公掌禮臺與諸博士折衷昏禮頗倣古制治平中邵不疑以知制誥權知諫院請選官撰本朝冠昏喪祭之禮乃詔禮院詳定遂奏請置局于本院不許因循寢之職官志宣和三年令太常寺因革禮五年一檢舉接續編修四朝志天子鋭意稽古禮文之事招延羣英折􅇆同異元豐有詳定禮文所大觀有議禮局政和有禮制局禮志欽宗即位嘗詔春秋釋奠改従元豐儀罷新儀不用而未暇也靖康之厄蕩析無餘髙宗本紀紹興元年十一月續編紹興太常因革禮九年十二月命續編紹興因革禮玉海紹興元年太常少卿趙子晝言政和宣和續編因革禮渡江皆散失欲自渡江以後修纂成書目為紹興續編太常因革禮詔可其後太常以總例及吉凶嘉新四禮凡八十六篇二十七卷或云三十卷始于建炎至紹興二年編類粗成未以進御九年太常丞梁仲敏言紹興三年以後修纂尚缺請委官編類詔本寺續修不克成書六年成忠郎李沇以髙祖國子博士文易新編皇宋大典三卷來上詔送秘府沇遷秩其書以皇朝所定班序圖次禮容儀式衮冕車輅旗章冊命之制與夫民兵吏禄祠祭户口之數凡四十門釐為三卷宋史禮志孝宗繼志典章文物有可稱述治平日久經學大明諸儒如王普董弅等多以禮名家當時嘗續編太常因革禮矣淳熈復有編輯之㫖其後朱熹講明詳備嘗欲取儀禮周官二戴記為本編次朝廷公卿大夫士民之禮盡取漢晉而下及唐諸儒之説考訂辨正以為當代之典未及成書而沒朱子家禮序畧凡禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠昏䘮祭儀章度數者其末也三代之禮其宫廬器服出入起居之制節皆已不宜于世世之君子有志于禮或違其本而務其末緩其實而急于文苦其難而不能舉其要也其困于寠貧者尤患其終不能及于禮熹之愚葢兩病焉是以嘗獨究觀古今之禮少加損益為一家之書誠得與同志之士熟講而施行之古修身齊家之道慎終追逺之心庶猶可得復見而國家崇化導民之意或有小補云徐氏乾學曰宋世韓杜程張司馬諸大儒皆有書儀等著始各緣天性人情之不可易者本三代遺意依時世為節文往往行之家至朱子居母憂自始死以至祥禫參酌盡變因成喪葬祭禮又推之冠昏而成編曰家禮冠禮則多取司馬氏昏禮則參司馬氏程氏喪禮本司馬氏後又以禮部侍郎髙閌抑崇之書為最精多采用焉書成一侍子竊之亡去而未及修改比疾革門人請後事曰用温公禮乎曰踈書儀乎曰未問儀禮亦摇首然則以儀禮書儀參用之乎乃頷之則知士喪禮古經固萬世不能易也葢朱子沒而家禮書復出而近世尊其學多遵用之惜其儀禮經傳在經筵時欲請于朝寘局編次而不果使不克究其大全可勝歎哉今所傳儀禮經傳通解及通解續編乃其門人黄幹所修及幹門人楊復續編幸存于世學者其盡心焉玉海太常少卿余端禮請編類書久不上淳熈七年禮部郎范仲藝言太祖立經陳紀為萬世規首命大臣約唐禮書著為通禮列聖相承有禮閣新編太常新禮因革禮五禮分門各以類舉自時厥後繼纂續編中興以來久缺不録望命太常編次大臣兼領其事以著一代彌文考百世損益詔趣成書初紹興間太常少卿趙子書為續因革禮三十卷其後禮官踵為之書成未得進御淳熈十二年三月權禮部侍郎史彌大言太上再造講明典禮陛下紹統如内禪慶夀之類亘古所無宜宣取以進畧經一覽付之有司俾常遵守不必備儀衞施爵賞詔禮部太常寺繳進四月十七日上之凡三百卷賜名中興禮書總三百八十門光宗紹熈二年八月黄灝請掇取冠昏喪祭儀摹刻頒郡縣奏可宋史寜宗本紀嘉㤗元年秋九月甲戌令禮官纂集孝宗一朝典禮玉海嘉㤗二年八月禮部尚書費士寅等言禮寺以孝宗一朝典禮續纂中興禮書八十卷詔令繳進宋史寜宗本紀嘉定五年九月己酉有司上續修中興禮書玉海嘉定六年秘書少監李􅐉纂公侯守宰士庶為通禮三十卷取開寳政和凡通行者分别五禮類為一編嘉定十一年三月禮部員外郎李琪奏請令太常将慶元元年以後典禮編纂成書禮志理宗四十年間屢有意乎禮文之事咸淳以降無足言者遼史禮志遼本朝鮮故壌箕子八條之教流風遺俗猶有存者自其上世縁情制宜隠然有尚質之風耀尼和掄罕制祭山儀蘇爾罕制色色儀阻干可汗制柴冊再生儀其情朴其用儉敬天恤災施惠本孝出于悃忱殆有得于膠瑟聚訟之表者太宗克晉稍用漢禮今國史院有金陳大任遼禮儀志皆其國俗之故又有遼朝雜禮漢儀為多别得宣文閣所藏耶律儼志視大任為加詳金史禮志金人之入汴也金人既悉收其圖籍載其車輅法物儀仗而北既而即㑹寜建宗社庶事草剏皇統間熈宗巡幸析津始乗金輅導儀衞陳鼔吹而宗社朝㑹之禮亦次第舉行繼以海陵命官修汴故宫繕宗廟社稷悉載宋故禮器以還世宗既興復收嚮所遷宋故禮器命官參校唐宋故典沿革開詳定所以議禮設詳校所以審樂統以宰相通學術者于一事之宜適一物之節文既上聞而始彚次至明昌初書成凡四百餘卷名曰金纂修雜録凡事物名數支分𣲖引珠貫棊布井然有序炳然如丹又圖吉凶二儀鹵簿十三節以備大葬小鹵簿九節以備郊廟而命尚書左右司春官兵曹太常寺各掌一本宣宗南播疆宇日蹙圖籍散逸既莫可尋而其宰相韓企先等之所論列禮官張瑋與其子行簡所私著自公記亦亡其傳故書之存僅集禮若干卷其藏史館又殘缺弗完姑掇其郊社宗廟諸神祀朝覲㑹同等儀而為書若夫凶禮則畧焉金史章宗本紀章宗明昌五年春正月己巳初用唐宋典禮元史禮樂志宋因唐禮作太常因革禮而所製大晟樂號為古雅靖康之變禮文樂器掃蕩無遺元之有國肇興朔漠朝㑹燕享之禮多従本俗太祖元年大㑹諸侯王於阿難河即皇帝位始建九斿白旗世祖至元八年命劉秉忠許衡始制朝儀自是皇帝即位元正天夀節及諸王外國來朝冊立皇后皇太子羣臣上尊號進太皇太后皇太后冊寳暨郊廟禮成羣臣朝賀皆如朝㑹之儀而大饗宗親錫宴大臣猶用本俗之禮為多而其於祭祀率用雅樂朝㑹饗燕則用燕樂元之禮樂揆之於古固有可議然自朝儀既起規模嚴廣而人知九重大君之尊至其樂聲雄偉而宏大又足以見一代興王之象其在當時亦云盛矣王圻續文獻通考元作禮典上中下篇一曰朝㑹二曰燕享三曰行幸四曰符寳五曰輿服六曰樂七曰歴八曰進講九曰御書十曰學校十有一曰藝文十有二曰貢舉十有三曰舉遺逸十有四曰求言十有五曰進書十有六曰遣使十有七曰朝貢十有八曰瑞異為禮典上篇一曰郊祀二曰宗廟三曰社稷四曰嶽鎮海瀆五曰三皇六曰先農七曰宣聖廟八曰諸神祀典九曰功臣祀廟十曰諡十有一曰賜碑十有二曰旌表為禮典中篇一曰釋二曰道為禮典下篇葢朝㑹以尊君治人之道也郊廟以禋祀事神之道也佛氏為教超乎神人之表所以輯福于國家民庶者也故各為一篇之首元典章至元十六年詔太常寺講究州郡社稷制度禮官折衷前代參酌儀禮定祭祀儀式及壇壝祭器圖寫成書名曰至元州縣社稷通禮李好文傳泰定四年除太常博士㑹盜竊太廟神主好文言在禮神主當以木為之金玉祭器宜貯之别室又言祖宗建國以來七八十年每遇大禮皆臨時取具博士不過循故事應答而已往年有詔為集禮而乃令各省及各州郡縣置局纂修宜其久不成也禮樂自朝廷出郡縣何有哉白長院者選僚屬數人仍請出架閣文牘以資採録三年書成凡五十卷名曰太常集禮李好文太常集禮槀序太常集禮槀為編秩者郊祀九社稷三宗廟二十有一輿服二樂七諸神祀三諸臣請諡及官制因革典籍録六合五十一卷事覈文直彚雜出而易見葢太常之實録太宗皇帝中原甫定則已命孔子之孫元措訪求前代禮樂憲宗皇帝時則有日月之祀世祖皇帝中統之初建宗廟立太常成宗皇帝肇立郊丘武宗皇帝躬行祼享英宗皇帝廣太室定昭穆御衮冕鹵簿修四時之祀列聖相承嵗増月輯典章文物煥然畢備矣泰定丁卯秋好文備員博士既而僉太常禮儀院事遂暨一二同志蒐羅比校書成名之曰大元太常集禮槀明史禮志明太祖初定天下他務未遑首開禮樂二局廣徵耆儒分曹究討洪武元年命中書省暨翰林院太常司定擬祀典乃歴叙沿革之由酌定郊社宗廟議以進禮官及諸儒臣又編集郊廟山川等儀及古帝王祭祀感格可垂鑒戒者名曰存心録二年詔諸儒臣修禮書明年告成賜名大明集禮其書凖五禮而益以冠服車輅儀仗鹵簿字學音樂凡升降儀節制度名數纎悉畢具又屢敕議禮臣李善長傳瓛宋濂詹同陶安劉基魏觀崔亮牛諒陶凱朱升樂韶鳯李原名等編輯成集且詔郡縣舉髙潔博雅之士徐一䕫梁寅周子諒胡行簡劉宗弼董彛蔡深滕公琰至京同修禮書在位三十餘年所著書可攷見者曰孝慈録曰洪武禮制曰禮儀定式曰諸司職掌曰稽古定制曰國朝制作曰大禮要議曰皇朝禮制曰大明禮制曰洪武禮法曰禮制集要曰禮制節文曰太常集禮曰禮書若夫釐正祀典凡天皇太乙六天五帝之類皆為革除而諸神封號悉改従本稱一洗矯誣陋習其度越漢唐逺矣又詔定國恤父母並斬衰長子降為期年正服旁服以遞而殺斟酌古今葢得其中永樂中頒文公家禮于天下又定巡狩監國及經筵日講之制後宫罷殉始于英宗陵廟嫡庶之分正於孝宗暨乎世宗以制禮作樂自任其更定之大者如分祀天地復朝日夕月于東西郊罷二祖並配以及祈穀大雩享先蠶祭聖師易至聖先師號皆能折衷于古獨其排衆議祔睿宗太廟躋武宗上狥本生而違大統以明察始而以豐昵終矣當時將順之臣各為之説今其存者若明倫大典則御製序文以行之禮儀成典則李時等奉敕而修郊祀攷議則張孚敬所進者也至大明㑹典自孝宗朝集纂其于禮制尤詳世宗神宗時數有増益一代成憲畧具是焉聖學格物通明洪武五年三月上命禮部重定官民相見禮大政紀永樂三年十月禮部進冕服鹵簿儀仗并洪武禮制禮儀定式禮制集要稽古定制等書上以祖宗成憲不可改更即命頒之有司永為儀式宣徳四年二月諭禮部尚書胡濙揭榜申明内外官員服飾儀從序立及尊卑稱呼定制使無僭越憲宗成化三年九月侍讀尹直請萃成聖朝儀文法制集為禮書上是之大學衍義補丘氏濬曰成周盛時以禮持世凡其所以建國而辨方正位體國經野設官分職以為民極者皆謂之禮焉不徒以祭祀燕享冠婚賓射以為禮也太宰掌建邦之六典以治典為先而禮典僅居其一然其書不謂之治而謂之禮其意可見矣三代以前以禮為治天下之大綱三代以後以禮為治天下之一事古今治效所以異者以此五禮通考卷首第四
