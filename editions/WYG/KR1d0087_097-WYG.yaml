body:
  text: 五禮通考卷八十七刑部尚書秦蕙田撰吉禮八十七宗廟時享尚書洛誥王入太室祼傳太室清廟祼鬯告神廟疏太室室之大者故爲清廟有五室中央曰太室王肅云太室清廟中央之室清廟神之所在故王入太室灌獻鬯酒以告神也祼者灌也王以圭瓚酌鬱鬯之酒以獻尸尸受祭而灌于地因奠不飲謂之祼周人尚􅆨祭禮以灌爲重故曰王祼夏氏僎曰郊特牲云既灌然後出迎牲則祼在前殺牲在後今此先言殺後言祼者葢此所謂王賓殺禋咸格非謂諸侯至殺牲時始至也乃謂諸侯以王將舉此殺禋盛禮皆成助祭諸侯既至然後王入清廟祼酒也此與郊特牲之義何異禮記祭統獻之屬莫重于祼方氏慤曰祼所以求陰而貴氣􅆨周人則先求諸陰而尚􅆨也故重祼陳氏禮書獻之屬有九而莫重於祼是以降神者爲重凡獻卿大夫及羣有司皆其輕者也郊特牲灌用鬯􅆨鬱合鬯臭陰達于淵泉灌以圭璋用玉氣也疏灌用鬯臭者臭謂鬯氣也未殺牲先酌鬯酒灌地以求神鬱合鬯者鬱鬱金也鬯謂鬯酒煮鬱金草和之其氣芬芳條鬯也􅁃氏讀句則云􅆨鬱合鬯􅆨陰達于淵泉者用鬱鬯灌地是用臭氣求陰達于淵泉也灌以圭璋用玉氣也者王肅云以圭璋爲瓚之柄也瓚所以􅆽鬯也玉氣潔潤灌用玉瓚亦求神之宜也玉氣亦是尚􅆨也周禮天官小宰凡祭祀贊王祼將之事注又從太宰助王也將送也祼送送祼謂贊王酌鬱鬯以獻尸謂之祼祼之言灌也明不爲飲主以祭祀唯人道宗廟有祼天地大神至尊不禮莫稱焉凡鬱鬯受祭之啐之奠之以疏朝踐以後尸乃飲二祼爲奠不飲故云不爲飲主祭祀云凡鬱鬯受祭之啐之奠之者謂王以圭瓚酌鬱鬯獻尸后亦以璋瓚酌鬱鬯獻尸尸皆受灌地降神名為祭之向口啐之啐之謂入口乃奠之于地也春官小宗伯凡祭祀以時將瓚祼注將送也猶奉也祭祀以時奉而授王疏此小宗伯又奉而授之王者此據授王彼小宰據授尸謂瓚既在王手小宰乃贊王授尸故二官俱言也鬱人詔祼將之儀與其節凡祼事沃盥注節謂王奉玉送祼蚤晏之時送疏奉玉謂王與后祼時奉瓚而酌鬱鬯云送祼者謂之以授尸尸得祭之嚌之奠之不飲故上文司農云停于祭前也王及后祼皆鬱人沃以水盥手及洗瓚也鄭氏鍔曰詔告以祼將之儀與夫多少之節小宗伯贊祼將肆師亦贊祼將鬱人詔之以其儀節而已詩大雅文王殷士膚敏祼將于京傳祼灌鬯也周人尚臭疏殷臣壯敏來助周祭祼將是也王肅亦云故士自殷以其美德來歸周助祭行灌鬯之禮也然宗廟之祭以灌爲主于禮王正祼而后亞祼則祼將主人之事矣而云助行濯者天官小宰凡祭祀贊灌將之事注云又從太宰助王祼謂贊王酌鬱鬯以獻尸言太宰贊王小宰贊太宰是祼將之事有臣助之矣此周人尚􅆨舉祼將以表祭祀事見殷士助祭耳不必專助行灌也何氏楷曰小宗伯職云凡祭祀賓客以時將瓚祼此將祼指小宗伯言謂送瓚于王以行祼禮也今此詩明言祼將非言將祼正如孔氏舉祼將以表祭事之說矣周禮春官司尊彛春祠夏禴祼用鷄􅃔鳥􅃔皆有舟秋嘗冬烝祼用斚􅃔黄􅃔皆有舟禮記祭統君純冕立于阼夫人副禕立于東房君執圭瓚祼尸注圭瓚璋瓚祼器也以圭璋爲柄酌鬱鬯曰祼天子諸侯之祭禮先有祼尸之事乃後迎牲疏云天子諸侯之祭禮先有祼尸之事者以特牲少牢無此禮今此經祼後有迎牲之處是天子諸侯之事故鄭明之也蕙田案以上王祼周禮天官内宰大祭祀后祼則贊注謂祭宗廟君既祼后乃從後祼也祭統曰君執圭瓚祼尸大宗伯執璋瓚亞祼此謂夫人不與而攝耳疏大祭祀謂祭宗廟也后祼者謂室中二祼后亞之祼尸祼時以璋瓚授后鄭氏鍔曰后當行祼獻之禮内宰贊其事使不失節禮記祭統大宗執璋瓚亞祼注大宗亞祼容夫人有故攝焉疏大宗主宗廟禮者以亞祼之禮夫人親爲之此不云夫人而云大宗者記者廣言容夫人有故故大宗伯代夫人行禮執璋瓚亞祼之禮璋瓚祼器方氏慤曰周官大宗伯凡大祭祀王后不與則攝而薦豆籩徹則大宗固有攝夫人亞祼之禮矣大宗即宗伯也蕙田案以上后祼禮記禮運孔疏祭日之旦王服衮冕而入尸亦衮冕入在後侑之王不出迎尸故祭統云君不迎尸所以别嫌也尸入室乃作樂降神故大司樂云凡樂圜鐘爲宫九變而降神鬼是也乃灌故書云王入太室祼當灌之時衆尸皆在太廟中依次而祼所祼鬱鬯小宰注云尸祭之啐之奠之是爲一獻也王乃出迎牲后從灌二獻也蕙田案疏從注以樂在灌前未是通典祭之日王服衮冕而入廟王則奏以王夏王入立于東序后則副禕而入立於西序尸入之後乃就於西房尸服衮冕而入工則奏肆夏王及于室而不迎尸於是王以珪瓚酌鷄􅃔之鬱鬯以獻尸尸以祼地降神尸祭之啐之奠之此爲祼神之一獻也后乃以璋瓚酌鳥彛之鬱鬯以獻尸尸祭之啐之奠之此爲二獻也楊氏復曰司尊􅃔疏王以圭瓚酌雞􅃔鬱鬯始獻尸尸以灌地降神注凡鬱鬯尸受祭之啐之奠之此爲祼神之一獻也后以璋瓚酌鬱鬯亞祼内宰大祭祀后祼獻則贊注王既出而迎牲后乃從後祼也皆祭啐奠同上此爲祼神之二獻陳氏禮書殷人尊神而交神于明故先樂而求諸陽周人尊禮而辨神于幽故先灌而求諸陰書曰王入大室祼祭統曰君執圭瓚祼尸則尸入大室以圭瓚酌鬱鬯祼之后又以璋瓚酌鬱鬯亞祼其祼尸也如祼賓客則王與后自灌之矣鄭氏釋小宰謂王酌鬱鬯以獻尸尸受祭之啐之奠之然尸神象也神受而自灌非禮意也鄭氏又謂宗廟有祼天地大神至尊不祼攷之於禮典瑞祼圭有瓚以肆先王以祼賓客玉人祼圭尺有二寸有瓚以祀廟又鬯人秬鬯之所用則社廟山川四方而巳是祼不施于天地也然大宗伯凡祀大神享大鬼祭大示涖玉鬯表記曰親耕粢盛秬鬯以祀上帝葢祀天有鬯者陳之而巳非必祼也行人曰公再祼侯伯子男一祼諸侯有祼而卿無祼則以酒禮之而巳祭統所謂獻之屬莫重于祼者此也蕙田案周宗廟之祭以祼爲重九獻之禮以祼爲始祭統云獻之屬莫重于祼郊特牲云周人尚􅆨灌用鬯􅆨鬱合鬯􅆨陰達于淵泉灌以圭璋用玉氣也其灌之制有􅃔有卣有圭瓚有璋瓚有秬鬯有鬱鬯􅃔有六周禮小宗伯辨六􅃔之名物以待果將鄭注六􅃔雞􅃔尊􅃔斚􅃔黄􅃔虎􅃔蜼彛其用之各有時司尊􅃔春祠夏禴祼用雞􅃔鳥􅃔皆有舟秋嘗冬烝祼用斚􅃔黄􅃔皆有舟追享朝享祼用虎􅃔蜼􅃔皆有舟每祼用二􅃔者賈氏云鬱鬯共齊皆配以明水雞􅃔盛明水鳥􅃔盛鬱鬯鄭鍔則云王祼后亞之故用二􅃔王酌其一后酌其一案此較賈疏爲長皆有舟者鄭司農以爲若今時承槃陸佃以爲如今世酒船之類是也􅃔受三升尊受五升葢􅃔以祼而巳其實少尊則獻酧酢焉其實多尊所以大于􅃔也明堂位鬱尊用黄目鄭云即黄􅃔案黄􅃔又謂之鬱尊者以鬱鬯之所實名之葢分言則有􅃔有尊合言則統名尊耳卣以盛秬鬯詩大雅江漢篇周書文侯之命並稱秬鬯一卣傳疏並以卣爲中尊孫炎云尊􅃔爲上罍爲下卣爲中尊孔疏云祭時實鬯酒于􅃔此用卣者未祭則盛于卣及祭則實于􅃔是也鬯人廟用脩鄭注脩讀曰卣是也案卣是盛秬鬯之器故鬯人掌之祼時和之以鬱乃始實于􅃔而陳之故鬱人掌之鄭孔乃以爲不用􅃔而用卣爲䘮畢始禘饋食之禮其禮畧故用卣非也其王祼以圭瓚祭統云君執圭瓚祼尸春官典瑞祼圭有瓚以肆先王考工記祼圭尺有二寸有瓚以祀廟先鄭云于圭頭爲器可以挹鬱祼祭謂之瓚後鄭云瓚如盤其柄用圭有流前注漢禮瓚盤大五升口徑八寸下有盤口徑一尺明堂位灌用玉瓚大圭孔疏以玉飾瓚故曰玉瓚以大圭爲瓚柄詩旱麓篇瑟彼玉瓚黄流在中傳云玉瓚圭瓚也黄金所以飾流鬯箋云黄流秬鬯也圭瓚之狀以圭爲柄黄金爲勺青金爲外朱中央孔云毛以器是黄金照酒亦黄故謂之黄流鄭易之者以言黄流在中當謂在瓚之中不謂流出之時瓚中赤而不黄故知非黄金說瓚之狀以冬官玉人璋狀言之案鄭說爲是朱子亦從鄭義后亞祼以璋瓚天官内宰大祭祀后祼則贊賈疏后亞王祼尸内宰以璋瓚授尸祭統大宗執璋瓚亞祼孔疏夫人有故大宗伯代夫人行禮其諸侯未賜圭瓚亦用璋瓚小宗伯鄭注云天子圭瓚諸侯璋瓚王制孔疏並同詩棫樸篇濟濟辟王左右奉璋鄭箋祭祀之禮王祼以圭瓚諸臣助之亞祼以璋瓚非也亞祼乃后之事后有故則宗伯攝之此云用璋乃文王爲諸侯時之禮非指后祼亦非宗伯攝行之祼泛引殊欠分曉璋形半圭璋瓚有三考工記大璋中璋九寸邊璋七寸射四寸厚七寸黄金勺青金外朱中鼻寸衡四寸有繅鄭注射琰出者也勺謂酒尊中勺也鼻勺流也凡流皆爲龍口衡謂勺徑也三璋之勺形如圭瓚賈疏圭瓚口徑八寸下有盤徑一尺此徑四寸徑既倍狹所容亦小但形狀相似耳鄭鍔云祼圭之盤謂之瓚璋之盤謂之勺案祭統明有璋瓚之文鍔說非是鬯有秬鬯以秬黍爲酒未和鬱者盛之于卣春官鬯人掌共秬鬯而飾之廟用卣詩書左傳並云秬鬯一卣是也有鬱鬯築鬱金香草煮之和秬鬯實之于􅃔春官鬱人凡祭祀之祼事和鬱鬯以實􅃔而陳之郊特牲鬱合鬯是也秬鬯鄭云鬯釀秬爲酒芬香條暢于上下秬如黒黍一稃二米鬱鬯鄭云築鬱金煮之以和鬯酒鄭司農云鬱草名十葉爲貫一百二十貫爲築以煮之鐎中停於祭前鬱爲草若蘭肆師及果築䰞䰞讀爲煮鄭司農云築煮築香草煮以爲鬯雜記暢臼以掬杵以梧孔疏暢謂鬱鬯掬栢也梧桐也謂以栢爲臼桐爲杵擣鬱鬯也據此則以秬黍爲酒盛之于卣者鬯人所掌也築鬱金香草擣之煮之者肆師所掌也以所築煮和鬯酒以實􅃔而陳之者鬱人所掌也其儀節前一日司尊􅃔陳六􅃔鬯人共秬鬯肆師爲鬱鬯鬱人共祼器典瑞設圭瓚璋瓚祭之日逆尸入室大祝小祝君純冕立于阼夫人副禕立于房中祭統鬱人濯圭瓚璋瓚和鬱鬯以實􅃔而陳之奉王沃盥春官王入太室祼洛誥執圭瓚祼尸祭統小宗伯授王圭瓚小宰贊王授尸小宗伯注疏尸受之灌地以祭之向口啐之奠之于地小宰注疏是爲始獻后以璋瓚亞祼内宰贊之后若有故不與大宗伯執璋瓚攝后祼祭統注疏執璋瓚者其判在内朱子詩傳尸受祭之啐之奠之小宰注是爲亞獻既灌然後迎牲坐尸于堂並郊特牲行朝踐之禮其云祼將者周禮鬱人詔祼將之儀小宰贊王祼將之事小宗伯以時將瓚祼詩大雅云殷士膚敏祼將于京注疏並云將送也猶奉也小宗伯奉瓚祼而授王賓客以瓚鬯而授小宗伯謂之祼將惟殷士祼將孔氏以爲此周人尚􅆨舉祼將以表祭事見殷士助祭耳不必專助行灌是也其諸侯未賜圭瓚者不得爲鬯白虎通云天子鬯諸侯薰大夫芑蘭士蒹庶人艾王制曰諸侯賜圭瓚然後爲鬯未賜圭瓚則資鬯于天子說者以爲未賜圭瓚者毎祭請鬯于天子而用祼非也此言向未賜圭瓚而今始賜者則天子必資之以鬯如詩江漢篇云釐爾圭瓉必兼以秬鬯一卣程大昌云初賜圭瓚未及自爲之鬯即并鬯以賜使歸告祖案此正所謂資鬯于天子也書文侯之命用賚爾秬鬯一卣僖二十八年左氏傳王賜晉侯秬鬯一卣孔疏云言秬鬯必以圭瓚副可知是也白虎通云圭瓚秬鬯宗廟之盛禮故孝道備而後賜之秬鬯孝道純備故内和外榮玉以象徳金以配情芬香條鬯以通神靈君子有黄中通理之道美素之徳金者精和之至也玉者美徳之至也鬯者芬香之至合天下之極美以通其志也其唯玉瓚秬鬯乎應氏撝謙禮樂彚編王禮篇御僕進盥鬱人沃盥如初濯祼玉授王小宰贊王就雞􅃔司􅃔舉冪王酌鬱鬯司彛反冪王執圭瓚祼尸灌之于地以瓚授祝祝授小宰王拜太祖尸答拜三退出卿大夫皆出后盥于内洗内宰濯璋瓚授外宗外宗以授王后后就鳥􅃔酌鬱鬯司尊啟冪反冪如初后執璋瓚亞獻授外宗后拜太祖尸答拜后興入于西房王后有事不與則大宗伯攝之而亞祼賓執璋瓚酌雞􅃔三祼殷士祼將如儀蕙田案經文所載祼事參伍攷之葢巳詳明唯王與后執圭璋灌尸尸受祭之啐之奠之鄭氏謂尸受灌地降神名爲祭之向口啐之乃奠之于地應氏謂啐之是饗味奠之則非達于淵泉夫祭之便是灌地降神達于淵泉矣乃畧去祭之一層但舉啐之奠之爲說非是又祼將經文只有正祼亞祼而贊祼將者特諸臣助祭事詩殷士祼將鄭氏謂周人尚􅆨舉祼將以表祭事不必專助行祼是也應氏又添入賓祼一層非是右祼王一獻后亞獻周禮春官大師大祭祀率瞽登歌令奏擊拊疏大祭祀之時下神合樂皆升歌清廟故將作樂時大師率取瞽人登堂于西階之東北面坐而歌者與瑟以歌詩也拊所以導引歌者小師大祭祀登歌擊拊禮記祭統大嘗禘升歌清廟明堂位升歌清廟疏升升堂也升樂工于廟堂而歌清廟詩也周禮春官大司樂凡樂黄鐘爲宫大吕爲角太簇爲徴應鐘爲羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣注先奏是樂以致其神而祼焉乃後合樂而祭之疏致神則下神也周之禮凡祭祀皆先作樂下神乃薦獻薦獻訖乃合樂而祼焉據宗廟肆獻祼是也蕙田案殷人先作樂而後迎牲故曰先求諸陽周人既祼而後迎牲故曰先求諸陰其實殷人亦未嘗不灌灌在作樂之後周人亦未嘗不作樂作樂在既祼之後先陽後陰重在樂先陰後陽重在祼非殷人有樂而無祼周人有祼而無樂也鄭氏先奏樂而後灌之說與經文未協今移入祼後葢即升歌清廟時也右作樂降神周禮春官太祝逆牡令鐘鼓禮記郊特牲既灌然後迎牲注灌謂以圭瓚酌鬯始獻神也巳乃迎牲于庭殺之天子諸侯之禮也少疏先求神後迎牲也云天子諸侯之禮也者以儀禮牢特牲是大夫士之禮無臭欎灌鬯之事故也明堂位君肉􅃝迎牲于門卿大夫贊君疏迎牲于門者謂祼鬯之後牲入之時迎之于門卿大夫助君謂初迎牲幣以告及終祭以來之事也祭統及迎牲君執紖卿大夫從士執芻注天子諸侯之祭禮先有祼尸之事乃後迎牲大疏紖牛鼻繩君自執之入繫于碑卿大夫從者謂卿夫從之及殺與幣告也皆從于君士執芻者芻謂藁也以其殺牲用芻藁藉之君迎牲而不迎尸别嫌也祭義祭之日君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫􅃝而毛牛尚耳注麗猶繫也毛牛上耳以耳毛為上也疏此一節明祭廟牽牲致敬穆答君者穆謂子姓答對也言祭廟君牽牲之時子姓對君共牽牲卿大夫序從者卿大夫佐幣士奉芻依次第而從君也既入廟門麗于碑者君牽牲入廟門繫著中庭碑也王肅云以紖貫碑中君從此待之也卿大夫􅃝而毛牛尚耳者將殺牲故􅃝取牛毛薦之故云毛牛也以耳毛爲上故云尚耳耳主聰欲使神聽之周禮地官充人碩牲則贊注贊助也君牽牲入將殺之助持之也春秋傳曰故奉牲以告曰博碩肥腯博疏言碩牲者謂君牽牲入廟卿大夫贊幣而從皆云碩肥腯此充人既是飬牲之官當助持牛紖而牽之王昭禹曰碩大也所以告其體之充若左傳奉牲以告曰博碩肥腯是已葢君牽牲宗人告碩而充人則贊之饋食之禮宗人視牲告充則碩牲爲贊宗人明矣封人歌舞牲注謂君牽牲入時隨歌舞之言其肥香以歆神也鄭司農云封人之歌舞其牲之博碩肥腯春秋桓公六年左氏傳故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也注博廣也碩大也雖告神以博碩肥腯其實皆當兼此四謂民力適完則六畜既大而滋也皮毛無疥癬兼備而無有所闕禮記禮器太廟之内敬矣君親牽牲大夫贊幣而從祭義君牽牲夫人奠盎注奠盎設盎齊之奠也此時君牽牲將薦毛血陸氏佃曰君牽牲夫人奠盎此當朝踐之節鄭氏謂繹祭誤也蕙田案奠盎與牽牲相屬明係朝踐薦血時即禮器君親制祭夫人所薦之盎也將薦之必先奠之葢君迎牲而夫人薦豆籩君牽牲而夫人薦盎朝事延尸于堂燔燎制祭既有豆籩必有酒齊正所謂設祭于堂也禮器納牲詔于庭注納牲于庭時也當用幣告神而殺牲疏此謂祼鬯既訖君出廟門以迎牲牽牲而入納于庭之時于時須告神以殺牲大夫則贊助執幣而從君君乃用幣以告神納牲詔于庭者詔告也謂牲入在庭以幣告神故云詔于庭右迎牲詔牲禮記郊特牲坐尸于堂注坐尸謂朝事時也朝事延尸於戸西南面布主席東面時尸薦以籩豆至薦熟乃更延主于室之奥尸來升席自北方坐于主北焉疏天子諸侯朝事之事坐尸于堂户西南面坐主在西方東面尸主之前則薦用籩豆也坐尸于堂者既灌鬯之後尸出堂坐户西而南面也鄭注云至薦孰乃更延主于室之奥者約少牢特牲饋食在奥室也云尸來升席自北方坐于主北焉者以在奥東面以南爲尊主尊故居南主既居南故尸來升席自北方也尸主各席故朝事延尸於户外尸南面主席于東面是也陳氏禮書尸入既祼于室然後延之于户西坐于主東南面行朝踐之禮焉延之於户西所謂坐尸於堂是也坐於主東所謂南鄉北鄉以西方爲上是也南面所謂子南面父北面而事之是也又曰儀禮大夫士無祼禮故殺牲而後迎尸天子諸侯有祼禮故迎尸而後迎牲鄭氏曰迎牲之時坐尸于堂西南面坐主于堂西東面至薦孰乃更延主于室之奥尸坐于主北然祭統曰所使爲尸者於祭者子行也父北面而事之則尸之在堂固南面矣特牲少牢皆坐尸於室西東面則尸之在室西東面矣鄭氏曰延主於室之奥尸坐於主北其說或然其言堂上坐主于西東面是象神者與神異嚮無是理也蕙田案堂以南面爲尊所謂負斧扆南面是也室以東面爲尊所以當户而坐室西南隅爲奥也鄭氏葢牽于室中東面故并以釋堂上主席耳陳氏辨之極是禮器設祭於堂注設祭之饌于堂人君禮然薦疏設祭于堂者謂薦腥爓時設此所饌于堂春官司尊􅃔鄭注朝踐謂薦血腥酌醴始行祭事后于是薦朝事之豆籩既又酌獻賈疏王出迎牲之時祝延尸向户外戸牖之間南面后于是薦朝事八豆八籩王迎牲入廟卿大夫贊幣而從牲麗于碑王既殺太僕贊王牲事取血以告殺取毛以告純解而腥之爲七體薦于神坐訖王以玉爵酌醴齊以獻尸后亦以玉爵酌醴齊以獻尸此經朝踐用兩獻尊也云后于是薦朝事之豆籩既又酌獻者先薦後獻祭禮也其實薦豆籩在王獻前今在王獻後乃言后薦豆籩者鄭欲說王事訖乃說后事故后言薦豆籩也陳氏禮書朝踐亦謂之朝事又謂之朝獻以象朝時之所養也蔡氏德晉曰朝獻謂朝時尸既祼獻坐之於堂殺牲以薦血腥爓之事踐即籩豆有踐之踐行列之貌此時后先薦朝事之豆籩設之有行列也蕙田案郊特牲有虞氏之祭尚用氣血腥爓祭用氣也孔疏血謂祭祀以血詔神于室腥謂薦腥肉于堂爓謂沈肉于湯次腥亦薦于堂今案詔毛血後有燔燎制祭葢肺肝首心君親制祭夫人奠盎等儀節皆在祭腥祭爓之前是皆血祭也詩云取其血膋則合􅁰稷膟膋而燔之洗肝于鬱鬯而制之明皆是血矣入以告神于室出以墮于主前則亦在堂矣孔氏但以祭腥爓爲在堂專以詔血毛于室爲血祭恐遺却燔燎制祭奠盎等事不知設祭于堂是總言朝踐血腥爓祭之祭故欲設祭而先坐尸於堂是此條乃是朝踐薦祭之總括下夫人薦豆籩薦盎薦涗正是設祭事也右坐尸設祭於堂周禮天官籩人朝事之籩其實䵄蕡白黒形鹽膴鮑魚鱐注鄭司農云朝事謂清朝未食先進寒具口實之籩元謂以司尊􅃔之職參云朝事謂祭宗廟薦血腥之事薦疏此言朝事謂祭宗廟二灌之後祝延尸於戸外后此八籩先鄭不推上下文勢祭祀爲義直以爲生人所食解之故後鄭不從也元謂以司尊􅃔之職參之朝事謂祭宗廟薦血腥之事者案司尊􅃔職除二灌有朝踐饋獻爲食前二節彼又有朝獻再獻食後酳尸爲一節又參少牢主人酬尸宰夫羞房中之羞復為一節總四節亦據祭宗廟故鄭云然也醢人朝事之豆其實韭菹醓􅊽昌本麋臡菁菹鹿臡茆菹麇臡疏言朝事之豆者亦謂朝踐節春官外宗佐王后薦玉豆眡豆籩注眡視其實豆疏云佐王后薦玉者凡王之豆籩皆玉飾之餘文豆籩不云玉者文畧皆有玉可知若然直云薦豆不云籩者以豆云玉畧籩不言義可知也云眡豆籩者謂在堂東未設之時眡其實也鄭氏鍔曰内宗言加則外宗所佐者乃朝踐饋食之尸非唯佐王后薦之又當眡其實葢豆人醢人共之外宗又臨視之禮記祭統夫人薦豆執校執醴授之執鐙注校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也以疏執醴授醴之人者謂夫人獻尸以醴齊此人酌醴授夫人至夫人薦豆此人又執豆以授夫人獻與薦皆此人所掌故也明堂位夫人薦豆籩命媍贊夫人注命媍于内則世媍也于外則夫人與妻也祭祀世媍以下佐夫人媍疏夫人薦豆籩者謂朝踐及饋孰并酳尸之時也命助夫人謂薦豆籩及祭祀之屬方氏慤曰逆牲于門則薦豆籩于室可知牲則于外男子之事故君迎之豆籩則膳羞媍人之事故夫人薦焉與五官奉六牲六官奉六齍同義經有言籩豆何也凡籩則豆從之用豆則籩不必從也故禮器言天子諸侯之豆數鄉飲酒言五十六十之豆數未有特言籩者若晉侯享季孫宿有加籩而武子辭則雖或特言籩固亦有豆矣周官籩人掌四籩之實醢人掌四豆之實其序則先籩人而後醢人焉葢以籩尊而豆卑故也及其並陳則籩居邊而豆居裡然則以尊卑言故曰籩豆以内外言故曰豆籩其實一也君與夫人祭主也心耑其事焉卿大夫命媍臣妾也則贊其事而巳蕙田案朝事之豆籩薦于堂饋食之豆籩薦于室方氏概言薦豆籩于室非也郊特牲坐尸于堂鄭注時尸薦以籩豆至薦熟乃更延主于室之奥尸來升席禮運孔疏太祖之尸坐于户西南面主在其右尸主之前則薦用籩豆也祭統夫人薦豆此之謂夫媍親之右薦朝事豆籩周禮夏官司弓矢凡祭祀共射牲之弓矢注射牲示親殺也殺牲非尊者所親唯射爲可國語曰禘郊之事天子必自射其牲疏案禮記君親制祭詩云執其鸞刀以啟其毛則射殺兼爲而言唯射者彼亦示行之非正制之耳射人祭祀則贊射牲注烝嘗之禮有射豕者國語曰禘郊之事天子必自射其牲今立秋有貙劉云語疏鄭知烝嘗之禮有射豕者據逸烝嘗禮而知云國曰禘郊之事天子必自射其牲者據祭天之時牡則犢也若然宗廟之祭秋冬則射之春夏否也祭天則四時常射天尊故也是以司弓矢共王射牲之弓矢此射人贊射牲也諸侯以下則不射楚語曰劉羊擊豕而巳云今立秋有貙劉云者漢時苑中有貙劉即爾雅貙似貍劉殺也云立秋貙殺物引之者記烝嘗在秋有射牲順時氣之法易氏祓曰祭祀之禮以牲爲重視牲分牲養牲廵牲見于未祭之先將祭之時則夕牲展牲牽牲射牲割牲無非禮者射人所掌則射牲之禮而巳國語曰禘郊之事天子必自射其牲此雖天子自爲之方其迎牲于門則君執紼卿大夫從士執芻至于君親射牲而孤卿大夫咸與焉此射人相孤卿大夫之法儀以其掌射法治射儀故也右射牲詩小雅信南山享于祖考執其鸞刀以啟其毛取其血膋傳鸞刀刀有鸞者言割中節也告箋享于祖考納亨時毛以告純也膋脂膏也血以殺膋以升􅆨合之􅁰稷實之于蕭合馨香也而疏先以鬱鬯祼而降神乃隨從于後以騂牡之牲迎入于廟門以獻于祖考之神既納以告神乃令卿大夫執持其鸞鈴之刀以此刀開其牲之皮毛取牲血與脂膏之膟膋而退毛以告純血以告殺膋以升􅆨合馨香以薦神各有其人皆肅其事曰享于祖考謂納亨時者太宰云及納亨贊王牲事注云納牲將告殺謂向祭之晨既殺以授亨人然則納亨者謂牽牲入廟將殺授亨人故謂之納亨也享于祖考知是納亨時者祭義云君牽牲入廟門麗于碑卿大夫􅃝而毛牛尚耳鸞刀以刲之此下文乃言執其鸞刀故知是納亨時也納亨而謂之獻于祖考者地官充人云碩牲則贊注云贊助也助君牽牲入告肥是獻之也鸞即鈴也謂刀環有鈴其聲中節故郊特牲曰割刀之用而鸞刀之貴貴其義也聲和而後斷是中節也祭義曰卿大夫鸞刀以刲之取膟膋則此亦卿大夫也經言以啟其毛取其血膋據文言之直開毛取血不似取毛箋言毛以告純者以祭禮用毛不言啟皮而云啟毛明是取毛用之郊特牲曰毛血告幽全之物貴純之道也楚語觀射父云毛以示物韋昭曰物色是毛以告純膋者腸間脂也脂釋者曰膏故云膋脂膏也血以告殺亦楚語文也若不殺則無血故以血告殺也膋以升臭謂燒其脂膏升其臭氣使神聞之又申明升􅆨之事以此脂膏合之黍稷置之蕭乃以火燒之合其馨香之氣是升􅆨也知者郊特牲曰取膟膋燔燎升首報陽也又曰蕭合黍稷臭陽達于墻屋故既奠然後􅌊蕭合馨香注云蕭香蒿染以脂合􅁰稷燒之是合馨香之亊也朱子詩傳祭禮先以鬱鬯灌地求神於隂然後迎牲執者主人親執也鸞刀刀有鈴也膋脂膏也啟其毛以告純也取其血以告殺也取其膋以升􅆨也合之􅁰稷實之于蕭而燔之以求神于陽也記曰周人尚􅆨灌用鬯臭鬱合鬯􅆨陰達于淵泉灌以圭璋用玉氣也既灌然後迎牲致陰氣也蕭合􅁰稷􅆨陽達于墻屋故既奠然後􅌊蕭合羶薌凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸陰陽之義也何氏楷曰孔疏謂開其毛似難通所取之毛以耳毛爲上所謂毛牛尚耳是也取血以祭即所謂膟也孔云若不殺則無血故以血告殺也又郊特牲云血祭盛氣也疏謂血是氣之所舍故云盛氣也愚案二義兼之始備又血亦所用以燎也取膋爲備燔燎之用以告􅆨也先儒皆謂當朝踐時祝取膟膋燎于爐入以告神于室始升牲首于室故郊特牲云取膟膋燔燎升首報陽也以升首在燔燎之後故知當朝踐時也朝踐之禮行于灌後亦謂之朝事謂蚤朝祭事也故祭義云建設朝亊燔燎羶薌見以蕭光以報氣也羶即血膋薌即􅁰稷先儒又謂此朝踐時之燎及薦熟時又有燎故郊特牲云萧合􅁰稷臭陽達于墻屋故既奠然後􅌊蕭合羶薌奠謂熟薦時也據此則一祭而前後冇二燎未知然否禮記祭義鸞刀以刲取膟膋乃退疏用鸞刀刲割牲體又取血及腸問脂血以供薦而膋以供炙肝及爇蕭也乃退謂殺牲竟而取卿大夫所刲血毛膟膋薦之竟而退也祭有三節此一節竞故退說文云膟血祭膋是牛腸間脂也右取膟膋禮記禮器血毛詔于室疏謂殺牲取血及毛入以告神于室方氏慤曰血毛告幽全之物故詔于室以室比庭爲幽故也禮運薦其血毛疏薦其血毛者朝踐時延尸在堂祝以血毛告于室也國語楚語觀射父曰毛以示物血以告殺接誠㧞取以獻其爲齊敬也注物色也告殺明不因故也接誠于人也㧞毛取血獻其備物也禮記郊特牲毛血告幽全之物也告幽全之物者貴純之道也注幽謂血也純謂中外皆善之疏毛血謂祝初薦毛血于室時也血是告幽物毛是告全之物告幽者言牲體肉裏美善告全者牲體外色完具所以備此告幽全之物者貴其性之純善之道也方氏慤曰信南山言以啟其毛取其血膋葢謂是矣右詔血毛禮記祭義二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦􅁰稷羞肺肝首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也注二端既立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦􅁰稷也朝事謂薦血腥時也薦􅁰稷所謂饋食也見當為覸字之悞也羶當爲馨聲之悞也燔燎馨香覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之两甒醴酒也相愛用情謂此以人道祭之也報氣以氣報魄以實各首其類事疏報氣謂朝踐之節也報魄謂饋孰之節也建謂朝燔燎羶薌見以蕭光此明朝踐報氣之義也朝事謂早朝祭事燔燎謂取膟膋燎于爐炭覸謂雜也燔膟膋兼爇蕭蒿是雜以蕭氣此等三祭是報氣也薦􅁰稷謂饙熟時薦此􅁰稷也羞肺肝心首者羞進也謂薦熟之時進肝之與肺及首之與心覸雜也言祭􅁰稷之時雜以两甒醴酒更加之以鬱鬯饙熟報魄之時始云加鬱鬯者言非但薦熟是報魄祭初所以加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭初亦是報魄不當薦熟之時故云加也慕容氏彦逢曰前言氣魄爲鬼神之盛所謂二端於是禮稱事而立縁情而行本乎二者爲之故曰報以二禮特牲曰祭求諸陰陽之義禮運曰以嘉魂魄是謂合莫葢灌以求諸隂燎以求諸陽所謂二禮也二者朝事之所行而鄭以薦􅁰稷爲饋食之時失之矣夫求神必於祭之始而祭之始必合鬼神以嘉魂魄所謂臭陰達于淵泉是也周人先求諸陰既灌然後迎牲至饋食而後報魄不巳後乎况灌用鬱鬯貴氣用肝肺首心與􅁰稷同爲朝事之時所用非必有於薦孰之時也其所謂建設朝事以取膟膋而燔燎焉則膟膋爲羶􅁰稷爲薌故謂之羶薌也鄭以羶爲馨誤矣覸以蕭光覸以俠甒則求諸陰陽欲其氣之無不達故又雜之以二者焉蕭之氣芳烈而逺聞以魂氣無所不之也兩甒謂用酒醴以報魄取其近人者焉欲其同于生也方氏慤曰甒葢瓦器有兩甒故曰俠以諸物見于夾甒之間故曰覸以俠甒又副之以鬱鬯之􅃔故曰加以鬱鬯宗廟之祭祼而後獻此於鬯言加者以尊尊而􅉓卑也瓦甒之所獻鬱鬯之所灌皆非饋食之事陸氏佃曰王巳迎牲后巳奠器然後取蕭祭脂以合羶香奏樂以合聲舞此降神之序也禮云既奠然後􅌊蕭是也鬱合鬯􅆨陰達于淵泉蕭合􅁰稷臭陽達于墻屋奏樂求諸陰陽之問朝踐之事于是行焉延尸于户西尸南面主東向王乃殺牲啟其血毛祝出受之而以血告幽以毛告全皆于室更取膟膋燎于爐炭之上見以蕭光升首焉以報陽又羞肺肝首心雜以瓦甒加以鬱尊以報陰羞肺肝首心周人朝事之羞備四代之尚也故郊特牲曰祭􅁰稷加肺祭齊加明水報陰也取膟膋燔燎升首報陽也祭義建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肺肝首心見間以俠甒加以鬱鬯以報魄也祭義之報氣即特牲所謂報陽祭義之報魄即特牲所謂報陰祼獻之時有所謂求朝獻之時有所謂報因其理也蔡氏徳晉曰薦􅁰稷謂米亦生而薦之以待燔燎象上古之燔􅁰加黍米于燒石上而燔之也猶䘮禮飯用生米禮運謂之飯腥也孔頴達謂嚌肝肺有二時一是朝踐之時取肝以膋貫之入室燎于爐炭出以隋于主前二是饋熟之時君以鸞刀割制所羞嚌肺横切之使不絶亦奠于爼上又並嚌之是也蕙田案二禮鄭氏謂朝踐饋食慕容氏以求諸陰陽釋之是也此文明言建設朝事則報氣報魄均爲朝事可知鄭氏特泥于薦􅁰稷爲饋食時事其註郊特牲既奠二字云爲特牲饋食云祝酌奠于鉶南故以爲饋食之禮不知祝酌奠于鉶南乃士大夫饋食禮未迎尸以前事天子諸侯之酌奠亦當在未迎尸之前天子諸侯有朝踐有饋食特牲少牢大夫士禮有饋食無朝踐乃以天子諸侯之祝酌奠下同于大夫士詎知所謂饋食者乃祭禮之名而非當饋食之節也即據此一註可知鄭氏亦以既奠爲祝酌奠之奠乃因其見于士大夫饋食禮而謂即當饋食之時豈知天子諸侯之饋食在後而酌奠在朝踐之先不唯其說之未􅃀而其誤解之故鄭氏巳明明自露矣薦􅁰稷羞肺肝首心即君親制祭事蔡氏謂􅁰稷亦生而薦之猶䘮禮飯用生米禮運謂之飯腥極有據葢當是時以神道事尸故薦血毛羞肺肝首心皆是生用薦盎加鬱鬯皆與饋食不同則其爲􅁰稷之生米可知葢用以合蕭與脂而燔燎之郊特牲所謂蕭合􅁰稷􅆨陽達于墻屋此文所云羶薌者也豈饋食之􅁰稷乎加以鬱鬯者是時尸方祼後鬱鬯猶奠之于地本非與􅁰稷肺肝同薦羞故曰加方氏謂祼而後獻言加者以尊尊而􅃔卑瓦甒之所獻鬱鬯之所灌皆非饋食時事真有識之言即孔疏亦曰不當薦熟之時故云加亦可知其辭之岐矣陸農師以羞肺肝首心謂周人朝事之羞備四代之尚創論亦􅃀論葢明堂位所言尚首尚心尚肝尚肺乃挼祭之事在饋熟之時故祭􅁰稷加肺未嘗兼用肝與首心此兼言之故郊特牲曰祭肺肝心貴氣主也則其爲非挼祭之離肺絶肺而爲制祭之所薦又明矣報氣報魄謂即郊特牲之報陽報陰尤爲融洽總之鄭氏因誤認二禮爲朝踐饋食故􅌊蕭燔燎以祭義郊特牲分爲二事謂兩度􅌊蕭于􅁰稷則以爲饋食之粢盛於肺肝首心則以爲挼祭而鬱鬯爲祼時所獻者亦并入饋食之時以致經文之意㫖祭祀之節次觸處窒礙諸儒雖見及此而其說卒未歸于一故臚列而詳說之俾聖經之條理各有歸宿學禮者于此得其間而求之可也郊特牲蕭合􅁰稷􅆨陽達于墻屋故既奠然後􅌊蕭合羶薌注既奠謂薦孰時也特牲饋食所云祝酌奠于鉶南是也蕭薌蒿也染以脂合􅁰稷燒之取膟膋燔燎報陽也注膟膋腸間脂也與蕭合燒之亦有􅁰稷也疏朝踐時祝取膟膋燎于爐炭入以告神于室出以綏于主前又升首于室至薦熟時祝更取膟膋及蕭與􅁰稷合燒之是臭陽達于墻屋也膟膋􅁰稷並是陽氣之物故云報陽也方氏慤曰􅁰稷地産皆陰類也燔燎之火則司烜氏所取于日者也陳氏禮書鬱合鬯臭陰達于淵泉以形魄歸于地而求諸陰也蕭合􅁰稷􅆨陽達于墻屋以魂氣歸于天而求諸陽也祭祀君與夫人所以自盡者也故君灌以圭夫人灌以璋君迎牲夫人奠盎記言灌以圭璋用玉氣也既灌然後迎牲既奠然後􅌊蕭是迎牲奠盎皆在既灌之後而􅌊蕭又在既奠之後則灌求神之始也而􅌊蕭次之迎牲奠盎事神之始也而獻薦次之求諸陰而事之猶以爲未又求諸陽而曲致焉則神其不格乎設燔燎羶薌見以蕭光則羶膟膋之氣也薌􅁰稷之氣也蕭合膟膋􅁰稷而燔燎之在朝事之節而朝事之初有迎牲奠盎之禮則祭義郊特牲之文雖殊其事一也葢迎牲而刲之則血毛告于室以示其幽全膟膋􅌊于堂以達其􅆨氣而羮定之所詔又在其後不然不足謂之尚臭也鄭康成以祭義所言爲朝事之􅌊蕭以郊特牲所言爲饋食之􅌊蕭蕙田案蕭合􅁰稷便是祭義之燔燎羶香止是一事所謂既奠者即儀禮祝酌奠于鉶南在士大夫爲未迎尸之前在天子亦在未迎尸未朝踐之先故曰既奠然後􅌊蕭合羶薌其爲殺牲制祭之事明矣康成釋既奠爲即特牲祝酌奠于鉶南之奠可知天子諸侯自有陰厭酌奠之禮矣乃泥于饋食之禮遂并入于饋食之時其謬固可不攻而自破至燔燎􅌊蕭皆是求神之事與酌奠祼獻詔室制祭祊祭皆在朝踐之時豈有合亨之後進􅁰稷之時以人道事神忽又加以燔燎之理此考之于經求之於義可斷然信其朝踐之事而非有再度之􅌊蕭審矣陳氏雖疑之而以奠盎爲說其病正坐在忘却陰厭一節事耳詩大雅生民篇取蕭祭脂傳取蕭合􅁰稷􅆨達墻屋先奠而後爇蕭合馨香也箋取蕭草與祭牲之脂爇之于行神之位馨香既聞屋疏言宗廟之祭以香蒿合􅁰稷欲使􅆨氣通達于墻故記酌于尸巳奠之而後燒此香蒿以合其馨香之氣彼神歆饗之故此亦用蕭取其馨香也此言祭脂彼不言脂彼言􅁰稷此不言􅁰稷皆文不具耳朱子集傳蕭蒿也脂膟膋也宗廟之祭取蕭合膟膋爇之使􅆨達墻屋也何氏楷曰此指宗廟之祭言取香蒿及祭牲之脂雜燒之所以達其馨香之氣使神歆享之也其燒此二物又必合􅁰稷古人以神之道㣲不可搏執故求萬物之理以為同聲相應同氣相求水流濕火就燥故用百物之英華庶幾麗而留之此蕭之氣達于墻屋則墻内乃爇蕭之地故曰蕭墻之内王應麟云古所謂香者如此韋彤五禮精義謂祭祀用香今古之禮並無其文梁天監初何佟之議鬱鬯蕭光所以達神與其用香其義一也攷之殊無依據開元開寳禮不用禮記郊特牲詔祝于室注謂朝事時也朝事延尸于户西南面布主席東面取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神于室又出以隋于主主人親制其肝所謂制祭也疏天子諸侯朝事之時坐尸于堂祝乃取牲膟膋燎于爐炭入告神于室又出墮于主當此時主乃親洗肝于鬱鬯而燔之以制于主前今云詔祝于室是燎于爐炭入告神于室也云入以詔神于室又出以墮于主前者墮祭也謂分减肝膋以祭主前也云主人親制其肝所謂制祭也者制割也謂割其肝而不相離案禮器云君親制祭夫人薦盎此云詔祝于室下云用牲于庭故知制祭當此節也禮器君親制祭注親制祭謂朝事進血膋時所制者制肝洗于鬱鬯以祭于室及主也疏殺牲巳畢進血腥之時君斷制牲肝洗于鬱鬯入以祭神于室知親制祭是朝事進血膋時者案郊特牲云取膟膋燔燎升首報陽也又祭義取膟膋之後又爓祭祭腥則膟膋所用在腥爓之前故知血膋是朝事時也方氏慤曰言制祭亦割之矣以方殺而多少未定故曰制制祭薦盎朝事之時也朝事以神事之故制祭以腥而薦以齊葢腥與齊神道也祭統君執鸞刀羞嚌注嚌嚌肺祭肺之屬也君以鸞刀割制之疏嚌肝肺也嚌有二時一是朝踐之時取肝以膋貫之入室燎于爐炭出薦之主前二謂饋熟之時君以鸞刀割制所羞嚌肺横切之使不絶亦奠于爼上尸並嚌之故云羞嚌一云羞進也謂君用鸞刀制此嚌肉以進之案少牢特牲薦熟之時爼有祭肺及舉肺切之舉肺離而不提心二肺皆祭之故鄭云嚌肺祭肺之屬也郊特牲血祭盛氣也祭肺肝心貴氣主也注周祭肺殷祭肝夏祭心氣主氣之所舍也並疏血祭是堂上制祭後又薦血腥時也肺肝心三者爲氣之宅故祭時先用之是貴氣之主也血是氣之所舍故云盛氣三者非即氣故云氣之主也方氏慤曰經血腥爓祭用氣也然腥爓之氣不若血之幽氣聚于幽而散于明聚則盛矣故曰血祭盛氣也五行之氣在人則爲五臟之氣各有所主而牲亦象之肺則金氣之所主也肝心木火氣之所主也經獨言三者則以三代之所用者言之故也蕙田案疏亦以祭肺肝心爲制祭薦血腥葢文義之自然雖欲强從注家之說而不覺自岐其指矣惟謂制祭後又薦血腥未安詳見後條周禮春官太祝隋釁注隋釁謂薦血也凡血祭曰釁云疏鄭云隋釁謂薦血也者賈氏釁釁宗廟馬氏云血以塗鐘鼓鄭不從而以爲薦血祭祀者下文云既祭令徹則此上下皆是祭祀之事何得于中輒有釁廟塗鼓直稱釁何得兼言隋故爲祭祀薦血解之蕙田案隋釁注疏謂宗廟薦血極是禮器君親制祭注疏謂朝事進血膋時制肝于鬱鬯以祭于室及主郊特牲詔祝於室注疏謂取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神於室又出以隋于主前隋祭也謂分减肝膋以祭主前祭統君執鸞刀羞嚌疏鸞刀羞嚌嚌肝肺也嚌有二時一是朝踐之時取肝以膋貫之入室燎于爐炭出薦之主前祭義羞肺肝首心郊特牲血祭也祭肺肝心疏謂血祭是堂上制祭後又薦血腥肺肝心三者並爲氣之宅故祭時先用之據此則朝踐時燔燎制祭羞肺肝首心即是血祭以君親制之謂之制祭取肺肝與膋薦之謂之血祭也經謂血腥爓祭此正血祭無疑周禮太祝所掌葢天子之事耳先儒以祭肺肝心專謂饋食時者誤不知肺肝首心有生有孰朝踐薦生而兼血饋食薦熟而在爼疏義極明不可混也惟疏謂血祭是制祭後又薦血腥分制祭血祭爲二似未安詳考經文制祭之外更無血祭一節事也辨賈疏祭宗廟不薦血周禮春官司尊􅃔注朝踐謂薦血腥賈疏禮器云郊血大饗腥則享祭宗廟無血此云薦血腥者謂肉非謂如别薦血也蕙田案賈氏此疏與太祝隋釁條互異禮器郊血孔疏凡郊與大饗三獻之屬正祭之時皆有血有腥有爓有孰此云郊血是郊有血也郊特牲云血毛告幽全是宗廟有血也宗伯云以血祭祭社稷五祀是三獻有血也楚語云禘郊則有全烝是祭天有孰也有孰則有腥可知也宗伯云以肆祼獻享先王是大享有腥有孰也此云三獻爓宗伯云以血祭社稷五祀既有血有爓明有腥有孰可知也皇氏曰郊天與大享三獻並有血腥爓孰今所以各言者此據設之先後郊則先設血後設腥與爓孰雖以郊爲主其祭天皆然也大享之時血與腥同時俱薦當朝事迎尸于户外薦血腥也雖以大享爲主其宗廟之祭皆然也蕙田案信南山詩取其血膋禮運薦其血毛禮器血毛詔于室郊特牲毛血告幽全之物也血祭盛氣也皆宗廟薦血之據賈氏祭宗廟無血甚悞禮器君親制祭夫人薦盎疏君斷制割牲洗于鬱鬯入以祭神于室於此之時夫人薦盎齊以獻之蕙田案禮運云醴醆以獻疏謂朝踐之時用醴此盎齊即醴奠盎即醴醆以獻也祭義君牽牲夫人奠盎至此乃薦之奠而後薦正是一事葢制祭所以求神求神則必有薦獻也祭統宗婦執盎從夫人薦涗水注涗盎齊也盎齊涗酌也凡尊有明水固兼云水爾薦疏宗婦執盎從者謂同宗之婦執盎以從夫人夫人涗水者涗即盎齊由自濁用清酒以涗泲之涗水是明水宗婦執盎齊從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之者因盎齊有明水連言水耳盎齊涗酌也者周禮司尊􅃔文案彼注云盎齊差清和以清酒泲之謂之涗酌鄭引此者解經夫人薦涗是盎齊也云凡尊有明水因兼云水爾者以經夫人薦涗祗是薦盎不薦明水今經薦涗之下别更言水此謂明水也以盎齊加明水故記者因盎而連言水耳知盎齊加明水者郊特牲云祭齊加明水是也方氏慤曰齊有五而宗婦止執盎者按君牽牲時也祭義夫人奠盎與此合薦涗水郊特牲所謂明水涗齊貴新是也酌齊則必用涗矣祭義不言略也周禮春官司尊􅃔盎齊涗酌注禮運曰元酒在室醴醆在户粢醍在堂澄酒在下以五齊次之則醆酒盎齊也郊特牲曰醆酒涗于清盎齊差清和以清酒泲之而巳疏醆酒盎齊也者盎次醴禮運醆次醴以醆當盎處即一物明醆酒盎齊也盎齊云酒則酒齊亦通云醆酒涗于清者醆酒即盎齊盎齊差清亦不言縮則不用茅涗謂新亦謂泲之也彼記人所取此盎齊涗酌解之以盎祭欲泲之時則以清酒和而泲涗使可酌故直云涗于清也禮記郊特牲醆酒涗于清注醆酒盎齊盎齊差清和之以清酒泲之而巳泲盎齊必和以清酒者皆久味相得涗疏醆酒盎齊者周禮云盎齊涗酌此云醆酒涗于清文是同又周禮醴齊之後有盎齊禮運醴後有醆故知醆謂盎齊也禮運醴醆以獻疏醴醆以獻者朝踐之時用醴元酒以祭疏元酒以祭者謂朝踐之時設此元酒於五齊之上以致祭鬼神此重古設之其實不用以祭也右燔燎􅌊蕭制祭奠盎周禮天官内饔凡宗廟之祭祀掌割亨之事疏内饔不掌外神故云宗廟之祭祀言凡者謂四時及祫禘并月祭等皆在其中掌其割亨之事上王后言煎和此不言煎和者鬼神尚質不貴褻味故不言煎和夏官司士帥其屬而割牲羞俎豆注割牲制體也若疏割牲制體也者據祭祀則禮運云腥其爼孰其殽體其犬豕牛羊之類詩小雅楚茨或剥或亨或肆或將傳肆陳將齊也或陳于互或齊其肉箋祭祀之禮各有其事有解剥其皮者有煮熟之者言疏行葦云肆筵設席肆是設之言故爲陳也將齊釋文郭璞曰謂分齊也地官牛人云凡祭祀共其牛牲之互注云互若今屠家縣肉架則肆謂既殺乃陳之于互上也就互上而齊之也或肆或將其事俱在或亨之前以二者事類相將故進或亨于上以配或剥耳禮運曰腥其爼熟其殽注云腥謂豚解而腥之熟謂體解而爓之豚解腥之是解剥其肉也蕙田案楚茨或剥或亨或肆或將毛鄭異義毛以肆爲陳于互將爲齊其肉此是殺牲當朝踐時事鄭以肆爲肆其骨體于爼將爲奉持而進之此是饋食時事朱子從鄭義今案楚茨所言禮儀節次頗分明絜爾牛羊下止當言殺牲至執㸑以下方是饋食時事此方言絜爾牛羊遽言饋食則竟遺却朝踐一節矣况云肆其骨體于爼與下爲爼孔碩又相􅃨則鄭義不如毛義之長周禮地官大司徒奉牛牲羞其肆注進所肆解骨體士䘮禮曰肆解去蹄疏云羞其肆者羞進也肆解也謂于爼上進所解牲體于神座前肆解體骨者爲七解體之故引士䘮禮曰肆解去蹄案士䘮禮曰特豕四鬄去蹄彼注云四解之殊肩髀彼言殊肩髀與此骨體一也但彼云四鬄此云肆解其字不同者鄭直以義讀之非彼正文此云解當彼鬄也後鄭必不從先鄭爲肆陳骨體爲二十一體者案禮運云腥其爼孰其殽彼注云腥其爼謂豚解而腥之也孰其殽謂體解而爓之祭祀之法先豚解後體解經云奉牛牲謂初牽入時即言羞其肆明先豚解又案國語禘郊之事則有全烝明知不得先有體解若然則禘郊之事先全烝始後解體也若宗廟之祭則無全烝先豚解次體解禮運所云者是也夏官小子掌祭祀羞羊肆注元謂肆讀爲鬄羊鬄者所謂豚解也疏後鄭讀肆從鬄羊鬄者所謂豚解也士虞禮云主人不親豚解豚解之法則士䘮禮特牲四鬄去蹄謂四叚解之殊肩髀如解豚故名豚解若然大夫士祭自饋孰始故云祭即體解爲二十一體䘮亊畧則有豚解其天子諸侯之祭有腥有爓有孰故初朝踐有豚解而腥之饋獻則有體解而爓之酳尸乃有孰與大夫士不同也禮記郊特牲君再拜稽首肉􅃝親割敬之至也敬之至也服也拜服也稽首服之甚也肉􅃝服之盡也注割解牲體疏再拜稽首肉􅃝是恭敬之至極乃是服順于親也方氏慤曰􅃝則肉露故謂之肉􅃝所以致親割之勞割謂割牲以人君之尊而服勞如此所以爲敬之至服屈服于神故曰敬之至也服也詩言勿剪勿拜而以拜爲屈故曰拜服也拜下兩手而巳稽首則首至地焉故曰稽首服之甚也首雖至地又未若肉􅃝之勞焉故曰肉􅃝服之盡也周禮夏官羊人祭祀割羊牲登其首注登升也升首報陽也升首于室疏知升首于室者見郊特牲云用牲于處升首于室注云制祭之後升牲首于北墉下云報陽者首爲陽對足爲陰祭祀之時三牲之首俱升此特言羊者以其羊人所升不升餘牲故言羊也禮記郊特牲升首于室注升首于室謂制祭之後升牲首于北墉下尊首尚氣也方氏慤曰升首于室即升首報陽若羊人祭祀割牲登其首升首報陽也方氏慤曰首者陽之體升者陽之事皆陽類也首也者直也注直者訓所以升首祭也直或爲犆疏直正也言首爲一體之正方氏慤曰首謂升首也首犆而直支偶而曲故曰首也者直也以其直故得特達以升於室焉蕙田案殺牲取血膋而詔祝于室隋于主前夫人奠盎則血祭巳畢至是將舉腥祭乃割牲而豚解之正所謂或肆或將者也首牲體之元爲腥肉之尊者故先升之祭血自詔室而及堂祭腥在堂而升首于室于彼于此皆所以求神也故合割牲升首爲一條以爲薦腥薦爓之漸辨陸佃割牲爲饋食時事郊特牲肉􅃝親割陸佃曰凡祭稽首不必肉􅃝肉􅃝不必稽首兼之者此與葢朝踐以前以素為貴父子之事多饋食以後以文爲貴君臣之事多蕙田案肉􅃝割牲亦朝踐之事說者以爲饋食以後非也山陰陸氏於祭義教民相愛節訓朝踐尊而饋食親于此處又云朝踐以前父子之事饋食以後君臣之事義不相顧縁强說割牲爲饋食事故也辨陸佃升首獨羊之說祭義鸞刀以刲取膟膋陸佃曰郊特牲曰取膟膋燔燎升首報陽也與此取膟膋不同彼羊也此牛也知然者以羊人云祭祀割牲登其首知之也蕙田案升首于室三牲並升不獨羊也周禮羊人登其首賈疏謂祭祀時三牲之首俱升特言羊者以其羊人所升不升餘牲故言羊是也陸氏分郊特牲取膟膋爲羊祭義取膟膋爲牛甚悞右割牲升首禮記禮運腥其俎注腥其爼謂豚解而腥之爼疏腥其且者謂朝踐時既殺牲以盛肉進于尸前也案士䘮禮小歛之奠載牲體兩髀兩肩兩胉并脊凡七體也士虞禮主人不視豚解注云豚解解前後脛脊脇而已是豚解七體也案特牲少牢以薦孰爲始之時皆體解無豚解以無朝踐薦腥故也其天子諸侯既有朝踐薦腥故知腥其爼爲豚解禮器大饗腥疏大饗之時血與腥同時俱薦當朝事迎尸于户外薦血腥也雖以大饗爲主其宗廟之祭皆然也蕙田案二條薦腥禮運孰其殽注孰其殽謂體解而爓之少疏孰其殽爲體解而爓之體解則特牲牢所升于爼以進神者是也案特牲九體肩一臂二臑三肫四胳五正脊六横脊七長脅八短脅九少牢則十一體加以脡脊代脅爲十一體也是分豚爲體解此孰其殽謂體解訖以湯爓之不全孰次于腥而薦之堂故祭義曰爓祭祭腥而退是也蕙田案此條薦爓祭義爓祭祭腥而退注爓祭祭腥祭爓肉腥肉也湯肉曰爓疏薦膟膋之後以爼載爓肉腥肉而以祭祭卒而退是恭敬之至極也此腥肉即禮運腥其爼也爓肉即禮運孰其殽也此先云爓便文耳非先后之次云湯肉爲爓者以鬼神異于生雖曰孰殽但湯肉而已若其他小祀則煮肉合孰故郊特牲云一獻孰是爓與孰又别也方性夫曰爓則向乎孰矣腥則全乎生而已郊特牲腥肆爓腍豈知神之所饗也主人自盡其敬而已矣疏主祭或進腥體或薦解剔或進湯沈或薦煮熟陳氏禮書血腥爓熟禮記曰有虞氏之祭也尚用氣血腥爓用氣也商人臭味未成滌蕩其聲周人尚臭則自氣至於臭其禮浸文矣又曰郊血大饗腥三獻爓一獻熟則自血至於熟其誠浸殺矣葢宗廟之祭始則以神事焉故以腥終則以人養焉故以熟則坐尸於堂血毛詔於室乃腥其爼熟其殽進於尸主之前以行朝踐焉鄭康成謂腥者豚觧而腥之以法於上古熟者體解而爓之以法於中古是也沈氏括曰一說謂腥爓以鬼道接之饋食以人道接之致疑也一或謂鬼神嗜腥爓此雖出于異說聖人知鬼神之情狀也或有此理未可致詰方氏慤曰由爓而上則尚氣而已至于孰則又尚味焉故郊特牲曰至敬不饗味而貴氣臭也辨賈疏爓祭為饋食時春官小子賈疏天子諸侯之祭有腥冇爓有孰故初朝踐有豚解而腥之饋食則有體解而爓之酳尸乃有孰與大夫士不同也郊特牲孔疏血謂祭初以血詔神于室腥謂朝踐薦腥肉于堂爓謂沈肉于湯次腥亦薦于堂祭義孔疏言薦膟膋之後以爼載爓肉腥肉而祭並當朝踐之節蕙田案朝踐在堂以神道事尸故薦血薦腥薦爓皆尚氣之事饋食在室以人道事尸故薦孰薦黍稷皆尚味之事郊特牲以爓祭爲用氣孔疏以爲次于腥而薦之堂固在朝踐時非饋食時也右祭腥祭爓周禮春官司尊彛春祠夏禴其朝踐用兩獻尊皆有罍秋嘗冬烝其朝獻用兩著尊皆有罍注朝踐謂薦血腥酌醴始行祭祀既又酌獻禮記禮器廟堂之上罍尊在阼犧尊在西君在阼夫人在房君西酌犧象夫人東酌罍尊疏罍尊在阼故君于阼階西向酌犠尊夫人于西房之前東嚮酌罍尊周禮天官大宰享先王贊玉爵注宗廟獻用玉爵明疏享先王有玉爵按堂位獻用玉琖謂王朝踐饋獻酳尸時内宰后獻則贊注獻謂王薦腥薦孰后亦從後獻也獻疏獻謂朝踐饋獻后以玉爵亞王而尸内宰贊后春官外宗贊王后獻注獻酒于尸是疏朝踐饋獻及酳尸以食後亦獻獻中可以兼之禮記禮運孔疏迎牲而入至於庭故禮器云納牲詔于庭王親執鸞刀啟其毛而祝以血毛告于室故禮器血毛詔于室凡牲則廟各别牢故公羊傳云周公白牡魯公騂犅案逸禮云毁廟之主昭共一牢穆共一牢於是行朝踐之事尸出于室太祖之尸坐于户西南面其主在右昭在東穆在西相對坐主各在其右故鄭注祭統云天子諸侯之祭朝事延尸於户外是以有北面事尸之禮祝乃取牲膟膋燎于爐炭入以詔神于室又出以薦于主前郊特牲云詔祝于室坐尸於堂是也王乃洗肝于鬱鬯而燔之以制于主前所謂制祭次乃升牲首于室中置于北墉下后薦朝事之豆籩乃薦腥于尸主之前謂之朝踐即此禮運薦其血毛腥其爼是也王乃以玉爵酌著尊泛齊以獻尸三獻也后又以玉爵酌著尊醴齊以亞獻四獻也通典王乃􅃝而迎牲于門牲入門則奏昭夏王親牽牲公卿大夫執幣以從入而告于庭云博碩肥腯王乃麗牲於碑親執鸞刀啟其毛血以授于祝祝入室告幽全之義遂乃殺牲始行朝踐之事凡牲廟用一牢朝踐之時尸出于室坐于户西南面主在西東面時尸主之前薦以籩豆脯醢而已乃取牲膟膋燎于爐炭入以詔神于室于時王親洗肝於鬱鬯而燔之以隋于主主人親制其肝所謂制祭也次乃升牲首于室中北墉下尊首尚氣之義也時又薦腥于尸主之前謂之朝踐於時王以玉爵酌獻尊中醴齊以獻尸此三獻也后于是薦朝事之籩時堂上以夾鐘之調歌堂下以無射之調作大武之樂后于是亦以玉爵酌獻尊醴齊以獻尸此四獻也時堂下之樂亦作也於時王自阼階而西酌獻后從西階東酌獻楊氏復曰周禮内宰疏云堂上朝踐之節王出迎牲時祝延尸于户外之西南面后薦八豆籩王牽牲以入以血毛告訖以此腥其爼薦于神前王以玉爵酌醴齊以獻尸后亦以玉爵酌醴齊以獻尸二疏大畧皆同但后薦豆籩有先後之異案籩人疏云祝延尸于户外后薦此八籩則當以内宰及籩人疏爲正蕙田案三條互有得失尸主南面孔疏是通典誤薦豆籩在制祭前通典是孔疏誤右朝踐王三獻后四獻周禮春官太師乃奏無射歌夾鐘舞大武以享先祖易氏祓曰武功也言武王偃武而卒其伐功故大武之樂起于無射之戍應以夾鐘之卯以享先祖葢主乎后稷而先公與焉謂王業之大實基于此亦其類也劉氏彛曰周之先祖惟后稷詩之雝言禘太祖生民言尊祖而謂后稷生于姜嫄則凡言祖者皆后稷鄭乃以先祖爲先王先公葢先公自公劉而下先王自王季而下非始祖矣下管播樂器令奏鼓朄疏凡樂歌者在上匏竹在下故云下管播樂器禮記祭統大嘗禘下而管象朱干玉戚以舞大武入佾以舞大夏此天子之樂也明堂位下管象朱干玉戚冕而舞大武皮弁素積禓而舞大夏陸氏佃曰宗廟之禮升歌清廟下管象舞繼之夏籥序興是也周頌詩序有瞽始作樂而合乎祖也注合者大合諸樂而奏之疏謂合諸樂器一時奏之經所云鞉磬柷圉簫管之屬是也不合異代之樂禮記禮器廟堂之下縣鼓在西應鼓在東禮交動乎上樂交應乎下和之至也注言交乃和人疏禮交動乎上者謂君與夫酌獻之禮交相動于堂上也樂交應乎下者謂縣鼓應鼓相應在於堂下和之至也者謂堂上下禮樂交相應㑹和諧之至極也蕙田案祼之後當作樂以下神故升歌清廟堂上之樂作薦血薦腥薦爓所以享神故奏無射歌夾鐘舞大武堂下之樂作詩序作樂而合乎祖禮器樂交動乎下是也書下管鼗鼓合止柷敔亦即此意也是爲樂之第二節右下管舞大武詩小雅楚茨祝祭于祊祀事孔明傳祊門内也所箋孝子不知神之在故使祝博求之平生門内之旁待賓客之處祝疏釋宫云閍謂之門李廵曰閍廟門名孫炎曰詩云祭于祊祊謂廟門也彼直言門知門内者以正祭之禮不宜出廟門也而郊特牲云直祭祝于主注云直正也謂祭熟時祭以熟爲正又曰索祭祝于祊注云廟門外曰祊又注祊之禮宜于廟門外之西室于此不同者以彼祊對正祭是明日之名又彼記文稱祊之于東方爲火明在西方與繹俱在門外故禮器曰爲祊于外祭統曰而出于祊對設祭于室爲正是亦明日之繹故皆在門外與此不同以廟門謂之祊知内外皆有祊稱也祝祭于祊者以孝子不知神之所在故使祝博求之于廟門内之旁待賓客之處也毎處求之是祀禮于是甚明也明此祊廟門之名其内得有待賓客之處者聘禮公食大夫皆行事干廟其待之迎于大門之内則天子之禮焉其迎諸侯之臣或于廟門内也繹祭之祊在廟門外之西此正祭之祊或在廟門内之西天子迎賓在門東此祭當在門西大率繫之門内爲待賓客之處耳朱子集傳祊廟門内也孝子不知神之所在故使祝博求之于門内待賓客之處也何氏楷曰祊祭在廟門之内與他祭不同其字從示從方有索求諸四方之義舊說謂祊有二種一是正祭之時既設祭于廟又求神于祊此詩所云是也一是祭之明日繹祭之時行禮于祊若禮器所云是也又謂正祭之祊在廟門内之西繹祭之祊在廟門外之西今案爾雅祊作閍云閍謂之門說文祊一作􅤶云門内祭先祖所以徬徨是則祊祭自在門内原無二祊禮器所謂設祭于堂爲祊乎外葢對堂而言則門爲外非謂祊在門外也家語衛莊公改舊制變宗廟髙子睪問于孔子曰周禮繹祭于祊祊在廟門之西今衛君更之如之何孔子曰繹之于庫門内祊之于東方失之矣是可見繹祭當在祊祊自當在廟門内之西今衛君既改祊之所于東而行繹禮又不于祊乃于庫門之内皆所謂失禮也然繹之所以必于祊者以繹爲明日之又祭葢正祭事畢則神可以歸矣孝孫孝子猶未忍其遽歸也故于明日又設繹祭而于門以求之也祝祭于祊爲行禮之始畧如迎神之類雖其禮不傳然愚以祭統之文知之祭統稱祭有十倫首言鋪筵設同几爲依神也詔祝于室而出于祊此交神明之道也是則祭祊爲行禮之始之明據也輔廣云凡祀祼鬯則求諸陰焫蕭則求諸陽索祭祝于祊則求諸陰陽之間葢魂無不之神無不在求之之備如此葢謂祭祊以前尚有灌地迎牲告幽全升臭等事其祀禮甚明著也不詳悉言之者與信南山篇互見故畧之也何以知諸禮在祭祊之前嘗參繹郊特牲禮器之言祊者而得之郊特牲曰詔祝于室坐尸于堂用牲于庭升首于室直祭祝于主索祭祝于祊不知神之所在于彼乎于此乎或諸逺人乎祭于祊尚曰求諸逺者與又云祊之爲言倞也首也者直也而禮器則云納牲詔于庭血毛詔于室羮定詔于堂三詔皆不同位葢道求而未之得也設祭于堂爲祊乎外故曰于彼乎于此乎二禮所記畧同今案信南山所言祭以騂牡即納牲詔于庭及用牲于庭也啟毛取血即毛血詔于室也膟膋燔燎先儒皆以爲詔祝于室之事在取血膋之後即朝踐時也室以内有主在焉因而升牲首于室郊特牲所謂直祭祝于主而自解之曰首也者直也是可見升首之爲直祭也此時尸坐于堂亦設有腥爓之祭焉所謂設祭于堂也猶恐神之或不在求而未之得也因于祊以求之郊特牲于直祭祝于主之下即繼之曰索祭祝于祊禮器于設祭于堂之下即繼之曰爲祊乎外互相備也皆曰于彼乎于此乎葢汲汲乎求神也蕙田案郊特牲鄭注朝事延尸于户西南面布主席東面至薦孰乃更延主于室之奥尸來升席自北方坐于主北焉據此朝踐時尸在堂主亦在堂饋食時尸在室主亦在室今升首在朝踐時不得云有主在室何氏所云恐未的確禮記郊特牲索祭祝于祊不知神之所在于彼乎于此乎或諸逺人乎祭于祊尚曰求諸逺者與注謂之祊者以于繹祭名也于彼于此言室與堂與尚庶幾也祊疏索祭祝于祊者廣博求神非但在廟又爲求祭于也祊有二種一是正祭之時既設祭于廟又求神于廟門内詩楚茨云祝祭于祊注云門内平生待賓客之處與祭同日二是明日繹祭之時設饌于廟門外西室亦謂之祊即上文云祊之于東方是也今此索祭是正祭日之祊禮器云爲祊乎外以其稱外故注云明日繹祭此經不云外又下云肵之爲言敬也相饗之也嘏大也毛血告幽全之物皆據正祭之日明此祊亦正祭日也不知神之所在于彼乎于此乎此解正祭在廟之時或設饌于室或設饌在堂不知神所在之處爲于彼室乎爲于此堂乎故兩處設饌也或諸逺人乎此解索祭爲祊之時其靈或逺離于人不在廟乎祭于祊者庶幾求于逺者焉言于逺處求神也云謂之祊以于繹祭名也者以祊是廟門明日繹祭稱祊雖今日之正祭假以明日繹祭祊名同稱之曰祊也陛氏佃曰索祭祝于祊謂尸已出祝于祊而已是之謂索祭蕙田案楚茨詩禮節皆有次叙其言祝祭于祊在前鼓鐘送尸在後山陰以爲祝于祊謂尸已出非也吕氏大臨曰不知神之所在故尚氣尚聲尚臭以求諸天地陰陽之間不知神之所在故于庭于室于堂于祊以求之不知神之所依故有主有儿有尸有幣以主之不知神之所饗故肆爓腥孰三牲魚腊水草備物以祀之矣祊之爲言倞也注倞猶索也方氏慤曰索祭祀于祊于正祭之後而又索焉非强有力者不能如此故曰祊之爲言倞也倞強也蕙田案此節歴言于室于堂于庭于主于祊以明求諸逺近之義此正祭當日之事即楚茨祝祭于祊之祊與祊之于東方指明日繹祭者有别鄭引繹祭爲說頗混疏訓正祭其說爲的禮器爲祊于外故曰于彼乎于此乎方氏慤曰設祭于堂言正祭之時也爲祊乎外言索祭之時也言堂以見外之爲門言外以見堂之爲内祭言其事也祊言其所也謂之祊者祝祭求神以此爲所在之方故也且神無方也祊特人爲之耳故言爲祭必有所陳焉故言設孝子不知神之所在或于彼或于此而祭之非一日求之非一處故曰于彼乎于此乎祭統詔祝於室而出於祊此交神明之道也注出于祊謂索祭也特疏云出于祊謂索祭也者案郊牲索祭祝于祊故云索祭也爾雅釋宫閍謂之門注詩曰祝祭于祊􅤶陸氏音義閍補耕反說文作云或作祊門内祭先祖所徬徨也門疏李廵曰閍廟門也案祊本廟門之名設祭于廟因名其祭亦名祊凡祊有二種一是正祭之時既設于廟又求神于廟門之内郊特牲云索祭祝于祊及詩云祝祭于祊注云祊平生門内之旁待賓客之處與祭同口也二是明口繹祭之時設饌于廟門外西室亦謂之祊即郊特牲注云祊之禮宜于廟門外之西室及禮器云爲祊乎外是也然則廟門内外皆有祊稱蕙田案正祭有祊其文見于經傳者非一而其禮不傳今通攷經文約其節次總當在朝踐之節郊特牲云索祭祝于祊祊稱索祭乃是求神之祭求神乃朝踐之事孝子不知神之所在故祼鬯以求諸陰燔燎以求諸陽祊祭以求諸陰陽之間斯時事尸于堂薦血薦腥薦爓無有飲食之事固是尚氣且恐神之尚未凴依也故曰于彼乎于此乎至饋食則事尸于室以人道飲食之曰神嗜飲食曰神具醉止則尸實神所凴依而無恍惚求索之語矣何元子曰朝踐以前意在求神薦熟以後意在饗尸據此則索祭在朝踐時無疑矣楚茨絜爾牛羊節是朝踐事執㸑以下是饋食事而祝祭于祊在殺牲之下執㸑之前此一證也祭器設祭于堂正朝踐之事而即繼之曰爲祊于外又一證也祭統詔祝于室與郊特牲詔祝于室同文而彼則繼之曰坐尸于堂此則繼之曰而出于祊明一時事又一證也但朝踐儀節已繁而又有祊祭一節其事必簡且經傳凡言祊處皆連祝爲說則此祭或但有祝告未必陳牲何氏以爲牲用求牛恐未的朱子經傳通解馬氏文獻通攷俱以祝祭于祊列于既徹之後似正祭畢而後行祊祭者恐非其序矣今列之朝踐之末觀承案祊祭有二分析最清其以正祭之祊屬朝踐之時尤爲位置妥帖一洗從來之蒙混行禮者乃可案本子做去矣右祭祊朝踐畢五禮通考卷八十七
