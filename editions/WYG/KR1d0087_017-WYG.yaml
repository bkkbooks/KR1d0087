body:
  text: 五禮通考卷七刑部尚書秦蕙田撰吉禮七圜丘祀天後漢書世祖本紀建武二年立郊兆于城南始正火德色尚赤祭祀志建武二年正月初制郊兆於雒陽城南七里依鄗采元始中故事爲圎壇八陛中又爲重壇天地位其上皆南向西上其外壇上爲五帝位青帝位在甲寅之地赤帝位在丙巳之地黄帝位在丁未之地白帝位在庚申之地黑帝位在壬亥之地其外爲壝重營皆紫以象紫宮有四通道以爲門日月在中營内南道日在東月在西北斗在北道之西皆別位不在羣神列中八陛陛五十八醊合四百六十四醊五帝陛郭帝七十二醊合三百六十醊中營四門門五十四神合二百一十六神外營四門門百八神合四百三十二神皆背營内鄉中營四門門封神四外營四門門封神四合三十二神凡千五百一十四神營即壝也封封土築也背中營神五星也及中宮宿五官神及五嶽之屬也背外營神二十八宿外宮星雷公先農風伯雨師四海四瀆名山大川之屬也醊竹芮切祭酹也注黄圖載元始儀上帝壇圓八觚徑五丈髙九尺茅營去壇十步竹宮徑三百步土營徑五百步神靈壇各於其方面三丈去茅營二十步廣坐十五步合祀神靈以璧琮用辟神道四通廣各三十步竹宮内道廣三丈有闕各九十一步壇方三丈拜位壇亦如之爲周道郊營之外廣九步營六甘泉北辰於南門之外日月海東門之外河北門之外岱宗西門之外爲周道前望之外廣九步列望遂乃近前望道外徑六十二步壇方二丈五尺髙三尺五寸爲周道列望之外徑九步卿望亞列望外徑四十步壇廣三丈髙二尺爲周道卿望之外徑九步大夫望亞卿望道外徑二十步壇廣一丈五尺髙一尺五寸爲周道大夫望之外徑九步士望亞大夫望道外徑十五步壇廣一丈髙一尺爲周道士望之外徑九步庻望亞士望道外徑九步壇廣五尺髙五寸爲周道庻望之外徑九步凡天宗上帝宮壇營徑三里周九里營三重通八方常以歲之孟春正月上辛若丁親郊祭天南郊以地配望秩山川徧于羣神天地位皆南鄉同席地差在東共牢而食太祖髙皇帝髙后配於壇上西鄉后在北亦同席共牢而食日冬至使有司奉祭天神於南郊髙皇帝配而望羣陽夏至使有司奉祭地祗於北郊髙皇后配而望羣隂天地用牲二燔燎瘞埋用牲一先祖先妣用牲一天以牲左地以牲右皆用黍稷及樂蕙田案此東漢郊壇從祀之位魏以降從祀星辰漸以繁多矣東觀漢紀上都洛陽制兆於南城七里北郊四里行夏之時時以平旦服色犧牲尚黑名火徳之運常服徽熾尚赤四時隨色季夏黄色大學衍義補丘氏濬曰西漢所謂郊祀天地者乃是祀五畤及甘泉泰一汾隂之類皆出于方士祈福之說而非古人報本反始之意髙惠不親祠文帝一再行武宣以求仙成帝以祈嗣三君者親郊頗多而其他則領之祠官修故事而已古人所謂郊天配祖之意葢漠如也光武置郊丘于雒陽以髙帝配祀始稍復古人祀天之制後漢書祭祀志建武七年五月詔三公曰漢當郊堯其與卿大夫博士議時侍御史杜林上疏以爲漢起不因緣堯與殷周異宜而舊制以髙帝配方軍師在外且可如元年郊祀故事上從之杜林傳建武七年大議郊祀制多以爲周郊后稷漢當祀堯詔復下公卿議林獨以爲周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循定從林議東觀漢紀杜林疏臣聞營河洛以爲民刻肌膚以爲刑封疆畫界以建諸侯井田什一以供民用三代之所同及至漢興因時宜趨世務省繁苛取實事不苟貪髙冗之論是以去土中之京師就關内之逺都除肉刑之重律用髠鉗之輕法郡縣不置世禄之家農人三十而取一政卑易行禮簡易從民無智愚思仰漢徳樂承漢祀基業特起不因緣堯堯逺于漢民不曉信言提其耳終不恱諭后稷近于周民户知之世據以興基由其祚本與漢異郊祀髙帝誠從民望得萬國之歡心天下福應莫大乎此民奉種祀且猶世主不失先俗羣臣僉薦鯀考績不成九載乃殛宗廟至重衆心難達不可卒改詩云不愆不忘率由舊章明當尊用祖宗之故文章也宜如舊制以解天下之惑合于易之所謂先天而天不違後天而奉天時義方軍師在外祭可且如元年郊祭故事後漢書祭祀志隴蜀平後乃增廣郊祀髙帝配食位在中壇上西靣北上天地髙帝黄帝各用犢一頭青帝赤帝共用犢一頭白帝黑帝共用犢一頭凡用犢六頭日月北斗共用牛一頭四營羣神共用牛四頭凡用牛五頭凡樂奏青陽朱明西皓𤣥㝠及雲翹育命舞中營四門門用席十八枚外營四門門用席三十六枚凡用席二百一十六枚皆莞簟率一席三神日月北斗無陛郭醊既送神燌爼實於壇南已地蕙田案建武中興制郊兆于洛陽城南其地得矣乃内外壇壝門營從祀之神至一千五百一十四何其溷也然此猶曰西京故事也而天地共席帝后同牢則王莽凟亂不經之舉當撥邪反正之初倘稽考典章洗除穢惡後嗣知所遵循詎不美歟乃帝既不深考而在廷諸臣亦無有引伸匡衡之議而救正之者良由棄經信讖因陋蹈訛遂使陳陳沿襲洎迄後代竟以合祭為便安逸豫之身圖錮蔽執持牢不可破不特禮制就隳而人主敬天之意荒矣莽不足責東京創制之君臣能不任其咎耶有天下者當以經術爲重矣漢舊儀祭天紫壇幄幃髙皇帝配天居堂下西向紺帷帳紺席鈎命决曰自外至者無主不止自内出者無匹不行祭天養牛五歲至三千觔案記曰天地之牛角繭栗而此云五歲本志用犢是也鄭興傳帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不爲讖帝怒曰卿之不爲讖非之耶興惶恐曰臣于書有所未學而無所非也帝意乃解樊鯈傳永平元年拜長水校尉與公卿定郊祀禮儀以讖記正五經異說蔡邕傳初平二年六月地震董卓以問邕邕對曰地動者隂盛侵陽臣下踰制之所致也前春郊天公奉引車駕乗金華青葢爪畫兩轓逺近以爲非宜卓於是改乗皂葢車後漢書獻帝本紀建安元年正月癸酉郊祀上帝于安邑大赦天下改元建安七月丁丑車駕至洛陽郊祀上帝大赦天下禮儀志正月上丁祠南郊禮畢次北郊明堂髙廟世祖廟謂之五供凡齋天地七日大䘮惟天郊越紼而齋正月天郊夕牲晝漏未盡十八刻初納夜漏未盡八刻初納干寳周官注曰納亨納牲將告殺謂向祭之晨也進熟獻太祝送旋皆就燎位宰祝舉火燔柴火然天子再拜興有司告事畢蔡邕禮樂志漢樂四品一曰大予樂典郊廟上陵殿中諸食舉之樂郊樂易所謂先王以作樂崇徳殷薦之上帝周官若樂六變則天神皆降可得而禮也文獻通考馬氏曰西都所謂郊祀若雍五畤甘泉泰一皆出于方士祈福之說而非有古人報本之意唯武宣以求仙成帝以求嗣故三君親郊頗多而其清心無求者則領之祠官修故事而已世祖置郊丘於洛陽以髙祖配祀始稍復古人祀天之制但范史紀志不載親郊之歳月禮儀志云正月上丁祠南郊禮畢次北郊明堂髙廟世祖廟謂之五供豈每歲行之耶祭祀志言二年初制郊采元始中故事按元始之制嘗以歲孟春正月上辛若丁親郊祀天南郊以地配冬至則使有司祭天神於南郊以髙帝配夏至使有司祭地祗於北郊以髙后配然則天地之祭每歳親祠者一命有司祭者二豈歳以爲常故不復紀述乎蕙田案東漢依元始故事歲凡三祭合祀天地者一分祀天地者各一王莽所謂有合有別也當時雖行合祭而分祭之禮固未嘗廢後之主合祭者乃悍然以爲不必分祭是宗王莽而又失之矣右後漢郊禮蜀志先主傳章武二年十月詔丞相諸葛亮營南北郊於成都右蜀漢郊禮魏志文帝本紀黄初二年春正月郊祀天地明堂宋書禮志黄初二年正月郊祀天地明堂是時魏都洛京而神祗兆域明堂靈臺皆因漢舊事明帝太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝于明堂以配上帝是時二漢郊禋之制具存魏所損益可知也魏志明帝本紀景初元年冬十月乙卯營洛陽南委粟山爲圜丘十二月壬子冬至始祀詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀自甘泉后土雍宮五畤神祗兆位多不經見並以興廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏繫世出自有虞氏今祀圜丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考髙祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天于圜丘以有虞帝舜配文獻通考馬氏曰此以郊與圜丘爲二處用鄭𤣥之說其時康成所注二禮方行王子雍雖著論以攻之而人未宗其說然魏晉而後有天下者多起自匹夫其祖父未有可以配天之功徳非如虞夏四代之比而康成之所謂配天者以爲周祀天於圜丘以嚳配謂之禘祀五帝於郊以稷配謂之郊又祀五帝及五人帝於明堂以文王配謂之祖祀五神於明堂以武王配謂之宗此三祭者必皆有祖考可配而後可以舉事是以魏文帝之時有郊祀而未有祖配直至明帝時復逺取舜以配圜丘然後以武帝配郊以文帝配明堂葢拘於康成支離之說是以配天之祀必俟奕世之後又復上取之遙遙華胄以足之然後可以行禮耳蕙田案鄭氏所立天之名號非一然並無皇皇帝天皇皇后地之號魏氏用鄭𤣥之說爲二天二地而所立名字又不經若此異哉魏志蔣濟傳初侍中髙堂隆論郊祀事以魏爲舜後推舜配天濟以爲舜本姓嬀其後曰田非曹之先以追詰隆注濟立郊議稱曹騰碑文云曹氏族出自邾魏武作家傳自云曹叔振鐸之後故陳思王作武帝誄曰於穆武王胄稷允周魏非舜後而横祀非族降黜太祖不配正天皆為謬妄又難鄭𤣥注祭法云有虞以上尚徳自夏以下稍用其姓氏濟曰夫虯龍神於獺獺自祭其先不祭虯龍也麒麟白虎仁於豺豺自祭其先不祭麒虎也如𤣥之說有虞以上豺獺之不若耶蕙田案邾出陸終是爲曹姓曹叔振鐸則爲姬姓碑文家傳自相背謬况騰本常侍嵩爲養子曹瞞傳言夏侯氏子雖無明証要之本非曹姓又何足辨乎通典髙堂隆表云案古典可以武帝配天魚豢議昔后稷以功配天漢出自堯不以堯配天明不紹也且舜已越數代武皇肇創洪業宜以配天蕙田案通典言髙堂隆表與蔣濟傳不合不知何據豈武帝二字本作虞舜而刻本誤歟魚豢議亦不見正史豢作魏略恐是著撰私議非當官議禮之詞也宋書禮志自正始以後終魏代不復郊祀右魏郊禮宋書禮志孫權始都武昌及建業不立郊兆至末年太元元年十一月祭南郊其地今秣陵縣南十餘里郊中是也三國志吳主傳注江表傳曰羣臣以權未郊祀奏議曰頃者嘉瑞屢徵逺國慕義天意人事前後備集宜修郊祀以承天意權曰郊祀當於土中今非其所於何施此重奏曰普天之下莫非王土王者以天下為家昔周文武郊於酆鎬非必土中權曰武王伐紂即阼於鎬京而郊其所也文王未爲天子立郊於酆見何經典復奏曰伏見漢書郊祀志匡衡奏徙甘泉河東郊於酆權曰文王性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒意說非典籍正義不可用也志林曰吳主糾駁郊祀之奏追貶匡衡謂之俗儒凡在見者莫不慨然以為統盡物理逹于事宜至于稽之典籍乃更不通毛氏之說云堯見天因邰而生后稷故國之於邰命便事天故詩曰后稷肇祀庶無罪悔以迄于今言自后稷以來皆得祭天猶魯人郊祀也是以棫樸之作有積燎之薪文王郊酆經有明文匡衡豈俗而枉之哉文王雖未為天子然三分天下而有二伐崇戡黎祖伊奔告天既棄殷乃眷西顧泰伯三讓以有天下文王為王於義何疑然則匡衡之奏有所未盡按世宗立甘泉汾隂之祠皆出方士之言非據經典者也方士以甘泉汾隂黄帝祭天地之處故孝武因之遂立二畤漢治長安而甘泉在北謂就乾位而衡云武帝居甘泉祭于南宮此既誤矣祭汾隂在水之脽呼為澤中而衡云東之少陽失其本意此自吳事於傳無非恨無辨正之辭故矯之云蕙田案志林之言過矣后稷肇祀何必郊壇之祀薪之槱之何關燔燎之薪皆經無明文而强爲牽合者也且權果自比文王則猶漢之方伯何以告天即位既云歴數在躬則猶周之鎬京何以必擇土中其說本爲紕繆但山陽未崩而黄龍改號權之僭妄内懐不安郊祀不舉猶可謂一隙之明奈何反以相訾議乎宋書禮志何承天曰案權建號繼天而郊享有闕固非也末年雖一南郊而遂無北郊之禮環氏吳紀權思崇嚴父配天之義追上父堅尊號為吳始祖如此說則權末年所郊堅配天也權卒後三嗣主終吳世不郊祀則權不享配帝之禮矣右吳郊禮晉書武帝本紀泰始二年春二月丁丑郊祀宣皇帝以配天冬十一月并圜丘方丘于南北郊二至之祀合于二郊宋書禮志晉武帝泰始二年詔定郊祀羣臣議五帝即天也王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐從之二月丁丑郊祀宣皇帝以配天十一月有司又議奏古者丘郊不異宜并圜丘方澤於南北郊更修立壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月冬至帝親祠圜丘於南郊自後圜丘方澤不別立文獻通考按以圜丘即郊五帝同一天王肅之說武帝肅外孫也故祀禮從其說蕙田案王鄭說郊不同斷以王氏之說爲是泰始所行後世所可法也圖書集成案晉起居注曰武帝太始元年十二月太常諸葛緒上言知士祭酒劉喜等議帝王各尊其祖所自出大晉禮天郊當以宣皇帝配地郊宣皇后配明堂以景皇帝文皇帝配博士宣兆議禮王者郊天以其祖配周公以后稷配天于南郊以文王配五精上帝于明堂經典無配地文魏以先后配不合禮制周配祭不及武王禮制有斷今晉郊天宜以宣皇帝配明堂宜以文皇帝配有司奏大晉初建庶事未定且如魏詔郊天大事速議爲定晉書樂志泰始二年詔郊祀明堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章而已使傅𤣥爲之詞祀天地五郊夕牲歌天命有晉穆穆明明我其夙夜祇事上靈常于時假迄用其成於薦𤣥牡進夕其牲崇徳作樂神祗是聽祀天地五郊迎送神歌宣文烝哉日靖四方永言保之夙夜匪康光天之命上帝是皇嘉樂殷薦靈祚景祥神祗降假享福無疆饗天地五郊歌天祚有晉其命惟新受終于魏奄有黎民燕及皇天懐和百神丕顯遺烈之德之純享其𤣥牡式用肇禋神祗來格福禄是臻時邁其猶昊天子之祐享有晉兆庶戴之畏天之威敬授人時不顯不承於猶繹思皇極斯建庶績咸熙庶㡬夙夜惟晉之祺宣文惟后克配彼天撫寧四海保有康年於乎緝熙肆用靖民爰立典制爰修禮紀作民之極莫匪資始克昌厥後永言保之天郊饗神歌整泰壇禮皇神精氣感百靈賓蘊朱火燎芳薪紫烟逰冠青雲神之體靡象形曠無方幽以清神之來光景昭聽無聞視無兆神之至舉歆歆靈爽協動余心神之坐同歡娛澤雲翔化風舒嘉樂奏文中聲八音諧神是聽咸絜齊並芬芳烹牷牲享玉觴神恱饗歆禋祀祐大晉降繁祉作京邑廣四海保天年窮地紀宋書禮志太康三年正月帝親郊祀皇太子皇弟皇子悉侍祠非前典也十年十月詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望望非地則明堂上帝不得為天往者衆議除明堂上帝攷之禮文正經不通且詩序曰文武之功起於后稷故推以配天宣帝以神武剏業既已配天復以先帝配天於義亦不安其復明堂及南郊五帝坐摯虞議見明堂門摯虞傳虞為光祿勲太常卿時懐帝親郊自元康以來不親郊祀禮儀弛廢虞考正舊典法物燦然宋書禮志愍帝都長安未及立郊廟而敗晉書禮志元帝渡江太興二年始議立郊祀儀尚書令刁協國子祭酒杜夷議宜須旋都洛邑乃修之司徒荀組據漢獻帝都許即便立郊自宜於此修奉驃騎王導僕射荀崧太常華恒中書侍郎庾亮皆同組議事遂施行立南郊於已地其制度皆太常賀循所定多依漢及晉初之儀三月辛卯帝親郊祀享配之禮一依武帝始郊故事是時尚未立北壇地祗衆神共在天郊明帝本紀太寧三年秋七月詔曰郊祀天地帝王之重事自中興以來惟南郊未曾北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處禮志成帝咸和八年正月制天郊則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土泰一天一太微鈎陳北極雨師雷電司空風伯老人凡六十二神從祀康帝建元元年正月辛未南郊帝親奉顧和傳康帝即位將祀南北郊和議以爲車駕宜親行帝從之通典祝文稱嗣天子臣某晉書王彪之傳時當南郊簡文帝爲撫軍執政訪彪之應有赦不答曰中興以來郊祀往往有赦愚意常謂非宜何者黎庶不逹其意將謂郊祀必赦凶愚之輩復生心于僥倖矣遂從之蕙田案彪之論郊不宜赦誠為正當禮志安帝元興三年劉裕討桓𤣥走之己卯告義功於南郊是年帝蒙塵江陵未反其明年應郊朝議以為宜依周禮宗伯攝三公行事尚書左丞王納之獨曰郊天極尊非天子不祀無使皇輿不得親奉從之宋書禮志孝武帝太元十二年詔議郊祀祠部郎徐邈議圜丘郊祀經典無二宣皇帝嘗辨斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊爲安晉書禮志郊廟牲幣璧玉之色雖有成文秦世多以騮駒漢則但云犢未辨其色江左南北郊同用𤣥牲蕙田案晉書載記中于劉曜記其冒頓配天元海配上帝于石勒記其南郊有白氣自壇屬天于苻堅記其起明堂繕南北郊以其祖洪配天伯健配上帝于慕容超記其南郊將登壇有獸如馬狀類䑕色赤集于圜丘之側須臾大風天地藎昏行宮羽儀皆振裂于赫連勃勃記其刻石頌功德有云廣五郊之義尊七廟之制僭制紛然並登簡冊其尤甚者列傳末卷桓𤣥簒位詳録燎祭告天之文張昌畔逆亦存郊廟服色之制蓋史以紀事雖逆節猶宜備書若禮以行義非正典不容濫及今並從削黜其明堂宗廟社稷倣此右晉郊禮宋書武帝本紀永初二年春正月辛酉祠南郊大赦天下少帝紀永初三年五月癸亥即皇帝位秋九月丁未有司奏武皇帝配南郊武敬皇后配北郊明年正月己亥改元景平辛巳祀南郊禮志永初三年九月司空羡之尚書令亮等奏曰臣聞崇德明祀百王之令典憲章天人自昔之所同雖因革殊時質文異世所以本情篤教其揆一也伏惟髙祖武皇帝允協靈祗有命自天宏日靖之勤立蒸民之極帝遷明德光宅八表太和宣被元化遐通陛下以聖哲嗣徽道孚萬國祭禮久廢思光鴻烈享帝嚴親今實宜之髙祖武皇帝宜配天郊至於地祗之配雖禮無明文先代舊章每所因循魏晉故典足為前式謂武敬皇后宜配北郊蓋述懐以追孝躋聖敬於無窮對越兩儀允洽幽顯者也明年孟春有事於二郊請詳依舊典詔可文帝本紀元嘉二年正月丙寅車駕祠南郊大赦四年正月辛巳車駕親祠南郊六年正月辛丑車駕親祠南郊十二年正月辛未車駕親祠南郊十四年正月辛卯車駕親祠南郊大赦樂志元嘉二十二年南郊始設登歌詔御史中丞顔延之造歌詩天地郊夕牲歌夤威寶命嚴恭帝祖表海内岱系唐胄楚靈鑑濬文民屬叡武奄受敷錫宅中拓宇亘地稱皇罄天作主月竁來賓日際奉土開元首正禮交樂舉六典聨事九官列序有牷在滌有潔在俎以􅏪王衷以答神祜天地郊迎送神歌維聖饗帝維孝饗親皇乎備矣有事上春禮行宗祀敬達郊禋金枝中樹廣樂四陳陟配在京降徳在民奔精照夜髙燎煬晨隂明浮爍沈禜深淪告成大報受釐元神月御按節星驅扶輪遙興逺駕燿耀振振天地饗神歌營泰畤定天衷思心叡謀筮從建表蕝設郊宮田燭置權火通歴元旬律首吉飾紫壇坎列室中星兆六宗秩乾宇宴地區謐大孝昭祭禮供牲日展盛自躬具陳器備禮容形舞綴被歌鐘望帝閽聳神蹕靈之來辰光溢潔粢酌娛太一明煇夜華晢日祼既始獻又終煙薌鬯報清穹饗宋德胙王功休命永福履充文帝本紀二十六年正月辛巳車駕親祠南郊孝武帝本紀孝建元年正月己亥朔車駕親祠南郊改元大赦禮志孝建二年正月庚寅有司奏今月十五日南郊尋舊儀廟祠至尊親奉以太尉亞獻南郊親奉以太常亞獻又廟祠行事之始以酒灌地送神則不灌而郊初灌同之於廟送神又灌議儀不同於事有疑輒下禮官詳正太學博士王祀之議案周禮大宗伯以吉禮事鬼神祗禋祀昊天則今太常是也以郊天太常亞獻又周禮外宗云王后不與則贊宗伯鄭𤣥云后不與祭宗伯攝其事又說云君執圭瓚祼尸大宗伯執璋瓚亞獻中代以來后不廟祭則應依禮大宗伯攝亞獻也而今以太尉亞獻鄭注禮月令云三王有司馬無太尉太尉秦官也蓋世代彌久宗廟崇敬攝后事重故以上公亞獻又議履時之思情深於霜露室户之感有懐於容聲不知神之所在求之不以一處鄭注儀禮有司云天子諸侯祭於祊而繹繹又祭也今廟祠闕送神之祼將移祭於祊繹明在於留神未得而殺禮郊廟祭殊故灌送有異太常丞朱膺之議案周禮大宗伯使掌典禮以事神爲上職總祭祀而昊天為首今太常即宗伯也又袁崧漢百官志云郊祀之事太尉掌亞獻光禄掌三獻太常每祭祀先奏其禮儀及行事掌贊天子無掌獻事又賀循制太尉由東南道升壇明此官必預郊祭古禮雖由宗伯然世有因革上司亞獻漢儀所行愚謂郊祀禮重宜同宗廟且太常既掌贊天子事不容兼又尋灌事禮記曰祭求諸隂陽之義也殷人先求諸陽樂三闋然後迎牲則殷人後灌也周人先求諸隂灌用鬯達於淵泉既灌然後迎牲則周人先灌也此謂廟祭非謂郊祠案周禮天官凡祭祀贊王祼將之事鄭注云祼者灌也唯人道宗廟有灌天地大神至尊不灌淵儒注義炳然明審謂今之有灌相承爲失則宜無灌詔可孝武帝本紀孝建三年正月辛丑車駕親祀南郊大明二年正月辛亥車駕祠南郊禮志大明二年正月丙午朔有司奏今月六日南郊輿駕親奉至時或雨魏世值雨髙堂隆謂應更用後辛晉代顧和亦云更擇吉日徐禪云晉武之世或用丙或用己或用庚使禮官議正并詳若得遷日應更告廟與不博士王燮之議稱遇雨遷郊則先代成議禮傳所記辛日有徵郊特牲曰郊之用辛也周之始郊日以至鄭𤣥注曰三王之郊一用夏正用辛者取其齊戒自新也又月令曰乃擇元辰祈穀於上帝注曰元日謂上辛郊祭天也又春秋載郊有二成十七年九月辛丑郊公羊曰曷用郊用正月上辛哀元年四月辛巳郊榖梁曰自正月至於三月郊之時也以十二月下辛卜正月上辛如不從以正月下辛卜二月上辛如不從以二月下辛卜三月上辛以斯明之則郊祭之禮未有不用辛日者也晉代或丙或己或庚並別有義武帝以十二月丙寅南郊受禪斯則不得用辛也又泰始二年十一月己夘始并圜丘方澤二至之祀合于二郊三年十一月庚寅冬至祠天郊於圜丘是猶用圜丘之禮非專祈穀之祭故又不得用辛也今之郊享既行夏時雖得遷郊謂宜猶必用辛也徐禪所據或為未宜又案郊特牲曰受命於祖廟作龜於禰宮鄭𤣥注曰受命謂告之退而卜也則告義在郊非謂告日今日雖有遷而郊禮不異愚謂不宜重告曹郎朱膺之議案先儒論郊其議不一周禮有冬至日圜丘之祭月令孟春有祈榖於上帝鄭氏說圜丘祀昊天上帝以帝嚳配所謂禘也祈榖祀五精之帝以后稷配所謂郊也二祭異時其神不同諸儒云圜丘之祭以后稷配取其所在名之曰郊以形體言之謂之圜丘名雖有二其實一祭晉武捨鄭而從諸儒是以郊用冬至日既以至日理無常辛然則晉代中原不用辛日郊如徐禪議也江左以來皆用正月當以傳云三王之郊各以夏正晉不改正朔行夏之時因以首歳不以冬日皆用上辛近代成典也夫祭之禮過時不舉今在孟春郊時未過值雨遷日於禮無違既以告日而行事不從禋祀重敬謂宜更告髙堂隆云九日南郊十日北郊是為北郊可不以辛也尚書何偃議鄭𤣥注禮記引易說三王之郊一用夏正周禮凡國大事多用正歳左傳又啟蟄而郊則鄭之此說誠有據矣衆家異議或云三王各用其正郊天此蓋曲學之辨於禮無取固知榖梁三春皆可郊之月真所謂膚淺也然用辛之說莫不必同晉郊庚巳參差未見前徵愚謂宜從晉遷郊依禮用辛右丞徐爰議以爲郊禮用辛有礙遷日禮官祠曹攷詳已備何偃據禮不應重告愚情所同尋告郊尅辰於今宜改告事而已次辛十日居然展齋養牲在滌無緣三月謂毛血告牷之後雖有事礙便應有司行事不容遷郊參議宜依經遇雨遷用後辛不重告若殺牲薦血之後值雨則有司行事詔可蕙田案遇雨遷郊于禮無徵因遷重告尤為煩凟不遷不告自是正誼郊以至日理無常辛語尤破的又案參觀紀志所載是年正月丙午朔辛亥正六日也蓋是日實不值雨故得親奉成禮徐爰議云遇雨遷用後辛若殺牲薦血之後值雨則有司行事明是懸擬之詞並非事實通志撮此二語直云遂遷日有司行事以本日親奉之祭指為遷日而又不親奉誤矣大明三年九月尚書右丞徐爰議郊祀之位逺古蔑聞禮記燔柴於大壇祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉代過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路脩逺謂宜移郊正午以定天位博士司馬興之傅郁太常丞陸澄並同爰議乃移郊兆於秣陵牛頭山西正在宮之午地孝武帝本紀大明四年正月辛未車駕祀南郊六年正月辛卯車駕親祀南郊禮志明帝泰始二年十一月辛酉詔曰朕載新寶命仍離多難戎車遄駕經略務殷禋告雖備弗獲親祀今九服既康百祀咸秩宜聿遵前典郊謁上帝有司奏檢未有先准黄門侍郎徐爰議虞稱肆類殷述昭告蓋以創世成功德盛業逺開統肇基必享上帝漢魏以來聿遵斯典謹尋晉武郊以二月晉元禋以三月有非常之慶必有非常之典不得拘以常祀限以正月上辛愚謂宜下史官考擇十一月嘉吉車駕親郊奉謁昊天上帝髙祖武皇帝配饗其餘祔食不關今祭詔可明帝本紀泰始四年正月己未車駕親祠南郊大赦六年正月乙亥初制間二年一祭南郊間一年一祭明堂禮志世祖崩前廢帝即位以郊舊地為吉祥移還本處後廢帝紀元徽三年正月辛巳車駕親祠南郊明堂禮志南郊皇帝散齋七日致齋三日官掌清者亦如之致齋之朝御太極殿幄坐著絳紗襮黑介幘通天金博山冠先郊日未晡五刻夕牲公卿京兆尹衆官悉壇東就位太祝吏牽牲入到榜稟犧令跪白請省牲舉手曰腯太史令繞牲舉手曰充太祝令牽牲詣庖以二陶豆酌毛血其一奠皇天神座前其一奠太祖神座前郊之日未明八刻太祝令進饌郎施饌牲用繭栗二頭羣神用牛一頭醴用秬鬯藉用白茅𤣥酒一器器用匏陶以瓦樽盛酒瓦圩斟酒璧用蒼玉蒯席各二不設茵蓐古者席藁晉江左用蒯車駕出百官應齋及從駕填街先置者各隨申攝從事上水一刻御服龍衮平天冠升金根車到壇東門外博士太常引入到黑攢太祝令跪執匏陶酒以灌地皇帝再拜興羣臣皆再拜伏治禮曰興博士太常引皇帝至南階脫舄升壇詣罍盥黄門侍郎洗爵跪授皇帝執樽郎授爵酌秬鬯授皇帝跪奠皇天神座前再拜興次詣太祖配天神座前執爵跪奠如皇天之禮南面北向一拜伏太祝令各酌福酒合置一爵中跪進皇帝再拜伏飲福酒訖博士太常引帝從東階下還南階謁者引太常升壇亞獻謁者又引光禄升壇終獻訖各降階還本位太祝送神跪執匏陶酒以灌地興直南行出壇門治禮舉手白羣臣皆再拜伏皇帝盤治禮曰興博士跪曰祠事畢就燎博士太常引皇帝就燎位當壇東階皇帝南向立太祝令以案奉玉璧牲醴爵酒黍飯諸饌物登柴壇施設之治禮舉手曰可燎三人持火炬上火發太祝令等各下壇壇東西各二十人以炬投壇火半柴傾博士仰白事畢皇帝出便坐解嚴天子有故則三公行事而太尉初獻其亞獻猶終獻太常光祿勲也自魏以來多使三公行事乗輿罕出矣魏及晉初儀注雖不具存所損益漢制可知也江左以後官有其注蕙田案此篇所云蓋東晉至宋初舊禮至孝建中則亞獻改用太尉而非太常矣降神不以秬鬯灌矣以其無年次可編故宋志總載于後非謂終宋代如此也讀者詳之右宋郊禮五禮通考卷七
