body:
  text: 五禮通考卷一百三十四刑部尚書秦蕙田􅁧嘉禮七朝禮宋史禮志常朝之儀唐以宣政為前殿謂之正衙即古之内朝也以紫宸為便殿謂之入閤即古之燕朝也外又有含元殿含元非正至大朝㑹不御正衙則日見羣臣百官皆在謂之常恭其後此禮漸廢後唐明宗詔羣臣毎五日一随宰相入見謂之起居宋因其制皇帝日御垂拱殿文武官日赴文徳殿正衙曰常恭宰相一人押班其朝朔望亦於此殿五日起居則於崇徳殿或長春殿中書門下為班首長春即垂拱也蕙田案宋志謂古之内朝即治朝也文獻通考宋朝因唐與五代之制文武官毎日赴文明殿正衙常恭宰相一人押班五日起居即崇徳長春二殿中書門下為班首其長春殿常朝則内侍省都知押班率内供奉官以下并寄班等先起居次閤門使次三班使臣注節度觀察防禦團練刺史等子弟充供奉官侍禁殿直有㫖令預内朝起居者次内殿當直諸班殿前指揮使左右班都虞侯以下内殿直散直散指揮散都頭金槍班等次長入祗侯東西班殿侍次御前忠佐次殿前都指揮使率軍校至副指揮使次駙馬都尉任刺史以上者綴本班次諸王府僚次殿前司諸軍使都頭次皇親将軍以下至殿直次行門指揮使率行門起居以上並内侍贊謁如傳宣前殿不坐即宰相與樞密使文明殿學士三司使翰林樞密直學士中書舍人三司副使知起居注皇城内監庫藏朝官諸司使副内殿崇班供奉官侍禁殿直翰林醫官待詔等同班入中書舍人乾徳後始令赴内朝三司判官太平興國前赴内殿其後罷之止随百官五日起居中書舍人知起居注遇五日起居之時亦各付外朝次親王次侍衛親軍馬歩軍都指揮使率軍校至副指揮使次使相次節度使次統軍次兩使留後觀察使次防禦團練使刺史次侍衛馬軍歩軍使都頭起居畢見謝班入如御崇徳殿即樞密使以下先就班俟升坐諸司使副以下至殿直分東西對立餘皆北向長春殿皆北向宰相參知政事最後入以上並閤門贊謁日止再拜朔望及三日假即樞密使以下皆舞蹈國初近侍執事之臣皆赴晩朝後罷之凡早朝宰相樞密宣徽使起居畢同升殿問聖體宰相奏事樞密宣徽使退候宰相對畢樞密使復入奏事次三司開封府審刑院遇百官起居即樞密宣徽使侍立俟左右巡使出即退其崇徳殿三司使文明樞密直學士内客省使仍侍立舊三司使奏事副使判官同對其後止副使同之大中祥符九年詔自今有大事許判官同上之及羣臣以次升殿大兩省以上領務京師者有公事許即請對自餘受使出入要切者欲面議奏事則先聽進止其見謝辭官以次入於庭出使閑慢及未升朝官或止拜於殿門外自秘書監上將軍觀察使内客省使以上得拜殿前階上及升殿止拜御座前餘皆庭中也凡見者先之謝次之辭又次之其班次先宰相次親王次樞密副使參知政事次内職内臣次使三司學士兩省御史臺文武班節使以下次將軍校次雜班惟宰相親王使相赴崇徳殿即宣徽使通喚餘皆側立候通再拜舞蹈致詞辭即不舞蹈見即将相升殿問聖體其賜分物酒食及収進奉物皆舞蹈稱謝凡収進奉物皆入謝幕職州縣官謝辭即判銓官引對兼於殿門外宣辭戒勵凡國有大慶瑞出師勝㨗樞密使率内職軍校入賀致詞閤門使宣答訖當侍立者升殿次百官入宰相致詞宣徽使宣答賜酒即預坐官後入作樂送酒如曲宴之儀凡視朝退進食訖易服御崇政殿或承明殿先羣臣告謝注自諌舍知雜御史以上及帶三司館王府僚屬歴官醫官刺史以上上将軍并𤼵運使轉運使并許焉自非宣制並捧官告勅叙謝其貴近者或賜坐賜茶餘或改章服即謝訖易服又告謝再拜次軍頭引見司奏事於殿陛下次三班審官院流内銓刑部及諸司引見官吏後詔審官引對京朝官奏課不得過三人差遣不得過五人三使部𨕖人差遣不得過十人如假日起居辭見畢即移御座臨軒視事既退復有羣司奏或閲器物之式謂之後殿再坐蕙田案宋制毎日常參五日起居並稱常朝文獻通考所云長春殿常朝宋志謂之垂拱殿起居其實一也宋史禮志建隆元年八月朔太祖常服御崇元殿設仗衛文武百官入閤始置待制候對官乃以工部尚書竇儼待制太常卿邉光範候對仗退賜食廊下文獻通考五代以來廢正衙立仗而入閤亦希闊不講至是復行之然御前殿非唐舊矣崇元殿即大慶殿前殿也待制候對者亦唐制也毎正衙待制官兩員正衙退後又令六品以下於延英候對皆所以備顧問其後毎入閤即有待制次對官後唐天成中廢至是復行之廊下食起唐貞觀其後常叅官毎日朝退賜食謂之廊餐唐末浸廢但於入閤起居日賜食今循其制文獻通考建隆三年三月詔内殿起居日令百官以次轉對限三人為定其封章於閤門通進復鞠躬自奏宣徽使承㫖宣答拜舞而出宋史禮志乾徳四年四月朔帝服通天冠絳紗袍御崇元殿視朝設金吾仗衛羣臣入閤文獻通考六年九月始以旬假日御講武殿近臣但赴早叅宰相以下皆具靴笏諸司使以下皆係鞵其節假及太祠並如令式處分蕙田案宋史禮志原注講武殿又名崇政宋史禮志開寶九年四月詔旬休日不視事文獻通考太宗即位旬休日復視事講武殿其後又詔自今内外百司除舊制給假外毎月旬假上已社重午重陽並休務一日三司開封府事闗急速不在此限遇初寒盛暑大雨雷雪當議放朝宋史禮志太宗淳化二年十一月詔以十二月朔御文徳殿入閤令史官脩􅁧楊徽之張洎定為新儀前一日有司供帳於文徳殿宋初曰文明是日既明先列文武官於殿庭之東西百官軍校行軍副使等序班於正衙門外屏南階下次御史中丞三院御史序立中丞獨穿金吾班過揖兩班一揖歸本位次監察御史兩員監閤於正衙門外屏北階上北面立次中書門下文明翰林樞密直學士兩省官分班立次司天奏辰刻次閤門版奏班齊皇帝服鞾袍乗輦至長春殿駐輦樞密使以下奏謁前導至文徳殿殿上承㫖索扇捲簾皇帝升位扇却儀鸞使焚香次文武官等拜次司天雞唱次閤門勘契次閤門使承㫖呼四色官喚仗南班有辭謝者再拜先退中書門下班對揖序立正衙門外屏北階上次翰林學士兩省官中丞侍御史序立次金吾将軍押細仗入正衙門後横行拜訖分行上黄道仗随入金吾将軍至龍墀分班揖訖序立次吏部侍郎執文武班簿入對揖立次中書門下學士兩省御史臺官入北面拜訖上黄道将至午階􅣠鞾急趨赴丹墀彈奏御史至吏部侍郎南便落黄道急趨就位起居郎舍人至兵部吏部侍郎後急趨而進飛至香案前皆揖訖序立次金吾大将軍先對揖並鞠躬􅣠鞾行至折方石位又對揖北行至奏事石位鞠躬一員奏軍國内外平安倒行就位次引文武班就位揖訖鞠躬􅣠鞾急趨入沙墀次引侍從班横行宰相祝月起居畢分班序立文武兩班出序立於衙門外刑法待制官赴監奏位中書門下夾香案侍立兩省御史臺官學士兵部吏部侍郎金吾將軍監閤御史並相次出就衙門外立惟學士立門側北候宰使中書門下詣香案前奏曰中書公事臣等已具奏聞訖乃退揖殿出次刑法官待制官各奏事並宣徽使答訖乃出就班次彈奏官左右史出閤内失儀者彈紀如式彈奏官失儀起居郎紀之起居郎失儀閤門使紀之閤門使失儀宣徽使紀之凡出者皆􅣠鞾急趨揖殿次中書門下學士就位閤門使宣放仗再拜賜廊下食又再拜次閤門使奏閤内無事文武官出殿上索扇垂簾輦還宫其賜廊下食自左右勤政門北東西兩廊文東武西以北為上立定中丞至本位面南一揖乃就坐食至臺史贊乃搢笏食食訖復贊食畢而罷五月朔命有司増黄麾仗三百五十人令文武官随中書門下横行起居徙翰林學士位於參知政事後與節度使分東西揖殿出真宗凡三行之景徳以後其禮不行揮麈後錄時江南張洎獻状述朝㑹之制得失明著其要云今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝百國在此殿也今之文徳殿即唐之宣政殿在周為中朝在漢為前殿在唐為正衙凡朔望起居册拜后妃皇太子王公大臣對四夷君長試制策科舉人在此殿也昔東晉太極殿有東西閤唐制紫宸上閤法此制也且人君恭已南面嚮明而理紫㣲黄屋至尊至重故巡幸則有大法駕從之盛御殿則有勾陳羽衛之嚴故雖隻日常朝亦猶立仗前代謂之入閤儀者盖隻日御紫宸上閤之時先於宣政殿前立黄麾金吾仗候勘契畢喚仗即自東西閤門入故謂之入閤今朝廷且以文徳正衙權宜為上閤甚非憲度况國家繼百王之後天下昇平凡曰憲章咸從損益惟視朝之禮尚自因循竊見長春殿正與文徳殿南北相對殿前地位連横街亦甚廣博伏請改創此殿作上閤為隻日立仗視朝之所其崇政殿即唐之延英是也為雙日常時聽斷之所庶乎臨御之式允協前經今論以入閤儀注為朝廷非常之禮甚無謂也蕙田案張洎論入閤之説當矣宋初去五代未逺故承其悞至熙寜始罷入閤之禮初羣臣見辭謝皆赴正衙淳化二年知雜御史張郁言正衙之設謂之外朝凡羣臣辭見及謝先詣正衙見訖御史臺具官位姓名以報閤門方許入對此國家舊制也自乾徳後始詔先赴中謝後詣正衙而文武官中謝後次日並赴正衙内諸司遥領刺史閤門通事舍人以上新授者亦赴正衙辭謝出使急速免衙辭者亦具状報臺違者罰俸一月其内諸司職官并將校至刺史以上新授者欲望同百官例赴正衙謝從之淳化二年詔自今内殿起居日復令常參官二人次對閤門受其章太宗本紀淳化三年五月甲午朔御文徳殿百官入閤文獻通考是嵗令有司復舉十五條一朝堂行私禮二跪拜三待漏行立失序四談笑喧嘩五入正衙門執笏不端六行立遲緩七至班列行立不正八趨拜失儀九言語㣲喧十穿班仗十一閤門不即就班十二無故離位十三廊下食行坐失儀語喧十四不從正衙門出入十五非公事入中書犯者罰一月俸有司振舉拒不伏者錄奏乞行貶䧏其後毎罰减半真宗本紀咸平二年八月辛亥御文徳殿文武百官入閤禮志真宗咸平三年五月朔雨命放仗百官常服起居於長春殿退詣正衙立班宣制咸平六年命翰林學士梁顥等詳定閤門儀制成六卷因上言三司副使序班朝服比品素無定列至道中筵㑹在知制誥後郎中前今請同諸司少卿監班位在上如官至給諌卿監者自如本品朝㑹大宴随判使赴長春殿起居引駕其朝㑹引駕至前殿與諸司使同退景徳二年光祿寺丞錢易言竊覩文徳殿常朝班不及三四十人盖以凡掌職務止赴五日起居頗違舊章望令並赴朝叅乃詔應三館祕書閣尚書省二十四司諸司寺監朝臣内殿起居外並赴文徳殿常參其審刑院大理寺臺直官開封府判官推官司錄兩縣司天監翰林天文監倉塲庫務等仍免三年復詔羣臣轉對其在外京官内殿崇班以上候得替先具民間利害實封於閤門上進方得朝見大中祥符二年御史知雜趙湘言伏見常叅官毎日趨朝多不整肅舊制並早赴待漏院候開内門齊人伏緣毎日迨辰以朝以故後時方入又風雨寒暑即多稱疾宜令知班驅使官視其入晚者申奏疾者遣醫親視真宗本紀大中祥符三年閏二月辛亥帝御文徳殿羣臣入閤禮志大中祥符四年閏三月太常禮院閤門言凖詔同詳定閤門使李端慤所奏閤門儀制宰臣與親王立班坐位分左右各為班首宰臣樞密使帶使相或帶郡王并使相作一行縂為中書門下班其親王獨行一班者凖對爵令兄弟皇子皆封國謂之親王所以他官不可參綴檢㑹坐次圖直將宗室使相輒綴親王盖更張之時未見親王遂致失於講求近見朝拜景靈宫東陽郡王顥亦綴親王班竊恐未安今所到閤門儀制其合班宰臣使相在東親王在西分班立又祥符元年晏坐次圖宰臣王旦與使相石保吉在東寜王元偓舒王元偁廣陵郡王元儼節度使惟吉在西分班坐其元儼惟吉是郡王與節度使許綴親王班竊慮當時出自特㫖今來檢尋元初文字不見在先朝只依祥符元年晏坐次圖親王及帶使相郡王在西為一班臣等參詳請依閤門儀制親王在西獨為一班宗室郡王帶使相許綴親王立班坐次即係臨時特㫖從之職官志大中祥符九年正月興利州團練使徳文言男侍禁承顯赴起居請在惟忠子從恪之上時從恪雖姪行而拜職在前遂詔宗正寺定宗室班圖以聞宗正言案公式令朝叅行立職事同者先爵爵又同者先齒今請宗子官同而兄叔次弟姪者並虚一位而立真宗本紀天禧元年秋七月丁未霖雨放朝十二月丙子嚴寒放朝四年九月己未久雨放朝冬十月戊寅命依唐制雙日不視事十一月辛未詔自今羣臣五日於長春殿起居餘隻日視朝於承明殿禮志天禧四年十月中書門下言唐朝故事五日一開延英隻日視事雙日不坐方今中外晏寜致刑清簡望凖舊事三日五日一臨軒聽政隻日視事雙日不坐至於刑章錢穀事務遣差臣僚除急切大事須面對外餘並令中書樞密院附奏詔禮儀院詳定雙日前後殿不坐隻日視事或於長春殿或於承明殿應内殿起居羣臣並依常日起居餘如中書門下之儀俄又請隻日承明殿常朝依假日便服視事不鳴鞭詔可真宗本紀天禧五年冬十月壬子依漢唐故事五日一受朝遇慶㑹皇太子押班仁宗本紀景祐元年九月壬辰百官請隻日御前殿如先帝故事詔可宋庠傳庠寶元中以諌議大夫參知政事庠儒雅練習故事嘗從容論及唐入閤儀庠退而上奏曰入閤乃有唐隻日於紫宸殿受常朝之儀也唐有大内又有大明宫宫在大内之東北世謂之東内髙宗以後天子多在大明宫之正南門曰丹鳳門門内第一殿曰含元殿大朝㑹則御之第二殿曰宣政殿謂之正衙朔望大冊拜則御之第三殿曰紫宸殿謂之上閤亦曰内衙隻日常朝則御之天子坐朝須立仗於正衙殿或乗輿止御紫宸即喚仗自宣政殿兩門入是謂東西上閤門也以本朝宫殿視之宣徳門唐丹鳳門也大慶殿唐含元殿也文徳殿唐宣政殿也紫宸殿唐紫宸殿也今欲求入閤本意施於儀典須先立仗文徳庭如天子止御紫宸即喚仗自東西閤門入如此則差與舊儀合但今之諸殿比於唐制南北不相對又案唐自中葉以還雙日及非時大臣奏事别開延英殿若今假日御崇政延和是也乃知唐制無過坐朝日即為入閤其後正衙立仗因而遂廢甚非禮也康定元年六月丙戌詔假日御崇政殿視事如前殿禮志康定初詔中書樞密三司大節大忌給假一日小節旬休並後殿奏事前後毋得過五班餘聽後殿對御厨給食假日崇政殿辰漏上入内進食俟再坐復對文獻通考英宗治平四年詔御史臺毎遇起居日令百僚轉對御史臺請依閤門儀制輪兩省及文班秩髙者二員於百官起居日轉對若兩省官有充學士待制則綴樞密班起居内朝臣僚不與詔從之又詔遇轉對日增二員神宗即位御史中丞王陶以皇祐編勅宰臣押班儀制移中書謂天子新即位大臣不應墮廢朝儀不報舊制祖宗以來日御垂拱殿待制諸司使以上俱赴而百官班文徳殿曰常朝五日皆入曰起居平時宰相垂拱殿奏事畢赴文徳殿押班或日昃未退則閤門傳宣放班多不復赴王陶以韓琦曽公亮違故事不押班為不恭劾之琦公亮上表待罪且言唐及五代㑹要月九開延英則餘日宰相當押正衙班及延英對日未御内殿前傳宣放班則宰相不押正衙班明矣自祖宗繼日臨朝宰相奏事至祥符初始詔循故事押文徳班以妨職浸廢乃至今日請下太常禮院詳定陶坐絀司馬光代為中丞請令宰相遵國朝舊制押班不須詳定尋詔宰相春分辰初秋分辰正垂拱殿未退聽勿赴文徳殿令御史臺放班光又言垂拱奏事畢春分以後鮮有不過辰初秋分以後鮮有不過辰正然則自今宰臣常不至文徳殿押班請春分辰正秋分已初奏事未畢即如今詔庶幾此禮不至遂廢廼詔春秋分率以辰正文獻通考熙寜元年詔自今授外任者許令轉訖朝辭宋史禮志熙寜初閤門言舊制中書省樞密院奏事退再引三班假日則兩班或再御後殿引對多及午刻遇開經筵即至申末恐久勞聖躬請遇經筵日自二府奏事外止引一班或有急奏及言事官請對即取㫖俟罷經筵日仍舊又言假日御崇政殿毎遇辰時則隔班過延和殿再引不待進食至巳刻隔班取㫖尚許引對請自今隔班過延和殿俟已進食再引遇寒暑大風雨雪即令次日引對詔自今授外任者許令轉對訖朝辭監察御史裏行張戬程顥言每欲奏事必俟朝㫖或朝政有闕及聞外事而機速後時則已無所及况往復俟報必由中書萬一事干政府則或致阻格請依諌官例牒閤門求對或有急奏即許越次登對庶幾遇事入告無憂失時又以編脩閤門儀制所言三衙有急奏許於後殿登對若别有奏陳則報閤門如常制或假日御崇政殿則於已得㫖對班後續引且許兩制以上同班奏事蕙田案文獻通考載張戬程顥奏在熙寜二年文獻通考熙寜三年知制誥宋敏求等言文徳殿入閤儀制考之國朝㑹要與今儀制所載頗或異同案今文徳殿唐宣政殿也紫宸殿唐紫宸殿也然祖宗朝皆嘗御文徳殿入閤唐制嘗設仗衛於宣政殿或遇上坐紫宸即喚仗入閤如此則當御紫宸殿入閤方協舊制請下兩制及太常禮院詳定詔學士院議翰林學士承㫖王珪等言案入閤者乃唐隻日紫宸殿受常朝之儀也唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙仗自宣政殿東西閤門入故為入閤五代以來遂廢正衙立仗之制今閤門所載入閤儀者止是唐常朝之儀非為盛禮不可遵行從之自是入閤之禮遂罷敏求又言本朝以來惟入閤乃御文徳殿視朝今既不用入閤儀即文徳殿遂闕視朝之禮請下兩制及太常禮院約唐制御宣政殿裁定朔望御殿儀以備正衙視朝之制詔學士院詳定儀注學士韓維等以入閤圖増損裁定上儀曰朔日不值假前五日閤門闗諸司排辦前一日有司供帳於文徳殿其日左右金吾將軍常押本衛仗判殿中省官押細仗先入殿庭東西對列文武官等分東西序立諸將軍校分入北向立朝堂引贊官引彈奏御史二員入殿門踏道當下殿北向立次催文武班分入並東西相向對立諸軍將校即於殿庭北向立班其班次並御史臺祗應皇帝服靴袍垂拱殿坐鳴鞭内侍閤門管軍依朔望常例起居次引樞密宣徽使三司使副樞密直學士内閤省使以下至醫官待詔及修起居注官二員並大起居皇帝乗輦至文徳殿後閤門奏班齊皇帝自後閤出殿上索扇升榻鳴鞭扇開簾捲儀鸞使焚香喝文武官就位四拜起居雞人唱時舍人於彈奏御史班前西向喝大起居御史由文武班後至對立位次引左右金吾將軍合班於宣制石南大起居班首出班躬奏軍國内外平安歸位再拜各歸東西押仗位通喝舍人於宣制石南北向對立舍人退於西階次揖宰臣親王以下躬奏文武百僚宰臣某姓名以下起居分引宰臣以下横行諸軍將校仍舊立閤門使喝大起居舍人引宰臣至儀石北俛伏跪致詞祝月訖其詞曰文武百僚宰臣全銜臣某姓名等言孟春之吉伏惟皇帝陛下膺受時祉與天無窮臣等無任懽呼忭蹈之至歸位五拜閤門使揖中書由東階升殿樞密使帶平章事以上由西階升殿侍立給事中一員以知門下封駮事官充歸左省位立轉對官立於給事中之南如罷轉對官毎遇御史臺前期牒請文官二員並依轉對官立例先于閤門投進奏状吏部侍郎及刑法官立於轉對官之南兵部侍郎於右省班南與吏部侍郎東西相向定搢笏各出班籍置笏上吏部兵部侍郎以知審官東西院官充刑法官以知審刑大理寺官充親王使相以下分班出引轉對官於宣制石南宣徽使殿上承㫖宣答如儀次吏部兵部侍郎及刑法官對揖出見謝辭班自從别儀次彈奏御史無彈奏對揖出如有彈奏並如儀引給事中至宣制石南揖躬奏殿中無事喝祗候揖西出次引修起居注官排立供奉官以下各合班於宣制石南躬喝祗候揖分班出喝文武官等門外祗候出索扇垂簾皇帝降座鳴鞭舍人當殿承㫖放仗四色官􅣠鞾急趨至宣制石南稱奉勅放仗金吾將軍并判殿中省官對拜訖隨仗出親王使相節度使至刺史學士臺省官文武百僚諸軍將校等並序班朝堂謝賜茶酒皇帝御垂拱殿座中書樞密及諸對官奏事不引見謝辭班後殿座臨時取㫖其日遇有徳音制書御札仍候退御垂拱殿座制箱出外應正衙見謝辭文武臣僚並依御史臺儀制喚班依序分入於文武班後以北為首分東西相向重行異位依見謝辭班序位餘押班臣僚於班稍前押班候刑法官對揖出分引近前揖躬舍人當殿宣班引轉對班見謝辭並如紫宸殿儀樞密使不帶平章事參知政事至同簽書樞密院事宣徽使並立於宣制石稍北宰相親王樞密帶平章事使相繫押班者立於儀石南餘官並立于宣制石南並合贊喝閤門使引並如儀贊喝訖係中書樞密並揖升殿謝辭揖西出其合問聖體者並如儀餘官分班出彈奏御史候見謝辭班絶對揖出其朝見如謝都城門外御筵及詔赴闕謝茶藥撫問之類不可合班者各依别班中謝對賜酒食等並門賜其係正衙見門謝辭亦門外喝放應正衙見謝辭臣僚前一日於閤門投諸正衙牓子閤門下奏目又投正衙状於御史臺四方館應朔日或得㫖罷文徳殿視朝止御紫宸殿起居其已上奏目正衙見謝辭班並放免依官品隨赴紫宸殿引或值改依常朝文徳殿自有百官班日並如舊儀應外國蕃客見辭候喚班先引赴殿庭東邊依本國職次重行異位立候見謝辭班絶西向躬舍人當殿通班轉於宣制石南北向立贊喝如儀西出其酒食分物並門賜如有進奉候彈奏御史出入進奉入惟御馬及檐牀自殿西偏門入東偏門出其進奉出入文武官起居舍人通某國進奉寅徽使喝進奉出節次如紫宸殿儀式候進奉出給事中奏殿中無事出其後殿再座合引出者從别儀其日賜茶酒宰臣樞密於閤子親王於本㕔使相宣徽使觀文殿大學士至寶文閣直學士兩省官待制三司副使文武百官皇親使相以下至率府副率及四廂都指揮使以下至副都頭並於朝堂如朝堂位次不足即于朝堂門外序次管軍節度使至四廂都指揮使節度使兩使留後至刺史並於客省㕔詔依所定宋史禮志熙寜六年正月西上閤門副使張誠一言垂拱殿常朝先内侍喝内侍都知以下至宿衛所門計一十八班起居後通事舍人引宰執樞密使以下大班入次親王次侍衛馬歩軍都指揮以下次皇親使相以下十班入方引見謝辭或遇百官起居日自行門後通事舍人引樞密以下次親王使相以下至刺史十班入方奏兩巡使起居立定方引兩省官入次閤門引宰臣以下大班入起居畢候百官出絶兩省班出次兩巡使出中書樞密方奏事已是日髙况大班本不分别丞郎給諌臺省及常叅官今獨使相以下曲為分别虚占時刻請御垂拱殿百官起居日將親王以下十班合為四班親王為一班侍衛馬歩軍都指揮使為一班親王使相以下至刺史重行異位為兩班可减六班如垂拱殿常朝不係百官起居或紫宸殿百官起居其親王使相以下班並依舊儀序入起居從之神宗本紀熙寜七年八月集賢院學士宋敏求上編修閤門儀制禮志元豐中官制行始詔侍從官而上日朝垂拱謂之常叅官百司朝官以上每五日一朝紫宸為六恭官在京朝官以上朔望一朝紫宸為朔恭官望叅官遂為定制神宗本紀元豐三年二月丙辰始御崇政殿視朝五月乙丑詔自今三伏内五日一御前殿文獻通考三年九月引進使李端慤言近朔望御文徳殿視朝初寒盛暑數煩清蹕而紫宸朝嵗中罕御請朔日御文徳既望坐紫宸庶幾正衙内殿朝儀並舉從之蕙田案宋史禮志載李端慤奏在熙寜六年今以通考為定宋史禮志元豐既定朝􅄁之制侍御史知雜事蒲中行上言文徳正衙之制尚存常朝之虚名襲横行之謬例有司失於申請未能釐正兩省臺官文武百官赴文徳殿東西相向對立宰臣一員押班聞傳不坐則再拜而退謂之常朝遇休假并三日以上應内殿起居官畢集謂之横行自宰臣親王以下應見謝辭者皆先赴丈徳殿謂之過正衙然在京釐務之官例以别勅免􅄁宰臣押班近年已罷向武班諸衙本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱内殿宰臣以下既已日􅄁而文徳常朝仍復不廢舛謬倒置莫此為甚至於横行􅄁假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也詔下詳定官制所言今天子日聽政於垂拱以接執政官及内朝之臣而更於别殿宣勅不坐實為因習之誤兼有執事升朝官五日一赴起居而未有執事者反謂之􅄁疏數之節尤為未當又辭見謝自己入見天子則前殿正衙對拜為虚文其連遇朝假則百官司赴大起居不當復有横行􅄁假宜如中行言於是常朝正衙横行之儀俱罷元豐中詔尚書侍郎同郎官一員奏事郎中員外郎番次隨之不許獨留身侍郎以下亦不許獨請奏事其左右𨕖非尚書通領者聽侍郎以上郎官自隨秘書殿中省諸寺監長官視尚書貳丞以下視侍郎又詔三省樞密院獨班奏事日無得過三班若三省俱獨班則樞密院當請奏事其見任官召對訖次日即朝辭回任聽㫖元豐八年二月詔諸三省御史臺寺監長貳開封府推判官六恭職事官赤縣丞以上寄祿升朝官在京釐務者望恭不釐務者朔恭哲宗本紀元祐五年五月壬午詔文彦博班宰相之上禮志元祐元年五月詔太師平章軍國重事文彦博已降㫖令獨班起居自今赴經筵都堂同三省樞密院事並序位在宰相之上元祐四年十月以户部尚書吕公孺言詔朔恭官兼赴望叅望叅官兼赴六叅哲宗本紀元祐五年夏四月癸丑詔講讀官御經筵退留二員奏對邇英閣丁巳詔以旱避殿減膳罷五月朔日文徳殿視朝禮志元祐中宰臣吕大防言昨垂簾聽政惟許臺諌以二人同對故不正之言無得以入今陛下初見羣臣請對者必衆既人人得進則善惡相雜故於采納尤難帝曰人君以納諌為上然邪正則不可不辨遂詔上殿班當直牒及帥臣國信使副許依元豐八年以前儀制哲宗本紀元祐七年五月庚子罷侍從官轉對紹聖四年四月己酉復文徳殿侍從轉對禮志紹聖初臣僚言文徳殿視朝輪官轉對盖襲唐制故祖宗以來每遇轉對侍從之臣亦皆預焉元祐間因言者免侍從官轉對續詔執事官權侍郎以上並免自此轉對止於卿監郎官而已請自今視朝轉對依元豐以前條制蕙田案侍從輪官轉對下情得以上達此唐宋良法也元祐免侍從轉對自此轉對止於卿監郎官而已紹聖中臣僚請依元豐已前條制是也惜其時惇卞柄政附從皆僉壬耳又詔自今三省樞密院進擬在京文臣開封府推判官武臣横行使副在外文臣諸路監司藩郡知州武臣知州軍以下取㫖召對臣僚言每縁職事請對待次旬日遇有急奏深恐失事請自今後許依六曹開封例先次挑班上殿仍不隔班又言諸路監司朝廷所𨕖以推行法令省問風俗朝辭之日當令上殿六曹尚書如有職事奏陳許獨員上殿其羣臣請對雖遇休假特御便殿聽納既又詔應節鎮郡守往令陛辭歸許登對不特審觀人材亦所以重外任也可於監司不許免對條下増入節鎮郡守依此十月御史臺言外任官到闕朝見訖並令赴朔望㕘尋又言元豐官制朝㕘班序有日㕘六㕘望㕘朔㕘已著為令元祐中改朔􅄁兼赴望㕘望㕘兼赴六㕘有失先朝分别等差之意止依元豐儀令從之徽宗本紀崇寜五年十二月壬戌詔臣僚休日請對特御便殿禮志政和詳定五禮新儀有文徳殿月朔視朝儀紫宸殿望㕘儀垂拱殿四㕘儀紫宸殿日㕘儀垂拱殿日㕘儀紫宸殿再坐儀崇政殿假日起居儀其文不載文獻通考重和元年臣僚言比年以來二三大臣奏對留身讒疏善良請求相繼甚非朝廷至公之體詔自今惟蔡京五日一朝許留身餘非除拜𨕖秩因謝及陳乞罷免並不許獨班奏事令閤門報御史臺彈劾蕙田案此蔡京箝制朝官沮塞言路所為豐亨之説日陳於上謟媚之風日成於下上壅蔽而不聞臣專擅而無忌汴宋之所以亡也宋史徽宗本紀宣和四年十二月乙未詔監司未經陛對毋得之任禮志臣僚言祖宗舊制有五日一轉對者今惟月朔行之有許朝官轉對者今惟待制以上預焉自明堂行視朔禮嵗不過一再則是畢嵗而論思者無幾請遇不視朔即令具章投進以備覽觀又諸路監司未經上殿者雖從外移先赴闕引對方得之官並從其議髙宗本紀建炎三年二月丁夘百官入見應迪功郎以上並赴朝㕘紹興二年五月戊子手詔用建隆故事命百官日輪一人轉對七年冬十月丁巳詔六㕘日輪行在百官一員轉對十三年二月壬戊初御前殿特引四㕘官起居孝宗本紀紹興三十二年五月壬辰詔百官日一人入對文獻通考紹興三十二年九月閤門言太上皇帝巡幸以來上御後殿繼朝廷復興舊典於紹興十三年二月四日初御前殿特令四㕘官起居伏自皇帝登寶位止係後殿日分今已降㫖九月十二日初御前殿欲乞是日皇帝御垂拱殿四㕘官起居從之隆興二年九月閤門言在京及行在舊例御前殿日分值雨雪及泥濘得㫖放朝㕘即改後殿坐今後乞依例取㫖從之朝野雜記舊羣臣朝殿遇雨開隔門起居紹興中申行之又詔從駕遇雨賜雨具景靈宫遇雨或地濕分東西廂立班皆特恩也宋史禮志孝宗乾道二年九月閤門奏垂拱殿四㕘四㕘官謂宰執侍從武臣正任文臣卿監員外監察御史以上皇帝坐先讀奏目知閤以下次御帶環衛官以下次忠佐殿前都指揮使以下次殿前司員僚次皇太子次行門以上逐班並常起居次樞密學士待制樞密都承㫖以下知閤并祗應武功大夫以下通班常起居次親王次馬歩軍都指揮使次使相次馬歩軍員僚以上逐班並常起居次殿中侍御史入側宣大起居訖歸侍立位次宰執以下並兩省官文臣百官入相向立定通班面北立大起居訖凡常起居兩拜大起居七拜三省升殿侍立次兩省官出次殿中侍御史對揖出三省樞密院奏事次引見辭謝次引臣僚奏事訖皇帝起詔今後遇四㕘日分起居班次可移殿中侍御史及宰執以下百官班令次樞密以下班起居却令親王并殿前都指揮使以下殿前司員僚逐班於宰執以下班後起居餘並從之文獻通考乾道七年四月詔為暑熱依年例自五月十三日並後殿坐并放見謝辭及㕘假官候秋凉日取㫖今後准此孝宗本紀七年十二月庚申詔閤門舍人依文臣館閤以次輪對淳熙七年九月癸亥詔自今常朝毋稱丞相名甲子命樞密使亦如之禮志寜宗嘉定十二年正月臣僚奏竊見皇帝御正殿或御後殿固可間舉四㕘官亦有定日近者每日改常朝為後殿四㕘之禮亦多不講正殿後殿四㕘間免陛下臨朝之日固未嘗輟而外廷不知聖意或謂姑從簡便非所以肅百執事也常朝之禮止於從臣後殿之儀從臣不與四㕘止及卿郎而乃累月僅或一舉咫尺天威疎簡至此非所以尊君上而勵百辟也伏願陛下嚴常朝後殿四㕘之禮起羣下肅謹之心彰明時勵精之治豈不偉哉從之老學庵筆記先君言舊制朝恭拜舞而已政和以後増以喏然紹興中予造朝已不復喏矣淳熙末還朝則迎駕起居閤門亦喝唱喏然未嘗出聲也又紹興中朝恭止磬折遂拜今閤門習儀先以笏叩額拜謂之瞻笏亦不知起於何年二老堂詩話歐公詩云玉勒爭門随仗入牙牌當殿報班齊或疑其不然今朝殿爭門者往往随仗而入及在廷排立既定駕將御殿閤門持牙牌刻班齊二字候班齊小黄門接入上先坐後幄黄門復出揚聲云人齊未行門當頭者應云人齊上即出方轉照壁衛士即鳴鞭然此乃是駕出時常日則不同右宋常朝五禮通考卷一百三十四
