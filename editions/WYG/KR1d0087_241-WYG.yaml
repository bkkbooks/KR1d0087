body:
  text: 五禮通考卷二百三十一刑部尚書秦蕙田撰賓禮十二諸侯遣使交聘蕙田案天子之與諸侯諸侯之與鄰國皆有聘禮大行人歳徧存三嵗徧覜五嵗徧省此天子所以撫諸侯也大宗伯時聘曰問殷覜曰視大行人時聘以結諸侯之好殷覜以除邦國之慝此諸侯所以事天子也大行人歲相問殷相聘禮記諸侯使大夫問于諸侯曰聘則諸侯之邦交也先王制諸侯同方岳者小聘則使大夫大聘則使卿定為比年三年之期俾相厲以禮相接以敬讓而潛消其侵陵兼并之萌故其儀雖委折而不為繁其燕賜雖豐厚而不為費用意固深且逺也後儒如郝京山輩疑儀禮之文以為衰世之禮非盡先王舊典者不明于講信修讓睦鄰柔逺之道者也儀禮聘禮一篇述交聘之儀節最為詳備然止是次國大聘之禮其五等諸侯交聘散見於經傳者今並採集别為一卷以存其略周禮秋官大行人凡諸侯之邦交嵗相問也殷相聘也注小聘曰問殷中也久無事又于殷朝者及而相聘也鄭司農云春秋傳孟僖子如齊殷聘疏云小聘曰問者聘禮文故彼云小聘曰問不享是也大聘使卿小聘使大夫也聘義王制皆云三年一大聘此不言三年而云殷者欲見中間久無事及殷朝者来及亦相聘故云殷不云三年也若然聘義與王制皆云比年一小聘此云嵗相問不云比年者取歲歳之義也父死子立曰世是繼世之義也左氏昭公九年傳孟僖子如齊殷聘彼注云殷中也自襄二十年叔老聘于齊至今積二十一年故中復盛聘與此數不相當然其禮則同也朱子曰案春官殷見曰同鄭注云殷猶衆也十二嵗王如不廵守則六服盡朝大行人所謂殷同殷國是也此亦鄭注乃訓殷為中與衆義異其云於殷朝者及而相聘則又與衆義仝蓋以為一二年而一大聘也疏既以為中又云盛聘則與衆義略同葢如䘮禮殷奠之類今未詳其孰是也觀承案殷有衆義亦有中義殷見曰同及巡守殷國自當主衆義此歲相問世相朝而以殷相聘間於其中則當主中義然小聘禮輕而人數少大聘禮盛而人數多則衆義亦可兼之彼殷見殷國本非朝聘常期則亦兼有中義固無不可通也禮記曲禮諸侯使大夫問于諸侯曰聘聘義聘禮上公七介侯伯五介子男三介所以明貴賤也注此皆使卿出聘之介數也大行人職曰凡諸侯之卿其禮各下其君二等疏上公親行則九介其卿降二等故七介侯伯子男以次差之介紹而傳命君子于其所尊弗敢質敬之至也注質謂正自相當蕙田案此二節釋介紹之義三讓而后傳命三讓而后入廟門三揖而後至階三讓而後升所以致尊讓也注此揖讓主謂賓也三讓而后傳命賓至廟門主人請事時也賓見主人陳擯以大客禮當已則三讓之不得命乃傳其君之聘命也三讓而后入廟門讓主人廟受也小行人職曰凡四方之使者大客則擯小客則受其幣聽其辭疏知此揖讓主謂賓者以三讓而後傳命及三讓而後入廟門皆賓先讓也三揖至階三讓而後升雖主人為首皆賓讓而後至于主人若賓不讓則不至于三是揖讓之事皆賓為主故云此揖讓主謂賓也云三讓而後傳命賓至廟門主人請事時也者鄭解三讓而後傳命之節正當賓至主人大門主人請事之時案聘禮賓至大門主人陳介而請事此云廟門者有廟字者悮也云三讓而後入廟門者案聘禮入廟門之時無三讓之文不備也蕙田案此一節釋賓致尊讓于主君君使士迎于竟大夫郊勞君親拜迎于大門之内而廟受北面拜貺拜君命之辱所以致敬也注貺賜也賓致命公當楣再拜拜聘君之恩恵辱命来聘者也是疏君使士逆于竟聘禮賓及竟君使士請事遂以入也大夫郊勞聘禮賓至于近郊君使卿朝服用束帛勞此大夫即卿也君親拜迎于大門之内而廟受案聘禮賓入門左公再拜是迎于大門之内又云及廟門公揖入納賓賓入門左賓升西檻西東面是廟受也北面拜貺者君于阼階上北面再拜拜聘君之貺聘禮云公當楣再拜是也蕙田案此一節釋主君致敬于聘客敬讓也者君子之所以相接也故諸侯相接以敬讓則不相侵陵注君子之相接賓讓而主人敬也蕙田案此節結上兩節卿為上擯大夫為承擯士為紹擯君親禮賓賓私面私覿致饔餼還圭璋賄贈饗食燕所以明賓客君臣之義也注設大禮則賓客之也或不親而使臣則為君臣也疏君親禮賓者謂行聘訖君親執醴以禮賓也私面謂私以已禮面見主國之卿大夫也私覿者私以已禮覿主國之君以其非公聘正禮故謂之私案聘禮私面在後此先云私面者記者便文無義例也致饔餼者謂行聘之日主君使卿致饔餼之禮于賓館還圭璋者賓將去時君使卿就賓館還其所聘之圭璋賄贈者還玉既畢以賄贈之饗食燕者主君設大禮以饗賓設食禮以食賓皆在朝也又設燕以燕之燕在寢也蕙田案以主君敬賓言之則曰賓客以聘客尊主君言之則曰君臣注以饗食之親不親分屬二者似拘故天子制諸侯比年小聘三年大聘相厲以禮使者聘而悮主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也注比年小聘所謂嵗相問也三年大聘所謂殷相聘也疏王制云諸侯之于天子比年一小聘三年一大聘五年一朝與此不同者此經諸侯相聘是周公制禮之正法王制所云謂文襄之法故不同也以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣注圭瑞也尊圭璋之類也用之還之皆為重禮禮必親之不可以己之有遥復之也財謂璧琮享幣也受之為輕財者財可遥復重賄反幣是也蕙田案此三節釋禮賓致饔餼還圭璋賄贈饗食燕之義主國待客出入三積餼客于舍五牢之具陳于内米三十車禾三十車芻薪倍禾皆陳于外乘禽日五雙羣介皆有餼牢壹食再饗燕與時賜無數所以厚重禮也注厚重禮厚此聘禮也古之用財者不能均如此然而用財如此其厚者言盡之于禮也盡之于禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉爾注不能均如此無則從其實也言盡之于禮欲令富者不得過也蕙田案此二節釋聘禮用財之厚聘射之禮至大禮也質明而始行事日㡬中而後禮成非强有力者弗能行也故强有力者將以行禮也注禮成禮畢也酒清人渇而不敢飲也肉乾人饑而不敢食也日莫人倦齊莊正齊而不敢解惰以成禮節以正君臣以親父子以和長幼此衆人之所難而君子行之故謂之有行有行之謂有義有義之謂勇敢故所貴于勇敢者貴其能以立義也所貴于立義者貴其有行也所貴于有行者貴其行禮也故所貴于勇敢者貴其敢行禮義也故勇敢强有力者天下無事則用之于禮義天下有事則用之于戰勝用之于戰勝則無敵用之于禮義則順治外無敵内順治此之謂盛徳故聖王之貴勇敢强有力如此也勇敢强有力而不用之于禮義戰勝而用之于爭鬭則謂之亂人刑罰行于國所誅者亂人也如此則民順治而國安也注勝克敵也或為陳朱子曰今案疏云此雖終結聘射然自酒清肴乾日莫成禮父子長㓜之語似據射鄉而言恐射鄊之義失次在此或相因而言歟蕙田案此二節通釋聘射之大義大戴禮聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而傳命君子於其所尊不敢質敬之至也一讓而後傳命三讓而後入門三揖而後至階三讓而後升所以致尊讓也君使士迎於境大夫郊勞君親拜迎大門之内而廟受北面拜貺拜君之辱致以致敬讓也致敬讓者君子之所以相接也故諸侯相接以禮讓則不相侵陵也卿為上擯大夫為承擯君親醴賓私覿致饔餼既還圭璋賄贈饗食燕所以明賓主君臣之義也故天子之制諸侯交嵗相問殷相聘相厲以禮使者聘而誤主君不親饗食所以耻厲之也諸侯相厲以禮則外不相侵内不相陵此天子所以養諸侯兵不用而諸侯自為正之具也以圭璋聘重禮也已聘而還圭璋輕財重禮之義也諸侯相厲以輕財重禮則作讓矣主國待客出入三積既客於舍五牢之具陳於内米三十車禾三十車芻薪倍禾皆陳於外乘禽日五雙羣介皆餼牢壹食再饗宴與時賜無數所以厚重禮也古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉右聘問名義周禮秋官司儀諸公之臣相為國客注謂相聘也則三積皆三辭拜受注受者受之于庭也侯伯之臣不致積諸疏此在道之禮于路館致之亦有束帛若公云登謂登堂此不云登故知受於庭也案聘禮五介張旜是侯伯之卿經不云積明不致積可知但不以束帛行禮致之豈于道全無積乎明有也王氏昭禹曰臣下其君二等故三積王氏應電曰大國之卿當小國之君故積與子男同皆有束帛致之三辭而後受無問禮殺于諸侯也及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賓使者如初之儀及退拜送注登聽命賓登堂也賓當為儐勞用束帛儐用束錦侯伯之臣受勞于庭三疏此亦近郊勞也旅擯不傳辭賓使各陳七介而已辭拜辱者賓從館内出于大門拜使者辱命来于外三讓者讓升堂登聽命者賓登堂聴使者傳主君之命也下拜登受者賓聴命訖下堂拜命訖登堂受幣也賓使者如初儀者謂使傳命訖禮畢出門賓以束錦儐使者如初行勞時之儀前賓受幣今使者受幣受幣雖異威儀則同敬主君使也王氏詳説案聘禮賓揖至門内勞者致命是不受勞于堂也侯伯之臣如此子男可知黄氏度曰諸公相為賓敵則交擯不敵則旅擯大夫雖敵亦旅擯不敢擬于君也蕙田案聘禮君使卿朝服用束帛勞此云大夫者大夫即卿也致館如初之儀注如郊勞也不儐耳侯伯之臣致館于庭不言致飧者君于聘大夫不致飱也聘禮曰飱不致賓不拜當疏案聘禮賓至使大夫帥至館卿致館此公之臣亦然聘禮致館無束帛賓亦無儐知此亦然也侯伯之臣致館于庭亦案聘禮知之聘禮致館之下即云宰夫設飱此致館下不云致飱是五等之臣皆無致飱也朱子曰案註云無儐未知其何以知之若謂上經致館不言束帛亦不言賓儐之事此亦當然則當併與無束帛言之不當只言無儐也且郊勞有幣此禮既如郊勞則亦有幣而鄭注司儀諸公致館亦云凡云致者皆有幣以致之此亦言致不得獨無幣也疏於聘禮亦云以上卿禮明有束帛致而於此乃遷就其説自相牴牾覽者詳之及將幣旅擯三辭拜逆客辟三揖每門止一相及廟惟君相入三讓客登拜客三辟授幣下出每事如初之儀注客辟逡巡不答拜也惟君相入客臣也相不入矣拜主君拜客至也客三辟三退負序也每事享及有言疏将幣亦謂圭璋也旅擯三辭者于主君大門外主君陳五擯客陳七介不傳辭也前郊勞三辭辭其以禮来于外此三辭辭其主君以大客禮當已拜逆者三辭訖主君遣上擯納賓賓入大門主君在大門内南面拜拜賓奉君命屈辱来見已客辟者奉君命来不敢當拜故辟也三揖者亦揖之使前三讓客登者案聘義三讓而後入廟門三揖而後至階此不言者文不其主君與客俱登據客而言故云客登也主君與客俱登訖主君于阼階上北面拜拜賓喜至此堂并拜受幣客三退負序不敢當君拜也授幣者授玉與主君也欽定義疏聘禮公迎賓于大門内賓入門左公再拜賓辟不答拜即此拜逆客辟也公揖入每門每曲揖此以三揖約之也及廟門公揖入立于中庭賓執圭入門左三揖至于階三讓即此三讓也公升二等賓升西階西東面致命公當楣再拜賓三退負序即此客登拜客三辟也公受玉于中堂與東楹之間賓降出即此授幣下出也不敢拜送幣者奉君命以將事不敢當君也故私面私獻皆再拜稽首及禮私面私獻皆再拜稽首君答拜注禮以醴禮客私面私覿也既覿則或有私獻者鄭司農説私面以春秋傳曰楚公子棄疾見鄭伯以其乘馬私面疏此三者皆於聘日行之故并言之聘禮禮客用醴齊異于君鬱鬯也案聘禮不見有私獻又於君謂之覿于卿謂之面覿面别此云私面私覿為一者以彼文兩見則私覿據君私面據卿此文不見有私覿直言私面豈不見君直見臣也明此私面主于君故以私面為私覿也彼無私獻非常故彼記云既覿賓若私獻奉獻将命也呂氏曰聘禮賓奉束錦乘馬請覿所謂私覿也賓朝服問卿既致命出賓面如覿幣所謂私面也葢列而言之則見君曰覿見卿曰面離而言之則面即覿亦可為見君如春秋傳楚公子棄疾私面于君是也出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟注中門之外即大門之内也問君曰君不恙乎對曰使臣之米寡君命臣于庭問大夫曰二三子不恙乎對曰寡君命使臣于庭二三子皆在勞客曰道路悠逺客甚勞勞介則曰二三子甚勞問君客再拜對者為敬慎也疏賓来主為以君命行聘享是以先行聘享訖乃始行私相慰問之事問君曰已下未知所出何文或云是孔子聘問之辭亦未得其實也王氏應電曰客辟而對而對二字衍文蕙田案聘禮公問君賓對公再拜注云公拜賓亦辟經無君拜而客再對之文王氏以而對二字為衍文者得之致饔餼如勞之禮饗食還圭如將幣之儀注饗食亦謂君不親而使大夫以幣致之將疏饗食與還圭共文故知君不親使大夫致之也如幣者旅擯主人皮弁賓皮弁襲與將幣同自餘則别欽定義疏饗食還圭葢有親不親兩法公食大夫禮公迎賓拜至此與將幣同也饗禮亦然可知意還圭亦有公親之者但聘禮未備載耳君親還圭客亦當三辭拜辱揖讓而升堂與使卿還圭者不同矣然則司儀與聘禮一親一不親固可互備也卿還圭客主兩不拜若大夫致饗食恐無竟不拜之禮其間儀節要不盡同此經云如將幣之儀亦大槩之辭而所如者當不止於疏所云也君館客客辟介受命遂送客從拜辱于朝注君館客者客将去就省之盡殷勤也遂送君拜以送客蔡氏徳晉曰客不敢當君故辟而使介受命明日客拜禮賜遂行如入之積注禮賜謂乘禽君之加恵也如入之積則三積從来至去也疏聘禮賓三拜乘禽于朝知禮賜是乘禽入與出各三積故得以後如前欽定義疏乘禽日日受賜故于將去總拜之諸公相為賓拜饔饗食之大禮而不拜其小禮卿則饔饗食皆旋拜之已勤矣而又拜其小此尊卑疏宻之差也凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之注爵卿也大夫也士也李氏嘉㑹曰以爵相為客足矣子男之卿僅可當公國之士故必以國之爵言也鄭氏鍔曰禮之各以其爵命其儀與辭則與公之臣同右行禮之節周禮春官典瑞瑑圭璋璧琮繅皆二采一就以覜聘考工記玉人瑑圭璋八寸璧琮八寸以覜聘蕙田案注疏詳見諸侯聘于天子門秋官司儀凡諸侯之交各稱其邦而為之幣以其幣為之禮注幣享幣也于大國則豐小國則殺主國禮之如其豐殺謂賄用束紡禮用玉帛乘皮及贈之屬右圭幣禮記曲禮諸侯使人使于諸侯使者自稱曰寡君之老注繫于君以為尊也此謂諸侯之卿上大夫自疏玉藻云上大夫曰下臣擯者曰寡君之老下大夫名擯者曰寡大夫此云自稱曰寡君之老則上大夫擯者傳辭及自稱于他國亦曰寡君之老稱于已君則玉藻云下臣某玉藻上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適注擯者之辭主謂見于他國君下大夫自名于他國君曰外臣某設疏謂上大夫出使他國在于賓館主國致禮上大夫擯禮待之此擯者稱大夫為寡君之老雖以擯為文其實謂介接主君之時辭亦當然擯介通也大夫私事使私人擯則稱名注私事使謂以君命私行非聘也若魯成公時晉侯使韓穿来言汶陽之田歸之于齊之類大疏私人擯謂以己之屬臣為擯相雖是上大大及下夫擯者則皆稱名以非公事正聘故降而稱名公士擯則曰寡大夫寡君之老大夫有所往必與公士為賓也注謂聘也大聘使上大夫小聘使下大夫公士為賓謂作介也往之也疏正聘之時用公家之士為擯不用私人也小聘使下大夫擯者則稱曰寡大夫大聘使上大夫擯者則稱曰寡君之老右聘使稱謂國語周語周之秩官有之曰敵國賓至闗尹以告注敵位敵也闗尹司闗掌四方賓客叩闗則為之告聘禮曰及境謁闗人闗人問從者㡬人遂以入境行理以節逆之注理吏也逆迎也執瑞節為信而迎之也行理小行人候人為導注導賓至于朝出送之境卿出郊勞注聘禮曰賓至于近郊君使卿朝服用束帛勞門尹除門注門尹司門也除門掃除門庭也宗祝執祀注宗宗伯祝太祝也執祀賓將有事于廟則宗祝執祭祀之禮司里授館注司里授客所當館次于卿也聘禮卿授館司徒具徒注具徒役修道路之委積司空視塗注視險易也司冦詰姦注禁詰姦盜虞人入材注虞人掌山澤之官祭祀賓客各供其材甸人積薪注甸人掌薪蒸之官也火師監燎注火師司火燎庭燎也水師監濯注水師監水掌滌濯之事者膳宰致飱注孰食曰飱廩人獻餼注生曰餼禾米也司馬陳芻注司馬掌帥圉人飬馬故陳芻圉人職屬司馬工人展車注展省客車補傷敗也百官各以物至賓入如歸是故小大莫不懐愛注小大謂賓介也其貴國之賓至則以班加一等益䖍注貴國大國也班次也至于王使則皆官正涖事注正長也上卿監之右主國待賓禮記曲禮凡執主器執輕如不克注重慎之也主君也克勝也執主器操幣圭璧則尚左手行不舉足車輪曵踵注重慎也尚左手尊左也車輪謂行不絶也拽疏尚上也右手在下左手在上左尊故云尚左手曵也踵脚後也行時不得舉足但起前拽後使踵如車輪曳地而行立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委注君臣俛仰之節倚謂附于身小俛則垂大俛則委于地疏此明授受時禮也吕氏曰凡授受者尊卑皆磬折故垂佩然臣當加恭于君故有佩倚佩垂佩委之差也論語執圭鞠躬如也如不勝注包曰為君使聘問鄰國執持君之圭鞠躬者敬慎之至上如揖下如授勃如戰色足蹜蹜如有循注鄭曰上如揖授王宜敬下如授不敢㤀禮戰色敬也足蹜蹜如有循舉前曵踵行享禮有容色注鄭曰享獻也聘禮既聘而享用圭璧有庭實私覿愉愉如也注鄭曰覿見也既享乃以私禮見愉愉顔色和疏此一節記為君使聘問鄰國之禮容也上謂授玉時宜敬故如揖也下謂既授玉而降雖不執玉猶如授時不敢㤀禮也執圭者聘禮云賓襲執圭致命公側襲受玉于中堂與東楹之間是也大宗伯云公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧此謂諸侯所執圭璧皆朝于王及相朝所用也其公侯伯朝后皆用璋以聘禮聘君用圭聘夫人用璋知于天子及后亦然也其子男既朝王用璧朝后宜用琮以璧琮相對故也其諸侯之臣聘天子及聘諸侯其聘玉及享玉降其君瑞一等故玉人云瑑圭璋八寸璧琮八寸以覜聘是也朱子集注圭諸侯命圭聘問鄰國則使大夫執以通信如不勝執主器執輕如不克敬謹之至也上如揖下如授謂執圭平衡手與心齊髙不過揖卑不過授也戰色戰而色懼也蹜蹜舉足促狹也如有循記所謂舉前曵踵言行不離地如縁物也有容色和也愉愉則又和矣此一節記孔子為君聘于鄰國之禮也晁氏曰孔子定公九年仕魯至十三年適齊其間絶無朝聘往来之事疑使擯執圭兩條但孔子甞言其禮當如此爾蕙田案周禮玉人所稱命圭即桓信躬之等惟諸侯朝王及自相朝執之若大夫聘問執瑑圭璋璧琮降于命圭一等非命圭也邢叔明疏極分明朱子以執圭之圭為命圭偶不檢爾右聘使之容禮記玉藻賓入不中門不履閾注辟尊者所從也此謂聘客也閾門限公事自闑西注聘享也私事自闑東注覿面也短疏闑謂門之中央所豎木又謂之門橛棖謂門兩旁長水所謂門楔也朱子曰案此云門只有一闑唯上經賈疏獨云門有二闑故中門之處及君與賓介行之次第皆有不同未知孰是當更考之蕙田案古人門制兩旁有棖中間有闑棖闑之間為中門棖者門之兩旁長木闑則兩扉相合處有一木常設而不動者門以向堂為正故闑東為右闑西為左東為主位西為賓位闑東主所出入闑西賓所出入曲禮主人入門而右就東堦賓入門而左就西堦是也臣子在本國則出入皆由闑東曲禮謂士大夫出入君門由闑右燕禮卿大夫皆入門右是也若聘於他國則玉藻謂公事自闑西私事自闑東公事聘享用賓禮私事覿面從臣禮也東西兩扉各有中君出入由東扉之中玉藻閏月則闔門左扉立於其中臣子不敢當尊鄉黨立不中門曲禮為人子者立不中門此東扉之中也兩君相見則賓由西扉之中臣為賓則否玉藻賓入不中門此西扉之中也饒雙峰謂君出入則皆由左出則以東扉為左入則以西扉為左士大夫出入君門則皆由右出以闑西為右入以闑東為右郝仲輿謂闑東西自定左右隨身出入君自内南面東出由闑左入由右亦闑左也臣自外北面東入為闑右出自西亦闑右也入自闑西則疑於為賓出由闑東則疑於為主故不敢也今案二説皆誤曲禮言闑右燕禮言門右據門闑為左右則左右皆有定所未聞隨身出入為左右也賓主有闑東闑西之分君臣但有中門不中門之分未聞君左臣右之説也君臣常時出入皆在闑東未聞為君者東出西入為臣者東入西出也曰入由闑西則疑於為賓是矣曰出由闑東則疑於為主夫不敢疑於主反儼然疑於賓矣入不敢為賓而出乃敢為賓有是理乎總由不知東西但别賓主而不别君臣左右有定所而不隨身之出入故為此交互紛錯之説耳至人臣出入由闑右既不敢當中即當稍近闑而行陸稼書謂由闑右即拂闑之義甚允玉藻大夫中棖與闑之間士介拂棖盖大夫士與上介雁行於後不敢相沿乃兩君相見之儀非常時出入之儀也右賓出入公門禮記曲禮大夫士見于國君君若勞之則還辟再拜稽首注謂見君既拜矣而後見勞也聘禮曰君勞使者及介君皆答拜疏聘禮聘享及私覿訖公勞賓賓再拜稽首公答拜公勞介介再拜稽首公答拜是也聘禮無還辟之文文不備也君若迎拜則還辟不敢答拜注嫌與君抗賓主之禮迎拜謂君迎而先拜之聘禮曰大夫入門再拜君拜其辱疏謂聘賓初至主國大門外主君迎而拜之賓辟不答拜是也大夫見於國君國君拜其辱注自外来而拜拜見也自内来而拜拜辱也君于士不答拜也非其臣則答拜之注不臣人之臣賤疏君于已士以其故不答拜然士介聘還亦旅答拜者敬其奉使而還士相見禮答拜者以其初為士敬之故也他國之士非已尊所加故答之右賓介見主君禮器大夫聘禮以脯醢注大夫出使行聘禮畢主國禮之酌以酒而又有脯醢味稍多也周禮秋官掌客凡諸侯之卿大夫士為國客則如其介之禮以待之注言其特来聘問待之禮如其為介時也然則聘禮凡所以禮賓是亦禮介蕙田案掌客掌牢禮餼獻飲食之等此云如其介之禮者即上諸公相為賓之禮所云凡介皆有飱饔餼以其爵等為之牢禮之陳數惟上介有禽獻鄭氏謂爵卿則飱二牢饔餼五牢大夫則飱太牢饔餼三牢士則飱少牢饔餼太牢是也右禮賓及牢禮之等掌客凡禮賓客國新殺禮凶荒殺禮札䘮殺禮禍烖殺禮在野在外殺禮注皆為國省用愛費也國新新建國也凶荒無年也禍烖新有兵寇水火也忽疏在野在外殺禮者以其野外遽禮物不可卒備故亦殺之凡賓客死致禮以䘮用注死則主人為之具而殯矣䘮用者饋奠之物疏若諸侯出行則以三年之戒以椑從死時除棺之外主人皆備之若從者死棺物皆共之殯者在館權殯還日以柩行饋奠之物者小斂特豚一鼎大斂時特豚三鼎之類是也賓客有䘮唯芻稍之受注不受饗食饗食加也䘮謂父母死也客則又有君焉芻給牛馬稍人禀也其正禮飱饔餼主人致之則受疏䘮謂父母死也者據正賓而言若諸侯正應母死而有父者或始封之君舊為卿大夫容有父或父有廢疾不立已受位于祖亦云有父也云客則又有君焉者謂介已下非直有父母又有君䘮以其俱三年遭主國之䘮不受饗食受牲禮注牲亦當為腥聲之悮也有䘮不忍煎亨正禮飱饔當孰者腥致之也禮記曽子問曽子問曰為君使而卒于舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復也注復始死招魂孔子曰善乎問之也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也注公館若今縣官舍也公所為君所命使舍己者雜記上大夫士死于道則升其乘車之左轂以其綏復如于館死則其復如于家注綏亦緌也大夫復于家以元冕士以爵弁服為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫之家也注公所為君所作離宫别館也春秋哀公十五年左氏傳楚子西子期伐吴及桐汭陳侯使公孫貞子弔焉及良而卒將以尸入注宣城廣徳縣西南有桐水出白石山西北入丹陽湖弔為楚所伐良吴地聘禮若賓死未將命則既斂于棺造于朝介將命疏尸者未葬之通稱案聘禮賓入竟而死遂也主人為之具而殯介攝其事此謂入竟未至國都賓死其禮如此又云若賓死未将命則既歛于棺造于朝介將命此謂賓已至朝主人將欲行禮賓請間之後賓死以柩造朝以尸將事今貞子卒于竟内依禮惟可以尸而入殯于賓館不合以柩造朝以尸將事今上介芉尹云以尸将事者以吴人不納故引禮深以辨之杜以傳有以尸將事故引聘禮歛于棺造于朝介將命以釋之其實貞子當殯于館不得以尸將事也吴子使太宰嚭勞且辭曰以水潦之不時無乃廪然隕大夫之尸以重寡君之憂寡君敢辭上介芉尹盖對曰寡君聞楚為不道荐伐吴國注廩然傾動貌盖陳大夫貞子上介荐重也朱子曰案上介二字屬下句釋文云屬上句悮也滅厥人民寡君使葢備使弔君之下吏無祿使人逢天之慼大命隕隊絶世于良廢日共積一日遷次注備猶副也絶世猶言棄世廢行道之日以共具殯歛所積聚之用一日遷次言不敢留君命今君命逆使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如事生禮也于是乎有朝聘而終以尸將事之禮注朝聘道死以尸將事又有朝聘而遭䘮之禮注遭所聘之䘮若不以尸將命是遭䘮而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也其何以為諸侯主注謂主盟也先民有言曰無穢虐士備使奉尸將命苟我寡君之命逹于君所雖隕子深淵則天命也非君與渉人之過也吴人内之注虐士死者傳言芋尹盖知禮朱子曰今案疏曰案禮賓入竟而死則以尸入殯于館而介攝其命賓至已朝主人將欲行禮賓請間之後而賓死則以柩造朝以尸將事今公孫貞子卒于竟内依禮唯可以尸而入殯于賓館芋尹乃欲以柩造朝以尸將事而吴人納之杜注又以為知禮皆失之矣邵寳日格子案禮也吴人未之知也陳人亦未之知也禮賓終有于入竟者有于未將命者于入竟者主人為之殯介攝其命于未將命者以尸將事蕙田案公孫貞子卒于吴竟於禮當以尸入國殯於賓館而後介攝其事傳所謂將以尸入者入國而殯于公館非入朝而以尸將事也吴人辭之蓋欲其殯于竟上不令其尸入國故芋尹盖有君命委于草莽之對而引朝聘以尸將事及遭䘮之禮以辨之以尸將事聘賓之變禮也遭䘮之禮主國之變禮也二者對舉其非欲以尸將事明矣杜氏誤㑹文義乃有朝聘以尸將事之說孔疏辨之極明朱子疑芋尹欲以柩造朝而吴人納之然傳云納之者納之使入國也吴人尚不欲其尸入國况肯令其造于朝乎盖亦承杜氏之誤而不察也右聘變禮春秋隱公七年夏齊侯使其弟年来聘范注聘例時凡聘皆使卿執玉帛以相存問左氏傳齊侯使夷仲年来聘結艾之盟也公羊傳其稱弟何母弟稱弟母兄稱兄榖梁傳諸侯之尊兄弟不得以屬通其弟云者以其来接於我舉其貴者也桓公三年冬齊侯使其弟年来聘左氏傳致夫人也莊公二十有三年春祭叔来聘范注祭叔天子寰内諸侯叔名榖梁傳其不言使何也天子之内臣也不正其外交故不與使也鄭氏康成曰諸稱使者是奉王命其人無自来之意今祭叔不一心于王而欲外交不得王命来故去使以見之夏荆人来聘杜注不書荆子使某来聘者盖楚之始通未成其禮公羊傳荆何以稱人始能聘也穀梁傳善累而後進之其曰人何也舉道不待再注明聘問之禮朝宗之道非夷狄之所能故一舉而進之二十有五年春陳侯使女叔来聘杜注女叔陳卿女氏叔字左氏傳始結陳好也嘉之故不名穀梁傳其不名何也天子之命大夫也僖公三十有三年春齊侯使國歸父来聘左氏傳齊國荘子来聘自郊勞至于贈賄禮成而加之以敏注迎来曰郊勞送去曰贈賄文公四年秋衛侯使寗俞来聘左氏傳衛寗武子来聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣来繼舊好君辱貺之其敢干大禮以自取戾九年冬楚子使椒来聘椒穀梁作荻左氏傳楚子越椒来聘執幣傲叔仲恵伯曰是必滅若敖氏之宗傲其先君神弗福也公羊傳椒者何楚大夫也楚無大夫此何以書始有大夫也始有大夫則何以不氏許夷狄者不一而足穀梁傳楚無大夫其曰荻何也以其来我褒之也十有二年秋秦伯使術来聘術公羊作遂左氏傳秦伯使西乞術来聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉注大器圭璋也不欲與秦為好故辭玉對曰不腆敝器不足辭也主人三辭賓曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節注節信也出聘必告廟故稱先君之器要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之注賄贈送也公羊傳遂者何秦大夫也宣公八年冬齊侯使國佐来聘左氏傳國武子来報聘成公三年冬十有一月晉侯使荀庚来聘衛侯使孫良夫来聘四年春宋公使華元來聘左氏傳通嗣君也注宋共公即位八年春宋公使華元来聘左氏傳聘共姬也冬十月晉侯使士燮来聘左氏傳言伐郯也十有一年春王三月晉侯使郤犨来聘左氏傳郤犨来聘且涖盟十有八牟晉侯使士匄来聘左氏傳晉范宣子来聘且拜朝也注拜謝公朝君子謂晉於是乎有禮襄公元年冬衛侯使公孫剽来聘晉侯使荀罃来聘左氏傳衛子叔晉知武子来聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也五年夏鄭伯使公子發来聘左氏傳鄭子國来聘通嗣君也注鄭僖公初即位七年冬十月衛侯使孫林父来聘左氏傳衛孫文子来聘且拜武子之言而尋孫桓子之盟八年冬晉侯使士匄来聘左氏傳晉范宣子来聘且拜公之辱告將用師于鄭公享之十有二年夏晉侯使士魴来聘左氏傳晉士魴来聘且拜師注謝前年伐鄭師十有五年春宋公使向戌来聘左氏傳宋向戌来聘且尋盟二十有六年夏晉侯使荀吴来聘左氏傳中行穆子来聘召公也注召公為澶淵㑹二十有七年春齊侯使慶封来聘杜注景公即位通嗣君也二十有九年夏晉侯使士鞅来聘左氏傳范獻子来聘拜城杞也吴子使札来聘左氏傳吴公子札来聘通嗣君也公羊傳吴無君無大夫此何以有君有大夫賢季子也穀梁傳吴其稱子何也善使延陵季子故進之也身賢賢也使賢亦賢也延陵季子之賢尊君也其名成尊于上也三十年春王正月楚子使薳罷来聘左氏傳通嗣君也昭公二年春晉侯使韓起来聘左氏傳晉侯使韓宣子来聘注公即位故且告為政而来見禮也十有二年夏宋公使華定来聘左氏傳通嗣君也二十有一年夏晉侯使士鞅来聘杜注晉頃公即位通嗣君蕙田案以上諸侯聘魯又案春秋列國聘魯者九國齊来聘五晉来聘十一宋来聘四衛来聘四楚来聘三稱人者一陳鄭秦吴来聘各四王畿諸侯来聘者一祭叔是也莊公二十有五年冬公子友如陳杜注報女叔之聘諸魯出朝聘皆書如不果彼國必成其禮故不稱朝聘内何注如陳者聘也内朝聘言如者尊也三十有二年冬公子慶父如齊杜注慶父既殺子般季友出奔國人不與故懼而適齊欲以求援時無君假赴告之禮而行穀梁傳此奔也其曰如何也諱莫如深深則隱苟有所見莫如深也蕙田案諸家皆以為出奔以經無明文姑存于此僖公五年夏公孫兹如牟左氏傳公孫兹如牟娶焉七年秋公子友如齊杜注罷盟而聘謝不敏也十有三年冬公子友如齊二十有八年秋公子遂如齊杜注聘也三十年冬公子遂如京師遂如晉左氏傳東門襄仲將聘于周遂初聘于晉三十有一年春公子遂如晉左氏傳拜曹田也文公元年冬公孫敖如齊左氏傳穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也五年夏公孫敖如晉六年夏季孫行父如陳左氏傳季文子聘于陳且娶焉秋季孫行父如晉左氏傳季文子將聘于晉使求遭䘮之禮以行注聞晉侯疾故十有一年秋公子遂如宋左氏傳襄仲聘于宋十有五年春季孫行父如晉左氏傳為單伯與子叔姬故也秋季孫行父如晉十有七年冬公子遂如齊左氏傳襄仲如齊拜穀之盟十有八年秋公子遂叔孫得臣如齊杜注書二卿以兩事行非相介左氏傳襄仲莊叔如齊恵公立故且拜葬也注襄仲賀恵公立莊叔謝齊来㑹葬穀梁傳使舉上客而不稱介不正其同倫而相介故列而數之也注上客聘主也禮大夫為卿介遂與得臣俱為卿是以同倫為副使故兩言之明無差降冬季孫行父如齊宣公元年夏季孫行父如齊左氏傳季文子如齊納賂以請㑹公子遂如齊左氏傳東門襄仲如齊拜成八年夏六月公子遂如齊至黄乃復公羊傳其言至黄乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞䘮徐行而不反秋季孫行父如齊左氏傳季文子初聘于齊注齊侯初即位冬公孫歸父如齊左氏傳子家如齊伐邾故也十有八年秋七月公孫歸父如晉成公五年春王正月仲孫蔑如宋左氏傳報華元也注前年宋華元来聘六年夏六月公孫嬰齊如晉冬季孫行父如晉左氏傳賀遷也八年春公孫嬰齊如莒左氏傳聲伯如莒逆也注自為逆婦而書者因聘而逆十有一年夏季孫行父如晉左氏傳季文子如晉報聘且涖盟也秋叔孫僑如如齊左氏傳宣伯聘于齊以修前好襄公二年秋七月叔孫豹如宋左氏傳穆叔聘于宋通嗣君也四年夏叔孫豹如晉左氏傳穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問于善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜六年冬叔孫豹如邾左氏傳穆叔如邾聘且修平季孫宿如晉左氏傳晉人以鄫故来討曰何故亡鄫季武子如晉見且聽命七年秋季孫宿如衛左氏傳季武子如衛報子叔之聘且辭緩報非貳也九年夏季孫宿如晉左氏傳季武子如晉報宣子之聘也十有六年冬叔孫豹如晉左氏傳穆叔如晉聘且言齊故十有九年春季孫宿如晉左氏傳季武子如晉拜師二十年秋叔老如齊左氏傳齊子初聘于齊禮也冬十月季孫宿如宋左氏傳季武子如宋報向戌之聘也二十有四年春叔孫豹如晉二十有八年秋八月仲孫羯如晉左氏傳孟孝伯如晉告將為宋之盟故如楚也二十有九年冬仲孫羯如晉左氏傳孟孝伯如晉報范叔也昭公二年夏叔弓如晉左氏傳叔弓聘于晉報宣子也晉侯使郊勞注聘禮賓至近郊君使卿勞之辭曰寡君使弓来繼舊好固曰女無敢為賓徹命于執事敝邑宏矣敢辱郊使請辭致館辭曰寡君命下臣来繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉冬季孫宿如晉左氏傳季孫宿遂致服焉注致少姜之襚服穀梁傳公如晉而不得入季孫宿如晉而得入惡季孫宿也六年夏季孫宿如晉左氏傳季孫宿如晉拜莒田也晉侯享之有加籩注籩豆之數多于常禮武子退使行人告曰小國之事大國也苟免于討不敢求貺得貺不過三獻注周禮大夫三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨注宴好之貨冬叔弓如楚左氏傳叔弓如楚聘且弔敗也八年夏四月叔弓如晉左氏傳賀虒祁也九年夏仲孫貜如齊左氏傳孟僖子如齊殷聘禮也注自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好故曰禮二十有三年春王正月叔孫婼如晉二十有五年春叔孫婼如宋左氏傳叔孫婼聘于宋定公六年夏季孫斯仲孫何忌如晉左氏傳季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之十年冬叔孫州仇如齊左氏傳武叔聘于齊蕙田案以上魯聘列國又案春秋魯所聘九國如齊者十七如晉者二十四如宋者五如陳者三如衛如邾如莒如牟如楚者各一他如涖盟納幣逆女致女㑹葬諸使非因聘而出皆不載襄五年叔孫豹鄫世子巫如晉亦非為聘故亦不載右春秋交聘五禮通考卷二百三十一
