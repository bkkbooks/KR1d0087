body:
  text: 五禮通考卷一百六十七刑部尚書秦蕙田撰嘉禮四十鄉飲酒禮蕙田案鄉飲酒之禮見于經𫝊者有四鄉大夫三年大比獻賢能於王以禮禮賓之一也黨正國索鬼神而祭祀則以禮屬民飲酒以正齒位二也州長春秋習射于序先行鄉飲酒禮三也鄉大夫士飲其國中賢者四也其用之州黨而亦謂之鄉者先儒以為州黨鄉之屬也或鄉大夫入而觀禮或鄉大夫居此黨内故亦以名之也儀禮所載乃鄉大夫禮賓之禮其正齒位之法見於周官者一命齒於鄉里再命齒於父族三命而不齒見于禮記者六十者坐五十者立侍又有三豆四豆五豆六豆之等而儀禮佚其篇其詳不可得聞焉州長習射之儀先飲酒而後射儀禮鄉射篇可以互參惟飲國中賢者之禮經無正文大約與鄉大夫賓賢之典畧相類耳漢制郡國行鄉飲酒禮盖用正齒位之説魏晉以下間或行之唐兼采二説賓興賢能則以刺史或上佐為主其制皆倣于古而小損之有主賓介而無僎樂則笙歌間合各一作而不備所謂鹿鳴宴也正齒位則行於冬季主人以縣令為之復降殺其禮宋淳化中詔有司講求鄉飲酒禮政和中有司奏參酌古制於州軍貢士之月以禮飲酒用知州軍事或本州佐官為主上舍生當貢者與州之羣老為衆賓畧如辟雍宴貢士之儀紹興十三年禮部奏修定儀制頒下郡國盖本用賓賢之説而已仕未仕者以齒序位於兩廊則亦兼取黨正正齒位之文二者合為一禮矣明初定鄉飲禮儀命有司與學官率士大夫之老者於儒學行之又於是日令一人升讀律令盖取正齒位之義其鄉試舉人中式者亦有鹿鳴宴然不名之為鄉飲酒也周禮云以陽禮教讓則民不争先儒以鄉飲鄉射當之禮記亦云鄉飲酒之禮廢則長幼之序失而争鬭之獄繁然則先王制此禮或主於興賢或主於尚齒雖所重不同而所以勸民行厚民俗之意則一也今採經𫝊及厯代史志所述具列於篇云儀禮鄉飲酒禮鄭目録云諸侯之鄉大夫三年大比獻賢者能者於其君以禮賓之與之飲酒於五禮屬嘉禮義疏凡鄉飲酒之禮其名有四此賓賢能一也鄉飲酒云六十者坐五十者立侍是黨正飲酒亦謂之鄉飲酒二也鄉射州長春秋習射于州序先行鄉飲酒三也鄉飲酒義又有鄉大夫士飲國中賢者四也王制云習射尚功習鄉尚齒是州長黨正飲酒法孔氏穎達曰鄭云鄉飲酒有四事一則三年賓賢能二則鄉大夫飲國中賢者三則州長習射飲酒四則黨正蜡祭飲酒總而言之皆謂鄉飲酒鄉則三年一飲州則一年再飲黨則一年一飲所以然者天子六鄉諸侯三鄉各有鄉大夫而鄉有鄉學取致仕在鄉之中大夫為父師致仕之士為少師在于學中名為鄉先生教于鄉中之人謂鄉學每年入學三年業成必升于君若天子之鄉則升學士于天子若諸侯之鄉則升學士于諸侯凡升之必用正月將升用之先為飲酒之禮鄉大夫與鄉先生謀事擇學士最賢使為賓次者為介又次者為衆賓皆鄉大夫為主人與之飲酒而後升之故周禮鄉大夫職云三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之若州一年再飲者是春秋習射因而飲之以州長為主人也若黨一年一飲者是歳十二月國于大蜡祭而黨中于學飲酒子貢觀蜡是也亦黨正為主人張氏爾岐曰鄉飲有四此篇所載賓賢之禮常以正月行之將射而飲于春秋行之黨正正齒位于季冬蜡祭鄉大夫飲國中賢者則無常時鄉飲酒之禮主人就先生而謀賓介注主人謂諸侯之鄉大夫也先生鄉中致仕者賓介處士賢者周禮大司徒之職以鄉三物教萬民而賓興之鄉大夫以正月之吉受法于司徒退而頒之于其鄉吏使各以教其所治以考其徳行察其道藝及三年大比而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明獻賢能之書于王是禮乃三年正月而一行也諸侯之鄉大夫貢士于其君盖如此云古者年七十而致仕老於鄉里大夫名曰父師士名曰少師而教學焉恒知鄉人之賢者是以大夫就而謀之賢者為賓其次為介又其次為衆賓而與之飲酒是亦將獻之以禮禮賓之也今郡國十月行此飲酒禮以黨正每歳邦索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之説然此篇無正齒位之事焉凡鄉黨飲酒必於民聚之時欲其見化知尚賢尊長也孟子曰天下有達尊三爵也徳也齒也疏引周禮是天子鄉大夫法諸侯鄉大夫無文以此約之若據鄉貢一人其介與衆賓不貢之矣但立介與衆賓輔賓行禮待後年還以貢之耳楊氏復曰此篇主于賓賢雖無正齒位法然自賓介而下衆賓有長立于堂下者有東上北上樂正與立者皆薦以齒旅酬少長以齒是亦正齒位法但無黨正三豆四豆五豆六豆之等差耳蕙田案以上謀賓介主人戒賓賓拜辱主人答拜乃請賓賓禮辭許主人再拜賓答拜主人退賓拜辱注戒告也拜辱拜其屈辱至已門也不固辭者素所有志退猶去也去又拜者以送謝之賓疏知賓出門者見冠禮主人宿賓賓出門左鄉射戒亦出門故知此亦出門也冠禮主人戒同寮同寮尊又使之加冠於子尊重之故主人先拜此則鄉大夫尊賓卑又將貢已宜尊敬主人故賓先拜辱朱子曰學成行修進仕于朝上以致君下以澤民此士之素所有志也盛氏世佐曰禮先生異爵者請見先見之不敢拜迎而此云拜辱者當賔興大典主人好善忘勢而賓亦以道自重故以處士而與大夫抗禮不為驕也士冠禮鄉射禮于主人戒賓皆云禮辭許不聞有固辭者一辭而許為賓之道固然此亦如其常而已以為將貢已而固辭君子惡其矯也介亦如之注如戒賓也知疏衆賓亦當遣人戒速使但畧而不言蕙田案以上戒賓介乃席賓主人介衆賓之席皆不屬焉注席敷席也夙興徃戒歸而敷席賓席牖間南面主人席阼階上西面介席西階上東面席衆賓於賓席之西不屬者不相續也皆獨坐明其徳各特也賓疏鄉射云席賓南面東上衆賓之席繼而西此衆之席亦當然雖不屬猶統賓為位同南面也欽定義疏鄉飲酒義於賓席云坐於西北又曰南鄉謂于室户之西而南鄉也於介席曰坐于西南又曰東鄉謂于西階之上而東鄉也於主人席曰坐于東南又曰東方謂于東階之上而西鄉也於遵者席曰坐于東北謂于賓東而南鄉也若三賓之席則自賓席以西至于西序是其位也凡位室户之西為最尊次則西階之上為客位若賓東之位則燕禮所以席卿者也而飲射之遵者位于是賓西之位則燕禮所以席大夫者也而飲射之三賓位于是此堂上之席次也蕙田案衆賓席于賓西南面者賓長三人即鄉飲酒義所謂三賓也不屬者謂衆賓之席不與賓相屬所以尊賓也鄉射主習民以禮樂故衆賓之席繼賓而西不相别異若鄉飲主於興賢賓則賢能之中尤異者故特貢之衆賓既不與於貢安得不與賓相别注謂衆賓皆獨坐似未得經㫖尊兩壺于房户間斯禁有𤣥酒在西設篚于禁南東肆加二勺于兩壺注斯禁禁切地無足者𤣥酒在西上也肆陳也疏東肆以頭首為記從西向東上頭在西也吳氏澄曰房户間者東房之西室户之東在賓主之間雖主人之設而賓亦以之酢主人也斯禁一名棜長四尺廣二尺四寸深五寸無足大夫用棜士用禁北面設尊𤣥酒在左左酒尊之西也張氏爾岐曰兩壺酒與𤣥酒各一也𤣥酒在酒之西壺各有勺以備挹酌設洗于阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆注榮屋翼下疏堂深謂從堂亷北至房室之壁堂洗北去堂逺近深淺取於堂上深淺若堂深二丈洗亦去堂二丈以此為度楊氏復曰上篚在禁南東肆下篚在洗西南肆上篚爵三觶一獻賓獻遵獻工皆異爵三也主人取觶降洗以酬賓一也下篚觶四一人舉觶為旅酬始一也司正舉觶二也二人舉觶為無算爵始四也張氏爾岐曰此復設篚者上篚所貯三爵每行畢即奠于下篚且貯餘觶也蕙田案以上設席及器羮定主人速賓賓拜辱主人答拜還賓拜辱介亦如之賓及衆賓皆從之注肉謂之羮定猶熟也速召也還猶退從猶隨也言及衆賓介亦在其中矣敖氏繼公曰速賓之儀與戒賓同賓不遂從之者為主人當復速介衆賓亦速惟言賓介者以主人親為之蕙田案以上速賓介主人一相迎于門外再拜賓賓答拜拜介介答拜注相主人之吏擯賛𫝊命者揖衆賓注差益卑也拜介揖衆賓皆西南面疏賓介衆賓立位在門外以北為上主人與賓正東西相當則介與衆賓差在南東面主人正西面拜賓則側身向西南拜介揖衆賓矣主人揖先入注揖揖賓也先入門而西面霤疏庠學惟有一門主人導賓先入至内西面待賓賓厭介入門左介厭衆賓入衆賓皆入門左北上注皆入門西東面賓之屬相厭變於主人也推手曰揖引手曰厭今文皆作揖疏賓既北上主人西面相向揖訖乃相背各向堂塗介與衆賓亦隨賓至西階下也厭者以手向身引之主人與賓三揖至于階三讓主人升賓升主人阼階上當楣北面再拜賓西階上當楣北面答拜注三揖者將進揖當陳揖當碑揖楣前梁也復拜拜賓至此堂尊之疏楣前梁對後梁為室户上蕙田案以上迎賓主人坐取爵于篚降洗注將獻賓也賓降注從主人也主人坐奠爵于階前辭注重以已事煩賓也事同曰讓事異曰辭賓對注對答也賓主之辭未聞主人坐取爵興適洗南面坐奠爵于篚下盥洗注已盥乃洗爵者致潔敬也賓進東北面辭洗注必進東行示情敖氏繼公曰凡洗者必盥盥洗皆立張氏爾岐曰篚下當篚之下非於篚也盥洗者盥訖取爵擬洗亦非謂遽已洗也主人坐奠爵于篚興對賓復位當西序東面注言復位者明始降時位在此主人坐取爵沃洗者西北面注沃洗者主人之羣吏卒洗主人壹揖壹讓升注俱升敖氏繼公曰升亦主人先而賓從之賓拜洗主人坐奠爵遂拜降盥注復盥為手坋汙賓降主人辭賓對復位當西序卒盥揖讓升賓西階上疑立注疑正立自定之貌揖疏言揖讓升不言一一讓從上可知欽定義疏主人階上及降階之位皆在阼階東賓降階之位在西階西下經俱有明文則賓階上之位亦宜在西階西此不言西可知也主人坐取爵實之賓之席前西北面獻賓注獻進也進酒于賓賓西階上拜主人少退注少退少辟賓進受爵以復位主人阼階上拜送爵賓少退注復位復西階上位西疏以賓西階上疑立今見主人北面獻於已席前故賓進將于席前受之也案鄉射云賓進受爵於席前復位此不言席前文不具也薦脯醢注薦進也進之者主人有司也賓升席自西方注升由下也升必中席乃設折俎注牲體枝解節折任俎主人阼階東疑立賓坐左執爵祭脯醢注坐坐于席祭脯醢者以右手奠爵于薦西興右手取肺卻左手執本坐弗繚右絶末以祭尚左手嚌之興加于俎注興起也肺離之本端厚大者繚猶紾也大夫以上威儀多紾絶之尚左手者明垂紾之乃絶其末嚌嘗也疏弗繚即弗紾一也此鄉飲酒大夫禮故云繚祭鄉射士禮云絶祭但云繚必兼絶言絶不得兼繚也周禮太祝辨九祭七曰絶祭八曰繚祭注云繚祭以手從肺本循之至于末乃絶以祭絶祭不循其本直絶以祭本同禮多者繚之禮畧者絶則祭之張氏爾岐曰卻左手者仰其左手也弗繚者直絶末以祭不必繚也大夫以上乃有繚祭士則否經言弗繚以賓固士也他事皆從士禮注疏獨于此解作繚祭不敢從蕙田案經文云弗繚而注疏乃以繚祭釋之盖以弗為屈曲之義其説迂曲張氏駁之最當坐挩手遂祭酒注挩拭也自疏内則事佩之中有挩則賓客有挩巾以拭手也興席末坐啐酒降席坐奠爵拜告㫖執爵興主人阼階上答拜注啐亦嘗也降席席西也㫖美也賓西階上北面坐卒爵興坐奠爵遂拜執爵興主人阼階上答拜注卒盡也於此盡酒者明此席非専為飲食起蕙田案以上主人獻賓賓降洗注將酢主人主人降注亦從賓也降降立阼階東西面賓坐奠爵興辭注西階前也主人對賓坐取爵適洗南北面主人阼階東南面辭洗賓坐奠爵于篚興對主人復阼階東西面賓東北面盥坐取爵卒洗揖讓如初升主人拜洗賓答拜興降盥如主人禮賓實爵主人之席前東南面酢主人主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方設折俎祭如賓禮注酢報也祭者祭薦爼及酒亦嚌啐後疏此賓未盥主人辭洗鄉射賓盥訖主人乃辭洗先不同者彼與鄉人習禮輕故盥訖乃辭洗此鄉人將賓舉之故未盥先辭洗重之也鄉射賓坐取爵洗之時未得主人之命故奠于篚下得主人之命乃奠于篚此則賓取爵適洗未奠之時主人即辭故奠于篚也敖氏繼公曰北方席下也主人介席皆南上不告㫖注酒已物也自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賓西階上答拜注自席前者啐酒席末因從北方降由便也主人坐奠爵于序端阼階上北面再拜崇酒賓西階上答拜注東西牆謂之序崇充也言酒惡相充實疏奠于序端者擬酬賓訖取此爵以獻介敖氏繼公曰崇重也謂賓崇重已酒不嫌其薄而飲之既也卒爵乃拜者若已飲之乃審知其薄然姜氏兆錫曰此謝賓之酢爵也崇之言隆謂之崇酒者謝賓酢之隆施耳如以崇酒為謝酒惡當於獻賓賓告㫖之時不當於酢主主不告㫖之後蕙田案崇酒之義姜説為長注疏與敖氏俱費解又案以上賓酢主人主人坐取觶于篚降洗賓降主人辭降賓不辭洗立當西序東面注不辭洗者以其將自飲卒洗揖讓升賓西階上疑立主人實觶酬賓阼階上北面坐奠觶遂拜執觶興賓西階上答拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賓西階上答拜欽定義疏未飲而拜示行酬也既飲復拜示盡觶也賓皆答拜以此酒為已而飲也主人降洗賓降辭如獻禮升不拜洗注不拜洗殺于獻賓西階上立主人實觶賓之席前北面賓西階上拜主人少退卒拜進坐奠觶于薦西注賓已拜主人奠其觶賓辭坐取觶復位主人阼階上拜送賓北面坐奠觶于薦東復位注酬酒不舉君子不盡人之歡不竭人之忠以全交也張氏爾岐曰賓辭疏以為辭主人復親酌已愚以主人方酌時不辭殆非辭酌也仍是辭其奠如郷射二人舉觶時蕙田案以上主人酬賓主人揖降賓降立于階西當序東面注主人將與介為禮賓謙不敢居堂上主人以介揖讓升拜如賓禮主人坐取爵于東序端降洗介降主人辭降介辭洗如賓禮升不拜洗注介禮殺也疏主人與賓三揖至于階之時介與衆賓亦隨至西階下此云揖讓升如賓禮則惟于升堂時相讓無庭中揖讓之事介西階上立注不言疑者省文主人實爵介之席前西南面獻介介西階上北面拜主人少退介進北面受爵復位主人介右北面拜送爵介少退注主人拜于介右降尊以就卑也敖氏繼公曰主人獻介乃拜于其右者降于賓也凡堂上之獻酢皆分階而拜者賓主二人而已其餘則否主人立于西階東薦脯醢介升席自北方設折俎祭如賓禮不嚌肺不啐酒不告㫖自南方降席北面坐卒爵興坐奠爵遂拜執爵興主人介右答拜注不嚌啐下賓蕙田案介位西階西北面而主人立西階東是為在介右也凡北面以東為右又案以上主人獻介介降洗主人復阼階降辭如初注如賓酢之時卒洗主人盥注盥者當為介酌者疏此主人自飲而盥尊介也介揖讓升授主人爵于兩楹之間注就尊南授之介不自酌下賓酒者賓主共之敖氏繼公曰凡受獻而親酢者一人而已其餘則或所獻者自酢焉此介視賓為殺故其酢禮如此然其初乃得為主人洗爵亦其異者也介西階上立主人實爵酢於西階上介右坐奠爵遂拜執爵興介答拜主人坐祭遂飲卒爵興坐奠爵遂拜執爵介答拜主人坐奠爵于西楹南介右再拜崇酒介答拜注奠爵西楹南以當獻衆賓欽定義疏主人所與為禮自工外其拜位與賓同在西階者以其皆賓之屬也主人之拜位自介以下則拜于其右不與拜賓同位者不二尊也於是主人在介右故奠于西楹南由便也介不告㫖主人亦拜崇酒者介不敢同于賓而主人敬之則不敢甚異于賓也主人復阼階揖降介降立于賓南注以將獻衆賓故介無事就賓南蕙田案以上介酢主人主人西南面三拜衆賓衆賓皆答壹拜注三拜一拜示徧不備禮也不升拜賤也之疏主人在阼階下衆賓在賓介南故西南面拜之朱子曰此疏云衆賓各得主人一拜主人亦徧得一拜鄉射疏又云衆賓無論多少止為三拜是示徧也然則主人之拜衆賓不能一一拜之但為三拜以示徧而衆賓之長者三人各答一拜也然經文及注疏但言衆賓一拜而無三人之文未詳其説主人揖升坐取爵于西楹下降洗升實爵于西階上獻衆賓衆賓之長升拜受者三人注長其老者言三人則衆賓多矣主人拜送注於衆賓右而疏約上文介右知坐祭立飲不拜既爵授主人爵降復位注既卒也卒爵不拜立飲立授賤者禮簡張氏爾岐曰一人飲畢授爵降次一人乃升拜受也蕙田案降洗者惟衆賓之長一人其餘二人皆不降洗禮又殺于介矣衆賓獻則不拜受爵坐祭立飲注次三人以下也不拜禮彌簡張氏爾岐曰亦升受但不拜耳每一人獻則薦諸其席注謂三人也衆賓辯有脯醢注亦每獻薦於其位位在下既疏以其言堂下立侍不合有席不言席故位在下主人以嚼降奠于篚注不復用也蕙田案以上主人獻衆賓揖讓升賓厭介升介厭衆賓升衆賓序升即席注序次也即就也有疏衆賓謂三賓堂上席者以年長為首一人洗升舉觶于賓注一人主人之吏發酒端曰舉實觶西階上坐奠觶遂拜執觶興賓席末答拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賓答拜降洗升實觶立于西階上賓拜注賓拜拜將受觶進坐奠觶於薦西賓辭坐受以興注舉觶不授下主人也言坐受者明行事相接若親受謙也舉觶者西階上拜送賓坐奠觶于其所注所薦西也舉觶者降注事已射疏案鄉舉觶者降後有大夫此不言者大夫觀禮之人或來或否故不言也蕙田案以上一人舉觶為旅酬之始又案楊信齋儀禮圖移賓若有遵者一條於此文之下蓋從鄉射篇之例但遵者或來或否既未可定故經文或在前或在後亦不一例不必改此以就彼也設席于堂亷東上注為工布席也側邊曰亷燕禮曰席工于西階上少東樂正先升北面此言樂正先升立于西階東則工席在皆東工四人二瑟瑟先相者二人皆左何瑟後首挎越内弦右手相注四人大夫制也二瑟二人鼓瑟則二人歌也瑟先者將入序在前也相扶工也衆賓之少者為之每工一人鄉射禮曰弟子相工如初入天子相工使眡瞭者凡工瞽矇也故有扶之者師冕見及階子曰階也及席子曰席也固相師之道後首者變于君也挎持也相瑟者則為之持瑟其相歌者徒相也越瑟下孔也内弦側擔之者疏此鄉大夫飲酒云四人大射諸侯禮六人若然士當二人天子八人為差次也工四人二人瑟則二人歌相亦二人以空手無事故不言也敖氏繼公曰工笙蓋公家之樂官給學中飲射之事者樂正先升立于西階東注正長也官疏此樂正諸侯及大夫士之當天子大司樂工入升自西階北面坐相者東面坐遂授瑟乃降注降立於西方近其事工歌鹿鳴四牡皇皇者華注三者皆小雅篇也鹿鳴君與臣下及四方之賓燕講道修政之樂歌也此采其已有㫖酒以召嘉賓嘉賓既來示我以善道又樂嘉賓有孔昭之明徳可則傚也四牡君勞使臣之來樂歌也此采其勤苦王事念將父母懐歸傷悲忠孝之至以勞賓也皇皇者華君遣使臣之樂歌也此采其更自勞苦自以為不及欲諮謀于賢知而以自光明也朱子曰鹿鳴謂今日燕飲之事所以道達主人之誠意而美嘉賓之徳也四牡言其去家而仕於朝辭親而從王事於此乎始也皇皇者華言其將為君使而賦政於外也學記曰宵雅肄三官其始也正謂此也盖此三詩先王所制以為燕飲之樂用之鄉人用之邦國各取其象而歌之也問鹿鳴四牡皇華儀禮以為上下通用之樂不知王事靡盬之類庶人安得用之曰鄉飲酒亦用大學始教宵雅肄三正習學此盖入學之始須教他便知有君臣之義始得敖氏繼公曰不言瑟者瑟依歌其同可知書曰搏拊琴瑟以詠卒歌主人獻工工左瑟一人拜不興受爵主人阼階上拜送爵注一人工之長也凡工賤不為之洗樂疏此及燕禮主歡心尚樂故有升歌笙間合間合不獻以前已得獻故不復重獻鄉射主于射略于樂無笙間唯有合樂笙工並為至後總獻之大射亦主于射略于樂不間歌不合樂故有升歌獻工下管不復得獻薦脯醢使人相祭注使人相者相其祭酒祭薦工飲不拜既爵授主人爵注坐授之衆工則不拜受爵祭飲辯有脯醢不祭注祭飲獻酒重無不祭也大師則為之洗賓介降主人辭降工不辭洗注大夫若君賜之樂謂之太師則為之洗尊之也賓介降從主人也工大師也上既言獻工矣乃言大師者大師或瑟或歌也其獻之瑟則先歌則後盛氏世佐曰大師乃君所賜者無論或瑟或歌必先獻不當依瑟先歌後之序經先言獻工乃言大師者以其出于君賜不必有也注誤笙入堂下磬南北面立樂南陔白華華黍注笙吹笙者也以笙吹此詩以為樂也南陔白華華黍小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周太師歸以祀其先王至孔子二百年之間五篇而已此其信也劉氏敞曰此三篇皆笙詩也小序云有其義而亡其辭亡謂本無非亡逸之亡也儀禮曰笙曰樂曰奏而不言歌則有聲而無辭明矣下由庚崇丘由儀倣此盛氏世佐曰案笙詩之説從來聚訟詩禮二注出康成一手尚爾異同况生其後者乎謂六篇之詞雖亡而其義幸以序而存者箋疏而外陸氏徳明蘇氏轍范氏處義黄氏櫄嚴氏粲也謂其辭既亡則其義不可得而知序詩者但考二字便率意作一篇之序者鄭氏樵李氏樗也讀亡其辭之亡為無而謂此六篇有聲無詞者劉氏敞商氏份董氏逌王氏質黄氏震也朱子于有聲無辭之解既用原文而以小序為無理則同漁仲其説詳見詩集𫝊及辯説然猶未足以厭後人之心而闗其口何也書曰詩言志歌永言聲依永又曰予欲聞六律五聲八音在治忽以出納五言汝聽然則有辭而後有聲聲之不可離辭而成樂也自古然矣又况古人名篇之例或以詩之首二字或一句或次取篇中一二字以為題亦有舍篇中字而别命之者要未有無其辭而可命之曰某詩某詩也夫詩之逸者多矣如貍首采齊肆夏見于禮記祈招河水新宫見于春秋左氏𫝊三夏之名見國語九夏之名見周禮考其辭與義必無夫子所刪者而今詩皆不能具其亡于夫子之前而不及收與抑亡于夫子之後而今之所存者或非其舊與是皆未可知也何獨于南陔以下六篇而保其非逸耶若徒以其曰笙曰樂曰奏而不歌以為有聲無辭之證言則吕氏祖謙郝氏敬論之詳矣其説可得而申也鄉射禮云奏騶虞國語云金奏肆夏樊遏渠吕叔玉云肆夏時邁也樊遏執競也渠思文也其説采于詩集𫝊是皆有辭而亦云奏周禮籥章以籥吹豳詩即七月也禮記升歌清廟下管象即維清也燕禮升歌鹿鳴下管新宫而左𫝊昭二十五年宋公賦新宫謂之賦則有辭矣國語又稱伶簫詠歌鹿鳴之三是籥與簫管所吹之詩皆有辭而謂笙所吹者獨無辭可乎張子曰既無詩安得有此篇必是有其辭所以亡者良由施之于笙非若歌之可習此言殆為平允矣觀承案笙詩有詞無詞聚訟已久既已並亡則二説亦並可通必欲畫一則終以朱子之説為長夫有詞然後有譜詩樂相生之序誠然然亦原其初耳既成譜後或單歌其聲或兼歌其詞則不可一概矣笙詩𫝊流巳久其用在聲故相沿只吹其聲蓋堂上堂下之序如此周時所以用聲而不更造其詞所以六笙只有譜而亡其詞也如琴譜亦有有聲而無詞者其聲自和原不待詞而後顯也若但以曰樂曰賦曰歌曰吹曰奏字面為据則反不為確蓋此等字對文各别散文可通正不必執此一字為難端也巳主人獻之於西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵注一人笙之長者也笙三人和一人凡四人鄉射禮曰笙一人拜於下衆笙則不拜受爵坐祭立飲辯有脯醢不祭注亦受爵於西階上薦之皆於其位磬南陳氏𤾉曰工一人祭薦餘則祭飲而已笙則皆不祭此又等降之别也乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀注間代也謂一歌則一吹六者皆小雅篇也魚麗言太平年豐物多也此采其物多酒㫖所以優賓也南有嘉魚言太平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之燕樂也南山有臺言太平之治以賢者為本此采其愛友賢者為邦家之基民之父母既欲其身之夀考又欲其名徳之長也由庚崇丘由儀今亡其義未聞乃合樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋注合樂謂歌樂與衆聲俱作周南召南國風篇也王后國君夫人房中之樂歌也闗雎言后妃之徳葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之徳采蘩言國君夫人不失職采蘋言卿大夫之妻能循其法度昔太王王季居于岐山之陽躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御于家邦謂此也其始一國耳文王作邑于豐以故地為卿士之采地乃分為二國周周公所食召召公所食于是文王三分天下有其二徳化被于南土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂鄉飲酒升歌小雅禮盛者可以進取也燕合鄉樂禮輕者可以逮下也春秋𫝊曰肆夏繁遏渠天子所以享元侯也文王大明緜兩君相見之樂也然則諸侯相與燕升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙間之篇未聞磬疏合樂謂堂上有歌瑟堂下有笙合奏此詩程子曰周公主内治故以畿内之詩言文王太姒之化者屬之周南召公掌諸侯故以畿外之詩言列國諸侯大夫之室家被文王太姒之化而成徳者屬之召南朱子曰謂之南者以其化自岐雍之間被于江漢之域自北而南也詩曰以雅以南即謂此也觀承案明有周南召南之詩而古注不以此注以雅以南之南反以南為南夷之樂者殊未允也工告於樂正曰正歌備樂正告于賓乃降注樂正降者以正歌備無事也降立西階東北面笙疏以其堂上時在西階之東北面知降堂下亦然在磬之西亦得監堂下之樂知位在此也李氏如圭曰告于賓者作樂主為樂賓也蕙田案以上樂賓主人降席自南方注不由北方由便側降注賓介不從不疏側者特也賓介從以將燕禮殺故也作相為司正司正禮辭許諾主人拜司正答拜注作使也禮樂之正既成將留賓為有解惰立司正以監之拜拜其許疏上云一相迎于門外今將燕使為司正敖氏繼公曰主人自作之者辟君禮也主人升復席司正洗觶升自西階阼階上北面受命于主人主人曰請安于賓司正告于賓賓禮辭許注為賓欲去留之告賓于西階司正告于主人主人阼階上再拜賓西階上答拜司正立于楹間以相拜皆揖復席注再拜拜賓許也司正既以賓許告主人遂立楹間以相拜賓主人既拜揖就席司正實觶降自西階階間北面坐奠觶退共少立注階間北面東西節也其南北當中庭共拱手也少立自正慎其位也巳帥而正孰敢不正燕禮曰右還北面經疏鄉射云司正實觶降自西階中庭北面坐奠觶此雖不言中庭宜與彼同坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興洗北面坐奠觶于其所退立于觶南注洗觶奠之示潔敬立于其南以察衆疏執觶興洗北面鄉射大射禮皆不云盥俗本有盥者誤蕙田案唐石經洗字上有盥字即疏所云俗本也吳澄三禮考注亦承其誤今從監本又案以上立司正賓北面坐取俎西之觶阼階上北面酬主人主人降席立于賓東注初起旅酬也凡旅酬者少長以齒終于沃盥者皆弟長而無遺矣疏前一人與觶奠于薦右今為旅酬而主之前主人酬賓奠于薦東者不舉故言俎西以别之賓坐奠觶遂拜執觶興主人答拜不祭立飲不拜卒觶不洗實觶東南面授主人注賓立飲卒觶因更酌以鄉主人將授主人阼階上拜賓少退主人受觶賓拜送于主人之西注旅酬同階禮殺賓揖復席注酬主人訖蕙田案以上賓酬主人主人西階上酬介介降席自南方立于主人之西如賓酬主人之禮主人揖復席注其酌實觶西南面授介自此以下旅酬酌者亦如之朱子曰賓主介相酬初皆北面但實觶之後授觶之時賓則東南面授主人主人則西南面授介已授之後即授者又還北面之位賓則拜送于主人之西主人則拜送于介之東皆北面也故下文受介酬者亦既受乃還北面拜受也蕙田案以上主人酬賓司正升相旅曰某子受酬受酬者降席注旅序也于是介酬衆賓衆賓又以次序相酬某者衆賓姓也同姓則以伯仲别之又同則以其字别之司正退立于序端東面注辟受酬者又便其賛上賛下也始升相西階西北面受酬者自介右注由介東也尊介使不失故位自疏凡授受之法授由其右受由其左此授介酬者應介左而自介右者介位在西故尊介使不失故位也敖氏繼公曰受介酬者獨居其右與他受酬者不同明介尊不與衆賓序也若遵者受介酬亦然自介右則介當東南面酬之衆受酬者受自左注後將受酬者皆由西變于介也受疏衆賓之内為首者一人自介右之自第二以下并堂下衆賓皆自左受之言變于介者即授受之常法也拜興飲皆如賓酬主人之禮注嫌賓以下異也辯卒受者以觶降坐奠于篚注辯辯衆賓之在下者鄉射禮曰辯遂酬在下者皆升受酬于西階上司正降復位注觶南之位欽定義疏酬之為義注曰勸酒也為酬賓言之也又曰周也為旅酬言之也旅酬之酬義主于周當主人酬賓時介遵皆未及獻無行酬之法故不盡主人之歡奠之而不舉至獻禮既畢一人舉觶乃體主人均惠之意而行之以至於辯辯者周也蕙田案以上介酬衆賓衆賓自相酬以辯旅酬之禮畢使二人舉觶于賓介洗升實觶于西階上皆坐奠觶遂拜執觶興賓介席末答拜皆坐祭遂飲卒觶興坐奠觶遂拜執觶興賓介席末答拜注二人亦主人之吏若有大夫則舉觶于賓與大夫燕禮曰媵爵者立于洗南西面北上序進盥洗答疏席末答拜者賓于席西南面答拜介于席南東面拜若有大夫則舉觶于賓與大大者大夫尊于介故也李氏如圭曰二人舉觶為無算爵始也逆降洗升實觶皆立于西階上賓介皆拜注於席末拜皆進薦西奠之賓辭坐取觶以興介則薦南奠之介坐受以興退皆拜送降賓介奠于其所注賓言取介言受尊卑異文疏皆進者一人之賓所奠于薦西一人之介所奠于薦南張氏爾岐曰此二人所舉之觶待升坐後賓介各舉以酬為無算爵者即此二觶蕙田案以上二人舉觶為無算爵之始司正升自西階受命于主人主人曰請坐于賓賓辭以俎注至此盛禮俱成酒清肴乾賓主百拜強有力猶倦焉張而不弛弛而不張非文武之道請坐者將以賓燕也俎者肴之貴者辭之者不敢以禮殺當貴者疏自此以上皆立行禮人皆勞倦故請坐于賓主人請徹俎賓許注亦司正𫝊請告之司正降階前弟子俟徹俎注西階前也弟子賓之少者俎者主人之吏設之使弟子俟徹者明徹俎賓之義疏西階前命之故知賓弟子敖氏繼公曰俟徹俎者俟尊者徹乃受之司正升立于序端注待事賓降席北面主人降席阼階上北面介降席西階上北面遵者降席席東南面注皆立相須徹俎也遵者謂此鄉之人仕至大夫者也今來助主人樂賓主人所榮而遵法者也因以為名或有無來不來用時事耳今文遵為僎下疏遵不北面者以其尊故席東南面向主人士立于不得升堂故知此遵是大夫也蕙田案鄉飲酒義從今文作僎賓取俎還授司正司正以降賓從之主人取俎還授弟子弟子以降自西階主人降自阼階介取俎還授弟子弟子以降介從之若有諸公大夫則使人受俎如賓禮衆賓皆降注取俎者皆鄉其席既授弟子皆降復初入之位蕙田案以上徹俎説屨揖讓如初升坐乃羞注説屨者為安燕當坐也必説于下者屨賤不空居堂説屨主人先左賓先右羞進也所進者狗胾醢也鄉設骨體所以致敬也今進羞所以致愛也敬之愛之所以厚賢也敖氏繼公曰説屨者各于其階側北面坐于堂而説屨于上者惟尊長則然此賓主人其尊相敵故皆説于下蕙田案以上升坐無算爵注算數也賓主燕飲爵行無數醉而止也鄉射禮曰使二人舉觶于賓與大夫又曰執觶者洗升實觶反奠于賓與大夫皆是楊氏復曰鄉飲酒禮無算爵其文畧案鄉射無算爵賓與大夫不興取奠觶飲卒觶不拜執觶者受觶遂實之賓觶以之主人大夫之觶衆賓長受而錯皆不拜注錯者實主人之觶以之次賓實賓長之觶以之次大夫此鄉飲酒禮亦同但鄉射有賓無介鄉飲酒有賓有介當實賓之觶以之主人實大夫之觶以之介及其交錯而行也當實主人之觶以之衆賓長實介之觶以之次大夫又實衆賓長之觶以之第三位次大夫實次大夫之觶以之第二位次賓長如此交錯以辯卒受者興以旅在下者于西階上及其辯也執觶者洗升實觶反奠于賓與大夫所以復奠之者燕以飲酒為歡醉乃止此所以為無算爵也敖氏繼公曰此禮異於鄉射者舉觶及反奠不于大夫而于介耳其實觶亦以之主人介觶則以之大夫其餘可以類推蕙田案鄉射無介故以賓與大夫為尊鄉飲有介當以賓與介為尊鄉飲酒義每以賓主介僎相提並論則無算爵舉觶自宜從賓介始由賓而之主人由介而之大夫如敖氏之説為是楊信齋儀禮圖尚沿舊注之誤耳無算樂注燕樂亦無數或間或合盡歡而止也春秋襄二十九年吳公子札來聘請觀于周樂此國君之無算蕙田案以上無算爵賓出奏陔注陔陔夏也陔之為言戒也終日燕飲酒罷以陔為節明無失禮也周禮鐘師以鐘鼔奏九夏是奏陔夏則有鐘鼔矣鐘鼔者天子諸侯備用之大夫士鼔而已盖建于阼階之西南鼓鄉射禮曰賓興樂正命奏陔賓降及階陔作賓出衆賓皆出主人送于門外再拜注門東西面拜也賓介不答拜禮有終也敖氏繼公曰再拜送賓也賓主人以下當屨而後出經文畧也蕙田案以上賓出賓若有遵者諸公大夫則既一人舉觶乃入注不干主人正禮也遵者諸公大夫也謂之賓者同從外來耳大國有孤四命謂之公席於賓東公三重大夫再重注席此二者於賓東尊之不與鄉人齒也三重者六席再重者四席天子之國三命者不齒於諸侯之國爵為大夫則不齒矣張氏爾岐曰衆賓之席在賓西此特為位于酒尊東不在衆人行列中故曰不與齒也公如大夫入主人降賓介降衆賓皆降復初位主人迎揖讓升公升如賓禮辭一席使一人去之注如讀若今之若主人迎之於門内也辭一席自同于大夫大夫則如介禮有諸公則辭加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席注加席上席也大夫席再重大疏賓厭介此公與大夫同入亦厭夫欽定義疏遵者獻酢之節詳于鄉射禮此不具者射義云卿大夫之射也必先行鄉飲酒之禮二禮本同可互考也蕙田案以上遵者之禮明日賓鄉服以拜賜注拜賜謝恩惠鄉服昨日與鄉大夫飲酒之朝服也不言朝服未服以朝也主人如賓服以拜辱注拜賓復自屈辱也拜疏賓主皆不相見造門外謝而已蕙田案以上拜賜拜辱主人釋服乃息司正注釋朝服更服元端也息勞也勞賜昨日賛執事者獨云司正司正庭長也無介注勞禮畧也司正為賓不殺注市買若因所有可也不殺則無俎薦脯醢注羞同也羞唯所有注在有何物徴唯所欲注徴召也以告于先生君子可也注告請也先生不以筋力為禮於是可以來君子國中有盛徳者可者召不召唯所欲賓介不與注禮凟則䙝鄉樂唯欲注鄉樂周南召南六篇之中唯所欲作不從次也不歌鹿鳴魚麗者辟國君也酒疏二南為鄉大夫之樂小雅為諸公之樂上正行飲歌小雅今燕不歌鹿鳴魚麗是避國君也蕙田案以上息司正記鄉朝服而謀賓介皆使能不宿戒注鄉鄉人謂鄉大夫也朝服冠元端緇帶素韠白屨今郡國行鄉飲酒之禮元冠而衣皮弁服與古異再戒為宿戒禮將有事先戒而復宿戒張氏爾岐曰鄉謂鄉飲酒之禮注指人恐義不盡蕙田案以上記賓介蒲筵緇布純注筵席也純縁也尊綌冪賓至徹之注綌葛也冪覆尊巾蕙田案以上記筵及尊冪其牲狗也注狗取擇人亨于堂東北注祖陽氣之所始也陽氣主養易曰天地養萬物聖人養賢以及萬民敖氏繼公曰用狗者用燕禮之牲也蕙田案以上記牲獻用爵其他用觶注爵尊不䙝用之蕙田案酢亦用爵記但言獻者酢統于獻也敖繼公以議記文之不備過矣又案以上記爵觶之用薦脯五挺横祭于其上出自左房注挺猶膱也鄉射禮曰祭半膱膱長尺有二寸左在東陽也陽主養房饌陳處也冠禮之饌脯醢南上曲禮曰以脯修置者左朐右末疏横祭于上者於脯為横于人為縮蕙田案以上記脯俎由東壁自西階升注亨狗既熟載之俎饌于東方賓俎脊脅肩肺主人俎脊脅臂肺介俎脊脅胳肺肺皆離皆右體進腠注凡牲前脛骨三肩臂臑也後脛骨二􅈩胳也尊者俎尊骨卑者俎卑骨祭統曰凡為俎者以骨為主骨有貴賤凡前貴後賤離猶㨒也腠理也進理謂前其本也而疏此序體賓用肩主人用臂介用胳其間有臑肫在介不用者盖以大夫俎故此闕焉大夫雖尊不奪賓主正體故用體卑于主人與賓而尊于介也朱子曰介俎脊脇胳肺印本胳上有肫字然釋文無音疏又云有臑肫而介不用明無此字也成都石經亦誤蕙田案以上記俎以爵拜者不徒作注作起也言拜既爵者不徒起起必酢主人坐卒爵者拜既爵立卒爵者不拜既爵注隆殺各從其宜唯工不從此禮欽定義疏坐卒爵謂賓主人介立卒爵謂衆賓以下凡奠者于左注不飲者不欲其妨將舉于右注便也衆賓之長一人辭洗如賓禮注于三人之中復差有尊者餘二人雖為之洗不敢辭其下不洗蕙田案以上記諸行禮之節立者東面北上若有北面者則東上注賢者衆多無常也或統于堂或統于門蕙田案以上記衆賓之立位樂正與立者皆薦以齒注謂其飲之次也尊樂正同于賓黨不言飲而言薦以明飲也既飲皆薦于其位樂正位西階東北面張氏爾岐曰樂正本主人之官屬故以齒于賓黨為尊之蕙田案以上記樂正薦節凡舉爵三作而不徒爵注謂獻賓獻大夫獻工皆有薦敖氏繼公曰獻賓謂賓介及衆賓獻工兼笙者蕙田案以上記不徒爵樂作大夫不入注後樂賢者作疏大夫入當一人舉觶之後未樂之前以助主人樂賓蕙田案以上記大夫入節獻工與笙取爵于上篚既獻奠于下篚注明其異器敬也如是則獻大夫亦然上篚三爵笙疏獻賓介堂上堂下衆賓一爵獻工與二爵獻大夫三爵其笙則獻諸西階上注謂主人拜送爵也於上拜于阼階上者以其坐于西階東也蕙田案以上記獻工與笙磬階間縮霤北面鼓之注縮從也霤以東西為從鼓猶擊也大夫而特懸方賓鄉人之賢者從士禮也射則磬在東蕙田案以上記懸磬之所主人介凡升席自北方降自南方注席南上升由下降由上從便蕙田案以上記升席降席之法司正既舉觶而薦諸其位注司正主人之屬也無獻因其舉觶而薦之蕙田案以上記薦司正節凡旅不洗注敬禮殺也不洗者不祭注不甚潔也蕙田案以上記旅酬殺禮既旅士不入注後正禮也既旅則將燕矣敖氏繼公曰士賤于大夫則可以獻然不與旅則與主人之賛者同故不入蕙田案以上記士入節徹爼賓介遵者之俎受者以降遂出授從者注送之主人之俎以東注藏于東方蕙田案以上徹俎之節樂正命奏陔賓出至于階陔作蕙田案以上記奏陔之節若有諸公則大夫于主人之北西面注其西面者北上統于公疏若無諸公則大夫南面西上統于遵也蕙田案以上記遵者席位主人之賛者西面北上不與注賛佐也謂主人之屬佐助主人禮事徹冪沃盥設薦俎者西面北上統于堂也與及也不及謂不獻酒無算爵然後與注燕乃及之蕙田案以上記主人之賛者右儀禮鄉飲酒禮周禮地官鄉大夫三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之注以鄉飲酒之禮禮而賓之州長春秋以禮會民而射于州序疏州長因春秋二時皆以禮會聚其民而行射禮于州之序學中言以禮者亦謂先行鄉飲酒之禮而乃射黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命而不齒注國索鬼神而祭祀謂歳十二月大蜡之時建亥之月也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將闕于禮至于農隙以教之尊長養老見孝弟之道也黨正飲酒禮亡以此事屬于鄉飲之義微失少矣凡射飲酒此鄉民雖為卿大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也齒于鄉里者以年與衆賓相次也齒于父族者父族有為賓者以年與之相次異姓雖有老者居于其上不齒者席于尊東所謂遵蕙田案鄉大夫興賢飲酒之禮三年而一舉儀禮所説是也州長習射飲酒之禮一年而再舉射義云卿大夫之射必先行鄉飲酒之禮是也黨正正齒位飲酒之禮歳終而一舉鄉飲酒義六十者坐五十者立侍是也其鄉大夫士飲國中賢者之禮周禮無其文鄉飲酒義所謂鄉人士君子尊于房户之間者是也詩豳風七月九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬夀無疆注兩樽曰朋饗者鄉人以狗大犬加以羔羊公堂學校也觥所以誓衆也言疏鄉人飲酒而謂之饗者鄉飲酒禮尊事重故以饗之鄉飲酒禮自是三年賓賢能之法而黨正飲酒之禮亦與之同鄉飲酒經云尊兩壺于房户之間是用兩樽也記云其牲狗是鄉人以狗也王制云大夫無故不殺羊是行禮飲酒有故得用羊故云大夫加以羔羊也學校謂之公堂者以公法為學故稱公耳天官酒正云凡為公酒者注云謂鄉射飲酒以公事作酒者是鄉人之事得稱公也蕙田案此條毛以為鄉飲酒禮鄭以為國君大飲之禮未詳孰是姑依毛説採入觀承案七月篇乃追述先公時舊俗如此末章則冬時收穫已畢邠民躋堂稱祝以盡其愛公之誠可以想見古初君民一體之誼耳其時固未有周禮也毛以為鄉飲鄭以為國君大飲必曲曲附會周禮則太鑿矣禮記少儀客爵居左其飲居右注客爵謂主人所酬賓之爵也以優賓耳賓不舉奠于薦東介爵酢爵僎爵皆居右注三爵皆飲爵也介賓之輔也酢所以酢主人也古文禮僎作遵遵謂鄉人為卿大夫來觀禮者受疏此一節明客爵所在鄉飲酒禮主人酬賓之爵賓奠觶于薦東是客爵居左也旅酬之時一人舉觶于賓賓奠觶于薦西至旅酬賓取薦西之觶以酬主人是其飲居右也介賓副也酢謂客酌還答主人也僎謂鄉人來觀禮副主人者也此主人既不被優故爵並居右示為飲之蕙田案獻用爵酬用觶此記客爵居左鄭以酬爵解之則觶亦通名爵也朱子經傳通解採此條為鄉飲酒之記云祭義壹命齒於鄉里再命齒於族三命不齒族有七十者不敢先注此謂鄉射飲酒時也齒者謂以年次立若坐也三命列國之卿也不復齒席之于賓東不敢先族之七十者謂既一人舉觶乃入也雖非族亦然承齒乎族故言族爾疏云謂以年次立若坐者士立于堂下大夫坐于堂上知者鄉射云大夫受獻訖及衆賓皆升就席於時雖立至徹俎即坐鄉射記又云既旅士不入不見士坐之文明立于堂下云三命列國之卿也者據諸侯言之若天子國黨正飲酒三命不齒謂上士也以天子上士三命故也族七十者初飲酒之時則與衆賓先入此三命者得為待獻賓獻介獻衆賓之後至一人舉觶之時乃始得入故云不敢先爾是以鄭注云雖非族亦然熊氏云黨正飲酒正齒位故有七十若鄉飲酒之禮則無七十者故鄉飲酒明日乃息司正告丁先生君子是老者明日乃入也射義卿大夫士之射也必先行鄉飲酒之禮論語鄉人飲酒杖者出斯出矣朱子曰六十杖于鄉未出不敢先既出不敢後蕙田案此正齒位之飲右經𫝊鄉飲諸儀周禮地官大司徒以陽禮教讓則民不争注陽禮謂鄉射飲酒之禮也禮記王制六禮冠昏喪祭鄉相見經解鄉飲酒之禮所以明長幼之序也鄉飲酒之禮廢則長幼之序失而争鬬之獄繁矣仲尼燕居鄉射之禮所以仁鄉黨也鄉飲酒義鄉飲酒之義主人拜迎賓于庠門之外入三揖而後至階三讓而后升所以致尊讓也注庠鄉學也州黨曰序盥洗揚觶所以致絜也注揚舉也拜至拜洗拜受拜送拜既所以致敬也注拜至謂始升時拜拜賓至尊讓絜敬也者君子之所以相接也君子尊讓則不争絜敬則不慢不慢不争則逺于鬬辨矣不鬬辨則無暴亂之禍矣斯君子所以免于人禍也故聖人制之以道注道謂此禮庠疏謂鄉大夫故迎賓于門外若州長黨正則于序門外也盥洗揚觶者謂主人將獻賓以水盥手而洗爵揚觶謂既獻之後舉觶酬賓之時亦盥洗也必盥洗者所以致其絜敬之意也拜至者謂賓與主人升堂之後主人于阼階之上北面再拜是拜至也拜洗者謂主人拜至訖洗爵而升賓于西階上北面再拜拜主人洗也拜受者賓于西階上拜受爵也拜送者主人于阼階上拜送爵也拜既者既盡也賓飲酒既盡而拜也吕氏大臨曰君子之相接尊讓絜敬如此其至雖有争慢之心無從生矣尊讓絜敬之禮行則尊讓絜敬之俗成禮行而至于成俗則天下之人皆將逺于鬬辨而免于人禍先王制禮豈茍為繁文末節而已哉馬氏晞孟曰入三揖而後至階主所以致尊于賓三讓而後升賓所以致讓于主徐氏師曾曰此釋自迎賓以至卒爵之義鄉人士君子尊于房户之間賓主共之也尊有𤣥酒貴其質也注鄉人鄉大夫也士州長黨正也君子謂鄉大夫士也鄉大夫士飲國中賢者亦用此禮也共尊者人臣卑不敢専大惠羞出自東房主人共之也注羞燕私可以自専也洗當東榮主人之所以自絜而以事賓也注絜猶清也等疏以鄉大夫惟有東房故設酒尊于東房之西室户之東在賓主之間示賓主之共有此酒也酒雖主人之設賓亦以酢主人北面設尊𤣥酒在左謂在尊酒之西也所以設𤣥酒在西者地道尊右貴其質素故也欽定義疏鄉人所該甚廣士則鄉人之秀而君子則有徳有位之通稱注謂士為州長黨正以指侯國則可若王朝則鄉大夫為上大夫州長為中大夫黨正為下大夫不得謂州長黨正為士也其謂主人為鄉大夫者亦専本鄉法而言若州射黨祭則又州長黨正為主人恐不得拘也其在侯國則鄉大夫者鄉人也有飲國中賢能之禮州長者士也有習射鄉飲之禮黨正者亦士也有蜡祭鄉飲之禮鄉大夫者有賓興賢能鄉飲之禮總謂之鄉飲飲有獻酬拜洗拜受拜送拜既之禮故曰賓主共之羞則宰夫授之而已故曰主人共之賓主象天地也介僎象隂陽也三賓象三光也讓之三也象月之三日而成魄也四面之坐象四時也注隂陽助天地養成萬物之氣也三賓象天三光者繫于天也古文禮僎皆作遵天地嚴凝之氣始于西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地温厚之氣始於東北而盛於東南此天地之盛徳氣也此天地之仁氣也主人者尊賓故坐賓于西北而坐介于西南以輔賓賓者接人以義者也故坐於西北注賓者接人以義言賓來以成主人之徳主人者接人以仁以徳厚者也故坐於東南而坐僎于東北以輔主人也注以僎輔主人以其仕在官也仁義接賓主有事俎豆有數曰聖聖立而將之以敬曰禮禮以體長幼曰徳注聖通也所以通賓主之意也將猶奉也徳也者得於身也故曰古之學術道者將以得身也是故聖人務焉注術猶藝也得身者謂成已令名免於刑罰也言學術道則此説賓賢能之禮疏此一節明賓主介僎坐位之義也三賓象三光者謂衆賓也主人東南象夏始賓西北象冬始僎東北象春始介西南象秋始其四時不離天地隂陽之内而坐即是賓主介僎之所象也聖通也謂上諸事並是通賓主之意也聖立而將之以敬曰禮者謂通賓主之事其道已立能將行之以恭敬乃謂之禮也禮以體長幼曰徳徳者得也既能有禮以體成長幼于事得宜故曰徳也徳也者得于身也重釋稱徳之義得善行于其身謂身之所行皆得于禮也術者藝也言古之人學此才藝之道也將以得身也謂使身得成也此謂賓賢之人有術道今以賓敬接待之事其尊敬學習術道身得成就而有令名張子曰坐有位者禮主于尊賢而已若賓主正對則兼主于敬主故賓主不相對坐以見尊賢之義雖四時之坐皆有義其實欲明其尊賢也陳氏澔曰或謂介有剛辨之義僎有㢲入之義各從其類義或然也祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也於席末言是席之正非専為飲食也為行禮也此所以貴禮而賤財也卒觶致實於西階上言是席之上非専為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不争矣注非専為飲食言主于相敬以禮也致實謂盡酒也酒為觴實祭薦祭酒嚌肺于席中唯啐酒于席未也賤疏此一節明飲酒之禮祭薦祭酒相尊敬之心貴禮財之義祭薦者主人獻賓賓即席祭所薦時脯醢也禮禮也者言賓既祭薦又祭酒是賓敬重主人之禮也賓取俎上之肺嚌齒之所以嘗主人之禮也飲主人酒而入口成主人之禮于席末謂席西頭也此席専為飲食應于席中啐酒今乃席末啐酒此席之設本不為飲食是主人敬重于賓故設席耳祭薦祭酒嚌肺在席中者敬主人之物故在席中啐酒入于巳故在席末也于席上祭薦祭酒是貴禮席末啐酒是賤財也卒觶主人酬賓主人先飲卒觶也致實謂致盡其所實之酒于西階上此席之上非専為飲食也故不于席所而卒觶啐纔始入口猶在席末也卒觶則盡爵故逺在西階上吕氏大臨曰孔子曰吾食于少施氏而飽少師氏食吾以禮吾祭作而辭曰疏食不足祭也吾飱作而辭曰疏食也不敢以傷吾子然則君子之于飲食飽于敬而不飽於味也飲食之禮盡主人之敬以養賓盡賓之敬以答主人者也主人獻賓賓受爵薦脯醢賓升席設折俎賓祭脯醢奠爵取肺嚌之坐祭酒興席末啐酒主人之禮賓不敢不答故祭薦祭酒敬主人行此禮也賓敬主人在禮不在食故嚌以嘗之啐以成之也啐于席之末不於席之正主於行禮不可以飲食凟也此貴敬而賤食也賓卒爵于西階之上不於席之上者明是席之上可以成飲食之禮不可以卒飲食之事是先敬而後食也敬禮也食財也人之所以争者無禮而志于財也如知乎貴禮而賤財先禮而後財之義則敬讓行矣一飲食之間可以化民成俗則升降之文不為末節也方氏慤曰祭薦祭酒必祭其先而後飲食之也肺者據周人所貴祭薦祭酒則神之也故曰敬禮嚌肺則味之矣故曰嘗禮啐酒則飲之矣故曰成禮啐酒獻賓之觴也卒觶則酬賓之時也西階賓所有事之階也席之正則有别于席之末席之上則有别于席之下西階上即席之下也鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而后國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣注此説鄉飲酒謂黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之禮也其鄉射則州長春秋以禮會民而射于州序之禮也謂之鄉者州黨鄉之屬也或則鄉之所居州黨鄉大夫親為主人焉如今郡國下令長于鄉射飲酒從太守相臨之禮也疏此明黨正飲酒正齒位之事六十者坐五十者立侍者案鄉飲酒禮賓賢能則用處士為賓其次為介其次為衆賓皆以年少者為之此正齒位之禮其賓介等皆用年老者為之其餘為衆賓賓内年六十以上於堂上於賓席之西南面坐若不盡則于介席之北東面北上其五十者則立于西階下東面北上示有陪侍之義非即在六十者旁同南面立也以聽改役者所以立于階下示其聽受六十以上政事役使也六十者三豆至九十者六豆每十年加一豆非正禮故不得為籩豆偶也其五十者亦有豆也但二豆而已民入孝弟謂入門而能行孝弟出尊長養老者謂出門而能尊長養老也吕氏大臨曰古之貴老也其政則導其妻子使養其老家植之桑畜之雞豚狗彘則老者衣帛食肉矣其教則食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干四代之養皆于庠序更用饗食之禮皆所以使民不遺老窮知貴老之義故飲酒之禮老者加豆有至于六也尊長近乎事兄弟也養老近乎養親孝也入則順乎父兄出則順乎長上則民徳歸厚矣強不犯弱衆不暴寡人倫既正教行俗美薰沐涵濡遷善而不自知故曰非家至而日見之也春秋合諸州長之射冬行之黨正正齒位鄉黨習見禮容之盛漸乎禮義之俗孝弟之行不肅而成行禮之效也語類趙恭父問此篇自鄉飲酒之義而下先儒以為記鄉大夫飲賓於庠序之禮自鄉飲酒之禮而下先儒以為記黨正飲酒以正齒序之位今詳考其文前有古之學術道者將以得身云云固足以見賓興之意後有六十者坐五十者立侍以聽政役亦足以證序齒之事但某竊疑儀禮所載鄉飲只是鄉大夫興其賢能而以禮賓之不知説禮何取于黨飲而記為是義朱子曰此無他義只是作記者並舉之耳蕙田案黨正飲酒之禮古經當别為一篇亦名鄉飲酒禮記所舉六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆皆此篇中之文而今不𫝊矣記禮者以篇名相同故并取釋之其實興賢尚齒明是兩事後儒求其故而不得輒思併而為一而儀禮禮記之文俱不可通矣孔子曰吾觀於鄉而知王道之易易也注鄉鄉飲酒也易易謂教化之本尊賢尚齒而已主人親速賓及介而衆賓自從之至於門外主人拜賓及介而衆賓自入貴賤之義别矣注速謂即家召之别猶明也三揖至於階三讓以賓升拜至獻酬辭讓之節繁及介省矣至於衆賓升受坐祭立飲不酢而降隆殺之義辨矣注繁猶盛也小減曰省辨猶别也尊者禮隆卑者禮殺尊卑别也吕氏大臨曰介之升也不三揖三讓不拜洗主人不之阼階拜送不嚌肺不啐酒不告㫖不自酌酢授主人爵主人不舉酬省于賓可知及衆賓則升受坐祭立飲不阼其拜受者衆賓之長三人餘則不拜省于介可知於一等之中寖有省焉此所以辨隆殺也方氏慤曰賓三賓也三賓貴于衆賓而介則輔三賓者也主酌賓為獻賓答主為酢主又答賓為酬是禮也三賓則備之至于介則省酬焉至于衆賓則又省酢矣升受坐祭立飲者其升而受爵者唯祭酒則坐飲酒則立也盖飲酒所以養老以其卑不敢坐而當其養故也此所以殺于三賓蕙田案鄉飲酒惟賓最尊次則介又次則三賓三賓者衆賓之長席于賓西南面者也記所云衆賓升受坐祭立飲者正指三賓而言而方氏乃以三賓為正賓不亦謬之甚乎又禮稱坐祭謂跪而祭酒非説屨升坐之坐方氏乃云衆賓卑不敢坐而當其養尤誤似未讀儀禮者工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備乃出一人揚觶乃立司正焉知其能和樂而不流也注工謂樂正也樂正既告備而降言遂出者自此至去不復升也流猶失禮也立司正以正禮則禮不失可知每疏工入升歌三終者謂升堂歌鹿鳴四牡皇皇者華一篇而一終也主人獻之謂獻瑟與歌者也笙入三終者謂吹笙之人入于堂下奏南陔白華華黍每一篇一終也主人獻之者謂獻笙人也間歌三終者間代也謂笙歌已竟而堂上與堂下更代而作也堂上人先歌魚麗則堂下笙由庚此為一終又堂上歌南有嘉魚則堂下笙崇丘此為二終也又堂上歌南山有臺則堂下笙由儀此為三終也合樂三終者謂堂上下歌瑟及笙並作也若工歌闗雎則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之工升歌後立司正以正之故知鄉飲酒能和樂不流邪失禮也朱子曰合樂孔疏非是當從儀禮賈疏謂堂上歌瑟堂下笙磬合奏此六詩也三終者二南各三終也賓酬主人主人酬介介酬衆賓少長以齒終於沃洗者焉知其能弟長而無遺矣注遺猶脱也忘也黨疏言旅酬之時賓主人之各以少長為齒以次相旅至於執掌罍洗之人以水沃盥洗爵者皆預酬酒之限此經據旅酬之時其少長以齒終于沃洗是無算爵之節也弟少也言少之與長皆被恩澤而無遺棄也朱子曰弟悌也敬順之意言能使少者皆承順以事長者而無所遺棄也降説屨升坐修爵無數飲酒之節朝不廢朝莫不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也注朝夕朝莫聽事也不廢之者既朝乃飲先夕則罷其正也終遂猶充備也疏降説屨升坐者此謂無算爵之初也以前皆立而行禮未徹俎故未説屨至此徹俎之後乃説屨升堂坐也修爵無數者謂無算爵也熊氏云謂行爵無數矣蕙田案儀禮説屨揖讓如初升坐乃羞無算爵無云修爵者此文修字當是羞之誤耳羞字為句儀禮所云乃羞也爵無數為句儀禮所謂無算爵也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也吕氏大臨曰禮之所尊尊其義也其文則擯相習之其義則君子知之也修其文達其義然後可以化民成俗也有貴賤隆殺之義則有别矣有别有禮也和樂而不流燕安而不亂則有節矣有節義也弟長而無遺則均均則仁矣仁義具有禮行乎一鄉達乎一國所謂正身安國矣舉斯術也達之于天下則天下安矣故由一鄉而知王道可行于天下此禮是也蕙田案自孔子曰吾觀于鄉至此朱子儀禮經𫝊通解移置本篇之首觀承案朱子儀禮經𫝊通解考訂次第裁節注疏俱為精當而簡明惟其將經文移易之處每多不概於人心即如鄉飲酒義一篇其義在前而孔子之論在後亦何不可乃定將孔子一叚移置在首恐反失先案後斷之序矣何如悉仍舊次之為當乎鄉飲酒之義立賓以象天立主以象地設介僎以象日月立三賓以象三光古之制禮也經之以天地紀之以日月參之以三光政教之本也注日出於東僎所在也月生於西介所在也三光三大辰也天之政教出於大辰焉也疏前經隂陽據其氣日月言其體僎在東北象日出介在西南象月出也昭十七年有星孛于大辰公羊云大辰者何大火也伐為大辰北辰亦為大辰故爾雅云大辰房心尾也大火謂之大辰北極謂之北辰是三大辰也何休云大火與代天所以示民時早晚天下取以為正故謂之大辰辰時也是天下之政教出於大辰亨狗於東方祖陽氣之發於東方也注祖猶法也狗所以養賓陽氣主養萬物洗之在阼其水在洗東祖天地之左海也注海水之委也尊有𤣥酒教民不忘本也注太古無酒用水而已吕氏大臨曰天地之間海居于東東則左也故洗在阼水在東有左海之義賓必南鄉東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偝藏也注春猶蠢也蠢動生之貌也聖之言生也假大也愁讀為揫揫斂也察猶察察嚴殺之貌也南鄉鄉仁貴長大萬物也吕氏大臨曰天子南面而立左則東方東方聖也左之則尊之也鄉則南方南方仁也鄉之則宗之也右則西方西方義也右之則用之也偝則北方北方藏也偝之則違之也天子之立如是而坐賓亦南鄉者尊賓之至也介必東鄉介賓主也注獻酬之禮主人將西賓將南介覸其間也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也注言禮之所共由主人出也月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也注言禮者隂也大數取象法於月也三疏月者三日則成魄者謂月盡之後日乃成魄魄謂月輪生傍有微光也此謂月明盡之後而生魄前月小則三日乃生魄凡建國立三卿助君治國今鄉飲酒立三賓亦象國之立三卿故云政教之本也朱子曰魄者月之有體而無光處也故書言哉生明旁死魄皆謂月二三日月初生時也言既生魄即謂月十六日月始闕時也此篇兩言月三日而成魄疏知其繆而曲徇之故相戾之甚蕙田案古人以死魄為朔生魄為望朔之日明已生矣至三日而曰哉生明者前此之明尚微也望之日魄已生矣至三日而曰成魄者前此之魄尚微也記云三日則成魄謂望後之三日以月自既望以後自盈而虧有盈滿不居之象三讓之義實取于此記文本無誤疏家以為朔後之三日因謂魄在月輪傍之微光則是誤會本文耳陳氏禮書禮義者人性之所固有然民勞於耕穫則曠於尊卑長幼貴賤之節先王於是因其暇時制為鄉飲之禮以正齒位此争讓絜敬之俗所以成而鬬辨暴亂之禍所以息也其屬飲則於鄉學其主則鄉官其賓介則處士賢者其謀賓介則就先生先生致仕老于鄉里者黨正國索鬼神而祭祀以禮屬民飲酒于序則黨正飲酒必於每歳蜡時也州長春秋以禮會民射于州序卿大夫士之射必先行鄉飲酒禮則州之飲酒必於春秋也鄉大夫三年大比而興賢者能者以禮禮賓之則鄉之飲酒又於三年興賢能之時也其坐主人於東南僎於東北坐賓于西北坐介于西南此所以正齒位也一命齒于鄉里再命齒于父族三命不齒六十者三豆七十者四豆八十者五豆九十者六豆此所謂正齒也以至牲則用狗樂則工歌鹿鳴之三間歌魚麗之三笙由庚之三尊于房户之間羞出東房洗當東榮與夫升降酬酢繁省隆殺之辨皆制之以道此孔子所以觀之而知王道之易易也然鄉射衆賓之席繼而西鄉飲三賓之席不屬鄉射無介而飲有介鄉射處士為賓大夫與則易之以公士鄉飲處士為賓有大夫與不易之者以鄉飲之所重者在賓與射異也後世鄉飲酒廢間或講求而復古者則漢明晉武常舉之於上伏湛李忠常行之於下而史臣稱之以為美談蓋名生於不足也右鄉飲酒義五禮通考卷一百六十七
