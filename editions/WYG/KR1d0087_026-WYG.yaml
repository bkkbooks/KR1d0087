body:
  text: 五禮通考卷十六刑部尚書秦蕙田撰吉禮十六圜丘祀天宋史孝宗本紀隆興二年二月丙子詔減文武官及百司吏郊賜之半七月庚子詔内外文武官年七十不請致仕者遇郊毋得䕃補十一月戊子以金人侵擾詔郊祀改用明年十二月戊子詔郊祀大禮遵至道典故改用來年正月一日上辛文獻通考孝宗隆興二年詔今嵗冬至日當郊見上帝可令有司除事神儀物諸軍賞給依舊制外其乗輿服御及中外之費並從省約太常少卿洪适言陛下盛德重華度越古昔初講郊禋之禮宜進胙慈闈並受帝祉乞下有司草具儀注進呈從之禮部太常寺具上儀注郊祀獻禮畢皇帝將詣飲福位次贊者引光禄卿詣南壝門外幕次易常服次帥執事者入詣進胙幄内以所進胙設于腰輿匣内胙以牛腥體肩三臂二臑二次輦官擎腰輿進行光禄卿從至端誠殿上以腰輿隨地之宜置定輦官權于殿下立光禄卿以胙授進胙官進胙官受訖光禄卿以下先退次進胙官帥捧擎人擎腰輿入詣齋殿前以腰輿望德壽宫設定執事内侍鋪設褥位于其後以俟皇帝還齋殿服履袍訖内侍官前導詣褥位執事内侍啟匣葢内侍官奏請皇帝稍前躬視訖復位執事内侍封鏁匣訖奏請拜皇帝再拜訖掌表内侍以表授進胙官進胙官受表訖皇帝還齋殿次進胙官帥捧擎人擎腰輿以出至端誠殿上權置定輦官升殿捧擎降殿進行親從官援衞至奉禋門外進胙官騎從至德壽宫門外進胙官下馬後從以入至殿下置定以表并胙授德壽宫提舉官供進訖進胙官以下乃退自後遇郊並如上儀建炎以來朝野雜記隆興二年孝宗初行大禮時湯慶公思退為左相上問郊與明堂之費如何户部尚書韓仲通曰郊之費倍於明堂侍郎錢靖禮言不過增二十萬若從祖宗故事一切從儉自宜大有減省上以為然乃詔除賞軍事神外並從省約其秋金虜入寇遂以明年正月辛亥朔旦行之上自宫徂郊乗玉輅用鹵簿之半禮畢乗平輦而歸乾道三年再郊始復備五輅歸用大安輦焉宋史孝宗本紀乾道元年春正月辛亥朔合祀天地于圜丘大赦改元禮志孝宗隆興二年詔曰朕恭覽國史太祖乾德詔書有云務從省約無至勞煩仰見事天之誠愛民之仁所以垂萬世之綂者在是今歲郊見可令有司除禮物軍賞其餘並從省約初降詔以十一月行事以冬至適在晦日以至道典故改用獻歲上辛遂改來年元為乾道乃以正月一日有事南郊禮成進胙于德壽宫以牛腥體肩三臂二臑二導駕官自端誠殿簪花從駕至德壽宫上壽飲福稱賀陳設儀注並同上壽禮皇帝致詞曰皇帝臣某言享帝合宫受天純嘏臣某與百僚不勝大慶謹上千萬歲壽自後郊祀明堂進胙飲福並如上儀宗室傳令詪隆興初除同知大宗正事奏減郊祀賞給以助軍興詔褒之孝宗本紀乾道三年十一月丙寅合祀天地于圜丘大赦李燾傳㑹慶節上壽在郊禮散齋内議權作樂燾言漢唐祀天地散齋四日致齋三日建隆初郊亦然自崇寧大觀法周禮祭天地故前十日受誓戒今既合祭宜復漢唐及建隆舊制庶幾兩得六年十一月壬午合祀天地于圜丘大赦蕙田案宋世例三年一郊此葢以元年四年兩祭各後一年故此復先一年以正其期也九年十一月戊戌合祀天地于圜丘大赦改明年為淳熈元年淳熈三年十一月癸丑合祀天地于圜丘大赦十二年十一月辛丑合祀天地于圜丘大赦蕙田案此祭之前缺二祭林栗傳冬至有事南郊前期十日百執事聽誓戒㑹慶節有㫖上壽不用樂迨宴金使乃有權用樂之命栗以為不可致書宰相不聽乃乞免充舉冊官以狀申朝廷曰若聽樂則廢齋廢齋則不敢以祭祖宗二百年事天之禮今因一介行人而廢之天之可畏過於外夷逺矣不聽趙雄傳金使入辭故事當用樂雄奏卜郊有日天子方齋樂不可用上難之遣中使諭雄雄奏金使必不敢不順即有他臣得引與就館上大喜蕙田案二傳文不知的在何年總是孝宗時事故列于此意即一事而兩人各言之耳光宗本紀紹熈二年十一月壬申合祭天地于圜丘以太祖太宗配大風雨不成禮而罷禮志紹熈二年十一月郊以值雨行禮於望祭殿寧宗本紀紹熈五年七月即位九月辛未合祭天地于圜丘大赦慶元三年十一月甲辰祀天地于圜丘大赦嘉泰三年九月詔南郊加祀感生帝太子庶子星宋星十一月乙亥祀天地于圜丘大赦四年九月得四圭有邸玉一詔藏于太常文獻通考寧宗嘉泰三年祕書省言看詳福州進士張容圖繳進南郊辨駁冊内太子庶子之星以謂皇儲未慶理宜加祀并宋星乃國朝受命之符興王之地及感生帝本朝係火德尤宜遵崇乞並特加祀于圜丘容圖所陳數事實闗國體辭理可採乞下禮寺施行從之五年臣僚言伏睹郊禋在即陛下祗奉神示其純誠固有以昭格矣而躬行盛德又自足以上當天心不唯致敬於練日告䖍之時也然臣以為一人致其精一於上必百官有司駿奔無射而不匱於下斯可以咸助聖德而潛通於眑㝠自然神示降格而福禄之來下也周頌有曰濟濟多士秉文之德對越在天春秋傳曰有司一人不備其職不可以祭祭者薦其敬也薦其美也臣請得而詳陳之商人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也此祭宗廟之文也而周家祀天祭地奏黄鍾歌大吕奏太蔟歌應鍾其為詔告於天地之間則一也樂工瞽師葢聲音之所自出今登歌之樂列於壇上簉于上龕葢上帝地祗太祖太宗並侑之側也而宫架之樂列于午階之下則百神之所同聽也夫樂莫尚於和平以平時羣祀言之絲竹管絃類有斷闋未知今復何似戞擊搏拊鼓吹佾舞之工葢數百人寠人賤工安能蠲潔而無請繫名之人亦與其間垢穢擾雜殆不可辨此不可不嚴者一也周人尚臭灌用鬱鬯臭陰逹于淵泉灌以圭璋用玉氣也既灌然後迎牲蕭合黍稷臭陽達于牆屋故既奠然後焫蕭合羶薌此祭宗廟之文也而大雅所言卬盛于豆于豆于登其香始升上帝居歆胡臭亶時毛氏曰木曰豆瓦曰登豆薦􅉁醢也登大羮也其求乎神之義則一也今自圜壇之上暨于層龕之相承位列甚衆所謂籩豆簠簋登鉶罇爼之實内唯牲牢至期宰擊餘如膴鮑魚鱐與夫兎雁蠯蚳之醢麋鹿之臡其類甚不一也皆各司之所預造也餌餈酏糝黍稷稻粱之食芹筍之菹亦不一也則皆神厨至期之所造也竊聞預造者先後遲速或不能指掯日分至有色惡臭惡之慮而先期呈饌之時或兩辰浹無乃太早而所供之物或不可用如醢臡之屬覆之瓦瓿無復再察其可改換者未見倉卒而無復可察者不可得而措手矣葢呈饌出于一時頃刻之間而預造之司吏卒習于鹵莽之素而有司掌之者不過一廵視之而已百司狃于文具至於事神亦復無忌以至酒齊之設凡有數等京尹之司不過委之右選趨走之人其為醇醨既不可品嘗其不中度者甚多也氣臭之不嚴如此豈復有馨香之上達也哉矧又有最甚者名為供官殆百餘人祭之日凡籩豆簠簋登鉶罇爼之屬滌濯者此曹也籩豆簠簋登鉶罇爼之實鋪設者亦此曹也滌濯固已鹵莽而夜半設實於器皆其手所敷頓豈但蕡䕩乾物之類而醢臡餌􅓞腥熟酒齊之屬亦皆出于其手之所置竊聞此曹繫籍奉常平時所給微甚藍縷垢穢殆不可近而况執事之夕又復無所止宿半夜而興靧面濯手皆所不及也僅有漫漶之服以蒙其外而可使之供祭實乎至若贊引之人亦百餘軰進退于神位儀物之間上焉則切近于至尊次焉則隨逐於禮官平時亦皆供官之類耳以垢汙之人而蒙之以漫漶之服是皆不可進退于神位儀物之間者也此不可不嚴者二也昔魯人之祭也日不足繼之以燭雖有彊力之容肅敬之心皆倦怠矣有司跛倚則為不敬之大今圜丘一龕之位通二龕三龕至壝埒之内外為位者八百分獻之官贊禮之人不能審候壇上疾徐之節但欲速于竣事獻官既多而禮生率常抽差六部寺監帥漕之貼吏為之既不閑習于禮而贊引㨗給獻官跪拜俛興酌奠皆不及于禮端行無有而并行如奔其為怠慢甚矣此不可不嚴者三也夫三説如此正合汲汲求所以整齊之臣愚以為天下之事一則治散則偷久則專暫則忽今郊禋大禮其百司所供之物所造之物各有攸司固不可不分任之也而提綱總要當出于一不然則禁之徒峻察之徒苛而下之便文逃責終不可得而究也奉常為九卿之長葢統攝齊一之所自出况今郊禋大禮實又奉常之所掌乎臣前所陳登歌宫架之工奉常固自有籍矣其有請者若干人而尚不足用則未免以無請寄名者足之今名為色長者當攷見絲竹管絃有無斷闕速行修補仍必拘集羣工洗沐澣濯存其衣裝之可者其有不整之人責限令其措辦可也今雖有澣濯之令而莫之遵奉也若其供官贊引之人垢弊已甚又非樂工之比乞從御史臺行下奉常于一行人㸃名之外更加逐一檢察合用若干人除其間稍可備數之人自餘垢弊已甚必不可責其自辦者令奉常具申朝廷行下外祗備庫將先來檢計退下漫漶舊弊之物置造衲衣一褐一褲先期發下奉常見名責領色長至期盡去其垢弊之衣而外襲之以法服表裏咸潔可以執事于籩豆簠簋登鉶罇爼之間而親近于崇嚴清肅之地矣若夫一行合干等人名數猥衆乞下臨安府令于便近慈雲等處闗報居民灑掃為備先期一夕令執色之人分就民居止宿夜半而興各靧面濯手整束衣服以趨祭所仍周環壇下約每十數步為置一盥帨俾供官禮生等人必先盥帨而後升壇所是半夜鋪設亦乞于分獻官差劄内就令分頭躬親同供官逐位鋪設務令極其嚴潔一一如法所設神厨雖已差官監造亦必奉常譏察之仍乞下臨安府大禮酒庫專差文官監造而預造之厨從所司亟撥人員徑過奉常躬親監造可也雖然今奉常之官朝廷分遣專一周旋檢察如升歌宫架之工預造近造之厨府屬所造之齊供官贊引之役察之必周令之必嚴皆歸于奉常而不至於散漫苟且而無及于事也彼分獻贊引之人必令詳緩如禮亦從御史臺行下約束夫以郊禋大禮竊聞鉅費至數百萬而四方之犒費不與焉皆非切於事神也而聲音氣臭之用莫嚴於圜丘一處耳若夫先二日之朝獻先一日之朝享其聲音氣臭之用則同出乎此也臣前所陳弊害非一此而不嚴則鉅費數百萬皆所謂不揣其本而齊其末也臣觀士庶之家或延緇黄設禱祠主人齋戒於家而僮僕莫不知懼於下庖厨者屏氣不息守䕶者呵禁甚䖍仰唯萬乗之尊郊禋大禮赫臨在下陛下嚴恭寅畏無一息之少間而又臨之以五使之重兢兢謹飭而百官有司顧循習舊弊不能凜然上承九重之意其可不亟正之以對越天地祖宗之威靈從之宋史寧宗本紀嘉定五年十一月壬戌祀天地于圜丘大赦樂志寧宗郊祀二十九首皇帝入中壝乾安合祀丘澤登侑祖宗顧諟惟精靈承惟恭有嚴皇儀有莊帝容監于克誠肅肅雍雍降神景安圜鐘為宫天門蕩蕩雲車陰陰百神咸秩三靈顧歆神哉來娭神哉溥臨饗時宋德翼翼小心黄鍾為角華葢既動紫㣲洞開星樞周旋日車徘徊靈兮顧佐靈兮沛來載燕載娭式時壇垓太蔟為徴泰尊媪釐祖功宗德辰躔陪營嶽瀆受職神哉來下神哉來格饗德惟馨留虞嘉席姑洗為羽金石宣昭羽旄紛綸潔火夕昭明水夜陳娭哉惟靈娭哉惟神風馬招揺惟德之親皇帝盥洗乾安皇帝儉勤盥用陶瓦禮神頌祗奠幣獻斚月鑑陰肅醴液融冶挹彼注兹禮無違者升壇乾安崇臺穹窿髙靈下墮慶陰彷彿從坐嶫峨宵昇于丘時通權火維天之命百禄是荷降壇帝饗于郊一精二純紫觚陟降嘉玉妥陳神方留娭瑞貺紛綸申錫無疆螽斯振振還位肅肅禮度鋗鋗宫奏天行徐謐皇儀昭懋光連重璧物備簋豆於皇以饗無聲無臭尚書奏爼列爼孔陳嘉籩維實鼎鍖陽燧玉流星液我柱既碩我薦既苾神監下昭安坐翔吉再詣盥洗帝登初觴禮嚴再盥精明顯昭齊顒洞貫靈娭留俞神光炳煥秋宗受福永壽於萬再升壇紫壇嶽立神光夜燭有儼旒采有鸞佩玉霄垠顧佑祖宗熈穆對越不忘俾爾戩榖降壇乾安天容澄謐景氣宴和贊斚薦醇鋗璆叶歌帝降庭止夜其如何神助之休宜爾衆多還位乾安甘露流英卿雲舒采靈俞有喜神光晻曖穆穆來蒞洋洋如在帝用居歆澤及四海入小次乾安聽惟饗德監惟棐忱顧諟思明靈承思欽永言端蒞肅對下臨上帝是皇母貳爾心文舞退武舞進正安羽籥陳容干戚按節德閑而泰功勞而决虞我神祗揚我謨烈盡美盡善福流有截亞獻正安帝臨中壇神從八陛華玉展瑞明馨薦醴亦有嘉德克相盛禮獻兹重觴降福瀰瀰終獻正安敬事天地升侑祖宗陳盥于三介觴之重秉德翼翼有來雍雍相于祀事福嘏日溶出小次乾安孝奏展成熈儀畢薦光流桂爼祥衍椒奠風管晨凝雲容天轉拜貺于郊右序詒燕詣飲福位乾安所饗惟清所欽惟馨靈喜留俞天景窈㝠福禄來成福禄來寧皇用時斂壽我慈庭飲福禧安瓚斚觩䚧觥罍氤氲有醴惟香有酒惟欣肸蠁豐融懿懿芬芬我龍受之如川如雲降壇乾安天錫多祉皇受五福言瞻瑶壇迄奉瑄玉昭星炳燿元氣回復帝儀載旋有嘉穆穆還位乾安璇圖天深鼎文日輝慶流皇家象炳紫微乾回冕旒雲煥衮衣何千萬年式于九圍尚書徹豆熈安蘭豆既升簠簋既登禮備爼實饗貴牲烝時乃告徹器用畢興祚我皇基介福是膺送神景安神輔有德來燕來娭禮薦熈成三靈逆釐神饗有道言旋言歸福祉咸蒙百世本支詣望燎位乾安莫神乎天陽嘘而生日月星辰皆乾之精肆求厥類與陽俱升眡燎于壇展也大成詣望瘞位乾安地載萬物陰翕而成山嶽河瀆皆坤之靈克肖其象與陰俱凝眡瘞于坎思求厥成還大次乾安福方流胙祈方欽柴鹵簿載肅球架允諧帝祉具臨皇靈允懐遄御于次降福孔皆還内乾安八神呵蹕千官景從回軫還衡寢威盛容妥飾芝鳳御朝雲龍歸壽慈闈敷時民雍理宗本紀寶慶三年十一月辛巳日南至郊大赦改明年為紹定元年王圻續通考理宗寶慶三年詔今歲郊祀大禮令有司除事神儀物諸軍賞給依舊制外其乗輿服御及中外支費皆從省約是年十一月辛巳日南至祀天地于圜丘宋史禮志理宗四十一年一郊而已度宗本紀咸淳二年秋七月壬辰詔以來年正月一日郊禮志度宗咸淳二年權工部尚書趙汝暨等奏今歲大禮正在先帝大祥之後臣等竊惟帝王受命郊見天地不可緩也古者有改元即郊不用前郊三年為計况今適在當郊之歲既踰大祥之期圜丘之祀豈容不舉於是降札以十一月十七日欵謁南郊適太史院言十六日太陰交蝕遂改來年正月一日南郊行禮太常寺言皇帝既已從吉請依儀用樂其十二月二十九日朝獻景靈宫三十日朝享太廟尚在禫制之内所有迎神奠幣酌獻送神作樂外其盥洗升降行步等樂備而不作度宗咸淳二年將舉郊祀時復議以髙宗參配吏部侍郎兼中書門下省檢正洪燾等議以為物無二本事無二初舜之郊嚳商之郊契周郊后稷皆所以推原其始也禮者所以别等差視儀則逺而尊者配於郊近而親者配於明堂明有等也臣等謂宜如紹興故事奉太宗配將來明堂遵用先皇帝彜典以髙宗參侑庶於報本之禮奉先之孝為兩盡其至詔恭依度宗本紀咸淳三年正月巳丑朔郊大赦王圻續通考六年孟夏祀上帝于圜丘蕙田案本紀不載此祭王氏當别有所考周密南渡宫禁典儀三歲一郊預於元日降詔以冬至有事于南郊或用次年元日行事先於五六月内擇日命漕帥及修内司修飾郊壇及絞縳青城齋殿等屋凡數百間悉覆以葦席䕶以青布并差官兵修築泥路自太廟至太禋門又自嘉㑹門至麗正門計九里三百二十步皆以潮沙填築其平如席以便五輅之往來每隊各有歌頭以綵旗為號唱和杵歌等曲以相兩街居民各以綵叚錢酒為犒又命象院教象前導朱旗以二金三鼓為節各有幞頭紫衣蠻奴乗之手執短鑺旋轉跪起悉如人意又以車五乗壓之以鐵多至萬觔與輅輕重適等以觀疾徐傾側之勢至前一月進呈謂之閃試及駕出前一日縳大綵屋於太廟前置輅其中許都人觀瞻先是自前一月以來次第按試習儀殆無虛日郊前十日執事陪祀等官並受誓戒於尚書省前三日百官奏請皇帝致齋於大慶殿是日上服通天冠絳紗袍綪結佩升髙座侍中奏請降座就齋室次日車駕詣景靈宫服衮冕行禮禮畢駕回就赴太廟齋殿宿是夕四鼓上服衮冕詣祖宗諸室行朝饗之禮是夜鹵簿儀仗軍兵於御路兩傍分列間以籸盆蕡燭自太廟直至郊壇泰禋門輝映如畫宰執親王貴家巨室列幕櫛比皆不逺千里不憚重費預定於數月之前而至期猶有為有力所奪者珠翠錦繡絢爛於二十里間歌舞遊遨工藝百物輻輳爭售通宵駢闐至五更則䂍矟先驅所至皆滅燈火葢清道祓除之義黎明上御玉輅從以四輅導以馴象千官百司法駕儀仗錦繡雜還葢十倍孟饗之數聲容文物不可盡述次第出嘉會門至青城宿齋四璧皆三衙諸軍周廬坐甲軍幕旌旗布列前後傳呼唱號列燭互廵往來如織行宫至暮則嚴更警惕鼓角轟振又有衞士十餘隊每隊十餘人互相唱探至三鼓執事陪祀官並入就黄壇排立萬燈輝耀粲若列星凡齪燈皆自為誌號如捧爼官則畫一人為捧俎之狀用丑時一刻行事至期上服通天冠絳紗袍乗輦至大次禮部侍郎奏中嚴外辦禮儀使奏請皇帝行事上服衮冕步至小次升自午階天步所臨皆藉以黄羅謂之黄道中貴一人以大合貯片腦迎前撒之禮儀使前導殿中監進大圭至版位禮直官奏有司謹具請行事時壝壇内外凡數萬衆皆肅然無譁天風時送佩環韶濩之音真如九天吹下也太社令升煙燔牲首上詣昊天位次皇地祗次祖宗位奠玉祭酒讀冊文武二舞次亞終獻行禮畢上詣飲福位爵飲福酒禮直官唱賜胙次送神次望燎訖禮儀使奏禮畢上還大次更衣乗輦還齊宫百僚追班賀禮成於端誠殿黎明上乗大安輦從以五輅進發教坊排立奏致語口號訖樂作諸軍隊伍亦次第鼓吹振作千乗萬騎迤邐入麗正門教坊排立再奏致語口號舞畢降輦小憩以俟辦嚴登門肆赦弁陽老人有詩云黄道官羅瑞腦香衮龍升降佩鏘鏘大安輦奏乾安曲萬㸃明星簇紫皇又曰萬騎雲從簇錦圍内官排立馬如飛九重閶闔開清曉太母登樓望駕歸李鶴田詩云嚴更頻報夜何其萬甲聲傳逺近隨梔子燈前紅炯炯大安輦上赴壇時四郊壇天盤至地髙三丈二尺四寸通七十二級分成上廣七丈共十二階分三十六龕午階濶一丈主上升降由此階其餘各濶五尺圜丘之上止設昊天上帝皇地祗二神位及太祖太宗配天十六龕共祀五帝太一感生北極北斗及分祀衆星三百六十位儀仗用六千八百八十九人自太廟排列至青城玉輅下祗應人共三百二十一人呵喝人員二人教馬官二人挾捧輪將軍四人推輪車子官健八人駕士班直二百三十二人千牛衞將軍二員抱太常龍旗官六員職掌五人專知官一名手分一名庫子八人裝掛匠二人諸作工匠十五人葢覆儀鑿司十一人監官三員金象革木輅每輅下一百五十六人玉輅青飾金輅黄飾象輅紅飾革輅淺色飾木輅黒飾輅下有人冠服並依輅色玉輅前儀仗騎導騎導官左壁文臣右壁武臣六軍儀仗宫兵二千二百三十二人左右諸將軍十三員中道五員左右八員金吾街仗司執䂍矟八十人攝將軍八員仗下監門二十六員鼓吹五百八十三人導駕樂人三百三十人大禮後擇日行恭謝禮第一日駕出如四孟儀詣景靈宫天興殿聖祖前行恭謝禮次詣中殿祖宗神御前行禮還齋殿進膳訖引宰臣以下賜茶茶畢還内第二日上乗輦自後殿門出教坊都管已下於祥曦殿南迎駕起居參軍色念致語雜劇色念口號樂作駕後樂東西班則于和寧門外排列後從作樂將至太一宫道士率衆執威儀于萬壽觀前入圍子内迎駕起居作法事前導入太一宫門降輦候班齊詣靈休殿參神次詣五福十神太一次詣申佑殿本命北辰殿通真殿佑聖順福殿太后本命延夀殿南極火德殿禮畢宣宰臣已下合赴坐官並簪花對御賜宴上服幞頭紅上葢玉束帶不簪花教坊樂作前三盞用盤盞後二盞屈巵御筵畢百官侍衞吏卒等並賜簪花從駕縷翠滴金各競華麗望之如錦繡衙前樂都管已下三百人自新椿橋西中道排立迎駕念致語口號如前樂動滿路花至殿門起壽同天曲破舞畢退姜白石有詩云六軍文武浩如雲花簇頭冠様様新惟有至尊渾不戴盡將春色賜羣臣萬數簪花滿御街聖人先自景靈回不知後面花多少但見紅雲冉冉來蕙田案郊天大祀君若臣惟有嚴恭寅畏肅清將事以交神明且歲歲行之乃有國之常典無他竒也自後世不復常行郊禮遂有赦賚之舉相沿既久繁費滋多至使郊禮難行其失已大矣乃更務為紛華珠玉錦繡絢爛數十里士女遊遨夜以繼日非特慢神䙝神弗克致享勢已偏安驕汰至是國事遂不可為矣備附于此以為後世鑒右宋郊禮五禮通考卷十六
