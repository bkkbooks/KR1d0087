body:
  text: 五禮通考卷三十一刑部尚書秦蕙田撰吉禮三十一五帝蕙田案五帝之祭周禮最著月令迎氣雖不言祀事而大皥炎帝黄帝少皥顓頊及勾芒祝融后土蓐收𤣥㝠所謂五人帝五人神皆與家語合說者以為五方之帝即上帝之佐故注疏家及諸儒以四郊之兆即迎氣之祭理或然也乃鄭康成創為六天之說而五帝遂與昊天上帝並尊又一一為之名字以明堂大享為總祭五帝則舛矣先儒辭而闢之不爽也三代而後秦之鄜宻上下四畤漢增北畤所祀皆五帝其所由來者舊矣東漢以降或從祀於圜丘或合祭於明堂或分祭於迎氣大抵由重即輕由繁即簡逮明而不臚於祀焉此亦不相沿襲之一大端也後世合祭之事多附見南郊大饗今復另為一門專以四時迎氣屬焉考禮者亦可知所别矣周禮春官小宗伯兆五帝於四郊注兆為壇之營域五帝蒼曰靈威仰太昊食焉赤曰赤熛怒炎帝食焉黄曰含樞紐黄帝食焉白曰白招拒少昊食焉黒曰汁光紀顓頊食焉黄帝亦於南郊鄭氏鍔曰求神各從其類故蒼帝東赤帝南白帝西黒帝北各於其郊四郊為四帝之兆黄帝之位學者之論不一余以月令攷之中央土位於季夏之後夏火也火生土其相生也乃所以相繼也然則黄帝之兆其同位於南郊乎說者謂玉用黄琮不用赤璋其位乃同南郊何耶余以為祭之玉當放其色求之方各因其位王氏昭禹曰昊天之有上帝猶國之有君五精之君猶四方之諸侯諸侯有君道故皆謂之君五精之君有帝道故皆謂之帝陳氏汲曰鄭氏惑六經緯書有六天之說後世莫能廢至唐許敬宗始立論非之近世學者亦知其誕大宰掌次司服皆言祀五帝大宗伯以青圭禮東方赤璋禮南方白琥禮西方元璜禮北方小宗伯兆五帝於四郊則是為迎氣設於四郊之中立五兆所謂五帝者五行之精氣東方青帝南方赤帝西方白帝北方黒帝中央黄帝鄭氏所謂五人帝從祀之說則於義未害葢本月令之言夫人臣如重黎五行之官尚從祀則以五德之帝配食於五行精氣或者是歟案鄭氏注大宗伯青圭禮東方等謂蒼精之帝然則此所謂五帝者即鄭氏所注大宗伯之文謂五行精氣之帝也鄭氏於彼注已是於此五帝之下又别為五帝名則為誕矣蕙田案鄭解兆字甚是五帝之說陳及之為正先儒駁註疏六天之謬及五帝與上帝之辨詳見圜丘門不重錄劉氏彛曰天地之道隂陽二氣而已春生夏長秋實冬藏品彚於斯各正性命聖人不忘乎其所自遂即圜丘以祀昊天上帝者報本也兆於四郊以祀五帝者迎時氣也報本所以神天之道必有宰而御之者故曰昊天上帝迎氣所以神天之時以其應候晷刻差故曰五方帝六者無形也而萬物賴其生成之功無位也而聖人代其柄任之命雖欲神而報之莫知其神之所在也故望其昊昊然則圜丘報本之義生焉望其五方之色則兆於四郊之禮作焉亦猶宗廟一祖也而六享行焉故天雖曰神地雖曰祗亦強名而神之者也何以知其然哉謹案大司樂之職云乃分樂而序之以祭以享以祀乃奏黄鍾歌大呂舞雲門以祀天神若夫地示則與四望也山川也各異其樂天神至尊一樂而已明其神之不二也又大裘而冕圜丘五兆不異此服示其同也聖人之意其在兹乎禮記禮器因吉土以饗帝於郊饗帝於郊而風雨節寒暑時注吉土王者所卜而居之土也享帝於郊以四時所兆祭於四郊者也今漢亦四時迎氣其禮則簡五帝主五行之氣和而庶徴得其序也五行木為雨金為暘火為燠水為寒土為風疏此謂祭五方之帝因其所卜吉土以為都享祭五方之帝於都之四郊又王者各祭感生之帝於南郊是也方氏慤曰吉土卜土之吉者以為之兆也蕙田案經文曰吉土曰郊自當以圜丘為正所謂因天事天為髙必因丘陵也鄭以吉土為所卜而居之土則指王者所居之都與因天之義不符矣又以郊為專主四郊之壇兆而圜丘反不與葢鄭以圜丘與郊為二故不引大司樂地上之文而專以小宗伯四郊為說意欲自掩其闕而不知其詞之曲義之漏也觀疏言王者祭感生之帝於南郊亦是則孔氏已深窺其隱而代補之矣今從先儒正說載入郊祀門仍附見於此葢經文固不專言四郊之兆而四郊當亦在其中也爰綠注說而正之右五帝兆家語五帝篇季康子問於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老􅅨曰天有五行水火金木土分時化育以成萬物王注一歳三百六十日五行各主七十二日也化生長育一歳之功萬物莫不成其神謂之五帝五帝五行之神佐天生物者而後世讖緯皆為之名字亦為妖怪妄言古之王者易代而改號取法五行五行更王終始相生亦象其義法五行更王終始相生以木德王天下其次以生之行轉相承而諸說乃謂五精之帝下生王者其為蔽惑無可言者故其為明王者死而配五行是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也木生火火生土之屬康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥㝠為水正后土為土正此則五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號天至尊物不可以同其號亦兼稱上帝上得包下五行佐成天事謂之五帝以地有五行而其精神在上故亦謂之上帝黄帝之屬故亦稱帝葢從天五帝之號故王者雖號稱帝而不得稱上帝而曰天子者子之與父其尊卑相去遠矣曰天王者言乃天下之王也昔少皥氏之子有四叔曰重曰該曰修曰熈實能金木及水使重為勾芒該為蓐收修及熈為𤣥㝠顓頊氏之子曰黎為祝融共工氏之子曰勾龍為后土此五者各以其所能業為官職各以一行之官為職業之事生爲上公死爲貴神别稱五祀不得同帝神故不得稱帝也康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百榖者衆矣唯勾龍兼食於社兼猶配也而棄爲稷神易代奉之無敢益者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其德不可以多也楊氏復曰此章注云五帝五行之神佐天生物者而後世讖緯皆為之名字亦為妖怪妄言夫所謂為之名字如靈威仰而下是也自伏羲始畫八卦更文王夫子而後易道偹卦象文言繫辭言天者詳矣何嘗有此等名字推原此說之所出則曰易緯乾鑿度也春秋緯文耀鉤也運斗樞也孝經緯鉤命决也援神契也抑不知易也春秋也孝經也聖人何嘗有一言一句如此信乎其為妖怪妄言矣但此章所謂五帝五行之神佐天生物者愚恐非夫子之言或謂家語王肅所作何也以易論之乾坤為父母震巽坎離艮兌為六子卦畫固有此象矣然序卦言帝出乎震齊乎巽自震巽而下皆天帝之為也謂在天有五行能生物則可謂五行佐天生物則天與五行為二矣是以程子曰不知乾坤之外甚底是六子譬如人之四肢只是一體耳學者大惑也馬氏端臨曰案五帝之祀見於周禮五帝之義見於家語其說本正大也自秦漢間廢祀天之禮而以所謂郊祀者祀於五畤名曰五帝鄭康成解經習聞秦漢之事遂於經所言郊祀多指爲祀五帝且據緯書爲之名字於是王子雍羣儒引經傳以排之而謂五帝者太皥以下五人帝也先儒楊信齋則謂果以五人帝爲五帝則五人帝之前其無司四時者乎鄭則失矣王亦未爲得也其說善矣然楊氏之釋五帝則以爲如毛公所謂元氣昊大謂之昊天逺視蒼蒼謂之蒼天程子所謂以形體謂之天以主宰謂之帝之類則五帝乃天之别名而元未嘗有所謂五帝之神也愚謂若以爲天之别名而已則曰帝可矣何必拘以五又何必於祀上帝之外别立祀五帝之禮乎葢五帝爲五行之主而在天猶五嶽爲五行之鎮而在地家語所言盡之矣今因疑緯書靈威仰等名字而謂五帝之本無因疑五帝之本無而謂家語之非聖言亦過矣如日月星宿風伯雨師皆天神之見於祀典者經傳所言昭昭也而道家者流則以爲各有名稱甚者或爲姓字其妖妄不經甚於緯書儒者所不道也然因是而疑日月諸神之本無可乎林氏之竒曰古之祭上帝與祭五帝之禮以經推之禮莫盛於周周之祭上帝亦曰祀天郊祀之天明堂之上帝即一也郊祀從簡為報本反始以稷配明堂從偹為大享報成以文王配稷王業所始文王王業所成從其類也祭於郊曰天於明堂曰上帝天言兆朕帝言主宰也歳之祭五帝者五周禮先言祀上帝次言祀五帝亦如之葢言祀青帝之禮亦如之祀赤帝之禮亦如之不可詳數故但曰祀五帝亦如之夫所謂祀五帝亦如之者謂大臣之贊相有司之備具至其圭幣則五帝各有方色未嘗與上帝混而同也周禮曰禮東方禮南方月令云四立迎氣故曰歳之祭上帝者四而祭五帝者五若有故而旅則不在此矣蕙田案家語云天有五行水火金木土分時化育以成萬物其神謂之五帝注以爲五行之神佐天生物者此五帝之正義也下云古之王者易代而改號取法五行更王終始相生亦象其義此言五人帝取法五行是五帝之配也文義甚明王氏注此亦本不誤乃王於周禮五帝但指爲五人帝王之蔽也辨之者遂謂家語王肅所作又諸儒之蔽也馬氏林氏之說得之矣禮記月令孟春之月其帝太皥其神勾芒注此蒼精之君木官之臣自古以來著德立功者也太皥宓戱氏勾芒少皥氏之子曰重為木官疏其帝太皥者謂自古以來木德之君其帝太皥也謂之皥者案異義古尚書說元氣廣大謂之昊天則皥皥廣大之意以伏羲德能同天故稱皥以東方生養元氣盛大西方收歛元氣便小故東方之帝謂之太皥西方之帝謂之少皥其神勾芒者謂自古以來主春立功之臣其祀以為神是勾芒者主木之官木初生之時勾屈而有芒角故云勾芒言太皥勾芒者以此二人生時木王主春立德立功及其死後春祀之時則祀此太皥勾芒故言也此言之據死後享祭之時不論生存之日故云其神勾芒勾芒言其神則太皥亦神也太皥言帝則勾芒當云臣也互而相通太皥在前勾芒在後相去懸逺非是一時太皥木王勾芒有主木之功故取以相配也蕙田案少皥在太皥之後故稱少以別之猶太康少康非有優劣也疏謂元氣有大小非孟夏之月其帝炎帝其神祝融注此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏之子曰黎為火官耜疏何允曰春秋說云炎帝號大庭氏又為地皇作耒播百穀曰神農也云黎為火官案昭二十九年左傳云顓頊氏有子曰黎為祝融杜注云祝融明貌中央土其帝黄帝其神后土注此黄精之君土官之神自古以來著德立功者也黄帝軒轅氏也后土亦顓頊氏之子曰黎兼為土官共疏案昭二十九年左傳云顓頊氏有子曰黎為祝融工氏有子曰勾龍爲后土后土為土官知此經后土非勾龍而為黎者以勾龍初為后土後轉為社后土官缺黎則兼之故鄭注大宗伯云黎食於火土以宗伯別云社稷又云五祀勾龍為社神則不得又為五祀故云黎兼也丘氏光庭曰五行獨土神稱后者后君也位居中統領四行故稱君也案左傳勾龍為后土后土為社則是勾龍一人而配兩祭非謂轉為社神也月令土既是五行之神以勾龍配之正與左傳合康成失之于前頴達狥之于後皆非也然楚語曰顓頊命南正重司天火正黎司地黎既司地豈不可配土葢黎之司地兼其職耳非有功於土也若黎可配土則重亦可配天乎且黎為火正而康成猶用兼之配土豈勾龍土官乃不可以配土乎依左氏勾龍配於兩祭不亦宜乎蕙田案五行之中土最大其功亦最鉅故先王於五祀之外又立社稷以祀之而勾龍復配食於社焉一行而兩祀一官而兩配皆所以報其功也中央與社所祀非二故配神亦無二註疏以勾龍轉爲社黎兼土官葢誤丘氏非之是也孟秋之月其帝少皥其神蓐收注此白精之君金官之臣自古以來著德立功者也少皥金天氏蓐收少皥氏之子曰該為金官金疏此秋云其帝少皥在西方金位左傳昭元年云昔天氏有裔子曰昧為𤣥㝠師生允格臺駘稱金天氏與少皥金位相當故少皥則金天氏也又帝王世紀少皥帝號曰金天氏云少皥氏之子曰該為金官者案左傳昭二十九年蔡墨云少皥氏之子曰該又云該為蓐收是為金神佐少皥於秋蓐收者言秋時萬物摧蓐而收歛孟冬之月其帝顓頊其神𤣥㝠注此黒精之君水官之臣自古以來著德立功者也顓頊髙陽氏也𤣥㝠少皥氏之子曰修曰熈為水官疏案五帝德云顓頊髙陽氏姬姓也又帝王世紀云生十年而佐少皥十二年而冠二十年而登帝位在位七十八年而崩以水承金也云𤣥㝠少皥氏之子曰修曰熈者案昭二十九年左傳云少皥氏有子曰修曰熈又云修及熈為𤣥㝠是相代為水官也春秋昭公二十九年左傳蔡墨曰五行之官是謂五官實列受氏姓封爲上公祀爲貴神社稷五祀是尊是奉注五官之君長能修其業者死皆配食於五行之神為王者所尊奉木正曰勾芒注取木生勾曲而有芒角也其祀重焉火正曰祝融注祝融明貌其祀黎焉金正曰蓐收注秋物摧蓐而可收也其祀該焉水正曰𤣥㝠注水隂而幽㝠其祀修及熈焉土正曰后土注土為羣物主故稱后也其祀勾龍焉在家則祀中霤在野則為社獻子曰社稷五祀誰氏之五官也對曰少皥氏有四叔曰重曰該曰修曰熈實能金木及水使重爲勾芒該爲蓐收修及熈爲𤣥㝠世不失職遂濟窮桑注少皥氏之號此其三祀也顓頊氏有子曰黎爲祝融共工氏有子曰勾龍爲后土此其二祀也后土爲社疏五官之君長死則皆為貴神王者尊奉之如祭配食於五行之神即下重該修熈黎是也王者祭木火土金水之神而以此人之神配之食非專祭此人也分五行以配四時故五行之神勾芒祝融之徒皆以時物之狀而為之名此五者本為五行之神作名耳非與重該之徒為名也晉語云虢公夢在廟有神人靣白毛虎爪執鉞立西阿公懼而走神曰無走帝命曰使晉襲於爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也如彼文虢公所夢之狀必非該之貌自是金神之形耳由此言之知勾龍祝融𤣥㝠后土之徒皆是木火水土之神名非所配人之神名也雖本非配人之名而配者與之同食亦得取彼神名以為配者神名猶社本土神之名稷本榖神之名配者亦得稱社稷也此五行之官配食五行之神天子制禮使祀焉是為王者所尊奉也蕙田案孔疏此條釋五行之神名及配神者亦得取彼名以爲名極精葉氏夢得曰左氏記蔡墨之言謂以人司其官死而遂祀以為神者也五行本天地之氣無形可求其神必依人而行上古不可得而知矣自少皥以下各以其子為之則世或擇其能者相代如夏以柱為稷周以棄為稷是也後世五行之官不復修唯后土祭於社而勾芒立春出土則祀之祝融蓐收無常祀也陳氏祥道曰古者祭祀必有配故社配以勾龍稷配以棄四時迎氣於郊不可以無配也故迎青帝則配以太皥迎赤帝則配以炎帝配以太皥則從以勾芒配以炎帝則從以祝融以至中央秋冬之禮類皆如此葢五帝以德五神以功德則究其所乗之勢而本之也功則推其所職之事而歸之也朱子語錄問祭先賢先聖如何朱子曰有功德在人人自當報之古人祀人帝只是如此陳氏禮書有天地則有五方有五方則有五帝古者祀五帝必配以五人帝五人臣月令春夏秋中央之臣皆一人而冬有修與熈者蓋冬於方爲朔於卦爲艮於腎有左右於器有權衡於物有龜蛇於色有青黒則官有修熈宜矣右五帝義及配神禮記月令先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊注太史禮官之屬掌正歳年以序事謁告也迎春祭蒼帝靈威仰於東郊之兆也王居明堂禮曰出十五里迎歳葢殷禮也周近郊五十里疏賈馬蔡邕皆以為迎春祭太皥及勾芒鄭獨以為祭蒼帝靈威仰者以禮器云饗帝于郊而風雨節寒暑時太皥是人帝何能使風雨寒暑時周禮司服王祀昊天上帝則服大裘而冕祀五帝亦如之五帝若是人帝何得與天帝同服也楊氏復曰鄭注五帝爲天帝賈逵馬融王肅等以五帝為五人帝故爲鄭學者辨之云饗帝於郊而風雨節寒暑時若是五人帝何能使風雨寒暑得時二說不同當以鄭氏之說爲正鄭氏注春官宗伯謂禮五天帝而以五人帝配食謂如立春禮蒼帝於東郊而太皥勾芒食焉以其自外至者無主不止故四時別祀五帝而以五人帝配食也先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊注迎夏祭赤帝赤熛怒於南郊之兆也先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊注迎秋者祭白帝白招拒於西郊之兆也先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊注迎冬者祭黒帝汁光紀於北郊之兆也方氏慤曰四立之日則其氣至矣故天子親帥其臣以迎之於郊焉所以導其氣之至也五行獨不迎土者以其居中非自外至也胡氏銓曰饗帝於郊初不指言何帝竊以為蒼帝與太皥皆當祭不必分也鄭取春秋緯固不經而賈馬等亦太泥矣鄭又以此為殷禮然王居明堂禮亦何嘗指以為殷又逸禮亦豈盡足據則此謂之周禮可乎蕙田案周禮言祀五帝而不言所祭之時月令有迎氣而無祭祀之事然兆在四郊而迎氣亦在四郊則所迎之地即所兆之地可知也祭則必於所兆而迎氣必於四立則迎氣之日即爲祭帝之日可知也鄭氏據緯書蒼帝等名字固不可從而謂祭於四郊似可信也或疑周禮言卜日而四立日則不用卜冢宰言十日戒而月令三日齊司服祀五帝大裘而冕迎氣不應均服大裘然四立雖有定日亦須卜者卜其牲再周禮泛言大祭祀故以卜日該之如南北郊亦在内非無定日也疏言示審慎蓋亦是一解冢宰先十日戒乃散齊太史先三日謁乃致齊義亦無礙至大裘而冕特言其祭服之重同於祀天耳非謂夏秋皆服大裘也論見郊祀服冕條下今姑從鄭義以俟考古者右迎氣祭五帝周禮天官大宰祀五帝則掌百官之誓戒與其具修注祀五帝謂四郊及明堂四疏月令四時迎氣及季夏六月迎土氣于南郊其餘帝各於其郊并夏正祭所感帝於南郊故云祀五帝於四郊也鄭云及明堂者總享五帝於明堂依月令秦用季秋鄭云未知周以何月案下曲禮云大享不問卜鄭云祭五帝于明堂莫適卜也彼明堂不卜此下經云帥執事而卜日則此祀五帝不合有明堂鄭云及明堂者廣解祀五帝之處其實此處無明堂前期十日帥執事而卜日遂戒疏四時迎氣冬至郊天等雖有常時常日猶須審慎仍卜日秋官大司冦若禋祀五帝則戒之日涖誓百官楊氏復曰案鄭氏注掌次祀五帝則張大次小次設重帟重案云此所謂四時迎氣月令四立之祭是矣及注太宰祀五帝大司冦小司冦禋祀五帝皆云四時迎氣亦當與掌次同注又兼云總享明堂何耶夫總享五帝於明堂漢禮則有之非周禮也漢襲秦禮郊祀及明堂皆祀五畤之帝周禮安有此哉鄭注葢約漢禮以言周禮耳天官司服祀昊天上帝則服大裘而冕祀五帝亦如之鄭氏鍔曰五帝雖天之佐而與天同體故祀之服亦可得而同四圭有邸奏黄鍾歌大呂舞雲門其玉其樂皆同其服何疑之有蕙田案祭服與昊天上帝同者明其重耳祀火帝於孟夏祀土帝於季夏必無服大裘之理行禮自有變通唐開元禮夏亦服裘冕可謂膠柱之見矣春官大宗伯以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方皆有牲幣各放其噐之色注禮東方以立春謂蒼精之帝而太昊勾芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黒精之帝而顓頊𤣥㝠食焉禮神者必象其類疏云禮東方以立春謂蒼精之帝者此已下皆據月令四時迎氣皆在四立之日故以立春立夏立秋立冬言之也鄭氏鍔曰不言視中央者熊氏以為中央黄帝亦以赤璋然以類求神中央土色宜用黄孔氏以為當用黄琮然則土與地一類故不言蕙田案禮中央黄帝之玉此節及覲禮祀方明俱不言說者以爲用赤璋則赤非其色以爲用黄琮則琮非祀天神之玉似俱未妥然亦無明文可攷也大司樂乃奏黄鍾歌大呂舞雲門以祀天神注天神謂五帝及日月星辰地官充人掌繫祭祀之牲牷祀五帝則繫於牢芻之三月䟽云祀五帝者上云掌繫祭祀之牲牷則總養天地宗廟之牲下別言祀五帝則畧舉五帝而已其實昊天及地示與四望社稷之等外神皆繫之也天官掌次祀五帝則張大次小次設重帟重案注祀五帝於四郊五疏祀五帝於四郊者案引宗伯祀帝於四郊是也此謂四時迎氣太宰及執事眡滌濯地官大司徒祀五帝奉牛牲羞其肆秋官小司冦凡禋祀五帝實鑊水士師祀五帝則沃尸及王盥洎鑊水天官太宰及納亨贊王牲事及祀之日贊玉幣爵之事楊氏復曰祀五帝禮物樂章大略當與郊祀同而亦有不同者如小宗伯兆五帝於四郊乃祀五帝之位月令四立之祭乃祀五帝之時大宗伯以青圭禮東方以赤璋禮南方之類乃禮五帝之玉大宗伯牲幣各放其器之色大司徒奉牛牲之類皆祀五帝之禮也大司樂乃奏黄鍾歌大呂舞雲門以祀天神鄭注云神謂五帝及日月星辰則祀五帝之樂也又案大宗伯注疏祭五天帝以五人神配食通典云其配祭以五人帝春以太皥夏以炎帝季夏以黄帝秋以少昊冬以顓頊其壇位各於當方之郊去國五十里内曰近郊爲兆位於中築方壇亦名曰太壇而祭之其禮七獻畢獻之後天子舞當代之樂蕙田案陳氏禮書謂周官祀五帝之禮有與天同以極其隆有與天異以致其辨其說最明夫昊天上帝者猶易卦之乾也說卦傳曰乾爲天是也五帝則元亨利貞四德在天爲四時在地爲五方在行爲五行所以運轉乎陰陽寒暑之氣而爲生長收藏之主宰者也譬之在人性則乾之體也天也心則其主宰而曰君猶昊天上帝也五帝則仁義禮智信之德發爲惻隠羞惡辭讓是非之心亦各有主宰而分見者是也五帝與天同其隆者四端皆性也異于天以致其辨者偏端之見非心之全體也其理一也鄭𤣥六天之說則失之僭從緯書而各爲之名字則失之誕王肅以爲即五人帝則又失其本皆無足據至祭祀儀節詳見南郊門今擇經文之明著五帝及注可信者列於右大畧較之祭天宜少殺然不可考矣右祭五帝儀王氏應電曰或疑天一而已不應有五此後世簒入之文是不然周禮全經文誤者寡雖或簒入不應數處皆然葢天體雖一而氣之流行截然不同易曰帝出乎震齊乎巽月令曰盛德在木之類是矣故王者因其氣之至而祀之也夫天無心也一陽之生天心于是而見故冬至以祭天帝無形也五氣之易帝之主宰于是而見故于四孟季夏以祭五帝然祭雖有五但因其方氣之不同而其禮物亦異非天實有五也至其所配則以五人帝而其從祀又以五人神者葢上古聖人繼天而王其性雖無不全其厯數受命必各得其氣之盛若太皥以木德王周人以火之類又古者神明之臣皆能燮調元和司天司地各有攸職世執其功如重為勾芒黎為祝融該為蓐收修及熈為𤣥㝠其功不可掩故必配以五人帝而從以五人神也或又云祭不欲數上帝一歳五祭無乃煩而不敬乎葢元后者天之元子故事天之禮一視其祖考是故冬至之郊視于禘五帝之祀視于時祭其餘水旱之祈禪革大故大烖大師之類告禱祠皆與祖廟並舉一如子孫之事其先王後人唯失其為上天元子之意故若疏逺而不相屬甚有五年一郊者故觀此反為數耳蕙田案王氏云冬至之郊視乎禘五帝之祭視乎時祭其說甚善又祭法云埋少牢于泰昭祭時也似亦與迎氣相近然少牢用埋則非天神矣今不便採入闕疑可也史記秦本紀周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公爲諸侯賜之岐以西之地於是始國與諸侯通使聘享之禮乃用騮駒黄牛羝羊各三祠上帝西畤索隠曰襄公始列為諸侯自以居西畤西畤縣名故作西畤祠白帝畤止也言神靈之所依止也亦音市謂為壇以祭天也蕙田案襄公所祀上帝乃白帝非昊天上帝也始皇始廢封建立郡縣襄公時安得有西畤縣縣乃因西畤而得名耳祀上帝曰西畤則西方之帝耳索隠謂爲壇以祭天誤封禪書秦襄公始列爲諸侯居西垂注漢隴西郡縣今在秦州上邽縣西南九十里自以爲主少皥之神作西畤祀白帝其牲用駵駒黄牛羝羊各一云通鑑前編平王元年秦祀上帝于西畤蕙田案上帝應作白帝史記秦本紀文公十年初爲鄜畤用三牢封禪書秦文公東獵汧渭之間卜居之而吉文公夢黄虵自天下屬地其口止於鄜衍鄜屬馮翊山阪曰衍史敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤也而雍旁故有吳陽武畤雍東有好畤皆廢無祠或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚云葢黄帝時常用事雖晚周亦郊焉其語不經見搢紳者不道通鑑前編平王十有五年秦作鄜畤史記秦本紀德公元年初居雍城大鄭宮以犧三百牢祠鄜畤卜居雍封禪書作鄜畤後七十八年秦德公既立卜居雍後子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤索隠曰百當為白秦君西祠少皥牲尚白牢秦諸侯也雖奢侈僭祭郊本特牲不可用三百牢以祭天葢字誤也秦本紀秦宣公四年作宻畤封禪書德公立二年卒其後六年秦宣公作宻畤於渭南祭青帝其後秦靈公作吳陽上畤祭黄帝徐廣曰凡去作宻畤二百五十年作下畤祭炎帝索隠曰吳陽地名葢在岳之南又上云雍旁有故吳陽武畤今葢因武畤又作上下畤以祀黄帝炎帝櫟陽雨金秦獻公自以爲得金瑞故作畦畤櫟陽而祀白帝晉灼曰漢注在隴西西縣人先祠山下形如種韭畦索隠曰漢舊儀云祭人先於隴西西縣人先山山上皆有土人山下有畤如種韭畦畦中各有二土封故云畦畤其後百二十歳而秦滅周正義括地志云漢有五畤在岐州雍縣南則鄜畤吳陽上畤下畤宻畤北時秦文公夢蛇自天而下屬地其口止于鄜衍作畤郊祭白帝曰鄜畤秦宣公作宻畤於渭南祭青帝秦靈公作吳陽上畤祭黄帝作下畤祀炎帝漢髙帝曰天有五帝今四何也待我而具五遂立黒帝曰北畤是也蕙田案據此則五畤所祀者五帝而非上帝明矣自是五帝之祠盛於兩漢而上帝之祀淆于方士之言亂於䜟緯之說其害遂及於六經雖曰註疏之流弊實五畤為之厲階也秦本紀昭襄王五十四年王郊見上帝于雍封禪書秦并天下令祠官所常奉惟雍四畤上帝爲尊故雍四畤春以爲歳禱因泮凍秋涸凍冬賽祠五月嘗駒及四中之月祠春夏用騂秋冬用駵畤駒四匹木寓龍欒車一駟李竒曰寓寄也寄生龍形於木也索隠曰欒車謂車有鈴木寓車馬一駟各如其帝色黄犢羔各四珪幣各有數皆生瘞埋無爼豆之具通典秦始皇既即位以昔文公出獵獲黒龍此其水德之瑞用十月爲歳首色尚黒音尚大呂右秦四畤漢書郊祀志髙祖立爲漢王二年東擊項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黄赤帝之祠髙祖曰吾聞天有五帝而四何也莫知其說於是髙祖曰吾知之矣乃待我而具五也乃立黒帝祠命曰北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮因令縣爲公社史記封禪書令晉巫祠五帝九天巫祠九天皆以歳時祀宮中索隠曰孝武本紀云立九天廟於甘泉三輔故事云胡巫事九天於神明臺淮南子云中央曰鈞天東方曰蒼天東北昊天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天是為九天也正義曰太𤣥經云一中天二羡天三徒天四罰更天五晬天六郭天七咸天八治天九成天也通考案五帝之說先儒多闢之以為帝即天也天一而已安得有五然帝者主宰之名五行之在天各有神以主之而謂之五帝猶云可也至于九天之說則其虚誕特甚而漢初已祠之宮中索隠正義引淮南子及太𤣥經所載名字是果何所傳授而於義何所當耶後來道家有所謂九天又有所謂三十三天且各有名字然則其說所從來逺矣文帝十三年制曰朕賴宗廟之靈社稷之福方内乂安民人靡疾間者比年登朕之不德何以饗此皆上帝諸神之賜也葢聞古者饗其德必報其功欲有增諸神祠有司議增雍五畤路車各一乗駕被具駕車被馬之飾西畤畦畤寓車各一乗寓馬四疋駕被具文帝本紀十五年黄龍見成紀詔曰有異服之神見於成紀母害於民歳以有年朕親郊上帝諸神禮官議毋諱以勞朕有司禮官皆曰古者天子夏躬親禮祀祠上帝於郊故曰郊於是天子始幸雍郊見五帝以孟夏四月答禮焉十六年上親郊見渭陽五帝廟漢書郊祀志趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也張晏曰神明日也日出東方舍謂陽谷日沒於西墓謂北谷也師古曰此說非也總言神明以東北為居西方為冡墓之所故立廟於渭陽也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月帝親拜霸渭之㑹以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水權火舉而祠若光輝然屬天焉於是貴平上大夫賜累千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長安門若見五人於道北遂因其直立五帝壇祠以五牢具史記文帝本紀其後人有上書告平所言皆詐下吏治誅夷平自是後怠於神明之事而渭陽長門五帝使祠官領以時致禮不親往焉漢書景帝本紀六年冬十月行幸雍郊五畤史記封禪書孝景即位十六年祠官各以歲時祠如故無有所興漢書武帝本紀元光二年冬十月行幸雍祠五畤郊祀志武帝初即位尤敬鬼神之祀六年竇太后崩其明年徵文學之士明年上初至雍郊見五畤後常三歲一郊武帝本紀元狩元年冬十月行幸雍祠五畤獲白麟作白麟之歌應劭曰獲白麟因改元曰元狩也郊祀志亳人謬忌奏祠太乙方曰天神貴者太乙太乙佐者五帝古者天子以春秋祭太乙東南郊日一太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如其方其後人上書言古者天子三年一用太牢祠三一天一地一太乙天子許之令太祝領祠之於忌太乙壇上如其方後人復有言古天子常以春解祠祠黄帝用一梟破鏡㝠羊用羊祠馬行用一青牡馬太乙臯山山君用牛武夷君用乾魚隂陽使者以一牛令祠官領之如其方而祠太乙于忌太乙壇旁後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸葢麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合于天也武帝本紀元狩二年冬十月行幸雍祠五畤元鼎四年冬十月行幸雍祠五畤賜民爵一級女子百戸牛酒五年冬十月行幸雍祠五畤元封二年冬十月行幸雍祠五畤四年冬十月行幸雍祠五畤史記封禪書明堂禮畢又上泰山自有秘祠其巔而泰山下祠五帝各如其方黄帝并赤帝而有司侍祠焉蕙田案漢先立五畤後立渭陽五帝廟五帝廟旋領祠官而親祠五畤是爲五帝正祭其祀明堂復有五帝者葢比諸圜丘從祀之例至東漢明帝時乃專以明堂祀五帝而宋齊以下時或從之則尤誤矣然其事既行于明堂則與五畤之祀又別馬氏編輯多有兩岐今凡祀明堂者悉入明堂此不重載太初二年有司言雍五畤無牢孰具芬芳不備廼令祠官進畤特牢具色食所勝孟康曰若火勝金則祠赤帝以白牲也而以木寓馬代駒焉及諸名山川用駒者悉以木寓馬代行過乃用駒他禮如故漢書武帝本紀太始四年十二月行幸雍祠五畤宣帝本紀五鳳二年春三月行幸雍祠五畤元帝本紀始元五年三月行幸雍祠五畤永光四年三月行幸雍祠五畤建昭元年春三月上幸雍祠五畤成帝本紀建始二年春正月罷雍五畤永始二年十一月行幸雍祠五畤三年冬十月庚辰皇太后詔有司復甘泉泰畤汾隂后土雍五畤陳寶祠郊祀志明年祀南郊之明年匡衡坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壊甘泉竹宮折㧞畤中樹木十圍以上百餘天子異之以問劉向向言家人尚不欲絶種祠種祠繼嗣所傳祠也况於國之神寶舊畤且甘泉汾陰及雍五畤始立皆有神祗感應然後營之非苟而已也武宣之世奉此三神禮敬勅備神光尤著祖宗所立神祗舊位誠未易動上意恨之後上以無繼嗣故令皇太后詔有司曰葢聞王者承事天地交接太乙尊莫著于祭祀孝武皇帝大聖通明始建上下之祀營泰畤于甘泉定后土于汾陰而神祗安之享國長久子孫蕃滋累世遵業福流於今今皇帝寛仁孝順奉循聖緒靡有大愆而久無繼嗣思其咎職殆在徙南北郊違先帝之制改神祗舊位失天地之心以妨繼嗣之福春秋六十未見皇孫食不甘味寢不安席朕甚悼焉春秋大復古善順祀其復甘泉泰畤汾陰后土如故及雍五畤陳寶祠在陳倉者天子復親郊禮如前成帝本紀元延元年三月行幸雍祠五畤三年三月行幸雍祠五畤綏和元年三月行幸雍祠五畤郊祀志平帝元始五年大司馬王莽奏臣前奏徙甘泉泰畤汾陰后土皆復於南北郊謹案周官兆五帝於四郊山川各因其方師古曰春官小宗伯之職也兆謂為壇之營域也五帝於四郊謂青帝於東郊赤帝及黄帝于南郊白帝於西郊黑帝於北郊也各因其方謂順其所在也今五帝兆居在雍五畤不合於古又日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宮羲和歆等八十九人議皆曰天子父事天母事地今稱天神曰皇天上帝泰一兆曰泰畤而稱地祗曰后土與中央黄靈同又兆北郊未有尊稱宜令地祗稱皇地后祗兆曰廣畤易曰方以類聚物以羣分師古曰易上繫之辭也方謂所向之地分羣神以類相從爲五部兆天地之別神中央帝黄靈后土畤及日廟北辰北斗填星中宿中宮於長安城之未地兆東方帝太昊青靈勾芒畤及雷公風伯廟歳星東宿東宮於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宮於南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宮於西郊兆北方帝顓頊黒靈𤣥㝠畤及月廟雨師廟辰星北宿北宮於北郊兆奏可於是長安旁諸廟兆畤甚盛矣右西漢五畤蕙田案西漢崇重五帝而不聞有迎氣之制東漢以下但有五郊迎氣而無特祭五帝之文故自此以下獨存迎氣其圜丘從祀已見于前馬氏多彼此互見今並不列後漢書祭祀志立春之日皆青幡幘迎春於東郭外令一童男冒青巾衣青衣先在東郭外野中迎春至者自野中出則迎者拜之而還弗祭三時不迎蕙田案五時迎氣之禮定于永平此所載迎春於東郭外三時不迎者乃縣邑所行之事故不備禮以志不書剏始年月故載於永平二年之前而附著其說如此明帝本紀永平二年始迎氣於五郊祭祀志迎時氣五郊之兆自永平以禮䜟及月令有五郊迎氣服色因采元始中故事兆五郊於洛陽四方中兆在未壇皆三尺階無等立春之日迎春於東郊祭青帝勾芒月令章句曰東郊去邑八里因木數也車旗服飾皆青歌青陽八佾舞雲翹之舞及因賜文官太傅司徒以下縑各有差立夏之日迎夏於南郊祭赤帝祝融月令章句曰去邑七里因火數也車旗服飾皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黄靈於中兆祭黄帝后土月令章句曰南郊五里因土數也車旗服飾皆黄歌朱明八佾舞雲翹育命之舞魏氏繆襲議曰漢有雲翹育命之舞不知所出舊以祀天今可兼以雲翹祀圜丘兼以育命祀方澤立秋之日迎秋於西郊祭白帝蓐收月令章句曰西郊九里因金數也車旗服飾皆白歌西皓八佾舞育命之舞使謁者以一特牲先祭先虞於壇有事天子入囿射牲以祭宗廟名曰貙劉語在禮儀志立冬之日迎冬於北郊祭黒帝𤣥㝠月令章句曰北郊六里因水數也車旗服飾皆黒歌𤣥㝠八佾舞育命之舞獻帝本紀建安八年冬十月己巳公卿初迎冬於北郊總章始復備八佾舞注獻帝起居注曰建安八年公卿迎氣北郊始復用八佾皇覽曰迎禮春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂髙八尺堂階三等青稅八乗旗旄尚青田車載矛號曰助天生唱之以角舞之以羽翟此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂髙七尺堂階二等赤稅七乗旗旄尚赤田車載㦸號曰助天養唱之以徵舞之以鼔鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂髙九尺階九等白稅九乗旗旄尚白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂髙六尺堂階六等黑稅六乗旗旄尚黑田車載甲鐵鍪號曰助天誅唱之以羽舞之以干戈此迎冬之樂也祭祀志肅宗建初五年始行月令迎氣樂東觀記曰馬防上言聖人作樂所以宣氣致和順陰陽也臣愚以爲可因歳首發太蔟之律奏雅頌之音以迎和氣時以作樂器費多遂獨行十月迎氣樂也靈帝建寧二年迎氣黄郊道於洛水西橋逢暴風雨導從鹵簿車或發葢百官霑濡還不至郊使有司行禮迎氣北郊時議郎蔡邕上疏言臣自在宰府及備朱衣朱衣謂祭官也迎氣五時而車駕稀出四時致敬屢委有司雖有解除猶爲踈廢解除謂謝過也忘禮敬之大任禁忌之書拘信小故以虧大典故皇天不恱顯風霆災妖之異右東漢五郊迎氣宋書禮志晉武帝泰始二年詔定郊祀羣臣議五帝即天地王氣其實一神五郊宜改五精之號皆同稱昊天上帝各設一坐而已從之蕙田案明堂除五帝之坐五郊改五精之號皆晉武特識超越兩漢但五帝本五行之氣同在天中而各有所主譬如人有五官不可指其一而名之曰人同稱昊天上帝於義殊爲未安也蕙田又案晉宋二史郊堂以外俱不言有別祭五帝之制觀此條五郊是其指迎氣分祭無疑也又明帝太寧三年詔書有依舊詳處之文是舊有之而渡江後復設耳晉書明帝本紀太寧三年詔曰郊祀天地帝王之重事自中興以來惟南郊北郊四時五郊之禮都不復設主者其依舊詳處隋書禮儀志禮天子毎以四立之日及季夏乗玉輅建大旂服大裘各於其方之近郊爲兆迎其帝而祭之所謂燔柴於太壇埽地而祭者也春迎靈威仰者三春之始萬物禀之而生莫不仰其靈德服而畏之也夏迎赤熛怒者火色熛怒其靈炎至明盛也秋迎白招拒者招集拒大也言秋時集成萬物其功大也冬迎叶光紀者叶拾光華紀法也言冬時收拾光華之色伏而藏之皆有法也中迎含樞紐者含容也樞機有開闔之義紐者結也言土德之帝能含容萬物開闔有時紐結有法也然此五帝之號皆以其德而名焉梁陳後齊後周及隋制度相循皆以其時之日各於其郊迎而以太皥之屬五人帝配祭並以五官三辰七宿於其方從祀焉梁制迎氣以始祖配牲用特牛一其儀同南郊天監五年明山賓請迎五帝于郊皆以始祖配饗詔依議七年尚書左丞司馬筠等議以昆蟲未蟄不以火田鳩化爲鷹罻羅方設仲春之月祀不用牲止珪璧皮幣斯又事神之道可以不殺明矣况今祀天豈容尚此請夏初迎氣祭不用牲帝從之八年明山賓議曰周官祀昊天以大裘祀五帝亦如之頃代郊祀之服皆用衮冕是以前奏迎氣祀五帝亦服衮冕愚謂迎氣祀五帝亦宜用大裘禮俱一獻帝從之陳迎氣之法皆因梁制魏書太祖本紀天興元年詔百司議定五郊立氣宣贊時令敬授民時行夏之正太和十五年十有二月己酉車駕迎春于東郊十六年三月乙亥車駕初迎氣南郊自此以爲常十九年詔議牲色祕書令李彪曰五帝各象其方色亦有其義魏書禮志太宗泰常三年爲五精帝兆於四郊逺近依五行數各爲方壇四陛埒壝三重通四門以太皥等及諸佐隨配侑祭黄帝常以立秋前十八日餘四帝各以四立之日牲各用牛一有司主之蕙田案魏書此下云又六宗靈星風伯雨師司民司祿先農之壇皆有別兆祭有常日牲用少牢立春之日遣有司迎春於東郊祭用酒脯棗栗無牲幣此所謂祭自指六宗諸壇而言葢正祭則以少牢立春非諸壇之正祭故殺用酒脯也通典節取此文直於牛一之下接云又立春日遣有司云云則似一日之中兩祀青帝一以牛一以酒脯知其不然矣劉芳傳轉太常卿芳以所置五郊及日月之位去城里數於禮有違乃上疏曰臣聞國之大事莫先郊祀郊祀之本實在審位是以列聖格言彪炳綿籍先儒正論昭著經史臣學謝全經業乖通古豈可輕薦瞽言妄陳管說竊見所置壇祠逺近之宜考之典制或未允衷既曰職司請陳膚淺孟春令云其數八又云迎春於東郊盧植云東郊八里之郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊鄭𤣥孟春令注云王居明堂禮曰王出十五里迎歲葢殷禮也周禮近郊五十里鄭𤣥別注云東郊去都城八里髙誘云迎春氣於東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之明據也孟夏令云其數七又云迎夏於南郊盧植云南郊七里郊也賈逵云南郊火帝炎帝七里許慎云南郊七里郊也鄭𤣥云南郊去都城七里髙誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中央黄帝之位并南郊之季故云兆五帝於四郊也鄭𤣥云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又曰迎秋於西郊盧植云西郊九里郊賈逵云西郊金帝少皥九里許慎云西郊九里郊也鄭𤣥云西郊去都城九里髙誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬於北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里許慎云北郊六里郊也鄭𤣥云北郊去都城六里髙誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿千里二十分其一以爲近郊近郊五十里倍之爲逺郊迎王氣葢於近郊漢不設王畿則以其方數爲郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武二年正月初制郊兆於雒陽城南七里依採元始中故事北郊在雒陽城北四里此又漢世南北郊之明據也今地祗凖此至如三十里之郊進乖鄭𤣥所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門爲限里數依上禮朝拜日月皆於東西門外今日月之位去城東西路各三十竊又未審禮又云祭日於壇祭月於坎今計造如上詔曰所上乃有明據但先朝置立已久且可從舊髙祖本紀太和十六年三月乙卯車駕初迎氣南郊自此爲常隋書禮儀志後齊五郊迎氣爲壇各於四郊又爲黄壇於未地所祀天帝及配帝五官之神同梁其玉帛牲各以其方色其儀與南郊同帝及后各以夕牲日之旦太尉陳幣告請其廟以就配焉其從祀之官位皆南陛之東西向壇上設饌畢太宰丞設饌於其座亞獻畢太常少卿乃於其所獻事畢皆撤又云立春前五日於州大門外之東造青土牛兩頭耕夫犁具立春有司迎春於東郊登青幡於青牛之傍焉五郊迎氣樂辭青帝降神奏髙明樂辭歳云獻谷風歸斗東指雁北飛電鞭激雷車遽虹旌靡青龍馭和氣洽具物滋翻降止應帝期赤帝降神奏髙明樂辭婺女司旦中呂宣朱精御節離景延根荄俊茂温風發柘火風水應炎月執衡長物德孔昭赤旂霞曵㑹今朝黄帝降神奏髙明樂辭居中帀五運乗衡畢四時含養資羣物協德固皇基嘽緩契王風持載符君德良辰動靈駕承祀昌邦國白帝降神奏髙明樂辭風凉露降馳景颺寒精山川摇落平秩在西成葢藏成積蒸人被嘉祉從享來儀鴻休溢千祀黒帝降神奏髙明樂辭虹藏雉化告寒氷壯地坼年殫日次月紀方極九州萬邦獻力叶光是紀歳窮㣲陽潛兆方融天子赫赫明聖享神降福惟敬後周五郊壇其崇及去國如其行之數其廣皆四丈其方俱百二十歩内壝皆半之祭配皆同後齊星辰七宿嶽鎮海瀆山林川澤丘陵墳衍亦各於其方配郊而祀之其星辰為壇崇五尺方二丈嶽鎮爲埳方二丈深二尺山林已下亦爲埳壇崇三尺埳深一尺俱方一丈其儀頗同南郊冡宰亞獻宗伯終獻禮畢祀五帝歌辭奠玉帛奏皇夏辭嘉玉惟芳嘉幣惟量成形依禮禀色隨方神班有次歳禮惟常威儀抑抑率由舊章初獻奏皇夏惟令之月惟嘉之辰司壇宿設掌史誠陳敢用明禮言功上神鈎陳旦闢閶闔朝分旒垂象冕樂奏山雲將廻霆策蹔轉天文五運周環四時代序鱗次玉帛循廻樽爼神其降之介福斯許皇帝初獻青帝奏雲門舞甲在日鳥中星禮東后奠蒼靈樹春旗命青史候雁還東風起歌木德舞震宮泗濱石龍門桐孟之月陽之天億斯慶兆斯年皇帝初獻配帝奏舞帝出于震蒼德於神其明在日其位居春勞以定國功以施人言從配祀近取諸身皇帝初獻赤帝奏雲門舞招摇指午對南宮日月相會實沈中離光布政動温風純陽之月樂炎精赤雀丹書飛送迎朱絃絳鼓罄䖍誠萬物含養各長生皇帝獻配帝奏舞以炎爲政以火爲官位司南陸享配離壇三和實爼百味浮蘭神其茂豫天歩艱難皇帝初獻黄帝奏雲門舞三光儀表正四氣風雲同戊巳行初厯黄鍾始變宮平琮禮内鎮陰管奏司中齋壇芝􅁮􅁮清野桂馮馮夕牢芬六鼎安歌韻八風神光乃超忽佳氣恒蔥蔥皇帝初獻配帝奏舞四時咸一德五氣或同論猶吹鳳凰管尚對梧桐園器圜居土厚位總配神尊始知今奏樂還用我雲門皇帝初獻白帝奏雲門舞肅靈兌景承配秋壇雲髙火落露白蟬寒帝律登年金精行令瑞獸霜輝祥禽雪映司藏肅殺萬保咸宜厥田上上收功在斯皇帝初獻配帝奏舞金行秋令白帝朱宣司正五雉歌庸九川執文之德對越彼天介以福祉君子萬年皇帝初獻黒帝奏雲門舞北辰爲政𤣥壇北陸之祀員官宿設𤣥圭浴蘭坎德陰風御寒次律將迴窮紀微陽欲動細泉管猶調於陰竹聲未入於春絃待歸餘於送厯方履慶於斯年皇帝初獻配帝奏舞地始坼虹始藏服𤣥玉居𤣥堂沐惠氣洛蘭湯匏器潔水泉香陟配彼福無疆君欣欣此樂康隋五時迎氣青郊爲壇國南明德門外道西去宮八里髙八尺赤郊爲壇國南明德門外道西去宮十三里髙七尺黄郊爲壇國南安化門外道西去宮十二里髙七尺白郊爲壇國西開逺門外道南去宮八里髙九尺黒郊爲壇宮北十一里田地髙六尺並廣四丈各以四方立日黄郊以季夏土王日祀其方之帝各配以人帝以太祖武元帝配五官及星三辰七宿亦各依其方從祀其牲依方色各用犢二星辰加羊豕各一其儀同南郊其嶽瀆鎮海各依五時迎氣日遣使就其所祭之以太牢音樂志五郊歌辭五首迎送神登歌與圜丘同青帝歌辭奏角音震宮初動木德惟仁龍精戒旦鳥厯司春陽光煦物温風先導巖處載驚膏田已冒犧牲豐潔金石和聲懐柔備禮明德惟馨赤帝歌辭奏徴音長贏開序炎上爲德執禮司萌持衡御國重離得位芒種在時含櫻薦實木槿垂蕤慶賞既行髙明可處順時立祭事昭福舉黄帝歌辭奏宮音爰稼作土順位稱坤孕金成德履艮爲尊黄本内色宮實聲始萬物資生四時咸紀靈壇汎掃盛樂髙張威儀孔備福履無疆白帝歌辭奏商音西成肇節盛德在秋三農稍已九榖行收金氣肅殺商威飂戾嚴風鼔莖繁霜殞蔕厲兵詰暴勅法慎刑神明降嘏國歩惟寧黒帝歌辭奏羽音𤣥英啟候㝠陵初起虹藏於天雉化於水嚴關重閉星迴日窮黄鍾動律廣莫生風𤣥尊示本天産惟質恩覃外區福流景室五禮通考卷三十一
