body:
  text: 五禮通考卷二百二十三刑部尚書秦蕙田撰賓禮四天子受諸侯蕃國朝覲蕙田案三代以前五服之内諸侯定為朝聘之期大行人云侯服歳一見甸服二歳一見男服三歳一見采服四歳一見衛服五歳一見是也九州之外謂之蕃國則有世見之禮無朝覲之期自秦廢封建而朝禮遂亡漢魏晉唐元明封建子弟雖有分土而朝覲未合於古唐開元禮宋史禮志明集禮所載外蕃朝見之禮尤詳今俱采録以備賓禮云書舜典既月乃日覲四岳羣牧五載一廵守羣后四朝敷奏以言明試以功車服以庸竹書紀年帝堯十六年渠搜氏來朝二十九年僬僥氏來朝貢沒羽帝舜九年西王母來朝沈約曰西王母之來朝獻白環玉玦二十五年息慎氏來朝貢弓矢四十二年元都氏來朝貢寳玉右唐虞朝覲春秋哀公七年左氏傳禹合諸侯于塗山執玉帛者萬國注諸侯執玉附庸執帛塗山在夀春東北國語魯語禹致羣神于會稽之山防風氏後至禹殺而戮之注羣神謂主山川之君為羣神之主故謂之神防風汪芒氏之君名也違命後至故禹殺之春秋昭公四年左氏傳夏啓有鈞臺之享注啓禹子也河南陽翟縣有鈞臺陂蓋啓享諸侯於此竹書紀年帝啓元年癸亥帝即位于夏邑大饗諸侯於鈞臺諸侯從帝歸於冀都大饗諸侯于璿臺帝相七年于夷來賓帝少康元年諸侯來朝賓虞公二年方夷來賓帝發元年諸夷賓于王門再保墉會于上池帝癸六年岐踵戎來賓十一年會諸侯于仍二十二年商侯履來朝命囚履于夏臺二十三年釋商侯履諸侯遂賓于商右夏朝覲詩商頌長發受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百禄是遒箋綴結也旒旌旗之垂者也休美也湯既為天所命則受小玉謂尺二寸圭也受大玉謂珽也長三尺執圭搢珽以與諸侯會同結定其心如旌旗之旒縿著焉擔負天之美譽為衆所歸鄉朱子集傳小球大球之義未詳或曰小國大國所贄之玉也受小共大共為下國駿龎何天之龍敷奏其勇不震不動不戁不竦百禄是總箋共執也小共大共猶所執搢小球大球也駿之言俊也龍當作寵榮名之謂朱子集傳小共大共之義未詳或曰小國大國所共之貢也竹書紀年帝癸二十八年商會諸侯于景亳成湯十九年氐𦍑來貢書伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在竹書紀年大戊二十六年西戎來賓王使王孟聘西戎六十一年東九夷來賓河亶甲五年侁人來賓盤庚七年應侯來朝武丁三十四年王師克鬼方氐𦍑來賓孟子武丁朝諸侯有天下猶運之掌也詩商頌殷武維女荆楚居國南鄉昔有成湯自彼氐𦍑莫敢不來享莫敢不來王曰商是常箋氐𦍑夷狄國在西方者也享獻也世見曰王維女楚國近在荆州之域居中國之南方而背叛乎成湯之時乃氐𦍑逺夷之國來獻來見曰商王是吾常君也此所用責楚之義女乃逺夷之不如天命多辟設都于禹之績歳事來辟勿予禍適稼穡匪解箋多衆也來辟猶來王也天命乃令天下衆君諸侯立都于禹所治之功以歳時來朝覲于我殷王者勿罪過與之禍適徒勅以勸民稼穡非可懈倦時楚不修諸侯之職此所用告曉楚之義也禹平水土弼成五服而諸侯之國定是以云然朱子集傳言天命諸侯各建都邑於禹所治之地而皆以歳事來見於商以祈王之不譴曰我之稼穡不敢解也庶可以免咎矣言荆楚既平而諸侯畏服也蕙田案此章鄭箋以為責楚之辭朱傳以為荆楚平而諸侯自相畏服之辭竹書紀年祖甲十三年西戎來賓武乙三十四年周公季厯來朝帝辛三十年春三月西伯率諸侯入貢右殷朝覲書序巢伯來朝芮伯作旅巢命傳巢殷之諸侯伯爵也南方逺國武王克商慕義來朝竹書紀年周武王十三年巢伯來賓十五年肅慎氏來朝十六年箕子來朝禮記明堂位武王崩成王幼弱周公踐天子之位以治天下六年朝諸侯于明堂陳氏澔曰六年五服一朝蓋始于此後漢書南蠻列傳交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公公曰徳不加焉則君子不享其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耉曰乆矣天之無烈風雷雨意者中國有聖人乎有則盍徃朝之周公乃歸之於王稱先王之神致以薦於宗廟蕙田案此事亦見尚書大傳竹書紀年載在成王十年與此不同竹書紀年成王七年王如東都諸侯來朝九年肅慎氏來朝王使榮伯錫肅慎氏命書序成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命傳海東諸夷駒麗扶餘馯貊之屬武王克商皆通道焉成王即政而叛王伐而服之肅慎氏來賀榮國名同姓諸侯為卿大夫王使之為命書以幣賄賜肅慎之來賀竹書紀年成王十年越裳氏來朝二十四年於越來賓二十五年王大會諸侯于東都四夷來賓三十年離戎來賓詩小雅蓼蕭蓼彼蕭斯零露湑矣既見君子我心寫兮箋既見君子者逺國之君朝見于天子也燕笑語兮是以有譽處兮箋天子與之燕而笑語則逺國之君各得其所是以稱揚徳美使聲譽常處天子蓼彼蕭斯零露瀼瀼既見君子為龍為光傳龍寵也光箋為寵為言天子恩澤光耀被及已也其徳不爽夀考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令徳夀豈蓼彼蕭斯零露濃濃既見君子鞗革冲冲和鸞雝雝萬福攸同傳鞗轡也革轡首也冲冲垂飾貌在軾曰和在鏣曰鸞箋此説天子之車飾者諸侯燕見天子天子必乗車迎於門是以云然其疏燕見迎諸侯者以王惟覲禮不下堂而見諸侯耳朝宗當迎之故秋官大行人説車迎之法賓主歩數從六服諸侯尚有車迎則四夷之君車迎可知燕主歡心不可不接既然迎接不得無車故燕禮云若四方之賓公迎之于大門内是燕有迎法采菽采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼傳與也菽所以芼太牢而待君子也羊則苦豕則薇君子謂諸侯也𤣥衮卷龍也白與黒謂之黼箋王饗寳客有生爼乃用鉶羮故使采之賜諸侯以車馬言諸無予之尚以為薄𤣥衮𤣥衣而畫以卷龍也黼黼黻謂絺衣也諸公之服自衮冕而下侯伯自鷩冕而下子男自毳冕而下王之賜維用有文章者觱沸檻泉言采其芹君子來朝言觀其旂其旂渒渒鸞聲嘒嘒載驂載駟君子所屆傳觱沸泉出貌檻泉正出也渒渒動也嘒嘒中節也王箋芹可以為菹亦所用待君子也届極也諸侯來朝使人迎之因觀其衣服車乗之威儀所以為敬且省禍福也諸侯將朝於王則驂乗乗四馬而徃此之服飾君子法制之極也朱子集傳見其旗聞其鸞聲又見其馬則知君子之至於是也赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福禄申之傳諸侯赤芾邪幅幅偪也所以自偪束也紓緩也箋芾太古蔽膝之象也冕服謂之芾其他服謂之韠以韋為之其制上廣一尺下廣二尺長三尺其頸五寸肩革帶博二寸脛本曰股邪幅如今行縢也偪束其脛自足至滕故曰在下彼與人交接自偪束如此則非有解怠紓緩之心天子以是故賜與之只之言是也古者天子賜諸侯也以禮樂樂之乃後命予之也天子賜之神則以福禄申重之所謂人謀鬼謀也朱子集傳言諸侯服此芾偪見於天子恭敬齊遫不敢紓緩則為天子所與而申之以福禄也維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從傳殿鎮也平平辨治也朱子集傳左右諸侯之臣也又言其左右之臣亦從之而至此也汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福禄膍之優哉游哉亦是戾矣傳葵揆也膍厚也戾至也蕙田案正小雅自由庚以下鄭氏詩譜以為皆成王周公時詩采菽之序云刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵會之而無信義君子見微而思古焉朱子以為此詩與楚茨諸篇意相類疑正雅之篇錯脱在此今讀其詩有美而無刺斷為正小雅之詩但未詳其世姑附於成周之末觀承案采菽詩是宣王美東諸侯來朝而次於魚藻下則魚藻正是東諸侯美宣王之詩耳今玩魚藻詩三歌王在在鎬恰對厲王在彘而言則魚藻采菽皆宣王時東畿之雅可信向來謂武王詩固謬或以為刺幽或以為刺厲皆非也竹書紀年康王元年甲戌春正月王即位命冢宰召康公總百官諸侯朝於豐宫通鑑前編元子釗麻冕黼裳即位朝見諸侯于應門内諸侯聽命出王釋冕反䘮服元年癸亥徧告諸侯朝于豐宫竹書紀年穆王六年春徐子誕來朝錫命為伯十五年春正月留昆氏來賓十七年西王母來朝賓于昭宫十八年春正月王居祗宫諸侯來朝三十七年荆人來貢三十九年王會諸侯于塗山通鑑前編夷王元年天子始下堂見諸侯覲禮廢史記周本紀宣王修政法文武成康之遺風諸侯復宗周詩小雅庭燎序庭燎美宣王也因以箴之箋諸侯將朝宣王以夜未央之時問夜早晚美者美其能自勤以政事因以箴者王有雞人之官凡國事為期則告之以時王不正其官而問夜早晚夜如何其夜未央庭燎之光君子至止鸞聲將將傳央旦也庭燎大燭君子諸侯也將將鸞鐮聲辭箋此宣王以諸侯將朝夜起曰夜如何其問早晚之夜未央猶言夜未渠央也而于庭設大燭使諸侯早來朝聞鸞聲將將然夜如何其夜未艾庭燎晰晰君子至止鸞聲噦噦傳艾乆也晰晰明也噦噦徐行有節也夜如何其夜鄉晨庭燎有煇君子至止言觀其旂傳煇光也我箋晨明也上二章聞鸞聲爾今夜鄉明見其旂是朝之時也朝禮别色始入蕙田案蘇子由以為王將起視朝不安於寢而問夜之早晚朱子集傳因之然國語稱諸侯賓至甸設庭燎周官閽人大祭祀䘮紀之事設門燎賓客亦如之則庭燎惟諸侯來朝乃設之若每日視朝辨色始入不用庭燎也當從傳箋為是竹書紀年宣王四年王命蹶父如韓韓侯來朝大雅韓奕序韓奕尹吉甫美宣王也能錫命諸侯箋梁山於韓國之山最髙大為國之鎮所望祀焉故美大其貌奕奕然謂之韓奕也梁山今在馮翊夏陽西北韓姬姓之國也後為晉所滅朱子集傳韓侯初立來朝始受王命而歸詩人作此以送之奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解䖍共爾位朕命不易榦不庭方以佐戎辟傳奕奕大也甸治也禹治梁山除水灾宣王平大亂命諸侯有倬其道有倬然之道者也受命受命為侯伯也成箋梁山之野堯時俱遭洪水禹甸之者決除其灾使平田定貢賦于天子周有厲王之亂天下失職今有倬然著明復禹之功者韓侯受王命為諸侯戎猶女也朱子集傳受命蓋即位除䘮以士服入見天子而聼命也纉繼戎女也言王錫命之使繼世而為諸侯也榦正也不庭方不來庭之國也四牡奕奕孔脩且張韓侯入覲以其介圭入覲于王王錫韓侯淑旂綏章簟茀錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄傳淑善也交龍為旂綏大綏也錯衡文衡也鏤錫有金鏤其錫也鞹革也鞃軾中也淺虎皮淺毛也幭覆式也厄烏蠋也以箋諸侯秋見天子曰覲韓侯乗長大之四牡奕奕然時覲于宣王覲于宣王而奉享禮貢國所出之寳善其尊宣王以常職來也書曰黒水西河其貢璆琳琅玕王為韓侯以常職來朝享之故故多錫以厚之善旂旂之善色者也綏所引以登車有采章也簟茀漆簟以為車蔽今之藩也鉤膺樊纓也眉上曰錫刻金飾之今當盧也鞗革謂轡也以金為小環徃徃纒搤之疏毛于崧髙以介圭為所執之瑞則此介圭亦為瑞也以其介圭入覲于王謂正行覲禮箋以韓侯入覲為行覲禮入覲于王為行享禮行享而云介圭則圭是為享之物綏大綏者即王制所謂天子殺下大綏者是也天官夏采注云徐州貢夏翟之羽有虞氏以為綏後代或無染鳥羽象而用之或以旄牛尾為之綴于幢上然則綏者即交龍旂竿所建與旂共一竿為貴賤之表章故云綏章鞹靱者蓋以去毛之皮施于軾之中央持車使牢固也幭字禮記作幦周禮作榠字異而義同玉藻言羔幦鹿幦春官巾車言犬幎豻榠皆以有毛之皮為幦此云淺幭則以淺毛之皮為幭也獸之淺毛者惟虎耳少儀説御車之法云負良綏申之面拖諸幦明在式上故知覆軾也厄烏蠋釋蟲文郭璞曰大蟲如指如蠶毛以厄為厄蟲則金厄者以金接轡之端如厄蟲也箋以此經所陳其事各别若綏共旂一物淑旂可以兼之不應重出其文故易傳以綏為所引登車者綏是升車之索當以采絲為之故云綏章鏤錫施鏤于錫之上釋器云金謂之鏤故知刻金為飾當盧者當馬之額盧在眉眼之上案巾車玉路錫樊纓金路鈎樊纓注云金路無錫有鈎計玉路非賜臣之物此言鉤膺必金路矣而得有鏤錫者蓋特賜之使得施於金路也曹氏粹中曰既覲則王班圭而復之乃以車馬旗服賜焉蕙田案此章述韓侯入覲儀節與覲禮互相發明四牡奕奕孔修且張韓侯入覲即覲禮之乗墨車乃朝也以其介圭入覲于王即覲禮侯氏入門右坐奠圭再拜稽首也王錫韓侯以下即覲禮天子賜侯氏以車服也介圭即五等諸侯所受之瑞毛義蓋得之箋以為享禮之圭璧非也韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炰鼈鮮魚其蔌維何維筍及蒲其贈維何乗馬路車籩豆有且侯氏燕胥傳屠地名顯父有顯徳者也蔌菜殽也筍竹也蒲蒲蒻也箋祖將去而祀軷也既覲而反國必祖者尊其所徃去則如始行焉祖于國外畢及出宿示行不留于是也顯父周之公卿也餞送之故有酒贈送也王既使顯父餞之又使送以車馬所以贈厚意也人君之車曰路車所駕之馬曰乗馬且多貌胥皆也諸侯在京師未去者于顯父餞之時皆來相與燕其籩豆且然榮其多也疏諸侯反國為王臣所送送者惟卿士耳故知顯父周之卿士也車馬嫌是顯父所贈卿大夫無乗馬路車之名則非顯父贈之明是王贈之也言侯而不言韓侯且韓侯一人不足稱皆故知諸侯在京師未去者于是之時皆來相與燕也蕙田案覲禮於饗禮乃歸之下無侯氏出祖釋軷及卿士出餞之文此詩所陳可補儀禮之未及至乗馬路車之贈又在錫車服之外出于一時特典未必為常制也韓侯取妻汾王之孫蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門傳蹶父卿士也諸侯一取九女二國媵之諸娣衆妾也朱子集傳此言韓侯既覲而還遂以親迎也蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽傳姞蹶父姓也唐氏汝諤曰雖敘韓姞歸韓之樂亦以見韓封域之美也溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黄羆傳師衆也韓侯先祖武王之子也因時百蠻長是蠻服之百國也追貊戎狄國也奄撫貔猛獸也追貊之國來貢而侯伯總領之箋溥大也燕安也大矣彼韓國之城乃古平安時衆民之所築完韓侯先祖有功徳者受先王之命封為韓侯居韓城為侯伯其州界外接蠻服因見使時節百蠻貢獻之徃來後君微弱用失其業今王以韓侯先祖之事如是而韓侯賢故于入覲使復其先祖之舊職賜之蠻服追貊之戎狄令撫柔其所受王畿北面之國因以其先祖侯伯之事盡予之皆美其為人子孫能興復先祖之功朱子集傳燕召公之國也韓初封時召公為司空王命以其衆為築此城如召伯營謝山甫城齊春秋諸侯城邢城楚邱之類也竹書紀年宣王八年魯武公來朝錫魯世子戲命九年王會諸侯于東都史記周本紀十二年魯武公來朝春秋隠公六年左氏傳鄭伯如周始朝桓王也王不禮焉周桓公言于王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣史記周本紀桓王三年鄭莊公朝桓王不禮隠公八年左氏傳八月丙戌鄭伯以齊人朝王禮也桓公五年左氏傳王奪鄭伯政鄭伯不朝僖公二十八年五月公朝于王所京王在踐土非師故云王所公羊傳曷為不言公如京師天子在是也曷為不言天子在是不與致天子也榖梁傳朝不言所言所者非其所也冬公朝于王所文公元年左氏傳晉侯朝王于温成公十三年三月公如京師注伐秦道過京師因朝王左氏傳公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左氏傳公及諸侯朝王遂從劉康公成肅公會晉侯伐秦公羊傳其言自京師何公鑿行也公鑿行奈何不敢過天子也注鑿猶更造之意時本欲直伐秦塗過京師不敢過天子而不朝復生事修朝禮而後行故起時善而褒成其意使若故朝然後生事也間無事復書公者善公鑿行榖梁傳公如京師不月月非如也非如而曰如不叛京師也注公行出竟有危則月朝聘京師理無危懼故不月因其過朝故正其文若使本自徃胡氏安國曰諸侯每歳侵伐四出未有能修朝覲之禮者今公欲㑹伐秦道自王都不可越天子而徃也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因㑹伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也古者諸侯即位服䘮畢則朝小聘大聘終則朝廵守于方嶽則朝觀春秋所載天王遣使者屢矣十二公之述職蓋闕如也獨此年書公如京師又不能成朝禮不敬莫大焉汪氏克寛曰經書朝王之禮者三僖公朝王所為㑹晉而行成公如京師為伐秦而徃皆非有尊周之本心也然僖二十八年書公㑹諸侯盟于踐土公朝于王所公㑹諸侯于温天王狩于河陽公朝于王所使若諸侯先㑹而後朝王去其實以全名也此年書公如京師遂㑹伐秦使若請命而徃伐正其名以統實也然書乞師于前書至伐于後則見朝京師實因行以見王而簡慢之罪視僖公不侔矣或曰一經之中魯君僅一如京師而貶之有如是者則朝者反得罪而不朝者無譏與吁不朝之罪經不書而貶自著今也因過京師而朝王苟不示譏而予之以朝則天下後世將謂尊君之禮可以簡慢而欺世盗名挾天子以令諸侯者又将借稟命伐秦之例以為口實矣其關係豈淺淺哉吳越春秋夀夢元年朝周蕙田案以史記年表考之蓋在周簡王元年通鑑前編敬王二年三月晉侯使士景伯朝于京師年表烈王六年齊威王朝周竹書紀年顯王十二年魯恭侯宋桓侯衛侯鄭釐侯來朝十五年東周與鄭髙都鄭釐侯來朝中陽史記周本紀顯王二十五年秦㑹諸侯于周秦本紀孝公十九年天子致伯二十年諸侯畢賀秦使公子少官率師會諸侯逢澤朝天子竹書紀年赧王三年秦王來見于蒲阪關右周漢書髙帝本紀九年冬十月淮南王梁王趙王楚王朝未央宫十年冬十月淮南王燕王荆王梁王楚王齊王長沙王來朝恵帝本紀二年冬十月齊悼恵王來朝文三王傳梁孝王武以孝文二年立孝王十四年入朝十七年十八年比年入朝留二十一年入朝二十四年入朝二十五年復入朝二十九年十月入朝三十五年冬復入朝代孝王參五年一朝凡三朝梁懐王揖五年一朝凡再入朝景十三王傳河間獻王徳武帝時來朝獻雅樂對三雍宫武帝本紀元朔二年冬賜淮南王菑川王几杖毋朝天漢四年春正月朝諸侯王于甘泉宫後元二年春正月朝諸侯王于甘泉宫昭帝本紀元鳳五年春正月廣陵王來朝哀帝本紀帝定陶恭王子也年三歳嗣立為王元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上怪之以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之他日問中山王獨從傅在何法令不能對後漢書世祖本紀中元元年春正月東海王疆沛王輔楚王英濟南王康淮陽王延趙王旴皆來丁卯東廵守二月幸太山北海王興齊王石朝于東嶽明帝本紀永平二年秋九月沛王輔楚王英濟南王康淮陽王延東海王政來朝六年春正月沛王輔楚王英東平王蒼淮陽王延琅邪王京東海王政趙王旴北海王興齊王石來朝冬十月行幸魯十二月壬午車駕還宫東平王蒼琅邪王京從駕來朝皇太后十一年春正月沛王輔楚王英濟南王康東平王蒼淮陽王延中山王焉瑯琊王京東海王政來朝章帝本紀建初七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政瑯琊王京來朝東平王蒼傳建初六年冬蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冒渉寒露遣謁者賜貂裘及大官食物珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷牀其錢帛器物無不充備下詔曰禮云伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也况兼親尊者乎其沛濟南東平中山四王讚皆勿名蒼既至升殿乃拜天子親答之其後諸王入宫輒以輦迎至省閤乃下蒼以受恩過禮情不自寧上疏辭曰臣聞貴有常尊賤有等威卑髙列序上下以理陛下至徳廣施慈愛骨肉既使奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輒興席改容中宫親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置此非所以章示羣下安臣子也帝省奏嘆息愈褒貴焉三月大鴻臚奏遣諸王歸國帝特留蒼賜以祕書列僊圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近為親疎然數見顔色情重昔時念王乆勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中心戀戀惻然不能言于是車駕祖送流涕而訣復賜乗輿服御珍寳輿馬錢布以億萬計元和元年春正月中山王焉來朝章和二年春正月濟南王康阜陵王延中山王焉來朝安帝本紀建光三年二月辛卯幸泰山齊王無忌北海王普樂安王延來朝順帝本紀永建二年春正月戊申樂安王鴻來朝蕙田案以上諸侯王來朝又案自秦廢封建之後漢初立異姓諸侯王不過元功數人不乆夷滅於是尊王子弟大啓藩封有非劉氏不王之誓文景以降稍示裁抑而終兩漢之世皇子無不裂土而王者其來朝也恒以家人禮待之至章帝於東平諸王親自答拜讚皆不名紀之史冊傳為美談雖朝覲之儀未合於古而敦睦之徳猶有可稱魏晉以後兹風逺矣其紀傳所載諸侯王來朝之文今皆從略漢書西域傳龜兹王絳賔愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼔歌吹數十人綺繡雜繒琦珍凡數千萬留且一年厚贈送之宣帝紀甘露二年冬十二月匈奴呼韓邪單于欵五原塞願奉國珍朝三年正月師古曰欲于甘露三年正月行朝禮詔有司議咸曰聖王之制施徳行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截陛下聖徳充塞天地光被四表匈奴單于鄉風慕義舉國同心奉珍朝賀自古未之有也單于非正朔所加王者所客也禮儀宜如諸侯王稱臣昧死再拜位次諸侯王下詔曰蓋聞五帝三王禮所不施不及以政今匃奴單于稱北藩臣朝正月朕之不逮徳不能宏覆其以客禮待之位在諸侯王上三年春正月行幸甘泉匈奴呼韓邪單于稽侯㹪來朝贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黄金錦繡繒絮使有司道單于先行就邸長安宿長平上自甘泉宿池陽宫上登長平阪詔單于毋謁其左右當户之羣皆列觀蠻夷君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歳單于就邸置酒建章宫饗賜單于觀以珍寳二月單于罷歸匈奴傳單于正月朝天子於甘泉宫漢寵以殊禮位在諸侯王上贊謁稱臣而不名賜以冠帶衣裳黄金璽盭綬師古曰盭古戾字戾艸名也以戾染綬亦諸侯王之制也玉具劍佩刀弓一張矢四發棨㦸十安車一乗鞌勒一具馬十五匹黄金二十斤錢二十萬衣被七十七襲錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平上自甘泉宿池陽宫上登長平詔單于母謁師古曰不令拜也其左右當户之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎于渭橋下夾道陳上登渭橋咸稱萬歳單于就邸留月餘遣歸國黄龍元年春正月匈奴呼韓邪單于來朝禮賜如初二月單于歸國匃奴傳呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八千斤元帝紀竟寧元年春正月匈奴呼韓邪單于來朝詔曰虖韓邪單于不忘恩徳嚮慕禮義復脩朝賀之禮願保塞傳之無窮邊垂長無兵革之事其改元為竟寧匈奴傳單于復入朝禮賜如初加衣服錦帛絮皆倍於黄龍時成帝本紀河平四年春正月匈奴單于來朝二月單于罷歸國匈奴傳單于入朝加賜錦繡繒帛二萬疋絮二萬斤他如竟寧時哀帝紀元夀二年春正月匈奴單于烏孫大昆彌來朝匈奴傳故事單于朝從名王以下及從者二百餘人單于又上書言䝉天子神靈人民壯盛願從五百人入朝以明天子盛徳上皆許之上以太歳厭勝所在舍之上林苑蒲陶宫告之以加敬於單于單于知之加賜衣三百七十襲綿繡繒帛三萬疋絮三萬斤它如河平時西域傳元夀二年大昆彌伊秩靡與單于並入朝漢以為榮後漢書世祖本紀建武二十五年春正月烏桓大人來朝三十年春正月鮮卑大人内屬朝賀冊府元龜順帝永和元年夫餘國王來朝京師帝作黄門鼓吹角抵戲以遣之後漢書獻帝本紀建安二十一年秋七月南匈奴單于來朝南匈奴傳建安二十一年單于來朝曹操因留於鄴而遣去俾歸監其國焉冊府元龜南單于呼厨泉將其名王來朝待以客禮遂留内侍而匈奴折節過於漢舊是時曹公破三郡烏丸還至易水代郡烏丸行單于普富盧上郡烏丸行單于那樓將其名王來賀蕙田案以上漢外藩入朝右兩漢通典魏制藩王不得朝覲明帝時有朝者皆由特恩不得為常晉書禮志武帝太始中有司奏諸侯之國其王公以下入朝者四方各為二番三歳而周周則更始臨時有故則明年來朝明年朝後更滿三歳乃朝不得違本數朝禮皆執璧如舊朝之制不朝之歳各遣卿奏聘詔可東晉王侯不之國其有受任居外則同方伯刺史二千石之禮亦無朝聘之制通典後周初梁主蕭詧來朝入畿大冢宰命有司致積其餼五牢米九十筥醯醢各三十五甕酒十八壺米禾各五十車薪芻各百車既至大司空設九儐以致館梁主束帛乗馬設九介以待之禮成而出明日梁主朝受享於廟既致享大冢宰又命公一人𤣥冕乗車陳九儐以束帛乗馬致食于賓及賓之從各有差致食訖又命公一人弁服乗車贄設九儐以勞賓梁主設九介迎于門外明日朝服乗車還贄于公公皮弁迎于大門授贄受贄並于堂之中楹又明日梁主朝服設九介乗車備儀以見于公事畢公致享明日三孤一人又執贄勞于梁主明日梁主還贄又明日梁主見三孤如見三公明日卿一人又執贄梁主見卿又如三孤于是三公三孤六卿人各餼賓並屬官之長為使牢米帛同三公自秦平天下朝覲禮廢及後周立蕭詧為梁主稱蕃國始有此儀隋書禮儀志開皇四年正月梁主蕭巋朝于京師次于郊外詔廣平王楊雄吏部尚書韋世康持節以迎衛尉設次於館驛雄等降就便幕巋服通天冠絳紗袍端珽立于東階下西面文武陪侍如其國雄等立于門右東面巋攝内史令柳顧言出門請事世康曰奉詔勞于梁帝顧言入告巋出迎于館門外西面再拜持節者導雄與巋俱入至于庭下巋北面再拜受詔訖雄等乃出立于館門外道右東向巋送于門外西面再拜及奉見帝冠通天冠服絳紗袍御大興殿如朝儀巋服逺遊冠朝服以入君臣並拜禮畢而出文獻通考馬氏曰自秦兼天下朝覲之禮遂廢及周封蕭詧為梁王訖於隋恒稱藩國始有朝見之儀蕙田案以上隋諸侯王來朝煬帝本紀大業八年六月車駕次榆林郡突厥啓民可汗來朝七月啓民可汗上表請變服襲冠帶詔啓民贊拜不名位在諸侯王上大業五年六月髙昌王麴伯雅來朝七年十二月西面突厥處羅多利可汗來朝上大悦接以殊禮蕙田案以上隋外藩朝見右魏晉至隋通典貞觀二十年有司言案史記正月諸侯朝賀凡四人留長安不過二十日今請毎春二王入朝禮畢還蕃從之蕙田案唐初諸王皆出就國故有朝賀之禮中睿以後親藩徒擁虚號及其亡也皇子有不出閤者矣又案以上唐諸王朝見唐開元禮蕃王來朝以束帛迎勞前一日守宫設次於候館門之外道右南向其日使者至掌次者引就次蕃主服其國服所司引立於東堂下西面凡蕃主進止皆主司先引制使皆謁者前導使者朝服出次立於門西東面從者執束帛立於使者之南蕃主有司出門東西面曰敢請事使者曰奉制勞某主稱其國名有司入告蕃主迎於館門外之東西面再拜使者與蕃主俱入使者先升立於西階上執束帛者從升立於使者之北俱東面蕃主升立於東階上西面使者執幣稱有制蕃主將下拜使者曰有後制無下拜蕃主旋北面再拜稽首使者宣制訖蕃主進受幣采五疋為一束其蕃主答勞各以土物其少多相准不得過勞幣勞於逺郊其禮同蕃主還贈於逺郊亦如之勞蕃使即束帛也退復位以幣授左右又再拜稽首使者降出立於館門之外西東面蕃主送於館門之外西面止答使者蕃主揖使者俱入揖讓升蕃主先升東階上西面使者升西階上東面蕃主以土物儐使者再拜受蕃主再拜送物使者降出蕃主從出門