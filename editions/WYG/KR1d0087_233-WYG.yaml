服通天冠絳紗袍御輿以出尚寳卿捧寳及侍儀侍衛導從如常儀皇帝將出仗動大樂鼓吹振作陞御座樂止將軍捲簾尚寳以寳置于案鳴鞭報時雞唱訖引班引蕃王及從官各就拜位贊禮唱鞠躬拜興拜興拜興拜興平身蕃王及從官鞠躬樂作拜興拜興拜興拜興平身樂止引班引蕃王由西陛陞樂作西門入引班立侍於門外内贊接引蕃王至御座前立定樂止内贊唱鞠躬拜興拜興平身蕃王鞠躬樂作拜興拜興平身樂止内贊唱跪蕃王跪承制官前跪承制詣蕃王前宣制云云訖或有賜物就宣内贊唱俛伏興鞠躬拜興拜興平身蕃王鞠躬樂作拜興拜興平身内贊引蕃王自西門出樂作引班引復位樂止贊禮唱鞠躬拜興拜興拜興拜興平身蕃王蕃國從官皆鞠躬樂作拜興拜興拜興拜興平身樂止贊禮唱禮畢侍儀奏禮畢皇帝興樂作警蹕侍從導引至謹身殿樂止引班引蕃王及蕃國從官出引文武官以次出辭東宫儀注蕃王詣闕陛辭訖次辭東宫前期内使監設皇太子位于東宫正殿侍儀司設蕃王拜位于殿門外設蕃國從官拜位于殿下中道之東西北向文武侍從班于殿庭之東西俱相向贊禮二人位于蕃王拜位之北東西相向承傳二人位於殿下東西相向引蕃王舍人二人位于蕃王拜位之北東西相向引蕃國從官二人位于從官拜位之北東西相向引文武侍從班四人位于文武班之北稍後東西相向是日宿衛陳甲士兵仗于東宫門外陳旗幟于中門外將軍六人于殿門外之東西拱衛司陳設儀仗于殿下之東西及殿前殿門之東西樂工設樂于殿庭之南執事者各入就位引班引文武官常服侍從于殿下之東西引班引蕃王服國服至東宫門外立位内使監令啓知皇太子常服出宫仗動樂作陞座樂止引禮二人引蕃王及從官就位初行樂作就位樂止引進啓皇太子立于座前贊禮唱鞠躬拜興拜興拜興拜興平身蕃王鞠躬樂作拜興拜興拜興拜興平身樂止皇太子受前二拜答後二拜皇太子答拜時内贊唱如儀引禮引蕃王出就次引進啓皇太子就座引禮引蕃國從官入就位贊禮唱鞠躬拜興拜興拜興拜興平身從官鞠躬樂作拜興拜興拜興拜興平身樂止贊禮唱禮畢引禮引蕃國從官出引進啓禮畢皇太子興樂作侍從導引還宫樂止引禮引文武侍從官以次出勞送出境蕃王辭東宫畢中書省官率禮部官送出國門外至龍江驛省臣還禮部官設宴如初至之儀宴畢禮部官還應天府官送起行蕙田案此洪武二年所定制也明史禮志會典續文獻通考所載互有詳略而明集禮較詳故采録之明史禮志洪武二十七年四月以舊儀煩命更定凡蕃國來朝先遣禮部官勞於會同館明日各具其國服如嘗賜朝服者則服朝服於奉天殿朝見行八拜禮畢即詣文華殿朝皇太子行四拜禮見親王亦如之王立受答後二拜從官隨蕃王後行禮凡遇宴會蕃王居侯伯之下續文獻通考是時四夷朝貢東有朝鮮日本南有暹羅琉球占城真臈安南𤓰哇西洋瑣里三佛齊渤泥百花覽邦彭亨淡巴須文達那凡十七國其西南夷𨽻四川者軍民府凡六烏䝉烏撒芒部印部普安東川安撫司一曰金筑宣撫司一曰酉陽宣慰司三曰貴州播州石柱招討司三曰天會六番長沙土酋長官司凡三十盧山慕役西堡大華寧谷塞頂營十二營平茶程番康佐木瓜方番昔亦簇占藏先結簇匝簇北定簇祁門簇阿昔洞簇勒都簇班班簇者多簇麥匝簇泥溪雷坡沐川平夷蠻夷岳希篷隴木頭静川府四徳昌馬湖建昌會川州十九永順龍永寧鎮寧建安禮伯興黎里闊武安永昌隆姜黎溪會里威龍昌普濟衛一曰建昌縣三中碧舍麻龍其𨽻廣西者府三田州思明鎮安州二十五龍英江龍養利上下凍思陵萬承安平太平都結思城結倫鎮逺左茗盈南丹結安思同東蘭那地全茗利泗城奉義縣四陀陵羅陽崇善永康𨽻雲南者軍民府一曰姚安府八元江麗江景東楚雄鶴慶尋甸大理臨安宣慰使司三平緬車里八百州二姚鄧土官三海東賓居小雲南縣二廣通習峩𨽻湖廣者宣慰使司四思南施南永順安靖安撫司一忠建長官司三臻部六洞黄坡等處軍民府一曲靖西域之部七西天泥巴喇國朶甘沙州烏斯藏薩里薩喇輝和爾賽瑪爾堪帝以舊儀頗煩故復命更定蕙田案以上明外藩朝見右明五禮通考卷二百二十三
