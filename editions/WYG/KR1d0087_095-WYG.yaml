body:
  text: 五禮通考卷八十五刑部尚書秦蕙田撰吉禮八十五宗廟時享蕙田案祭義云祭不欲數數則煩祭不欲疏疏則怠是故君子合諸天道霜露既降君子履之必有悽愴之心春雨露既濡君子履之必有怵惕之心此時移節變孝子感而思親四時之祭所由昉也虞夏及殷散見於詩書傳記者其禮意略可概見自姬公定制所謂郁郁乎文者葢莫盛焉惜禮經燔没髙堂生所傳儀禮特牲饋食少牢饋食有司徹三篇僅大夫士之禮而天子諸侯宗廟之禮亡矣故漢志即有推士禮而致於天子之譏昔朱子嘗欲以二禮及注疏所言折𠂻以爲天子祭禮書未及成門人黄勉齋楊信齋自致齊而祼獻而饋食以至加爵徹爼旅酬登餕繹祭之儀爲經傳通解續䂓模稍備然經文但載注疏而百家之說未錄行禮雖有節次而闕畧之處尚多其中朝踐饋食九獻三詔薦血爓祭割牲燔燎加籩卒爵先後彼此之岐異同疑似之辨衆說紛紜淆然錯出明儒丘氏濬大學衍義補嘗言古禮今世雖不能盡行然三代聖王制作之深意亦不可使其冺滅不存乞詔儒學之臣參考編類别爲一書以補六藝之闕遇國家有稽古禮文之事於此得以考據使聖賢精神心術之㣲儀文度數之詳不至於墜地是葢天地間一盛典詳哉切切乎其言之今以周禮爲綱及儀禮所載大夫士之禮與夫戴記之禮運禮器郊特牲祭義祭統明堂位諸篇及諸儒義疏有補于禮者推類而求尋其脉絡析其條理綴輯成篇自始迄終俱有歸宿庶幾不失朱子遺意而歴代時享沿革及唐宋元明儀注詳列於後俾古者天子諸侯祭禮畧可考焉周禮春官小宗伯掌四時祭祀之序與其禮肆師以歲時序其祭祀禮記祭義祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂注合于天道因四時之變化孝子感時念親則以此祭之也春禘夏殷禮也周以禘爲殷祭更名春祭曰祠非其寒之謂謂悽愴及怵惕皆爲感時念親也霜露既降脫秋字迎來而樂樂親之將來也送去而哀哀其享不可知也也疏此節明孝子感時念親四時設祭之意禘陽之盛嘗隂之盛也隂陽氣盛孝子感而思念其親故君子制禮合於天道周氏諝曰一嵗之内天時有四而宗廟之祭亦有四故舉春以見夏舉秋以見冬殷人有大禘則小禘爲春祭之名周人一禘而巳則祠爲春祭之名祭統凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝注謂夏殷時禮也礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順陰義也故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也疏此一節明祭祀之重禘嘗之義禘者陽之盛也者以禘祭在夏夏為炎暑故為陽盛嘗者陰之盛也者以嘗祭在秋之時陰功成就故為隂盛冬雖嚴寒以物於秋成故不得以冬烝對夏禘郊特牲饗禘有樂而食嘗無樂陰陽之義也凡飲養陽氣也凡食養陰氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食嘗無樂飲養陽氣也故有樂食養陰氣也故無聲凡聲陽也祭統禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事爲臣不全夫義者所以濟志也諸徳之發也是故其徳盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟内之子孫莫敢不敬矣疏此一節明祭祀之重禘嘗之義人君若能明於其義可以為民父母王制天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝注此葢夏殷之祭名周則改之春曰祠夏曰礿以禘為殷祭詩小雅曰礿祠烝嘗于公先王此周四時祭宗廟之名春疏此一節論夏殷天子諸侯大夫四時祭宗廟之事曰礿者皇氏云礿薄也春物未成其祭品鮮薄也孫炎曰礿者新菜可礿夏曰禘者皇氏云禘者次第也夏時物雖未成宜依時次第而祭之秋曰嘗者白虎通云嘗者新榖熟而嘗之冬曰烝者烝者衆也冬之時物成者衆孫炎云烝進也進品物也注葢為夏殷祭名者以其祭名與周不同故以為夏殷祭名其夏殷之祭又無文故稱葢以疑之此云春礿而郊特牲云春禘者鄭氏注云禘當為禴從此為正祭義曰春禘鄭注直云夏殷禮不破禘字者以郊特牲已改禘為禴故於祭義畧之從可知也云周則改之春曰祠夏曰礿者案宗伯云以祠春享先王以禴夏享先王又知周以禘為殷祭者案公羊傳曰五年而再殷祭又春秋經僖八年秋七月禘於太廟是禘為殷制殷猶大也謂五年一大祭引詩小雅者是文王之詩天保之篇謂文王受命已改殷之祭名以夏祭之禘改名曰礿而詩先言礿後祠者從便文嘗在烝下以韻句也蕙田案以上五條皆以禘爲春夏時祭與周不同注疏家皆以爲夏殷祭名然不可考矣周禮春官大宗伯以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王鄭氏鍔曰祠春禴夏嘗秋烝冬之享時祭之名也禮不豐不殺所以稱時有以少為貴者有以多為貴者春夏以蒐苗而奉祭祀時物方生可獻者寡故春以詞為主夏以樂為主而巳尚詞者為物不足以言詞道意也尚樂者陽氣浸盛樂由陽來也此所謂以少為貴也秋冬以獮狩而奉祭祀百物既登可獻者衆故秋以薦新為主冬以備物為主焉嘗者物初成始可嘗于是而薦新也烝者物畢皆可烝于是而備物也此以多為貴者也司尊彛春祠夏禴秋嘗冬烝詩小雅天保吉蠲爲饎是用孝享禴祠烝嘗于公先王傳春曰祠夏曰禴秋曰嘗冬曰烝公事也此疏若以四時當云祠禴嘗烝詩以便文故不依先後皆周禮文自殷以上則禴禘嘗烝王制文也至周公則去夏禘之名以春禴當之更名春曰祠故禘祫志云王制記先王之法度宗廟之祭春曰禴夏曰禘秋曰嘗冬曰烝祫為大祭於夏於秋於冬周公制禮乃改夏為禴禘又為大祭祭義注云周以禘為殷祭更名春曰祠是祠禴嘗烝之名周公制禮之所改也若然文王之詩所以巳得有制禮所改之名者然王者因革與世而遷事雖制禮大定要亦所改有漸易曰不如西鄰之禴祭鄭注為夏祭之名則文王時巳改言周公者據制禮大定言之耳公亊釋詁文汪氏克寛曰春祠夏禴秋嘗冬烝此周制時享之定名也詩云禴祠烝嘗葢取咏歌之叶韵耳其非有異也春秋桓公八年公羊傳春曰祠夏曰礿秋曰嘗冬曰烝爾雅春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰烝春秋繁露四祭古者嵗四祭四祭者因四時之所生熟而祭其先祖父母也故春曰祠夏曰礿秋曰嘗冬曰烝此言不失其時以奉祀先祖也過時不祭則失爲天子之道也祠者以正月始食韭也礿者以四月食麥也嘗者以七月嘗黍稷也烝者以十月進初稻也此天之經也地之義也蕙田案以上周四時之祭名春秋昭公十五年二月癸酉有事於武宫汪氏克寛曰周官祠禴烝嘗為四時之祭左氏傳曰禘於武宫是以禘為四時之祭葢見經書禘于莊公遂例以為禘而悞耳考之王制春曰礿夏曰禘此葢夏殷之祭名與周不同葢周更時祭之名而後禘為大祭也然有事武宫乃春祠之祭􅂚不以祠祭之名書而止曰有事葢祭之日叔弓蒞事籥入而卒去樂卒事雖得時而不成乎禮春秋乃變文而書之以著其失也蕙田案此條係祠祭易萃六二引吉旡咎孚乃利用禴注居萃之時處于中正而行以忠信故可以省薄薦于鬼神也四正義曰孚乃利用禴者禴殷春祭之名也時之祭最薄者也既濟九五東鄰殺牛不如西鄰之禴祭注牛祭之盛者禴祭之薄者居既濟之時而處尊位物皆濟矣將何為焉其所務者祭祀而巳祭祀之盛莫盛修徳故沼沚之毛蘋蘩之菜可羞於鬼神故黍稷非馨明德唯馨是以東鄰殺牛不如西鄰之禴祭實受其福也周禮夏官大司馬中夏教茇舍遂以苖田如蒐之灋獻禽以享礿注茇舍草止之也夏田為苗擇取不孕任者礿宗廟之夏祭也冬夏田主於祭宗廟者陰陽始起象神之在内祭疏以草釋茇以止釋舍軍有草止之法冬夏田主於宗廟陰陽始起象神之在内者仲冬一陽生仲夏一陰生是陰陽在内故神象之而行祭也此祭因田獵獻禽為祭若正祭自在孟月蕙田案以上三條禴祭詩魯頌閟宫秋而載嘗夏而楅衡箋秋將嘗祭於夏則飬牲周禮春官肆師嘗之日涖卜來歲之芟注芟芟草除田也古之始耕者除田種榖嘗者嘗新榖此芟之功也卜者問後嵗宜芟否春秋桓公五年左氏傳始殺而嘗注建酉之月陰陽始殺嘉榖始熟故薦嘗于宗廟十四年秋八月壬申御廪災乙亥嘗注御廪藏公所親耕以奉粢盛之倉也天火曰災既戒日致齊御廪雖災苟不害嘉榖則祭不應廢故書以示法襄公二十八年左氏傳十一月乙亥嘗於太公之廟慶舍涖事麻嬰爲尸慶爲上獻禮記祭義仲尼嘗奉薦而進其親也慤其行也趨趨以數巳祭子貢問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也子曰濟濟者容也逺也漆漆者容也自反也容以逺若容以自反也夫何神明之及交夫何濟濟漆漆之有乎反饋樂成薦其薦爼序其禮樂備其百官君子致其濟濟漆漆夫何恍惚之有乎夫言豈一端而已夫各有所當也注嘗秋祭也親謂身親執事時也慤與趨趨言少威儀也容以逺言非所以接親親也容以自反言非孝子所以事親也此皆非與神明交之道也天子諸侯之祭或從血腥始至反饋是進熟也薦爼豆與爼也恍惚思念益深之時也豈一端言不可以一㮣也禮各有所當行祭宗廟者賔客濟濟漆漆主人慤而趨趨蕙田案以上五條嘗祭周禮夏官大司馬仲冬教大閲遂以狩田入獻禽以享烝書洛誥戊辰王在新邑烝祭歳文王騂牛一武王騂牛一疏鄭𤣥以烝祭上屬嵗文王騂牛一者嵗是成王元年正月朔日特告文武封周公也案周頌烈文序云成王即政諸侯助祭鄭箋云新王即政必以廟享之禮祭於祖考告嗣位也則鄭意以朝享之後特以二牛告文武封周公之後與孔義不同春秋桓公五年左氏傳閉蟄而烝注建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟八年春正月己卯烝公羊傳烝者何冬祭也常事不書此何以書譏亟也亟則黷黷則不敬君子之祭也敬而不黷疏則怠怠則忘士不及兹四者則冬不裘夏不葛注四者四時祭也而疏數之節靡所折中是故君子合諸天道感四時物思親也祭必于夏之孟月者取其見新物之月也裘葛者御寒暑之美服士有公事不得及此四時祭者則不敢美其衣服葢思念親之至也榖梁傳烝冬事也春興之志不時也夏五月丁丑烝榖梁傳春夏興之黷祀也志不敬也注春祭曰祠薦尚韭卵夏祭曰禴薦尚麥魚秋祭曰嘗薦尚黍肫冬祭曰烝薦尚稻鴈無牲而祭曰薦薦而加牲曰祭禮各異也失禮祭祀例日得禮者時定八年冬從祀先公是也僖八年秋七月禘于太廟月者謹用致夫人耳禘無違禮汪氏克寛曰周官祠禴嘗烝為四時之祭是巳攷之春秋常祭不書書必有譏如桓公八年春夏兩以烝書者譏其不時而且黷如桓公十四年八月嘗本得其時葢因其壬申御廪灾越四日乙亥嘗譏以灾餘之粟祭為不敬也如昭公十五年春二月有事于武宫葢春祠也如宣八年夏六月有事於太廟即夏禴也祭得其時于祭無譏故不書名止云有事所以書者一則譏宣公以仲遂之䘮猶繹而萬入去籥是忘大臣之哀一則譏昭公以叔弓之䘮籥入而去樂卒事是殺宗廟之禮其取義各有所重也襄公十五年冬十有一月晉侯周卒十六年正月葬晉悼公平公即位烝于曲沃注平公悼公子彪曲沃晉祖廟烝冬祭也諸侯五月而𦵏既𦵏卒哭作主然後烝嘗于廟今晉踰月𦵏作主而烝祭傳言晉將有湨梁之㑹故速𦵏蕙田案以上七條烝祭中庸春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下爲上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也丘氏濬曰事死如事生事亡如事存此兩言者仁人孝子不忍其親而萬世奉親思孝之要道也右時享名義禮記王制天子犆礿祫禘祫嘗祫烝程子曰歳四祭三祭合食於祖廟惟春則徧祭諸廟陳氏澔曰祫合也其禮有二時祭之祫則羣廟之主皆升而合食於太祖之廟而毁廟之主不與三年大祫則毁廟之主亦與焉天子之禮春礿則特祭者各於其廟也禘嘗烝皆合食諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿陳氏澔曰南方諸侯春祭畢則夏來朝故闕禘祭西方諸侯夏祭畢而秋來朝故闕嘗祭四方皆然諸侯礿犆禘一犆一祫嘗祫烝祫陳氏澔曰犆礿礿犆非有異也變文而巳祫嘗祫烝與嘗祫烝祫亦然諸侯所以降於天子者禘一犆一祫而巳言夏祭之禘今嵗犆則來嵗祫祫之明年又犆不如天子毎嵗三時皆祫也陳氏禮書君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠悽愴發於霜露之既降怵惕生於雨露之既濡此所以有四時之享也然四時之享皆前期十日而齋戒前祭一日而省眡祭之日禮交動乎上樂交應乎下自再祼以至九獻其禮非一舉自致神以至送尸其樂非一次以一日而歴七廟則日固不足而強有力者亦莫善其事矣若日享一廟前祭視牲後祭有繹則彌月之間亦莫既其事矣考之經傳葢天子之禮春則犆祭夏秋冬則合享犆祭各於其廟合享同於太廟王制曰天子犆礿祫禘祫嘗祫烝諸侯礿犆禘一犆一祫是天子春犆而三時皆祫諸侯亦春犆而秋冬皆祫其異於天子者禘一犆一祫而巳禘一犆一祫而嘗烝皆祫是始年再祫次年三祫也天子言犆礿諸侯言礿犆天子言祫禘祫嘗祫烝諸侯言嘗祫烝祫此特變文而巳非有異也鄭氏曰天子先祫而後時祭諸侯先時祭而後祫凡祫之嵗春一礿而巳孔頴達曰皇氏以為虞夏祫祭毎年爲之又云三時祫者夏秋冬或一祫焉案禘祫志云祫于秋于冬于夏則夏商三時俱殷祭皇氏之說非也其言皆無所據楚茨之詩始言以往烝嘗終言神具醉止儀禮大夫三廟筮止丁亥之一日而言薦歲事於皇祖禮記云嘗禘之禮所以仁昭穆則㑹羣神於烝嘗而具醉者祫也合三廟於一日而薦於皇祖者亦祫也嘗禘所以仁昭穆亦祫也祫有三年之祫有時祭之祫時祭小祫也士虞禮曰薦此祫事則時祭謂之祫宜矣三年之祫大祫也時祭有小禮有大禮小禮春也大禮夏秋冬也公羊傳曰大事者何大祫也則明時祭之祫爲小祫矣禮記曰大嘗周禮曰大烝則春祠爲小禮矣葢小祫止於未毁廟之主大祫巳及於毁廟之主禮記曰周旅酬六尸又曰祫於太廟祝迎四廟之主夫天子旅酬止于六尸諸侯迎主止於四廟非小祫而何大學衍義補丘氏濬曰古者天子七廟天子以一人之身而於一日之間徧行七廟之禮雖有強力之容肅敬之心非獨心力有所不逮亦恐日力有所不給矣昔季氏以大夫行一祭事日不足而繼之以燭他日子路與祭畧其煩文然質明行事猶至晏朝而退夫以大夫行一祭猶且許時况天子以燕安之體具冕服祼饋乃於半日之短晷行九獻之盛禮而欲一日七舉行雖強力之匹夫有所不勝也况萬乗之尊哉世儒泥古而不通變因王制此章有礿禘祭名之誤遂以此爲夏殷之祭夫禮合於義適其時斯可行矣尚何殷周之拘况七廟之制商已有之周承殷後已從其廟制之數則其所行之禮安知不相沿襲哉本朝歲五祀皆合享於太廟雖不拘拘於古而自與古意合云右時享犆祫書益稷戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀疏此舜廟堂之樂微子之命云作賔於王家詩頌微子之來謂之有客是王者之後為時王所賔也故知虞賔謂丹朱爲王者後故稱賔也王者立二代之後而獨言丹朱者葢髙辛氏之後無文而言故唯指丹朱也王者之後尊於羣后故殊言在位羣后亦在位也後言徳譲丹朱亦以德譲矣故言與諸侯助祭班爵同者推先有徳也二王之後並爲上公亦有與丹朱爵同故丹朱亦譲也禮記郊特牲有虞氏之祭也尚用氣血腥爓祭用氣也注尚謂先薦之爓或爲䐲先疏有虞氏之祭也尚用氣者尚謂貴尚其祭祀之時薦用氣物也血腥爓祭用氣也者此解用氣之意血謂祭初以血詔神於室腥謂朝踐薦腥肉於堂爓謂沈肉於湯次腥亦薦於堂祭義云爓祭祭腥而退是也今於堂以血腥爓三者而祭是用氣也以其並未孰故云用氣也正義曰言先薦者對合享饋孰為先也此虞氏尚氣殷人尚聲周人尚臭皆謂四時常祭也若其大祭祫周人仍先用樂也故大司樂云若樂九變則人鬼可得而禮矣鄭云先奏是樂以致其神而後祼焉推此言之虞氏大祭亦先作樂也故鄭注大司樂引虞書云戛擊鳴球搏拊琴瑟以詠祖考來格簫韶九成鳳皇來儀此宗廟九奏之節此虞氏大祭與周同樂九奏夏殷大祭雖無文或當與周同熊氏以為殷人先求諸陽謂合樂在灌前周人先求諸隂謂合樂在灌後與降神之樂别熊氏又云凡大祭並有三始祭天以樂為致神始以煙為歆神始以血爲陳饌始祭地以樂為致神始以埋為歆神始以血為陳饌始祭宗廟亦以樂為致神始以灌為歆神始以腥為陳饌始義或然也案禮宗廟之祭先薦血後薦腥而云宗廟腥爲陳饌始於義未安也明堂位有虞氏祭首注氣主盛也陳氏禮書祭以右手凡祭必於脯􅊽之豆間特公食大夫有司徹祭於上豆之間以豆數多故也祭之尚肺周禮而巳若有虞氏則祭首夏后氏則祭心殷則祭肝以時異則禮異也方氏慤曰有虞氏祭首尚用氣故也氣雖有陰陽之異要之以陽為主耳首者氣之陽也蕙田案此虞氏時享挼祭之禮也禮書謂儀禮少牢舉肺祭肺三皆切之舉肺一者尸之所先食者也祭肺三者尸與主人主婦之所祭者也祭肺三皆在尸爼而舉肺各於其爼故儀禮尸爼阼爼以至主婦佐食賓長兄弟宗人衆賓及衆兄弟内賔宗婦公有司之爼皆離肺一則祭肺三者施於尸主人主婦之挼祭也皆離肺一者自尸至公有司食之也周官太祝隋釁令鐘鼓小祝大祭禮贊隋守祧既祭藏其隋儀禮士虞祝命佐食隋祭特牲祝命尸挼祭之尸取菹擩于醢祭于豆間佐食授主人挼祭主婦則佐食挼祭少牢尸受肺與黍同祭于豆間主人佑受佐食挼祭坐祭之主婦亦受佐食挼祭祭之鄭康成謂下祭曰隋則隋與春秋傳所謂隋成之隋同周官與士虞作隋少牢與禮記作綏特牲作挼其實一也隋祭所以祭鬼神之物猶生者之飲食必祭也而尸與主人主婦皆有是禮則尸既舉奠而綏祭祭神食也主人受酢而綏祭祭尸食也周人所祭莫先于肺則有虞氏之所祭莫先于首其義一而已矣泰有虞氏之尊也注泰用瓦陶疏考工記云有虞氏尚故知泰用瓦方氏慤曰泰司尊彛謂太古之瓦尊葢彼名其質此名其義也蕙田案經文下云山罍夏后氏之尊著殷尊周犧象禮器云廟堂之上罍尊在阼犧尊在西君在阼夫人在房君西酌犧象夫人東酌罍尊疏罍尊在阼謂夫人所酌也犧尊在西謂君所酌也熊氏云此謂諸侯時祭所用之禮據此觀於諸侯而天子之禮可知觀於周之犧象而有虞氏之泰尊其用於時祭之禮葢可推矣葢宗廟之獻尊也有虞氏之兩敦注黍稷器陳氏祥道曰敦者養人之厚也方氏慤曰兩敦若内則所謂敦周官所謂玉敦是矣釋者以為宗廟之器焉陸氏佃曰敦亦簋也葢設以對故謂之敦蕙田案此有虞氏宗廟時享盛黍稷之器觀於下文四璉六瑚八簋可知葢三代相承而漸増其數也爼有虞氏以梡注梡斷木爲四足而巳有疏有虞氏質未有餘飾故鄭知梡四足而巳方氏慤曰梡者斷木為足無餘飾也苟完而巳蕙田案此有虞氏宗廟爼豆之制也經言爼而不言豆則豆當與夏同矣夏楬豆殷玉豆周獻豆方氏謂獻若周官所謂再獻之獻此言獻豆則主祭祀之豆耳據此豆爲祭祀之豆則爼爲祭祀之爼可知觀于周而有虞氏可知也有虞氏服韍注韍冕服之韠也舜始作之以尊祭服易疏虞氏直以韋為韍未有異飾故服韍困卦九二朱紱方來利用享祀故鄭知韍為祭服蕙田案此有虞氏時享之祭服也論語曰禹惡衣服而致美乎韍冕葢韍則承虞之制而致美則加飾焉經所謂夏后氏山葢以山畫於韍而成文也朱子謂韍冕皆祭服則虞氏可知矣路史帝堯作七廟以享先祖祭以其氣迎牲殺於庭毛血詔于室以降神然後樂作所以交神明也帝舜踐天子之位春礿夏禘秋嘗冬烝所以報本反始也通典有虞氏四時之祭名春曰礿夏曰禘秋曰嘗冬曰烝其祭尚氣郊特牲云血腥爓祭用氣也法先迎牲殺之取血告於室以降其神然後用樂而行祭事其祭貴首蕙田案以上虞書及禮記三條有虞氏時享宗廟之禮樂也祭法有虞氏祖顓頊而宗堯蔡氏書傳引蘇氏說而定爲神宗堯廟詳見廟制門是有虞廟享之祖考也虞賔羣后助祭之諸侯書言受終文祖格于文祖格于藝祖皆因事告祭其禮簡此言時享其禮繁故特著虞賔助祭之盛朱長孺謂祖考下繫虞賔則考者堯也若舜祭其祖考而丹朱在位是與商之孫子侯服駿奔何異其言最爲有識書周頌清廟專言多士顯相對越駿奔以明享祀之美觀于虞賓二句則其時於穆肅雍之氣象恍然可思也虞賓稱在位羣后曰徳讓等級隆殺又秩然不淆典謨之體要如此戛擊鳴球搏拊琴瑟以詠乃堂上升歌之樂大戴禮所謂清廟之歌一唱而三歎郊特牲云歌者在上貴人聲也周禮太師大祭祀率瞽登歌令奏擊拊小師登歌擊拊其升歌清廟之制本於此矣下管鼗鼓合止柷敔乃堂下之樂郊特牲所謂匏竹在下周禮太師下管播樂器令奏鼓􅉧小師下管擊應鼓其下管興舞之制本於此矣笙鏞以間乃笙入間歌之樂儀禮鄉飲燕禮所謂笙入三成周禮笙師共其鐘笙之樂眡瞭凡樂事播鼗擊頌磬笙磬其間歌之制本於此矣簫韶九成此合作之樂周禮大司樂大合樂以致鬼神祗又曰若樂九變則人鬼可得而禮是九變之樂即本於九成之韶無疑也始終條理節序分明廟享之樂莫備於書之所言矣郊特牲血腥爓祭用氣也案廟享之禮莫先于薦神有虞氏尚氣先殺牲以血詔神詩所謂取其血膋記曰血毛詔於室舉一血而釁燔燎羶薌之事該之矣次薦腥禮運所謂腥其爼舉一腥而割牲羞爼豆之事該之矣次薦爓祭義所謂爓祭祭腥舉一爓而朝踐薦獻之事該之矣至於明堂言祭首則尸與主人挼祭之禮也泰則獻酒醴之尊觀于尊而五齊三酒可知也兩敦爲盛黍稷之器則饋食之禮具矣爼以梡則陳饌之儀具矣韍則祭服之制隆焉此皆虞氏廟享經文之可據者葢夫子刪書斷自唐虞孔子稱殷因于夏禮則夏因于虞禮可知虞禮不可見而見於書者戛擊鳴球一章其禮樂聲名之盛巳令人莫可思議兼之郊特牲明堂位而器服尊爼又有可推者如此則止廟享一事其信乎足以啟三王而承五帝也夫觀承案經文簡括無所不包虞書此篇及禮記三條其義原是如此直以讀者鹵莽則失之得此推闡詳明而融貫爲一有虞氏一代之禮容樂節直巳了了可數方不負聖賢作經之深意耳右虞廟享論語禹吾無間然矣菲飲食而致孝乎鬼神注致孝鬼神祭祀豐潔享疏飲食鬼神所故云致孝蕙田案致孝鬼神而言飲食則其爲時享薦獻饋食可知矣禮記明堂位夏后氏祭心陳氏禮書夏非不祭肺也以心爲主而巳方氏慤曰三代各祭其所勝夏尚黒爲勝赤故祭心心于色爲赤故也必各祭其所勝者明非有所勝則不能王天下而無以致孝于鬼神矣蕙田案此夏享祀隋祭之禮葢承乎虞而改革者也方氏祭其所勝之說存參夏后氏牲尚黒方氏慤曰夏后氏尚黒其亦用牡可知故書言湯用元牡而釋者以爲未變夏祀也夏后氏尚明水疏夏后氏尚質故用水方氏慤曰明水隂鑒取水於月得之於天者也蕙田案二條夏后氏享祀之牲醴山罍夏后氏之尊也注罍猶雲雷也方氏慤曰山罍即山尊也禮器亦謂之罍尊非謂諸臣所酢之罍也以山罍爲尊因謂之罍尊亦猶以壺爲尊因謂之壺尊蕙田案據上下文言此當爲夏祭祀之獻尊詳見前爵夏后氏以琖疏爵並以爵爲形琖以玉飾之陳氏禮書考之爾雅鍾之小者謂之棧晉元興中剡縣民井中得鍾長三寸口徑四寸銘曰棧則棧卑而淺矣夏爵命之以琖葢其制若棧然也祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵蓋其制若雀然也琖象棧爵象雀言玉琖則飾可知矣琖斚先王之器也唯魯與二王之後得用焉諸侯用之則僭矣故記曰琖斚及尸君非禮也方氏慤曰夏殷未承以爵而亦通謂之爵者自周始然耳若所謂一升曰爵夏則一升曰琖殷則一升曰斚也不然則由周以前止有爵之名由周以後又有爵之形也蕙田案此夏享祀之爵陸農師謂琖以齊言知然者盎齊亦或謂之棧酒其說與禮書同未知是否然其爲祭祀所用無疑灌尊夏后氏以雞夷注夷讀為􅃔周禮春祠夏禴祼用雞􅃔鳥􅃔秋嘗冬烝祼用斚􅃔黄􅃔疏􅃔法也與餘尊爲法故稱􅃔鷄􅃔者或刻木爲鷄形而畫鷄於􅃔鷄􅃔盛明水鳥􅃔盛鬰鬯斚􅃔黄􅃔義亦然陳氏禮書尊之為言尊也􅃔之為言常也尊用以獻上及於天地􅃔用以灌施於宗廟而巳故尊於祭器獨名尊􅃔於常器均名􅃔籍談曰有勲而不廢撫之以􅃔器臧武仲曰大伐小取其所得以作􅃔器則􅃔之爲常可知矣鷄者司辰之始則隂盛而陽微祼所以求之隂故夏后氏以之方氏慤曰灌尊所以實灌鬯之尊也夷以對險夷者道之常故孟子引烝民之詩變􅃔爲夷者以此蕙田案祭之屬莫重於灌而夏殷之制見於經者唯此一條可證宗廟之灌不始於周而自夏巳然夏因虞禮并不始於夏蓋唐虞之時巳然也其勺夏后氏以龍勺注龍龍頭也勺疏此灌尊所用之勺龍勺爲龍頭陳氏禮書龍勺龍陽中之隂也淵潛而爲仁以澤萬物故夏以之方氏慤曰勺用以酌酒者陸氏佃曰龍勺以能施爲義蕙田案此夏時享灌酒之勺夏后氏之四璉陳氏祥道曰璉者養人而不絶者也陸氏佃曰四璉黍稷稲粱蕙田案此夏后氏廟享盛􅁰稷之器爼夏后氏以嶡注嶡之言蹷也謂中足爲横距之象疏謂嶡足間有横似有横蹷之象夏后氏以楬豆方氏慤曰楬豆未有他飾以不爲柄若蜡氏之楬而巳蕙田案二條夏享祀之爼豆夏后氏山注山取其仁可仰也山疏韍制夏后氏畫之以論語禹惡衣服而致美乎黻冕注損其常服以盛祭服疏正義曰鄭𤣥注此云黻是祭服之衣冕其冠也左傳晉侯以黻冕命士㑹亦當然也黻蔽膝也祭服謂之黻其他謂之韠俱以韋爲之制同而色異韠各從裳色黻其色皆赤尊卑以深淺爲異天子純朱諸侯黄赤大夫赤而巳大夫以上冕服悉皆有黻故禹言黻冕左傳亦言黻冕但冕服自有尊卑耳此禹之黻冕則六冕皆是也蕙田案二條夏享祀之黻冕又案夏后氏祭禮于經最畧今據此各條推之祭心以爲隋祭而祭血祭腥爓祭之類統之矣宗廟以祼爲重而夏后氏行之祭亦以牲醴爲敬而尚黒尚明水舉之矣尊罍爵琖可徵九獻之文四璉爼豆以證黍稷庶羞之用黻冕以彰祭服之美隠隠乎致孝鬼神之事歴歴可想也蓋上以承唐虞之盛而道殷周之先路矣右夏廟享詩商頌那猗與那與置我鞉鼓奏鼓簡簡衎我烈祖傳烈祖湯有功烈之祖也諸箋奏鼓奏堂下之樂也烈祖湯也以金奏堂下縣以樂我功烈之祖成湯朱子詩傳記曰商人尚聲􅆨味未成滌蕩其聲樂三闋然後出迎牲即此是也劉氏瑾曰凡聲屬陽故曰樂由陽來商人祭祀尚聲所以先求諸陽者也朱氏公遷曰臭未成未用灌也味未成未用牲也滌蕩者動而發散之義樂所以動其和而散之于外也湯孫奏假綏我思成箋湯孫太甲又奏升堂之樂弦歌之何氏楷曰奏即奏鼓之奏假至也謂奏樂以通之於烈祖也陳澔云鬼神在天地間與隂陽合散同一理而聲音之感無間顯幽故殷人之祭必先作樂黄佐云商人未祭之先而作樂如周人取蕭祭脂亦於未祭之前以此求神於陽也陳際泰云商人尊鬼而尚聲聲召風風召氣氣召神然神懼其雜而集焉則有湯孫之思矣思者氣之精者也鬼神非其類也不至心有精氣而借聲以召之神無不格格者又烈祖巳焉綏我思成信哉其綏也歟觀思成之說可以見祭祀之理鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲傳嘒嘒然和也平正平也依倚也磬聲之清者也以象萬物之成周尚臭殷尚聲王氏安石曰依我磬聲者言與堂上之樂諧也黄氏震曰樂以恱神故曰於赫湯孫穆穆厥聲以侈言其樂之美如飲食云苾苾芬芬以侈言其飲食之美凡以恱神非自誇也庸鼓有斁萬舞有奕我有嘉客亦不夷懌傳大鐘曰庸朱子詩傳上文言鞉鼓管籥作於堂下其聲依堂上之玉磬無相奪倫者至於此則九獻之後鐘鼓交作萬舞陳於庭而祀事畢矣濮氏一之曰執籥秉翟者文舞也朱干玉戚者武舞也萬舞乃二舞之總名今言萬舞有奕正謂文武迭用而有序劉氏瑾曰周制宗廟九獻之次尸未入前王祼于奥以降神一獻也后亞獻二獻也尸入薦血腥後王酌泛齊獻尸所謂朝踐三獻也后酌醴齊亞獻亦爲朝踐四獻也薦熟畢王酌盎齊獻尸五獻也后酌緹齊亞獻六獻也皆所謂饋獻也尸乃食訖王更酌朝踐之泛齊以酳尸所謂朝獻七獻也后更酌饋獻之緹齊以亞酳所謂再獻八獻也又有諸臣爲賔者之一獻凡九也若商之九獻則未有考朱氏公遷曰祭將畢時樂盛作如楚茨言鐘鼓既戒鼓鐘送尸亦其一徵也何氏楷曰嘉客謂二王後及諸侯來助祭者蔡汝楠云於虞曰虞賓在位於商曰我有嘉客於周曰我客戾止聖人御世皆考賔國之化自古在昔先民有作温恭朝夕執事有恪嚴氏粲曰先民猶言前人作承上文謂作樂也言聲樂之盛非今日始作之乃古昔之時前人所作也顧予烝嘗湯孫之將疏王制祭統言四時祭名皆云春礿夏禘秋嘗冬烝注以爲夏殷祭名是烝嘗爲時祭故云念我殷家有時祭之事而來也若然郊特牲云饗禘有樂而食嘗無樂故春禘而秋嘗注禘當爲礿字之悞也王制云春礿夏禘鄭引王制夏殷以正特牲之文則特牲所云食嘗無樂是夏殷禮矣此云烝嘗則是秋冬之祭而上句盛陳聲樂者此經所陳總論四時之祭非獨爲秋冬發文直此烝嘗之言爲韵耳縱使嘗實無樂而礿禘有之故得言其聲樂也且禮文殘缺鄭以異於周法者即便推爲夏殷未必食嘗無樂非夏禮也箋以湯孫爲太甲故言太甲之扶助傳以湯爲人之子孫則將當訓爲大不得與鄭同也王肅云言嘉客顧我烝嘗而來者乃湯爲人子孫顯大之所致也何氏楷曰李本云嘗秋祭烝冬祭祭以秋冬爲備故言祭者必舉烝嘗以見其餘焉愚按烝嘗者謂烝繼嘗而舉知此乃冬祭也序那祀成湯也疏那之詩者祀成湯之樂歌也成湯創業垂統制禮作樂及其崩也後世以時祀之歐陽氏修曰商人作頌以爲祀湯之樂歌述其祀時樂舞之盛以衎樂先祖如周頌我將祀文王但述祀時牛羊肥腯執競祀武王亦言祀時鐘鼓管磬之類是也烈祖嗟嗟烈祖有秩斯祜申錫無疆及爾斯所箋功烈之祖成湯范氏處義曰言烈祖而云嗟嗟以簡樸故也若周頌則言於穆於皇近于文矣既載清酤賚我思成亦有和羮既戒既平何氏楷曰清者潔清之義酤說文云一宿酒也徐鍇云謂造之夜而熟若今鷄鳴酒也酒只用一宿而成者亦見商人尚質處吕氏祖謙曰儀禮載祭祀燕享者每始言羮定葢以羮熟爲節然後行禮定即戒平之謂此所謂既載清酤亦有和羮皆言祭之始也劉氏瑾曰鄉飲酒禮鄉射禮燕禮大射儀公食大夫禮少牢饋食皆曰羮定鄭氏曰定猶熟也歐陽氏修曰既載清酤賚我思成謂以清酒祼獻而神賚我使成祀事也范氏處義曰清酤和􅃵皆祭祀之物凡祭酒在先羮在後有次第也􅎦假無言時靡有爭綏我眉壽黄耉無疆何氏楷曰􅎦說文云釜屬假通作徦說文云至也此即雍人陳鼎之事中庸誤引作奏與湯孫奏假同文朱子遂謂古聲奏族相近族聲轉平而爲􅎦此恐不然彼言奏假此言􅎦假明是異字何得混􅎦爲奏乎凡祭則雍人必先陳鼎所以爲烹牲體之用也今自鼎初至之時而即皆能秉其肅敬靡有諠譁又各執其事不相奪倫絶無交侵職位以有紛爭者此非主祭者之精專於假廟何能使助祭者人人顧化若此故中庸曰不賞而民勸不怒而民威於鈇鉞也蕙田案何氏據説文解􅎦字與毛鄭朱傳異考上文言清酤則祼獻之事該之矣言和羮則薦腥薦熟之事該之矣此言􅎦至則移鼎入陳之事該之矣似何氏爲􅃀實靡有争三字亦有歸着葢雍人所陳之鼎非一進退安設易有諠譁侵位之事也約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來享降福無疆嚴氏粲曰諸侯來助祭者其車以皮纒約其軧又有文錯之衡其八鸞之聲鶬鶬然和以此格神以此享神我時王受天命廣大天降以康安之福使豐年􅁰稷之多穰穰然也歐陽氏修曰上言以享者謂諸侯來助祭致享于神也下云來享者謂神來至而歆享也蕙田案約軧錯衡四句言廟中助祭之諸侯也自天降康四句言受嘏之事也大雅既醉篇公尸嘉告鄭箋曰公尸以善言告之謂嘏辭也小雅天保篇君曰卜爾萬夀無疆鄭箋曰君曰卜爾者尸嘏主人傳神辭也楚茨篇工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既勑永錫爾極時萬時億鄭箋云祝致神意告主人使受嘏既而以嘏之物往予主人儀禮少牢嘏辭云皇尸命工祝承致多福無疆與汝孝孫來汝孝孫使汝受禄於天宜稼於田眉夀萬年勿替引之何氏楷曰卿大夫嘏辭以宜稼于田爲詞則天子嘏辭之㫖可知矣今案自天降康豐年穰穰即楚茨時萬時億儀禮宜稼于田之意降福無疆即天保萬夀無疆之意來假來享即神嗜飲食苾芬孝祀之意其爲工祝致嘏之事無疑若如諸家之說則降康降福兩句似主人自頌自讚未免落􅆰無着顧予烝嘗湯孫之將黄氏佐曰上既曰賚我思成矣曰綏我眉夀黄耉無疆矣此又曰顧我烝嘗何也葢祖考雖享而孝孫之心未敢必其享也故又致其丁寕之意如此何氏楷曰此二語雖與那篇結語相同而意㣲有别彼重在孫字謂以一氣感通也此重在烝嘗二字謂我于烝嘗之禮相繼舉行其時時勤于祭祀如此當爲列祖之所鑒念也序烈祖祀中宗也輔氏廣曰那與烈祖皆祀成湯之樂然那詩則專言樂聲至烈祖則及於酒饌焉商人尚聲豈始作樂之時則歌那既祭而後歌烈祖歟蕙田案此詩序以爲祀中宗朱傳以爲祀成湯何元子又以爲髙宗肜祭成湯之詩細玩詩詞以爲祀中宗則烈祖爲大戊矣但烈祖之稱巳見那詩不應兩祖而同一號以爲祀成湯是矣但泛言之則於義似混故何元子復有肜祭之說然亦無據今案輔氏之說較爲自然合兩詩觀之似于祭享之次序恰有合處葢那之專言樂聲則商人尚聲詔告天地之間爲始祭求神之事也嘉客夷懌亦是在位之初聞聲感動于時在廟之人莫不思齊肅以承祭祀故有温恭朝夕執事有恪之語尚未實指助祭駿奔之事葢朝踐以前氣象烈祖篇接言烈祖申錫而詳及酒醴腥熟移鼎受嘏皆饋食一節及以後事而助祭者亦實著其執事靡爭之義焉商人時享之禮文獻無徵今所存者唯此二篇可以摹擬當時之情事以此而推輔氏之說固未可以輕議也元鳥天命元鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旂十乗大糦是承邦畿千里維民所止肇域彼四海四海來假來假祁祁景員維河殷受命咸宜百祿是荷輔氏廣曰武丁孫子武王靡不勝言其德之類乎祖也龍旂十乗大糦是承言諸侯之來助祭者皆備車服奉􅁰稷也序元鳥祀髙宗也箋祀當爲祫祫疏毛無破字之理未必以此爲或與殷武同爲時祀但所述之事自有廣狭耳李氏樗曰此詩歴言殷之先祖其實爲髙宗設也髙宗中興之主也大抵言奄有天下之由而發揚髙宗能紹祖宗之舊服諸侯之心也祀髙宗而指武丁者葢以諱祀神者周人之制也自周以前則未嘗諱之也蕙田案鄭箋以此詩爲祫祭改祀爲祫疏以毛意與殷武同爲時祀今兩存之詳見祫祭門殷武撻彼殷武奮伐荆楚罙入其阻裒荆之旅有截其所湯孫之緒朱子詩傳舊說以此爲祀髙宗之廟葢自盤庚没而殷道衰楚人叛之髙宗撻然用武以伐其國入其險阻以致其衆盡平其地使截然齊一皆髙宗之功也易曰髙宗伐鬼方三年克之葢謂此歟維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常朱子集傳享獻也世見曰王天命多辟設都于禹之績歲事來辟勿予禍適稼穡匪懈朱子詩傳言天命諸侯各建都邑于禹所治之地而皆以嵗事來至于商黄氏佐曰歳事乃周禮春朝夏宗冬遇之屬天命降監下民有嚴不僭不濫不敢怠遑命於下國封建厥福朱子詩傳此髙宗所以受命而中興也商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生朱子詩𫝊言髙宗中興之盛如此陟彼景山松栢丸丸是斷是遷方斲是䖍松桷有梴旅楹有閑寢成孔安朱子詩傳此葢特爲百世不遷之廟不在三昭三穆之數既成始祔而祭之之詩也劉氏瑾曰商書曰七世之廟可以觀徳葢天子七廟三昭三穆與太祖之廟而七八世九世而後隨其昭穆親盡逓遷其主而祧于太祖之廟其有功德之君則後世宗之雖親盡而不祧别立百世不遷之廟而特祔其主焉凡有功德者皆然初不可預爲設數而商則止有三宗髙宗其一也序殷武祀髙宗也疏殷武詩者祀髙宗之樂歌也髙宗有德中興殷道既崩之後子孫美之而歌此詩蕙田案朱子以此爲立廟祔祭之詩序但以爲祀髙宗而以卒章之義爲高宗復成湯之道故新路寢則亦時享之歌也今存之以俟參考又案享祀之禮虞夏尚矣至商有頌乃實係當時宗廟之樂章與傳記所載摭拾疎闊者不同惜正考父得於周太師者僅十二篇至孔子刪詩又亡其七今所存者僅五篇而長發爲大禘之詩與時享不同兹所錄者惟那一篇烈祖一篇爲烝嘗之禮無疑元鳥殷武則一以爲祫祭一以爲立廟而不得專屬之時享矣然以其爲祭宗廟之詩特並著於前以爲殷禮之實據而尚書禮記之文有關于享祀者並載後方商書盤庚兹予大享於先王爾祖其從與享之傳大享烝嘗也曰疏周禮大宗伯祭祀之名天神曰祀地祗曰祭人鬼享此大享于先王謂天子祭宗廟也傳解天子祭廟得有臣祖與享之意言古者天子錄功臣配食於廟故臣之先祖得與享之也古者孔氏據已而道前世也此殷時巳然矣大享烝嘗者烝嘗是秋冬祭名謂之大享者以事各有對若烝嘗對禘祫則禘祫爲大烝嘗爲小若四時自相對則烝嘗爲大礿祠爲小以秋冬物成可薦者衆故烝嘗爲大春夏物未成可薦者少故礿祠爲小也知烝嘗有功臣與祭者案周禮司勛云凡有功者銘書於王之大常祭于大烝司勛詔之是也嘗是烝之類而傳以嘗配之魯頌曰秋而載嘗是也祭統云内祭則大嘗禘是也外祭則郊社是也然彼以祫爲大嘗知此不以烝嘗時爲禘祫而直據時祭者以殷祫於三時非獨烝嘗也秋冬之祭尚及功臣則禘祫可知唯春夏不可耳以物未成故也惟禘祫乃祭功臣配食時祭不及之也近代以來功臣配食各配所事之君若所事之君其廟已毁時祭不祭毁廟其君尚不時祭其臣固當止矣禘祫則毁廟之主亦在焉其時功臣亦當在也王制云犆礿祫禘祫嘗祫烝諸侯礿犆禘一犆一祫嘗祫烝祫此王制之文夏殷之制天子春唯時祭其夏秋冬既爲祫又爲時祭諸侯亦春爲時祭夏唯作祫不作時祭秋冬先作時祭而後祫周則春曰祠夏曰礿三年一祫在秋五年一禘在夏故公羊傳云五年再殷祭禮緯云三年一祫五年一禘此是鄭氏之義未知禮意如何何氏楷詩經世本古義長發解曰天子夏秋冬三時之祭皆祫其以功臣配享惟當在祫祭耳月令十月有大飲烝之文指祫烝也周禮夏官司勲職云王功曰勲國功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書于王之大常祭于大烝司勲詔之烝冬祭也謂之大者物成衆多之時其祭比三時爲大也方是時百物皆報焉祭有功宜矣禮記祭統衛孔悝之鼎銘曰勤大命施于烝􅃔鼎亦謂配享于烝祭也周禮司勲祭于大烝鄭注死則于烝先王祭之孔疏必祭功臣在冬之烝祭者烝者衆也冬時物成者衆故祭功臣案彼書注以大享爲烝嘗者此舉冬祭物成者衆而言其嘗時亦祭之也或可周時直于烝時祭功臣殷時烝嘗俱祭禮異故也蕙田案大享註疏以爲烝嘗今以周禮祭於大烝及孔悝鼎銘施於烝􅃔鼎之言証之則爲時享之祫烝無疑施於烝􅃔鼎者與享則各有鼎功臣之鼎當以其功銘於鼎一以别於正祭之鼎一以著其辨一以表其勲也髙宗肜日傳祭之明日又祭殷曰肜周曰繹辛疏肜者相尋不絶之意春秋宣八年六月巳有事于太廟壬午猶繹榖梁傳曰繹者祭日之旦日之享賓也是肜者祭之明日又祭也儀禮有司徹上大夫曰儐尸與正祭同日髙宗肜日越有雊雉傳于肜日有雉異是疏髙宗既祭成湯肜祭之日於有雊鳴之雉升於鼎耳此乃怪異之事祖巳曰惟先格王正厥事乃訓于王曰惟天監下民典厥義降年有永有不永非天天民民中絶命民有不若德不聽罪天既孚命正厥德乃曰其如台嗚呼王司敬民罔非天􅁢典祀無豐于昵註典祀有常不當特豐于近廟疏祭祀有常謂犧牲粢盛尊􅃔爼豆之數禮有常法不當特豐于近廟謂犧牲禮物多也祖巳知髙宗豐於近廟欲玉因此雊雉之異服罪改修以從禮耳蕙田案此殷禮繹祭之􅃀証也爾雅繹又祭也商曰肜禮記郊特牲殷人尚聲􅆨味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也注滌蕩猶摇動也樂疏殷人尚聲者帝王革異殷不尚氣而尚聲謂先奏也不言夏或從虞也􅆨味未成謂未殺牲也滌蕩猶摇動也殷尚聲故未殺牲而先摇動樂聲以求神也樂三闋然後出迎牲者闋止也奏樂三徧止乃迎牲入殺之聲音之號所以詔告于天地之間也者解所以先奏樂之義言天地之間虚豁亦陽也言鬼神在天地之間聲是陽故用樂之音聲呼號告於天地之間庶神明聞之而來是先求陽之義也何氏楷詩經世本古義那解曰陳暘云凡聲陽也商人之祭先求諸陽而巳日三成朏月三成時嵗三成閏然則樂不三闋何以成樂哉今夫禮減而進以進爲文樂盈而反以反爲文滌蕩其聲則盈矣必繼以三闋者以反爲文也樂三闋則減矣然後出迎牲者以進爲文也凡樂皆文之以五聲播之以八音禽獸知聲而不知音衆庶知音而不知樂通聲音之號而知樂者其唯鬼神之靈乎如之何不詔告以此陳澔云聲音之感無間顯幽故殷人之祭必先作樂三終然後出而迎牲于廟門之外欲以此樂之聲音號呼而詔告于天地之間庶幾其聞之而來格來享也凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸陰陽之義也殷人先求諸陽馬氏晞孟曰有虞氏之祭尚氣殷人從而文之故尚聲樂由陽來則凡聲皆陽也葢人之死也魂氣歸于天非求諸陽不足以報其魂也殷人尚聲所以迎其魂之來也方氏慤曰先求諸陽則尚聲故也聲以氣動而生故凡聲皆陽也蕙田案殷人非不灌而求諸陰也特所尚者聲故曰先求諸陽明堂位殷祭肝方氏慤曰殷尚白爲勝青故祭肝肝於色爲青故也蕙田案此殷享祀隋祭之禮承乎夏之祭心而更革者也殷白牡方氏慤曰牡言其質也郊特牲言孕牲弗食祭帝弗用周景王時雄鷄自斷其尾憚其爲犧鷄且用牡而况牛乎殷尚醴疏殷人稍文故用醴方氏慤曰醴則漸致其味成之以人者也然猶未厚僅足以爲禮而巳蕙田案此殷祀享之牲醴從所尚而漸文也著殷尊也注著著地無足無疏著無足而底著地故謂爲著然殷尊足則泰罍犧並有足也方氏慤曰著讀如附著之著下無所承著地而巳殷質故其尊從簡如此蕙田案此殷祭祀之獻尊爵殷以斚注斚畫禾稼也詩曰洗爵奠斚也疏殷亦爵形而畫為禾稼斚稼方氏慤曰斚殷尊名也而爵亦名之者以爵有從尊之義故因以名焉殷質故也若行葦所謂奠斚者爵也司尊􅃔所謂斚􅃔者尊也爵則爲爵之形以承之周尚文故也蕙田案此殷享祀之爵灌尊殷以斚疏斚畫爲禾稼方氏慤曰灌尊實祼鬯之尊蕙田案此與前爵斚所用不同而其飾則一尚質故也其勺殷以疏勺疏疏謂刻縷通刻勺頭方氏慤曰勺用以勺酒者疏與疏布之疏同而與疏屏之疏異葢疏而通之無他飾焉陸氏佃曰疏勺以能不淫爲義蕙田案此二條殷灌器殷之六瑚陳氏祥道曰璉者養人而不絶者也瑚以玉爲之者美而有充實之意養人以爲充實者瑚之用也陸氏佃曰六瑚黍稷稻粱麥􅋎蕙田案此殷盛黍稷器俎殷以椇注椇之言枳椇也謂曲橈之也之疏椇枳之樹其枝多曲橈殷爼似方氏慤曰椇者既有横木又爲曲橈之形則于是爲具故也陳氏禮書殷之横距與夏同而曲其足與三代異殷玉豆方氏慤曰玉豆則于掲之上又飾之以玉也蕙田案二條殷享祀之爼豆殷火注火取其明也火疏此韍制殷増以蕙田案此殷祭服之韍飾通典殷禴禘烝嘗亦因虞夏之制王制云春禴夏禘秋嘗冬烝鄭元云此夏殷之法其祭貴肝蕙田案孔子曰殷因於夏禮所損益可知也周因于殷禮所損益可知也殷之祭禮雖畧然以其所因者觀之而證以詩書傳記之所載則畧有可見者凡祭之始莫先於求神記曰殷人先求諸陽樂三闋然後迎牲則詩那之篇可證也迎牲之後當有灌以鬱鬯灌地降神所以求諸陰郊特牲灌尊殷用斚其勺用疏可證也殷之灌在迎牲後無文然記曰周人先求諸陰既灌然後迎牲是周人尚臭故灌在迎牲之前殷人先求陽而後求之陰則灌當在迎牲之後猶周人既奠然後􅌊蕭合羶薌則求諸陽在後也祭祀之正有朝踐饋食九獻之節烈祖之詩曰既載清酤記曰殷尚醴又曰尊以斚則薦獻之禮可知也記曰殷白牡詩曰亦有和羮則薦腥薦熟之禮可知也庸鼓有斁萬舞有斁則合樂之盛可知也六瑚以盛黍稷饋食之禮見矣爼以椇豆以玉薦豆籩之事見矣以至肝以隋祭尸與主人之儀節也我有嘉客則助祭之諸侯也爾祖與享則配祭之功臣也髙宗肜曰則繹祭之明文也韍以火則猶夏致美之意也温恭朝夕執事有恪則猶周清廟不顯不承無斁于人斯之意也葢三代相因雖有損益其綱領節目之大固無甚異焉此可考其文而知其意也右殷廟享五禮通考卷八十五
