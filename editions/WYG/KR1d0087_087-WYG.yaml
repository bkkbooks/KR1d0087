body:
  text: 五禮通考卷七十七刑部尚書秦蕙田撰吉禮七十七宗廟制度書益稷合止柷敔注柷狀如漆筩而有椎合之者投椎其中而撞之敔狀如伏虎背有刻所鼓之止樂詩頌有瞽鼗磬柷圉傳柷木椌也圉楬也圉疏以樂記有椌楬之文與此柷為一故辯之言木椌者明用木為之言柷用木則圉亦用木以木可知而畧之大師注云木柷敔也是二器皆用木也周禮春官小師掌教柷敔注鄭司農云柷如漆筩中有椎敔木虎也瞽矇掌播鼗柷敔禮記樂記聖人作爲鼗鼔椌楬主椌楬謂柷敔也爾雅釋樂所以鼔柷謂之止注柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名所以鼔敔謂之籈注敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名字林云籈以竹長尺也荀子鞉柷拊椌楬似萬物白虎通柷敔乾音也柷敔者終始之聲萬物之所生也陰陽順而復故曰祝承順天地序迎萬物天下樂之故樂用柷柷始也敔終也風俗通禮樂記柷漆桶方畫木方三尺五寸髙尺五寸中有椎上用柷止音爲節書曰合止柷敔陳氏禮書書曰戞擊鳴球合止柷敔明堂位曰揩擊葢柷敔以椌楬爲體椌楬以戞揩擊爲用故椌楬戞揩擊先儒皆謂之柷敔也爾雅曰所以鼔柷謂之止所以鼔敔謂之籈葢鼔柷謂之止欲戒止於其早也鼔敔謂之籈欲修潔於其後也柷方二尺四寸陰也敔二十七齟齬陽也樂作陽也以陰數成之樂止陰也以陽數成之固天地自然之理也聲之所出以虛爲本桐虛而不實故爲琴瑟糠虚而不實故爲搏拊虡以虛然後可設椌以空然後可擊及其止則歸於實焉故敔爲伏虎之形則實而已陳氏樂書堂下樂器以竹爲本以木爲末則管籥本也祝敔末也柷之爲器方二尺四寸深一尺八寸陰始于二四終于八十陰數四八而以陽一主之所以作樂則於衆樂先之而已非能成之也有兄之道焉此柷所以居宫縣之東象春物之成始也敔之爲器狀類伏虎西方之陰物也背有二十七鉏鋙三九之數也櫟之長尺十之數也陽成於三變於九而以陰十勝之所以止樂則能以反爲文非特不至於流而失已亦有足禁過者焉此敔所以居宮縣之西象秋物之成終也荀卿以拊柷椌楬為似萬物柷敔椌楬皆一物而異名荀卿以柷椌離而二之誤矣蕙田案書曰戞擊記曰揩擊漢儒皆以爲柷敔夫戞擊鳴球堂上之樂合止柷敔堂下之樂何得混而同之陳氏禮書以戞擊從注皆爲柷敔樂書又爲之説曰祝敔器也卑而在下戞擊所以作器也尊而在上焉有所擊者在堂下而所以擊之者逺置之堂上乎蔡傳戛擊考擊也其説近是至于明堂位之玉磬揩擊猶虞書之戛擊鳴球也文有順逆焉爾律吕正義八音之中惟木音最爲質樸而木之器曰柷曰敔則樂曲始終之節葢樂勝則流先王同民心而出治道始於質發乎文仍成於質而不敢或過焉故書曰下管鼗鼔合止柷敔樂之始作擊柷以合之樂之將終櫟敔以止之也爾雅註柷形如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊通考云旁開孔内手於中擊之以舉樂案柷之制方二尺四寸深一尺八寸若謂今尺度無乃太大若爲古尺度約以今尺方止一尺九寸四分四釐而深一尺四寸五分八釐而已較其中空實積得容十鬴實一萬二千八百龠據此容積尺度而柷之制爲有本矣今禮部太常所用柷上闊下小狀如斗然以深一尺四寸五分八釐爲度二倍黄鍾之數則一萬二千八百龠之積得上方二尺一寸八分七釐三倍黄鍾之數下方一尺六寸九分零四豪斯制雖上下異數均之即方一尺九寸四分四釐之度也敔爾雅註如伏虎背上有二十七鉏鋙刻以木長尺櫟之通考曰碎竹逆戛之以止樂宋因唐制用竹長二尺四寸析為十二莖先擊其首次三戛齟齬而止案敔制如伏虎古人取爲樂器未知何意或以木音屬巽而巽為風風從虎故象形以爲制歟其背上二十七齟齬者黄鍾九數爲之本而東方木數三三九而二十七此又以律數兼五行而定制者也今定尺度則通體之長爲二尺一寸八分七釐三倍黄鐘之數齟齬之分爲七寸二分九釐黄鐘之數而敔之制亦爲有本矣又禮王制天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之疏曰柷節一曲之始其事寛鼗節一唱之終其事狹是必金聲玉振乃爲全樂之大成也哉禮記樂記治亂以相疏言治理奏樂之時先擊相故云治亂以相蕙田案亂樂之卒章論語所謂關雎之亂是也樂至此則衆音繁會易至于亂故以相爲節所以治之也相字從木恐爲木器今作樂者必有拍板疑其遺制鄭氏以爲即拊非也宋陳用之曰既曰會守拊鼔又曰治亂以相則相非拊也其言是矣右木音之屬周禮春官笙師掌教龡竽笙注鄭司農云竽三十六簧笙十三簧疏先鄭云竽三十六簧笙十三簧者案通卦騐竽長四尺二寸注云竽管類用竹為之形參差象鳥翼鳥火禽火數七冬至之時吹之冬水用事水數六六七四十二竽之長葢取諸此也笙十三簧廣雅云笙以匏為之十三管宫管在左方竽象笙三十六管宫管在中央禮圖云竽長四尺二寸此竽三十六簧與禮圖同禮記月令調竽笙竾簧疏竽者鄭注周禮云竽三十六簧釋名云竽汙也其中汙空笙者鄭注周禮云十三簧釋名云笙生也象物出地所生簧者竽笙之名也氣鼔之而為聲釋名云簧横也於管頭横施之陳氏禮書禮記曰女媧之笙簧世本曰隨作笙儀禮曰三笙一和而成聲周禮笙師掌教吹竽笙爾雅曰大笙謂之巢小者謂之和先儒謂笙列管匏中施簧管端大者十九簧小者十三簧竽三十六簧笙長四尺竽長四尺二寸簧金鐷爲之葢衆管在匏有巢之象故大笙曰巢大者唱小者和小笙曰和後世雅樂和皆二十七簧外設二管不定置謂之義管毎變均易調則更用焉由是定置二管於匏中爲十九簧書曰笙鏞以間笙師祭祀饗食共笙鐘之樂鄭氏曰與鐘相應之笙國語曰金石以動之絲竹以行之則笙鏞雖間作其動之於始則金石而已韓非曰竽者五聲之長故竽先則鐘瑟皆隨竽唱則諸樂皆和葢後世之樂然也蕙田案大者十九簧和無縁得二十七簧二字乃于字之悞耳蕙田案以上竽笙總書益稷笙鏞以間詩小雅賓之初筵籥舞笙鼓周禮春官笙師凡祭祀共其鐘笙之樂注鍾笙與鍾聲相應之笙儀禮鄉射禮笙入立于縣中鄉射禮記三笙一和而成聲注三人吹笙一人吹和儀禮鄉飲酒禮笙入堂下磬南北面立樂南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀燕禮笙入立于縣中奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀燕禮記笙入三成詩小雅南陔序南陔孝子相戒以養也朱子曰此笙詩也有聲無辭白華序白華孝子之潔白也朱子曰笙詩也華黍序華黍時和歲豐宜黍稷也有其義而亡其辭朱子曰亦笙詩也案儀禮鄉飲酒禮鼔瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼔瑟而歌鹿鳴四牡皇皇者華然後笙入立于縣中奏南陔白華華黍南陔以下皆無以考其名篇之義然曰笙曰樂曰奏而不言歌則有聲而無辭明矣所以知其篇第在此者意古經篇題之下必有譜焉如投壺魯鼔薛鼔之節而亡之耳由庚序由庚萬物得由其道也朱子曰此亦笙詩崇丘序崇丘萬物得極其髙大也朱子曰此亦笙詩由儀序由儀萬物之生各得其宜也有其義而亡其辭朱子魚麗後傳案儀禮鄉飲酒及燕禮前樂既畢皆間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也言一歌一吹也然則此六者葢一時之詩而皆爲燕饗賓客上下通用之樂禮記明堂位女媧之笙簧疏帝王世紀云女媧氏風姓承包犧制作始作笙簧樂記弦匏笙簧爾雅大笙謂之巢小者謂之和注列管匏中施簧管端大者十九簧小者謂之和十三簧者鄉射記曰三笙一和而成聲也疏世本云隨作笙禮記曰女媧之笙簧釋名曰笙生象物貫地而生説文云笙正月之音物生故謂之笙有三簧象鳯之身其大者名巢巢髙也言其聲髙小者名和李廵云小者聲少音相和也孫炎云應和於笙瓠匏也以匏為底故八音謂笙為匏簧者笙管之中金薄鐷也笙管必有簧故或謂笙為簧詩王風云左執簧是也大者十九簧以時驗而言也云十三簧者鄭司農注周禮亦云十三簧相傳為然注鄉射記云三笙一和而成聲者後鄭注云三人吹笙一人吹和是也白虎通笙者太簇之氣象萬物之生故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙陳氏樂書古者造笙以曲沃之匏汶陽之篠列管匏中而施簧管端則美在其中鍾而為宫葢所以道逹冲氣律中太簇立春之音也故有長短之制焉有六合之和焉故五經析疑曰笙者法萬物始生道逹隂陽之氣故有長短黄鍾為始法象鳯凰葢笙為樂器其形鳯翼其聲鳯鳴其長四尺大者十九簧謂之巢以衆管在匏有鳯巢之象也小者十三管謂之和以大者唱則小者和也儀禮有之三笙一和而成聲是已大射儀樂人宿縣于阼階東笙磬西面其南笙鐘葢笙艮音也於方為陽鍾兊音也於方為陰周官笙師掌教吹笙共其鍾笙之樂以教祴樂書曰笙鏞以間是鼓應笙之鐘而笙亦應之也眡瞭掌擊笙磬詩曰笙磬同音則磬乾音也與笙同爲陽聲是擊應笙之磬而笙亦應之也笙磬則異器而同音笙鐘則異音而同樂儀禮有衆笙之名而簜在建鼓之間葢衆笙所以備和奏洽百禮豈特應鐘磬而已哉鹿鳴所謂鼓瑟鼓琴吹笙鼓簧應琴瑟之笙也賓之初筵曰籥舞笙鼓應鼓之笙也檀弓孔子十日而成笙歌儀禮歌魚麗笙由庚之類應歌之笙也記曰女媧之笙簧世本曰隨作笙簧庸詎知隨非女媧氏之臣乎黄帝制律以伶倫造鐘以營援則女媧作竽笙以隨不足疑矣李照作巢笙合二十四聲以應律吕正倍之聲作和笙應笙竽合清濁之聲又自制大笙上之太樂亦可謂知復古制矣律吕正義爾雅大笙謂之巢小者謂之和註曰列管匏中施簧管端風俗通云垂作笙以象鳯古稱簫爲鳯簫而笙亦爲鳯笙葢以笙之長短參差亦如排簫然故並稱耳笙與排簫管數之多寡管體之巨細雖不同而倍半相資以爲用者其理則一也笙于古爲匏器其制攒衆管于一匏而共一吹口毎管設簧以取音簧者于管側貼以薄銅葉氣至則戰動成音開出音孔以别長短之度而音之髙下以生復設孔于匏外案某孔則某簧應故詩曰吹笙鼓簧近世易匏以木各管但以竹徑相倣者通其節約畧其長短而無一定之制至于簧數之多寡則傳註所紀其説不一鄭氏詩註曰笙十三簧或十九簧而竽三十六簧周禮註鄭衆曰竽三十六簧笙十三簧又通考載宋李照作巢笙合二十四聲以理揆之其三十六簧二十四簧者乃兼陽律陰吕之聲如排簫之備清濁二均也其十九簧十三簧者乃分陽律陰吕之聲如簫笛之各具一均也今禮部太常所用俱十七管有全用者有空二管或三管不設簧而用十五管或十四管者俗部所用亦十七管或十五管而止用十三管其餘皆不設簧葢去其重複但取一均之聲以備用也又禮部太常所用笙體大而空徑亦大其出音孔至簧度分反短俗部所用笙體小而空徑亦小其出音孔至簧度分反長葢因取聲于容積之分故徑與長相爲贏縮焉案十七簧大笙徑約二分上下毎一笙之内各管空徑不一其自簧口至出音孔分最長第一管七寸五分餘二管七寸餘三管亦七寸餘視二管微歉四管六寸五分餘五管六寸餘六管五寸二分餘七管四寸五分餘八管四寸二分餘九管十管十一管皆四寸上下十二管三寸八分餘十三管三寸六分餘十四管三寸三分微歉十五管三寸二分餘此兩管亦相同十六管三寸餘十七管二寸六分餘此皆工人約畧爲之初未有一定之真度也審其音最長一管應笛之尺字近世皆以笛孔合笙而言故笙之諸音皆取笛聲字名之二管應最低工字三管應低工字四管應低凡字五管應低六字六管應低五字七管應最低乙字八管應低乙字九管應低上字十管應髙上字十一管應上字尺字之間爲勾字十二管應髙尺字十三管應髙工字十四管應髙凡字十五管亦應髙凡字十六管應髙六字十七管應髙五字此髙低字音皆以體之倍半而言非清濁二均之分其取聲之法一管合六管或一管合十二管爲低尺字二管合七管爲最低工字禮部太常樂工省此二管不用故止十五簧三管合八管爲低工字四管合九管爲低凡字五管合十二管為低六字六管合十三管為低五字七管合十四管爲最低乙字禮部太常樂工亦多不用八管合十五管爲低乙字九管合十六管為低上字十管獨用爲髙上字十一管獨用為勾字十二管合十七管為髙尺字十三管獨用為髙工字十四管獨用為髙凡字十六管獨用為髙六字十七管獨用爲髙五字此十七簧大笙立體取音之大槩也十三簧小笙徑約一分有餘毎一笙之内各管徑亦不一其自簧口至出音孔分最長第一管八寸餘二管七寸餘三管六寸五分餘四管六寸餘五管五寸五分餘六管五寸餘七管四寸五分餘八管四寸五分不足九管四寸餘十管三寸五分餘十一管三寸三分餘十二管三寸餘十三管三寸不足審其音一管低尺字二管低工字三管低凡字四管低六字五管低五字六管低乙字七管低上字八管髙上字九管髙尺字十管髙工字十一管髙凡字十二管髙六字十三管髙五字其取聲之法一管合五管或合九管爲低尺字二管合六管為低工字三管合七管爲低凡字四管合九管爲低六字五管合十管為低五字六管合十一管爲低乙字七管合十二管爲低上字八管合十二管為髙上字九管合十三管為髙尺字十管獨用爲髙工字十一管獨用爲髙凡字十二管獨用爲髙六字十三管獨用爲髙五字此十三簧小笙立體取音之大槩也大笙之十五簧于十七簧已爲减二而小笙又少勾字凡字二簧葢勾為低尺可以相代而凡字重出嫌其易淆故復减耳其一笙之内管體長者設簧亦大管體短者設簧亦小易其簧而更施之則或咽或掲皆不成聲葢笙之施簧必隨管體之長短而爲大小即如絲樂之體大者用絃巨體小者用絃細之理也至于簧之硬者應聲微髙㸃以蠟珠則可少下簧之輭者應聲微低不施蠟珠或易以硬簧則可以髙然所差不過半音未若管體長短之分音晰也今欲明製笙之法辨笙之體詳笙之用必一其徑覈其積攷其度正其音一一本之于律吕而後笙之理數可明焉一其徑者使一笙各管之空徑皆同如十二律吕之同徑也覈其積者定衆管之積或用律吕之全或用律吕之半或用律吕幾分之一也攷其度者察某管得某律吕相和之分或得某律吕相和之倍某律吕相和之半也正其音者詳某管之應某律吕某聲字與某管設簧則應某律吕某聲字也葢笙之大小雖殊而爲用則一大笙之空徑二分上下者乃黄鍾八分之一又如此一分之四分之三之管徑也此管積以通分約之乃黄鍾三十二分之七小笙之空徑一分有餘者乃黄鍾八分之一之管徑也其管之長者用本體律吕之倍管之短者用本體律吕之正或本體律吕之半其半管比正管毎下一音亦如律吕之正與倍半之理也其相和取聲無論體之大小管之多寡要皆以本聲立宫而徴聲和之或以正聲爲主而少聲和之取二聲相濟抑揚中聽也其兩管同一聲字而相和者乃宫與少宫商與少商工與髙工凡與髙凡爲兩聲子母相應者也其兩管不同聲字而相和者乃宫與徴商與羽工與乙凡與上之類是兩聲得其相生之序而相和者也若夫兩管之斷不可和者如宫與商商與角工與凡凡與六之類是兩聲相比必甚乖謬而不可和者也是故笙之低尺字以低五字和之者乃濁變徴立宫而宫聲為徴以和之也低尺字以髙尺字和之者即倍變徴以正變徴和之也低工字以低乙字和之者乃下徴立宫而商聲爲徴以和之也低凡字以低上字和之者乃下羽立宫而角聲為徴以和之也低六字以髙尺字和之者乃倍變宫立宫而正變徴爲徴以和之也低五字以髙工字和之者乃宫聲立宫正用徴聲以和之者也低乙字以髙凡字和之者乃商聲立宫而羽聲爲徴以和之也低上字以髙六字和之者乃角聲立宫而少變宫爲徴以和之也髙上字仍以髙六字和之者亦角聲立宫而少變宫為徴以和之也髙尺字以髙五字和之者乃少變徵立宫而少宫為徴以和之也髙聲與低聲相和者乃首音與第八音相和所謂隔八相生也徴之可以和宫者所謂宫生徴也羽之可以和商者所謂商生羽也若夫商之可以和徴者又為徴之生少商皆為首音與第五音相和者也葢各管之徑既同則聲字之度分可定聲字之度分既定則各管之相旋為用自有恊和之妙焉夫簫笛之體起于黄鍾之加倍而笙之體則起于黄鍾之减分加倍者或加八倍或加四倍其所制之管皆與黄鍾一均之聲相應减分者或用黄鍾四分之一或用黄鍾八分之一所制之管亦皆與黄鍾一均之聲相應若應大吕一均者大笙則取黄鍾八分之一又如此一分之四分之二之管爲本即三十二分之六也小笙則取黄鍾六十四分之七之管爲本或不易其體但用點簧之法以髙其音亦可備陰吕一均之用然其聲雖協于大吕而其數並起于黄鍾此黄鍾所以尤爲竹音之本也蕙田案以上笙禮記樂記竽瑟以和之韓非子竽者五聲之長風俗通案禮記竽管三十六簧也長四尺二寸今二十三管陳氏樂書昔女媧氏使隨裁匏竹以為竽其形參差以象鳥翼火類也火數二其成數則七焉冬至吹黄鍾之律而間音以芋冬則水王而竽以之則水噐也水數一其成數則六焉因六而六之則三十六者竽之簧數也因七而六之則四十二寸者竽之長數也月令仲夏調竽笙淮南子謂孟夏吹竽笙葢不知周官笙師掌教吹竽笙則竽亦笙類也以笙師教之雖異器同音皆立春之氣也樂記曰聖人作爲鼗鼓椌楬塤篪然後爲之鐘磬竽瑟以和之是樂之倡始者在鼗鼓椌楬壎篪其所謂鐘磬竽瑟者特其和終者而已韓非子曰竽者五聲之長竽先則鐘瑟皆隨竽倡則諸樂皆和豈聖人制作之意哉説文曰竽管三十六簧象笙以竽宫管在中故也後世所存多二十三管具二均聲焉樂法圖曰吹竽有以知法度竽音調則度數得矣蕙田案以上竽右匏音之屬詩小雅鹿鳴吹笙鼓簧傳簧笙也陳氏禮書詩曰吹笙鼓簧又曰並坐鼓簧又曰左執簧又曰巧言如簧記曰女媧之笙簧觀此宜若簧非笙也先儒皆以爲笙中之簧其説拘矣漢武内傳鼓振靈之簧神仙傳王遥有五舌竹簧然經無明説豈亦古之遺制歟蕙田案以上簧附詩􅆁風簡兮左手執籥傳籥六孔小雅鼓鐘以籥不僣周禮春官籥師掌教國子龡籥注籥舞者所吹笙師掌教龡籥注籥如篴三孔鄭氏鍔曰籥三孔其中則中聲其上下二孔則聲之清濁所由生爾雅大籥謂之産其中謂之仲小者謂之箹注籥如笛三孔而短小廣雅云七孔孔疏籥樂器名周禮笙師掌教吹籥鄭注云籥如篴三詩邶風云左手執籥毛傳云籥六孔所見異也風俗通籥樂之器竹管三孔所以和衆聲也陳氏禮書籥三孔主中聲而上下之律吕於是乎生命之曰籥以黍籥之法在是故也羽舞皆執籥以聲音之本在是故也詩曰左手執籥春秋書仲遂卒于垂壬午猶繹萬入去籥公羊曰去其有聲者置其無聲者則吹籥而舞可知廣雅曰籥七孔毛萇曰籥六孔鄭康成曰籥如笛三孔郭璞曰籥三孔而短當從郭鄭之説爲正也陳氏樂書籥之大者其聲生出不窮非所以爲約也小者其聲則約而已若夫大不至於不窮小不至於太約此所以謂之仲也然則鄭郭三孔之籥豈其中者歟毛萇六孔之籥豈其大者歟蕙田案以上籥周禮春官籥章掌豳籥注鄭司農云豳籥豳國之地竹豳詩亦如之𤣥謂豳籥豳人吹籥之聲章者疏先鄭云豳籥豳國之地竹豳詩亦如之後鄭不從案下文吹豳詩吹豳雅吹豳頌更不見豳籥則是籥中吹豳詩及雅頌謂之豳籥何得有豳國之地竹乎故後鄭云豳人吹籥之聲章聲章即下文豳詩之等是也蕙田案豳籥即笙師籥師所教之籥後鄭之説是又案以上豳籥禮記明堂位葦籥伊耆氏之樂也注籥如笛三孔籥疏葦籥謂截葦為方氏慤曰葦籥者以葦為籥未有截竹之精故也陳氏樂書易曰震爲萑葦爲蒼筤竹爾雅曰葦醜艻郭璞曰其類皆有艻秀又曰葭蘆郭璞曰葦也則葦籥竹籥皆震音也葢太極元氣函三為一行於十二辰而律吕具矣始動於子參之于丑得三而籥之為器本於黄鍾之籥竅而三之所以通中聲而上下之律吕所由生也古之人始作樂器葦籥居其先震為六子之首籥為衆樂之先其斯以為稱始乎葦伊耆氏施於索饗也成乎竹周人以之本始農事也或以伊耆爲堯然堯時八音已具豈特葦籥土鼓而已哉蕙田案以上葦籥附書益稷簫韶九成傳言簫見細器之備詩商頌有瞽簫管備舉周禮春官小師掌教簫注簫編小竹注疏案通卦騐云簫長尺四寸云簫管形象鳥翼鳥為火火成數七生數二二七一十四簫之長由此廣雅云簫大者二十四管小者十六管有底三禮圖云簫長尺四寸頌簫長尺二寸此諸文簫有長短不同古者有此制也瞽矇掌播簫注播謂發揚其聲笙師掌教龡簫禮記樂記從以簫管爾雅釋樂大簫謂之言小者謂之筊注大簫編二十三管長尺四寸小者十六管長尺二寸簫一名籟以疏此别簫大小之名也風俗通云舜作簫其形參差象鳯翼十管長二尺博雅曰簫大者二十三管無底小者十六管有底其大者名言李廵曰大簫聲大者言言也郭云編二十三管長尺四寸其小者名筊李廵曰小者聲揚而小故言筊筊小也郭云十六管長尺二寸簫一名籟又通卦驗云簫長尺四寸其管數長短雖異要是編小竹管為之耳陳氏禮書簫大者二十四管小者十六管書於簫言樂成詩於簫言備舉禮凡言簫多在笙竽之後則簫之奏葢後於笙矣莊周曰人籟比竹荀卿曰鳯凰于飛其翼若笙其聲若簫葢簫比竹為之其狀鳯翼其聲鳯聲言與籟皆其異名也陳氏樂書周官之於簫教之小師播之瞽矇吹之笙師則簫之為樂其器細其音肅必待衆職而後致用堂下之樂備舉之奏也蔡邕曰簫大者二十四管無底小者十六管有底古有洞簫無底豈其大者歟然則邕時無洞簫小者矣葢簫之為管長則濁短則清以蠟蜜實其底而增損之然後其聲和矣古者造簫之法或以玉或以竹以玉若梁州記得玉簫是也以竹若丹陽記有慈姥山生簫管竹是也今制盡以律管協律取聲第一管黄鍾二管大吕三太簇四夾鍾五姑洗六中吕七蕤賓八林鍾九夷則十南吕十一無射十二應鍾十三黄鍾清十四大吕清十五太簇清十六夾鍾清律吕正義古稱簫曰鳯簫風俗通曰舜作簫其形參差以象鳯翼然則古之所謂簫者實排簫也攷排簫之制其來最古律吕十二管備具其中史稱伶倫截管以聽鳯凰之鳴雌雄各六金石八音由此而定所以簫韶九成而以簫爲主也上古排簫之制寖失其傳者葢因近代不用律吕損益倍半之法故排簫别爲一器而與律吕不相交渉惟朝賀郊祀大樂中用之不過較工尺以備器數耳其制則十六管為一具長者張兩旁參差漸短若羽翼然其用單吹無旁出孔其管之最長者得今尺九寸五六分上下其次八寸四五分上下遞至最短則四寸餘十六管之徑亦微不同樂工相傳謂最長第一管爲合字依次漸髙此時用排簫之大畧也近代皆以琴之一絃定笛之合字得徴分者為黄鍾之宫案今尺七寸二分九釐之黄鍾為古尺九寸之黄鍾則今尺九寸之黄鍾實與今尺九寸一分之倍夷則相近而今尺九寸之黄鍾應笛之髙凡字與合字相近或黄鍾為合字又為此乎然既不能定黄鍾之真度其又何以知黄鍾之正聲為合字也夫古人制禮作樂極其精微㫁制裁成咸有深意况排簫為諸管樂之首彚聲音清濁之大成豈可不以律吕定其凖則耶論排簫之制大之亦可小之亦可大之則用黄鍾倍積或二倍或三倍或四倍各具本體所生之十二律吕小之則用黄鍾半積或幾分之幾亦各具本體所生之十二律吕但同其徑加二倍律二倍吕共成一十有六則皆可以取音而備用然推原古制必用十二律吕之正加以二倍律二倍吕始為適中也今以十二律吕正聲排簫之制言之陽律陰吕平分二翼左則用黄鍾之律為濁均之宫以太簇姑洗蕤賓夷則無射爲濁宫之商角變徴徴羽右則用太吕之吕爲清均之宫以夾鍾仲吕林鍾南吕應鍾爲清宫之商角變徴徴羽其變宫若用黄鍾大吕之半則音太髙而諸樂難和故取二變宫于二正宫之前以倍無射為黄鍾宫之變宫以倍應鍾為大吕宫之變宫又取二下羽于二變宫之前以倍夷則爲黄鍾宫之下羽以倍南吕為大吕宫之下羽此所以備旋宫轉調之用而爲諸樂之綱領也按五聲二變旋宫之法以某律吕某聲字立宫位則當二變者不用而立羽位者主調今用黄鍾大吕各立一宫故取倍夷則倍南吕為下羽以主調也夫夷則南吕無射應鍾實本均徴羽之聲但倍之而用于宫聲之前則爲變宫下羽此正古人宫逐羽音之義也以黄鍾宫之半應變宫之理推之正夷則乃倍夷則之半正夷則爲黄鍾宫之徴而倍夷則爲黄鍾宫之下羽則是下羽之半變而為正徴矣正無射乃倍無射之半正無射為黄鍾宫之羽而倍無射為黄鍾宫之變宫則變宫之半亦變而為正羽矣此即正黄鍾宫之半變而爲變宫之理也唐宋以來皆以四清聲為黄鍾大吕太簇夾鍾之半故陳暘以為靡靡之音謂其過髙也今于正律之外用四倍律則宫聲居中而無過髙之譏矣同徑之十六管分隂陽二均徑各二分七釐四豪二絲凡樂器皆以今尺言其左以黄鍾之律宫聲工字立低音均之主爲第三管長七寸二分九釐而以倍夷則之律下羽低上字為第一管長九寸一分零二豪以倍無射之律變宫低尺字為第二管長八寸零九釐其第三管則黄鍾之律宫聲工字次則以太簇之律商聲低凡字為第四管長六寸四分八釐以姑洗之律角聲低六字爲第五管長五寸七分六釐以蕤賓之律變徴低五字為第六管長五寸一分二釐以正夷則之律徴聲低乙字爲第七管長四寸五分五釐一豪以正無射之律羽聲低上字爲第八管長四寸零四釐五豪此排簫左翼之八管也案正無射之羽聲上字較之倍夷則羽聲上字實當為清羽髙上字但倍南吕較于倍夷則為清羽髙上字故正無射轉而為濁均之羽聲髙上字而正應鍾又為清均羽聲之最髙上字也其右以大吕之吕清宫髙工字立髙音均之主爲第三管長六寸八分二釐六豪而以倍南吕之吕下羽髙上字爲第一管長八寸六分四釐以倍應鍾之吕變宫髙尺字爲第二管長七寸六分八釐其第三管則大吕之吕清宫髙工字次則以夾鍾之吕清商髙凡字為第四管長六寸零六釐八豪以仲吕之吕清角髙六字為第五管長五寸三分九釐三豪以林鍾之吕清變徴髙五字為第六管長四寸八分六釐以正南吕之吕清徴髙乙字為第七管長四寸三分二釐以正應鍾之吕清羽髙上字為第八管長三寸八分四釐此排簫右翼之八管也觀此二均聲字具備宫調遞遷正變互易旋轉用之無所不可然黄鍾大吕自統一均陽律陰吕各從其類所謂陰陽分用而不相紊者此也又曰律吕長短雖見于史志而簫笛尺寸未有定制簫即古之所謂長笛相傳始于漢丘仲唐人有謂之尺八者今之簫或其遺制耶晉書載荀朂所造長笛用角律長者八之短者四之空中實容長者十六然所作皆逾二尺五六寸或至三四尺若謂如今之簫笛則吹者手不及按其孔若謂如十二律吕管然則又止有長短而圍徑大小不載焉及觀今樂簫笛所生聲字未嘗不備旋宫轉調之義其長短圍徑雖工人未案律度初未有長逾二尺者葢必如是而後適于用也凡樂之大原出于律吕况簫笛竹音尤當以律吕爲本黄鍾元聲之積加分减分比例所生同形諸管既得聲應十二律吕之正矣其餘律吕之加分减分仍得應于本律本吕之聲者惟八倍與八分之一也八倍黄鍾之管三分損益所生同徑之十二管仍爲各律各吕之八倍審其音亦與十二律吕相協即十二律吕之同形大體管也若以此八倍黄鍾為全分之長從下至上案本管十二律吕之分各開一孔乃與律吕本音不甚相協案清濁二均開孔其聲亦不相應葢八倍律吕之十二管各應其本律本吕之聲者其形同而生聲之理又同如以一管案十二律吕之分開孔氣自一孔傍出難同通管直出之音故取分雖同而生聲之理則異也古人之製簫笛也備七音于一管寓十二律吕于其間分清濁旋宫調非得其變通則不可用若取黄鍾元聲加分所生同形諸管以其陽律陰吕各自所得度分相併折中而設諸孔始得協音韻之正而備聲字之用焉案時用簫通長一尺七寸有餘徑五分上下通長之上設出音孔為低尺字出音孔上第一為工字孔第二為凡字孔第三為六字孔第四為五字孔第五為乙字孔第六後出爲髙尺字孔此分得第一工字孔之半獨上字無孔其取上字則以後出尺字孔並六字孔爲低上字以乙字孔併工字孔凡字孔為髙上字此時用簫立體取音之大槩也細推其理其長一尺七寸有餘者得黄鍾元聲加分所生管體律吕相和之倍分也其徑五分上下者得黄鍾元聲加分所生管體之徑度也其宫調則第一孔立宫位而通長為下羽亦得宫逐羽音之義也其通長為下羽故出音孔得變宫之位其第一孔立宫位故第二孔得商位第三孔得角位第四孔得變徴位第五孔得徴位而第六後出孔仍得變宫之位也論其音則出音孔與後出孔相應論其分則後出孔得第一孔之半其本體正分與半分之比即如律吕正分與半分之比也其設出音孔者因出音孔以上諸孔必得出音孔而音始協也其不設上字孔者因簫笛之一字分上字分尺字分皆得全體所用律吕位分之半乙字分得通長之半上字分得出音孔之半後出尺字分得第一孔之半如案此三孔本分取聲必將本孔獨開餘孔皆閉音始不訛若本孔以下諸孔全開則音為以下諸孔所掣比本分之音俱少下故歴來簫笛設乙字孔比本分稍上而在乙字分上字分之間葢為取音與以下諸孔同例也乙字孔既開于本分之上故上字無孔以其與乙字尺字位分甚近生聲易淆且孔宻而慮其難按也至于後出尺字仍于本分設孔者因其取音將以下諸孔皆閉而獨開此孔也其取低上字于髙尺字併六字者簫之通長應上字乃本體羽聲律吕相和倍之之分今六字孔得本體角聲律吕相和之分後出髙尺字孔得本體宫聲律吕之半相和之分以此二分相併適合本體羽聲陽律倍之之分也其取髙上字于工字凡字合以乙字者葢借工字凡字以代髙工髙凡而合以乙字也簫之工字孔為本體宫聲律吕相和之分凡字孔爲本體商聲律吕相和之分乙字孔為本體徴聲律吕相和之分今取髙工字則用商聲律吕相和之半取髙凡字則用角聲律吕相和之半以此二分相併折中復與徴聲律吕相和之分相併折中適合本體宫聲陽律之半在後出孔髙尺字之下故為髙上字也借工字凡字之正聲者所以代髙工髙凡之用欲窮其理必推本于髙工髙凡而後明也夫簫笛之生聲原在中空容積之分故開孔取音必合本體律吕之度而音始和是知古人審音制器截其有餘以補不足務取聲調之協與備得以旋宫而變化無窮焉今制簫以八倍黄鍾之積為凖則以八倍黄鍾之徑爲徑其本體黄鍾大吕相和之分立出音孔上第一孔之位聲應黄鍾之律宫聲工字其通長得夷則南吕相和倍之之分聲應倍夷則之律羽聲上字因其本體黄鍾大吕相和之分聲應黄鍾之宫因名之曰黄鍾簫以四倍黄鍾之積為凖則以四倍黄鍾之徑為徑其本體黄鍾大吕相和之分立出音孔上第三孔之位聲應姑洗之律角聲六字其通長得姑洗仲吕相和倍之之分亦應倍夷則之律羽聲上字因其本體黄鍾大吕相和之分聲應姑洗之角律而通長又爲姑洗仲吕相和倍之之分因名之曰姑洗簫黄鍾簫與姑洗簫皆應黄鍾陽律一均之聲而姑洗簫音韻清和于新定排簫之黄鍾一均尤為相協葢古長笛皆用角律今用四倍黄鍾之體正所以用姑洗角律之音四倍黄鍾大吕相和之分立于角位而生簫徑實爲一管之主其通長為四倍姑洗仲吕之倍即八倍角律角吕兩相和以成者故四倍宫積之音又成八倍角律之體也夫八倍四倍黄鍾之管所制簫體既應排簫之陽律一均矣然則排簫之陰吕一均其將何以和之葢八倍黄鍾之管得聲應黄鍾之律四倍黄鍾之管得聲應姑洗之律其制為簫也用本體陽律之分和以隂吕皆得應黄鍾一均之聲則七倍黄鍾之管得聲應大吕之吕三倍半黄鍾之管得聲應仲吕之吕者以之為簫而用其本體陽律之分和以隂吕其得聲應大吕之一均有必然已以七倍三倍半黄鍾之積立一簫之凖其定分取音用正用倍一如八倍四倍之法則排簫之陰吕一均得相和而為用矣夫用七倍黄鍾之積即如用八倍大吕之積其本體黄鍾大吕相和之分得應大吕之宫故名之曰大吕簫用三倍半黄鍾之積即如用四倍大吕之積其本體黄鍾大吕相和之分得應仲吕之吕而通長又為八倍角吕之體故名之曰仲吕簫以上諸簫之制實本于排簫排簫備二均一十四宫五十六調而爲管者一十有六簫亦各具五聲二變合律吕陰陽之分而爲管者一故排簫一律一吕各為一聲簫則一孔一聲而兼一律一吕之體其開孔取音皆有一定之位分而不得以意為增損于其間要之竹音之樂必以黄鍾元聲之實積為主大者八之小者四之而長短周徑隨焉八之四之即四倍八倍之謂皆指其實積而言也若不知倍其實積而徒倍律吕之長則必至于過長而不可用矣明于此義然後以之制體而有其本以之取聲而得其全也蕙田案以上簫詩小雅何人斯仲氏吹篪周禮春官笙師掌教吹篪注鄭司農云篪七空九疏廣雅云篪八空禮圖云空司農云七空盖寫者誤禮記月令調竽笙竾簧音義竾音池本又作篪同爾雅大篪謂之沂注篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二寸廣雅云八孔釋疏李廵曰大篪其聲非一也孫炎曰篪聲悲沂悲也名曰篪啼也聲如嬰兒啼鄭司農注周禮云篪七空葢不數其上出者故七也風俗通案世本蘇成公作篪管樂十孔長尺一寸陳氏樂書篪之為器有底之笛也大者尺有四寸陰數也其圍三寸陽數也小者尺有二寸則全於陰數要皆有翹以通氣一孔上達寸有二分而横吹之或容覆或潜伏篪爲不齊者也周官笙師教吹塤篪詩曰伯氏吹壎仲氏吹篪又曰天之牖民如壎如篪是壎篪異器而同樂伯仲異體而同氣故詩人取以况焉世本以篪爲管沈約非之當矣律吕正義爾雅大篪謂之沂注以竹為之長尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二寸廣雅云八孔周禮注篪七空宋李宗諤樂纂云横笛小篪也又有觜者謂之義觜笛今横笛皆去義觜義觜即翹也是上出孔有翹者名篪無翹者即笛二器葢相似又湖廣寳慶府學校志載以竹為之長尺四寸闊三寸三分一孔上出五孔向外一孔向内一孔在末節共八孔後一孔黄鍾清律以六字應凡吹六字止開此孔餘皆閉第二孔南吕以工字應凡吹工字此孔與下第三孔底一孔皆開餘俱閉第三孔林鍾以尺字應凡吹尺字此孔與下第二孔底一孔皆開餘皆閉第四孔仲吕以上字應凡吹上字此孔與下一孔底一孔俱開餘皆閉第六底孔太簇以四字應凡吹四字止開此孔餘皆閉惟黄鍾律以合字應六孔皆閉案寳慶志所載孔數爲七計吹口共八而用法則遺一又李文察吹法云籥篪笛管皆一孔兼三音全在口唇之俯仰吹氣之緩急夫管籥諸器一孔之聲尚不能兼清濁况于口唇俯仰吹氣緩急之間而謂一孔兼三音是未探聲律之本而爲此遷就塗飾之説可知矣案今禮部太常所用篪徑約九分上下體長雖一尺四寸而吹口至管末止九寸餘其管末設底底中心開孔近底又並開二小孔如簫笛之出音孔計此孔與吹口共八自下遞上命之則底孔爲第一出音孔為第二向外最下一孔為第三次上為第四次上為第五次上為第六最上向内一孔為第七至于諸孔逺近則管末第一至出音第二其分甚近第二至第三其分獨逺第三至第四第四至第五第五至第六其度均而第六至向内第七第七至吹口此二分亦逺然皆未案律吕相生之度也詢之樂工謂底孔為合字向外最下一孔為四字次二為上字次三爲尺字次四爲工字向内最上一孔爲六字自吹口出凡字獨遺乙字與寳慶志所載諸孔聲字率皆不同至于命孔又皆以笛言及較其全半所應則管末與向外第三孔為全半之分審其音底孔之聲應簫之上字笛之凡字實非合字而向外第三孔亦應簫之上字笛之凡字其餘諸孔與簫笛皆不甚協案爾雅注篪長尺四寸圍三寸夫圍三寸則徑為九分有餘然篪設底其中空之圍不易量此謂三寸者或篪之外周乎若篪之外周三寸則中空徑必小于九分而在八分九分之間矣夫四倍黄鍾管之徑四分三釐五豪倍之得八分七釐乃與時用篪徑相侔是為三十二倍黄鍾管之徑也三十二倍黄鍾管之徑比四倍黄鍾管之徑大一倍其長比四倍黄鍾管之長亦大一倍故得聲與四倍黄鍾管同應姑洗之律四倍黄鍾管徑四分三釐五豪長一尺一寸五分七釐二豪聲應姑洗之律今三十二倍則自四倍復加以八倍故徑與長比四倍之徑與長亦加一倍而所應聲字為同也是故此篪用三十二倍黄鍾管之徑為徑而通長與各孔則用三十二倍黄鍾管之律吕相和之分因其本體所生聲字與四倍黄鍾之管同故制為篪亦得與姑洗簫姑洗笛相應而協排簫陽律一均之聲字因名之曰姑洗篪至于協陰吕一均之篪則用二十八倍黄鍾管為體葢二十八倍黄鍾管體為三倍半黄鍾管之八倍而徑與長皆爲三倍半黄鍾管之倍故所生聲字與三倍半黄鍾之管同而與仲吕簫仲吕笛相應為用因名之曰仲吕篪要之篪或上古之笛而笛或爲篪之變制法皆横吹然篪尤為雅樂之要器必使協于律吕始備旋宫轉調之用而可以宣大樂之和焉蕙田案以上篪周禮春官笙師掌教龡篴注杜子春讀篴為蕩滌之滌今時所吹五空竹篴風俗通笛者滌也所以蕩滌邪穢納之于雅正也陳氏禮書周禮笙師掌教篴杜子春曰竹篴五孔馬融笛賦稱此器出於羗笛舊四孔京房加一孔以備五音又風俗通曰漢武帝時丘仲作笛長尺四寸然漢以前固有笛矣但尺四寸者丘仲所作耳後世有長笛世傳蔡邕避難江南宿於柯庭之館仰盼竹椽曰是良竹也取以為笛竒聲獨絶一説邕經會稽髙遷亭見屋椽竹東間第十六竒為笛取用果有聲有短笛今樂府短笛尺有咫有横笛小篪也梁横吹曲日下馬吹横笛有義觜笛如横笛而加觜西凉樂也有七孔者今大樂雅笛七孔有八空者今有横笛八空皆適一時之所造然也笛一作篴篪一作䶵陳氏樂書周官笙師掌教吹籥簫篪篴管五者皆出於笙師所教無非竹音之雅樂也蔡邕曰形長尺圍寸無底有穴今亡大抵管笛一法爾唐制尺八取倍黄鍾九寸為律得其正也漢丘仲笛以後一穴為商聲晉荀勉笛法以後一穴為角謂於九寸穴上開也今太常笛從下而上一穴為太簇半竅為大吕次上一穴為姑洗半竅為夾鍾次上一穴為仲吕次上一穴為林鍾半竅為蕤賓次上一穴為南吕半竅為夷則變聲為應鍾謂用黄鍾清與仲吕雙發為變聲半竅為無射後一穴為黄鍾清中管起應鍾為首為宫又次上穴大吕為商又次上穴夾鍾為角又次上穴仲吕為變徴又次上穴蕤賓為正徴又次上穴夷則為羽變宫為無射謂後穴與第三穴雙發是也如此即不用半竅謂十二律用兩笛成曲也律吕正義今之横笛古稱横吹樂府有鼓角横吹曲亦名短簫鐃歌葢軍中馬上之樂故笛與管皆云起自北方夫曰横吹又曰短簫則非丘仲之長笛可知矣宋李宗諤樂纂云横笛小篪也有觜者謂之義觜笛今之笛皆横吹而無義觜是或篪之變制乎其音每髙于簫由于本體之分短于簫也夫欲攷笛制必推本于黄鍾方為有據然而舍今時用笛則亦無所取証焉今笛空徑四分上下自吹口至出音孔得一尺少歉自吹口右盡通長則一尺二寸有餘出音孔與通長之間復有兩孔其出音孔之上第一為工字孔第二為凡字孔第三為六字孔第四為五字孔第五為乙字孔第六為髙尺字孔其取上字亦以第三六字孔併第六髙尺字孔為低上字以第一工字孔第二凡字孔併第五乙字孔爲髙上字此今笛立體取音之大槩也即其本體而論出音孔上第一孔為工字故出音孔爲尺字出音孔外兩孔一應髙上字一應低上字而通長為乙字以其應律吕而言出音孔上第一孔應夷則之律徴聲乙字第二孔應無射之律羽聲上字第三孔應半黄鍾之律變宫尺字第四孔應黄鍾之律宫聲工字第五孔應太簇之律商聲凡字第六孔應蕤賓之律變徴五字出音孔亦應蕤賓之律變徴五字出音孔外兩孔其分長者應姑洗之律角聲六字其分短者應仲吕之吕清角髙六字而通長應太簇之律商聲凡字論其相應則通長與第五孔同聲出音孔與最上第六孔同聲論其取分則第四孔得通長之半最上第六孔得第一孔之半其乙字孔亦取于乙字分上字分之間攷其體正與四倍黄鍾之管相侔簫之用四倍黄鍾者實用八倍姑洗仲吕角音之義古人所謂長者八之也今横笛爲短簫則所謂短者四之非用四倍姑洗仲吕之角音乎以四倍黄鍾之積為凖故以四倍黄鍾之徑為徑其諸孔皆以四倍黄鍾所生律吕之分為本其本體黄鍾大吕之分則為此笛之出音孔外二孔之度得黄鍾之分者聲應姑洗之律得大吕之分者聲應仲吕之吕然此二分雖各設一孔實皆應于角音之分亦即一律一吕相和之理也此笛之體與姑洗簫同得四倍黄鍾之徑故生聲取分得以互相應和為用如簫之工字孔應黄鍾之律為四倍黄鍾管夷則南吕相和倍之之分其聲即與本體無射應鍾相和之分相應而此笛之五字孔即四倍黄鍾管無射應鍾相和之分亦應黄鍾之律故簫之工字孔與笛之五字孔相應也簫之凡字孔爲四倍黄鍾管無射應鍾相和倍之之分笛之通長乙字亦四倍黄鍾管無射應鍾相和倍之之分故簫之凡字孔與笛之乙字孔相應也簫之六字孔為四倍黄鍾管黄鍾大吕相和之分而笛之出音孔外兩孔為上字者正四倍黄鍾管之黄鍾大吕分也簫之五字孔笛之出音尺字孔皆四倍黄鍾管太簇夾鍾相和之分故此二聲相應也至于簫之乙字分應于笛之工字孔此乙字不言孔而言分者簫本體取乙字孔于乙字分上字分之間而乙字分上字分皆為伏孔今合于笛而言必詳明其分而理始著也皆爲四倍黄鍾管姑洗仲吕相和之分故簫之乙字與笛之工字相應簫之上字分應于笛之凡字孔皆為四倍黄鍾管蕤賓林鍾相和之分故簫之上字與笛之凡字相應簫之後出尺字孔應笛之六字孔皆為四倍黄鍾管夷則南吕相和之分故簫之尺字與笛之六字相應至此則簫之孔已盡而笛之五字孔為四倍黄鍾管之無射應鍾相和之分者實又為簫之髙工字分焉葢笛之與簫取音之理本一但設孔而命名者不同初不可以名之不同而遂以為音之異也此笛與姑洗簫同為四倍黄鍾所生故名之曰姑洗笛其為用也亦與姑洗簫同協排簫陽律一均之聲字焉若夫協排簫陰吕一均之聲字者亦用三倍半黄鍾之管立體案法取音名之曰仲吕笛與仲吕簫相協爲用要之黄鍾加分之同形管簫體得其本管律吕之倍與正而笛得其本管律吕之正與半其倍半正聲相應一如律吕之倍半正聲相應葢緣其徑之同故得其聲之相應為凖也蕙田案以上邃書益稷下管詩商頌那嘒嘒管聲傳嘒嘒然和也周禮春官大司樂孤竹之管於地上之圜丘奏之注孤竹竹特生者謂疏云孤竹竹特生者若嶧陽孤桐孫竹之管於澤中之方丘奏之注孫竹竹枝根之末生者子疏案詩毛傳云枝幹也幹即身也以其言孫若孫然如枝根末生者陰竹之管於宗廟之中奏之注陰竹生於山北者北琉爾雅云山南曰陽山曰隂今言陰竹故知山北者也小師掌教管注鄭司農云管如箎六孔者疏案廣雅云長尺圍寸八孔無底八孔葢傳冩誤當從六孔為正也瞽矇掌播管注播謂發揚其音笙師掌教歛管儀禮燕禮記下管新宫禮記明堂位下管象爾雅釋樂大管謂之簥其中謂之小者謂之篎注管長尺圍寸併漆之有底賈氏以為如篪六孔云疏别管小大之名也李廵云聲髙大故曰簥小師注管如笛形小併兩管而吹之今太常樂官有之是也白虎通管艮音也風俗通案詩云嘒嘒管聲簫管備舉禮樂記管漆竹長一尺六孔十二月之音也物貫地而牙故謂之管尚書大傳舜之時西王母來獻其白玉琯昔章帝時零陵文學奚景於冷道舜祠下得生白玉管知古以玉爲管後乃易之以竹耳夫以玉作音故神人和鳯凰儀也陳氏禮書鄭康成曰管如笛而小併兩而吹之今大予樂官有焉廣雅云管象簫長尺圍寸八孔無底夫併兩而吹之固象簫矣管或作琯則古者之管有以玉爲之也傳稱西王母獻玉琯陳氏樂書樂以木爲末以竹爲本古者以侯氣律管截而吹之濁倍其聲爲堂下之樂頭管所以和衆樂之聲以其探本故也又曰禮記文王世子曰登歌清廟下管象武達有神興有德郊特牲曰歌者在上匏竹在下貴人聲也仲尼燕居曰升歌清廟示德也下而管象示事也祭義曰昔周公有勲勞於天下成王賜之重祭升歌清廟下而管象燕禮大射曰升歌鹿鳴四牡皇皇者華下管新宫葢周之升歌不過清廟鹿鳴四牡皇皇者華下管不過象武新宫則舞升歌下管之詩雖不經見之歌以示德管以示事一也德成而上歌以詠之於堂上事成而下管以吹之于堂下豈非以無所因者爲上有所待者爲下耶爾雅大管謂之簥中謂之小者謂之篎葢其狀如篪笛而六孔併兩而吹之其所主治相爲終始所以道隂陽之聲十二月之音也女媧始爲都良管以一天下之音爲班管以合日月星辰之㑹帝嚳又吹笭展管則管為樂器其來尚矣至周而大備教之於小師播之於瞽矇吹之于笙師辨其聲用則孤竹以禮天神孫竹以禮地􅅘陰竹以禮人鬼凡各從其類故也管或作筦詩曰磬筦將將是也或作琯傳稱白玉琯是也廣雅曰管象簫長八寸圍寸八孔無底豈以後世之制爲言歟律吕正義頭管之制未詳創自何時或名􅓋篥始于蘆管與横笛皆起羗中謂之羗笛羗管馬融賦亦有笛從羗起之言然攷長笛實為今之簫而管之見于經書者未必如今之頭管詩曰嘒嘒管聲記曰下管象武葢古以律吕管音先諸樂其所謂管即排簫之管也唐宋而後管色之名始見史志唐人紀琴以管色定絃宋乾德中和峴言樂器中有乂手笛與雅音相應足以協旋宫之法亦可通八十四調長九寸其竅有六左四右二請名拱宸管是或頭管之制所由起耶案古之管籥一管為一聲鐘磬亦然後世一管數孔則兼數管之用宋史燕樂志載黄鍾用合字大吕太簇用四字夾鍾姑洗用乙字夷則南吕用工字無射應鍾用凡字各以上下分爲清濁其仲吕蕤賓林鍾不可以上下分仲吕用上字蕤賓用勾字林鍾用尺字其黄鍾清聲用六字大吕太簇夾鍾清聲用五字而以上下緊别之緊五者夾鍾清聲也今時用頭管共有九孔樂工相傳取音為合四乙上勾尺工凡六五髙乙髙上其通長為合最下第一孔為四第二孔為乙第三孔爲上第四孔後出為勾第五孔為尺第六孔為工第七孔爲六第八孔後出爲五第九孔最上為髙乙帶髙上獨無凡字孔分如取凡字則借工字第六孔髙吹之或借六字第七孔低吹之其假聲字之法則又以哨巧借為髙下然終不如簫笛之能轉調其或轉調則必易哨葢哨薄則輭輭則聲低哨厚則硬硬則聲髙哨長而聲亦低哨短而聲亦髙即如笙簧硬輭長短之分聲字也審哨之音哨得笛之上字者管之通體始得合字哨得笛之尺字則管之通體得四字哨得笛之工字則管之通體得乙字宋志所載與時用管所傳聲律大槩相同惟上三孔有異又凡附前一律而同出于一孔者名為中管故宋仁宗御製樂髓新經于十二宫調内除太簇姑洗蕤賓南吕應鍾皆為中管不用而定爲七宫二十八調也今之頭管實有大小兩種大者禮部太常並雜樂所用小者乃吳中所制隨歌曲與笙笛相合爲用者也大管之徑三分不足二分有餘長六寸稍餘小管之徑二分稍餘長五寸六分餘夫大管之徑似乎黄鍾之徑其長則與夾鍾之分相侔而小管之徑似乎黄鍾半積同形管之徑其長則又似乎黄鍾半積同形管之黄鍾大吕相和之分也大管之孔九取音爲十二乃合四乙上勾尺工凡六五髙乙髙上之十二字小管之孔八取音爲九乃合四乙上尺工凡六五之九字葢因大管有勾字孔無凡字孔取凡字于工字六字兩孔仍取髙乙髙上兩字于最上一孔而小管無勾字孔有凡字孔既取凡字于本孔其最上一孔又不兼取兩字故小管聲字之减于大管即如十三簧小笙之减于十七簧大笙也諸樂生聲不過五聲二變之七音而管色之名至于十者六五乃合四之清聲即如琴絃之有二清聲而勾字在上尺之間亦如簫笛與笙皆有低上髙上低尺髙尺之分也勾字孔下之可借為髙上上之可借為低尺其小管有凡字而大管無凡字者因大管最上一孔取髙乙復帶髙上慮其孔多難按故假凡字于工字六字兩孔即如簫笛之不設上字孔也但時用各管其體與孔皆工人約畧為之而無一定之制故所得之音或參雜而不可爲凖今悉案律吕倍半之分以辨其體以審其音然後知頭管之制固不越乎律吕之範圍而旋宫轉調之義已黙寓于其中矣蕙田案以上管儀禮大射儀簜在建鼓之間陳氏樂書書于淮海惟揚州言篠蕩既敷繼之以瑶琨篠簜孔安國以竹箭為篠大竹為簜則簜之為竹特大於篠其笙簫之類歟儀禮大射儀簜在建鼓之間此之謂也蕙田案郊特牲殷人尚聲滌蕩其聲朱子於書教胄子註曰樂所以蕩滌邪穢應劭風俗通曰笛滌也以諧聲而言則簜其蕩歟樂書援禹貢而擬為大竹意實近之但其制不傳不能強解耳又案以上簜附周禮春官笙師掌教舂牘應雅注鄭司農云舂牘以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆筩而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫鄭氏鍔曰牘之為言凟也賓醉恐有凟乎禮故以牘名應者賓歸恐其不應禮欲其與樂聲相應也陳氏樂書應樂猶應之應物其獲也小矣故小鼓謂之應所以應大鼓所偶之聲也小舂謂之應所以應大舂所偶之節也周官笙師掌教牘應牘長七尺應則如桶而方六尺五寸中象柷有椎連底左右相擊以應柷也斯不亦大小之辨乎禮圖其形正圓而外皆朱唐樂圖及大周正樂皆外黒内朱然以理推之一在木下為本在木上為末在木中為朱則木之為物含陽於内南方之火所自而藏也故應以木為之而内外朱焉固其理也彼持内黒之説真臆論歟禮記樂記訊疾以雅疏雅樂器名舞者訊疾奏此雅器以節之也陳氏禮書周禮笙師掌教舂牘應雅以教裓樂鄭司農云雅狀如漆筩而弇口大二圍長五尺六寸以羊韋之有兩紐疏畫此約漢法云然也鄭康成曰雅中有椎樂記注裓樂裓夏之樂牘應雅教其舂者謂以築地笙師教之則三器在庭可知矣賓醉而出奏裓夏以此三器築地為之行節樂記曰訊疾以雅孔頴達曰舞者訊疾奏此雅器以應之葢樂者正也賓出而舂雅欲其醉而不失正也工舞而奏雅欲其迅疾而不失正也賓出之奏雅有裓樂則工舞之奏雅各以其舞之曲歟爾雅釋樂和樂謂之節疏節樂器名蕙田案樂貴於和唯有節而後和故和樂者謂之節也節字從竹當是竹器邢云謂相又引鄭氏相即拊之説誤矣又案以上牘應雅節附宗元案八音之序國語伶州鳩所言以金石絲竹匏土革木為次周禮大師播之以八音則以金石土革絲木匏竹為次其不同何也金石以紀樂律之綱孟子所謂金聲而玉振之者故八音總以二者爲首至琴瑟以應人聲在堂上笙管塤以用人氣在堂下鼓鼗柷敔則祇以節樂而已故國語以絲竹次金石而後及於匏土革木是以用之輕重為序也周禮則以金石與土皆成於天地故金石後即先之以土而革絲則成於動物者故次之木匏竹則成於植物者故又次之葢以體之貴賤為序也此編遵周禮故八音之序異乎國語右竹音之屬五禮通考卷七十七
