body:
  text: 五禮通考卷十三刑部尚書秦蕙田撰吉禮十三圜丘祀天宋史英宗本紀治平二年十一月壬申有事南郊大赦辛巳加恩百官宗晟傳治平將郊而雨或議改祫享英宗訪諸宗晟對曰陛下初郊見上帝盛禮也豈敢改卜至誠感神在陛下精意而已帝嘉納及郊雨霽文獻通考英宗治平二年合祭天地於南郊以太祖配故事皇帝將就版位祠官囘班向皇帝須就位乃復侍臣跪讀冊至御名則興至是詔以尊奉祠勿囘班及興時呂公著攝太僕卿參乗為上言仁宗親祠撤黄道以登虚小次不入上皆循用之正月上辛祈榖慶厯用犢一羊二豕二其日祀感生帝羊二豕二正配簠簋俎各增為二前一日太祝讀祝視祭玉餘如冬至攝事三獻終禮生引司天監罍洗升詣四方帝神位上香奠幣爵并行一獻再拜復治平二年禮院言準閤門儀制祀天地致齋皇帝不遊幸作樂緣夀聖節在致齋内若用慶厯元年嘉祐七年元㑹例更用中辛當在十六日又十四日例詣慈孝等寺集禧觀行禮觀燈作樂若遣官攝事無不聽樂元日朝會夀聖節多與上辛相近常改用中辛非尊事天神之意嘉㑹合禮又不宜徹樂因詔遇元正御殿聖節上夀雖在上辛祠官致齋日亦用樂大宴移日或就賜宋史神宗本紀熈寧元年十一月丙戌朝享太廟遂齋於郊宮廢青城後苑丁亥祀天地於圜丘大赦羣臣進秩有差文獻通考神宗熙寧元年詔令兩制以上至臺諫官與太常禮院同詳定今年冬至當與未當親行郊禮翰林學士承㫖王珪上議曰案王制喪三年不祭唯祭天地社稷為越紼而行事傳謂不敢以卑廢尊是則居喪而可得見天地也春秋僖公三十三年傳凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟杜預以謂新主既特祀於寢則宗廟四時常祀自當如舊是則居喪而可得見宗廟也周公稱商髙宗諒闇三年不言子張疑之以問仲尼仲尼答云何必髙宗古之人皆然髙宗不云服喪三年而云諒闇三年者杜預又謂古者天子諸侯三年之喪既塟而服除諒闇以居心喪不與士庶同禮也然則服除之後郊廟之祭可勿舉乎南齊以前人君嗣位或仍前郊之年或別自為郊下有司議而王儉乃援晉宋以來皆改元即郊而不用前郊之年自漢文以來皆即位而謁廟至唐徳宗以後亦踰年而行郊況本朝景徳二年真宗居明徳皇太后之喪既易月而服除明年遂享太廟而合祀天地於圜丘伏請皇帝將來冬至躬行郊廟之禮其服冕車輅儀物音樂縁神事者皆不可廢詔恭依典禮其車服儀物除神事外令太常禮院詳定以聞禮院看詳欲乞除郊廟及景靈宮禮神用樂外所有鹵簿鼔吹及樓前宮架諸軍音樂皆備而不作其遂處警場止鳴金鉦鼔角從之十一月帝齊於郊宮罷臨觀闕不幸苑囿故事車駕至青城少休即召從臣幸後苑閱水嬉復登端門觀太常警嚴至是帝精意奉祀悉罷逰觀遂減徹門闕亭苑省草木禽獸千七百餘事至十年又罷去寢殿後至寶華門花磚砌道著為定制司馬光傳執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議光與王珪王安石同見光曰救災節用宜自貴近始可聽也安石曰常衮辭堂饌時以為衮自知不能當辭位不當辭禄且國用不足非當世急務所以不足者以未得善理財者故也争議不已帝曰朕意與光同然姑以不允答之宋史禮志熙寧四年參知政事王珪言南郊乗輿所過必勘箭然後出入此師行之法不可施於郊祀禮院亦言於是凡車駕出入門皆罷之六年以詳定所請又罷太廟及宣徳朱雀南薰諸門勘契又皇帝自大次至版位内臣二人執翟羽前導號曰拂翟失禮尤甚請除之神宗本紀熈寧六年春正月辛亥復僖祖為太廟始祖以配感生帝宋喬年傳喬年父充國知太常禮院英宗祔廟議者欲祧僖祖藏夾室充國請配感生帝為宋始祖從之七年十一月己未祀天地于圜丘赦天下十二月丁夘文武官加恩禮志熙寧七年詔中書門下參定青城殿宇門名先是每郊撰進至是始定名前門曰泰禋東偏門曰迎禧正東門曰祥曦正西門曰景曜後三門曰拱極内東側門曰夤明西側門曰肅成殿曰端誠殿前東西門曰左右嘉徳便殿曰熙成後園門曰寶華著為定式沈括傳括為館閣校勘刪定三司條例故事三嵗郊丘之制有司案籍而行藏其副吏沿以干利壇下張幔距城數里為園囿植采木刻鳥獸綿絡其間將事之夕法駕臨觀御端門陳仗衞以閱嚴警逰幸登賞類非齋祠所宜乗輿一器而百工侍役者六七十輩括考禮沿革為書曰南郊式即照令㸃檢事務執新式從事所省萬計神宗稱善文獻通考楊氏曰愚案注疏云齋於路寢之室唐禮散齋於別殿致齋二日於太極殿又一日於行宮國朝冬祀天禮唯太祖皇帝乾徳六年十一月之禮可為後世不易之法其後有司建明非一大概宿齋三日内一日於大慶殿一日於太廟一日於青城髙宗中興之後檢㑹熙寧在京青城内殿宇門名如曰泰禋曰承和之類悉遵舊式其制可謂周備矣然令儀鸞司預先體倣青城制度絞縛其行事執事陪祠官宿齋幕次亦隨宜絞縛又何其簡略也元豐四年十月八日禮官言古之王者行則嚴輿衞處則厚宮闕所以示威重備非常也故周禮王㑹同則為壝宮食息則設帷宮漢祀甘泉則有行宮至於江左亦有瓦殿本朝沿唐舊制親祀南郊行宮獨設青城幔殿宿者有風雨之憂而又無望祭之位且青城之費歲以萬數臣等欲乞倣青城之制創立齋宮一勞而省重費或遇風雨可以行望祭之禮詔送太常禮院候脩尚書省了日取㫖是神宗皇帝有意乎立齋宮矣但以修尚書省未畢而猶有所待也其後哲宗皇帝既建齋宮謂臣下曰三嵗一郊青城之費縑帛三十餘萬工又倍之易以屋室一勞永逸所省多矣又徽宗皇帝修建南北郊齋宿宮殿南郊曰齋宮北郊曰帷宮有司請曰事體如一而名稱不同宜並稱齋宮從之祖宗典故粲然可考今青城制度尚沿襲舊例而未革盍亦推廣祖宗之意立為齋宮無事則嚴其扄鐍以待乗輿致齋之日而居焉暫勞而永逸一也宿者無風雨之憂或遇風雨則可以行望祭之禮二也事有關係甚重循習甚久斷然在所當革而無疑者其此之謂乎馬氏曰㑹要載中書門下奏定南郊青城内殿宇門名其事在熙寧七年然楊氏所云元豐四年禮官請創立齋宮詔候修尚書省了日取㫖則知齋宮元豐時尚未建而熈寧七年所奏定殿宇之名乃幔殿也然神宗即位初郊齋於郊宮罷臨觀闕不幸他苑遂減徹亭苑省草木禽獸千七百餘事以是觀之則知青城行宮苑囿遊觀之所畢備而獨未建齋殿誠為缺典神宗本紀熙寧十年十一月甲戌祀天地於圜丘赦天下十二月甲申文武官加恩元豐元年春正月戊午命詳定郊廟禮儀九月詔祀天地及配帝並用特牲禮志元豐元年二月詔内壝之外衆星位周環每二步植一杙繚以青繩以為限域既而詳定奉祀禮文所言周官外祀皆有兆域盖設一位而已後世因之稍增其制文獻通考東漢壇位天神從祀者甚衆至一千五百一十四神故外設重營以為等限日月在中營内南道而北斗在北之西至於五星中官宿之屬則其位皆中營二十八宿外官星之屬則其位皆外營然則為重營者所以等神位也唐因齊隋之制設為三壝天神列位不出内壝而御位特設於壇下之東南若夫公卿分獻文武從祀與夫樂架饌幔則皆在中壝之内而大次之設乃在外壝者所以序祀事也葢古者神位寡祀事簡故兆守有域以為遮列厲禁而已後世神位既衆祀事亦繁故為三壝以嚴内外之限國朝郊祀壇域率循唐制雖儀注具戴圜丘三壝每壝三十五步而有司乃以青繩代内壝誠不足以等神位序祀事嚴内外之限也伏請除去青繩如儀注為三壝從之宋史神宗本紀元豐二年秋七月丁亥詳定郊廟禮儀四年夏四月己巳詔罷南郊合祭天地九月詳定郊廟奉祀禮儀歴代名臣奏議元豐四年詳定郊廟奉祀禮文陸佃上議曰冕服有六而周官弁師云掌王之五冕則大裘與衮同冕矣故禮記曰郊之日王被衮以象天戴冕璪十有二旒則天數也又曰服之襲也充美也禮不盛服不充故大裘不裼此明王服大裘以衮衣裼之也先儒或謂周祀天地皆服大裘而大裘之冕無旒非是矣盖古者裘不徒服則其上必皆有衣故曰緇衣羔裘黄衣狐裘素衣麑裘如郊祀徒服大裘則是表裘以見天地表裘不入公門而乃欲以見天地可乎且先王之服冬裘夏葛以適寒暑盖未有能易之者也郊祀天地有裘無衮則夏祀赤帝與夏至日郊祭地示亦將被裘乎然則王者冬祀昊天上帝中裘而表衮明矣至於夏祀天神地示則去裘服衮以順時序周官曰凡四時之祭祀以宜服之明夏必不衣裘也或曰王被衮以象天此魯禮臣以為記曰周之始郊日以至王被衮以象天則豈得以為魯哉或曰祭天尚質故徒服大裘王被衮則非所以尚質臣以為謂之尚質者明有所尚而已不皆用質也如蒼璧以禮天黄琮以禮地旂有十二旒龍章設日月此豈用質也哉故曰祭天掃地而祭焉於其質而已矣牲用騂尚赤也用犢貴誠也王被衮以象天戴冕璪十有二旒則天數也旂十有二旒龍章而設日月以象天也夫理豈一端而已亦各有所當也今欲冬至禋祀昊天上帝服裘被衮其餘祀天及祠地示並請服衮去裘各以其宜服之石林燕語故事南郊車駕服通天冠絳紗袍赴青城祀日服靴袍至大次臨祭始更服衮冕元豐中詔定奉祀儀有司建言周官祀昊天上帝則服大裘而冕禮記郊祭之日王被衮以象天王肅援家語臨燔祭脫衮冕盖先衮而後裘因請更製大裘以衮用於祀日大裘用於臨祭議者頗疑家語不可據黜之則周官禮記所載相牴牾時陸右丞佃知禮院請服大裘被以衮遂為定制大裘黑羔皮為之而縁以黒繒乃唐制也蕙田案大裘衮冕之說至農師乃定不可易也宋史神宗本紀元豐六年十一月癸夘加上仁宗英宗諡丙午祀昊天上帝於圜丘赦天下禮志元豐六年十一月四日齋於南郊之青城五日冬至祀昊天上帝於圜丘以太祖配是日帝服鞾袍乗輦至大次有司請行禮服大裘被衮冕以出至壇中壝門外殿中監進大圭帝執以入宮架樂作至午階下版位西向立樂止禮儀使贊曰有司謹具請行事宮架奏景安之樂文舞作六成止帝再拜詣罍洗宮架樂作至洗南北向樂止帝搢圭盥帨訖樂作至壇下樂止升午階登歌樂作至壇上樂止殿中監進鎮圭嘉安樂作詣上帝神坐前北向跪奠鎮圭於繅藉執大圭俛伏興搢圭跪三上香奠玉幣執圭俛伏興再拜内侍舉鎮圭授殿中監樂止廣安樂作詣太祖神坐前東向奠圭幣如上帝儀登歌樂作帝降壇樂止宮架樂作還位西向立樂止禮部尚書户部尚書以下奉饌俎宮架豐安樂作奉奠訖樂止再詣罍洗帝搢大圭盥帨洗爵拭爵訖執大圭宮架樂作至壇下樂止升自午階登歌樂作至壇上樂止登歌禧安樂作詣上帝神坐前搢圭跪執爵祭酒三奠訖執圭俛伏興樂止太祝讀冊帝再拜訖樂作次詣太祖神坐前如前儀登歌樂作帝降自午階樂止宮架樂作還位西向立樂止文舞退武舞進宮架正安之樂作樂止亞獻盥帨訖正安樂作禮畢樂止終獻行禮並如上儀獻畢宮架樂作帝升自午階樂止登歌樂作至飲福位樂止禧安樂作帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受搏黍豆再受爵飲福訖奠爵執圭俯伏興再拜樂作帝降還位如前儀禮部户部尚書徹俎豆禮直官曰賜胙行事陪祀官再拜宮架宴安樂作一成止宮架樂作帝詣望燎位南向立樂止禮直官曰可燎俟火燎半柴禮儀使跪奏禮畢宮架樂作帝出中壝門殿中監受大圭歸大次樂止有司奏解嚴帝乘輿還青城百官稱賀於端誠殿有司轉仗衞奏中嚴外辦帝服通天冠絳紗袍乘輿以出至玉輅所侍中跪請降輿升輅帝升輅門下侍郎奏請進行又奏請少駐宣侍臣乘馬將至宣徳門奏采齊一曲入門樂止侍中請降輅赴幄次有司奏解嚴帝常服乘輿御宣徳門肆赦羣臣稱賀如常儀禮部太常寺上親祀儀並如南郊其攝事惟改舞名及不備官其籩豆樂架玉幣之數盡如親祀是嵗十一月甲辰冬至祀昊天上帝以太祖配始罷合祭不設皇地祇位文獻通考元豐六年冬至郊祀昊天上帝以太祖配始罷合祭不設皇地祇位先是樞宻院陳襄等詳定郊廟禮文上言曰伏承聖意以天地合祭於圜丘為非典禮之正詔令更定臣謹案周禮大司樂以圜鐘為宮冬日至於地上之圜丘奏之六變以祀天神以函鐘為宮夏日至於澤中之方丘奏之八變以祭地示夫祀必以冬日至者以其陽氣來復於上天之始也故宮用夾鐘於震之宮以其帝出乎震也而謂之圜鐘者取其形以象天也三一之變圜鐘為宮三變黄鐘為角太蔟為徵姑洗為羽各一變合陽竒之數也祭必以夏日至者以其陰氣潛萌於下地之始也故宮用林鐘於坤之宮以其萬物致養於坤也而謂之函鐘者取其容以象地也四二之變函鐘為宮太蔟為角姑洗為徵南呂為羽各二變合陰偶之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭沈薶疈辜祭其在地者而以黄琮禮之皆所以順其隂陽辨其時位倣其形色此二禮之不得不異也故求諸天而天神降求諸地而地示出得以通精誠而逆福釐以生蒸民以阜萬物此百王不易之禮也去周既逺先王之法不行漢元始中姦臣妄議不原經意附會周官大合樂之說謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歴唐千有餘年之間而以五月親祠北郊者惟四帝而已如魏文帝之太和周武帝之建徳隋髙祖之開皇唐睿宗之先天皆希濶一時之舉也然而隨得隨失卒無所定垂之本朝未遑釐正恭唯陛下恢五聖之述作舉百王之廢墜臣以為己罷合祭則南北二郊自當別祀伏望陛下每遇親祠之嵗先以夏日至祭地示於方丘然後以冬日至祀昊天於圜丘此所謂大者正也然議者或謂先王之禮其廢已久不可復行古者齋居近古者致齋路寢儀衞省用度約賜予寡故雖一嵗徧祀而國不費人不勞今也齋居逺儀衞繁用度廣賜予多故雖三嵗一郊而猶或憚之況一嵗而二郊乎必不獲已則三年而迭祭或如後漢以正月上丁祠南郊禮畢次北郊或如南齊以上辛祀昊天而次辛瘞后土不亦可乎臣竊謂不然記曰祭不欲踈踈則怠夫三年迭祭則是昊天大神六年始一親祀無已怠乎記曰大事必順天時二至之郊周公之制也捨是而從後王之失可謂禮與彼議者徒知苟簡之便而不睹尊奉之嚴也伏惟陛下鑒先王已行之明效舉曠世不講之大儀約諸司儀衞而幸祠宮均南郊之賜予以給衞士蠲青城不急之務損大農無名之費使臣得以講求故事參究禮經取太常儀注之文以正其訛謬稽大駕鹵簿之式以裁其繁冗唯以至恭之意對越大祇以迎至和格純嘏庶成一代之典以示萬世又曰臣某等恭唯本朝冬至祀天南郊夏至祭地北郊每嵗行之皆合於古猶以有司攝事為未足以盡志於是三年一郊而親行之夫三年一郊而親行之葢所謂因時制宜者也施之於今誠不可易唯合祭之禮在所當正禮曰魯人將有事於上帝必先有事於泮宮所以然者告祖為配之謂也又曰晉人將有事於河必先有事於惡池齊人將有事於太山必先有事於配林所以然者先卑後尊之謂也臣等推古以知今推諸侯以知天子欲乞每遇親郊七日戒之後三日宿之時宿太廟以告宿北郊以祭宿南郊以祀所以先太廟者告祖為配也所以先北郊者先卑後尊也雖然自北郊至南郊相去為逺則中道不可以無舍請為帷宮止而後進如允所奏乞下有司施行禮後漢因祠南郊即祠北郊明堂世祖廟及太廟謂之五供唐因祀南郊即祀太清宮及太廟謂之三大禮本朝三嵗郊祀必先景靈宮及太廟盖因前制然每嵗夏至於北郊自有常祠祀兼常嵗有司攝事於南郊亦不合祭天地其合祭之意止縁親祀欲徧及爾若以親祀欲徧及之則因南郊同時告祭北郊自因舊儀亦不背違禮意近於可行伏乞更賜參酌施行於是詔禮官講求翰林學士張璪以為冬至祀天夏至祀地不易之理今祀地欲改用他月無所據依必不得已宜於郊祀之嵗夏至之日盛禮容興樂舞一如南郊之儀命宰攝事而王存曾肇言今北郊常差中書門下官乃冢宰之任樂舞之類亦開元開寶舊禮所載特近世廢缺二者皆有司攝事常行之典未足以代親祀之重恐於父天母地之文有所未順判太常寺陳薦言議者以天地合祭始於王莽故欲罷之臣按周頌昊天有成命郊祀天地也漢郊祀歌曰唯泰元尊媪神蕃釐泰元天也媪神地也又曰涓選休成天地並況此天地同祀可以概見恐非是王莽始也議者又謂方丘之祀盛夏不躬行宜選冢宰攝祀亦恐未必合古然終不若天地合祭也乞且循舊制知禮院曾肇言今冬至若罷合祭而夏至又使有司行事則於父母天地之義若有隆殺願陛下遇親祀南郊之嵗以夏至日躬款北郊以合先王之制遂詔罷南郊合祭親祀北郊並依南郊儀如不親祀上公攝事蕙田案此元豐一議也陳襄之言據經考正精確詳明千古定論神宗罷南郊合祭親祀北郊亦曠代卓識惜終未之行耳又案陳薦主合祭之議乃引漢郊祀歌泰元媪神之詞為天地同祀之證夫漢南北郊之禮雖未正然甘泉泰畤汾隂后土尚存分祭之意固未嘗合也至於泰元媪神乃方士亳忌天一地一泰一荒誕不經之舉班志所載即祀三一之樂章與祭天地何涉援以為證不亦異乎自元豐元年上命樞宻直學士陳襄等詳定郊廟奉祀禮文大正歴代典禮之失至是嵗親祀圜丘始用新儀國朝親郊止服衮冕至是稽古始加服大裘而被以衮冕詳定禮文所議禮記曰郊特牲而社稷太牢又曰祭天地之牛角繭栗配位亦特牲書曰用牲於郊牛二是也宋朝儀注昊天上帝皇地祇太祖皇帝之位各設三牲俎非尚質貴誠之義請親祀圜丘方澤正配位皆用犢不設羊豕俎及鼎匕有司攝事亦如之郊之祭也器用陶匏以象天地之性樿因白木以素為質今郊祀簠簋罇豆皆非陶又用龍杓未合禮意請圜丘方澤正配位所設簠簋罇豆改用陶器仍以樿為杓祀天之有禋柴槱祭地之有瘞血享廟之有祼鬯皆歆神之始非謂於祭之末燔燒胙餘也至後世之燔瘞牲幣於祭末而不知致神於其始則是備於後而缺於先也請南北郊先行升煙瘞血之禮至薦奠禮畢即如舊儀於壇坎燔瘞牲幣北郊祭皇地祇及神州地祇當為坎瘞埋今乃建壇燔燎祝版攷先儒所說地祇即無槱燎之文請祭皇地祇祝版牲幣並瘞於埳不設燎壇熈寧祀儀唯昊天上帝皇地祇髙禖燎瘞犢首自感生帝神州地祇而下皆不燔瘞牲體殊不應禮又案周禮羊人祭祀割羊牲登其首禮記曰升首報陽也首為陽則脅與髀為隂可知矣報陽宜以陽報隂宜以隂各從其類也請自今昊天上帝感生帝皆燔牲首以報陽皇地祇神州地祇太社太稷凡地祇之祭皆瘞牲之左髀以報隂凡薦享太廟皆升首於室又言臣等見親祀南郊儀注並云祀前三日儀鑾司鋪御座黄道褥謹案唐故事郊壇宮廟内壝及殿庭天子步武所及皆設黄道褥壇上立位又施赤黄褥將有事命撤之武徳正觀之制用紫至徳以來用黄開元禮開寶通禮郊廟並不設黄道褥太常因革禮曰舊制皇帝升壇以褥藉地象天黄道太祖命撤之設拜於地和峴乞宣付史館天聖二年儀注又增設郊壇壝門道北御座黄道褥康定初有司建議謂配帝褥用緋以示損於天地而自小次之前至壇上諸位其道褥以黄葢非典禮是嵗有詔自小次至壇下撤黄道臣等伏詳禮記郊祭之日氾埽反道鄭氏注謂剗令新土在上也其藉神席天地尚質則用蒲越藁鞂宗廟尚文則設莞筵紛純加繅席畫純加次席黼純而已天子受胙乃有席周禮司几筵所謂胙席是也今來郊壇黄道褥欲更不設宋史禮志詳定禮文所言古者祭祀用牲有豚解有體解薦腥則解為十一體今親祠南郊正配位之俎不殊左右胖不分貴賤無豚解體解之別請郊廟薦腥解其牲兩體兩肩兩脇并脊為七體左右胖俱用其載于俎以兩體左端兩肩兩脇次之脊居中皆進末至薦熟沈肉於湯止用右胖髀不升俎前後肱骨離為三曰肩臂臑後髀股骨去體離為二曰肫胳前脊謂之正脊次直謂之脡脊濶於脡脊謂之横脊皆二骨脇骨最後二為短脇旁中二為正脇最前二為代脇若升俎則肩臂臑在上端膊賂在下端脊脇在中央其左之序則肩臂臑正脊脡脊代脇短脇膊胳凡十一體而骨體升俎進神坐前如少牢禮皆進下其牲體各預以半為腥俎半為熟俎腸胃膚俎亦然又請親祠飲福酒訖倣儀禮佐食搏黍之說命太官令取黍于簋搏以授祝祝受以豆以嘏乎皇帝而無嘏辭又本朝親祠南郊習儀於壇所明堂習儀于大慶殿皆近於瀆伏請南郊習儀於青城明堂習儀于尚書省以逺神為恭又賜胙三師三公侍中中書令門下中書侍郎尚書左右丞知樞宻同知院事禮儀儀仗鹵簿頓遞使牛羊豕肩臂臑各五太子三師三少特進觀文大學士學士御史大夫六尚書金紫銀青光禄大夫節度使資政殿大學士觀文翰林資政端明龍圖天章寶文承㫖侍講侍讀學士左右散騎常待尚書列曹侍郎龍圖天章寶文直學士光禄正議通議大夫御史中丞太子賓客詹事給事中中書舍人節度觀察留後左右諫議龍圖天章寶文待制太中中大夫秘書殿中丞太常宗正卿牛豕肩臂臑各三入内内侍省押班副都知光禄卿監禮官博士牛羊脊脇各三太祝奉禮司尊彛郊社太廟宮闈令監牲牢供應祠事内官羊髀膊胳三應執事職掌樂工門幹宰手馭馬馭車人並均給脾肫觳及腸胃膚之類蕙田案禮志此條即神宗紀元年九月詔用特牲之事而年月互異必有一誤今姑依次編入輿服志元祐元年禮部言元豐所造大裘雖用黑羊皮乃作短袍様襲於衮衣之下仍與衮服同冕未合典禮下禮部太常寺共議上官均吳安詩常安民劉唐老龔原姚勔請依元豐新禮丁隲請循祖宗故事王愈請倣唐制朱光庭周秩請以𤣥衣襲裘獨禮部員外郎何洵直在元豐中嘗預詳定以陸佃所議有可疑者八案周禮節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人既云衮冕又云裘冕是衮與裘各有冕乃云裘與衮同冕當以衮襲之裘既無冕又襲於衮中裘而表衮何以示裘衮之別哉古人雖質不應以裘為夏服葢冬用大裘當暑則以同色繒為之記曰郊祭之日王被衮以象天若謂裘上被衮以被為襲則家語亦有被裘象天之文諸儒或言臨燔柴脫冕著大裘或云脫裘服衮蓋裘衮無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者訖曰大裘不裼說者曰無別衣以裼之葢他服之裘䙝故表裘不入公門事天以報本復始故露質見素不為表襮而冕亦無旒何必假他衣以藩飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上重二衣也大裘本不裼鄭志乃云裘上有𤣥衣與裘同色葢趙商之徒附會為說不與經合襲之為義本出於重沓非一衣也古者齋祭異冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服衮冕是衮冕者祀天之齋服也唐開元及開寶禮始以衮冕為齋服裘冕為祭服兼與張融臨燔紫脫衮服裘之義合請從唐制兼改製大裘以黑繒為之佃復破其說曰夫大裘而冕謂之裘冕非大裘而冕謂之衮冕則裘冕必服衮衮冕不必服裘今特言裘冕者主冬至言之周禮司裘掌為大裘以供王祀天之服則祀地不服大裘以夏日至不可服裘故也今謂大裘當暑以同色繒為之尤不經見兼裼襲一衣而已初無重沓之義被裘而覆之則曰襲袒而露裘之美則曰裼所謂大裘不裼則非衮而何玉藻曰禮不盛服不充故大裘不裼則明不裼而襲也充美也鄭氏謂大裘之上有𤣥衣雖不知覆裘以衮然尚知大裘不可徒服必有𤣥衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可以徒服故被以衮豈借衮以為飾哉今謂祭天用衮冕為齋服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗服衮矣雖無大裘未能盡合于禮固未嘗有表裘而祭者也且裘内服也與袍同袍褻矣而欲襌以祭天以明示質是欲衩衣以見上帝也洵直復欲為大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所志其後詔如洵直議去黒羊皮而以黑繒製焉蕙田案陸農師論大裘而冕及大裘不裼可稱千古定論何洵直不能再置一辭矣惜當日竟從何議遂使元豐盛事不久而變惜哉五禮通考巻十三
