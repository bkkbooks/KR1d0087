body:
  text: 五禮通考卷一百七十五刑部尚書秦蕙田撰嘉禮四十八學禮遼史聖宗本紀統和六年詔開貢舉興宗本紀重熙五年十月御元和殿以日射三十六熊賦幸燕詩試進士于廷賜馮立趙徽四十九人進士第遂大宴御試進士自此始蕙田案遼史不志選舉故其立法規制莫得而詳然以諸帝本紀攷之猶畧可見其科或比年一舉或間一年或間二年或間三年初無定期統和設科之始嵗放進士不過一二人或四五人道宗以後進士多者百餘人少亦七八十人亦無定額也金史選舉志金設科皆因遼宋制有詞賦經義策試律科經童之制海陵天徳三年罷策試科世宗大定十一年剏設女真進士其初但試策後増試論所謂策論進士也明昌初又設制舉宏詞科以待非常之士故金取士之目有七焉其試詞賦經義策論中選者謂之進士律科經義中選者曰舉人蕙田案唐宋時凡舉進士及諸科者皆得稱舉人舉人者州郡所舉之人如謁選于吏部者謂之選人耳非以為出身之名也金時以詞賦經義者曰進士以律科中選者曰舉人於是舉人遂為一定之名然與後世之舉人亦有别凡諸進士舉人由鄉至府由府至省及殿廷凡四試皆中選則官之至廷試五被黜則賜之第謂之恩例又有特命及第者謂之特恩恩例者但考文之髙下為第而不復黜落凡詞賦進士試賦詩策論各一道經義進士試所治一經義論策各一道其設也始於太宗天會元年十一月時以急欲得漢士以撫輯新附初無定數亦無定期故二年二月八月凡再行焉五年以河北河東初降職員多闕以遼宋之制不同詔南北各因其素所習之業取士號為南北選熙宗天眷元年五月詔南北選各以經義詞賦兩科取士海陵庶人天徳二年始増殿試之制而更定試期三年併南北選為一罷經義策試兩科専以詞賦取士貞元元年定貢舉程試條理格法正隆元年命以五經三史正文内出題始定為三年一闢大定四年勅宰臣進士文優則取勿限人數十八年謂宰臣文士有偶中魁選不問操履而輒授翰苑之職如趙承元朕聞其無士行果敗露自今榜首先訪察其鄉行可取則授以應奉否則従常調十九年謂宰臣曰自來御試賦題皆士人嘗擬作者前朕自選一題出人所不料故中選者多名士而庸才不及焉是知題難則名儒亦擅場題易則庸流易僥倖也平章政事唐古安禮奏曰臣前日言士人不以策論為意者正為此耳宜各場通考選文理俱優者上曰并答時務策觀其議論材自可見卿等其議之二十二年謂宰臣曰漢進士魁例授應奉若行不副名不習制誥之文者即與外除二十八年復經義科章宗明昌元年正月言事者謂舉人四試而鄉試似為虚設固當罷去其府會試乞十人取一人可以羣經出題而註示本𫝊上是其言詔免鄉試府試以五人取一人仍令有司議羣經出題之制有司言以六經十七史孝經論語孟子及荀揚老子内出題皆命於題下註其本𫝊又諭有司曰舉人程文所用故事恐考試官或遽不能憶誤失人材可自注出處注字之誤不在塗注乙之數蕙田案金初進士舉人皆四試試於州縣曰鄉試試於京府曰府試試於禮部曰會試試於殿廷曰御試所謂府試即今之鄉試是也唐宋以試禮部為省試至是始有會試之名及明昌初罷鄉試之法惟有府試省試御試元明以來皆因之又案金制考官於經史出題皆於題下注本𫝊示之則士子得盡心於作文而題指不致舛誤又舉人試文所用故事許自注出處則試官不致失於記憶屈抑人才兼可以察士人學問之根柢皆良法也明昌二年勅官或職至五品者直赴御試六年言事者謂學者率恃有司全注本𫝊以示之故不勉讀書乞減子史注本𫝊之制又經義中選之文多膚淺乞擇學官及本科人充試官省臣謂若不與本𫝊恐碩學者有偶忘之失可令但知題意而已遂命擇前經義進士為衆所推者才識優長者為學官遇差考試官之際則驗所治經參用詞賦進士題注本𫝊不得過五十字經義進士御試第二場試論日添試策一道承安四年上諭宰臣曰一場放二狀元非是後場廷試令詞賦經義通試時務策止選一狀元餘雖有明經法律等科止同諸科而已至宋王安石為相作新經始以經義取人且詞賦經義人素所習之本業策論則兼習者也今捨本業取兼習恐不副陛下公選之意遂定御試同日各試本業詞賦依舊分立甲次第一名為狀元經義魁次之恩例與詞賦第二人同餘分為兩甲中下人並在詞賦之下蕙田案一場放二狀元以下四十二字係章宗諭宰臣之詞至宋王安石為相以下則有司所議之詞中間必有脱文五年詔考詞賦官各作程文一道示為舉人之式試後赴省蔵之蕙田案考試官撰程文始見於此前明亦多有之張行簡轉對言擬作程文本欲為考試之式今會試考試官御試讀卷官皆居顯職擢第後離筆硯久不復常習今臨試擬作之文稍有不工徒起謗議詔罷之泰和元年平章政事圗克坦鎰病時文之弊言諸生不窮經史唯事末學以致志行浮薄可令進士試策日自時務策外更以疑難經㫖相參為問使發聖賢之㣲㫖古今之事變詔為永制宣宗貞祐二年御史臺言明年省試以中都遼東西北京等路道阻宜於中都南京兩處試之三年諭宰臣曰國初設科素號嚴宻今聞會試至於雜坐諠譁何以防弊命治考官及監察罪興定二年又謂宰臣曰従來廷試進士日晡後即遣出宫恐文思遲者不得盡其才令待至暮五年省試經義進士考官於常格外多取十餘人上命以特恩賜第又命河北舉人今府試中選而為兵所阻者免後舉府試策論進士選女真人之科也始大定四年世宗命頒行女直大小字所譯經書每穆昆選二人習之尋欲興女直字學校明安穆昆内多擇良家子為生諸路至三千人九年選異等者得百人薦於京師廩給之命締達教以古書作詩策後復試得圗克坦鎰以下三十餘人十一年始議行策選之制至十三年始定每場策一道以五百字以上成免鄉試府試止赴會試御試且詔京師設女真國子學諸路設女真府學擬以新進士充教授以教士民子弟之願學者俟行之久學者衆則同漢進士三年一試之制乃就憫忠寺試中選者得圗克坦鎰以下二十七人十六年命皇家兩従以上親及宰相子直赴御試皇家袒免以上親及執政官之子直赴會試二十年定制今後以策詩試三場策用女真大字詩用小字程試之期皆依漢進士例省臣奏漢人進士來年三月二十日鄉試八月二十日府試次年正月二十日會試三月十二日御試勅以來年八月二十五日於中都上京咸平東平府等路四處府試餘従前例二十八年諭宰臣曰女真進士惟試以策行之既久人能預備今若試以經義可乎宰臣對曰五經中書易春秋已譯之矣俟譯詩禮畢試之可也上曰大經義理深奥不加嵗月不能貫通今宜於經内姑試以論題後當徐試經義也章宗大定二十九年詔許諸人試策論進士舉七月省奏如詩策論俱作一日程試恐力有不逮詩策作一日論作一日以詩策合格為中選而以論定其名次上曰論乃新添至第三舉時當通定去留明昌元年明安穆昆願試進士者擬依餘人例不可令直赴御試上曰是止許女真進士母令試漢進士也又定制餘官第五品散階令直赴會試官職俱至五品令直赴御試承安二年勅策論進士限丁習學遂定制内外官員諸局分承應人武衞軍若明安穆昆女真及諸色人戸止一丁者不許應試兩丁者許一人四丁二人六丁以上止許三人三次終場不在驗丁之限三年定制女直人以年四十五以下試進士舉於府試十日前委佐貳官善射者試射如當赴會試御試者大興府佐貳官試騐三舉終場者免之凡會試之數大定二十五年詞賦進士不得過五百人二十八年以不限人數遂至五百八十六人章宗令合格則取故承安二年至九百二十五人時以復加四舉終場者數太濫遂命取不得過六百人泰和二年上命定會試諸科取人之數司空襄言試詞賦經義者多可五取一策論絶少可四取一恩榜本以優老於場屋者四舉受恩則太優限以年則礙異材可五舉則受恩平章圗克坦鎰等言大定二十五年至明昌初率三四人取一平章張汝霖亦言五人取一府試百人中纔得五耳遂定制策論三人取一詞賦經義五人取一五舉終場年四十五以上四舉終場年五十以上者受恩凡考試官大定間府試六處各差詞賦試官三員策論試官二員明昌初増為九處路各差九員大興府則十一員承安四年又増太原為十處有司請省之遂定策論進士女真經童千人以上差四員五百人以上三員不及五百二員各以職官高者一人為考試官餘為同考試官詞賦進士與律科舉人共及三千以上五員二千四員不及二千三員經義進士及經童舉人千人四員五百以上三員百人以上二員不及百人以詞賦考官兼之後又定制策論試官上京咸平東平各三員北京西京益都各二員律科監試官一員試律官二員𨽻詞賦試院經童試官一員𨽻經義考試院與會試同其彌封并謄錄官檢搜懷挾官自餘修治試院監押門官並如會試之制大定二十年上以往嵗多以逺地官考試不便遂命差近省凡會試知貢舉官同知貢舉官詞賦則舊十員承安五年為七員經義則六員承安五年省為四員詮讀官二員泰和三年上以彌封官渫語於舉人勅自今女真司則用右選漢人封漢人司則以女真司封凡御試讀卷官策論詞賦進士各七員經義五員餘職事官各二員制舉宏詞共三員泰和七年禮部尚書張行簡言舊例讀卷官不避親至有親人或有不敢定其去留或力加營䕶而為同列所疑若讀卷官不用與進士有親者則讀卷之際得平心商確上遂命臨期多擬其有親者汰之蕙田案府試會試御試差官考校及糾察之法至金始詳凡府試策論進士大定二十年定以中京上京咸平東平四處至明昌元年添北京西京益都為七處兼試女真經童凡上京海蘭率賓呼爾哈扶餘東北招討司等路者則赴會寧府試咸平隆州博索東京葢州懿州者則赴咸平府試中都河北東西路者則赴大興府試西京并西南西北二招討司者則赴大同府試北京臨潢宗州興州全州者則赴大定府試山東西大名南京者則赴東平府試山東東路則試於益都凡詞賦經義進士及律科經童府試之處大定間大興大定大同開封東平京兆凡六處明昌初増遼陽平陽益都為九處承安四年復増太原為十中都河北則試於大興府上京東京咸平府等路則試於遼陽府餘各試於其境凡鄉試之期以三月二十日府試之期若策論進士則以八月二十日試策間三日試詩詞賦進士則以二十五日試賦及詩又間三日試策論經義進士又間詞賦後三日試經義又三日試策次律科次經童每場皆間三日試之會試則策論進士以正月二十日試策皆以次間三日同前御試則以三月二十日策論進士試策二十三日試詩論二十五日詞賦進士試賦詩論而經義進士亦以是日試經義二十七日乃試策論若試日遇雨雪則候晴日御試唱名後試策則稟奏宏詞則作二日程試舊制試女直進士在再試漢進士後大定二十九年以復設經義科更定是制恩例明昌元年定制省元直就御試不中者許綴榜末解元但免府試四舉終場依五舉恩例所試文卷惟犯御名廟諱不成文理者則黜之餘並以文之優劣為次仍一日試三題其五舉者止試賦詩女真進士亦同此例承安五年勅進士四舉該恩詞賦經義當以各科為場數不得通數又恩榜人應授官者監試官於試時具數以奏特恩者授之泰和三年以經義會元與策論詞賦進士不同若御試被黜則附榜末為太優若同恩例又與四舉者不同遂定制依曽經府試解元免府試之例會試下第再舉直赴御試制舉有賢良方正能直言極諫博學宏材達於従政等科試無常期上意欲行即告天下聴内外文武六品以下職官無公私過者従内外五品以上官薦於所屬詔試之若草澤士徳行為鄉里所服者則従府州薦之凡試則先投所業策論三十道於學士院視其詞理優者委官以羣經子史内出題一日試論三道如可則庭試策一道不拘常務取其無不通貫者優等遷擢之宏詞科試詔誥章表露布檄書則皆用四六誡論頌箴銘序記則或依古今體或參用四六於每舉賜第後進士及在官六品以下無公私罪者在外薦之令試策官出題就考通試四題分二等遷擢之二科皆章宗明昌元年所剏者也右遼金取士元史選舉志太宗始取中原中書令耶律楚材請用儒術選士従之九年秋八月下詔命斷事官扎呼岱與山西東路課税所長官劉中歴諸路考試以論及經義詞賦分為三科作三日程専治一科能兼者聴但以不失文義為中選得東平楊奐等凡若干人皆一時名士而當世或以為非便事復中止世祖至元四年九月翰林學士承㫖王鶚等請行選舉法帝曰此良法其行之中書左三部與翰林學士議立程式十一年十一月裕宗在東宫時省臣復啟謂去年奉㫖行科舉今將翰林老臣等所議程式以聞奉令㫖准蒙古進士科及漢人進士科參酌時宜以立制度事未施行至二十一年九月丞相和爾和遜與留夢炎等言十一月中書省臣奏皆以為天下習儒者少而由刀筆吏得官者多帝曰將若之何對曰惟貢舉取士為便凡蒙古之士及儒吏隂陽醫術皆令試舉則用心為學矣帝可其奏繼而許衡亦議學校科舉之法罷詩賦重經學定為新制事雖未及行而選舉之制已立至仁宗皇慶二年十月中書省臣奏科舉事世祖裕宗累嘗命行成宗武宗尋亦有㫖今不以聞恐或有沮其事者夫取士之法經學實修已治人之道詞賦乃摛章繪句之學自隋唐以來取人専尚詞賦故士習浮華今臣等所擬將律賦省題詩小義皆不用専立徳行明經科以此取士庶可得人帝然之十一月乃下詔曰惟我祖宗以神武定天下世祖皇帝設官分職徴用儒雅崇學校為育材之地議科舉為取士之方規模宏逺矣朕以𦕈躬𫉬承丕祚繼志述事祖訓是式若稽三代以來取士各有科目要其本末舉人宜以徳行為首試藝則以經術為先詞章次之浮華過實朕所不取爰命中書參酌古今定其條制其以皇慶三年八月天下郡縣興其賢者能者充賦有司次年二月會試京師中選者朕将親策焉具合行事宜於后科場每三嵗一次開試舉人従本貫官司於諸色户内推舉年及二十五以上鄉黨稱其孝悌朋友服其信義經明行修之士結罪保舉以禮敦遣資諸路府其或徇私濫舉并應舉而不舉者監察御史肅政亷訪司體察究治考試程式蒙古色目人第一場經問五條大學論語孟子中庸内設問用朱氏章句集註其義理精明文詞典雅者為中選第二場策一道以時務出題限五百字以上漢人南人第一場明經經疑二問大學論語孟子中庸内出題並用朱氏章句集註後以已意結之限三百字以上經義一道各治一經詩以朱氏為主尚書以蔡氏為主周易以程氏朱氏為主以上三經兼用古註疏春秋用三𫝊及胡氏𫝊禮記用古註疏限五百字以上不拘格律第二塲古賦詔誥章表内科一道古賦詔誥用古體章表四六參用古體第三場策一道經史時務内出題不矜浮藻惟務直述限一千字以上成蒙古色目人願試漢人南人科目中選者加一等注授蒙古色目人作一榜漢人南人作一榜第一名賜進士及第従六品第二名以下及第二甲皆正七品第三甲以下皆正八品兩榜並同所在官司遲悞開試日期監察御史肅政亷訪司糾彈治罪流官子孫廕敘並依舊制願試中選者優陞一等在官未入流品願試者聴若中選之人已有九品以上資級比附一高加一級注授若無品級止依試例従優銓注鄉試處所并其餘條目命中書省議行於戯經明行修庶得真儒之用風移俗易益臻至治之隆咨爾多方體予至意蕙田案此用四書義取士之始也唐時試明經令帖孝經論語而孟子不立於學咸通中皮日休請以孟子為科事竟不報至宋熙寧之世更以經義試進士始命専經者兼治論語孟子自河南二程子出表章學庸朱子為大學中庸章句論語孟子集註由是有四書之名嗣後理學日明學者始知其為修已治人之切要共尊信之而皇慶開科遂以朱子四書之學首立於學官自元明以來五百年間相承無廢此固儒術之效而許魯齋諸人亦可謂能尊其所聞者矣又是時雖罷詩賦専用經義然漢人南人第二場猶用古賦一首故中書所定條目仍令攜帶禮部韻略惟不用詩及律賦耳中書省所定條目鄉試中選者各給解據錄連取中科文行省移咨都省送禮部腹裏宣慰司及各路闗申禮部拘該監察御史亷訪司依上錄連科文申臺轉呈都省以憑照勘蕙田案此給解咨部鄉試八月二十日蒙古色目人試經問五條漢人南人明經經疑二問經義一道二十三日蒙古色目人試策一道漢人南人古賦詔誥章表内科一道二十六日漢人南人試策一道會試省部依鄉試例於次年二月初一日試第一場初三日第二場初五日第三場御試三月初七日前期奏委考試官二員監察御史二員讀卷官二員入殿廷考試每舉子一名集賽岱一人看守漢人南人試策一道限一千字以上成蒙古色目人時務策一道限五百字以上成蕙田案此試期及文字多寡之式殿廷試士令集賽岱猶言畨直人也㸔守亦始於此選考試官行省與宣慰司及腹裏各路有行臺及亷訪司去處與臺憲官一同商議選差上都大都従省部選差在内監察御史在外亷訪司官一員監試每處差考試官同考試官各一員並於見任并在間有徳望文學常選官内選差彌封官一員謄錄官一員選亷幹文資正官充之凡謄錄試卷并行移文字皆用朱書仍須設法闗防毋致容私作弊省部會試都省選委知貢舉同知貢舉官各一員考試官四員監察御史二員彌封謄録對讀官監門等官各一員蕙田案此選差試官及執事官謄錄試卷用朱書亦始於此鄉試行省一十一河南陜西遼陽四川甘肅雲南嶺北征東江浙江西湖廣宣慰司二河東山東直𨽻省部路分四真定東平大都上都蕙田案此鄉試省分天下選合格者三百人赴會試於内取中選者一百人内蒙古色目漢人南人分卷考試各二十五人蒙古人取合格者七十五人大都十五人上都六人河東五人真定等五人東平等五人山東四人遼陽五人河南五人陜西五人甘肅三人嶺北三人江浙五人江西三人湖廣三人四川一人雲南一人征東一人色目人取合格者七十五人大都十人上都四人河東四人東平等四人山東五人真定等五人河南五人四川三人甘肅二人陜西三人嶺北一人遼陽二人雲南二人征東一人湖廣七人江浙一十人江西六人漢人取合格者七十五人大都一十人上都四人真定等十一人東平等九人山東七人河東七人河南九人四川五人雲南二人甘肅二人嶺北一人陜西五人遼陽二人征東一人南人取合格者七十五人湖廣一十八人江浙二十八人江西二十二人河南七人蕙田案此進士中額鄉試會試許将禮部韻略外餘並不許懷挾文字差搜檢懷挾官一員每舉人一名差軍一名㸔守無軍人處差巡軍提㸃擗掠試院差廉幹官一員度地安置席舍務令隔逺仍自試官入院後常川妨職監押外門鄉試會試彌封謄錄對讀官下吏人於各衙門従便差設蕙田案此搜檢闗防試卷不考格犯御名廟諱及文理紕繆塗注乙五十字以上者不考蕙田案此試卷違式謄錄所承受試卷並用朱書謄錄正文實計塗注乙字數標寫對讀無差将朱卷逐旋送考試所如朱卷有塗注乙字亦皆標寫字數謄錄官書押候考校合格中選人數已定抄錄字號索上元卷請監試官知貢舉官同考試官對號闗拆蕙田案此謄錄對讀舉人試卷各人自備三場文卷并草卷各一十二幅於卷首書三代籍貫年甲前期半月於印卷所投納置簿收附用印鈐縫訖各還舉人蕙田案此先期投卷凡就試之日日未出入場黄昏納卷受卷官送彌封所撰字號封彌訖送謄錄所蕙田案此受卷彌封科舉既行之後若有各路嵗貢及保舉儒人等文字到官並令還赴本鄉應試倡優之家及患廢疾若犯十惡奸盜之人不許應試舉人於試場内毋得喧譁違者治罪仍殿二舉蕙田案此場規舉人與考試官有五服内親者自須迴避仍令同試官考卷若應避而不自陳者殿一舉蕙田案此親屬迴避鄉試會試若有懷挾及令人代作者漢人南人有居父母喪服應舉者並殿二舉蕙田案此懷挾倩代匿喪之禁國子監學嵗貢生員及伴讀出身並依舊制願試者聴中選者於監學合得資品上従優銓注蕙田案此監生預試别路附籍䝉古色目漢人大都上都有恒産住經年深者従兩都官司依上例推舉就試其餘去處冒貫者治罪蕙田案此冒籍之禁又案元中書省所定科場條目皆參用宋金之制斟酌損益最為得中自明以來相承用之雖有更定大略不出乎此三月初四日中書省奏准以初七日御試舉人於翰林國史院定委監試官及諸執事初五日各官入院初六日撰策問進呈俟上采取初七日執事者望闕設案於堂前置策題於上舉人入院搜檢訖蒙古人作一甲序立禮生導引至於堂前望闕兩拜賜策題又兩拜各就次色目人作一甲漢人南人作一甲如前儀每進士一人差䝉古宿衞士一人監視日午賜膳進士納卷畢出院監試官同讀卷官以所對策第其高下分為三甲進奏作二榜用敕黄紙書揭于内前紅門之左右前一日禮部告諭中選進士以次日詣闕前所司具香案侍儀舍人唱名謝恩放榜擇日賜恩榮宴於翰林國史院押宴以中書省官凡預試官並預宴預宴官及進士並簪華至所居擇日恭詣殿延上謝恩表次日詣中書省參見又擇日進士詣先聖廟行舍菜禮第一人具祝文行事刻石題名於國子監元統癸酉科廷試進士稍異其制左右榜各三人皆賜進士及第餘賜出身有差科舉取士莫盛於斯後三年其制遂罷又七年而復興遂稍變程式減蒙古色目人明經二條増本經義易漢南人第一場四書疑一道為本經疑増第二場古賦外於詔誥章表内又科一道此有元科目取士之制大略如此蕙田案元自延祐二年設科至元統元年凡七科而廢至正二年復科舉至二十六年凡九科先後共十有六科其進士額多不過百人少者僅三十餘人若夫會試下第者自延祐創設之初丞相特穆徳爾阿克繖及平章李孟等奏下第舉人年七十以上者與従七品流官致仕六十以上者與教授元有出身者於應得資品上稍優加之無出身者與山長學正受省劄後舉不為例今有來遲而不及應試者未曽區用取㫖帝曰依下第例恩之勿著為格泰定元年三月中書省臣奏下第舉人蒙古色目人年三十以上并兩舉不第者與教授以下與學正山長漢人南人年五十以上并兩舉不第者與教授以下與學正山長先有資品出身者更優加之不願仕者令備國子員後勿為格従之自餘下第之士恩例不可常得間有試補書吏以登仕籍者惟已廢復興之後其法始變下第者悉授以路府學正及書院山長又増取鄉試備榜亦授以郡學錄及縣教諭於是科舉取士得人為盛焉蕙田案下第舉人授教職始此右元取士明史選舉志明制科目為盛卿相皆由此出科目者沿唐宋之舊而稍變其試士之法専取四子書及易書詩春秋禮記五經命題試士葢太祖與劉基所定其文略仿宋經義然代古人語氣為之體用排偶謂之八股通謂之制義顧氏炎武曰經義之文流俗謂之八股葢始於成化以後股者對偶之名也天順以前經義之文不過敷演𫝊注或對或散初無定式其單句題亦甚少成化二十三年會試樂天者保天下文起講先提三句即講樂天四股中間過接四句復講保天下四股復收四句再作大結𢎞治九年會試責難於君謂之恭文起講先提三句即講責難於君四股中間過接二句復講謂之恭四股復收二句再作大結每四股之中一反一正一虚一實一淺一深其兩扇立格則每扇之中各有四股其次第之法亦復如之故今人相𫝊謂之八股若長題則不拘此嘉靖以後文體日變而問之儒生皆不知八股之何謂矣發端二句或三四句謂之破題大抵對句為多此宋人相𫝊之格下申其意作四五句謂之承題然後提出夫子為何而發此言謂之原起至萬歴中破止二句承止三句不用原起篇末敷演聖人言畢自攄所見或數十字或百餘字謂之大結明初之制可及本朝時事以後功令益宻恐有藉以自􅃷者但許言前代不及本朝三年大比以諸生試之直省曰鄉試中式者為舉人次年以舉人試之京師曰會試中式者天子親策於廷曰廷試亦曰殿試分一二三甲以為名第之次一甲止三人曰狀元榜眼探花賜進士及第二甲若干人賜進士出身三甲若干人賜同進士出身狀元榜眼探花之名制所定也而士大夫又通以鄉試第一為解元會試第一為會元二三甲第一為𫝊臚云顧氏炎武曰舉人者舉到之人北齊書鮮于世榮𫝊以本官判尚書省右僕射事與吏部尚書袁聿修在尚書省簡試舉人舊唐書高宗紀顯慶四年二月乙亥上親策試舉人調露元年十二月甲寅臨軒試應岳牧舉人是也登科則除官不復謂之舉人而不第則須再舉贑州府志曰鄉舉在宋為􅒩試謂之發解第階之解送南宫會試耳試不第者須再試未階以入仕也及累舉不第然後有推恩焉謂之特奏者不復繋諸鄉舉矣元時亦然至明始定為入仕之途則一代之新制也之案宋時亦有不須再試而送南宫者謂免解進士不若今人以舉人為一定之名也進士乃諸科目中之一科而𫝊中有言舉進士者有言舉進士不第者但云舉進士則第不第未可知之辭不若今人已登科而後謂之進士也自本人言之謂之舉進士自朝廷言之謂之舉人進士即是舉人不若今人以鄉試榜謂之舉人會試榜謂之進士也蕙田案解元會元之名金史選舉志已有之子午卯酉年鄉試辰戌丑未年會試鄉試以八月會試以二月皆初九日為第一場又三日為第二場又三日為第三場蕙田案元代試進士以子午卯酉年鄉試以寅申己亥年明初洪武三年庚戌四年辛亥再舉鄉試亦非子午卯酉年此制乃洪武十七年所定初設科舉時初場試經義二道四書義一道二場論一道三場策一道中式後十日復以騎射書算律五事試之後頒科舉定式初場試四書義三道經義四道四書主朱子集註易主程𫝊朱子本義書主蔡氏𫝊及古註疏詩主朱子集𫝊春秋主左氏公羊穀梁三𫝊及胡安國張洽𫝊禮記主古註疏永樂間頒四書五經大全廢註疏不用其後春秋亦不用張洽𫝊禮記止用陳澔集説二場試論一道判五道詔誥表内科一道三場試經史時務策五道廷試以三月朔鄉試直𨽻於京府各省於布政司會試於禮部主考鄉會試俱二人同考鄉試四人會試八人提調一人在内京官在外布政司官會試禮部官監試二人在内御史在外按察司官會試御史供給收掌試卷彌封謄錄對讀受卷及巡綽監門搜撿懷挾俱有定員各執其事舉子則國子生及府州縣學生員之學成者儒士之未仕者官之末流者皆由有司申舉性資敦厚文行可稱者應之其學校訓導専教生徒及罷閑官吏倡優之家與居父母喪者俱不許入試試卷之首書三代姓名及其籍貫年甲所習本經所司印記試日入場講問代冒者有禁晚未納卷給燭三枝文字中迴避御名廟號及不許自序門地彌封編號作三合字考試者用墨謂之墨卷謄錄用硃謂之硃卷試士之所謂之貢院諸生席舍謂之號房人一軍守之謂之號軍試官入院輒封鑰内外門戸在外提調監試等謂之外簾官在内主考同考謂之内簾官廷試用翰林及朝臣文學之優者為讀卷官共閲對策擬定名次候臨軒或如所擬或有所更定𫝊制唱第狀元授修撰榜眼探花授編修二三甲考選庶吉士者皆為翰林官其他或授給事御史主事中書行人評事太常國子博士或授府推官知州知縣等官舉人貢生不第入監而選者或授小京職或授府佐及州縣正官或授教職此明一代取士之大略也初太祖起事首羅賢才呉元年設文武二科取士之令使有司勸諭民間秀士及智勇之人以時勉學俟開舉之嵗􅂶貢京師洪武三年詔曰漢唐及宋取士各有定制然但貴文學而不求徳藝之全前元待士甚優而權豪勢要每納奔競之人夤緣阿附輒竊仕祿其懷才抱道者恥與並進甘隠山林而不出風俗之弊一至於此自今年八月始特設科舉務取經明行修博通古今名實相稱者朕将親策於廷第其高下而任之以官使中外文臣皆由科舉而進非科舉者毋得與官於是京師行省各舉鄉試直𨽻貢額百人河南山東山西陜西北平福建江西浙江湖廣皆四十人廣西廣東皆二十五人才多或不及者不拘額數高麗安南占城詔許其國士子於本國鄉試貢赴京師明年會試取中一百二十名帝親製策問試於奉天殿擢呉伯宗第一午門外張掛黄榜奉天殿宣諭賜宴中書省授伯宗為禮部員外郎餘以次授官有差時以天下初定令各行省連試三年且以官多缺員舉人俱免會試赴京聴選又擢其年少俊異者張唯王輝等為翰林院編修蕭韶為秘書監直長令入禁中文華堂肄業太子贊善大夫宋濓等為之師帝聴政之暇輒幸堂中評其文字優劣日給光祿寺酒饌每食皇太子親王迭為之主賜白金弓矢鞍馬及冬夏衣寵遇之甚厚既而謂所取多後生少年能以所學措諸行事者寡但令有司察舉賢才而罷科舉不用至十五年復設十七年始定科舉之式命禮部頒行各省後遂以為永制而薦舉漸輕久且廢不用矣十八年廷試擢一甲進士丁顯等為翰林修撰二甲馬京等為編修呉文為檢討進士之入翰林自此始也使進士觀政於諸司其在翰林承敕監等衙門者曰庶吉士進士之為庶吉士亦自此始也其在六部都察院通政司大理寺等衙門者仍稱進士觀政進士之名亦自此始也鄉試之額洪武十七年詔不拘額數従實克貢洪熙元年始有定額其後漸増至正統間南北直𨽻定以百名江西六十五名他省又自五而殺至雲南二十名為最少嘉靖間増至四十而貴州亦二十名慶歴啟禎間兩直𨽻益増至一百三十餘名他省漸増無出百名者交阯初開以十名為額迨棄其地乃止會試之額國初無定少至三十二人其多者若洪武乙丑永樂丙戌至四百七十二人其後或百名或二百名或二百五十名或三百五十名増損不一皆臨期奏請定奪至成化乙未而後率取三百名有因題請及恩詔而廣五十名或百名者非恒制也蕙田案會試中額臨期奏請始於此初制禮闈取士不分南北自洪武丁丑考官劉三吾白信蹈所取宋琮等五十二人皆南士三月廷試擢陳䢿為第一帝怒所取之偏命侍讀張信等十二人覆閱䢿亦與焉帝猶怒不已悉誅信蹈及信䢿等戍三吾於邉親自閲卷取任伯安等六十一人六月復廷試以韓克忠為第一皆北士也然訖永樂間未嘗分地而取洪熙元年仁宗命楊士竒等定取士之額南人十六北人十四宣徳正統間分為南北中卷以百人為率則南取五十五名北取三十五名中取十名景泰初詔書遵永樂間例二年辛未禮部方奉行而給事中李侃争之言部臣欲専以文詞多取南人刑部侍郎羅綺亦助侃言事下禮部覆奏臣等奉詔書非私請也景帝命遵詔書不従侃議未㡬給事中徐廷章復請依正統間例五年甲戌會試禮部奏請裁定於是復従廷章言分南北中卷南卷應天及蘇松等府浙江江西福建湖廣廣東北卷順天山東山西河南陜西中卷四川廣西雲南貴州及鳯陽廬州二府滁徐和三州也成化二十二年萬安當國周洪謨為禮部尚書皆四川人乃因布政使潘稹之請南北各減二名以益於中𢎞治二年復従舊制嗣後相沿不改惟正徳三年給事中趙鐸承劉瑾指請廣河南陜西山東西鄉試之額乃増陜西為百河南為九十五山東西俱九十而以會試分南北中卷為不均乃増四川額十名并入南卷其餘并入北卷南北均取一百五十名葢瑾陜西人而閣臣焦芳河南人票㫖相附和各徇其私瑾芳敗旋復其舊蕙田案分路取士之例宋金元已有之南北中卷之分則自明代始初制兩京鄉試主考皆用翰林而各省考官先期於儒官儒士内聘明經公正者為之故有不在朝列累秉文衡者景泰三年令布按二司同巡按御史推舉見任教官年五十以下三十以上文學亷謹者聘充考官於是教官主試遂為定例其後有司徇私聘取或非其人監臨官又往往侵奪其職掌成化十五年御史許進請各省俱視兩京例特命翰林主考帝諭禮部嚴飭私弊而不従其請屢戒外簾官毋奪主考權考官不當則舉主連坐又令提學考定教官等第以備聘取然相沿既久積習難移𢎞治十四年掌國子監謝鐸言考官皆御史方面所辟召職分既卑聴其指使以外簾官預定去取名為防閑實則闗節而科舉之法壞矣乞敕兩京大臣各舉部屬等官素有大望者每省差二員主考庶㡬前弊可革時未能従嘉靖七年用兵部侍郎張璁言各省主試皆遣京官或進士每省二人馳往初兩京房考亦皆取教職至是命各加科部官一員閲兩科兩京房考復罷科部勿遣而各省主考亦不遣京官至神宗十一年詔定科場事宜部議復舉張璁之説言彼時因主考與監臨官禮節小嫌故行止二科而罷今宜仍遣廷臣由是浙江江西福建湖廣皆用編修檢討他省用科部官而同考亦多用甲科教職僅取一二而已葢自嘉靖二十五年従給事中萬虞愷言各省鄉試精聘教官不足則聘外省推官知縣以益之四十三年又従南京御史奏兩京同考用京官進士易詩書各二人春秋禮記各一人其餘乃參用教官神宗四年復議兩京同考教官衰老者遣回北京取足於觀政進士候補甲科南京於附近知縣推官取用至是教官益絀初制會試同考八人三人用翰林五人用教職景泰五年従禮部尚書胡濙請俱用翰林部曺其後房考漸増至正徳六年命用十七人翰林十一人科部各三人分詩經房五易經書經各四春秋禮記各二嘉靖十一年禮部尚書夏言論科場三事其一言會試同考例用講讀十一人今講讀止十一人當盡入場方足供事乞於部科再簡三四人以補翰林不足之數世宗命如所請然偶一行之輒如其舊神宗十一年以易卷多減書之一以増於易十四年書卷復多乃増翰林一人以補書之缺至四十四年用給事中余懋孳奏詩易各増一房共為二十房翰林十二人科部各四人至明末不變洪武初賜諸進士宴於中書省宣徳五年賜宴於中軍都督府八年賜宴於禮部自是遂著為令歴科事跡稍異者永樂初兵革倉猝元年癸未始令各省鄉試二年甲申會試以事變不循午未之舊七年己丑會試中陳燧等九十五人成祖方北征皇太子令送國子監進學俟車駕還京廷試九年辛卯始擢蕭時中第一宣徳五年庚戌帝臨軒發策畢退御武英殿謂翰林儒臣曰取士不尚虚文有若劉蕡蘇軾輩直言抗論朕當顯庸之乃賦策士歌以示讀卷官顧所擢第一人林震亦無所表見也八年癸丑廷試第一人曺鼐由江西泰和典史會試中式正統七年壬戌刑部吏南昱公陵驛丞鄭温亦皆中式十年乙丑會試廷試皆商輅第一輅淳安人宣宗末年乙卯浙榜第一人三試皆第一士子艷稱為三元明代惟輅一人而已廷試讀卷盡用甲科而是年兵部尚書徐晞户部侍郎奈亨乃吏員天順元年丁丑讀卷左都御史楊善乃譯字生時猶未甚拘流品也迨後無雜流會試及為讀卷官者矣七年癸未試日場屋火死者九十餘人俱贈進士出身改期八月會試明年甲申三月始廷試時英宗已崩憲宗以大喪未踰嵗御西角門策之正徳三年戊辰太監劉瑾錄五十人姓名以示主司因廣五十之額十五年庚辰武宗南巡未及廷試次年世宗即位五月御西角門策之擢楊維聰第一而張璁即是榜進士也六七年間當國用事權侔人主矣嘉靖十四年乙未親製策問手自批閲擢韓應龍第一降諭論一甲三人及三甲第一名次前後之由禮部因以聖諭列登科錄之首而十二人對策俱以次刋刻二十年辛丑考選庶吉士題文曰原政詩曰讀大明律皆欽降也四十四年乙丑廷試帝始不御殿神宗時御殿益稀矣天啟二年壬戌會試命大學士何宗彦朱國祚為主考故事閣臣典試翰詹一人副之國祚疏辭帝曰今嵗朕首科特用二輔臣以光重典卿不必辭嗣後二輔臣典試為常崇禎七年甲戌知貢舉禮部侍郎林釪言舉人顔茂猷文兼五經作二十三義帝念其該洽許送内簾茂猷中副榜特賜進士以其名另為一行刻于試錄第一名之前五經中式者自此不絶矣王圻續通考明初令有司保舉人材即古鄉舉里選之遺意累朝下詔亦必及之太祖洪武庚子遣使徵宋濓劉基章溢葉琛至金陵元年詔起懷才抱徳隠于巖穴之士遣夏原吉等分行天下訪求賢才六年命禮部訪求賢士于天下上曰古之聖王恒汲汲於求賢若高宗之於傅説文王之於吕尚二君者豈其智之不足而遑遑于版築鼔刀之徒實以天下之大非人君之所能獨理而賢才不備不足以為治也今山林之士豈無徳行文藝有足稱者宜令有司以禮起送至京朕将任用之以圗至治是年罷科舉専用辟薦其目有明經行修有懐才抱徳有賢良方正有人才有孝亷鄉舉于朝而各省貢士皆卒業太學以次除用葢罷進士之科者十有餘年時既不喜文士又以初立辟薦法行之甚嚴每舉者至京上親校閲不稱㫖輒坐舉主往往有謫戍者至洪武十五年復開科蕙田案明初薦舉之目曰聰明正直曰賢良方正曰孝弟力田曰儒士曰孝亷曰秀才曰人才曰耆民皆見于史志者與王圻所舉略有不同自科舉既復之後仍不廢薦舉建文永樂間猶有以薦舉起家内授翰林外授藩司者宣徳以後進士之科日重間下求賢之詔亦徒應故事而已至如天順之呉與弼成化之陳獻章皆以理學名儒特膺徵辟此又以人而重者也右明取士五禮通考卷一百七十五
