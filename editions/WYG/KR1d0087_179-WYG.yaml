body:
  text: 五禮通考卷一百六十九刑部尚書秦蕙田撰嘉禮四十二學禮蕙田案古之王者建國君民敎學為先太學之制昉于五帝其名為成均虞曰庠夏曰序殷曰瞽宗周曰辟廱又兼立四代之學是為五學又有門闈之小學以教國子四郊之小學以敎國人待其既長然後由小學而進于太學焉其鄉遂州黨亦各有學諸侯之國亦立太學小學鄉學蓋三代以上莫不以立學為先務其敎之之法國子則師氏詔以三徳保氏詔以六藝大司樂詔以樂徳樂語樂舞春秋教以禮樂冬夏教以詩書中年而考校九年而大成其秀者官之其不率教者屏之至於鄉學則鄉遂之吏受教法于司徒以鄉三物教之嵗時書其徳行道藝三年大比興其賢能而登于天府又中年論其秀者升于太學俾與國子齒焉諸侯則嵗貢其太學之秀者天子試之射宮視其賢否而行慶讓之法以是知先王之於士教之必周擇之必慎而後可收得人之效也天子又以春秋視學修釋菜之儀舉養老之典承師問道合語乞言以身先為之嚮導故學士莫不蒸蒸丕變相與勉為賢者而恥為不肖然則學之禮顧不重哉古禮經有學禮一篇見於大戴禮賈誼新書所引惜其文不傳今採録經傳以補禮經之闕而後世學校選舉視學養老經筵見於史者俱以類附之其釋奠儀節已見吉禮故不及云禮記王制有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊注皆學名也異者四代相變耳或上西或上東或貴在國或貴在郊上庠右學大學也在西郊下庠左學小學也在國中王宮之東東序東膠亦大學在國中王宫之東西序虞庠亦小學也西序在西郊周立小學于西郊膠之言紏也庠之言養也周之小學為有虞氏之庠制是以名庠云其立鄉學亦如之膠或作絿貴疏虞殷尚質貴取有成故大學在西小學在東夏周文取積漸長養故大學在東小學在西云周之小學為有虞氏之庠制者庠則後有室前有堂若夏后氏之序及周之學所在序者皆與庠制同其州黨之序則歇前而已序則豫也故鄉射云豫則鉤楹内堂則由楹外彼鄭注豫讀如成周宣榭火之榭是也云其立鄉學亦如之者言鄉學亦為庠制故上文云耆老皆朝于庠是也周大學在國之西郊鄭駮異義云三靈一雍在郊者熊氏云文王之時猶從殷禮故辟廱太學在郊内則有虞氏養國老于上庠養庶老于下庠夏后氏養國老于東序養庶老于西序殷人養國老于右學養庶老于左學周人養國老于東膠養庶老于虞庠虞庠在國之西郊蕙田案虞殷之太學在西夏周之太學在東東膠又在辟廱之東故大戴禮謂之東學以其法夏后氏之序故亦曰東序對郊外小學而言故以東膠為大學祭義食三老五更于太學亦謂東膠也王制天子曰辟廱注辟明也廱和也所以明和天下下疏謂於此學中習學道藝欲使天之人悉皆明達諧和也案詩注云王廱水之外圓如璧二注不同者此注解其義詩注解其形詩大雅靈臺虡業維樅賁鼓維鏞於論鼔鐘於樂辟廱傳植者曰虡横者曰栒業大版也樅崇牙也賁大鼔也鏞大鐘也論思也水旋丘如璧曰辟廱以節觀者箋論之言倫也虡也栒也取以懸鐘鼓也設大版于上刻畫以為餙於得其倫理乎鼓與鐘也於喜樂乎諸在辟廱中者言成于中和之至不疏此在辟廱合樂必行養老之禮但主言樂之得理美養老之事故言不及焉張子曰辟廱古無此名其制蓋始于此故周有天下遂以名天子之學而諸侯不得立焉於論鼓鐘於樂辟廱鼉鼔逢逢矇瞍奏公傳逢逢和也有眸子而無見曰矇無眸子曰瞍公事也箋凡聲使瞽矇為之蕙田案天子視學大昕鼓徴以警衆及天子至始大合樂故於鼓獨一再言之周頌振鷺振鷺于飛于彼西雝薛君章句鷺潔白之鳥也西雍文王之雍也言文王之時辟雍學士皆潔白之人也何氏楷曰辟通作璧廱説文謂天子鄉飲之地即辟廱也字从广雝聲按廱字當从广下邕广讀若儼象對刺髙屋之形四方有水曰邕辟廱之制四面有水環之正合邕義从邕為意兼聲今不諧邕而諧雝殊不可解雝者鳥名也漢書又通作雍考説文乃無雍字三輔黄圖云周文王辟廱在長安西北四十里亦曰璧廱如璧之圓壅之以水象教化流行也蔡邕云水廣二十四丈四周于外禮統云内如覆外如偃盤毛云水旋丘如璧曰璧廱以節觀者孔云璧體圓而内有孔此水亦圓而内有地猶如璧然土之髙者曰邱此水内之地未必髙於水外正謂水下而地髙故以邱言之以水繞邱所以節約觀者令在外而觀也陳祥道云辟廱外圓内方明徳當圓行當方考之於禮鬴簋錢璧之類皆外圓内方圓而函方隂陽之義也漢明帝視辟廱人圜橋門而觀周制宜亦然也今案據此則辟廱之説本自明白繹其字義即其制度亦可想見後人紛紛妄生異論白虎通謂辟之為言積也積天下之道徳也雍之為言壅也壅天下之殘賊故謂之辟雍也韓詩説謂言辟取辟有徳不言辟水言辟廱者取其廱和也禮記注疏謂辟明也於此學中習學道藝欲使天下之人悉皆明達和諧樂書謂夏后氏以序名學則主以禮射而畧於樂商人以瞽宗名學則主以樂教而畧於禮周人兼而用之而名其學以辟廱辟者法之所自出本之以為禮廱者和之所自生本之以為樂辟廱以本之則禮樂之教足以同人心出治道胡致堂謂靈臺詩言鳥獸昆蟲各得其所鼔鐘虡業莫不均調於此所樂之徳惟辟雍而已辟君也雍和也文王有聲所謂鎬京辟雍義亦若此皆以己意穿鑿附㑹最誤學者故詳闢之鄭云辟廱三靈皆同處在郊今按黄圖載靈臺辟廱皆在長安西北四十里則同處之説不為無據頌振鷺于飛于彼西雝先儒亦謂辟廱在西郊故曰西雝也韓詩説謂辟廱在南方七里之内此不足信孫鑛云東漢左辟廱右靈臺正是法周蓋二地相近大雅文王有聲鎬京辟廱自西自東自南自北無思不服皇王烝哉箋武王於鎬京行辟廱之禮自四方來觀者皆感化其徳心無不歸服者疏辟廱之禮謂養老以教孝弟也張子曰靈臺辟廱文王之學也鎬京辟雍武王之學也至此始立為天子之學矣何氏楷曰武王遷鎬已乆及有天下鎬始稱京辟廱在鎬京中所以教天子春射秋饗尊事三老五更之處武王所首重故特舉而言之蕙田案周於國中立五學而辟廱居其中其東西南北四學則為教國子肄業之地故武王臨辟廱而四學之士咸來觀禮莫不感化於徳心悦而誠服周之作人於斯為盛經云自西自東自南自北謂成均上庠瞽宗東序之學者非汎指四方之人也白虎通徳論辟雍所以行禮樂宣徳化也辟者象璧圓以法天也雍者雍之以水象教化流行也辟之為言積也積天下道治雍之為言壅也壅天下之儀則故謂辟雍也王制曰天子辟雍諸侯泮宫外圓者欲使觀者平均也又欲言外圓内方明徳當圓行當方也周禮春官大司樂掌成均之法注董仲舒云成均五帝之學文王世子曰於成均以及取爵于上尊然則周人立此學之宮鄭氏鍔曰大司樂所掌者樂也周人於成均之中教樂徳樂舞樂語則成均乃習學之所大司樂所掌者樂官之法以治學政則於他學之法無預可知名曰成均者徳不能無虧性不能皆平樂之為教所以成之均之凡有道有徳者使教焉死則以為樂祖祭於瞽宗注鄭司農云明堂位曰瞽宗殷學也以此觀之祭於學宫中在疏文王世子云春誦夏絃太師詔之瞽宗以其教學瞽宗故祭樂祖還在瞽宗禮記文王世子春夏學干戈秋冬學羽籥皆于東序春誦夏絃太師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠注周立三代之學學書于有虞氏之學興謨之教所興也學舞于夏后氏之學文武中也學禮樂于殷之學功成治定與已同也凡祭與養老乞言合語之禮皆小學正詔之于東序大司成論説在東序凡語于郊者於成均以及取爵于上尊也注董仲舒曰五帝名大學曰成均蕙田案文王世子曰成均曰東序曰瞽宗曰上庠獨不及辟廱者以此篇主學世子及學士而言辟廱非教學之所也祭義天子設四學當入學而大子齒陸氏佃曰天子立四學并其中學而立直于一處並建周人辟雍則辟雍最居中其南為成均其北為上庠其東為東序其西為瞽宗當學禮者就瞽宗學書者就上庠學舞干戈羽籥者就東序學樂徳樂舞樂語者就成均辟雍唯天子承師問道食三老五更及出師受成等就焉學禮曰帝入東學尚親而貴仁東序是也帝入南學尚齒而貴誠成均是也帝入西學尚賢而貴徳瞽宗是也帝入北學尚貴而尊爵上庠是也帝入太學承師而問道辟雍是也總而言之四學亦大學也若辟雍雖太子不得預太子入學學者所學之宫也辟雍非其所學之宮故云四學鄭氏鍔曰周人立五學中曰辟雍環之以水水南為成均水北為上庠東為東序西為瞽宗學禮者就瞽宗學書者就上序學舞干戈羽籥者就東序學樂徳樂舞樂語者就成均惟天子承師問道及養老更之類乃就辟雍故大戴禮有帝入東學西學南學北學太學之文蓋周人立四代之學禮記云於成均以及取爵于上尊也又云瞽宗商學也然上庠下庠虞也東序西序夏也左學右學商也東膠虞庠周也不見成均為何代之學獨董仲舒謂五帝學康成從之他無所見或者以成均為辟雍豈其然歟蕙田案陸氏鄭氏解四學五學之説極精惟云食三老五更就辟雍則未然三老五更之位在東序不在辟廱也食三老五更于太學所以教諸侯之弟也祀先賢于西學所以教諸侯之徳也注西學周小學也先賢有道徳王所使敎國子者疏周之小學在西郊王制云養庶老於虞庠虞庠在國之西郊是也陳氏禮書記曰天子視學命有司行事祭先師先聖焉卒事遂適東序設三老五更之席又曰食三老五更於太學所以教諸侯之弟祀先賢於西學所以教諸侯之徳夫天子視學則成均也命有司行事祭先師先聖焉即祀先賢於西學也祀先賢于西學則祭於瞽宗也有司卒事適東序設三老五更之席即養國老於東膠也養國老于東膠即食三老五更於大學也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學蓋夏學上東而下西商學上右而下左周之所存特其上者耳蕙田案注以西學為西郊之虞庠不如陳氏主瞽宗之的然陳氏謂天子視學在成均則又誤以成均辟廱為一射義天子將祭必先習射于澤澤者所以擇士也郊特牲卜之日王立於澤注澤澤宫也所以擇賢之宮也朱子曰王制論學天子曰辟雍諸侯曰泮宮説者以為辟廱大射行禮之處也水旋丘如璧以節觀者泮宫諸侯鄉射之宮也其水半之蓋東西門以南通水北無也故振鷺之詩曰振鷺于飛于彼西雝説曰以雝為澤蓋即旋丘之水而其學即所謂澤宫也蓋古人之學與今日不同孟子所謂序者射也則學蓋有以射為主者矣蘇氏引莊周言文王有辟廱之樂遂以辟廱亦為樂名而曰古人以樂教胄子則未知學以樂而得名歟樂以學而得名歟則是又以為習樂之所也記所謂魯人將有事于上帝必先有事於泮宫者蓋射以擇士云耳蕙田案孟子云序者射也澤宫為習射之所其當在東序與大戴禮保𫝊篇學禮曰帝入東學上親而貴仁則親踈有序始思相及矣帝入南學上齒而貴信則長㓜有差始民不誣矣帝入西學上賢而貴徳則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而始下不踰矣注四學者東序瞽宗虞庠及四代之學也春氣温養故上親夏物咸小大殊故上齒秋物成實故貴徳冬時物藏于地惟象于天半見也故上爵也帝入太學承師問道退習而端于太傅太傅罰其不則而達其不及則徳智長而理道得矣蕙田案此文亦見于賈誼新書漢書賈誼傳其所引學禮蓋古禮經之文而今不傳矣周立四代之學于國又立辟廱于中故有五學盧辨注大戴禮亦未明晰易傳太初篇太子旦入東學晝入南學暮入西學在中央曰太學天子之所自學也蕙田案蔡邕明堂論引此又引大戴保傅篇云與易傳同則此文當有夜入北學四字傳冩偶脱之耳云太學天子所自學則世子不得與可知與祭義四學之説互相發明又案天子之學有五中為辟廱亦曰太學天子視學則臨之其南為成均亦曰南學學樂徳樂舞樂語者居之成均者五帝之學也其北為上庠亦曰北學學書者居之上庠者虞學也其東為東序亦曰東膠亦曰東學學干戈羽籥者居之東序者夏學也其西為瞽宗亦曰右學亦曰西學學禮者居之瞽宗者殷學也辟廱居其中四學環其外辟廱為天子講禮之學雖世子齒學亦不得就焉四學為學世子及學士之學故大司樂掌成均之法大司成論說于東序大師詔禮于瞽宗典書者詔書於上庠祭義云四學據世子齒學而言學禮云五學據天子入學而言其實一也以四學對辟廱則辟廱為太學以郊外之小學對四學則四學亦為太學矣至郊外之小學則倣虞氏下庠之制謂之虞庠在國之西郊皇侃謂四郊皆有虞庠然經無其文不可知也先儒説學校之制人各一説紛如聚訟今以學禮五學祭義四學㕘之文王世子王制周禮詩大雅諸文反覆討論惟陸農師鄭剛中之説獨為精當故依用之其漢唐以來諸儒之説臚陳於後畧為辨正庶知所折衷焉辨諸儒以辟廱與明堂太廟為一詩靈臺孔疏異義公羊説天子有靈臺以觀天文有時臺以觀四時施化有囿臺觀鳥獸魚鱉諸侯當有時臺囿臺諸侯卑不得觀天文無靈臺皆在國之東南二十五里韓詩説辟廱者天子之學圓如璧壅之以水示圓言辟取辟有徳不言辟水言辟廱者取其廱和也所以教天下春射秋饗尊事三老五更在南方七里之内立明堂於中五經之文所蔵處蓋以茅草取其潔清也左氏説天子靈臺在太廟之中壅之靈沼謂之辟廱諸侯有觀臺亦在廟中皆以望嘉祥也謹案公羊傳左氏説皆無明文説各無以正之元之聞也禮記王制天子命之教然後為學小學在公宮南之左大學在郊天子曰辟廱諸侯曰泮宫天子將出征受命于祖受成于學出征執有罪反釋奠于學以訊馘告然則太學即辟廱也詩頌泮水云既作泮宫准夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚此復與辟廱同義之證也大雅靈臺一篇之詩有靈臺有靈囿有靈沼有辟廱其如是也則辟廱與靈䑓皆同處在郊矣囿也沼也同言靈於臺下為囿為沼可知小學在公宮南之左大學在西郊王者相變之宜衆家之説各不明晳雖然於郊差近之耳在廟則逺矣王制與詩其言察察亦足以明之矣如鄭此説靈臺與辟廱同處辟廱即天子太學也鄭以靈臺辟廱在西郊則與明堂宗廟皆異處矣案大戴禮盛德篇云明堂者所以明諸侯尊卑也外水名曰辟雍政穆篇云太學明堂之東序也如此文則辟廱明堂同處矣故諸儒多用之盧植禮記注云明堂即太廟也天子太廟上可以望氣故謂之靈臺中可以序昭穆故謂之太廟圜之以水似璧故謂之辟廱古法皆同一處近世殊異分為三耳蔡邕月令論云取其宗廟之清貌則曰清廟取其正室之貌則曰太廟取其堂則曰明堂取其四門之學則曰太學取其周水圓如璧則曰辟廱異名而實一也潁子容春秋釋例云太廟有八名肅然清静謂之清廟行禘祫序昭穆謂之太廟告朔行政謂之明堂行饗射養國老謂之辟廱占雲物望氣祥謂之靈臺其四門之學謂之大學其中室謂之大室總謂之宮賈逵服䖍注左傳亦云靈臺在太廟明堂之中此等諸儒皆以廟學明堂靈臺為一鄭必知皆異處者袁凖正論云明堂宗廟太學禮之大物也事義不同各有所為而世之論者合以為一體取詩書放逸之文經典相似之語而致之不復考之人情騐之道理失之逺矣夫宗廟之中人所致敬幽隱清静鬼神所居而使衆學處焉饗射其中人鬼慢黷死生交錯囚俘截耳瘡痍流血以干犯鬼神非其理矣且夫茅茨采椽至質之物建日月乗玉輅以處其中象箸玉杯而食于土簋非其類也如禮記先儒之言明堂之制四面東西八丈南北六丈禮天子七廟左昭右穆又有祖宗不在數中以明堂之制言之昭穆安在若又區别非一體也夫宗廟鬼神之居祭天而於人鬼之室非其處也夫明堂法天之宫非鬼神常處故可以祭天而以其祖配之配其父於天位可也事天而就人鬼則非義也自古帝王必立大小之學以教天下有虞氏謂之上庠下庠夏后氏謂之東序西序殷謂之右學左學周謂之東膠虞庠皆以養老乞言明堂位曰瞽宗殷學也文王世子春夏學干戈秋冬學羽籥皆於東序又曰秋學禮冬學書禮在瞽宗書在上庠此周立三代之學也可謂立其學不可謂立其廟然則太學非宗廟也又曰世子齒于學國人觀之宗廟之中非百姓所觀也是故明堂者大朝諸侯講禮之處宗廟享鬼神嵗覲之宫辟雍大射養孤之處大學衆學之居靈臺望氣之觀各有所為非一體也古有王居明堂之禮月令則其序也天子居其中學士處其内君臣同處非其義也明堂以祭鬼神故亦謂之廟明堂大廟者明堂之内大室非宗廟之太廟也於辟廱獻㨗者謂鬼神惡之也王制釋奠于學以訊馘告其上句曰小學在公宮之左大學在郊明大學非廟也非所以為證也周人養庶老于虞庠虞庠在國之西郊今王制亦小學近而太學逺其言乖錯非以為正也左氏曰公既視朔遂登觀臺以其言遂故謂之同處夫遂者遂事之名不必同處也馬融云明堂在南郊就陽位而宗廟在國外非孝子之情也古文稱明堂隂陽者所以法天道順時政非宗廟之謂也融云告朔行政謂之明堂夫告朔行政上下同也未聞諸侯有明堂之稱也順時行政有國皆然未聞諸侯有居明堂者也齊宣王問孟子人皆謂我毁明堂毁諸已乎孟子曰夫明堂者王者之堂也王欲行王政則勿毁之矣夫宗廟之設非獨王者也若明堂即宗廟不得曰夫明堂王者之宗廟也且説諸侯而教毁宗廟為人君而疑於可毁與否雖復淺丈夫未有是也孟子古之賢大夫而皆子思弟子去聖不逺此其一證也竊以凖之此論可以申明鄭意大戴禮遺逸之書文多假託不立學官世無傳者其盛徳篇云明堂外水名曰辟雍政穆篇稱太學明堂之東序皆後人所増失于事實故先儒雖立異端亦不據為説然則明堂非廟而月令云天子居明堂太廟者正謂明堂之太室非宗廟之太廟也明堂位云太廟天子明堂自謂制如明堂非太廟名明堂也廟與明堂不同則靈臺又宜别處故靈臺辟雍皆在郊也蕙田案明堂辟廱本非一地説者以大戴有明堂外水曰辟雍之語而明堂五室辟廱五學又畧相近因傅㑹之馬宫蔡邕盧植潁容王肅諸家皆承其誤惟鄭康成非之而袁凖正論駁之尤詳可謂有卓然之識者矣至袁氏以辟雍與太學為二其誤與孔疏同當分别觀之辨劉氏孔氏以辟廱為小學禮記王制孔疏劉氏以為周之小學為辟廱在郊則太詩靈臺孔疏王制言太學在郊乃是殷制其周制學在國太學雖在國而辟廱仍在郊何則囿沼魚鳥所萃終不可在國中也辟廱與太學為一所以得太學移而辟廱不移者以辟廱是學之名耳王制以殷之辟廱與太學為一故因而説之不必常以太學為辟廱小學亦可矣周立三代之學虞庠在國之西郊則周以虞庠為辟廱矣蕙田案殷制太學在郊文王殷之諸侯故立辟廱于郊辟廱之名剏於文王至武王宅鎬建辟廱于國中遂為周家一代之學諸侯不得立焉文之辟廱殷制也故在郊武之辟廱周制也故在國靈臺辟廱何必在一處疏家比而同之乃以辟廱為小學即西郊之虞庠失之逺矣辨注疏以瞽宗上庠為小學禮記文王世子孔疏東序是大學也春夏學干戈而用動秋冬學羽籥而用静皆據年二十升於太學者若其未升大學之時則春誦夏絃在殷之瞽宗也周立三代之學者謂立虞夏殷學也其虞之學制在國兼在西郊郊則周之小學也夏殷之學亦在國而鄭注儀禮云周立四代之學于國者含周家為言耳故與此注不同夏后氏之學在上庠即周之大學為夏之制也先師以為三代學皆立大學小學今案下養老於東序是周之大學夏之東序也又王制云養老于虞庠是周之小學為虞庠也又此學虞學也學舞于夏學學禮于殷學若周别有大學小學更何所敎也蕙田案疏以東序為大學瞽宗上庠為小學不知三者皆大學也記稱學干戈羽籥于東序學禮于瞽宗學書于上庠干戈羽籥非大于禮與書何故學禮書者獨在小學乎周立虞氏之上庠于國又立虞氏之下庠于郊經云上庠者别于西郊之下庠也注疏誤以上庠即虞庠遂并瞽宗成均俱為小學亦惑矣辨注疏以成均虞庠為一禮記王制注董仲舒曰五帝名大學曰成均則虞庠近是也天子飲酒于虞庠則郊人亦得酌于上尊以相旅成疏春秋繁露云成均為五帝之學虞庠是舜學則均五帝學也以無正文故云近是也周禮大司樂掌成均之法注周人立此學之宫疏即虞庠是也王氏詳説曰世子篇曰謂之郊人逺之于成均以及取爵于上尊也郊人云者郊之小學所謂養老于虞庠是已成均云者國之大學所謂養國老于上庠是已鄭氏以成均為虞庠失之蕙田案王氏辨成均非虞庠虞庠非上庠極是至以成均為上庠則非辨注疏以四學為四郊之學禮記祭義注四學謂周四郊之虞庠也學疏天子設四學謂設四代之學周學也殷學也夏也虞學也天子設四學以有虞庠為小學設置于四郊是天子設四學據周言之皇氏云四郊虞庠為以四郊皆有虞庠蕙田案四學皆大學非四郊之學説見前辨劉氏項氏四學之説劉氏敞曰周人立四代之學者此直謂一處並建四學耳周人辟雍則辟雍敢居中其北為有虞氏之學其東為夏后氏之學其西為商人之學當學羽籥干戈者就東序學禮者就瞽宗學書者就虞庠辟雍惟天子養老及出師成謀與受俘大射等就焉當天子至于辟雍則三學之人環水而觀矣以其包四代之制故記禮者或有指虞庠名之或有指東序名之所以紛紛如此之多者所指之體偏也蕙田案辟雍之南尚有成均一學成均東序瞽宗上庠四代之學也合辟廱為五學劉氏説尚未備江陵項氏松滋縣學記學制之可見於書者自五帝始其名曰成均説者曰以成性也然則有民斯可教有教斯可學自開闢則既然矣有虞氏始即學以蔵菜而命之曰庠又曰米廩則自其孝養之心發之也夏后氏以射造士如行葦矍相之所言而命之曰序則以檢其行也商人以樂造士如夔與大司樂所言而命之曰學又曰瞽宗則以成其徳也學之音則校校之義則教也蓋致於商人先王之所以教者備矣周人修而兼用之内即近郊並建四學虞庠在其北夏序在其東商校在西當代之學居中南面而三學環之命之曰膠又曰辟雍郊言其地璧言其象皆古人假借字也其外亦以四學之制㕘而行之蕙田案項氏説本于原父以瞽宗即校亦未然辨陳氏禮書三學之説陳氏禮書四代之學虞則上庠下庠夏則東序西序商則右學左學周則東膠虞庠而周則又有辟廱成均瞽宗之名則上庠東序右學東膠大學也故國老於之養焉下庠西序左學虞庠小學也故庶老於之養焉記曰天子設四學蓋周之制也周之辟廱即成均也東膠即東序也瞽宗即右學也蓋以其明之以法和之以道則曰辟廱以其成其虧均其過不及則曰成均以習射事則曰序以糾徳行則曰膠以樂祖在焉則曰瞽宗以居右焉則曰右學蓋周之學成均居中其左東序其右瞽宗此大學也虞庠在國之西郊則小學也右學東序蓋與成均並建於一邱之上而已由是觀之成均頒學政右學祀樂祖東序養老更右學東序不特存其制而已又因其所上之方而位之也周之時干戈羽籥在東序絃誦與禮在瞽宗書在上庠以言學者之事始乎書立乎禮成乎樂而舞又樂之成焉故大司樂言樂徳樂語而終于樂舞樂師言樂成告備而終於臯舞孟子言仁義禮樂之實而終於不知手之舞之記言詩言志歌詠聲而終於舞動容此舞之所以為樂之成也由小學之書以進於瞽宗之禮樂由瞽宗之禮樂而成之以東序之舞則周之教法可知矣蕙田案周有五學如陳氏禮書所説止有三學由不知成均與辟雍非一地又誤以上庠為虞庠耳蔡氏徳晉曰天子設四學中為大學名曰成均教者所居以施教之地不在數中外四面為四學南曰辟雍北曰上庠東曰東序西曰瞽宗皆學者所居以肄業之地蕙田案春官大司樂掌成均之法而合國之子弟則成均亦學者肄業之地矣辟雍居中惟天子視學則臨之成均在辟雍之南蔡氏以成均居中非是右天子五學郊外小學附周禮地官師氏居虎門之左司王朝注虎門路􅃦門也保氏使其屬守王闈注闈宮中之巷門屬疏師氏之屬守中門外保氏之守王闈門蔡邕明堂論周官有門闈之學師氏教以三徳守王門保氏教以六藝守王闈蕙田案天子立小學有二其一為門闈之學師氏保氏掌之所以教太子而國之貴游子弟亦學焉其一為郊外之學王制所謂虞庠在國之西郊先儒又謂四郊皆有小學後世既立國子學又立四門學蓋取於此大戴禮保傅篇云王子年八嵗而出就外舍成童而就大學盧辨注云小學謂虎闈師保之學也大學王宫之東者蔡邕明堂論亦云周官有門闈之學而鄭氏注周禮不之及焉亦踈矣世子學於虎門其所與共學者惟王子弟及公卿適子耳其餘大夫元士之子及國中之秀者當學於郊外小學若國中之大學則王制云王太子王子公卿大夫元士之適子國之俊造皆造焉蓋皆由小學而進于大學者也右門闈小學禮記學記古之教者家有塾黨有庠術有序國有學注術當為遂聲之誤也古者仕焉而已者歸教于閭里朝夕坐于門門側之堂謂之塾周禮五百家為黨萬二千五百家為遂黨屬于鄉遂在逺郊之外家疏家有塾者此明塾之所在周禮百里之内二十五為閭同共一巷巷首有門門邊有塾謂民在家之時朝夕出入恒就教于墊黨謂周禮五百家也庠學名也於黨中立學教閭中所升者也術遂也周禮萬二千五百家為遂遂有序亦學名於遂中立學教黨學所升者也國謂天子所都及諸侯國中也周禮天子立四代學以教世子及羣后之子及鄉中俊選所升之士也而尊魯亦立四代學餘諸侯於國但立時王之學也周禮六鄉之内五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉六遂之内五家為鄰五鄰為里四鄰為酇五酇為鄙五鄙為縣五縣為遂今此經六鄉舉黨六遂舉序則餘閭里以上皆有學可知故此注云歸教于閭里其比與鄰近止五家而已不必皆有學鄭注州長職云序州黨之學則黨學曰序故鄉飲酒之義云主人拜迎賔于庠門之外注云庠鄉學也州黨曰序此云黨有庠者是鄉之所居黨為鄉學之庠不别立序凡六鄉之内州學以下皆為庠六遂之内縣學以下皆為序也皇氏云遂學曰庠與此文違其義非也庾氏云黨有庠謂夏殷禮非周法義或然也陳氏禮書鄉曰庠記言黨有庠州曰序記言遂有序何也古之致仕者教子弟於閭塾之基則家有塾云者非家塾也合二十五家而教之於閭塾謂之家有塾則合五黨而教之鄉庠謂之黨有庠可也周禮遂官各降鄉官一等則遂之學亦降鄉一等矣降鄉一等而謂之州長其爵與遂大夫同則遂之學其名與州序同可也蕙田案古字術與遂通用月令審端經術注云術周禮作遂水經注引此文亦云遂有序陳澔謂術當為州非也鄉飲酒義主人拜迎賔于庠門之外周禮地官州長春秋以禮㑹民而射于州序注序州黨之學也疏黨正云飲酒于序故知州黨學同名為序若鄉則立庠故禮記鄉飲酒義云主人迎賔于庠門之外彼郷大夫行賔賢能非州長黨正所行故知庠則鄉學也黨正以禮屬民而飲酒于序陳氏禮書孟子曰庠者養也序者射也鄉飲酒尊兩壺于房户之間鄉射尊於賔席之東蓋鄉飲在庠而庠有房室故尊于房户之間鄉射在序而序無房室故尊於賔席之東而已鄉射禮豫鄭氏曰今文豫為序則鉤楹内堂則由楹外堂序也序則物當棟堂則物當楣是於其有室則所揖所履之位淺而前於其無室則所揖所履之位深而後爾雅曰東西牆謂之序序之名蓋本於此孟子設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明于上小民親于下朱子曰庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也漢書儒林傳夏曰校殷曰庠周曰序蕙田案以王制内則明堂位考之當云虞曰庠夏曰序而校無明文或云殷曰校想當然矣周則鄉學曰庠遂學曰序州黨學亦曰序其縣鄙學蓋曰校何休曰中里為校室里屬于縣鄙則縣鄙曰校可知也蓋兼三代之名而命之尚書大傳大夫七十而致仕而退老歸其鄉里大夫為父師士為少師新穀既入餘子皆入學距冬至四十五日始出學上老平明坐于右塾庶老坐于左塾餘子畢出然後皆歸夕亦如之白虎通徳論古之教民百里皆有師里中之老有道徳者為里右師其次為左師教里中之子弟以道藝孝悌仁義也陳氏禮書塾説文曰閭里門也爾雅曰門側之堂謂之塾尚書大傳曰大夫七十而致仕老其鄉里大夫為父師士為少師嵗事已畢餘子皆入學距冬至四十五日始出學傅農事上老平明坐于右塾庶老坐於左塾餘子畢出然後歸夕亦如之上老父師也庶老少師也食貨志亦曰春將出民里胥平旦坐於右塾鄰長坐於左塾畢出然後歸夕亦如之蓋古者合二十五家而為之門塾坐父師少師於此所以教之學也坐里胥鄰長於此所以教之耕也書言先路在左塾之前次路在右塾之前先路象路也次路木路也象路貴於木路而象路在左塾木路在右塾則左塾者東塾也里胥尊於鄰長而里胥在右塾鄰長在左塾則右塾者西塾也何則自内視外則左東而右西自外視内則左西而右東也曲禮曰主人入門而右客入門而左此左西而右東也又曰公事自闑東私事自闑西此左東而右西也然則書言左塾史言右塾皆西塾也自内外言之異耳漢之時閭里亦有門史稱石慶入里門是也漢書食貨志五家為鄰五鄰為里四里為族五族為黨五黨為州五州為鄉於里有序而鄉有庠序以明教庠則行禮而視化焉春令民畢出在壄冬則畢入于邑冬民既入餘子在于序室劉氏敞曰周人以有虞氏之庠建之於鄉故鄉有庠以夏后氏之序建之於州故州有序以啇人之校建之於黨故黨有校自黨以下皆為小學而非四代之制以教童子而已擇小學之秀者移之校擇校之秀者移之序擇序之秀者移之庠擇庠之秀者移之太學項氏曰凢鄉皆立虞庠凢州皆立夏序凢黨皆立商校於是四代之學達于天下蕙田案黨學名序見于周禮劉氏項氏以為黨有校者臆説也蔡氏徳晉曰立學之制鄉則比無學而閭有學族無學而黨州鄉有學遂則鄰無學而里有學酇無學而鄙縣遂有學閭里之學皆名塾而在巷首黨州之學名序當在中閭鄙縣之學名校當在中里也鄉學名庠遂學名序遂降鄉一等遂學既名序鄙縣之學不得不名校矣左傳鄭人游于鄉校鄭風子衿刺學校廢康成云鄭國謂學為校言可以校正道藝蓋鄭之始封本在西都畿内故猶以六遂中縣鄙之學名其鄉學也觀承案黨庠遂序之名雖不同然鄉尊於遂故遂學僅與鄉之州縣同名為序正是可通惟校無考据左傳鄭人遊於鄉校則校為鄉學之名亦可徴矣蔡氏謂鄙縣之學名校者恐不足据榕村李氏以校為鄉學之名極是似當從之要之庠序校學之名對文則各别散文亦可通禮家之言每有異同㕘錯者正坐此以意㑹之可也右鄉遂學禮記王制天子命之教然後為學小學在公宫南之左大學在郊注學所以學士之宫尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊此小學大學殷之制諸疏經文承上諸侯之下故直云天子命之教不云命侯從可知云此殷制者以下文云殷人養國老於右學養庶老於左學則左學小右學大此經云小學在公宫南之左故知殷制也周則大學在國小學在西郊陳氏禮書諸侯之學小學在内大學在外故王制言小學在公宫南之左大學在郊以其選士由内以及於外然後達于京故也天子之學小學居外大學居内故文王世子言凡語于郊者於成均取爵於上尊以其選士由外以升於内然後達于朝故也蕙田案殷制大學在郊周制大學在國天子諸侯皆然陳用之説非是諸侯曰頖宫注頖之言班也所以班政教也化疏頖是分頖之義故為班於此學中施使人觀之案詩注云頖之言半以南通水北無也二注不同者此注解其義詩注解其形陳氏禮書頖宫泮水也其制半於辟廱而水蓋闕於北方也諸侯樂縣闕其南而泮水闕其北者闕南而存北所以便其觀也闕北而存南所以便人之觀也文王世子始立學者既釁器用幣然後釋莱不舞不授器乃退儐于東序一獻無介語可也注言乃退者謂得立三代之學者釋菜于虞庠則儐于東序魯之學有米廩東序瞽宗也乃疏諸侯唯立時王之學何得云乃退儐于東序故云退者得立三代之學得有夏之東序謂諸侯有功徳者得立三代之學若魯國之北東序與虞庠相對東序在東虞庠在西既退儐于東序明釋莱在于虞庠蕙田案五等諸侯之大學皆有東序不獨魯也禮記明堂位米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也注庠序亦學也庠之言詳也於以考禮詳事也魯謂之米廩虞帝上孝今蔵粢盛之委焉序次序王事也瞽宗樂師瞽矇之所宗也古者有道徳者使教焉死則以為樂祖於此祭之頖之言班也於以班政教也疏此明魯得立四代之學也禮器魯人將有事于上帝必先有事于頖宫注頖宫郊之學也詩靈臺孔疏魯是周之諸侯於郊不當有學泮宮亦應在國而禮器注云頖宫郊之學也詩所謂泮宫也事或為郊宫不在圖者以其詩言魯侯戾止是行往適之故知在郊蓋魯以周公之故尊之使用殷禮故學在其郊也陳氏禮書頖宫大學也魯之大學在郊故將有事於上帝則於之先有事焉然則序與瞽宗蓋亦設于頖宫之左右而米廪其公宮南之小學歟蕙田案魯立四學其中為泮宫其北曰米廪其東曰序其西曰瞽宗不立成均者避天子也魯之四學在國中故水經注云靈光殿之東南即泮宫也宫中有臺臺南水東西一百步南北六十步臺西水南北四百步東西六十步詩所謂思樂泮水也杜佑通典云魯郡古魯國有泗水泮水出焉建宫于上名為泮宫其不在郊外明矣南郊與泮宮何必在一處詩云魯侯戾止何必定往郊外諸儒強以為大學在郊之證皆不然也詩魯頌序泮水頌僖公能修泮宮也思樂泮水薄采其芹魯侯戾止言觀其旂其旂茷茷鸞聲噦噦無小無大從公于邁注泮水泮宮之水也天子辟廱諸侯泮宫箋辟廱者築土雝水之外圓如璧四方來觀者均也泮之言半也蓋東西門以南通水北無也何氏楷曰泮水孔穎達云泮宮之外水也於文半水為泮據説文云諸侯鄉射之宫也西南為水東北為牆徐鍇云天子辟廱水周之諸侯泮宫水纔其半此㑹意也鄭𤣥則云泮之言半也半水者蓋東西門以南通水北無也孔申鄭義云辟廱者築土為堤以壅水之外使圓如璧令四方來觀者均故謂之辟廱也辟廱之宮内有館舍外無牆院故得圜觀之也天子宮形既如璧則諸侯宮制當異矣而泮為名則泮是其制必疑南有水者以行禮當南面而觀者宜北面畜水本以節觀宜其先節南方故知南有水而北無也北無水者下天子耳亦當為其限禁故云東西門以南通水明門北亦有溝塹但水不通耳今案許鄭二説規制互異然白虎通有云泮宮者半于天子宮也半者象璜也獨南面禮儀之方有水其餘壅之以垣與鄭説合三人占吾將從二人矣泮宮今或稱作黌宫當是璜宫之誤半水為泮字義甚明或通作頖亦字訛也乃鄭注禮記又謂頖之言班也所以班政教也因聲附㑹殆不足信至戴埴則直疑泮宫非學名而引通典言魯郡乃古魯國郡有泗水泮水出焉建宮于上名為泮宫與楚之渚宮晉虒祁之宫無以異楊慎深然其說愚考一統志泮水一名雩水源出曲阜縣縣治西南西流至兖州府城東入泗水即詩所云泮也雩乃此水本名以其為泮宫池又名為泮耳水因宮得名而謂宮以水得名乎戴揚可謂喜於立異而不顧泮字之所從來者矣酈道元水經注云靈光殿之東南即泮宫也在髙門直北道西宮中有臺髙八十尺臺南水東西一百步南北六十步臺西水南北四百步東西六十步臺池咸結石為之詩所謂思樂泮水也思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜箋在泮飲酒者徴先生君子與之行飲酒之禮而因以謀事也穆穆魯侯敬明其徳敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其徳既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚何氏楷曰王制云天子曰辟雍諸侯曰頖宫周官注載古逸詩云有昭辟廱有賢泮宮田里周行濟濟鏘鏘相從執質以族以文辟雍泮宮皆所謂太學也特因天子諸侯而其名異耳王制又云諸侯天子命之教然後為學小學在公宮南之左太學在郊禮器云魯人將有事于上帝必先有事於頖宮頖宮魯之太學也魯太學在郊故將有事上帝則於此有事焉孔云泮宮泮水正是一物詩言采芹藻之菜則云泮水說行禮謀獻之事則云泮宮魯有四代之學此詩主頌泮宮者先代之學尊魯侯得立之示存古法而已其行禮之飲酒養老兵事之受成告克當於周世之學在泮宮也濟濟多士克廣徳心桓桓于征狄彼東南烝烝皇皇不吳不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛鴞集于泮林食我桑黮懐我好音憬彼淮夷來獻其琛元龜象齒大路南金蕙田案諸侯學制見於經傳者惟魯為詳鄭氏因謂諸侯惟立時王之學有功徳者得立三代之學今考文王世子稱王命公侯伯子男反養老幼于東序是諸侯皆有東序又稱始立學者必釋奠于先聖先師釋奠者當於西學則諸侯皆有瞽宗惟上庠之有與否則不可知耳諸侯亦有小學殷制在國中周制在郊右諸侯學詩鄭風子衿序子衿刺學校廢也世亂則學校不修焉疏校是學之别名非謂鄭國稱校也言學校廢者謂鄭國之人廢於學問耳非謂廢毁學宫也青青子衿悠悠我心縱我不往子寧不嗣音傳青衿學子之所服嗣習也古者教以詩樂誦之歌之絃之舞之也箋學子俱在學校之中已留彼去故隨而思之嗣續女曾不傳聲闖我以恩責其忘已青青子佩悠悠我思縱我不往子寧不來挑兮達兮在城闕兮一日不見如三月兮箋君子之學以文會友以友輔仁獨學而無友則孤陋而寡聞故思之甚程子曰世亂學校不修學者棄業賢者念之春秋襄三十一年左氏傳鄭人遊于鄉校以論執政右諸侯鄉學五禮通考卷一百六十九
