行慶賀禮賜酒饌三品以上丹陛上東西坐四品以下臺下坐並宴勞耆老於壇旁宴畢駕還宫大樂鼔吹振作農夫人賜布一疋明通紀武宗正德元年春上耕藉田圖書編世宗嘉靖元年命終畝農夫照例引見只穿本等衣鞋每人賞布一疋世宗實錄嘉靖九年二月禮部上耕耤儀帝以其過煩命來歲别議十年正月更定耕耤儀明史禮志十年更定迎神送神止行二拜先二日順天府尹以耒耜穜稑種置綵輿至耕耤所並罷百官慶賀後又議造耕根車載耒耜府尹於祭日進呈畢以耒耜載車内前王輅行其御門觀耕地位卑下議建觀耕臺一詔皆可世宗實錄帝命造耕根車以重農務禮臣言考大明集禮國朝耕耤因宋制皇帝乘玉輅以耕根車載耒耜同日而行及考見行儀注順天府官捧耒耜及穜稑種置綵輿先祭前二日出今用耕根車載耒耜宜於祭日早進呈畢即置車中前玉輅以行至耕根車式禮書止有圖式無髙廣尺寸合依今制車式差小通用青質又言考宋史有觀耕臺今皇上御門觀耕地位卑下侍衛人衆有礙觀侍宜令工部權作木臺髙五尺方廣五丈正面東西三出陛俟明年築臺從之明史禮志是年命墾西苑隙地為田建殿曰無逸亭曰豳風又曰省耕曰省歛倉曰恒裕禮部上郊廟粢盛支給之數因言南郊耤田皇上三推公卿各宣其力較西苑為重西苑雖農官督理皇上時省耕歛較耤田為勤請以耤田所出藏南郊圓廪神倉以供圜邱祈榖先農神祗壇長陵等陵歴代帝王及百神之祀西苑所出藏恒裕倉以供方澤朝日夕月太廟世廟太社稷帝社稷禘祫先蠶及先師孔子之祀從之蕙田案明史建殿曰無逸無逸訛天遁今考正沈德符萬歴野獲編世宗初建無逸殿於西苑翼以豳風亭葢取詩書之意以重農務時率大臣㳺宴其中又命閣臣李時翟鑾輩坐講豳風七月之詩賞賚加等添設户部堂官専領穡事其後日事元修即於其地營永夀宫雖設官如故而所創祈報大典悉遣官代行後西苑宫殿悉毁惟無逸至今猶存至尊于西成時間亦御幸内臣各率其曹作打稻之戲凡播種收穫以及野饁農歌徴糧諸事無不入御覧葢較上耕耤田時尤詳云十六年諭凡遇親耕則户部尚書先祭先農皇帝至止行三推禮三十八年罷親耕唯遣官祭先農四十一年並令所司勿復奏圖書編嘉靖四十一年仍遣順天府尹祭先農免樂舞隆慶元年罷西苑耕種諸祀皆取之耤田春明夢餘錄穆宗隆慶元年禮官言先農之祭即祈榖遺意宜罷祈榖于先農行事大享禮亦宜罷詔可王圻續通考隆慶二年己丑禮部請聖駕親祭先農上躬耕耤田儀注一前期三日太常寺進祝版上御文華殿親填御名訖太常寺博士捧出安于香亭内擡至先農壇暫安於神庫順天府官以耒耜及穜稑種于午門外伺侯早朝畢捧至皇極門内官進呈訖少頃仍捧出順天府官捧由午門左門出置綵輿鼓樂送至藉田所一先期一日上常服以親享先農并行耕耤禮預告於奉先殿世宗皇帝几筵𢎞孝殿神霄殿一正祭免朝上御皇極門太常寺堂上官奏請聖駕詣先農壇致祭并行耕耤禮錦衣衛官備法駕設輦于皇極門下正中上常服乘輦鹵簿導從由大明門出詣壇所導駕官導上至具服殿侯報時具皮弁服出導駕官導上詣先農壇行祭先農禮如常儀祭畢導駕官導上囘至具服殿更翼善冠黄袍太常卿侍百官俱從上至耕耤位南向立三公以下從耕者各就從耕位户部尚書北向跪進耒耜順天府尹北向跪進鞭導駕官同太常卿導引上秉耒三推三反户部尚書跪受耒耜順天府尹跪受鞭太常卿奏請復位順天府尹奉青箱隨以種子播而覆之上御外門南向坐觀三公五推九卿九推訖太常卿奏耕畢從耕官各就位教坊司承應太常卿奏禮畢導駕官同太常卿導引上還具服殿俟上陞座鴻臚寺官奏順天府官并兩縣官耆老人等行禮贊五拜三叩頭禮畢率庶人終畝鴻臚寺官贊入班候百官序列定致詞慶賀贊五拜三叩頭禮畢鴻臚寺官拱聽聖㫖賜酒飯鴻臚寺官承㫖訖贊入班一拜叩頭上膳監膳三品以上官各就丹陛上賜坐四品以下官臺下序立并宴勞耆宿于壇旁宴畢鴻臚寺官贊入班一拜叩頭奏禮畢駕興還宫鹵簿導從竝如來儀大樂鼓吹振作上還仍詣奉先殿及世宗皇帝几筵𢎞孝殿神霄殿參謁如前儀明通紀穆宗隆慶二年二月行耕耤田禮于南郊神宗萬歴八年三月行耕耤田禮春明夢餘録崇禎七年二月二十七日親祭先農行躬耕耤田禮十五年二月十九日親祭先農行躬耕耤田禮崇禎壬午上親耕耤田紀今上御極之七年歲在甲戌二月二十有七日親致祭於先農之神行躬耕耤田禮至十五年壬午二月十九日上復親祭先農行耕耤禮澤為户科左給事中同科員張希夏沈允培左懋第沈迅戴明說導駕躬逢大典畧紀其概壬午二月十九日己未夘刻上駕至先農壇六科同禮部堂上官導駕至具服殿易皮弁服絳紗祭服至壇壇上結黄幄奉先農上設上拜位上拜揖甚恭禮畢仍導駕至具服殿易翼善冠黄袍太常寺奏請詣耕耤位六科同禮部導駕至位戸部尚書傅淑訓跪進耒耜順天府尹張宏極跪進鞭六科錦衣衛太常卿導引上左手秉耒右手執鞭三推歩行犁土中盡壠而止耕時教坊司引紅旗兩旁唱禾詞老人牽牛二人扶犁二人耕畢户部尚書跪受耒耜置犁亭府尹跪受鞭置鞭亭府尹捧青箱播種耆老以御牛隨而覆之上御觀耕臺於是大學士周延儒賀逢聖張四知謝陞陳演吏部尚書李日宣六人耕東定國公徐允禎恭順侯呉維英清平伯呉遵周户部尚書傅淑訓兵部尚書陳新甲工部尚書劉遵憲六人耕西順天府㕔官各執箱播種太常卿奏耕畢駕至齋宫各官一拜三叩頭分班侍立順天府官率兩縣官耆老人等五拜三叩頭農夫簔衣挑農具三十人隨後俛伏禮畢即隨府縣官至耕所終畝各官行慶賀禮上𫝊㫖賜酒飯文官三品以上武官二品以上坐丹陛上餘在臺下是日科臣沈迅因教坊承應歌詞俚俗宜改正上疏即下部本月二十四日上令閣臣𫝊禮部王錫衮蔣德璟到閣諭以後耕耤宜歌豳風無逸之詩其教坊所扮黄童白叟鼓腹謳歌為佯醉狀委為俚俗斥令改正天地之舞不宜扮天神䙝瀆及禾詞宜頌不忘規須令詞臣另行撰擬户科左給事中臣某紀右宋元明親耕享先農五禮通考卷一百二十五
