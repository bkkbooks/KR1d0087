body:
  text: 五禮通考卷一百二十五刑部尚書秦蕙田撰吉禮一百二十五親耕享先農宋史禮志藉田之禮歲不常講太宗雍熙四年始詔以來年正月擇日有事於東郊行藉田禮所司詳定儀注依南郊置五使除耕地朝陽門七里外為先農壇髙九尺四陛周四十歩飾以青二壝寛博取足容御耕位觀耕臺大次設樂縣二舞御耕位在壝門東南諸侯耕位次之庶人又次之觀耕臺髙五尺周四十歩四陛如壇色其青城設於千畝之外又言隋以青箱奉穜稑唐廢其禮青箱舊無其制請以竹木為之而無葢兩端設襻飾以青中分九隔隔盛一種覆以青帊穜稑即早晚之種不定榖名請用黍稷秫稻粱大小豆大小麥陳於箱中大禮使李昉言案通禮乘耕根車今請改乘玉輅載耒耜於耕根車又前典不載告廟及稱賀之制今請前二日告南郊太廟耕禮畢百官稱賀於青城禮有勞酒合設會於還宫之翌日望如親祀南郊之制擇日大宴詳定所言御耒耜二具竝盛以青縚凖唐乾元故事不加雕飾禮畢收於禁中以示稼穡艱難之意其祭先農用純色犢一如郊祀例進胙餘竝權用大祀之制皇帝散齋三日致齋二日百官不受誓戒神農后稷冊學士院撰文進書以鹵簿使賈黄中言復用象輅載耒耜以重其事五年正月乙亥帝服衮冕執鎮圭親享神農以后稷配備三獻遂行三推之禮畢事觧嚴還行宫百官稱賀帝改御大輦服通天冠絳紗袍鼓吹振作而還御乾元門大赦改元端拱文武遞進官有差二月七日宴羣臣於大明殿行勞酒禮樂志雍熙享先農六首餘同祈榖降神静安先農播種九榖務滋靈壇致享良耜陳儀吉日維亥運屬純熙樂之作矣神其格思奠玉幣敷安親耕展祀明靈來格九有駿奔百司庀職獻奠肅肅登降翼翼祈彼豐穰福流萬國奉爼豐安肅陳韶舞祗薦犧牲乃逆黄爼以率躬耕亞獻正安祀惟古典食乃民天歆兹潔祀以應祈年終獻正安式陳芳薦爰致䖍誠神其降鍳永福黎甿送神静安明禋紺氊靈風肅然登歌已闋神馭將旋道光帝藉禮備公田鍳茲躬稼永錫豐年文獻通考學士院上東郊青城殿門名前殿曰兩儀後殿曰延慶大殿門曰龍德左掖門曰光天右掖門曰麗天東門曰鳯陽西門曰安福南門曰祈年北門曰元英大殿東西廊門曰日華月華後園五花亭曰會芳御幄後門曰福慶詔付有司宋史禮志景德四年判太常禮院孫奭言來年畫日正月一日享先農九日上辛祈糓祀上帝春秋傳曰啟蟄而郊郊而後耕月令曰天子以元日祈榖於上帝乃擇元辰親載耒耜躬耕帝藉先儒皆云元日謂上辛郊天也元辰謂郊後吉亥享先農而耕藉也六典禮閣新儀竝云上辛祀昊天次云吉亥享先農望改用上辛後亥日用符禮文明道元年詔以來年二月丁未行藉田禮而罷冬至親郊遣官奏告天地宗廟諸陵景靈宫州都就告嶽瀆宫廟其禮一如端拱之儀而損益之禮成遣官奏謝如告禮仁宗本紀明道二年二月丁未祀先農於東郊玉海明道二年正月庚辰詔以皇兄建雄軍節度允升攝左衛上將軍蔣國公為祀先農亞獻彰信軍節度使觀察留後允寧攝右衛上將軍萊國公為三獻二月丙午上齋宿于東郊日傍有黄氣如龍鳯丁未服衮冕執圭祀神農后稷于壇會要學士院撰享先農登歌樂章文獻通考廣文館開封府貢舉人等上書以國家躬訓農事難逄之會乞陪序於壇次以觀盛典從之令陪位於文官九品之下大禮使言藉田禮希曠已乆比聞修舉内外翹屬况親屈萬乘勸農力本伏請下有司令徧諭宻近村聚候御耕日特許父老鄉民觀望盛禮勿令呵止從之樂志明道親享先農十首迎神静安稼政之本民食唯天甫田兆歲后稷其先靈壇既祀黛耜攸䖍乃聖能享億萬斯年皇帝升降隆安冕服在御壇壝有儀陟降左右天維顯思奠玉幣嘉安將躬黛耜先陟靈壇嘉玉量幣樂舉禮殫神既至止福亦和安千斯積詠萬國多歡奉爼豐安將迎景福乃薦嘉牲藉於千畝用此精誠皇帝初獻禧安雲罍已實玉爵有舟薦於靈藉佇乃神休飲福禧安神既至享福亦來酬申錫純嘏㫖酒維柔思文后稷貽我來年子孫千億丕荷天休退文舞進武舞正安羽葆有奕文武交相周旋合度福祿無疆亞獻正安豆籩維庶黍稷非馨惠我豐歲歆茲至誠終獻正安歆我嘉薦錫我蕃禧多黍多稌如京如坻送神静安獻終豆徹禮備樂成祠容肅肅風馭冥㝠三時務本一撥躬耕人祗胥恱祉福是膺景祐享先農五首迎神凝安在昔神農首茲播殖無有汚萊盡為稼穡乃粒斯民實惟帝力嘉薦令芳佇瞻來格升降同安居德之厚厥祀攸陳土膏初脉晨事先春鑑然金奏儼若華紳陟降於阼福祿惟神奠幣明安農為政本食乃民天苾芬明祀藨蓘良田陳茲量幣被此豐年茂介福祉來欽吉蠲酌獻成安農祥晨正平秩東作倬彼大田庤乃錢鎛酒醴盈尊金璆合樂期茲萬年充於六幕送神凝安務嗇之本恤祀惟馨神斯至止降福攸寧崇茲稼政合於禮經爼徹樂闋邈仰廻靈禮志元豐二年詔於京城東南度田千畝為藉田置令一員徙先農壇於中神倉於東南取卒之知田事者為藉田兵乃以郊社令辛公佑兼令公佑請因舊鏺麥殿規地為田引蔡河水灌其中并種果蔬冬則藏氷凡一歲祠祭之用取其焉先薦獻而後進御有餘則貿錢以給雜費輸其餘於内藏庫著為令權管幹藉田王存等議以南郊鏺麥殿前地及玉津園東南菱地并民田共千一百畝充藉田外以百畝建先農壇兆開阡陌溝洫置神倉齋宫并耕作人牛廬舍之屬繪圖以進已而殿成詔以思文為名文獻通考哲宗紹聖四年權禮部侍郎范鏜等言每遇臨幸藉田常遣官祭告先農壇其藉田刈稼皆以為粢盛之實車駕臨幸則取新薦獻當在所先即刈麥乞以所進麥付所司變造禮食於臨幸次日薦之太廟然後進供頒賜竝如故事秋觀刈禾亦如之及乞觀麥禮畢車駕移幸稻池綵殿以觀揷稻詔可徽宗政和元年有司議享先農為中祠命有司攝事帝止行耕藉之禮罷命五使及稱賀肆赦之類太史局擇日不必専用吉亥耕藉所乘改用耕根車罷乘玉輅躬耕之服正用通天冠絳紗袍百官竝朝服倣雍熙儀注九卿以左右僕射六尚書御史大夫攝諸侯以正員三品官及上將軍攝設庶人耕位於諸侯耕位之南以成終畝之禮備青箱設九榖如隋之制尋復以耕藉為大祠依四孟朝享例行禮又命禮制局修定儀注孟春之月太史擇上辛後吉日皇帝親耕藉田命有司以是日享先農后稷於本壇如常儀文獻通考髙宗紹興二年四月上謂輔臣曰朕聞祖宗時禁中有打麥殿今朕於後圃令人引水灌畦種稻不唯務農重榖示王政所先亦欲知稼穡之艱難宋史髙宗本紀紹興七年五月壬申命禮官舉先農之祀禮志紹興七年始舉享先農之禮以立春後亥日行一獻禮文獻通考紹興十四年十一月詔以嗣歲之春祗祓青壇親載黛耜躬三推之禮命臨安府守臣度城南之田得五百七十畝有竒廼建思文殿觀耕臺神倉及表親耕之田又詔母建殿宇設幕殿席屋如南郊事畢撤去庶不擾民太常丞王湛謂新儀帝乘耕根車左輔奉耒耜載以象輅列於伏内政和八年左輔奉耒耜于玉輅耕藉使衛以儀仗二千人先詣壇所王之五輅玉輅最貴耕根一名芒車所謂農輿無葢車之無飾者也齊代藉田御史乘馬車載耒耜於五輅之後時以為禮輕更用侍中載於象輅真宗明道二年二月帝乘玉輅適耕所司農卿以耕根車載耒耜前玉輅以行今政和儀帝御耕根而耒耜乃載於玉輅輕重失序請乘玉輅而以耕根載耒又謂端拱明道之禮備矣政和中徽宗正之故新儀最為蕳要宜遵而行權工部侍郎錢時敏奏耕藉使所乘車禮官謂象車以象飾諸末諸班輪八鑾左衡左建旂右載闟㦸駕馬四飾以鞶纓輪衣絡帶皆繡以鑾車髙丈有五尺廣丈請下有司製之甲子禮官請前三日司農以青箱奉九榖穜稑之種進内前二日皇太后率六宫獻之於帝次日授司農以待耕事九榖種以竹木箱為之無葢飾以青色覆以青帕三公三少宰臣親王使相五推執政臣二省臺諫九推庶人終畝又請少府製御耒耜二及韜皆飾以青御耕青牛四衣以青如無青牛以黄牛代以青羅夾衣葢搭從耕官每耒耜用牛二頭耒耜三十牛六十庶人四十人竝青衣耒耜四十牛八十鍤十畚二十各命有司具之時敏又謂象車小様庳請加髙二尺為丈有七尺茵縟用紫閠十一月祭酉兵部謂仗士二千以太常鼓吹黄麾仗足之前期閲習前一日宿仗於皇城南門外質明衛耒耜先往禮官請用其半又請耕藉使用本品鹵簿王公六百八十有八人請用其半禮官請親耕日命有司享先農己巳詔討論象車合製與否禮官乃謂新儀象輅載耒耜宣和耕藉使乘象車參考端拱親耕以耕根車載耒耜而使不乘車請用端拱禮耕藉使朝服騎䕶耒耜行於仗内仗士千人質明先往壇所以候車駕罷象輅不製唯製耕根車從之宋史髙宗本紀紹興十六年春正月壬辰親享先農于東郊玉海紹興十六年正月五日禮官修定親享先農親耕儀注上之二十二日壬辰皇帝衮冕親享先農二十五日乙未百官表賀文獻通考享先農親耕藉田儀注前期設御座于藉田思文殿之中南向東西閣于殿後之左右御幄于親耕壇上南向大次于殿上南向小次二一於先農壇午階下稍東西向一於觀耕壇西階下稍北南向羣臣次於門之内外設饌幔樂舞前一日設帝神農氏位於壇之北方南向后稷氏位於東方西向席皆以筦設帝板位於壇下小次前西向飲福位於壇上稍西北向望瘞位於子階之西北向羣臣位各以其方尊罍爼豆皆如大祀司農設御耒耜於南門外幕屋之内御耕板位於耕藉所南向侍耕位在於東西階北上從耕三公位在東南九卿諸侯位在其南皆西向北上庶人位在其南少東十歩外耆老陪耕位又在其南皆西向御耒席於三公之北稍西南向太僕設御耕牛於御耕位之西稍北太常設登歌於觀耕壇上宫架於庶人耕位之南俱北向耕藉使位於御耕位之東南向侍中在其南西向司農卿二一位於侍中之後一在其南藉田令二在司農卿之南少退皆西向北上奉青箱官位其後司農少卿位二於庶人位之前太社令位司農之西少退皆西北向太僕卿位於御耕牛之東稍前南向畿内邑令位於庶人位之東西向執耒耜者位於公卿耕者之後執畚鍤者之前西向司農設從耕耒耜及牛各於其位之前兵部陳仗士及耕根車於皇城南門之外遂省牲省饌割烹祀之日質明侍中奉御耒耜載於耕根車耕藉使騎從至藉田門外侍中以耒耜授藉田令横執之置於耕所之席而守之帝履袍輦出宫南門至思文殿降輦入後閣羣臣入就位帝服衮冕至内壝門外執大圭入自正門宫架隆安之樂作至午階板位西南立宫架作静安之樂儲靈錫慶之舞三成帝再拜羣臣皆再拜凡帝拜羣臣皆拜宫架樂作帝搢大圭沃盥執圭升壇耕藉使從宫架樂作升自午階登歌嘉安之樂作帝搢大圭執鎮圭進帝神農氏位前北向立跪奠鎮圭於繅藉執大圭興搢圭跪奠幣執圭興次進后稷氏位前亦如之帝還板位登歌樂作降階宫架樂作至板位西南立祝史奠毛血槃禮部尚書執籩豆簠簋兵工部尚書奉爼以入宫架豐安之樂作皆奉以升北面跪奠之宫架樂作帝搢大圭沃盥洗爵執圭升宫架樂作至壇上登歌禧安進帝神農氏位前北面立搢大圭跪執爵三祭酒於地執圭興祝東向跪讀祝詞帝再拜次進后稷氏位前酌獻亦如之帝還板位登歌樂作降階宫架樂作至板位西面立還小次釋大圭文舞退武舞進宫架正安之樂作亞獻盥洗爵升進帝神農氏尊所西面立宫架作正安之樂嚴恭將事之舞既實爵進神位前跪祭酒