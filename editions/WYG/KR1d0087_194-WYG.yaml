body:
  text: 五禮通考卷一百八十四刑部尚書秦蕙田撰嘉禮五十七觀象授時書堯典分命羲仲宅嵎夷曰𤾉谷𫝊東表之地稱嵎夷𤾉明也疏禹貢青州曰嵎夷既畧青州在東界外之畔為表故云東表之地稱嵎夷也寅賔出日𫝊寅敬賔導也平秩東作𫝊秩序也朱子曰宅嵎夷之類恐只是四方度其日景如唐時尚使人去四方觀望又曰宅字古與度字通見周禮注等書者非一宅嵎夷之屬皆謂度日景於此胡氏渭曰案後漢書來夷有九種曰畎夷干夷方夷黄夷白夷赤夷元夷風夷陽夷賛曰宅是嵎夷曰乃𤾉谷巢山潛海厥區九族是以九夷為嵎夷也説文𤾉山在遼西一曰嵎銕𤾉谷也既在遼西則冀域而非青域不可以當禹貢之嵎夷薛士龍云嵎夷今登州齊乘因以寧海州為嵎夷近世皆宗其説余案封禪書秦始皇東遊海上祠齊之八神其七曰日主祠成山成山斗入海最居齊東北隅以迎日出云韋昭曰成山在東萊不夜縣今文登縣東北一百八十里有成山是也謂羲仲之所宅在此頗近理然文登與萊州接壌禹既畧嵎夷不應越萊夷而西治濰淄是則可疑耳且朝鮮更在成山之東寅賔出日尤為得宜范史以東夷九種為嵎夷必有根據杜氏通典亦用其説通鑑唐髙宗顯慶五年命蘇定方伐百濟以新羅王春秋為嵎夷道行軍總管是亦以東夷為嵎夷也元史天文志言郭守敬為太史四海測景之所凡二十七東極髙麗西至滇池南踰朱崖北盡鐵勒皆古人之所未及案髙麗即古朝鮮北極出地三十八度與登州同後世朝鮮為外國測景但可在登州堯時嵎夷為青域測景自當在朝鮮也申命義叔宅南交平秩南訛𫝊申重也南交言夏與春交訛化也疏鄭云夏不言曰明都三字摩滅也伏生所誦與壁中舊本並無此字非摩滅也王肅以夏無明都避敬致然即幽足見明闕文相避如肅之言義可通矣敬致司馬氏貞曰孔注未是然則冬與秋交何故下無其文且東嵎夷西昧谷北幽都三方皆言地而夏獨不言地乃云與春交斯不例之甚也然南方地有名交趾者或古文畧舉一字名地南交即是交趾不疑也林氏之竒曰周官冬夏致日左氏曰日官居卿以底日則敬致者致日之謂也朱子曰致日考日中之景如周禮土圭之法圭只是量表景底尺長一尺五寸以玉為之夏至立表視表景長短以玉圭量之分命和仲宅西曰昧谷寅餞納日平秩西成𫝊昩冥也餞送也申命和叔宅朔方曰幽都平在朔易疏釋訓朔北方也李巡云萬物盡於北方蘇而復生釋詁在察也吕氏祖謙曰北方終其隂而後始其陽故曰朔方既承今嵗之終又慮來嵗之始故曰朔易始而終終而始此天地生生不窮之道黄氏度曰禹貢西被流沙自流沙以西皆夷界山川不紀於職方故稱西以見境域之不止此也朔則北限沙漠荒茫悠逺山川不可見故稱朔方以為大界或曰山海經北荒有幽都山樂史寰宇記幽州有幽都山皆為附㑹梅氏文鼎曰日月星辰之行度不變而人所居有東南西北正視側視之殊則所見各異謂之里差亦曰視差自漢及晉未有知之者也北齊張子信始測交道有表裏此方不見食者人在月外必反見食宣明本之為氣刻時三差而大衍有九服測食定晷漏法元人四海測驗二十七所而近世歐邏巴航海數萬里以身所經山海之程測北極為南北差測月食為東西差里差之説至是而確是葢合數千年之積測以定嵗差合數萬里之實驗以定里差距數逾逺差積逾多而曉然易辨且其為法既推之數千年數萬里而準則施之近用可以無惑法至今日屢變益精以此然余亦謂定於唐虞之時何也不能預知者差之數萬世不易者求差之法古之聖人以日之所在不可以目視而器窺也故為之中星以紀之鳥火虛昴此萬世求嵗差之根數也又以日之出入發歛不可以一方之所見為定也故為之嵎夷昧谷南交朔方之宅以分候之此萬世求里差之定法也又曰周髀所言東方日中西方夜半云云者皆相距六時其相去之地皆一百八十度地與天應其周度皆三百六十則其相對必一百八十此東西差之極大者也細考之則日在極東而東方為日中午時則其地在極南者必見日初出地而為卯時在極北者必見日初入地而為酉時故又云此四方者晝夜易處加四時相及自南方卯至東方午為四時自東方日中午至北方酉亦四時故毎加四時則相及矣若以度計之實相距九十又細分之則東西相距三十度必早晚差一時如日在極南為午時其西距三十度之地必見其為巳時而其東距三十度之地必見為未時其餘地准此推之並同相距十五度必相差四刻堯分命羲仲寅賔出日和仲寅餞内日者測此東西里差也寅賔寅餞互文見意非義仲但朝測和仲但暮測也又周髀所言北極下半年為晝中衡下五穀一嵗再熟云云者其距緯皆相去九十度乃南北差之極大者也細考之北極髙一度則地面差數百十里屢代所測㣲有不同今定為二百五十里而寒暑宻移晝夜之長短各異和叔羲叔分處南北以測此南北里差也蕙田案宅嵎夷宅西所以測最東最西日出入相差時刻也東方見日早西方見日晚如今雲南寅初朝鮮己寅末朝鮮酉末雲南方酉初是以節朔及月食㡬差一時然則東西里差者推節朔及月食所必用也宅南交宅朔方所以測最南最北日永短相差併驗其氣候之有不齊也如冬至廣東之晝短山西較之益短有差不啻半時夏至廣東之晝長山西較之益長其差亦不啻半時且不但此也自中土而南寒漸平其冬或如春秋焉而一嵗兩夏者有矣赤道之下自中土而北寒愈甚其夏或如春秋焉而春秋已同乎中土之冬矣赤道北四十餘度然則南北里差者驗晝夜節候之所參稽也既分測於南北東西最逺之地自逺而近亦當以遞及焉然後相校以得其率而法可起矣致日之義别詳後周禮地官司徒以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂注土圭所以致四時日月之景也鄭司農云測土深謂南北東西之深也𤣥謂晝漏半而置土圭表隂陽審其南北景短於土圭謂之日南是地於日為近南也景長於土圭謂之日北是地於日為近北也東於土圭謂之日東是地於日為近東也西於土圭謂之日西是地於日為近西也如是則寒暑隂陽偏而不和是未得其所求凡日景於地千里而差一寸疏案玉人職云土圭尺有五寸度土之深深謂日景長短之深也正日景者夏日至晝半表北得尺五寸景正與土圭等即地中故云正日景以求地中也中表景得正時東表日已跌矣晝漏半已得夕景故云景夕中表景得正時西表日未中仍得朝時之景故云景朝日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之注鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然隋書天文志劉焯云周官夏至日影尺有五寸張衡鄭𤣥王蕃陸績先儒等皆以為影千里差一寸言南戴日下萬五千里表影正同天髙乃異考之算法必為不可寸差千里亦無典說明為意㫁事不可依今交愛之州表北無影計無萬里南過戴日是千里一寸非其實差舊唐書天文志案貞觀中史官所載鐵勒回紇部在薛延陁之北去京師六千九百里又有骨利幹居迴紇北方瀚海之北北距大海晝長而夕短既日没後天色正曛煮一羊胛纔熟而東方已曙開元十二年太史監南宫說擇河南平地以水準繩樹八尺之表而以引度之始自滑州白馬縣北至之晷尺有五寸七分自滑州臺表南行一百九十八里百七十九步得汴州浚儀古臺表夏至影長一尺五寸㣲强又自浚儀而南百六十七里二百八十一步得許州扶溝縣表夏至影長一尺四寸四分又自扶溝而南一百六十里百一十步至豫州上蔡武津表夏至影長一尺三寸六分半大率五百二十六里二百七十步影差二寸有餘而先儒以為王畿千里影移一寸乖舛而不同矣李氏光地曰土圭條所謂地中及東西南北之偏就九州以内言之耳如今南方多熱北方多寒近海處多風近山處多隂故惟中州氣候為得其正而其日景則夏至之日適與土圭齊故取以為凖是日景以土中而定非上中因日景而得也經云正景以求地中所謂求者猶標識之義耳景短多暑言景短時多暑也景長多寒言景長時多寒也景夕多風言景夕時多風也景朝多隂言景朝時多隂也景短謂夏景長謂冬景夕謂午後景朝謂午前又曰日南則景短多暑謂從此中表而南之地則當景短之時盛暑不堪若今廣州夏時炎赫倍于他州葢景短即夏至非短于尺有五寸之謂也日北則景長多寒者謂從此中表而北之地則當景長之時隆寒不堪若今塞外冬時凛栗亦倍葢景長即冬至非長于尺有五寸之謂也日東則景夕多風者謂從中表而東之地則景夕之時多風葢東地多水多水則多風若吾州午後即海風揚也風起于夕故以景夕言之日西則景朝多隂者謂從此中表而西之地則景朝之時多隂葢西地多山多山則雲氣盛若柳子厚所謂庸蜀之南恒雨少日是也隂霾于朝故以景朝言之如此則寒暑隂風偏而不和是未得其所求天地之所合者地中與天中氣合也合則四時交而無多暑多寒之患合則風雨會而無多風合則隂陽和而無多隂何以定之以驗寒暑隂風於五土而知惟此為不偏也然則沖和所㑹無水旱昆蟲之災無凶饑妖孽之疾兆民之衆含生之類莫不阜安是乃王者之都也日至之景尺有五寸謂之地中者非謂必日景尺有五寸乃為地中是言地中之處其景尺有五寸葢用以為標識也蕙田案必求地中者王者處中以御天下即用是得各方定節氣時刻之率也又案寒暑隂風之偏及四時天地交合隂陽風雨和㑹一皆實驗先驗其偏後求之而得其中也求字之義甚實李安溪謂求猶標識初以其説為然細案之語意乃非也午後多風午前多隂之説亦未確大概東方多風西方多隂爾古人用土圭測黄赤二道猶今之測北極髙下也寒暑進退晝夜永短因之而隨地不同合堯典周禮觀之古人測里差極詳測非獨夏至夏至日中景最短以最短為度及其長若干皆用是度之周髀有七衡以正十二中氣必由於實測然後立為準的也春官典瑞土圭以致四時日月封國則以土地注以致四時日月者度其景至不至冬夏以致日春秋以致月土地猶度地也鄭司農説以玉人職曰土圭尺有五寸以致日以土地以求地中故謂之土圭又疏冬至立八尺之表晝漏半度之表北得丈三尺景大司徒云日至之景尺有五寸謂之地中是其景至也若不依此或長或短則為不至也夏官土方氏掌土圭之灋以致日景注致日景者夏至景尺有五寸冬至景丈三尺其間則日有長短以土地相宅而建國都鄙注土地又度地知東西南北之深而相其可居者宅居也考工記玉人土圭尺有五寸以致日以土地注致日度景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而制其域疏於地中立八尺之表中漏半夏至日表北尺五寸景與土圭等冬至日丈三尺為景至若不依此皆為不至故云度景至不也匠人建國注立王國若邦國者水地以縣注於四角立植而縣以水望其髙下髙下既定乃為位而平地以疏植即柱也柱四畔縣繩以正柱柱正然後去柱逺水平之法遥望柱髙下定即知地之髙下然後平髙就下地乃平也置􅈏以縣眡以景注於所平之地中央樹八尺之臬以縣正之眡之以其景將以正四方也垂疏􅈏亦謂柱也欲取柱之景先須柱正當以繩縣而之於柱之四角四中以八繩縣之其繩皆附柱則其柱正矣為規識日出之景與日入之景注日出日入之景其端則東西正也又為規以識之者為其難審也自日出而畫其景端以至日入既則為規測景兩端之内規之規之交乃審也度兩交之間中屈之以指臬則南北正疏以繩規取景之兩端一帀則景之逺近定逺近定則東西乃審晝參諸日中之景夜考之極星以正朝夕注日中之景最短者也極星謂北辰蕙田案土圭尺有五寸合乎地中夏日至之景凡建邦土地悉用之者葢以是為法而度其方之日景短長過乎土圭則其地近北不及土圭則其地近南而南北氣候不同可就土圭知之猶今之測北極髙下也土圭所度即八尺􅈏之景也晝識景夜考極葢定南北西東及隨時隨地昏旦刻分故曰以正朝夕􅈏與土圭合而為用舉其一則兩者可見土圭知景短景長矣景朝景夕何以定注家但云案漏特其一法耳今又能驗諸月食於理尤確環地南北之度有北極髙下為凖而東西之度即周禮所謂景朝景夕者非有法推之何以確鑿言之若是乎周禮之法惜乎不𫝊宜以今日測驗補之宋史天文志沈括上景表議曰步景之法惟定南北為難古法置􅈏為規識日出之景與日入之景晝參諸日中之景夜考之極星極星不當天中而候景之法取晨夕景之最長者規之兩表相去中折以參驗最短之景為日中然測景之地百里之間地之髙下東西不能無偏其間又有邑屋山林之蔽倘在人目之外則與濁氛相雜莫能知其所蔽而濁氛又繫其日之明晦風雨人間烟氣塵坌變作不常臣在本局候景入濁出濁之節日日不同此又不足以考見出没之實則晨夕景之短長未能得其極數㕘考舊聞别立新術候景之表三其崇八尺博三寸三分殺一以為厚者圭首剡其南使偏銳其趺方厚各二尺環趺刻渠受水以為凖以銅為之表四方志墨以為中刻之綴四繩垂以銅丸各當一方之墨先約定四方以三表南北相重令趺相切表别相去二尺各使端直四繩皆附墨三表相去左右上下以度量之令相重如一自日初出則量西景三表相去之度又量三表之端景之所至各别記之至日欲入候東景亦如之長短同相去之疎宻又同則以東西景端隨表影規之半折以求最短之景五者皆合則半折最短之景為北表南墨之下為南東西景端為東西五候一有不合未足以為正既得四方則惟設一表方首表下為石席以水平之植表於席之南端席廣三尺長如九服冬至之景自表趺刻以為分分積為寸寸積為尺為宻室以棲表當極為霤以下午景使當表端副表併趺崇四寸趺博二寸厚五分方首剡其南以銅為之凡景表景薄不可辨即以小表副之視景墨而易度元史天文志正方案方四尺厚一寸四周去邊五分為水渠先定中心畫為十字外抵水渠去心一寸畫為圓規自外寸䂓之凡十九規外規内三分畫為重規徧布周天度中為圓徑二寸髙亦如之中心洞底植臬髙一尺五寸南至則減五寸北至則倍之凡欲正四方置案平地注水於渠眡平乃植臬於中自臬景西入外規即識以墨影少移輒識之每規皆然至東出外規而止凡出入一規之交皆度以線屈其半以為中即所識與臬相當且其景最短則南北正矣復徧閱毎規之識以審定南北南北既正則東西従而正然二至前後日軌東西行南北差少即外規出入之景以為東西允得其正當二分前後日軌東西行南北差多朝夕有不同者外規出入之景或未可憑必取近内規景為定仍校以累日則愈真又測用之法先測定所在北極出地度即自案地平以上度如其數下對南極入地度以墨斜經中心界之又横截中心斜界為十字即天腹赤道斜勢也乃以案側立懸繩取正凡置儀象皆以此為凖圭表以石為之長一百二十八尺廣四尺五寸厚一尺四寸座髙二尺六寸南北兩端為池圓徑一尺五寸深二寸自表北一尺與表梁中心上下相直外一百二十尺中心廣四寸兩旁各一寸畫為尺寸分以達北端兩旁相去一寸為水渠深廣各一寸與南北兩池相灌通以取平表長五十尺廣二十四寸厚減廣之半植於圭之南端圭石座中入地及座中一丈四尺上髙三十六尺其端兩旁為二龍半身附表上檠横梁自梁心至表顛四尺下屬圭面共為四十尺梁長六尺徑三寸上為水渠以取平兩端及中腰各為横竅徑二分横貫以鐵長五寸繫線合於中懸錘取正且防傾墊案表短則分寸短促尺寸之下所謂分秒太半少之數未易分别表長則分寸稍長所不便者景虚而淡難得實影前人欲就虛景之中考求真實或設望筩或置小表或以木為規皆取端日光下徹表面今以銅為表髙三十六尺端挾以二龍舉一横梁下至圭面共四十尺是為八尺之表五圭表刻為尺寸舊一寸今申而為五釐毫差易分别景符之制以銅葉博二寸長加博之二中穿一竅若針芥然以方為趺一端設為機軸令可開闔榰其一端使其勢斜倚北髙南下往來遷就於虚梁之中竅達日光僅如米許隠然見横梁於其中舊法以表端測晷所得者日體上邊之景今以横梁取之實得中景不容有毫末之差至元十六年己卯夏至晷景四月十九日乙未景一丈二尺三寸六分九釐五毫至元十六年己卯冬至晷景十月二十四日戊戌景七丈六尺七寸四分闚几之制長六尺廣二尺髙倍之下為趺廣三寸厚二寸上廣四寸厚如趺以板為面厚及寸四隅為定撐以斜木務取正方面中開明竅長四尺廣二寸近竅兩旁一寸分畫為尺内三寸刻為細分下應圭面几面上至梁心二十六尺取以為凖闚限各各長二尺四寸廣二寸脊厚五分兩刃斜閷取其於几面相符著限兩端厚廣各存二寸銜入几俟星月正中従几下仰望視表梁南北以為識折取分寸中數用為真景又於逺方同日闚測取景數以推星月髙下也明史天文志宣城梅文鼎曰極度晷影常相因知北極出地之髙即可知各節氣午正之影測得各節氣午正之影亦可知北極之髙然其術非易易也圭表之法表短則分秒難明表長則影虛而淡郭守敬所以立四丈之表用影符以取之也日體甚大竪表所測者日體上邊之影横表所測者日體下邊之影皆非中心之數郭守敬所以於表端架横梁以測之也其術可謂善矣但其影符之制用銅片鑚針芥之孔雖前低後仰以向太陽但太陽之髙低毎日不同銅片之欹側安能俱合不合則光不透臨時遷就而日已西移矣須易銅片以圓木左右用兩板架之如車軸然則轉動甚易更易圓孔以直縫而用始便也然影符止可去虛淡之弊而非其本必須正其表焉平其圭焉均其度焉三者缺一不可以得影三者得矣而人心有粗細目力有利鈍任事有誠偽不可不擇也知乎此庶㡬晷影可得矣西洋之法又有進焉謂地半徑居日天半徑千餘分之一則地面所測太陽之髙必少於地心之實髙於是有地半徑差之加近地有清蒙氣能升卑為髙則晷影所推太陽之髙或多於天上之實髙於是又有清䝉差之減是二差者皆近地多而漸髙漸減以至於無地半徑差至天頂而無清蒙差至四十五度而無也新法算書定南北線本法用地平經緯儀取最近北極一星測其東西行所至兩經度中分之即正北方也用句陳大星西名小熊尾第一夏至子時在極東冬至子時在極西用句陳第五星西名小熊尾第三冬至酉時在極西卯時在極東用此即定線一夕可得若無本器用兩表之法兩表者一定表其體與地平為垂線一游表其直邊亦與地平為垂線先以二表與星相望參直成一線若星漸移而東則遷游表隨東至不復東而止移西亦如之末従定表望兩游表各以直線聮之成三角形平分其角作南此正線西史第谷欲究極日躔行度之理造大渾儀測諸經緯度分每渾儀所測之緯度髙於所算太陽之緯度乃知真髙在視髙之下因悟差髙之縁葢清蒙之氣所為也清蒙之氣者地中游氣時時上騰入夜為多水上更多其質輕㣲略似澄清之水其於物體不能隔礙人目使之隠蔽却能映小為大升卑為髙故日月出入人従地平上望之比于中天則大星座出入人従地平上望之比于中天則廣此映小為大也定望日時地在日月之間人在地平無兩見之理而恒得兩見或日未西没而已見月食于東日已東出而尚見月食於西或髙山之上見日月出入以較算定時刻每先昇後墜此升卑為髙也清蒙之氣有厚薄有髙下氣盛則厚而髙氣減則薄而下厚且髙則映像愈大升像愈髙薄且下則映像不甚大升像亦不甚髙其所繇厚且髙者若海若江湖水氣多也或水少而土浮虚此氣能令輕塵上升亦厚且髙也地勢不等氣勢亦不等故受蒙者其勢亦不等欲定日躔月離五星列宿等之緯度宜先定本地之清蒙差清蒙之本性能昇物象令髙于實在之所不能偏左偏右故其差恒在緯度不在經度凡七政之視差有二一為地半徑差一為清蒙氣差地半徑差月最大日金水次之火木土則漸逺漸消恒星天最逺地居其中止于一㸃故絶無地半徑差而獨有清䝉之差清蒙地氣去人甚近故不論天體近逺但以髙卑為限星去地平未逺人目望之星為此氣所蒙不能直射人目必成折照乃能見之一經轉折人之見星必不在其實所即星體在地平之下人所目見乃在其上也迨升度既髙蒙氣已絶則直射人目是為正照雖星月之間㣲有濕氣不能為差也試用一星於地平近處測其去北極之度迨至子午圈上又測之即兩測必不合或用兩星于地平近處測其距度逮至子午圈上又測之即兩測亦不必合此其證也此氣晴明時有之人目所不見而能曲折相照升卑為髙故名清蒙若雲霧等濁蒙直是難測不論視差矣觀承案測景直推至清蒙氣差比地半徑差為更盡矣正唯如此則立表測量亦苐能得其大分耳圭撮芒𣺌之間安能使之須眉畢現也哉故後世雖立法更宻測望更精而天道幽元必非人力所能窮竟者觀象者但當順天以求合而不能為合以驗天西法雖善千百年後安能保其無纎毫差謬也江氏永曰凡徹體之物如氣如水如玻璃水晶皆能變物之形逺可使近小可使大直可使曲深可使淺卑可使髙逺鏡其顯者也插篙於水置錢於盂無不可驗是以日月出地與將入地視徑加大蒙氣映之故也不唯加大而已更能升之使髙實未出地而已出地也雖已入地而猶未入也故日食於髙卑南北東西三差之外更有清蒙氣差清蒙徑差此為帶食言之也有此二差則旦暮日食以東西差加減之而當食者蒙氣或升之而不食矣其不當食者或升之而見食矣視徑加大則能變食限與加時早晚食分多少矣此非臺官所能豫定必隨方測候而後可知前史有書當食不食不當食而食者其故或由此與蕙田案隋書姜岌言地有遊氣故參伐在旁則其間疎在上則其間數日晨夕近地故色赤而大無遊氣則色白大不甚矣宋沈括言在本局候景入濁出濁之節日日不同葢皆以近地之氣能變易實體而謂之遊氣謂之濁氛日日有之且厚薄無常隨地不等也西法辨别其間有清蒙濁蒙濁蒙則全無準清蒙尚可得其凖差要之既為氣差詎能一定隨各地厚薄之常較驗為法可也右測景之法舊唐書天文志開元十二年詔太史交州測景夏至影表南長三十三分測影使者大相元太云交州望極纔出地二十餘度以八月自海中南望老人星殊髙老人星下環星燦然其明大者甚衆圗所不載莫辨其名大率去南極二十度以上其星皆見乃古渾天家以為常没地中伏而不見之所也陽城北至之晷一尺四寸八分弱冬至之晷一丈二尺七寸一分半春秋分其長五尺四寸三分以覆矩斜視北極出地三十四度四分凡度分皆以十分為法自滑臺表視之髙三十五度三分差陽城九分自