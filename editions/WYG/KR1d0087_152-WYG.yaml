body:
  text: 五禮通考卷一百四十二刑部尚書秦蕙田撰嘉禮十五尊親禮蕙田案聖王以孝治天下尊親之典為􅇰鉅創業嗣統之君即位以後莫不以斯為首務然其禮見於吉禮者有三始祖配天一也帝后祔廟二也追崇本生三也已分見祀天廟制后妃私親廟各門今叙追尊之制内禪起居之儀母后上册之禮以廣盡孝之義焉禮記大傳牧之野武王之大事也追王大王亶父王季歴文王昌不以卑臨尊也注不用諸侯之號臨天子也文王稱王早矣於殷猶為諸侯於是著焉候疏土無二王殷紂尚存即為早所以早稱王者案中我應云我稱非早一民固下周本紀云文王受命六年立靈臺布王號於時稱王九十六也故文王世子云君王其終撫諸是也文王既稱王文王生雖稱王號稱猶未定故武王追王乃定之耳中庸周公成文武之德追王大王王季上祀先公以天子之禮注追王太王王季者以王迹起焉先公組紺以上至后稷也疏詩頌閟宫云太王居岐之陽實始翦啇是王迹起也吕氏大臨曰追王之禮古所無有其出於周公乎太王避狄去邠之岐則王業始基之矣王季成大王之業至文王受命作周武王壹戎衣而有天下纉大王王季文王之緒而已陳氏祥道曰大傳言武王追王太王王季文王中庸言周公成文武之德追王太王王季文武有追王之志周公行追王之事也司馬遷言文王有正朔追尊太王王季妄矣書曰大王肇基王迹王季其勤王家詩曰實維太王實始翦商則文王所以三分天下有其二者其始乃自太王王季也武王所以得天下其成乃自文王也詩曰周雖舊邦其命維新又曰文王受命有此武功書曰九年大統未集又曰集大命於厥躬記稱武王曰君王其終撫諸春秋書王正月公羊曰王者孰謂謂文王也觀此則宜若文王既受命作周改元稱王矣而記謂武王周公追王之何也葢於是時天下之訟獄者不之紂而之文王謳歌者不謳歌紂而謳歌文王則虞芮質成之後天固已命之矣然作周而未成有所統而未集不幸九年而終至此武王周公所以正其名而追之也觀祖伊稱文王以西伯武王稱文王以文考則文王未嘗稱王可知也游氏酢曰武王於泰誓三篇稱文王為文考至武成而柴望然後稱文考為文王世之説者因中庸無追王文王之文遂謂文王自稱王豈未嘗考泰誓武成之書乎君臣之分猶天尊地卑紂未可去而文王稱王是二天子也服事殷之道固如是耶書所謂大統未集者後世以虞芮質厥成為文王受命之始故也當六國時秦固已雄長天下而周之號微矣辛垣衍欲帝秦魯仲連以片言折之衍不敢復出口葢名分之嚴如此故以曹操之奸雄逡巡於獻帝之末而不得逞彼葢知利害之實也曾謂至德如文王一言一動順帝之則而反盜虚名而拂天理乎且武王觀政於商而須假之五年非偽為也使紂一日有悛心則武王當與天下共尊之必無牧野之事然則文王已稱之名將安所歸乎此天下之大戒故不得不辨蕙田案文王之不稱王自是一定本無可疑中庸之不及文王先儒謂武王業已追王而尚未及太王王季故周公成之其説近是史記及疏殊非至理陳氏游氏辨之極的呂氏祖謙曰謂不以卑臨尊此出於後來漢儒之説無疑而非追王之本意也嘗考之武成三王皆肇基之主所以追王之也蕙田案東萊之論是也記以諸侯為卑天子為尊非聖賢之意漢書髙祖本紀十年八月令諸侯王皆立太上皇廟班固贊曰漢帝本系出自唐帝降及於周在秦作劉渉魏而東遂為豐公豐公葢太上皇父其遷日淺墳墓在豐鮮焉及髙祖即位置祠祀官則有秦晉梁荆之巫應劭曰先人所在之國悉致祠巫祝博求神靈之意也文頴曰巫掌神之位次者也范氏世事於晉故祠祀有晉巫范會支庻留秦為劉氏故有秦巫劉氏隨魏都大梁故有梁巫後徙豐豐屬荆故有荆巫也世祠天地綴之以祀豈不信哉文獻通考馬氏曰漢髙帝承秦之敝禮制隳廢既即天子位而七廟未嘗立至太上皇崩始詔郡國立廟而皇祖以上無聞焉班史髙紀贊始有豐公之名且言致祠祀有秦晉荆梁之巫觀注家所言則是自晉而秦自秦而梁自梁而荆似各有祖廟各有巫以主其祀事然郊祀志言梁巫祀天地天社天水房中堂上之屬晉巫祠五帝束君雲中君巫社巫祠族人炊之屬秦巫祠社主巫保族纍之屬荆巫祠堂下巫先司命施麋之屬則諸巫所掌者乃祀典神祗之祠非祖廟也所謂世祠天地綴之以祀者豈是以諸祖配諸神而祠之而各處有巫主其事耶不可得而詳也蔡邕獨斷漢髙祖得天下而父在上尊號曰太上皇不言帝非天子也續漢書祭祀志光武帝建武三年正月立親廟祀父南頓君以上至舂陵節侯南頓君稱皇考鉅鹿都尉稱皇祖考鬱林太守稱皇曾祖考節侯稱皇髙祖考蕙田案光武中興崛起承奉大宗據昭穆之次以元帝為父故南頓君以上四世僅奉祠園寢未有追尊之典與為人後之禮合先儒皆以為不可及也晉書禮志延康元年魏文帝繼王位追尊皇祖為太王夫人曰太王后黄初元年受禪又追尊曰太皇帝皇考武王曰武皇帝明帝太和三年追尊髙祖大長秋曰髙皇夫人吳氏曰髙皇后通典魏文帝即王位尚書令桓階等奏臣聞尊祖敬宗古之大義故六代之君未嘗不追崇始祖顯彰所出先王應期撥亂啟魏大業然禰廟未有異號非崇孝敬示無窮之義也太尉公侯宜有尊號所以表功崇德𤼵事顯名者也故易言乾坤皆曰大德言大人與天地合臣等以為太尉公侯誕育聖哲以濟羣品可謂資始其德之號莫過於太王詔曰前奏以朝車迎中常侍大長秋特進君侯神主然君不宜但依故爵乗朝車也禮有尊親之義為可依諸王比更議博士祭酒孫欽等議案春秋之義五等諸侯卒葬皆稱公乃與王者之後宋公同號然臣子褒崇其君父以此言之中常侍大長秋特進君侯誕育太皇篤生武王奄有四方其功德之號莫過太王今迎神主宜乗王車又宜先遣使者上諡號為太王於是漢帝追諡為太王及受禪追尊太王為太皇帝考武王為武皇帝尊王太后為皇太后明帝泰和三年六月司空陳羣等議以為周武追尊太王王季文王皆為王是時周天子以王為號追尊即同故謂不以卑臨尊也魏以皇帝為號今追號皇曾祖中常侍大長秋特進君為王乃以卑臨尊也故漢祖尊其父為太上皇自是以後諸侯為帝者皆尊其父為皇也大長秋特進君宜號髙皇載主宜以金根車可遣大鴻臚持節乗大使車從騶騎奉印綬即鄴廟以太牢告祠從之又詔曰葢聞尊嚴祖考所以成湯文武實造商周克昌王業而詩書之義追尊稷禼自我魏室之承天序既𤼵跡於髙皇髙皇之父處士君精神幽逺號稱罔記非所以崇孝重本也其令公卿以下會議號諡侍中劉奕議周王所以后稷為祖者以其唐之諸侯佐堯有大功名在祀典故也至於漢氏之初追諡之義不過其父上比周室則大魏𤼵跡自髙皇而始下論漢氏則追諡之禮不及其祖奕思以為追尊之義宜齊髙皇而已侍中繆襲以為元者一也首也氣之初也是以周文演易以冠四德仲尼作春秋以統三正又諡法曰行義悦人曰元尊仁貴德曰元處士君宜追加諡號曰元皇太傅鍾繇議案禮小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣乃唐堯之所以敦叙於九族也其禮上殺於五非不孝敬於祖也下殺於五非不慈愛於其孫也旁殺於五非不篤友於昆弟也故為族屬以禮殺之處士君其數在六於屬已盡其廟當毁其主當遷今若追崇帝王之號天下素不聞其受命之符則是武皇帝櫛風沐雨勤勞天下為非功也推以人情普天率土不襲此議處士君明神不安此禮今諸博士以禮斷之其義可從詔從之蕙田案追王為尊親第一事自魏以前無有稱帝者稱之自魏始鍾繇以小記斷追尊之代於周追王義合劉侍中議亦不可廢宋書禮志孫權立堅廟尊曰始祖晉書禮志武帝泰始元年追尊皇祖宣王曰宣皇帝伯考景王曰景皇帝皇考文王曰文皇帝宣王妃張氏為宣穆皇后尊太妃王氏為皇太后宋書武帝本紀永初元年即位追尊皇考為孝穆皇帝皇妣為穆皇后通典䇿曰維永初元年七月皇帝謹遣某官某奉䇿上皇考尊號曰孝穆皇帝仰惟聖靈邈焉徂逺昔有周丕崇祚興昌季其在魏晉亦申情禮所以聿追來孝所因者本謹稽式上代考諸令准稱謂既極情典攸遂所以仰順天人俯穆率土在心逺慕庻云有慰追尊先后䇿曰維年月朔皇帝謹遣某官某奉䇿上皇妣尊號曰孝穆皇后伏惟皇妣資坤厚之性體母儀之德等美姜嫄齊列任姒訓穆中閨化流自逺膺歴運期饗兹天位謹依前典敬奉大禮仰慕聖善之愛俯增蓼莪之思齊髙帝受禪追尊皇考曰宣皇帝皇妣曰孝皇后梁書武帝本紀天監元年追尊考曰文皇帝妣曰獻皇后陳書髙祖本紀永定元年即位追尊考曰景皇帝妣董氏曰安皇后通典後魏道武帝稱尊號後追尊逺祖二十餘代皆稱皇帝則歴代未聞也不復更載諡號焉北齊文宣帝受東魏禪追尊祖為文穆帝妣為文穆皇后考為獻武皇帝兄為文襄皇帝母為皇太后後周閔帝受西魏禪稱天王追尊考曰文王後其弟明帝立稱帝號追尊文王曰文皇帝後其弟武帝立追尊曰德皇帝隋書髙祖本紀開皇元年追尊皇考曰武元皇帝妣曰元明皇后唐書髙祖本紀武德元年五月追諡髙祖曰宣簡公曾祖曰懿王祖曰景皇帝妣梁氏曰景烈皇后皇考曰元皇帝妣獨孤氏曰元貞皇后五代史梁本紀太祖開平元年追尊祖考為皇帝妣為皇后皇髙祖黯諡曰宣元妣范氏諡曰宣僖曾祖茂琳諡曰光獻妣楊氏諡曰光孝祖信諡曰昭武妣劉氏諡曰昭懿考誠諡曰文穆妣王氏諡曰文惠唐本紀莊宗同光元年追尊祖考為皇帝妣為皇后曾祖執宜妣崔氏皆諡曰昭烈祖國昌妣秦氏皆諡曰文景考諡曰武晉本紀髙祖天福元年追尊祖考為皇帝妣為皇后髙祖璟諡曰孝安妣秦氏諡曰孝安元曾祖彬諡曰孝簡妣安氏諡曰孝簡恭祖昱諡曰孝平妣來氏諡曰孝平獻考紹雍諡曰考元妣何氏諡曰孝元懿漢本紀髙祖即位稱天福十二年追尊祖考為皇帝妣為皇后髙祖湍諡曰明元妣李氏諡曰明貞曾祖昂諡曰恭僖妣楊氏諡曰恭惠祖僎諡曰昭憲妣李氏諡曰昭穆考琠諡曰章聖妣安氏諡曰章懿周本紀太祖廣順元年追尊祖考為皇帝妣為皇后髙祖璟諡曰睿和妣張氏諡曰睿恭曾祖諶諡曰明憲妣申氏諡曰明孝祖蘊諡曰翼順妣韓氏諡曰翼敬考諡曰章肅妣王氏諡曰章德宋史太祖本紀建隆元年奉玉冊諡髙祖曰文獻皇帝妣崔氏曰文懿皇后曾祖曰惠元皇帝妣桑氏曰惠明皇后祖曰簡恭皇帝妣劉氏曰簡穆皇后皇考曰武昭皇帝禮志太祖建隆元年九月太常禮院言謹案唐大中初追尊順宗憲宗諡號皇帝於宣政殿授玉冊遣宰臣以下持節奉冊赴太廟授冊日帝既御殿百僚拜訖降階跪授冊於太尉候太尉奉冊出宣政門然後升殿凡皇帝行禮皆太常卿贊導奉引奏可是月二十七日帝御崇元殿備禮遣使奉冊上四廟諡號皇帝髙祖府君冊曰孝曾孫嗣皇帝臣某再拜稽首上言伏以昊天有命皇宋勃興括厚載以開階宅中區而撫運夷夏蠻貊㒺不獻誠山川鬼神㒺不受職非臣否德肇此丕圖實賴先正儲休上𤣥降鑒既䖍膺於大寶乃眇覿於遐源敢遵歴代之規式薦配天之號皇曽祖府君冊曰伏以天命匪忱惟歸於有德人文設教必始於貽謀乗時既肇於興王報本敢稽於尊祖非隆徽稱則大享何以配神非鏤良珉則洪烈何由垂世方作猗那之頌永嚴昭穆之容皇祖驍衛府君冊曰伏以人瞻烏止運叶龍飛非𤼵源之長析𣲖不能通上漢非積基之厚嗣孫不能有中區今人紀肇修孝思㒺極酌百王之損益薦四廟之蒸嘗聖考太尉府君冊曰昔者流火開祥周發薦文王之號黄星應運曹丕揚魏祖之功咸因致孝之誠式展尊親之義爰遵大典亟上尊稱禮畢羣臣進表奉慰遼史文學蕭韓家努傳韓家努為翰林都林牙興宗重熙十三年春上疏曰臣聞先世遥輦洼可汗之後國祚中絶自額爾欽雅里立阻午大位始定然上世俗樸未有尊稱臣以為三皇禮文未備正與遥輦氏同後世之君以禮樂治天下而崇本追逺之義興焉近者唐髙祖尊四世為帝昔我太祖代遥輦即位乃製文字修禮法建天皇帝名號制宮室以示威服興利除害混一海内厥後累聖相承自額爾欽呼哩以下大號未加天皇帝之考額爾欽達魯猶以名呼臣以為宜依唐典追崇四祖為皇帝則陛下𢎞業有光墜典復舉矣䟽奏帝納之始行追冊元德二祖之禮興宗本紀重熙二十一年秋七月追尊太祖之祖為簡獻皇帝妣為簡獻皇后太祖之考為宣簡皇帝妣為宣簡皇后金史熙宗本紀天會十四年八月丙辰追尊九代以下祖考妣曰皇帝皇后禮志天會十四年八月庚戌文武百僚太師宗磐等上議曰國家肇造區夏四征弗庭太祖武元皇帝受命撥亂光啟大業太宗文烈皇帝繼志卒伐奮張皇威原其積德累功所由來者逺矣伏惟皇九代祖廓君人之量挺御世之姿虞舜生馮遷於負夏太王避狄邑此岐山聖姥來歸天原肇𤼵皇八代祖皇七代祖承家襲慶裕後垂芳不求赫赫之名終大振振之族皇六代祖徙居得吉播種是勤去暴露獲棟宇之安釋負戴興車輿之利皇五代祖貝勒雄姿邁世美畧濟時成百里日辟之功戎車既飭著五教在寛之訓人紀肇修皇髙祖太師質自天成德為民望兼精騎射往無不摧始置官師歸者益衆皇曾祖太師威靈震逺機警絶人雅善運籌未嘗衿甲臨敵愈奮應變若神皇曽叔祖太師機獨運心公無私物四方聳動諸部歸懐德威兩隆風俗大定皇伯祖太師友于盡愛國爾惟忠謀必㒺愆舉無不濟累代祖妣婦道警戒王業艱難俱殫内助之勞實著始基之漸是宜采羣臣之僉議酌故事以遵行欵帝於郊稱天以誄請上皇九代祖尊諡曰景元皇帝廟號始祖妣曰明懿皇后上皇八代祖尊諡曰德皇帝妣曰思皇后上皇七代祖尊諡曰安皇帝妣曰節皇后上皇六代祖尊諡曰定昭皇帝妣曰恭靖皇后上皇五代祖貝勒尊諡曰成襄皇帝妣曰威順皇后上皇髙祖太師尊諡曰惠桓皇帝妣曰昭肅皇后上皇曾祖太師尊諡曰聖肅皇帝妣曰簡翼皇后上皇曾叔祖太師尊諡曰穆簡皇帝妣曰静宣皇后上皇曾叔祖太師尊諡曰孝平皇帝妣曰貞惠皇后上皇伯祖太師尊諡曰恭簡皇帝妣曰敬僖皇后須廟室告成涓日備物奏上寶冊藏於天府施之㒺極丙辰奉上九代祖妣尊諡廟號是日百僚上表稱賀元史太祖本紀至元三年追諡伊蘓克烈祖神元皇帝太祖之父明史太祖本紀洪武元年追尊髙祖考曰元皇帝曾祖考曰恒皇帝祖考曰裕皇帝皇考曰淳皇帝妣皆皇后明集禮洪武元年春正月四日太祖詣太廟恭上四代考妣尊號髙祖伯六公五世祖重八公季子妣胡氏曾祖四九公髙祖次子妣侯氏祖初一公懿祖長子妣王氏考世珍熙祖次子妣陳氏右追尊書大禹謨祗載見瞽瞍䕫䕫齊慄瞽瞍亦允若蔡傳言舜敬其子職之事以見瞽瞍也齊莊敬也慄戰慄也䕫䕫莊敬戰慄之容也舜之敬畏小心而盡於事親者如此允信若順也言舜以誠感格雖瞽瞍頑愚亦且信順之即孟子所謂底豫也史記五帝本紀舜之踐帝位載天子旗往朝父瞽瞍䕫䕫唯謹如子道孟子天下大悦而將歸己視天下悦而歸己猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子朱子章句言舜視天下之歸己如草芥而惟欲得其親而順之也得者曲為順成以得其心之悦而已順則有以諭之於道心與之一而未始有違尤人所難也為人葢泛言之為子則愈宻矣舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝朱子章句瞽瞍至頑嘗欲殺舜至是而底豫焉書所謂不格姦亦允若是也葢舜至此而有以順乎親矣是以天下之為子者知天下無不可事之親顧吾所以事之者未若舜耳於是莫不勉而為孝至於其親亦底豫焉則天下之為父者亦莫不慈所謂化也子孝父慈各止其所而無不安其位之意所謂定也為法於天下可傳於後世非止一身一家之孝而已此所以為大孝也李氏曰舜之所以能使瞽瞍底豫者盡事親之道共為子職不見父母之非而已昔羅仲素語此云只為天下無不是底父母了翁聞而善之曰唯如此而後天下之為父子者定彼臣弑其君子弑其父者常始於見其有不是處耳咸丘䝉問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勲乃徂落百姓如䘮考妣三年四海遏宻八音孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年䘮是二天子矣朱子章句孟子言堯但老不治事而舜攝天子之事耳堯在時舜未嘗即天子位堯何由北面而朝乎咸丘䝉曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也朱子章句不為臣不以堯為臣使北面而朝也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也書曰祗載見瞽瞍䕫䕫齊栗瞽瞍亦允若是為父不得而子也朱子章句言瞽瞍既為天子之父則當享天下之養此舜所以為尊親養親之至也蕙田案孟子二章萬古人主尊親之極則竹書紀年夏帝不降五十九年遜位於弟扄沈氏約注三代之世内禪惟不降實有聖德史記趙世家趙武靈王二十七年五月大朝於東宮傳國立王子何以為王王廟見禮畢出臨朝大夫悉為臣武靈王自號為主父漢書髙祖本紀六年上歸櫟陽五日一朝太公太公家令説太公曰天亡二日土亡二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公擁彗李竒曰為恭也如令卒持帚也師古曰彗者所以掃也迎門却行上大驚下扶太公太公曰帝人主奈何以我亂天下法於是上心善家令言師古曰晉太子庻子劉寶云善其𤼵悟己心因得尊崇父號非善其令父敬己賜黄金五百斤夏五月丙午詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親披堅執鋭自帥士卒犯危難平暴亂立諸侯偃兵息民天下大安此皆太公之教訓也諸王通侯將軍羣卿大夫已尊朕為皇帝而太公未有號今上尊太公曰太上皇師古曰太上極尊之稱也皇君也天子之父故號曰皇不預治國故不言帝也蔡邕云不言帝非天子也故索隠曰本紀秦始皇追尊莊襄為太上皇已有事矣葢太上者無上也皇者德大於帝通典註後漢荀悦曰孝經曰故雖天子必有尊也言有父也王者父事三老以示天下所以明孝也無父猶設三老之禮况其存者乎孝莫大於嚴父故子尊不加於父母家令之言於是過矣晉愍懐太子令問中庻子劉寳云太公家令説太公為是為非對曰茍悦論貶家令為非臣以為悦不識髙帝意髙帝雖貴為天子事父不失子之禮時即位已六年而不加父號是以家令言雖父乃人臣也言無可尊敬名號當與人臣同禮欲以此感動之帝聞家令言乃悟即立號太上皇得人子尊父之道若不聞家令言父終無號矣家令説是也蕙田案家令説上之言似與孟子齊東野人之語相類當時孟子弟子如咸丘䝉尚信不及何况家令但髙祖心存敬父聞言感悟似家令諷之耳故以髙祖心善家令為𤼵悟己心亦可也魏書獻文帝本紀帝雅薄時務常有遺世之心欲禪位於叔父京兆王子推羣臣固請帝乃止皇興五年七月丙午册命太子曰昔堯舜之禪天下也皆由其子不肖若丹朱商均能負荷者豈搜揚側陋而授之哉爾雖冲弱有君人之表必能恢隆王道以濟兆民今使太保建安王陸馛太尉源賀持節奉皇帝璽綬致位於爾躬其踐昇帝位克廣洪業以光祖宗之烈使朕優游履道頥神養性可不善歟丁未詔曰朕承洪業運屬太平淮岱率從四海清宴是以希心𤣥古志存澹泊躬覽萬務則損頥神之和一日或曠政有淹滯之失但子有天下歸尊於父父有天下傳之於子今稽恊靈運考會羣心爰命儲宮踐昇大位朕方優游恭己栖心浩然社稷乂安克廣其業不亦善乎百官有司其祗奉􅉙子以答天休宣布㝢内咸使聞悉於是羣公奏曰昔三王之世澹泊無為故稱皇是以漢髙祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼冲萬機大政猶宜陛下總之謹上尊號太上皇帝乃從之己酉太上皇帝徙御崇光宮採椽不斵土階而已國之大事咸以聞北齊武成帝紀即位四年傳位於太子緯自稱太上皇周書宣帝本紀詔曰有聖大寶實惟重器元天表命人事與能幽顯同謀確乎不易域中之大實懸定於杳冥天下為公葢不避於内舉我大周感蒼昊之精受河洛之錫武功文德光格區宇創業垂統永光無窮朕以寡薄祗承鴻緒上賴先朝得一之迹下藉羣后不貳之心職貢與雲雨俱通憲章共光華並亘圓首方足咸登仁夀思隆國本用宏天歴皇太子衍地居上嗣正統所歸逺凴積德之休允叶無疆之祚帝王之量未肅而成天禄之期不謀已至朕今傳位於衍乃睠四海深合謳歌之望俾予一人髙蹈風塵之表萬方兆庻知朕意焉可大赦天下改大成元年為大象元年帝於是自稱天元皇帝所居稱天臺冕有二十四旒車服旗鼓皆以二十四為節内史御正皆置上大夫皇帝衍稱正陽宮置納言御正諸衛等官皆准天臺又令羣臣朝天臺者皆致齋三日清身一日車旗章服倍於前王之數文獻通考唐髙祖武德九年詔禪位於皇太子稱太上皇上皇以宏義宮有山林勝境雅好之貞觀三年四月乃徙居之改為太安宮上屢請上皇避暑九成宮上皇以隋文帝終於彼惡之乃營大明宮以為上皇清暑之所未成而上皇寢疾不果居睿宗在位二年制傳位於太子太子上表固辭上謂太子曰汝以為天下事重欲朕兼理之耶昔舜禪禹猶親巡狩朕雖傳位豈忘國家其軍國大事當兼省之八月庚子𤣥宗即位尊睿宗為太上皇上皇自稱曰朕命曰誥五日一受朝於太極殿皇帝自稱曰予命曰制𠡠日受朝於武德殿三品以上除授及大刑政决於上皇餘皆决於皇帝明年上皇誥自今軍國政刑一皆取皇帝處分朕方無為養志以遂素心是月徙居百福殿肅宗至德元年即位於靈武尊𤣥宗曰上皇天帝靈武使者至蜀上皇喜曰吾兒應天順人吾復何憂制自今改制𠡠為誥表疏稱太上皇四海軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事命韋見素房琯崔渙奉傳國寶玉册詣靈武傳位二年克復兩京使韋見素入蜀奉迎上皇上皇至鳯翔從兵六百餘人上皇命悉以甲兵輸郡庫上𤼵精騎三千奉迎十二月丙午上皇至咸陽上備法駕迎於聖賢宮上皇在宮南樓上釋黄袍著紫袍望樓下馬趨進拜舞於樓下上皇降樓撫上而泣上捧上皇足嗚咽不自勝上皇索黄袍自為上著之上伏地頓首固辭上皇曰天數人心皆歸於汝使朕得保養餘齒汝之孝也上不得已受之父老在仗外歡呼且拜上令開仗縱千餘人入謁上皇曰臣等復覩二聖相見死無恨矣上皇不肯居正殿曰此天子之位也上固請自扶上皇登殿尚食進食上品嘗而薦之丁未將𤼵行宮上親為上皇習馬而進之上皇上馬上親執鞚行數歩上皇止之上乗馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳左右皆呼萬歲上皇自開逺門入大明宮御含元殿即日幸興慶宮遂居之上累表請避位還東宮上皇不許順宗永貞元年即位疾不能視事傳位太子純稱太上皇宋徽宗宣和七年十二月上内禪以道君號退居龍德宮皇太子即皇帝位尊道君為太上皇帝宋史髙宗本紀紹興三十二年六月丙子詔皇太子即皇帝位帝稱太上皇退處德夀宮禮志紹興三十二年六月詔上太上皇帝太上皇后尊號集議以聞左僕射陳康伯等言五帝之夀惟堯最髙百王之典惟堯獨冠今兹髙世之舉視堯有光恭請上太上皇帝尊號曰光堯夀聖太上皇帝太上皇后尊號曰夀聖太上皇后詔恭依仍令禮部太常討論禮儀以聞左僕射陳康伯撰太上皇帝册文兼禮儀使參政汪澈書册文并篆寶知樞宻院葉義問撰太上皇后册文同知樞宻院事黄祖舜書册文八月十四日奉上册寶是日陪位文武百僚太傅以下行事官並朝服入詣大慶殿下立班皇帝自内服履袍入御幄服通天冠絳紗袍出至大慶殿詣册寶褥位前再拜在位官皆再拜訖皇帝行𤼵册寶授太傅之禮如儀禮畢皇帝還幄服履袍還内文武百僚退儀仗鼓吹備而不作䕶衛册寶太傅以下行事官導從册寶至德夀宮皇帝自祥曦殿服履袍乗輦至德夀宮大次降輦陪位文武官入殿庭立班定太傅以下行事官從册寶入殿皇帝服通天冠絳紗袍升殿詣西向褥位立太上皇帝自宮服履袍即坐皇帝北向四拜起居訖次太傅以下皆四拜起居次行奉册之禮中書令參知政事史浩讀册攝侍中葉義問讀寶讀訖退復位皇帝再拜稱賀曰皇帝臣某稽首言伏惟光堯夀聖太上皇帝陛下冊寶告成鴻名肇正與天同夀率土均懽皇帝再拜次侍中承㫖宣答曰皇帝孝通天地禮備古今勉受鴻名良深感慰皇帝再拜訖西向立次太傅以下再拜稱賀致詞曰攝太傅尚書左僕射臣康伯等稽首言伏惟光堯夀聖太上皇帝陛下肅臨寶位誕受丕稱獨推天父之尊普慰帝臣之願奏訖再拜舞蹈次侍中承㫖宣答曰光堯夀聖太上皇帝聖㫖倦勤滋久佚老是圖勉受嘉名但增感􅇺又再拜舞蹈次太上皇帝降坐入宮皇帝後從夀聖太上皇后册寶入宮皇帝詣太上皇后坐前北向立太上皇后升坐皇帝四拜起居行奉上册寶之禮讀册官陳子常讀册讀寶官梁康民讀寶讀訖復位皇帝再拜稱賀致詞曰皇帝臣某稽首言伏惟夀聖太上皇后陛下德茂坤元禮崇大號寶書翕受歡忭無疆皇帝再拜次宣荅官承㫖宣答曰夀聖太上皇后教㫖皇帝祲容載藏顯號來膺誠孝通天但深感愓皇帝再拜訖太上皇后降坐入宮次太傅以下文武百僚就德夀殿下拜牋稱賀以俟皇帝服履袍乗輦還内十六日宰臣率文武百僚詣文德殿拜表稱賀文獻通考髙宗紹興三十二年内禪加上尊號乾道七年再加上尊號為光堯夀聖憲天體道太上皇帝淳熈二年再加上尊號為光堯夀聖憲天體道性仁成德經武緯文太上皇帝是年以聖夀七十行慶夀禮十二年再加紹業興統明謨盛烈八字十三年以聖夀八十行慶夀禮赦天下三十二年六月十一日内禪十二日上詣德夀宮欲以是日率百官朝太上皇於德夀殿以雨百僚免入見上就宮中行禮自後上詣宮行禮即不集百官陪十三日詔令宰臣率百官於初二日十六日詣德夀宮起居又詔朕欲毎日一朝德夀宮面奉慈㫖恐廢萬幾煩羣下不許如前代朔望之禮令禮官重定其期禮部請依漢髙帝五日一朝太公故事毎五日一詣德夀宮朝見如宮中禮從之仍詔自今後詣德夀宮惟經過官司起居餘並免十七日太上宣諭車駕毎至宮必於門外降輦既行家人之禮自宜至殿上降輦又不須五日一朝只朝朔望於是有司請除朔望朝拜於毎月初八日二十二日詣德夀宮起居如宮中儀從之自後皆遵此制如值雨及盛暑祁寒臨期承太上特㫖仍免詣十二月冬至上詣德夀宮稱賀上夀禮畢入見太后如宮中之儀自後正至並同乾道元年二月朔上詣德夀宮請太上太后至延祥觀燒香次幸聚景園次幸玉津園太上聖㫖日晚免車駕從還德夀宮臣僚止從駕還内沿路並免起居除官軍官從駕外執政官以下並免以後或恭請幸南内或幸聚景園玉津園延祥觀靈隠天竺寺其儀並同皇帝朝德夀宮儀注前期儀鸞司設大次於德夀宮門内小次於殿東廊西向其日俟皇帝出即御座從駕臣僚禁衛等起居如常儀皇帝降御座乗輦將至德夀宮報文武百僚詣宮門外迎駕起居訖前導官太常卿閤門官太常博士禮直官先入詣大次前分左右立定俟皇帝詣德夀宮大次降輦入次御史臺閤門太常寺報文武百僚入詣殿庭北向立定前導官導皇帝入小次簾降俟太上皇帝即御座小次簾捲前導官導皇帝升殿東階詣殿上折檻前奏請拜皇帝再拜訖前導官導皇帝稍前躬奏聖躬萬福訖導皇帝復位又奏請拜皇帝再拜訖導皇帝詣太上皇帝御座之東西向立前導官於殿上隨地之宜少立揖班首以下躬典儀曰拜贊者承傳曰拜在位官皆再拜訖直身搢笏躬身三舞蹈跪左膝三叩頭出笏就一拜又兩拜拜訖且躬身班首不離位奏聖躬萬福訖典儀曰拜贊者承傳曰拜在位官皆再拜又兩拜拜訖直身立捲班出前導官以次退從駕官歸幕次以俟從駕還内太上皇帝駕興皇帝從入見太上皇后如宮中之儀訖以俟皇帝還内如來儀毎遇正旦冬至及朔望並依上儀孝宗淳熙二年十一月詔太上皇帝聖夀無疆新歲七十用十一月冬至加上尊號册寶十二月十七日立春行慶夀禮是日早文武百僚並簮花赴文德殿立班聽宣慶夀赦赦文太極之功不宰其可贊者兩儀之生大明之照無疆所能推者千載之至欽惟聖父誕保我家二百餘載而中天定神器於欹側艱虞之始三十六年而宅位授朕師於康强暇豫之時上穹綿有永之年下土洽無為之化興言菲質日侍慈顔竭幅員之富而未足伸至養之誠極尊美之稱而未足表難名之德兹載新於歲律庸展慶於耆齡前殿奉巵企髙皇而踵武大安進膳邁貞觀之彌文鏘金奏以克庭儼臣工而在列和氣遄周於宇宙盛容創見於古今仍内奉於母儀庸備殫於子道為酒以介眉夀誕膺純嘏之常立春而下寛書更廣庻民之富可大赦天下於戱建無窮之基則享無窮之樂命方卜於萬年有非常之事則侈非常之休恩盍推於四海矧羣􅀺百姓夙依於覆育而耆老大夫咸自于甄陶今而仁夀之同躋必也安榮之共保諒爾有邦之衆知予錫類之心赦書日行五百里敢以赦前事言者以其罪罪之主者施行宣赦訖從駕官並赴後殿起居謝花再拜從駕至德夀宮行慶夀禮陳設前期儀鸞司陳設德夀宮殿上當中南向設大次於德夀宮内南向小次於殿東廊西向設皇帝褥位二一於御座之東西向一於御座之南北向尚醖設御酒器於御座之東有司又設御茶床於御座之西俱稍北上夀其日後殿入内官喝排立俟催班立定應從駕應奉官禁衛等並簪花不係從駕官徑赴德夀宮並簪花以俟迎駕起居閤門報班齊皇帝服鞾袍出宮門禁衛諸班親從等並迎駕自贊常起居自贊謝花兩拜入内省執骨朶使臣迎賀常起居謝花兩拜皇帝坐知閤門以下御帶環衛官諸司祗應官等一班鬬班宣名常起居次贊謝花兩拜訖知閤門官升殿讀奏目餘官並退次舍人引應從駕官一班赴當殿宣名常起居次贊謝花兩拜執政有奏事如儀皇太子内中起居簪花以俟從駕次管軍一班宣名次贊謝花兩拜訖皇帝升輦將至徳夀宫文武百僚迎駕常起居贊謝花兩拜訖前導太常卿閤門官太常博士禮直官并管軍御帶環衛官等詣大次前分左右立文武百僚入詣德夀殿下東西相向立俟皇帝至大次降輦入次簾降簮花服鞾袍閤門御史臺太常寺分引皇太子以下應從駕官入詣德夀殿下東西相向立大次簾捲前導官前導皇帝入小次簾降前導太常卿閤門官太常博士禮直官并管軍御帶環衛官等俟太上皇帝出宮迎太上皇帝四拜起居太上皇帝出宮行門禁衛諸班親從等迎太上皇帝自贊常起居太上皇帝升御座鳴鞭小次簾捲前導官前導皇帝升殿東階詣殿上折檻前北向褥位奏請拜皇帝再拜訖躬奏聖躬萬福訖又奏請拜皇帝再拜訖前導皇帝詣太上皇帝御座之東褥位西向立前導官於殿上隨地之宜立閤門御史臺太常寺分引皇太子并文武百僚並横行北向立舍人揖皇太子以下躬典儀曰拜贊者承傳在位官皆再拜搢笏舞蹈又再拜訖且躬身班首不離位奏聖躬萬福訖典儀曰拜贊者承傳在位官皆再拜訖直身立分東西相向立禮直官引奉盤盞㕘知政事受盤盞㕘知政事承㫖宣答簽書樞宻院事奏禮畢户部尚書殿中監少監升殿東階奉盤盞㕘知政事受盤盞㕘知政事殿中監少監詣酒稍北南向立承㫖宣答簽書樞宻院事并奏禮畢户部尚書詣折檻之東西向立舍人通樂人姓名已下四拜起居次看盞人稍前贊拜兩拜贊上殿祗候内特進御茶牀殿侍酹酒託尚醖典御以盤盞酒注授殿中監少監次禮直官引奉盤盞叅知政事詣酒樽所北向搢笏殿中監奉盤盞㕘知政事捧盤盞西向立殿中監啟盞殿中少監以酒注於盞奉盤盞㕘知政事奉酒詣皇帝前北向禮直官引受盤盞㕘知政事詣太上皇帝御座前西向立定閤門御史臺太常寺分引皇太子并文武百僚横行北向立俟奉盤㕘知政事躬進皇帝皇帝奉酒詣太上皇帝御座前躬進訖少後受盤盞㕘知政事躬接訖復授奉盤盞㕘知政事前導官導皇帝詣御座前褥位北向俛伏跪殿下皇太子并百僚並躬身皇帝致詞曰皇帝臣御名稽首言天祐君親錫兹難老維春之吉年德加新臣御名與羣臣等不勝大慶謹上千萬歲夀伏興奏請拜皇帝再拜典儀曰拜贊者承傳在位官皆再拜訖直身立分東西相向立前導官導皇帝詣御座東西相向立奉盤盞㕘知政事以盤北向躬進皇帝訖奉盤盞㕘知政事復位立皇帝捧盤詣御座東西向立樂作俟太上皇帝飲酒訖皇帝躬接盞樂止少後受盤盞㕘知政事躬接訖以授尚醖典御各復位立閤門御史臺太常寺分引皇太子并文武百僚横行北向立前導官導皇帝詣褥位北向奏請拜皇帝再拜典儀曰拜贊者承傳在位官皆再拜訖直身立前導官導皇帝詣御座之東褥位西向立舍人揖皇太子已下躬典儀曰拜贊者承傳在位官皆再拜搢笏舞蹈又再拜訖直身立内侍舉御茶牀禮直官引户部尚書詣御座前北向俛伏跪奏具官臣某言禮畢伏興退復位立典儀曰拜贊者承傳在位官皆再拜訖直身立分相向立次舍人贊樂人謝祗應兩拜訖太上皇帝駕興皇帝從入宮文武百僚前導應奉官等以次退皇帝皇太子入賀太上皇后於宮中行禮執政率文武百僚拜牋賀太上皇后訖以俟駕興從駕并應奉官禁衛等並簮花從駕還内建炎以來朝野雜記昭慈聖獻皇后之在建康也有司月奉千緡而止后生辰别奉緡錢萬時朝廷用度不給故其禮不及承平時其後顯仁后自北來歸歲奉錢二十萬緡月奉萬緡冬年寒食生辰倍之帛二萬餘匹生辰絹萬匹春冬端午各三千匹綾羅二千匹冬綿五千兩酒日一斗羊三牽髙宗在德夀宮孝宗命有司月供十萬緡髙宗以養兵多費詔減其六萬及孝宗在重華命月進三萬緡而已上受禪詔太皇太后月奉緡錢二萬皇太后萬五千上皇太后五萬而重華别給二萬焉馬氏端臨曰光堯之夀祉夀皇之孝養古今罕儷故具載其事宋史孝宗本紀贊曰自古人君起自外藩入繼大統而能盡宮庭之孝未有若帝其間父子怡愉同享髙夀亦無有及之者終䘮三年又能却羣臣之請而力行之宋之廟號若孝宗之為孝其無愧焉淳熙十六年二月内上禪皇太子即位移御重華宮上尊號曰至尊夀皇聖帝紹熙五年光宗以疾不能行䘮禮七月憲聖太皇太后命皇子嘉王即皇帝位尊光宗為太上皇居泰安宮以内中寢殿為之慶元元年上尊號曰聖安仁夀蕙田案禪位之禮始於唐堯然堯在位時舜攝而已及即位瞽瞍為天子父始有孝養之文書所謂載見瞽瞍䕫夔齊慄當是為天子時此舜之大孝然也降及後世父子相繼爰有内禪之舉始於商帝不降趙武靈王而北魏北周及唐亦踵行之然其儀不詳逮宋三宗相繼内禪而克全孝道始終無間惟孝宗稱首其儀備見於文獻通考事雖不常有而其禮不可軼也若通考兼載事跡始終兹因與禮無關並削之葢體例不同爾右尊太上皇禮詩大雅大明摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季惟德之行大任有身生此文王史記周本紀季歴娶大任生昌有聖瑞古公曰我世當有興者其在昌乎國語晉語昔者大任娠文王不變少􅘞於豕牢而得文王不加疾焉皇王大紀季歴娶於摯曰大任有賢德目不視窈色耳不聽滛聲口不出惡言容貌恭肅齊如也列女傳文王生而明聖大任教之以一而識百君子謂大任為能胎教孔氏頴達曰禮婦人從夫之謚故頌稱大姒為文母大任非謚也以其尊加於婦尊而稱之故謂之大姜大任大姒惟武王妃之稱左傳謂之邑姜不稱大葢避大姜故也蕙田案孔氏云尊加於婦故謂之太此稱太之正義也後人太后之稱實始於此宗元案對王季而言曰摯仲氏任對文王而言曰太任有身詩之稱謂一字不茍如此固非專為其尊加於婦也然後世太后之稱實始於此則知太姜太任太姒之類皆以其尊加於婦也亦宜思齊思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男序思齊文王所以聖也疏言文王所以得聖由其賢母所生文王自天性當聖聖亦由母大賢故歌詠其母言文王之聖有所以而然也何氏楷曰徽毛云美也案徽本三糾䋲之名琴節亦曰徽則以琴絃是䋲為之故淮南子云鼓琴循絃謂之徽也文選五臣注亦云調也此以徽音連言當即取琴節之義以其音調和可聽謂之美音猶云令閒也蕙田案賢母之盛莫過於周二篇皆推本言之以明王業所由基後世歸美太后崇上徽號其義實原於此何氏釋徽音字的文獻通考漢因秦之稱號帝母稱皇太后祖母稱太皇太后惠帝即位尊呂皇后為皇太后臨朝稱制文帝立尊母薄姬為皇太后姬初為代太后薄氏侯者一人景帝立尊母竇皇后為皇太后竇氏侯者三人武帝立尊母王皇后為皇太后王氏田氏侯者凡三人昭帝崩霍光迎立昌邑王賀尊上官皇后為皇太后既廢賀立宣帝尊太后為太皇太后元帝立尊孝宣王皇后為皇太后成帝即位為太皇太后王氏列侯者二人闗内侯一人成帝立尊母王皇后為皇太后哀帝即位尊為太皇太后哀帝立尊趙后為皇太后趙氏侯者二人又尊定陶共皇太后為帝太太后丁姬為帝太后復又更號帝太太后為皇太太后稱永信宮帝太后稱中安宮而成帝母太皇太后本稱長信宮成帝趙后為皇太后並四太后各置少府太僕秩皆二千石傅氏侯者六人蕙田案通考載呂太后臨朝稱制王太后委政於莽以移漢祚及班氏胡致堂議西京外戚貽禍之本末詳矣然其失在後而其初固不得謂之非尊親之典也今並削其事變而録之至定陶太后係私親别詳吉禮門東漢明帝即位尊隂皇后為皇太后肅宗即位尊馬皇后為皇太后帝欲封爵諸舅太后不聽和帝即位尊竇皇后為皇太后臨朝殤帝立尊鄧皇后為皇太后安帝立猶臨朝政安帝閻皇后立少帝為皇太后臨朝順帝梁皇后立冲帝尊為皇太后臨朝質帝立猶秉朝政靈帝即位竇太后為皇太后臨朝竇氏誅帝猶以太后有援立之恩朝於南宮親饋上夀供養資奉有加於前靈帝崩王子辨即位尊母何皇后為皇太后臨朝魏文帝受禪尊卞后為皇太后稱永夀宮明帝即位尊太后曰太皇太后明帝立尊郭皇后為皇太后稱永安宮齊王即位尊郭皇后為皇太后稱永寧宮晉惠帝即位尊楊皇后為皇太后東晉成帝即位尊庾皇后為皇太后臨朝稱萬歲哀帝即位生母章貴人尊為皇太妃穆帝即位尊禇皇后為皇太后臨朝稱制簡文帝即位尊后為崇德太后孝武皇帝即位尊生母李氏為淑妃太元三年進為貴人九年又進為夫人十二年加為皇太妃十九年尊為皇太后稱崇訓宮安帝即位尊為太皇太后通典徐邈與范甯書訪其事甯答謂子不得以爵命母妃是太子婦號必也正名寧可以稱母也邈重與甯書曰禮天子之妃曰后關雎稱后妃之德妃后之名可謂大同所以憲章皇極禮崇物備者在於此也故太后之號定於前朝而當今所率由也若必欲章服同於后而名號異於妃則可因夫人之稱而加皇太以明尊尊雖一理然於文物之章猶未盡崇髙之極此又今之所疑不可得行也足下嫌太子妻稱妃然古無此稱出於後代今有皇太之别可例論耶甯又答曰案公羊傳母以子貴當以此義為允禮有君之母非夫人者以此推之王者之母亦何必皆后乎所謂尊母非使極尊號也並后匹嫡譏存春秋謂宜稱皇太夫人下皇后一等位比三公此君母之極號也稱夫人則先后之臣也加皇太則至尊之母也皇君之謂也君太夫人豈不允乎殷仲堪與徐邈書云后者婦人之貴號在妻則言后在母則加太禮天子之妃稱后闗雎曰后妃之德后妃二名其義一也設使皇后處内貴妾必不可稱妃邈又答徐乾書云母以子貴榖梁亦有其義故曰賵人之母則可又會成風葬著言禮也但名雖夫人而實如同體故不敢配厭羣臣無服所服以為異也鄭云近臣從服唯君所服若嫡夫人殁則有制重者故曰唯君所服之耳與君同重自施近臣驂僕而下三卿五大夫内有宗廟之祭外有侯伯之命何得以私服廢正故庻母為夫人上之不得以干宗廟外之不得以接侯伯唯國内申其私而崇其儀亦如侯伯子男之臣於内稱君曰公耳雖人君肆情行服而卿大夫不從所以知上有天王也邈往來答釋范武子以詩序云后妃義一是以太妃車旗服章備如太后唯不敢從於宗廟禮又曰百官不稱臣所以合無服之制也范於時都謂不應同皇后服章以尊議難之自塞矣書傳無天子庻母之文但妾上無女君夫人可為通稱如五等爵皆稱公耳天王之與王后未聞二其號者所以闗之情禮而定太妃之稱良有由矣體同王極故上比稱皇屈於郊廟故逺避伉儷不曰后而曰妃因名求實可謂至矣禮太后與太妃義無異者假令國君在時妾自當稱夫人但王典無二名不得以國公夫人為喻耳通典太元十九年又詔追崇鄭太后尚書令王珣奏下禮官詳正案太常臣允等議以春秋之義母以子貴故仲子成風咸稱夫人經云考仲子之宮明不配食也且漢文昭二太后並繫子號宜逺准春秋考宮之義近摹二漢不配之典尊號既正宜改築新廟顯崇尊稱則罔極之情申别建寢廟則嚴禰之道著繫子為稱兼明貴之所由一舉而三義以允固哲王之髙致可如允等議追尊會稽太妃為簡文皇太后也宋武帝受禪尊後母蕭氏為皇太后帝事太后孝謹即位時春秋已髙毎旦朝太后未嘗失時刻少帝即位尊為太皇太后孝武即位尊母淑媛為皇太后宮曰崇憲廢帝立為太皇太后明帝立號崇憲太后乃居中宮廢帝即位尊孝武王皇后為太后宮曰永訓後廢帝即位尊明帝王皇后為皇太后宮曰弘訓母陳氏尊為皇太妃輿服一如晉孝武李太妃故事宮曰弘化置家令一人改諸國太妃曰太姬陳文帝即位尊武帝章皇后為皇太后宮曰慈訓廢帝即位后為太皇太后宣帝立復為皇太后後主即位尊宣帝栁皇后為皇太后宮曰𢎞範後魏太武即位尊明元杜皇后為皇太后封后弟為遼東王文成即位尊文成馮皇后為太后聽政獻文孝文時尊曰太皇太后復聽政明帝即位尊宣武髙皇后為皇太后尋為尼居瑶光寺非大節慶不入宮中尊母胡光華為皇太妃後尊為皇太后齊文宣受禪尊母婁妃為皇太后宮曰宣訓濟南即位尊為太皇太后後主即位尊武成胡后為皇太后周武成即位尊母叱奴氏為皇太后宣帝即位尊武帝后阿史那氏為皇太后大象元年改為天元皇太后二年又尊為天元上皇太后靜帝立尊為太后尊母李氏為帝太后大象元年改為天元帝太后又尊為太皇太后二年又尊為天元聖皇太后靜帝立尊為大帝太后靜帝時楊堅秉政尊天元楊后為皇太后居𢎞聖宮母朱氏尊為帝太后唐憲宗立尊順宗王皇后為皇太后穆宗立尊憲宗郭后為皇太后敬宗立尊為太皇太后宣宗立尊母鄭妃為皇太后懿宗尊為太皇太后敬宗立尊穆宗王后為皇太后文宗時稱寶歴太后太和五年宰相建白以太皇太后與寶歴太后稱號未辨前代詔令不敢斥言皆以宮為稱今寶歴太后居義安殿宜曰義安太后詔可文宗立尊母蕭氏為皇太后太和中懿安太后居興慶宮懿宗后文宗祖母寶歴太后居義安殿穆宗妃敬宗母后居内殿穆宗妃文宗母號三宮太后帝每五日問安及歲時慶謁率由複道至南内羣臣及命婦詣宮門候起居哀帝即位尊昭宗何后為皇太后徙居積善宮號積善太后蕙田案唐則天武后韋后皆稱太后然妄自尊立非闗孝養並削不録後唐莊宗即位冊尊母曹氏為皇太后而以嫡母劉氏為皇太妃往謝太后太后有慚色帝既滅梁使人迎太后歸洛陽居長夀宮而太妃獨留晉陽太妃與太后甚相愛其送太后於洛也涕泣而别蕙田案莊宗可謂不知禮矣抑亦傷太后之心乎存之可為鑑戒愍帝即位冊尊明宗后曹氏為皇太后淑妃王氏為皇太妃晉出帝即位尊髙祖后李氏為皇太后漢愍帝即位尊髙祖后李氏為皇太后周太祖入京事太后如母遷於太平宮上尊號曰昭聖皇太后周恭帝即位尊世宗皇后符氏為皇太后宋受禪號周太后宋昭憲皇太后太祖之母帝受禪尊為皇太后宋史禮志建隆元年詔尊母南陽郡太夫人為皇太后仍令所司追冊四親廟後不果行文獻通考真宗即位尊太宗明德李后為皇太后居西宮嘉慶殿宋史禮志至道三年四月尊太宗皇后李氏為皇太后宰臣等詣崇政殿門表賀皇帝又詣内東門表賀皇太后乾興元年真宗遺制尊皇后劉氏為皇太后淑妃楊氏為皇太妃亦不果行冊禮文獻通考仁宗即位尊真宗莊獻明肅皇后為皇太后以生日為長寧節出入御大安輦鳴鞭侍衛如乗輿羣臣上尊號曰應元崇德仁夀慈聖太后元日帝率百官上夀天聖二年七月宰臣王欽若等拜表請上皇太后尊號命宰臣王曾撰冊文參知政事魯宗道書冊寶其冊文曰嗣皇帝臣某謹再拜稽首言恭以為天下之母者愛育之功博居域中之大者覆載之道均乃有飾盛禮以推崇因强名而丕顯以恩則尊親偕極以義則中外一詞表德垂鴻非可以缺况乎寧保基緒撫覽權綱格萬宇之治平副輿情之輸戴式隆稱號以播休鑠伏惟皇太后陛下聰明淑哲淵穆懿恭襲御龍之遐源啟曾沙之瑞命輔佐先聖輯睦藩房申翊宮朝協敷閫教服圖史之至戒慕黄老之㣲言及正宮承天居尊治内勤儉之化式於中闈和平之風被於四表王基允固睿問載融曩者號弓在辰仍几有命粤以大寶付於菲躬㷀㷀哀荒懼罔攸濟實賴慈䕃以授洪圖上奉顧托之明俯慰遐邇之望詳録機務咨謀政經憲祖宗之舊章厲官師之凝績本乎子物之惠濟乃守成之業方今蠻夷欵服封宇靖安百度聿修六氣時若肇禋肆類克展上儀享是休嘉率由保翼故得公卿庻尹藩嶽守臣武旅戎酋緇黄耋艾咸謂周有思齊之什播於聲歌漢有長樂之謡垂於竹帛斟酌前訓擬議盛猷允非鴻名莫揚茂烈綿代曠典自我而著猶且推美而弗有約已以至謙連袂叩閽露草五請臣等以因人之欲拜跪於内甫迴冲慮乃狥公言夫含章履順之謂應元詔詞逮下之謂崇德體仁所以膺夀臧之福宣慈所以隆聖善之懿不勝大願謹與百僚士庻奉玉冊琮寶上尊號曰應元崇德仁夀慈聖皇太后伏惟懋協歡心誕膺洪冊承七廟之流祥受九旻之敷錫擁佑家邦祉祚無極臣某誠歡誠忭稽首頓首謹言宋史禮志天聖二年宰臣王欽若等五表請上皇太后尊號十一月郊祀畢帝御大安殿受冊百官稱賀畢再序班侍中奏中嚴外辦禮儀使奏𤼵冊寶帝服通天冠絳紗袍秉珪以出禮儀使閤門使導帝隨冊寶降自西階内臣奉至殿庭置横街南東向褥位冊在北寶在南帝立殿庭北向褥位奉冊寶官奉冊寶案太常卿吏部禮部侍郎引置當中褥位禮儀使奏請皇帝再拜在位官皆再拜太尉司徒就冊寶位帝搢珪跪奉冊授太尉又奉寶授司徒皆搢笏東向跪受興奉冊寶案置於近東西向褥位禮儀使奏請皇帝歸御幄易常服乗輿赴文德殿後幄百官班退赴朝堂太尉司徒奉冊寶至文德殿外幄太尉以下各就次以俟侍中奏中嚴外辦太后服儀天冠衮衣以出奏隆安之樂行障歩障方團扇侍衛垂簾即御坐南向樂止太常導冊案至殿西階下各歸班在位者皆再拜太尉押冊司徒奉冊中書令讀冊訖侍中押寶案司徒奉寶侍中讀寶畢太尉司徒詣香案前分班東西序立尚宮贊引皇帝詣皇太后坐前帝服鞾袍簾内行稱賀禮跪曰嗣皇帝臣某言皇太后陛下顯崇徽號昭焕寰瀛伏惟與天同夀率土不勝欣忭俛伏興又再拜尚宮詣御坐承㫖退西向稱皇太后答曰皇帝孝思至誠貫於天地受兹徽號感慰良深帝再拜尚宮引歸幄太尉率百官稱賀奏隆安之樂太后降坐還幄樂止侍中奏解嚴所司放仗百官再拜退太后還内内外命婦稱賀太后皇帝於内殿在外命婦及兩京留司官並奉表稱賀自是上皇太后尊號禮皆如之文獻通考宋章獻太后遺詔以皇太妃楊氏為皇太后即所居殿號曰保慶太后英宗即位尊仁宗慈聖光獻皇后為皇太后神宗立尊為太皇太后名宮曰慶夀宋史禮志熙寧二年神宗尊皇太后曹氏為太皇太后詣文德殿跪奉玉冊授攝太尉曽公亮金寶授攝司徒韓絳又跪奉皇太后髙氏玉冊授攝太尉文彦博金寶攝司徒趙抃禮畢百官稱賀文獻通考神宗立尊英宗宣仁聖烈皇后為皇太后居寶慈宮哲宗嗣位尊為太皇太后以生日為坤成節哲宗立尊神宗欽聖憲肅皇后為皇太后尊生母朱德妃為皇太妃時宣仁欽聖二太后皆居尊故稱號未得極其至元祐三年宣仁詔母以子貴輿葢仗衛冠服悉侔皇后宋史禮志哲宗即位詔尊太后髙氏為太皇太后皇后向氏為皇太后德妃朱氏為皇太妃禮部議皇太妃生日節序物色其冠服之屬如皇后例稱慈㫖慶賀用箋太皇太后皇太后於皇太妃稱賜皇帝稱奉百官不稱臣皇帝問皇太妃起居用箋皇太妃答皇帝用書宰臣請特建太皇太后宮曰崇慶殿曰崇慶曰夀康皇太后宮曰隆祐殿曰隆祐曰慈徽元祐二年詔太皇太后受冊依章獻明肅皇后故事皇太后受冊依熙寧二年故事皇太妃與皇太后同日受冊令太常禮官詳定儀注右諫議大夫梁燾請對文德殿太皇太后曰大臣欲行此禮予意謂必難行燾對曰誠如聖慮願堅執勿許且母后權同聽政葢出一時不得已之事乞速罷之中書舍人曾肇亦言太皇太后聽政以來止於延和殿受遼使朝見亦止於御崇政殿未嘗踐外朝今皇帝述仁祖故事以極崇奉之禮太皇太后儻以此時特下明詔𤼵揚皇帝孝敬之誠而固執謙德止於崇政殿受冊則皇帝之孝愈顯太皇太后之德愈尊兩義俱得顧不美歟太皇太后欣然納之迺詔將來受冊止於崇政殿尋以天旱權罷未幾太師文彦博等以時雨溥澍稼穡有望請舉行冊禮凡三請乃從九月六日𤼵太皇太后冊寶於大慶殿𤼵皇太后太妃冊寶於文德殿行禮如儀紹聖元年詔奉太皇太后㫖皇太妃特與立宮殿各坐六龍輿張繖出入由宣德正門有司請應宮中並依稱臣妾外命婦入内凖此百官拜箋稱賀稱殿下徽宗即位加哲宗太妃號曰聖瑞既又御文德殿冊命元符皇后劉氏為太后並依皇后禮制文獻通考徽宗立尊哲宗元符皇后為皇太后殿為崇恩宮欽宗既受禪尊徽宗顯肅皇后為太上皇后遷居寧德宮稱寧德太后靖康二年二帝北狩金人僭立張邦昌邦昌迎哲宗元祐皇后入禁中垂簾聽政后遣使迎康王降手書播告天下王即位於南京后撒簾上尊后為元祐太后奉迎至行在所以元字犯后祖諱改稱隆祐太后髙宗既即位遥尊母韋賢妃為宣和皇后紹興十年遥上皇太后冊寶於慈寧殿自後毎遇誕日至朔皆遥行賀禮十二年八月自北歸至臨安入居慈寧宮宋史禮志建炎元年五月冊元祐皇后為隆祐太后令所司擇日奉上冊寶時方巡幸不克行禮遥尊韋賢妃為宣和皇后紹興七年三月詔略曰宣和皇后夙擁慶羡是生眇冲迺骨肉之至親偕父兄而時邁十年地阻懷陟岵凱風之思萬里使還奉上皇寧德之諱宜尊為皇太后令所司擇日奉上冊寶太常寺言請依祖宗故事俟三年之䘮終制然後行禮時翰林學士朱震言唐德宗建中上太后沈氏尊號時沈太后莫知所在猶供張含元殿具衮冕出左序立東方再拜奉冊今太后聖體無恙信使相望豈可不舉揚前憲臣又聞三年之制惟天地社稷越紼行事德宗以大歴四年即位明年改元建中時行易月之制故以冕服行事今陛下退朝之服盡如禮制謂當供張别殿遣三公奉冊藏於有司恭俟來歸願下禮官請明詔從之禮部太常言寶文欲乞以皇太后寶四字為文合差撰冊文官一員書冊文官一員書寶文官一員並差執政十年營建皇太后宮以慈寧為名十二月帝自常御殿詣慈寧殿遥賀皇太后奉上冊寶十二年八月皇太后還慈寧宮十月十八日奉進冊寶其日張設慈寧殿設坐殿中皇太后服禕衣即御坐本殿官設冊寶於殿下慈寧宮事務官并本殿官並朝服詣殿下再拜搢笏舉冊寶奉進先進冊次進寶進畢降坐易禕衣服常服皇帝詣慈寧殿賀如宮中儀次宰臣率百僚拜表稱賀文獻通考孝宗既受禪尊憲聖皇后為皇太后居德夀宮上尊號曰夀聖太上皇后毎遇誕節上詣宮上夀至朔望朝上皇畢入見后如宮中之儀乾道七年加夀聖慈明尊號淳熙二年以上皇慶夀禮又加號夀聖齊明廣慈十年后年七十行慶夀禮十三年加尊號備德二字上皇崩遺詔改稱皇太后上欲迎還大内太后不許因築本殿名慈福光宗即位后當為太皇太后以夀皇故更號曰夀聖皇太后紹熙四年慶夀八十加號隆慈備福孝宗崩始稱太皇太后寧宗慶元元年加尊號光祐二字二年遷居重華宮易名曰慈福容齋隨筆唐德宗即位訪求其母沈太后歴順宗及憲宗時曾祖母故稱為曾太皇太后葢别於祖母也舊新二唐書紀皆載之今慈福太皇太后在夀康太上時已加尊稱若於主上則為曾祖母當用唐故事加曾字向者嘗已告宰相而省吏以為典故所無天子逮事三世安得有前比亦可謂不知禮矣又嗣濮王士歆在隆興為從叔祖在紹熙為曾叔祖慶元為髙叔祖矣而仍稱皇叔祖如故士歆視嗣秀王伯圭為從祖今圭稱皇伯祖而歆但為皇叔祖乃是弟爾禮寺亦以為國朝以來無稱曾髙者彼葢不知累朝尊屬元未之有也光宗既受禪上成肅皇后尊號曰夀成皇后孝宗崩上皇太后尊號慶元初加號惠慈嘉泰二年上太皇太后尊號寧宗既即位尊慈懿皇后為皇太后退居夀康宮慈惠殿上尊號曰夀仁續文獻通考理宗即位尊楊皇后曰皇太后同聽政寶慶三年上尊號曰夀明皇太后紹定元年加上慈睿三年又加仁福宋會要寶慶二年十二月詔皇太后宜上尊號曰夀明皇太后有司詳具儀注朕當親率羣臣詣慈明殿奉上冊寶甲申以史彌逺為奉上皇太后尊號冊寶禮儀使并撰冊書冊宣繒寶紹定三年十二月詔曰夀明慈睿皇太后載安宗社兼體乾坤宜加上尊號曰夀明仁福慈睿皇太后其令有司詳具儀注朕當親率羣臣詣慈明殿奉上冊寶續文獻通考度宗即位尊皇后謝氏曰皇太后咸淳三年上尊號曰夀和皇太后五年加上聖福恭帝即位尊為太皇太后宋會要咸淳三年詔朕纂承丕緒郊見禮備載典冊皇太后合上尊號可令有司討論以聞宰執奏皇太后尊號恭擬夀和二字詔於五年加上夀和皇太后尊號曰夀和聖福皇太后續文獻通考恭帝即位尊母全皇后為皇太后端宗即位冊母楊淑妃為太后遼太祖尊母蕭氏為皇太后太宗即位尊為太皇太后太宗尊母蕭氏為應天皇太后會同初晉使馮道韋勲上尊號曰廣德至仁昭烈崇簡世宗即位尊母蕭氏為皇太后義宗之妃聖宗即位尊母蕭氏為皇太后攝國政統和元年上尊號曰承天太皇后二十四年加上尊號曰睿德神略應運啟化契丹國志尚有法道𢎞仁聖武開統八字興宗即位母元妃蕭氏自立為太后攝政重熙元年上尊號曰法天應運仁德章聖二十三年加上尊號曰仁慈聖善欽孝廣德安靜貞純懿和寛厚崇覺儀天道宗立尊為太皇太后道宗即位尊母蕭氏為皇太后清寧二年上尊號曰慈懿仁和文惠孝敬廣愛宗天契丹國志徽號睿聖從慈順天與史不同遼史禮志冊皇太后儀前期陳設於元和殿如皇帝受冊之儀至日皇帝御𢎞政殿冊入侍從班入門外金吾列班文武分班侍中解劍奏中嚴宣徽使請木契喚仗皆如之樂工入閤使門外文武班中間立喚承宣官聲喏趨至閤使後立閤使鞠躬立揖稱奉敕喚仗承受官鞠躬聲喏揖引聲奉敕喚仗文武合班再拜殿中監押仗入文武班入亦如之宣徽使同内諸司供奉官天橋班候皇太后御紫宸殿乗平頭輦童子女童隊樂引寶金鑾門閤使奏内諸司起居訖贊引駕自下先引至元和殿皇太后入西北隅閤内更衣侍中解劍上殿奏外辦宣徽受版入奏侍中降復位協律郎舉麾樂作大樂令太常卿導引皇太后升坐宣徽使贊扇合捲簾扇開樂止符寶郎奉寶置皇太后坐右左右金吾大將軍對揖鞠躬奏軍國内外平安東上閤門副使引丞相東門入西閤門副使引親王西門入通事舍人引文武班入如儀樂作至位樂止文武班趨進相向再拜退復位東西上閤門使宣徽使自𢎞政殿引皇帝御肩輿至西便門下引入門樂作至殿前位樂止皇帝拜舞蹈拜訖引西階上殿至皇太后坐前位俛跪致詞訖俛伏興引西階下至殿前位拜舞蹈拜鞠躬侍中臨軒宣太后答稱有制皇帝再拜宣訖引皇帝上殿樂作至西閤樂止丞相親王從文武合班再拜舞蹈三呼萬歲如儀丞相上賀侍中宣答如儀丞相以下出舉樂出門樂止侍中奏禮畢宣徽索扇扇合下簾皇太后起舉樂入閤樂止文武官出門外分班侍從兵部吏部起居金吾仗出如儀閤使奏放仗皆如皇帝受冊之儀續文獻通考金熙宗天會仍太宗年號十三年尊太祖后赫舍哩氏為太皇太后尊太宗后唐古氏為太皇太后海陵天德二年尊嫡母圗克坦氏為皇太后尊生母大氏為皇太后章宗即位尊母圗克坦氏為皇太后顯宗之妃哀宗即位尊母皇后温都氏為皇太后生母元妃氏為皇太后金史禮志冊皇太后儀其日質明有司各具繖扇侍衛如儀及兵部約量差軍兵并文武百官詣兩宮迎請引導皇太后入内並赴受冊殿入御幄侍衛如式次奉冊太尉等俱以冊置於案奉寶司徒等俱以寶置於案皆盛以匣覆以帕詣别殿門外幄次教坊提㸃率教坊入侍衛官各就列皇帝常服乗輿至别殿後幄次通事舍人引宣徽使版奏中嚴復位少頃又奏外辦幄簾捲教坊樂作扇合兩宮皇太后出自後幄並即御坐南向扇開樂止分左右少退通事舍人引文武百僚班左入依品重行西向立定通事舍人喝起居班依常朝例起居七拜訖引文武百僚班分東西相向立通事舍人太常博士贊引太常卿前導押冊官押冊而行奉冊太尉讀冊中書令舉冊官等以次從之押寶官押寶而行奉寶司徒讀寶侍中舉寶官等以次從之俱自正門入教坊樂作至殿庭西階下少東北向於褥位少置樂止冊北寶南通事舍人太常博士贊引太常卿前導押冊官押冊升樂作奉冊太尉等從之進至兩宮太后座前褥位樂止兩宮冊寶齊上齊讀舉冊官夾侍奉冊太尉各搢笏北向跪俛伏興退立讀冊中書令俱進向冊前跪奏稱攝中書令具官臣某謹讀冊舉冊官單跪對舉中書令各搢笏讀訖執笏俯伏興搢笏捧冊興於位東迴冊函北向並進跪置於御座前褥位中書令舉冊官俱降還位奉冊太尉並降階東向以俟押寶官押寶升樂作奉寶司徒等從之進至兩宮皇太后座前褥位樂止舉寶官夾侍奉寶司徒各搢笏北向跪俛伏興退立讀寶侍中俱進當寶前跪奏稱攝侍中具官臣某謹讀寶舉寶官單跪對舉侍中各搢笏讀訖執笏俯伏興搢笏捧寶興於位東迴寶西北向並進跪置御座前褥位冊之南通事舍人太常博士贊引太尉司徒以次應行事官俱降自西階復本班序立宣徽使一員詣皇帝御幄前俛伏跪奏臣某謹請皇帝詣兩宮皇太后前行稱賀禮俛伏興贊引皇帝再拜又奏請北向跪皇帝賀曰嗣皇帝臣某云云俛伏興又再拜訖又奏請皇帝少立内侍承㫖退西向稱兩宮太后㫖云云皇帝再拜宣徽使前引皇帝歸幄常服乗輿還内侍衛如來儀應階下文武百僚重行立定通事舍人喝拜在位皆再拜通事舍人引太師升俛伏跪奏稱文武具官臣某等稽首言皇太后殿下顯對冊儀永安帝養仰祈福夀與天同休俛伏興降自西階復位立定通事舍人贊在位官皆拜舞蹈三稱萬歲又再拜宣徽使升自東階取㫖退臨階西向稱兩宮皇太后㫖通事舍人贊在位官皆再拜畢宣曰公等忠敬盡心推崇協力膺兹令典感媿良深宣訖還位通事舍人贊謝宣諭拜在位官皆再拜舞蹈三稱萬歲又再拜通事舍人分引應北向官各分班東西立宣徽使升自東階奏稱具官臣某等言禮畢降還位扇合皇太后並興教坊樂作降座還殿後幄次扇開樂止通事舍人引宣徽使奏解嚴中書侍郎等各帥捧冊牀官升殿跪捧冊並置於牀次門下侍郎等各帥捧寶牀官升殿跪捧寶並置於牀訖通事舍人引詣東上閤門投進所司文武百僚以次出皇太后常服乗輿各還本宮引導如來儀文武百僚詣東上閤門拜表賀皇帝退禮畢各赴本宮受内外命婦稱賀所司預於殿内設皇太后御座司賔引内外命婦於殿庭北向依接前序立尚儀奏請皇太后常服即座司贊曰再拜命婦皆再拜司賔引班首詣西階升跪賀稱妾某氏等言伏惟皇太后殿下天資聖善昭受鴻名凡在照臨不勝欣忭興降階復位司贊曰再拜内外命婦皆再拜尚宮乃宣答曰膺兹典禮感愧良深司贊曰再拜在位者皆再拜退赴别殿賀皇帝亦如賀皇太后之儀惟不致詞不宣答續文獻通考元成宗即位尊太母元妃必濟額格齊鴻吉哩氏裕宗之妃為皇太后武宗即位尊太母元妃達吉鴻吉哩氏順宗之妃為皇太后至治三年上尊號曰儀天興聖慈仁昭懿夀元仁宗延祐二年加上尊號曰全德泰寧福慶英宗即位尊為太皇太后加上尊號曰徽文崇祐英宗即位尊母鴻吉哩氏為太后寧宗即位尊文宗皇后鴻吉哩氏為皇太后順帝元統二年上尊號曰贊天開聖仁夀徽懿昭宣至元元年尊為太皇太后加上尊號曰貞文慈祐儲善衍慶福元元史禮志太皇太后上尊號進寶冊儀前期二日儀鸞司設進𤼵冊寶案於大明殿御座榻前掌謁設進冊寶位於太皇太后殿座榻前設受冊寶案於座榻上並冊西寶東侍儀司設冊使副位於廷中北面冊官位右寶官位左禮儀使位於前以北為上太皇太后殿廷亦如之至期大昕羣臣皆公服叙位闕前侍儀使禮儀使引冊使引冊奉冊舉冊讀冊捧冊官由月華門入侍儀使禮儀使引冊副引寶奉寶舉寶讀寶捧寶官由日精門入至露階下依板位立侍儀使捧牙牌入至寢殿前跪報外辦内侍入奏出傳制曰可侍儀使俛伏興皇帝出閤升輦鳴鞭三入大明殿陞御座鳴鞭三司晨報時雞唱畢侍儀使禮儀使引冊使以下陞自東階由左門入至御榻前相向立掌儀贊曰奏中嚴侍儀使捧牙牌跪奏曰中嚴又贊曰就拜曰興平身復位曰禮儀使稍前跪曰冊使以下皆跪禮儀使奏請進𤼵太皇太后冊寶掌儀贊曰就拜曰興平身曰復位曰内謁者稍前曰搢笏曰内謁者跪進冊寶皇帝興以冊授冊使跪受興以授捧冊官出笏以寶授冊副跪受興以授捧寶官出笏侍儀使禮儀使引冊引寶官導冊寶由正門出冊使以下奉隨至階下掌儀贊曰以冊寶置於案曰出笏復位方輿舁行樂作侍儀使禮儀使引冊引寶前導冊使以下奉隨至興聖宮前奠案樂止侍儀使以導從入至太皇太后寢殿前跪報外辦掌謁入啟出傳㫖曰可侍儀使俛伏興侍儀使掌謁前導太皇太后升殿導太皇太后時侍儀使入至大明殿跪奉冊寶至興聖宮請行禮駕興鳴鞭三侍儀使前引導從至興聖宮陞御座侍儀使出至案所樂作方輿入至露階下奠案冊使副立於案前冊官東向寶官西向方輿分退立於兩廡樂止尚引引殿前班入起居位相向立起居拜舞如元正儀禮畢宣贊唱曰各恭事贊引冊使以下退至起居位通班舍人唱曰攝某官具官或太尉具官無常臣某以下起居引贊贊曰鞠躬平身進入丹墀知班唱曰班齊宣贊唱曰拜通贊贊曰鞠躬拜興拜興平身宣贊唱曰各恭事進至案前依