body:
  text: 五禮通考卷二百三十八刑部尚書秦蕙田撰軍禮六出師詩小雅出車王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄傳王殷王也南仲文王之屬方朔方近玁狁之國也北箋王使南仲為将率為軍壘以禦狄之難采薇序采薇遣戍役也文王之時西有昆夷之患北有玁狁之患以天子之命将率遣戍役以守衛中國故歌采薇以遣之大雅大明維師尚父時維鷹揚涼彼武王傳師太師也鷹揚如鷹之飛揚也涼佐也涼箋尚父吕望也尊稱焉鷹鷙鳥也武王者為之上将江漢序江漢尹吉甫美宣王也江漢浮浮武夫滔滔匪安匪逰淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪朱子曰宣王命召虎平淮南之夷由江漢進兵因以起興首章述進兵也常武序常武召穆公美宣王也赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒恵此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒春秋僖公二十七年左氏傳晉侯蒐于被廬作三軍注閔元年晉獻公作二軍今復大國之禮謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也君其試之乃使郤縠将中軍郤溱佐之使狐偃将上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝将下軍先軫佐之荀林父御戎魏犨為右史記司馬穰苴列傳齊使司馬穰苴将兵捍燕晉之師苴曰臣素卑賤願得君之寵臣國之所尊以監軍景公使荘賈往苴與賈約日中㑹於軍門苴先馳至軍立表下賈素驕貴夕時乃至苴遂斬賈以狥三軍三軍之士皆股栗太公兵法凡國有難君避正殿召将詔之曰社稷安危一在軍令今某國不臣願将軍帥師行之将既受命乃命太史齋三日至太廟鑽靈龜卜吉日以受斧鉞君入廟門西面而立君親操斧持首授其将以柄曰從此上至天者将軍制之復操鉞持柄授其将以刃曰從此下至淵者将軍制之見其虚則進見其實則止勿以三軍為衆而輕敵勿以受命為重而必死勿以身貴而賤人勿以獨見而違衆勿以辨説而必然士未坐勿坐士未食勿食寒暑必同如此士衆必盡死力将已受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣既受命専斧鉞之威臣不敢生還願君亦垂一言之命於臣君不許臣臣不敢将君許之乃辭而行軍中不聞君命皆由将出臨敵決戰無有二心若此則戰勝於外功立於内淮南子兵畧訓凡國有難君召将詔之曰社稷之命在将軍今國有難請子将而應之乃令太卜卜吉日君入廟門西面立将入廟門北面立君親操斧鉞授将乃爪鬋設明衣鑿凶門而出孔叢子問軍禮天子命将出征親絜齊盛服設奠于祖以詔之大将先入軍吏畢從皆北面再拜稽首而受天子當階南面授之節鉞大将受天子乃東向西面而揖之示勿御也然後告大社冢宰執服宣于社之右南面授大将大将北面稽首再拜而受之承所頒賜於軍吏漢書髙祖本紀元年漢王既至南鄭諸将及士卒皆歌謳思東歸韓信為治粟都尉亦亡去蕭何追還之因薦于漢王曰必欲爭天下非信無可與計事者于是漢王齋戒設壇場拜信為大将軍問以計策通典魏故事遣将出征符節郎授節鉞跪而推轂晉書禮志漢魏故事遣将出征符節郎授節鉞于朝堂其後荀顗等所定新禮遣将御臨軒尚書授節鉞依古兵書跪而推轂之義也隋書禮儀志周明帝武成元年吐谷渾寇邊帝常服乗馬命大司馬賀蘭祥于太祖之廟司憲奉鉞進授大将大将拜受以授從者禮畢出受甲開元禮命将出師告于太廟将告有司卜日如别儀前一日諸告官致齋於廟所衛尉設告官以下次各於常所右校掃除内外奉禮設告官版位於内外如常設諸将位於廟庭横街南道東每等異位重行北面南上又設諸将門外位於南門外道東重行西向北上太廟令整拂神幄又帥其屬以罇坫罍洗篚羃入設皆如常儀告日未明十刻太官令先具牢饌如常其饌每室用特牲一太公廟用酒脯醢未明二刻奉禮帥贊者先入就位贊引引御史太祝以下再拜入行掃除皆如常自将告以下至此與太公廟儀同贊引引太廟令太祝官自東階升入開埳室奉出獻祖以下神主各置於座如常儀各引就位又贊引引告官以次入就位立定其先拜者不拜太公廟贊引引廟令太祝等入當階間北面西上立定奉禮曰再拜廟令以下皆再拜升自東堦入就位立定奉禮曰再拜告官以下皆再拜太官令出帥進饌者奉饌陳于東門外謁者引諸将以下入就位立定奉禮曰再拜諸将以下皆再拜謁者進告官之左曰有司謹具請行乃還本位諸祝取幣于篚各立于罇所太官令以下至此與太公廟儀同謁者引告官升自東階詣獻祖室户前北向立太祝以幣進東向授告官告官受進入室北面跪奠於獻祖座俛伏興出户北向再拜訖次懿祖以下並如上儀謁者引還本位祝還罇所太公廟謁者引告官升東階詣太公座前北向立太祝以幣東向授告官告官受進北面跪奠于太公座前俛伏興少退北向再拜訖謁者引告官當留侯座受幣奠亦如之太官令引饌入自正門升太階諸祝迎引於階上各設于神座前訖太官之屬還本位訖太祝各還罇所謁者引告官盥洗酌獻讀祝文自九室以下及飲福受胙皆如常儀再拜訖謁者引告官降復位太公廟奠幣訖謁者引告官升自東階爵獻太公及留侯並如常儀告官飲福将訖謁者引諸将升東階進當皇考睿宗大聖貞皇帝廟室户前北面西上初諸将升諸祝帥齋郎以爵酌福酒詣諸将之東西面北上諸祝帥齋郎進俎減神前胙肉以次授諸将俱跪取爵遂飲卒爵太祝帥齋郎受爵復于坫諸将俛伏興再拜訖謁者引諸将降復位奉禮曰再拜諸将以下皆再拜謁者引出諸祝各進神座前跪徹豆俛伏興還罇所奉禮曰賜胙贊者唱再拜在位者俱再拜已飲福受祚者不拜太公廟無諸将拜獻之儀奉禮曰再拜告官以下皆再拜訖謁者進告官之左白請就望瘞位謁者引告官就望瘞至禮畢如常儀其置土埳東西各二人太廟令納神主如常儀祝版燔于齋坊若凱旋唯陳俘馘及軍實於南門外北面西上其告儀如上宋政和五禮新儀命将出征儀受旌節前一日儀鸞司設大将次於朝堂其日大将常服入就次執事者設褥位於東上閤門外階下設制誥箱於褥位之前少西持旌節者少南謁者引大將至就褥位北面立揖東上閤門官宣有勅大将再拜躬聽口宣訖搢笏謁者二人持箱進于大将之前大将受訖次少府監執事者交旌節大将俛伏興再拜搢笏舞蹈又再拜訖出文徳殿門次端禮門入右昇龍門出宣徳西偏門大将勒所部兵衛并偏将禆将各建旗以正行列太将建旗飾以熊虎偏将建旗飾以鳥隼禆将建旐飾以龜蛇執擎旌節并押節人騎士槍牌步兵樂工等分左右前導至第引見其日早大将常服入就殿門外次舎人引詣殿庭進當殿陛北靣立揖躬大将再拜興奏聖躬萬福又再拜引大将少前躬致詞歸位再拜西出少頃舎人再拜再引大将詣殿庭進當殿陛北向再拜訖引至東階揖升殿近御前之左大将奏事禀方略訖降東階下殿再拜西出造廟前期太史擇日太常寺具時日散告諸司前告二日儀鸞司設告官以下次於常所設大将次於南門之外道東西向前一日質明告官以下赴祠所清齋行事執事官並集告官齋所肆儀太祝習讀祝文眡禮饌香幣次贊者引監察御史㸃向西上開瘞坎於西階之東北向方深取足容物設望瘞位于瘞坎之南告官大將北向監察御史東向奉禮郎太祝西向北上又設告官位于東階之東西向又設大将位於告官之南西向監察御史位於殿庭之南北向奉禮郎太祝大官令位於其後西上光禄卿位於監察御史之東北向又設監察御史之位於殿上之西東向奉禮郎太祝在東西向北上大官令於酒尊所北向告日未明大官令帥其屬實饌具畢引光禄卿入定位贊者曰再拜光禄卿再拜升自西階凡行事執事官升降階准此㸃眡禮饌畢次引監察御史升殿㸃閲陳設糾察不如儀者光禄卿還齋所餘官各服祭服引告官大将以下詣東神門外虚揖位禮直官贊揖訖贊者引監察御史奉禮郎太祝大官令先入就位次引告官并大将各入就位立定祠祭官於殿上贊奉神主次引宫闈令入室搢笏於祏室内奉神主設於座奉神主詣神幄内於後啓匵設于座以白羅巾覆之執笏退復執事位祠祭官於殿上贊奉神主訖禮直官稍前贊有司謹具請行事贊者曰再拜在位者皆再拜引監察御史奉禮郎太祝大官令升就位立定次引告官詣盥洗位北向立搢笏盥手執笏升詣僖祖室神位前搢笏跪三上香引奉禮郎搢笏西向跪執事者以幣授奉禮郎奉禮郎即以幣授告官訖執笏興詣次室以俟告官受幣奉奠訖執笏俛伏興再拜訖引告官以次詣翼祖宣祖太祖太宗真宗仁宗英宗神宗哲宗室奉奠並如上儀降復位少頃引告官再詣盥洗位北向立搢笏盥閲禮饌祝牲克腯凡告官大将行事禮直官引餘官贊者引居還齋所未後一刻大官令帥宰人以鸞刀引牲遂烹牲晡後有司帥其屬清掃廟之内外告日前三刻禮直官贊者諸司職掌各服其服贊者先引宫闈令入詣殿庭北向再拜升殿開室訖太常陳幣篚於神位之左幣以帛祝版於神位之右置於殿香爐并合置於案上御封香次設祭器藉以席光禄實之每位左十有二籩為四行以右為上第一行魚鱐在前糗餌粉餈次之第二行乾􅢀在前乾􅀥形塩次之第三行鹿脯在前榛實乾桃次之第四行薐在前芡栗次之右十有二豆為四行以左為上第一行芹菹在前筍菹葵菹次之第二行菁菹在前韭菹酏食次之第三行魚醢在前兎醢豚拍次之第四行鹿臡在前醓醢糁食次之俎二一在籩前實以羊腥七體兩脾兩肩兩脅并脊兩髀在兩端兩肩兩脅次之脊在中一在豆前實以豕腥七體其載如羊又俎六在豆右為三重以北為上第一重一實以羊腥膓胃肺離肺肺在上端離肺三次膓三胃三又次之一實以豕腥膚九横載三重一實以羊熟膓胃肺一實以豕熟膚載如其腥第三重一實以羊熟十一體肩臂臑肫胳正脊一直脊一長脅一短脅一代脅一背二骨以並肩臂臑在上端肫胳在下端脊脅在中一實以豕熟十一又爼實以體其載如羊皆羊在左豕在右二在胙俎之北實以羊豕牲首槃一在室户外之左實以毛血㽅以二一在鉶之前實以太羮一在籩之左實以肝膋鉶三在㽅之後籩豆之間實以羮加芼滑簠簋各一在籩豆外二俎間簠在左簋在右簠實以稻梁梁在稻南簋實以黍稷稷在黍南設犧牲罇一置於坫加勺羃置諸户前楹間北向實以共内法酒太常設燭於神位前洗二於東階之東盥洗在東爵洗在西罍在洗東加勺篚在洗西南肆實以巾若爵之篚則又實以爵加坫執罍篚者在於其後又設虚揖位於齋宫内道南及東神門外告官大将在南北向監察御史奉禮郎太祝大官令在北盥手帨手執笏詣爵洗位北向立搢笏洗爵拭爵以爵授執事者執笏升詣僖祖酒尊所西向立執事者以爵授執事者執笏詣僖祖神位前搢笏跪執事者以爵授告官告官執爵跪三祭酒奠爵執笏俛伏興出室户外北向少立太祝搢笏於室户外之右東向跪讀祝文訖祝文隨時事撰述執笏興復位告官再拜訖引告官以次詣翼祖宣祖太祖太宗真宗仁宗英宗神宗哲宗室酌獻並如上儀降復位禮直官曰賜胙贊者曰再拜告官大将以下皆再拜祠祭官於殿上贊奉神主入祏室引宫闈令搢笏奉神主入祏室訖宫闈令先捧匵置于神位納神主于匵訖奉匵入祏室次引告官大将詣望瘞位有司詣神位前