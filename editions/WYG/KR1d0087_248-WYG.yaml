所在則宜有祭此非常祭故皆為之位書武成告于皇天后土所過名山大川傳謂伐紂之時名山華岳大川河疏自周適商路過河華故知所過名山華岳大川河也周禮大祝云王過大山川則用事焉鄭云用事用祭事行告也真氏徳秀曰王者之師代天致罰非其人得罪于天天理所不容人情所不堪必不輕易以動衆也其始也必以其人所積之惡所犯之罪以告于皇天后土軍旅所至之地所經過之山川皆必致吾所以興師及彼不可不討之意以告于神明苟揆之理反諸身而有一毫利己之私一念忿人之意不合于天不順于人決不敢輕舉焉孟子曰征者正也己必正而後可以正人未有己不正而能正人者也不正之事告之人且不可况神乎神所不可間者人決不可為也一己為之且不可况役使千萬人而為之乎唐開元禮皇帝親征及巡狩告所過山川前一日諸告官俱清齋於告所執事者先脩除告所又為瘞埳當神座之南如常大官令備牢饌嶽鎮海瀆用大牢中山川用少牢小山川用特牲若行速即用酒脯告日郊社丞布神座席於告所近北南向設酒罇於神座之左面右設洗於酒罇東南北向其執罇者位如常奉禮設告官位於罍洗東南西向執事者位於其後北上設奉禮位於告官西南東向贊者二人在南少退所司實罇罍爼豆太祝實幣篚齋郎取豆血幣帛以丈八尺各隨方色奉禮帥贊者先入就位執罇罍篚冪者次入就位謁者引告官以下次入就位立定奉禮曰再拜贊者承傳告官以下皆再拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜告官以下皆再拜太祝以幣授告官告官受幣謁者引告官詣神座前北面跪奠幣俛伏興少退再拜告官復位大官丞引饌入太祝迎引設於神座前大官丞以下還本位謁者引告官詣罍洗盥手洗爵訖引告官詣酒罇所執罇者舉羃告官酌酒跪進奠於神座俛伏興少退北向立太祝持版進於神座之右東面跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版於神座俛伏興還罇所太祝以爵酌福酒進告官之右西向立告官再拜受爵跪祭啐奠爵反受胙以下望瘞等至燔版位並如常儀寘土則塪東西各二人明會典洪武三年定天子親征祭所過山川有司卜日具牲幣皇帝服皮弁行一獻禮右祭所過山川周禮地官大司徒施十有二教八曰以誓教恤則民不怠注恤謂災危相憂民有凶患憂之則民不懈怠黄氏度曰祭祀有誓軍旅有誓恤憂也使憂其事也史氏浩曰誓所以警戒而歸之恤恤則無慢令致期矣怠何由而生蕙田案十二教之誓康成及賈公彦皆以為凶荒之禮與出師無涉而黄氏史氏諸説解為軍中之誓其義兩通今從之秋官士師以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅注誓于書則甘誓湯誓之屬鄭氏鍔曰用兵然後有誓誓者折之以言使斷然必信湯誓泰誓作于用兵之時是也王氏昭禹曰誓之所用非特軍旅也祭祀田役之類皆有誓而以軍旅為主條狼氏凡誓執鞭以趨于前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺小史曰墨注前謂所誓衆之行前也有司讀誓辭則大言其刑以警所誓也誓者謂出軍及祭祀時也出軍之誓誓左右及馭則書之甘誓備矣車轘謂車裂也敢不關謂不關於君也疏誓自有大官若月令田司徒北面以誓之誓時則條狼氏為之大言使衆聞之故云且命之誓僕右者僕太僕與王同車故太僕職云軍旅贊王鼓右謂勇力之士在車右備非常誓馭謂與王馭車者也王氏安石曰條狼氏主誓者掌辟之官以禁止為事故也王氏曰鄭氏以為誓者出軍及祭祀之事但為樂師與大史小史主禮樂之事故謂祭祀時耳不知皆誓之于軍也太師職云大師執同律以聴軍聲而詔吉凶是軍有太師也太史職云太史抱天時與太師同車是軍有太史也小史職云凡軍事佐太史是軍有小史也刑不上大夫而誓之嚴如此軍事以嚴終也甘誓可見矣軍國異容祭祀之誓太宰掌之大司徒蒞之何預于條狼氏哉王氏應電曰士師職以五戒先後刑罰一曰誓用之于軍旅故此所誓専主軍旅而言蕙田案康成以此誓兼祭祀兩王氏以此誓専主軍中以士師職參考之兩王氏之説為長訝士凡邦之大事聚衆庶則讀其誓禁疏大事者謂在國征伐之等聚衆庶非諸侯之事也則訝士讀其誓命之辭及五禁之法也書大禹謨禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲傳軍旅曰誓濟濟衆盛之貌疏軍旅曰誓曲禮文也穀梁傳曰誥誓不及五帝不及者言于時未有也據此文五帝之世有誓穀梁傳漢初始作不見經文妄言之耳甘誓大戰于甘乃召六卿王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正天用勦絶其命今予惟恭行天之罰朱升旁訓誓與禹征苗之誓同義言其討叛伐罪之意嚴其坐作進退之節案有扈氏夏同姓之國史記曰啟立有扈不服遂滅之𦙍征維仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍侯承王命徂征告于衆曰嗟予有衆聖有謨訓明徵定保先王克謹天戒臣人克有常憲百官脩輔厥后惟明明每嵗孟春遒人以木鐸狥于路官師相規工執藝事以諌其或不恭邦有常刑惟時羲和顛覆厥徳沈亂于酒畔官離次俶擾天紀遐棄厥司政典曰先時者殺無赦不及時者殺無赦今予以爾有衆奉将天罰爾衆士同力王室尚弼予欽承天子威命火炎崑岡玉石俱焚天吏逸徳烈于猛火嗚呼其爾衆士懋戒哉蔡氏沈曰𦙍國名征者上伐下也仲康丁夏之衰羿執國政能命𦙍侯掌六師𦙍侯能承命討有罪禮樂征伐猶自天子出故録之湯誓王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之今爾有衆汝曰我后不恤我衆舎我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷䘮予及汝皆亡夏徳若兹今朕必往爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦傳古之用刑父子兄弟罪不相及今云孥戮汝權以脅之使勿犯疏昭二十年左傳引康誥曰父子兄弟罪不相及權脅之耳不于甘誓解之者以啟承舜禹後刑尚寛殷周以後其罪或相縁坐恐其實有孥戮故于此解之泰誓惟十有三年春大㑹于孟津王曰嗟我友邦冢君越我御事庶士明聽誓商王受弗敬上天降災下民皇天震怒命我文考肅将天威大勲未集肆予小子發以爾友邦冢君觀政于商爾尚弼予一人永清四海時哉弗可失惟戊午王次于河朔羣后以師畢㑹王乃徇師而誓曰嗚呼西土有衆咸聽朕言商王受力行無度穢徳彰聞天其以予乂民天視自我民視天聽自我民聽百姓有過在予一人今朕必往時厥明王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民上帝弗順祝降時喪爾其孜孜奉予一人恭行天罰古人有言曰撫我則后虐我則仇獨夫受洪惟作威乃汝世讎樹徳務滋除惡務本肆予小子誕以爾衆士殄殱乃讎爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮牧誓時甲子昧爽王朝至于商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛予其誓王曰商王受暴虐于百姓以姦宄于商邑今予發惟恭行天之罰尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮疏武王與紂戰于商郊牧地之野将戰之時王設言以誓衆費誓公曰嗟人無譁聽命徂兹淮夷徐戎並興善􅙀乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善傳諸侯之事而連帝王孔子序書以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事猶詩録商魯之頌又云伯禽為方伯監七百里内之諸侯帥之以征嘆而勅之使無喧譁欲其静聼誓命言當善簡汝甲鎧胄兠鍪施汝楯紛無敢不令至攻堅使可用備汝弓矢弓調矢利鍛鍊戈矛磨礪鋒刃皆使無敢不功善秦誓公曰嗟我士聽無譁予誓告汝羣言之首傳誓其羣臣通稱士也羣言之首言衆言之本要蕙田案自三苗誓師以下皆致師之誓秦誓一篇則還師之誓也孔穎達正義分書之例為十五曰誓獨秦誓乃誓之變體與周禮所謂士師五戒之誓司徒十二教之誓皆别司馬法有虞氏誓于國中欲民體其命也夏后氏誓于軍中欲民先成其慮也殷誓于軍門之外欲民先意以待事也周将交刃而誓之以致其志也文心雕龍雷震始乎曜電出師先乎威聲故觀電而懼雷壮聽聲而懼兵威兵先乎聲其來已久昔帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令有文告之辭即檄之本源也及春秋征伐自諸侯出懼敵弗服故兵出須名振此威風暴彼昏亂劉獻公之所謂告之以文辭董之以師武者也齊桓征楚詰包茅之闕晉厲伐秦責箕郜之焚管仲吕相奉辭先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皦也宣露於外皦然明白也夫兵以定亂莫敢自専天子親戎則稱恭行天罰諸侯御師則云肅将王誅故分閫推轂奉辭伐罪非惟致果為毅亦且厲辭為武使聲如衝風所擊氣似欃槍所掃奮其武怒總其罪人懲其惡稔之時顯其貫盈之數揺奸宄之膽訂信慎之心使百尺之衝摧折于咫書萬雉之城顛墜于一檄者也觀隗囂之檄亡新布其三逆文不雕飾而辭切事明隴右文士得檄之體矣陳琳之檄豫州壮有骨鯁雖奸閹攜養章宻太甚發丘摸金誣過其虐然抗辭書釁皦然露骨矣敢指曹公之鋒幸哉免袁黨之戮也鍾㑹檄蜀徵騐甚明桓公檄胡觀釁尤切並壮筆也蕙田案劉彦和雖云三代之誓宣訓我衆不及敵人然三苗之誓及湯誓泰誓等皆數敵罪状不僅訓我衆也誓辭之體本同於檄又或混於露布核而論之檄者致師之際聲罪而致討露布者戰勝之後馳詞以揚功今不另列移檄一條露布則另列其漢唐以下檄辭不備載右誓師唐開元禮遣使勞軍将前一日執事者先設使者次於營南門之外道右南向使者至謁者引之次使者将到兵部先集大将以下於南門之外列左右廂俱重行北向相對為首使者出次謁者引立於門西東面持節者立於使者之北吏二人持制書案立於使者西南俱東靣立定大将北面再拜謁者引使者持節者前道入門而左持案者從立於幕前南面持節者立於使者之東少南西面持案者立於使者西南東面又謁者引大将以下入立於使者之南依左右廂俱重行北面相對為首立定持節者脱節衣持案者進使者前使者取制書持案者退復位使者稱有制大将以下俱再拜宣詔訖大将以下又再拜謁者引大将進使者前北面受制書退復位持節者加節衣謁者引使者持節者前導以出持案者從之俱復門外位大将以制書授左右拜送使者於門外使者退大将入初使者出諸将以下以次出若賜衣物使者出次立於門外立定執事者以衣物立於案南俱東面北上使者入衣物隨入初大将受制書復位執事者以衣物遍授之大将以下受訖又再拜右勞師五禮通考卷二百三十八
