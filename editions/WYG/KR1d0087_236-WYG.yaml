body:
  text: 五禮通考卷二百二十六刑部尚書秦蕙田撰賔禮七諸侯聘于天子蕙田案周禮大宗伯大行人俱有時聘殷頫之禮玉制亦云諸侯之于天子也比年一小聘三年一大聘故周禮有大賔大客之分大賔謂諸侯來朝大客謂諸侯使卿大夫來聘也先王之於諸侯既酌六服之近逺而定為朝覲之期猶懼上下之情不浹也又於其間使其卿大夫奉幣入聘以結諸侯之好且以觀其卿大夫之賢否以故六服之逺如在一家而無猜嫌跋扈之患後之儒者剏謂諸侯無聘天子之法而以周官之聘頫為天子遣使侯國之事夫天子於侯國尚有徧存徧頫徧省之使而諸侯自朝覲以外無一介行李聘于天子曽謂古者有此體制乎儀禮有諸侯邦交之聘禮而聘于天子之禮則無之今據經傳諸文以存其略至其儀節之次第則杜氏通典據侯國聘禮推而得之頗有條理今並錄之周禮春官大宗伯時聘曰問殷頫曰視注時聘者亦無常期天子有事乃聘之焉竟外之臣既非朝歳不敢凟為小禮殷頫謂一服朝之歳以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一年諸疏時聘無常期天子有事乃聘之者上時見是當方侯不順服其順服者當方盡朝無遣臣來之法其餘三方諸侯不來諸侯聞天子有征伐之事則遣大夫來問天子時聘遣大夫不使卿者按聘禮小聘曰問使大夫此經云問明使大夫也一服朝之歲諸侯既不自朝使卿來聘天子故稱殷殷衆也若殷見然聘禮大聘使卿此既諸侯使臣代以來明不得使大夫故知使卿也云一服朝在元年七年十一年者以侯服年年朝甸服二年朝四年朝六年朝八年朝十年朝十二年朝從天子巡狩是甸服於元年七年十一年無朝法是使卿殷頫也男服三年朝六年朝九年朝十二年從天子巡守於元年七年十一年亦無朝法是亦使卿以大禮聘天子也采服四年朝八年朝十二年從天子巡守則元年七年十一年亦無朝天子法是亦使卿以大禮聘天子也衛服五年朝十年朝則元年七年十一年亦無朝天子法是亦使卿以大禮聘天子也要服六年朝十二年從天子巡守則元年七年十一年亦無朝法是亦使卿以大禮聘也秋官大行人時聘以結諸侯之好殷頫以除邦國之慝注此二事者亦以王見諸侯之臣來使者為又也時聘者亦無常期天子有事諸侯使大夫來聘親以禮見之禮而遣之所以結其恩好也天子無事則已殷頫謂一服朝之歳也慝猶惡也一服朝之歳五服諸侯皆使卿以聘禮來頫天子天子以禮見之命以政禁之事所以除其惡行易氏祓曰或謂聘頫即下經徧存徧頫徧省之事乃天子遣使以撫邦國諸侯然大宗伯以此二事為賔禮而此職亦有大客之儀則知非天子遣使之文注義固不可破也欽定義疏邦國有交相惡者當衆聘其國卿皆在故諭使解除小行人凡四方之使者大客則擯小客則受其幣而聼其辭注擯者擯而見之王使得親言也受其幣者受之以入告其所為來之事疏大客要服以内諸侯之使臣也小客謂蕃國諸侯之使臣也蔡氏徳晉曰大客孤卿也小客大夫士也受其幣而聼其辭以其來之意轉告于王王不親見故也存頫省聘問臣之禮也疏存頫省三者天子使臣撫邦國之禮聘問二者諸侯使臣行聘天子之禮蕙田案後儒以經文聘問與存頫省並稱遂疑五者皆天子遣使而諸侯無上聘天子法法賈疏分别言之極明禮記王制諸侯之於天子也比年一小聘三年一大聘注比年每歲也小聘使大夫大聘使卿此晉文霸時所制也疏按昭三年左傳鄭子太叔曰文襄之霸也其務不煩諸侯令三歳而聘五歲而朝故鄭云晉文霸時所制也陳氏禮書輕財重禮交人之道也聴命達言使者之事也三輔人語輕財曰聘則聘之為義可知矣古者比年小聘三年大聘小聘曰問大聘曰殷既歲聘矣中復盛聘此周禮所以言殷相聘春秋傳所以言殷聘禮也左傳曰先王之制諸侯之䘮士弔大夫送葬唯嘉好聘饗三軍之事于是乎使卿則小聘之問雖不饗有獻不及夫人主人不筵几不禮面不升不郊勞其禮如為介三介然則小聘盖亦卿爾以其與君為禮也鄭氏曰小聘使大夫其說無據聘雖有國者之禮而其下亦有焉故凡聘女曰聘問人曰聘是也春秋書王臣來聘八諸侯之臣來聘二十有五或稱名或稱字或稱弟或稱公子或稱公孫或稱人或不稱氏或不言使其褒貶輕重各稱其事非可以一端求也中庸朝聘以時朱子章句聘謂諸侯使大夫來獻王制比年一小聘三年一大聘右聘覜名義周禮考工記玉人瑑圭璋八寸璧琮八寸以覜聘注瑑文飾也覜視也聘問也衆來曰覜特來曰聘子疏此謂上公之臣執以覜聘用圭璋享用璧琮於天及后也若兩諸侯自相聘亦執之侯伯之臣宜六寸子男之臣宜四寸蕙田案此條論聘覜所執圭璧秋官大行人凡大國之孤執皮帛以繼小國之君出入三積不問壹勞朝位當車前不交擯廟中無相以酒禮之其他皆眡小國之君注此以君命來聘者也孤尊既聘享更自以其摯見豹皮表之為飾繼小國之君言次之也朝聘之禮每國畢乃前不交擯者不使介傳辭交于王之擯親自對擯者也廟中無相介皆入門西上而立不前相禮者聘之介是與以酒禮之酒謂齊酒也和之不用鬱鬯耳其他謂貳車及介牢禮賓主之間擯者將幣祼酢饗食之數大疏按典命上公之國立孤一人侯伯已下則無故云國之孤也趙商問其他􅢂小國之君以五為節下云諸侯之卿各下其君二等注云公使卿亦七侯伯亦五子男三不審大國孤五而卿七何答曰卿奉君命七介孤尊更自特見故五介此有聘禮可參又問孤出入三積此即與小國同宜應視小國之君何須特云三積與例似錯答曰三積者卿亦然非獨孤也故不在視小國之中然則一勞者亦是卿亦然故須見之知孤既聘享更自以其贄見者若行正聘則執瑑圭璋八寸以行聘何得執皮帛也但侯伯已下臣來使無此更見法以大國孤尊故天子别見之也諸侯行交擯者使介傳于王擯傳而下又傳而上是也親自對擯者聘禮賓來在末介下東面上擯亦至末擯下親相與言是也聘禮賓行聘之時擯者納賓賓入門左介皆入門左北面西上注云隨賓入也介無事止於此是介入廟門西上不相者也彼諸侯法約同天子禮故云與以疑之蕙田案此聘問禮畢别以摯見于天子之儀惟大國之孤為然其餘則否所以尊孤卿也卿大夫聘于王朝亦當有私覿之禮但禮文不具耳凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之注此亦以君命來聘者也所下其君者介與朝位賓主之間也其餘則自以其爵聘義曰上公七介侯伯五介子男三介是謂使卿之聘之數也朝位則上公七十步侯伯五十步子男三十步與疏大夫士皆如之者大夫又各自下卿二等士雖無介與步數至牢禮之等又降殺大夫蕙田案此條王朝待聘使陳介牢禮降殺之等禮記王制次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫注此諸侯使卿大夫頫聘並會之序也其爵位同小國在下爵異固在上耳使疏經文既稱大國小國大小並在則非是特來故知卿大夫頫聘並㑹也云其位爵同小國在下者爵同謂同作卿也據經文小國卑于大國故知小國之卿在大國之卿下云爵異固在上者謂大國是大夫小國是卿則經云小國之卿位當大國之上大夫是小國之卿爵異于大國之大夫其爵既異固當在大夫之上必知爵異小國在上者以其卿執羔大夫執雁使卿絺冕大夫元冕故知小國之卿不得在大國大夫之下也其有中士下士者數各居其上之三分注謂其為介若持行而並㑹也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出㑹之事春秋傳謂士為微及疏為介者若聘禮士介四人是也各特行則隱元年宋人盟于宿是也本國出使是行至他國並㑹也中士中國之士下士下國之士經雖無上士之文以中士下士類之則上士為大國之士也蕙田案此條聘使班位之次曲禮列國之大夫入天子之門曰某士自稱曰陪臣某注謂諸侯大夫三命以下於天子為士曰某士者如晉韓起聘于周擯者曰晉士起疏列國五等諸侯也天子上士三命中士再命下士一命而五等之臣惟公國一孤四命耳自卿大夫從三命以下其命等于王之士故入天子之國擯者稱為某國之士也自稱曰陪臣某陪重也其君已為王臣今又為已君之臣故自稱對王曰重臣也蕙田案此條聘使稱謂通典周制諸侯遣使聘天子皆以卿為使大夫為上介士為衆介公介七人伯五人子男三人諸侯之臣使各下其君二等將行之朝朝服捧幣于禰告為君然後釋幣于行在廟門之外也介及衆介皆從遂受命于朝受聘珪享束帛加璧二王之後公使則享用珪也次受夫人之聘使則享用元纁束帛加璧遂行至天子畿更張旜示有事于比先謁關人關人報王使請事遂𨗳以入若公之孤則三積一問一勞至郊迎張旜而入王使大夫授館遣人致飱將行聘之前皆遣人授舎于文王廟門外行聘之朝釋幣于禰服冕服乗車建旜至大門外下車王服皮弁服受聘時賓亦服皮弁服受訖王更服服衮冕入廟當扆而立賔入次改服禆冕而入士介皆隨賔後入行享于廟亦升堂進玉王前撫之亦行三享王禮之出廟門更行私覿之見王出至大門内使問其君及勞聘賓還館主人致饔餼明日發幣于公卿然後受饗受燕而還王亦使送出境其餞還之儀與諸侯相聘還之禮同薛氏禮圖諸侯聘天子之禮凡聘皆使卿為主大夫為介士為衆介使介之數各下其君二等將行之旦朝服釋幣于禰告君然後釋幣于行上介及衆介皆從受命于朝聘圭授享束帛加璧二王之後享王用圭后用璋五等諸侯享王用璧后用琮既受遂行張旜出國舎于郊明日歛旜行至王畿更張旜先謁關人關人報入王使請事遂𨗳以入若公之孤則三積不問一勞至近郊張旜而行王使大夫授舘致舘又遣人致飱將行聘之前使者遣人受舍于文王廟門外行聘之旦朝服釋幣于禰服冕服乘車建旜至于大門之外使者朝位步數亦下其君二等下車孤北面立卿則車前五步介皆陳于西北東面王待之擯數皆如其君也春夏時王乘車而迎至大門内上擯立于門外西面承擯以下繼之而立皆西面末擯末介相去三丈六尺交擯不傳詞上擯揖前傳詞訖王則不出門賓入大門之内見王初入門賔之上介拂西棖士介拂闑乃從王入庫門則止一相士介從上介而上至次若秋冬時王不至大門之内迎賓其朝享併受之于廟其介及擯陳設之儀如王迎之儀但上擯帥之而入也賓既入次王則服皮弁受聘于朝時賔亦皮弁受玉訖然後更服冕服入廟當扆而立賔入次改服禆冕而入士介皆從賓而入享于廟升堂進玉于上前王撫之亦行三享王禮之出廟門更自以其贄束帛豹皮表之為飾繼小國之君後而入見遂行私覿之禮見王出至大門之内使問其君及勞賔也聘訖還舘致享餼明日發幣于公卿后以致餼公卿得幣皆有禮于賓也然後受享受食受燕而還王亦使行人送至舘其還玉之儀與諸侯相聘還玉之禮同蕙田案杜氏薛氏所述周制盖據儀禮諸侯相聘之儀節參校而得之右聘覜儀節春秋僖公三十年冬公子遂如京師遂如晉注如京師報宰周公左氏傳東門襄仲將聘于周遂初聘于晉宣公九年夏仲孫蔑如京師左氏傳王使來徵聘夏孟獻子聘于周王以為有禮厚賂之襄公二十四年冬叔孫豹如京師左氏傳穆叔如周聘王嘉其有禮也賜之大路蕙田案春秋書内大夫如京師者七文元年叔孫得臣以拜錫命文八年公孫敖以弔䘮文九年叔孫得臣襄二十二年叔鞅俱以㑹𦵏皆無關於聘問故不載趙氏汸曰周制諸侯于天子有見有貢而無聘問見謂大宗伯朝覲以下六禮貢謂小行人春入貢也聘問者上之所以交于下也東遷小國與大國有朝則無聘諸侯不朝貢天子而以聘禮上問如邦交諸侯之伉也傳記晉韓宣子聘于周辭曰晉士起將歸時事于宰旅王曰辭不失舊則諸侯于天子言聘非舊制可知由周室既衰雖聘問之禮亦不能常故左氏不復辨然不失為寔錄也鄭氏因以釋周官時聘殷頫誤矣隱桓之世王室來聘者五來賵者一來求者二錫桓公命一而魯君臣三世不享覲于王庭至僖公二十八年因晉文盟㑹始兩朝王所又明年天王使宰周公來聘而魯始聘京師遂聘晉是魯之朝聘天子皆以晉故也文公元年王使來㑹𦵏僖公又來錫公命故得臣如京師拜而王使又來含賵成風來㑹葬矣八年公孫敖如京師弔䘮不至以幣奔莒而毛伯來求金於是得臣如京師葬襄王宣公之世王使來徵聘故仲孫蔑如京師明年王季子已為報聘來矣外傳載成公將朝王使叔孫僑如先聘且告而史不書者大夫從公例不書此為公行告朝非實聘傳言其享覲之禮薄是也觀春秋所書則王室懐諸侯有過于成周而魯之事周不能比齊晉盖上陵下替之日乆矣自成至哀五君唯襄公末年叔孫豹一如京師昭公末年叔鞅葬景王而止中國無伯則諸侯復散不復知王室而王室亦絶意於諸侯也然說春秋者唯知朝聘不行為有罪而不知聘問亦非諸侯事天子之禮則豈聖人制作之意哉蕙田案趙氏論魯失事王室之禮是也謂聘問非事天子之禮則非襄公二十六年左氏傳晉韓宣子聘于周王使請事注問何事來聘對曰晉士起將歸時事于宰旅無他事矣注起宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士言獻職貢于宰旅不敢斥尊注曲禮云列國之大夫入天子之國曰某士是諸侯大夫入天子之國禮法當稱士也王聞之曰韓氏其昌阜于晉乎辭不失舊右春秋諸國聘周蕃使朝貢附蕙田案漢以下無諸侯聘于天子之禮但有蕃國遣使朝貢之儀其儀或隆或殺其文或詳或畧今為叙次附于聘禮之後漢書兩粤傳文帝元年召陸賈使粤南粤王恐願奉明詔長為藩臣奉貢職獻白璧一䨇翠鳥千犀角十紫貝五百桂蠧一器生翠四十䨇孔雀二䨇孝景時遣使入朝請武帝本紀太始三年春三月行幸甘泉宫饗外國客宣帝本紀神爵二年匈奴單于遣名王奉獻賀正月始和親甘露元年匈奴呼韓邪單于遣子右賢王銖婁渠堂入侍匈奴傳甘露三年郅支單于遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加成帝河平元年單于遣右皋林王伊邪莫演等奉獻朝正月既罷遣使者送至蒱反伊邪莫演言欲降使者以聞議者或言受其降光祿大夫谷永議郎杜欽以為漢興匈奴數為邊害故設金爵之賞以待降者今單于詘體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質而更受其逋迯之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也不如勿受便天子從之平帝本紀元始元年正正月越裳氏重譯獻白雉一黒雉二詔使三公以薦宗廟二年春黄支國獻犀牛西域傳贊孝武之世設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉自建武以來莎車于闐之屬數遣使置質于漢願請屬都䕶聖上逺覽古今時事之宜覊縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之却走馬何以尚兹後漢書光武本紀建武二十四年烏桓大人來朝南單于遣使詣闕貢獻奉藩稱臣冬十月夫餘王遣使奉獻是歳烏桓大人帥衆内屬詣闕朝貢中元二年春正月東夷倭奴國王遣使奉獻使人自稱大夫倭國之極南界也光武賜以印綬章帝本紀章和二年月氐國遣使獻扶拔師子扶拔似麟無角和帝本紀永元十三年冬十一月安息國遣使獻師子及條枝六爵安帝本紀永寜元年夫餘王遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵西域傳撣國王雍由調遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千桓帝本紀延熹九年大秦國王安敦遣使自南徼外獻象牙犀角瑇瑁右兩漢蕃使朝貢唐書禮志若蕃國遣使奉表幣其勞及戒見皆如蕃國主庭寔陳於客前中書侍郎受表置於案至西階以表升有司各率其屬受其幣焉其宴蕃國主及其使皆如見禮唐開元禮受蕃國使表及幣其勞及戒見日如上儀前一日尚舎奉御整設御幄于所御之殿北壁南向守宫設使者次太樂令展宫懸舉麾位于上下並如常儀其日典儀設使者位于懸南重行北面以西為上庭寔位于客前設典儀位于懸之東北贊者二人在南差退俱西靣諸衛勒所部列黄麾半仗屯門及入陳于殿庭太樂令帥工人入就位如常儀符寶郎負寶俱詣閤奉迎使者服其國服奉書出次通事舎人引立於閤外西廂東面從者執幣玉庭寔立于後俱東面北上侍中版奏外辦皇帝服通天冠乘輿以出曲直華盖警蹕侍衛如常儀皇帝將出仗動太樂令令撞黄金之鐘如上儀符寶郎置寶于座侍衛如常儀樂止中書侍郎一人令史二人持案先伺於西階東面北上舎人引使者及庭寔入就懸南位使者初入門太和之樂作立定樂止大蕃大使為設樂次蕃大使及大蕃中使以下皆不設樂懸及黄麾仗中書侍郎帥持案者進詣使者前東面侍郎受書置於案迴詣西階侍郎取書升奉持案者退初侍郎奏書有司各帥其屬受幣馬于庭典儀曰再拜贊者承傳使者以下皆再拜舎人前承制降詣使者前問蕃國主使者再拜對訖又再拜舍人囘奏又承勅問其臣下使者再拜對又勞使者以下對拜及舎人迴奏並如常儀舎人承制勅勞還舘使者以下皆再拜舎人引使者以出樂作止如常儀侍中前跪奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞蕤賓之鐘如上儀侍臣從至閤樂止皇帝宴蕃國使前一日尚舎奉御殿御幄于所御之殿北壁南向太官令具饌守宫設使者次太樂令展宫懸于殿庭設舉麾位于上下並如常若大蕃中使及中蕃大使以下則不設樂及黄麾仗其日尚舎奉御鋪使者牀坐於御座西南設不升殿者坐席于西廊下俱東面北上典儀設使者位于懸南重行東面北上設典儀贊者位于懸之東北如常儀諸衛各勒所部列黄麾半仗皆與上儀同蕃使以下服其國服出次通事舎人引立于閤外西廂東面從者立于使者之後重行東面北上侍中版奏外辦皇帝服通天冠絳紗袍與上儀同典儀一人升立東階上贊者二人立于階下俱西面典儀引使者以下入就懸南位使者初入門舒和之樂作至位樂止立定典儀曰再拜贊者承傳使者以下皆拜拜舎人前承㫖降勅使者升坐使者以下皆再拜通事舎人引應升殿者詣西階樂作止如常通事舎人引升立于坐後其不升殿者分引詣廊下席後上下立定殿上典儀唱就座階下贊者承傳上下諸客皆就坐俛伏坐酒至殿殿上典儀唱酒至興階下贊者承傳上下諸客皆俛伏興立坐後太官行酒殿上典儀唱再拜階下贊者承傳上下諸客皆再拜搢笏受觶殿上典儀唱就坐階下贊者承傳蕃使以下諸客皆就坐俛伏坐飲觴行三周食升階殿上典儀唱食至興階下贊者承傳上下諸客皆執笏俛伏興立坐後太官令行諸客案設食訖殿上典儀唱就坐階下贊者承傳上下諸客皆就坐俛伏坐上下諸客皆飯諸客食訖太官令俱徹案又行酒遂設庶羞二舞以次入作若賜酒舎人前承㫖詣受賜者前蒙賜者執笏俛伏起立坐後舎人稱賜酒蒙賜者再拜餘與宴蕃國主禮同皆放上儀右唐蕃使朝貢宋史禮志宋朝之制凡外國使至皆宴于内殿近臣及刺史正郎都虞侯以上皆預太祖建隆元年八月三日宴近臣於廣政殿江南吳越朝貢使皆預乾徳三年五月十六日宴近臣及孟昶于大明殿開寶四年五月七日宴近臣及劉鋹子於崇徳殿十一月五日江南李煜吳越錢俶各遣子弟來朝宴于崇徳殿八年三月晦宴契丹使于長春殿太平興國二年二月十一日宴兩浙進奉使契丹國信使及李煜劉鋹禁軍都指揮使以上于崇徳殿不舉樂酒七行而罷契丹遣使賀登極也五月十一日再宴契丹使於崇徳殿酒九行而罷以其貢助山陵也十月十六日宴宰相親王以下及契丹使髙麗使諸州進奉使于崇徳殿以乾明節罷大宴故也是後宴外國使為常契丹國使入聘見辭儀自景徳澶淵會盟之後始有契丹國信使副元正聖節朝見大中祥符九月有司遂定儀注前一日習儀于驛見日皇帝御崇徳殿宰臣樞宻使以下犬班起居訖至員僚起居後館伴使副一班入就位東面立次接書匣閤門使升殿立次通事入不通喝拜兩拜奏聖躬萬福又喝兩拜隨呼萬歲喝祗候赴東西接引使副位舍人引契丹使副自外捧書匣入當殿前立天武官􅎑禮物分東西向入列于殿下以東為上舎人喝天武官起居兩拜隨呼萬歲奏聖躬萬福喝各祗候閤門從東階降至契丹使位揖使跪進書匣閤門側身搢笏跪接舍人受之契丹使立閤門執笏捧書匣升殿當御前進呈訖授内侍都知都知拆書以授宰臣宰臣樞宻進呈訖遂􅎑禮物出舍人與館伴使副引契丹使副至東階下閤門使下殿揖引同升立御前至國信大使傳國主問聖體通事傳譯舎人當御前鞠躬傳奏訖揖起北使皇帝宣閤門迴問國主北使跪奏舍人當御前鞠躬奏訖遂揖北使起却引降階至辭見位面西揖躬舍人當殿通北朝國信使某官某祗候見應喏絶引當殿喝拜大起居其拜舞並依本國禮出班謝面天顔歸位喝拜舞蹈訖又出班謝沿路驛館御筵荼藥及傳宣撫問復歸位喝拜舞蹈訖舎人宣有勅賜窄衣一對金蹀躞子一金塗銀冠一鞾一兩衣着三百匹銀二百兩鞍轡馬一毎句應喏跪受起拜舞蹈訖喝祗候應喏西出凡傳語并奏聖躬萬福致辭並通事傳譯舍人當殿鞠躬奏聞後同此次通北朝國信副使某官某祗候見其拜舞謝賜致詞並如上儀西出其勅賜衣一對腰帶一幞頭靴笏衣着二百匹銀器二百兩鞍轡馬一次通事及舎人引舍人已下分班入不通使引合班贊喝大起居拜舞如儀舎人喝有勅賜衣服束帶衣着銀器分物應喏跪授􅎑擔床跪起舞蹈拜訖喝各祗候分班引出次引差來通事以下從人分班入不通使引合班喝兩拜奏聖躬萬福又拜隨呼萬歲喝有勅各賜衣服腰帶衣着銀器分物應喏跪授起喝兩拜隨拜萬歳喝各祗候唱喏分班引出次行門殿直入起居訖殿上侍立文明殿樞宻直學士三司使内客省使下殿舎人合班奏報閤門無事唱喏訖卷班西出客省閤門使以下東出其排立供奉官已下横行合班宣徽使殿上喝供奉官已下各祗候分班出並如常儀皇帝降坐還内宴日契丹使副已下服所賜承受引赴長春殿門外并侍宴臣僚宰執親王樞宻使以下祗候俟長春殿諸司排當有備閤門使附入内都知奏班齊皇帝坐鳴鞭宰臣親王以下並宰執分班舎人引入其契丹使綴親王班入舎人通某甲以下唱喏班首奏聖躬萬福喝各就坐兩拜隨呼萬歲喝就坐分班引上殿或皇帝撫問契丹使副舎人便引下殿喝兩拜隨拜萬歲喝各就坐次舎人通事分引舎利以下東西分班兩拜喝就坐分引赴兩廊下次舎人引差來通事從人東西分班入合班喝兩拜隨拜萬歲喝就坐分引赴兩廊次喝教坊已下兩拜班首奏聖躬萬福又喝拜兩拜隨拜萬歳喝各祗候次引看盞二人稍近前喝拜兩拜隨拜萬歲喝上殿