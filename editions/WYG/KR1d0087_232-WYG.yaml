body:
  text: 五禮通考卷二百二十二刑部尚書秦蕙田撰賓禮三天子受諸侯覲儀禮覲禮鄭目録云覲見也諸侯秋見天子之禮春見曰朝夏見曰宗秋見曰覲冬見曰遇朝宗禮備覲遇禮省是以享獻不見焉三時禮亡惟此存爾覲禮於五禮屬賓蕙田案敖氏謂此篇言同姓大國之君入覲於王之禮初無四時之别與周官秋見曰覲之意異此説非也四時之朝宗覲遇散文言之皆得名朝王制天子無事與諸侯相見曰朝春秋五月公朝於王所是也朝又可名覲詩韓侯初立來朝曰韓侯入覲春秋傳晉侯朝王稱出入三覲是也其不云宗遇者鄭氏謂夏宗依春冬遇依秋故以朝覲為大名也對文言之則當依當宁在朝在廟其禮固區以别矣傳記舉其一偏故朝覲可以通言儀禮記其節目故朝宗覲遇不可以不辨盛世佐云此篇自郊勞以前賜車服以後文多不具必其詳已見於朝禮故略之也禮經之逸者多矣執此區區之僅存者而謂其所不見者皆無是禮也豈通論哉此言得之覲禮至於郊注郊謂近郊去王城五十里張氏爾岐曰此下言侯氏入覲初至之事至郊則郊勞至國則賜舍凡二節欽定義疏王畿千里王城居中畿面各五百里界首置關面各三關凡十二關司關掌之侯氏之來也君先與卿圖事遂戒宰書幣夕陳幣設監守太子曰監國諸侯之兄弟曰處守乃告於祖奠於禰告於社稷山川之神君行卿大夫士介從師從奉主車祖祭而出見日而行逮日而舍奠過他邦則假道至於關敂關人而司關為之告焉由二百里内之遂及百里之逺郊至五十里之近郊中間如遂人遺人委人各為之委積掌訝環人野廬氏各為之聚􅈀而凡王官各贍其事聘禮賓在國受命啓行過邦入境具詳此從至于郊始見者文略也抑諸侯適天子尚有他篇其禮文可以互見而今逸之與王使人皮弁用璧勞侯氏亦皮弁迎於帷門之外再拜注小行人職曰凡諸侯入王則逆勞於畿則郊勞者大行人也皮弁者天子之朝服也璧無束帛者天子之玉尊也不言諸侯言侯氏者明國殊舍異禮不凡之也郊舍狹寡為帷宫以受勞掌舍職曰為帷宫設旌門疏案大行人上公三勞侯伯再勞子男一勞則五等同有畿勞其子男惟有此一勞而已侯伯又加逺郊勞上公又加近郊勞此云近郊據上公而言案玉人職云案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯注云夫人謂王后此文不見者以聘禮於聘客主國夫人尚有勞以二竹簋方明后亦有略言王勞不言后文不具也聘禮亦受勞于館不為帷宫者彼臣禮卿行旅從徒衆少故在館此諸侯禮君行師從徒衆多故於帷宫敖氏繼公曰勞而用璧以為信天子於諸侯之禮也璧無束帛别於享禮且為其當還之也使者不答拜遂執玉三揖至于階使者不讓先升侯氏升聽命降再拜稽首遂升受玉注不答拜者為人使不當其禮也不讓先升奉王命尊也升者升壇使者東靣致命侯氏東階上西面聼之疏以帷宫無堂可升故知升者升壇也敖氏繼公曰使者不讓則侯氏不先讓可知侯氏不讓者以使者尊當先升而不敢讓之也其降拜於階間北面升就使者北面訝受之蕙田案侯氏受玉之位當在西面與使者相並下云使者左還而立是使者于授玉之後方南面明是時猶東面也敖氏以為北面訝受之非是使者左還而立侯氏還璧使者受侯氏降再拜稽首使者乃出注左還還南面示將去也立者見侯氏將有事於已俟之也還玉重禮疏直云使者左還不云拜送玉者凡奉命使皆不拜送若身自致者乃拜送蔡氏徳晉曰前降拜受玉也後降拜送玉也侯氏乃止使者使者乃入侯氏與之讓升侯氏先升授几侯氏拜送几使者設几答拜注侯氏先升賓禮統焉几者安賓所以崇優厚也上介出止使者則已布席也也疏聘禮卿勞受儐不設几者諸侯之卿卑不與此同几不可設於地明有席聘禮受聘云几筵既設是几筵相將敖氏繼公曰有司既布席侯氏乃出止使者止其去也且迎而欲儐之使者亦禮辭許侯氏揖先入使者乃入也既入不言三揖者如上禮可知讓升侯氏與使者三讓而先升使事既畢則行賓主禮也楊氏復曰今案几布席設几皆在西北位此帷宫恐亦當然欽定義疏聘禮郊勞勞者出授老幣出迎勞者勞者禮辭賓揖先入勞者從之鄰國之卿體敵猶出迎勞者侯氏於王命出迎可知蓋是時上介先出止之侯氏隨出迎之經故云侯氏乃止使者疏謂侯氏不出蓋誤此几席其莞筵紛純彤几與侯氏用束帛乗馬儐使者使者再拜受侯氏再拜送幣注儐使者所以致尊敬也拜者各于其階使者降以左驂出侯氏送於門外再拜侯氏遂從之注騑馬曰驂左驂設在西者其餘三馬侯氏之士遂以出授使者之從者於外從之者遂隨使者以至朝出疏陳四馬與人以西為上聘禮禮賓時賓執左馬以此亦以左驂出故知左驂設在西也敖氏繼公曰四馬象在車前故西者曰左驂駕車之馬兩服居中兩驂在傍郝氏敬曰左驂庭實四馬最西一馬也馬首北以西為左髙氏愈曰遂從之者以天子勞使既至故不敢即安而急趨王所也蕙田案以上郊勞天子賜舍注以其新至道路勞苦未受其禮且使即安也賜舍猶致館也所使者司空與小行人為承擯今文賜作錫者疏聘禮賓至於朝君使卿致館此不言致館言賜舍天子尊極也聘禮致館賓主人各擯介故知此亦陳擯介必知使小行人為承擯者案小行人云及郊勞眡館將幣為承而擯是其義也李氏如圭曰聘禮賓至即欲受之者主人之禮覲禮且使即安者君上之恵曰伯父女順命於王所賜伯父舍注此使者致館辭伯疏此及下經皆云父謂同姓大國舉同姓大國則同姓小國及異姓之國禮不殊也欽定義疏上文侯氏遂從之蓋從使者至朝告至也與聘禮勞者遂以賓入至於朝同其時天子即降賜舍之命於是小行人帥至於館而司空乃宣是命辭焉聘禮曰大夫帥至於館卿致館其義例可推也侯氏再拜稽首注受館敖氏繼公曰不著其所是於舍門外也使者東面致命侯氏西面聽命既則北面拜儐之束帛乗馬注王使人以命致館無禮猶儐之者尊王使也侯氏受館於外既則儐使者於内敖氏繼公曰侯氏於使者亦有迎送之拜不言者文略耳下於大夫戒之禮亦然方氏苞曰此下當有設飱之禮及期侯氏有展幣之禮以皆前見故文不具蕙田案以上賜舍天子使大夫戒曰某日伯父帥乃初事注大夫者卿為訝者也掌訝職曰凡訝者賓客至而徃詔相其事戒猶告也其為告使順循其事也初猶故也侯氏再拜稽首注受覲日也張氏爾岐曰此下言將覲之事王使人告覲期諸侯先期受次於廟凡二事帥乃初事者遵循朝覲之舊典也蕙田案以上戒日諸侯前朝皆受舍於朝同姓西面北上異姓東面北上注言諸侯者明來朝者衆矣顧其入覲不得並耳受舍於朝受次於文王廟門之外聘禮記云宗人受次次以帷少退於君之次則是次也言舍者尊舍也天子使掌次為之諸侯上介先朝受焉此覲也言朝者覲遇之禮雖簡其來之心猶若朝也分别同姓異姓受之將有先後也春秋傳曰寡人若朝于薛不敢與諸任齒則周禮先同姓贄疏春夏受贄於朝無迎法受享于廟有迎禮秋冬受受享皆在廟並無迎法是以大門外無位既受覲于廟故在廟門外受次天子春夏受享諸侯相朝聘迎賓客者皆有外次即聘禮記宗人受次是也有外次于大門外者則無廟門外之内次天子覲遇在廟者有廟門外之内次無大門外之外次此文是也曲禮云天子當依而立諸侯北面而見天子曰覲彼諸侯皆北面不辨同姓異姓與此不同者此謂廟門外為位時彼謂入見天子耳李氏心傳曰受舍於朝所謂外朝也欽定義疏受舍於朝其地當在臯門以内庫門以外屬外朝之東西一以來覲者衆餘地能容一以賓車不入大門下行為近也若廟外則覲日陳擯介又諸侯亦當有從臣執幣馬者在焉占地多矣且覲尚嚴廟外宜肅苟盡張次於此儀衛紛囂非所以為敬也受舍之舍與賜舍之舍别賜舍之舍館舍也有屋宇蓋司空之屬掌之受舍之舍次舍也以帷幕天官之屬掌之蕙田案經云受舍於朝則以為在外朝者得之注疏謂在廟門外疑非又案以上受舍於朝侯氏禆冕釋幣於禰注將覲質明時也禆冕者衣禆衣而冠冕也禆之為言埤也天子六服大裘為上其餘為禆以事尊卑服之而諸侯亦服焉上公衮無升龍侯伯鷩子男毳孤絺卿大夫元此差司服所掌也禰謂行主遷主矣而云禰親之也釋幣者告將覲也其釋幣如聘大夫將受命釋幣於禰之禮既則祝藏其幣歸乃埋之於祧西階之東陳氏祥道曰聘賓釋幣於廟故舉幣而埋之侯氏釋幣於行主故舉幣而藏之郝氏敬曰古者大事出奉其廟主行有事則告禆猶副也天子衮冕為正諸侯以下冕服為副天子受覲於廟所以昭先烈也諸侯入覲告禰所以率先職也張氏爾岐曰此下至升成拜降出備言入覲之事質明先以將覲告行主乃入覲以瑞玉為贄次行三享次肉􅃝請罪凡三節王勞之乃出禆冕者上公衮冕侯伯鷩冕子男毳冕也案玉藻諸侯元冕以祭不得服衮冕以下而此禆冕釋幣于禰者以將入天子之廟故服之也盛氏世佐曰上公衮冕九章侯伯鷩冕七章子男毳冕五章皆其上服也而謂之禆者據王而言猶記以金路以下為偏駕也玉藻亦云諸侯元冕以祭禆冕以朝是三禮所言合矣侯氏禆冕為將朝也釋幣則因事而服之耳故與正祭異也諸侯于其國雖祭不得服其上服惟於朝天子及助祭之時服之而敖氏又謂當服其次則上服更何所服之乎其説蓋不可通矣禰注以為遷廟主據曽子問而言也但彼所云乃天子廵守之禮諸侯述職無明文故敖氏直以為考據經而斷近得其實當從之蕙田案以上釋幣於禰乗墨車載龍旗弧韣乃朝以瑞玉有繅注墨車大夫制也乗之者入天子之國車服不可盡同也交龍為旂諸侯之所建弧所以張縿之弓也弓衣曰韣瑞玉謂公桓圭侯信圭伯躬圭子穀璧男蒲璧繅所以藉玉以韋衣木廣袤各如其玉之大小以朱白蒼為六色疏爾雅説旌旂正幅為縿故以此弧弓張縿之兩幅也月令云帶以弓韣韣是弓衣可知敖氏繼公曰乗墨車屈也載龍旂不沒其實也晉韓宣子聘於周自稱曰士大國之卿自比天子之士則其君自比於大夫宜也盛氏世佐曰凡旌旂之屬皆有弧以張縿弧上又畫枉矢考工記弧旌枉矢以象弧是也龍旂弧韣載之於車以為飾也龍旂象文徳也載弧不忘武備也于龍旂則張之弧則韞之以韣是矢其文徳雖有武備而不用也一車飾也而先王之寫意深矣欽定義疏墨車自士昏乗之為攝盛自入覲乗之則為屈交龍之旂五等所同斿數則異弧以張縿必備韣者為將歛也聘禮旜有張歛此亦然與天子設斧依於户牖之間左右几注依如今綈素屏風也有繡斧文所以示威也斧謂之黼几玉几也左右者優至尊也其席莞席紛純加繅席畫純加次席黼純疏爾雅牖户之間謂之扆以屏風為斧文置于依地綈赤也素白也漢時屏風以綈素為之象古者白黒斧文故鄭以漢法為况周禮司几筵云左右玉几注左右有几優至尊也又太宰云賛玉几注云立而設几優尊者但几惟湏其一又几坐時所以慿依今左右及立兩設之皆是優至尊也兩注相兼乃具郝氏敬曰神几尚右人几尚左左右兼設以安至尊為神人共主也天子衮冕負斧依注衮衣者禆之上也繢之繡之為九章其龍天子有升龍有降龍衣此衣而冠冕南鄉而立以俟諸侯見疏負謂背之南面也嗇夫承命告於天子注嗇夫蓋司空之屬也為末擯承命于侯氏下介傳而上上擯以告天子天子見公擯者五人見侯伯擯者四人見子男擯者三人皆宗伯為上擯子疏周禮司儀職兩諸侯相朝皆為交擯此諸侯見天亦交擯可知此所陳擯介當在廟之外門東陳擯從北向南門西陳介從南向北各自為上下嗇夫承命告於天子則命先從侯氏出下文天子得命呼之而入命又從天子下至侯氏即令入此覲遇之禮略惟有此一辭而已司儀云交擯三辭者據諸侯自相見於大門外法其天子春夏受享於廟見於大門外亦可交擯三辭矣大宗伯職云朝覲㑹同則為上相注云出接賓曰擯入詔禮曰相若四時常朝則小行人為承擯故小行人職云將幣為承而擯此文嗇夫為末擯若子男三擯此則足矣若侯伯四擯别増一士上公五擯更别増二士若時㑹殷同則肆師為承擯欽定義疏廟在庫門内之左將覲質明時侯氏至外朝下車入次俟王入廟升堂負斧依而立然後侯氏入庫門而左至於廟門外接西塾東面乃襲執玉擯介既設於是嗇夫乃承侯氏請覲之命於下介逓傳而上上擯入告天子經云嗇夫承命告於天子乃約其儀以為文嗇夫未必得入廟也蕙田案周禮五官無嗇夫故鄭疑為司空之屬考之漢書上林虎圈有嗇夫百官表縣置嗇夫漢去古未逺其職雖不盡同而官名相因必有自矣夏書嗇夫馳見於古文𦙍征篇則其為天子之官無疑敖氏以嗇夫為大夫之誤盛氏則以嗇夫為諸侯之末介二説似皆未然天子曰非他伯父實來予一人嘉之伯父其入予一人將受之注言非他者親之辭嘉之者美之辭也上擯又傳此而下至嗇夫侯氏之下介受之傳而上上介以告其君君乃許入今文實作寔嘉作賀侯氏入門右坐奠圭再拜稽首注入門右執臣道不敢由賓客位也卑者見尊奠摯而不授欽定義疏聘禮從賓道者皆入門左聘與享是也從臣道者皆入門右賓介私覿是也侯氏初入門執臣道故右也擯者謁注謁猶告也上擯告以天子前辭欲親受之如賓客也其辭所易者曰伯父其升欽定義疏經止稱擯者注知為上擯者以聘禮擯者之為上擯決之也然則承擯以下其亦在門内之東負東塾而立與侯氏坐取圭升致命王受之玉侯氏降階東北面再拜稽首擯者延之曰升升成拜乃出注擯者請之侯氏坐取圭則遂左降拜稽首送玉也從後詔禮曰延延進也文疏侯氏得擯者之告坐取圭即言升致命無出門之明知遂向門左從左堂塗升自西階致命也從後詔禮曰延者以其賓升堂擯者不升敖氏繼公曰拜于西階東别于内臣也侯氏既成拜宰乃受玉以東是時王于侯氏之拜皆不答所以見至尊之義也欽定義疏坐取圭而遂左者賓禮也以擯者謁而天子辭之故也王既受玉以授宰則裼侯氏出則亦裼而奉束帛加璧以享矣蕙田案以上覲四享皆束帛加璧庭實唯國所有注四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也大行人職曰諸侯廟中將幣皆三享其禮差又無取于四也初享或用馬或用虎豹之皮其次享三牲魚腊籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此地物非一國所能有惟所有分為三享皆以璧帛致之王疏三牲魚腊籩豆之實以下皆禮器文彼諸侯國為祫祭而致之與此因覲致之同云璧帛致之者據享天子而言若享后即用琮錦但三享在庭分為三叚一度致之據三享而言非謂三度致之為皆也蕙田案鄭氏破四享為三享據大行人職而言先儒皆從之獨郝仲輿以為四享者諸侯五等子男同等故四也案五等諸侯雖入覲同時受之必有先後且三享庭實甚多若五等諸侯之享禮一時並陳恐廟庭亦不能容郝説殊誤奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜稽首注卓猶的也以素的一馬以為上書其國名後當識其何産也馬必十匹者不敢斥王之乗用成數敬也疏中庭南北之中不參分庭一在南者以其三享同陳須入庭深設之故也敖氏繼公曰匹馬卓上謂以一馬卓然居前而先行明其入不與九馬相屬也此奠幣蓋於入門左之位郝氏敬曰特出曰卓一馬中庭卓立九馬羅列於後先進者從西以次并列而東故曰西上蕙田案卓字之義當以敖氏郝氏為長周禮校人職云大祭祀朝覲㑹同毛馬而頒之齊其色此侯氏享禮之馬亦當然注疏以卓為素的疑非也但敖氏謂一馬卓然居前者據初入門而言及其陳於中庭仍與九馬並列而居左故下文以馬出授人解為左馬非匹馬一行九馬别為一行也擯者曰予一人將受之注亦言王欲將受之蕙田案受覲聽事所稱天子之命皆擯者述之彼云天子此云擯者彼此互見為義侯氏升致命王撫玉侯氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之注王不受玉撫之而已輕財也以馬出隨侯氏出授王人於外也王不使人受馬者至於享王之尊益君侯氏之卑益臣疏幣即束帛加璧并玉言幣故小行人合六幣皮馬與玉皆為幣宰即太宰太宰主幣周禮太宰職云大朝覲㑹同賛玉幣玉獻玉几玉爵注云助王受此四者是也春夏受贄於朝雖無迎法王猶在朝至受享又迎之而稱賓主覲禮受享皆無迎法不下堂而見諸侯已是王尊臣卑王猶親受其玉至於三享使自執其馬王不使人受之於庭是王之尊益君侯氏之卑益臣也諸侯覲天子享天子訖亦當有幣問公卿大夫隠七年左氏傳云戎朝於周發幣於公卿是也敖氏繼公曰西階前拜送幣者非其正位以欲執馬由便也擯者不延之以升變於授圭時也馬左馬也侯氏親以左馬出敬之至也王臣不於内受馬者無以為節亦至尊之禮異也事畢注三享訖方氏苞曰三享訖宜更享后王后之禮事多以大宗伯攝文不具蕙田案三享者以庭實分為三耳經無三次受享之文鄭氏於受享事畢注云三享訖知三享實止一享也敖氏以為經所見者初享之儀其次二享空其文者非又案以上享乃右肉袒于廟門之東乃入門右北面立告聽事注右肉袒者刑宜施于右也凡以禮事者左袒入更從右者臣益純也告聽事者告王以國所用為罪之事也疏告王以國所用為罪之事者加得字解之當云告王以國所用者有得罪之事郝氏敬曰聽事猶言待罪告告擯者擯者謁諸天子天子辭於侯氏曰伯父無事歸寧乃邦注謁告寧安也乃猶汝也朱子曰周禮最是大行人等官屬之司宼難曉蓋覲禮諸侯行禮既畢則降而肉袒請刑王曰伯父無事歸寧乃邦此所謂懐諸侯則天下畏之也如此等處皆是合著如此初非聖人私意侯氏再拜稽首出自屏南適門西遂入門左北面立王勞之再拜稽首擯者延之曰升升成拜降出注王辭之不即左者當出隠於屏而襲之也天子外屏勞之勞其道勞也故疏以屏外不見天子為隠向者右袒今王辭以無事宜襲也欽定義疏執圭行禮時王與侯氏授玉受玉皆襲過此而享則裼矣以裼乃其常也此裼襲相對者也侯氏請事則袒天子辭之而出則襲此袒襲相對者也雖襲猶裼自若也亦以裼乃其常也蕙田案以上侯氏聽事天子勞天子賜侯氏以車服迎於外門外再拜注賜車者同姓以金路異姓以象路服則衮也鷩也毳也古文曰迎于門外也路疏案周禮巾車掌五路玉路以祀尊之不賜諸侯金同姓以封象路異姓以封革路以封四衛木路以封蕃國鄭云同姓謂王子母弟率以功徳出封雖為侯伯其畫服猶如上公賜魯侯鄭伯服則衮冕得乗金路以下與上公同則太公與杞宋雖異姓服衮冕乗金路矣異姓謂甥舅之國與王有親者得乗象路異姓侯伯同姓子男皆乗象路以下四衛謂要服以内庶姓與王無親者自侯伯子男皆乗革路以下蕃國據外為總名皆乗木路而已司服上陳王之吉服有九下云公之服自衮冕而下如王之服侯伯自鷩冕而下如公之服子男自毳冕而下如侯伯之服也敖氏繼公曰門外舍門外也案聘禮舍惟一門此今文雖有外門外之文然以行禮之節求之無二門之徵且以古文為正張氏爾岐曰自此至乃歸皆言王賜禮侯氏之事蕙田案敖君善謂舍無二門宜從古文此説是也今文蓋衍一外字路先設西上路下四亞之重賜無數在車南注路謂車也君所乗車曰路路下四謂乗焉也亞之次車而東也詩云君子來朝何錫予之雖無予之路車乗馬又何予之元衮及黼重猶善也所加賜善物多少由恩也寢疏鄭注周禮云路大也君之居以大為名是以云路路門之等敖氏繼公曰路車一而已乃云西上者以其與馬同設也四馬設於車東異於駕也諸公奉篋服加命書於其上升自西階東面大史是右注言諸公者王同時分命之而使賜侯氏也右讀如周公右王之右是右者始隨入于升東面乃居其右古文是為氏也諸疏言諸非一之義以諸侯來覲者衆各停一館故命公分徃賜之周公右王左傳晉祁奚語引之者證太史是右是佐公而在公右之義也太史卑始時隨公後升訖公東面太史於是乃居公右而並東面以宣王命也敖氏繼公曰置服於篋故謂之箧服命書若文侯之命之類是也此不言揖讓之禮如勞可知侯氏升西面立太史述命注讀王命書也侯氏降兩階之間北面再拜稽首注受命敖氏繼公曰是時侯氏升降自阼階故拜于兩階之間不于階東者拜至尊之命宜異于常禮也升成拜注太史辭之降也春秋傳曰且有後命以伯舅耋老母下拜此辭之類疏彼以齊侯年老故未降已辭此下拜禮也故降拜乃辭之彼齊侯不升成拜者亦以年老故也盛氏世佐曰升成拜以公辭之故也不言公辭文省既拜于下乃辭禮之正也春秋傳齊侯未下拜宰孔辭之待以殊禮也既不復成拜于上者謙不敢貪天子之命也故與此異敖氏以為不辭而升成拜者非蕙田案盛氏駮敖君善不辭之説極當但鄭注謂太史辭之盛氏謂公辭之案上文述王命者太史則此辭侯氏者亦必太史也盛説似非太史加書於服上侯氏受注受篋服使者出侯氏送再拜儐使者諸公賜服者束帛四馬儐大史亦如之注既云拜送乃言儐使者以勞有成禮略而遂言張氏爾岐曰使者兼公與太史而言儐使者在拜送前乃于送後略言之者以前郊勞時已詳載成禮故略言已足也蕙田案以上賜車服同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅注據此禮云伯父同姓大邦而言疏周禮冡宰掌建邦之六典以佐王治邦國注云大曰邦小曰國彼對文則例散文則通故以大國言國小國言邦也蕙田案此條賈疏稱伯父叔父不要同姓為定引下曲禮東西二伯不問同姓異姓皆稱伯父與曲禮之文顯相違反傳記亦絶無稱異姓伯父之事其謬甚矣義疏引賈氏疏則云下曲禮東西二伯同姓稱伯父異姓稱伯舅州牧同姓稱叔父異姓稱叔舅與此異但徧檢南北雍本閩本汲古閣本及内府新刋本皆不然未識何所據也又案以上諸侯稱謂饗禮乃歸注禮謂食燕也王或不親以其禮幣致之略言饗禮互文也掌客職曰上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕為疏掌客五等饗食燕三者具有今饗下有禮故以禮食燕也變食燕而言禮見王有故不親食燕則以禮幣致之直言饗見王無故親饗之若有故亦以酬幣之禮致之食燕云禮見王有故以侑幣之禮致之亦宜有王無故親食燕故云互文也欽定義疏聘禮饗食燕之外有羞有獻周官庖人職共賓客之禽獻則王於覲賓亦有羞獻可知聘禮有大夫享食有還玉有賄有贈此皆當有之文不具耳雝詩言相予肆祀載見詩言率見昭考則羣后入覲者當祭則無不與而二王之後宜為長賓也考工梓人職張五采之侯則逺國屬地官牛人春官鎛師眡瞭典庸器夏官小臣諸職於賓射胥有事焉則天子有與諸侯賓射之禮蓋又别於燕射但或舉或不舉非若饗食燕之有常耳侯氏既覲而歸則告於祖禰社稷山川飲至舍爵䇿勲焉禮也蕙田案以上饗禮諸侯覲於天子為宫方三百歩四門壇有十二尋深四尺加方明於其上注四時朝覲受之於廟此謂時㑹殷同也宫謂壝土為埒以象墻壁也為宫者于國外春㑹同則于東方夏㑹同則于南方秋㑹同則于西方冬㑹同則于北方八尺曰尋十有二尋則方九十六尺也深謂髙也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也上下四方之神者所謂神明也㑹同而盟明神監之則謂之天之司盟有象者猶宗廟之有主乎王廵狩至于方岳之下諸侯㑹之亦為此宫以見之司儀職曰將㑹諸侯則命為壇三成宫旁一門詔王儀南鄉見諸侯也疏案大宗伯云時見曰㑹殷見曰同鄭注云時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而㑹不協而盟是也殷猶衆也十二歳王如不廵狩則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王廵狩殷見四方四時分來終歳則遍若如注則時㑹殷同亦有朝覲在廟假令當方諸侯有不順服則順服者皆來朝王其中若當朝之歳者自於廟朝覲若不當朝之歳者當在壇朝十二年王不廵守則殷朝六服之内若當歳者即在廟其餘在壇朝故鄭言既朝覲乃為壇于國外也朝事儀未在壇朝而先言帥諸侯拜日亦謂帥已朝者諸侯而言也四方之壇並宜在西郊之内以其拜日之等于近郊退來就壇明壇在近郊之内但去城不知逺近或四方皆依成數東方八里南方七里西方九里北方六里四方此其定分南鄉見諸侯者王在堂上公於上等侯伯於中等子男於下等奠玉拜皆升堂授玉乃降也張氏爾岐曰自此至篇末皆言時㑹殷同及王廵守為壇而見諸侯之事盛氏世佐曰此下言諸侯入覲而天子率之以祀羣神也既分覲之又總㑹之所以固其志也為宫掌舍職也司儀主令之四門所謂旁一門也壇有十二尋者謂其下等也壇凡三等上有堂以祀方明并王立之所方二丈四尺堂下每等加廣二丈四尺上等方四丈八尺中等方七丈二尺下等則方九丈六尺矣每等髙一尺堂亦髙一尺從堂視下深四尺也蕙田案諸侯㑹同為宫方三百歩六尺為歩則方二百二十五尋也壇方十二尋居宫之中央壇上設方明及天子所立斧依之位諸侯升成拜亦於是焉壇三成成崇一尺廣皆尋有四尺上等長六尋諸公拜位在焉中等長九尋侯伯拜位在焉下等長十有二尋子男拜位在焉壇之下距壝門一百六尋有四尺則公侯伯子男立位在焉上介奉旂而置於宫者是也諸公位中階最近前侯東階伯西階稍次之諸子門東諸男門西最逺方明者木也方四尺設六色東方青南方赤西方白北方黒上元下黄設六玉上圭下璧南方璋西方琥北方璜東方圭注六色象其神六玉以禮之上宜以蒼璧下宜以黄琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之敖氏繼公曰設六色以象天地四方之色也設六玉為祀時以此禮之張氏爾岐曰方明之制合六木而為之上下四方各異色刻木為陷而飾以玉蓋以一物而象上下四方之神非六物也盛氏世佐曰六色設之於木上六圭則分方而置諸其側以禮神也上從南下從北注云刻木而著之恐非是蕙田案方明蓋一木隨其方色而飾之張氏以為合六木為之非也其設六玉鄭氏注刻其木而著之賈疏以為刻木安於中考周禮大宗伯以玉作六器以禮天地四方鄭注謂始告神時薦於神坐也此經四方禮神用珪璋琥璜正與彼同惟上圭下璧為異所以然者天地至尊避璧琮不用禮從殺也四方卑無嫌故從同也祀方明亦宜以玉薦於神坐明矣先儒以上下之位不順故為刻木之説但傳記别無所據盛氏謂上從南下從北則於禮神之方位仍屬無礙較舊説為長矣又案六色先東南西北而後上下六玉先上下而後南西北東變文無義例也上介皆奉其君之旂置於宫尚左公侯伯子男皆就其旂而立注置於宫者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左皆建旂公東上侯先伯伯先子子先男而位皆尚東方也諸侯入壝門或左或右各就其旂而立王降階南鄉見之三揖土揖庶姓時揖異姓天揖同姓見揖位乃定古文尚作上臨疏上介奉君旂置於宫前期一日可也公侯就旂據朝之時也此旂與在軍徽幟同皆以尺易刃小而為之中階之前已下皆朝事儀明堂位文朝事儀論㑹同之事明堂位周公朝諸侯于明堂不在宗廟皆與此同也二伯帥諸侯初入宫或左或右皆北面立定乃始各就其旂而立王乃降南面見之而揖覲禮天子不下堂而見諸侯今王降者以在壇㑹同相見與覲異故也盛氏世佐曰尚上通上左者據王而言也王南鄉以東為左故諸公北面者東上諸侯在諸伯之東諸子在諸男之東是皆以左為上也蕙田案禮入門以東為右出以東為左覲禮侯氏入門右謂門東也此經云尚左據王南鄉而言與彼不同盛氏之説可以羽翼註疏矣敖氏謂五等之位自西而東皆北面為一列與大戴禮朝事義相違不可從四傳儐注王既揖五者升壇設擯升諸侯以㑹同之禮其奠瑞玉及享幣公拜于上等侯伯于中等子男于下等擯者每延之升堂致命王受玉撫玉降拜於下等及請事勞皆如覲禮是以記之云四傳擯者毎一位畢擯者以告乃更陳列而升其次公也侯也伯也各一位子男俠門而俱東上亦一位也至庭乃設擯則諸侯初入門王官之伯帥之耳又疏公侯伯面位同故各自設擯子男雖隔門相去近同北面東上故共一位設擯上經諸侯各就其旂而立乃去四傳擯則在諸侯之北故知至庭乃設擯張氏爾岐曰據注疏推其次第上介先期置旂質明王帥諸侯拜日東郊反祀方明二伯帥諸侯入壝門左右立王降階南鄉三揖諸侯各就其旂而立乃傳擯執瑞玉以覲璧帛以享請事勞皆如前經所陳也蕙田案注云請事即上經告聽事也賈疏以為侯氏奠圭擯者請侯氏王欲親受之似非盛氏世佐曰大行人云上公擯者五人侯伯四人子男三人謂交擯法也此合諸侯于壇用傳儐法與交擯異其人數未聞傳擯者擯者傳告五等諸侯使之各以其幣升壇覲王也欽定義疏於壇受覲王位亦當設斧依南鄉此時方明其在斧依之北與王位當有帷幕帟綬幕人共之掌次張之天子執冒四寸以朝諸侯其此時與蕙田案四傳擯敖氏以為一朝三享皆傳擯辭使之升拜故曰四也但覲禮三享無升成拜之文且三享者分庭實為三非有三次不得并朝為四也其升成拜之位聶氏敖氏謂在奠玉之處考覲禮升拜並不在奠圭之所奠圭階下也升拜堂上也此壇上亦有堂則其升堂可知不得仍在奠玉之處也其升堂致命而降拜則當在奠玉之位注云降拜於下等即指司儀三等拜位而言聶氏敖氏謂降拜於地亦非也司儀賈疏又謂公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地蓋誤解鄭氏下等之説其實不然也天子乗龍載大旂象日月升龍降龍出拜日於東門之外反祀方明注此謂㑹同以春者也馬八尺以上為龍大旂太常也王建太常縿首畫日月其下及旈交畫升龍降龍朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乗大路建大常十有二旒樊纓十有二就貳車十有二乗帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以㑹同之禮見諸侯也凡㑹同者不協而盟司盟職曰凡邦國有疑㑹同則掌其盟約之載書及其禮儀北面詔明神既盟則藏之言北面詔明神則明神有象也象者其方明乎及盟時又加于壇上乃以載辭告焉詛祝掌其祝號朝疏自此盡西門外論將見諸侯先禮日月山川之事事儀直有朝日禮畢退見諸侯此覲禮祀方明禮畢乃朝諸侯不同者以其邦國有疑則有盟事朝日既畢乃祀方明於壇祀方明禮畢退去方明於下天子乃升壇與諸侯相見朝禮既畢乃更加方明於壇與諸侯行盟誓之禮若邦國無疑王帥諸侯朝日而已無祀方明之事司盟云詔明神不言方明此文直言方明不言明神鄭以義約為一事故言乎以疑之敖氏繼公曰載大旂者以拜日及祀方明也巾車職曰玉路樊纓十有再就建大常十有二斿以祀此載大常則乗玉路矣東門即此宫之東門也禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外注此謂㑹同以夏冬秋者也變拜言禮者容祀也禮月于北郊者月太隂之精以為地神也盟神必云日月山川焉者尚著明也詩曰謂予不信有如皦日春秋傳曰縱子忘之山川神祗其忘之乎此皆用明神為信也祀疏變拜言禮者言拜無祀則兼拜蕙田案此疏鄭注容祀之義本或作客祀者傳寫之誤耳張爾岐乃謂禮日月四瀆山川丘陵不在其處但於此致敬故云客祀鑿矣觀承案疏變拜言禮者言拜無祀祀則兼拜此解容字義甚明因諸本容字誤作客字而張氏乃竟作主客之客解豈未嘗見此疏耶敖氏繼公曰不言祀者以異於正祭變其文耳此三禮者皆與上事相屬而舉之天子廵守有懐柔百神望秩山川之禮此諸侯以天子不廵守之故而來覲故天子亦略修祀事以放廵守之禮云方氏苞曰春夏陽故皆禮日秋冬隂故禮嶽瀆山川蕙田案注疏以春會同拜日於東門外夏禮日於南門外秋禮山川丘陵於西門外冬禮月於北門外以四方分配四時其反祀方明則一也上言拜此言禮互文也敖氏謂此三禮者皆與上事相屬則是於拜日祀方明之後復舉之後儒多從其説然既拜日東門外又禮日南門外一事而再祭毋乃數而凟乎當以注疏為是祭天燔柴祭山丘陵升祭川沈祭地瘞注升沈必就祭者也就祭則是謂王廵守及諸侯之盟祭也其盟揭其著明者燔柴升沈瘞祭禮終矣備矣郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王廵守至於岱宗柴是王廵守之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸侯之盟其神主山川也月乃太隂之精上為天使臣道莫貴焉是五官之伯㑹諸侯而盟其神主月與歳疏王制曰王廵守至於岱宗柴彼注以為告至舜典二月東廵守至于岱宗柴注為考績燔燎柴此又為祭日柴不同者但廵守至岱宗之下有此三種之柴告至訖别有考績皆正祭之神别有祭日以為方明之主尚書與王制并此文唯有柴之文故注不同互見為義明皆有陳氏祥道曰經言祭天而鄭言祭日經言祭地而鄭言祭月且方明以象上下四方而經傳凡言主盟者多稱神明曰司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖齊語桓公約誓於上下神祗則諸侯之盟非特指山川也鄭氏謂王之盟主日諸侯主山川王官之伯主月其説無據敖氏繼公曰謂以此四事用其祭物也祭物者謂牲幣之屬燔柴者置之于積柴之上而燔之升謂縣之瘞埋也此皆順其性而為之蓋因上文遂并言正祭之法以明所謂禮者異於此也張氏爾岐曰此言天子廵守四岳各隨方向祭之以為盟主於山言升於川言沈是就其處而舉此禮故知是王者廵守之事鄭前注云王廵守於方岳之下諸侯㑹之亦為此宫以見之為此經設也蕙田案此經自諸侯覲於天子以下論會同之禮此條謂王廵守覲諸侯之禮也王廵守諸侯來覲為壇壝宫加方明四傳擯皆與時會殷同之儀同但會同則有拜日及禮日月山川丘陵四瀆而已廵守則祭天地其禮尤大故特記之尚書曰歳二月東廵守柴望秩於山川肆覲東后王制曰歳二月東廵守柴而望祀山川覲諸侯郊特牲曰天子適四方先柴此廵守祭天與山川之明文經傳雖不言祭地然有柴又有望則有瘞從可知鄭氏據大宗伯以實柴祀日月星辰因謂燔柴祭日瘞祭月但周禮禋祀實柴槱燎三者自昊天上帝日月星辰司中司命風師雨師皆同之謂日月皆燔柴則可謂祭日燔柴祭月瘞則不可以祭月為瘞者鄭之臆説也祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也燔柴與瘞自是廵守告祭天地之禮非祭日月以為司盟之神不得與方明牽合為一且日月天神非地示也祭天可以主日祭地必不可以主月祭天則日月從祀據祭義大報天而主日配以月故言祭天可以包日月不得祭日月而冒天地之稱也王制鄭注以柴為祭天告至其説最當賈氏遂以為廵守有三種之柴則彌縫注家而失之者也蕙田案以上大朝覲之禮記几俟於東箱注王即席乃設之也東箱東夾之前相翔待事之處敖氏繼公曰經云設斧依于户牗之間左右几乃云天子衮冕負斧依則是天子登席于既設几之後也此云几俟于東箱其指未設几之前而言與蕙田案此記几偏駕不入王門注在旁與已同曰偏同姓金路異姓象路四衛革路蕃國木路駕之與王同謂之偏駕不入王門乗墨車以朝是也偏駕之車舍之於館與疏周禮巾車掌王五輅玉輅以祀不賜諸侯金輅以賓司姓以封象輅以朝異姓以封革輅以即戎以封四衛木輅以田以封蕃國此玉輅者天子所乗為正四輅者諸侯乗之為偏敖氏繼公曰言此者明唯王車乃入王門也凡非王車皆謂之偏駕蕙田案此記車奠圭於繅上注謂釋于地也藉疏侯氏入門右奠圭時當以繅承之乃釋于地欽定義疏此謂初執圭時歛繅繫組以入至入門右坐奠時乃開繅而奠於其上以相變為文也然則擯者謁而侯氏取圭以升亦當屈繅而歛之及升堂致命乃垂繅開之以授王與王授玉亦歛之乃以授宰然則惟正行禮授受時方從執之其自外而入自下而升皆卧執之也蕙田案此記奠圭右儀禮覲禮五禮通考卷二百二十二
