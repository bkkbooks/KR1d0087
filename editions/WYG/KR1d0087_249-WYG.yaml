木刋敝邑大懼不競而恥大姬天誘其衷啟敝邑心陳知其罪授手于我用敢獻功晉人曰何故戎服對曰我先君武荘為平桓卿士城濮之役文公布命曰各服舊職命我文公戎服輔王以授楚捷不敢廢王命故也士荘伯不能詰乃受之王圻續通考奏捷儀注凡各處奏捷鴻臚寺於早期将差來人役引至御前宣讀捷音隆慶六年令擇吉宣捷至日不奏事次日行慶賀禮神宗八年定凡大捷於常朝期宣奏捷音是日百官各具吉服候宣捷之後鴻臚寺官致詞行五拜三叩頭禮本日早即遣官薦告郊廟行翰林院撰文太常寺辦祭品中捷以下立宣捷不行祭告慶賀禮右獻捷宋史哲宗本紀元符二年秋七月丙寅洮西安撫使王贍復邈川城西蕃首領勤巴阿勝以城降禮志元符二年西蕃玉隆贊邈川首領轄沁等降詔具儀注以受降日御宣徳門設諸班直上四軍仗衛諸軍素服陳列降者各服蕃服以見審問訖有㫖放罪各等第賜首服袍帶百官稱賀訖再御紫宸殿賜宴㑹哲宗崩樞宻院留隆贊等西京聽㫖詔罷御樓立仗但引見于後殿隆贊一班契丹公主一班夏國囬鶻公次之回鶻一班䇿巴克嘉勒并族屬次之應族屬首領各從其長以次起居僧尼公主皆蕃服蕃拜並賜冠服謝訖賜酒饌横門外政和初議禮局上受降儀皇帝乗輿升宣徳門樓降輿坐御幄百官與降王蕃官各班樓下如大禮肆赦儀東上閤門以紅絛袋班齊牌引升樓樓上東上閤門官附内侍承㫖索扇扇合帝即御坐簾捲内侍又贊扇開侍衛如常儀諸班親從并裏圍降王人等迎駕自贊常起居次舍人贊執儀将士常起居次管幹降王使臣并隨行舊蕃官常起居次禮直官舎人引百官横行北向贊者曰拜在位官皆再拜舞蹈三稱萬嵗又再拜班首奏聖躬萬福又再拜退百官各就東西位舎人引降王服本國衣冠詣樓前北向女婦少西立僧又少西尼立于後入内省官詣御坐前承㫖傳樓上東上閤門官承㫖録訖以紅絛袋降制樓下東上閤門官承㫖退降王以下俯伏東上閤門官至令通事舍人掖之起首領以下皆起鞠躬閤門宣有勅降王以下再拜僧尼止躬呼萬嵗閤門録勅㫖付管幹官降王等躬聽詰問如有復奏閤門録訖仍以紅絛袋引升樓如無復奏入内省官詣御坐承㫖傳樓上閤門官稱有勅放罪訖舍人贊謝恩降王以下再拜稱萬嵗復序立入内省官詣御坐承㫖傳樓上閤門官稱有勅各賜首服袍帶樓下閤門官承㫖引所賜檐牀陳于西舍人宣曰有勅降王以下再拜鞠躬舍人稱各賜某物賜物畢又再拜稱萬嵗若賜官即贊謝再拜並歸次易所賜服舍人先引降王以下至授遥郡以上當樓前北向東上立贊再拜稱萬嵗又再拜次贊服冠帔婦女再拜僧尼别謝引還次贊樓上侍立官稱賀再拜禮直官舎人分别百官横行北向立贊拜訖班首少前俛伏跪稱賀其詞中書隨事撰述賀訖復位在位者又再拜舞蹈三稱萬嵗又再拜東上閤門官進詣樓前承㫖就班首宣曰有制贊者曰拜在位官皆再拜宣答其詞學士院隨事撰述又贊再拜三稱萬嵗又再拜樓上樞宻院前跪奏稱某官臣其言禮畢内侍索扇扇合簾垂帝降坐内侍贊扇開所司承㫖放仗樓下鞭鳴百官再拜退蕙田案受降秦漢以下有之儀制自宋史始故首宋右受降詩小雅六月吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炰鼈膾鯉侯誰在矣張仲孝友箋吉甫既伐玁狁而歸天子以燕禮樂之則歡喜矣又多受賞賜也御侍也王以吉甫逺從鎬地來又日月長久今飲之酒使其諸友恩舊者侍之又加其珍美之饌所以極勸也春秋隠公五年左氏傳臧僖伯曰三年而治兵入而振旅歸而飲至以數軍實注飲于廟以數軍徒器械及所獲也昭文章明貴賤辨等列順少長習威儀也桓公十六年秋七月公至自伐鄭左氏傳夏伐鄭秋七月公至自伐鄭以飲至之禮也孔叢子問軍禮饗有功于祖廟舍爵策勲焉謂之飲至此天子親征之禮也陳書宣帝本紀大建八年夏四月甲寅詔曰元戎凱旋羣師振旅旌功策賞宜有享宴今月十七日可幸樂遊苑設絲竹之樂大㑹文武舊唐書太宗本紀貞觀十四年十二月丁酉交河道旋師吏部尚書陳國公侯君集執髙昌王麴智盛獻捷于觀徳殿行飲至之禮王圻續通考成祖永樂十二年二月詔親征衛拉特三月車駕發北京六月壬寅朔寇達勒巴瑪哈穆特太平巴圗博囉等率衆逆我師上麾柳升等發神機銃砲親率鐵騎擊之達哩大敗上還帳中皇太孫入見上曰此賊尚未還遲明追撲之必盡殱乃已皇太孫對曰陛下督戰勤勞天威所加虜衆破膽矣今既敗走假息無所寧敢返顧乎請不須窮追宜及時班師上然之庚戌班師戊午駐蹕三峰山之西南和寧王阿嚕台遣所部都督多爾濟藏布等來朝命中官王安齎勅往勞之己巳車駕次黒山峪勅皇太孫以班師告天地宗廟社稷遂頒詔天下八月辛丑朔車駕至北京上御奉天殿受賀大宴文武羣臣及從征将校命禮部㑹議将士功賞宣徳三年八月上召公侯伯五軍都督府諭曰北寇擾邊朕将親歴諸關警飭兵備丁未發京師九月命諸将搜山谷約畢至則班師戊午召文武大臣諭曰諸将至者今已六七孟冬廟享之期不逺應早旋師甲子詔班師車駕發鐵将軍店乙丑駐蹕偏嶺丙寅車駕入喜峰關内庚午駐蹕三河縣在京文武衙門各遣官進平胡表壬申駐蹕齊化門癸酉車駕至京師謁告太廟皇太后置酒上夀蕙田案以上二事俱有讌樂故采入飲至之末右飲至易師卦上六大君有命開國承家小人勿用何氏楷曰上處卦末乃師之終功之成論功行賞之時也有命即開國承家之命李氏九我曰開國承家者所以優功臣而廣封建見聖人待天下之公小人勿用者所以御才将而絶禍端見聖人慮天下之逺周禮夏官司勲戰功曰多注剋敵出竒若韓信陳平司馬法曰上多前虜疏知多是克敵出竒者以其言多是于衆之中比較多少之事故知是克敵出竒此彼為多者也云司馬法曰上功多虜者彼亦是戰以功多為上居于陳前虜獲俘囚也凡有功者銘書於王之太常祭于大烝司勲詔之注銘之言名也生則書于王旌以識其人與其功也死于烝先王祭之詔盖告其神以辭也詩大雅江漢釐爾圭瓚秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年傳釐賜也秬黒黍也鬯香草也築煮合而鬱之曰鬯卣器也九命錫圭瓚秬鬯文人文徳之人也諸侯有大功徳則賜之名山土田附庸以箋秬鬯黒黍酒也謂之鬯者芬香條鬯也王賜召虎鬯酒一罇使以祭其宗廟告其先祖諸有徳美見記者周岐周也自用也宣王欲尊顯召虎故如岐周使虎受山川土田之賜命用其祖召康公受封之禮岐周周之所起為其先祖之靈故就之拜稽首者受王命策書也臣受恩無可以報謝者稱言使君夀考而已通典漢髙祖有天下論功定封誓曰黄河如帶泰山如礪國以永存爰及苗裔於是定十八侯之位次以蕭何為第一光武中興定封功臣詔曰諸将業逺功大誠欲傳于無窮其顯效未酬名籍未立者大鴻臚趣上朕将差而録之於是封髙宻侯鄧禹等二十八人晉太元十年論淮淝之功封謝安廬郡公謝石南康公謝𤣥康樂公謝琰望蔡公桓伊永脩公自餘封拜有差唐髙祖武徳元年論太原建義功以秦王世民為首長孫順徳劉宏基等次之太宗即位定功臣封户自裴寂以下差功大小第之總四十三人文獻通考宋定天下賞功臣石守信等有差乾道中以中興十三處戰功列于銓法明集禮論功行賞儀注前期内使監陳御座香案于奉天殿如常儀尚寳司設寳案于殿上正中侍儀司設詔書案于寳案之前設誥命案于丹陛正中之北設皇太子諸王侍立位于殿上之東北設承制官承制位于殿上之東及宣制位于丹墀誥命案之北吏部尚書户部尚書禮部尚書位于殿上之東南設大都督府兵部尚書位于殿上之西南應受賞官拜位于丹墀之中異位重行序立位于丹墀之西南受賞位于誥命案之南受賞執事位于受賞官序立位之西每受賞官用捧誥命捧禮物者各一人知班二人位于受賞官拜位之北東西相向贊禮二人位于知班之北東西相向典儀二人位于丹墀上之南東西相向文武官侍立位于丹墀之北東西相向侍從班起居注給事中殿中侍御史尚寳卿侍儀司官位于殿上之東懸刀武官位于殿上之西殿前班指揮司三人位于丹陛之西東向光禄寺三人位于丹陛上之東西向拱衛司二人位于殿中門之左右典牧所官二人位于仗馬之前宿衛鎮撫二人位于丹陛下東西相向䕶衛千户二十八人位于宿衛鎮撫之南稍後東西相向䕶衛千户八人位于奉天殿東西門之左右将軍二人位于殿上簾前之東西将軍六人位于奉天殿門之左右将軍四人位于丹陛上之四隅将軍六人位于奉天門之左右俱東西相向鳴鞭四人位于丹陛之南北向是日擊皷初嚴金吾衛列旗幟器仗拱衛司設儀仗車輅典牧司陳仗馬虎豹内使監擎執樂工陳樂皆如正㑹之儀禮部陳設詔書吏部陳設誥命户部陳設禮物陳設執事各立于案之左右殿前班糾儀典儀知班贊禮宿衛鎮撫䕶衛将軍各入就位舎人催受賞官及侍立文武官各具朝服擊鼓次嚴侍從班文武官入迎車駕舎人引受賞官齊班于午門外之南東西相向引文武官齊班于午門之北東西相向擊鼓三嚴侍儀版奏中嚴御用監官奏請皇帝于謹身殿服衮冕皇太子諸王于奉天殿門東耳房具冕服舎人引文武官入就丹墀侍立位引受賞官入就丹墀序立位侍儀版奏外辦皇帝御輿以出仗動樂作侍衛導從如常儀陞御座捲簾鳴鞭樂止司辰報時雞唱訖引進引皇太子諸王自奉天門東門入樂作由東陛陞殿東門入至侍立位樂止舎人引受賞官入就拜位知班唱班齊贊禮唱鞠躬樂作拜興拜興拜興拜興平身樂止承制官前跪承制由殿中門出中陛降至宣制位吏部尚書户部尚書禮部尚書由西門出西陛降立于誥命禮物案之東承制官南向稱有制贊禮唱跪受賞官皆跪承制官宣制曰朕嘉某等為國建功宜加爵賞今授某以某職賜以其物其共承朕命受賜員數不拘多少載在其中宣畢贊禮唱俛伏興樂作拜興拜興平身樂止贊禮唱行賞舎人引受賞官第一人詣案前贊禮唱跪搢笏吏部官捧誥命禮部官捧禮物各授受賞官受賞官受誥命禮物以授左右左右跪受于受賞官之左興退復位贊禮唱出笏俯伏興復位舎人引受賞官復位引以次受賞官詣案前皆如常儀承制官吏部尚書户部尚書禮部尚書由西陛陞西門入跪上位之西云承制訖興各復位贊禮唱鞠躬樂作拜興拜興樂止贊禮唱搢笏鞠躬三舞蹈跪山呼萬嵗山呼萬嵗再山呼萬萬嵗樂工齊聲應之出笏俯伏興樂作拜興拜興拜興拜興平身樂止贊禮唱禮畢侍儀跪奏禮畢鳴鞭皇帝興樂作警蹕侍從導引至謹身殿樂止引進引皇太子諸王還宫舎人引受賞官及文武官以次出至午門外以誥命禮物置于龍亭用儀仗鼓樂各送還本第右論功行賞周禮夏官大司馬若師不功則厭而奉主車云鄭司農厭謂厭冠䘮服也軍敗則以喪禮故秦伯之敗于殽也春秋傳曰秦伯素服郊次郷師而哭𤣥謂厭伏冠也奉猶送也送主歸于廟與社緦疏厭伏冠者案下曲禮云厭冠不入公門彼差次當小功之冠以義言之五服之冠皆厭以其喪冠反吉冠于武上向内縫之䘮冠于武下向上縫之以伏冠在武故得厭伏之名案檀弓注厭冠䘮服其服亦未聞鄭氏諤曰奉主車以歸肆師助牽之故肆師云師不功則助牽主車王弔勞士庶子則相注師敗王親弔士庶子之死者勞其傷者則相王之禮庶子卿大夫之子從軍者或謂之庶士鄭氏諤曰士庶子宿衛王宫者也王親征則從王在軍而屬司馬有死者王親弔之司馬相其弔勞之禮以其在軍故也春官肆師凡師不功則助牽主車鄭氏鍔曰戰所以全宗社不功而失乎主車是失宗社肆師掌為位以祭宗社為職大司馬于師不功則厭而奉主車肆師為大司馬之助而已李嘉㑹曰牽主車亦所以安神靈也禮記檀弓軍有憂則素服哭于庫門之外赴車不載櫜韔陳氏澔曰櫜甲衣韔弓衣甲不入櫜弓不入韔示再用也右師不功詩小雅采薇序采薇遣戍役也采薇采薇薇亦作止曰歸曰歸嵗亦莫止靡室靡家玁狁之故不遑啟居玁狁之故采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渇我戍未定靡使歸聘采薇采薇薇亦剛止曰歸曰歸嵗亦陽止王事靡盬不遑啟處憂心孔疚我行不來彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘昔我往矣楊柳依依今我來思雨雪霏霏行道遲遲載渇載飢我心傷悲莫知我哀杕杜序杕杜勞還役也有杕之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其杞王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止范氏曰出車勞率故美其功杕杜勞衆故極其情先王以己之心為人之心故能曲盡其情民忘其死以忠于上也右遣戍五禮通考卷二百三十九
