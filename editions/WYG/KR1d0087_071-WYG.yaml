body:
  text: 五禮通考巻六十一刑部尚書秦蕙田撰吉禮六十一宗廟制度周禮春官司几筵凡大朝覲大饗射凡封國命諸侯王位設黼衣注斧謂之黼其繡白黒采以絳帛爲質依其制如屏風然疏屏風之名出于漢世鄭以今曉古故舉屏風而爲況也孔注顧命其置竞户牖間竞終也戸牖間狹故置之終滿户牖間也筵國賔于牖前儀禮覲禮天子設斧依于户牖之間左右几天子衮冕負斧依注依如今綈素屏風也有繡斧文所以示威也斧謂之黼天子衮冕南面而立以俟諸侯見疏爾雅戸牖之間謂之扆以屏風爲斧文置于依地孔安國顧命傳云扆屏風畫爲斧文置户牖間是也白與黒謂之黼士虞禮佐食無事則出户負依南面注戸牖之間謂之依疏此爾雅文謂戸西南面也書顧命狄設黼扆綴衣傳狄下士扆屏風畫爲斧文置户牖間復設屋帳象平生所爲西疏釋宫云牖户之間謂之扆李巡曰謂牖之東戸之爲扆郭璞曰窓東户西也禮云斧扆者以其所在處名之郭璞又云禮有斧扆形如屏風畫爲斧文置于扆地因名爲扆是先儒相傳黼扆者屏風畫爲斧文在于户牖之問考工記云畫繢之事白與黑謂之黼是用白黒畫屏風置之于扆地故名此物爲黼扆爾雅釋宫牖户之間謂之扆書顧命牖間南嚮敷重篾席䟽牖謂窓也間者窓東户西户牖之間也周理司几筵云凡大朝覲大饗射凡封國命諸侯王位設黼扆扆前南向設席彼所設者即此坐也户牖之間謂之扆彼言扆前此言牖間即一坐也又覲禮天子待諸侯設斧依於户牖之間彼在廟此在寢其牖間之坐則同儀禮士昏禮贊醴婦席于戸牖間注設户西牖東南面位疏以其賔客位于此是以禮子禮婦皆于此尊之故也鄉飲酒禮乃席賔注賔席牖間南面朱子釋宫戸牖之間謂之依郭氏曰窗東户西也覲禮斧扆亦以設之于此而得扆名士昏禮注曰戸西者尊處以尊者及賔客位于此故又曰客位陳氏禮書黼或作斧扆或作依則依欲其有所依黼明其有所斷也舊圖從廣八尺畫斧無柄設而不用之意朝于寢覲于廟射于郊學朝于明堂皆于戸牖之間設之其制則左右有張容焉荀卿曰居則設容負張扆容之爲物蓋若唱射之容爾雅曰容謂之防郭璞謂如曲屏風觀此則天子張容之制可知矣然禮言負黼扆則張容不畫黼矣詩曰既登乃依士虞禮佐食無事出戸負扆南面蓋諸侯至士皆有依焉或畫或否不可考也掌次王大旅上帝張氊案設皇邸鄭司農曰皇羽覆上邸後版也鄭康成謂後版屏風與染羽象鳯羽色而爲之孔潁達謂大方版于坐後此不在寢廟無扆不得云扆故别名皇邸然皇邸非扆類也其說誤矣蕙田案以上扆戸牖間人君之制則設黼依于此士大夫設賔席焉尊賔也燕禮司宫筵賔于戸西東上士昏禮主人筵于戸西西上右儿士冠禮賔受醴于戸東聘禮主人立于戸東祝立于牖西堂上八豆設于戸西注户室戸也夫人歸禮堂上籩豆六設于戸東朱子釋宫戸東曰房戸之間士冠禮注曰房西室戸東也寢廟以室爲主故室戸專得戸名凡言户者皆室户若房戸則兼言房以别之大夫士房戸之間于堂爲東西之中案詩正義曰鄉飲酒義云尊于房户之間賔主共之由無西房故以房與室戸之間爲中也又鄉飲酒禮席賔于戸牖間而義曰賔坐于西北則大夫士之戸牖間在西而房户間爲正中明矣人君之制經無明證案釋宫曰兩階間謂之鄉郭氏曰人君南鄉當階間則人君之室正中其西爲右房而户牖間設扆處正中矣又案詩斯干曰築室百堵西南其戸箋曰天子之寢左右房異于一房者之室戸也正義曰大夫惟有一東房故室户偏東與房相近天子諸侯既有右房則室當在其中其戸正中比一房之室户爲西當考蕙田案以上户東戸西牖西戸東正室外近東房之處戸西則中也故筵賔戸西兼户牖而言則曰戸牖間省文則但曰戸西也牖西則近西房矣朱子以房户間爲正中夫房與室户之中則有楹矣豈成規制鄭注所以不可從也公側襲受玉于中堂與東楹之間注中堂南北之中也入堂深尊賔事也東楹之間亦以君行一臣行二下疏凡廟之室堂皆五架棟南面皆有兩架棟北一架有壁開户棟南一架謂之楣則楣北有二架楣南有一架今于當楣北面拜訖乃更前北侵半架于南北之中乃受玉故云南北之中乃入堂深尊賔事故也云東楹之間亦以君行一臣行二者兩楹之間爲賔主處中今乃于東楹之間更侵東半間故云君行一臣行二也振幣進授當東楹北面受幣堂中西北面注堂中西中央之西受幣于楹間注敵也士昏禮授于楹間南面注授于楹間明爲合好敵疏楹間謂兩楹之間凡賔主者授于楹間非敵者不于楹間是以聘禮賔覿大夫云受幣于楹間南面鄭注云授幣于楹間敵也聘禮又云公側襲受玉于中堂與東楹之間鄭注云東楹之間亦以君行一臣行二至禮賔及賔私覿皆云當東楹是尊卑不敵故不于楹間也今使者不敵而云楹間故云明爲合好也鄉射禮司正由楹内適阼階上遂立于楹間以相拜注楹内楹北相謂贊主人鄉射禮記射自楹間注楹間中央東西之節也鄉飲酒禮介揖讓升授主人爵于兩楹之間注就尊南授之疏以上云尊于房戸間當兩楹之北故云就尊南授之也禮記檀弓夫子曰殷人殯于兩楹之間則與賔主夾之也儀禮鄉飲酒禮主人坐奠爵于西楹南介右主人坐取爵于西楹下燕禮司宫尊于東楹之西詩小雅斯干有覺其楹疏有覺然高大者其宫寢之楹柱也何氏楷曰楹謂之柱說文云楹之言盈盈然對立之貌朱子釋宫堂之上東西有楹楹柱也古之築室者以垣墉爲基而屋其上惟堂上有兩楹而已楹之設蓋于前楣之下案鄉射禮曰射自楹間注曰謂射于庠也又曰序則物當棟堂則物當楣物畫地爲物射時所立處也堂謂庠之堂也又曰豫則鈎楹内堂則由楹外當物北面揖豫即序也鈎楹繞楹也物當棟而升射者必鈎楹内乃北面就物則棟在楹之内矣物當楣而升射者由楹外北面就物又鄭氏以爲物在楹間則楹在楣之下也又案釋宫曰梁上楹謂之梲梲侏儒柱也梁楣也侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于楹外簠簋陳于楹内兩楹間言楹内外矣又言兩楹間知凡言兩楹間者不必與楹相當謂堂東西之中爾南北之中曰中堂聘禮受玉于中堂與東楹之間注曰中堂南北之中也入堂深尊賔事也賈氏曰後楣以南爲堂堂凡四架前楣與棟之間爲南北堂之中公當楣拜訖更前北侵半架受玉故曰入堂深也案東楹之間侵近東楹非堂東西之中而曰中堂則中堂爲南北之中明矣又案士喪禮注曰中以南謂之堂賈氏曰堂上行事非專一所若近戸即言戸東戸西近房則言房外房東近楹即言東楹西楹近序即言東序西序近階即言東階西階其堂半以南無所繼屬者即以堂言之祝淅米于堂是也蕙田案以上中堂兩楹間中堂即堂中蓋南北東西之中兩楹間則稍南矣儀禮士冠禮將冠者出房南面注南面立于房外之西疏知在房外之西不在東者以房外之東當阼階是知房外者皆在房外之西故昏禮女出于母左母在房外之西故得出時在母左也庶子冠于房外南面遂醮焉注房外謂尊東也不于阼階非代也不醮于客位成而不尊户䟽尊東者以成尊在房間故也士昏禮席于房外南面姑即席注房外房户外之西之疏知房外是房户外西者以其舅在阼阼當房户之東若姑在房户之東即當舅之北南面向之不便又見下記云父醴女而俟迎者母南面于戸外女出于母左以母在房户西故得女出于母左是以知此房外亦房户外之西也士昏禮記父醴女而俟迎者母南面于房外注女既次純衣父醴之于房中南面蓋母薦焉重昏禮也士冠禮尊于房户之間注房户間者房西室戸東也有司徹司宫以爵授婦贊者于房東注房戸外之東士昏禮尊于房户之東鄉飲酒禮尊兩壺于房户間疏凡設尊之法但醴尊見其質皆在房内故士冠禮禮子昏禮禮女醴皆在房隱處若然聘禮禮賔尊于東廂不在房者見尊欲與卑者爲禮相變之法設酒之尊皆于顯處見其文是以此及醮子與鄉射特牲少牢有司徹皆在房户之間是也鄉飲酒禮記鄉人士君子尊于房戸之間賔主共之也疏鄉大夫等惟有東房故設酒尊于東房之西室房之東在賔主之間示賔主之共有此酒也酒雖主人之設賔亦以阼主人故云賔主共之也呉氏紱曰孔賈所据以爲大夫士無西房惟東房而西室者執此鄉飲酒文耳固無他佐證也然所云坐賔于西北與夫賔主夾尊者中室而東西有房論賔主之大分賔未嘗不在西北未嘗不與主夾尊也且西房之外三賔之席在焉此寧不爲西北之賔也坐耶而執此以爲士大夫無西房愚未之敢信朱子釋宫房戸之西曰房外士昏禮記母南面于房外女出于母左士冠禮尊于房戸之間若庶子則冠于房外南面注曰謂尊東也是房戸之西得房外之名也房之户于房南壁亦當近東案士昏禮注曰北堂在房中半以北洗南北直室東隅東西直房戸與隅間隅間者蓋房東西之中兩隅間也房中之東其南爲夾洗直房戸而在房東西之中則房戸在房南壁之東偏可見矣呉氏紱曰庶子冠于房外外即房戸之間是也但設席則近房設尊則近户耳房戸則當房之中朱子經傳通解注云房戸當南壁東西之中是也釋宫云近東者非定論又案房户外之東曰房東有司徹司宫以爵授婦贊者于房東注云房戸外之東士昏禮尊于房戸之東士喪禮君視大斂祝負墉南面皆謂房外之東也則房户當東西之中而不偏東彌可見矣蕙田案以上房外房戸東房户間房戸居東房南壁之中房外即房户間室户之東而房戸之西也朱子謂房戸在房南壁之東偏呉氏謂當東西之中而不偏東呉氏說近是房戸東則直阼階矣儀禮士冠禮主人𤣥端爵韠立于阼階下直東序西面注堂東西牆謂之序牆疏直當也謂當堂上東序也主人升立于序端西面賔西序東面主人之贊者筵于東序少北西面注東序主人之位也鄉射禮記西序之席北上疏衆賔之席繼賔以東西上今謂衆賔有東面者則北上非常故記之也賔與大夫之弓倚于西序主人之弓矢在東序東士喪禮皆饌于西序下南上注東西牆謂之序中以南謂之堂疏云中以南謂之堂者謂于序中半以南乃得堂稱以其堂上行事非專一所若近戸即言户東戸西若近房即言房外之東房外之西若近楹即言東楹西楹若近序即言東序下西序下若近階即言東階西階若自半以南無所繼屬者即以堂言之即下文浙米于堂是也其實房外戸外皆是堂故論語云由也升堂矣未入于室也書顧命西序東嚮敷重底席東序西嚮敷重豐席傳東西廂謂之序序疏東西廂謂之釋宫文蕙田案釋宫本作牆孔傳作廂誤儀禮士冠禮孤子冠之日主人紒而迎賔拜揖讓立于序端疏主人升堂立東序端賔升立西序端鄉飲酒禮主人坐奠爵于篚興對賔復位當西序東面朱子釋宫堂之東西牆謂之序郭氏曰所以序别内外蕙田案以上東序西序序端公食大夫禮大夫立于東夾南西面北上注東夾南東西節也取節于夾明東于堂于疏序已西爲正堂序東有夾室今大夫立夾室之南是東于堂也小臣東堂下南面西上宰東夾北西面南上疏宰東夾北西面南上者謂在北堂之南與夾室相當故云夾北也蕙田案公食大夫禮大夫立于東夾南若如陳氏禮書以房之南爲夾室則東夾南即東堂下當與小臣同辭矣書顧命西夾南嚮傳西廂夾室之前廂疏下傳云西房西夾坐東東房東夾室然則房與夾室實同而異名天子之室有左右房房即室也以其夾中央之大室故謂之夾室此坐在西廂夾室之前故繫夾室言之蕙田案孔疏非是儀禮公食大夫禮賔升公退揖于廂覲禮記几俟于東廂注東廂東夾之前聘禮記醴尊于東廂爾雅釋宫室有東西廂曰廟無東西廂有室曰寢注夾室前堂但有大寢牆疏凡大室有東西廂夾室及前堂有序者曰廟但有大室者曰寢儀禮大射儀小射正授弓佛弓皆以俟于東堂小臣正退俟于東堂射器皆入君之弓矢適東堂賔之弓矢與中籌豐皆止于西堂下賔之矢則以授矢人于西堂下書顧命一人冕執劉立于東堂一人冕執鉞立于西堂傳立于東西廂之前堂于疏鄭𤣥云序内半以前曰堂謂序内簷下自室壁至堂簾中半以前總名爲堂此立于東堂西堂者當在東西廂近階而立以備升階之人也一人冕執銳立于側階傳側階北下立階上也疏東廂西廂必有階上堂知此立于東西堂之階上鄭王皆以側階爲東下階也然立于東垂者已在東下階上何由此人復共並立故傳以爲北下階上謂堂北階北階則惟堂北一階而已側猶特也禮記雜記夫人至入自闈門升自側階朱子釋宫夾室之前曰廂亦曰東堂西堂覲禮記注曰東廂東夾之前相翔待事之處特牲饋食禮注曰西堂西夾之前近南耳賈氏曰即兩廂也釋宫曰室有東西廂曰廟郭氏曰夾室前堂是東廂亦曰東堂西廂亦曰西堂也釋宫又曰無東西廂有室曰寢案書顧命疏寢有東夾西夾士喪禮死于適寢主人降襲絰于序東注曰序東東夾前則正寢亦有夾與廂矣釋宫所謂無東西廂者或者謂廟之寢也歟凡無夾室者則序以外通謂之東堂西堂案鄉射禮主人之弓矢在東序東大射儀君之弓矢適東堂大射之東堂即鄉射之東序東也此東西堂堂各有階案雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東面階東面階則東堂之階其西堂有西面階也東堂下西堂下曰堂東堂西大射儀賔之弓矢止于西堂下其將射也賔降取弓矢于堂西堂西即西堂下也特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁則自西壁以東皆謂之西堂下矣又案大射儀執冪者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以達北堂也顧氏棟髙曰特牲几席兩敦在西堂注云西夾以前近南疏云案爾雅注夾室前謂之廂此云在西堂在西廂耳又公食大夫賔升將飯公揖退于廂注云夾室前俟事之處則廂爲夾室之前堂之左右無疑也以其在東西序外故亦名東堂西堂耳萬充宗乃不取此别圖于堂下爲小屋東西相向不經之甚古人堂下别無屋案爾雅有東西廂曰廟無東西廂有室曰寢邢疏以廟之後寢言之非也寢即正寢耳廟之夾室與前隔斷别名其外曰東西廂亦曰東西堂寢則直連不别名廂通謂之東西夾室所以然者廟之夾室以藏祧主不容一直故須隔㫁隔㫁便有戸若寢則無嫌直開尚書西夾南向孔傳亦云西廂夾室之前明即寢内西堂之地與牖間東西序相望者故須陳設以爲觀羙若如廟中隔斷用户相通此係隱奥之處又何須陳設儀物乎此寢廟夾室一直與隔斷之明証也蕙田案東西夾皆南向其階在兩旁房之北有北階房有左右而北階則惟一崑山徐氏訂正寢廟之圖甚明然以側階列于南向則誤又不列北階亦未爲完備又案以上東夾南西夾南即東廂西廂東堂西堂又側階右堂制儀禮士昏禮賔升西階當阿東面致命注阿棟也入室深示親親今文阿爲庪當疏案鄉飲酒聘禮皆云賔當楣無云當阿者獨此云阿故云示親親也凡士之廟五架爲之棟北一楣下有室户中脊爲棟棟南一架爲前楣楣前接簷爲􅔑卿射記云序則物當棟堂則物當楣故云是制五架之屋也鄉大夫射于庠庠則有室故物當前楣士射于序序則無室故物當棟此士之廟雖有室其棟在室外故賔得深入當之也鄉射禮記序則物當棟堂則物當楣注是制五架之屋也正中曰棟次曰楣前曰􅔑有疏五架之屋庠序皆然但室無室爲異呉氏紱曰五架者舉其檩數言之也其地四架而已蓋南北分爲四段以爲行禮之節其實屋深架寛檁數必不止于此据多士傳士廣三雉以二雉爲内其廣九丈則深當七丈二尺分爲四架每架一丈八尺加峻四尺五寸一椽長二丈二尺五寸亦以二架爲一架矣序無室必不然之說也無室則亦無房豆籩無所置之而記所云出自東房者爲長語矣鄉飲酒禮主人阼階上當楣北面再拜賔西階上當楣北面答拜注楣前梁也梁疏楣前梁也者對後爲室户聘禮公當楣再拜禮記内則妻抱子出自房當楣立東面蕙田案以上棟楣庪凡云當楣皆謂前梁明堂位山節藻梲復廟重檐天子之廟飾也注山節刻樽盧爲山也藻梲畫侏儒爲藻文也復廟重屋也重檐重承壁材也疏復廟者上下重屋也重檐謂就外檐下壁復安板檐以辟風雨之洒壁故云重檐承壁材禮器管仲鏤簋朱紘山節藻梲君子以爲濫矣注栭謂之節梁上楹謂之梲宫室之飾士首本大夫達棱諸侯斵而礱之天子加宻石焉無畫山藻之禮也疏山節謂刻柱頭爲斗栱形如山也藻梲者謂畫梁上短柱爲藻文也此天子廟飾春秋莊公二十四年榖梁傳刻桓公桷禮天子之桷斵之礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也釋文方曰桷圓曰椽斵削也國語晉語天子之室斵其椽而礱之加宻石焉諸侯礱之大夫斵之士首之詩魯頌閟宫松桷有舄傳桷榱也舄大貌春秋桓公十四年左氏傳宋伐鄭以大宫之椽歸爲盧門之椽釋文椽榱也圓曰椽方曰桷說文云周謂之椽魯謂之桷何氏楷曰桷說文云榱也秦謂之榱周謂之椽魯謂之桷劉熙云桷确也其形細而疏确也或謂之椽椽傳也相傳次而布列也或謂之榱在檼房下列衰衰然垂也易漸卦六四或得其桷何氏楷曰桷者椽也淮南子云曲木不可以爲桷蕙田案以上節梲桷儀禮士喪禮爲銘竹杠長三尺置于宇西階下注宇梠也詩豳風八月在宇疏蟋蟀八月在堂宇之下何氏楷曰宇韓詩云屋霤也陸德明云屋四垂爲宇說文以爲屋邊也釋名云宇内也如鳥羽翼自覆蔽也儀禮士冠禮設洗直于東榮注榮屋翌也周制自卿大夫以下其室皆爲夏屋疏屋翌即今之摶風云榮者與屋爲榮飾言翌者與屋爲趐翌也云周制自卿大夫以下其室爲夏屋者言周制也夏殷卿大夫以下屋無文故此經是周法即以周制而言也案此經是士禮而云榮鄉飲酒卿大夫禮鄉射喪大記大夫士禮皆云榮又案匠人云夏后氏世室堂修二七廣四修一五室此謂宗廟路寢同制則路寢亦然雖不云兩下爲之彼下文云殷人重屋四阿鄭云四阿四注重屋屋謂路寢殷之路寢四阿則夏之路寢不四阿矣當兩下爲之是以檀弓孔子云見若覆夏屋者矣鄭注云夏屋今之門廡漢時門廡也兩下爲之故舉漢法以況夏屋兩下爲之或云兩下屋爲夏屋夏后氏之屋亦爲夏屋鄭云卿大夫以下其室爲夏屋兩下而周之天子諸侯皆四注故喪大記云升自屋東榮鄭以爲卿大夫士其天子諸侯當言東霤也周天子路寢制似明堂五室十二堂上圓下方明四注也諸侯亦然故燕禮云洗當東霤鄭云人君爲殿屋也鄉飲酒禮設洗于阼階東南南北以堂深東西當堂榮疏榮在屋棟兩頭與屋爲翌若鳥之有翌故斯于詩美宣王之詩云知鳥斯革如翬斯飛與屋爲榮故云榮也蕙田案鄉射同士喪禮復者升自前東榮降自後西榮禮記喪大記復者升自東榮降自西北榮注榮屋翌升東榮者謂卿大夫士也天子諸侯言東霤北疏天子諸侯四注爲屋而大夫以下不得四注但南一注而爲直頭頭即屋翌復者升東翌而上也賀瑒云以其體下于屋故謂上下在屋兩頭似翌故名屋翌也孟子榱題數尺注榱題屋霤也爾雅釋宫杗廇謂之梁其上楹謂之梲閞謂之槉栭謂之楶桷謂之榱桷直而遂謂之閱直不受檐謂之交檐謂之樀注梁屋大梁也梲侏儒柱也槉柱上欂也亦曰枅又曰楶即櫨也榱屋椽閱謂五架屋際椽正相當交謂五架屋際椽不直上檐交于檼上樀屋梠疏梁即屋大梁也一名杗廇楹柱也其梁上短柱名梲禮器云藻梲者謂畫梁上柱爲藻文也一名侏儒柱以其短小故也閞者柱上木名也又謂之槉又名欂亦名枅柱上方木是也又名是一物五名也栭一名楶即櫨也皆謂斗栱也禮器云管仲山節者謂刻柱頭爲斗栱形如山也桷屋椽也一名榱梠沈云齊魯名桷周人名榱易曰鴻漸于木或得其桷左傳子產曰棟折榱崩屋椽長直而遂達五架屋際者名閱郭云謂五架屋際椽正相當若其椽直不上于檐者名交言相交于檼上也郭云謂五架屋椽不直上檐交于檼上屋檐一名摘一名屋梠又名宇皆屋之四垂也故士喪禮曰爲銘置于宇西階上鄭注云宇梠是也陳氏禮書明堂位曰􅃨廟重檐爾雅曰檐謂之樀士喪禮爲銘置于宇西階下鄭氏曰宇梠也說文曰齊人謂之檐楚人謂之梠樀宇梠同實異名也夫轑末謂之宇疆境亦謂之土宇又謂之邊垂則宇與垂皆檐之窮也故轑末疆境取名焉自屋言之曰檐自堂言之曰垂檐亦作䦲儀禮鄉飲酒禮磬階間縮霤北面鼓之注縮从也霤以東西爲從疏縮從也上當堂之南霤南北節也凡東西爲横南北爲从南霤則以東西爲從謂之縮霤燕禮設洗篚于阼階東南當東霤注當東霤者人君爲殿屋也亦南北以堂深大疏言東霤明亦有西霤對士夫言者榮兩下屋故也禮記檀弓季孫之母死曾子子貢弔焉涉内霤春秋宣公二年左氏傳三進及澑疏澑謂簷下水澑之處入門伏而不省起而更進三進而及于君之屋澑言迫于君之前朱子釋宫人君之堂屋爲四注大夫士則南北兩下而已士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室爲夏屋燕禮設洗當東霤注曰人君爲殿屋也案考工記殷四阿重屋注曰四阿若今之四柱屋殷人始爲四柱屋則夏后氏之屋南北兩下而已周制天子諸侯得爲殿屋四柱卿大夫以下但爲夏屋兩下四柱則南北東西皆有霤兩下則惟南北有霤而東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者說文曰屋水流也徐鍇曰屋檐滴處榮者說文曰屋梠之兩頭起者爲榮又曰屋齊謂之檐楚謂之梠郭璞注上林賦曰南榮屋南檐也義與說文同然則檐之東西起者曰榮謂之榮者謂屋之榮飾謂之屋翼者言其軒張如翬斯飛耳士喪禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下爲之燕禮之門内霤則門屋之北霤也凡屋之檐亦謂之宇案士喪禮爲銘置于宇西階上注曰宇梠也說文曰宇屋邊也釋宫曰檐謂之樀郭氏曰屋梠邢昺曰屋檐一名樀一名梠又名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂廉與坫亦當宇矣特牲饋食禮主婦視饎㸑于西堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤鄉射禮記磬階間縮霤是也霤以東西爲從故曰縮霤此霤謂堂之南霤也呉氏紱曰屋榮之解兩下之屋檐在前後榮在兩旁榮從而檐横郭氏以南榮爲屋南檐非也蓋横亘乎棟上而爲南北之界者曰脊脊之東西兩端盡處有鴟吻各外鄉兩端之牆爲全屋之扞蔽者曰屋山以其自屋外之東西視之上銳下闊似山形也榮在屋山之上自鴟吻南北兩分迤邐而下或不盡檐數尺而止其崇與廣大約如屋脊而少殺但脊平而榮則高下如橋梁耳因爲榮飾亦爲升屋者防衞使不顛踣也蕙田案以上宇榮霤呉氏解榮與舊不同存參右堂室屋宇之制禮記明堂位疏屏天子之廟飾也注屏謂之樹今桴思也刻之爲雲氣蠱獸如今闕上爲之矣罘疏疏刻也謂刻于屏樹爲雲氣蟲獸也漢時謂屏爲思天子外屏人臣至屏俯伏思念其事則罘思小樓也城隅闕上皆有之然則屏上亦爲屋以覆屏牆故稱屏曰罘思爾雅釋宫屏謂之樹注小牆當門中陳氏禮書會有表朝有著祭有屏攝皆明其位也周禮太史祭之日執書以次位常左傳稱鄭火子産使子寛子上巡羣屏攝至于大宫楚語曰屏攝之位韋昭曰屏屏風也攝如要扇皆所以明尊卑爲祭祀之位近漢亦然鄭氏釋檀弓曰翣以布衣木如攝與釋喪大記曰漢禮翣以木爲筐廣三尺高二尺四寸方兩角高衣以白布柄長五尺是漢亦名翣無攝也爾雅曰門屏之間謂之宁詩曰俟我于著記言天子春朝當宁而立則著宁一也大夫以簾士以帷則無屏矣詩曰俟我于著而大夫士與焉者蓋簾帷之爲蔽限亦謂之屏朱子釋宫天子諸侯門外之制其見于經者天子有屏諸侯有朝案覲禮侯氏入門右告聽事出自屏南適門西注曰天子外屏釋宫曰屏謂之樹郭氏曰小牆當門中曲禮正義曰天子外屏屏在路門之外諸侯内屏屏在路門之内此侯氏出門而隱于屏則天子外屏明矣釋宫又曰門屏之間謂之宁謂宁在門之内屏之外此屏據諸侯内屏而言也右屏儀禮士冠禮爵弁皮弁緇布冠各一匴執以待于西坫南南面東上注坫在堂角坫疏坫有二文有一者謂若明堂位云崇亢圭及論語云兩君之好有反坫之等在廟中有之以亢反爵之屬此篇之内言坫者皆據堂上角爲名故云堂角朱子釋宫堂角有坫士冠禮注曰坫在堂角賈氏釋士喪禮曰堂隅有坫以土爲之或謂堂隅爲坫也士喪禮牀第夷衾饌于西坫南饌于東堂下疏凡設物于東西堂下者皆南與坫齊北陳之堂隅有坫以土爲之或謂堂隅爲坫也既夕記設棜于東堂下南順齊于坫大射禮乃管新宫三終卒管大師及少師上工皆東坫之東南西面北上坐小射正一人取公之決拾于東坫上以笥退奠于坫上小射正以笥受決拾退奠于坫上禮記内則士于坫一疏士卑不得作閣但于室中爲土坫以庋食陸氏佃曰士言于坫一則凡閣用坫可知郝氏敬曰閣高坫卑閣木爲之坫則土器相似異名耳明堂位反坫出尊崇坫康圭注反坫反爵之坫也出尊當尊面也惟兩君爲好既獻反爵于其上禮君尊于兩楹之間崇高也康讀爲亢龍之亢又爲高坫亢所受圭奠于上焉疏反坫者兩君相見反爵之坫也築土爲之在兩楹間近南人君飲酒既獻反爵于坫上故謂之反坫也出尊者尊在兩楹間坫在尊南故云出尊崇坫康圭者崇高也亢舉也爲高坫受賔之圭舉于其上也方氏慤曰坫奠圭與爵之器也反坫者爵坫也崇坫者圭坫也凡器仰之爲正覆之爲反反坫所以覆爵也故爵坫謂之反崇坫所以薦圭也故圭坫謂之崇反坫亦可以崇爵矣獨于坫曰崇者措圭之時無反覆之異故也出尊者爵坫在尊之外也凡物内爲入外爲出故在尊外則曰出康圭者圭以坫而康也凡物措之則康故以措圭曰康圭此皆天子之禮故管仲反坫君子以爲僭輔氏廣曰反坫出尊言其所在崇坫康圭言其所用互備也郝氏敬曰崇高也坫所以閣康安也圭禮器受賔之圭安措高閣之上防動揺也徐氏師曽曰坫築土爲之在兩楹之間兩君好會獻酬飲畢則反爵于其上坫在廟故亦于廟言之尊在坫之南逈露向外故謂之出崇高也康安也圭爵禮器之重者不可不謹故爲高坫以康之使無危墜之失舊讀爲亢者非論語邦君爲兩君之好有反坫管氏亦有反坫何解鄭曰反坫反爵之坫在两楹之間與隣國爲好㑹其獻酬之禮更酌酌畢則各反爵于坫上邢䟽反坫反爵之坫在两楹之間者以鄉飲酒是鄉大夫之禮于房户間燕禮是燕已之臣子故尊于東楹之西若兩君相敵則尊于兩楹間故其坫在兩楹間也熊氏云主君獻賔賔筵前受爵飲畢反虚爵于坫上于西階上拜主人于阼階上拜賔答拜是賔主飲畢反爵于坫上也而云酌畢各反爵于坫上者文不具耳其實當飲畢朱注好謂好會坫在兩楹之間獻酬飲畢則反爵于其上大全古註圖說坫以木爲之高八寸足高二寸漆赤中蔡氏清曰坫受爵之器也依注以木爲之高約一尺只在地不如今人承以案蓋古者地坐未有椅桌坫字從土恐是瓦器坫在兩楹之間如今人把盞置槖盞于㕔前中央也郝氏敬曰坫在堂下東西南隅築土爲之如士冠禮爵弁皮弁緇布冠各一匴執以待于西坫南是堂下西南隅也又既夕記云設棜于東堂下南順齊于坫是堂下東南隅也坫有在堂上者以木爲之如大射禮小射正取公之決拾于東坫上卒射小射正以笥受決拾退奠于坫上是也明堂位云反坫出尊崇坫康圭天子之廟飾也古者兩君相見必于廟尊于兩楹間反爵之坫在尊南故曰出尊又其南設高坫安置君圭于上曰崇坫又房中庋食之閣亦謂坫皆木也坫奠也所以奠爵或云高八寸足高二寸蓋豐類古人飲饌席地故設坫以奠爵鄉飲酒燕禮獻酬畢皆反爵于堂下篚内惟兩君相獻酬則反爵于堂上之坫今俗酒盞盤亦謂坫制異而義同爾雅垝謂之坫俗呼小方几爲杌音與垝近坫閣物之具猶今几案之類逸周書作雒乃立太廟路寢明堂咸有四阿反坫陳氏禮書坫者以土爲之其别有四記曰反坫出尊語曰邦君爲兩君之好有反坫此反爵之坫也記曰崇坫康圭此奠玉之坫也記又曰士于坫一此庋食之坫也士冠禮爵弁皮弁緇布冠各一匴執以待于西坫南大射將射工遷于下東坫之東南士喪禮牀第夷衾饌于西坫南既夕禮設棜于東堂下南順齊于坫此堂隅之坫也蓋兩君相見于廟尊于兩楹之間而反爵之坫出于尊南故曰出尊鄉飲酒是卿大夫禮尊于房戸之間燕禮燕其臣尊于東楹之西皆無坫特兩君相見尊于兩楹間有坫管仲有反坫故孔子譏之又于其南爲之崇坫以安玉焉故曰康圭􅍥食之坫在房堂隅之坫在北陳爾雅曰垝謂之坫郭璞曰坫㙐也北堂之隅之坫也鄉飲鄉射燕禮皆奠爵于篚則反爵于坫特兩君相好之禮也聘禮公受玉于中堂與東楹之間賔出公側授宰玉而不康之于坫蓋亦兩君相見之禮也鄭康成改康爲亢非也蕙田案儀禮鄉飲酒是卿大夫禮尊于房戸間獻酬畢後反爵于篚内無坫燕禮是燕其臣尊于東楹之西獻酬畢後亦反爵于篚内無坫唯兩君相見尊于兩楹間有坫陳氏謂坫以土爲聶氏謂坫以木爲豈堂角之坫以土爲之兩楹之坫以木爲之存疑俟考爾雅垝謂之坫注在堂隅坫㙐經疏坫者堂角也一名垝坫名見于傳者有三案禮記明堂位云反坫出尊崇坫康圭及論語邦君爲兩君之好有反坫此二者在兩楹之間以土爲之非此經所謂也案既夕記云設棜于東堂下南順齊于坫士冠禮云爵弁皮弁緇布冠各一匴以待于西坫南則此經所謂也鄭注云坫在堂角然則堂之東南角爲東坫西南角爲西坫故郭云在堂隅坫㙐也㙐則端也言坫是堂角端也聶氏崇義曰坫以承爵亦以承尊若施之於燕射之禮則曰􅞱音豐皆用豐年之豐從豆爲形以􅞱爲聲也何者以其時和年豐榖豆多有粢盛豐備神歆其祀人受其福也故後鄭注云豐似豆而卑都斵一木爲之口圓㣲侈徑尺二寸其周高厚俱八寸中央直者與周通高八寸横徑八寸足高二寸徑尺四寸漆赤中畫赤雲氣亦隨爵爲飾今祭器内無此豐坫或致爵于俎上右坫周禮夏官隷僕掌五寢之埽除糞洒之事注五寢五廟之寢也詩云寢廟繹繹前曰廟後曰寢也疏引詩寢廟繹繹者欲見前廟後寢故云相連之貌案爾雅釋宫云有東西廂曰廟無曰寢寢廟大況是同有廂無廟爲異耳必須寢者祭在廟薦在寢故立之也案昭公十八年鄭災簡兵大蒐子大叔之廟在道南其寢在道北者彼廟不在宫中地隘故廟寢别處也祭祀修寢注于廟祭寢或有事焉月令凡新物先薦寢廟疏祭祀則在廟可知復云修寢者寢或有事不可不修治之也引月令薦寢廟者欲見寢有事彼薦只在寢不在廟連廟言者欲見是廟之寢非生人之寢故也大喪復于小寢大寢注小寢高祖以下廟之寢也始祖曰大寢疏隷僕職位卑小故使之復于小寢也以其高祖以上廟稱小始祖廟稱大故寢亦隨廟爲稱也詩魯頌閟宮路寢孔碩新廟奕奕朱傳路寢正寢也黄氏佐曰路寢在廟之後所以藏衣冠輔氏廣曰廟後之正寢又甚宏大則僖公所修之廟大矣商頌殷武寢廟孔安朱傳寢廟中之寢也何氏楷曰朱子云此蓋特爲百世不遷之廟不在三昭三穆之數寢成孔安者高宗功德盛大今特爲别設寢廟與太宗太甲中宗太戊號爲三宗既成則人心甚安也萬尚烈云高宗之寢廟其成與不成闗係非小倘不成則一切俱不相安今寢成如是乃甚相安也見得此寢廟之作乃報功追逺之典萬萬非所得已者也小雅楚茨樂具入奏以綏後禄疏以上章云備言燕私故此即陳燕私之事以祭時在廟燕嘗在寢故言祭時之樂皆復來入于寢而奏之朱傳凡廟之制前廟以奉神後寢以藏衣冠祭于廟而燕于寢故于此將燕而祭時之樂皆入奏于寢也禮記月令仲春之月乃修闔扇寢廟畢備疏廟是接神之處其處尊故在前寢衣冠所藏之處對廟爲卑故在後但廟制有東西廂有序牆寢制惟室而已孟夏之月天子乃以彘嘗麥先薦寢廟春秋昭公八年左氏傳子太叔之廟在道南其寢在道北爾雅釋宫室有東西廂曰廟無東西廂曰寢陳氏禮書詩曰寢廟奕奕鄭氏釋周禮謂寢廟繹繹相連貌也蓋古詩之文或作繹繹又春秋之時子太叔之廟在道南其寢在道北此古者前廟後寢之遺象也漢自明帝詔遵儉約無起陵寢藏主于世祖廟更衣自此魏立二廟文帝之高祖處士曾祖髙皇祖太皇帝共一廟考太祖皇帝特一廟晉宋齊隋及唐皆一廟異室非古制也朱子釋宮寢之後有下室士喪禮記士處適寢又曰朔月若薦新則不饋于下室注曰下室如今之内堂正寢聽事賈氏曰下室燕寢也然則士之下室于天子諸侯則爲小寢也春秋傳曰子太叔之廟在道南其寢在廟北其寢廟之寢也廟寢在廟之北則下室在適寢之後可知矣又案喪服傳曰有東宫有西宫有南宫有北宫異宫而同財内則曰由命士以上父子皆異宫賈氏釋士昏禮曰異宫者别有寢若不命之士父子雖大院同居其中間亦隔别各有門戸則下室之外又有異宫也禮經雖亡缺然于覲見天子之禮于燕射聘食見諸侯之禮餘則見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳案書顧命成王崩于路寢其陳位也有設斧扆牖間南鄉則戸牖間也西序東嚮東序西嚮則東西序也西夾南鄉則夾室也東房西房則左右房也賔階面阼階面則兩階前也左塾之前右塾之前則門内之塾也畢門之内則路寢門也兩階戺則堂亷也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又曰諸侯出廟門俟則與士喪禮殯宫曰廟合也然則鄭氏謂天子廟及路寢如明堂制者蓋未必然明堂位與考工記所記明堂之制度者非出于舊典亦未敢必信也又案書多士傳曰天子之堂廣九雉三分其廣以二爲内五分内以一爲高東房西房北堂各三雉公侯七雉三分廣以二爲内五分内以一爲高東房西房北堂各一雉伯子男五雉三分廣以二爲内五分内以一爲高東房西房北堂各一雉士三雉三分廣以二爲内五分内以一爲高有室無房堂注曰廣榮間相去也雉長三丈内堂東西序之内也高穹高也此傳説房堂及室與經亦不合然必有所據姑存之以備參考右寢蔡氏德晉曰宫室之制四周有牆前爲門屋中于門屋爲門門之閤者爲扉兩扉之中有闈亦謂之橛蓋門中所䜿短木在地者也門限謂之閾亦謂之柣門兩旁木謂之棖亦謂之楔棖闈之間曰中門夾門之堂謂之塾門之東西皆有塾一門而塾四外二塾南向内二塾北向門宇下水處謂之霤自門内霤至寢之堂下謂之庭庭三堂之深三分庭一在北設碑碑如堂深庭必有碑所以識日影知隂陽也廟則繫牲焉自門内霤至堂階之途謂之陳在廟則謂之唐升堂兩階東曰阼階西曰賔階兩階各在楹之外而近序序之外東堂下西堂下曰堂東堂西東堂下壁門有闔門婦人出入由之寢之制其址曰堂基四畔有棱曰堂亷自南至北凡五架自東至西凡五間中脊一架曰棟亦曰阿次棟一架曰楣次楣一架曰庪自前􅔑至後楣四架虚之爲堂自後楣至後􅔑一架實之爲室與房以堂五間分言其名則中間東西之中曰兩楹間以前楣下東西有楹也其南北之中曰中堂近前曰兩階間亦謂之鄉近北曰戸牖之間亦謂之扆左右兩間東間之前近楹處爲東楹之東少東爲阼階上又東爲東序西間之前近楹處爲西楹之西少西爲賔階上又西爲西序蓋堂之東西牆謂之序也序之前爲序端又左右兩間在序之外曰東夾西夾亦曰東堂西堂又曰東廂西廂堂角有坫以土爲之東西堂兩房各有階東曰東下階西曰西下階總名側階以室五間分言其名則中間爲室室之中西南隅謂之奥西北隅謂之屋漏東北隅謂之宧東南隅謂之窔戸牖在室之南戸東而牖西其北有壁曰北墉左右兩間爲房房戸在南之正中房中半以北曰北堂無北壁其北堂下有北階又左右兩間爲夾室亦名翌室正寢之後謂燕寢燕寢之後爲中門亦曰内門其後爲内宫自天子至于大夫士一也其尊卑之異等者天子諸侯臺門兩觀天子五門諸侯三門大夫士二門天子外屏諸侯内屏大夫以簾士以帷天子之堂九尺階九等諸侯七尺階七等大夫五尺階五等士三尺階三等天子諸侯殿屋四注大夫士夏屋兩下天子山節藻梲復廟重檐天子諸侯之楹黝堊大夫蒼士黈天子之桷斵之礱之加宻石焉諸侯斵之礱之大夫斵之士斵本天子諸侯寢在中左祖而右社大夫左廟而右寢天子六寢后六宫諸侯三寢夫人三宫大夫士二寢妻二宫此則等威之不容紊者也蕙田案古者宗廟宫室之制天子諸侯建于中門之左大夫士左廟而右寢四周有垣朱子所謂都宫是也都宫之内天子七廟諸侯五大夫三士二皆南向昭在左穆在右毎一廟則爲三屋天子諸侯殿屋大夫士夏屋殿屋霤四注夏屋前後兩下也第一屋爲廟門士冠禮筮于廟門周禮閽人蹕宫門廟門是也屋五間中一屋爲門考工記廟門容大扄七个鄭注大扃牛鼎之扃長三尺七个二丈一尺也門東西之堂謂之塾内外四外二南向内二北向士冠禮具饌于西塾擯者𤣥端負東塾顧命先輅在左塾之前次輅在右塾之前是也門内宇下謂之霤燕禮賔所執脯以賜鐘人于門内霤是也自門内霤至堂階之宇下謂之庭特牲禮佐侍北面立于中庭注庭三堂之深庭中自門至堂之途謂之陳在廟謂之唐詩胡逝我陳中唐有甓是也三分庭一之北設碑在廟所以繫牲祭義君牽牲入廟門麗于碑是也士冠禮至于廟門揖入三揖至于階三讓鄭注入門將右曲揖將北面揖當碑揖疏入門賔主將欲相背故須揖賔主各至堂途北面相見故亦須揖至碑碑在堂下三分庭之一在北是庭中之節故亦須揖也升堂兩階東曰阼階西曰賔階少牢禮祝盥于洗升自西階主人盥升自阼階是也第二屋爲廟之堂室廟之制自南至北凡五架自東至西凡五間中脊一棟曰阿士昏禮賔升西階當阿是也次棟一架曰楣次楣一架曰􅔑鄉射禮記序則物當棟堂則物當楣鄭注五架之屋正中曰棟次曰楣前曰􅔑是也自前􅔑至後楣四架虚之爲堂自後楣至後􅔑一架以牆間之爲室與房郊特牲詔祝于室坐尸于堂禮器室事交乎户堂事交乎階是也天子之堂九尺階九等諸侯七尺階七等大夫五尺階五等士三尺階三等也其房屋之制堂之北中一間爲正室少牢禮主人室中獻祝考工記室中度以儿是也北有壁曰北墉户牖在室之南户東而牖西士虞禮啟户主人入祝從啟牖記贊闔戸牖注牖先闔後啟是也室之東南隅謂之窔東北隅謂之宧西北隅謂之屋漏西南隅謂之奥既夕記埽室聚之窔曾子問祭于宗子之家當室之白詩尚不愧于屋漏士昏禮婦奠菜席于廟奥曲禮居不主奥孔疏室向南户近東南則西南隅隱奥無事故尊者居必主奥是也祭有陽厭有陰厭陰者室之奥正當牖下不受牖明詩于以奠之宗室牖下蓋屋之隱奥處也以其幽暗故曰陰厭陽者室之屋漏正與牖對受牖之明屋之漏光處也故曰室之白白光明也以其光明故曰陽厭也正室左一間曰東房右一間曰西房特牲禮豆籩鉶在東房大射儀宰胥薦脯醢由左房左房即東房聘禮賔受圭退負右房而立右房即西房也書顧命允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房是也陳氏祥道曰諸侯路寢與士大夫之室皆有東西房士喪禮男子髻髪于房婦人髽于室在男子之西則諸侯之禮婦人髽于房爲東西房矣凡禮言房戸者皆指東房言之或言左以有右也或言東以有西也乃鄭康成謂大夫士無西房甚謬萬氏斯大曰鄉飲酒鄭注賔席牖前南嚮衆賔席于賔席之西士大夫若無右房席西餘地無幾何能容衆賔之席且吉凶之禮多行于戸牖之間以其爲堂之正中也若無西房則戸牖之前乃堂之西偏豈有行冠昏享祀諸大禮于宗廟不在正中而在旁側者哉況堂上則有東西楹堂下則有東西階門側則有東西塾䂓制方正配合整齊若西房而可無天下有此偏缺欹零之宫室乎哉蓋西房之不多見于經者禮東爲主位西爲賔位故主人主婦薦自左房而賔受享自西階升受負西房而立主禮之及于房中者多而賔禮之及于房中者少故略而不及也烏得謂之無哉東房之左一間曰東夾室西房之右一間曰西夾室先儒所謂毁廟之主藏于太廟之夾室者也亦名翼室顧命延入翼室是也聘禮西夾六豆設于西墉下饌于東方亦如之注東方東夾室公食大夫禮大夫立于東夾南尚書顧命西夾南向内則天子之閣左達五右達五孔疏宫室之制中央爲正室正室左右爲房房外有序序外有夾室陸氏佃曰堂上爲達左達左夾室前堂右達右夾室前堂是也乃孔仲達顧命疏謂房與夾室實同而異名房即室也鄭康成又謂房當夾室之北萬氏斯同駁之曰尚書顧命明分西夾與西房爲二孔氏何得合而一之房之南即堂之東西空處鄭何得云夾在房南也夾室在序之兩傍當以賈氏公彥之疏爲定其士喪禮襲絰于序東之疏云序牆之東當東夾之前公食大夫禮大夫立于東夾南之疏云序以西爲正堂序東有夾室又公揖退于廂之疏云室有東西廂曰廟其夾皆在序外是夾室與房一在序外一在序内未可混也陳祥道謂房之南有東西夾室不知房與夾室並在堂北夾室之前亦謂堂内則謂之左達右達者也至郝氏敬謂夾室有東西今之廂房在庭之兩傍東西相向不知顧命明言西夾南向即非東西相向可知矣禮祖宗之祧主皆藏于夾室以其在序之兩旁故可藏于此若在庭之左右則是主祭之子孫居上而坐祖宗于堂下矣有是理乎内則又謂大夫七十而有閣注閣以板爲之庋食物公侯伯于房中五大夫于閣三疏大夫卑無嫌故于夾室而閣三是大夫兼有夾室不特有左右房而已此廟内房室之制也古者大朝覲大饗射凡封國命諸侯皆行禮于廟之堂其堂五間之名正室前戸牖之間謂之扆覲禮天子設斧依于戸牖之間左右几天子衮冕負斧依是也户之東曰戸東户之西曰戸西燕禮司宫筵賔于戸西東上冠禮賔受醴于户東聘禮主人立于户東祝立牖西是也前楣下東西有楹正室前東西之正中曰兩楹間南北之中曰中堂鄉射禮介揖讓升授主人爵于兩楹之間聘禮公側襲受玉于中堂與東楹之間受幣于楹間是也東房之前近楹處爲東楹西房之前近楹處爲西楹聘禮振幣進授堂東楹北面鄉飲酒禮主人坐奠爵于西楹南主人坐取爵于西楹是也東楹之東爲阼階上少牢禮主人盥升自阼階西楹之西曰西階上士冠禮凡拜北面于阼階上賔亦北面于西階上答拜是也東房之前有堂東牆曰東序西房之前有堂西牆曰西序序之前皆曰序端士冠禮主人𤣥端爵韠立于阼階下直東序西面主人升立序端西面賔西序東面鄉射禮西序之席北上書顧命西序東嚮東序西嚮是也東西序之外兩夾室之前堂曰東夾西夾亦曰東廂西廂又曰東堂西堂公食大夫禮大夫立于東夾南宰東夾北顧命西夾南嚮聘禮醴尊于東廂爾雅室有東西廂曰廟大射儀君之弓矢適東堂賔之矢則以授矢人于西堂下書顧命立于東堂立于西堂是也東房西房之戸在南之正中房中半以北曰北堂無北壁北堂有北階特牲禮宗婦北堂東面北上大射儀工人士與梓人升自北階卒畫自北階下陳氏祥道曰房皆南戸而無北墉室有北墉而無北堂則房戸之外由半以南謂之堂其内由半以北亦謂之堂昏禮尊于房户之東則房有南户矣禮大射羞膳者升自北階立于房中而不言入戸是房無北墉矣昏禮尊于室中北墉下是室無北堂矣故昏禮洗在北堂直室東隅則北堂在房之北可知其言是已東西堂各有側階顧命立于側階雜記主人升自側階是也堂之邊曰堂廉亦曰戺又曰垂鄉飲酒設席于堂亷顧命夾兩階戺立于東垂立于西垂是也堂又有坫陳氏祥道曰坫之别有四明堂位反坫出尊周書作雒大廟路寢咸有四阿反坫論語邦君爲兩君之好有反坫此反爵之坫崇坫康圭此奠玉之坫内則士于坫一此庋食之坫士冠禮爵弁皮弁緇布冠各一匴執以待于西坫南大射將射工遷于下東坫之東南士喪禮牀第夷衾饌于西坫南既夕禮設棜于東堂下南順齊于坫此堂隅之坫聶氏三禮圖謂坫以致爵于燕射則曰豐豐似豆而卑斵木爲之高八寸今案陳氏謂坫以土爲之聶氏謂以木爲之豈堂角之坫以土兩楹之坫以木或土即陶器歟堂之西通于寢者曰闈門考工記闈門容小扃三个注謂在東壁誤也第三屋堂之後爲寢周禮隷僕掌五寢之埽除糞洒之事注五廟之寢蓋以藏先世之衣冠祭則設之以授尸月朔則薦新中庸所謂設其裳衣薦其時食事死如事生事亡如事存者也祭祀畢又燕飲于寢小雅樂具入奏孔疏祭當在廟燕當在寢故祭時之樂皆復來入于寢奏之也廟寢宫室之大略蓋如此宗元案廟寢宫室之制古今不同其見于顧命明堂位爾雅者彼此參互今人殊多未辨朱子釋宫文頗爲明畫然亦有未盡詳晰處此編薈萃經傳之文并諸儒箋疏之說通貫曉了皎若列眉矣考禮者必先考核于此然後揖讓登降之節陳列薦獻之儀乃可目覩手揣以徧通三禮之曲折也五禮通考巻六十一
