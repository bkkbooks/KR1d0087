body:
  text: 五禮通考卷四十二刑部尚書秦蕙田撰吉禮四十二社稷禮記祭法大夫以下成羣立社曰置社注大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰惟為社事單出里疏大夫以下成羣立社曰置社者大夫以下謂包士庶成羣聚而居其羣衆滿百家以上得立社為衆特置故曰置社大夫至庶人等共在一處也大夫北面之臣不得自專土地故不得特立社社以為民故與民居百家以上則可以立社知百家者詩頌云百室盈止殺時犉牡故曰百家言以上者不限多少故鄭駁異義引州長職曰以嵗時祭祀州社是二千五百家為社也雖云百家以上惟治民大夫乃得立社故鄭駁異義云有國及治民之大夫乃有社稷是也此大夫所主立社稷則田主是也故鄭駁異義引大司徒職云樹之田主各以其野之所宜木遂以名其社與其野注云田主田神后土田正之所依也后土則社神田正則稷神其義已具郊特牲疏馬氏晞孟曰社者土神而有生物之功故王諸侯大夫立社皆所以教民美報而有反本復始之意也王謂之王社諸侯有君之道謂之國社謂之侯社至于大夫以下皆北面之臣則謂之置社張子曰社土神也大夫以下成羣立社曰置社若謂大夫長于㕓里之間與百姓居者立社則大夫與百姓同事于社稷似非其類也恐是士大夫以下各以其輩類立社天子諸侯皆有自為立社士大夫不敢自各為社則恐結輩類以為社共事之然士大夫方社之日當從其君以禮社則所事于置社者或以子弟家老行事也今貴而至天子賤而至農夫皆知禮社獨士大夫之家不預社事是不知身之所從來殊無戴天履地之報古者丘乘共粢盛恐十里之中立一社也白虎通大夫有民其有社稷者亦為報功也禮祭法曰大夫成羣立社曰置在月令曰擇元日命民社論語曰季路使子羔為費宰曰有民人焉有社稷焉蔡邕獨斷大夫以下成羣立社曰置社大夫不得特立社與民族居百姓以上則共一社今之里社是也陳氏禮書大夫以下其社之大者則二千五百家為之周禮所謂州社是也其小則二十五家亦為之左傳所謂書社千社是也左傳昭二十五年齊侯致千社于魯哀十五年齊人與衛地自濟以西禚媚杏以南書社五百杜氏注二十五家為一社鄭氏謂百家以上共立一社若今時里社此以漢制明古也周禮六鄉之内族祭酺黨祭禜雖百家以上亦不祭社特州然後祭之者黨族非不祭也姑以别社禜酺之等差耳禮曰唯為社事單出里唯為社田國人竭作唯社丘乘供粢盛則牢醴亦在所共皇氏曰大夫以下無藉田祭社則丘乘之民共之其説是也左傳有清丘之社月令仲春命民社先儒以為自秦以下民始得立社然禮言大夫以下則民社不始于秦周禮地官州長若以嵗時祭祀州社則屬其民而讀法疏此云嵗時謂嵗之二時春秋耳春祭社以祈膏雨望五榖豐熟秋祭社者以百穀豐稔所以報功故云祭祀州社也凡讀法皆因節會以聚民今既祭因聚民而讀法凡州之大祭祀涖其事注大祭祀謂州社稷也涖臨也疏言大祭祀謂州社稷者以上文云嵗時祭祀州社此經又因言州之大祭祀故知還是上文州社也知有稷者以其天子諸侯三社皆稷對之黨祭禜族祭酺故此特言州社也閭胥凡春秋之祭祀聚衆庶注祭祀謂州社黨禜族酺也疏知祭祀謂州社黨禜族酺者以其鄉黨之内所以祭祀無過此三者而已鄭司農曰二千五百家為州二十五家為閭丘氏濬曰此一州之祭也後世命郡縣祭社本此右州社周禮天官内宰凡建國佐后立市祭之以隂禮注市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相成之義鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立社也隂禮婦人之祭禮疏王者建國非定一所隨世而遷謂若自契至湯八遷太王遷岐文王遷豐武王遷鎬成王營洛皆是建國故云凡以該之云建國者必面朝後市乃冬官匠人文云王立朝者即三朝皆王立之也而后立市者即此文是也祭之以隂禮者市乃先后所立故以隂禮為市之社亦先后所立社也右市社禮記郊特牲唯為社事單出里注單出里皆徃祭社于都鄙二十五家為里疏社事祭社是也單盡也里居也社既為國之本故若祭社則合里之家並出故云單出里也此唯每家出一人不人人出也春秋昭二十五年左傳請致千社孔疏禮有里社故特牲稱惟為社事單出里以二十五家為里故知二十五家為社也右里社周禮春官小宗伯若大師則帥有司而立軍社注出軍必先有事于社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼔祝奉以從曾子問曰天子巡守以遷廟主行載于齊車言必有尊也書曰用命賞于祖不用命戮于社疏鄭知有司是大祝者見大祝職云大師設軍社故也鄭知王出軍必先有事于社及遷廟而以其主行者見泰誓及王制將出軍皆云類于上帝宜于社又曾子問云以遷廟主行載于齊車故知也云社主曰軍社者以其載社在于軍中故以軍社言之大祝大師設軍社注鄭司農説設軍社以春秋傳曰所謂君以師行祓社釁鼓祝奉以從者也春疏設軍社者此則據社在軍中故云設軍社司農引秋傳者定四年左氏傳案彼祝鮀云君以軍行者師則軍也故尚書云大巡六師詩云六師及之皆以師名軍引之者證社在軍謂之軍社之事鄭氏鍔曰古者大帥則先有事于社與廟然後載社主與遷廟之主以行不用命戮于社故載社主將以行戮用命賞于祖故載廟之主將以行賞小宗伯掌社稷宗廟之禮宜載以行乃言立者蓋社本不在軍因用師始立之立者出于一時之故廟主為尊載之以行不敢忽也故言奉奉以言其肅欽之至帥有司者蓋帥太祝也郝氏敬曰軍社以齊車載社主與遷廟主于軍中賞功告祖戮罪告社夏官量人營軍社之所里注軍社社主在軍者里居也疏在軍不用命戮于社故將社之石主而行所居有步數故職在量人秋官大司冦大軍旅涖戮于社右軍社春秋定公六年左氏傳陽虎又盟公及三桓于周社莊公二十有三年夏公如齊觀社注齊國祭社蒐軍實故公徃觀之國語魯語嚴公如齊觀社曹劌諫曰夫齊棄太公之法而觀民于社君為是舉而徃觀之非故業也何以訓民土發而社助時也今齊社而徃觀旅非先王之訓也天子祀上帝諸侯會之受命焉諸侯祀先王先公卿大夫佐之受命焉臣不聞諸侯之相會祀也祀又不法韋注舉動也土發春分也周語曰土乃脈發社者助時祈福為農始也旅衆也上帝上天也受命助祭受政命也事職事也不法謂觀民春秋閔公二年左氏傳間于兩社為公室輔注兩社周社亳社兩社間朝廷執政所在中疏為羣姓立社在庫門内之西自為立者在藉田之其亡國之社穀梁傳云以為廟屏戒或在廟或在庫門内之東則亳社在東也故左傳云間于兩社為公室輔魯之外朝在庫門之内東有亳社西有國社朝廷執政之處故云間于兩社哀十五年左氏傳與衛地自濟以西禚媚杏以南書社五百注二十五家為一社籍書而致之昭二十五年左氏傳齊侯曰自莒疆以西請致千社注二十五家為社千社二萬五千家欲以給公右社名周禮地官大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野注田主田神后土田正之所依也詩人謂之田祖所宜木謂若松柏栗也若以松為社者則名松社之野以别方面薛氏季宣曰言社則稷在其中曰各云者為邦國都鄙設耳王氏安石曰各以其野所宜木則新甿欲有所植不謀而知其土壤所宜公上欲有所斂不視而知其木所出鄭氏鍔曰國之所以有立者有社稷也農之所以祈報者有先農也故壇壝不可以不設田主不可以不樹訂義王氏曰立之田主使鬼神有所依附民心有所歸向此先王係人心處春官小宗伯若大師則帥有司而立軍社奉主車丘氏濬曰社之主樹以木出師則不可載以行意者當時壇壝之上則樹以木而又以石為主如喪之車然遇有征行則奉之以車而行乎後世遂因之不用木而用石也不然則是臨行旋為之故曰有司立軍社謂之立者前故未有也春秋襄二十五年左氏傳鄭子産伐陳入之陳侯免擁社以待于朝注免喪服擁社抱社主示服論語哀公問社于宰我宰我對曰夏后氏以松殷人以柏周人以栗朱注三代之社不同者古者立社各樹其土之所宜木以為主也蔡氏清曰既曰各樹其土之所宜木為主則夏后氏以松未必舉天下之諸侯社皆以松也殷人以柏亦未必舉天下之諸侯社皆以柏也周人以栗亦未必舉天下之諸侯社皆以栗也宰我此對甚疎下句尤鑿縱使告以各樹其土之所宜木亦未得立社之本意集注姑且就其言之謬而正之耳未暇深論也陳氏祥道曰後世宋有禖社豐有枌榆社先儒謂諸侯社皆立樹以為主以象其神大夫以下但各以地之所宜木立之于義或然白虎通社稷所以有樹何尊而識之使民人望見師敬之又所以表功也故周官曰司社而樹之各以土地所生尚書曰大社唯松東社唯柏南社唯梓西社唯栗北社唯槐附論諸家社主用石用木不同春官小宗伯帥有司而立軍社鄭注社之主蓋用石為之賈疏案許慎云今山陽俗祠有石主彼雖施于神祠要有石主主類其社其社既以土為壇石是土之類故鄭注社主蓋以石為之無正文故云蓋以疑之也夏官量人賈疏在軍不用命戮于社故將社之石主而行陳氏禮書周禮小宗伯若大師則帥有司而立軍社奉主車春秋傳曰軍行祓社釁鼓祝奉以從鄭氏曰社之主蓋用石為之唐神龍中議立社主韋叔夏等引吕氏春秋及鄭𤣥議以為社主用石又後魏天平中大社石主遷于社宫是社主用石矣又檢舊社主長二尺五寸方一尺七寸在禮無文案韓詩外傳云天子大社方五丈諸侯半之蓋以五是土數故壇方五丈其社主凖五數長五尺凖隂之二數方二尺剡其上以象物生方其下以體地體埋其半以根在土中而本末均也蓋石地類也先儒謂社主石為之其長不過尺五寸其短以寸計之唐之時舊主一尺六寸方一尺七寸蓋有所傳然也而議者謂宜長五尺方二尺埋其半于土中此臆論也古者天子諸侯有載社之禮而陳侯嘗擁社以見鄭子展果埋其半則不可迎而載果石長五尺方二尺則不可取而擁朱子語録問古者各樹其所宜木以為社不知以木造主還便以樹為主朱子曰看古人意思只以樹為社主使神依焉如今人説神樹之類以木名社如櫟社枌榆之類問社主平時藏何處曰但以所宜木為主如今世俗之神木然非是將木來作主也答許慎之曰古人立木于社使民知所存着知社之神必有所司則國君所以守社稷其嚴乎邱光庭兼明書社所以依神表域也各隨其地所宜而樹之宰我謂欲使人畏敬戰慄失其義也程氏迥曰古者以木為主今也以石為主非古也蕙田案社主用石本周禮鄭注之説非有明証夫軍行載社主陳侯擁社主皆非石主所宜且己埋其半于土中如何復載之擁之也朱子雖云各樹其土之所宜木以為主然語録又云非是將木來作主則又非以木為主也是石主木主兩皆無據不如古之樹木以依神者為當而臨祭則用後世木主可耳論社有主稷無主朱子答社壇説曰舊法社有主而稷無主不曉其意恐不可以己意增添其言壇上之南方非壇之中也蓋神位坐南向北而祭器設于神位之北故此石主當壇上南陛之上若在壇中央即無設祭處矣蕙田案石是土類故古有社主用石之説畢竟無所憑據故疏及禮書皆疑之况稷是榖神推其氣類不宜用石而用木明矣然木主不可以露設徃徃祭畢藏之瞻其壇者遂謂社有主稷無主耳非真稷無主也明制祭日設社稷兩木主于壇上祭畢貯之庫中仍設社石主稷壇中㣲露其末又似社有二主矣以義揆之或如古制平日壇内樹木依神以為社主臨祭則設兩木主祭畢供之神庫師行載之以設軍社或亦禮以義起者乎右社木社主禮記郊特牲唯為社田國人畢作疏唯為社田國人畢作者田獵也畢盡也作行也既人人得社福故若祭社先為社獵則國中之人皆盡行無得住家也馬氏晞孟曰古者唯田與追胥竭作唯為社事單出里此近于家出一人也國人畢作此所謂竭作而其餘無羨也唯為社田國人畢作人不愛其力也周氏諝曰社田畢作欲其皆曉于戰陣也季春出火為焚也然後簡其車賦而歴其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而鹽諸利以觀其不犯命也求服其志不貪其得故以戰則克以祭則受福注凡出火以火出建辰之月火始出焚謂焚萊也簡歴謂算具陳列之也君親誓社誓吏士以習軍旅既而遂田以祭社也言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春火出而民乃用火今云季春出火乃親誓社記者誤也社或為省流猶行也行行田也鹽讀為艶行田示之以禽使歆艶之觀其用命否也謂禽為利者凡田大獸公之小禽私之失伍而獲猶為犯命是求服其志不貪其得也之疏此一節論仲春祭社之前田獵取禽以祭社獲福事祭社既用仲春焚當在仲春記者以季春民始出火遂悞以天子諸侯用焚為季春也焚謂焚燒除治宿草出火謂出陶冶之火案春秋火出為夏三月故左氏昭六年鄭人鑄刑書火未出而用火故晉士文伯譏之若田獵之火則昆蟲蟄後得火田以至仲春也既焚之後簡選車馬及兵賦器械之屬歴其百人之卒五人之伍君親誓此士衆以習軍旅既而遂田以所得之禽獸因以祭故云親誓社或左或右或坐或起戒勅之以習軍旅君親自觀于習武變動之事教陣訖而行田禮驅禽于陣前以示士卒示流示之禽也利則禽也驅禽示之而歆艶之以小禽之利也于此之時觀其士卒犯命與不犯軍命者求欲服其士卒之志使進退依禮不欲貪其犯命苟得于禽言失伍得禽不免罰也其所為得禮故戰則克勝祭則受福方氏慤曰田獵之禮周官則行之于仲月而與此異邠詩月令則行之于季月而與此同此之所言亦泛記異代耳右社田君親誓社詩周頌載芟序曰春藉田而祈社稷也箋藉田甸師氏所掌王載耒耜所耕之田天子千畝諸侯百畝藉之言借也借民力治之故謂之藉田疏載芟詩者春藉田而祈社稷之樂歌也謂周公成王太平之時王者于春時親耕藉田以勸農業又祈求社稷使民獲其年豐嵗稔詩人述其豐熟之事而為此歌焉經陳下民樂治田業收穫𢎞多釀為酒醴用以祭祀是由王者耕藉田祈社稷勸之使然故序本其多穫所由言其作頌之意經則主説年豐故其言不及藉社所以經序有異也月令孟春天子躬耕帝藉仲春擇元日命民社大司馬仲春教振旅遂以蒐田獻禽以祭社然則天子祈社亦以仲春與耕藉異月而連言之者雖則異月俱在春時故以春總之祭法曰王為羣姓立社曰大社王自為立社曰王社此二社皆應以春社之但此為百姓祈祭文當主于大社其稷與社共祭亦當為大社社稷焉良耜序曰秋報社稷也疏良耜詩者秋報社稷之樂歌也謂周公成王太平之時年穀豐稔以為由社稷之所祐故于秋物既成王者乃祭社稷之神以報生長之功詩人述其事而作此歌焉經之所陳其末四句是報祭社稷之事婦子寧止以上言其耕種多穫以明報祭所由亦是執之事也經言百室盈止婦子寧止乃是場功畢入當十月之後而得言秋報者作者先陳人事使畢然後言其報祭其實報祭在秋寧止在冬也黄氏度曰良耜言殺時犉牡者則專主祭社稷而言也豐年序曰秋冬報也疏天地社稷之神雖則常祭謂之祈報朱子傳此秋冬報賽田事之樂歌蓋祀田祖先農方社之屬也禮記月令孟冬之月大割祠于公社注此蜡祭也大割殺羣牲割之也疏謂大割牲以祠公社以上公配祭故云公社皇氏云社是報功故云大割方氏慤曰公社親而不尊在致味以祭之故曰大割明堂位春社秋省而遂大蜡天子之祭也注省讀為獮獮秋田名也春田祭社秋田祀祊方氏慤曰社與省春與秋皆有之其所異者春社以祈為主秋社以報為主春省以耕為主秋省以斂為主耳此于社言春以該秋于省言秋以該春其實一也山堂考索載芟載柞其耕澤澤此春祈社稷之詩也其崇如墉其比如櫛此秋報社稷之詩也夫廬居族處非土不生枵腹張頤非榖不食知土榖之不容一日廢則社稷之祭如之何其廢之是故人臣有平土之功則取以配社如共工氏之子龍髙陽氏之子黎是也有播榖之功取以配稷如烈山氏之子柱厲山氏之子農是也古人崇重之意如何如祭之以春官卜之以肆師擇之以元日重蕆事也行之于新邑禱之于枌榆正之于洛陽示尊敬也其不崇重之意又為何如蓋自不立官稷而社稷之禮始廢不建州社而祀社之禮始壞一廢于漢之中世再壞于唐之建州况復有載芟良耜之遺意乎吁此張文琮所以有何觀之嘆然而社用羊豕稷用黍稷用黍稷又奚為不用犢祭蓋用犢乃祭地之禮社稷雖地􅅘之屬而非地猶五帝為天之尊神而非天也社安得不用羊豕稷安得不用黍稷乎吾于此又知社稷為土榖之正神實非人為之也月令仲春之月擇元日命民社注社后土也使民祀焉神其農業也祀社日用甲云疏后土者五官之后土即社神也與左傳僖十五年君履后土者别也但句龍為配社之神又為后土之官也云祀社日用甲者解經元日也案郊特牲云祀社日用甲用日之始也召誥戊午乃社于新邑用戊者周公告營洛邑位成非常祭也方氏慤曰祭法曰大夫以下成羣立社曰置社則民固有社矣然非天子命之無敢專祭焉故擇元日而命之也且社土􅅘也方春土發生之時擇元日而祭之亦祈其土之利無不善而已郊特牲言社日用甲則此言元日蓋甲日也社日用甲則得其善矣故謂之元日焉凡祭社而稷必從之此止言命民社者特舉重以見輕耳丘光庭兼明書社日或問曰月令云擇元日命民社註云元日近春分前後戊日郊特牲云日用甲日之始也與今註月令不同何也答曰召誥云越翼日戊午乃社于新邑則是今註月令取召誥為義也不取郊特牲為義者以社祭土土畏木甲屬木故不用甲也用戊者戊屬土也召誥周書則周人不用甲也郊特牲云甲者當是異代之禮也稷日或問曰祭稷不别與社同日者何也答曰以百榖生于土戊屬土故可與社同日而祭也應氏鏞曰元日祈于上帝所以祀天也元日命民社所以祀地也乾始坤生事之如一不容有異心也故祈帝祀社皆曰元日而親耕則曰元辰而已載芟之詩曰春藉田而祈社稷則藉田固以祈社稷矣而此復曰命民社者蓋藉田之祈王所自為之王社也命民社者王為羣姓所立之大社也同于為社而先後則有等差因事以為教也丘氏濬曰此一里之祭也後世命民主里社本此然郊特牲祭社用甲日而召誥用戊日戊者土之氣也因土氣以祭社神當用上戊為是况所謂元者非但訓善也亦有首始之義謹考官歴春秋二社皆在仲月臣竊以為官府祭社宜用仲月上戊而里民所祭者當用官歴所定社日為宜又徃徃見有司祭社偶遇春秋二仲月之上旬戊在丁後必先釋奠而後祭社吁豈所謂上戊哉亦豈古人所以秩祭祀之意哉蓋秩之為言次序之謂也周禮肆師以嵗時序其祭祀正謂此爾况社稷大祀先師中祀自當循其次序郊特牲日用甲用日之始也注國中之神莫貴于社故日用甲也疏社是國中之貴神甲是旬日之初始故用之也社之祭一嵗有三仲春命民社一也詩曰以社以方謂秋祭二也孟冬云大割祠于公社是三也方氏慤曰社必用日之始何也蓋陽始于甲而物生隂極于辛而物成地雖以隂而成物然始地事者存乎陽故社用甲以原其始焉天雖以陽而生物然終天功者存乎隂故郊用辛以要其終焉夫獨隂不生獨陽不成天地相須之義也故聖人制禮以致其義焉馬氏晞孟曰日用甲用日之始則郊用辛用日之成也以乾知大始坤作成物則郊宜用甲社宜用辛天雖主于生物亦有以成之則天之道所以明地雖主于成物亦有以生之則地之道所以神蓋郊所以明天道故用辛社所以神地道故用甲曲禮曰外事用剛日内事用柔日郊者外事也社者内事也而此言郊用辛日之柔社用甲日之剛者説者以為郊社至尊之祭不可同于内外此説得之又曰凡日始于甲物成于辛日始于甲而社用之者地以形成物而肇地事者氣也氣自甲而始故用是以社物成于辛而郊用之者天以氣始物而終天事者形也形至辛而成故用是以郊天地相合萬物資焉故曰郊以明天道社以神地道萬物資氣于天故郊于孟春資生于地故社于仲春應氏鏞曰郊用辛乾位也氣之藏也超乎物無為之尊天之道也社用甲震方也物之生也役于乾有用而勞土之象也周氏諝曰甲者陽中之陽也社用甲而不用乙欲其以陽召隂也辛者隂中之隂也郊用辛而不用庚欲其以隂召陽也以甲為用日之始則誤矣祭統崇事宗廟社稷則子孫順孝周禮地官封人令社稷之職注將祭之時令諸侯有職事于社稷者也郊特牲曰惟為社事單出里惟為社田國人畢作惟為社丘乘供粢盛所以報本反始也疏春秋祭社皆有職事令之者使各依職司而行故須令之也鄭氏鍔曰諸侯當守社稷之職又慮其廢而不祀封人則令之使無敢廢職如是則其國之民亦為社事而單出里為社田而竭作為社祭而共粢盛亦不敢失其職郝氏敬曰社稷之職謂典守壇壝之人皆封人令之右社稷祈報正祭禮記王制天子社稷皆太牢諸侯社稷皆少牢通考案書曰乃社于新邑牛一羊一豕一是天子用太牢也方氏慤曰牢者圈也以能有所畜故所畜之牲皆曰牢也太牢具牛羊豕焉以其大故曰太少牢則羊豕而已以其小故曰少天子之社稷主天下之土榖故用太牢以祭之諸侯之社稷主一國之土榖故用少牢以祭之此隆殺之别也郊特牲社稷太牢疏社五土總神稷是原隰之神功及于人人賴其功故以太牢報祭其牲則黝色也方氏慤曰于牲言特以見太牢之非一于牢言太以見特牲之用犢也特則牢所畜之物牢則牲所畜之地互相備也牲孕祭帝弗用則社稷容或用焉月令季夏之月命四監大合百縣之秩芻以養犧牲令民無不咸出其力以祠社稷之靈以為民祈福注四監主山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國養犧牲之芻多少有常民皆當出力艾芻養牲以供祠神靈為民祈福也季冬之月乃命太史次諸侯之列賦之犧牲以共社稷之饗注此所與諸侯共者也列國有大小賦之犧牲大者出多小者出少饗獻也疏列次也來嵗祭祀所須犧牲出諸侯之國國有大小故命太史書列之以共賦也社稷王之社稷也諸侯自有社稷而始封亦割王社土與之故賦牲共王社稷也周禮地官牧人隂祀用黝牲毛之注毛之取純毛也隂祀祭地北郊及社稷也鄭司農云黝讀為幽幽黒也鈎疏郊特牲云社祭土而主隂氣也是社稱隂孝經緯命決云祭地于北郊就隂位彼對郊天就陽位則是神州之神在北郊而稱隂以是知隂祀中有祭地于北郊及社稷也鄭氏鍔曰用黝豈徒色之黒哉必欲其毛純乎黒牧人毛之然後五官奉之是禮官之事亦牧人之事春官大宗伯以血祭祭社稷注隂祀自血起貴氣臭也疏此地之次祀先薦血以歆神且社稷亦土神故舉社以表地􅅘鼔人亦云靈鼓鼓社祭亦舉社以表地此其類也云隂祀自血起者對天為陽祀自烟起貴氣臭同也項氏安世曰血毛告幽全之物又曰血祭盛氣也則以地道有幽隂之義而求之以血也鄭氏鍔曰血之為物有象而非虚有形而非實物之幽蓋亦求之于虚實之間肆師立次祀用牲幣注𤣥謂次祀又有社稷易氏祓曰牲色之純者謂之牷上言牲牷下特言牲則其色之不必純也幣帛一也自其質言之謂之帛制而用之謂之幣周書召誥乃社于新邑牛一羊一豕一孔傳告立社稷之位用太牢也白虎通以三牲何重功故也尚書曰乃社于新邑牛一羊一豕一王制曰天子社稷皆太牢諸侯社稷皆少牢宗廟俱太牢社稷少牢何宗廟太牢所以廣孝道也社稷為報功諸侯一國所報者少故也右牲周禮春官鬯人掌共秬鬯而飾之凡祭祀社壝用大罍注秬鬯不和鬱者飾之謂設巾壝謂委土為墠壇所以祭也大罍瓦罍疏壝謂委土為墠壇所以祭者謂四邊委土為壝于中除地為墠墠内作壇謂若三壇同墠之類也此經云社壝謂若封人及大司徒皆云社壝皆直據外壝而言也知大罍是瓦罍者瓬人為瓦簋據外神明此罍亦用瓦取質略之意也鄭氏鍔曰社壝者社之外委土為壝埒其中為壇社祭土以瓦罍出于土器雖出于土然非用人工以陶冶器無自而成祭祀社壝則用大壘以盛土秬鬯以見土者人所用功而社神有功于王氏昭禹曰社壝則封人所設王之社壝王社之􅅘比于天地之神為近人情則宜交之以人道故有秬鬯言于人道則非鬼故不加鬱而不祼蕙田案社必有壝故言社壝亦舉社以該稷禮記祭義天子為藉千畝躬秉耒以事天地山川社稷先古以為醴酪齍盛郊特牲惟社丘乘共粢盛所以報本反始也注丘十六井也四丘六十四井曰甸或謂之乘乘者以于車賦出長轂一乘乘或為鄰疏惟社丘乘共粢盛者嚮説祭社用牲此言祭社用米也丘乘者都鄙井田也九夫為井四井為邑四邑為丘四丘為乘惟祭社而使丘乘共其粢盛也粢稷也稷曰明粢在器曰盛所以報本反始結美報也皇氏曰天子諸侯祭社則用藉田之榖大夫以下無藉田若祭社則丘乘共之示民出力也國人畢作是報本而丘乘共粢盛是反始言粢盛是社所生故云反始也方氏慤曰丘言其地也乘言其賦也夫社者隂之神軍者隂之事使軍賦之家而共粢盛于社各從其類也故將出征則宜乎社不用命則戮于社軍行則祓于社凱旋則獻于社皆以是耳故此不曰丘民而必曰丘乘也以非祭社則不必如是故每言惟焉則以本始有在乎此而報反之禮不可不重故也張子曰古者丘乘共粢盛恐十里之中立一社也劉氏彛曰天子諸侯郊社宗廟粢盛取于神倉大夫都鄙粢盛取于丘乘也衣食本乎土故曰報本知平水土始于句龍知播五穀始于后稷故以為配是曰反始焉詩小雅甫田以我齊明與我犧羊以社以方傳器實曰粢在器曰盛社后土也方迎四方氣于郊也五箋云以潔齊豐盛與我純色之羊秋祭社與四方為穀成熟報其功也日疏經傳多齊盛連文故傳因齊解盛春官肆師祭之表粢盛告潔注云粢六穀也則六榖總為齊天官甸師注云粢稷也惟以稷為粢者以稷是榖之長為諸穀之總名六榖皆為器之實故曰器實曰齊指榖體也在器曰盛據已盛于器也故桓六年左傳曰潔粢豐盛言為穀則潔清在器則豐滿是指器實為粢在器為盛也右酒醴粢盛周禮春官司服祭社稷則希冕注希刺粉米無畫也其衣一章裳二章凡三也在疏云希刺粉米無畫也者衣是陽應畫今希冕三章裳者自然刺繡但粉米不可畫之物今雖在衣亦刺之不變故得希名故鄭特言粉米也然則毳冕之粉米亦刺之也鄭氏鍔曰希冕惟有粉米黼黻三章其章為罕故其字用希本又作絺字粉米兩物共為一章言粉其米以為章其在裳則當繡及為三章之首則當畫以在衣不可繡也社稷五祀五岳同于血祭此則用七章之服以祀四望山川又用五章之服以祭社稷五祀蓋此言山川在社稷之上殆非丘陵墳衍之山川也指四望之山川耳何則丘陵墳衍之山川當比羣小祀以元冕祭之不當處社稷之上觀祀五帝享先王祭社稷祭羣小祀而獨于四望山川之祭謂之祀四望山川則其尊可知粉米者養人之物社稷者土榖之養人者也五祀之神則能平五行之政亦有功利以生人者也故祭則同服或謂絺為細葛布上刺繡布豈可繡哉或謂其字音蕭蕭者縫也凡冕服皆𤣥衣纁裳𤣥冕惟有黻之一章刺于裳而已其衣無章但見其元色黄氏度曰宗伯序社稷五祀先于五岳司服序四望山川先于社稷祭之秩當如宗伯司服自以服為序地祭以社稷見不别出則方丘不服大裘矣諸儒紛紛蓋未嘗考先王制祀之義右冕服周禮春官大司樂乃奏太蔟歌應鍾舞咸池以祭地􅅘注地􅅘所祭于北郊及社稷祭疏知及社稷者以六冕差之社稷雖在小祀若據薦言之大宗伯云以血祭祭社稷五祀五岳用血祭與郊同又在五岳之上故知用樂亦與神州同地官鼓人以靈鼓鼓社祭注靈鼔六面鼔也社祭祭地􅅘也疏郊特牲云社祭土神地之道故舉社以表地􅅘大宗伯亦云血祭祭社稷五祀亦舉社以表地􅅘其實地之大小之祭皆用靈鼓鄭氏鍔曰地道有形可見而靈者神之降而有騐故名靈者以鼓社祭則宜言鼓神祀鼓鬼享不言地􅅘乃曰鼓社祭何也記曰社祭土而主地蓋社者地神之尤貴言社則地􅅘見矣觀大宗伯掌天神人鬼地􅅘之禮亦只言以血祭祭社稷意蓋類此舞師教帗舞帥而舞社稷之祭祀地官鼓人孔疏案樂師注帗五采繒令靈星舞子持之史氏浩曰帗舞執五采繒如帗王氏昭禹曰社稷土榖之神所以生養人者欲其無灾害之厲民而有帗除之功帗有祓除之義也故教帗舞帥而舞社稷之祭祀詩周頌載芟載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百榖實函斯活驛驛其達有厭其傑厭厭其苖緜緜其麃載穫濟濟有實其積萬億及秭為酒為醴烝畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹疏載芟詩者春藉田而祈社稷之樂歌也詩緝李氏曰噫嘻豐年其説為略載芟良耜其説為詳蓋祈上帝所以尊之也故其詞略祭社稷所以親之也故其詞詳良耜畟畟良耜俶載南畝播厥百榖實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人疏良耜詩者秋報社稷之樂歌也傳黄牛黒脣曰犉牡社稷之牛角尺黄疏釋畜直云黒脣以言黒脣明不當與身同色牛之者衆故知黄牛也某氏亦云黄牛黒脣曰犉取此傳為説也地官牧人云凡隂祀用黝牲毛之注云隂祀祭地北郊及社稷也然則社稷用黝牲角以黒而用黄者蓋正禮用黝至于報功以社是土神故用黄色仍用黒脣也以經言角辨角之長短故云社稷之牛角尺也王制云祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺社稷之牛卑于宗廟宜與賓客同尺也禮緯稽命徴云宗廟社稷角握此箋不易毛傳蓋以禮緯難信不據以為正也社稷太牢獨云牛者牛三牲為大故特言之詩緝黄氏曰載芟言以洽百禮者仍其豐年之慶而百神之祀皆無所缺也良耜言殺時犉牡者則專主祭社稷而言也白虎通祭社有樂樂記曰樂之施于金石絲竹越于聲音用之于宗廟社稷右樂舞禮記郊特牲君南鄉于北墉下答隂之義也注牆謂之墉北墉社内北牆也上疏社既主隂隂宜在北故祭社時以社在南設主壇北面而君來在北牆下而南向祭之是答隂之義也白虎通王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也禮器三獻文注謂祭社稷五祀其神稍尊比羣小祀禮儀為文飾也疏希冕三章祭社稷五祀故知三獻祭社稷五祀也三獻爓注三獻祭社稷五祀爓沈肉于湯也通典三獻禮取血先瘞于所祭之處以為祭始次則禮神以玉尸前薦爓肉及脯醢籩豆王則酌大罍中酒以獻尸所謂朝踐之獻是為一獻也至薦熟時宗伯亦攝后酌以亞獻所謂再獻尸食訖賓長酌酳尸謂之三獻右君親祭三獻春秋閔二年左氏傳受脤于社注脤宜社之肉盛以脤器疏釋天云起大事動大衆必先有事乎社而後出謂之宜知出兵必祭社祭社名為宜周禮大宗伯以脤膰之禮親兄弟之國定十四年天王使石尚來歸脤知脤是器物可執之以賜人也今言受脤于社明是祭社之肉盛以脤器賜元帥也地官掌蜃祭祀共蜃器之蜃鄭𤣥云蜃大蛤蜃之器以蜃飾因名焉右受脤周禮春官肆師社之日涖卜來歳之稼注社祭土為取財焉卜者問後嵗稼所宜社疏此社亦是秋祭社之日也言涖卜來嵗之稼者祭有二時謂春祈秋報報者報其成熟之功今卜者來嵗亦如今年宜稼與不但春稼秋穡不言穡而言稼者秋穡由于春稼故據稼而言之郊特牲云社祭土而主隂氣也取財于地取法于天故云社祭土而取財焉鄭氏鍔曰詩人言大田多稼以社以方故知稼為田苖之事祭社有二春祈秋報知此社非春祈者以嘗與獮無非秋事知此為秋報祭之社也右卜稼詩大雅綿乃立冢土戎醜攸行爾雅起大事動大衆必先有事乎社而後出謂之宜郭注冢土大社戎醜大衆有事祭也周官所謂宜乎社邢疏孫炎曰大事兵也有事祭也宜求見使祐也此文本解戎醜攸行之意言國家起發軍旅之大祭事以興動其大衆必先有祭事于此社而後出行其之名謂之為宜以師行必須宜祭以告社故言戎醜攸行也以兵凶戰危慮有負敗祭之以求其福宜故謂之宜春官大祝大師宜于社及軍歸獻于社疏言大師者王出六軍親行征伐故曰大師云宜于社者軍將出宜祭于社即將社主行不用命戮于社及軍歸獻于社者謂征伐有功得囚俘而歸獻捷于社鄭氏鍔曰大師必載社主與遷廟之主以行故有宜社造社之祭祭社曰宜蓋以事宜而祭之非春秋之所報祭大會同宜于社反行舍奠注曾子問曰凡告必用牲幣反亦如之陳氏祥道曰釋奠者設牲饌酌奠而已無迎尸以下事古者釋奠或施于山川或施于廟社或施于學小祝有冦戎之事則保郊祀于社注鄭司農云謂保守郊祭諸祀及社無令冦侵犯之杜子春讀禩為祀書亦或為祀𤣥謂保祀互文郊社皆守而祀之彌災兵鄭氏鍔曰有冦戎則事出不虞兵自外作則出而保郊四郊兆域皆神之所處人心不安神或失所依小祝事神者也故就其所保而守之以安神也社在國内但祀以弭災兵可也鄭康成以保郊祀于社為一句其説不可用黄氏度曰郊非有司所當祀也直保之祀社而已王氏昭禹曰保郊以防患祀社以弭兵肆師凡師甸用牲于社宗則為位注社軍社也宗遷主也疏云社軍社也者在軍不用命戮于社又君以軍行祓社釁鼓故名軍社也鄭知宗遷主者曾子問云師行必以遷廟主行載于齊車故知遷主也易氏祓曰師甸者田而後用師者必載社之石主祖之木主示有所受命夏官大司馬若師有功則左執律右秉鉞以先愷樂獻于社注功勝也律者以聴軍聲鉞所以為將威也獻疏趙商問大司樂王師大獻則令奏愷樂注云于祖與此異鄭答曰司馬主軍事之功故獻于社大司樂宗伯之屬宗伯主宗廟故獻于祖若然軍有功二處俱獻以出軍之時告于祖宜于社故反必告也王氏詳説曰祖本仁故獻愷在春官社本義故獻愷在秋官鄭氏鍔曰司馬主九伐之法故獻于社示法隂而行誅伐也若師不功則厭而奉主車蔡氏徳晉曰奉主車奉䕶廟社主之車而歸也禮記王制天子將出征宜乎社大傳牧之野武王之大事也既事而退祈于社陳氏祥道曰武王之出師受命文考類于上帝宜于冢土所以告其伐也既事而退柴于上帝祈于社設奠于牧室所以告其成也周書泰誓宜于冢土孔傳冢土社也祭社曰宜大疏孫炎曰宜求見福祐也冢訓也社是土神故冢土社也林氏之奇曰宜于冢土與王制宜于社其曰宜者亦當是非祭祀之常禮權其事宜以制其禮則謂之宜也春秋定四年左氏傳子魚曰祝社稷之常𨽻也社稷不動祝不出竟官之制也若以軍行祓社釁鼓祝奉以從于是乎出竟注師出先有事祓禱于社謂之宜社于是殺牲以血塗鼔鼙為釁鼔奉社主也蕙田案以上九條出師祭社周禮夏官大司馬仲春教振旅遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社注春田為蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓民誓以犯田法之罰也誓曰無干車無自後射立旌遂圍禁旌弊争禽而不審者罰以假馬禁者虞衡守禽之厲禁也既誓令鼓而圍之遂蒐田火弊火止也春田主用火因焚萊除陳草皆殺而火止獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻豜于公春田主祭社者土方施生也鄭司農云貉讀為禡禡謂師祭也書亦或為禡疏此因田獵而祭非月令仲春祭社也鄭氏鍔曰將田之初有司行表貉之祭司馬以軍法誓民所謂有司者肆師甸祝也肆師大田獵祭表貉則為位甸祝掌四時之田表貉之祝號則有司謂此二官明矣鄭康成以為大司徒無表貉事其説非也蕙田案此條田獵祭社春官小宗伯凡天地之大災類社稷宗廟則為位注禱祈禮輕類者依其正禮而為之稷疏天災謂日月食星辰奔隕地災謂震裂則類祭社及宗廟則亦小宗伯為位祭之王氏昭禹曰大災若日月食山冢崩皆非常之變則合聚社稷宗廟之神而禱祀焉故曰類鄭氏鍔曰天神曰類而社稷宗廟亦曰類者蓋當變故之祭依倣其正禮聚一處以禱祀故以類言之大祝國有大故天災彌祀社稷禱祠注大故兵冦也天災疫厲水旱也彌猶徧也徧祀社稷及諸所禱既則祠之以報焉鄭氏鍔曰國有災故祀社稷之神以弭息之始禱祈終報祠皆掌之春秋襄二十五年左氏傳祝祓社注祓除也時疏周禮女巫掌嵗祓除釁浴鄭𤣥云嵗時祓除如今三月上已如水上之類彼言祓除知此祓社是祓除也周禮夏官小子掌珥于社稷注鄭司農云珥社稷以牲頭祭也𤣥謂珥讀為衈衈者釁禮之事也衈社稷五祀謂始成其宫兆時也從疏先鄭云珥以牲頭祭漢時祈禱有牲頭祭後鄭不者案禮記雜記釁廟之禮云門夾室用雞其衈皆于屋下衈既為釁禮此刉與衈連文則刉亦是釁禮非祭祀之法何得為牲頭祭乎是以後鄭為釁法解之王氏與之曰珥當為弭如小祝所謂弭兵災非釁事也黄氏度曰社稷人所依以生者故有禱祈之事詩大雅雲漢方社不莫箋祭四方與社不晚土朱子傳曰方祭四方社祭神也春秋莊公二十五年六月辛未朔日有食之鼓用牲于社注鼔伐鼔也用牲以祭社傳例曰非常也秋大水鼔用牲于社于門注門國門也傳例曰亦非常也文公十五年六月辛丑日有食之鼓用牲于社左傳非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝蕙田案以上八條禱祈祭社禮記王制天子將出宜乎社諸侯將出宜乎社疏此論天子巡守之禮將出謂初出時也知此是巡守者以下别云出征也宜乎社者巡行方事誅殺封割應載社主也云宜者令誅罰得宜又社主乎地也馬氏晞孟曰宜者以事之宜而告于社而其禮則略于祭地葉氏夢得曰諸侯臣也臣則地道故宜乎社理有宜而巡守所出皆理所宜行故于社皆言宜也蕙田案此條巡狩祭社曾子問諸侯適天子命祝史告社稷宗廟山川蕙田案此條君行告社周禮春官大祝建邦國先告后土用牲幣注后土社神也鄭氏鍔曰先告后土然後分封示不敢專也大宗伯掌其禮大祝則掌告也告之之時其事用牲其禮用幣以為割裂土宇故用盛禮焉周書召誥乃社于新邑牛一羊一豕一孔傳告立社稷之位用太牢也王氏充耘曰郊社大事也周召以人臣行之可乎蓋因事祭告奉王册命以行事非常祭之比也書傳説彚纂社于新邑謂此乃所以祀地者非也王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社又大夫以下成羣立社曰置社鄭云此今時里社也又月令命民社仲春之祭也詩以社以方秋祭也孟冬則云大割祀于公社是一嵗三社也社之日自天子以至于士庶人皆得共之其名至多名同而義則各異兹之社于新邑乃社稷之社位在庫門之右者若以此社為祭地則王制所云祭天地社稷地與社豈重累而舉之乎蕙田案以上二條建國告祭右因事祭社稷孟子民為貴社稷次之朱子注社土神稷穀神建國則立壇壝以祀之犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷趙注犧牲已成肥腯粱稻已成潔清祭祀社稷常以春秋之時然而其國有旱乾水溢之災則毁社稷而更置之之孫疏社稷無功以及民亦在所更立有功于民者為也社稷者蓋先王立五土之神祀以為社立五穀之神祀以為稷以古推之自顓帝以來用句龍為社柱為稷及湯之旱以棄易其柱是知社稷之變置又有見于湯之時然也朱子注祭祀不失禮而土榖之神不能為民禦災捍患則毁其壇壝而更置之亦年不順成八蜡不通之意右變置社稷禮記郊特牲疏其社稷制度白虎通云天子之社壇方五丈諸侯半之説者又云天子之社封五色土為之若諸侯受封各割其方色土與之則東方青南方赤之等是也上皆以黄土也其天子諸侯皆有二社者祭法云王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社是各有二社又各有勝國之社故此云喪國之社屋之是天子有之也案春秋亳社災公羊云亡國之社蓋掩之掩其上而柴其下是魯有之也襄三十年左傳云鳥鳴于亳社是宋有之也此是天子諸侯二社之義其所置之處小宗伯云右社稷左宗廟鄭云庫門内雉門外之左右為羣姓立社者在庫門内之西自為立社者在藉田之中其亡國之社稷榖梁傳云亡國之社以為廟屏戒或在廟或在庫門内之東則亳社在東也故左傳云間于兩社為公室輔蓋魯之外朝在庫門之内東有亳社西有國社廟庭執政之處故云間于兩社也其卿大夫以下案祭法云大夫以下成羣立社曰置社注云大夫不得特立社與民族居百家以上則共立一社今時里社是也如鄭此言則周之政法百家以上得立社其秦漢以來雖非大夫民二十五家以上則得立社故云今之里社又鄭志云月令命民社謂秦社也自秦以下民始得立社也其大夫以下所置社者皆以土地所宜之木則論語云夏后氏以松殷人以柏周人以栗故大司徒云而樹之田主各以其野之所宜木是也其天子大社之等案尚書無逸篇曰大社唯松東社唯柏南社唯梓西社唯栗北社唯槐其天子諸侯大夫等皆有稷也故註司徒田主田神后土田正之所依也田正則稷神也田主尚然故知天子諸侯社皆有稷其亡國之社亦有稷故士師云若祭勝國之社稷則為之尸是有稷也但亡國之社稷故略之用刑官為尸其祭餘社為尸不用刑官也其社之祭一嵗有三仲春命民社一也詩云以社以方謂秋祭二也孟冬云大割祠于公社是三也其社主用石故鄭注宗伯云社之主蓋用石案條牒論稷壇在社壇西俱北向營並壇共門或曰在社壇北其用主無文不可强言今禮用兩圭有邸蕙田案疏稱王社在藉田社主用石于經無考唯云天子諸侯皆有稷極是陳氏禮書社所以祭五土之􅅘稷所以祭五穀之神而命之稷以其首種先成而長百榖故也稷非土無以生土非稷無以見生生之效故祭社必以稷以其同功均利而養人故也祭必有配而社配以句龍稷配以柱商之時又易柱以棄以其功利足以侔社稷故也王與諸侯之社皆三其二社所以盡祈報之誠其勝國之社所以示鑒戒之理王之大社則土五色而冒以黄夏之時徐州厥貢惟土五色孔安國以社言之是也諸侯之國社則受其方色之土于天子而苴以茅漢之時有受青土赤土蔡邕以茅社言之是也其位則中門之右社主隂故也其壝則北面社向隂故也其飾則不屋記所謂大社必受霜露風雨以達天地之氣是也其表則木傳所謂夏以松商以柏周以栗是也其方廣則五丈其主則石為之其列則社東而稷西先儒之説蓋有所受之也先王之祭社稷春有祈秋有報孟冬大割祠春祈而歌載芟秋報而歌良耜此祭之常者也凡天地大災之類祭大故天災之彌祀君行有宜宫成有衈此祭之不常者也祭之常者用甲其他則唯吉而已祭之牲以太牢其遇天災則用幣而已考之于禮王之祭也南面其服也希冕其牲用黝其祭血祭其罇大罍其樂應鍾其舞帗舞其鼓靈鼓凡皆因其物以致其義非深知禮樂之情者孰與此哉先儒有以王社有稷壝原隰為稷神有以句龍為社而非配社柱為稷而非配稷後世又有以夏禹為社配有以戌亥為社日有以先農為帝社有以大稷為稷社皆臆論也又曰有天下之社有一國之社有衆人之社有一人之社有失國之社大社天下之社也國社一國之社也置社衆人之社也王社侯社一人之社也喪國之社屋之失國之社也三社之制大社為大此孟子所謂民為貴社稷次之君為輕也喪國之社天子所以為戒則又次于王社矣以言安不可以忘危也書曰夏社禮與春秋曰亳社皆以為戒而已然則諸侯有國社侯社與春秋之亳社亦三社矣天子之社在雉門之右而緜詩曰乃立應門繼之曰乃立冢土冢土社也則諸侯之社亦在門内也天子之牲太牢則諸侯當用少牢若郊特牲曰社事單出里丘乘共粢盛此大夫以下之社也社稷之重于古也如此而孟子旱乾水溢變置社稷夫水旱者天事也人事不勝故天變見于時而社稷土􅅘也豈其罪哉然則謂之變者猶曰以變置諸侯耳蕙田案禮書謂王社無稷壝非是禮經會元小宗伯建國之神位右社稷左宗廟有國則有社稷矣古者立君則曰奉社稷取女則曰共社稷死國則曰死社稷去國則曰去社稷社稷之重亦明矣是故大司徒辨制邦國都鄙之畿疆而首設社稷之壝小司徒凡建邦國立其社稷正其畿疆封人掌設王之社壝而樹之凡封國則必設社稷之壝造都邑亦如之以此見王畿都鄙邦國皆有社稷矣鄭康成曰社稷土榖之神有徳者配食焉共工氏之子曰句龍有厲山氏之子曰柱食于稷湯遷之而祀棄此社稷之神然也大宗伯則以血祭祭社稷小宗伯大災類社稷則為位舞師帥舞社稷之祭祀大祝國有大故天災則彌祀社稷禱祀小子則掌珥于社稷凡所用于社稷者豈非以其與天時相為休咎歟喪祝則掌勝國之社稷祝號以祭祀禱祠士師則祭勝國之社稷而為之尸是亡國之社稷亦存矣古人崇重社稷如此豈非以其與國祚相為存亡歟故載芟之詩曰春祈社稷也良耜之詩曰秋報社稷也豈非以其與嵗事相為豐耗歟然古者之奉社稷犧牲必成粢盛必潔苟有旱乾水溢之災則變置社稷説者謂湯伐桀時旱明牲以薦而猶旱至七年故湯遷柱而以棄代之欲遷句龍以無可繼者于是故止果如是説則社稷可以變置其神乎曰此即大宰祭祀馭神之意也蓋聖人之制祭祀也以勞定國則祀之能禦大灾則祀之水旱為沴故社稷不享矣故變置者變易其祭祀之禮而已豈以社稷之神而改易之歟湯之遷柱祀棄也以棄之功大于柱也非以旱而遷也且湯既放桀欲遷夏社猶以為不可勝國之社猶不可遷則必無遷句龍之意句龍不遷則遷柱祀棄者必不以旱遷之矣漢人除秦社稷立漢社稷豈識周存勝國社稷之意乎抑嘗以封人考之曰掌設王之社壝而不言稷鄭康成謂稷社之細也若是則周人果重社而輕稷乎后稷周之先祖殷人祀之以為稷周之子孫尤宜加敬今考之周禮宗伯甸師則用牲于社大祝大師則宜于社大會同則宜于社小祝冦戎之事則保郊祀于社大司馬蒐田獻以祭社大司冦大軍旅則涖戮于社類皆言社而不言稷蓋以稷司稼穡之事非師旅田役殺伐之事可凂也周人祖以后稷而郊祀之以配天詩曰思文后稷克配彼天又非社事配地之所得比也觀封人言設王社而不言稷又以見周人尊祖重農之意歟蕙田案葉氏論變置社稷一條良是唐氏仲友曰先王之祀上下達禮未有社稷者也耕耨斂藏人力所可勉旱乾水溢則繫于神祗故凡先王神祗之事皆為民祈榖也天尊地親故事之不同噫嘻事之以誠載芟事之以力載芟良耜人事盡矣不敢謂人事之盡而忽于神也故祈焉不敢謂人事之盡而忘于神也故報焉祈非吾過求也振古如兹矣報非止于今也欲其有繼焉所謂以似以續續古之人者涖卜來嵗之稼之意也諸侯危社稷而變置者古有之矣旱乾水溢而變置社稷者未聞焉孟子謂民為貴社稷次之故舉是禮以言人君固不可舍已而求之神也雲漢之詩曰祈年孔夙方社不莫又曰自郊徂宫后稷不克宫社宫也意吾常禮之未修則祈社修矣意吾變禮之未舉則郊宫徂矣而終不敢以責神也自反而已自勉而已周先王其于豐凶之祭所以敬事社稷者蓋如此故社稷國之主也兵農之事繫焉古者兵出于鄉遂丘乘其本在社有社斯有民有民斯有兵乃立冢土戎醜攸行故奉之主車戮則行焉勝則獻焉報本反始焉耳言公社以别私言民社以别官王與諸侯為羣姓立者公也自為立者私也里社民社也百室以上官社也命民社則下通于二十五家之里社大割祠于公社則王之大社而已祀地之禮有公而又有私者親地也尊無二上故事天明獨行于天子而無二尊事地察故下達于庶人而且有公私焉尊親之辨如此右總論社稷五禮通考卷四十二
