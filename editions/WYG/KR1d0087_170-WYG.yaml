殿欽安殿用大不落莢三百對紅棗一斤十二兩而乾清坤寧翊坤等宫每宫大五十對小一百對各小宫大三十對小五十對多人每不落莢四個皆以糯米粳米黑糖蜜紅棗為之則世廟所廢神宗時似復行矣惟宴改為麥餅則在四月初五日於午門前宴百官有上桌中桌二様閣部單坐宫坊以下各雙坐蕙田案嘉靖以後改四月八日宴於四月五日明志失載又案以上節宴禮志皇太后聖誕正統四年賜宴午門東宫千秋節永樂間賜府部堂上春坊科道近侍錦衣衛及天下進箋官宴於文華殿宣徳以後俱宴午門外明㑹典凡皇太后夀旦正統四年賜百官宴於午門外皇太后聖旦節皇后令旦節正統間上桌按酒四盤菜四色點心一牒夀麵一椀酒三鍾中合桌同夀麵二椀酒六鍾蕙田案據㑹典則皇后令旦亦有宴明史失載又案以上明皇太后皇后皇太子生辰賜宴禮志凡祀圜丘方澤祈穀朝日夕月耕耤經筵日講東宫講讀皆賜飯親蠶賜内外命婦飯纂修校勘書籍開館暨書成皆賜宴閣臣九年考滿賜宴於禮部九卿侍宴蕙田案此因事賜宴凡宴命婦坤寧宫設儀仗女樂皇后常服陞座皇妃皇太子妃王妃公主亦常服随出閤入就位大小命婦各立於座位後丞相夫人率諸命婦舉御食案丞相夫人捧夀花二品外命婦各舉食案於皇妃皇太子妃王妃公主前大小命婦各就座位奉御執事人分進夀花於殿内及東西廡酒七行上食五次酌酒進湯樂作止並如儀蕙田案此中宫賜宴禮右明宴饗五禮通考卷一百六十
