body:
  text: 五禮通考卷一百六十刑部尚書秦蕙田撰嘉禮三十三饗燕禮蕙田案三代以後封建廢而饗燕之禮亦亡惟天子宴羣臣之禮累代相承不廢猶有鹿鳴天保之遺意焉漢魏有元正朝㑹晉有冬至小㑹唐以後乃有聖節朝㑹皆於稱賀之後備設筵宴謂之大宴其立春上元寒食上已四月八日重午七夕中秋重九諸節亦有賜宴而或宴或否代各不同其天子特宴宰輔侍從諸臣無常期謂之曲宴至如國有大慶及大禮告成宫室落成之類亦多設宴雖未必盡合於古禮而可以通上下之情示慈惠之意亦太平盛事也至於宴蕃國主及使臣則入賔禮凱旋勞軍閲武饗射則入軍禮廵幸宴犒外官見辭幸勲戚第之類皆不常有且非宴饗之正故不及云漢書高帝本紀四年十一月西入關至櫟陽存問父老置酒留四日蕙田案此廵幸設宴之始後代天子廵幸宴勞從官及所過郡縣吏人史册所載甚多别見廵狩門此特志其縁起五年夏五月帝置酒雒陽南宫六年三月上置酒封雍齒因趣丞相急定功行封叔孫通傳漢七年長樂宫成諸侯羣臣朝十月至禮畢盡伏置法酒諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢諠譁失禮者丘氏濬曰此後世大朝賀宴會之禮所由起自漢行嵗首慶賀禮魏晉以後又有賀冬至禮唐中葉又有所謂賀生日禮皆於是日行禮畢設大宴以享百官蕙田案此嵗首大宴之始亦宫室落成設宴之始史記高祖本紀九年未央宫成高祖大朝諸侯羣臣置酒未央前殿高祖奉玉巵起為太上皇夀曰始大人常以臣無賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆呼萬嵗大笑為樂蕙田案此於大宴捧觴為太上皇夀漢書高祖本紀十二年冬十月上破布軍於㑹缶還過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之乃以沛為湯沐邑復其民世世無有所與沛父老諸母故人日樂飲極歡道舊故為笑樂十餘日上欲去沛父兄固請上曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻上留止張飲三日蕙田案此幸故里設宴之始三輔黄圖武帝建柏梁臺羣臣能賦七字者賜上座蕙田案此曲宴詞臣之始王尊傳成帝即位尊劾奏丞相匡衡正月行幸曲臺臨饗罷衞士衡與中二千石大鴻臚賞等㑹坐殿門下衡南鄉賞等西鄉衡更為賞布東鄉席起立延賞坐私語如食頃衡知行臨百官共職萬衆㑹聚而設不正之席使下坐上相比為小惠於公門之下動不中禮亂朝廷爵秩之位有詔弗治於是衡慙懼免冠謝罪上丞相侯印綬續漢書禮儀志季冬饗遣故衛士儀百官㑹位定謁者持節引故衛士入自端門衛司馬執幡鉦䕶行行定侍御史持節慰勞以詔問所疾苦受其章奏所欲言畢饗賜作樂觀以角牴樂闋罷遣勸以農桑百官賀正月二千石以上上殿稱萬嵗舉觴御坐前司空奉羮大司農奉飯奏食舉之樂百官受賜宴饗大作樂其每朔惟十月旦從故事者高祖定秦之月元年嵗首也通鑑綱目安帝永初三年十二月詔饗遣衛士勿設戲作樂後漢書桓帝本紀延熹元年五月己酉大㑹公卿以下賞賜各有差冊府元龜先主初入蜀於涪大㑹置酒作樂右兩漢宴饗南齊書禮志魏武都鄴正㑹用漢儀後魏文修洛陽宫室權都許昌宫殿狹小元日於城南立氊殿青帷以為門設樂饗㑹後還洛陽依漢舊事魏氏春秋甘露元年二月丙辰帝宴羣臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾毓給事中中書令虞松等並講述禮典遂言帝王優劣之差晉書禮志武帝更定元㑹儀夜漏未盡七刻謂之晨賀晝漏上三刻更出百官奉夀酒謂之晝㑹冬至日受方國及百僚稱賀因小㑹蕙田案元㑹儀及樂章詳見朝賀門明帝本紀太寧元年三月戊寅朔改元停享宴之禮懸而不樂二年春正月丁丑帝臨朝停享宴之禮懸而不樂宋書明帝本紀泰豫元年春正月甲寅朔上有疾不朝㑹南齊書髙帝本紀建元元年秋九月戊申車駕幸宣武堂宴㑹詔諸王公以下賦詩二年春三月車駕幸樂游苑宴王公以下賦詩武帝本紀永明二年八月丙午車駕幸舊宫小㑹設金石樂在位者賦詩四年閠正月甲寅以藉田禮畢車駕幸閲武堂勞酒小㑹五年三月戊子車駕幸芳林園禊宴九月己丑詔曰九日出商飈館登高宴羣臣辛卯車駕幸商飈館蕙田案上已九日宴羣臣始此梁書武帝本紀大同十年春三月庚戌幸回賔亭宴帝鄉故老太清元年五月丁酉車駕幸徳陽堂宴羣臣設絲竹樂陳書武帝本紀永定二年冬十二月丙寅髙祖於太極殿東堂宴羣臣設金石之樂以路寢告成也宣帝本紀太建四年冬十二月壬寅甘露降樂遊苑甲辰輿駕幸樂游苑採甘露宴羣臣七年閏九月甘露頻降樂遊苑丁未輿駕幸樂遊苑採甘露宴羣臣魏書明元帝本紀永興四年四月乙未宴羣臣於西宫使各獻直言五年十一月大享於西宫神瑞二年二月丁亥大享於西宫泰常七年二月丙戌車駕還宫大享於西宫太武帝本紀始光二年九月永安安樂二殿成丁卯大享以落之文成帝本紀太安四年九月辛亥太華殿成丙寅享羣臣孝文帝本紀太和九年正月癸未大享羣臣於太華殿班賜皇誥十年正月癸亥朔帝始服衮冕朝享萬國十六年正月戊午朔享羣臣於太華殿十月庚戌太極殿成大享羣臣十七年正月壬子朔帝享百寮於太極殿十八年夏五月乙亥詔罷五月五日七月七日饗蕙田案重午七夕之宴未詳始於何時宣武帝本紀景明三年十二月壬寅饗羣臣於太極前殿出帝本紀太昌二年正月庚寅朔朝享羣臣於太極殿北齊書文宣帝本紀天保九年十一月甲午帝至自晉陽登三臺御乾象殿朝宴羣臣並命賦詩北周書明帝本紀武成二年春正月癸丑朔大㑹羣臣於紫極殿始用百戲焉三月辛酉重陽閣成㑹羣公列將卿大夫於芳林園賜錢帛各有差武帝本紀天和元年春正月辛巳路寢成幸之令羣臣賦古詩京邑耆老並預㑹焉三年春三月丁未大㑹百寮及四方賔客於路寢建徳六年夏四月庚戌大㑹羣臣及諸蕃客於路寢隋書高祖本紀開皇三年三月庚申宴百寮十二年十一月辛亥有事於南郊壬子宴百寮頒賜各有差煬帝本紀大業十一年正月甲午朔大享百寮右魏晉至隋宴饗唐開元禮皇帝正至受羣臣朝賀并㑹儀皇帝千秋節受羣臣朝賀并㑹儀俱見朝賀門冊府元龜武徳元年五月戊申宴羣臣賜帛各有差八月庚子設宴三品以上賜雜綵各有差二年二月癸巳宴羣臣臨奏九部樂賜錢各有差極歡而罷三年七月戊辰宴羣臣八月庚戌宴羣臣奏九部樂於庭賜布帛各有差四年五月癸亥宴五品以上奏九部樂於庭七月戊辰宴羣臣奏九部樂於庭帝舉酒屬百官極歡乃罷賜錢帛各有差五年正月壬子幸昆明池宴從官賜帛各有差三月己酉宴羣臣賜帛各有差舊唐書髙祖本紀武徳六年春三月乙未幸昆明池宴百官夏四月己未舊宅改為通義宫於是置酒高㑹賜從官帛各有差冊府元龜武徳六年三月己丑宴五品以上於昭徳殿賜帛各有差九月丙子宴五品以上於内苑舉酒以屬羣臣極歡而罷十月甲辰以有年宴羣臣賜物各有差七年四月癸卯宴羣臣奏九部樂賜帛各有差八年三月丁酉宴羣臣於𤣥武門陳倡優爛熳之伎四月丁未赤雀巢於殿門宴五品以上上頌者十餘人極歡而罷五月乙巳宴五品以上及外戚於内殿賦詩賜綵極歡而罷九年五月乙卯宴羣臣太宗以武徳九年八月甲子即位甲戌宴羣臣於顯徳殿前賜帛各有差舊唐書音樂志貞觀元年宴羣臣始奏秦王破陣之曲冊府元龜貞觀二年五月丙辰以夏麥大稔宴羣臣奏九部樂於庭賜帛各有差九月壬子宴羣臣奏九部樂賜帛各有差賜天下大酺三日慶有年也十一月甲子宴羣臣賜帛各有差三年正月甲子宴羣臣奏九部樂歌太平舞獅子於庭賜帛有差四年二月己酉宴三品以上於中華殿三月戊辰宴三品以上於林光殿賜物各有差七月壬辰宴羣臣於芳華殿奏九部樂於庭帝大悦親舉酒以屬羣臣羣臣奉觴稱慶極歡而罷賜帛各有差五年正月甲戌宴羣臣奏九部樂歌太平舞獅子賜從官帛各有差舊唐書音樂志貞觀六年太宗行幸慶善宫宴從臣於渭水之濵賦詩十韻其宫即太宗降誕之所車駕臨幸每特感慶賞賜閭里有同漢之宛沛焉於是起居郎吕才以御製詩等於樂府被之管絃名為功成慶善樂之曲令兒童八佾皆進徳冠紫袴褶為九功之舞冬至享讌及國有大慶與七徳之舞皆奏於庭冊府元龜六年正月甲戌宴三品以上於百福殿賜物各有差二月戊寅宴三品以上於丹霄殿賜帛各有差閏八月己卯宴近臣於丹霄殿樓帝甚懽夜分乃散各賜錢帛有差七年正月癸巳宴三品以上於𤣥武門賜帛各有差十一年正月壬辰宴五品以上於兩儀殿賜帛各有差三月庚子宴三品以上於西苑帝御龍舟汎於積翠池十一月庚戌宴五品以上於貞觀殿奏九部樂賜帛各有差十三年正月庚子㑹羣臣奏功成慶善及破陣之樂十四年正月己酉宴羣臣於𤣥武門奏倡優百戲之樂賜物各有差九月乙巳宴京官五品以上於兩儀殿奏九部之樂十六年十一月乙亥以輿駕還宫宴百寮奏十部樂先是伐高昌収其樂工付太常増九部樂為十部十八年二月卒酉詔三品以上賜宴於𤣥武門帝既工𨽻書又好飛白於王衛之間别更立意遂觸類増長精妙絶倫每有新竒羣臣無不下拜啟請是日帝操筆作飛白書羣臣乗酒就帝手中相競散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登御床罪當死請引付法帝笑而言曰昔有媫妤辭輦今見常侍登牀五月甲戌詔司徒長孫無忌以下十餘人於丹霄殿賜宴各賜膜皮舊唐書高宗本紀永徽元年春正月壬寅御太極殿受朝而不㑹冊府元龜永徽三年二月甲辰宴三品於百福殿帝舉酒極歡賜以錦綵各有差甲寅京城百姓以嵗旱帝避正寢撤膳遂降甘雨相率宴樂兼奏倡優百戲帝御安福門樓以觀之五年四月癸巳宴文武羣官及麟遊縣老人於𤣥武門賜物各有差顯慶元年正月己卯宴文武羣官及朝集使蕃客京城老人八十以上賜物各有差麟徳元年八月丙子帝自萬年宫還便幸舊宅丁丑宴羣臣賜物有差舊唐書髙宗本紀乾封元年春正月癸酉宴羣臣陳九部樂賜物有差日昳而罷册府元龜咸亨三年六月甲寅御冷泉亭子召許敬宗及東西臺三品舉酒作樂舊唐書高宗本紀上元元年九月辛亥百寮具新服上宴之於麟徳殿儀鳳三年秋七月丁巳宴近臣諸親於咸亨殿調露二年春正月乙酉宴諸王諸司三品以上諸州都督刺史於雒城南門樓奏新造六合還淳之舞中宗本紀景龍三年春正月乙亥宴侍臣及近親於黎園亭宴侍臣學士九月壬戌幸九曲亭子宴侍臣學士四年三月甲寅幸臨渭亭修禊飲賜羣臣栁棬以辟惡四月丁亥上遊櫻桃園引中書門下五品以上諸司長官學士等嘗櫻桃便令馬上口摘置酒為樂乙未幸隆慶池結綵為樓宴侍臣泛舟戲樂𤣥宗本紀先天二年九月己卯宴王公百寮於承天門令左右於樓下撒金錢許中書門下五品以上官及諸司三品以上官争拾之冊府元龜開元十年正月乙巳御含元殿宴羣臣十五年十一月庚子御含元殿宴羣臣十六年十一月丙午御含元殿宴羣臣舊唐書𤣥宗本紀開元十七年秋八月癸亥上以降誕日讌百僚於花萼樓蕙田案此聖節設宴之始自後開元二十三年二十四年二十五年二十八年天寳十四載俱以降誕日宴羣臣或在花萼樓或在廣達樓或在勤政樓至乾元元年於金明樓宴百官則在内禪之後冊府元龜二十三年七月戊寅以藉田禮畢大置酒於應天門以㑹百官二十五年正月己丑以望日命有司於勤政樓前樹燈宴羣臣於樓下蕙田案正月望日宴羣臣始見於此舊唐書𤣥宗本紀開元二十八年春正月壬寅以望日御勤政樓讌羣臣連夜燒燈㑹大雪而罷因命自今常以二月望日夜為之天寳四載春三月甲申宴羣臣於勤政樓冊府元龜天寳四載二月勅今月十四十五十六日宜令中書門下及兩省供奉官諸司文官四品以上郎官御史節度採訪使等並於花萼樓下宴五載正月勅今月十四十五十六日宜令中書門下及兩省供奉官文官四品以上武官三品以上正員並御史中丞嗣王郡王郎官御史節度使並於花萼樓下參宴不須入朝舊唐書𤣥宗本紀十三載三月丙午御躍龍殿門張樂宴羣臣極歡而罷壬戌御勤政樓大酺十四載春三月丙寅宴羣臣於勤政樓奏九部樂上賦詩效柏梁體冊府元龜乾元二年九月丙寅帝降誕日宴百官於宣政殿前賜絹三千匹寳應元年八月丁巳宴宰臣及師保常侍給舍中丞六尚書左右丞侍郎諸司長官等於延英殿賜物有差永泰元年正月辛亥宴宰臣及兩省五品以上御史臺五品以上尚書省四品以上等官及諸司長官於延英殿大歴五年六月辛丑宴宰臣節度使六尚書御史大夫京兆尹於内殿六年正月己夘宴宰臣及節度使六尚書御史大夫京兆尹判度支户部侍郎於内殿賜物有差八年閏十一月癸亥宴宰臣及節度使轉運使御史大夫京兆尹判度支戸部侍郎於内殿九年四月辛巳宴宰臣及諸節度使轉運使御史大夫京兆尹判度支户部侍郎及勲舊大臣於内殿賜物有差十年八月乙亥宴宰臣及御史大夫節度使轉運使判度支户部侍郎京兆尹於三殿十三年正月甲戌帝御三殿宴宰臣及節度使轉運使判度支户部侍郎京兆尹等賜物有差二月庚辰帝御三殿宴侍臣五品以上御史臺五品以上尚書省四品以上及節度觀察在城判官等并宰臣勲臣兄弟等並赴㑹凡三日連宴錫賚極於豐厚十四年二月壬辰帝御三殿宴宰臣及兩省供奉官并文武百寮賜物有差癸巳又御三殿宴至徳以來勲臣子弟及藩邸舊臣子弟賜物有差順時令廣恩也舊唐書徳宗本紀貞元四年春正月甲寅宴羣臣於麟徳殿設九部樂内出舞馬上賦詩一章羣臣屬和九月丙午詔比者卿士内外左右朕躬朝夕公門勤勞庶務今方隅無事蒸庶小康其正月晦日三月三日九月九日三節日宜任文武百寮選勝地追賞為樂每節宰相及常參官共賜錢五百貫文翰林學士一百貫文左右神威神策等軍每廂共賜錢五百貫文金吾英武威逺諸衛將軍共賜錢二百貫文客省奏事共賜錢一百貫文委度支每節前五日支付永為常式癸丑賜百寮宴於曲江亭仍在重陽賜宴詩六韻賜之羣臣畢和上品其優劣以劉太真李紓為上等鮑防于邵為次等張濛殷亮等二十人又次之惟李晟馬燧李泌三宰相之詩不加優劣六年春二月戊辰朔百寮㑹宴於曲江亭上賦中和節羣臣賜宴七韻三月庚子百寮宴於曲江亭上賦上已詩一篇賜之蕙田案徳宗移正月晦日宴於二月朔改名中和節冊府元龜貞元八年正月詔三節宴集先已賜諸衛將軍錢其部率以下可賜錢百千八月詔九日宴㑹宜罷舊唐書徳宗本紀九年春二月庚戌朔先是宰相以三節次宴府縣有供帳之弊請以宴錢分給各令諸司選勝宴㑹從之是日中和節宰相宴於曲江亭諸司隨便自是分宴焉秋九月己卯罷九日宴以太師晟䘮也十年秋九月戊子賜百寮九日宴上賦詩賜之冊府元龜十年九月十日以重陽宴賜百寮追賞初九日以雨罷宴及是方㑹宴舊唐書徳宗本紀十一年春三月辛未賜宰臣兩省供奉官宴於曲江亭秋九月己卯賜宰臣兩省供奉官宴於曲江亭賦詩六韻賜之冊府元龜十二年二月己卯寒食節帝御麟徳殿之東亭觀武臣及勲戚子弟㑹毬兼賜宰臣讌饌於宰臣位後施畫屏風圖漢魏名相仍紀其嘉言美行題之於下宰臣各賜錦綵百疋銀瓶盤各一具其從官直省各有差蕙田案寒食節賜宴始此舊唐書徳宗本紀十三年春二月丁巳賜宰臣兩省供奉官宴於曲江亭秋九月辛卯九日宴宰臣百官於曲江亭上賦詩以賜之十四年春二月戊午上御麟徳殿宴文武百寮初奏破陣樂徧奏九部樂及宫中歌舞妓十數人列於庭先是上制中和樂舞曲是日奏之日晏方罷比詔二月一日中和節宴以雨雪改用此日上又賦仲春麟徳殿宴羣臣詩八韻頒賜羣臣有差冊府元龜十四年二月壬子朔以雨雪不克宴㑹改俟他日九月重陽節以襄陽節度樊澤卒廢朝其百官宴享宜改取十一日舊唐書徳宗本紀十五年春二月罷中和節宴㑹年凶故也癸卯罷三月羣臣宴賞嵗饑也冊府元龜十五年九月詔罷今年重陽日宴會是日吳少誠逆徒圍許州十六年正月詔罷今年中和節宴㑹二月詔罷今年三月三日宴㑹九月壬寅駙馬都尉郭曖卒罷九日宴會舊唐書徳宗本紀十七年春二月癸巳朔賜羣臣宴於曲江亭上賦中和節賜宴曲江詩六韻賜之三月乙丑賜羣臣宴於曲江亭秋九月戊辰賜羣臣宴於曲江亭上賦九日賜宴曲江詩六韻賜之十八年春二月戊子朔賜羣臣宴於馬璘之山池三月乙丑賜羣臣宴於馬璘之山池秋九月癸亥賜羣臣宴於馬璘山池上賦九日賜宴詩六韻賜之十九年春二月壬午朔賜宴於馬璘之山池蕙田案時馬璘宅已没入官為奉誠園故賜羣臣宴於此冊府元龜十九年三月上巳賜中書門下及兩省供奉官㑹宴於馬璘池亭舊唐書徳宗本紀二十年春二月丙午朔罷中和節宴嵗儉也九月庚辰賜羣臣宴於馬璘山池憲宗本紀元和二年春正月丁巳停中和重陽二節賜宴其上巳宴仍舊賜之二月丁丑寒食節宴羣臣於麟徳殿賜物有差冊府元龜元和二年三月上巳節賜宰臣百寮合宴於曲江亭舊唐書憲宗本紀七年三月辛酉以惠昭太子葬罷曲江上已宴冊府元龜七年九月甲子重陽節賜百官宴於曲江八年九月戊午賜羣臣宴於曲江九年九月壬午重陽節賜百官宴於曲江十一年七月丙寅權停重陽日曲江賜宴十二年八月癸未勅今年重陽日公卿宴宜權停十三年二月乙亥御麟徳殿宴宰臣及太子三少六尚書左右丞侍郎御史中丞中書門下省五品以上官翰林學士京兆尹度支鹽鐵使左右金吾將軍威逺皇城六軍及諸衛大將軍駙焉都尉諸道朝覲節度使公主郡主等觀擊鞠角觝之戲大合樂極歡而罷以錦綵銀器頒賜有差丙子又召宰相師保中丞京尹度支鹽鐵使並入内觀諸親及軍使㑹鞠十四年三月乙酉宴文武百寮於麟徳殿丙戌又宴宰輔及大臣翰林學士於禁中舊唐書穆宗本紀元和十五年九月戊申以重陽節曲宴郭釗兄弟貴戚主壻等於宣和殿長慶元年二月辛卯寒食節宴羣臣於麟徳殿頒賜有差三年三月丁巳朔宰臣百寮賜宴於曲江亭九月賜宰臣百寮重九宴於曲江亭冊府元龜長慶三年時韋綬為太子侍讀綬之在書府遇重陽日百官有曲江之宴特請與集賢學士等别為一㑹從之舊唐書敬宗本紀寳歴元年春三月宴羣臣於三殿二年春二月丁巳寒食節三殿宴羣臣自戊午至庚申方止三月甲戌賜宰臣百寮上巳宴於曲江亭文宗本紀太和六年正月乙未朔以久雪廢元㑹二月己丑寒食節上宴羣臣於麟徳殿八年三月甲寅上巳賜羣臣宴於曲江亭九年冬十月壬午賜羣臣宴於曲江亭冊府元龜開成元年二月京兆尹歸融因對奏上巳日曲江宴縁初遇雨公主出降物力不辦請改日帝曰去年重陽改就九月十九日未失重九之意今上巳日改取十三日可乎融受命而退舊唐書文宗本紀開成二年三月丙寅罷曲江宴八月敕慶成節宜令京兆尹准上巳重陽例於曲江㑹文武百寮延英奉觴宜權停十月庚子慶成節賜羣臣宴於曲江三年十月甲子慶成節命中人以酒酺仙韶樂賜羣臣宴於曲江亭四年正月丁卯夜於咸泰殿觀燈作樂三宫太傅諸公等畢㑹三月乙酉賜羣臣上巳宴於曲江冬十月戊午慶成節賜羣臣宴於曲江亭武宗本紀㑹昌二年五月敕慶成節百官率醵外别賜錢三百貫以備素食合宴仍令京兆府供帳用追集坊市樂人蕙田案唐時宴饗羣臣見於舊唐書及册府元龜者多矣元旦冬至朝㑹大宴也正月望日及晦日徳宗改於二月朔名中和節上巳寒食重陽及誕聖節俱有賜宴節宴也若無事而宴宰臣及三品四品五品以上不為定期即宋之曲宴也開元禮及唐書禮樂志惟有元至及千秋節饗㑹儀注其餘皆無之今摭採舊書及册府元龜所載以存一代之制至於外臣朝辭及勲臣特宴概不及焉右唐宴饗冊府元龜後唐同光元年八月癸卯以内園新殿成名曰長春殿宴大臣賜分物有差十月辛巳萬夀節宴長春殿賜百官分物己亥宴於崇元殿十二月丁亥宴羣臣於嘉慶殿二年四月庚辰宴武臣於嘉慶殿九月癸卯宴大臣於長春殿丁未又宴羣臣於嘉慶殿十月丙寅朔宴大臣於嘉慶殿丁亥宴羣臣於長春殿壬辰嘉慶殿宴近臣十一月丙寅朔宴大臣於嘉慶殿戊子宴羣臣於嘉慶殿壬辰宴近臣於嘉慶殿三年閏十二月庚午宴諸王武臣於長春殿始聴樂四年二月戊子朔宴武臣於嘉慶殿天成元年五月甲戌宴文武百寮於長春殿二年二月癸未宴武臣於長春殿三月壬子朔幸㑹節園宰相樞宻使及節度使在京者共進錢絹請宴四月戊子幸㑹節園召宰臣學士在京勲臣赴宴八月戊戌宴宰相學士及勲臣於長春殿九月己未宴在京藩侯郡守於長春殿各有頒賜甲子宴羣臣於長春殿賜物有差乙丑宴樞宻使及在京節度使内諸司使等於長春殿十月乙未帝在汴宴宰臣學士諸將校等於玉華殿丁酉宴羣臣於玉華殿乙巳宴於元徳殿三年二月辛巳宴從臣於玉華殿戊戌開社宴於玉華殿三月戊申宴百寮於玉華殿丁卯宴從臣於南莊八月戊戌宴侍臣於玉華殿九月乙丑帝在汴宴百辟於玉華殿十一月壬午宴宰臣學士及東都留守孔循於麟趾殿四年三月乙酉宴宰相在京節度使於中興殿辛卯宴百辟於長春殿丙申幸㑹節園召從臣赴宴四月丙午宴於中興殿八月戊戌宴勲臣於廣夀殿丁巳宴大臣於長春殿九月乙酉宴羣臣於長春殿十一月戊辰宴勲臣於廣夀殿長興元年二月乙未宴羣臣於長春殿酬郊祀行事也二月丁卯幸㑹節園宴宰相及諸道入覲節度使賜物有差四月己亥幸㑹節園宴大臣至暮歸宫六月宴羣臣於長春殿九月壬申宴百官於長春殿二年三月己亥宴羣臣於長春殿賜物有差四月丁酉幸㑹節園宴宰臣親王内臣及在京侯伯五月癸酉宴羣臣於長春殿九月丁酉宴百寮於長春殿十二月己巳宴近臣於長春殿三年二月戊午宴羣臣於長春殿四月宴羣臣於長春殿九月壬辰宴羣臣於長春殿教坊進新曲奏畢賜名長興殿四年三月辛卯宴百寮於長春殿十一月癸未宴近臣及諸軍將校於中興殿清泰元年五月甲寅宴羣臣於長春殿二年三月丙午宴羣臣於長春殿宰臣樞宻使前任節度使六統軍進捧觴獻夀日夕而罷辛酉宰臣學士皇子樞宻宣徽使侍衛馬歩都指揮使共進錢五十萬絹五百疋請開宴五代史晉本紀天福六年二月戊申停買宴錢蕙田案宴饗之禮以示慈惠五季之臣争進錢以求開宴非禮甚矣晉祖罷之是也冊府元龜後晉天福六年五月甲戌宴羣臣於永福殿七月甲戌宴宰臣前任見任節度刺史統軍行軍副使於永福殿八月戊申宴文武百官於武徳殿九月庚辰宴文武百官於武徳殿諸道進奉使來朝者亦與焉十月壬寅宴宰臣節度防禦團