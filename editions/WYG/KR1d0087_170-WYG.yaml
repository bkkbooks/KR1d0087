禍福而觀威儀也故宴以禮成賔以賢序風雅之作兹為盛焉伏見近年内殿賜宴羣臣當坐於朶殿兩廊者拜舞方畢趨馳就席品列之序糾紛無别及至尊舉爵羣臣起立先後不整俯仰失節欲望自今令有司預依品位告諭其有踰越班次拜起失節喧嘩過甚者並令糾舉又惟飫賜之典以寵武夫大烹之餘故為盛饌計一飯所費可數人之屬厭而將校輩或至終宴之時尚有欲炙之色蓋執事者失於察視不及潔豐而使然也伏望並申嚴制至道元年三月御史中丞李昌齡亦言廣宴之設以均飫賜得齒髙㑹宜乎盡禮而有位之士鮮克致恭當糾其不恪又供事禁庭當定員數籍姓名以謹其出入酒殽之司或虧精潔望分命中使廵察並從之真宗本紀咸平二年八月丁巳大宴崇徳殿始作樂十一月庚寅大宴含光殿禮志咸平三年二月大宴含光殿自是始備設春秋大宴五年御史臺言大宴起居舍人司諫正言三院使御史並坐於殿廊望自今移升朶殿自餘依舊十二月詔凡内宴宗正卿令升殿坐班次依合班儀翰林學士梁灝請以春秋大宴小宴賞花行幸次為四圖頒下閤門遵守從之景徳二年九月詔曰朝㑹陳儀衣冠就列將以訓上下彰文物宜慎等威用符紀律况屢頒於條令宜自顧於典刑稍歴嵗時漸成懈慢特申明制以儆具寮自今宴㑹宜令御史臺預定位次各令端肅不得諠譁違者殿上委大夫中丞朶殿委知雜御史侍御史廊下委左右廵使察視彈奏内職殿直以上赴起居入殿庭行私禮者委閤門彈奏其軍員令殿前侍衛司各差都校一人提轄但虧失禮容即送所司勘斷訖奏仍令閤門宣徽使互相察舉敢蔽匿者糾之真宗本紀景徳二年十一月庚申大宴含光殿三年秋七月甲子大宴含光殿始用樂四年八月丁未中書門下言莊穆皇后祥除已久秋宴請舉樂不允壬子中書門下再表請秋宴聴樂又不允大中祥符元年十一月丁丑帝至自泰山乙酉大宴含光殿禮志大中祥符元年十一月詔宣徽院御史臺閤門殿前馬歩軍司凡内宴臣寮軍員并祗候使臣等並以前後儀制曉諭務令遵禀違者宻具名聞其軍員有因酒言詞失次及醉仆者即先扶出或遣殿前司量添廵檢軍士䕶送歸營又詔臣僚有託故請假不赴宴者御史臺糾奏真宗本紀四年二月大宴羣臣於穆清殿三月丙戌大宴大明殿四月丙辰大宴含光殿蕙田案改大明殿為含光在太宗朝此復云大明殿疑誤九年八月戊子以旱罷秋宴天禧元年九月戊申以蝗罷秋宴禮志天禧四年直集賢院祖士衡言大宴將更衣羣臣下殿然後更衣更衣後再坐則羣臣班於殿庭候上升坐起居謝賜花再拜升殿天聖三年監察御史朱諫言伏見大宴宗室先退允為得禮尚有文武臣僚父子兄弟皆預再坐欲望自今内宴百官有父子兄弟叔姪同赴再坐時卑者先退慶歴七年御史言凡預大宴并御筵其所賜花並須戴歸私第不得更令僕從持戴違者糾舉仁宗本紀慶歴八年八月己丑以河北京東西水災罷秋宴嘉祐七年春三月甲子以旱罷大宴禮志熈寧二年正月閤門言凖詔裁定集英殿宴入殿人數中書二十二人樞宻院三十人宣徽院八人親王八人昭徳軍節度使兼侍中曹佾三人皇親使相三人皇親正刺史以上至節度使并駙馬都尉各一人翰林司一百七十八人御厨六百人儀鸞司一百五十人祗候庫二十人内衣物庫七人新衣庫七人内弓箭庫三人鈐轄教坊所三人鐘鼓樓一十六人御藥院八人内物料庫九人法酒庫一十六人内酒坊八人入内内侍省前後行親事官共五人皇城司職員手分二人御史臺知班一十一人灑掃親從官人員已下一百人兩廊覷歩親從官四十二人提舉司勾押官手分三人提舉火燭廵檢人員一十人快行親從官一十一人支散兩省花後苑造作所工匠等四人客省承受行首八人四方館職掌二人閤門承受行首已下一十八人是嵗十一月以皇子生宴集英殿七年九月詔自今大宴親王皇親使相樞宻使副使宣徽使駙馬都尉並於殿門外幕次就賜酒食舊制㑹食集英西廊之廡下喧嘩為甚權發遣宣徽院吳充奏其事故有是命神宗本紀元豐二年九月丁亥大宴集英殿禮志元豐七年三月大宴集英殿命皇子延安郡王侍立宰相王珪等率百官廷賀詔曰皇家慶事與卿等同之珪等再拜稱謝久之王乃退時王未出閤帝特令侍宴以見羣臣九年閤門言大宴不用兩軍妓女只用教坊小兒之舞王拱辰請以女童代之蕙田案元豐紀元止於八年此云九年者蓋九月之誤八年詔罷獨看故事大宴前一日御殿閲百戲謂之獨看修國史范祖禹言是日進神宗紀草陛下覽先帝史册甫畢即觀百戲理似未安故請罷之蕙田案獨看之禮本不經見况在諒闇之中乎淳夫請罷之極是元祐三年二月罷春宴八月罷秋宴以魏王出殯翰林學士蘇軾不進教坊致語故也是後以時雨未足集英殿試舉人尚書省火禁中祈禳邠國公主未菆皆罷宴凡大宴有故而罷則賜預宴官酒饌於閤門朝堂升殿官雖假故不從游宴亦遣中使就第賜焉親王中書樞宻宣徽三司使副學士歩軍都虞候以上三師三公東宫三師三公以下曽任中書門下致仕者亦同哲宗本紀元祐四年三月丁亥以不雨罷春宴紹聖三年三月壬辰以禁中屢火罷春宴四年九月壬子以星變罷秋宴元符元年九月丁未以霖雨罷秋宴二年九月壬戌雨罷秋宴禮志大觀三年議禮局上集英殿春秋大宴儀其日預宴文武百寮詣殿庭東西相向立皇帝出御需雲殿閤門内侍管軍等起居皇帝降坐御集英殿鳴鞭殿中監以下通班起居殿中監少監升殿通喚閤門官升殿攝左右軍廵使鞾笏起居訖繫鞵執杖侍立餘非應奉官分出次鐘鼓樓節級就位四拜起居次舍人通喚訖分引羣官横行北向東上閤門官贊太起居班首出班俛伏跪致辭訖