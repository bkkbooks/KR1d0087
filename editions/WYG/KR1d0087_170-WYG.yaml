請自今宴設羣臣非大故與實有疾病無得託辭仍令御史臺察舉二年八月實録書成皆宴垂拱殿十月修定閤門儀制所言垂拱殿曲宴當直翰林學士與觀文資政龍圖寳文樞宻直龍圖天章寳文閣直學士並赴坐而翰林學士兼他職者不預考之官制似未齊一請自今曲宴翰林學士與雜學士並赴從之蕙田案書成賜宴始此神宗本紀元豐五年秋七月丁未垂拱殿宴修史官十一月庚寅紫宸殿宴侍祠官禮志紹聖三年十一月以進神宗皇帝實録畢曲宴宰臣執政文臣試侍郎執政武臣觀察使以上并修國史官赴坐元符元年五月詔受寳畢宴於紫宸殿宰臣以下文武執事官六曹員外郎監察御史以上武臣郎將諸軍副指揮使以上預坐大觀三年議禮局上垂拱殿曲宴儀皇帝視事畢東上閤門進呈坐圖舍人奏閤門無公事皇帝降坐鳴鞭入殿後閤諸司排設備東上閤門附内侍奏班齊皇帝出閤升坐鳴鞭三公直學士以上親王使相至觀察使以上分東西入詣殿庭横行北向立定班首奏聖躬萬福舍人贊各就坐再拜訖分引詣東西階升殿席前相向立次教坊使以下常起居次看醆人謝升殿次内侍進御茶床殿侍酹酒訖閤門諸御坐躬奏班首姓名以下進酒舍人分引殿上臣僚横行北向贊再拜班首奉酒躬進樂作皇帝飲訖舍人贊各賜酒羣官俱再拜贊各就坐羣官皆立席後復贊就坐酒初行先宰相次百官皆作樂後凖此尚食興奉御進食太官令設羣官食酒五行若宣示醆即随所向閤門揖稱宣示醆躬贊就坐若宣勸即立席後躬飲贊再拜内侍舉茶床舍人引班首以下降階横行北向再拜分班出皇帝降坐上巳重陽賜宴儀其日預宴官以下並赴宴所就次諸司排設備預宴官以下詣庭中望闕位立次中使詣班首之左稍前立中使宣曰有敕在位官皆再拜訖中使宣曰賜卿等御筵在位官皆再拜搢笏舞蹈又再拜中使退預宴官分東西升階就坐酒行樂作飲訖食畢樂止酒五行預宴官並興就次賜花有差少頃戴花畢預宴官詣望闕位立謝花再拜訖復升就坐酒行樂作飲訖食畢樂止酒四行而退蔡京保和殿曲宴記宣和元年九月十二日皇帝召臣蔡京臣王黼臣燕王俣臣楚王似臣嘉王楷臣嗣濮王仲理臣童貫臣馬熈載臣蔡攸臣蔡絛臣蔡脩宴保和殿李邦彦延福宫曲宴記宣和二年十二月癸巳召宰執親王等曲宴於延福宫特召學士承㫖臣邦彦學士臣宇文粹中與示異恩也蕙田案以上宋曲宴宋史禮志賜酺自秦始秦法三人以上㑹飲則罰金故因事賜酺吏民㑹飲過則禁之唐嘗一再舉行太宗雍熈元年十二月詔曰王者賜酺推恩與衆共樂所以表升平之盛事契億兆之歡心累朝以來此事久廢蓋逢多故莫舉舊章今四海混同萬民康泰嚴禋始畢慶澤均行宜令士庶之情共慶休明之運可賜酺三日二十一日御丹鳳樓觀酺召侍臣賜飲自樓前至朱雀門張樂作山車旱船徃來御道又集開封府諸縣及諸軍樂人列於御街音樂雜發觀者溢道縱士庶遊觀遷市肆百貨於道之左右召畿甸耆老列坐樓下賜之酒食明日賜羣臣宴於尚書省仍作詩以賜明日又宴羣臣獻歌詩賦頌者數十人景徳四年二月甲申上御五鳳樓觀酺宗室近臣侍坐樓前露臺奏教坊樂後二日上復御樓賜宗室文武百官宴於都亭驛賜諸班諸軍將校羊酒大中祥符元年正月詔應致仕官並令赴都亭驛酺宴御樓日合預坐者亦聴又詔朝臣已辭未見並聴赴㑹凡賜酺命内諸司使三人主其事於乾元樓前露臺上設教坊樂又駢繫方車四十乗上起綵樓者二分載鈞容直開封復為棚車二十四每十二乗為之皆駕以牛被之錦繡縈以綵紖分載諸軍京畿伎樂又於中衢編木為欄處之徙坊市邸肆對列御道百貨駢布競以綵幄樓版為飾上御乾元門召京邑父老分畨列坐樓下傳㫖問安否賜以衣服茶帛若五日則第一日近臣侍坐特召丞郎給諫上舉觴教坊樂作二大車自昇平橋而北又有旱船四挾之以進棚車由東西街交鶩並往復日再焉東距望春門西連閶闔門百戲競作歌吹騰沸宗室親王近列牧伯洎舊臣宗室官為設綵棚於左右廊廡士庶縱觀車騎填溢歡呼震動第二日宴羣臣百官於都亭驛宗室於親王宫第三日宴宗室内職於都亭驛近臣於宰相第第四日宴百官於都亭驛宗室於外苑第五日復宴宗室内職於都亭驛近臣於外苑上多作詩賜令屬和及别為勸酒詩禁軍將校日㑹於殿前馬歩軍之廨蕙田案以上宋賜酺之宴又案秦漢以下賜大酺者俾吏民㑹聚飲酒非朝廷宴饗之禮也宋始於御樓觀酺之日賜宗室臣工宴以樂之一時民物蕃庶及上下同樂之意皆可想見觀承案賜酺雖不見於經然周禮地官族師云春秋祭酺亦如之注云酺者為人物災害之神也族長無飲酒之禮因祭酺而與其民以長㓜相獻酬焉豈非即酺飲之禮乎王氏曰古禮民不得羣飲故漢文賜民大酺五日此言春秋祭酺蓋亦祭社畢而民得相與飲酒因以書其行也据此則祭酺即賜酺之始無疑故秦漢以來都行之但相沿而轉失其實或不必祭酺而直賜之大酺五日耳是則經證顯然宋志謂始於秦者特考之未詳耳禮志游觀天子嵗時游豫則上元幸集禧觀相國寺御宣徳門觀燈首夏幸金明池觀水嬉瓊林苑宴射大祀禮成則幸太一宫集禧觀相國寺恭謝或詣諸寺觀焚香或至近郊閲武觀稼其事蓋不一焉三元觀燈本起於方外之説自唐以後常於正月望夜開坊市門然燈宋因之上元前後各一日城中張燈大内正門結綵為山樓影燈起露臺教坊陳百戲天子先幸寺觀行香遂御樓或御東華門及東西角樓飲從臣四夷蕃客各依本國歌舞列於樓下東華左右掖門東西角樓城門大道大宫觀寺院悉起山棚張樂陳燈皇城雉堞亦徧設之其夕開舊城門逹旦縱士民觀後增至十七十八夜蕙田案以上宋游觀及觀燈之宴紀志所載事迹甚繁以非宴饗之正故畧而不叙右宋宴饗遼史太宗本紀天顯四年春正月壬申朔宴羣臣及諸國使觀俳優角觝戲五月癸酉謁二儀殿宴羣臣㑹同三年五月庚午以端午宴羣臣及諸國使命回鶻燉煌二使作本俗舞俾諸使觀之穆宗本紀應歴十四年冬十一月壬午日南至宴飲逹旦十六年秋九月庚子以重九宴飲夜以繼日至壬子乃罷十七年夏五月壬午罷重五宴十八年正月乙酉朔宴於宫中不受賀己亥觀燈於市以銀百兩市酒命羣臣亦市酒縱飲三夕景宗本紀乾亨四年三月乙未清明與諸王大臣較射宴飲聖宗本紀統和三年閏九月庚辰重九駱駝山登髙賜羣臣菊花酒五年春三月幸長春宫賞花釣魚以牡丹徧賜近臣歡飲累日道宗本紀清寧元年十二月應聖節上太皇太后夀宴羣臣命婦四年十一月癸酉行再生及柴冊禮宴羣臣於八方陂蕙田案遼時正旦冬至生辰清明重五重九皆有宴又仿宋制有賞花釣魚宴又有頭魚頭鵞宴及再生柴册禮成宴則國俗所有也金史禮志曲宴儀皇帝即御座鳴鞭報時畢殿前班小起居到侍立位引臣僚并使客左入傍折通班至丹墀舞蹈五拜各上殿祗候分引預宴官上殿其餘臣僚右出次引宋使從人入至丹墀再拜不出班奏聖躬萬福又再拜有敕賜酒食又再拜引左廊立次引高麗夏從人入分左右廊立果牀入進酒皇帝舉酒時上下侍立官並再拜接盞畢進酒官到位當坐者再拜坐即行臣使酒傳宣立飲畢再拜坐次從人再拜坐至四盞餅茶入致語聞鼓笛時揖臣使并從人立口號絶坐宴并侍立官並再拜坐次從人再拜坐食入五盞歇宴教坊謝恩畢揖臣使起果牀出皇帝起入閤臣使下殿歸幕次賜花從人随出戴花畢先引從人入左右廊立次引臣使入左右上殿位立皇帝出閤坐果牀入坐立並再拜坐次從人再拜坐九盞將曲終揖從人至位再拜引出聞曲時揖臣使起再拜下殿果牀出至丹墀謝宴舞蹈五拜分引出蕙田案元旦聖誕上夀儀已見朝賀門不重載熙宗本紀皇統元年二月己未上宴羣臣於瑶池殿海陵本紀貞元三年十一月丙辰燕百官於太和殿世宗本紀大定二年正月辛未御太和殿宴百官宗戚命婦賜賚有差三年五月乙未以重五幸廣樂園射栁命皇太子親王百官皆射勝者賜物有差上復御常武殿賜宴擊毬自是嵗以為常二十八年三月御慶和殿受羣臣朝復宴於神龍殿諸王公主以次奉觴上夀上歡甚章宗本紀明昌五年秋七月丙戌以天夀節宴樞光殿承安元年七月御紫宸殿受諸王百官賀賜諸王宰執酒敕有司以酒萬尊置通衢賜民縱飲禮志承安三年正月上諭㫖有司曰比聞宋國花宴殿上不設餚饌至其歇時乃備於廊下今花宴上賜食甚為拘束若依彼例可乎且向者人使見辭殿上亦常有酒禮今已移在館宴矣有司奏曰曲宴之禮舊矣彼方酒一行食一上必相須成禮而國朝之例酒既罷而食始進至於花宴日宋使至客省幕次有酒禮而我使至其幕則有食而無酒各因其舊不必相同古者宴禮設食以示慈惠今遽更之恐逺人有疑失朝廷寵待臣子之意乃命止如舊章宗本紀四年七月敕宣徽院官天夀節凡致仕宰執悉召與宴衛紹王本紀崇慶元年八月萬秋節以兵事不設宴宣宗本紀貞祐三年正月曲宴羣臣宋使定文武五品以上侍坐員遂為常制元史禮樂志元之有國肇興朔漠朝㑹宴饗之禮多從本俗世祖至元八年命劉秉忠許衡始制朝儀而大饗宗親錫宴大臣猶用本俗之禮為多輟耕録天子凡宴享一人執酒觴立於右階一人執柏板立於左階執板者抑揚其聲贊曰斡脱執觴者如其聲和之曰打弼則執板者節一板從而王侯卿相合坐者坐合立者立於是衆樂皆作然後進酒詣上前上飲畢授觴衆樂皆止别奏曲以飲陪位之官謂之喝盞蓋沿襲金舊禮至今不廢諸王大臣非有賜命不敢用焉斡脱打弼未考其儀右遼金元宴饗明史禮志明制有大宴中宴常宴小宴洪武元年大宴羣臣於奉天殿三品以上陞殿餘列於丹墀遂定正旦冬至聖節宴謹身殿禮二十六年重定大宴禮陳於奉天殿永樂元年以郊祀禮成大宴十九年以北京郊社宗廟及宫殿成大宴宣徳正統間朝官不與者給賜節錢明㑹典大宴儀洪武二十六年定是日尚寳司設御座於奉天殿錦衣衛設黄麾於殿外之東西金吾等衛設䕶衛官二十四員於殿東西教坊司設九奏樂歌於殿内設大樂於殿外立三舞雜隊於殿下光禄寺官設酒亭於御座下之西膳亭於御座下之東西向設羣臣四品以上位於殿内之東西設羣臣酒尊食桌於殿外設五品以下位桌於東西兩廊司壺尚食各供乃事引禮引羣臣殿外東西相向立儀禮司跪奏請陞座駕興大樂作陞座鳴鞭樂止鳴贊引文武官四品以上由東西門入殿中横班北向立五品以下官立於殿外丹墀北向立樂作贊四拜樂止光禄寺官進御筵大樂作捧案至御前樂止進花樂作進訖樂止光禄寺官開爵注酒捧詣御前進第一爵酒教坊司跪奏一奏炎精開運之曲贊内外官皆跪教坊司跪奏進酒飲畢贊衆内外官俯伏興樂作贊四拜平身樂止贊各就位序班随進羣臣桌散花樂作散訖樂止序班即進羣臣盞第二爵酒教坊司跪奏二奏皇風之曲樂作光禄寺官斟酒御前序班隨斟羣臣酒教坊司跪奏進酒候皇帝舉酒羣臣以次舉飲訖樂止光禄寺官進湯鼓吹響節前導至殿外鼓吹止殿上樂作羣臣起立光禄寺官進湯御前羣臣復位序班即供羣臣湯樂止教坊司跪奏進湯樂作侯皇帝舉箸羣臣次舉皇帝進湯訖贊饌成樂止武舞入教坊司跪奏平定天下之舞舞畢出第三爵酒教坊司跪奏三奏眷皇明之曲樂作進酒如前儀樂止教坊司跪奏撫安四夷之舞舞畢出第四爵酒教坊司跪奏四奏天道傳之曲樂