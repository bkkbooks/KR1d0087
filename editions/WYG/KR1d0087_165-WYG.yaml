body:
  text: 五禮通考卷一百五十五刑部尚書秦蕙田撰嘉禮二十八昏禮宋史太宗本紀太平興國七年春正月定昏娶儀制禮志諸王納妃聘禮賜女家白金萬兩敵門即古納采用羊二十口酒二十壺綵四十匹定禮羊酒綵各加十茗百斤頭􅔮巾叚綾絹三十匹黄金釵釧四雙條脫一副真珠琥珀瓔珞真珠翠毛玉釵朶各二副銷金生色衣各一襲金塗銀合二錦繡綾羅三百匹果盤花粉花羃眠羊卧鹿花餅銀勝小色金銀錢等物納財用金器百兩綵千匹錢五十萬錦綺綾羅絹各三百匹銷金繡畫衣十襲真珠翠毛玉釵朶各三副函書一架纒束帛押馬函馬二十匹羊五十口酒五十壺繋羊酒紅絹百匹花粉花羃果盤銀勝羅勝等物親迎用塗金銀裝肩輿一行障坐障各一方團掌扇四引障花十樹生色燭籠十髙髻釵揷并童子八人騎分左右導扇輿其宗室子聘禮賜女家白金五千兩其敵門定禮納財親迎禮皆减半逺屬族卑者又减半品官昏禮納采問名納吉納成請期親迎同牢廟見見舅姑姑醴婦盥饋享婦送者並如諸王以下昏四品以下不用盥饋享婦禮士庶人昏禮并問名扵納采并請期於納成其無雁奠者三舍生聽用羊庶人聽以雉及雞鶩代其辭稱吾子親迎質明掌事者設禰位㕔事東間南向壻之父服其服北面再拜祝曰某子某年若干禮宜有室聘某氏第幾女以某日親迎敢告子將行父坐㕔事南向子服其服三舍生及品官子孫假九品服餘並皂衫衣折上巾立父位西少南東向贊者注酒扵醆授子子再拜跪受贊者又以饌設位前子舉酒興即坐飲食訖降再拜進立父位前命之曰釐爾内治徃求爾匹子再拜曰敢不奉命又再拜降出初昏掌事者設酒饌室中置二醆扵槃壻服其服如前服至女家贊者引就次掌事者設禰位主人受禮如請期之儀女盛服立房中父升階立房外之東西向非南向者各隨其所向父立扵門外之左餘倣此贊者注酒扵醆授女女再拜受醆贊者又以饌設于位前女即坐飲食訖降再拜父降立扵東階下賔出次賔謂壻主人迎扵門揖賔入賔報揖從入主人升東階西面賔升西階進當房户前北面掌事者陳雁於階賔曰某受命於父以兹嘉禮躬聽成命主人曰某固願從命賔再拜降出主人不降送初女出父戒之曰徃之女家無忘肅恭母戒之曰夙夜以思無有違命諸母申之曰無違爾父母之訓女出壻先還俟扵門外婦至贊者引就北面立壻南面揖以入至扵室掌事者設對位室中壻婦皆即坐贊者注酒扵醆授壻及婦壻及婦受醆飲訖設饌再飲三飲並如上儀壻及婦皆興再拜贊者徹酒饌見祖禰見舅姑醴婦享送者如儀蕙田案宋品官以下昏禮不如開元禮逺矣太宗本紀至道元年八月禁西北縁邊諸州民與内屬戎人昏娶仁宗本紀天聖八年三月禁以財冒士族娶宗室女者至和元年十月詔士庶家毋得以常傭僱之人為姻違者離之文獻通考公主出降嘉祐二年禮官言禮閣新儀公主出降前一日行五禮古者結昏始用行人告以夫家采擇之意謂之納采問女之名歸卜夫廟吉以告女家謂之問名納吉今選尚一出朝廷不待納采又公主封爵已行誕告不得問名而卜之若納成則既有進財請期則有司擇日宜稍依五禮之名存其物數俾知古者昏姻之事重而夫婦之嚴如此亦不忘古禮之義也時兖國公主下嫁李瑋詔俟出降日令夫家主昏者具合用鴈帛玉馬等物陳扵内東門外以授内謁者進入内中付掌事者受之其馬不入宋史禮志凡宗室昏姻治平中宗正司言宗室女舅姑夫族未立儀制皆當創法詔壻家有二世食禄即許娶宗室女未仕者與判司簿尉已仕者隨資序推恩即壻别祖女别房舊為昏姻而於今尊卑不順者皆許壻之三代郷貫生月人材書劄止令昏主問騐以告宗正寺大宗正司寺司詳視如條保明所進財皆賜壻家令止於本宫納財媒妁使令之人非理求匄許告宗室女事舅姑及見夫之族親皆如臣庶之家其後又令宗室女嫁者祖父有二代任殿直若州縣官以上即許為昏姻英宗本紀治平四年一日語神宗曰國家舊制士大夫之子有尚帝女皆升行以避舅姑之尊朕嘗思此寤寐不平豈可以富貴之故屈人倫長㓜之序也可詔有司革之神宗本紀治平四年即位二月詔公主下嫁者行見舅姑禮禮志熙寧十年詔應􅃝免以上親不得與雜類之家昏嫁謂舅嘗為僕姑嘗為娼者若父母係化外及見居沿邊兩屬之人其子孫亦不許為昏緦麻以上親不得與諸司胥吏出職納粟得官及進納伎術工商雜類惡逆之家子孫通昏後又禁刑徒人子孫為昏應昏嫁者委主昏宗室擇三代有任州縣官或殿直以上者列姓名家世州里歲數奏上宗正司驗實召保付内侍省宣繫聽期而行嫁女則令其壻召保其冒妄成昏者以違制論主昏宗室與媒保同坐不以赦降自首者减罪告者有賞非􅃝免親者依庶姓法宗室離昏委宗正司審察若于律有可出之實或不相安方聽若無故捃拾者劾奏如許聽離追完賜予物給還嫁資再娶者不給賜非􅃝免以上親與夫聽離再嫁者委宗正司審核其恩澤已追奪而乞與後夫者降一等尋詔宗室女毋得與嘗娶人結昏再適者不用此法哲宗本紀元祐三年九月禁宗室聨姻内臣家文獻通考元祐五年八月太皇太后詔以皇帝納后有期令太常禮官檢詳古今六禮沿革參考通禮典故具其節文著為成式者先是太皇太后諭宰臣吕大防等曰皇帝將納后天聖景祐故事止降進冊未嘗御殿禮甚簡略大防等請退而討論遂降是詔又詔翰林學士御史中丞兩省給舍與禮部太常寺官同詳議宋史哲宗本紀元祐六年八月三省進納后六禮儀制文獻通考三省樞宻院言納后六禮命使納采問名納吉納成告期差執政官攝太尉充使侍從官或判宗正官攝宗正卿充副使以舊尚書省權為皇后行第納采問名同日次日納吉納成告期納成加榖珪請期依開寶禮改為告期納采前擇日告天地發冊命使差宰臣攝太尉執政官攝司徒前一日告宗廟奉迎命使依開寶禮改親迎為命使奉迎皇帝臨軒與冊禮使副同遣先遣冊禮使次遣奉迎使令文武百官詣行第班迎其日皇后服禕衣乗重翟車鹵簿依禮令由宣德門東偏門入文臣大卿監武臣正任刺史以上宣徳門外班迎詔從之時給事中范祖禹言臨軒發冊命使奉迎及皇后入内皇帝乃服通天冠綘紗袍扵禮未隆請並服衮冕以重大昏之禮翰林學士范百禄言昏禮下達匪媒不克今采擇先定有命既集而形扵麻制以后氏族姓宣告外庭方且遣使齎制行納采問名之禮則禮文顛倒失先後之序請以降詔之日行納采問名之禮宣制之日行納吉納成告期之禮皆不從既而禮部太常寺言五禮命使據開元納采問名合用一使其納吉納成告期各别日遣使今未委三禮共遣一使或各遣使文武百官詣行第班迎文武大卿監武臣正任刺史以上宣徳門外班迎縁至日行第門外已設皇后車乗儀仗逼隘不容百官車馬其文武百官欲並扵宣徳門外立班奉迎案士昏禮用鴈所以為贄也又案曲禮凡贄天子鬯鄭康成謂天子無客禮以鬯為贄者惟用告神今已據周禮用榖圭聘后欲更不用雁文徳殿發制欲依發冊例立仗或止用月朔視朝仗百官朝服詔納吉納成告期令各遣使文徳殿發制依發冊例立仗餘並從之清波雜志元祐大昏吕正獻公當國執議不用樂宣仁云尋常人家娶個新婦尚㸃幾個樂人如何官家郤不得用欽聖云更休與他懣宰執理㑹但自安排著遂令教坊鈞容伏宣徳門裏皇后乗翟車甫入兩部闌門衆樂具舉久之伶官輦出賞物語人曰不可似得這個科第相公郤不教用實録具書納后典禮但言昏禮不賀不及用樂一節王彦霖繫年録載六禮特詳亦不書此宋史哲宗本紀元祐七年夏四月己未立皇后孟氏甲子命吕大防為皇后六禮使五月戊戌御文德殿冊皇后老學菴筆記元祐七年哲廟納后用五月十六日法駕出宣德門行親迎之禮初道家以五月十六日為天地合日夫婦當異寢違犯者必夭死故世以為忌當時太史選定乃謂人主與后猶天地也故特用此日將降詔矣皇太妃特以為不可上亦疑之宣仁獨以為此語俗忌耳非典禮所載遂用之其後詔獄既興宦者復謂若廢后可弭此禍上意亦不可囬矣徽宗夲紀徽宗崇寧二年九月辛巳詔宗室不得與元祐姦黨子孫為昏姻政和三年四月庚戌班五禮新儀閏月改公主為帝姬禮志政和三年四月議禮局上皇子納夫人儀采擇使者曰奉制某王之儷屬子懿淑謹之重之使某行采擇之禮儐者入告主人曰臣某之子顓愚不足以備采擇恭承制命臣某不敢辭問名使者曰某王之儷采擇既諧將加官占奉制問名儐者入告主人曰制以臣某之子可以奉侍某王臣某不敢辭告吉使者曰官占既吉奉制以告儐者入告主人曰臣某之子愚弗克堪占貺之吉臣與有幸臣某謹奉典制告成使者曰官占云吉嘉偶既定制使某以儀物告成儐者入告主人曰奉制賜臣以重禮臣某謹奉典制告期使者曰涓辰之良某月某日吉制使某告期儐者入告主人曰臣某謹奉典制前期太史局擇日奏告景靈宫賜告前一日主人設使者次如常儀使者以内侍為之又設告箱之次于中門外北向隨闕所向設香案於寢庭其日大昕使者公服至主人出迎于大門外北面再拜使者不答拜謁者引使者入門而左主人入門而右舉告箱者同入主人立香案左使者在右舉告箱者以告置扵香案女相者引夫人出面闕立使者稱有制女相者贊再拜使者曰賜某國夫人告又贊再拜退使者出皇帝醮戒扵所御之殿皇子乗象輅親迎同牢夫人朝見盥饋皇帝皇后享夫人如儀其諸王以下納采賔曰某官以伉儷之重施於某王某官謂主人某王謂壻某王率循彞典以某將事敢請納采某王謂壻父某謂賔儐者入告主人曰某之子弗嫻於姆訓維是腵修棗栗之饋未知所以告䖍也某聽命於廟敢不拜嘉問名賔曰合二姓之好必稽諸龜筮敢請問名儐者入告主人曰某王恭謹重正昏禮將以加諸卜某敢不以告納吉賔曰某王承嘉命稽諸卜筮龜筮協從使某以告儐者入告主人曰某王不忘寒素欲施徳于某未教之女而卜以吉告某曷敢辭納成賔曰某官以伉儷之重施於某王某王率循彛典有不腆之幣以某將事敢請納成儐者入告主人曰某王順彞典申之以備物某敢不重拜嘉請期賔曰某王謹重嘉禮將卜諸近日使某請期儐者入告主人再辭儐者出告賔曰某既不獲受命于某官某王得吉卜曰某日敢不以告儐者入告主人曰謹奉命以從親迎前一日主人設賔次如常儀其日大昕壻之父服其服告扵禰廟子將行父醮之於㕔事贊者設父位中間南向設子位扵父位之西近南東向父即坐子公服升自西階進立位前贊者注酒于醆西向授子子再拜跪受贊者又設饌父位前子舉酒興即坐飲食訖降再拜進立扵父位前命之曰躬迎嘉偶釐爾内治子再拜曰敢不奉命又再拜降出詣女家主人服其服告於禰廟如請期之儀賔將至主人設神位扵寢户外之西設醴女位於戸内南向具酒饌賔至贊者引就次女盛服於房中就位南向立姆位於右從者陪其後父公服升自東階立扵寢户外之東西向内贊者設酒饌女就位坐飲食訖降再拜内贊者徹酒饌主人降立東階東南西面贊者引賔出次立於門西東面儐者進受命出請事賔曰某受命於父以兹嘉禮躬聽成命儐者入告主人曰某固願從命儐者出告訖入引主人迎賔大門外之東西面揖賔賔報揖主人入門而右賔入門而左執雁者從入陳雁於庭三分庭一在南北向主人升立於東階上西南賔升西階進當寢戸前北面再拜降出主人不降送賔初入門母出立於寢户外之西南面賔拜訖姆引女出於母左父命之曰徃之汝家以順為正無忘肅恭母戒之曰必恭必戒無違舅姑之命庶母申之曰爾誠聽於訓言毋作父母羞女出門壻先還第其同牢廟見見舅姑諸禮皆如儀文獻通考四朝國史傳國朝帝女封公主沿襲漢唐或以美名或以國姊妹曰長公主諸姑曰大長公主至祖姑則或加兩國政和三年蔡京為相建議以為不典始改為帝姬以二字易國名四字易兩國名自宗祖以降數十女皆追加封冊至中興時始復初故今所書但仍舊式唯徽宗諸主乃從一時之制云帝姬降嫁儀納采問名納吉請期壻家具禮物納成修表如儀前期太史局擇日差官奏告景靈東西宫親迎前一日所司於東門外量地之宜西向設壻次其日大昕壻之父服其服告於禰廟曰天子降女於某以某日親迎敢告再拜子將行父醮子於㕔事贊者設父位於中間南向設子位扵父之西近東南向父即座子公服升自西階進立扵位前贊者注酒扵醆西向授子子再拜跪受贊者又奉饌設扵位前子舉酒興即座飲食訖降再拜贊禮者引立於父位前父命之曰徃迎肅雍以昭惠宗祏子再拜曰祗率嚴命又再拜降出乗馬至東華門内下馬禮直官引就次有司陳帝姬鹵簿儀仗扵内東門外俟帝姬將升厭翟車禮直官引壻出次立於内東門外躬身西向掌事者以鴈陳扵前内謁者奉雁以進俟帝姬升車訖壻再拜先還第同牢其日初昏掌事者設巾洗各二一扵東階東南一于室之北水在洗東尊扵室中實四爵兩卺扵篚壻至本第下馬以俟帝姬至降車贊者引壻揖帝姬以入及寢門又揖壻導帝姬升降入室盥洗掌事者布對位壻揖帝姬皆即座受醆三飲壻及帝姬俱興再拜訖贊者徹酒見舅姑夙興帝姬著花釵服䄖翟以俟見贊者設舅姑位扵堂上東西相向舅位扵東姑位於西舅姑服其服俱就位後立女相者引帝姬升自西階詣舅位前再拜訖贊者以棗栗授帝姬帝姬奉棗栗置扵舅位前舅即座贊者進徹以東帝姬退復位又再拜女相者又引帝姬詣姑位前再拜訖贊者以腵脩授帝姬帝姬奉腵脩置扵姑位前姑即座贊者進徹以東帝姬退復位又再拜次醴婦盥饋享婦如儀政和五年五月嘉德帝姬下嫁曹夤詔用新儀行盥饋之禮皇后宮闈送至第外命婦免從宋史徽宗本紀政和六年六月癸未皇太子納妃文獻通考重和元年十一月蔡京請免茂德帝姬下降見舅姑行盥饋之禮詔不允又詔神考治平間親灑宸翰以王姬下降躬行舅姑禮革去歴代沿習之弊以成婦道宋史寧宗本紀嘉定六年二月詔宗室毋與胥吏通昏著為令司馬氏書儀男子年十六至三十女子十四至二十古禮男三十而娶女二十而嫁案家語孔子十九娶扵宋亓官氏一嵗而生伯魚伯魚年五十先孔子卒然則古人之娶未必皆三十也禮盖言其極至者謂男不過三十女不過二十耳過此則為失時矣今令文凡男年十五女年十三以上並聽昏嫁葢以世俗早昏之弊不可猝革又或孤弱無人可依故順人情立此制使不麗于刑耳若欲參古今之道酌禮令之中順天地之理合人情之宜則若此之説當矣身及主昏者無期以上䘮皆可成昏士昏僼請期之辭惟是三族之不虞三族謂父己子之昆弟是期服皆不可以昏也雜記曰大功之末可以嫁子然則大功未葬亦不可以主昏也今依律文以從簡易必先使媒氏徃來通言俟女氏許之然後遣使者納采使者擇家之子弟為之凡議昏姻當先察其壻與婦之性行及家法何如勿苟慕其富貴壻苟賢矣今雖貧賤安知異時不富貴乎苟為不肖今雖富盛安知異時不貧賤乎孔子謂南容邦有道不廢邦無道免于刑戮以其兄之子妻之彼行能必有過人者故邦有道不廢也寡言而慎事故邦無道免於刑戮也擇壻之道莫善扵是矣婦者家之所由盛衰也苟慕一時之富貴而娶之彼挾其富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有極乎借使因婦財以致富依婦勢以取貴苟有丈夫之志氣者能無媿乎又世俗好扵襁褓童㓜之時輕許為昏亦有指腹為昏者及其既長或不肖無頼或身有惡疾或家貧凍餒或䘮服相仍或從宦逺方遂至棄信負約速獄至訟者多矣是以先祖太尉嘗曰吾之男女必俟既長然後議昏昏既通書不數月必成昏故終身無此悔乃子孫所當法也納采納其采擇之禮前一日主人謂壻之祖父若父也如無則以即日男家長為之女家主人准此以香酒脯醢無脯醢者止用食一二味可也先告於影堂主人北向立焚香酹酒俛伏興立祝懷辭祝以家之子弟為之後准此辭為寫祝文于紙由主人之左進東向搢笏出辭跪讀之曰某壻父名之子某壻名敢告祝興主人再拜出撤闔影堂門乃命使者如女氏士昏禮無先告廟之文而六禮皆行之于禰廟春秋傳鄭忽先配而後祖陳鍼子曰是不為夫婦誣其祖矣楚公子圍娶扵鄭曰圍布几筵告扵莊共之廟而來然則古之昏姻皆先告于祖禰也夫昏姻家之大事其義不可不告女家主人亦告于祖禰曰某之女某將嫁於某氏如壻父之儀其日日出昏禮自請期以上皆用昕日出時也使者盛服執生鴈左首飾以繢用鴈為贄者取具順隂陽徃來之義若無生鴈則刻木為之飾以繢謂以生色繒交絡縳之止扵女氏之門外門者入告女家主人盛服出迎揖讓入門揖讓升堂主人立阼階上西向賔立西階上稍北東向士昏禮賔升西階當阿東面注云阿棟也入堂深示親親今之室堂必不合禮故稍北而已賔曰吾子有惠貺室某壻名也某壻父名有先人之禮使某使者名請納采主人對曰某女父名之子妹姪孫惟其所當蠢愚又弗能教吾子命之某不敢辭儀禮先使儐徃來傳命别有致命之辭今從簡北面再拜此敬壻父之命非拜賔也賔避席立不答拜奉使不敢與尊長抗禮主人賔皆進就兩楹間並立南向賔授鴈主人受之以授執事乃交授書書者别書納采問名之辭扵紙後繫年月日昏主官位姓名止賔主各懐之既授鴈因交相授書壻家書藏女家女家書藏壻家以代今之世俗行書納於懐退各以授執事者賔降出門東向立問名主人降階立俟扵門内之東西向使儐者出請事儐者主人擇子弟為之賔曰請問名儐者入告主人出延賔賔執鴈復入門與主人揖讓升堂復前位賔曰某使者名既受命將加諸卜敢問女為誰氏對曰吾子有命且以備數而擇之某不敢辭女子第幾賔授鴈交授書降出主人立扵門内如初儐者出延賔曰請醴從者對曰某既得將事矣敢辭主人曰敢固以請賔曰某辭不得命敢不從遂入與主人揖讓拜起使者舊拜主人扵此方叙私禮飲酒三行或設食而退如常儀納吉歸卜得吉兆復使使者徃告昏姻之事扵是定計納采之前已卜矣扵此告女家以成六禮也用雁賔曰吾子有貺命某壻父名加諸卜占曰吉使某使者名也敢告主人對曰某女父名之子不教惟恐弗堪子有吉我與在某女父名不敢辭餘如納采禮納幣士昏禮納徴元纁束帛儷皮如納吉禮注徴成也使者納幣以成昏禮用雜色繒五匹為束纁既染為元纁則不堪他用且恐貧家不能辦故但雜色繒五匹卷其兩端合為一束而已兩鹿皮使者執束帛執事者二人執皮反之令丈在内左手執前兩足右手執後兩足隨賔入門及庭三分之一而止北面西上賔與主人揖讓升堂賔曰吾子有嘉命貺室某使者名也請納幣主人對曰吾子順先典貺某女父名重禮某不敢辭敢不承命於賔之致命也執皮者釋外足復之令文在外於主人之受幣也主人之執事者二人自東來出扵執皮者之後受皮於執皮者之左逆從東出餘如納吉禮請期夫家卜得吉日使使者徃告之用鴈賔曰吾子有賜命某壻父名既申受命矣使某使者名也請吉日主人曰某既前受命矣惟命是聼賔曰某壻父名命某使者名聽命于吾子主人曰某固惟命足聼賔曰某使某受命吾子不許某敢不告期曰某日主人曰某敢不謹須餘如納幣禮親迎前期一日女氏使人張陳其壻之室俗謂之鋪房古雖无之然今世俗所用不可廢也牀榻薦蓆椅卓之類壻家當具之氊褥帳幔衾綯之類女家當具之所張陳者但氊褥帳幔帷幙之類應用之物其衣服襪履等不用者皆鎻之篋笥世俗盡陳之欲矜誇富多此乃婢妾小人之態不足為也文中子曰昏娶而論財夷虜之道也夫昏姻者所以合二姓之好上以事宗廟下以繼後世也今世俗之貪鄙者將娶婦先問資裝之厚薄將嫁女先問聘財之多少至于立契約云某物若干某物若干以求售其女者亦有既嫁而復欺紿負約者是乃駔儈鬻奴賣妾之法豈得謂之士大夫昏姻㦲其舅姑既被欺紿則殘虐其婦以攄其忿由是愛其女者務厚資裝以悅其舅姑殊不知彼貪鄙之人不可盈厭資裝既竭則安用汝力㦲扵是質其女以責貨于女氏貨有盡而責無窮故昏姻之家徃徃終為仇讎矣是以世俗生男則喜生女則戚至有不舉其女因此故也然則議婚姻有及于財者皆勿與為昏姻可也綯音陶駔祖朗切儈工外切及期壻具盛饌古者用牢而食必殺牲開元禮一品以下用少牢六品以下用特牲恐非貧家所便故止具盛饌而已設盥盆二扵阼階東南皆有二盥盆中央有勺設椅卓各二于室中東西相向各置杯七箸蔬果扵卓子上罩之士昏禮媵布席于奥夫入于室即席婦尊西南面既設饌御布對席今室堂之制異于古故但東西向而已古者命士以上父子皆異宫故各有堂室奥阼今則不然子舍隘狹或東西北向皆不可知今假設南向之室而言之左為東右為西前為南後為北酒壺在東席之後墉下置合卺一注扵其南卓子上卺以匏剖而為二音謹又設酒壺於室外亦一注有盃此所以飲從者也室外隘則扵側近外室置之其盃數為時量人之多少也又設酒壺盃注扵堂上初昏壻盛服世俗新壻盛戴花勝擁蔽其首殊失丈夫之容體必不得已且隨俗戴花一兩枝勝一兩枚可也主人亦盛服坐於堂之東序西向設壻席扵其西北南向壻升自西階立扵席西南向贊者兩家各擇親戚婦人習扵禮者為之凡壻及婦行禮皆贊者相導之取盃斟酒執之詣壻席前北向立壻再拜升席南向受盃跪祭酒興就席末坐啐酒興降西授贊者盃又再拜此所謂醮也進詣父座前東向跪父命之曰徃迎爾相承我宗事勉率以謹若則有常祖父在則祖父命之子曰諾惟恐弗堪不敢忘命俛伏興再拜出乗馬至扵女氏之門外下馬俟扵次女家必先設壻次于外女家亦設酒壺杯注扵堂上扵壻之將至女盛飾姆相其禮姆音茂以乳母或老女僕為之奉女立于室户外南向姆在其右從者在後父坐扵東序西向母坐於西序東向祖父母在則祖父母醮而命之設婦席扵母之東北南向贊者醮以酒如壻父醮子之儀姆導女出扵母左父少進命之曰戒之謹之夙夜無違爾舅姑之命母送女至扵西階上為之整冠歛帔命之曰夙夜無違爾閨門之禮諸母姑嫂姊送扵中門之内為之整裙衫申以父母之命曰謹聽爾父母之言夙夜無愆父既醮女即先出迎壻於門外揖讓以入壻執鴈以從至於㕔事主人升自阼階立西向壻升自西階北向跪置鴈於地主人侍者受之壻俛伏興再拜主人不答拜姆奉女出扵中門壻揖之降自西階以出婦從後主人不降送壻至婦氊車後之右舉簾以俟姆辭曰未教不足與為禮也士昏禮壻御婦車授綏姒辭不受注壻御者親而下之綏所以引升車者僕人之禮必授人綏今車無綏故舉簾以待之壻乃自車右由車前過立扵左轅側姆奉婦登車下簾壻右執䇿左撫轅行驅車輪三周止車以俟今婦人幸有氊車可乗而世俗重檐子輕氊車借使親迎時暫乗氊車庸何傷㦲然人亦有性不能乗車乗之即嘔吐者如此則自乗檐子其御輪三周之理更無所施姆亦無所用矣壻乗馬在前婦車在後亦以二燭前導男率女女從男夫婦刚柔之義自此始也壻先至㕔事婦下車揖之遂導以入婦從之執事先設香酒脯醢於影堂無脯醢量具殽羞一兩味舅姑盛服立於影堂之上舅在東姑在西相向贊者導壻與婦至於階下北向東上無階則立扵影堂前主人進北向立焚香跪酹酒俛伏興立祝懐辭由主人之左進東面搢笏出辭跪讀之曰某壻名以令月吉日迎婦某婦姓昏事見祖禰祝懷辭出笏興主人再拜退復位壻與婦拜如常儀出撤闔影堂門古無此禮今謂之拜先靈亦不可廢也贊者導壻揖婦而先婦從之適其室壻立於南盥之西婦立於北盥之西皆東向婦從者沃壻盥扵南壻從者沃婦盥扵北從者各以其家之女僕為之前准此帨巾畢揖而行升自西階士昏禮及寢門揖入升自西階媵御沃盥交注媵送也謂女從者也御音訝御迎也謂壻從者也媵沃壻盥于南洗御沃婦盥于北洗夫婦始接情有亷耻媵御交導其志案洗在阼階東南既升階不云降階何由復至洗所故今先盥而升階婦從者布席扵閫向東方壻從者布席扵西方壻婦踰閫壻立扵東席婦立扵西席婦拜壻答拜古者婦人與丈夫為禮則俠拜郷里舊俗男女相拜女子先一拜男子拜女一拜女子又一拜盖由男子以再拜為禮女子以四拜為禮故也古无壻婦交拜之儀今世俗始相見交拜拜致恭亦事理之宜不可廢也俠音夾壻揖婦就坐壻東婦西古者同之禮壻在西東面婦在東西面盖占人尚右故壻在西尊之也今人既尚左且須從俗壻從者徹羃置饌壻婦皆先祭後食食畢壻從者啟壺入酒扵注斟酒壻揖婦祭酒舉飲置酒舉殽殽者乃今之下酒也又斟酒舉飲不祭無殽又取卺分置壻婦之前斟酒舉飲不祭無殽壻出就他室姆與婦留室中乃徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘壻復入室脱服婦從者受之婦脱服壻從者受之燭出古詩云結髪為夫婦言自穉齒始結髪以來即為夫婦猶李廣云廣結髪與匈奴戰也今世俗有結髪之儀此尤可笑扵壻婦之適其室也主人以酒饌禮男賔扵外㕔主婦以酒饌禮女賔于中堂如常儀占禮明日舅姑乃享送者今從俗不用樂曾子問曰取婦之家三日不舉樂思嗣親也今俗昏禮用樂殊為非禮婦見舅姑婦明日夙興盛服飾俟見舅姑執事者設盥盆於堂阼階下帨架在北兄弟姊妹立扵盆東如冠禮男女異列男在西女在南皆北上平明舅姑坐扵堂上東西相向各置卓子于前贊者見婦于舅姑婦北向拜舅扵堂下古者拜于堂上今恭也可從衆執笲古笲制度漢世已不能知今但取小箱以帛衣之皂表緋裏以代笲可也實以棗栗升自西階進至舅前北向奠扵卓子上舅撫之侍者徹去婦降又拜舅畢乃拜姑别受笲實以腵脩腵修今之暴脯是也升進至姑前北向奠扵卓子上姑舉之以授侍者婦降又拜執事者設席扵姑之北南向設酒壺及注盃卓子扵堂上婦升立扵席西南面贊者醴婦如父母醮女之儀婦降西階就兄弟姊妹之前其長屬應受拜者少進立婦乃拜之無贄拜畢長屬退長屬雖多共為一列受拜以從簡易㓜屬應相拜者今世俗小郎小姑皆相拜少進相拜畢退無贄若有尊屬則婦徃拜扵其室有卑屬則來拜于婦室婦退休扵其室至食時行盥饋之禮婦家具盛饌酒壺士昏禮婦盥饋特豚合升側載注側載者右胖載之舅爼左胖載之姑爼今恐貧者不便殺特故但具盛饌而已婦從者設蔬果卓子扵堂上舅姑之前設盥盆於阼階東南帨架在東婦盥扵阼階下執饌自西階升凡子婦升降皆應自西階惟家婦受享畢降自阼階薦於舅姑侍立扵姑之後饌有繼至者侍者傳至扵西階不盡一級婦徃受之薦於舅姑侍者徹餘饌置於旁側别室舅姑侍者各置一卓子上食畢婦降拜舅升洗盃斟酒置舅卓子上降俟舅舉酒飲畢又拜遂獻姑姑受而飲之餘如獻舅之儀婦升徹飯侍者徹其餘皆置别室婦就餕姑之饌畢婦從者餕舅之餘壻從者餕婦之餘舅姑共饗婦扵堂上設席如朝來禮婦之位婦升立扵席西南向贊者取盃斟酒授婦皆如朝來禮婦之儀舅姑先降自西階婦降自阼階此謂家婦也餘婦則舅姑不降婦降自西階古者庶婦不饋然饋主供養雖庶婦不可闕也若舅姑已殁則古有三月廟見之禮今已拜先靈更不行若舅姑止一人則舅坐于東序姑坐于西序席婦于姑坐之北壻見婦之父母明日壻徃見婦之父母皆有幣婦父迎送揖讓皆如客禮拜即跪而扶之入見婦母婦母闔門左扉立於門内壻拜扵門外次見妻黨諸親拜起皆如俗儀而無幣見諸婦女如婦母之禮婦家設酒饌壻如常儀親迎之夕不當見婦母及諸親亦不當行私禮設酒饌以婦未見舅姑故也朱子家禮昏禮議昏男子年十六至三十女子年十四至二十身及主昏者無期以上䘮乃可成昏大功未葬亦不可主昏凡主昏如冠禮主人之法但宗子自昏則以族人之長為主必先使媒氏徃來通言俟女氏許之然後納采納采納其采擇之禮即今世俗所謂言定也主人具書主人即主昏者書用牋紙如世俗之禮如族人之子則其父具書告于宗子夙興奉以告祠堂如告冠儀其祝版前同但云某之子某若某之某親之子某年已長成未有伉儷已議娶某官某郡姓名之女今日納采不勝感愴謹以後同若宗子自昏則自告乃使子弟為使者如女氏女氏主人出見使者使者盛服如女氏女氏亦宗子為主主人盛服出見使者非宗子之女則其父位于主人之右尊則少進卑則少退啜茶畢使者起致辭曰吾子有惠貺室某也某之某親某官有先人之禮使某請納采從者以書進使者以書授主人主人對曰某之子若妹姪孫蠢愚又弗能敎吾子命之某不敢辭北向再拜使者避不答拜使者請退俟命出就次若許嫁者扵主人為姑姊則不云蠢愚又弗能教餘辭並同遂奉書以告於祠堂如壻家之儀祝版前同但云某之第幾女若某親某之第幾女年漸長成已許嫁某官某郡姓名之子若某親某今日納采不勝感愴謹以後同出以復書授使者遂禮之主人出延使者升堂授以復書使者受之請退主人請禮賔乃以酒饌禮使者使者至是始與主人交拜揖如常日賔客之禮其從者亦禮之别室皆酬以幣使者復命壻氏主人復以告祠堂不用祝納幣古禮有問名納吉今不能盡用止用納采納幣以從簡便幣用色繒貧富隨宜少不過兩多不踰十今人更用釵釧羊酒果實之屬亦可具書遣使如女氏女氏受書復書禮賔使者復命並同納采之儀禮如納采但不告廟使者致辭改采為幣從子者以書幣進使者以書授主人主人對曰吾順先典貺某重禮某不敢辭敢不承命乃受書執事者受幣主人再拜使者避之復進請命主人授以復書餘並同親迎近則迎扵其家逺則迎扵其館前期一日女氏使人張陳其壻之室世俗謂之鋪房然所張陳者但氊褥帳幔帷幕應用之物其衣服鎻之篋笥不必陳也厥明壻家設位於室中設椅卓兩位東西相向蔬果盤盞匙筯如賔客之禮酒壺在東位之後又以卓子置合卺一扵其南又南北設二盥盆勺扵室東隅又設酒盞壺注于室外或别室以飲從者卺音謹以小匏一判而兩之也女家設次於外初昏壻盛服世俗新壻帶花勝擁蔽其而殊失丈夫之客體勿用可也主人告於祠堂如納采儀祝版前同但云某之子某若某親之子某將以今日親迎扵某官某郡某氏不勝感愴謹以後同若宗子自昏則自告遂醮其子而命之迎先以卓子設酒置盤盞于堂上主人盛服坐于堂之東序西向設壻席于其西北南向壻升自西階立于席西南向贊者取盞期酒執之詣壻席前壻再拜升席南向受盞跪祭酒興就席末跪啐酒興降席西授贊者盞又再拜進詣父坐前東向跪父命之曰徃迎爾相承我宗事朂率以敬若則有常壻曰諾唯恐不堪不敢忘命俛㐲興出非宗子之子則宗子告于祠堂而其父醮于私室如儀但改宗事為家事若宗子已孤而自昏則不用此禮壻出乗馬以二燭前導至女家俟於次壻下馬扵大門外入俟于次女家主人告於祠堂如納采儀祝版前同但云某之第幾女若某親某之第幾女將以今日歸于某官某郡姓名不勝感愴謹以後同遂醮其女而命之女盛飾姆相之立于室外南向父坐東序西向母坐西序東向設女席于母之東北南向贊者醮以酒如壻禮姆導女出扵母左父起命之曰敬之戒之夙夜無違爾舅姑之命母送至西階上為之整冠歛帔命之曰勉之戒之夙夜無違爾閨門之禮諸母姑嫂姊送至于中門之内為之整裙衫申以父母之命曰謹思爾父母之言夙夜無愆非宗子之女則宗子告于祠堂而其父醮于私室如儀主人出迎壻入奠鴈主人迎壻于門外揖讓以入壻執鴈以從至扵㕔事主人升自阼階立西向壻升自西階北向跪置鴈扵地主人侍者受之壻俯伏興再拜主人不答拜若族人之女則其父從主人出迎立扵其右尊則少進卑則少退凡贄用生鴈左首以生色繒交絡之無則刻木為之取其順隂陽徃來之義程子曰取其不再偶也姆奉女出登車姆奉女出中門壻揖之降自西階主人不降壻遂出女從之壻舉轎簾以俟姆辭曰未教不足與為禮也女乃登車壻乗馬先婦車婦車亦以二燭前導至其家導婦以入壻至家立於㕔事俟婦下車揖之導以入壻婦交拜婦從者布壻席扵東方壻從者布婦席于西方壻盥于南婦從者沃之進帨婦盥于北壻從者沃之進帨壻揖婦就席婦拜壻答拜就坐飲食畢壻出壻揖婦就坐壻東婦西從者斟酒設饌壻婦祭酒舉餚又斟酒壻揖婦舉飲不祭無餚又取卺分置壻婦之前斟酒壻揖婦舉飲不祭無餚壻出就他室姆與婦留室中徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘復入脱衣燭出壻脱服婦從者受之婦脱服壻從者受之主人禮賔男賔于外㕔女賔于中堂古禮明日享從者今從俗婦見舅姑明日夙興婦見于舅姑婦夙興盛服俟見舅姑坐于堂上東西相向各置卓子其家人男女少于舅姑者立于西序如冠禮之叙婦進立阼階下北面拜舅升奠置幣于卓子上舅授之侍者以入婦降又拜畢諸西階下北面拜姑升奠贄幣姑舉以授侍者婦降又拜若非宗子之子而與宗子同居則先行此禮扵舅姑之私室與宗子不同居則如上儀舅姑禮之如父母醮女之儀婦見於諸尊長婦既受禮降自西階同居有尊扵舅姑者則舅姑以婦見于其室如見舅姑之禮還拜諸尊長扵兩序如冠禮無贄小郎小姑皆相拜非宗子之子而與宗子同居則既受禮詣其堂上拜之如舅姑禮而還見于兩序其宗子及尊長不同居則廟見而後徃若冡婦則饋於舅姑是日食時婦家具盛饌酒壼婦從者設蔬果卓子扵堂上舅姑之前設盥盆于阼階東南帨架在東舅姑就坐婦盥升自西階洗盞斟酒置舅卓子上降俟舅飲畢又拜遂獻姑進酒姑受飲畢婦降拜遂執饌升薦于舅姑之前侍立姑後以俟卒食徹饌侍者徹飯分置别室婦就餕姑之餘婦從者餕舅之餘非宗子之子則于私室如儀舅姑享之如禮婦之儀禮畢舅姑先降自西階婦降自阼階廟見三日主人以婦見扵祠堂古者三月而廟見今以其太逺改用三日如子冠而見之儀但告辭曰子某之婦某氏敢見餘並同壻見婦之父母明日壻徃見婦之父母婦父迎送揖讓如賔禮拜即跪而扶之入見婦母婦母闔門左扉立于門内壻拜於門外皆有幣婦父非宗子即先見宗子夫婦不用幣如上儀然後見婦之父母次見婦黨諸親不用幣婦女相見如上儀婦家禮壻如常儀親迎之夕不當見婦母及諸親友設酒饌以婦未見舅姑故也程子曰昏禮不用樂幽隂之義此說非是昏禮豈是幽隂但古人重此大禮嚴肅其事不用樂也昏禮不賀人之序也此說却是婦質明而見舅姑成婦也三日而後宴樂禮畢也宴不以夜禮也朱子曰人著書只是自入些己意便做病司馬與伊川定昏禮都依儀禮只略改一處便不是古人意司馬云親迎奠鴈見主昏者即出伊川却教拜了又入堂拜大男小女伊川非是伊川云婦至次日見舅姑三月廟見司馬却說婦入門即拜影堂司馬非是盖親迎不見妻父母者婦未見舅姑也入門不見舅姑者未成婦也今親迎用温公入門以後用伊川三月廟見改為三日云又曰昏禮用命服乃是古禮如士乗墨車而執鴈者大夫之禮也冠帶只是燕服非所以重正昏禮不若從古之為正楊氏復曰昏禮有納采問名納吉納徴請期親迎六禮家禮略去問名納吉止用納采納幣以從簡便但親迎以前更有請期一節有不可得而略者黄氏瑞莭曰補注謂之昏者娶妻之禮以昏為期因名焉今世不知昏之為義徃徃拘忌隂陽家書選擇時辰雖昕旦晝夜亦皆成禮殊為紕繆士昏禮記曰凡行事必用昏昕受諸禰廟疏曰用昕使者謂男氏使向女家納采問名納吉納徴請期五者皆用昕即詩所謂旭日始旦也昏親迎時也毛氏竒齡曰昏禮問名必先問年月日而後及于名周官所謂媒氏先書年月日名是也盖年軙名為尤重男女伉儷湏先計年時以辨長幼其但稱問名而不及年月日者舉一以該二也且問名者謂生時三月所命之名男女皆有之故周官云男女自成名以上曲禮曰不相知名儀禮敢問女為誰氏注謂問女母所出之姓則不然禮稱問名未嘗稱問姓即曰以姓為名則女名父姓如曰某姬某姜未聞以母姓稱名者又解曰氏者字也女幼命之名及長而易之以字與男子同所云誰氏者言何字也則又不然據公羊傳女子許嫁稱字則問名時未許嫁也則問名非問氏且非問字鄭康成謂問名有二一是三月所命之名一是長時所命名如伯姬叔姬類則仍兼字矣鴈本贄物非禮物鴈者大夫所執之贄昏禮攝盛故士禮用鴈得借大夫禮亦謂之下逹今人認為納昏禮物以為昏禮必用鴈或云取不再偶之義或云取順隂陽徃來之義可笑甚矣單春秋天子不親迎使公卿迎之祭公迎王后于紀靖公逆王后於齊是也諸侯則親迎或有故若疾病及越境未便則遣大夫迎之莊公如齊逆女為親迎公子翬如齊逆女為遣迎是也大夫以下則無不親迎者雖越境亦然鄭忽娶扵陳楚公子圍娶于鄭襄仲娶扵莒莒慶齊髙周娶于魯皆親迎是也蕙田案毛大可昏禮辨正以儀禮家禮為非是語多不經不足置辨唯論問名一條稍有發明以鴈為贄物攝盛原本朱子語而考證親迎一條詞亦簡括故附存之右宋昏禮遼史聖宗夲紀統和元年二月以皇女長夀公主下嫁國舅宰相蕭博爾桑之子烏里禮志公主下嫁儀選公主諸父一人為昏主凡當奥者媒者致詞之儀自納幣至禮成大略如納后儀擇吉日詰旦媒者趣尚主之家詣宫竢皇帝皇后御便殿率其族入見進酒訖命皇族與尚主之族相偶飲翼日尚主之家以公主及壻率其族入見致宴扵皇帝皇后獻贐送者禮物訖朝辭賜公主青幰車二螭頭盖部皆飾以銀駕駞送終車一車樓純錦銀螭懸鐸後垂大氊駕牛載羊一謂之祭羊擬送終之具至履尸儀物咸在賜其壻朝四時襲衣鞍馬凡所須無不備選皇族一人送至其家親王女封公主者昏儀倣此以親踈為差降聖宗夲紀統和四年九月丙寅朔皇太妃以上納后進衣物駞馬以助㑹親頒賜戊寅内外命婦進㑹親禮物辛巳納皇后蕭氏禮志皇帝納后之儀擇吉日至日后族畢集詰旦后出私舍坐於堂皇帝遣使及媒者以牲酒饔餼至門執事者以告使及媒者入謁再拜平身立少頃拜進酒於皇后次及后之父母宗族兄弟酒徧再拜納幣致詞再拜訖后族皆坐特哩衮夫人四拜請就車后辭父母伯叔父母兄各四拜宗族長者皆再拜皇后升車父母飲后酒致戒辭徧及使者媒者送者發軔伯叔父母兄飲皇后酒如初教坊遮道贊祝后命賜以物后族追拜進酒遂行將至宫門宰相傳勅賜皇后酒徧及送者既至特哩衮率皇族奉迎再拜皇后車至便殿東南七十歩止特哩衮夫人請降車負銀罌捧縢履黄道行後一人張羔裘若襲之前一婦人捧鏡却行置鞍扵道后過其上乃詣神主室三拜南北向各一拜酹酒向謁者一拜起居訖再拜次詣舅姑御容拜奠酒選皇族諸婦宜子孫者再拜之授以罌縢詣諸帝御容拜奠酒神賜襲衣珠玉珮飾拜受服之后姊若妹陪拜者各賜物皇族迎者后族送者徧賜酒皆相偶飲訖后坐别殿送后者退食扵次媒者傳㫖命送后者列於殿北竢皇帝即御座選皇族尊者一人當奥坐主昏禮命執事者徃來致辭于后族引后族之長率送后者升當御座皆再拜又一人少進附奏送后之詞退復位再拜后族之長及送后者向當奥者三拜南北向各一拜向謁者一拜后族之長跪問聖躬萬福再拜復奏送后之辭又再拜當奥者與媒者行酒三周命送后者再拜皆坐終宴翼日皇帝晨興詣先帝御容拜奠酒訖復御殿宴后族及羣臣皇族后族偶飲如初百戲角觝戲馬較勝以為樂又翼日皇帝御殿賜后族及贐送后者各有差受賜者再拜進酒再拜皇帝御别殿有司進皇后服飾之籍酒五行送后者辭訖皇族獻后族禮物后族以禮物謝當奥者禮畢國語解拜奥禮凡納后即族中選尊者一人當奥而坐以主其禮為之奥始送后者拜而致敬故云拜奥禮聖宗夲紀太平八年六月權北院大王耶律哲魯奏今歲十一月皇太子納妃諸族備㑹親之帳詔以豪盛者三十户給其費十一月丙申皇太子納妃蕭氏興宗夲紀重熙十六年定公主行婦禮扵舅姑儀金史太宗本紀天輔元年夏五月詔自收寧江州以後同姓為昏者杖而離之太宗夲紀天㑹五年四月詔曰哈斯罕諸部與新附人民其在降附之後同姓為