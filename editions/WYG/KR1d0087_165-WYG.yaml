之夙夜恪勤母或違命母命之曰勉之勉之爾父有訓徃承惟欽庶母申之曰恭聽父母之言宫人傅姆擎執導從妃乗輿出門降輿乗鳯轎皇太子揭簾訖遂升輅侍從如來儀至東宫門外降輅乗輿至閤降輿入俟扵内殿門外之東西面司閨導妃詣内殿門外之西東面皇太子揖妃入行合卺禮如中宫儀又次朝見其日妃詣内殿陛下候皇帝陞座司閨導妃入北面立再拜自西階升宫人奉棗栗盤進至御座前授妃妃奠扵御前退復位再拜禮畢詣皇后前奉腵脩盤如上儀又次醴妃次盥饋次謁廟次羣臣命婦朝賀皆如儀蕙田案明㑹典載皇太子六禮禮物與皇帝昏禮大致略同今不附載親王昏禮唐制皇子納妃命親王主昏宋皆皇帝臨軒醮戒略與皇太子同明因之其宣制曰冊某氏為某王妃納采致詞曰某王之儷屬扵懿淑使某行納采禮問名詞曰某既受命將加諸卜筮奉制問名主昏者曰制以臣某之子可以奉侍某王臣某不敢辭納吉詞曰卜筮協從使某告吉主昏者曰臣某之子愚弗克堪卜貺之吉臣與有幸謹奉典制納徴詞曰某王之儷卜既協吉制使某以儀物告成主昏者曰奉制賜臣以重禮臣某謹奉典制請期詞曰某月日涓吉制使某告期主昏者曰謹奉命醮戒命曰徃迎爾相用承厥家朂帥以敬其親迎合卺朝見盥饋並如皇太子盥饋畢王皮弁服妃翟衣詣東宫前行四拜禮東宫坐受東宫妃立受二拜答二拜王與妃至妃家妃父出迎王先入妃父從之至堂王立扵東妃父母立於西王四拜妃父母立受二拜答二拜王中坐其餘親屬見王四拜王皆坐受妃入中堂妃父母坐妃四拜其餘序家人禮太祖之世皇太子皇子有二妃公主昏禮古者天子嫁女不自主昏以同姓諸侯主之故曰公主唐猶以親王主昏宋始不用惟令掌昏者扵内東門納表則天子自為主矣明因之凡公主出降行納采問名禮壻家備禮物表文扵家庭望闕再拜掌昏者奉至内東門詣内使前曰朝恩貺室扵某官某之子某習先人之禮使臣某請納采以表跪授内使内使跪受奉進内殿執鴈及禮物者從入内使出掌昏者曰將加卜筮使臣某問名進表如初内使出曰有制掌昏者跪内使宣曰皇帝第幾女封某公主掌昏者俯伏興入就次賜宴出納吉儀與納采同掌昏者致詞曰加諸卜筮占曰從吉謹使臣某敢告納徴壻家具元纁玉帛乗馬表丈如儀掌昏者致詞曰朝恩貺室扵某官某之子某有先人之禮使臣某以束帛乗馬納徴請期詞曰某命臣某謹請吉日親迎日壻公服告廟曰國恩貺室扵某以某日親迎敢告將行父醮扵㕔隨意致戒壻再拜出至内東門内内使延入次執鴈及奉禮物者各陳扵庭其日公主禮服辭奉先殿詣帝后前四拜受爵帝后隨意訓戒受命訖又四拜降階内命婦送至内殿門外公主陞輦至内東門降輦壻揭簾公主陞轎壻出次立執鴈者以鴈跪授壻壻受鴈跪進扵内使内使跪受以授左右壻再拜先出乗馬還公主鹵簿車輅後發公侯百官命婦送至府壻先候扵門公主至壻揭簾公主降同詣祠堂壻東公主西皆再拜進爵讀祝又再拜出詣寢室壻公主相向再拜各就坐壻東公主西進饌合卺如儀復相向再拜明日見舅姑舅姑坐扵東西向公主立扵西東向行四拜禮舅姑答二拜第十日駙馬朝見謝恩行五拜禮明㑹典洪武元年令凡民間嫁娶並依朱文公家禮行又令男女昏姻各有其時或有指腹割衫襟為親者並行禁止二年凡令嫁娶皆由祖父母父母主昏祖父母父母俱無者從餘親主昏若夫亡携女適人者其女從母主昏若已定昏未及成親而男女或有身故者不追財禮其定昏夫作盜及犯徒流移郷者女家願棄者聽還聘財其定昏女犯姦經斷夫家願棄者追還聘財五年無故不娶及夫逃亡過三年不還者並聽經官告給執照别行改嫁亦不追其財禮凡招壻須慿媒妁明立昏書開寫養老或出舍年限止有一子者不許出贅如招養老女壻者仍立同宗應繼者一人承奉祭祀家産均分如未立繼身死從族長依例議立三年定品官昏娶明史禮志品官昏禮周制凡公侯大夫士之昏娶者用六禮唐以後儀物多以官品為降殺明制凡品官昏娶或為子聘婦皆使媒氏通書女氏許之擇吉納采主昏者設賔席至日具祝版告廟訖賔至女氏第主昏者公服出迎揖賔及媒氏入鴈及禮物陳扵㕔賔左主右媒氏立於賔南皆再拜賔詣主人曰某官以伉儷之重施扵某某率循典禮謹使某納采主昏者曰某之子弗嫻姆訓既辱采擇敢不拜嘉賔主西南相向坐徹鴈受禮訖復陳鴈及問名禮物賔興詣主昏者曰某官愼重昏禮將加卜筮請問名主昏者進曰某第幾女妻某氏出或以紅羅或以銷金紙書女之第行年歲賔辭主昏者請禮從者禮畢送賔至門外納吉如納采儀賔致詞曰某官承嘉命稽諸卜筮龜筮協從使某告吉主昏者曰某未教之女既以吉告其何敢辭納徴如納吉儀加元纁束帛函書不用鴈賔致詞曰某官以伉儷之重加惠某官率循典禮有不腆之幣敢請納徴主昏者曰某官貺某以重禮某敢不拜受賔以函書授主昏者主昏者亦答以函書請期亦如納吉儀親迎日壻父告扵禰廟壻北面再拜立父命之曰躬迎嘉偶釐爾内治壻進曰敢不承命再拜媒氏導壻之女家其日女氏主昏者告廟訖醴女如家人禮壻至門下馬就大門外之次女從者請女盛服就寢門内南向坐壻出次主昏者出迎於門外揖而入主昏者入門而右壻入門而左執鴈者從至寢户前北面立主昏者立於户東西向壻再拜奠鴈出就次主昏者不降迎壻既出女父母南向坐保母導女四拜父命之曰徃之女家以順為正無忘肅恭母命之曰必恭必戒毋違舅姑之命庶母申之曰爾忱聽扵訓言毋作父母羞保母及侍女翼女出門升車儀衛導前送者乗車後壻先還以俟婦車至門出迎扵門内揖婦入及寢門壻先升階婦從升入室壻盥扵室之東南婦從者執巾進水以沃之婦盥扵室之西北壻從者執巾進水以沃之盥畢各就座壻東婦西舉食案進酒進饌酒食訖復進如初侍女以卺注酒進扵壻婦前各飲畢皆興立於座南東西相向皆再拜壻婦入室易服壻從者餕婦之餘婦從者餕壻之餘明日見宗廟設壻父拜位扵東階下壻扵其後主婦拜位扵西階下婦扵其後諸親各以序分立其日夙興壻父以下各就位再拜贊禮引婦至庭中北面立壻父升自東階詣神位前跪三上香三祭酒讀祝興立扵西婦四拜退復位壻父降自西階就拜位壻父以下皆再拜禮畢次見舅姑其日婦立堂下俟舅姑即座就位四拜保姆引婦升自西階至舅前侍女奉棗栗授婦婦進訖降階四拜詣姑前進腵修如前儀次舅姑醴婦如家人禮次盥饋其日婦家備饌至壻家舅姑即座婦四拜升自西階至舅前從者舉食案以饌授婦婦進饌執事者加七箸進饌扵姑亦如之食訖徹饌婦降階就位四拜禮畢舅姑再醴婦如初儀庻人昏禮禮云昏禮下達則六禮之行無貴賤一也朱子家禮無問名納吉止納采納幣請期洪武元年定制用之凡庶人娶婦男年十六女年十四以上並聽昏娶壻常服或假九品服婦服花釵大袖其納采納幣請期略倣品官之儀有媒無賔詞亦稍異親迎前一日女氏使人陳設扵壻之寢室俗謂之鋪房至若告詞醮戒奠鴈合卺並如品官儀見祖禰舅姑舅姑醴婦亦略相凖蕙田案明祖洪武元年令凡民嫁娶凖文公家禮故其儀多與家禮同今不重載洪武四年冊開平王常遇春女為皇太子妃禮部上儀注太祖覧之曰贄禮不用笲但用金盤翟車用鳳轎鴈以玉為之古禮有親迎執綏御輪今用轎則揭簾是矣其合卺依古制用匏妃朝見入宫中乗小車以帷幕蔽之謁廟則皇太子俱徃禮成後三日乃宴羣臣命婦著為令明㑹典洪武五年詔古之昏禮結兩姓之好以重人倫近代以來專論聘財習染奢侈宜令中書省集議定制頒行遵守務在崇尚節儉以厚風俗違者論罪如律又令蒙古色目人氏既居中國許與中國人家結昏姻不許與本類自相嫁娶違者男女兩家抄沒入官為奴婢其色目欽察自相昏姻不在此限明史禮志洪武八年十一月徴衛國公鄧愈女為秦王次妃不𫝊制不發冊不親迎正副使行納徴禮冠服擬唐宋二品之制儀仗視正妃稍減昏之日王皮弁服導妃謁奉先殿王在東稍前妃西稍後禮畢入宫王與正妃正坐次妃詣王前四拜復詣正妃前四拜次妃東坐宴飲成禮次日朝見拜位如謁殿謁中宫不用棗栗腵脩餘並同蕙田案此娶次妃禮歴代未行洪武九年太祖以太師李善長子祺為駙馬都尉尚臨安公主先期告奉先殿下嫁前二日命使冊公主冊後次日謁奉先殿又定駙馬受誥儀吏部官捧誥命置龍亭至太師府駙馬朝服拜受次日善長及駙馬謝恩後十日始請昏期二十六年稍更儀注然儀注雖存其拜舅姑及公主駙馬相向拜之禮終明之世寔未甞行也明年又更定公主郡主封號昏禮及駙馬儀賔品秩蕙田案儀注具前明㑹典永樂四年詔北京山東等䖏人民流移各䖏趂食有將女憑媒禮嫁在䖏人民為妻已生男女者保勘明白仍許完聚不必發囬原籍英宗正統四年令武職不得與所管旗軍結昏七年定皇帝納后之禮蕙田案納后儀注具前十一年令雲南四川貴州所屬宣慰宣撫安撫長官司并邊夷府州縣土官衙門不分官吏軍民其男女昏姻皆依朝廷禮法違者罪之景泰三年詔各王府庶人子女長成或無父母昏姻又無人敢與議配所在官司審察具名奏來處置天順四年奏准宗室降為庶人者其子女昏嫁有司每人與四表裏首飾銀二十兩猪四口羊四隻自令昏配明史禮志成化二十二年更定皇太子昏禮凡節冊等案俱由奉天左門出皇太子親迎由東長安門出親迎日妃服燕居服隨父母家廟行禮執事者具酒饌妃飲食訖父母坐堂上妃詣前各四拜父命之曰爾徃大内夙夜勤慎孝敬無違母命之曰爾父有訓爾當奉承合卺前扵皇太子内殿各設拜位皇太子揖妃入就位再拜妃四拜然後各升座廟見後百官朝賀致詞曰某官臣某等恭惟皇太子嘉禮既成益綿宗社隆長之福臣某等不勝欣忭之至謹當慶賀帝賜宴如正旦儀命婦詣太后皇后前賀亦賜宴致詞曰皇太子嘉聘禮成益綿景福餘大率如洪武儀明會典𢎞治二年令有訐告服内成昏者如親病已危從尊長主昏招壻納婦罪止坐主昏免離異若親死雖未成服輙昏配仍依律斷離異明史禮志𢎞治二年冊封仁和長公主重定昏儀入府公主駙馬同拜天地行八拜禮堂内設公主座扵東西向駙馬東向座餘如前儀明會典嘉靖二年令王府有不遵禁約擅自成昏者俱革退另選明史禮志嘉靖二年工科給事中安磐等言駙馬見公主行四拜禮公主坐受二拜雖貴賤夲殊而夫婦分定於禮不安不聽自宣徳時駙馬始有教習用學官為之正統以後令駙馬赴監讀書習禮嘉靖六年始定禮部主事一人專在駙馬府教習明會典嘉靖八年題准士庶昏禮如問名納吉不行已久止倣家禮納采納幣親迎等禮行之所有儀物二家俱無過求二十八年題准王府擅自擇選繼室已經革封者其所生子女照革爵庶人所生例不許請乞封號以後違例擅昏者視此明史禮志凡選駙馬禮部榜諭在京官員軍民子弟年十四至十六容貌齊整行止端莊有家教者報名司禮内臣扵諸王館㑹選不中則博訪於畿内山東河南選中三人欽定一人餘二人送本處儒學充廪生崇禎元年教習駙馬主事陳鍾盛言臣教習駙馬鞏永固駙馬黎明於府門外月臺四拜云至三月後則上堂上門上影壁行禮如前始視膳扵公主前公主飲食扵上駙馬侍立扵旁過此方議成昏駙馬饋果餚書臣公主答禮書賜皆大失禮夫既合卺則儼然夫婦安有拜跪數月稱臣侍膳然後成昏者㑹典行四拜於合卺之前明合卺後無拜禮也以天子館甥下同𨽻役豈所以尊朝廷帝是其言令永固即擇日成昏蕙田案公主下嫁人倫攸係風化所闗歴代以来未有跪拜數月稱臣侍膳如明之甚者原其始皆因一二驕縱踰禮勛戚之家視為畏途遂乃下選庶姓出身既㣲又皆起自内臣之力多方挾制以致凌夷若此昏禮之壞可勝言㦲右明昏禮五禮通考卷一百五十五
