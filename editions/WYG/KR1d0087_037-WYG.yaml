body:
  text: 五禮通考卷二十七刑部尚書秦蕙田撰吉禮二十七明堂舊唐書禮儀志武德初季秋祀五方天上帝於明堂元帝配牲用蒼犢二五人帝五官並從祀用方色犢十唐書禮樂志武德中季秋祀五方天帝於明堂以元帝配季秋大享於明堂天子親祠不能則有司攝事五方帝大享於明堂太尊實汎齊著尊實醴齊犧尊實盎齊山罍實酒各二五人帝從享於明堂以著尊實醴齊皆二祀以四圭有邸與配帝之幣皆以蒼五方帝籩八豆八簋一簠一㽅一俎一五人帝籩四豆四簋一簠一俎一舊唐書禮儀志隋代季秋大享恒在雩壇設祀髙祖受禪不遑創儀太宗平定天下命儒官議其制貞觀五年太子中允孔頴達以諸儒立議違古上言曰臣伏尋前勅依禮部尚書劉伯莊等議以爲從崑崙道上層祭天又尋後勅云爲左右閣道登樓設祭臣檢六藝羣書百家諸史皆名基上曰堂樓上曰觀未聞重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其義一也又明堂法天聖王示儉或有翦蒿爲柱葺茅作葢雖復古今異制不可恒然猶依大典惟在朴素是以席惟槀秸器尚陶匏用蠒栗以貴誠服大裘以訓儉今若飛樓架道綺閣凌雲考古之文實堪疑慮案郊祀志漢武明堂之制四面無壁上覆以茅祭五帝於上座祀后土於下防臣以上座正爲基上下防惟是基下既云無四壁未審伯莊如何上層祭神下有五室且漢武所爲多用方士之說違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乘輦相儀接神不敬步往則勞曳聖躬侍衛在旁百司供奉求之典誥全無此理臣非敢固執愚見以求已長伏以國之大典不可不慎乞以臣言下羣臣詳議侍中魏徵議曰稽諸古訓參以舊圖其上圓下方􅃨廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端蜂起是非舛互靡所適從遂乃以人廢言止爲一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未𢎞夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故飾宮以廣其敬宣尼美意其在兹乎臣等親奉德音令參大議凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所爲則又傷於質略求之情理未允厥中今之所議非無用捨請爲五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂爲祭天之所人神不雜禮亦宜之其髙下廣袤之規几筵尺丈之制則並隨時立法因事制宜自我而作何必師古議未決蕙田案祭與聽政有堂室之分無上下之别鄭公謂下室布政上堂祭天人神不雜舛矣至謂髙下廣袤几筵丈尺自我而作何必師古可謂通達之見十七年五月秘書監顔師古議曰明堂之制爰自古昔求之簡牘全文莫覩究其指要實布政之宮也徒以經禮湮亡今之所存傳記雜說理實蕪昧然周書之叙明堂紀其四面則有應門雉門據此一塗固是王者之常居耳其青陽總章𤣥堂太廟左个右个與月令四時之次相同則路寢之義足爲明證又文王居明堂之篇帶以弓䪅祠于髙禖下九門磔禳以禦疾疫置梁除道以利農夫令國有酒以合三族凡此事等皆合月令之文觀其所爲皆在路寢者也戴禮昔周公朝諸侯于明堂之位天子負斧扆南向而立明堂也者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子亦曰黄帝曰合宮有虞氏曰總章殷曰陽館周曰明堂斯皆路寢之徵知非别處大戴所說初有近郊之言復稱文王之廟進退無據自爲矛盾原夫負扆受朝常居出令既在臯庫之内亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懐創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘逺近無擇方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以爲明堂辟雍太學其實一也而有三名金襃等又稱經傳無文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭𤣥則曰在國之陽三里之外七里之内丙巳之地潁容釋例亦云明堂太廟凡有八名其體一也茍立同異競為巧說並出自胸懐曾無師祖審夫功成作樂理定制禮草創從宜質文遞變旌旗冠冕古今不同律度權衡前後不一隨時之義斷可知矣假如周公舊章猶當擇其可否宣尼彞則尚或補其闕漏况鄭氏臆說淳于謏聞匪異守株何殊膠柱愚謂不出墉雉邇接宮闈實允事宜諒無所惑但當上遵天㫖祇奉德音作皇代之明堂永貽範於來葉區區碎議皆略而不論又上表曰明堂之制陛下已發德音久令詳議但以學者專固人人異言損益不同是非莫定臣愚以爲五帝之後兩漢已前髙下方圓皆不相襲惟在陛下聖情創造即爲大唐明堂足以傳於萬代何以論戸牖之多少疑階廷之廣狹若恣儒者互說一端久無斷決徒稽盛禮昔漢武欲草封禪儀博望諸生所說不同莫知孰是惟御史大夫倪寛勸上自定制度遂成登封之禮臣之愚誠亦望陛下斟酌繁省爲其節文不可謙拒以淹大典尋以有事遼海未暇營創蕙田案師古號稱博綜其論明堂乃背經傳而乖舛若此不得其說請以聖情創造異哉唐書禮樂志貞觀初明堂以髙祖配舊唐書音樂志季秋享上帝于明堂樂章八首貞觀中禇亮等作今行用降神用豫和詞同冬至圜丘皇帝行用大和詞同冬至圜丘登歌奠玉帛用肅和象天御宇乘時布政嚴配申䖍宗禋展敬罇罍盈列樹羽交映玉幣通誠祚隆皇聖迎俎用雍和八牖晨掖五精朝奠霧凝璇篚風清金縣神滌備全明粢豐衍載結彞俎陳誠以薦皇帝酌獻飲福用夀和詞同冬至圜丘送文舞出迎武舞入用舒和御扆合宮承寳歴席圓重節奉明靈偃武修文九圍泰沈烽靜柝八荒寧武舞用凱安詞同冬至圜丘送神用豫和詞同冬至圜丘通典永徽二年又奉太宗配祠明堂有司遂以高祖配五天帝太宗配五人帝舊唐書禮儀志永徽二年七月二日勅曰上元幽贊處崇高而不言皇王提象代神功而理物是知五精降德爰應帝者之尊九室垂文用紀配天之業且合宮靈符創鴻規於上代太室總章標茂範於中葉雖質文殊制奢儉異時然則立天中作人極布政施教其歸一揆朕嗣膺下武丕承上烈思所以答眷上靈聿遵孝享而法宮曠禮明堂寢構今國家四表無虞人和歲稔作範垂訓今也其時宜令所司與禮官學士等考覈故事詳議得失務依典禮造立明堂庶曠代闕文獲申於兹日因心展敬永垂於後昆其明堂制度令諸曹尚書及左右丞侍郎太常國子秘書官𢎞文館學士同共詳議於是太常博士柳宣依鄭𤣥義以爲明堂之制當爲五室内直丞孔志約據大戴禮及盧植蔡邕等義以爲九室曹王友趙慈皓秘書郎薛文思等各造明堂圖諸儒紛爭互有不同上初以九室之議爲是乃令所司詳定形制及辟雍門闕等明年六月内出九室様仍更令有司損益之有司奏言内様堂基三重每基階各十二上基方九雉八角高一尺中基方三百尺高一筵下基方三百六十尺高一丈二尺上基象黄琮爲八角四面安十二階請從内様爲定基髙下仍請凖周制高九尺其方共作司約凖一百四十八尺中基下基望並不用又内室各方三筵開四闥八牕屋圓楣徑二百九十一尺案季秋大饗五帝各在一室商量不便請依兩漢季秋合饗總於太室若四時迎氣之祀則各於其方之室其安置九室之制增損明堂故事三三相重太室在中央方六丈其四隅之室謂之左右房各方二丈四尺當太室四面青陽明堂總章元堂等室各長六丈以應太室闊二丈四尺以應左右房室間並通巷各廣一丈八尺其九室并巷在堂上總方一百四十四尺法坤之䇿屋圓楣楯檐或爲未允請據鄭元盧植等說以前梁爲楣其徑二百一十六尺法乾之䇿圓柱旁出九室四隅各七尺法天以七紀柱外餘基共作司約凖面别各餘一丈一尺内室别四闥八牕檢與古同請依爲定其戸依古外設而不閉内外有柱三十六毎柱十梁内有七間柱根以上至梁高三丈梁以上至屋峻起計高八十一尺上圓下方飛檐應規請依内様爲定其屋葢形制仍望據考工記改爲四阿并依禮加重檐凖太廟安鴟尾堂四向五色請依周禮白盛爲便其四向各隨方色請施四垣及四門辟雍案大戴禮及前代說辟雍多無水廣内徑之數蔡邕云水廣二十四丈四周於外三輔黄圖云水廣四周與蔡邕不異仍云水外周堤又張衡東京賦稱造舟爲梁禮記明堂位隂陽録云水左旋以象天商量水廣二十四丈恐傷於闊今請減爲二十四步垣外量取周足仍依故事造舟爲梁其外周以圓堤并取隂陽水行左旋之制殿垣案三輔黄圖殿垣四周方在水内高不蔽日殿門去殿七十二步凖今行事陳設猶恐窄小其方垣四門去堂步數請凖太廟南門去廟基逺近爲制仍立四門八觀依太廟門别各安三門施元閫四角造三重魏闕此後羣儒紛競各執異議尚書左僕射于志寧等請爲九室太常博士唐眕眕通典作昕未知孰是等請爲五室高宗令於觀德殿依兩議張設親與公卿觀之帝曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者爲宜工部尚書閻立德對曰兩議不同俱有典故九室似闇五室似明取捨之宜斷在聖慮上以五室爲便議又不定由是且止蕙田案此議頗合古惟房室通巷及辟廱爲謬耳既别有巷九室闇矣宜以五室爲便而終不定也舊唐書禮儀志顯慶元年太尉長孫無忌與禮官等奏議曰臣等謹尋方冊歴考前規宗祀明堂必配五郊預入明堂自縁從祀今以太宗作配理有未安伏見永徽二年七月詔建明堂伏惟陛下天縱聖德追奉太宗已遵嚴配時高祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗皇帝降配五人帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹案孝經云孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏惟詔意義在於斯今所司行令殊爲失㫖又尋漢魏晉宋歴代禮儀並無父子同配明堂之義唯祭法云周人禘嚳而郊稷祖文王而宗武王鄭元注云禘郊祖宗謂祭祀以配食也禘謂祭昊天於圜丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭此注乃以祖宗合爲一祭又以文武共在明堂連祍配祀良爲謬矣故王肅駮曰古者祖有功而宗有德祖宗自是不毁之名非謂配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀也凡宗者尊也周人既祖祀廟又尊其祀孰謂祖於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義㫖也又解宗武王云配勾芒之類是謂五神位在堂下武王降位失君敘矣又案六韜曰武王代紂雪深丈餘五車二馬行無轍跡詣營求謁武王怪而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職命焉既而克殷風調雨順豈有生來受職歿則配之降尊敵卑理不然矣故春秋傳禘郊祖宗報五者國之祀典也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂南齊蕭氏以武明昆季並於明堂配食事乃不經未足援據又檢武德時令以元皇帝配於明堂兼配感帝至貞觀初縁情革禮奉祀高祖配於明堂奉遷世祖專配感帝此即聖朝故事已有遞遷之典取法宗廟古之制焉伏惟太祖景皇帝搆室有周建絶代之丕業啟作汾晉創歴聖之洪基德邁發生道符立極又世祖元皇帝潛鱗韞慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟高祖太武皇帝躬受天命奄有神州創制改物體元居正爲國始祖抑有舊章昔者炎漢高帝當塗太祖皆以受命例並配天請遵故實奉祀高祖於圜丘以配昊天上帝伏惟太宗文皇帝道格上元功清下黷拯率土之塗炭協大造於生靈請準詔書宗祀於明堂以配上帝又請依武德故事兼配感帝作主斯乃二祖德隆永不遷廟兩聖功大各得配天逺協孝經近申詔意蕙田案明堂之配此議爲是唐書禮樂志顯慶二年禮部尚書許敬宗與禮官等議曰明堂本以祭天而鄭𤣥以爲祭太微五帝皆謬論也由是盡黜𤣥説明堂大享祭昊天上帝乾封二年詔明堂兼祀昊天上帝及五帝又詔明堂以高祖太宗並配高宗改元總章分萬年置明堂縣示欲必立之而議者益紛然或以爲五室或以爲九室而高宗依兩議以帟幕爲之與公卿臨觀而議益不一乃下詔率意班其制度至取象黄琮上設鴟尾其言益不經而明堂亦不能立舊唐書禮儀志乾封二年二月詳宜略定乃下詔曰朕以寡薄忝承丕緒奉二聖之遺訓撫億兆以初臨馭朽兢懐推溝在念而上元垂祐宗社降休歲稔時和人殷俗阜車書混一文軌大同檢玉泥金升中告禪百蠻執贄萬國來庭朝野懽娛華夷胥悅但爲郊禋嚴配未安太室布政施行猶闕合宮朕所以日昃忘疲中宵輟寢討論墳籍錯綜羣言採三代之精微探九皇之至賾斟酌前載製造明堂棟宇方圓之規雖兼故實度筵陳俎之法獨運財成宣諸内外博考詳議求其長短冀廣異聞而鴻生碩儒俱稱盡善搢紳士子並奏該通創此宏模自我作古因心既展情禮獲伸永言宗祀良深感慰宜命有司及時起作務從折中稱朕意焉於是大赦天下改元爲總章分萬年置明堂縣明年三月又具規製廣狹下詔曰合宮聽朔闡皇軒之茂範靈府通和敷帝勛之景化殷人陽館青珪備禮姬氏元堂彤璋合獻雖運殊驪翰時變質文至於立天中建皇極軌物施教其歸一揆考圖汶上僅存公玉之儀度室圭躔才紀中元之製屬炎精墜駕璿宮毁籥四海淪於沸鼎九土陷於塗原高祖太武皇帝杖鉞唐郊收鈐雍野納祥符於蒼水受靈命於丕山飛沈泳沫動植游源太宗文皇帝盟津光誓協降火而登壇豐谷斷蛇應屯雲而鞠旅封金岱嶺昭累聖之鴻勲勒石九都成文考之先志固可以作化明堂顯庸太室傍羅八柱周建四門木工不琢土事無文豐約折衷經始勿亟闕文斯備大禮聿修其明堂院每面三百六十步當中置堂案周易乾之䇿二百一十有六坤之䇿一百四十有四總成三百六十故方三百六十步當中置堂處二儀之中定三才之本構兹一宇臨此萬方自降院每面三門同爲一宇徘徊五間案尚書一朞有四時故四面各一所開門毎時有三月故每一所開三門一朞十有二月故周廻總十二門所以面别一門應兹四序既一時而統三月故於一舎而置三門又周易三爲陽數二爲隂數合而爲五所以每門舎五間院四隅各置重樓其四墉各依本方色案淮南子地有四維故四樓又案月令水火金木土五方各異色故其墻各依本方之色基八面象八方案周禮黄琮禮地鄭𤣥注琮者八方之玉以象地形故以祀地則知地形八方又案漢書武帝立八觚壇以祀地登地之壇形象地故令爲八方之基以象地形基高一丈二尺徑二百八十尺案漢書陽爲六律陰爲六呂陽與陰合故高一丈二尺又案周易三爲陽數八爲陰數三八相乗得二百四十丈案漢書九會之數有四十合爲二百八十所以基徑二百八十尺故以交通天地之和錯綜陰陽之數以明陽不獨運資隂和以助成陰不孤行待陽唱而方應陰陽兩順天地咸亨則百寳斯興九疇攸序基每面三階周廻十二階每階爲二十五級案漢書天有三階故每面三階地有十二辰故周廻十二階又案文子從凡至聖有二十五等故每階二十五級所以應符星而設階法台耀以䟽陛上擬霄漢之儀下則地辰之數又列兹重級用準聖凡象皇極之高居俯庶類而臨耀基之上爲一堂其宇上圓案道德經天得一以清地得一以寧侯王得一以爲天下貞又曰道生一一生二二生三三生萬物又案漢書太極元氣函三爲一又曰天子以四海爲家故置一堂以象元氣并取四海爲家之義又案周禮蒼璧禮天鄭𤣥注璧圓以象天故爲宇上圓堂每面九間各廣一丈九尺案尚書地有九州故立九間又案周易陰數十故間别一丈九尺所以規模厚地準則陰陽法二氣以通基置九州於一宇堂周廻十二門每門高一丈七尺闊一丈三尺案禮記一嵗有十二月所以置十二門又案周易陰數十陽數七故高一丈七尺又曰陽數五陰數八故闊一丈三尺所以調兹玉燭應彼金輝叶二氣以循環逐四序而迎節堂周迴二十四窻高一丈三尺闊一丈一尺二十三櫺二十四明案史記天有二十四氣故置二十四窻又案書一年十二月并象閏故高一丈三尺又案周易天數一地數十故闊一丈一尺又天數九地數十并四時成二十三故二十三櫺又案周易八純卦之本體合二十四爻故有二十四明列牖䟽象風候氣逺周天地之數曲準隂陽之和堂心八柱各長五十五尺案河圖八柱承天故置八柱又案周易大衍之數五十有五故長五十五尺聳兹八柱承彼九間數該大衍之規形符立極之制且柱爲陰數天實陽元柱以陰氣上昇天以陽和下降固陰陽之交泰乃天地之相承堂心之外置四柱爲四輔案漢書天有四輔星故置四柱以象四星内以八柱承天外象四輔明化上交下泰表裏相成叶台耀以分輝契編珠而拱極八柱四輔外第一重二十柱案周易天數五地數十并五形之數合而爲二十故置二十柱體二儀而立數叶五位以裁規式符立極之功允應剛柔之道八柱四輔外第二重二十八柱案史記天有二十八宿故有二十八柱所以仰則乾圖上符景宿考編珠而紀度觀列宿以迎時八柱四輔外第三重三十二柱案漢書有八節八政八風八音四八三十二柱調風御節萬物資以化成布政流音九區仰而貽則外面周廻三十六柱案漢書一朞三十六旬故法之以置三十六柱所以象歲時而致用順寒暑以通微璿璣之度無衍玉歴之期永契八柱之外修短總有三等案周易天地人爲三才故置柱長短三等所以擬三才以定位高下相形體萬物以資生長短兼運八柱之外都合一百二十柱案禮記天子置三公九卿二十七大夫八十一元士合爲一百二十是以置一百二十柱分職設官翊化資於多士開物成務構厦藉於羣材其上檻周迴二百四柱案周易坤之䇿一百四十有四又漢書九會之數有六十故置二百四柱所以採坤䇿之元妙法甲乙之精㣲環迴契辰象之規結搆凖隂陽之數又基以象地故叶䇿於坤元柱各依方復規模於甲子重楣二百一十六條案周易乾之䇿二百一十有六故置二百一十六條所以規模易象擬法乾元應大衍之深元叶神䇿之至數大小節及拱總六千三百四十五案漢書會月之數六千三百四十五故置六千三百四十五枚所以逺採三統之文傍符會月之數契金儀而調節偶璇歴以和時重幹四百八十九枚案漢書章月二百三十五閏月周迴二百五十四總成四百八十九故置四百八十九枚所以法履端之奥義象舉正之芳猷規模歴象發明章閏下枊七十二枚案易緯有七十二候故置七十二枚所以式模芳節取規貞候契至和於昌歴偶神數於休期上枊八十四枚案漢書九會之數有七十疑脱六字又案莊子六合之外聖人存而不論司馬彪注天地四方爲六合總成八十四故置八十四枚所以模範二儀包羅六合準會陰陽之數周通氣候之源枅六十枚案漢書推太歲之法有六十故置六十枚所以兼該歴數包括陰陽採甲乙之深㣲窮辰子之元奥連栱三百六十枚案周易當朞之日三百有六十故置三百六十枚所以叶周天之度準當期之日順平分而成歲應晷運以循環小梁六十枚案漢書有六十甲子故置六十枚構此虹梁遐規鳯歴傍竦四宇之製遙符六甲之源㯠二百二十八枚案漢書章中二百二十八故置二百二十八枚所以應長歴之規象中月之度廣綜陰陽之數傍通寒暑之和方衡一十五重案尚書五行生數一十有五故置十五重結棟分間法五行而演秘䟽楹疊構叶生數以成規南北大梁二根案周易太極生兩儀故置二大梁軌範乾坤模擬天地象元黄之合德表覆載以生成陽馬三十六道案易緯有三十六節故置三十六道所以顯兹嘉節契此貞辰分六氣以燮陰陽環四象而調風雨椽二千九百九十根案漢書月法二千三百九十二通法五百九十八共成二千九百九十所以偶推步之規合通法之數是知䟽椽構宇則大壯之架斯隆積月成年則會歴之規無爽大梠兩重重别三十六條總七十二案淮南子太平之時五日一風一年有七十二風故置七十二條所以通規瑞歴叶數祥風遥符淳俗之源逺則休徴之契飛檐椽九百二十九枚案漢書從子至午其數九百二十九所以採辰象之宏模法周天之至數且午爲陰本子實陽源子午分時則生成之道自著陰陽合德則覆載之義兹隆堂檐徑二百八十八尺案周易乾之䇿二百一十六易緯云年有七十二候合爲二百八十八故徑二百八十八尺所以仰叶乾䇿逺承貞候順和氣而調序擬圓葢以照臨堂上棟去基上面九十尺案周易天數九地數十以九乘十數當九十故去基上面九十尺所以上法圓清下儀方載契陰陽之至數叶交泰之貞符又以兹天九乘於地十象陽唱而陰和法乾施而坤成檐去地五十五尺案周易大衍之數五十有五故去地五十五尺所以擬大易之嘉數通惟神之至賾道合萬象理貫三才上以清陽玉葉覆之案淮南子清陽爲天合以清陽之色詔下之後猶羣議未決終高宗之世未能創立唐書禮樂志孝經曰宗祀文王於明堂以配上帝而三代有其名而無其制度故自漢以來諸儒之論不一至于莫知所從則一切臨時增損而不能合古然推其本㫖要於布政交神于王者尊嚴之居而已其制作何必與古同然爲之者至無所據依乃引天地四時風氣乾坤五行數象之類以爲倣像而衆說亦不克成蕙田案此猶顔師古所謂聖情創造者也附會愈多規制愈大去古愈逺宜終弗克立矣舊唐書禮儀志儀鳯二年七月太常少卿韋萬石奏曰明堂大享惟古禮鄭𤣥議祀五天帝王肅議祀五行帝貞觀禮依鄭𤣥議祀五天帝顯慶以來新修禮祀昊天上帝奉乾封二年勅祀五帝又奉制兼祀昊天上帝復奉上元三年三月勅五禮俱以貞觀年禮爲定又奏去年勅並依周禮行事今用樂須定所祀之神未審依古禮及貞觀禮爲復依見行之禮時髙宗及宰臣並不能斷依違久而不決尋又詔尚書省及學士詳議事仍不定自此明堂大享兼用貞觀顯慶二禮唐書武后本紀垂拱四年正月庚午毁乾元殿作明堂十二月辛亥改明堂爲萬象神宮舊唐書禮儀志則天臨朝儒者屢上言請創明堂則天以高宗遺意乃與北門學士議其制不聽羣言垂拱三年春毁東都之乾元殿就其地創之四年正月五日明堂成凡高二百九十四尺東西南北各三百尺有三層下層象四時各隨方色中層法十二辰圓葢葢上盤九龍捧之上層法二十四氣亦圓葢亭中有巨木十圍上下通貫栭櫨橕棍藉以爲本亘之以鐵索葢爲鸑鷟黄金飾之勢若飛翥刻木爲瓦夾紵漆之明堂之下施鐵渠以爲辟雍之象號萬象神宮因改河南縣爲合宮縣詔來年正月一日可於明堂宗祀三聖以配上帝宜令禮官博士學士内外明禮者詳定儀禮務從典要速以奏聞唐書王求禮傳武后時爲左拾遺監察御史后方營明堂琱飾譎怪侈而不法求禮以爲鐵鸑金龍丹雘珠玉乃商瓊臺夏瑶室之比非古所謂茅茨採椽者不報武后本紀永昌元年正月乙卯享於萬象神宮大赦改元賜酺七日戊午布政於萬象神宮頒九條以訓百官舊唐書禮儀志永昌元年正月元日始親享明堂大赦改元其月四日御明堂布政頒九條以訓于百官文多不載翌日又御明堂饗羣臣賜縑纁有差自明堂成後縱東都婦人及諸州父老入觀兼賜酒食久之乃止吐蕃及諸夷以明堂成亦各遣使來賀武后本紀載初元年春正月神皇親享明堂大赦天下依周制建子月爲正月改永昌元年十一月爲載初元年十二月爲臘月改舊正月爲一月禮儀志載初元年冬正月庚辰朔日南至復親饗明堂大赦改元用周正翼日布政于羣后其年二月則天又御明堂大開三教内史邢文偉講孝經命侍臣及僧道士等以次論議日昃乃罷天授二年正月乙酉日南至親祀明堂合祭天地以周文王及武氏先考先妣配百神從祀並於壇位次第布席以祀之於是春官郎中韋叔夏奏曰明堂正禮唯祀五帝配以宗祖及五帝五官神等自外餘神並不合預伏惟陛下追逺情深崇禋志切於明堂享祀加昊天上帝皇地祗重之以先后配享此乃補前王之闕典𢎞嚴配之䖍誠往以神都郊壇未建乃於明堂之下廣祭衆神葢義出權時非不刋之禮也謹案禮經其内官中官五岳四瀆諸神並合從祀於二至明堂總奠事乃不經然則宗祀配天之親雜與小神同薦於嚴敬之道理有不安望請毎歲元日惟祀天地大神配以帝后其五岳以下請依禮於冬夏二至從方丘圜丘庶不煩黷從之則天皇后紀天授三年正月大享明堂長夀二年春一月大享明堂唐書則天皇后傳長夀二年享神宮自制大樂舞工用九百人以武承嗣爲亞獻三思爲終獻舊唐書音樂志則天大聖皇后享明堂樂章十二首御撰外辨將出總章陳昔典衢室禮惟神宏規則天地神用叶陶鈞負扆三春旦充庭萬宇賔顧已誠虚薄空慙馭兆人皇帝行用黄鐘宮仰膺歴數俯順謳歌逺安邇肅俗阜時和化光玉鏡訟息金科方興典禮永戢干戈皇嗣出入昇降至人光俗大孝通神謙以表性恭惟立身洪規載啓茂典方陳譽隆三善祥開萬春迎送王公千官肅事萬國朝宗載延百辟爰集三宮君臣得合魚水斯同睿圖方永周歴長隆登歌大呂均無射羽禮崇宗祀志表嚴禋笙鏞合奏文物惟新敬遵茂典敢擇良辰潔誠斯著奠竭方申配饗笙鏞間鳴玉文物昭清暉粹影臨芳奠休光下太㣲孝忠期有感明潔庶無違宮音履艮苞羣望居中冠百靈萬方資廣運庶品荷裁成神功諒匪測盛德實難名藻奠申誠敬恭祀表惟馨角音出震位開平秩扇條風乗甲乙龍德盛鳥星出薦珪篚陳誠實徴音赫赫離精御炎陸滔滔熾景開隆暑冀延神鍳俯蘭罇式表䖍襟陳簋俎商音律則夷則序應收成功宣建武儀表惟明爰申禮奠庶展翹誠九秋是式百穀斯盈羽音葭律肇啟隆冬蘋藻攸陳饗祭黄鐘既成玉燭紅粒方殷稔歲武后本紀三年春一月大享明堂唐書武后本紀天冊萬歲元年正月改元證聖丙申萬象神宮火舊唐書武后本紀證聖元年明堂災至明而並從煨燼庚子以明堂災告廟手詔責躬禮儀志時則天又於明堂後造天堂以安佛像高百餘尺始起建構爲大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒明堂至曙二堂並盡尋時又無雲而雷起自西北唐書武后本紀萬歲通天元年臘月甲申封於神岳改元曰萬歲登封三月丁巳復作明堂改曰通天宮大赦改元賜酺七日神功元年四月置九鼎于通天宮舊唐書禮儀志天冊萬歲二年三月重造明堂成號爲通天宮四月朔日又行親享之禮大赦改元爲萬嵗通天翼日則天御通天宮之端扆殿命有司讀時令布政于羣后其年鑄銅爲九州鼎既成置于明堂之庭各依方位列焉神都鼎高一丈八尺受一千八百石冀州鼎名武興雍州鼎名長安兖州名日觀青州名少陽徐州名東源揚州名江都荆州名江陵梁州名成都其八州鼎高一丈四尺各受一千二百石司農卿宗晉卿爲九鼎使都用銅五十六萬七百一十二觔鼎上圖寫本州山川物産之像仍令工書人著作郎賈膺福殿中丞薛昌容鳳閣主事李元振司農録事鍾紹宗等分題之左尚方署令曹元廓圖畫之鼎成自元武門外曳入令宰相諸王南北衙宿衛兵十餘萬人并仗内大牛白象共曳之則天自爲曳鼎歌令相唱和其時又造大儀鐘歛天下三品金竟不成九鼎初成欲以黄金千兩塗之納言姚璹曰鼎者神器貴於質朴無假别爲浮飾臣觀其狀光有五彩輝煥錯雜其間豈待金色爲之炫燿乃止其年九月又大享於通天宮以契丹破滅九鼎初成大赦改元爲神功蕙田案本紀于萬歲通天元年書四月親享二年書正月親享九月改元神功今志以爲即元年之九月則本紀當稱神功二年不當直稱二年矣然考通鑑于萬歲通天元年書更造明堂成明年神功元年書鑄九鼎成正與紀合則此併爲一年者誤也通典云明年九月又享通天宮與此月同而年異豈其字當爲明字之誤歟聖歴元年正月又親享及受朝賀尋制每月一日於明堂行告朔之禮司禮博士辟閭仁諿奏議曰謹案經史正文無天子每月告朔之事而鄭𤣥注玉藻聽朔以秦制月令有五帝五官之事遂云凡聽朔必持牲告其時帝及其神配以文王武王此鄭注之誤也故漢魏至今莫之用案月令云其帝太昊其神勾芒者謂宣布時令告示下人其令詞云其帝其神耳所以爲敬授之文欲使人奉其時而務其業每月有令故謂之月令非謂天子月朔日以配帝而祭告之其毎月告朔者諸侯之禮也故春秋左氏傳曰公既視朔遂登觀臺又鄭注論語禮云人君每月告朔於廟有祭謂之朝享魯自文公始不視朔是諸侯之禮明矣今王者行之非所聞也案鄭所謂告其帝者即太昊等五人帝其神者即重黎等五行官雖並功施於人列在祀典無天子毎月拜祭告朔之文臣等謹檢禮記及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無天子每月告朔之事若以爲代無明堂故無其告朔之禮則江都集禮貞觀禮顯慶禮及祠令著祀五方上帝於明堂即孝經宗祀文王於明堂也此則無明堂而著其享祭何爲告朔獨闕其文若以君有明堂即合告朔則周秦有明堂而經典正文無天子每月告朔之事臣等歴觀今古博考載籍既無其禮不可習非望請停毎月一日告朔之祭以正國經竊以天子之尊而用諸侯之禮非所謂頒告朔令諸侯使奉而行之義也鳳閣侍郎王方慶又奏議曰天子以孟春正月上辛日於南郊總受十二月之政還藏於祖廟月取一政班於明堂諸侯孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之人君以其禮告廟則謂之告朔聽視此月之政則謂之視朔亦曰聽朔雖有三名其實一也今禮官議稱經史正文無天子每月告朔之事者臣謹案春秋文公六年閏十月不告朔榖梁傳曰閏附月餘日天子不以告朔左氏傳云閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣寧有他月而廢其禮者乎博考經籍其文甚著何以明之周禮太史職云頒告朔於邦國閏月告王居門終月又禮記玉藻云閏月則闔門左扉立于其中並是天子閏月而行告朔之事也禮官又稱玉藻天子聽朔於南門之外周禮天官太宰正月之吉布政于邦國都鄙干寳注云周正建子之月告朔日也此即玉藻之聽朔矣今每歲首元日通天宮受朝讀時令布政事京官九品以上諸州朝集使等咸列于庭此聽朔之禮畢而合于周禮玉藻之文矣禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令無王者告朔之事者臣謹案玉藻云𤣥冕而朝日於東門之外聽朔於南門之外鄭注云朝日春分之時也東門皆謂國門也明堂在國之陽毎月就其時之帝而聽朔焉卒事反宿於路寢凡聼朔必以特牲告其時帝及其神配以文王武王臣謂今歲首元日通天宮受朝讀時令及布政自是古禮孟春上辛受十二月之政班於明堂其義昭然猶未行也即如禮官所言遂闕其事臣又案禮記月令天子毎月居青陽明堂總章元堂即是每月告朔之事先儒舊說天子行事一年十八度入明堂大享不問卜一入也每月告朔十二入也四時迎氣四入也廵狩之年一入也今禮官立議王惟歲首一入耳與先儒既異臣不敢同鄭𤣥云凡聽朔告其帝臣愚以爲告朔之日則五方上帝之一帝也春則靈威仰夏則赤熛怒秋則白招拒冬則叶光紀季月則含樞紐也並以始祖而配之焉人帝及神列在祀典亦於其月而享祭之魯自文公始不視朔子貢見其禮廢欲去其羊孔子以羊存猶可識其禮羊亡其禮遂廢故云爾愛其羊我愛其禮漢承秦滅學庶事草創明堂辟雍其制遂闕漢武帝封禪始造明堂於泰山既不立於京師所以無告朔之事至漢平帝元始中王莽輔政庶㡬復古乃建明堂辟雍焉帝祫祭於明堂諸侯王列侯宗室子弟九百餘人助祭畢皆益户賜爵及金帛増秩補吏各有差漢末䘮亂尚傳其禮爰至後漢祀典仍存明帝永平二年郊祀五帝於明堂以光武配祭牲各一犢奏樂如南郊董卓西移載籍湮滅告朔之禮於此而墜暨於晉末戎馬生郊禮樂衣冠掃地總盡元帝過江是稱狼狽禮樂制度南遷葢寡彞典殘缺無復舊章軍國所資臨事議之既闕明堂寧論告朔宋朝何承天纂集其文以爲禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而已隋大業中煬帝命學士撰江都禮集只抄撮禮論更無異文貞觀顯慶禮及祠令不言告朔者葢為歴代不傳其文遂闕各有由緒不足依據今禮官引為明証在臣誠實有疑陛下肇建明堂聿遵古典告朔之禮猶闕舊章欽若稽古應須補葺若每月聽政於明堂事亦煩數孟月視朔恐不可廢上又命奉常廣集衆儒取方慶仁諿所奏議定得失當時大儒成均博士吳揚吾太學博士郭山惲曰臣等謹案周禮禮記及三傳皆有天子告朔之禮夫天子頒告朔于諸侯秦政焚滅詩書由是告朔禮廢今明堂肇建總章新立紹百王之絶軌樹萬代之鴻規上以嚴配祖宗下以敬授人時使人知禮樂道適中和災害不生禍亂不作今若因循頒朔毎月依行禮貴隨時事須沿革望依王方慶議用四時孟月日及季夏於明堂修復告朔之禮以頒天下其帝及神亦請依方慶用鄭元義告五時帝於明堂上則嚴配之道通於神明至孝之德光於四海制從之張齊賢傳聖歴初為太常奉禮郎武后詔百官議告朔于明堂讀時令布政事太常博士辟閭仁諝請罷告朔月祭齊賢不韙其說質曰榖梁氏稱閏月天子不告朔它月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣周太史頒朔于邦國玉藻閏月王居門是天子雖閏亦告朔二家去聖不逺載天子諸侯告朔事顯顯弗繆今議者乃以太宰正月之吉布治邦國而言天子元日一告朔殊失其㫖一歲之元六官自布所職之典干寳為當作謂吉為朔故世人繆吉為告據繆失經不得為法議者又引左氏說專在諸侯不知玉藻與左說正同而獨於天子言歲首一告何去取之恣也又謂時帝五人帝也元於時帝包天人故以文武作配是並告兩五帝為不疑諸侯受朔天子藏於廟天子受朔于天宜在明堂故告時帝配祖考議者曰天子月告祭頒朔則諸侯安得藏之故太宰歲首布一歲事太史頒之也是不然周太史頒朔邦國是總頒十二朔於諸侯天子猶月告者頒官府都鄙也内外異言之也禮不可罷鳳閣侍郎王方慶又言若月一聽則近于煩毎孟月視朔惟制定其禮臣下不敢專成均博士吳揚吾等請兼如齊賢方慶議不數歲禮亦廢蕙田案齊賢之論最當如方慶楊吾之說則仍是五時迎氣何告朔之有且方慶自言告朔十二而忽病其煩其為師心棄禮夫亦自知之矣舊唐書禮儀志長安四年始制元日明堂受朝停讀時令蕙田案武后以周簒唐實為元惡而違天動衆非禮興作尤屬妖妄著其矯誣正以嚴其斧鉞也馬氏通考幾于削而棄之今取其有關事迹者載之以彰世宙之變而槩降一格以貶其文至諸臣立武氏之朝而紛紛議禮誠如子昻傳賛所云薦圭璧于房闥以脂澤汗漫之者亦可醜矣更何足論其得失乎唐書中宗本紀神龍元年九月壬午祀天地于明堂大赦舊唐書禮儀志中宗即位神龍元年九月親享明堂合祭天地以高宗配禮畢曲赦京師明年駕入京於季秋大享復就圜丘行事迄于睿宗之世蕙田案唐初本無明堂武后創之而中宗反承用之以是行禮曾不若復就圜丘之為愈矣唐書陳貞節傳明年帝将大享明堂貞節惡武后所營非古所謂木不鏤土不文之制乃與馮宗上言明堂必直丙巳以憲房心布政太㣲上帝之所武后始以乾元正寢占陽午地先帝所以聽政故毁作堂撤之日有音如雷庶民譁訕以為神靈不悅堂成災火從之后不修德俄復營構殫用極侈詭禳厥變又欲嚴配上帝神安肯臨且宻邇掖庭人神雜擾是謂不可放物者也二京上都四方是則天子聽政乃居便坐無以尊示羣臣願以明堂復為乾元殿使人識其舊不亦愈乎詔所司詳議刑部尚書王志愔等僉謂明堂壊怪不法天燼之餘不容大享請因舊循制還署乾元正寢正至天子御以朝會若大享復寓圜丘制曰可舊唐書禮儀志開元二年八月太子賔客薛謙光獻九鼎銘其蔡州鼎銘天后御撰曰羲農首出軒昊膺期唐虞繼踵湯禹乗時天地光宅域中雍熙上天降鍳方建隆基紫㣲令姚崇奏曰聖人啓運休兆必彰請宣付史館從之五年正月幸東都将行大享之禮太常少卿王仁忠博士馮宗陳貞節等議以武氏所造明堂有乖典制奏議曰明堂之建其所從來逺矣自天垂象聖人則之蒿柱茅簷之規上圓下方之制考之大數不踰三七之間定之方中必居丙巳之地者豈非得房心布政之所當太㣲上帝之宮乎昔漢氏承秦經籍道息孝武初議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能决至孝平元始四年始創造於南郊以申嚴配光武中興元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地常取丙巳者斯葢百王不易之道也高宗永徽三年詔禮官學士議明堂制度羣儒紛競各執異端久之不決因而遂止則天太后以為乾元大殿承慶小寢當正陽亭午之地實先聖聽斷之宮乃起工徒挽令催覆既毁之後雷聲隱然衆庶聞之或以為神靈感動之象也於是増土木之麗因府庫之饒煙熖蔽日梁柱排雲人斯告勞天實貽誡煨燼甫爾遽加修復况乎地殊丙巳未答靈心跡匪膺期乃申嚴配事昧彝典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也高明爽塏事資䖍敬宻邇宮掖何以祈天人神雜擾不可放物此其不可者三也况兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沉黙當須審攷歴之計擇煩省之宜不便者量事改修可因者隨宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣詔令所司詳議奏聞刑部尚書王志愔等奏議咸以此堂所置實乖典制多請改削依舊造乾元殿自是駕在東都常以元日冬至於乾元受朝賀季秋大享祀依舊於圜丘行事十年復題乾元殿為明堂而不行享祀之禮通典開元十五年太常博士錢嘉會上議曰准月令九月農功畢大享五帝於明堂貞觀及神龍皆於南郊報祭中間寢廢有虧祀典準孝經宗祀文王於明堂以配上帝請每年九月於南郊雩壇行享禮以睿宗皇帝配從之二十年季秋大享於明堂祀昊天上帝以睿宗配又以五方帝五官從祀籩豆罇罍之數與雩禮同唐書王仲丘傳開元中上言貞觀禮季秋祀五方帝五官於明堂顯慶禮祀昊天上帝於明堂臣謂周郊祀后稷以配天宗祀文王於明堂以配上帝先儒以天為感帝引太㣲五帝著之上帝則屬之昊天鄭𤣥稱周官旅上帝祀五帝各文而異禮不容并而為一故於孝經天上帝申之曰上帝亦天也神無二主但異其處以避后稷今顯慶享上帝合於經然貞觀嘗祀五方帝矣請二禮皆用詔可蕙田案仲丘傳本無年月據通典當在此年又案是年大享新舊書本紀並失載然杜氏必可信且據舊書本紀開元新禮適以是年九月告成則正行大享尤為得情否則大享一門為虛設矣通典開元禮纂類皇帝季秋大享於明堂攝事附将祀有司卜日如别儀前祀七日戒誓百官皇帝散齋致齋並如圜丘儀祀官齋戒同陳設前祀三日尚舎直長施大次於明堂東門之外道北尚舎奉御鋪御座守宮設文武侍臣次於大次之後文官在左武官在右俱北向諸祀官次於璧水東門之外道南從祀官文官九品以上於祀官之東東方南方蕃客又於其東俱重行每等異位北向西上介公酅公於璧水西門之外道南武官九品以上於介公酅公西西方北方蕃客又於其西俱重行每等異位北向東上褒聖侯于文官三品之下若有諸州使人分方各于文武官之後惟攝事無大次以下儀守宮設祀官公卿已下次于璧水東門外道南北向西上設陳饌幔於璧水東門之内道北南向前祀二日太樂令設宮懸之樂於明堂前庭如圜丘之儀右校清掃明堂内官郊社令積柴於燎壇其壇于樂懸之南方一丈高丈二尺開上南出户方六尺前祀一日奉禮設御位於堂之東南西向設祀官公卿位於東門之内道南攝事設祀官公卿位于明堂東南執事者位於公卿之後近南每等異位俱重行西面北上設御史位於堂下一位在東南西向一位在西南東向令史各陪其後設奉禮位於樂懸東贊者二人在南差退俱西向設協律郎位於堂上午陛之東西向設太樂令位於北懸之間攝則于此下便設望燎位于柴壇之北南向無太祝已下至褒聖侯之位也太祝奉玉帛位於柴壇之南皆北向設從祀文官九品已上於執事之南東方南方蕃客又於其南俱每等異位重行西面北上介公酅公位於西門之内道南武官九品已上於介公酅公之後西方北方蕃客於武官之南俱每等異位重行東面北上其褒聖侯于文武三品之下若有諸州使人分方位各于文武之後又設祀官及從祀羣官等門外位於東門外道南皆如設次之式設牲牓於東門之外當門西向南上牲數如雩祀之儀設酒罇之位明堂之上下昊天上帝太罇二著罇二犧罇二山罍二在室内神座之左象罇二壺罇二山罍二在堂下東南西向配帝著罇二犧罇二象罇二罍二在堂下神座之左五方帝各太罇二著罇二犧罇二罍二各於室内神座之内左向五帝各著罇二在堂上各於神座之左俱内向五官各象罇二在階下皆於神座之左俱右向堂上之罇皆于坫階下之罇皆藉以席俱加勺冪設爵于罇下設御洗於東階東南攝事設祝官洗亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚冪各於酒罇之左俱右向其執罇罍篚冪者各位於其後各設玉幣之篚於堂之上下罇坫之間祀日未明五刻太史令郊社令升設昊天上帝神座於明堂太室之内中央南向席以藁秸設睿宗大聖真皇帝神座於上帝之東南西向席以莞設青帝於木室西向赤帝於火室北向黄帝於太室南户之西北向白帝於金室東向黑帝於水室南向席皆以藁秸設太昊炎帝軒轅少昊顓頊之座各於五方帝之左俱内向差退若非明堂五室皆如雩祀圜丘設座之禮設五官座於明堂之庭各依其方俱内向席皆以莞設神位各於座首省牲器如别儀鑾駕出宮如圜丘儀奠玉帛祀日未明三刻諸祀官各服其服設罇罍玉幣升行掃除門外位儀舞人就位皇帝出行宮之次羣官入就位近侍臣陪從儀並同圜丘攝亦如圜丘攝事皇帝至版位西向立每位立定太常卿與博士退立於左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜謁者引諸獻官俱詣東陛升堂立於罇所太祝與諸獻官皆跪取玉幣於篚立於東南隅東向北上五方帝五配帝太祝立於西南隅東向北上五方帝五官諸太祝及獻官又取幣於篚立於罇所太常卿引皇帝太和之樂作皇帝每行皆張太和之樂皇帝升自南陛侍中中書令已下及左右侍衛量人從升已下皆如之攝則謁者引太尉升南陛奠玉帛皇帝升堂北面立樂止太祝加玉於幣以授侍中侍中奉玉帛西向進皇帝搢鎮珪受玉帛凡受物皆搢鎮珪奠訖執珪俛伏興登歌作肅和之樂以大呂之均太常卿引皇帝進北向跪奠於昊天上帝神座俛伏興太常卿引皇帝立於南方北面五方帝之太祝奉玉帛各奠於神座還罇所皇帝再拜訖太祝又以配帝之幣授侍中攝事皆謁者賛授太尉上下皆然侍中奉幣西向進皇帝受幣太常卿引皇帝進西面跪奠於睿宗大聖真皇帝神座前俛伏興太常卿引皇帝立於東方西向五帝之獻官各奠幣於神座各還五官之祝次奠幣神座各還罇所皇帝再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史皆奉毛血之豆立於堂下於登歌止祝史奉毛血各由其階升諸太祝迎取於堂上俱進奠於神座諸太祝與祝史退立於罇所進熟皇帝既升奠玉帛其設饌盥洗罇爵一如圜丘之儀攝則太尉既升奠太常卿引皇帝立於南方北向太祝一人持版進於皇帝之右西面跪讀祝文曰維某年歲次某月朔日子嗣天子臣某敢昭告於攝事云天子臣某謹遣太尉封臣名敢昭告于昊天上帝惟神覆燾羣生甄陶庶類不言而信普博無私謹擇元辰祗率恆禮敬以玉帛犧齊粢盛庶品肅恭禋祀式展誠敬皇考睿宗大聖真皇帝配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於天帝神座還罇所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執罇者舉冪侍中取爵於坫進引皇帝受爵侍中賛酌汛齊訖樂作太常卿引皇帝進睿宗大聖真皇帝座前西向跪奠爵俛伏興太常卿引皇帝立於東方西向謁者五人引五方帝之太祝詣罍洗盥手俱取匏爵於坫酌汎齊各進奠於其神座前還罇所樂止配帝太祝一人持版進於皇帝之左北面跪讀祝文曰維某年歲次月朔日孝子開元神武皇帝臣某敢昭告於皇考睿宗大聖真皇帝祇率舊章肅恭恒禮敬致禋祀於昊天上帝惟皇考德光宇宙道叶乾元申錫無疆實膺嚴配謹以制幣犧齊粢盛庶品肅恭明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座前還罇所皇帝拜訖樂止太常卿引皇帝南方北向立樂作其飲福還宮並如圜丘儀攝事亦同雩祀攝事舊唐書禮儀志二十五年駕在西京詔将作大匠康䛒素往東都毁之䛒素以毁拆勞人乃奏請且拆上層卑於舊制九十五尺又去柱心木平座上置八角樓樓上有八龍騰身捧火珠又小於舊制圜五尺覆以真瓦取其永逸依舊為乾元殿蕙田案通典新舊唐書皆作康䛒素惟通考脫素字誤元宗本紀二十七年冬十月将改作明堂訛言官取小兒埋于明堂之下以為厭勝村野童兒藏于山谷都城騷然咸言兵至上惡之遣主客郎中王佶往東都及諸州宣慰百姓久之乃定冬十一月毁東都明堂之上層改拆下層為乾元殿蕙田案史文連書冬十月當衍其一否則後當為十一月之誤文獻通考自是迄唐之世季秋大享皆寓圜丘代宗永泰二年禮儀使杜鴻漸奏季秋大享明室祀昊天上帝請以肅宗配制可憲宗元和元年太常禮院奏季秋大享明堂祀昊天上帝今太廟祔享禮畢大饗之日準禮合奉皇考順宗配神作主詔曰敬依典禮十五年時穆宗已即位禮院奏大享明堂案禮文皇考配坐今奉憲宗配神作主詔曰敬依典禮蕙田案此三大饗新舊書紀志俱不載馬氏必别有所考右唐明堂五禮通考卷二十七
