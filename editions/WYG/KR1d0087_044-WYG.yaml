body:
  text: 五禮通考卷三十四刑部尚書秦蕙田撰吉禮三十四日月舊唐書禮儀志王仲丘撰成一百五十卷名曰大唐開元禮以日月爲中祀開元禮皇帝春分朝日于東郊儀秋分夕月及攝事附齋戒前祀五日皇帝散齋三日致齋二日如圜丘儀諸應祀之官齋戒如別儀陳設如祀五帝儀唯不設配帝位及罇罍燎壇方八尺髙一丈開上南出戸方三尺鑾駕出宮如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實罇罍玉幣凡罇之次太罇為上實以醴齊著罇次之實以盎齊罍罇實以清酒其𤣥酒各實于上罇罍罇無𤣥酒禮神之玉以圭有邸其幣大明以青夜明以白太官令帥進饌者實諸籩豆簠簋入設于内壝東門之外饌幔内未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史與執罇罍筐冪者入自東門當壇南重行北靣以西爲上凡引導者毎曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執罇者升自東陛立于罇所壇下執罍洗篚冪者各就位贊引引御史太祝詣壇東陛升行埽除于上令史祝史行埽除于下訖引降就位駕將至謁者贊引各引祀官及從祀羣官諸國蕃客使俱就門外位駕至大次門外迴輅南向將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍立皇帝降輅之大次通事舍人引文武五品以上從祀之官皆就門外位太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行埽除于上降行樂懸于下訖引出就位皇帝停大次半刻頃通事舍人分引從祀文武羣官介公酅公諸國客使先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝服𤣥冕出次華葢侍衞如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至南内壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華葢仗衞停于門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西靣立毎立定太常卿與博士退立于左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜太常卿前奏有司謹具請行事攝則初司空入謁者贊引各引祀官以次入就位贊拜訖謁者進太尉之左曰請行事凡獻皆以太尉為初獻退復位協律郎跪俛伏舉麾興凡取物者皆跪俯伏而取以興奠物則奠訖俛伏而後興鼓柷奏元和之樂乃以圜鍾之均以文舞之舞樂舞六成偃麾戞敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位攝則奉禮贊曰衆官再拜皇帝再拜奉禮曰衆官再拜在位者皆再拜太祝取玉幣于篚立于罇所太常卿引皇帝太和之樂作皇帝毎行皆作太和之樂皇帝詣壇升自南陛侍中中書令已下及左右侍從量人從升以下皆如之皇帝升壇北向立樂止攝則謁者引太尉升奠太祝加玉于幣以授侍中侍中奉玉帛東向進皇帝搢鎮圭受玉帛毎受物搢鎮圭奠訖執圭俛伏興登歌作肅和之樂乃以大呂之均太常卿引皇帝進北面跪奠于大明夕月云夜明神座俛伏興太常卿引皇帝少退北向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止攝則謁者引太尉初羣官拜訖祝史奉毛血之豆立于門外俟登歌止祝史奉毛血入升自南陛太祝迎取于壇上進奠于神座前太祝與祝史退立于罇所進熟皇帝既升奠攝則太尉既升奠玉帛大官令出帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉爼初皇帝既入至位樂止大官令引饌入爼初入門雍和之樂作以黄鍾之均饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引于壇上設于神座前籩豆葢冪先徹乃升簠簋既奠却其葢于下設訖謁者引司徒以下降自東陛復位太祝還罇所太常卿引皇帝詣罍洗樂作其盥洗之儀如圜丘太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立于罇所齋郎奉爼從升立于司徒之後太常卿引皇帝詣罇所執罇者舉冪侍中贊酌醴齊訖夀和之樂作皇帝毎酌獻及飲福皆作夀和之樂太常卿引皇帝少退北向立樂止太祝持版進于神座之右東面跪讀祝文曰維某年歳次月朔日子嗣天子臣某攝則云謹遣太尉臣名敢昭告于大明惟神宣布太陽照臨下土動植咸賴幽隱無遺時惟仲春敬遵常禮夜明云昭著𤣥象輝燿陰精理歴授時仰觀取則爰兹仲秋用率常禮謹以玉帛犧齊粢盛庶品祗祀于神尚享訖興皇帝再拜初讀祝文訖樂作太祝進奠版于神座還罇所皇帝拜訖樂止太祝以爵酌上罇福酒授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝帥齋郎進爼太祝減神前胙肉加于爼太祝持爼以授司徒司徒奉爼西向進皇帝受以授左右攝則太尉受以授齋郎謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戞敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手攝則太尉獻將畢謁者引太常卿為亞獻下皆倣此洗匏爵訖謁者引太尉自東陛升壇詣罇所執罇者舉冪太尉酌盎齊武舞作謁者引太尉進大明神座前北向跪奠爵興謁者引太尉少退北向再拜太祝以爵酌罍福酒進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿皇帝儀與攝事同以光祿卿為終獻詣罍洗盥洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢太祝進徹豆還罇所徹者籩豆各少移于故處奉禮曰賜胙贊者唱衆官再拜在位者皆再拜已飲福受胙者不拜太和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作攝則謁者引太尉皇帝就望燎位南向立樂止于羣官將拜太祝執篚進神座前跪取玉帛祝版齋郎以爼載牲體黍稷飯爵酒興降自南陛南行經懸内當柴壇南東行自南陛登柴壇以玉幣祝版饌物寘于柴上户内訖奉禮曰可燎東西各四人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出内壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華葢仗衞如常儀皇帝入次樂止謁者贊引引祝官及從祝羣官諸國蕃客以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下俱再拜贊引引出工人二舞以次出鑾駕還宫如圜丘之儀冊府元龜天寶三載三月戊寅詔曰祭之爲典以陳至敬名或不正是相奪倫日月照臨下土式瞻既超言象之外宜極尊嚴之禮列爲中祀頗紊大猷自今已後升爲大祀仍以四時致祭庶昭報之誠格于上下欽崇之稱合于典則蕙田案開元禮最得禮意𤣥宗則既行之矣乃天寶改元旋自反汗郊天之禮屢用移易日月中祀禮之常經忽又升爲大祭二分朝夕祭之大倫忽又致以四時其意何居唐書新羅傳新羅元日相慶是日拜日月神宋史禮志天禧初太常禮院以監察御史王博文言詳定凖禮春分朝日于東郊秋分夕月于西郊國語大采朝日少采夕月又曰春朝朝日秋夕夕月唐柳宗元論云夕之名者朝拜之偶也古者旦見曰朝暮見曰夕案禮秋分夕月葢其時晝夜平分太陽當午而陰魄已生遂行夕拜之祭以祀日未前十刻大官令率宰人割牲未後三刻行禮葢是古禮以夕行朝祭之儀又案禮云從子至已爲陽從午至亥爲陰參詳典禮合于未後三刻行禮蕙田案夕月祭刻此爲合禮樂志景德朝日三首降神髙安六變陽德之母羲御寅賓得天久照首兹三辰正辭備物肅肅振振淪精降監克享明禋奠玉幣酌獻嘉安醴齊良潔有牲斯純大采𤣥冕乃昭其文王宮定位粢盛苾芬民事以敘盛德升聞送神髙安懸象著明照臨下土降福穰穰德施周普夕月三首降神髙安六變凝陰禀粹照臨八紘麗天垂象繼日代明一氣資始四時運行靈祇昭格備物薦誠奠玉幣酌獻嘉安夕曜乗秋功存㝢縣金奏在縣以時致薦祀事孔寅明靈降眷潔粢豐盛倉箱流衍送神髙安夙陳籩豆潔誠致祈垂休保佑景祚巍巍禮志慶歴三年定朝日之圭夕月之圭皆五寸朝日夕月慶歴用羊豕各二籩豆十二簠簋爼二皇祐五年定朝日壇舊髙七尺東西六歩一尺五寸增爲八尺廣四丈如唐郊祀錄夕月壇與隋唐制度不合從舊則壇小如唐則坎深今定坎深三尺廣四丈壇髙一尺廣二丈四方爲陛降入坎中然後升壇壇皆兩壝壝皆二十五歩增大明夜明壇山罍二籩豆十二禮生引司天監官分獻上香奠幣爵再拜通考元豐六年禮部言熈寧祀儀朝日壇廣四丈夕月壇廣二丈以唐王涇郊祀錄考之夕月壇方廣四丈今止二丈葢禮儀之誤請依制廣改造夜明壇從之宋史樂志大觀秋分夕月四首降神髙安至陰之精虧而復盈輪髙僊桂階應祥蓂玉兔影孤金莖露溢其駕星車顧于兹夕奠玉幣玉鈎初彎氷盤乍圓扇掩秋後烏飛枝邊精凝蟾蜍輝光嬋娟歆于明祀弭芳節焉酌獻名稽漢儀歌參唐宗往于卿少乗秋氣中周天而行如姊之崇可飛霞佩下瑠璃宮送神四扉大開五雲車立霓裾娣從風翿童執摇曵胥來鏘洋爰集歆我嚴禋西靣以揖禮志五禮新儀定二壇髙廣坎深如皇祐無所改文獻通考政和三年議禮局上五禮新儀朝日壇廣四丈髙八尺四出陛兩壝二十五歩夕月坎深三尺廣四丈壇髙一尺廣二丈四方各爲陛入坎中然後升壇兩壝毎壝二十五歩宋史髙宗本紀紹興三年四月己亥復舉五帝日月之祀文獻通考紹興三年司封員外郎鄭士彥言春分朝日秋分夕月祀典未舉望詔禮官講求從之其後于城外惠照院望祭位版日書曰大明月書曰夜明玉用圭璧大明幣用赤夜明幣用白禮如祀感生帝宋史樂志紹興朝日十首降神髙安圜鍾爲宮𤣥鳥既至序屬春分朝于太陽厥典備存載嚴大采示民有尊揚光下燭煜爚東門黄鍾爲角升暉麗天陽德之母率無頗偏兼燭下土恭事崇壇禮樂具舉頓御六龍裴回容與太蔟爲徴周祀及闇漢制中營肸蠁是届禮神以兄我潔斯璧我肥斯牲神兮燕享鑒觀孔明姑洗爲羽屹爾王宮泛臨翊翊惠此萬方豈惟五色以修陽政以習地德雲景杳㝠施祥無極初獻升殿正安天宇四霽嘉壇聿崇肅祗嚴祀登降有容仰瞻曜靈位居其中既安既宴沛哉豐融奠玉幣嘉安物之備矣以交于神時惟炎精不忘顧歆經緯之文璆琳之質燦然相輝其儀秩秩奉爼豐安扶桑朝暾和氣肸飭奉此牲牢爲爼孔碩芬馨進聞介我黍稷所將以誠兹用享德酌獻嘉安匏爵斯陳百味㫖酒勺以獻之再拜稽首鐘鼓在列靈方安留眷然加薦惟時之休亞終獻文安禮罄沃盥誠意肅將包茅是縮奠畢重觴煥矣情文既具醉止熈事備成靈其有喜送神禮安羲和駕兮其容杲杲將安之矣言歸黄道光赫萬物無古無今人君之表咸仰照臨夕月十首降神髙安圜鍾爲宮金行告道玉律分秋禮蕆西郊毖祀聿修精意潛達永孚于休神之聽之爰格飇斿黄鍾爲角時維秋仲夜寂天清實嚴姊事用答陰靈壇壝斯設黍稷惟馨雲車來下庶歆厥誠太蔟爲徴遡日著明麗天作配潔誠以祠禮行肅拜光凝冕服氣肅環珮庶幾昭格祗而不懈姑洗爲羽穆穆流輝太陰之精盈虧靡忒寒暑以均克禋克祀揆日涓辰牲碩酒㫖來燕來寧升殿正安猗歟崇