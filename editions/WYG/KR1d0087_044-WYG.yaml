獻同上復位贊引引獻官至神位前贊搢笏獻爵出笏復位一祝文維某年某月某朔某日嗣天子御名謹昭告于大明之神惟神陽精之宗列聖之首神光下照四極無遺功垂今昔率土仰賴兹當仲春式遵古典以玉帛牲醴之儀恭祀于神伏惟鑒歆錫福黎庶尚享維某年某月某朔某日嗣天子御名謹昭告于夜明之神惟神鍾陰之精配陽之德繼明于夕有生共賴既惟五星列宿咸司下土各有攸分眇予之資仰承帝命君此生民兹者時惟秋分爰遵典禮以玉帛牲醴之儀用修常祭于神惟神歆鑒福我邦民尚享圖書編朝日壇嘉靖九年罷從祀建壇朝陽門外二里許爲制一成壇靣紅琉璃東西南北堦九級俱白石内􅎉星門四西門外爲燎爐瘞池西南爲具服殿東北爲神庫神厨宰牲亭燈庫鐘樓北爲遣官房外建天門二北天門外西北爲禮神坊西天門外迤南爲陪祀齋宿房䕶壇地一百畝歳春分祭大明之神于朝日壇西向甲丙戊庚壬年上祭服親祀餘年遣文大臣攝之夕月壇嘉靖九年建壇阜成門外之南二里許爲制一成壇用白琉璃東西南北堦六級俱白石内櫺星門四東門外爲瘞池東北爲具服殿南門外爲神庫西南爲宰牲亭神厨祭器庫北門外爲鐘樓遣官房外天門二東門外北爲禮神坊䕶壇地三十六畝七分歳秋分祭夜明之神于夕月壇東向從祀木火土金水星二十八宿周天星辰南向丑辰未戌年上皮弁服親祀餘年遣武大臣攝之蕙田案朝日之祭用天干之五夕月之祭用地支之四六十年中祭日者三十祭月者二十而又有甲辰甲戌等十年日月皆親祭丁卯己巳等二十年皆不親祭明史樂志嘉靖九年復定朝日樂章迎神熈和之曲仰瞻兮大明位尊兮王宮時當仲春兮氣融爰遵祀禮兮報功微誠兮祈神昭鑒願來享兮迓神聰奠玉帛凝和之曲神靈壇兮肅其恭有帛在篚兮赤琮奉神兮祈享以納予躬奠兮忻以顒初獻夀和之曲玉帛方奠兮神歆酒行初獻兮舞呈齊芳馨兮犧色騂神容恱兮鑒予情亞獻時和之曲二齊升兮氣芬芳神顔怡和兮喜將予令樂舞兮具張願垂普照兮民康終獻保和之曲慇懃三獻兮告成羣職在列兮周盈神錫休兮福民生萬世永賴兮神功明徹饌安和之曲一誠盡兮予心懌五福降兮民獲禧仰九光兮誠己申終三獻兮徹敢遲送神昭和之曲祀禮既周兮樂舞揚神享以納兮還青鄉予當拜首兮奉送願恩光兮普萬方永耀熹明兮攸賴烝民咸仰兮恩光望燎之曲覩六龍兮御駕神變化兮鳳翥鸞翔束帛殽羞兮詣燎方佑我皇明兮基緒隆長夕月樂章迎神凝和之曲陰曰配合兮承陽宗式循古典兮齋以恭覩太陰來格兮星辰羅從予拜首兮迓神容初獻夀和之曲神其來止有嚴其誠玉帛在篚清酤方盈奉而奠之願鑒微情夫祀兮云何祈祐兮羣氓亞獻豫和之曲二觴載斟樂舞雍雍神歆且樂百職惟供願順歸兮五行祈民福兮惟神必從終獻康和之曲一誠以申三舉金觥鐘鼓鍧鍧環珮琤琤鑒予之情願永保我民生徹饌安和之曲禮樂肅具精意用申位坎居歆納兹藻蘋徹之弗遲儀典肅陳神其鑒之佑我生民送神保和之曲禮備告終兮神喜旋穹碧澄輝兮素華鮮星辰從兮返神鄉露氣清兮霓裳蹁躚望瘞之曲殽羞兮束帛薦之于瘞兮罔敢愆予拜首兮奉送願永貺兮民樂豐年禮志十年禮部上朝日夕月儀朝日迎神四拜飲福受胙兩拜送神四拜夕月迎神飲福受胙送神皆再拜飲並如舊儀圖書編嘉靖十年夕月壇以鐵爐置于坎上焚燎不必造燎壇以稱祭月于坎之義明史禮志隆慶三年禮部上朝日儀言正祭遇風雨則設小次于壇前駕就小次行禮其升降奠儀俱以太常寺執事官代制曰可蕙田案明集禮朝日夕月皆以清晨行事續文獻通考稱隆慶以前朝日以卯時夕月以酉時明史稱嘉靖時朝日以寅夕月以亥互有不同宋夕月以未後三刻稍爲近之惟本朝日以卯月以酉爲得陰陽出入之正矣右歴代祀日月五禮通考卷三十四
