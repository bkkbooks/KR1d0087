body:
  text: 五禮通考卷一百九十九刑部尚書秦蕙田撰嘉禮七十二觀象授時蕙田案王者奉若天道莫先於敬授人時堯正四仲舜齊七政周用五紀其道一也因寒暑之發歛節氣之早晚而騐草木禽獸之變辨作訛成易之期古聖人所以亮天工而熙庶績者其事特重焉今采堯典詩七月夏小正月令諸篇存累代之舊章備因時之善制自東漢以下有讀時令之儀杜氏通典入之嘉禮兹亦附見於後云書堯典敬授人時傳敬記天時以授人也蔡氏沈曰人時謂耕穫之候凡民事早晚之所關也平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾傳嵗起于東而始就耕謂之東作平均次序東作之事以務農也冬寒無事並入室處春事既起丁壯就功厥其也言其民老壯分析乳化曰孳交接曰尾平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革傳平序南方化育之事敬行其教以致其功因謂老弱因就在田之丁壯以助農也夏時鳥獸毛羽希少改易革改也平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨傳秋西方萬物成平序其政助成物夷平也老壯在田與夏平也毨理也毛更生整理平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛傳易謂嵗改易于北方平均在察其政以順天常隩室也民改嵗入此室處以辟風寒鳥獸皆生耎毳細毛以自温焉朱子曰平秩東作之類只是如今穀雨芒種之節候類又曰析因夷隩乃是騐之於人以審氣候之寒温與下句騐之於物以審時物之變遷語意相似若謂此句為定農事之早晚則下句為欲定何事耶大抵命此四官皆考天時以作律之事律正則可以授民時治百官而農桑田役之務飲食居處之宜無不得其序不必於此遽指一事而言也林氏之竒曰鳥獸孳尾希革毛毨氄毛盖萬物之㣲感天地至和之氣而動作應時故作律者觀此以候天特之早晚如禮記月令云魚上氷獺祭魚倉庚鳴鴻雁來之類是堯典之遺法也蔡氏沈曰東作春月嵗功方興所當作起之事也盖以律之節氣早晚均次其先後之宜以授有司也訛化也謂夏月時物長盛所當變化之事也西成秋月物成之時所當成就之事也朔易冬月嵗事已畢除舊更新所當改易之事也尚書大傳主春者張昏中可以種稷主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者昴昏中可以收歛盖藏田獵斷伐當告于天子而天子賦之民故天子南面而視四方星之中知民之緩急急則不賦籍則不舉力役故曰敬授民時此之謂也夏小正正月啟蟄傳言始發蟄也金氏履祥曰今二月始驚蟄而漢始以驚蟄為正月中月令孟春蟄蟲始振豈古者陽氣特盛啟蟄獨早與國語謂陽癉憤盈土氣震發則蟄蟲之動固宜然啟者始震之謂非出蟄也蔡氏德晉曰冬時蟄蟲皆塞其户至春時始開之雁北鄉傳先言雁而後言鄉者何也見雁而後數其鄉也鄉者何也鄉其居也雁以北方為居何以謂之為居生且長焉爾九月遰鴻雁先言遰而後言鴻雁何也見遰而後數之則鴻雁也何不謂南鄉也曰非其居也故不謂南鄉記鴻雁之遰也如不記其鄉何也曰鴻不必當小正之遰者也蔡氏德晉曰月令季冬雁北鄉孟春鴻雁來此合而記之也方氏矩曰數之猶言詳視之也蕙田案月令孟春鴻雁來呂氏春秋淮南子俱作候雁北與小正合雉震呴傳震也者鳴也呴也者鼔其翼也正月必雷雷不必聞惟雉為必聞之何以謂之雷則雉震呴相識以雷金氏履祥曰震振也呴鳴也書曰越有呴雉盖其音云蔡氏德晉曰震聲之髙也小寒雉始呴至此則其聲髙矣方氏矩曰雉震呴者言雉于雷始發聲之時而呴也呴雊通魚陟負氷傳陟升也負氷云者言解蟄也孔氏穎達曰謂魚從水下升于水上而負氷金氏履祥曰月令魚上氷是也魚冬則氣在腹故降春則氣在背故升負氷者春氷薄魚既升背若負之也蔡氏德晉曰魚冬則降而伏于水底春則升而游于水上農緯厥耒傳緯束也束其耒云爾者用是見君之亦有耒也金氏履祥曰古者立春先時命農大夫咸勸農用注田器也初嵗祭耒始用暢傳暢也者終嵗之用祭也其曰初云爾者言是月之始用之也初者始也或曰祭韭也蕙田案其曰初云爾者句本在暢也者之上作其用初云爾今從朱子本傅氏崧卿曰關本作畼案畼不生也暢訓達作暢者為是金氏履祥曰祭始為耒耜之人也古者先立春王將耕藉則鬱人薦鬯王祼鬯鬯之言暢也祭耒而用鬯也囿有見韭傳囿也者圉之燕者也金氏履祥曰韭陽菜春有之見露也蔡氏德晉曰囿有籓曰園有牆曰囿見始生也案豳風四之日獻羔祭韭祭禮庶人春薦韭而祀號韭曰豐本則韭為祀禮所重故特誌其見也時有俊風傳俊者大也大風南風也何大乎南風也曰合氷必於南風解氷必於南風生必於南風收必於南風故大之也蔡氏德晉曰大風謂東風也東風居八風之首能轉嚴冬而為陽春故以大言之月令東風解凍是也寒日滌凍塗傳滌也者變也變而煖也凍塗者凍下而澤上多也金氏履祥曰日滌凍解而為塗泥也王氏廷相曰滌除也如豳風十月滌場之滌冬時雨雪著地皆氷故塗凍春時日煖則凍釋而為塗泥矣故及寒日而除之蕙田案寒日滌三字為句凍塗二字為句日之寒者變而暄土之凍者融而釋二者皆陽和之應也田䑕出傳田䑕者嗛䑕也記時也徐氏巨源曰萬物之理有盈則耗有羸則絀絀伏于未嬴之前而耗兆于為盈之日故有木則有蠧有田則有䑕孟春伊始農方相率均田而田䑕已出焉先言䑕出而後言均田以著消息之理明未兆之謀也戴氏震曰嗛䑕爾雅作鼸䑕郭注以頰裹藏食農率均田傳率者循也均田者始除田也言農夫急除田也金氏履祥曰率相率也均月令所謂皆修封疆審端徑遂也夏后氏一夫受田五十畝均田所以修其疆畔分其遂畎不相侵越同賴利澤也張氏直清曰仁政之行在正經界而經界不能久而不亂此夏先王所以每嵗孟春必令農大夫率農夫以均理其田也夫然後豪强不能兼并貪暴不得多取而民實受恒産之利矣蔡氏德晉曰農農大夫也率率農夫也獺獸祭魚傳其必與之獸何也曰非其類也祭也者得多也善其祭而後食之十月豺祭獸謂之祭獺祭魚謂之獸祭何也豺祭其類獺祭非其類故謂之獸大之也蕙田案傳其必與與字朱子曰疑作謂又諸本正文作獺祭魚無獸字其傳文俱作謂之獻或疑祭魚當為獻魚之誤考月令呂氏春秋淮南子汲冡書俱無作獻魚者且祭與獻其義無别今從傅崧卿本增獸字則經傳上下文義俱可通矣鷹則為鳩傳鷹也者其殺之時也鳩也者非其殺之時也善變而之仁也故具言之也曰則盡其辭也鳩為鷹變而為不仁也故不盡其辭也蔡氏德晉曰月令仲春鷹化為鳩舉其晚者此正月鷹則為鳩舉其早者謂之則者明變化之速也農及雪澤傳言雪澤之無髙下也金氏履祥曰雪澤猶凍解也及傳所謂汲汲也及此凍解便徃治也王氏廷相曰積雪之澤未消則土田膏潤可及時服農也蔡氏德晉曰雪澤雪化而為水也及此時徃治田不敢緩也初服于公田傳古有公田焉者古言先服公田而後服其田也金氏履祥曰孟子曰詩云雨我公田遂及我私由此觀之雖周亦助也夏小正曰初服于公田由此觀之雖夏亦助也蔡氏德晉曰夏用貢法而亦有公田者傳言井田始于黄帝堯遭洪水井田制度廢壊禹時水土初平不得不行貢法以阡陌溝洫未盡治也然苟有可井之處則固已畫之為井但貢處多助處少耳采芸傳為廟采也傅氏崧卿曰舊注云似邪蒿可食蔡氏德晉曰芸香草也生熟皆可食故呂氏春秋云菜之美者陽華之芸十一月芸始生至此月采之以薦寢廟也鞠則見傳鞠者何也星名也鞠則見者嵗再見爾金氏履祥曰案天文書不見鞠星是時初昏參中則晨見也危室諸星耳古鞠菊通用盖謂菊始苗故九月云榮鞠則菊華也蕙田案以四月昴則見五月參則見之例推之則鞠為星名無疑若云榮鞠之鞠當云始生不當云鞠則見也初昏參中斗柄縣在下傳盖記時也言斗柄者所以著參之中也王氏廷相曰斗魁枕參首參中則斗柄在下矣言斗柄在下所以著參中也蕙田案夏小正所記星象與堯典多合說見論嵗差條後俱放此栁稊傳稊也者發孚也王氏廷相曰稊芽也梅杏杝桃則華傳杝桃山桃也傅氏崧卿曰關本杝作柂非是杝音移木名也緹縞傳縞也者莎隨也緹也者其實也先言緹而後言縞者何也緹先見者也何以謂之小正以著名也金氏履祥曰爾雅薃侯莎其實緹薃即莎又廣雅莎隨地毛也王氏廷相曰縞乃香附子之苗也此時成實蕙田案緹縞爾雅緹作媞縞作薃莎隨爾雅作莎䔺傳文緹先見者也之下有云何以謂之小正以著名也凡十字殊不可解朱子儀禮經傳移在夏小正篇名之下戴氏震考正以為北宋大戴禮本無之乃爾雅疏之文校書者誤編入於此未知是否今仍載之以俟考雞桴粥傳粥也者相粥之時也或曰桴嫗伏也粥養也王氏廷相曰案說文孚卵孚也從爪從子鳥抱卵恒以爪反覆其卵也桴粥者鷄抱卵以粥子也蔡氏德晉曰大寒雞始乳至此則皆桴粥也二月徃耰黍禪傳禪單也金氏履祥曰二月漸煖耰黍者可單衣也蔡氏德晉曰耰覆種也黍有早晚早者二月可耰五月可熟晚者五月而種七月始熟禪衣之無裏者也戴氏震曰耰黍徃耰其種黍之地也先言耰黍而後言禪何也見農之力于田春燠而先解褐也初俊羔助厥母粥傳俊也者大也粥也者養也言大羔能食草木而不食其毋也羊羔非其子而後養之善養而記之也或曰夏有煮祭祭也者用羔是時也不足喜樂喜羔之為生也而記之與羊牛腹時也蔡氏德晉曰大羔能食草木而不食母乳則羔母得自養矣故曰助厥母粥綏多女士傳綏安也冠子取婦之時也金氏履祥曰周禮仲春會男女即此也女有家士有室所以安之也丁亥萬用入學傳丁亥者吉日也萬也者干戚舞也入學也者大學也謂今時大舎采也金氏履祥曰月令所謂上丁命樂正習舞釋菜也二月不必皆有丁亥豈以是月釋菜卜日以于取丁或以支取亥與蔡氏德晉曰六丁以亥為末舉丁亥以例其餘蕙田案蔡氏之說較長古者擇日以干不以支月令云上丁固不必拘丁亥日也祭鮪傳祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時蔡氏德晉曰周禮漁人所謂春獻王鮪者也月令季春薦鮪于寢廟盖鮪于仲春季春皆可取以祭也榮堇傳堇菜也金氏履祥曰郭璞爾雅注云堇葵葉似柳子如米汋食之滑本草唐本注云此菜野生非人所種俗謂之堇菜榮華也采蘩傳蘩由胡由胡者蘩毋也蘩方勃也皆豆實也故記之金氏履祥曰爾雅蘩皤蒿即白蒿也或曰蘩所以生蠶王氏廷相曰蘩白蒿春初最先諸草而生可以為爼實蕙田案爾雅蘩由胡郭注云未詳盖偶不檢小正之文耳春秋疏引小正由胡作游胡方勃作旁勃昆小蟲抵蚳傳昆者衆也由魂魂也者動也小蟲動也其先言動而後言蟲者何也萬物至是動而始著抵猶推也蚳螘卵也為祭醢也取之則必推之推之不必取取必推而不言取金氏履祥曰案爾雅注疏螘子在卵者為蚳然此云昆及小蟲之㣲大抵皆卵粥也來降燕乃睇傳燕乙也降者下也言來者何也莫能見其始出也故曰來降言乃睇何也睇者眄也眄者視可為室者也百鳥皆曰巢突穴取與之室何也操泥而就家入人内也蔡氏德晉曰燕髙飛而來降睇視人之堂宇欲營巢而粥子也即月令元鳥至也剝鱓傳以為皷也顧氏起經曰鼍狀如守宮而大長一二丈灰五色背尾皆有鱗甲其聲如鼓其肉白如雞其皮堅厚宜以冒鼔詩云鼍鼓逄逄李斯亦云樹靈鼍之鼓是周秦皆以冒鼓也考工記韗人云凡冒鼓必以啟蟄之日正此時也有鳴倉庚傳倉庚者商庚也商庚者長股也金氏履祥曰黄鸝也榮芸金氏履祥曰芸至是華也時有見稊始收傳有見稊而後始收是小正序也小正之序時也皆若是也稊者所為豆實蔡氏德晉曰稊者草木始生之芽可食者收之以為豆實三月參則伏傳伏者非亡之辭也星無時而不見我有不見之時故曰伏云攝桑傳桑攝而記之急桑也王氏廷相曰攝取也取桑以飼蠶也委楊傳楊則花而後記之徐氏巨源曰楊葉茂而下垂委委然也蕙田案委傅本作萎言楊之華落於地或謂之飛絮也䍷羊傳羊有相還之時其類䍷䍷然記變爾或曰䍷羝也王氏廷相曰羊性寒則散處熱則環聚如圍此時天將熱乃環聚故曰䍷羊蔡氏德晉曰䍷羊相環貌陸農師以為羊性善羣故于文羊為羣犬為獨也􅕪則鳴傳􅕪天螻也金氏履祥曰爾雅􅕪天螻注云螻蛄也蔡氏德晉曰月令孟夏之月螻蟈鳴此舉其早者言也頒氷傳頒氷者分氷以授大夫也金氏履祥曰月令仲春開氷而夏用三月采識傳識草也金氏履祥曰識當作蘵爾雅蘵黄蒢注蘵草葉似酸漿花小而白中心黄江東以作菹食妾子始蠶傳先妾而後子何也曰事有漸也言自卑事者始皇氏侃曰妾謂外内命婦子謂外内子女傅氏崧卿曰當云事自卑者始徐氏巨源曰妾子猶曰婢子女賤者之通稱舉賤以包貴也執養宮事傳執操也養長也皇氏侃曰謂操持長養蠶宮之事徐氏巨源曰三月后妃親蠶女之賤者皆執桑養蠶以從事于宮中也祈麥實傳麥實者五穀之先見者故急祈而記之也蔡氏德晉曰因其將成而祈之月令季春薦鮪于寢廟乃為麥祈實是也越有小旱傳越于也記是時恒有小旱金氏履祥曰所以祈麥實者恐或有小旱也田䑕化為鴽傳鴽鵪也變而之善故盡其辭也鴽為䑕變而為不善故不盡其辭也拂桐芭傳拂也者拂也桐芭之時也或曰言桐芭始生貌拂拂然也蔡氏德晉曰芭華也月令季春桐始華是也鳴鳩傳言始相命也先鳴而後鳩何也鳩者鳴而後知其鳩也四月昴則見初昏南門正傳南門者星也嵗再見壹正盖大正所取法也鳴札傳札者寜縣也鳴而後知之故先鳴而後札金氏履祥曰案爾雅如蟬而小有文者謂之蚻蟬之小者謂之麥蚻顧氏起經曰仲夏蟬始鳴孟秋寒蟬鳴今四月而札先鳴皆蟬之先也蕙田案爾雅蚻蜻蜻郭氏注引小正云鳴蚻虎懸與今本異未知孰是囿有見杏傳囿者山之燕者也徐氏巨源曰杏春華夏實四月則其實見矣鳴蜮傳蜮也者或曰屈造之屬也蕙田案蜮與蟈古字通用周禮秋官蟈氏鄭司農注云蟈讀為蜮蝦蟇也故云掌去鼃黽鼃黽蝦蟇屬也月令孟夏螻蟈鳴髙誘以螻為螻蛄蟈為蝦蟇與小正鳴蜮合蔡氏德晉以為短狐者非是王萯莠金氏履祥曰案呂令注當作萯秀王萯即王瓜本草陶注云即今土瓜也蔡氏德晉曰王萯草名唐書渾瑊傳登黄萯原通鑑注其地多黄萯草因以名原是也舊説作王瓜誤取荼傳荼也者以為君薦蔣也蔡氏德晉曰周禮地官有掌荼掌以時聚荼以共喪事鄭康成謂荼茅莠也既夕禮茵著用荼莠幽徐氏巨源曰莠者秀之訛也象形再傳而加草幽者葽之訛也諧聲再傳而變韻莠幽即詩四月秀葽是也蕙田案金仁山以取荼莠為句幽為句疑非是越有大旱傳記時爾執陟攻駒傳執也者始執駒也執駒也者離之去母也執而升之君也攻駒也者教之服車數舍之也五月參則見傳參也者牧星也故盡其辭也蜉蝣有殷傳殷衆也蜉蜉殷之時也蜉蝣者渠畧也朝生而暮死稱有何也有見也蔡氏德晉曰案傳以蜉蝣為朝生暮死而淮南子謂蜉蝣不飲不食三日而死盖死之速者即在生之日其遲者亦不過三日也鴂則鳴傳鴂者百鷯也鳴者相命也其不辜之時也是善之故盡其辭也金氏履祥曰離騷恐鵜鴂之先鳴兮使夫百草為之不芳盖五月一隂生則鴂鳴乃百草不芳之候也徐氏巨源曰凡禽皆屬陽惟鴂與鴞禽中之隂者也故鴞望昏而嘯鴂夏至則鳴時有養日傳養長也一則在本一則在末故其記曰時養日云也朱子曰大戴日作白以十月養夜考之作日近是乃衣瓜傳乃者急瓜之辭也瓜也者始食瓜也王氏廷相曰案曲禮為天子削瓜者副之巾以絺為國君華之巾以綌疏曰削刋也副析也刊其皮而析為四解又横解而以細葛巾覆之而進也華半破也諸侯禮降故破而不四析亦横斷之用粗葛巾覆也蔡氏德晉曰衣瓜以巾覆瓜也此時瓜可食故衣之以進于君也蕙田案朱子本無衣字傅崧卿本有之又云一本有衣也者始創衣也七字王氏蔡氏據曲禮證衣瓜之文其說較通良蜩鳴傳良蜩也者五采其金氏履祥曰案爾雅當作蜋蜩蔡氏德晉曰月令仲夏蜩始鳴是也匽之興五日翕望乃伏傳其不言生而稱興何也不知其生之時故曰興以其興也故言之興五日翕也望也者月之望也而伏云者不知其死也故謂之伏五日也者十五日也翕也者合也伏也者入而不見也蔡氏德晉曰匽疑即伏翼也二名蝙蝠形似䑕夏出冬蟄畏摯烏故日伏夜飛翕飛貌翕以五日伏以望未詳傳言燕辟戊巳蝠伏庚申殆此類與蕙田案傳以匽為唐蜩盖有所本郭氏注爾雅亦引用之蔡氏疑為伏翼特以臆測不如從舊說為安啟灌藍蓼傳啟者别也陶而疏之也灌者聚生者也記時也熊氏安生曰言開闢此叢生藍蓼分移使之稀散金氏履祥曰啟灌者取其汁也藍可以染者五月取以為澱蓼草名取以為麴蔡氏德晉曰啟㧞也藍染草蓼小藍也藍蓼初種時皆叢生既長皆當移栽而疏植之方得長茂鳩為鷹王氏廷相曰復化也徐氏巨源曰鷹之為鳩也纔四月而復為鷹然則一嵗中八月為鷹四月為鳩矣物之性固善時少而不善時多與唐蜩鳴傳唐蜩鳴者匽也金氏履祥曰良蜩者墠聲清長者也唐蜩則今嘹也初昏大火中傳大火者心也種黍菽糜傳心中種黍菽糜時也金氏履祥曰菽豆也糜赤梁粟也王氏廷相曰今登麥之後亦種此三者盖晚田也月令此月農乃登黍盖仲春徃耰之黍煮梅傳為豆實也金氏履祥曰書云若作和羮爾惟鹽梅古人飲食用鹽梅猶今之必用醋也顧氏起經曰古者以梅實薦饋食之籩周官所謂乾􅢀也又梅實酸故以為和商書所謂鹽梅也蓄蘭傳為沐浴也蔡氏德晉曰蘭香草也能辟不祥故蓄之楚詞云紉秋蘭以為佩是佩用蘭也又云浴蘭湯兮沐芳是沐浴用蘭也荀子云天子大路側載睪芷又天子代睪而食然則蘭之用廣矣菽糜傳以在經中矣又言之時何也是食矩闔而記之蕙田案矩關傅本作短閔朱子作短闗俱不可通或謂矩關乃豆粥二字之誤此說近之頒馬傳分夫婦之駒也將間諸則或取離駒納之則法也王氏廷相曰周禮校人頒良馬而養成之蕙田案將間諸則詩所謂比物四驪閑之維則是也間閑二字古多通用六月初昏斗柄正在上傳五月大火中六月斗柄正在上用此見斗柄之不正當心也盖當依依尾也煮桃傳桃也者杝桃也杝桃也者山桃也煮以為豆實也傳氏崧卿曰爾雅椵柂郭璞注云白椵也樹似白楊而古今字書有杝而無柂釋云木名亦無有訓山桃者爾雅榹桃山桃音斯唐韻亦云此書云柂桃也者山桃也柂當作榹盖傳寫之誤顧氏起經曰周官饋食之籩曰其實棗栗桃乾􅢀榛栗家語云桃不登郊廟祭祀不用何與鷹始摯傅始摯而言之何也諱殺之辭也故摯云金氏履祥曰始戄搏也徐氏巨源曰正月鳩三月鳴五月鷹六月摯從善難而不仁易也七月莠萑葦傳未莠則不為萑葦莠然後為萑葦故先言莠朱子曰莠讀為秀狸子肇肆傳肇始也肆遂也言其始遂也或曰肆殺也金氏履祥曰案字林狸伏獸盖至此時而始肆也湟潦生苹傳湟下處也有湟然後有潦有潦而後有苹草也蔡氏德晉曰穀雨萍始生至此則湟潦皆生苹也爽死傳爽也者猶疏也蔡氏德晉曰周禮太宰職云臣妾聚歛疏材掌茶職云徴野疏材之物以待邦事此時疏材既死則可收歛矣苹莠傳苹也者馬帚也蕙田案苹有三種爾雅萍䓑注云水中浮萍江東謂之薸此水生之萍月令萍始生夏小正湟潦生苹是也爾雅又云荓馬帚注似蓍可為掃彗即此文苹秀是也爾雅又云苹藾蕭注今藾蒿也初生亦可食詩呦呦鹿鳴食野之苹是也此二種皆陸生與湟潦所生之苹迥别金仁山蔡敬齋俱誤合以為一不知水萍無花不得言秀也漢案户傳漢也者河也案户也者直户也言正南北也金氏履祥曰古者户皆南向則是時初昏天漢直南也寒蟬鳴傳蟬也者堤􅧽也金氏履祥曰案爾雅疏寒蜩也即蜺也一名寒螿似蟬而小青赤色者也初昏織女正東鄉王氏廷相曰織女三星在斗柄之東斗柄南指則織女正東也時有霖雨王氏廷相曰滛雨謂之霖月令完隄防謹壅塞以備水澇以此蔡氏德晉曰雨三日以上為霖灌荼傳灌聚也荼萑葦之莠為蔣猪之也萑未秀為蒵葦未秀為蘆斗柄縣在下則旦八月剝瓜傳蓄瓜之時也元校傳元也者黒也校也者若緑色然婦人未嫁者衣之顧氏起經曰凡染當及盛暑熱潤三月而後可用則元校之衣染于六月而用于八月者耳剝棗傳剝也者取也栗零傳零也者降也零而後取之故不言剝也蔡氏德晉曰周禮籩人饋食之籩其實用裘栗加籩之實用栗又儀禮婦人始見舅姑其䞇用棗栗則棗栗之用廣矣丹鳥羞白鳥傳丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥何也重其養者也有翼者為鳥羞也者進也不盡食也孔氏穎達曰皇氏以丹良是螢火今案爾雅釋蟲郭氏等諸釋皆不云螢火是丹良未知皇氏何所依據蔡氏德晉曰舊說丹鳥螢火也丹鳥以白鳥為珍羞而食之然螢火未間食蚊蚋徐巨源以丹鳥為蝙蝠未知是否辰則伏傳辰也者謂星也伏也者入而不見也蕙田案爾雅釋天云大辰房心尾也又云大火謂之大辰尚書大傳云若參辰之錯行揚雄法言云吾未睹參辰之相比也以大辰為東方之宿參為西方之宿故常不並見也夏時八月日在大火以日之所在故伏而不見徐巨源以水星當之水星雖亦名辰星然五緯之見伏無常期不可以之紀候而水星之行尤速一嵗中合伏常四五次亦不得獨于秋令言之徐說謬矣鹿人從傳鹿人從者從羣也鹿之養也離羣而善之離而生非所知時也故記從不記離君子之居函也不言或曰人從人從也者大者于外小者于内率之也金氏履祥曰鹿人者古山虞掌獸之官從從禽也謂始從禽也顧氏起經曰鹿人即迹人之官也方氏矩曰鹿人從者從王秋獮以嗇人不從例之傳說非也鴽為䑕王氏廷相曰復化也參中則旦九月内火傳内火也者大火大火也者心也金氏履祥曰古者三月大辰旦見故出火八月辰伏故九月納火徐氏巨源曰周禮季春出火季秋納火即此謂也盖因于夏鄭司農謂以三月本時昏心星見于辰使民出火九月本黄昏伏于戌使民納火故春秋傳曰以出納火心為大火火見而出火伏而納遰鴻雁傳遰徃也傅氏崧卿曰案唐韻迨遰去也避也徐氏巨源曰迢逺而來迤邐而飛之謂遰道逺而翔徐狀其羣而成列之容也蔡氏德晉曰月令仲秋鴻雁來季秋鴻雁來實此亦合而記之主夫出火傳主夫也者主以時縱火也金氏履祥曰夫當作火古者季春出火所以焚萊于是民之用火于田野者不禁季秋雖内火然而火之用有不可廢者如昆蟲既蟄而以火田之類于是主火度其用而出之民不得擅其用而不禁也蔡氏德晉曰夫夫遂也周禮司烜氏掌以夫遂取明火于日是也蕙田案主夫者主火之夫周禮司爟司烜之屬是也仁山改主夫為主火似不必蔡以夫為夫遂尤曲陟元鳥蟄傳陟升也元鳥者燕也先言陟而後言蟄何也陟而後蟄也金氏履祥曰古人重元鳥當其至而祠之故其來也書降其去也書陟皆貴之也蟄者元鳥去則多蟄于島岸間土穴中沈存中筆談嘗載其事蕙田案月令仲秋元鳥歸此云九月元鳥蟄者燕以仲秋之月去巢以季秋之月始畢蟄也熊羆貊貉鼬鼪則穴傳若蟄也金氏履祥曰此周官所謂蟄獸也榮鞠傳鞠草也金氏履祥曰月令鞠有黄花是也樹麥傳鞠榮而樹麥時之急也蔡氏德晉曰月令仲秋之月乃勸種麥舉其早者此舉其晚者言之也王始裘傳王始裘者何也衣裘之時也蔡氏德晉曰授衣之候也周禮司裘云仲秋獻良裘季冬獻功裘良裘王所衣功裘卿大夫之服也月令孟冬天子始裘今于季秋言之張直清謂即單子所謂隕霜而冬裘具之意非必其服之也蕙田案夏都安邑北地也九月霜降則寒氣至衣裘宜也蔡氏謂非必其服之泥矣辰繫于日蕙田案辰者大辰也夏時九月日在析木之津將旦辰始見東方如繫于日然雀入于海為蛤傳盖有矣非常入也十月豺祭獸傳善其祭而後食之也金氏履祥曰古人豺祭獸然後田獵盖古人于禽獸每有不忍殺之意惟天地肅殺之時豺獸自相食故取之以為乾豆賔客之用初昏南門正傳南門者星名也及此再見矣黑烏浴傳黒烏者何也烏也浴也者飛乍髙乍下也徐氏巨源曰十月氣寒日煖烏乘暄而浴也時有養夜傳養者長也若日之長也元雉入于淮為蜄傳蜄者蒲盧也蔡氏德晉曰月令雉入大水為蜄是也織女正北鄉則旦傳織女星名也十有一月王狩傳狩者言王之時田冬獵為狩陳筋革傳陳筋革者省兵甲也蔡氏德晉曰案考工記弓人夏治筋春液角而函人鍜革不詳其時則此陳筋革盖因田獵用獸之後取所餘之筋革陳列而相察之將以為甲為弓耳非于是月即治筋革也函人察革弓人相筋殆于此時與嗇人不從傳不從者弗行于時月也蔡氏德晉曰嗇人謂嗇夫不從者言不復從禽也方氏矩曰農事未畢不從狩重農事也言不從者以見二之日乃同也萬物不通蔡氏德晉曰重隂在上陽氣雖㣲動于下而天地猶閉塞故萬物不通隕麋角傳隕墜也日冬至陽氣至始動諸向生皆䝉䝉符矣故麋角隕記時焉耳蔡氏德晉曰月令仲冬麋角解是也十有二月鳴弋傳弋也者禽也先言鳴而後言弋者何也鳴而後知其弋也金氏履祥曰弋當作鳶今雪霽霜風之晨則鳶鳴一說鳴弋猶言鳴弦弋者以生絲繫矢而射謂獵禽也元駒賁傳元駒也者螘也賁者何也走于地中也金氏履祥曰螘方言齊魯之間謂之蚼蝝西南梁益之間謂之元駒顧氏起經曰元駒是螘之大者以其色黒故謂之元以其體健故謂之駒俗云馬蚍蜉是也納卵蒜傳卵蒜也者本如卵者也納者何也納之君也金氏履祥曰納者收藏之蔡氏德晉曰卵蒜小蒜也其根如卵虞人入梁傳虞人官也梁者主設􅘩罟者也蔡氏德晉曰虞人澤虞也梁絶水以取魚者入梁始漁也月令季冬命漁師始漁是也隕麇角傳盖陽氣旦睹也故記之也孔氏穎達曰若節氣早則麇角十一月解若節氣晚則十二月麇角解傅氏崧卿曰月令仲冬糜角解與小正十一月記隕麋角合十二月又記之盖衍文戴氏因誤為之傳失之矣金氏履祥曰案孔子曰我欲觀夏道是故之把而不足徴也吾得夏時焉學者多傳夏小正云小正者其紀候之書謂之小則固非其大者也豈亦夏時之一端與聖人得之以說夏禮則必有大于此者單子曰夏令曰九月除道十月成梁其時儆曰收而場功偫而畚梮營室之中土功其始火之初見期于司里然則舉一端而推所謂夏時者當必有制度教條之詳不可得而聞矣蕙田案夏小正之文見於大戴禮其傳或云子夏所作或云大戴所作未之詳也宋傅崧卿始分經傳為二朱子因之後儒說小正者有數家今摭采其要俾言夏時者有考焉詩豳風七月七月流火九月授衣傳九月霜始降婦功成可以授冬衣矣一之日觱發二之日栗烈無衣無褐何以卒嵗傳觱發風寒也栗烈寒氣也何箋此二正之月人之貴者無衣賤者無褐將以終嵗乎是故八月則當績也三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜傳豳土晚寒于耜始修耒耜也四之日民無不舉足而耕矣饁饋也田畯田大夫也朱子曰此章首言七月暑退將寒故九月授衣以禦之盖十一月以後風氣日寒不如是則無以卒嵗也正月則徃修田器二月則舉趾而耕少者既皆出而在田故老者率婦子而餉治田早而用力齊是以田畯至而喜之也朱氏善曰大寒之候在于丑月而慮之於建申之時收成之候在于酉月而慮之建寅之日其為豫備可知若寒至而後索衣饑至而後索食則其為計亦晚矣七月流火九月授衣箋將言女功之始故又本作此春日載陽有鳴倉庚女執懿筐遵彼㣲行爰求柔桑傳倉庚離黄也㦤筐深筐也㣲行牆下徑也候箋陽温也温而倉庚又鳴可蠶之也柔桑穉桑也蠶始生宜穉桑春日遲遲采蘩祁祁女心傷悲迨及公子同歸傳遲遲舒緩也蘩白蒿也所以生蠶傷悲感事苦也何氏楷曰春日孔以為建辰之月案月令云仲春之月倉庚鳴夏小正云二月采蘩則此章雨春日皆謂二月也七月流火八月萑葦傳薍為萑葭為葦豫蓄萑葦可以為曲也箋將言女功自始至成故亦又本於此蠶月條桑取彼斧斨以伐逺揚猗彼女桑傳斨方銎也逺枝逺也揚條揚也角而束之曰猗女桑荑桑也束箋條桑枝落之采其葉也女桑少枝長條不技落者而采之七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳傳鵙伯勞也載績絲事畢而麻事起矣之箋伯勞鳴將寒之使也五月則鳴豳地晚寒鳥物候從其氣焉凡染者春暴練夏纁元秋染夏程子曰蠶月當蠶長之月也計嵗氣之早晚不可指定某月也何氏楷曰蠶月治蠶之月以月令祭義考之正謂三月也陸佃云倉庚知分鳴鵙知至故陽氣分而倉庚鳴可蠶之候也隂氣至而鵙鳴可績之候也四月秀葽五月鳴蜩八月其穫十月隕蘀傳不榮而實曰秀葽葽草也蜩螗也穫禾可穫也隕墜蘀落也而箋夏小正四月王萯秀葽其是乎四者皆物成將寒之候一之日于貉取彼狐貍為公子裘傳于貉謂徃取狐貍也裘箋于貉徃搏貉以自為也狐貍以共尊者言此者時寒宜助女功二之日其同載纘武功言私其豵獻豜于公傳豕一嵗曰豵三嵗曰豜大獸公之小獸私之箋其同者君臣及民因習兵俱出田也豕生三曰豵王氏應麟曰四月秀葽諸儒不詳其名惟說文引劉向說以為苦葽曹氏以爾雅本草證之知其為逺志錢氏天錫曰因天時之變而物化隨之寒于冬而萌于夏豳民早計如此盖不止履霜而知堅氷矣何氏楷曰于貉徃祭貉也案周禮大司馬之職中冬教大閔有司表貉于陳前舊說貉師祭也立表以祭故謂之表貉周人將獵則先祭貉故謂獵為貉穆天子傳曰天子獵于漆澤于是得白狐元貉焉以祭于河宗此周禮獵祭貉之騐也五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下傳斯螽蚣蝑也莎雞羽成而振訊之箋自七月在野至十月入我牀下皆謂蟋蟀也言此三物之如此著將寒有漸非卒來也穹窒熏䑕塞向墐户箋為此四者以備寒嗟我婦子曰為改嵗入此室處箋嵗終而一之日觱發二之日栗烈當避寒氣而入所穹窒墐户之室而居之至此而女功止朱子曰斯螽莎雞蟋蟀一物隨時變化而異其名動股始躍而以股鳴也振羽能飛而以翅鳴也宇簷下也暑則在野寒則依人楊氏時曰堯命羲和以昏中之星正四時鳥獸氄毛希革之類為之應七月所陳以倉庚鳴鵙為蠶績之候以秀葽其穫隕䆁為取皮之候以斯螽蟋蟀為處室之候亦此意也蕙田案爾雅釋蟲及陸璣詩疏斯螽莎雞蟋蟀三者實非一類斯螽亦名蜤螽亦名蚣蝑周南所云螽斯是也莎雞爾雅謂之天雞亦名酸雞羅願以為即絡緯今人呼為絡絲娘者是也蟋蟀一名促織一名蜻蛚月令季夏云蟋蟀居壁是從壁内出在野唐風云蟋蟀在堂是從野入居室内此云入我牀下與唐風云在堂者相合先言在野在宇後言蟋蟀入我牀下互文見義也朱傳謂一物隨時而異名殊不然六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉夀傳鬰棣屬薁蘡奠也剝擊也而箋既以鬱薁及棗助男功又穫稻釀酒以助其養老之具七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫傳壺瓠也叔拾也苴麻子也樗惡木也亦箋瓜瓠之畜麻實之糁乾荼之菜惡木之薪所以助男養農夫之具朱子曰此章果酒嘉蔬以供老疾奉賓祭瓜瓠苴荼以為常食少長之義豐儉之節然也嚴氏粲曰優老而薄牡豳俗之厚也九月築場圃傳春夏為圃秋冬為場菜箋場圃同地自物生之時耕治之以種茹至物盡成熟築堅以為場十月納禾稼黍稷重穋禾麻菽麥傳後熟曰重先熟曰穋箋治于場而内之囷倉也嗟我農夫我稼既同上入執宮功傳出為下入為上之箋于是時男野功畢晝爾于茅宵爾索綯箋女當晝日徃取茅歸夜作絞索以待時用亟其乘屋其始播百榖傳乘升也朱子曰宮邑居之宅也古者民受五畝之宅二畝半為廬在田春夏居之二畝半為宅在邑秋冬居之功葺治之事也或曰公室官府之役也古者用民之力嵗不過三日二之日鑿氷冲冲三之日納于凌隂四之日其蚤獻羔祭韭傳氷盛水腹則命取氷于山林教箋上章備寒故此章備暑后稷先公禮備也九月肅霜十月滌場朋酒斯饗曰殺羔羊傳肅縮也霜降而收縮萬物滌場功畢入也躋彼公堂稱彼兕觥萬夀無疆張子曰此章見民忠愛其君之甚既勸趨其藏氷之役又相戒速畢場功殺羊以獻于公舉酒而祝其夀也右時令上五禮通考卷一百九十九
