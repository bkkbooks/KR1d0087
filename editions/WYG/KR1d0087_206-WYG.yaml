body:
  text: 五禮通考卷一百九十六刑部尚書秦蕙田撰嘉禮六十七觀象授時會典推月食法江氏永曰月食無視差較易於日食故先之用數朔策二十九日五三五九三江氏永曰日月平行相會之日數也小餘與授時大統同十二小時四十四分三秒十四微有竒望策一十四日七六五二九六五江氏永曰小餘十八小時二十二分一秒三十七微有竒太陽平行朔策一十萬四千七百八十四秒三四三二四半之為望策下三條同江氏永曰二十九度六分二十四秒十八微竒二平行望䇿五萬二千三百九十二秒一五二一六太陽引數朔策一十萬四千七百七十九秒三五八八六五江氏永曰二十九度六分十九秒竒四引数望策五萬二千三百八十九秒六七九三二五太隂引數朔䇿九萬二千九百四十秒二四八五九江氏永曰滿周天去之得二十五度四十九分竒六引數望䇿當加半周六十四萬八千秒再折半凡十九萬四千四百七十秒一二四二九五太隂交周朔策一十一萬四百一十四秒一六五七四江氏永曰滿周天去之得一宮零四十分十四秒竒交周望策當加半周六十四萬八千秒再折半凡七十萬三千二百零七秒八二八七太陽小時平行一百四十七秒八四七一四九江氏永曰二分二十七秒竒也太陽小時引数一百四十七秒八四一二七太隂小時引數一千九百五十九秒七四七六五四二江氏永曰三十二分三十九秒竒也太隂小時交周一千九百八十四秒四二五四九江氏永曰三十三分四秒竒也月距日小時平行一千八百二十八秒六一二一一八江氏永曰三十分二十八秒竒也太陽光分半徑六百三十七江氏永曰地半徑設一百太陽實半徑五百零七而光體四溢更有餘分一百三十以此照地體能侵入下半而地景亦因之瘦小也地半徑一百江氏永曰設整數便於算也地圓周九萬里半徑二萬四千一百三十餘里太隂實半徑二十七江氏永曰比太陽半徑少一十九倍有竒也日月實體甚相懸而視徑略相等全徑約半度有竒月稍大於日焉最髙最卑則各有加減太陽最髙距地一千一十七萬九千二百八與地半徑之比例為一十一萬六千二百江氏永曰太陽本天半徑加本輪半徑減去均輪半徑為太陽最髙距地數其比例為一千一百六十二地半徑髙卑之中一十一萬四千一百五十四竒本輪均輪漸小則此數亦微差太隂最髙距地一千一十七萬二千五百與地半徑之比例為五千八百一十六江氏永曰太隂本天半徑加本輪半徑減去均輪次均輪兩半徑為太隂最髙距地數其比例為五十八地半徑竒也髙卑之中五千七百一十七四竒朔應二十六日三八五二六六六江氏永曰律元天正冬至辛未是十一月初四日此從初五日壬申子正算起距十二月戊戌平朔二十六日有竒也其小餘九小時十四分四十六秒有竒首朔太陽平行應初宮二十六度二十分四十二秒五十七微太隂同江氏永曰首朔者律元甲子年前十二月朔也首朔太陽引數應初宮一十九度一十分二十七秒二十一微江氏永曰太陽距最卑度也以減太陽平行應為首朔最卑所在首朔太降引數應九宮一十八度三十四分二十六秒一十六微江氏永曰太隂距月孛度也太隂平行應加十二宮以引數應減之為首朔月孛所在首朔太隂交周應六宮初度三十分五十五秒一十四微江氏永曰太隂距正交度也太隂平行應加十二宫以交周應減之為首朔正交所在求天正冬至詳日躔求首朔置積日詳月離所江氏永曰律元冬至次日子正至求年冬至次日子正也減朔應得通朔上考徃古加朔應是江氏永曰積日内減二十六日有竒從律元十二月首朔起也通朔者未計積朔之名以朔䇿除之得數加一為積朔餘數轉減朔䇿為首朔上考徃古則除得之數即為積朔不用加一餘數即為首朔不用轉減朔䇿江氏永曰得數者除得若干朔也加一者得數之外加一朔乃為十二月朔也前所除仍有不盡之日分於所加一朔内減之即得所求之首朔距天正冬至次日後若于日及分通計積朔日分從律元十二月戊戌平朔起算上考徃古亦以此朔為根也求太隂入食限以積朔與太隂交周朔䇿相乘滿周天秒數去之餘為積朔太隂交周應上考徃古則置首朔太隂交周應減積朔太隂交周加江氏永曰首朔太隂交周應不足減者十二宫減之後倣此又加太隂交周望䇿再以太隂交周朔䇿迭加十三次得逐月望太隂平交周江氏永曰加十三次者十二月望至十二月望也視某月交周入可食之限即為有食之月交周自五宫十五度六分至六宫十四度五十四分自十一宫十五度六分至初宫十四度五十四分皆為可食之限江氏永曰初宫五宫隂律也六宫十一宫陽律也皆以距交十四度五十四分為虚寛之限較授時十三度五分者加大再於實交周詳之江氏永曰一年入食限者有二次或三次而不皆食者有定望加減也定望在晝不算也或已入食限而日月地景半徑有減差亦不食也求平望以太隂入食限之月數與朔策相乘加入望策再加首朔日分及紀日天正冬至加一日即紀日子江氏永曰天正冬至從甲日起又加一日為紀日何也前算積日從律元辛未日子正起而朔應從次日壬申子正起中間差一日故於天正冬至日加一日為紀日滿紀法去之餘為平望日分自初日起甲子得平望干支以日法通其小餘如法收之得時刻分秒求太陽平行置積朔加太隂入食限之月數與太陽平行朔策相乘滿周天秒數去之為積朔太陽平行加首朔太陽平行應上考徃古則以積朔平行減平行應又加太陽平行望䇿即得求太陽平引置積朔加太隂入食限之月數與太陽引數朔策相乘滿周天秒數去之為積朔太陽平引加首朔太陽引數應上考徃古則以積朔平引減引數應又加太陽引數望策即得求太隂平引置積朔加太隂入食限之月數與太隂引數朔策相乘滿周天秒數去之為積朔太隂平引加首朔太隂引數應上考徃古則以積朔平引減引數應又加太隂引數望䇿即得求太陽實引以太陽平引依日躔法求得太陽均數以太隂平引依月離法求得太隂初均數兩均數相加減為距弧兩均同號相減異號相加過江氏永曰平望時或未及望或已望之弧以小時月距日平行為一率一小時化秒為二率江氏永曰一小時三千六百秒距弧化秒為三率江氏永曰一分化六十秒一度化三千六百秒求得四率為距時秒江氏永曰此以度秒求時秒也隨定其加減號兩均同加日大則加日小則減兩均同減日大則減日小則加兩均一加一減其加減從日江氏永曰日月本輪以最髙最卑為界左六宮為加右六宮為減兩均同加者皆在左兩減者皆在右一加一減者或日左月右或月左日右也此欲加減太陽之平引數進退皆從日又以一小時化秒為一率太陽小時引數為二率距時化秒為三率求得四率為秒江氏永曰此以時秒求度秒也以度分收之為太陽引弧依距時加減號以加減太陽平引得實引江氏永曰為求日實均之用求太隂實引以一小時化秒為一率太隂小時引數為二率距時化秒為三率江氏永曰即上條距時也求得四率為秒以度分收之為太隂引弧依距時加減號以加減太隂平引得實引江氏永曰為求月實均之用求實望以太陽實引復求太陽均數為日實均江氏永曰如日躔求實行之法用直角三角形兩次求之其小直角用實引為一角并求得太陽距地心線直角三角形對直角之邊詳日躔句江氏永曰此大直角三角形也既求得直角之與股其斜弦為太陽距地心線法用本天半徑為一率實均數度之正割線為二率大邊為三率求得四率為太陽距地心線此線為後求地影半徑之用以太隂實引復求太隂初均數為月實均江氏永曰如月離求初實行之法用直角三角形兩次求之其小直角用實引為一角朔望求得初均即得太隂實行故不復求二三均并求得太隂距地心線詳月離謂江氏永曰此次均輪心距地心非謂月之實體也求法已解于月離求初實行條朔望時月與次均輪心同一直線上故亦可謂之太隂距地此線為後求太隂半徑之用兩均相加減為實距弧與距弧同江氏永曰亦兩均同號相減異號相加依前求距時法求得四率為秒以時分收之為實距時置平望以實距時加減之加減法與距時同得實望加滿二十四時則實望進一日不足減者借一日作二十四時減之則實望退一日江氏永曰進一日為次日退一日者子正前為昨日求實交周以一小時化秒為一率太隂小時交周為二率日距時化秒為三率求得四率為秒以度分收之為交周距弧以加減平交周依實距時加減號又以月實均加減之為實交周江氏永曰以交周距弧加減平交周者從平望至實望月距交進退之度也而月實均為月之實行故又以實均依其加減號加減之為實望時月距正交或中交之度視實交周入必食限為有食實交周自五宮十七度四十三分五秒至六宮十二度十六分五十五秒自十一宮十七度四十三分五秒至初宮十二度十六分五十五秒為必食之限不入此限者不必算江氏永曰中交正交隂律陽律皆以距交十二度十六分五十五秒為必食之限此以地影及月兩半徑之最大者算其所當之度如是也地影必在日之衝隨人所居影即因之髙下無地面地心之視差故月食不論隂陽食分九服皆同求太陽黄赤實經度以一小時化秒為一率太陽小時平行為二率實距時化秒為三率求得四率為秒以度分收之為太陽距弧依實距時加減號以加減太陽平行又以日實均加減之為黄道經度江氏永曰以太陽距弧加減太陽平行者從平望至實望日進退之平度也而日實均為實行故又以實均加減之為實望時日距冬至之經度即求得赤道經度法詳月離求太隂出入時刻條餘江氏永曰以本天半徑比黄赤大距之弦若太陽距春秋分黄道經度之正切與赤道經度之正切也春分後黄道經度内減三宮為距春分黄道經度秋分後減九宮春分前加三宮為距秋分黄道經度求實望用時以日實均變時為均數時差以升度差黄赤經度相減變時為升度時差兩時差相加減為時差總加減之法詳月離求太隂用時條以加減實望為實望用時距日出後日入前九刻以内者可以見食九刻以外者全在晝即不必算江氏永曰可見食者帶食也求食甚時刻以本天半徑為一率黄白大距之餘弦為二率江氏永曰黄白大距之餘弦九九六二二實交周之正切為三率求得四率為正切江氏永曰與月離求黄道實行條同亦猶日躔黄求赤也查八線表得食甚交周與實交周相減為交周升度差江氏永曰實交周者白道上月距交之度食甚交周者黄道上距交之度也黄與白有升度差猶赤與黄有升度差也又以太隂小時引數與太隂實引相加依月離求初均法算之為後均以後均與月實均相加減兩均同號相減異號相加得數又與小時月平行相加減兩均同加後均大則加小則減兩均同減後均大則減小則加兩均一加一減其加減從後均為月距日實行江氏永曰此於食甚之後設一小時算其月距日行分若干以為升度差當得若干時分之比例也此一小時月距日實行又為後初虧復圓時刻之用乃以月距日實行化秒為一率江氏永曰度分之秒一小時化秒為二率江氏永曰时分之秒升度差化秒為三率江氏永曰度分之秒求得四率為秒江氏永曰時分之秒以分收之得食甚距時以加減實望用時實交周初宮六宮為減五宮十一宮為加時江氏永曰實交周初宮六宮月已過交宜減分差早五宮十一宮月未至交宜加時分差晚為食甚時刻江氏永曰既得實望用時復求食甚時刻者白道黄道有升度差則時刻亦小異也求食甚距緯以本天半徑為一率黄白大距之正弦為二率江氏永曰黄白大距四度五十八分三十秒正弦八六七三實交周之正弦為三率求得四率為正弦江氏永曰此以大股大句比小股小句也查八線表得食甚距緯實交周初宮五宮為北六宮十一宮為南江氏永曰距交十二度十六分五十五秒以内所當二道之濶也逺交緯大近交緯小如正當其交則無距緯月心與地影心合為一求太隂半徑以太隂最髙距地為一率地半徑比例數為二率太隂距地心線求月實均時所得内減去次均輪半徑為三率求得四率為太隂距地江氏永曰此以最髙時月距地半徑有竒求其漸卑之距地也前所求太隂距地心線者次均輪心距地心線也定朔望時月體在次均輪之底故須減去次均輪半徑一十一萬七千五百乃為月實體所在又以太隂距地為一率太隂實半徑為二率本天半徑為三率求得四率為正切查八線表得太隂半徑江氏永曰太隂視半徑舊表最小者一十五分一十五秒最大者一十七分二十秒求地影半徑以太陽最髙距地為一率地半徑比例數為二率太陽距地心線求日實均時所得為三率求得四率為太陽距地江氏永曰此以最髙時日距地一千一百六十二地半徑求其漸卑之距地也又以太陽光分半徑減地半徑所餘為一率太陽距地為二率地半徑為三率求得四率為地影之長江氏永曰太陽光分半徑大於地半徑五倍有竒地影漸逺漸小成角形自日心至地影之盡處為大股光分半徑為大句又於大句股中分為兩句股光分半徑減地半徑所餘次大句也太陽距地次大股也地半徑小句也地影長小股也又以地影長為一率地半徑為二率本天半徑為三率求得四率為正切檢八線表得地影角江氏永曰地影之角度引影線至本天滿半徑其度在本天之弧又以本天半徑為一率地影角之正切為二率地影長減太隂距地之餘為三率求得四率為太隂所當地影之濶江氏永曰大股比大句若小股與小句也乃以太隂距地為一率地影之濶為二率本天半徑為三率求得四率為正切檢八線表得地影半徑江氏永曰舊表地影半徑最小者四十三分最大者四十七分求食分太隂全徑為一率十分為二率太隂半徑與地影半徑相併為併徑江氏永曰舊表併徑最小者五十八分一十五秒最大者一度四分二十秒内減食甚距緯併徑不足減距緯即不食食江氏永曰距緯大於併徑不與併徑等亦不食餘為三率求得四率即食分江氏永曰地影半徑内減太隂半徑其餘距緯與之等自此以上皆能食既求初虧復圓時刻以食甚距緯之餘弦為一率併徑之餘弦為二率半徑千萬為三率求得四率為餘弦檢八線表得初虧復圓距弧江氏永曰初虧至食甚食甚至復圓其距弧等正弦縱餘弦横月食至地影中横過故以餘弦半徑為比例八線之理正弦餘弦相為消長正弦大者餘弦小正弦小者餘弦大極而至於無正弦則餘弦與半徑等假令食甚正當交㸃無距緯則一率與三率皆半徑而二率四率之餘弦必等餘弦等正弦亦等以併徑之正弦為半徑規一小圓於本天大圓之中地影包其内是距弧正弦與半徑等月食必從影之正右横過且穿其心又設距緯與併徑等則一率與二率之餘弦等三率與四率皆半徑則小圓之半徑盡無距弧月從影之上下相切而過不食矣其他有距緯未至等於併徑者三率半徑必稍大於一率則四率之餘弦亦必稍大於二率餘弦大者正弦小距弧月從影之偏右横過不穿心矣又以月距日實行化秒為一率江氏永曰前求食甚時刻所得小時化秒為二率初虧復圓距弧化秒為三率求得四率為秒以時分收之為初虧復圓距時以加減食甚時刻得初虧復圓時刻減得初虧加得復圎求食既生光時刻食甚距緯之餘弦為一率地影太隂兩半徑較江氏永曰相減之餘也之餘弦為二率半徑千萬為為三率求得四率為餘弦檢八線表得食既生光距弧又以月距日實行化秒為一率小時化秒為二率食既生光距弧化秒為三率求得四率為秒以時分收之為食既生光距時以加減食甚時刻得食既生光時刻減得食既加得生光求食限總時以初虧復圓距時倍之即食總時求太隂黄道經緯度置太陽黄道經度加減六宮過六宮則減去六宮不及六宮則加六宮宮江氏永曰月在日之對衝故加減六再加減食甚距弧江氏永曰食甚距時之弧也以一小時化秒為一率月距日實行化秒為二率食甚距時化秒為三率求得四率為秒以度分收之為食甚距弧其加減依食甚距時又加減黄白升度差求升度差法詳月離求黄道實行條得太隂黄道經度即求緯度詳月離曰江氏永前已求食甚距緯矣求太隂赤道經緯度詳月離求太隂出入時刻條赤江氏永曰本天半徑為一率黄大距之餘弦為二率太隂距春秋分黄道經度之正切為三率求得四率為赤道經度之正切赤緯後無所用如欲求之依弧三角兩邊夾一角求對邊之法求宿度求得本年黄赤道宿鈐求黄道宿鈐法詳日躔冇黄道經緯度即可求赤道經緯度與太隂求赤道法同緯江氏永曰求宿赤道經度用弧三角法以本宿黄道度南則加九十度北則減九十度為距黄極之一邊黄赤大距為一邊本宿距冬至黄道經度為所夾之外角過半周者與全周相減用其餘依太隂求赤道緯度法求得對角之邊為宿距北極度不及九十度者減去九十度餘為南緯宿有數星所求者距星也以太隂黄赤道經度各如法減之詳日躔即得太隂黄赤道經度求黄道地平交角江氏永曰此下二條皆為求定交角以辨初虧復圓方向也以食甚時刻江氏永曰從子正起變赤道度每時之四分變作一度毎時之一分變度之十五分又於太陽赤道經度内減三宮不及減者加十二宮減之江氏永曰經度起冬至故減三宮為春分不及減者在春分前也餘為太陽距春分赤道度兩數相加滿全周去之為春分距子正赤道度加減半周得春分距午正東西赤道度過半周者減半周為午正西不及半周者與半周相減為午正東春分距午正東西度過象限者與半周相減餘為秋分距午正東西度秋分距午東西與春分相反以春秋分距午正東西度與九十度相減江氏永曰午正赤道距地平九十度故也餘為春秋分距地平赤道度乃用為弧三角形之一邊江氏永曰斜弧三角也地平截赤道黄道不能成直角故為斜弧三角以黄赤大距度江氏永曰即春秋分之角度及赤道地平交角以極髙減象限得之春分午西秋分午東者用此若春分午東秋分午西者則以此度與半周相減用其餘即江氏永曰赤道去天頂與極髙同故以極髙減象限得赤道地平交角如京師極髙四十度則交角五十度凡角度必兩邊皆滿九十度乃見對角之弧度午正赤道距地平地平正東正西距午正皆九十度故赤道地平交角其度在子午圈黄道地平交角亦同理赤道交角必向黄道春分午西秋分午東者赤道包黄道得用其本角以向黄道春分午東秋分午西者黄道包赤道故赤道用其外角以向黄道也本角銳外角鈍鈍角之正弦餘弦即銳角之正弦餘弦但銳角之矢為正矢鈍角之矢為大矢大矢者半徑加餘弦也為邊傍之兩角江氏永曰兩角夾一邊也求得對邊之角為黄道地平交角春分午東秋分午西者得數即為黄道地平交角如春分午西秋分午東者則以得數與半周相減餘為黄道地平交角弧江氏永曰即黄道九十度限距地髙也皆用形外垂法求之形外垂弧者從天頂出線過春秋分角至地平成直角以為用半徑比例也春分午東秋分午西者赤角鈍而黄角銳作垂弧於近赤道邊以本天半徑為一率赤道地平交角之正弦為二率春秋分距地平赤道度之正弦為三率求得四率為正弦檢表得度為垂弧又以春秋分距地平赤道度之餘弦為一率本天半徑為二率赤道地平交角之餘切為三率求得四率為正切檢表得虚角以春秋分角併虚角為總角又以本天半徑為一率總角之正弦為二率垂弧之餘弦為三率求得四率檢表得度為黄道地平交角春分午西秋分午東者赤角銳而黄角鈍作垂弧於近黄道邊亦以本天半徑為一率赤道地平交角之正弦為二率春秋分距地平赤道度之正弦為三率求得四率為正弦檢表得垂弧又以春秋分距地平赤道度之餘弦為一率本天半徑為二率赤道地平交角之餘切為三率求得四率為正切檢表得總角於總角内減春秋分角餘為虚角又以本天半徑為一率虚角之正弦為二率垂弧之餘弦為三率求得四率為餘弦檢表得黄道地平交角之外角以外角與半周相減餘為黄道地平交角角右法皆三求而後得角若用次形法則易邊為角易為邊可用加減捷法求之春秋分角度為一邊赤道地平交角度為一邊春秋分距地平赤道度為所夾之角兩邊相併為總弧相減為存弧各取餘弦視總弧過象限兩餘弦相加不過象限相減折半為初數以半徑為一率角之矢為二率初數為三率求得四率為對弧存弧兩矢較以矢較加入存弧矢為對弧矢得正矢與半徑相減得大矢於矢内減半徑為餘弦以餘弦檢表得對弧易弧為角視得正矢為銳角得大矢為鈍角此法較㨗求黄道髙弧交角以黄道地平交角之正弦為一率赤道地平交角之正弦為二率春秋分距地平赤道度之正弦為三率求得四率為正弦檢表得春秋分距地平黄道度江氏永曰黄道地平交角對春秋分距地平赤道一邊赤道地平交角對春秋分距地平黄道一邊此亦斜弧三角角有所對之邊又一角對所求之邊則皆用正弦比例又以太隂黄道經度視春秋分在地平上者與三九宮相減餘為太隂距春秋分黄道度春秋分宮度大於太隂宮度為距春秋分前反此則在後又以太隂距春秋分黄道度與春秋分距地平黄道度相加減為太隂距地平黄道度春秋分在午正西者太隂在分後則加在分前則減春秋分在午正東反是太江氏永曰食甚時太隂所當黄道度即地影之心隂距地平黄道度即影心距地平黄道度也隨視其距限之東西春秋分在午西者太隂距地平黄道度不及九十度為限西過九十度為限東春秋分在午東者反是乃以太隂距地平黄道度之餘弦為一率本天半徑為二率黄道地平交角之餘切為三率求得四率為正切檢表得黄道髙弧交角江氏永曰從天頂出線過影心至地平與黄道交成角此角對下兩角間之地平弧弧度未得不能用正弦法當如此求之猶前求虚角總角之法也此交角於地影上作之大圓之角度即影邊之角度食在限東者角在左偏下限西者角在右偏下求初虧復圓定交角置食甚交周以初虧復圓距弧加減之得初虧復圓交周減得初虧加得復圓乃以本天半徑為一率黄白大距之正弦為二率初虧復圓交周之正弦各為三率各求得四率為正弦江氏永曰亦如求食甚距緯之法檢表得初虧復圓距緯交周初宮五宮為緯北六宮十一宮為緯南又以併徑之正弦為一率初虧復圓距緯正弦各為二率半徑千萬為三率求得四率為正弦江氏永曰併徑對直角距緯對緯差角故皆以正弦比例檢表得初虧復圓緯差角各與黄道髙弧交角相加減為初虧復圓定交角太隂在限東初虧緯南則加緯北則減太隂在限西初虧緯南則減緯北則加復圓加減反是下江氏永曰影上所作之交角限東在左下限西在右而月入影皆從右出影皆從左其以緯差角加減交角也限東視其右上之對角初虧緯南白道在下則兩角加大緯北白道在上則對角減小矣限西視其右下之本角初虧緯南白道在下本角減小緯北白道在上本角加大復圓相反倣此可知若初虧復圓無緯差角江氏永曰正當交㸃也即以黄道髙弧交角為定交角求初虧復圓方向食在限東者初虧復圓定交角在四十五度以内初虧下偏左復圓上偏右四十五度以外初虧左偏下復圓右偏上適足九十度初虧正左復圓正右過九十度初虧左偏上復圓右偏下食在限西者初虧復圓定交角在四十五度以内初虧上偏左復圓下偏右四十五度以外初虧左偏上復圓右偏下適足九十度初虧正左復圓正右過九十度初虧左偏下復圓右偏下江氏永曰近地平則交角小近限則交角大正當限適足九十度有過之者因緯南緯北有加也月體不可分東西而可分左右其偏正上下分為八向皆視定交角度也求帶食以本日日出或日入時分初虧或食甚在日出前者為帶食出地食甚或復圓在日入後者為帶食入地帶食出地者用日出分帶食入地者用日入分與食甚時分相減餘為帶食距時以小時化秒為一率小時月距日實行化秒為二率帶食距時化秒為三率求得四率為秒以度分收之為帶食距弧江氏永曰地平距食甚之弧也日出帶食在西者初虧未食甚食甚㸃在地平上食甚未復圓食甚㸃在地平下日入帶食在東者初虧未食甚食甚㸃在地平下食甚未復圓食甚㸃在地平上又以半徑千萬為一率帶食距弧之餘弦為二率食甚距緯之餘弦為三率求得四率為餘弦檢表得對食兩心相距之弧江氏永曰月心與影心相距也正當食甚時距緯即兩心相距因帶食有距弧或初虧未至食甚或食甚未至復圓則兩心相距必大於食甚距緯别成斜弧帶食距弧與距緯相交成直角直角與兩心相距弧對求法當以一半徑三餘弦為比例乃以太隂全徑為一率十分為二率併徑内減帶食兩心相距餘為三率求得四率為帶食分秒求各省月食時刻以京師月食時刻按各省東西偏度加減之與推各省節氣時刻法同早江氏永曰月食分秒無異惟時刻西而東晚求各省月食方向以各省赤道髙度及各省時刻如法推之江氏永曰先以各省偏度加減食甚時乃依求黄道地平交角以下四條推之蕙田案以上推月食法推日食法用數太陽實半徑五百七餘詳月食江氏永曰地半徑設一百太陽半徑大於地半徑五倍零七故為五百零七求天正冬至詳日躔求首朔詳月食求太陽入食限與月食求逐月望平交周之法同惟不用望策即為逐月朔平交周視某月交周入可食之限即為有食之月交周自五宮九度八分至六宮八度五十一分又自十一宮二十一度九分至初宮二十度五十二分皆為可食之限分江氏永曰隂律二十度五十二分陽律八度五十一此虚寛可食之限日食限隂律度多陽律度少由人在地面視月有視差月不當天頂則視之恒降而下初宮五宮月在黄道北去交尚逺實度本不食視度減之則見食六宮十一宮月在黄道南去交近實度本當食視度加之反不見食矣後推三差詳之求平朔與月食求平望之法同惟不加望策後三條同求太陽平行求太陽平引求太隂平引求太陽實引求太隂實引求實朔求實交周以上四條皆與月食法同惟食限不同實交周自五宮十一度四十五分至六宮六度十四分又自十一宮二十三度四十六分至初宮十八度十五分為的食限實交周入此限者為有食不入限者不必布算然亦有入限而不食者因三差故也後詳之江氏永曰隂律十八度十五分陽律六度十四分為的食限求太陽黄赤實經度與月食法同下二條倣此求實朔用時實朔用時在日出前或日入後五刻以内可以見食五刻以外全在夜不必布算江氏永曰五刻以内可見帶食求食甚用時與月食求食甚時刻法同按月食無視差故以食甚距時加減實望用時即得食甚時刻若日食則視差多端其時刻因之進退故復有近時定時之求此則只名用時也此後則因用時求視差以推定時求用時春秋分距午赤道度以太陽赤道經度減三宮不足減者加十二宮減之為太陽距春分後赤道度又以食甚用時變為赤道度加減半周過半周者減去半周不及半周者加半周江氏永曰過半周者午正後不及半周者午正前為太陽距午正赤道度兩數相加滿全周去之其數不過象限者為春分距午西赤道度過一象限者與半周相減餘為秋分距午東赤道度過二象限者則減去二象限餘為秋分距午西赤道度過三象限者與全周相減餘為春分距午東赤道度江氏永曰如用時為已正赤道度一百五十度加半周一百八十度為三百三十度假令太陽距春分二十度相加三百五十度是過三象限與全周相減餘十度為春分距午東赤道度如太陽距春分四十度相加三百七十度滿全周去之餘十度是不過象限為春分距午西赤道度過一象限過二象限倣此求用時春秋分距午黄道度以黄赤大距之餘弦為一率江氏永曰黄赤大距之餘弦九一七一二本天半徑為二率用時春秋分距午赤道度之正切為三率求得四率為正切檢表得用時春秋分距午黄道度江氏永曰此即月離太隂出入時刻條黄求赤之法反用之也八線之理餘弦與半徑若半徑與正割如欲用半徑為法以省除則以本天半徑為一率黄赤大距之正割一九三七為二率求用時午位黄赤距緯以本天半徑為一率黄赤大距之正弦為二率江氏永曰黄赤大距之正弦三九八六二用時春秋分距午黄道度之正弦為三率求得四率為正弦檢表得用時午位黄赤距緯江氏永曰此以大股大句比小股小句也求用時黄道與子午圈交角以用時春秋分距午黄道度之正弦為一率本天半徑為二率用時春秋分距午赤道度之正弦為三率求得四率為正弦檢表得用時黄道與子午圈交角江氏永曰午圈交赤道成直角則有半徑正弦與黄道弧對而赤道弧則對黄道午圈交角者也故皆以正弦比例如欲易半徑為一率以省除則以春秋分距午黄道度之餘割為二率求用時午位黄道宮度置用時春秋分距午黄道度視春分在午西者加三宮秋分在午西者加九宮春分在午東者與三宮相減秋分在午東者與九宮相減得用時午位黄道宮度江氏永曰午位黄道宮度從冬至初宫起故如此加減求用時午位黄道髙弧以用時午位黄赤距緯與赤道髙弧北極髙度減象限之餘相江氏永曰如極髙四十度與九十度減餘五十度相加減得用時午位黄道髙弧黄道三宮至八宮則相加九宮至二宮則相減江氏永曰春分後北緯故加秋分後南緯故減求用時黄平象限距午度分以用時黄道與子午圈交角之餘弦為一率本天半徑為二率用時午位黄道髙弧之正切為三率求得四率為正切檢表得度與九十度相減餘為用時黄平象限距午度分江氏永曰黄道在地平上恒半周其九十度限為最髙之處謂之黄平象限一日惟春秋分二㸃正當地平時九十度限在正午若春秋分在地平上此限或在午東或在午西日食推食分食時之差先求此限所在為要既求得黄道與子午圈交角為一角午位黄道髙弧為一邊又有子午圈交地平之直角是為兩角夾一邊求對直角之黄弧亦如前春秋分距午黄道度之法求之如欲用半徑為一率以省除則以黄道與子午交角之正割為二率也求得四率為午位黄道距地平之度與九十度相減則得限距午度分春分在地平上限在午東秋分在地平上限在午西求用時黄平象限宮度以用時黄平象限距午度分與用時午位黄道宮度相加減得黄平象限宮度午位黄道宮度初宮至午宮為加六宮至十一宮為減若午位黄道髙弧過九十度則反其加減江氏永曰初宮至五宮春分在地平上六宮至十一宮秋分在地平上午位黄道髙弧過九十度者極髙二十三度半以下之方也北向視日故反其加減求用時月距限以太陽黄道經度與用時黄平象限宮度相減餘為月距限度隨視其距限之東西太陽黄道經度大於黄平象限宮度者為限東小者為限西黄江氏永曰此時未求東西差太陽黄道經度即太隂道經度求用時限距地髙以本天半徑為一率用時黄道與子午圈交角之正弦為二率用時午位黄道髙弧之餘弦為三率求得四率為餘弦檢表得用時限距地髙江氏永曰限距地髙即黄道地平交角此以兩角夾一邊求對邊之角也午位黄道髙弧即午位黄道距天頂之餘度限距地髙即限距天頂之餘度如從天頂算之則為半徑與黄道子午圈交角之正弦若午位黄道距天頂之正弦與限距天頂之正弦以減象限而得限距地髙此用髙弧算之故用餘弦此兩餘弦即彼兩正弦也從天頂算亦有半徑正弦者黄極出線過天頂至黄平象限成直角黄極出線至黄道無非直角他處不過天頂惟交黄平象限乃過天頂後月食求黄道地平交角既得春秋分距地平赤道度三求可得此須委曲求之者必求黄平象限故也求用時太隂髙弧以本天半徑為一率用時限距地髙之正弦為二率用時月距限之餘弦為三率求得四率為正弦檢表得用時太隂髙弧江氏永曰髙弧交地平為直角與月距地平黄道度之弧對而限距地髙即黄道地平交角與所求髙弧對皆以正弦比例此用月距限之餘弦即月距地平黄道度之正弦也求用時黄道與髙弧交角以用時月距限之正弦為一率用時限距地髙之餘切為二率本天半徑為三率求得四率為正切檢表得用時黄道與髙弧交角江氏永曰從天頂出線交黄道經度至地平之角也有月距地平黄道度為一邊有限距地髙即黄道地平交角又有太隂髙弧交地平為直角是以兩角與對直角之邊而求又一角法當以月距地平黄道度之餘弦為一率此用月距限之正弦即月距地平黄道度之餘弦也此角作之於日體上角當日心角度在邊食在限東角在日之左下在限西角在日之右下求用時白道與髙弧交角置用時黄道與髙弧以黄白交角即朔望黄白大距度分江氏永曰朔望黄白大距四度五十八三十秒近五度加減之交周初宮十一宮月距限東則加限西則減交周五宮六宮反是江氏永曰初宮十一宮為正交白道自南而交入於北五宮六宮為中交白道自北而交出於南月體偏南以南為下北為上月距限東者交角向東南黄道西髙而東下遇正交逆其勢白道昻而出於上則黄道髙弧交角本小者増大約五度矣過中交順其勢白道愈低而下則交角愈變小減約五度矣月距限西者交角向西南黄道東髙而西下遇正交順其勢交角愈小遇中交逆其勢交角變大此東西加減之理也得用時白道與髙弧交角如過九十度者限東變為限西限西變為限東不足減者反減之限距地髙在天頂北者白平象限變為天頂南限距地髙在天頂南者白平象限變為天頂北限江氏永曰白道髙弧交角適足九十度者正當白道處即白平象限也如黄道交角已有八十五度一分半加入四度五十八分半滿九十度則無東西差若過九十度則交角改向本在東南者變為西南而月在限西本在西南者變為東南而月在限東本用加者變而減矣不足減者反減之此謂月距限甚近地平黄道交角不及四度五十八分半則置黄白距度而以黄道交角反減之黄平象限近天頂有白道之加減能變北為南南為北也交角與距限相因限近者交角大限逺者交角小後求東西差其關鍵在交角之餘弦既得白道髙弧交角則可不必求白平象限矣日食加時古法以正午為限午後先會後食時用加午前先食後會時用減正午則無加減此未明九十度限之理也九十度限黄道在地平上最髙之處日月距限有逺近黄道髙弧交角由此變時差多少由此生非以正午為限也一日之間惟春秋分二㸃正當地平限與午圈合為一其餘皆在