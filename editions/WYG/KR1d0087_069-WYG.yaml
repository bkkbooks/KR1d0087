body:
  text: 五禮通考巻五十九刑部尚書秦蕙田撰吉禮五十九宗廟制度周禮春官守祧掌守先王先公之廟祧注謂太祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟疏先公謂諸盩已前不可下入子孫廟故入后稷廟后稷廟藏先公不名祧者以有太祖廟名又文武已名祧故后稷不名祧也云先王之遷主藏于文武之廟者當周公制禮之時文武在親廟四之内未毁不得爲祧然文武雖未爲祧已立其廟至後子孫文武應遷而不遷乃爲祧也案孔君王肅之義二祧乃是高祖之父高祖之祖與親廟四皆次第而遷文武爲祖宗不毁矣鄭不然者以其守祧有奄八人守七廟并姜嫄廟則足矣若益二祧則十廟矣奄八人何以配之明其義非也王氏應電曰廟即祧故聘禮不腆先君之祧既拚以俟此官雖名守祧其職掌則總廟祧之事也華氏學泉曰遷主所藏曰祧周先公遷主藏于后稷之廟則后稷之廟爲祧成康以下先王之遷主藏于文武之廟故文武之廟亦爲祧此周所以有二祧非凡王者三昭三穆之外必當有二祧廟也諸侯遷主藏于太廟故聘禮云不腆先君之祧蓋指太廟爲祧言祧則足以統羣廟也周官守祧掌先王先公之廟祧而專以守祧名官亦舉祧以該廟也蔡氏德晉曰周初遷主藏于后稷廟之東西夾室則后稷廟爲祧至懿孝後成康以下遷主藏于文武兩世室故文武廟亦稱祧此成王周公時所稱祧則專指后稷廟也守祧兼掌七廟而專以祧名官者舉逺以該親廟也主以奄人者高紫超謂古人廟近宫内之故且祭祀之時有后妃内外宗行禮之事故用奄人女奴爲宜也蕙田案廟祧之說華氏爲長廟則有司脩除之其祧則守祧黝堊之注廟祭此廟也祧祭遷主有司宗伯也脩除黝堊互言之有司恒主脩除守祧恒主黝堊華氏學泉曰廟曰脩除祧曰黝堊康成曰互言之其實廟之昭穆遞遷則有毁壞毁壞則當有脩除春秋傳曰壞廟之道易檐可也改塗可也脩除之謂也祧廟不毁但當黝堊之使常新而已方氏苞曰文武在七世之内本爲祧廟八世九世則别立世室而祧主藏焉廟既増立則守祧者亦以時増疏乃謂奄八人守七廟及姜嫄廟而不得更増文武二廟則固矣蕙田案華氏方氏二說可開鄭氏之蔽禮記祭法逺廟為祧有二祧饗嘗乃止注天子遷廟之主以昭穆合藏于二祧之中諸侯無祧方氏慤曰二祧顯考之父祖也馬氏晞孟曰說者謂七廟之中祧廟二則爲文武之廟其說非也逺廟爲祧而二祧之廟止于享嘗而已苟文武之廟而祭止享嘗亦非先王所以尊祖宗之意也辨鄭氏三祧周禮春官守祧鄭注遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟小宗伯辨廟祧之昭穆鄭注祧遷主所藏之廟賈疏周以文武爲二祧祭法逺廟爲桃有二祧鄭注祧之言超也超上去意也天子遷廟之主以昭穆合藏于二祧之中諸侯無祧藏于祖考之廟中聘禮不腆先君之祧是謂始祖廟也孔潁達王制疏儒者難鄭云祭法遠廟爲祧鄭注周禮云遷主所藏曰祧違經正文鄭又云先公之遷主藏於后稷之廟先王之遷主藏於文武之廟便有三祧何得祭法云有二祧祭法疏曰遷主所藏曰祧是對例言之耳若散而通論則凡廟曰祧故昭元年左傳云其敢愛豐氏之祧彼祧遠祖廟也襄九年左傳云君冠必以先君之祧處之服䖍注云曾祖之廟曰祧者以魯襄公於時冠於衛成公之廟成公是衛今君之曾祖曰祧也何氏洵直曰祭法遠廟爲祧而鄭氏以文武爲之蓋非是也陳氏禮書曰祭法云遠廟爲祧則祧者兆也天子則五世六世之祖爲祧所謂有二祧是也諸侯以始祖爲祧所謂先君之祧是也鄭氏以祧爲超去之超誤矣既曰超矣又以文武爲不毁之祧何耶蕙田案周禮小宗伯辨廟祧之昭穆守祧掌守先王先公之廟祧廟者主未毁之廟祧者主已毁之廟設官不曰守廟而曰守祧蓋尊之也以仁率祖則主近爲親以義率親則主遠爲尊遠者以祧爲主故言祧以該廟蓋祧本以祧遷爲義後遂借以爲祖廟之通稱也如聘禮曰不腆先君之祧昭元年左傳曰其敢愛豐氏之祧襄九年左傳曰君冠必以先君之祧處之有明證矣諸侯以太廟曰祧從遠祖爲義且以示謙非百世不毁之廟云爾祭法遠廟爲祧有二祧先儒皆以五世六世祖爲二祧蓋親盡世遠漸即祧遷享嘗乃止禮亦從殺鄭氏誤解以文武二廟當二祧遂至七廟常數反缺其二且二廟不祧反稱二祧名實乖違又謂遷主所藏曰祧據先公之主藏后稷廟先王之主藏文武廟則明有三祧與二祧之文不合蓋由誤解祭法而即與祭法之文相戾弗思甚矣服䖍訓先君之祧爲曾祖之廟則知諸侯不拘何祖通謂之祧鄭以爲始祖廟亦未見其必然也陳用之訓祧爲兆從壇墠爲義類但兆既非廟又非壇墠不審何者名爲兆恐仍不若鄭作超解於祧遷之義爲近耳春官小宗伯辨廟祧之昭穆注祧遷主所藏之廟自始祖之後父曰昭子曰穆疏云自始祖之後父曰昭子曰穆者周以后稷廟爲始祖特立廟不毁即從不窋已後爲數不窋父爲昭鞠子爲穆從此以後皆父爲昭子爲穆至文王十四世文王第稱穆也小史掌邦國之志奠繫世辨昭穆帝疏奠繫世者謂定繫世本辨昭穆者帝繫世本之上皆自有昭穆親疎故須辨之大祭祀以書敘昭穆之俎簋注大祭祀小史主序其昭穆以其主定繫世祭祀史主敘其昭穆次其爼簋禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三周禮夏官司士凡祭祀賜爵呼昭穆而進之注賜爵神惠及下也此所賜王之子姓兄弟爵疏云及賜爵者謂祭未旅酬無算爵之時皆有酒賜及之皆以昭穆爲序也禮記祭統凡賜爵昭爲一穆爲一昭與昭齒穆與穆齒此之謂長幼有序酬疏凡賜爵者爵酒爵也謂祭祀旅時賜助祭者酒爵在昭列者則爲一色在穆列者自爲一色各自相旂尊者在前卑者在後若同班列則長者在前少者在後是昭與昭齒穆與穆齒夫祭有昭穆昭穆者所以别父子遠近長幼親疎之序而無亂也是故有事於太廟而羣昭羣穆咸在而不失其倫此之謂親疎之殺也注昭穆咸在同宗父子皆來疏昭穆謂尸主行列於廟中所以至無亂者謂父南靣子北面親者近疎者遠又各有次序是故有事於太廟則羣昭羣穆咸在者祭太廟之時則衆廟尸主皆來及助祭之人同宗父子皆至則羣昭穆咸在若不於太廟餘廟之祭唯有當廟尸主及所出之廟子孫來至不得羣昭羣穆咸在也而不失其倫者尸主既有昭穆故主人及衆賔亦爲昭穆列在廟不失倫類殺漸也列昭穆存亡名有逺近示天下親踈有漸也仲尼燕居嘗禘之禮所以仁昭穆也注仁猶存也凡存此者所以全善之道也中庸宗廟之禮所以序昭穆也注序猶次也大傳合族以食序以昭穆人道竭矣喪服小記妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆注中猶間也也疏妾祔於妾祖姑者言妾死亦祔夫祖之妾亡則中一以上而祔者亡無也中間也若太祖無妾則又間曾祖而祔高祖之妾也祔必以其昭穆者解所以祖無妾不祔曽祖而祔高祖之義也凡祔必使昭穆同曽祖非夫同列也然此下云妾母不世祭于孫否則妾無廟今乃云祔及高祖者當爲壇祔之耳蕙田案妾母不世祭謂奠而不祭無牲之謂非竟不祭也妾母無廟謂以昭穆祔祭於妾祖姑非無廟祭之謂也疏謂爲壇祔之王制之謬惑之耳雜記士不祔大夫祔於大夫之昆弟無昆弟則從其昭穆婦祔於其夫之所祔之妃無妃則亦從其昭穆之妃妾祔於妾祖姑無妾祖姑則亦從其昭穆之妾注夫所祔之妃於婦則祖姑祭疏大夫祔於士者謂祖爲士孫爲大夫若死可以祔於祖之爲士者也士不祔於大夫者謂先祖爲大夫孫爲士不可祔祭於大夫唯得祔於大夫之兄弟爲士者無昆弟則從其昭穆者謂祖爲大夫無昆弟爲士則從其昭穆謂祔于高祖爲士者若高祖爲大夫則祔於高祖昆弟爲士者則亦從其昭穆之妃謂亦間一以上祔於高祖之妃高祖無妃則亦祔於高祖之祖妃若其祖有昆弟之妃班爵同者則亦祔之喪服小記庶子不祭殤與無後者殤與無後者從祖祔食疏已不得祭父祖而以此諸親皆各從其祖祔食祖廟在宗子之家故已不得自祭之也儀禮士虞禮記明日以其班祔注卒哭之明日也班次也喪服小記曰祔必以其昭穆亡則中一以上凡祔已復於寢如既祫主反其廟練而后遷廟疏引喪服小記者彼解中猶間也一以上祖又祖孫祔祖爲正若無祖則祔於高祖以其祔必以昭穆孫與祖同昭穆故間一以上取昭穆相當者若婦則祔於夫之所祔之妃無亦間一以上若妾祔亦祔於夫之所祔之妾無則易牲祔女君也周禮春官冢人掌公墓之地先王之葬居中以昭穆爲左右春秋僖公五年左氏傳宫之奇曰太伯虞仲太王之昭虢仲虢叔王季之穆注太伯虞仲皆太王之子穆生昭昭生穆以世次計故太伯虞仲於周爲昭王季者太伯虞仲之母弟也虢仲虢叔王季之子文王之母弟也仲叔皆虢君字二十四年左氏傳富辰曰管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也疏文之昭者自后穆以後一昭一穆文王於次爲穆故文子爲昭武子爲穆二十八年左氏傳曹侯曰曹叔振鐸文之昭也先君唐叔武之穆也文公二年大祀於太廟躋僖公穀梁傳曰先親而後祖逆祀也逆祀是無昭穆也無昭穆則是無祖也無祖則無天也君子不以親親害尊尊春秋之義也注祫祭者皆合祭諸廟已毁未毁之主於太祖廟中以昭穆爲次序父爲昭子爲穆昭南鄉穆北鄉孫從王父坐也祭畢則復還其廟僖公雖長已爲臣矣閔公雖小已爲君矣臣不可以先君猶子不可以先父故以昭穆父祖爲喻國語夏父弗忌爲宗伯烝將躋僖公宗有司曰非昭穆也曰我爲宗伯明者爲昭其次爲穆何常之有有司曰夫宗廟之有昭穆也以世次之長幼而等胄之親疎也夫祀昭孝也各致齊敬於其皇祖昭孝之至也故工史書世宗祝書昭穆猶恐其踰也弗聽遂躋之劉歆曰孫居王父之處正昭穆則與祖相代此遷廟之殺也張純曰父子不並坐而孫從王父決疑要注曰凡昭穆父南面故曰昭昭明也子北面故曰穆穆順也通典杜氏佑曰太祖於室中之奥西壁下東面太祖之子南面爲昭次之昭之子北面相對爲穆張純曰元始中禘禮父爲昭南向子爲穆北面父子不並坐陳氏禮書宗廟有迭毁昭穆則一成而不可易春秋傳言太王之昭王季之穆又言文之昭武之穆此世序之昭穆不可易也周官冢人掌公墓之地先王之葬居中以昭穆爲左右此葬位之昭穆不可易也儀禮曰卒哭明日以其班祔禮記曰祔必以其昭穆此祔位之昭穆不可易也司士凡祭祀賜爵呼昭穆而進之祭統凡賜爵昭爲一穆爲一昭與昭齒穆與穆齒此賜爵之昭穆不可易也大傳曰合族以食序以昭穆此合食之昭穆不可易也生而賜爵合食死而葬祔皆以世序而不可易則廟之昭穆可知矣其制蓋祖廟居中而父昭在左子穆在右始死者昭耶則毁昭廟始死者穆耶則毁穆廟昭與昭爲列而無嫌乎子加於父穆與穆爲列而無嫌乎父屈於子也先儒謂周藏先公木主於后稷之廟先王木主穆在文王廟昭在武王廟於理或然周氏世樟曰廟之外爲都宫諸廟在内各有門堂寢室牆宇環之太祖居北其餘以次而南廟皆南向廟主在本廟之室中皆東向若羣廟之主合食於太廟則唯太祖東向羣昭皆列北牖下而南向羣穆皆列南牖下而北向若禘祭則於太廟中特設太祖所自出之帝於東向而太祖退居南向以配之太祖之主不遷其餘親盡則遷遷昭之首廟主則以次廟末廟之主遞遷而上而以新主祔於末廟遷穆廟之主亦然總之昭常爲昭穆常爲穆有時子在三昭父在三穆似乎倒置然廟有門垣各全其尊不以左右爲尊卑也凡遷主必毁其廟榖梁傳云壞廟之道易簷可也改塗可也謂更而新之移置其主也古者遷主皆入於太廟之東西兩夾室至周則王季以上穆之遷主入於太廟文王以下穆之遷主入於文王世室武王以下昭之遷主入於武世室凡藏主必藏石室之中左傳昭十四年鄭原繁云我先人典司宗祏所謂宗祏者宗廟中藏主石室也附辨陸氏佃昭穆爲父子之號及廟次世次不同陸氏佃曰昭穆者父子之號昭以明下爲義穆以恭上爲義方其爲父則稱昭取其昭以明下也方其爲子則稱穆取其穆以恭上也豈可膠哉張璪何洵直謂昭常爲昭穆常爲穆左者不可遷於右右者不可遷於左既爲昭矣又有時而爲穆既爲穆矣復有時而爲昭是亂昭穆之名此說非也苟爲昭者不復爲穆爲穆者不復爲昭則是子常事父爲之子者今雖有子不得爲父苟復爲父則以爲是亂父子之名可乎父又曰假令甲於上世之次爲穆今同堂合食實屬行乙於上世之次爲昭今同堂合食實屬子行則甲宜爲昭乙宜爲穆豈可遠引千歲以來世次覆令甲爲右穆乙爲左昭以紊父子之序乎又曰世次與廟次不同世次無遷法而廟制親盡則移世次無遷法則昭生穆穆生昭廟制親盡而遷則昭穆移易祭統曰昭穆者所以别父子逺近長幼親疎之序故有事於太廟則昭穆咸在而不失其倫若廟次昭常爲昭穆常爲穆則子或壓父尊卑失序豈所謂不失其倫者耶何氏洵直曰案古者宫寢宗廟皆以孫居王父之處而不以子代父自始祖之後父曰昭子曰穆孫爲昭曾孫爲穆𤣥孫爲昭謂之昭穆通於存亡居昭位者不可遷於穆行居穆行者不可入於昭位本之於經質之於傳驗之以先儒之說根據盤互枝連葉貫議論符合如出一人請得條别而陳之何謂宫寢宗廟皆以孫居王父之處曰春秋書高寢路寢小寢何休曰父居高寢子居路寢孫從王父母疏義謂孫死亦從王父母是殯於其宫之西序矣殷則殯於祖廟之兩楹間設朝而殯於祖是也及冢人辨其兆域則以昭穆爲左右至卒哭明日又各從其昭穆祔於祖父女子則祔皇祖妣婦則祔皇祖姑故曰以其班祔以士大夫言若祖爵尊則祔於諸祖父爲士大夫者若無可以祔或王父母在則越曾祖一世當爲壇而祔高祖若又無可以祔則越高祖之父一世祔高祖之祖記所謂亡則中一以上而祔必以其昭穆者也以諸侯五廟爲言祔祭既畢則主復於殯宫之寢如既祫主還其廟然也練而後遷廟於是以始祔之孫入王父廟以王父入高祖廟以高祖之主藏於太祖廟春秋榖梁傳曰作主壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也范甯曰親過高祖則毁其廟將納新神故示有所加孔潁達曰練時壞祖與高祖之廟改塗易檐示有壞意以其高祖入於太祖之廟其祖祔入高祖廟其新神入祖廟是練時遷廟也遷廟以孫代王父取其昭穆相當所以壞祖與高祖廟而不毁曾祖爾漢劉歆之論最博而篤曰孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也今之說者祔廟與遷廟異是不然也至祥禫既終而合食於祖則室中之位太祖西方東向太祖之子爲昭北方南面太祖之孫爲穆南方北面差次而東孫與王父並列下達於禰張純曰父子不並坐而孫從王父王肅引賈逵說吉禘於莊公曰遷主遞位孫居王父之處也雖祭殤與無後亦以孫從王父記曰從祖祔食蓋曰自祭於殤在於父廟祭無後兄弟當就祖廟祭無後諸父當於曾祖廟各從其班也祭成人者必有尸尸必以孫孫幼則使人抱之皆衣其祖之遺衣服而坐於祖主之左然於祭者子行也父北面而事之故曰君子抱孫不抱子子不可以爲父尸以其異昭穆而祖孫則同耳祭統曰羣昭羣穆咸在而不失其倫謂同宗人皆來助祭也又曰昭爲一穆爲一昭與昭齒穆與穆齒賈公彦曰昭穆在助祭之中者皆在東階之前面陳假令父行爲昭子行爲穆孫行還爲昭曾孫行還爲穆就昭穆中各以年長者在上幼者居下故云齒也夫古者葬祔以其班祫以其班爲尸及賜爵以其班故昭常爲昭穆常爲穆義據明白有如日星說者謂父昭子穆何常之有對父則身爲之穆對子則身爲之昭其意以爲廟次與世次不同故昭穆遷徙無常位右者可移之左左者可移之右殊不知廟次與世次一也廟次雖遷唯昭穆之班一定不移祖以傳孫孫以傳子縱厯百世其當爲昭當爲穆者未之有改也如武王之時廟次以文王爲穆至襄王之世凡厯十八君矣猶謂之穆左氏載富辰之語曰管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也十六國文王之子文王於廟次世次皆當爲穆故謂其子云文之昭也康王時廟次以武王爲昭至襄王之世猶謂之昭富辰曰邗晉應韓武之穆也四國武王之子武王於廟次世次皆當爲昭則謂其子曰武之穆也至於宫之奇謂太伯虞仲爲太王之昭虢仲虢叔爲王季之穆與此同意夫文王太王其子對父皆稱昭曰文王之昭太王之昭武王王季其子對父皆稱穆曰武王之穆王季之穆其爲子一也對父或稱昭或稱穆知昭穆爲定班而廟次世次未始異也書曰七世之廟記曰天子七廟三昭三穆書言世而禮言昭穆則世與昭穆無不同之理說者引魯語曰上史書世宗祝書昭穆知廟次昭穆與世次異臣以爲不然工史所書者帝繫世本之屬宗祝所書者几筵表著之位自其譜諜則謂之世據其班秩則謂之昭穆此離而言之者也又楚語曰宗廟之事昭穆之世此合而言之者也既曰昭穆之世則廟次昭穆果與世次不同乎經傳之言既然矣觀先儒之論則韋𤣥成曰父爲昭子爲穆孫復爲昭杜預曰穆生昭昭生穆漢帝詔曰孝宣皇帝爲孝昭皇帝後爲義一體顔師古曰一體謂俱爲昭也禮孫與祖俱爲昭鄭氏曰周以文武爲二祧藏遷主文爲穆祧爲昭主武爲昭祧爲穆主此先儒論昭穆一定不易皆與經合但祭法逺廟爲祧而鄭氏以文武爲之蓋非是也說者曰穆王入廟王季親盡而遷則文王宜自右而左居昭位武王宜自下而上居穆位必如此言則世次廟次常以子代父古無此理又曰王季既遷文王居昭成王昭王次焉武王居穆康王穆王次焉所謂孫與祖昭穆同臣謂此非禮意何者葬與祔祫皆以孫從王父其無祖可祔者必中一以上祔於高祖論其爲尸則抱孫不抱子是昭是昭班穆是穆班故曰孫與祖同若謂祖遷於上則孫與𤣥孫皆次之昔以爲穆今以爲昭昔以爲昭今更爲穆以葬位祔位祫位尸位觀之皆顛倒失序是但知有昭穆之名不知有昭穆之班何所謂孫與祖同故曰此非禮意竊嘗以爲天子七廟三昭三穆與太祖之廟而七此據迭毁爲言也祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟遠廟爲祧去壇爲墠此據定體爲言也迭毁者言乎其動也言乎其動則云三昭三穆而孫代王父之意寓於其中矣定體者言乎其常也言乎其常則云考與王考至於遠廟去壇而墠遷祖遞位之義亦不外是矣祔與廟遷雖非一時然均名昭穆豈有二位祔則孫從王父合食遷則孫常與祖相代者入其廟而襲其處如劉歆王肅之論是也既生居王父之寢殁則殯於其宫之西序葬與祔祫俱從祖列至其爲尸亦襲祖之遺衣服而坐於主之左助祭賜爵各以昭穆序以受氏命族又以王父之序是無所不用其班何獨遷廟則以子代父而亂其班乎說者又引適子冠於阼爲証蓋亦不類記曰適子冠於阼以著代明其代父傳重其當祖統昭穆相代也又曰禮記天子七廟三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五大夫一昭一穆與太祖之廟而三謂之祖則無對故其位居中而不以昭穆居之且世世不毁昭穆有對故斷自始祖之後父曰昭子曰穆至親盡則迭遷后稷爲周祖其子不窋曰昭其孫鞠陶曰穆周公爲魯祖其子伯禽曰昭其孫考公曰穆萬物本乎天人本乎祖祖者天也昭居左爲陽穆居右爲隂以三昭三穆言之則一爲昭二爲穆三爲昭四爲穆五爲昭六爲穆一三五者陽奇之數也二四六者隂耦之數也自一世推而至百世皆然昭者有昭班與陽奇同類穆者有穆班與隂耦同類故葬與祔祫必以孫從王父蓋神得同班同類則爲安也昭之王父以昭孫爲尸穆之王父以穆孫爲尸蓋神得同類則憑依之也夫奇耦爲定數左右爲定位昭穆爲定班若曰右者可移之左左者可移之右猶陽奇有時爲耦隂耦有時爲奇班類顛錯尊卑失序矣周禮冢人掌公墓之地先王之葬居中以昭穆爲左右是葬位有昭穆儀禮曰卒哭明日以其班祔禮記曰祔必以其昭穆亡則中一以上而祔是祔位有昭穆大祫室中太祖東向昭南面穆北面父子不並坐而孫從王父是祫位有昭穆孫爲王父尸子不可以爲父尸是尸位有昭穆天子七廟三昭三穆諸侯五廟二昭二穆大夫三廟一昭一穆是廟位有昭穆葬位之昭穆一定不移則祔可知也祔位之昭穆一定不移則祫可知也祫位之昭穆一定不移則尸可知也尸位之昭穆一定不移則廟可知也葬位祔位祫位尸位廟位五者均謂之昭穆豈有二義哉在葬位爲昭則於祔位祫位尸位廟位俱爲昭在葬位爲穆則於祔位祫位尸位廟位俱爲穆今之說者曰父昭子穆何常之有對父則爲穆對子則爲昭故有在廟位爲昭而於祔位祫位爲穆在廟位爲穆而於祔位祫位爲昭失禮意矣王季之時以太王爲穆至惠王厯十八君而謂之穆文王之時以王季爲昭至惠王時厯十八君而謂之昭宫之奇曰太伯虞仲太王之昭虢仲虢叔王季之穆太伯虞仲者太王之子虢仲虢叔者王季之子太王於廟次世次爲穆故謂其子爲昭王季於廟次世次爲昭故謂其子爲穆武王時廟次以文王爲穆康王時廟次以武王爲昭襄王之世亦謂其子曰文王之昭武王之穆周大夫富辰既言之矣曹伯之臣侯獳又曰曹叔振鐸文之昭也先君唐叔武之穆也襄王距文王之時無慮十有八世景王之子恭王距襄王又七世而遠魯定公四年衞大夫祝鮀之言猶曰曹文之昭晉武之穆由此論之昭常爲昭穆常爲穆雖百世無易也始祖之位定則昭穆從而正始祖之位不定則昭穆從而不正漢以太上廟瘞於陵園而悼皇考序於昭穆是高皇帝以有功加其父史皇孫以旁支干大統有以知漢之昭穆不正也唐以景皇帝爲太祖而上有獻懿二祖貞元中用陳京議遷獻懿於别廟而景皇帝正東向之位有以知唐之昭穆不正也漢唐猶然又況晉隋五代之末造乎祖位定而昭穆正者殷周與本朝是也蕙田案何氏之論援據詳盡斷制明確論昭穆者無出其右張氏曰以周制言之王季爲昭文王爲穆武王爲昭成王爲穆則所謂父昭子穆也然則王季親盡其廟既遷武王自右而上從王季之位而不嫌尊於文王何也蓋昭穆以定位也武王既爲昭矣則其位在左自爲尊卑而無與乎文王之穆也又四時常祀各於其廟不偶坐而相臨此其所以進居王季之位而不嫌尊於文王也及乎合食於太祖之廟則王季文王更爲昭穆而世次雖遠不可謂無尊卑之序矣今若以王季親盡毁廟文王自右而左居昭位武王自下而上居穆位及合饗之祭而文王復爲穆武王更爲昭則是一身既爲昭矣又有時而爲穆既爲穆矣復有時而爲昭不唯亂昭穆之名又考之經傳無所據矣且生而居處殁而殯葬以至祔祭入廟爲尸賜爵皆孫從祖而不從父所以昭穆常用世次奚至於廟次獨不然乎蕙田案張氏昭穆自爲尊卑而不嫌相臨可補何氏所未及張子曰夏殷以前太祖亦以世數而遷復於郊禘及之至周則太祖常存當文武時則以后稷爲太祖至後世則以文王爲太祖稷則郊祀以配天二祧則武王必居其一武王是其德可宗者也凡廟須推始祖以爲太祖又須有一剏業之主即所謂祖也又須有一有功業致太平之主所謂宗也祖宗二祧與始祖之廟永不祧也若後世之君有中興大勛業者亦當爲不祧之主如祖宗也若漢高祖爲剏業之主文帝爲太宗武帝爲世宗此二宗者後世祧之亦可若光武復興後世安得不立爲宗也又如東漢既滅劉先主復立漢嗣後世安得不以宗事也以此言之則周之文武二祧蓋亦不可爲定數又如四親廟自高至禰皆不可不祭若使一世之中各有兄弟數人代立不可以廟數確定却有所不祭也雖數人止是當得一世故雖親廟亦不害爲數十廟也朱子禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今案商書已云七世之廟鄭說恐非顔師古曰父爲昭子爲穆孫復爲昭昭明也穆美也後世晉室諱昭故學者改昭爲韶其制皆在中門之左外爲都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫毓議天子太祖百世不遷一昭一穆爲宗亦百世不遷二昭二穆爲四親廟高祖以上親盡則毁而遞遷昭常爲昭穆常爲穆昭之二廟親盡則毁而遷其主於昭之宗曾祖遷於昭之二新入廟者祔於昭之三而高祖及祖在穆如故穆廟親盡倣此新死者如當爲昭則附於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者爲曾祖自次廟遷其高祖於昭之世室蓋於主祭者爲五世而親盡故也其穆之兩廟如故不動其次廟於主祭者爲高祖其近廟於主祭者爲祖也主祭者殁則祔於穆之近廟而遞遷其上倣此凡毁廟遷主改塗易檐示有所變非盡毁也見榖梁傳及註諸侯則無二宗大夫則無二廟其遷毁之次則與天子同但毁廟之主藏于太祖儀禮所謂以其班祔檀弓所謂祔於祖父者也曲禮云君子抱孫不抱子此言孫可以爲王父尸子不可以爲父尸鄭𤣥云以孫與祖昭穆同也周制自后稷爲太祖不窋爲昭鞠爲穆以下十二世至太王復爲穆十三世至王季復爲昭十四世至文王又爲穆十五世至武王復爲昭故書稱文王爲穆考詩稱武王爲昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衞文之昭也邗晉應韓武之穆也蓋其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右爲尊卑也三代之制其詳雖不得聞然其大略不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合爲都宫以序昭穆韋𤣥成傳云宗廟異處昭穆不序但考周制先公廟在岐文王在豐武王在鎬則都宫之制亦不得爲與漢亦無甚異未詳其說貢禹韋𤣥成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔毋起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆爲同堂異室之制見後漢明帝紀祭祀志又云其後積多無别而顯宗但爲陵寢之號自是以來更厯魏晉下及隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正其弊至使太祖之位下同子孫而更僻處於一隅既無以見其爲七廟之尊羣廟之神則又上厭祖考而不得自爲一廟之主以人情而論之則生居九重窮極壯麗而没祭一室不過㝷丈之間甚或無地以容鼎俎而陰損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典蓋將以遠迹三代之隆一正千古之謬甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書以詔萬世今獨具見於陸氏之文者爲可攷耳然其所論昭穆之說亦未有定論圖說在後獨原廟之制外爲都宫而各爲寢廟門垣乃爲近古但其禮既不經儀亦非古故儒者得以議之如李清臣所謂略於七廟之室而爲祠於佛老之側不爲木主而爲之象不爲禘祫烝嘗之祀而行一酌奠之禮楊時所論舍二帝三王之正禮而從一謬妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉周世數圖后稷不窋公劉皇僕毁隃髙圉公叔王季武康穆懿夷宣鞠慶節差弗公非亞圉太王文王成昭共孝厲幽周七廟圖周九廟圖朱子曰韋𤣥成劉歆廟數不同班固以歆說為是今亦未能決其是非姑兩存之至於遷毁之序則昭常為昭穆常為穆假令新死者當祔昭廟則毁其髙祖之廟而祔其主於左祧遷其祖之主於髙祖之故廟而祔新死者於祖之故廟即當祔於穆者其序亦然葢祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動故虞之明日祔於祖父葢將代居其處故為之祭以告新舊之神也今以周室世次為圖如右所謂高祖以上親盡當毁虞之明日祔於祖父者也元豐議禮何洵直張璪以此爲說而陸佃非之曰昭穆者父子之號昭以明下爲義穆以恭上爲義方其爲父則稱昭取其昭以明下也方其爲子則稱穆取其穆以恭上也豈可膠哉壇立於右墠立於左以周制言之則太王親盡去右壇而爲墠王季親盡去左祧而爲壇左右遷徙無嫌又曰顯考王考廟與左祧爲昭皇考廟與右祧爲穆如曰成王之世武王爲昭文王爲穆則武不入考廟而入王考廟矣此皆爲說之誤殊不知昭穆本以廟之居東居西主之向南向北而得名初不爲父子之號也必曰父子之號則穆之子又安得復爲昭哉壇墠之左右亦出先儒一時之說禮經非有明文也政使果然亦爲去廟之主藏夾室而有禱之祭且壇墠又皆一而已昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆而可以各由其序而遞遷也又況昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也故成王之世文王當穆而不害其尊於武武王爲昭而不害其卑於文非謂之昭即爲王考謂之穆即爲考廟也且必如佃說新死者必入穆廟而自其父以上穆遷於昭昭遷於穆祔一神而六廟皆爲之動則其祔也又何不直祔於父而必隔越一世以祔於其所未應入之廟乎佃又言曰假令甲於上世之次爲穆今合堂同食實屬父行乙於上世之次爲昭今合堂同食實屬子行則甲宜爲昭乙宜爲穆豈可逺引千歲以來世次覆令甲爲右穆乙爲左昭以紊父子之序乎此亦不曉前說之過也蓋昭穆之次既定則其子孫亦以爲序禮所謂昭與昭齒穆與穆齒傳所謂太祖之昭王季之穆文之昭武之穆者是也如必以父爲昭而子爲穆則太伯虞仲乃太王之父而文王反爲管蔡魯衞之子矣而可乎哉且一昭穆也既有上世之次又有今世之次則所以序其子孫者無乃更易不定而徒為紛紛乎曰然則廟之遷次如圖可以見矣子孫之序如佃所駮得無真有難處者耶曰古人坐次或以西方為上或以南方為上未必以左為尊也且又安知不如時祫之位乎其虞祭祔禮俱詳見讀禮通考中周時祫圖昭穆之不爲尊卑說已前見其大祫則始封以下以次相承亦無差舛故張璪以爲四時常祀各於其廟不偶坐而相臨故武王進居王季之位而不嫌尊於文王及合食乎祖則王季文王更爲昭穆不可謂無尊卑之序者是也但四時之祫不兼毁廟之主則有右無昭而穆獨爲尊之時若兩世室之主則文常爲穆而武常爲昭也故陸佃以爲毁廟之主有皆不祫之時難之而未見璪之所以對也余竊謂以上世之次推之一昭一穆固有定矣而其自相爲偶亦不可易但其散居本廟各自爲主而不相厭則武王進居王季之位而不嫌尊於文王及其合食於祖則王季雖遷而武王自當與成王爲偶未可以遽進而居王季之處也文王之爲穆亦虚其所向之謂而已則雖北向而何害其爲尊哉朱子或問昭穆之昭世讀爲韶今從本字何也曰昭之爲言明也以其南面而向明也其讀爲韶先儒以爲晉避諱而改之然禮書亦有作佋字者則假借而通用耳曰其爲向明何也曰此不可以空言曉也今且假設諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆在公宫之東南矣其制則孫毓以爲外爲都宫太祖在北二昭二穆以次而南是也蓋太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而牆宇四周焉太祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太祖之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫於太廟之室中則唯太祖東向自如而爲最尊之位羣昭之入乎此者皆列於北墉下而南向羣穆之入乎此者皆列於南墉下而北向南向者取其向明故謂之昭北向者取其深遠故謂之穆蓋羣廟之列則左爲昭而右爲穆祫祭之位則北爲昭而南爲穆也曰六世之後二世之主既祧則三世爲昭而四世爲穆五世爲昭而六世爲穆乎曰不然也昭常爲昭穆常爲穆禮家之說有明文矣蓋二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以爲序若武王謂文王爲穆考成王稱武王爲昭考則自其始祔而已然而春秋傳以管蔡郕霍爲文之昭邘晉應韓爲武之穆則雖其既遠而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左爲尊而右爲卑矣今乃三世穆而四世昭五世穆而六世昭是則右反爲尊而左反卑也而可乎曰不然也宗廟之制但以左右爲昭穆而不以昭穆爲尊卑故五廟同爲都宫則昭常在左穆常在右而外有以不失其序一世自爲一廟則昭不見穆穆不見昭而内有以各全其尊必大祫而會於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則高祖有時而在穆其禮未有考焉意或如此則高之上無昭而特設位於祖之西禰之下無穆而特設位於曾之東也歟曰然則毁廟云者何也曰春秋傳曰壞廟之道易檐可也改塗可也說者以爲將納新主示有所加耳非盡撤而去之也曰然則後世公私之廟皆爲同堂異室而以西爲上者何也曰由漢明帝始也夫漢之爲禮略矣然其始也諸帝之廟皆自營之各爲一處雖其都宫之制昭穆之位不復如古猶不失其獨專一廟之尊也至於明帝不知禮義之正而務爲抑損之私遺詔藏主於光烈皇后更衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃牿於漢明非禮之禮而不得以致其備物之孝蓋其别爲一室則深廣之度或不足以陳鼎俎而其合爲一廟則所以尊其太祖者既䙝而不嚴所以事其親廟者又厭而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦爲虚文矣宗廟之禮既爲虚文而事生事存之心有終不能自已者於是原廟之議不得不盛然亦至於我朝而後都宫别殿前門後寢始略如古者宗廟之制是其沿襲之變不唯窮鄉賤士有不得聞而自南渡之後故都淪没權宜草剙無復舊章則雖朝廷之上禮官博士老師宿儒亦莫有能知其原者幸而或有一二知學古之人乃能私議而竊嘆之然於前世則徒知孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之苟從則未有正其罪者於今之世則又徒知論其惑異端狥流俗之爲陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也抑嘗觀於陸佃之譏而知神祖之嘗有意於此然而考於史籍則未見其有紀焉若曰未及營表故不得書則後日之秉史筆者即前日承詔討論之臣也所宜深探遺㫖特書總序以昭來世而略無一詞以及之豈天未欲斯人者復見二帝三王之盛故尼其事而嗇其傳耶嗚呼惜哉然陸氏所定昭穆之次又與前說不同而張璪之議庶幾近之讀者更詳考之則當知所擇矣辨朱子兄弟異昭穆朱子禘祫議周九廟圖宣王時穆懿夷三昭共孝厲三穆祧廟議狀第七室欽宗爲穆第八室高宗爲昭文獻通考馬氏曰七廟之制諸儒皆能言之而厯代不能如其制而建造者又在昭穆之位太拘諸儒之言昭穆者莫詳明於晦菴之説矣既爲之說又爲之圖覽者一見可決然愚謂此制也必繼世有天下者皆父死子立而後可若兄終弟及則其序且紊矣姑以其圖考之圖自武王至於幽王皆定六廟三昭三穆之位然自懿王之前皆父傳之子則其序未嘗紊也懿王崩孝王以共王之弟懿王之叔繼懿王而立故晦菴廟圖宣王之世則以穆懿夷爲昭共孝厲爲穆夫穆王於世次昭也共王爲穆王之子於世次穆也懿王爲穆王之孫則繼穆而爲昭也皆是也孝王爲共王之弟而以繼共王爲穆雖於世次不紊然以弟而據孫之廟矣至夷王爲懿王之子世次當穆而圖反居昭厲王爲夷王之子世次當昭而圖反居穆則一孝王立而夷厲之昭穆遂至於易位於是晦菴亦無以處此不過即其繼立之先後以爲昭穆而不能自守其初説矣又況宣王之世三昭三穆爲六代則所祀合始於昭王今以孝王厠其間而其六世祖昭王雖未當祧而已在三昭三穆之外則名爲六廟而所祀止於五世矣然此所言昭穆祧遷之紊亂者不過一世耳前乎周者爲商商武丁之時所謂六廟者祖丁南庚陽甲盤庚小辛小乙是也然南庚者祖丁兄子陽甲盤庚小辛小乙又祖丁子也姑以祖丁爲昭言之則南庚至小乙皆祖丁子屬俱當爲穆是一昭五穆而武丁所祀者上不及曾祖未當祧而祧者四世矣後乎周者有唐唐懿宗之時所謂六廟者憲穆敬文武宣是也然穆宣皆憲之子敬文武又皆穆之子姑以憲宗爲昭言之則穆宣爲穆憲敬文武爲昭是四昭二穆而懿宗所祀上不及高祖未當祧而祧者三世矣至此則不特昭穆之位偏枯而祧遷之法亦復紊亂若必祀及六世則武丁之時除太祖之外必剙十廟懿宗之時除太祖之外必剏九廟而後可且繼世嗣位者既不能必其爲子爲弟而剙立宗廟又安能預定後王之入廟爲穆多昭少爲昭多穆少哉則立廟之制必合於升祔之時旋行營剙屬於昭者於太祖之左建之屬於穆者於太祖之右建之方爲合宜而預爲六廟定爲三昭三穆之說不可行矣又必如晦菴之說外爲都宫内則各有廟有寢有門有垣則其制甚大且必在國中門之左則其地有限昭穆之位既已截然則雖昭多於穆昭必不可侵穆之位而穆位多虚雖穆多於昭穆必不可居昭之地而昭地半闕易世之後又不知爲昭爲穆者何如而已剙之廟其世代之近者既未可祧遷如武丁十廟之類其昭穆之不順者則必逐代旋行位置營建而後可而其地又拘於中門之内太祖之左右剙造煩擾非所以安神明對偶偏枯又無以聳觀聽則反不如漢代之每帝建廟各在一所東都以來之同堂異室共爲一廟之渾成也故曰昭穆之位太拘也蕙田案朱子昭穆之說止言父死子立之常而未及兄終弟及之變設有善發問者舉以相難朱子必有說以處之矣馬氏所駁雖爲明辨然其說實先自疏家發之春秋文公二年左傳孔疏云若兄弟相代即異昭穆設令兄弟四人皆立爲君則祖父之廟即已從毁知其理必不然此與馬氏同義且張子亦嘗曰若使一世之中各有兄弟數人代立不可以廟數確定却有所不祭也雖數人止是當得一世則已發其端矣馬氏乃以衆難自塞而欲苟安於漢代之末失豈古禮真不可行耶又檢諸儒近世四明萬氏能發揮其說而不失禮之意附於後以補馬氏所不及云萬氏斯大曰天子七廟固爲定制然而處常則易明遇變則難曉何謂常父死子繼是也何謂變兄終弟及或以兄繼弟以叔繼兄子之類是也經傳止道其常而處變者無從考見唯春秋躋僖公一事三傳以祖禰父子爲言國語則直謂異昭穆諸家注疏皆謂閔雖弟先爲君僖雖兄嘗爲臣臣不可以先君猶子不可以先父故假祖禰昭穆爲喻范甯獨不然之胡安國亦以兄亡弟及爲易世以愚觀之則諸家爲善會傳文而深得乎禮意者也蓋嘗思之昭穆之爲義生於太廟中祫祭位鄉而子孫因之以定其世次故父子異昭穆而兄弟則昭穆同如左傳所謂太伯虞仲太王之昭也虢仲虢叔王季之穆也管蔡郕霍文之昭也邗晉應韓武之穆也皆一定而不可易在虞虢管蔡諸子雖生列藩封死亦不得入先王之廟然而昭穆之稱太伯虞仲不聞異於王季也虢仲虢叔不聞異於文王也管蔡及邗晉而下不聞異於武王成王也是則身爲諸侯且不與天子異昭穆之班而如以兄終弟及之故即如父子之易世則設武王無子立管蔡而下一人成王無子立邗晉而下一人此一人者反以天子故而昔爲文之昭者今且爲武之穆昔爲武之穆者今更爲成之昭矣而可乎故曰父子異昭穆兄弟昭穆同此至當不易之理也至於兄而繼弟則弟爲適而兄爲庶庶不並適又昔已爲臣故雖兄不得加於弟叔而繼兄子雖本異昭穆亦必進之先廟謂其兄廟始不至以兄子而子叔以兄而孫弟若夫廟制則一凖王制之言太祖而下其爲父死子繼之常也則一廟一主三昭三穆而不得少其爲兄弟相繼之變也則同廟異室亦三昭三穆而不得多觀考工記匠人營國所載世室明堂皆五室知周同廟異室古人已有通其變者正不得指之爲後人之臆見也得乎此制則位置井然雖如殷之兄弟四人相繼亦豈有昭多穆少或昭少穆多如馬端臨所謂對偶偏枯之慮哉朱子之圖可以處常而不可以處變故孝王以叔居子列弟處孫行遂使夷王以穆而居昭厲王以昭而居穆蓋亦未酌乎此制也蕙田案昭穆之說何氏洵直爲的至朱子始詳然馬貴與猶有昭穆偏枯祧遷紊亂之疑萬充宗據兄弟同昭穆之義定爲同廟異室之制則世次不紊而廟制有常不唯補先儒之闕直可爲萬世之典矣顧氏炎武曰商之世兄終弟及故十六世而有二十八王如仲丁外壬河亶甲兄弟三王陽甲盤庚小辛小乙兄弟四王未知其廟制何如商書言七世之廟賀循謂殷世有二祖三宗若拘七室則當祭禰而已徐邈亦云若兄弟昭穆者設兄弟六人爲君至其後世當祀不及祖禰唐書禮樂志自憲宗穆宗敬宗文宗四世祔廟睿𤣥肅代以次遷至武宗崩德宗以次當遷而於世次爲高祖禮官始覺其非以謂兄弟不相爲後不得爲昭穆乃議復祔代宗而議者言已祧之主不得復入太廟禮官舊史亦但言禮儀使不載其名曰昔晉元明之世已遷豫章潁川豫章府君宣帝之曾祖潁川府君宣帝之祖惠帝崩遷豫章元帝即位江左升懷帝又遷潁川位雖七室其實五世蓋從刁協以兄弟爲世數故也後皆復祔元帝時已遷豫章潁川尋從温嶠議復故明帝崩又遷潁川簡文帝立復故此故事也議者又言廟室有定數而無後之主當置别廟開元初奉中宗别廟升睿宗爲第七室禮官曰晉武帝時景文同廟廟雖六代其實七主至元帝明帝廟皆十室賀循曰廟以容主爲限而無常數也於是復祔代宗而以敬宗文宗武宗同爲一代何休解公羊傳文公二年躋僖公謂惠公與莊公當同南面西上隱桓與閔僖當同北面西上據大祫如此則廟中昭穆之序亦從之而不易矣鄞萬斯大本之立說謂廟制當一凖王制之言太祖而下其爲父死子繼之常也則一廟一主三昭三穆而不得少其爲兄弟相繼之變也則同廟異室亦三昭三穆而不得多觀考工記匠人營國所載世室明堂皆五室則知同廟異室古人或已有通其變者正不可指爲後人之臆見也記曰協諸義而協則禮雖先王未之有可以義起然則賀循之論可爲後王之式矣任氏啓運曰同堂異室以西爲上朱子謂其失始於漢明帝蓋别爲一室則深廣不足以容俎豆而合爲一廟則事太祖者既䙝而不嚴事親廟者又厭而不尊也然愚謂禮有經有權朱子之說以論父子祖孫當異廟而同堂者耳若兄弟嗣位不當以此拘也朱子議祫禘以太祖爲昭太宗爲穆欽宗爲昭高宗爲穆蓋因宋制而言觀欽宗高宗當爲一世而同祧一疏則知朱子云昭常爲昭穆常爲穆者爲定論而欽昭高穆之說非確論矣故兄弟嗣位必同堂異室並祔同祧也蕙田案此與萬氏義同蔡氏德晉曰天子諸侯廟祧昭穆之制天子始受命諸侯始封之君爲太祖不在昭穆之數其子爲昭之始孫爲穆之始以後穆生昭昭生穆相間而下至於無窮太祖之廟百世不毁昭穆之廟謂之親廟親盡而迭毁凡廟必建於宫室之左中門之外總度立廟之地而環之以牆其南爲門謂之都宫都宫之内乃建羣廟每一廟爲三屋皆南向一爲門塾士冠禮筮於廟門是也一爲廟以奉神主而祭祀焉一爲寢以藏衣冠祭祀畢則燕飲於此小雅樂具入奏是也三屋總周之以牆爲一廟天子七廟太祖居中坐北而向南三昭居左三穆居右皆下於太祖以次而出向南廟必有主藏於本廟室中皆居奥而東向及祫祭於太廟惟太祖東向居尊羣昭皆列坐於北而南向羣穆皆列坐於南而北向位皆自西而東以近至尊者爲上也南向者取其向明故謂之昭北向者取其深遠故謂之穆昭穆所以别世次而名義必取於祫祭之位者祫祭則祖考子孫咸在死者以世次爲坐位生者以世次爲立位秩然不紊而名分可因以正也七廟初立之時一世爲太祖二世居一昭三世居一穆四世居二昭五世居二穆六世居三昭七世居三穆至第八世没仍當祔於三昭内而以六世主遷於二昭四世主遷於一昭而祧其二世主藏於太廟之東夾室如第二世主有功德不當祧而爲後世所當宗者則别立廟於三昭之上與太祖並謂之世室第九世没仍當祔於三穆内而以七世主遷於二穆五世主遷於一穆而祧其第三世主藏於太廟之西夾室如第三世主有功德不當祧而爲後世所當宗者則别立廟於三穆之上亦與太祖並而謂之世室世室或稱祖或稱宗家語所謂古者祖有功而宗有德謂之祖宗者其廟皆不毁是也凡死者卒哭而祔祭於祖祔祭者將代居其廟故爲之祭以告新舊之神也既祭復反於寢練而毁廟毁廟者榖梁傳云易檐可也改塗可也以示將納新主而有所加非盡撤去而更造之也始死者昭則羣昭之廟皆毁始死者穆則羣穆之廟皆毁三年喪畢而後祔廟祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動何氏洵直所謂昭常爲昭穆常爲穆居昭位者不可遷於穆行居穆行者不可入於昭位是也然昭穆初建之位二世昭而三世穆則左尊而右卑至八世升祔於昭而祧其第二世於是四世昭而五世穆則左反卑而右反尊者陳用之謂昭與昭爲列而無嫌乎子加於父穆與穆爲列而無嫌乎父屈於子朱子謂宗廟之制但以左右爲昭穆不以昭穆爲尊卑蓋諸廟各有門垣足以各全其尊故也況禮之尚左尚右何常父居昭而子居穆則以東爲上父居穆而子居昭則以西爲上固無不可也特是父死子繼昭穆之廟得其常如兄終弟及或以兄繼弟以叔繼姪則昭穆之廟際其變考之商書云七世之廟而禮天子七廟三昭三穆與太祖之廟而七則毎一世而一廟明矣故父子異昭穆而各爲一世兄弟同昭穆而並爲一世各爲一世則祔於祖而各居一廟並爲一世即祔於其兄同居一廟而異其室蓋禮祔必以其昭穆故孫祔於祖子不祔於父弟可祔於兄士虞禮所謂以其班祔也孫祔於祖則有祔必有遷有遷必有祧而同班之廟皆毁弟祔於兄則有祔而無所遷亦無所祧但毁其兄廟之室並爲二室兄居第一室弟居第二室耳如三人祔則並爲三室一居中二居左三居右四人祔則並爲四室一居中之左二居中之右三居左四居右五人祔則並爲五室一居中二居中之左三居中之右四居左五居右古者廟皆有五室故五人並祔而不嫌多廟後之寢其室數亦同於廟而各藏其廟主之衣冠也如弟先立而兄繼之亦同祔一廟而爲二室但弟當居第一室兄當居第二室其祫祭之位則弟與兄同班而兄必位於弟之下兄弟之序不先君臣故也如姪先立而叔繼之則叔當祔於姪之父廟而異其室然不嫌躋於姪之上者同昭穆則有嫌異昭穆則無嫌也至祫祭於太廟則叔必與姪之子同班叔姪之序亦不先君臣故也兄弟既同廟異室故祔則並祔遷則並遷祧則同祧是以昭穆不紊而廟數有常也祫祭之位昭穆相對兄弟嗣位者或三人俱昭則唯第三昭與穆相對而一昭二昭對面之穆位皆虚或三人俱穆則唯第一穆與昭相對而二穆三穆對面之昭位皆虚餘可例推也以厯代之制言之家語云天子立七廟自有虞以至於周之所不變也朱子云劉歆謂宗不在七廟中者恐有功德者多則占了七廟數也其說是故虞夏皆以顓頊爲太祖虞之時以帝嚳爲文祖帝堯爲神宗皆功德廟而自立親廟五祀瞽瞍以上史記瞍父曰蟜牛蟜牛父曰勾芒勾芒父曰敬康敬康父曰窮蟬窮蟬即帝顓頊之子故親廟止於五也夏禹之時増立舜爲功德廟而自立親廟五祀鯀以上漢書律厯志鯀爲顓頊五世孫則可具五廟若史記以鯀爲顓頊之子恐太近而非也其後子孫又祖鯀宗禹爲功德廟而親廟漸増爲六焉商以契爲太祖而祖㝠宗湯後以湯爲烈祖太甲爲太宗太戊爲中宗武丁爲高宗皆爲功德而親廟則六周以后稷爲太祖其後祖文王而宗武王爲功德廟二而親廟亦六也至於昭穆之制莫詳明於周后稷第一世爲太祖第二世不窋爲昭第三世鞠爲穆傳至太王十三世復爲穆王季十四世復爲昭十五世文王又爲穆十六世武王又爲昭故書稱文王爲穆考武王爲昭考而左傳宮之奇曰太伯虞仲太王之昭虢仲虢叔王季之穆富辰曰管蔡郕霍魯衞毛聃郜雍曹滕畢原豐郇文之昭也邗晉應韓武之穆也衛祝鮀曰曹文之昭晉武之穆何氏洵直謂父於廟次世次爲昭者故謂其子爲穆父於廟次世次爲穆者故謂其子爲昭由此論之昭常爲昭穆常爲穆雖百世無易是也若諸侯之制則都宫中立五廟一爲太祖二昭二穆爲高曾祖禰四親廟升祔祧遷之法與天子同但第六世祔於昭即當祧第二世第七世祔於穆即當祧第三世而有功德不當祧者亦爲世室如祝陳杞宋以堯舜禹湯爲太祖而陳胡公杞東樓公宋微子之屬皆始封之君當另立世室也至如魯始封周公尚存而禮諸侯不得祖天子故不立廟周公薨始立昭第一廟至五世當祧以魯之受封實始於魯公故另立世室於二昭之上如齊太公始封即立二昭二穆四親廟而無太祖以諸侯非始受封不爲太祖故也太公薨則入禰廟而上祧一世所祧之主則瘞埋於墓所至五世當祧乃正太公之位於太祖而更定其子丁公爲昭之始丁公以後祧主則不瘞埋而藏於太廟之夾室矣丁公不立世室者以齊之受封實始於太公也任翼聖謂後世帝王掘起其禮亦當如齊之例漢元瘞太上主於園寢晉初祀征西六世唐初祀宣簡四世宋初祀僖祖六世皆有昭穆而虚太祖司馬溫公以爲太祖未正位故止祀三昭三穆太祖已正位乃並昭穆爲七世是也蓋祖有功宗有德與郊議諡同義皆本天以衡之非意爲推崇王安石以僖祖爲始祖謬甚其說精當不可易矣又周世次昭穆圖說后稷第一世爲太祖不窋第二世爲昭鞠第三世爲穆公劉第四世仍爲昭慶節第五世仍爲穆皇僕六世昭差弗七世穆毁隃八世昭公非九世穆高圉十世昭亞圉十一世穆祖紺十二世昭史記作公叔祖類太王十三世穆王季十四世昭文王十五世穆武王十六世昭成王十七世穆康王十八世昭昭王十九世穆穆王二十世昭共王二十一世穆懿王二十二世昭案周自后稷以至懿王凡二十二世皆父死子繼后稷爲太祖其下一世昭一世穆相間而下故文王以前立五廟二昭二穆與太祖而五武王以後立七廟三昭三穆與太祖而七凡親盡而祧之主皆藏於太廟之夾室至懿王時文王親盡當祧而以有功當宗因另立文世室於三穆之上及懿王崩孝王立孝王者共王之弟懿王之叔也懿王本有子乃不立子而立叔昭穆之變於此始矣史稱懿王時王室始衰此亦其明徴也然懿王既崩自當祔廟懿王爲共王之昭其主自當祔於第三昭廟之内由是穆王遷於二昭康王遷於一昭而武王當祧矣亦以有功當宗因另立武世室於三昭之上夫孝王爲共王之弟孝王在位猶共王在位也共王時文王且不當祧況武王乎今以共王祔之故不得不祧文王又以懿王祔之故不得不祧武王是則孝王時三昭三穆之廟雖仍有六世之主而上事止四世矣幸而文武有功當宗得立二世室而所事仍六世否則僅得事四世而止矣故成周廟制之變於此始也然猶變而不失其常者也至孝王没夷王立而廟制抑又變矣孝王共王弟二十一世穆夷王懿王子二十三世穆夷王孝王之姪孫而懿王之子也以常制論則孝王當祔於第三穆廟之内由是共王遷於二穆昭王遷於一穆而成王當祧然天子七廟本七世商書所謂七世之廟也則三穆廟當三世今共王與孝王本同一世而居二穆廟則三穆廟二世矣設兄弟四人嗣位則三廟止一世而祖亦在祧毁不祀之列矣其可乎然則孝王之主當祔於何廟曰祔於共王之廟而共王之主不遷爲同廟異室之制可也同廟異室則遷則並遷祧則同祧則廟制之極其變而仍不失其常者也夷王崩厲王立夷王爲懿王之穆當祔於第三穆廟之内由是共孝並遷於二穆昭王遷於一穆而成王祧矣至厲王之子宣王當祔於三穆則夷王當遷於二穆共孝並遷於一穆而昭王祧矣宣王之孫平王當祔於三穆則宣王當遷於二穆夷王當遷於一穆而共孝同祧矣所謂並祔同祧廟制之變而不失其常者也其廟主之祧者既立文武之世室則穆主之祧者藏於文世室之夾室中昭主之祧者藏於武世室之夾室中鄭康成所謂先公之遷主藏於后稷廟先王之遷主藏於文武廟也厲王二十四世昭宣王二十五世穆幽王二十六世昭平王二十七世穆洩父平王太子未立而卒二十八世昭夷王以後厲宣幽平皆父子相繼昭穆世次井然矣及平王時太子洩父卒立其子林是爲桓王蓋以嫡孫而承正統也然則洩父當祔廟乎不當祔廟乎洩父之没在平王時其卒哭而祔當祔於祖乎不當祔於祖乎雜記言公子祔於公子喪服小記言諸侯不祔於天子士大夫不祔於諸侯祔於諸祖父之爲士大夫者則王子不當祔於先王矣然太子儲君也非王子比固可祔於先王但不立其子而立其弟則正統有屬異日太子不當祔廟則卒哭而不祔於先王可也如伯邑考是也既立其子則正統昭穆不容缺一世異日太子必當祔廟則卒哭而祔不可不祔於先王矣如洩父及明懿文太子是也特是喪畢祔廟王不當祔其子而遷其父且父爲王而主祭則子亦不得獨居一廟之尊故喪畢祔廟不毁廟不遷主但以廟之夾室藏其主可也及子嗣位則當取父之主追尊其號祔之於正室以爲禰廟而遷其曾祖於上廟此不易之理也明建文帝以太孫嗣高祖位元年追尊皇考懿文太子爲孝康皇帝廟號興宗皇妣懿敬皇太子妃爲孝康皇后祔享宗廟禮之正也否則不父其父而禰其祖天下豈有無父之人乎漢宣帝以昭帝之兄孫而嗣昭位因立悼皇考廟明孫鑛謂以孫繼祖不嫌爲考立廟是也此禮之權也而漢尹更始及王莽乃以皇考廟爲不當立則必將以孫禰祖而紊昭穆之序可乎至正統昭穆不缺而以旁支藩裔入繼大統者其祖仍當祀之於本國非唯不得祔享太廟并不得追尊其號也明世宗之祔興獻王於太廟也欲尊其父而陷其父以三罪以臣匹君一也以支庶亂大宗二也以藩王干天位三也不孝莫大於是矣桓王太子洩父子二十九世穆莊王三十世昭僖王三十一世穆惠王三十二世昭襄王三十三世穆頃王三十四世昭匡王三十五世穆定王匡王弟三十五世穆桓王爲平王孫同居穆位厯莊僖惠襄頃五王至匡王而世次復爲穆定王以弟而繼兄之位故匡定二王當同居一穆廟而異其室也簡王三十六世昭靈王三十七世穆景王三十八世昭案景王有太子晉壽蚤卒因立子猛壽之弟也晉壽雖爲太子而其弟嗣位則晉壽非正統相繼者矣故皆不當祔廟也子猛未終喪而卒其弟敬王立諡猛爲悼王以猛嘗立爲王當祔廟也其後敬王亦當與悼王同廟異室也悼王三十九世穆敬王四十世穆元王四十一世昭貞王四十二世穆貞王史記作定王世本作貞王皇甫謐帝王世紀作貞定王司馬貞索隱以爲周家不應有兩定王况世數非逺史記乃文偶誤皇甫謐彌縫兩用之未爲得也當以貞王爲正蘇氏古史從之爲允哀王四十二世昭思王四十二世昭考王四十二世昭貞王崩長子去疾立是爲哀王哀王立三月弟叔襲殺哀王而自立是爲思王思王立五月少弟嵬攻殺思王而自立是爲考王夫哀思皆嘗爲王當祔廟而思考攻殺其兄或未必以其兄之主祔廟然所以攻殺兄者不過利其國耳既奪其國而兄又死諡典虚名廟享虚位可以不吝故既爲立諡必祔廟可知如祔廟則哀思考當同廟而異室矣威烈王四十三世穆安王四十四世昭烈王四十五世穆顯王烈王弟四十五世穆烈顯二王兄弟相繼則其廟必同廟異室並祔同祧明矣慎靚王四十六世昭赧王四十七世穆周自后稷至於赧王凡四十七世皆父死子繼以爲常而際其變者五一則懿孝夷之交也二則平王洩父桓王之交也三則匡定之交也四則靈景悼敬之交也五則哀思考之交也余因考其世次而論定其昭穆如此則變而仍不失其常者也或疑兄弟同廟異室固可無疑以孫繼祖而祔其父於廟必太子未立而死者可也設太子有罪而廢者恐不可以罪人而祔廟也周禮冢人職死於兵者不入兆域王昭明謂刑戮之人惡其毁傷故也廟制宜亦當如是然則祖與孫同昭穆其中虚其一世不亦可使昭穆不紊乎曰是不然死於兵者不入兆域先王以是閑其臣子而不可以加於君父故魯昭公失國而死季氏葬之於墓道之南孔子溝而合諸墓況宗廟之制又非墓域比雖厲王之流彘幽王之被弑楚穆王弑父自立皆得祔廟蓋立廟而祭孝子順孫所以申其孝養之志也不以祖父之賢不肖而異也惟親盡廟毁始論其功德而立不祧之廟非所論於親廟也唯厯代帝王廟專以厯數相繼爲次序亦非所論於親廟也親莫親於父子乃以有罪不立而不使入廟可乎且父廢而子得立易所謂幹父之蠱有子考无咎者也子幹父蠱猶已之悔過遷善也悔過遷善不失爲全人子幹父蠱則考得无咎故禹幹父蠱而鯀可以配天蔡仲幹父蠱而叔度可爲始祖又何嫌祔於昭穆之廟乎哉昔蒯聵得罪出奔其子輒立而拒其入孔子以爲不仁及蒯聵入立仍諡爲莊公而祔廟君子不以爲非而諡輒爲孝公蓋罪者一時之過舉而可贖父子者千古之大倫而不可廢擯斥之權祖父得加之子孫而享祀之孝子孫當自盡於祖父者也惟爲人後者爲之子父不可二既以所後者爲父不得復以本生父爲父而僅得以伯叔稱之今既未嘗爲人後而有所後之父乃廢其父而不祀則是無父也人有無子者不聞有無父者無父者其必禽獸乎禽獸之行而可爲乎或疑不祔廟而别立廟以祀之可乎曰禮無别立廟之文昭穆之廟皆親廟也既爲吾父惡得不入親廟然則虞舜嗣堯之位當祀堯爲禰乎曰禮同宗則可爲之後異姓不相爲後使舜與堯爲同宗當以堯爲禰而封其弟象以奉瞍祀無弟則立瞍同宗之子爲後亦封之使奉瞍祀今舜既與堯異姓故祀堯於功德之廟謂之神宗而自立高曾祖禰四親廟祀瞍以上孔子所謂宗廟饗之者此也孟子言孝子之至莫大乎尊親而以天下養生而爲天子父以天下養没則以爲禰而祭之所謂追養繼孝者也曰後世如周世宗爲郭氏養子則何如曰養異姓爲子非禮也然其生也既撫育之爲子嚴事之爲父没而禰之所謂事死如事生者也似不得以異姓不相爲後之禮繩之矣酌乎人情以變而通之同宗爲後之禮可也蕙田案蔡氏推廣萬氏之說曲鬯旁通殆無剰義由是宗廟不易之制古今事勢之變經可守而權可達矣惟天子七廟引家語云自虞至周所不變又謂舜宗堯爲功德廟而自立四親廟不知所云七廟者指堯以上之祖乎抑瞽瞍以上乎所謂功德廟者將合親廟爲一局乎抑分爲兩事乎合之則宗在堯而祖在瞍無此兩岐之理分之則宗堯一廟而祀瞍四廟不合七廟之文此尚未深考也觀承案昭穆之說自漢以來紛然聚訟至朱子而始有定論然是乃父子相繼之常經若有兄弟相及或以伯叔繼統則昭穆紊矣萬充宗据張子之說謂兄弟當同廟而異室而叔則祔於所繼之考廟始有以通其變而仍不紊其常蔡德晉因之更爲推廣焉亦云詳已雖然禮莫大於宗廟蓋一舉而尊尊親親賢賢貴貴之義無不盡固未可以一端論也夫廟制太祖居上而昭穆分列者所以尊尊也三昭三穆以次遞遷而不容少減者所以親親也而又有祖有功宗有德祀帝配天百世不遷之廟則所以賢賢也諸侯不得祖天子有以藩侯入承正統者亦不得顧私親而祔廟又所以貴貴也今於尊尊親親之禮可以無憾矣而賢賢貴貴之道似尚未盡何也夫所謂祖有功宗有德者必其功德在人炳然難掩則没身而後定諡稱宗已衆著其爲百世不遷之主矣而說者論周之文武一似隨例祔廟茫不知其爲宗者直至懿孝之世當遷始覺其不可而爲之立廟則聖人之垂典則以遺後人者不已疎乎夫周公制禮於文王既没特宗祀於明堂以配上帝東都甫建又特立文武二廟而不及其餘則百世不遷當時已有定制必不以世室大典委諸六七世後不可預知之子孫也決矣殷武之詩亦然蓋高宗没而即立廟必不遲之又久至武乙時也漢書使顧成之廟稱爲太宗是文帝在時且有此論若武帝則原有不滿人意處故數世之後尚煩集議爾觀此乃知說者多事後懸揣之詞而未合於當日之情形也若夫太子無後而立其弟則不得祔廟當如伯邑考太子有後而其子立不妨追尊祔廟如周之洩父明之懿文此固例之可援者也顧其說曰太子本宜爲君故可稱宗入廟則彼無後而令終之太子豈不宜爲君者耶又謂天下無無父之人則彼同宗之入繼者獨可爲無父之人耶是不知君命立其弟則兄弟不相爲後故不可祔若立其子則祖孫不可異昭穆故不得不祔也與夫旁枝入繼非一脈相承者固不可同年而語矣至若得罪於父而廢斥以死者而其子或得立竟可追崇而祔廟則有所未安焉夫天下無無父之人亦無無祖之人毋出而與廟絶則子雖繼位而不可以欺死父然則獨可以死父而欺其王父乎非所謂不以父命辭王父命也說者謂子爲天子則已能幹蠱而父罪可贖然繼世而立乃承襲之常而未可遂謂之幹蠱也幹蠱如周宣之中興而不敢改其父之諡也禹之配鯀於郊則鯀但斥於君而未嘗絶於宗也或更例之孔子溝昭公之葬而合諸墓然昭公乃君逐於臣而非父之逐其子也是所未安於心者也雖然苟不祔則將與王父異昭穆是正所謂不父其父而禰其祖者而昭穆之次不乃大亂乎此所以不得已而爲之辭也然而其意是也其説非也當曰父子天性無終絶既生而斥之使不爲君則已足以蔽其辜矣初未嘗没而并欲絶其後也今而其子既立則子固不可以無父而孫亦不可以禰祖然則追王祔廟固亦義之可安而爲王父在天之靈所許者歟夫如是則於賢賢貴貴之義固两無所妨而其所以尊尊而親親者亦益以篤厚而不替也已右廟祧昭穆五禮通考巻五十九
