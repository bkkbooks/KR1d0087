body:
  text: 五禮通卷卷一百七十一刑部尚書秦蕙田撰嘉禮四十四學禮漢書武帝紀孝武初立卓然罷黜百家表章六經興太學三輔黄圖太學在長安西北七里有市有獄董仲舒傳仲舒對策曰養士之大者莫大乎太學太學者賢士之所関也教化之本原也臣願天子興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣後武帝立學校之官皆仲舒發之儒林傳公孫𢎞為學官悼道之鬰滯廼請白丞相御史言制曰蓋聞導民以禮風之以樂婚姻者居室之大倫也今禮廢樂崩朕甚愍焉故詳延天下方聞之士咸登諸朝其令禮官勸學講義洽聞舉遺興禮以為天下先太常議與博士弟子崇鄉里之化以厲賢材焉謹與太常臧博士平等議曰聞三代之道鄉里有教夏曰校殷曰庠周曰序其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始繇内及外今陛下昭至徳開大明配天地本人倫勸學興禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者常與計偕詣太常得受業如弟子一嵗皆輒課能通一藝以上補文學掌故缺其髙第可以為郎中太常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一藝輒罷之而請諸能稱者臣謹案詔書律令下者明天人分際通古今之誼文章爾雅訓辭深厚恩施甚美小吏淺聞弗能究宣亡以明布諭下以治禮掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一藝以上補左右内史大行卒史比百石以下補郡太守卒史皆各二人邊郡一人先用誦多者不足擇掌故以補中二千石屬文學掌故補郡屬備員請著功令它如律令制曰可自此以來公卿大夫士吏彬彬多文學之士矣蕙田案武帝紀事在元朔五年馬端臨云前此博士雖各以經授徒而無考察試用之法至是官始為置弟子員所謂興太學也昭帝時増博士弟子員滿百人宣帝末増倍之元帝好儒能通一經者皆復數年以用度不足更為設員千人成帝末或言孔子布衣養徒三千人今天子太學弟子少於是増弟子員三千人嵗餘復如故平帝時王莽秉政増元士之子得授業如弟子勿以為員嵗課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故云班氏固曰自武帝立五經博士開弟子員設科射策勸以官禄訖於元始百有餘年𫝊業者寖盛枝葉蕃滋一經説至百餘萬言大師衆至千餘人蓋祿利之路然也馬氏廷鸞曰西漢博士𨽻太常有周成均𨽻宗伯之辟意州有博士郡有文學椽五經之師儒官之官長吏置布列郡國亦有黨庠遂序之意然有二失鄉里學校人不升於大學而補弟子買者自一項人公卿弟子不養于太學而任子盡𨽻光禄勲自有四科考試殊塗異方下之心術分裂不一上之考察馳鶩不精右西漢國學後漢書儒林傳光武中興先訪儒雅四方學士雲㑹京師於是立五經博士各以其家法教授凡十四博士太常差次總領焉建武五年乃修起太學稽式古典籩豆干戚之容備之於列服方領習矩歩者委它乎其中陸機雒陽記太學在雒陽城故開陽門外去宮八里講堂長十丈廣三丈中元二年初建三雍漢官儀辟雍去明堂三百歩車駕臨辟雍從北門入三月九月皆於中行鄉射禮辟雍以水周其外以節觀者蕙田案漢書河間獻王來朝對三雍宮注以三雍為明堂辟雍靈臺兒寛亦云陛下發憤祖立明堂辟雍則西京已有之馬氏端臨曰東漢時辟雍為天子養老大射行禮之所太學為博士弟子受業之所析為二處與古異夫太學辟雍固不可析為二處養老大射傳道受業又豈可分為二事哉明帝本紀永平九年為四姓小侯開立學校置五經師順帝本紀永建六年九月繕起太學翟酺傳酺上言孝文皇帝始置一經博士武帝大合天下之書而考宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍内外講堂諸生横巷為海内所集明帝時辟廱始成欲毁太學太尉趙熹以為太學辟廱皆宜兼存故並傳至今而頃者頽廢至為園採芻牧之處宜更修繕誘進後學帝從之學者為酺立碑銘於學儒林傳安帝覽政薄於藝文博士倚席不講學舍頽敝鞠為園蔬牧兒蕘豎至於薪刈其下順帝感翟酺之言乃更修黌宇凡所造構二百四十房千八百五十室試明弟子増甲乙之科員各十人順帝本紀陽嘉元年七月以太學新成試明經下第者補弟子増甲乙科員各十人除郡國耆儒九十人補郎舍人左雄傳雄又奏召海内名儒為博士使公卿子弟為諸生有志操者加其俸禄及決南謝亷河南趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師質帝本紀本初元年四月令郡國舉明經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業嵗滿課試以髙第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法其髙第者上名牒以次賞進儒林傳本初元年梁太后詔曰大將軍下至六百石悉遣子就學每嵗輒於鄉射月一饗㑹之以此為常自是遊學増盛至三萬餘生然章句漸踈而多以浮華相尚儒者之風蓋衰矣續漢書五行志桓帝延熹五年太學門無故自壊襄楷以為太學前疑所居其門自壊文徳將喪教化廢也後漢書黨錮傳桓帝時太學諸生三萬餘人郭林宗賈偉節為之冠與李膺陳蕃王暢更相褒重自公卿以下莫不畏其貶議屣履到門牢修乃上書誣告膺等養太學遊士交結諸郡生徒更相驅馳共為朋黨誹訕朝廷疑亂風俗天子震怒命郡國捕黨人收執膺等辭所連及陳寔之徒二百餘人文獻通考建和初詔諸學生年十六以上比郡國明經試次第上名髙第十五人上第十六人為郎中第十七人為太子舍人下第十七人為王家郎永夀二年詔復課試諸生補郎舍人其後復制學生滿二嵗試通二經者補文學掌故其不能通二經者須後試復隨輩試之通二經者亦得為文學掌故其已為文學掌故者滿二嵗試能通三經者擢其髙第為太子舍人其不得第者後試復隨輩試第後髙者亦得為太子舍人已為太子舍人滿二嵗試能通四經者推其髙第為郎中其不得第者後試復隨輩試第復髙者亦得為郎中滿二嵗試能通五經者推其髙第補吏隨才而用其不得第者後試復隨輩試第後髙者亦得補吏靈帝熹平五年試太學生年六十以上百餘人除郎中太子舍人至王家郎郡國文學吏後漢書靈帝本紀光和元年二月始置鴻都門學生注鴻都門名也於内置學蔡邕傳初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經術相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈䕶多引無行趣執之徒並待制鴻都門下喜陳方俗閭里小事帝甚悦之待以不次之位邕上封事曰古者取士必使諸侯嵗貢孝武之世郡舉孝廉又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以游意當代博奕非以教化取士之本而諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虗冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉禄於義已宏不可復使理人及仕州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子故當志其大者光和元年遂置鴻都門學畫孔子及七十二弟子象其諸生皆勅州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者士君子皆恥與為列焉馬氏廷鸞曰鴻都門漢宫門也太子保之廢來歴與九卿朝臣俱詣鴻都門證太子無過即其所也太學公學也鴻都學私學也學乃天下公而以為人主私可乎是以士君子之欲與為列者則以為恥公卿州郡之舉辟也必勅書強之人心之公豈可誣也馬氏端臨曰靈帝之鴻都門學即西都孝武時待詔金馬門之比也然武帝時雖文學如司馬遷相如枚皋東方朔輩亦俱以俳優畜之固未嘗任以要職而靈帝時鴻都門學之士至有封侯賜爵者士君子皆恥與為列則其人品可知然當太學諸生三萬餘人其持危言覈論以激濁揚清自負者誅戮禁錮殆靡孑遺而其在學授業者至争第更相告訟無復亷恥且當時在仕路者上自公卿下至孝亷茂才皆西園諧價獻修宫錢之人矣於鴻都學士乎何誅獻帝本紀初平四年九月試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離本土營求糧資不得事業結童入學白首空歸長委農野永絶榮望朕甚憫焉其依科罷者聽為太子舍人右後漢國學魏志文帝紀黄初五年四月立太學制五經課試之法魚豢魏畧黄初元年之後新主乃掃除太學之灰炭補舊石碑之缺壊備學士之員録依漢甲乙以考課申告州郡有欲學者皆遣詣太學太學始開有弟子數百人至太和中中外多事人懐避就雖性非解學多求詣太學太學諸生有千數而諸博士率皆麤踈無以教弟子弟子本亦避役竟無能習學冬來春去嵗嵗如是魏志劉馥傳馥子靖上疏陳儒訓之本曰自黄初以來崇立太學二十餘年而寡有成者蓋由博士選輕諸生避役髙門弟子恥非其倫故夫學者雖有其名而無其人雖設其教而無其功宜髙選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制絀陟榮辱之路其經眀行修者則進之以崇徳荒教廢業者則退之以懲惡舉善而教不能則勸浮華交遊不禁自息矣蕙田案宋書禮志以為馥所上疏與三國志不同考馥以建安十三年卒而此疏乃在齊王正始中則宋志誤也文獻通考亦承其誤宋書禮志孫休永安元年詔置學官立五經博士覈取應選加其寵䘵科見史之中及將吏子弟有志好者各令就業一嵗課試差其品第加以位賞右三國國學宋書禮志晉武帝太始八年有司奏太學生七千餘人才任四品聽留詔已試經者留之其餘遣還郡國大臣子弟堪受教者令入學咸寧二年起國子學蓋周禮國之貴游子弟所謂國子受教於師氏者也晉書職官志咸寧四年武帝初立國子學定置國子祭酒博士各一人助教十五人以教生徒博士皆取履行清淳通明典義者若散騎常侍中書侍郎太子中庶子以上乃得召試蕙田案國子學之名始於此東漢立五經博士十四人以聰明有威重者一人為祭酒祭酒者衆所尊之稱陳元為司空南閤祭酒則公府亦有祭酒矣晉時公府掾屬設東閤祭酒西閤祭酒軍諮祭酒而國子學亦設之唐以後惟國子監有祭酒而諸曹並不設是官矣晉立國子學宋志在咸寧二年晉志在四年必有一誤宋書禮志太康五年修作明堂辟廱靈臺文獻通考成帝咸康三年國子祭酒袁瓌太常馮懷以江左浸安請興學校帝從之乃立太學徴生徒而士大夫習尚老莊儒術終不振宋書禮志孝武太元初於中堂立行太學於時無復國子生置太學生六十人國子生權銓大臣子孫六十人事訖罷太元九年尚書謝石請興復國學以訓胄子頒下州郡普修鄉校烈宗納其言其年選公卿二千石子弟為生増造廟房屋百五十五間而品課無章君子恥與其列國子祭酒殷茂言臣聞舊制國學生皆冠族華胄比列皇儲而中者混雜蘭艾遂令人情恥之詔褒納竟不施行右晉國學宋書禮志宋髙祖受命詔有司立學未就而崩太祖元嘉二十年復立國子學二十七年廢通鑑帝雅好藝文使丹陽尹廬江何尚之立元學太子率更令何承天立史學司徒叅軍謝元立文學散騎常侍雷次宗立儒學為四學司馬氏光曰君子多識前言往行以畜其徳孔子曰辭達而已矣然則史者儒之一端文者儒之餘事至於老莊虚無固非所以為教也夫學者所以求道天下無二道安有四學哉南齊書禮志建元四年正月詔立國學置學生百五十人其有位樂入者五十人生年十五以上二十以還取王公已下子孫悉取家去都二千里為限太祖崩乃止張緒傳初立國學以緒為太常卿領國子祭酒馬氏廷鸞曰齊髙即位之初求直言崔祖思以為人不學則不知道此逆亂之所由生宜開文武二學使人依方習業優殊者待以不次此國學之所以置歟張緒見謂風流在清簡寡欲之目以為有正始之風善清言而已師道不止於清言然當時以為極選矣是春置學秋以國哀罷曽不及嵗江左之學校如此禮志永明三年正月詔立學創立堂宇召公卿子弟下及員外郎之嗣凡置生二百二十人其年秋中悉集王儉傳永明三年領國子祭酒省總明觀於儉宅開學士館悉以四部書充儉家詔儉以家為府十日一還學監試諸生巾卷在庭劍衞令史儀容甚盛禮志建武四年正月詔立學永泰元年東昏侯即位尚書符依永明舊事廢學領國子助教曹思文上表曰今制書始下而廢學先聞將恐觀國之光者有以擬議也若以國諱宜廢昔漢成立學爰洎元始百餘年中未嘗暫廢其間有國諱也且晉武之崩其學猶存斯皆先代不以國諱而廢學之明文也永明以無太子故廢斯非古典今之國學即古之太學天子入國學以行禮也太子入國學以齒讓也太學之與國學斯是晉世殊其士庶異其貴賤耳然貴賤士庶皆湏教成故國學太學兩存之也非有太子故立也今學非惟不宜廢而已乃宜更崇向其道使郡縣有學鄉閭立教請付尚書及二學詳議有司奏從之學竟不立隋書百官志梁國學有祭酒一人博士二人助教十人太學博士八人天監四年置五經博士各一人舊國子學生限以貴賤帝欲招來後進五館生皆引寒門雋才不限人數胡氏寅曰史稱武帝雅好儒術至是置五經博士開館宇招後進四館所養士踰千人射策通明者除吏又修孔子廟以示尊師他日又幸國子監親臨講肄且令皇太子及王侯之子年可從師者皆入學可謂勤矣然儒風不振人才不出何也帝心尚佛自天監改元即不肉食此躬行也故特以美行興學養士故人不從其令而從其意意乃身率令乃文具其後綱維不立人紀胥廢國破身隕為萬世笑蓋始於此人主心術所尚可不慎哉陳書儒林傳髙祖創業日不暇給弗遑勸課世祖以降稍置學官雖博延生徒成業葢寡魏書儒林傳太祖初定中原始建都邑立太學置五經博士生員千有餘人天興二年増國子太學生員至三千太宗時改國子為中書學立教授博士世祖始光三年春别立太學於城東髙祖太和中改中書學為國子學建明堂辟廱又開皇子之學及遷都洛陽立國子太學四門小學蕙田案四門小學始於此世宗時復詔營國學樹小學於四門大選儒生以為小學博士員四十人雖黌宇未立而經術彌顯時天下承平學業大盛故燕齊趙魏之間横經著録不可勝數大者千餘人小者猶數百正光二年始置國子生三十六人隋書百官志後齊國子等掌訓教胄子祭酒一人領博士五人助教十人學生七十二人太學博士十人助教二十人太學生二百人四門學博士二十人助教二十人學生三百人北齊書儒林傳齊氏太學博士徒有虚名唯國子一學生徒數十人耳胄子以通經進仕者唯博陵崔子發廣平宋游卿而已周書武帝紀天和元年七月詔諸胄子入學但束脩於師不勞釋奠釋奠者學成之祭自今永以為式右南北朝國學隋書百官志隋國子寺祭酒一人統國子太學四門書算學各置博士國子太學四門各五人書算各二人助教國子太學四門各五人書算各二人學生國子一百四十人太學四門各三百六十人書四十人算八十人蕙田案國子寺不𨽻太常自隋始仁夀元年罷國子學唯立太學一所置博士五人學生七十二人髙祖本紀仁夀元年六月詔國子學惟留學生七十人太學四門及州縣學並廢七月改國子為太學儒林傳開皇二十年廢國子四門及州縣學惟置太學博士二人學生二十七人劉炫上表言學校不宜廢情理甚切髙祖不納蕙田案本紀及百官志俱云仁夀元年此𫝊稱開皇二十年疑誤百官志煬帝即位國子監依舊置祭酒加置司業一人丞三人國子學置博士助教各一人學生無常員太學博士助教各二人學生五百人蕙田案國子學置司業始於此右隋國學唐書選舉志唐制凡學六皆𨽻於國子監國子學生三百人以文武三品以上子孫若從二品以上曽孫及勲官二品縣公京官四品帶三品勲封之子為之太學生五百人以五品以上子孫職事官五品朞親若三品曽孫及勲官三品以上有封之子為之四門學生千三百人其五百人以勲官三品以上無封四品有封及文武七品以上子為之八百人以庶人之俊異者為之律學生五十人書學生三十人算學生三十人以八品以下子及庶人之通其學者為之國子監生尚書省補祭酒統焉凡館二門下省有𢎞文館生三十人東宫有崇文館生二十人以皇緦麻以上親皇太后皇后大功以上親宰相及散官一品功臣身食實封者京官職事從三品中書黄門侍郎之子為之凡博士助教分經授諸生未終經者無易業凡生限年十四以上十九以下律學十八以上二十五以下凡禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公羊傳榖梁傳為小經通二經者大經小經各一若中經二通三經者大經中經小經各一通五經者大經皆通餘經各一孝經論語皆兼通之凡治孝經論語共限一嵗尚書公羊傳榖梁傳各一嵗半易詩周禮儀禮各二嵗禮記左氏傳各三嵗學書日紙一幅閒習時務策讀國語説文字林三蒼爾雅旬給假一日前假博士考試讀者千言試一帖帖三言講者二千言問大義一條總三條通二為第不及者有罰嵗終通一年之業口問大義十條通八為上六為中五為下併三下與在學九嵗不堪貢者罷歸諸學生通二經俊士通三經已及第而願留者四門學生補太學太學生補國子學每嵗五月有田假九月有授衣假二百里外給程其不帥教及嵗中違程滿三十日事故百日縁親病二百日皆罷歸既罷條其狀下之屬所五品以上子孫送兵部准䕃配色髙祖即位詔秘書外省别立小學以教宗室子孫及功臣子弟太宗即位於門下别置𢎞文館東宮置崇文館増創學舍至千二百區雖七營飛騎亦置生遣博士為授經四夷若髙麗百濟新羅髙昌吐蕃相繼遣弟子入學遂至八千餘人髙宗龍朔二年東都置國子監明年以書學𨽻蘭臺算學𨽻秘閣律學𨽻詳刑上元二年國子監置大成二十人取已及第而聰明者為之試書日誦千言并日試䇿所業十通七然後補其禄俸同直官通四經業成上於尚書吏部試之登第加一階放選其不第則習業如初三嵗而又試三試而不中第從常調文獻通考中宗神龍二年勅學生在學各以長幼為序初入學皆行束脩之禮禮於師國子太學各絹三匹四門學絹二匹俊士及律書算學州縣各絹一匹皆有酒脯其束脩三分入博士二分助教又每言國子監所管學生國子監試州縣學生當州試並選藝業優長者為試官監試洪氏容齋隨筆唐六典國子生初入置束帛一篚酒一壺脩一案為束脩之禮太學四門侓學書學算學皆如國子之法其習經有暇者命習𨽻書并國語説文字林三蒼爾雅每旬前一日則試其所習業乃知唐世士人多工書蓋在六館時以為常習其説文字林蒼雅諸書亦欲責以結字合於古義不特銓選之時方取楷書遒美者也束脩之禮乃於此見之開元禮載皇子束脩束帛一篚五匹酒一壺二十脩一案三脡皇子服學生之服至學門外陳三物於西南少進日某方受業於先生敢請見執篚者以篚授皇子皇子跪奠篚再拜博士答再拜皇子還避遂進跪取篚博士受幣皇子拜訖乃出其儀如此州縣學生亦然唐書選舉志中宗即位詔宗室三等以下五等以上未出身願宿衞及任國子生聽之其學業成而堪貴者宗正寺試送監舉如常法三衞番下日願入學者聽附國子學太學及律館習業蕃王及可汗子孫願入學者附國子學讀書蕙田案附學生之名始於此開元七年令𢎞文崇文國子生季一朝㕘又勅州縣學生年二十五以下八品子若庶人二十一以下通一經及未通經而聰悟有文詞史學者入四門學為俊士即諸州貢舉省試不第願入學者聽天寳十二載勅天下罷鄉貢舉人不由國子及郡縣學者勿舉選十四載復鄉貢代宗廣徳二年詔曰古者設太學教胄子雖年榖不登兵革或動而爼豆之事不廢頃年戎車屢駕諸生輟講宜追學生在館習業度支給厨米歸崇敬傳大歴初授國子司業皇太子欲臨國學行齒胄禮崇敬以學與官名皆不正乃建議古天子學曰辟廱以制言之壅水環繚如璧然以誼言之以禮樂明和天下云爾在禮為澤宮故前世或曰璧池或曰璧沼亦言學省漢光武立明堂辟廱靈臺號三廱宮晉武帝臨辟廱行鄉飲酒禮别立國子學以殊士庶永嘉南遷惟有國子學隋大業中更名國子監今聲名之盛辟廱獨闕請以國子監為辟廱省祭酒司業之名非學官所宜業者栒簴大板今學不教樂於義無當請以祭酒為太師氏位三品司業為左師右師位四品近世明經不課其義先取帖經顓門廢業傳授義絶請以禮記左氏春秋為大經周官儀禮毛詩為中經尚書周易為小經各置博士一員公羊榖梁春秋共准一中經通置博士一員博士兼通孝經論語依章疏講解徳行淳潔文詞雅正形容莊重可為師表者委四品以上各舉所知在外給傳七十者安車蒲輪敦遣國子太學四門三館各立五經博士品秩生徒有差舊博士助教直講經直律館算館助教請皆罷教授法學生謁師贄用腵脩一束酒一壺衫布一裁色如師所服師出中門延入與坐割脩􅆽酒三爵止乃發篋出經摳衣前請師為説經大畧然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬省月試時考嵗貢眡生徒及第多少為博士考課上下有不率教者檟楚之國子移禮部為太學生太學又不變徙之四門四門不變徙本州之學復不變繇役如初終身不齒雖率教九年學不成者亦歸之本州禮部考試法請罷帖經於所習經問大義二十而得十八論語孝經十得八為通策三道以本經對通二為及第其孝行聞鄉里者舉解具言試日義闕一二許兼收焉天下鄉貢如之習業考試並以明經為名得第授官與進士同有詔尚書省集百官議皆以習俗乆制度難分明省禁非外司所宜名周官世職者稱氏國學非世官不得名辟廱省大師氏大抵憚改作故無施行者選舉志元和二年置東都監生一百員自天寳後學校益廢生徒流散永泰中雖置西監生而館無定員於是始定生員西京國子館生八十人太學七十人四門三百人廣文六十人律館二十人書算館各十人東都國子館十人太學十五人四門五十人廣文十人律館十人書館三人算館二人韓氏愈請復國子監生徒疏國家典章崇重庠序近日趨競未復本原至使公卿子弟恥遊太學工商凡冗或取上庠今聖道大明儒風復振恐須革正以贊鴻猷今請國子館並依六典其太學館量許取無資䕃有才業人充如有資䕃不補學生應舉者請禮部不在收試限請牒送法司科罪縁今年舉期已近伏請去上都五百里内特賜非時收補其五百里外且任鄉貢至來年春一時收補其厨糧度支先給二百七十四人請准新補人數量加支給又論新注學官牒准今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資叙不考藝能至令生徒不自勸勵伏請非專通經傳博涉墳史及進士五經諸色登科人不以比擬其新授官上日必加研試然後放上以副聖朝崇儒尚學之意文獻通考文宗太和七年赦節文應公卿士族子弟取來年正月已後不先入國學習業者不在應明經進士之限武帝㑹昌五年制公卿百官子弟及京畿内士人寄客修明經進士業者並𨽻名太學外州寄土人並𨽻名所在官學右唐國學文獻通考後唐天成三年正月中書門下奏伏以祭酒之資歴朝所貴爰從近代不重此官况屬聖朝方勤庶政湏𢎞雅道以振時風望令宰相臣一員兼判國子祭酒勅宜令宰臣崔協兼判其年八月十一日宰臣兼判國子祭酒崔協奏請國子每年祗置監生二百員候解送至十月三十日滿數為定太學書生不得因此便取公牒輒免本户差役又每年於二百人數内不繫時節有投名者先令學官考試校其學業深淺方議收補姓名勅宜依五年正月五日國子監奏當監舊例初補監生有束脩錢二千及第後光學錢一千竊縁當監諸色舉人及第後多不於監司出給光學文抄及不納光學錢祗守選限年滿便赴南曹㕘選南曹近年磨勘選人並不收豎監司光學文抄為憑請自今後欲准往例應色舉人及第後並先於監司出給光學文抄并納光學錢等各自所業等第以備當監逐年公使奉勅宜准往例自今後凡補監生湏令情願於監中修學則得給牒收補仍據所業次第逐季考試申奏如收補年深未聞藝業虚沾補牒不赴試期亦委監司具姓名申奏馬氏端臨曰五代弊法凡官府公使錢多令居官者自出其費宰相則有光省錢御史則有光臺錢至於監生亦令其出光學錢則貧士何所從出既徴其錢復不蠲其役待士之意亦太薄矣然史所言多有曽授業輒取解送者往往亂離之際其居學亦得苟賤冒濫之士耳右後唐國學宋史選舉志凡學皆𨽻國子監國子生以京朝七品以上子孫為之初無定員後以二百人為額太學生以八品以下子弟若庶人之俊異者為之初國子監因周舊制頗増學舍以應䕃子孫𨽻學受業開寳八年國子監上言生徒舊數七十人奉詔分習五經然繫籍者或久不至而在京進士諸科常赴講席肄業請以補監生之闕上從之景徳間許文武升朝官嫡親附國學取解而逺鄉乆寓京師其文藝可稱有本鄉命官保任監官騐之亦聽附學充貢慶歴四年天章閣侍講王洙言國子監每科場詔下許品官子弟投狀試藝給牒充廣文太學律學三館學生多致千餘就試試已則生徒散歸講官倚席但為游寓之所殊無肄習之法居常聽講者一二十人爾迺限在學滿五百日舊已嘗充貢者止百日本授官㑹其實京朝官保任始預秋試每十人與解凡入學授業月旦即親書到歴如遇私故或疾告歸寧皆給假違程及期月不來㕘者去其籍後諌官余靖極言非便遂罷聽讀日限馬氏端臨曰古人所謂中年考校九年大成者進徳修業之事也至漢人之補博士弟子員則止限以通一經而後授之官唐人之法尚彷彿如此至宋熙豊後立三舍之法則不過試之以浮靡之文而誘之以利禄之塗然明經而必至於通一藝試文而必至於歴三舍皆非旦暮可就故國家雖未嘗嚴其法制稽其去㽞而為士者内恥於習業之未精外誘於榮華之可慕其坐學之日自不容不乆今慶歴之法所謂習業者雖有講肄聽讀而未嘗限以通經之嵗月所謂榮塗者止於㧞解赴省而未有優異之捷徑所以科場罷日則生徒散歸雖限以日月而不能强其乆㽞反以淹滯為困故不乆而遂廢也蕙田案文獻通考王洙上言在慶歴二年余靖言在四年宋史併為一年事誤文獻通考皇祐末以胡瑗為國子監講書專管勾太學數年進天章閣侍講猶兼學正其初人未信服謗議蜂起瑗不顧强力不倦以卒有立瑗在學時每公私試罷掌儀率諸生㑹於首善令雅樂歌詩一夜乃散諸齋亦自歌詩奏琴瑟之聲徹於外瑗在湖學教法最備始建太學有司請下湖學取瑗之法以為太學法至今為著令神宗熙寧元年増太學生員慶歴中嘗置上舍生二百人至是又増置一百尋詔以九百人為額宋史選舉志熙寧四年盡以錫慶院及朝集院西廡建講書堂四諸生齋舍掌事者直廬始僅足用自主判官外增置直講為十員率一員共講一經令中書遴選或主判官奏舉生員釐為三等始入學為外舍初不限員後定額七百人外舍升内舍員二百内舍升上舍員百各執一經從所講官受學月考試其業優等上之中書其正録學諭以上舍生為之經各二員學行卓異者主判直講復薦之中書奏除官八年頒王安石書詩周禮義於學官是名三經新義蕙田案神宗立三舍法專以學校取士其意非不善顧乃棄漢唐專門注疏之學而以安石新説頒之學官遂使學者厭故而喜新是今而非古欲以一道徳成風俗豈不難乎文獻通考元豐二年頒學令大學置八十齋齋各五楹容三十人外舍生二千人内舍生三百人上舍生百人月一私試嵗一公試補内舍生間嵗一舍試補上舍生彌封謄録如貢舉法而上舍試則學官不預考校公試外舍生入第一第二等㕘以所書行藝與籍者升内舍内舍試入優平二等㕘以行藝升上舍上舍分三等俱優為上一優一平為中俱平若一優一否為下上等命以官中等免禮部試下等免解學正増為五人學録増為十人學録㕘以學生為之嵗賜緡錢至二萬五千又益郡縣田租屋課息錢之類以為學費學制所言國子監以國子名而實未嘗教養國子乃詔許清要官親戚入監為國子生聽讀額二百人仍盡以開封府解額歸太學其國子生解額以太學分數取之毋過四十人哲宗元祐七年置廣文館解額先是開封解額稍優四方士子多冒畿縣户以試又有𨽻太學不及一年不該解試者亦往往冒户禮部按舊制凡試國子監者先補中廣文館生乃得以牒求試遂依倣其法立廣文館生二千四百員除開封府元解百人則許自試其嘗撥取諸科二百國子額四十通二百四十人今皆以為本館解額遇科場年試補館生中者執牒詣國子監騐試凡試者十人取一開封考取亦如其數試者不及千人即以率減取仍嚴禁重試紹聖元年國子監奏罷廣文館發解其額本取之開封府諸科及國子悉復還之凡學生自外路㕘假及新補中未該撥填入學者權附國子監别號試取一次蕙田案宋時士子冒畿縣户應試猶今之冒順天府籍入場也元祐置廣文館生以待四方游士試京師者額二千四百人其解額則二百四人所謂十人取一也如是既無冒户之弊而四方士子在京者仍得升進之路似亦可行也宋史選舉志元祐新令罷推恩之制紹聖初監察御史郭知章言先帝立三舍法以嵗月稽其行實故入上舍而中上等者得不經禮部試特命以官責偹而持乆故其得也難誘掖激勸莫善於此宜復元豐法以廣樂育之徳又請三學補外舍生依元豐令一嵗四試於是詔太學生悉用元豐制推恩上等即注官者嵗毋過二人免禮部試者每舉五人而止免解試者二十人而止仍計數對除省試發解額其元祐法勿用諸三舍升補等法悉推行舊制崇寧三年詔取士悉由學校升貢其州郡發解及試禮部並罷自是嵗試上舍悉差知舉如禮部試五年著令太學試上舍生本慮與科舉相并試以間嵗今既罷科舉又諸州嵗貢士其改用嵗試每春季太學辟廱生悉公試同院混取總五百七十四人以四十七人為上等即推恩釋褐一百四十人為中等遇親策士許入試一百八十七人為下等補内舍生凡上等上舍生暨特舉孝弟行能之士不待廷試推恩者許即引見釋褐上舍仍先以試文卷進入得可乃引賜若上舍己該釋褐恩而貢入在廷試前一年者須在學又及半年不犯上二等罰乃得注官徽宗本紀重和元年詔太學辟雍各置内經道徳經莊子列子博士二員選舉志宣和三年詔罷天下州縣學三舍法惟太學用之課試開封府及諸路並以科舉取士七年詔政和中嘗命學校分治黄老莊列之書實失專經之㫖其内經等書並罷治建炎初即行在置國子監立博士二員以隨幸之士三十六人為監生紹興十三年始建太學置祭酒司業各一員博士三員正録各一員養士七百人上舍生三十員内舍生百員外舍生五百七十員凡諸道住本州學滿一年三試中選不犯第三等以上罰或不住學而曽兩預釋奠及齒於鄉飲酒者聽充弟子員每嵗春秋兩試之旋命一嵗一補於是多士雲集至分場試之俄又詔三年一試増至千員中選者皆給綾紙贊詞以寵之每科場四取其一自外舍有月校而公試入等曰内舍自内舍有月校而舍試入等曰上舍凡升上舍者皆直赴廷對二十七年立定制春季放補遇省試年改用孟夏舊太學遇覃恩無免解法孝宗始剏行之在朝清要官期親許牒子弟作待補國子别號考校如太學生遇有期親任清要官更為國子生不預校定升補及差職事惟得赴公私試科舉則混試焉自中興以來四方之士有本貫在學公據皆得就補帝始加限節命諸路州軍以解試終場人數為凖其薦貢不盡者令百取六人赴太學謂之待補生其住本學及游學之類一切禁止元豐舊制内舍生校定分優平二等優等再赴舍試又入優則謂之兩優釋褐中選者即命以京秩除學官至是始令先注職官代還注職事官恩例視進士第二人舊校定嵗額六分為優選者増為十分矣寧宗慶元嘉定中始兩行混補於是増外舍生為千四百員内舍校定不係上舍試年分以八分為優等又以國子生員多偽濫命行在職事官期親釐務官子孫乃得試補嘉定十四年詔自今待補百人取三人舊法自外舍升内舍雖有校試必公試合格乃許升補盖私試皆學官自考而公試則降勅差官至是嵗終許取外舍生校最優者一人升内舍度宗咸淳三年正月幸太學謁先聖禮成推恩三學前廊與免省試内舍及已免省試者與升甲起居學生與泛免一次内該曽經兩幸人與補上州文學如願在學者聽其在籍諸生地逺不及趁赴起居者三學申請乞併行泛免一次命特從之凡諸生升舍在幸學之前者方許陳乞恩例七年正月以夀和聖福皇太后兩上尊號推恩三學在齋生員並特與免解赴省一次朱子學校貢舉私議學校必選實有道徳之人使為學官以來實學之士裁減解額舍選謬濫之恩以塞利誘之塗蓋古之太學主於教人而因以取士故士之來者為義而不為利且以本朝之事言之如李廌所記元祐侍講呂希哲之言曰仁宗之時太學之法寛簡國子先生必求天下賢士真可為人師者就其中又擇其尤賢者如胡翼之之徒使專教導規矩之事故當是時天下之士不逺萬里來就師之其游太學者端為道藝稱弟子者中心悦而誠服之蓋猶有古法之遺意也熙寧以來此法浸壊所謂太學者但為聲利之場而掌其教事者不過取其善為科舉之文而嘗得雋於場屋者耳士之有志於義理者既無求於學其奔趨輻輳而來者不過為解額之濫舍選之私而已師生相視漠然如行路之人間相與言亦未嘗開之以徳行道藝之實而月書季考者又祗以促其嗜利苟得冒昧無恥之心殊非國家之所以立學教人之本意也欲革其弊莫若一遵仁皇之制擇士之有道徳可為人師者以為學官而乆其任使之講明道藝以教訓其學者而又痛減解額之濫以還諸州罷去舍選之法而使為之師者考察諸州所解徳行之士與諸生之賢者而特命以官則太學之教不為虚設而彼懷利干進之流自無所為而至矣如此則待補之法固可罷去而混補者又必使與諸州科舉同日引試則彼有鄉舉之可望者自不復來而不患其紛冗矣至於取士之數則又嚴為之額而許其補中之人從上幾分特赴省試則其舍鄉舉而來赴補者亦不為甚失職矣其計㑹監試漕試附試之類亦當痛減分數嚴立告賞以絶其冒濫其諸州教官亦以徳行人充而責以教導之實則州縣之學亦稍知義理之教而不但為科舉之學矣蕙田案以上宋太學文獻通考慶歴三年立四門學以士庶子弟為生員宋史選舉志初立四門學自八品至庶人子弟充學生嵗一試補差學官鎖宿彌封校其藝疏名上聞而後給牒不中式者仍聽讀若三試不中則出之未幾學廢蕙田案以上宋四門學哲宗時初置在京小學曰就傅初筮凡兩齋政和四年小學生近一千人分十齋以處之自八嵗至十二嵗率以誦經書字多少差次補内舍若能文從博士試本經小經義各一道稍通補内舍優補上舍蕙田案以上宋小學崇寧三年命將作少監李誡即城南門外相地營建外學是為辟雍蔡京又奏古者國内外皆有學周成均蓋在邦中而黨庠遂序則在國外臣親承聖詔天下皆興學貢士即國南郊建外學以受之俟其行藝中率然後升諸太學凡此聖意悉與古合今上其所當行者太學專處上舍内舍生而外學則處外舍生今貢士盛集欲増太學上舍至二百人内舍六百人外舍三千人外學為四講堂百齋齋列五楹一齋可容三十人士初貢至皆入外學經試補入上舍内舍始得進處太學太學外舍亦令出居外學其勅令格式悉用太學見制國子祭酒總治學事外學官屬司業丞各一人稍減大學博士正錄員歸外學仍増博士為十員正録為五員學生充學諭者十人直學二人三舍生皆繇升貢遂罷國子監補試蕙田案文獻通考及徽宗本紀建外學在崇寧元年與志不同五年著令凡州學上舍生升舍以其秋即貢入辟雍長吏集闔郡官及提學官具宴設以禮敦遣限嵗終悉集闕下凡貢士入辟雍外舍三經試不與升補兩經試不入等仍犯上三等罰者削籍再赴本州嵗升試是名退送即内舍己降舍而又一試不與或兩犯上四等罰者亦如外舍法退送太學外舍生已預考察者許再經一試以中否為留遣餘升降退送悉如辟雍法宣和三年詔太學官吏及州縣嘗置學官凡元豐舊制所有者皆如故其辟雍官屬及宗學并諸路提舉學事官屬並罷内外學悉遵元豐成憲蕙田案以上宋辟雍學右宋國學金史選舉志凡養士之地曰國子監始置於天徳三年後定制詞賦經義生百人小學生百人以宗室及外戚皇后大功以上親諸功臣及三品以上官兄弟子孫年十五以上者入學不及十五者入小學大定六年始置太學初養士百六十人後定五品以上官兄弟子孫百五十人曽得府薦及終場人二百五十人凡四百人凡試補太學生禮部主之曽得府薦及終場舉人皆免試凡學生㑹課三日作策論一道又三日作賦及詩各一篇三月一私試以季月初先試賦間一日試策論中選者以上五申部遇旬休節辰皆有假病則給假省試逺行則給程犯學規者罰不率教者黜凡國子監生三年不能充貢欲就諸局承應者學官試能粗通大小各一經者聽蕙田案金制國子學之外又有女真國子學以習本國語言右金國學元史選舉志太宗六年以馮志常為國子學總教命侍臣子弟十八人入學世袓至元七年命侍臣子弟十有一人入學以長者四人從許衡童子七人從王恂二十四年立國子學而定其制設博士通掌學事分教三齋生員講授經㫖究正音訓上嚴教導之術下考肄習之業復設助教同掌學事而專守一齋正録申明規矩督習課業凡讀書必先孝經小學論語孟子大學中庸次及詩書禮記周禮春秋易博士助教親授句讀音訓正録伴讀以其次傳習之次日抽籖令諸生復説其功課對屬詩章經解史評則博士出題生員呈稿先呈助教俟博士既定始録附課簿以憑考校其生員之數定二百人許衡又著諸生入學襍儀及日用節目成宗大徳八年十二月始定國子生蒙古色目漢人三年各貢一人十年閏十月國子學定蒙古色目漢人生員一百人三年各貢二人武宗至大四年閏七月定生員額二百人十二月復立國子學試貢法蒙古授官六品色目正七品漢人從七品仁宗延祐二年八月增置生員百人陪堂生二十人用集賢學士趙孟頫禮部尚書元明善等所議國子學貢試之法更定之一曰陞齋等第六齋東西相向下兩齋左曰游藝右曰依仁凡誦書講説小學屬對者隷焉中兩齋左曰據徳右曰志道講說四書課肄詩律者𨽻焉上兩齋左曰時習右曰日新講説易詩書春秋科習明經義等程文者隷焉每季考其所習以次遞陞二曰私試規矩漢人騐日新時習兩齋蒙古色目騐志道據徳兩齋本學舉實歴坐齋二周嵗以上未嘗犯過者許令充試限實歴坐齋三周嵗以上許充貢舉漢人私試孟月試經疑一道仲月試經義一道季月試䇿問表章詔誥内科一道辭理俱優為上等凖一分理優詞平者為中等凖半分每嵗終通計其年積分至八分以上者陞充髙等生員以四十名為額内蒙古色目各十名漢人二十名嵗貢試貢員不必備惟取實才有分同闕少者以坐齋月日先後多少為定三曰黜罰科條應私試分生員其有不事課業及一切戾規矩者初犯罰一分再犯罰二分三犯除名應巳補髙等生員其有違戾規矩者初犯殿試一年再犯除名從學正録糾舉之應在學生員除蒙古色目别議外其餘漢人生員三年不能通一經及不肯勤學者勒令出學蕙田案明代六堂積分之法蓋取於此然其法實始於宋宋史選舉志嘉定十四年詔嵗終取外舍生校最優者一人升内舍而咸淳中外舍生晏泰亨以七分三釐乞理為第三優朝命不許遂申嚴學法今後及八分者方許嵗校三名即所謂積分也泰定三年六月更積分而為貢舉並依世祖舊制其貢試之法從監學所擬大槩與前法略同而防閑稍加嚴宻焉蕙田案元時國子學之外有蒙古國子學回回國子學置助教學正以教公卿百官之子弟今俱不載而附見其目於此右元國學明史選舉志學校有二曰國學曰府州縣學入國學者通謂之監生舉人曰舉監生員曰貢監品官子弟曰廕監損貲曰例監同一貢監也有嵗貢有選貢有恩貢有納貢同一廕監也有官生有恩生國子學之設自明初乙巳始洪武元年令品官子弟及民俊秀通文義者並充學生天下既定詔擇府州縣學諸生入國子學又擇年少舉人趙惟一等及貢生董㫤等入學讀書賜以衣帳命於諸司先習吏事謂之歴事監生取其中尤英敏者李擴等入文華武英堂説書謂之小秀才其才學優贍聰明俊偉之士使之博極羣書講明道徳經濟之學以期大用謂之老秀才初改應天府學為國子學後改建於雞鳴山下既而改學為監設祭酒司業及監丞博士助教學正學録典籍掌饌典簿等官分六堂以館諸生曰率性修道誠心正義崇志廣業學旁以宿諸生謂之號房厚給廩餼嵗時賜布帛文綺襲衣巾鞾正旦元宵諸令節俱賞節錢而其教之之法每旦祭酒司業坐堂上屬官自監丞以下首領則典簿以次序立諸生揖畢質問經史拱立聽命惟朔望給假餘日升堂㑹饌乃㑹講復講背書輪課以常所習自四子本經外兼及劉向說苑及律令書數御製大誥每月試經書義各一道詔誥表䇿論判内科二道每日習書二百餘字以二王智永歐虞顔柳諸帖為法每班選一人充齋長督諸生工課衣冠步履飲食必嚴飭中節夜必宿監有故而出必告本班教官令齋長帥之以白祭酒監丞置集愆簿有不遵者書之再三犯者决責四犯者至發遣安置司教之官必選耆宿宋訥吳顒等由儒士擢祭酒訥尤推名師歴科進士多出太學而戊辰任亨泰廷對第一太祖召訥褒賞撰題名記立石監門辛未許觀亦如之進士題名碑由此相繼不絶中都之置國學也自洪武八年至二十六年乃革以其師生併入京師永樂元年始設北京國子監十八年遷都乃以京師國子監為南京國子監而太學生有南北監之分矣六堂諸生有積分之法司業二員分為左右各提調三堂凡通四書未通經者居正義崇志廣業一年半以上文理條暢者升修道誠心又一年半經史兼通文理俱優者乃升率性升至率性乃積分其法孟月試本經義一道仲月試論一道詔誥表内科一道季月試經史策一道判語二條每試文理俱優者與一分理優文劣者與半分紕繆者無分嵗内積八分者為及格與出身不及者仍坐堂肄業如有才學起異者奏請上裁太祖雖間行科舉而監生與薦舉人才㕘用者居多故其時布列中外者太學最盛一再傳之後進士日益重薦舉遂廢而舉貢日益輕雖積分歴事不改初法南北祭酒陳敬宗李時勉等加意振飭已漸不如其始衆情所趨向專在甲科宦途升沉定於謁選之日監生不獲上第即奮自鏃礪不能有成積重之勢然也迨開納粟之例則流品漸淆且庶民亦得援生員之例以入監謂之民生亦謂之俊秀而監生益輕於是同處太學而舉貢得為府佐貳及州縣正官官恩生得選部院府衞司寺小京職尚為正途而援例監生僅得選州縣佐貳及府首領官其授京職者乃光祿寺上林苑之屬其願就逺方者則以雲貴廣西及各邊省軍衞有司首領及衞學王府教授之缺用而終身為異途矣太祖慮武臣子弟但習武事鮮知問學命大都督府選入國學其在鳯陽者即肄業於中都命韓國公李善長等考定教官生員髙下分列班次曹國公李文忠領監事以繩核之嗣後勲臣子弟多入監讀書嘉靖元年令公侯伯未經任事年三十以下者送監讀書尋令巳任者亦送監而年少勲戚争以入學為榮矣舉人入監始於永樂中㑹試下第輒令翰林院録其優者俾入學以俟後科給以教諭之俸是時㑹試有副榜大抵署教官故令入監者亦食其祿也宣徳八年嘗命禮部尚書胡濙與大學士楊士竒楊榮選副榜舉人龍文等二十四人送監進學翰林院三月一考其文與庶吉士同頗示優異後不復另試則取副榜年二十五以上者授教職年未及者或依親或入監讀書既而不拘年齒依親入監者皆聴依親者回籍讀書依親肄業也又有丁憂成昏省親送幼子皆仿依親例限年復班正統中天下教官多缺而舉人厭其卑冷多不願就十三年御史萬節請勅禮部多取副榜以就教職部臣以舉人願依親入監者十之七願就教職者僅十之三但宜各隨所欲却其請不行至成化十三年御史胡璘言天下教官率多嵗貢言行文章不足為人師範請多取舉人選用而罷貢生勿選部議嵗貢如其舊而舉人教官仍許㑹試自後就教者亦漸多矣嘉靖中南北國學皆空虚議盡發下第舉人入監且立限期以趣之然舉人不願入監者卒不可立强於是生員嵗貢之外不得不頻舉選貢以充國學矣貢生入監初由生員選擇既令各學嵗貢一人故謂之嵗貢其例亦屢更洪武二十一年定府州縣學以一二三年為差二十五年定府學嵗二人州學二嵗三人縣學嵗一人永樂八年定州縣户不及五里者州嵗一人縣間嵗一人十九年令嵗貢照洪武二十一年例宣徳七年復照洪武二十五年例正統六年更立府學嵗一人州學三嵗二人縣學間嵗一人𢎞治嘉靖間仍定府學嵗二人州學二嵗三人縣學嵗一人遂為永制後孔顔孟三氏及京學衛學都司土官川雲貴諸逺省其按年充貢之法亦間有増減云嵗貢之始必考學行端莊文理優長者以充之其後但取食廩年深者𢎞治中南京祭酒章懋言洪永間國子生以數千計今在監科貢共止六百餘人嵗貢挨次而升衰遲不振者十常八九舉人坐監又每多時差撥不敷教養罕效近年有増貢之舉而所㧞亦挨次之人資格所拘英才多滯乞於常貢外令提學行選貢之法不分廩膳増廣生員通行考選務求學行兼優年富力强累試優等者乃以充貢通計天下之廣約取五六百人以後三五年一行則人材可漸及往年矣乃下部議行之此選貢所由始也選貢多英才入監課試輒居上等撥歴諸司亦有幹局嵗貢頽老其勢日絀則惟願就教而不願入監嘉靖二十七年祭酒程文徳請將廷試嵗貢惟留即選者於部而其餘盡使入監報可嵗貢諸生合疏言家貧親老不願入監禮部復請從其所願而盡使舉人入監又從之舉人入監不能如期南京祭酒潘晟至請設重罰以趣其必赴於是舉人選貢嵗貢三者迭為盛衰而國學之盈虛亦靡有定也神宗時工科郭如心言選貢非祖制其始欲補嵗貢之乏其後遂妨嵗貢之途請停其選神宗以為然至崇禎時又嘗行之恩貢者國家有慶典或登極詔書以當貢者充之而其次即為嵗貢納貢視例監稍優其實相仿也廕生入監明初因前代任子之制文官一品至七品皆得廕一子以世其䘵後乃漸為限制在京三品以上方得請廕謂之官生出自特恩者不限官品謂之恩生或即與職事或送監讀書官生必三品京官成化三年從助教李坤言也時給事中李森不可帝諭責其刻薄苐令非歴任年久政績顯著者毋得濫叙而巳既得廕叙由提學官考送部試如貢生例送入監中時内閣呂原子㦂由廕監補中書舍人七年辛卯乞應順天鄉試部請從之給事中芮畿不可帝允㦂所請不為例然其後以廕授舍人者俱得應舉矣恩生之始建文元年録吳雲子黼為國子生以雲死節雲南也正徳十六年定例凡文武官死於忠諌者一子入監其後守土官死節亦皆得廕子矣又𢎞治十八年定例東宮侍從官講讀年乆輔道有功者沒後子孫乞恩禮部奏請上裁正徳元年復定其祖父年勞已及三年者一子即授試中書舍人習字未及三年者一子送監讀書八年復定東宮侍班官三年者一子入監又神宗十二年定例三品日講官雖未考滿一子入監例監始於景泰元年以邊事孔棘令天下納粟納馬者入監讀書限千人止行四年而罷成化二年南京大饑守臣建議欲令官員軍民子孫納粟送監禮部尚書姚䕫言太學育才之地近者直省起送四十嵗生員及納草納馬者動以萬計不勝其濫且使天下以貨為賢士風日陋帝以為然為却守臣之議然其後或遇嵗荒或因邊警或大興工作率援往例行之訖不能止日知録景泰四年四月右少監武艮禮部右侍郎兼左春坊左庶子鄒幹等奏臨清縣學生員伍銘等願納米八百石乞入監讀書今山東等處正缺糧儲宜允其請從之并詔各布政司及直𨽻府州縣學生員能出米八百石於臨清東昌徐州三處賑濟願入監讀書者聽蕙田案例監始於景泰元年顧氏考之蓋未詳監生歴事始於洪武五年建文時定考覈法上中下三等上等選用中下等仍歴一年再考上等者依上等用中等者不拘品級隨才任用下等者回監讀書永樂五年選監生三十八人𨽻翰林院習四夷譯書九年辛卯鍾英等五人成進士俱改庶吉士壬辰乙未以後譯書中㑹試者甚多皆改庶吉士以為常歴事生成名其蒙恩遇如此仁宗初政中軍都督府奏監生七人𨽻事勤慎請注選授官帝不許仍令入學由科舉以進他歴事者多不願還監於是通政司引奏六科辦事監生二十人滿日例應還監仍願就科辦事帝復召二十人者諭令進學蓋是時六科給事中多缺諸生覬得之帝察知其意故不授官也宣宗以教官多缺選用監生三百八十人而程富等以都御史顧佐之薦使於各道歴政三月選擇任之所謂試御史也初令監生由廣業升率性始得積分出身天順以前在監十餘年然後撥歴諸司歴事三月仍留一年送部銓選其兵部清黄及隨御史出廵者則以三年為率其後以監生積滯者多頻減撥歴嵗月以疏通之每嵗揀選優者輒與撥歴有未及一年者𢎞治八年監生在監者少而吏部聼選至萬餘人有十餘年不得官者祭酒林瀚以坐班人少不敷撥歴請開科貢禮部尚書倪岳覆奏科舉已有定額不可再増惟請増嵗貢人數而定諸司歴事必湏日月滿後方與更替使諸生坐監稍乆選人亦無壅滯及至嘉靖十年監生在監者不及四百人諸司歴事嵗額以千計禮部尚書李時引岳前議言岳權宜二法一増嵗額以足坐班生徒一議差歴以久坐班嵗月於是府州縣學以嵗二貢二嵗三貢一嵗一貢為差行之四嵗而止其諸司歴事三月考勤之後仍歴一年其餘冩本一年清黄寫誥清軍清匠三年以至出廵等項俱如舊例日月今國學缺人視𢎞治間更甚請將前件事例㕘酌舉行並從之獨不増貢額未幾復以祭酒許誥提學御史胡時善之請詔増貢額如岳時前議隆萬以後學校積弛一切循故事而已崇禎二年從司業倪嘉善言復行積分法八年從祭酒倪元璐言以貢選為正流援納為閏流貢選不限撥期以積分嵗滿為率援納則依原定撥歴為率而歴事不分正雜惟以考定等第為歴期多寡諸司教之政事勿與猥雜差遣滿日校其勤惰開報吏部不率者回監教習時監規頽廢已久不能振作也右明國學漢書循吏傳文翁為蜀郡守修起學官於成都市中招下縣子弟以為學官弟子為除更繇髙者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之數年争欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云師古曰文翁學堂今在益州城内儒林傳元帝時郡國置五經百石卒史平帝紀元始三年立學官郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人何武傳武為刺史行部必先即學宫見諸生試其誦論問以得失後漢書冦恂傳建武三年為汝南太守修學校教生徒聘能為左氏春秋者親受學焉循吏傳衞颯為桂陽太守下車修庠序之儀任延為武威太守造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士李忠傳建武六年遷丹陽太守忠以丹陽越俗不好學乃為起學校習禮容春秋鄉飲選用明經郡中向慕之明帝本紀永平十年幸南陽召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賔宋均傳調辰陽長為立學校循吏傳秦彭建初元年遷山陽太守崇好儒雅修明庠序每春秋饗射輒修升降揖讓之儀鮑永傳昱子徳為南陽太守時郡學久廢徳乃修起横舍備爼豆黼冕行禮奏樂又尊饗國老宴㑹諸儒百姓觀者莫不勸服魯恭傳弟丕元和元年徴再遷拜趙相趙王商嘗欲避疾便時移住學官學官學舍也丕奏曰學官傳五帝之道修先王禮樂教化之處王欲廢塞以廣游讌事不可聽詔從丕言魏志髙柔傳明帝即位髙柔上疏曰昔漢末陵遲禮樂崩壊太祖初興愍其如此在於撥亂之際並使郡縣立教學之官髙祖即位遂闡其業興復辟雍州立課試於是天下之士復聞庠序之教親爼豆之禮焉晉書虞溥傳太康時為鄱陽内史大修庠序廣招學徒移告屬縣具為條制於是至者七百餘人溥乃作誥以奬諭之曰文學諸生皆冠帶之流年盛志美始渉學庭講修典訓此大成之業立徳之基也夫聖人之道淡而寡味故始學者不好也及至期月所觀彌博所習彌多日聞所不聞見所不見然後心開意朗敬業樂羣忽然不覺大化之陶已至道之入神也故學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝弟忠信是也君子内正其心外修其行行有餘力則以學文文質彬彬然後為徳夫學者不患才不及而患志不立故曰希驥之馬亦驥之乗希顔之徒亦顔之倫又曰㓶而舍之朽木不知㓶而不舍金石可虧斯非其效乎時祭酒求更起屋行禮溥曰君子行禮無常處也故孔子射於矍相之圃而行禮於大樹之下况今學庭庠序髙堂顯敞乎宋書禮志晉穆帝永和中征西將軍庾亮在武昌開置學官教曰洙泗邈逺風雅彌替後生放任不復憲章典謨宜處分安學校處所籌量起立講舍㕘佐大將子弟悉令入學吾家子弟亦令受業四府博學識義通渉文學經綸者建儒林祭酒使班同三署厚其供給皆玅選邦彦必有其宜者以充此舉近臨川臨賀二郡並求修復學校若非束脩之流禮教所不及而欲階緣免役者不得為生明為條制令法清而人貴又繕造禮器爼豆之屬梁書儒林傳武帝選學生遣就㑹稽雲門山受業於廬江何允分遣博士祭酒到州郡立學魏書儒林傳顯祖天安初立鄉學郡置博士二人助教二人學生六十人後令大郡立博士二人助教四人學生百人次郡立博士二人助教四人學生八十人中郡博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人郡縣學始乎此矣北齊書儒林傳齊制諸郡並立學置博士助教授經學生俱被差逼充員士流及豪富之家皆不從調備員既非所好墳籍固不闗懷又多被州郡官人驅使縱有游惰亦不檢察皆由上非所好之所致也諸郡俱得察孝亷其博士助教及游學之徒通經者推擇充舉射策十條通八以上聽九品出身其尤異者亦蒙抽擢隋書髙祖本紀仁夀元年詔太學四門及州縣學並廢唐書選舉志唐制京都學生八十人大都督中都督府上州各六十人下都督府中州各五十人下州四十人京縣五十人上縣四十人中縣中下縣各三十五人下縣二十人州縣學生州縣長官補長史主焉每嵗仲冬州縣館監舉其成者送至尚書省文獻通考武徳七年詔諸州縣及鄉並令置學有明一經以上者有司試册加階唐書選舉志𤣥宗開元中勅州縣學生年二十五以下八品九品子若庶人二十已下通一經及未通經而聰悟有文詞史學者入四門學為俊士即諸州貢舉省試不第願入學者亦聽文獻通考開元二十六年正月十九日敕古者鄉有序黨有塾將以宏長儒教誘進學徒化人成俗率由於是其天下州縣每鄉之内里别各置一學仍擇師資令其教授貞元三年正月右補闕宇文炫上言請京畿諸縣鄉村廢寺並為縣學并上制書事二十餘件疏奏不報後唐天成三年宰臣兼判國子祭酒崔協奏請頒下諸道州府各置官學如有鄉黨備諳文行可舉者録其事實申監司方與解送但一身就業不得影庇門户宋太宗皇帝太平興國二年知江州周述言廬山白鹿洞學徒常數千百人乞賜九經肄習詔國子監給本仍傳送之先時南唐升元中白鹿洞建學館以李道為洞主掌其教授又賜石鼓書院勅額書院唐元和間衡州李寛所建國初賜額真宗大中祥符二年應天府民曹誠即楚邱戚同文舊居造舍百五十間聚書數千卷博延生徒講習甚盛府奏其事詔賜額曰應天府書院命奉禮郎戚舜賔主之仍令本府幕職官提舉以誠為府助教八年賜潭州嶽麓書院額始開寳中郡守朱洞首度基創宇以待四方學者李允則來為州請於朝乞以書藏方是時山長周式以行義著八年召見便殿拜國子學主簿使歸教授詔賜書院名增賜中秘書馬氏端臨曰右宋初四書院建置之本末如此此外則又有西京嵩陽書院賜額於至道二年江寧府茅山書院賜田於天聖二年嵩陽茅山後來無聞獨四書院之名著是時未有州縣之學先有鄉黨之學蓋州縣之學有司奉詔㫖所建也故或作或輟不免具文鄉黨之學賢士大夫留意斯文者所建也故前規後隨皆務興起後來所至書院尤多而其田土之錫教養之規往往過於州縣學蓋皆欲倣四書院云蕙田案書院之設於古未聞宋初始有白鹿洞石鼓應天嶽麓四書院有司以上聞輒為賜額賜書以優異之逮於南宋之季及元代諸路所立書院尤多固理學昌明之效而太宗真宗風厲儒術以開一代文明之治其功顧不多哉觀承案州縣之學國家所建也書院之設乃起於士大夫培植人材之意文翁時官未立學特修起學官於成都市中雖無書院之名要即書院之義至宋時四大書院而理學昌明真儒輩出為極盛矣元明以來亦相延勿替是固當與學校相輔而行者也又周禮以本俗安萬民四曰聫師儒疏謂致仕賢者使教鄉閭子弟今書院延師猶存此義宋史選舉志仁宗即位初命藩輔皆得立學慶歴四年詔曰儒者通天地人之理明古今治亂之原可謂博矣然學者不得騁其說而有司務先聲病章句以拘牽之則吾豪雋竒偉之士何以奮焉士以純明朴茂之美而無斆學養成之法使與不肖並進則夫懿徳敏行何以見焉此取士之甚敝而學者自以為患夫遇人以薄者不可責其厚也今朕建學興善以尊子大夫之行更制革敝以盡學者之才有司其務嚴訓導精察舉以稱朕意學者其進徳修業無失其時其令州若縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者由是州郡奉詔興學而士有所勸矣文獻通考安定先生胡瑗自慶歴中教學於蘇湖間二十餘年束脩弟子前後以數千計是時方尚辭賦獨湖學以經義及時務學中故有經義齋治事齋經義齋者擇疏通有器局居之治事齋者人各治一事又兼一事如邊防水利之類故天下謂湖學多秀彦其出而筮仕往往取髙第及為政多適於世用若老於吏事者由講習有素也慶歴四年詔州縣皆立學於是建大學於京師而有司請下湖州取先生之法以為大學法神宗熙寧四年詔置京東西河東北陜西五路學以陸佃等為諸州學官仍令中書采訪逐路有經術行誼者各三五人雖未仕亦給簿尉俸使權教授他路州軍命近日選薦京朝官有學行可為人師者堂除逐路官令兼所任州教授州給田十頃為學糧仍置小學教授八年秋詔諸州學官先赴學士院試大義五道取優通者選差元豐元年詔諸路州府學官共五十三員京東路兖徐曹鄆青宻州應天府各一員京西路西京國子監許陳襄鄧州各一員河北路北京國子監定相滄衞棣瀛州真定府各一員陜西西路陜華耀豳泰燕州永興軍鳳翔河中府各一員河東路潞晉代州太原府各一員淮南路揚州毫州各一員兩浙路杭越蘇三州各一員江南東路饒州江寧府各一員江南西路洪州吉州各一員荆湖南路潭州一員荆湖北路江陵府一員福建路建州一員成都府路眉州成都府各一員梓州路梓州普州各一員利州路利州一員䕫州路䕫州一員廣南東路廣州一員廣南西路桂州一員馬氏端林曰是時大興學校而天下之有教授者只五十三員蓋重師儒之官不肯輕授濫設故也觀其所用者既是有出身人然又必試中而後授則與入館閣翰苑者同科其遴選至矣哲宗元祐初齊廬宿常䖍頴同懷澶河陽等州始相繼置教授三舍法行而員額愈多至大觀時吉州建州皆以養士數多置教授三員宣和時罷州縣學三舍法始令諸州教授若係未行三舍己前置者依舊餘並減罷如贍學田産房廊等係行三舍後添給者亦復拘牧云哲宗元祐元年詔近臣擇經明行修堪内外學官者人舉二員遂罷試補法二年中丞胡宗愈言學者初登科遂顓師席非是詔内外學官經任年至三十方得在選四年以舉薦頗衆詔湏命舉乃得奏上紹聖元年三省立格侍從臺諌國子長貳嵗舉堪任諸州學官一員須常中進士或制科年及三十者若制科進士第在上五人禮部奏名在上三人府監廣文館第一人太學上舍得第即皆不試而用餘並召附吏部春秋試凡試兩經大義各一道以通經善作文為谷格已經舉試中書籍其姓名俟有闕則選授焉於是内外見學官非制科進士出身及由上舍生入官者並罷時學官已立試法潭廣已下十一州教授本付吏部擬注者令三省選差宋史選舉志元符二年初令諸州行三舍法考選升補悉如太學州許補上舍一人内舍二人嵗貢之其上舍附太學外舍試中補内舍生三試不升舍遣還其州其内舍免試至則補為外舍生諸路選監司一員提舉學校守貳董幹其事遇補試上内舍生選有出身官一人同教授考選須彌封謄録崇寧元年宰臣請天下州縣並置學州置教授二員縣亦置小學縣學生選考升諸州學州學生每三年貢太學至則附試别立號考分三等入上等補上舍入中等補下等上舍入下等補内舍餘居外舍諸州軍解額各以三分之一充貢士開封府留五十五額解土人之不入學者餘盡均給諸州以為貢額外官子弟親戚許入學一年給牒至太學用國子生額解試州給常平或係省田宅兑養士費縣用地利所出及非係省錢文獻通考崇寧三年令州縣學用三舍法陞太學罷科舉每上舍生升舍己其秋即貢入辟廱長吏集闔郡官提舉司官即本所燕設以禮津遣限嵗終悉集闕下選士入貢其自今年始如有孝弟婣睦任恤忠和若行能尤異為鄉里所推縣上之州免試入學教授知通詢審無􅍝即保任入貢仍具實以聞不實者坐罪有差蕙田案孝悌睦婣任恤忠和謂之八行科三年臣僚言比者試文有以聖經之言輒為時忌而避之者如曰大哉堯之為君以為哉與災同制治于未亂安不忘危吉凶悔吝生乎動則以為危亂凶悔皆當避不諱之朝豈宜有此詔禁之四年鮑耀卿言今州縣學考試未校文字精弱先問時忌有無苟語渉時忌雖甚工不敢取時忌如曰休兵以息民節用以豐財罷不急之役清入仕之流諸如此語熙豐紹聖間試者共用不忌今悉絀之宜禁止詔可馬氏端臨曰熙寧之立學校養生徒上自天庠下至郡縣其大意不過欲使之習誦新經附和新法耳紹聖崇觀而後羣憸用事醜正益甚遂立元祐學術之禁又令郡縣置自訟齋以拘誹謗時政之人士子志於進取故過有拘忌蓋言休兵節用則恐類元祐之學言災凶危亂則恐涉誹謗之語所謂轉喉觸諱者也則惟有迎奉諂佞而已七年給事中毛友言比守郡見訴役者言富家子弟初不知書苐損數百緡錢求人試補入學遂免身役比其嵗升不中更數年而始除籍則其幸免已多矣請初試補入縣學人並簾試以别偽冒從之宣和三年罷天下州縣學三舍法惟大學用之髙宗建炎初復教官試紹興中議者謂欲為人師而自納所業于有司以幸中度乃詔罷其試而教授自朝廷選差已而復之凡有出身許應先具經義詩賦各三首赴禮部乃下省闈分兩場試之而取其文理優長者不限其數初任為諸州教官繇是為兩學之選十五年國子監丞文浩言師儒之官與諸生難疑答問於羣經宜無所不通請自今並於六經中臨期取二經各出兩題無拘義式以貫穿該贍為合格詔行焉其後四川制置司遇類省試年亦放禮部附試自嘉泰元年始紹興三年詔淮西路州縣教授並行減罷令逐州有出身官兼十八年江西轉運賈直清奏諸立縣學於縣官内選有出身人兼領教導尋下國子監㕘酌措置欲比附舊法縣學委知通於令佐内選有出身官一員兼領教導職事及諸州軍如未差教授處即令本路提舉司於本州有出身官選差一員兼領若州縣官俱無出身只令本學長諭專主教導却令知州縣令覺察㸃檢從之二十一年大理寺主簿丁仲京奏贍學田土多為勢家侵佃望令提舉學事官覺察上謂大臣曰既不度僧常住多有絶産其併撥以贍學既而户部請令提舉司置籍拘管其無敕額菴院一體行朱子崇安縣學田記予惟三代盛時自家以逹于天子諸侯之國莫不有學而自天子之元子以至於士庶人之子莫不入焉則其士之廩於學官者宜數十倍於今日而考之禮典未有言其費出之所自者豈當時為士者之家各已受田而其學也有時故得以自食其食而不仰給於縣官也歟至漢元成間乃謂孔子布衣養徒三千而増學官弟子至不復限以員數其後遂以用度不足無以給之而至於罷夫謂三千人者聚食於孔子之家則已妄矣然養士之需至於以天下之力奉之而不足則亦豈可不謂難哉蓋自周衰田不井授人無常産而為士者尤厄於貧反不得與為農工商者齒上之人乃欲聚而教之則彼又安能終嵗裹飯而學於我是以其費雖多而或取之經常之外勢固有不得已也宋史選舉志光宗紹興三年禮部侍郎倪思請復混補法命兩省臺諌雜議可否於是吏部尚書趙汝愚等合奏曰國家恢儒右文京師郡縣皆有學慶歴以後文物彬彬中興以來建大學于行都行貢舉於諸郡然奔競之風勝而忠信之俗㣲亦惟榮辱升沉不由學校徳行道藝取决糊名工雕篆之文無進修之志視庠序如傳舎目師儒如路人季考月書盡成文具今請重教官之選假守貳之權倣舍法以育材因大比以取士考終場之數定所貢之員期以次年試于太學其諸州教養課式升貢之法下有司條上思議遂寢金史選舉志府學大定十六年置凡十七處共千人以嘗與廷試及宗室皇家􅃝免以上親并得解舉人為之後増州學遂加以五品以上官曽任隨朝六品官之兄弟子孫餘官之兄弟子孫經府薦者同境内舉人試補三之一凡試補學生以提舉學校學官主之大定二十九年户部尚書鄧儼等議計州府户口増養士之數於大定舊制京府十七處千人之外置節鎮防禦刺史州學六十處増養千人各設教授一員選五舉終場或進士年五十以上者為之府學二十有四學生九百五人節鎮學三十九共六百一十五人防禦州學二十一共二百三十五人凡千八百人元史選舉志世祖中統二年始命置諸路學校官凡諸生進修者嚴加訓誨務使成材以備選用至元十九年四月命雲南諸路皆建學二十三年二月詔江南學校舊有學田復給之以養士二十四年立國子學於國城之東迺以南城國子學為大都路學自提舉以下設官有差二十八年令江南諸路學及各縣學内設立小學選老成之士教之其他先儒過化之地名賢經行之所與好事之家出錢粟贍學者並立為書院凡師儒之命於朝廷者曰教授路府上中州置之命于禮部及行省及宣慰司者曰學正山長學録教諭路州縣及書院置之路設教授學正學録各一員散府上中州設教授一員下州設學正一員縣設教諭一員書院設山長一員凡路府州書院設直學以掌錢榖明史選舉志郡縣之學洪武二年太祖諭中書省臣曰朕惟治國以教化為先教化以學校為本京師雖有太學而天下學校未興宜令郡縣皆立學校延師儒授生徒講論聖道使人日漸月化以復先王之舊於是大建學校府設教授州設學正縣設教諭各一俱設訓導府四州三縣二生員之數府學四十人州縣以次減十師生月廪食米人六斗有司給以魚肉學官月俸有差生員專治一經以禮樂射御書數設科分教務求實才頑不率者黜之十五年頒學規於國子監又頒禁例十二條於天下鐫立卧碑置明倫堂之左其不遵者以違制論生員雖定數於國初未幾即命増廣不拘額數宣徳中定増廣之額在京府學六十人在外府學四十人州縣以次減十成化中定衞學之例四衞以上軍生八十人三衞以上軍生六十人二衞一衞軍生四十人有司儒學軍生二十人土官子弟許入附近儒學無定額増廣既多於是初設食廩者謂之廪膳生員増廣者謂之増廣生員及其既久人才愈多又於額外増取附於諸生之末謂之附學生員凡初入學者止謂之附學而廩膳増廣以嵗科兩試等第髙者補充之非廪生久次者不得充嵗貢也士子未入學者通謂童生當大比之年間收一二異敏三場並通者俾與諸生一體入場謂之充場儒士中式即為舉人不中式仍候提學官嵗試合格乃准入學提學官在任三嵗兩試諸生先以六等試諸生優劣謂之嵗考一等前列者視廪膳生有缺依次充補其次補増廣生一二等皆給賞三等如常四等撻責五等則廪増遞降一等附生降為青衣六等黜革繼取一二等為科舉生員俾應鄉試謂之科考其充補廪増給賞悉如嵗試其等第仍分為六而大抵多置三等三等不得應鄉試撻黜者僅百一亦可絶無也生儒應試每舉人一名以科舉三十名為率舉人屢廣額科舉之數亦日増及求舉者益衆又往往於定額之外加取以收士心凡督學者類然嘉靖十年常下沙汰生員之令御史楊宜争之而止神宗時張居正當國遂核減天下生員督學官奉行太過童生入學有一州縣僅録一人者其科舉減殺可推而知也生員入學初由廵按御史布按兩司及府州縣官正統元年始特置提學官專使提督學政南北直隷俱御史各省㕘用副使僉事景泰元年罷提學官天順六年復設各賜敕諭十六條俾奉行之直省既設提學有所轄太廣及地最僻逺嵗巡所不能及者乃酌其宜口外及各都司衞所土官以屬分廵道員直𨽻廬鳯淮揚滁徐和以屬江北廵按湖廣衡永郴以屬湖南道辰靖以屬辰沅道廣東瓊州以屬海南道甘肅衞所以屬廵按御史亦皆專敕行事神宗四十一年南直𨽻分上下江湖廣分南北始各増提學一員提學之職專督學校不理刑名所受詞訟重者送按察司輕者發有司直𨽻則轉送廵按御史督撫巡按及布按二司亦不許侵提學職事也明初優禮師儒教官擢給事御史諸生嵗貢者易得美官然鉗束亦甚謹太祖時教官考滿兼覈其嵗貢生員之數後以嵗貢為學校常例二十六年定學官考課法專以科舉為殿最九年任滿核其中式舉人府九人州六人縣三人者為最其教官又考通經即與陞遷舉人少者為平等即考通經亦不遷舉人至少及全無者為殿又考不通經則黜降其待教官之嚴如此生員入學十年學無所成者及有大過者俱送部充吏追奪廩糧至正統十四年申明其制而稍更之受贓姦盗冒籍宿娼居喪娶妻妾所犯事理重者直隷發充國子監膳夫各省發充附近儒學膳夫齋夫滿日為民俱追廪米犯輕充吏者不追廪米其待諸生之嚴又如此然其後教官之黜降生員之充發皆廢格不行即卧碑亦具文矣諸生上者中式次者廪生年久充貢或選㧞為貢生其累試不第年踰五十願告退閒者給與冠帶仍復其身其後有納粟馬捐監之例則諸生又有援例而出學者矣提學官嵗試校文之外令教官舉諸生行優劣者一二人賞黜之以為勸懲此其大較也右歴代郡縣學五禮通考卷一百七十一
