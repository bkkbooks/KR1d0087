body:
  text: 五禮通考卷三十六刑部尚書秦蕙田撰吉禮三十六星辰附楚辭九歌東皇太一宋朱子註太一神名天之尊神祠在楚東以配東帝也故云東皇漢書云天神貴者太一太一佐曰五帝中宫天極星其一明者太一常居也淮南子曰太微者乃太一之庭紫宫者太一之居蕙田案以太一為尊神其事始于漢武而屈子九歌乃在其前二百餘年則流俗相傳其來已久葢道家之説流布民間而後遂置為祀典也故録之以誌其始前漢書郊祀志置夀宫神君孟康曰夀宫奉神之宫也神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子袚然後入孟康曰崇潔自除祓然後入因巫為主人闗飲食所欲言行下李竒曰神所欲言下之于巫又置夀宫北宫張羽旗設供具以禮神君神君所言上使受書其名曰畫法孟康曰策畫之法也其所言世俗之所知也無絶殊者而天子心獨喜其事秘世莫知也文獻通考馬氏曰案太一莫知其何神天官書言中宫天極星其一明者太一常居則其為星也明矣祭法雖有幽禜之禮然叙其事于祭天地四時寒暑日月之後則亦非祀典之首也漢承秦制以祀五帝為郊天至武帝時採謬忌之説則以為五帝特太一之佐于是具太一祠壇在五帝之上帝親郊拜則以祀天之禮事之矣然郊祀明堂巍然受祭天之禮何其崇極也至于因巫為主人闗飲食所欲言行下則又何其猥屑也武帝惑于方士求仙延年之説故所以事鬼神者其謟且凟至于如此蕙田案漢書天子郊拜太一如雍郊禮其尊在五畤上所謂泰畤也其立祀之意與唐宋所祀九宫太一干神太一不同此條夀宫神君有太禁司命之佐則非如郊祀所云矣特為編入以為後世惑方士崇淫祀之始舊唐書肅宗本紀乾元元年夏六月己酉初置太一神壇于圜丘東命宰相王璵攝行祠事蕙田案此于九宫貴神外别置太一神壇之始宋史太宗本紀太平興國八年五月丁夘詔作太一宫于都城南十一月己未太一宫成石林燕語太平興國中司天言太一或有五福大游小游四神天一地一真符君基臣基民基凡十神皆天之貴神而五福所臨無兵疫凡行五宫四十五年一易今自甲申嵗入黄室巽宫當吴分野請即蘇州建宫祠之已而復有言今京城東南蘇村可應姑蘇之名乃改築于蘇村京師建太一宫自此始蕙田案甲申即太平興國八年之明年改為雍熙元年雍熙元年八月丁酉親祀太一宫真宗本紀大中祥符二年二月乙巳幸上清宫祈雨戊申遣使祠太一祠𤣥㝠仁宗本紀天聖六年三月壬戌作西太一宫九月癸夘祠西太一宫十二月癸亥祠西太一宫神宗本紀熙寧四年十一月丁亥作中太一宫禮志熙寕四年司天中宫正周琮言太一經推算七年甲寅嵗太一陽九百六之數復元之初故經言太嵗有陽九之災太一有百六之厄皆在入元之初終今陽九百六當癸丑甲寅嵗為災厄之㑹然五福太一移入中都可以稍異為祥竊詳五福太一自國朝雍熙元年甲申歲入東南㢲宫時修東太一宫天聖七年己巳嵗五福太一入西南坤位修西太一宫請稽詳故事崇建祠宇迎之京師詔建中太一宫于集禧觀十太一神並用通天冠絳紗袍熙寧六年十一月癸丑中太一宫成乙夘親祝太一宫文獻通考熙寧六年中太一宫成命王安石為奉安太一使吴充孫固為前導官主管鹵簿奉安神像降徳音于天下太常禮院言中太一宫冠服依東西太一而東西太一唯五福君基冠通天冠太游以下皆冠道冠案史記天神貴者太一太一佐者五帝又方士言十太一皆天之尊神請並用通天冠絳紗袍從之禮部言五福十太一祝版青詞稱嗣天子臣某謹案古之祝詞以天子至尊雖祗事天地宗廟示民嚴上葢未有稱臣者故禮曰踐阼臨祭祀内事曰孝王某外事曰嗣王某内謂宗廟外謂郊社大戴禮載祀天祝文稱予一人某漢承古禮稱天子以事天其贊享辭又曰皇帝魏明帝始詔天地明堂五郊可稱天子臣某東晉賀循製策祝文稱皇帝臣某沿襲至今葢用魏晉之制本朝儀注祀儀于上帝五帝日月並稱臣檢㑹九宮貴神祝版進書已不稱臣五福十太一當依熙寧六年以前故事其被遣之官自宜稱臣如此則不失輕重之體從之宋史禮志元豐詔改定大祀太一東以春西以秋中以冬夏文獻通考政和三年議禮局上五禮新儀立春祀東太一宫立夏季夏土旺日祀中太一宫立秋日祀西太一宫立冬日祀中太一宫中太一宫真室殿五福太一在中君棋太一在東大遊太一在西俱南向延休殿四神太一承釐殿臣棋太一在東西向北上凝祐殿直符太一臻福殿民棋太一在西東向北上歴慶殿小游太一在中天一太一在東地一太一在西靈貺殿太嵗在中太隂在西俱南向三皇五方帝日月五星二十八宿十日十二辰天地水三官五行九宫八卦五岳四海四瀆十二山神等並為從祀東西太一宫凖此東太一宫大殿五福太一在東君棋太一在西俱南向大游太一殿在大殿之北南向臣棋太一殿在西北向小游太一直符太一四神太一殿在大殿之東西向北上天一太一民棋太一地一太一殿在大殿之西東向北上西太一宫黄庭殿五福太一在中君棋太一在東大游太一在西均福殿小游太一在中俱南向延貺殿天一太一在中四神太一在南臣棋太一在北俱西向資祐殿地一太一在中民棋太一在南直符太一在北俱東向紹興十八年詔擇地建太一宫先是命禮官考典故十月癸夘上之曰太平興國初司天楚芝蘭建言太一有十曰五福君基大游小游天一臣基直符民基四神地一天之尊神也五福所在無兵疫人民豐樂自雍熙元年入㢲宫吴分蘇州請建宫都城東南蘇村以應蘇臺之名乃建東太一宫八年宫成合千一百區凡十殿四廊圖三皇五帝九曜七元天地水三官南斗三台二十八宿天曹四司十精太一五岳儲副佐命十二山神八卦六丁五行四瀆本命等神及四直靈官三十六神將象五百二十四軀天聖六年司歴者言太一入蜀之坤宫又建西宫于八角鎮前後東西凡四殿又建齋殿塑像自内出始鑄印給之熙寧四年十月司天言甲寅五福當入中都又建中宫于集禧觀政和間改龍徳宫為北太一宫今四立日皆望祀太一于惠照設位宜擇地建宫詔兩浙漕臣營之癸丑詔製像于新宫十一月甲戌禮官謂太一冠服不載于傳記略記東西宫像服通冠仙衣侍臣二人服道衣童子二人青衣執紅絲拂中太一宫道流朱忠煥亦謂十神太一皆服通天冠絳服執圭從臣梁冠絳服執笏童子執紅絲拂請如其飾及名諸殿十八年正月癸未又請上書其榜太一殿曰靈休殿門曰崇真挾殿曰瓊章寳室三清殿曰金闕寥陽火徳殿曰明離本命殿曰介福齋殿曰齊明三月宫成凡百七十有四區十太一位于殿上南面西上從祀東廡九十有八西廡九十有七皆北上乙亥設宫牓丙子奉安神像用細仗二百人鈞容樂親從威儀道士皆百人宰臣為奉安使上親謁太一宫前期有司張帟于齋殿設褥位于靈休殿介福殿上之東西向及香案之前設羣臣次宫之内外質明帝服履袍自崇政殿乘輦出宫北門至齋殿降輦羣臣先入班于靈休殿下皆北面帝自齋殿後步至宫之東廡入便門升殿東側階至褥位西面立再拜羣臣皆再拜凡帝拜羣臣皆拜帝進五福太一前三上香再拜次至君基大遊小遊天一地一四神臣基民基直符前皆如五福之儀還褥位再拜羣臣自西廡班于介福殿下帝降由東廡升介福殿東側階至褥位西向立再拜進建生星斗君前三上香再拜次至本命元辰真君前亦如之帝還褥位若命宰臣炷香則宰臣升自西階以次上香畢降階帥羣臣再拜帝再拜還齋殿羣臣皆退帝還宫太常寺簿林大鼐言十神太一皆天之貴神國朝分而為二並為大祀比新太一宫而九宫貴神尚寓屋而不壇與小祀雜乃詔臨安府于國城之東擇爽塏地建九宫貴神壇壝其儀如祀上帝以太一攝提權星招搖天符青龍咸池太隂天一為序牲以少牢籩豆十有二玉以圭璧太一幣以黒攝提招搖天符以黄權星以青青龍以紫咸池以白太隂以紅天一以赤王圻續通考宋理宗淳祐十二年詔建西太一宫于延祥觀左以十月三日親行欵謁恭謝之禮時牟子才上奏曰自漢武帝始祠太一其後或隨太一所在築室迎祠大率皆因方士雜引道經星歴之學而為之比者國家以五福太一臨蜀分乃建西太一于西河之濵以為禬禳之地雖厥有故事然是役也土木鉅麗一時囊封匭奏已交言其非而或者又竊議陛下他日必因欵謁而為湖山遊幸之舉今宗祀禮成親行恭謝陛下葢將敬休神天禔福庶民夫豈以觀遊為意然道途之言皆謂有司飭橋梁除道路辦供給過為勞擾又傳是日欲張水嬉陳樂伎萬一果出于此豈不實或者遊幸之説而有失陛下敬天愛民之初意乎伏惟陛下察臣愚衷深入宸慮自以其意特召大臣詳議其事明詔有司亟止此行庶幾舉動合宜青史書之可為萬世法而疑慮消宗廟社稷幸甚又曰臣比者西太一指揮初下之時嘗宻告陛下乞自以聖意明詔有司亟止此行葢區區忠愛之志欲救正于未然力量淺薄未能感動繼聞諸臣陸續亦有奏疏是公議不謀而同非臣一人之私言也二十四日伏睹内批陛下非不儆悟此意而欵謁之行終未即止是猶以臣等之言為未然也臣又案漢史武帝元鼎五年立泰畤于甘泉親祠太一武帝即位幾三十年而有此舉措葢其學不足以明理情不足以制欲無足怪者陛下講學于今三十年餘此乃聖徳成就之日所當同符堯舜而乃欲效武帝親祀太一之舉臣實惜之始武帝既祠太一遂下詔稱揚以為望見太一若景光十有二廼心侈然其後益封泰山祠后土幸建章巡海上作甘泉通天蜚亷殆無虚嵗葢其侈心一萌不能自止可不懼哉且祠太一所以致福而臣以漢史考之其初祠太一之年日有食之自是旱蝗河決蛇鬭無嵗無有而南越之叛匈奴之寇亦在是年至于東方盗起巫蠱禍作干戈相尋所謂禍者乃如此武帝晚年始悟下詔以為平生所為狂悖嗚呼亦已晚矣武帝自謂其所為狂悖試觀其所為豈不真狂悖可笑而奈何欲效之乎望陛下痛察臣衷改降指揮特寢前命以弭人言元史世祖本紀至元十八年十一月乙亥召法師劉道真問祠太一法成宗本紀大徳元年春正月辛夘建五福太一神壇王圻續通考五福太一壇時以道流主之元史文宗本紀至順元年九月乙未以立冬祀五福十神太一真君至順二年正月甲辰勅每嵗四祭五福太一星二月庚午建五福太一宫于京城乾隅王圻續通考乾隅西北方也張美和曰五福太一之貴神以二百二十五年行五宫自乾而艮艮而巽巽而坤坤而中宫又至乾每宫住四十五年所至之宫澤福是年在乾宫二十年三月祀太一二十一年復祀太一元史泰定帝紀二年二月戊申命道士祭五福太一神蕙田案太一之名始見于楚辭不過習俗師巫附㑹天神之一而非以為極尊無上之號也至史記封禪書漢武帝用方士言専祠太一而以五帝配祀則直以昊天上帝當之逮匡衡奏罷泰畤然後太一之説始息是當其未罷以前泰畤固若即漢之圜丘也東漢至隋皆未有言太一者唐明皇既信術士祀九宫而九宫之神一曰太一是太一特九宫之一耳至肅宗又于九宫之外别置太一壇煩凟不經日甚一日宋太宗真宗復行之仁宗立西太一神宗立中太一加五福之名増十神之位徽宗又有北太一踵事繁文荒誕已極元代猶沿其謬至明而始廓清焉夫以太一為獨尊亦僅尊于彼八宫之神耳至増之為十太一則是九宫皆可稱太一而又餘其一以此擬諸漢武之太一其為大小尊卑葢截然其不侔矣今取唐宋元祭太一事另為一類附諸九宫貴神之後以為後世鑒右太一圖書集成宋王安石景靈宫修葢神御殿上梁祭告太嵗已下諸神祝文伏以欽奉僊游肇營寳構舉修梁而揆日具蠲餚以寧神祓此後艱仰繄天祐案太嵗之祀漢唐宋以來不載祀典而安石有祭太嵗諸神文豈宋時已有其祀耶元史成宗本紀至元三十一年夏四月即皇帝位五月壬子祭太陽太嵗火土等星于司天臺王圻續通考元每有大興作祭太嵗月將日值于太史院餘冬序録國初肇祀太嵗禮臣上言太嵗之神自唐宋以來祀典不載惟元有大興作祭于太史院亦無常祭國朝始有定祀是以壇之制于古無稽案説文太嵗木星也一嵗行一次應十二辰而一周天其為天神明矣亦宜設壇露祭但壇制無考應照社稷壇築造髙廣尺寸差為減殺庶于禮適宜詔可蕙田案此以木星為太嵗明史禮志古無太嵗月將壇宇之制明始重其祭太祖既以太嵗諸神從祀圜丘又合祭羣祀壇已而命禮官議専祀壇壝禮臣言太嵗者十二辰之神案説文嵗字從歩從戌木星一嵗行一次歴十二辰而周天若歩然也隂陽家説又有十二月將十日十二時所值之神若天一天罡太一功曹太衝之類雖不經見歴代因之元毎有大興作祭太嵗月將日直時直于太史院宜以太嵗風雲雷雨諸天神合為一壇諸地祗為一壇春秋専祀乃定驚蟄秋分日祀太嵗諸神于城南三年復以諸神隂陽一氣流行無間乃合二壇為一而増四季月將又改祭期與地祗俱用驚熱秋分後三日蕙田案此以十二辰之神為太嵗仍主木星王圻續通考國初令祀太嵗及四季月將風雲雷雨岳鎮海瀆山川城隍旗纛諸神嘗建山川壇于天地壇之西正殿七壇曰太嵗曰風雲雷雨曰五岳曰四鎮曰四海曰四瀆曰鍾山兩廡從祀六壇左京畿山川夏冬季月將右都城隍春秋季月將西南有先農壇東有旗纛廟南有藉田至是始議為一壇春秋専祭先是上親祀之至是始遣官祭乃春用驚蟄後秋用秋分後三日是日上皮弁御奉天殿降香中嚴陞御殿獻官復命解嚴還宫餘冬序録國初肇祀太嵗禮官雜議因及隂陽家説十二時所直之神太祖乃定祭太嵗于山川壇之正殿而以春夏秋冬四月將分祀兩廡或謂月將非經見者案禮祭法埋少牢于泰昭祭時也相近于坎壇祭寒暑也太嵗實統四時而月將四時之候寒暑行焉今祭太嵗月將則四時與寒暑之神也載諸祀典孰謂非經見耶蕙田案此以太嵗月將即四時寒暑之神春明夢餘録洪武七年令春秋上旬擇日祭太嵗未幾以諸神從祀南郊遂省春祭明㑹典嘉靖八年令以每嵗孟春及嵗暮特祀太嵗月將之神與享太廟同日又太嵗月將嘉靖八年定前期十日太常寺請命大臣一員行事一前三日太常寺奏祭祀如常儀一陳設太嵗神位犢一羊一豕一登一鉶一簠簋各二籩豆各十爵三酒盞三十尊三帛一筐一兩廡月將共四壇每壇犢一羊一豕一登一鉶一簠簋各二籩豆各十爵三酒盞三十尊三帛三筐一一正祭典儀唱樂舞生就位執事官各司其事贊引贊就位典儀唱迎神奏樂樂止贊兩拜典儀唱奠帛行初獻禮奏樂執事官捧帛爵詣各神位前奠訖樂暫止贊引贊跪典儀唱讀祝讀訖樂復作贊俛伏興平身樂止典儀唱行亞獻禮奏樂儀同初獻惟不獻帛讀祝樂止典儀唱終獻禮奏樂儀同亞獻樂止掌祭官西向立唱賜福胙執事官捧福酒跪進于遣官右贊跪搢笏贊飲福酒訖執事官捧福胙跪進于遣官右贊受胙訖贊出笏贊俯伏興平身贊兩拜典儀唱徹饌奏樂樂止典儀唱送神奏樂贊兩拜樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位奏樂捧祝帛饌官過遣官前訖贊禮畢明史樂志嘉靖八年祀太嵗月將樂章迎神吉日良辰祀典式陳輔國佑民太嵗尊神四時月將功曹司辰濯濯厥靈昭鑒我心以候以迎來格來歆奠帛以後俱同神祗禮志嘉靖十年命禮部考太嵗壇制禮官言太嵗之神唐宋祀典不載元雖有祭亦無常典壇宇之制于古無稽太嵗天神宜設壇露祭凖社稷壇制而差小從之遂建太歲壇于正陽門外之西與天壇對中太嵗殿東廡春秋月將二壇西廡夏冬月將二壇帝親祭于拜殿中每嵗孟春享廟嵗暮祫祭之日遣官致祭春明夢餘録嘉靖十年即山川壇為天神地祗二壇以仲秋中旬致祭别建太嵗壇専祀太嵗東廡為春秋月將西廡為冬夏月將各二壇前為拜殿宰牲亭南為川井即山川壇舊井有龍蟄其中壇西南有先農壇東旗纛廟壇南耤田在焉又太嵗壇在山川壇内中為太嵗壇東西兩廡南為拜殿殿之東南砌燎爐殿之西為神庫神厨宰牲亭亭南為川井外四天門東門外為齋宫鑾駕庫外為東文門明㑹典隆慶元年議罷神祗壇惟太嵗月將特祭于山川壇如故禮部㑹議太嵗仍于嵗暮孟春遣官専祭正月遣太常寺官祭太嵗月將之神蕙田案太嵗之祭始自元明于禮固無可考然就其所謂歲神或以為木星或以為十二辰葢既云木星歲行一次十二歲一周天乃五緯之一而非别有一神若以所行之次毎歲一易者當之是即十二辰也天無星處皆謂之辰而此十二次之辰則皆取附近之星以識别之是已在二十八宿之中而又非别有一神也惟以為與月將即四時寒暑之神庶幾近之歲星所次凡十有二以子丑寅夘等十二辰紀之而斗柄所指謂之月建者亦十有二于是有月將之説逐日之神亦十有二于是又有日值之説葢皆出于釋道隂陽卜筮擇日堪輿星命之流大抵皆自星辰之類而遞推衍以及之者今撮其祀事以附星辰之末云右太歲月將風師雨師附雲神雷神蕙田案風雨雲雷之屬皆陰陽闔闢嘘吸之氣也謂各有神司之者葢有一物必有一物之精氣物愈大而其氣之發揚變化者則謂之神鄭司農注周禮云風師箕也雨師畢也皆以星宿目之顔師古注漢書則云風伯飛亷也雨師屏翳也志既言二十八宿又有風伯雨師則知非箕畢二説皆非也洪範所謂好風好雨者特以星禀隂陽五行之氣而風氣燥雨氣潤其氣同者自足相感召故月行至箕畢恒有風雨之應如民之有嗜好然乃取以相况非謂二星即風雨之神也據易㢲為風坎為雨則風雨固屬隂陽之氣所為氣感而神即憑之此所以有風師雨師之名周禮以實柴祀星辰又以槱燎祀風師雨師使二神即箕畢則星辰足以該之何故别言于下而其祀之之法又有實柴槱燎之異也此可知鄭説之未的矣顔氏據漢志而知風師雨師非箕畢良是但從楚詞而為之名字非由經典儒者所不敢道也周禮大宗伯以槱燎祀風師雨師疏春秋緯云月離乎箕風必揚沙是風師箕也詩云月離于畢俾滂沱矣是雨師畢也崔氏曰祭風師雨師之法皆謂隨其類祭之兆風師于西方不從箕星者箕星天位耳兆雨師于北郊者水位在北也丘氏濬曰註疏謂風師雨師皆星葢以洪範星有好風星有好雨好風箕宿也好雨畢宿也臣竊以謂人間有此物則夫蒼蒼之表必有所以司之者大而天天則有帝次而五行有此質則有此氣有此氣則有此神隂陽不測之謂神祀之以神必指為箕畢則執泥矣風而為箕雨而為畢可矣則夫後世所祀之雲雷又指何星以主之乎本朝郊祀既已設星辰二壇于上又有風雲雷雨之壇則亦不以風雨為星也爾雅祭名祭風曰磔注今俗當大道中磔狗云以止風此其象疏祭風曰磔者謂披磔牲體象風之散物因名云左傳哀公六年是歲也有雲如衆赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移于令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜楚辭九歌雲中君朱注謂雲神也亦見漢書郊祀志蕙田案周禮但言風師雨師無有言祭雲雷神者然觀左傳楚辭則雲神之祭三代已有之唯雷神未見明文耳風俗通楚辭説後飛廉使奔屬飛亷風伯也案周禮以槱燎祀風師風師者箕星也箕主簸揚能致風氣易㢲為長女也長者伯故曰風伯鼓之以雷霆潤之以風雨養成萬物有功于人王者祀以報功也戌之神為風伯故以丙戌日祀于西北火勝金為木相也春秋左氏傳説共工之子為𤣥㝠師鄭大夫子産禳于𤣥㝠雨師也案周禮以槱燎祀雨師雨師者畢星也詩云月離于畢俾滂沱矣易師卦也土中之衆者莫若水衆者師也雷震百里風亦如之至于泰山不崇朝而徧雨天下異于雷風其徳散大故雨獨稱師也丑之神為雨師故以己丑日祀雨師于東北土勝水為火相也蔡邕獨斷風伯神箕星也其象在天能興風雨師神畢星也其象在天能興雨祠此神以報其功也史記封禪書及秦并天下而雍有風伯雨師廟各以歲時奉祀漢書郊祀志高祖六年天下已定長安置祠祀官女巫其晉巫祠雲中君以歲時祀宫中師古曰雲中君謂雲神也平帝元始五年王莽奏分雷公風伯廟于東郊兆雨師廟于北郊兆奏可後漢書祭祀志縣邑常以丙戌日祠風伯于戌地以己丑日祠雨師于丑地用羊豕隋書禮儀志晉元帝建武元年毎以仲春仲秋并令郡國縣兼祀風伯雨師晉束晳風伯雨師不得避諱議元康七年詔書稱咸寧元年詔下尊諱風伯雨師皆為詁訓又公官文書吏人上事稱引經書者復多迴避使大義不明諸經傳咸言天神星宿帝王稱號皆不得變易本文但省事言語臨時訓避而已又議太常博士華簡言周禮大宗伯職云槱燎祭司中司命風師雨師此禮文正稱應如丙辰詔書不改其名事下五府博議案風伯之名所由來逺其在漢魏固已有之非晉氏避諱始造此號也若以異于周禮宜當變改則今國家行事神物稱號多因近代不皆率古葢亦簡易而從仍舊隨時之制不能悉變唯雨師之名實繇避諱宜如舊稱魏書禮志泰常三年為五精帝兆于四郊又風伯雨師之壇皆有别兆祭有常日牲用少牢隋書禮儀志舊禮祀司中司命風師雨師之法皆隨其類而祭之兆風師于西方者就秋風之勁而不從箕星之位兆雨師于北郊者就水位在北也隋制國城東北七里通化門外為風師壇祀以立春後丑國城西南八里金光門外為雨師壇祀以立夏後申壇皆三尺牲以一少牢高祖受命欲新制度乃命國子祭酒辛彦之議定祀典風師雨師為小祀養牲在滌一旬唐書禮樂志有司歲所常祀者立春後丑日祀風伯立夏後申日祀雨師皆一獻祝稱天子謹遣舊唐書禮儀志武徳貞觀之制立春後丑祀風師于國城東北立夏後申祀雨師于國城西南各用羊一籩豆各二簠簋各一唐書禮樂志小祀風伯雨師其高皆三尺廣皆丈者小祀之壇也小祀皆二象尊實醍齊上尊亦實明水四時祭風師雨師籩八豆八簠一簋一俎一羊一開元禮祀風師雨師靈星司中司命司人司禄儀立春後丑日祀風師前祀三日諸應祀之官散齋二日致齋一日並如别儀前祀一日晡後一刻諸衛令其屬各以其方器服守衛壝門俱清齋一宿衛尉設祀官次于東壝之外道南北向以西為上陳饌幔于内壝東門之外道南北向郊社令積柴于燎壇其壇在神壇之左内壝之外方五尺高五尺開上南出户祀日未明三刻奉禮郎設祀官位于内壝東門之内道北執事位于道南毎等異位俱重行西向皆以北為上設望燎位當柴壇之北南向設御史位于壇上西南隅東向令史陪其後于壇下設奉禮位于祀官西南贊者二人在南差退俱西向又設奉禮贊者位于燎壇東北西向北上設祀官門外位于東壝之外道南毎等異位重行北向以西為上郊社令帥齋郎設酒罇于壇上東南隅象罇二寘于坫北向西上設幣篚于罇坫之所設洗于壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執罇罍篚冪者各位于罇罍篚冪之後太官令帥宰人以鑾刀烹牲于厨祀日未明二刻太史令郊社令升設風師神座于壇上近北南向席以莞設神位于座首未明一刻諸祀官各服其服郊社令良醖令各帥其屬入實罇罍及幣實以醍齊其𤣥酒實以上罇太官令帥進饌者實諸籩豆簠簋入設于内壝東門之外饌幔内奉禮帥贊者先入就位贊引引御史太祝及令史與執罇罍篚冪者入當壇南重行北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜執罇者陞自東陛立于罇所執罍洗篚冪者各就位贊引引御史太祝詣壇東陛升行掃除于上令史行掃除于下訖各引就位質明謁者引祀官贊引引執事者俱就門外位謁者贊引各引祀官以次入就位立定奉禮曰衆官再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位太官令出帥進饌陳于門外初太官令出太祝跪取幣于篚興立于罇所謁者引獻官升自南陛進當神座前北向立太祝以幣東向進獻官受幣進北向跪奠于神座俛伏興少退北面再拜訖謁者引獻官降復位太官令引饌入詣南陛升壇太祝迎引于壇上設于神座前籩豆葢冪先徹乃升簠簋既奠却其葢于下設訖太官令以下降復位太祝還罇所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官自南陛升壇詣罇所執罇者舉冪獻官酌醍齊訖謁者引獻官進神座前北向跪奠爵俛伏興少退北向立太祝持版進于神座之右東面跪讀祝文曰維某年歲次月朔日子嗣天子謹遣具位臣姓名敢昭告于風師含生開動必佇振發功施造物實彰祀典謹以制幣犧齊粢盛庶品明薦于神尚享訖興獻官再拜太祝進跪奠版于神座興還罇所獻官拜訖謁者引獻官立于南方北向太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進爵復于坫獻官俛伏興太祝帥齋郎進俎太祝跪減神前胙肉加俎興以俎西向進獻官受以授齋郎謁者引獻官降復位太祝進跪徹豆籩還罇所徹者籩豆各一少移于故處奉禮曰賜胙贊者唱衆官再拜在位者皆拜已飲福受胙者不拜謁者進獻官之左白請就望燎位遂引獻官就望燎位南向立太祝執篚跪取幣祝版齋郎以俎載牲體黍稷飯爵酒興自南陛降壇南行當柴壇南東行自南陛登柴壇以幣祝版饌物寘柴上户内訖奉禮曰可燎東西面各二人以炬燎火半柴謁者進獻官之左白禮畢遂引獻官出贊引引執事者以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出立夏後申日祀雨師有司行事祝文曰百昌萬寳式仰膏澤率遵典故用備常祀其首尾與風伯文同文獻通考天寳四載勅風伯雨師濟時育物謂之小祀頗紊彞倫前載衆星已為中祀永言此義固合同升自今以後并宜入中祀仍令諸郡各置一壇因春秋祭社之日同升享祠九月十六日勅諸郡風伯壇置在社壇之東雨師壇在社壇之西各稍北數十步其壇卑小于社壇其祀風伯用立春後丑祀雨師用立夏後申各用羊一籩豆各十簠簋俎一酒三斗應縁祭須一物已上並以當郡公廨社利充如無即以當處官物充其祭官准祭社例取太守以下充蕙田案風師雨師皆天神也而天寳祥符皆命設壇于社壇東西天神之祭接之北郊不知于義何取天寳五載詔曰發生振蟄雷為其始畫卦陳象威物效靈氣實本乎隂陽功先施于動植今雨師風伯久列于常祀惟此震雷未登于羣望其已後毎祀雨師宜以雷師同壇祭共牲别置祭器丘氏濬曰此後世祀雷之始周禮有風師雨師漢以丙戌日祀風師于戌地以己丑日祀雨師于丑地宋人兆風師于西郊祠以立春後丑日兆雨師于北郊祀以立夏後申日兆司中司命司禄于南郊祠以立秋後亥日以雷師從雨師之位以司民從司中司命司禄之位皆各壇為祭未甞合而為一本朝于風雨雷之外又加以雲合以為一壇以從獻于郊天大祀又為壇于郊壇之西毎歲仲秋天子又躬祀焉其與並祀者太歲及五嶽五鎮四海四瀆之神而以京畿山川四季月將京都城隍從享所謂太歲月將城隍與夫風雨雷師之外而加以雲皆前代所未甞祀者也其視前代所祀九宫貴神之屬葢有間矣夫雲興而雨霈既祀夫雨而獨遺乎雲可乎峙形于兩間者既已享祀而流行于四時以司民興作耕作之候者而無其祭可乎名山大川遼絶于千萬里之外者既皆入于望祀而宸居所涖之地六宫百司三軍百姓之所居止者反遺之可乎聖祖之見所以卓越千古非獨人蒙其至治之澤而凡㝠漠之中有焄蒿之感者莫不咸受其職焉嗚呼至哉圖書集成肅宗實録乾元二年四月以久旱祭風伯雨師舊唐書禮儀志代宗永泰二年禮儀使右常寺于休烈請依舊祠風伯雨師于國門舊壇復為中祠從之冊府元龜徳宗貞元二年四月壬午太常寺奏祭風伯雨師祝版准開元禮凡有司攝事祝版應御署者進署訖皆北面再拜其風伯雨師本是小祀並有司行事天寳三載始升諸星為中祀亦無皇帝親祀風伯雨師之文命有司自是常典不同攝祭其祝版准中祀例合進署其再拜案禮無文詔曰風師雨師升為中祀有烈祖成命况在風雨事切蒼生令雖無文朕當屈已再拜以申子育萬民之意貞元三年閏五月徙風師壇于滻水東文獻通考憲宗元和十五年太常禮院奏來年正月三日皇帝有事于南郊同日立春後丑祀風師案周禮大宗伯以槱燎祀風師鄭𤣥云風箕星也故今禮立春後丑于城東北就箕星之位為壇祭之禮祀昊天上帝于圜丘百神咸秩箕星從祀之位在壇之第三等伏以皇帝有事南郊徧祭之儀百神咸在其五方帝并日月神州已下緣對昊天上帝皇地祗尊不得申並為從祀悉無上公行事并御署祝版之儀風師既是星神厭降之儀便當陪祭如非遇郊祀其特祭如常儀宋史禮志凡祀典皆領于太常歲