body:
  text: 五禮通考卷一百七十七刑部尚書秦蕙田撰嘉禮五十學禮續漢書禮儀志永平二年三月上始帥羣臣養三老五更于辟雍先吉日司徒上太𫝊若講師故三公人名用其徳行年耆髙者一人為老次一人為更皆服都紵大袍單衣皁緣領袖中衣冠進賢扶玉杖五更亦如之不杖皆齋于太學講堂其日乗輿先到辟雍禮殿御座東廂遣使者安車迎三老五更天子迎于門屛交禮道自阼階三老升自賔階至皆天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醤而饋執爵而酢祝鯁在前祝饐在後五更南面公進供禮亦如之明日皆詣闕謝恩以見禮遇大尊顯故也後漢書明帝本紀永平二年冬十月壬子幸辟雍初行養老禮詔曰光武皇帝建三朝之禮而未臨享眇眇小子屬當聖業間暮春吉辰初行大射令月元旦復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醤公卿饌珍朕親袒割執爵而酳祝哽在前祝咽在後升歌鹿鳴下管新宫八佾具修萬舞于庭朕固薄徳何以克當易陳負乗詩刺彼已永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無徳不報無言不酬其賜榮爵闗内侯食邑五千户三老五更皆以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋恤幼孤恵鰥寡稱朕意焉八年十月丙子臨辟雍養三老五更文獻通考安帝以魯丕為三老又以李充為三老楊統位至光祿大夫為國三老靈帝以袁逢為三老賜以玉杖譙周五經然否論漢中興定禮儀羣臣欲令三老答天子拜城門校尉董鈞駁曰養三老所以教事父之道也若答拜是使天下答子拜也詔従鈞議譙周論之曰禮尸服上服猶以非親之故答子拜士見異國君亦答拜是皆不得視猶子也虞氏喜曰且據漢儀於門屛交禮交禮即答拜中興謬従鈞議後革之深得其意馬氏端臨曰案古人養老之禮有養于鄉者所謂五十養于鄉王命公侯伯子男及羣吏曰反養老于東序大司徒以保息六養萬民二曰養老是也有養於國者天子視學設三老五更羣老之席位執醤親饋執爵親酳是也漢初每鄉及縣皆有三老嵗首則使人存問賜以束帛酒肉或賜以爵乃古人養于鄉之意而國學養老天子親講之禮則至東漢始行之然東漢亦時有下郡縣存問養老之詔魏志高貴鄉公本紀甘露三年秋八月丙寅詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡徳行以充其選闗内侯王祥履仁秉義雅志淳固闗内侯鄭小同温恭孝友帥禮不忒其以祥為三老小同為五更車駕親率羣司躬行古禮焉通典甘露二年天子親帥羣司行養老之禮于太學命王祥為三老鄭小同為五更王祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥勵魏書孝文帝本紀太和十五年八月壬辰議養老十六年八月己酉以尉元為三老游明根為五更又養國老庶老冊府元龜太和十六年八月詔曰夫大道凝虚至徳冲挹故後王法嘉猷以鄉世聖人崇謙光而隆美是以天子父事三老兄事五更所以順孝悌于萬國垂教本于天下自非道高識博孰能處之是以五帝憲徳三王乞言若求備一人同之古哲叔世之老孰能克堪師上聖則難為其舉𫝊中庸則易為選朕既庸寡徳謝曩哲老更之選差可有之前司徒山陽郡公尉元前大鴻臚卿新太伯游明根並元亨利貞明允誠素少著英風老敷雅迹位顯台宿終歸私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選于是養三老五更于明堂國老庶老于階下帝再拜三老親袒割牲執爵而饋于五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施用人之所崇莫重於孝順然五孝六順天地之所先願陛下重之以化四方臣既年衰不究遠趣心耳所及敢不盡誠帝曰孝順之道天地之經今承三老明言銘之于懷明根曰夫至孝通靈至順感幽孝順之道無所不格願陛下念之以濟黎庶臣年志朽弊識見闇昧然在心之慮不敢不盡帝曰五更助三老以言至範敷展徳音當克已復禮以尊所授禮畢乃賜步輓一乗詔曰夫尊老尚更列聖同致欽年敬徳綿哲齊軌朕雖道謝𤣥風識昧睿知然仰稟先誨全遵猷㫖故推老以徳立更以言父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以充徳懸車懿量歸老故尊老以三事更以五雖老更非官耋耄罔祿然稟事既高宜加殊養三老可給上公之祿五更可食元卿之俸供養之味亦同其列其後車駕幸鄴明根朝于行宫詔曰游五更養素蓬簷歸于衡里可謂朝之舊徳國之老臣可賜帛五百匹穀五百斛勅太官備送珍羞後車駕幸鄴又朝行宫賜穀帛如前為造甲第國有大事常璽書訪之隋書禮儀志齊制仲春令辰陳養老禮先一日三老五更齊於國學皇帝進賢冠𤣥紗袍至辟雍入總章堂列宫懸王公以下及國老庶老各定位司徒以羽儀武賁安車迎三老五更于國學並進賢冠元服黒舄素帶國子生黒介幘青衿單衣乗馬従以至皇帝釋劍執珽迎于門内三老至門五更去門十步皆降車以入皇帝拜三老五更攝齊答拜皇帝揖進三老在前五更在後升自右階就筵三老坐五更立皇帝升堂北面公卿升自左階北面三公授几杖卿正履國老庶老各就位皇帝拜三老羣臣皆拜不拜五更乃坐皇帝西向肅拜五更進珍羞酒食親袒割牲執醤以饋執爵而酳以次進五更又設酒酏於國老庶老皇帝升御座三老乃論五孝六順典訓大綱皇帝虚躬請授禮畢而還周書武帝本紀保定三年四月戊午幸太學以太傅燕國公于謹為三老而問道焉于謹𫝊保定三年四月詔曰樹以元首主乎教化率民孝悌置之仁夀是以古先明后咸若斯典立三老五更躬自袒割朕以眇身處兹南面何敢遺此黄髮不加尊敬太傅燕國公謹執徳淳固為國元老饋以乞言朝野所屬可為三老有司具禮擇日以聞謹上表固辭詔答不許又賜延年杖高祖幸太學以食之三老入門皇帝迎拜門屛之間三老答拜有司設三老席于中楹南向太師晉國公護升階設几于席三老升席南面憑几而坐以師道自居大司馬楚國公寧升階正舄皇帝升階立于斧扆之前西面有司進饌皇帝跪設醤豆親自袒割三老食訖皇帝又親跪授爵以酳有司撤訖皇帝北面立而訪道三老乃起立于席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老答曰木受繩則正后従諫則聖自古明王聖主皆虚心納諫以知得失天下乃安唯陛下念之又曰為國之本在乎忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必須有法法者國之綱紀綱紀不可不正所正在于賞罰若有功必賞有罪必罰則有善者日益為惡者日止若有功不賞有罪不罰則天下美惡不分下民無所措其手足矣又曰言行者立身之基言出行隨誠宜相顧願陛下三思而言九慮而行若不思不慮必有過失天子之過乃無大小如日月之蝕莫不知者願階下慎之三老言畢皇帝再拜受之三老答拜焉禮成而出唐開元禮皇帝養老于太學陳設前三日尚舍直長設大次于學堂之後隨地之宜設三老五更次于學堂南門外之西羣老次于其後俱東向設羣官次文官于門外之東重行西向武官于羣老之西重行東向皆北上前一日尚舍奉御設御座于堂上東序西向莞筵紛純加藻席畫純次席黼純設三老座于西楹之東近北南向設五更座于西階上東向設國老三人座于三老座西俱不屬焉皆莞筵紛純加藻席畫純設衆座國老座于堂下西階之西東面北上皆蒲筵緇布純加莞席縣帛純若三品以上則莞筵紛純加藻席畫純凡五品以上致仕者為國老設庶老座于國老之後皆蒲筵緇布純六品以下致仕者為庶老太樂令展宫懸于學堂之庭設登歌于堂上及舉麾位等皆准元會之儀典儀設文官五品以上位于懸東六品以下在其南俱重行西向北上武官五品以上位于懸西六品以下在其南當文官俱重行東向北上蕃客分方位于文武官六品之南若有諸州使人分方位於文武官九品之後學生分位于文武官之後奉禮設門外位如設次之式尚舍奉御設罇于東楹之西北向左酒有坫以置爵鑾駕出宫如讀令儀養老仲秋之月擇吉辰皇帝親養三老五更于太學所司先奏定三師三公致仕者用其徳行及年高者一人為三老次一人為五更尚食先具牢饌鑾駕将至通事舍人引先置之官皆就門外位學生俱青衿服入就位鑾駕至太學門迴輅南向侍中跪奏請降俛伏興皇帝降輅乗輿入大次繖扇侍衞如常通事舍人引文官五品以上従駕之官皆就門外位太樂令帥工人二舞就位如正會之禮通事舍人引羣官客使入就位鑾駕出宫量時刻遣使迎三老五更于其第三老五更俱服進賢冠乗安車前後導従如常禮其國老庶老則有司先戒之鑾駕既至太學三老五更及羣老等俱赴集其次羣老各服其服太常少卿贊三老五更俱出次引立于學堂南門外之西東面北上奉禮贊羣官出次引立于三老五更之後太常博士引太常卿升立于學堂北户之内當戸北向侍中版奏外辦皇帝出戸侍衞如常侍中負寳陪従如式殿中監進大珪皇帝執大珪博士引太常卿太常卿引皇帝每太常卿前導皆博士先引協律郎跪俛伏舉麾太和之樂作皇帝降迎三老于門内之東西面立侍臣従立于皇帝之後太常卿與博士退立于左皇帝立定樂止三老五更皆杖各二人夾扶左右太常少卿引道敦史執筆以従三老入門舒和之樂作三老五更立于門西東面北上奉禮引羣官隨入立於其後初三老立定樂止太常卿前奏請再拜退復位皇帝再拜三老五更去杖攝齊以答再拜畢皇帝揖進三老在前五更従仍杖夾扶入初至階皇帝揖升俱就座後揖立樂止侍衞之官量人従升皇帝西面再拜三老三老南面答再拜皇帝西面再拜五更五更答再拜休和之樂作三老五更俱坐三公授几九卿正履訖殿中監尚食奏御進珍羞及黍稷等皇帝省之遂設于三老前樂止太常卿引皇帝詣三老座前執醤而饋訖太常卿引皇帝詣酒罇所取爵侍中贊酌酒訖太常卿引皇帝進執爵而酳尚食奉御以次進珍羞酒食于五更前國老庶老等皆坐及設酒席于國老庶老前國老庶老等皆食皇帝即座太樂令引工升奏韶和之樂三終三老乃論五孝六順典訓大綱格言宣于上恵音被于下皇帝乃虚躬請受敦史執筆錄善言行事終二舞坐于懸中訖禮畢三老以下降筵太常少卿及奉禮引導皆如初太常卿引皇帝従以降階太和之樂作皇帝逡巡立于階前樂止三老五更出舒和之樂作太常卿引皇帝升立于階上三老五更出門樂止侍中前奏禮畢退復位太常卿引皇帝降還大次三老五更升安車導従而還通事舍人引羣官及學生等以次出明日三老詣闕表謝鑾駕還宫如讀令儀蕙田案唐書禮樂志亦同而文較略今不復載宋史禮志養老于太學皇帝服通天冠絳紗袍乗金輅至太學酌獻文宣王三祭酒再拜歸御幄比車駕初出量時刻遣使迎三老五更于其第三老五更俱服朝服乗安車導従至太學就次國老庶老有司預戒之各服朝服集于其次大樂正帥工人二舞入立於庭東上閤門御史臺太常寺客省四方館自下分引百官宗室客使學生等以次入就位如視學班太常博士贊三老五更俱出次引國老庶老立于後重行異位禮直官通事舍人引左輔奏請中嚴少頃又奏外辦皇帝出大次侍衞如常儀大樂正令撞黄鍾之鐘右五鐘皆應協律郎跪俛伏舉麾興宫架乾安之樂作皇帝即御座樂止典儀曰再拜在位官皆再拜三老五更杖而入各左右二人夾扶太常博士前引史臣執筆以従三老五更入門宫架和安之樂作至宫架北北向立以東為上奉禮郎引羣老隨入位于其後樂止博士揖進三老在前五更在後仍杖夾扶宫架和安之樂作至西階下樂止博士揖三老五更自西階陞堂國老庶老立于堂下三老五更當御座揖羣老亦揖皇帝為興次奉禮郎揖國老升堂博士引三老五更奉禮郎引國老以下各於席後立典儀贊各就坐贊者承𫝊宫架尊安之樂作三老五更就坐三公授几九卿正履訖殿中監尚食奉御進珍羞及黍稷等先詣御座前進呈遂設于三老前樂止尚食奉御詣三老座前執醤而饋訖尚醖奉御詣酒尊所取爵酌酒奉御執爵奉於三老次太官良醖令以次進珍羞酒食於五更羣老之前皆食大樂正引工人升登歌奏恵安之樂三終史臣既錄三老所論善言善行宫架作申安之樂憲言成福之舞畢文舞退作受成告功之舞畢三老以下降筵博士引三老五更於堂上當御座前奉禮郎引羣老復位俱揖皇帝為興三老五更降階至堂下宫架和安之樂作出門樂止禮直官通事舍人引左輔前奏禮畢退復位典儀贊拜訖皇帝降座太常卿導還大次百僚以次退車駕還宫三老五更升安車導従還翼日詣闕表謝王圻續通考世宗嘉靖中祭酒吕柟定視學養老儀注惜不果行案柟據開元禮圗㕘定養老禮儀嵗季春之月擇吉日行養老禮於太學有司先奏定三師三少致仕者用徳行年高一人為三老次一人為五更三品上下年徳高邵者為羣老併開具致政之老與其孤姓名事狀以聞前期三日設御幄于太學堂後設御座于太學堂正中南向莞筵紛純加藻席畫純次席黼純設三老座于西楹近北東向設五更座次三老東向皆莞筵粉純加藻席畫純設羣老位于西階上東向皆蒲筵緇布純加莞席𤣥帛純凡席皆不相屬設致政之老與其孤館幕于門外太常卿展宫懸列舞綴于庭設升歌于堂上及舉麾位等一如元會之儀有司設罇于東楹之西北向左𤣥酒有坫以置爵前期一日有司具牲帛祭器祭先師孔子上遣官行禮齋宿省牲陳設奠猷一如丁祭之儀惟祝文曰維某年月日朔甲子皇帝謹遣某致祭于先師孔子是月某日養三老五更羣老于太學用幣敬伸奠告以顔子曽子子思子孟子配尚享昧爽卒事復命又設先老位于廟門之前陳設如儀至日黎明鼓徴警衆設六佾舞生皆至駕乃出宫太學官率諸生迎駕于太學路左駕至太學官及諸生俯伏稽首興𫝊制迎三老五更于其第三老五更俱朝服乗安車導従如常儀擇史官充惇史二人朝服従之其羣老及致政之老與其孤則有司先戒之宿于太學以俟駕至太學堂上命官釋奠于先老禮畢太常卿導上入御幄易冠服出陞御座執大圭協律郎跪俯伏舉麾金奏姑洗之均樂止太常少卿導三老五更皆杖各二人夾扶左右惇史執筆以従自西階升堂上與揖遜欲拜二老五更去杖攝齊皆稽首遜辭上不果拜乃揖就座三老五更皆坐三老授几九卿正履進珍饈及黍稷等上省之遂設于三老五更前工升歌鹿鳴三終太常卿引上詣三老座前以大珪授侍臣執醤而饋訖有司以次進珍饈酒食于五更前又設酒食于羣老前太常卿引上詣酒罇所取爵贊酌酒訖太常卿引上詣三老座前執爵而酳訖上即座三老以下皆坐光祿卿進酒上飲酒三老以下坐食飲酒各三爵笙入三終光祿卿進加餚羮飲酒各三爵間歌三終三老乃論父子君臣長幼之道治政之要五更飲亦如之上俱虚躬聴受惇史執筆錄之乃大合六樂羽舞大韶以雲門咸池合之干舞大武以大夏大􅇴合之上興冕而總干三老以下皆興稽首遜辭上復即座三老以下皆復坐飲酒各三爵樂九變畢太常卿跪奏樂闋致政之老與其孤館于門外者飲酒食畢皆入侍制命有司曰養爾老幼毋違朕命三老以下趣出賜三老五更襲衣冠帶牢醴綵幣其餘帛衣米肉三老以下序立于庭皆拜三稽首興分班序立有司奏禮畢上興出就駕還宫明日三老率五更以下詣闕表謝蕙田案視學養老之禮後世惟漢明帝魏高貴鄉公北魏孝文帝周武帝行之如北齊唐宋明雖有養老辟雍之儀其實皆未之行也右歴代視學養老之禮漢書高祖本紀二年二月舉民年五十以上有修行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相教後勿繇以十月賜酒肉文帝本紀元年三月詔曰老者非帛不煖非肉不飽今嵗首不時使人存問長老又無布帛酒肉之賜将何以佐天下子孫孝養其親今聞吏稟當受鬻者或以陳粟豈稱養老之意哉具為令有司請令縣道年八十以上賜米人月一石肉二十斤酒五斗其九十以上又賜帛人一疋絮三斤賜物及當稟鬻米者長吏閲視丞若尉致不滿九十嗇夫令史致二千石遣都吏循行不稱者督之刑者及有罪耐以上不用此令武帝本紀建元元年春二月賜民爵一級年八十復二算九十復甲卒夏四月己巳詔曰古之立教鄉閭以齒朝廷以爵扶世導民莫善於徳然則於鄉里先耆艾奉高年古之道也今天下孝子順孫願自竭盡以承其親外迫公事内乏資財是以孝心闕焉朕甚哀之民年九十以上已有受鬻法為復子若孫令得身帥妻妾遂其供養之事元狩元年夏四月詔曰朕嘉孝弟力田哀夫老眊孤獨鰥寡或匱於衣食甚憐愍焉其遣謁者巡行天下存問致賜曰皇帝使謁者賜縣三老孝者帛人五匹鄉三老弟者力田帛人三匹年九十以上及鰥寡孤獨帛人二匹絮三斤八十以上米人三石宣帝本紀地節三年春三月詔加賜鰥寡孤獨高年帛二千石嚴教吏謹視遇毋令失職元康四年春正月詔曰朕惟耆老之人髪齒墮落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十以上非誣告傷人他皆勿坐元帝本紀建昭四年夏四月詔遣諫大夫博士賞等二十一人循行天下存問耆老平帝本紀元始元年春正月詔天下吏比二千石以上年老致仕者參分故祿以一與之終其身後漢書世祖本紀建武六年春正月辛酉詔郡國有穀者給稟高年二十石勉加循撫無令失職章帝本紀章和元年秋七月壬戌詔曰秋令是月養衰老授几杖行糜粥飲食其賜高年二人共布帛各二匹以為醴酪和帝本紀永元十五年秋九月壬午南巡守賜所過三老官屬及民百年者錢布各有差安帝本紀元初四年秋七月辛丑詔曰月令仲秋養衰老授几杖行糜粥方今案比之時郡縣多不奉行雖有糜粥糠粃相半長史怠事莫有躬親甚違詔書養老之意其務崇仁恕賑䕶寡獨稱朕意焉順帝本紀陽嘉三年五月戊戌詔賜民年八十以上米人一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤桓帝本紀建和二年春正月皇帝加元服大赦天下年八十以上賜米酒肉九十以上加帛二匹綿三斤永興二年十一月校獵上林苑遂至函谷闗賜所過道傍年九十以上錢各有差魏志明帝本紀太和六年三月癸酉行東巡所過存問高年晉書惠帝本紀永平元年五月壬午賜高年鰥寡力田者帛人三匹成帝本紀咸和元年春二月丁亥賜鰥寡孤老米人二斛宋書孝武帝本紀大明七年二月詔故邑耆舊在目罕存年世未逺已殲太半撫迹惟事傾慨兼著太宗燕故晉陽洽恩世祖流仁濟畿暢澤永言往猷思廣前賚遣使巡慰厚賜粟帛高年加以羊酒冬十月車駕巡南豫州詔曰朕巡幸所經先見百年者及孤寡老疾並賜粟帛十二月行幸歴陽高年孤疾賜帛十匹南齊書武帝本紀永明五年春正月辛卯詔諸孤老並賜糧餼魏書太武帝本紀太延元年十一月丙子行幸鄴諸所過對問高年太平真君七年二月丙戌幸長安存問父老文成帝本紀和平二年三月幸中山至于鄴遂幸信都輿駕所過皆親對高年問民疾苦詔民年八十以上一子不従役四年春三月乙未賜京師民年七十以上太官厨食以終其年孝文帝本紀延興三年十一月戊寅詔年八十以上一子不従役癸巳太上皇帝南巡至于懐州所過賜高年布帛太和元年冬十月癸酉宴京邑耆老年七十以上于太華殿賜以衣服又詔七十以上一子不従役三年夏五月辛酉詔曰昔四代養老問道乞言朕雖冲昧每尚其美今賜國老各衣一襲綿五斤絹布各五疋十一月癸卯賜京師貧窮高年疾患不能自存者衣服布帛各有差四年秋七月壬子改作東明觀詔會京師耆老賜錦綵衣服几杖稻米蜜麪復家人不徭役十六年十二月賜京邑老人鳩杖十七年八月壬寅車駕至肆州民年七十以上賜爵一級戊申幸并州親見高年問所疾苦九月戊辰濟河詔洛懐并肆所過四州之民百年以上假縣令九十以上賜爵三級八十以上賜爵二級十八年春正月車駕南巡詔相兗豫三州百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤老鰥寡不能自存者賜粟五石帛二匹秋七月車駕北巡八月南還所過皆親見高年問民疾苦貧窮孤老賜以粟帛丙寅詔六鎮及禦夷城人年八十以上而無子孫兄弟終身給其廩粟七十以上家貧者各賜粟十斛又詔諸北城人年滿七十以上及廢疾之徒校其元犯以凖新律事當従坐者聴一身還鄉又令一子扶養終命之後乃遣歸邉餘如此之犯年八十以上皆聴還十一月辛未朔詔冀定二州民百年以上假以縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡孤獨不能自存者賜以穀帛十二月丁卯詔郢豫二州之民百齡以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡鰥老不能自存者賜以穀帛十九年夏四月辛亥詔賜百嵗以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡老疾不能自存者賜以穀帛六月壬子詔濟州東郡滎陽及河南諸縣車駕所經者百年以上賜假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤老鰥寡不能自存者賜以穀帛冬十月甲辰曲赦相州民百年以上假郡守九十以上假縣令八十以上賜爵三級七十以上賜爵二級孤老痼疾不能自存者賜以穀帛二十年二月丙午詔畿内七十以上暮春赴京師将行養老之禮三月丙寅宴羣臣及國老庶老于華林園詔國老黄耉以上假中散大夫郡守耆年以上假給事中縣令庶老直假郡縣各賜鳩杖衣裳二十一年春正月乙巳車駕北巡二月壬戌次于太原親見高年問所不便乙丑詔并州士人年六十以上假以郡守三月乙未車駕南巡己酉次離石甲寅詔汾州民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級夏四月辛未行幸長安乙亥親見高年問所疾苦五月己丑車駕東旋庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣令七十以上假荒縣庶老以年各減一等七十以上賜爵三級孤寡鰥貧窮痾廢疾各賜帛二匹穀五斛秋九月丙申詔曰哀貧恤老王者所先鰥寡六疾尤宜矜愍可􅃯司州洛陽之民年七十以上無子孫六十以上無期親貧不自存給以衣食及不滿六十而有廢痼之疾無大功之親窮固無以自療者皆于别坊遣醫救䕶給醫師四人豫請藥物以療之孝明帝本紀熙平二年夏四月丁酉詔京尹所統百年以上賜大郡板九十以上賜小郡板神龜元年春正月壬申詔京畿百年以上給大郡板九十以上給小郡板八十以上給大縣板七十以上給小縣板諸州百姓百嵗以上給小郡板九十以上給上縣板八十以上給中縣板鰥寡孤獨不能自存者賜粟五斛帛二匹正光四年秋七月詔曰達尊斯在齒預一焉崇敬黄耉先代通訓故方叔以元老處位充國緣自強見留雖七十致仕明乎典故然以徳尚壯許其縶維今庶寮之中或年迫懸車循禮宜退但少收其力老棄其身言念勲舊睠然未忍或戴白在朝未當外任或停私厯紀甫受考級如此之徒雖滿七十聴其蒞民以終常限或新解郡縣或外佐始停已滿七十方求更敘者吏部可依令不奏其有高名俊徳老成髦士灼然顯達為時所知者不拘斯例若才非秀異見在朝官依令合解者可給本官半祿以終其身使辭朝之叟不恨歸于閭巷矣北齊書文宣帝本紀天保九年秋九月辛丑給京畿老人劉奴等九百四十三人板職及杖帽各有差孝昭帝本紀皇建元年秋八月乙酉詔諸郡國老人各授板職賜黄帽鳩杖周書明帝本紀二年夏六月己巳板授高年刺史守令武帝本紀保定元年春正月甲戌詔先經兵戎官年六十已上及民七十已上節級板授官三年秋七月丁丑幸津門問百年賜以錢帛又賜高年板職各有差建徳二年冬十二月癸巳詔曰尊年尚齒列代宏規序舊酬勞哲王明範朕嗣承宏業君臨萬邦驅此兆庶寘諸仁夀軍民之間年多耆耋眷言衰暮宜有優崇可頒受老職使榮霑邑里隋書高祖本紀開皇七年冬十月癸亥幸蒲州丙寅宴父老煬帝本紀大業五年春二月丙辰宴耆舊四百人于武徳殿頒賜各有差冬十月癸亥詔曰優徳尚齒載之典訓尊事乞言義彰膠序鬻熊為師取非筋力方叔元老克壯其猷朕永言稽古用求至治是以龎眉黄髪更令收敘務簡秩優無虧藥膳庶等卧治佇其宏益今嵗耆老赴集者可于近郡處置年七十以上疾患沈滯不堪居職即給賜帛送還本郡其官至七品以上者量給廩以終厥身七年春二月幸于涿郡壬午詔曰今往涿郡巡撫民俗其河北諸郡及山西山東年九十以上者板授太守八十者授縣令冊府元龜唐高祖武徳二年幸稷州召父老置酒高會賜帛五年三月宴京城父老賜帛唐書太宗本紀貞觀三年四月戊戌賜孝義之家粟五斛八十以上二石九十以上三石百嵗加絹二疋冊府元龜貞觀三年十月幸隴州詔岐隴二州八十以上賜物百嵗以上大加優恤唐書太宗本紀貞觀五年十二月癸卯賜新豐高年帛六年三月丁丑賜民八十以上粟帛冊府元龜貞觀六年五月宴長安父老九月幸慶善宫賜故老帛十一年正月宴長安父老于元武門賜以穀帛三月幸洛陽宫宴父老于乾元殿賜以粟帛唐書太宗本紀貞觀十五年四月乙未賜民八十以上物冊府元龜貞觀十五年正月如洛陽所過賜高年穀帛十一月蒐于伊闕詔所經之縣遣使存問高年賜帛各有差十八年十月癸卯以将征高麗宴雍州父老百嵗以上氈被袍各一帛十匹粟十石九十以上物五段粟五石八十以上物三段粟三石十一月壬申至雒州遣使齎璽書詣鄭汝懷澤四州問高年宴賜各有差壬午宴雒州父老一百九十人于儀鸞殿班賜有差十九年二月發雒陽征遼所經州縣高年賜粟帛辛亥次河陽女子吕年百嵗太宗幸其宅存問之賜氈帛袍各一綿帛十段次汲縣女子翟張並年百嵗太宗幸其宅存問之賜物如河陽十月次營州召父老年七十以上賜繒帛綾錦等永徽六年十月八十以上老人各賜粟二石帛三段百嵗以上各賜粟五石帛十段顯慶二年正月幸雒陽二月父老百嵗以上賜氈被一具袍一領絲絹十段粟二十石仍遣使就家存問九十以上賜絲絹五段十月幸鄭州賜八十以上老人粟帛有差閏十二月以駕幸東都詔所經處八十以上老人賜氈被袍綿及粟有差唐書高示本紀顯慶五年正月甲子如并州己巳次長平賜父老布帛二月丙戌赦并州及所過州縣民年八十以上版授刺史縣令三月丙午皇后宴親族鄰里于朝堂婦人八十以上版授郡君賜氈衾粟帛冊府元龜龍朔元年九月駕幸河南縣婦人張氏年百三嵗遂賜絹三十匹氈被一具皇后太子亦親問賜以衣及繪綵唐書高宗本紀總章二年九月壬寅如岐州乙巳賜高年粟帛冊府元龜咸享元年十一月将幸東都宴京城父老有不能行者仍許子弟扶至殿庭賜物及黄帔而遣之開元二年九月引京師侍老宴于含元殿庭詔曰古之為政先于尚老居則致養禮𫝊三代行則就見制問百年葢皇王之勸人教黎庶之為子朕寅奉休歴祗膺聖謨因秋歸而嵗成屬星見于郊祀念其将至尤重乞言俾伸恩于几杖期布恵于鄉國九十以上宜賜几杖八十以上宜賜鳩杖所司凖式天下諸州侍老宜令州縣便設酒食一准京城賜几杖其婦人則送几杖于其家三年十月詔古者親問百年義在養老其侍老年九十以上賜物四段綿帛各一匹天寳元年正月改元詔天下侍老八十以上者宜委縣官毎加存問仍量賜粟帛侍丁者令其養母孝假者矜其在喪此王政優容俾伸情理而官吏不依令式多雜役使自今以後更不得然八載閏六月冊尊號禮畢詔高年給屬存養因時定式務廣仁恩其天下百姓丈夫七十以上婦人七十五以上宜各給一人充侍仍自簡擇至八十以上依常式處分長慶元年正月郊祀禮畢大赦天下百姓高年者賜粟及綿絹有差三月詔官内高年不能自存者差官就問給賜粟帛冊府元龜後唐同光元年四月即位制曰應諸道管内有高年踰百嵗者便與給復永俾除名自八十至九十者與一子免役州縣不得差徭天成二年十月辛丑詔曰敬老之規前王所重養親之道為子居先應有年八十以上及家長有廢疾者宜免一丁差役俾遂奉養後晉天福二年四月丁亥制曰洪荒之内鄉黨之中宜宏養老之規式表問年之道天下百姓有年八十以上者與免一丁差徭仍令逐處簡署上佐官宋史太祖本紀開寳五年春正月庚子前盧縣尉鄢陵許永年七十有五自言父瓊年九十九兩兄皆八十餘乞一官以便養因召瓊厚賜之授永鄢陵令太宗本紀淳化四年春二月壬戌召賜京城高年帛百嵗者一人加賜塗金帶是日雨雪大寒再遣中使賜孤老貧窮人千錢米炭真宗本紀咸平二年冬十一月辛丑賜京城父老衣帛十二月戊午駐蹕澶州壬戌賜澶州父老錦袍茶帛甲子次大名丁卯召見大名府父老勞賜之景徳元年秋七月庚子益都民李仁美國凝母皆百餘嵗詔賜粟帛四年春正月己未車駕發京師庚申次中牟縣賜父老衣幣所過如之二月甲申御五鳯樓觀酺詔父老五百人賜飲樓下大中祥符元年二月壬辰御乾元門觀酺賜父老千五百人衣服茶綵十月宴太山父老于殿門賜父老時服茶帛三年春正月丁巳賜建安軍父老江禹錫粟帛閏二月戊辰詔赤縣父老本府宴犒年九十者授攝官賜粟帛終身八十者爵一級秋八月乙亥河中府父老千七百人來迎上勞問之賜以緡帛七年三月青州民趙嵩百一十嵗詔存問之八年泗州周憲百五嵗詔賜束帛仁宗本紀天聖元年三月丙子詔賜城中民八十以上者茶帛仍復其家王圻續通考景定四年正月詔曰周尊黄耉忠厚所基漢事三老祿養無缺陳塏林彬之史季温夙被擢用今皆耆年奉祠嵗久宜示奨崇陳塏授端明殿學士林彬之寳謨閣待制史季温直文華閣各因其祠遼史聖宗本紀統和十二年正月霸州民李在宥年百三十有三賜束帛錦袍銀帶仍復其家十六年六月詔婦人年踰九十者賜物太平四年二月詔賜諸宫分耆老食道宗本紀大安十年十二月三河縣民孫賔及其妻皆百嵗復其家金史海陵本紀天徳三年四月沂州男子呉真犯法當死有司以其母老疾無侍為請命官與養濟著為令世宗本紀大定十六年十二月詔諸流移人老疾者官與養濟二十五年四月詔會寧府百姓年七十以上者補一官九月次轄沙河賜百嵗老嫗帛甲申次遼水召見百二十嵗女真老人能道太祖開創事上嘉歎賜食并賜帛王圻續通考元世祖至元時順天路民王住兒過誤致死罪其母年七十言于朝曰兒死則妾亦死矣乃宥其罪俾養母蕙田案親老獨子留養之例葢始於此觀承案獨子留養元世祖此舉實為盛徳之事聖人孝治天下推恩至於此極孝悌之心可以油然生矣然亦以其過誤而致罪者耳故恩不傷義而足為後世法也元史成宗本紀大徳九年六月立皇子徳夀為皇太子詔賜高年帛八十者一匹九十者二匹親年七十别無侍丁者従近遷除仁宗本紀至大四年三月賜大都路民年九十者二千三百三十一人人帛二匹八十者八千三百三十一人人帛一匹文宗本紀至順二年四月寧國路涇縣民張道殺人為盜道弟吉従而不加功拘囚七年不決吉母老無他子孫中書省臣以聞勅免死杖而出之俾養其母順帝本紀至元四年正月詔内外廉能官父母年七十無侍丁者附近銓注以便侍養至正元年十二月詔民年八十以上蒙古人賜繒帛二表裏其餘州縣旌以高年耆徳之名免其家雜役明會典洪武元年詔民年七十以上者許一丁侍養與免雜泛差役王圻續通考洪武五年壬子夏五月詔中外學宫行養老之禮先是太祖念海内晏安思化民俗以復其古遂命禮部考儀禮及唐宋之制又采周官屬民讀法之㫖㕘定每嵗孟春正月冬十月有司偕學官率士大夫之老者行之于學宫其民間里社以百家為一會糧長或里長主之百人内以年最長者為正賔餘以齒序坐每季行之于里中大都皆本于正齒位之説而賔興賢能春秋習射亦可通行焉酒酺不許奢靡制曰可遂詔應天府及直𨽻府州縣并各布政司府州縣俱舉行之明會典洪武十九年詔所在有司審耆老不係𨽻卒倡優年八十九十鄰里稱善者備其年甲行實具狀奏聞貧無産業者八十以上月給米五斗肉五斤酒三斗九十以上嵗加給帛一匹絮五斤雖有田産僅足自贍者所給酒肉絮帛亦如之其應天鳯陽二府富民年八十以上賜爵里士九十以上賜爵社士皆與縣官平禮並免雜差正官嵗一存問著為令二十年閏六月命試禮部尚書李原名申諭有司行養老之政先是太祖召原名諭之曰尚齒所以教敬事長所以教順虞夏商周之世莫不以齒為尚而養老之禮未嘗廢是以人興於孝弟風俗淳厚治道隆平曩者朕詔天下行養老之政凡耆民年八十九十鄉黨稱善者有司以時存問若貧無産業年八十以上者月給米五斗酒米三斗肉五斤九十以上嵗加帛一疋綿一斤其有田産能自贍者止給酒肉絮帛其應天鳯陽二府富民九十以上賜爵里士八十以上賜爵社士咸冠帶復其家尚虞有司奉行不至爾其以朕命申之永樂二十二年令民年七十以上及篤廢殘疾者許一丁侍養不能自存者有司賑給八十以上者仍給絹二疋綿二斤酒一斗時加存問天順二年詔軍民有年八十以上者不分男婦有司給絹一疋綿一斤米一石肉十斤年九十以上者倍之男子百嵗加以冠帶榮身又詔四品以上官年七十以禮致仕不能自存者有司嵗給米五石八年詔凡民年七十以上者免一丁差役有司每嵗給酒十瓶肉十斤八十以上者加與綿二斤布二疋九十以上者給與冠帶每嵗設宴侍一次百嵗以上給與棺具成化二十三年詔在京文職以禮致仕五品以上年及七十者進散官一階其中廉貧不能自存衆所共知者有司仍每嵗給與食米四石不許狥情濫給𢎞治十八年詔文職官員五品以上以禮致仕在家者各進階一級其二品以上大臣年及八十者有司備綵幣羊酒問勞九十以上者具奏遣使存問嘉靖元年文職致仕一品未受恩典者有司月給食米二石嵗撥人夫二名應用二品以上年及八十者備綵幣羊酒問勞九十以上者具實奏來遣使存問五品以上以禮致仕年七十以上者進散官一階其中廉貧不能自存衆所共知者嵗給米四石以資養贍王圻續通考明尊年恩例高皇帝時詔諸耆老謁見而崑山周夀誼居首年一百十六嵗賜宴及鈔幣天順中召京師人百四嵗茹大中入見便殿賜宴順天府賜冠帶襲衣命禮部尚書姚䕫造其第賀之成化中濟寧人王自能以百十六嵗徴又七年終又韓王奏羣牧所千戸朱政曽祖信年一百六嵗而終祖全一百二嵗父鏞八十二嵗見存三代皆以千戸致仕詔信全俱進階宣武将軍各賜羊酒白米二石右歴代優老之事五禮通考卷一百七十七
