body:
  text: 五禮通考卷一百五十九刑部尚書秦蕙田撰嘉禮三十二饗燕禮儀禮公食大夫禮鄭目録云主國君以禮食小聘大夫之禮於五禮屬嘉禮疏篇中薦豆六黍稷六簋庶羞十六豆此等皆是下大夫小聘之禮下乃别言食上大夫之法聘禮據侯伯之大聘此篇小聘大夫者周公設經互見為義不言食賔與上介直言大夫者小聘上介乃是士是以直云大夫兼得大夫聘賔與上介亦兼小聘之賔公食大夫之禮使大夫戒各以其爵注戒猶告也告之必使同班敵者易以相親敬大疏此篇雖據子男大夫為正兼見五等諸侯聘使卿之事故云各以其爵也上介出請入告注問所以為來事三辭注為既先受賜不敢當賜疏既先受賜謂聘日致饔受大禮故今辭食不敢當之但受饔之時禮辭而已至于享食皆當三辭賔出拜辱注拜使者屈辱來迎已大夫不答拜將命注不答拜為人使也將猶致也賔再拜稽首注受命大夫還注復於君賔不拜送遂從之注不拜送者為從之不終事疏鄉飲鄉射戒賔遂從之而云拜辱拜送者以主人先反不相随故也覲禮使者勞賔侯氏送于門外遂從之使者既不先反猶拜送者尊天子使故也蕙田案以上戒賔賔朝服即位於大門外如聘注於是朝服則初時𤣥端如聘亦入於次俟疏云大門外如聘者則賔主設擯介以相待如聘時賔在館拜所戒大夫即𤣥端賔遂從大夫至君大門外入次乃去𤣥端著朝服出次即位也聘禮重賔發館即皮弁此食禮輕及大門乃朝服即位具注主人也擯者俟君于大門外卿大夫士序及宰夫具其饌物皆于廟門之外盛氏世佐曰即位謂自公以下也具官各饌其所供之物也燕禮告具而後即位此即位乃具者食重於燕也蕙田案經言即位不言主人者上言賔即位則此為主人可知也敖氏以即位仍屬賔者非郝氏又連上文如聘即位為句尤誤又案以上即位羮定注肉謂之羮定猶熟也著之者下以為節甸人陳鼎七當門南面西上設扄鼏鼏若束若編注七鼎一大牢也甸人冢宰之屬兼亨人者南面西上以其為賔統於外也扄鼎扛所以舉之者也凡鼎鼏蓋以茅為之長則束本短則編其中央今文扄作鉉疏聘禮致飱與饔餼皆九鼎此亦一大牢而七鼎者食禮輕無鮮魚鮮腊與聘禮腥一牢鼎七同也案亨人職云掌共鼎鑊又甸師職云掌以薪蒸役外内饔之事故使甸人兼亨人陳鼎也設洗如饗注必如饗者先饗後食如其近者也饗禮亡燕禮則設洗於阼階東南疏引燕禮者欲見設洗之法燕與饗食同小臣具槃匜在東堂下注為公盥也公尊不就洗小臣於小賔客饗食掌正君服位疏夏官小臣職云小祭祀賔客饗食如大僕之法敖氏繼公曰凡行禮其以槃匜盥而不就洗者尊者一人而已有敵者則否不言簞巾文略耳祭禮有槃匜必有簞巾欽定義疏夏官小臣職大祭祀朝覲沃王盥此諸侯之小臣故主沃公盥宰夫設筵加席几注設筵於户西南面而左几公不賔至授几者親設湆醬可以略此無尊注主於食不獻酬敖氏繼公曰言此者嫌酒漿或用尊也飲酒漿飲俟於東房注飲酒清酒也漿飲酨漿也其俟奠于豐上也飲酒先言飲明非獻酬之酒也漿飲先言漿别於六飲也此疏酨之言載以其汁滓相載故云酨漢法有名也凡宰夫之具饌於東房注凡非一也飲食之具宰夫所掌也酒漿不在凡中者雖無尊猶嫌在堂敖氏繼公曰此所饌者謂豆簠簋鉶也蕙田案以上陳設公如賔服迎賔於大門内注不出大門降於國君稽疏自此盡階上北面再拜首言主君迎賔拜至之事大夫納賔注大夫謂上擯也納賔以公命賔入門左公再拜賔辟再拜稽首注左西方賔位也辟逡遁不敢當君拜也欽定義疏聘禮公迎賔再拜賔辟不答拜者以公為聘君而拜已不敢承其禮也此則為食已而拜故既辟還復再拜稽首公揖入賔從注揖入道之及廟門公揖入注廟禰廟也言疏儀禮之内單廟者皆據禰廟若非禰廟則言廟祧受聘在祖廟食饗在禰燕禮又在寢是其差次也賔入三揖注每曲揖及當碑揖相人偶至於階三讓注讓先升公升二等賔升注逺下人君敖氏繼公曰此下大夫與公升階之儀乃與卿同然則升階尊卑之差不過一等大夫立於東夾南西面北上注東夾南東西節也取節於夾明東於堂疏此主國卿大夫立位序西為正堂序東有夾室立於夾室之南是東於堂也士立於門東北面西上注統於門者非其正位辟賔在此統疏燕禮大射士在西方東而北上不統於門今於門者以賔在門西辟賔在此非正位故也小臣東堂下南面西上宰東夾北西面南上注宰宰夫之屬也古文無南上敖氏繼公曰宰大宰也宰尊官於此乃見之者位定在後耳南上二字古文無之經惟言宰是獨立於此也南上之文無所用之傳寫者因下文而衍此二字耳宜從古文欽定義疏此宰内宰也天官内宰凡賔客之祼獻瑶爵皆贊致后之賔客之禮侯國之内宰亦當然也饗賔則夫人亞祼此食禮殺於饗夫人不親内宰位於東夾之北以見外内之官備所以示夫人敬客之意也下經授公醬粱及為賔設豆簋鉶稻者皆宰夫也宰惟授公湇視宰夫為尊則宰非宰夫之屬明矣大宰為司徒之兼官三卿之長不應不立於東夾南而在東夾北也注為南上二字所惑故以宰夫之屬言之敖氏以為大宰則亦未詳於外内之辨也其下即内官之士豈其倫乎觀承案内官之南上者統於宰而宰之南上者又統於君以其位在東夾之北則君在南固宜以南為上耳謂此二字為衍恐亦未然内官之士在宰東北西面南上注夫人之官内宰之屬也自卿大夫至此不先即位從君而入者明助君饗食賔自無事欽定義疏此為内宰之屬則位於其上者為内宰明矣此内官士也非奄也介門西北面西上注西上自統於賔也然則承擯以下立於士西少進東上疏云承擯以下立於士西少進東上者以介統於賔而西上則擯統於君而東上可知又承擯是大夫尊於士故知少進東上也不言上擯者上擯有事其位不定故不言蕙田案以上迎賔公當楣北鄉至再拜賔降也公再拜注楣謂之梁至再拜者興禮俟賔嘉其來也公再拜賔降矣一疏至再拜者公方一拜賔即降公再拜者賔降後又拜本當再拜故皆以再拜言之賔西階東北面答拜注西階東少就主君敬也欽定義疏已國之臣拜位在阼階下燕禮主人獻公二大夫媵爵於公皆是也若為賔則拜於西階下燕禮大夫為賔者是也聘禮私覿賔降拜於階東視階下為稍東别於主君也此亦然故注以為少就主君也擯者辭注辭拜於下拜也公降一等辭曰寡君從子雖將拜興也注賔降再拜公降擯者釋辭矣賔猶降終其再拜稽首興起也欽定義疏賔在西階東欲答拜時擯者即辭之而賔拜自若故曰拜也公見其不聴擯者之辭乃降一等以示親辭而擯者致辭曰寡君從子而降矣子雖將拜其興也容此兩辭之間而賔之再拜已訖非謂賔拜未再得辭即興若然則上文賔升不得謂已拜矣賔栗階升不拜注自以已拜也栗實栗也不拾級連歩趨主國君之命不拾級而下曰辵張氏爾岐曰升降有四法拾級連歩謂兩足相随不相過是尋常升階法栗階者始升猶聚足連歩至近上二等左右足各一發而升堂是趨君命之法故燕禮記云凡栗階不過二等又此經注不拾級而下曰辵疏以為越三等是下階近地三等即不聚足也又云越一等為歴階共為四法命之成拜階上北面再拜稽首注賔降拜主君辭之賔雖終拜於主君之意猶為不成敖氏繼公曰拜下者臣也拜於上者賔也既升而命之成拜所以賔之蕙田案以上拜至士舉鼎去鼏於外次入陳鼎於碑南南面西上右人抽扄坐奠於鼎西南順出自鼎西左人待載注入由東出由西明為賔也今文奠為委古文待為持士疏次入序入也去鼏於外者以入當載於俎故去之䘮士虞皆入乃去鼏䘮禮變於吉也敖氏繼公曰次入鼎在西者先在東者後也碑下脱一南字西南之南衍文皆傳寫誤也順出以次而出也順出正禮也其或逆出由便耳盛氏世佐曰鼎南面以西為右右人在鼎西故抽扄即奠於其西便也南順言奠扄之法南北設之順鼎面也舉鼎之時扄横加於鼎上及其奠也直設於鼎旁故云順也出自鼎西謂右人奠扄訖即自鼎西而出也上云次入則出亦以次可知故不湏言順出惟逆出乃著之以其變於初也敖氏分句不審乃以西南之南為衍字過矣蕙田案碑南南面石經及古本俱缺一南字監本有之蓋後人所増也經云士舉鼎次入不云次出者舉入以見出也下文旅人取七甸人舉鼎順出不云次入者舉出以見入也敖君善以下有順出之文疑南字為衍失之矣當從盛氏為是雍人以俎入陳於鼎南旅人南面加七於鼎退注旅人雍人之屬旅食者也雍人言入旅人言退文互相備也出入之由亦如舉鼎者七俎每器一人諸侯官多也敖氏繼公曰雍人西面於鼎南陳俎俎南順旅人南面於鼎北加七七北枋大夫長盥洗東南西面北上序進盥退者與進者交於前卒盥序進南面七注長以長㓜也序猶更也前洗南載者西面注載者左人也亦序自鼎東西面於其前大夫七則載之當疏待載時在鼎東南面今大夫鼎北面南七之左人載故序自鼎東西面俎當鼎南則載者在鼎南稍東敖氏繼公曰南面立於鼎後也七出鼎實也西面執俎以載也魚腊飪注飪熟也食禮宜熟饗有腥者中疏上文直言羮定肉謂之羮恐魚腊不在其故此特著魚腊飪也樂記大饗俎腥魚是饗禮有腥也又春秋傳王享有體薦以饗禮用體薦則腥矣豚解者皆腥也蕙田案疏引大饗俎腥魚證饗之用腥然彼大饗謂祫祭先王非饗賔客也賈氏誤矣其云豚解者皆腥則得之載體進奏注體謂牲與腊也奏謂皮膚之理也進其理本在前下大夫體七个疏體七个用右胖肩臂臑肫骼脊脅其左胖為庶羞下文十六豆二十豆是也進其理本在前者此謂生人食法故進本本謂近上者若祭祀則進末故少牢云進末鄭云變於食生是也魚七縮俎寢右注右首也寢右進鬐也乾魚近腴多骨鯁面疏縮縱也魚在俎為縱於人亦横賔在户牖之間南俎則東西陳之魚在俎首在右腹腴鄉南鬐脊也進脊在北鄉賔是取脊少骨鯁者以優賔也若祭祀則進腴以鬼神尚氣腴者氣之所聚故少牢進腴是也腸胃七同俎注以其同類也不異其牛羊腴賤也此俎實凡二十八疏牛羊同是畜類又其腹腴賤故略之同俎也牛羊各有腸胃腸胃各七四七二十八也倫膚七注倫理也謂精理滑脆者革疏倫膚謂豕之皮為之腸胃膚皆横諸俎垂之注順其在牲之性也腸胃垂及俎拒大夫既七七奠於鼎逆退復位注事畢宜由便也士七載者又待設俎敖氏繼公曰七奠於鼎謂加七於鼎上也位東夾南蕙田案以上鼎入載俎公降盥注將設醬賔降公辭注辭其從已卒盥公壹揖壹讓公升賔升注揖讓皆一殺於初欽定義疏凡降盥而升皆一揖以距階近無三揖之位也始至於階三讓此惟一讓則殺於初矣亦公升二等而後賔升宰夫自東房授醯醬注授授公也醯醬以醯和醬堂疏案記云蒲筵常長丈六尺於上户牖之間南面設之乃設正饌於中席已東自中席已西設庶羞也公設之注以其為饌本賔辭北面坐遷而東遷所注東遷所奠之東側其故處當疏東遷所者謂以西為上君設席中故東遷之辟君設處側近也近其故處敖氏繼公曰東遷所東遷於其所也所者謂醬之正位也公設之處於其正位必少西少西者為賔當遷之故也遷之者示不敢當公親設之意且以為禮也蕙田案以上公親設醬正饌之一公立於序内西鄉注不立阼階上示親饌北疏君之行事皆在阼階上今近阼者以設饌在户西近北今君亦近北示親監饌故也賔立於階西疑立注不立階上以主君離阼也疑正立也自定之貌今文曰西階宰夫自東房薦豆六設於醬東西上韭菹以東醓醢昌本昌本南麋臡以西菁菹鹿臡注醓醢醢有醓昌本昌蒲本菹也醢有骨謂之臡菁蓂菁菹也蕙田案以上宰夫設豆正饌之二士設俎於豆南西上牛羊豕魚在牛南腊腸胃亞之注亞次也不言䋫錯俎尊也設疏上設豆䋫陳之下設黍稷錯陳之此俎不䋫不錯膚以為特注直豕與腸胃東也特膚者出下牲賤賤疏豕在牛羊之下膚豕之所出故云也旅人取七甸人舉鼎順出奠於其所注以其空也其所謂當門敖氏繼公曰甸人加扄乃舉鼎其出也亦七先而鼎後蕙田案以上士設俎正饌之三宰夫設黍稷六簋於俎西二以並東北上黍當牛俎其西稷錯以終南陳注並併也蕙田案以上宰夫設簋正饌之四大羮湇不和實於鐙宰右執鐙左執蓋由門入升自阼階盡階不升堂授公以蓋降出入反位注大羮湇煮肉汁也大古之羮不和無鹽菜瓦豆謂之鐙宰謂大宰宰夫之長也有蓋者饌自外入為風塵今文湇為汁又曰入門自阼階無升蓋疏宰位在東夾北西面南上今以降出送門外乃更入反此位也李氏如圭曰湇升自阼階者公親設之故也敖氏繼公曰自門入者湆在爨也士昏禮曰大羮湆在爨記曰亨於門外東方欽定義疏大羮湇皆盛於鐙經特於此見之湇與鉶為類特牲禮主婦設兩鉶隨設大羮湇但以湇由門外入故設之不以主婦耳其實主婦職也此禮宰設之以授公亦足見宰之為内宰矣公設之於醬西賔辭坐遷之注亦遷東所盛氏世佐曰遷湆之法與醬同蕙田案以上公親設大羮湆正饌之五宰夫設鉶四於豆西東上牛以西羊羊南豕豕以東牛注鉶菜和羮之器言疏記云牛藿羊苦肉薇是菜和羮以鉶盛之羮在鉶之謂之鉶羮據器言之謂之鉶鼎正鼎之後設之謂之陪鼎入庶羞言之謂之羞鼎其實一也蕙田案以上宰夫設鉶正饌之六飲酒實於觶加於豐注豐所以承觶者也如豆而卑宰夫右執觶左執豐進設於豆東注食有酒者優賔也設於豆東不舉也燕禮記曰凡奠者於左疏案下文宰夫執漿飲賔興受惟用漿酳口不用酒今主人猶設之是優賔也此酒不用故奠於豆東案鄉飲酒鄉射記皆云凡奠者於左舉者於右注云燕禮記者必傳寫者之誤楊氏復曰上文飲酒漿飲俟於東房疏云酒漿皆以酳口此又云漿以酳口不用酒今主人猶設之所以優賔兩説牴牾不同又案下文祭飲酒於上豆之間魚腊醬湇不祭夫魚腊醬湇不祭而祭飲酒則知酒以優賔但賔不舉爾豈酳口之物哉當以優賔之義為正蕙田案以上宰夫設飲酒正饌之七宰夫東面坐啟簋會各郤於其西注㑹簋蓋也亦一一合郤之各當其簋之西少疏郤者仰也簋蓋有六兩兩相重而仰之牢云佐食啟㑹蓋二以重設於敦南也蕙田案簋設於羮湇之先至是始啓之事有節也欽定義疏正饌醬最先設次則豆由房出又次則俎自階升又次則簋由房出又次則湆自階升至鉶則復由房出其上下設饌之人亦相間以成禮如此蕙田案以上設正饌贊者負東房南面告具於公注負東房負房户而立也南面者欲得鄉公與賔也公再拜揖食注再拜拜賔饌具賔降拜注答公拜公辭賔升再拜稽首注不言成拜降未拜賔升席坐取韭菹以辯擩於醢上豆之間祭注擩猶染也敖氏繼公曰此所擩者醓醢以下五豆惟云醢者省文耳少牢饋食用四豆尸取韭葅擩於三豆是其徴也贊者東面坐取黍實於左手辯又取稷辯反於右手興以授賔賔祭之注取授以右手便也賔亦興受坐祭之於豆祭也獨云贊興優賔也少儀曰受立授立不坐以疏此所授者皆謂逺賔者菹醢及鉶不授其近賔也雖不授亦祭之敖氏繼公曰辯謂辯取於三簋先黍後稷不欲其雜也每取黍稷皆以右手實於左手既則反於右手也亦壹以授賔不言壹者已明也三牲之肺不離贊者辯取之壹以授賔注肺不離者刌之也不言刌刌則祭肺也此舉肺不離而刌之便賔祭也祭離肺者絶肺祭也壹猶稍也賔興受坐祭注於是云賔興受坐祭重牲也賔亦每肺興受祭於豆祭張氏爾岐曰離而不殊㽞中央少許相連謂之離肺刌則切斷之故云不離祭離肺者必用手絶斷其連處刌肺則否故注云便賔祭也壹説文訓專壹廣韻訓合當是總合授賔使之祭如上文祭黍稷之例注云壹猶稍也又云每肺興受恐與經未合食禮本殺節文不宜如是其煩方氏苞曰注豆祭似當作際傳寫誤也捝手扱上鉶以柶辯擩之上鉶之間祭注扱扱其鉶菜也捝拭也拭以巾敖氏繼公曰扱上鉶以柶謂以内列牛鉶之柶扱其鉶也辯擩之遂以柶擩三鉶也欽定義疏辯擩之謂以上鉶之菜擩於餘鉶之汁所以示辯也祭飲酒於上豆之間魚腊醬湇不祭注不祭者非食物之盛者疏以有三牲故魚腊不祭若入庶羞則祭之敖氏繼公曰魚腊屬於牲醬屬於豆湇屬於鉶故雖設之亦不祭也不言腸胃膚者在魚腊之下不祭可知蕙田案正饌之設凡七而賔之祭者五韭菹一也黍稷二也肺三也鉶四也飲酒五也醬與大羮湆皆公親設之而不祭者醬即醯醢類也湇即鉶類也祭醢以葅擩之祭鉶以菜擩之今醬湇無葅與菜無所用以擩者又酒漿之氣清醬湇之質濁豆間欲其潔故祭飲酒不祭醬湇也又案以上賔祭正饌宰夫授公飯粱公設之於湇西賔北面辭坐遷之注既告具矣而又設此殷勤之加也遷之遷而西之以其東上也疏知粱東上者下文宰夫膳稻於粱西是以粱在東為上公與賔皆復初位注位序内階西宰夫膳稻於粱西注膳猶進也進稻粱者以簠會疏上設黍稷訖云郤會此不云郤者先於房去之故也郝氏敬曰穀以粱為大故君自設食以稻為善故宰夫供膳食美曰膳盛氏世佐曰設膳曰膳猶置尊曰尊布筵曰筵也蕙田案以上公親設粱宰夫膳稻加饌之一節敖氏疑膳當作設似有理然以郝氏盛氏之説通之經文未必誤也士羞庶羞皆有大蓋執豆如宰注羞進也庶衆也進衆珍味可進者也大以肥美者特為臠所以祭也魚或謂之膴膴大也唯醢醬無大如宰如其進大羮湇右執豆左執蓋欽定義疏俎與庶羞皆士設之以其自堂下來與饌於東房者異也取諸門外以其加也觀承案蓋執豆三字當為句蓋執者連蓋而執之也下文以蓋降三字亦當為句而授字自宜連上文為句也先者反之注庶羞多羞人不足則相授於階上復出取也疏反之者以其庶羞十六豆羞人不足故先至者反取之下文云先者一人升設於稻南其人不反則此云先者反之謂第二已下為先者也由門入升自西階先者一人升設於稻南簋西間容人注簋西黍稷西也必言稻南者明庶羞加不與正豆併也間容人者賔當從間徃來也疏稻與庶羞俱是加故南北相繼俱在黍稷正饌之西不與正豆併也賔當從間往來者下文賔左擁簠粱右執湇以降公辭升反奠於其所是也敖氏繼公曰先者一人士之長設膷者也稻南言其東西節也簋西言其南北節也旁四列西北上注不統於正饌者雖加自是一禮是所謂羮胾中别疏曲禮云左殽右胾殽此謂之羮一也殽為正饌胾為切肉即庶羞與此正饌東庶羞西間容人同膷以東臐膮牛炙注膷臐膮今時􅌜也牛曰膷羊曰臐豕曰膮皆香美之名也炙南醢以西牛胾醢牛鮨注先設醢䋫之以次也内則謂鮨為膾然則膾用鮨鮨南羊炙以東羊胾醢豕炙炙南醢以西豕胾芥醬魚膾注芥醬芥實醬也内則曰膾春用葱秋用芥衆人騰羞者盡階不升堂授以蓋降出注騰當作媵媵送也授授先者一人盛氏世佐曰士媵羞者雖衆而升堂設之者惟最先一人其餘則授於西階上也故先者一人不反其餘皆反蕙田案以上士設庶羞加饌之二欽定義疏正饌之列其在東之東者以西為上豆與俎是也其在東之西者以東為上簋與鉶是也加饌之列其在西之北者以東為上粱與稻是也其在西之南者以西為上庶羞是也一陳饌之間亦必相變如此蕙田案以上設加饌贊者負東房告備於公注復告庶羞具者以其異饌贊升賔注以公命命賔升席賔坐席末取粱即稻祭於醬湇間注即就也祭稻粱不於豆祭祭加宜於加張氏爾岐曰醬湇不得言加注偶誤粱是公所親設醬湇亦公所親設公設是饌尊處故祭粱不於豆而於此耳贊者北面坐辯取庶羞之大興一以授賔賔受兼壹祭之注一一受之而兼壹祭之庶羞輕也自祭之於膷臐之間以異饌也敖氏繼公曰祭不言其所亦於醬湇間可知欽定義疏賔之祭饌者六其親取以祭者三為贊所授以祭者三然於豆則辯取之而後擩擩而後祭於鉶則既扱而擩之辯辯而後祭於簠則取粱即稻而後祭是皆兼壹而祭也贊所授者於簋曰取辯興以授賔而賔祭之於俎曰辯取興以授賔而賔祭之於羞亦曰辯取興以授賔而賔兼壹祭之是贊皆壹授而賔皆兼壹而祭也注於俎謂賔每肺興受而祭是以贊為非壹授賔亦非壹祭也於羞謂壹壹授之而兼壹祭之是以贊為非壹授惟賔為壹祭也似皆不合於經祭於膷臐之間亦以其為加饌之上豆故意之云爾蒙粱稻而言則敖氏謂湇醬間者近之正饌祭於豆間加饌祭於湇醬間亦足以别矣賔降拜注拜庶羞此疏上文正饌公先拜賔答拜賔先拜公公答拜公辭賔升再拜稽首公答再拜蕙田案以上賔祭加饌賔北面自間坐左擁簠粱右執湇以降注自間坐由兩饌之間也擁抱也必取粱者公所設也以之降者堂尊處欲食於階下然也公辭賔西面坐奠於階西東面對西面坐取之栗階升北面反奠於其所降辭公注奠而後對成其意也降辭公敬也必辭公者為其尊而親臨已食侍食贊者之事張氏爾岐曰成其意者成其降食階下之意降辭公辭公之親臨也公許賔升公揖退於箱注箱東夾之前俟事之䖏擯者退負東塾而立注無事賔坐遂卷加席公不辭注贊者以告公公聴之重來優賔疏公既在序外賔食在户西若不告公公何以知之明知贊者告公也公來則勞賔不來則賔不勞故不來者所以優饒賔也欽定義疏大射儀賔有加席不辭者以公亦有加席也此無阼席故賔卷之賔三飯以湇醬注每飯歠湇以殽擩醬食正饌也三飯而止君子食不求飽不言其殽優賔疏案特牲少牢尸食時舉殽皆言次第此不言者任賔取之是優賔也宰夫執觶漿飲與其豐以進注此進潄也非為卒食為將有事縁賔意欲自潔清賔捝手興受注受觶宰夫設其豐於稻西注酒在東稻在西是所謂左酒右醬庭實設注乗皮張氏爾岐曰設之將以侑賔賔坐祭遂飲奠於豐上注飲潄蕙田案以上賔食公受宰夫束帛以侑西鄉立注束帛十端帛也侑猶勸也主國君以為食賔殷勤之意未至復發帛以勸之欲用深安賔也西鄉立序内位也受束帛於序端欽定義疏賔既飲則贊者以告而公出自箱矣蓋飲者食畢之事賔而飲將有告退之心矣故以是為侑幣之節賔降筵北面注以君將有命也北面於西階上擯者進相幣注為賔釋幣辭於賔賔降辭幣升聴命注降辭幣主國君又命之升聴命釋許辭降拜注當拜受幣公辭賔升再拜稽首受幣當東楹北面注主國君南面授之當東楹者欲得君行一臣行二也退西楹西東面立注俟主國君送幣也退不負序以將降公壹拜賔降也公再拜注賔不敢俟成拜介逆出注以賔事畢賔北面揖執庭實以出注揖執者示親受公降立注俟賔反上介受賔幣從者訝受皮注從者府史之屬訝迎也而疏知非士介者子男小聘使大夫士介一人已介已受賔幣故知訝受者是府史之屬也蕙田案以上公以束帛侑賔入門左没霤北面再拜稽首注便退則食禮未卒不退則嫌更入行拜若欲從此退敖氏繼公曰霤門内霤也没霤庭南也拜者謝侑幣之賜也没霤而拜以公立於中庭也公辭注止其拜使之卒食揖讓如初注如初入也升賔再拜稽首公答再拜注賔拜拜主國君之厚意賔揖介入復位賔降辭公如初注將復食賔升公揖退於箱賔卒食㑹飯三飲注卒已也已食會飯三潄漿也㑹飯謂黍稷也此食黍稷則初時食稻粱敖氏繼公曰向者三飯乃飲此三飲蓋九飯也九飯大夫禮也後禮更端故與前三飯不相蒙食加飯而飲漿則此所飲者其酒與張氏爾岐曰上文宰夫設黍稷云啟㑹是簋兼㑹設之稻粱不言啓㑹是簠不兼㑹故經以黍稷為㑹飯也不以醬湇注不復用正饌也初時食加飯用正饌此食正飯用庶羞互相成也後言湇或時後用楊氏復曰案注云初時食加飯謂食稻粱用正饌謂以殽擩醬食正饌也此食正飯謂食黍稷也但用庶羞則經無其文據下文上大夫庶羞酒飲漿飲庶羞可也注云於食庶羞宰夫又設酒漿以之食庶羞可也以彼證此恐此食㑹飯有三飲亦食庶羞此注所以有互相成之義也捝手興北面坐取粱與醬以降西面坐奠於階西注示親徹也不以出者非所當得又以已得侑幣張氏爾岐曰公所親設賔亦親徹東面再拜稽首注卒食拜也不北面者異於辭時疏上文受侑幣出更入門北面拜其欲辭退故北面此卒食禮終故東面公降再拜注答之也不辭之使升堂明禮有終敖氏繼公曰公拜亦西面於阼階下蕙田案以上賔卒食介逆出賔出公送於大門内再拜賔不顧注初來揖讓而退不顧退禮略也示難進易退之義擯者以賔不顧告公公乃還也蕙田案以上賔出有司卷三牲之俎歸於賔館注巻猶收也無遺之辭也三牲之俎正饌尤尊盡以歸賔尊之至也歸俎者實於篚他時有所釋故所疏特牲及士虞收俎歸於尸釋三个是有所釋此無釋故稱卷也魚腊不與注以三牲之俎無所釋故也禮之有餘為施惠不言腸胃膚者在魚腊下不與可知也蕙田案以上歸賔俎明日賔朝服拜賜於朝拜食與侑幣皆再拜稽首注朝謂大門外致疏聘禮拜饔與餼不拜束帛者彼使人之故不拜此食禮君親賜故拜之訝聴之注受其言入告出報也此下大夫有士訝蕙田案以上賔拜賜上大夫八豆八簋六鉶九俎魚腊皆二俎注記公食上大夫異於下大夫之數豆加葵葅蝸醢四四為列俎加鮮魚鮮腊三三為列無特疏周禮醢人朝事之豆韭葅醓醢昌本麋臡菁葅鹿臡􅈋葅麋臡上文六豆用鹿臡以上仍有􅈋菹麋臡在今八豆不取􅈋菹麋臡而取饋食之豆葵菹蝸醢者以特牲少牢参之無特者陳饌要方上七俎東西兩行為六俎一俎特於俎東此九俎為三行故無特雖無特膚亦為下敖氏繼公曰豆加􅈋菹麋臡簋加黍稷各一鉶加羊俎俎加鮮魚鮮獸於膚之下九俎則四四為列而特鮮獸魚腸胃倫膚若九若十有一下大夫則若七若九注此以命數為差也九謂再命者也十一謂三命者也七謂一命者也九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之孤視子男命疏周禮典命諸侯之臣分為三等三命再命一命不與一命同此經魚腸胃倫膚亦分為三等有十一有九有七則十一當三命九當再命七當一命也大國之孤四命與子男同十三侯伯十五上公十七差次可知欽定義疏子男之卿雖八豆八簋六鉶九俎與公侯伯之卿同然其魚腸胃倫膚三俎惟用九數不得用十有一數若公侯伯之卿則用十有一數也子男之大夫雖六豆六簋四鉶七俎與公侯伯之大夫同然其魚腸胃倫膚三俎惟用七數不得用九數若公侯伯之大夫則用九數也就其同之中又有少異者以明其等庶羞西東毋過四列注謂上下大夫也亦疏下大夫庶羞東西四行南北四行上大夫東西四行南北五行上大夫庶羞二十加於下大夫以雉兎鶉鴽注鴽無母化疏案爾雅釋鳥云鴽鴾母郭璞曰䳺也莊子曰田䑕為鶉淮南子云蝦䗫所化月令曰田䑕化為鴽然則鴽鶉一物也張氏爾岐曰據經鶉鴽並列還是兩物蕙田案以上食上大夫禮若不親食注謂主國君有疾病若他故使大夫各以其爵朝服以侑幣致之注執幣以將命豆實實於罋陳於楹外二以並北陳簋實實於筐陳於楹内兩楹間二以並南陳注陳罋筐於楹間者象授受於堂中也南北相當以食饌同列耳罋北陳者變於食罋數如豆醢芥醬從焉筐米四疏正食之時豆設於醬東西上今於楹間北陳故云變也菹醢各異物不可同罋故罋數如豆上大夫八豆則八罋下大夫六豆則六罋也庶羞之醢同是醬類故使之相從但庶羞之醢更無别種宜同一罋芥醬宜亦一罋也筐米四者黍稷各一筐稻粱又二筐朱子曰兩楹間不必與楹相當謂堂東西之中耳庶羞陳於碑内注生魚也魚腊從焉上大夫加鮮魚鮮腊雉兎鶉鴽不陳於堂辟正饌疏上文魚膾是魚之中膾者此則全生不膾何者本膾在豆與胾炙俱設今胾炙在牲未殺膾全不破可知庶羞之内鄭獨云生魚者以其胾炙在牲不殺於此無矣雖有乾腊雉兎之等以生魚為主也云魚腊從焉者雖無三牲之肉有乾魚腊可知庶羞本在堂上正饌之西今在碑内故云辟正饌庭實陳於碑外注執乗皮者也不参分庭一在南者以言歸宜近内納疏庭實正法皆参分庭一在南而陳之故昏禮記云徴執皮者参分庭一在南今云碑外繼碑而言近北矣彼参分庭一在南陳之謂在主人之庭参分庭一陳之擬與賔向外故近南此陳於客館擬與賔入内宜近内牛羊豕陳於門内西方東上注為其踐汙館庭使近外賔朝服以受如受饔禮注朝服食禮輕也疏歸饔餼時卿韋弁賔皮弁受無儐注以已本宜往明日賔朝服以拜賜於朝訝聴命注賜亦謂食侑幣蕙田案以上君不親食大夫相食親戒速注記異於君者也速召也先就告之歸具既具復自召之迎賔於門外拜至皆如饗拜注饗大夫相饗之禮也今亡降盥受醬湇侑幣束錦也皆自阼階降堂受授者升一等注皆者謂受醬受湇受幣也侑用束錦大夫文也降堂謂止階上欽定義疏授公者宰夫也此授大夫者其大夫之宰與蕙田案公食有授粱之節此不見者主所親設則賔親執之下云執粱與湇是粱亦親設可知文不具賔止也注主人三降賔不從止疏以主人降堂不至地故賔不降也張氏爾岐曰注言三降不數降盥者盥時賔亦從降自如常法也賔執粱與湇之西序端注不敢食於尊䖏主人辭賔反之卷加席主人辭賔反之欽定義疏公食禮賔卷席時公已退於箱公不辭賔卑也此卷加席而主人辭則大夫猶未退矣意者公食之禮公未退則賔不敢遽即席大夫食之禮則賔未即席大夫不敢遽退與辭幣降一等主人從注從辭賔降受侑幣再拜稽首主人送幣亦然注敵也而疏臣於君當稽首平敵相施當頓首今言敵稽首者食禮相尊敬雖敵亦稽首與臣拜君同也盛氏世佐曰此受幣當於兩楹間與公食大夫當東楹者異辭於主人降一等主人從注辭謂辭其臨已食卒食徹於西序端注亦親徹東面再拜降出注拜亦拜卒食其他皆如公食大夫之禮疏其他謂豆數俎體陳設皆不異上陳但禮異者謂親戒速君則不親迎賔公不出此大夫出大門公受醬湇幣不降此大夫則降也公食大夫大夫降食於階下此言西序端上公食巻加席公不辭此則辭之皆是異也楊氏復曰案大夫相食與公食大夫之禮其稍異者公食使大夫戒此大夫相食親戒速公食迎賔於大門内此迎賔於門外公食公降階盥此降堂盥公食受醬受幣於宰夫此降堂而受公食受湇宰盡階不升堂此降者升一等公食執粱與湇之西階下此之西序端公食賔降辭幣此賔降一等公食卷加席公不辭此巻加席主人辭公食徹粱與湇奠於西階此奠於西序端張氏爾岐曰降而盥侑用錦降辭幣時主人從而辭降受幣時主人稽首送幣降辭主人主人從降卒食徹於西序端不拜階下亦皆異於公食者蕙田案以上大夫相食若不親食則公作大夫朝服以侑幣致之注作使也大夫有故君必使其同爵者為之致禮列國之賔來榮辱之事君臣同賔受於堂無儐注與受君禮同蕙田案以上大夫不親食記不宿戒注食禮輕也此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日疏不宿戒謂不為三日之戒又不為一日之宿與鄉飲酒鄉射禮同當日為之戒不速注食賔之朝夙興戒之賔則從戒者而來不復召不授几注異於醴也無阼席注公不坐郝氏敬曰不授几公不親授也無阼席不設主席也蕙田案此記食禮異於常禮亨於門外東方注必於門外者大夫之事也東方者主陽疏少牢廪㸑饔㸑皆在門外亦大夫事蕙田案此記亨司宫具几與蒲筵常緇布純加萑席尋元帛純皆卷自末注司宫大宰之屬掌宫廟者也丈六尺曰常半常曰尋純縁也萑細葦也末經所終有以識之必長筵者以有左右饌也今文萑皆為莞上疏上陳饌之時正饌在左庶羞在右陳饌雖不在席皆陳於席前當席左右其間容人故必長筵也宰夫筵出自東房注筵本在房宰夫敷之也天子諸侯左右房蕙田案此記筵席賔之乗車在大門外西方北面立注賔車不入門廣敬也凡賔即朝中道而往將至下行而後車還立於西方賔及位而止北面卿大夫之位當車前凡朝位賔主之間各以命數為逺近之節也也疏云中道者内則云男子由右女子由左車從中央卿大夫之位當車前者案大行人云上公立當軹侯伯立當前疾子男立當衡又云大國之孤朝位當車前則卿大夫立亦與孤同一節云凡朝位賔主之間各以命數為逺近之節者案大行人云上公朝位賔主之間九十歩侯伯七十歩子男五十歩注云朝位謂大門外賔下車及王車出迎所立處又云凡諸侯之卿其禮各下其君二等云依命數者據君而言其臣依君命數而降之盛氏世佐曰立當車前謂旅擯之時也當遥當之也蓋賔至大門外西方下車入於次及擯者出請事賔出次歩進直闑西北面立是時賔主之間相去七十歩五十歩三十歩不等車在西方北去門之節亦如之賔於車東東西相望當車前也以聘禮及大行人注疏参之自見蕙田案此記乗車鉶芼牛藿羊苦豕薇皆有滑注藿豆葉也苦苦荼也滑堇荁之屬敖氏繼公曰内則曰堇荁枌榆免薧滫瀡以滑之故注以滑為堇荁之屬蕙田案此記鉶芼贊者盥從俎升注俎其所有事張氏爾岐曰贊者佐賔祭故盥升以待事俎先設故俎升亦升蕙田案此記贊者升節簠有蓋冪注稻粱將食乃設去會於房蓋以冪冪巾也疏簠簋相將簋既有會明簠亦有會可知簠盛稻粱將食乃設故去會於房蓋以冪至於陳設冪亦去之云有蓋冪者據出房未設而言蕙田案此記簠凡炙無醬注已有鹹和郝氏敬曰炙宜乾食故不設醬蕙田案此記炙上大夫蒲筵加萑席其純皆如下大夫純注謂三命大夫也孤為賔則莞筵粉席加繅席畫純也下疏欲見公侯伯之卿三命亦與子男大夫同蕙田案此記上大夫筵席卿擯由下注不升堂也旋疏此謂上擯詔賔主升降周之事而不升堂上贊下大夫也注上謂堂上擯贊者事相近以佐上下為名敖氏繼公曰上贊即贊者以其佐賔食於堂上故云上贊以下大夫為之欲其不尊於賔也張氏爾岐曰堂上之贊以下大夫為之擯佐於堂下贊佐於堂上故曰事相近言其相終始也蕙田案此記擯贊者上大夫庶羞酒飲漿飲庶羞可也注於食庶羞宰夫又設酒漿以之食庶羞可也以優賔張氏爾岐曰前經下大夫不言食庶羞言飲潄不言飲酒亦其禮之殊者拜食與侑幣皆再拜稽首注嫌上大夫不稽首蕙田案此記食上大夫儀劉敞公食大夫義食禮公養賔養賢一也親之故愛之愛之故養之養之故食之食而弗愛猶豢之也愛而弗敬猶畜之也饗禮敬之至也食禮愛之至也饗為愛弗勝其敬食為敬弗勝其愛文質之辨也公使大夫戒必以其爵恭也已輕則卑之已重則是以其貴臨之也賔三辭聴命言是禮之貴弗敢當也弗敢當故難進也公迎賔於大門内非不能至於外也所以待人君之禮也臣之意欲尊其君子之意欲尊其父故迎賔於大門内所以順其為尊君之意也三揖至於階三讓而升堂充其意諭其誠也於廟用祭器誠之盡也君子於所尊敬不敢狎不敢狎故神明之神明之故忠臣嘉賔樂盡其心也大夫立於東夾南西面北上士立於門東北面西上小臣東堂下南面西上宰東夾北西面南上内官之士在宰東北西面南上百官有司備以樂養賢也設筵加席几致安厚之義也公設醬然後宰夫薦豆菹醢士設俎公設大羮然後宰夫設鉶啓簋言以身親之也賔徧祭公設粱宰夫膳稻士膳庶羞為殷勤也賔三飯粱以湆醬以君子之厚已也賔必親徹有報之道也庭實乗皮侑以束帛雖備物猶欲其加厚焉也公拜送終之以敬也有司卷三牲之俎歸於賔館不敢䙝其餘也上大夫八豆八簋六鉶九俎庶羞二十其餘衰見是徳之殺也君子言之曰愛人者使人愛之者也敬人者使人敬之者也親人者使人親之者也自卑者使人尊之者也是故公養賔國養賢其義一也未有愛之敬之親之尊之而其位不安者也未有不愛不敬不尊不親而能長有其國者也將由乎好徳之君則將怡焉惟恐其不足於禮將由乎驕慢之君則將曰是食於我而已矣故禮君子所不足小人所㤗餘也孔子食於少施氏將祭主人辭曰不足祭也將飱主人辭曰不足飱也孔子退曰吾食而飽少施氏有禮哉故君子難親也將親之舍禮何以哉右儀禮公食大夫禮周禮秋官大行人上公之禮食禮九舉諸侯之禮食禮七舉諸子食禮五舉注鄭司農云舉舉樂也元謂九舉舉牲體九飯也疏食禮九舉者亦烹大牢以食賔無酒行食禮之時九舉牲體而食畢先鄭云舉舉樂也後鄭易之以為舉牲體者但此經食禮九舉與饗禮九獻相連故以食禮九舉為舉牲體其實舉中可以兼樂也禮記坊記子云敬則用祭器注祭器籩豆簋鉶之屬也有敬事於賔客則用之謂饗食也盤盂之屬為燕器故君子不以菲廢禮不以美没禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉右經傳食禮五禮通考卷一百五十九
