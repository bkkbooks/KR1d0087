body:
  text: 五禮通考卷二百六十一刑部尚書秦􅈍田撰凶禮十六䘮禮儀禮既夕鄭目録云士䘮禮之下篇也既已也謂先葬二日已夕哭時與葬間一日凡朝廟日請啟期必容焉此諸侯之下士一廟其上士二廟則既夕哭先𦵏前三日别録名士䘮禮下篇既夕哭注既巳也謂出門哭止復外位時請啟期告於賔注將𦵏當遷柩於是乃請啟肂之期於主人以告賔賔宜知其時也張氏爾岐曰請啟期主人日在明旦有司遂以告賔􅈍田案以上請啟期是𦵏前二日事夙興設盥於祖廟門外注祖王父也下士祖禰共廟大疏此設盥亦在門外東方如歛也盛氏世佐曰大夫士將出必先釋幣於禰故將𦵏亦朝焉所以逹死者之志也兼朝祖者祖亦平生所逮事也官師一廟據尊者而言故惟云祖其有二廟者則各於其廟朝之陳鼎皆如殯東方之饌亦如之注皆皆三鼎也如殯如大歛既殯之奠侇牀饌於階間注侇之言尸也朝正柩用此牀乃疏謂柩至祖廟兩楹之間尸北首之時用此牀􅈍田案以上陳朝祖奠二燭俟於殯門外注早闇以為明也燭用蒸疏大曰薪小曰蒸丈夫髽散帶垂即位如初注為將啟變也此互文以相見耳髽婦人之變喪服小記曰男子免而婦人髽男子冠而婦人笄如初朝夕哭門外位不疏髽是婦人之變則免是男子之變今丈夫見其人見免則丈夫當免矣婦人見其髽不見人則婦人當髽矣故云互文以相見耳小歛之時斬衰男子括髪齊衰以下男子免啟殯之後雖斬衰亦免而無括髪熊氏朋來曰小記男子免婦人髽自足為證既夕經文必亦如小記所言而有脫字註者妄謂互文適以惑人也盛氏世佐曰丈夫髻髪免婦人髽其制一也因男女異其名耳丈夫之髻髪免皆去冠婦人之髽不皆去笄上篇云婦人髽於室是時未成服去笄而髽以對丈夫髻髽免而言䘮服經云布總箭笄髽衰三年笄髽並言則著笄亦復著髽矣此男女之别也丈夫而言髽者散文通也變免言髽者以是時斬衰者當髺髪齊衰以下乃著免言免不得兼髻髪言髽則得兼髻髪免也不言婦人者丈夫如此則婦人之變可知斬衰者麻髽齊衰以下皆布髽矣蕙田案以喪服小記證之則丈夫以下當有脫字注疏以為互文亦曲觧也盛氏之說與注疏異附之以備一觧未識果是否也婦人不哭主人拜賔入即位袒注此不蒙如初者以男子入門不哭也不哭者將有事止讙囂也商祝免袒執功布入升自西階盡階不升堂聲三啟三命哭注功布灰治之布也執之以接神為有所拂仿也聲三三有聲存神也啟三三言啟告神也舊說以為聲噫興也今文免作絻疏拂仿猶言拂拭燭入注照徹與啟肂者一疏一燭入室中照徹奠燭於堂照開殯肂也祝降與夏祝交于階下取銘置於重注祝降者祝徹宿奠降也與夏祝交事相接也夏祝取銘置於重為啟肂遷之吉事交相左凶事交相右疏此祝不言商夏則周祝也燭入室時周祝從而入徹宿奠降降時夏祝自下升取銘降至於重為妨啟殯故也周祝降階當近東夏祝升階當近西是交相右也踊無算注主人也之疏此聞棺柩時商祝拂柩用功布幠用夷衾注拂去塵也幠覆之為其形露矣疏夷衾於後無徹文當韻柩入壙盛氏世佐曰此不見舉殯者升之節亦文不具蕙田案以上啓殯遷於祖用軸注遷徒也徙於祖朝祖廟也檀弓曰殷朝而殯於祖周朝而遂葬盖象平生時將出必辭尊者軸輁軸也軸状如轉轔刻兩頭為軹輁狀如長牀穿程前後著金乃闗軸馬大夫諸侯以上有四周謂之輴天子畫之以龍黄氏榦曰案本經記有朝禰一節禮畢乃適祖今經文但言朝祖注云上士祖禰異廟下士祖禰共廟專言祖者共廟則舉祖以包禰兼言禰者異廟則先禰而後祖經言下士記言上士文有詳畧盖互見耳重先奠從燭從柩從燭從主人從注行之序也主人從者丈夫由右婦人由左以服之親疏為先後各從其昭穆男賔在前女賔在後疏柩前後有燭以柩車隔闇故各有燭以照道及至廟燭在前者开炤正柩在後者在階下炤开柩郝氏敬曰奠即室中先夕之奠燭即前二燭蕙田案奠者昨日之夕奠設於室中者也以其從殯宫而來故下注謂之從奠重與奠皆神之所馮依故啟殯遷祖之日以二者先柩而行也升自西階注柩也猶用子道不由阼也敖氏繼公曰升自西階神之也凡柩歸自外而入廟者既小歛則升自阼階未忍異於生也既大歛則升自西階此亦入廟耳故其禮與大歛而入者同奠俟於下東面北上注俟正柩也主人從升婦人升東面衆主人東即位注東方之位主疏舉主婦東面主人西面可知唯主人婦升衆主人從柩至西階下遂郷東階下即西面位蕙田案衆主人東即位監本脫主字據張爾岐本増入正柩於兩楹間用夷牀注兩楹間象鄉户牖也是時柩北首疏户牖之間賔客之位亦是人君受臣子朝事之處父母神之所在故於兩楹之間北面鄉之主人柩東西面置重如初注如殯宫時也南疏亦如上篇三分庭一在而置之席升設於柩西奠設如初巾之升降自西階注席設於柩之西直柩之西當西階也從奠設如初東面也不統於柩神不西面也不設柩東東非神位也巾之者為禦當風塵疏殯宫朝夕奠設於室中者從柩而來還據室中東面設之於席前也楊氏復曰喪奠之禮有三變始死奠於尸東小斂奠亦如之既殯奠於奥設席東面朝夕奠朔月奠薦新奠亦如之啟殯入廟席設於柩西奠設如初如初者如室中之神席東面也朝祖奠亦如之降奠及祖奠遣奠皆如之但設於柩東為異主人踊無算降拜賔即位踊襲主婦及親者由足西面注設奠時婦人皆室户西南面奠畢乃得東面親者西面堂上廹疏者可以居房中疏主人從殯宫中降拜賔入即位袒至此乃襲襲者先即位踊踊訖乃襲絰於序東也設奠之時婦人辟之户西南面待設奠訖乃由柩足鄉東西面不即鄉柩東西面者以主人在柩東待奠訖主人降拜賔婦人乃得東也郝氏敬曰由足柩北首以南為足蕙田案以上朝祖薦車直東榮北輈注薦進也進車者象生時將行陳駕也今時謂之魂車輈轅也車當東榮東陳西上於中庭薦疏以明旦將行故豫陳車此車非載柩之車即記云乗車道車槀車也以此言之先陳乗車次陳道車次陳槀車質明滅燭注質正也徹者升自阼階降自西階注徹者辟新奠不設序西南已再設為䙝疏徹者徹去從奠以辟新奠也乃奠如初升降自西階注為遷祖奠也奠升不由阼階柩北首辟其足疏如初者亦於柩西當階之上東面席前奠之欽定義疏從奠即昨日之夕奠也此遷祖奠則本日之朝奠矣惟於質明後不用燭耳徹從奠而後設遷祖奠徹遷祖奠而後設祖奠祖奠則殷奠也凡設殷奠當夕則不夕奠當朝則不朝奠以日奠不過於二也朱子語類問朝祖時有遷祖奠恐在祖廟之前祖無奠而亡者難獨饗否曰不須如此理㑹禮說有奠處自合有無奠處自合無更何用疑欽定義疏始死之後將葬柩行之前無頃刻離於奠者直以是為魂魄之馮焉若祖禰在廟而以喪奠干之是黷且不類也問者昧於吉凶之分非可與言禮者故朱子以不答答之主人要節而踊注節升降南疏奠升時主人踊降時婦人踊由重主人踊此不言婦人文不具也薦馬纓三就入門北面交轡圉人夾牽之注駕車之馬每車二疋纓今馬鞅也就成也諸侯之臣飾纓以三色而三成此三色者盖絛絲也其著之如罽然天子之臣如其命數王之革路絛纓圉人養馬者在左右曰夾既奠乃薦馬者為其踐汚廟中也凡入門參分庭一在南疏此三色如聘禮記三色朱白蒼也御者執䇿立于馬後哭成踊右還出注主人於是乃哭踊者薦車之禮成於薦馬疏主人哭踊訖馬則右還而出賔出主人送於門外觀成案喪禮主哀薦車薦馬時主人無不哭踊之理故注以此哭成踊指主人言未嘗不是但玩文義則上直云御者執䇿云云而下文賔出始指明主人送則敖氏謂此哭踊乃指御者言於文既順於理亦更周至盖臨喪當哀與其事者亦應有哭踊時至主人之哭踊固不言可知爾蕙田案以上薦車馬設遷祖奠有司請祖期注亦因在外位請之當以告賔每事畢輙出將行而飲酒曰祖祖始也曰日側注側昳也謂將過中之時張氏爾岐曰主人應有司之辭主人入袒乃載踊無算卒束襲注袒為載變也乃舉柩郤下而載之束東棺於柩車賔出遂匠納車於階間謂此車大疏柩在堂北首今郤下以足鄉前下堂載於車也䘮記云君盖用漆三衽三束檀弓曰棺束縮二横三彼是棺束此云卒束則非棺束是載柩訖乃以物束棺使與柩車相持不動也敖氏繼公曰主人入袒當在阼階下既載則在柩東柩東之位亦當柩少北降奠當前束注下遷祖之奠也當前束猶當尸腢也亦在柩車西束有前後也疏未束以前其奠使人執之待束訖乃降奠之當束也郝氏敬曰當柩車西之前束柩北首奠當尸右肩也商祝飾柩一池紐前䞓後緇齊三采無貝注飾柩為設牆栁也巾奠乃牆謂此也牆有布帷栁有布荒池者象宫室之承霤以竹為之狀如小車笭衣以青布一池縣於栁前士不揄絞紐所以聨帷荒前赤後黑因以為飾左右面各有前後齊居栁之中央若今小車盖上蕤矣以三采繒為之上朱中白下蒼著以絮元士以上有貝繞疏柩車即周禮蜃車也四輪廹地兩畔䜿軨子以帷之上以荒一池懸於前面荒之𤓰端荒上中央加齊喪大記注云在傍曰帷在上曰荒皆所以衣栁也則帷荒總名為栁栁之言聚諸飾之所聚也對言之則帷為牆象宫室有牆壁荒為栁以其荒有黼黻及齊三采諸色所聚故得栁名總而言之巾奠乃墻及檀弓云周人墻置翣皆牆中兼有栁縫人云衣翣栁之材栁中兼墻矣喪大記君三池大夫二池士一池君三面俱有大夫縣於兩相士縣於栁前面而已士不榆絞者榆鷂也絞者倉黄之色人君於倉皇色繒上又畫鷂雉之形縣於池下大夫士則闕之齊若人之臍亦居身之中央也䘮大記云士齊三采一貝注云齊象車盖蕤縫合雜采為之形如𤓰分然綴貝落其上及旁彼為天子元士故有貝此諸侯之士故無貝也張氏爾岐曰飾柩在旁為牆牆有帷在上為栁栁有荒牆栁自其縛木為格者而言帷荒自其張於外者而言池象承霤即檐也紐垂於四隅齊者栁之頂結也設披注披絡栁棺上貫結於戴人居旁牽之以備傾虧喪大記曰士戴前纁後緇二披用纁張氏爾岐曰以帛繫棺紐着栁骨謂之戴人以帛繫戴而出其餘於帷外使人牽之謂之披屬引注屬猶著也引所以引柩車在軸輴曰紼古者人引柩春秋傳曰坐引而哭之三疏引謂紼繩屬著於柩車欽定義疏棺飾曰栁盖以把栁為骨而外以布衣之栁者以其質言牆者以其形言也池孔氏謂織竹為籠蓋為長籠仰之類池也齊荒之頂也若今之轎頂然束棺於柩車者曰束連繫棺束與栁材而結之者曰戴貫結於戴而出之於外人居旁牽之者曰披車之轅前後出横縛於轅以屬引者曰輅以長繩屬輅之兩端而人引之者曰引行道曰引在棺曰紼蕙田案以上載柩飾柩車陳明器於乗車之西注明器藏器也檀弓曰其曰明器神明之也言神明者異於生器竹不成用瓦不成味木不成斵琴瑟張而不平竽笙備而不和有鐘磬而無筍簴陳器於乗車之西則重之北也折横覆之注折猶庪也方鑿連木為之蓋如牀而縮者三横者五無簀窆事畢加之壙上以承抗席横陳之者為苞筲以下䋫於其北便也覆之見善面也疏折加於壙時善者鄉下今陳之反善面鄉上也抗木横三縮二注抗禦也所以禦止土者其横與縮各足掩壙疏明器由羡道入壙口惟以下棺大小容棺而已今抗木亦足掩壙口也加抗席三注席所以禦塵之疏加者加於抗木上加茵用疏布緇翦有幅亦縮二横二注茵所以藉棺者翦淺也幅縁之亦者亦抗木也及其用之木三在上茵二在下象天三合地二人藏其中焉疏以後陳者先用故先陳抗木於上次陳抗席而後陳茵及塟時茵先入壙窆事訖加折壙上則先用抗席後用抗木是其次也折於抗席前用而不加於抗席之上者以長大故别陳於南用之仍在茵後張氏爾岐曰茵設壙中先布横三乃布縮二厝柩後施抗壙上先用縮二乃用横三注云木三在上茵二在下據既設後人所見而言也其實抗茵皆三者在外二者在内如渾天家地之上下周匝皆有天也器西南上綪注器目言之也陳明器以西行南端為上綪屈也不容則屈而反之茵注茵在抗木上陳器次而北也鄉疏茵非明器而言之者陳器從此茵北為次第故也苞二注所以裹奠羊豕之肉體疏下文既設遣奠而云苞牲取下故知苞二所以裹奠羊豕之肉筲三黍稷麥注筲畚種類也其容盖與簋同一觳也與疏筲以菅草為之畚器所以盛種此筲畚同類也罋三醯醢屑冪用疏布注罋瓦器其容亦盖一觳屑薑桂之屑也内則曰屑桂與薑冪覆也甒二醴酒冪用功布注甒亦瓦器皆木桁乆之注桁所以庪苞筲罋甒也乆當為灸灸謂以盖案塞其口每器異桁用器弓矢耒耜兩敦兩杅槃匜匜實於槃中南流注此皆常用之器也杅盛湯漿槃匜盥器也流匜口也敖氏繼公曰耒耜田器也此有爵矣乃以耒耜為用器為其有圭田故也圭田者主人所親耕以共祭祀之齊盛者也無祭器注士禮略也大夫以上兼用鬼器人器也有疏明器鬼器也祭器人器也士禮略無祭器明器而實之大夫以上尊者備故兩有若兩有則實祭器不實明器有燕樂器可也注與賓客燕飲用樂之器也役器甲胄干笮注此皆師役之器甲鎧胄兠鍪干楯笮矢箙燕器杖笠翣注燕居安體之器也笠竹􅡓盖也翣扇燕疏杖所以扶身笠所以禦暑翣所以招凉皆居用之張氏爾岐曰載柩陳器二事畢則日及側矣蕙田案以上陳明器徹奠巾席俟於西方主人要節而踊注巾席俟於西方祖奠將用焉要節者來象升丈夫踊去象降婦人踊徹者由明器北西面既徹由重南東不設於序西南者非宿奠也宿奠必設者為神馮依之乆也張氏爾岐曰此所徹遷祖之奠為將旋柩鄉外更設祖奠故遷之巾席即所徹奠之巾席俟者奠已東去而巾席猶執以俟也註象升象降者此奠在庭徹者無升降之事止有往來主人以其往來為踊節與徹室中之奠升階降階者同故云象也袒注為將祖變商祝御柩注亦執功布居前為還柩車為節乃祖注還柩鄉外為行始使疏旋柩車轅鄉外也踊襲少南當前束注主人也柩還則當前束南疏前袒為祖變今既祖訖故踊而襲車未還之時當前束近北今還車則當前束少南婦人降即位於階間注為柩將去有時也位東上堂疏云位東上者以堂上時婦人在阼階西面統於下男子今柩車南還男子亦在車東故婦人降亦東上統於男子也婦人不鄉車西者以車西有祖奠故辟之在車後張氏爾岐曰婦人在車後南面故注云東上祖還車不還器注祖有行漸車亦宜鄉外也器之陳自己南上張氏爾岐曰車前所薦之乗車道車槀車也陳器本自南上不湏更還也祝取銘置於茵注重不藏故於此移銘加於茵上今疏初死為銘置於重啟殯祖廟皆然將行置於茵者重不藏擬埋於廟門左茵是入壙之物銘亦入壙之物故置於茵也二人還重左還注重與車馬還相反由便也面疏車馬在中庭之東以右還鄉門為便重在門内鄉北人在其南以左還鄉門為便布席乃奠如初主人要節而踊注車已祖可以為之奠也是之謂祖奠來疏祖奠既與遷祖奠同車西人皆從車西則此要節而踊一與遷祖奠同楊氏復曰要節而踊者來從重北而西降由重南而東來象升大夫踊出象降婦人踊所謂要節也薦馬如初注柩動車還宜新之也賔出主人送有司請葬期注亦因在外位時入復位注主人也自死至於殯自啟至於葬主人及兄弟恒在内位疏自死至於殯在内位據在殯宫中自啟至於葬在内位據在祖廟中始死未小歛以前位在尸東小歛後位在阼階下若自啟之後在廟位亦在阼階下也張氏爾岐曰主人既以葬期命有司而遂入蕙田案以上祖奠公賵元纁束馬兩注公國君也賵所以助主人送葬也兩馬士制也春秋傳曰宋景曹卒魯季康子使冉求賵之以馬曰其可以稱旌繁乎人疏春秋傳見哀公二十三年引之者證公有賵馬助之事擯者出請入告主人釋杖迎於廟門外不哭先入門右北面及衆主人袒注尊君命也衆主人自若西面馬入設注設於庭在重南賔奉幣由馬西當前輅北面致命注賔使者幣元纁也輅轅縳所以屬引由馬西則亦當前輅之西於是北西致命得鄉柩與奠柩車在階間少前三分庭之北輅有前後疏賔使者即士也輅者以木縳於柩車轅上以屬引於上而挽之故名轅縳也主人哭拜稽顙成踊賓奠幣於棧左服出注棧謂柩車也凡士車制無漆飾左服象授人授其右也服車箱疏主人哭拜仍於門右北面柩車四輪廹地無漆飾故言棧也此車南鄉以東為左尸在車上以東為右故奠左服象授人右也宰由主人之北舉幣以東注柩東主人位以東藏之疏此時主人仍在門東北面此位雖無主人既有定位宰不得履之故由其北也士受馬以出注此士謂胥徒之長也有勇力者受馬聘禮曰皮馬相間可也主人送於外門外拜襲入復位杖敖氏繼公曰此亦為君命袒故既送使者則襲於外蕙田案以上公賵賔賵者將命注賔卿大夫士也將疏言將命者身不來遣使者命告主人擯者出請入告出告須注不迎告曰孤某須馬入設賔奉幣擯者先入賔從致命如初注初公使者主人拜於位不踊注柩車東位也既啟之後與在室同此疏始死時庶兄弟襚使人以將命于室主人拜於位主人亦拜於位俱是不為賔出有君命亦出迎矣賔奠幣如初舉幣受馬如初擯者出請注賔出在外請之為其復有事報疏若無事賔事畢送去也若奠注賔致可以奠也者疏所致之物或堪為奠也入告出以賔入將命如初士受羊如受馬注士亦謂胥徒之長敖氏繼公曰如受馬如其受之以出也羊者士葬奠之上牲故此奠者用之奠不用幣又請注又復也郝氏敬曰賔又出擯又請若賻注賻之言補也助也貨財曰賻入告主人出門左西面賔東面將命注主人出者賻主施於主人主人拜賔坐委之宰由主人之北東面舉之反位注坐委之明主人哀慼志不在受人物反位反主人之後位疏宰位在主人之後若無器則捂受之注謂對相授不委地又請賔告事畢拜送入張氏爾岐曰主人入欽定義疏賵奠贈主人皆不出而獨為賻出蓋賻不施於死者則賔固不入至柩車之前致命也主人豈得不出廟門而受之乎或疑為輕禮而重財非也贈者將命注贈送張氏爾岐曰謂以幣若器送死者也擯者出請納賔如初注如其入告出告須賔奠幣如初注亦於棧左服若就器則坐奠於陳注就猶善也贈無常惟翫好所有陳明器之陳張氏爾岐曰謂乗車之西陳明器之處所也凡將禮必請而后拜送注雖知事畢猶請君子不必人意兄弟賵奠可也注兄弟有服親者可且賵且奠許其厚也賵奠於死生兩施所知則賵而不奠注所知通問相知也降於兄弟奠施於死者為多故不奠知死者贈知生者賻注各主於所知盛氏世佐曰兄弟兼同姓異姓言也兄弟戚矣必賵奠兼行於情始稱然容有貧而無以為禮者聖人不責備焉經云可也者非許其厚乃所以恤其無也不言賻與贈者所知且然兄弟可知也但其厚薄亦稱家為之耳所知兼知死知生者言也許其賵者助喪以賵為重也不許其奠者禮過其情君子惡其不誠也既不奠矣而又許其贈若賻者所以伸其情也有餘而好行其徳聖人亦不禁也檀弓云朋友吾哭諸寢門之外所知吾哭諸野則所知疏於朋友矣推朋友之情亦當賵奠並有而禮必稱其家之有無不可預定故空其文也書賵於方若九若七若五注方板也書賵奠賻贈之人名與其物於板毎板若九行若七行若五行書遣於䇿注䇿簡也遣猶送也謂所當藏物茵以下疏聘禮記云百名以上書於䇿不及百名書於方以賔客贈物名字少故書於方遣送死者明器之等并贈死者玩好之物名字多故書之於䇿乃代哭如初注棺柩有時將去不忍絶聲也初謂既小歛時宵為燎於門内之右注為哭者為明間疏門内之右門東也柩車東有主人階有婦人故於門右照之蕙田案以上賔賵奠賻賵自夙興設盥於祖廟至此並葬前一日事厥明陳鼎五於門外如初注鼎五羊豕魚腊鮮獸各一鼎也士禮特牲三鼎盛葬奠加一等用少牢也如初如大歛奠時疏亦如大歛陳鼎在廟門外其實羊左胖注反吉祭也言左胖者體不殊骨也也疏特牲少牢吉祭皆升右胖此用左胖故云反吉祭體不殊骨者據脊脇已上膞胳已下共為一也脾不升注周貴肩賤髀腸五胃五注亦盛之也三疏少牢用腸三胃今加至五亦是盛此奠也離肺注離㨒中疏㨒離之不絶央少許豕亦如之豚觧無腸胃注如之如羊左胖髀不升離肺也豚解解之如解豚亦前肩後肫脊脅而已無腸胃者君子不食溷腴疏豚解總有七叚今取左胖則為四叚與羊異也楊氏復曰士喪禮小歛陳一鼎於門外其實特豚四鬄兩胉脊然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也大斂朔月奠遣奠禮雖寖盛豚解合升如初至虞然後豚解體解兼有焉魚腊鮮獸皆如初注鮮新殺者士腊用兎加鮮獸而無膚者豕既豚觧畧之疏腊鮮二者皆用兎𦵏奠用少牢攝盛則當用膚與少牢同以豕既豚觧喪事略則無膚者亦畧之而加鮮獸也蕙田案士喪遣奠用五鼎先王重葬禮使同於大夫也大夫五鼎有膚無鮮獸此有鮮獸無膚一則以喪祭不可同於吉祭一則以大夫士尊卑不同㣲示區别之義也東方之饌四豆脾析蜱醢葵菹蠃醢注脾析百葉也蜱蜯也疏周禮醢人注云脾析牛百葉此用少牢無牛當是羊百葉四籩􅀥糗栗脯注糗以豆糗粉餌張氏爾岐曰據疏引籩人注籩實有糗餌粉餈二物此經云糗但糗餌也二物皆稻黍米粉所為合蒸則為餌作餅熟之則為餈又糗與粉皆大豆末初擣之則為粉熬之則為糗糁二物使不粘着也注云以豆糗粉餌謂以豆之糗而粉此餌也餌類今蒸糕餈類今胡餅醴酒注此東方之饌與祖奠同在主人之南當前輅北上巾之疏祖奠與大歛奠同二豆二籩此𦵏奠四豆四籩籩豆雖不同而同處耳云北上者盖兩甒在北次南饌四豆豆南饌四籩也陳器注明器也夜歛藏之陳疏至此厥明更之也滅燎執燭俠輅北面注照徹與葬奠也疏二人執燭俠輅北面輅西者照徹祖奠輅東者照葬奠之饌賔入者拜之注明自啟至此主人無出禮疏所以不出迎者既啟之後既覩尸柩不可離位以迎賔惟有君命乃出也敖氏繼公曰亦鄉而拜之欽定義疏盖隨其入之先後而拜之以葬日事繁期促賔之執事於門外者必多不得一時畢入也徹者入丈夫踊設於西北婦人踊注猶阼階升時也亦既盥乃入入由重東而主人踊猶其升也自重北西面而徹設于柩車西北亦猶序西南疏將設葬奠先徹祖奠徹者東注由柩車北東適葬奠之饌之疏以其徹訖當設葬奠故徹者由柩車北東適葬奠饌取而設於柩車西也鼎入注舉入陳之也陳之盖於重東北西面北上如初乃奠豆南上綪籩蠃醢南北上綪注籩蠃醢南辟醴酒也張氏爾岐曰先饌脾析於西南次北蜱醢蜱醢東葵菹菹南蠃醢是謂南上綪籩於蠃醢以南為次先設􅀥􅀥南設糗糗東設栗栗北設脯是謂北上綪籩之西脾析之南設醴酒故注云辟醴酒也爼二以成南上不綪特鮮獸注成猶併也不綪者魚在羊東腊在豕東疏於西南設羊次北豕以魚設於羊東設腊於魚北還從南為始是不綪也鮮獸在北無偶故云特張氏爾岐曰羊豕魚腊之次自南而北而東而南廻環設之為綪羊豕魚腊併設皆自南始為不綪醴酒在籩西北上注統於豆也奠者出主人要節而踊注亦以往來為節奠由重北西既奠由重南東北疏此奠饌在輅東言由重北者亦是由車前明器之鄉柩車西設之設訖由柩車南而東者禮之常也蕙田案以上遣奠此奠亦曰葬奠甸人抗重出自道道左倚之注還重不言甸人抗重言之者重既虞將埋之言其官使守視之抗舉也出自道出從門中央也不由闑東西者重不反變於恒出入道左主人位今時有死者鑿木置食其中樹於道側由此壁疏道左倚之者當倚於門東北敖氏繼公曰上篇言甸人置重於中庭於此又言甸人始終之辭也所以見其間凡有事於重者皆此甸人為之欽定義疏雜記重既虞而埋之盖既不隨至壙所又不可留於廟中故於柩將行而因出之於外也薦馬馬出自道車各從其馬駕於門外西面而俟南上注南上便其行也行者乗車在前道槀序從序疏案下記云乗車載旜道車載朝服槀車載簑笠是從也蕙田案以上出重與車馬徹者入踊如初徹巾苞牲取下體注苞者象既饗而歸賔爼者也取下體者脛骨象行又爼實之終始也士苞三个前脛折取臂臑後脛折取骼亦得爼釋三个雜記曰父母而賔客之所以為哀爼疏肩臂臑在俎上端為爼實之始膞胳在俎下端為實之終今取此兩端脛骨苞以歸父母也士苞三个者自上之差檀弓云國君七个遣車七乗大夫五个遣車五乗遣卓載所苞遣奠而藏之者大夫以上乃有遣車士無遣車則所苞者不載於車直持之而已云亦得爼釋三个者羊爼仍有肩肫兩段在爼豕左胖豚觧今折取外仍有四段在爼相通計之為爼釋三个留之為分禱五祀也張氏爾岐曰牲陳於俎其脛骨在兩端故脛骨為爼實之終始士一苞之中有三个牲體臂也臑也骼也前陳器云苞二羊豕各一苞也不以魚腊注非正牲也蕙田案以上苞牲行器注目葬行明器在道之次敖氏繼公曰器謂折抗席抗木行謂舉之以出茵苞器序從注如其陳之先後車從注次器徹者出踊如初注于是廟中當行者唯柩車蕙田案以上行器主人之史請讀賵執算從柩東當前東西面不命毋哭哭者相止也唯主人主婦哭燭在右南面注史北面請既而與執算西面於主人之前讀書釋算燭在右南面照書便也讀書釋算則坐注必釋算者榮其多疏讀書者立讀之敬也釋算者坐為釋之便也卒命哭滅燭書與算執之以逆出注卒已也郝氏敬曰執算者先出讀者從為逆出也公史自西方東面命毋哭主人主婦皆不哭讀遣卒命哭滅燭出注公史君之典禮書者遣者入壙之物君使史來讀之成其得禮之正以終也燭俠輅張氏爾岐曰讀賵讀遣皆以告死者盛氏世佐曰讀賵釋算讀遣不釋算者以賵是賔物不出於一人故湏一記之以多為榮遣是主人之物則但告數而已人子之心不自見其多也蕙田案以上讀賵讀遣商祝執功布以御柩執披注居柩車之前若道有低仰傾虧則以布為抑揚左右之莭使引者執披者知之士執披八人御疏葬時乗車故有柩車前引柩者及在傍執披者皆治之使執披者知其左右引者知其上下也張氏爾岐曰引柩者執披者皆視商祝所執布以用力也主人袒乃行踊無算注袒為行變也乃行謂柩車行也凡從柩者先後左右如遷於祖之序以疏上遷於祖時注云主人從者丈夫由右婦人由左服之親疎為先後各從其昭穆男賔在前女賔在後此從柩向壙之序一如之也出宫踊襲注哀次處疏大門外有賔客次舎之父母生時接賔之所主人至此感而哀此次是以有踊踊訖即襲襲訖而行也敖氏繼公曰出宫而踊哀親之遂離其室也行路不宜袒故於此而襲蕙田案以上柩行至於邦門公使宰夫贈元纁束注邦門城門也贈送也疏邦門國城北門也至壙窆訖時贈用制幣元纁束以其君物故用之送終也主人去杖不哭由左聽命賔由右致命注柩車前輅之左右也當時止柩車門疏在廟柩車南鄉左則在東此出國北柩車鄉北左則前輅之西也主人哭拜稽顙賔升實幣於盖降主人拜送復位杖乃行注升柩車之前實其幣於柩盖之栁中若親授之然復位反柩車後疏賔升實幣於盖載以之壙此贈專為死者故若親授之然云復位反柩車後者上在廟位在柩車東此行道故在柩車後也欽定義疏聘禮聘卿行舎於郊公使卿贈故公之使人贈其臣亦以出國門為節也初喪既襚之矣又或視其大歛矣既則賵之其柩行也又贈之於士如此則大夫以上又加厚可知此堂亷不隔同休共戚之情也蕙田案以上公贈至於壙陳器於道東西北上注統於壙故疏廟中南上此則北上云統於壙也茵先入注當藉柩也元士則塟用輁軸加茵焉屬引注於是說載除飾更屬引於緘耳疏棺束有前後於束末皆為緘耳以紼貫結之而下棺主人袒衆主人西面北上婦人東面皆不哭注俠羡道為位靜疏不哭者下棺宜敖氏繼公曰袒為窆變也婦人亦北上皆不哭為有事不可喧譁也乃窆主人哭踊無算注窆下棺也壙疏主人哭踊不言處還於東西面也襲贈用制幣元纁束拜稽顙踊如初注丈八尺曰制二制合之束十制五合疏毎一端丈八尺二端為一匹五匹合為十制也盛氏世佐曰此贈幣主人所自盡也故拜稽顙以送之不言公及賔所贈者榮君之賜公贈自當用之賔贈則不必盡用盖亦如庶襚之例也雜記云魯人之贈也二元二纁檀弓云既窆主人贈而祝宿虞尸則贈之出於主人明矣疏云即公所贈者盖見元纁束三字偶同故附㑹之耳卒袒拜賔主婦亦拜賔即位拾踊三襲注主婦拜賔拜女賔也即位反位也其疏卒謂贈卒更袒拜賔云反位者各反羡道東西位男賔在衆主人之南女賔在衆主婦之南也賔出則拜送注相問之賔也凡弔賔有五去皆拜之此舉中焉疏弔賔有五者案雜記云相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞袝而退此經既葬而退是相見問遺之賔也藏器於旁加見注器用器役器也見棺飾也更謂之見者加此則棺柩不復見矣先言藏器乃云加見者器在見内也内之者明君子之於事終不自逸也檀弓曰周人牆置翣疏棺飾則帷荒也加此則棺柩不復見故名為見也帷荒在柩外周人名為牆其外又置翣為飾藏苞筲於旁注於旁者在見外也不言罋甒饌相次可知四者兩兩而居喪大記曰棺椁之間君容祝大夫容壼士容甒加折郤之加抗席覆之加抗木注宜次也張氏爾岐曰折陳之美面向上今用則美面向下故謂郤之注云宜次謂三者之用有宜有次也實土三主人拜鄉人注謝其勤勞助疏勤勞謂在道助執紼在壙下棺及實土也即位踊襲如初注哀親之在斯踊疏既拜鄉人乃於羡道東即位無算如初也蕙田案以上窆自是𦵏事畢乃反哭入升自西階東面衆主人堂下東面北上注西階東面反諸其所作也反哭者於其祖廟不於阼階西面西方神位疏檀弓云反哭於堂反諸其所作也注云親所行禮之處是也反哭於祖廟者謂下士祖禰共廟若適士二廟者反哭先於祖後於禰遂適殯宫也特牲少牢皆布席於奥殯又在西階是西方神位主人非行事直哭而已故就神位敖氏繼公曰反哭於祖廟者為其棺柩從此而出也升自西階未變其鄉者升堂之路也升堂而不見故但止於西階之上焉此亦變於尸柩在堂之位也婦人入丈夫踊升自阼階注辟主人也主婦入於室踊出即位及丈夫拾踊三注入於室反諸其所養也出即位堂上西面也拾更也疏檀弓云主婦入於室反諸其所養也注云親所饋食之處哭也自小歛已後主婦等位皆在阼階上西面是以知出即位者阼階上西面也凡成踊而拾皆主人踊主婦踊賔乃踊故云更也敖氏繼公曰惟主婦入於室則餘人先即位於阼矣必入於室者以其生時於此共祭祀也入室又不見矣故出而與主人相向而哭踊同其哀也賔弔者升自西階曰如之何主人拜稽顙注賔弔者衆賔之長也反而亡焉失之矣於是為甚故弔之弔者北面主人拜於位不北面拜賔東者以其亦主人位也疏主人拜賔於西階上東面位注云亦主人位者特牲少牢助祭之賔主人皆拜送於西階東面故此東面不移以其亦主人位故也張氏爾岐曰始死拜賔於西階此反而亡亦拜賔於西階將無同歟賓降出主人送於門外拜稽顙注此於雜記五賓當相見之賓遂適殯宫皆如啟位拾踊三注啟位婦人入升堂丈夫即中庭之位疏此如啟位婦人亦即位於堂東西面主人即位於堂下直東序西面直東序西面即中庭位也兄弟出主人拜送注兄弟小功以下也異門大功亦可以歸哭疏此兄弟等始死之時皆來臨喪殯訖各歸家朝夕則就殯所至葬開殯而來喪所至反哭亦各歸其家至虞卒哭祭還來預焉故喪服小記云緦小功虞卒哭則皆免是也敖氏繼公曰賔出自廟兄弟出自殯宫親踈之殺衆主人出門哭止闔門主人揖衆主人乃就次注次倚廬也蕙田案以上反哭是日即舉初虞之禮猶朝夕哭不奠注是日也以虞易奠張氏爾岐曰經言葬後至練皆朝夕哭與未葬同但不奠耳大斂以來朝夕有奠葬後乃不奠也注言是日謂葬之日下注所云朝而葬日中而虞是也疏以為釋不奠之故尚未是三虞注虞喪祭名虞安也骨肉歸於上精氣無所不之孝子為其彷徨三祭以安之朝葬日中而虞不忍一日離張氏爾岐曰三虞謂𦵏日初虞再虞用柔日後虞用剛日共三祭也卒哭注卒哭三虞之後祭名始朝夕之間哀至則哭至此祭止也朝夕哭而已張氏爾岐曰後虞之後又遇剛日舉此祭既祭則唯朝夕哭不無時哭故名其祭曰卒哭也盛氏世佐曰自殯後未卒哭以前其朝夕也兄弟外兄弟賓皆與焉卒哭後小祥以前之朝夕哭則惟主人主婦哭於殯宫而已既袝仍哭於殯宫者以其主尚在寢也期而小祥則不朝夕哭矣然則卒哭云者卒兄弟外兄弟等之哭而喪家之哭固未卒也已明日以其班祔注班次也祔卒哭之明日祭名祔猶屬也祭昭穆之次而屬之孔氏穎達曰卒哭明日而立主祔於廟隨其昭穆從祖父食卒哭主暫時祔廟畢更還殯宫至小祥作粟主入廟乃埋桑主於祖廟門左埋重處欽定義疏此數事皆因既葬反哭而終言之蕙田案以上略舉葬後儀節記敖氏繼公曰此上下二篇之記也士處適寢寢東首於北墉下注將有疾乃寢於適室首疏若不疾則在燕寢東鄉生氣之所有疾疾者齊注正情性也適寢者不齊不居其室養者皆齊注憂也徹琴瑟注去樂欽定義疏士無故不去琴瑟今以疾故徹之疾愈則仍設之也疾病外内皆埽注為有賔客來問也疾甚曰病徹䙝衣加新衣注故衣垢汙為來人穢惡之更疏徹䙝衣據死者而言徹䙝衣謂故元端加新衣謂加新朝服案司服士之齊戒服元端此疾者與養疾者皆齊明服元端矣檀弓云始死羔裘元冠者易之而已羔裘元冠即朝服故知臨死所著則朝服也御者四人皆坐持體注為不能自轉側御者今時侍從之人男女改服注為賔客來問病亦朝服主人深衣屬纊以俟絶氣注為其氣微難節也纊新絮男子不絶於婦人之手婦人不絶於男子之手注備䙝乃行禱於五祀注盡孝子之情五祀博言之士二祀曰門曰行朱子語類問禱果有應之之理否或知其無應之之理而為之曰禱是正禮自合有應不可謂知其無是理而姑為之敖氏繼公曰此禱於平常所祭者也士之得祭五祀於此可見乃卒注卒終也主人啼兄弟哭注哀有甚有否於是始去冠而笄纚服深衣檀弓曰始死羔裘元冠者易之引疏啼是哀之甚氣竭而息之聲不委曲若往而不反檀弓者證深衣易去朝服之事也設牀第當牖衽下莞上簟設枕注病卒之間廢牀至是設之事相變衽卧席遷尸注徙於牖下也於是幠用斂衾者疏徙於牖下者即上文牀第當牖也張氏爾岐曰此據經士死於適室幠用斂衾之文而記君子正終人子侍養之事蕙田案以上記疾病始死之事復者朝服左執領右執要招而左注衣朝服服未可以變疏招魂所以求生左陽陽主生故用左也左執領謂爵弁服也張氏爾岐曰方冀其生故復者服朝服不變凶服楔貌如軛上兩末注事便也末疏如軛謂如馬鞅軛馬領亦上兩令以屈處入口取出時易也綴足用燕几挍在南御者坐持之注挍脛也尸南首几脛在南以拘足則不得辟戾矣即牀而奠當腢用吉器若醴若酒無巾柶注腢肩頭也用吉器器未變也或卒無醴用新酒肩疏即就也謂就尸牀而設之尸南首則在壯東當尸頭也若醴若酒科有其一不得並用蕙田案以上記復楔齒綴足設奠諸儀物赴曰君之臣某死赴母妻長子則曰君之臣某之某死注赴走告也蕙田案此記赴君之辭室中唯主人主婦坐兄弟有命夫命婦在焉亦坐注别尊卑也士疏案大記士之喪主人父兄主婦姑姊妹皆坐鄭云賤同宗尊卑皆坐此命夫命婦之外立而不坐者此謂有命夫命婦來兄弟為士者則立若無命夫命婦則同宗皆坐也蕙田案此記室中哭位尸在室有君命衆主人不出注不二主耳疏衆主人不出在尸東經直云主人惟君命出不言衆主人故記之蕙田案此記衆主人襚者委衣於牀不坐注牀髙由便其襚於室户西北面致命注始死時也庭疏小斂後襚於堂則中北面致命蕙田案此記襚者儀位夏祝浙米差盛之注差擇之盛氏世佐曰必差之者擇其粒之堅好者以飯尸而以其餘為粥懸於重也御者四人抗衾而浴䄠第注抗衾為其祼程蔽之也䄠袒也袒簀去席盝水便其母之喪則内御者浴鬠無笄注内御女御也無笄猶丈夫之不冠也設明衣婦人則設中帶注中帶若今之禈襂設疏設明衣者男子其婦人則中帶欽定義疏玩記意似謂男婦皆設明衣裳而婦人又多中帶也卒洗貝反於笄實貝柱右齻左齻注象齒堅最疏齻謂牙兩畔長者張氏爾岐曰卒洗洗貝也夏祝徹餘飯注徹去鬻張氏爾岐曰餘飯飯尸餘米也夏祝徹去煮之為鬻以實重鬲也瑱塞耳注塞充窒於疏不同生人懸耳旁掘坎南順廣尺輪二尺深三尺南其壤注南順統於堂輪從也垼用塊注塊堛也張氏爾岐曰坎以埋弃潘者垼以煮潘者明衣裳用幕布袂屬幅長下􅂰注幕布帷幕之布升數未聞也屬幅不削幅也長下􅂰又有裳於蔽下體深也幅疏屬幅不削幅者布幅二尺二寸凡用布皆削去邉旁一寸為二寸計之則此不削幅謂繚使相著還以袂二尺二寸云長下􅂰者謂為此衣長至􅂰下有前後裳不辟長及觳注不辟襀也觳足跗也凡他服短無見膚長無被土疏裳前三幅後四幅不辟積者以其一服不動不假上狹下寛也縓綼緆注一染謂之縓今紅也飾裳在幅曰綼在下曰緆緇純注七入為緇緇黒色也飾衣曰純謂領與袂衣以緇裳以縓象天地也設握裏親膚繫鉤中指結於􅓲注􅓲掌後節中也手無決者以握繋一端繞􅓲還從上自貫反與其一端結之手疏前經云設握據右手有決者不言左無決者故記之盛氏世佐曰此設左握法也中指手第三指也右手有決極先設而後設握則握之裏雖在内而不與膚相親矣握繫與决繫連結於掔則不必鉤中指矣甸人築坅坎注築實土其中堅之穿坎之名一曰坅張氏爾岐曰築坅之皆甸人也𨽻人湼厠注𨽻人罪人也今之徒役作者也湼塞也為人復往䙝之又亦鬼神不用盛氏世佐曰湼與敜通書云敜乃穽傳訓為塞與此注合既襲宵為燎於中庭注宵夜蕙田案以上記沐浴飯含襲諸儀節張爾岐曰自記首至此並始死日事厥明滅燎陳衣注記節明疏小歛陳衣當襲之旦滅燎之時凡絞紟用布倫如朝服注凡凡小歛大歛也倫比也疏如朝服者朝服十五升敖氏繼公曰紟不必言凡與絞連文爾大歛有紟小歛無之設棜於東堂下南順齊於坫饌於其上兩甒醴酒酒在南篚在東南順實角觶四木柶二素勺二豆在甒北二以並籩亦如之注棜今之舉也角觶四木柶二素勺二為夕進醴酒兼饌之也勺二醴酒各一也豆籩二以併則是大歛饌也記於此者明其他與小歛同陳疏大小歛之奠皆有醴酒但用二觶一柶而觶有四柶有二者朝夕二奠各饌其器也小歛一豆一籩大斂乃二豆二籩大歛陳籩豆之外皆與小歛同故就小歛節内陳之取省文之義也凡籩豆實具設皆巾之注籩豆偶而為具具則於饌巾之巾之加飾也明小斂一豆一籩不巾張氏爾岐曰皆者皆東堂與奠所也二籩二豆者饌於東堂設於奠所二處皆巾之也小斂一籩一豆惟至設於牀東乃巾之方其饌堂東時則不巾矣觶俟時而酌柶覆加之面枋及錯建之注時朝夕也檀弓曰朝奠日出夕奠逮日張氏爾岐曰觶雖豫陳必待奠時乃酌其酌醴之法既酌醴以柶覆於觶上使柄向前及其錯於奠所則极柶體中小斂辟奠不出室注未忍神逺之也辟襲奠以辟斂既斂則不出於室設於序西南畢事而去之鬼疏始死猶生事之不忍即為神事之故奠不出室無踊節注其哀未可節也敖氏繼公曰踊節即所謂要節而踊者也凡丈夫婦人之踊或以徹奠者之往來為節嫌此辟奠之時亦然故以明之盛氏世佐曰始死之奠亦謂之襲奠者襲後仍設之也奠以事神是時尸在室若辟奠逺在室外則神無所依故不忍也辟奠之時主人以下皆踊無算故不以辟奠者之往來為節既馮尸主人袒髺髪絞帶衆主人布帶注衆主人齊衰以下疏知衆主人非衆子者以衆子皆斬衰絞帶故知衆主人齊衰以下也欽定義疏經云主人髺髪袒衆主人免於房記此者明著絞帶布帶在此時也絞帶者以苴麻之繩為帶其垂者則散之此時尚未絞也謂之絞帶指其束於要者耳大斂於阼注未忍便離主人位也主人奉尸斂於棺則西階上賔之大夫升自西階階東北面東上注視斂既馮尸大夫逆降復位注中庭西面位疏上篇朝夕哭云主人入堂下直東序西面卿大夫在其南卿大夫與主人同西面向殯故知大夫位在中庭西面也巾奠執燭者滅燭出降自阼階由主人之北東注巾奠而室事已蕙田案以上記小斂大斂諸儀節既殯主人說髦注既殯置銘於肂復位時也今文說皆作稅兒生三月鬋髪為鬌男角女羈否則男左女右長大猶為飾存之謂之髦所以順父母㓜小之心至此尸柩不見喪無飾可以去之髦之形象未聞諸疏喪大記鄭注云士既殯說髦小斂說髦盖侯禮士既殯諸侯小斂於死者俱三日也三日絞垂注成服日絞要絰之散垂者冠六升外縪纓條屬厭注縪謂縫著於武也外之者外其餘也纓條屬者通屈一條繩為武垂下為纓屬之冠厭伏也疏冠六升據斬衰而言齊衰以下冠衰各有差降古者冠吉凶皆冠武别材武謂冠卷以冠前後皆縫著於武若吉冠則從武上鄉内縫之縪餘在内謂之内縪若凶冠從武下鄉外縫之縪餘在外謂之外縪吉冠纓武别材凶冠纓武同材以一繩從前額上以兩頭鄉項後交通至耳各綴之於武使鄉下纓結之先為纓武訖乃後以冠屬著武故云屬也冠在武下故云厭也衰三升注衣與裳也履外納注納收餘也杖下本竹桐一也注順其性也蕙田案以上記三日成服居倚廬注倚木為廬在中門外東方北户寢苫枕塊注苫編藁塊堛也不說絰帶注哀戚不在於安哭晝夜無時注哀至則哭非必朝夕非喪事不言注不忘所以為親歠粥朝一溢米夕一溢米不食菜果注不在於飽與滋味粥糜也二十兩曰溢為米一升二十四分升之一實在木曰果在地曰蓏蕙田案以上記居喪寢處哭泣言語飲食主人乗惡車注拜君命拜衆賔及有故行所乗也雜記曰端衰喪車皆無等然則此惡車王喪之木車也白狗幦注未成豪狗幦覆笭也以狗皮為之取其臑也白於喪飾宜張氏爾岐曰玉藻君羔幦虎犆陳注云幦者覆式之皮此白狗幦亦是以狗皮覆車式蒲蔽注蔽藩蒲疏謂車兩邊禦風者以草亦無飾也御以蒲菆注不在於驅馳蒲菆牡蒲莖也張氏爾岐曰蒲菆楊栁之堪為箭者御者以之䇿馬與為蔽之蒲同名而異類犬服注笭間兵服以犬皮為之取堅也亦白張氏爾岐曰服盛矢器注云兵服似泛言五兵之服木錧注取少聲約綏約轡注約繩綏所以引升車木鑣注亦取少聲馬不齊髦注齊翦也今文髦為毛主人之惡車如王之木車則齊衰以下其乗素車繅車駹車漆車與疏案巾車王之喪車五乗木車始死所乗素車卒哭所乗繅車既練所乗駹車大祥所乗漆車既禫所乗士之喪車亦當五乗主人乗惡車齊衰乗素車與卒哭同大功乗繅車與既練同小功乗駹車與大祥同緦麻乗漆車與既禫同主人至卒哭以後哀殺故齊衰以下節級約與主人同士尋常乗棧車不革鞔而漆之今既禫亦與王以下同乗漆車者禮窮則同也欽定義疏據此則漆車在士為吉車在王則為第五等之喪車也喪車無等亦大概言之未必士遂能備五乗也主婦之車亦如之疏布裧注裧者車裳帷於盖弓垂之疏疏布裧在亦如之之下見不與男子同敖氏繼公曰婦人之車必有裧喪車則以疏布為之主婦乗車而出者拜夫人之命及女賓之弔者也貳車白狗攝服注貳副也攝猶縁也狗皮縁服差飾疏兵服加白狗皮縁之其他皆如乗車注如所乗惡車異疏唯白狗攝服為敖氏繼公曰主人主婦皆有貳車各得用二乗此貳車亦惡車也蕙田案以上記喪中之車馬朔月童子執帚郤之左手奉之注童子𨽻子弟若内豎寺人之屬執用左手郤之示未用故疏下文掃室聚諸窔不用箕從徹者而入注童子不専禮事張氏爾岐曰徹徹宿奠者比奠舉席埽室聚諸窔布席如初卒奠埽者執帚垂末内鬛從執燭者而東注比猶先也欽定義疏童子從徹者入以既徹乃舉席而埽也既掃無事矣俟卒奠乃出者從而入亦從而出不敢先出且以觀奠也從執燭者而東亦降自阼階也童子盖以輕服子弟為之蕙田案以上記朔月掃室燕養饋羞湯沐之饌如他日注燕養平常所用供養也饋朝夕食也羞四時之珍異湯沐所以洗去汙垢内則曰三日具沐五日具浴孝子不忍一日廢其事親之禮於下室日設之如生存也進徹之時如其頃張氏爾岐曰朝夕之奠與朔月之奠設於殯宫燕養之饌設於下室下室燕寢也朔月若薦新則不饋於下室注以其殷奠有黍稷也下室如今之内堂正寢聼朝事稷疏大小斂奠朝夕奠無黍稷唯下空有黍今此殷奠自有黍稷故不湏更饋也蕙田案以上記下室之饋筮宅冢人物土注物猶相也相其地可葬者乃營之卜日吉告從於主婦主婦哭婦人皆哭主婦升堂哭者皆止注事畢張氏爾岐曰經但言主婦哭不言衆婦人皆哭與哭止之節故記詳之蕙田案以上記筮宅卜日自記首至此皆士喪禮上篇之記也啟之昕外内不哭注將有事為其讙囂既啟命哭夷牀輁軸饌於西階東注明階間者位近西也夷牀饌於祖廟輁軸饌於殯宫其二廟者於禰亦饌輁軸焉疏夷牀在祖廟輁軸在殯宫以其西階東是同故並言之注云明階間者位近西也者以經直云階間恐正當兩階之間故記人明之輁軸以候載柩其二廟者以先廟禰故至禰廟移柩升堂明旦移於輁軸上載以朝祖廟朝祖時下柩訖明日用蜃車輁軸不復用不饌之矣蕙田案以上記將啟之事其二廟則饌於禰廟如小斂奠乃啟注祖尊禰卑也士事祖禰上士異廟下士共廟張氏爾岐曰將啟先具此一鼎一豆一籩之奠於禰廟既啟朝禰徹從奠乃設之至明日朝祖則設奠如大斂於祖廟如經文所陳也朝於禰廟重止於門外之西東面柩入升自西階正柩於兩楹間奠止於西階之下東面北上主人升柩東西面衆主人東即位婦人從升東面奠升設於柩西升降自西階主人要節而踊注重不入者主於朝祖而行若過之矣門西東面待之便也疏正柩兩楹間奠位在户牖之間則此於兩楹間亦稍近西乃當奠位也要節而踊者奠升主人踊設者降婦人踊也張氏爾岐曰奠謂從奠燭先入者升堂東楹之南西面後入者西階東北面在下注照正柩者先先柩者後後柩者適祖時燭亦然互記於此疏此燭本是殯宫中照開殯者在道時一在柩前一在柩後今又一升堂一在堂下主人降即位徹乃奠升自西階主人踊如初注如其降拜賔至於要節而踊不薦車不從此行張氏爾岐曰徹者徹從奠乃奠者奠其如小歛之饌也經文朝祖時正柩設從奠訖主人降拜賔以後有徹奠設奠哭踊之節此亦如之也祝及執事舉奠巾席從而降柩從序如初適祖注此謂朝禰明日舉奠適祖之序也此祝執醴先酒脯醢爼從之巾席為後既正柩席升設設奠如初祝受巾巾之凡喪自卒至殯自啟至葬主人之禮其變同則此日數亦同矣序從主人以下姜氏兆錫曰朝禰禮與朝祖多同其異者惟重正門外廟不設重柩不設夷牀奠亦不設巾三者為異耳以此推之則朝禰後恐即當朝祖故三者不設也若每一廟即停一日則三者當無不設之理而重止門外露處越宿尤非孝子事亡如事存之義况送葬職事親踈上下男女長㓜之屬更非可信宿積時以湏之者哉欽定義疏二廟則啟之日從奠設於禰廟徹從奠乃設遷禰之奠此遷禰之奠即以當遷祖奠矣以日不三奠故也及朝祖則禰奠從設於祖廟薦車薦馬等事皆於祖廟行之至載柩還車則徹遷禰之奠設祖奠次當然也饌於禰廟者一鼎饌於祖廟者三鼎亦隆殺之宜也朝禰不再奠則即日朝祖可見矣蕙田案以上記二廟者朝禰之儀薦乗車鹿淺幦干笮革靾載旜載皮弁服纓轡貝勒縣於衡注士乗棧車鹿淺鹿夏毛也幦覆笭玉藻曰士齊車鹿幦豹犆干盾也笮矢箙也靾韁也旜旌旗之屬通帛為旜孤卿之所建亦攝焉皮弁服者視朔之服貝勒貝飾勒有干無兵有箙無弓矢明不用疏此並下車三乗謂葬之魂車道車載朝服注道車朝夕及燕出入之車朝服日視朝之服也元衣素裳道疏士乗棧車更無别車而上云乗車下云稾車此云車雖有一車所用各異故有乗車道車稾車之名士之道車而用朝君之服不用私朝元端服者亦攝盛也稾車載簑笠注稾猶散也散車以田以鄙之車簑笠備雨服凡道車稾車之纓轡及勒亦縣於衡也敖氏繼公曰巾車職士乗棧車則此三車者皆漆車也以制言之其乗車道車輪與輈之髙下又等但因事名之耳考工記田車之輪六尺有三寸乗車之輪六尺有六寸又云國馬之輈深四尺有七寸田馬之輈深四尺足以知其制矣將載祝及執事舉奠户西南面東上卒束前而降奠席於柩西注將於柩西當前束設之張氏爾岐曰載載柩於車卒束前而降謂舉奠者當束柩於車將畢之前即降也奠席柩西為設奠先設席也巾奠乃牆注牆飾柩也疏即帷荒抗木刋注剥削之有疏木無皮者直削之皮者剥乃削之茵著用荼實綏澤焉注荼茅秀也綏亷薑也澤澤蘭也皆取其香且御濕疏茵内所著非直用荼兼實綏與澤葦苞長三尺一編注用便易也三疏葦草即長截取尺一道編之菅筲三其實皆瀹注米麥皆湛之湯未知神之所享不用食道所以為敬張氏爾岐曰以菅草為筲其中所盛黍稷麥皆淹漬之祖還車不易位注為鄉外耳未行張氏爾岐曰車乗車道車槀車既祖則還之向外但不易初薦時位執披者旁四人注前後左右各二人人疏一旁四人兩旁則八也凡贈幣無常注賔之贈也玩好曰贈在所有凡糗不煎注以膏煎之則䙝非敬不疏經葬奠四籩􅀥糗栗脯云糗之不煎故記人明之蕙田案以上記祖廟中薦車載柩陳器奠贈諸事唯君命止柩於堩其餘則否注不敢留神也堩道也曽子問曰葬既引至於堩車至道左北面立東上注道左墓道東先至者在東車疏當是陳器之南以乗車道槀車三者次第為先後先至者乗車也柩至於壙歛服載之注柩車至壙祝說載除飾乃歛乗車道車槀車之服載之不空之以歸送形而往迎精而反亦禮之宜疏柩車既空乃歛皮弁服朝服簑笠三者之服載之於柩車卒窆而歸不驅注孝子往如慕反如疑為親之在彼蕙田案以上記柩在道至壙卒窆之事君視歛若不待奠加盖而出不視歛則加盖而至卒事注為有他故及辟忌也出疏卒事者待大歛奠訖乃張氏爾岐曰記君於臣有視歛不終禮者有既歛加盖而後至者二者之節蕙田案此記君視歛之變禮既正柩賔出遂匠納車於階間注遂匠遂人匠人也遂人主引徒役匠人主載柩窆職相左右也車載柩車周禮謂之蜃車雜記謂之團或作輇或作搏聲讀皆相附耳未間孰正其車之轝状如牀中央有轅前後出設前後輅轝上有四周下則前後有軸以輇為輪許叔重說有輻曰輪無輻曰輇疏經不云納柩車時莭故記人明之遂師注云蜃車柩路也四輪廹地而行有似於蜃因名焉轝状與輴車同但輴車無輪有轉轔此有輇輪為異耳敖氏繼公曰賔出而納此車於階間為主人送賔而入則當載矣祝饌祖奠於主人之南當前輅北上巾之注言饌於主人之南當前輅則既祖祝乃饌張氏爾岐曰既還柩向外祝即饌祖奠於主人之南及還車還重俱訖乃奠之柩車西如初蕙田案以上記朝祖納柩車之節及設祖奠之處弓矢之新沽功注設之宜新沽示不用弓疏沽謂麤為之弓矢謂入壙用器舉矢以例餘者有弭飾焉注弓無縁者謂之弭弭以骨角為飾亦張可也注亦使可張有柲注柲弓檠弛則縳之於弓衷備損傷以竹為之詩云竹柲緄縢設依撻焉注依纒絃也撻弣側矢道也皆以韋為之撻疏依者謂以葦依纒其絃即今時弓􅲌是也所以撻矢令出生時以骨為之有韣注韣弓衣也以緇布為之欽定義疏有弭飾謂兩端有弭而亦以骨角飾之也撻即今箭溜也以韋若骨大如錢嵌入弣側以别上下射時在弓之右矢之上矢由此而去故名溜溜亦撻之意也翭矢一乗骨鏃短衛注翭猶候也候物而射之矢也四矢曰乗骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一張氏爾岐曰衛矢羽也矢笴長三尺五分羽一則六寸是生時之矢羽固不短矣志矢一乗軒輖中亦短衛注志猶擬也習射之矢書云若射之有志輖􅜛也無鏃短衛亦示不用生時志矢骨鏃凡為夫前重後輕也射疏司弓矢注云恒矢之屬軒輖中所謂志也知是習矢者以其矢中特輕於習射宜也周禮有八矢翭矢居前最重恒矢居後最輕既不盡用故取其首尾張氏爾岐曰鄭解輖􅜛也􅜛與輊同軒輊中謂前後輕重均也注凡為矢前重後輕亦欲明此軒輊中之異於生用耳蕙田案以上記明器弓矢自啟之昕以下至此皆既夕篇之記也右儀禮既夕五禮通考卷二百六十一
