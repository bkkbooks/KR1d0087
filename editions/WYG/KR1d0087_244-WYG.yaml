body:
  text: 五禮通考卷二百三十四刑部尚書秦蕙田撰軍禮二軍制周禮地官載師以公邑之田任甸地注公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正甸凡七萬五千家為六遂餘則公邑家疏郊外曰甸甸在逺郊之外其中置六遂七萬五千餘地公邑也但自甸以外至稍縣疆四處皆有公邑公邑乃六遂餘地六鄉之内有九等田無公邑云自此以外皆然者太宰九賦有邦甸家稍邦都之賦非采地是公邑可知又二百里外其地既廣三等采地所受無多故惟九十三國明自外皆是餘地為公邑也若然是公邑有四處也云天子使大夫治之者以云四等公邑非鄉遂又非采地不見有主治之以司馬法二百里曰州四百里曰縣言之故知天子使大夫治之也從二百里向外有四百里以二百里為一節故二百三百里大夫治之尊卑如州長中大夫四百五百里大夫治之尊卑如縣正下大夫六遂與六鄉相對故甸亦七萬五千家六鄉餘地有九等所居六遂餘地無九等故以餘地為公邑陳氏禮書邦甸浸廣矣又無九等之地故餘地為公邑邦削至邦都又加廣矣而三等采地之外其餘亦為公邑公邑有四而載師特曰公邑之田任甸地者言公邑始於此也葢公邑閑田也天子使大夫治之遂人與縣師預焉遂人掌野自百里外至五百里皆曰野縣師掌邦國都鄙謂甸郊里之地域鄭康成謂二百里三百里其大夫如州長四百里五百里其大夫如縣正義當然也禮記坊記正義兵賦之法畿内六鄉家出一人遂之軍法與鄉同其公邑出軍亦與鄉同故鄭注匠人云采地制井田異於鄉遂及公邑則知公邑地制與鄉遂同明公邑出軍亦與鄉遂同蕙田案遂之餘地即所謂以公邑之田任甸地縣士註所謂封則為采地未封則為公邑也葢公邑雖稱餘地實多于遂幾倍準之稍縣都亦多于采地幾倍以公邑太宰九賦所出天子使大夫治之其地宜廣也又案采地之外餘地在夏殷則六十四同九十六成周則六十五同八十一成三十井一為祿士一為閒田夏謂之閒田周謂之公邑其實一也其祿士之内又包二條一是元士即所云天子之元士不與鄭謂不在封國數中是也一是公卿之子父死後既不世爵得食父禄即所云大夫不世爵未賜爵視天子之元士以君其國是也二者皆為無地之士雖給以地而當其祿不得為采地春秋之時公卿亦有無地劉子單子是有地者稱爵畿内諸侯皆稱子見鄭答趙商王子虎卒是無地者不稱爵是也其禄士之外並為閒田與畿外附庸閒田相對但畿内閒田即是公邑畿外閒田非即附庸已封人為附庸未封人則閒田畿内不言附庸無附庸也又畿外州建二百一十國之外則閒田少畿内建九十三國之外則閒田多所以然者畿外諸侯有大功徳始有附庸故閒田少畿内每須朌賜故閒田多也又案王制凡九州一節鄭以為殷制但言元士不與不及閒田天子之田方千里一節鄭亦以為殷制其注但言元士亦不及閒田似若殷時無此一項者或係偶不及之經無明文姑闕又案計遂之公邑九同五十成十八分而去五得六十一萬七千五百夫以六家受十三夫通之可受二十八萬五千家稍地公邑十六同六成二十五井十八分而去五得一百四萬四千六十二夫半六家受十三夫可受四十八萬一千八百七十五家縣地公邑二十二同七十五成十八分而去五得一百四十七萬八千七百五十夫六家受十三夫可受六十八萬二千五百家畺地公邑二十七同十八分去五得一百七十五萬五千夫六家受十三夫可受八十一萬家計四處公邑共二百二十五萬九千三百七十五家據賈疏以公邑之制亦與六遂同則亦下劑致甿但内應除去治溝洫若干夫則出賦之夫亦未可定今特舉其概云又案以上公邑出軍之制遂人上地夫一㕓田百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之孟子卿以下必有圭田圭田五十畝餘夫二十五畝賈氏公彦匠人疏孟子云卿以下必有圭田圭田五十畝餘夫二十五畝注云古者卿以下至於士皆受圭田五十畝所以供祭祀圭潔也所謂惟士無田則亦不祭言絀士無潔田也井田之民養公田者受百畝圭田半之故五十畝餘夫者一家一人受田其餘老少有餘力者受二十五畝半於圭田謂之餘夫也受田者田業多少有上中下周禮曰餘夫亦如上中下之制也王制曰夫圭田無征謂餘夫圭田皆不出征賦陳氏禮書先王之於民受地雖均百畝然其子弟之衆或食不足而力有餘則又以餘夫任之此詩所謂侯彊遂人所謂以彊予任甿者也然餘夫之田不過二十五畝以其家既受百畝而又以百畝予之則彼力有所不逮矣故其田四分農夫之一而已禮言上地田百畝萊半之云云則所謂餘夫如之者如田萊之多寡而已非謂餘夫亦受百畝如正農夫也班固謂其家衆男亦以口受田如此鄭司農謂户計一夫一婦而賦之餘夫亦受此田其説與孟子不合賈公彦之徒遂謂餘夫三十有妻者受百畝二十九以下未有妻者受田二十五畝是附會之論也蕙田案陳氏解餘夫如之甚確盖上地田二十五畝萊十二畝半中地田二十五畝萊亦二十五畝下地田二十五畝萊五十畝也又案以上附論圭田餘夫周禮地官遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿注遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛涂道路皆所以通車徒于國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌萬夫者方三十三里少半里九而方一同以南畝圖之則遂從溝横洫從澮横九澮而川周其外焉田疏此溝洫法與井田異制其遂溝洫澮廣深亦與井溝澮廣深同故鄭還約匠人井田之法而言也云萬夫者方三十三里少半里者此解經萬夫有川之意從西北隅北畔至東頭有十洫一洫百夫十洫千夫千夫萬歩萬歩有三十三里百歩百歩是少半里以九澮總而言之則萬夫矣故言萬夫者三十三里少半里矣云九而方一同者案匠人云廣尺深尺謂之􅎌以至方百里為同同間廣二尋深二仞謂澮彼井田法溝澮稀少而云同此雖溝洫法溝澮稠多亦與彼井田相準擬而言也云以南畝圖之遂從溝横洫從澮横九澮而川周其外者案詩今適南畝又南東其畝故以南畝圖之其田南北細分者是一行隔為一夫十夫則于首為横溝十溝即百夫于東畔為南北之洫十洫則于南畔為横澮九澮則于四畔為大川此川亦人造雖無丈尺之數盖亦倍澮耳此川與匠人澮水所注川者異彼百里之間一川謂大川也詩周頌噫嘻駿發爾私終三十里亦服爾耕十千維耦箋周禮曰凡治野田夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路計此萬夫之地方三十三里少半里也耜廣五寸二耜為耦一川之間萬夫故有萬耦耕言三十里者舉其成數耦疏箋以播厥百榖是王者率夫為之箋又以萬人為與三十里大數相應故引周禮以證之所引周禮盡川上有路皆地官遂人文也彼意言凡治郊外野人之田一夫之間有通水之遂廣深各二尺也此遂上即有一歩徑以通牛馬其十夫有通水之溝廣深各四尺也此溝上即有一經畛以通大車其百夫有通水之洫廣深各八尺也此洫上即有一大塗以通乘車其千夫有通水之澮廣丈六尺深丈四尺也此澮上即有一通道以容二軌其萬夫有自然之大川此川上即有一廣路以容三軌是周禮以萬夫為限與此十千相當又計此萬夫之地一夫百畝方百歩積萬夫方之是廣各百夫以百相乘是萬也既廣長皆百夫夫有百歩三夫為一里則百夫為三十三里餘百歩即三分里之一為少半里是三十三里又少半里也耜廣五寸二耜為耦冬官匠人文也此一川之間有萬夫故為萬人對耦而耕此萬人受田計之乃三十三里少半里正言三十三里者舉其成數也以三十三里與十千舉其成數正足相充也遂人注云十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍遂洫倍溝溝廣二尋深二仞徑畛塗道路皆所以通車徒于國都也徑容牛馬畛容大車塗容車一軌道容二軌路容三軌以南畝圖之則遂縱溝横洫縱澮横九塗而川周其外焉是鄭具解五溝五塗之事也以遂人治野田故還據遂中鄰里鄼鄙縣而説之四縣為一部計六遂三十縣為七部猶餘二部盖與公邑采地共為部也何者遂人于川有路之下云以達于畿鄭云以至于畿則中雖有都鄙遂人盡主其地是都鄙與遂同制此法明其共為部也地官序縣正毎縣下大夫一人鄙師毎鄙上士一人鄼長每鄼中士一人里宰每里下士一人鄰長五家則一人計四縣有二十鄙百鄼四百里二千鄰則鄰長以上合有二千五百二十四人矣而云一吏主之者彼謂主民之官與典田者别職其主田之吏一部惟一人也遂人注所言遂溝洫澮廣深之數皆冬官之文也徑畛塗道路所容于匠人差約而為之耳無正文言以南畝圖之遂縱溝横洫縱澮横者以夫間有遂則兩夫俱南畝與畔上有遂故遂從也其遂既從則必注于横者也故溝横也百夫方千歩除外畔其間則南北者九遂東西者九溝其東西之畔即是洫也從洫必注于横澮則南北之畔即是澮也萬夫方萬歩為方千歩者百除外畔其間南北者九洫東西者九澮其四畔則川周之故云川周其外也如是者九則方百里故遂人注又云萬夫者方三十三里少半里九而方一同也此皆設法耳川者自然之物當遂地形而流非于萬夫之外必有大川遶之且川者流水不得方折而迎之也觀承案後代田盡私也三代田盡公也惟井田分為中公外私則有公田必有私田有私田亦有公田雨我公田遂及我私先言公田下之急於忠上也駿發爾私終三十里不言公田上之忠於惠下也但言私田而公田未嘗不在其中矣蕙田案以上溝洫之制周禮地官小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都注此謂造都鄙也采地制井田異于鄉遂重立國小司徒為經之立其五溝五塗之界其制似井之字因取名焉孟子曰夫仁政必自經界始經界不正井地不均榖禄不平是故暴君姦吏必慢其經界經界既正分田制禄可坐而定也九夫為井者方一里九夫所治之田也此制小司徒為經之匠人為之溝洫相包乃成耳疏云匠人為之溝洫者案匠人云井間有溝成間有洫同間有澮是匠人為之溝洫也云相包乃成者司徒立其界匠人為其溝相包含乃成其事耳鄭知此為造都鄙者鄉遂公邑之中皆為溝洫之法此經為井田之法故知謂造都鄙也云采地制井田異于鄉遂者案遂人夫間有遂之等是溝洫法鄉田之制與遂同此經與匠人為井田法其制與鄉遂不同故云采地制井田異于鄉遂也此雖不言異于公邑公邑亦與遂同故注匠人云異于鄉遂及公邑是也考工記匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二㝷深二仞謂之澮注此畿内采地之制采地制井田異于鄉遂及公邑一夫所佃百畝方百歩九夫為井方一里三夫為屋一井之中三屋九夫三三相具以出賦税共治溝也方十里為成成中容一甸甸方八里出田税縁邊一里治洫方百里為同同中容四都六十四成方八十里出田稅縁邊十里治澮采地者在三百里四百里五百里之中滕文公問為國於孟子孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也文公又問井田孟子曰請野九一而助國中什一使自賦死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後治私事所以别野人也又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也魯哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也春秋宣十五年初税畝傳曰非禮也榖出不過藉以豐財也此數者世人謂之錯而疑焉以載師職及司馬法論之周制畿内用夏之貢法稅夫無公田以詩春秋論語孟子論之周制邦國用殷之助法制公田不税夫貢者自治其田貢其税榖助者借民之力以治公田又使収斂焉畿内用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯專一國之政為其貪暴稅民無藝周之畿内税有輕重諸侯謂之徹者通其率以什一為正孟子云野九夫而税一國中什一是邦國亦異外内之法耳云疏畿内采地之制者對畿外諸侯亦制井田與此同采地制井田異于鄉遂及公邑者案遂人云夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川方三十三里少半里九而方一同以南畝圖之遂縱溝横洫縱澮横九澮而川周其外若以九而方一同則百里之内九九八十一澮井田則一同惟一澮既溝澮稀稠不同又彼溝洫法以為貢祗就夫税之十一而貢此則九夫為井井税一夫美惡取于此不税民之所自治是溝洫井田異也井田之法畎縱遂横溝縱洫横澮縱自然川横其夫間縱者分夫間之界耳無遂其遂注入溝溝注入洫洫注入澮澮注自然入川此略舉一成以三隅反之一同可見矣遂人云夫間有遂以南畝圖之則遂縱而溝横此不云夫間有遂云田首倍之謂之遂遂則横而溝縱也自餘洫澮川依此遂溝縱横參之可知但彼云九澮而川周其外川則人造之此百里有澮澮水注入川相去逆故宜為自然川也畿内用貢法云云者鄉遂公邑之内皆鄰里比閭等治民之官旦夕從民事或因此促之使先治公田則不得恤其私故為貢法使不得有公田也云邦國用助法諸侯專一國之政恐其貪暴税民無藝者藝謂準法宣公初稅畝就井田上尚取民之所自治若為貢法有何準法故為井田不為貢也孔氏穎達曰鄭言邦國亦異外内則諸侯郊内貢郊外助矣而鄭正言畿内貢法邦國用助法以為諸侯皆助者以諸侯郊内地少郊外地多故以邦國為助對畿内之貢為異外内也朱子語録問周制都鄙用助法八家同井鄉遂用貢法十夫有溝鄉遂所以不為井者何故曰都鄙以四起數五六家始出一人故甸出甲士三人歩卒七十二人鄉遂以五起數家出一人為兵以守衛王畿役次必簡故周禮惟挽柩則用之此役之最輕者蕙田案鄭康成以遂人所言為溝洫之法即夏之貢法鄉遂公邑用之匠人所言為井田之法即殷之助法都鄙用之其溝洫與井田之異則遂人云夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川百里之内九九八十一澮井田則一同惟一澮一溝澮稠多一溝澮稀少其異一井田之法畎縱遂横溝縱洫横澮縱川横遂人注云以南畝圖之則遂縱而溝横其異二遂人之川是人造之匠人之川為自然大川非人所造其異三溝洫之法祗就夫稅之十一而貢井田之法九夫為井井税一夫美惡取於此不税民之所自治其異四宋鄭夾漈非之謂匠人舉大槩而言遂人舉一端而言井田之法通行天下未嘗有異陳祥道禮書亦謂先王之為井田也使所飲同井所食同田所居同㕓所服同事鄉遂六軍所寓豈各授之田而不為井法乎康成以小司徒有邑甸縣都之别而其名與采邑同遂以井田屬之采邑不知二百一十國謂州五黨亦謂之州萬二千五百家謂遂一夫之間亦謂之遂王畿謂之縣五鄙亦謂之縣小司徒井其田野不過取名于縣都而已不足据陸氏佃陳氏傅良皆不信鄭説傋載王與之訂義近時沈君冠雲禄田考亦用鄭樵陸佃之説朱子則曰周禮有井田之制有溝洫之制井田是四數溝洫是十數今永嘉諸儒乃欲混井田溝洫為一則不可通鄭氏注分作兩項極是愚謂周人徹法原兼貢助若井田通行天下則亦專用助何徹之有遂人匠人之别見於周官國中野外之殊著於孟子自當以康成及朱子之言為定至于遂人言興耡鄭大夫讀耡為藉杜子春讀耡為助後鄭云謂起民人令相佐助陳氏以此証遂得行助者非也小司徒大比六鄉四郊之吏考夫屋鄭云夫三為屋屋三為井出地貢者三三相任疏云鄉遂之内既不為井田而為溝洫之法今云夫三為屋屋三為井者以其溝洫雖為貢法出貢之時亦三三相保任以出榖税似一井之法也旅師掌聚野之耡粟注野謂逺郊耡粟民相助作一井之中所出九夫之税粟疏鄉遂公邑三處皆為溝洫三等采地乃為井田今此六遂鄭以為井田與例違者鄉遂中雖為溝洫法及其出稅亦為井田税之葢即指三三相任非九而税一也孟子云鄉田同井賈公彦匠人䟽鄉遂為溝洫法而云鄉田同井此謂殷之助法雖鄉亦為井田以孟子雜説三代故也是皆不得取以難鄭又案以上井田之制地官小司徒頒比法于六鄉乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人注一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也止以七人六人五人為率者有夫有婦然後為家自二人以至于十為九等七六五者為其中可任謂丁强任力役之事者出老者一人其餘男女强弱相半其大數蕙田案此六鄉授田遂人上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之注㕓城邑之居孟子云五畝之宅樹之以桑麻者也萊謂休不耕者六遂之民竒受一㕓雖上地猶有萊皆所以饒逺也鄭司農云户計一夫一婦而賦之田其一户有數口者餘夫亦受此田也蕙田案中地田百畮萊百畮即所謂一易之地家二百畮下地田百畮萊二百畮即所謂再易之地家三百畮惟上地田百畮萊五十畮較六鄉獨多耳周氏曰遂人掌邦之野其地廣而瘠若置都邑處必狹而肥故遂人上地有萊田曹氏叔遂曰遂雖上地亦使少休不耕庶不盡地力遂鄉地有逺近勢有重輕赴愬有易難恤察有詳略厚于遂非薄六鄉也亦不泄邇忘逺之深指其均一也蔡氏徳晋曰凡田之休不耕者即以為畜牧之地謂之萊上地無休不耕之田另加萊五十畝專用以畜牧詳見遂人職蕙田案此説非是辨已見前又案此六遂授田大司徒凡造都鄙不易之地家百畮一易之地家二百畮再易之地家三百畮注鄭司農云不易之地歳種之地美故家百畮一易之地休一嵗乃後種地薄故家二百畮再易之地休再歳乃復種地愈薄故家三百畮史氏曰不易者土力厚一嵗一種再易者土力薄再嵗一種三易者土力益瘠率三嵗而一種易者更迭而種也再易一倍不易之地三易二倍不易之地而其所出不過同為百畝之獲也陳氏傅良曰王制正義農夫受田實有九等案大司徒不易一易再易惟三等大司徒言其綱其實不易一易再易各為三等則九等蕙田案此都鄙授田夏官大司馬凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者参之一其民可用者家二人注賦給軍用者也令邦國之賦亦以地之美惡民之衆寡為制如六遂矣鄭司農云上地謂肥美田也食者参之二假令一家有三頃嵗種二頃休其一頃下地食者参之一田薄惡者所休多疏遂人上地夫一㕓田百畝萊五十畝中地家二百畝下地家三百畝與此上地食者参之二合故云邦國如六遂蕙田案蔡氏徳晉解大司馬此節謂所令之賦自鄉遂以達于邦國都鄙皆一法可食者謂田也其不可食者則萊也可食者三之二謂田百畝萊五十畝也食者半謂田百畝萊亦百畝也食者参之一謂田百畝萊二百畝也此條以大司馬三等與遂人三等同與康成合但鄭謂是邦國蔡通畿内都鄙一槩同之又案此邦國授田鄭氏鍔曰經所載自王畿之鄉遂都鄙至於諸侯之邦國凡授田之法自有四節大司徒言都鄙之制小司徒言六鄉之制遂人言六遂之制大司馬言諸侯國之制何以明之大司徒言凡造都鄙而繼以不易一易再易之地其為都鄙之制明矣小司徒言上地中地下地之制不與遂同又不與都鄙大司馬同非六鄉田制而何何則上地當食十人九人八人中地當食七人六人下地當食五人此常法也六鄉在内不及十人九人但家有七人則授以上地家有六人則授以中地家有五人則授以下地所以然者將以强内故也若六遂所授則不可與鄉同故别言之曰上地夫一㕓田百畝中地夫一㕓田百畝下地夫一㕓田百畝見其如常法而已然又有萊五十畝萊百畝萊二百畝不與鄉同則以遂地逺而瘠授之萊所以饒逺也又以爵考之鄉大夫爵與遂大夫同鄉師爵與遂師同小司徒爵與遂人同遂人掌授遂田則小司徒掌授鄉田矣遂人言六遂之制則小司徒所言為六鄉授田之制何疑之有若夫外造都鄙則大司徒事故都鄙之田於大司徒言之施政職于九畿之外而令其軍賦則大司馬事故邦國之田於大司馬言之也蕙田案小司徒六鄉大司徒都鄙授田法與井牧同遂人六遂大司馬邦國授田法與井牧㣲異盖以饒逺遂較鄉為逺邦國較畿内為逺故其差如此及其出稅賦則皆二而當一今臚列諸條彚于一處學者覽之自明馬氏端臨曰周家授田之制如大司徒遂人之説則是田肥者少授之田瘠者多授之如小司徒之説則口衆者授之肥田口少者授之瘠田如王制孟子之説則一夫定以百畝為率而良農食多惰農食少三者不同地官遂人凡治野以下劑致甿注變民言甿異外内也致猶會也民雖受上田中田下田及會之以下劑為率謂可任者家二人優逺民也蕙田案王昭禹觧下劑致甿劑為約劑謂與甿約之要書也此説太迂不如鄭注之確曹氏叔逺曰六鄉分上中下地為任民多寡之數而此則不復差别一以下地為率盖六遂比鄉為差逺而在野之地寛宜優其役而厚其力使受地多而征調少庶民皆願為之氓以滋生齒以實遂地載師凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五注任地謂任土地出稅賦也征税也國宅凡官所有宫室吏所治也國税輕近而重逺近者多役也園㕓亦輕之者㕓無榖園少利也蔡氏徳晉曰國宅官府所居室也園圜圃㕓城中居民宅也二十而一者謂園有草木之稅及宅種桑麻而有布帛之税皆二十分而取其一也近郊十一田之正税通于天下而言于近郊者近郊六鄉之地税田始于此而無他税也逺郊二十而三以闗税言之也逺郊六遂之田十一同于近郊不必言而逺郊之闗啇賈貨賄之税則二十分而取其三分稍重以抑末也甸稍縣都田税與鄉遂同而地廣多山澤立虞衡之官以治其税山澤利出自然故十取其二也漆用最廣而利厚故二十而取其五也鄭康成專以田税觧此節不可通矣蕙田案蔡氏説最有理據存參觀承案載師此條實為難解什一者天下之中正烏有二十而三與無過十二之異數哉或謂税民只是十一此就下所奉上十中之一又以其一分為十而取其十中之一與二十中之二與三非謂民税之二與三也然經文直云二十而三與無過十二則以其奉上之一分為十與分為二之説又何所据而鑿出耶其為臆度之詞固不足信即謂近郊十一至無過十二係歆莽所添必去此十九字然後可通者亦未見其當盖此條與上條一一相對未有以證其為添附則豈可憑臆而斷竟毅然刪截乎竊謂此條雖承上文而意義各别上條九等任地皆言其田此條首提國宅無征句乃著明園㕓二十而一為有征其下遂承以近郊逺郊甸稍縣都而詳其所征之數並不一言渉及田字則是專指其近郊逺郊甸稍縣都之為園㕓者言而非田税之正故不妨二十而三無過十二之不均惟漆林之征雖亦園㕓一類然牟利太多又開侈靡之習與園㕓但毓果蔬草木者又自不同故獨二十而五以重税抑末而止奢俾不敢棄田以為園林也如此則亦字字甚明周禮本文自當何煩鑿為之説或别加刋削也哉孟子請野九一而助國中什一使自賦朱子曰野郊外都鄙之地也九一而助為公田而行助法也國中郊門之内鄉遂之地也田不井授但為溝洫使什而自賦其一盖用貢法也周所謂徹法者盖如此以此推之當時非惟助法不行其貢亦不止什一矣詩小雅甫田箋歲取十千於井田之法則一成之數也九夫為井井税一夫其田百畝井十為通通税十夫其田千畝通十為成成方十里成税百夫其田萬畝疏孟子言三代税法其實皆什一若井税一夫是九税一矣此詩之意刺幽王賦重當陳古税之輕而言成税萬畝反得重於什一者孟子言什一據通率而言耳周制有貢有助助者九夫而税一夫之田貢者什一而貢一夫之榖通之二十而税二夫是為什中税一也故冬官匠人注廣引經傳而論之云周制畿内用夏之貢法税夫無公田邦國用殷之助法制公田不税夫貢者自治其所受田貢其税榖助者借民之力以治公田又使收斂焉通其率以什一為正孟子曰野九夫而税一國中什一是邦國亦異外内之法耳是鄭觧通率為什一之事也又孟子云滕文公使畢戰問井田孟子對曰請野九一而助國中什一使自賦是鄭所引異外内之事也孟子又云方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後治私事所以别野人也是説助法井别一夫以入公也言别野人者别野人之法使與國中不同也爾雅云郊外曰野則野人為郊外也野人為郊外則國中為郊内也郊内謂之國中者以近國故繫國言之亦可地在郊内居在國中故也助法既言百畝為公田則使自賦者明是自治其田貢其税榖也助則九而助一貢則什一而貢一通率為什一也若然九一而助者為九中一知什一自賦非什中一者以言九一即云而助明九中一助也國中言什一乃云使自賦是什一之中使自賦之明非什中一為賦也故鄭𤣥通其率以什一為正若什一自賦為什中賦一則不得與九一通率為什一也且鄭引孟子云野九夫而税一國中什一不言國中什而税一明是國中什一而貢一故得通率為什一也史傳説助貢之法惟孟子為明鄭據其言謂什一而徹為通外内之率理則然矣而食貨志云井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝為廬舎其言取孟子為説而失其本㫖何休之注公羊范寗之觧榖梁趙岐之注孟子宋均之説樂緯咸以為然皆義異于鄭理不可通何則言井九百畝其中為公田則中央百畝共為公田不得家取十畝也又言八家皆私百畝則中央百畝皆屬公矣何得復以二十畝為廬舎也言同養公田是八家共理公事何得家分十畝自治之也若家取十畝各自治之安得謂之同養也若二十畝為廬舍則家别二畝半亦入私矣則家别私有百二畝半何得為八家皆私百畝也此皆諸儒之謬鄭於匠人注云野九夫而税一此箋云井稅一夫其田百畝是鄭意無家别公田十畝及二畝半為廬舎之事俗以鄭説同於諸儒是又失鄭㫖矣蕙田案趙岐觧孟子云夏后時民耕五十畝貢上五畝殷氏耕七十畝以七畝助公家周民耕百畝者徹取十畝以為税雖異名而多少同故曰其實皆什一也賈公彦匠人疏亦用趙氏之説今從鄭説則不合故陳祥道禮書云鄭謂通率什一而頴達之徒申之謂助之所取者重貢之所取者輕孟子何以言皆什一歟曰字書訓徹為通正兼二法為什一之義不當以為徹取龍子莫不善于貢之言夏元肅雖謂後人流弊其實亦由立法而然制公田則不必取盈不制公田則賦有常額安得謂貢助皆什而税一耶朱子謂周時鄉遂用貢法十夫有溝都鄙用助法八家同井此條得之至謂夏一夫受田五十畝每夫計其五畝之入以為貢如此則與助通率為十九分而取其二分與前説自相矛盾其請野節注使什而自賦其一亦當改為使什一而自賦其一乃為確耳又謂貢法以十一為常而周則一夫耕私田百畝公田十畝為十一而取一如此則通率為二十一分而取其二分皆非也何休范甯班固趙岐之説本于公羊然求之諸經則無文計以法數則不合不可從又案鄉遂公邑溝洫稠多其治溝洫不出賦之夫當數倍于都鄙而檢經注無此法則鄉遂出賦之數亦不能定又六鄉家二人半六遂家二人都鄙與邦國郊外約七家出一人其賦役之差繁于近簡于逺參差不一如此予嘗反覆推㝷求其説而不得既而檢春秋正義鄉遂不出車甲馬牛而都鄙出車甲馬牛則其費且倍于鄉遂至于税之輕近重逺又各不同則其輕重之差亦固無可疑者案鄭氏匠人注云畿内用貢法者鄉遂及公邑之吏旦夕從民事謂其促之以公使不得恤其私邦國用助法者諸侯專一國之政為其貪暴税民無藝周之畿内税有輕重諸侯謂之徹者通其率以什一為正孟子云野九夫而税一國中什一是邦國亦異外内之率耳然則二法不同輕重有異者豈非畿内之賦鄉遂重而都鄙輕邦國之賦國中重而郊外輕故特設此輕近重逺之税以均之歟載師凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二注國税輕近而重逺近者多役也匠人注亦引載師此文而云此謂田税也皆就夫税之輕近重逺耳又駁異義云案公羊説十一税逺近無差元之聞也周禮制税法輕近而重逺者為民城道溝渠之役近者勞逺者逸也若然周禮税法據王畿公羊税法據諸侯邦國諸侯邦國無逺近之差者以其國地狹少役賦事暇故無逺近之差也夫所謂近者多役故輕其税者城道溝渠之役固然矣而六鄉上劑致甿六遂下劑致甿四處公邑同于遂則亦下劑致甿此豈非畿内之近者多役乎至謂諸侯無逺近之差者對畿内而説耳其實則孟子對滕文公正是邦國異外内之事而尚書費誓正義大國三軍出自三鄉次國二軍出自二鄉小國一軍出自一鄉是國中亦家出一人也司馬法甸六十四井出七十五人賈公彦以為邦國之制是在野七家而出一人也此豈非邦國之近者多役乎抑所謂近郊逺郊賈氏欲取九等田分屬之故不言六鄉其實六鄉亦在其内也所謂園㕓者鄭氏取孟子五畝之宅樹之以桑以觧㕓取詩中田有廬疆場有𤓰以觧園鄭不取何休公田内二十畝八家各二畝半之説其箋詩云田中作廬以便田事意亦指廬在私田之内賈失鄭指而取趙岐廬井邑居各二畝半之説以園㕓兩物合成一五畝之宅乃趙岐注滕文公以園㕓皆是國中之地與五畝之宅無渉則賈又失趙指矣其實㕓者即經所謂以㕓里任國中之地園者即經所謂以場圃任園地也塲人掌國之塲圃則園不在國中乎是園㕓亦在六鄉之内也惟甸稍縣都無過十二者指六遂及四處公邑而言無采地在内其采地税法之輕重檢經注無明文以下劑致甿及七家一人之差考之則采地之税必當又重於十二可推而知也論出賦之法最重則畿内之六鄉㕓里以下九等地九等地出賦法經無文因其與六鄉俱在逺郊内故以意推邦國之三鄉二鄉一鄉其次則畿内之六遂及四等公邑其次則邦國之郊外最輕則畿内之三等都鄙論出税之法最重則畿内之漆林二十而五其次則畿内之三等都鄙經甸稍縣都無過十二竊疑三等都鄙亦當在内檢鄭注賈疏皆不在内又無他法見經姑分之别為一等其次則畿内之六遂及四等公邑十二其次則畿内逺郊之六鄉及官田牛田賞田牧田二十而三六鄉地居四同則近郊逺郊皆有之勿泥其次則邦國之郊外九一其次則畿内之近郊宅田士田賈田十一其次則邦國之國中什一使自賦作什一而税一其次則畿内之園㕓二十而一最輕則園宅及圭田餘夫皆無征鄭以圭田即士田士田在近郊則十一也王制圭田無征賈氏以餘夫亦無征二説不同總之税輕者賦重賦輕者税重錯綜參伍而尋之則渙然無疑矣又案六鄉三劑致甿合正卒羡卒通率家二人半其常征所用則無過家一人都鄙七家出一人亦言其常征所用耳計亦當有羡卒以備更休經無明文不可臆度至大司馬凡令賦以地與民制之上地食者參之二中地食者半下地食者參之一鄭氏注及正義以為與六遂同近時蔡徳晉亦云然但受田既一槩同於六遂之制並無鄉遂之别則凡邦國國中之賦亦未必如畿内有三劑下劑之分亦當正羡通家出二人與六遂同雖經無文可以意推也至常征所用則亦無過家一人説本尚書正義己見前以此推之知馬鄭論語注所引司馬法六十四井出七十五人者乃是邦國郊外之賦耳不復言其細别舉其多者言之與鄭駁異義及匠人注所謂邦國言其略者正合又邦國郊外亦當有羡卒經注無文亦可以意推耳觀承案九一什一句法文義一耳野之九一為九中之一則國中之什一亦什中之一而已但以井田畫方而成則以八而包一故不得不以九一為法貢法長連排去則以五什起數十夫有溝百夫有洫千夫有澮萬夫有川但以十相乘亦復整齊而易算耳烏有十一為數而取其一反使竒零參差而難算也哉鄭注乃因其實什一之語而鑿為通率之法謂通國中與野外而合計之通九之一與什一之一合為二十而取其二故為什一然合為什一者若分之而中得其十外止得其八則皆非什一矣名曰通率而内外異數爾我不均正是不通之甚耳不知所謂通率者當就其賦役之全數而通之國中地近而役多則賦雖輕通率其役法計之則不過什一矣野外地逺而役少則賦雖重通率其役法計之亦止於什一耳如此則野外國中各自通計之而適均故曰其實皆什一也康成之説雖巧無乃愚民之術而非先王之意乎蕙田案以上税法輕重之等右出軍之制中周禮夏官大司馬凡制軍萬有二千五百人為軍二千有五百人為師五百人為旅百人為卒二十五人為兩五人為伍注軍師旅卒兩伍皆衆名也伍一比兩一閭卒一旅旅一黨師一州軍一鄉家所出一人鄭氏鍔曰舉一軍之制則六軍之制皆可知易氏祓曰小司徒以軍制聚萬民自伍兩至軍師咸在獨言會萬民之卒伍者先王之軍制調兵必五數出兵必百數不五數不足以調兵故積數起于五人之伍不百數不足以出兵故積數起于百人之卒以百人之卒成一小陣五百人之旅成一中陣二千五百人之師成一大陣萬有二千五百人之軍成五大陣蕙田案此條制軍地官縣師掌邦國都鄙稍甸郊里之地域辨其夫家人民田萊之數若將有軍旅之戒則受法于司馬以作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼔兵器以帥而至注云受法于司馬者司馬主将事故先于司馬處受出軍多少及法式也于司馬處得法乃作起衆庶會合車人人則百人為卒五人為伍車亦有卒伍黄氏度曰司馬主兵令不得直行于天下必有縣師關節此先生㣲意兵皆民也發民為兵而主民之官不應全不知故使其屬行司馬之法起其衆庶馬牛車輦而後會其車人卒伍邦國都鄙鄉法卒伍雖素定而車人不相須甸稍縣都野法車人相須而縣鄙居民未嘗為卒伍故于此皆以司馬之法會之五人為伍百人為卒離則皆伍聨則皆什夏官司右凡軍旅合其車之卒伍而比其乗屬其右注右謂有勇力之士充軍右合比屬謂次第相安習也車亦有卒伍疏宣十二年傳云其君之戎分為二廣廣有一卒卒偏之兩司馬法曰二十五乗為偏又云以百二十五乗為伍注云伍重故百二十五乗是車之卒伍也凡國之勇力之士能用五兵者屬焉注勇力之士屬焉者選右當于中司馬法曰弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長疏圍圍城守守城助者圍守皆用戈㦸助之此五兵據勇力之士所用車之五兵則無弓矢而有夷矛陳氏禮書鄉萬二千五百家三鄉則三萬七千五百家起徒役無過家一人則三軍為三萬七千五百人矣司馬法兵車一乘甲士三人歩卒七十二人合七十五人則一卒所餘在後車矣後卒復以五十人合二十五人為一車之士卒則所餘五十人又在後車矣凡三卒而車四乘三旅而車二十乘三師而車百乘三軍而車五百乘由此推之六軍則車千乘矣此車人參兩以相聨紏之法也郝氏敬曰凡車三三為小偏三五為偏五五為大偏是一師二千五百人之車也二偏為卒又謂廣是合二師之車也五偏為伍凡一百二十五乘是萬二千五百人之車也此謂車之卒伍春秋宣公十二年左氏傳欒武子曰其君之戎分為二廣廣有一卒卒偏之兩注十五乗為一廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乘亦用舊偏法後以二十五人為承副蕙田案每車人數以七十五人為定其法即徴之大司馬制軍之法葢周官一曰會萬民之卒伍再曰會車人之卒伍其所以獨言卒伍者以軍法起於伍成于卒也自伍至兩則以一甲士統之故每車甲士三人然則一乗者三兩之數五伍為兩則二十五人三兩七十五人也四乗者三卒之數四兩為卒則百人三卒三百人也百乗者三師之數五旅為師則二千五百人三師七千五百人也五百乗者三軍之數三萬七千五百人也千乗者六軍之數七萬五千人也其為卒伍皆五數配以車乗皆成三數盖與圖書卦畫相㕘足見其為先王制軍自然之定法而非私智穿鑿之所能為又案伍兩卒旅以徒而言也而車亦有卒伍葢一車七十五人則卒伍已寓于車之中及其用之而車又為卒伍之法則變化無窮矣陳用之云三卒而車四乗以至三軍而車五百乗所謂卒伍已寓于車也左氏傳先偏後伍伍承彌縫廣有一卒卒偏之兩所謂車亦為卒伍者也觀承案兵陣最貴参伍此兵車之卒伍以参伍法計之適符其數然司馬法一車甲士三人歩卒七十二人為一乗七十五人者苐言其戰車耳故五人為伍五伍為兩三兩為一乗七十五人之竒數者必間四乗乃得三百人之整數其人徒亦必間以四兩為卒乃得百人之整數耳然後五卒為旅五旅為師五師為軍皆可以五為數也二説不同而樞紐總在四乗與四兩一小變而二法俱可通矣蕙田案以上車之卒伍周禮地官鄉大夫之職以歳時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之劉氏彛曰昔未上籍今則籍之謂之登以其初成丁也王氏昭禹曰旅師職卑所統者寡故使之校其數然後登上其籍鄉大夫職尊所統者衆故登其籍不校其數小司徒頒比法于六鄉之大夫使各登其鄉之衆寡則使登其籍于大司徒也辨其可任者辨其力强而可任以事者也陳氏曰所謂任者著名于軍籍中也黄氏度曰征不言嵗而言七尺六尺者嵗雖登而身不及則為疾所謂痤短侏儒者也則舍之國中晚征而早舍為其近而役多野則早征而晚舎以其逺而役少張氏曰國中以舎者多役者少故晚征而早蠲之貴者賢者能者服公事者老者疾者多居國中故免者多鄭氏鍔曰征者謂任其力以給繇役也陳氏汲曰六鄉之民雖有定額至其征之貴者以下皆免以此見六鄉七萬五千家特立此為國家武備耳或者見鄉中有師田行役之説遂謂軍役一切調發非矣王氏與之曰古者兵法與役法不同兵法自外及内如有兵事先遣邦國不得已及遂又不得已及鄉若役法先内及外此先王均内外之意其舍者國中自貴者賢者能者服公事者老者疾者皆舍陳氏禮書七尺六尺征之以其才六十六十有五舍之以其齒國中近而役多故晚征而早舍野外逺而役少故早征而晚舍欲使其勞逸輕重均而已與近郊什一逺郊二十而三甸稍縣都無過十二同意又曰國中貴者賢者之等皆舍又八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之䘮三年不從政齊衰大功之䘮三月不從政将徙于諸侯者三月不從政自諸侯徙于家期不從政役之義也舍之仁也所以北山不均之刺不作于下也後世踐更之法雖丞相之子不免戍邊豈先王之法哉髙氏愈曰古人弛役以年計苟年老則息之不以筋力強壮役之也其任役也以形計苟其豐壮强碩則役之欲其早肄勤勞也蕙田案鄭注七尺謂年二十六尺謂年十五國中晚賦税而早免之以其所居復多役少野早賦税而晚免之以其復少役多但復多役少反得晚賦早免殊不可觧不知六鄉之内上劑致甿復者雖多役較國外為重故既輕其税以優之而又晚賦早免以體恤之周官多饒逺之政亦未嘗不寛近其逺近均平如此觀承案成周役法本以國中地近則役多故輕賦以優之野外地逺則役少故重賦以平之今又謂國中復多役少故晚賦而早免野外復少役多故早賦而晚免恐亦是随文生觧耳觀小司徒九比之法辨其貴賤老幼廢疾凡征役之施舎兼國中及四郊都鄙在内而凡旅師閭胥遂人遂師其施舎之法無不皆然豈以國中野外而分復之多少哉須知國中役多則勞亦多故宜早免以休之野外役少則勞亦少故可晚免而任之原不係乎復之多少也康成之注誠不可泥小司徒之職稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍史氏曰國中王畿也四郊畿外也都鄙野外也夫謂其身家謂其居族師以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者項氏曰夫以田言家以居言如家七人為衆家五人為寡貴賤老幼廢疾則不任可任謂六尺以上七尺以上者閭胥以嵗時各數其閭之衆寡辨其施舍鄭氏鍔曰説者謂一閭之中不過二十五家其衆寡何難知之有而必以歲時數之盖一閭之民有可任者亦有可施舍者彼其或老或幼苟不知其可舍而一切任之豈恤民之道哉閭胥先有以辨之則鄉大夫得以歳時入其書遂人以歲時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者注夫家猶言男女也王氏曰遂人既登其夫家衆寡六畜車輦遂師又以時登則遂師登之于遂人遂人登之于小司徒遂師以時登其夫家之衆寡六畜車輦辨其施舍與其可任者陳氏禮書周禮鄉大夫國野之役至于六十六十有五王制曰五十不從力政祭義曰五十不為甸徒非周制也然六十不與服戎恐周亦然班超傳曰古者十五授兵六十還之韓詩説三十受兵六十還兵其受兵早晚雖殊其六十還兵一也易氏祓曰近郊之民王之内地共輦之事職無虚月追胥之比無時無之故七尺而征六十而舍則稍優于畿外非姑息也逺郊之民王之外地也其溝洫之制各有司存野役之起不及其羡故六尺而征六十五而舍則稍重于内地非荼毒也蕙田案地官均人凡均力政以歳上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉陳及之以為王制内則云五十不從力征六十不與服戎力征與戎事有異况軍事不得以時日為斷其説甚確均人之力政所謂大均之禮與戎事無渉也又案以上辨可任小司徒頒比法于六鄉凡起徒役無過家一人以其餘為羨注鄭司農云羨饒也皆疏此謂六鄉之内上劑致甿一人為正卒其餘為羨卒凡國之大事致民大事謂戎事也鄭司農云國有大事當徴召㑹聚百姓則小司徒召聚之左氏成公傳國之大事在祀與戎此言致民明非祭祀是戎事可知陳氏禮書以下養上則不足以上養下則有餘故起徒役家一人所謂施從其厚事舉其中與食壮者之食任老者之事同意葉氏時曰司徒司馬皆言上地可任者家三人中地可任者二家五人下地可任者家二人一井凡八家姑以下地言之則可任者十六人凡起徒役無過家一人則一井但八人耳故遂人曰以下劑致甿民雖受上田中田而會之唯以下劑為率其寛民力可知也困學紀聞古者國有間田田有餘夫夫有間民民有羨卒不盡其才力也至秦而自實田至漢而覈墾至隋而閲丁口至唐而括逃户隐田于是財殚力盡民無樂生之心矣蕙田案訂義李景齊云司馬法甸出甲士三人歩卒七十二人司徒通籍民數起徒役家一人則以甸計之一井八家六十四井為家五百十二而僅止七十五人盖不盡以為兵陳及之亦同此説不知甸出七十五人者邦國之法小司徒家一人者畿内六鄉之制若以二者合為一則萬二千五百家為鄉六鄉寕足以出六軍乎此謬也又云成方十里三百家士十人徒二十人此十里之成自甸外又加三十六井宜所任者益多而今特三十人葢不盡以為兵此又不知三十六井乃治洫之家並不使出軍賦謬而又謬者也又案以上起徒役書甘誓大戰于甘乃召六卿王曰嗟六事之人傳天子六軍其将皆命卿各有軍士故曰六事命疏将戰而召六卿明是卿為軍将天子六軍其将皆卿周禮夏官序文也鄭𤣥云夏亦然則三王同也卿為軍将故召六卿及其誓之非止六卿而已鄭𤣥云變六卿言六事之人者言軍吏下及士卒也𦙍征惟仲康肇位四海允侯命掌六師傳仲康命𦙍侯掌王六師為大司馬周官司馬掌邦政統六師平邦國傳夏官卿主戎馬之事掌國征伐統正六軍平洽王邦四方國之亂者周禮立夏官司馬使帥其屬而掌邦政政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人注輿衆也行謂軍行列吕氏曰自夏命胤侯掌六師舉政典以誓衆則邦政之掌于司馬舊矣國之大事何者非政獨戎政謂之政何也天下無事寓兵于農然後賦役百為始有所施是政之所從出天下有事舉兵討亂邦之存亡安危係焉其為政之大又不待論此所以獨謂之政也葉氏時曰大司馬制六軍則兵屬大司馬矣至于軍旅大事則五官預有事焉葢古者寓兵于農寓將于卿命卿為將此有事之時也無事而統兵亦不專屬之司馬使兵無專將將無專權也觀周人制兵之法國子宿衛之士則屬之冡宰虎賁宿衛之兵則屬之司馬師保四翟之𨽻既屬之地官又屬之秋官至如國有大事國子游卒雖屬于地官之諸子而又弗征于司馬其衛兵之權散出可知也鄉遂之民皆軍也則屬之司徒四時之田皆兵也則屬之司馬閭師地官之屬軍旅之戒則受法于司馬至如鄉師帥民徒而致政令受役要可也而必攷辟丁司空其畿兵之權散出可知也盖古者兵制自衛民之外六軍之制皆寓兵于農本無兵之可統寓將于卿本無將之可名又况兵權散出不屬一人有事調兵則天子遣使一牙璋發之其權又專屬于天子是以兵滿中外而居然若無迨及數世司馬世官爰以命氏馴至諸侯更霸列國專征世卿帥師大夫藏甲孔子作春秋凡書帥師譏權臣也聚民而為兵則兵安得而不惰聚兵而專將則將安得而不驕此其為患也久矣唐人府兵號為得井田大意然井田寓兵于農府兵寓農于兵其意已異而况兵有定額將有定員更畨再世安能無將驕卒隋之患府兵且爾而况不為府兵者哉詩大雅常武赫赫明明王命卿士南仲太祖太師皇父整我六師以脩我戎箋宣王命卿士為大將用其以南仲為太祖者今太師皇父是也太師者公兼官也復疏上言王命卿士則皇父為卿士矣太師三公之名言太師皇父是公兼官謂三公而兼卿士之官天子六軍軍各有將今獨命皇父使整六師不命餘將盖雖每軍各有將而中軍之將尊故特命之使總攝諸軍也陳氏傳良曰詩常武王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦小宰戒司馬出征也程伯時為司馬周禮夏官小司馬之職掌注此下字脱滅札爛文闕漢興求之不得遂無識其數者軍司馬輿司馬行司馬王氏與之曰吉㓙軍賔嘉達于天下而軍禮獨藏于大司馬號司馬法若國有師田之事縣師始受法于司馬以作其衆庶小司馬之職掌不悉書而軍司馬輿司馬行司馬皆不備官有事斯置其不欲觀兵盖如此李氏嘉會曰自小司馬以下皆不見其職掌豈用兵之時他官兼權故職不見耶抑兵事尚宻不當載之書耶二者皆是也先王不以兵機示天下五官治教禮刑事法無不著惟兵法不傳後世孫吴尉繚等皆先王所未有黄氏度曰司馬置屬與五官異小司馬而下有軍司馬輿司馬行司馬輿司馬掌車行司馬掌卒軍司馬兼掌之軍司馬如天官之宰夫地官之鄉師以軍名官其職可知易氏祓曰魯會晉師于上鄍輿師受一命之服晉享六卿于蒲圃輿尉受一命之服所謂輿者車也晉中行穆子與無終及羣狄戰于太原毁車為行所謂行者徒也成周師田之法險野徒為主易野車為主于是設二司馬之屬專掌車徒之任異于五官大司馬凡制軍軍將皆命卿師帥皆中大夫旅帥皆下大夫卒長皆上士兩司馬皆中士伍皆有長注將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選于六官六鄉之吏自卿以下徳任者使兼官焉疏言軍將皆命卿云云者皆據在鄉為鄉大夫州長黨正族師閭胥比長時尊卑命數而言伍皆有長是比長下士不言者以衆多官卑故略也一軍則二府六史胥十人徒百人疏府史有軍則置之無則已故不言府二人史六人而逆言其數以見義薛氏衡曰周官序官之例未嘗有序事之法惟司馬所載先詳制軍之事而後及官屬豈非兵者國之大事規畫固當早正歟自調民之法立民之從事于軍者勞逸出入之相權而力常有餘矣于是萬二千五百人為軍有不容損益者焉自制軍之數立國之有軍者内外輕重之相制而勢可得合矣于是王六軍以至小國一軍有降殺之差焉帥其軍者非威令素孚不行也于是大為之将将皆命卿小為之長長皆上士有以定尊卑上下之志焉軍有帥則文移之往來政令之征召有不可略于是一軍則二府六史十胥百徒有以為文書調度之備焉軍政之要莫先斯四者陳氏禮書古之官有常名有異名内而為比長閭師族師黨正州長鄉大夫此常名也及任以師田之事則為軍将師帥旅師卒長兩司馬公司馬此異名也蔡氏徳晉曰軍不必皆取之于鄉而将帥亦不必皆用鄉吏觀四時教閲之旗號必兼州里野家都鄙而並陳之可見而將帥必臨時選擇取有徳有才者為之鄭康成謂凡軍帥不特置選于六官六鄉之吏自卿以下徳任者使兼官焉是也華氏泉曰六軍之將皆命卿必有一卿為之主此必是司馬其餘五卿盖擇于司寇司空及六鄉之鄉大夫為之若太宰司徒宗伯之尊不當使之受節制於司馬也雜説云周之軍制將則命卿帥則皆大夫卒長司馬則皆士葢以詩書禮樂謀元帥無非儒者之事而公卿大夫皆可以充將帥之選方其奉璋峩峩髦士攸宜皆卿大夫之才及其淠彼涇舟烝徒楫之其能濟難者皆將帥之職左之而文無不宜右之而武無不有也然則古之選將必以詩書禮樂為先傳稱晉文公作三軍謀元帥趙衰曰郤縠可臣亟聞其語矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也乃使郤縠將中軍城濮之戰晉侯登有莘之墟以觀師曰少長有禮其可用也故一戰而霸則詩書禮樂之效也伯主且然况王者之選將命帥乎蕙田案軍將命卿以下注及正義甚明薛平仲則云軍將命卿説者以為天地四時六官之六卿今考六官中特司馬掌兵餘卿無與雖田役軍旅之事互見六官然特為治事條目云耳初非為軍將惟鄉大夫掌六鄉之政教禁令序官則曰鄉大夫每鄉卿一人則鄉大夫亦謂之卿六軍之將即六鄉之卿也非特此也比長下士伍長亦下士則伍長即比長閭胥中士兩司馬亦中士則兩司馬即閭胥旅師上士卒長亦上士黨正下大夫旅師亦下大夫州長中大夫師帥亦中大夫則軍將即鄉大夫明矣鄭謂軍帥不特置選于六官六鄉之吏自卿以下使兼官焉謂六鄉之吏兼官可也何為復曰選於六官彼盖無一定之見不知康成原為六卿為軍將而鄉大夫以下徳任者則兼師帥之屬别而言之也王氏與之謂古者畿兵不出境若以王朝六卿兼掌六鄉之軍何害是矣而又以軍將為鄉之卿尤為牽率玩詩常武則宣王固命冡宰矣何得云司馬掌兵餘卿無與耶又案大司馬之職仲夏教茇舍帥以門名縣鄙各以其名鄉以州名鄭注軍將皆命卿古者軍將盖為營治於國門魯有東門襄仲宋有桐門右師皆上卿為軍將者也縣鄙謂縣正鄙師至鄰長也鄉以州名亦謂州長至比長也鄉遂大夫文錯不見以其素信於民不為軍將或為諸帥是以闕焉正義此經六遂直云縣鄙不言遂六鄉言以州名雖見鄉亦不見鄉大夫之身其文交錯不見鄉遂大夫故云文錯不見也兵書孫子云素信者與衆相得管子云作内政寄軍令則鄉遂大夫以下至比長鄰長皆因為軍吏以領本民或别使人為軍將則鄉遂大夫别領人為師帥旅帥知有别使人為軍將者外傳穆叔云天子作師公帥之以征不徳是也經又云辨旗物之用王載太常軍吏載旗師都載旜鄉遂載物注軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也或載旜或載物衆屬軍吏無所將也正義以為從軍將以下至伍長皆得稱軍吏鄉遂大夫若為軍將則在軍吏載旗數中今載旜載物知己所管之衆屬他軍吏己全無所將非直不為軍將亦不為諸帥細玩此二節注及正義知先王命將原無一定鄭注大司馬軍將作兩法觧之一是六官之長一是鄉遂大夫取其徳任者而已此最為精妙薛氏不明此義遂謂六軍之將專用六鄉大夫非也世固有長于治民短於克敵者安得鄉大夫皆全材耶至正義以周公東征四國是皇証三公為將東征之事變也非常也豈得為定制又以韎韐有奭以作六師為諸侯世子為軍將皆近穿鑿今亦不取黄氏度曰遂之爵秩降于鄉一等邦國亦有鄉有遂其爵秩亦當有髙下及在軍皆升之使與六卿等大抵軍吏無大小皆主號今當使人尊敬之二十五人之長而爵中士其意可見李氏嘉㑹曰先王兵制自五人以上必用命士一人為之長至二千五百人則用中大夫故一軍之間卿一人中大夫五人下大夫二十五人上士百二十五人中士五百人下士二千五百人士大夫如此之多故各自愛不致冒昧邀功以自傷所以古者兵敗止曰敗績不至甚斬首也蕙田案以上軍將葉氏時曰六軍人自為備居有積倉行有裹糧非公家所給也是以太宰之職九賦斂財皆有以待其用獨不及軍旅九式均財皆有以為之法而亦不及軍旅豈非農皆為兵兵皆自賦初無煩於廪給故亦不煩於均節歟蕙田案此條附論軍糧書序武王戎車三百兩虎賁三百人與受戰于牧野傳兵車百夫長所載車稱兩一車歩卒七十二人凡二萬一千人舉全數虎賁勇士稱也皆百夫長疏司馬法車有七十二人計三百乗當有二萬一千六百人孔略六百而言云凡二萬一千人故云舉全數孔既用司馬法一車七十二人又云兵車百夫長所載是實領百人非惟七十二人依周禮大司馬法天子六軍出自六鄉凡起徒役無過家一人故一鄉出一軍鄉為正遂為副若鄉遂不足則徴兵于邦國則司馬法六十四井為甸計有五百七十六夫共出長轂一乗甲士三人歩卒七十二人至于臨敵對戰布陣之時則依六鄉軍法五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍故左傳云先偏後伍又云廣有一卒卒偏之兩非直人數如此車數亦然故周禮云乃會車之卒伍鄚云車亦有卒伍左傳戰于繻葛杜注云車二十五乗為偏是車亦為卒伍之數也則一車七十二人者自計元科兵之數科兵既至臨時配割其車雖在其人分散前配車之人臨戰不得還屬本車當更以虎賁甲士配車而戰孔舉七十二人元科兵數者欲總明三百兩人之大數云兵車百夫長所載者欲見臨敵實一車有百人禮記坊記正義諸侯出賦之時雖成方十里出車一乗甲士三人歩卒七十二人其臨敵之時則同鄉法五人為伍五伍為兩之屬故左傳云邲之戰楚廣有一卒卒偏之兩又云兩之一卒適吴是臨軍同鄉法也牧誓云武王戎車三百兩孔注云一車歩卒七十二人則出軍法也經云千夫長百夫長謂對敵時也春秋成公元年正義邦國所出一車甲士歩卒總七十五人周禮大司馬五人為伍等大致不同者大司馬所云謂鄉遂出軍及臨時對敵布陳用兵之法此甲士三人歩卒七十二人謂徴課邦國出兵之時所徴之兵既至臨陳還同鄉遂之法知臨敵用鄉遂法者以桓五年戰于繻葛先偏後伍又宣十二年廣有一卒卒偏之兩及尚書牧誓云千夫長百夫長是臨時對敵皆用五兩卒旅師軍也蕙田案以上三説附論調發臨敵不同制周禮地官小司徒頒比法于六鄉凡起徒役惟田與追胥竭作注鄭司農云田謂獵也追追寇賊也竭作盡行疏此謂六鄉之内上劑致甿一人為正卒其餘皆為羨卒若六遂之内以下劑致甿一人為正卒一人為羨卒其餘皆為餘夫饒逺故也王氏安石曰田與追胥竭作則獵取禽獸與衆同欲逐捕盜賊與衆同惡也程氏曰竭作如惟為社事单出里惟為社田國人畢作单畢皆盡互言之也陳氏禮書古者國有遊倅田有餘夫軍有羡卒皆所以副其正也六鄉以三劑致民上地中地下地起徒役母過家一人以其餘為羡則一人為正卒餘可任者皆羡卒也六遂以下劑致民上地中地下地皆以二人任之則一人為正卒一人為羨卒其餘不預所以優野人也惟田與追胥竭作鄉遂皆然蕙田案田而竭作即禮記所謂惟為社田單出里也陳祥道謂田獵人所同欲其説似陋王應電謂田獵而祭人各致其報本之心是矣而未盡也徒役必留羡卒者重民力慎居守也田而竭作者農隙講武既無嫌於擾民練習戎備實有國之大計也又案以上論田與追胥非羨卒盡發凡國之大事致民大故致餘子注大事謂戎事也大故謂災寇也鄭司農云國有大事當徴召會聚百姓則小司徒召聚之餘子謂羨也𤣥謂餘子卿大夫之子當守于王宫者也疏左氏成公傳國之大事在祀與戎此言致民明非祭祀是戎事可知司農云餘子謂羡也羡卒惟田與追胥竭作大故不合使羨故鄭不從之經云大故當宿衛王宫書傳云餘子皆入學則餘子不得為羨陳氏禮書羨卒亦謂之餘子餘子自私言之羨卒自公言之故也蔡氏徳晉曰餘子羨卒也致餘子先王必不得已為之故雖盡室以行而民不怨也蕙田案鄭司農以餘子為即羨卒陳氏鄭氏王氏應電蔡氏徳晉説並同案經既云田與追胥竭作而其下又云大故致餘子不與上文􅃨疊耶則餘子非羡卒可知康成謂卿大夫之子當守於王宫者疏云大故當宿衛王宫又案書傳云餘子皆入學可証餘子為卿大夫子非羨卒也盖羡卒所以備居守及更休之用若其興師越境而羨卒皆發空國而往居卒僅存老弱民何以堪牧野之師紂七十萬通圻皆發晉作州兵亦盡用之蘇秦謂齊宣王臨淄之中七萬户下户三男子卒二十一萬曹操謂崔琰昨案户籍可得三十萬衆故為大州至于隋閲丁口唐括逃户皆汲汲焉惟恐其民之不盡為用此悉後世之事非先王之政也餘子宜從康成非羨卒盡發詩大雅公劉其車三單蕙田案此條詳見諸侯軍制門禮書援以証致餘子為起羨卒考鄭箋謂大國三軍以餘卒為羨今邰承上公之封公劉遷豳民始從之丁夫適滿三軍之數單者無羡卒也玩此知詩特舉其軍賦實數非羨卒盡發小雅采芑其車三千箋司馬法兵車一乘甲士三人歩卒七十二人宣王承亂羡卒盡起蕙田案一車士徒七十五人千乗當用七萬五千人則為六軍采芑其車三千鄭以為羡卒盡起孔正義六鄉羨卒盡起得二千五百乗案畿内六鄉地居四同萬有二千五百家為鄉依小司徒上地可任者家三人中地二家五人下地家二人一為正卒餘為羨卒通而率之家二人半若令盡起一鄉得三萬一千五百人六鄉得十八萬七千五百人計千乗為七萬五千人則十八萬七千五百人可得二千五百乗此頴達之説也但㕓里九等田亦在六鄉之内孔未算及未為定數今以載師注考之六鄉四同方二百里則三十六萬夫之地三分去一存二十四萬夫六鄉七萬五千家受十五萬夫之地其餘九萬夫㕓里九等田九者各為萬家通受一夫實二家受一夫之地定受田十二萬家若以一家二人半通率之則有三十萬人苐據康成以遂人溝洫之法與匠人井田之法二法判然不同鄉遂溝洫稠多較之都鄙幾十數倍則鄉遂治溝洫之夫自當數倍于都鄙而檢經及注疏並無此文未可臆斷則六鄉實受地者雖可定之以十二萬夫而其出賦者尚未可定也要之必不能給三千乗盖三千乗則十八軍二十二萬五千人矣斷非六鄉之所能供也正義以為家二人半特舉其大率耳人有死生數有改易六鄉内不必常有千乗或出六遂足之或出於公邑愚謂周禮田與追胥李氏景齊以為田乃暫時事則不惡其為盡征也即追捕盜賊亦不過逐出之耳若逺行征伐決無空國而往之理賈公彦原有鄉不足取遂遂不足取采地又不足徴邦國之説亦決無必待六鄉盡起尚不足而始徴外兵之事若然則六鄉疲憊已極而邦國永無徴發時矣采芑之三千安知非鄉遂都鄙之正卒或徴邦國之兵鄭氏羨卒盡發之説未可信觀承案其車三千詩人之筆或大言之以鋪張兵威之盛耳必欲核其實則天子十二軍出於六鄉六遂者乃田賦出兵之常法止以守衛王畿而備廵守田獵之事至于出師自當合調邦國都鄙之兵以足之况畿方千里出車萬乗今三千之車亦只用其十之三耳如鄭氏羨卒盡發之説是天子直將空國授之方叔而行矣以此觧詩固矣王氏應電曰舊謂五家為比故五人為伍二十五家為閭故二十五人為兩居則為比閭族黨州鄉行則為伍兩卒旅師軍此説是矣而非覈實之言也夫苟定于比即為伍則征行而用衆何以居守豈百里之内曠然無人耶愚嘗詳考六鄉居民之數一比長所統合有五十家然則所謂一伍之人亦于五十家内而取之十家而取一人也故比閭族黨州鄉者教訓其居民之法有家則在所教者也伍兩卒旅師軍者部署其勇力之法凡有材藝者又自會而用之也庠序師田各自為制征行有時而居守不可缺不外乎比閭而不泥于比閭實並行而不悖故以比閭中之民而簡閲之為伍兩則可謂比閭之民與其長即伍兩之兵與将豈其然乎蕙田案王明齋疑比閭族黨州鄉為伍兩卒旅師軍則征行用衆百里之内曠然無人何以居守因剏論謂比閭者教訓其居民之法伍兩者部署其勇力之法所謂伍兩特臨時簡閲十家而取一人耳不知征行之時羨卒固在居守何患無人先王寓兵於農若臨時簡閲則仍後世苟且之計豈其然乎明齋亦惑于羨卒盡起之言耳不知古無此法也賈公彦小司徒疏凡出軍之法先六鄉賦不止次出六遂賦猶不止徴兵於公邑及三等采賦猶不止乃徴兵於諸侯大國三軍次國二軍小國一軍此軍等皆出於鄉遂賦猶不止則諸侯有遍境出之法則千乗之賦是也春秋孔疏天子六軍出自六鄉大國三軍出自三鄉其餘公邑采地之民不在三軍之數古者用兵天子先用鄉鄉不足取遂遂不足取公卿采邑及諸侯邦國若諸侯出兵先盡三鄉三遂鄉遂不足然後總徴境内之兵章氏俊卿曰古者畿内之兵不出所以重内也卒有四方之役即用諸侯人耳或遣上公帥王賦亦不過元戎十乗以先啟而行也而調兵諸侯又各從其方之便髙宗伐楚盖裒荆之旅武王克商實用西土至于征徐以魯追貊以韓平淮夷以江漢略見于經可考也平王出戍逺以見刺當是時周都洛矣自洛戌申許無乃未甚逺而周人已不堪况後世有勞師萬里者哉春秋之初從王伐鄭猶有蔡人衛人二百四十二年間王人㑹伐屢矣未嘗見師之出惟敗績于茅戎王師自出春秋深譏焉陳氏傅良曰古者五侯九伯專征而諸侯皆共四方之事畿兵不出案詩出車云我出我車于彼牧矣自天子所謂我來矣又漸漸之石為東勞西逸而有不遑朝處之嘆更以周官司馬法叅考王有四方之事則冡宰徴師于諸侯曰某國不道征之以某年某日師至于某國小宰掌其戒具虎賁氏奉書以牙璋發之然則畿兵不逺征故劉文公平丘之會對晉人曰天子之老請率王賦至平王東遷以王人戍申甫而揚之水始刺之春秋之初從王伐鄭猶有陳蔡衛之兵二百四十二年間王人會伐屢矣未嘗見王師自出惟敗績茅戎王師自出春秋譏焉至戰國時赧王伐秦尚從鋭師以此知畿兵不用陳氏禮書賈公彦言出軍之法先六鄉次六遂次公邑都鄙乃徴兵于諸侯不止則諸侯闔境出焉所謂千乗之賦也然先王之于天下大則有方伯小則有連帥其待卒應變如身之使臂臂之使指各適其事之逺近而已方伯連率所不能克然後鄉遂之士應之周官曰王之大事諸侯左傳曰五侯九伯汝寔征之又曰諸侯敵王所愾則出軍之法顧豈先虚其内以實其外哉蕙田案鄭司農云百里内為六鄉外為六遂合鄉遂可制十二軍而僅制六軍盖以遂為鄉之副倅鄉不足斯取諸遂其寛民力一也民之可任者雖有家三人二家五人家二人之别然每家惟取一人為正卒其餘皆為羨卒以備更休其寛民力二也六鄉以三劑致甿而六遂槩以下劑為率則正羨之外雖可任而并不用為羨者更多矣其寛民力三也以此知古無盡發之事又案六軍統于大司馬而大司馬九伐之法明載夏官章俊卿陳傅良陳祥道謂内兵全不出者非也然如賈公彦孔頴達所云鄉不足取遂以逓及於邦國云云者若專指正卒而言則可倘泥康成羨卒盡起一言空其國不足乃他有徴發是先虚其内以實其外百里之内何以居守誠有如陳用之王明齋所疑矣蕙田案以上徴發右出軍之制下五禮通考卷二百三十四
