body:
  text: 五禮通考卷一百七十二邢部尚書秦蕙田撰嘉禮四十五學禮禮記文王世子天子視學大昕鼓徴所以警衆也衆至然後天子至注大昕早昧爽擊鼓以召衆警猶起也周禮凡用樂大胥以鼓徴學士疏視學謂仲春合舞李春合樂仲秋合聲之時也陳氏澔曰天子視學之日初明之時學中擊鼓以徴召學士蓋警動衆聴使早至也月令仲春之月上丁命樂正習舞釋莱天子乃帥三公九卿諸侯大夫親往視之季春之月擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之注大合樂者所以助陽達物風化天下也其禮亡蕙田案大司樂掌成均之法以樂徳樂語樂舞教國子故大合樂必於太學而天子親往視之以觀禮焉大雅云於倫鼓鐘於樂辟廱此合樂於學宮之證也周禮大胥職云春入學舍菜合舞秋頒學合聲説者以頒學合聲在仲秋之月天子亦視學於養老而月令無之文不具也學記未卜禘不視學游其志也注禘大祭也天子諸侯既祭乃視學考校陳氏禮書古者喪畢則禘未卜而視學非所以示孝道而不足以游學者之志也春秋傳稱晉人曰以寡君之未禘祀未禘祀猶不可務外事况視學乎王制將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入樂不變王親視學陳氏禮書天子視學四養老也簡不帥教也出征受成也以訊馘告也養老必于仲春季春仲秋而簡不帥教出征受成以訊馘告者無常時雖無常時其入學也亦必養老焉天子將視學以鼓徴衆序立以齒及天子至命有司行事祭先師先聖于西學有司卒事反命乃適東序養老焉此視學之大略也蕙田案文王世子記視學警衆之節月令記視學合樂之事學記記視學考校之法王制記視學簡不帥教之事其養老受成訊馘諸儀俱别見詩魯頌泮水魯侯戾止在泮飲酒陳氏禮書諸侯視學之禮蓋有同于天子詩云魯侯戾止在泮飲酒既飲㫖酒永錫難老此養老也在泮獻囚此以訊馘告也右天子諸侯視學後漢書世祖本紀建武五年冬十月初起太學車駕幸太學賜博士弟子各有差桓榮傳建武十九年拜榮為博士車駕幸太學㑹諸博士論難于前榮被服儒衣温㳟有藴藉辨明經義每以禮讓相厭不以辭長勝人儒者慕之及特加賞賜又詔諸生雅吹擊磬盡日乃罷明帝本紀永平二年春三月臨辟雍冬十月壬子幸辟雍儒林傳中元元年初建三雍明帝即位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀帝正坐自講諸儒執經問難于前冠帶縉紳之人圜橋門而觀聽者蓋億萬計和帝本紀永元十四年春三月戊辰臨辟雍明帝本紀陽嘉元年春三月庚寅帝幸辟雍魏志髙貴鄉公本紀甘露元年四月丙辰帝幸太學二年五月辛未帝幸辟雍㑹命羣臣賦詩晉書武帝本紀泰始六年冬十一月幸辟雍賜太常博士帛牛酒各有差宋書文帝本紀元嘉二十三年九月己卯車駕幸國子學策試諸生問答凡五十九人冬十月詔曰庠序興立累載胄子肄業有成近觀策試覩濟濟之美緬想洙泗永懷在昔諸生問答多可採覽教授之官並宜沾賚賜帛各有差南齊書武帝本紀永明四年三月辛亥國子講孝經車駕幸學賜國子祭酒博士助教絹各有差梁書武帝本紀天監九年三月己丑車駕幸國子學親臨講肆賜國子祭酒以下帛各有差十二月癸未輿駕幸國子學策試胄子賜訓授之司各有差魏書孝文帝本紀太和十六年四月甲寅幸皇宗學親問博士經義十七年九月壬申幸太學觀石經隋書禮儀志後齊將講于天子先定經于孔父廟置執經一人侍講二人執讀一人摘句二人録義六人奉經二人講之旦皇帝服通天冠元紗袍乗象輅至學坐廟堂上講訖還便殿改服絳紗袍乗象輅還宫周書武帝本紀保定三年夏四月戊午幸太學宣帝本紀大象二年二月丁巳帝幸露門學隋書髙祖本紀開皇十年十一月辛卯幸國學頒賜各有差舊唐書禮儀志武徳七年二月丁酉幸國子學引道士沙門有學業者與博士雜相駁難久之唐書陸元朗傳補太學博士髙祖已釋奠召博士徐文逺浮屠慧乗道士劉進喜各講經徳明隨方立義徧析其要帝大喜曰三人者誠辯然徳明一舉輒蔽可謂賢矣蕙田案唐祖舉幸學之典乃以沙門道士與博士相論難去重道之意逺矣舊唐書禮儀志貞觀十六年三月丁丑太宗幸國子學親觀釋奠祭酒孔頴達講孝經開元禮皇帝皇太子視學前一日所司灑掃學堂之内外尚舍設大次于學堂之後守宮設皇太子次于大次之東皆隨地之宜並如常儀尚舍設御位學堂上北壁下當中南向監司設講榻于御􅚋之西南向設執讀座于前楹間當講榻北向尚舍又設皇太子座于御座東南西向設文官三品以上座于皇太子之南少退重行西面北上設武官三品以上座于講榻西南當文官重行東面北上設侍講􅚋于執讀西北武官之前東面北上其執如意者一人立于侍講之南東面設論議座于講榻之前西階下典儀設版位皇太子于東陛東南西面執經于西階西南東面文官三品以上于皇太子東南重行西面北上武官三品以上于執經西南侍講執讀執如意等于執經之後重行東面北上學生分于文武官之後皆重行北上設典儀位于東階之西贊者二人在南差退俱西面出宮前三日本司宣攝内外各供其職其日應從駕文武官依時刻集朝堂諸衞陳設仗衞侍中版奏外辦皇帝乗馬文武侍從並如常行幸之儀駕將至祭酒率監官學官學生等奉迎于路左學生青衿服駕至大次門外降入如常視學皇帝既入大次執經侍講執讀執如意等及學官各服公服典儀率贊者先入就位謁者贊引文武三品以上及執經以下學生等入就堂下位皇太子立于學堂門外之東西向如常侍中版奏外辦皇帝出大次升自北階即御座南向坐侍臣及近侍量人從升典儀一人升就東階上西面立舍人引皇太子就位立諸衞率庶子等量人從入立于皇太子東南西面北上奉禮曰再拜贊者承傳皇太子以下在位者皆再拜侍中跪奏稱請敕皇太子及公王等升坐又侍中稱制曰可侍中詣東階上西面稱勅皇太子及公王等升殿上典儀承傳階下贊者又承傳皇太子以下應坐者皆再拜訖通事舍人引皇太子及羣官坐者各升座訖其公服者脱屨于階下及降納皆如常執讀讀所講經執經釋義訖侍講者執如意就論議座以次論難侍中跪奏禮畢羣官皆起通事舍人各降堂下位若有勅賜㑹則侍中前承制降詣堂下宣勅及太官下食案等並如常儀皇帝降座還大次侍衞如常儀羣官以下㑹訖皆出執經以下改服常䏜學生仍青衿服車駕還宮皇帝既還大次侍中量時刻版奏外辦皇帝出次文武官陪從還宫如來儀初駕出國子祭酒帥監官學官學生等奉辭于路左如常式玉海周顯徳二年初建國子監國初又増置學舍太祖親撰先聖及亞聖贊十哲以下命宰臣兩制撰太祖三幸國子監閲土木之功蕙田案玉海據祖宗故事謂藝祖建隆元年正月首幸國學次月又幸范百禄以為祖宗隆儒師古躬化天下之意但續通鑑長編㑹要日歴諸書皆不載此事考本紀兩幸國學在建隆三年編纂故事者誤移之元年耳宋史太祖本紀建隆二年十一月己巳幸國子監三年春正月癸未幸國子監二月丙辰復幸國子監乾徳元年夏四月丁亥幸國子監太宗本紀太平興國四年二月壬子幸國子監文獻通考端拱元年八月幸國子監謁文宣王畢升輦將出西門顧見講坐左右言學官李覺方聚徒講書即召覺令對御講說覺曰陛下六飛在御臣何敢輒陞髙座帝為降輦令有司張帟幕設别坐詔覺講易之泰卦從臣皆列坐覺因述天地感通君臣相應之言帝甚悦特賜帛百匹玉海淳化五年十一月上幸國子監賜直講孫奭五品服因幸武成王廟徧閲塑像復幸太學賜羣臣坐時侍講李至執經講堯典一篇未畢令奭講説命三篇奭曰尚書主言治世之道説命最備文王得太公髙宗得傅説皆賢相也至事不師古以克永世匪奭攸聞上曰誠哉是言因歎曰何髙宗之時而有賢相如此飲從官酒三行賜奭帛三十匹咸平二年七月甲辰幸國子監謁先聖因覽壁畫三禮圗移幸武成王廟復至國學命學官崔偓佺講大禹謨賜緋祭酒邢昺以下銀綵還幸崇文院閲羣書命從臣縱覽登祕閣觀太學聖製墨迹惻愴久之袐丞劉鍇獻幸太學頌景徳二年夏五月戊申幸國子監天聖二年八月己卯幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇賜三品服已而觀七十二賢讚述閲東序三禮圗因問侍講馮元三代制度元引經以對宋史仁宗本紀慶歴四年夏五月壬申幸國子監謁孔子賜直講孫復五品服哲宗本紀元祐六年冬十月庚午幸國子監賜祭酒豐稷三品服監學官賜帛有差禮志哲宗始視學遂幸國子監御敦化堂召從官賜坐禮部太常寺本監官承事郎以上侍立承務郎以下三學生坐于東西廡侍講吳安詩執經祭酒豐稷講尚書無逸終篇復命宰臣以下至三學生坐賜茶豐稷賜三品服本監官學官等賜帛有差徽宗本紀崇寧三年十一月甲戌幸太學官論定之士十六人遂幸辟雍賜國子司業吳絪蔣静四品服學生推恩有差禮志徽宗幸太學遂幸辟雍所司預設次于敦化堂後又于堂上稍北當中兩間設次南向設御座又設從官及講筵講書執經官并太學官坐御座之南東西重行異位太學生坐于兩廡相向並北上宰官以下從官之次設于中門外皇帝酌獻文宣王畢幸太學降輦入次簾垂更衣禮直官通事舍人引講官與侍立官入就堂下皆繫鞵講書執經學生各立堂下東西相向俟報班齊皇帝升座班首奏萬福在位者皆應諾訖閤門使承㫖臨階宣升堂通事舍人喝拜應在位者再拜訖分左右升堂各就位少立起居郎舍人分左右侍立禮直官通事舍人引講書及執經官就北向位班首奏萬福閤門使宣升堂舍人唱再拜訖命東西升堂立于御座左右講書官在西南向執經官在東西向學生就北向位舍人喝拜在位者皆再拜立于東西兩廡内侍進書案以經授執經官稍前進于案上舍人喝拜就坐宰臣以下並堂上坐如閤門所進坐位圖講書畢通事舍人曰可起羣臣皆起降階立執經官講書官于御座前致辭訖亦降舍人喝拜如有宣答即再喝拜閤門宣坐賜茶舍人喝拜訖宰臣以下升堂各立于位後學生各就北向位舍人喝拜在位者俱拜訖各分東西廡以北為上下舍人喝就坐上下皆就坐賜茶畢禮直官通事舍人引堂上官降階就位舍人喝拜在位者俱拜訖禮直官引之以次出學生就位舍人喝拜學生俱再拜退玉海宣和四年三月幸太學命祭酒韋夀隆講書無逸司業權邦彦講詩下武學官遷秩賜詔并御製宣聖贊幸精微造士二齋宋史禮志紹興十三年七月國學大成殿告成明年二月國子司業髙閌請幸學上從之三月上服鞾袍乗輦入監奠祀如常儀尚舍先設次于崇化堂之後及堂上之中南向設御座閤門設羣臣班于堂下如月朔視朝之儀宰輔從臣次于中門之外上乗輦幸太學降輦于堂入次更衣講官入就堂下講位北向執經官學生皆立于堂下東西相向帝出次升御座羣臣起居如儀乃命三公宰輔以下升堂皆就位左右史侍立講書及執經官北面起居再拜皆命之升立于御座左右學生北面再拜分立兩廡北上内侍進書案牙簽以經授執經官賜三公宰輔以下坐講畢羣臣皆起降階東西相向立執經官降講官進前致詞乃降北面拜左右史降乃賜茶三公以下北面再拜升各立于位後學生北面再拜分兩廡立上下就坐賜茶畢三公以下降階學生自兩廡降階北面再拜羣臣以次出上降座還次乗輦還宫特命禮部侍郎秦熺執經司業髙閌講易之泰遂幸養正持志二齋賜閌三品服學官遷秩諸生授官免舉賜帛有差孝宗本紀淳熙四年春二月乙亥幸太學御敦化堂命國子祭酒林光朝講中庸下詔遂幸武學監學官進秩一等諸生推恩賜帛有差六月辛巳班幸學詔蕙田案玉海云光朝講中庸九經一叚云所以行之者一一即中庸也孝宗以為深得聖人之㫖先儒所未及寧宗本紀嘉泰三年春正月戊戌幸太學謁大成殿御化原堂命國子祭酒李寅仲講尚書周官篇遂幸武學監學官進秩一級諸生推恩賜帛有差理宗本紀淳祐元年春正月戊申幸太學遂御崇化堂命祭酒曹觱講禮記大學篇監學官各進一秩諸生推恩錫帛有差制道統十三贊就賜國子監宣示諸生禮志淳祐元年正月理宗幸太學宗武兩學官屬生員並赴太學陪位皇帝至崇化堂宰臣使相執政並起居執經官由東階講官由西階並升堂于御前分東西相向立次引國子監三學學官學生一班北面再拜贊各就坐賜茶俟講書畢起立班再拜禮成執經官講書官國子監三學官生員各推恩轉官有差度宗本紀咸淳三年春正月戊申帝詣太學禮部尚書陳宗禮國子祭酒陳宜中進讀中庸己酉執經官宗禮講經官宜中各進一秩宜中賜紫章服太學武舉宗學國子學宗正等官若醫官監書庫門庖等各進一秩諸齊長諭及起居學生推恩有差南渡典儀車駕幸學先期三日儀鸞司及内侍省官至國子監相視八廂亦至學中搜檢次日諸齋生員盡行搬出學外安泊各齋門並用黄封學官預詣御課用黄羅裝背大冊面簽云太學某齋生臣姓某供以大黄羅袱䕶之置于各齋之前以備駕至㸃索崇化堂後即聖駕歇泊之所皆設御屏黄羅幃設供御物等凡敕入宮門號止于國子監外門敕入殿門號止于國子監内門敕入禁衞號止于崇化堂天井謂之隔門除司業祭酒外其餘學官前廊長諭並帶黄號于隔門外席地坐賜酒食三品以俟迎駕駕至純禮坊隨駕樂部㕘軍色念致語雜劇色念口號起引子導駕至大成殿櫺星門禮部太常寺官國子監三學官及三學前廊長諭率諸生迎駕起居上乗輦入門至大成殿降輦有㫖免鳴鞭以昭至敬閤門太常禮直官前導入御幄太常卿跪奏稱太常卿臣某言請皇帝行酌獻之禮上出御幄升殿詣文宣王位前三上香跪受爵三祭酒奠酌兩拜在位皆兩拜降階歸幄太常卿奏禮畢陪位官並退上乗輦鳴鞭入崇化堂降輦入幄更衣上所至皆設御幄禮官國子監官三學官三學生並于堂下分東西立次引執經官講書官于堂下東壁西向立宰臣執政以下北向立閭門奏班齊上服帽紅上蓋玉束帶絲鞋出崇化堂坐宰臣以下宣名奏聖躬萬福御傳㫖宣升堂各兩拜贊賜坐分東西階升堂席後立次引執經官講書官奏萬福官該宣名者即宣名兩拜次引國子監三學官并三學生奏萬福兩拜分引升兩廊席後立内官進書案聽宣以經授執經官進于案上講筵内承受對展經冊入内官進牙界方舍人贊賜坐宰相以下及兩廊學官生員應喏訖各就坐聽講講書官進讀經義執經官執牙箆執讀入内官收撤經書再以講義授講官講書官指講訖入内官收撤書堂上兩廊官並起分行宰臣以下降階講書官當御前躬身致詞北向立兩拜御藥降階宣答云有制謁欵至聖肅尊視學之儀講繹中庸爰命敷經之彦茂明彜訓允當朕心再兩拜御藥傳㫖宣坐賜茶訖舍人贊躬身不拜各就坐分引升堂席後立兩拜各就坐翰林司供御茶訖宰臣以下并兩廊官北向各再拜訖出皇帝起易服幞頭上蓋玉帶絲鞋乗輦鳴鞭出學官諸生迎駕如前隨駕樂部㕘軍迎駕色念致語雜劇色念口號曲子起夀同天引子導駕還宮在學前廊並該恩出官諸生各有免觧恩例餘並推恩有差金史宗憲傳太宗幸學宗憲與諸生俱謁宗憲進止恂雅太宗召至前令誦所習語音清亮善應對上嗟賞久之元史順宗本紀至正八年帝幸國子學賜衍聖公銀印陞秩從二品定弟子員出身及省親奔喪法續文獻通考洪武十五年十二月乙丑上遂幸國子監謁先師孔子釋莱禮成退御講筵祭酒吳顒等以次講畢上謂之曰中正之道無踰于儒上古聖人不以儒名而徳行實儒後世儒之名立雖有儒名或無其實孔子生于周末身儒道行儒行立儒教率天下後世之人皆欲其中正惜乎魯國君臣無能用之者當時獨公父文伯之母知其賢責其子之不能從則一國君臣可愧矣卿等為師表正當以孔子之道為教使諸生咸趨乎正則朝廷得人矣復命取尚書大禹臯陶謨洪範親為講説反覆開論羣臣聞者莫不悚悦遂賜宴竟日而還丙寅祭酒吳顒率博士龔斆上表謝各賜羅衣二襲官民生許恒等四百三十人各賜春夏布衣明㑹典視學洪武十五年定前期一日有司灑掃殿堂設御幄于大成門東上南向設御座于彛倫堂至日學官率諸生迎駕于成賢街左駕至學官及諸生俯伏叩頭興駕入櫺星門止于大成門外上入御幄禮官入奏請行禮如常儀上入御幄易常服陞輿詣學學官率諸生行禮五拜叩頭東西序立于堂下三品以上及侍從官以次入堂東西序立贊進講祭酒司業博士助教四人以次升堂由西門入至堂中贊舉經案于御前禮部官奏請授經于講官祭酒跪受賜講官坐乃以經置講案叩頭就西南隅設几榻坐講賜大臣翰林儒臣坐皆叩頭序坐于東西諸生圜立以聽講畢祭酒叩頭退就本位司業博士助教各以次進講畢出堂門復位贊唱有制學官諸生列班俱北面跪聽宣諭五拜叩頭禮畢學官率諸生出成賢街俟駕還明日祭酒率學官上表謝恩續文獻通考永樂四年三月辛卯朔幸學親行釋莱禮畢上御彛倫堂命坐講祭酒胡儼講尚書堯典司業張智講易泰卦大臣及翰林院詞官皆賜坐講畢宣諭曰六經聖人之道彌綸天地昭揭日月垂憲萬世率田彛訓與卿等皆勉之遂命光䘵寺賜百官茶次日早祭酒胡儼等上表及箋稱謝賜祭酒以下宴于奉天門監生宴于丹墀仍賜儼及司業張智紵絲羅衣人二襲學官王進用等三十五人紵絲衣人一襲監生朱瑨等三千七十四人鈔各五錠時禮部㑹試舉人中式者瑨第一故瑨為諸生班首云壬辰命工部修太祖髙皇帝詔書碑亭禮部奏立視學之碑上親為製文明史禮志正統五年帝幸國子監如儀禮畢賜公侯伯駙馬武官都督以上文官三品以上及翰林學士至檢討宴國子監祭酒至學録宴續文獻通考景泰二年二月初三日幸學是日祭酒蕭鎡講書經皋陶謨天聰明一章司業趙琬講周易泰卦象辭明㑹典成化元年續定前期一日國子監灑掃殿室内外錦衣衞設御幄于大成門之東上南向設御座于彛倫堂正中鴻臚寺設經案于堂内之左設講案于堂内之西南至日置經于經案百官免朝先詣國子監門外迎駕駕從東長安門出鹵簿大樂以次前導樂設而不作學官率諸生迎上至大成門外入御幄禮官入奏請行禮導引官導上出御幄中道詣大成殿行禮出上入御幄禮官入奏請幸彛倫堂上陞輿禮官前導由櫺星門出從太學門入諸生先分立于堂下東西學官列于諸生前駕至學官諸生跪伺駕過然後起仍前序立百官分列堂外稍上左右侍立上至彛倫堂陞御座贊學官諸生行五拜叩頭禮武官都督以上文官三品以上及翰林院學士陞堂執事者各以次序立贊進講祭酒司業以次陞堂由東西小門入至堂中執事官舉案于御前禮官奏請授經于講官祭酒跪受經受畢上賜講官坐祭酒乃以經置講案叩頭就西南几榻坐講上賜武官都督以上文官三品以上及翰林院學士坐皆叩頭序立于東西諸生圜立于外以聽祭酒講畢叩頭退就本位司業進講如儀畢出堂門復位贊有制學官諸生列班俱北面跪聽宣諭畢贊行五拜叩頭禮畢學官諸生以次退先從東西小門出列于成賢街之右伺候尚膳監進茶御前上命光䘵寺賜各官茶畢各官退立于堂門外叩頭東西序立上起陞輿由太學門出陞輦鹵簿大樂前導樂作駕出太學門學官諸生伺駕至跪叩頭退百官常服先詣午門外伺候駕還鹵簿大樂止于午門外上御奉天門鳴鞭百官常服行慶賀禮鴻臚寺致詞云恭惟皇上敬禮先師親臨太學増光前烈丕闡鴻猷臣等欣逢盛事禮當慶賀行禮畢鳴鞭駕興還宮百官退明日國子監祭酒率學官諸生上表謝恩續文獻通考孝宗宏治元年幸學闕里志正徳元年武宗視太學明史禮志嘉靖元年定衍聖公率三氏子孫祭酒率學官諸生上表謝恩皆賜宴于禮部十二年以先儒祀典既正再視學續文獻通考隆慶元年五月命公侯伯應襲子弟俱赴國子監習禮八月癸未朔上幸太學行釋奠于先師上御彛倫堂命武官都督以上文官三品以上及翰林院學士坐賜茶授祭酒司業經坐講上宣諭師生曰聖人之道如日中天講究服膺用資治理爾師生其勉之闕里志隆慶元年八月初一日駕幸太學續文獻通考神宗元年八月上幸太學賜輔臣羊酒鈔錠有差闕里志神宗四年駕幸太學崇禎二年正月二十日駕幸太學右歴代視學禮記王制王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉凡入學以齒疏長幼受學雖王太子亦然文王世子行一物而三善皆得者唯世子而已其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也注司主也一一人也元大也良善也貞正也疏物猶事也謂與國人齒讓之一事三善謂衆知父子知君臣知長幼也云父在則禮然君在則禮然直云長長不言兄在則禮然者世子無兄故也國人謂不知禮者疑而發問也有父在則禮然者是知禮者曉其意而答之也父在則常湏謙退不敢居人之前故云父在則禮當如此父子天性自然故云道君臣以義合故云義長幼有等級上下故云節世子惟在學受業時與國人齒若朝㑹飲食則各以位之尊卑諸子職云辨其等正其位是也國人聞世子居臣子之禮於是各知尊其君父故世子所以父在為子禮君在為臣禮也斯語辭也云謂之臣者世子於君雖曰君臣異於義合也樂正主太子詩書之業父師成就其徳行一人謂世子也一人有大善則萬國以正也祭義當入學而太子齒注文王世子曰行一物而三善皆得惟世子而已其齒于學之謂也于疏當入學而世子齒國人故云而太子齒漢書儒林𫝊天監七年詔大啟庠斆博延胄子于是皇太子皇子宗室王侯始就業焉武帝本紀天監九年三月乙未詔曰皇子從學著自禮經貴遊咸在實惟前誥所以式廣義方克隆教道今成均大啟元良齒讓自斯以降並宜肄業皇太子及王侯之子年在從師者可令入學隋書禮儀志大同七年皇太子表其子寧國臨城公入學時議者以與太子有齒胄之義疑之侍中尚書令臣敬容尚書僕射臣纘尚書臣僧旻臣之遴臣筠等以為㕘點並事宣尼回路同諮泗水鄒魯稱盛洙汶無譏師道既光得一資敬無虧亞貳况于两公而云不可制曰可唐書𤣥宗本紀開元七年十一月乙亥皇太子入學齒胄賜陪位官及學生帛禮樂志開元七年皇太子齒冑于學謁先聖詔宋璟亞獻蘇頲終獻臨享天子思齒胄義乃詔三獻皆用冑子祀先聖如釋奠右散騎常侍褚無量講孝經禮記文王世子篇唐開元禮皇太子束脩束帛一篚五匹酒壼二斗脩一案五脡其日平明皇太子服學生之服其服青衿至學門外博士公服執事者引立學堂東階上西面相者引皇太子立于門外之東西面陳束帛壺酒脯案于皇太子之西面當門北向重行西上將命者出立門西東面曰敢請就事皇太子少進曰某方受業于先生敢請見將命者入告博士曰某也不徳請皇太子無辱將命者出告皇太子曰某不敢為儀敢固請將命者入告博士曰請皇太子就位某敢見將命者出告皇太子曰某不敢以視賓客請終賜見將命者入告博士曰某辭不得命敢不從將命者出告執篚者以篚東面授皇太子皇太子執篚博士降俟于東階下西面相者引皇太子執事者奉壺酒脩案以從皇太子入門而左詣西階之南東面捧酒脩者立于皇太子西南東面北上皇太子跪奠篚再拜博士答再拜皇太子還避遂進跪取篚相者引皇太子進博士前東面授幣奉壺酒脩案者從奠于博士前博士受幣執事者取酒脩幣以東相者引皇太子立于階間近南北面奉酒脩者出皇太子拜訖相者引皇太子出皇太子釋奠于孔宣父禮畢既入便次改服常服執經侍講執讀執如意等及三館學官並服公服學生仍青衿服餘皆常服掌儀帥贊者先入就位謁者各引羣官及學生等次入就位左庶子版奏外辦皇太子乗輿出便次若湏乗馬臨時聽進止侍衞如常儀至學堂後降輿升自北階即座坐左右侍衞量人從升太傅少傅各就座坐掌儀曰再拜贊者承傳羣官及學生等在位者皆再拜執經不拜左庶子跪奏請令執經等升俯伏興又左庶子稱令曰諾左庶子退降詣西階下立于執經等之前北面宣令曰執經以下並升座應坐者皆再拜執經不拜通事舍人引執經以下升各就座坐其升坐者皆脱屨如式訖執讀讀所講經執經釋義訖執如意者以如意授侍講侍講興受進詣論議座北面問所疑執經為通之訖興退以如意授執者退還本座執如意者以如意次授諸侍講者皆如上儀總訖左庶子跪奏禮畢羣官皆起通事舍人各引降復堂下位皇太子降座降自北階入學堂後便次羣官以次出執經以下改服常服學生仍青衿服蕙田案通典載皇太子釋奠儀自陳設至還宮儀注甚詳此專録其講學一節又案世子齒胄之禮秦漢以後廢不復講其見于史冊者惟梁天監唐開元二事耳若後代東宮出閤講學諸儀雖亦毓徳之要務而無關于學校故不録右世子齒學大戴禮武王踐阼三日召士大夫而問焉曰惡有藏之約行之行萬世可以為子孫常者乎諸大夫對曰未得聞也然後召師尚父而問焉曰黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣三日王端冕師尚父亦端冕奉書而入負屏而立下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不强則枉弗敬則不正枉者滅廢敬者萬世藏之約行之行可以為子孫常者此言之謂也臣聞之以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世武王聞之惕若恐懼退而為戒書於席之四端為銘焉于几為銘焉于鑑為銘焉于盥盤為銘焉於楹為銘焉于杖為銘焉于帶為銘焉于履屨為銘焉於觴豆為銘焉於户為銘焉於牖為銘焉於劍為銘焉於弓為銘焉於矛為銘焉蕙田案三代聖王終始典學緝熙光明設三公之官坐而論道又有師氏保氏掌以􅍇詔王王舉則從其時雖不聞有經筵之名然大戴禮稱帝入太學承師而問道而學記亦云太學之禮雖詔於天子無北面蓋古聖待講學之臣其崇重如此大戴禮有武王踐阼一篇稱王下堂東面立師尚父西面授王丹書與經筵之儀相近後代舉經筵不於太學而於殿廷亦相類也故録以為經筵之縁起云漢書宣帝本紀甘露三年三月己丑詔諸儒講五經同異太子太傅蕭望之等平奏其議上親稱制臨决焉後漢書章帝本紀建初四年十一月壬戌詔下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異帝親稱制臨决如孝宣甘露石渠故事蕙田案宣帝之講石渠章帝之議虎觀此講經殿中之始然其時特令諸儒講議異同稱制平决蓋二主皆以通經為尚藉此風示天下也玉海唐元宗開元三年九月戊寅詔左散騎常侍馬懷素與右常侍褚無量更日侍讀潛確類書經筵歴代無專官漢宣帝詔諸儒講五經于石渠閣唐元宗改麗正書院為集賢院選耆儒日一人侍讀以質史籍疑義置集賢侍讀學士褚無量馬懷素為侍講每入闕門則令乗肩輿以進王圻續通考唐穆宗召韋處厚路隨為侍讀命講書蕙田案内殿侍讀昉於唐時尚無經筵之名玉海太袓建隆三年六月召宗丞趙孚講易于後殿開寳三年召王昭素賜坐便殿講乾卦天禧舊制侍臣皆賜坐講者别坐而聽乾興後侍臣先賜茶畢徹席立講畢復坐賜湯侍讀無所職但侍立而已自宋綬夏竦侍讀始令日讀唐書一傳又讀正説講日帝親書古賢詩或經書要言一二紙宋史仁宗本紀景祐元年正月丁亥置崇政殿説書玉海命賈昌朝趙希賢王宗道楊安國並為崇政殿説書日以二人侍講説二年春正月癸丑置邇英延義二閣冩尚書無逸篇于屏東齋記事宋崇政殿西有延義閣南向迎陽門之北有邇英閣東向皆講書所仁宗初御延義每令講論或講讀終篇則宣二府大臣同聽賜飛白書或賜宴其後專御邇英也玉海慶歴二年二月丁丑召中丞賈昌朝侍講于邇英閣憲府侍經筵自此始天聖以前講讀官皆坐侍自景祐以來皆立侍皇祐三年九月丁丑詔講讀臣僚立侍敷對餘皆賜坐侍于閣中程顥論經筵事臣竊以人主居崇髙之位持威福之柄百官畏懾莫敢仰視萬方承奉所欲隨得茍非知道畏義所養如此其惑可知中常之君無不驕肆英明之主自然滿假此自方同患治亂所繫也故周公告成王稱前王之徳以寅畏祗懼為首從古以來未有不尊賢畏相而能成其聖者也皇帝陛下未親庶政方專問學臣以為輔養聖徳莫先寅恭動容周旋當主于此嵗月積習自成聖性臣竊聞經筵臣寮侍者皆坐而講者獨立于禮為悖欲乞今後時令坐講乃與義理為順所以養主上尊儒重道之心取進止經筵前一日進講義自元豐元年陸佃始宋史禮志元祐二年九月經筵講論語徹章賜宰臣執政經筵官宴于東宮帝親書唐人詩分賜之玉海元祐二年侍讀蘇頌請詔史官學士録新舊唐書日進數事十一月壬申詔經筵官非講讀日進漢唐故事二條言行録程伊川在經筵當進講必宿齋豫戒潜思存誠以感動上心哲宗幼冲正叔以師道自居每侍上講色甚莊繼以諷諫上畏之正叔曰吾以布衣為上師傅其敢不自重一日講讀罷未退上忽起憑檻折柳枝伊川進曰方春發生不可無故摧折文潞公與呂范諸公入侍經筵聞伊川講説相與歎曰真侍講也程頤論經筵第一劄子臣伏觀自古人君守成而致盛治者莫如周成王成王之所以成徳由周公之輔養昔者周公輔成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者亦必延明徳端方之士與之居處使之薰染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得于天禀而輔養之道不可不至所謂輔養之道非謂詔告以言過而後諫也在涵養薰陶而已大率一日之中親賢士大夫之時多親寺人宮女之時少則自然氣質變化徳器成就欲乞朝廷慎選賢徳之士以侍勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝習讀之暇游息之間時於内殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通逹比之常在深宮之中為益豈不甚大竊聞間日一開經筵講讀數行羣官列侍儼然而退情意畧不相接如此而責輔養之功不亦難乎今主上幼冲太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大抵與近習處久熟則生䙝慢與賢士大夫處乆熟則生愛敬此所以養成聖徳為宗社生靈之福天下之事無急於此取進止論經筵第二劄子臣聞三代之前人君必有師傅保之官師道之教訓傅傅其徳義保保其身體後世作事無本知求治而不知正君知規過而不知養徳傅徳義之道固已踈矣保身體之法復無聞焉伏惟太皇太后陛下聰明睿哲超越前古皇帝陛下春秋之富輔養之道當法先王臣以為傳徳義者在乎防見聞之非節嗜欲之過保身體者在乎適起居之宜存畏慎之心臣欲乞皇帝左右扶侍祗應宮人内臣並選年四十五已上厚重小心之人服用器玩皆湏樸質一應乖巧奢麗之物不得至於上前要在侈靡之物不接於目淺俗之言不入於耳及乞擇内臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之有剪桐之戲則隨事箴規違持養之方則應時諫止調䕶聖躬莫過於此取進止蕙田案程子經筵二劄子於涵養主徳啟沃君心之道可謂反覆詳盡千古之通義也宋史髙宗本紀建炎四年八月甲戌詔侍從官日一員輪直進故事闗治體者玉海建炎四年八月四日謝克家請講日輪侍侍從進前代本朝故事渉治體者三事十八日綦崇禮奏命講讀翰林學士兩省官進之九月三日令講筵置歴紹興二年胡安國侍讀專講春秋時講官四人援例乞各專一經上曰他人通經豈安國比不許孝宗隆興元年十一月詔學士院經筵官日以二員宿直系年録淳熙七年講筵讀三朝寳訓終篇史浩奏曰陛下雙日御前後殿與宰執裁决又引臣寮班對日旰方罷隻日又御講筵依故事讀數百言恐勞聖躬上曰朕樂聞謨訓雖隻日休暇亦當特坐自是講讀上必注目傾耳率漏下十刻方罷朱熹乞不以假故逐日進講劄子臣伏見􅃇制每遇隻日早晚進講及至當日或值假故即行權罷又案故事將來大寒大暑亦係罷講月分恭聞陛下天性好學晨夕孜孜雖處深宮必不暇逸但臣誤蒙選擇以經入侍固當日有獻納以輔聖志今乃淹旬累月不得修其職業素餐之制實不自安故嘗面奏暇日無事正宜進講已蒙聖慈俛賜嘉納今已兩日未見施行因省昨來所陳似亦未至詳悉今别具奏欲乞聖明特降睿㫖今後除朔望旬及過宮日外不以寒暑雙隻月日諸色假故並令逐日早晚進講内有朝殿日分伏恐聖躬久坐不無少勞却乞權住當日早講一次庶幾藏修遊息無非典學之時聖徳日躋天下幸甚取進止輟耕録天歴初建奎章閣于西宮興聖殿之西廊為屋三間髙明敞爽南間以藏物中間諸官入直所北間南向設御座左右列珍玩命羣玉内司掌之閣官署御初名奎章閣階正三品𨽻東宮屬官後文宗復位乃陞為奎章閣學士院階正二品置大學士五員並知經筵事侍書學士二員承制學士二員供奉學士二員並兼經筵官幕職置㕘書二員典籖二員並兼經筵㕘贊官照磨一員内掾四名内二名兼檢討宣使四名知印二名譯史二名典書四名屬官則有羣玉内司階正三品置監羣玉内史一員司尉一員亞尉二員典簿一員令史二名典吏二名司鑰二名司膳四名給使八名專掌袐玩古物藝文監階正三品置太監兼檢校書籍事二員少監同檢校書籍二員監丞㕘檢校書籍事二員或有兼經筵官者典簿一員照磨一員令史四名典吏二名專掌書籍鍳書博士司階正五品置博士兼經筵㕘贊官二員書吏一名專一鍳辨書畫授經郎階正七品置授經郎兼經筵譯文官二員專一訓教集賽官大臣子孫藝林庫皆從六品置提典一員大使一員副使一員司吏二名庫子一名專一收貯書籍廣成局階從七品置大使一員副使一員直長二員司吏二名專一印行祖宗聖訓及國制等書特恩創製象齒小牌五十上書奎章閣三字一面字一面蒙古字與輝和爾字分散各官縣佩出入宮門無禁學士院凡與諸司往復惟劄送㕘書㕔行移而已命侍讀學士虞集撰記御書刻石閣中今改奎章曰宣文元史黄溍傳溍兼經筵官執經進講者三十有二帝嘉其忠數出金織文叚賜之額琳沁巴勒傳額琳沁巴勒以御史大夫知經筵事經筵進講必詳必慎故每讀譯文必被嘉納蕙田案元之文宗可稱右文然其時奎章閣諸臣如虞伯生歐陽原功揭曼碩黄晉卿軰廼一時能文之士以檢校圖籍等事為上所寵禮與古啟心沃心之道殊矣王圻續通考太祖既有􅄔州遂分置中書省召儒士許瓊葉瓚胡翰吳沈汪仲山李公常金信徐孽童義戴良呉復張敬起孫履等皆會食中書日召二人進經史敷陳治道此論道講學之始乙巳春正月上御端門論及黄石公三略且口釋之起居注宋濓對曰尚書二典三謨帝王大經大法靡不畢具願主上留意講明上曰吾非不知典謨為政治之要但三略乃用兵攻取時務所先耳是日遂命濓以尚書進講是年始置博士㕔令博士許存仁等日講尚書等書及改元洪武之初每令文學侍從之臣於御前講説經史無定日亦無定所既而設華蓋文華武英等殿説書以儒士沈徳等為之未幾改翰林官及殿閣大學士專其事遂罷説書然每進講必反復討論以求通義理之極講畢必議及政事以為常洪武三年庚戌春二月上御東閣命學士宋濓待制王禕進講大學傳之十章濓等反覆解説至有土有人上諭之曰人者國之本徳者身之本徳厚則人懐人懷則國固故人主有仁厚之徳則人歸之如父母人心歸則有土有財自然之理也若徳不足以懷衆雖有財亦何用哉十六年癸亥秋八月上御謹身殿命東閣大學士吳沈等進講周書立政至罔有立政用憸人上歎曰有小人必敗君子故唐虞任禹稷必去四凶魯用仲尼必去少正卯沈進曰小人懷奸甚似忠信不可不察上曰然十八年甲子秋九月上御華蓋殿大學士朱善以周易進講至家人卦上歎曰齊家治國其理無二使一家之間長幼内外各盡其分事事循理則一家治矣一家既治達之一國以至天下亦舉而措之耳朕觀其要只在誠實而有威嚴誠則篤親愛之恩嚴則無閨門之失善對曰誠如聖諭又一日御華蓋殿召善進講心箴畢上曰人心道心有倚伏之機蓋仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧偽之心伏常持此心不為情欲所蔽至公無私自無物我之累耳成祖永樂二年甲申夏六月朔御文華殿大學士楊士竒以大學講義進上覽其文善之因諭之曰帝王之學貴切己實用講説之一切浮泛無益之語勿用且先儒謂克明峻徳一章一部大學皆具士竒對曰堯舜禹湯文武數聖人凡修諸躬施于家國天下者皆大學之理誠聖學所當先務是年秋八月學士觧縉以大學正心章講義進上覽之因諭縉等曰人君誠不可有所好樂一有好樂流而不返則欲必勝理若心能静虚事來則應事去則忘如明鏡止水自然純是天理朕每退朝默坐未嘗不思管束此心為切要思為人君但于宮室車馬服食玩好無所増加則天下自然無事矣命翰林春坊諸臣分撰諸經講義與閣臣再閲有未當處悉與改正然後呈講乃以觧縉屬書胡廣屬詩金幼孜屬春秋楊士竒屬易其義有疑必召四人辨析暢而後已宣宗宣徳二年丁未春二月己酉御文華殿召翰林進講離婁篇至二老歸文王章問曰伯夷太公皆處東海而歸文王及武王伐紂太公佐之伯夷叩馬而諌所見何以不同講官對曰太公以救民為心伯夷以君臣為重上曰太公之心在當時伯夷之心在萬世無非為天下生民也觀承案太公之心在當時伯夷之心在萬世宣宗此語可謂深知兩聖人之心然即此校之而伯夷之品終在太公之上可知矣孟子舉三聖人必以伯夷為首而六百年前之伊尹亦不得先之其亦此意也歟三年戊申春二月進講舜典上曰觀二典三謨則知萬世君臣為治之道不出乎此歴象日月星辰以閏月定四時天道以明治水土奠髙山大川别九州任土作貢地道以成克明峻徳以至協和萬邦人道以建九官十二牧所掌禮樂刑政養民之道後世建官繁簡雖不同要不出乎此當時君臣都俞吁咈更相告戒用圖治功氣象藹然何後世之不能及講臣對曰明良相逢故治化之盛如此上又曰天生聖人為後世法孔子刪書斷自唐虞使人知有堯舜所謂萬世帝王之師也是年冬十月庚寅進講春秋上曰聖人匡世之功憂世之心備見此書當時先王禮樂法度日以隳廢亂臣賊子接迹而起有此書而後天下知尊周又曰孔子作此書以尊周為本孟子乃以王天下勸齊梁之君何也對曰孔子之時天下猶知宗周孟子之時不復知有周矣上曰聖賢之心實為天下生民計孟子時不有王者興何以觧生民之塗炭因命左右出莱茗以賜講官王氏圻曰宣徳以前每視朝畢無日不御文華殿或便殿召大臣及諸儒臣講經書咨政事時經筵未有開也殿閣詞林記云洪武中令儒臣更畨入禁中每日輪一員進講侍直誤者罪之如大學士吳沉嘗坐進講遲誤被劾永樂以後多渥典自設經筵後講官不復入直惟令翰林及春坊經局等官相輪侍班久之選為展書官又自展書乃得充月講官若日講則用年資深而品秩尊者又云祖宗時講官于講書後得言時政闕失及陳論所見成祖寳訓云上視朝之暇輙召儒臣至便殿閲書史或召翰林儒臣講詢永樂以後蓋莫不然蕙田案據此則明代日講官之外又有月講官英宗正統元年春二月始開經筵遂命禮部翰林院詳定講筵禮儀著為制時上以幼冲嗣位大學士楊士竒等奏云去年十月宣宗皇帝御左順門召臣士竒軰諭之曰明年春暖東宮出文華殿講書凡内外侍從慎擇賢良亷謹之臣未幾不幸先帝上賓臣未敢遽言此事至重不敢久黙今山陵事畢乞早開經筵以進聖學預命禮部吏部翰林院公同慎擇講官必學問貫通言行端正老成重厚識逹大體者以供其職又曰天子就學其事體與皇太子親王不同乞先命禮部翰林院詳定講筵禮儀制曰是以今月初九十九日御經筵爾翰林春坊儒臣分直侍講乃命太師英國公張輔知經筵事少傅兵部尚書兼華蓋殿大學士楊士竒少傳工部尚書兼謹身殿大學士楊榮禮部尚書兼學士楊溥同知經筵事詹事府少詹事兼侍讀學士王直少詹事兼侍講學士李時勉錢習禮陳循侍讀苗衷侍講髙榖修撰馬愉曹鼐兼經筵官仍賜宴及金幣有差遂為定制續定經筵儀注每月三日日以逢二為期嵗率以二八月中旬起四十月末旬止用勲臣一人知經筵事内閣大學士一二人同知經筵事六部尚書左右都御史通政司大理寺卿及學士等官侍班翰林院春坊等官及國子監祭酒二員進講二員展書給事中御史各二員侍儀鴻臚寺錦衣衞堂上官各一員供事又鳴贊一員贊禮序班四員舉案侯伯各一人領將軍侍衞先期直殿中官于文華殿設御座及設御案于御座之東稍南講案于御案之南稍東是日早司禮監官先陳所講四書經史各一冊置御案又各一冊置講案先四書東經西史先期輪講官撰四書經或史講章各一篇預置于冊内是日早上御奉天門早朝畢退御文華殿陞御座將軍侍衞如儀鴻臚寺官引知經筵及侍班講讀執事侍儀等官于丹陛上行五拜三叩頭禮畢以次上殿依品級東西序立知經筵官序于侍班官上侍儀御史給事中各二員于殿内之南分東西北向立序班二員舉御案置御座前二員舉講案置御座之南正中鴻臚官贊進講講官一員從東班出一員從西班出詣講案前稍南北向並立鴻臚寺官贊鞠躬拜叩頭興平身畢展書一員從東班出進詣御案前跪展四書畢起退立于御案之東稍南講官一員進講詣御前立奏講某書講畢稍退展書官復詣御案前跪掩四書畢退就東班又展書官一員從西班出進詣御案前跪展經畢起退立于御案之西稍南講官一員進至講案前立奏或某經或某史畢少退仍展書官復詣御案前跪掩書畢退就西班鴻臚寺贊講官鞠躬拜叩頭興平身禮畢各退就東西班序班二員舉講案退置原所鴻臚寺官贊禮畢命賜宴鴻臚寺等官及講官皆跪承㫖光禄寺官設宴于左順門宴畢叩頭出正統初立制如此天順八年秋八月即位遂開經筵日講期如舊每兩人一書一經講章皆預呈内閣轉付中書繕録正副各一紙先日進司禮監官奏知先一晚于文華殿内寳座地平之南設香鶴香爐左右各一于左香爐之東稍南設御案講案各一皆西向案上各置所講二書以夾講章各壓以金尺一副至期早朝近侍内臣及知經筵官并内閣大學士及講官六部尚書都御史大理卿通政使鴻臚卿錦衣指揮使及四品以上寫講章官俱綉金緋袍其展書翰林官侍儀御史給事中序班鳴贊等俱金繡服朝畢駕起御文華殿皆随之大漢將軍凡二十名導駕至左順門上退易冠帶便服其侯伯或一人服金繡蟒衣仍領將軍趨越衆官進左順門皆分班綴行立文華殿外俟傳宣云進來則將軍先入殿内負東西墻立諸官陞陛鴻臚寺卿贊入班行禮畢以次分由殿東西門入重班立指揮則立西一班末稍前御史給事中序班六員分于中門左右北向立序班二人舉御案進上二人舉講案置中鳴贊唱進講講官各出班立講案前展書官二員出班對立鳴贊唱講官並行視興東展書官進至地平膝行詣御案展四書官亦稍前近案俟展書官復位乃先説講某書然後申講講畢掩書稍退後原展書官仍如儀進掩書復位西展書官與講經官進退俱如前儀講畢仍並行禮各回班序班各撤案置舊所鴻臚寺卿中跪奏禮畢上命官人每喫酒飯各官跪承㫖興以次出丹陛仍行禮乃出左順門宴以官叙惟學士之坐立則序于鴻臚卿及四品以上寫講章官及展書官坐立亦序于四品以下重職事也雙槐嵗抄景皇帝時每講畢命中官布錢于地令講官拾之以為恩典髙榖年老俯伏不便恒莫能得一講官拾以遺之識者病其媟凟孝宗𢎞治元年戊申春三月十二日開經筵賜學士程敏政等宴及白金寳鏹次日上御文華殿後進講尚書孟子及午進講大學衍義以為常講畢賜茶上皆呼先生而不名自是四月二十八日五月二十九日七月二十日皆盛暑不廢云時上最嗜經筵親儒臣學士張元禎矮小每進講上俯几聽之十四年辛酉夏四月開經筵又改初四日逢二㑹講定期也是月之初二日當㑹講以享太廟有㫖改初三至期遇雨又改初四日蓋孝宗務學之勤不以事而廢如此十七年甲子秋九月三十日召李東陽劉健等至煖閣先是上御經筵罷因聽所講義退思之有得及是亟召東陽等至謂之曰劉機講陳善閉邪陳字改做陳説不是止云敷陳其説乃可耳劉健因進言昨説以善道啟沃他他字不是上笑曰他字也不妨大抵講書湏要明白透徹直言無諱道理皆是書上原有的不是纂出若不説盡也無進益且先生輩與翰林院是輔導之職皆所當言謝遷對曰聖明如此講官愈好盡心李東陽對曰今年聖學緝熙中外臣民無不仰戴臣等敢不仰承聖意孝宗因諭之曰先生可傳與他不必顧忌耳尋謂他字亦不妨蓋舊者多寓諛詞至是經筵知上意嚮每講必加以規諌而亦未嘗少忤云觀承案經筵日講比視學尤重視學固可以鼓舞人心昌明正學經筵日講乃所以切磨經訓輔成聖徳也然湏愷切感動方為有益孝宗此諭可謂有實心求道之意矣昭代典則正徳二年春上御經筵講書故事講觧書義畢必獻規諫之語是日詹事楊廷和學士劉忠直講既罷上謂劉瑾曰經筵講書耳何書外添出許多説話瑾與廷和等皆舊東宮官奏曰此二人當打發南京去陞二人南京侍郎是時南京無缺皆添註之雖若逺之實陞之也王圻續通考世宗嘉靖二年八月御文華殿召講臣至首揭書經君子所其無逸章繼而講康誥惟民康乂章召誥顧畏民巖章孟子踐形章理義悦心章被袗衣鼓琴章君子反經章是日上御黼座横經俯詢虚心聽納如此他日講官劉龍進孟子至誠章上批曰龍于至誠能動乃云邇者黄河清是至誠之騐也未免近謟但其末云謙以履盈約以保泰此二句却好又講官倫以訓進論語陽膚為士師講義上批云以訓講哀矜勿喜云是慈悲憐憫夫慈悲二字是釋氏之教也講官魏校進書經罪疑惟輕章講説上批云桂萼薦校善講義朕觀其講章並未有過人者且其前後率多諛詞難居近侍着吏部調南京用之十二年癸巳夏五月召講官廖道南進講論語髙宗諒陰以下三句又明日進講大學衍義時汪鋐為吏部尚書懇祈大學士張孚敬改題以其有君薨聽于冡宰句也道南執不肯孚敬遂具揭帖以進世宗批云覽卿等奏朕已悉舊日講官徐縉講孟敬子撤去二節人之將死死生人道之常何諱之有如卿等言則忠讜之論何由得聞還着道南照舊進講明日道南講畢進説云按説命夢帝賚予良弼其代予言又云其惟不言言乃雍即是以觀古之人君心純乎孝故宅憂而不暇于有言古之人臣心純乎忠故攝政而不嫌于代言然必有髙宗之聖而後可以用傅説之言必有傅説之賢而後可以輔髙宗之徳不然則莽操懿温之流又將以冡宰藉口于千萬世矣孚敬聞之出謂鋐曰講官欲中傷之又明日進講大學衍義許敬宗立武昭儀章及李林甫嫉李邕章楊國忠比李輔國章元載䧟顔真卿章盧杞嫉張鎰章李逢吉去王守澄章江充害戾太子章孚敬滋不悦明年秋七月三日輪顧鼎臣席春進講時鼎臣飲于所識者因大醉悞期明日鼎臣懼罪向孚敬説孚敬為請因反㕘道南及蔡昂不行代講遂謫道南于徽州昻湖州蓋為鋐反噬也未幾皆召還神宗二年定春講以二月十二起至五月初二日止秋講以八月十二日起至十月初二日止不必題請日講儀講官凡四員日輪二員先大學衍義次貞觀政要二書皆不用講章惟各以黄票書所起止預進先日内臣設御案于文華殿後穿堂中以二書并起止置案上至日早朝畢四講官同内閣隨駕入至殿内來日二講官授二臣以來日起止直講官俟召乃入穿堂門内行禮分班北向前後立東班當講者詣御案前内侍授以牙籖左右執之且指且講書則向上初展後掩皆屬内侍講畢完籖復位西班當講者乃進講悉如東儀講畢上諭先生喫酒飯皆跪承㫖行禮禮前後皆一拜三叩頭出宴于文華門外西廡禁中謂之小經筵或謂之小講云明㑹典凡講日上御文華穿殿止用講讀官内閣大學士侍班不用侍衞侍儀執事等官侍班講讀等官入見行叩頭禮東西分立先讀四書次讀經或讀史每本讀十數遍直講官先講四書次講經或講史務要直説大義明白易曉講讀後侍書官侍上習書畢各官叩頭退每三日一温講將前所講書通講一遍若講官中有事故同列代講其直講則講畢補進蕙田案明神宗三年閣臣以史職曠廢議開館局以東西十館宻邇朝堂紀述為便乃以東館近上四所令史臣分直其中一起居二吏户三禮兵四刑工日輪日講官一員專記起居兼録聖諭詔勅冊文其六曹章奏則選史官中年深而文學素優者六人分纂因定常朝御門日記注起居官及史官侍班之制日講官繫起居注銜自此始也講大學衍義儀嘉靖六年定每月初三初八十三十八日用經筵日講官二員進講内閣學士一員侍班講畢賜茶賜酒飯俱如日講儀無逸殿講儀嘉靖十年定先一日司禮監官于無逸殿設御座御案及講案如文華殿日講之儀是日質明上具常服乗輦至無逸殿門衆官于門外迎候上降輦乗版輿至殿内降輿陞御座鴻臚寺官贊各官于殿門外入班行一拜三叩頭禮畢進八殿内各照品級東西序立序班二員舉御案置御座前二員舉講案置殿門内西邊東向設座位鴻臚寺官贊進講講官大學士一員出班行叩頭禮上命賜講官坐講官并鴻臚寺官承㫖贊叩頭訖展書官詣御案前跪展講章退講官坐講畢展書官詣御案前跪掩講章講官叩頭訖復班又大學士一員出班叩頭承㫖坐講展書官一員展書俱如前儀序班二員舉御案二員舉講案退至原所鴻臚寺卿奏禮畢有㫖賜宴衆官承㫖訖退至􅃎風亭前迎候上乗板輿至亭内降輿陞御座賜宴午講儀隆慶六年定每日早各臣及講官講畢各退上進煖閣少憩司禮監將各衙門奏章進上御覽各臣等退西廂房伺候上有所咨問即召至御前將本中事情明白敷奏覽本後閣臣率領正字官恭侍上進字畢若上欲再進煖閣少憇閣臣等仍退至西廂房伺候若不進煖閣閣臣等即率講官再進午講講通鑑節要通鑑講完以貞觀政要進講講官務將前代興亡事實直解明白講畢谷退上還宫蕙田案經筵之禮始于宋代所以講明正學涵養徳性預防非幾之萌沉潛道義之奥故論者謂經筵之重與宰相等程子所謂人主一日之中親賢士大夫之時多親宦官宮妾之時少自然氣質變化徳器成就其所繫不綦重哉明代于經筵之外别有日講午講諸儀畧相仿彿今並纂輯附于視學之後蓋宫廷之與膠序其地雖不同而承師問道之心則一也右經筵日講五禮通考卷一百七十二
