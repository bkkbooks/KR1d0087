body:
  text: 五禮通考卷八十三刑部尚書秦蕙田撰吉禮八十三宗廟制度元史世祖本紀中統二年九月庚申朔詔以呼圖克哈齋為中書省署奉遷祖宗神主於聖安寺祭祀志辛巳藏於瑞像殿世祖本紀中統四年三月癸卯初建太廟祭祀志至元元年冬十月奉安神主于太廟初定太廟七室之制皇祖皇妣第一室皇伯考伯妣第二室皇考皇妣第三室皇伯考伯妣第四室皇伯考伯妣第五室皇兄皇后第六室皇兄皇后第七室凡室以西為上以次而東蕙田案是年世祖入都於燕世祖本紀至元三年十月太廟成丞相安圗巴延言祖宗世數尊諡廟號増祀四世各廟神主配享功臣法服祭器等事皆宜定議命平章政事趙璧等集羣臣議定為八室祭祀志至元三年秋九月始作八室神主設祏室冬十月太廟成趙璧等集議製尊諡廟號定為八室烈祖神元皇帝皇曽祖妣宣懿皇后第一室太祖聖武皇帝皇祖妣光獻皇后第二室太宗英文皇帝皇伯妣昭慈皇后第三室皇伯珠徹皇伯妣布屯綽克黙色第四室皇伯考察哈岱皇伯妣伊蘓婁第五室皇考睿宗景襄皇帝皇妣荘聖皇后第六室定宗簡平皇帝欽淑皇后第七室憲宗桓肅皇帝貞節皇后第八室十一月戊申奉安神主於祏室嵗用冬祀如初禮神主至元三年始命太保劉秉中考古制為之髙一尺二寸上頂圓徑二寸八分四廂合剡一寸一分上下四方穿中央通孔徑九分以光漆題尊諡於背上匱趺底蓋俱方底自下而上蓋從上而下底齊趺方一尺厚三寸皆凖元祐古尺圖主及匱趺皆用栗木匱趺並用𤣥漆設祏室以安奉帝主用曲几黄羅帕覆之后主用直几紅羅帕覆之祏室每室紅錦厚褥一紫錦薄褥一黄羅覆帳一龜背紅簾一緣以黄羅帶飾祝有二祝冊親祀用之製以竹毎副二十有四簡貫以紅絨條面用膠粉塗飾背飾以絳金綺藏以楠木縷金雲龍匣塗金鎖鑰韜以紅錦囊蒙以銷金雲龍絳羅複擬撰祝文書祝讀祝皆翰林詞臣掌之祝版攝事用之制以楸木長二尺四寸廣一尺二寸厚一分其面背飾以精潔楮紙祝文至元時享於太祖室稱孝孫嗣皇帝臣某睿宗室稱孝子嗣皇帝臣某幣以白繒為之毎叚長一丈八尺牲齋庶品大祀馬一用色純者有副牛一其角握其色赤有副羊其色白豕其色黒鹿凡馬牛羊鹿牲體毎室七盤單室五盤太羮毎室三登和羮毎室三鉶籩之實毎室十有二品豆之實毎室十有二品凡祀先期命貴臣率獵師取鮮獐鹿以供脯臡醓醢稻粱為飯每室二簠黍稷為飯每室二簋彛尊之實毎室十有一明水𤣥酒用隂鑑取水於月鬯用鬱金為之五齊三酒醖於光祿寺天鵞野馬塔爾巴噶其状如獾野雞鶬黃羊呼濟爾其状如鳩潼乳葡萄酒以國禮割奠皆列室用之羊一豕一籩之實二栗鹿脯豆之實二菁葅鹿臡簠之實黍簋之實稷爵尊之實酒皆七祀位各用之祭器籩十有二冪以青巾巾繒綵雲豆十有四一實毛血一實膟膋登三鉶三有柶簠二簋二有匕箸俎七以載牲體皆有鼎後以盤貯牲體盤置俎上鼎不用香案一銷金絳羅衣銀香鼎一銀香奩一茅苴盤一實以沙已上並陳室内燎爐一實以炭篚一實以蕭蒿黍稷祝案一紫羅衣置祝文于上銷金絳羅覆之雞彛一有舟鳥彛一有舟加勺春夏用之斚彛一有舟黄彛一有舟加勺秋冬用之虎彛一有舟蜼彛一有舟加勺特祭用之凡雞彛斚彛虎彛以實明水鳥彛黄彛蜼彛以實鬯犠尊二象尊二春夏用之著尊二壺尊二秋冬用之太尊二山尊二特祭用之尊皆有坫勺冪以白布巾巾繒黼文著尊二山罍二皆有坫加冪已上並陳室外壺尊二太尊二山罍四皆有玷加冪藉以莞席並陳殿下北向西上設而不酌毎室皆同通廊御香案一銷金黄羅衣銀香奩一貯御祝香銷金帕覆之並陳殿中央罍洗所罍二洗二一以供爵滌一以供盥潔篚二實以璋瓚巾塗金銀爵七祀神位籩二豆二簠一簋一俎一爵一有坫香案一沙池一壺尊二有坫加冪七祀皆同罍一洗一篚一禮樂志至元三年初用宮縣登歌樂文武二舞於太廟先是東平萬户嚴光範奏太常登歌樂器樂工已完宫縣樂文武二舞未備凡用人四百一十二請以東平漏籍户充之合用樂器官為置備制可命中書省臣議行于是中書命左三部太常寺少府監於興禪寺置局委官楊天祐太祝郭敏董其事省臣言太廟殿室向成宫縣樂器咸備請徴東平樂工赴京師肄習以俟享廟制可冬十有一月有事於太廟宫縣登歌樂文武二舞咸備其迎送神曲曰來成烈祖曰開成太宗曰文成皇伯考珠齊曰弼成皇伯考察哈岱曰協成睿宗曰明成定宗曰熈成憲宗曰威成初獻升降曰肅成司徒奉俎曰嘉成文舞退武舞進曰和成亞終獻酌獻曰順成徹豆曰豐成文舞曰武定文綏之舞武舞曰内平外成之舞世祖本紀至元八年二月庚申奉御玖珠舊以梳櫛奉太祖奉所落鬚髪束上詔櫝之藏于太廟夾室九月太廟殿柱朽壊監察御史劾都水劉晸監造不敬晸以憂死張易請先期告廟然後完葺從之祭祀志八年八月太廟柱朽從張易言告於列室而後修奉遷栗主金牌位與舊神主于饌幕殿工畢奉安自是脩廟皆如之十二年五月檢討張謙呈昔者因修太廟奉遷金牌位于饌幕殿設以金椅其栗主却與舊主牌位各貯廂内安置金椅下禮有非宜今擬合以金牌位遷于八室内其祏室栗主宜用綵輿遷納舊主并牌位安置于箱為宜九月丁丑勅太廟牲復用牛十月己未遷金牌位于八室内太祝兼奉禮郎申屠致逺言竊見木主既成又有金牌位其日月山神主及中統初中書設祭神主安奉無所博士議曰合存祏室栗主舊置神主牌位俱可隨時埋瘞不致神有二歸太常少卿以聞制曰其與張仲謙諸老臣議行之十四年八月乙丑詔建太廟于大都博士言古者廟制率都宫别殿西漢亦各立廟東都以中興崇儉故七室同堂後世遂不能革王圻續通考十四年東平趙天麟策畧曰天子立七廟在都内之東南太祖中位乎北三昭在東三穆在西廟皆南向主皆東向都宫周于外以合之牆宇建于内以别之門堂室寝一一分方庭砌堂除區區異地山節藻棁以示崇髙重檐列楹以示嚴肅斵礱其角以示麗而不奢覆之用茅以示儉而有節此蓋廟之制度也祖功宗徳百世不易親盡之廟因親而祧祧舊主于太祖之夾室祔新主于南廟之中室昭以取其向明而自班乎昭焉穆以取其深逺而常從其穆焉穆祔而昭不動昭祔而穆不遷二世祧則四遷於二世而六世遷于四世以八世袝昭之南廟矣三世祧則五世遷于三世而七世遷于五世以九世祔穆之南廟矣孫以子祔于祖父孫可以為王父尸由其昭穆之同非有尊卑之辨故祧主既藏祫則出餘則否祔廟貴新易其檐改其塗此蓋廟之祧祔也散齋七日致齋三日牲牷肥腯㫖酒嘉栗粢盛豐潔器皿具備衣服既鮮水火又明祠宜羔豚膳膏薌禴宜腒䐹膳膏臊嘗宜犢麛膳膏腥烝宜鱻羽膳膏羶設守祧所掌之遺衣陳奕世遞傳之宗器王后及賓禮成九獻辟公卿士奔執豆籩此葢廟之時祭也太祖廟主循常東面移昭南穆北而合食就已毁未毁而制禮四時但陳未毁而祭之五年兼其已毁而祭之此葢廟之祫祭也三年大祭祭祖之所出以始祖配之此葢廟之禘祭也伏望陛下斷出天𠂻力行古道一新太廟之儀章嚴接春秋之祭祀則上下和恱朝野無虞尚有干名犯分故投寛網之民哉蕙田案天麟詞約而義賅可謂精於考禮者矣惟五年一祫三年一禘尚仍舊說元史祭祀志十五年五月九日太常卿還自上都為議廟制據博士言同堂異室非禮以古今廟制畫圖貼說令博士李天麟齎徃上都分議可否以聞一曰都宫别殿七廟九廟之制祭法云天子立七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩晉博士孫毓以謂外為都宫内各有寝廟别有門垣太祖在北左昭右穆以次而南是也前廟後寝者以象人君之居前有朝而後有寝也廟以藏主以四時祭寝有衣冠几杖象生之具以薦新物天子太祖百世不遷宗亦百世不遷髙祖以上親盡則遞遷昭常為昭穆常為穆同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各全其尊必祫享而會於太祖之廟然後序其尊卑之次葢父子異宫祖禰異廟所以盡事亡如事存之義然漢儒論七廟九廟之數其說有二韋𤣥成等以謂周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七也如劉歆之說則周自武王克商以后稷為太祖即増立髙圉亞圉二廟于公叔太王王季文王二昭二穆之上已為七廟矣至懿王時始立文世室于三穆之上至孝王時始立武世室于三昭之上是為九廟矣然先儒多是劉歆之說二曰同堂異室之制後漢明帝遵儉自抑遺詔無起寝廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆用同堂異室之制先儒朱熹以謂至使太祖之位下同孫子而更僻處於一隅無以見為七廟之尊羣廟之神則又上厭祖考不得自為一廟之主以人情論之生居九重窮極壯麗而設祭一室不過尋丈甚或無地以容鼎俎而陰損其數子孫之心于此宜亦有所不安矣且如命士以上其父子婦姑猶且異處謹尊卑之序不相䙝凟况天子貴為一人富有四海而祖宗神位數世同處一堂有失人子事亡如事存之意矣蕙田案兩條明正無疵廟制至元十七年新作于大都前廟後寝正殿東西七間南北五間内分七室殿陛二成三階中曰泰階西曰西階東曰阼階寝殿東西五間南北三間環以宮城四隅重屋號角樓正南正東正西宫門三門各五間皆號神門殿下道直東西神門曰横街直南門曰通街甓之通街兩旁井二皆覆以亭宫城外繚以崇垣饌幕殿七間在宫城南門之東南向齊班㕔五間在宫城之東南西向省饌殿一間在宫城東門少北南向初獻齋室在宫城之東東垣門内少北西向其南為亞終獻司徒大禮使助奠七祀獻官等齋室皆西向雅樂庫在宫城西南東向法物庫儀鸞庫在宫城之東北皆南向都監局在其東少南西向東垣之内環築牆垣為别院内神厨局五間在北南向井在神厨之東北有亭酒庫三間在井亭南西向祠祭局三間對神厨局北向院門西向百官厨五間在神厨院南西向宫城之南復為門與中神門相值左右連屋六十餘間東掩齋班㕔西值雅樂庫為諸執事齋房築崇墉以環其外東西南開櫺星門三門外馳道抵齊化之通衢十二月甲申告遷于太廟癸巳承㫖和爾果斯太常卿達春托果斯等以祏室内栗主八位并日月山板位聖安寺木主俱遷甲午和爾果斯太常卿色勒敏率百官奉太祖睿宗二室金主于新廟安奉乙未毁舊廟十八年二月博士李時衍等議歴代廟制俱各不同欲尊祖宗當從都宫别殿之制欲崇儉約當從同堂異室之制三月十一日尚書叚諾海及太常禮官奏曰始議七廟除正殿寝殿正門東西門已建外東西六廟不須更造餘依太常卿新圖建之遂為前廟後寝廟分七室世祖本紀十九年二月修宫城太廟二十一年三月丁卯太廟正殿成奉安神主祭祀志二十一年九月廟室挂鐵網釘鏨籠門告成世祖本紀至元二十二年十二月己未丹太廟楹二十三年九月乙丑以太廟雨壊遣鴻吉喇岱致告奉安神主别殿禮樂志二十三年呼圗克伊蘓又奏太廟樂器編鐘笙匏嵗久就壊音律不協遂補鑄編鐘八十有一合律者五十造笙匏三十有四祭祀志二十四年二月翰林院言舊院屋敝新院屋纔六間三朝御容宜于太常寺安奉後仍遷新院世祖本紀二十五年五月丁未奉安神主于太廟三十一年四月皇孫至上都甲午即皇帝位五月戊午遣攝太尉鄂都岱奉冊上尊諡曰聖徳神功文武皇帝廟號世祖禮樂志三十一年世祖裕宗祔廟命大樂署編運曲譜舞節翰林定譔樂章世祖室曰混成之曲裕宗室曰昭成之曲祭祀志三十一年成宗即位追尊皇考為皇帝廟號裕宗成宗本紀大徳六年五月戊申太廟寝殿災武宗本紀大徳十一年五月即位于上都六月丁酉中書右丞相哈喇哈遜達爾罕左丞相塔喇海言臣等與翰林集賢太常老臣集議皇帝嗣登寳位詔追尊皇考為皇帝皇考大行皇帝同母兄也大行皇帝祔廟之禮尚未舉行二帝神主依兄弟次序祔廟為宜今宜請諡皇考昭聖衍孝皇帝廟號順宗大行皇帝曰欽明廣孝皇帝廟號成宗太祖之室居中睿宗西第一室世祖西第二室裕宗西第三室順宗東第一室成宗東第二室先元妃鴻吉哩氏實哩達喇宜諡曰真慈静懿皇后祔成宗廟室制曰可九月壬申命塔喇海奉玉冊玉寳上皇考及大行皇帝尊諡廟號又上先元妃鴻吉哩氏尊諡祔于成宗廟室禮樂志大徳十一年武宗即位九月順宗成宗二室祔廟下大樂署編運曲譜舞節翰林譔樂章順宗室曰慶成之曲成宗室曰守成之曲胡氏粹中曰睿宗裕宗順宗皆未嘗居天子位但當祔食于所出之帝而各為立廟已非禮矣况成宗為君時順宗為臣豈有依次陞祔而躋順宗於成宗之上者乎失禮之中又失禮焉哈喇哈遜何偉諸臣何能逃其責乎武宗本紀至大二年十月立太廟廪犧署設令丞各一員十二月上太祖聖武皇帝尊諡廟號及光獻皇后尊諡又上睿宗景襄皇帝尊諡廟號及荘聖皇后尊諡執事者人陞散階一等賜太廟禮樂户鈔帛有差祭祀志武宗至大二年十月以将加諡太祖睿宗擇日請太祖睿宗尊諡于天擇日請光獻皇后荘聖皇后尊諡于廟改製金表神主題寫尊諡廟號十二月乙卯奉玉冊玉寳加上太祖聖武皇帝尊諡曰法天啟運廟號太祖光獻皇后曰翼聖加上睿宗景襄皇帝曰仁聖廟號睿宗荘聖皇后曰顯懿其舊制金表神主以櫝貯兩旁自是主皆範金作之如金表之製蕙田案元初考定神主用木最為得禮武宗改用範金自是竊盗之患作矣武宗本紀至大四年春正月庚辰帝崩于玉徳殿夏五月乙未文武百官額森特穆爾等上尊諡曰仁惠宣孝皇帝廟號武宗閏七月丙午祔于太廟禮樂志四年夏六月武宗祔廟命樂正謝世寧等編曲譜舞節翰林侍學士張士觀譔樂章曲名威成之曲仁宗本紀延祐五年十一月敕大永福寺創殿安奉順宗皇帝御容禮樂志延祐七年仁宗祔廟命樂正劉瓊等編運酌獻樂譜舞節翰林譔樂章曲名曰歆成之曲祭祀志延祐七年仁宗升祔増置廟室太常禮儀院下博士檢討歴代典故移書禮部中書集議曰古者天子祭七代兄弟同為一代廟室皆有神主増置廟室又議大行皇帝升祔太廟七室皆有神主増室不及依前代典故權于廟内止設幄座靣南安奉今相視得七廟近南對室地位東西一丈五尺除設幄座外餘五尺不妨行禮乃結綵為殿置武宗室南權奉神主英宗本紀至治元年二月己酉作仁宗神御殿于普慶寺五月辛丑太常禮儀院進太廟制圖祭祀志元年正月乙酉始命于太廟垣西北建大次殿五月中書省臣言以廟制事集御史臺翰林院太常院臣議謹案前代廟室多寡不同晉則兄弟同為一室正室増為十四間東西各一間唐九廟後増為十一宋増室至十八東西夾室各一間以藏祧主今太廟雖分八室然兄弟為世止六世而已世祖所建前廟後寝徃嵗寝殿災請以今殿為寝别作前廟十五間中三間通為一室以奉太祖神主餘以次為室庶㡬情文得宜謹上太常廟制制曰善期以來嵗營之曹元用傳延祐六年授太常禮儀院經歴屬英宗躬修祀事鋭意禮樂其親祀儀注鹵簿輿服之制率所裁定初太廟九室合享于一殿仁宗崩無室可祔乃于武宗室前結綵為次英宗在上京召禮官集議元用言古者宗廟有寝有室宜以今室為寝當更營大殿於前為十五室帝嘉其議授翰林待制陞直學士英宗本紀至治二年正月庚午廣太廟泰定帝本紀至治三年十二月時泰定帝已立盗入太廟竊仁宗及荘懿慈聖皇后金主壬申作仁宗主祭祀志三年春三月戊申祔昭獻元聖皇后于順宗室夏四月六日上都分省參議蘓蘓以都堂㫖太廟夾室未有制度再約臺院等官議定博士議曰案爾雅曰室有東西廂曰廟注夾室前堂周書曰西夾南向注曰西廂夾室此東西夾室之正文也賈公彦曰室有東西廂曰廟其夾皆在序是則夾者猶今耳房之類也然其制度則未之聞東晉太廟正室一十六間東西儲各一間共十有八所謂儲者非夾室與唐貞觀故事遷廟之主藏于夾室西壁南北三間又宋哲宗亦嘗于東夾室奉安後雖増建一室其夾室仍舊是唐宋夾室與諸室制度無大異也五帝不相沿樂三王不相襲禮今廟制皆不合古權宜一時宜取今廟一十五間南北六間東西兩頭二間凖唐南北三間之制壘至棟為三間壁以紅泥以凖東西序南向為門如今室户之制虚前以凖廂所謂夾室前堂也雖未盡合于古于今事為宜六月上都中書省以聞制若曰可壬申勅以太廟前殿十有五間東西二間為夾室南向秋七月辛卯太廟落成俄國有大故晉王即皇帝位十二月戊辰追尊皇考晉王為皇帝廟號顯宗皇妣晉王妃為皇后庚午盗入太廟失仁宗及慈聖皇后神主壬申重作仁廟二金主丙午御史趙成慶言太廟失神主乃古今莫大之變太常禮官不恭厥職宜正其罪以謝宗廟以安神靈制命中書定罪廟制至治三年别建大殿一十五間于今廟前用今廟為寝殿中三間通為一室餘十間各為一室東西兩旁際牆各留一間以為夾室室皆東西横闊二丈南北入深六間毎間二丈宫城南展後鑿新井二于殿南作亭東南隅西南隅角樓南神門東西神門饌幕殿省饌殿獻官百執事齋室中南門齊班㕔雅樂庫神厨祠祭等局皆南徙建大次殿三間于宫城之西北東西櫺星亦南徙東西櫺星門之内鹵簿房四所通五十間呉澄傳至治末詔作太廟議者習見同堂異室之制乃作十三室未及遷奉而國有大故有司疑于昭穆之次命集議之澄議曰世祖混一天下悉考古制而行之古者天子七廟廟各為宫太祖居中左三廟為昭右三廟為穆昭穆神主各以次遞遷其廟之宫頗如今之中書六部夫省部之設亦倣金宋豈以宗廟叙次而不考古乎有司急于行事竟如舊次云泰定帝本紀泰定元年二月丁巳朔作顯宗影堂丁丑監察御史宋本趙成慶李嘉賓言盗竊太廟神主由太常守衛不謹請罪之不報四月癸亥以國言上英宗廟號曰格堅皇帝辛巳太廟新殿成五月戊戌遷列聖神主于太廟新殿祭祀志泰定元年春正月甲午奉安仁宗及慈聖皇后二神主先是博士劉致建議曰竊以禮莫大于宗廟宗廟者天下國家之本禮樂刑政之所自出也唐虞三代而下靡不由之聖元龍興朔陲積徳累功百有餘年而宗廟未有一定之制方聖天子繼統之初定一代不刋之典為萬世法程正在今日周制天子七廟三昭三穆昭處於東穆處於西所以别父子親踈之序而使不亂也聖朝取唐宋之制定為九世遂以舊廟八室而為六世昭穆不分父子並坐不合禮經新廟之制一十五間東西二間為夾室太祖室既居中則唐宋之制不可依惟當以昭穆列之父為昭子為穆則睿宗當居太祖之東為昭之第一世世祖居西為穆之第一世裕宗居東為昭之第二世兄弟共為一世則成宗順宗顯宗三室皆當居西為穆之第二世武宗仁宗二室皆當居東為昭之第三世昭之后居左穆之后居右西以左為上東以右為上也苟或如此則昭穆分明秩然有序不違禮經可為萬世法若以累朝定制依室次于新廟遷安則顯宗躋順宗之上順宗躋成宗之上以禮言之春秋閔公無子庶兄僖公代立其子文公遂躋僖公于閔公之上史稱逆祀及定公正其序書曰從祀先公然僖公猶是有位之君尚不可居故君之上况未嘗正位者乎國家雖曰以右為尊然古人所尚或左或右初無定制古人右社稷而左宗廟國家宗廟亦居東方豈有建宗廟之方位既依禮經而宗廟之昭穆反不依禮經乎且如今朝賀或祭祀宰相獻官分班而立居西則尚左居東則尚右及行禮就位則西者復尚右東者復尚左矣致職居博士宗廟之事所宜建明然事大體重宜從使院移書集議取㫖四月辛巳中書省臣言世祖皇帝始建太廟太祖皇帝居中南向睿宗世祖裕宗神主以次祔西室順宗成宗仁宗以次祔東室邇者集賢翰林太常諸臣言國朝建太廟遵古制古尚左今尊者居右為少屈非所以示後世太祖皇帝居中南向宜奉睿宗皇帝神主祔左一室世祖祔右一室裕宗祔睿宗室之左顯宗順宗成宗兄弟也以次祔世祖室之右武宗仁宗亦兄弟也以祔裕宗室之左英宗祔成宗室之右臣等以其議近是謹繪室次為圖以獻惟陛下裁擇從之五月戊戌祔顯宗英宗凡十室胡氏粹中曰支庶有天下者始得立廟漢宣帝繼昭帝而立終不列戾悼二園于昭穆以其未嘗繼體正位也元之諸君各顧其私親而尊其所親廟制紛紜昭穆混淆凟禮不經甚矣彼劉致者徒知兄弟當合為一世而不知顯順二君不當稱宗徒知父子各自為一世而不知睿裕二宗亦不當立廟况即天子位者為之君其未嘗即位者皆臣也致徒知父子列坐不合禮經而不知君臣同食其不合禮經多矣若欲合禮則太祖居中太宗居西夾室定宗居昭第一憲宗居穆第一世祖居東夾室成宗居昭第二武宗居穆第二仁宗居昭第三英宗居穆第三親盡則祧各藏于夾室而睿裕順顯各祔食於禰廟則情皆稱而於禮不悖矣末哉劉致之為議也泰定帝本紀泰定二年正月甲辰奉安顯宗像于永福寺給祭田百頃三年丙申建顯宗神御殿于盧師寺賜額曰大天源延聖寺十月奉安顯宗御容于大天源延聖寺四年四月辛未盗入太廟竊武宗金主及祭器壬申作武宗主五月乙巳作成宗神御殿于天夀萬寧寺甲子以典守宗廟不嚴罷太常禮儀院官八月癸巳諡武宗皇后英宗皇后升祔太廟蕙田案致和元年秋七月泰定帝崩于上都八月皇太子阿蘓津巴即位改元天順武宗次子懐王圗克特穆爾入京師九月即帝位是為文宗改元天歴二年正月武宗長子周王和實碩稱帝于和寧之北是為明宗立文宗為太子八月明宗崩未改元文宗復即位于上都文宗本紀天歴元年九月乙丑立太禧院以奉祖宗神御殿祠祭秩正二品十月丁巳毁顯宗室升順宗祔右穆第二室成宗祔右穆第三室武宗祔左昭第三室仁宗祔左昭第四室英宗祔右穆第四室胡氏粹中曰顯順二君皆裕宗庶孽未嘗一日君臨天下特以武宗繼統而追王順宗泰定入立而推尊顯廟稽諸禮典則二廟皆不當立揆之人情順宗之廟若不可廢則顯宗之廟亦不當毁矣又况泰定得國于英宗未嘗干武宗之統也文宗何為而深讐之乎他日順帝撤文宗廟主所謂出乎爾者必反乎爾者歟祭祀志神御殿舊稱影堂所奉祖宗御容皆紋綺局織錦為之影堂所在世祖帝后大聖夀萬安寺裕宗帝后亦在焉順宗帝后大普慶寺仁宗帝后亦在焉成宗帝后大天夀萬寧寺武宗及二后大崇恩福元寺為東西二殿明宗帝后大天源延聖寺英宗帝后大永福寺葉赫皇后大䕶國仁王寺世祖武宗影堂皆藏玉冊十有二牒玉寳一鈕仁宗影堂藏皇太子玉冊十有二牒皇后玉冊十有二牒玉寳一鈕英宗影堂藏皇帝玉冊十有二牒玉寳一鈕皇太子玉冊十有二牒凡帝后冊寳以匣匱金鎖鑰藏于太廟此其分置者其祭器則黄金缾斚盤盂之屬以十數黄金塗銀香合椀楪之屬以百數銀壺釜杯匜之屬稱是玉器水晶瑪瑙之器為數不同有玻瓈瓶琥珀勺世祖影堂有真珠簾又皆有珊瑚樹碧甸子山之屬其祭之日常祭毎月初一日初八日十五日二十三日節祭元日清明蕤賓重陽冬至忌辰其祭物常祭用蔬果節祭忌辰用牲祭官便服行三獻禮加薦用羊羔炙魚饅頭子西域湯餅圓米粥砂糖飯羮泰定二年亦作顯宗影堂于大天源延聖寺天歴元年廢舊有崇福殊祥二院奉影堂祀事乃改為泰禧院禮樂志天歴二年春三月明宗祔廟下大樂署編運樂譜舞節翰林定譔樂章曲曰永成之曲文宗本紀至順元年三月己巳議明宗陞祔序於英宗之上視順宗成宗廟遷之例壬申奉玉冊玉寳祔明宗神主於太廟二年三月癸巳詔累朝神御殿之在諸寺者各製名以冠之世祖曰元夀昭睿順聖皇后曰睿夀諾爾布皇后曰懿夀裕宗曰明夀成宗曰廣夀順宗曰衍夀武宗曰仁夀文獻昭聖皇后曰昭夀仁宗曰文夀英宗曰宣夀明宗曰景夀三年二月己巳命雅克特穆爾集翰林集賢太禧宗禋院議立太祖神御殿寧宗本紀至順三年八月己酉文宗崩十月庚子帝即位於大明殿十一月己巳詔翰林國史集賢院奎章閣學士院集議先皇帝廟號神主升祔武宗皇后及改元事蕙田案明宗第二子鄜王額琳沁巴勒立是為寧宗十一月崩未改元明宗長子托歡特穆爾即位于上都是為順帝改元為元統元年順帝本紀元統元年十月庚辰奉文宗皇帝及太皇太后御容於大承天䕶聖寺文宗本紀元統二年正月己酉太師右丞相巴延率文武百官等議上尊諡曰聖明元孝皇帝廟號文宗國言諡號曰濟雅圗皇帝十月丙申命參知政事納琳監繪明宗皇帝御容十二月詔省院臺翰林集賢奎章閣太常禮儀院禮部官定議寧宗皇帝尊諡廟號三年正月辛亥升祔額琳沁巴勅皇帝于廟諡冲聖嗣孝皇帝廟號寧宗八月壬午京師地大震太廟梁柱裂各室牆壁皆壊壓損儀物文宗神主及御牀盡碎西湖寺神御殿壁仆壓損祭器九月己酉文宗新主玉冊及一切神御之物皆成四年十一月丙寅改英宗殿名昭融六年正月甲戌立司禋監奉太祖太宗睿宗三朝御容于石佛寺二月丁未立延徽寺以奉寧宗祀事罷司禋監六月丙申撤文宗廟主十月甲申奉玉冊玉寳尊皇考為順天立道睿文智武大聖孝皇帝至正三年九月甲申修理太廟奉遷神主于後殿十月丁酉奉安神主戊戌帝将祀南郊告祭太廟至寧宗室問曰朕寧宗兄也當拜否太常博士劉聞對曰寧宗雖弟其為帝時陛下為之臣春秋時魯閔公弟也僖公兄也閔公先為君宗廟之祭未聞僖公不拜陛下當拜帝乃拜六年五月丁亥盗竊太廟神主十二年六月修太廟西神門王圻續通考至正十四年立寧宗影堂陳祖仁傳大明兵進壓近郊有㫖命祖仁及同僉太常禮儀院事王遜志等載太廟神主從皇太子北行祖仁等奏曰天子有大事出則載主以行從太子非禮也帝然之還守太廟以俟命元史紀事本末張氏溥曰元之顯順二君不當稱宗睿裕二宗不當立廟武宗繼體而追王順宗泰定入立而推尊顯廟則違支子之禮成宗君也順宗臣也以次升祔而反躋其上則蹈逆祀之譏厚私親而干大分如此不如其無祭也蕙田案元佛寺影堂最為凟䙝然其端自唐宋啟之又何異焉右元廟制五禮通考卷八十三
