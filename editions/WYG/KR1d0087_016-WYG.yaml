body:
  text: 五禮通考卷六刑部尚書秦蕙田撰吉禮六圜丘祀天史記封禪書三年一郊秦以冬十月爲歲首故常以十月上宿郊見李竒曰宿猶齋戒也通權火張晏曰權火㷭火也狀若井桔橰其法類稱故謂之權欲令光明逺照通祀所也索隱曰權一作爟周禮有司爟拜於咸陽之旁而衣上白其用如經祠云服䖍曰經常也蕙田案封禪書于四畤稱雍而此云咸陽之旁四畤有春泮凍秋涸凍冬賽祠五月嘗駒及四仲之月祠而此但云十月然則秦雖廢禮固未嘗即以四畤爲郊天也太史公作此書意在廣陳淫祀以彰武帝之失而於三代常禮幸存一線於呂政者反從其畧故通篇所言惟此一條爲正郊也髙祖入關旣立黑帝後雖有詔祀上帝及梁巫祠天地之文所言天帝皆是泛稱並無正祭武帝既立泰畤以後與五畤間歲祠祭是漢人固亦知有天與五帝之分特以泰一爲天而非周禮所郊之昊天也右秦郊禮漢書髙祖本紀二年六月令祠官祀天地四方上帝山川以時祠之郊祀志後四歲天下已定詔御史令長安置祠祀官女巫其梁巫祀天地晉巫祀五帝九天巫祀九天蕙田案梁巫祀天地晉巫祀五帝則天與五帝明有不同矣乃復有九天之祀何其謬耶文帝本紀十四年詔曰朕獲執犧牲珪幣以事上帝宗廟十四年於今歴日彌長以不敏不明而久撫臨天下朕甚自媿其廣增諸祀壇場珪幣昔先王逺施不求其報望祀不祈其福右賢左戚先民後已至明之極也今吾聞祠官祝釐如淳曰釐福也賈誼傳受釐坐宣室是也師古曰釐本字作禧假借用耳同音僖皆歸福朕躬不爲百姓朕甚媿之夫以朕不徳而專鄉獨美其福百姓不與焉是重吾不徳其令祠官致敬毋有所祈史記封禪書今上武帝初至雍郊見五畤後常三歳一郊索隠曰漢舊儀云元年祭天二年祭地三年祭五畤三歲一徧皇帝自行也亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊用太牢七日漢書作日一太牢七日爲壇開八通之鬼道於是天子令太祝立其祠長安東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方蕙田案髙帝紀祠天地四方上帝山川則祭天與祭上帝有別也封禪書文帝郊見五畤索隠註祭天祭五畤亦各不同是祭天之壇場時日儀文珪幣雖無可考不足以爲郊祀之典要然祭天之禮固未嘗竟廢自謬忌創爲泰一之說立祠于長安東南郊則儼然彷彿圎丘之意矣復增三一之祠又別泰一于天一地一之上後遂專郊拜泰一立泰畤壇不經甚矣其秋元鼎元年上幸雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿言黄帝采首山銅鑄鼎於荆山下鼎既成有龍下迎黄帝上天於是天子曰嗟乎吾誠得如黄帝吾視去妻子如脫屣耳乃拜卿爲郎東使候神於太室上遂郊雍至隴西登空同幸甘泉令祠官寛舒等具泰一祠壇祠壇放亳忌泰一壇三垓五帝壇環居其下各如其方黄帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一犛牛以爲俎豆牢具而五帝獨有俎豆醴進其下四方地爲醊食羣神從者及北斗云已祠胙餘皆燎之其牛色白鹿居其中彘在鹿中水而洎之徐廣曰洎一作酒灌水于釡中曰洎師古曰言以白鹿内牛中以彘内鹿中又以水及酒合内鹿中祭日以牛祭月以羊彘特太一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昧爽天子始郊拜泰一朝朝日夕夕月則揖而見太一如雍郊禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣尚黄其祠列火滿壇壇旁烹炊具有司云祠上有光焉公卿言皇帝始郊見泰一雲陽有司奉瑄玉孟康曰璧大六寸謂之瑄嘉牲薦饗是夜有美光及晝黄氣上屬天太史公漢書作太史令談祠官寛舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠三歲天子一郊見漢書郊祀志夏六月汾隂巫錦爲民祠魏脽后土營旁見地如鈎狀掊視得鼎鼎大異于衆鼎文鏤無欵識怪之言吏吏告河東太守勝勝以聞天子使騐問巫得鼎無姦詐廼以禮祠迎鼎至甘泉從上行薦之至中山宴溫有黄雲焉有鹿過上自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故廵祭后土祈爲百姓育榖今年豐楙未報鼎曷爲出哉有司皆言聞昔泰帝興神鼎一一者一統天地萬物所繫象也黄帝作寶鼎三象天地人禹收九牧之金鑄九鼎象九州皆嘗鬺亨上帝鬼神其空足曰鬲以象三徳饗承天祜夏徳衰鼎遷於殷殷徳衰鼎遷於周周徳衰鼎遷於秦秦徳衰宋之社亡鼎廼淪伏而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不㕦不敖胡考之休今鼎至甘泉以光潤龍變承休無疆合兹中山有黄白雲降蓋若獸為符路弓乗矢集獲壇下報祠大享唯受命而帝者心知其意而合徳焉鼎宜視宗禰廟臧於帝廷以合明應制曰可其秋上雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黄帝時等卿有札書曰黄帝得寶鼎冕候問於鬼臾區鬼臾區對曰黄帝得寶鼎神策是歲己酉朔旦冬至得天之紀終而復始於是黄帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黄帝仙登於天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寶鼎事已决矣尚何以爲卿因嬖人奏之上大恱廼召問卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黄帝言無書獨有此鼎書曰漢興復當黄帝之時曰漢之聖者在髙祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黄帝得上泰山封申公曰漢帝亦當上封禪封禪則能仙登天矣黄帝萬諸侯而神靈之封君七千天下名山八而三在蠻夷五在中國中國華山首山太室山泰山東萊山此五山黄帝之所常游與神會黄帝且戰且學仙患百姓非其道乃斷斬非鬼神者百餘歳然後得與神通黄帝郊雍上帝宿三月鬼臾區號大鴻死塟雍故鴻冢是也其後黄帝接萬靈明庭明庭者甘泉也所謂寒門者谷口也黄帝採首山銅鑄鼎於荆山下鼎既成有龍垂胡􅛂下迎黄帝黄帝上騎羣臣後宮從上龍七十餘人龍乃上去餘小臣不得上廼悉持龍䫇龍􅛂拔墮墮黄帝之弓百姓仰望黄帝既上天乃抱其弓與龍􅐖號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黄帝吾視去妻子如脫屣耳拜卿爲郎使東候神於太室上遂郊雍至隴西登崆峒幸甘泉令祠官寛舒等具泰一祠壇祠壇放亳忌泰一壇三陔五帝壇環居其下各如其方黄帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一犛牛以爲俎豆牢具而五帝獨有俎豆醴進其下四方地爲腏食羣神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中鹿中水而酒之祭日以牛祭月以羊彘特太一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽天子始郊拜泰一朝朝日夕夕月則揖而見太一如雍郊禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣尚黄其祠列火滿壇壇旁烹炊具有司云祠上有光公卿言皇帝始郊見太一雲陽有司奉瑄玉嘉牲薦享是夜有美光及晝黄氣上屬天太史令談祠官寛舒等曰神靈之休祐福兆祥宜因此地光域立太畤壇以明應令太祝領秋及臘間祠三歲天子一郊見其秋爲伐南越告禱太一以牡荆畫幡日月北斗登龍以象太一三星為太一鏠旗命曰靈旗爲兵禱則太史奉以指所伐國蕙田案三代以上郊天儀節散見於經傳秦漢之人無所攷正疎略久矣其壇制祭日從祀牲牢俎豆衣服祝詞大概稍見於此武帝本紀元鼎五年十一月辛巳朔旦冬至立泰畤于甘泉天子親郊見朝日夕月詔曰朕以眇身託于王侯之上德未能綏民民或饑寒故巡祭后土以祈豐年冀州脽壤乃顯文鼎獲薦于廟渥洼水出馬朕其御焉戰戰兢兢懼不克任思昭天地内惟自新詩云四牡翼翼以征不服親省邊垂用事所極望見泰一修天文䄠辛卯夜若景光十有二明易曰先甲三日後甲三日朕甚念年歲未咸登飭躬齋戒丁酉拜况于郊蕙田案泰一天神固不足以當昊天然班史諸紀每幸雍曰祠五畤幸甘泉曰郊泰畤葢以泰畤之設其尊在五畤之上而五帝僅爲之佐則漢直以當圜丘之祭矣若更黜爲非郊必謂建始以上全不祀天殊亦乖其本意今於諸帝郊泰畤者悉入郊天而五畤悉入五帝庶無彼此紛亂之患而讀者亦易考焉郊祀志天子封泰山禪泰山下阯東北肅然山還坐明堂羣臣更上夀下詔改元其秋有星孛于東井後十餘日有星孛于三能望氣王朔言後獨見填星如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云其來年冬郊雍五帝還拜祝祠太乙史記封禪書元封二年冬郊雍五帝還拜祝祠太乙贊饗曰德星昭衍厥維休祥夀星仍出淵燿光明信星昭見皇帝敬拜泰祝之享蕙田案此年贊饗之詞與元鼎元年絶不同漢書武帝本紀五年冬南廵狩至于盛唐春三月還至泰山增封夏四月還幸甘泉郊泰畤天漢元年春正月行幸甘泉郊泰畤後元元年春正月行幸甘泉郊泰畤二月詔曰朕郊見上帝廵于北邊見羣鶴留止以不羅罔靡所獲獻薦于泰畤光景並見其赦天下禮樂志武帝定郊祀之禮祠泰一甘泉就乾位也祭后土于汾隂澤中方丘也乃立樂府采詩夜誦有趙代秦楚之謳以李延年爲協律都尉多舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宮望拜百官侍祠者數百人皆肅然動心焉郊祀歌練時日一練時日侯有望焫膋蕭延四方以蕭焫脂合馨香四方四方之神也焫人說反九重開靈之斿垂惠恩鴻祜休靈之車結𤣥雲駕飛龍羽旄紛靈之下若風馬左倉龍右白虎靈之來神哉沛先以雨般裔裔靈之至慶隂隂相放􅜜震澹心放􅜜猶髣髴也音昉弗澹動也靈已坐五音飭虞至旦承靈億牲繭栗粢盛香尊桂酒賓八鄉八鄉八方之神靈安留吟青黄青黄謂四時之樂徧觀此聎瑤堂衆嫭並綽奇麗嫭音互好也謂女樂並好麗也顔如荼兆逐靡兆民逐觀而猗靡也靡武義反被華文厠霧縠曵阿錫佩珠玉俠嘉夜俠與挾同嘉夜芳草也茝蘭芳澹容與獻嘉觴帝臨二帝臨中壇四方承宇繩繩意變備得其所清和六合制數以五此后土之歌也土數五海内安寧興文匽武后土富媪媪老母稱也坤為母故稱媪昭明三光穆穆優游嘉服上黄土色上黄也青陽三鄒子樂青陽開動春爲青陽根荄以遂膏潤并愛跂行畢逮霆聲發榮壧處頃聽壧與巖同頃讀曰傾枯槀復産廼成厥命衆庶熙熙施及天胎羣生啿啿唯春之祺啿啿豐厚之貌音徒感反朱明四鄒子樂朱明盛長旉與萬物夏爲朱明旉古敷字桐生茂豫桐讀為通言草木皆通達而生靡有所詘敷華就實既阜既昌登成甫田百鬼迪嘗廣大建祀肅雍不忘神若宥之傳世無疆西顥五鄒子樂西顥沆碭西方少吴也沆胡浪反碭音蕩白氣之貌也秋氣肅殺含秀垂頴續舊不廢廢合韻音發姦僞不萌祅孽伏息隅辟越逺四貉咸服既畏兹威惟慕純徳附而不驕正心翊翊𤣥㝠六鄒子樂𤣥㝠陵隂𤣥㝠北方之神也蟄虫葢臧屮木零落􅋄古草字抵冬降霜易亂除邪革正異俗兆民反本抱素懐樸條理信義望禮五嶽籍歛之時掩收嘉穀惟泰元七惟泰元尊媪神蕃釐泰元天也媪神地也言天神至尊而地神多福也釐讀曰僖經緯天地作成四時精建日月星辰度理隂陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒繼統共勤順皇之徳鸞路龍鱗罔不肸飾嘉籩列陳庶幾宴享滅除凶災烈騰八荒鐘鼓竽笙雲舞翔翔招搖靈旗九夷賓將建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰㳙選休成㳙除也除惡選取美成者也天地八天地並况况賜也惟予有慕爰熙紫壇思求厥路恭承禋祀緼豫爲紛黼繡周張承神至尊千童羅舞成八溢溢與佾同合好効歡虞泰一九歌畢奏斐然殊鳴琴竽瑟會軒朱軒朱即朱軒也璆磬金鼓靈其有喜百官濟濟各敬厥事盛牲實俎進聞膏神奄留臨須摇須搖須臾也長麗前掞光耀明長麗靈鳥也舊說云鸞也寒暑不忒况皇章展詩應律鋗玉鳴函宮吐角激徵清發梁揚羽申以商造兹新音永久長聲氣逺條鳳鳥鴹鴹古翔字神夕奄虞葢孔享丞相匡衡奏罷黼繡周張更定詩曰肅若舊典蕙田案郊祀志衡言甘泉泰畤紫壇有文章采鏤黼黻之飾及玉女樂石壇僊人祠瘞鸞路騂駒寓龍馬不能得其象於古宜皆勿修故改去詩中鸞路龍鱗句爲涓選休成又改去黼繡周張句爲肅若舊典舊本誤置下章之首見館閣校本雖正其失而以爲衡詩祇記其首句則亦考之未詳也日出入九日出入安窮時世不與人同日月無窮而人命有終世長而夀短故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池徧觀是邪謂何吾知所樂獨樂六龍六龍之調使我心若訾黄其何不徠下應劭曰訾黄一名乗黄龍翼而馬身黄帝乘之而仙武帝意欲得之曰何不來耶師古曰訾嗟歎之詞黄乘黄也天馬十太乙况天馬下言此天馬乃太乙所賜故來下也霑赤汗沬流赭霑濡也流汗如赭志俶儻精權竒籋浮雲籋音躡言天馬上躡浮雲也晻上馳體容與迣萬里迣音逝超踰也今安匹龍爲友元狩三年馬生渥洼水中作天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊雨馬毛色如虎脊者有兩也化若鬼變化若鬼神天馬徠歴無草徑千里循東道天馬徠執徐時言歳在辰也將搖舉誰與期天馬徠開逺門竦予身逝昆侖天馬徠龍之媒游閶闔觀玉臺太初四年誅宛王獲宛馬作天門十一天門開詄蕩蕩穆並騁以臨饗光夜燭德信著靈寖平而鴻長生豫大朱涂廣涂道路也言通神之路飾以朱丹又甚廣大夷石爲堂飾玉梢以舞歌體招搖若永望星留俞塞隕光俞答也言衆星留神答我饗薦降其光耀四面充塞也照紫幄珠熉黄紫幄饗神之幄言光照紫幄故珠色熉然而黄也熉音云幡比翄回集貳雙飛常羊舞者骨騰肉飛如鳥之回翄而雙集也月穆穆以金波日華燿以宣明假清風軋忽激長至重觴重觴謂累獻也神裵回若流放殣冀親以肆章言神靈裵回留而不去故我得覲見冀以親附而陳誠意遂章明之函蒙祉福常若期寂漻上天知厥時泛泛滇滇從髙斿滇音振旅闐闐殷勤此路臚所求佻正嘉吉宏以昌佻讀曰肇始也休嘉砰隱溢四方專精厲意逝九閡閡亦陔也胡九天之上也合韻音改紛云六幕浮大海景星十二景星顯見信星彪列象載昭庭象謂縣象也載事也日親以察參侔開闔爰推本紀汾脽出鼎皇祜元始五音六律依韋饗昭依韋諧和也雜變並會雅聲逺姚姚僄姚言飛揚也空桑琴瑟結信成四興遞代八風生殷殷鐘石羽籥鳴河龍供鯉醇犧牲百末㫖酒布蘭生泰尊柘漿析朝酲取甘柘汁以爲飲可以解朝酲也微感心攸通修名周流常羊思所并穰穰復正直往寗穰穰多也復歸也直當也寗願也言獲福既多歸于正道克當往日所願也馮蠵切和疏寫平馮夷河伯蠵觜蠵龜屬言馮夷命靈蠵使切厲諧和水神令之疏導川潦寫散平均無災害也上天布施后土成穰穰豐年四時榮元鼎五年得鼎汾隂作齊房十三齊房産草九莖連葉宮童効異宮之童豎致此異瑞也披圖案諜𤣥氣之精回復此都蔓蔓日茂芝成靈華元封二年芝生甘泉齊房作后皇十四后皇嘉壇立𤣥黄服物發冀州兆蒙祉福沇沇四塞徦狄合處沇沇流行之貌徦狄逺夷也合處内附也徦即遐字從彳經營萬億咸遂厥宇華􅂱􅂱十五華􅂱􅂱固靈根神之斿過天門車千乗敦昆侖敦讀曰屯神之出排玉房周流雜拔蘭堂拔舍止也神之行旌容容騎沓沓般傱傱傱傱衆也才公反神之徠泛翊翊甘露降慶雲集神之揄臨壇宇九疑賓夔龍舞神安坐鴹吉時共翊翊合所思神嘉虞申貳觴貳觴猶重觴也福滂洋邁延長沛施祐汾之阿揚金光横泰河莽若雲增陽波徧臚驩騰天歌五神十六五神相包四鄰五帝為太乙相包含也四鄰四方也土地廣揚浮雲扢嘉壇椒蘭芳扢摩也摩拭其壇加以椒蘭之芳璧玉精禮神之璧垂華光益億年美始興交於神若有承廣宣延咸畢觴言徧延諸神畢盡觴爵也靈輿位偃蹇驤卉汨臚析奚遺卉汨疾意也臚陳也析分也奚何也言速自陳列分散而歸無所留也淫淥澤􅓭然歸淫久也淥澤澤名言我饗神之後久在淥澤乃􅓭然而歸也朝隴首十七朝隴首覽西垠靁電尞獲白麟爰五止顯黄徳時白麟足有五蹏圖匈虐熏鬻殛闢流離抑不詳流離不得所者為開道路使之安集違道不詳善者則抑黜之賓百僚山河饗掩回轅鬗長馳鬗鬗長貌音武元反騰雨師灑路陂流星隕感惟風籋歸雲撫懐心元狩元年行幸雍獲白麟作象載瑜十八象載瑜白集西象載象輿也瑜美貌西合韻音先食甘露飲榮泉赤鴈集六紛員六所獲鴈數紛員多貌殊翁雜五采文翁鴈頸文彩殊異也神所見施祉福登蓬萊結無極太始三年行幸東海獲赤鴈作赤蛟十九赤蛟綏黄華葢綏綏赤蛟貌上有黄氣狀若葢也露夜零晝晻濭百君禮六龍位勺椒漿靈已醉靈既享錫吉祥芒芒極降嘉觴靈殷殷爛揚光延夀命永未央杳㝠㝠塞六合澤汪濊輯萬國靈禗禗象輿轙禗音近枲不安欲去也轙僕人嚴駕待發之意音儀票然逝票匹遙反旗逶蛇禮樂成靈將歸託𤣥徳長無衰蕙田案武帝祠太乙于甘泉祭后土於汾隂雖非古南北郊之制而其意略同孟堅作志總一代樂章而繫之其下故其用樂禮節及前後增易不復詳述今由本文繹之縱不能確有所指然其先後節次之大略有可彷彿擬議者一章曰練時日候有望焫膋蕭延四方是神未降而延之也曰九重開靈之斿是神之起而將降也繼曰靈之車靈之下靈之來靈之至靈已坐靈安留則神行而下至登位也是爲燔燎迎神之章如周禮大司樂圜鍾爲宮黄鍾爲角太蔟爲徴姑洗爲羽樂六變則天神皆降可得而禮者也二章帝臨三章青陽四章朱明五章西顥六章𤣥㝠則爲祀五帝之樂章封禪書所云泰一壇三垓五帝壇環居其下者也七章曰惟泰元尊媪神蕃釐經緯天地作成四時是言泰一之尊兼統天地葢獻泰一之詞也八章曰天地並况曰合好効歡虞泰一則獻天一地一也九章日出入其詞皆求仙人慕黄帝之意封禪書所云吾誠得如黄帝視去妻子如脫屣者也意或於朝日夕月而用之歟十一章天門曰假清風軋忽激長至重觴十五章華􅂱􅂱曰神嘉虞申貳觴則再獻三獻之樂章也十六章五神曰廣宣延咸畢觴曰淫淥澤􅓭然歸十九章赤蛟曰靈既享錫吉祥芒芒極降嘉觴延夀命永未央是飲福致嘏之事也曰靈禗禗象輿轙曰禮樂成靈將歸是言神返而去也此皆獻畢受福送神之詞其前後次第略可想見但或用之甘泉或兼用之汾隂雍畤則不可考矣此外十章天馬十二章景星十三章齊房十七章朝隴首十八章象載瑜或志休祥或記功烈則隨時増用故元狩元年之朝隴首三年之天馬並作于立甘泉祠之前惟元鼎五年之景星則適在其年若元封二年之齊房則在立甘泉之後四年矣太初四年之天馬則又後之八年矣太始三年之象載瑜則又後之七年矣是皆隨事增入其奏之節次不可知或即以天馬厠九章之下景星厠十一章之下以為序次而班史因之歟惟十四章后皇則决係汾隂后土祀神之樂而其迎神送神當即在前十三章之内今不復可別矣然則此十九章者始于元狩元年之獲麟終太始三年之獲赤鴈歴二十九年而始備至匡衡更定則又後之六十二年矣今以班志相傳既久且又有甲乙次第若更區分割裂恐無片段故統載于此而略申其說以俟考定者宣帝本紀神爵元年春正月行幸甘泉郊泰畤三月詔曰朕承宗廟戰戰慄慄惟萬事統未燭厥理廼元康四年嘉榖𤣥稷降于郡國神爵仍集金芝九莖産于函徳殿銅池中九真獻竒獸南郡獲白虎威鳳爲寶朕之不明震于珍物飭躬齋精祈爲百姓東濟大河天氣清靜神魚舞河幸萬歳宮神爵翔集朕之不徳懼不能任其以五年爲神爵元年郊祀志大將軍霍光輔政上共已正南面非宗廟之祀不出十二年乃下詔曰葢聞天子尊事天地修祀山川古今通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齋戒親奉祠爲百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齊祠之禮頗作詩歌宣帝本紀神爵四年春二月詔曰廼者鳳凰甘露降集京師嘉瑞並見修興泰一五帝后土之祠祈為百姓蒙祉福鸞鳳萬舉蜚覽翺翔集止於旁齊戒之暮神光顯著薦鬯之夕神光交錯或降於天或登於地或從四方來集於壇上帝嘉饗海内承福其赦天下賜民爵一級女子百户牛酒鰥寡孤獨髙年帛蕙田案武帝後元元年郊泰畤見羣鶴赦天下此年復賜爵及牛酒髙年帛自後因之相沿既久至赦賚繁費如宋代㡬致以郊祀爲難行則漢已階之厲矣况誇瑞應而惑神鬼豈敬而逺之之道耶五鳳元年春正月行幸甘泉郊泰畤甘露元年春正月行幸甘泉郊泰畤郊祀志改元甘露正月上幸甘泉郊泰畤其夏黄龍見新豐建章未央長樂宮鐘虡銅人皆生毛長一寸所時以爲美祥宣帝本紀二年春正月行幸甘泉郊泰畤黄龍元年春正月行幸甘泉郊泰畤元帝本紀初元二年春正月行幸甘泉郊泰畤賜雲陽民爵一級五年春正月行幸甘泉郊泰畤永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百户牛酒髙年帛五年春正月行幸甘泉郊泰畤建昭二年春正月行幸甘泉郊泰畤郊祀志元帝即位遵舊儀間歳正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百户牛酒或賜爵赦罪人蕙田案自漢初至此南北郊未立其制凡四變天地五畤三歲一徧祭一也立泰一祠于長安東南郊二也增三一祠于亳忌泰一壇上三也甘泉立泰畤四也其時天子所親行者泰一五帝后土其最著云成帝本紀建始元年十二月作長安南北郊罷甘泉汾隂祠是日大風拔甘泉畤中大木十圍以上郊祀志帝初即位丞相匡衡御史大夫張譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即隂之象也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宮即於雲陽立泰畤祭於宮南今行常幸長安郊見皇天反北之泰隂祠后土反東之少陽事與古制殊又至雲陽行谿谷中阨陿且百里汾隂則度大川有風波舟楫之危皆非聖主所宜數乗郡縣治道共張吏民困苦百官煩費勞所保之民行危險之地難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與羣臣議定奏可大司馬車騎將軍許嘉等八人以爲所從來久逺宜如故右將軍王商博士師丹議郎翟方進等五十人以爲禮記曰燔柴於太壇祭天也瘞薶於太折祭地也兆於南郊所以定天位也祭地於太折在北郊就隂位也郊處各在聖王所都之南北書曰越三日丁巳用牲於郊牛二周公加牲告徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者爲主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所享宜徙就正陽太隂之處違俗復古循聖制定天位如禮便於是衡譚奏議曰陛下聖徳聰明上通承天之大典覽羣下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從衆則合於天心故洪範曰三人占則從二人之言言少從多之義也論當往古宜於萬民則依而從之違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著於經傳同於上世便於吏民八人不案經蓺考古制而以爲不宜無法之議難以定吉凶太誓曰正稽古建功立事可以永年丕天之大律詩曰毋曰髙髙在上陟降厥士日監在兹言天之日監王者之處也又曰廼眷西顧此維予宅言天以文王之都爲居也宜於長安定南北郊爲萬世基天子從之既定衡言甘泉泰畤紫壇八觚宣通象八方五帝壇周環其下又有羣神之壇以尚書禋六宗望山川徧羣神之義紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊柴饗帝之義埽地而祭尚質也歌大呂舞雲門以竢天神歌太蔟舞咸池以竢地祗其牲用犢其席藁稭稭音戞其器陶匏皆因天地之性貴誠尚質不敢修其文也以爲神祗功德至大雖修精微而備庶物猶不足以報功唯至誠爲可故尚質不飾以章天徳紫壇偽飾女樂鸞路騂駒龍馬石壇之屬宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之今雍鄜宻上下畤本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠由是皆罷蕙田案匡衡之議可謂精矣葢由是復覩古先之制焉漢時經術之效至是乃見北郊之文于經無有而此俱稱禮記必有明據非臆說也特為二戴刪定而逸之耳惜哉三輔黄圖圜丘在昆明故渠南有漢故圜丘今按髙二丈周圍百二十步成帝本紀建始二年春正月辛巳上始郊祀長安南郊詔曰廼者徙泰畤后土于南郊北郊朕親飭躬郊祀上帝皇天報應神光並見三輔長無共張繇役之勞赦奉郊縣長安長陵天郊在長安城南地郊在長安城北長陵界中二縣有奉郊之勤故一切並赦之及中都官耐罪徒減天下賦錢算四十蕙田案此西漢南北郊之始然正月上辛乃古祈榖之祭非圜丘正祭匡衡葢亦誤認魯禮爲周禮耳甘泉泰畤用十一月朔旦冬至其地則非其時則近古也永始三年冬十月皇太后詔復甘泉泰畤四年春正月行幸甘泉郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百户牛酒髙年帛郊祀志後成都侯王商爲大司馬輔政杜鄴說商曰東鄰殺牛不如西鄰之禴祭言奉天之道貴以誠質大得民心也行穢祀豐猶不蒙祐徳修薦薄吉必大來古者壇場有常處燎禋有常用贊見有常禮犧牲玉帛雖備而財不匱車輿臣役雖動而用不勞是故每舉其禮助者歡說大路所歴黎元不知今甘泉河東天地郊祀咸失方位違隂陽之宜及雍五畤皆曠逺奉尊之役休而復起繕治共張無解已時皇天著象殆可略知前上甘泉先敺失道禮月之夕奉引復迷祠后土還臨河當渡疾風起波船不可御又雍大雨壊平陽宮垣廼三月甲子震電災林光宮門祥瑞未著咎徵仍臻迹三郡所奏皆有變故不答不饗何以甚此詩曰率由舊章舊章先王法度文王以之交神於祀子孫千億宜如異時公卿之議復還長安南北郊成帝本紀元延二年春正月行幸甘泉郊泰畤揚雄傳上方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風四年春正月行幸甘泉郊泰畤綏和二年春正月行幸甘泉郊泰畤丙戌帝崩于未央宮皇太后詔有司復長安南北郊郊祀志帝崩皇太后詔有司曰皇帝即位思順天心遵經義定郊禮天下說憙懼未有皇孫故復甘泉泰畤汾隂后土庶㡬獲福皇帝恨難之卒未得其祐其復南北郊長安如故以順皇帝之意也蕙田案此西漢再復南北郊然其忽罷忽復復而仍罷者或以未得皇孫或以久疾不瘳葢方士禍福之說中入骨髓其所謂敬恭明神者但知有祈禱之私而不知有典禮之正區區一匡衡正之猶捧土以塞孟津欲障而廻之也難矣哀帝本紀建平三年十一月復甘泉泰畤汾隂后土祠罷南北郊郊祀志哀帝寢疾太皇太后詔有司曰皇帝孝順奉承聖業靡有懈怠而久疾未瘳夙夜維思殆繼體之君不宜改作其復甘泉泰畤汾隂后土祠如故上亦不能親至遣有司行事而禮祠焉平帝本紀元始四年春正月郊祀髙祖以配天郊祀志五年大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天王者尊其考欲以配天縁考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於明堂以配上帝禮記天子祭天地及山川歲徧春秋榖梁傳以十二月下辛卜正月上辛郊髙皇帝受命因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平初起渭陽五帝廟祭泰一地祗以太祖髙皇帝配曰冬至祠泰一夏至祠地祗皆并祠五帝而共一牲上親郊拜後平伏誅乃不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不答也於是元鼎四年十一月甲子始立后土祠於汾隂或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉三嵗一郊與雍更祠亦以髙祖配不歲事天皆未應古制建始元年徙甘泉泰畤河東后土於長安南北郊永始元年三月以未有皇孫復甘泉河東祠綏和二年以卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠竟復無福臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆太中大夫朱陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀墬古地字也樂有別有合其合樂曰以六律六鍾五聲八音六舞大合樂祀天神祭墬祗祀四望祭山川享先妣先祖凡六樂奏六歌而天墬神祗之物皆至四望葢謂日月星海也三光髙而不可得親海廣大無限界故其樂同祀天則天文從祭墬則地理從三光天文也山川地理也天地合祭先祖配天先妣配地其誼一也天地合精夫婦判合祭天南郊則以地配一體之誼也天地位皆南鄉同席地在東共牢而食髙帝髙后配於壇上西鄉后在北亦同席共牢牲用繭栗𤣥酒陶匏禮記曰天子籍田千畮以事天地繇是言之宜有黍稷天地用牲一燔燎瘞薶用牲一髙帝髙后用牲一天用牲左及黍稷燔燎南郊地用牲右及黍稷瘞於北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祗嘉享萬福降輯此天地合祀以祖妣配者也其別樂曰冬日至於地上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則地祗皆出天地有常位不得常合此其各特祀者也隂陽之別於日冬夏至其會也以孟春正月上辛若丁天子親合祀天地於南郊以髙帝髙后配隂陽有離合易曰分隂分陽迭用柔剛以日冬至使有司奉祠南郊髙帝配而望羣陽日夏至使有司奉祭北郊髙后配而望羣隂皆以助致微氣通道幽弱當此之時后不省方故天子不親而遣有司所以正承天順地復聖王之制顯太祖之功也渭陽祠勿復修羣望未悉定定復奏奏可三十餘年間天地之祠五徙焉莽又奏天子父事天母事地今稱天神曰皇天上帝泰一兆曰泰畤蕙田案此西漢三復南北郊然改爲合祭以妣配地魏晉以下皆率行之不知其皆莽禮也又案莽雖復南北郊僅於冬夏至使有司行事而天子則以孟春親合祀天地于南郊是南北郊制雖似合古而祭祀之禮失矣又立泰一兆曰泰畤后祇曰廣畤則是仍不廢舊畤但移之于國都耳漢舊儀元年祭天二年祭地三年祭五帝於五畤三歲一辦皇帝目行羣臣從齋皆百日他祠不出祭天紫壇幄帷髙皇帝配天居堂下西向紺席祭天用六綵綺席六重長一丈一副四周緣之祭天用玉几玉飾器凡器七千百物飾具祭天養牛五嵗至三千斤皇帝祭天居雲陽宮齋百日上甘泉通天臺髙二十丈以候天神之下見如流火舞女童三百人皆年八歲天神下壇所舉烽火皇帝就竹宮去壇三里望對壇竹宮中不至壇所甘泉臺去長安三百里望見長安城黄帝以來所祭天之圜丘也皇帝祭天地宗廟駕四馬羽葢華宴出則乘馬逺行在左纛黄屋乗六馬纛左排馬頭上髦也文獻通考馬氏曰西京之事班史于祭祀儀文所述簡略衞敬仲撰漢舊儀頗有正史所未見者然其詞多率而叙述亦無甚倫序如西漢未嘗舉髙祖配天之祀惟武帝作汶上明堂祠泰一五帝于明堂上坐合髙皇帝祠坐對之而三歲郊見于雍畤甘泉則未嘗有配天之祖也今此謂髙皇帝配天而又言居堂下則未有配神作主而坐堂下者也其義難曉姑錄以廣異聞蕙田案漢郊祀志載元始五年大司馬王莽奏稱孝文十六年祭泰一地祗以太祖髙皇帝配日冬至祠泰一夏至祠地祗皆并祠五帝而共一牲上親郊拜據此則髙皇帝之配泰畤自文帝始特史失載耳舊儀之言固有所本馬氏以爲其義難曉豈偶忽之耶三輔黄圖甘泉宮一曰雲陽宮秦所造在今池陽縣西故甘泉山宮以山爲名漢武帝建元中增廣之周十九里去長安三百里望見長安城黄帝以來圜丘祭天處遁甲開山圖云雲陽先生之墟也成帝永始四年行幸甘泉郊泰畤神光降于紫殿今案甘泉谷北岸有槐樹今謂玉樹根幹盤峙二三百年木也楊震關輔古語云耆老相傳咸以謂此樹即揚雄甘泉賦所謂玉樹青蔥也竹宮甘泉宮也以竹爲宮天子居中酉陽雜爼漢竹宮用紫泥為壇天神下若流火玉飾器七千枚舞女三百人一曰漢祭天神用萬二千杯養牛五歳重三千觔文獻通考馬氏曰王者祭天而以祖配之古今之通義祀典之首也舜攝政之初類於上帝禋於六宗望於山川徧於羣神湯代夏之初用𤣥牡告於上帝神后武王代殷之初告於皇天后土所過名山大川然則其所祀者天與六宗地與山川而已初無祀五帝之文周頌三十有一篇曰郊曰明堂曰柴望曰祈榖曰報祭曰類禡所以告神明之事備矣亦無祀五帝之樂章而祀五帝之說始於周禮先儒各以其意為之訓詁以爲五天帝者曰靈威仰赤熛怒白招拒汁光紀含樞紐也以爲五人帝者曰太皥炎帝黄帝少昊顓頊也姑以五天帝言之則此五帝皆天神之貴主五方之事者意其在祀典當與日月六宗並而亞於祀天者也秦襄公攻戎救周列爲諸侯而居西自以爲主少昊之神作西畤祠白帝太史公讀秦記以爲秦雜戎翟之俗作西畤用祀上帝僭端見矣位在藩臣而臚於郊祀君子懼焉然以愚攷之襄公以其有國於西也而祀少昊白帝是猶宋人之祀閼伯晉人之祀實沈耳非郊天也太史公誤矣自漢人既以祭畤爲郊天太史公習見當時之事而追尤秦襄之僭其實非也繼而諸畤並興或由夢蛇而爲鄜畤或因獲石聞雉而爲陳寶或由雨金而爲畦畤又繼而有青帝黄帝炎帝之祠俱以畤名之葢少昊白帝西方之神秦祠之宜也而并及青帝黄帝炎帝則非所祭而祭者也至於鄜畤陳寶之屬則皆秦中小神之爲淫厲而驚動禍福者秦人無知亦爲立畤而同於諸帝之祠漢人不攷復指四畤以爲郊天之事至髙祖立黑帝祠以備五畤而五帝俱祠矣然命有司進祠上不親往嗚呼安有郊見上帝而人主不親其事者乎往往見其所祠者叢雜冗泛是以姑諉之祠官修故事耳至孝文用新垣平之言而立渭陽五帝之廟孝武採謬忌之說而建泰一天皇之壇始親祠矣而皆謂之郊見夫郊事天之禮也諸方士言天神貴者泰一泰一佐者五帝則泰一五帝俱天上之神爾以神爲帝以祀神為郊而昊天上帝之祭固未嘗舉行也秦及漢初以郊祀事天之禮奉五帝至武帝時方士謬忌言泰一貴于五帝者也遂復以郊禮事泰一而五帝壇環居其下然終不聞舉祀天之禮至鄭康成遂剏為六天之說以為泰一五帝并昊天而六也葢異名而同體也然其說終難通葢方士之說至為誕謾然猶言天神貴者泰一泰一佐者五帝終不敢言泰一五帝即天也康成儒者乃剏六天之說何哉竊意泰一五帝之在天猶五嶽四瀆之在地也謂嶽瀆非地固不可而以方澤祠后土之禮事嶽瀆亦不可謂已祭嶽瀆而遂廢后土方澤之祠尤不可葢秦襄所祠少昊白帝耳然秦俗信鬼好祠至其子孫遂并青黄赤帝而祠之至漢髙帝立黑帝祠而以為事天之事畢矣葢其祠本不經而諸畤之怪妄尤甚髙祖明逹者也故雖有重祠敬祭之詔而卒不親享其亦有見於此矣漢初陋儒既不能有所建論乃若賈生賢而知禮者也親承宣室鬼神之問亦不能引經援古定郊社明堂祀天配祖之儀以革秦世之淫祠惜哉自是而後郊畤祠禮之豐殺每與方士之際遇相爲盛衰渭陽五帝之親祠也以新垣平平誅而帝怠於渭陽之祠而昊天上帝反不得比所謂泰一五帝者得享郊祀之祭髙祖剏業之太祖亦終西都之世不得享配天之祀豈不謬哉案郊祀志天子封泰山欲治明堂奉髙旁未曉其制濟南人公玉帶上黄帝時明堂圖於是上令奉髙作明堂汶上如帶圖及是歲修封則祀泰一五帝于明堂上坐合髙皇帝祠坐對之服䖍注曰漢是時未以髙祖配天故言對光武以來乃配之葢漢時泰一五帝之祠不一其在甘泉者曰郊畤三歲一親祠未嘗以祖配其在汶上者曰明堂武帝封泰山時所建方有髙帝並祠每修封則祠之終帝之世五修封而昭宣之後無幸泰山修封之事則廢其祭矣然髙皇帝之所並祠者泰一五帝不過天神之貴者則非配天也至成帝時匡衡請徙甘泉祠於長安定南北郊又言王者各以其禮制事天地非因異世所立而繼之今郊雍鄜宻上下畤本秦侯各以其意所立非禮所載漢興之初儀制未定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠因是皆罷并毀不應禮之祠四百七十五所然後祀禮稍正然終不能建議盡復三代以來郊祀明堂嚴父配天之禮而哀平之間怵於禍福之說南北郊與甘泉五畤互為罷復卒無定制至王莽秉政請復長安南北郊祭天而以髙祖配善矣然復以髙后配地祗而共祭則臆說不經為甚葢莽將簒漢故爲是崇隂教以媚元后而遂其盜權竊位之謀耳或曰匡衡之論正矣然史載初罷甘泉泰畤作南郊日大風壊甘泉竹宮折拔畤中樹木十圍以上百餘天子異之以問劉向而向以爲不當革上卒無繼嗣哀平短祚漢以中衰議者惑焉何也對曰千金之家其祖父奉淫昏之鬼以求福而爲之子孫者欲矯而正之則所舉者未必蒙福而所廢者祇以掇禍如諸畤之神雖不正然漢代秦而興不能以禮革之方且信方士之言愈加尊奉侔於事天其祭之也且歴七世百五十餘年則其靈響暴著也久矣固未易遽絶也漢之中衰諸儒劉向谷永固嘗預言之向以人事永以天運然則固非廢淫祠之咎也逮世祖中興建武郊天即採用元始故事而不復襲漢初之迹甘泉諸畤未嘗領之祠官加以尊奉而亦不聞其能驚動禍福以來紛紛之議則以其絶之有素也故曰君子以作事謀始蕙田案漢書王莽傳載其居攝元年祀帝南郊迎春東郊始建國元年郊祀黄帝以配天黄后配地又宗祀虞舜于明堂六年獻新樂於明堂莽之僭亂好為粉飾如此人而不仁如禮樂何今盡削之不足復汚簡牘也右西漢郊禮五禮通考卷六
