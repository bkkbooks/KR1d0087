body:
  text: 五禮通考卷一百八十一刑部尚書秦蕙田撰嘉禮五十四觀象授時蕙田案堯命羲和舜察璣衡紀數之書觀象之器法斯大顯周禮春官馮相氏掌十有二嵗十有二辰十日二十有八星之位辨其序事以㑹天位葢敬天授時固宗伯職也月㑹於辰而成月日紀於星而成嵗馮相所掌即唐虞日月星辰之事明矣夫寅賔之類以測象日宅嵎夷宅南交宅西宅朔方即後世里差之法星鳥之類以測象星即後世嵗差之法朞三百有六旬有六日以閏月定四時成嵗以測象月即後世嵗實及置閏之法聖王觀象授時皆隨時測驗以合大易取象于革之義厥後春秋時置閏無法食或違朔兩紀日南至先天者二三日梓慎禆竈史墨之徒長於禨祥短於推步漢初猶踵前弊東漢末迄隋唐漸有改更減斗分始於劉洪覺嵗差始於虞喜知日月之不平行始於張子信去平朔用定朔始於李淳風僧一行大衍推往古合朔上符仲康時季秋月朔辰弗集房之文較諸家得之為多元之授時成於郭守敬許衡王恂革去術元日分不用惟恃制器測景順天求合考正者七事創法者五事超軼諸家明之大統襲用授時迄其末季推步漸差交食無效時西法適來講求雖切終未施行惟我聖祖仁皇帝生知天縦達象緯之理探河洛之精定法著書正百代之舊章貽萬世之成憲唐虞典謨莫能尚也兹推本六經以著其原遞考累代以窮其變㑹歸本朝以集其成凡日月之纒離交食五星之遲疾伏見恒星之行而漸差及受六曜之凌犯皆有精算宻合惟太隂之本輪均輪由大而漸小黄赤二道距度由闊而漸狹斯則天行之革當隨時測驗焉觀象者可以審所從事矣易乾卦象𫝊天行健君子以自强不息疏萬物壯健皆有衰怠唯天運動日過一度葢運轉混没未曽休息故云天行健程子易𫝊乾道覆有之象甚大非聖人莫能體欲人皆可取法也故取其行健而已至健固足以見天道也朱子本義天一而已但言天行則見其一日一周而明日又一周非至健不能也語類天運不息非特四時為然雖一日一時頃刻之間其運未嘗息也李氏光地曰重乾之卦象天道之流行而不已也以形言之則日日而周以氣言之則嵗嵗而運以其命言之則於穆不已者是已𫝊取天行之顯為言則氣與命皆在其中矣蕙田案自地而上皆天也地為至静之體以居人物由是上之愈逺則旋轉愈速日月星麗乎天終古旋轉不已者天行至健使之然也昔人皆指恒星為天今西域言推步者以為恒星之上别有宗動天據中庸云日月星辰繫焉是恒星亦繫于天之象而不可専目之為天至健者乃天也日月星之行皆天行至健使之旋轉不息似不必更别為之名矣附論天體廣袤里數淮南子天文訓天去地五億萬里張衡靈憲八極之維徑二億三萬二千三百里南北則短減千里東西則廣増千里自地至天半於八極則地之深亦如之通而度之則是渾已將覆其數用重句股懸天之景薄地之義皆移千里而差一寸得之過此而往者未之或知也未之或知者宇宙之謂也宇之表無極宙之端無窮王充論衡天行三百六十五度積凡七十三萬里也其行甚疾無以為驗當與陶鈞之運弩矢之流相類似乎天行已疾去人髙逺視之若遲葢望逺物者動若不動行若不行後漢郡國志注帝王世紀曰周天三百六十五度四分度之一一度二千九百三十二里周天積百七萬九百一十三里徑三十五萬六千九百七十一里廣雅天圜南北二億三萬三千五百里七十五步東西短減四步周六億十萬七百里二十五步從地至天億一萬六千七百八十七里半下度地之厚與天髙等晉書天文志洛書甄曜度春秋考異郵皆云周天一百七萬一千里一度為二千九百三十二里七十一步二尺七寸四分四百八十七分分之三百六十二陸續云天東西南北徑三十五萬七千里此言周三徑一也考之徑一不啻周三率周百四十二而徑四十五則天徑三十二萬九千四百一里一百二十二步二尺二寸一分七十一分分之十周禮日至之景尺有五寸謂之地中鄭衆説土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭𤣥云凡日景于地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里矣日邪射陽城則天徑之半也體圓如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣以句股求弦法得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分天徑之數也以周率乗之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數也一度凡千四百六里二十四步六寸四分十萬七千五百六十五分分之萬九千四十九王氏應麟困學紀聞三五歴紀天去地九萬里春秋元命包陽極於九周天八十一萬里孝經援神契周天七衡六閒相去萬九千八百三十三里三分里之一合十一萬九千里從内衡以至中衡中衡以至外衡各五萬九千五里闗令内𫝊天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里天有五億五萬五千五百五十里地亦如之各以四海為脈周禮疏案考靈耀従上臨下八萬里天以圓覆地以方載河圗括地象西北為天門東南為地户天門無上地户無下極廣長南北二億三萬一千五百里東西二億三萬三千里月令正義考靈耀云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里是天圓周之里數也以圍三徑一言之直徑三十五萬七千里此二十八宿周迴直徑之數也然二十八宿之外上下東西各有萬五千里是為四遊之極謂之四表據四表之内并星宿内總三十八萬七千里天之中央上下正半之處一十九萬三千五百里地在於中是地去天之數也安定胡先生云南樞入地下三十六度北樞出地上三十六度狀如倚杵此天形也一晝一夜之間凡行九十餘萬里人一呼一吸謂之一息一息之間天行八十餘里人之一晝一夜有一萬三千六百餘息是故一晝一夜而天行九十餘萬里致堂胡氏謂天雖對地而名未易以智識窺非地有方所可議之比也明史天文志日月五星各有一重天其天皆不與地同心故其距地有髙卑之不同其最髙最卑之數皆以地半徑凖之太陽最髙距地為地半徑者一千一百八十二最卑一千一百零二太隂最髙五十八最卑五十二填星最髙一萬二千九百三十二最卑九千一百七十五嵗星最髙六千一百九十最卑五千九百一十九熒惑最髙二千九百九十八最卑二百二十二太白最髙一千九百八十五最卑三百辰星最髙一千六百五十九最卑六百二十五若欲得七政去地之里數則以地半徑一萬二千三百二十四里通之江氏永曰三角八線割圓之術因七政之行度比次其髙下而各重之天去地之數可得即恒星以上無法可算者亦可想而知矣姑以太陽與土星兩重天言之西史第谷測太陽行度得其髙卑之中處距地一千一百五十地半徑夫地半徑一萬四千一百三十餘里以一一五乗之則日去地有一千六百二十五萬七千五百餘里又地周九萬里亦以一一五乗之則日天之周一萬零三百五十萬里可謂大矣而猶未也火木土三星之天皆在日天之上而名星所行之嵗輪皆與日天等大因其行嵗輪一象限九十度視黄道上得㡬何度因以測其本輪均輪次輪之半徑而知此星之天去地視日天得若干倍火星不及約半倍木星不及約五倍土星行嵗輪九十度其視度五度半有竒其切線一萬零四百有竒夫輪之半徑十萬而五度半有竒之切線一萬零四百有竒則不止十之一其視日天之髙十倍有竒矣人設土星行最髙而當合伏其距地心一十一萬六千一百一十七有竒以太陽本天比例為十一倍人一三七三二四地半徑有一萬二千八百零八弱則土星最髙而合伏距地葢一萬八千零九十七萬餘里矣此以星行度實算得之非荒唐之比也土星之髙已如此矣而恒星之天又在土星之上雖無嵗輪可測算而以右旋之遲速約畧計之日一嵗而一周火星二年弱一周髙于日天半倍弱木星十二年弱一周髙于日天不及五倍土星二十九年半一周髙于日天不啻十倍恒星右旋二萬五千餘年一周則髙于日天甚逺可知矣唐書天文志呉中常侍王蕃考先儒所𫝊以戴日下萬五千里為句股斜射陽城考周徑之率以揆天度當千四百六里二十四步有餘今測日晷距陽城五千里已在戴日之南則一度之廣皆三分減二南北極相去八萬里其徑五萬里宇宙之廣豈若是乎然則蕃之術以蠡測海者也古人所以恃句股術謂其有證於近事顧未知目視不能及逺逺則㣲差其差不已遂與術錯原古人所以步圭影之意將以節宣和氣輔相物宜不在於辰次之周徑其所以重術數之意將欲恭授人時欽若乾象不在於渾葢之是非若乃述無稽之法於視聴之所不及則君子當闕疑而不議也王仲任葛稚川之徒區區于異同之辨何益人倫之化哉續文獻通考天度不可以里數論凡圜皆三百六十度在地面一度為二百里在天則距地愈逺而其度愈闊月天最卑距地最近者為地半徑五十倍有餘則一度已為一萬餘里馬端臨考引帝王世紀一度二千九百三十二里周天一百七萬九百一十三里其亦不足據矣蕙田案中庸之言天也曰及其無窮無窮之云盡之矣日月星辰天之垂象也有象可覩則有數可推列宿七曜之係乎天髙下不同而昔人之言天者或逺或近専指日之天乎抑合日月星辰共繫一重天乎以今日實測校之古人固甚懸殊然昔之衆說紛然各有里步尺寸之數推至㣲芒則亦各有測驗折算之法法有疎宻是以不等總之無闗理要存而勿論可也孟子有曰天之髙也星辰之逺也夫以至髙至逺而一日一周則速甚於流矢飛礟以今法計日之行一息之間七八千里又不止如胡氏所云八十餘里也此非所謂天行健乎唐書天文志獨持正論可以為前後之折衷云觀承案天大無外原不可以道里計度數求今所算者就日月星辰有形象處推測之耳日月星辰皆天之文恒星固非天之體矣若恒星之上無形無象渾然一天而已豈可復以重數分乎新法過於求宻又於其中分為宗動天與静天為二亦太鑿矣且聖人所以觀象授時者無非節宣和氣輔相物宜以為民生日用之常經耳其於視聴所不及者豈肯妄為論說以誣民哉唐志所論最為明確葢出歐公之筆歐公持論毎多正當不刋實超出五行天官諸家之上也右天行屈子天問圜則九重孰營度之惟兹何功孰初作之朱子曰離騷有九天之說注家妄解云有九天據某觀之只是九重葢天運行有許多重數裏面重數較輭在外面則漸硬想到第九重只成硬殻相似那裏轉得又愈緊矣明史天文志楚詞言圜則九重孰營度之渾天家言天包地如卵裹黄則天有九重地為渾圓古人已言之矣西洋之說既不背於古而有驗於天故表出之其言九重天也曰最上為宗動天無星辰毎日帶各重天自東而西左旋一周次曰列宿天次曰填星天次曰嵗星天次曰熒惑天次曰太陽天次曰金星天次曰水星天最下曰太隂天自恒星天以下八重天皆隨宗動天左旋然各天皆有右旋之度自西而東與蟻行磨上之喻相符新法算書周天諸曜位置有髙庳包函有内外去人有逺近第一最近為太隂太隂能食日能掩他星他星不能掩太隂第二為水星第三為金星第四為太陽第五為火星第六為木星第七為土星第八為恒星第九為宗動天中世於恒星天上又増東西嵗差一天南北嵗差一天共為十一重天此歌白泥所定也近第谷以來不復用之恒星本天在七曜天之上者其一緯星能掩恒星恒星不能掩緯星其一緯星有地半徑之差各去地有逺近而差有多寡恒星無地半徑差以較緯星必為極逺極髙其視地球正為一㸃也梅氏文鼎疑問問𫝊言日月星辰繫焉而今謂七政各有一天何據曰屈子天問圜則九重孰營度之則古有其語矣七政運行各一其法此其說不始西人也西人之說則謂日月五星各麗一天而有髙下其天動故日月五星動非七政之自動也且既各麗一天則皆天也雖有髙下而總一渾灝之體於中庸所謂繫焉者初無牴牾也然則何以知其有髙下此亦古所有但言之未詳耳古今術家皆言月在太陽之下故月體能蔽日光而日為之食是日髙月下日逺月近之證也又步日食者以交道表裏而論其食分隨地所見深淺各異考此方見食既者越數千里而僅虧其半古人立法謂之東西南北差是則日之下月之上相距甚逺之證也又月與五星皆能掩食恒星是恒星最在上而於地最逺也月又能掩食五星是月最在下而於地最近也五星又能互相掩是五星在恒星之下月之上而其所居又各有髙下於地各有逺近也嚮使七政同在一規而無髙下之距則相遇之時必相觸擊何以能相掩食而過乎是故居七政之上最近大圜最逺於地者為恒星恒星之下次為土星又次為木星次為火星次為太陽為金為水最近於地者為月以視差言之與人目逺者視差㣲近則視差大故恒星之視差最㣲以次漸増至月而差極大也以行度言之近大圜者為動天所掣故左旋速而右移之度反遲故左旋之勢恒星最速以次漸遲至月而為最遲也右移之度恒星最遲以次漸速至月而反最速也是二者宛轉相求其數巧合髙下之理可無復疑夢溪筆談以月盈虧明日月之形如九可謂明悉而又以問者之疑其如丸則相遇而相礙故輒漫應之曰日月氣也有形無質故相值而無礙此則未明視差之理為智者千慮之失蕙田案七政各有一天天動而七政隨之各有所行之道各有所行之道則各有一極故七曜左旋非七曜自旋其極順天左旋也至於迴環右轉極未嘗逆移其本天斜動則其道側溯而右也其遲速不等則因天有重數之故古人定為九重天自為天太虛無窮一也恒星二也鎮星三也嵗星四也熒惑五也太陽六也太白七也辰星八也太隂九也皆成大圜而其行有法故曰圜則九重則法也朱子謂外第九重轉得愈𦂳其理誠然惟在外左旋勢𦂳故在内各天左轉之機漸近而漸舒右轉之勢反漸疾皆重數使之然也又案歐邏巴十二重天之說恒星七曜而外曰東西嵗差曰南北嵗差曰宗動曰常静嵗差二重步算家不用梅勿菴亦嘗疑其不足據而信宗動常静為近理北極赤道繫之宗動天者也雖去嵗差二重而顯然可指數猶十重何以古人但言九天葢太虚無窮十與十二皆不足以盡之天數極於九恒星七曜適有八重併其逺而無所至極者為九乃至健之天也至健運行以北辰為之樞紐以赤道為之中紘既動而不息亦静而有常大易所謂天行健魯論所謂居其所其動静合一之理乎觀承案天一而已安得有許多重數然以恒星七政各行一重天而為八則并太虛天體一重而為九古語圜則九重自然穏確西法乃於太虚天中分静天與宗動為二重又於恒星天上分出東西差南北差為二則有十二重天矣歐邏巴之說豈非鑿空已甚乎今能一一為之析其中當為術家不刋之定論也右天九重易說卦𫝊乾為天為圜疏天動運轉故為圜也坤為地繫辭𫝊天尊地卑乾坤定矣卑髙以陳貴賤位矣注天尊地卑之義既列則涉乎萬物貴賤之位明矣動静有常剛柔㫁矣注剛動而柔止也動止得其常體則剛柔之分著矣方以類聚物以羣分吉凶生矣注方有類物有羣則有同有異有聚有分也順其所同則吉乖其所趣則凶故吉凶生矣在天成象在地成形變化見矣注象况日月星辰形况山川草木也懸象運轉以成昏明山澤通氣而雲行雨施故變化見矣法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也禮記中庸今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣大載華嶽而不重振河海而不洩萬物載焉注昭昭猶耿耿小明也振猶收也大戴禮記單居離問於曽子曰天圓而地方者誠有之乎曽子曰天之所生上首地之所生下首注人首圓足方因繫之天地上首之謂員下首之謂方參嘗聞之夫子曰天道曰圓地道曰方道曰方圓耳非形也素問黄帝曰地之為下否乎岐伯曰地為人之下太虛之中也曰憑乎曰大氣舉之也邵子觀物篇曰天何依曰依地地何附曰附天曰天地何所依附曰自相依附朱子曰氣之清者便為天為日月為星辰只在外常周環運轉地便只在中央不動不是在下天運不息晝夜輥轉故地榷在中間使天有一息之停則地須陷下周髀算經春分之日夜分以至秋分之日夜分極下常有日光春秋分者晝夜等春分至秋分日内近極故日光照及也秋分之日夜分以至春分之日夜分極下常無日光秋分至春分日外逺極故日光照不及也冬至夏至者日道發歛之所生也發猶往也歛猶還也故日運行處極北北方日中南方夜半日在極東東方日中西方夜半日在極南南方日中北方夜半日在極西西方日中東方夜半凡此四方者晝夜易處加四時相及然其隂陽所終冬至所極皆若一也天象葢笠地法覆槃見乃謂之象形乃謂之法在上故凖葢在下故擬槃象法義同葢槃形等互文異器以别尊卑仰象俯法名號殊矣梅氏文鼎曰周髀算經雖未明言地圓而其理其算已具其中矣試畧舉之周髀言北極之下以春分至秋分為晝秋分至春分為夜葢惟地體渾圓故近赤道則晝夜之長短漸平近北極則晝夜長短之差漸大推而至北極之下遂能以半年為晝半年為夜矣若地為平面則南北晝夜皆同安得有長短之差隨北極髙下而異乎一也周髀又言日行極北北方日中南方夜半日行極東東方日中西方夜半日行極南南方日中北方夜半日行極西西方日中東方夜半葢惟地體渾圓與天體相似太陽隨天左旋繞地環行各以其所到之方正照而為日中正午其對衝之方在地影最深之處而即為夜半子時矣假令地為平面東西一望皆平則日一出地而萬國皆曉日一入地而八表同昏安得有時刻先後之差而且有此方日中彼為夜半者乎二也周髀又言北極之下不生萬物北極左右夏有不釋之冰物有朝耕暮穫中衡左右冬有不死之草五穀一嵗再熟葢惟與天同為渾圓故易地殊觀而寒暑迥别北極下地即以北極為天頂而太陽周轉近於地平陽光希㣲不能解凍萬物不生矣其左右猶能生物而以春分至秋分為晝故朝耕而暮穫也若中衡左右在赤道下以赤道為天頂春分時日在赤道其出正卯入正酉並同赤道正午時日在天頂其熱如火即其方之夏春分以後日軌漸離赤道而北至夏至而極其出入並在正卯酉之北二十三度半有竒正午時亦離天頂北二十三度半竒其熱稍減而凉氣以生為此方之秋冬矣自此以後又漸向赤道行至秋分日復在赤道出入正卯酉而正過天頂一如春分熱之甚亦如之則又為其方之夏矣秋分後漸離赤道而南直至冬至又離赤道南二十三度半竒而出入在正卯酉南正午亦離天頂南並二十三度半竒氣候復得稍凉又為秋冬是故冬有不死之草而五穀一嵗再熟也又其方日軌毎日左旋之圏度並與赤道平行而終嵗晝夜皆平上條言地近赤道而晝夜之差漸平以此故也赤道既在天頂則北極南極俱在地平可見然但言北極不言南極者中土九州在赤道北聖人觀象祇據所見之北極出地而精其測算即南極可以類推然又言北極下地髙旁陀四隤而下即地圓之大致可見非不知地之圓也即如日月交蝕常在朔望則日食時日月同度為月所掩亦易知之事而春秋小雅但云日有食之古聖人祇舉其可見者為言皆如是也李氏光地曰天圓地方之說葢以動静體性言之實則形氣渾淪相周古人卵中裹黄之喻是已術家又以地平為說亦即目所察天在地之上下隠顯各半而名之爾夫至順極厚非方非平髙下相循渾淪旁薄者地之本體然也其南北兩端以去日逺近為寒暑之差東西以見日早晚為晝夜之度東之夜乃西之晝南之暑乃北之寒也如是則東西南北安有一定之中南北或以極為中或以赤道為中者亦天之中非地之中也此理周髀言之至悉而漢氏以下莫有知者近新天文家侈為獨得痛詆前說㡬數萬言惜乎無以髀葢之術告之者觀承案西法之與古合不獨一二端也凡今西人所詫為獨得者昔之聖人固知之而有宋大儒亦已明言之矣如以地為渾體南北東西隨處改移者即程子地形有髙下無適而不為中之謂也又云日月五星各行一重天即朱子天運行有許多重數之謂也其云宗動天行有常度故恒星東移而為嵗差之根則朱子要當先論太虚天行之論已該之矣其曰日月五星各有一輪亦即朱子大輪小輪有急有慢之謂也又曰月與五星有本輪又有次輪本輪以従天次輪以法日即邵子星法月月法日日法天星月法天又法日之謂也又如九執回回等書以整數三百六十度紀周天之行而不用竒零其實邵子元㑹運世之法已然葢本之大易凡三百有六十當朞之日而定為整數非預襲乎西法也又曰金水與日同天而其兩輪包日是即張子金水附日前後進退而行之謂也是知儒者之學原無所不包葢理明則象數自該特膚學或未之思耳續文獻通考地圓之說以古八寸之尺而言南行二百五十里而北極低一度北行二百五十里而北極髙一度若以今十寸之尺而論則二百里而差一度地全周三百六十度為七萬二千里全徑為二萬二千九百一十八里又十分里之三半徑為一萬一千四百五十九里又二十分里之三以圓三徑一約畧計之則地之全徑為二萬四千里半徑為一萬二千里也又東西亦二百五十里而差一度乃以赤道下地之大徑而言若赤道南北則其度漸狹至南北極之下則三百六十度止一轉丸而已李氏光地曰里差之說具于周髀而其學不𫝊已數千載郭太史分方測候二十七處其於里差詳焉新法以地為圓體南北東西隨處轉移故南北則望極有髙下東西則見日有早莫望極有髙下而節氣之寒暑因之矣見日有早莫而節氣之先後因之矣推之四海而外四方上下可以按度而得其算揆象而周其變其說與周髀合梅氏文鼎曰南行二百五十里則南星多見一度而北極低一度北行二百五十里則北極髙一度而南星少見一度若地非正圓何以能然至於水之為物其性就下四面皆天則地居中央為最下水以海為壑而海以地為根水之附地又何疑焉所疑者地既渾圓則人居地上不能平立也然吾以近事徴之江南北極髙三十二度浙江髙三十度相去二度則其所戴之天頂即差二度江南天頂去北極五十八度浙江天頂去北極六十度各以所居之方為正則遥看異地皆成斜立又况京師極髙四十度瓊海極髙二十度京師以去北極五十度之星為天頂瓊海以去北極七十度之星為天頂若自京師而觀瓊海其人立處皆當傾跌瓊海望京師亦復相同而今不然豈非首戴皆天足履皆地初無欹側不憂環立歟然則南行而過赤道之表北遊而至戴極之下亦若是已矣觀承案西法實多創論為舊法所未及然有言之太過處夫謂地體渾圓各以戴天為天履地為地但就地之南北東西論其髙下殊觀之勢則可耳至謂四方上下各有國土人居而連上下言之則荒誕之說也据其法亦有北極之下不生草木之云可知不生草木即不能有國土人居矣江氏永曰地為圓形周圍九萬里南北則以二極之低昻而知之南北行二百五十里極髙下差一度東西則以月食之蚤晚而知之地赤道經東西相距七千五百里則月食先後差一時此惟善測者能信地之綿亘甚廣其圓也以漸人雖繞地行一周恒以足履地首戴天必無倒立之時水之附地而繞亦猶是也今試汎舟於江湖登舟之髙處望之水之來不見其端水之去不見其尾但覺㣲有灣環之形惟舟所到即是髙處此何也人目能望數十里此數十里即以漸而圓故也而地圓之最可見者如月食於地景月之虧必作灣形由地景圓故也使地不圓何以有此圓景乎易大𫝊曰坤至静而徳方中庸曰振河海而不洩皆地圓之證也方言其徳則形體非方可知矣水附於地而流地振之而不洩則地面四周有水非是水載可知矣蕙田案西域本法毎年三百六十五日四年而閏一月即漢時四分術法周髀之經嵗是也其言地圓亦皆周髀之緒餘則其術之本于中法明矣右天地之體論語子曰為政以徳譬如北辰居其所而衆星共之注包曰徳者無為猶北辰之不移而衆星共之朱子集注北辰北極天之樞也居其所不動也共向也言衆星四面旋繞而歸向之也語類北辰是那中間無星處這些子不動是天之樞紐北辰無星縁人要取此為極不可無箇記認就其旁取一小星謂之極星這是天之樞紐問極星動不動曰也動只是近那辰雖動不覺又曰未嘗不動而動于其所故注謂之不動邵子曰天之無星處皆辰爾雅釋天北極謂之北辰蕙田案北極天之至中謂之辰者無星而有其位也北極正相對為南極二極之中紘古今皆謂之赤道去南北極四周皆平等日月星八重之天循黄道而行各有所行之道南北不定惟赤道為一定之界七曜各有一道則各有一極其極皆動移而惟北極不動赤道云者赤猶空也空設此道以判南北七政不附麗而行也北辰今謂之赤極言其為赤道之極云耳俗言赤手赤貧皆取空義隋書天文志北極五星鈎陳六星皆在紫宫中北極辰也其紐星天之樞也天運無窮三光迭耀而極星不移故曰居其所而衆星共之賈逵張衡蔡邕王蕃陸績皆以北極紐星為樞是不動處也祖暅以儀凖候不動處在紐星之末猶一度有餘宋史天文志沈括議曰前世皆以極星為天中自祖暅以璣衡窺考天極不動處乃在極星之末猶一度有餘臣考驗極星更三月而後知天中不動處逺極星乃三度有餘蕙田案極星離北辰逺近自祖暅始考之祖氏測離一度有餘者梅氏文鼎以為真度恐未及一度宋沈氏測離三度有餘者梅氏以為在二度左右皆言其所用儀器測有未確元志郭守敬測極星離不動處三度若夫極星所以動移由於恒星差言嵗差者所當知也晉書天文志劉洪曰周天三百六十五度五百八十九分度之百四十五半覆地上半在地下其二端謂之南極北極北極出地三十六度南極入地三十六度兩極相去一百八十二度半彊繞北極徑七十二度常見不隠謂之上規繞南極七十二度常隠不見謂之下規李氏光地曰上規下規之中相去一百餘度其最中為天之紘帶紘之内外三十度許為日月五星之行謂之中規戴氏震曰上下規隨地不同南行二百餘里北極差低一度其上下規周圍各減小一度北行二百餘里北極差髙一度其上下規周圍増大一度凡増減一度於徑為二度唐以後測北極始詳地體渾圜與天相應此其明徴也右北極周髀算經欲知北極樞璿周四極極中不動璿璣也言北極璿璣周旋四至極至也常以夏至夜半時北極南遊所極游在樞南之所至冬至夜半時北游所極游在樞北之所至冬至日加酉之時西游所極游在樞西之所至日加卯之時東游所極游在樞東之所至此北極璿璣四游正北極璿璣之中正北天之中戴氏震曰今人所謂赤極者即魯論之北辰周髀之北極樞也今所謂黄極者黄道之極即周髀之北極璿璣也虞書察璿璣玉衡以齊七政葢設璿璣以擬黄極故周髀即以璿璣為黄極之名或言古人不知有黄極非也黄極赤極古通曰北極而已此云北極南游則専指黄極為北極而赤極乃謂之正北極黄極毎晝夜環繞赤極一周而又過一度冬至夜半黄極在赤極下正北之位是為北游所極卯時在赤極左正東之位是為東游所極午時在赤極上正南之位是為南游所極酉時在赤極右正西之位是為西游所極此一日之四游所極也冬至夜半起于正北一周而過一度雖毎日之推移甚徴漸進而至四分周之一則春分夜半實為東游所極故夏至夜半南游所極秋分夜半乃西游所極此一嵗之四游所極也古者冬夏致日但舉二至則二分可知又錯舉冬至卯酉則毎日皆可知矣日月星隨天左旋實由於黄極環繞赤極為左旋之根周髀數言其虞書之義疏乎璿璣玉衡之制可因是而推求矣蕙田案古人十二月建當因黄極之一嵗而周四游定名試以赤極為中子午卯酉正嚮順布均分十有二宫冬至夜半黄極在正北子位是為建子毎晝夜一周又過一度古度法小寒則過丑宫大寒正當丑位是為建丑立春過寅宫雨水正當寅位是為建寅驚蟄過卯宫春分當正東卯位是為建卯清明過辰宫穀雨正當辰位是為建辰立夏過已宫小滿正當已位是為建已芒種過午宫夏至當正南午位是為建午小暑過未宫大暑正當未位是為建未立秋過申宫處暑正當申位是為建申白露過酉宫秋分當正西酉位是為建酉寒露過戌宫霜降正當戌位是為建戌立冬過亥宫小雪正當亥位是為建亥大雪過子宫冬至復於建子如此終古不變非若斗杓所指隨嵗差改移也正極之所游冬至日加酉之時立八尺表以繩繋表顛希望北極中大星引繩致地而識之顛首希仰致至也識之者所望大星表首及繩至地參相直而識之也又到旦明日加卯之時復引繩希望之首及繩致地而識其端其兩端相去正東西以繩至地所謂兩端相直為東西之正也中折之以指表正南北所識兩端之中與表為南北之正加此時者皆以漏揆度之冬至日加卯酉者北極之正東西日不見矣以漏度之者一日一夜百刻從半夜至日中從日中至夜半無冬夏常各五十刻中分之得二十五刻極加卯酉之時揆亦度也戴氏震曰正極之所游者正猶定也凖也近冬至前後卯酉見星故於是時希望以定東西南北四嚮既凖即黄道之四游所極也其距赤極之度恒如黄道距赤道最逺之度二至太陽行黄道距赤道二十三度竒步算家所謂黄赤距緯者是宋書天文志呉太常姚信造昕天論曰嘗覽漢書云冬至日在牽牛去極逺夏至日在東井去極近欲以推日之長短信以太極處二十八宿之中央雖有逺近不能相倍今昕天之說以為冬至極低而天運近南故日去人逺而斗去人近夏至極起而天運近北斗去人逺日去人近極之起時日行地中淺故夜短極之低時日行地中深故夜長蕙田案漢書所謂去極逺近者其極赤極也姚信所謂太極處二十八宿之中央而有時低有時起者其極黄極也冬至夜半黄極正值子位在赤極下是為極低日去黄極四分天周之一去赤極又加二十三度竒是以日行近南夏至夜半黄極正值午位在赤極上是為極起日去黄極四分天周之一去赤極則減二十三度竒是以日行近北赤極所謂北辰常不動者也黄極毎晝夜環繞赤極而又過一度則隨四時而遞改故冬夏至之夜半或低或起不同日近北則行地中淺近南則行地中深此中土地勢然耳若赤道之下四時之晝夜皆平葢南北地勢晝夜不同寒暑亦異繫乎赤道之南北二極者也姚信昕天論偶然得解未深究赤極黄極之分及赤道黄道運旋之所以然當時槩以好竒目之是以黄道之南北兩極周髀而外鮮有能推明者矣姑附其說論之江氏永曰太陽若宗北極則恒行赤道無寒暑進退何以能生萬物有北極赤道又有黄極黄道所以能成變化也葢北極體也黄極用也北極為心黄極繞之而成圏則又未嘗不宗北極也右黄極李氏光地曰西法有赤極又有黄極愚嘗妄意不獨黄有極耳自恒星以至月天皆有極也葢樞紐長繋者惟宗動為然觀極星之離樞漸逺則恒星又有極可知矣日月五星則其明著者也江氏永曰七政各行一道即各有所宗之極北極為心黄極環繞而成一圏月與五星之極皆以黄極為心各環之而成小圏水星圏最大月次之金次之土次之火次之木次之皆載於黄極圏之上各有條理小圏自内而外由近而逺木火土金水似順五行相生之序月亦水類在金水之間觀承案九重天内五星惟鎮星最在上則従上數下當為土木火金水今依江氏此說又似鎮星在火下故為木火土金水而順五行相生之序然則重數之次序原無一定可意為之矣其然乎右月五星恒星之極後漢書志天之動也一晝一夜而運過周星從天而西日違天而東日所行與運周在天成度在紀成日日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦日月之行則有冬有夏冬夏之間則有春有秋故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道歛北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉極建其中道營於外璇衡追日以察發歛光道生焉孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉日有九道月有九行九行出入而交生焉朔㑹望衡鄰於所交虧薄生焉戴氏震曰日違天而東者寒暑發歛之所以然恒星亦有東移之度但所差甚㣲㡬於不覺乃嵗差之所以然漢人未知嵗差故云星従天而西耳若考其實理則觀於晝夜日月星皆從天而西宗北極也觀於發歛出入日月星皆違天而東宗黄極也蕙田案日月五星右旋漢以後算家並同又案以上論日月星右旋宋書天文志夏紀列宿日月皆西移列宿疾而日次之月最遲故日與列星昏俱入西方後九十一日是宿在北方又九十一日是宿在東方九十一日在南方此明日行遲於列宿也月生三日日入而月見西方至十五日日入而月見東方將晦日未出乃見東方以此明月行之遲於日而皆西行也蕙田案列宿日月西移者晝夜之象也以晝夜言日行速於月宋儒日月星並左旋之說同此劉向五紀論洪範𫝊曰晦而月見西方謂之朓朓疾也朔而月見東方謂之側匿側匿遲不敢進也星辰西行史官謂之逆行此三説夏紀皆違之迹其意好異者之作也唐書大衍術議日月合度謂之朔無所取之取之蝕也昔人考天事多不知定朔假蝕在二日而常朔之晨月見東方食在晦日則常朔之夕月見西方理數然也而或以為朓朒變行或以為算術疎闊遇常朔朝見則増朔餘夕見則減朔餘此數法所以屢遷也春秋日食不書朔者八公羊曰二日也穀梁曰晦也左氏曰官失之也劉孝孫推俱得朔日以丘明為是乃與劉焯皆議定朔為有司所抑不得行傅仁均始為定朔而曰晦不東見朔不西朓梅氏文鼎曰月之行有遲疾日之行有盈縮皆有一定之數故可以小輪為法也而古惟平度於是占家曰晦而月見西方謂之朓朓則侯王其舒朔而月見東方謂之仄慝仄慝則侯王其肅戴氏震曰案夏紀云月生三日見西方即禮記所謂三日而成魄揚雄所謂月未望則載魄于西是也本不指晦為言夏紀云將晦日未出乃見東方即揚雄所謂既望則終魄于東是也亦非指晦至若朓與側匿逆行之説則由不知日月五星有髙下迴環之行以生遲疾留逆而誤以為平行占家之妄也劉向所舉三事皆失理其致辨夏紀者又非夏紀本意張子正蒙天左旋處其中者順之少遲則反右矣朱子語類問天道左旋自西而東日月右行則如何曰横渠説日月皆是左旋說得好葢天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好比天進一度則日為退一度二日天進二度則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天㑹而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退十三度有竒進數為順天而左退數為逆天而右蕙田案步算家據列宿以考七政行度故指列宿為天夏紀但言列宿不曰天最分明葢一晝夜一周天而常過一度者列宿也天至健不可以周計列宿七曜因天旋轉猶舟浮於水順流而下舟行各有遲疾皆可里計水流之遲疾則無從里計者也月行不及十三度竒者不及列宿也若論太虚中從起處起而復于其處則一晝夜僅差十二度竒為不及天周至列宿西移而過滿一嵗之日所進過之度㡬及一周而㣲差此云所進過之度恰周得本數者約舉成數而言未計嵗差故也問經星左旋緯星與日月右旋是否曰今諸家皆如此説横渠說天左旋日月亦左旋看來横渠之說極是只恐人不曉所以詩𫝊只載舊說或曰此亦易見如以一大輪在外一小輪載日月在内大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月是右轉曰然又曰天道左旋日月星並左旋星不是貼天天是隂陽之氣在上面下人看見星隨天去耳蕙田案朱子此條别天與列宿五星不使混同然則謂天左旋一周而過一度者特仍步算家之舊耳蔡氏沈曰天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲故日行一日亦繞地一周而在天為不及一度月麗天而尤遲一日常不及天十三度十九分度之七明史天文志帝與羣臣論天與七政之行皆以蔡氏左旋之説對帝曰朕自起兵以來仰觀乾象天左旋七政右旋數家之論確然不易爾等猶守蔡氏之説豈所謂格物致知之學乎蕙田案蔡氏說本之張子朱子明太祖以為非在今日則左旋為儒者之說右旋為數家之說夫日月五星附麗於天何至與天行相反故以為順天左旋况晝夜見之左旋不已也此儒者所守之理及執䇿推數立表驗晷日有發歛月五星有内外出入不同一道不宗一極逆溯者乃其實象初非以進為退取便積算也故㫁然以為右旋此數家所守之實今以黄極環繞明左旋之理以黄道側遡明右旋之實二説並行而不悖矣附此兩條以備參考梅氏文鼎疑問問天左旋日月五星右旋中西兩家所同也自横渠張子有俱左旋之説而朱子蔡氏因之近者臨川揭氏建寧游氏又以槽丸盆水譬之此孰是而孰非曰皆是也七曜右旋自是實測而所以成此右旋之度則因其左旋而有動移耳何以言之七曜在天每日皆有相差之度術家累計其毎日差度積成周天中西新舊之法莫不皆然夫此相差之度實自西而東故可以名之右旋然七曜毎日皆東升西降故又可以名之左旋西法謂七曜皆有東西兩動而並出於一時葢以此也夫既云動矣動必有所向而一時兩動其勢不能古人所以有蟻行磨上之喻而近代諸家又有人行舟中之比也七曜如人天如舟舟揚帆而西人在舟中向舟尾而東行岸上望之則見人與舟並西行矣又天之東升西没自是赤道七曜之東移於天自是黄道兩道相差南北四十七度自短規至長規合之得此數雖欲為槽丸盆水之喻而平面之行與斜轉之勢終成疑義安可以遽廢右旋之實測而從左轉之虚理哉然吾終謂朱子之言不易者則以天有重數耳曰天有重數何以能㫁其為左旋曰天雖有層次以居七曜而合之總一渾體故同為西行也同為西行矣而仍有層次以生㣲差層次之髙下各殊則所差之多寡亦異故七曜各有東移之率也然使七曜所差只在東西順逆遲速之間則槽丸盆水之譬亦已足矣無如七曜東移皆循黄道而不由赤道則其與動天異行者不徒有東西之相違而且有南北之異向以此推知七曜在各重之天皆有定所而其各天又皆順黄道之勢以黄道為其腰圍中廣而與赤道為斜交非僅如丸之在槽沙之在水皆與其器平行而但生退逆也丸在槽與其盤為平面沙在水與其器為平面故丸與盤同運而生退逆水與沙並旋而生退逆其順逆兩象俱在一平面葢惟其天有重數故能動移惟其天之動移皆順黄道斯七曜東移皆在黄道矣是故左旋之理得重數之說而益明曰謂右旋之度因左旋而成何也曰天既有重數矣而惟恒星天最近動天故西行最速㡬與動天相若六七十年始東移一度自土星以内其動漸殺以及於地球是為不動之處則是制動之權全在動天而恒星以内皆隨行也使非動天西行則且無動無動即無差又何以成此右旋之算哉其勢如陶家之有鈞盤運其邊則全盤皆轉又如運重者之用飛輪其運動也亦以邊制中假令有小盤小輪附於大鈞盤大飛輪之上而别為之樞則雖同為左旋而因其制動者在大輪其小者附而隨行必相差而成動移以生逆度又因其樞之不同也雖有動移必與本樞相應而成斜轉之象焉此之斜轉亦在平面非正喻其平斜但聊以明制動之勢夫其退逆而右也因其兩輪相疊其退轉而斜行也因於各有本樞而其所以能退逆而斜轉者則以其隨大輪之行而生此動移也若使大者停而不行則小者之逆行亦止而斜轉之勢亦不可見矣朱子既因舊說釋詩又極取張子左旋之説葢右旋者巳然之故而左旋者則所以然之理也西人知此則不必言一時兩動矣故揭氏以丸喻七曜只可施於平面而朱子以輪載日月之喻兼可施諸黄赤與西說之言層次者實相通貫理至者數不能違此心此理之同洵不以東海西海而異也問天有重數則在外者周徑大而其度亦大故土木之行遲在内者周徑小而其度亦小故金水月之行速七政之行勢畧同特其度有大小而分遲速耳以是為右旋之徴不亦可乎曰此必七政另為一物以行於本天之上故可以度之大小為遲速也今七政既與天同體而非另為一物則七政之東升西没即其本天之東升西没也且使各天之行各自為政則其性豈無緩急而自外至内舒亟之次如是其有等乎葢惟七政之天雖有重數而總為一天制動之權全在動天故近動天者不得不速近地而逺動天者不得不遲固自然之理勢也曰若是則周徑大小可勿論矣曰在外者為動天所掣而西行速故其東移之差數遲又以其周徑大而分度闊則其差又遲是故恒星六七十年而始差一度近動天也然以周徑之大小准之此所差之一度以視月天將以周計矣在内者逺於動天而西行遲故其東移之差速又以其周徑小而分度狹則其差又速是故月天一日東移十三四度者近地而逺動天也然以周徑計之此所差之十三四度以視日天尚不能成一度矣然則周徑之大小但可兼論以考其差而非所以遲速之原也左旋之說可以無疑戴氏震曰案天左旋日月五星右旋漢以來步算家之通說也天左旋處其中者順之少遲則反右矣宋儒張子朱子之創論也稽之於古夏歴已有列宿日月皆西移之言求之於今又得梅氏反覆申明其義然執是以告步算家知其必不從試就赤道黄道論之赤道正而黄道斜絡之者也赤極不動而黄極毎晝夜必環繞之以成一圏者也黄極毎晝夜環繞赤極一周日在黄道上因之一周此之謂順天左旋其旋也宗赤極而不宗黄極黄極者黄道之樞樞既乗動機左旋于中其道則成迴環之勢右轉於外假使黄道毎晝夜斜行而左旋黄極居其所不動則日出没非東西正位而列宿皆旋繞黄極矣何以東升西没必正相對也列宿皆環繞赤極不繞黄極也以是言之左旋者乃黄極而不可言日躔黄道為左旋明矣又假使黄極既左旋日在黄道上又自為左旋兩者俱左勢必愈速則黄極不及繞一周日所到已成晝夜恒星既宗黄極何以能過之假使恒星亦自左旋彌速于日則是黄極不及繞一周者列宿皆不及一天周又自為轉而竟過之不㡬恒星距赤極一晝夜即覺其大差乎以是言之黄極晝夜左旋日躔黄道未嘗自為左旋明矣日躔黄道不自為左旋而假使日竟不動則日終古止於其處無有發歛何以成寒暑往來以是言之日躔黄道必有動移而其動移也既不左旋則必移而右轉明矣惟日躔黄道有迴環右轉之勢則一左一右其勢少遲日一周而成晝夜黄極環繞一周而又過一度列宿皆左旋過日一度恒星循黄道迴環右轉者甚㣲故其距赤極毎晝夜不覺差移也或曰列宿七曜既順天左旋矣又迴環右轉豈一時兩動之謂乎曰非也左族者諸曜未嘗動也隨黄極環繞而俱左耳右轉者黄極未移也諸曜在其中紘側溯而右耳其左族也赤極居中赤道正而黄道斜黄極與日月星皆環繞之其右旋也黄極居中黄道正而月五星之天斜絡之日毎嵗一周而恒星毎嵗亦有分秒之推移葢左旋者天道本然而右族者動機迴環之勢也朱子喻以兩輪梅氏推及不同樞學者猶疑於其言似日月星在天徒隨天左旋而有遲速無復右旋之實與實測不合愚則以樞左旋甚速明東升西降之本以輪在外稍成迴環之勢明右旋之因然後左旋右旋皆實有測驗不敢為空談以㫁乎此蕙田案天體左旋運行不息乾象𫝊提揭最明葢易有太極是生兩儀太極動而生陽合下便是乾體故其性純陽而至健自東而西西而復東旋轉如輪晝夜不舍其所以必自東而西者易說卦曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮東南陽方西北隂方自陽處動起葢其性然也後之人因名曰左旋左右者本因人身之手而得名南北東西隨其所向反復出入更迭互用原無定體此所以名曰左者萬物負隂而抱陽聖人南面而聴天下嚮明而治天之運行恰自左而右故曰左旋凡日月五星悉隨而轉故離彖𫝊曰日月麗乎天中庸謂日月星辰繫焉繫也麗也明與天為體而無異理禮記曰大明生於東月生於西此隂陽之分順逆之理也至若日月五星别有右轉之度恒星有東移之差推原厥故實由日月星不循赤道而循黄道有髙下逺近疾遲之異不能不迴環逆溯各自為勢者西法謂日月五星各有天而行皆有輪雖望之麗天而實循輪而行其理如珠逐盤旋漩隨水去雖急轉長逝而復自作迴環之勢此日月五星所以盈縮遲疾雖左旋而有右轉之象也又案以上論日月星隨天左旋右左旋右旋五禮通考卷一百八十一
