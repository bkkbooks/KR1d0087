body:
  text: 五禮通考卷一百四十六刑部尚書秦蕙田撰嘉禮十九飲食禮儀禮䘮服為人後者傳曰何如而可為之後同宗則可為之後何如而可以為人後支子可也疏此問其取後取何人為之答以同宗則可為之後以其大宗子當收聚族人非同宗則不可謂同承别子之後一宗之内若别宗同姓亦不可也又云支子可也以其他家適子當家自為小宗小宗當收歛五服之内亦不可闕則適子不可後他故取支子支子則第二已下庶子也不言庶子云支子者若言庶子妾子之稱嫌謂妾子得後人適妻第二已下子不得後人是以變庶言支支者取支條之義不限妾子而已若然適子既不得後人則無後亦當有立後之義也為人後者孰後後大宗也曷為後大宗大宗者尊之統也禽獸知母而不知父野人曰父母何筭焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子監本正誤子誤作人不得後大宗注收族者謂别親疎序昭穆當疏云為人後者孰後後大宗也案何休云小宗無後絶與此義同云曷為後大宗此問必後大宗之意云大宗者尊之統也者明宗尊統領族人有族食族燕齒序族人之義是以湏後不可絶也云禽獸以下因上尊宗子遂廣申尊祖以及宗子之事也學士謂鄉庠序及國之大學小學之學士雖未有官爵以其習之四術閑之六藝知祖義父仁之禮故敬父遂尊祖得與士大夫之貴同也諸侯及其大祖天子及其始祖皆是爵尊者其徳所及逺也云適子不得後大宗者以其自當家主事并承重祭祀之事故也天子始祖諸侯及大祖並於親廟外祭之是尊統逺大夫三廟適士二廟中下士一廟是卑者尊統近也此論大宗子而言天子諸侯大夫士之等者欲見大宗子統領百世而不遷又上祭大祖而不易亦以尊統逺小宗子惟統五服之内是尊統近敖氏繼公曰小宗者族人之所尊而大宗又統乎小宗故言尊之統見其至尊也大宗為尊者之統而收族人故族人不得不為之立後郝氏敬曰凡繼繼宗也宗為大則所親為小故舉宗法明之大宗自始祖以下適長世世相傳合族人共宗之小宗謂始祖適子之第二子亦以適長世世相承五服内宗之大宗百世不遷小宗歴髙曽祖考每四世親盡則遞遷大宗繼祖小宗繼禰各同父以上適各以其四親為小宗同父之適謂繼禰小宗同祖之謂繼祖小宗此外則五服窮而不相統矣以彼有五服内繼髙祖下者自為統也族人各有四宗又共事其始祖之大宗故大宗尤重大宗絶必擇族人支子繼之適子不得後大宗各有所後也此見宗嗣至重為人子者不可輕為人後既為人後則不得復遂其私也盛氏世佐曰自曷為後大宗以下皆論大宗不可絶族人當以支子後之之義葢為小宗之支子者一旦棄其本宗而為大宗後人子之心或有所不安於此故以大義斷之而曰後大宗者即所以尊祖也則族人皆知義之無所逃而不得以親疎易位為嫌矣尊謂别子之為祖者也大宗者尊之統謂祖之正統在大宗也以母比父則父尊父在為母期是也以禰比祖則祖又尊不以父命辭王父是也推而上之至别子之為祖者而尊止矣重言大宗者尊之統也者見士大夫之家以别子為祖尊統雖近而以繼别者為正統所在則無異於國耳統在足以收族統絶則族遂散而不可紀勢必有一本之親視為行路者其去禽獸不逺矣此族人必以支子後大宗之故也適子不得後大宗者重絶人之祀也族人多矣寧必以其適為後哉言此者亦所以杜争繼之釁也古之人惡背其親廹於大義不得已而為之而後世乃貪財爭後者有之或無所利焉則聽大宗之絶而莫之顧噫時代之升降逺矣陳氏禮書辨嫡子服父三年父以尊降服子期而長子三年以其傳重也孫服祖期祖以尊降服孫大功而服適孫期亦以其傳重也若適子在而適孫死則祖亦服大功以其有適子者無適孫也適子不在而祖死則適孫亦服三年以其無適子者適孫承其服也然則古者父死立嫡子嫡子死立嫡孫上以後先祖下以收族人謂之大宗大宗不可以絶故無子則族人以支子後之凡以尊正統而重嫡嗣也春秋左氏傳曰太子有母弟則立之無則立長年鈞擇賢義鈞則卜又曰王后無嫡則擇立長年鈞以德德鈞以卜以謂太子死而無後則立嫡子之母弟以其猶出於嫡室也無母弟則立庶長以其不得已而立妾子之長也立妾子之長則無間於貴賤公羊曰立嫡以長不以賢立子以貴不以長桓何以貴母貴也何休曰禮嫡夫人無子立右媵子右媵無子立左媵子左媵無子立嫡姪娣子嫡姪娣無子立右媵姪娣子右媵姪娣無子立左媵姪娣子不識何據云然耶夫嫡室所以配君子奉祭祀者也媵與姪娣所以從嫡室廣繼嗣者也故内則以冡子母弟為嫡子書以母弟與王父同其重則太子死而無後立太子之母弟可也均妾庶也而立其母之貴者可乎左氏曰非嫡嗣何必娣之子又曰王不立愛公卿無私蓋言此也禮言為後者四有正體而不傳重嫡子有罪疾是也有傳重而非正體庶孫為後是也有體而不正庶子為後是也有正而不體嫡孫為後是也然傳至嫡孫嫡孫無後則必立嫡孫之弟猶太子之母弟也禮謂族人以支子後之蓋自其無弟者言之也今令文諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曾孫以下准此若然是無嫡孫則舍嫡孫母弟而上取嫡子之兄弟無嫡曽孫則舍嫡曽孫母弟而上取嫡孫之兄弟嫡子之子宜立而不立嫡子之兄弟不宜立而立之是絶正統而厚旁支矣與禮大宗不可絶之云不亦異乎木之正出爲本傍出為支子之正出為嫡旁出為庶故伐枝不足以傷本伐其本則木斃矣廢庶不足以傷宗廢其嫡則宗絶矣本固而枝必茂嫡立而庶必寧此天地自然之理也先王知其然於是貴嫡而賤庶使名分正而不亂爭奪息而不作故子生則冡接以太牢庶子少牢冡子未食而見庶子已食而見冠則嫡子於阼階庶子於房外死則嫡子斬庶子朞其禮之重輕隆殺如此豈有他哉以其傳重與不傳重故也禮曰庶子不祭祖明其宗也又曰庶子不祭禰明其宗也又曰父不祭於支庶之宅君不祭於臣僕之家此嫡庶之分不可不辨也昔公儀仲子舎孫立子而檀弓弔以免司㓂惠子舍嫡立庶而子游弔以麻衰皆重其服以譏之欲其辨嫡庶之分而已春秋之時宋宣公舎子與夷立弟穆公穆公又舎子馮立與夷而與夷卒於見殺莒紀公黜太子僕愛季佗而卒於召禍晉獻殺世子申生立奚齊而卒以亂晉齊靈公廢太子光立公子牙而卒以亂齊蓋嫡一而已立之足以尊正統而一人之情庶則衆矣立之則亂正統而啓覬覦之心宋莒齊晉之君不察乎此每每趨禍良可悼也或曰易言大君有命開國承家禮言予以馭其幸則人君之於臣其所以立者無嫡庶之間耳然考之於古魯武公以括與戲見宣王宣王立戲仲山甫曰天子立諸侯而建其少是教逆也王卒立之其後魯人殺戱而立括則魯之禍宣王為之也古之所謂開國承家者猶之别子為祖也為祖而不為宗則其所立者非為傳襲其先也果使之傳襲其先而不以嫡長則宣王已事之驗可不鍳哉右宗子立後為人後附大清律例一無子者許令同宗昭穆相當之姪承繼先儘同父周親次及大功小功緦麻如俱無方許擇立逺房及同姓為嗣其或擇立賢能及所親愛者若於昭穆倫序不失不許宗族指以次序告争并官司受理田氏序成立後論古稱父後者非謂諸子皆可以為也父後也必嫡子乃足以當之嫡子者大宗小宗之統身為小宗之嫡則五服之親皆其所統故禮曰嫡子不得後大宗以支子可也而漢初之詔賜民為父後者爵一級葢嫡子之謂也古稱立後者非謂昆弟無子者人人為之立後也惟大宗乃舉之故禮曰大宗不可絶故族人以支子後大宗非大宗而立後者葢義舉也於禮未之有閒也古稱為大宗後者非必親昆弟之子也有以從昆弟之子後從世父者矣有以諸孫後祖者矣有以諸曾孫後曾祖者矣有以諸𤣥孫後髙祖者矣故禮曰為人後者斬衰三年不名所後為父者以所後不定難以預著其名也後世宗法不明而嫡子庶子皆稱父後立後之義不明而同居異居昆弟之無子者皆為立後稱謂之義不明而為人後者伯父叔父皆易為父而以孫後祖以無服之孫後逺祖者禮既不行名亦不著非先王之本㫖矣雖然生今之世異居而無後則族之强無狀者或將攘其所有而死者無所依歸故近世立嗣之法雖與古昔殊科而弭禍亂以敦彜倫亦律令之所不廢也若昆弟同居而無子而有父母臨之又從而割昆弟之子以為子則於理無當矣乃今細民之家惟利其昆弟之無後也不幸昆弟無後則汲汲分其支子以嗣之將以并其所有是先王明倫之教反為薄俗婪利之資也立後之禮先王起之以存宗後世沿之以定亂何以言乎起之以存宗也葢先王明倫之教莫大於嚴父嚴父故尊祖尊祖故敬宗故禮曰别子為祖繼别為宗繼禰者為小宗繼别之子是為大宗上以承祖廟下以收族屬猶木之有本也沒而無子則族人推其支子之倫序相當者為之後而奉之使廟祠有主而族屬有依故禮曰為人後者孰後後大宗也大宗不可絶故族人以支子後大宗非大宗而立後者古未有也葢有之矣或者以義舉之乎禮未之有載也何言乎沿之以定亂也後世宗法廢而姓氏亂人但私其近親以相敦附其下者仁讓陵夷而參商競起雖同胞屬裏之戚亦有别籍異居者没而無子則魂魄無所依産業無所屬攘奪乘之而悖叛作故王者立法取上古存宗之意而著為律令凡異居無後者則近親推其支子之倫序相當者為之後而主之幽以為死者而明以養生者所以弭禍亂而敦彜倫也然則立後有二義矣一曰大宗一曰昆弟之異居者在上古則如此在後世則如彼要之存宗之義公也禮也定亂之義私也法也蕙田案如田氏説是異居立後同居不立後也異居同居豈可以為立後不立後之凖乎律無之羅虞臣為人後議如何而可以為人後曰卜子夏曰為人後者孰後後大宗也大宗不可絶故族人以支子後之晉張湛曰後大宗所以承正統也若所繼非正統之重無相後之義今也所後非大宗之主小宗五世之嫡而輙為之置後無乃與先王之制異乎宗之嫡死而無子然後得為置後庶子不置後不繼祖與禰也非所後而後焉是曰誣禮捨天性之愛而父他人孝子所不忍也是曰抑本茍有田産財計則爭爲之後無則雖猶子於世父棄也是曰懐利三者皆自叛於先王之教者也吾何予焉曰然則庶子之無後者不為厲乎曰殤與無後者從祖祔食不斬祭也如之何其為厲乎柴紹炳立後説支子後大宗嫡子不得後大宗非夫人而可以立後非夫人而可以為人後也明矣禮稱别子為祖繼别者為大宗以大宗為嫡長相承合族所統不可一朝忽諸毋祀故以小宗之支子為後若以小宗後小宗以支子後支子彼無不可絶之道此無不得已之情忽然捐本生稱繼嗣於情也拂於禮也過君子深非之然則生也不幸無嗣死竟同於若敖氏之鬼與禮稱殤與無後者從祖祔食正為小宗支子之絶嗣者設爾又何必强為立後自干大宗也或曰諸葛亮在蜀以己未有子求兄瑾子喬為後其後亮生子瞻而諸葛恪被吳門誅仍令喬子攀還奉瑾祀此於義何居夫亮非嫡長似殊大宗然諸葛兄弟三人各仕一國正禮所謂别子為祖者也繼别為宗豈容遽絶亮之求喬為後攀之還奉瑾祀可謂允協也或又曰近世陽明王氏曰古者士大夫無子則為之置後無後者鮮矣後世人情偷薄始有棄貧賤而不問者古所謂無後大抵皆殤子之類也然則古昔無問大小宗無不立後者夫陽明所稱士大夫置後亦與諸葛繼别之意相通至云無後皆殤子此語未的案禮又云支子不祭殤與無後者殤與無後明屬兩條注云庶子不得立廟故不祭己之殤與兄弟之無後者必與宗子祭祖之時與祭於祖廟也葢庶子兄弟無子固不得更為立後祗當祔食於祖考爾是知支庶卑賤何容越分求繼若夫富貴亢宗亦得通於别子之義而謀為立後者尤必辨賢明序斟酌情理之中焉蕙田案羅氏柴氏皆主從祖祔食之説與徐氏同辨見後汪氏琬曰古者大宗而無後也則為之置後小宗則否夫小宗猶不得置後况支庶乎子夏曰為人後者孰後後大宗也然則族人而不為後也其遂不祀矣乎曰不然也孔子曰殤與無後者祭於宗子之家當室之白尊於東房是雖不置後可也然則有大宗之家焉有小宗之家焉祭者将奚從曰視其祖故曰庶子不祭殤與無後者殤與無後者從祖祔食此之謂也孔子曰宗子為殤而死庶子弗為後也然則大宗其遂絶乎曰如之何而絶也弗後殤者而後殤者之祖禰則大宗固有後也然則莫尚於大宗矣奚為不使嫡子後之也曰以其傳重也古人敬宗而尊祖稱嫡子者繼祖禰者也故不可以為人後也然則無宗支嫡庶而皆為之置後今人之所行古人之所禁也子不亦大悖於禮歟曰此禮之變也葢自宗法廢而宗不能收族矣宗子不能收族則無後者求祔食而無所其無乃驅之為厲乎故不得已為之置後也變也然則今之置後者必親昆弟之子次則從父昆弟之子其於古有合與曰不然也禮同宗者皆可為之後也大夫有適子則後適子有庶子而無嫡子則卜所以為後者如衛之石祁子是也况無子而為之置後其有不聽於神乎吾是以知其不然也卜之則勿問其孰為親孰為疎可也是可行於古亦可行於今者也蕙田案汪氏主卜尤屬滑突徐氏乾學曰古禮大宗無子則立後未有小宗無子而立後者也自秦漢以後世無宗子之法凡無子者則小宗亦為之置後彼豈盡為繼嗣起見哉大要多為貲産爾不知小宗無後者古有從祖祔食之禮則雖未嘗繼嗣而其祭祀固未始絶也又何必立人為後始可以承其祭祀哉今世之紛紛争繼嗣者其為大宗當斷之律例若小宗則舉從祖祔食之禮而不為立後其亦可也蕙田案禮以義起法縁情立不𠂻諸古則無以探禮之本不通於時不足以盡物之情如宗法為人後一事此極古今不同之殊致也禮稱大宗尊之統不可以絶故族人以支子後大宗是惟大宗當立後而小宗則不立支庶更無論矣嗚呼此誠三代以上之言不可行於後世者也何則古者有井田有世禄井田法行則人無兼并世禄不絶則宗無削奪有世禄者皆卿大夫也禮别子為祖别子者本國公子他國公子庶人崛起皆卿大夫也卿大夫則有圭田以奉祭有采地以贍族蓋其禄受之於君傳之於祖故大宗百世不遷而立後之法重焉若後世與古相似者惟宗室近戚勲臣襲爵者爲然耳若卿大夫則多出於選舉雖公卿之子其入仕者或以甲科或以恩蔭别無世禄可藉而士之入仕崛起者居什九是以一族之人或父貴而子賤或祖賤而孫貴或嫡賤而庶貴貴者可為别子賤者同于庶人皆以人之才質而定非若古繼别之大宗一尊而不可易也至於兼并勢成人皆自食其力勤儉者致富惰侈者困乏即一家之中有父富而子貧兄貧而弟富嫡貧而庶富又以人之勤情奢儉而分非若古繼别之大宗有世禄之可守也如是而責大宗以收族其勢必不能既無大宗則人各禰其禰各親其親亦情與理之不得不然者乃田氏羅氏等猶執大宗立後支庶必不可立後之説繩之是焉知古者大宗百世不遷今則人人可以爲卿大夫則人人可以為别子别子未必非支庶也而謂支庶不立後可乎而况小宗乎古者小宗五世而遷亦有收族之道今則小宗之適不皆可以收族而支庶可以爲富人支庶無藉於宗子而宗子之祭祀有闕反不能不藉於支庶若不立後是奪支子之産以與適黜賢而崇不肖此豈近於人情宗子且不可而况他人乎乃議者猶執殤與無後從祖祔食之説繩之倘果有宗子可也無宗子則無祖廟無祭祀不知祔於何所食於何人不亦拘泥而不通於事矣乎伏讀國家功令無子者許令同宗昭穆相當之姪承繼先儘同父周親次及小功緦麻如俱無方許擇立逺房及同姓為嗣其或擇立賢能及所親愛者若於昭穆倫序不失不許宗族以次序告争并官司受理又獨子不許出繼夫曰無子者則凡無子皆是未嘗指大宗小宗及為適為庶而言也曰同父周親則兄弟皆是未嘗專指繼父之適為言也由親及疎由近及逺又有擇賢之條即古同宗皆可為後之義而次序分明則争端不起獨子不為人後尤與嫡子不後大宗之義相符此真禮以義起法縁情立非聖人莫能制也今於儀禮之後恭録律令謹疏其大義附諸家之説而辨之如此至為人後之事三代以後變態日滋兹特統以三條曰立後之正立後之權立後之失皆臚載其蹟而凖之時制叅之古禮附論於左方俾争後争産者知所鍳焉右為後律令後漢書袁紹傳注袁山松書曰紹司空逢之孽子出後伯父成三國志注英雄記曰紹生而父死遭母䘮服竟又追行父服凡在冡廬六年臣松之案魏書云紹逢之庶子出後伯父成如此記所言則似寔成所生夫人追服所生禮無其文况於所後而可以行之二書未詳孰是蕙田案生而父死縱是遺腹亦便持䘮不須追服紹之追服正為紹生定嗣成死已乆名為其子寔未持服也東漢之時三年䘮廢行者輙得髙名而干譽之徒每多過禮紹之詐黠於斯可見松之反以此疑為成所生誤矣晉書安平王孚傳九子邕望輔翼晃􅅛珪衡景望字子初出繼伯父朗魏書于忠傳忠自知必死表曰臣薄福無男臣先養亡第四弟第二子司徒􅁺永超為子猶子之念寔切於心乞立為嗣傳此山河靈太后令特聽如請以彰殊效唐書崔祐甫傳子植嗣植祐甫弟廬江令嬰甫子也祐甫病謂妻曰吾殁當以廬江次子主吾祀及卒䕶䘮者以聞帝惻然召植使即䘮次舊唐書王正雅傳從弟重伯父翌之子也重子衆仲衆仲子凝凝無子以弟子鑣為嗣鑣兄鉅位終兵部侍郎蕙田案由翌至凝四世嫡長矣而鑣自有兄則以支子後大宗之正也宋史宗室傳􅅬王德昭長子惟正特拜建寧軍節度使卒追封同安郡王無子以弟惟忠子從讜為嗣蕙田案惟忠是􅅬王第四子從讜是惟忠第八子是支子後大宗也又案古人立後之法專為大宗而後之之人必以支子後世宗法不行是以繼絶之禮並及支庶故居今之世而欲執何休小宗當絶之説則為不情而立自當以㓜房支子為正若乃習俗成訛動謂長房無子當以次房長子為嗣此無稽之説也夫大宗百世不遷則數百年祖先傳重者止此一人敬之所以尊祖事之比於君道猶不敢奪人嫡子為後况區區繼祖繼禰妄號大宗甚或身為仲子乃欲取叔季弟之長子為嗣何其謬哉知禮之士慎無奪人之嫡亦不可為人奪嫡也又案以上以次房支子為長房後晉書義陽王望傳四子奕洪整楙奕早亡以奕子竒襲爵河間平王洪字孔業出繼叔父昌武亭侯遺安平王第四子翼以兄邕之支子承爲後高密王㤗傳四子越騰略模騰出後叔父譙王遜傳敬王恬四子尚之恢之允之休之允之出後叔父愔劉毅傳毅二子暾總總後叔父彪魏書裴伯茂傳無子兄景融以第二子孝才繼舊唐書虞世南傳隋内史侍郎世基弟也父荔陳太子中庶子叔父寄陳中書侍郎無子以世南繼後故字曰伯施蕙田案支庶無子不必立後之説前已辨之詳矣况或暮年賴以承歡或孀居撫以守志族人能以支子後之豈非親親之􅁩而必執禮禁之乎又案以上以長房支子為㓜房後後漢書伏恭傳恭字叔齊瑯琊東武人司徒湛之兄子也湛弟黯字稚文以明魯詩改定章句作解説九篇位至光禄勲無子以恭為後恭性孝事所繼母甚謹晉書皇甫謐傳謐字士安㓜名靜安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學游蕩無度或以為癡嘗得瓜果輙進所後叔母任氏任氏曰昔孟母三徙以成仁曾父烹豕以存教豈我居不擇鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言南齊書王延之傳延之父昇之都官尚書延之出繼伯父秀才粲之北齊書袁聿修傳聿修字叔德陳郡陽夏人魏中書令飜之子也出後叔父躍魏書南安王禎傳禎子英英子熙以元义隔絶二宮起兵赴難為义斬於鄴街熈異母弟義興出後叔父並洛肅宗初除員外散騎侍郎及熈之遇害也義興以别後故得不坐隋書房彦謙傳彦謙字孝冲年十五出後叔父子貞事所繼母有踰本生子貞哀之撫養甚厚後丁所繼母憂勺飲不入口者五日唐書盧邁傳再娶無子或勸畜姬媵對曰兄弟之子猶子也可以主後戴胄傳胄無子以兄子至德為後至德乾封中累遷西䑓侍郎同東西䑓三品閲十年父子繼為宰相世詫其榮宋史馬廷鸞傳廷鸞字翔仲本灼之子繼灼兄光後甘貧力學既冠里人聘為童子師遇有酒食􅄿則念母藜藿不給為之食不下咽曹覲傳覲字仲賓曹修禮子也叔修古卒無子天章閣待制杜杞為言於朝授覲建州司戸參軍為修古後明外史秦文傳文引疾歸惟日督教子姪弟禮禮子鳴雷出後伯父文嘉靖二十二年舉進士第一授修撰終南京禮部尚書蕙田案史傳主於紀事原不為立後之法而設故多直稱後伯父後叔父而其兄弟之有無行次之伯仲俱不可考然兄弟子猶子則立後自當以親者為始律文所謂先儘同父周親次及大功小功緦麻蓋亦人情天理之自然儀禮言族人後大宗者見族人雖疎尚不可坐視其絶非謂舍親兄弟子而反立族人子也故總而列之以為取後之常法又案以上以兄弟子為後後漢書鄧隲傳隲弟閶卒閶妻耿氏有節操痛鄧氏誅廢子忠早卒乃養河南尹豹子嗣為閶後耿氏教之書學遂以通博稱永夀中與伏無忌延篤著書東觀官至長田校尉魏志文德郭皇后傳皇后父永后早䘮兄弟以從兄表繼永後拜奉車都尉張冲傳冲字思約吳郡吳人父柬通直郎冲出繼從伯侍中景魏書陸俟傳俟子麗麗子定國定國子昕之尚顯祖女常山公主奉姑有孝稱又性不妬忌以昕之無子爲納妾媵而皆育女公主有三女以昕之從兄希道第四子彰為後彰字明逺本名士沈年十六出後事公主盡禮丞相髙陽王雍嘗言曰常山妹雖無男以子彰為兒乃過自生矣隋書薛道衡傳道衡以憶髙熲帝令自盡妻子徙且末有子五人收最知名出繼族父孺孺與道衡偏相友愛收初生即與孺為後養於孺宅至於長成殆不識本生唐書薛收傳收字伯褒蒲州汾陰人隋内史侍郎道衡子也出繼從父孺年十二能屬文以父不得死於隋不肯仕郡舉秀才不應案隋書唐書所載互異故並列之蕙田案古人之兄弟也其同父者曰兄弟同祖者曰從父兄弟同曾祖者曰從祖兄弟同髙祖者曰族兄弟外此無服謂之同姓兄弟而已後世稱名淆亂同祖者改為同堂兄弟同曾祖者為從堂兄弟同髙祖者為再從兄弟五世􅃝免者亦或稱三從焉是以史傳所載或依古之名則同祖即稱從兄弟或據今為號則同四世五世並稱從兄弟茍非寔知其支𣲖無由懸斷其親疎然五世以内親屬未竭則取子立後猶一氣也故總之曰從兄弟子不復加區别焉又案以上以從兄弟子為後曹植釋思賦序家弟出養族父郎中伊予以兄弟之愛心有戀然作此賦以贈之聞見前録司馬温公以康節之故遇其孤伯溫甚厚公無子以族人之子康為嗣康字公休其賢似公識者謂天故生之也宋史司馬夢求傳夢求叙州人温國公光之後也母程歸及門夫死誓不他適旌其母曰節婦夢求其族子取以為後宇文紹節傳紹節字挺臣祖虚中簽書樞宻院事父師援顯謨閣待制父子皆以使北死無子孝宗愍之命其族子紹節為之後張子全書為其父母不論其族逺近並以期服服之據今之律五服之内方許為後以禮文言又無此文若五服之内無人使絶後可乎必須以疎屬為之後也羅虞臣爲人後議曰人有抱其同宗之子而育者則亦可以為後乎曰可螟蛉之體化為蜾臝班氏之族乳虎紀焉養育之恩大矣哉其稱之為父母也豈若今之立繼者之比歟曰然則其於本生也其名也如之何曰父母之名何可廢也昔宋崔凱曰本親有自然之恩降一等亦足以明所後者為重無縁乃絶之矣夫未嘗謂可以絶其親而遽謂可以絶其名是惑矣曰不幾於二本乎曰禮不有繼父慈母之名乎曰其服也則如之何曰比之為人後者為其父母期服蕙田案五服以外乃稱族人夫族人之子與我不同髙祖夏商之世可通婚姻立以為後疑於不相接續矣然近支既無其人豈容束手絶祀且以我視族子為疎屬矣以髙曽祖視彼之髙曾則未嘗不親也援而立之斯亦不失其正者茍必泥於近親寧以獨子承兩後是特吝惜財産不肯畀之疎屬名為不絶而實已殄矣是君子之所大惡也又案以上以族人子為後齊書江斆傳初宋明帝敕斆繼從叔愻為從祖渟後僕射王儉啟禮無後小宗之文近世縁情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡允嗣所寄惟斆一人傍無眷屬斆宜還本於是斆還本家詔使自量立後者蕙田案斆本獨子理無出嗣而王儉之啟於無父命為後尤為切著至云臣子一揆義非天屬然則茍無父命雖天子不能奪也彼貪利財産甘棄其親而以人為親者讀此可以惕然心動矣大清律例續増乾隆四年定例獨子不許出繼蕙田案以上獨子不為人後晉書羊祜傳無子帝以祜兄子暨為嗣暨以父沒不得為人後帝又令暨弟伊為祜後又不奉詔帝怒並收免之太康二年以伊弟篇為鉅平侯奉祜嗣宋史宗室傳濮安懿王子宗祐克己自約蕭然若寒士好讀書尤喜學易嘉祐中從父允初未立嗣咸推其賢詔以宗祐為後泣曰臣不幸㓜失怙恃將終身悲慕忍為人後乎敢以死請仁宗憐而從之蕙田案以上父沒不為人後宋史禮志紹聖四年右武衛大將軍克務乞故登州防禦使東牟侯克端子叔博為嗣請赴期朝參起居而不為克端服大宗正司以聞下禮官議宜終䘮三年遂詔宗室居父母䘮者毋得乞為繼嗣蕙田案身為支子禮當出後者固不容不後且父殁可從祖命母殁可從父命非必一居重䘮遂無出後之道也但身在䘮中而舍而去之是猶室女居䘮而服中出嫁於情安乎寧可虚彼之祀以待我䘮之畢斯為進退有禮而無亡親棄本之罪矣又案此條居䘮不為人後袁氏世範貧者養他人之子當於􅏊時葢貧者無田宅可養暮年唯望其子反哺不可不自其㓜時衣食撫養以結其心富者養他人之子當於既長之時今世之富人養他人之子多以為諱故欲及其無知之時撫養或養所出至㣲之人長而不肖恐破其家方議逐去致有争訟若取於既長之時其賢否可以粗見茍能温淳守己必能事所養如所生且不致破家亦不致興訟也多子固為人之患不可以多子之故輕以與人須俟其稍長見其温淳守己舉以與人兩家獲福如在襁褓即以與人萬一不肖既破他家必求歸宗徃徃興訟又破我家則兩家受其禍矣蕙田案袁氏前一條計較利害頗為偏見蓋貧者固當撫養以結其心茍所養不肖亦何望其反哺富者固憂其不肖破家然既長始立則情􅁩不相浹洽亦安能事如所生要而論之當云俟其稍長以覘頭角撫之婚冠之前以篤恩􅁩則無問貧富皆為兩全之道耳至後一條為生子者言之則誠為篤論人莫知其子之惡而但利其兄弟之財至於所後不肖破家蕩産彼家深受其害而已子曾不享其利何不任彼擇其賢者得以善全無害乎是真以子後人者所當察也又案此論立後必擇人宋史范鎮傳仁宗在位三十五年未有繼嗣嘉祐初暴得疾中外無不寒心莫敢先言者鎮獨奮曰天下事尚有大於此者乎即拜疏曰方陛下不豫海内皇皇莫知所為陛下獨以祖宗後裔為念是為宗廟之慮至深且明也昔太祖舍其子而立太宗天下之大公也真宗以周王薨養宗子於宮中天下之大慮也願以太祖之心行真宗故事㧞近屬之尤賢者優其禮秩置之左右與圖天下事以繫億兆人心疏封文彦博使客問何所言以寔告客曰如是何不與執政謀鎮曰自分必死故敢言若謀於執政或以為不可豈得中輟乎章累上不報除兼侍御史知雜事鎮以言不從固辭執政諭鎮曰今間言已入為之甚難鎮復書執政曰事當論其是非不當問其難易諸公謂今日難於前日安知異日不更難於今日乎凡見上面陳者三言益懇切鎮泣帝亦泣曰朕知卿忠卿言是也當更俟二三年章十九上待命百餘日鬚髪為白朝廷知不能奪乃罷知諫院改集賢殿修撰鎮雖解言職無歲不申前議每因事及之冀感動帝意至是因入謝首言陛下許臣今復三年矣願早定大計又因祫享獻賦以諷歐陽修傳修嘗因水災上疏曰陛下臨御三紀而儲宮未建昔漢文帝初即位以羣臣之言即立太子而享國長乆為漢太宗唐明宗惡人言儲嗣事不肯早定致秦王之亂宗社遂覆陛下何疑而乆不定乎其後建立英宗蓋原於此司馬光傳仁宗始不豫國嗣未立天下寒心而莫敢言諫官范鎮首𤼵其議光在并州聞而繼之且貽書勸鎮以死争至是復面言臣昔通判并州所上三章願陛下果斷力行帝沉思乆之曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及耳光曰臣言此自謂必死不意陛下開納帝曰此何害古今皆有之光退未聞命復上疏曰臣向者進説意謂即行今無所聞此必有小人言陛下春秋鼎盛何遽為不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳定䇿國老門生天子之禍可勝言哉帝大感動曰送中書光見韓𤦺等曰諸公不及今定議異日禁中夜半出寸紙以某人為嗣則天下莫敢違𤦺等拱手曰敢不盡力韓𤦺傳仁宗嘉祐六年遷昭文館大學士帝既連失三王自至和中得病不能御殿臣下争以立嗣固根本為言包拯范鎮尤激切積五六歲依違未之行至是𤦺乘間進曰皇嗣者天下安危之所係自昔禍亂之起皆由䇿不早定陛下春秋髙未有建立何不擇宗室之賢者以為宗廟社稷計帝曰後宮將有就館者姑待之己又生女一日𤦺懐漢書孔光傳以進曰成帝無嗣立弟之子彼中材之主猶能如是况陛下乎又與曾公亮張昇歐陽修極言之㑹司馬光呂誨皆有請𤦺進讀二疏未及有所啟帝遽曰朕有意久矣誰可者𤦺惶恐對曰此非臣軰所可議當出自聖擇帝曰宮中當養二子小者甚純近不慧大者可也𤦺請其名帝以宗寔告宗寔英宗舊名也𤦺等遂力贊之議乃定英宗居濮王䘮議起知宗正英宗固辭帝復問𤦺𤦺對曰陛下既知其賢而選之今不敢遽當葢器識逺大所以為賢也願固起之英宗既終䘮猶堅卧不起𤦺言宗正之命初出外人皆知必為皇子不若遂正其名乃下詔立為皇子明年英宗嗣位蕙田案四條皆宋仁宗時立英宗為嗣之事也當時言者如包拯吕誨吳奎張述傳中皆有諫詞兹以𤼵端於范鎮繼以歐陽司馬而韓魏公成之故摘録以見其㮣夫天子之尊固宜早定士庶之家亦在預圖茍希圖生育觀望遷延一旦變生争名施奪亡國破家階於此矣韓范司馬諸公之言真中年無子者之炯鍳也宋史富直柔傳上虞縣丞婁寅亮上書言宗社大計欲選太祖諸孫伯字行下有賢德者視秩親王使牧九州以待皇嗣之生退處藩服疏入上大歎悟直柔從而薦之召赴行在除監察御史於是孝宗立為普安郡王以寅亮之言也范如圭傳時宗藩並建儲位未定如圭憂之掇至和嘉祐間名臣奏章合為一書以獻請深考羣言仰師成憲或以越職危之如圭曰以此獲罪奚憾帝感悟謂輔臣曰如圭可謂忠矣即日下詔以普安王為皇子進封建王蕙田案二條宋孝宗嗣位之事也厥後大統有屬而大孝彰聞豈非盛德之至哉明史梁儲傳正德十一年春以國本未定請擇宗室賢者居京師備儲貳之選皆不報八月儲等以國無儲副而帝盤逰不息中外危疑力申建儲之請亦不報王縝傳乾清宫灾疏請養宗室宫中定根本不報石天柱傳乾清宫灾上言前星未耀儲位乆虚既不常御宫中又弗預選宗室何以消禍本計長乆哉黄鞏傳正德十四年上疏曰陛下春秋漸髙前星未耀祖宗社稷之託摇搖無所寄方且逺事觀逰屢犯不測收養義子布滿左右獨不能豫建親賢以承大業臣以為陛下殆倒置也伏望上告宗廟請命太后旁諏大臣擇宗室親賢者一人養於宫中以繫四海之望他日誕生皇子仍俾出藩寔宗社無疆之福也員外郎陸震草疏將諫見鞏疏稱歎因毁己藁與鞏連署以進帝怒甚下二人詔獄越二十餘日廷杖五十斥為民蕙田案梁儲諸人諄諄於建儲之議使武宗能决之於早如宋之立英孝二宗則父子素定可以潛消議禮之禍而正人貶謫元氣彫䘮不若是之甚矣徙薪曲突無恩澤至於焦頭爛額而後已惜哉願體集繼嗣一節多有不肯早立以致身後爭繼禍起蕭墻且爭繼者何心原圖繼産非為繼嗣也及至紛争家産蕩廢應繼者反不願繼何如身在之日早於應繼之中擇其善者繼之加意撫養令其感恩深重不特無身後爭端亦且頂戴過於親生矣蕙田案古之立後早定而獲福者宋之英宗孝宗其明騐也不早定而漠如途人者明世宗其炯鑒也乃世之愚夫至於耄老猶思博取廣求而不早定嗣無論争奪破家即晚而定嗣情義淡漠不相比附豈非自貽之慼哉宋明諸名臣多以早定皇嗣為言皆愛君憂國之苦心特時有聽有不聽耳天子庶人其揆一也又案以上立後宜早定宋書謝𢎞㣲傳𢎞㣲從叔峻無後以𢎞㣲為嗣童㓜時精神端審所繼叔父混名知人見而異之年十歲出繼襲爵建昌縣侯𢎞㣲家素貧儉而所繼豐泰惟受書數千卷國吏數人而已梁書阮孝緒傳孝緒父彦之孝緒七歲出後伯父允之允之母周氏卒有遺財百餘萬孝緒一無所納盡以歸允之姊琅琊王之母聞者咸歎異之宋史蔡齊傳齊無子以從子延慶為後既殁有遺腹子曰延嗣乃歸其宗籍家所有付之無一毫自予萊人義焉金史伊喇履傳履父裕嚕早亡裕嚕之兄興平節度使德元無子以履為後及長德元生子震德元殁盡推家貲與之世宗紀大定十三年四月定出繼子所繼財産不及本家者以所繼與本家財産通數均分蕙田案此葢以貧者無後富者多子必有互相推諉之弊遂至坐視其絶者故酌此以通之庶幾繼絶之道得以盡行立制之意可謂苦心矣若知禮君子當以義命自安何屑屑於此哉元史孝友傳王薦兄孟鞈早世嫂林氏更適劉仲山仲山嘗以田鬻於薦及死不能塟且無子族以其貧莫肯為之後薦即以田還之使置後且治塟焉蕙田案傳言王薦之善與立後之禮無渉然王以路人能返其田以存人之祀劉有同族乃以田之有無爲立後之進退人之度量相越豈不逺哉故列諸此以愧世之䂓家計而圖立後者明外史王燾傳燾字濬仲崑山人少孤貧九嵗為人後族人有謀其産者燾舉以讓之獨迎養嗣祖母及母惟謹大清律例若義男女婿爲所後之親喜悦者聽其相爲依倚不許繼子并本生父母用計逼逐仍酌分給財産若無子之人家貧聽其賣産自贍蕙田案流俗多以立後起争奪傷情誼或棄親而不恤謂之不情或不應立而强求謂之非禮其端總爲財産起見若夫有志之士薄此而不爲坐視其絶而不顧則又以財産為凂已而激而過焉者也若謝𢎞㣲以下諸人既不廢禮又不貪利心事皭然如青天白日聞者足使頑夫廉薄夫敦又案以上為後不計財産右立後之正後漢袁紹傳紹三子譚熙尚譚長而惠尚少而美紹後妻劉有寵而偏愛尚數稱於紹亦竒其姿容欲使傳嗣乃以譚繼兄後出為青州刺史晉書周顗傳顗三子閔恬頤閔無子以弟頤長子琳為嗣明史外戚錢貴傳長子欽為錦衣衛指揮使與弟忠俱沒於土木欽無子以忠遺腹子雄爲後鄭濓傳鄭文厚生欽文融無子以欽嗣欽嘗刺血療本生父文厚疾通典漢石渠議大宗無後族無庶子已有一嫡子當絶父祀以後大宗不戴聖云大宗不可絶言嫡子不爲後者不得先庶耳族無庶子則當絶父以後大宗聞人通漢云大宗有絶子不絶其父宣帝制曰聖議是也魏劉德問為人後者支子可也長子不以為後同宗無支子惟有長子長子不後人則大宗絶後則違禮如之何田瓊答曰以長子後大宗則成宗子禮諸父無後祭於宗家後以其庶子還承其父晉范汪祭典云廢小宗昭穆不亂廢大宗昭穆亂矣先王所以重大宗也豈得不廢小宗以繼大宗乎漢家求三代之後弗得此不立大宗之故也豈不以宗子廢絶圖籍莫紀若常有宗主雖䘮亂要有存理或可分布掌錄或可藏之於名山設不盡在决不盡失且同姓百代不婚周道也而姓氏變易何由得知一已不知或容有得婚者此大違先王之典而傷自然之理由此言之宗子之重於天下乆矣性理㑹通程子曰禮長子不得為人後若無兄弟又繼祖之宗絶亦當繼祖禮雖不言可以義起薛蕙為人後解禮之所以立後曰重大宗也小宗無子以爲可絶者也故不為之立後大宗無子不可以絶故立後以繼之小宗不可擬大宗故曰重大宗也曷為後大宗不後小宗重本也大宗者祖之正體也本也小宗者祖之旁體也支也本存而支亡亡而猶存也尊者存焉耳本亡而支存存而猶亡也存者㣲矣是故小宗無後祖不絶大宗無後祖絶矣禮之後大宗不後小宗重絶祖也雖然大宗者卿大夫之禮也古者公子為卿大夫及始仕而為大夫者謂之别子繼别子者謂之大宗故曰大宗者卿大夫之禮也此卿大夫也而不可絶益知天子之不可絶矣大宗者繼别云爾曰尊之統也故同族云爾曰收族者也天子之統受之始祖始祖受之天不啻尊之統也内治同姓外治異姓不啻收族者也甚大宗矣是故不可絶也故天子無嗣建支子以後天子禮也支子後天子適子不為後乎禮之正者支子為後禮之變者適子亦為後矣何言乎禮之變者適子亦為後適子不為後者非他也傳小宗之統焉爾明小宗之統為重也益知天子之統為尤重矣故適子可以後大宗可以後大宗斯可以後天子矣天子者始祖之體大統之所在尊則無上親則本始也諸侯雖有尊焉不敢信其尊矣雖有親焉不敢專其親矣信其尊嫌於貳君專其親嫌於貳祖故諸侯適子後天子者不敢遂其尊親也尊親者人之至重也然而不敢遂焉亦猶有至重者也繼大統者因斯舉也而知其所由來則可以事天可以保宗廟可以有天下是故明於為人後之義者措諸天下無難矣羅虞臣長子亦可為人後議孫逺死而無嗣其弟重以長子彬後之或曰重之命非也長子不得為後曰斯重宗之義也吾將以重為知禮矣昔子思兄死而使其子白續以主祖及曽祖之祭葢逺嫌也以己代兄是謂奪宗以子繼伯父則有父命焉其孔氏之家之變禮乎重之命惡得為非大清律箋釋承繼之法由親而疎自近而逺又有擇賢立愛之條可謂情義交盡周晰無遺矣乃末俗圖財起争兼有執小宗可絶大宗不可絶之説者殊不知此指兩房乏嗣僅有可繼之一人而言也蕙田案人之生子必有長然後有次子雖衆多而適子猶獨子也安可為人後乎且為後亦有不同設是身為支子而大宗適長無子又别無支子可嗣以我長子後之則為大宗之適義之權也若已為繼禰長子何敢廢父之適孫以後堂兄乎已為繼祖長孫何敢廢祖之適曾孫以後從兄乎而世俗不明宗子之法動云絶㓜不絶長於是有伯兄無子奪仲叔之適以後之者已為誤矣甚有仲兄無子亦欲絶叔季以後之者豈非誤而又誤者乎箋釋剖明之曰小宗可絶大宗不可絶此指兩房乏嗣僅有可繼一人而言足以破舉世之惑矣又案以上以㓜房適子為長房後晉書荀顗傳顗無子以從孫徽爲子阮孚傳無子從孫廣嗣劉頌傳頌無子養弟和子雍早卒更以雍弟翊子隲爲嫡孫襲封齊書江斆傳初宋明帝敕斆繼從父愻為從祖渟後僕射王儉啟江忠簡允嗣所寄唯斆一人斆宜還本若不欲江愻絶後可以斆小兒繼愻為孫尚書參議謂間世立後禮無其文荀顗無子立孫墜禮之始何期又立此論義無所據於是斆還本家詔使自量立後者王奐傳出繼從祖中書令球故字彦孫為雍州刺史輙殺寧蠻長史劉興祖上大怒收之奐子彪陳兵閉拒皆伏誅奐弟伷女為長沙王晃妃世祖詔曰奐自陷逆節長沙王妃男女並長且奐又出繼前代或當有准可特不離絶魏書王叡傳叡次子椿無子以兄孫叔明為後宋史禮志元豐國子博士孟開請以姪孫宗顔為孫據晉侍中荀顗無子以兄之孫為孫其後王彦林請以弟彦通為叔母宋繼絶詔皆如所請宗室傳越王傑無子仁宗以恭憲王元佐之孫允言子宗望爲之後允初無子以允成孫仲連為之後李昉傳昉字明逺深州饒陽人父超晉工部郎中集賢殿直學士從大父右贊善大夫右無子以昉為後初超未有子昉母謝方娠指謂叔母張曰生男當與叔母為子故昉出繼於右元史魏初傳初從祖璠無子以初為後通典間代立後議晉何𤦺議以爲卿士之家别宗無後宗緒不可絶若昆弟以孫若曾孫後之理宜然也禮縁事而興不應拘常以為礙也魏之宗室逺繼宣尼𤦺從父以孫紹族祖荀顗無子以兄孫為嗣此成例也宋庾蔚之謂間代取後禮未之聞宗聖時王所命以尊先聖本不計數恐不得引以比也徐乾學立孫議舅氏亭林先生立從子洪慎之子世樞為孫或者曰無子而立孫非昭穆之序是使世樞有祖而無禰也先生即有子而殤殤不立後盍擇諸族兄弟之子以為嗣乎余應之曰不然自夫子之告子游已謂三代以後天下為家各親其親各子其子為人之同情是則兄弟之子必親於從兄弟之子從兄弟之子必親於族兄弟之子也明矣古人之立宗也自非大宗五世親盡則族屬絶茍謂兄弟之子無當立者舍兄弟之孫弗立而立疎逺族屬之子為嗣其於祖若考之意果無憾乎有國者之繼世與士大夫之承家其理則一而已矣吾外家顧氏侍郎公有二子贊善公為大宗夢菴公繼禰之宗也夢菴公有子未婚而夭貞孝王孺人服䘮衰以歸於顧又十二年先生生方在襁褓夢菴公撫而立之為貞孝後先生寔贊善公之孫吾外祖賔瑶公之子於賔瑶公子孫為至親賔瑶公諸孫洪善冡適也洪泰孤子不得為人後吾仲舅子嚴失明年老唯洪慎一子非支子不得為人後洪慎生三子矣立世樞為先生後不亦可乎晉書荀顗傳顗無子以從孫徽嗣中興初以顗兄𤣥孫序為顗後封臨淮公荀氏頴川名族子姓甚繁豈無昭穆之倫可立為嗣者而獨以從孫嗣其必不舍親屬而他立也禮之權而不失經者也何𤦺之從父以孫紹族祖𤦺以為宗緒不絶若昆弟以孫若曾孫後之理宜然也理縁事而興不必拘常以為礙也故雷次宗釋儀禮為人後者之文以為不言所後之父者或後祖父或後髙曾凡諸所後皆備於其中庾純云為人後者三年或為子或為孫若荀大尉養兄孫以為孫是小記所謂為祖後者也何𤦺庾純古所稱知禮之君子其言鑿鑿如此惟庾蔚之謂間代取嗣古未之聞然試以各親其親之常情凖之則必喟然𤼵悟以為不悖於先王之道矣故昭穆相續其子常也如親屬無當立者不得已而立從孫為孫如父之誼仍不改其昭穆之倫母亦勢之不得不然而聖人之所許與故詳論之以告吾母黨云蕙田案無子立孫固為變禮然立後之義但取祖宗一氣可相承接非詐冐為己所親生也則無子有孫亦復何害且立後之不可紊者惡其亂昭穆也正其名曰祖孫則昭穆序矣夫弟之不可後兄者以其本是同軰即長兄撫其㓜弟異時㓜弟生子仍可後兄也倘暮年無子而兄弟之子死亡已盡或存者皆為獨子茍不立孫則其人之絶祀也必矣無可望矣是安得不變而通之以濟其窮乎且雷次宗解經論之於前亭林先生行之於後名儒成例可遵而行也世人拘泥反以立孫為失序而或强借夭殤之子或扳立兄弟夭殤之子而後以孫繼之此似乎得禮而實為矯誣知禮君子直須名正言順定祖孫之分可矣何必强為縁餙而反蹈於非禮哉又案以上立兄弟之孫為後晉書河間平王洪傳洪二子威混威嗣徙封章武其後威既繼義陽王望更立混為洪嗣蕙田案此條本生祖父無子立出後子之子爲後晉書王戎傳子萬年十九卒有庶子興戎所不齒以從弟陽平太守愔子為嗣蕙田案有子立嗣似屬創見然繼體祖宗事關重大子出㣲賤而猥以承祧是不敬其先人也世有嫡妻無子即以婢妾之子為後甚而女僕外婦姦生庶孽而概以主持匕鬯可乎聞王戎之風可以識古人尊祖敬宗之義矣大清律例分析家財田産不論妻妾婢生止以子數均分姦生之子量與半分如别無子立應繼之人為嗣與姦生均分無應繼之人方許承繼全分蕙田案此條有子别立後周書杞簡公連傳子光寶為齊神武所害以章武公導子亮嗣邵惠公顥傳翼字乾宜武成初封西陽郡公早薨諡曰昭無子以杞國公亮子温為嗣王􅅷竑立嗣辨吾家同寰公生四子重甫純甫和甫玉甫重甫公生繩武和甫生祖武宗武成武純甫公玉甫公俱絶無後宗武繼純甫公其繼玉甫公者當在成武而䋲武已有二子天擎楚材於是以楚材繼玉甫公為孫此議之前定者也其後天擎早卒無子則重甫公及繩武之世又絶天擎與楚材為嫡兄弟自當以楚材子為嗣而楚材止有一子故天擎臨沒遺言且無立嗣以待楚材次子之生今次子生已迥嵗矣即宜立為天擎嗣以奉同寰公及䋲武之後此揆之禮律而合度之人鬼而安斷斷無疑者也而議者紛紜不一時宗武子麟勩生四子祖武子子倫生二子或主次序之説謂宜立麟勩之子或謂宗武已承嗣其後不得更承嗣宜立子倫之子此兩説者愚請得而辨之禮曰如何而可以為人後支子可也律曰凡立後者先儘同父周親天擎楚材則同父也楚材之子於天擎為嫡姪於䋲武為嫡孫同父周親更無二人以天擎言之固不肯舍嫡姪而立從姪以䋲武言之更安肯舍己之孫而立他人之孫哉且楚材之子之後天擎也為歸宗不為繼嗣即使楚材止一子亦當以其子歸宗楚材之不得歸宗者以兄弟不相為後天擎之世不可絶而必以其子歸宗者以祖父為重而不得自有其子也萬一不生次子則寧更繼他人而推祖父之意必以其子還為後并不得拘支子適子之説也况今楚材已有次子正合禮支子為後之云則更何所擬議而紛紜不已哉或謂楚材已嗣玉甫公則與麟勩子倫同不得以同父論是又不考於禮律之過也禮為人後者為其父母期凡私親皆降一等今律亦然故以名言之麟勩楚材於䋲武皆從父而麟勩之服小功楚材之服則期矣麟勩楚材於天擎皆再從兄弟而麟勩之服小功楚材之服則大功矣是皆不沒其父子兄弟之實而麟勩烏得以房分次序與楚材較哉麟勩子之不得為嗣也以與楚材子較而其親不敵也非夫已承嗣不得更承嗣之説也已承嗣不得更承嗣不知出於何書而乃據以為説設使子倫無次子而拘於此將舍同寰公之後而别取之乎故非楚材與天擎為嫡兄弟則承嗣者必麟勩之子無疑也是子倫且不得與麟勩較而又烏得以與楚材較哉成武之不繼玉甫公是欲均房分也今謂楚材已嗣玉甫公其子不得更嗣天擎而當以子倫之子是重甫公之後不可兼其二而和甫公之後反可據其三此又豈平情之論乎若謂楚材家少自足而子倫貧乏為裒益之計先王之制禮律也固為一定之法以杜後世之爭不得以私意轉移其間今子倫之子必不得立即使得立而據禮律以争者必不能以已是啟無窮之隙而失兩盡之道也况使重甫公不得有其曾孫䋲武不得有其孫而天擎臨沒拳拳之言付之不聞三世之魂必有嘆息痛恨於地下者而徬徨躑躅不肯以享非其後之祀人鬼之情皆有不安其不可也决矣或謂楚材本不當嗣玉甫公今其子既歸宗則楚材不得擅玉甫公之所有夫楚材之嗣玉甫公也專以房分論而不以昭穆次序論也其誤已在前不可改矣然以今推之嗣玉甫公者當在成武成武無子嗣成武者仍在楚材固非有誤也奈何藉口而欲分楚材之所有哉同寰公於新莊公為長子至天擎累世正嫡所謂繼髙祖之宗今自重甫公以後斬焉㷀㷀孤魂孑然無依四時祭享誰為其主在同族之親故復為此辨以告於諸叔諸昆弟以定其議要使重甫公䋲武天擎不至斬焉乏祀則志願畢矣蕙田案王氏辨是也以人情言之出後之兄弟其情固親兄弟也則出後者之子其情亦親於從子矣若其出後之人無子則當依所後之親疎立後而不可强扳本生兄弟之子為後承統於彼不得狥其私親矣又案以上本生兄弟無子立出後兄弟之子為後宋史禮志紹聖元年尚書省言元祐南郊赦文戸絶之家近親不為立繼者官為施行今户絶家許親近尊長命繼已有著令即不當官為施行大觀四年詔曰孔子謂興滅繼絶天下之民歸心王安石子雱無嗣有族子棣已嘗用安石孫恩例官可以棣為雱後以稱朕善善之意邵寶日格人之子而子於人遂為之子尊父命也父殁則母命之父母殁矣伯叔雖絶嗣將不得子之乎請于君君命之猶父命之也民之微曷以請於君請於令長猶請於君也蕙田案二泉先生之言恐世人拘守父殁不為人後之説而絶後者多故申明其説以通之可謂以君子待人者矣夫繼絶存亡盛德之事果是當後固可以官長斷之猶父命也然必宗族公議萬無推諉然後請之於官而命之可也若其投牒訴訟自陳當後者乃貪財背親之人官長當重懲之以敦風俗不可以二泉先生之言而反致成人之惡也又案以上官為絶戸立後陳龍正家矩一親友無後者不論貧富必與立嗣有田産及女者半給贅婿半留嗣子如親房無可繼之人公議于逺房擇而嗣之逺房又無可繼先變産價置買棺槨塟地餘田方入義莊公用每嵗清明前一日守祠人備三牲酒飯燭帛徃掃其墓餕餘即給守祠人每墓約費米三斗開義租内銷筭孤魂一生勤積惠遺後人令無祀而有祀以明報也貧無産者亦如之又不以報論大清律例戸絶財産果無應繼之人所有親女承管無女者聽地方官詳明上司酌撥充公蕙田案地方官酌撥充公指絶戸無族者言若其家有宗祠義庄可以收族祔祭則原聽其宗族主持矣然如陳幾亭先生所云亦必宗族蕃盛而祠堂義庄䂓模逺大實足以收族贍貧主無後之祭者乃可行之若末俗貪夫見人絶後便生瓜剖之心强名曰作祭田充義舉實則共相噉噬之而已甚有已議立後而近支弟姪猶欲各析其貲者此無良之事非義之財族人苛稍有識者當明目張胆以救正之不惟己身不可染指亦不可狥貪夫之欲而坐視無子者之侵削於人也又案以上絶戸財産充公右立後之權五禮通考卷一百四十六
