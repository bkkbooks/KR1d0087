body:
  text: 五禮通考卷二百十六刑部尚書秦蕙田撰嘉禮八十九設官分職春秋隱公元年秋七月天王使宰咺來歸惠公仲子之賵疏周禮天官卿一人小宰中大夫二人宰夫下大夫四人宰夫職曰凡邦之弔事掌其戒令與其器幣財用既掌弔事或即充使此蓋宰夫也顧氏棟高曰王人見于經者惟宰書官正義曰穀梁傳曰天子之宰通于四海其意言宰者六官之長官名通于海内當謂太宰之長官耳其屬官不應得通而宰咺宰渠伯糾則必非長官亦稱為宰者葢自宰夫以上皆通也愚意冢宰紀法之守桓公簒弑王不能討即位四年未嘗一朝王室而王使下聘仲子諸侯之妾以冢宰歸賵皆非禮也故特書官以示譏若宰夫以下則如劉夏石尚書名可矣何必具官正義説非也隱公三年左氏傳鄭武公荘公為平王卿士注卿士王卿之執政者八年左氏傳虢公忌父始作卿士于周程氏啟生曰鄭伯為左卿士則虢公右卿士也鄭伯奪政之後葢周公黒肩代之故桓公五年伐鄭之役虢公将右軍周公將左軍顧氏棟高曰案哀十六年楚白公勝謂石乞曰王與二卿士杜注二卿士子西子期也定元年傳子家子曰若君立則卿士大夫與守龜在是諸侯執政者亦謂之卿士桓公二年左氏傳周内史聞之桓公四年天王使宰渠伯糾來聘疏傳言父在故名則于法當書字但中下大夫例皆書字故直言王官之宰不指小宰宰夫莊公十九年左氏傳王收膳夫之秩二十二年左氏傳周史有以周易見陳侯者注史周太史也三十二年左氏傳有神降于莘惠王問諸内史過曰是何故也僖公九年公㑹宰周公于葵丘注天子三公十六年左氏傳隕石于宋五六鷁退飛過宋都周内史叔興聘于宋宋㐮公問曰是何祥也吉凶焉在顧氏棟高曰觀此及荘三十二年傳則内史亦掌占侯吉凶之事葢太史之屬也二十四年左氏傳太叔以狄師攻王王御士將禦之注周禮王之御士十二人下疏周禮無御士之官惟夏官太僕之屬有御僕士十二人掌王之燕令二十八年左氏傳王命内史叔興父䇿命晉侯為侯伯顧氏棟高曰周禮内史職曰凡命諸侯及孤卿大夫則䇿命之鄭司農引此傳為証三十年天王使宰周公來聘注天子三公兼冢宰也顧氏棟高曰僖二十八年踐土之盟國語以王子虎為太宰文公而經兩書宰周公皆在僖公時或中遷代文公元年左氏傳王使内史叔服來㑹𦵏成公二年左氏傳王使委于三吏注三吏三公也長疏曲禮云五官之曰伯其擯于天子也曰天子之吏鄭云謂三公也是三公稱吏襄公十年左氏傳晉滅偪陽使周内史選其族嗣納諸霍人注内史掌爵禄廢置者單靖公為卿士以相王室十五年左氏傳官師從單靖公逆王后于齊卿不行非禮也注官師劉夏也士疏祭法云官師一廟鄭云官師中士下也是天子官師非卿也二十一年左氏傳欒盈過周辭于行人注王行人也將歸死于尉氏注尉氏討奸之官室疏周禮司冦之屬無尉氏之官葢周既衰官名改易於時有此官耳蕙田案漢以廷尉主刑名葢因於此王使司徒禁掠欒氏者歸所取焉疏周官司冦掌詰奸慝刑暴亂當使司冦而云司徒者以司徒掌㑹萬民之卒伍以起徒役以比追胥以此追冦盗是其所掌獲得罪人乃使司冦刑之耳使候出諸轘轅注候迎送賔客之官顧氏棟高曰周禮夏官有候人各掌其方之道治與其禁令以設候人若有方治則帥而致于朝及歸送之于竟周語云敵國賔至候人為道是諸侯亦有候人也二十六年左氏傳晉韓宣子聘于周王使請事對曰晉士起將歸時事于宰旅無他事矣顧氏棟高曰周禮太宰之屬旅下士三十有二人昭公九年左氏傳周甘人與晉閻嘉爭閻田王使賔滑執甘大夫襄以説于晉疏典邑大夫法當以邑名冠之而稱人甘人是甘縣大夫知閻嘉是晋之閻縣大夫顧氏棟高曰周禮縣正每縣下大夫一人各掌其縣之政令徴比則此縣大夫即周禮之縣正也二十一年左氏傳天王將鑄無射泠州鳩曰王其以心疾死乎注泠樂官二十二年左氏傳司徒醜以王師敗績于前城哀公六年左氏傳有雲如衆赤烏夾日以飛三日楚子使問之周太史蕙田案以上周隱公二年左氏傳司空無駭入極注魯司徒司馬司空皆卿也十一年左氏傳羽父請殺桓公将以求太宰疏天子六卿天官為太宰諸侯則并六為三而兼職焉昭四年傳稱季孫為司徒叔孫為司馬孟孫為司空則魯之三卿無太宰羽父名見于經已是卿矣而復求太宰盖欲令魯特設是官以榮已耳以後更無太宰知魯竟不立之文公十八年左氏傳莒僕來奔季文子使司冦出諸竟襄公二十一年左氏傳季孫謂臧武仲曰子為司冦将盜是務去蕙田案宣叔武仲皆官司冦而名見於春秋則魯之司冦亦卿官矣顧寜人謂臧紇為小司冦者非是昭公四年左氏傳杜洩曰君使三官書之吾子為司徒實書名注謂季孫也書名定位號夫子為司馬與工正書服注叔孫也服車服之器工正所書孟孫為司空以書勲注勲功也疏周禮大司徒掌十二教十有一曰以賢制爵十有二曰以庸制禄故司徒書名定位號也周禮夏官司馬其屬有司士掌羣臣之政以徳詔爵以功詔禄工正雖不屬司馬掌作車服故與司焉書服也周禮司勲屬夏官今司空書勲者春秋之時又是諸侯之法不可盡與禮同定公元年左氏傳孔子之為司冦也溝而合諸墓注孔子為司冦在定公十年後孔氏穎逹禮記正義崔靈恩云諸侯三卿司徒兼冢宰司馬兼宗伯司空兼司冦三卿之下有五大夫五大夫者司徒之下立二人小宰小司徒司馬之下以其事省立一人為小司馬兼宗伯之事司空之下立二人小司空小司冦今夫子為司空者為小司空也從小司空為小司冦也崔所以知然者魯有孟叔季三卿為政又有臧氏為司冦故知孔子為小司冦十二年左氏傳仲尼命申句湏樂頎下伐之注仲尼時為司冦疏史記孔子世家云定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司冦十年㑹于夾谷時已為司冦矣十四年孔子由大司冦攝行相事是此時仲尼為司冦蕙田案魯自成襄以後司徒司馬司空三卿常以季孟叔三家居之而子叔氏臧氏亦以世卿見於春秋又如成二年戰于鞌季孫行父臧孫許叔孫僑如公孫嬰齊四卿並行其時尚有仲嬰齊仲孫蔑兩卿則魯亦有六卿但其官名惟臧孫許知是司冦餘二卿則不可考耳冉求稱孔子為國老而孔子之卒書於魯史葢昭定之世臧氏漸㣲故以孔子代之崔氏以為小司冦者疑非然也桓公六年左氏傳子同生卜士負之士妻食之注禮世子生三日卜士負之射人以桑弧蓬矢射天地四方卜士之妻為乳母荘公九年左氏傳師及齊師戰于乾時我師敗績公䘮戎路傳乗而歸秦子梁子以公旗辟于下道是以皆止注二子公御及戎右也十一年左氏傳乗邱之役公以金僕姑射南宮長萬公右顓孫生摶之注檀弓云魯荘公及宋人戰于乗邱縣賁父御卜國為右車右與此不同者禮記後人所録聞于所聞之口其事未必實也三十二年左氏傳圉人犖顧氏棟高曰周禮夏官有圉師圉人掌飬馬者閔公二年左氏傳成季之將生也桓公使卜楚邱之父卜之注卜楚邱魯掌卜大夫僖公二十一年左氏傳夏大旱公欲焚巫尫顧氏棟高曰周禮司巫中士二人掌羣巫之政令若國大旱則率巫而舞雩鄭司農引此傳為証文公二年左氏傳于是夏父弗忌為宗伯注宗伯掌宗廟昭穆之禮顧氏棟高曰諸侯不應有宗伯而周禮春官之屬有都宗人掌都祭祀之禮家宗人掌家祭祀之禮定四年傳稱魯公之封有祝宗卜史杜氏解宗為宗人魯語哀姜至公使大夫宗婦覿用幣宗人夏父展曰非故也韋注宗人宗伯也則魯之宗人亦謂之宗伯葢其所掌與周官小宗伯同蕙田案魯之夏父氏葢世為宗人之官左傳以弗忌為宗伯葢僣稱也春秋諸國皆不立宗伯以諸侯三卿五大夫無宗伯小宗伯故也四年左氏傳衛寗武子來聘使行人私焉顧氏棟高曰案行人見于經者六並以見執書是乃一時奉使非專官又案㐮四年正義云周禮大行人掌大賔之禮大客之儀小行人掌使適四方協賔客之禮諸侯行人當亦通掌此事故為通使之官然則經傳所書行人雖各異其職掌正同十一年左氏傳鄋瞞侵齊遂伐我公使叔孫得臣追之侯叔夏御荘叔綿房甥為右富父終甥駟乗注駟乗四人共車十五年左氏傳卞人以告注卞邑大夫顧氏棟髙曰案昭四年申豐論藏氷曰縣人傳之杜曰縣人遂屬正義曰五縣為遂然周禮有遂人遂大夫而無縣人疑諸侯之縣大夫即謂之縣人也㐮十年𫝊郰人紇正義曰公邑大夫皆以邑名冠之呼某人成二年𫝊衛新築人仲叔于奚杜曰守新築大夫昭二十一年𫝊宋厨人濮杜曰厨邑大夫是邑大夫通呼為人也襄公四年左氏傳匠慶謂季文子注匠慶魯大匠七年左氏傳叔孫昭伯為隧正注隧正主役徒之疏隧正官名當周禮遂人二十三年左氏傳公鉏出為公左宰注出季氏家臣仕于公顧氏棟高曰魯有左宰即當復有右宰衛有右宰即當復有左宰然不知其所掌何職也孟氏將辟藉除于臧氏臧孫使正夫助之注正夫隧正疏隧正當屬司徒臧氏為司冦葢兼掌之將盟臧氏季孫召外史掌惡臣而問盟首焉疏周禮外史掌書外令掌四方之志今季孫召外史葢魯亦立此官也顧氏棟高曰此疏言魯亦有外史之官而序文疏内則云史官身居在外季孫從内召之故曰外史又以南史外史皆非官名今据尚書諸侯得有内史則亦有外史也二十七年左氏傳十一月乙亥朔日有食之辰在申司厯過也再失閏矣蕙田案司厯者乃太史之屬所謂諸侯有日御是也二十八年左氏傳叔孫穆子食慶封使工為之誦茅鴟注工樂師二十九年左氏傳使工為之歌周南召南顧氏棟高曰周禮春官太師下大夫二人小師上士四人其下有瞽矇之屬鄭注云凡樂之歌必使瞽矇為焉命其賢知者以為太師少師魯論有太師摯少師陽而傳無之今案昭九年傳屠蒯酌以飲工而檀弓以為即師曠則是太師以下通謂之工也楚人使公視禭乃使巫以桃茢先祓殯注巫者接神之官顧氏棟高曰周禮男巫王弔則與祝前䘮祝王弔則與巫前鄭司農引此傳為証昭公二年左氏傳韓宣子來聘觀書于太史氏見易象與魯春秋曰周禮盡在魯矣疏太史職掌書籍必有蔵書之處若今之祕閣四年左氏傳公御萊書注公御士五年左氏傳南遺使國人助竪牛以攻仲壬于大庫之庭司宫射之十七年左氏傳日有食之祝史請所用幣顧氏棟高曰掌祝者謂之祝史猶掌卜者謂之筮史周禮春官大祝掌六祝之辭以祝鬼神示其屬有小祝䘮祝甸祝詛祝等官定四年傳分魯以祝宗卜史謂太祝宗人太卜太史四官則魯有太祝也二十五年左氏傳公果賁使侍人僚柤告公三十二年左氏傳公疾徧賜大夫賜子家子雙琥一環一璧輕服受之公薨子家反賜于府人哀公三年左氏傳桓僖災南宫敬叔至命周人出御書俟于宫注周人司周書典籍之官御書進于君者也子服景伯至命宰人出禮書注宰人冢宰之屬校人乘馬巾車脂轄注校人掌馬巾車掌車公父文伯至命校人駕乘車蕙田案魯諸侯不設冢宰當有小宰以大夫為之而宰人則其屬也校人巾車皆周禮官名二十四年左氏傳公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之注宗人禮官蕙田案以上魯所設官之見於傳者其左宰及周人二官則他國無之襄公七年左氏傳南遺為費宰顧氏棟高曰宰本家臣之名而邑長亦稱宰正義曰公邑稱大夫私邑稱宰然昭二十六年傳成大夫公孫朝是私邑亦稱大夫哀八年傳王犯嘗為武城宰是公邑亦稱宰也十年左氏傳孟獻子以秦堇父為右二十三年左氏傳季氏以公鉏為馬正注馬正家司馬孟氏之御騶豐㸃注騶是掌馬之官葢兼掌御事謂之御騶二十五年左氏傳及季姒與饔人檀通注饔人食官叔孫氏之司馬鬷戾顧氏棟高曰周禮家司馬各使其臣以正于公司馬鄭注卿大夫之采地各自使其家臣為司馬主其地軍賦叔孫昭子齊于其寢使祝宗祈死顧氏棟高曰此叔孫氏之宗人即周禮所云家宗人也臧㑹奔郈郈魴假使為賈正焉疏賈正如周禮之賈師其職云各掌其次之貨賄之治辨其物而均平之禁貴賣者使有恒賈此郈市之賈正也定公七年左氏傳齊國夏伐我陽虎御季桓子公歛處父御孟懿子將宵軍齊師蕙田案以此傳及哀十一年傳推之則魯卿之御與戎右皆家臣也八年左氏傳虞人以鈹盾夾之孟氏選圉人之壯者三百人以為公期築室于門外十年左氏傳公南為馬正使公若為郈宰武叔使郈馬正侯犯殺公若弗能其圉人注叔孫之圉人殺公若叔孫謂郈工師駟赤注工師掌工匠之官哀公十一年左氏傳孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右十四年左氏傳叔孫氏之車子鉏商獲麟疏服䖍云車車士考家語有士字王肅云車士将車者也此則大夫之家主車蕙田案以上大夫家臣又案以上魯桓公六年左氏傳申繻曰晉以僖侯廢司徒注僖侯名司徒廢為中軍顧氏棟高曰僖侯之卒在春秋前百年是春秋時晋久無司徒之官僖二十七年晋文公始作三軍使郤縠将中軍則為廢司徒為中軍者杜葢據後事言也三年左氏傳曲沃武公伐翼韓萬御戎梁宏為右莊公二十六年左氏傳士蒍為大司空注大司空卿官蕙田案獻公時尚以司空為卿至文公作三軍以將佐為六卿而司馬司空僅為散職先王之制盡廢矣閔公元年左氏傳公将上軍太子申生将下軍趙夙御戎畢萬為右二年左氏傳晉侯使太子申生伐東山臯落氏狐突御戎先友為右梁餘子養御罕夷先丹木為右注申生以太子将上軍罕夷晋下軍卿也僖公八年左氏傳里克帥師梁由靡御虢射為右十五年左氏傳歩揚御戎家僕徒為右梁由靡御韓簡虢射為右顧氏棟高曰晋始作二軍上軍公自将下軍太子将之閔二年伐東山臯落氏杜注申生以太子将上軍罕夷下軍卿据此則僖十五年韓之戰亦是公将上軍韓簡則下軍将也僖八年傳里克帥師其御右同韓簡當亦是下軍将蕙田案以上三條推之則晉初上下二軍之帥無常人矣僖公二十七年左氏傳蒐于被廬作三軍謀元帥使郤縠将中軍郤溱佐之使狐偃将上軍讓於狐毛而佐之命趙衰為卿譲於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犨為右顧氏棟高曰晋政卿亦稱元帥僖二十七年傳作三軍謀元帥是也亦稱将軍昭二十八年傳豈将軍食之而有不足是也後世設官有将軍元帥等名其原實起于此蕙田案晉本大國曲沃以支子併宗國王以一軍命為諸侯閔元年獻公作二軍至是始復大國三軍之舊二十八年左氏傳晉郤縠卒原軫将中軍胥臣佐下軍注先軫以下軍佐超将中軍三月立舟之僑以為戎右注代魏犨六月舟之僑先歸士㑹攝右晉侯作三行以禦狄荀林父将中行屠撃将右行先蔑將左行注晋置三軍今復增置三行以避天子六軍之名三行無佐疑大夫帥三十一年左氏傳晉蒐于清原作五軍以禦狄趙衰為卿注二十八年作三行今罷之更為上下新軍二十七年命趙衰為卿譲于欒枝今始從原大夫為新軍帥都疏晋語云使趙衰将上軍箕鄭佐之胥嬰将下軍先佐之于時舊三軍之将佐則先軫将中軍郤溱佐之先且居将上軍狐偃佐之欒枝将下軍胥臣佐之三十三年左氏傳文公以冀缺為下軍大夫反自箕㐮公以三命命先且居将中軍以再命命先茅之縣賞胥臣以一命命郤缺為卿復與之冀亦未有軍行注雖登卿位未有軍列蕙田案此時晉於五軍将佐十人之外别立郤缺為卿比於天子六卿且将倍之僭妄甚矣文公二年左氏傳先且居将中軍趙衰佐之王官無地御戎狐鞫居為右殽之戰梁宏御戎萊駒為右戰之明日襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乗遂以為右箕之役先軫黜之而立續簡伯六月穆伯及晉司空士縠盟于垂隴注晋司空非卿也以縠能堪卿事故書蕙田案士縠非卿而見于春秋葢亦如郤缺之類以一命為卿而未有軍列者耳六年左氏傳晉蒐于夷舍二軍注復三軍之制卿疏清原之蒐五軍十有先軫郤溱先且居狐偃欒枝胥臣趙衰箕鄭胥嬰先都箕之役先軫死徃嵗趙衰欒枝先且居胥臣卒八年傳説此蒐之事云晋侯将登箕鄭父先都則郤溱孤偃胥嬰亦先卒矣清原十卿惟有箕鄭先都在耳故蒐以謀軍帥也服䖍云使射姑代先且居趙盾代趙衰也箕鄭将上軍林父佐也先蔑将下軍先都佐也改蒐於董趙盾将中軍射姑奔狄先克代将中軍使狐射姑将中軍趙盾佐之陽處父至自温改蒐于董易中軍注易以趙盾為帥射姑佐之宣子於是乎始為國政既成以授太傅陽子與太師賈佗使行諸晉國以為常法疏周禮上公之國有孤一人王制諸侯三卿晋侯爵而有三軍六卿復有孤二人者晋為伯主多置羣官不能如禮孤尊于卿法由在上故宣子法成授二孤使行之顧氏棟高曰晋置孤卿已僣而有二孤尤非禮也七年左氏傳趙盾将中軍先克佐之荀林父佐上軍注箕鄭将上軍居守故佐獨行先蔑将下軍先都佐之歩招御戎戎津為右十二年左氏傳趙盾将中軍荀林父佐之郤缺将上軍臾駢佐之欒盾将下軍胥甲佐之范無恤御戎宣公元年左氏傳晉人討不用命者放胥甲父于衛注胥甲下軍佐而立胥克八年左氏傳晉胥克有蠱疾郤缺為政注代趙盾秋廢胥克使趙朔佐下軍蕙田案傳凡言為政者皆中軍帥也十二年左氏傳荀林父将中軍先縠佐之士㑹将上軍郤克佐之趙朔将下軍欒書佐之趙括趙同為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬十六年左氏傳晉侯請于王以黻冕命士㑹将中軍且為太傅注天子太傅三公之官諸侯太傅孤卿之官周禮典命云公之孤四命鄭衆云九命上公得置孤卿一人春秋時晋為伯主侯亦置孤卿十七年左氏傳郤獻子為政成公二年左氏傳郤克将中軍士燮佐上軍欒書将下軍韓厥為司馬公㑹晉師于上鄍賜三帥先路三命之服司馬司空輿師候正亞旅皆受一命之服注晋司馬司空皆大夫輿師主兵車候正主斥候亞旅亦大夫也司疏明他國以為卿晋以為大夫軍行有此大夫從者馬主甲兵司空主營壘亞旅次于卿是衆大夫也無專職掌故後言之蕙田案此及襄十九年傳並以司馬司空與軍尉輿候並言葢晋自僖侯廢司徒以後至文公作三軍各以其将佐為卿而司空司馬之官遂不嘗置若軍中所置司馬則周禮軍司馬輿司馬之職也司空主軍中營壘與齊之鋭司徒辟司徒相類其秩甚卑非諸侯三卿之司馬司空也成三年左氏傳于是荀首佐中軍矣晉作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿注韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之晋舊有三軍今增此為六軍蕙田案晉文於三軍之外别立三行後改為新上下軍其後罷之至景公遂立六軍儼然天子之制矣四年左氏傳晉欒書将中軍荀首佐之士燮佐上軍六年左氏傳韓獻子将新中軍且為僕大夫公揖而入獻子從公立于寢庭注兼太僕掌疏太僕職云王視燕朝則正位擯相鄭注燕朝朝于路寢之庭也獻子既為僕大夫故知寢庭為路寝之庭十三年左氏傳晉欒書将中軍荀庚佐之士燮将上軍郤錡佐之韓厥将下軍荀罃佐之趙旃将新軍郤至佐之郤毅御戎欒鍼為右蕙田案成三年置新中上下三軍至是止有新軍不言上下知新上下軍罷於此時杜注罷新上下軍在十六年誤十六年左氏傳欒書将中軍士燮佐之郤錡将上軍荀偃佐之韓厥将下軍郤至佐新軍荀罃居守郤犨如衛又如齊皆乞師焉注荀罃下軍佐于是郤犨代趙旃将新軍新上下軍罷矣疏三年作六軍其新三軍将佐六人皆賞鞌之功死亡不復存至此惟有韓厥在耳郤至佐新軍不言上下是新軍惟一郤犨将新軍且為公族大夫以主東諸侯十七年左氏傳公使胥童為卿十八年左氏傳使魏相士魴魏頡趙武為卿疏晋語云使吕宣子佐下軍使彘共子将新軍令狐文子佐之彼言吕宣子魏相也彘共子士魴也令狐文子魏頡也又云吕宣子卒公以趙文子佐新軍蕙田案晉語所稱則魏相卒後以士魴佐下軍魏頡将新軍而趙武佐之也鄢陵之役四軍八卿此時惟欒書荀偃韓厥荀罃四人在耳士匄繼其父士燮為卿當在厲公之世惟下軍之佐以下三人則悼公新命之耳使士渥濁為太傅使修范武子之法右行辛為司空使修士蒍之法蕙田案士㑹為太傅孤卿也士蒍為大司空卿也此以大夫為之名存而實非矣弁紏御戎校正屬焉使訓諸御知義注校正主馬官官疏周禮大御御之長别有戎僕掌御戎車春秋征伐之世以御戎為重此御戎當是御之尊者校正當周禮校人掌王馬之政㐮九年傳命校正出馬知是主馬之官也周禮校人不屬大御此葢諸侯兼官或是悼公新法此傳所言諸官皆不得與周禮同也荀賔為右司士屬焉使訓勇力之士時使注司士車右之官疏周禮司士掌羣臣之版以詔王治其職非車右之類不得屬車右也周禮有司右上士也掌羣右之政凡國之勇力之士能用五兵者属焉其下更有戎右中大夫齊右下大夫道右上士此三右或官尊于司右而司右掌其政令春秋之世車右為尊此司士葢周禮司右之類為車右属官服䖍以為司士主右之官為司士也卿無共御立軍尉以攝之注省卿戎御令軍尉攝御而巳疏卿謂軍之諸将也若梁餘子養御罕夷解張御郤克之類徃前恒有定員掌共卿御今始省其常員惟立軍尉之官臨有軍事使兼攝之令軍尉兼卿御也祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏冦為上軍尉籍偃為之司馬使訓卒乗親以聽命疏此唯有中軍上軍無下軍之官者盖時下軍無闕不别立其官故也顧氏棟高曰卿御正義謂如梁餘子養御罕夷解張御郤克之類今案梁由靡始御里克復御韓簡是亦卿御也春秋時多公自将軍故有公御有卿御然晋三軍将佐固當各有御右如鄢陵之戰韓厥從鄭伯其御杜溷羅曰速從之郤至從鄭伯其右茀翰胡曰諜輅之余從之乗而俘以下厥是下軍之将至是新軍之佐宣二年傳晋侯伏甲将攻趙盾其右提彌明知之是有卿御即當復有卿右也又曰案國語以中軍尉為元尉上軍尉為輿尉而傳自有輿尉㐮十九年傳軍尉輿尉皆受一命之服是也又㐮三十年傳廢其輿尉正義曰服䖍云軍尉輿尉主𤼵衆使民于時趙武将中軍若是軍尉當是中軍尉也則中軍尉亦稱輿尉矣程鄭為乗馬御六騶屬焉使訓羣騶知禮注乗馬御乗車之僕六騶六閑之騶周禮諸侯有六閑乗車尚禮容故訓使知禮疏周禮齊僕下大夫掌馭金輅以賔朝覲宗遇饗食皆乗金輅杜言此是乗車之僕葢當周禮之齊僕晋語謂之賛僕當時之官名耳周禮掌駕之官無名騶者㐮二十三年傳稱孟氏之御騶豐點則騶亦御之類月令季秋天子乃教田獵命僕夫七騶咸駕鄭康成云七騶謂趣馬周禮趣馬下士掌駕説之頒是騶為主駕之官駕車以共御者程鄭為乗馬御御之貴者故令掌駕之官亦屬之十一月韓獻子為政襄公三年左氏傳使祁午為中軍尉羊舌赤佐之魏絳佐新軍注服䖍云于是魏頡卒矣使趙武将新軍代魏頡升魏絳佐新軍代趙武張老為中軍司馬士富為候奄四年左氏傳鄫無賦于司馬注晋司馬又掌諸侯之賦九年左氏傳韓厥老矣知罃禀焉以為政注代将中軍范匄少於中行偃而上之使佐中軍注使匄佐中軍偃将上軍韓起少於欒黶而欒黶士魴上之使佐上軍注黶魴譲起使起佐上軍黶将下軍魴佐之魏絳多功以趙武為賢而為之佐注武新軍将蕙田案此子嚢所述晉四軍将佐鄭子展所謂八卿和睦者是也韓厥請老在襄七年魏絳佐新軍在襄三年十三年左氏傳荀罃士魴卒晉侯蒐于緜上以治兵使荀偃将中軍士匄佐之趙武将上軍韓起佐之欒黶将下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乗官屬以從於下軍禮也十四年左氏傳晉舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也程氏啟生曰春秋置六軍者惟晉其外見于傳者吴有中上下三軍又有右軍為四軍如仍有左軍則五軍也楚亦唯中左右三軍齊中上下三軍魯止有二軍季武子欲弱公室作三軍至昭五年而舍之十六年左氏傳羊舌肸為傅疏亦當為太傅士㑹以中軍将兼之故知是孤卿士渥濁以大夫居之此復代渥濁亦大夫也諸侯之有孤卿猶天子有三公無人則闕故隨其本官高下而兼攝之也張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞邱書為乗馬御十九年左氏傳荀偃士匄以中軍克京兹魏絳欒盈以下軍克邿注欒黶死其子盈佐下軍趙武韓起以上軍圍盧弗克二十年左氏傳公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服范宣子為政注代荀偃將中軍二十四年左氏傳晉侯嬖程鄭使佐下軍二十五年左氏傳齊人賂晉侯以宗器樂器自六正注三軍之六卿五吏三十帥注五吏文職三十帥武職皆軍卿之屬官三軍之大夫百官之正長師旅注百官之正長羣有司也師旅小将帥及處守者皆有賂蕙田案五吏三十帥之名惟見於此趙文子為政注代范匄昭公二年左氏傳晉韓宣子來聘且告為政而來見五年左氏傳薳啟疆曰韓起之下趙成中行吳魏舒范鞅知盈注五卿位在韓起下皆三軍之将佐也蕙田案自襄十九年圍齊以後晉三軍将佐不得其詳以此傳推之則是時韓起将中軍趙成佐之中行吴将上軍魏舒佐之范鞅将下軍荀盈佐之也九年左氏傳使荀躒佐下軍注代其父荀盈十三年左氏傳荀吴以上軍侵鮮虞二十八年左氏傳魏獻子為政定公元年左氏傳晉之從政者新注范獻子新為政六年左氏傳所不以為中軍司馬者有如先君注中軍司馬晋國大夫之最尊者十三年左氏傳上軍司馬籍秦圍邯鄲顧氏棟高曰國語以中軍司馬為元司馬上軍司馬為輿司馬周禮夏官軍司馬下大夫四人輿司馬上士八人而晋皆大夫為之不與周禮同蕙田案晉自范鞅卒後趙氏與范中行相惡定十三年傳有趙鞅士吉射荀寅荀躒韓不信魏曼多六人當為三軍之将佐其位次則無考未幾范中行見逐六卿所存者僅四耳其後知氏亦亡而三家分晉之勢成矣又案以上晉六卿及軍将之屬隱公六年左氏傳翼九宗五正頃父之子嘉父逆晉侯于随注唐叔始封受懐姓九宗職官五正遂世為晋强家五正五官之長九宗九姓為一族也蕙田案九宗五正其後無聞閔公元年左氏傳卜偃曰畢萬之後必大注卜偃晋掌卜大夫僖公四年左氏傳初獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長僖公四年左氏傳與小臣小臣亦斃顧氏棟高曰周禮天官之屬有内小臣奄上士四人儀禮賈疏諸侯小臣當天子太僕之事此及成十年傳之小臣皆褻近之臣則是内小臣而非太僕之小臣也五年左氏傳公使寺人披伐蒲僖公十年左氏傳殺㔻鄭祁舉及七輿大夫注侯伯七命副車七乘輿疏每車一大夫主之謂之七輿大夫服䖍云上軍之帥七人屬申生者徃前申生將上軍今七輿大夫為申生報怨炫謂服言是十五年左氏傳初晉獻公筮嫁伯姬于秦史蘇占之曰不吉注史蘇晉卜筮之史二十四年左氏傳晉侯之豎頭須守藏者也注豎左右小吏顧氏棟高曰周禮内豎倍寺人之數掌内外之通令凡小事鄭注使童豎通主内外之命給小事者則此晉侯之豎即周禮之内豎齊寺人貂亦曰豎貂正義曰㓜童為内豎之官是也又成十六年傳曰榖陽豎獻飲于子反杜注榖陽子反内豎昭四年傳叔孫穆子使牛為豎哀十五年傳孔氏之豎渾良夫則大夫之家亦有内豎二十五年左氏傳趙衰為原大夫狐溱為温大夫顧氏棟高曰案傳云晉侯問原守于寺人勃鞮則縣邑之長亦謂之守二十七年左氏傳作執秩以正其官注執秩主爵秩之官二十八年左氏傳王命晉侯為侯伯賜之虎賁三百人注國語云天子有虎賁習武訓諸侯有旅賁禦灾害大夫有貳車偹承事士有陪乗告奔走周禮司馬之屬有虎賁氏下大夫二人虎士八百人二十八年左氏傳曺伯之豎侯獳貨筮史三十年左氏傳晉侯使醫衍酖衛侯寗俞貨醫使薄其酖宣公二年左氏傳宰夫胹熊蹯不熟殺之蕙田案宰夫即膳宰非周禮天官之宰夫太史書曰趙盾弑其君以示于朝孔子曰董狐古之良史也書法不隠初驪姬之亂詛無畜羣公子自是晉無公族注無公子故廢公族之官及成公即位乃宦卿之適子而為之田以為公族注宦仕也為置田邑以為公族大夫又宦其餘子亦為餘子注餘子嫡子之母弟也亦治餘子之政其庶子為公行注庶子妾子也掌率公戎行晉于是有公族餘子公行注皆官名冬趙盾為旄車之族使屏季以其故族為公族大夫疏公族之官掌教公之子弟餘子嫡子之母弟亦治餘子之政孔晁注國語云公族大夫掌公族及卿大夫子弟之官是卿之適子屬公族也餘子主教卿大夫適妻之次子公行不教庶子然則卿大夫之妾子亦是餘子之官教之矣公行掌率公戎車之行列詩魏風有公族公路公行其公族公行既同公路似此餘子但餘子不主路車公路非餘子也當與公行為一以其主君路車謂之公路主車行列謂之公行其實止是一官詩人變文以韵句耳周禮無此三官之名夏官有諸子下大夫二人掌國子之倅事與公族同春官有巾車下大夫二人掌王之五路事與公行同無餘子車皆建旄謂之旄車之族成公十年左氏傳召桑田巫使甸人獻麥注主為公田者饋人為之顧氏棟高曰周禮天官之屬有甸師掌帥其屬而耕耨王籍以時入之又曰王之同姓有罪則死刑焉鄭注引文王世子公族有罪致刑于甸人則甸人即甸師也又㐮三十一年傳甸設庭燎而周禮甸師帥其徒以薪蒸役外内饔之事此甸人為甸師明矣蕙田案周禮無饋人之名惟晉有之葢即地官之􅐪人也十七年左氏傳晉范文子反自鄢陵使其祝宗祈死顧氏棟高曰此亦是家宗人十八年左氏傳荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟恭儉孝弟襄公三年左氏傳魏絳至授僕人書注僕人晋侯御僕顧氏棟高曰周禮御僕掌羣吏之逆及庶民之復鄭司農云復謂奏事也逆謂受下奏則此僕人正御僕之職也請歸死于司冦蕙田案晉之司冦非卿當以大夫為之四年左氏傳工歌文王之三注工樂人韓獻子使行人子員問之蕙田案春秋行人以見執書者六皆命卿因事而出使惟晉之子員子朱鄭之公孫揮衛之子羽乃任行人之職者故特録之他皆未及十四年左氏傳左史謂魏荘子曰不待中行伯乎師曠侍于晉侯注師曠晋樂太師十六年左氏傳祁奚韓襄欒盈士鞅為公族大夫十八年左氏傳見梗陽之巫臯二十三年左氏傳唯魏氏及七輿大夫與之注七輿官名疏僖十年傳杜謂副車則此七輿大夫杜亦謂主副車之官也劉炫云若是主公車則當情親于公不應曲附欒氏服䖍云下軍輿帥七人欒盈将下軍故七與大夫與欒氏炫謂服言是顧氏棟高曰僖十年傳七輿大夫之中有左行共華右行賈華時晋猶未置三行則所謂左行右行者猶掌公戎車謂之公行耳杜説未為無據七輿大夫與欒氏葢盈之黨有為是官者耳魏獻子猶附盈豈得以七輿大夫為疑二十六年左氏傳秦伯之弟鍼如晉修成叔向命召行人子員行人子朱曰朱也當御三十年左氏傳絳縣人或年長矣趙孟問其縣大夫則其屬也注絳非趙武私邑而云則其屬者葢諸是公邑國卿分掌之使為君復陶注主衣服之官在疏昭十二年楚子皮冠秦復陶翠被豹舄復陶之文冠履之間知復陶是衣也此言君復陶知是主君衣服之官以為絳縣師注縣師掌地域辨其夫家人民疏周禮縣師上士二人掌邦國都鄙稍甸郊里之地域而辨其夫家人民田畆之數及其六畜車輦之稽凡造都邑量其地而制其域以歳時徴野之貢賦天子之縣師掌此數事則諸侯之縣師亦然昭公元年左氏傳晉侯有疾卜人曰實沈臺駘為祟九年左氏傳晉侯飲酒樂膳宰屠蒯趨入請佐公司尊而遂酌以飲工注工即師曠十四年左氏傳士景伯如楚叔魚攝理注士景伯晋理官十五年左氏傳王謂籍談曰昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉于是乎有董史女司典之後也何故忘之注辛有周人也其二子適晋為大史籍黶與之共董督晋典因為董氏董狐其後十七年左氏傳晉荀吴帥師渉自棘津使祭史先用牲于雒顧氏棟高曰祭史當即祝史又㐮二十七年傳叔向稱范武子祝史陳信于鬼神是大夫之家亦有祝史二十八年左氏傳魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為鄔大夫賈辛為祁大夫司馬烏為平陵大夫知徐吾為塗水大夫韓固為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫哀公四年左氏傳使謂隂地之命大夫士蔑注命大夫别縣監尹大疏若是典邑大夫則當以邑名冠之乃言隂地之命夫則是特命大夫使總監隂地以其去國遥逺别為置監九年左氏傳趙鞅卜救鄭占諸史趙史墨史龜顧氏棟高曰周禮占人職曰凡卜筮史占墨禮記玉藻曰卜人定龜史定墨君定體又月令命太史釁龜䇿占兆審卦吉凶則卜筮之事雖太卜等官專掌而太史亦莅其事故周太史及晋史趙諸人並以占卜見或謂春秋時稍稍侵官殆未然也蕙田案以上晉桓公六年左氏傳宋以武公廢司空注武公名司空廢為司城文公十一年左氏傳初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耏班御皇父充石公子榖甥為右司冦牛父駟乗以敗狄于長丘蕙田案此二事在春秋以前桓公二年左氏傳宋殤公立十年十一戰孔父嘉為司馬督為大宰顧氏棟高曰文七年傳宋六卿和公室及哀二十六年傳六卿三族降聽政並以左師右師司馬司徒司城司冦為六卿成十五年傳華元曰我為右師君臣之訓師所司也是宋以右師為政卿也太宰在六官之下而此傳云遂相宋公葢非常制又案僖九年傳宋㐮公即位以公子目夷為仁使為左師以聽政于是宋治㐮九年宋災傳樂喜為司城以為政正義曰子罕賢知故特使為政齊任管夷吾魯任叔孫婼皆位卑而執國政哀二十六年傳司城為上卿是宋亦有以左師司城執政者矣僖公九年左氏傳以公子目夷為仁使為左師以聽政故魚氏世為左師蕙田案自成十五年魚石奔楚乃以向戌代之向氏亦桓族與魚氏同所自出十九年左氏傳司馬子魚二十二年左氏傳楚人伐宋以救鄭宋公将戰大司馬固諌注大司馬固荘公之孫公孫固也顧氏棟高曰案下文戰于泓司馬曰彼衆我寡杜以為子魚史記宋世家前後皆作子魚之言又文七年傳殺公孫固公孫鄭于時樂豫為司馬列于六卿則固非卿明矣顧寕人謂大司馬即子魚則固諌當為固請之義孔疏謂六卿之外别有孤卿宋上公禮得有孤葢附杜而為之説也又案宋六卿自殤公以前則大司馬執政華督殺司馬孔父遂以太宰相㐮公即位子魚以左師聼政而傳文始終稱司馬子魚疑是時始立左右二師而子魚以司馬兼左師後遂為專官也文公七年左氏傳於是公子成為右師公孫友為左師樂豫為司馬鱗䑏為司徒公子蕩為司城華御事為司冦注傳言六卿皆公族六卿和公室樂豫舍司馬以讓公子卬蕙田案宋六卿始見於此八年宋人殺其大夫司馬宋司城來奔左氏傳殺大司馬公子卬司馬握節以死故書以官司城蕩意諸來奔效節于府人而出公以其官逆之亦書以官皆貴之也十五年宋司馬華孫來盟左氏傳宋華耦來盟其官皆從之書曰宋司馬華孫貴之也蕙田案春秋大夫以官名書於經者惟宋有之程子謂宋王者後得自命卿故書疑或然也十六年左氏傳於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司冦文公即位使母弟湏為司城華耦卒而使蕩虺為司馬十八年左氏傳使公孫師為司城樂吕為司冦成公十五年左氏傳於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向􅙮為大宰魚府為少宰華元使華喜公孫師帥國人攻蕩氏殺子山左師二司冦二宰遂出奔楚注四大夫不書獨魚石告書疏服䖍云魚石卿故書以為四人非卿故不杜不然者向為人為大司冦亦是卿也若五人皆告為卿則書向為人亦當書之何以獨書魚石杜言獨以魚石告正為向為人不書故也或少司冦二宰等六卿之外亦是卿官合書名氏猶如魯之三卿外别有公孫嬰齊臧孫許但非如六卿等世掌國政也華元使向戌為左師老佐為司馬樂裔為司冦以靖國人襄公九年左氏傳宋災樂喜為司城以為政注樂喜子罕也為政卿司疏傳言宋六卿之次皆云右師左師司馬司徒司城冦則當右師為政卿今言樂喜為政卿者葢宋以華閲是華元之子元有大功使閲􅁇其父耳子罕賢知故特使為政齊任管夷吾魯任叔孫婼皆位卑而執國政此亦然也使伯氏司里注司里里宰謂疏周禮里宰毎里下士一人六遂之内二十五家之長也此言司里謂司城内之民若今城内之坊里也里必有長不知其官之名周禮有里宰故以宰言之非是郊外之民二十五家之長也使華臣具正徒注時為司徒掌疏周禮大司徒徒庶之政令小司徒凡用衆庶則掌其政教凡國之大事致民是司徒掌役徒也言具正徒司里所使隧正所納皆是臨時調民而役之若今之夫役司徒所具正徒者常供官役若今之正丁也令隧正納郊保奔火所注隧正官名也五縣為隧夫疏此隧正當天子之遂大使華閲討右官官庀其司向戌討左亦如之注閲華元子代元為右師向戌左師使樂遄庀刑器注樂遄司冦使皇鄖命校正出馬工正出車偹甲兵庀武守注校正主馬工正主車此疏車馬甲兵司馬之職使皇鄖掌鄖必是司馬也校正主馬於周禮為校人是司馬之屬官也周禮司馬之屬無主車之官巾車車僕職皆掌車乃為宗伯之屬昭四年傳云夫子為司馬與工正書服是諸侯之官司馬之屬有工正主車也使西鉏吾庀府守注鉏吾太宰也邦疏鉏吾太宰傳無其文周禮太宰之職掌建之六典杜以府為六官之典故使具官守劉以為府庫守藏今知不然者以百司府藏已屬左右二師上華閲討右官官庀其司向戌討左亦如之則府庫之物二師總令羣官所主哀三年魯灾出禮書御書藏象魏皆以典籍為重明此府守是六官之典令司宫巷伯儆宫注司宫奄臣巷伯寺人皆掌宫内之事疏周禮無司宫巷伯之官惟有内小臣奄上士四人鄭云奄稱士者異其賢也奄人之官此為最長則司宫當天子之内小臣也周禮又云寺人王之正内五人鄭云正内路寝也王肅云今後宫稱永巷是巷者宫内道也伯長也是宫内門巷之長故知巷伯是寺人也二師使四鄉正敬享注郷正郷大夫毎疏周禮郷大夫郷卿一人天子六郷即以卿為之長此𫝊云二師使四郷正則别立郷正非卿典之但其所職掌當天子之郷大夫耳周禮郷為一軍宋大國不過三軍而有四郷者當時所立非正法也祝宗用馬于四墉祀盤庚于西門之外注祝大祝宗宗人顧氏棟高曰宋雖立六卿而無宗伯周禮小宗伯掌建國之神位大烖及執事禱祠于上下神􅅘鄭注曰執事大祝及男巫女巫也小宗伯與執事共禱祀春秋時多祝宗並稱則諸侯之宗人當周禮小宗伯之職也蕙田案國語單襄公云火之初見期於司里司里主營造土功之事葢司空之屬樂喜為司城故首命之杜以為里宰者非也十七年左氏傳皇國父為太宰二十七年左氏傳宋人享趙文子叔向為介司馬置折爼禮也注周禮司馬掌㑹同之事二十九年左氏傳宋司徒見知伯注司徒華定也昭公六年左氏傳華合比奔衛華亥欲代右師乃與寺人栁比公使代之注代合比為右師十九年左氏傳少司冦牼注牼華亥庶兄二十年左氏傳宋華費遂生華貙華多僚華登貙為少司馬多僚為御士注公御士公曰司馬以吾故亡其良子注謂費遂為大司馬二十一年左氏傳宋公使公孫忌為大司馬注代華費遂邊卬為大司徒注代華定樂祁為司城仲幾為左師注代向寕樂大心為右師注代華亥樂輓為大司冦蕙田案宋於司馬司冦之外又有少司馬少司冦此𫝊云大司徒則當有少司徒矣襄公二十六年左氏傳寺人惠墻伊戾為太子内師而無寵疏内師身為寺人之官公使之監知太子内事為在内人之長也左師見夫人之歩馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人昭公六年左氏傳寺人桞有寵太子佐惡之二十一年左氏傳公使寺人召司馬之侍人宜僚子禄御公子城莊堇為右干犨御吕封人華豹張匄為右注吕邑封人官哀公十四年左氏傳迹人來告曰逢澤有介麋焉注迹人主迹禽獸者令疏周禮地官迹人掌邦田之政凡田獵者受焉鄭云迹之言跡知禽獸之處也二十六年左氏傳六卿三族降聽政因大尹以逹大尹常不告而以其欲稱君以令注大尹近官有寵者大尹使祝為載書祝襄以載書告皇非我顧氏棟高曰周禮詛祝掌盟詛作盟詛之載辭鄭司農引此傳為証門尹得顧氏棟高曰國語敵國賔至關尹以告門尹除門周禮地官之屬司門下大夫二人司闗上士二人中士四人鄭司農以司闗為闗尹則門尹當即周禮之司門也蕙田案以上宋荘公九年左氏傳鮑叔曰管夷吾治于高徯使相可也二十二年左氏傳陳公子完奔齊桓公使為工正注掌百工之官僖公十二年左氏傳齊侯使管仲平戎于王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在注國子高子天子所命為齊守臣皆上卿也管仲受下卿之禮而還注卒受本位之禮成公十八年左氏傳慶封為大夫慶佐為司冦蕙田案齊之司冦非卿襄公二十五年左氏傳慶封為左相顧氏棟高曰案史記齊世家景公立以崔杼為右相是齊高國二卿之外于時復立左右二相蕙田案左傳載齊之官制甚略所可見者惟國髙二子世為上卿然亦不詳其官名至二上卿之外别立二相亦他國所無也國語稱桓公使鮑叔為宰韋昭以為太宰也則齊又有太宰矣僖公二年左氏傳齊寺人貂始漏師于多魚十七年左氏傳雍巫有寵于衛共姬因寺人貂以薦羞于公注雍人名巫即易牙成公二年左氏傳邴夏御齊侯逢丑父為右齊師敗鄭周父御佐車宛茷為右載齊侯以免齊侯自齊闗入辟女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣注鋭司徒主鋭兵者既而問之辟司徒之妻也注辟司徒主壘壁者成公十八年左氏傳齊侯使士華免以戈殺國佐于内宫之朝注士者士官也掌刑政襄公二十三年左氏傳齊侯伐衛先驅榖榮御王孫揮召揚為右申驅成秩御莒恒申鮮虞之傅摯為右曹開御戎晏父戎為右貳廣上之登御邢公盧蒲癸為右啟牢成御襄罷師狼蘧疏為右胠商子車御侯朝桓跳為右大殿商子游御夏之御冦崔如為右燭庸之越駟乗顧氏棟高曰公御曰御戎餘但稱御二十五年左氏傳祝佗父祭于髙唐申蒯侍漁者注侍漁監取魚之官顧氏棟高曰周禮􅘋人掌以時􅘋為梁凡􅘋者掌其政令此侍漁當周禮之􅘋人也太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史聞太史盡死執簡以徃聞既書矣乃還孔氏頴逹曰南史是佐太史者當是小史也居在南故謂之南史耳二十七年左氏傳崔子使圉人駕寺人御而出注圉人養馬者寺人奄士蕙田案圉人寺人皆大夫家臣二十八年陳氏鮑氏之圉人為優亦同二十八年左氏傳公膳日雙雞饔人竊更之以鶩昭公二十年左氏傳君盍誅于祝固史嚚疏服䖍云祝固齊太祝史嚚太史也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之注衡鹿舟鮫虞候祈望皆官名也疏周禮司徒之屬有林衡之官掌廵林麓之禁此置衡鹿以守山林是也舟行水之器鮫大魚之名澤中有水有魚故以舟鮫為官名也周禮山澤之官皆名為虞毎大澤大藪中士四人藪是少水之澤立官使之候望故以虞候為名海是水之大神有時祈望祭之因以祈望為主海之官此皆齊自立名故與周禮不同齊侯田于沛招虞人以弓二十七年左氏傳齊侯飲公酒使宰獻而請安疏公燕大夫之禮公雖親在而别有主人鄭云主人者宰夫也宰夫太宰之屬掌賔客之獻飲食者也君于其臣雖為賔不親獻以其尊莫敢抗禮今齊侯與公飲酒而使宰獻是比公于大夫也哀公六年左氏傳鮑子醉而徃其臣差車鮑㸃注差車主車之官蕙田案此亦大夫之家臣二十一年左氏傳公及齊侯邾子盟于顧公先至于陽榖齊閭邱息曰為僕人之未次請除館于舟道辭曰敢勤僕人顧氏棟高曰杜注以次為次舍則此僕人當如鄭之外僕掌次舍者蕙田案以上齊僖公七年左氏傳鄭有叔詹堵叔師叔三良為政襄公二年左氏傳於是子罕當國注攝君事子駟為政注為正卿子國為司馬九年左氏傳同盟于戲鄭六卿公子騑公子𤼵公子嘉公孫輙公孫蠆公孫舍之及其大夫門子皆從鄭伯注門子卿之適子之疏周禮小宗伯掌三族之别以辨親疎其正室皆謂門子鄭云正室適子也将代父當門者也是卿之適子為門子也十年左氏傳于是子駟當國子國為司馬子耳為司空子孔為司徒子孔當國為載書以位序聽政辟大夫諸司門子弗順十一年左氏傳鄭使良霄太宰石㚟如楚程氏啟生曰石㚟為良霄之介則太宰之官非鄭所重矣十四年左氏傳鄭司馬子蟜十九年左氏傳鄭人使子展當國子西聽政立子産為卿二十二年左氏傳鄭人使少正公孫僑對注少正鄭卿官疏十九年傳云立子産為卿知少正是鄭之卿官春秋之時官名變改周禮無此名也二十六年左氏傳鄭伯賞入陳之功享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四注上卿子展次卿子西十一年良霄見經十九年乃立子産為卿故位在四且子展之功也臣不敢及賞禮請辭邑公固予之乃受三邑子太叔為令正注主作辭令之正二十七年左氏傳鄭伯享趙孟于垂隴子展伯有子西子産子太叔二子石從蕙田案鄭有六卿此傳七子之中惟公孫叚未為卿三十年傳伯有既死使太史命伯石為卿可證也二十九年左氏傳鄭子展卒子皮即位注子皮代父為上卿罕氏常掌國政以為上卿三十年左氏傳鄭子皮授子産政伯有既死使太史命伯石為卿辭太史退則請命焉復命之又辭如是三乃受䇿入拜子産是以惡其為人也使次已位注畏其作亂故寵之顧氏棟高曰案周禮䇿命之事掌于内史今鄭以太史主之孔疏以為諸侯兼官無内史然尚書酒誥太史友内史友則諸侯得立内史或鄭令太史兼攝耳昭公元年左氏傳趙孟曰武請于冢宰矣注冢宰子皮顧氏棟高曰冢宰執政之美稱猶南遺稱季孫為冢卿士㑹稱蒍敖為宰非鄭獨設冢宰之官六月鄭伯及其大夫盟于公孫叚氏罕虎公孫僑公孫叚印叚游吉駟帶私盟于閨門之外實薫隧公孫黒强與于盟使太史書其名且曰七子注自欲同于六卿故云七子二年左氏傳子産曰不速死司冦將至十六年左氏傳鄭六卿餞宣子于郊蕙田案六卿謂子齹子産子太叔子游子旗子栁也罕氏世為上卿故子産雖執國政而位次猶在子齹之下十八年左氏傳鄭火子産使司冦出新客禁舊客勿出于宫司馬司冦列居火道注偹非常也顧氏棟高曰鄭六卿其名可見者司馬司空司徒三官㐮二年傳云子罕當國子駟為政子國為司馬十年傳云子駟當國子國為司馬子耳為司空子孔為司徒盗殺子駟子國子耳子孔當國十九年傳云鄭人使子展當國子西聽政立子産為卿三十年傳云子皮授子産政曰虎帥以聽誰敢犯子子産為政是鄭卿最尊者當國當國之下復有為政一人此二卿未知以何名命之子産以少正為卿則六卿之中當有少正又與宋六官不同蕙田案昭十八年傳司冦與司馬並稱疑司冦亦卿也隱公元年左氏傳穎考叔為穎谷封人疏周禮封人掌為畿封而樹之鄭康成云畿上有封若今時界也天子封人職典封疆諸侯封人亦然桓公十一年左氏傳祭封人仲足蕙田案周禮封人以中下士為之祭仲鄭之正卿下兼封人之職莊公十四年左氏傳原繁曰先君桓公命我先人典司宗祏顧氏棟高曰案此當亦是宗人之官文公十七年左氏傳鄭子家使執訊而與之書注執訊通訊問之官宣公四年左氏傳宰夫將觧黿成公十六年左氏傳石首御鄭成公唐苟為右襄公十一年左氏傳鄭人納賂晉侯以師悝師觸師蠲十五年左氏傳鄭人納賂于宋以馬四十乗與師茷師慧二十二年左氏傳鄭公孫黒肱有疾召室老宗人立叚顧氏棟高曰此家宗人也蕙田案室老大夫之宰儀禮所謂貴臣也二十八年左氏傳子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇注外僕掌次舍者蕙田案僖三十三年傳有外僕髠屯三十年左氏傳伯有因馬師頡介於襄庫子皮以公孫鉏為馬師三十一年左氏傳北宫文子相衛襄公以如楚過鄭入聘子羽為行人昭公二年左氏傳公孫黒請以印為禇師注市官也顧氏棟高曰周禮地官自司市以下質人㕓人胥師賈師司虣司稽肆長皆掌市政而無禇師成三年傳知罃之在楚也鄭賈人有将置諸禇中以出六書故禇以貯衣然則禇師之職或當如王制所云布帛精粗不中數幅廣狹不中量不鬻于市者而禇師掌其禁歟七年左氏傳朔于敝邑亞大夫也其官馬師也十二年左氏傳司墓之室有當道者注掌公墓大夫徒屬之家疏周禮墓大夫下大夫二人中士八人掌凡邦墓之地域為之圖令國民族塟鄭之司墓亦當如彼十三年左氏傳子産命外僕速張于除十六年左氏傳孔張後至立于客間執政禦之注執政掌位列者十八年左氏傳使公孫登徙大龜注登開卜大夫使祝史徙主祏于周廟告于先君使府人庫人各儆其事商成公儆司宫注司宫巷伯寺人之官出舊宫人寘諸火所不及明日使野司冦各保其徴注縣士也司疏謂司冦之官在野者周禮冦屬官有縣士掌野知野司冦是縣士也縣士職曰各掌其縣之民數若邦有大役聚衆庶則各掌其縣之禁令知諸侯縣士亦當然也郊人助祝史除于國北禳火于元㝠囘禄使行人告于諸侯蕙田案以上鄭隱公四年左氏傳衛人使右宰醜涖殺州吁于濮閔公二年左氏傳狄人伐衛渠孔御戎子伯為右黄夷前驅孔嬰齊殿及狄人戰于熒澤狄人囚史華龍滑與禮孔二人曰我太史也實掌其祭顧氏棟高曰周禮太史大祭祀與執事卜日祭之日執書以次位常是太史掌祭祀也僖公二十八年左氏傳衛侯與元咺訟士榮為大士注大士治獄官也獄疏以其主獄事故使與晋之官對理質証襄公十四年左氏傳獻公飲孫蒯酒使太師歌巧言之卒章太師辭師曹請為之注太師掌樂大夫師曺樂人公使祝宗告亡右宰榖從而逃歸二十七年左氏傳以公孫免餘為少師公使為卿辭曰太叔儀不貳能贊大事乃使文子為卿蕙田案傳所稱則少師非卿二十九年左氏傳史鰌顧氏棟高曰傳中如鰌及史朝史狗杜注無明文論語史魚朱子集注史官名或是太史也昭公二十年左氏傳衛公孟縶狎齊豹奪之司冦注齊豹齊惡之子為衛司冦公孟惡禇師圃華齊御公孟宗魯驂乗慶比御公公南楚驂乗及公宫鴻駵魋駟乗于公顧氏棟高曰驂乗周禮謂之陪乗盖即車右也禇師子申遇公于馬路之衢定公四年左氏傳其使祝佗從注祝佗大祝子魚哀公十二年左氏傳謀于行人子羽注子羽衛大夫十五年左氏傳先謂司徒瞞成十六年左氏傳衛侯占夢嬖人與卜人比而告公顧氏棟高曰周禮占夢中士四人十七年左氏傳衛侯夢于北宫公親筮之胥彌赦占之注赦筮史二十五年左氏傳公之入也奪司冦亥政公納夏戊之女嬖以為夫人其弟期少畜于公以為司徒公因祝史揮以侵衛注揮衛祝史蕙田案春秋傳書衛官名甚略其可見者惟司徒瞞成見于續經知其為卿傳云奪司冦亥政則司冦亦卿也又案以上衛襄公十七年左氏傳司徒卬二十五年左氏傳祝祓社司徒致民司馬致節司空致地乃還注陳亂故正其衆官修其所職以安定之昭公八年左氏傳司徒招哀公十一年左氏傳初轅頗為司徒蕙田案以上陳襄公八年左氏傳獲蔡司馬公子燮二十六年左氏傳蔡太師子朝蕙田案以上蔡哀公七年左氏傳曹伯陽寵公孫疆使為司城以聽政程氏啟生曰司城宋官曺不應有葢曺後衰弱奉宋之政令已久其見滅于宋宜矣蕙田案以上曹莊公三十二年左氏傳神居莘虢公使祝應宗區史嚚享焉注祝太祝宗宗人史大史蕙田案以上虢桓公六年左氏傳随人使少師董成八年左氏傳楚伐随戰于速杞随師敗績随侯逸鬭丹獲其戎車與其戎右少師蕙田案以上随桓公十一年左氏傳楚屈瑕將盟貳軫鄖人軍于蒲騷莫敖患之注莫敖楚官名即屈瑕莊公四年左氏傳令尹鬬祁莫敖屈重哀公十七年左氏傳子榖曰彭仲爽申俘也文王以為令尹顧氏棟高曰仲爽為令尹當在鬬祁之後子元之前楚令尹見傳者二十八人惟仲爽申俘餘皆王族也莊公十八年左氏傳初楚武王克權使鬭緡尹之以叛圍而殺之遷權于那處使閻敖尹之十九年左氏傳鬻拳自刖楚人以為大閽謂之大伯注若今城門校尉官司疏周禮天官閽人掌守王宫之中門之禁鄭云閽人皆晨以啟閉者秋官掌戮墨者使守門刖者使守囿則閽不使刖而鬻權得為閽者周禮地官之屬有司門下大夫二人掌授管鑰以啟閉國門若今城門校尉主王城十二門此注亦云若今城門校尉官然則鬻權本是大臣楚人以其賢而使典此職非為刑而役之當如地官之司門非天官之閽人二十八年左氏傳令尹子元三十年左氏傳鬭榖於菟為令尹僖公二十三年左氏傳成得臣帥師伐陳子文以為之功使為令尹二十六年左氏傳楚令尹子玉司馬子西帥師伐宋二十八年左氏傳子玉以若敖之六卒將中軍子西將左子上將右蕙田案春秋時楚亦為三軍其軍將出於臨時簡擇城濮之役子玉以令尹將中軍子西以司馬將左軍邲之役則沈尹將中軍而令尹孫叔敖不為軍帥鄢陵之役則子反以司馬將中軍子重以令尹將左軍皆無一定之例也蒍呂臣實為令尹三十三年左氏傳楚令尹子上侵陳蔡文公元年左氏傳穆王立以其為太子之室與潘崇使為太師且掌環列之尹注環列之尹宫衛之官列兵而衛王宫十年左氏傳成王使子西為商公沿漢沂江將入郢王在渚宫下見之懼而辭曰臣免于死又有讒言謂臣將逃臣歸死于司敗也注陳楚名司冦為司敗王使為工尹注掌百工之官又與子家謀弑穆王五月殺鬭宜申及仲歸蕙田案定四年唐人竊馬而獻之自拘于司敗則唐亦有司敗不獨楚與陳也又案子西以工尹而名見於經則楚以工尹為卿官矣宣四年傳蒍賈為工正亦是貴臣疑工尹與工正即一官也檀弓載工尹商陽之言曰朝不坐燕不與則商陽乃是下士葢官名随時改易尊卑無定耳楚子田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬注將獵張兩甄故置二左司馬然則右司馬一人當中央十二年左氏傳令尹大孫伯卒成嘉為令尹宣公四年左氏傳及令尹子文卒鬭班為令尹子越為司馬蒍賈為工正譖子揚而殺之子越為令尹已為司馬蕙田案傳自子文授政子玉以後繼之者蒍呂臣子上大孫伯成嘉凡五人鬭般為令尹當在成嘉之後非即繼子文而為令尹也其孫箴尹克黄注箴尹官名十一年左氏傳楚左尹子重侵宋令尹蒍艾獵城沂使封人慮事注封人其時主築城者之疏周禮封人凡封國封其四疆造都邑封域者亦如之大司馬大役與慮事受其要以待攷而賞誅鄭云慮事者封人也于有役司馬與之屬賦丈尺與其用人數也是封人主造城邑計度人數故云其時主築城者以授司徒注司徒掌役蕙田案楚亦有司徒司敗大宰少宰之官而不為卿十一年左氏傳諸侯縣公皆慶寡人注楚縣大夫皆僣稱公蕙田案楚縣公之名見於傳者如息公子朱申公巫臣期思公復遂申公夀餘葉公諸梁白公勝及子西為商公棄疾為蔡公之類與縣尹似少不同十二年左氏傳蒍敖為宰注宰令尹蒍敖孫叔敖以疏周禮六卿大宰為長遂宰為上卿之號楚臣令尹為長故從他國論之謂令尹為宰楚國仍别有大宰之官但位任卑耳傳稱太宰伯州犁是也沈尹將中軍子重將左子反將右注沈或作寢寢縣也楚少宰如晉師注少宰官名楚許伯御樂伯攝叔為右以致晉師楚子為乗廣三十乗許偃御右廣養由基為右彭名御左廣屈蕩為右注楚王更迭載之故各有御右工尹齊將右拒卒以逐下軍射連尹襄老成公二年左氏傳楚令尹子重為陽橋之役彭名御戎蔡景公為左許靈公為右疏諸言御戎皆御君之戎車若君親在車則當居中御者居左勇力之士在右故御戎戎右常連言之此王車雖行玉身不在故不立戎右使御者在中今蔡許二君居王車上當左右之位七年左氏傳殺清尹弗忌九年左氏傳晉侯觀于軍府見鐘儀問其族對曰泠人也注泠人樂官官疏詩簡兮序云衛之賢者仕于泠官鄭云泠官樂也泠氏世掌樂官而善焉故後世名樂官為泠官十年左氏傳晉侯使糴茷如楚報大宰子商之使也十六年左氏傳司馬將中軍注子反令尹將左注子重右尹子辛將右子重使太宰伯州犁侍于王後彭名御楚共王潘黨為右楚子使工尹襄問之以弓襄公二年左氏傳楚公子申為右司馬三年左氏傳楚子辛為令尹楚司馬公子何忌侵陳五年左氏傳楚子囊為令尹十二年左氏傳楚司馬子庚聘于秦十五年左氏傳楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子槖師為右司馬公子成為左司馬屈到為莫敖公子追舒為箴尹屈蕩為連尹養由基為宫廏尹疏服䖍云連尹射官言射相連屬也若是主射當使養由基為之何以使由基為宫廏尹棄能不用豈得為能官人官名臨時所作莫敖之徒並不可觧故杜皆不觧之十八年左氏傳揚豚尹宜十九年左氏傳鄭子革出奔楚為右尹二十一年左氏傳楚子使子南為令尹二十二年左氏傳子南之子棄疾為王御士薳子馮為令尹公子齮為司馬屈建為莫敖二十五年左氏傳屈建為令尹屈蕩為莫敖楚蒍掩為司馬子木使庀賦數甲兵蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入脩賦賦車籍馬賦車兵徒卒甲楯之數既成以授子木禮也二十七年左氏傳申鮮虞來奔楚人召之遂如楚為右尹二十九年左氏傳王子圍為令尹昭公元年左氏傳右尹子干出奔晉宫廏尹子晳出奔鄭楚薳罷為令尹薳啟疆為大宰四年左氏傳楚沈尹射奔命于夏汭箴尹宜咎城鍾離五年左氏傳楚子曰若吾以韓起為閽而以羊舌肸為司宫足以辱晉顧氏棟高曰周禮閽人王宫毎門四人囿游亦如之次内小臣之下寺人之上記曰深宫固門閽寺守之是閽與奄寺雖不同皆以刑人而掌近職又昭七年傳楚子為章華之宫無宇之閽入焉而宋亦有司馬之侍人齊有崔子之侍人此大夫之家亦有閽寺也楚子以屈生為莫敖沈尹赤㑹楚子次于萊山使沈尹射待命于巢六年左氏傳吴人獲宫廄尹棄疾七年左氏傳芋尹無宇疏芋草名哀十五年陳有芋尹葢皆以草名其官不知何故顧氏棟高曰陳近楚設官多相效論語有陳司敗司敗之官亦唯楚有之十二年左氏傳楚子使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐右尹子革夕程氏啟生曰子辛子重俱以貴介為左右尹出将重兵其後並為令尹則左右尹葢亦楚之尊官㐮公以後漸用覊人稍稍降矣子革自㐮十九年奔楚為右尹至昭十二年仍為此官而中間為右尹者又有子干或楚此官不止一人或子革先為右尹去任他職而子干代之及子干出奔而子革仍為右尹未可知工尹路請曰君王命剥圭以為戚柲左史倚相趨過十三年左氏傳王奪成然邑而使為郊尹注郊尹治郊竟大夫蔡公因正僕人殺大子禄及公子罷敵注正僕大子之近官疏正僕人即大僕也周禮下大夫二人公子比為王公子黑肱為令尹公子棄疾為司馬棄疾即位使子旗為令尹觀從曰臣之先佐開卜乃使為卜尹十七年左氏傳吳伐楚陽匄為令尹卜戰不吉司馬子魚曰我得上游何故不吉十八年左氏傳楚左尹王子勝十九年左氏傳楚工尹赤遷隂于下隂二十一年左氏傳太宰犯二十三年左氏傳楚司馬薳越追之楚嚢瓦為令尹二十七年左氏傳楚莠尹然王尹麇帥師救潜注二尹楚官疏楚官多以尹為名知二尹是官名耳服䖍云王尹主宫内之政未必然定本王作工左司馬沈尹戍帥都君子與王馬之屬以濟師注都君子在都邑之士有復除者王馬之屬王之養馬官屬校人也左尹郤宛工尹夀帥師至于潛鄢將師為右領注右領官名左尹與中廐尹莫知其罪而子殺之注左尹郤宛也中廐尹陽令終殺連尹奢三十年左氏傳使監馬尹大心逆吳公子使居養三十一年左氏傳左司馬戍右司馬稽帥師救弦定公四年左氏傳鍼尹固與王同舟五年左氏傳藍尹亹渉其帑王以季芉妻鍾建以為樂尹注司樂大夫六年左氏傳令尹子西喜曰乃今可為矣哀公四年左氏傳左司馬眅致蔡於負函十六年左氏傳沈諸梁兼二事注令尹司馬國寜乃使寜為令尹寛為司馬顧氏棟高曰子西為令尹子期必是司馬二人見殺故諸梁兼攝其事寕即子西子子國哀十八年傳初右司馬子國之卜也觀瞻曰如志故命之是子國自右司馬遷令尹寛則子期子各代其父也十七年左氏傳楚子問帥于太師子穀與葉公諸梁子榖曰右領差車與左史老皆相令尹司馬以伐陳其可使也王卜之武城尹吉注武城尹子西子公孫朝十八年左氏傳初右司馬子國之卜也觀瞻曰如志注觀瞻楚開卜大夫王曰寢尹工尹勤先君者也注栢舉之役寢尹吴由于以背受戈工尹固執燧象奔吴師皆為先君勤勞蕙田案十六年傳稱箴尹固葢自箴尹遷工尹又案以上楚成公七年左氏傳巫臣請使于吴乃通吴于晉寘其子狐庸焉使為行人于吴定公四年左氏傳伍貟為吴行人以謀楚伯州犂之孫嚭為吴太宰以謀楚哀公十一年左氏傳戰于艾陵吴子謂叔孫曰而事何也對曰從司馬注從吴司馬所命十二年左氏傳衛人殺吴行人且姚而懼蕙田案以上吴僖公十五年左氏傳秦伯伐晉卜徒父筮之注秦之掌龜卜者成公二年左氏傳公及秦右大夫説盟于蜀十年左氏傳晉侯求醫于秦秦伯使醫緩為之十三年左氏傳獲秦成差及不更女父疏漢書稱商君為法於秦戰斬一首者賜爵一級其爵名一為公士二上造三簮􅒁四不更五大夫六公大夫七官大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大車庶長十九闗内侯二十徹侯案傳此有不更女父襄十一年有庶長鮑庶長武春秋之世已有此名葢後世以漸增之商君定為二十非是商君盡新作也其名之義難得而知耳襄公十一年左氏傳秦右大夫詹帥師從楚子秦庻長鮑庶長武帥師伐晉以救鄭注庻長秦爵也十二年左氏傳秦庶長無地帥師伐宋昭公元年左氏傳晉侯求醫于秦秦伯使醫和視之蕙田案以上秦右春秋官制五禮通考卷二百十六
