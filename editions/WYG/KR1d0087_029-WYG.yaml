body:
  text: 五禮通考卷十九刑部尚書秦蕙田撰吉禮十九圜丘祀天明史太祖本紀吳元年八月癸丑圜丘成王圻續文獻通考先是丙午十二月定議以明年丁未為吳元年羣臣建言國之所重莫先于宗廟社稷即于是日命有司立圜丘于鍾山之陽以冬至祀昊天上帝禮志洪武元年中書省臣李善長等奉勅撰進郊祀議畧言王者事天明事地察故冬至報天夏至報地所以順陰陽之義也祭天于南郊之圜丘祭地于北郊之方澤所以順陰陽之位也周禮大司樂冬日至禮天神夏日至禮地祗禮曰享帝于郊祀社于國又曰郊所以明天道社所以明地道自秦立四畤以祀白青黄赤四帝漢髙祖復増北畤兼祀黒帝至武帝有雍五畤及渭陽五帝甘泉太乙之祠而昊天上帝之祭則未嘗舉行魏晉以後宗鄭𤣥者以為天有六名歲凡九祭宗王肅者以為天體唯一安得有六一歲二祭安得有九雖因革不同大抵多參二家之説元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地于南郊由漢厯唐千餘年間皆因之合祭宋元豐中議罷合祭紹聖政和間或分或合髙宗南渡以後唯用合祭之禮元成宗始合祭天地五方帝已而立南郊專祀天泰定中又合祭文宗至順以後唯祀昊天上帝今當遵古制分祭天地于南北郊冬至則祀昊天上帝于圜丘以大明夜明星辰太歲從祀太祖從其議建圜丘于鍾山之陽太祖本紀洪武元年二月定郊社宗廟禮歲必親祀以為常禮志壇壝之制明初建圜丘于正陽門外鍾山之陽壇二成上成廣七丈髙八尺一寸四出陛各九級正南廣九尺五寸東西北廣八尺一寸下成周圍壇面縱横皆廣五丈髙視上成陛皆九級正南廣一丈二尺五寸東西北殺五寸五分甃甎䦨楯皆以琉璃為之壝去壇十五丈髙八尺一寸四面靈星門南三門東西北各一外垣去壝十五丈門制同天下神祗壇在東門外神庫五楹在外垣北南向厨房五楹在外壇東北西向庫房五楹南向宰牲房三楹天池一又在外庫房之北執事齋舍在壇外垣之東南坊二在外門外横甬道之東西燎壇在内壝外東南丙地髙九尺廣七尺開上南出户神位洪武元年冬至正壇第一成昊天上帝南向第二成東大明星辰次之西夜明太歳次之神版長二尺厚一寸趺高五寸以栗木為之正位題曰昊天上帝太祖本紀元年十一月庚子始祀上帝于圜丘禮志郊祀儀注洪武元年冬至祀昊天上帝于圜丘先期皇帝散齋四日致齋三日前祀二日皇帝服通天冠絳紗袍省牲器次日有司陳設祭之日清晨車駕至大次太常卿奏中嚴皇帝服衮冕奏外辦皇帝入就位贊禮唱迎神協律郎舉麾奏中和之曲贊禮唱燔柴郊社令升煙燔全犢于燎壇贊禮唱請行禮太常卿奏有司謹具請行事皇帝再拜皇太子及在位官皆再拜贊禮唱奠玉帛皇帝詣盥洗位太常卿贊曰前期齋戒今晨奉祭加其清潔以對神明皇帝搢圭盥手帨手出圭升壇太常贊曰神明在上整肅威儀升自午陛協律郎舉麾奏肅和之曲皇帝詣昊天上帝神位前跪搢圭三上香奠玉帛出圭再拜復位贊禮唱進爼協律郎舉麾奏凝和之曲皇帝詣神位前搢圭奠爼出圭復位贊禮唱行初獻禮皇帝詣爵洗位搢圭滌爵拭爵以爵授執事者出圭詣酒尊所搢圭執爵受汎齊以爵授執事者出圭協律郎舉麾奏壽和之曲武功之舞皇帝詣神位前跪搢圭上香祭酒奠爵出圭讀祝官捧祝跪讀訖皇帝俛伏興再拜復位亞獻酌醴齊樂奏豫和之曲文德之舞終獻酌盎齊樂奏熈和之曲文德之舞儀並同初獻但不用祝贊禮唱飲福受胙皇帝升壇至飲福位再拜跪搢圭奉爵官酌福酒跪進太常卿贊曰唯此酒肴神之所與賜以福慶億兆同霑皇帝受爵祭酒飲福酒以爵置于坫奉胙官奉胙跪進皇帝受胙以授執事者出圭俛伏興再拜復位皇太子以下在位官皆再拜贊禮唱徹豆協律郎舉麾奏雍和之曲掌祭官徹豆贊禮唱送神協律郎舉麾奏安和之曲皇帝再拜皇太子以下在位官皆再拜贊禮唱讀祝官奉祝奉幣官奉幣掌祭官取饌及爵酒各詣燎所唱望燎皇帝至望燎位半燎太常卿奏禮畢皇帝還大次解嚴明集禮洪武元年十一月三日冬至皇帝親祀圜丘祝文曰臣荷眷佑戡定區宇為億兆主今當長至六氣資始禮典爰舉敬以玉帛犧齊粢盛庶品備兹禋燎用伸昭告尚享其祝版依唐制長一尺一分廣八寸厚二分用楸梓木為之明史樂志洪武元年圜丘樂章迎神中和之曲昊天蒼兮穹窿廣覆燾兮龎洪建圜丘兮國之陽合衆神兮來臨之同念螻蟻兮微衷莫自期兮感通思神來兮金玉其容馭龍鸞兮乗雲駕風顧南郊兮昭格望至尊兮崇崇奠玉帛肅和之曲聖靈皇皇敬瞻威光玉帛以登承筐是將穆穆崇嚴神妙難量謹兹禮物功徴是皇進爼凝和之曲祀儀祗陳物不于大敢用純犢告于覆載唯兹菲薦恐未周完神其容之以享以觀初獻壽和之曲眇眇微躬何敢請于九重以煩帝聰帝心矜憐有感而通既俯臨于几筵神繽紛而景從臣雖愚䝉鼓舞歡容乃子孫之親祖宗酌清酒兮在鍾仰至德兮元功亞獻豫和之曲荷天之寵睠駐紫壇中情彌喜臣庶均歡趨蹌奉承我心則寛再獻御前式燕且安終獻熈和之曲小子于茲唯父天之恩唯恃天之慈内外殷勤何以將之奠有芳齊設有明粢喜極而抃奉神燕娭禮雖止于三獻情悠長兮逺而徹饌雍和之曲烹飪既陳薦獻斯就神之在位既歆既右羣臣駿奔徹兹爼豆物倘未充尚幸神宥送神安和之曲神之去兮難延想遐袂兮翩翩萬靈從兮後先衛神駕兮回旋稽首兮瞻天雲之衢兮𣺌然望燎時和之曲焚燎于壇粲爛晶熒幣帛牲黍冀徹帝京奉神于陽昭祀有成肅然望之玉宇光明太祖實録上觀圜丘顧謂起居注熊鼎等曰此與古制合否對曰小異上曰古人于郊掃地而祭器用陶匏以示儉朴周有明堂其禮始備今予創立斯壇雖不必盡合古制然一念事天之誠不敢頃刻怠矣明史禮志洪武元年始有事于南郊有司議配祀太祖謙讓不許親為文告太廟曰厯代有天下者皆以祖配天臣獨不敢者以臣功業有未就政治有缺失去年上天垂戒有聲東南雷火焚舟擊殿吻早暮兢惕恐無以承上天好生之德故不敢輙奉以配唯祖神與天通上帝有問願以臣所行奏帝前善惡無隱候南郊竣事臣當率百司恭詣廟庭告成大禮以共享上帝之錫福大政記上曰以玉飾車考之古禮唯祀天用之若常乗之車只宜用孔子所謂殷輅然祀天之際玉輅或未備木輅亦未為不可參政張昶對曰木輅戎輅也不可以祀天上曰孔子萬世帝王之師其斟酌四代禮樂實為萬世之法乗木輅何損于祭祀况祀事在誠敬不在儀文也昶頓首謝太祖實録二年八月建望祭殿大政記二年八月甲申命圜丘方丘南皆建殿九間為望祭之所風雨則于此望祭春明夢餘録禮部尚書崔亮奏宋祥符九年議南郊壇祀天或值雨雪則就太尉齋所望祭元經世大典載社稷壇壝外垣之内北垣之下亦嘗建屋七間南望二壇以備風雨曰望祀堂請依此制上從之明史禮志二年翰林學士朱升等奉勅撰齋戒文曰戒者禁止其外齋者整齊其内沐浴更衣出宿外舍不飲酒不茹葷不問疾不弔䘮不聽樂不理刑名此則戒也專一其心嚴畏謹慎苟有所思即思所祭之神如在其上如在其左右精白一誠無須臾間此則齋也大祀七日前四日戒後三日齋太祖曰凡祭祀天地社稷宗廟山川等神為天下祈福宜下令百官齋戒若自有所禱不闗民事者不下令又曰致齋以七日五日為期太久人心易怠止臨祭齋戒三日務致精專庶可格神明遂著為令是年從禮部尚書崔亮奏大祀前七日陪祀官詣中書省受誓戒各揚其職不共其事國有常刑王圻續通考二年禮部尚書崔亮奏凡遇大祀前期七日陪祀官詣中書受誓戒曰某月某日皇帝有事于某神百官其聽誓戒祀必先戒然後可以感神明至是始定諸祭致齋之常期云觀承案應天以實不以文郊丘大典惟以誠敬為之本而後可以舉其文明祖開基即分祭天地禮文固已克正而其定制垂訓則祭必躬親極其誠敬尤為有本觀元年自作郊天告廟文一片真朴恭畏之意上帝能不顧享乎惜十二年後仍循用合祀之舊然其敬恭之心要未嘗稍怠則文雖失而本自在也厥後世宗釐定祀典郊丘改為分祭足正厯來沿襲之訛矣然崇所生而亂所綂蔑公義而狥私恩則其本已亡禮云禮云豈文具之云乎明史太祖本紀洪武二年十一月乙巳祀上帝于圜丘以仁祖配禮志二年夏至將祀方丘羣臣復請配典太祖執不允固請乃曰俟慶陽平議之八月慶陽平十一月冬至羣臣復固請乃奉皇考仁祖淳皇帝配天于圜丘位第一成西向崔亮傳洪武二年亮言禮運曰禮行于郊則百神受職今宜増天下神祗壇于圜丘之東方澤之西又言郊特牲器用陶匏周禮疏外祀用瓦今祭祀用瓷與古意合而盤盂之屬與古尚異宜皆易以瓷惟籩用竹皆允行帝嘗謂亮先賢有言見其生不忍見其死聞其聲不忍食其肉今祭祀省牲于神壇甚邇心殊未安亮乃奏考古省牲之儀逺神壇二百步帝大喜時仁祖已配南北郊而郊祀禮成後復詣太廟恭謝亮言宜罷惟先祭三日詣太廟以配享告詔可帝以日中有黒子疑祭天不順所致欲増郊壇從祀之神亮執奏漢唐煩凟不宜取法乃止帝一日問亮曰朕郊祀天地拜位正中而百官朝㕘則班列東西何也亮對曰天子祭天升自午陛北向答陽之義也祭社升自子陛南向答陰之義也若羣臣朝㕘當避君上之尊故升降皆由卯陛朝班分列東西以避馳道其義不同亮倉卒占對必傳經義多此類自郊廟祭祀外朝賀山呼百司箋奏上下冠服殿上坐墩諸儀及大射軍禮皆亮所酌定惟言大祀帝親省牲中祀小祀之牲當遣官代帝命皆親省明集禮神位上帝位題曰昊天上帝配帝題曰仁祖淳皇帝位版並黄質金字從祀題曰風伯之神雲師之神雷師之神雨師之神並赤質金字神席上帝用龍椅龍案上施錦座褥配位同從祀位置于案不設席祭器設上帝太尊二著尊一犧尊一山罍一于壇上皆有勺有冪設太尊一山罍二于壇下有冪配帝位同其從祀則設大明星辰著尊二犧尊二于左設夜明太歲著尊二犧尊二于右上帝及配帝籩豆各十有二簠簋各二登盤篚各一牲案各一爵坫各三沙池香案各一其從祀則籩豆各十簠簋各一牲案各一爵坫沙池香案各一禮神之玉冬至祀昊天上帝用蒼璧幣正配位用蒼大明以紅夜明星辰太歳皆用白牲上帝及配帝各用蒼犢一從祀大明夜明星辰太歲各純色犢一滌牲立神牲所設官二人牧養神牲祀前三月付廩犧令滌治如法其中祀滌三十日小祀滌十日者亦如之酒齊正配位太尊實泛齊醴齊著尊實盎齊犧尊實醍齊山罍實昔酒在壇上太尊實沈齊山罍實事酒清酒在壇下從祀著尊實醴齊盎齊犧尊實事酒籩豆之實正配位用籩豆各十二其籩實以鹽藳魚棗栗榛菱芡鹿脯黒餅白餅糗餌粉粢豆實以韭葅醓醢菁葅鹿醢芹葅兎醢筍葅魚醢脾析葅豚拍􅓞實糝食從祀籩豆各十者籩減糗餌粉粢豆減􅓞食糝食祭服奉祀侍祠官正從一品七梁冠國公丞相貂蟬二品六梁冠三品五梁四品四梁五品三梁六品七品二梁八品九品一梁臺官加獬廌梁數各如其品通服青羅衣其壽環革帶則有差笏以象及木褥位拜褥用緋不用黄道褥版位皇帝位方一尺二寸厚三寸紅質金字皇太子位方九寸厚二寸紅質金字陪祀官位並黒字白質陪祀執事員數設皇帝大次皇太子幕次官二人掃除壇上下官一人御史監掃除二人灑掃齋舍神厨官二人設饌幔官二人設昊天上帝仁祖淳皇帝龍椅龍案從祀神案官一人設