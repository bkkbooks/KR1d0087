六尺五寸髙四尺九寸上下二成通徑七丈八尺壇至内壝墻四面各九丈八尺五寸内壝墻至外壝墻南十三丈九尺四寸北十一丈東西各十一丈七尺四年定天子親祀齋五日遣官代祀齋三日降香齋一日太祖本紀四年十一月丙辰有事于圜丘禮志凡陪祀洪武四年太常寺引周禮及唐制擬用武官四品文官五品以上其老疾瘡疥刑餘䘮過體氣者不與從之後定郊祀六科都給事中皆與陪祀餘祭不與又定凡南北郊先期賜陪祀執事官明衣布樂舞生各給新衣制陪祀官入壇牙牌凡天子親祀則佩以入其制有二圜者與祭官佩之方者執事人佩之俱藏内府遇祭則給無者不得入壇五年命諸司各置木牌刻文其上曰國有常憲神有鑒焉祭祀則設之又從陶凱奏凡親祀皇太子宫中居守親王戎服侍從皇太子親王雖不陪祀一體齋戒太祖本紀五年十一月辛酉有事于圜丘六年十一月丙寅冬至帝不豫改卜郊閏月壬午有事于圜丘禮志六年復定齋戒禮儀凡祭天地正祭前五日午後沐浴更衣處外室次早百官于奉天門觀誓戒牌次日告仁祖廟退處齋宫致齋三日明㑹典六年奏准郊廟犧牲已在滌者或有傷則出之死則埋之春明夢餘録六年上以祭祀還宫宜用樂舞生導命翰林儒臣撰樂章以致鑒戒之意于是承㫖撰神降祥神貺惠酣酒色荒禽荒諸曲凡三十九章曰廻鑾樂歌其詞皆存規戒其舞分為四隊隊皆八人禮部圖其制以上命樂工肄習之明史太祖本紀七年十一月辛未有事于圜丘禮志七年更定内壝之内東西各三壇星辰二壇分設于東西其次東則太歲五岳西則風雲雷雨五鎮内壝之外東西各二壇東四海西四瀆次天下神祗壇東西分設定制凡大祀前期四日太常卿至天下神祗壇奠告中書丞相詣京師城隍廟發咨次日皇帝詣仁祖廟請配享祭祀日期欽天監選擇太常寺預于十二月朔至奉天殿具奏葢古卜法不存而擇干支之吉以代卜也洪武七年命太常卿議祭祀日期書之于版依時以祭著為式其祭日遣官監祭不敬失儀者罪之太祖實録洪武七年定大祀拜禮始迎神四拜飲福受胙四拜送神四拜共十二拜而畢又以舊儀太常司奏中嚴外辦及盥洗升壇飲福受胙各致贊詞又凡祀俱設爵洗位滌爵拭爵初升壇再拜祭酒唱賜福胙之類俱為煩凟悉去之又以古人祭用香燭所以導達陰陽以接神明無上香之禮命凡祭祀罷上香桂彦良傳洪武七年冬至詞臣撰南郊祝文用予我字帝以為不敬彦良曰成湯祭上帝曰予小子履武王祀文王之詩曰我將我享古有此言帝色霽曰正字言是也明史禮志凡分獻官太常寺豫請㫖洪武七年太祖謂學士詹同曰大祀終獻方行分獻禮未當同乃與學士宋濓議以上初獻奠玉帛將畢分獻官即行初獻禮亞獻終獻皆如之太祖本紀八年十一月丁丑有事于圜丘太祖實録八年定登壇脱舄之禮郊祀廟享前期一日有司以席藉地設御幕于壇東南門外及設執事官脱履之次于壇門外西階側祭日大駕臨壇入幕次脱舄升壇其升壇執事導駕贊禮讀祝並分獻陪祀官皆脫舄于外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄從翰林學士樂韶鳳之奏也明史樂志洪武八年御製圜丘樂章迎神仰惟兮昊穹臣率百職兮迓迎幸來臨兮壇中上下䕶衞兮景從旌幢繚繞兮四維重悦聖心兮民獲年豐奠玉帛民依時兮用工感帝德兮大化成功臣將兮以奠望納兮微衷進爼庖人兮列鼎殽羞兮以成方爼兮再獻願享兮以歆初獻聖靈兮皇皇穆嚴兮金牀臣令樂舞兮景張酒行初獻兮捧觴亞獻載斟兮再將百辟陪祀兮具張感聖情兮無已拜手稽首兮願享終獻三獻兮樂舞揚殽羞具納兮氣藹而芳光朗朗兮上方况日吉兮時良徹饌粗陳菲薦兮神喜將感聖心兮何以忘民福留兮佳氣昻臣拜手兮謝恩光送神旌幢􅏎􅏎兮雲衢長龍車鳳輦兮駕飛揚遥瞻冉冉兮去上方可見烝民兮永康望燎進羅列兮詣燎方炬熖發兮煌煌神變化兮物全于上感至恩兮無量明會典洪武九年議郊祀大禮雖有三年䘮不廢王圻續通考洪武丙辰定郊祀大事國有三年䘮不廢明史太祖本紀九年十一月壬午有事于圜丘禮志十年秋太祖感齋居陰雨覽京房災異之説謂分祭天地情有未安命作大祀殿于南郊是歲冬至以殿工未成乃合祀于奉天殿而親製祝文意謂人君事天地猶父母不宜異處遂定每歲合祀于孟春為永制太祖本紀十年八月改建大祀殿于南郊禮志十年改定合祀即圜丘舊制而以屋覆之名曰大祀殿凡十二楹中石臺設上帝皇地祗座每歲正月中旬擇日合祭帝具冕服行禮奉仁祖配享殿中殿東西廣三十二楹正南大祀門六楹接以步廊與殿廡通殿後天庫六楹瓦皆黄琉璃厨庫在殿東北宰牲亭井在厨東北皆以步廊通殿兩廡後繚以圍墻南石門三洞以達大祀門謂之内壇外周垣九里三十步石門三洞南為甬道三中神道左御道右黄道道兩傍稍低為從官之道齋宫在外垣内西南東向其後殿瓦易青琉璃十一年十月甲子大祀殿成春明夢餘録大祀殿成祀昊天上帝皇地祗位南向仁祖配享從祀丹墀四壇曰大明曰夜明曰星辰又曰星辰内壝外二十壇曰五嶽壇五中嶽壇以鍾山附曰五鎮壇五曰四海壇四曰四瀆壇曰風雲雷雨曰山川曰太歲曰天下神祗曰厯代帝王各一壇凡二十四壇大臣分獻因命太常每歲祭天地于首春三陽交泰之時王圻續通考勅太常曰近命三公率工部役梓人于京城之南創大祀殿以合祀皇天后土冬十月告工已成特命禮部云前代之祭期以歲止一祀古人祀天于南郊葢以義起耳故曰南郊祀天以其陽生之月北郊祭地以其陰生之月至陰祭之于陽月于理可疑且掃地而祭其來甚逺葢言祀地尚實而不尚華後世執古而不變遂使天地之享反不如人之享若使人之享亦執古而不變則當汙尊而抔飲茹毛而飲血巢居而穴處也以今言之世果可行乎斯必不然也今命太常每歲合祭天地于春首正三陽交泰之時人事之始也其後大祀殿復易以青琉璃瓦云蕙田案敕太常即御製大祀文于慎行筆塵唐時明堂制度其宇上圜覆以清陽玉葉清陽色也玉葉亦瓦之類今大享殿及圜丘䦨干皆用回青瓦亦清陽玉葉之類明史太祖本紀十二年正月己卯始合祀天地于南郊禮志合祀于大祀殿太祖親作大祀文并歌九章明會典南郊合祀儀洪武十年定齋戒前期二日太常司官今太常寺宿于本司次日具本奏聞致齋三日次日進銅人傳制諭文武官齋戒不飲酒不食葱韭薤蒜不問病不弔䘮不聽樂不理刑名當日禮部官同太常司官于城隍廟發咨仍于各廟焚香三日告廟正祭前二日用祝文酒果奉先殿告仁祖配上帝皇祗省牲用牛二十八羊三十三豕三十四鹿二兎十二正祭前二日太常司官奏聞明日與光禄司官省牲次日省牲畢復命就奏定分獻官二十四員陳設共二十七壇正殿三壇上帝南向犢一豋一實以太羮籩十二實以形鹽藳魚棗栗榛菱芡鹿脯白餅黒餅糗餌粉餈豆十二實以韭菹菁菹芹菹筍菹醓醢鹿醢兎醢魚醢脾析豚拍􅓞食糝食簠簋各二實以黍稷稻粱玉用蒼璧一帛一蒼色織成郊祀制帛四字皇祗南向犢一豋一籩十二豆十二簠簋各二玉用黄琮一帛一黄色郊祀制帛仁祖配位在東西向犢一登一籩十二豆十二簠簋各二玉用蒼璧一帛一蒼色郊祀制帛共設酒尊六爵九篚三于東南西向祝文案一于殿西洪熈以後改奉太祖太宗並祀正殿増一壇加犢一酒尊二爵三帛篚一丹墀四壇大明在東西向犢一豋一籩十無糗餌粉餈下同豆十無􅓞食糝食下同簠簋各二帛一紅色禮神制帛下同酒尊三爵三篚一夜明在東西向犢一登一籩十豆十簠簋各二帛一白色酒尊三爵三篚一星辰一壇在東西向犢一羊三豕三豋一鉶二盛和羮籩豆各十簠簋各二酒盞三十帛一白色酒尊三爵三篚一星辰二壇在西東向陳設同東十壇北嶽壇犢一羊一豕一豋一鉶二籩豆各十簠簋各二酒盞十帛一黒色酒尊三爵三篚一永樂以後北岳壇增附天壽山加酒盞十帛一北鎮壇陳設同東岳壇陳設同帛一青色東鎮壇東海壇陳設並同太歲壇陳設同帛一曰色帝王壇陳設同帛十六白色酒盞三十山川壇陳設同帛二白色酒盞三爵三篚一四瀆壇陳設與北嶽同帛四黑色酒盞三十西十壇北海壇陳設與北嶽同西嶽壇陳設同帛一白色西鎮壇西海壇陳設並同中嶽壇鍾山附陳設同帛二黄色酒盞二十中鎮壇陳設同帛一黄色酒盞十風雲雷雨壇陳設同帛四白色酒盞三十南嶽壇陳設同帛一紅色酒盞十南鎮壇南海壇陳設並同正祭典儀唱樂舞生就位執事官各司其事陪祀官分獻官各就位導引官導引皇帝至御位内贊奏就位典儀唱燔柴瘞毛血迎神協律郎舉麾奏樂樂止内贊奏四拜百官同典儀唱奠玉帛奏樂内贊奏升壇皇帝至上帝前奏搢圭執事官以玉帛跪進于皇帝右奠訖奏出圭至皇祗前奏搢圭執事官以玉帛跪進于皇帝左奠訖奏出圭至仁祖前奏搢圭執事官以玉帛跪進于皇帝右奠訖奏出圭復位樂止典儀唱進爼奏樂齋朗舁饌至内贊奏升壇至上帝前奏搢圭進爼出圭至皇祗前奏搢圭進爼出圭至仁祖前奏搢圭進爼出圭奏復位樂止典儀唱行初獻禮奏樂内贊奏升壇至上帝前奏搢圭執事官以爵跪進于皇帝右奏獻爵出圭至皇祗前奏搢圭執事官以爵跪進于皇帝左奏獻爵出圭詣讀祝位跪讀祝樂止讀祝官取祝跪于皇帝右讀祝樂作奏俯伏興平身百官同至仁祖前奏搢圭執事官以爵跪進于皇帝右奏獻爵出圭復位樂止典儀唱行亞獻禮奏樂儀同初獻惟不讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止太常卿進立殿西東向唱賜福胙内贊奏詣飲福位跪搢圭光禄司官以福酒跪進奏飲福酒光禄司官以胙跪進奏受胙出圭俯伏興平身復位奏四拜百官同典儀唱徹饌奏樂執事官各壇徹饌樂止典儀唱送神奏樂内贊奏四拜百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位奏樂執事官各執祝帛饌出内贊奉禮畢王圻續通考命魏國公徐達及公侯等分獻日月星辰嶽鎮海瀆山川諸神凡一十七壇正殿三壇昊天上帝皇地祗壇俱南向仁祖配位壇西向丹陛之東為壇曰大明西向其西為壇曰夜明東向兩廡為壇各六星辰之壇設于東西星辰之次東則太歲次五嶽次四海西則風雲雷雨次五鎮次四瀆天下山川神祗為壇二分設于海瀆之次各壇陳設仍舊儀但仁祖配位玉用蒼璧太歲風雲雷雨酒盞各十東西廡各共設酒尊三爵一十八于壇之南前期皇帝致齋五日前祭二日太常司同光禄司官詣壇省牲至日奠玉帛進爼三獻酒俱先詣上帝神位前次詣皇地祗位前次詣仁祖淳皇帝前餘悉仍舊儀其祝文云嗣天子臣某名敢昭告于昊天上帝后土皇地祗時維孟春三陽交泰敬率臣僚以玉帛犧牲粢盛庶品恭祀于大祀殿備茲燎瘞皇考仁祖淳皇帝配禮畢詰旦駕還御奉天殿百官行慶成禮宴羣臣于奉天殿前是祀也自齋戒百官至將祭之夕天宇澄霽升壇星緯昭煥祥飈慶雲光彩􅂱煜上心甚悦禮成勅中書省臣胡惟庸等曰立綱陳紀治世馭民始由上古之君至今相承而法則焉凡有國者必以祀事為先祀事之禮起于古先聖王其周旋上下進退奠獻莫不有儀然儀必貴誠而人心難測至誠者少不誠者多暫誠者或有之若措禮設儀文飾太過使禮煩人倦而神厭弗享非禮也故孔子曰禘自既灌而往者吾不欲觀之矣朕周旋祀禮十有一年見其儀太煩乃以義起更其儀式合祀社稷既祀神乃歡洽今十二年春始合天地大祀而上下胥悦若有􅆄蠁答于朕心爾中書下翰林令儒臣紀其事以彰上帝皇祗之昭格而錫黔黎之福朕與卿等尚夙夜無怠以答聖明之休祐焉明史樂志洪武十二年合祀天地樂章迎神中和之曲荷蒙天地兮君主華夷欽承踴躍兮備筵而祭誠惶無已兮寸衷微仰瞻俯首兮惟願來期想龍翔鳳舞兮慶雲飛必昭昭穆穆兮降壇壝奠玉帛肅和之曲天垂風露兮雨澤霑黄壤氤氲兮氣化全民勤􅅵畆兮束帛鮮臣當設宴兮奉來前進爼以後咸同八年圜丘詞邱氏濬曰漢儒六天之説既有昊天上帝又有天皇大帝又有太乙感生帝之類皆非正禮也若天無二日民無二王國無二帝之禮况五六哉本朝惟于大祀殿祀昊天上帝凡所謂天皇太乙五大帝之類一切革去三代祀典之正所僅見也又曰我聖祖合祀天地于南郊之一壇而加屋焉則是泰壇明堂為一制也列聖相承皆以太祖太宗配是郊祀宗祀為一體也其亦義起之者與蕙田案先儒謂為壇而祭冬至圜丘之祭也祭于屋下而以宗廟之禮事之季秋明堂之享也祭天有此二禮明太祖以齋居陰雨改分祭為合祭止是省煩勞趨便安耳創立大祀殿屋而不壇此古明堂報享之祭何足以當冬至圜丘之祭乎邱瓊山謂泰壇明堂為一制郊祀宗祀為一體葢深知其為非禮之禮而不敢斥言之曰以義起意亦婉而章矣太祖實録又建神樂觀于郊壇之西以處樂舞生觀有太和殿祭則先期演樂于此帝親為文勒石焉春明夢餘録神樂觀在天壇内之西設提㸃知觀教習樂舞生洪武初御製圜丘方澤分祀樂章後定合祀更撰合祀樂章禮成歌九章已病音樂之未復古也詔尚書詹同陶凱與協律郎冷謙定雅樂而學士宋濓為樂章著令凡祀有樂樂四等曰九奏曰八奏曰七奏曰六奏樂有歌有舞歌堂上舞堂下舞皆八佾有文有武郊廟皆奏中和韶樂太常領之協律郎司樂考協之凡樂淫聲過聲凶聲慢聲若舞失節者皆有糾禁十二年十二月諭神樂觀云開基守業必勤政為先趨事赴公非信誠必責傳不云乎國之大事在祀與戎曩古哲王謹斯二事而上帝皇祗悦賜天下安和生民康泰朕起寒微而君宇内法古之道依時以奉上下神祗其于祀神之道若或不潔則非為生民以祈福而保己命也昔劉康公成肅公㑹晉侯伐秦祭于社稷之神然後興師當祭之時畢則有受胙之禮其受之時必思洋洋乎其在上而穆穆然或左而或右委心慎敬而受之則祥故敬勝怠者吉怠勝敬者滅所以成肅公受胙之時起慢神不恭之貌因伐秦而卒是以知敬慎必有動作禮義威儀之則以定命也于斯事神之道能者養之以福不能者敗之以禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業朕觀古人之敬神也若是其驗禍福亦若是斯可謂無神而不信乎可謂佞神而祈福乎二者皆不可唯敬之以禮而已朕設神樂觀備樂以享上下神祗所以撥錢糧若干以供樂舞生非傚前代帝王求長生之法而施之然長生之道世有之不過修心清淨脱離幻化速疾去來使無艱阻是其機也嗚呼昔殷周之父老何存漢唐之耆宿安在果長生之道乎朕設神樂觀以備樂碑之于觀以示後世其觀主不潔樂生不精贍生不足以此觀之不但君不勤于祀事其朝臣觀主必也亦然若君勤于祀事朝臣觀主無一體之敬則國有常憲故茲勒石想宜知悉明會典凡帛五等曰郊祀制帛十一年議定在京大祀中祀用制帛在外王國及府州縣亦用帛小祀止用牲醴明史太祖本紀十三年正月癸卯大祀天地于南郊十四年正月乙未大祀天地于南郊十五年正月乙未大祀天地于南郊十六年正月乙卯大祀天地于南郊十七年正月丁未大祀天地于南郊十八年正月辛未大祀天地于南郊十九年正月甲子大祀天地于南郊二十年正月甲子大祀天地于南郊禮成天氣清明侍臣進曰此陛下敬天之誠所致帝曰所謂敬天者不獨嚴而有禮當有其實天以子民之任付于君為君者欲求事天必先恤民恤民者事天之實也即如國家命人任守令之事若不能福民則是棄君之命不敬孰大焉又曰為人君者父天母地子民皆職分之所當盡祀天地非祈福于己實為天下蒼生也二十一年正月辛卯大祀天地于南郊太祖實録二十一年三月増修南郊壇位于大祀殿丹墀内疊石為臺四東西相向以為日月星辰四壇又于内壝之外亦東西相向疊石為臺凡二十各髙三尺有竒周以石欄陟降為磴道臺之上琢石為山形鑿龕以置神位以為嶽鎮海瀆風雲雷雨山川太歲天下諸神及列代帝王之壇壇後樹以松栢外壝東南鑿池凡二十區冬月藏冰以供夏秋祭祀之用明史禮志二十一年定制齋戒前二日太常司官宿于本司次日奏請致齋又次日進銅人傳制諭文武百官齋戒是日禮部太常司官檄城隍神徧請天下當祀神祗仍于各廟焚香三日太祖本紀二十二年正月丁亥大祀天地于南郊二十三年正月己卯大祀天地于南郊二十四年正月癸卯大祀天地于南郊二十五年正月乙未大祀天地于南郊王圻續通考壬申夏五月上以皇太子新薨欲停祭祀而時享在邇乃令禮部右侍郎張智翰林學士劉三吾以郊廟合行典禮㕘考古制定議以聞于是智等奏曰宋㑹要王制三年不祭唯祭天地社稷葢不敢以卑廢尊也真宗居䘮既易月而服除明年遂享太廟合祀天地于圜丘時衮冕車輅宫駕登歌鼓吹並陳如常儀已而宰臣畢士安請聽樂真宗批答云郊天之事資禮樂以相成須用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其各處壇場止鳴鉦鼓角今議天地社稷先師太歲風雲雷雨嶽鎮海瀆諸神皆係祀典神祗厯代帝王乃是紹承統系宜如宋制唯太廟乃祖先神靈所在國既有䘮而時享仍用樂恐神不聽宜亦備而不作詔從之太祖本紀二十六年正月辛酉大祀天地于南郊禮志二十六年定傳制誓戒儀凡大祀前三日百官詣闕如大朝儀傳制官宣制云某年月日祀于某所爾文武百官自某日為始致齋三日當敬慎之傳制訖四拜奏禮畢太祖本紀二十七年正月乙卯大祀天地于南郊二十八年正月丁未大祀天地于南郊二十九年正月壬申大祀天地于南郊三十年正月丙寅大祀天地于南郊三十一年正月壬戌大祀天地于南郊王圻續通考明太祖初定天下他務未遑首崇禮樂詔儒臣修禮書在位三十餘年每遇祭祀齋戒省牲必誠必敬其祖訓有曰凡祀天地祭社稷享宗廟精誠則感格怠慢則禍生故祭祀之時皆當極其精誠不可少有怠慢其風雲雷雨師山川等神亦必敬慎自祭勿遣官代祀以垂訓子孫雖南郊合祀覆屋于壇以孟春行禮有乖古義然亦必審度十餘年而後改制以行其心之所安不可謂非精䖍之至也若夫釐正祀典凡天皇太乙六天五帝之類皆為革除而諸神封號悉改從本稱一洗矯誣陋習其度越漢唐宋諸君逺矣五禮通考卷十九
