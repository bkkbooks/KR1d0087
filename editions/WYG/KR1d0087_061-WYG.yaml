body:
  text: 五禮通考卷五十一刑部尚書秦蕙田撰吉禮五十一四望山川附封禪通鑑顯慶四年六月詔許敬宗議封禪儀敬宗請以髙祖太宗俱配昊天上帝太穆文徳二后並配地祗從之唐書高宗本紀麟德元年七月丁未詔以三年正月有事于泰山冊府元龜麟徳元年七月丁未朔詔宜以三年正月式遵故實有事于岱宗所司詳求茂典以從折衷其諸州都督刺史以二年十二月便集岳下諸王十月集東都緣邊州府襟要之處不在集限天下諸州明揚才彦或銷聲幽藪或藏器下僚並隨岳牧舉送九月乙丑詔曰來年行幸岱宗州縣不得浪有煩擾其水淺可涉不可繕造橋梁所行之處亦勿開道路諸州及寺觀并百姓不得輒獻食唐書高宗本紀麟徳二年二月壬午如東都十月丁卯如泰山舊唐書高宗本紀麟徳二年春正月壬午幸東都丁酉幸合璧宫甲子以發向泰山停選五月以司空英國公李勣少師髙陽郡公許敬宗右相嘉興縣子陸敦信左相鉅鹿男竇德元為檢校封禪使冬十月戊午皇后請封禪司禮太常伯劉祥道上疏請封禪丁卯將封泰山發自東都十一月丙子次于原武以少牢祭漢將紀信墓贈驃騎大將軍十二月丙午御齊州大㕔乙卯命有司祭泰山丙辰發靈巖頓册府元龜麟德二年十月丁卯帝發東都赴東岳從駕文武兵士及儀仗法物相繼數百里列營置幕彌亘郊原突厥于闐波斯天竺國罽賔烏萇崑崙倭國及新羅百濟高麗等諸蕃酋長各率其屬扈從穹廬氈帳及牛羊駝馬填候道路是時頻嵗豐稔斗米至五錢豆麥不列于市議者以為古來帝王封禪未有若斯之盛者也十二月丙午至齊州停十日丙辰發靈巖頓至于太岳之下庚申帝御行宫牙帳以朝羣臣唐書高宗本紀乾封元年正月戊辰封于泰山禪于社首以皇后為亞獻壬申大赦改元禮樂志高宗乾封元年封泰山為圓壇山南四里如圜丘三壝壇上飾以青四方如其色號封祀壇玉策三以玉為簡長一尺二寸廣一寸二分厚三分刻以金文玉匱一長一尺三寸以藏上帝之冊金匱二以藏配帝之冊纒以金繩五周金泥玉璽璽方一寸二分文如受命璽石䃭以方石再累皆方五尺厚一尺刻方其中以容玉匱䃭旁施檢刻深三寸三分闊一尺當繩刻深三分闊一寸五分石檢十枚以檢石䃭皆長三尺闊一尺厚七分印齒三道皆深四寸當璽方五寸當繩闊一寸五分檢立于䃭旁南方北方皆三東方西方皆二去䃭隅皆一尺䃭纒以金繩五周封以石泥距石十二分距䃭隅皆再累皆闊二尺長一丈斜刻其首令與䃭隅相應又為壇于山上廣五丈髙九尺四出陛一壝號登封壇玉檢玉牒石䃭石距玉匱石檢皆如之為降禪壇于社首山上八隅一成八陛加方丘三壝上飾以黄四方如其色其餘皆如登封其議略定而天子詔曰古今之制文質不同今封禪以玉牒金繩而瓦尊匏爵秸席宜改從文於是昊天上帝褥以蒼地祗褥以黄配褥皆以紫而尊爵亦更焉是嵗正月天子祀昊天上帝于山下之封祀壇以高祖太宗配如圜丘之禮親封玉冊置石䃭聚五色土封之徑一丈二尺髙九尺已事升山明日又封玉冊于登封壇又明日祀皇地祗于社首山之降禪壇如方丘之禮以太穆皇后文德皇后配而以皇后武氏為亞獻越國太妃燕氏為終獻率六宫以登其帷帟皆錦繡羣臣聸望多竊笑之又明日御朝覲壇以朝羣臣如元日之禮乃詔立登封降禪朝覲之碑名封禪壇曰舞鶴臺登封壇曰萬嵗臺降禪壇曰景雲臺以紀瑞焉其後將封嵩岳以吐蕃突厥寇邊而止舊唐書禮儀志高宗即位公卿數請封禪則天既立為皇后又宻贊之麟徳二年二月車駕發京東廵狩詔禮官博士撰定封禪儀注有司于乾封元年正月戊辰朔先是有司齋戒於前祀七日平旦太尉誓百官于行從中臺云來月一日封祀二日登封泰山三日禪社首各揚其職不供其事國有常刑上齋于行宫四日致齋三日近侍之官應從升者及從事羣官諸方客使各本司公館清齋一宿前祀一日諸衞㑹其屬未後一刻設黄麾半仗于外壝之外與樂工人俱清齋一宿至其年十二月車駕至山下及有司進奏儀注封祀以髙祖太宗同配禪社首以太穆皇后文德皇后同配皆以公卿充亞獻終獻之禮於是皇后抗表曰伏尋登封之禮逺邁古先而降禪之儀竊為未允其祭地祗之日以太后昭配至於行事皆以公卿以妾愚誠恐未周備何者乾坤定位剛柔之義既殊經義載陳中外之儀斯别瑶壇作配既合于方祗玉豆薦芳實歸于内職况推尊先后親饗瓊筵豈有外命宰臣内參禋祭詳于至理有紊徽章但禮節之源雖興于昔典而升降之制尚缺于遥圖且往代封岳雖云顯號或因時省俗意在尋仙或以情覬名事深為已豈如化被乎四表推美于神宗道冠乎二儀歸功于先徳寧可仍遵舊軌靡創彞章妾謬處椒闈叨居蘭掖但以職惟中饋道屬于蒸嘗義切奉先理光于蘋藻罔極之思載結于因心祇肅之懷實深于明祀但妾早乖定省已闕侍于晨昏今屬崇禋豈敢安于帷帟是故馳情夕寢睠嬴里而翹魂疉慮宵興仰梁郊而聳念伏望展禮之日總率六宫内外命婦以親奉奠冀申如在之敬式展䖍拜之儀積此㣲誠已淹氣序既屬鑾輿將警奠璧非賖輙効丹心庶禆大禮冀聖朝垂則永播于芳規螢燭末光增輝于日月於是祭地祗梁甫皆以皇后為亞獻諸王太妃為終獻丙辰前羅舍府果毅李敬貞論封禪須明水實撙淮南子云方諸見月則津而為水髙誘注云方諸陰燧大蛤也熟摩拭令熱以向月則水生以銅盤受之下數石王充論衡云陽燧取火于日方諸取水于月相去甚逺而火至水來者氣感之騐也漢書儀云八月飲酎車駕夕牲以鑑諸取水于月以陽燧取火于日周禮考工記云金有六齊金錫半謂之鑑燧之齊鄭𤣥注云鑑燧取水火于日月之器準鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火陰鑑形如方鏡以取明水但比年祀祭皆用陽燧取火應時得以陰鑑取水未有得者嘗用井水替明水之處奉勅令禮司研究敬貞因説先儒是非言及明水乃云周禮金錫相半自是造之法鄭𤣥錯解以為陰鑑之制依古取明水法合用方諸引淮南子等書用大蛤也又稱敬貞曽八九月中取蛤一尺二寸者依法試之自人定至夜半得水四五斗者敬貞所陳檢有故實又稱先經試驗確執望請差敬貞自取蚌蛤便赴泰山與所司對試是日制曰古今典制文質不同至于制度隨世代沿革唯祀天地獨不改張斯乃自處于厚奉天以薄又今封禪即用玉牒金繩器物之間復有瓦罇秸席一時行禮文質頓乖駁而不倫深為未愜其封祀降禪祈糓上帝后土位先設槀秸瓦甒瓢杯等物並宜改用䄄褥罍爵毎事從文其諸郊祀亦宜准此于是昊天上帝之座褥以蒼皇地祗褥以黄配帝及后褥以紫五方上帝及大明夜明席皆以五色内官以下席皆以莞冊府元龜乾封元年正月戊辰朔有事于泰山親祀昊天上帝于封祀之壇已亡帝登于泰山封玉牒于介丘庚午降禪于社首山皇后為亞獻越國太妃燕氏為終獻先是李勣許敬宗等議封禪儀注請以髙祖太宗二座俱配昊天上帝詔從之壬申帝御朝覲壇受朝賀大赦天下癸酉帝謂羣官曰升中大禮不行來數千載近代帝王雖稱封禪其間事有不同或謂求仙克禋或以廵遊望拜皆非尊崇祖業近在隋朝䘮亂最甚老者填溝壑少壯染兵鋒高祖發自晉陽撥亂反正先朝躬擐甲胄纉成大業掃除氛祲廓清區宇遂得四海宅心萬方仰德朕丕承寶歴十有七年終日孜孜夙夜無怠屬國家無事天下泰平華夷乂安逺近輯睦所以躬親展禮褒賛先勲情在歸功固非為已逐得上應天心下允人望今大禮既畢深以為慰公等休戚是同故應共有此慶欲與公等飲宴盡歡各宜在外更衣即來相見仍勅所司撤幄帳施玉牀三品以上升壇四品以下縱列坐壇下從酒設樂羣臣及諸岳牧競來上夀起舞日晏方止戊寅詔兖州置寺觀各三所觀以紫雲仙鶴萬嵗為稱寺以封巒非煙重輪為名丙戌發自太山改號封祀壇為舞鶴臺介丘壇為萬嵗臺降禪壇為景雲臺以祀日各有弄鶴及山呼萬嵗之瑞故也舊唐書禮儀志乾封三年正月帝親享昊天上帝于山下封祀之壇如圜丘之儀祭訖親封玉策置石䃭聚五色土封之圜徑一丈二尺高九尺其日帝率侍臣以下升泰山翌日就山上登封之壇封玉策訖復還山下之齋宫其明日親祀皇地祗于社首山上降禪之壇如方丘之儀皇后為亞獻越國太妃燕氏為終獻翌日上御朝覲壇以朝羣臣如元日之儀禮畢讌文武百寮大赦改元案本紀是年三月改元總章大唐新語高宗乾封初封禪岱宗行初獻之禮畢執事者趨下而宫官執帷天后率六宫昇壇行禮帷席皆以錦繡為之識者咸非焉上元三年二月詔今冬有事于嵩岳閏三月以吐蕃犯塞停之案本紀是年十一月改元儀鳯冊府元龜上元三年二月詔以今冬有事于嵩岳命有司修撰儀注務從典故閏二月詔以吐蕃犯塞停嵩岳封禪之禮舊唐書高宗本紀調露元年秋七月己卯詔以今年冬至有事嵩岳禮官學士詳定儀注冬十月單于大都䕶府突厥阿史徳溫傳及奉職二部相率反叛庚申詔封嵩山宜停永淳二年春正月甲午朔幸奉天宫遣使祭嵩岳少室箕山具茨等山西王母啟母巢父許由等祠十一月癸亥幸奉天宫時天后自封岱之後勸上封中岳每下詔草儀注即嵗饑邊事警急而止至是復行封中岳禮上疾而止禮儀志高宗既封泰山之後又欲遍封五岳至永淳元年於洛州嵩山之南置崇陽縣其年七月勅其所造奉天宫二年正月駕幸奉天宫至七月下詔將以其年十一月封禪于嵩岳詔國子司業李行偉考功員外郎賈大隠太常博士韋叔夏裴守貞輔抱素等詳定儀注于是議立封祀壇如圜丘之制上飾以元四面依方色為圓壇三成高二丈四尺毎等高六尺壇上徑一十六步三等各闊四步設十二陛陛皆上闊八尺下闊一大四尺為三重壝距外壝三十步内壝距五十步燎壇在壇東南外壝之内高三尺方一丈五尺南出陛登封壇圓徑五丈高九尺四出陛為一壝飾以五色凖封祀壝禪祭上飾以金四面依方色為八角方壇再成髙一丈二尺毎等髙四尺壇上方十步毎等廣四步設八陛其上壇陛皆廣八尺中等陛皆廣一丈下等陛皆廣一丈二尺為三重壝之大小凖封祀為埋塪在壇之未地外壝之内方深取足容物南出陛朝覲壇于行宫之前為壇宫方三分壝二在南壇方二十四丈高九尺南面兩陛餘三面各一陛封祀登封五色土封石䃭為圜封上徑一丈二尺下徑三丈高九尺禪祭五色土封為八角方封大小凖封祀制度所用尺寸凖歴東封並用古尺諸壇並築土為之禮無用石之文並度影以定方位登封降禪四出陛各當四方之中陛各上廣七尺下廣一丈二尺封祀玉帛料有蒼璧四圭有邸圭璧禪祭有黄琮兩圭有邸無璧又定登封降禪朝覲等曰凖禮冬至祭天于圜丘其封祀請用十二日凖東封祀故事十二日祭封十三日禪祭十四日朝覲若有故須改登封已下期日在禮無妨又輦輿料云封祀登封皇帝出乘玉輅還乗金輅皇太子往還金輅禪祭皇太子加封祀乂衣服料云東封祀祭日天皇服衮冕近奉制依貞觀禮服大裘又云衮冕服一具齋服之通天冠服一具迴服之翼善冠服一具馬上服之皇太子衮冕服又齋則服逺遊冠受朝則公服逺逰冠服馬上則進徳冠服冊府元龜永淳二年七月庚申詔以今年十月有事于嵩岳宜令禮官學士等審定儀注務展誠敬仍令天下岳牧及京官五品以上各舉所知有孝行儒學文武之士於是詔禮官議射牛之事太常博士裴守真奏議曰據周禮及國語郊祀天地天子自射其牲漢武唯封泰山令侍中儒者射牛行事至于餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省不可復行據封禪祀禮日未明十五刻宰人以鸞刀割牲質明而行事比鑾駕至祠所牢牲總畢天皇唯奠玉酌獻而已若今祀前一日射牲事即傷早祀日方始射牲事又傷晚若依漢武故事即非親射之儀事貴隨時不可行用神功破陣樂及功臣慶善樂二舞每奏上皆立對守真又議曰竊惟二舞肇興謳吟攸屬贊九功之茂烈叶萬國之歡心義均韶夏用兼賔祭皆祖宗聖徳而子孫享之詳覽傳記未有皇王立觀之禮况升中大事華夷畢集九服仰垂拱之安百蠻懷率舞之慶陶甄化育莫匪神功豈於樂舞别申嚴禁臣等詳擬奏二舞時天皇不合起立詔並從之尋以帝不豫改用來年正月行封禪之禮十月癸亥車駕幸奉天宫十一月丙戌詔曰朕聞仁者徳之本叶亭育之至途禮者道之末乃帝王之餘事歴選往初詳觀曩躅惻隠以孚其化變通以會其神朕以虚薄祇膺寶位旰食宵衣懼忝于宗社如傷若厲佇濟于黎元毎以皇基肇闢範圍覆載遺惠所覃昭格區宇䖍荷靈命嘗慮下虧鴻業遍刋羣岳不足上報𤣥功已升聞于日觀思欵謁于天臺志在告成諒非為已屬今兹豐稔方有事于嵩丘崇累聖之丕績祈兆人之嘉佑頃者分使出廵存問風俗河南河北尚有十餘州旱澇加以朔方寇盜時或侵邊闗内流離未能復業一物失所獨甚納隍數郡不寧豈宜備禮前欲以來年正月封中岳者宜停蕙田案高宗非有封禪之志者特以席太宗之盛廹武后之請絶不復權其是非而昧昧為之斯亦事理之至竒者矣禪地配后為武氏亞獻地也慢神悖禮不可言矣遂致變亂不亦宜哉右唐高宗封禪唐書武后本紀嗣聖十三年即武后萬嵗通天元年臘月甲戌如神岳甲申封于神岳丁亥禪于少室山王𤣥感傳天授中𤣥感直𢎞文館武后時已郊遂享明堂封嵩山紹興韋叔夏等草儀具衆推練洽右唐武后封禪附冊府元龜𤣥宗開元十二年十二月辛酉文武百官吏部尚書裴漼等上請封東岳曰臣聞道協乾坤聖人之𤣥徳功存禮樂王者之能事故旁徴前載博考鴻名躬歴數之期遇天人之應莫不發號施令升中合符澤浸黎元以茂聲實者矣伏惟開元神武皇帝陛下握符提象出震乗圖英威邁于百王至徳加于四海梯航接武畢盡戎夷之獻耕鑿終歡不知堯舜之力惡除氛沴増日月之光輝慶襲休榮雜煙雲之氣色靈物紹至休祥沓委江茅將鄗黍均芳雙觡與一莖齊烈固可以稽典訓設壇場悉符瑞之美答神祗之貺謙而不發雖在于聖心理則難辭孰違于天意臣幸遭昌運謬齒周行咸申就日之誠願覩封巒之慶無任勤懇之至謹于朝堂奉表陳情以聞帝手詔報曰自中朝有故國步艱難天祚我唐大命集于聖真皇帝朕承奉丕業十有餘年徳未加于百姓化未覃于四海將何以擬洪烈于先帝報成功于上𤣥至若堯舜禹湯之茂躅軒后周文之懿範非朕之能逮也其有日月之瑞風雲之祥則宗廟社稷之餘慶也天平地成人和嵗稔則羣公卿士之任職也撫躬内省朕何有焉難違兆庶之情未議封崇之禮甲子侍中臣乾曜中書令臣説等奏臣聞自古受天命居大寶者必登崇髙之丘行封禪之事所以展誠敬報神祗三五迄今未之闕也是以髙宗因文武之業盛岱亭之禮方冊所記虞夏同風聖移三朝年經五紀封崇之典缺而未修山川望幸屬在今日陛下靖多難尊先朝天所啓也承大統臨萬邦天所命也焉可不陟東岱禪云亭報上𤣥之靈思紹髙宗之洪烈則天地之意宗廟之心將何以克厭哉且陛下即位以來十有四載創九廟禮三郊大舜之孝敬也敦九族友兄弟文王之慈惠也卑宫室菲飲食夏禹之恭儉也道稽古德日新帝堯之文思也憐黔首惠蒼生成湯之深仁也化𤣥漠風太和軒皇之至理也至如日月星辰山河草木羽毛鱗介窮祥極瑞葢以薦至而為常衆多而不録正以天平地成人和嵗稔可以報于神明矣鴻生碩儒上章奏而請封禪者前後千百聖情撝揖天鑒未回臣等仰考神心旁採衆望封巒展禮時不可抑陛下縱不欲以成功告天豈不可以天休報徳臣等昧死上請以聞帝手詔報曰夫登封之禮告禪之儀葢聖人之能事明王之盛業也朕以眇身託王公之上夙夜祗懼恐不克勝幸賴羣公以保宗社至于休徵符瑞皆先帝遺慶朕何賴焉豈可以禮百神覲羣后備岱亭之禮展封祀之儀者哉雖誠精是違而宿心未暇臣乾曜説等又上言曰臣等考天人之際稽億兆之情以為治定功成登封告禪鴻名盛則屬在聖明陛下讓徳冲深未允羣議神祗闕望臣等懼馬且今四海和平百蠻率職莫不含道徳之甘實咀仁義之馨香是以上帝聿懷名山望幸珍符薦至年糓屢登開闢以來未之有也臣聞自古受命而封禪者七十二君安有殊風絶業足以方今也然猶躡梁父登泰山飛英聲騰茂實而陛下功德之美符瑞之富固以孕虞夏含殷周矣有何退讓逡廵于大禮哉夫昭報天地至敬也嚴配祖宗大孝也厚福蒼生博惠也登封紀號丕業也陛下安可以闕哉况天地之符彰矣祖考之靈著矣蒼生之望勤矣禮樂之文備矣陛下安可以辭哉故臣等願因神祗之叶贊順華夏之懇誠早稽舊章特垂新詔庶幾仲夏乘農之隙以展廵狩朝覲之儀則天下幸甚臣等昧死重請以聞帝又詔報曰夫治定然後制禮功成然後作樂朕承奉宗廟恐未克勝未能使四海乂安此禮未定也未能使百蠻效職此功未成也焉可以揚景化告成功雖欲答于神祗終候安于兆庶再省誠懇惻怵良深乾曜説等又再上言曰臣聞聖人者與天地合徳故珍符休命不可得而辭鴻名盛典不可得而讓陛下功格上天澤流厚載三五之盛莫能比崇登封告成理叶幽贊故符瑞異臻天意也書軌大同人事也菽粟屢登和平也刑罰不用至理也今陛下稽天意以固辭違人事以久讓是和平而不崇昭報至理而闕薦祖宗億兆之情猶知不可况上帝臨照神祗顧諟其可止乎願納王公卿士列岳縉紳之望廻命有司速定大典臣等不勝懇切敢冒死再拜上請以聞時儒生墨客獻賦頌者數百計帝不得已而從之丁卯下詔曰自古受命而王者曷嘗不封泰山禪梁父答厚徳告成功三代之前率由斯義自魏晉以降迄至周隋帝典闕而大道隱王綱弛而舊章闕千載寂寥封崇莫嗣物極而復天祚我唐文武二后應圖受籙洎于高宗重光累盛承至理登介丘懷百神震六合紹殷周之統接虞夏之風中宗𢎞懿鑠之休睿宗穆粹清之道巍巍蕩蕩無得而稱者也朕昔戡多難禀略先朝䖍奉慈㫖嗣膺丕業是用創九廟以申孝敬禮二郊以展嚴禋寶菽粟于水火捐珠玉于山谷兢兢業業非敢追美前王日慎一日實以遵奉遺訓至于廵狩大典封禪鴻名顧惟寡薄未遑時邁十四載于兹矣今百榖有年五材無眚刑罰不用禮義興行和氣氤氳淳風淡泊蠻夷戎狄殊方異類重譯而至者日月于闕庭奇獸神禽甘露醴泉窮祥極瑞者朝夕于林籞王公卿士罄廼誠于中鴻生碩儒獻其書于外莫不以神祗合契億兆同心斯皆烈祖聖考垂裕餘慶故朕得荷皇天之景祐賴祖宗之介福敢以眇身而顓其讓是以敬承羣議𢎞此大猷以光我高祖之丕圖以紹我太宗之鴻業永言陟配祇感載深可以開元十三年十一月十日式遵故實有事泰山所司與公卿諸儒詳擇典禮預為備具勿廣勞人務存節約以稱朕意所縁封禪儀注兵馬陪集並皆條奏布告遐邇唐書禮樂志開元十二年四方治定嵗屢豐稔羣臣多言封禪中書令張説又固請乃下制以十三年有事泰山於是説與右散騎常侍徐堅太常少卿韋縚秘書少監康子元國子博士侯行果刋定儀注立圓臺於山上廣五丈髙九尺土色各依其方又於圓臺上起方壇廣一丈二尺髙九尺其壇臺四面為一階又積柴為燎壇於圓臺之東南量地之宜柴高一丈二尺方一丈開上南出户六尺又為圓壇於山下三成十二階如圜丘之制又積柴於壇南為燎壇如山上又為玉冊玉匱石䃭皆如高宗之制𤣥宗初以謂升中於崇山精享也不可諠譁欲使亞獻已下皆行禮山下壇召禮官講議學士賀知章等言昊天上帝君也五方精帝臣也陛下享君於上羣臣祀臣於下可謂變禮之中然禮成于三亞終之獻不可異也於是三獻皆升山而五方帝及諸神皆祭山下壇𤣥宗問前世何為秘玉牒知章曰玉牒以通意於天前代或祈長年希神仙㫖尚㣲宻故外莫知帝曰朕今為民祈福無以秘為即出玉牒以示百寮乃祀昊天上帝於山上壇以高祖配祀五帝以下諸神於山下其祀禮皆如圜丘而卜日告天及廟社大駕所經及告至問百年朝覲皆如廵狩之禮其登山也為大次于中道止休三刻而後升其已祭燔燎侍中前跪稱具官臣某言請封玉冊皇帝升自南陛北向立太尉進昊天上帝神座前跪取玉冊置于案以進皇帝受玉冊跪内之玉匱纒以金繩封以金泥侍中取受命寶跪以進皇帝取寶以印玉匱侍中受寳以授符印郎太尉進皇帝跪捧玉匱授太尉太尉退復位太常卿前奏請再拜皇帝再拜退入于次太尉奉玉匱之案于石䃭南北向立執事者發石葢太尉奉玉匱跪藏于石䃭内執事者覆石葢檢以石檢纒以金繩封以石泥以玉寶遍印引降復位帥執事者以石距封固又以五色土圓封其配座玉牒封于金匱皆如封玉匱太尉奉金匱從降俱復位以金匱内太廟藏于高祖神堯皇帝之石室其禪于社首皆如方丘之禮舊唐書禮儀志上詔中書令張説右散騎常侍徐堅太常少卿韋縚秘書少監康子元國子博士侯行果等與禮官于集賢書院刋撰儀注𤣥宗初以靈山好靜不欲喧繁與宰臣及侍講學士對議用山下封祀之儀于是張説謂徐堅韋縚等曰乾封舊儀禪社首享皇地祗先后配享王者父天而母地當今皇母位亦當往帝之母也子配母享亦有何嫌而以皇后配地祗非古之制也天鑒孔明福善如響乾封之禮文徳皇后配皇地祇天后為亞獻越國太妃為終獻宫闈接神有乖舊典上𤣥不祐遂有天授易姓之事宗社中圯公族誅滅皆由此也景龍之季有事圜丘韋氏為亞獻皆以婦人升壇執籩豆渫黷穹蒼享祀不潔未及踰年國有内難終獻皆受其咎掌座齋郎及女人執祭者多亦夭卒今主上尊天敬神事須革正斯禮以睿宗大聖貞皇帝配皇地祗侑神作主乃定議奏聞上從之舊禮郊祀既畢収取玉帛牲體置于柴上然後燔于燎壇之上其壇于神壇之左顯慶中禮部尚書許敬宗等因修改舊禮乃奏曰謹案祭祀之禮周人尚臭祭天則燔柴祭地則瘞血宗廟則焫蕭灌鬯皆貴氣臭同以降神禮經明白義釋甚詳委柴在祭物之初理無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮論説太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊用脅之九个太宰令奉牲脅太祝令奉圭璧俱奠燎薪之上此即晉氏故事亦無祭天之文既云漢儀用牲頭頭非神爼之物且祭末爼皆升右胖之脅惟有三禮賀循既云用祭天之牲左胖復云今儀用脅九个足明燔柴所用與升爼不同是知自在祭初别燔牲體非于祭末燒神餘饌此則晉氏以前仍遵古禮唯周魏以降妄為損益納告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆别蒼璧蒼犢之流柴之所用四圭騂犢之屬祀之所須故郊天之有四圭猶祀廟之有圭瓚是以周官典瑞文勢相因並事畢收藏不在燔例而今新禮引用蒼璧不顧圭瓉遂亦俱燔義既有乖理難因襲又燔柴作樂俱以降神則處置之宜須相依凖柴燔在左作樂在南求之禮情實為不類且禮論説積柴之處在神壇之南新禮以為壇左文無典故請改燔為祭始位樂懸之南外壝之内其禋祀瘞埋亦請凖此制可之自是郊丘諸祀並先焚而後祭及𤣥宗將作封禪之禮張説等參定儀注臣徐堅康子元等建議曰臣等謹案顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等案禮迎神之義樂六變則天神降八變則地祗出九變則鬼神可得而禮矣則降神以樂周禮正文非謂燔柴以降神也案尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又案顯慶中無忌等奏稱晉氏之前猶遵古禮周魏以降妄為損益者今案郭璞晉南郊賦及注爾雅祭後方燔又案宋志所論亦祭後方燔又檢南齊北齊及梁郊祀亦飲福酒後方燔又檢後周及隋郊祀亦先祭後燔據此即周遵後燔晉不先燔無忌之言義乃相乖又案周禮大宗伯職以玉作六器以禮天地四方注云禮謂始告神時薦于神座也下文云以蒼璧禮天以黄琮禮地皆有牲幣各如其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱各奠之神座理節不惑又云四圭有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青圭赤璋白琥𤣥璜自是立春立夏立秋立冬之日各于其方迎氣所用自分别矣今案顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧既已燔矣所以遂加四圭有邸奠之神座蒼牲既已燔矣所以更加騂牲充其實爼混昊天于五帝同用四圭失特徃之明文加為二犢深乖禮意事乃無憑考功員外郎趙冬曦太學博士侯行果曰先焚者本以降神行之已久若從祭義後焚為定中書令張説執奏曰徐堅等所議燔柴前後議有不同據祭義及貞觀顯慶以後既先燔若欲正失禮求祭義請從貞觀禮如且因循不改更請從顯慶禮凡祭者本以心為主心至則通于天地達于神祇既有先燔後燎自可斷于聖意所至則神于神明燔之先後臣等不敢裁定元宗令依後燔及先奠之儀是後太常卿寧王憲奏請郊壇時祭並依此先奠璧而後燎柴瘞埋制從之時又有四門助教施敬本駁奏舊封禪禮八條其畧曰舊禮侍中跪取匜沃盥非禮也夫盥手洗爵人君將致潔而尊神故使小臣為之今侍中大臣也而沃盥于人君太祝小臣也乃詔祝于天神是接天神以小臣奉人君以大臣故非禮案周禮大宗伯曰鬰人下士二人贊祼事則沃盥此職也漢承秦制無鬰人之職故使近臣為之魏晉至今因而不改然則漢禮侍中行之則可矣今以侍中為之則非也漢侍中其始也㣲高帝時籍孺為之惠帝時閎孺為之留侯子辟疆年十五為之至後漢樓堅以議郎拜侍中邵闔自侍中遷步兵校尉其秩千石少府卿之屬也少府卿秩中二千石丞秩千石侍中與少府丞班同魏代蘇則為之舊侍中親省起居故謂之執獸子吉茂見謂之曰仕進不止執獸子是言其為䙝臣也今侍中名則古宦人非昔任掌同燮理寄實鹽梅非復漢魏執獸子之班異乎周禮鬰人之職行舟不息墜劍方遥驗刻而求可謂謬矣夫祝以傳命通主人之意以薦于神明非賤職也故兩君相見則卿為上儐况天人之際其肅恭之禮以兩君為喻不亦大乎今太祝下士也非所以重命而尊神之義也然則周漢太祝是禮矣何者案周禮大宗伯曰太祝下大夫二人上士四人掌六祝之辭大宗伯為上卿今禮部尚書太常卿比也小宗伯中大夫今侍郎少卿比也太祝下大夫今郎中太常丞比也上士四人今員外郎太常博士比也故可以處天人之際致尊極之辭矣又漢太祝令秩六百石與太常博士同班梁太祝令與南臺御史同班今太祝下士之卑而居下大夫之職斯又刻舟之論不異于前矣又曰舊禮謁者引太尉升壇亞獻非禮也謁者已賤升壇已重是㣲者用之于古而大體實變于今也案漢官儀尚書御史臺官屬有謁者僕射一人秩六百石銅印青綬謁者三十五人以郎中滿嵗稱給事未滿嵗稱權謁者又案漢書百官公卿表光禄勲官屬有郎中員外秩比二千石有謁者掌賔贊受事員七十人秩比六百石古之謁者秩異等今謁者班微以之從事可謂踈矣又曰舊禮尚書令奉玉牒今無其官請以中書令從事案漢武帝時張安世為尚書令遊宴後宫以宦者一人出入帝命改為中書謁者令至成帝罷宦者用士人魏黃初改祕書署中書監令舊尚書并掌制誥既置中書官而制誥樞宻皆掌焉則自魏以來中書是漢朝尚書之職今尚書玉牒是用漢禮其官既闕故可以中書令主之議奏𤣥宗令張説徐堅召敬本與之對議詳定説等奏曰敬本所議其中四條先已改定有不同者望臨時量事改攝制從之十二年十一月丙戌至泰山去山趾五里西去社首山三里丁亥帝服衮冕于行宫致齋于供帳前殿己丑日南至大備法駕至山下元宗御馬而登侍臣從先是元宗以靈山清潔不欲多人上欲初獻于山上壇行事亞獻終獻于山下壇行事召禮官學士賀知章等入講儀注因問之知章等奏曰昊天上帝君位五方精帝臣位帝號雖同而君臣異位陛下享君位于山上羣臣祀臣位于山下誠足以垂範來葉為變禮之大者也禮成于三初獻亞終合于一處𤣥宗曰朕正欲如是故問卿耳于是敕三獻于山上行事其五方帝及諸神座于山下壇行事𤣥宗因問玉牒之文前代帝王何故秘之知章對曰玉牒本是通于神明之意前代帝王所求各異或禱年算或思神仙其事微宻是故莫知之𤣥宗曰朕今此行皆為蒼生祈福更無秘事宜將玉牒出示百僚使知朕意其詞曰有唐嗣天子臣某敢昭告于昊天上帝天啓李氏運興土徳髙祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏内難推戴聖父恭承大寶十有三年敬若天意四海晏然封祀岱宗謝成于天子孫百祿蒼生受福庚寅祀昊天上帝于山上封臺之前壇高祖神堯皇帝配享焉邠王守禮亞獻寧王憲終獻皇帝飲福酒癸巳中書令張説進稱天賜皇帝太一神䇿周而復始永綏兆人帝拜稽首山上作圓臺四階謂之封壇臺上有方石再累謂之石䃭玉牒玉冊刻玉填金為字各盛以玉匱束以金繩封以金泥皇帝以受命寶印之納二玉匱于䃭中金泥䃭際以天下同文之印封之壇東南為燎積柴其上皇帝就望燎位火發羣臣稱萬嵗傳呼至山下聲動天地山下祀壇羣臣行事已畢皇帝未離位命中書門下曰朕以薄徳恭膺大寶今封祀初建雲物休祐皆是卿等輔弼之力君臣相保勉副天心長如今日不敢矜怠中書令張説跪言聖心誠懇宿齋山上昨夜則息風收雨今朝則天清日暖復有祥風助樂青雲引燎靈迹盛事千古未聞陛下又思慎終如初長福萬姓天下幸甚先是車駕至岳西來蘇頓有大風從東北來自午至夕裂幕折柱衆恐張説倡言曰此必是海神來迎也及至岳下天地清晏𤣥宗登太山日氣和煦至齋次日入後勁風偃人寒氣切骨𤣥宗因不食次前露立至夜半仰天稱某身有過請即降罰若萬人無福亦請某為當罪兵馬辛苦乞停風寒應時風止山氣温暖時從山上布兵至于山壇傳呼辰刻及詔命來往斯須而達夜中燃火相屬山下望之有如連星自地屬天其日平明山上清迥下望山下休氣四塞登歌奏樂有祥雲自南而止絲竹之聲飄若天外及行事日揚火光慶雲紛郁遍滿天際羣臣並集於社首山帷宫之次以候鑾駕遥望紫煙憧憧上達内外歡譟𤣥宗自山上便赴社首齋次辰已間至日色明朗慶雲不散百辟及蕃夷爭前迎賀辛卯享皇地祗于社首之太折壇睿宗大聖真皇帝配祀五色雲見日重輪藏玉策于石䃭如封壇之儀壬辰元宗御朝覲之帳殿大備陳布文武百僚二王後孔子後諸方朝集使岳牧舉賢良及儒生文士上賦頌者戎狄蠻夷羌胡朝獻之國突厥頡利發契丹奚等王大食謝䫻五天十姓崑崙日本新羅靺鞨之侍子及使内臣之番高麗朝鮮王伯濟帶方王十姓摩阿史那興昔可汗三十姓左右賢王日南西二鑿齒雕題䍧牱烏滸之酋長咸在位制曰朕聞天監惟后后克奉天既合徳以受命亦推功而復始厥初作者七十二君道洽跡著時至符出皆用事于介丘升中于上帝人神之望葢有以塞之皇王之序可得而言朕接統千嵗承光五葉惟祖宗之德在人惟天地之靈作主往者内難幽贊而集大勲間無外虞守成而纘舊服未嘗不乾乾終日思與公卿大夫上下協心聿求至理以𢎞我烈聖其庶乎馨香今九有大寧羣氓樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率由感被戎狄不至唯文告而來庭麟鳳已徵將覺情而在藪以故凡百執事亟言大封顧惟不徳切欲勿議伏以先聖儲祉與天同功荷傳符以在今敢侑神而無報大篇斯在朕何讓焉遂奉遵髙宗之舊章憲乾封之令典時邁東土柴告岱岳精意上達肸蠁來應信宿行事雲物呈祥登降之禮斯畢嚴配之誠獲展百神羣望莫不懷柔四方諸侯莫不來慶斯是天下之介福邦家之耿光也無窮之休祉豈獨在予非常之惠澤亦宜逮下可大赦天下封泰山神為天齊王禮秩加三公一等仍令所管崇飾祠廟環山十里禁其樵採給近山二十户以奉祠神元宗製紀泰山銘御書勒于山頂石壁之上其詞曰朕宅位十有四載顧惟不徳懵于至道任夫難任安夫難安兹朕未知獲戾于上下心之浩蕩若涉于大川賴上帝垂休先后儲慶宰衡庶尹交修皇極四海會同五典敷暢嵗云嘉熟人用大和百辟僉謀唱余封禪謂孝莫大于嚴父謂禮莫尊于告天天符既至人望既積固請不已固辭不獲肆余與夫二三臣稽虞典繹漢制張皇六師震讋九寓旌旗有列士馬無譁肅肅邕邕翼翼溶溶以至于岱宗順也爾雅曰泰山為東岳周官曰兖州之鎮山實萬物之始故稱岱焉其位居五岳之伯故稱宗焉自昔王者受命易姓于是乎啓天地薦成功序圖録紀氐號朕統承先王兹率厥典實欲報𤣥天之眷命為蒼生之祈福豈敢高視千古自比九皇哉故設壇場于山下受羣方之助祭躬封燎于山上冀一獻之通神斯亦因高崇天就廣增地之義也乃仲冬庚寅有事東岳類于上帝配我髙祖在天之神罔不畢降粤翌日禪于社首佑我聖考祀于皇祗在地之神罔不咸舉暨壬辰覲羣后上公進曰天子膺天符納介福羣臣拜稽首呼萬嵗慶合歡同乃陳誠以德大渾協度彞倫攸叙三事百揆時乃之功萬物由庚兆人允植列牧衆宰時乃之功一二兄弟篤行孝友錫類萬國時惟休哉我儒制禮我史作樂天地擾順時唯休哉蠻夷戎狄重譯來貢累聖之化朕何慕焉五靈百寶日來月集㑹昌之運朕何惑焉凡今而後儆乃在位一王度齊象法權舊章補缺政存易簡去煩苛思立人極乃見天則於戲天生蒸人惟后時能以美利利天下事天明矣地徳載物惟后時相能以厚生生萬人事地察矣天地明察鬼神著矣惟我藝祖文考精爽在天其曰懿爾幼孫克享上帝惟帝時若馨香其下丕乃曰有唐氏文武之曾孫隆基誕錫新命纘我舊業永保天祿子孫其承之余小子敢對揚上帝之休命則亦與百執事尚綏兆人將多于前功而毖彼後患一夫不獲萬方其罪余一心有終上天其知我朕惟寶行三徳曰慈儉謙慈者覆無疆之言儉者崇將來之訓自滿者人損自謙者天益如是則軌迹易循基搆易守磨石壁刻金石冀後之人聽辭而見心觀末而知本銘曰惟天生人立君以理維君受命奉天為子代去不留人來無已徳涼者滅道髙斯起赫赫高祖明明太宗爰革隋政奄有萬邦罄天張宇盡地開封武稱有截文表時邕高祖稽古徳施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巍巍岱宗衞我神主中宗紹運舊邦惟新恭已南面氤氲化醇告成之禮留諸後人緬余小子重基五聖匪功伐高匪徳矜盛叙若祀典丕承永命至誠動天福我萬姓古封泰山七十二君或禪亭亭或禪云云其迹不見其名可聞祇遹文祖光昭舊勲方士虚誕儒書不足佚后求仙誣神檢玉秦災風雨漢汙編録徳未合天或承之辱道在觀政名非從欲銘之絶巖播告羣岳于是中書令張説撰封祀壇頌侍中源乾曜撰社首壇頌禮部尚書蘇頲撰朝覲壇頌以紀聖徳冊府元龜開元十三年四月乙丑撫州三脊茅生有上封事者言曰昔齊桓公九合諸侯一正天下將欲封禪問于夷吾夷吾對曰江淮間三脊茅生用以縮酒乃可封禪其將無茅桓公大慙而罷自歴千古今始一生昔昭王南征責楚包茅不入王祭不供則是其地其茅今高一尺至八月長足方堪縮酒特望聖恩至時令采用祭泰山并掘根于苑内植之時宰臣已遣使于岳州採沅江茅乃奏曰管夷吾為桓公是諸侯不合封禪故稱茅以拒之及伐楚之日尊周室行伯道及責楚云包茅不入王祭不供若以茅為瑞是不知經義臣等歴任荆楚博訪貢茅沅江最勝臣已牒岳州取訖今稱撫州有茅請移根入苑且貉不踰汶橘不過江移根苑中信是虚語望勅撫州且進六束與沅江相比用之帝曰可癸酉詔朝集使各舉所部孝悌文武集於泰山之下勅曰封祀告成為萬姓祈福必資清潔以副朕心其行事官及齋郎應致齋者宜令御史行齋切勿容疎怠有雄野雞飛入齋宫馴而不去久之飛入仗衞忽不見邠王守禮等賀曰臣謹案舊典雌來者伯雄來者王又聖誕酉年雞主于酉斯葢王道遐被天命休禎臣請宣付史官以彰靈貺唐書列傳張説為中書令倡封禪議受詔與諸儒草儀及登封還詔説撰登封壇頌刻之泰山唐張説封禪壇頌皇唐六葉開元神武皇帝再受命致太平乃封岱宗禪社首鑿石紀號天文煥發儒臣志美立碣祠壇曰厥初生人俶有君臣其道茫昧其氣樸畧因時歘起與運而紛落泯泯沒沒而無聞焉爾後聖人取法象立名位衣裳以等之甲兵以定之於是禮樂出而書記存矣究其源致敬乎天地報其本致美乎鬼神則封禪者帝王受天命告成功之為也閲曩聖之奥訓考列辟之通術疇若天而不成曷背道而靡失由是推之封禪之義有三帝王之略有七七者何傳不云乎道徳仁義禮智信順之稱聖哲逆之號狂悖三者何一位當五行圖録之序二時會四海昇平之運三徳具欽明文思之美是謂與天合符名不死矣有一不足而云封禪人且未許其如天何言舊史者君莫道於陶唐舜禹臣莫徳於臯陶稷卨三臣備徳皆有天下仲尼叙帝王之書繫魯秦之誓明魯祀周公用王禮秦承伯益接周統孔聖㣲㫖不其效歟然秦定天下之功高享天祿之日淺天而未忘庭堅之徳也故大命復集於皇家天之贊唐不惟舊矣其興之也元靈啓廸黄祗顧懷應歸運以義舉撫來蘇以利見濩也無放夏之慙武也無伐殷之戰高祖創業四宗重光有徳格天漏泉蒸雲濡露菌蠢滋育氤氲涵煦若天地之覆載日月之照臨溥有形而希景罄無外而宅心百有八年於兹矣皇帝攘内難而啓新命戴睿宗而纘舊服宇宙更闢朝廷始位葢羲軒氏之造皇圖也九族敦序百姓昭明萬邦咸和黎民於變立土圭以步歴革銅渾以正天葢唐虞氏之張帝道也天地四時六官著禮井田三壤五圻成賦廣九廟以尊祖定六律以和神葢三代之設王制也武緯之文經之聖謨之神化之然猶戰戰兢兢日慎一日約規誨以進徳遂忠良以代工講習乎無為之書討論乎集賢之殿寵勇爵貴經門翼乎鵷鸞之列在庭毅乎貔貅之師居鄙人和傍感神寶㳫至乾符坤珍千品萬類超圖軼牒未始聞記我后以人瑞為心不以物瑞為意王公卿士儼然進曰休哉陛下孝至于天故合于道前年祈后土人獲大穰間嵗祀圜丘日不掩朔感祥以祚聖因事以觀天天人交合其則不逺意者喬岳埽路望翠華之來上帝儲恩俟蒼璧之禮久矣焉可專讓而廢舊勛羣臣固言勤帝知罪至於再至於三帝乃揖之曰欽崇天道俯率嘉話恐徳不類敢憚于勤其撰廵狩之儀求封禪之故既而官禮不誡而備軍政不謀而輯天老練日雨師灑道六甲案隊八神警蹕孟冬仲旬乗輿乃出千旗雲列萬㦸林行霍濩燐爛飛焰揚精原野為之震動草木為之風生歴郡縣省謡俗問耆年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡丘陵聚舞其中垂白之老樂過以泣不圖蒿里之魂復見乾封之事堯雲往舜日還神華靈鬰爛熳乎穹壤之間是月來至於岱宗祗祓齋宫滌濯靜室凝神𤣥覽將欵太一議夫泰山者聖帝受天官之宫天孫惣人靈之府自昔立國莫知萬類克升中而建號惟七十而有五我高宗六之而今七矣非夫等位盛時明徳曠代遼闊難并之甚哉先時將臻夫大封也累封壇於高岡築太壇於陽阯夫其天壇三襲辰陛十二咸秩衆靈列座有次崇牙樹羽管磬鏞鼓宫懸於重壝之内干戚釵殳鉤㦸戣戵周衞於四門之外伐國重器傳代絶瑞旅之於中庭玉輦金轂翠冒黄屋夾之於端路庶官百辟羌夷蠻貊褒成之後讓王之客叙立於禮神之場髦頭弩牙鐵馬金鏃介胄如雪旗幟如火逺匝於清禁之野於是乎以天正上元法駕徐進屯千乗於平路留羣臣於谷口皇帝御六龍陟萬仞獨與一二元老執事之人出天門臨日觀次沆壑宿巉巖赤霄可接白雲在下庚寅祀髙祖於上封以配上帝命衆官於下位以享衆神皇帝冕裘登壇奠獻俯僂金奏作佾羽舞撞黄鍾歌大吕開閶闔與天語請將信公奉斗布度懋建皇極勤恤蒼生招嘏乎未兆禳災乎未萌上下傳節而禮成樂遍福壽同歸而帝賜神策乃檢玉牒於中頂揚柴燎於高天庶衷誠而上達若憑焰而駕烟日轡方旋神心餘眷五色雲起拂馬而隨人萬嵗山呼從天而至地越翌日尊睿宗侑地祗而禮社首遂張大樂覲東后國風惟舊無黜幽削爵之誅王澤惟新有眚災大賚之慶不浹日至化洽於人心不崇朝景福遍於天下然後藏金櫃於祏室廻玉鑾於上都煌煌乎真聖朝之能事而高代之盛節者也於斯之時華戎殊俗異音同歎曰岳合多雨山峻多雲豈有大舉百萬之師尅期千里之外乃行事之日則天無㸃翳地無纎塵嚴冬變為韶景寒谷鬰為和氣非至徳孰能動天如此其順者乎昔人云自西自東自南自北無思不服今信知聖人作而萬物覩其心服之謂矣或曰祭泰折主先后非禮歟曰是禮也非宜也王者父事天母事地侑神崇孝無嫌可也且夫柴瘞外事帝王主之蒸嘗内事后妃助之是開元正人倫革弊禮起百王之法也故令千載承末光聆絶韻咀甘實潄芳潤爍𤣥妙之至精流不已之淑聲臣説作頌告於神明四皇墳而六帝典雖吉甫亦莫能名徒採彼輿人之詩曰大矣哉惟天為大維皇則之率我萬國受天之祺子孫百代人神共保綏之云爾而已矣徐堅傳𤣥宗時堅充集賢學士從上泰山以參定儀典加光祿大夫裴光庭傳𤣥宗有事岱宗中書令張説以天子東廵京師空虚恐突厥乗間竊發議欲加兵守邊召光庭與謀對曰封禪所以告成功也成功者徳無不被人無不安萬國無不懷今將告成而懼突厥非昭徳也大興力役用備不虞非安人也方謀會同而阻戎心非懷逺也此三者名實乖矣且諸蕃突厥為大贄幣往來願修和好有年矣若遣一使召大臣使赴行在必欣然應命突厥受詔則諸蕃君長必相率而來我偃旗息鼓不復事矣説曰善吾所不及因奏用其策突厥果遣使來朝契丹酋長與諸蕃長皆從行在東封還遷兵部侍郎康子元傳子元越州會稽人仕歴獻陵令開元初詔中書令張説舉能治易老莊者集賢直學士侯行果薦子元及平陽敬會真于説説藉以聞並賜衣幣得侍讀子元擢累秘書少監會真四門博士俄皆兼集賢侍講學士𤣥宗將東之泰山説引子元行果徐堅韋縚商裁封禪儀初高宗之封中書令許敬宗議周人尚臭故前祭而燔柴説堅子元白奏周官樂六變天神降是降神以樂非縁燔也宋齊以來皆先嚌福酒乃燎請先祭後燔如貞觀禮便行果與趙冬曦議以為先燎降神尚矣若祭已而燔神無由降子元議挺不徙説曰康子獨出蒙輪以當一隊耶議未判説請決于帝帝詔後燔酉陽雜爼明皇封禪泰山張説為封禪使説壻鄭鎰本九品官舊例封禪後自三公以下皆遷轉一級惟鄭鎰因説驟遷五品兼賜緋服因大酺次𤣥宗見鎰官位騰躍怪而問之鎰無詞以對黄旛綽曰此泰山之力也右唐𤣥宗封禪五禮通考卷五十一
