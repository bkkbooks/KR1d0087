body:
  text: 五禮通考卷一百四十五刑部尚書秦蕙田撰嘉禮十八飲食禮周禮天官大宰之職以九兩繫邦國之民五曰宗以族得民注繼别為大宗收族者收疏大宗子與族食族燕序以昭穆所以族民即族人也張子曰管攝天下人心收宗族厚風俗使人不忘本須是明譜繫世族與立宗子法古人鮮有不知來處者宗子法廢後世尚譜牒譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄宗子之法不立則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立則人人各知來處朝廷大有所益或問朝廷何所益曰公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得富貴者止能為三四十年之計造宅一區乃其所有既死則衆人分裂未幾蕩盡則家遂不存如此則家且不能保又安能保國家李氏覯曰大宗者其先祖之負荷族人之綱紀乎夫五服者人道之大治也然而上盡於髙祖則逺者忘之矣旁盡於三從則疏者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是世祖常祀而同姓常親也薛氏季宣曰百夫無長不散則亂一族無宗不離則疎先王因族以立宗敬宗以尊祖故吉凶有以相及有無有以相通尊卑有分而不亂親踈有别而不二貴賤有繁而不間然後一宗如出一族一族如出一家一家如出一人此所以得民也鄭氏鍔曰大宗則收族雖無服之親亦係屬而不散故族可以得民呂氏大臨曰古之典禮者皆以宗名之故伯夷作秩宗周官有宗伯下及乎都家皆有宗人宗者廟也禮始於親親親親之法非廟不統所以别姓收族無一不出於祖廟不主乎祖宗故天子之元子為天子之大宗以繼其太祖而别子為諸侯諸侯不敢祖天子而自為一國之太祖故諸侯之元子亦為諸侯之大宗以繼其太祖而别子為大夫大夫亦不敢祖諸侯而自立家為别子之祖繼别者為宗亦謂之大宗所以别小宗而百世不遷者也小宗有四五世則遷者也故繼髙祖之宗得祀髙祖凡族兄弟皆宗之族兄弟同出於髙祖故髙祖與族兄弟之服皆三月至於繼祖繼曾祖繼禰所祀所宗莫不倣此故其所祀者皆謂之宗子以主家政而宗之者皆聽命焉蕙田案或謂惟大夫士有宗法天子諸侯不為宗非也書稱髙宗中宗詩曰宗子維城又曰大宗惟翰滕文公曰吾宗國魯先君則天子諸侯亦稱宗明矣蓋自為天地宗廟社稷之宗而非五宗之所得擬也詩大雅篤公劉君之宗之朱子集傳宗尊也主也嫡子孫主祭祀而族人尊之以為主也李氏樗曰周禮宗子有五大宗子一小宗子四别子為祖繼别為宗百世不遷者大宗也繼禰之宗繼祖之宗繼曽祖之宗繼髙祖之宗五世則遷者小宗也也皆所以主祭祀而統族人如有國有家之重者呂氏祖謙曰古者建國立宗其事相須詩君之宗之言公劉整率其民上則皆屬於君下則各統於宗其相維如此欽定義疏繼别之宗謂公子及異姓起家為大夫者周禮曰以族得民詩曰君之宗之則庶民之家亦有宗矣意一姓聚居者雖無仕宦朝廷皆為立宗以統攝之禮記大傳别子為祖繼别為宗繼禰者為小宗注别子謂公子若始來在此國者後世以為祖也繼别謂别子之世適也族人尊之謂之大宗是宗子也繼禰者父之適也兄弟尊之謂之小宗之疏此下廣陳五宗義也别子謂諸侯之庶子也諸侯適子適孫繼世為君而第二子以下悉不得禰先君故云别子並為其後世之始祖故云為祖也鄭註若始來在此國謂非君之親或是異姓始來亦謂之别子以其别於在本國不來者繼别謂别子之適子也繼别子為大宗也族人與之為絶族者五世外皆為之齊衰三月母妻亦然繼禰謂父之適子上繼於禰諸兄弟宗之謂之小宗以本親之服服之陳氏祥道曰人生而莫不有孝弟之心親睦之道先王因其有是道而為之節文故立為五宗以紏序族人而使之親疏有以相附赴告有以相通然後恩義不失而人倫歸厚此周官所謂宗以族得民也葢諸侯之適子孫則繼世為君而支子之為卿大夫者謂之别子有自他國而來於此者亦謂之别子有起自民庶而致位卿大夫者亦從别子之義此三者各立宗而為大宗所謂繼别者也若魯之仲孫叔孫季孫之類是也其適子弟之長子則謂小宗所謂繼禰者也陳氏澔曰别子有三一是諸侯適子之弟别於正室二是異姓公子來自他國别於本國不來者三是庶姓之起於是邦為卿大夫而别於不仕者皆稱别子也為祖者别與後世為始祖也繼别為宗者别子之後世世以適長子繼别子與族人為百世不遷之大宗也蕙田案别子有三公子之外其自他國而來及崛起為卿大夫者皆指命氏賜族者言之通典薛綜述鄭氏禮五宗圖天子之子稱王子王子封諸侯若魯衛是也諸侯之子稱公子公子還自仕食采於其國為卿大夫若魯公子季友者是也則子孫自立此公子之廟謂之别子為祖則嫡嫡相承作大宗百代不絶呂氏祖謙曰别子為祖如魯桓公生四子荘公既立為君則慶父叔牙季友為别子繼别為宗如公孫敖繼慶父是為大宗繼禰者為小宗如季武子立悼子悼子之兄曰公彌悼子既為大宗則繼公彌者為小宗所以謂之繼禰者蓋自繼其父為小宗不繼祖故也晉杜預宗譜别子者君之嫡妻之子長子之母弟也君命為祖其子則為大宗常有一主審昭穆之序辨親踈之别是故百代不遷若無子則支子為後雖七十無無主婦若殤則縗絰加一等以兄弟之列代之殤無為父道兄弟昭穆同故也死皆為之齊縗其月數各隨親疎為限雖尊雖出嫁猶不敢降也屬絶則為之齊縗三月若始封君相傳則自祖始封君其支子孫皆宗大宗然則繼體君為宗中之尊支庻莫敢宗之是以命别子為宗主一宗奉之故曰祖者髙祖也言屬逮於君則就君屬絶於君則適宗子家也而説者或云君代代得立大宗或云别子之母弟亦得為祖或云命妾子為别子其嫡妻子則遷宗於君皆非也别子之弟子孫無貴賤皆宜宗别子之子孫小宗一家之長也同族則宗之其服隨親疎為比姊妹出嫁不敢降之五屬斷服則不宗之矣朱子曰君嫡長為世子繼先君為正統自母弟以下皆不得為宗其次適為别子不得禰其父又不可宗嗣君又不可無統屬故死後立為大宗之祖所謂别子為祖也其適子繼之則為大宗直下相傳百世不遷别子者為諸侯之弟别於正適故稱别子也為祖者自與後世為世祖謂此别子子孫為卿大夫立此别子為始祖也繼别為宗謂别子之世世長子當繼别子與族人為不遷之宗也方氏慤曰諸侯之適子繼世而為君非别弟之所敢宗諸侯之於庶子不為之服而子亦不敢私相服故君命長弟以統之使夫不敢宗君者有所宗不敢相服者有以相服此宗道所以立也别子為祖者適子既為諸侯則别子乃大夫耳大夫不敢祖諸侯故自别為祖焉别子即庶子也然庶子有二例别而言之妻之子無長幼皆為適子妾之子無長㓜皆為庶子合而言之自繼世之子為適子其餘雖妻之子亦庶子而已蕙田案疏云諸侯第二子以下悉不得禰先君故云别子並為其後世之世祖杜氏宗譜别子君之嫡妻之子長子之母弟君命為祖其子為大宗别子之弟子孫皆宜宗别子之子孫二説不同據經文下云有大宗而無小宗有小宗而無大宗又云公子之公為其士大夫之庶者宗其士大夫之嫡者則杜氏之説較為明確蓋别子乃由君命為之置後故為先君大宗之祖羣公子皆宗之世世為大宗與凡公子之為祖者有間也詳見公子有宗道條下有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也注遷猶變易也小宗四與大宗凡五世疏此覆説大宗小宗之義百世不遷謂大宗也五則遷謂小宗也宗其繼别子之所自出者自由也别子或由此君而出或由他國而來適子適孫世世繼别子故鄭註云世適也五宗者一是繼禰與親兄弟為宗二是繼祖與同堂兄弟為宗三是繼曽祖與再從兄弟為宗四是繼髙祖與三從凡弟為宗是小宗四并繼别子之大宗凡五宗也陳氏禮書公子不禰先君故為别子而繼别者族人宗之為大宗庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而已小宗髙祖之正體其别有四四世則親盡族絶而不為宗矣然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼髙祖者則繼别者别子之子也繼别子之所自出者即别子也繼禰者庶子之子也繼髙祖者五世之孫也繼禰言其始繼髙祖言其終繼别言其宗繼别子之所自出言其祖經言繼别子之所自出而孔頴逹言别子之所由出然則别子所由出即國君也其可宗乎榖梁曰燕周之分子也分子即别子也陳氏埴曰宗法源頭有大宗以統之則人同知尊祖分𣲖處有小宗以統之則人各知敬禰且始封之君其適子襲封則庶子為大夫大夫不得以禰諸侯故自别為大夫之祖是謂别子為祖也别子之適子則為大宗使繼其祖之所自出從此直下適子世為大宗合族同宗之是謂繼别為宗也别子之庶子又不得以禰别子却待其子繼之而自别為禰繼禰遂為小宗凡小宗之適子服屬未盡常為小宗凡小宗之庶子又别為禰而其適子又各為小宗兄弟同宗之謂繼禰為小宗是也大宗是世祖正𣲖下雖其後支分𣲖别皆同宗此祖則合族皆服齊衰三月初不以親屬近逺論是為百世不遷之宗小宗是彌正𣲖下親盡則絶如繼禰者親兄弟宗之為之服期繼祖者則從兄弟宗之為之服大功繼曽祖者再從兄弟宗之為之服小功繼髙祖者三從兄弟宗之為之服緦自此以後代常䟎一代是為五世則遷之宗宗法之立嫡長之尊有君道焉大宗所以統其宗族小宗所以統其兄弟大宗止是一人小宗儘多故一人之身從下數至始祖大宗惟一數至髙祖小宗則四朱子文集百世不遷者以其統先君之子孫而非統别之子孫也别子之庶長義不禰别子而自為五世小宗之祖其適子繼之則為小宗小宗者繼别子庶子之所自出也故惟及五世五世之外則無服蓋以其統别之子孫而非統先君之子孫也不知是否伏乞垂誨曰宗子有公子之宗有大宗有小宗國家之衆子不繼世者若其間有適子則衆兄弟宗之為大宗若皆庶子則兄弟宗其長者為小宗此所謂公子之宗者也别子即是此宗子既沒之後其適長者各自繼此别子即是大宗直下相傳百世不遷别子之衆子既沒之後其適長子又宗之即為繼禰之小宗每一易世髙祖廟毁則同此廟者是為􅃝免之親不復相宗矣所謂五世而遷也答董叔重有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也注公子有此三事也公子謂先君之子今君昆弟疏此明諸侯之子身自公子上不得宗君下未為後世之宗不可無人主領之義君無適昆弟遣庶兄弟一人為宗領公子禮如小宗是有小宗而無大宗也君有適昆弟使之為宗以領公子更不得立庶昆弟為宗是有大宗而無小宗也公子唯一無他子可為宗是無宗亦無他公子來宗已是亦莫之宗也公子是也言此三事他人無唯公子有也朱子曰有有大宗而無小宗者有適則不立小宗也有有小宗而無大宗者無適則不立大宗也謂如人君有三子一嫡而二庶則庶宗其嫡是謂有大宗而無小宗皆庶則宗其庶長是謂有小宗而無大宗止有一人則無人宗之已亦無人宗焉是謂無宗亦莫之宗也下云公子之公為其士大夫之庶者宗其士大夫之嫡者此正解有大宗而無小宗一句之公之公猶君也公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也注公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也所宗者適則如大宗死為之齊衰九月其母則小君也為其妻齊衰三月無適而宗庶則如小宗死為之大功九月其母妻無服公宗子惟已而已則無所宗亦莫之陳氏澔曰此又申言公子之宗道公子之公謂公子之適兄弟為君者為其庶凡弟之為士大夫者立適公子之為士大夫者為宗使此庶者宗之故云宗其子也士大夫之適者此適是君之同母弟適夫人所生之晉曹述初曰禮諸侯不服庶子先君之所不服子亦不敢私相服也夫兄弟之恩既不可以無報親戚羣居又不可以無主故君必命長弟以為之宗宗立而相服相服之義由於其宗故曰公子有宗道也公子之公為其士大夫之庶宗者公子之公謂君之庶弟受命為宗者也其有功德王復命為諸侯尊羣庶所不敢宗故此君復命其次庶弟代已為宗主士大夫羣庶之在位者也蕙田案公子有宗道公子之公當以曹氏解為的呂氏祖謙曰假如國君有兄弟四人庶而一嫡嫡者君之同母弟公子既不敢宗君君則命同母弟為之宗使庶兄弟宗焉若皆庶而無適則須令庶長權攝祭事傳至子則自宗矣蕙田案東萊之説是也亦可見國君之子不得皆為别子矣華霞峯云士大夫之庶者宗其士大夫之嫡者如滕謂魯為宗國也呂氏大臨宗子議國君之嫡長為世子繼先君之正統自母弟而下皆不得宗次嫡為别子别子既不得禰先君則不可宗嗣君又不可無所統屬故為先君一族大宗之祖其生也適庶兄弟皆宗之别子之母弟雖適子與羣公子同不得謂之别子其死也子孫世世繼之為先君一族之大宗凡先君所出之子孫皆宗之雖百世不遷無後則族人以支子繼之此謂别子為祖繼别為宗羣公子雖宗别子而自為五世小宗之祖死則其子其孫為繼禰繼祖之小宗至五世以上則上遷其祖下易其宗無子孫則絶此謂繼禰者為小宗每一君有一大宗世世統其君之子孫故曰宗其繼别子之所自出者百世不遷者也别子所自出謂别子所出之先君如魯季友乃桓公之别子所自出即桓公大宗者乃桓公一族之大宗公子之公為其士大夫之庶者宗其士大夫之適者則别子為先君大宗之祖羣公子皆宗之是謂有大宗而無小宗若君無次適可立為别子止有庶公子數人則不可無宗以統當立庶長一人為小宗使諸弟皆宗之是謂有小宗而無大宗若庶長死國君復追立庶長為别子以為先君一族大宗之祖而以其子繼之此雖不經見然以義求之則一君之大宗不可以絶後也若君之正嫡外止有一公子既不可宗君又無昆弟宗已是謂無宗亦莫之宗然此公子亦為其先君一族大宗之祖沒則百世相繼先君之子孫皆宗之如大宗法國君主先君之祀上可及先君之太祖而下為先君子孫之宗故曰尊者尊統上别子為先君百世太宗之祖而不敢禰先君故曰卑者尊統下大宗者所以統先君之子孫非統别子之子孫故曰大宗尊之統也又曰繼别子之所自出蕙田案鄭註别子有三曰公子曰始來此國者曰庶人崛起為卿大夫者此二節則專申公子之宗道以公子有適庶之分有大宗小宗無宗之異所以著别子之義也注疏及呂氏之説得之䘮服小記别子為祖繼别為宗繼禰者為小宗有五世而遷之宗其繼髙祖者也注别子者諸侯之庶子别為後世為始祖也謂之别子者公子不得禰先君繼别者别子之世長子為其族人為宗所謂百世不遷之宗也繼禰者别子庶子之長子為其昆弟為宗也謂之小宗者以其將遷也五世而遷即小宗也小宗有四或繼髙祖或繼曽祖或繼禰皆至五世則遷其疏諸侯適子之弟别於正適不得禰先君故稱别子子孫為卿大夫立此别子為始祖故云别子為祖别子之世世長子恒繼别子與族人為百世不遷之大宗故云繼别為宗也禰謂别子之庶子所生長子繼此庶子與兄弟為小宗比大宗為小故云小宗也五世者為上從髙祖下至𤣥孫之子比𤣥孫之子則合遷徙不得與族人為宗故云有五世則遷之宗此五世則遷實是繼髙祖者之子記文畧爾若繼髙祖之身未滿五世猶為服也鄭註小宗有四以别子之後族人衆多或繼髙祖與三從兄弟為宗或繼曽祖與再從兄弟為宗或繼祖與同堂兄弟為宗或繼禰與親兄弟為宗一身凡事四宗事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼曽祖小宗也事三從兄弟之適是繼髙祖小宗也兼大宗為五繼髙祖者至子五世不復與四從兄弟為宗故云皆至五世則遷各隨近相宗然則小宗所繼非一獨云繼禰為小宗者雖四初皆繼禰為始據初為元故持云繼禰也是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也注宗者祖禰之正體父疏四世之時尚事髙祖至五世之時謂髙祖之不為加服是祖遷於上四世之時仍宗三從族人至五世不復宗四從族人各自隨近為宗是易於下宗是先祖正體所以尊祖故敬宗敬宗所以尊祖禰也吳氏鼎曰祖遷於上謂廟祭之祧遷宗易於下謂服屬所不及二者相因也蕙田案宗有五大宗一小宗四大宗一者大傳曰别子為祖繼别為宗諸侯之嫡長繼統正位母弟而下不得宗之然不可無所統屬故以次適為别子為羣公子之宗上以别於君下以别於諸公子故曰别子上不敢祖先君下自為後世之祖故曰别子為祖其别子之世適族人宗之繼繼繩繩百世不改故曰繼别為宗又曰百世不遷之宗是也小宗四者一繼禰之宗親兄弟宗之二繼祖之宗同堂兄弟宗之三繼曽祖之宗再從兄弟宗之四繼髙祖之宗三從兄弟宗之大傳曰繼禰者為小宗又曰宗其繼髙祖者五世則遷者也繼禰言其初繼髙祖言其終舉初終而四宗備自此而上則親盡服絶而宗遷矣别子亦有三一謂本國公子為士大夫而别於君二謂他國公子來仕而别於不來者三謂庶姓初起為士大夫而别於不仕者鄭氏大傳注云别子謂公子若始來在此國者王制注云雖非别子始爵者亦然是也其公子宗道亦有三有小宗而無大宗者如君無嫡兄弟遣庶兄弟一人為宗領公子禮如小宗也有大宗而無小宗者如君有嫡兄弟使之為宗以領公子禮如大宗更不立庶兄弟為宗也有無宗亦莫之宗者公子惟一無他公子可為宗亦無他公子來宗已也大傳所稱公子有此三事是也凡言宗皆以繼子言不以公子言然而公子亦有宗道如所稱有小宗而無大宗有大宗而無小宗一則君命同母弟為庶兄弟之宗一則君命庶長權攝宗事大傳曰公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也是也公子之公晉曹氏謂君之庶弟受命為宗其解為是注疏並指君言恐非孔疏别子以為第二子以下並為沒世之始祖張子云如别子五人五人各為大宗按以魯三桓例之此説亦是然與大傳公子宗道之義不合又滕推魯為宗國則兄弟相宗古禮應然魯三桓實始壊禮之家恐不當援以為例也五宗服制宗子祭禮詳見讀禮通考及大夫士廟祭門又案以上五宗正義儀禮䘮服傳諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别於尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别於卑者也注不得禰不得祖者不得立其廟而祭之也卿大夫以下祭其祖禰則世世祖是人不得祖公子者後世為君者祖此受封之君不得祀别子也公子若在髙祖以下則如其親服後世遷之乃毁其廟耳因國君以尊降其親故終説此義云楊氏復曰子夏傳云自卑别於尊是以子孫之卑自别於祖之尊此義為是自尊别於卑乃以子孫之尊自别於祖之卑此説於理有害而鄭註遂以為因國君以尊降其親而説此義則又愈非禮意葢國君以尊降其親謂降其旁親其正統之服不降祖服期曽祖髙祖齊衰三月是未嘗降其祖也鄭註葢惑於自尊别卑之説乃以封君之不祖公子為以尊降其親而不知公子為别子繼别為宗謂之大宗百世不遷大宗或無後則為之立後世世不絶而常以公子為祖矣若公子之子孫有封為國君則後世子孫只得祖封君而不得祖公子以紊其别子之宗非是以封君之尊别於公子之卑而不祖之也蕙田案傳云公子之子孫有封為國君者則世世祖是人不祖公子此以後世祖此封君者言之非謂封君之及身降其親而不祀也鄭云公子若在髙祖以下則如其親服甚得經意其云因國君以尊降其親正因上文尊同之義謂降其旁親耳楊氏悞㑹鄭意而以封君自降其祖訾之未是此不祖公子之義可以定唐宋始祖之議矣是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟故君之所為服子亦不敢不服也君之所不服子亦不敢服也疏始封之君不臣諸父昆弟者以其初升爲君諸父是祖之一體又是父之一體其昆弟既是父之一體又是己之一體故不臣此二者仍為之著服也云封君之子不臣諸父而臣昆弟者以其諸父尊故未得臣仍為之服昆弟卑故臣之不為之服封君之孫盡臣諸父昆弟者繼世至孫漸為貴重故盡臣之朱子曰始封之君所以不臣諸父昆弟者以始封君之父未嘗臣之故始封之君不敢臣也封君之子所以不臣諸父而臣昆弟者以封君之子所謂諸父者即始封君謂之昆弟而未嘗臣之者也故封君之子亦不敢臣之封君之子所謂昆弟者即始封君之子始封君嘗臣之者也故今為封君之子者亦臣之封君之孫所謂諸父昆弟者即封君之子所臣之昆弟及其子也故封君之孫亦臣之故下文繼之以君之所不服子亦不敢服也君之所為服子亦不敢不服也蕙田案朱子之説義最閎逺疏家以漸為貴重為言陋矣白虎通諸侯奪宗明尊者宜之大夫不得奪宗何曰諸侯世世傳子孫故奪宗大夫不傳子故不宗也䘮服經曰大夫為宗子不言諸侯為宗子也通典晉元帝建武初孫文上事宣帝支子不應祭章郡京兆二府君僕射刁協云諸侯奪宗聖庶奪嫡豈况天子乎自皇祚以來五十餘年宗廟已序而又攻乎異端宜加議罪案漢梅福云諸侯奪宗此謂父為士庶子封為諸侯則庶子奪宗嫡主祭祀也在諸侯尚有奪義豈况天子乎所言聖庶者謂如武王庶子有聖德奪代伯邑考之宗嫡也蕙田案此章廣别子之義言公子固為百世不遷之祖設後世有為君者則又當奪宗祖封君而不祖公子葢所謂化家為國也此義明則後世有天下者始建國則立親廟親盡廟遷則以開國之君為太祖如漢唐明之太祖自屬不易乃列代有紛紛之議無有以此經為質者甚矣經學之疎也白虎通通典二條足以相証而士大夫小宗有起而為卿大夫者奪宗之義可以類推矣春秋桓公二年左氏傳大夫有貳宗注適子為小宗次子為貳宗以相輔貳天音義為小宗本或作為大宗誤姓疏禮有大宗小宗子諸侯之庶子謂之别子及異受族為後世之始祖者世適承嗣百世不遷謂之大宗為父後者諸弟宗之五世則遷謂之小宗五世遷者謂髙祖以下䘮服未絶其繼髙祖之適則緦服之内共宗之其繼曽祖之適則小功之内共宗之繼祖繼禰所宗及亦然大夫身是適子為小宗故其次者為貳宗以相輔助為副貳亦立之為此官也杜知非大宗而云小宗者以其大夫不必皆是大宗據為小宗者多故杜言之也若大夫身為大宗亦止得立貳宗官耳禮記據公族為説故言别子為祖主説諸侯庶子耳其實異姓受族亦為始祖其繼者亦是大宗但記文不及之耳沈云適子為小宗謂是大夫之身為小宗次者為貳宗謂大夫庶弟貳宗與側室為例皆是官名與五宗别蕙田案大夫或是大宗或是小宗原不必限定貳宗為副貳以治宗事疏以為官名亦無據記云公子之公為其士大夫之庶者宗其士大夫之適者亦貳宗之意陳氏禮書儀禮曰都邑之士則知尊禰學士大夫則知尊祖荀卿曰大夫士有常宗左傳曰大夫有貳宗蓋由士以上莫不知尊祖禰知尊祖禰則尊者常宗當其為宗則宗子統族人於外主婦統族婦於内死雖殤也必䘮以成人齒雖七十也主婦不可闕居雖異邦也正祭不可舉妻死雖母在也禫不可屈尊與出嫁者不敢降其服賢者不敢干其任貴者不敢擅其祭衆車徒不敢以入其門凡以尊正統而一人之情也惟其疾與不肖然後易之故史朝言孟縶非人將不列於宗賀循言奸回􅁋亂則告廟而立其次凡此特義之權耳非其所得已者也方周之盛時宗族之法行故常棣行葦之羙作於上角弓頍弁之刺不聞於下以此治國而國有倫以此繫民而民不散則宗子之於天下豈小補哉右宗法儀禮䘮服傳大宗者收族者也注收族者謂别親疎序昭穆疏凡為大宗皆以收合族人使不乖睽者也士昏禮宗子無父母命之親皆沒已躬命之支子則稱其宗弟則稱其兄注支子庶昆弟也稱其宗子命使者弟宗子母弟祖廟未毁教於公宮三月若祖廟已毁則教於宗室注宗室大宗之家别疏若與君絶服者則於大宗之家教之大宗謂子之世適長子族人所宗事者也禮記昏義祖廟既毁教於宗室教成祭之注祭之祭其所出之祖也大傳同姓從宗合族屬注合合之宗子之家序昭穆也儀禮䘮服傳父子一體也夫妻一體也昆弟一體也故昆弟之義無分然而有分者則辟子之私也子不私其父則不成為子故有東宮有西宮有南宮有北宮異居而同財有餘則歸之宗不足則資之宗注宗者世父為小宗主宗事者也宗疏有餘不足皆統於仍以明一體之義蕙田案此雖以親世父言然以姪視世父即繼祖小宗也由此遞續之則世父之適子適孫世主宗事有餘不足皆統於宗可也是即收族之義也禮記内則適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門不敢以貴富加於父兄宗族注祗敬也宗大宗以寡約入謂入宗子之家猶若也非所獻謂非宗子之爵所當服也加猶髙也獻其賢者賢猶善也是疏此論族人敬事宗子之禮適子謂父及祖之嫡子小宗也庶子謂嫡子之弟宗子謂大宗子宗婦謂大宗子之婦也言小宗子及庶子等敬事大宗子及宗婦也歸謂歸遺也子弟若有功德被尊上歸遺衣服裘衾車馬則必獻其善者於宗子此文雖主事大宗子其大宗之外事小宗子者亦然通典奉宗禮賀循曰奉宗加於常禮平居即每事諮告凡告宗之例宗内祭祀嫁女娶妻死亡子生行求改易名字皆告若宗子時祭則宗内男女畢㑹䘮故亦如之若宗内吉凶之事宗子亦普率宗黨以赴役之若宗子時祭則告於同宗祭畢合族於宗子之家男子女子以班宗子為男主宗婦為女主故云宗子非七十無無主婦以當合族紏宗故也凡所告子生宗子皆書於宗籍大宗無後則支子以昭穆後之後宗立則宗道存而諸義有主也立主義存而有一人不惇者則㑹宗而議其罸族不可以無統故立宗宗既定則常尊歸之理其親親者也是故義定於本自然不移名存於政而不繼其人宗子之道也故為宗子者雖在凡才猶當佐之佑之奉以為主雖有髙明之屬盛德之親父兄之尊而不得干其任者所以全正統而奉一人之情也若姦回􅁋亂行出軌道有殄宗廢祀之罪者然後告諸宗廟而改立其次亦義之權也呂氏大臨宗法雜議宗子法久不行今雖士大夫亦無收族之法欲約小宗之法且許士大夫家行之其異宮同財有餘則歸不足則取及昏冠䘮祭必告皆今可行仍似古法詳立條制使之遵行以為睦宗之道亦無害於今法蘇氏軾勸親睦今欲教民和親則其道必始於宗族古者諸侯之子弟異姓之卿大夫始有家者不敢禰其父而自使其嫡子後之則為大宗族人宗之雖百世而宗子死則為之服齊衰九月故曰宗其繼别子之所自出者百世不遷者也别子之庶子又不得禰别子而自使其嫡子為後則為小宗古者立宗之道嫡子既為宗則其庶子之嫡子又各為其庶子之宗其法止於四而其寔無窮自秦漢以來天下無世卿大宗之法不可以復立而其可以收合天下之親者有小宗之法存而莫之行此甚可惜也今夫天下所以不重族者有族而無宗也有族而無宗則族不可合族不可合則雖欲親之而無由也族人而不相親則忘其祖矣今世之公卿大臣賢人君子之後所以不能世其家如古之乆逺者其族散而忘其祖也故莫若復小宗使族人相率而尊其宗子宗子死則為之加服犯之則以其服坐貧賤不敢輕而富貴不敢以加之冠婚必告䘮必赴此非有所難行也羅虞臣小宗辨夫重本始聨族屬叙親疎别嫡庶莫大乎宗法宗之為言尊也尊無二明無二嫡也宗以五世為限服盡也服者先王所用為宗子聨屬族人之具也服盡則親盡親盡則廟毁故曰祖遷於上宗易於下此之謂也然自漢儒論釋紛如卒不可解孔頴逵曰族人一身事四宗并大宗為五考諸禮經原無四宗之説假令四宗為之宗法視子孫互有異同族人以一身事之將誰適從此决知其不能也四宗之説起於班固固之言曰宗其髙祖後者為髙祖宗宗其爲曽祖後者為曽祖宗宗為祖後者為祖宗宗其為父後者為父宗此固臆説也夫大宗以世祖為宗小宗以髙祖為宗宗至四世族人雖各有曾祖及祖禰之親然視之髙祖彼皆支子不為宗得為宗者髙祖所傳之嫡而已是宗安有四乎或曰禮經所稱曰繼禰曰繼髙祖何謂也曰據其初言則為繼禰自其終言則為繼髙祖之傳嫡下及𤣥孫推而上及於禰然後為小宗者備矣夫小宗以五世為率五世之内雖父子祖孫相承然世止一嫡耳序之以昭穆别之以禮義而後族人尊之為宗故曰宗子有君道焉曰内則有云夫婦皆齊而宗敬終事而後敢私祭若子之説庶子無私祭乎曰此小宗事大宗之禮也小宗雖有嫡子然要諸大宗則庶也小宗雖奉四代之祭然要諸大宗則私也故祭先公而後私先大宗後小宗尊卑之義也非庶子私之謂也蕙田案宗子之義經傳諸儒之論詳矣然其法古今皆可通行蘇氏謂大宗不可復立而但立小宗亦非篤論夫大小一也未有大宗不立而可立小宗者也今世士大夫雖譜系不必盡備然亦必有可知者就其所知之中或係始遷或係始貴或係有道德而能文章不論世數逺近皆當奉以為不祧之祖而為大宗其當立廟者官為之主而俾其子孫趨役即不應立廟者亦令各建宗祠皆置公産以為祭祠䘮紀飲食課讀之費大宗掌其事又擇一族人之軰尊而老成者輔之以下則五世各為一小宗而祠堂公産亦如之小宗有故則大宗為之經紀大宗有故則各小宗合為之襄贊以尊祖敬宗之大義動其孝弟惇睦之天良則争嗣争産之弊庶幾可以少替而游手不肖之徒亦有所統束而不敢肆於風俗治化不無小補四海之廣固有一二家能行者亦有行之得其意而不盡合於法者有全未行者或為上者率先而倡導之示之以規條申之以勸誘需之以歲月知必有起而應之者此寔道德齊禮之一大端也右宗子收族五禮通考卷一百四十五
