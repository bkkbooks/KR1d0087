監各一人有丞録事太子太師太傅太保少師少傅少保開皇初置詹事二年罷門下坊左庻子二人内舍人四人録事二人主事令史四人統司經宫門内直典膳藥藏齊帥六局司經置洗馬校書正字等員後减内舍人二人改正字為正書典書坊右庻子二人舍人通事舍人各八人録事二人主事令史四人内坊典内及丞各二人内廐尉二人後改舍人為管記舍人减四員改通事舍人為宣令舍人家令率更令僕各一人是為三寺家令掌刑法食膳倉庫等事率更令掌伎樂漏刻僕掌宗族親疎車輿騎乗各置丞録事家令領食官典倉司藏三署僕寺領廐牧令煬帝改家令為司府令左右衛各置率一人副率二人有長史司馬録事諸曺參軍行参軍等員又各有直閤直寝直齊直後等員煬帝改左右衛為左右侍罷直閤直齋員左右宗衛制官如左右衛無直閤以下煬帝改左右宗衛為左右武侍左右虞候各置開府一人長史以下如左右衛而無録事參軍煬帝改開府為率并置副率左右内率副率各一人有長史司馬直長有千牛備身有左右備身等員煬帝改千牛備身為司仗左右備身為主射左右左右監門各率一人副率二人有長史司馬直長煬帝改監門率為宫門将直長為直事上柱國柱國上大將軍大將軍上開府儀同三司開府儀同三司上儀同三司儀同三司大都督帥都督都督總十一等國王郡王國公郡公縣公侯伯子男凡九等皇伯叔昆弟皇子為親王置師友各一人文學二人嗣王則無師友長史司馬諮議參軍事掾屬各一人又置主簿録事諸曺恭軍東西閤祭酒恭軍諸曺行恭軍典籖等員上柱國嗣王郡王以下僚佐曺掾以次逓减三師三公府佐與柱國同二諸王國官有令大農各一人尉二人典衛八人常侍人侍郎四人廟長學官長各一人食官廐牧長丞各一人典府長丞各一人舍人四人上柱國柱國公以下以次减省煬帝留王公侯三等餘並廢又改國令為家令舍大長公主長公主公主置家令丞各一人主簿謁者人各二人郡王减主簿雍州置牧屬官有别駕賛務州都郡正主簿録事諸曺從事等員并佐史合五百二十四人京兆郡置尹丞正功胄主簿以下并佐史合二百四十四人煬帝時京兆河南俱為尹設内史以貳之乂有賛務大興長安縣置令丞正功曺主簿以下并佐史合一百四十七人煬帝時洛陽河南亦為京縣州分上上上中上下中上中中中下下上下中下下凡九等上上州置刺史長史司馬録事參軍以下并佐史合三百三十三人餘州吏屬以次减省郡亦分九等上上郡置太守丞尉正功曺主簿以下及佐史合一百四十六人餘以次减省開皇三年罷郡以州統縣煬帝又罷州置郡郡分三等罷長史司馬置賛務一人貳之舊有兵䖏則刺史帶諸軍事以統之至是别置都尉副都尉以領兵又加置通守一人位次太守改郡賛務為丞位通守下縣亦分九等上上縣置令丞尉正功曺主簿以下及市領等員合九十九人餘以次减杜氏佑曰自魏晉已後刺史多帶将軍開府則州與府各置僚屬州官理民别駕治中以下是府官理戎長史司馬等官是至隋以州為郡無復軍府則州府之吏變為郡吏矣顧氏炎武曰秦置御史以監諸郡漢省丞相遣史分刺州不常置武帝元封五年初置十三州刺史魏晉以後為刺史持節都督魏志言自漢季以來刺史總統諸郡賦政于外非若曩時司察之任而已隋文帝開皇三年罷郡以州統縣杜氏通典曰以州治民職同郡守無復刺舉之任自是刺史之名存而職廢後雖有刺史皆太守之互名有時改郡為州則謂之刺史有時改州為郡則謂之太守其實一也非舊刺史之職領一郡而已漢之刺史猶今之廵按御史魏晉以下之刺史猶今之總督隋以後之刺史猶今之知府及直𨽻知州也古隋官制五禮通考卷二百十七
