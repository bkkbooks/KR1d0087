案此則或掌機宻或録尚書或綜機權或管朝政或單侍中或給事中或受顧命皆為宰相也然侍中職任機務之司不必他名亦多為宰相其有侍中兼外官若宋王𢎞侍中兼内官若沈演之其例不少則非宰相盖在當時委任而已右陳官制魏書官氏志太祖登國元年南北置大人對治二部是年置都統長又置幢将及外朝大人官皇始元年始建曺省備置百官通典後魏舊制有大将軍不置太尉有丞相不置司徒正光以後始俱置之然而尤重門下官多以侍中輔政則侍中為樞宻之任中書省後魏謂之西臺宣武帝謂中書監崔光曰卿是朕西臺大臣御史臺謂之南臺初有殿中樂部駕部南部北部五尚書其後亦有吏部初曰選部兵部都官度支七兵祠部民曺等尚書又有金部庫部虞曺儀曺右民宰官都牧牧曺右曺太倉太官祈曺神都儀同曺等尚書魏初分尚書三十六曺西魏改為十二部以太常光禄勲衛尉謂之三卿太僕廷尉大鴻臚宗正大司農少府謂之六卿蕙田案後魏末又剙立天柱大將軍及柱國大将軍大丞相諸名皆古所未有右魏官制隋書百官志後齊制官多循後魏置太師太傅太保是為三師次有大司馬大將軍是為二大次置太尉司徒司空是為三公三師二大三公府各置長史司馬諮議參軍從事中郎掾屬主簿録事功曺記室户曺金曺中兵外兵騎兵長流城局刑獄等參軍事東西閤祭酒及參軍事法墨田水鎧集士等曺行参軍兼左户右户行參軍長兼行参軍参軍督䕶等員司徒則加有左右長史三公下次有儀同三司加開府者亦置長史以下官屬而减記室倉城局田水鎧士等七曺各一人乾明中又置丞相河清中分為左右亦各置府僚尚書省令僕射吏部殿中祠部五兵都官度支六尚書又有録尚書一人位在令上録令僕射總理六尚書事謂之都省其屬左右丞各一人都令史八人六尚書分統列曺吏部統吏部考功主爵三曺殿中統殿中儀曺三公駕部四曺祠部統祠部主客虞曺屯田起部五曺祠部無尚書則右僕射攝五兵統左中兵右中兵左外兵右外兵都兵五曺都官統都官二千石比部水部膳部五曺度支統度支倉部左户右户金部庫部六曺凡二十八曺吏部三公郎中各二人餘並一人凡三十郎中門下省掌獻納諫正及司進御之職侍中給事黄門侍郎各六人録事四人通事令史主事令史八人統領左右尚食尚藥主衣齋帥殿中六局中書省管司王言及司進御之音樂監令各一人侍郎四人并司伶官西涼龜兹清商諸部又領舍人省中書舍人主書各十人祕書省典司經籍監丞各一人郎中四人校書郎十二人正字四人又領著作省郎二人佐郎八人校書郎二人集書省掌諷議左右從容獻納散騎常侍通直散騎常侍各六人諫議大夫七人散騎侍郎六人員外散騎常侍二十人通直散騎侍郎六人給事中六人員外散騎侍郎一百二十人奉朝請二百四十人又領起居省散騎常侍通直散騎常侍散騎侍郎通直散騎侍郎各一人校書郎二人中侍中省掌出入門閤中侍中二人中常侍中給事中各四人又有中尚藥中謁者中尚食諸局御史臺掌察糾弹劾中丞一人治書侍御史二人侍御史八人殿中侍御史檢校御史各十二人録事四人領符節署都水臺管諸津橋使者二人参事十人又領都尉合昌坊城三局謁者臺掌導相禮儀僕射二人謁者三十人録事一人太常光禄衛尉宗正太僕大理鴻臚司農太府是為九寺置卿少卿丞各一人各有功曺主簿録事太常掌陵廟羣祀禮樂儀制天文術數衣冠之屬其屬有博士協律郎八書博士統諸陵太廟太樂衣冠鼓吹太祝太史太醫廪犧太宰諸署光禄寺掌諸膳食帳幕噐物宫殿門户等事統守宫太官宫門供府肴蔵清漳華林等署衛尉寺掌禁衛甲兵統城門寺又領公車武庫衛士等署大宗正寺掌宗室屬籍太僕寺掌諸車輦馬牛畜産之屬統驊騮左右龍左右牝駝牛司羊乗黄車府等署大理寺掌決正刑獄有正監評律博士明法掾檻車督掾獄丞掾司直明法鴻臚寺掌蕃客朝㑹吉凶弔祭統典客典寺司儀等署司農寺掌倉市薪菜園池果實統平準太倉鉤盾典農導官梁州水次倉石濟水次倉藉田諸署太府寺掌金帛府庫营造器物統左中右三尚方左藏司染諸冶東西道署黄藏右藏細作左校甄官等署杜氏佑曰晉荀朂云九寺可併於尚書後魏亦有三府九寺則九卿稱寺久矣然通異名不連官號其官寺連稱自北齊始也蕙田案兩漢光禄勲主宫掖門户領三署郎為禁衛親近之職魏晉以後無三署郎而光禄不復居禁中後齊始令兼主膳食嗣後遂為典膳之職與漢之光禄名同而實異矣今之光禄卿在漢為太官令國子寺掌訓教胄子祭酒一人亦置功曺五官主簿録事領博士助教學生又領太學四門學亦有博士助教學生長秋寺掌諸宫閤卿中尹各一人並用宦者丞二十人亦有功曺五官主簿録事領中黄門掖廷晋陽宫中山宫園池中宫僕奚官等署將作寺掌諸營建大匠一人丞四人亦有功曺主簿録事若有營作則立将副将長史司馬昭元寺掌諸佛教大統一人統一人都維那三人亦置功曺主簿蕙田案昭元之名始於後魏而齊因之元時立宣政院統領僧衆其源盖濫觴於拓䟦之世領軍府将軍一人掌禁衛宫掖凡守衛官皆主之輿駕出入督攝仗衛中領軍亦同有長史司馬功曺五官主簿録事又領左右衛領左右等府左右衛府将軍各一人武衛将軍二人其屬有御仗直盪直衛直突諸都督直閤諸将軍又有武騎雲騎驍騎遊擊前後左右将軍左右中郎将歩兵越騎射聲屯騎長水校尉奉車都尉武賁中郎将羽林監冗從僕射騎都尉積弩積射强弩将軍武騎常侍殿中将軍員外将軍殿中司馬督員外司馬督備領左右府有領左右将軍領千牛備身又有左右身刀劍備身備身正副諸都督䕶軍府