body:
  text: 五禮通考卷二百十七刑部尚書秦蕙田撰嘉禮九十設官分職通典秦太尉左右丞相丞相相國侍中黄門侍郎散騎常侍少府吏在殿中主𤼵書謂之尚書四人尚書令僕射尚書丞御史大夫奉常郎中令衛尉宗正治粟内史主爵中尉廷尉典客典屬國少府將作少府中尉中書謁者令僕射詹事中庶子庶子太子家令率更令僕率内史郡守大中二大夫蕙田案通典述秦所設官如此以漢書考之如博士將行䕶軍都尉監御史郡尉闗都尉縣令長之類亦皆秦官也右秦官制漢書百官公卿表丞相掌丞天子助理萬機高帝置一丞相十一年更名相國孝惠高后置左右丞相文帝二年復置一丞相有两長史哀帝元夀二年更名大司徒武帝元狩五年初置司直掌佐丞相太尉掌武事漢初或置或省武帝省太尉置大司馬以冠將軍之號宣帝時大司馬不冠將軍亦無官屬成帝時大司馬禄比丞相置官屬去将軍哀帝初去大司馬官屬冠將軍如故後大司馬復置官屬去將軍位在司徒上有長史蕙田案漢制太尉與大司馬不並置高惠文景之世有軍事則置太尉事已則省史記將相年表於高帝五年文帝二年景帝七年武帝建元二年皆云罷太尉官於高帝十一年云周勃為太尉攻代後官省皆其證也自武帝以後不復置太尉官班史遂云武帝建元二年省不知漢初亦不常置也御史大夫掌副丞相有两丞一曰中丞成帝改御史大夫曰大司空禄比丞相置長史如中丞官職如故哀帝初復為御史大夫後復為大司空御史中丞更名御史長史侍御史太傅太師太保高后初置太傅後省哀帝復置位在三公上平帝置太師位太傅上太保次太傅前後左右將軍皆掌兵及四夷不常置或有前後或有左右有長史奉常掌宗廟禮儀有丞景帝更名太常太屬官有太樂太祝太宰太史太卜醫六令丞又均官都水兩長丞又諸廟寝園食官令長丞又雍太宰太祝令丞五畤各一尉又博士及諸陵縣皆屬焉博士掌通古今員多至數十人武帝置五經博士元帝分諸陵邑屬三輔郎中令掌宫殿掖門户有丞武帝更名光祿勲羽屬官有大夫郎謁者又期門林皆属焉至大夫掌論議有太中大夫中大夫諌大夫皆無員多數十人太初元年更名中大夫為光禄大夫郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人中郎有五官左右三将郎中有車户騎三将送謁者掌賔讃受事貟七十人有僕射元期門掌執兵從無員多至千人有僕射平帝元始年更名虎賁郎置中郎将侍羽林掌送從次期門有令丞僕射自中尚書博士郎皆有之衛尉掌宫門衛屯兵有丞景帝初更名中大夫令後復為衛尉属官有公車司馬衛士旅賁三令丞衛士三丞又諸屯衛侯司馬二十二官皆属焉長樂建章甘泉衛尉皆掌其宫不常置太僕掌輿馬有兩丞尉属官有大廐未央家馬三令各五丞一又車府路軨騎馬駿馬四令丞又龍馬閑駒槖泉騊駼承華五監長丞又邉郡六牧師菀令各三丞又牧槖昆蹏令丞皆屬焉武帝更名家馬為桐馬輿中太僕掌皇太后馬不常置廷尉掌刑辟景帝更名大理武帝復為廷尉哀帝復為大理有正左右監左右平典客掌諸歸義蠻夷有丞景帝更名大行令武帝更名大鴻臚屬官有行人譯官别火三令丞及郡邸長丞武帝更名行人為大行令宗正掌親屬有丞平帝更名宗伯主屬官有都司空令丞内官長丞又諸公家令門尉皆屬焉治粟内史掌穀貨有兩丞景帝更名大農令武帝更名大司農屬官有太倉均輸平凖都内籍田五令丞斡官鐵市兩長丞又郡國諸倉農監都水六十五官長丞皆屬焉搜粟都尉武帝軍官不常置少府掌山海池澤之税以給共養有六丞太屬官有尚書符節醫太官湯官導官樂府若盧考工室左弋居室甘泉居室左右司空東織西織東園匠十六官令丞又胞人都水均官三長丞又上林中十池監又中書謁者黄門鈎盾尚方御府永巷内者宦者八官令丞諸僕射署長中黄門皆屬焉武帝更名考工室為考工左弋為佽飛居室為保宫甘泉居室為昆䑓永巷為掖廷成帝更名中書謁者令為中謁者令初置尚書員五人有四丞省東織更名西織為織室哀帝省樂府馬氏端臨曰中書尚書之名始於漢通典言漢武帝遊宴後庭始令宦者典事尚書謂之中書謁者則中書尚書只是一所然攷霍光傳光薨霍山以奉車都尉領尚書事故事諸上書者皆為二封署其一曰副領尚書者先𤼵之所言不然屏去不奏魏相請去副封以防壅蔽而光夫人顯及禹山雲等言上書者益􅃛盡奏封事輙下中書令出取之不闗尚書則其時中書尚書似已分而為二盖尚書在漢時乃御前管文書之所故漢人上書言昧死上言尚書如丞相大將軍已下連名奏太后廢昌邑王亦是尚書令讀奏武帝雖令宦者典其事然其末年以霍光出入禁闥謹慎可屬大事輔少主則以光領之光薨而山繼領其事葢既以大臣之秉政者領之則其事始在外庭矣然則所謂上書者為二封意正本則徹中書二人主閲之副封則徹尚書而大將軍閲之自此始判而為二而有内外之分此顯禹所以有中書令出取之不闗尚書之説歟霍氏既敗張安世復以大司馬車騎將軍領尚書事史言安世職典樞機謹慎周宻每定大政已決輙移病出聞有詔令乃驚使史之丞相府問焉葢霍光領尚書之時丞相乃蔡義楊敞也張安世領尚書時丞相乃魏相丙吉也是時尚書雖在外庭以腹心重臣領之然於宰相並無干預此安世所以宻議大政及出詔令而佯為不知遣使問之丞相府則丞相府乃宣行尚書所議之政令耳而尚書非丞相之司存也漢丞相府有東曺西曺為處掾屬議政令之地于尚書並無干預至魏明帝常卒至尚書門陳矯為尚書令跪問欲何之帝曰欲案行文書然則魏時尚書猶去禁中不逺蕙田案尚書門下中書後世謂之三省為宰相之職在漢則皆少府之屬也中尉掌徼循京師有兩丞候司馬千人武帝更名執金吾屬官有中壘寺互武庫都船四令丞又式道左右中候候丞及左右京輔都尉尉丞兵卒皆屬焉太子太傅少傅屬官有太子門大夫庻子先馬舍人將作少府掌治宫室有兩丞左右中候景帝更名将作大匠屬官有石庫東園主章左右前後中校七令丞又主章長丞武帝更名東園主章為木工成帝省中候及左右前後中校五丞詹事掌皇后太子家有丞漢初皇后太子各置詹事成帝省皇后詹事併属大長秋屬官有太子率更家令丞僕中盾衛率厨廐長丞又中長秋私府永巷倉廐祠祀食官令長丞諸宦官皆屬焉蕙田案自中長秋以下皆皇后之官後皆屬大長秋中盾即中允也長信詹事掌皇太后宫景帝更名長信少府平帝更名長樂少府張晏曰以太后所居宫為名將行應劭曰皇后卿也景帝更名大長秋或用中人或用士人典屬國掌蠻夷降者武帝増屬國置都尉丞候千人屬官九譯令成帝省并大鴻臚水衡都尉掌上林苑武帝置有五丞濯屬官有上林均輸御羞禁圃輯鍾官技巧六廐辯銅九官令丞又衡官水司空都水農倉又甘泉上林都水七官長丞皆属焉成帝省技巧六廐官内史掌治京師景帝分置左内史右内史武帝更名京兆尹屬官有長安市厨兩令丞又都水鐵官兩長丞水左内史更名左馮翊屬官有廪犧令丞尉又左都鐵官雲壘長安四市四長丞皆屬焉主爵中尉掌列侯景帝更名都尉武帝更名右扶風治内史右地而列侯更属大鴻臚属官有掌畜令丞又有都水鐵官廐廱厨四長丞皆屬焉置右扶風與左馮翊京兆尹是為三輔皆有兩丞後更三輔都尉都尉丞各一人䕶軍都尉武帝時属大司馬成帝時居大司馬府比司直哀帝更名司冦平帝更名䕶軍司𨽻校尉武帝置持節察三輔三河宏農元帝初去節成帝省哀帝復置司𨽻属大司空比司直城門校尉掌京師城門屯兵有司馬十二城門候中壘校尉掌北軍壘門内外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎長水校尉掌長水宣曲胡騎胡騎校尉掌池陽胡騎射聲校尉掌待詔射聲士虎賁校尉掌輕車凡八校尉皆武帝置有丞司馬西域都䕶加官宣帝置以騎都尉諫大夫使䕶西域三十六國有副校尉丞司馬候戊巳校尉元帝置有丞司馬候奉車都尉掌御乗輿車駙馬都尉掌駙馬皆武帝初置侍中左右曺諸吏散騎中常侍皆加官所加自列候至郎中無員多至數十人侍中中常侍得入禁中諸曺受尚書事諸吏得舉法散騎騎並乗輿車給事中亦加官所加或大夫博士議郎掌顧問應對中黄門有給事黄門諸侯王髙帝置有太傅輔王内史治國民中尉掌武職丞相統衆官羣卿大夫都官如漢朝景帝令諸候王不得復治國天子為置吏改丞相曰相省御史大夫廷尉少府宗正博士官武帝改大僕曰僕成帝省内史更令相治民如郡太守中尉如郡都尉部刺史掌奉詔條察州武帝置員十三人成帝更名牧哀帝復為刺史後復為牧郡守掌治其郡景帝更名太守有丞邉郡又有長史郡尉掌佐守典武職甲卒景帝更名都尉有丞又有闗都尉農都尉屬國都尉縣令長掌治其縣萬户以上為令減萬户為長皆有丞尉又十里一亭亭有長十亭一郷郷有三老有秩嗇夫游徼三老掌教化嗇夫職聽訟收賦税㳺徼徼循禁賊盗列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道吏員自佐史至丞相十三萬二百八十五人通典漢以丞相大司馬御史大夫為三公成帝改御史大夫為司空與大司馬丞相為三公皆宰相也哀帝改丞相為大司徒亦為宰相以太常光禄勲衛尉大僕廷尉太鴻臚宗正大司農少府謂之九寺大卿蕙田案通典載漢九卿之名本於後漢百官志其外有執金吾京兆尹左馮翊右扶風位與九卿相埒故公卿表列之史載汲黯朱買臣為主爵都尉列于九卿鄭當時至九卿為右内史寗成為中尉徙内史抵罪髠鉗是時九卿少被刑而成刑極自以為不復收石建傳稱左内史減宣為九卿張敞為京兆尹上書臣前幸得備位列卿王尊為京兆尹御史大夫奏尊不宜備位九卿毋將隆為執金吾詔稱隆位九卿主爵都尉後為右扶風内史後為京兆尹左内史後為左馮翊中尉後為執金吾此四官在漢亦為九卿其名曰九卿其實則十三卿也又有前後左右將軍謂之上卿位在九卿之右又案九寺之名不見于漢史而以寺為官舍之稱實自漢始漢書元帝紀城郭官寺師古注云凡府廷所在皆謂之寺唐書楊收傳漢制總羣官而聽曰省分務而專治曰寺是也後漢書百官志太傅上公一人掌以善導無常職世祖以卓茂為太傅薨因省其後每帝初即位輙置太傅録尚書事薨輙省太尉公一人掌四方兵事凡國有大造大疑則與司徒司空通而論之國有過事則與二公通諌争之世祖即位為大司馬建武二十七年改太尉辭長史一人掾史屬二十四人有西曹東曹戸曹奏曹曹法曹尉曹賊曹決曹兵曹金曹倉曹黄閣主簿令史及御屬二十三人有閤下令史記室令史門令史司徒公一人掌人民事世祖即位為大司徒建武二十七年去大長史一人掾屬三十一人令史及御屬三十六人司空公一人掌水土事世祖即位為大司空建武二十七年去大長史一人掾屬二十九人令史及御屬四十二人將軍不常置掌征伐背叛比公者四第一大將軍次驃騎將軍次車騎將軍次衛將軍又有前後左右將軍史長史司馬皆一人從事中郎二人掾屬二十九人令及御屬三十一人其領軍皆有部曲大將軍營五部部有校尉軍司馬部下有曲曲有軍候曲下有屯屯有長部校尉或不置但軍司馬一人又有軍假司馬假候皆為副貳其别營領屬為别部司馬其餘將軍置以征伐無員職亦有部曲司馬軍候以領兵明帝初置度遼將軍以衛南單