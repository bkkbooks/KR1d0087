body:
  text: 五禮通考卷六十四刑部尚書秦蕙田撰吉禮六十四宗廟制度易損卦二簋可用享彖傳二簋應有時注二簋質薄之器也禮記明堂位有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋注皆黍稷器制之異同未聞故疏簋是黍稷之器敦與瑚璉共簠簋連文鄭云皆黍稷器鄭注周禮舍人云方曰簠圓曰簋此注云未聞者瑚璉之器與簋異同未聞爾鄭注論語云夏曰瑚殷曰璉誤也陳氏禮書敦者養人之厚也璉者養人而不絶者也瑚以玉為之玉者美而有充實之意養人以為充實者瑚之用也簋以竹為之竹者和而有節意養人所以能節者簋之用也食所以養隂自其數而觀之則以兩以四以六以八豈非隂數而愈備於前歟方氏慤曰兩敦若内則所謂敦周官所謂玉敦是矣四璉六瑚即孔子謂子貢為女器者是矣釋者以為宗廟之器焉八簋即伐木所謂八簋是矣皆黍稷之器也故毎用隂數之偶則與籩豆同義曰敦曰璉曰瑚曰簋則所命之名不同也或兩或四或六或八則漸增其數也陸氏佃曰敦亦簋也盖設以對故謂之敦兩謂之對則四謂之璉可知瑚言盖葢之而不可知也簋言底軌所同也同而後受之字或作匭以此兩敦黍稷四璉黍稷稻粱六瑚黍稷稻粱麥苽苽一名彫胡盖以其器名之八簋黍稷稻粱白黍黄粱稰穛論語瑚璉也注包曰瑚璉黍稷之器夏曰瑚殷曰璉周曰簠簋宗廟之器貴者䟽案明堂位説四代之器云有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋注云皆黍稷器制之異同未聞鄭注周禮舍人云方曰簠圓曰簋如記文則夏器名璉殷器名瑚而包咸鄭𤣥等注此論語賈服杜等注左傳皆云夏曰瑚或别有所據或相從而誤也朱註夏曰瑚商曰璉周曰簠簋皆宗廟盛黍稷之器而飾以玉器之貴重而華美者也周禮地官舍人凡祭祀共簠簋實之陳之注方曰簠圓曰簋盛黍稷稻粱器簋䟽祭祀言凡則天地宗廟大祭小祭皆有黍稷于簠實之陳之云方曰簠圓曰簋皆據外而言案孝經云陳其簠簋注云内圓外方受斗二升者直據簠而言若簋則内方外圓知皆受斗二升者旊人云為簋實一觳豆實三而成觳豆四升三豆則斗二升可知但外神用瓦簋宗廟當用木故易損卦云二簋可用享損卦以離巽為之離為日日圓巽為木木器圓簋象是用木明矣云盛黍稷稻粱器案公食大夫簠盛稻粱簋盛黍稷故鄭總云黍稷稻粱器也禮記玉藻朔月少牢五爼四簋注朔月四簋則日食粱稻各一簋而已䟽云朔月四簋則日食粱稻各一簋而已者以朔月四簋故知日食二簋以稻粱美物故知各一簋詩云每食四簋注云四簋黍稷稻粱是簋盛稻粱也且此文諸本皆作簋字皇氏以注云稻粱以簠宜盛稻粱故以四簋為四簠未知然否以此而推天子朔月大牢當六簋黍稷稻粱麥苽各一簋若盛舉則八簋故小雅陳饋八簋當加以稻粱也案公食大夫禮簠盛稻粱此用簋者以其常食異于禮食又禮食其數更多故公食下大夫黍稷六簋上大夫八簋其稻粱上下大夫俱兩簋又聘禮饔餼上大夫堂上八簋東西夾各六簋是數多也其諸侯案掌客上公簋十侯伯八子男六簋則俱同十二其祭禮則天子八簋故祭統云八簋之實注云天子之祭八簋然則諸侯六簋祭統諸侯禮云四簋黍稷者見其徧于廟中不云六簋二簋留之厭故也大夫祭則當四敦少牢禮是也士則二敦特牲禮是也其諸侯與大夫食亦四簋故秦詩云每食四簋周禮考工記旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺注崇髙也豆實四升觳受斗二升祭䟽祭宗廟皆用木簋今此用瓦簋據天地及外神尚質器用陶匏之類也注云豆實四升者晏子辭案易損卦彖云二簋可用享四以簋進黍稷于神也初與二直其四與五承上故用二簋四巽爻也巽為木五離爻也離為日日體圓木器而圓簋象也是以知以木為之宗廟用之若祭天地外神等則用瓦簋故郊特牲云掃地而祭于其質也器用陶匏以象天地之性是其義也若然簋法圓舍人注云方曰簠圓曰簋注與此合孝經云陳其簠簋注云内圓外方者彼兼簠而言之禮記祭統是故以四簋黍見其脩於廟中也疏以四簋黍謂餕之時君與二卿以四簋之黍諸侯之祭有六簋今云以四簋者以二簋留為隂厭之祭故以四簋而餕簋有黍稷特云黍見其美舉黍稷可知也八簋之實注天子之祭八簋簋疏云天子之祭八簋者明堂位云周之八又特牲士兩敦少牢四敦則諸侯六故天子八周禮天官九嬪凡祭祀贊玉齍注玉齍玉敦受黍稷器后進之而不徹疏云玉齍玉敦受黍稷器者案明堂位云有虞氏之兩敦周之八簋則周用簋特牲少牢大夫士用敦今周天子用玉敦者明堂位賜魯得兼用四代之器用敦明天于亦兼用可知云玉敦者謂以玉飾敦謂若玉府云珠盤玉敦但彼以珠盤盛牛耳玉敦承血此玉敦盛黍稷為異耳云后進之而不徹知者豆籩云贊薦徹玉齍直贊不云薦徹明直贊進之而已案禮器云管仲鏤簋注云天子飾以玉此直云玉敦則簋亦飾以玉而不云者但玉敦后親執而設之故特言之其簋則九嬪執而授后后設之若少牢主婦親受韭􅉁醯醢其餘婦贊者授主婦主婦設之故不言也儀禮士昏禮黍稷四敦皆葢贊啟會却扵敦南對敦於北少牢饋食禮主婦自東房執一金敦黍有葢注飾盖象龜周之禮設器各以其類龜有上下甲婦贊者執敦稷以授主婦受贊者敦黍坐設於稷南又興受贊者敦稷坐設扵黍南敦皆南首注敦有首者尊者器飾也注䟽天子則簋敦兼有九嬪職云凡祭祀贊玉齍云玉齍玉敦受黍稷器是天子八簋之外兼用敦也周制士用之士䘮禮朔月奠無籩有黍稷用瓦敦有盖當籩位徹朔奠敦啟㑹面足注啟會徹時不復盖也面足執之令足間向前也敦有足則敦之形如今酒敦至䟽以前設時即不盖今經云敦啓㑹嫌先盖徹重啓之故云不復盖也士虞禮贊設二敦扵爼南黍其東稷特牲饋食禮盛兩敦陳扵西堂注盛黍稷者宗婦也主婦設兩敦黍稷扵爼南西上疏案少牢主婦設金敦宗婦贊三敦以其多故使宗婦贊此士祭禮二敦少故不使宗婦贊主婦可親之也楊氏復儀禮旁通圖敦簠簋明堂位有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋注云皆黍稷器也有虞氏之敦周用之扵士大夫故儀禮大夫士之祭有敦無簠簋特牲佐食分簋鉶先儒以為同姓之士得從周制是也士昏禮黍稷四敦皆盖婦至贊啓㑹卻扵敦南對敦扵北少牢禮主婦自東房執四金敦黍稷皆南首士䘮禮廢敦重鬲皆濯朔月奠無籩有黍稷用瓦敦有盖當籩位徹朔奠敦啓㑹面足既夕用器兩朾士虞贊設兩敦扵爼南特牲主婦設兩敦黍稷扵爼南此皆士大夫之禮也聘禮陳饔餼及公食大夫皆主國君待聘賔之禮則用簠簋有司入陳堂上八簋兩簠西夾六簋兩簠東方之饌亦如之公食大夫上大夫八簋下大夫六簋東方之饌亦如之公食大夫上大夫八簋下大夫六簋此則待聘之禮也以周官攷之掌客凡諸侯之禮簠十鼎簋十有二侯伯簠八鼎簋十有二子男簠六鼎簋十有二然詩言天子之禮陳饋八簋玉藻言諸侯朔月四簋天子諸侯所食之簋反儉扵聘賔之簋二十掌客之簋十二何耶或曰聘禮上大夫之簋二十掌客之簋十二聘賔之簋也天子八簋諸侯朔食四簋所食之簋也陳氏禮書考工記旊人為簋實一觳崇尺豆實三而成觳觳容斗二升也崇尺中繩爾雅木豆謂之豆竹豆謂之籩瓦豆謂之登説文古簋作朹盖簋豆有以瓦為之有以木為之先儒謂宗廟之簋豆用木天地之簋豆用瓦然詩述祀天之禮言于豆登則祀天有木豆矣儀禮少牢饋食有瓦豆則宗廟有瓦豆矣敦則簋之類簋則簠相須者也士䘮禮有瓦敦而簠之有瓦與否不可攷也儀禮曰盖執豆又曰簠有盖冪又曰設四敦皆南首則簠簋敦豆登皆有盖而敦之盖有首先儒以為簠簋敦之盖皆象龜形義或然也管仲鏤簋禮以為僭則大夫士之簋刻龜扵盖而已非若人君全鏤之也簠内圓外方其實稻粱簋外圓内方其實黍稷周官掌客五等諸侯簠數有差而簋皆十二有簠或不預是簠尊而簋卑也籩有縢縁其實乾實豆若脰然其實葅醢登則人執而登之其實大羮之湆旊人簋豆皆崇尺則簠敦籩之崇可知簋實一觳則敦簋之量可知士䘮禮敦有足則簠簋有足可知士䘮禮敦㑹面足無足曰廢敦士虞特牲敦有籍虞敦籍以葦席祭敦籍以萑則簠簋籩豆之有籍可知士䘮特牲籩有巾士䘮兩籩布巾特牲籩巾以絺纁裏公食大夫簋有盖冪則簋登豆之有巾可知有虞氏曰敦夏曰璉商曰瑚周曰簋夏曰楬豆商曰玉豆周曰獻豆而虞氏之敦在周用之扵士大夫故儀禮大夫之祭有敦無簋特牲佐食分簋鉶而先儒以為同姓之士得從周制是也夏后之楬豆在周用之扵䘮禮故儀禮士䘮毼豆兩實葵爼是也毼白也周曰獻豆非不以玉飾也士虞禮獻豆兩亞之則獻豆猶所謂獻尊也周禮玉府有玉敦九嬪有玉齍先儒以玉齍為玉敦豈以其盛黍稷而因名之乎祭統夫人薦豆執挍執醴授之執鐙鄭氏謂挍豆中直者鐙豆下跗然則考工記所謂中縣者挍也天子玉敦大夫金敦少牢夫人載金敦則士敦無飾可知魯用雕篹篹籩屬也士䘮禮籩無縢則士大夫吉祭之籩有縢無雕可知舊圖簠簋登籩豆皆崇尺二寸而簠簋敦豆皆漆赤中考之扵書若作梓材既勤樸斵惟其塗丹艧周語亦曰器無雕鏤儉也先王之器多飾以赤而玉人勺亦赤中則漆而朱中理或然也然崇尺二寸之説與旊人之制不同是臆論也周官掌客公簠十侯伯簠八子男簠六而簋皆十二公食上大夫之簋八下大夫之簋六聘禮饔餼上大夫之簋二十詩云天子之禮陳饋八簋玉藻言諸侯朔月四簋詩言每食四簋多於天子公食上大夫之簋與天子禮同何也盖聘禮上大夫之簋二十掌客諸侯之簋十二公食上大夫之簋八有所存者焉天子八簋則其所食者也公食下大夫六簋則公日食四簋可知日食四簋而朔月亦食四簋此異代之禮也觀周官王之日食用六牲則諸侯日食非止特牲也王鼎十有二物皆有爼則諸侯日與朔食非止三爼與五爼也而玉藻所記一切與周禮不類則異代之禮可知也蕙田案簋明堂位周之八簋詩伐木篇陳饋八簋山堂考索云圓曰簋盛黍稷之器有盖象龜形外圓函方以中規矩天子飾以玉諸侯飾以象又考工記旊人為簋受一斗二升髙一尺厚半寸脣寸口徑五寸二分厚八分足底徑六寸賈釋舍人注云方曰簠圓曰簋皆據外而言也簠周禮掌客上公簠十侯伯簠八子男簠六山堂云外方内圓曰簠盛稻粱之器口徑六寸深七寸二分底徑亦五寸二分厚八分足底徑六寸厚半寸脣寸所盛之數及盖之形制一與簋同案考工記旊人為簋及豆皆以瓦為之並不及簠豈簠以木為無瓦而為之故歟疏云據天地之神尚質器用陶匏而已若祭宗廟則皆以木為之敦明堂位有虞氏之兩敦鄭注黍稷器以玉飾之曰玉敦周禮玉府合諸侯共玉敦又名玉齍九嬪凡祭祀贊玉齍鄭注云玉齍玉敦也山堂曰敦受一斗三升漆赤中大夫飾口以白金其制與簋簠容受並同但上下内外皆圓為異耳璉明堂位曰夏后氏之四璉注黍稷器瑚明堂位曰殷之六瑚論語瑚璉也朱注皆宗廟盛黍稷之器而飾以玉蕙田案以上敦簠簋詩商頌𤣥鳥大糦是承箋糦黍稷也周禮天官甸師掌帥其屬而耕耨王籍以時入之以共粢盛注齍盛祭祀所用榖也粢稷也榖者稷為長是以名云在器曰盛䟽以共齍盛者六榖曰粢在器曰盛以共祭祀故云以共粢盛云粢稷也者爾雅文云榖者稷為長是以名云者此釋經及爾雅特以粢為號知稷為五榖長者案月令中央土云食稷與牛五行土為尊故知稷為五榖長及爾雅以稷為粢通而言之六榖皆是粢故小宗伯云辨六粢之名物是也春官小宗伯辨六齍之名物與其用注齍讀為粢六粢謂六榖黍稷稻粱麥苽物䟽六榖云名物者謂六榖各有名其色異故云名也云與其用者六榖所用不同故須辨之詩小雅天保吉蠲為饎是用孝享禴祠蒸嘗于公先王傳吉善蠲潔也饎酒食也禮記曲禮黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬注萁辭也嘉善也稻菰蔬之屬也又䟽黍曰薌合者夫榖秣者曰黍秣既軟而相合氣息香故曰薌合也粱曰薌萁者粱謂白粱黄粱也萁語助也稷曰明粢者稷粟也明白也言此祭祀明白粢也鄭注甸師云粢稷也爾雅云粢稷也注今江東人呼粟為粢一蕙田案以上粢盛右簠簋粢盛易鼎卦鼎元亨疏鼎者器之名也自火化之後鑄金而為此器以供亨飪之用謂之為鼎彖上傳鼎象也以木巽火亨飪也注亨飪鼎之用也有疏鼎象也者明鼎亨飪成新之法象也以木巽火亨飪也者此明上下二象有亨飪之用九二鼎有實六五鼎黄耳金鉉疏黄中也金剛也鉉所以貫鼎而舉之也五為中位故曰黄耳應在九二以柔納剛故曰金鉉上九鼎玉鉉説卦傳革物者莫若鼎故受之以鼎注鼎所以和齊生物成新之器也雜卦傳鼎取新也詩周頌絲衣鼐鼎及鼒傳大鼎謂之鼐小鼎謂之鼒器箋鼎圜弇上謂之鼒疏釋云鼎絶大者謂之鼐鼐既絶大鼒自然小故曰小鼎謂之鼒鼎圜弇上謂之鼐釋器文孫炎曰鼎歛上而小口者以傳直言小鼎不説其形故取爾雅文以足之何氏楷曰鼐爾雅釋文皆云鼎之絶大者鼎説文云三足兩耳和五味之彛器也爾雅云圜弇上謂之鼒孫炎云鼎斂上而小口者陳祥道云士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈弇之别而其用有牛羊豕魚之異天子諸侯有牛鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐鼎特王有之也周禮考工記輈人六分其金而錫居一謂之鍾鼎之齊禮記明堂位崇鼎貫鼎注崇貫皆國名文王伐崇古者伐國遷其重器以分同姓祭統夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也惟賢者能之銘者論譔其先祖之有徳善功烈勲勞慶賞聲名列于天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也夫銘者壹稱而上下皆得焉耳矣是故君子之觀扵銘也既美其所稱又美其所為為之者明足以見之仁足以與之智足以利之可謂賢矣賢而勿伐可謂恭矣故衛孔悝之鼎銘曰六月丁亥公假扵太廟公曰叔舅乃祖莊叔左右成公成公乃命荘叔隨難扵漢陽即宫扵宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施扵烝彛鼎此衛孔悝之鼎銘也古之君子論譔其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也爾雅釋器鼎絶大謂之鼐注最大者圜弇上謂之鼒注鼎斂上而小口博古圖曰歴代之鼎形制不一有腹著饕餮而間以雷紋者父乙鼎父癸鼎之類是也有練色如金著飾簡美者辛鼎癸鼎之類是也有縁飾族花竒古可愛者象形鼎横戈父癸鼎之𩔖是也有宻布花雲或作雲雷迅疾之状者晉姜鼎雲雷鼎之類是也有隠起饕餮間以雲龍或作細乳者亞虎父丁鼎文王鼎王伯鼎之類是也或如孟鼎之侈口中鼎之無文伯碩史頙鼎之至大金銀錯鼒之絶小或自方如簠或分底如鬲或設盖如敦曰崇曰貫則名其國也曰䜛曰刑則著其事也曰牢曰陪則設之異也曰神曰寳則重之極也春秋昭公五年左氏傳飱有陪鼎注熟食為飱陪加也周禮天官膳夫王日一舉鼎十有二物皆有爼注鼎十有二牢鼎九陪鼎三物謂牢鼎之實亦九爼鼎疏案禮記郊特牲鼎爼竒而籩豆偶者謂正鼎九陪三即是竒數總而言之即十二云物皆有爼者爼據正鼎而鼎各一爼案聘禮致饔餼注云飪一牢鼎十有二是也牢鼎九在西階前云牛羊豕魚腊腸胃同鼎膚鮮魚鮮腊云陪鼎三者當内兼膷臐膮並陪牛羊豕鼎後是也云物即牢鼎之實者言實即牛羊豕之類也云亦九爼者陪鼎三膷臐膮者謂庶羞在于豆惟牢鼎之物各在爼故云亦九爼亨人掌共鼎鑊祭祀共大羮鉶羮注鑊所以煮肉及魚腊之器既熟乃脀于鼎大羮肉湆鄭司農云大羮不致五味也鉶羮加鹽菜矣疏案少牢爨在廟門外之東大夫五鼎羊豕腸胃魚腊各異鑊鑊别有一鼎鑊中肉孰各升一鼎故鄭云既孰乃脀于鼎大羮肉湆盛于登鑊中煮肉汁一名湆故鄭云大羮肉湆云鉶羮者皆是陪鼎膷臐膮牛用霍羊用苦豕用薇調以五味盛之于鉶器即謂之鉶羮若盛之于豆即謂之庶羞即公食大夫十六豆膷臐膮等也禮記禮運備其鼎爼疏備其鼎爼者以牲煮于鑊鑊在廟門之外鼎隨鑊設各陳于鑊西取牲體以實其鼎舉鼎而入設于阼階下南北陳之爼設于鼎西以次載于爼也案少牢陳鼎于廟門外東方北面北上又云鼎入陳于東方堂序西面北上爼皆設于鼎西是也方氏慤曰鼎有牛羊之異用爼有梡嶡之異名然不一也故曰備郊特牲鼎爼奇而籩豆偶隂陽之義也疏鼎爼以盛牲體牲體動物屬陽故其數奇案聘禮牛一羊二豕三魚四腊五腸胃六膚七鮮魚八鮮腊九是鼎九其數奇也又有陪鼎膷一也臐二也膮三也亦其數奇也正鼎九鼎别一爼爼亦九也又少牢陳五鼎羊一豕二膚三魚四腊五其腸胃從羊五鼎五爼又特牲三鼎牲鼎一魚鼎二腊鼎三亦有三爼是鼎爼奇也儀禮士虞禮陳三鼎扵門外之右北面北上設扃鼏士虞禮記羮飪升左肩臂臑肫骼脊脅離肺膚祭三取諸左膉上肺祭一實于上鼎疏肉謂之羮飪熟也脊脅正脊正脅也喪祭略七體耳離肺舉肺也少牢饋食禮曰舉肺一長終肺祭肺三皆刌膉脰肉也升魚鱄鮒九實扵中鼎注差减之祭疏案少牢魚十有五今為喪略而用九故云差减之也升腊左胖髀不升實扵下鼎注腊亦七體牲之類特牲饋食禮陳鼎於門外北面北上有鼏注門外北面當門也疏以其經直言門外不言門之東西故知當門舉鼎鼏告絜羮飪實鼎陳扵門外如初主人在右及佐食舉牲鼎賔長在右及執事舉魚腊鼎除鼏注及與也主人在右統于東主人與佐食者賔尊不載少牢饋食禮魚用鮒腊用麋士腊用兔鼎西面錯右人抽扃委扵鼎北注右人謂主人及二賔既錯皆西面俟也少牢饋食禮雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西注魚腊從羊膚從豕統于牲陳鼎扵廟門之外東方北面北上注北面北上鄉内相隨主人出迎鼎除鼏士盥舉鼎有司徹司馬舉羊鼎司士舉豕鼎舉魚鼎以入陳鼎如初注如初如阼階下西面北上楊氏復儀禮旁通鼎數圖一鼎特豚無配特豚士冠醮子特豚載合升煮扵鑊曰亨在鼎曰升在爼曰載載合升者明亨與戴皆合左右胖士昏婦盥饋舅姑特豚合升側載右胖載之舅爼左胖載之姑爼小斂之奠特豚四鬄去蹄兩胉脊肺朝禰之奠既夕朝廟有二廟則饌于禰廟有小斂奠尸啓三鼎特豚而以魚腊配之豚魚腊特牲有上中下三鼎牲上鼎魚中鼎腊下鼎昏禮共牢陳三鼎扵寝門外大斂之奠豚合升魚鱄鮒九腊左胖朔月奠朔月用特豚魚腊陳三鼎如初遷祖奠陳鼎如殯五鼎羊豕曰少牢凡五鼎皆用羊豕而以魚腊配之羊豕魚腊膚少牢雍人陳鼎五魚鼎從羊三鼎在羊鑊之西膚從豕二鼎在豕鑊之西倫膚九魚用鮒十有五腊一純聘禮致飱衆介皆少牢五鼎玉藻諸侯朔月少牢少牢五鼎大夫之常事又有殺禮而用三鼎者如有司徹乃升羊豕魚三鼎腊為庶羞膚從豕去腊膚二鼎陳扵門外如初以其繹祭殺於正祭故用少牢而鼎三也又士禮特牲三鼎有以盛葬奠加一等用少牢者如既夕遣奠陳鼎五于門外是也七鼎牛羊豕魚腊腸胃膚公食大夫甸人陳鼎七此下大夫之禮九鼎牛羊豕魚腊腸胃膚鮮魚鮮腊公食大夫上大夫九爼九爼即九鼎也魚腊皆二爼明加鮮魚鮮腊牛羊豕曰大牢凡七鼎九鼎者大牢而以魚腊腸胃膚配之者為七又加鮮魚鮮腊者為九十鼎正鼎七牛羊豕魚腊腸胃膚陪鼎三膷臐膮也陪鼎又曰羞鼎所謂陪鼎羞鼎皆鉶鼎鉶鼎所以實羮者也亨人祭祀賔客共鉶鼎鉶羮所以具五味也其菜則藿牛苦羊薇豕其具則膷牛臐羊膮豕自羮言之曰鉶羮自鼎言之曰鉶鼎以其陪正鼎曰陪鼎以其為庶羞曰羞鼎其實一也聘禮設飱上介飪一牢鼎七羞鼎三羞鼎則陪鼎也十二鼎正鼎九牛羊豕魚腊腸胃膚鮮魚鮮腊陪鼎三膷臐膮聘禮宰夫朝服設飱飪一牢在西鼎九羞鼎三饔飪一牢鼎九設扵西階前陪鼎當内廉周禮膳夫王日一舉鼎十有二物皆有爼后與王同庖凡十鼎十二鼎皆合正鼎陪鼎或十或十二也郊特牲云鼎爼奇而籩豆偶以象陰陽鼎有十有十二者以其正鼎與陪鼎别數則為奇數也禮記禮運實其簠簋籩豆鉶羮疏實其簠簋籩豆鉶羮者此舉事尸之時所供設也若籩豆亦兼據賔客及兄弟等方氏慤曰以稻粱而實簠以黍稷而實簋以水土之品而實籩豆以五味之和而實鉶鼎故曰實儀禮士虞禮一鉶亞之疏一鉶亞之者菹以東也設一鉶扵豆南注鉶菜羮也尸祭鉶嘗鉶士虞禮記鉶芼用苦若薇有滑夏用葵冬用荁有柶注苦苦荼也荁堇類也乾則滑夏秋用生葵冬春用乾荁特牲饋食禮鉶在東房南上注東房房中之東當夾北兩鉶芼設於豆南南陳注芼菜也記鉶芼用苦若薇皆有滑夏葵冬荁少牢饋食禮上佐食羞兩鉶取一羊鉶扵房中坐設扵韭葅之南下佐食又取一豕鉶扵房中以從上佐食受坐設扵羊鉶之南皆芼皆有柶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶司士進一鉶扵上􅅪又進一鉶扵次􅅪疏神坐之上止有羊豕二鉶進于上佐食一進于下佐食一陳氏禮書鼐鼎鼒鉶鼎之器扵象為備易曰鼎象也鼎之齊于金為多六分其金而錫居一謂之鐘鼎之齊下有足上有耳有鼏以覆之有鉉以舉之説文鼏以木横其鼎耳而舉之周禮廟門容大鼏七个即易玉鉉也鼏幕狄切鼏茅為之長則束其本短則編其中扃木為之大者廟門容七箇小者闈門容三箇考工記詩稱鼐鼎及鼒爾雅曰鼎絶大者謂之鼐圓弇上者謂之鼒附耳外謂之釴欵足謂之鬲士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈弇之别而其用有牛羊豕魚之異天子諸侯有牛鼎後漢書曰函牛之鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐鼎特王有之也周官膳夫王日一舉鼎十有二掌客諸侯之禮鼎皆有十二聘禮賔之飱饔皆飪一牢鼎九而飱腥一牢鼎七饔腥二牢鼎二七上介飱饔皆飪一牢鼎七而饗腥一牢鼎七衆介飱少牢飪鼎五大夫少牢五鼎士特牲喪禮三鼎既夕五鼎而掌客聘禮諸侯與卿之鼎過于王之數士既夕之鼎過扵特牲之制何也聘禮陳鼎也王之日舉食鼎也特牲庸禮也既夕斯須禮也然所謂陪鼎羞鼎皆鉶鼎也鉶鼎所以實羮者亨人祭祀賔客共鉶羮鉶羮所以具五味也其芼則藿牛苦羊薇豕也其臭則膷牛臐羊膮豕也自羮言之曰鉶羮自器言之曰鉶鼎以其陪正鼎曰陪鼎以其為庶羞曰羞鼎其實一也王日食九鼎而陪鼎三公食大夫七鼎而鉶鼎四宰夫設四鉶于豆南掌客上公鉶四十有二侯伯鉶二十有八子男鉶十有八聘禮之賔飱饔之羞鼎皆三上介飱饔之羞亦三少牢佐食設羊鉶豕鉶特牲主婦設兩鉶然公食大夫之鉶多扵王日食者以公食者衆故也聘介之鉶同扵賔者以王鼎殺故也周官亨人掌共鼎鑊給以水火之齊少牢爨在廟門外之東三鼎在羊鑊之西二鼎在豕鑊之西然則牲體皆亨扵鑊然後肉脀之鼎而羮納之鉶登大羮在登則鑊者釡錡之總名也舊圖天子之鼎飾以黄金諸侯飾以白金容一斛大夫羊鼎飾以銅容五斗士豕鼎飾以鐵容三斗而牛羊豕鼎各状其首扵足上若然魚鼎腊鼎豈皆状以魚腊乎所謂飾以金與銅鐵而容一斛與五斗三斗葢以後世之鼎言之也士喪禮陳鼎扵寝門外西面士虞陳鼎於門外之右北面鼎入設扵西階前東面特牲陳鼎扵門外北面鼎入當阼階東面則鼎固有面矣其詳不可得而知蕙田案鼎説文云三足兩耳和五味之寳器也禮運備其鼎爼疏案少牢陳扵東方堂序西面北上爼皆設扵鼎西陳氏禮書曰士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈弇之别而其用有牛羊豕魚之異天子諸侯有牛鼎士豕鼎魚鼎而已上得兼下下不得兼上鼐爾雅云鼎絶大謂之鼐鼒爾雅云鼎圓弇上謂之鼒注斂上而小口者周頌絲衣云鼐鼎及鼒鼏特牲饋食陳鼎扵門外有鼏佐食升肵爼鼏之鄭注鼏通冪扃特牲饋食右人抽扃委扵鼎北有司徹乃設扃鼏陳鼎扵門外如初注今文扃為鉉案鼎卦有金鉉玉鉉馬云鉉扛鼎而舉之也鉶禮運實其簠簋籩豆鉶羮周禮亨人祭祀共鉶羮賈疏鉶羮是陪鼎盛之扵鉶器即為之鉶羮掌客鉶四十有二特牲禮籩豆鉶在東房主婦設兩鉶芼少牢禮有羊鉶豕鉶鄭云鉶美器也鑊周禮亨人掌共鼎鑊鄭注鑊所以煑肉及魚腊之器少牢禮爨在廟門外之東大夫五鼎羊豕腸胃魚腊各異鑊鑊别有一鼎鑊中肉孰各升一鼎周禮考工記匠人廟門容大扃七箇闈門容小扃三箇注大扃牛鼎之扃長三尺毎扃為一箇七箇二丈一尺小扃膷鼎之扃長二尺參箇六尺疏膷鼎亦牛鼎但上牛鼎扃長三尺據正鼎而言此言膷鼎據陪鼎三膷臐膮而説也陳氏禮書束冪茅為之束其本飾以朱編冪茅為之編其中飾以朱大扃飾以朱小扃飾以朱公食大夫禮甸人陳鼎設扃冪若束若編考工記曰廟門容大扃七箇闈門容小扃三箇説文曰扃外門之閑也盖鼎扃之制取象扵門扃而廟門之度取數扵鼎扃取數扵鼎扃則鼎之出入有容矣大扃牛鼎之扃也小扃羊豕鼎之扃也鄭氏謂牛鼎之扃長三尺膷鼎之扃長二尺然膷鼎乃牛鼎之陪者也以小扃為膷鼎之扃而不以為羊豕鼎之扃者以其長止二尺故也扃謂之鉉亦謂之鼏易稱玉鉉金鉉説文曰鼏以横木貫耳而舉之則木其質也金玉其飾也冪茅為之長者束本短者編中陳鼎必扵門外舉之則去冪然後入既入則抽扃然後加匕蕙田案以上鼎扃鉶禮記明堂位爼有虞氏以梡夏后氏以嶡殷以椇周以房爼注梡斷木為四足而已嶡之言蹷也謂中足為横距之象周禮謂之距椇之言枳椇也謂曲橈之也房謂足下跗也上下兩間有似于堂房魯頌曰籩豆大房䟽虞氏質未有餘飾故鄭知梡有四足而已蹷謂足横辟不正鄭注嶡之言蹷謂嶡足間有横似有横蹷之象也周則謂此爼之横者為距椇枳之樹其枝多曲橈殷爼似之周爼頭各有兩足足下各别為跗足間横者似堂之壁横下二跗似堂之東西頭各有房但古制難識不可悉知方氏慤曰梡者斷木為足無餘飾也苟完而已嶡者于足間加横木焉植為立横為嶡故也椇者既有横木又為曲橈之形則于是為具故也此皆漸致其備也陳氏禮書殷之横距與夏同而曲其足與三代異周之下距與三代異而直其足與虞夏同詩言大房傳言房烝此房爼也少牢禮言爼距此横距也其髙下脩廣無文舊圖謂髙二尺四寸廣尺四寸不可考莊周曰加肩尻于雕爼之上唐褚遂良曰禹雕其爼士喪禮有素爼盖雕爼始扵禹而後世用之扵吉凶者文質扵是異矣殷又曰椇椇之枝屈而不能伸故殷爼其形如椇故名之房者堂之偏者也周爼之足上下兩間其形象之故曰房爼詩魯頌閟宫毛炰胾羮籩豆大房傳羮大羮鉶羮也大房半體之爼也箋大房玉飾爼也其制足間有横下有跗似乎堂後有房然疏大羮鉶羮者以特牲士之祭祀尚有大羮鉶羮故以此羮兼二羮也特牲注云大羮湆煮肉汁不和貴其質也鉶羮肉汁之有菜和者也大羮謂太古之羮鉶羮謂盛之鉶器其大羮則盛之于登以大為名故不舉所盛之器也大房與籩豆同文則是祭祀之器器之名房者惟爼耳故知大房半體之爼明堂位曰爼有虞氏以梡夏后氏以嶡殷以椇周以房爼注云梡斷木為四足而已嶡謂中足為横距之象椇謂曲撓之也房謂足下跗也上下兩間有似于堂房然是俎稱房也知是半體者周語云禘郊之事則有全烝王公立飫則有房烝親戚燕饗則有殽烝如彼文次全烝謂全載牲體殽烝謂體解節折則房烝是半體可知此亦云房故知是半體之爼言禘郊乃有全烝宗廟之祭唯房烝耳故舉大房而言也昏禮婦饋舅姑特豚合升側載注右胖載之舅爼左胖載之姑爼是爼載半胖之事也明堂位稱祀周公于太廟爼用梡嶡此云大房盖魯公之廟用大房也又解房爼稱大之意以其用玉飾之美大其器故稱大也知大房玉飾者以爼豆相類之物明堂位説祀周公之禮云薦用玉豆豆既玉飾明爼亦玉飾其制足間有横其下有跗以明堂之文差次為然跗上有横似于堂上有房故謂之房也何氏楷曰爾雅云木豆謂之豆竹豆謂之籩陳祥道云籩有縢縁其實乾實豆若脰然其實菹醢大房所以載牲體者鄭云玉飾爼也其制足間有横其下有跗似乎堂後有房然孔云知大房玉飾者以爼豆相類之物明堂位説祀周公之禮云薦用玉豆豆既玉飾明爼亦玉飾也案明堂位云爼有虞氏以梡夏后氏以嶡殷以椇周以房爼又云以禘禮祀周公扵太廟爼用梡嶡此言大房者舊説謂斷木為梡横距為嶡虞氏之爼斷木四足而已夏則加横木扵足中央為横距之形椇枝多曲商扵爼之足間横木為曲撓之形若椇然房之制有户閾周又設下跗扵兩端若房然商之曲其足與三代異周之直其足與虞夏同故兼稱梡嶡者所以著大房之象明其同梡嶡之制其實本名大房非謂用梡又用嶡也房既以取象得名而毛傳乃解為半體之爼盖本扵周語謂禘郊之事則有全烝王公立飲則有房烝親戚燕享則有殽烝彼文次全烝謂全載牲體殽烝謂體解節折則房烝是半體可知然既明言禘郊之事有全烝矣此固禘祭之禮也何得僅用半體乎毛氏之義扵是踈矣小雅楚茨為爼孔碩或燔或炙傳燔取膟膋炙炙肉也箋燔燔肉也炙肝炙也皆從獻之爼也其為之扵爨必取肉也肝也肥碩美者疏鄭以上或肆為陳其骨體扵爼則此非尸賔常爼故為從獻之爼既以為從獻之爼明燔炙是從獻之物故為燔肉炙肝也言從獻者既獻酒即以此燔肉從之而置之在爼也爼之常者隨體所值此特言孔碩故云必取肉也肝也肥而碩美者也知燔肉炙肝者特牲主人獻尸賔長以肝從主婦獻尸兄弟以燔從彼燔與此燔同則彼肝與此炙同故云炙炙肝也炙既用肝明燔用肉矣儀禮士虞禮匕爼在西塾之西注不饌于塾上統于鼎也羞燔爼在内西塾上鼎入匕爼從設爼入設於豆東賔長以肝從實扵爼薦菹醢設爼特牲饋食禮贊者錯爼注鼎入者其錯爼東縮西疏少牢云爼皆設于鼎西肆佐食升肵爼鼏之設扵阼階西注肵謂心舌之爼也郊特牲曰肵之為言敬也言主人之所以敬尸之爼主人升入復位爼入設扵豆東魚次腊特扵爼北注入設爼載者腊特饌要方也凡饌必方者明食味人之性所以正薦脯醢設折爼注凡節解者皆曰折爼不言其體略云折爼非貴體也上賔骼衆賔儀公有司設之命佐食徹尸爼祝命徹阼爼豆籩祝執其爼以出出主婦薦爼佐食徹阼爼特牲饋食禮記肵爼心舌皆去本末午割之實扵牲鼎載心立舌縮爼注午割從横割之亦勿沒立縮順其性心舌知食味者欲尸之享此祭是以進之尸爼右肩臂臑肫胳正脊二骨横脊長脅二骨短脅注尸爼神爼也士之正祭禮九體貶于大夫有併骨二亦得十一之名合少牢之體數此所謂放而不致者凡爼實之數奇脊無中脅無前貶于尊者不貶正脊不奪正也正脊二骨長脅二骨者将舉扵尸尸食未飽不欲空神爼膚三注為􅅪用二厭飫一也離肺一注離猶㨒也小而長午割之亦不提心謂之舉肺刌肺三注為尸主人主婦祭今文刌為切魚十有五注魚水物以頭枚數隂中之物取數于月十有五日而盈少牢饋食禮亦云十有五而爼尊卑同此所謂經而等也腊如牲骨注不但言體以有一骨二骨者祝爼髀脡脊二骨脅二骨注凡接于神及尸者爼不過牲三體以特牲約加其可併者二亦得奇名少牢饋食禮羊豕各三體膚一離肺一阼爼臂正脊二骨横脊長脅二骨短脅注主人尊欲其體得祝之加數五體又于其可併者二亦得奇名臂左體臂又疏云臂左體臂者以其尸用右不云折明全升主人云臂明左臂可知脅骨多不嫌得與尸同用右體猶脊然也膚一離肺一主婦爼觳折注觳後足折分後右足以為佐食爼不分左臑折辟大夫妻其餘如阼爼注餘謂脊脅膚肺佐食爼觳折脊脅注三體卑者從正膚一離肺一賔骼長兄弟及宗人折其餘如佐食爼注骼左骼也賔爼全體衆賔及衆兄弟内賔宗婦若有公有司私臣皆殽脀注此所折骨直破折餘體可殽者升之爼一而已不備三者賤凡骨有肉曰殽膚一離肺一少牢饋食禮司馬升羊右胖髀不升肩臂臑膞骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實於一鼎注升猶上也上右胖周所貴也髀不升近竅賤也肩臂臑肱骨膞骼股骨脊從前為正脅旁中為正脊先前脅先後屈而反猶器之䋫也並併也脊脅骨多六體各取二骨併之以多為貴舉肺一尸食所先舉也祭肺三為尸主人主婦司士升豕右胖髀不升肩臂臑膞骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並舉肺一祭肺三實扵一鼎注豕無腸胃君子不食圂腴雍人倫膚九實於一鼎注倫擇也膚脅革肉擇之取美者司士又升魚腊魚十有五而鼎腊一純而鼎腊用麋注司士又升副倅者合升左右胖曰純純猶全也卒脀乃舉陳鼎扵東方當序南扵洗西皆西面北上膚為下匕皆加扵鼎東枋爼皆設扵鼎西西肆肵爼在羊爼之北亦西肆注肵爼在北将先載也異其設文不當鼎佐食上利升牢心舌載扵肵爼心皆安下切上午割勿沒其載于肵爼末在上舌皆切本末亦午割勿沒其載扵肵横之皆如初為之扵爨也注牢羊豕也安平也平割其下于載便也凡割本末食必正也午割使可絶勿沒為其分散也肵之為言敬也所以敬尸也周禮祭尚肺事尸尚心舌心舌知滋味上利升羊載右胖髀不升肩臂臑膞骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三長皆及爼拒舉肺一長終肺祭肺三皆切肩臂臑膞骼在兩端脊脅肺肩在上注升之以尊卑載之以體次各有宜也拒讀為介距之距爼距脛中當横節也凡牲體之數及載備于此下利升豕其載如羊無腸胃體其載扵爼皆進下注進下變于食生也羊次其體豕言進下互相見司士三人升魚腊膚魚用鮒十有五而爼縮載右首進腴腊一純而爼亦進下肩在上膚九而爼亦横載革順佐食上利執羊爼下利執豕爼司士三人執魚腊膚爼序升自西階相從入設爼羊在豆東豕亞其北魚在羊東腊在豕東特膚當爼北端主人獻祝佐食設爼牢髀横脊一短脅一腸一胃一膚三魚一横之腊兩髀屬扵尻注皆升下體祝賤也魚横者四物共爼殊之也腊兩髀屬于尻尤賤不殊主人酌獻上佐食爼設扵兩階之間其爼折一膚注佐食不得成禮于室中折者擇取牢正體餘骨折分用之有脀而無薦亦逺下尸主人又獻下佐食亦如之其脀亦扵階間西上亦折一膚注上佐食既獻則出就其爼有司徹乃燅尸爼注燅温也卒燅乃升羊豕魚三鼎無腊與膚注腊為庶羞膚從豕去其鼎者儐尸之禮殺於初乃升司馬朼羊亦司馬載載右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一腸一胃一祭肺一載於一爼注言燅尸爼復序體者明所舉肩骼存焉亦著脊脅皆一骨也臑在下者折分之以為肉湆爼也一爼謂司士所設羊鼎西第一爼羊肉湆臑折正脊一正脅一腸一胃一嚌肺一載於南爼注肉湆肉在汁中者以增爼實為尸加也必為臑折上所折分者嚌肺離肺也南爼雍人所設在南者此以下十一爼俟時而載于此歴説之爾司士朼豕亦司士載亦右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一膚五嚌肺一載於一爼注臑在下者順羊也爼謂雍人所設在北者侑爼羊左肩左肫正脊一脅一腸一胃一切肺一載於一爼侑爼豕左肩折正脊一脅一膚三切肺一載於一爼注侑爼用左體侑賤其羊爼過三體有肫尊之加也豕左肩折折分為長兄弟爼也切肺亦祭肺互言之耳無羊湆下尸也豕又祭肺不嚌肺不備禮爼司士所設羊鼎西之北爼也豕爼與尸同阼爼羊肺一祭肺一載扵一爼羊肉湆臂一脊一脅一腸一胃一嚌肺一載於一爼豕脀臂一脊一脅一膚三嚌肺一載於一爼注阼爼主人爼無體逺下尸也以肺代之肺尊也加羊肉湆而有體崇尸恵亦尊主人臂左臂也侑用肩主人用臂下之也不言左臂者大夫尊空其文也降于侑羊體一而增豕膚三有所屈有所中亦所謂順而摭也阼爼司士所設豕鼎西爼也其湆爼與尸爼同豕爼又與尸豕爼同主婦爼羊左臑脊一脅一腸一胃一膚一嚌羊肺一載扵一爼注無豕體而有膚以主人無羊體不敢備也無祭肺有嚌肺亦下侑也祭肺尊言嚌羊肺者文承膚下嫌也膚在羊肺上則羊豕之體名同相亞也其爼司士所設在魚鼎西者司士朼魚亦司士載尸爼五魚横載之侑王人皆一魚亦横載之皆加膴祭於其上注横載之者異于牲體彌變于神膴刳魚時割其腹以為大臠也可用祭也其爼又與尸豕爼同若不儐尸尸食乃盛爼臑臂肫脡脊横脊短脅代脅皆牢注盛者盛于肵俎也此七體羊豕其脊脅皆取一骨也與所舉正脊幹骼凡十矣肩未舉既舉而俎猶有六體魚七注盛半也魚十有五而俎其一已舉必盛半者魚無足翼于牲象脊脅而已腊辯無髀注亦盛半也所盛者右體也脊屬焉言無髀者云一純而俎嫌有之主婦洗於房中酌致扵主人佐食設俎臂脊脅肺皆牢膚三魚一腊臂注臂左臂也特牲五體此三者以其牢與腊臂而七牢腊俱臂亦所謂腊如牲體酌致爵扵主婦佐食設俎扵豆東羊臑豕折羊脊脅祭肺一膚一魚一腊臑注豕折豕折骨也不言所折略之特牲主婦觳折豕無脊脅下主人羊豕四體與腊臑而五陳氏禮書牲體之在鼎曰脀在俎曰載魚載則縮肉載則衡鼎俎貴奇籩豆貴偶奇以象陽偶以象隂觀聘禮有牛羊豕魚腊腸胃膚鮮魚腊之九鼎膷臐膮之三鼎少牢五鼎五俎特牲三鼎三俎而折俎非正俎周官膳夫鼎十有二陪鼎非正鼎玉藻諸侯日食三俎朔日五俎則鼎俎奇可知矣然有司徹有六俎者盖尸也侑也主人也主婦也谷一俎司馬之羞羊湆也司士之羞羊湆也各一俎俎列而陳之則貴奇散而用之雖偶可也又曰大夫肵俎士肵俎禮記曰肵之為言敬也郊特牲肵俎心舌皆去本末午割之實扵牲鼎載心立舌縮俎鄭氏曰立縮順其性心舌知食味者欲尸之饗此祭是以進之少牢禮心載扵肵俎末在上舌皆切本末亦午割勿沒其載扵肵横之則士之肵俎立舌而不立心大夫之肵俎立心而不立舌士之載縮俎則扵俎為縮扵人為横大夫之載横之則於俎為横扵人為縮特牲尸九飯乃盛肵俎下大夫八飯即盛肵俎則士之肵俎盛扵飯後下大夫之肵俎盛扵飯間矣士九飯少牢十一飯下大夫亦十一飯肵俎之禮其升心舌則佐食也其設之則阼階西也其羞之則主人也其置之則腊北膚北也特牲主人羞肵俎腊北少牢主人羞肵俎升自阼階置于膚北制之在合亨之前羞之在尸食舉之後故尸之舉幹舉骼舉魚舉肩以至舉肺正脊佐食受之加扵胙俎而俎釋三个以備陽厭則神俎之體歸扵肵俎多矣士喪禮無肵俎祭殤無肵俎無尸故也士虞禮不以肵俎而以篚尚質故也特牲尸謖佐食徹尸俎有司徹司士歸尸俎士虞出從者奉篚哭從之則與諸臣之自徹者有間歟蕙田案俎楚茨詩為俎孔碩何楷云案特牲記俎之類不一有肵俎有折俎有尸俎有胙俎有主婦俎有祝俎有侑食俎有賔俎肵俎載牢心舌扵上設扵尸饌之北尸毎食牲體反著扵肵俎是王人敬尸之俎郊特牲所謂肵之為言敬也折俎謂節解者旅酬時所設也尸俎事尸之俎牲禮有九曰肩曰臂曰臑曰肫曰胳曰正脊二骨曰横脊二骨曰長脅二骨曰短脅凡九體又有膚三離肺一刌肺三魚十有五腊如牲骨胙俎者王人之俎自胙俎而下亦總名為執事之俎周禮膳夫物皆有俎疏云鼎各一俎其四代之俎不同梡明堂位有虞氏之俎鄭注斷木為四足而已疏夏俎名梡禮圗云梡長二尺四寸廣一尺二寸髙一尺諸臣畫雲氣天子犧飾之嶡明堂位夏后氏之俎鄭注嶡之言蹷也謂中足為横距之象周禮謂之距又明堂位俎用梡嶡疏夏俎名嶡嶡亦如梡直有脚曰梡加脚中央横木曰嶡椇明堂位曰殷以椇鄭注椇之言枳椇也謂曲撓之也疏枳椇之樹其枝多曲撓殷俎似之房俎明堂位曰周以房俎鄭注房謂足下跗也上下兩間有似扵堂房疏云兩頭各有兩足足下各為跗足間横者似堂之壁横下二跗似堂之東西頭各有房又名大房魯頌籩豆大房毛傳大房半體之俎疏周語有全烝房烝言禘郊乃有全烝宗廟之祭唯房烝耳故舉大房而言大房用玉飾之知者以俎豆相類之物明堂位説祀周公之禮云薦用玉豆豆既玉飾明俎亦玉飾山堂曰長二尺四寸廣尺二寸髙一尺漆兩端赤中央黑周禮天官内饔辨體名肉物注體名脊脅肩臂臑之屬疏云體名脊脅肩臂臑之屬者案少牢解羊豕前體肩臂臑後體膊骼又有正脊脡脊横脊又有短脅正脅代脅是其體十一體凡宗廟之祭祀掌割亨之事疏此不言煎和者鬼神尚質不貴䙝味夏官司士凡祭祀帥其屬而割牲羞俎豆注割牲制體也羞進也疏若據祭祀則禮運云體其犬豕牛羊鄭云謂分别骨肉之貴賤以為衆俎也若據饗則左氏傳云王饗有體薦燕有折俎是也諸子大祭祀正六牲之體注正謂朼載之即疏案少牢特牲移鼎入陳有一人鼎中匕出牲體一人在鼎西北面載之于俎既言正六牲之體明此二事也禮記禮運體其犬豕牛羊注體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也疏體其犬豕牛羊者亨之既孰乃體别骨之貴賤以為衆俎供尸及待賔客兄弟等體其犬豕牛羊謂分别骨之貴賤以為衆俎腥其俎孰其殽注腥其俎謂豚解而腥之孰其殽謂體解而爓之䟽云腥其俎謂豚解而腥之者案士喪禮小歛之奠載牲體兩髀兩肩兩胉并脊凡七體也士虞禮主人不視豚解注云豚解解前後脛脊脅而已是豚解七體也案特牲少牢以薦孰為始之時皆體解無豚解以無朝踐薦腥故也其天子諸侯既有朝踐薦腥故知腥其俎之為豚解云孰其殽謂體解而爓之者體解則特牲少牢所升于爼以進神者是也案特牲九體肩一臂二臑三肫四骼五正脊六横脊七長脅八短脅九少牢則十一體加以脡脊代脅為十一體也是分豚為體解此孰其殽謂體解訖以湯爓之不全孰次于腥而薦之堂故祭義曰爓祭祭腥而退是也此則腥以法上古爓法中古也陳氏禮書骨體周禮王之牲事冢宰太僕贊之太宰及納亨贊王牲事太僕祭祀贊王牲事五官共奉之内饔外饔割亨之内饔凡宗廟之祭祀掌割亨之事外饔掌外祭祀之割亨司士帥其屬而割羞司士凡祭祀帥其屬而割羞俎豆諸子正其牲體盖司士掌羣臣之版諸子掌國子之倅則凡預祭者皆在所掌故割羞正體繫之夫肱骨三肩臂臑也股骨三肫亦作膞音純胳亦作骼觳也既夕前後裳長及觳脊骨三正脊脡脊横脊也脅骨三代脅長脅特牲又曰幹短脅也正脊之前則膉也亦謂之脰肫之上則髀也然則左右脇之肩臂臑與左右股之肫胳觳而為十有二脊骨三與左右脅骨六而為九二觳正祭不薦扵神尸主人之俎兩髀不升扵主人主婦之俎膉不升扵吉祭之俎士虞祝俎髀脰則祭之所用者去脾膉而二十有一去二觳而為十九矣國語曰禘郊之事則有全脀王公立飫有房脀親戚燕飲有殽脀則全脀豚解也房脀體解也殽脀骨折也士喪禮特豚四鬄去蹄兩胉脅也脊既夕鼎實羊左胖亦如之然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也士喪禮略豚解而已至虞然後豚解體解兼有焉若夫正祭則天子諸侯有豚解體解禮運曰腥其俎孰其殽體其犬豕牛羊腥其俎謂豚解而腥之為七體孰其殽謂解之爓之為二十一體大夫士有體解無豚解以其無朝踐獻腥之禮故也儀禮有言合升有言升左胖有升右胖者士冠禮特豚載合升喪禮大斂亦豚合升則豚與吉凶之禮皆合升也用成牲者然後升其胖豚合升則髀亦升矣士喪禮載兩髀扵兩端是也升其胖則去髀矣既夕禮實羊豕左胖髀不升是也既夕升羊豕左胖士虞升左胖公食大夫鄉射記少牢皆升右胖特牲尸俎右肩盖禮以右為貴而喪以左為上觀吉禮魚寢右喪禮魚左首則喪之反吉可知矣少牢尸俎羊豕體十一侑羊體三侑則左肩而已特牲尸之牲體九祝三主人與主婦五佐食三賔一長兄弟及宗人折其餘如佐食俎衆賔而下皆殽脀尸脊無中脅無前此尊卑之辨也祭統曰商人貴髀周人貴肩以周人之禮觀之脅貴中而賤兩端特牲食幹鄭云長脅骨貴右而賤左貴前而賤後貴上而賤下貴上則祭不升髀以在體之左後故也賤下而苞取下體者以脛骨可以久藏故也貴前而祭不用膉者以非體之正故也士喪禮斂奠之俎載兩髀扵兩端兩肩亞兩胉亞脊肺在中少牢肩臂臑膊胳在兩端脊脅肺肩在上則俎之有上下猶牲體之有前後也肩臂臑在上端則膊胳在下端矣喪奠兩髀扵兩端此喪事質猶用商禮故也特牲尸俎正脊二骨長脅二骨阼俎亦正脊二骨長脅二骨少牢脊三脅三皆二骨以並盖肩臂臑膊胳之骨不折所折者脊脅也脊二以並多為貴故也少牢脊則先正脊脅則先短脅以屈而䋫之故也士虞禮尸舉魚腊俎俎釋三箇特牲佐食盛胙俎俎釋三箇則士虞釋三箇者不盡人之歡也特牲釋三箇将以改饌陽厭也少儀凡膳告扵君子太牢以牛左肩臂臑折九箇少牢以羊左肩七箇犆豕以左肩五箇膳以肩不以膊者貴其前也肩以左不以右者右以祭也又曰舉肺祭肺儀禮少牢舉肺祭肺祭肺三皆切之則舉肺一者尸之所先食者也故刲離之而不切祭肺三者尸與主人主婦之所祭者也故切之而不刲離舉肺亦謂之離肺亦謂之嚌肺祭肺亦謂之刌肺亦謂之切肺則離與刌以制之名之也嚌與切以所用名之也祭肺祭而不嚌舉肺嚌而必祭祭肺三皆在尸俎而舉肺各扵其俎故儀禮尸俎阼俎以至主婦佐食賔長兄弟宗人衆賔及衆兄弟内賔宗婦公有司之俎皆離肺一則祭肺三者施于尸主人主婦之挼祭也皆離肺一者自尸至公有司食之也少儀曰牛羊之肺離而不提心離而不提心則絶而祭之故捝手則刌而祭者不捝手矣祭以右手見鄉射凡祭必于脯醢之豆間特公食大夫有司徹祭于上豆之間以豆數多故也祭之尚肺周禮而已若有虞氏則祭首夏后氏則祭心商則祭肝以時異則禮異也周之尚肺特宗廟賔客飲食之間而已若五祀則戸先脾中霤先心門先肝以事異則禮異也士冠有嚌肺而鄉飲鄉射燕禮之類皆有離肺而無祭肺婚禮有離肺又有祭肺鬼神陰陽之意也特牲饋食先祭肺後祭肝祝亦先祭肺後祭肝則祭肺非不祭肝也以肺為主耳由是推之夏商非不祭肺也以心與肝為主而已又曰腸胃膚少儀曰君子不食圂腴鄭康成曰惟燖者有膚則牛羊有腸胃而無膚豕有膚而無腸胃豕雖有膚然四解而未體折無膚豚而未成牲無膚士喪禮豚皆無膚以未成牲故也既夕禮大遣奠少牢四解無膚以未體折故也士虞禮膚祭三取諸左膉上膉脰也鄭康成曰膚脅革肉盖豕肉之美者不過脅革肉而已故禮扵膚皆謂之倫膚東晉所謂禁臠者豈此類歟公食大夫魚腸胃倫膚若九若十有一下大夫若七若九盖士一命故其數七小國之卿次國之大夫再命故其數九大國之卿三命故其數十一公食大夫膚與牲皆七而少牢膚與牲體皆九隆于祭禮故也聘禮腸胃與膚不同鼎公食大夫腸與膚不同俎腸胃常在先膚常在後者以腸胃出扵牛羊膚出扵下牲故也公食大夫腸胃膚皆横諸俎垂之少牢肵俎腸胃皆及俎拒盖腸胃之長及俎拒膚則垂之而已楊氏復儀禮旁通牲體圖賈氏有司徹不賔尸乃盛俎疏云凡骨體之數左右合為二十一體案少牢注云肩臂臑肱骨也膞胳股骨鄉飲酒注前脛骨三肩臂臑也後脛骨二膞胳也又後有髀觳折特牲記云主婦俎觳折注云觳後足也骨體不數者凡體前貴扵後觳賤扵臑故數臑不數觳是以不升扵鼎又髀在肫上以竅賤正俎不用又脊有三分一分以為正脊次中為脡脊後分為横脊脅亦為三分前分為代脅次中為長脅後分為短脅是其二十一體士虞用專膚為折俎取諸脰膉注云専猶厚也折俎謂主婦以下俎也體盡人多折骨以為之盖正骨之前有膉亦謂之脰但不升扵吉祭之俎今案髀雖尸俎不升亦有用髀者如士虞祝俎有髀特牲祝俎有髀少牢祝俎牢髀又腊有兩髀屬扵尻是也尸俎不用二觳尸以下有用觳者特牲主婦俎觳折佐食俎觳折是也二十一體十九體合兩髀為二十一體羊豕同士冠禮三醮有乾肉折俎疏曰或為豚解而七體以乾之謂之乾肉將升于俎則節折為二十一體陳祥道曰國語曰禘郊之事則有全脀王公立飫有房脀親戚燕飲有殽脀則全脀豚解也房脀體解也殽脀骨折也士喪禮特豚四鬄去蹄兩胉脊既夕鼎實羊左胖亦如之然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也若夫正祭則天子諸侯有豚解體解禮運曰腥其俎孰其殽體其犬豕牛羊腥其俎謂豚解而腥之為七體孰其殽謂解之爓之為二十一體是也大夫士有體解無豚解以其無朝踐獻腥之禮故也朱先生曰豚解之義陳説得之體解則折脊為三兩胉兩肱兩股各三通為二十一體凡牲與腊方解割時皆是如此但牲則兩髀以賤而不升扵正俎耳故少牢禮具列自髀以下凡二十一體但髀不升耳而鄭注云凡牲體之數備扵此初不及他體也况此言腊則又不殊賤也而周禮内饔及此經昏禮兩疏皆言二十一體乃不數兩髀而不計其數之不足盖其疎略至少牢疏及陳祥道乃去髀而以兩觳足之盖見此經後篇猶有脰及兩觳可以充數然欲盡取之則又衍其一故獨取兩觳而謂脰非正體若果如此則觳亦非正體又何為而取之耶此其為説雖巧而近扵穿鑿不可承用十九體去兩髀不并合左右兩相為十九體羊豕同肩臂臑三合左右兩相為六膞胳二合左右兩相為四正脊脡脊横脊三脊在上無左右兩相之數短脅長脅代脅合左右兩相為六左右體兩相合為十九神俎不用左體故少牢禮只用右體十一其左體則侑以下用之如侑俎羊左肩左肫豕左肩折是也主人俎臂一亦左臂也賔羊骼一亦左骼也若右骼神俎用之矣十一體不合左右兩相故十一體羊豕同前脛骨三肩臂臑也亦曰肱骨後脛骨二膞胳也膞亦作肫胳亦作骼亦曰肱骨脊有三分前分為正脊次中為脡脊後分為横脊脅亦作三分前分為代脅次中為長脅後分為短脅長脅亦曰正脅案士虞特牲少牢皆云舉幹幹即長脅也少牢十一體羊豕同左胖髀不升肩臂臑膊胳正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並並併也脊脅體骨多六體各取二骨併之以多為貴少牢賔尸十一體羊豕同肩臂肫胳臑正脊一脡脊一横脊一短脅一正脅一代脅脅一前少牢禮脊脅皆二骨以並今賔尸禮脊脅一骨在正俎一骨在湆俎此復序之亦欲見脊脅皆一骨與前二骨以並不同也特牲九體十一體之中不用脡脊代脅故九體豕右胖肩臂臑膊胳正脊二骨無脡脊横脊長脅二骨無代脅短脅凡牲體四肢為貴故先序肩臂臑膞胳為上然後序脊脅扵下注脊無中脅無前貶扵尊者注家之意謂士祭禮九體脊無中謂無脡骨也脅無前謂無代脅在前也貶扵尊者謂少牢大夫禮十一體今士禮九體貶扵大夫大夫尊也不貶正脊者不奪正也豚解七體士喪禮小斂陳一鼎于門外其實特豚四鬄兩胉脊然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也士喪禮豚解而已大斂朔月奠遣奠禮雖寖盛豚解合升如初至虞然後豚解體解兼有焉小斂總有七體士虞升左胖七體則解左胖而為七比之特牲少牢吉祭為略比之小斂以後為詳矣士虞左胖七體豕左胖左肩臂臑肫胳脊脅吉禮牲尚右今虞禮反吉故升左胖喪祭略七體耳脊脅正脊正脅也喪祭禮數雖略亦不奪正也接神及尸者三體凡接扵神及尸者俎不過牲三體所謂接神及尸者祝佐食賔長長兄弟宗人之等是也俎不過牲三體如佐食俎觳折脊脅是也其餘如佐食俎皆不過三體也惟特牲王人俎左臂正脊二骨横脊長脅二骨短脅凡五體者注云王人尊也蕙田案凡牲體有豚解有體解豚解者解牲為七體一脊兩脅兩肱兩股也脅者肋骨亦謂之胉肱者前脛骨謂之肩股者後脛骨謂之髀胉及肩髀皆以左右分故名兩至四蹄則以其踐地穢惡而去之士喪禮小斂奠用特豚其匕載扵俎也載兩髀扵兩端兩肩亞兩胉亞脊在中盖髀肩胉各兩通一脊而為七體此豚解之制也體解者即豚解之七體而析解之為二十一體析脊骨為三前為正脊中為脡脊後為横脊也脅骨三前為代脅中為長脅亦名正脅亦名幹後為短脅合左右兩脅為六肱骨三上為肩中為臂下為臑合左右兩肱為六股骨三上為髀中為肫亦名膊下為骼合左右兩股亦為六也至正脊之前肩之上當頸處謂之脰亦謂之膉胳之下後足之末近蹄者謂之觳膉一而觳兩皆不在正體之數少牢饋食禮之升載扵俎也上利升羊載右胖髀不升肩臂臑膞胳正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並肩臂臑膊骼在兩端脊脅肩在上下利升豕其載如羊此所陳凡十一體而鄭康成以為牲體之數備扵此者盖肩臂臑合兩胖為六膊胳合兩胖為四短脅正脅代脅合兩胖亦六脊有三總為十九體兩髀雖以近竅之故賤之而不升然究屬正體通數之得二十一體則牲體之數備矣此體解之制也至獸肉之乾者謂之腊士冠禮有乾肉折俎賈疏云或為豚解而七體以乾之及用之将升扵俎則節折為二十一體然則腊亦先豚解次體解而與解牲之制同矣又案凡用牲體唯士喪之奠從略而用豚解至士虞之禮已用體解而特牲少牢士冠士昏鄉飲酒大射鄉射燕食諸禮皆用體解者也然所解牲體有合用其左右胖者士冠禮醮若殺則特豚載合升實扵鼎士昏禮期初昏陳鼎其實特豚合升厥明婦盥饋特豚合升側載右胖載之舅俎左胖載之姑俎士喪禮大斂奠陳鼎豚合升是也有用其右胖者周制牲體貴右故吉禮如少牢特牲鄉飲鄉射大射燕食諸禮皆用右胖也有用其左胖者凶禮反吉故士喪遣奠之羊豕士虞之特豕皆用左胖也所解牲之二十一體用其一胖則三肱三脅三股并三脊為十二然髀以近竅而賤不升扵正俎故有用十一體者少牢之尸俎肩臂臑膊胳正脊脡脊横脊正脅短脅代脅也有用九體者特牲之尸俎肩臂臑膊胳正脊横脊長脅短脅而無脡脊代脅也有用七體者士虞記升左肩臂臑肫骼脊脅盖止用正脊正脅而横脊短脅亦無也又公食大夫禮載體鄭注下大夫體七个賈疏士虞七體用左胖此用右胖則食下大夫亦七體也又有雖用七體而俎止用三體二體者鄉飲鄉射燕禮大射牲皆用一狗鄉飲酒記云賔俎脊脅肩主人俎脊脅臂介俎脊脅骼而賈疏云其間有臑肫以為大夫俎鄉飲記亦如之但不及介俎而有獲者之俎折脊脅臑釋獲者之俎折脊脅燕禮記云唯公與賔有俎盖亦略如鄉射而大射儀注疏皆引鄉射記為釋則是飲射之俎尊者三體卑者二體也然特牲少牢以右胖為尸俎而左胖亦以為接神及尸者之俎飲射燕食賈疏以為用其右胖而左胖以為庶羞又少儀記祭祀致福扵君子之禮用左肩臂臑故夫用牲之右胖者其左胖亦非棄置而不用者矣又案凡祭牲之左胖用為接神及尸者之俎尊者不過五體次四體次三體賤者一體而已特牲主人阼俎五體臂正脊横脊長脅短脅也主婦俎五體觳折其脊脅則如阼俎也少牢侑俎羊用四體左肩左肫正脊及脅也豕用三體左肩折正脊一脅一也主人阼俎羊豕各三體臂脊脅也主婦俎羊三體左臑脊脅也祝俎三體髀横脊短脅也特牲祝俎三體髀脡脊及脇也佐食俎三體觳折脊脇也士虞祝俎三體髀短脊及脇也若夫少牢佐食之俎折一長賔之俎羊骼一長兄弟之俎折脅特牲賔之俎骼一宗人俎長兄弟之俎各折一皆不過一體也又正體中兩髀正體外兩觳一膉雖不升扵正俎然少牢特牲士虞之祝俎皆用髀特牲之主婦俎佐食皆觳折士虞記祔祭時用専膚為折俎取諸脰膉謂以脰膉上膚之厚者為主婦以下俎盖三者唯不用為神俎及主人之俎而外此固有用之者也右鼎俎牲體五禮通考巻六十四
