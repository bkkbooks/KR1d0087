body:
  text: 五禮通考原序三代時禮行於上自王侯迄士庶皆肄習焉無庸稽之簡冊也淩夷至春秋學士大夫猶相與講明指示斯須不去秦燔典籍禮經蕩然叔孫通補苴於漢僅以綿蕞習之而禮幾不可問矣自時厥後注疏家掇拾煨燼之餘强以已意附㑹分離乖隔瑕釁百端故孔文舉謂鄭康成時有臆説郊天鼓殆不必麒麟之皮也夫以康成之悉心搜討不避拙不辭難而當時已不免詆呵況其他乎予嘗謂詩書雖殘缺而迹其遺文尚皆有義理可據惟禮則隨時代更郊社所配殷周各異南北之祀分合多岐一端如此餘可例矣又未經夫子手定故羣儒議論紛紛比於聚訟若唐之開元禮宋之太常因革禮雖命儒臣纂輯垂為一代章程而因陋就簡大畧與綿蕞等後人但藉以考其同異而已非好學精思者孰能訂其是非得失而正之往時崑山徐大司㓂有讀禮通考一書於諸禮猶闕而未備少宗伯秦公奮然繼起合五禮而編次之薈萃該洽受心所是而非以立異於古有稽而不敢茍同其不可强釋者則闕疑焉仍其名曰通考今秋兒子和寧給假歸里爰以授之而索予弁其首予讀之听然莫逆於心也夫五禮之用大以經世小以物身雖難言又烏可以不論世之噤不敢措一詞者既病其言雜復未覩禮家之大全故安於放而習於簡耳非篤古而宿其業又烏能蕆之予與秦氏世好従父弱六出尊大父對巖先生之門藥師又與予同年友也日往來寄暢園中與其羣従子弟遊素知其家多藏書凡禮經疏義外間絶少刋本而庋貯緘題者數十笥宗伯以絶人之姿盡發而讀之早嵗即洞其條理綜核纂注彚為一編通籍後簪筆承明毎稍暇輒抒思釐定至晉居秩宗而帙始成人以為善於其職云予謂是惟能宿其業耳積數十年博觀閎覽之資用以搜擇融洽折諸儒之異同而求其是將使後之考禮者恍然如日再中不至若扣槃捫燭也故不敢以老辭序而歸之乾隆十有八年秋八月陽湖八十二老人蒋汾功
