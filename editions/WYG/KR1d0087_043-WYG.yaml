body:
  text: 五禮通考卷三十三刑部尚書秦蕙田撰吉禮三十三日月蕙田案大戴禮保傳傳天子春朝朝日秋暮夕月國語天子大采朝日少采夕月周官典瑞王搢大圭執鎮圭繅藉五采五就以朝日玉藻天子朝日於東門之外祭義祭日於東祭月於西祭日於壇祭月於坎祭法王宮祭日也夜明祭月也陳用之謂日壇名王宮以有君道也月壇名夜明以昱乎夜也祭以春秋分者天地至尊故祭於陰陽之始生而以二至日月次天地故祭於陰陽之正中而以二分此日月之正祭也其餘主日配月則郊壇之從祭禮日南門禮月北門則因覲而祭祈年天宗則因蜡而祭風雨不時則因禜而祭皆非正祭周禮實柴其秩爲隆漢武東向揖日西向揖月則太簡拜於殿下則太䙝如魏黄初太和禮唐開元禮宋政和禮明集禮壇壝典禮尚不至失古制輯日月篇禮記祭法王宮祭日也夜明祭月也注王宮日壇王君也日稱君宮壇營域也夜明亦謂月壇也君疏王君也宮亦壇也營域如宮也日神尊故其壇曰宮也夜明者祭月壇名也月明於夜故謂其壇為夜明也方氏慤曰天無二日土無二王則王有日之象而宮乃其居也故祭日之壇曰王宮祭義曰祭日於壇祭月於坎彼以形言此以明言也周氏諝曰月為陰而盛于夜故曰夜明祭義祭日於壇祭月於坎以別幽明以制上下注幽明者謂日照晝月照夜於疏此經及下經皆據春分朝日秋分夕月祭日壇謂春分也祭月於坎謂秋分也祭日於東祭月於西以別外内以端其位注端正也朝疏祭日於東用旦之時是為外祭月於西鄉夕之時是為内是以別外内以正其位也而崔氏云祭日於壇祭月於坎還據上文郊祭之時今謂若是郊祭日與月當應同處何得祭日於壇祭月於坎日於東月於西祭不同處則崔說非也崔又云日月有合祭之時謂郊祭天而主日配以月其禮大用牛各祭之時謂春分朝日秋分夕月其禮小故祭法用少牢今謂小司徒云小祭祀奉牛牲鄭注謂𤣥冕所祭自𤣥冕皆用牛也何得用少牢今謂祭法日月用少牢鄭云禱祈之祭也崔氏說又非崔氏又云迎春之時兼日月者今案諸文迎春迎秋無祭日月之文小宗伯云兆五帝於四郊四望四類亦如之謂四望四類之祭亦如五帝在四郊故鄭云兆日於東郊兆月與風師於西郊不謂兆五帝之時即祭日月崔說又非日出於東月生於西陰陽長短終始相巡以致天下之和疏隂謂夜也陽謂晝也夏則陽長而隂短冬則陽短而陰長慕容氏彦逢曰此明分祭之禮所謂春分朝日秋分夕月是也日昱乎晝月昱乎夜則日月以晝夜而分幽明日以陽為尊上道也月以陰為卑下道也則日月以陰陽而定上下壇出乎上而明坎出乎下而幽祭以類而求焉故可得而禮矣方氏慤曰壇之形則圜而無所虧以象日之無所虧而盈也坎之形則虚而有所受以象月之有所受而明也壇髙而顯坎深而隱一顯一隱所以別陰陽之幽明一髙一卑所以制陰陽之上下東動而出西静而入出則在外入則反内故東西所以別陰陽之外内東為陽中西為隂中中則得位故東西所以端陰陽之位日出於東月生於西此又覆明祭日月於東西之意也日之出入也歴朝夕晝夜而成一日月之死生也歴晦朔弦望而成一月日徃則月來月徃則日來終則有始相巡而未嘗絶故以是致天下之和也周禮春官小宗伯兆五帝於四郊四類亦如之鄭註四類日月星辰兆日於東郊兆月於西郊蕙田案祭日於壇祭月於坎祭日於東祭月於西註疏謂春分朝日秋分夕月是也崔氏謂還據上文郊祭之時祭法王宮祭日夜明祭月注先儒亦有謂從祀於郊者皆非是夫圜丘祭天誠敬專一既無兼祭百神之禮而他神亦皆有致祭之兆亦無庸雜然並附於郊壇况壇與坎幽明上下判然迥別豈有於郊壇之上復爲日壇月坎乎理不可通孔氏辨之極是宗元案南郊祀天北郊禮地而兆日則於東兆月則於西此自上古以來皆然正先天乾南坤北離東坎西之本位也益信伏羲卦位邵子据說卦經文而摹出者爲確不可易若如漢唐人但以文王卦位爲易之本圖則南郊宜兆日北郊宜兆月而祀天則於西北禮地則於西南先王制禮不乃俱亂其位乎然則文王卦位又何爲而悉反之曰是從先王制禮中一本而分亦一時並行者爾夫圜丘固在南郊方丘固在北郊矣而祭天則於冬日至祭地則於夏日至是即後天乾北坤南之義也朝日固在春分夕月固在秋分矣而朝覲則禮日於南門之外禮月於北門之外是即後天離南坎北之義也此先天後天所以相爲體用而不可相無也是以不能達化窮神者不能制禮作樂此亦其一端之可見者乎玉藻朝日於東門之外注朝日春分之時也東門謂國門也禮器大明生於東月生於西方氏慤曰日月皆有明日本明月受日而明大明生於東經所謂日出於東是也月生於西揚雄所謂載魄於西是也此隂陽所以分也國語周語古者先王既有天下又崇立於上帝明神而敬事之於是乎有朝日夕月以教民事君注明神日月也禮天子以春分朝日以秋分夕月拜日於東門之外然則夕月在西門之外必矣魯語天子大采朝日與三公九卿祖識地德日中考政與百官之政事師尹維旅牧相宣序民事注禮天子以春分朝日示有尊也虞說曰大采衮織也祖習也識知也地徳所以廣生昭謂禮玉藻天子𤣥冕以朝日𤣥冕冕服之下則大采非衮織也周禮王搢大圭執鎮圭藻藉五采五就以朝日則大采謂此也言天子與公卿因朝日以修陽政而習地德因夕月以治陰教而紏天刑日照晝月照夜各因其明以修其事也少采夕月與大史司載紏䖍天刑日入監九御使潔奉禘郊之粢盛而後即安注夕月以秋分紏恭也䖍敬也刑法也或云少采黼衣也昭謂朝日以五采則夕月其三采也載天文也司天文謂馮相氏保章氏與大史相儷偶也此因夕月而恭敬觀天法攷行度以知妖祥也監視也九御九嬪之官主粢盛祭服者即就也春秋莊公十八年榖梁傳王者朝日故雖爲天子必有尊也貴爲諸侯必有長也故天子朝日諸侯朝朔疏天子朝日於東門之外服𤣥冕其諸侯則玉藻云皮弁以聽朔於太廟與天子禮異其禮雖異皆早旦行事大戴禮保傅篇三代之禮天子春朝朝日秋暮夕月所以明有別也注祭日東壇祭月西壇以別内外以端其位蕙田案漢書賈誼傳同右日月坎壇正祭儀禮覲禮天子乗龍路載大旂象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外黄氏直卿曰覲禮載朝日之禮葢時會殷同王既揖諸侯於壇乗龍路載大旂出拜日於東門之外反祀方明此所謂大朝覲者也常歳春朝朝日諸侯有修歳事而朝者豈亦帥之而出歟國語大采朝日少采夕月葢日朝焉蕙田案國語大采朝日少采夕月韋註亦以春秋分之祭釋之葢古者無旦夕拜日月之禮也旦夕常於殿下拜日月乃漢氏之禮魏文嘗以煩䙝譏之良是黄氏以國語所云爲日朝殆非也又案此條因覲而祭禮記郊特牲郊之祭也大報天而主日也祭義郊之祭大報天而主日配以月逸周書作雒周公作大邑成周於土中乃設立兆於南郊配以后稷日月農星先王皆與食宗元案郊祭大報天而主日又配以月楊氏謂垂象著明莫大乎日月故祭天而主日配月非必百神從祀也此說誠是則注疏謂徧報天之諸神以日爲諸神之主者非也然既不及諸神則惟祭一天可矣何爲又主乎日而以月配之此義葢未有發明之者孔疏乃謂如君燕羣臣以膳宰爲之主則甚得聖人尊祖配天之㣲意葢主乃賓主之主以人臣無敢當尊者故另以宰夫爲之主况天尊無上可以直擬上帝而薦享之耶惟日爲陽宗以是爲主庶可藉以上通帝座日月同類既主日即以月配耳則其以始祖配天者亦是此意聖人敢自謂我有功德遂可直達于天哉故積吾之誠意以昭格乎祖庶藉祖之神靈以對越乎天純是聖人䖍恭寅畏之至意而無一毫侈張誇大之私心者也此義不明郊壇從祀至於千五百餘神則益雜矣今逸周書所云日月農星先王皆與食者無乃不能遏其端而反爲之推波助瀾也歟蕙田案以上三條因郊而祭月令天子乃祈來年於天宗注此周禮所謂蜡祭也天宗謂日月星辰也疏云天宗謂日月星者以蜡祭唯公社不祭地故知祭天宗者不祭天若是祭天何須稱宗下季冬云天之神是天之衆神有司中司命不稱宗明稱宗者謂日月星也案異義六宗賈逵等以為天宗三謂日月星地宗三謂泰山河海鄭𤣥六宗以為星也辰也司中也司命也風師也雨師也不同賈逵之義今此云天宗謂日月星者尚書六宗文承肆類上帝之下凡郊天之時日月從祀故祭以日月配日月在上帝之中故六宗不得復有日月此不云六宗而云天宗與彼别也蔡邕云日為陽宗月為隂宗北辰為星宗也蕙田案以上一條因蜡而祭春秋昭元年左氏傳日月星辰之神則雪霜風雨之不時于是乎禜之蕙田案以上一條因禜而祭右因事祭日月周禮春官大宗伯以實柴祀日月注實柴實牛柴上也實柴或為賓柴疏祭義曰郊之祭也大報天而主日配以月則郊祭并祭日月可知蕙田案凡祀日月星辰皆用實柴以其爲天神故升烟氣以享之也疏専以郊祭從祀釋之葢誤典瑞王晉大圭執鎮圭繅藉五采五就以朝日註繅有五采文所以薦玉木為中幹用韋衣而畫之就成也王朝日者示有所尊訓民事君也天子常春分朝日秋分夕月覲禮曰拜日于東門之外晉讀為搢紳之搢謂揷于紳帯之間若帯劍也疏云王朝日者示有所尊訓民事君也者王者父天母地兄日姊月故春分朝日秋分夕月以王者至尊猶朝日夕月况民得不事君乎是訓民事君也云天子常春分朝日秋分夕月知者案祭義云祭日于東祭月于西又玉藻云𤣥端而朝日于東門之外又覲禮春拜日于東門之外既春拜日于東明秋夕月于西故知春分朝日秋分夕月也圭璧以祀日月註圭其邸為璧取殺于上帝并疏祭日月謂若春分朝日秋分夕月大報天主日配以月又月令云祈來年于天宗鄭云天宗日月星辰亦是也祭法埋少牢已下祭日月星辰謂禱祈而祭亦用此圭璧以禮神也云圭其邸為璧者上文四圭兩圭及下璋邸皆言邸鄭皆以邸為璧但此圭云璧不言邸故鄭還以邸解璧也云取殺于上帝者郊天及神州之神雖相對但天尊地卑故四二有異鄭直云象不言殺也今日月星天神故以殺言之也言殺者取降殺以二為節也考工記玉人圭璧五寸以祀日月疏此圭璧謂以璧為邸旁有一圭禮記玉藻天子𤣥端而朝日于東門之外注端當為冕字之誤也𤣥衣而冕冕服之下而疏案宗伯實柴祀日月星辰則日月為中祀用𤣥冕者以天神尚質方氏慤曰經有曰𤣥冕曰𤣥冠曰𤣥端何也葢𤣥端者祭服燕服之總名衣𤣥衣而加𤣥冕則為祭服衣𤣥衣而加𤣥冠則為燕服或冠冕通謂之端𤣥端而朝日則是𤣥冕者也𤣥端而居則是加𤣥冠者也大戴禮朝事篇天子冕而執鎮圭尺有二寸帥諸侯朝日于東郊周禮天官掌次朝日則張大次小次設重帟重案注朝日春分拜日於東門之外次謂幄也重帟復帟重案牀重席也疏知朝日春分者祭義云祭日於東故鄭約用春分也云拜日於東門之外者謂在東郊春官大司樂乃奏黄鍾歌大呂舞雲門以祀天神注天神謂五帝及日月星辰也天疏此下又不見日月星别用樂之事故知此神中有日月星辰可知尚書大傳古者帝王以正月朝迎日於東郊所以爲萬物先而尊事天也祀上帝於南郊所以報天德迎日之辭曰維某年月上日明光於上下勤施於四方旁作穆穆維予一人某敬拜迎日東郊蕙田案禮家言朝日以春分而大傳獨云正月豈迎日之禮又與朝日有間乎其迎日詞襲用洛誥美周公之文殆非古也姑存之以備參考陳氏禮書古者之祀日月其禮有六郊特牲曰郊之祭大報天而主日配以月一也玉藻曰朝日於東門之外祭義曰祭日於東郊月於西郊二也大宗伯四類於四郊兆日於東郊兆月於西郊三也大司樂樂六變而致天神月令孟春祈來年於天宗天宗者日月之類四也覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外五也雪霜風雨之不時於是乎禜之六也夫因郊蜡而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也春分朝之於東門之外秋分夕之於西門之外此祀之正與常者也日言朝則於日出之朝朝之也月言夕則於月出之夕夕之也日壇謂之王宮以其有君道故也月壇謂之夜明以其昱於夜故也其次則大次小次設重帟重案其牲體則實柴其服則𤣥冕𤣥端其圭之繅藉則大采少采禮之之玉則一圭邸璧祀之之樂則奏黄鍾歌大呂舞雲門玉藻十有二旒龍衮以祭𤣥端以朝於東門之外則龍衮𤣥端皆言其衣也衣𤣥冕之衣則用𤣥冕矣鄭氏改𤣥端爲𤣥冕不必然也虞氏釋國語謂朝日以衮冕然祀上帝以衮冕而朝日以圭璧與張次設帟一切殺於上帝則其不用衮冕可知矣周禮於掌次之次帟案與典瑞之大圭鎮圭繅藉言朝而已則夕月之禮又殺乎此也漢武帝因郊泰畤朝日行宮東向揖日其夕西向揖月則失東西郊之禮也魏文帝正月祀日於東門之外則失春分之禮也齊何佟之曰王者兄日姊月馬鄭用二分盧植用立春佟之以爲日者太陽之精月者太陰之精春分陽氣方永秋分陰氣向長天地至尊故用其始而祭以二至日月次天地故祭以二分則融與康成得其義矣魏薛靖曰朝日宜用仲春之朔夕月宜用仲春之朏此尤無據也後周於東門外爲壇以朝日燔燎如圜丘於西門外爲壇於坎中方四丈深四丈以夕月燔燎如朝日隋唐壇坎之制廣狹雖與後周差異大㮣因之蕙田案兆爲之營域鄭註小宗伯云兆日月於東西郊葢指其壇坎而言非祭也祭義言祭於壇坎即祭於所兆之處非有二也禮書分爲二禮誤矣祀日月之義經文有並言之者如禮之以圭璧燔之以實柴之類至於𤣥端之服圭之搢執次帟案之張設經皆止言朝日而不及月葢從省文非有隆殺之辨葢日月雖有陰陽之分而其爲天之貴神則一故祭義曰主日配月則祀之之儀不應有二所異者兆有東西制有壇坎名有王宮夜明時有春秋候有朝暮采有大少其見于經者如此其他則無所別禮書云夕月之禮殺乎朝日亦未知所據至杜氏通典仍崔氏之謬今不載楊氏復曰典瑞朝日注云天子當春分朝日秋分夕月玉藻朝日於東門之外注云朝日於春分之時馬融鄭康成皆同此說賈􅁩亦曰三代之禮春朝朝日秋暮夕月所以明有敬也葢冬至祭天夏至祭地此祭天地之正禮也春分朝日秋分夕月此祭日月之正禮也陳氏云天地至尊故用其始而祭以二至日月次天地故祭以二分此言是也所謂兆日於東郊兆月於西郊祭日於壇祭月於坎祭日於東祭月於西王宮祭日夜明祭月即春分朝日秋暮夕月之事也此外則因事而祭如大報天而主日配以月此因郊而祭也覲禮拜日於東門之外禮日於南門外禮月於北門外此因覲而行禮也月令祈來年於天宗此因蜡而祈也日月星辰之神則雪霜風雨之不時於是乎禜之此因禜而祭也蕙田案易曰懸象著明莫大乎日月先天卦離爲日居東坎爲月居西所以肖其體也後天卦離爲日爲火居南坎爲月爲水居北所以著其用也坎離代乾坤用事是以二郊之外次以日月二至祭天地陰陽之始也二分祭日月陰陽之中也此聖人所以通乎晝夜之道而知幽明之故也三代之禮其祭有正有告有報有祈有禳兆日于東兆月於西東乃出震西則生明端其位也兆於東郊者以壇兆於西郊者以坎壇圜而明坎虚而受昭其象也朝以春分之朝夕以秋分之夕因其時也朝日則日中考政夕月則日入紏刑法其德也祀以實柴圭璧五寸繅藉五就𤣥端而冕樂奏黄鍾舞以雲門次以重帟重案辨其秩也此每年之正祭禮之常也其因郊而祭者主日配月從祀上帝崇其功而報之也因蜡而祭者周禮候嘉慶順豐年兾其福而祈之也雖皆非正而常祭者也因禜而祭者郤凶咎寧風旱值其沴而禳之也因覲而祭者告其事而拜日於東門之外仍其體之正也反祀方明而禮日於南門外禮月於北門外效其用之大也皆非正與常也此先王崇立明神而敬事之祭日月之大端也右祭日月儀書經堯典分命羲仲宅嵎夷曰暘谷寅賓出日蕙田案蔡傳賓禮接之如賓客亦帝嚳歴日月而迎送之意據此則迎之而已迎日之禮不傳未便輯入祀典附識以俟考楚辭九歌東君朱子註今案此日神也禮曰天子朝日于東門之外漢志亦有東君拾遺記炎帝神農築圜丘以祀朝日飾瑶階以揖夜光史記五帝本紀帝嚳髙辛氏歴日月而迎送之羅泌路史帝嚳髙辛氏以日至設丘兆於南郊以祀上帝日月星辰柳宗元朝日說柳子為御史主祀事將朝日其寮問曰古之名曰朝日而已今而曰祀朝日何也余曰古之祀者則朝拜之云也今而加祀焉者則朝旦之云也今之所云非也問者曰以夕而偶諸朝或者今之是乎余曰夕之名則朝拜之偶也古者旦見曰朝暮見曰夕故詩曰邦君諸侯莫肯朝夕左氏傳曰百官承事朝而不夕禮記曰日入而夕又曰朝不廢朝夕不廢夕晉侯將殺豎襄叔向夕楚子之留乾谿右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向瑣闈拜謂之夕郎亦出是名也故曰大采朝日小采夕月又曰春朝朝日秋夕夕月若是其類足矣又加祀焉葢不學者為之也寮曰欲子之書其說吾將施于世可乎予從之蕙田案柳子釋朝夕義詳矣而以加祀爲不學者爲之殆非也古人之于神也一飲食之微蔬食菜羮必祭焉朝日夕月而有祀宜也右日月附錄史記封禪書始皇東遊海上祠八神六曰月主祠之萊山在齊北渤海七曰日主祠成山成山斗入海最居齊東北隅以迎日出各用一牢具祠而巫祝所損益珪幣雜異焉漢書郊祀志髙祖六年長安置祠祀官女巫晉巫祠東君以歳時祠宮中師古曰東君日也武帝本紀元鼎五年十一月辛巳朔旦冬至立泰畤於甘泉天子親郊見朝日夕月師古曰春朝朝日秋暮夕月葢常禮也郊泰畤而揖日月此又別儀郊祀志祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽天子始郊拜泰一朝朝日夕夕月則揖而見通典漢武帝立二十八年始郊泰一朝日夕月改周法其後常以郊泰畤質明出行竹宮東向揖日其夕西向揖月即爲郊日月又不在東西郊遂朝夕常於殿下東面拜日羣公無四朝之事蕙田案西漢無郊天之禮安得有祀日月之事漢書所載乃郊見泰一時所行耳至于朝夕于殿下拜之可見有不能自己于其心者則典禮之宜講明矣漢書武帝本紀太始三年二月幸瑯邪禮日成山孟康曰禮日拜日也如淳曰祭日於成山也郊祀志宣帝修武帝故事盛車服敬齊祀之禮頗作詩歌祠成山於不夜萊山於黄成山祠日萊山祠月京師近縣鄠則有日月祠地理志東萊郡不夜有成山日祠師古曰齊地記云古有日夜出見於東萊故萊子立城以不夜為名郊祀志成帝建始二年匡衡張譚復條奏罷雍舊祠二百三所成山萊山皆罷元始五年丞相衡等議復長安南北郊莽又頗改其祭禮曰四望葢謂日月星海也三光髙而不可得親海廣大無限界故其樂同祀天則天文從祭地則地理從三光天文也山川地理也天地合祭其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祗嘉享萬福降輯後莽又奏言日月靁風山澤易卦六子之尊氣今或未特祀或無兆居謹與太師光大司徒宮羲和歆等議日廟於長安城晉書禮志漢儀毎月旦太史上其月歴有司侍郎尚書見讀其令奉行其正朔前後二日牽牛酒至社下故以祭日日有變割羊以祀社用救日變執事長官衣絳領袖緣中衣絳緣以行禮如故事魏志文帝本紀黄初二年春正月乙亥朝日于東郊晉書禮志禮春分祀朝日於東秋分祀夕月於西漢武帝郊泰畤平旦出竹宮東向揖日西向揖月即郊日月又不在東西郊也後遂旦夕常拜故魏文帝詔曰漢氏不拜日於東郊而旦夕常於殿下東西拜日月煩䙝似家人之事非祀天神之道也黄初二年正月乙亥祀朝日於東郊之外又違禮二分之義通典秘書監薛靖論云案周禮朝日無常日鄭𤣥云用二分秋分之時月多東昇西向拜之背實逺矣朝日宜用仲春之朔夕月宜用仲秋之朔據魏書所引則此朔字當為朏字之誤淳于睿駁之引禮記云祭日於東祭月於西以端其位周禮秋分夕月並行于上代西向拜月雖如背實亦猶月在天而祭之於坎不復言背也猶如天子東西遊幸朝堂之官及拜官猶北向朝拜寧得以背實爲疑魏志明帝本紀太和元年春二月丁亥祀朝日於東郊八月己丑祀夕月於西郊宋書禮志太和元年二月丁亥朔朝日於東郊八月己丑夕月於西郊此古禮也白虎通王者父天母地兄日姊月此其義也晉書禮志武帝太康二年有司奏春分依舊請車駕祀朝日寒温未適可不親出詔曰禮儀宜有常若如所奏與故太尉所撰不同復爲無定制也間者方難未平故每從所奏今戎事弭息惟此爲大案此詔帝復爲親祀朝日也此後廢南齊書禮志永元元年歩兵校尉何佟之議曰葢聞聖帝明王之治天下也莫不尊奉天地崇敬日月故冬至配天於圜丘夏至祭地于方澤春分朝日秋分夕月所以訓民事君之道化下嚴上之義也故禮云王者必父天母地兄日姊月周禮典瑞云王搢大圭執鎮圭藻藉五采五就以朝日馬融云天子以春分朝日秋分夕月覲禮天子出拜日於東門外此處當有脫文觀下盧鄭二條並是解玉藻可見盧植云朝日以立春之日也鄭𤣥云端當爲冕朝日春分之時也禮記朝事議云天子冕而執鎮圭尺有二寸率諸侯朝日於東郊所以教尊尊也故鄭知此端爲冕也禮記保傅云天子春朝朝日秋暮夕月所以明有敬也而不明所用之定辰馬鄭云用二分之時盧植云用立春之日佟之以爲日者太陽之精月者太陰之精春分陽氣方永秋分陰氣向長天地至尊用其始故祭以二至日月禮次天地故朝以二分差有理據則融𤣥之言得其義矣漢世則朝朝日暮夕月魏文帝詔曰覲禮天子拜日東門之外反祀方明朝事議曰天子冕而執鎮圭率諸侯朝日於東郊以此言之葢諸侯朝天子祀方明因率朝日也漢改周法羣公無四朝之事故不復朝於東郊得禮之變矣然旦夕常於殿下東向拜日其禮太煩今採周春分之禮損漢日拜之儀又無諸侯之事無所出東郊今正殿即亦朝會行禮之庭也宜常以春分于正殿之庭拜日其夕月文不分明其議奏魏秘書監薛循請魏書通典俱作薛靖循請二字並衍誤論云舊事朝日以春分夕月以秋分案周禮朝日無常日鄭𤣥云用二分故遂施行秋分之夕月多東昇而西向拜之背實逺矣謂朝日宜用仲春之朔夕月宜用仲秋之朔淳于睿駁之引禮記云祭日于東祭月于西以端其位周禮秋分夕月並行于上世西向拜月雖如背實亦猶月在天而祭之于坎不復言背月也佟之案禮器云爲朝夕必放于日月鄭𤣥云日出東方月出西方又云大明生于東月生于西此陰陽之分夫婦之位也鄭𤣥云大明日也知朝日東向夕月西向斯葢各本其位之所在耳猶如天子東西遊幸朝堂之官及拜官者猶北向朝拜寧得以背實爲疑邪佟之謂魏世所行善得與奪之衷晉初棄圜丘方澤于兩郊二至輟禮至于二分之朝致替無義江左草創舊章多闕宋氏因循未能反古竊惟皇齊應天御極典教惟新謂宜使盛典行之盛代以春分朝于殿庭之西東向而拜日秋分于殿庭之東西向而拜月此即所謂必放日月以端其位之義也使四方觀化者莫不欣欣而頌美旒藻之飾葢本天之至質也朝日不得同昊天至質之禮故𤣥冕三旒也近代祀天著衮十二旒極文章之義則是古今禮之變也禮天朝日既服宜有異頃世天子小朝會著絳紗袍通天金博山冠斯即今朝之服次衮冕者也竊謂宜依此拜日月甚得差降之宜也佟之任非禮局輕奏大典實爲侵官伏追慙震從之蕙田案佟之議甚得禮意但謂于殿庭間東向西向拜之非是魏書太祖本紀天興三年二月丁亥詔有司祀日于東郊禮志天興三年春帝始祀日于東郊用騂牛一秋分祭月于西郊用白羊一太和十五年八月甲寅集羣官詔曰近論朝日夕月皆欲以二分之日於東西郊行禮然月有餘閏行無常凖若一依分日或值月出于東而行禮于西尋情即禮不可施行昔秘書監薛靖等常論此事以爲朝日以朔夕月以朏卿等意謂朏朔二分何者爲是尚書游明根對曰考案舊式推校衆議宜從朏月髙祖本紀太和十六年二月甲午初朝日于東郊遂以爲常八月庚寅車駕初夕月于西郊遂以爲常蕙田案自漢以後朝日夕月之禮至魏髙祖始合于經義周書孝閔帝本紀元年二月癸酉朝日于東郊隋書禮儀志禮天子以春分朝日于東郊秋分夕月于西郊漢法不俟二分于東西郊常以郊泰畤旦出竹宮東向揖日其夕西向揖月魏文帝譏其煩䙝似家人之事而以正月朝日于東門之外前史又以爲非時及明帝太和元年二月丁亥朝日于東郊八月己丑夕月于西郊始合于古後周以春分朝日于國東門外爲壇如其郊用特牲青幣青圭有邸皇帝乗青輅及祀官俱青冕執事者青弁司徒亞獻宗伯終獻燔燎如圜丘秋分夕月于國西門外爲壇于埳中方四丈深四尺燔燎禮如朝日周書武帝本紀保定元年春二月甲午朝日于東郊宣帝本紀宣政元年六月即位秋八月丙寅夕月于西郊隋書髙祖本紀開皇七年二月丁巳祀朝日于東郊禮儀志隋因周制開皇初于國東春明門外爲壇如其郊毎以春分朝日又于國西開逺門外爲坎深三尺廣四丈爲壇于坎中髙一尺廣四尺毎以秋分夕月牲幣與周同北史劉芳傳芳轉太常卿以所置日月之位去城里數於禮有違乃上疏曰臣聞國之大事莫先郊祀郊祀之本實在審位臣學謝全經業乖通古豈可輕薦瞽言妄陳管說竊見所置壇祀逺近之宜考之典制或未允衷既曰職司請陳膚淺據殷周漢魏所行故事依禮朝拜日月皆于東西門外今日月之位去城東西路各三十竊又未審禮又云祭日于壇祭月于坎今計造如上云云詔曰所上乃有明據但先朝置立已久且可從舊隋書音樂志朝日夕月歌詩二首迎送神登歌與圜丘同朝日奏誠夏辭扶木上朝暾嵫山沉暮景寒來遊晷促暑至馳輝永時和合璧耀俗泰重輪明執圭盡昭事服冕罄䖍誠夕月奏諴夏辭澄輝燭地域流耀鏡天儀歴草隨弦長珠胎逐望虧成形表蟾兔竊藥資王母西郊禮既成幽壇福惟厚唐書禮樂志春分朝日于東郊秋分夕月于西郊廣四丈髙八尺者朝日之壇也爲坎深三尺縱廣四丈壇于其中髙一尺方廣四丈者夕月之壇也舊唐書禮儀志武德貞觀之制春分朝日于國城之東秋分夕月于國城之西各用方色犢一籩豆各四簠簋㽅爼各一音樂志祀朝日樂章八首貞觀中作今行用降神用豫和詞同冬至圜丘皇帝行用太和詞同冬至圜丘夕月同登歌奠玉帛用肅和惟聖格天惟明饗日帝郊肆類王官戒吉珪奠春舒鐘歌曉溢禮云克備斯文有秩迎神用雍和晨儀式薦明祀惟光神物爰止靈暉載揚𤣥端肅事紫幄興祥福履攸假於昭令王皇帝酌獻飲福用夀和詞同冬至圜丘夕月同送文舞出迎武舞入用舒和崇牙樹羽延調露旋宮扣律掩承雲誕敷懿德昭神武載集豐功表睿文武舞用凱安詞同冬至圜丘送神用豫和詞同冬至圜丘夕月同又祀朝日樂章二首太樂舊有此辭不詳所起迎神太陽朝序王宮有儀蟠桃彩駕細柳光馳軒祥表合漢歴彰竒禮和樂備神其降斯送神五齊兼飭百羞具陳樂終廣奏禮畢崇禋明鑒萬㝢昭臨兆人永流洪慶式動曦輪祀夕月樂章八首貞觀中作今行用登歌奠玉帛用肅和測妙爲神通㣲曰聖坎祀貽則郊禋展敬璧薦登光金歌動暎以載嘉德以流曾慶迎爼用雍和朏晨争舉天宗禮闢夜典凉秋陰明湛夕有􅟍斯㫖有牲斯碩穆穆其暉穰穰是積送文舞出迎武舞入用舒和合吹八風金奏動分容萬舞玉鞘驚詞昭茂典光前烈夕耀乗功表盛明五禮通考卷三十三
