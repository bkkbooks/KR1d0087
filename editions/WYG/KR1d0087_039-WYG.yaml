body:
  text: 五禮通考卷二十九刑部尚書秦蕙田撰吉禮二十九明堂宋史高宗本紀紹興元年九月辛亥合祭天地于明堂太祖太宗並配大赦禮志紹興元年禮部言國朝冬祀大禮神位六百九十行事官六百七十餘員今鹵簿儀仗祭器法物散失殆盡不可悉行宗廟行禮又不可及天地明堂之禮可舉而行乞詔有司討論以聞禮部御史太常寺言仁宗明堂以大慶殿爲之今乞于常御殿設位行禮乃下詔曰肇稱吉禮已見于三歲之郊載考彞章當間以九筵之祀因秋成物輯古上儀會天地以同禋升祖宗而並配乃以九月十八日行事先是紹興初權禮部尚書胡直孺等言國朝配祀自英宗始配以近考司馬光呂誨争之以爲詘祖進父然卒不能奪王珪孫抃之諂辭其後神宗謂周公宗祀在成王之世成王以文王爲祖則明堂非以考配明矣王安石亦對以誤引孝經嚴父之説惜乎當時無有辨正之者今或者曰后稷爲周之祖文王武王是爲二祧高祖爲漢之祖孝文孝武特崇兩朝皆子孫世世所奉承者太祖爲帝者祖太宗真宗宜爲帝者宗皇祐以一祖二宗並配議出于此直孺等聞前漢以高祖配天後漢以光武配明堂葢古之帝王非建邦啓土者皆無配天之祭故雖周之成康漢之文景明章其德業非不美也然而子孫不敢推以配天者避祖宗也有宋肇基創業之君太祖是已太祖則周之后稷配祭于郊者也太宗則周之文王配祭于明堂者也此二祭者萬世不遷之法皇祐宗祀合祭天地固宜以太祖太宗配當時葢拘于嚴父故配帝并及于真宗今主上紹膺大統自真宗至于神宗均爲祖廟獨躋則患在于無名並配則幾同于祫享今參酌皇祐詔書請合祭昊天上帝皇地祗于明堂奉太祖太宗以配唯禮專而事簡庶幾可致力于神萬世行之可也蕙田案此議宗祀之理極是但合祭天地祖宗並配則非禮也宜未幾爲章誼所駁矣文獻通考時太常少卿蘇遲等則請用皇祐詔書之意兼采景祐禮官之請即常御殿南向西上設昊天上帝皇地祗位西向北上設太祖太宗真宗神位于殿之東廡設圜丘第一龕九位于殿之西廡設方澤第一成一十六位庶幾誠意可展儀物可備如以不徧及列聖爲未足則大禮前一日有親詣太廟之文今神主在温州恐當命大臣于某處攝行祀事如以不徧及百神爲未足則請即行在天慶觀之恐有脱字大享後擇一日取祖宗大禮既畢恭謝之文亦命大臣簡其儀物悉舉以告亦足以盡祈報之心詔依禮部新儀一遵皇祐二年詔書仍以明堂大禮爲稱于常御殿設位行禮禮部言凖詔參酌皇祐詔書合祭天地于明堂奉太祖太宗以配合用神位四位元係御筆明金青字出雕木鏤金五綵裝蓮花戲龍座黃紗明金罩子黄羅夾軟罩子黄羅襯褥朱紅漆腰摺套匣黃羅夾帕事件全昨縁揚州渡江失去乞下所屬制造從之先時有司請議明堂禮部侍郎陳與義議曰竊惟明堂之禮有漢武帝汶上之制紹興元年實已行之若再舉而行適宜于今事無戾于古典或謂自維揚南郊之後至于今日再遇當郊之歲不可以踰六年而不郊以臣考之郊之䟽數本無定制或以周公嚴父之文爲疑則既有治平中司馬光呂誨之議又有熙寧中祖宗之聖訓與王安石之説足以破萬世之惑矣或以並配之禮爲疑謹案皇祐詔書其略曰國朝自祖宗以來三歲一郊今祀明堂正當三歲親郊之期而禮官所定配坐不及祖宗宜並配以稱朕恭事祖宗之意葢太祖則周之后稷當配祭于郊者也太宗則周之文王當配祭于明堂者也郊當祭太祖而以當郊之歲舉明堂之禮則不可以遺太祖而不祭稽之神理本之人情則皇祐詔書之本意可以爲萬世不刋之典詔從之葢中興郊祀明堂合祭天地並配祖宗之禮參考推明至與義之議而始定于是太常寺條具乞以明堂大禮爲稱左僕射誓行事執事陪祠官于尚書省刑部尚書莅誓明堂殿上下徹去黄道䄄褥入殿門不張葢百官不得囘班御燎從物繖扇更不入殿行禮前衞士不起居呼萬歲讀冊官讀冊至御名勿興詔並從之王居正傳建炎中遷禮部員外郎建議合祭天地于明堂請奉太祖太宗配范宗尹是之議遂定宋史高宗本紀二年閏四月己未詔自今明堂專祀昊天上帝以太宗配章誼傳詔集議明堂配享胡直孺等請合祭天地而以太祖太宗配誼言稽之經㫖則未合參之典故則未盡施之事帝則未爲簡嚴今國家既以太祖配天于郊比周之后稷則太宗宜配帝于明堂以比周之文王仁宗皇祐二年始行明堂合祭天地並配祖宗乃一時變禮至嘉祐七年再行宗祀已悟皇祐之非乃罷配享仍徹地示之位故有去並侑煩文之詔如嘉祐之詔則太祖地示已不與祭元豐正祀典之詔則悉罷羣祀臣等謂將來明堂大饗宜專祀昊天上帝而以太宗配後不果行四年四月詔明堂用皇祐典禮兼祀天皇大帝神州地祗以下諸神六月作明堂行禮殿于教塲九月辛酉合祭天地于明堂大赦玉海初紹興宗祀止設天地祖宗四位至四年始設從祀神位四百四十三用祭器七千五百七十一登歌樂四十祭服六十三玉十二犢四羊豕各二十有二分獻官五十八奉禮郎四樂舞工各二百八十七而五帝神州地祗上不親獻用崇寧禮也始議設從祀諸神七百十一位議者請裁省禮官言十二階三百六十位無神名請每階各設三十五位七月戊辰請如祖宗故事權御臺門肆赦議者以宮門地隘儀衞不能容乃止赦于常御殿前赦文云遵皇祐之遺則舉合祀並配之儀續會稽之闕文處四望六宗之位宋史禮志四年太常寺看詳國子監丞王普言明堂有未合禮者十一事其一謂陶匏用于郊丘玉爵用于明堂今兹明堂實兼郊禮宜用陶匏他日正宗祀之禮當奉玉爵其二禮經太牢當以牛羊豕爲序今用我將之詩遂以羊豕牛爲序所謂以辭害意豈有大用牲作元祀而反在羊豕之後者其三陳設尊罍宜倣周官司尊彞秋嘗之制其四泛齊醴齊宜代以今酒而不易其名其五其六祭器冕服當從古制其七皇帝未後詣齋室則是致齋二日有半乞用質明以成三日之禮其八齋不飲酒茹葷乞罷官給酒饌俾得專心致志交于神明其九設神位版及升烟奠冊不當委之散吏其十十一皆論樂並從之文獻通考國子監丞王普言大禮明堂有未合典禮之事正配每位設太尊三著尊三犧尊象尊壺尊山尊各一又設罍如尊之數太尊一實供内法酒一實汎齊一實醴齊著尊一實祠祭法酒一實盎齊犧尊實醍齊象尊實沈齊壺尊實昔酒山尊實事酒大罍一實清酒餘皆實明水謹案周禮春祠夏禴用兩犧尊兩象尊秋嘗冬烝用兩著尊兩壺尊四時之間祀用兩太尊兩山尊又曰凡祭祀供五齊三酒以實八尊然則六尊之數凡十有二其當時所用者四其設而不酌者八明堂乃季秋大享則初獻當用兩著尊一實𤣥酒一實醴齊亞終獻當用兩壺尊一實𤣥酒一實盎齊皆有罍如尊之實又設兩太尊兩山尊兩犧尊兩象尊實五齊三酒而不酌罍亦如之今祭祀所用惟九尊而首設太尊者三以供内法酒及泛齊醴齊實之又設著尊者二以祠祭法酒及盎齊實之又設犧尊象尊壺尊山尊各以醍齊沈齊事酒昔酒實之尊之數不足以盡五齊三酒也又設大罍以清酒實之𤣥酒不與齊酒對設也則又爲八罍以實之且在三酒之後焉葢不論所設之適與所陳之義但取遍于尊罍之數而已實無經據也宜倣司尊彞秋嘗之制設兩著尊一實𤣥酒一實醴齊以俟初獻又設兩壺尊一實𤣥酒一實盎齊以俟亞獻終獻其餘八尊以實五齊三酒設而不酌悉如周官之制其醴齊請以祠祭法酒代之其盎齊請以供内法酒代之增三尊爲十二之數庶與周官相應又言案祭器實倣聶崇義三禮圖制度如爵爲爵形負盞于背則不可以反坫簠簋如桶其上爲龜則不可以卻葢此類甚多葢出于臆度而未嘗親見古器也自劉敞著先秦古器記歐陽修著集古録李公麟著古器圖呂大臨著攷古圖乃親得三代之器騐其欵式可以爲據政和新成禮器制度皆出于此其用銅者嘗有詔許外州以漆木爲之至主上受命于應天郊祀于維揚皆用新成禮器初未嘗廢止縁渡江散失無有存者昨來明堂所用乃有司率意略倣崇義三禮圖其制非是宜並從古器制度爲定其簠簋尊罍之屬仍以漆木代銅庶幾易得成就七年九月辛巳合祭天地于明堂大赦文獻通考時徽宗升遐上躬行三年之䘮禮部太常寺言景德熙豐南郊故事皆在諒陰中當時親郊行禮除郊廟景靈宮合用樂外所有鹵簿鼓吹及樓前宮架諸軍音樂皆備而不作其逐處警場止鳴金鉦鼓角乞依累朝故事行太常傅士孫邦乞自受誓戒日皇帝暨百僚禁衞等權易吉服至禮成還内仍舊中書舍人傅崧卿援嚴父之文欲陞徽宗配享詔令侍從臺諫禮官同議禮部侍郎陳公輔言陛下方居道君皇帝之䘮而道君皇帝神靈方在几筵豈可遽預配祭之禮况梓宮未還祔廟未有定議臣愚以爲當先期一日陛下盡哀致奠奏于道君皇帝以將有事明堂暫離几筵暫假吉服葢國家故事不敢廢也然後即齋宮入太廟行明堂事事畢服䘮如初斯謂合禮宋史禮志陳公輔言今梓宮未還廟社未定疆土未復臣竊意祖宗上皇神靈所望于陛下者必欲興衰撥亂恢復中原迎還梓宮歸藏陵寢以隆我宋無疆之業若如議者之言以陛下貴爲天子上皇北狩十有一年未獲天下之養今不幸而崩且欲因明堂之禮追配上帝謂是足以盡人子之孝則于陛下之志恐亦小矣宜依故事合祭天地祖宗並侑太上升配似未可行文獻通考吏部尚書孫近等議引司馬光之説曰近世祀明堂者皆以其父配此乃誤認孝經之意而違先王之禮不可以爲法况梓宮未還几筵未除山陵未下而遽議配侑之事乎臣等伏請今年明堂大禮權依紹興元年詔書請俟削平僣亂恢復大業然後定郊祀明堂之議一從成周庶不失禮經之正詔從之宋史朱震傳故事當䘮無享廟之禮時徽宗未祔廟太常少卿吳表臣奏行明堂之祭震因言王制䘮三年不祭惟天地社稷爲越紼而行事春秋書夏五月乙酉吉禘于莊公公羊傳曰譏始不三年也國朝景德二年眞宗居明德皇后䘮既易月而除服明年遂享太廟合祀天地于圜丘當時未行三年之䘮專行以日易月之制可也在今日行之則非也詔侍從臺諫禮官參議卒用御史趙渙禮部侍郎陳公輔言大饗明堂玉海紹興九年八月討論明堂祭服禮器高宗本紀十年九月庚戌合祀天地于明堂大赦玉海十年九月十日辛亥復行明堂禮太常定儀注自誓戒致齋至飲福燎瘞是歲始用大樂飲福用金爵蕙田案紀稱庚戌玉海稱辛亥必有一誤文獻通考太常寺修定明堂大禮儀注誓戒同郊祀致齋三日一日于文德殿一日于太廟一日再赴文德殿儀並同郊祀但改大慶殿爲文德殿奏告前祀二日奏告太祖皇帝太宗皇帝室如常告之儀陳設内玉幣籩豆簠簋爼實尊罍酒齊數目並同郊祀不重録惟實爼増羊腥豕腥如牛腥之數前祀三日有司設大次于垂拱殿門内東廊又設小次于明堂阼階下之東稍南西面設文武侍臣次于明堂門外行事執事陪祠宗室及有司次于明堂門外設東方南方客使次于文臣之後西方北方客使次于武臣之後設饌幔于明堂門外稍西南向前祀二日太社令帥其屬掃除明堂之内外置燎壇于明堂庭之東南隅太社令積柴于燎壇光禄牽牲詣祠所太常設登歌之樂于堂上前楹間稍南北向設宮架于庭中立舞表于酇綴之間前祀一日太常設神位版昊天上帝皇地祗位于堂上北方南面西上太祖皇帝太宗皇帝位于堂上東方西向北上告潔畢權徹五方帝神州地祗大明夜明天皇大帝北極五行五官五