穆安四阿有嚴神既戾止備物雖儀潔誠唯已有來振振相我熙事載酌陶匏以成毖祀終獻穆安誠一爲專禮三而稱孰陪邦祠唯我同姓金絲屢調玉圭交映是謂熙成福來神聽皇帝飲福胙安孰謂天逺至誠則通孰謂地厚與天則同惠我純嘏克成大功握圖而治如日之中徹豆歆安工祝告休笙鏞云闋酒茅既除牲爼斯徹幽明罔恫中外咸悦禮成伊何天地同節送神誠安奕奕宗祀煌煌禮文高靈下堕精意升聞熙事既畢忽乗青雲敢拜明貺永清世氛望燎儀安載酌載獻以純以精歌傳夜誦物備秋成報本斯極聽卑則明願儲景貺福我羣生望瘞儀安禮協豐融誠交彷彿辟公受膰宗祀臨瘞貽我來牟以興嗣歲山川出雲天地同氣還大次憩安應天以實已事而竣氊案朝帝竹宮拜神靈光下燭協氣斯陳福禄時萬基圖日新蕙田案明堂自政和建立以後制度之詳宗祀之典其合于古者葢十有八九誠千載之嘉會也高宗南渡雖文物散失而典章尚有可考迺不思率由舊章俾盈庭築舍舉一切非禮之事踵而仍之合祭天地並配祖宗宗祀嚴父從祀諸神至七百七十一位大駕字圖用一萬一百四十人壇座龎雜儀衞繁費何其舛也厥後承訛益謬國勢遂以日削不亦惜哉禮志孝宗乾道五年太常少卿林栗乞四祭並即圜壇禮部侍郎鄭聞謂明堂當從屋祭不當在壇有司攝事當于望祭殿行禮從之文獻通考中興後昊天上帝四祀春祈夏雩秋享冬報其二在南郊圜壇其二在城西惠照院望祭齋宮紹興十九年八月葺惠照望祭殿建齋宮于其西凡十有一區孝宗本紀淳熙六年九月辛未合祭天地于明堂大赦禮志淳熙六年以羣臣議復合祭天地並侑祖宗從祀百神如南郊文獻通考先時詔今歲行明堂大禮令禮部太常寺詳議宰執進呈禮寺議狀竊觀黄帝拜祀上帝于明堂唐虞祀五帝于五府厯時既久其詳莫得而聞至禮記始載明堂位一篇言天子負斧依南向而立内之公侯伯子男外之蠻夷戎狄以序而立故曰明堂也者明諸侯之尊卑也孟子亦曰明堂者王者之堂也周禮大司樂有冬至圜丘之樂夏至方丘之樂宗廟九變之樂三者皆大祭祀唯不及明堂豈非明堂者布政會朝之地周成王時嘗于此歌我將之頌宗祀其祖文王乎後暨漢唐雖有沿革至于祀帝而配以祖宗多由義起未始執一本朝仁宗皇祐中破諸儒異同之論即大慶殿行親享之禮並侑祖宗從以百神前期朝獻景靈宮享太廟一如郊祀之制太上皇帝中興斟酌家法舉行皇祐之制于紹興之初亦在殿庭合祭天地並配祖宗葢得聖經之遺意且國家大祀有四春祈穀夏雩祀秋明堂冬郊祀是也陛下即位以來固嘗一講祈穀四躬冬祀唯合宮雩壇之禮猶未親行今若據已行典禮及用仁宗時名儒李覯明堂嚴祖説并治平中呂誨司馬光錢公輔等集議近歲李燾奏劄所陳特舉秋享于義爲允上曰明堂合祭天地並侑祖宗從祀百神並依南郊禮例可依詳議事理施行蕙田案九變之樂不及明堂者天神同也乃專以爲布政會朝之地而以祀帝配祖爲義起謬矣周人宗祀文王何嘗有二配乎不舉政和之典而以紹興之初舉行皇祐之制爲得聖經遺意將誰欺耶雖當時國勢僝弱不能興復大禮爲茍且簡便之計然有其廢之不舉則已耳不得以非禮爲正而踵行之也周必大玉堂雜記時必大爲禮部尚書特主此議過矣禮部太常寺言明堂所設神位並依南郊禮例繫七百七十一位今大慶殿鋪設昊天上帝皇地祗太祖皇帝太宗皇帝四位其從祀神位凡七百六十有七于東西兩朶殿鋪設五方帝至五嶽二十五位餘從祀衆星東廊二百八十位西廊二百四十八位南廊六十六位欲于南廊前連簷修葢瓦屋與東西廊相接設一百四十八位依議令合設饌幔欲于新置便門外幔道下結縳搭葢屋二間及合用祝冊幄次乞于南宮門裏過道門下面東兩壁釘設其禮部捧冊職掌等乞于過道門面南壁宿齋其皇帝位版幄次乞于内藏庫相對廊上釘設從之太史局言將來明堂大禮合祭天地並侑祖宗從祀百神並依南郊禮例今照得明堂兩朶殿上鋪設神位版共二十五位其上十位五方帝昊天上帝皇地祗神州地祗夜明大明共十位並金面青字大版内一十五位五行五官五瀆皆朱紅漆面金字小版將來鋪設大小不等乞下所屬創造朱紅漆面金字大版神位一十五位從之御書明堂明堂之門六字并嗣天子臣御名恭書七字令修内司製造牌二面將來明堂大禮其明堂牌于行禮殿上安掛其明堂之門牌于行禮殿西門新置便門上安掛蕙田案當時誕慢之景宛然可見國事如此其可爲乎周必大玉堂雜記己亥三月丁卯詔今歲郊祀以例約束省費下禮部太常寺議明堂大禮予以禮部尚書兼翰林學士與諸儒議以聞乙亥有㫖從之辛酉午時集官受誓戒丙寅大雨丁卯鎖院草赦戊辰百執事冒雨入麗正門過後殿請皇帝致齋己巳上乗逍遥車朝獻景靈宮入太廟宿齋四日之間雨晝夜傾注通衢殆如溪澗有㫖來早不乗玉輅止用逍遥車徑入北門趨文德殿致齋朝服導駕官皆改常服應儀仗排立人並放趙相爲大禮使宻諭有司未得放散黄昏後雨驟止夜分内侍李思恭傳㫖御史臺閤門太常寺仍舊乗玉輅府合行事件疾速施行庚午昧爽駕來登輅必大執綏上喜曰且得晴霽辛未行禮月色如畫上拜起不倦以迄于成黎明登樓肆赦簮花過德夀宮人情熙然赦書乃必大視草其間云唯周成宗祀洛中陟配于文王唯漢武合祠汶上推嚴于高帝皆用親郊之禮具殚尊祖之誠於鑠本朝若稽前代俶經路寢有皇祐之彞儀徧秩羣神有紹興之近制不愆于素可舉而行葢欲明著古禮以示來世也後數日加恩羣臣必大復草趙相制云祼將太宮霖潦驟霽陟恪大寢月華正中又云鎮定大事如彦博之恢宏貫通羣經如宋庠之博洽皆紀一時之事且以仁宗初行明堂二公實爲相也蕙田案己亥必大奉詔議狀即通考第一條摘録者是也並祭合祀其論起于皇祐宋庠之議文潞公附和成之方爲明堂典禮之累紹興旋覺其非大經集議斷自宸衷始克追復古制乃觀其所議及草制云俶經路寢有皇祐之彞儀徧秩羣神有紹興之近制又云鎮定大事如彦博之恢宏貫通羣經如宋庠之博洽其意直以皇祐爲是而靦然自以爲得斯亦陋矣宋史孝宗本紀淳熙九年九月辛巳大享明堂十五年九月辛丑大享明堂以太祖太宗配禮志十五年九月有事于明堂上問宰執配位周必大奏昨己申請高宗几筵未除用徽宗故事未應配坐且當以太祖太宗並配畱正亦言之上曰有紹興間典故可參照無疑尤袤傳淳熙十四年將有事于明堂詔議升配袤主紹興孫近陳公輔之説謂方在几筵不可配帝且歴舉郊歲在䘮服中者凡四維元祐明堂用呂大防請升配神考時去大祥止百餘日且祖宗悉用以日易月之制故升侑無嫌今陛下行三年之䘮高宗雖已祔廟百官猶未吉服詎可近違紹興而逺法元祐升侑之禮請俟喪畢議之詔可文獻通考淳熙十五年大享明堂以在高宗諒闇之内自受誓戒以後權易吉服禮畢仍舊其朝獻景靈宮朝饗太廟恭謝景靈宮並遣官分詣行禮仍免紫宸殿稱賀太常寺言今年九月有事于明堂檢照紹興三十一年六月十六日禮官議案禮經喪三年不祭唯祭天地社稷爲越紼而行事元祐之初大享明堂而哲宗居神祖之喪禮官謂景靈宮太廟當用三年不祭之禮遣大臣攝事或謂聖祖爲天神非廟享也當時雖從其説然黄帝實我宋之所自出豈得不同于宗廟今秋有事于明堂以孝慈淵聖皇帝升遐主上持斬衰之服考之禮經及元祐已行故事并當時禮官所議竊謂前期朝獻景靈宮朝享太廟皆當遣大臣攝事主上唯親行大享之禮其玉帛牲牢禮料器服樂舞凡奉神之物依典禮外鑾駕既不出宮所有車輅儀仗供張宿頓之屬令有司更不排辦禮畢于殿庭宣赦及朝享景靈宮朝享太廟縁皇帝在高宗聖神武文憲孝皇帝諒闇之内乞依上件典故從之權禮部侍郎尤袤等言逐次明堂大禮所設神位沿革不一紹興四年七年十年設昊天上帝皇地祗太祖皇帝太宗皇帝并天皇大帝以下從祀四百四十三位紹興三十一年設昊天上帝徽宗皇帝并五方帝五人帝五官神從祀共一十七位淳熙六年九年設昊天上帝皇地祗太祖皇帝太宗皇帝并天皇大帝已下從祀共七百七十一位宰執進呈禮官申請明堂畫一上曰配位如何周必大奏禮官昨己申請高宗几筵未除用徽宗故事未應配坐且當以太祖太宗並配他日高宗几筵既除自當別議大抵前代儒者多用孝經嚴父之説便謂宗祀專以考配殊不知周公雖攝政而主祭則成王自周公言之故曰嚴父耳晉紀瞻答秀才䇿曰周制明堂宗其祖以配上帝故漢武帝汶上明堂捨文景而逺取高祖爲配此其證也畱正奏嚴父莫大于配天則周公其人也是嚴父專指周公而言若成王則其祖也上曰有紹興間典故自可參照可以無疑建炎以來朝野雜記明堂者仁宗皇祐中始行之其禮合祭天地並配祖宗又設從祀諸神如郊丘之數政和七年既建明堂于大内自是歲以九月行之然獨祀上帝而配以神宗惟五帝從祀紹興元年上在㑹稽將行明堂禮命邇臣議之王剛中居正爲禮部郎官首建合祭之議宰相范覺民主之乃以常御殿爲明堂但設天地祖宗四位而已四年始設從祀諸神七年復祀明堂而徽宗崩問已至中書舍人傅崧卿請增設道君太上皇帝配位于太宗之次禮部侍郎陳公輔言道君方在几筵未可配帝乃不行三十一年始宗祀徽宗于明堂以配上帝而祀五天帝五人帝于明堂上五官神于東廂罷從祀諸神位用熙寧禮也乾道以後説者以徳壽宮爲嫌止行郊禮淳熙六年用李仁父周子充議復行明堂之祭並侑焉逮十四年高宗崩明年秋季乃用嚴父之典今郊祀從紹興明堂從皇祐惟歲時常祀則以太祖配冬至圜丘太宗配祈穀大雩髙宗配明堂宗祀葢尤延之爲禮官時所請云光宗本紀淳熙十六年閏五月癸酉詔季秋有事于明堂以高宗配文獻通考淳熙十六年光宗既受禪閏五月禮官言冬祀配以太祖而春夏秋皆配以太宗祖有功宗有德故推以配上帝高宗身濟大業紹開中興揖遜之美越超于古功德茂盛爲宋高宗秋享明堂宜奉以升侑又謂我將祀文王實在成王之時錢公輔司馬光呂誨皆以爲嚴祖今以高宗配于周制爲合于是高宗始配上帝宋史樂志紹興淳熙分命館職定撰十七首降神景安圜鐘爲宮上直房心時惟明堂配天享親宗祀有常盛德在金日吉辰良享我克誠來格來康黄鐘爲角合宮盛禮金商令時備成熙事蒐揚上儀駿奔在庭精意肅祇來享嘉薦神靈燕娭太蔟爲徴休德孔昭靈承上帝孝極尊親嚴配于位嘉薦芬芳禮無不備神其格思享兹誠至姑洗爲羽霜露既降孝思奉先陟降上帝禮隆九筵有馨黍稷有肥牲牷神來燕娭想像肅然盥洗正安禮經之重祭典爲宗上公攝事進退彌恭庶品豐潔令儀肅雍百祥萃止惟吉之從升殿正安皇祖配帝歲祀明堂冕服陟降玉珮瑲瑲疾徐有節進止克莊維時右享日靖四方上帝位奠玉幣嘉安大享季秋百執揚厲明明太宗赫赫上帝祇薦忱誠式嚴圭幣祚我明德錫兹來裔太宗位奠幣宗安穆穆皇祖丕昭聖功聲律身度樂備禮隆祇薦量幣祀于合宮玉帛萬國驩心載同捧爼豐安備物昭陳工祝告具維羊維牛孔碩孔庶有嘉維馨加食宜飫歛時五福永膺豐胙上帝位酌獻嘉安􅂱彼房心明明有融維聖享帝禮行合宮祀事時止粢盛潔豐昭受申命萬福攸同太宗位酌獻德安受命溥將勲高百王寰宇大定聖治平康有嚴陟配宗祀明堂神保是格申錫無疆徹豆肅安於皇上帝肅然來臨恭薦芳爼以達高明烹飪既事享于克誠以介景福惟德之馨送神景安帝在合宮鑒觀盛禮黍稷惟馨神心則喜禮備樂成亦既歸止億萬斯年以貺多祉高宗位奠幣宗安赫赫高廟于堯有光覆被萬祀冠冕百王有量斯幣蠲潔是將在帝左右維時降康配獻德安炎運中興蒼生載寧九秩燕豫三紀豐凝精祀上帝陟配威靈錫羨胙祉萬世承承蕙田案此高孝兩朝遞有更定史家總而載之其中已有高宗配位故列于此五禮通考卷二十九
