與前間一歲定冬至丁丑申時元祐五年庚午歲十一月壬午冬至大衍癸未巳正二刻宣明癸未未初二刻紀元壬午夜子初初刻統天壬午夜子初一刻重修大明壬午夜子初一刻授時壬午夜子初初刻江氏永曰此與前間一歲定冬至壬午亥時元祐七年壬申歲十一月癸巳冬至大衍癸巳亥正一刻宣明甲午丑初一刻紀元癸巳巳正三刻統天癸巳巳正三刻重修大明癸巳巳正三刻授時癸巳巳正三刻江氏永曰此年平冬至癸巳午正二刻四分定冬至巳初哲宗元符元年戊寅歲十一月甲子冬至大衍乙丑巳初二刻宣明乙丑午正二刻紀元甲子亥正初刻統天甲子亥初三刻重修大明甲子亥正初刻授時甲子亥初三刻江氏永曰此年平冬至甲子二十三時二十六分一十六秒夜子初一刻十分定冬至戊時案授時百年長一之率年逺則所加分漸贏其所定歲餘刻下二十五分又失之太弱是以推逺年之冬至恒先天推近年之冬至恒後天開元甲子及此條斷定大衍授時二術之弊一行守敬其何説之辭徽宗崇寧三年甲申歲十一月丙申冬至大衍丙申戊正三刻宣明丙申夜子初三刻紀元丙申巳初初刻統天丙申辰正三刻重修大明丙申巳初初刻授時丙申辰正二刻江氏永曰此年平冬至丙申巳正一刻四分定冬至夘辰之間光宗紹熈二年辛亥歲十一月壬申冬至大衍癸酉寅初初刻宣明癸酉夘正二刻紀元壬申未初三刻統天壬申午初一刻重修大明壬申未初三刻授時壬申午初一刻江氏永曰此年平冬至壬申午正初刻都臨安遲一刻午正一刻定冬至在己末寧宗慶元三年丁巳歲十一月癸夘日南至大衍甲辰未正初刻宣明甲辰酉初三刻紀元甲辰子正二刻統天癸夘亥正一刻重修大明甲辰子正三刻授時癸夘亥正一刻江氏永曰此年平冬至癸夘亥正三刻八分臨安遲一刻夜子初初刻八分定冬至亥初三刻寧宗嘉泰三年癸亥歲十一月甲戌日南至大衍丙子丑正一刻宣明丙子夘初初刻紀元乙亥午初三刻統天乙亥巳初初刻重修大明乙亥午初三刻授時乙亥巳初一刻江氏永曰推此年平冬至乙亥巳初三刻臨安已正初刻定冬至約減五刻有竒在辰正二刻當時推甲戌術誤也嘉定五年壬申歲十一月壬戌日南至大衍癸亥夘正初刻宣明癸亥巳初四刻紀元壬戌申初二刻統天壬戌未初二刻重修大明壬戌申正初刻授時壬戌未初二刻江氏永曰此年平冬至壬戌未正初刻四分臨安遲一刻未正一刻四分定冬至午正一刻理宗紹定三年庚寅歲十一月丙申日南至大衍丁酉申初二刻宣明丁酉戌初二刻紀元丁酉丑初三刻統天丙申亥正一刻重修大明丁酉丑初三刻授時丙申亥正一刻江氏永曰此年平冬至丙申亥正二刻十一分臨安亥正三刻十一分定冬至亥正初刻淳祐十年庚戌歲十一月辛巳日南至大衍壬午未初初刻宣明壬午酉初初刻紀元辛巳亥正三刻統天辛巳酉正二刻重修大明辛巳亥正一刻授時辛巳酉正三刻江氏永曰此年平冬至辛巳酉正三刻十一分臨安戌初初刻十一分定冬至酉正二刻元世祖至元十七年庚辰歲十一月己未夜半後六刻冬至大衍己未亥初初刻宣明庚申丑初一刻紀元己未夘初初刻統元己未丑初初刻重修大明己未夘正初刻授時己未丑初一刻江氏永曰推此年平冬至五十五日一時一十八分四十六秒己未丑初一刻四分髙衝在冬至後四分竒約減均十二秒加時約五分定冬至丑初一刻九分與當時郭太史測算氣應五十五日六百分者宻合梅氏文鼎曰以上自魯僖公以來冬至日名共四十七并至元辛巳有刻為四十八事授時法合者三十八不合者昭公己夘劉宋元嘉丙子大明辛丑陳太建壬辰丁酉隋開皇甲寅唐貞觀甲辰己酉宋景徳丁未嘉泰癸亥共十統天術同江氏永曰四十七事日名或有不合其間有術誤有史誤今以實法考之合者不約而符不合者亦灼然可見非術誤推即史誤紀雖去之千百年猶旦暮也此如以有法之度度短長有凖之權權輕重故物莫能遁若大衍諸厯歲餘或强或弱如權度未定既不可以稱量而統天之距差躔差授時之百年長一又於執秤執尺之時參以智巧之私實為無理之法其不合者固不合其幸合者亦不知其實未嘗合也近年冬至時刻可定去之逺者不能細定分刻以小輪半徑古多今少難得確率耳若其大致固可上下參考而知當不違天甚逺孟子曰茍求其故愚謂恒歲實最卑行小輪差皆其故也後之言天者精求諸此而已若諸家立法雖不可不知要之皆已陳之芻狗不可再用者也梅氏又曰元史云自春秋獻公以來凡二千一百六十餘年用六術推算冬至凡四十九事大衍合者三十二不合者十七宣明合者二十六不合者二十三紀元合者三十五不合者十四統天合者三十八不合者十一大明合者三十四不合者十五授時合者三十九不合者十事案獻公十五年戊寅歲正月甲寅朔旦冬至授時得甲寅統天得乙夘後天一日至僖公五年正月辛亥朔旦冬至授時統天皆得辛亥與天合下至昭公二十年己夘歲正月己丑朔旦冬至授時統天皆得戊子並先一日若曲變其法以從之則獻公僖公皆不合矣以此知春秋所書昭公冬至乃日度失行之騐一也江氏永曰案獻公之年史有參差所推甲寅朔旦冬至乃劉歆三統厯以四分之法逆推非有實測紀之信史不足為㨿若左氏傳二至則當時之術誤乃欲曲法以求合合者一而違者一不悟其幸合者之非真而以其不合者諉之於日度失行此大惑也大衍考古冬至謂劉宋元嘉十三年丙子歲十一月一甲戌日南至大衍與皇極麟徳三術皆得癸酉各先日乃日度失行非三術之差今以授時考之亦得癸酉二也江氏永曰案今以法推正得甲戌日度何嘗失行大明五年辛丑歲十一月乙酉冬至諸術皆得甲申殆亦日度之差三也江氏永曰此年冬至祖沖之考之特詳正頼當年實測可騐髙衝之所在與兩心差之細數雖推算時刻未甚親亦可得其所以未親之由今以法宻算其為乙酉甚確郭氏不悟統天之活法不足憑獻僖逺年之幸合未可據乃以祖氏當年實測指為日度失行不亦惑乎觀承案算術有踈宻耳天行安得有差乎以為日度失行郭氏此說誠謬此如杜氏解左傳不以為傳誤而以為經誤者同病矣陳大建四年壬辰歲十一月丁夘景長大衍授時皆得丙寅是先一日大建九年丁酉歲十一月壬辰景長大衍授時皆得癸巳是後一日一失之先一失之後若合於壬辰則差於丁酉合於丁酉則差於壬辰亦日度失行之驗五也江氏永曰案壬辰歲不誤丁酉歲則史誤也開皇十一年辛亥歲十一月丙午景長大衍統天授時皆得丙午與天合至開皇十四年甲寅歲十一月辛酉冬至而大衍統天授時皆得壬戌若合于辛亥則失于甲寅合于甲寅則失于辛亥其開皇十四年甲寅歲冬至亦日度失行六也江氏永曰案甲寅歲乃術誤唐貞觀十八年甲辰歲十一月乙酉景長諸術得甲申貞觀二十三年巳酉歲十一月辛亥景長諸術皆得庚戌大衍議以永淳開元冬至推之知前二冬至乃史官依時術以書必非侯景所得所以不合今以授時考之亦亦然八也江氏永曰案此二至若非術誤即史誤自前宋以來測景騐氣者凡十七事其景徳丁未歲戊辰日南至統天授時皆得丁夘是先一日嘉泰癸亥歲甲戌日南至統天授時皆得乙亥是後一日一失之先一失之後若曲變其數以從景徳則其餘十六事多後天從嘉泰則其餘十六事多先天亦日度失行之騐十也江氏永曰案此二至皆術誤非日度失行前十事皆授時所不合以此理推之非不合矣葢類其同則知其中辨其異則知其變今于冬至畧其日度失行及史官依時術書之者凡十事則授時三十九事皆中江氏永曰日為七政之主萬化之宗必無失行之理其两心差之有改變亦必有恒率非失行也郭氏于十事中以八事為日度失行其説原于僧一行亦近誣矣其三十九事自以為中未必果皆中也中其日矣未必中其時刻除至元庚辰歲宻合天外推近歲之冬至時刻恒後天推逺歲之冬至時刻恒先天其故甚微非以權度細推誰其覺之以前代諸術校之授時為宻庶幾千歲之日至可坐而致云江氏永曰案授時固宻而有未宻者存又曰術家最重識見日度失行之説極紕繆一行守敬乃言之載之史册遺笑後人皆由推冬至無權度平歲實髙衝行輪徑差三大節目闗竅未啟是以生此繆論不得不詳載史文以為鑿知者鑒右考冬至以正氣序五禮通考卷一百八十八
