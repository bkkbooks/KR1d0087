body:
  text: 五禮通考卷一百八十八刑部尚書秦蕙田撰嘉禮六十一觀象授時孟子天之髙也星辰之逺也茍求其故千歲之日至可坐而致也注天雖髙星辰雖逺誠能推求其故常千歲日至之日可坐而致也星辰日月之會致至也知其日至在何日也坐疏雖千歲之後其日至之日亦可而計之也朱子集注天雖髙星辰雖逺然求其已然之跡則其運有常雖千歲之久其日至之度可坐而得况於事物之近若因其故而求之豈有不得其理者而何以穿鑿為哉必言日至者造厯者以上古十一月甲子朔夜半冬至為厯元也梅氏文鼎疑問問造法者必先立元元正然後定日法法立然後度周天古法數十家皆同此術至授時獨不用積年日法何與曰造法者必有起算之端是謂厯元然厯元之法有二其一逺溯初古為七曜齊元之元自漢太初至金重修大明厯各所用之積年是也其一為截算之元自元授時不用積年日法直以至元辛巳為元而今西法亦以崇禎戊辰為元是也二者不同然以是為起算之端一而已矣然則二者無優劣乎曰授時優夫所謂七曜齊元者謂上古之時歲月日時皆會甲子而又日月如合璧五星如連珠故取以為造法之根數也使其果然雖萬世遵用可矣乃今廿一史中所載諸家厯元無一同者是其積年之久近皆非有所受之於前直以巧算取之而已然謂其一無所據而出於胸臆則又非也當其立法之初亦皆有所騐於近事然後本其時之所實測以旁證於書傳之所傳約其合者既有數端遂援之以立術于是溯而上之至於數千萬年之逺庶幾各率可以齊同積年之法所由立也然既欲其上合律元又欲其不違近測畸零分秒之數必不能齊勢不能不稍為整頓以求巧合其始也據近測以求積年其既也且將因積年而改近測矣又安得以為定法乎授時厯知其然故一以實測為憑而不用積年虚率上考下求即以至元十八年辛巳歲前天正冬至為元其見卓矣案唐建中時術者曹士蒍始變古法以顯慶五年為上元雨水為歲首號符天厯行於民間謂之小厯又五代石晉髙祖時司天監馬重績造調元厯以唐天寳十四載乙未為上元用正月雨水為氣首此二者亦皆截算之法授時厯葢采用之耳然曹馬二術未嘗宻測逺徴不過因時法之率截取近用若郭太史則製器極精四海測騐者二十七所又上考春秋以來至於近代然後立術非舎難而就易也又案孟子千歲日至趙注只云日至可知其日孫奭疏則直云千歲以後之日至可坐而定初不言立元蕙田案法未有數百年不差者葢立法之始必不能無差數但其數甚微積之久然後著夫立一法而行之百餘年即差若所推厯元大都在數千年以上安必其無差乎孟子所云千歲之日至謂術家測騐既徃得其常度可以順推將來不必主立元為説也觀承案孟子此章極精只寛説而理數俱該然並無厯元之説朱子注亦簡明惟末載造厯者一條反似贅説羲和觀象並無立元之文至太初厯始有之孟子當時豈知後世將有太初之厯而預言之夫律豈無元然隨代可立不必追上古十一月甲子朔夜半冬至耳授時厯直以至元辛巳為元允為超絶古今且孟子所謂日至者亦兼二至在内非專指冬至也周之土圭反專重夏至堯典觀象亦兼永短二至其專以冬至為元者亦始自太初也孔子删書斷自堯典馬遷作史必欲追至黄帝而穿鑿附會不少矣必追上古甲子云云者正同此病孟子方惡小智之鑿豈肯反教人以鑿為智哉春秋僖公五年左氏傳春王正月辛亥朔日南至注周正月今十一月冬至之日日南極公既視朔遂登觀臺以望而書禮也注觀臺臺上構屋可以逺觀者也朔旦冬至數之所始治厯者因此則可以明其術數審别隂陽叙事訓民凡分至啟閉必書雲物注分春秋分也至冬夏至也啟立春立夏閉立秋立冬為備故也疏此朔即是至日故視朔而遂登臺也日之行天有南有北常立八尺之表以候景之短長夏至之景尺有五寸日最長而景最短是謂日北至也自是以後日稍近南冬至之景一丈三尺日最短而景最長是謂日南至也冬至者十一月之中氣中氣者月半之氣也月朔而已得中氣是必前月閏閏前之月則中氣在晦閏後之月則中氣在朔閏者聚殘餘分之月其月無中氣半屬前月半屬後月是去年閏十二月十六日已得次年正月朔大雪節故此正月朔得冬至也而杜長厯僖元年閏十一月此年閏十二月又閏之相去厯家大率三十二月耳杜以此閏相去凡五十月不與厯數同者杜推勘春秋日月上下置閏或稀或概自凖春秋時法故不與常厯同昭公二十年左氏傳春王二月己丑日南至注是歲朔旦冬至之歲也當言正月己丑朔日南至時史失閏閏更在二月後故經因史而書正月傳更具于二月記南至日以正律也冬疏古法十九年為一章章首之歲必周之正月朔旦至僖五年正月辛亥朔日南至是章首之歲年也計僖五年至徃年合一百三十三年是為七章今年復為章首故云是歲朔旦冬至之歲也朔旦冬至謂正月之朔當言正月己丑朔日南至今傳乃云二月己丑日南至是錯名正月為二月也厯之正法徃年十二月後宜置閏月即此年正月當是徃年閏月此年二月乃是正月故朔日己丑日南至也時史失閏徃年錯不置閏閏更在二月之後傳于八月之下乃云閏月戊辰是閏在二月後也不言在八月後而云在二月後者以正月之前當置閏二月之後即不可故據二月言之後漢書志黄道去極日景之生據儀表也冬至晷景丈三尺小寒晷景丈二尺三寸大寒晷景丈一尺立春晷景九尺六寸雨水晷景七尺九寸五分驚蟄晷景六尺五寸春分晷景五尺二寸五分清明晷景四尺一寸五分榖雨晷景三尺二寸立夏晷景二尺五寸三分小滿晷景尺九寸八分芒種晷景尺六寸八分夏至晷景尺五寸小暑晷景尺七寸大暑晷景二尺立秋晷景二尺五寸五分處暑晷景三尺三寸三分白露晷景四尺三寸五分秋分晷景五尺五寸寒露晷景六尺八寸五分霜降晷景八尺四寸立冬晷景丈四寸二分小雪晷景丈一尺四分大雪晷景丈二尺五寸六分宋書志何承天上表曰史官受詔以土圭測景考校二至差三日有餘從來積歲及交州所上檢其增減亦相符騐然則今之二至非天之二至也宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之間而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上歴表云自古及今凡諸術數皆未能並已之妙何此不曉亦何以云詔曰何承天所陳殊有理據可付外詳之太史令錢樂之兼丞嚴粲奏曰去十一年起以土圭測景其年景初法十一月七日冬至前後隂不見影到十二年十一月十八日冬至其十五日影極長到十三年十一月二十九日冬至其二十六日影極長到十四年十一月十一日冬至其前後並隂不見到十五年十一月二十一日冬至十八日影極長到十六年十一月二日冬至其十月二十九日影極長到十七年十一月十三日冬至其十日影極長到十八年十一月二十五日冬至二十一日影極長到十九年十一月六日冬至其三日影極長到二十年十一月十六日冬至其前後隂不見影尋校前後以影極長為冬至並差三日如承天所上隋書天文志晷景古法簡畧㫖趣難究術家考測互有異同先儒皆云夏至立八尺表於陽城其影與土圭等案尚書考靈曜日永景尺五寸日短景尺三寸易通卦騐曰冬至之日樹八尺之表日中視其晷景長短以占和否夏至景一尺四寸八分冬至一丈三尺周髀云成周土中夏至景一尺六寸冬至景一丈三尺五寸劉向鴻範傳曰夏至景長一尺五寸八分冬至一丈三尺一寸四分春秋二分景七尺三寸六分後漢四分厯魏景初厯宋元嘉厯大明祖冲之厯皆與考靈曜同漢魏及宋所都皆别四家歴法候景則齊且緯候所陳恐難依據劉向二分之景直以率推非因表候定其長短然尋晷景尺丈雖有大較或地域不改而分寸叅差或南北殊方而長短惟一葢術士未能精騐馮古所以致乖梁天監中祖暅造八尺銅表其下與圭相連圭上為溝置水以取平正揆測日晷求其盈縮至大同十年太史令虞􅒠又用九尺表格江左之景夏至一尺三寸二分冬至一丈三尺七分立夏立秋二尺四寸五分春分秋分五尺三寸九分陳氏一代唯用梁法齊神武以洛陽舊器並徙鄴中以暨文宣受終竟未考騐至武平七年訖于景禮始薦劉孝孫張孟賔等於後主劉張建表測景以考分至之氣草創未就仍遇朝亡周自天和以來言厯者紛紛復出亦騐二至之景以考厯之精麤及髙祖踐極之後大議造厯張胄𤣥兼明揆測言日長之瑞有詔司存而莫能考决至開皇十九年袁充為太史令欲成胄𤣥舊事案日徐疾盈縮無常充等以為祥瑞大為議者所貶觀承案考靈曜日短景尺三寸殊謬應是丈三尺耳唐書志大衍厯中氣議曰中氣始於冬至稽其實葢取諸晷景春秋傳僖公五年正月辛亥朔日南至以周法推之入壬子蔀第四章以辛亥一分合朔冬至殷法則壬子蔀首也昭公二十年二月己丑朔日南至魯史失閏至不在正左氏記之以懲司天之罪周法得己丑二分殷法得庚寅一分殷法南至常在十月晦則中氣後天也周法蝕朔差經或二日則合朔先天也傳所據者周法也緯所據者殷法也氣合于傳朔合于緯斯得之矣戊寅厯月氣專合于緯麟徳厯專合于傳偏取之故两失之又命厯序以為孔子修春秋用殷法使其數可傳于後考其蝕朔不與殷法合及開元十二年朔差五日矣氣差八日矣上不合于經下不足以傳于後代葢哀平間治甲寅元厯者託之非古也又漢太史令張夀王説黄帝調厯以非太初有司劾官有黄帝調厯不與夀王同夀王所治乃殷法也漢自中興以來圗䜟漏泄而考靈曜命厯序皆有甲寅元其所起在四分厯庚申元後百一十四歲延光初中謁者亶誦靈帝時五官郎中馮光等皆請用之卒不施行緯所載壬子冬至則其遺術也魯法南至又先周法四分日之三而朔後九百四十分日之五十一故僖公五年辛亥為十二月晦壬子為正月朔又推日蝕宻於殷法其以閏餘一為章首亦取合於當時也開元十二年十一月陽城測景以癸未極長較其前後所差則夜半前尚有餘分新法大餘十九加時九十九刻而皇極戊寅麟徳厯皆得甲申以𤣥始厯氣分二千四百四十二為率推而上之則失春秋辛亥是减分太多也以皇極厯氣分二千四百四十五為率推而上之雖合春秋而失元嘉十九年乙巳冬至及開皇五年甲戌冬至七年癸未夏至若用麟徳厯率二千四百四十七又失春秋己丑是減分太少也故新法以二千四百四十四為率而舊所失者皆中矣漢會稽東部尉劉洪以四分踈濶由斗分多更以五百八十九為紀法百四十五為斗分減餘太甚是以不及四十年而加時漸覺先天韓翊楊偉劉智等皆稍損益更造新術而皆依䜟緯三百歲改憲之文考經之合朔多中較傳之南至則否𤣥始厯以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未達也更因劉洪紀法增十一年以為章歲而減閏餘十九分之一春秋後五十四年歲在甲寅直應鍾章首與景初厯閏餘皆盡雖減章閏然中氣加時尚差故未合於春秋其斗分幾得中矣後代觀象皆因循𤣥始而損益或過差大抵古法未減斗分其率自二千五百以上乾象至於元嘉厯未減閏餘其率自二千四百六十以上𤣥始大明至麟徳厯皆減分破章其率自二千四百二十九以上較前代史官注記唯元嘉十三年十一月甲戌景長皇極麟徳開元厯皆得癸酉葢日度變常爾祖冲之既失甲戌冬至以為加時太早增小餘以附會之而十二年戊辰景長得己巳十七年甲午景長得乙未十八年己亥景長得庚子合一失三其失愈多劉孝孫張胄𤣥因之小餘益强又以十六年己丑景長為庚寅矣治厯者紏合衆同以稽其所異茍獨異焉則失行可知今曲就其一而少者失三多者失五是捨常數而從失行也周建徳六年以壬辰景長而麟徳開元厯皆得癸巳開皇七年以癸未景短而麟徳開元厯皆得壬午先後相戾不可叶也皆日行盈縮使然凡厯術在於常數而不在於變行既叶中行之率則可以两齊先後之變矣麟徳已前實録所記乃依時厯書之非候景所得又比年候景長短不均由加時有早晏行度有盈縮也自春秋以來至開元十二年冬夏至凡三十一事戊寅厯得十六麟徳厯得二十三開元厯得二十四蕙田案何承天以景極長為冬至一行謂律氣始於冬至實取諸晷景此皆所謂定冬至者也而一行又有日度變常之説最為無識毎歲二十四氣獨冬至用定氣餘二十三歲悉用恒氣非法之善也詳江氏恒氣注數辨元史志天道運行如環無端治律者必就隂消陽息之際以為立法之始隂陽消息之機何從而見之唯候其日晷進退則其機將無所遁今以銅為表髙三十六尺地中八尺表景冬至長一丈三尺有竒夏至尺有五寸今京師長表冬至之景七丈九尺八寸有竒在八尺表則一丈五尺九寸六分夏至之景一丈一尺七寸有竒在八尺表則二尺三寸四分雖晷景長短所在不同而其景長為冬至景短為夏至則一也惟是氣至時刻考求不易葢至日氣正則一歲氣節從而正矣劉宋祖冲之嘗取至前後二十三四日間晷景折取其中定為冬至且以日差比課推定時刻宋皇祐間周琮則取立冬立春二日之景以為去至既逺日差頗多易為推考紀元以後諸厯為法加詳大抵不出沖之之法新厯積日累月實測中晷自逺日以及近日取前後日率相埒者參考同異初非偏取一二日之景以取數多者為定實減大明厯一十九刻二十分附江氏永冬至權度履端於始序則不愆術家詳求冬至且求千歲以上冬至證之史傳或離或合其故難言元史有六術冬至開載魯獻公戊寅至至元庚辰四十九事紀大衍宣明紀元統天重修大明授時時刻之異同勿菴梅氏因之作春秋以來冬至考删去獻公一事各以其術本法詳衍算術雖明而未有折衷永因梅氏所考定者用實法推算有不合者斷其為術誤史誤名曰冬至權度俟知數者考焉一論平歲實太陽本天有平行盡黄道一周為平歲實與月五星周平朔策合率同理别有本輪均輪最髙最卑之行以視行加減平行二十四氣時刻多少歲歲不同而古今冬至不能以一率齊之是為活汎之歲實猶之月有實會逐月不同五星有實合毎周不同也授時大統以前太陽髙卑之理未明雖知一歲之行有盈縮不悟盈縮之中為平歲實但求歲實於活汎之冬至故一術必更一周率與歲實然合今則戾古合古又違今統天術遂立距差躔差之法暗藏消長以求上下两合授時術本之有百年長一消一之説西法本囬囬以春分相距測定歲周小餘五小時三刻三分四十五秒以萬分通之為二四二一八七五此為平行之歲實小餘而各節氣之定氣則以均度加減定之此不易之法也欲考徃古冬至當以平歲實為本算當年平冬至時刻乃以定冬至較之知其距最卑之逺近或與今法有不合則知其時本輪均輪之有半徑差有相去之逺者則知史傳所記非實測所謂茍求其故千歲之日至可坐而致者此為庶幾焉倘以授時之歲實為歲實而以百年長一消一為凖則非法矣一論最卑行亦曰最髙衝省之則曰髙衝太陽本輪最卑㸃為縮末盈初之端歲有推移與月入轉五星入律皆有盈度同理平冬至之改為定冬至也視此㸃之前後逺近以加度而減時減度而加時焉至元辛巳間最卑與平冬至同度自是以前定冬至皆在平冬至前以後定冬至皆在平冬至後最卑有行度故也郭氏時未悟此理恒以冬至為盈初大統承用數百年誤矣西法近率最卑歲行一分一秒十微以逺年冬至考之此率似微朒大約當加二秒上求古時定冬至以此為凖焉一論輪徑差最卑既有行度矣而太陽之體在均輪均輪之心在本輪本輪之心在本天此两輪半徑古今又有不同則距地逺近两心有差西法始定两輪半徑併千萬分之三十五萬八千四百一十六而今又漸減則古時必多於此半徑大則加減差亦大而以均度變時分加減於平冬至者視今時必稍贏焉此差率出於恒差之外術家亦不能定者也上考徃古又當以此消息之余因劉宋大明五年測景求彼時两半徑併詳後右三事者考冬至之權度也大統以前術家莫能知勿菴梅氏亦言之未詳永竊為補之而春秋以來冬至俱凖是考焉梅氏文鼎曰春秋以來冬至多矣而所考只此者以其測騐之可據也律議原載四十八事今考獻公在春秋前無信史可徴故刪之而以左傳僖公一條為首實四十七事也併至元庚辰四十八事江氏永曰竊疑四十七事雖有信史可徴而術算與紀載未必無誤若左傳所記两冬至尤未可信其由於實測後詳之魯僖公五年丙寅歲正月辛亥朔旦冬至唐開元大衍厯辛亥亥正三刻唐宣明厯辛亥申正初刻宋崇寧紀元厯壬子戌正一刻宋統天厯辛亥寅正三刻金重修大明厯壬子亥初二刻元授時厯辛亥寅初二刻江氏永曰傳載是年正月辛亥朔日南至公既視朔遂登觀臺以望而書古術家皆謂至朔同日之年也今詳推之謹案考成康熈甲子天正冬至氣應七日六五六三七四九二六為七日十五小時四十一分十一秒上距僖公丙寅二千三百三十八年中積八十五萬三千九百三十六日五小時三十七分三十秒滿紀法去之餘一十六日五小時三十七分三十秒轉減氣應加一紀減之餘五十一日十小時七分四十一秒平冬至乙夘巳正初刻八分又案元至元辛巳前四年丁丑髙衝即最卑與冬至同度上距此年一千九百三十一年約四百年行七度則此年髙衝在冬至前一宫三度四十八分於今法當加均一度八分變時一日三小時三十六分減平冬至猶是甲寅日夘時再約計是時小輪併徑加大其加均或能至一度二三十分之間變時一日十餘小時以減平冬至則定冬至亦止癸丑日亥子之間而已必不能減至辛亥則是時所推冬至先天两三日矣又算此月平朔定朔皆在壬子而當時誤推辛亥亦先天一日春秋緯命律序壬子朔隋張賔張胄元唐一行皆從之實考之此年正月壬子朔二日癸丑冬至耳至朔何嘗同日乎張賔依命律序壬子朔冬至張胄元謂三日甲寅冬至既不從傳亦不從命律序雖甲寅或稍後天然而胄元之識卓矣春秋時王朝未必頒律各國自為推歩閏餘乖次日月參差日食或不在朔所以考求日至者必不能如後世之精宻差至二三日固無足怪魏晉以後術法漸明劉宋時景初術冬至猶後天三日則春秋無足怪厯家過信左氏意謂此年特載日南至必當時實測唐一行謂僖公登觀臺以望而書雲物出於表晷天騐非時史臆度此一行之蔽也傳言書雲未嘗言測景作法欲求合於古則多增斗分以就之大衍推辛亥亥正三刻宣明推辛亥申正初刻皆泥此至之過也大衍號稱善術行之數年而即差由斗分太强之故紀元與重修大明僅能得壬子與辛亥差一日知斗分不可過增寧失此至不强求合猶為近之若統天創為距差躔差之法巧合此至而授時遂暗用之有百年長一之率算此至皆得辛亥日寅時此未可為確據夫總計距算乗而益之越百年則有驟增之時刻年愈逺則驟增之數愈多勿菴先生亦嘗疑之授時以至元辛巳為元上距此年一千九百三十五算即以一九三五總乗所長之一九而益歲餘設減三十五算為辛丑當文公七年距算一千九百則歲餘二十四刻四十四分矣前一年庚子距算一千九百零一歲餘增一分此一分乗一千九百零一凡一十九刻有竒則當庚子年驟增一十九刻有竒天道寧有此數乎况越二千年而驟增者愈多其長伊於胡底乎故消長之法斷不可用而此年正月辛亥朔日南至當以實法考求決其為歩算之誤不可過信傳文而舎法以求合也觀承案江氏謂春秋時王朝未必頒厯各國自為推歩二語殊無確據魯自文公始不視朔而有司猶供餼羊則王朝原自頒朔但魯君自不視朔耳今以左氏所載閏餘失次日月參差而委其故於王朝之不頒朔者豈非臆測之耶魯昭公二十年己夘歲正月己丑朔旦冬至大衍己丑已正三刻宣明己丑寅正三刻紀元庚寅夘正初刻統天戊子亥正三刻重修大明庚寅辰初初刻授時戊子戌初三刻江氐永曰此年上距僖公五年一百三十三年平冬至二十八日十五小時一十一分二十六秒壬辰日申初初刻十一分約計加均及小輪徑差減時不過一日八九小時定冬至不過辛夘日夘辰之間而巳必不能減至己丑而傳載己丑日南至以此知春秋時歩冬至恒先天二三日也且魯厯前年失閏此年日南至在二月夫周以子月為正日至必無在二月者當時梓慎輩徒知望氛祥占禍福於時月之易明者猶不能正何能實測冬至與天脗合乎大衍宣明紀元重修大明斗分有多少故日名有合有不合若統天授時皆以活法求之又先己丑一日失之愈逺矣同一左氏傳也丙寅之冬至則合己夘之冬至則違亦可見活法之有時窮矣由今觀之違者固非合者亦未盡是而元史立議乃以此至為日度失行不亦誣乎劉宋文帝元嘉十二年乙亥歲十一月十五日戊辰景長大衍戊辰辰正二刻宣明戊辰辰刻三分紀元戊辰巳初二刻統元戊辰午正三刻重修大明戊辰巳初三刻授時戊辰午初一刻江氏永曰史記冬至景長始此是時用景初厯推冬至率後天三日何承天上表言之太史令錢樂之言是年景初推十一月十八日冬至其十五日景極長今推此年平冬至五日九小時四十五分一十一秒己巳日已初三刻今核京師時刻劉宋都當減八分四秒後陳朝倣此是時髙衝約在平冬至前十四度太又小輪半徑差多於今加約減時不啻半日定冬至宜在戊辰與史合然均度不過三十餘分減時不能越十五小時戊辰日加時大約在酉半以後是以明年冬至當越六日甲戌景長六術推此年冬至非不得戊辰而加時皆早既在午刻以前則明年安得甲戌景長乎元嘉十三年丙子歲十一月二十六日甲戌景長景初術推二十九日冬至大衍癸酉未正一刻宣明癸酉未初三刻紀元癸酉申初一刻統天癸酉酉正二刻重修大明癸酉申初三刻授時癸酉酉初初刻江氏永曰今推此年平冬至一十日十五小時三十三分五十六秒甲戌日申初二刻四分是時加均減時不能越十五時是以定冬至亦在甲戌史紀此日景長必是實測而六術皆先一日癸酉其不能與天宻合此已見其端又案後四年庚辰甲午景長四年之間小餘平積二十日二十三時一十五分庚辰定冬至未至乙未則甲午必是夜子初幾刻逆推此年甲戌必是子正幾刻又曰唐一行議云元嘉十三年十一月甲戌景長皇極麟徳開元厯皆得癸酉葢日度變常爾祖沖之既失甲戌冬至以為加時太早增小餘以附會之而十二年戊辰景長得己巳十七年甲午景長得乙未十八年乙亥景長得庚子合一失三其失愈多愚謂此年甲戌景長可推也而一行以為日度變常非是元嘉十五年戊寅十一月十八日甲申景長景初術推二十一日冬至大衍甲申丑正初刻宣明甲申丑初二刻紀元甲申寅初初刻統天甲申夘正一刻重修大明甲申寅初二刻授時甲申寅正三刻江氏永曰推此年平冬至二十一日三小時一十一分二十六秒乙酉日寅初初刻十一分定冬至以丙子歲甲戌子正幾刻推之當在甲申午正前後之間六術皆先天元嘉十六年己夘十一月二十九日己丑景長景初術推次月二日壬辰冬至大衍己丑辰初三刻宣明己丑辰初一刻紀元己丑辰正三刻統天己丑午正初刻重修大明己丑巳初一刻授時己丑巳正二刻江氏永曰推此年平冬至二十六日九小時零一十一秒庚寅日巳初初刻定冬至當在己丑酉正前六術皆先天元嘉十七年庚辰歲十一月初十日甲午景長景初推十二日冬至大衍甲午未初三刻宣明甲午未初初刻紀元甲午未正三刻統天甲午酉正初刻重修大明甲午申初初刻授時甲午申正二刻江氏永曰推此年平冬至三十一日十四小時四十八分五十六秒乙未日未正三刻四分加均減時定冬至當在子初幾刻減時幾有十五小時則加均約三十六分以當時髙衝在冬至前十四度有竒推之而小輪半徑之差亦大畧可知矣又案隋志劉孝孫等言此年注十三日冬至十一日景長則是乙未日矣元嘉十八年辛巳歲十一月二十一日己亥景長景初推二十五日冬至大衍己亥戌初二亥宣明己亥酉正四刻紀元己亥戌正二刻統天己亥夜子初三刻重修大明己亥亥初初刻授時己亥亥正一刻江氏永曰推此年平冬至三十六日二十小時三十七分四十一秒庚子日戌正二刻八分考元嘉間定冬至加均減時不能越十五時此年若己亥景長則減時二十有竒葢史文二十二日譌為二十一日故唐一行議與元史沿誤差一日也錢樂之謂尋校前後以景極長為冬至並差三日此年景初推二十五日冬至景長在二十二日是差三日若二十一日則差四日矣定冬至宜在庚子日寅夘之間六術雖皆推己亥未足為據又隋書劉孝孫等云此年隂無景可騐今推二十二日冬至更可證是庚子元嘉十九年壬午歲十一月初三日乙巳景長景初推六日冬至大衍乙巳丑初二刻宣明乙巳子正四刻紀元乙巳丑正一刻統天乙巳夘初三刻重修大明乙巳丑正三刻授時乙巳寅正初刻江氏永曰推此年平冬至四十二日二小時二十六分二十六秒丙午日丑正一刻十一分定冬至乙巳午初孝武帝大明五年辛丑歲十一月乙酉冬至大衍甲申申正四刻宣明甲申申正二刻紀元甲申酉初二刻統天甲申戌初初刻重修大明甲申酉正一刻授時甲申戌初初刻江氏永曰此年袓沖之詳記測景推算冬至乙酉日夜半後三十二刻七分今細推之當時算冬至稍後天而六術推甲申皆先天也詳推如左一推此年平冬至案大明辛丑距康熈甲子天正冬至一千二百二十二年中積四十四萬六千三百二十五日二十二小時五十二分三十秒滿紀法去之餘四十五日二十二小時五十二分三十秒轉減甲子氣應加一紀減之餘二十一日十六小時五十二分四十一秒平冬至乙酉申正三刻七分四十一秒建康加八分四秒酉初初刻四十五秒一推此年髙衝行案元至元辛巳前四年丁丑髙衝與冬至同度上距此年八百一十五年若依今法一年行一分一秒十微則此年髙衝在冬至前十三度五十分五十一秒如此率未的一年約加二秒四百年行七度則此年髙衝在冬至前十四度十六分一推此年十月十日壬戌景長髙弧距緯并經度案史此年祖沖之測景十月十日壬戌景長一丈七寸七分半以三率法推算一率表八尺二率景一丈七寸七分半三率半徑全數四率為餘切求得餘切一三四七檢八線表此日午正日髙弧三十求度三十五分二十四秒表所得者太陽上邊之景宜減太陽半徑一十五分二十九秒得太陽中心距地平三十六度一十九分五十五秒日軌髙視差二分二十三秒内減去青䝉氣差二十七秒餘視差一分五十六秒加於太陽中心距地平得實髙三十六度二十一分五十一秒距天頂五十三度三十八分九秒建康極出地約三十二度以減距天頂度餘二十一度三十八分九秒為本日午正黄赤距緯設此時两道大距二十三度三十九分二十三秒用三率法两道大距正弦為一率本日午正黄赤距緯正弦為二率半徑全數為三率求得四率為餘弦求得餘弦九一八九檢表三十三度一十四分為壬戌午正距冬至實經度減用時七分二十九秒為平時午初三刻七分半太陽距冬至實經度一推壬戌午時太陽平行度建康平冬至見前距壬戌午初三刻七分半二十三日五小時八分二十五秒太陽平行二十二度五十二分五十秒以減全周壬戌午初三刻七分半太陽平行十一宫七度七分十一秒一推十一月二十五日丁未景長髙弧距緯并經度案史丁未景長一丈八寸一分太以三率法推算一率表八尺二率景長一丈八寸一七五三率半徑全數四率為餘切求得餘切一三五二二檢表此日午正日髙弧三十六度二十九分三秒減太陽半徑一十五分二十六秒太陽中心距地平三十六度一十三分三十七秒日軌髙視差二分二十四秒減去青䝉氣差二十七秒餘視差一分五十七秒加於太陽中心距地平得實髙三十六度一十五分三十四秒距天頂五十三度四十四分二十六秒極髙三十二度減距天頂度餘二十四度四十四分二十六秒為本日午正黄赤距緯設两道大詎二十三度三十九分二十三秒用三率法求得餘弦九二三一一檢表二十二度三十七分六抄為本日午正距冬至實經度加用時二分三十五秒為平時午正初刻二分三十五秒太陽距冬至實經度一推丁未午時太陽平行度建康平冬至距丁未午正初刻二分三十五秒二十一日十九小時一分五十抄太陽平行二十一度二十八分四十七秒一推此時小輪半徑差以本年髙衝冬至前十四度十六分減壬戌太陽平行距平冬至二十二度五十二分五十秒餘八度三十六分五十秒查舊日躔加減差表減十八分四十八秒化作一千一百二十八秒為一率以舊表两心差三五八四為二率又於壬戌經度二十三度一十四分内減平行二十二度五十二分五十秒餘二十一分十秒化作一千二百七十秒為三率求得四率四三五二為此時两小輪半徑併太陽本天一百萬本輪半徑三萬零三百六十四均輪半徑一萬零八十八由此可算其均度一推乙酉日定冬至前壬戌日午正太陽平行十一宫七度七分一十秒至乙酉日子正二十二日半天行三十二度一十分三十八秒加入壬戌午正平行度此時平行十一宫二十九度一十七分四十八秒加髙衝十四度十六分滿周天去之餘一十三度三十四分為引數以此時兩小輪半徑併算之約加均度三十二分竒加入前子正平行在十一宫二十九度五十分未滿周天者十分為時約四小時定冬至在子正後十六刻有竒當時以前後景折算乙酉日子正後三十一刻冬至約後天十五刻以冬至前後日景折算取中求冬至時刻此法惟郭太史時可用其時髙衝與冬至同度故也若大明時髙衝在冬至前十四度有竒則冬至前之日近髙衝太陽之行速而景之進退也疾冬至後之日逺髙衝太陽之行稍遲而景之漸短亦必稍緩雖前後之日景大畧相同而中間所閱之時刻必不均當時欲以均數求冬至宜其後天十五刻也冬至前二十餘日日行較速時刻宜減冬至後二十餘日日行較遲時刻宜加若欲均之則折半處必在所減之後故後天然劉宋之初術法甚踈景初後天至三日猶幸祖氏用景長推算違天尚未甚逺又幸史册紀載之詳去今千有餘年猶可細推其後天之時刻也郭太史所定歲周小餘二四二五者謂自大明壬寅距今毎歲合得此數案此年下距至元辛巳八百一十九年以授時歲周積之二十九萬九千一百三十三日六十刻七十五分以辛巳天正冬至己未日子正後六刻逆計之則當時冬至在乙酉日子正後五十四刻後天愈加多矣既不能與當時所測算者宻合又為百年長一之法以求合乎逺古之冬至以八百九十一總乗所長之數而益之則此年冬至又在甲申日七十九刻太不又先天三十七刻乎以此知授時之歲餘非定率而統天之距差躔差授時之消長皆謬法也此年冬至所闗者距故考論加詳若大衍諸術先天愈多則無足論而授時指為日度失行者總論之於後云陳文帝天嘉六年乙酉歲十一月庚寅景長大衍庚寅寅初初刻宣明庚寅寅初初刻紀元庚寅丑初二刻統天庚寅夘初四刻重修大明庚寅丑初四刻授時庚寅寅正初刻江氏永曰推此年平冬至二十六日二十一時二十二分四十一秒庚寅亥初一刻八分定冬至葢在辰巳間諸術推丑寅者皆太早統天近之臨海王光大二年戊子歲十一月乙巳景長大衍乙巳戌正二刻宣明乙巳戌正三刻紀元乙巳戌初初刻統天乙巳夜子初二刻重修大明乙巳戌初二刻授時乙巳戌初二刻江氏永曰此年平冬至丙午未正三刻九分定冬至葢在乙巳與丙午之間乙巳之景長於次日當亦甚微然以後四歲丁夘景長推之此年所紀猶可疑説見後宣帝太建四年壬辰歲十一月二十九日丁夘景長大衍丙寅戌正初刻宣明丙寅戌正一刻紀元丙寅酉正二刻統天丙寅亥正三刻重修大明丙寅酉正三刻授時丙寅戌正四刻江氏永曰推此年平冬至三日一十四時三分五十六秒丁夘未正初刻四分史紀丁夘景長則定冬至葢在子正初刻以前四歲乙巳景長較之殊可疑此年平冬至子正後一十四時四分而景長猶在本日是加均減時不能越十四時四分也光大二年之平冬至在丙午日子正後十四時四十五分乃能越之而景長在前一日乙巳不應四歲之間差殊如此此两歲定冬至皆在子初子正之間景長最難真確乙巳與丁夘當時測騐有一是必有一非竊疑乙巳之測未確大建九年丁酉歲十一月二十三日壬辰景長大衍癸巳丑初一刻宣明癸巳丑初二刻紀元壬辰夜子初三刻統天癸巳寅正一刻重修大明癸巳子正初刻授時癸巳丑正初刻江氏永曰推此年平冬至二十九日一十九時七分四十一秒癸巳戌初初刻八分定冬至葢在本日寅夘之間統天近之史紀二十三日壬辰景長此必史誤大建十年戊戌歲十一月五日戊戌景長大衍戊戌辰初一刻宣明戊戌辰初二刻紀元戊戌夘初二刻統天戊戌巳正初刻重修大明戊戌夘初四刻授時戊戌辰正初刻江氏永曰此與丁酉歲相去一年平冬至己亥定冬至戊戌可考而知故不細推隋文帝開皇四年甲辰歲十一月十一日己巳景長大衍己巳酉正二刻宣明己巳酉正二刻紀元己巳夜子初一刻統天己巳戊初初刻重修大明己巳酉初初刻授時己巳戌正二刻江氏永曰推此年平冬至六日一十一時四十八分五十六秒庚午日午初三刻四分隋都長安早二刻後唐朝倣此定冬至己巳亥子之間史云此年在洛州測冬至景與京師二處進退絲毫不差張賔術推己巳冬至張胄元厯推庚午冬至開皇五年乙巳歲十一月二十一日乙亥景長大衍乙亥子正一刻宣明乙亥子正二刻紀元甲戌亥正二刻統天乙亥寅初初刻重修大明甲戌戌正三刻授時乙亥丑正二刻江氏永曰推此年平冬至十一日一十七時三十七分四十一秒乙亥酉初二刻八分定冬至在本日寅時推甲戌者非是開皇六年丙午歲十一月三日庚辰景長大衍庚辰夘正初刻宣明庚辰夘正一刻紀元庚辰夘正一刻統天庚辰辰正三刻重修大明庚辰寅正三刻授時庚辰辰正一刻江氏永曰與前年相距一歲平定冬至皆在庚辰可考而知開皇七年丁未歲十一月十四日乙酉景長大衍乙酉午正初刻宣明乙酉午正一刻紀元乙酉巳正初刻統天乙酉未正三刻重修大明乙酉巳正二刻授時乙酉未正初刻江氏永曰此年平冬至丙戌夘初一刻定