body:
  text: 五禮通考卷三十八刑部尚書秦蕙田撰吉禮方丘祭地文獻通考秦始皇帝即位三年祠八神二曰地主祠泰山梁父葢天好隂祠之必於髙山之下山之上命曰畤地貴陽祭之必於澤中圜丘云漢書髙祖本紀二年六月令祠官祀天地四方上帝山川以時祀之六年詔御史令長安置祠祀官女巫其梁巫祠天地文獻通考漢文帝初祭地于渭陽以髙帝配漢書武帝本紀元鼎四年冬十月行幸雍自夏陽東幸汾隂十一月甲子立后土祠于汾隂脽上禮畢行幸滎陽還至洛陽詔曰祭地冀州瞻望河洛廵省豫州觀于周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀郊祀志天子郊雍曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寛舒議天地牲角繭栗今陛下親祠后土后土宜于澤中圜丘為五壇壇一黄犢牢具已祠盡瘞而從祠衣上黄侍祠之人着黄衣於是天子東幸汾陰汾陽男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上如寛舒等議上親望拜如上帝禮漢舊儀漢法三嵗一祭地于河東汾陰后土宫以夏至日祭地地神出祭五帝于雍畤又曰祭地河東汾陰后土宫宫曲入河古之祭地澤中方丘也禮儀如祭天名泰一曰丘武帝本紀元鼎五年冬十一月祭后土元封四年春三月祠后土詔曰朕躬祭后土地祗見光集于靈壇一夜三燭其赦汾陰死罪以下六年春三月行幸河東祠后土詔曰朕禮首山昆田出珍物化或爲黄金祭后土神光三燭其赦汾陰殊死以下賜天下貧民布帛人一匹太初元年十二月䄠髙里祠后土二年春三月行幸河東祠后土令天下大酺五日夏四月詔曰朕用事介山祭后土皆有光應其赦汾陰安邑殊死以下天漢元年春三月行幸河東祠后土蕙田案漢郊祀歌有祀后土樂章見圜丘門宣帝本紀神爵元年三月行幸河東祠后土五鳳三年春三月幸河東祠后土詔赦天下元帝本紀初元四年春三月幸河東祠后土赦汾陰徒賜民爵一級永光五年三月幸河東祠后土建昭二年春三月行幸河東祠后土成帝本紀建始元年作長安南北郊罷汾陰后土祠二年三月辛丑上始祠后土于北郊永始三年冬十月皇太后詔復汾陰后土祠四年三月行幸河東祠后土賜吏民元延二年三月行幸河東祠后土四年三月行幸河東祠后土綏和元年三月行幸河東祠后土二年皇太后詔復長安南北郊哀帝即位寝疾復甘泉泰畤汾陰后土祠文獻通考平帝時王莽奏罷甘泉泰畤復長安南北郊又奏以天地合祭以孟春正月上辛若丁天子親合祀天地於南郊以髙帝髙后配夏日至使有司奉祭北郊以髙后配議稱墬祗曰后土與中央黄靈同又兆北郊未有尊稱宜令墬祗稱皇墬后祗兆曰廣畤奏可後漢書祭祀志建武元年爲壇祭告天地未以祖配天地共犢文獻通考建武二年正月郊别祀地祗位南面西上髙皇后配西面北上皆在壇上地理羣神從食皆在壇下如元始故事岳瀆位見山川門地祗髙皇后用犢各一頭五岳共牛一頭海四瀆共牛一頭羣神共二頭奏樂亦如南郊既送神瘞俎實于壇北黄圖載元始儀后土壇方五丈六尺茅營去壇十歩外土營方二百歩限之其五零壇土茅營如上帝五神去營歩數神道四通廣各十歩宫内道廣各二丈有闕爲周道后土宫外徑九歩營岱宗西門之外河北門之外海東門之外徑各六十歩壇方二丈髙二尺爲周道前望之外徑六歩列望亞前望道外三十六歩壇廣一丈五尺髙一尺五寸爲周道列望之外徑六歩卿望亞列望道外徑三十五歩壇廣一丈髙一尺爲周道卿望之外徑六歩大夫望亞卿望道之外徑十九歩壇廣八尺髙八寸爲周道大夫望之外徑九歩士望亞大夫望道外徑十二歩壇廣六尺髙六寸爲周道士望之外徑六歩凡地宗后土宫壇營方二里周八里營再重道四通常以嵗之孟春正月親郊祭天南郊以地配天地位皆南向同席地差在東共牢而食夏至使有司奉祭地祗於北郊髙皇后配後漢書世祖本紀建武十八年三月壬午幸蒲坂祀后土漢官儀祭地于河東汾陰后土宫宫曲入河古之祭地澤中方丘也以夏至日祭其禮儀如祭天蒲坂縣屬河東郡后土祠在今蒲州汾陰縣北中元元年十月甲申使司空告祠髙廟曰吕太后不宜配食髙廟同祧至尊薄太后母徳仁慈其上薄太后尊號曰髙皇后配食地祗遷吕太后廟主於園是嵗初起北郊祭祀志中元元年初營北郊遷吕太后於園上薄太后尊號曰髙皇后當配地郊髙廟北郊在雒陽城北四里爲方壇四陛世祖本紀中元二年春正月初立北郊祀后土祭祀志三十三年正月辛未郊别祀地祗位南面西上髙皇后配西面北上皆在壇上地理羣神從食壇下如元始中故事漢官儀北郊壇在城西北角去城一里所謂方壇四陛但存壇祠舍而已其鼓吹樂及舞人御帳皆從南郊之具地祗位南面西上髙皇后配西面皆在壇上地理羣神從食壇下南郊焚犢北郊埋犢禮儀志凡齋天地七日大喪地以下皆百日後乃齋如故事右秦漢祭地宋書禮志蜀漢先帝章武二年詔丞相諸葛亮營北郊于成都通典魏明帝景初元年詔祀方丘所祭曰皇皇后地以舜妃伊氏配北郊所祭曰皇地之祗以武宣后配時髙堂隆上表云古來娥英姜姒盛徳之妃未聞配食于郊者也漢文初祭地祗于渭陽西漢武帝時始立汾陰后土祠孝文時無祭地祗于渭陽事以髙帝配孝武立后土宜依古典以武皇配天地文獻通考馬氏曰案鄭康成分圜丘與南郊為二方澤與北郊為二而所祀天地亦各有二名曹魏郊祀遵用其說然鄭說祀天則有昊天有五帝而魏圜丘所祀曰皇皇帝天南郊所祀曰皇天之神鄭說祀地則有崑崙有神州而魏方澤所祀曰皇皇后地北郊所祀曰皇地之祗徃徃見靈威仰及崑崙等名不雅馴故有以易之然不知皇天之與天神后土之與地祗果可分而為二乎可笑也右蜀魏祭地晉書禮志晉武帝泰始二年定郊祀地郊先后配是年并圜方二丘于南北郊更修壇兆其二至之祀合于二郊時從有司議云古者郊丘不異十一月庚寅冬至帝親祠于南郊自後方澤不别立元帝泰興二年北郊未立地祗共在天郊明帝太寧三年詔立北郊未及建而帝崩太寧三年七月始詔立北郊及成帝咸和八年正月追述前㫖于覆舟山南立之地郊以五岳四望四海四瀆五湖五帝之佐沂山嶽山白石山霍山醫無閭山蒋山松江㑹稽山錢塘江先農凡四十四神也江南諸小山葢江左所立猶如漢西京小水皆有祭秩也是月辛未祀北郊始以宣穆張皇后配地魏氏故事非晉舊也建元元年正月将北郊太常顧和表泰始中合二至之禮于二郊北郊之月古無明文或以夏至或同用陽漢光武正月辛未始建北郊此則與南郊同月及中興草創百度從簡合北郊於一丘憲章未備權用斯禮葢時宜也至咸和中議别立北郊同用正月魏承後漢正月祭天以配地時髙堂隆等以為禮祭天不以地配而稱周禮三王之郊一用夏正於是從和議是月辛巳北郊帝親奉蕙田案髙堂隆稱祭天不以地配是矣所稱三王之郊一用夏正仍用鄭氏緯書之說非周禮也晉書樂志地郊饗神歌整泰折竢皇祗衆神感群靈儀陰祀設吉禮施夜将極時未移祗之體無形象潛泰幽洞忽荒祗之出薆若有靈無逺天下母祗之來遺光景照若存終㝠㝠祗之至舉欣欣舞象徳歌成文祗之坐同歡豫澤雨施化雲布樂八變聲教敷物咸亨祗是娯齊既潔侍者肅玉觴進咸穆穆饗嘉慶歆徳馨祚有晉暨羣生溢九壤格天庭保萬夀延億齡右晉祭地宋書禮志宋武帝永初二年親祀南北郊少帝本紀永初三年九月司空羡之尚書令亮等奏髙祖武皇帝宜配天郊至於地祗之配雖禮無明文先代舊章毎所因循魏晉故典足為前式謂武敬皇后宜配北郊明年孟春有事於二郊請宣攝内外詳依舊典詔可通典孝武帝大明三年移北郊于鍾山北道西與南郊相對後還舊處初晉始置於覆舟山南至於此移之廢帝以舊地吉祥復之宋書禮志北郊齋夕牲進熟及乗輿百官到壇三獻悉如南郊之禮惟事訖太祝令牲玉饌物詣塪置牲上訖又以一牲覆其上治禮舉手曰可霾二十人俱時下土填塪欲半博士仰白事畢帝出右宋祭地南齊書禮志齊髙祖建元二年正月次辛祀北郊犧牲之色因舊不改而無配詔可用王儉議武帝永明二年祠部郎中蔡履議漢東京禮儀志南郊禮畢次北郊明堂太學博士王祐議正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議魏髙堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審於時定制尚書陸澄議明堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二尚書王儉議春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦有親奉太常顧和秉議今宜親祀北郊明年正月上辛祀昊天次辛瘞后土後辛祀明堂御並親奉詔可武帝本紀永明三年春二月辛丑車駕祀北郊齊書樂志北郊樂歌辭案周頌昊天有成命郊祀天地也是則周漢以來祭天地皆同辭矣宋顔延之享地神辭一篇餘與南郊同齊北郊羣臣入奏肅咸樂牲入奏引牲薦豆毛血奏嘉薦皇帝入壇東門奏永至飲福酒奏嘉胙還便殿奏休成辭並與南郊同迎送神昭夏登歌異迎地神奏昭夏之樂詔禮崇營敬享元畤靈正丹帷月肅紫墀展薦登華風縣凝鏘神惟戾止鬱葆遥荘昭望嵗芬環游辰太穆哉尚禮横光秉藹皇帝升壇登歌佇靈敬享禋肅彜文縣動聲儀薦絜牲芬陰祗以貺昭司式慶九服熙䖍六農祥正皇帝初獻奏地徳凱容之樂繕方丘端國陰掩珪晷仰靈心詔原委遍丘林八句禮獻物樂薦音此下除二十二句餘皆顔辭次奏昭徳凱容之樂慶圖濬邈藴祥祕瑶俔天炳月嬪光紫霄邦化靈懋閫則風調儷徳方儀徽載以昭送神奏昭夏之樂薦神升享序楙掩玉俎停金奏寳斾轉旒駕旋溢素景鬱紫躔靈心顧留宸睠洽外瀛瑞中縣瘞埋奏𨽻幽之樂后皇嘉慶定祗元畤承帝休圖祗敷靈祉篚􅇈周序軒朱凝㑹牲幣芬壇精明佇葢調川瑞昌警岳祥泰右齊祭地隋書禮儀志梁武帝制北郊為方壇於北郊上方十丈下方十二丈髙一丈四面各有陛其外為壝再重與南郊間嵗正月上辛以一特牛祀后土之神於其上以徳后配禮以黄琮制幣五官之神先農五岳沂山嶽山白石山霍山無閭山蒋山四海四瀆松江㑹稽山錢塘江四望皆從祀太史設埋次於壬地焉通典省除四望座博士明山賓議北郊有岳鎮海瀆之座而又有四望座疑重遂省四望座松江浙江五湖鍾山白石山並留之如故帝行一獻之禮梁書武帝本紀天監四年何佟之云周禮地曰祗今地不稱祗地攢宜題曰后地座又北郊用上和香以地於人親宜加雜馥並從之五年明山賓稱周以五月祭地殷以六月祭地夏以七月祭地自頃代以來南北二郊同用夏正皆以始祖配饗詔依議隋書音樂志梁北郊迎神諴雅一曲三言地徳普崑丘峻揚羽翟鼓應朄出尊祗展誠信招海瀆羅岳鎮惟福祉咸昭晉送神諴雅一曲四言詞同南郊皇帝初獻奏登歌二曲四言方壇既塪地祗已岀盛典弗諐羣望咸秩乃升乃獻敬成禮卒靈降無兆神饗載謐允矣嘉祚其升如日至哉坤元實惟厚載躬兹奠饗誠交顯晦或升或降摇珠動佩徳表成物慶流皇代純嘏不諐祺福是賚右梁祭地通典陳武帝受禪亦以間嵗正月上辛用特牛一祀地于北郊以皇妣昭后配陳書髙祖本紀永定二年春正月乙巳輿駕親祀北郊文帝本紀天嘉元年春正月辛未車駕親祀北郊三年春正月辛酉輿駕親祀北郊五年春正月辛巳輿駕親祀北郊隋書禮儀志文帝天嘉中北郊改以徳皇帝配光大中以昭后配北郊宣帝本紀太建三年春正月辛未親祀北郊七年春正月辛巳親祀北郊九年春正月辛卯輿駕親祀北郊通典宣帝即位以郊壇卑下更増廣之祠部郎中王元規議舊壇上徑廣九丈三尺請加七尺以則地義下徑廣十五丈取三分益一髙丈五寸請加尺五寸取二倍漢家之數右陳祭地魏書太祖本紀天興三年春正月癸亥有事於北郊分命諸官循行州郡觀民風俗察舉不法賜羣臣布帛各有差禮志天興三年正月癸亥瘞地于北郊以神元竇皇后配五岳名山在中壝内四瀆大川於外壝内后土神元后牲共用元牲一玉用兩珪幣用束帛五岳等用牛一祭畢瘞牲體右於壇之北亥地從陰也乙丑赦京師畿内五嵗刑以下其後夏至祭地于方澤用牲帛之屬與二郊同髙祖本紀太和十三年五月庚戌車駕有事于方澤十八年二月己丑行幸河陰規建方澤之所二十年五月丙戌初營方澤于河陰丁亥車駕有事于方澤蕙田案北魏方丘歌辭見圜丘門右北魏祭地隋書禮儀志北齊方澤三年一祭謂之禘祀為壇在國北郊廣輪四十尺髙四尺面各一陛其外為三壝相去廣狹同圜丘壝外大營廣輪三百二十歩營壍廣一十二尺深一丈四面各通一門又為瘞坎於壇之壬地中壝之外廣深一丈二尺以黄琮束帛夏至之日禘崑崙皇地祗於其上以武明皇后配其神州之神社稷岱岳沂鎮㑹稽鎮云云山亭亭山蒙山羽山澤山崧岳霍岳衡鎮荆山内方山大别山敷淺原山桐柏山陪尾山華岳泰岳鎮積石山龍門山江山岐山荆山嶓冢山壺口山雷首山底柱山析城山王屋山西傾朱圉山鳥鼠同穴山熊耳山敦物山蔡蒙山梁山㟭山武功山太白山恒岳醫無閭山鎮陰山白登山碣石山太行山狼山封龍山漳山宣務山閼山方山苟山狹龍山淮水東海泗水沂水淄水濰水江水南海漢水榖水洛水伊水漾水沔水河水西海黒水澇水渭水涇水鄷水濟水北海松水京水桑乾水漳水呼沲水衛水洹水延水並從祀其神州位在青陛之北甲寅地社位赤陛之西未地稷位白陛之南庚地自餘並内壝之内内向各如其方合用牲十二儀同圜丘其後諸儒定禮北郊嵗一祀皆以正月上辛北齊書武成帝本紀河清二年春正月丁丑以武明皇后配祭北郊隋書禮儀志後齊北郊為壇如南郊壇為瘞坎如方澤坎祀神州神於其上以武明皇后配禮用兩圭有邸各用黄牲一儀瘞如北郊右北齊祭地周書孝閔帝本紀元年春正月辛丑即皇帝位癸卯祀方丘明帝本紀元年九月甲子即天王位冬十月丙戌祠方丘武帝本紀保定元年春正月壬子祀方丘天和二年春正月丁亥初立郊丘壇壝制度隋書禮儀志周方丘在國陰六里之郊丘一成八方下崇一丈方六丈八尺上崇五尺方四丈方一階尺一級其壝八面徑百二十歩内壝半之神州之壇崇一丈方四丈在北郊方丘之右其壝如方丘北郊方丘以神農配后地之祗神州則以獻后莫那配焉用牲祭皇地祗以其方色通典莫那周明帝之逺祖自隂山南徙始居遼西周書武帝本紀建德六年夏五月己丑祀方丘宣帝本紀宣政元年六月皇太子即皇帝位秋七月戊申祀方丘右周祭地隋書禮儀志高祖受命議定祀典為方丘於宫城之北十四里丘再成成髙五尺下成方十丈上成方五丈夏至之日祭皇地祗於其上以太祖配神州迎州冀州戎州拾州柱州營州咸州揚州其九州山海川林澤丘陵墳衍原隰並皆從祀地祗及配帝在壇上用黄犢二神州九州神座於第二等八陛之間神州東南方迎州南方冀州戎州西南方拾州西方柱州西北方營州北方咸州東北方揚州東方各用方色犢一九州山海以下各依方面八陛之間其冀州山林川澤丘陵墳衍於壇之南少西加羊豕各九北郊孟冬祭神州之神以太祖武元皇帝配牲用犢二髙祖本紀開皇三年夏五月辛酉有事於方澤禮儀志煬帝大業元年孟冬祀神州改以髙祖文帝配文獻通考北齊後周隋北郊迎送神等歌詞同南郊隋書音樂志方丘歌辭四首迎神奏昭夏辭柔功暢陰徳昭陳瘞典盛元郊篚􅇈清膋鬯馥皇情䖍具寮肅笙頌合鼓鼗㑹出桂旗屯孔葢敬如在肅有承神胥樂慶福膺奠玉帛登歌道惟生育器乃包藏報功稱範殷薦有常六瑚已饋五齊流香貴誠尚質敬洽義彰神祚惟永帝業増昌皇地祗歌辭奏諴夏辭厚載垂徳崑丘主神陰壇吉禮北至良辰鑒水呈絜牲栗表純樽壺夕視幣玉朝陳羣望咸秩精靈畢臻祚流于國祉被于人送神歌辭奏昭夏辭奠既徹獻己周竦靈駕逝逺遊洞四極帀九縣慶方流社恒遍埋玉氣掩牲芬晰神理顯國文方澤歌辭降神奏昭夏報功陰澤展禮元郊平宗鎮瑞方鼎升庖調歌絲竹縮酒江茅聲舒鐘鼓器質陶匏列耀秀華凝芳都荔川澤茂祉丘陵容衛雲飾山罍蘭浮汎齊日至之禮歆兹大祭奠玉奏昭夏曰若厚載欽明方澤敢以敬恭陳之玉帛徳包含養功藏靈迹斯箱既千子孫則百初獻奏登歌辭舞辭同圜丘質明孝敬求陰順陽壇有四陛琮為八方牲牷蕩滌蕭合馨香和鑾戾止振鷺來翔威儀簡簡鐘鼓喤喤聲和孤竹韻入空桑封中雲氣坎上神光下元之主功深葢藏望坎位奏皇夏司筵撤席掌禮移次廻顧封壇恭臨坎位瘞玉埋俎藏芬歛氣是曰就幽成斯地意右隋祭地舊唐書禮儀志武徳初定令毎嵗夏至祭皇地祗于方丘亦以景帝配其壇在宫城之北十四里壇制再成下成方十丈上成五丈毎祀則地祗及配帝設位于壇上神州及五嶽四鎮四瀆四海五方山林川澤丘陵墳衍原隰並皆從祀神州在壇之第二等五嶽以下三十七座在壇下外壝之内丘陵等三十座在壝外其牲地祗及配帝用犢三神州用黝犢一嶽鎮以下加羊豕各五孟冬祭神州于北郊景帝配牲用黝犢二蕙田案夏至祭方丘至唐乃合於禮然神州之祭尚仍襲鄭注之謬也通典太宗貞觀時奉髙祖配地郊中書令房𤣥齡與禮官議以為禮有益於人則祀之神州者國之所托餘八州則又不相及近代通祭九州今除餘州等八座唯祭皇地祗及神州以正祀典舊唐書音樂志夏至祭皇地祗于方丘樂章八首貞觀中禇亮等作迎神用豫和萬物資以化交泰屬昇平易從業惟簡得一道斯寧具儀光玉帛送舞變咸英黍稷良非貴明徳信惟馨皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和至矣坤徳皇哉地祗開元統紐合大承規九宫肅列六典相儀永言配命長保無虧迎俎用雍和柔而能方直而能敬厚徳以載大亨以正有滌斯牲布聲斯盛介兹景福祚我休慶皇帝酌獻飲福用夀和詞同冬至圜丘送文舞出迎武舞入用舒和玉幣牲牷分薦享羽旄干戚遞成容一徳惟寧兩儀泰三才保合四時邕武舞用凱安詞同冬至圜丘送神用順和陰祗叶贊厚載方貞牲幣具舉簫管備成其豐惟肅其徳惟明神之聽矣式鑒䖍誠祭神州樂章二首太樂舊有此詞不詳所起迎神黄輿厚載赤寰歸徳含育九區保安萬國誠敬不怠禋祀有則樂以迎神其儀不忒送神神州陰祀洪恩廣濟草樹霑和飛沉沐恵禮修鼎俎奠歆瑶幣送樂有章靈軒其逝祭神州于北郊樂八章貞觀中禇亮作迎神用順和詞同夏至方丘皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和大矣坤儀至哉神縣包含日域牢籠月竁露潔三清風調六變皇祗届止式歆恭薦迎俎用雍和泰折嚴享陰郊展敬禮以導神樂以和性黝牲在列黄琮俯暎九土既平萬邦貽慶皇帝酌獻飲福用夀和詞同冬至圜丘送文舞出迎武舞入用舒和神道降祥和庶品靈心載徳厚羣生水土既調三極泰文武畢備九區平武舞用凱安詞同冬至圜丘送神用順和詞同冬至圜丘髙宗永徽中廢神州之祀禮部尚書許敬宗議方丘在祭地之外别有神州謂之北郊分地為二既無典據理又不通請合於一祀以符古義仍並循附式令永垂後則可之唐書蕭徳言傳方丘既祭地又祭神州北郊皆不載經請止一祠詔曰可蕙田案鄭氏神州之謬至是乃破文獻通考乾封初詔依舊祀神州皇地祗壇依舊于渭水安置奉常博士陸遵等議北郊之月古無明文漢光武正月辛未始建北郊東晉成帝咸和中議北郊用正月皆無指據武徳來禮令即用十月為是陰用事故于此時祭之請依舊十月致祭從之蕙田案是時圜丘五方明堂感帝神州皆以髙祖太宗並配則天垂拱元年郊丘諸祠以髙祖太宗髙宗並配開元十一年以髙祖配而罷三祖並配至二十年蕭嵩等定禮而祖宗之配始定不復改矣武后天册萬嵗元年親享南郊合祭天地睿宗景雲三年将祀南郊有司請設皇地祗位蕙田案賈曾表議詳見圜丘條下唐書睿宗本紀先天元年夏五月戊寅有事于北郊辛巳大赦改元曰延和賜内外官陪禮者勲一轉民酺五日舊唐書音樂志睿宗太極元年祭皇地祗于方丘樂章八首不詳撰者迎神用順和黄鍾宫三變太簇角一變姑洗徴一變南吕羽一變坤厚載物徳柔垂祉九域咸雍四溟為紀敬因良節䖍修陰祀廣樂式張靈其降止金奏新加太簇宫坤元至徳品物資生神凝博厚道叶髙明列鎮五嶽環流四瀛于何不載萬寳斯成皇帝行用太和詞同貞觀冬至圜丘黄鍾宫登歌奠玉帛用肅和詞同貞觀太廟肅和應鍾均之夷則迎俎及酌獻用雍和詞同貞觀太廟雍和送文舞出迎武舞入用舒和詞同皇帝朝羣臣舒和武舞用凱安詞同貞觀冬至圜丘送神用順和林鍾宫樂備金石禮光樽俎大享爰終洪休是舉雨零感節雲飛應序應紱載辭皇靈具舉唐書𤣥宗本紀開元十一年二月壬子如汾陰祀后土文獻通考開元十一年上将還西京便幸并州兵部尚書張說進言曰陛下今因行幸路由河東有漢武后土之祀此禮久闕歴代莫能行之願陛下紹斯墜典以為三農祈榖此誠萬姓之福至十二年二月二十二日祠后土于汾陰脽上太史奏榮光出河休氣四塞祥風繞壇日揚其光初有司奏修壇掘地獲古銅鼎二其大者容四升小者容一升色皆青又獲古甎長九寸有篆書千秋萬嵗字及長樂未央字又有赤兎見于壇側舊祠堂為婦人素像則天時移河西梁山神素像就祠中配焉至十一年有司遷梁山神像于祠外之别室焉兼以中書令張嘉貞為壇塲使将作少監張景為壇塲副使張說為禮儀使舊唐書𤣥宗本紀開元二十年九月乙巳中書令蕭嵩等奏上開元新禮十一月庚申祀后土于脽上大赦天下唐書𤣥宗本紀開元二十年十一月庚申如汾陰祠后土文獻通考開元二十年車駕欲幸太原中書令蕭嵩上言云十一年親祠后土為蒼生祈榖自是神明昭祐累年豐登有祈必報禮之大者且漢武親祠脽上前後數四伏請准舊事至后土行報賽之禮上從之至十一月二十一日祀后土于脽上其文曰恭唯坤元道昭品物廣大茂育暢於生成庶憑休和恵及黎獻博厚之位粤在汾陰肅恭時廵用昭舊典敬以琮幣犧牲粢盛庶品備兹瘞禮式展誠慤睿宗皇帝配神作主禮畢令所司刋石於祠所上自為文舊唐書音樂志𤣥宗開元十一年祭皇地祗于汾陰樂章十一首迎神用順和林鍾宫以下各再變復黄門侍郎韓思作太樂和暢殷薦明神一降通感八變必臻有求斯應無徳不親降靈載止休徴萬人太蔟角中書侍郎盧從愿作坤元載物陽樂發生播殖資始品彚咸亨列俎棊布方壇砥平神歆禋祀后徳惟明姑洗徴司勲郎中劉晁作大君出震有事郊禋齋式既肅馨香畢陳樂和禮備候暖風春恭惟降福實賴明神南吕羽禮部侍郎韓休作於穆濬哲維清緝熙肅事昭配永言孝思滌濯靜嘉馨香在兹神之聽之用受福釐皇帝行用太和黄鍾宫吏部尚書王晙作於穆聖皇六葉重光太原刻頌后土疏揚寳鼎陳符歊雲降祥禮樂備矣降福穣穣登歌奠玉帛用肅和蕤賓均之夾鍾羽刑部侍郎崔元暐作聿修嚴配展事禋宗祥符寳鼎禮備黄琮祝詞以信明徳惟聰介兹景福永永無窮迎俎用雍和黄鍾均之南吕羽徐州刺史賈曽作蠲我餴饎潔我膋薌有豆孔碩為羞既臧至誠無昧精意惟芳神其醉止欣欣樂康酌獻飲福用夀和黄鍾宫禮部尚書蘇頲作禮物斯備樂章乃陳誰其作主皇考聖真對越在天聖明佐神窅然汾上厚澤如春送文舞出迎武舞入用舒和太簇宫太常少卿何鸞作樂奏云闋禮章載䖍禋宗于地昭假于天惟馨薦矣既醉歆焉神之降福永永萬年武舞用凱安黄鍾均之林鍾徴主爵郎中蔣挺作維嵗之吉維辰之良聖君紱冕肅事壇場大禮已備大樂斯張神其醉止降福無疆送神用順和尚書右丞源光裕作方丘既膳嘉享載謐齊敬畢誠陶匏貴質秀簠豐薦芳俎盈實永永福流其昇如日舊唐書禮儀志開元二十年蕭嵩為中書令改撰新禮祀地一嵗有二開元禮祭地儀夏至日祭皇地祗于方丘壇上以髙祖神堯皇帝配座毎座籩豆各十二簠簋篚俎各一百七十二座祭神州地祗于壇第一等籩豆各四餘如上也祭五岳四鎮四海四瀆五山五川五林五澤五丘五陵五墳五衍五原五隰于内壝之外各依方所毎座籩豆各一簠簋俎各一皆凖舊禮為定立冬後祭神州地祗于北郊以太宗文武聖皇帝配座毎座籩豆各十二簠簋篚俎各一也舊樂用姑洗三成准周禮云函鍾之均八變則地祗皆降可得而禮鄭元云祭地有二一是大地崑崙為皇地祗則宗伯黄琮所祭者二是帝王封域内之神州則兩圭有邸所祭者國家後禮則不立神州之祀今依前禮爲定既曰地祗其樂合用函鍾之均八變皇帝夏日至祭方丘儀后土同孟冬祭神州及攝事並附齋戒前祭七日戒誓皇帝服衮冕前祭二日太尉告髙祖神堯皇帝廟如常告之儀告以配神作主孟冬祭神州則告太宗文武聖皇帝廟餘並如圜丘之儀陳設前祭三日尚舍直長施大次于外壝東門之外道北南向攝事衛尉設祭官公卿以下次于東壝外道南北向西上尚舍奉御鋪御座衛尉設文武侍臣次於大次之後文官在左武官在右俱南向設祭官次於東壝之外道南北向西上三師於南壝之外道東諸王於三師之南俱西向北上文官九品以上於祭官之東北向西上介公酅公於南壝之外道西東向諸州使人東方南方於諸王東南西向西方北方於介公酅公西南東向皆北上諸國之客東方南方於諸州使人之南西向西方北方於諸州使人之南東向皆北上武官三品以下七品以上於西壝之外道南北向東上其褒聖侯於文官三品之下攝事無御座以下至此儀設陳饌幔於内壝東門西門之外道北面南向壇上及神州東方南方之饌陳於東門外西向西方北方之饌陳於西門外東向神州無西門之饌前祭二日太樂令設宫縣之樂於壇南内壝之外樹靈鼓於北縣之内道之左右餘如圜丘儀又為瘞塪於壇之壬地内壝之外方深取足容物南出陛前祭一日奉禮設御位攝事無御位於壇之東南西向設望瘞位於壇西南當瘞塪北向設祭官公卿位於内壝東門之外道南分獻官於公卿之南執事者位於其後毎等異位俱重行西向北上設御史位於壇上正位於東南隅西向副位西南隅東向設奉禮位於樂縣東北贊者二人在南差退俱西向北上設奉禮贊者位於瘞塪西南東向南上設協律郎位於壇上南陛之西東向設太樂令位於北縣之間當壇北向設從祭之官三師位於縣南道東諸王位於三師之東俱北向西上介公酅公位於道西北向東上文官從一品以下九品以上位於執事之南毎等異位重行西向武官三品以下九品以上位於西方當文官毎等異位重行東向皆北上諸州使人位東方南方於諸王東南重行北面西上西方北方於介公酅公西南重行北面東上設諸國客使位於内壝南門之外東方南方於諸州使人之東毎國異位重行北面西上西方北方諸州使人之西毎國異位重行北面東上攝事無三師以下至此儀設門外位祭官公卿以下皆於東壝之外道南毎等異位重行北面西上三師位於南壝之外道東諸王於三師之南俱西向介公酅公於道西東向皆北上文官從一品以下九品以上位於東壝之外祭官之南毎等異位重行北向西上武官三品以下九品以上位於西壝之外道南毎等異位重行北面東上諸州使人位東方南方於諸王東南重行西面西方北方於介公酅公西南重行東面俱北上設諸國客位東方南方於諸州使人之南毎國異位重行西面西方北方於諸州使人之南毎國異位重行東面皆北上攝事無三師以下至此儀牲牓於東壝之外當門西向黄牲一居前又黄牲一在北少退𤣥牲一在南少退後廪犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設皇地祗酒尊於壇之上下太尊二著尊二犧尊二罍一在壇上東南隅北向象尊二壺尊二山罍二在壇下皆於南陛之東北向俱西上設配帝著尊二犧尊二象尊二罍一在壇上皆於皇地祗酒尊之東北向西上孟冬北郊酒尊於神州酒尊之東如夏至之儀神州太尊二在第一等毎方嶽鎮海瀆俱山尊二山川林澤俱蜃尊二丘陵墳衍原隰俱概尊二凡尊各設於神座之左而右向神州以上之尊置於坫以下之尊俱藉以席皆加勺羃設爵於尊下孟冬儀壇上之尊置於坫壇下之尊藉以席設御洗及設玉幣之篚等並如圜丘儀孟冬祭同祭日未明五刻太史令郊社令各服其服帥其屬升設皇地祗神座於壇上北方南向席以藳秸設髙祖神堯皇帝神座孟冬神州則設太宗文武聖皇帝神座於東方西向席以莞設神州地祗神座於第一等東南方席以藳秸又設岳鎮海瀆以下之座於内壝之内各於其方皆有原隰丘陵墳衍之座又設中岳以下之座於壇之西南俱内向自神州以下六十八位席皆以莞設神位各於座首省牲器如别儀鑾駕出宫服以衮冕餘如土辛圜丘儀孟冬北郊同圜丘奠玉帛祭日未明三刻諸祭官服其服郊社令良醖令各帥其屬入實尊罍玉幣凡六尊之次太尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以三酒配帝著尊為上實以沈齊犧尊次之實以醴齊象尊次之實以盎齊以上孟冬同神州太尊實以沈齊五方岳鎮海瀆之山尊實以醍齊山川林澤之蜃尊實以沈齊丘陵以下之散尊實以清酒𤣥酒各實於諸齊之上尊禮神之玉皇地祗以黄琮其幣以黄配帝之幣亦如之神州之玉以兩圭有邸其幣以元孟冬同岳瀆以下之幣各從方色太官令帥進饌者入實饌及禮官就位御史太祝行掃除等並如圜丘儀孟冬同駕将至謁者贊引各引祭官從祭官客使等俱就門外位駕至大次門外廻輅南向将軍降立於輅左侍中進當鑾駕前跪奏稱侍中臣某言請降輅跪俯伏興還侍位五品以上從祭之官皆就壝外位攝事無駕至大次下儀大樂令帥工人二舞次入就位文舞入陳於縣内武舞立於縣南道西謁者引司空入行掃除訖出復位皇帝停大次半刻頃謁者贊引各引祝官通事舍人分引從祀羣官介公酅公諸方客使皆先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服衮冕孟冬神州大裘而冕出次華葢侍衛如常儀侍中負寳陪從如式博士引太常卿太常卿引皇帝至中壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監皇帝搢大圭執鎮圭華葢仗衛停於門外侍者從入謁者引禮部尚書太常少卿陪從如常儀皇帝至版位太常卿請再拜及請行事並如圜丘儀攝事如圜丘攝事儀協律郎舉麾工鼓柷奏順和之樂乃以林鍾為宫太蔟為角姑洗為徴南吕為羽作文武之舞樂舞八成林鍾太蔟姑洗南吕皆再成偃麾戞敔樂止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜皇帝奠玉幣及奏樂之節並如圜丘攝事則太尉奠玉帛下倣此登歌作肅和之樂以應鍾之均太常卿引皇帝進北向跪奠於皇地祗孟冬神州神座俯伏興及奠配座並如圜丘儀攝事同圜丘攝事儀進熟皇帝既升奠玉幣太官令陳饌之儀如圜丘俎初入門奏雍和之樂以太蔟之均自後接神之樂用太蔟饌至陛樂止祝史俱進跪徹毛血之豆降自東陛以出皇地祗之饌升自南陛配帝之饌升自東陛神州之饌升自北陛孟冬神州升自南陛諸太祝迎引於壇上各設於神座前設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝還尊所又進設岳鎮以下之饌相次而畢太常卿引皇帝詣罍洗樂作其盥洗酌獻跪奠奏樂之儀並如圜丘攝事如圜丘攝事儀太祝持版進於神座之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某攝則云謹遣太尉臣名下倣此敢昭告於皇地祗乾道運行日躔北至景風應序離氣效時嘉承至和肅若舊典敬以玉帛犧齊粢盛庶品備兹祗瘞式表誠慤髙祖神堯皇帝配神作主尚享太祝俯伏興孟冬神州云包含區夏載植羣生溥被域中賴兹厚徳式遵彜典揀此元辰敬以玉帛犧齊粢盛庶品明獻厥誠備兹祗瘞皇祖太宗文武聖皇帝配神作主皇帝再拜攝則太尉再拜初讀祝文訖樂作太祝進跪奠版於神座興還尊所皇帝拜訖樂止太常卿引皇帝詣配帝酒尊所執尊者舉冪侍中取爵於坫進皇帝受爵侍中贊酌沈齊訖樂作太常卿引皇帝進髙祖神堯皇帝神座前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版進於神座之左北向跪讀祝文曰維某年嵗次月朔日子孝孫開元神武皇帝臣某敢昭告於髙祖神堯皇帝時唯夏至肅敬訓典用祗祭於皇地祗唯髙祖徳叶二儀道兼三統禮膺光配敢率舊章孟冬云皇曽祖太宗文武聖皇帝徳被乾坤格于上下昭配之儀欽率舊章謹以制帛犧齊粢盛庶品肅雍明薦作主侑神尚享太祝俯伏興皇帝再拜初讀祝文訖樂作太祝進奠版於神座興還尊所皇帝飲福受胙及亞獻終獻盥洗酌獻飲福並如圜丘儀唯皇地祗太尉亞獻酌醍齊時武舞作合六律六吕為異耳初太尉将升獻謁者一人引獻官詣罍洗盥匏爵訖升自己陛詣酒尊所執尊者舉冪酌沈齊進奠於神州座前引降還本位謁者五人次引獻官各詣罍洗盥洗訖各詣酒尊所俱酌醍齊訖引獻官各進奠爵於諸方岳鎮海瀆首座餘皆祝史助奠相次而畢引還本位又贊引五人各引獻官詣罍洗盥洗詣酒尊所酌沈齊獻山川林澤如岳鎮之儀訖又引獻官詣罍洗盥洗訖詣酒尊所俱酌清酒獻丘陵以下及齋郎助奠如上儀訖各引還本位武舞六成樂止舞獻俱畢諸祝徹豆及賜胙皇帝再拜奏樂並如圜丘儀太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝就望瘞位北向立樂止於羣官将拜上下諸祝各執篚進神座前取玉帛齋郎以俎載神州以上牲體稷黍飯爵酒各由其陛降壇北行當瘞塪西行諸太祝以玉幣饌物置於塪諸祝又以岳鎮以下之禮幣及牲體皆從瘞奉禮曰可瘞塪東西廂各六人寘土半塪太常卿前奏禮畢引皇帝還大次樂作從祀羣官諸方客使御史以下出並如圜丘儀其祝版燔於齋所鑾駕還宫如圜丘儀開元二十一年詔夏至日祀皇地祗于方丘以髙祖配立冬祭神州于北郊以太宗配天寳五年詔皇王之典聿修於百代郊祭之義允屬於三靈聖人既因時以制宜王者亦緣情以革禮且尊莫大於天地禮莫崇於祖宗嚴配昭升豈宜異數今烝嘗之獻既著於常式南北之郊未展於時享自今已後毎載四時孟月先擇吉日祭昊天上帝其皇地祗合祭以次日祭九宫壇皆令宰臣行禮奠祭務崇蠲潔稱朕意焉蕙田案唐𤣥宗定開元禮後天寳元年改合祭天地於南郊終唐之世莫之或改故地祗之祭闕焉詳見圜丘門册府元龜代宗大歴十二年秋八月増修北郊壇齋宫二十五間唐文宗太和三年六月太常寺奏北郊祀皇地祗壇先闕齋宫請准祠列置一所可之右唐祭地五禮通考卷三十八
