衆官再拜衆官在位皆再拜已飲福受胙者不拜元和之樂作太常卿前奏稱請再拜退立皇帝再拜奉禮曰衆官再拜在位者皆再拜樂一成止太常卿前奏請就望燎位攝事謁者引太尉就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜上下諸祝各執篚進神座前跪取玉帛祝版齋郎以俎載牲體黍稷飯爵酒各由其陛降壇南行經懸內當柴壇東行自南陛登柴壇以玉幣饌物祝版置於柴上户內諸祝以星辰七宿已上之禮幣皆從燎神農伊耆氏嶽鎮已下之祝俱詣瘞坎以玉幣饌物置於坎訖奉禮曰可燎東西面各六人炬燎初唱可燎坎東西廂各四人置土火半柴太常卿前奏禮畢攝事謁者白禮畢太常卿引皇帝還大次樂作皇帝出中壝門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官諸國客使以次出贊引引御史已下俱復執事位立定奉禮曰再拜御史已下皆再拜贊引引出工人二舞以次出其神農已下祝版燔於齋所鑾駕還宫如圜丘之儀伊耆氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位姓名敢昭告於帝伊耆氏惟帝體仁尚義崇本念功爰創嘉祀息農饗物今九土攸宜百榖豐稔備兹八蠟大旅四方謹以制幣犧齊粢盛庶品明薦於帝尚享神農氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位姓名敢昭告於帝神農氏惟帝肇興播植粒此黎元今時和嵗稔神功是賴謹以制幣犧齊粢盛庶品明薦於帝尚享東方歲星祝文曰維某年嵗次月朔日子嗣天子諱謹遣具位姓名敢昭告於東方歲星七宿惟神列位垂象叶贊穹蒼昭晰羣生蕃阜庶類今時和嵗稔恆禮是率謹陳嘉薦庶神享之南方中央西方北方準此東方嶽鎮海瀆祝文曰維某年嵗次月朔云云惟神宣導坤輿興降雲雨亭毒庶品實賴滋益年榖順成用通大蠟謹薦嘉祀溥及一方山林川澤丘陵墳衍原隰井泉庶神咸享南方西方北方準此勾芒氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於勾芒氏惟神贊陽出滯發生品物萌者畢達仁德以宣用陳明薦神其臨享后稷氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於后稷氏惟神誕降嘉種播兹百榖蒸庶以粒乂此萬邦爰及田畯實勸農穡謹薦明祀庶神享之祝融氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於祝融氏惟神典司火正淳耀昭明式贊南訛厥功以致豐年之薦庶神臨享后土氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於后土氏惟神式贊黃道典司土正居中執信是興稼穡年榖既登庶享嘉薦蓐收氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於蓐收氏惟神典司金正式贊西成執矩懷莊尚義趨方豐年之報饗兹嘉祀玄冥氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於玄冥氏維神典司水正贊序幽都厥務安寧積藏斯在豐年之祀庶饗明薦蒼龍祝文曰維某年嵗次月朔日子嗣天子諱謹遣具位臣姓名敢昭告於蒼龍之神維神體備幽明質兼小大實為鱗長贊明造物嵗稔年登實資弭患式陳嘉薦百靈是屬爰及東方鱗羽裸毛介衆族貓於菟坊水墉昆蟲諸神咸享其朱鳥騶虞玄武祝文首尾並與此同祝文發首亦同也朱鳥之神惟神肇自火精冠兹羽族輔時宣化效祥蹈禮年和歲稔有賴厥功麟之神惟神體信為質惟和是歸作長毛宗表靈玉牒年榖豐稔實兹宣助式陳嘉薦庶神臨饗騶虞之神惟神性履至仁稟靈金宿贊育生類實參利物爰茲報功用率恆祀玄武之神惟神誕稟辰精長兹介族先知稱貴誠行攸底伊此豐年有憑宜慶宋史太祖本紀建隆元年春三月定國運以火德王色尚赤臘用戌禮志大蠟之禮自魏以來始定議王者各隨其行祖以其盛臘以其終建隆初以有司言用木德木生火宜以火德王色尚赤遂以戌日為臘文獻通考建隆三年十二月戊戌臘有司畫日以七日辛卯蠟百神太常博士和峴奏議曰謹案蠟始於伊耆後歷三代及漢其名雖改而臘興蠟其實一也漢火行用戌臘臘者接也新故相接畋獵禽獸以享百神報終成之功也王者因蠟祭上享宗廟旁及五祀展其孝心盡物示恭也魏晉以降悉沿其制唐乘土德貞觀之祭以前寅日蠟百神卯日祭社宫辰日饗宗廟開元定禮三祭皆於臘辰以應土德聖朝常以十二月戌日為臘而以前七日辛卯先行蠟祭蓋禮官之失也事下有司請準唐禮蠟百神祀社稷享宗廟皆同用臘日從之蠟百神壇髙四尺東西七步二尺南北六步四尺仁宗天聖三年禮官陳詁言蠟祭一百九十二位而祝文所載一百八十二位無五方田畯五方郵表畷一十位蓋開元以來年祀寢逺有司失傳郊祀録正辭録司天監神位圗皆以虎為於菟乃避唐諱請復為虎載田畯郵表畷慶歷用羊豕各二大明夜明壇增山罍為二籩豆十二三獻終禮生引司天監分獻官逐階下罍洗詣帝神農伊耆五星三辰七宿嶽鎮海瀆祝融后土后稷蒼龍朱雀麒麟玄武白虎神座前上香奠幣爵並再拜內從祀神位不設香幣祝版惟奠酒再行後皇祐定壇髙八尺廣四丈嘉祐加羊豕各五神宗元豐六年詳定郊廟奉祀禮文所言記曰八蠟以記四方年不順成八蠟不通歷代蠟祭獨在南郊為一壇惟周隋有四郊之兆又禮記月令以蠟與息民為二祭故隋唐息民祭在蠟之後日請蠟祭四郊各為一壇以祀其方之神有不順成之方則不修報其息民仍在蠟祭之後從之先是太常寺言四郊蠟祭宜依百神制度築壇其東西有不順成之方即祭日月其神農后稷舊設位於壇下當移於壇上其壇下伊耆氏之位宜除之禮部復言蠟祭四壇皆設神農后稷同日祭享頗為重復太常寺以謂蠟祭本以神農為主后稷從祭四郊今設壇自當每方各祭同日不為重復從之宋史徽宗本紀政和三年四月庚戌班五禮新儀禮志政和新儀臘前一日蠟百神四方蠟壇廣四丈髙八尺四出陛兩壝每壝二十五步東方設大明位西方設夜明位以神農氏后稷氏配配位以北為上南北壇設神農氏位以后稷氏配五星二十八宿十二辰五官五嶽五鎮四海四瀆及五方山林川澤丘陵墳衍原隰井泉田畯蒼龍朱鳥麒麟白虎玄武五水墉五坊五虎五鱗五羽五介五毛五郵表畷五裸五貓五昆蟲從祀各依其方設位中方鎮星后土田畯設於南方蠟壇酉階之西中方嶽鎮以下設於南方蠟壇午階之西伊耆設於北方蠟壇卯階之南其位次於辰星紹興十九年有司檢會五禮新儀臘前一日蠟東方西方為大祀蠟南方北方為中祀並用牲牢文獻通考紹興十九年臣僚言月令臘先祖五祀勞農以休息之釋者謂蠟祭也所以報一歲之成功求嗣歲之福也今已行臘享而報農之祀或闕請並行蠟祭有司檢會以臘前一日蠟祭東西方百神禮料一視感生帝內從祀視釋奠文宣王從祀蠟祭南北方百神一視鎮嶽海瀆內從祀一視釋奠武成王從祀玉海紹興十九年五月乙酉詔定蠟祭從户部郎周莊仲之言也宋史禮志孝宗乾道四年太常少卿王瀹請於四郊各為一壇以祀其方之神東西以日月為主各以神農后稷配南北方皆以神農為主以后稷配自五帝星辰嶽鎮海瀆以至貓虎昆蟲各隨其方分為從祀其後南蠟仍於圜壇望祭殿北蠟於餘杭門外精進寺行禮玉海乾道四年十一月二十七日禮官王瀹等言東西蠟備登歌三獻而南北方正配從祀一奠而已請如中祀儀式從之大學衍義補丘氏濬曰大蠟之祭三代已有之在周之前夏曰嘉平殷曰清祀而在周則曰大蠟焉秦始謂之臘尋更曰嘉平漢復曰臘季冬之月星回嵗終隂陽以交農大享臘臘者接也新故相接畋獵禽獸以享百神報終成之功也魏晉以後皆有其禮古者所祭者八神而已皆有功於農事者也後世所祀之神乃至於八十有五座一百九十有二位何也本朝於古祀典所當舉者未嘗或廢惟於蠟祭闕焉蓋此祭也與籍田相為始終當夫東作方興之始既舉籍田之禮以祀先農於春而以帥先農民以興其務本之心則夫百榖告成之後載舉大蠟之禮以報先嗇於冬而以勞來農民以報其勤動之苦是故舉先王莫大之禮是亦廣聖君莫大之恩也倘不棄愚言復行盛禮則幽明人鬼皆蒙其休明彭謹八蠟廟記聖人緣情以起禮因民而事神故享祀必本之有功而報德不遺於其細此伊耆氏之所以為蠟蠟者索也時維季冬百物用成合山川人物之靈而索享之也記郊特牲曰先嗇曰司嗇曰農曰郵表畷曰貓虎曰坊曰水墉曰昆蟲其教陳矣而所主者息老送終勞勤休力仁之至義之盡也古禮天子大蠟今之制止於府州縣王國則否畿甸以降惟兩河之間則有之荆揚而南莫之行也豈不以有司於民最親足食為政首務而聖人之流風遺澤在中土為獨存與寶慶舊無廟有廟蓋自郡守鈞陽郭公始也部符南楚星軺載臨式崇禮教以索享之典弗復非所以重祈報而昭敬事也乃因郡鐘樓之屢徙將圯議欲為新室於公庾之右以祀八蠟而薦明德請於當路咸可之爰命縣典史陳春董其事材取諸斧琢之既成者力取諸輿臺之已役者始於丙辰冬十月而就功不待改嵗巋然輪奐炳若位置秩如矣彭子曰仁哉公之用心其善於復古矣凡禮有其舉之莫可廢也無其人焉莫可強也夫子修經譏南門之作刪詩録史克之頌蓋以僖公賢於魯閟宫義當復古春秋之所豫也今二千石之選孰有踰公者修美報以答明賜行典禮而觀會通人之稱是舉也其不謂之社稷之役也乎長人者之於百姓既盡心力以圗其明尤資鬼神以相其幽而神有不享民有不安者弗信也繼自今將隂陽調風雨時衣食足禮義興而公之功為益大德為益溥矣陸東蠟祭議案八蠟神祠制也相沿以春秋仲月戌日致祭考之典禮於義未當禮曰蠟索也嵗十二月合聚萬物而索享之子貢觀於蠟孔子曰賜也樂乎子貢曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也蓋終嵗勞農是日飲樂以享君恩也亦曰臘也漢應劭曰周曰大蠟漢改曰臘漢火行衰於戌故此日臘也蔡雍獨斷曰臘者嵗終大祭漢舊議曰臘者報諸鬼神聖賢有功於民者也魏臺訪議曰帝問何用未社丑臘王肅對曰丑之明日便寅寅木也故以丑臘由是觀之則蠟之祭十二月也漢戌魏丑日則不一愚意蔡雍謂嵗終王肅謂明日為寅似當以歲除行事則丑之義為長然或立春在十二月則又除夕屬新嵗矣議立春於除前則用立春前丑日立春於來嵗則用下旬丑日庶報祀事專興而舉事協祭義矣蕙田案元明以來蠟臘之祭不行故瓊山丘氏有復行之請今觀彭陸二文一曰今之制於府州縣一曰相沿以春秋戌日致祭則其行於民間者蓋未嘗絶也聖人制禮協諸義而和於情宜其流風餘韻如此右歷代蠟臘五禮通考卷五十六
