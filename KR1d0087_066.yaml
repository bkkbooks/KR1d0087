body:
  text: 五禮通考卷五十六刑部尚書秦蕙田撰吉禮五十六蠟臘蕙田案周禮籥章國祭蠟則吹豳頌擊土鼓以息老物郊特牲天子大蠟八歲十有二月合聚萬物而索饗之蓋當萬寶告成嵗功既畢教民報本反始息老送終小民終歲勤動至此始得醉飽歡樂又因以教之禮讓黨正國索鬼神而祭祀則以禮屬民而飲於序以正齒位注以為即鄉飲酒之禮是也周衰禮廢一國之人皆若狂然此飲酒意在勞農休息故孔子以為百日之蠟一日之澤雖若狂未足深過月令曰臘先祖五祀左傳曰虞不臘矣孔疏謂明當時有臘祭周時臘與大蠟各為一祭漢改曰臘不蠟而為臘矣以經傳考之蠟之祭自先嗇至水庸貓虎臘則止先祖五祀而已蠟之祭廣故順成之方乃行之臘之祭専雖年不順成不能廢先祖五祀之禮此蠟與臘所以不同而舉蠟者仍復舉臘也自漢改蠟為臘而蠟禮始不舉矣自蔡雍合蠟臘為一而祖臘之説興則并臘之正禮亦亡矣自魏以後祖臘異名神位多少異數亥辰寅戌異日頗乖古義並採著之以考其得失焉禮記郊特牲伊耆氏始為蠟注伊耆氏古天子號也耆疏明堂云土鼓葦籥伊氏之樂禮運云夫禮之初始諸飲食蕢桴土鼓俱稱土鼓則伊耆氏神農也以其初為田事故為蠟祭以報天也下云主先嗇神農既為始蠟豈自祭其身以為先嗇乎皇氏云神農伊耆一代總號陳氏祥道曰禮記曰伊者氏始為蠟周禮伊耆氏掌共王之杖咸以老者待杖然後安猶老物待蠟然後息也伊耆氏以有功於耆老著矣故後世以其官為姓周文以其姓名官先儒謂其始制鼓籥又始為蠟於是以為古王者之號然古之制法者𨽻首造歷大橈作甲子蒼頡造書之類豈皆古王者哉果伊耆氏實古王者之號周人固應尊異而神之不宜列於街枚氏壺涿氏而以下士之官名之也蠟也者索也歲十二月合聚萬物而索享之也注索謂求索也嵗十二月周之正朔謂建亥之月也享者祭其神也萬物有加功於民者神使之也祭之以報焉造者配之也其疏萬物非所享但享其萬物之神所以享神者萬物所以能加功於民神使為之馬氏晞孟曰建亥之月五榖已入萬物所以成者神有以相功於其幽民有以致力於其明神有功以相其幽則報之民有力以致其明則勞之所謂百日之蠟一日之澤是也蕙田案蠟者索也合聚萬物而索享之蓋農功既成特祭享以報先嗇而凡物之有功於嗇事者甚多因非常祀之所及故必索而祭之楚詞吾將上下而求索是索字義也既云索則細微幽隱無所不到故天子大蠟仁之至義之盡其非常祀所及之神明矣自鄭氏解月令以天宗公社門閭先祖五祀皆謂之蠟而蠟之名義已失夫日月星辰社稷宗廟乃國家之大祀何待索而祭之耶且合天宗與貓虎同類而祭不已褻乎又以先祖五祀為蠟則混臘為蠟而臘之禮亦失故蠟之名義不可以不正名義正而注疏及後世之沿襲誤謬可一覽而知也右蠟名義禮記郊特牲天子大蠟八疏大蠟八者鄭注云先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八蠟云大者是天子之蠟禮運云仲尼與蠟賓是諸侯有蠟也蕙田案鄭注八蠟有昆蟲以祝詞誤也經文實無之蠟之祭也主先嗇而祭司嗇也注先嗇若神農者司嗇后稷是也疏曰若是不定之辭以神農比擬故云若司嗇后稷無所疑故不言若直云后稷是也以先嗇為主司嗇從祭種曰稼斂曰嗇不云稼而云嗇者取其成功收斂受嗇而祭也祭百種以報嗇也疏百種則農及郵表畷禽獸等所以祭之者報其助嗇之功使盡享焉享農及郵表畷禽獸仁之至義之盡也注農田畯也郵表畷謂田畯所以督約百姓於井間之處也疏農謂古之田畯有功於民郵表畷者是田畯於井間所舍之處郵若郵亭屋宇處所表曰畔畷者謂田畔相連畷於此田畔相連畷之所造此郵舍田畯處焉禽獸者即下文云貓虎之屬古之君子使之必報之迎貓謂其食田鼠也迎虎謂其食田豕也迎而祭之也迎其神也祭坊與水庸事也注水庸溝也疏曰祭坊與水庸事也者是營為所須之事故云事也坊者所以畜水亦以鄣水庸者所以受水亦以泄水謂祭此坊與水庸之神方氏慤曰上言祭下言享互相備也百種百榖之種也百種乃嗇之所成故祭百種以報嗇也農則致所掌以養人而不失其時者也郵則田官於此有所識畷則田官於此有所聮皆督約農事之處也故三者合為八蠟之一焉鼠之與豕皆足以為田之害而貓與虎能食而除之迎其神而祭之則所以報之也於貓虎如此則六者可知矣馬氏晞孟曰先嗇者其智足以創物立於其先司嗇者因其成法而謹其職而已故祭則以先嗇為主而以司嗇配之張子曰八蠟以記四方八者先嗇一也是始治稼穡者據易則是神農也司嗇是修此職者二也農三也郵表畷四也貓虎五也坊六也水庸七也百種八也百種百榖之種也祭之以民食之重亦報其嗇所成舊説以昆蟲為八蟲是為害者不當祭百種或致此百種而祭之或只祭稷而已陳皓集説嗇與穡同先嗇神農也主言為八神之主也司嗇上古后稷之官百種司百穀之種之神也報嗇謂報其教民樹藝之功陳氏禮書蠟之為祭所以報本反始息老送終也其服王玄冕而有司皮辨素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞其所致者川澤山林以至土示天神莫不與焉則合聚萬物而享之者非特八神也而所重者八以其尤有功於田故也其神之尊者非特先嗇也而主先嗇以其始有事於田故也鄭氏曰先嗇若神農者司嗇后稷是也農田畯也郵表畷田畯所以督約百姓於井間之處也爾雅田畯農夫也然則蠟之八神則先嗇也司嗇也百種也農也郵表畷也禽獸也坊也水庸也古者蠟則飲於學黨正屬民飲酒於序是也程氏迥曰八蠟之祭為民設教也厚矣方里而井八家共焉吾食其一仰事俯育資焉而無憾者可不知所本乎古有始為稼穡以易佃漁但吾卒嵗無飢不與禽獸爭一旦之命者繄先嗇是德故祭先嗇焉曰司嗇者謂修明其政而潤色之者也曰農者謂傳是業以授之於我者也曰郵表畷者畷井田間道也郵表也者謂畫界分理以是為準者也昔之人為是而勞今我蒙之而逸蓋不得不報也曰貓虎者謂能除鼠豕之害吾稼者也曰坊者謂昔為隄防之人使吾禦水患者也曰水庸者謂昔為畎澮溝洫使吾為旱備者也曰昆蟲者先儒謂昆蟲害稼不當與祭乃易以百種是不然所謂昆蟲者非祭昆蟲也祭其除昆蟲而有功於我者也除昆蟲者不一而足如火田之人捕蝗之子禽鳥或能食之霜霰或能殺之以其不一而足故直曰昆蟲焉耳夫以表畷坊庸之賤𨽻貓虎昆蟲之細效吾不敢忘皆得以上配先嗇司嗇之享其民勸於功利推而廣之等而上之視君親如天地而不敢慢也觀三代里田蠟祭之時其民恬寧愈樂和睦無怨故鬼神享馨香之薦交歸其德不為妖厲豈不盛矣乎大學衍義補丘氏濬曰八蠟之名鄭玄所敘者有昆蟲而無百種張載謂昆蟲不當祀而以百種足其數陳祥道則以貓虎為禽獸切觀下文所謂主先嗇祭司嗇祭百種祭坊與水庸享農及郵表畷禽獸曰主曰祭曰享其文各不同蓋主者以之為主司嗇與司榖種及坊與水庸之神則所致祭者焉然所以主其祭者則先嗇也若夫所謂古者田畯之官及郵表畷督耕之處與夫食鼠食豕之禽獸則有功於稼穡者故從而索享之也所謂迎貓為其食田鼠迎虎謂其食田豕所以釋其享禽獸之故則陳氏以迎貓虎為禽獸者良是也然禽獸不止貓虎凡食為除所以害稼穡者皆在其中矣所謂昆蟲者特見祝辭中語昆蟲祝其母作者恐其起而害稼也其不當祭明矣八蠟之名當以陳氏為正蕙田案八蠟昆蟲之祭經無明文張子及禮書兩陳氏之説為是丘氏宗之當矣沙隨説未的蔡氏德晉曰伊耆氏始為蠟皇氏侃及熊安生俱以伊耆為神農路史謂神農初國伊繼國耆故氏伊耆生三嵗而知稼穡般戲必於黍稷為能神明於農事因號神農也天子大蠟八則所祭之神有八一先嗇二司嗇三農四郵五表畷六坊七水庸八禽獸即貓虎也種曰稼斂曰嗇天生五穀雜於庶草先嗇知粒食利於養生因收穫之又從而種植之而農事以起是為田祖司嗇則守其法以教民稼穡者也路史燧人氏鑽木取火以燔黍捭豚葛天氏之樂八闋其四曰奮五榖是有先神農而知穡事者也農勸農之官是為田畯郵始造郵舍俾田畯居之以督耕者表畷治疆理田而植樹木以為標列阡陌以為道者坊始造隄防以障水者水庸始造水溝以注水者禽獸即貓虎貓能食田鼠虎能食田豕故迎其神而祭之八神之位先嗇為主正中司嗇及農為配司嗇居左次郵次坊農居右次表畷次水庸禽獸附祭於下貓左而虎右陸農師謂鼠善害苗貓能捕鼠故字從苗其有功於田尤大也先儒之言八神者不知郵與表畷為二而誤合之以為造郵舍於田畔相連綴之處即不足八神之數鄭康成蔡中郎則以祝詞有昆蟲無作草木歸其澤之語因以昆蟲為一夫昆蟲不當祭若祭除昆蟲者亦當祭除草木者而不止於八矣况詩云去其螟螣及其蟊賊毋害我田稚田祖有神秉畀炎火則除昆蟲亦先嗇司嗇事耳王子雍分貓虎為二夫貓虎即禽獸似亦不宜分也陳用之又因祭百種以報嗇之文而以百種為一夫此特言祭用百種之穀以報先嗇司嗇云耳初非祭百種之穀也若祭百種之穀則是祭穀神而為社稷之祭非蠟祭也蕙田案蔡氏以郵表畷為二未詳何據竊謂畷有郵而謂之表若無郵則何表之與有舊説為是又謂祭用百種之榖以報先嗇若祭百種之榖則是祭百神而為社稷之祭亦非也從來祭祀用黍稷未有用百種為齍盛者社稷正祭稷神乃百榖之長蠟則兼百種之神而祭之也觀承案八蠟之目注疏以昆蟲為第八者自不合即謂非祭昆蟲乃祭禦昆蟲之神則豳雅田祖有神秉畀炎火當祭田祖之神且地官族師有祭酺是祭捕蝗之神不當反以昆蟲名其神也張子獨據經文祭百種句而以百種易昆蟲始為穩妥故二陳氏俱從之若蔡德晉去昆蟲而析郵表畷為二則割裂不通矣然司嗇即古稷官稷為百榖之長祭百種以報嗇是報司嗇之神而百種乃其祭物耳不當又分為二也王肅舊説則先嗇一司嗇二農三郵表畷四貓五虎六坊七水庸八亦只就經文看出因迎貓迎虎本分為二而亦分之為文順也且祭各有尸昆蟲之尸固難肖即百種之尸亦當作何狀貌耶則不如此説為當也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功注四方方有祭也其方榖不熟則不通於蠟使民謹於用財也移之言羡也詩頌豐年曰為酒為醴蒸畀祖妣以洽百禮此其羡之與收謂收斂積聚也息民與蠟異則黃衣黃冠而祭為臘必矣廟疏此論天子蠟祭四方不同豐荒有異兼記臘祭宗息民之事四方之內年穀不得和順成熟則當方八蠟之神不得與諸方通祭所以然者欲使不熟之方萬民謹慎財物也有順成之方其蠟之八神乃與諸方通祭以蠟祭豐饒皆醉飽酒食使民歆羡也前文云黃衣黃冠而祭不云臘之與蠟似為一此文云既蠟而收民息已先蠟後息民是息民為臘與蠟異也前黃衣黃冠在蠟祭下故鄭知是臘也月令臘在祈天宗之下但不知臘與蠟祭相去幾日準隋禮及今禮皆蠟之後日不興功謂不興農功若土功則左傳云龍見而畢務戒事也火見而致用水昏正而栽日至而畢土功建亥之月起日至而畢也方氏慤曰記四方者記四方之豐凶也年不順成八蠟不通此以蠟而記其凶也順成之年其蠟乃通此以蠟而記其豐也蠟乃合聚之祭故因其合聚而收之也物既收則民亦息民息則一歲之事已矣故曰民息已前言息田夫此言民息互相備也功者民力之所致民息已故既蠟君子不興功但蠟本以息農夫則此所言功止謂農功耳若夫宫功則執於建亥之月土功則畢於建子之月武功則纘於建丑之月而既蠟君子未始不興功焉栁宗元蠟説栁子為御史主祀事將蠟進有司以問蠟之説則曰合百神於南郊以為歲報者也先有事必質於户部户部之詞曰旱於某水於某蟲蝗於某癘疫於某則黜其方守之神不及以祭余嘗學禮蓋思而得之則曰順成之方其蠟乃通若是古矣繼而歎曰神之貌乎吾不可得而見也祭之享乎吾不可得而知也是其誕漫惝恍冥冥焉不可執取者夫聖人為心也必有道而已矣非於神也蓋於人也以其誕漫惝恍冥冥焉不可執取而猶誅前若此况其貌言動作之塊然者乎是設乎彼而戒乎此者也其旨大矣或曰若子之言則旱乎水乎蟲蝗乎癘疫乎未有黜其吏者而神黜焉而曰蓋於人者何也豫曰若子之云旱乎水乎蟲蝗乎癘疫乎豈人之為耶故其黜在神暴乎眊乎沓貪乎罷弱乎非神之為也故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存其教之實則隱以為非聖人之意故歎而云也曰然則致雨反風蝗不為災虎負子而趨是非人之為則何以余曰子欲知其以乎所謂偶然者信矣必若人之為則十年九潦八年七旱者獨何如人哉其黜之也苟明乎教之道雖去古之數可矣反是則誕漫之説勝而名實之事喪亦足悲乎右八蠟禮記月令孟冬之月臘先祖五祀注臘謂以田獵所得禽祭也春秋僖公五年左氏傳宫之竒曰虞不臘矣注臘歲終祭衆神之名大疏此言虞不臘矣明當時有臘祭周時臘與蠟各為一祭漢改曰臘不蠟而為臘矣朱子曰史記云左丘失明厥有國語左傳是姓左人作秦始有臘而左氏謂虞不臘矣是秦時文字分明蕙田案孔疏周時臘與大蠟各為一祭漢改曰臘不蠟而為臘矣的是蠟臘正解既從杜氏不以妨鄭為嫌也玉燭寶典臘者祭先祖蠟者報百神同日異祭也辨鄭氏祈年天宗割祠公社及門閭臘先祖五祀俱蠟祭禮記月令孟冬之月天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀鄭注此周禮所謂蠟祭也天宗日月星辰也或言祈年或言大割或言臘互文疏祈來年於天宗者謂祭日月星辰也大割祠於公社者謂大割牲以祀公社及門閭者先祭社後祭門閭故云及臘先祖五祀者臘獵也謂獵取禽獸以祭先祖五祀也此等之祭總謂之蠟若細别言之天宗公社門閭謂之蠟其祭則皮辨素服葛帶榛杖其臘先祖五祀謂之息民之祭其服則黃衣黃冠鄭注郊特牲云息民與蠟異也如此周禮所謂蠟者以郊特牲蠟者索也索萬物而享之案籥章云國祭蠟吹豳頌以息老物蠟而後息老此經亦先祭衆神乃後勞農休息文與籥章相當故經廣祭衆神是周禮籥章所謂蠟祭也云或言祈年或言大割或言臘互文者天宗公社門閭先祖五祀等皆祈年大割臘祭之事故云互也陳氏禮書既蠟則臘先祖五祀於廟仲尼與於蠟賓事畢出逰於觀之上是也然則臘亦謂之蠟矣先儒以郊特牲言皮辨素服而祭又言黃衣黃冠而祭則二祭之服不同月令言祈來年於天宗割祠於公社又言臘先祖五祀則祈臘之名不同於是謂皮辨素服而祭與祈來年於天宗蠟也黃衣黃冠而祭與臘先祖五祀臘也蠟以息老物臘以息民息民固在蠟後矣此記所以言既蠟而收民息已也周蠟於十有二月秦臘於孟冬皆建亥之月也晉侯以十二月滅虢遂襲虞宫之竒曰虞不臘矣則臘在蠟月可知矣古者臘有常月而無常日祖在始行而無常時由漢以來溺於五行之説以王曰祖以衰曰臘其失先王之禮逺矣後周兼五天帝五人帝與百神而蠟於五郊唐不祭五天帝五人帝特蠟百神於南郊而缺其方之不登者然蠟因其順成之方以報神因其州之序以樂民則唐一於南郊非也蠟及天宗則日月星辰之類而已後唐兼天帝而祭之亦非也先儒謂蠟六奏樂而禮畢東方之祭則用太簇姑洗南方㽔賓西方夷則無射北方則黃鍾為均於理或然羅泌路史蠟與臘異臘也者獵也獵取禽獸以祭祖故禮臘先祖五祀在蠟後漢唐蠟祭遍及五祀蠟則於郊臘則於廟蠟祭宗而不及天祭社而不著地以異於郊也玉燭寶典云臘者祭先祖蠟者報百神同日而異祭蓋亦以漢世季冬勞農大享臘祭宗廟五祀同於一日爾蔡氏德晉曰周禮司服祭羣小祀則玄冕然冕服始於黃帝而神農時未有故蠟祭主祭者皮辨素服助祭者黃衣黃冠鄭康成以黃衣黃冠為既蠟臘先祖五祀者非也月令孟冬天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀言祈言祠言臘三祭皆與蠟無涉蠟惟祭八神不及其他而鄭康成月令注云此周禮所謂蠟祭者非也左傳宫之竒云虞不臘矣即月令之臘先祖五祀謂以田獵所得禽祭周官大司馬仲冬教大閲致禽饁獸於郊入獻禽以享蒸是也蓋周時蠟祭八神臘祭先祖五祀各為一祭至秦漢間歲終祭衆神俱名臘故説文云冬至後三戌臘祭百神史記秦惠文王十二年初臘始皇三十一年更名臘曰嘉平漢復曰臘秦又有伏史記秦德公二年初伏注六月三伏之節始自秦德公伏者金氣伏藏之日四氣代謝皆相生至立秋以金代火金畏火故庚日必伏夏至後三庚為初伏四庚為中伏立秋後初庚為末伏也漢又有祖旺曰祖衰曰臘周以前無所謂伏與祖者蠟之名則自神農至周不變臘則僅為先祖五祀之祭而與蠟同月乃中郎獨斷載四代臘之别名夏曰嘉平殷曰清祀周曰大蠟漢曰臘五祖臘祖之别名青帝以未臘卯祖赤帝以戌臘午祖白帝以丑臘酉祖黑帝以辰臘子祖黃帝以辰臘未祖均係漢儒附會之説不足信也蕙田案蠟臘之祭是二非一見於經傳者甚明蠟祭有八而八者所統甚多故有百物萬物之説臘則先祖五祀而己月令孟冬祈年是祭天宗割祠是祭社及門閭臘是祭先祖五祀皆與蠟無涉鄭氏以蠟有索享萬物之語遂并以為蠟祭蔡氏辨之極是豈知禮文明言萬物百物至日月星辰社稷乃天地神祗中之尊者而豈以萬物該之乎自此注一誤秦漢遂舉臘而廢蠟蔡雍遂以蠟臘為一事後世且以天神地祗為重而祭之於南郊四郊是并八蠟之本義俱失之而非主先嗇祭司嗇之意矣皆鄭氏誤之也楊氏復曰夏正建寅殷正建丑周正建子三正不同夫子告顔淵獨以夏時為正蓋建寅者生物之始亦人事之始故以為嵗首建丑者成物之終亦人事之終故以為歲終則行蠟臘之祭宜也禮記月令孟冬臘先祖五祀籥章國祭蠟黨正國索鬼神而祭祀鄭氏兩注皆謂建亥之月亦可疑原記禮者及注家之意豈不曰此皆周禮也周以建子為嵗首故以建亥之月為歲終然夏殷周三王示不相沿特以其月為大朝會大政令之始而天時之始終則不可易也建亥孟冬之月謂之嵗終可乎漢史臘月陳勝之御莊賈殺勝以降秦張晏曰秦之臘月夏之九月也其意亦曰秦以建亥為正而臘則建戌也臣瓉曰建丑之月也師古曰史記云胡亥二年十月誅葛嬰十一月周文死十二月陳勝死臣瓉説是也夫秦人不師古始猶知以建丑之月為臘孰謂周人以建亥為臘乎蔡氏德晉曰建亥之月農事既畢乃行蠟祭於夏為十月於商為十一月於周為十二月郊特牲云蠟也者索也嵗十二月合聚萬物而索享之是也蕙田案豳七月詩躋堂稱兕疏引國索鬼神而祭祀以禮屬民而飲於序以正齒位則即是蠟也據詩在十月滌場之時故月令屬之孟冬蓋農功甫畢三時勤動至是乃始休息是蠟在建亥之月無疑且春秋用周正虞滅虢在十二月明是一大證據况若在建丑之月是元正方過于耜舉趾又將復始農功何息之有楊氏之説非是右臘周禮春官大宗伯以疈辜祭四方百物注疈謂磔禳及蠟祭疏云及蠟祭者彼云蠟也者索也嵗十二月合聚萬物而索享之謂天子於周之十二月建亥之月於郊而為蠟法司服祭羣小祀則玄冕注羣小祀林澤墳衍四方百物之屬疏云羣小祀林澤墳衍四方百物者此據地之小祀以血祭社稷為中祀貍沈以下為小祀也禮記郊特牲皮辨素服而祭素服以送終也葛帶榛杖喪殺也蠟之祭仁之至義之盡也注送終喪殺所謂息老物也素服衣裳皆素黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也注祭謂既蠟臘先祖五祀也於是勞農以休息之論語曰黃衣狐裘黃冠草服言祭以息民服象其時物之色季秋而草木黃落有疏上云蠟此云祭故知既蠟臘先祖五祀對文蠟臘别總其義俱名蠟也田夫則野夫也野夫著黃冠陳氏祥道曰皮辨素服而祭者蠟祭四方百物也黃衣黃冠而祭者臘先祖五祀也蠟以息老物故服送終之服而以皮辨素服葛帶榛杖臘以息民故服田夫之服而以黃衣黃冠然周禮司服王祭羣小祀則玄冕鄭氏曰羣小祀林澤墳衍四方百物之屬也大宗伯以疈辜祭四方百物鄭氏曰四方百物磔禳及蠟祭也王於蠟服玄冕而有素服與黃冠者蓋執事者之服歟方氏慤曰皮則其色白素服則衣裳皆素素者送終之服而蠟亦送終之事故云以送終也别言之則服止言衣裳合言之則辨亦服爾故下止言素服也帶不以麻而以葛杖不以竹而以榛若喪也而實非喪故曰喪殺也既非喪必欲若喪者以其有送終之義故也前言皮辨素服後言黃衣黃冠而祭説者謂皮辨素服為主祭者之服黃衣黃冠為助祭者之服是矣其言野夫黃冠則為助祭者之服可知且皮辨素服則以送終為義黃衣黃冠則以息田夫為義送終者祭之道也田夫者祭之事也夫黃者土之色百昌生於土而作終亦反於土而息冬則反於土之時也服以是色亦宜矣土爰稼穡者田夫之事取土之義以息田夫又宜矣以土之義如此故凡野夫皆黃冠野夫即田夫也言其所事曰田夫言其所居曰野夫草服謂草野之服故下言草笠以為野也上兼言黃衣而下止言黃冠則以草服該之故也然籥章曰息老物此曰息田夫者蓋作之於始息之於終雖人之情亦是道也終則有始今歲之息乃所以兆來嵗之作息猶氣之息也往來未嘗息乃所以為息也蕙田案鄭以皮辨素服是蠟祭黃衣黃冠是臘服陳氏以為俱是執事者之服方氏以為皮辨素服是主祭者之服黃衣黃冠是助祭者之服三説之中當以方氏為長周禮春官籥章國祭蠟則吹豳頌擊土鼓以息老物注玄謂十二月建亥之月也索萬物而祭之者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事是亦歌其類也謂之頌者以其言歲終人功之成之疏此蠟祭直擊土鼓案明堂位云土鼓葦籥伊者氏樂即此亦各有葦籥可知言以息老物者謂息田夫萬物也云謂之頌者以其言嵗終人工之成者凡言頌者頌美成功之事故於七月風詩之中亦有雅頌也李氏景齊曰豳詩曰豳雅先儒以為七月之詩備風雅頌三體非也籥章所謂豳籥者蓋以豳吹為籥以豳籥而吹詩與雅頌皆以豳名夫逆暑迎寒而吹豳詩者此則七月之詩蓋如授衣鑿冰之屬皆先寒暑以戒事故也祈年而吹豳雅祭蠟而吹豳頌蓋雅者言王政之所由廢興頌者以其成功告神明祈年之禮王政之所急先故宜歌雅而蠟祭之設所以答鬼神之功故宜歌頌詩之小雅甫田之詩曰琴瑟擊鼓以御田祖以祈甘雨所謂祈年而吹豳雅者毋乃在是詩周頌豐年之詩曰為酒為醴蒸畀祖妣以洽百禮所謂祭蠟吹豳頌者毋乃在是乎何氏楷世本古義豐年孟冬祭八蠟也是為豳頌今案豐年之詩舊亦知為報賽而作然無有知其専為蠟祭者愚蓋即以豐年一語知之蠟祭惟年豐有之非若他祭不問豐凶其禮不廢此詩特以年豐降福為言非報賽八蠟而何天子大蠟八諸侯之蠟未聞然禮運言仲尼與於蠟賓則可見諸侯之國有蠟矣所以知此詩為豳頌者以其事與周禮合而詩又在頌中其為豳頌明矣又曰良耜蠟祭報社也是為豳頌蠟之為言索也謂合祭萬物之神而索享之也天子大蠟八而又有天宗之祈公社門閭之祀周禮黨正亦云國索鬼神而祭祀若然則凡為神者莫不與矣而獨謂是詩為報社者何也禮祭隂祀用黝牲隂祀者先儒謂祭地北郊及社稷也黝也者黑也殺時犉牡固黑唇也祭地北郊天子之禮諸侯惟祭社稷祭社必及稷也是以知其為報社也社祭一歲凡有三月令仲春擇元日命民社一也雩祭以社以方二也孟冬大割祠於公社三也與祈年天宗並舉者周禮肆師之職所謂社之日涖卜來歲之稼即此時事也若門閭之祀不知何神如以為五祀中之門則既蠟而臘復又及五祀矣似不應瀆祭也且既非隂祀即不用黝牲以是知此詩之作専為報社也又曰載芟孟冬臘先祖五祀以禮屬民飲酒正其齒位亦豳頌也月令孟冬之月天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀郊特牲云黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也先儒謂此既蠟後臘先祖五祀之祭也對文蠟臘有别總其義俱名蠟也唐孔氏云月令臘在祈天宗之下但不知臘與蠟祭相去幾日準隋禮及今禮皆蠟之後日又案臘之義訓有二徐鍇云臘合也合祭諸神也應劭亦云臘者接也新故交接狎臘大祭以報功也愚謂此義得之狎臘者重接之貌西京賦披紅葩之狎臘是也乃先儒相傳皆謂臘者獵也謂以田獵所得禽祭也夫郊特牲篇有曰大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也曰好田好女者亡其國是則好田之戒正申飭於臘月來貢之時而謂其臘禽以祭乎必不然矣或有疑周禮羅氏職有蠟則作羅襦之語謂將以羅網圍取禽也夫野虞教道田獵實在仲冬此時作羅𥜗亦以備用也即周禮中冬狩田獻禽享蒸非臘月也大司樂凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神注此謂大蠟索鬼神而致百物六奏樂而禮畢東方之祭用太蔟姑洗南方之祭用㽔賓西方之祭用夷則無射北方之祭用黃鍾為均每奏有所感致和以來之鄭氏鍔曰致者使之自至樂作於此物應於彼雖聖人亦安能限其必至哉亦意其來格而已樂止於六變者蓋蠟祭之樂六變而祭畢地官鼓人凡祭祀百物之神鼓兵舞帗舞者注兵謂干戚也帗列五采繒為之有秉皆舞者所執鼓疏此更廣見小神之事故云凡祭祀百物之神也云兵舞帗舞者天地之小神所舞不過此兵舞帗舞二事案下舞師山川用兵舞社稷用帗舞今此小神等若義近山川者舞兵舞義近社稷者舞帗舞故六舞之中惟言此二物而已禮記郊特牲曰土反其宅水歸其壑昆蟲毋作草木歸其澤注此蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也疏此以下皆蠟祭之祝辭土即坊也反歸也宅安也土歸其宅則不崩水歸其壑者水即水庸壑坑坎也水歸其壑謂不泛濫昆蟲毋作者昆蟲螟螽之屬也得隂而死得陽而生故曰昆蟲毋作謂不為災草木歸其澤者草苔稗木榛梗之屬也當各歸生藪澤之中不得生於良田害嘉穀也蠟祭乃是報功故亦因祈禱有此辭也一云祝辭言此神由有此功故今得報非祈禱也辭有水土昆蟲草木者以其無知故特有辭也而先嗇之屬有知故不假辭也據此祭草木有辭則草木當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指其一物故不數周氏諝曰大蠟祝辭雖紀歲終之事蓋亦有順天時息老物之意也馬氏晞孟曰蠟者於歲之終報其成功又以祈來年之始故祀之辭如此草木者荑稗之屬蔡雍獨斷天子大蠟八神為位相對向祝曰土反其宅水歸其壑昆蟲毋作豐年若上嵗取千百右蠟祭禮物樂舞祝詞周禮地官黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位注國索鬼神而祭祀謂歲十二月大蠟之時建亥之月也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將缺於禮至此農隙而教之尊長養老見孝悌之道也黨正飲酒禮亡以此事屬於鄉飲酒之義微少失矣凡射飲酒比鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也疏曰黨正行正齒位之禮在十二月建亥之月為之非蠟祭之禮而此云國索鬼神而祭祀者以其正齒位禮在臘月故言之以為節耳當國索鬼神而祭祀之時則黨正屬聚其民而飲酒於序學中以行正齒位之法當正齒位之時民內有為一命以上必來觀禮故須言其坐之處黃氏度曰社禜酺皆鄉祭惟蠟為國祭蓋亦命祀也陸氏佃曰其屬飲則於鄉學其主人則以鄉官其賓介則處士賢者其謀介則就先生坐主人於東南僎於東北坐賔於西北坐介於西南此正位也一命齒於鄉里再命齒於父族三命而不齒六十者三豆七十者四豆八十者五豆九十者六豆此正齒也王氏詳説曰鄉大夫三年一行鄉飲酒禮黨正一年而行鄉飲酒禮鄉大夫行此禮以賓興黨正行此禮以正齒位劉氏彞曰大司徒之職曰大荒大札則令邦國移民通財舍禁弛力薄征緩刑然則蠟之通不通皆聽命於司徒矣蠟禮既畢然後息民之祭行焉然則黨正國索鬼神而祭祀者蠟也非其所職焉其所職者於蠟之後以禮屬其黨之民飲酒於序以正齒位而謂之息民者息其田野之勞而入於邑居以習禮義故正其齒位以為庠序之先焉禮記禮運昔者仲尼與於蠟賓事畢出遊於觀之上喟然而歎注蠟者索也嵗十二月合聚萬物而索享之亦祭宗廟時孔子仕魯在助祭之中觀闕也孔子見魯君於祭禮有不備於此又睹象魏舊章之處感而歎之疏鄭引郊特牲十二月蠟據周言之夏則十月殷則十一月謂建亥之月也以萬物功成報之方氏慤曰助祭者必有飲食以勞之故謂之賔焉文王世子於釋菜言退儐者以此雜記子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也注國索鬼神而祭祀則黨正以禮屬民而飲酒於序以正齒位於是時民無不醉者如狂矣曰未知其樂怪之也蠟之祭主先嗇大飲蒸勞農以休息之言民皆勤稼穡有百日之勞喻久也今一日使之飲酒燕樂是君之恩澤非女所知言其義大也張弛以弓弩喻人也弓弩久張之則絶其力久弛之則失其體吕氏大臨曰自秋成至于十二月有百日在百日中索是鬼神以修蠟禮故曰百日之蠟至於十二月乃祭祭而遂息田夫故曰一日之澤方氏慤曰蠟者既勞之而報之也澤者欲息之而加之惠也勞之其來也久故言百日之蠟息之其及也均故言一日之澤玉藻惟饗野人皆酒疏饗野人謂蠟祭是也野人賤不得本古又無德又可飽食則宜貪味故惟酒而無水也右祭蠟飲酒正齒位周禮考工記梓人張獸侯則王以息燕注獸侯畫獸之侯也息者休農息老物也燕謂勞使臣若與羣臣飲酒而射酒疏云息者休農息老物也者謂十月農功畢君臣飲以休農止息之老萬物也夏官羅氏蠟則作羅襦注作猶用也鄭司農云蠟謂十二月大祭萬物也襦細密之羅襦襦讀為繻有衣袽之繻玄謂蠟建亥之月此時火伏蟄者畢矣豺既祭獸可以羅罔圍取禽也疏先鄭所云其義得矣後鄭增成之言蠟者直取當蠟之月得用細密之網羅取禽獸故後鄭云此時火伏十月之時火星已伏在戌將蟄者畢矣引王制者證十月蠟祭後得火田有張羅之事薛氏季宣曰漢史六人皆一襦吾獨五襦晉史云先且作襦後當作袴裙襦襠婦人之飾也郊特牲言歲十二月合聚萬物而索享之四方諸侯草笠而至大羅氏天子掌鳥獸之官致鹿與女戒諸侯曰好田好女者亡其國然以禮屬民而飲酒存國家之大體豈可真致鹿與女哉以鹿不可致故作羅以示之女不可致故作襦以示之耳鄭氏鍔曰致鹿與女非必用鹿與女也蓋用取鹿之具與婦人之裙襦而已用羅襦以示之者羅以戒其好田也襦以戒其好女也然使羅氏作之而已先儒以羅襦為一物殆未之思歟禮記郊特牲大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也注諸侯於蠟使使者戴草笠貢鳥獸也詩云彼都人士臺笠緇撮又曰其餉伊黍其笠伊糾皆言野人之服也能疏天子掌鳥獸之官謂大羅氏也謂為大羅者鄭云以羅捕鳥獸者也周禮羅氏掌羅烏鳥蠟則作羅襦鄭司農云襦細密之羅也解者云順秋冬殺物故羅氏用細密之羅網以捕禽鳥矣然周禮不云掌獸此云獸者以其受貢獸故也諸侯貢屬焉者大羅氏既以羅為名能張羅得鳥獸故四方諸侯有貢獻鳥獸於王者皆屬大羅氏也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國疏羅氏先受貢畢使者臨去羅氏又以鹿及女子致與使者而宣天子之詔於使者令使者反還其國以告戒其君故云詔言也令使者還其國以如此告汝君曰不得好田獵及女色使國亡也言鹿是田獵所得之物女是亡國之女而王所以獲者也故與之鹿女明以此為戒也一云豈每國輒與女鹿耶正當羅氏以鹿與女示使者耳天子樹瓜華不斂藏之種也注華果蓏也又詔以天子樹瓜蓏而已戒諸侯以畜藏蘊財利也供疏言天子惟樹瓜與果蓏所以惟樹植此瓜華者是一時之食不是收斂久藏之種若其可久藏之物則不樹之不務畜藏與民爭利劉氏彛曰四方諸侯當仲冬而遇於天子者必助其祭祀也故其為蠟而獵莫不從焉貢其禽於天子則大羅氏受之獻禽者諸侯之卿大夫也草笠而至尊野服者以明諸侯及其臣皆野服馳騁從禽以助王也其為忠義亦可尊矣即之以為禮焉既受草笠之獻則致鹿與女於庭而詔獻禽之客俾還告於其君以申天子之戒勸也周氏諝曰周官羅氏謂蠟則作羅𥜗蓋羅則鹿之所以獲者而襦則女之所衣者也故致之以戒於諸侯然戒之必至於嵗終者戒於終所以圖其始也瓜華者不斂藏之種也樹其不斂藏之種者所以戒聚斂也右蠟時之事史記秦本紀惠文君十二年初臘注臘獵禽獸以嵗終祭先祖秦是時始效中國為之風俗通夏曰嘉平殷曰清祀周曰蠟漢改曰臘索羣鬼神而祭之始皇本紀三十一年十二月更名臘曰嘉平索隱曰廣雅曰夏曰清祀殷曰嘉平周曰大蠟亦曰臘秦更曰嘉平蓋應歌謠之詞而改從殷號也通典漢復嘉平曰臘玉海周顯王四十三年秦初臘案春秋時已稱虞不臘非始於秦也始皇更名臘曰嘉平亦復用夏之舊名也周蠟於十二月秦臘於孟冬皆建亥之月也蠟以息老物臘以息民後漢書禮儀志季冬之月星回歲終隂陽以交勞農大饗臘正祭宗廟旁祭五祀蓋同一日自此而始非舊典東觀漢記甄宇北海人建武中青州從事徴拜博士每臘詔賜博士羊人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鈎宇復恥之宇因先自取其最瘦者袁山松後漢書韓卓字子助陳留人臘曰奴竊食祭其先人卓義其心即白免之後漢書陳寵傳寵曽祖父咸成哀間以律令為尚書及莽篡位召咸以為掌冦大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎鄭玄别傳玄年十二隨母還家正臘宴會同列十數人皆美服盛飾言語間通玄漠然如不及父母私督數乃曰此非吾志不在所願蔡雍獨斷四代臘之别名夏曰嘉平殷曰清祀周曰大蠟漢曰臘五帝臘祖之别名青帝以未臘卯祖青帝大昊木德赤帝以戌臘午祖赤帝炎帝火行白帝以丑臘酉祖白帝少昊金行黑帝以辰臘子祖黑帝顓頊水行黃帝以辰臘未祖黃帝軒轅后土土行蕙田案雍之説當本於讖緯通典魏因漢制髙堂隆議臘用日云王者各以其行之盛而祖以其終而臘水始於申盛於子終於辰故水行之君以子祖以辰臘火始於寅盛於午終於戌故火行之君以午祖以戌臘木始於亥盛於卯終於未故木行之君以卯祖以未臘金始於已盛於酉終於丑故金行之君以酉祖以丑臘土始於未盛於戌終於辰故土行之君以戌祖以辰臘今魏土德而王宜以戌祖辰臘博士秦靜議古禮嵗終聚合萬物祭宗廟謂之蠟皆有常日臨時造請而用之又無正月祖祭之禮漢氏用午祖戌臘午者南方之象故以午祖正月為歲首故以寅始用午祖戌者嵗之終萬物畢成故以戌臘小數之學因就傅著五行以為説皆非典籍經義之文也尚書易經説五行水火金木土王相衍天地隂陽之義故易曰坤為土王位西南黃精之君盛德在未故大魏以未祖戌者嵗終日窮之辰不宜以為嵗初祖祭之行始也易曰坤利西南得朋東北喪朋丑者土之終故以丑臘終而復始乃終有慶宜如前以未祖丑臘奏可之魏名臣奏大司農董遇議曰土行之君故宜以未祖以丑臘為得盛終之節不可以戌祖辰臘也禮記外傳漢則臘而不蠟受命之王皆以王日為祖衰日為臘又云周水德漢火德各以其五行之王日為祖其休廢日為臘也火王午木王卯水王子金王酉而臘各用其衰日如魏土行土衰於辰故魏臘用辰晉金行金衰於丑故晉臘用丑五運相承莫不皆然秦靜曰古禮出行有祖祭歲終有蠟祭無正月必祖之祀蕙田案秦漢以後雖改蠟為臘其禮不同於古然饗祀之意則無異也自蔡雍有五帝臘祖之名之説而髙堂隆引伸之遂為魏家之令典而不知其出於讖緯之邪説也博士秦靜謂非典籍經義之文可為有識惜其不能奪而終歸於附會耳通典東晉元帝大興二年未臘前一日詔明日當為范氏從母舉哀百官戒嚴尚書郎張亮議曰天子祭宗廟社稷鼎俎既陳不得終事者四若五服之喪以當降者不以廢從母無服之喪不宜廢事舉哀又禮祭之明日改祭於祊以燕皇尸殷謂之肜周謂之繹今雖未施肜繹之祭先王之典聖人重不忘但大臘之日休息黎衆百日之勤一日之澤未可戒嚴宋以水德王祖以子臘以辰隋書禮儀志後周以十一月祭神農氏伊耆氏后稷氏田畯鱗羽裸毛介水墉坊郵表畷獸貓之神於五郊五方上帝地祗五星列宿蒼龍朱雀白獸玄武五人帝五官之神嶽鎮海瀆山林川澤丘陵墳衍原隰各分其方合祭之上帝地祗神農伊耆人帝於壇上南郊則以神農既蠟無其祀三辰七宿則為小壇於其側嶽鎮海瀆山林川澤丘陵墳衍原隰則各為坎餘則於平地皇帝初獻上帝地祗神農伊耆及五人帝冡宰亞獻宗伯終獻上大夫獻三辰五官后稷田畯嶽鎮海瀆中大夫獻七宿山林川澤以下自天帝人帝田畯羽毛之類牲幣玉帛皆從燎地祗郵表畷之類皆從埋祭畢皇帝如南郊便殿致齋明日乃蠟祭於南郊如東郊儀祭訖又如黃郊又如西郊又如北郊祭訖還宫蕙田案魏晉祖臘之制蠟臘之禮意亡矣至是又加以天神地祗星宿嶽瀆之位何其濫而不經耶厥後隋唐宋相仍無有起而正之者宜其不行於後矣禮教不明使先王仁至義盡之典泯然歇絶皆附會杜撰者階之厲耳惜哉隋初因周制定令亦以孟冬下亥蠟百神臘宗廟祭社稷其方不熟則闕其方之蠟焉開皇四年十一月詔曰前周嵗首今之仲冬建亥之月稱蠟可也後周用夏后之時行姬氏之蠟考之前代於義有違其十月行蠟者停可以十二月為臘於是始革前制前周姬氏後周宇文氏舊唐書禮儀志太宗貞觀十一年房玄齡等與禮官述議以為月令蠟祭惟祭天宗謂日月而下近代蠟五天帝五人帝五地祗皆非古典今並除之季冬寅日蠟祭百神於南郊大明夜明用犢二籩豆各四簠簋㽅俎各一神農及伊耆氏各用少牢一籩豆等與大明同后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方别各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宫辰日臘享於太廟用牲皆準時祭井泉用羊二二十八宿五方之山林川澤丘陵墳衍原隰鱗羽裸毛介水墉坊郵表畷貓於菟及龍麟朱鳥白虎玄武方别各用少牢一每座籩豆各二簠簋㽅俎各一蠟祭凡一百八十七座當方年榖不登則闕其祀通典玄宗開元中制儀季冬臘曰蠟百神於南郊之壇若其方不登則闕之開元禮臘日蠟百神於南郊都百九十二座大明夜明在壇上每座籩豆各十簠簋㽅俎各一神農伊耆五官每座籩豆各四簠簋俎各一五星三辰后稷五方田畯嶽鎮海瀆二十八宿五方山林川澤丘陵墳衍原隰龍麟朱鳥白獸玄武鱗羽毛介於菟井泉等八十五座籩豆各二簠簋俎各二樂舊用黃鍾之均三成新改用天神之樂圜鍾之均六成皇帝臘日蠟百神於南郊儀攝事附齋戒如圜丘從事官及攝事齋戒並如别儀陳設前蠟三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御座攝事衛尉設祀官公卿以下次於東壝之外道南北向以西為上衛尉設陳饌幔於內壝東門西門之外道東西向東方南方之饌陳於東門外西方之饌陳於西門外北方之饌陳於北門外設文武侍臣次又設祀官及從祀羣官諸州使人蕃客等次攝則無文武侍臣蕃客等次前蠟二日太樂令設宫懸歌鐘歌磬如圜丘之儀右校掃除壇之內外郊社令積柴於燎壇其壇於神壇之左內壝