body:
  text: 五禮通考卷三十二刑部尚書秦蕙田撰吉禮三十二五帝舊唐書禮儀志武德貞觀之制神祗大享之外毎歳立春之日祀青帝於東郊帝宓羲配勾芒歳星三辰七宿從祀立夏祀赤帝於南郊帝神農氏配祝融熒惑三辰七宿從祀季夏土王日祀黄帝於南郊帝軒轅配后土鎮星從祀立秋祀白帝於西郊帝少昊配蓐收太白三辰七宿從祀立冬祀黒帝於北郊帝顓頊配𤣥㝠辰星三辰七宿從祀毎郊帝及配座用方色犢各一籩豆各四簠簋各一㽅爼各一勾芒已下五星及三辰七宿毎宿牲用少牢毎座籩豆簠簋㽅爼各一音樂志祀五方上帝於五郊樂章四十首貞觀中魏徴等作今行用祀黄帝降神奏宮音黄中正位含章居貞既彰六律兼和五聲畢陳萬舞乃薦斯牲神其下降永祚休平皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和渺渺方輿蒼蒼圓葢至哉樞紐宅中圖大氣調四序風和萬籟祚我明德時雍道泰迎爼用雍和金縣夕肆玉爼朝陳饗薦黄道芬流紫辰迺誠迺敬載享載禋崇薦斯在惟皇是賓皇帝酌獻飲福用夀和詞同冬至圜丘送文舞出迎武舞入用舒和御徵乗宮出郊甸安歌率舞遞將迎自有雲門符帝賞猶持雷鼓答天成武舞用凱安詞同冬至圜丘送神用豫和詞同冬至圜丘此與太和夀和四曲以下並同祀青帝降神用角音鶴雲旦起鳥星昏集律候新風陽開初蟄至德可饗行潦斯挹錫以無疆烝人乃粒登歌奠玉帛用肅和𤣥鳥司春蒼龍登歳節物變柳光風轉蕙瑤席降神朱絃饗帝誠備祝嘏禮殫珪幣迎爼用雍和大樂希音至誠簡禮文物斯建聲名濟濟六變有成三登無體迎春豐潔恩覃愷悌送文舞出迎武舞入用舒和笙歌籥舞屬年韶鷺鼓鳬鐘展時豫調露初迎綺春節承雲遽踐蒼宵馭祀赤帝降神用徴音青陽告謝朱明戒序延長是祈敬陳椒醑博碩斯薦笙鏞備舉庶盡肅恭非馨稷黍登歌奠玉帛用肅和離位克明火中宵見峰雲暮起景風晨扇木槿初容含桃可薦芬馥百品鏗鏘三變迎爼用雍和昭昭丹陸奕奕炎方禮陳牲幣樂備篪簧瓊羞溢爼玉􅟍浮觴恭惟正直歆此馨香送文舞出迎武舞入用舒和千里温風飄絳羽十枚炎景勝朱干陳觴薦爼歌三獻拊石摐金會七盤祀白帝降神用商音白藏應節天髙氣清歳功既阜庶類收成萬方靜謐九土和平馨香是薦受祚聰明登歌奠玉帛用肅和金行在節素靈居正氣肅霜嚴林凋草勁豺祭隼擊潦收川鏡九榖已登萬箱流詠迎爼用雍和律應西成氣躔南呂珪幣咸列笙竽備舉苾苾蘭羞芬芬桂醑式資宴貺用調霜序送文舞出迎武舞入用舒和璿儀氣爽驚緹籥玉呂灰飛含素商鳴鞞奏管芳羞薦會舞安歌葆眊揚祀黒帝降神用羽音嚴冬季月星迴風厲享祀報功方祈來歳登歌奠玉帛用肅和律周玉琯星迴金度次極陽烏紀窮隂兔火林霰雪湯泉凝沍八蜡已登三農息務迎爼用雍和陽月斯紀應鍾在候載潔牲牷爰登爼豆既髙既逺無聲無臭靜言格思惟神保佑送文舞出迎武舞入用舒和執籥持羽初終曲朱干玉鏚始分行七德九功咸已暢明靈降福具穰穰又五郊樂音十首太樂舊有此詞不詳所起黄郊迎神朱明季序黄郊土辰厚以載物甘以養人毓金爲體禀火成身宮音式奏奏以迎神送神春末冬暮徂夏杪秋土王四月時季一周黍稷已享籩豆宜收送神有樂神其賜休青郊迎神緹幕移候青郊啟蟄淑景遲遲和風習習璧玉宵備旌旄曙立張樂以迎帝神其入送神文物流彩聲明動色人竭其恭靈昭其飭歆薦無已垂禎不極送禮有章惟神還軾赤郊迎神青陽節謝朱明候改靡草雕華含桃流彩簴列鐘磬筵陳脯醢樂以迎神神其如在送神炎精式降蒼生攸仰羞列豆籩酒陳犧象昭祀有應宜其不爽送樂張音惟靈之往白帝迎神序移玉律節應金商天嚴殺氣吹警秋方槱燎既積稷奠並芳樂以迎奏庶降神光送神祀遵五禮時屬三秋人懐肅敬靈降禎休奠歆㫖酒薦享珍羞載張送樂神其上遊黒郊迎神元英戒序黒郊臨候掌禮陳彞司筵執豆寒雰斂色沍泉凝漏樂以迎神八音斯奏送神北郊時洌南陸輝處奠本䖍誠獻彌恭慮上延祉福下承歡豫廣樂送神神其整馭通典永昌元年即嗣聖六年勅天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂爲天假有經傳互文終是名實未當稱號不別尊卑相混自今郊祀之禮惟昊天上帝稱天自餘五帝皆稱帝通考𤣥宗開元十一年正月十日制獻歳之吉迎氣方始敬順天時無違月令所由長吏可舉舊章開元禮立春日祀青帝於東郊以太昊配勾芒歳星三辰七宿從祀立夏日祀赤帝於南郊炎帝配祝融熒惑三辰七宿從祀季夏日祀黄帝於南郊軒轅配后土鎮星從祀立秋日祀白帝於西郊少昊配蓐收太白三辰七宿從祀立冬日祀黒帝於北郊顓頊配𤣥㝠辰星三辰七宿從祀正座配座籩豆各十二五辰五官三辰七宿籩豆各二餘各一也以上樂用本音皆以黄鍾爲均三成准周禮云圜鍾之均六變天神皆降可得而禮記云天神皆降明五帝日月星辰皆天神也又准周禮樂三變唯致丘陵之祗今改用六變齋戒攝事祀官齋戒如圜丘儀前祀七日平明太尉誓百官於尚書省曰某月某日祀青帝於東郊各揚其職不供其事國有常刑皇帝散齋四日致齋三日如圜丘儀陳設前祀三日尚舍直長施大次於外壝東門之内道北南向尚舍奉御鋪御座攝事則衛尉設祀官公卿已下次於道南北向西上衞尉設陳饌幔於内壝東門之外道南北向設文武侍臣次又設祀官及從祀羣官諸州使蕃客等次前祀二日太樂令設宮懸之樂於壇南壝之内設歌鐘歌磬於壇上各如圜丘之儀右校掃除壇之内外郊社令積柴於燎壇其壇於樂懸之南外壝之内攝事則其壇於神壇之左内壝之外方一丈髙丈二尺開上南出戸方六尺前祀一日奉禮設御位在壇之東南西向攝事則設祀官公卿位於内壝東門之内道北執事位於道南毎等異位重行西向以北為上設望燎位於柴壇之北南向設祀官公卿位於内壝東門之外道南分獻之官於公卿之南執事位於其後設祀官及從祀羣官位及門外等位一如圜丘攝事則御史位於壇上設牲牓於東壝之外當門西配帝牲牓少退南上設廩犧令位於牲西南御史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設青帝夏赤帝季夏黄帝秋白帝冬黑帝酒罇於壇之上下太罇二著罇二犧罇二罍二在壇上東南隅北向象罇二壺罇二山罍二在壇下皆於南陛之東北向西上設配帝著罇二犧罇二象罇二罍二在壇上於青帝酒罇之東北向西上歳星三辰勾芒氏夏祝融季夏后土秋蓐收冬𤣥㝠已下放此俱象罇二各設於神座之左皆右向七宿壺罇二設於神座之右而左向上帝配帝之罇置於坫星辰以下罇藉以席皆加勺冪設爵於罇下設御洗於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰之罇罍洗篚各於其方陛道之左俱内向執罇罍篚冪者各於其後又設玉幣之篚於壇上下罇坫之所祀日未明五刻太史令郊社令設青帝靈威仰神位赤帝赤熛怒黄帝含樞紐白帝白招拒黒帝叶光紀於壇上北方南向席以藁秸設帝太昊氏神座夏神農季夏軒轅秋少昊冬顓頊已下放此於東方西向席以莞設歳星三辰之座於壇之東北七宿之座於壇之西北各於其壇南向相對爲首設勾芒氏之座於壇之東面西向席皆莞設神位各於座首省牲器如別儀鸞駕出宮如圜丘儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各率其屬入實罇罍玉幣凡六罇之次太罇為上實以汎齊著罇次之實以醴齊犧罇次之實以盎齊象罇次之實以醍齊壺罇次之實以沈齊山罍下實以三酒配帝著罇為上實以汎齊犧罇次之實以醴齊象罇次之實以盎齊其歳星三辰勾芒氏之象罇俱實以醍齊七宿之壺罇俱實以汎齊𤣥酒各實於五齊之上罇禮神之玉東方以青珪南方以赤璋中央以黄琮西方以騶虞北方以𤣥璜其幣各隨方色長丈八尺太官令帥進饌者實籩豆簠簋入設於内壝東門之外饌幔内未明二刻奉禮帥贊者先入就位贊引御史博士諸太祝及令史祝史與執罇罍篚冪者入自東壝門當壇南重行北面西上立定奉禮曰再拜贊者承傳御史已下皆再拜訖執罇罍篚冪者各就位贊引引御史博士諸太祝詣卯陛升行掃除於上令史祝史行掃除於下訖引就位車駕將至謁者贊引引祝官通事舍人分引從祀羣官諸方客使先至者各就門外位駕至大次門外迴輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅之大次通事舍人各引文武九品已上從祀壝外位攝則無車駕將至下至壝外位儀太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入陳掃除訖出復位如常儀皇帝停大次半刻頃通事舍人贊引各引從祀羣官介公酅公諸方客使先入就位太常博士引太常卿立於大次門當門北向侍中版奏外辦攝則初司空入謁者引祀官贊引引執事俱就門外位司空掃除訖各引入就位贊再拜謁者進太尉之左白有司謹具請行事無皇帝停大次下至太常卿奏謹具儀皇帝服大裘而冕夏服衮冕出次華葢侍衞如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至内壝外殿中監進大珪尚衣奉御又以鎮珪授殿中監殿中監受進皇帝搢大珪執鎮珪華葢仗衞停於門近侍者從入如常謁者引禮部尚書太常少卿陪從如常儀皇帝至版位西向立毎立定太常卿博士即立於左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏舉麾鼓柷奏角音夏徴音季夏宮音秋商音冬羽音乃以黄鍾之均文舞之舞樂六成偃麾戞敔樂止太常卿前奏稱請再拜退復位皇帝再拜攝事拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於罇所其奠玉幣及毛血並如圜丘儀攝則太尉為初獻受玉幣登歌作肅和之樂餘亦如圜丘攝事之儀進熟皇帝既升奠玉帛其設饌盥洗奠皆如圜丘之儀攝事如圜丘攝事儀太祝持版進於神座之右東向跪讀祝文曰維某年歳次某月朔某日子嗣天子臣某攝事云嗣天子臣某謹遣太尉封臣名敢昭告於青帝靈威仰獻春伊始時維發生品物昭蘇式遵恒禮敬以玉帛犧齊粢盛庶品肅恭燔祀暢兹和德帝太昊氏配神作主尚饗訖興夏云昭告於赤帝赤熛怒朱明戒序長贏馭節庶品蕃碩用遵恒典敬以玉帛犧齊粢盛庶品恭敬禋祀肅昭養德帝神農氏配神作主季夏云黄帝含樞紐爰兹溽暑實惟土潤戊巳統位黄鐘在宮敬以玉帛犧齊粢盛庶品恭修燔祀式䖍厚德帝軒轅氏配神作主秋云白帝白招拒素秋伊始品物收成祗率舊章展其恒禮帝少昊氏配神作主冬云黒帝叶光紀𤣥㝠戒序庶類安寧資此積歳祗率恒典帝顓頊氏配神作主皇帝再拜初讀祝文訖樂作太祝進奠版於神座前興還罇所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執罇者舉冪侍中取爵侍中贊酌汎齊訖樂作太常卿引皇帝進當太昊氏神座前東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止太祝持版進於神座之左北面跪讀祝文曰維某年歳次某月朔日子開元神武皇帝臣某敢昭告於帝太昊氏爰始立春盛德在木用致燔燎青帝靈威仰惟帝布兹仁政功叶上𤣥謹以制幣犧齊粢盛庶品備兹明薦配神作主尚饗訖興夏云昭告於帝神農氏時維孟夏火德方融用致明禋於赤帝赤熛怒惟帝表功協德允斯作對謹以制幣犧齊粢盛庶品式陳明薦配神作主季夏云告於帝軒轅氏時維季夏位膺土德奉明禋于黄帝含樞紐惟帝功施厚地道合上𤣥謹以云云秋云告於帝少昊氏時維立秋金德在馭用致燔燎於白帝白招拒惟帝立兹義政叶此神功謹以云云冬云告於帝顓頊氏時維立冬水德在馭用致禋燎於黒帝叶光紀惟帝道合乾元允兹升配謹以云云其飲福及亞獻至還宮並同圜丘之儀攝官同圜丘攝事文獻通考開元二十五年十月一日制自今已後毎年立春之日朕當帥公卿親迎春於東郊其後夏及秋常以孟月朔於正殿讀時令仍令禮官即修撰儀注既爲常式及是常禮務從省便無使勞煩也唐書𤣥宗本紀開元二十六年正月丁丑迎氣于東郊舊唐書禮儀志開元二十六年又親往東郊迎氣祀青帝以勾芒配歳星及三辰七宿從祀其壇本在春明門外𤣥宗以祀所隘狹始移於滻水之東面而位望春宮其壇一成壇上及四面皆青色勾芒壇在東南歳星已下各爲一小壇在青帝壇之北親祀之時有瑞雪壇下侍臣及百寮拜賀稱慶文獻通考肅宗元年建卯月一日赦文朕敬授人時慎徽月令庶無極憊以獲休徴自今以後毎至四孟月迎氣之日令所司明案典禮宣讀時令朕當與百辟卿士舉而行之舊唐書禮儀志德宗貞元元年十月二十七日詔郊祀之義本於至誠制定禮名合從事實使名實相副尊卑有倫五方配帝上古哲王道濟蒸人禮著明祀論善計功則朕德不類統天御極則朕位攸同而祝文所有稱臣以祭既無益於誠敬徒有黷於等威宜從改正以敦至禮自今以後祀五方配帝祝文並不須稱臣其餘禮數如舊舊唐書歸崇敬傳時有術士巨彭祖上疏云大唐土德千年合符請毎四季郊祀天地詔禮官儒者議之崇敬議曰案舊禮立春之日迎春於東郊祭青帝立夏日迎夏於南郊祭赤帝先立秋十八日迎黄靈於中地祀黄帝秋冬各於其方黄帝於五行爲土王在四季生於火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土德乗時亦以毎歳六月土王之日祀黄帝於南郊以后土配所謂合禮今彭祖請用四季祠祀多憑緯候之說且據隂陽之說事渉不經恐難行用又議祭五人帝不稱臣云太昊五帝人帝也於國家即爲前後之禮無君臣之義若於人帝而稱臣則於天帝復何稱也議者或云五人帝列於月令分配五時則五神五音五祀五蟲五臭五榖皆以備其時之色數非謂別有尊崇也宋史禮志五方帝宋因前代之制冬至祀昊天上帝於圜丘以五方帝日月五星以下諸神從祀又以四郊迎氣及土王日專祀五方帝以五人帝配五官三辰七宿從祀各建壇于國門之外青帝之壇其崇七尺方六歩四尺赤帝之壇其崇六尺東西六歩三尺南北六歩二尺黄帝之壇其崇四尺方七歩白帝之壇其崇七尺方七歩黒帝之壇其崇五尺方三歩七尺文獻通考太宗太平興國八年詔祀土德於黄帝壇如大祠之制淳化三年正月上辛親祀南郊五方帝並列從祀詔罷本壇之祭宋史禮志真宗景德二年鹵簿使王欽若言五方帝位版如靈威仰赤熛怒皆是帝名理當恭避望下禮官詳定禮官言案開寶通禮義纂靈威仰赤熛怒含樞紐白招拒叶光紀者皆五帝之號漢書注五帝自有名即靈符文祖之類是也既爲美稱不煩迴避詔可蕙田案五帝特主宰五氣之神緯書各爲之名字先儒斥爲妖怪妄言是矣王欽若以爲名諱當避禮官又以爲美稱未知何據而云然不亦誕乎宋史樂志景德以後祀五方帝十六首青帝降神髙安六變四序伊始三陽肇新氣迎東郊蟄戸咸春功宣播殖澤被生民祝史正辭昭事惟寅奠玉幣酌獻並用嘉安條風始至盛德在木平秩東作種獻穜穋律應青陽氣和玉燭惠被兆民以介景福送神髙安備物致用薦羞明神禮成樂舉克享克禋酌獻佑安條風斯應候律維新陽和啟蟄品物皆春篪簧協奏簠簋畢陳精羞豐薦景福攸臻赤帝降神髙安長贏戒序候正南訛功資蕃育氣應清和鼎實嘉爼樂備登歌神其來享降福孔多奠玉幣酌獻嘉安景祐用祐安辭亦不同象分離位德配炎精景風協律化神含生百嘉茂育乃順髙明神無常享享于克誠送神髙安籩豆有踐黍稷惟馨禮終三獻神歸杳㝠黄帝降神髙安坤輿厚載黄裳元吉宅中居正含章抱質分王四季其功靡秩育此羣生首兹六律奠玉幣酌獻嘉安景祐用祐安辭亦不同中央定位厚德維新五行攸正四氣爰均笙鏞以間簠簋斯陳為民祈福肅奉明禋送神髙安上德居中方輿配位樂以送神式申昭事白帝降神髙安西顥騰晶天地始肅盛德在金百嘉茂育彍弩射牲築場登榖明靈格思旌䍐紛屬奠玉幣酌獻嘉安景祐用祐安辭亦不同博碩肥腯以炰以烹嘉栗㫖酒有瀰斯盈肴核惟旅肅肅烝烝吉蠲備物享于克誠送神髙安飇翰戾止景燭靈壇金奏繹如白露漙漙黒帝降神髙安隆冬戒序歳厯順成一人有慶萬物由庚有㫖斯酒有碩斯牲報功崇德正直聰明奠玉幣酌獻嘉安景祐用祐安辭亦不同大儀斡運星紀環周三時不害黍稷盈疇克誠致享品物咸羞禮成樂變錫祚貽休送神髙安管磬咸和禮獻斯畢靈馭言旋神降之吉文獻通考仁宗時制四立土王日祭五方帝宋史禮志仁宗天聖六年詔太常葺四郊宮少府監遣吏齎祭服就給祠官光祿進胙登祭使封題文獻通考皇祐定壇如唐郊祀錄各廣四丈其髙用五行八七五九六為尺數慶厯用羊豕各一正位太罇各二不用犧罇增山罍為二在壇上簠簋爼各增為二嘉祐加羊豕各二宋史禮志仁宗嘉祐元年以集賢校理丁諷言案春秋文耀勾為五帝之名始下太常去之元祐六年知開封府范百祿言每歳迎氣於四郊祀五帝配以五神國之大祀也古者天子皆親帥三公九卿諸侯大夫以䖍恭重事而導四時