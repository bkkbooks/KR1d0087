冲炎伏明河翻霜功收有年禮薦有章祗越眇㝠鴻基永昌太蔟徵昊天之氣揫歛萬彚涓日潔齊有嚴厥祀有牲惟肥有酒維㫖神之燕娭錫兹福祉姑洗羽執矩斯兊實惟素靈受職儲休萬寶以成饗于西郊奠玉陳牲侑以雅樂來歆克誠升殿正安素猋諧律西顥墮靈肇復元祀晨煬肅清下土層陔嘉薦芳馨以御蕃祉介我西成白帝奠玉幣嘉安惟時素秋肇舉元祀禮備樂作降登有數洋洋在上神既來止神之格思錫我繁祉少昊祀位奠幣嘉安西顥肅清羣生茂遂有嚴報典孔明祀事珪幣告成神靈燕喜賚我豐年以錫民祉奉爼豐安洽禮既陳諧音具舉有滌斯牲孔碩為爼維帝居歆介我稷黍樂哉有秋繄神之祜白帝酌獻祐安徂商肇祀靈葢孔饗恭承嘉禧湛澹秬鬯監此馨香靈其安留疇惠下民匪靈之休少昊氏位酌獻祐安沆碭西顥功載萬世乗金宅兊侑我明祀嘉觴布蘭牲玉潔精神之燕虞肅用有成亞終獻文安肅成萬物泬㵳其秋惟兹祀事戾止靈斿酌獻具舉典禮是求兾福斯成黍稷盈疇送神髙安沆碭白藏順成萬寶有來德馨於昭神妥露華晨晞飇馭聿還介我嗣歳澤均幅員黑帝降神髙安圜鍾為宫吉日壬癸吉中應鍾國有故常北郊迎冬乃蕆祀事必祗必恭明黙雖異感而遂通黄鍾為角良月盈數四氣推遷吉蠲是時典司其權髙靈下墮降祉幅員神之聽之祀事罔愆太蔟為徵北方之神執權司冬三時務農于焉告功禮備樂作歸功于神風馬來游承錫斯民姑洗為羽天地閉塞盛德在水黑精之君降福羨祉洋洋在上若或見之齊莊承祀其敢斁思升殿正安昧爽昭事煌煌露光滌溉蠲潔容儀肅莊牲肥酒㫖薦此芬芳降陟有序禮無越常黑帝奠玉幣嘉安晨曦未升天宇肅穆祗若元祀將以幣玉神之格思三獻茅縮明靈懌豫下土是福髙陽氏位奠幣嘉安飇馭雲葢神之顧歆丕昭禮容發揚樂音祀事既舉仰當神心申以嘉幣式薦誠諶奉爼豐安辰牡孔碩奉牲以告祕祝非祈豐年宜報至意昭徹交乎神明降福穰穰用燕羣生黑帝酌獻祐安赫赫神遊周流八極德馨上聞于焉來格不腆酒醴用伸悃愊神其歆之民用饗德髙陽氏酌獻祐安十月納禾民務藏葢不有神休民罔攸賴孟冬之吉禮行不昧神隆百祥昭著蓍蔡亞終獻文安萬彚揫斂時維冬序蠢爾黎氓入此室處酌獻告神禮以時舉賴此隂騭民有所祜送神髙安神之戾止天門夜開禮備告成雲軿亟回旗纛晻靄萬靈喧豗獨遺祉福用澤九垓蕙田案五帝之祭遼金元不見于史明太祖定禮緣諸儒天一而已安得有六之說郊壇專祀昊天上帝不列五帝從祀之位又無四時迎氣之祭相沿惟立春出土牛迎春祭勾芒不祭青帝而五帝遂不臚于祀典此外火神尚有專祠𤣥㝠則道家真武廟意畧相近黄帝白帝無聞矣竊意天地之氣流行四序各有主宰聖人敬而祀之在天為五帝猶在地有五嶽也五嶽有祭則五帝亦不宜闕考元明以來太歳月將不見于經者猶行祀事矧其為周禮之大祀耶夫積月以成時積時而成歳太歳主一歳干支之神六十年而一周四時則歳歳無改月將主一月之建分四時為孟仲季五帝則為之統綱品其秩當不在太歳月將下秩祀典者或亦有俟論定與右厯代祭五帝祭四時附禮記祭法埋少牢於泰昭祭時也注昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也則疏此明四時所祭之處春夏為陽秋冬為陰若祈陰埋牲祈陽則不應埋之今總云埋者以陰陽之氣俱出入於地中而生萬物故並埋之馬氏晞孟曰四時有生物之功地主於成物此其所以埋少牢以祭之也蕙田案祭法此句孔安國謂六宗之一蔡氏書傳因之然考諸他書及後世禮制無有議及此者不若寒暑日月星水旱四方可自為一祭今因祭四時與四時迎氣相近姑附於此然泰昭之義未詳豈在四郊五帝兆之南昭明之地與而少牢用埋又似祭地祗而非天神不可強釋闕疑可也右祭四時祭寒暑蕙田案周禮春官籥章有中春逆暑中秋迎寒之樂祭法相近於坎壇祭寒暑也說者以為即禋六宗之一自秦有伏臘祠而逆暑迎寒之禮廢但于藏氷開氷時有司寒一祭厯代不廢故唐開元禮有享司寒儀通典通志但存享司寒一門文獻通考則仍祭寒暑名目然自南宋以後即享司寒亦不著祀典矣禮記祭法相近于坎壇祭寒暑也注相近當為禳祈聲之誤也禳猶郤也祈求也寒暑不時則或禳之或祈之寒于坎暑于壇祭用少牢疏祭寒暑者或寒暑太甚祭以禳之或寒暑頓無祭以祈之張子曰寒暑無定暑近日􆂷寒近月坎而已故曰相近於坎壇祭寒暑也註謂相近為禳祈者非陸氏佃曰迎寒則與寒相近于坎迎暑則與暑相近于壇相近一作祖迎右寒暑坎壇周禮春官籥章掌土鼓豳籥注杜子春曰上鼔以瓦為匡以革為兩面可擊也鄭司農云豳籥豳國之地竹豳詩亦如之𤣥謂豳籥豳人吹籥之聲章明堂位曰土鼓蒯桴葦籥伊耆氏之樂疏後鄭云豳人吹籥之聲章云豳人吹籥其義難明謂作豳人吹籥之聲章商祝夏祝之類聲章即下文豳詩之等是也明堂位曰土鼓蒯桴葦籥伊耆氏之樂者鄭注禮運云土鼓築土為鼓也蒯桴桴謂擊鼔之物以土塊為桴中春晝擊土鼔龡豳詩以逆暑注豳詩豳風七月也龡之者以籥為之聲七月言寒暑之事迎氣歌其類也此風也而言詩詩總名迎暑以晝求諸陽疏中春二月也言迎暑者謂中春晝夜等已後漸暄故預迎之耳又曰鄭知龡之者以籥為之聲者以發首云掌土鼓豳籥故知詩與雅頌皆用籥龡之也云七月言寒暑之事者七月云一之日觱發二之日栗烈七月流火之詩是寒暑之事迎暑以晝求諸陽者對下迎寒以夜求諸陰也中秋夜迎寒亦如之疏言亦如之亦當擊土鼓吹豳詩也朱子豳風七月詩集傳周禮籥章中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之即謂此詩也楊氏曰籥章不文凡穀祈年于田祖疏曰此祈年于田祖并迎暑迎寒並不言祀事既告神當有祀事可知但以告祭非常故不言之耳若有禮物不過如祭法埋少牢之類易氏袚曰民事終始實關天時之消長故必先之以迎寒逆暑逆如逆女之義自外而入于内以我為主謂陽常居大夏而主歳功迎如迎賓之義自内而出於外以彼為客謂隂常居大冬時出而佐陽中春為歳陽之中晝為日陽之中如是而逆暑與堯典所謂日中星鳥寅賓出日同意中秋為歳陰之中夜為宵陰之中如是而迎寒與堯典所謂宵中星虚寅餞納日同意萬物生于土反于土則土者物之終始也逆暑迎寒所以皆擊土鼓焉張子曰當春之晝吾方逆暑則三之日于耜四之日舉趾葢有以逆其氣當秋之夜吾方迎寒則一之日觱發二之日栗烈葢有以迎其氣楊氏復曰陰陽積而為寒暑寒暑相推而成歳寒暑不時無以成歳故迎之逆之所以道其氣陽生于子冬至日在牽牛陰生於午夏至日在東井聖人向明而治于中春逆暑背其所向則不順故謂之逆中秋迎寒面其所向則順故謂之迎禮記月令仲春之月天子乃鮮羔開冰注鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出冰薦于宗廟乃後賦之為疏按詩豳風七月云四之日其蚤獻羔祭韭故知鮮獻也云獻羔謂祭司寒者以經云獻羔啟冰先薦寢廟恐是獻羔寢廟故云祭司寒左傳直云獻羔而啟之知祭司寒者以傳云祭寒而藏之既祭司寒明啟時亦祭之薦於宗廟謂仲春也乃後賦之謂孟夏也故凌人云夏頒冰左傳云火出而畢賦是也畢盡也謂應是得氷之人無問尊卑盡賦與之方氏慤曰古者鑿氷於建丑之月則以重陽方固而逹陽氣也藏氷於建寅之月則以少陽尚㮚而閉陰氣也開氷於建卯之月則以陽方中而順中氣也頒氷於建巳之月則以陽方盛而禦暑氣也夫開氷陽事也不以羊而以羔者方少陽用事之時而又品物少故也陸氏佃曰鮮讀如字擊牲曰鮮言鮮者嫌於不殺知然者以下云祀不用犧牲據此小祀用牲唯開氷春秋昭公四年春王正月大雨雹左氏傳大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷注禦止也申豐魯大夫陸道也謂夏十二月日在虚危氷堅而藏之宿疏釋天云北陸虚西陸昴也孫炎云陸中也北方之虚為中也西方之宿昴為中也彼以陸為中杜以陸為道者陸之為中為道皆無正訓各以意言耳周禮凌人正歳十有二月令斬冰詩云二之日鑿氷冲冲月令季冬氷盛水腹命取氷鄭元云腹厚也以此知日在北陸謂夏之十二月也西陸朝覿而出之注謂夏三月日在昴畢蟄䖝出而用氷春分之中奎星朝見東方疏覿見也西道之宿有早朝見者于是而出之謂奎星晨見而出氷也西方凡有七宿專言西陸朝覿于傳之文未知何宿覿也杜以西陸朝覿實是春分二月故杜此注云春分之中奎星朝見東方及下獻羔啟之注云謂二月春分獻羔祭韭是皆據初出其氷公始用之時也所以杜注云謂夏之三月日在昴畢蟄䖝出而用氷者以此傳云西陸朝覿而出之下傳覆之云其出之也朝之祿位賓食喪祭于是乎用之則是普賜羣臣故杜云謂夏三月又下注云言不獨共公是據普班之時也故下傳又云火出而畢賦是也然氷之初出在西陸始朝覿之時氷之普出在西陸朝覿之後總而言之亦得稱西陸朝覿而出之也其藏氷也深山窮谷固陰沍寒於是乎取之注沍閉也必取積陰之氷所以道達其氣使不為災其出之也朝之祿位賓食喪祭于是乎用之注言不獨共公也疏此謂公家用之朝廷之臣食祿在位大夫以上皆當賜之氷也其公家有賓客享食公家有喪有祭于是乎用之言其不獨共公身所用也周禮凌人云春始治鑑凡内外饔之膳修鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賓客共氷大喪共夷槃氷是公家所用氷也其藏之也黑牡秬黍以享司寒注黑牡黑牲也秬黒黍也司寒𤣥㝠北方之神故物皆用黑有事于氷故祭其神疏此祭𤣥㝠之神非大神且非正祭計應不用大牲杜言黒牡黑牲當是黒牡羊也秬黑黍釋草文也啟氷唯獻羔祭韭藏氷則祭用牲黍者啟唯告而已藏則設享祭之禮祭禮大而告禮小故也月令于冬云其神𤣥㝠故知司寒是元㝠也其出之也桃弧棘矢以除其災注桃弓棘箭所以禳除凶邪將御至尊之故疏說文云弧木弓也謂空用木無骨節也服䖍云桃所以逃凶也棘矢者棘亦有箴取其名也葢出氷之時置此弓矢于凌室之户所以禳除凶邪將御至尊故慎其事為此禮也其出之也時食肉之祿氷皆與焉注食肉之祿謂在朝廷治其職事就官食者大夫命婦喪浴用氷祭寒而藏之獻羔而啟之公始用之火出而畢賦注命婦大夫妻享司寒謂二月春分獻羔祭韭始開氷室公先用優尊火星昏見東方謂三月四月中疏周禮云夏頒氷謂正歳之夏即四月是也故杜兼言四月自命夫命婦至於老疾無不受冰注老致仕在家者其藏之也周其用之也徧則冬無愆陽夏無伏陰春無凄風秋無苦雨雷出不震注愆過也謂冬温伏陰謂夏寒凄寒也霖雨為人所患苦雷疏雷出不震言有雷而不為霹靂也下云不發而震言無雷而有霹靂也無菑霜雹癘疾不降疏霜雹即是災言無此災害之霜雹也寒暑失時則民多癘疾天氣為之故云降也民不夭札注短折為夭夭死為札今藏川池之氷棄而不用風不越而殺雷不發而震疏風不以理舒散而暴疾害物雷不徐緩動發而震擊為害雹之為菑誰能禦之七月之卒章藏氷之道也注七月詩豳風卒章曰二之日鑿氷冲冲謂十二月鑿而取之三之日納於凌陰凌陰氷室也四之日其蚤獻羔祭韭謂二月春分蚤開氷室以薦宗廟周禮凌人疏曰公始用之謂二月之時蠅䖝已生公始用之四月已後暑氣漸盛則賜及羣下服氐云火出于夏為三月於商為四月於周為五月爾雅云北陸虚也服氏云陸道也北陸言在謂十二月在危一度西陸朝覿不言在則不在昴謂二月在婁四度謂春分時至婁晨見東方而出氷是公始用之今鄭注引朝覿而出之謂經夏頒氷則西陸爾雅曰西陸昴也朝覿而出氷羣臣用之若然日體在昴在三月内得為夏頒氷者據三月末之節氣故証夏頒氷此言夏據得夏之節氣春秋言火岀者據周正干七月詩二之日云云孫皓問藏之既晚出之又早何鄭答豳土晚寒故夏正月納氷夏二月仲春大蔟用事陽氣出地始温故禮應開氷先薦寢廟是公始用之也詩國風豳風二之日鑿氷冲冲三之日納於凌陰四之日其蚤獻羔祭韭傳氷盛水腹則命取氷于山林冲冲鑿氷之意凌陰氷室也箋古者日在北陸而藏氷西陸朝覿而出之祭司寒而藏之獻羔而啟之其出之也朝之祿位賓食喪祭于是乎用之月令仲春天子乃獻羔開氷先薦寢廟周禮凌人之職夏頒氷掌事秋刷上章備寒故此章備暑后稷先公禮教備也三疏毛以為豳公教民二之日之時使人鑿氷冲冲然之日之時納于凌陰之中四之日其早朝獻黒羔于神祭用韭菜而開之所以禦暑言先公之教寒暑有備也月令季冬氷方盛水澤腹堅命取而藏之注云腹堅厚也此月日在北陸氷堅厚之時昭四年左傳說藏氷之事云深山窮谷於是乎取之是于氷厚之時命取氷也左傳言取氷于山耳此兼言林者以山木曰林故連言之冲冲非貌非聲故云鑿氷之意納于凌隂是藏氷之處故知為氷室也案天官凌人云正歳十有二月令斬氷三其凌注云凌氷室也三之者為消釋度也杜子春云三其凌者三倍其氷此言凌陰始得為凌室彼直言凌此亦得為凌室者凌氷一物既云斬氷而又云三其凌則是斬氷三倍多于凌室之所容故知三其凌者謂凌室不然單言凌者止得為氷體不得為氷室也凌人十二月斬氷即以其月納之此言三之日納于凌陰四之日即出之藏之既晚出之又早者鄭答孫晧云豳土晚寒故可夏正月納氷夏二月仲春大蔟用事陽氣出地始温故禮應開氷先薦寢廟言由寒晚得晚納氷依禮須早開故也月令孟春律中大蔟二月律中夾鍾言二月大蔟用事者以大蔟為律夾鍾為吕吕者助律宣氣律統其功故雖至二月猶云大蔟用事自于是乎用之以上皆昭四年左傳文彼說藏氷之事其末云七月之卒章藏氷之道與此同故具引之釋天云北陸虚也西陸昴也孫炎曰陸中也北方之宿虚為中也西方之宿昴為中然則日在北陸謂日體在北方之中宿是建丑之月夏之十二月也劉歆三統厯術十二月小寒節日在女八度大寒中日在危一度是大寒前一日日猶在虚於此之時可藏氷也西陸朝覿而出之謂日行已過于昴星在日之後早朝出現也三統術四月立夏節日在畢十二度星去日半次然後見是立夏之日日去昴星之界已十二度昴星得朝見也于此之時可出氷也祭司寒而藏之還謂建丑之月祭主寒之神而藏此氷也獻羔而啟之謂建卯之月獻羔以祭主寒之神開此氷也二月開氷君始用之未賜臣也至于夏初其出之也朝之祿位賓食喪祭于是乎普用之乃是頒賜臣下也服䖍云祿位謂大夫以上賓客食喪有祭祭祀是其普用之事也服䖍以西陸朝覿而出之謂二月日在婁四度春分之中奎始晨見東方蟄䖝出矣故以是時出之給賓客喪祭之用服說如此知鄭不與同者以鄭答孫皓曰西陸朝覿謂四月立夏之時周禮曰夏班氷是也鄭以西陸朝覿謂四月與服異也鄭意所以然者以西陸為昴爾雅正文西陸朝覿當為昴星朝見不得為奎星見也故知出之為四月賜非二月初開也傳下句別言祭司寒而藏之獻羔而啟之乃謂十二月始藏之二月初開之耳傳言祭寒而藏之不言司寒箋引彼文加司字者彼文上句云以享司寒下句重述其事畧其司字箋以經有藏氷獻羔二事故畧引下句以當之不引上句故取上句之意加司字以足之服䖍云司寒司陰之神𤣥㝠也將藏氷致寒氣故祀其神鄭意或亦然也箋又引其出之以下者解此藏氷之意言為此頒氷故藏之也傳文其出之也在司寒之上此引之倒者以其不証經文故退令在下月令仲春天子乃獻羔開氷先薦寢廟月令文也彼作鮮羔注云鮮當為獻此已破之証經獻羔之事在二月也祭羔韭者葢以時韭新出故用之王制云庶人春薦韭亦以新物故薦之也周禮凌人之職夏班氷掌事秋刷天官凌人文彼注云暑氣盛王以氷頒賜則主為之刷清也秋凉氷不用可以清除其室也案傳以啟之下云火出而畢賦又云火出于夏為三月則是三月頒氷周禮言夏頒氷者凡言時事總舉天象不可必其月也以三月火始見四月則立夏時相接連氷以暑乃賜之故當在于四月是火出之後故傳以火出言之上章蠶績裳裘是備寒之事故此章又說藏氷是備暑之事言后稷先公禮教備也以序言后稷故兼言之朱子集傳鑿氷謂取氷于山也冲冲鑿氷之意周禮正歳十二月令斬氷是也納藏也藏氷所以備暑也凌隂氷室也豳土寒多正月風未解凍故氷猶可藏也蚤蚤朝也韭菜名獻羔祭韭而後啟之月令仲春獻羔開氷先薦寢廟是也黄氏一正曰司寒之神藏氷時先以黒牡秬黍享之至開氷而又祭以羔韭也右享司暑司寒漢書志秦德公時初作伏祠師古曰立秋之後以金代火金畏于火故遇庚日必伏庚金也孟康曰周時無伏至此乃方有之磔狗邑四門以禦蠱災文獻通考案秦祠伏磔狗之禮非古也以古有祀寒暑之禮姑附於此宋書孝武帝本紀大明六年五月丙戌置凌室修藏氷之禮禮志孝武帝大明六年五月詔立凌室藏氷有司奏季冬之月氷壯之時凌室長率山虞及輿𨽻取氷於深山窮谷涸陰沍寒之地以納於凌隂務令周宻無洩其氣先以黒牡秬黍祭司寒於凌室之北仲春之月春分之日以黑羔秬黍祭司寒啟氷室先薦寢廟夏祠用鑑盛氷室一鑑以禦温氣蠅蚋三御殿及大官膳羞並以鑑供氷自春分至立秋有臣妾喪詔贈秘器自立夏至立秋不限稱數以周喪事繕制夷槃隨氷供給凌室在樂遊苑内置長一人吏一人保舉吏二人隋書禮儀志季冬藏氷仲春開氷並用黑牡秬黍於氷室祭司寒神開氷加以桃弧棘矢唐書百官志土林署季冬藏氷千段先立春三日納之氷井以黑牡秬黍祭司寒仲春啟氷亦如之舊唐書禮儀志武德貞觀之制季冬藏氷仲春開氷並用黒牡秬黍祭司寒之神於氷室籩豆各二簠簋爼各一其開氷加以桃弧棘矢設於神座唐書禮樂志孟冬祭司寒籩豆皆八簠一簋一爼一黑牡一通志唐制先立春三日用黑牡秬黍祭司寒之神於氷室祭訖鑿氷萬段方三尺厚尺五寸而藏之仲春開氷祭如藏禮加以桃弧棘矢設於氷室户内之右禮畢遂留之開元禮孟冬祭司寒儀納氷開氷附前三日諸祭官散齋二日於家正寢致齋一日於祭所右校掃除祭所衞尉陳設如常祭日未明一刻太官丞具特牲之饌未明一刻郊社丞入布神座於廟北南向設神位於座首又帥其屬設酒罇于座東南設洗于酒罇東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執罇罍篚者各位於罇罍篚之後上林令設桃弧棘矢於氷室户内之右祭訖遂留之奉禮設上林令位于神座東南執事者陪其後俱重行西向北上質明上林令以下各服其服郊社丞良醖之屬入實罇罍太官丞監實籩豆簠簋贊引引上林令又贊引引執事者俱就門外位立定太祝與執罇罍篚冪者先入立於神座前北向俱再拜訖各就位贊引引上林令又贊引引執事者俱入就位立定贊拜上林令以下皆再拜太官丞出詣饌所贊引進上林令之左白有司謹具請行事退復位太官丞引饌入太祝迎於座首設於神座前訖太官丞以下還罇所贊引引上林令盥手洗爵詣酒罇所執罇者舉冪上林令酌酒贊引引上林令進神座前北向跪奠爵俛伏興少退北向立太祝持版進於神座之右東向跪讀祝文曰維某年歳次月朔日開元神武皇帝謹遣某官姓名敢昭告于𤣥㝠之神順兹時令增氷堅厚式遵常典將納凌陰謹以𤣥牡秬黍嘉薦清酌明祀於神尚享訖興上林令再拜太祝進跪奠版於神座俛伏興還罇所太祝以爵酌福酒進上林令之右西向立上林令再拜受爵跪祭酒遂飲卒爵太祝進受爵還罇所上林令俛伏興再拜贊引引還本位太祝進跪徹豆俛伏興還罇所太祝與執罇罍篚者俱復位立定贊引贊拜上林令以下皆再拜贊引進上林令之左白禮畢贊引引上林令以下出其祝版焚於齊所五代史唐明宗本紀長興元年冬十月丁酉始藏氷文獻通考周顯德元年詔築壇北郊以孟冬祭司寒其藏氷開氷之祭俟氷室成即行之宋史禮志司寒之祭常以四月命官率太祝用牲幣及黑牡秬黍祭𤣥㝠之神乃開氷以薦太廟建隆二年置藏氷署而修其祀焉文獻通考太宗淳化三年秘書監李至言開氷之祭當在春分上覽奏即命正其禮宋史禮志秘書監李至言按詩豳七月曰四之日獻羔祭韭葢謂周以十一月為正其四月即今之二月也春秋傳曰日在北陸而藏氷謂夏十二月日在危也獻羔而啟之謂二月春分獻羔祭韭始開氷室也火出而畢賦火星昏見謂四月中也又按月令天子獻羔開氷先薦寢廟詳其開氷之祭當在春分乃有司之失也帝覽奏曰今四月韭可苫屋矣何謂薦新遂正其禮天聖新令春分開氷祭司寒於氷井務卜日薦氷於太廟季冬藏氷設祭亦如之神宗詔改定小祀以藏氷出氷祭司寒文獻通考神宗元豐中詳定郊廟奉祀禮文所言熈寧祀儀孟冬選吉日祭司寒國朝祀令春分日開氷季冬月藏氷祭司寒於北郊案春秋左傳曰古者日在北陸而藏氷西陸朝覿而出之其藏之也黑牲秬黍以享司寒其出之也桃弧棘矢以除其災古者司寒唯以藏氷啟氷之日孟冬非有事於氷則不應祭享其祀儀孟冬選吉日祭司寒宜從寢罷惟季冬藏氷則享司寒於氷井務牲用黑牡羊榖用秬黍仲春開氷則但用羔而已月令天子獻羔開氷孔穎達曰啟氷唯獻羔唐郊祀錄仲春開氷祭司寒於氷室以桃弧棘矢設於神座夫桃弧棘矢以禳除凶邪非禮神之物當置於凌宇之户其啟氷獻羔當依孔頴達之說從之徽宗大觀四年議禮局言春秋左氏傳以少皥有四叔其一為𤣥㝠杜預以𤣥㝠為水官故厯代祀之為司寒則𤣥㝠非天神矣本廟儀注其祭司寒禮畢燔燎是以祀天神之禮而享人鬼也請罷燔燎而埋祝幣從之宋史禮志政和議禮局言今祠儀司寒歳用羊豕一祠令小祠牲入滌一月所以備潔養之法今肉以豕又取諸市與令文相戾請諸小祠祭以少牢仍用體解大學衍義補丘氏濬曰祭法埋少牢於泰昭祭時也相近於坎壇祭寒暑也案一歳之間而有春夏秋冬之時四時之候而有寒暑温涼之氣㝠㝠之間必各有神以司之古者各因其時而致其祭隨其候而行其禮本朝於春秋二時祭太歳之神及四時月將之神葢以四時之首合於太歳而四時之令分於月將其亦祭時與寒暑之遺意歟圖書編章氏潢曰祭法相近于坎壇祭寒暑也周禮籥章中春晝擊土鼓歌邠詩以逆暑中秋夜迎寒亦如之其禮逆暑以晝求諸陽也迎寒以夜求諸隂也此何以祭疏謂寒暑太甚祭以禳之寒暑頓無祭以祈之理或然也然則兹祭也亦王者輔相調爕之一事歟右厯代享司寒五禮通考卷三十二
