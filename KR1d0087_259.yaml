body:
  text: 五禮通考卷二百四十九刑部尚書秦蕙田撰凶禮四荒禮周禮地官大司徒二曰薄征注鄭司農云薄征輕租税也髙氏愈曰散利發已藏之公帑薄征減未輸之民租宋制諸州嵗歉凡賦租未入入未滿者或縱不取或寡取之或倚閣以需豐年鬻牛者免算運米舟車除沿路力勝錢皆周官所謂薄征之意也大荒則令邦國薄征均人凶札則無財賦不收地守地職注無財賦恤其乏用也財賦九賦也不收山澤及地税王氏曰荒政所謂薄征也漢書文帝本紀二年正月詔民貸種食未入入未備者皆赦之九月詔賜天下民今年田租之半十二年三月詔賜農夫今年租税之半十三年六月詔除田之租税蕙田案蠲除之令始于漢文而後代因之其别有二曰恩蠲如漢文帝賜民田租之類葢非有災傷而特恩免之也曰災蠲則周禮薄征之遺意列代史所載因一時一地之災而蠲除者皆是也恩蠲之法與荒政無與畧舉漢文數事以見縁起以後俱不及載昭帝本紀始元二年八月詔曰往者災害多今年蠶麥傷所振貸種食勿收責毋令民出今年田租元鳯三年春正月詔曰迺者民被水災頗匱于食朕虛倉廩使使者振困乏其止四年毋漕三年以前所振貸非丞相御史所請邊郡受牛者勿收責蕙田案此截留漕米之始宣帝本紀本始三年夏五月大旱詔郡國傷旱甚者民毋出租賦元帝本紀初元元年四月詔郡國被災害甚者毋出租賦二年三月詔郡國被地動災甚者無出租賦成帝本紀建始元年十二月郡國被災十四以上毋收田租注師古曰十四謂田畝所收十損其四鴻嘉四年正月詔郡國被災害什四以上民貲不滿三萬毋出租賦逋貸未入皆勿收哀帝本紀綏和二年秋詔郡國災害什四以上民貲不滿十萬皆毋出今年租賦平帝本紀元始二年四月天下民貲不滿二萬及被災之郡不滿十萬勿租税後漢書章帝本紀永平十八年京師及三州大旱詔勿收兖豫徐州田租芻藁和帝本紀永元四年十二月詔今年郡國秋稼為旱蝗所傷其什四以上勿收田租芻藁有不滿者以實除之九年六月詔今年秋稼為蝗蟲所傷皆勿收租更芻藁若有所損失以實除之餘當收租者亦半入十三年九月詔令天下半入今年田租芻藁有宜以實除者如故事貧民假種食皆勿收責十四年十月詔兖豫荆州今年水雨淫過多傷農功其令被害什四以上皆半入田租芻槀其不滿者以實除之十六年七月詔令天下皆半入今年田租芻槀其被災者以實除之貧民受貸種糧及田租芻槀皆勿收責安帝本紀永初四年正月詔以三輔比遭冦亂人庶流冗除三年逋租過更口筭芻槀七年八月詔郡國被蝗傷稼十五以上勿收今年田租不滿者以實除之元初元年十月詔除三輔三嵗田租更賦口算建光元年十一月詔京師及郡國被雨水傷稼者隨頃𤱔減田租順帝本紀永建元年冬十月詔以疫癘水潦令人半輸今年田租傷害什四以上勿收責不滿者以實除之三年正月詔勿收漢陽今年田租口賦六年十一月詔曰連年災潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有棄業流亡不絶疑郡縣用心怠惰恩澤不宣易美損上益下書稱安民則恵其令冀部勿收今年田租芻槀桓帝本紀延熹九年正月詔曰比嵗不登人多饑窮又有水旱疾疫之困盜賊徴發南州尤甚其令大司農絶今嵗調度徴求及前年所調未畢者勿復收責其災旱盜賊之郡勿收租餘郡悉半入靈帝本紀熹平四年六月令郡國遇災者減田租之半其傷害十四以上勿收責晉書武帝本紀太康三年十二月詔四方水旱甚者無出田租四年七月兖州大水復其田租五年七月任城梁國中山雨雹傷秋稼減天下户課三分之一六年正月以比嵗不登免租貸宿負孝武帝本紀寧康二年四月皇太后詔三呉義興晉陵及㑹稽遭水之縣尤甚者全除一年租布其次聴除半年受振貸者即以賜之太元四年正月郡縣遭水旱者減租税五年六月以比嵗荒儉大赦自太元三年以前逋租宿債皆蠲除之宋書文帝本紀元嘉十二年八月原遭水郡諸逋負二十一年正月大赦天下諸逋債在十九年以前一切原除去嵗失收者疇量申減孝武帝本紀大明五年四月詔曰南徐兖二州去嵗水潦傷年民多困窶逋租未入者可申至秋登蕙田案此逋租緩徴之始順帝本紀昇明二年二月蠲雍州縁沔諸民前被水災者租布三年南齊書髙帝本紀建元元年九月詔二呉義興三郡遭水減今年田租武帝本紀建元四年六月詔呉興義興遭水縣蠲除租調永明五年八月詔今夏雨水呉興義興二郡田農多傷詳蠲租調七年正月原雍州四年以前逋租八年七月詔雍州八年以前司州七年以前逋租悉原十月原建元以前逋租十一年五月詔曰水旱成災穀價傷弊凡三調衆逋可同申至秋登明帝本紀建武二年十二月詔呉晉陵二郡失稔之鄉蠲三調有差梁書武帝本紀天監二年六月詔以東陽信安豐安三縣水潦漂損居民資業遣使周履量蠲課調大同四年八月詔南兖北徐西徐東徐青冀南北青武仁潼雎等十二州既經饑饉曲赦逋租宿責勿收今年三調陳書宣帝本紀太建六年三月詔曰去嵗南川頗言失稔所督田租于今未即豫章等六郡太建五年田租可申半至秋豫章又逋太建四年檢首田税亦申至秋南康一郡嶺下應接民間尤弊太建四年田租未入者可特原除魏書明元帝本紀泰常三年以范陽大水復其租税八月雁門河内大雨水復其租税文成帝本紀和平四年十月以定相二州霣霜殺稼免民田租孝文帝本紀太和六年十二月詔曰去秋淫雨洪水為災百姓嗷然今課督未入及將來租算一以丐之北齊書文宣帝本紀天保八年九月詔今年遭蝗之處免租九年七月詔去年螽澇損田兼春夏少雨苗稼薄者免今年租賦武成帝本紀河清三年閏九月詔遣十二使巡行水潦州免其租調後主本紀天統五年七月詔使巡省河北諸州無雨處境内偏旱者優免租調周書孝閔帝本紀元年三月詔曰浙州去嵗不登厥民饑饉其當州租輸未畢者悉宜免之隋書文帝本紀開皇六年八月闗内七州旱免其賦税通典唐武徳二年制凡水旱蟲霜為災十分損四分以上免租損六分以上免租調損七分以上課役俱免唐書太宗本紀貞觀元年夏山東旱免今嵗租冊府元龜上元二年正月敕雍岐同華隴等州給復一年自餘諸州咸亨年遭旱澇蟲傷損免之家雖經豐稔家産未復宜更免一年租舊唐書髙宗本紀永隆二年正月詔雍岐華同民戸宜免兩年地税河南河北遭水處一年冊府元龜開元三年七月詔曰比者山東邑郡歴年不稔朕為之父母欲安黎庶恤彼貧弊拯其流亡今者風雨咸若京坻可望若貸糧地税庸調正租一時併徴必無辦法河北諸州宜委州縣長官勘責灼然不能支濟者税租且于本州納不須徴却待至春中更别處分有貸糧迴溥等亦量事减徴唐書元宗本紀開元五年二月免河南北蝗水州今嵗租八年三月免水旱州逋負册府元龜開元十二年三月詔曰河南河北去嵗雖熟百姓之間頗聞辛苦今農事方起蠶作就功其有貸糧未納者並停到秋收十三年正月詔曰元率地税以置義倉本防儉年賑給百姓頻年不稔逋租頗多言念貧人將何以濟自開元十二年閏十二月以前所有未納懸欠地税宜放免十五年四月詔曰河南河北諸州去年縁遭水澇雖頻加賑貸而恐未小康爰自春夏雨澤以時兼聞夏苗非常茂好既即收穫不慮少糧然以産業初營儲積未贍若非寛恵不免艱辛其貸糧麥種穀子迴轉變造諸色欠負等並放候豐年以漸徴納蠶麥事畢及至秋收後並委刺史縣令専勾當各令貯積勿使妄有費用二十年九月河南道宋滑兖鄆等州大水傷禾稼特放今年地税二十二年十一月敕曰如聞京畿及闗輔有損田百姓等屬頻年不稔久乏糧儲雖今嵗薄收未免辛苦宜從蠲省勿用虛弊至如州縣不急之務差科徭役并積年欠負等一切並停其今年租入等已下特宜放免地税受田一頃已下者亦宜放免大歴四年十一月詔曰比屬秋霖頗傷苗稼百姓種麥其數非多如聞村閭不免流散其大歴五年夏麥所税特宜與減常年税乙亥敕曰淮南數州獨罹災患秋夏無雨田萊卒荒閭閻艱食百價皆振其准上今年租庸地税㫖支米等宜三分放二分十二年十一月詔曰巴南諸州頻嵗仍儉户口凋耗其巴蓬渠集壁克通開等州宜放二年租庸及諸色徴科亦宜蠲免文苑英華貞元八年十二月敕頃以諸道水災遣使宣慰其州府水損田苗及五六分者今年税米及諸色官田租子並減放一半損七分以上一切全放舊唐書徳宗本紀貞元十二年十月詔以京畿旱放租税冊府元龜貞元十四年正月詔曰累經水旱或有流庸積成逋懸寖以凋瘵其諸道州府應欠負貞元八年九年十年兩税及榷酒錢總五百六十萬七千餘貫在百姓腹内一切並免如已徴得在官者宜令所司具條疏聞奏輿議以所欠錢物等多是浮于編甿腹中各已逃移年月且久縦令所司徴納亦無從而致雖有此詔亦無益于百姓矣蕙田案歴年之宿逋蠲之固無益于民不蠲亦無可斂之理然使留此數百千萬之逋額不為除豁有司亟于催科民間詎無擾累是宿逋之除亦未可謂之全無益也唐書權徳輿傳貞元十九年大旱徳輿因是上陳闕政曰臣聞銷天災者修政術感人心者流恵澤和氣洽則祥應至矣畿甸之内大率赤地而無所望轉徙之人斃踣道路慮種麥時種不得下宜詔在所裁留經用以種貸民今兹租賦及宿逋逺貸一切蠲除設不蠲除亦無可斂之理不如先事圖之則恩歸于上矣十四年夏旱吏趣常賦至縣令為民毆辱者不可不察帝頗采用之冊府元龜貞元二十年二月詔曰去夏迄秋頗愆時雨京畿諸縣稼穡不登今宿麥未收其逋租宿貸六十五萬貫石宜蠲除之元和二年正月制淮南江南去年以來水旱疾疫其租税節級蠲放二月制以浙江西道水旱相仍蠲放去年兩税上供三十四萬餘貫四年正月制曰近者江淮之間水旱作沴其元和三年諸道應遭水旱所損州府應合放兩稅錢米等損四分已下宜准式處分四分已上者並准元和元年六月十八日敕文放免六年二月敕泗州二年水旱所損不虛其欠元和五年錢米宜並放免閏十二月敕畿内百姓頃以秋稼旱損農收不登言念疲黎每務矜恤乃者詔命既下各已加恩如聞村閭之間尚慮乏食其粟及大豆除已徴納外見在百姓腹内者宜令全放青苖錢欠在百姓腹内者量放一半文苑英華元和七年敕比者田穀致損芻藁隨之今已過時益難濟辦其并職田草共一百一十五萬束並宜放免又有常賦錢穀蠲放之餘貧弊者多慮難輸入其京兆府欠去年兩稅青苖等錢二萬一千八百貫欠秋租雜斛斗及職田粟五萬三千三百石並宜放免元和六年春振貸京畿百姓義倉粟二十四萬石亦宜放免舊唐書憲宗本紀元和九年二月詔以嵗饑放闗内元和八年以前逋租錢粟五月以旱免京畿夏稅十三萬石青苗錢五萬貫冊府元龜元和十一年四月制曰頃自春及夏時澤未降其京畿百姓所有積欠元和九年十年兩税及青苗并折糴折納斛㪷及税草等除在官典所由腹内者並宜放免穆宗以元和十五年正月即位六月京兆府上言興平醴泉縣雹傷夏苗請免其租入九月宋州奏雨水敗田稼六千頃請免今年租入並從之太和三年十一月京兆上言奉先等八縣旱雹損田稼二千三百四十頃有詔蠲免四年七月許州上言去年六月二十一日被水有詔應遭水損百姓等宜量放今年租子十月詔潤和兩州應水漂溺人户處宜委本道仔細檢勘全放今年秋税錢米其浙西浙東宣歙鄂岳江西鄜坊山南東道並委所在長吏據淹損田苗漂壊廬舍及蟲螟所損節級矜减指實奏聞其京兆河南府所損縣即據頃𤱔依常例檢覈分數蠲減五年十月京兆府同官奉先渭南縣今年夏風電大雨害田稼至是請蠲免其租可之八年九月詔江淮浙西等道仍嵗水潦其田苗全損處全放其年青苗錢餘亦量議蠲減開成元年正月詔河中同州絳州去年旱歉賦斂不登宜特放免開成元年夏青苗錢舊唐書文宗本紀開成二年三月詔諸州遭水旱處並蠲租税三年正月詔去秋蝗蟲害稼處放逋賦唐書宣宗本紀大中四年四月以雨霖詔蠲度支鹽鐵户部逋負文苑英華大中九年七月十三日詔應揚潤廬夀滁和宣楚濠泗光宿等州其間或貞元以來舊欠逃移後闕額錢物均攤見在人户頻年災荒無可徴納宜特放三年待稍完復却即令依舊或逋懸錢物斛斗數内先已放免度支却徴收者宜委本司細詳元敕磨勘如合放免不得追徴或先因水旱賑貸欠常平義倉斛斗若終不可徴收亦宜放免或今年合徴兩税錢物量百姓疾疫處各委逐州準分數于上供留州留使三色錢内均攤放免或收管諸色逋懸錢物等年月深逺但掛簿書空務追徴益生勞擾宜委有司速勘㑹了絶蠲放不得留為應在以資奸蠧之徒其濠泗宿三州大中六年以前所在逋懸亦宜放免舊唐書懿宗本紀咸通二年二月鄭滑節度使李福奏屬郡潁州去年夏大雨沈丘汝隂潁上等縣田稼屋宇淹没皆盡乞蠲租賦從之唐書僖宗本紀咸通十四年十二月免水旱州縣租賦冊府元龜後唐同光元年十月詔應天下諸道水旱災沴之鄉苗稼不登征賦宜減應今年經雹旱所損田苗處檢覆不虛據𤱔壠蠲免二年二月詔諸道州縣有經雹水旱之處所損田苗納税不迨懸欠處仰仔細檢詳如不虛妄特與蠲放十一月中書奏天下州府今秋多有水潦處百姓所輸秋税請特減以慰貧民勅俟來年蠲免四年正月制應同光三年經水災處有不迨及逃移人户差科夏秋兩税及諸折配委官吏切皆㸃檢並與放免天成二年十月詔今嵗岐華登萊自夏稍旱其所損田苗宜令簡行詣實申奏與蠲減税租仍不得輒有差徭科配長興四年九月敕曰據河中同華耀陜青齊淄絳萊等州各申災旱損田處已令本道判官檢行不取額定頃𤱔如保内人户逃移不得均攤抵納本户租税其税子如闕本色許納諸雜斛㪷薥黍元每斗折粟八升今許納本色稗子特與免税前件遭旱州府據檢到見苗仍恐輸管不迨今秪徴一半稅物仍許于便近州府送納其餘一半放至來年其逃移户田産仰村鄰㸔守不得殘毁清泰元年七月詔曰省三司使奏自長興元年至四年十二月已前諸道及户部營田逋租三十八萬八千六百七十二端匹束貫斤量或頻經水旱或併值轉輸悉至困窮蹙成逋欠加以連年災沴比户流亡殘租空係于簿書計數莫資于經費葢州縣不公之吏鄉吏無識之夫乗便欺官多端𨼆税三司使患其僥倖便欲推尋朕閔彼蒸黎慮成淹滯示體物憂民之㫖徴滌瑕盪垢之文特議含容且期均濟應自長興四年已前三京諸道及營田委三司使各下諸州府縣除已納外並放後晉天福二年四月詔昨行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥處委所司差人檢覆量與蠲免租税五月勅雒京魏府管内所有旱損夏苗縣分特于五分中減放一分苗子其餘四分仍許將諸色斛㪷依倉式例與析納三年八月敕河南同州絳州三庭逃移人户下所欠累年殘税并今年夏税差科及麥苗子沿徴諸色錢物等並放其逃户下秋苗據見檢到數不計是元額及出剰頃𤱔並放一半十月敕蒲同晉絳滑漢魏府鎮定州等或經亢旱或屬兵戈逃移人户等應逐户所欠今年已前諸雜税物並特除放五代史晉髙祖本紀天福六年三月除民二年至四年以前税冊府元龜天福六年八月制曰嵗因災沴民用艱辛久係逋懸宜示蠲免應欠天福五年終已前夏秋租税并沿徴諸物及營田租課並興除放應沿路有旁道稍損却田苗庭其令納苗子及沿徴錢物等據𤱔數並與除放少帝天福七年七月即位赦制蟲蝗作沴苗稼重傷特示矜蠲俾令蘇息應諸道州府經蝗蟲傷食苗稼者並據所損頃𤱔與蠲放賦税八年勅諸州應欠天福七年夏税並與除放秋税一半其餘一半候到蠶麥納逃户與放一半差徭却令歸業馬氏端臨曰漢以來始有蠲貸之事其所蠲貸者有二田賦一也逋債二也何三代之時獨不聞有所蠲貸耶葢三代之所以取民田賦而已貢助徹之法雖不離乎什一然往往隨時隨地為之權衡未嘗立為一定不易之制故禹貢九州之地如人功多則田下而賦上人功少則田上而賦下兖州之地葢十有三載而後可同于他州又有雜出于數等之間如下上上錯下中三錯之類可見其未嘗立為定法孟子曰治地莫善于助莫不善于貢亦病其較數嵗之中以為常然則數嵗之外亦未嘗不變易非如後世立經常之定額其登于賦額者遂升合不可懸欠也葢其所謂田賦者既隨時斟酌而取之則自不令其輸納不敷而至于逋懸既無逋懸則何有于蠲貸而當時之民亦好義以急其上所謂雨我公田遂及我私私田稼不善則非吏公田稼不善則非農則又不至如後世徇私忘公而徼幸其我蠲至于田賦之外則又未嘗他取于民雖有春省耕補不足秋省斂助不給之制然未聞責其償也春秋時始有施舍已責之説家量貸而公量收之説秦漢而下賦税之額始定而民不敢逋額内之租征斂之名始多而官復有税外之取夫如是故上之人不容不視時之豐歉民之貧富而時有蠲貸之令亦其勢然也繇唐以來取民之制愈重其法愈繁故蠲貸之令愈多或以水旱或以亂離改易朝代則有所蠲恢拓土宇則有所蠲甚至三嵗郊祀之赦亦必有所蠲以為常典葢征斂之法本苛逋欠之數日多故蠲貸之令不容不宻而桀黠頑獷之徒至有故逋常賦以待蠲而以為得䇿則上下胥失之矣宋史食貨志諸州嵗歉賦租之未入入未備者或縦不取或寡取之或倚閣以須豐年寛逋負休力役賦入之有支移折變者省之應給蠶鹽若和糴及科率追呼不急妨農者罷之太祖本紀乾徳二年四月免諸道今年夏税之無苗者四年七月華州旱免今年租五年七月免水旱災户今年租開寳元年六月詔民田為霖雨河水壊者免今年夏税五年六月詔沿河民田有為水害者有司具聞除租七年十一月秦晉旱免蒲陜晉絳同解六州逋賦闗西諸州免其半太宗本紀雍熈元年三月蠲水所及州縣今年租淳化元年七月開封陳留封丘酸棗鄢陵旱賜今年田租之半開封特給復一年八月京兆長安八縣旱賜今年租十之六十月以乾鄭二州河南夀安等十四縣旱州蠲今年租十之四縣蠲其税四年十月遣使按行畿縣民田被水者蠲其租五年九月遣使分往宋亳陳潁等州按行民田被水及種蒔不及者並蠲其租真宗本紀咸平元年六月以旱免開封二十五州軍田租是嵗定州雹傷稼除今年租文獻通考咸平元年判三司催欠司王欽若土言諸路所督逋負并十保人償納未盡者請令保明聞奏均在吏屬科理者請蠲放之詔可自是毎有大赦必令臺省官與三司同詳定逋負引對蠲放真宗本紀咸平四年六月詔東川民田先為江水所害者除其租大中祥符二年七月蠲京東徐濟七州水災田租四年七月詔先蠲濵棣州水災田租十之三今所輸七分更除其半七年八月除江淮兩浙被災民租九年諸州有隕霜害稼及水災者除其租天禧四年十月減水災州縣秋租五年三月京東西水災賜民租十之五十月蠲京東西淮浙被災民租乾興元年正月蠲秀州水災民租仁宗本紀天聖元年七月詔職田遇水旱蠲租如例三年八月蠲陜西州軍旱災租賦十一月以㐮州水蠲民租四年六月畿内京東西淮南河北被水民田蠲其租五年十一月以陜西旱蝗減其民租賦六年八月詔免河北水災州軍秋税七年四月免河北被水民租賦明道元年畿内京東西河北河東陜西蝗淮東江東兩川饑除民租景祐元年三月免諸路災傷州軍今年夏税六月免畿内被災民税之半荒政考畧景祐元年京東大旱民多饑殍有司以徴賦不完上其數于朝仁宗諭曰江南嵗饑貸民種粟數千萬斛且屢經停閣而轉運督責不已民貧不能自償昨遣使安撫始以事聞不爾何由上達其悉蠲之又蠲三千三百一十六萬然有司或務聚斂不即寛除朝廷知其弊下詔戒飭皇祐元年六月蠲河北復業民租賦二年閏十一月河北水詔蠲民租四年河北路及鄜州水蠲河北民積年逋負鄜州民税役至和二年三月以旱除畿内民逋芻及去年秋逋税嘉祐元年正月蠲被災田租六月免畿内京東西河北被水民賦租六年七月詔淮南江浙水災差官體量蠲税神宗本紀熈寧二年四月免河此歸業流民夏税三年八月以衞州旱蠲租賦是嵗河北陜西旱饑除民租四年五月詔恩冀等州災傷蠲其税十年九月詔河決州縣蠲其税元豐元年八月詔河北被水者蠲其租四年八月詔蠲河北東路災傷州軍今年夏料役錢七年河北水壊洺州廬舍蠲其税哲宗本紀元祐元年四月詔諸路旱傷蠲其租紹聖元年三月詔振京東河北流民蠲是年租税髙宗本紀建炎二年七月以春霖夏旱蝗詔災甚者蠲田賦紹興六年三月蠲旱傷州縣民積欠錢帛租税寛四川災傷州縣户帖錢之半七年閏十月蠲江東路月樁錢萬緡十三年七月蠲浙西貧民逋負丁鹽錢十八年十二月蠲被災下户積欠租税二十三年七月寛理平江府湖秀二州被水民夏税九月潼川被水州縣蠲其賦二十四年十月蠲旱傷州縣租賦二十七年十月詔四川諸司察旱傷州縣蠲其税二十八年八月檢放風水災傷州縣苗税九月蠲平江紹興湖州被水民逋賦文獻通考紹興二十八年三省言平江紹興府湖秀州被水欲除下户積欠擬令户部開具有無侵損嵗計上曰不須如此止令具數便於内庫撥還朕平時不妄費内庫所積正欲備水旱本是民間錢却為民間用何所惜乃詔平江等處應日前積欠税賦並蠲之宋史髙宗本紀紹興二十九年正月蠲沙田蘆場為風水所侵者租之半三月除湖州平江紹興流民公私逋負九月蠲江浙蝗潦州縣租食貨志紹興二十九年上謂輔臣曰輕徭薄賦所以息盜嵗之水旱所不能免儻不寛恤而惟務科督豈使民不為盜之意哉於是詔諸路州縣紹興二十七年以前積欠官錢三百九十七萬餘緡及四等以下官欠悉除之九月詔兩浙江東西水浙東江東西螟其租税盡蠲之自是水旱經兵時有蠲減不盡書也宋史孝宗本紀隆興元年以兩浙大水旱蝗江東大水悉蠲其租二年二月蠲秀州貧民逋租乾道元年二月蠲兩淮災傷州縣身丁錢絹施師㸃傳師㸃為臨安府教授乾道元年陳康伯薦賜對言歴年屢下詔恤民而恵未加浹陛下軫念惟恐一夫失所郡邑搜求惟恐財賦不集母惑乎日降絲綸恩不霑被細民困於倍輸重以嵗惡室且垂罄租不如期積多逋負今明堂肆赦户自四等以下逋自四年以前願悉除免上曰非卿不聞此言詔従之四年五月以邛州安仁縣荒旱失于蠲放致饑民擾亂守貳縣令降罷追停有差九年二月蠲江西旱傷五州逋負米王圻續通考淳熈元年宰執進呈檢放過乾道九年災傷停閣錢物浙東路自淳熈元年為始作三年帶納江東路候豐熟作兩年帶納江西路即不曽據州軍報到災傷數上曰既是災傷若與停閣税賦亦無從出可並與蠲免如有已納數目與理充一年合輸之數是年詔江西湖南路累經災傷所有上供米斛逐年已行減放外今年雖無豐熟尚慮民力未甦所有第四第五等人户合給淳熈元年秋苗特與蠲放一半如州縣輒敢違戾拘催許人户越訴及不得縦容吏人作弊將第三等以下人户減免令監司覺察按劾聞奏二年宰執進呈江西湖南昨得㫖以頻年旱傷第四等第五等人户合納秋苗特蠲一半切恐諸郡支遣不足縁此敷擾及民上曰此是特恩又所争止七八十萬斛可並於上供數内除豁仍禁戢不得輒有敷擾許人户越訴將違戾官吏重治施行宋史孝宗本紀淳熙三年正月以常州旱寛其逋負之半七年正月蠲淮東民貸常平錢米五月𡊮州分宜縣大水蠲其税文獻通考淳熙七年池州言檢放旱苗米四萬五千餘石其經總制錢二萬六千餘貫係於苗上收趁無所從出詔蠲之浙東提舉朱熹言去年水旱相繼朝廷命檢放秋苗蠲閣夏税縁起催在前善良畏事者多已輸納其得減放者皆頑猾人户事件不均望詔將去年剰納數目理作八年蠲豁詔户部詳㸔蕙田案災歉之嵗蠲閣税賦為恵宜均而或起催在前蠲放在後則良民之急公者多已全完惟頑猾之户獨霑其恵况未徴之額必不如已徴之多所謂寛免者僅什之一二耳而官吏之不肖者黄封未下白紙亟催乗間以恣其漁蠧者其弊尤難究詰也朱子提舉浙東日建議請以去年剰納之數理作明年蠲豁之數如此則百姓之被澤不致偏枯而官吏亦無由滋弊真可為後世法矣攷之續通考所載則淳熙元年先已行之非朱子之剏議也宋史孝宗本紀淳熙八年六月除淳熙七年諸路旱傷檢放米一百三十七萬石錢二千六萬緡八月詔紹興府諸縣夏税和市折帛身丁錢絹之類不以名色截日並令住催九月言者請自今歉嵗蠲減經費有虧令户部據實以聞毋得督趣已蠲閣之數從之十二月蠲諸路旱傷州軍明年身丁錢物九年十月蠲諸路旱傷州軍淳熙七年八年逋賦十年七月詔除災傷州縣淳熙八年欠税十一年三月以上津潮陽旱蠲其税朱子繳納南康任滿合奏禀事件狀臣竊以為救荒之政蠲除賑貸固當汲汲于其始而撫存休養尤在謹之于其終譬如傷寒大病之人方其病時湯劑砭灸固不可以少緩而其既愈之後飲食起居之間所以將䕶節宣小失其宜則勞復之證百死一生尤不可以不深畏也今者饑餓之民雖得蒙被聖恩以幸免于死亡然亦類皆鳩形鵠面薾然無異于大病之新起若有司加意撫綏寛其財力則一二年間筋骸氣血庶㡬可復其舊若遂以為既愈而不復致其調攝之功但見其尚能耕墾田疇撑拄門户而遽欲責以累年之逋負與夫去嵗倚閣之官物則是人者其必無全理矣竊聞乾道七年之旱夏税秋苗亦皆嘗蒙聖恩矣而流殍甚衆迄今不復者正以次年帶納前科税物者迫之也然考其實所謂帶納者初未嘗大段有人納到以佐有司用度之缺而姦胥猾吏得以並縁騷擾則其害有不可勝言者其後淳熈元年九月四日乃以薦饑始蒙蠲放則三年之間所失已多而無及于事矣今舊逋未除新税將起斯人懔懔已有狼顧之憂臣愚欲望陛下赦臣之罪察臣之言亟詔有司凡去年被災之郡盡今年毋得催理積年舊欠及將去年倚閣夏税悉與蠲放其上二等人户當此凶年細民所從仰食其間亦有出粟減價賑糶而不及賞格者欲望聖慈普加恩施許將去年殘欠夏税多作料數逐年帶納則覆載之間幅員之内當此災旱之餘無有一夫一婦不被堯舜之澤矣蕙田案災傷之後民困未蘇而復使帶納積年之逋租及去年所停之賦嵗入㡬何其能供此數倍之賦乎宜酌其可蠲者蠲之其餘則寛其年限分年帶徴此彌縫于災後之計也光宗本紀紹熈三年五月蠲四川水旱郡縣租賦食貨志紹興五年蠲廬州旱傷百姓貸稻種三萬二千一百石寧宗本紀慶元元年九月蠲臨安府水災貧民賦台巖湖三州被災民丁絹三年九月以四川旱詔蠲民賦嘉泰四年七月蠲兩浙闕雨州縣逋租開禧二年七月罷旱傷州軍比較租賦一年嘉定元年閏四月蠲兩浙闕雨州縣貧民逋賦三年三月蠲荒歉諸州民間逋負王圻續通考嘉定七年江東轉運副使真徳秀奏乞停閣夏税蠲放秋苗疏曰臣聞乾徳二年四月詔曰自春徂夏時雨尚愆深恐黎民失於播殖所宜優䘏俾𫉬蘇安一應諸道所催今年夏租委所在官吏檢視民田無見苗者上聞並與除放紹興二十八年八月二日詔令諸路轉運疾速行下州縣開具實被災傷頃𤱔數目及合放分數以聞仰惟太祖皇帝開造我朝配天之業髙宗皇帝中興萬世無疆之基二聖一心皆以保全民命為本故於災傷之嵗切切如此夫以四月而蠲夏税以八月而檢秋苗自常情觀之毋乃太早葢救災䘏患當於民未甚病之時若待其飢莩流離然後加恵則所全寡矣為民父母忍使至斯兩朝詔書可為大法今臣所陳二事如蒙聖慈降出三省早賜施行其於公私皆有便利一則征斂既寛逃亡必少所在田𤱔不至抛荒公家租賦亦免失陷二則農人肯行播種自救其饑不致大段缺食全仰官司糶濟三則窮窶之民粗有生理何苦輕捐其身而為盜賊未萌之禍銷弭尤多八年七月蠲臨安紹興府貧民夏税九年九月詔兩浙江東監司覈州縣被水最甚者蠲其租理宗本紀紹定二年十月詔台州水災除民田租及茶鹽酒酤諸雜税郡縣抑納者監司察之淳祐十年九月以嚴州水復民田租十二年六月嚴衢婺台處上饒建寧南劍卲武大水除今年田租寳祐二年九月詔山隂蕭山諸暨㑹稽四縣水其除今年田租度宗本紀咸淳六年閏十月安吉州水免公田租四萬四千八十石十一月嘉興華亭兩縣水免公田租五萬一千石民田租四千八百一十石蕙田案景定中賈似道用陳堯道曹孝慶等之議買民田為公田公田之租十倍于民田而民之困弊極矣觀咸淳免租之詔民田止四千餘石而公田乃五萬一千石厚斂如是國安得不亡乎七年正月紹興府諸暨縣湖田水免租三千二百石有竒八年十月以秋雨水溢詔減錢塘仁和兩縣民田租什二㑹稽湖田租什三諸暨湖田租盡除之九年十二月沿江制置使所轄四郡夏秋旱潦免屯田租二十五萬石十年正月江東沙圩租米以咸淳九年水災詔減什四三瀛國公本紀咸淳十年九月免被水州縣今年田租十二月詔淮西四郡水旱去年屯田未輸之租其勿徴遼史穆宗本紀應歴三年十一月以南京水詔免今嵗租聖宗本紀統和十二年二月免南京被水户租賦十五年正月免流民税三月免南京逋税及義倉粟興宗本紀重熙十二年十一月以上京嵗儉復其民租税道宗本紀咸雍四年十月永清武清安次固安新城歸義容城諸縣水復一嵗租七年十一月免南京流民租八年二月嵗飢免武安州税太康元年九月以南京饑免租税一年二年二月南京路饑免租税一年九月以南京蝗免明年租税六年十二月免西京流民租賦一年大安三年正月南京貧民復其租賦三月免錦州貧民租一年免上京貧民租如錦州四年正月免上京逋逃及貧户租賦夀隆六年十月以平州饑復其租賦一年金史太宗本紀天㑹元年十二月詔以咸州以南蘇復州以北年穀不登其應輸南京軍糧免之二年正月以東京比嵗不登詔減田租市租之半食貨志大定三年以嵗歉詔免二年租税六年以河北山東水免其租世宗本紀大定九年二月以中都等路水免税又以曹單二州被水尤甚給復一年十二年正月以水旱免中都西京南京河北河東山西陜西去年租税十四年二月詔免去年被水旱百姓租税十六年正月詔免去年被水旱路分租税十七年三月詔免河北山東等路去年被旱蝗租税十八年正月免中都河北河東山東河南陜西等路前年被災租税十九年二月免去年被水旱民田租稅食貨志大定十九年秋中都西京河北山東河東陜西以水旱傷民田十三萬七千七百餘頃詔蠲其租二十一年六月上謂省臣曰近者大興府平灤薊通順等州經水災之地免今年租稅不罹水災者姑停夏税俟稔嵗徴之九月以中都水災免租世宗本紀大定二十六年四月尚書省奏年前以諸路水旱于軍民地土二十一萬餘頃内擬免税四十九萬餘石従之詔曰今之税考古行之但遇災傷常加蠲免二十七年六月免中都河北等路嘗被河決水災軍民租税十一月詔河水泛溢農夫被災者與免差税一年章宗本紀明昌三年六月有司言河州災傷民乏食而租税有未輸詔免之九月諭尚書省去嵗山東河北被災傷處所閣租税及借貸錢粟若便徴之恐貧民未蘇俟豐收日以分數察徴可也泰和四年四月免旱災州縣徭役及今年夏稅食貨志興定二年御史中丞完顔伯嘉奏亳州大水計當免租三十萬石而三司官不以實報止免十萬而已詔命治三司官虛妄之罪七月以河南大水下詔免租三年令逃户復業者但輸本租餘苦役一切皆免能代耕者免如復户有司失信擅科者以違制論宣宗本紀興定四年八月上諭宰臣河南水災唐鄧尤甚其被災州縣已除其租餘順成之方止責正供和糴雜徴並免仍自今嵗九月始停周嵗桑皮故紙折輸流民佃荒田者如上優免元史食貨志蠲免有以恩免者有以災免者災免之制世祖中統元年以各處被災驗實減免科差三年以蠻冦攻掠免三叉沽竈户一百六十五户其年絲料包銀四年以秋旱霜災減大名等路税糧至元三年以東平等處蠶災減其絲料五年以益都等路禾損蠲其差税六年以濟南益都懐孟徳州淄萊博州曹州真定順徳河間濟州東平恩州南京等處桑蠶災傷量免絲料十九年減京師民户科差之半二十年以水旱相仍免江南税糧十分之二二十四年免北京饑民差税是年揚州及浙西水其地税在揚州者全免浙西減二分二十五年南安等處被冦兵者税糧免徴二十六年紹興路水免地税十之三是年六月以禾稼不收免遼陽差税二十七年大都遼陽被災免其包銀俸鈔是年六月以霖雨免河間等路絲料之半十月以興松二州霜免其地税二十八年遼陽被災者税糧皆免徴其餘量徴其半是年五月以太原去嵗不登杭州被水其太原丁地税糧杭州地税並除之九月又免州路所負嵗糧二十九年以北京地震量減嵗課是年以大都去嵗不登流移者衆免其税糧及包銀俸鈔元史成宗本紀至元三十一年十月江浙行省臣言陛下即位之初詔蠲今嵗田租十分之三然江南與江北異貧者佃富人之田嵗輸其租今所蠲特及田主其佃民輸租如故則是恩及富室而不被於民故也宜令佃民當輸田主者亦如所蠲之數從之蕙田案蠲租之恵止及田主不及佃客於理亦覺不均至元行省之議是也食貨志元貞元年以供給繁重及水傷禾稼免咸平府邊民差税大徳三年以旱蝗除揚州淮安兩路税糧五年各路被災重者其差税並除之六年免大都平灤差税七年以内郡飢荆湖川蜀供給軍餉其差税減免各有差八年以平陽太原地震免差税三年至大元年以江南江北水旱民飢其科差夏税並免之二年以腹裏江淮被災其科差夏税亦並免之皇慶二年免益都飢民貸糧延祐二年河南歸徳南陽徐邳陳蔡許州荆門㐮陽等處水三年肅州等處連嵗被災皆免其民户税糧天歴元年陜西霜旱免其科差一年鹽官州海潮免其秋糧夏税一年十二月詔經冦盜剽掠州縣免差税一年二年以闗陜旱免差税三年至順元年以河南懐慶旱其門攤課程及逋欠差税皆免徴明㑹典凡蠲免洪武元年令水旱去處不拘時限從實踏勘實災税糧即與蠲免洪武二十六年定凡各處田禾遇有水旱災傷所在官司踏勘明白具實奏聞仍申合干上司轉達户部立案具奏差官前往災所覆勘是實將被災人户姓名田地頃𤱔該徴税糧數目造册繳報本部立案開寫災傷縁由具奏明史食貨志太祖之訓凡四方水旱輒免税豐嵗無災傷亦擇地瘠民貧者優免之凡嵗災盡蠲二税在位三十餘年所蠲租税無數通紀㑹纂洪熈元年四月詔免山東及淮安徐州夏税秋糧之半時有至自南京者上問所過地方何似對曰淮徐山東民多乏食而有司徴夏税方急遂召楊士竒等令草詔免之士竒曰斯事亦可令户部工部與聞上曰救民之窮當如救焚拯溺不可遲疑有司慮國用不足必持不決之意卿姑弗言命書詔畢遣使齎行上顧士竒曰汝今可語户部工部朕悉免之矣左右咸言地方千餘里其間未必盡無收亦宜有分别庶不濫恩上曰恤民寧過厚為天下主寧與民寸寸計較耶蕙田案恤民寧過厚一語真仁人之言廟號曰仁宗宜哉明㑹典成化十九年奏准鳯陽等府被災秋田量以十分為率減免三分其餘七分除存留外起運者照江南折銀則例毎石徴銀二錢五分送太倉銀庫另項收貯備邊以後事體相類者俱照此例宏治三年議准災傷應免糧草事例全災者免七分九分者免六分八分者免五分七分者免四分六分者免三分五分者免二分四分者免一分止于存留内除豁不許將起運之數一槩混免若起運不足通融撥補學庵𩔖稿太祖勘實災盡與蠲免宏治始定為全災免七分九分災以下免數以一分遞減又止免存留不及起運成化時被災田糧改折者石止徴二錢五分宏治亦増為兊運七錢改兊六錢孝宗有賢主名而實之不存祖宗之徳意㣲矣然賴太祖立法之善十六朝二百七十七年之中水旱災沴無在不聞蠲賑免折無嵗不有雖至末造兵革擾攘不廢斯政所以厚斂而民力猶可支重役而民心猶未去延祚永世葢有由矣嘉靖十六年題准今後凡遇地方夏秋災傷遵照勘災體例定擬成災應免分數先儘存留次及起運其起運不敷之數聴撫按官將各司府州縣官庫銀兩錢帛等項通融處補及聴折納輕齎存留不足之數從宜區處不許徴迫小民有孤實恵王圻續通考嘉靖十六年被災地方應免錢糧已徴者准作本户下年該納之數未徴者照例蠲免蕙田案此即朱子淳熈中所建之議明會典嘉靖四十三年議准淮揚徐州災傷改折嘉靖四十四年應運四十三年分兊運改兊秋糧淮安所屬邳州海州鹽城山陽睢寧五州縣各准三分安東贑榆沭陽宿遷桃源清河六縣及徐州所屬蕭縣各准五分徐州并碭山沛縣豐縣及揚州府所屬興化縣各准六分徴銀解部備放官軍折色支用通紀㑹纂神宗七年蘇松大水積逋七十餘萬張居正請蠲之以安民生疏謂百姓財力有限即年嵗豐收一年之所入僅足以供當年之數不幸荒歉見年錢糧尚不能辦况累嵗之積逋哉故帶徴一法名為完舊欠實則減新收也今嵗之所減即為明嵗之拖欠見在之所欠又是將來之帶徴况頭緒繁多年分混雜里胥欺匿官吏侵漁與其敲撲窮民實奸貪之囊槖孰若蠲與小民使其皆戴上之仁哉上從之廣治平畧神宗十四年水旱異常災傷疊見時給事中呉之鵬請于西北多方賑濟于東南大加蠲免畧曰景泰四年山東河南江北等處災傷令所在問刑衙門責有力囚犯于缺糧州縣倉納米賑濟雜犯死六十石流徒三年四十石以漸而殺考之漢武太始秋旱募死罪人贖錢五十萬減死罪一等以故國不費而民自濟是達權濟變之法前代已有行之者至若江南天下財賦半給于斯霪雨不絶田圩盡沒禾苗淹爛廬舍漂流若不大施蠲不可然臣之所謂蠲者不在積逋而在新逋不在存留而在起運何也葢積逋之蠲奸頑侵欠者𫉬厚恵而善良供賦者不沾恩則何以示勸且以凶嵗議蠲而乃免樂嵗逋負之虚數民危在眉睫而乃議往年可緩之徴輸則何以周急若乃存留不過國課十分之一二耳官俸軍需之𩔖詎可一日無哉故非蠲起運民未有能𫉬甦者也蕙田案蠲舊欠宜於平時蠲新租宜於災嵗葢舊欠之額數雖盈多大半無著或人户久已逃移或吏胥從中漁蠧唐權徳輿所云即不蠲除亦無可斂之理不如先事圖之使恩歸于上者是也惟新租之徴蠲免一分則民受一分之實恵救災者當如拯焚濟溺不議目前之徴輸而議夙昔之逋負其於民猶無益也明初蠲免無存留起運之别孝宗時始有祗免存留之議然存留之數少不如起運之數多故呉之鵬𡊮伯修均有兼免起運之説也𡊮伯修䇿曰愚竊計蠲之䇿一善行其蠲之䇿三今海内重災郡邑其税應存留者業已免徴而起運者尚未全豁也枵腹子遺救死不暇而胡力辦此故起運之課宜省也又聞州邑不肖之吏黄封雖下白紙猶催畸羸之夫腹無半粟而手足猶縶于桁楊藉當宁之曠恩為潤篋之便計乃其姓名猶有不入撫按之白簡者何其貪而不黜乎故苛政之察宜宻也民草食不充而大吏猶華軒輶使至餽送充斥供張豐腆此非民膏何以給之故官守之自奉宜薄也兹善行其蠲之三䇿也蕙田案薄征之政以後代所行言之大約有三端曰蠲曰減曰緩大災當議蠲偏災當議減災輕當議緩蠲免之詔宜速不宜遲減放之數宜多不宜少停閣之後宜帶徴不宜併徴周官薄征其要不外是矣右薄征周禮地官大司徒三曰緩刑注謂凶年犯刑緩縦之鄭氏鍔曰凶荒則犯禁多憫而不刑則犯者益衆嚴以示禁則饑民之犯或出於不得已姑緩之可也髙氏愈曰緩刑者因嵗凶民易犯法而寛之也民迫于饑寒不幸而有過失當緩其刑辟以示哀矜之意大荒則令邦國緩刑秋官士師若邦凶荒則以荒辯之法治之注鄭司農云辯讀為别救荒之政十有三而士師别受其教條是為荒别之法𤣥謂辯當為貶聲之誤也遭饑荒則刑罰國事有所貶損作權時法也朝士職曰若邦凶荒札喪則令邦家都家縣鄙慮刑貶蕙田案士師荒辯之法即朝士所謂慮刑貶也朝士定其議士師治其法令緩刑注緩刑紓民心也王氏昭禹曰刑雖不可去亦緩之而不急朝士若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶注故書慮為憲貶為窆杜子春云窆當為禁憲謂幡書以明之謂慮謀也貶猶減也謂當圖謀緩刑且減國用為民困也所貶視時為多少之法劉氏迎曰刑之貶而以朝士慮之者葢凶荒札喪冦戎之際法不寛減則民滋不安而盜賊之變起正朝士所當慮而令邦國都家縣鄙議刑貶也先儒以減用為慮貶朝士何與于減用哉蕙田案鄭康成注士師荒辯引此文所謂貶者於刑罰之法有所貶損非減損國用之謂也此注乃又有減用之解制國用視年之豐耗冡宰之職也與秋官無涉劉氏駁之甚是漢書元帝本紀永光二年夏六月詔曰間者連年不收四方咸困元元之民勞于耕耘又亡成功困于饑饉亡以相救朕為民父母徳不能覆而有其刑甚自傷焉其赦天下後漢書光武帝本紀建武五年夏四月旱蝗五月丙子詔曰久旱傷麥秋種未下朕甚憂之將殘吏未勝獄多寃結元元愁恨感動天地乎其令中都官三輔郡國出繫囚罪非犯殊死一切弗案見徒免為庶人章帝本紀建初元年正月詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡方春東作宜及時務罪非殊死須立秋案驗五年二月詔曰去秋雨澤不適今時復旱其令二千石理寃獄録輕繫和帝本紀永元十六年七月詔曰今秋稼方穂而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒于法疑者勿决獻帝本紀興平元年三輔大旱自四月至于七月遣使者洗囚徒原輕繫晉書武帝本紀泰始七年五月雍凉秦三州饑赦其境内殊死哀帝本紀隆和元年四月旱詔出輕繫宋書孝武帝本紀大明七年八月詔曰炎精損和陽偏不施嵗云不稔咎實朕由近道刑獄當親料省其王畿内及神州所統可遣尚書與所在共訊畿外諸州委之刺史并議省律令思存利民後廢帝本紀元徽元年八月京師旱詔尚書令與執法以下就訊衆獄使寃獄洗遂困弊昭蘇南齊書武帝本紀建元四年六月詔曰水潦為患星緯乖序京都囚繫可尅日訊决諸逺獄委刺史以時察判魏書孝文帝本紀太和十一年十一月詔曰嵗既不登民多饑窘輕繫之囚宜速决了無令薄罪久留獄犴宣武帝本紀延昌元年四月以旱詔尚書與羣司鞫理獄訟二年八月詔曰頃水旱互侵頻年饑儉百姓窘敝多陷罪辜其殺人掠賣人羣强盜首及雖非首而殺傷財主曽經再犯公㫁道路刼奪行人者依法行决自餘恕死徒流以下各準減降孝明帝本紀熈平元年五月詔曰災旱積辰苗稼萎悴尚書可釐恤獄犴察其淹枉簡量輕重隨事以聞無使一人怨嗟増傷和氣正光元年五月詔曰災旱為災八座可推鞫見囚務申枉濫周書武帝本紀保定元年七月詔曰亢旱歴時嘉苗殄悴豈獄犴失理刑罰乖中歟其所在見囚死以下一嵗刑以上各降本罪一等百鞭以下悉原免之舊唐書虞世南傳貞觀八年山東及江淮大水帝憂之以問世南對曰山東淫雨江淮大水恐有寃獄枉繫宜省録纍囚庶㡬或當天意帝然之于是遣使申理獄訟多所原赦冊府元龜貞觀十七年三月以久旱詔曰今州縣獄訟常有寃滯宜令覆囚使至州縣科簡刑獄以申枉屈務從寛宥總章二年二月以旱親慮京城囚徒其天下見禁囚委當州長官慮之唐書髙宗本紀儀鳯三年四月以旱避正殿慮囚冊府元龜神龍二年正月以旱親録囚徒多所原宥其東都及天下諸州委所在長官詳慮唐書𤣥宗本紀開元二年正月以闗内旱寛繫囚三年五月以旱録京師囚六年八月以旱慮囚冊府元龜開元七年七月親慮囚于宣政殿事非切害悉原之詔天下諸州見繫囚徒宜令所由長官便慮有司即此𩔖作條件處分十六年九月以久雨詔兩京及諸州繫囚應推徒已下罪並宜釋放死罪及流各減一等長慶二年十二月詔曰自冬以來甚少雨雪農耕方始災旱是虞慮有寃滯感傷和氣宜委御史臺大理寺及府縣長吏自録囚徒仍速决遣除身犯罪應支證追呼近繫者一切並令放出須辨對者任其責保冀得克消沴氣延致休祥四年六月詔曰近者夏麥垂熟霖雨稍多雖不甚損傷亦是隂陽小沴必慮囚徒之中或有寃濫宜令御史中丞刑部侍郎大理卿同疏理决遣訖聞奏其在内諸軍使囚徒亦委本司疏决聞奏蕙田案唐以尚書刑部御史臺大理寺為三司今之三法司也太和七年七月敕曰今縁稼穡方滋旬月少雨慮其寃滯或有感傷宜委左僕射李程及御史大夫鄭覃同就尚書省疏理諸司囚徒務從寛降限五日内畢聞奏其外府州為有水旱處委長史速准此處分開成二年七月詔曰秋旱未雨慮有幽寃縲禁多時須議疏决京師刑獄宜令右僕射兼門下侍郎平章事鄭覃親往疏理唐書宣宗本紀大中四年四月以雨霖詔京師闗輔理囚文苑英華大中九年七月十三日詔近者江淮數道水旱疾癘宜委所在長吏慎恤刑獄疏决囚徒必務躬親俾無寃滯唐書懿宗本紀咸通十年六月以蝗旱理囚冊府元龜後唐天成元年八月敕久雨不晴慮傷農稼可曉諭天下州府疏理繋囚無令寃滯長興三年六月敕霖雨積旬尚未晴霽睠言刑獄慮在滯淹京城諸司繫囚並宜疏理釋放後晉天福八年五月敕以飛蝗作沴膏雨久愆應三京鄴都諸道州府見禁囚人除十惡行刼諸殺人者及偽行印信合造毒藥官典犯贓外罪者減一等餘並放開運三年敕令以漸及春農久愆時雨深慮囹圄或有滯淹其諸道州府見禁人等並須據罪輕重疾速㫁遣仍限半月内有㫁遣訖奏宋史食貨志諸州嵗歉選官分路巡撫緩囚繫省刑罰饑民刼囷窖者薄其罪太宗本紀淳化五年正月遣使决諸路刑獄應因饑刼蔵粟誅為首者餘減死仁宗本紀天聖七年河北水遣使决囚嘉祐七年二月命官録被水諸州繫囚神宗本紀熈寧三年八月以旱慮囚死罪以下遞減一等杖笞者釋之孝宗本紀淳熙八年五月以久雨減京畿及兩浙囚罪一等釋杖以下金史章宗本紀泰和四年四月以久旱遣使審繫囚理寃獄明史太祖本紀洪武二十四年六月久旱録囚二十六年四月旱省獄囚宣宗本紀宣徳五年六月禱雨不應詔中外疏决罪囚英宗前紀正統三年六月以旱讞中外疑獄十四年五月旱太監金英同法司録囚刑法志正統初刑部尚書魏源以災旱上疑獄請命各巡撫審録從之無巡撫者命巡按清軍御史行在都察院亦以疑獄上通審録之憲宗本紀成化八年四月京師久旱録囚十七年四月以久旱風霾諭法司慎刑獄太監懐恩同法司録囚武宗本紀正徳五年三月禱雨釋獄囚神宗本紀神宗十三年四月以旱詔中外理寃抑釋鳯陽輕犯及禁錮年久罪宗莊烈帝本紀崇禎十年四月旱清刑獄刑法志崇禎十五年四月亢旱下詔清獄中允黄道周言中外齋宿為百姓請命而五日之内繫兩尚書不聞有抗疏争者尚足回天意乎兩尚書謂李日宣陳新甲也帝方重怒二人不能從明㑹典景泰四年奏准山東河南江北直𨽻徐州等處災傷令所在問刑衙門責有力囚犯于缺糧州縣倉納米賑濟雜犯死罪六十石流徒三年四十石徒二年半三十五石徒二年三十石徒一年半二十五石徒一年二十石杖罪每一十一石笞罪每一十五斗嘉靖二十四年議准徒杖笞罪審有力者俱令照例納米入預備倉不許以稻黍雜糧准折上納蕙田案景泰嘉靖間令罪人得入粟免罪以備賑濟此寓勸分之法于緩刑之中亦捄災之一術附見於後右緩刑周禮地官大司徒四曰弛力注鄭司農云弛力息徭役也大荒則令邦國弛力均人凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政不均地政注無力政恤其勞也漢書宣帝本紀本始三年五月大旱詔三輔民就賤者且毋收事盡四年注晉灼曰不給官役也師古曰收謂租賦也事謂役使也盡本始四年而止後漢書和帝本紀永元九年六月詔今年秋稼為蝗蟲所傷皆勿收租更芻槀安帝本紀永初四年正月詔以三輔比遭冦亂人庶流冗除三年逋租過更口算芻槀元初元年十月詔除三輔三嵗田租更賦口算順帝本紀永建五年四月詔郡國貧人被災者勿收責今年過更蕙田案漢法有口算有更賦口算者年十五而算出口賦至五十六而除此户口之賦於古未有後世户調丁税之制葢由此也更賦者年二十而傅給徭役亦五十六而除其别有卒更踐更過更之目此力役之征唐時謂之庸錢自兩税法行租庸并而為一無所謂力役之征矣宋時所謂差役者如衙前里正户長保正耆長之屬攷之於古即鄉遂州黨之吏漢之三老亭長游徼亦即其職自唐以後浸以卑下凡官府期會輦運官物逐捕盜賊之𩔖皆得而役使之謂之户役馬貴與嘗為之辨以為户役非古之力役其説固然然既出其力以役于官則亦與古之力征更賦名異而實同矣晉書成帝本紀咸康二年三月免所旱郡縣繇役隋書文帝本紀開皇十八年七月詔以河南八州水免其課役通典唐武徳二年制凡水旱蟲霜為災損七分以上課役俱免宋史寧宗本紀嘉定二年七月募民以振飢免役金史章宗本紀泰和四年四月免旱災州縣徭役元史食貨志中統三年閏九月以濟南路遭李氊之亂軍民皆飢盡除差發至元七年南京河南蝗旱減差徭十分之六世祖本紀至元十七年十一月詔以瑪噶珊民貧免其役三年十二月賑鞏昌常徳等路飢民仍免其徭役成宗本紀大徳二年正月詔以水旱老病單弱者差務並免三年食貨志大徳五年各路被災重者其差務並除之明會典成化六年敕順天河間永平真定保定災傷地方一應差徭俱暫優免蕙田案宋元以後所謂徭役及差徭者皆户役也右弛力周禮地官大司徒五曰舍禁注舍禁若公無禁利其疏山澤所遮禁者舍去禁使民取蔬食劉氏彛曰山澤林麓既不以封于諸侯則設虞衡之禁所以蕃鳥獸毓草木以盡乎萬物之性也民既失食則宜開其禁故舍禁之政行焉髙氏愈曰舍釋通釋禁謂釋山澤之禁與民同也大荒則令邦國舍禁漢書文帝本紀四年四月大旱蝗㢮山澤元帝本紀初元元年四月詔曰闗東今年穀不登民多困乏江海陂湖園池屬少府者以假貧民勿租税二年三月詔水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民後漢書和帝本紀永元五年二月詔京師離宫果園上林廣成囿悉以假貧民恣得采捕不收其税九月令郡縣官有陂池令得采取勿收假税二嵗九年六月詔今年秋稼為蝗蟲所傷其山林饒利陂池漁採以贍元元勿收假税十一年二月遣使循行郡國稟貸被災害不能自存者令得漁采山林池澤不收假税十二年二月詔郡國流民聴入陂池漁采以助蔬食十五年六月詔令百姓鰥寡漁采陂池勿收假税二嵗安帝本紀永初元年二月以廣成游獵地及被災郡國公田假與貧民三年三月詔以鴻池假與貧民四月詔上林廣成苑可墾闢者賦與貧民晉書安帝本紀義熙九年四月罷臨沂湖熟皇后脂澤田四十頃以賜貧人弛湖池之禁宋書孝武帝本紀孝建二年八月三呉民飢詔諸苑禁制綿逺有妨肆業可詳所開弛假與貧民魏書孝文帝本紀太和二十年十二月開鹽池之禁與民共之冊府元龜貞觀十一年七月廢明徳宫之元圃苑院分給河南雒陽遭水者儀鳯三年四月以同州飢沙苑及長春宫並許百姓樵採漁獵宋史食貨志諸州嵗歉利有可與民共者不禁水鄉則蠲蒲魚果蓏之税真宗本紀咸平二年閏月詔江浙飢民入城池漁採勿禁遼史天祚帝本紀乾統三年二月以武清縣大水弛其陂澤之禁金史章宗本紀承安二年十一月以薪貴敕圍場地内無禁樵採元史世祖本紀至元十年九月遼東飢弛獵禁十四年五月以河南山東水旱除河泊課聴民自漁二十四年三月遼東飢弛太子河捕漁禁二十六年十月以平灤河間保定等路飢弛河泊之禁閏十月檀州飢民劉徳成犯獵禁詔釋之二十八年三月杭州平江等五路飢弛湖北捕漁之禁遼陽武平飢弛捕獵之禁十一月武平平灤諸州飢弛獵禁其孕字之時勿捕成宗本紀元貞元年六月江西行省所轄郡大水無禾弛江河湖泊之禁聴民採取大徳元年閏十二月淮東飢弛湖泊之禁仍聴正月捕獵二年正月建康隆興臨江寧國太平廣徳饒池等處水弛澤梁之禁聴民漁採三年五月江陵路旱蝗弛其湖泊之禁四年二月湖北饑弛山澤之禁五年十月以嵗饑弛山澤之禁聴民捕獵七年正月弛饑荒所在山澤河泊之禁一年九年八月以冀寧嵗復不登弛山澤之禁聴民採捕荒政考畧至大元年詔曰近年以來水旱相仍缺食者衆諸禁捕野物地面除上都大同隆興三路外大都周圍各禁五百里其餘禁㫁處所及應有山場河泊蘆場詔書到日並行開禁一年聴從民便採捕元史武宗本紀至大二年正月詔天下弛山澤之禁仁宗本紀皇慶二年七月諸被災地並弛山澤之禁獵者毋入其境延祐六年六月以濟寧等路水開河泊禁聴民採食英宗本紀皇慶六年九月瀋陽水旱害稼弛其山場河泊之禁至治二年閏月真定山東諸路饑弛其河泊之禁四年十一月以嵗饑開内郡山澤之禁文宗本紀天歴二年四月河南廉訪司言河南府路民饑乞弛山林川澤之禁聴民採食從之順帝本紀至元三年二月江浙等處饑開所在山場河泊之禁聴民樵採右舍禁周禮地官大司徒六曰去㡬注鄭司農云去幾闗市不㡬也𤣥謂去㡬去其税耳猶疏㡬謂呵禁雖凶年㡬呵但去税而已王氏詳説先鄭以為闗市不譏誠得其説矣然諸儒惑于司闗之文有曰國凶札則無闗門之征猶㡬曽不謂門闗與市葢異乎司市曰國凶荒札喪則市無征而作布去㡬者市之去㡬也門闗所以防姦人之出入不㡬得乎蕙田案㡬者㡬之而征其税也凶荒去税亦可謂之去㡬矣異言異服之輩任其出入而不加詆訶可乎大司徒主通商故云去㡬司闗主禦暴故云猶㡬非有牴牾也司闗國凶札則無闗門之征猶㡬注鄭司農云凶謂凶年饑荒無闗門之征者出入闗門無租税猶㡬謂無租税猶苛察不得令姦人出入王氏昭禹曰司門㡬出入不物者則闗門固亦有㡬矣今以荒札之時宜去㡬矣然而不已焉故曰猶㡬禍故多蔵于細㣲𤼵于人之所忽故雖凶札之時猶㡬司市國凶荒札喪則市無征而有布注有灾害物貴市不税為民乏困也金銅無凶年因物貴大鑄泉以饒民漢書宣帝本紀本始四年正月詔曰今嵗不登已遣使者振貸困乏其令民以車船載穀入闗者得毋用傳成帝本紀陽朔二年秋闗東大水流民欲入函谷天井壺口五阮闗者勿苛留宋書孝武帝本紀大明八年正月詔曰東境去嵗不稔宜廣商賈逺近販鬻米者可停道中雜税魏書孝文帝本紀太和七年三月以冀定二州民飢弛闗津之禁任其去來冊府元龜後唐同光三年閏十二月十九日敕今嵗自京以東水潦為患物價騰踴人户多于西京收糴斛斗近聞京西諸道州府逐㪷皆有税錢遂不通行乃同閉糴宜令各下京西諸道州府凡收糴斛㪷不得輒有税率及經過水陸闗防鎮縣罔有邀詰宋史真宗本紀天禧元年十二月詔陜西縁邊鬻穀者勿算仁宗本紀天聖八年三月詔河北被水州縣毋税牛寶元二年十月詔兩川飢民出劍門闗者勿禁慶歴八年十二月河北流民所過官為舍止之所齎物毋收算蘇軾乞免五穀力勝税錢劄子元祐七年十一月初七日奏臣聞穀太賤則傷農太貴則傷末是以法不税五穀使豐熟之鄉商賈争糴以起太賤之價災傷之地舟車輻輳以壓太貴之直自先王以來未之有改也而近嵗法令始有五穀力勝税錢使商賈不行農末皆病臣頃在黄州親見累嵗穀熟農夫連車載米入市不了鹽茶之費而蓄積之家日夜禱祠願逢饑荒又在浙西親見累嵗水災中民之家有錢無穀被服金珠餓死於市此皆官收五穀力勝税錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廪自元祐以來葢所費數千萬貫石而餓殍流亡不為少衰只如去年浙西水災陛下使江西湖北雇船運米以救蘇湖之民葢百餘萬石又計糴本水脚官錢不貲而客船被差雇者皆失業破産無所告訴與其官司費耗其實如此何似削去近日所立五穀力勝税錢一條只行天聖附令免税指揮則豐凶相濟農末皆利縦有水旱無大飢荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢穀如近嵗之多也今元祐編敕雖云災傷地分雖有例亦免而穀所從來必自豐熟地分所過不免收税則商賈亦自不行議者或欲立法如一路災傷則鄰路免税一州災傷則鄰州亦然雖比今之法小為通流而隔一州一路之外豐凶不能相救未為良法須是盡削近日弊法専用天聖附令指揮乃為通濟右臣竊謂若行臣言税錢必不至大段失陷何也五穀無税商賈必大通流不載見錢必有回貨見錢回貨自皆有税所得未必減於力勝而災傷之地有無相通易為振救官司省費其利不可勝計今肆赦甚近若得於赦書帶下益見聖徳收結民心實無窮之利取進止朱子奏救災事宜畫一狀臣伏覩嵗既不登所在艱食全賴商賈阜通之利所宜存恤不可騷擾今米穀不得收税雖有成法而州縣場務多不遵守至於往糶而有所挾之資既糶而有所貿之貨則往來之間經由去處尤以邀阻抽税為苦是致客人憚於興販欲望聖慈特降睿㫖申嚴舊法仍詔有司諸被災州縣人户欲興販物貨往外州府收糴米穀就闕米處出糶者各經所在或縣或州或監司自陳所帶貨物判執前去其糶米訖所買回貨亦各經所在自陳判執回歸往回所過並不得輒收分文税錢違者並依税米穀法必行無赦如䝉開允即乞徑下轉運司約束沿江瀕海所過場務遵禀施行庶㡬商販流通民食不匱蕙田案蘇氏朱子兩議各有不同東坡謂五穀無稅而見錢回貨則有稅其所得者既未必少于穀稅之額則穀稅可以永停此為通商久逺之計也朱子時五穀久不征税而被災之所猶以别項抽税為苦致販户觀望不前故議令米商之至災所者往來所帶貨物皆特免其税則販户競勸而客米日至其損國課有限其利民食實多此為救災一時之計也宋史何異傳嘉定元年五月不雨異上封事言陛下閔念飢民藥病殯死遐荒僻嶠安得實恵多方稱提不如縮造楮幣阜通商米不如稍寛闗市之征右去㡬周禮地官大司徒七曰𤯝禮注鄭司農云𤯝禮掌客職所謂凶荒殺禮者也𤣥謂𤯝禮殺吉禮也禮疏謂吉禮之中𤯝其數劉氏彛曰省祭祀之禮所以節財用厚賑恤也徐氏乾學曰荒政十有二聚萬民則通君民而言𤯝禮者凡吉嘉之禮皆當減損而行之不止損夫吉禮也蕙田案先鄭解𤯝禮以凶荒殺禮為言其所包甚廣凡禮節之可省者皆省之所以示貶損節物力如天官膳夫所謂大荒則不舉曲禮膳不祭肺馬不食穀玉藻素服素車之類皆是也康成耑指吉禮似太偏況荒政有索鬼神之禮靡神不舉靡愛斯牲正為民請命之大者豈當槩議減省乎天官小宰喪荒受其含禭幣玉之事注凶荒有幣玉者賔客所賙委之禮膳夫王日一舉大荒則不舉注殺牲盛饌曰舉大荒凶年春官司服大荒素服注君臣素服縞冠秋官掌客凡禮賔客凶荒殺禮禮記曲禮嵗凶年穀不登注登成也君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂注皆自為貶損憂民也禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也天子食日少牢朔月太牢諸侯食日特牲朔月少牢除治也不治道為妨民取蔬食也縣樂器鐘磬之屬也粱加食也不樂去琴瑟玉藻年不順成則天子素服乘素車食無樂注自貶損也至于八月不雨君不舉注為旱變也此謂建子之月不雨盡建未月也春秋之義周之春夏無雨未能成災至其秋秀實之時而無雨則雩雩而得之則書雩喜祀有益也雩而不得則書旱明災成也年不順成君衣布搢本闗梁不租山澤列而不賦土功不興大夫不得造車馬注皆為凶年變也君衣布者謂若衞文公大布之衣大帛之冠是也搢本去珽荼佩士笏也士以竹為笏飾本以象闗梁不租此周禮也殷則闗但譏而不征列之言遮列也雖不賦猶為之禁不得非時取也造謂作新也檀弓嵗旱穆公召縣子而問然曰天久不雨吾欲暴尫而奚若注尫者面鄉天覬天哀而雨之曰天則不雨而暴人之疾子虐毋乃不可與然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎注巫主接神亦覬天哀而雨之周禮女巫旱暵則舞雩徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎注徙市者庶人之喪禮今徙市是憂戚于旱若喪漢書文帝本紀四年四月大旱蝗減諸服御宣帝本紀本始四年正月詔曰今嵗不登其令大官損膳省宰元帝本紀初元元年九月詔曰間者隂陽不調黎民饑寒無以保治其令諸宫館希御幸者勿繕治太僕減穀食馬水衡省肉食獸二年三月詔罷黄門乘輿狗馬五年夏四月詔曰迺者闗東連遭災害饑寒疾疫夭不終命其令大官毋日殺所具各減半乗輿秣馬無乏正事而已罷角觝上林宫館希御幸者齊三服宫晉書武帝本紀咸寧五年三月以百姓饑饉減御膳之半成帝本紀咸康二年三月旱詔大官減膳安帝本紀義熙元年三月詔曰自頃國難之後人物彫殘常所供奉猶不改舊豈所以視人如傷禹湯歸過之誠哉可籌量減省宋書孝武帝本紀大明七年八月詔曰炎精損和陽偏不施嵗云不稔咎實朕由大官供膳宜從貶撤明帝本紀泰始元年十二月詔曰久嵗不登公私歉弊方刻意從儉宏濟時艱大官供膳可詳所減撤尚方御府雕文篆刻無益之物一皆蠲省魏書孝文帝本紀太和十一年十一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡大官雜器太僕乗具内庫弓矢出其大半班賚百物及京師士庶下至工商皂𨽻逮于六鎮戍士各有差韓麒麟傳太和十一年京都大饑麒麟表陳時務曰自承平日久豐穣積年競自矜夸遂成侈俗車服第宅奢僣無限喪葬婚娶為費實多貴富之家童妾服工商之族玉食錦衣農夫餔糟糠蠶婦乏裋褐故今耕者日少田有荒蕪穀帛罄于府庫寶貨盈于市里衣食匱于室麗服溢于路饑寒之本實在于斯愚謂凡珍玩之物皆宜禁㫁吉凶之禮備為格式令貴賤有别民歸樸素制天下男女計口受田宰司四時巡行臺使嵗一按檢勤相勸課嚴加賞罰數年之中必有盈贍雖遇災凶免于流亡矣宣武帝本紀延昌元年四月帝以旱故減膳文獻通考隋開皇十四年闗中大旱民饑上遣左右視民食得豆屑雜糠以獻為之流涕不御酒殆將一朞唐書太宗本紀貞觀元年十月以嵗饑減膳册府元龜貞觀三年四月以旱甚避正殿十一年七月詔以水災諸司供進悉令減省凡在供役量事停廢十七年六月以旱不視朝詔曰政慙稽古誠闕動天和氣愆于隂陽亢旱涉于春夏靡愛斯牲莫降雲雨之澤詳思厥咎在予一人今避兹正殿以自尅責尚食常膳亦宜量減顯慶元年二月上封人奏稱去嵗粟麥不登百姓有食糟糠者帝命取所食視之驚歎手詔曰上封人所進食極惡情之憂灼中宵輟寐永言給足取愧良深豈下乏常供上甘珍饌宜令所司常進之食三分減二上元二年四月久旱避正殿減膳唐書髙宗本紀儀鳯三年四月以旱避正殿舊唐書髙宗本紀永淳元年正月乙未朔以年饑罷朝㑹唐書中宗本紀神龍二年十二月京師旱河北水減膳睿宗本紀先天二年二月以雨霖避正殿減膳元宗本紀開元三年五月以旱避正殿減膳冊府元龜開元六年七月帝以亢旱不御正殿于小殿視事唐書𤣥宗本紀七年閏七月以旱避正殿減膳徳宗本紀貞元元年八月以旱避正殿減膳舊唐書徳宗本紀貞元二年春正月壬辰朔以嵗饑罷元㑹禮丙申詔以民饑御膳之費減半宫人月共糧米都一千五百石飛龍馬減半料八年八月詔以嵗凶罷九月賜宴十五年二月罷中和節宴㑹年凶故也癸卯罷三月羣臣宴賞嵗饑也二十年二月丙午朔罷中和節宴嵗儉也冊府元龜太和七年閏七月詔曰時澤未降朕當避正殿減供膳飛龍廄馬量減食粟其百司官署厨饌亦且權減唐書昭宣帝本紀天祐二年四月以旱避正殿減膳宋史真宗本紀大中祥符七年八月以旱罷秋宴九月以不雨罷重陽宴仁宗本紀慶歴八年八月以河北京東西水災罷秋宴皇祐元年正月以河北水災罷上元張燈二年正月以嵗饑罷上元觀燈食貨志仁宗英宗一遇災變則避朝變服損膳徹樂哲宗本紀元祐二年四月詔冬夏旱暵海内被災者廣避殿減膳責躬思過以圖消復髙宗本紀紹興五年六月以久旱減膳孝宗本紀淳熙八年十一月以旱傷罷喜雪宴寧宗本紀嘉定二年十一月以嵗飢罷雪宴金史章宗本紀泰和四年夏四月以久旱下詔責躬求直言避正殿減膳省御廄馬宣宗本紀貞祐四年七月以旱蝗敕減尚食數品及後官嵗給縑帛有差明史憲宗本紀成化元年五月大雨雹避正殿減膳孝宗本紀宏治六年十月以災傷罷明年上元燈火穆宗本紀隆慶元年六月以霪雨脩省素服避殿御皇極門視事莊烈帝本紀崇禎二年六月以久旱齋居文華殿三年四月以久旱齋居文華殿右𤯝禮周禮地官大司徒八曰殺哀注殺哀謂省凶禮禮疏謂凶禮之中殺其數劉氏彛曰國之哀戚必有重禮以將其誠以斯民之困殍有所不能備則殺哀之政行焉髙氏愈曰凡喪紀之節一皆減損後漢書章帝本紀建初二年春三月辛丑詔曰比年隂陽不調饑饉屢臻今貴戚近親奢縦無度嫁娶送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公並宜明糾非法宣振威風右殺哀周禮地官大司徒九曰蕃樂注杜子春讀蕃樂為藩樂謂閉蔵樂器而不作鄭氏鍔曰先儒謂蕃樂者蕃當為藩有閉止之義凶荒則宜止樂而不作大司樂於大扎則令弛縣其意一也髙氏愈曰荒嵗不樂憂民之憂也春官大司樂大凶令弛縣注凶凶年也弛釋下之若今休兵鼔之為漢書宣帝本紀本始四年正月詔曰今嵗不登令樂府減樂人使歸就農業後漢書安帝本紀永初四年春正月元日㑹徹樂不設充庭車注以年饑故不陳魏書宣武帝本紀延昌元年四月帝以旱撤懸唐書髙宗本紀上元二年四月以旱撤樂舊唐書中宗本紀神龍二年十二月京師亢旱令撤樂唐書𤣥宗本紀開元七年閏七月以旱徹樂冊府元龜太和七年閏七月詔曰時澤未降太常教坊聲樂權停閱習宋史仁宗本紀皇祐元年正月以河北水災罷上元張燈停作樂金史章宗本紀泰和四年四月以久旱徹樂右蕃樂周禮地官大司徒十曰多昏注鄭司農云多昏不備禮而娶昏者多也劉氏彛曰昏必用六禮禮以荒而不可備時雖荒而不可失也故多昏之政行焉史氏浩曰古者國有凶荒則殺禮而多昏㑹男女之無夫家者所以育人民髙氏愈曰匹夫匹婦不能自保殺禮而多昏使民自相保右多昏五禮通考卷二百四十九
