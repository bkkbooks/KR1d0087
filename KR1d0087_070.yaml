body:
  text: 五禮通考卷六十刑部尚書秦蕙田撰吉禮六十宗廟制度儀禮士冠禮筮于庿門注冠必筮日于廟門者重以成人之禮成子孫也廟謂禰廟乃宿賔厥明夕為期于廟門之外賔立于外門之外注外門大門外主人迎出門左與賔揖先入每曲揖注周左宗廟入外門將東曲揖直廟將北曲又揖揖疏言此皆欲見入大門東向入廟云入外門將東曲者主人在南賔在北俱向東是一曲故一揖也至庿南主人在東北靣賔在西北靣是曲為二揖故云直庿將北曲又揖也通下將入廟又揖三也至于廟門聘禮公皮辨迎賔于大門內賔入門左公揖入每門每曲揖及廟門公揖入疏諸侯三門皋應路則應門為中門左宗廟入大門東行即至廟門其間得有每門者諸侯有五廟太祖之廟居中二昭居東二穆居西廟皆别門門外兩邊皆有南北隔墻隔墻中夾通門若然祖廟已西隔墻有三則閣門亦有三東行經三門乃至太祖廟門中則相逼入門則相逺是以每門皆有曲有曲即相揖故每曲揖也是以司儀亦云每門止一相亦據閣門而言也蕙田案諸侯三門庫雉路無皋應疏謂諸侯三門皋應路者非也朱子儀禮釋宫宫室之名制不盡見于經其可考者宫必南鄉廟在寢東皆有堂有門其外有大門周禮建國之神位左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北蓋直寢故士喪禮注以寢門為內門中門凡既入外門其向廟也皆曲而東行又曲而北案士冠禮賔立于外門之外主人迎賔入每曲揖至于廟門是也又案聘禮公迎賔于大門內每門每曲揖及廟門大夫三廟其牆與門亦然故賔問大夫大夫迎賔入亦每門每曲揖乃及廟門其説當考大夫士之門惟外門內門而已諸侯則三天子則五庠序則惟一門鄉飲酒射禮主人迎賔于門外入門即三揖至階是也蕙田案以上門士冠禮主人即位于門東西面注主人即位于禰廟門外東西面立以待筮事也有司如主人服即位于西方東面北上注主人有司立位于廟門外西方東面以待事也燕禮卿大夫皆入門右注凡入門而右由闑左則由闑西周禮考工記廟門容大扃七個注大扃牛鼎之扃長三尺每扃為一個七個二丈一尺爾雅釋宫閍謂之門注詩曰祝祭于祊名疏李巡曰閍廟門儀禮士冠禮布席于門中闑西閾外西面注闑門橛也古文闑為𣙗名疏闑一橛也聘禮記擯者立于閾外以相拜爾雅釋宫樞謂之椳注門户扉樞曰疏樞者門扉開合之所由易樞機之發是也闔謂之扉注公羊傳曰齒著于門闔扉疏李巡曰闔門扇也一名陳氏禮書爾雅柣謂之閾棖謂之楔樞謂之椳樞達北方謂之落時門持樞者或達北以為固落時謂之􅩖樴謂之杙在地謂之臬又曰橛謂之闑楣謂之梁蓋界于門者榍也亦曰柣曰閾中于門者閫也亦曰闑曰橛旁于門者楔也亦曰棖所以開闔者樞也亦曰椳樞上之橫梁楣也樞達北棟落時也月令曰以修闔扇爾雅闔謂之扉公羊曰齒著于門闔左氏以枚數闔越語曰乃闔左闔荀卿曰子貢觀于魯廟之北堂復瞻九蓋彼皆繼耶蓋即闥也則扇也闔也扉也其實一也鄭氏釋月令謂木曰闔竹葦曰扇蓋對而言之然也禮君入中門上介拂闑大夫中棖與闑之間士介拂棖入以自高為戒故賔不履閾君入中門諸侯相朝之禮也賔不入中門諸侯來聘之禮也凡入門而右由闑東左由闑西曲禮曰大夫士出入君門由闑右燕禮大夫皆入門右臣統于君也聘禮賔入門左賔伉于主也聘公事也故入門而左所以致敬覿面私事也故入門而右所以致親朱子釋宫門之內外東方曰門東西方曰門西特牲饋食禮注曰凡鄉內以入為左右鄉外以出為左右士冠禮注又曰出以東為左入以東為右以入為左右則門西為左門東為右鄉飲酒禮賔入門左燕禮卿大夫皆入門右是也以出為左右則門東為左門西為右士冠禮主人迎賔出門左西面士虞禮側享于廟門之右是也闑東曰闑右亦自入者言之也中門屋為門門之中有闑士冠禮曰席于門中闑西閾外注曰闑橛也玉藻正義曰闑門之中央所豎短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也然則闑者門中所豎短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰柣謂之閾郭氏曰閾門限邢昺曰謂門下橫木為內外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹案士昏禮曰納徴儷皮記曰執皮左首隨入注曰隨入為門中厄狹賈氏曰皮皆橫執之門中厄狹故隨入也匠人云廟門容大扃七個大扃牛鼎之扃長三尺七個二丈一尺彼天子廟門此士之廟門降殺甚小故云厄狹也推此則自士以上宫室之制雖同而其廣狹則異矣四書大全汪氏份曰門以向堂為正自外而言東扉實為右扉西扉則左扉也君臣出入恆由右扉則固就東扉而言矣右扉左扉此東彼西原有定所饒氏謂出則以東扉為左入則以西扉為左是謂左右扉無定所也其為麟士所駁宜矣但麟士謂由闑右非不中門正解則非也燕禮注云凡入門而右由闑東左則由闑西所謂入門而右入右扉也所謂由闑東者拂闑之東而行即不中門之謂也陸稼書疑由闑右即拂闑之義而不敢遽定麟士以為非何也麟士又引玉藻介拂闑士介拂棖為不中門之證亦非也玉藻所言乃兩君相見若擯介者隨君而入如此與平時入公門之禮不同若如麟士之言則介拂闑之下所謂大夫中棖與闑之間者豈大夫獨當中門耶蕙田案古人門制兩旁有棖中間有闑棖闑之間為中門棖者門之兩旁長木闑則兩扉相合處有一木常設而不動者門以向堂為正故闑東為右闑西為左東為主位西為賔位闑東主所出入闑西賔所出入曲禮主人入門而右就東階賔入門而左就西階是也臣子在本國則出入皆由闑東曲禮謂士大夫出入君門由闑右燕禮卿大夫皆入門右是也若聘于他國則玉藻謂公事自闑西私事自闑東公事聘享用賔禮私事覿面從臣禮也東西兩扉各有中君出入由東扉之中玉藻閏月則闔門左扉立于其中臣子不敢當尊鄉黨立不中門曲禮為人子者立不中門此東扉之中也兩君相見則賔由西扉之中臣為賔則否玉藻賔入不中門此西扉之中也饒雙峰謂君出入則皆由左出則以東扉為左入則以西扉為左士大夫出入君門則皆由右出以闑西為右入以闑東為右郝仲輿謂闑東西自定左右隨身出入君自內南面東出由闑左入由右亦闑左也臣自外北面東入為闑右出由西亦闑右也入由闑西則疑于為賔出由闑東則疑于為主故不敢也今案二説皆誤曲禮言闑右燕禮言門右據門闑為左右則左右皆有定所未聞隨身出入為左右也賔主有闑東闑西之分君臣但有中門不中門之分未聞君左臣右之説也君臣常時出入皆在闑東未聞為君者東出西入為臣者東入西出也曰入由闑西則疑于為賔是矣曰出由闑東則疑于為主夫不敢疑于主反儼然疑于賔矣入不敢為賔而出乃敢為賔有是理乎總由不知東西但别賔主而不别君臣左右有定所而不隨身之出入故為此交互紛錯之説耳至人臣出入由闑右既不敢當中即當稍近闑而行陸稼書謂由闑右即拂闑之義甚允玉藻大夫中棖與闑之間士介拂棖蓋大夫士與上介雁行于後不敢相沿乃兩君相見之儀非常時出入之儀也又案以上門東西左右周禮考工記闈門容小扃參個注廟中之門曰闈小扃腳鼎之扃長二尺參個六尺禮記雜記如三年之喪則君夫人歸夫人至入自闈門升自側階儀禮士冠禮冠者降自西階適東壁北面見于母注適東壁者出闈門也時母在闈門之外婦人入廟由闈門冠者降自西階適東壁逸雅壁辟也辟禦風寒也萬氏斯大曰東壁東堂下何以知之特牲禮主婦視饎爨於西堂下記又云饎爨在西壁特牲一禮饎爨無兩既云西堂下復云西壁則西堂下即西壁矣然則東壁非東堂下乎鄭注冠者適東壁見母為出闈門且云時母在闈門之外婦人入廟由闈門非惟于解不明抑亦乖古人左祖之制鄉飲酒記俎由東壁自西階升郝氏敬曰東壁東側室烹狗于東北熟而實之于俎故自東壁出由西階升堂也士虞禮饎爨在東壁士喪禮為垼于西牆下特牲饋食禮主婦視饎爨于西堂下饋食禮記饎爨在西壁注西壁堂之西牆下周禮考工記牆厚三尺崇三之林氏希逸曰凡牆之厚若有三尺則其高至九尺而止舉其大槩以為凖高厚可以是推也爾雅釋宫牆謂之墉逸雅釋宫室牆障也所以自障蔽也陳氏禮書爾雅曰牆謂之墉詩曰崇墉言言易曰乘其墉則墉牆之高者也儀禮于房室言墉士冠禮陳服于房中西墉下大射西夾六豆設于西墉下既夕記士東首于北墉下于堂下言壁牆之卑者也鄉飲酒俎由東壁自西階升士虞禮饎爨在東壁特牲禮饎爨在西壁士冠禮冠者降自東階適東壁書有東序西序爾雅曰東西牆謂之序則序堂上之東西牆也詩曰之子于垣百堵皆作書曰既勤垣墉春秋傳曰子産使盡壞其館之垣納車馬焉則垣宫室之外牆也考工記曰牆厚三尺崇三之則牆者垣墉之總名與朱子釋宫自門以北皆周以牆聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邊牆以出柩也士喪禮為垼于西牆下注曰西牆中庭之西特牲饋食禮主婦視饎爨于西堂下記曰饎爨在西壁注曰西壁堂之西牆下案門之西有牆則牆屬于門矣西牆在中庭之西則牆周乎庭矣西壁在西牆下則牆周乎堂矣牆者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂墉堂下謂之壁謂之牆其實一也隨所在而異其名爾堂下之壁闈門在焉案士冠禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賔出主人送主婦亦拜賔注曰女賔也不言出不言送拜之于闈門之內闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也蕙田案以上闈門牆垣儀禮士冠禮筮與席所卦者具饌于西孰注西孰門外西堂也疏筮在門外故知西孰門外西堂也擯者玄端負東孰注東孰門內東堂負之北面疏擯者是主人擯相事在門內故知在門內東堂負之北面向主人也敖氏繼公曰東孰西孰其北蓋與東西堂相對而廣亦如之立于孰北而云負則孰之崇其過於堂與士之堂崇三尺士喪禮陳一鼎于寢門外當東孰少南西面士虞禮七俎在西孰之西羞燔俎在內西孰書顧命先輅在左孰之前次輅在右孰之前傳先輅次輅皆在路寢門內左右孰前北面左疏孰前陳車必以轅向堂故知左右孰前皆北面也孰者謂門內之西右孰者門內之東故以北面言之為左右所陳坐位器物皆以西為上由王殯在西序故也其執兵宿衛之人則先東而後西者以王在東宿衛敬新王故也顧氏云先輅在左孰之前在寢門內之西北面對玉輅次輅在右孰之前在寢門內之東對金輅也爾雅釋宫門側之堂謂之孰注夾門堂也西疏門側之堂夾門東者名孰朱子釋宫夾門之堂謂之孰釋宫曰門側之堂謂之孰郭氏曰夾門堂也門之內外其東西皆有孰一門而孰四其外南鄉案士虞禮陳鼎門外之右匕俎在西孰之西注曰孰有西者是室南鄉又案士冠禮擯者負東孰注曰東孰門內東堂負之北靣則內孰北向也凡門之內兩孰之間謂之寧案聘禮賔問卿大夫迎于外門外及廟門大夫揖入擯者請命賔入三揖並行注曰大夫揖入者省內事也既而俟于寧也凡至門內霤為三揖之始上言揖入下言揖並行則俟于霤南門內兩孰間可知矣李巡曰寧正門內兩孰間義與鄭同謂之寧者以人君門外有正朝視朝則于此寧立故耳周人門與堂修廣之數不著于經案匠人云夏后氏世室堂修二七廣四修一堂修謂堂南北之深其廣則益以四分修之一也門堂三之二室三之一門堂通謂門與孰其廣與修取數于堂門得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺于堂之數亦可得而知矣陳氏禮書尚書大傳上老平明坐于右孰庶老坐于左孰食貨志亦曰里胥平旦坐于右孰鄰長坐于左孰書言先路在左孰之前次路在右孰之前先路象路也次路木路也象路貴于木路則左孰者東孰也里胥尊于鄰長而在右孰則右孰者西孰也何則自內視外則左東而右西自外視內則左西而右東曲禮曰主人入門而右客入門而左此左西而右東也玉藻曰公事自闑西私事自闑東此左東而右西也然則書言左孰史言右孰皆西孰也自內外言之異耳蕙田案爾雅門側之堂謂之孰邢疏門側之堂夾門東西者名孰顧命先輅在左孰之前次輅在右孰之前孔疏左孰者門內之西右孰者門內之東蓋門堂北面故以西孰為左孰東孰為右孰自天子五門至大夫士二門皆有之尚書大傳上老平明坐于右孰庶老坐于左孰漢書食貨志里胥平旦坐于右孰鄰長坐于左孰此係里門之孰分南北不分東西陳用之謂史之右孰係西孰者非是又引玉藻公事自闑西私事自闑東證左東而右西亦非是闑東主所出入為右闑西賔所出入為左曲禮士大夫出入君門由闑右主人入門而右客入門而左是也公事用賔禮故自闑東私事從臣禮故自闑西非左東而右西也吳氏紱曰士虞禮羞燔俎在內西孰上南順則孰之有內外東西易明也但其堂與室未知如何位置耳或云棟之下為壁隔斷內外各以其一為孰近壁一半為室近簷一半為堂而皆無户牖如房與北堂之制然月令疏謂祀竈祀門祀行皆在廟門外先設席于廟門之奧門亦有奧則似非無户牖者矣蕙田案吳氏之説近是考工記門堂三之一室三之一注兩室與門各居一分既名為室則其户牖雖不可知而其制度必有異于堂者矣又案以上孰儀禮燕禮賔所執脯以賜鐘人于門內霤郝氏敬曰內霤門內簷下禮記雜記禭者降受爵于門內霤蕙田案以上門內霤右廟門之制儀禮鄉射禮司正實觶降自西階中庭楅乃設楅于中庭南當洗大射禮司正設洗洗角觶南面坐奠于中庭疏燕禮及此射禮司正不以觶升而奠之于地比鄉飲酒又鄉射為顯聘禮公揖入立于中庭擯者退中庭宰夫受幣于中庭以東設于中庭十以為列注庭實固當中庭言當中庭者南北之中也言中庭則設碑近如堂深也南疏上享時直言庭入室不言中庭則在東西之中其北三分庭一在南此更言中庭欲明南北之中也上文公立于中庭宰受幣于中庭皆南北之中也大夫降中庭注大夫降出言中庭者為賔降節也云疏大夫授擯圭訖降自西階將出門至中庭不止今大夫降出中庭者大夫至中庭賔乃降故鄭云為賔降節也士喪禮主人進中庭弔者致命甸人置重于中庭三分庭一在南有禭者賔入中庭北面致命宵為燎于中庭特牲饋食禮佐食北面立于中庭朱子釋宫堂下至門謂之庭三分庭一在北設碑聘禮注曰宫必有碑所以識日景知隂陽也賈氏釋士昏禮曰碑在堂下三分庭一在北案聘禮歸饔餼醯醢夾碑米設于中庭注曰庭實固當庭中言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂亷北至房室之壁三分庭一在北設碑而碑如堂深則庭蓋三堂之深也又案鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣蕙田案以上中庭門之內堂之下也禮記祭義君牽牲入廟門麗于碑注麗猶繫也繫疏君牽牲入廟門著中庭碑也王甫云以紖貫碑中君從此待之也儀禮聘禮當碑南陳注宫必有碑所以識日景引陰陽也凡碑引物者宗廟則麗牲焉以取毛血其材宫廟以石窆用木曲疏宫必有碑者案諸經云三揖者鄭注皆云入門將揖既曲北面揖當碑揖若然士昏及此聘禮是大夫士廟內皆有碑矣鄉飲酒鄉射言三揖則庠序之內亦有碑矣祭義云君牽牲麗于碑則諸侯廟內有碑明矣天子廟及庠序有碑可知但生人寢內不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者周禮匠人云為規識日出之景與日入之景者自是正東西南北此識日景惟可觀碑景邪正以知日之早晚也又云引陰陽者又觀碑景南北長短十一月日南至景南北最長隂盛也五月日北至景南北最短陽盛也二至之間景之盈縮隂陽進退可知也云凡碑引物者宗廟則麗牲焉以取毛血者云凡碑引物則識日景引陰陽皆是引物則宗廟之中是引物但廟碑又有麗牲麗繫也案祭義云君牽牲麗于碑以其鸞刀以取血毛毛以告純血以告殺兼為此事也云其材宫廟以石窆用木者此雖無正文以義言之葬碑取縣繩繂暫時之間往來運載當用木而已其宫廟之碑取其妙好又須久長用石為之理勝于木故云宫廟以石窆用木也是以檀弓云公室視豐碑三家視桓楹時魯與大夫皆僭言視桓楹桓楹宫廟兩楹之柱醯醢百甕夾碑十以為列賔自碑內聽命賔降自碑內公食大夫禮陳鼎于碑南庶羞陳于碑內庭實陳于碑外陳氏禮書公食大夫禮庶羞陳于碑內庭實陳于碑外燕禮賔自碑內聽命聘禮醯醢百甕夾碑十分以為列賔自碑內聽命祭義曰君牽牲入于廟門麗于碑士昏禮賔入廟門鄉飲酒賔入庠門鄉射賔入序門皆三揖至于階而三揖之中有當碑揖則諸侯大夫士之宫皆有碑矣鄭氏曰宫必有碑所以識日景引陰陽也凡碑引物者宗廟則麗牲焉其材宫室以石窆用木禮天子之窆豐碑諸侯桓楹大夫二碑士無碑喪大記魯之季也公室視豐碑三家視桓楹鄭氏曰豐碑斫大木為之形如石碑于椁前後四角植之穿中于間為鹿盧天子四碑前後各重鹿盧也桓楹斫之如大楹耳四植謂之桓窆碑如桓楹則宫室碑制可知蕙田案以上碑朱子論庭之深以碑為節則碑固宜屬于庭也詩小雅何人斯胡逝我陳傳陳堂塗也堂箋堂塗者公館之塗也陳風防有鵲巢中唐有甓傳中中庭也唐堂塗也甓瓴甋也疏以堂是門內之路故知中是中庭李巡曰唐廟中路名孫炎引詩云中唐有甓堂塗堂下至門之徑也然則唐之與陳廟庭之異名耳其實一也故云唐堂塗也爾雅釋宫廟中路謂之唐注詩曰中唐有甓堂塗謂之陳注堂下至門徑也徑疏堂下至門名陳陳氏禮書詩曰不入我陳又曰中唐有甓爾雅曰廟中路謂之唐堂塗謂之陳唐與陳皆堂下至門之徑特廟堂異其名耳考工記曰堂塗十有二分鄭氏曰階前若今令辟械也分其督旁之修以二分為峻蓋令辟即甓也械其道也中央為督峻其督所以去水朱子釋宫堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門內霤凡入門之後皆三揖至階昏禮注曰三揖者至內霤將曲揖既曲北面揖當碑揖賈氏曰至內霤將曲者至門內霤主人將東賔將西賔主相背時也既曲北面者賔主各至堂塗北行向堂時也至內霤而東西行趨堂塗則堂塗接于霤矣既至堂塗北面至階而不復有曲則堂塗直階矣又案聘禮饔鼎設于西階前陪鼎當內廉注曰辟堂塗也則堂塗在階廉之內矣鄉飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂塗也蕙田案以上堂塗由門上堂之路朱子曰其北屬階則堂塗當下接兩階矣儀禮少牢饋食禮祝盥于洗升自西階主人盥升自阼階士昏禮舅姑共享婦舅姑先降自西階婦降自阼階注授之室使為主明代已書顧命大輅在賔階面綴輅在阼階面傳面前皆南向禮記曲禮主人就東階客就西階書顧命夾兩階戺傳堂亷為戺所疏堂廉曰戺相傳為然亷者稜也立在堂下迎于堂亷儀禮鄉飲酒禮設席于堂亷東上注側邊曰亷燕禮曰席工于西階上少東樂正先升北面此言樂正先升立于西階東則工席在階東聘禮陪鼎當內廉注當內廉辟堂塗也書顧命一人冕執戣立于東垂一人冕執瞿立于西垂傳戣瞿皆戟屬立于東西堂之階上而疏釋詁云疆界邊衛圉垂也則垂是逺外之名堂上立東垂西垂知左堂上之逺地堂于序外東廂西廂必有階上堂知此立于東西堂之階上也朱子釋宫升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賔客也每階有東西兩廉聘禮饔鼎設于西階前當內廉此則西階之東廉以其近堂之中故曰內廉也士之階三等案士冠禮降三等受爵辨注曰下至也賈氏曰匠人云天子之堂九尺賈氏以為階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序案鄉射禮升階者升自西階繞楹而東燕禮媵爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攢置于西序而檀弓曰周人殯于西階之上故知階近序也堂之側邊曰堂廉鄉飲酒禮設席于堂廉注曰側邊曰廉喪大記正義曰堂廉堂基南畔廉稜之上也又案鄉射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也陳氏禮書書曰四人執戈夾兩階戺鄉飲酒設工席于堂廉聘禮陪鼎當內廉鄭氏曰側邊曰廉孔安國曰堂亷曰戺又曰書曰一人執戣立于東垂一人執瞿立于西垂史曰坐不垂堂孔安國曰東西垂者東西下之階上蕙田案以上阼階賔階堂廉戺垂右中庭碑堂塗階戺堂廉垂禮記郊特牲詔祝于室坐尸于堂禮器室事交乎戶堂事交乎階天子之堂九尺諸侯七尺大夫五尺士三尺疏天子堂九尺此周法也案考工記殷人重屋堂崇三尺鄭差之云夏高一尺故知此九尺者周制也朱子釋宫堂之屋南北五架中脊之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰庪賈氏曰中脊為棟棟前一架為楣楣前接簷為庪今見于經者惟棟與楣而已棟一名阿案士昏禮賔升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賔升皆當楣此深入當棟故云入堂深也又案聘禮賔升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異耳後楣以北為室與房後楣以下以南為堂以北為室與房室與房東西相連為之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架棟北楣下為室南壁而開户以兩架之間為室故云迫狹也昏禮賔當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室案鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賔南面注曰不言于戶牖之間者此射于序賈氏曰無室則無户牖故也釋宫曰無室曰榭即序也殿屋夏屋説殿屋五間前皆為堂後為房室中間之前為兩楹間後為室東間之前為東楹之東又少東為阼階上少北為東序後為東房西間之前為西楹之西又少西為賔階上少北為西序後為西房序即牆也設位在東西序者負牆而立也其南為序端東序之東西序之西為夾亦謂之廂又説文云廂廊也廊東西序也此亦可見但疑序下脫一外字其前為東西堂其後為東西夾室夾外之廉為側階房後為北階此其地之盤也其棟則中三間為一棟橫指東西至兩序之上而盡遂自此處分為四棟邪指四隅上接橫棟下與霤齊此其上棟之制所謂四阿也其宇則橫棟前後即為南北兩下橫棟盡外即為東西兩下四棟之旁即各連所向而下四面榱桷覆堂廉出階外者謂之廡説文云廡堂下周屋也其屋盡水下處謂之霤此其下宇之制也厦屋則前五間後四間無西房堂中三間之後只分為兩間東房西室其餘並如殿屋之制但五間皆為橫棟棟之前後皆為兩下之宇橫棟盡外有版下垂謂之摶風摶風之下亦為兩廡接連南北以覆側階但其廡亦不出摶風之外耳儀禮疏云卿大夫為夏屋其室兩下而四周之殿屋四阿連下為廡四面之簷其水皆多故其簷皆得以霤為名厦屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但為腰簷不連棟下又不出摶風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名疏乃直指摶風誤矣蕙田案朱子謂夏屋前四間後五間是仍鄭氏無西房之説也前五後四何以成堂宇之制耶詳見後條陳氏禮書天子諸侯之寢廟四阿有霤士大夫則五架有榮而已五架之制棟居中而南北薦簷曰庪棟庪之間曰楣昏禮賔升當阿致命阿棟也則是大夫士之廟室設于棟北矣少牢禮主人獻祝設席南面祝拜于席上則是大夫士之廟室迫狹矣爾雅曰無東西廂有室曰寢其文對廟言之則廟寢也鄭氏謂天子路寢太廟明堂同制豈非惑于明堂位太廟天子明堂之説乎所謂太廟天子明堂者蓋其崇其飾與明堂同非必五室四門一如明堂也不然書言路寢詳矣而無是制何耶蕙田案以上總論廟屋堂室儀禮士昏禮尊于室中北墉下夫入于室即席士喪禮親者在室婦人髽于室既夕記室中惟主人主婦坐少牢饋食禮主人室中獻祝祝拜于席上周禮考工記庭中度以几禮記曲禮室中不翔注為其迫也朱子語類李丈問太廟堂室之制曰古制是不可曉禮説士堂後一架為室蓋甚窄天子便待加得五七架亦窄狹不知周家三十以上神主位次相逼如何行禮室在堂後一間從堂內左角為户而入西壁如今牆上為龕太祖居之東向旁兩壁有牖羣昭列于北牖下而南向羣穆列于南牖下而北向堂又不為神位而為人所行禮之地天子設黼扆于其中受諸侯之朝蕙田案朱子以室之制為窄狹信有之然古人之制畢竟與後不同詩于我乎夏屋渠渠渠渠言高也屋高則屋內之棟楣相去自逺而兩楹間尤較廣矣考工記周人明堂度九尺之筵五室凡室二筵則東西當有一丈八尺或太廟之室較明堂更為廣闊未可知也又謂兩壁有牖考室內惟南壁有牖詩宗室牖下是也北則惟有墉而無牖士昏禮尊于室中北墉下是也南牖故明北墉則幽昭穆之義並取于此亦未可定兩牖之説未確又案以上正室堂之北居中一間也儀禮特牲饋食禮主人及祝升祝先入主人從西面于戶內席于户內士昏禮贊户內北面答拜贊洗爵酌于戶外尊入戶西北面奠爵拜婦出祝闔牖户注凡廟無事則閉之疏祭訖先闔牖後閉戶是無事則閉之以其鬼神尚幽閣故也士虞禮贊闔牖戶士虞禮記祝闔牖戶降啓戶主人入祝從啓牖鄉如初注牖先闔後啓扇在內也朱子釋宫室南其戶戶東而牖西説文曰户半門也牖穿壁以木為交窗也月令正義曰古者窟居開其上取明雨因霤之是以後人名室為中霤開牖者象中霤之取明也牖一名鄉其扇在內案士虞禮祝闔牖户如食間啓户啓牖鄉注曰牖先闔後啓扇在內也鄉牖一名是也蕙田案易曰不出户庭又曰闢户之謂乾闔户之謂坤一扉為戶兩扉為門故戶陽而門陰六書精藴戶室之口也凡室之口曰戶堂之口曰門內曰戶外曰門古人堂內為室室東南啓一扉曰戶也戶之制又隨室而移詩西南其户疏謂在北者南户在東者西戶廟之室在堂北南向西有牖故知為東南扉也玉藻君子居恆當戶檀弓當戶而坐注謂當戶向明非是蓋戶開則戶直東南隅之壁尊者居主奧適與戶相對故曰當戶當戶而坐坐于奧也所謂居恆當戶也又案以上室前户牖也儀禮士昏禮媵布席于奧御衽于奧婦奠菜席于廟奧東面右几禮記曲禮居不主奧朱子曰古人室在東南隅開門謂之窔東北隅為宧西北隅為屋漏西南隅為奧人才進便先見東北隅却到西北隅然後到西南隅此是至深密之地朱子釋宫室中西南隅謂之奧邢昺曰室户不當中而近東西南隅最為深隱故謂之奧而祭祀及尊者常處焉詩召南于以奠之宗室牖下朱傳牖下室西南隅所謂奧也蕙田案鄭氏箋牖下在戶外非是今不從大雅抑相在爾室尚不愧于屋漏禮記曾子問凡殤與無後者祭于宗子之家當室之白尊于東房是謂陽厭注當室之白謂西北隅得戶明者也吳氏澄曰孔子曰有陽厭有陰厭陰者室之西南隅謂之奧正當牖下不受牖明屋之隱奧處也以其幽暗故曰陰陽者室之西北隅謂之屋漏正與牖對受牖之明屋之漏光處也又為室之白白光明也以其光明故謂之陽儀禮既夕記掃室聚之窔管子弟子職拚前而退聚于戶內蕙田案戶內窔也掃地自奧而屋漏而宧而窔也爾雅釋宫西南隅謂之奧西北隅謂之屋漏東北隅謂之宧東南隅謂之窔疏此别室中四隅之異名也奧者孫炎云室中隱奧之處也古者為室戶不當中而近東則西南隅最為深隱故謂之奧而祭祀及尊者常處焉屋漏者孫炎云當室之所向日光所漏入也宧者李巡云東北者陽始起育養萬物故曰宧宧養也窔亦隱暗之義也朱子釋宫東南隅謂之窔郭氏曰窔亦隱暗西北隅謂之屋漏詩所謂尚不愧于屋漏是也曾子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得戶明者經止曰西北隅蕙田案窔宧屋漏奧室中四隅也儀禮士冠禮陳服于房中西墉下何氏楷曰房説文云室在旁也崔氏云宫室之制中央為正室正室左右為房將冠者采衣紒在房中南面朱子曰房戶宜當南壁東西之中而將冠者宜在所陳器服之東當户而立也贊者盥于洗西升立于房中西面南上朱子曰贊者西面則負東墉而在將冠者之東矣特牲饋食禮記尊兩壺于房中西墉下南上內賔立于其北東面南上鄉飲酒禮記薦脯五挺橫祭于其上出自左房注在東養也陽主養房饌陳處也特牲饋食禮豆籩鉶在東房鄉射禮薦脯用籩醢以豆出自東房大射儀宰胥薦脯醢由左房注左房東房也人君左右房公食大夫禮記宰夫筵出自東房少牢饋食禮主婦被錫衣侈袂薦自東房士昏禮女次純衣纁袇立于房中南面主人説服于房側尊甒醴于房中饌于房中士昏禮記婦席薦饌于房中蕙田案以上東房亦曰左房聘禮賔受圭退負右房而立疏大夫士直有東房西室天子諸侯左右房今不在大夫廟于正客館故有右房也敖氏繼公曰記曰卿館于大夫而此云負右房則大夫之家亦有左右房明矣吳氏紱曰鄉射記豆籩出自東房特牲豆籩鉶在東房記賔長兄弟之薦自東房如此者非一言左對右言東對西何于天子諸侯則云爾于大夫則不云爾乎經文同而疏解異岐語徒滋眩耳聘禮記若君不見使大夫受自下聽命自西階升受負右房而立禮記祭統君純冕立于阼夫人副褘立于東房疏夫人副褘立東房以俟行事尸既入之後轉就西房故禮器云夫人在房雖不云東西房下云東酌罍尊則知夫人在房謂西房也儀禮士喪禮主婦髽于室疏男子髻髮與免在東房若相對婦人宜髽于西房大夫士無西房故于室內户西皆于隱處為之也禮記喪大記婦人髽帶麻于房中注髽帶麻于房中則西房也天子諸侯左右房禮器廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生于東月生于西此陰陽之分夫婦之位也君西酌犧象夫人東酌罍尊注人君尊東也天子諸侯有左右房上疏罍尊在阼謂夫人所酌也犧尊在西謂君所酌也云罍尊在阼當阼階堂上而設之則犧尊在西當西階堂上而陳之故君于阼階西嚮酌犧尊夫人于西房之前東嚮酌罍尊云天子諸侯有左右房者以士喪禮主婦髽于室在主人西喪大記君之喪婦人髽帶麻于房中亦當在男子之西故彼注亦云則西房又顧命云天子有左右房此云夫人在房又云夫人東酌罍尊是西房也故云天子諸侯有左右房書顧命允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房傳西房西夾坐東東房東廂夾室向疏西序即是西夾西夾之前已有南坐矣西序所陳之寶近在此坐之西知此在西房者在西夾坐東也東夾室無坐故直言東廂夾室陳于夾室之前也案鄭注周禮宗廟路寢制如明堂明堂則五室此路寢得有東房西房者鄭注張逸以此問鄭答云成王崩在鎬京鎬京宫室因文武更不改作故同諸侯之制有左右房也蕙田案以上西房亦曰右房東房西房經有明文疏以為即夾室併房與夾室為一非是東西房在序之內夾室在序之外也朱子釋宫人君左右房大夫士東房西室而已聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然案聘禮賔館于大夫士君使卿還玉于館也賔亦退負右房則大夫亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考陳氏禮書以書考之天子路寢之制室居中左戶右牖東西有房又有東序西序東堂西堂東垂西垂賔階阼階房之南有東西夾室鄭康成釋儀禮謂房當夾室北是也孔安國謂西房西夾室東房東夾室誤矣諸侯路寢與士大夫之室皆東西房士喪禮男子髻髮于房婦人髽于室在男子之西則諸侯之禮婦人髽于房為西房矣士亦有西房而婦不于此髽者尊卑之别然也公食大夫于廟宰夫饌于東房贊者負東房大夫立于東夾南宰東夾北則諸侯之廟亦東西房東西夾矣少牢禮司宫尊兩甒于房户之間士冠鄉飲亦尊于房戶之間特牲禮尊于戶東皆指東房言之非謂無西房也鄉飲記曰薦出自左房鄉射記曰出自東與大射諸侯擇士之宫宰胥薦脯醢由左房其言相類蓋言左以有右言東以有西則大夫之房室與天子諸侯同可知鄭氏謂大夫士無西房誤矣然房皆南户而無北墉室有北墉而無北堂則房户之外由半以南謂之堂其內由半以北亦謂之堂昏禮尊于房户之東是房有南户矣禮大射羞膳者升自北階立于房中而不言入户是房無北墉矣昏禮尊于室中北墉下是室無北堂矣故昏禮洗在北堂直室東隅則北堂在房之北可知萬氏斯大曰鄉飲酒禮席次第云乃席賔主人介衆賔之位皆不屬焉不詳何方何鄉當于鄉飲酒義及鄉射禮考之義曰坐賔于西北坐介于西南主人坐于東南坐僎于東北此言其方也又曰賔必南鄉介必東鄉主人坐于東方此言其鄉也鄉射禮曰賔南面衆賔之席繼而西主人阼階上面西略著其方與鄉也鄭本此二者注飲酒云賔席牖前南面主人席阼階上西面介席西階上東面衆賔席于賔席之西其方其嚮各得其正但古人房室在堂之北鄭謂惟天子諸侯有左右房大夫士東房西室無右房若是則賔席牖前固當西北矣然而實逼西序牆也席西餘地無幾何能容衆賔之席陳用之云鄉飲禮薦脯出自左房鄉射籩豆出自東房大射宰胥薦脯醢由左房夫鄉射大夫禮大射諸侯禮其言相類蓋言左以有右言東以有西則大夫士房室與諸侯同可知如其言則賔席之西得容衆賔之席乃得其解矣蕙田案鄭康成謂天子諸侯左右房大夫士東房西室而無右房陳用之萬斯大皆主士大夫有東西房之説夫天子諸侯臺門兩觀大夫士無之此尊卑之差若如右房無之不為卑有之不為僭而何必無之且吉凶之禮多行于戶牖之間以其為堂之正中也設若果無西房則户牖之前乃堂之西偏而非正中矣豈有行冠昏諸大禮不在于正中而在旁側者哉況堂上則有東西楹堂下則有東西階門側則有東西孰皆取其規制之正耳若無西房則無西楹并無西階矣士喪禮弔者入升自西階有大賔則特拜之即位于西階下何以解之且有西房而後兩階之中為中庭西階之下為中庭西士喪禮甸人掘坎于階間少西為垼于西牆下注中庭之西若無西房則中庭以何者為中而又何有中庭之西耶士喪禮皆饌于西序下若無西房則西序之前即正堂之前矣正室之前為堂方是時衆婦人戶外北面注婦人户外堂上且君使人弔君使人禭皆在堂上行事何地可容貝以下之諸饌乎竹扛長四尺置于宇西階上既無西房則宇西階上何地種種皆不可解豈復成其規制乎哉蓋西房之名不多見于禮經者禮東為主位西為賔位故主人主婦薦自左房而賔受享自西階升受負右房而立主禮之及于房中者多而賔禮之及于房中者少故略而不及耳大射儀及鄉飲酒記言左房注疏以為即東房聘禮賔受圭退負右房而立則右房是西房也賈疏謂于正客館故有右房敖君善謂卿館于大夫而此云負右房則大夫之家亦有左右房明矣證佐最明至郝仲輿又泥大夫無西房之説謂此右房即東房言右房者升堂以東為右注疏謂西房誤也案郝于釋左房處既謂之東房此釋右房處又謂之東房是一東房而兼左右兩名有是理乎郝仲輿又謂堂後為室室西深入為奧是堂之西北也故西不復得有房案爾雅奧屋漏宧窔俱室中四隅之名故西南隅謂之奧未聞堂之西北為奧也邢疏古者為室户不當中而近東則西南隅最為深隱故謂之奧今以室西深入為奧而旁侵堂西北之地是未明乎室之制但在堂北中央而奧之位止在室之西南隅也其誤甚矣又案以上左右房接于正室兩邊者也儀禮特牲饋食禮記宗婦北堂東面北上注北堂中房而北疏謂房中半以北為北堂也士昏禮記婦洗在北堂直室東隅篚在東北面盥注洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房戶與隅間疏房與室相連為之房無北壁故得北堂之名故云洗在北堂也云北堂房半以北者以其南堂是户外半以南得堂名則堂是户外之稱則知此房半以北得堂名也知房無北户者見上文云尊于房户之東房有南户矣燕禮大射皆云羞膳者升自北階立于房中不言入房是無北壁而無户是以得設洗直室東隅也云洗南北直室東隅者是南北節也云東西直房戶與隅間者是東西節也有司徹酌致爵于主婦主婦北堂大射儀工人士與梓人升自北階卒畫自北階下司宫掃所畫物自北階下注工人士梓人司宫位在北堂下疏南方不見有其位其人升降自北階明位在北堂下也郝氏敬曰北階堂後階乃命執幕者執幕者升自西階立于尊南北面東上注羞膳者由堂東升自北階立于房西面南上不言命者不升堂略之朱子釋宫房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連為之房無北壁故得北堂之名案特牲饋食禮記尊兩壺于房中西墉下南上內賔立于其北東面南上宗婦北堂北上內賔在宗婦之北乃云北堂又婦洗在北堂而直室東隅是房中半以北為北堂也婦洗在北堂而士虞禮主婦洗足爵于房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也蕙田案以上房內北堂儀禮所載皆主東房為之蓋主人主婦位在東也詩衛風焉得喧草言樹之背傳背北堂也疏背者向北之義豈男子居恆常在奧而婦人常在北堂歟北階即北堂之階其西房之制不可考矣又案以上東房西房儀禮聘禮西夾六豆設于西墉下北上六壺西上二以並東陳注東陳在北墉下饌于東方亦如之注東方東夾室堂上之饌八西夾六注八六者豆數也公食大夫禮大夫立于東夾南宰東夾北禮記雜記成廟則釁之門夾室皆用雞先門而後夾室割雞門當門夾室中室疏門廟門也夾室東西廂也內則大夫七十而有閣天子之閣左達五右達五公侯伯于房中五大夫于閣三注閣以板為之庋食物也達夾室大夫言于閣與天子同文序疏宫室之制中央為正室正室左右為房房外有序外有夾室天子尊庖厨逺故左夾室五閣右夾室五閣諸侯卑庖厨宜稍近故降于天子惟在一房之中而五閣也大夫既卑無嫌故亦于夾室而閣三也方氏慤曰夾室以自是而夾于外故謂之達陸氏佃曰堂上為達公侯伯于房中下天子也左達左夾室前堂右達右夾室前堂朱子釋宫序之外謂之夾室公食大夫禮大夫立于東夾南注曰東于堂賈氏曰序以西為正堂序東有夾室今立于堂下當東夾是東于堂也又案公食禮宰東夾北西面賈氏曰位在北堂之南與夾室相當特牲饋食禮豆籩鉶在東房注曰東房房中之東當夾北則東夾之北通為房中矣室中之西與右房之制無明文東夾之北為房中則西夾之北蓋通為室中其有兩房者則西夾之北通為右房也歟蕙田案夾室之制孔安國謂房與夾室實同而異名鄭康成又謂房當夾室之北非也尚書顧命明分西夾與西房為二孔氏何得合而一之房之南即堂之東西空處疏謂序中半以南乃得堂稱堂上行事非專一所近戶則為戶東户西近房則言房外之東房外之西康成何得云夾在房南乎夾室在序之兩旁當以賈氏公彥之疏為定其士喪禮襲絰于序東之疏云序牆之東當東夾之前公食大夫禮賔升大夫立于東夾南之疏云序以西為正堂序東有夾室又公許賔升公揖退于廂之疏云室有東西廂曰廟其夾皆在序外是也蓋夾室與房一在序外一在序內不相混也乃郝仲輿又謂夾室在庭之兩旁東西相向與堂不屬萬氏斯同謂顧命明言西夾南向則夾非東西相向可知矣禮祖宗之祧主皆藏于夾室以其在序之兩旁故可藏于此若在庭之左右則是子孫儼然居上而坐祖宗于堂下矣有是理乎夾室與左右房並在堂北何云與堂不屬乎陳用之謂房之南有東西夾室亦同鄭氏之誤不知夾室之前亦謂堂內則謂之左達右達山隂陸氏謂堂上為達左達左夾室前堂右達右夾室前堂是也內則又謂大夫于閣三是大夫兼有夾室不特有左右房而已又案以上東西夾室右廟中房室之制五禮通考卷六十
