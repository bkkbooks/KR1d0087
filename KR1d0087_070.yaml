body:
  text: 五禮通考卷六十刑部尚書秦蕙田撰吉禮六十宗廟制度儀禮士冠禮筮于庿門注冠必筮日于廟門者重以成人之禮成子孫也廟謂禰廟乃宿賔厥明夕爲期于廟門之外賔立于外門之外注外門大門外主人迎出門左與賔揖先入每曲揖注周左宗廟入外門將東曲揖直廟將北曲又揖揖疏言此皆欲見入大門東向入廟云入外門將東曲者主人在南賔在北俱向東是一曲故一揖也至庿南主人在東北靣賔在西北靣是曲爲二揖故云直庿將北曲又揖也通下將入廟又揖三也至于廟門聘禮公皮弁迎賔于大門内賔入門左公揖入每門每曲揖及廟門公揖入疏諸侯三門皋應路則應門爲中門左宗廟入大門東行即至廟門其間得有每門者諸侯有五廟太祖之廟居中二昭居東二穆居西廟皆别門門外两邊皆有南北隔墻隔墻中夾通門若然祖廟已西隔墻有三則閤門亦有三東行經三門乃至太祖廟門中則相逼入門則相逺是以每門皆有曲有曲即相揖故毎曲揖也是以司儀亦云每門止一相亦據閤門而言也蕙田案諸侯三門庫雉路無皋應疏謂諸侯三門皋應路者非也朱子儀禮釋宫宫室之名制不盡見于經其可攷者宫必南鄉廟在寢東皆有堂有門其外有大門周禮建國之神位左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北蓋直寢故士喪禮注以寢門爲内門中門凡既入外門其向廟也皆曲而東行又曲而北案士冠禮賔立于外門之外主人迎賔入每曲揖至于廟門是也又案聘禮公迎賔于大門内毎門毎曲揖及廟門大夫三廟其牆與門亦然故賔問大夫大夫迎賔入亦毎門毎曲揖乃及廟門其說當攷大夫士之門惟外門内門而已諸侯則三天子則五庠序則惟一門鄉飲酒射禮主人迎賔于門外入門即三揖至階是也蕙田案以上門士冠禮主人即位于門東西面注主人即位于禰廟門外東西面立以待筮事也有司如主人服即位于西方東面北上注主人有司立位于廟門外西方東面以待事也燕禮卿大夫皆入門右注凡入門而右由闑左則由闑西周禮考工記廟門容大扃七个注大扃牛鼎之扃長三尺毎扃爲一个七个二丈一尺爾雅釋宫閍謂之門注詩曰祝祭于祊名疏李廵曰閍廟門儀禮士冠禮布席于門中闑西閾外西面注闑門橛也古文闑爲𣙗名疏闑一橛也聘禮記擯者立于閾外以相拜爾雅釋宫樞謂之椳注門户扉樞曰疏樞者門扉開合之所由易樞機之發是也闔謂之扉注公羊傳曰齒著于門闔扉疏李巡曰闔門扇也一名陳氏禮書爾雅柣謂之閾棖謂之楔樞謂之椳樞達北方謂之落時門持樞者或達北以爲固落時謂之􅩖樴謂之杙在地謂之臬又曰橛謂之闑楣謂之梁蓋界于門者榍也亦曰柣曰閾中于門者閫也亦曰闑曰橛旁于門者楔也亦曰棖所以開闔者樞也亦曰椳樞上之横梁楣也樞達北棟落時也月令曰以修闔扇爾雅闔謂之扉公羊曰齒著于門闔左氏以枚數闔越語曰乃闔左闔荀卿曰子貢觀于魯廟之北堂復瞻九蓋彼皆繼耶蓋即闥也則扇也闔也扉也其實一也鄭氏釋月令謂木曰闔竹葦曰扇蓋對而言之然也禮君入中門上介拂闑大夫中棖與闑之間士介拂棖入以自高爲戒故賔不履閾君入中門諸侯相朝之禮也賔不入中門諸侯來聘之禮也凡入門而右由闑東左由闑西曲禮曰大夫士出入君門由闑右燕禮大夫皆入門右臣統于君也聘禮賔入門左賔伉于主也聘公事也故入門而左所以致敬覿面私事也故入門而右所以致親朱子釋宫門之内外東方曰門東西方曰門西特牲饋食禮注曰凡鄉内以入爲左右鄉外以出爲左右士冠禮注又曰出以東爲左入以東爲右以入爲左右則門西爲左門東爲右鄉飲酒禮賔入門左燕禮卿大夫皆入門右是也以出爲左右則門東爲左門西爲右士冠禮主人迎賔出門左西面士虞禮側享于廟門之右是也闑東曰闑右亦自入者言之也中門屋爲門門之中有闑士冠禮曰席于門中闑西閾外注曰闑橛也玉藻正義曰闑門之中央所豎短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也然則闑者門中所豎短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰柣謂之閾郭氏曰閾門限邢昺曰謂門下横木爲内外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹案士昏禮曰納徴儷皮記曰執皮左首隨入注曰隨入爲門中阨狹賈氏曰皮皆横執之門中阨狹故隨入也匠人云廟門容大扃七个大扃牛鼎之扃長三尺七个二丈一尺彼天子廟門此士之廟門降殺甚小故云阨狹也推此則自士以上宫室之制雖同而其廣狹則異矣四書大全汪氏份曰門以向堂爲正自外而言東扉實爲右扉西扉則左扉也君臣出入恒由右扉則固就東扉而言矣右扉左扉此東彼西原有定所饒氏謂出則以東扉爲左入則以西扉爲左是謂左右扉無定所也其爲麟士所駁宜矣但麟士謂由闑右非不中門正解則非也燕禮注云凡入門而右由闑東左則由闑西所謂入門而右入右扉也所謂由闑東者拂闑之東而行即不中門之謂也陸稼書疑由闑右即拂闑之義而不敢遽定麟士以爲非何也麟士又引玉藻介拂闑士介拂棖爲不中門之証亦非也玉藻所言乃兩君相見若擯介者隨君而入如此與平時入公門之禮不同若如麟士之言則介拂闑之下所謂大夫中棖與闑之間者豈大夫獨當中門耶蕙田案古人門制兩旁有棖中間有闑棖闑之間爲中門棖者門之兩旁長木闑則兩扉相合處有一木常設而不動者門以向堂爲正故闑東爲右闑西爲左東爲主位西爲賔位闑東主所出入闑西賔所出入曲禮主人入門而右就東階賔入門而左就西階是也臣子在本國則出入皆由闑東曲禮謂士大夫出入君門由闑右燕禮卿大夫皆入門右是也若聘于他國則玉藻謂公事自闑西私事自闑東公事聘享用賔禮私事覿面從臣禮也東西兩扉各有中君出入由東扉之中玉藻閏月則闔門左扉立于其中臣子不敢當尊鄉黨立不中門曲禮爲人子者立不中門此東扉之中也兩君相見則賔由西扉之中臣爲賔則否玉藻賔入不中門此西扉之中也饒雙峰謂君出入則皆由左出則以東扉爲左入則以西扉爲左士大夫出入君門則皆由右出以闑西爲右入以闑東爲右郝仲輿謂闑東西自定左右隨身出入君自内南面東出由闑左入由右亦闑左也臣自外北面東入爲闑右出由西亦闑右也入由闑西則疑于爲賔出由闑東則疑于爲主故不敢也今案二說皆誤曲禮言闑右燕禮言門右據門闑爲左右則左右皆有定所未聞隨身出入爲左右也賔主有闑東闑西之分君臣但有中門不中門之分未聞君左臣右之說也君臣常時出入皆在闑東未聞爲君者東出西入爲臣者東入西出也曰入由闑西則疑于爲賔是矣曰出由闑東則疑于爲主夫不敢疑于主反儼然疑于賔矣入不敢爲賔而出乃敢爲賔有是理乎總由不知東西但别賔主而不别君臣左右有定所而不隨身之出入故爲此交互紛錯之說耳至人臣出入由闑右既不敢當中即當稍近闑而行陸稼書謂由闑右即拂闑之義甚允玉藻大夫中棖與闑之間士介拂棖蓋大夫士與上介雁行于後不敢相沿乃兩君相見之儀非常時出入之儀也又案以上門東西左右周禮考工記闈門容小扃參个注廟中之門曰闈小扃脚鼎之扃長二尺參个六尺禮記雜記如三年之喪則君夫人歸夫人至入自闈門升自側階儀禮士冠禮冠者降自西階適東壁北面見于母注適東壁者出闈門也時母在闈門之外婦人入廟由闈門冠者降自西階適東壁逸雅壁辟也辟禦風寒也萬氏斯大曰東壁東堂下何以知之特牲禮主婦視饎爨於西堂下記又云饎爨在西壁特牲一禮饎爨無兩既云西堂下復云西壁則西堂下即西壁矣然則東壁非東堂下乎鄭注冠者適東壁見母爲出闈門且云時母在闈門之外婦人入廟由闈門非惟于解不明抑亦乖古人左祖之制鄉飲酒記俎由東壁自西階升郝氏敬曰東壁東側室烹狗于東北熟而實之于俎故自東壁出由西階升堂也士虞禮饎爨在東壁士喪禮爲垼于西牆下特牲饋食禮主婦視饎爨于西堂下饋食禮記饎爨在西壁注西壁堂之西牆下周禮考工記牆厚三尺崇三之林氏希逸曰凡牆之厚若有三尺則其高至九尺而止舉其大槩以爲凖高厚可以是推也爾雅釋宫牆謂之墉逸雅釋宫室牆障也所以自障蔽也陳氏禮書爾雅曰牆謂之墉詩曰崇墉言言易曰乗其墉則墉牆之高者也儀禮于房室言墉士冠禮陳服于房中西墉下大射西夾六豆設于西墉下既夕記士東首于北墉下于堂下言壁牆之卑者也鄉飲酒俎由東壁自西階升士虞禮饎爨在東壁特牲禮饎爨在西壁士冠禮冠者降自東階適東壁書有東序西序爾雅曰東西牆謂之序則序堂上之東西牆也詩曰之子于垣百堵皆作書曰既勤垣墉春秋傳曰子產使盡壞其館之垣納車馬焉則垣宫室之外牆也考工記曰牆厚三尺崇三之則牆者垣墉之總名與朱子釋宫自門以北皆周以牆聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邊牆以出柩也士喪禮爲垼于西牆下注曰西牆中庭之西特牲饋食禮主婦視饎爨于西堂下記曰饎爨在西壁注曰西壁堂之西牆下案門之西有牆則牆屬于門矣西牆在中庭之西則牆周乎庭矣西壁在西牆下則牆周乎堂矣牆者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂墉堂下謂之壁謂之牆其實一也隨所在而異其名爾堂下之壁闈門在焉案士冠禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賔出主人送主婦亦拜賔注曰女賔也不言出不言送拜之于闈門之内闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也蕙田案以上闈門牆垣儀禮士冠禮筮與席所卦者具饌于西塾注西塾門外西堂也疏筮在門外故知西塾門外西堂也擯者𤣥端負東塾注東塾門内東堂負之北面疏擯者是主人擯相事在門内故知在門内東堂負之北面向主人也敖氏繼公曰東塾西塾其北蓋與東西堂相對而廣亦如之立于塾北而云負則塾之崇其過於堂與士之堂崇三尺士喪禮陳一鼎于寢門外當東塾少南西面士虞禮七俎在西塾之西羞燔俎在内西塾書顧命先輅在左塾之前次輅在右塾之前傳先輅次輅皆在路寢門内左右塾前北面左疏塾前陳車必以轅向堂故知左右塾前皆北面也塾者謂門内之西右塾者門内之東故以北面言之爲左右所陳坐位器物皆以西爲上由王殯在西序故也其執兵宿衛之人則先東而後西者以王在東宿衛敬新王故也顧氏云先輅在左塾之前在寢門内之西北面對玉輅次輅在右塾之前在寢門内之東對金輅也爾雅釋宫門側之堂謂之塾注夾門堂也西疏門側之堂夾門東者名塾朱子釋宫夾門之堂謂之塾釋宫曰門側之堂謂之塾郭氏曰夾門堂也門之内外其東西皆有塾一門而塾四其外南鄉案士虞禮陳鼎門外之右匕俎在西塾之西注曰塾有西者是室南鄉又案士冠禮擯者負東塾注曰東塾門内東堂負之北靣則内塾北向也凡門之内兩塾之間謂之宁案聘禮賔問卿大夫迎于外門外及廟門大夫揖入擯者請命賔入三揖並行注曰大夫揖入者省内事也既而俟于宁也凡至門内霤爲三揖之始上言揖入下言揖並行則俟于霤南門内兩塾間可知矣李巡曰宁正門内兩塾間義與鄭同謂之宁者以人君門外有正朝視朝則于此宁立故耳周人門與堂修廣之數不著于經案匠人云夏后氏世室堂修二七廣四修一堂修謂堂南北之深其廣則益以四分修之一也門堂三之二室三之一門堂通謂門與塾其廣與修取數于堂門得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺于堂之數亦可得而知矣陳氏禮書尚書大傳上老平明坐于右塾庶老坐于左塾食貨志亦曰里胥平旦坐于右塾鄰長坐于左塾書言先路在左塾之前次路在右塾之前先路象路也次路木路也象路貴于木路則左塾者東塾也里胥尊于鄰長而在右塾則右塾者西塾也何則自内視外則左東而右西自外視内則左西而右東曲禮曰主人入門而右客入門而左此左西而右東也玉藻曰公事自闑西私事自闑東此左東而右西也然則書言左塾史言右塾皆西塾也自内外言之異耳蕙田案爾雅門側之堂謂之塾邢疏門側之堂夾門東西者名塾顧命先輅在左塾之前次輅在右塾之前孔疏左塾者門内之西右塾者門内之東蓋門堂北面故以西塾爲左塾東塾爲右塾自天子五門至大夫士二門皆有之尚書大傳上老平明坐于右塾庶老坐于左塾漢書食貨志里胥平旦坐于右塾鄰長坐于左塾此係里門之塾分南北不分東西陳用之謂史之右塾係西塾者非是又引玉藻公事自闑西私事自闑東証左東而右西亦非是闑東主所出入爲右闑西賔所出入爲左曲禮士大夫出入君門由闑右主人入門而右客入門而左是也公事用賔禮故自闑東私事從臣禮故自闑西非左東而右西也呉氏紱曰士虞禮羞燔俎在内西塾上南順則塾之有内外東西易明也但其堂與室未知如何位置耳或云棟之下爲壁隔㫁内外各以其一爲塾近壁一半爲室近檐一半爲堂而皆無户牖如房與北堂之制然月令疏謂祀竈祀門祀行皆在廟門外先設席于廟門之奥門亦有奥則似非無户牖者矣蕙田案呉氏之說近是考工記門堂三之一室三之一註兩室與門各居一分既名爲室則其户牖雖不可知而其制度必有異于堂者矣又案以上塾儀禮燕禮賔所執脯以賜鐘人于門内霤郝氏敬曰内霤門内檐下禮記雜記禭者降受爵于門内霤蕙田案以上門内霤右廟門之制儀禮鄉射禮司正實觶降自西階中庭楅乃設楅于中庭南當洗大射禮司正設洗洗角觶南面坐奠于中庭疏燕禮及此射禮司正不以觶升而奠之于地比鄉飲酒又鄉射爲顯聘禮公揖入立于中庭擯者退中庭宰夫受幣于中庭以東設于中庭十以爲列注庭實固當中庭言當中庭者南北之中也言中庭則設碑近如堂深也南疏上享時直言庭入室不言中庭則在東西之中其北三分庭一在南此更言中庭欲明南北之中也上文公立于中庭宰受幣于中庭皆南北之中也大夫降中庭注大夫降出言中庭者爲賔降節也云疏大夫授擯圭訖降自西階將出門至中庭不止今大夫降出中庭者大夫至中庭賔乃降故鄭云爲賔降節也士喪禮主人進中庭弔者致命甸人置重于中庭三分庭一在南有禭者賔入中庭北面致命宵爲燎于中庭特牲饋食禮佐食北面立于中庭朱子釋宫堂下至門謂之庭三分庭一在北設碑聘禮注曰宫必有碑所以識日景知隂陽也賈氏釋士昏禮曰碑在堂下三分庭一在北案聘禮歸饔餼醯醢夾碑米設于中庭注曰庭實固當庭中言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂亷北至房室之壁三分庭一在北設碑而碑如堂深則庭蓋三堂之深也又案鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣蕙田案以上中庭門之内堂之下也禮記祭義君牽牲入廟門麗于碑注麗猶繫也繫疏君牽牲入廟門著中庭碑也王甫云以紖貫碑中君從此待之也儀禮聘禮當碑南陳注宫必有碑所以識日景引陰陽也凡碑引物者宗廟則麗牲焉以取毛血其材宫廟以石窆用木曲疏宫必有碑者案諸經云三揖者鄭注皆云入門將揖既曲北面揖當碑揖若然士昏及此聘禮是大夫士廟内皆有碑矣鄉飲酒鄉射言三揖則庠序之内亦有碑矣祭義云君牽牲麗于碑則諸侯廟内有碑明矣天子廟及庠序有碑可知但生人寢内不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者周禮匠人云爲規識日出之景與日入之景者自是正東西南北此識日景惟可觀碑景邪正以知日之早晩也又云引陰陽者又觀碑景南北長短十一月日南至景南北最長隂盛也五月日北至景南北最短陽盛也二至之間景之盈縮隂陽進退可知也云凡碑引物者宗廟則麗牲焉以取毛血者云凡碑引物則識日景引陰陽皆是引物則宗廟之中是引物但廟碑又有麗牲麗繫也案祭義云君牽牲麗于碑以其鸞刀以取血毛毛以告純血以告殺兼爲此事也云其材宫廟以石窆用木者此雖無正文以義言之葬碑取縣繩繂暫時之間徃來運載當用木而已其宫廟之碑取其妙好又須久長用石爲之理勝于木故云宫廟以石窆用木也是以檀弓云公室視豐碑三家視桓楹時魯與大夫皆僭言視桓楹桓楹宫廟兩楹之柱醯醢百罋夾碑十以爲列賔自碑内聽命賔降自碑内公食大夫禮陳鼎于碑南庶羞陳于碑内庭實陳于碑外陳氏禮書公食大夫禮庶羞陳于碑内庭實陳于碑外燕禮賔自碑内聽命聘禮醯醢百罋夾碑十分以爲列賔自碑内聽命祭義曰君牽牲入于廟門麗于碑士昏禮賔入廟門鄉飲酒賔入庠門鄉射賔入序門皆三揖至于階而三揖之中有當碑揖則諸侯大夫士之宫皆有碑矣鄭氏曰宫必有碑所以識日景引陰陽也凡碑引物者宗廟則麗牲焉其材宫室以石窆用木禮天子之窆豐碑諸侯桓楹大夫二碑士無碑喪大記魯之季也公室視豐碑三家視桓楹鄭氏曰豐碑斵大木爲之形如石碑于椁前後四角植之穿中于間爲鹿盧天子四碑前後各重鹿盧也桓楹斵之如大楹耳四植謂之桓窆碑如桓楹則宫室碑制可知蕙田案以上碑朱子論庭之深以碑爲節則碑固宜屬于庭也詩小雅何人斯胡逝我陳傳陳堂塗也堂箋堂塗者公館之塗也陳風防有鵲巢中唐有甓傳中中庭也唐堂塗也甓瓴甋也疏以堂是門内之路故知中是中庭李巡曰唐廟中路名孫炎引詩云中唐有甓堂塗堂下至門之徑也然則唐之與陳廟庭之異名耳其實一也故云唐堂塗也爾雅釋宫廟中路謂之唐注詩曰中唐有甓堂塗謂之陳注堂下至門徑也徑疏堂下至門名陳陳氏禮書詩曰不入我陳又曰中唐有甓爾雅曰廟中路謂之唐堂塗謂之陳唐與陳皆堂下至門之徑特廟堂異其名耳考工記曰堂涂十有二分鄭氏曰階前若今令辟械也分其督旁之修以二分爲峻蓋令辟即甓也械其道也中央爲督峻其督所以去水朱子釋宫堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門内霤凡入門之後皆三揖至階昏禮注曰三揖者至内霤將曲揖既曲北面揖當碑揖賈氏曰至内霤將曲者至門内霤主人將東賔將西賔主相背時也既曲北面者賔主各至堂塗北行向堂時也至内霤而東西行趨堂塗則堂塗接于霤矣既至堂塗北面至階而不復有曲則堂塗直階矣又案聘禮饔鼎設于西階前陪鼎當内廉注曰辟堂塗也則堂塗在階廉之内矣鄉飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂塗也蕙田案以上堂塗由門上堂之路朱子曰其北屬階則堂塗當下接兩階矣儀禮少牢饋食禮祝盥于洗升自西階主人盥升自阼階士昏禮舅姑共享婦舅姑先降自西階婦降自阼階注授之室使爲主明代已書顧命大輅在賔階面綴輅在阼階面傳面前皆南向禮記曲禮主人就東階客就西階書顧命夾兩階戺傳堂亷爲戺所疏堂廉曰戺相傳爲然亷者稜也立在堂下迎于堂亷儀禮鄉飲酒禮設席于堂亷東上注側邊曰亷燕禮曰席工于西階上少東樂正先升北面此言樂正先升立于西階東則工席在階東聘禮陪鼎當内廉注當内廉辟堂塗也書顧命一人冕執戣立于東垂一人冕執瞿立于西垂傳戣瞿皆㦸屬立于東西堂之階上而疏釋詁云疆界邊衞圉垂也則垂是逺外之名堂上立東垂西垂知左堂上之逺地堂于序外東廂西廂必有階上堂知此立于東西堂之階上也朱子釋宫升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賔客也毎階有東西兩廉聘禮饔鼎設于西階前當内廉此則西階之東廉以其近堂之中故曰内廉也士之階三等案士冠禮降三等受爵弁注曰下至也賈氏曰匠人云天子之堂九尺賈氏以爲階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序案鄉射禮升階者升自西階繞楹而東燕禮媵爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攢置于西序而檀弓曰周人殯于西階之上故知階近序也堂之側邊曰堂廉鄉飲酒禮設席于堂廉注曰側邊曰廉喪大記正義曰堂廉堂基南畔廉稜之上也又案鄉射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也陳氏禮書書曰四人執戈夾兩階戺鄉飲酒設工席于堂廉聘禮陪鼎當内廉鄭氏曰側邊曰廉孔安國曰堂亷曰戺又曰書曰一人執戣立于東垂一人執瞿立于西垂史曰坐不垂堂孔安國曰東西垂者東西下之階上蕙田案以上阼階賔階堂廉戺垂右中庭碑堂塗階戺堂廉垂禮記郊特牲詔祝于室坐尸于堂禮器室事交乎戸堂事交乎階天子之堂九尺諸侯七尺大夫五尺士三尺疏天子堂九尺此周法也案考工記殷人重屋堂崇三尺鄭差之云夏高一尺故知此九尺者周制也朱子釋宫堂之屋南北五架中脊之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰庪賈氏曰中脊爲棟棟前一架爲楣楣前接簷爲庪今見于經者惟棟與楣而已棟一名阿案士昏禮賔升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賔升皆當楣此深入當棟故云入堂深也又案聘禮賔升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異耳後楣以北爲室與房後楣以下以南爲堂以北爲室與房室與房東西相連爲之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架棟北楣下爲室南壁而開户以兩架之間爲室故云迫狹也昏禮賔當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室案鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賔南面注曰不言于戸牖之間者此射于序賈氏曰無室則無户牖故也釋宫曰無室曰榭即序也殿屋夏屋說殿屋五間前皆爲堂後爲房室中間之前爲兩楹間後爲室東間之前爲東楹之東又少東爲阼階上少北爲東序後爲東房西間之前爲西楹之西又少西爲賔階上少北爲西序後爲西房序即牆也設位在東西序者負牆而立也其南爲序端東序之東西序之西爲夾亦謂之廂又說文云廂廊也廊東西序也此亦可見但疑序下脫一外字其前爲東西堂其後爲東西夾室夾外之廉爲側階房後爲北階此其地之盤也其棟則中三間爲一棟横指東西至兩序之上而盡遂自此處分爲四棟邪指四隅上接横棟下與霤齊此其上棟之制所謂四阿也其宇則横棟前後即爲南北兩下横棟盡外即爲東西兩下四棟之旁即各連所向而下四面榱桷覆堂廉出階外者謂之廡說文云廡堂下周屋也其屋盡水下處謂之霤此其下宇之制也厦屋則前五間後四間無西房堂中三間之後只分爲兩間東房西室其餘並如殿屋之制但五間皆爲横棟棟之前後皆爲兩下之宇横棟盡外有版下垂謂之摶風摶風之下亦爲兩廡接連南北以覆側階但其廡亦不出摶風之外耳儀禮疏云卿大夫爲夏屋其室兩下而四周之殿屋四阿連下爲廡四面之簷其水皆多故其簷皆得以霤爲名厦屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但爲腰簷不連棟下又不出摶風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名疏乃直指摶風誤矣蕙田案朱子謂夏屋前四間後五間是仍鄭氏無西房之說也前五後四何以成堂宇之制耶詳見後條陳氏禮書天子諸侯之寢廟四阿有霤士大夫則五架有榮而已五架之制棟居中而南北薦簷曰庪棟庪之間曰楣昏禮賔升當阿致命阿棟也則是大夫士之廟室設于棟北矣少牢禮主人獻祝設席南面祝拜于席上則是大夫士之廟室迫狹矣爾雅曰無東西廂有室曰寢其文對廟言之則廟寢也鄭氏謂天子路寢太廟明堂同制豈非惑于明堂位太廟天子明堂之說乎所謂太廟天子明堂者蓋其崇其飾與明堂同非必五室四門一如明堂也不然書言路寢詳矣而無是制何耶蕙田案以上總論廟屋堂室儀禮士昏禮尊于室中北墉下夫入于室即席士喪禮親者在室婦人髽于室既夕記室中惟主人主婦坐少牢饋食禮主人室中獻祝祝拜于席上周禮考工記庭中度以几禮記曲禮室中不翔注爲其迫也朱子語類李丈問太廟堂室之制曰古制是不可曉禮說士堂後一架爲室蓋甚窄天子便待加得五七架亦窄狹不知周家三十以上神主位次相逼如何行禮室在堂後一間從堂内左角爲户而入西壁如今牆上爲龕太祖居之東向旁兩壁有牖羣昭列于北牖下而南向羣穆列于南牖下而北向堂又不爲神位而爲人所行禮之地天子設黼扆于其中受諸侯之朝蕙田案朱子以室之制爲窄狹信有之然古人之制畢竟與後不同詩于我乎夏屋渠渠渠渠言高也屋高則屋内之棟楣相去自逺而兩楹間尤較廣矣考工記周人明堂度九尺之筵五室凡室二筵則東西當有一丈八尺或太廟之室較明堂更爲廣闊未可知也又謂兩壁有牖考室内惟南壁有牖詩宗室牖下是也北則惟有墉而無牖士昏禮尊于室中北墉下是也南牖故明北墉則幽昭穆之義並取于此亦未可定兩牖之說未確又案以上正室堂之北居中一間也儀禮特牲饋食禮主人及祝升祝先入主人從西面于戸内席于户内士昏禮贊户内北面答拜贊洗爵酌于戸外尊入戸西北面奠爵拜婦出祝闔牖户注凡廟無事則閉之疏祭訖先闔牖後閉戸是無事則閉之以其鬼神尚幽閣故也士虞禮贊闔牖戸士虞禮記祝闔牖戸降啟戸主人入祝從啟牖鄉如初注牖先闔後啟扇在内也朱子釋宫室南其戸戸東而牖西說文曰户半門也牖穿壁以木爲交窗也月令正義曰古者窟居開其上取明雨因霤之是以後人名室爲中霤開牖者象中霤之取明也牖一名鄉其扇在内案士虞禮祝闔牖户如食間啟户啟牖鄉注曰牖先闔後啟扇在内也鄉牖一名是也蕙田案易曰不出户庭又曰闢户之謂乾闔户之謂坤一扉爲戸兩扉爲門故戸陽而門陰六書精藴戸室之口也凡室之口曰戸堂之口曰門内曰戸外曰門古人堂内爲室室東南啟一扉曰戸也戸之制又隨室而移詩西南其户疏謂在北者南户在東者西戸廟之室在堂北南向西有牖故知爲東南扉也玉藻君子居恒當戸檀弓當戸而坐註謂當戸向明非是蓋戸開則戸直東南隅之壁尊者居主奥適與戸相對故曰當戸當戸而坐坐于奥也所謂居恒當戸也又案以上室前户牖也儀禮士昏禮媵布席于奥御衽于奥婦奠菜席于廟奥東面右几禮記曲禮居不主奥朱子曰古人室在東南隅開門謂之窔東北隅爲宧西北隅爲屋漏西南隅爲奥人纔進便先見東北隅却到西北隅然後到西南隅此是至深宻之地朱子釋宫室中西南隅謂之奥邢昺曰室户不當中而近東西南隅最爲深隱故謂之奥而祭祀及尊者常處焉詩召南于以奠之宗室牖下朱傳牖下室西南隅所謂奥也蕙田案鄭氏箋牖下在戸外非是今不從大雅抑相在爾室尚不愧于屋漏禮記曾子問凡殤與無後者祭于宗子之家當室之白尊于東房是謂陽厭注當室之白謂西北隅得戸明者也呉氏澄曰孔子曰有陽厭有陰厭陰者室之西南隅謂之奥正當牖下不受牖明屋之隱奥處也以其幽闇故曰陰陽者室之西北隅謂之屋漏正與牖對受牖之明屋之漏光處也又爲室之白白光明也以其光明故謂之陽儀禮既夕記掃室聚之窔管子弟子職拚前而退聚于戸内蕙田案戸内窔也掃地自奥而屋漏而宧而窔也爾雅釋宫西南隅謂之奥西北隅謂之屋漏東北隅謂之宧東南隅謂之窔疏此别室中四隅之異名也奥者孫炎云室中隱奥之處也古者爲室戸不當中而近東則西南隅最爲深隱故謂之奥而祭祀及尊者常處焉屋漏者孫炎云當室之所向日光所漏入也宧者李巡云東北者陽始起育養萬物故曰宧宧養也窔亦隱暗之義也朱子釋宫東南隅謂之窔郭氏曰窔亦隱闇西北隅謂之屋漏詩所謂尚不愧于屋漏是也曾子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得戸明者經止曰西北隅蕙田案窔宧屋漏奥室中四隅也儀禮士冠禮陳服于房中西墉下何氏楷曰房說文云室在旁也崔氏云宫室之制中央爲正室正室左右爲房將冠者采衣紒在房中南面朱子曰房戸宜當南壁東西之中而將冠者宜在所陳器服之東當户而立也贊者盥于洗西升立于房中西面南上朱子曰贊者西面則負東墉而在將冠者之東矣特牲饋食禮記尊兩壺于房中西墉下南上内賔立于其北東面南上鄉飲酒禮記薦脯五挺横祭于其上出自左房注在東養也陽主養房饌陳處也特牲饋食禮豆籩鉶在東房鄉射禮薦脯用籩醢以豆出自東房大射儀宰胥薦脯醢由左房注左房東房也人君左右房公食大夫禮記宰夫筵出自東房少牢饋食禮主婦被錫衣侈袂薦自東房士昏禮女次純衣纁袇立于房中南面主人說服于房側尊甒醴于房中饌于房中士昏禮記婦席薦饌于房中蕙田案以上東房亦曰左房聘禮賔受圭退負右房而立疏大夫士直有東房西室天子諸侯左右房今不在大夫廟于正客館故有右房也敖氏繼公曰記曰卿館于大夫而此云負右房則大夫之家亦有左右房明矣呉氏紱曰鄉射記豆籩出自東房特牲豆籩鉶在東房記賔長兄弟之薦自東房如此者非一言左對右言東對西何于天子諸侯則云爾于大夫則不云爾乎經文同而疏解異岐語徒滋眩耳聘禮記若君不見使大夫受自下聽命自西階升受負右房而立禮記祭統君純冕立于阼夫人副褘立于東房疏夫人副褘立東房以俟行事尸既入之後轉就西房故禮器云夫人在房雖不云東西房下云東酌罍尊則知夫人在房謂西房也儀禮士喪禮主婦髽于室疏男子髻髮與免在東房若相對婦人宜髽于西房大夫士無西房故于室内户西皆于隱處爲之也禮記喪大記婦人髽帶麻于房中注髽帶麻于房中則西房也天子諸侯左右房禮器廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生于東月生于西此陰陽之分夫婦之位也君西酌犧象夫人東酌罍尊注人君尊東也天子諸侯有左右房上疏罍尊在阼謂夫人所酌也犧尊在西謂君所酌也云罍尊在阼當阼階堂上而設之則犧尊在西當西階堂上而陳之故君于阼階西嚮酌犧尊夫人于西房之前東嚮酌罍尊云天子諸侯有左右房者以士喪禮主婦髽于室在主人西喪大記君之喪婦人髽帶麻于房中亦當在男子之西故彼注亦云則西房又顧命云天子有左右房此云夫人在房又云夫人東酌罍尊是西房也故云天子諸侯有左右房書顧命允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房傳西房西夾坐東東房東廂夾室向疏西序即是西夾西夾之前已有南坐矣西序所陳之寳近在此坐之西知此在西房者在西夾坐東也東夾室無坐故直言東廂夾室陳于夾室之前也案鄭注周禮宗廟路寢制如明堂明堂則五室此路寢得有東房西房者鄭注張逸以此問鄭答云成王崩在鎬京鎬京宫室因文武更不改作故同諸侯之制有左右房也蕙田案以上西房亦曰右房東房西房經有明文疏以爲即夾室併房與夾室爲一非是東西房在序之内夾室在序之外也朱子釋宫人君左右房大夫士東房西室而已聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然案聘禮賔館于大夫士君使卿還玉于館也賔亦退負右房則大夫亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考陳氏禮書以書考之天子路寢之制室居中左戸右牖東西有房又有東序西序東堂西堂東垂西垂賔階阼階房之南有東西夾室鄭康成釋儀禮謂房當夾室北是也孔安國謂西房西夾室東房東夾室誤矣諸侯路寢與士大夫之室皆東西房士喪禮男子髻髮于房婦人髽于室在男子之西則諸侯之禮婦人髽于房爲西房矣士亦有西房而婦不于此髽者尊卑之别然也公食大夫于廟宰夫饌于東房贊者負東房大夫立于東夾南宰東夾北則諸侯之廟亦東西房東西夾矣少牢禮司宫尊兩甒于房户之間士冠鄉飲亦尊于房戸之間特牲禮尊于戸東皆指東房言之非謂無西房也鄉飲記曰薦出自左房鄉射記曰出自東與大射諸侯擇士之宫宰胥薦脯醢由左房其言相類蓋言左以有右言東以有西則大夫之房室與天子諸侯同可知鄭氏謂大夫士無西房誤矣然房皆南户而無北墉室有北墉而無北堂則房户之外由半以南謂之堂其内由半以北亦謂之堂昏禮尊于房户之東是房有南户矣禮大射羞膳者升自北階立于房中而不言入户是房無北墉矣昏禮尊于室中北墉下是室無北堂矣故昏禮洗在北堂直室東隅則北堂在房之北可知萬氏斯大曰鄉飲酒禮席次第云乃席賔主人介衆賔之位皆不屬焉不詳何方何鄉當于鄉飲酒義及鄉射禮考之義曰坐賔于西北坐介于西南主人坐于東南坐僎于東北此言其方也又曰賔必南鄉介必東鄉主人坐于東方此言其鄉也鄉射禮曰賔南面衆賔之席繼而西主人阼階上面西略著其方與鄉也鄭本此二者注飲酒云賔席牖前南面主人席阼階上西面介席西階上東面衆賔席于賔席之西其方其嚮各得其正但古人房室在堂之北鄭謂惟天子諸侯有左右房大夫士東房西室無右房若是則賔席牖前固當西北矣然而實逼西序牆也席西餘地無幾何能容衆賔之席陳用之云鄉飲禮薦脯出自左房鄉射籩豆出自東房大射宰胥薦脯醢由左房夫鄉射大夫禮大射諸侯禮其言相類蓋言左以有右言東以有西則大夫士房室與諸侯同可知如其言則賔席之西得容衆賔之席乃得其解矣蕙田案鄭康成謂天子諸侯左右房大夫士東房西室而無右房陳用之萬斯大皆主士大夫有東西房之說夫天子諸侯臺門兩觀大夫士無之此尊卑之差若如右房無之不爲卑有之不爲僭而何必無之且吉凶之禮多行于戸牖之間以其爲堂之正中也設若果無西房則户牖之前乃堂之西偏而非正中矣豈有行冠昏諸大禮不在于正中而在旁側者哉況堂上則有東西楹堂下則有東西階門側則有東西塾皆取其規制之正耳若無西房則無西楹并無西階矣士喪禮弔者入升自西階有大賔則特拜之即位于西階下何以解之且有西房而後兩階之中爲中庭西階之下爲中庭西士喪禮甸人掘坎于階間少西爲垼于西牆下注中庭之西若無西房則中庭以何者爲中而又何有中庭之西耶士喪禮皆饌于西序下若無西房則西序之前即正堂之前矣正室之前爲堂方是時衆婦人戸外北面注婦人户外堂上且君使人弔君使人禭皆在堂上行事何地可容貝以下之諸饌乎竹扛長四尺置于宇西階上既無西房則宇西階上何地種種皆不可解豈復成其規制乎哉蓋西房之名不多見于禮經者禮東爲主位西爲賔位故主人主婦薦自左房而賔受享自西階升受負右房而立主禮之及于房中者多而賔禮之及于房中者少故略而不及耳大射儀及鄉飲酒記言左房注疏以爲即東房聘禮賔受圭退負右房而立則右房是西房也賈疏謂于正客館故有右房敖君善謂卿館于大夫而此云負右房則大夫之家亦有左右房明矣証佐最明至郝仲輿又泥大夫無西房之說謂此右房即東房言右房者升堂以東爲右注疏謂西房誤也案郝于釋左房處既謂之東房此釋右房處又謂之東房是一東房而兼左右兩名有是理乎郝仲輿又謂堂後爲室室西深入爲奥是堂之西北也故西不復得有房案爾雅奥屋漏宧窔俱室中四隅之名故西南隅謂之奥未聞堂之西北爲奥也邢疏古者爲室户不當中而近東則西南隅最爲深隱故謂之奥今以室西深入爲奥而旁侵堂西北之地是未明乎室之制但在堂北中央而奥之位止在室之西南隅也其誤甚矣又案以上左右房接于正室兩邊者也儀禮特牲饋食禮記宗婦北堂東面北上注北堂中房而北疏謂房中半以北爲北堂也士昏禮記婦洗在北堂直室東隅篚在東北面盥注洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房戸與隅間疏房與室相連爲之房無北壁故得北堂之名故云洗在北堂也云北堂房半以北者以其南堂是户外半以南得堂名則堂是户外之稱則知此房半以北得堂名也知房無北户者見上文云尊于房户之東房有南户矣燕禮大射皆云羞膳者升自北階立于房中不言入房是無北壁而無户是以得設洗直室東隅也云洗南北直室東隅者是南北節也云東西直房戸與隅間者是東西節也有司徹酌致爵于主婦主婦北堂大射儀工人士與梓人升自北階卒畫自北階下司宫埽所畫物自北階下注工人士梓人司宫位在北堂下疏南方不見有其位其人升降自北階明位在北堂下也郝氏敬曰北階堂後階乃命執幕者執幕者升自西階立于尊南北面東上注羞膳者由堂東升自北階立于房西面南上不言命者不升堂略之朱子釋宫房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連爲之房無北壁故得北堂之名案特牲饋食禮記尊兩壺于房中西墉下南上内賔立于其北東面南上宗婦北堂北上内賔在宗婦之北乃云北堂又婦洗在北堂而直室東隅是房中半以北爲北堂也婦洗在北堂而士虞禮主婦洗足爵于房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也蕙田案以上房内北堂儀禮所載皆主東房爲之蓋主人主婦位在東也詩衞風焉得諠草言樹之背傳背北堂也疏背者向北之義豈男子居恒常在奥而婦人常在北堂歟北階即北堂之階其西房之制不可考矣又案以上東房西房儀禮聘禮西夾六豆設于西墉下北上六壺西上二以並東陳注東陳在北墉下饌于東方亦如之注東方東夾室堂上之饌八西夾六注八六者豆數也公食大夫禮大夫立于東夾南宰東夾北禮記雜記成廟則釁之門夾室皆用雞先門而後夾室割雞門當門夾室中室疏門廟門也夾室東西廂也内則大夫七十而有閣天子之閣左達五右達五公侯伯于房中五大夫于閣三注閣以板爲之庋食物也達夾室大夫言于閣與天子同文序疏宫室之制中央爲正室正室左右爲房房外有序外有夾室天子尊庖厨逺故左夾室五閣右夾室五閣諸侯卑庖厨宜稍近故降于天子惟在一房之中而五閣也大夫既卑無嫌故亦于夾室而閣三也方氏慤曰夾室以自是而夾于外故謂之達陸氏佃曰堂上爲達公侯伯于房中下天子也左達左夾室前堂右達右夾室前堂朱子釋宫序之外謂之夾室公食大夫禮大夫立于東夾南注曰東于堂賈氏曰序以西爲正堂序東有夾室今立于堂下當東夾是東于堂也又案公食禮宰東夾北西面賈氏曰位在北堂之南與夾室相當特牲饋食禮豆籩鉶在東房注曰東房房中之東當夾北則東夾之北通爲房中矣室中之西與右房之制無明文東夾之北爲房中則西夾之北蓋通爲室中其有兩房者則西夾之北通爲右房也歟蕙田案夾室之制孔安國謂房與夾室實同而異名鄭康成又謂房當夾室之北非也尚書顧命明分西夾與西房爲二孔氏何得合而一之房之南即堂之東西空處疏謂序中半以南乃得堂稱堂上行事非專一所近戸則爲戸東户西近房則言房外之東房外之西康成何得云夾在房南乎夾室在序之兩旁當以賈氏公彦之疏爲定其士喪禮襲絰于序東之疏云序牆之東當東夾之前公食大夫禮賔升大夫立于東夾南之疏云序以西爲正堂序東有夾室又公許賔升公揖退于廂之疏云室有東西廂曰廟其夾皆在序外是也蓋夾室與房一在序外一在序内不相混也乃郝仲輿又謂夾室在庭之兩旁東西相向與堂不屬萬氏斯同謂顧命明言西夾南向則夾非東西相向可知矣禮祖宗之祧主皆藏于夾室以其在序之兩旁故可藏于此若在庭之左右則是子孫儼然居上而坐祖宗于堂下矣有是理乎夾室與左右房並在堂北何云與堂不屬乎陳用之謂房之南有東西夾室亦同鄭氏之誤不知夾室之前亦謂堂内則謂之左達右達山隂陸氏謂堂上爲達左達左夾室前堂右達右夾室前堂是也内則又謂大夫于閣三是大夫兼有夾室不特有左右房而已又案以上東西夾室右廟中房室之制五禮通考巻六十
