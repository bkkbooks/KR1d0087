body:
  text: 五禮通考卷八十六刑部尚書秦蕙田撰吉禮八十六宗廟時享周禮天官甸師掌帥其屬而耕耨王籍以時入之以供齍盛禮記祭義耕藉所以教諸侯之養也樂記耕藉然後諸侯知所以敬春秋桓公十四年秋八月壬申御廪災乙亥嘗榖梁傳御廪之災不志此其志何也以為未易災之餘而嘗可也天子親耕以供粢盛以為人所盡事其祖禰不若以巳所自親者也公羊傳御廪者何粢盛委之所藏也注黍稷曰粢在器曰盛委積也御者謂用於宗廟廪者釋治榖名禮天子親耕東田千畝以供粢盛躬行孝以先天下白虎通天子親耕以共郊廟之祭右親耕共粢盛周禮天官內宰中春詔后帥外內命婦始𧖟於北郊以為祭服禮記月令季春之月后妃齊戒親東嚮躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服孟夏之月蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服季夏之月命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐偽以給郊廟祭祀之服祭義古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘墻而外閉之及大昕之朝君皮辨素積卜三宫夫人世婦之吉者使入蠶於蠶室奉種浴於川桑于公桑風戾以食之歲既單矣世婦卒蠶奉繭以示君遂獻繭于夫人夫人曰此所以為君服歟遂副禕而受之因少牢以禮之古之獻繭者其率用此歟及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之元黃之以為黼黻文章君服以祀先王先公敬之至也春秋桓公十四年公羊傳王后親蠶以共祭服國語魯語王后親織元紞社而賦事蒸而獻功白虎通后之親桑以共祭服右親蠶共衣服蕙田案親耕親蠶蓋廟享之敬以歲計者也周禮地官牧人掌牧六牲而阜蕃其物以共祭祀之牲牷遂人凡國祭祀供野牲注共野牲入於牧人以待事也疏謂牛羊豕在六遂者故曰野牲牧人云掌牧六牲以待祭祀故知此野牲亦入牧以待事也遂師凡國祭祀共其野牲牧人凡祭祀共其犧牲以授充人繫之注授充人者當殊養之疏牧人養牲臨祭前三月授與充人繫養之春官肆師大祭祀展犧牲繫于牢頒于職人疏將冇宗廟大祭祀牧人以牲與充人之時肆師省閲其牲看完否及色堪為祭牲及繫于牢頒付于職人也地官充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之疏上經天地外神巳别于上故今以先王亦如之亦繫于牢芻之三月也蕙田案以上五條言犧牲掌于牧人供于遂人授于充人將授之時肆師又展省其牲以頒之充人充人乃繫于牢芻之三月也牛人凡祭祀供其享牛求牛以授職人而芻之注享獻也獻神之牛謂所以祭者也求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處夏官羊人若牧人無牲則受布於司馬使其賈買牲而共之地官稿人掌豢祭祀之犬疏養犬曰豢此經是也知養豕亦曰豢者樂記云豢豕作酒是養豕曰豢也春官雞人掌共雞牲辨其物注陽祀用騂隂祀用黝宗疏陽祀祭天于南郊及廟應氏撝謙曰周禮牧人掌牧六牲先儒以為馬牛羊犬豕雞也然馬並未見之于吉祭惟大司馬喪祭奉詔馬牲牧人將事于四海山川飾黃駒則吉祭唯用五牲而巳而大戴禮載曾子之言序五牲之先後貴賤宗廟曰芻豢山川曰犧牲割列攘瘞是有五牲而曲禮牲號牛曰一元大武羊曰柔毛豕曰剛鬛豚曰腯肥犬曰羹獻雞曰翰音亦不言馬有何號也此可見矣蕙田案以上五條言六牲各有所掌之職豕人或當屬之冬官也禮記曲禮天子以犧牛注犧純毛也周禮地官牧人凡陽祀用騂牲毛之注陽祀謂祭天于南郊及宗廟禮記檀弓周人牲用騂蕙田案以上三條言犧牲毛色純全及所尚王制宗廟之牛角握注握謂長不出膚壺疏公羊傳曰膚寸而合鄭注投禮云四指曰扶扶則膚也周禮考工記梓人宗廟之事脂者膏者以為牲注脂牛羊屬膏犬豕屬疏凝者曰脂釋者曰膏蕙田案此二條言犧牲之體詩小雅無羊三十維物爾牲則具箋牛羊之色異者三十則共之祭祀索則有之禮記月令季夏之月命四監大合百縣之秩芻以養犧牲令民無不咸出其力以祠宗廟社稷之靈季冬之月乃命同姓之邦共寢廟之芻豢疏寢廟先王與同姓國共之故命同姓國共之言芻乃是牛羊而又云豢則是犬豕也宗廟備六牲故云芻豢也凡在天下九州之民者無不咸獻其力以共寢廟之祀祭義古者天子諸侯必有養獸之官及歲時齋戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也注嵗時齋戒沐浴而躬朝之謂將祭祀卜牲君朔月月半巡視之君召牛納而觀之更本擇牲意國語楚語子期祀平王祭以牛爼于王王問於觀射父曰祀牲何及注王感爼肉而問牲用所及對曰祀加于舉注加增也舉人君朔望之盛饌天子舉以大牢祀以會注大牢牛羊豕也會會三大牢舉四方之奠王曰其小大何如對曰蒸嘗不過把握王曰何其小也對曰夫神以精明臨民者也故求備物不求豐大是以先王之祀也以一純二精注一純心純一而潔二精玉帛也三牲四時五色六律七事八種注七事天地民四時之務也八種八音也九祭十日十二辰以致之注九祭九州助祭也十日癸至甲也十二辰子至亥也擇其吉日令辰以致神百姓千品萬官億醜兆民經入畡數以奉之明德以昭之和聲以聽之以告遍至則無不受休王曰芻豢幾何對曰逺不過三月近不過浹日注逺謂三牲近謂雞鶩之屬浹日十日也右庀牲蕙田案三月庀牲廟享之敬以月計者也周禮大司馬中夏教茇舍遂以苖田獻禽以享礿中冬教大閲遂以狩田入獻禽以享蒸林氏椅曰周家因祭祀而用田因田而教戰禮記王制天子諸侯無事則歲三田一為乾豆注三田者夏不田蓋夏時也周禮春曰搜夏曰苖秋曰獮冬曰狩乾豆謂臘之以為祭祀豆實也疏一為乾豆者謂乾之以為豆實豆實非脯而云乾者謂作醢及臡先乾其肉故云乾豆是上殺者也春秋桓公四年榖梁傳四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩四時之田用三焉唯其所先得一為乾豆注上殺中心死速乾之以為豆實可以祭祀詩小雅車攻大庖不盈傳一曰乾豆二曰賔客三曰充君之庖故曰左膘而射之達于右腢為上殺射右耳本次之射左髀達于右􅞞為下殺而傷不獻踐毛不獻不成禽不獻禽雖多擇取三十焉其餘以與士大夫以習射于澤宫田雖得禽射不中不得取禽田雖不得禽射中則得取禽古者以辭讓取不以勇力取豆疏傳又因經大庖不盈廣言殺獸充庖之事一曰乾謂第一上殺者乾豆以為豆實供宗廟也白虎通王者諸侯所以田獵何也為田除害上以供宗廟下以簡集士衆也右田禽蕙田案田禽以祭廟享之敬因乎時者也禮記射義天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓右擇士周禮春官守祧掌守先王先公之廟祧若將祭祀其廟則有司修除之其祧則守祧黝堊之注廟祭此廟也祧祭遷主有司宗伯也修除黝堊互言之有司恆主修除守祧恆主黝堊鄭司農云黝讀為幽幽黑也堊白也爾雅曰地謂之黝墻謂之堊夏官𨽻僕掌五寢之掃除糞灑之事祭祀修寢注五寢五廟之寢也周天子七廟唯祧無寢詩云寢廟繹繹相連貌也前曰殿後曰寢泛掃曰掃掃席前曰拚灑灑也於廟祭寢或有事焉月令凡新物先薦寢廟不疏祭祀則在廟可知復云修寢者寢或有事不可修治之也右修除周禮天官大宰前期十日帥執事而卜日注前期前所諏之日也十日容散齊七日致齊三日前疏前期者謂祭日前夕為期云前期十日者即是祭十一日大宰帥宗伯大卜之屬執事之人而卜日云前期前所諏之日者此依少牢所諏之日即祭日也凡祭祀謂于祭前之夕為期今言前期十日者謂祭前十一日卜卜之後日遂戒使散齊致齊故云十日容散齊七日致齊三日案禮記祭統云散齊七日以定之致齊三日以齊之春官肆師凡祭祀之卜日宿為期詔相其禮大宗伯凡享大鬼帥執事而卜日太史大祭祀與執事卜日龜人祭祀先卜若有祭事則奉龜以往太卜大祭祀則視髙命龜注士喪禮曰宗人即席西面坐命龜疏引士喪禮證天子命龜處所與士禮同禮記表記內事用柔日疏乙丁巳辛癸五偶為柔也右卜日蕙田案卜日廟享之有事於旬日者也周禮天官太宰祀五帝則掌百官之誓戒與其具修前期十日遂戒享先王亦如之地官遂師凡國祭祀審其誓戒春官太史戒及宿之日與羣執事讀禮書而協事疏戒謂散齊七日宿謂致齊三日當此二日之時與羣執事與祭之官讀禮書而協事恐事有錯失物有不供故也夏官司士凡祭祀掌士之戒令秋官條狼氏凡誓執鞭以趨於前且命之注誓者謂將祭祀時也郊特牲説祭祀之誓曰卜之日王立於澤親聽誓命受教諫之義也陳氏禮書天子諸侯誓以卜吉之日戒宿以卜尸之日大夫前有十日之戒則與天子諸侯同後有一日之宿則與天子諸侯異此所謂有曲而殺也士有筮日而無諏日有宿而無戒與大夫異宿以三日而不以一日則與天子諸侯同此所謂有順而托也右誓戒周禮天官膳夫王齊日三舉玉府王齊則共食玉鬯人凡王之齊事共其秬鬯禮記玉藻齊則綪結佩而爵􅔖注綪屈也結又屈之思神靈不在事也爵韠齊服元端君羔幦虎犆注此君齊車之飾諸疏皇氏曰君謂天子侯祭義致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者注致齊思此五者也之疏此一節明祭前齊日事祭統及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也耆欲無止也及其將齊也防其邪物訖其耆欲耳不聽樂故記曰齊者不樂言不敢散其志也心不苟慮必依於道手足不茍動必依於禮是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後會於太廟疏此一節明將祭齊戒之義并明君與夫人皆致齊會于太廟夫婦交親行祭之義外謂君之路寢內謂夫人正寢是致齊並皆於正寢其實散齊亦然周禮春官世婦掌女宫之宿戒疏此亦祭前十日戒之使齊祭前三日又宿之禮記曲禮齊者不樂不弔禮器三月繫七日戒三日宿慎之至也昏義齊之元也以陰幽思也故君子三日齊必見其所祭者揚子孝子有祭乎有齊乎夫能存亡形屬荒絶者惟齊乎故孝子之於齊見父母之存也劉向説苑聖主將祭必潔齊精思若親之在方興未登㥥㥥憧憧專一想親之容貌倣佛此孝子之誠也四方之助祭空而來者滿而反虛而至者實而還皆取法則焉陳氏禮書君齊於路寢夫人齊於正寢士大夫亦各齊於適寢散齊夜處適寢亦豫外事所謂致齊於內散齊於外是也致齊晝夜處適寢不豫外事所謂非致齊也不晝夜居於內是也右齊應氏撝謙禮樂彚編王禮篇宿尸前宿一日大宗伯宿戒尸明日朝大宗伯卜尸如卜日之禮命曰孝王某來日丁亥用薦歲事於皇祖某公以某妃配某氏以某之某為尸世祖以下同尚饗吉則遂宿尸七廟共七尸太祖之尸太卜卜之文武二尸卜師二人卜之四廟卜人四人分卜之若大祫則毁廟之主昭穆各一尸共九尸大宗伯立於尸外門外羣執事各立於其後北面東上尸冕服出門左西面宗伯辟還北面再拜稽首傳擯介告曰孝王某來日丁亥用薦歲事於皇祖某公以某妃配某氏筮子為皇祖之尸占曰吉敢宿祝許諾致命尸許諾祝傳命於擯擯傳介宗伯又再拜稽首宗伯退尸送揖不拜六尸皆如之若不吉則遂改筮尸依周禮儀禮定蕙田案天子諸侯之祭必有尸祭統君執圭瓚灌尸是諸侯之祭有尸也周禮守祧各以其服授尸是天子之祭有尸也公羊子何休注曰禮天子以卿為尸諸侯以大夫為尸儀禮特牲饋食筮尸疏大夫士以孫之倫為尸若天子諸侯雖用孫之倫取卿大夫有爵者為之故鳬鷖曰公尸蓋以孫列之卿大夫為尸也尸之數則一廟一尸天子七諸侯五禮器周旅酬六尸大祫禮毁廟之主升合食而立二尸共九尸周禮大司樂尸出入則奏肆夏逆尸相尸禮小祝大祭祀逆尸祭統所使為尸者子行父北面而事之注云天子諸侯之祭朝事延尸於户外是以有北面事尸之禮陳氏祥道曰儀禮大夫前祭一日筮尸士則前祭三日筮尸大夫於尸再宿而戒士於尸一宿而無戒則大夫之禮有所屈士之禮有所伸推而上之則人君蓋亦前三日筮尸而宿戒之儀又加隆矣據此則宿尸之儀雖亡亦可理推惟宿尸者不知何人應氏謂大宗伯宿之未詳何據右卜尸宿尸應氏撝謙禮樂彚編王禮篇賓用先代之後賔如宗伯服出門左傳擯如諸公相朝之儀西面再拜宗伯東面再拜擯曰王薦歲事嘉賓將涖之敢宿介傳命賓曰某屏之臣某敢不敬奉王事介傳命宗伯再拜賓答拜宗伯退賓拜送宗伯答拜二王之後助祭見詩傳蕙田案宿賓之禮天子諸侯之祭無所考見其儀特牲有之書云虞賓在位商頌我有嘉客詩云殷士膚敏祼將于京頌有客有客亦白其馬書微子之命作賓於王家左傳宋先代之後于周為客則天子諸侯之祭蓋亦有賓而賓獻為九獻之一應氏據以補宿賓一條今存之右宿賓周禮天官小宰以法掌祭祀之戒具令百官府其其財用治其施舍聽其治訟注法謂其禮法也戒具戒官有事所當供宰夫以式法掌祭祀之戒具疏言式法者謂祭祀大小皆有舊法而戒敕使共具之凡禮事贊小宰比官府之具注比校次之否疏使知善惡是也夏官祭僕掌受命于王以視祭祀而警戒祭祀有司紏百官之戒具蕙田案以上三條掌戒具之官小宗伯辨六彛之名物以待祼將鬯人掌共秬鬯而飾之凡祭事廟用修凡祼事用概鬱人掌祼器凡祭祀之祼事和鬱鬯以實彛而陳之凡祼玉濯之陳之典瑞祼圭有瓚以肆先王大祭祀共其玉器而奉之蕙田案以上祼具小宗伯辨六尊之名物以待祭祀注待者有事則給之司尊彛掌六尊六彛之位詔其酌辨其用與其實春祠夏禴其朝踐用兩獻尊其再獻用兩象尊皆有罍秋嘗冬蒸其朝踐用兩著尊其饋獻用兩壺尊皆有罍凡六尊六彛之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌天官酒正凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數酒人掌為五齊三酒祭祀則供奉之以役世婦凡祭祀供酒以往注世婦謂宫卿之官掌女宫之宿戒及祭祀比其具酒人共酒因留與其奚為世婦役亦官聨禮記禮運元酒在室醴盞在户粢醍在堂澄酒在下注周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異盞與盎澄與沈蓋同物也奠之不同處重古略近也也疏此明祭祀酒之所陳之處元酒在室者元酒謂水以其色黑謂之元而大古無酒此水當酒所用故謂之元酒以今雖有五齊三酒貴重古物故陳設之時在於室內而近北醴盞在户醴謂醴齊盞謂盎齊以其後世所為賤之陳列雖在室內稍南近戶粢醍在堂者以卑之故陳列又南近户而在堂澄酒在下者澄謂沈齊也酒謂三酒事酒昔酒清酒之等稍卑之故陳在堂下也云盞與盎澄與沈蓋同物者以酒正文醴緹之間有盎此醴醍之間有盞又周禮緹齊之下有沈齊此醍齊之下有澄齊故云盞與盎澄與沈蓋同物也云奠之不同處重古略近者古酒奠於室近酒奠於堂或奠於下是重古略近其用酒之法四時之祭唯二齊三酒則自祫禘以下至四時祭皆通用也二齊醴盎也故鄭注司尊彛四時祭法但云醴盎而巳用二齊者朝踐王酌醴齊后亦酌醴齊饋食王酌盎齊后亦酌盎齊朝獻王還用醴齊再獻后還用盎齊亦尊相因也時祭之法用一齊故禮器云君親制祭夫人薦盎鄭云謂朝事時也又云君親割牲夫人薦酒鄭云謂進孰時也其行之法朝踐君制祭則夫人薦盎為獻進孰時君親割牲夫人薦酒朝獻時君酌盎齊以酳尸再獻時夫人還酌酒以終祭也賓獻皆酒加爵如禘祫之禮天子諸侯酌奠皆用齊酒卿大夫之祭酌奠用酒案司尊彛秋嘗冬蒸朝獻用兩著尊饋獻用兩壺尊則泛齊醴齊各以著尊盛之盎齊醍齊各以壺尊盛之凡五尊也又五齊各有明水之尊凡十尊也三酒三尊各加元酒凡六尊也通斚彛盛明水黃彛盛鬱鬯凡有十八尊故崔氏云大祫祭凡十八尊其明水元酒陳之各在五齊三酒之上蕙田案以上酒醴之具周禮秋官司烜氏掌以夫遂取明火於日以鑒取明水於月以共祭祀之明齍明燭共明水蕙田案此條供明水火天官幂人掌共巾幂祭祀以疏布巾幂八尊以畫布巾幂六彛蕙田案此條具巾幂亨人掌共鼎鑊注鑊所以煮肉及魚臘之器春秋桓公二年榖梁傳范注禮祭天子九鼎諸侯七蕙田案以上供鼎鑊春官小宗伯毛六牲頒于五官使供奉之注毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕疏頒之于五官者六卿應言六官而云五者天官尊不使奉牲故五官也云使共奉之者謂充人飬之至祭日之旦在廟門之前頒與五官使共奉之助王牽入廟即祭義所云卿大夫贊幣而從之地官封人凡祭祀飾其牛牲設其楅衡置其絼共其水藁注皆謂夕牲時也明疏夕牲謂祭前之夕正祭在厥明二時皆有此事據在前夕牲時言也其牛將殺水所以洗牲藁所以薦牲牛人凡祭祀共其牛牲之互與其盆簝以待事疏詩云或肆或將肆陳也謂陳於互者也夏官羊人掌羊牲凡祭祀飾羔秋官犬人凡祭祀供犬牲用牷物春官雞人凡祭祀共其雞牲蕙田案以上共犧牲之具地官廪人大祭祀共其接盛蔡氏德晉曰接盛謂藉田所入之米惟用以交接鬼神而為粢盛不以給他用舍人凡祭祀共簠簋實之陳之舂人祭祀共其齊盛之米􅐪人掌凡祭祀共盛蕙田案以上供粢盛簠簋天官籩人凡祭祀共其籩薦修之實醢人凡祭祀共薦羞之豆實醯人共祭祀之齊菹凡醯醬之物臘人凡祭祀共豆脯薦脯膴胖凡臘物注脯非豆實豆當為羞聲之誤也膴膺肉胖讀為判膴胖皆謂夾脊肉又禮家以胖為半體庖人共祭祀之好羞注謂四時所為膳食言疏尋常所共者並在內外饔今好羞則是非常之物謂美魚之屬也獸人凡祭祀共其死獸生獸地官囿人祭祀共其生獸死獸之物遂師凡國祭祀共其野牲夏官服不氏凡祭祀共猛獸蔡氏德晉曰猛獸謂狼熊之類中膳羞者掌畜祭祀共卵鳥地官川衡祭祀共川奠澤虞祭祀共澤物之奠天官漁人凡祭祀共其魚之鮮薧鱉人凡祭祀共蠯螺蚳以授醢人疏醢人有蠯醢螺蚳醢故以此三者授醢人甸師祭祀供野果蓏之屬地官場人祭祀共其果蓏天官鹽人祭祀共其苦鹽散鹽注杜子春讀苦為盬謂出鹽直用不凍治鄭司農云散鹽凍治者元謂散鹽鬻水為鹽蕙田案以上供庶羞籩豆之具春官司服王之吉服享先王則衮冕享先公則鷩冕凡大祭祀共其衣服而奉之蕙田案此條具冕服典路大祭祀則出路贊駕説注出路王當乘之贊駕説贊僕與趣馬也司常凡祭祀各建其旗蕙田案二條具車旗天官掌次凡祭祀張其旅幕張尸次注旅衆也公卿巳下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農云尸次祭祀之尸所居更衣帳幕人祭祀共其帷幕幄帟綬蕙田案二條具幕次春官司几筵掌五几五席之名物辨其用與其位凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之注鄭司農云昨席于主階設席王所坐也元謂昨讀曰酢謂祭祀及王受酢之席蕙田案以上具几席天官典絲凡祭祀共黼畫組就之物蕙田案此條共黼畫組就之物夏官校人凡大祭祀毛馬而頒之飾幣馬執撲而從之蔡氏德晉曰幣馬取以獻神蕙田案此條具幣馬天官甸師祭祀供蕭茅注鄭大夫云束茅立之祭前沃酒滲下去若神飲之故謂縮縮浚也元謂茅以共祭之苴亦以縮酒苴以藉祭縮酒泲酒也醴齊縮酌地官鄉師大祭祀共茅蒩注鄭大夫謂祭前藉也元謂苴士虞禮所謂苴刌茅長五寸束之是也祝設於几東席上命佐食取黍稷于苴三取膚祭如初此所以承祭既祭蓋束而去之守祧云既祭藏其隋是與春官司巫祭祀則共匰主及道布及蒩館注杜子春云蒩讀為鉏匰器名主謂木主也道布新布三尺也鉏藉也館神所館止也書或為蒩館或為蒩飽或曰布所以為藉也蒩飽茅裹肉也元謂道布者為神所設巾中霤禮曰以功布為道布屬于几也蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也主先匰蒩後館互言之者明共主以匰共蒩以筐大祝取其主蒩陳之器則退也士虞禮曰苴刌茅長五寸實于筐饌于西坫上又曰祝盥升取苴降洗之升入設于几東席上東縮陳氏禮書茅之為物柔順潔白可以施于禮者也故古者藉祭縮酒之類皆用焉茅有共于甸師者甸師之茅有入之鄉師有入之司巫則鄉師之所共者大祭祀也司巫之所共者凡祭祀也士虞有苴特牲少牢吉祭無苴而司巫祭祀共蒩館則凡王祭祀有苴矣賈公彥謂天子諸侯尊者禮備於理或然蔡氏德晉曰蕭香蒿也宗廟之祭以蕭合黍稷膟膫燔之詩所謂取蕭祭脂記所謂蕭合黍稷是也茅用以泲酒謂之縮酒又以藉尸所祭黍稷蕙田案以上具蕭茅匰主道布蒩館春官大司樂凡樂事大祭祀宿縣遂以聲展之小胥正樂縣之位王宫縣諸侯軒縣典庸器掌藏樂器庸器注庸器伐國所獲之器若崇鼎貫鼎及以其兵物所鑄銘也疏庸功也言功器者伐國所獲之器也及祭祀帥其屬而設筍虡陳庸器注設筍虡視瞭當以樂器縣焉陳功器以華國也地官鼓人以路鼓鼓鬼享春官大胥凡祭祀之用樂者以鼓徴學士夏官司兵祭祀授舞者兵司戈盾祭祀授旅賁殳故士戈盾授舞者兵蕙田案以上具樂舞庸器春官天府掌祖廟之守藏凡國之玉鎮大寶器藏焉若有大祭則出而陳之蕙田案此條陳寶器天官大府邦都之賦以待祭祀外府凡祭祀共其財用之幣齎賜豫之財用蕙田案二條具財用地官委人以法式供祭祀之薪蒸木材蔡氏德晉曰粗曰薪細曰蒸薪蒸以給炊燎木材以給張事夏官司爟凡祭祀則祭爟地官掌蜃祭祀共蜃器之蜃共白盛之蜃天官凌人祭祀共氷鑑秋官伊耆氏掌國之大祭祀共其杖咸蕙田案以上供雜具秋官銜枚氏國之大祭祀令禁無囂司𨽻邦有祭祀則役其煩蓐之事蕙田案二條禁令供役應氏撝謙禮樂彚編王禮篇前期三日烹人共鼎鑊內饔概鼎七爼于饔㸑饔㸑在門外東墊北上寺人帥女官而致於有司世婦率饎人饎人有奄有女有奚概甑甗七與簠簋於廪㸑在門外西墊北上饔㸑八十有四牛七羊七豕七麋七鹿七狼七田犬七雞七魚七豕七麕七兔七廪㸑四黍稷稻粱內饔率其屬陳鼎八十有四於鑊西北上陳爼八十有四各于其鼎西南登鉶各八十有四又各七皆於饔㸑南大祫則饔㸑一百有八廪㸑四鼎爼登鉶各一百有八登鉶又各九舍人陳簠簋於饎西簠四十有二簋五十有六大祫則簠五十有四簋七十有二司几筵鋪筵設同几見祭統單席見禮器筵太祖於太室東嚮北嚮羣穆祖考從之西上筵武宗於北牖南嚮羣昭祖考從之西上見朱子或問廟制辨又筵太祖於堂南向昭穆各三筵東嚮西嚮大祫東西各四筵羔郊特牲曰坐尸於堂禮器曰定詔於堂又曰設祭于堂特牲注曰筵于户西東靣設王昨席於室東北王位設黼依依前南嚮設莞筵紛純加繅席畫純加次席黼純左右玉几筵國賓於牖前昨席莞筵紛純加繅席畫純設后昨席於室東南西房亦如之掌次張尸次於庭西有幄張衆幕於門外具旅幕天府設盥尸盥七王盥一匜水實於槃中簞巾在門之右洗設於阼階東南東西當東榮陳玉鎮大寶器大司樂宿縣遂以聲展之小胥正樂縣之位典庸器帥其屬而設筍􅒶陳庸器縣鼓在西階下應鼓在東階下宫縣一肆司尊彛陳雞彛鳥彛皆有舟此春祠夏禴之彛若秋嘗冬蒸則用斚彛黃彛間祀追享則用虎彛蜼彛兩獻尊朝踐所用兩象尊饋獻所用皆有罍秋嘗冬蒸則用著尊壺尊間祀追享則用太尊山尊冪人奄人以疏布巾冪尊以畫布巾冪彛典瑞共玉瓚鬱人濯祼玉司烜氏共明水梓人濯溉蒲勺玉爵玉觚玉觶璧角璧散凡洗篚於東堂下勺爵觚觶實於篚此職於周禮無考據梓人為飲器凡勺爵觚觶皆梓人為之今補右戒具陳設天官寺人祭祀之事則帥女宫而致于有司佐世婦治禮事春官小宗伯辨六齍之名物與其用使六宫之人共奉之天官世婦掌祭祀之事帥女宫而濯溉為粢盛涖陳女宫之具凡內羞之物疏此婦人所掌祭祀謂祭宗廟內羞之物謂糗餌粉餈案少牢皆從房中來故名內羞春官世婦祭祀比其具帥六宫之人共粢盛注比次也具所濯概及粢盛之㸑內宗掌宗廟之祭祀薦加豆籩天官內司服凡祭祀共后之衣服及九嬪世婦凡命婦共其衣服追師掌王后之首服為九嬪及外內命服之首服以待祭祀屨人掌王及后之服屨辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之右內官戒具周禮天官大宰及執事視滌濯注執事初為祭事前祭日之夕滌濯謂溉祭器及甑甗之屬宰夫從太宰而視滌濯春官大宗伯宿視滌濯涖玉鬯省牲鑊疏謂祭前一日視所滌濯祭器潔淨與否小宗伯省牲視滌濯肆師凡祭祀詔相其禮視滌濯亦如之疏謂祭前之夕視滌濯祭器亦詔相其禮應氏撝謙禮樂彚編王禮篇大冡宰帥執事即位於門外揖入即位於堂下宰夫升自西階舉冪視尊彛司尊彛告潔反降視玉瓚勺爵觚觶於東堂下梓人告潔東北面告濯具視樂縣小胥告樂具宰夫告於太宰太宰出復外位宰夫之東孰視甑甗廪人告潔視簠簋舍人告潔之東孰視鑊視鉶鐙烹人告潔視七爼舉鼎冪內饔告潔宰夫告潔於太宰命執事比各具修事畢太宰退大宗伯小宗伯肆師帥執事即位於門外揖入即位於堂下肆師與二執事視勺爵觚觶角散於篚取勺洗之兼執以升乃令司尊啓二瓦甒之蓋司烜氏告潔肆師加二勺於甒南枋覆之次加二勺於彛鬱人鬯人告潔加四勺於四尊加三勺於三罍亦如之肆師反降東北面告濯具大宗伯出復外位肆師之西孰視粢盛舍人告潔視甑甗廪人告潔反告於宗伯之東孰視鑊視鐙鉶視七爼舉鼎冪內饔告潔反告於宗伯省牲牲人告充臘人告備事畢告於宗伯乃退右視滌濯涖玉鬯省牲鑊蕙田案儀禮特牲禮祭前一日有視濯視牲之儀祭日有陳設及位次之事少牢禮祭日視殺視牲又羮定實鼎饌器又將祭即位設几加勺載爼蓋大夫士之祭不祼不薦血腥惟室中尸主東面行饋食禮天子諸侯則有祼鬯薦腥朝踐之禮大夫士之儀簡故陳設省視皆在祭日天子諸侯禮繁則陳設省視當在祭前之日及祭之日肆師告潔告備小宗伯告時告備而已至於殺牲薦熟之事亦與大夫士之禮不同也周禮春官太史祭之日執書以次位常疏言執書者謂執行祭祀之書若今儀注以次位常者各居所掌位次常者此禮一定常行不改也大宗伯凡享大鬼治其大禮詔相王之大禮小宗伯凡祭祀詔相祭祀之小禮凡大禮佐大宗伯祭之日告時於王告備於王地官師氏凡祭祀王舉則從注舉猶行也故書舉為與杜子春云當為與謂王與祭祀之事以疏祭祀則郊廟是也王行之時師氏則從王所在皆須詔王以美道故也保氏凡祭祀王舉則從夏官太僕祭祀正王之服位詔法儀司士凡祭祀詔相其法事春官肆師祭之日相治小禮誅其怠慢者祭之日表粢陳告潔展器陳告備禮記文王世子庶子之正於公族者其在宗廟之中則如外朝之位宗人授事以爵以官注宗人掌禮及宗廟也以爵貴賤異位也以官官各有所掌也則疏此論同姓公族在宗廟之禮故云其在宗廟之中如外朝之位也宗人授事以爵以官者宗人掌禮之官及宗廟授百官之事以爵者隨爵之尊卑貴者在前賤者在後又以官之職掌各供其事天官內小臣若有祭祀則擯詔后之禮事相九嬪之禮事正內人之禮事世婦及祭之日涖陳女宫之具女御凡祭祀贊世婦右祭日外內敘事周禮春官雞人大祭祀夜呼旦以嘂百官注夜夜漏未盡雞鳴時也呼旦以警起百官使夙興凡國事為期則告之時注告其有司主事者少牢曰宗人朝服北面曰請祭期主人曰比于子宗人曰旦明行事告時者至此旦明而告之巾車大祭祀鳴鈴以應雞人注雞人主呼旦鳴鈴以應之聲且警衆必使鳴鈴者車有和鸞相應和之象右呼旦為期周禮春官典路掌王及后之五路辨其名物與其用説若有大祭祀則出路贊駕説夏官節服氏掌祭祀衮冕六人維王之大常旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪凡祭祀則服而趨虎賁氏掌先後王而趨以卒伍注王出將虎賁士居前後雖羣行亦有局分秋官條狼氏掌執鞭以趨辟王出入則八人夾道注趨辟趨而辟行人夏官太僕王出入則自左馭而前驅齊右掌祭祀前齊車王乘則持馬行則陪乘地官師氏凡祭祀使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝天官宫正凡邦之事蹕宫中廟中則執燭疏凡邦之事謂祭祀之事王當出入來往時𨽻僕與王蹕止行人於宫中及廟中也王出門向二處當寢晨而行爾時則宫正為王執燭為明也閽人掌守王宫之中門之禁大祭祀設門燎蹕宫門廟門注燎地燭也蹕止行者廟在中門之外三疏燭在地曰燎謂若天子百公五十諸伯子男皆十所作之狀蓋百根葦皆以布纒之以蜜塗其上若今蠟燭也內豎若有祭祀之事則為內人蹕春官大司樂王出入則令奏王夏禮記祭統君致齊于外夫人致齊于內然後會于太廟君純冕立於阼夫人副禕立於東房注太廟始祖廟也疏然後會于太廟者祭日君與夫人俱至太廟之中並立東房以俟行事尸既入之後轉就西房故禮器云夫人在房雖不云東西房下云夫人東酌罍尊則知夫人在房謂西房也禮器君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也注人君尊東也天子諸侯有左右房疏顧命云天子有左右房此云夫人在房又云東酌罍尊是西房也右王及后入廟易觀卦盥而不薦有孚顒若程傳盥謂祭祀之始盥手酌鬱鬯於地求神之時也盥者事之始人心方盡其精誠嚴肅之至也至既薦之後禮數繁縟則人心散而精一不若始盥之時矣朱子本義盥將祭而潔手也薦奉酒食以祭也顒然尊嚴之貌言致其潔清而不輕自用語類盥只是浣手不是灌鬯周禮夏官小臣大祭祀沃王盥疏王將獻尸先盥手洗爵乃酌獻故小臣為王沃水盥手也春官天府祖廟之中沃盥執燭右王盥禮記曾子問祫祭于祖則祝迎四廟之主主入廟出廟必蹕注祝接神者也蹕止行者也迎疏祫合祭祖太祖三年一祫謂當祫之年則祝高曽祖禰四廟主于太祖廟祭之天子祫祭則迎六廟之主今言迎四廟者舉諸侯言也蕙田案注疏皆以祫為三年大祫據陳氏禮書云考之經傳蓋天子之禮春則犆祭夏秋冬則合享犆祭各于其廟合享同于太廟祫有三年之祫有時祭之祫時祭小祫也三年之祫大祫也公羊傳曰大事者何大祫也則明時祭之祫為小祫矣蓋小祫止於未毁廟之主大祫巳及於毁廟之主禮記曰周旅酬六尸夫天子旅酬止於六尸諸侯迎主止於四廟非小祫而何據此則四時之享有迎主之禮可知右迎主周禮春官太祝掌六祝之辭以事鬼神示辨六號二曰鬼號注鬼號若云皇祖伯某皇疏謂若儀禮少牢特牲祝辭稱祖伯某四曰牲號五曰齍號注牲號為犧牲皆有名號少牢饋食禮曰敢用柔毛剛鬛士虞禮曰敢用潔牲剛鬛香合言疏大夫少牢祭故號此二牲士祭用一豕故號一牲香合者據曲禮黍之號也故彼鄭注云黍也大夫士於黍稷之號合言普淖而已此言香合蓋記者誤也凡大禋祀肆享則執明水火而祝號注肆享祭宗廟也疏號祝執明水火明主人圭潔之德云肆享宗廟也者按宗伯宗廟之祭六等皆稱享儀禮特牲饋食禮祝洗酌奠奠於鉶南遂命佐食啓會佐食啓會郤於敦南出立於西南面注酌奠奠其爵觶少牢饋食禮啓會乃奠之士疏引少牢者彼大夫禮與此禮相變是以異也敖氏繼公曰酌奠酌其所奠之酒也不云酒而云奠因事名之主人再拜稽首祝在左注稽首服之甚者祝在左當為主人釋辭于神也祝祝曰孝孫某敢用剛鬛嘉薦普淖用薦某事于皇祖某子尚饗也疏引少牢祝祝巳下者欲見迎尸之前釋孝子之辭卒祝主人再拜稽首少牢饋食禮祝酌奠遂命佐食啓會佐食啓會蓋二以重設於敦南注酌奠酌酒為神奠之後酌者酒尊要成也特牲饋食禮曰祝洗酌奠奠于鉶南疏酌奠酌酒為神奠之者以其迎尸之前將為隂厭為神不為尸故云為神奠之也云後酌者酒尊要成也者上經先設餘饌此經乃酌者酒尊物設饌要由尊者成故後設之也引特牲者酌奠之處當在鉶南此經不言故引為證也云重纍之者以黍稷各二二者各重纍于敦南欲合之也主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事於皇祖伯某以某妃配某氏尚享主人又再拜稽首注羊曰柔毛豕曰剛鬛嘉薦菹醢也普淖黍稷也普大也淖和也德能大和乃有黍稷疏號牲物者異於人用也蕙田案儀禮祝酌奠二條注疏以為迎尸之前將為陰厭為神不為尸故云為神奠之此大夫士陰厭之禮即周禮太祝所掌肆享執明水火而祝號者也天子諸侯有陰厭之禮故大祝有祝號之掌祭統所謂詔祝於室特牲所謂詔祝於室直祭祝于主者也周禮無陰厭酌奠之文故據儀禮補之下文既奠然有􅌊蕭合羶薌後有嗣舉奠即此奠也禮記郊特牲詔祝於室坐尸於堂注詔祝坐尸謂朝事時也疏下云用牲于庭升首于室故知詔祝于室當殺牲之初朝事之時也詔告也直祭祝於主注直祭祝于主謂薦孰時也直正也祭以孰為正則血腥之屬盡心焉而已疏薦孰正祭之時祝官以祝辭告于主若儀禮少牢敢用柔毛剛鬛用薦嵗事于皇祖伯某是也馬氏晞孟曰詔祝於室求之內之深者也索祭祝於祊求之於外之逺者也求之深求之逺蓋不知神之所在而求於此則疑於彼求於近則疑於逺而庶幾神之饗也鄭氏釋直祭祝於主謂薦孰之時謂之正祭蓋非是也陸氏佃曰直祭祝於主謂尸未入祝而巳是之謂直祭若少牢祝酌奠遂命佐食啓會主人西面祝祝曰孝孫某敢用柔毛剛鬛用薦嵗事于皇祖伯某尚饗當此節蕙田案特牲此條上云殷人先求之陰周人先求諸陽下接詔祝於室坐尸於堂用牲於庭升首於室直祭祝於主索祭祝於祊不知神之所在於彼乎於此乎山陰陸氏曰詔祝於室求諸內也坐尸於堂求諸外也用牲於庭求諸下也升首於室求之上也直祭祝于主求諸近也索祭祝於祊求諸逺也蓋皆始祭求神之事無緣中間忽雜入饋食及繹祭事鄭氏之説實未可信今考直祭祝於主即是詔祝於室是時方迎主入室尚未迎尸祝酌奠以饗神曽子問所謂陰厭周官所謂執明水火而祝號鄭注云酌酒為神奠之是也馬氏陸氏説極是乃疏既依注謂薦孰時矣又引少牢敢用柔毛剛鬛云云可見孔氏亦以此祝為即祝奠之祝而是時尸方未迎又從注以為薦孰是騎墻之見也祭統鋪筵設同几為依神也詔祝於室而出於祊此交神明之道也注祭者以其妃配亦不特几也詔祝告事於尸也疏詔告也謂祝官以言詔告神請其尸於室求之蕙田案此條禮所謂見事鬼神之道詔祝于室而出於祊與特牲直祭祝於主索祭祝於祊同謂尸未迎而求神故祝酌奠於室也注疏乃以告事於尸釋之謂祼鬯饋熟酳尸之等抑泛矣經云交神明正特牲所謂于彼乎于此乎蓋道求而未得之意乃指求神之事耳故緊接上為依神句何乃指為饋食以後耶案鄭氏注特牲祭統兩處詔祝于室皆誤一以為詔毛血於室一以為告事於尸特牲以詔室二字相同而誤祭統以詔祝二字拘泥而誤豈知詔室之事不止毛血詔祝之禮專指酌奠也禮運作其祝號元酒以祭薦其血毛疏作其祝號者祝史稱之以告鬼神故云作其祝號元酒以祭者謂朝踐之時設此元酒于五齊之上以致祭鬼神此重古設之其實不用以祭也蕙田案作其祝號元酒以祭正周禮太祝執明水火而祝號也祝號特牲少牢見於尸未入之前則此及周禮其為祝酌奠一節事明矣觀經文敘于薦其血毛之上則為始祭依神可知祝以孝告疏孝子告神以孝為首案少牢祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗是祝以孝告詩小雅信南山祭以清酒從以騂牡享于祖考箋清謂元酒也酒鬱鬯五齊三酒也與疏此章言正祭之事古者成王為祭之時祭神以清酒清謂元酒也酒謂鬱鬯與五齊三酒也先以鬱鬯灌而降神乃隨從於後以騂牡之牲迎而入於廟門以獻于祖考之神此言祭以清酒廣言祭用酒事則文當總攝諸酒然鬱人注云鬱金香草也則鬱非酒矣案三酒之名三曰清酒何知清酒非三酒之清酒者以言祭以清酒則以清酒祭神也三酒卑於五齊非祼獻所用蕙田案祭以清酒在從以騂牡之上正與禮運作其祝號元酒以祭文在薦其血毛之上同元酒清酒指酌奠之酒而酒又必加明水加明水則太祝執以祝號者也祭以清酒則祝酌奠于鉶南者也合諸經求之則為始祭未迎尸之前祝酌奠而為陰厭信矣鄭以清酒為祼事所用疏亦以鬱鬯不得為清酒可見行文之不可牽強如此陳氏禮書曰特牲禮主婦薦豆設敦鉶主人及佐食宗人設鼎爼祝洗酌奠于鉶南主人再拜然後祝出迎尸少牢亦薦豆設敦設鼎爼祝酌奠主人再拜然後祝出迎尸則未迎尸之前陰厭也陰厭西南奧奧室之暗故曰陰天子諸侯正祭上大夫有陰厭尸所以象神也厭所以飫神也殤之有厭為其無尸也正祭有厭為其尸不存故也陰厭尊有元酒蕙田案注疏及通典經傳通解皆不言天子諸侯祝酌奠為陰厭之事故凡遇詔祝之事或以為薦血毛或以為告事于尸或以為饋食各岐其説而不相合于元酒以祭祭以清酒或以為廣言祭用酒事或以為設元酒于五齊三酒之上于是天子諸侯陰厭一節竟無著落而大祝酌奠之祝亦無安排遂使周禮太祝之祝號虛懸而無歸宿而既奠􅌊蕭之奠登餕受爵之嗣舉奠兩奠俱無根本所以謂天子諸侯之祭禮亡蓋亡於注釋有以也然觀太祝之辨鬼號執明水火而祝號則其為未迎尸之前酌奠之祝號無疑也是時尸未迎而主先在室故特牲曰詔祝于室直祭祝於主祭統曰詔祝於室則其為室中祝主之事而在血毛之詔尸祼獻之前無疑也是時祝先酌奠而加以明水故禮運曰元酒以祭信南山曰祭以清酒其為陰厭有元酒有酌奠饗神無疑也有此一節而後天子之祭陰厭之禮無闕既奠舉奠之事有本陳氏禮書謂王未迎尸陰厭也天子諸侯正祭有陰厭又曰厭所以飫神正祭有厭謂其尸不存故也又曰陰厭尊有元酒誠可謂深於禮者矣故今列入迎主之後迎尸之前俟學禮者質焉通禮蔡氏德晉曰特牲少牢禮皆自饋食始故初即設饌祝酌奠于饌南天子諸侯祭禮有祼以降神則祝之酌奠饗神自當在祼後此時尚未設饌也先妥之而後祼故拜妥尸當在祼前祼則神巳降故祝酌奠以依之祝延尸出坐及朝踐畢仍延尸入室而舉此奠斚也祝之酌奠又預為嗣子舉奠張本固當次于王及后祼後也天子及上公祭用五齊九獻則祼用鬱齊宜以泛齊酌奠亦如之朝踐宜醴齊饋食宜盎齊王及后俱同三酳尸則王及后宜緹齊賓長宜沈齊也蕙田案蔡氏謂酌奠饗神及延尸入室舉此奠斚又為嗣子舉奠張本其説密矣更以其説而推之燔燎􅌊蕭乃益為可信祭義云建設朝事燔燎羶薌見以蕭光郊特牲云蕭合黍稷臭陽達于墻屋故既奠然後􅌊蕭合羶薌一􅌊蕭也鄭康成以祭義為朝事之􅌊蕭以郊特牲為饋食之􅌊蕭推其意蓋以朝事之時安得有黍稷未祭安得有奠求其義而不得故強分為二禮今案郊特牲云取膟膋燔燎升首報陽也升首在燔燎之後則其為朝事無疑而郊特牲之􅌊蕭合羶薌宜即同此燔燎羶薌而既奠二字究無著落故先儒多疑之而未定何元子曰一祭而前後有二燎未知然否陳氏禮書曰蕭合膟膋黍稷而燔燎之在朝事之節而朝事之初有迎牲奠盎之禮則祭義郊特牲之文雖殊其事一也蓋迎牲而刲之則血毛詔於室以示其幽全膟膋􅌊於堂以達其臭氣而羮定之所詔又在其後不足謂之尚臭也據二家之言皆以鄭氏分二節為未確而又不敢遽定是皆脫去祝酌奠一節無説以破鄭氏故陳氏又疑奠盎之奠為既奠之奠蓋疑之也今考郊特牲周人尚臭之下即繼之以鬱合鬯臭陰達于淵泉既灌迎牲致陰氣即繼之以蕭合黍稷臭陽達于墻屋既奠然後􅌊蕭合羶薌與虞氏尚氣殷人尚聲皆是始求神之時朝踐以前之事則郊特牲之􅌊蕭必不在饋食之時且饋事則以人道親之不應復有求神之舉今既指出酌奠祝饗一節不惟為嗣子舉奠張本而􅌊蕭之既奠亦豁然貫通無礙矣苐蔡氏以此為王及后祼之後考尸行灌禮天子及后各有一獻尸皆奠之不應再有酌奠饗神之事且饗神乃陰厭當在尸未入之前于義不合不可從觀承案禮經雖亡散見於三禮中者未嘗不各有脈絡可通康成於禮可謂勤矣而説之不精往往騎墻而矛盾得後人融浹而貫串之先王典禮乃始粲然心目可知漢人説禮之不精亦尚是讀禮之不熟耳右祝酌奠饗神陰厭周禮春官小祝大祭祀送逆尸沃尸盥疏逆尸者為始祭迎尸而入祭義云樂以迎來是也云沃尸盥者尸尊不就洗案特牲少牢尸入廟門盥于盤其時小祝沃水太祝肆享逆尸令鐘鼓王氏昭禹曰逆尸以鐘鼓為節太祝則令鐘鼓禮記曾子問孔子曰尸辨冕而出卿大夫士皆下之尸必軾必有前驅少儀酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲疏僕為尸御車之人將欲祭軷酌酒與尸之僕今為軷祭如似酌酒與君之僕以其為尸則尊之似君也其在車則左執轡右受爵者尸僕受酒法也其在車謂僕在車中時也僕既所主尸車故于車執轡而受爵也尸位在左僕立在右故左執轡右受爵祭酒也君僕亦然祭左右軌范者軌謂轂末范謂式前僕受爵將飲則祭之酒于車左右軌及前范也所以祭者為其神助巳不使傾危故也乃飲者祭遍乃自飲也祭統君迎牲而不迎尸别嫌也尸在廟門外則疑于臣在廟中則全于君君在廟門外則疑于君入廟門則全于臣全于子周禮天官大司樂尸出入則奏肆夏疏謂尸初入廟時天官掌次凡祭事張尸次注鄭司農云祭祀之尸所居更衣帳禮記禮器周坐尸陳氏禮書周官掌次祭祀張尸次儀禮大夫士之禮皆祝迎尸于門外祝入門左則固張于廟門之西矣及其入也主人立于阼階東西面尸盥而進升自西階主人升自阼階祝從尸主人從祝尸入即席東面而坐祝主人西面而立皆拜妥尸尸答拜遂坐而祭焉禮祀曰周坐尸詔侑無方觀儀禮大夫士之祭則人君事尸之儀略可見矣蔡氏德晉曰少牢禮祝出迎尸於廟門之外尸入門沃尸盥祝延尸尸升入祝主人皆拜妥尸尸答拜陸農師曰少牢特牲無朝踐故妥尸在饋尸之初若天子諸侯之妥尸宜在初入即席灌尸之前孔仲達曰在奧東面以南為尊主尊故在南尸來升席自北方尸主各席坐於主北詩小雅楚茨以妥以侑傳妥安坐也安疏祝詔主人拜尸右迎尸入妥尸應氏撝謙禮樂彚編王禮篇祭之日雞人夜呼旦以􅑧百官巾車展軨以應雞人太史奏雞鳴於階下鼓人鼓路鼓應門擊柝王夙興鬱人薦鬯王祼鬯鷩冕膳夫進食王一舉王世子及公族朝於內朝乃行駕玉輅典路贊駕太僕自左馭而前驅太馭掌馭行以肆夏趨以采齊以鸞和為節齊右持馬陪乘王出在外朝典路贊説朝士序儀太僕正位公卿以下進見如外朝之位王步至太廟羣臣序從節服氏衮冕六人維王之太常虎賁氏先後王而趨以卒五旅賁氏執戈盾夾王車而趨條狼氏八人執鞭以趨辟宫正蹕師氏使其屬帥四夷之𨽻各以其兵服守王之門外百官官以物至與祭者諸侯建旗孤卿建旜大夫士建物官府各象其事大司冦及肆師率旅賁氏先入清宫王后服副衣禕衣赤舄乘重翟錫面朱總自闈門出九嬪世婦女御女史從內小臣前驅內豎蹕即位於西房王即位於門外東方西面王世子及公卿以下序爵於西方北面賓即位于西方東面祭僕六人立於王後傳王命命太祝小祝立於賓西北東面北上小宗伯告備於王王揖先入太僕齊右祭僕從入虎賁氏列於兩階之東西序王先入門右大司樂令奏王夏御僕一人奉槃東面於庭南小臣奉匜水西面於槃東御僕一人奉簞巾西面于槃北乃沃王盥於槃上卒盥坐奠簞取巾興振之三以授王王拭乃入立於阼階與祭者從入列於階下如門外之位太祝小祝六人先時迎羣廟之主升於筵及是宗人擯舉手曰有司具請升王登太宰奉幣從入太室祝在左王再拜稽首祝祝曰孝王某某年月吉日丁亥敢以嘉幣薦歲事於太祖某公以某妃配某氏世祖以下同尚饗王又再拜稽首祝出迎尸於廟門之外王出降立於阼階東西面祝先入門右每尸一祝尸入門左王及賓皆辟位小祝沃盥如王入之儀大司樂令奏肆夏尸升自西階入室祝從王升自阼階大宗伯小宰師氏保氏御僕祭僕從祝先入東面尸升筵坐於主北王西向立於户內拜妥尸尸不言答拜祝拜尸答拜遂坐大冡宰及六官升入拜妥羣尸亦如之大祫則更用二王乃退立蕙田案應氏所敘禮儀節次多有謬誤如王夙興鬱人薦鬯此見國語係藉田之禮其祭宗廟不見有夙興祼鬯之文恐未便添入文王世子公族朝于內朝鄭注謂以宗族事會並不指祭時而言且寧有將入廟行祭而先受朝之理又在外朝有序儀正位羣臣進見之儀俱繁冗無據既云王步至太廟又云節服氏維王之太常旅賁氏夾王車而趨忽步忽車不相照應入廟而旅賁清宫禮亦無文至入室祝拜不及酌奠尤為踈漏觀承案應氏禮書亦號詳明然細加考究其不免踈漏者有如此甚矣禮學之難言非有精心大力者烏足語此五禮通考卷八十六
