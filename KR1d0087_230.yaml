body:
  text: 五禮通考卷二百二十刑部尚書秦蕙田撰賓禮一天子受諸侯朝蕙田案易比之象曰先王以建萬國親諸侯周禮大宗伯以賔禮親邦國賔禮之大者莫先于朝朝之别名曰朝曰覲曰宗曰遇舜典云乃日覲四嶽羣牧又云肆覲東后又云羣后四朝禹貢云江漢朝宗于海惟遇禮不見於古然以上三者推之則朝覲宗遇之名虞夏以前固已有之先儒謂夏宗依春冬遇依秋故經傳多言朝覲而罕及宗遇又對文言之則朝覲宗遇其時其儀有别散文則皆云朝故覲禮諸侯前朝皆受舍於朝則覲亦云朝春秋僖二十八年夏五月公朝於王所冬公朝於王所則宗與遇亦云朝也儀禮惟有覲禮一篇今博引諸經傳之文以補之統名曰朝不復區分云周禮春官大宗伯以賔禮親邦國注親謂使之相親附賔禮之别有八鄭氏鍔曰天子之於諸侯以分言之則君臣以情言之則賔主故先王不待以純臣之義而以賔禮親之彼安得不吾親哉春見曰朝夏見曰宗秋見曰覲冬見曰遇注此以諸侯見王為文六服之內四方以時分來或朝春或宗夏或覲秋或遇冬名殊禮異更遞而遍朝猶朝也欲其來之早宗尊也欲其尊王覲之言勤也欲其勤王之事遇偶也欲其若不期而俱至鄭氏鍔曰朝宗則在朝時則用春夏其位則諸公東面諸侯西靣説者以為萬物交際之時以象生氣之文人君則於堂下而見之所以通上下之情覲遇則在廟時則用秋冬其位則一於北靣説者以為萬物分辨之時以象殺氣之質也人君則於堂上而見之所以正君臣之分記曰覲禮不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下蓋朝禮出迎賔則下堂覲禮不迎賔則不下堂也朝則天子當寧而立寧者門屏之間以象陽之出布散於外覲則天子當扆而立扆者戶牖之間以象隂之入收藏於內此又朝覲之别也秋官大行人掌大賔之禮及大客之儀以親諸侯注大賔要服以內諸侯大客謂孤卿春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮注此以王見諸侯為文圖比陳協皆考績之言王者春見諸侯則圖其事之可否秋見諸侯則比其功之髙下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝歲四時分來更迭如此而遍司馬法曰春以禮朝諸侯圖同事夏以禮宗諸侯陳同謀秋以禮覲諸侯比同功冬以禮遇諸侯圖同慮時以禮會諸侯施同政殷以禮宗諸侯發同禁易氏祓曰此即大宗伯所謂賔禮也大宗伯詳其賔禮之名大行人又以詳其命諸侯之實然宗遇會同亦或總以朝覲名者曲禮曰天子當依而立諸公東面諸侯西面曰朝鄭氏謂夏宗依春此圖事陳謨皆所以責其始冬遇依秋此比功協慮皆所以考其終故曲禮言朝覲而經亦多以朝覲為主至於會同之發禁施政又因朝覲之時而行其禮故經亦謂之大朝覲此朝覲宗遇之名雖異而先王行禮之意一也禮記曲禮天子當依而立諸侯北靣而見天子曰覲天子當寧而立諸公東靣諸侯西靣曰朝注諸侯春見曰朝受摯於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於內朝而序進覲者位於廟門外而序入王南靣立於依寧而受焉夏宗依春冬遇依秋春秋時齊侯唁魯昭公以遇禮相見取易略也覲禮今存朝宗遇禮今亡之疏案宗伯春曰朝夏曰宗秋曰覲冬曰遇若通而言悉曰朝覲禮云諸侯前朝皆受舍於朝又云乘墨車載龍旗弧韣乃朝又春秋僖二千八年夏五月經曰公朝於王所知朝通名也但朝覲宗遇禮異耳天子當依而立是秋于廟受覲禮也諸侯來朝至于近郊王使大行人皮辨用璧以迎勞之諸侯亦皮辨從使者以入天子賜舍諸侯受舍聽天子之命其朝日未出之前諸侯上介受舍于廟門外同姓西面北上異姓東面北上至朝日質明諸侯禆冕先釋幣於其齊車之行主天子衮冕在廟當依前南面而立不迎賔諸侯自廟門外位天子使上擯進諸侯諸侯入廟門右坐奠圭玉而再拜所以奠圭玉者卑見於尊奠贄不授也擯者命升西階親授諸侯於是坐取圭玉升堂王受玉是當依而立之時也王既受玉而諸侯降階東北面再拜稽首擯者延之使升成拜是北面曰覲時所以同北面者覲遇秋冬隂氣質斂故不布散天子當寧而立者此謂春夏受朝時也謂天子受朝於路門外之朝於門外而寧立以待諸侯之至王既立寧諸侯次第而進諸公在西諸侯在東而朝王陽氣文也故因文而分布也崔云諸侯春夏來朝各乘其命車至皋門外陳介也天子車時在大門內傳辭既訖則乘車出大門下車若升朝之時王但迎公自諸侯以下則隨之而入更不别迎也入至文王廟門天子還服朝服立于路門之外諸侯更易服朝服執贄而入應門而行禮故王當寧以待諸侯次第而進故云序進謂入應門諸公東面諸侯西面若熊氏之義則朝無迎法惟享有迎諸侯之禮蕙田案熊氏之説為長王制天子無事與諸侯相見曰朝考禮正刑一德以尊於天子注事謂征伐樂記朝覲然後諸侯知所以臣祭義朝覲所以教諸侯之臣也經解朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣中庸朝聘以時厚往而薄來所以懷諸侯也疏厚往謂諸侯還國王者以其財賄厚重往報之薄來謂諸侯貢獻使輕薄而來朱子章句王制比年一小聘三年一大聘五年一朝厚往薄來謂燕賜厚而納貢薄孟子諸侯朝於天子曰述職述職者述所職也朱子章句述陳也述所職陳其所受之職也諸侯朝於天子曰述職一不朝則貶其爵再不朝則削其地三不朝則六師移之五經異義公羊説諸侯四時見天子及相聘皆曰朝以朝時行禮卒而相逢於路曰遇古周禮説春曰朝夏曰宗秋曰覲冬曰遇許慎案禮有覲經詩曰韓侯入覲書曰江漢朝宗于海知其朝覲宗遇之禮從周禮説鄭駮之云此皆有似不為古昔案覲禮曰諸侯前朝皆受舍于朝朝通名右朝覲宗遇名義書舜典五載一巡守羣后四朝傳各會朝于方嶽之下凡四處故曰四朝堯舜同道舜攝則然堯又可知鄭氏康成曰巡守之年諸侯朝於方嶽之下其間四年四方諸侯分來朝於京師歲遍朱子曰五載之內天子巡守者一諸侯來朝者四蓋巡守之明年則東方諸侯來朝於天子之國又明年則南方之諸侯來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復巡守是則天子諸侯雖有尊卑而一往一來禮無不答是以上下交通而逺近洽和也蕙田案此唐虞朝覲之期羣后四朝鄭氏以為歲一朝朱子蔡氏以為四歲一朝以理推之朱蔡為長蓋唐虞以前諸侯萬國其地逺近不同必每嵗分四時而迭來是率天下而路也又鄭志答孫皓問曰唐虞之禮五載一巡守夏殷之禮天子蓋六年一巡守諸侯間而朝天子孔頴達以為夏殷諸侯分為五部每年一部來朝天子然則舜時四朝其制亦當略同但舜時分諸侯為四部四歲而遍合巡守之年為五年一朝夏殷分諸侯為五部五歲而遍合巡守之年則為六年一朝也孔傳以四朝為巡守會朝方嶽之下不指來朝而言案上文東巡守云肆覲東后已見方嶽之朝此處不應重見孔説疑未然也觀承案朱子此條極明下大行人之歲一見二歲一見三歲一見云云亦即是此例耳蓋言歲一見者乃巡守明年之第一歲也二歲一見三歲一見者亦是第二歲第三歲非謂每一歲每二歲每三歲也周官六年五服一朝傳五服侯甸男采衛六年一朝會京師又六年王乃時巡考制度於四嶽傳周制十二年一巡守春東夏南秋西冬北故曰時巡考正制度禮法於四嶽之下如虞帝巡守然諸侯各朝於方嶽大明黜陟傳覲四方諸侯各朝於方嶽之下大明考績黜陟之法朝疏此篇説六卿職掌皆與周禮符同則六年五服一亦應是周禮之法而周禮大行人諸侯各以服數來朝無六年一朝之事昭十三年左傳叔向曰明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明説左傳者以為三年一朝六年一會十二年而盟事與周禮不同謂之前代明王之法先儒未嘗措意不知異之所由計彼六年一會與此六年五服一朝事相當也再會而盟與此十二年王乃時巡諸侯各朝於方嶽亦相當也叔向盛陳此法以懼齊人使盟若周無此禮叔向妄説齊人當以辭拒之何所畏懼而敬以從命乎且云自古以來未之或失則當時猶尚行之不得為前代之法脅當時之人明矣明周有此法禮文不具爾大行人所云見者皆言貢物或可因貢而見何必見者皆是君自朝乎遣使貢物亦應可矣大宗伯云時見曰會殷見曰同時見殷見不云年限時見曰會何必不是再朝而會乎殷見曰同何必不是再會而盟乎周公制禮若無此法豈成王謬言叔向妄説也計六年大集應六服俱來而此文惟言五服孔以五服為侯甸男采衛蓋以要服路逺外逼四夷不必常能及期故寬言之而不數也蘇氏軾曰一朝畢朝也朝以逺近為疏數六年而遍五服畢朝也周禮秋官大行人邦畿方千里其外方五百里謂之侯服歲一見又其外方五百里謂之甸服二歲一見又其外方五百里謂之男服三歲一見又其外方五百里謂之采服四歲一見又其外方五百里謂之衛服五歲一見又其外方五百里謂之要服六歲一見注要服蠻服也此六服去王城三千五百里相距七千里公侯伯子男封焉其朝貢之歲四方各四分趨四時而來或朝春或宗夏或覲秋或遇冬九州之外謂之蕃國世一見注九州之外夷服鎮服蕃服也曲禮曰其在東夷北狄西戎南蠻雖大曰子春秋傳曰杞伯也以夷禮故曰子然則九州之外其君皆子男也無朝貢之歲父死子立及嗣王即位乃一來耳蕙田案此成周朝覲之期周公制禮分天下以為六服而酌道里之逺近定朝會之疏數侯服歲朝甸服二歲而朝男服三歲而朝采服四歲而朝衛服五歲而朝要服六歲而朝計六年之內侯服六朝甸服三朝男服再朝采服衛服要服皆一朝而六服之應朝者遍故曰六年五服一朝尚書舉其綱周禮分其目其實無二法也至十二年王巡守諸侯畢朝於方嶽之下則侯服十二朝甸服六朝男服四朝采服三朝衛服三朝要服再朝而六服之朝期一周尚書云又六年王乃時巡周禮十二歲王巡守殷國亦一法也周禮言六服書何以止言五服不數要服也先王之制重內而略外故武成云邦甸侯衛而酒誥及康王之誥亦云侯甸男采衛不及要服也孔疏不明其旨乃以五服一朝為諸侯親朝周禮所云見者為遣使入貢案大宗伯春見夏見秋見冬見時見殷見凡云見者皆諸侯親見天子不得以遣使當之孔疏誤矣蘇氏解六年五服一朝最明快觀承案成周朝覲之期與唐虞夏殷異者唐虞分四年夏殷分五年成周分六年故唐虞曰羣后四朝夏殷曰五服一朝成周曰六服一朝若六年之內侯服六朝甸服三朝男服再朝則非六服一朝矣且疏數不均之甚而侯甸男三服不免有國君道長之勤恐未可為定論也宜並存以俟來者禮記王制諸侯之於天子也比年一小聘三年一大聘五年一朝注比年每歲也小聘使大夫大聘使卿朝則君自行然此大聘與朝晉文霸時所制也虞夏之制諸侯歲朝周之制侯甸男采衛要服六者各以其服數來朝疏昭三年左傳鄭子太叔曰文襄之霸也其務不煩諸侯令諸侯三歲而聘五歲而朝故云晉文霸時所制而晉文霸時亦應有比年大夫之聘但子太叔略而不言此亦據傳文直云大聘與朝不云比年小聘案左傳三年聘五年朝諸侯相朝之法今此經文云諸侯之於天子則文襄之制諸侯朝天子與自相朝同也又鄭駮異義公羊説比年一小聘三年一大聘五年一朝以為文襄之制録王制者記文襄之制非虞夏及殷法也熊氏或以此為虞夏法或以為殷法文義雜亂不復相當曲為解説其義非也云虞夏之制諸侯歲朝者案尚書堯典云五載一巡守羣后四朝鄭注云巡守之年諸侯朝於方嶽之下其間四年四方諸侯分來朝於京師歲遍是也案孝經注諸侯五年一朝天子天子亦五年一巡守熊氏以為虞夏制法諸侯歲朝分為四部四年又遍總是五年一朝天子乃巡守故云諸侯五年一朝天子天子亦五年一巡守案鄭注尚書四方諸侯分來朝於京師歲遍則非五年乃遍又孝經之注多與鄭義乖違儒者疑非鄭注今所不取熊氏之説非也虞夏之制但有歲朝之文其諸侯自相朝聘及天子之事則無文不可知也春秋文十五年左傳云諸侯五年再相朝以修王命古之制也案鄭志孫皓問云諸侯五年再相朝不知所合典禮鄭答云古者據時而道前代之言唐虞之禮五載一巡守夏殷之時天子蓋六年一巡守諸侯間而朝天子其不朝者朝罷朝五年再朝似如此制典禮不可得而詳如鄭志之言則夏殷天子六年一巡守其間諸侯分為五部每年一部來朝天子朝罷還國其不朝者朝罷朝諸侯至後年不朝者往朝天子而還前年朝者今既不朝又朝罷朝諸侯是再相朝也如鄭之意此為夏殷之禮而鄭又云虞夏之制諸侯歲朝以夏與虞同與鄭志乖者以羣后四朝文在堯典堯典是虞夏之書故連言夏其實虞也故鄭志云唐虞之禮五載一巡守今知諸侯歲朝惟指唐虞也其夏殷朝天子及自相朝其禮則然其聘天子及自相聘則無文也云周之制以下周禮大行人文吳氏澄曰書言五載一巡守羣后四朝謂不當巡守之年每年一方諸侯來朝周而復始則是各方諸侯每五年而一朝京師也蕙田案此晉文霸時之制五年一朝蓋取唐虞之法比年小聘三年大聘則周禮邦交之正法也孔氏頴達曰周室既衰政在霸主不敢自同天子以明王舊制大煩諸侯不敢依用故設此制以簡之春秋昭公十二年左氏傳明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明注歲聘以修其職業三年而一朝正班爵之義率長幼之序六年而一會以訓上下之則制財用之節十二年而一盟所以昭信義也凡八聘四朝再會王一巡守盟於方嶽之下疏尚書周官曰六年五服一朝又六年王乃時巡考制度於四嶽諸侯各朝於方嶽大明黜陟如彼文六年五服諸侯一時朝王即此再朝而會是也此傳之文與尚書正合杜言巡守盟於方嶽暗與彼義符同明是周典之舊法也而周禮之文不載此法大行人云侯服歲一見其貢祀物甸服二歲一見其貢嬪物男服三歲一見其貢器物采服四歲一見其貢服物衛服五歲一見其貢材物要服六歲一見其貢貨物先儒説周禮者皆以彼為六服諸侯各以服數來朝與此傳文無由得合先達通儒未有解者古書亡滅不可備知然則尚書周官是成王號令之辭尚書之言定是正法左氏又與彼合言必不虛周禮又是明文未得不信蓋成王周公之時即自有此二法也又周禮每歲一見惟言貢物何必見者即是親朝各計道路長短或當遣使貢耳先儒謂彼為朝未有明據大行人又云十有二歲王巡守殷國巡守之歲周禮同於尚書六年一朝尚書何必違禮又大宗伯云時見曰會殷見曰同鄭元以為時見無常期也諸侯有不順服者王將有征討之事合諸侯而命事焉十二歲王如不巡守則六服盡朝謂之殷見鄭以時見無常期者出自鄭之意耳非有明文可據也殷見是此再會而盟時見當此再朝而會未必既如鄭説時見為無常期也蓋此傳及尚書是正禮也大行人歲一見者是遣使貢物非親朝也今此上聘朝會雖以為諸侯於天子之禮其諸侯相朝亦當然也其昭明於神雖天子於諸侯之禮然王官之伯及霸主亦得於諸侯為盟故晉為盟主以此告齊令齊受盟也必知此朝聘文兼諸侯者以釋例引明王之制八聘四朝云文襄之制因而簡之三歲而聘五歲而朝以諸侯為文明歲聘間朝兼諸侯相朝也知盟年朝會俱行者以傳云再朝而會故知盟年朝會不廢也又云歲聘以志業不言再聘以行朝故知朝年不行聘禮王制孔疏昭十三年左傳云歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明賈逵服虔皆以為朝天子之法崔氏以為朝霸主之法鄭康成以為不知何代之禮故異義云公羊説諸侯比年一小聘三年一大聘五年一朝天子左氏説十二年之間八聘四朝再會一盟許慎謹案公羊説虞夏制左氏説周禮傳曰三代不同物明古今異説鄭駁之云三年聘五年朝文襄之霸制周禮大行人諸侯各以服數來朝其諸侯歲聘間朝之屬説無所出晉文公強盛諸侯耳非所謂三代異物也是鄭以歲聘間朝文無所出不用其義也言晉文公但強盛諸侯耳何能制禮而云三代異物乎是難許慎之辭也盛氏世佐曰此諸侯之邦交也故晉為霸主而叔向舉以告齊歲聘即比年小聘也間朝謂朝無定期惟以王事間暇之時行之成十三年傳云世之治也諸侯間於天子之事則相朝亦此意也朝既無定期則會盟之取節於朝者皆無定期矣朝會之屬皆不為立期限者所以寬諸侯使得視其逺近親疏以為之節也所謂明王之制蓋如此如注所言則十二年之間政繁期促乃爾豈得為周典之舊法哉且與尚書周禮皆不合而疏家曲為附會過矣書云六年五服一朝謂六年之間而諸侯來朝者遍也其義正與大行人所言六服諸侯各以服數來朝者合書止言五服者不數要服也汪氏克寬曰衛服之外聖人雖制之服令蕃國世一見而不必其來非若五服一歲至五歲各以所貢來見也考之武成止曰邦甸侯衛酒誥康王之誥亦止曰侯甸男采衛而蠻夷鎮蕃不與焉於此不必辨其服之異而自得其説之同矣蕙田案此周初朝方伯之法崔氏以為朝霸主者得之自賈服杜諸儒以為朝天子又為十二年八聘四朝再會一盟之説而孔頴達遂以尚書之文附會之以再朝而會當六年五服一朝以再會而盟當十二年巡守至以間朝為三年一朝則古無此法惟周禮男服三歲一見為近之然舍侯甸采衛而獨舉男服亦無是理也盛世佐引諸侯間於天子之事則相朝以證間朝之義可謂發前人所未發國語周語先王之制邦內甸服注邦內謂天子畿內千里之地商頌曰邦畿千里惟民所止王制曰千里之內曰甸京邑在其中央故夏書曰五百里甸服則古今同矣自商以前并畿內為五服武王克殷周公致太平因禹所弼除畿內更制天下為九服千里之內謂之王畿王畿之外曰侯服侯服之外曰甸服今謀父諌穆王稱先王之制猶以王畿為甸服者甸古名世俗所習也故周襄王謂晉文公曰昔我先王之有天下也規方千里以為甸服是也周禮亦以蠻服為要服足以相况矣邦外侯服注邦外邦畿之外方五百里之地謂之侯服侯服侯圻也言諸侯之近者歲一來見侯衛賔服注此總言之也侯侯圻也衛衛圻也言自侯圻至衛圻其間凡五圻圻五百里五五二千五百里中國之界也謂之賔服常以服貢賔見於王五圻者侯圻之外曰甸圻甸圻之外曰男圻男圻之外曰采圻采圻之外曰衛圻周書康誥侯甸男采衛是也凡此服數諸家之説皆紛錯不同惟賈君近之蠻夷要服注蠻蠻圻也夷夷圻也周禮衛圻之外曰蠻圻去王城三千五百里九州之界也夷圻去王城四千里周禮行人職衛圻之外謂之要服此言蠻夷要服則夷圻朝貢或與蠻圻同也要者要結好信而服從之戎翟荒服注戎翟去王城四千五百里至五千里也四千五百里為鎮圻五千里為蕃圻在九州之外荒裔之地與戎翟同俗故謂之荒荒忽無常之言也甸服者祭注供日祭也此采地之君其見無數侯服者祀注供月祀也堯舜及周侯服皆歲見賓服者享注供時享也享獻也周禮甸圻二歲而見男圻三歲而見采圻四歲而見衛圻五歲而見其見也皆以所貢助祭於廟孝經所謂四海之內各以其職來祭要服者貢注供歲貢也要服六歲一見荒服者王注王王事天子也周禮九州之外謂之蕃國世一見各以其所貴珤為贄詩曰自彼氐羌莫敢不來王日祭注日祭祭於祖考謂上食也近漢亦然月祀注月祀於曽髙時享注時享於二祧歲貢注歲貢於壇墠終王注終謂垂終也朝嗣王及即位而來見先王之訓也魯語夫禮所以正民也是故先王制諸侯使五年四王一相朝也注賈侍中云王謂王事天子也歲聘以志業間朝以講禮五年之間四聘於王而一相朝者將朝天子先相朝也唐尚書云先王謂堯也五載一巡守諸侯四朝昭謂以堯典相參義亦近之然此欲以禮正君宜用周制周禮中國凡五服逺者五歲而朝禮記曰諸侯之於天子也比年一小聘三年一大聘五年一朝謂此也晉文公霸時亦取於此禮蕙田案國語論朝期者二條周語祭公謀父所言是周制魯語曹劌所言是唐虞之制陳氏禮書周官之制因地以辨服因服以制朝因朝以入貢則逺者不疏邇者不數不疏者不至於懈不數者不至於罷矣侯服歲一見甸服二歲一見男服三歲一見采服四歲一見衛服五歲一見要服六歲一見則侯服每歲朝甸服二歲朝男服三歲朝采服四威朝衛服五歲朝要服六歲朝而要服朝之歲五服盡朝於京師則侯服更六見甸服更四見男采衛各二見矣書曰六年五服一朝而不及要服者以其當朝之年而不數之也又六年王乃時巡則從王巡守各會於方嶽矣晉叔向曰明王之制歲聘以志業間聘以講禮再聘而會以示威再會而盟以顯昭明先儒以為間朝在三年再朝在六年再會在十二年而再朝再會之年適與書合則叔向以為明王之制乃周制也然周三年一朝男服之禮耳叔向之言特為男服而發何耶考之周禮諸侯春入貢秋獻功此之為歲聘服之見有歲方之見有時此之謂間朝朝有常歲而會盟無常期故有事而會不協而盟則同疏於朝而盟又疏於會此所以言再朝而會再會而盟非謂會必六年盟必十二年也然則六年盡朝於京師與有事而會者異矣大宗伯殷俯曰視鄭氏謂殷俯者一服朝之歲以朝者少諸侯使卿以大禮衆聘焉一服朝在元年七年十一年賈公彥謂甸服二年四年六年八年十年朝男服三年六年九年朝采服四年八年朝衛服五年十年朝而元年七年十一年甸服采衛皆不朝矣故知一服朝在元年七年十一年也然觀康王即位太保率西方諸侯入應門左畢公率東方諸侯入應門右各執壤奠咸進陳戒則天下諸侯莫不盡朝矣自此侯服歲一見甸服二歲一見以至三歲四歲五歲六歲一見者皆以元年為始未聞元年獨一服朝也又行人云殷俯以除邦國之慝蓋邦國有慝諸侯乃使其臣行衆俯之禮則衆俯亦無常期此鄭賈立説之誤也蕙田案書之五服一朝與周禮侯服歲一見以下本無二法而孔疏強分之左傳歲聘間朝再朝而會再會而盟與書之六年一朝非一法也而孔疏強合之陳用之調停其説謂要服朝之歲五服盡朝於京師然六服盡朝惟十二年王不巡守乃有之經云六年五服一朝者謂六服逺近六年而遍非謂五服盡朝也且男之於采采之於衛相距各五百里其逺近不等故有三歲四歲五歲之限今如用之之説則六年之內既有當朝之期又有盡朝之期采服雖云四歲見衛服雖云五歲見實與男服之三歲見者等耳豈所謂因地以辨服因服以制朝者乎陳氏又駁鄭康成元年一服朝之説引書康王之誥以證之其説甚辨愚竊以為不然何者六年一朝十二年一巡守論六服之朝期當以巡守之明年為始鄭氏所謂元年一服朝者正謂巡守之明年甸服來朝乃十二年中之第一年非以是為即位之元年也六服分歲而朝者禮之常故可以年計因即位而五服盡朝者非禮之常不可以年計陳氏乃比而同之其不然矣觀承案書之五服一朝與周禮侯服歲一見以下本無二法此論最精可知孔疏之非矣然則魯語四方諸侯五年中四王一相朝者正所謂五服一朝也而周禮則曰六年五服一朝者蓋荒鎮蕃統於要服來朝於第六年而五服諸侯則已於第五年而遍也此六年本夏殷時巡之歲然時異事變有不可一例者故又六年而王乃一巡焉則是五服已再朝而非止一朝此則周禮之與夏殷不同者耳附論四方朝春宗夏覲秋遇冬之期周禮大宗伯賈疏六服之內謂要服以內侯甸男采衛要之等四時分來春東方六服當朝之歲盡來朝夏南方六服當宗之歲盡來宗秋西方六服當覲之歲盡來覲冬北方六服當遇之歲盡來遇也大行人賈疏案馬氏之義六服當面各四分之假令侯服四分之東方朝春南方宗夏西方覲秋北方遇冬南方侯服亦然西方北方皆然甸服以外皆然是以韓侯北方諸侯而言入覲以其在北方當方分之在西畔故云覲鄭答志云朝覲四時通稱故覲禮亦云朝若然鄭不與馬同觀此注似用馬氏之義者鄭既不與馬同今所解云四方各四分者謂四方諸服服各四分趨四時而來或朝春據王城東方或宗夏據王城南方或覲秋據王城西方或遇冬據王城北方禮記王制孔疏六服各以其服數來朝皆當方分為四部分隨四時而來鄭注大行人云朝貢之歲四方各四分趨四時而來是分别各為四方也近東者朝春近南者宗夏近西者覲秋近北者遇冬故韓侯是北方諸侯而近於西故稱韓侯入覲鄭云秋見天子曰覲又鄭注明堂位云魯在東方朝必以春魯於東方近東故也以此言之則侯服朝者東方以秋南方以冬西方以春北方以夏以其近京師舉此一隅自外可知悉王氏與之曰愚案古人封建諸侯有人民有社稷焉若以春則東方諸侯皆來夏則南方諸侯皆來卒不幸有乘間而起如昆夷玁狁之難孰從而折衝禦侮之空其一方同時畢集斷無此理苟縱其自便不朝京師萬一有専權難制之事如唐之藩鎮又何以為制馭諸侯之權要知王者欲親諸侯必設為可親之禮或不能朝於春則可以宗於夏或不能覲於秋則可以遇於冬但六年之內不可不一次來王不然巢本南方國巢伯來朝何以曰朝不曰宗韓本北國韓侯入覲何以曰覲不曰遇要知古人立為朝覲宗遇之禮於春夏秋冬之間以見四時皆來王之日而禮非有所輕重於其間蕙田案六服就王畿而言則以王畿之東西南北為四方就每方而言又各别為四方假如侯服在王畿東者四分之以近甸服者為東方近王畿者為西方近南者為南方近北者為北方其餘三方皆倣此遇當朝之年各隨其時而至則每方諸侯朝天子者春夏秋冬惟四之一耳倘有外患不難折衝禦侮之鄭注大行人云朝貢之歲四方各四分趨四時而來正與馬融説合賈疏故為分别誤也右朝覲之期周禮考工記玉人天子執冒四寸以朝諸侯注名玉曰冒者言德能覆冒天下也四寸者方以尊執卑以小為貴執疏案書傳云古者圭必有冒言不敢専達之義天子冒以朝諸侯見則覆之注云君恩覆之臣敢進是其覆冒之事案孔注顧命云言冒所以冒諸侯圭以齊瑞信方四寸邪刻之不言冒以覆蓋天下者義得兩含故注有異此冒據朝覲諸侯時執之詩殷頌云受小球大球為下國綴旒注云小球尺二寸大球長三尺與下國結定其心如旌旗之旒彼據天子與諸侯盟會故云結定其心故執鎮圭不執冒也尚書大傳古者圭必有冒言下之必有冒不敢専達也天子執冒以朝諸侯見則覆之故冒圭者天子所與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能改過者復其圭三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢此所謂諸侯之於天子也義則見屬不義則不見屬陳氏禮書上覆謂之冒下冒上亦謂之冒易曰冒天下之道詩曰下土是冒上覆下也説文曰冒地而生農書曰土長冒橛下冒上也瑁圭謂之瑁則覆下而已四寸所以冒四方邪刻之所以驗羣瑞天子執之以朝諸侯則子男之璧亦在所驗其詳不可考也諸侯之朝天子執瑞圭搢象笏及輯瑞圭而以瑁驗焉蓋各執其所搢者禮曰見於天子無説笏是也孔穎達曰冒圭王與諸侯朝覲所執者小球尺二寸大球長三尺王與諸侯會盟所執者然詩言受小球大球則小球者蒲璧榖璧之類大球者桓圭躬圭之類而天子授之則非二尺與三尺之圭矣穎達之言豈非惑於詩傳之説歟又曰書曰太保承介圭上宗奉同瑁詩嵩髙曰錫爾介圭以作爾寶韓奕曰以其介圭入覲於王爾雅曰介大也又曰圭大尺有二寸謂之玠夫王之大圭長三尺則尺有二寸所以錫諸侯者也諸侯之圭長不過九寸錫以尺有二寸使寶之而已書於介圭言太保承之於瑁言上宗奉之書之介圭即大圭也王朝日執鎮圭搢大圭見諸侯則執瑁圭而大圭不搢則太保承之耳此承與奉所以不同也孔安國以書之介圭為王之守圭長尺二寸者毛氏以嵩髙韓奕之介圭為公之守圭九寸者鄭氏以嵩髙之介圭為所錫之圭尺二寸者以韓奕之介圭為享王者然王與公之守圭曰鎮圭桓圭而已不謂之介其義當從鄭氏之説蕙田案以上天子所執之圭春官大宗伯公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧注公二王之後及王之上公雙植謂之桓桓宫室之象所以安其上也桓圭蓋以桓為瑑飾圭長九寸信當為身聲之誤也身圭躬圭蓋皆象以人形為瑑飾文有粗縟耳欲其慎行以保身圭皆長七寸榖所以養人蒲為席所以安人二玉蓋或以榖為飾或以蒲為瑑飾璧皆徑五寸不執圭者未成國也疏此所執謂朝時云雙植謂之桓者桓謂若屋之桓楹以其宫室在上須得桓楹乃安若天子在上須諸侯衛守乃安故云安其上也云桓圭蓋以桓為瑑飾者以無正文故云蓋也鄭破信為身者古者舒申字皆為信故此人身字亦誤為信也身圭躬圭皆以人形為飾若不粗縟為異則身躬何殊而别之故知文有粗縟為别也陳氏禮書桓強立不撓而以安上為任故公圭瑑之身伸而躬屈伸者尊足以候外而蔽內屈者卑足以長人而已故侯伯之圭瑑之子不足以長人而可以養人故璧瑑以穀男不足于養人而可以安人故璧瑑以蒲圭者天之用璧者天之體盡其用者必盡其體得其體未必盡其用此圭璧所以不同也然王之三公八命其服七章之鷩冕其執七寸之信圭及大射則王鷩冕故公降服毳冕降服毳冕則執躬圭而已此禮所謂曲而殺也易曰艮其身止諸躬也爾雅曰身我也躬身也蓋屈身為躬信躬為身言信圭則身可知鄭氏改信為身不必然也桓説文作巘典瑞公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇會同於王注三采朱白蒼二采朱緑也鄭司農云以圭璧見于王覲禮曰侯氏入門右坐奠圭再拜稽首侯氏見于天子春曰朝夏曰宗秋曰覲冬曰遇時見曰會殷見曰同秋官大行人上公之禮執桓圭九寸繅藉九寸諸侯之禮執信圭七寸繅藉七寸諸伯執躬圭諸子執榖璧五寸繅藉五寸諸男執蒲璧注繅藉以五采韋衣板若奠玉則以藉之小行人成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用榖璧男用蒲璧注成平也瑞信也皆朝見所執以為信蕙田案鎮之為瑱古字通用陳氏禮書大宗伯作六瑞自王以下皆言執小行人成六瑞自王以下皆言用則執者自人言之也用者自王言之也執之所以行禮用之所以合符宗伯典瑞行人皆言執特小行人言用則行禮非小行人所専掌特掌其合符之事而已若夫不施於行禮合符則寶而守之此玉人所以又言守之也覲禮侯氏入門坐奠圭拜取圭升致命王受之玉侯氏降擯者延之升成拜乃出蓋於是時安玉於崇坫之上明堂位所謂崇坫康圭者是也若夫壇壝宫之禮則諸侯升受王玉王授之於宰矣賈公彥曰壇上無坫當約聘禮側授宰玉其説或然考工記玉人命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之注命圭者王所命之圭也朝覲執焉居則守之子守榖璧男守蒲璧不言之者闕耳故書或云命圭五寸謂之躬圭杜子春云當為七寸元謂五寸者璧文之闕亂存焉禮記禮器圭璋特注圭璋特朝聘以為瑞無幣帛也雜記贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等注贊大行者書説大行人之禮者名也藻薦玉者也三采六等以朱白蒼畫之再行也子男執璧作此贊者失之矣疏博三寸者謂圭博三寸也厚半寸者謂圭與璧各厚半寸剡上左右各寸半者謂圭與璧剡殺也殺上左右角各寸半也玉也者言五等諸侯圭璧長短雖異而俱以玉為之也藻謂以韋衣板以藉玉者三采朱白蒼也六等六行也謂畫上三色每色為二行是三采六等云三采六等以朱白蒼畫之再行也者案聘禮記云朝天子圭與繅皆九寸繅三寸六等朱白蒼朱白蒼是也既重云朱白蒼是一采為二等相間而為六等也若五等諸侯皆一采為一就典瑞云公侯伯皆三采三就謂一采為一就故三采三就其實采别二就三采則六等也典瑞又云子男皆二采再就二采謂朱緑也二采故二就其實采别二就二采則四等也典瑞又云瑑圭璋璧琮繅皆二采一就以俯聘此謂卿大夫每采唯一等是二采共一就也與諸侯不同其天子則興瑞云繅五采五就亦一采為一就五采故五就其實采别二就五采則十等也陳氏禮書玉之藉以繅而繅之長視玉采以象德之文就以象文之成君子以貞剛之質存乎內而以柔順藉之於外又有文焉然後可以行禮矣王五采五就色不過五也公侯伯皆三采三就降殺以兩也子男二采而大夫聘玉亦二采者禮窮則同也繅或作藻冕繅織絲為之則圭繅亦然鄭氏與杜預皆謂以韋為之亡據也繅可垂可屈則廣於玉矣鄭氏謂各視其玉之大小亦亡據也雜記贊行人曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等然子男執璧則博剡者公侯伯之圭而已子男之繅二采再就則三采六等者公侯伯之繅而已鄭氏曰作此贊者失之矣其説是也然則圭繅皆有組以繫之聘禮所謂皆元纁繫長尺絢組是也璧繅蓋亦然春秋傳所謂楚康王再拜皆厭璧紐是也辨注疏以有藉無藉為繅藉禮記曲禮孔疏凡執玉之時必有其藻以承於玉若盡飾見美之時必垂藻於兩端令垂向於下謂之有藉當時所執之人則去體上外服以見在內裼衣故云有藉者則裼也其事質充美之時承玉之藻不使下垂屈而在手謂之無藉當時所執之人則掩其上服襲蓋裼衣謂之無藉者則襲此謂執玉之人朝聘行禮或有裼時或有襲時也云圭璋特而襲者上公享王圭以馬享后璋以皮皮馬既不上於堂其上惟特有圭璋圭璋既是寶物不可露見必以物覆襲之故云圭璋特而襲也云璧琮加束帛而裼者謂侯伯子男享天子璧以帛享后琮以錦既有帛錦承玉上惟用輕細之物蒙覆以裼之故云璧琮加束帛而錫也此明非但人有裼襲其玉亦有裼襲之義此皇氏之説熊氏以為上明賓介二人為裼襲圭璋特以下又明賓主各自為裼襲謂朝時用圭璋特賓主俱襲行享時用璧琮加束帛賓主俱裼亦是也其藉玉之藻鄭注覲禮云繅所以藉玉以韋衣木廣袤各如其玉之大小天子則以五采畫之諸侯則三采子男二采其卿大夫亦二采故典瑞云王五采五就公侯伯三采三就子男二采二就又云瑑圭璋璧琮繅皆二采一就是也熊氏云五采五就者采别二行為一就故五就也三采三就者亦采别二行為一就故三就也二采二就者亦采别二行為一就故再就也二采一就者以卿大夫卑二采采則别惟一行共為一就知然者雜記及聘禮記三采六等則知天子諸侯采别為二等也此是周法其殷以上則禮説含文嘉云天子三公諸侯皆以三帛以薦玉宋均注云其殷禮三帛謂朱白蒼象三正其五帝之禮薦玉用一色之帛故鄭注虞書三帛髙陽氏之後用赤繒髙辛氏之後用黑繒其餘用白繒其餘謂堯舜之諸侯既以采色畫韋衣於板上前後垂之又有五采組繩以為繫其組上以元為天下以黃為地長尺無事則以繫玉有事則垂為飾故聘禮記皆元纁繫長尺絢組注云采成文曰絢是也其裼襲之義者藻藉有二種一者以韋衣木畫之也二者絢組垂之若板之藻藉則常有今言無者據不垂之也其垂藻之時則須裼屈藻之時則須襲案聘禮賓至主人廟門之外賈人東面坐啓櫝取圭垂繅不起而授上介注云不言裼襲者賤不裼也以賈賤故不言裼明貴者垂藻當裼也又云上介不襲執圭屈繅授賓注上介不襲者以盛禮不在於己明屈繅合襲也又云賓襲執圭又云公襲受玉於時圭皆屈藻故賓與公執玉皆襲是屈藻之時皆襲則所謂無藉者襲是也聘禮又云賓出公授宰玉裼降立是授玉之後乃裼也又云賓裼奉束帛加璧享是有藉者裼凡朝之與聘賓與主君行禮皆屈而襲至於行享之時皆裼也知者以聘禮行聘則襲受享則裼凡享時其玉皆無藉藻故崔靈恩云初享圭璋特故有藻其餘則束帛加璧既有束帛不須藻陳氏祥道曰玉有以繅為之藉有以束帛為之藉有藉則裼無藉則襲特施於束帛而已聘賓襲執圭公襲受玉及享則賓裼奉束帛加璧蓋聘特用玉而其禮嚴享藉以帛而其禮殺此襲裼所以不同先儒以垂繅為有藉屈繅為無藉此説非也陸氏佃曰無藉若圭璋特是也經言繅又别言藉則藉非繅著矣藉若璧以帛琮以錦之類所謂公降襲受玉於中堂此無藉者之玉也即束帛加璧裼矣朱子曰案鄭説兩義詞太簡略指不分明疏家所引皇氏熊氏始以垂屈言之但熊氏所云今言無者據垂之也乃與經文及皇氏并己説上下文皆相反疑其據字之下當脫一不字今已輒為補之矣至於圭璋璧琮之義則皇氏為失而熊氏得之但周禮典瑞云璧琮繅皆二采一就而熊氏亦自謂以韋衣版之藉則皆有而又引崔靈恩云璧琮既有束帛則不須藻似亦抵牾疑璧琮雖有藻而屈之當為無藉特以加於束帛故從有藉之例而執之者裼耳陳氏陸氏則但取鄭注後説而用熊氏之義似亦有理然今未敢斷其是非故悉著其説以俟知者劉氏彛曰此謂朝聘時爾藉者薦也非繅圭璋璧琮琥璜皆玉也執璧琮琥璜則與帛錦繡黼同升所謂有藉裼者禮差輕尚文也執圭璋則特達所謂無藉襲者禮方敬尚質也裼襲繫於有藉無藉不繫於有繅無繅馬氏晞孟曰玉有以繅為之藉有以束帛為之藉以繅為藉所以飾之束帛為藉所以將之有藉則裼無藉則襲之説特施於束帛之藉而已考之聘禮方聘之時賓襲執圭公襲受玉其襲而不裼者以未有束帛之藉故也及享之時賓裼奉束帛加璧其裼而不襲者以有束帛之藉故也後世學者以有藉為垂繅無藉為屈繅而其甚又有圭璋特而襲之説然則聘禮又有賈人取圭垂繅宰執圭屈繅上介執璋屈繅凡此謂垂繅屈繅可也謂之有藉無藉非也周官小行人圭以馬璋以皮皮馬雖非上堂之物其為藉也亦束帛之類而已謂圭璋特而襲亦非也楊氏復曰繅有二種賈疏已詳然言繅又言藉者承玉繫玉二種皆承藉玉之義故言藉也但藉字又有一義曲禮云執玉其有藉者則裼無藉者則襲所謂無藉謂圭璋特達不加束帛當執圭璋之時其人則襲也所謂有藉者謂璧琮加於束帛之上當執璧琮之時其人則裼也曲禮所云専指圭璋特襲璧琮加束帛而裼一條言之先儒乃以執圭而垂繅為有藉執圭而屈繅為無藉此則不然陳氏陸氏之言足以破先儒千百載之惑矣然何以知先儒之説為非而陳氏陸氏之説為是也竊詳經文裼襲是一事垂繅屈繅又别是一事不容混合為一説方其始受君命也賈人啓櫝取玉垂繅以授宰宰執圭屈繅自公左授使者使者垂繅受命訖以授上介上介受玉垂繅以授賈人是時授受凡四易手有垂屈之文而無裼襲之禮也及至主國行聘禮賓在廟門之外賈人啓櫝取玉垂繅而授上介上介不襲屈繅以授賓經明言上介不襲是有垂屈之文而無裼襲之禮也逮夫賓主三揖三讓登堂賓襲執圭公側襲受玉於中堂與東楹之間及公側授宰玉而後裼降立是主賓授受則襲既授宰玉則裼當主賓授受之時曾不見垂屈之文焉既歸反命公南向卿進使者使者執圭垂繅北面上介執璋屈繅立於其左又有垂屈之文而無裼襲之禮蓋圭聘禮之重也主賓授玉於中堂東楹之間禮之正也方其授於賈人授於上介皆擬行之禮及贊禮者之事故辨垂屈以彰其文賓主授玉於中堂與東楹之間為禮之正故辨裼襲以致其敬及歸反命又於君前以垂屈為文而不以裼襲為禮豈非玉為聘禮設反命亦非禮之正也乎兩義不同各有其宜自鄭氏之説始差熊氏皇氏從而附會之而經意始汨然經文燦然如日星之在天又豈得而終汨之耶蔡氏德晉曰聘禮記凡執玉無藉者襲曲禮執玉其有藉者則裼無藉者則襲玉若圭璋璧琮琥璜皆是也藉承藉之義小行人職圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼皮馬不上於堂故圭璋特達無所承藉是謂無藉者若璧琮琥璜加於帛錦繡黼之上而升於堂帛錦繡黼在璧琮琥璜之下如物有承襲然是謂有藉者考之聘禮執圭行聘賓主皆襲所謂無藉者襲既聘而享束帛加璧賓主皆裼所謂有藉者裼朝禮想亦當然則有藉無藉以玉言裼襲以人言本文自明而所謂藉乃指帛錦繡黼之類非繅藉之藉也自鄭康成注藉為繅孔仲達疏引皇氏熊氏語以聘禮垂繅為有藉屈繅為無藉不知繅可言垂屈不可言有無也且聘禮云上介不襲屈繅授賓既屈繅矣而云上介不襲則以為屈繅者襲可乎又云賓裼奉束帛加璧享案周禮典瑞職璧琮繅藉二采二就是璧琮雖有繅而當享時未知其或屈或垂也乃以為垂繅者裼可乎皇氏又謂非但人有裼襲玉亦有裼襲圭璋既是寶物不可露見必以物覆襲之璧琮既有帛錦承玉惟用輕細之物蒙覆以裼之夫謂玉亦有裼襲尤屬穿鑿胡邦衡反承用之而以裼襲指執玉之人為非謂玉有繅以藉者以袒裼而露見其美無繅以承者則以物覆襲之不暴露也豈謂人自裼襲不亦是非顛倒矣乎有藉無藉之藉乃束帛之藉非繅藉之藉裼襲是一事垂繅屈繅又别是一事不容混合吕與叔劉執中馬彥醇陳用之陸農師楊信齊敖君善等辨之詳矣郝仲輿復合併為一説且以裼襲専屬之玉而云藉以采繒包裹之所謂繅也單曰裼重曰襲玉有繅則赤手併其繅執之所謂裼也玉無藉則以衣重掩其手執之所謂襲也有藉而又襲則握不固無藉而裼則手澤汚之鄭作裼裘襲裘非是夫裼襲以裘言乃定解也郝氏何以故反之而為此杜撰穿鑿之解乎更可怪者聘禮裼襲本指人説郝仲輿悉舉而歸之於玉而以掩手曰襲袒手曰裼等釋之至解有不可通處則割裂句讀以伸其説如裼降立則以裼字屬上公側授宰玉裼為句如賓裼句奉束帛加璧享句則以賓裼連下奉束帛加璧享為句至賓裼迎大夫賄用束帛乃還玉禮畢故賓不復襲因以束紡勞贈還玉之卿郝氏乃以賓裼迎為句連上節還璋如初入解而云如初入與受圭同賓裼迎與受圭異圭必呈見賓以朝服掩手承之璋不呈故不襲而徒手併繅受之則割裂穿鑿甚矣然其説終不可通蓋以裼襲指玉説何得云裼迎襲迎也蕙田案以上諸侯所執之圭璧右圭璧禮記曲禮執玉其有藉者則裼無藉者則襲注藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也疏裼所以異於襲者凡衣近體有袍襗之屬其外有裘夏月則衣葛其上有裼衣裼衣上有襲衣襲衣之上有常著之服則皮辨之屬也掩而不開則謂之為襲若開此皮辨及中衣左袒出其裼衣謂之為裼聘禮賈疏凡服四時不同假令冬有裘襯身禪衫又有襦袴襦袴之上有裘裘上有裼衣裼衣之上又有上服皮辨祭服之等若夏以絺綌絺綌之上則有中衣中衣之上復有上服皮辨祭服之等若春秋二時則衣夾褶夾褶之上加以中衣中衣之上加以上服也左傳疏禮裘上有衣謂之裼裼衣之上乃有朝祭正服裘上有兩衣也襲則二衣皆重之裼則袒正服露裼衣玉藻襲裘不入公門注衣裘必當裼也衣疏裘上有裼衣裼衣之上有襲襲衣之上有正服但據露裼衣不露裼衣為異耳若襲裘不得入公門也不文飾也不裼注裼主於有文飾之事主疏案聘禮使臣行聘之時主於敬不於文故襲裘聘是不文飾之事不裼裘也至行享之時主於文故裼裘也服之裼也見美也服之襲也充美也注充猶覆也所敬不主於君則襲疏凡敬有二體一則父也二則君也父是天性至極以質為敬故子於父母之所不敢袒裼君非血屬以文為敬故臣於君所則裼聘禮行聘致君命亦襲者彼是聘享相對聘質而享文欲文質相變故裼襲不同也執玉龜襲注重寶瑞也也疏凡執玉得襲故聘禮執圭璋致聘則襲若執璧琮行享雖玉裼此執玉或容非聘享尋常執玉則亦襲也無事則裼弗敢充也注謂已致龜玉也表記子曰裼襲之不相因也欲民之無相瀆也注不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執玉龜之屬也禮不盛者以裼為敬受享是也蕙田案裼襲之義從來未明為注疏諸家汨之耳今以經文證之檀弓云練練衣黃裏縓緣鹿裘衡長袪袪裼之可也是裼専以袪言而非别有裼衣襲衣也玉藻君子狐青裘豹褎元綃衣以裼之羔裘豹飾緇衣以裼之綃衣緇衣禮服也裘上加禮服而裼則微卷其袪以見裘之美也又曰大裘不裼犬羊之裘不裼弔則襲尸襲執玉龜襲君在則裼無事則裼是裘以裼為常而當致哀致敬之時則襲蓋一衣而可裼可襲非裼為一衣襲又一衣也又曰裘之裼也見美也服之襲也充美也服者裘上之服裘即服中之裘互文以見義襲其袪則美充於內裼其袪則美見於外故行禮之時當裼則裼當襲則襲頃刻變易而不相因也詳蔡氏説蔡氏德晉袒裼襲記古人衣服之制親身則以布為襯身單衫於祭服謂之明衣論語齊必有明衣布是也但行禮皆當服明衣不特祭為然故皇氏謂朝服亦先以明衣襯身以士喪禮明衣裳用布推之可見也于燕居謂之澤秦風豈曰無衣與子同澤鄭箋澤褻衣近汚垢朱注澤裏衣以其親膚近於垢澤故謂之澤是也單衫外有襦衣內則衣不帛襦袴張橫渠謂襦今之襖子袴今之褲是也襦衣之外賤者有袍秦風豈曰無衣與子同袍玉藻緼為袍梅誕生以袍為長襦是也貴者則有裘賈洺州謂冬時襯身單衫又有襦袴襦袴之上有裘是也裘之外有正服正服者行禮時則服禮服燕居則服深衣也論語緇衣羔裘緇衣者朝君之正服鄭風緇衣之宜兮是也玉藻朝玄端夕深衣是深衣為燕居之正服也但古人著衣之節其變有三曰袒曰裼曰襲袒者捲起衣袖而露其臂也裼者捲正服之袖而露其裘也襲復衣也或既袒而襲之或既裼而襲之也在衣曰袒在裘曰裼故裼有袒義吕與叔云袒謂之裼不袒謂之襲是也袒有左右禮事則左袒刑人則右袒裼則左右皆裼故大射儀士喪禮皆言左袒覲禮侯氏待罪言右肉袒而聘裼襲不言左右也袒有惟捲正服之袖而露其裏衣者鄉射禮記所謂袒纁襦袒朱襦也有并捲裏衣之袖而露其臂者所謂肉袒也裼則惟捲正服之袖以露其裘而已玉藻云君衣狐白裘錦衣以裼之言狐白裘上加錦衣為禮服而袖必捲起以露出裘也又曰裘之裼也見美也服之襲也充美也襲掩也禮服之袖捲起則裘之美露見於外不捲而掩蔽之則裘之美充塞於內也又云君子狐青裘豹褎玄綃衣以裼之孔疏取熊氏説云謂六冕及爵辨也綃綺屬也夫六冕及爵辨皆禮服之正也以是為裼則郝仲輿謂古裼衣即是冬月之禮服豈不信乎檀弓云曾子襲裘而弔子遊裼裘而弔既小斂子遊趨而出襲裘帶絰而入蓋裘之上為禮服捲其袖而露出裘謂之裼袖不捲而掩蔽其裘謂之襲裘當裼以行禮之時則裼而不得襲當襲以行禮之時則襲而不得裼表記所謂裼襲不相因也凡既袒者必襲袒不可常也裼者不必襲而既襲者必裼敖君善謂朝祭之衣以裼為常故當盛禮則襲以為敬而盛禮畢則裼而復其常也合大射士喪聘禮曲禮檀弓玉藻之文考之而袒裼襲之義可覩矣又袒裼襲解辨古人冬月衣裘裘上加正服其正服有裼有襲裼者兩袖微捲起以露裘之美襲則下其所捲之袖而已乃先儒之論裼襲紛紜舛錯計其謬訛凡十有六皆可援經傳以正之有謂裘外之衣有二重裼衣一重襲衣一重者鄭康成賈洺州吳草廬敖君善郝仲輿梅誕生萬充宗之説也有謂裘外之衣三重裼衣一重襲衣二重正服三重者孔仲達方性夫陳可大林次崖徐伯魯之説也夫古人裘外惟有正服孔子緇衣羔裘緇衣謂朝君正服玉藻君子狐青裘豹褎玄綃衣以裼之孔疏引熊氏説以為六冕及爵辨之色皆禮服之正也以其裼而露裘謂之裼衣亦曰裼裘以其襲而掩裘謂之襲衣亦曰襲裘其實裘外止一正服也安得或岐而為二或岐而為三乎其誤一也古人不以裘為正服故於裘上加正服玉藻君衣狐白裘錦衣以裼之即秦風所謂錦衣狐裘錦衣之上未嘗更有衣也鄭康成乃謂錦衣復有上衣狐白之上衣皮辨服賈洺州謂裘上有裼衣裼衣上又有上服皮辨祭服之等孔仲達則云裘上有裼衣裼衣上有襲衣襲衣上有常著之服則皮辨之屬夫鄭賈以襲衣為正服則裼衣安所用之孔氏以正服在裼衣襲衣之外則裼襲二衣又安所用之况裘內有袍澤之屬裘外有正服而其間又有裼襲二衣則重纍臃腫甚矣何以能勝周旋百拜之禮詩言衣錦絅衣裳錦絅裳乃婦人之服亦非以裼裘也鄭氏乃據之以證裼襲之制不亦支離附會已乎其誤二也郝仲輿云古人裼衣即是冬月禮服又云裘外裼衣即是朝祭服非裼衣之外又著朝祭服萬充宗云玉藻云君在則裼夫臣之見君必朝服則裼衣即朝服聘禮既聘而享賓主必裼以將事則裼衣即禮服推此凡裘外之裼衣皆禮服矣此説自不易然裼衣既為禮服必當著於外豈可復加他服以掩之孔子緇衣羔裘不聞更有何服以掩緇衣玉藻玄綃衣以裼之不聞更有何服以掩玄綃衣也郝氏乃云裼衣上又著則為襲又云裼衣之外又以衣掩襲是有事示變者萬氏則云經不詳裼衣之制疑即深衣也衣裳相連全體深邃服之以掩蓋裼衣又云加深衣則曰襲不加深衣則曰裼夫深衣乃燕服玉藻所謂朝元端夕深衣深衣所謂善衣之次鄭康成亦謂深衣所以襯禮服安得反加於禮服之上乎聘禮行聘之時賓主皆襲既聘而享賓主皆裼如萬氏説聘禮盛大賓主尊嚴之際反服深衣享禮稍殺反服禮服是深衣反尊於禮服也何以為善衣之次乎萬氏又解大裘不裼云郊時王衣大裘衮衣以裼之衮衣外更襲以衣是之謂充美夫郊祀大典衮衣盛服乃反加深衣以覆蓋之不已褻乎其誤三也正服一也而裼襲則隨時異宜表記云裼襲不相因者謂先裼而遇當襲之時則襲先襲而遇當裼之時則裼未嘗相因而不改也孔仲達曲禮疏乃云去體上外服以見在內裼衣故云裼萬充宗云去襲衣曰裼加襲衣曰襲郝仲輿云單衣曰裼重掩曰襲應子和云交錯而相易曰裼層疊纍沓而掩覆曰襲又云裼襲異宜一時或有異事必易服從事不以襲衣而因為裼不以裼衣而因為襲如諸儒説則當裼時必脫去襲衣當襲時必復加襲衣也不思聘禮公側襲受玉於中堂與東楹之間裼降立授受須臾不下堂不入次易服於何所乎射喪諸禮言袒襲者皆忽袒忽襲豈得於行禮之所忽而脫衣忽而著衣乎其誤四矣吕與叔云袒謂之裼不袒謂之襲蓋裼有袒義故經傳恆以袒裼並言詩袒裼暴虎內則不有敬事不敢袒裼是也但袒有二禮事左袒刑人右袒而裼則左右皆裼故大射士喪言左袒覲禮言右袒而聘禮於裼不言左右也鄭康成注大射云袒者左免衣又注聘禮云凡袒裼者左孔仲達曲禮疏左袒出其裼衣謂之裼故鄭氏謂裼者左袒也敖君善聘禮注裼者偏免上衣見裼衣此裼亦左為之如鄭孔敖氏之説則裼亦如袒之有左右而禮事惟左裼矣何以左右袒見於經見於史而左右裼並不見於經史乎且裼以露裘何以獨露左袖而不露右袖乎其誤五矣袒裼之别在裘曰裼在衣在體皆曰袒在體之袒袒衣而露臂所謂肉袒也在衣之袒袒外衣見裏衣所謂袒朱襦袒纁襦也裼則惟袒外衣以露裘而已孔仲達陳可大乃云或裘或葛其上皆有裼襲二衣夫裼襲止施於裘豈得兼葛言之耶其誤六矣玉藻云裘之裼也見美也服之襲也充美也言裼則裘之美見於外襲則裘之美充乎內裼言裘襲言服互見耳檀弓曾子子遊之弔固嘗言裼裘襲裘矣萬充宗則謂於裼曰裘之裼裼在裘外也於襲曰服之襲襲在服外也豈知言裘之裼舉裘以見外之有服言服之襲舉服以見內之有裘乎乃斷以為襲在服外其誤七矣見美充美本指裘之美而言鄭康成乃云袒而有衣曰裼孔仲達謂襲衣上有常著之服如皮辨之屬掩而不開謂之襲開皮辨及中衣左袒出其裼衣謂之裼又云裘之裼者裼衣上雖加他服有開露裼衣而見裼衣之美服之襲者謂所加上服掩襲裼衣而覆蓋裼衣之美敖君善亦云襲謂襲上衣不見裼衣也夫羔裘麑裘之類可言美若緇衣素衣之屬何足言美况以見美充美為裼衣之美則是裼襲在衣不在裘而何以言裼裘襲裘也其誤八矣古人衣領之制惟深衣篇曲夾如矩以應方鄭注夾交領也古者方領如今小兒衣領吳草廬乃有禮衣直領深衣曲領之説又云裼裘者裼衣外之上服直其領而露出裼衣也襲裘者裼衣外之上服曲其領而掩蔽裼衣也林次崖徐伯魯宗其説又謂裘外之衣有裼襲及正服三重裼與襲全在第二重襲衣有直領曲領二者之異惟所當而服之夫如吳氏説襲衣即正服而有直領曲領二者則行禮或裼或襲必易服從事如林氏徐氏説襲衣有直領曲領二者而其外猶有正服則裼與襲必先脫去正服更換襲衣乃復著正服不尤迂滯乎且直領曲領之别經史亦無明文可據也其誤九矣諸儒雖以裼襲為二衣未有能言二衣之異制者宣城梅誕生始云裼衣乃半袖單衣加於裘之上襲衣乃有袖全衣加於裼之上如其説則行禮時忽裼忽襲而襲衣亦必忽脫忽著矣且行禮有裼時有襲時是裼與襲俱為禮服以禮服而止半袖可乎况半袖之説亦屬無稽其誤十矣裼以見裘之美即以為見裼衣之美亦必襲衣上無正服裼衣始露見耳方性夫乃謂襲衣之上有正服所謂裼衣者未嘗無襲由露其裼衣故謂之裼所謂襲衣者未嘗無裼由掩以襲衣故謂之襲夫襲無論矣以裼言之襲衣既掩裼衣於內正服何以能露裼衣於外若此孔仲達開皮辨及中衣左袒出其裼衣之説而襲衣與正服俱開露以見裼衣則欲見裼衣之美者止一正服足矣何必有襲衣則欲見裘之美者亦止一正服足矣何必有裼襲二衣有裼襲二衣必三重俱袒乃能見裘之美無裼襲二衣惟袒正服亦足見裘之美然則此二衣不誠贅設乎其誤十一矣裼裘之法不過捲起兩袖檀弓鹿裘袪裼之可也袪袖口也言鹿裘外之服微捲起以露鹿裘袖口可也萬充宗謂喪中之袒捲起衣袂而露其臂襲則掩之愚則謂凡袒與裼皆捲起衣袂不止喪中之袒而已賈洺州乃謂裼者袒襟前上服見裼衣萬充宗又謂古人禮服皆直領無襟裘上衣裼衣胸前裘色自然微露如袒者然皆臆説也鄭孔既以裼為左袒矣聘禮注又以為裼者免上衣見裼衣曲禮疏又云去體上外服見在內裼衣則似裼為脫去襲衣矣又云開皮辨及中衣謂之裼則裼又似開露前襟矣皆騎墻之見也陸稼書云襲裘不入公門孔疏裼襲但據露裼衣不露裼衣為異耳然不言何樣露法想或去而露之或袒而露之或直其領而露之其制原不一也此又胸無定見徘徊兩可不知行大禮時自有一定之制非可二三其説也其誤十二矣士喪禮左袒賈洺州以為袒左袖孟子袒裼朱注以為露臂古人之袒如是而已至佛氏始有偏袒右肩之語梅誕生云袒偏脫衣則是佛氏之袒非古人之袒也又云凡獨言袒但去襲而露裼言袒裼則并去裼而露肉此説近之而未盡當云言裼則去裼而露裘言袒裼則并去裘而露肉若獨言袒則惟去衣而露肉也如是義理方足而去之之言尚不能無病其誤十三也衣有袒襲見射禮及喪虞禮裘有裼襲見聘禮正可參考以明其義士虞禮言鈎袒敖君善謂外卷其袂以出臂此正袒之法亦即是裼之法萬充宗乃謂裼襲不得與袒裼相混喪虞射禮之袒襲與裼襲不同又與袒裼不同亦不可混而以先儒注裼襲皆不免與袒裼混為病不亦好為離截而無當乎其誤十四也檀弓練練衣黃裏縓緣鹿裘橫長袪袪裼之可也蓋喪至期而練其時有功衰為禮服以象吉時元端有練衣以為燕服以象吉時深衣練衣之制黃為裏淺絳色為緣冬時以鹿皮為裘而橫長其袖衣於身為縱袖於衣為橫未練之時袖皆短至此則長之也袪裼之者鹿裘外加練衣則卷起練衣之袖以露鹿裘之袖也如鹿裘上加功衰衰袖短亦露鹿裘之袖陳用之所謂裼受服以見鹿衣之美也故鹿裘上惟加一服行禮時則加功衰燕居則加練衣孔仲達以練衣為中衣而謂是時外有衰內有練中衣中衣內有裼衣裼衣內有鹿裘仍是三重之説其誤十五也古人之衣內有襯身單衫及襦袴皆褻衣也褻衣上不可遽加朝祭之服故必有中衣以間之春秋則以深衣為中衣夏則以葛為中衣冬則即以裘為中衣蓋著在褻衣禮衣之中間謂之中衣非有定制也孔仲達乃以襲衣為中衣則中衣在裘之外玉藻疏又引皇氏語謂夏則中衣之上加葛葛上加朝服冬則中衣之上加裘裘上加朝服則中衣又在裘之內皆不知何衣也其誤十六矣此十六誤解各是其是各非其非非合而辨之不惑於此必惑於彼而裼襲之義幾於隱矣蕙田案禮文有經傳明據而淆於諸儒之岐説者莫如袒裼襲之義少時與同學諸子病之雍正乙巳春遂相與遍考經文詳稽衆説久乃豁然融貫迎刃而解搜集則吳氏鼎之力居多此二説則蔡氏筆也棼絲就理翳障頓開凡三閲月而後定嗚呼讀經豈易焉右裼襲五禮通考卷二百二十
