body:
  text: 五禮通考卷二十刑部尚書秦蕙田撰吉禮二十圜丘祀天明史恭閔帝本紀建文元年正月庚辰大祀天地于南郊奉太祖配革朝志帝始郊見上帝如歲祀之禮歲前十二月躬省牲于南郊是月戊寅御奉天殿誓戒百官是夕宿于文華殿齋宫己卯出舍皇邸尚膳進素食庚辰子夜合祀天地配以太祖罷仁祖配位蕙田案明史于二年無郊續文獻通考總數惠帝郊三有二年正月辛未不知何據建文三年正月辛未大祀天地于南郊成祖本紀建文四年七月壬午朔大祀天地于南郊永樂元年正月辛卯大祀天地于南郊二年正月乙卯大祀天地于南郊三年正月庚戌大祀天地于南郊四年正月丁未大祀天地于南郊五年正月丁卯大祀天地于南郊六年正月辛酉大祀天地于南郊七年正月乙卯大祀天地于南郊八年正月己卯皇太子攝祀天地于南郊九年正月甲戌大祀天地于南郊十年正月丁酉大祀天地于南郊十一年正月辛卯大祀天地于南郊十五年正月丁酉大祀天地于南郊十八年十二月北京郊廟宫殿成禮志成祖遷都北京如洪武制王圻續通考建于正陽門南之左繚以周垣周九里三十步規制禮儀悉如南京惟增祀天壽山于北嶽壇十九年正月甲子命皇太子詣壇奉安昊天上帝后土皇地祗神主春明夢餘録天壇在正陽門外永樂十八年建初遵洪武合祀天地之制稱為天地壇後既分祀乃始專稱天壇又京師大祀殿成規制如南京行禮如前儀王圻續通考成祖屢幸北平遇郊祀先期自行在遣官賫書諭太子令代祭略曰永樂某年正月某日大祀天地于南郊命爾行禮其潔精致齋恪恭乃事禮畢太子亦遣官復命率以為常至是建都北平始罷南京郊祀國有大事則遣官告祭云十九年正月甲戌大祀天地于南郊二十年正月辛未大祀天地于南郊二十一年正月乙未大祀天地于南郊二十二年正月戊子大祀天地于南郊仁宗本紀洪熙元年正月丙戌大祀天地于南郊以太祖太宗配王圻續通考敕曰太祖受命上天肇興皇業太宗中興宗社再奠寰區聖德神功咸配天地易曰殷薦上帝以配祖考朕崇敬祖考永惟一心今年正月十五日大祀天地神祗奉皇祖皇考配神仍著典章垂範萬世宣宗本紀宣德元年正月丁未大祀天地于南郊二年正月庚子大祀天地于南郊三年正月甲午大祀天地于南郊四年正月己未大祀天地于南郊五年正月癸丑大祀天地于南郊六年正月丁丑大祀天地于南郊七年正月癸酉大祀天地于南郊禮志宣德七年大祀南郊帝御齋宫命內官內使飲酒食葷入壇唾地者皆罪之司禮監縱容者同罪齋之日御史檢視各官于齋次仍行南京一體齋戒八年正月丁卯大祀天地于南郊宣宗實録八年正月詣齋宫罷早朝故事先一日詣郊壇皆朝百官後乃行帝諭禮官明旦早行不視朝既至南郊躬詣神厨遍閲諸祭品至暮旗手衛請放煙火不許謂侍臣曰朕早來不視朝之故蓋一心對越無暇他及今又暇觀煙火乎春明夢餘録舊制歲以十二月朔旦駕親臨閲牲以後每夕輪一大臣繼視自五府五部通政翰林堂上官不司刑者皆與焉凡兔房鹿檻羊棧牛枋豬圈周行厯視出入皆騎卒火甲人等護衛每夕鐘定人靜乃出至中宵始回城門啓鑰以入次早復命用騎卒自宣德年始明史宣宗本紀九年正月辛卯大祀天地于南郊英宗前紀正統五年正月己未大祀天地于南郊六年正月庚戌大祀天地于南郊七年正月甲戌大祀天地于南郊八年正月丁卯大祀天地于南郊九年正月辛酉大祀天地于南郊十年正月丙戌大祀天地于南郊十一年正月己卯大祀天地于南郊十二年正月癸酉大祀天地于南郊十三年正月丁酉大祀天地于南郊十四年正月甲子大祀天地于南郊景帝本紀景泰元年正月丙戌大祀天地于南郊二年正月庚戌大祀天地于南郊三年正月丙午大祀天地于南郊四年正月辛未大祀天地于南郊五年正月甲子大祀天地于南郊六年正月戊午大祀天地于南郊七年正月壬午大祀天地于南郊英宗後紀大順二年正月甲戌大祀天地于南郊三年正月乙未大祀天地于南郊四年正月丁亥大祀天地于南郊五年正月庚戌大祀天地于南郊六年正月丁未大祀天地于南郊七年正月丙午大祀天地于南郊憲宗本紀成化元年正月己未大祀天地于南郊二年正月乙卯大祀天地于南郊蕙田案續文獻通考數此作戊申誤三年正月己卯大祀天地于南郊四年正月甲戌大祀天地于南郊五年正月乙丑大祀天地于南郊六年正月己丑大祀天地于南郊七年正月丙戌大祀天地于南郊八年正月庚戌大祀天地于南郊九年正月丁未大祀天地于南郊十年正月丁酉大祀天地于南郊十一年正月癸亥大祀天地于南郊十二年正月戊午大祀天地于南郊十三年正月庚戌大祀天地于南郊十四年正月甲戌大祀天地于南郊十五年正月丁卯大祀天地于南郊十六年正月甲午大祀天地于南郊十七年正月丙戌大祀天地于南郊十八年正月壬午大祀天地于南郊十九年正月丙午大祀天地于南郊二十年正月丁酉大祀天地于南郊二十一年正月乙未大祀天地于南郊二十二年正月己未大祀天地于南郊二十三年正月庚戌大祀天地于南郊孝宗本紀𢎞治元年正月丙午大祀天地于南郊二年正月辛未大祀天地于南郊三年正月甲子大祀天地于南郊四年正月己丑大祀天地于南郊停慶成宴五年正月壬午大祀天地于南郊六年正月己卯大祀天地于南郊七年正月丁酉大祀天地于南郊八年正月乙未大祀天地于南郊以太皇太后不豫停慶成宴九年正月壬辰大祀天地于南郊十年正月庚戌大祀天地于南郊十一年正月丁未大祀天地于南郊十二年正月辛未大祀天地于南郊十三年正月乙丑大祀天地于南郊十四年正月己未大祀天地于南郊十五年正月丙戌大祀天地于南郊十六年二月戊申大祀天地于南郊蕙田案時帝有疾故改卜十七年正月甲戌大祀天地于南郊十八年正月乙未大祀天地于南郊武宗本紀正德元年正月己丑大祀天地于南郊六月辛酉大風雨壞郊壇獸瓦二年正月乙酉大祀天地于南郊三年正月丁未大祀天地于南郊四年正月丙午大祀天地于南郊五年正月丁卯大祀天地于南郊六年正月甲子大祀天地于南郊七年正月己未大祀天地于南郊八年正月壬午大祀天地于南郊九年正月丁丑大祀天地于南郊十年正月戊辰薄暮祀天地于南郊武宗實録是夜漏下二鼓帝始還宫十一年正月乙未大祀天地于南郊十二年正月己丑大祀天地于南郊遂獵于南海子夜中還御奉天殿受朝賀武宗實録十二年將郊先期降諭郊祀畢幸南海子觀獵諸臣咸上疏諌不聽至日祀禮甫畢遂幸南海子縱獵夜半始入御奉天殿行慶成禮十三年正月丁未罷南郊致齋庚戌大祀天地于南郊遂獵于南海子辛亥還宫十四年正月甲辰改卜郊二月丁丑大祀天地于南郊遂獵于南海子是日京師地震王圻續通考先是太常寺奏定正月十二日郊祀帝幸太原未回請改卜日內批改次日既而又命改卜禮科給事中邢寰等疏言祖宗以來郊祀必于正月上旬所以重一歲之首務而昭莫大之敬也今改而又改日復一日疑且未定不惟墮祖宗相循之制且非祗畏天地之道伏望皇上如期回鑾以成大禮御史牛天麟等亦以為言俱不報二月始祀天地于南郊祀畢幸海子大獵十五年正月癸巳改卜郊十二月丁酉大祀天地于南郊初獻疾作不克成禮王圻續通考十五年以征宸濠如南京十二月還京師始郊十六年正月癸亥改卜郊世宗本紀嘉靖元年正月己未大祀天地于南郊二年正月乙卯大祀天地于南郊毛玉傳二年冬帝以災異頻仍欲罷明年郊祀慶成宴裴紹宗言祭祀之禮莫重於郊丘君臣之情必通于宴享往以國戚廢大禮今且從吉宜即舉行豈可以災傷復免修撰唐臯亦言之竟得如禮三年正月丁丑大祀天地于南郊四年正月辛未大祀天地于南郊五年正月乙未大祀天地于南郊六年正月己丑大祀天地于南郊世宗實録六年正月大祀先期禮官以宴請帝曰郊祀慶成次日設宴乃祖宗朝故典蓋以上帝監歆君臣歡會其禮不可廢也今四方災異非常方欲上下同加修省恐多費勞民可暫免一年以見朕奉天恤民之意惟四夷使臣賜宴如故七年正月丙戌大祀天地于南郊八年正月庚戌大祀天地于南郊九年正月丁酉大祀天地于南郊五月己亥更建四郊禮志嘉靖九年世宗既定明倫大典益覃思制作之事郊廟百神咸欲斟酌古法釐正舊章乃問大學士張璁書稱燔柴祭天又曰類于上帝孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝以形體主宰之異言也朱子謂祭之于壇謂之天祭之屋下謂之帝今大祀有殿是屋下之祭帝耳未見有祭天之禮也况上帝皇地祗合祭一處亦非專祭上帝璁言國初遵古禮分祭天地後又合祀説者謂大祀殿下壇上屋屋即明堂壇即圜丘列聖相承亦孔子從周之意帝復諭璁二至分祀萬代不易之理今大祀殿擬周明堂或近矣以為即圜丘實無謂也璁乃備述周禮及宋陳襄蘇軾劉安世程頥所議分合異同以對且言祖制已定無敢輕議帝鋭欲定郊制卜之奉先殿太祖前不吉乃問大學士翟鑾鑾具述因革以對復問禮部尚書李時時請少需日月博選儒臣議復古制帝復卜之太祖不吉議且寢會給事中夏言請舉親蠶禮帝以古者天子親耕南郊皇后親蠶北郊適與所議郊祀相表裏因令璁諭言陳郊議言乃上疏言國家合祀天地及太祖太宗之並配諸壇之從祀舉行不于長至而于孟春俱不應古典宜令羣臣博考詩書禮經所載郊祀之文及漢宋諸儒匡衡劉安世朱熹等之定論以及太祖國初分祀之舊制陛下稱制而裁定之此中興大業也禮科給事中王汝梅等詆言非是帝切責之乃敕禮部令羣臣各陳所見且言汝梅等舉召誥中郊用二牛謂明言合祭天地夫用二牛者一帝一配位非天地各一牛也又或謂天地合祀乃人子事父母之道擬之夫婦同牢此等言論褻慢已甚又或謂郊為祀天社稷為祭地古無北郊夫社乃祭五土之祗猶言五方帝耳非皇地祗也社之名不同自天子以下皆得隨所在而祭之故禮有親地之説非謂祭社即方澤祭地也璁因録上郊祀考議一册時詹事霍韜深非郊議且言分祀之説唯見周禮莽賊偽書不足引據于是言復上疏言周禮一書于祭祀為詳大宗伯以祀天神則有禋祀實柴槱燎之禮以祀地祗則有血祭薶沈疈辜之禮大司樂冬至日地上圜丘之制則曰禮天神夏至日澤中方丘之制則曰禮地祗天地分祀從來久矣故宋儒葉時之言曰郊丘分合之説當以周禮為定今議者既以大社為祭地則南郊自不當祭皇地祗何又以分祭為不可也合祭之説實自莽始漢之前皆主分祭而漢之後亦間有之宋元豐一議元祐再議紹興三議皆主合祭而卒不可移者以郊賚之費每傾府藏故省約安簡便耳亦未嘗以分祭為非禮也今之議者往往以太祖之制為嫌為懼然知合祭乃太祖之定制為不可改而不知分祭固太祖之初制為可復知大祀文乃太祖之明訓為不可背而不知存心録固太祖之著典為可遵且皆太祖之制也從其禮之是者而已敬天法祖無二道也周禮一書朱子以為周公輔導成王垂法後世用意最深切何可誣以莽之偽為耶且合祭以后配地實自莽始莽既偽為是書何不削去圜丘方丘之制天地神祗之祭而自為一説耶于是禮部集上羣臣所議郊禮奏曰主分祭者都御史汪鋐等八十二人主分祭而以慎重成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓚等二十六人主合祭而不以分祭為非者尚書方獻夫等二百六人無可否者英國公張崙等一百九十八人臣等祗奉敕諭折衷衆論分祀之義合于古禮但壇壝一建工役浩繁禮屋祭曰帝夫既稱昊天上帝則當屋祭宜仍于大祀殿專祀上帝改山川壇為地壇以專祀皇地祗既無創建之勞行禮亦便帝復諭當遵皇祖舊制露祭于壇分南北郊以二至日行事言乃奏曰南郊合祀循襲已久朱子所謂千五六百年無人整理而陛下獨破千古之謬一旦舉行誠可謂建諸天地而不悖者也已而命戶禮工三部偕言等詣南郊相擇南天門外有自然之丘僉謂舊丘地位偏東不宜襲用禮臣欲于具服殿少南為圜丘言復奏曰圜丘祀天宜即髙敞以展對越之敬大祀殿享帝宜即清閟以盡昭事之誠二祭時義不同則壇殿相去亦宜有所區别乞于具服殿稍南為大祀殿而圜丘更移于前體勢峻極可與大祀殿等制曰可于是作圜丘是年十月工成明年夏北郊及東西郊亦以次告成而分祀之制遂定嘉靖祀典禮臣言圜丘之制大明集禮壇上成濶五丈存心録則第一層壇濶七丈集禮二成濶七丈存心録則第二層壇面周圍俱濶二丈五尺蓋集禮之二成即存心録之一層存心録之二層即集禮之一成矣臣等無所適從惟皇上裁定奉旨圜丘第一層徑濶五丈九尺髙九尺二層徑十丈五尺三層徑二十二丈俱髙八尺一寸地面四方漸墊起五尺春明夢餘録嘉靖九年從給事中夏言之議遂于大祀之南建圜丘為制三成祭時上帝南向太祖西向俱一成上其從祀四壇東一壇大明西一壇夜明東二壇二十八宿西二壇風雲雷雨俱二成上壇制一成面徑五丈九尺髙九尺二成面徑九丈髙八尺一寸三成面徑十二丈髙八尺一寸各成面磚用一九七五陽數及周圍欄板柱子皆青色琉璃四出陛陛各九級白石為之內壝圓墻九十七丈七尺五寸髙八尺一寸厚二尺七寸五分櫺星石門五寸正南三東西北各一外壝方墻二百四丈八尺五寸髙七尺一寸厚二尺七寸櫺星門如前又外圍方墻為門四南曰昭亨東曰泰元西曰廣利北曰成貞內櫺星門南門外左設具服臺東門外建神庫神厨祭器庫宰牲亭北門外正北建泰神殿後改為皇穹宇藏上帝太祖之神版翼以兩廡藏從祀之神牌又西為鑾駕庫又西為犧牲所少北為神樂觀北曰成貞門外為齋宫迤西為壇門明史禮志給事中夏言疏言太祖太宗並配父子同列稽之經旨未能無疑臣謂周人郊祀后稷以配天太祖足當之宗祀文王于明堂以配上帝太宗足當之禮臣集議以為二祖配享百有餘年不宜一旦輕改帝降敕諭欲於二至日奉太祖配南北郊歲首奉太宗配上帝於大祀殿大學士張璁翟鑾等言二祖分配於義未協且録仁宗所撰敕諭並告廟文以進帝復命集議于東閣皆以為太廟之祀列聖昭穆相向無嫌並列况太祖太宗功德並隆圜丘大祀殿所祀均之為天則配天之祖不宜闕一臣等竊議南北郊及大祀殿每祭皆宜二祖並配帝終以並配非禮諭閣臣講求璁等言古者郊與明堂異地故可分配今圜丘大祀殿同兆南郊冬至禮行于報而太宗不與孟春禮行于祈而太祖不與心實有所不安帝復報曰萬物本乎天人本乎祖天惟一天祖亦惟一祖故大報天之祀止當以髙皇帝配文皇帝功德豈不可配天但開天立極本髙皇帝肇之耳如周之王業武王實成之而配天止以后稷配上帝止以文王當時未聞爭辨功德也因命寢其議已而夏言復疏言虞夏殷周之郊惟配一祖後儒穿鑿分郊丘為二及誤解大易配考孝經嚴父之義以致唐宋變古乃有二祖並侑三帝並配之事望斷自宸衷依前敕旨帝報曰禮臣前引太廟不嫌一堂夫配帝與享先不同此説無當仍命申議世宗實録大學士張璁乃言郊祀之議聖見已決獨臣不忍無言皇上信以分配之説盡古禮乎大祀殿非明堂之位孟春祈榖又非季秋大享之禮則未免有失于古也皇上信以並配之説非今宜乎太祖百有餘年之神座豈忍言撤文皇百有餘年配天之報豈忍言廢則又未免有失于今也竊以天地分祀宜從古禮彰我皇上善繼善述之孝祖宗並配宜從今制彰我皇上不愆不忘之心疏入帝乃責璁前後變志非忠愛之道於是禮臣復上議南北郊雖曰祖制實今日新創請如聖諭俱奉太祖獨配至大祀殿則太祖所創今乃不得侑享於中竊恐太宗之心有所未安宜仍奉二祖並配則既復古禮又存祖制禮意人情兩不為失疏入復諭璁曰二至祀典自今日始當奉太祖獨配孟春特名祈榖實存祖制當如仁宗之舊可委曲依朕意行之璁對皇上議郊祀大典本乎至當可行之道今議者以圜丘方澤皆以太祖配以為皇上新制以大祀殿祀上帝以二祖配以為祖宗舊制皆一時遷就之説非至當不易之論夫冬至報天之禮重孟春祈榖之禮輕天與帝一也大祀殿既可以二聖並配圜丘何獨不可新制舊制之説臣之所不解也臣竊惟斯禮之議本因天地不可並祭嫌於龎雜若祖宗並配原無可議既有大祀殿又建圜丘同兆南郊益非禮制夫禮時為大古今異宜非可一律蓋古圜丘因丘陵為之非積土而壇方澤因方澤為之非掘地而坎今儀文大備屋而祀之掃地之儀安可復用或謂屋祭為帝壇祭為天臣觀思文之詩祭后稷配天而歌者也一詩之中天帝並稱我將之詩祭文王配帝而歌者也一詩之中止稱天而不稱帝則天之與帝原自無異臣惟今日郊祀之義有簡易可行之道足可繼承者因南郊大祀殿以祀昊天上帝配以二祖冬至大報天可也孟春祈榖可也萬一雨雪屆期亦可備而成禮北郊建壇以祀皇地祗亦以二祖配之明夏方有事北郊工役可徐圖耳夫天地者古今之天地分而祀之三代之彞典也不可龎雜故臣將順皇上為之祖宗者一代之祖宗功德俱隆並配天地當代之定制也孝子慈孫不可輕有議擬故臣不敢將順皇上為之蓋宜于古而古宜于今而今惟求心之安而已帝意終不可奪乃下禮部申議疏且責之曰祖宗並配在禮為黷但朕所定祈榖原因曲全祖制與明堂舉事不同依擬奉二祖並侑二至之祀奉皇祖獨配禮儀俱從儉詳擬以聞明史張璁傳帝自排廷議定大禮遂以制作禮樂自任而夏言始用事乃議皇后親蠶議勾龍棄配社稷議分祭天地議罷太宗配祀議朝日夕月别建東西二郊議祀髙禖議文廟設主更從祀諸儒議祧德祖正太祖南向議祈榖議大禘議帝社帝稷奏必下璁議顧帝取獨斷璁言亦不盡入其諌罷太宗配天三四往復卒弗能止也夏言傳當是時帝鋭意禮文事以天地合祀非禮欲分建二郊並日月而四大學士張孚敬不敢決帝卜之太祖亦不吉議且寢會言上疏請帝親耕南郊后親蠶北郊為天下倡帝以南北郊之説與分建二郊合令孚敬諭旨言乃請分祀天地廷臣持不可孚敬亦難之詹事霍韜詆尤力帝大怒下韜獄降璽書奬言賜四品服俸卒從其請又贊成二郊配饗議語詳禮志言自是大蒙帝眷王圻續通考修撰姚淶議略云古之祭日于壇謂春分也祭月于坎謂秋分也其陰陽先後之序義則得之從之可也若冬至夏至之祭臣于此竊有疑焉周人以建子之月為歲首故冬至祭天夏至祭地陰陽之義先後之倫各有攸宜斯制禮之本意也今所用者夏正也如以一歲之月序之則夏至前而冬至後苟夏至祭地冬至祭天是先地而後天雖曰陽先隂後于義無嫌然實非一歲之事尊天之義豈其若此行周之禮不可以用今之時用今之時不可以行周之禮是其大者已礙而不通矣春明夢餘録國之大在祀而祀之大在郊自古禮殘缺後儒穿鑿而五帝六天合祀之説迄無定論則以不深考于經折衷于聖以凖之也書曰肆類于上帝禋于六宗望于山川遍于羣神又曰柴望秩于山川又曰柴望大告武成曰類曰柴皆祀天之祀也然必及于六宗山川羣神而不及后土則郊必兼社之謂也易曰先王作樂崇德殷薦之上帝以配祖考又曰聖人亨以享上帝周禮以禋祀祀昊天上帝記曰郊社之禮所以事上帝也皆舉郊以見社也家語孔子曰天子卜郊則受命于祖廟作龜于禰宫尊祖親考之義也郊之必卜而不及社兼社也此唐虞三代之制也儒者但見周禮有冬至祭圜丘夏至祭方澤之文遂主分祀之説不知周禮一歲之間祭天凡幾正月祈榖孟夏大雩季秋明堂至日圜丘此外有四時之祭則固合祭者矣惟是周朔建子冬至圜丘適當獻歲不妨迎陽報天而後命及于地故其禮比合祭稍加崇重此惟行周禮之時則可耳乃其合祀之禮則未嘗廢散見諸經及孔子之言可據也使祭而必冬至也則何用卜之為故曰至敬不壇掃地而祭則又不必于圜丘方澤也以是而知周之未嘗不合祭也由漢厯唐千餘年分祀者惟魏文帝之大和周武帝之建德隋髙祖之開皇唐玄宗之開元四祭而已至宋郊祀皆合祭其不合祭者惟元豐六年一郊元祐詔議北郊彼時羣臣方議合祭之非哲宗以問輔臣章惇曰北郊止可謂之社君子當不以人廢言夫國之大祀莫過于郊明太祖以開天之聖改分祀為合祀此千古卓見故行之百五十餘年風雨調順民物康阜至嘉靖一改而明遂衰建議者夏言也卒死于法抑太祖之靈弗歆也吳鼎辨姚淶孫承澤天地社合一祭天地分合祭聚訟久矣從未有建子宜分建寅宜合如姚氏孫氏者也祭社祭地之異同聚訟久矣從未有既合地于天又合社于地如孫氏者也周禮圜丘方澤分祭甚明朱子曰古聖王制為祭祀之禮必以象類故祀天于南祭地于北而其壇壝樂舞器幣之屬亦各不同若曰合祭于圜丘則古者未嘗有此瀆亂尤雜之禮朱子之言洵禮家之折衷可以俟後聖而不惑矣自王莽詔事元后肇為合祭之禮後人樂便安憚勞費遂因仍不易宋元豐元祐紹聖間凡三議禮明嘉靖間又議禮主分主合紛拿喧豗然主分者皆援據正經主合者多苟且從欲如眉山所云官兵暴露人馬喘汗非夏至所能堪江陵所云冬至極寒而祼獻于星露之下夏至盛暑而駿奔于炎歊之中其説槩可睹乃姚氏淶變為建子宜分建寅宜合之説後人疑其有當是不可不辨夫冬至圜丘迎陽氣之始夏至方澤迎隂氣之先此天地隂陽之大分報本反始之精義固不因建子而創此禮亦不可因建寅而廢此禮况周禮又用夏正之書也自古三正遞建周雖建子逸周書云敬授民時巡狩祭享猶自夏焉周禮授時祭享之書故純用夏正圜丘方澤正用夏正之事于建子何與耶姚氏之言曰以一歲之月序之則夏至前而冬至後苟夏至祭地是先地而後天尊天之義豈其若此此尤説之不可通者也先王之制祭祀因時而舉初不以先後為尊卑宗廟時享春夏薄而秋冬盛不聞以薄祭為尊盛祭為卑也宗廟殷祭禘祫尤大于時享而禘以夏祫以秋禴乃在春不聞以禴祭為尊禘祫為卑也五祀之祭春祀户秋祀門不聞以户為尊以門為卑也且即以夏正一歲而論元日祈榖有祭龍見大雩又祭又何嘗不先天後地特義之所起仍不在先後之序耳又其説曰行周之禮不可以用今之時用今之時不可以行周之禮則是周禮與夏正斷斷背而馳孔子何以自云吾從周而又告顔子以行夏之時不自相刺謬耶孫氏承澤申姚氏之説曰周朔建子冬至圜丘適當獻歲不妨迎陽報天而後命及于地故其禮比合祭稍加崇重此惟行周禮之時則可耳案孫氏之意止欲合天地而祭之而其為説直欲舉圜丘一祭而廢之周朔建子不妨迎陽報天明夏朔建寅則有妨也周朔建子可行圜丘崇重之禮明夏朔建寅則不可行圜丘崇重之禮也惑亦甚矣又曰使祭而必冬至也何用卜之為夫冬至之郊圜丘之郊也日不須卜用辛之郊祈榖之郊也日乃用卜圜丘之郊惟天子得行之祈榖之郊魯亦得行之而郊牽連而舉則祈榖為次郊而圜丘為始郊故郊特牲既言郊用辛而又曰周之始郊日以至義各有指孫氏混而一之以祈榖之郊礙圜丘之郊是祈祭可存正祭決不可存魯郊可從周郊決不可從斯何義耶又曰至敬不壇掃地而祭則又不必于方澤也案圜丘即泰壇方澤即泰折一見于周禮一見于祭法則禮器所謂不壇者非無壇也方圜髙下因其自然之形而非人力所為故曰不壇今誤以不壇為無壇而欲廢方澤之祭抑又惑矣又曰嘉靖一改而明遂衰建議者夏言也卒死于法夫嘉靖以後之衰豈緣郊祀之更夏言之死于法豈由分祭之説孫氏牽合株連以證已堅僻之説不亦誣耶至于祭地祭社尤確然不可合者王制言天子祭天地諸侯祭社稷祭地祭社截然不同胡五峯始為社與方澤無兩祭之説朱子以為看來自有方澤之祭書傳彚纂曰社于新邑謂此所以祭地者非也若以此社為祭地則王制所云祭天地社稷地與社豈重纍而舉之乎斯可謂一言破的矣周世樟曰考之諸書地與社鑿然不同地為大祀社為中祀祭地用騂犢祭社用太牢祭地七獻祭社三獻祭地服衮衣祭社服希衣祭地以后稷配祭社以句龍配斯尤援引確據無復可疑夫言郊可以兼天地詩序昊天有成命郊祀天地也南郊北郊皆郊也言郊不得兼社召誥用牲于郊牛二越翌日戊午乃社于新邑社又在南北郊之外也而孫氏乃云郊必兼社又曰舉郊以見社斯何説耶至其所引肆類柴望之文則皆告祭之郊而非正郊所引受命作龜之文則又祈穀之郊而非正郊俱不足為兼社之證所引中庸郊社之禮郊社對舉猶之禘嘗對舉實皆錯舉成文亦不足為社即方澤之證總之孫氏之説既欲合地與天為一祭將燔柴瘞埋血祭混一合和都無分别非朱子所訶瀆亂龎雜之尤甚者耶我之朝折衷古制冬至祀天圜丘夏至祭地方澤祈穀後祭社稷壇有分祭而無合祭斯誠萬世可行之典也夫顧我鈞嘉靖分祀論明世宗尊崇興獻徇私蔑禮固天下萬世之所不韙也至于南北兩郊力主分祀則為天下萬世之所不可易古人云是亦多言矣豈必不獲雖不可據此一事以為世宗之賢而就此一事其言固不可以人廢矣即行之未久張居正進郊祀圖册復以合祭為言而終明之世亦卒不行若乃當時之有姚淶後代之有孫承澤顧深以分祀為非而力詆之何歟或以世宗偏私豐昵人所不服故并其合禮者而疑之然議禮但論其是非固不當以他事相牽涉况如學校從祀舉前代傳經之儒苛求而黜罷之此甚非祭于瞽宗之意後人會莫為改正而反于分祀詆之不可解也或謂世宗既定分祀而親奉甚疏率以遣官行事是何足與言禮曰是則誠非矣然而有初鮮終亦人所有但當咎其後之不終不得議其始之不善也總之明自嘉靖以下經學日衰士人素不深求其義而又以太祖父母異處之言垂為大訓沉溺錮蔽牢不可開雖有聖君賢相百倍于世宗與夏言張璁者亦不能破除流俗而使之共信也蓋嘗論之古今主合祭者多矣然其由來不同不可一槩論也夫王莽天下之姦雄也彼必合天地而祭之然後可合祖妣而配之欺誑女主以為篡竊之計是固明知其不然而強行之者也蘇子瞻天下之辨才也彼度宋之君臣必不足以行禮宋之財力必不足以盡禮而身為儒臣又不肯自安簡陋而必獵取載籍以附會之是亦明知其不然而謬言之者也張居正天下剛愎自用之人也彼以嚴寒盛暑駿奔壇折人主所憚而諸臣亦無利焉于是直揭其情而不復為之掩蓋是又明知其不然而故犯之者也此三人者固非真以為當合也若乃經典之不考義理之不明上惑于太祖之臆言下怵于夏言之被禍遂以合祭之制果為至當隱微寤寐誠一不二者古今以來未有如姚淶孫承澤者矣此則可謂妄庸也夫蕙田案國之大事在祀祀之至大者莫如兩郊分合之議自漢迄唐宋雖屢更而未定至明世宗始斷然行之其言曰大祀有殿是屋下之祭帝未見有祭天之禮合祭一處亦非專祭上帝又曰二至分祀萬代不易之禮天地合祀擬之夫婦同牢褻慢已甚又曰社乃祭五土之祗非皇地祗非祭社即方澤祭地斯言也所謂考之三王而不謬建之天地而不悖質之鬼神而無疑百世以俟聖人而不惑者矣在昔主合祭者皆有私意如王莽之媚元后蘇軾之憚勞費即後來張居正之溺宴安皆有所為從未有直以分祭為非者乃姚淶創為堅僻之新説承澤從而附和之意何所為豈真以合祭為是分祭為非耶其亦疏于學術矣吳氏顧氏辨之極詳並載于後考禮者幸無為所惑也顧我鈞嘉靖議郊配論人非聖賢不能無私然其本心之明雖至私之人必有所發見而未嘗盡沒者惟不能引伸而擴充之是以卒蔽于私而不當理也方明世宗之追尊興獻也舉朝爭之呼天搶地而其心悍然敢犯天下萬世之不韙而不顧此其不明極矣然觀其議定郊祀則鰓鰓焉以太宗並配為非禮人以為此放飯流啜而問無齒決者也或曰此欲推太宗而逺之以為興獻配明堂地也此二言者固皆近是然以余觀之是固其本心之明而不可遽謂之過也夫明祖崛起與漢同符漢代郊堂俱配髙祖後儒亦有言其不合禮者此不知通變之論也太公執嘉秦之黔首溯其先世誰當為后稷者雖使周公處漢亦必以髙祖兼配為正也當明祖立國之始羣臣請以考配天太祖謙讓再三至于告廟而不配豈徒以宇內未平哉以匹夫徒步之人無一毫功德于天下徒以子為天子忽躋之以配天死猶有知亦必有愧報局蹐而不敢當者配天與宗廟事理固有不同是謂是非之公天子所不能私其父也至太祖既崩則配天專屬太祖百世不可易也彼太宗殺父嫡孫竊其神器是乃髙煦宸濠之幸成者耳而以為比隆太祖乎此仁宗之私不足以協萬世之公世宗蓋隱見及此故不禁其執之堅言之屢也蓋興獻之為分親親則私之者甚而其識昏其氣悍雖萬夫爭之而不回太宗之為祖逺逺則私之者輕而其心平其見清一人靜思之而天下之公是公非悠然出矣使其能引而伸之思天下事之不當乎理者雖子孫觀之而是非之不可昧如此然則已之有天下也孰與漢髙與太祖而今之尊崇其父者乃欲過于漢髙與太祖之父後世子孫得毋有擬議其失者乎知此而大禮之議宜有悔心之萌當私欲錮蔽之中猶有一隙之可望者轉關全在乎此矣彼夏言張璁者不務導之于公正而徒勸之以因仍于是太宗之配不祧而興獻配明堂之失愈無覺悟之路矣璁不足道也言獨惡能無罪哉明史世宗本紀十一月己酉祀昊天上帝于南郊禮成大赦王圻續通考將郊祀帝諭夏言欲親行奉安禮乃擬儀注以聞先期擇捧立執事官十一員分獻配殿大臣二員撰祝文備脯醢酒果制帛香燭前一日行告廟禮設神輿香案於奉天殿神案二於泰神殿神案二於東西配殿香案一於丹墀正中設大次于圜丘左門外是日質明帝常服詣奉天殿行一拜三叩頭禮執事官先後捧昊天上帝太祖髙皇帝及從祀神主各奉安輿中至泰神殿門外帝乘輅至昭享門禮官導至泰和殿丹墀執事官就輿捧神主升石座奉安于龕中帝詣香案前行三獻禮如儀禮畢出至大次升座百官行一拜三叩頭禮畢還宫凡祭祀先期三日及二日百官習儀于朝天宫嘉靖九年更定郊祀冬至習儀于前期之七日及六日嘉靖九年四郊工成帝諭太常寺曰大祀分獻官預定方可習儀乃用大學士張璁等于大明夜明星辰風雲雷雨四壇舊制分獻用文武大臣及近侍官共二十四人今定四人法司官仍舊例不與明會典圜丘大祀儀嘉靖九年定前期十日太常寺題請視牲次請命大臣三員看牲四員分獻前期五日錦衣衛備隨朝駕皇帝詣犧牲所視牲視牲前一日皇帝常服告廟至日視牲畢命大臣輪視如常儀前期四日皇帝御奉天殿太常寺奉祭祀進銅人如常儀博士捧告請太祖祝版于文華殿候皇帝親填御名訖捧出前期三日皇帝具祭服以脯醢酒果詣太廟請太祖配神訖易服御華蓋殿太常寺卿同光祿寺卿面奏省牲訖皇帝御奉天殿百官具朝服聽受誓戒傳制前期二日太常卿同光祿卿奏省牲如常儀牛九牝羊三豕三鹿一兔六是日錦衣衛具神輿香亭太常官具玉帛匣及香盒各設于奉天殿次日皇帝至奉天殿親填祝版版以青禇硃書置玉帛于匣太常卿捧安輿內皇帝三上香行一拜三叩頭禮畢錦衣衛官校舁至天壇太常卿奉安于神庫前期一日免朝錦衣衛備法駕設版輿于奉天門下正中皇帝吉服告于廟出乘輿詣南郊由西天門入至昭享門外降輿禮部太常官導皇帝由左門入至內壝太常卿導皇帝至圜丘恭視壇位次至神庫視籩豆至神厨視牲畢仍由左門出升輿至齋宫分獻陪祀官叩頭如常儀壇上陳設上帝南向犢一蒼玉一郊祀制帛十二俱青色登一簠簋各二籩十二豆十二蒼玉爵三酒尊三青漆團龍篚一祝案一配帝西向犢一奉先制帛一白色登一簠簋各二籩十二豆十二蒼玉爵三酒尊三雲龍篚一從祀四壇俱在壇之二成大明在東西向犢一登一禮神制帛一赤色簠簋各二籩十豆十酒盞二十青瓷爵三酒尊三篚一夜明在西東向陳設同禮神制帛一白色星辰在東西向北上曰五星曰二十八宿曰周天星辰犢一羊一豕一登一鉶一實以和羮簠簋各二籩十豆十酒盞三十帛十青色一赤色一黃色一白色六黑色一青瓷爵三酒尊三篚一雲雨風雷在西東向北上陳設同帛四青色一白色一黃色一黑色一前期一日太常寺設香案于皇穹宇丹墀正中將事之夕三更一點禮部太常寺堂上官恭詣香案前尚書上香率各官行一拜三叩頭禮畢太常寺官九員分詣東西配殿各請從位神牌出龕先雷師次風伯次雨師次雲師次周天星辰次二十八宿次五星次夜明次大明捧至丹墀東西向立太常寺官一員詣殿中請太祖主出龕太常寺少卿一員恭捧西向立太常寺官二員請上帝神版出龕太常寺卿恭捧南向立禮部侍郎二員導引出殿先上帝次太祖次大明次夜明次五星次二十八宿次周天星辰次雲雨風雷由圜丘北門入轉至午陛升壇先上帝次太祖次從位各依原序先後奉安于神座候皇帝至大次尚書率各官致詞復命叩頭出祭畢太常官如前捧請禮部侍郎導引入殿以次納于龕中奉安訖各官仍行一拜三叩頭禮出正祭是日三鼓皇帝自齋宫乘輿至外壝神路之西降輿導引官導皇帝至神路東大次上香官同導引官捧神位官復命訖退百官排班于神路之東西以俟皇帝具祭服出導引官導皇帝由左櫺星門入內贊對引官導皇帝行至內壝典儀唱樂舞生就位執事官各司其事皇帝至御拜位內贊奏就位皇帝就位典儀唱燔柴唱迎帝神樂作內贊奏升壇導皇帝至上帝金爐前奏跪奏搢圭司香官捧香跪進于皇帝左內贊奏上香皇帝三上香訖奏出圭導至太祖金爐前儀同奏復位皇帝復位樂止內贊奏四拜傳贊百官同典儀唱奠玉帛樂作內贊奏詣神御前導皇帝至神御前奏搢圭捧玉帛官以玉帛跪進于皇帝右皇帝受玉帛內贊奏獻玉帛皇帝奠訖奏出圭導至太祖前奏搢圭奏獻帛奏出圭奏復位皇帝復位樂止典儀唱進爼樂作齋郎舁爼安訖內贊奏詣神御前導皇帝至神御前奏搢圭奏進爼奏出圭導至太祖前儀同奏復位皇帝復位樂止典儀唱行初獻禮樂作內贊奏詣神御前導皇帝至神御前奏搢圭捧爵官以爵跪進于皇帝右皇帝受爵內贊奏獻爵皇帝獻訖奏出圭奏詣讀祝位導皇帝至讀祝位奏跪傳贊衆官皆跪樂暫止內贊奏讀祝讀祝官跪讀祝畢樂復作奏俯伏興平身傳贊百