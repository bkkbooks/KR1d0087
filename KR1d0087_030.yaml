祭祀日于奏上門奏進嘉靖九年令以九月奏諸祀日自大報始是年帝親定進祀日册儀每歲九月朔禮部尚書以大報及諸祀日告于皇帝前期宿于公署鴻臚卿請御殿設案于奉天殿中至日百官公服侍班皇帝服皮辨禮部尚書具朝服捧祀日册自午門中道入立置于案皇帝就先立定禮部尚書跪奏嘉靖幾年分大報等祀日册請敬之皇帝搢圭取而恭視訖序班舉案置于華蓋殿中皇帝升座百官叩頭如常禮明史世宗本紀十七年十一月辛卯祀天于南郊詔赦天下禮志十七年撤大祀殿又改泰神殿曰皇穹宇明會典嘉靖十七年冬十一月更上昊天上帝泰號曰皇天上帝改泰神殿曰皇穹宇明史禮志十七年罷脫舄禮春明夢餘録郊壇門外每祀設大次駕臨壇入幕次脫舄升壇其升壇執事導駕贊禮讀祝並分獻陪祭官皆脫舄於外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄嘉靖中享廟皇后助祭遂罷脫舄禮後不復行世宗本紀十八年十一月丙申祀天于南郊王圻續通考明初最嚴郊祀太祖以後無不親郊者成祖北巡間令太子攝祀其以疾改卜郊止太祖洪武六年孝宗𢎞治十六年兩郊而已百餘年中肅奉明禋對越罔懈事天之誠唐宋諸君莫之逮也惟武宗末年屢以遊豫改卜郊然亦未敢輒廢世宗嗣服鋭意制作改合祀為分祀罷二祖並配毅然排衆議而為之以蘄合于三代之禮用意可謂勤矣十三年南郊親製大報歌亦有慎始圖終之語乃分祀未幾遂至遣代大享殿徒事改作而祈榖仍于內殿行事且皇天泰號徒奉虛稱睿宗配天貽譏豐昵雖日禮元極寶殿乃溺于方士幻妄之説非實有昭事上帝之誠也蓋帝議禮之後喜事紛更始有博復古之虛名而誠意有所不至繼乃崇尚玄修惑溺日深凡所改作皆廢置不復再舉而祖宗以來嚴恭寅畏之心蕩然無存再傳而至神宗怠棄益甚郊廟之祀數十年不一躬親不可謂非帝啓之也記曰惟聖人為能享帝孝子為能享親理固不可易矣禮志二十四年又即故大祀殿之址建大享殿穆宗本紀隆慶元年十一月癸亥祀天于圜丘明會典隆慶元年禮部會議圜丘方澤朝日夕月歲舉四郊仍如世宗所更定而罷祈榖及明堂大享禮王圻續通考穆宗隆慶元年禮部會議郊祀之禮國初建圜丘于鍾山之陽用冬至祀天以日月星辰太歲從祀建方丘于鍾山之陰用夏至祀地以嶽鎮海瀆從祀俱奉仁祖淳皇帝配又築朝日壇于城東夕月壇于城西用春秋分行事夕月亦以星辰從祀俱不奉配洪武十年始定合祀之制每歲正月擇日行于大祀殿三十二年更奉太祖髙皇帝配永樂十八年北京大祀殿成行禮如前儀洪熙元年增奉成祖文皇帝並配嘉靖九年始建圜丘于南郊冬至祀天以日月星辰風雲雷雨從祀建方澤于北郊夏至祀地以嶽鎮海瀆陵寢諸山從祀俱奉太祖髙皇帝配又建朝日壇于東郊以春分祭日無從位建夕月壇于西郊以秋分祭月亦以星辰從祀俱不奉配今分祀已久似難紛更宜照例南北二郊于冬夏至日恭請聖駕親詣致祭仍奉太祖髙皇帝配時禮部言郊廟社稷諸祭太常寺先期具奏行禮止奏日不奏時以故陪祀諸臣失期者衆請以後並奏日時從之明史髙儀傳穆宗即位世宗遺命郊社諸禮悉稽祖制更定儀乃會廷臣議天地分祀不必改既而中官李芳復請天地合祀如洪武制舒化傳冬至郊天聞帝咳聲推論陰陽姤復之漸請法天養微陽詞甚切直明史穆宗本紀二年十一月戊寅祀天于圜丘三年十一月甲戌祀天于圜丘四年十一月己卯祀天于圜丘王圻續通考丙子以大祀圜丘上御皇極殿誓戒文武羣臣致齋三日命成國公朱希忠告太廟請太祖髙皇帝配禮畢上還宫尚食監設御筵案于御座之傍光祿寺設酒亭于御座下之西膳亭于御座下之東百味于酒亭膳亭之東西設羣臣位桌于皇極殿內及中左右門丹墀內之東西教坊司設九奏樂歌于殿內設大樂于殿外立三舞雜隊于殿下文武百官行慶賀禮畢退執事官及與宴官各具吉服執事官先趨入殿內伺候與宴官序立于丹陛餘俱序于丹墀東西迎駕伺駕過殿內與宴官隨即趨入分班序立上常服乘板輿由歸極門出入皇極門樂作至殿上降輿升座樂止鳴鞭鴻臚官贊衆官入班外贊贊排班內外各贊鞠躬樂作四拜興平身樂止內官進護衣舉案進花畢教坊司跪奏上萬壽之曲樂作內官斟酒捧爵至御座前內外各贊跪衆官皆跪教坊司奏進酒上飲畢內外各贊俯伏興平身樂止各就位衆官到席立定上諭官人每坐鴻臚寺官承旨傳贊官傳訖衆官方各就位簪花教坊司跪奏平定天下之舞舞畢上諭官人每斟酒鴻臚寺官承旨傳贊官傳訖教坊司跪奏二奏仰天休之曲樂作內官斟酒捧爵至御案前教坊司跪奏進酒候上舉酒各官以次舉飲訖樂止殿外導湯樂作至殿內迎湯樂作各官起立內官捧湯至御座前各官復位樂止教坊司跪奏進湯樂作候上舉筯各官以次舉訖鴻臚寺官贊饌成內官徹湯樂作教坊司跪奏黃童白叟鼓腹謳歌承應舞舞畢復跪奏三奏感大德之曲樂作進酒如前儀樂止教坊司跪奏撫安四夷之舞舞畢上諭官人每斟滿著鴻臚寺官承旨傳贊官傳訖教坊司跪奏四奏慶洪禧之曲樂作奉酒湯如前儀樂止教坊司跪奏車書混同之舞舞畢復跪奏五奏荷皇恩之曲樂作進酒如前儀樂止教坊司跪奏呈祥瑞之舞舞畢上諭官人每飲乾著鴻臚寺承旨傳贊官傳訖教坊司跪奏六奏民樂生之曲樂作進酒進湯如前儀樂止教坊司跪奏讚聖喜之舞舞畢復跪奏七奏景祚隆之曲樂作進酒進湯如前儀樂止教坊司跪奏來四夷之舞舞畢復跪奏八奏永皇圖之曲樂作進酒進湯如前儀樂止教坊司跪奏表萬方之舞復跪奏九奏賀太平之曲樂作進酒進湯如前儀樂止內官徹御前爵殿外導湯膳樂作至殿內迎湯膳樂作各官起立內官捧湯膳至御案前各官復位樂止教坊司跪奏進膳樂作鴻臚寺官傳贊膳成內官徹湯膳樂止教坊司跪奏天命有德之舞舞畢奏纓鞭得勝蠻夷隊舞承應奏致語畢鴻臚寺官贊徹案尚膳監徹御案訖贊宴成衆官出席俱列班鴻臚寺官贊入班外贊贊排班內外贊鞠躬樂作贊行四拜禮樂止鴻臚寺官贊禮畢鳴鞭駕興還宫百官退內外坐宴官凡遇傳制時俱各起立拱聽傳畢復就坐其殿內與宴朝鮮國陪臣及外夷都督俱各用通事序班一員引領行禮萬厯三年十一月內閣臣張居正進郊禮圖册曰國初建圜丘于鍾山之陽以冬至祀天建方丘于鍾山之隂以夏至祀地洪武二年始奉仁祖淳皇帝西向配享十年春始定合祀之制時以天地壇大祀殿未成暫于奉天殿行禮至十二年正月乃合祀于大祀殿仍奉仁祖配享命官分獻日月星辰嶽鎮海瀆山川諸神凡一十四壇三十二年更奉太祖髙皇帝配享永樂十八年北京天地壇成每歲仍合祀如儀南京壇有事則遣官祭告洪熙元年奉太祖髙皇帝太宗文皇帝同配享嘉靖九年初建圜丘于大祀殿之南每歲冬至祀天以大明夜明星辰雲雨風雷從祀建方澤于安定門外每夏至祭地以五嶽五鎮四海四瀆陵寢諸山從祀俱止奉太祖一位配享而罷太宗之配其大祀殿則以孟春上辛日行祈榖祭奉太祖太宗同配享十年又改以啓蟄日行祈榖禮于圜丘仍止奉太祖一位配享十七年秋九月詔舉明堂大享禮于大內之元極寶殿奉睿宗獻皇帝配享元極殿即舊欽安殿是冬十一月上具册寶圜丘上昊天上帝為皇天上帝尊號十八年春行祈榖禮于元極寶殿不奉配二十四年拆大祀殿改建大享殿命禮部歲用季秋奏請卜吉行大享禮隨又命仍暫行于元極寶殿隆慶元年詔罷祈榖大享二祭復元極寶殿仍名欽安殿而天地則分祀如世宗所更定云謹案天地分祀至洪武十年聖祖乃定為合祀之制每歲正月上辛日行禮于南郊大祀殿列聖遵行百六十餘年至世宗皇帝始案周禮古文復分建南北郊俱壇而不屋南郊以冬至北郊以夏至行禮而二至之外復有盂春祈榖季秋大享歲凡四焉隆慶改元詔廷臣議郊祀之禮時議者並請罷祈榖大享復合祀天地于南郊先帝深維三年無改之義獨以祈榖大享在大內行禮不便從禮官議罷之而分祀姑仍其舊蓋亦有待云爾夫禮因時宜本乎人情者也髙皇帝初制郊禮分祀十年矣而竟定于合享者良以古今異宜適時為順故舉以歲首人之始也卜以春初時之和也歲惟一出事之節也為屋而祭行之便也百六十餘年列聖相承莫之或易者豈非以其至當允協經文而可守乎今以冬至極寒而祼獻于星露之下夏至盛暑而駿奔于炎歊之中一歲之間六飛再駕以時以義斯為戾矣且成祖文皇帝再造宇宙功同開創配享百餘年一朝而罷之于人情亦大有不安者故世宗雖分建圜方之制而中世以後竟不親行雖肇舉大享之禮而歲時禋祀止于內殿是斯禮之在當時已窒礙而難行矣况後世乎臣等愚昧竊以為宜遵髙皇之定制率循列聖之攸行歲惟一舉合祀之禮而奉二祖並配斯于時義允協于人情為順顧郊禋禮重今且未敢輕議謹稽新舊規制禮儀而略述其槩以俟聖明從容裁斷焉上從之蕙田案舊禮者太祖所定新禮者世宗所定也據居正稱極寒而祼獻于星露之下盛暑而駿奔于炎歊之中是冬至圜丘夏至方澤之禮果不可行也為大臣者不以敬天勤民相警朂而苐以宴安逸豫導之其謂之何又案璁萼獻夫以議興獻禮寵擢于前夏言以議分祀專配柄用于後蓋主眷之所厚即為權勢之所歸而其所以得膺主眷者則常以議論之投契致之神宗惰窳之習江陵蓋有以窺之矣故陽為議禮以翻嘉靖之案隂為順導以悅神宗之心所以嘗之而擅其權者作用在此徒以失禮議之不足以盡其情也明史神宗本紀萬厯三年十一月乙巳祀天于南郊明會典萬厯三年親祀圜丘儀正祭前六日早上常服以親詣南郊視牲預告于太廟前五日錦衣衛備隨朝駕如常儀質明上常服御皇極殿太常寺官奏請聖駕視牲百官具吉服朝參鳴鞭訖先趨出午門外東西序立候送上由大明門正陽門西天門舊路至犧牲所南門迤西上降輦禮部尚書侍郎太常卿少卿導上至所內幄次禮部官跪奏請視牲仍同太常寺官導上至各牲房前太常卿跪奏視大祀牲逐一視畢仍導上至幄次內上少憩出禮部太常寺官仍導上升輦駕還百官俱於承天門外序立候迎上仍詣太廟參謁前四日上御皇極殿太常寺奏祭祀前三日質明上常服乘輿詣太廟門西降輿至幄次內具祭服告請太祖配神行一獻禮畢出幄次內易皮辨服回御中極殿太常寺光祿寺官奏省牲畢御皇極殿傳制誓戒百官前二日早上常服以親詣南郊大祀預告于太廟是日午後太常寺官捧蒼玉帛匣香盒同神輿亭進于皇極殿內司禮監官捧帛同案設于御案之北前一日質明上從文華殿出由皇極殿左門入至御案前立太常卿捧祝版由中門進于御案上上填御名訖太常卿捧安輿中司禮監官進帛于上裝匣內并蒼玉安訖太常卿捧安輿中太常卿隨捧香盒於香亭右跪上三上香行一拜三叩頭禮畢轉於東西向立錦衣衛官校入擡輿亭由中門出太常卿隨詣天壇神庫奉安上由殿中門出乘輿詣南郊至昭享門西禮部尚書侍郎太常少卿等官行叩頭禮畢分兩傍候上降輿尚書等官導上由昭享左門入至內壝左門太常卿跪迎同導上至午陛尚書等官俱止太常卿導上至圜丘恭視壇位尚書等官俱先詣東陛前伺候上視壇位畢太常卿導上由東陛下尚書等官同導上至神庫視籩豆至神厨視牲俱太常卿導入逐一奏畢禮部太常寺官導上仍由昭享左門出升輿至齋宫分獻陪視官朝參傳旨賜早飯各官叩頭謝恩至午各官候旨朝參仍傳旨賜午飯謝恩如前儀是日午後太常寺陳設如常儀至一更時分禮部尚書等官詣皇穹宇尚書上香請神侍郎二員導引太常寺官以次捧正位配位神版從位神牌詣壇奉安訖候報時上常服乘輿出至外壝神路之西降輿導駕官導上至神路東大次禮部同太常官復命畢上具祭服出由內壝左櫺星門入行大祀禮如常儀畢上至大次易常服至齋宫少憩駕還仍詣太廟參謁畢具衮冕服御皇極殿行慶成禮明史神宗本紀萬厯六年十一月辛酉祀天于南郊十四年十一月癸卯祀天于南郊三十三年四月庚子雷擊圜丘望燈髙杆熹宗本紀天啓三年十一月丁巳朔祀天于南郊莊烈帝紀崇禎元年十一月癸未祀天于南郊八年十一月庚申祀天于南郊十二年十一月辛巳祀天于南郊十三年十一月丁亥祀天于南郊十六年十一月壬寅祀天于南郊蕙田案張居正以神宗三年進新舊禮圖欲改合祀然四年七年五月俱嘗祀地北郊固未嘗改為合祀故神宗熹宗烈帝三紀始終皆書祀天特祭地之禮不行耳孰謂後人果以合祭為是乎右明郊禮五禮通考卷二十
