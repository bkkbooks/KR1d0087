body:
  text: 五禮通考卷一百六十八刑部尚書秦蕙田撰嘉禮四十一鄉飲酒禮漢書成帝本紀鴻嘉二年三月博士行飲酒禮續漢書禮儀志明帝永平二年郡國縣道行鄉飲酒于學校祀先聖先師周公孔子牲以犬後漢書伏湛𫝊湛雖在倉卒造次必于文徳以為禮樂政化之首顛沛猶不可違是歳奏行鄉飲酒禮遂施行之蕙田案伏湛奏行鄉飲酒禮以紀𫝊參校當在建武五年是此禮光武時已行之不始于永平也李忠𫝊建武六年忠遷丹陽太守為起學校習禮容春秋鄉飲選用明經郡中向慕之晉書禮志武帝太始六年十二月帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃令復講肄舊典賜太常絹百匹丞博士及學生牛酒咸寧三年及惠帝元康九年復行其禮晉傅𤣥辟雍鄉飲酒賦時皇帝親枉萬乗之尊號以幸乎辟雍鹵簿齊列官正其容乃延卿士乃命王公定小會之常儀兮享殊俗而見逺邦揖讓而升有主有賓禮雖舊制其教惟新若其俎豆有數威儀翼翼賓主百拜貴賤攸敕酒清而不飲肴乾而不食及至嘒嘒笙磬喤喤鐘鼓琴瑟安歌徳音有叙樂而不淫好樸尚古四坐先迷而後悟然後知禮教之宏普也魏書孝文帝本紀太和十一年冬十月甲戌詔曰鄉飲禮廢則長幼之序亂孟冬十月民間歳隙宜于此時導以徳義可下諸州黨里之内推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞隋書禮儀志隋制國子寺每歳以四仲月上丁釋奠于先聖先師年别一行鄉飲酒禮州郡縣亦每年于學一行鄉飲酒禮唐書太宗本紀貞觀六年七月己巳詔天下行鄉飲酒禮通典貞觀六年詔曰此年豐稔閭里無事乃有墮業之人不顧家産朋逰無度酣宴是耽危身敗徳咸由于此自非澄源正本何以革兹弊俗可先録鄉飲禮一卷頒示天下每年令州縣長官親率長幼依禮行之庶乎時識亷恥人知敬讓册府元龜永隆元年七月制曰鄉飲之禮為日已久宜令諸州每年遵行鄉飲之禮唐書選舉志唐制取士之科由州縣者曰鄉貢皆懐牒自列于州縣試已長吏以鄉飲酒禮會屬僚設賓主陳俎豆講管絃牲用少牢歌鹿鳴之詩因與耆艾叙長少焉武后長安二年始置武舉亦以鄉飲酒禮送兵部蕙田案鹿鳴宴之名始於此通典開元十八年宣州刺史裴耀卿上疏曰州牧縣宰所主者宣揚禮樂典册經籍所以教者返古還淳上奉君親下安鄉族外州逺郡俗習未知徒聞禮樂之名不知禮樂之實竊見以鄉飲酒禮頒行于天下比來唯貢舉之日畧用其儀閭里之間未通其事臣在州之日率當州所管一一與父老百姓勸遵行禮奏樂歌至白華華黍南陔由庚等章言孝子養親及羣物遂性之義或有泣者則人心有感不可盡誣但以州縣久絶雅聲不識古樂伏計太常具有樂器太常久備和聲請令天下三五十大州簡有性識人于太常調習雅聲仍付笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀准令式行稍加勸奬以示風俗唐開元禮鄉飲酒正齒位附鄉飲酒之禮刺史為主人此為貢人之中有明經進士身兼徳行孝誼灼然明著道表門閭及有秀才皆刺史為主人若無上佐攝行事先召鄉之致仕有徳者謀之賢者為賓其次為介又其次為衆賓與之行禮而賓舉之介以下無其人則闕正齒位每年季冬縣令為主人鄉之老人六十以上有徳行者一人為賓次一人為介又其次為三賓又其次為衆賓主人戒賓立于賓大門外之西東面賓立東階下西面將命者立于賓之左北面受命立于門外之東西面曰敢請事主人曰某日行鄉飲酒之禮請某子臨之將命者入告賓出立于門東西面北向再拜毋辱主人答拜主人曰吾子學優行髙應兹觀國某日展禮請吾子臨之賓曰某固陋恐辱命敢辭主人曰謀於父師少師莫若吾子賢敢固以請賓曰夫子申命之某敢不敬須主人再拜賓拜主人退賓拜送主人戒介亦如之戒辭曰某日行鄉飲酒之禮請吾子臨之正齒位無戒賓其日質明設賓席於楹間近北南向設主人席於阼階上西向設介席於西階上東向設正賓正齒位云三賓下倣此席三於賓席之西各南向皆不屬焉又設堂下衆賓席於西階西南面北上正齒位設衆賓席於楹間近南北向東上設兩壺於賓席之東北少退𤣥酒在西加勺冪置篚於壺南東肆實以爵觶設賛者位於東階東西面北上賓介及賓至在於㕔事大門外之右東向北上執事者俱復位主人迎賓於門外之左西面拜賓賓答拜又西南面拜介介答拜又西南面揖衆賓衆賓報揖主人又揖賓賓報揖主人先入門降而右西面賓入門而左東面介及衆賓序入立於賓西南東面北上衆賓非三賓者皆北面東上凡賓主拜揖問施皆有相賛正齒位衆賓立于三賓之後主人將進揖當階據禮作陳揖賓皆報揖至階主人曰請吾子升賓曰某敢辭主人曰固請吾子升賓曰某敢固辭主人曰終請吾子升賓曰某敢終辭主人升自阼階賓升自西階當楣北面立執罇者徹冪主人適篚跪取爵興適罇實之進賓席前西北面獻賓賓西階上北面立主人少退賓進於席前受爵退復西階上北面立主人退於阼階上北面拜送爵賓少退賛者薦脯正齒位葅醢下倣此於賓席前正齒位賓以下年六十者三豆七十者四豆八十者五豆九十及主人皆六豆賓自西方升席南面立賛者設折俎正齒位無折俎賓跪左執爵右取脯醢祭於籩豆之間遂祭酒啐酒興降席東適西階上北面跪卒爵興適罇實之進主人席前東面南酢主人主人於阼階上北面拜賓少退主人進受退復阼階下北面立賓退復西階上北面拜送爵賛者薦脯醢於主人席前主人由席東自北方升席賛者設折俎正齒位無折俎主人跪左執爵右取脯醢遂祭酒興自南方降度復阼階上北面跪卒爵執爵興跪奠爵於東序端興適篚跪取觶實之以酬復阼階上北面跪奠觶遂拜執觶興賓西階上答拜主人跪祭遂飲卒觶執觶興適罇實之進賓席前北面賓拜主人少退賓既拜主人跪奠觶於薦西興復阼階上位賓遂進席前北面跪取觶復西階下位主人北面拜送賓進席前北面跪奠觶於薦東興復西階上位主人北面揖遂降立于阼階下西面賓降立于西階西當西席東面主人將興降於禮故賓不居堂上位主人進延介主人揖介介報揖至階一讓主人升阼階介升西階皆當楣北面立主人詣東序端跪取爵興適罇實之進於介席前西南面獻介介西階上北面拜主人少退介進北面受爵退復位主人於介右北面拜送爵介少退主人立于西階之東賛者薦脯醢於介席前介進自北方升席賛者設折俎正齒位無折俎介跪左執爵右取脯醢遂祭酒執爵興自南方降席北面跪卒爵執爵興介授主人爵主人適罇實之以酢於西階上立于介右北面跪奠爵遂拜執爵興介答拜主人跪祭遂飲卒爵執爵興進跪奠爵於西楹南還阼階上揖降介降立于賓南主人于阼階前西面揖衆賓遂升適西楹南跪取爵適罇實之進于西階下南面獻衆賓之長升西階上北面拜受爵主人於衆賓長之右北面拜送賛者薦脯醢於其席前衆賓之長升席跪左執爵右取脯醢祭酒執爵興退于西階上立飲訖授主人爵降復位主人又適罇實之進于西階上南面獻衆賓之次者如獻衆賓長之禮又次一人升飲亦如之主人適罇實酒進于西階上南面獻堂下衆賓每一人升受爵跪祭立飲賛者徧薦脯醢於其位訖主人受爵奠於篚主人與賓一揖一讓升賓介衆賓序升即席設工人席於堂廡西階之東北面東上側邊曰廡工四人入先二瑟後二歌工持瑟升自西階就位坐工歌鹿鳴卒歌升入立于堂下北面奏南陔訖乃間歌南有嘉魚笙崇丘乃合樂周南闗雎召南鵲巢訖司正升西階司正為主人之賛禮樂之正既成將留賓慮有懈惰立司正以監之跪取觶於篚興適罇實之降自西階詣階間右還北面跪奠觶拱手少立跪取觶遂飲卒觶再拜賓降席取觶于篚適罇實之詣阼階上北面酬主人主人降席進立于賓東初起旅酬也凡旅酬者少長以齒賓跪奠觶遂拜執觶興主人答拜賓立飲卒觶適罇實之進阼階上東南面授主人主人再拜賓少退主人受觶賓于主人之西北面拜送旅酬同階禮殺賓揖復席主人進西階上北面酬介介降席自南方進立於主人西北面主人跪奠觶遂拜執觶興介答拜主人立飲卒觶適罇實之進西階上西南面立介拜主人少退介受觶主人于介東北面拜送主人揖復席司正升自西階北面立相旅曰某子受酬受酬者降席自西方近北面立于介右旅序也于是介酬衆賓又以次序相酬也某者衆賓也同姓則以伯仲别之又同則一以某字别之受酬者由介東尊介使不失故位司正退立於序端東面避受酬者又使其賛相上下介跪奠觶遂拜執觶興某子答拜介立飲卒觶適罇實之進西階上西南面授某子某子受觶介立於某子之左北面揖復席司正曰某子受酬受酬者降自西方立於某子之左北面某子跪奠觶遂拜執觶興受酬者答拜某子受立飲卒觶適罇實之進西階上西南面授之受酬者受觶某子立於受酬者之右揖復席次一人及堂下衆賓受酬亦如之於某子卒酬者以觶跪奠于篚復階下位司正適阼階上東面受命于主人主人曰請坐於賓司正迴北面告于賓曰請賓坐賓曰唯命賓主之詞皆司正𫝊賓坐各就席坐若賓主俱公服者則皆降脱屨于階下主人先左賓先右禮畢降納如常正齒位於楹間北面乃揚觶而言曰朝廷率由舊章敦行禮教凡我長幼各相勸朂忠于國孝于親内睦于閨門外比于鄉黨無或愆墮以忝所生賓主以下皆再拜司正跪奠觶再拜跪取觶飲卒觶興賓主以下皆坐司正適篚跪奠觶興降復其位司正降復位乃羞羞進也所進者醢正齒位無進羞無算爵無算樂算數也賓主燕飲爵行無數醉而止三賓以上賛者二人行爵以下取足也正齒位又無算燕樂亦無數或間或合盡飲而止也主人之賛者與焉燕訖賓主俱興賓以下降自西階主人降自東階賓以下出立于門外之西東面北上主人送於門外之東西面再拜賓介逡巡而退唐書韓思彦𫝊思彦子琬字茂貞舉茂才名動里中刺史行鄉飲餞之主人揚觶曰孝于家忠于國今始充賦請行無算爵儒林榮之李栖筠𫝊栖筠為常州刺史行鄉飲酒禮登歌降飲人人知勸五代史李愚𫝊愚守左僕射是時兵革方興天下多事而愚為相欲依古以創理乃請頒唐六典示百司使各舉其職州縣貢士作鄉飲酒禮時以其迂闊不用宋史禮志鄉飲酒之禮有三周禮鄉大夫三年大比興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮賓之一也黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位二也州長春秋習射于序先行鄉飲禮三也後世臘蜡百神春秋習射序賓飲酒之儀不行于郡國進貢士日設鹿鳴宴猶古者賓興賢能行鄉飲之遺禮也然古禮有賓主僎介與今之禮不同器以尊俎與今之器不同賓坐于西北介坐于西南主人坐東南僎坐東北與今之位不同主人獻賓賓酢主人主人酬賓次主人獻介介酢主人次主人獻衆賓與今之儀不同今制州軍貢士之月以禮飲酒且以知州軍事為主人學事司所在以提舉學事為主人其次本州官人行上舍生當貢者與州之羣老為衆賓亦古者序賓飬老之意也是月也會凡學之士及武士習射亦古者習射于序之意也唐貞觀所頒禮惟明州獨存淳化中會例行之玉海淳化三年詔有司講求鄉飲酒故事命學士承㫖蘇易簡等撰樂章三十四鹿鳴六南陔二嘉魚八崇丘二闗雎十鵲巢六五月禮院詳定其儀後不果行宋史樂志淳化鄉飲三十四章鹿鳴呦呦命侣與儔宴樂嘉賓既獻且醻獻醻有序休祉無疆展矣君子邦家之光鹿鳴呦呦在彼中林宴樂嘉賓式昭徳音徳音愔愔既樂且湛允矣君子實慰我心鹿鳴呦呦在彼髙岡宴樂嘉賓吹笙鼓簧幣帛箋箋禮儀蹡蹡樂只君子利用賓王鹿鳴相呼聚澤之蒲我樂嘉賓鼓瑟吹竽我命㫖酒以燕以娛何以贈之𤣥纁粲如鹿鳴相邀聚場之苗我美嘉賓令名孔昭我命㫖酒以歌以謡何以置之大君之朝鹿鳴相應聚山之荆我燕嘉賓鼓簧吹笙我命㫖酒以逢以迎何以薦之揚于王庭右鹿鳴六章章八句贍彼南陔時物嘉良有泉清泚有蘭馨香晨飲是汲夕膳是嘗慈顔未悦我心靡遑嬉嬉南陔眷眷慈顔和氣怡色奉甘與鮮事親是宜事君是思䖍朂忠孝邦家之基右南陔二章章八句洋洋嘉魚佇以美罛君子有道嘉賓式燕以娛洋洋嘉魚佇以芳罟君子有徳嘉賓式歌且舞我有宫沼龜龍擾之君子有禮嘉賓式貴表之我有宫藪麟鳳來思君子有樂嘉賓式慰勤思相彼嘉魚爰縱之壑我有㫖酒嘉賓式燕以樂相彼嘉魚在漢之梁我有㫖酒嘉賓式燕以康森森喬木美蔓榮之我有㫖酒嘉賓式燕宜之喈喈黄鳥載飛載止我有㫖酒嘉賓式燕且喜右嘉魚八章章四句崇丘峩峩動植斯屬髙既自遂大亦自足和風斯扇膏雨斯沐我仁如天以亭以育崇丘巍巍動植其依髙大之性各極爾宜王道坦坦皇猷熙熙仁夀之域烝民允躋右崇丘二章章八句闗雎于飛洲渚之湄自家刑國樂且有儀郁郁芳蘭幽人擷之温温恭人哲后求之求之無斁寤寐所屬罄爾一心受天百禄郁郁芳蘭雨露滋之温温恭人圭組縻之郁郁芳蘭佩服珍之温温恭人福履綏之闗雎蹌蹌集水之央好求賢輔同揚徳光蘋蘩芳滋同誰掇之願言賢徳靡日不思偶其賢徳輔成已職求配玉音服之無斁潔其粢盛中心匪寧薦於宗廟助君徳馨賢淑來思人之表儀風化天下何樂如之右闗雎十章章四句彼鵲成巢爾類攸處之子有歸瓊瑶是祖彼鵲成巢爾類攸匹之子有行錦繡是飾彼鵲成巢爾類攸供之子有從蘭蓀是奉伊鵲成巢珍禽戾止婉彼佳人配于君子伊鵲營巢珍禽攸處内助賢侯弼于明主伊鵲營巢珍禽輯睦均養嘉雛致于蕃育石鵲巢六章章四句名臣奏議宋太宗時鄉貢進士田錫請復鄉飲禮書曰臣聞聖人制鄉飲酒之禮行鄉校之間俾人徧知而易識也盖其禮甚辨其儀甚詳有獻祭之儀有俎豆之數命鄉人之賢者為主延鄉人之老者為賓揖讓拜起皆有儀升降進退必有位以金石之樂和其節以雅頌之詩導其情自秦承周衰漢邇秦亂不能行之漢世祖始一行之旋廢西晉行之又廢至唐乃明著禮文散頒郡國長吏以化黎民至開元中宣州刺史裴耀卿以為鄉飲之儀惟于貢士之日畧得舉用其餘寢停乃拜奏上言歳行禮制於是宣州耆老每聞歌白華華黍之詩南陔由庚之頌觀者踴躍聽者感泣風移俗易以是知先王之禮不徒行也願陛下申明舊典頒鄉飲之禮使其觀祭獻之嚴則知不忘報本矣觀蘋藻之祀則知所貴者誠矣見賢者為主則知懋徳者可尊矣視老者為賓則知年髙可恭矣閲揖讓拜起之式則知謙恭撙節之可學矣見升降進退之容則知折旋俯仰之可習矣聞白華南陔之詩則知孝於父母矣聽雅音正聲之奏則悦於和樂矣月而習之歳而行之稔禮漬道革惡歸善為父而慈為子而孝為兄而友為弟而恭為夫而和為婦而柔一家率之一鄉化之一國興之天下同之得非王者厲精於禮樂而致之有然哉則比屋可封之俗不獨堯舜之時也聖代當復見矣蕙田案淳化修鄉飲之儀實自錫言發之觀承案宋時猶行鄉飲之禮庶幾尚能存古然何不即用升歌笙入間歌合樂之舊文而必另造其詞乎且既欲另造則宜别為其詞以合隨時從俗之義亦可也而乃改頭換面南雅古詞何耶且笙入無詞尤不當造其病正與束晳同適增其陋而巳玉海徽宗政和三年詔州郡鹿鳴宴改為鄉飲酒宋史禮志政和禮局定飲酒登降之節與舉酒作樂器用之屬並參用辟癰宴貢士儀其有古樂處令用古樂既又以河北轉運判官張孝純之言周官以六藝教士必射而後行古者諸侯貢士天子試諸射宫請詔諸路州郡每歳宴貢士于學因講射禮于是禮官參定射儀鄉飲酒前一日本州于射亭東西序量地之宜設提舉學事諸監司知州通判州學教授應赴鄉飲酒官貢士幕次本州兵馬教諭備弓矢應用設樂其日初筵提舉學事知州軍通判帥應赴鄉飲酒官貢士詣射亭執弓矢揖入射乗矢若中則守帖者舉獲唱獲執算者以算投壺畢多算勝少算射畢賛者賛揖酬酢如儀畢揖退飲如鄉飲酒案玉海作政和五年髙宗紹興七年郡守仇念置田以供鄉飲之費髙宗本紀紹興十三年夏四月癸亥頒鄉飲酒儀于郡國禮志紹興十三年北部郎中林保乞修定鄉飲儀制徧下郡國于是國子祭酒髙閌草具其儀上之玉海林保修定鄉飲酒矩範儀制請徧下郡國令取明州已行儀制與林保所具規式參酌修具鏤板頒行奏可其禮有主賓僎介三賓有肅賓序賓祭酒主獻賓酬主人酬介介酬衆賓修爵無算沃洗揚觶拜送既及約束九事宋史髙宗本紀紹興十七年春正月辛夘以舉人多冒貫命州縣每三歳行鄉飲酒禮以貢士禮志慶元中朱熹以儀禮攺定主賓僎介之位其主則州以守縣以令位于東南賓以里居年髙及致仕者位于西北僎則州以倅縣以丞或簿位東北介以次長位西南三賓以賓之次者司正以衆所推服者相及賛以士之熟于禮儀者其日質明主人率賓以下先釋菜于先聖先師退各就次以俟肅賓介與衆賓既入主人序賓祭酒再拜詣罍洗洗觶至酒尊所酌實觶授執事者至賓席前跪以獻賓賓酬主人主人酬介介酬衆賓賓主以下各就席坐訖酒再行次沃洗賛者請司正揚觶致辭司正復位主人以下復坐主人興復至阼階楣下僎從賓介復至西階下立三賓至西階立並南向主人拜賓介以下再拜賓介與衆賓先自西趨出主人少立自東出賓以下立于庠門外之右東鄉主人立于門外之左西鄉僎從主人再拜賓介以下皆再拜退朱熹行鄉飲酒禮告先聖文一昨朝廷舉行鄉飲酒之禮而縣之有司奉行不謹容節謬亂儀矩闕踈甚不足以稱明天子舉遺興禮之意今者賓興有日熹謹與諸生考協禮文推闡聖制周旋揖遜一如舊章即事之初敢以舍菜之禮謹修䖍告理宗本紀景定五年夏四月辛亥詔郡邑行鄉飲酒禮明會典洪武初詔中書省詳定鄉飲酒禮條式使民歳時燕會習禮讀律期于申明朝廷之法敦序長幼之節遂為定制五月定在内應天府及直𨽻府州每歳孟春正月孟冬十月有司與學官帥士大夫之老者行于學校在外行省所屬府州縣亦皆取法于京師其民間里社以百家為一會或糧長或里長主之百人内以年最長者為正賓餘以齒序坐每季行之于里中若讀律令則以刑部所編申明戒諭書兼讀之其武職衙門在内各衛親軍指揮使司及指揮使司凡鎮守官每月朔日亦以大都督府所編戒諭書率僚佐讀之明集禮縣邑飲酒讀律儀注立賓主介僎每冬季行事縣令為主以郷之老人年六十以上有徳行者一人為賓其次一人為介又其次一人為三賓又其次一人為衆賓鄉人嘗為大夫士而致仕者或寄居之士大夫年徳可尊禮者一人為僎如無則以縣丞主簿為之無則闕以衆所推服者一人為司正賛禮一人及賛引者皆擇士之容貌詳緩習禮儀者為之賓主各有賛引讀律一人使能者陳席設位次席為坐席位為立位次為更衣服之所設賓席于堂北兩楹之間少西南面冠禮醮于客位今世亦指此處為客位主席于阼階上西面在東楹之東少北介席于西階上東面在西楹之西少北僎席于賓東南面謂兩楹之間少東世俗謂此處為主位三賓席于賓西南面與賓共為一列皆専席不屬衆賓六十以上者席于西序東面北上若賓多則又設席于西階上北面東上僚佐席于東序西面北上僚佐謂縣丞以下若丞為僎則主簿典史居此設衆賓五十以下者位于堂下西階之西當序東面北上若賓多則又設位于西階之南北面東上凡立位皆設席而不坐至無算爵乃坐司正及讀律者位于堂下阼階之南北面西上案儀禮司正位于兩階之間北面而脯醢薦于其位今薦脯醢皆設桌案與古異故改位于此設主之賛者位于阼階之東西面北上設主及僚佐以下次于東廊賓介及衆賓次于庠門之外僎次亦在門外陳器設酒尊于堂上東南隅加勺冪用葛巾爵洗于阼階下東南篚一于洗西實以爵觶盥洗在爵洗東設卓案于堂上下席位前案儀禮徧有脯醢皆薦于其位則立者亦當有之但古者席地而坐故薦于地上今難從陳豆于其上六十者三豆七十者四豆八十者五豆九十者六豆堂下者二豆主人豆如賓之數若九十者為賓六豆則主人亦六豆其餘悉皆倣此皆實以葅醢賓興賢能則用脯醢設奠爵卓案于東序端及西楹南各一舍菜若賓興賢能則前一日舍菜于先聖先師如常儀正齒位則省立班其日質明主及賓介以下各就次執事省視器饌畢詣主次前告具乃命鼓人鳴鼓賛引導主及僚佐以下出次主及僚佐朝服餘深衣主立于阼階下西面僚佐序立于主之後皆西面北上司政及讀律者北面西上賛禮進立于東階之西近堂亷賓之賛引導賓以下盛服出次序立于庠門外之右介居賓南三賓居介南衆賓居三賓之後皆東面北上僎仍居次不出迎賓班定賛引唱主迎賓賛引進主之左曰請迎賓乃導主出庠門外西面立僚佐不出賛引唱揖主揖賓以下皆揖賛引唱肅賓主揖賓賓報揖賛引導主先入門左西面立賓之賛引唱揖賓揖介介揖衆賓序行入門右皆東立如門外之序序賓主揖賓遂行當階再揖將及階又揖賓皆報揖皆賛引唱之至階主阼階下西面即初位賓西階下東面介居賓南三賓居介南衆賓居三賓南俱東面北上獻賓賛禮唱主以賓升賛引進主之左曰請延賓主與賓三讓主先升阼階賓升西階俱當楣下北面立賛禮唱獻賓賛引進於主之右曰請酌酒導主降自阼階詣盥洗位次詣爵洗位洗爵拭爵以爵授執事者升詣尊所執事者舉冪主執爵酌酒以爵授執事者並如釋奠儀至賓席前執爵者以爵授主主西北面獻賓賛引導賓自西階趍就席末東南面受爵主揖送爵賓報揖卒爵以爵授執事者謂賓之執事者盖將酢於主也主退立于阼階上北面賓退立于西階上北面如初升賓酢主賛禮唱賓酢主賛引進賓之左曰請酌酒導賓降自西階執爵者從詣盥洗位爵洗位升自西階詣尊所酌酒並如前儀至主席前執爵者以爵授賓賓東南面酢主賛引導主趍就席末西北面受爵賓揖送爵主報揖卒爵賓退立于席末賓之席也酢事畢退立于席末主將與介為禮也主乃以爵奠于東序端卓上復阼階上北面立主退復阼階而不就席末者將有事也獻介賛禮唱主延介賛引進曰請延介導主降自阼階西南面揖介至階一讓主遂升介升西階並當楣下北面立賛禮唱主獻介賛引進曰請酌酒導主詣東序端取所奠爵授執事者詣尊所酌酒以爵授執事者如前至介席前執爵者以爵授主主西南面獻介賛引導介自西階上趍就席末北面受爵主乃揖送爵介報揖卒爵以爵授主退立于席末介之席也主以爵奠于西楹南退阼階上北面如初將與三賓為禮也獻三賓賛禮唱主獻三賓賛引導主降阼階西南面三揖衆賓衆賓皆報一揖主升取西楹南所奠爵酌酒如前進西階上南面獻衆賓之長賛引導衆賓之長一人升西階上北面受爵主揖送爵賓長報揖卒爵以爵授主賓長就席立于席末三賓之席也次導賓長之次者一人升受爵如前又次一人亦如之主乃以爵授執事者少退西面立獻衆賓賛禮唱獻衆賓執事者酌酒授主主復進西階上南面獻衆賓衆賓六十以上者每一人升西階上受爵卒爵退就西序之席立于席末升者畢主以爵授執事者下奠于篚堂下者不獻主退就席末位升位賛禮唱衆賓皆升位主乃自席末先升席賓介以下皆自席末升席堂下者就位引僚佐升自東廡就席堂上者坐堂下者立僎入無僎則去此條升位後僎始入者儀禮注云不干主賓正禮也賛禮唱僎入賛引導僎出次僎朝服致仕者服深衣亦從便入門左主降自阼階迎于門内賓介降立西階下三賓不降主與僎揖讓升主升阼階僎升西階當楣北面立賓介皆升立西階升面北上賛禮唱主獻僎賛引進曰請酌酒導主降洗爵詣尊所酌酒如賓儀至僎席前東北面獻僎賛引導僎自西階上趨就席末東西南面受爵主揖送爵僎報揖卒爵以爵授主主以授執事者下奠於篚主及賓介各升席揚觶賛禮唱司正揚觶賛引導司正出位詣盥洗位盥手帨手次詣爵洗位取觶于篚洗觶拭觶升自西階詣尊所酌酒進兩楹之間北面立賛者唱在坐者皆起賓主以下皆起拱立司正乃舉觶而言曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸朂為臣竭忠為子盡孝内穆於閨門外順於鄉黨無或廢墜以忝所生言畢揖賓主以下皆揖司正遂飲卒爵復揖以爵授執事者降自西階復位賓主以下復坐讀律若賓興賢能不用此賛禮唱讀律執事者設律案于堂上兩楹之間次引讀律者出位詣盥洗所盥手帨手訖乃升自西階執律者以律從至案前北面立執律者以律置案上立于案傍西面在坐者皆起讀律者揖賓主以下皆揖復坐乃展律詳緩讀之畢在坐者又起讀律者揖賓主以下皆揖讀律者降自西階復位執律者以律從如初無算爵賛禮唱爵行無算於是堂下者皆坐執事者行酒酒三行或五行食三品或五品徧及主之賛者皆與賓出賛禮唱禮畢主興降自阼階賓以下降自西階僚佐降自東廡堂下衆賓以序俱出至門外主門左西面僚佐以下列主之後賓門右東面介居賓南三賓居介南衆賓居後賛引唱揖賓主以下皆揖退蕙田案集禮定於明初其時賓興賢能尚用鄉飲之禮洪武十六年重頒圖式刪去此條而賓興與鄉飲判為兩事矣里社飲酒讀律儀立賓位里長為主以鄉之老人六十以上有徳習禮者一人為賓次一人為介又次為衆賓讀律一人使能者陳設設賓席於堂之西北南面設主席於東南西面介席於堂之西南東面衆賓六十以上者席於兩序東西相向五十以下者席於堂下亦東西相向各設卓案於席前豆用葅醢設讀律席東楹下西面如教官講書之位序賓其日質明賓介及衆賓皆至門外主出迎東向揖賓賓以下西向報揖主先入門而右賓入門而左介與衆賓從至階主升西階上東面賓介於東階上西面衆賓六十以上者皆自東階升分為兩班東西相向北上居西者立主之後居東者立賓介後五十以下者立堂下亦分兩班東西相向北上主與賓皆揖各就席坐執事者行酒酒一行止讀律執事設卓案於東楹讀律席前次引讀律者正衣冠升席展律于案詳緩讀之畢起立拱手坐者皆起立拱手讀律者揚言曰恭惟國家憲章先王明刑弼教期協于中爰用古禮屬民讀律凡我長幼尚敬共夙夜毋干彛憲以忝祖父言訖歛律降席復位位在堂下衆賓之列賓復坐酒三行止賓出主先興賓介以下皆興序立如初升堂下者亦如之賓主皆揖主送于門外揖退明會典洪武十六年頒行鄉飲酒禮圖式一各處府州縣每歳正月望日十月朔日舉行於學宫除僎賓外衆賓序齒列坐其僚屬則序爵前一日執事者于明倫堂依圖陳設坐次至日主及僚屬司正先詣學遣人速賓僎以下比至執事者報賓至主偕僚屬迎于庠門之外以入主東賓西三讓三揖而後升堂東西相向立賛兩拜畢皆坐僎至介至儀亦同既齊至各就位執事者引司正由西階升詣堂中北面立執事者唱僎賓以下皆立各相揖執事舉酒授司正司正曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭内睦宗族外和鄉里無或廢墜以忝所生讀畢司正遂飲酒以觶授執事仍各相揖司正復位及僎賓以下皆拱立行揖禮如揚觶儀及讀皆肅而聽之有過之人俱赴正席立聽讀畢執事者舉僎案至賓前次僎次介次主三賓以下次第舉之乃主獻賓執事者酌酒以授主主受爵詣賓前置于席稍退賛兩拜賓答拜以次奠爵儀如之畢主復位遂酬主賓起僎從之執事者酌酒授賓賓授酒詣主前置于席稍退兩拜賓僎主皆拜遂就位坐酒三行湯三品遂徹饌各起離席僎主僚屬居東賓介三賓衆賓居西行兩拜禮遂送賓分東西行乃三揖出庠門而退一里社每歳春秋社祭會飲畢行鄉飲酒禮所用酒殽即一百家内供辦坐以齒次年老者雖至貧上坐少者雖至富必下之不許攙越違者以違制論有過犯者雖年長而富亦坐席末聽讀律受戒諭飲酒畢同退如不行赴飲及強坐衆賓之上者為頑民許主席及諸人首告遷邊逺為民主席及衆賓容隠者同罪其各里社以百家為一會内以里長主席其餘選年最髙有徳人所推服者一人為賓其次一人為介餘以年齒叙坐如有致仕者主席請以為僎擇通文學者一人揚觶一人讀律一人賛禮前期主詣賓門請曰某日行鄉飲酒禮吾子年髙徳邵敢請為賓賓曰某固陋恐辱命敢辭主曰詢諸衆莫若吾子賢敢固請賓曰夫子申命之某不敢辭主遂拜請介亦如之曰敢請吾子為介先執事者設賓席于堂中稍西南向設主席于堂東南西向賓六十以上者席于堂中上兩序東西相向如賓多年幼者席于堂下阼階之南北面西上至日主迎賓及獻酬揚觶讀律酒數行皆如學宫儀飲畢明日賓介僎衆賓詣主家拜謝鄉飲之賜主出門拜謂辱昨日之來一鄉飲之設所以尊髙年尚有徳興禮讓敢有諠譁失禮者許揚觶者以禮責之其或因而致争競者主席者會衆罪之二十二年定鄉飲酒禮凡良民中年髙有徳無公私過犯者自為一席坐于上等有因户役差税遲悞及曾犯公杖私笞招犯在官者又為一席序坐中門之外其曾犯奸盜詐偽説事過錢起滅詞訟蠧政害民排䧟官長及一應私杖徒流重罪者又為一席序坐于東門之外執壺供事各用本等三家子弟各要分别三等坐次善惡不許混淆其所行儀注並依原頒定式如有不遵序坐及有過之人不行赴飲者以違制論蕙田案洪武二十二年所定鄉飲儀分善惡三等序坐不得混淆盖於講禮讀法之時微寓彰善癉惡之指雖古禮所未有而於化民成俗之義亦有當焉惜乎有司視為具文未聞有實心奉行者也右厯代鄉飲酒禮五禮通考卷一百六十八
