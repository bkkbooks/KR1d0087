body:
  text: 五禮通考卷二百四十二刑部尚書秦蕙田撰軍禮十田獵上蕙田案田獵之禮起於皇古傳曰古者聖人舉事必反本五穀者以奉宗廟養萬民也禽獸多則害稼穡故田獵以共承宗廟示不忘武備因以為田除害也是以師之六五取象於田有禽程子以為寇賊姦宄為生民之害若禽獸入於田中侵害稼穡於義宜取則獵取之其義精矣至於順天時因地利備賔祭蒐軍實習勞懲怠辨尊明卑舉一事而衆善皆備者此也自秦漢以下每代皆有田獵之事今折衷於周官考其沿革以類相附焉易繫辭包犧氏作結繩而為網罟以佃以漁葢取諸離屯卦六三即鹿无虞惟入于林中君子㡬不如舍往吝象曰即鹿无虞以従禽也君子舍之往吝窮也趙氏汝楳曰田者必夷其險阻虞人設驅逆之車使禽趨田然後有獲无虞不驅禽即我我反従禽故曰即鹿也師卦六五田有禽利執言无咎何氏楷曰於師言田者古人一嵗三田所以習武事也班孟堅云禽者鳥獸之總名言為人所禽制也比卦九五顯比王用三驅失前禽邑人不誡吉程傳先王以四時之畋不可廢也故推其仁心為三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也只取其不用命者不出而反入者也禽獸前去皆免矣故曰失前禽也王者顯明其比道天下自然來比來者撫之罔不煦煦然來比於我若田之三驅禽之去者従而不追來者則取之也恒卦九四田无禽朱子曰以陽居隂久非其位故為此象解卦九二田獲三狐得黄矢貞吉朱子曰大抵此爻為卜田之吉占錢氏一本曰獲三狐小人狐媚之險至二而無不解得黄矢君子中直之道至二而無不行巽卦六四悔亡田獲三品折中曰四居高當位載纉武功而田害悉去解獲三狐而此獲三品所獲者多矣周禮春官大宗伯大田之禮簡衆也注古者因田習兵閱其車徒之數王氏昭禹曰坐作進退不講則不知刺伐擒縦不習則不能春以振旅夏以茇舍秋以治兵冬以大閲此所以簡其能也又曰攻鬭而冒矢石人情之所不欲馳騁而逐禽獸人情之所同欲以人情之所不欲者寓于所同欲之間此人情樂為之用而四時教戰所以皆寓于田天官太宰以八則治都鄙八曰田役以馭其衆王氏昭禹曰田以簡衆役以任衆禮經會元春蒐夏苗秋獮冬狩雖云農隙以講事然以四時講武使民奔走服役之不暇終身擾擾不得休息豈先王使民之政乎大抵成周致軍其於六鄉六遂之民本不盡用也雖曰田與追胥竭作必隨逺近之地而遞征之何嘗一一盡致於司徒而聴教於司馬也辨鼓鐸則有軍将師帥旅帥卒長兩司馬公司馬之屬辨號令則有羣吏百官帥家縣鄙鄉野之屬辨旗物則有諸侯羣吏帥都鄉遂郊野百官之屬四時必隨其地之逺近帥屬而遞教之矣大司馬於四時之田亦姑總其大綱言之爾如此盡舉畿内之民而教之吾恐所田之野四表相去才三百五十步爾雖容百官且不足況六軍乎都鄙去王城五百里雖一年調發且不可況四時乎蕙田案葉氏此條得古人馭衆之意小宰以官府之六聨合邦治五曰田役之聨事禮經會元成周田獵之制見於他官如大司徒則以旗致民小司徒則會卒伍以作田役鄉師則前期出田法簡其鼔鐸兵器修其卒伍州長則帥民而致之黨正則作民而治其政事族師則合其卒伍簡其兵器以鼔鐸旗物帥而至縣師則受法于司馬作其衆庶牛馬車輦會其卒伍旗鼔兵器帥而至遂人則作野民帥而至遂師則平野民縣正則用野民帥而至稍人則以縣師之法作其同徒輂輦帥而至以聴於司馬鼔人則掌六鼓四金以正田役司常則賛司馬頒旗物及致民置旗弊之此田獵致民之禁令見於他官者然也山虞則萊山田之野及弊田植虞旗于中致禽而珥焉澤虞則萊澤野及弊田植虞旌以屬禽迹人則掌邦田之地為厲禁而守之牧師則賛焚萊獸人則時田守罟及弊田令禽注于虞中小宗伯則帥有司而饁獸于郊遂頒禽肆師則四時田獵祭表貉則為位甸祝則致禽于虞中乃屬禽及郊饁獸合奠于祖禰乃頒禽田僕則設驅逆之車小子則斬牲左右徇陳此田獵致禽之禁令見於他官者然也成周田政必分掌於六官之屬以其皆預田也而四時教法則大司馬實總之是以仲春而教振旅平列陳辨鼓鐸鐲鐃之用遂以蒐田祭社仲夏而教茇舍撰車徒讀書契辨號名之用遂以苗田以享礿中秋而教治兵辨旗物之用遂以獮田以祀祊中冬而教大閲則合三時之所辨者而皆辨之遂以狩田以享烝則大司馬因講武以寓田因致禽以修祀其禮然也蕙田案葉氏此條實所以發明田役聨事之意觀承案田獵之禮大矣古者寓兵於農亦即寓戰於獵葢戰不可試也惟因為田除害且可供祭祀待賔客故教民田獵即於此簡車徒練軍實辨鼓旗備行陣所以教其坐作進退之方馳驅控縦之節已無不周至而其民惟知踴躍鼓舞以及時趨赴各有所得而反不知其戰陣之法已熟練於平素而無不精矣此古禮之妙所以使人悦而忘勞者也禮記仲尼燕居以之田獵有禮故戎事閑也陳氏禮書周官四時之田春蒐以教振旅夏苗以教茇舍秋獮以教治兵冬狩以教大閲鄉師於凡田前期出田法於州里簡其兵器脩其卒伍山虞萊山田之野澤虞萊澤野而大閲之禮為表百步則一表為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物帥民而致質明弊旗誅後至者羣吏聴誓於陳前教以坐作進退之節遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼔銜枚而進獲者取左耳然則虞人所萊之野穀梁所謂艾蘭以為防是也以旌為左右和之門穀梁所謂置旃以為轅門以葛覆質以為𣙗是也其未田也教戰於此及田則驅禽以入天子發則抗大綏諸侯發則抗小綏諸侯發然後大夫士發置虞於其中以致禽焉小宗伯帥有司而饁獸於郊遂頒禽則饁獸于郊者月令所謂既田命祠祭禽四方是也頒禽詩傳及穀梁所謂擇取三十為俎其餘以予大夫士是也田之服則冠弁服車則木路旗則大麾弓則夾弓庾弓矢則鍭矢殺矢其出也用牲于社宗而載之行其止也張幕設重帟重案而於是臨誓先王之於田宜社造廟祭馬祖繼之以饁獸于郊慎之至也蕙田案陳氏此條叙田獵始終儀節正記所云有禮者也王制無事而不田曰不敬田不以禮曰暴天物春秋隠公五年左氏傳臧僖伯曰春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則君不射古之制也疏爾雅釋四時之獵名與此同周禮大司馬職中春教振旅中夏教茇舍中秋教治兵中冬教大閲其名亦與此同桓四年公羊傳曰春曰苗秋曰蒐冬曰狩三名既與禮異又復夏時不田穀梁傳曰四時之田皆為宗廟之事也春曰田夏曰苗秋曰蒐冬曰狩皆與禮異者良由㣲言既絶曲辨妄生丘明親受聖師故獨與禮合明帝集諸學士作白虎通義因穀梁之文為之説曰王者諸侯所以田獵何為苗除害上以共宗廟下以簡集士衆也春謂之田何春者嵗之本以本名而言之也夏謂之苗何擇其懐任者也秋謂之蒐何蒐索肥者也冬謂之狩何守地而取之也四時之田總名為田何田除害也案苗非懐任之名何云擇去懐任秋獸盡皆不瘦何云蒐索取肥雖名通義義不通也故先儒皆依周禮謂之獵者蔡邕月令章句曰獵者捷取之名也蕙田案經傳所説四時之田異説甚多周禮左傳四時皆田公羊注夏時不田其異一周禮蒐苗獮狩嵗嵗皆行左傳治兵振旅三年一舉其異二周禮左傳以蒐苗獮狩分春夏秋冬公羊春苗秋蒐穀梁春田秋蒐其異三案大宗伯言大田之禮則田者總名何故専屬之春賈誼新書亦謂夏不田何也曰天地隂陽盛長之時猛獸不攫鷙鳥不搏蝮蠆不螫鳥獸蟲蛇且知應天而況人乎哉此説似亦近理然周禮明有夏苗則亦不足據也餘三説亦當以左傳為正賈誼新書王者諸侯所以田獵者何也為田除害上以供宗廟下以簡集士衆也蒐苗獮狩之禮簡戎事也苗者毛取之蒐者搜索之狩者守留之謂之畋何去禽獸害稼穡者故以田言之孝子已有三牲必田狩者以為己之所養不如天地自然之牲逸豫肥美也劉向説苑謂之畋何聖人舉事必反本五穀者以奉宗廟養萬民也去禽獸害稼穡者故以田言之聖人作名號而事義可知也傳曰春曰蒐夏曰苗秋曰獮冬曰狩百姓皆出不失其馳不抵禽不詭遇逐不出防此蒐苗獮狩之義也故蒐苗獮狩之禮簡戎事也右田獵名義春秋桓公四年公羊傳春曰田夏曰苗秋曰蒐冬曰狩蕙田案何休以公羊夏苗但去害苗而不田獵穀梁傳春曰田夏曰苗秋曰蒐冬曰狩四時也四用三焉蕙田案此即夏不田之説傳意謂有此禮而不常用也可與月令孟夏母大獵相發明禮記月令季春之月田獵罝罘羅網畢翳餧獸之藥毋出九門注為鳥獸方孚乳傷之逆天時也獸罟曰罝罘鳥罟曰羅網小而柄長謂之畢翳射者所以自隠也凡諸罟及毒藥禁其出九門明其常有時不得用耳天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也逺郊門也闗門也門疏路門内有者不得出路門應門内有者不得出應舉此可以知之孟夏之月驅獸母害五穀母大田獵陳氏澔曰夏獵曰苗正為驅獸之害禾苗者與三時大獵自不同季秋之月天子乃教于田獵以習五戎班馬政注教于田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈㦸也馬政謂齊其色度其力使同乗也校人職曰凡軍事物馬而頒之仲冬之月山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦王制獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅注取物必順時候也梁絶水取魚者罻小網也疏案月令正月獺祭魚孝經緯云獸蟄伏獺祭魚則十月中也是獺一嵗再祭魚此下文鳩化為鷹草木零落交相連接則獺祭魚謂十月時魯語里革云鳥獸孕水蟲成于是乎禁置罦羅網然則正月雖獺祭魚虞人不得入澤梁月令九月豺乃祭獸夏小正十月豺祭獸則是九月末十月之初豺祭獸後可以田獵鳩化為鷹者謂八月時但鳩化有漸故月令季夏云鷹乃學習孟秋云鷹乃祭鳥其化為鷹則八月也以月令二月鷹化為鳩則八月鳩化鷹也周禮司裘云中秋獻良裘鄭司農云中秋鳩化為鷹是也設罻羅者説文云罻捕鳥網也又爾雅云鳥罟為羅罻羅總是捕鳥之網蕙田案玩此條知古人田獵重於秋冬春夏雖有其制而不備也考之經傳謂四時皆田者周禮左傳穀梁傳也謂夏不田者公羊傳何休注及春秋緯運斗樞也何休竟以夏無田獵譏穀梁為短固屬非是鄭康成則以緯書為孔子所作四時田者周制三時田者夏殷制孔子欲改周制不敢顯露隂書于緯而于春秋則仍用周制其説穿鑿而害道皆未細玩月令季春羅網母出孟夏母大田獵及穀梁四用三焉之義觀王制獺祭魚云云亦専指秋冬又云天子諸侯無事則嵗三田即周禮所載儀節亦惟治兵大閲特詳于振旅茇舍古聖人順天時以取物因農隙以講武春夏生長之候決不肯多殺以擾民也然四時皆有農隙而武備不可以不時肄故斟酌于四時之中而有詳畧之别焉其義精矣觀承案周禮四時皆田以四時皆有農隙則乗其隙而行之可也然王制已有天子諸侯無事則一嵗三田之文葢夏禾方盛於田獵原不甚相宜因思宣王車攻詩特標出之子于苗句此與六月之詩同意葢宣王非無事之時既盛夏興師又行夏苗之禮以習軍陣也則平日之田不必四時皆行故周禮尤詳大閲之禮而豳風一之日于貉二之日載纉武功亦總在冬時然則田雖備四而行之當酌其宜要惟秋冬為重也右田獵時令周禮天官獸人掌罟田獸辨其名物注罟網也以網搏所當田之獸疏名物者謂獸皆有名號物色也案夏官四時田獵春用火夏用車秋用羅冬用徒四時各以其一為主無妨四時兼有網也冬獻狼夏獻麋春秋獻獸物注狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也及狐狸堪疏内則狐去首狸去正脊二者並食之物凡田獸者掌其政令王氏曰畋狩有時王制獺祭魚然後虞人入澤梁云云是也取獸有法如不麛不卵不殺胎不殀夭不覆巢踐毛不獻不成禽不獻是也田獵有地如東有甫草駕言行狩是也及夫辨其死生鱻薧之物當公當私之宜㫁其争禽之訟皆所謂政令也地官迹人掌邦田之地政為之厲禁而守之注田之地若今苑也以疏迹人主迹禽獸之處有禽獸處則為苑囿林木為籓羅使其地之人遮獲而厲守之凡田獵者受令焉注令謂時與處也山疏時謂仲春仲夏仲秋仲冬處謂澤也其受令者謂夏官主田獵者禮記郊特牲大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國蕙田案以上官守職掌周禮天官小宰以官府之八成經邦治二曰聴師田以簡稽注簡猶閲也稽猶計也計其士之卒伍閲其兵器為之要簿也孟子孔子之仕于魯也魯人獵較孔子亦獵較奚獵較也孔子先簿正祭器不以四方之食供簿正注先為簿書以正其宗廟祭祀之器即其舊禮取備于國中不以四方珍食供其所簿正之器蕙田案以上田獵簿錄會計周禮春官巾車木路前樊鵠纓建大麾以田注木路不鞔以革漆之而已前讀為緇翦之翦翦淺黒也木路無龍勒以淺黒飾韋為樊鵠色飾韋為纓不言就數飾與革路同大麾不在九旗中以正色言之則黒夏后氏所建田四時田獵疏趙商問大司馬職曰四時皆建大常今又云建大麾以田何答曰麾夏之正色雖習戰春夏尚生其時宜入兵夏本不以兵得天下故建其正色以春田秋冬出兵之時乃建大常夏官田僕掌馭田路以田以鄙注田路木路也田田獵也鄙循行縣鄙疏縣鄙在六遂之中王廵六遂縣鄙則六鄉州黨巡之可知舉逺以明近也鄭氏鍔曰王田必乗木路者葢木徳盛於東方仁也王者之田不合圍仁也然以田以鄙或以為都鄙王者無循行縣鄙親自省耕之理然則或田于三田之地或田于縣鄙之地而已王氏曰王行在鄙則去飾故乗木路蕙田案木路之解以王氏去飾之説為確鄭氏東方木徳之説太鑿以鄙之解以鄭氏田於縣鄙之説為確注疏解為巡行縣鄙案此官名田僕其下文所言皆是田事巡行事無據況國中及六鄉公田都鄙皆不見有巡行之文舉逺見近究曲説也掌佐車之政注佐亦副曰疏少儀注云朝祀之副曰貳戎獵之副佐案王制云大夫殺則止佐車佐車止則百姓田獵鄭氏鍔曰田必有佐車掌其政令使當田者則田當止者則止所以全人君之仁設驅逆之車注驅驅禽獸使前趨獲逆衙還之使不得出圍鄭氏鍔曰自後驅禽使之就獲自前逆禽使不出圍令獲者植旌注以告獲也植樹也鄭氏鍔曰獲者植旌使人望其旌而知其獲禽不獨為已有也山虞植虞旗澤虞植虞旌為屬禽設此則令獲禽者自植以告獲也禮記月令季秋之月命僕及七騶咸駕載旌旐授車注僕戎僕及御夫也七騶謂趣馬主為諸官駕説者也既駕之又為之載旌旗司馬職曰仲秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗司都載旜鄉遂載物郊野載旐百官載旟是也周禮春官司常凡軍事建旌旗及致民置旗弊之甸亦如之注始置旗以致民民至仆之誅其後至者蕙田案以上田獵車馬旌旗地官山虞若大田獵則萊山田之野注萊除其草萊也疏謂大田獵謂王親行也萊山田之野謂於防南擬教戰之處芟去草萊南北二百五十步東西步數未聞廣狹可容六軍三三而居一偏地官澤虞若大田獵則萊澤野王氏曰澤野所謂藪也蕙田案澤中之獵不見於大司馬春秋内外傳所載如棠觀魚濫於泗淵之類又皆失禮之事居多然地官山虞澤虞並有大田獵之文則其事可以意會其従畧者殆以周官之時舟師未備故講武亦詳山而畧澤歟詩毛傳田者大艾草以為防或舍其中褐纒旃以為門裘纒質以為槸槸魚列反間容握驅而入轚則不得入左者之左右者之右然後焚而射焉孔頴逹曰田獵者必大芟殺野草以為防限作田獵之場擬殺圍之處或復止舍其中謂未田之前誓士戒衆故教示戰法當在其間止舍也既為防限當設周衞而立門焉乃以織毛褐布纒通帛旃之竿以為門之兩旁其門葢南開並為二門用四旃四褐也又以裘纒椹質以為門中之闑闑車軏之裏兩邊約車輪者其門之廣狹兩軸頭去旃竿之間各容一握握人四指為四寸是門廣於軸八寸也入此門當馳走而入不得徐也以教戰試其能否故令驅焉若驅之其軸頭擊著門旁旃竿則不得入也所以罰不正也以天子六軍分為左右雖同舍防内令三軍各在一方取左右相應其屬左者之左門屬右者之右門不得越離部伍以此故有二門也春秋昭公八年穀梁傳因蒐狩以習用武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為𣙗流旁握御轚者不得入注蘭香草也防為田之大限旃旌旗之名周禮通帛旃轅門卭車以其轅表門質椹也𣙗門中臬葛或作褐流旁握謂車兩轊頭各去門邊空握握四寸也轚挂則不得入門疏置旃以為轅門謂以車為營舉轅為門又建旃以表之以葛覆質以為𣙗質者中門之木椹謂恐木椹傷馬足故以葛草覆之以為質葛或為褐者謂以毛布覆之流旁握御轚者不得入徐邈云流至也門之廣狹足令車通至車兩軸去門之旁邉一握握四寸也轚謂挂著若車挂著則不使得入以恥其御拙也禮記月令季秋之月命僕以級整設于屏外注級等次也整正列也設陳也屏所田之地門外之蔽正疏戎僕等以馬駕車又載旌旐既畢以其尊卑等級其行列設于軍門之外東西廂以為行陣于是司徒在兩行之間北面誓之或者屏之外左右六軍嚮南而陳司徒于陣前北面誓之也云屏所田之地門外之蔽者案詩傳云褐纒旃以為門驅而入𣙗則不得入既門外驅車則不得有屏此内外之屏者葢車入之時則去屏無事之時則設屏也周禮天官幕人凡田役共其帷幕幄帟綬注共之者掌次當以張掌次師田則張幕設重帟重案注不張幄者于是臨誓衆王或回顧占察蕙田案田獵之前必先治其止舍之處以為防限是以山虞澤虞既已先期芟除草萊而臨時則又有戎僕等為之設其轅門正其行列然後掌次幕人等共其幄帟而規制周宻矣若毛詩傳疏所言即今之圍場也穀梁月令及周禮天官所言即今之帳房也考史記五帝本紀黄帝以師兵為營衞遷徙無常處此即古者營盤壘砦之遺制葢其所従來者逺矣又案月令以級整設於屏外雖専為季秋言之然車攻之詩云之子于苗本為夏狩而毛鄭亦以艾蘭為防之説解之則知此制固通于四時也又案以上田獵場地陳設禮記月令季秋之月司徒搢扑北面誓之注誓衆以軍法也疏司徒職云施十有二教八曰以誓教恤則民不怠誓民誓以犯田法之誓也誓曰無下車無自後射案于經注則司徒主誓今田獵出軍亦于所獵之地而搢扑北面誓之也搢揷也蕙田案以上田獵之前誓衆周禮春官司几筵甸役則設熊席右漆几注謂王甸有司祭表貉所設席陳氏曰大田簡衆大役任衆涖之不可以無威故席以熊皮設之或曰右几武事尚右也蕙田案以上田獵几席司服凡甸冠弁服注甸田獵也冠弁委貌其服緇布衣亦積素以為裳諸侯以為視朝之服猶疏士冠禮及郊特牲皆曰委貌周道鄭注士冠云委安也言所以安正容貌故云委貌若以色言則曰𤣥冠也云其服緇布衣亦積素以為裳者士冠禮云主人𤣥冠朝服緇帶素韠注云衣不言色者衣與冠同裳又與韠同色是其朝服緇布衣亦如皮弁積素以為裳也言凡甸冠弁服據習兵之時若正四時則當戎服是以月令季秋天子乃教於田獵以習五戎司徒搢扑北面以誓之天子乃厲飾執弓挾矢以獵注云厲飾謂戎服尚威武也以此觀之習五戎司徒誓之不戎服著冠弁可知王氏應麟曰兵事韋弁服眡朝則皮弁服甸則冠弁服左傳衞獻公不釋皮冠則皮弁韋弁同但色異耳是正田用韋弁也援神契云皮弁素積軍旅也軍士之服通皆韋皮坊記注云在軍同服左傳均服振振郝氏敬曰冠弁即爵弁以繒帛為之古冠制小用緇布𤣥繒後世用為弁故曰冠弁明與韋皮二弁異猶冕之言弁冕也曾子問云尸弁冕而出鄭謂委貌非也委貌冠耳蕙田案以上田獵冠服夏官司弓矢夾弓庾弓以授射鳥獸者注往體多來體寡曰夾庾射鳥獸近射也近射用弱弓凡矢殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射注殺弓所用也鍭弩所用也殺矢言中則死鍭矢象焉鍭之言候也二者皆可以射禽獸前尤重中深而不可逺也結繳于矢謂之矰矰髙也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也前于重又㣲輕行不低也蕙田案以上田獵弓矢又案田獵所用之器物非先時而為之備則事不濟以上所列皆豫備事也先車馬旌旗次場地者月令七騶咸駕然後及整設車馬旌旗田獵之所首重無此則不能立止舍之處也場地之下即次誓衆者月令疏整設屏外司徒誓衆於其中故也自是而几席冠服弓矢至鼔鐸車旗器物則錯見於鄉師以下徴發諸條其先後條理可以意㑹也詩我車既攻田車既好詠車也我馬既同四牡龎龎四黄既駕兩驂不倚詠馬也建旐設旄悠悠斾旌詠旌旄也決拾既佽弓矢既調詠兵器也車攻吉日二篇之所陳葢畧備矣天官獸人時田則守罟注守謂備獸觸攫也疏時田謂四時田獵右田獵官司戒具周禮地官大司徒大田役以旗致萬民而治其徒庶之政令注旗畫熊虎者也徵衆刻日樹旗期民於其下疏凡軍旅田獵所用民徒先起六鄉之衆史氏曰軍旅所以用衆大田所以簡衆衆之所聚政令行焉不有旗表其觀視何所趨向哉易氏袚曰大司徒以旗致民致之于比閭族黨州鄉之聨也大司馬以旗致民致之于平列陳之際也鄉師凡四時之田前期出田灋于州里簡其鼔鐸旗物兵器修其卒伍注田灋人徒及所當有魏氏校曰簡者豫為閲計修者豫為配當古之勇好以整又好以暇及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其争禽之訟注司徒致衆庶者以熊虎之旗陳之以旗物以表正其行列疏鄉師為司徒致衆庶故還用司徒之大旗辨鄉邑者四時六鄉之衆與公邑之民皆在焉各分别為陣也黄氏度曰鄉師致衆庶各致其鄉之民也将田先閲于其鄉而以司徒之旗致之使知有所統也髙氏愈曰古者因田以講武其事至重故鄉師特主治之州長若國作民而師田行役之事則帥而致之掌其戒令與其賞罰注致之致之于司徒也掌其戒令賞罰則是于軍為師帥疏田謂田獵黄氏度曰六鄉之軍聴于王主于司徒平居常自為六軍之教故六鄉徴發則稱國言有天子之命也獨見之于州長州長承其命也帥而致之軍旅致之于小司徒役致之于鄉師小司徒鄉師各以其事帥之而致于大司徒黨正凡作民而師田行役則以其灋治其政事注亦於軍因為旅帥鄭氏鍔曰師田行役衆庶所聚非致嚴以馭之不可也以法而治其政事又異乎平日之教以禮事矣族師若作民而師田行役則合其卒伍簡其兵器以鼔鐸旗物帥而至掌其治令戒禁刑罰注亦於軍因為卒長疏帥而以至者帥至于鄉師以致于司徒也鄭氏鍔曰一旅之衆居則有比閭之聨而卒伍猶未之合有耒耜之用而兵器或未之精至于作之而師田行役族師遂為一卒之長欲其師行之有統則必合為卒伍欲其攻戰之必勝則必簡其兵器合則使之聨而不散簡則使之精而無敝又用鼔鐸旗物率之至于師田行役之所猶恐其不肅復掌其治令戒禁刑罰孰敢不率哉縣師若将有軍旅田役之戒則受灋于司馬以作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼔兵器以帥而至注受灋於司馬者知所當徴衆寡黄氏度曰司馬主兵其令不得直行必有縣師闗節此先王㣲意兵皆民也發民為兵而主兵之官不應全不知故使其屬行司馬之法作起也起其衆庶馬牛車輦而後會其車人卒伍邦國都鄙卒伍鄉法雖素定而車人不相須甸稍縣都野法車人相須而縣鄙居民未嘗為卒伍故於此皆以司馬之法會之五人為伍百人為卒離則皆伍聨則皆什百人為卒鄉為四閭野為四里車徒異部多少稱事遂人若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之注役謂師田遂之大旗熊虎疏令各帥其所治之民而至者謂令縣正以下遂人遂大夫合用鳥隼之旗致衆今遂人掌衆與大司徒同故致衆得用熊虎為旗也凡事致野役而師田作野民帥而至掌其政治禁令鄭氏鍔曰國有功役之事又有師田之事功役則用當役之人師田則衆民竭作故於事言野役於師田言野民當役之人則致之使自至衆力竭作則其事大有以作而起之遂人帥而至掌政治禁令以齊一之則衆雖繁不亂矣遂師軍旅田獵平野民掌其禁令比叙其事而賞罰注平謂正其行列部伍也鄭司農云比讀為庀賞疏野民謂六遂之民比叙者校比次叙其行伍而行罰周禮云比者後鄭皆為校比先鄭皆為庀庀為具得通一義故引之在下也魏氏校曰未至師遂師先以軍法部署而行賞罰帥而至則賞罰一聴於大司馬及大司徒縣正若将用野民師田行役移執事則帥而至治其政令注移執事移用其民鄭司農云謂轉相佐助稍人若有師田之事則以縣師之法作其同徒輂輦帥而以至治其政令以聴於司馬注有軍旅田役之戒縣師受灋于司馬邦國都鄙稍甸郊里惟司馬所調以其法作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼔兵器以帥而至是以書令之耳其所調若在家邑小都大都則稍人用縣師所受司馬之法作之帥之以致於司馬也同徒司馬所調之同凡用役者不必一時皆徧以人數調之使勞逸遞焉疏稍人屬縣師縣師屬大司馬大司馬得王進止縣師即受法於司馬縣師既得法稍人又受法于縣師故云以縣師之法作其同徒也既作同徒乃致與大司馬故云以聴于司馬也蕙田案起徒役之事惟田與追胥竭作則是田獵起徒較他事獨衆凡經文師田連言者今於出師門内不復分析兩載總入田獵内可以互見云又案六鄉之鄉師州長族師黨正等官六遂之遂人遂師縣正等官皆平日治民之官也及其有師田之事則凡起徒致民之政令皆以屬之遞相統率以致於大司徒因以屬于大司馬惟比長閭師鄰長里宰鄼長鄙師諸官所轄者少故不復詳但於閭胥云凡春秋之役政聚衆庶則讀法鄙師云凡作民則掌其戒令鄼長云若作其民而用之則以旗鼓兵革帥而至里宰云掌比其邑之兵器以待有司之政令如是而已又案出師之制先發六鄉為六軍次發六遂為十二軍自近而逺各有差等田獵亦宜然故經於六鄉之官言師田者四六遂之官言師田者三若稍人不過一條而縣畺則無文葢六遂已不常發稍地則所發尤稀縣畺則其地益逺田獵徴發未必及之此經之所以畧也然又有説者大司徒地官之長固無所不統矣而縣師之所掌亦兼邦國都鄙稍甸郊里之地域則是従六鄉以外及於邦國無不統轄又遂人掌邦之野鄭云此野為甸稍縣都則遂人於畿内亦無不統轄遂師云經牧其田野疏遂人兼掌采地采地有井田法故此經云經牧其田野則遂師於畿内亦無不統轄其各條内所言師田葢連稍縣畺亦并包在内此皆經外之意可以推而知也國語周語王治農於藉摉於農隙耨穫亦於藉獮於既烝狩於畢時是皆習民數者也右田獵徵發政令周禮春官小宗伯凡王之甸役之禱祠肄儀為位注肄習也為位小宗伯主其位肆師凡四時之大甸獵祭表貉則為位注貉師祭也於所立表之處為師祭造軍法者禱氣勢之倍増也其神葢蚩蚘或曰黄帝甸祝掌四時之田表貉之祝號注杜子春云貉兵祭也爾雅曰是類是禡師祭也元謂田者習兵之禮故亦禡祭禱氣勢之什百而多獲詩小雅吉日吉日維戊既伯既禱注伯馬祖也重物慎㣲将用馬力必先為之禱其祖禱禱獲也禱疏言王以吉善之日維戊也於馬祖之伯既祭之求矣以田祖謂之伯伯者長也鄭云馬祖天駟釋天云天駟房也孫炎曰龍為天馬故房四星謂之天駟鄭亦引孝經説曰房為龍馬者是也何氏楷曰既伯既禱田祭也伯通作貊亦作貉鄭司農讀為禡王制禡於所征之地孔叢子云已克敵使擇吉日復禡於所征之地鄭𤣥云禡師祭也為兵禱其禮亡其田獵之祭則名之為貉周禮蒐苗獮狩有司皆表貉於陳前鄭注謂貉讀為千百之百於立表處為師祭祭造軍法者其神葢蚩尤或曰黄帝杜子春讀亦同云貉兵祭也田以講武治兵故有兵祭禱氣勢之十百而多獲邢昺云貉之言百祭祀此神求獲百倍也愚案貉貊本是一字以百解貊無乃強解讀貊為百亦未必然又有言祭貉以導獸者要皆附㑹以愚意揣之政繇古人讀貊與禡同音遂訛禡為貊耳禡祭名也故字従示其意馬諧聲義必有取或殺馬為牲或以馬者國之大事克敵必藉焉故為馬祈福亦未可知師田皆行軍之事其同有禡祭焉宜也觀説文既伯作既禡可證今韻會中伯字亦有禡音葢繇伯貊相訛而然無足疑者此既伯即田獵之日表貉之祭也毛傳以伯為馬祖案周禮校人職云春祭馬祖鄭以為天駟天駟房也晉天文志云天駟為天馬主軍駕南星曰左驂次左服次右服次右驂亦曰天廏孔云馬與人異無先祖可尋故取孝經説房為龍馬是馬之祖一云行神四時之祭各有所為未聞田獵有馬祖之祭亦従未聞馬祖有伯之稱也祖者始也伯者長也二義懸殊何得以伯當祖乎祈福曰禱毛以為禱獲是也戰必禱克田必禱獲説文作禂云禱牲馬祭也案禱牲馬祭分為二事周禮甸祝職云禂牲禂馬皆掌其祝號杜子春注云為田禱多獲禽牲為馬禂無疾觀此禂牲即貉祭所禱禂馬即校人四時之祭所禱皆名為禂也此詩既伯既禱乃甸祝所職也爾雅以為馬祭似誤以禂牲為禂馬耳周禮春官肆師舍奠于祖廟禰亦如之注舍讀為釋釋奠者告将時田若将征伐鄭司農云禰父廟疏非時而祭曰奠王氏曰舍奠有牲而無尸所謂造於祖也鄭氏鍔曰将出田必行釋奠之禮以告于廟乃載遷廟之主以行其載以祖為主故舍奠于祖廟禰則但祭而不載亦如之謂舍奠也右田獵祭祀夏官大司馬中春教振旅注兵者守國之備孔子曰以不教民戰是謂棄之兵者凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆農習戰也四時各教民以其一焉春習振旅兵入收衆専于反疏爾雅云出為治兵尚威武也入為振旅仄尊卑也尊卑者出則壮者在前老弱在後入則壮者在後老弱在前孔氏穎逹曰春秋振旅者以陽氣方長兵宜止息也黄氏度曰四時之田先教振旅王者之兵出於萬全司馬以旗致民平列陳如戰之陳注以旗者立旗期民於其下疏熊虎之旗鄭氏鍔曰司徒於大軍旅大田役以旗致六鄉之民遂人於起野役以遂之大旗致六遂之民民之目熟於熊虎之状久矣及是時鄉遂之官致之而來司馬亦以旗致之因民之所習熟者使之易知耳王氏昭禹曰田獵所習無非軍事故平列陳如戰之陳平者高下如一之謂雖如戰之陳而平列陳則無事於戰矣辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍将執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲鼓鼓人職曰以路鼓鼓鬼享以鼖鼓鼓軍事以晉鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓鄭司農云提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提杜子春云公司馬謂五人為伍伍之司馬也鄭氏鍔曰春陽用事雷始出地於卦為震而韗人冒鼓必于起蟄之日教以此時従其類也軍将者卿六各為一軍之将提使師帥執之者五百人之衆左提右挈在掌握之意旅帥視師帥為卑故執鼙鼔之小而卑者也百人之卒長知其當止則止故使執鐃兩司馬知其當進則進故使執鐸以通鼔五人之長曰公司馬軍制自五人始人之寡不能節制則衆皆無節故使執鐲以節鼓其職至卑其名乃同於司馬欲重其權以服人也黄氏度曰有節制而後能勝金鼔所以節制也故於教振旅辨之王雖親征六卿分将而元帥居乎其中蕙田案王不執鼖鼔而執路鼓者鄭康成謂尚之於諸侯也鄭剛中亦謂王道之大無所不通以道統衆不必自執軍中之事諸侯従王欲使軍将以下皆聴命故尚之於諸侯今考鼔人職軍事宜執鼖鼔而路鼓非軍事所宜用但以其有四面象人君聲教當四達無間而已則侯之執鼖非所以尊尚之而使衆聴命也王志長謂諸侯入朝佐王田獵不敢以桴鼓之事上煩天子故代王執鼖鼔以鼓軍事此説得之又案賁鼖古字通用蔡氏宸錫欲改賁為鼖亦不必以教坐作進退疾徐疏數之節注習戰法數疏坐作進退疾徐疏之節大閱具言於此畧説李氏嘉會曰兵事宜尚威武敏捷必以進退疾徐疏數教民者觀武王伐商六步七步乃止齊焉兵在於結陣之固進退之齊武侯八陣進則皆進止則皆止所以不可破齊之技擊魏之武卒秦之鋭士終不可以當桓文之節制者由此而已蕙田案坐作進退等皆戰之事四時之田雖皆為教戰而設然所専於戰者秋之大閲耳餘春夏従畧而春教振旅主於蔵兵不用則尤畧之賈疏最得經意遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社注春田曰蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓民誓以犯田法之罰也誓曰無干車無自後射禁者虞衡守禽之厲禁也既誓令鼓而圍之遂蒐田火弊火止也春田主用火因焚萊除陳草皆殺而火止獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻豜于公春田主祭社者土方施生也云疏蒐搜也春時鳥獸字乳搜取不孕者誓曰無干車云此據漢田律而言無干車謂無干犯他車無自後射象戰陣不逐奔走誓民即大閲羣吏聽誓於陣前鼓者即中軍以鼙令鼓鼓人三鼓以下此祭社因田獵而祭非月令仲春祭社也鄭氏鍔曰雖教之有素一旦出田野臨干戈安得不三令五申之此司馬所以誓之也又曰月令仲春之月毋焚山林大司馬乃用火田者盖春而焚萊将以田也春而焚山林傷生意也所以有無焚之令王氏曰社者土示也蕙田案有司表貉鄭康成謂大司徒鄭剛中以為肆師甸祝王平仲刪翼載王氏説亦以為甸祝考肆師大田獵祭表貉則為位甸祝掌四時之田表貉之祝號若大司徒總率鄉遂諸官恐不必以表貉事屬之當以剛中及王氏説為正春官肆師凡師甸用牲于社宗則為位注社軍社宗遷主也疏肆師為位祭也孔氏穎達曰春時四方施生獵則祭社為主蕙田案表貉之祭四時田獵之所同也社宗之祭春蒐之所獨也春秋昭公八年穀梁傳因蒐狩以習武事車軌塵馬候蹄揜禽旅御者不失其馳然後射者能中注車軌塵塵不出轍馬候蹄發足相應遲疾相投揜禽旅揜取衆禽不失其馳不失馳騁之節蕙田案此田獵命中之法蒐狩並稱故附于此右春蒐周禮夏官大司馬中夏教茇舍如振旅之陳注茇舍草止之也軍有草止之法釋疏草字釋茇止字舍孔氏穎逹曰夏教茇舍者以草木茂盛故教以草舍鄭氏鍔曰詩曰召伯所茇又左傳言晉大夫茇舍従之凡言茇者皆草舍也教茇舍者教以草止之法軍行而草止未有營壘之所草止之地防患尤嚴防患之道夜事尤急教之無素則是以衆予敵矣教茇舍獨于中夏以月令考之孟春草木萌動季春生氣方盛惟夏之時生於春者至是益長長于春者至是益茂軍屯其中患生不虞又況莫夜之時羣吏撰車徒讀書契注撰讀曰算算車徒謂數擇之也讀書契以簿書校録軍實之凡要部疏羣吏謂軍将至伍長各有分皆選擇其甲士步卒之等蕙田案康成以撰為數擇書契為簿錄即師田以簡稽也天官小宰言之葢在平日大司馬則在臨期彼此互見耳辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事注號名者徽識所以相别也鄉遂之屬謂之名家之屬謂之號百官之屬謂之事在國以表朝位在軍又象其制而為之被之以備死事帥謂軍将及師帥旅帥及伍長也以門名者所被徽識如其在門所樹者也古者軍将葢為營治于國門魯有東門襄仲宋有桐門右師皆上卿為軍将者也縣鄙謂縣正鄙師至鄰長也家謂食采地者之臣也鄉以州名亦謂州長至比長也野謂公邑大夫百官以其職従王者也此六者皆書云某某之名某某之號某某之事而已夜事戒夜守之事草止者慎于夜於是主别其部職黄氏度曰號名為夜事今軍夜有號康成以為徽識被之以備死事夫徽識綴于膊上夜事将何以辨鄭氏鍔曰帥為六軍之帥公邑間田謂之縣小都謂之鄙大夫謂之家鄉謂六鄉野六遂也或以門或以號或以邑或各以其名皆有一定之稱為主将者名號若此為卒伍者従而稱之耳聞而心知心存而意屬莫夜之間亦識所従矣帥以門名葢門者人之所由以出入帥者人之所由以進退取象猶門也縣與鄙一為天子之吏一為公卿王子弟故各以其名所以别異其為某縣某鄙之人大夫用號者則為美稱也鄭謂公卿大夫其身在朝其臣在采地若公山弗擾之類是以家號為名也六鄉有六州長鄉之軍法至州而成故以其州之名名之言某州之師也六遂於鄰長言邑中之政於里宰言掌比其邑之衆寡於遂大夫言凡為邑者此六遂為邑之證也故言某邑之師王氏與之曰茇舍之教乃下寨法専以辨軍之夜事盖休兵偃師之時宿火而寢目固無見也銜枚而處耳固無聞也将以鼓鐸而聲之則所聞必亂将以旗物而徽之則所見必昧於是専以號名為尚而號名又必外假者所以防姦細及間諜等事先儒不知夜事與夜戰不同多以管仲内政之作使之晝戰目相視夜戰聲相聞引證司馬夜事在於休兵管仲夜戰所以用兵豈可同日語蕙田案康成謂號名為徽識以備死事説太迂逺但黄氏即以號名為夜事則非也夜事仍當為戒夜守之事方與茇舍義合次㸃王氏下寨之説得其㫖矣又案帥縣鄙家鄉野等名鄭剛中説與康成注有異今考康成説則以縣鄙為六遂之長家為三等采地之長鄉為六鄉之長野為四處公邑之長而帥則六軍之帥統之者也其説整齊該括剛中以縣屬公邑又添閑田已覺支離又以鄙屬小都則三等采地僅舉其一豈不挂漏家為大夫亦與遂大夫鄉大夫相混不如康成説之的確矣又案州長黨正等名據平日治民而言軍将師帥伍長等名據出師臨陣而言其實一也然則帥以門名已統縣鄙等項在内辨號名也者如欲稱帥則以門欲稱縣鄙則各以其名亦其實一耳其他皆如振旅王氏昭禹曰若平列陳與夫以教坐作進退疾徐疏數之節皆然遂以苗田如蒐之法車弊獻禽以享礿注夏田為苗擇取不孕任者若治苗去不秀實者車弊驅獸之車止也夏田主用車示所取物稀皆殺而車止王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵礿宗廟之夏祭也冬夏田主于祭宗廟者隂陽始起象神之在内傳疏車行遲故取獸少引王制者據始殺而言言毛詩云天子發抗大綏諸侯發抗小綏據始殺而也鄭氏鍔曰礿以飲為主四時之享皆用孟此中夏而享礿非常祭也葢因田而享也田已得禽則歸而享祀猶戰而得雋則歸而告廟也蕙田案周四時宗廟之祭用仲夏此一確證剛中以為因田而享謬矣右夏苗中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅注軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也郊謂鄉遂之州長縣正以下也野謂公邑大夫百官卿大夫也凡旌旗有軍旅者畫異物無者帛而已書當為畫秋疏凡兵出曰治兵入曰振旅春以入兵為名尚農事以出兵為名秋嚴尚武故也軍吏者従軍将以下至伍長皆是軍吏各書其事與其號者即是仲夏百官各象其事及號名之等秋雖不具辨號名亦畧舉之見四時皆有此物也孔氏穎逹曰秋教治兵者以殺氣方盛則匿邪惡故教兵王氏昭禹曰旗物以作戰也故於治兵辨旗物之用鄭氏鍔曰九旗曰常曰方曰旜曰物之類其義不一自王而下以至百官分而載之各寓意義於其間非苟然也得天而久照者日月之常治兵載大常以見王者有常徳而立武事之意凡旗之畫皆二物旗獨畫龍相交非也交與蛟同諸侯於國有君道龍之象也入朝有臣道蛟之象也所以載蛟龍之旂熊虎之噬百獸畏之軍吏者六軍之帥當以威武為先載熊虎之旗使将卒畏威而趨令也通帛則不畫他物純而不雜也師都則公卿大夫王子弟之在都鄙者也爾身在外乃心罔不在王室所以載通帛之旜此言鄉遂又言郊野則師當為都鄙之吏明矣雜帛為物則雜而不一也鄉之分而為六其民散而為比閭族黨之名遂之分而為六其民散而為鄰里都鄙之號可謂雜而不一矣所以載雜帛之物龜有甲以自衞蛇有螫以毒人皆北方之屬也天地之氣始于北方幽隂之所聚而龜蛇者至幽隂之物畫之于旐以示夫殺氣之所始也先能自衞者然後可以殺敵所以載龜蛇之旐書曰我則鳴烏不聞謂鳯也隼之物為挈宫而貪殘之鳥也詩云鴥彼飛隼其飛戾天易云公用射隼于高墉之上彼乃鷹鸇之類安可與鳯為伍耶此言鳥隼説者皆以為鳯及隼疑當為鷹隼也與隼共文不可謂之鳯明矣交龍取其能變化熊虎取其有威龜蛇取其能自衞則鷹隼取其勁疾矣百官者六卿之屬欲其臨事之勁疾所以載鳥隼之旟凡行左青龍而右白虎前朱雀而後𤣥武謂此四者然軍法正成于鄉遂而鄉遂大夫乃不預四旗之列而載物者説者謂其象已屬于軍吏已無所将故也凡旗皆謂之載者言載之于車上也既有旌旗又有小徽識之上各書其事與號以為别識也司常謂之畫此謂之書王安石謂書詳於畫既書又畫使人易辨而已余以為司常指大閲而言此指治兵而言大閱畫治兵書各有所主不一法也蕙田案仲春之師帥旅帥卒長兩司馬公司馬即仲夏之縣鄙家鄉野也而此諸官亦即仲春之所謂軍帥仲夏之所謂帥也仲春不言百官則有詳畧之異耳由今思之大司馬言四時之制則自鄉遂以達於采地宜悉舉之詎有諸侯従獵之制咸在而反遺於畿内者仲秋治兵尤重於春夏則官當尤備鄭康成以軍吏為諸軍帥是矣而以師都為遂大夫以鄉遂為鄉大夫郊為州長縣正以下野為公邑大夫其中尚缺采地則不得不以百官為卿大夫試思仲夏之百官既解為各以其職従王者至仲秋之百官而忽異其解已屬不確況夏苗猶備百官豈秋獮獨無之乎竊以康成之言未是惟鄭剛中之辨最為精確葢剛中據司常大閲之文以軍吏為即大閲之孤卿與茇舍之帥以百官為即大閲之大夫士與茇舍之百官以師都為即大閲之師都與茇舍之縣鄙以鄉遂為即大閲之州里縣鄙與茇舍之鄉及野以郊野為公邑閑田之吏與鄉遂之郊野異如此則整齊包括處處皆通矣其辨茇舍之縣鄙與司常之縣鄙名同而實異尤精王氏應電曰案司常王建大常諸侯建旂正與此同此外所載皆異夫司常于國之大閲贊司馬頒旗物則凡祭祀賔客會同軍旅並當以之為凖惟安營出戰則旗法與此不同若其初至不當又有所更置葢旌旗以一人之耳目豈得數易以亂之此盖誤文也蕙田案王昭明以旗旜等有誤文蔡宸錫亦謂此節旗旜物旟四字顛倒誤寫旗當為旜旜當為旗物當為旟旟當為物宜以司常職之文為定此説精確當従之遂以獮田如蒐之法羅弊致禽以祀祊注秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方疏鄭以祊為誤者祊是廟門之外惟祭宗廟及繹祭乃為祊祭今因秋田而祭當是四方之神鄭氏鍔曰秋氣肅殺故田以殺為主王氏昭禹曰以物成于秋所取者衆故也王制曰鳩化為鷹然後設罻羅則秋用羅宜矣又曰春物始生故為民祈而祭社秋物既成故為民報而祀祊春官肆師獮之日涖卜來嵗之戒注秋田為獮始習兵戒不虞也卜者問來嵗兵寇之備鄭氏鍔曰君子除戎器戒不虞故知戒為禁備之事陳氏暘曰先王之時必預戒來嵗之事者欲先事為備也春秋時鄭石㚟言於子囊曰先王卜征五年而嵗習其祥祥習則行不習則增修徳而改卜則是卜不吉必修徳而豫戒然後為治世之事蕙田案書卜三龜一習吉又朕夢協朕卜襲于休祥即傳所云祥習則行也又案涖卜來嵗於秋獮而春夏冬不卜者秋狩則専於治兵也禮記月令季秋之月天子乃厲飾執弓挾矢以獵注厲飾謂戎服尚威武也弁疏厲飾謂嚴厲武猛飾謂容飾也熊氏云戎服者韋服也以秋冬之田故韋弁服若春夏則冠弁服故司服云凡甸冠弁服義或然也陳氏祥道曰周官司服凡田冠弁服月令季秋天子乃厲飾盖周秦之禮異也命主祠祭禽于四方注以所獲禽祀四方之神也司馬職曰羅弊致禽以祀祊疏謂獵竟也主祠謂典祭祀者也四方有功于方之神也四時田獵皆祭宗廟而分時各以為主也此天子獵既畢因命典祀之官取田獵所獲之禽還祭于郊以報四方之神也鄭注秋獮祀方云秋田主祭四方報成萬物詩曰以社以方下云方迎四方氣於郊也鄭又云秋祭社與四方為五穀成熟報其功也右秋獮周禮夏官大司馬中冬教大閲注春辨鼔鐸夏辨號名秋辨旗物至冬大閲簡軍實孔氏頴達曰冬教大閲者以冬閑無事備習威儀故因其田獵教以簡閲也王氏詳説春辨鼓鐸鐲鐃之用夏辨號名之用秋辨旗物之用至冬則戒衆庶修戰法而及於旗物鼓鐸鐲鐃要之辨鼔鐸者未始無旗物所謂以旗致民是也辨旗物者未始無號名所謂各書其事與其號也三時之田各以其所辨者為主耳前期羣吏戒衆庶修戰法注羣吏鄉師以下田疏鄉師四時之田前期出法於州里簡其鼔鐸旗物兵器修其卒伍以下則若州長作民而師田行役之事則帥而致之掌其戒令與其賞罰黨正凡國作民而師田行役則以其法治其政事族師若作民而師田行役則合其卒伍簡其兵器以鼔鐸旗物帥而至虞人萊所田之野為表百步則一為三表又五十步為一表注虞人萊所田之野芟除其草萊令車得驅馳詩曰田卒汚萊易氏祓曰表以步度之步長六尺百步則一為三表是三表相去二百步又五十步為一表則四表為二百五十步矣大閲必用四表所以寓王者節制之師而大武之四表實象之盖周都西南一表在南所謂武始而北出夾振之而駟伐則有振鐸作旗之義厯二表三表而至四表則再始以著往者也商都東北四表在北所謂四成而南國是疆復亂以飭歸則有鼓退鳴鐃且郤之義厯三表二表而復于一表則樂終而徳尊者也大閲亦然賈氏乃謂後表在北士卒由後表以至南表復回身向北以至後表與樂記之言不合樂記言大武則周家一代寓兵之良法當以樂記為正或謂三表相距各百步每表各六十大何以容大閲之衆若以開方論其勢誠窄若據虞人萊所田之野則迥野左右何有紀極鄭氏謂左右之廣當容三軍此指一旁而言若左右兩旁當容六軍又云步數未聞則六軍分行左右開張取其容六軍之衆不以步數拘也如此則地勢廣袤豈止容六軍而已田之日司馬建旗于後表之中羣吏以旗物鼔鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐注質正也弊仆也皆坐當聼誓李氏嘉會曰四表止于二百五十步坐作進退步行趨驟為力不勞軌範易習民之左右顧瞻皆其鄉黨鄰里自然情親勢一敵不可乗此古人結陳堅固也易氏祓曰及田之日司馬建熊虎六斿之旗于虞人所誤後表之中據樂記舞而言則後表當是在南一表於是羣吏如鄉師以下以其旗物及鼔鐸鐲鐃等各帥其民而致于大司馬羣吏聴誓於陳前斬牲以左右徇陳曰不用命者斬之注羣吏諸軍帥也陳前南面鄉表也月令季秋司徒搢扑北面誓之疏使司徒誓者此軍吏及士本是六鄉之民今雖屬司馬猶是已之民故使司徒誓之也易氏祓曰衆庶已集命之皆坐于南之一表羣吏聴誓則自軍帥而下皆南面向表誓于陳前鄭氏鍔曰坐而聴誓斬牲以徇所謂三令五申也今見于司馬法曰夏后氏誓于軍中欲民先其慮也商誓于軍門之外欲民先意以待事也周将交刄而誓之以致民志也車徒皆坐使羣吏聴誓者羣吏各帥其衆有誓而羣吏聴之則傳逹于所統之衆簡而易知無敢不従矣中軍以鼙令鼔鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼔行鳴鐲車徒皆行及表乃止三鼔摝鐸羣吏弊旗車徒皆坐注中軍中軍之将也天子六軍三三而居一偏羣吏既聴誓各復其部曲中軍之将令鼔鼔以作士衆之氣也鼔人者中軍之将師帥旅帥也司馬兩司馬也鼔鐸以作衆作起也既起鼔人擊鼓以行之伍長鳴鐲以節之及表自後表前至第二表也三鼓者鼔人也掩上振之為摝摝者止行息氣也又三鼓振鐸作旗車徒皆作鼔進鳴鐲車驟徒趨及表乃止坐作如初注趨者赴敵尚疾之漸也春秋傳曰先人有奪人之心乃鼔車馳徒走及表乃止注及表自第三前至前表鼔戒三闋車三發徒三刺注鼔戒戒攻敵鼔一闋車一轉徒一刺三而止象服敵鄭氏鍔曰每鼔一闋則車一發而徒一刺至三而止是謂節制之兵三發即書所謂不愆于六步七步乃止齊焉三刺即書所謂不愆於四伐五伐六伐七伐乃止齊焉之意乃鼔退鳴鐃且郤及表乃止坐作如初注鐃所以止鼔軍退卒長鳴鐃以和衆鼔人為止之也退自前表至後表鼔鐸則同習戰之禮出入一也異者廢鐲而鳴鐃疏乃鼓退者謂至南表軍吏及士卒回身向北更従南為始也遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後注冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之叙和出用次第出和門也左右或出而左或出而右有司平之鄉師居門正其出入之行列也旗軍吏所載分地調其部曲疎數前後有屯百步車徒異羣相去之數也車徒畢出和門鄉師又巡其行陣疏軍門曰和者左氏傳云師克在和不在衆立兩旌者昭八年穀梁傳云秋蒐于紅正也又云刈蘭以為防置旃以為轅門是其車也車徒異羣者出軍之時一車甲士三人步卒七十二人車徒同羣臨陣則車徒異羣故車人有異險野人為主易野車為主注險野人為主人居前易野車為主車居前禮庫曰先王車戰不求大勝求為不可敗而已鄭荘欲驅馳中原始為徼利之名故鄭荘始用徒兵自中行穆子乃毁車以従卒自左師展始乗馬自趙武靈王始用騎先王兵制敗壊而不可復實自荘公始既陳乃設驅逆之車有司表貉於陳前鄭氏鍔曰驅則自後驅之使出逆則自前迎之使入驅其後則獸無所逃逆其前雖欲出防而不可得中軍以鼙令鼓鼔人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳注羣司馬謂兩司馬也枚如箸銜之有繣結項中軍法止語為相疑惑也鄭司農云大獸公之輸之于公小獸私之以自畀也詩云言私其豵獻豜于公一嵗為豵二嵗為三嵗為特四嵗為豜五嵗為慎𤣥謂慎讀為麎爾雅曰豕生三嵗曰豵豕牝曰麋牡曰麎獲得也得禽獸者取左耳當以計功易氏祓曰中軍以鼙令鼔鼓人皆三鼔如習戰之時則師田之法一焉王氏昭禹曰不専取左耳則効功者疑于獲一而効二取左耳以効功所以謂之馘也及所弊鼔皆駴車徒皆譟注鄭司農云及所弊至所弊之處𤣥謂至所弊之處田所當止也天子諸侯蒐狩有常至其常處吏士鼔譟象攻敵尅勝而喜也易氏祓曰駴如馬之駴譟如鳥之譟以示勝敵徒乃弊致禽饁獸於郊入獻禽以享烝注徒乃弊徒止也冬田主用衆物多故得取也致禽饁獸于郊聚所獲禽因以祭四方神于郊月令季秋天子既田主祠祭禽四方是也入又以禽祭宗廟孔氏穎達曰冬時萬物衆多獵則主用衆物以祭宗廟而亦報于物有功之神于四方也蕙田案月令季秋祭四方正義謂秋時萬物以成獵則以報祭社及四方為主也乃司馬冬狩云致禽饁獸于郊入獻禽以享烝鄭云致禽饁獸于郊聚所獲禽因以祭四方神于郊也月令季秋天子既田命主祠祭四方是也入又以禽祭宗廟鄭借季秋之禮以釋冬狩之義者葢秋祭雖以四方為主亦兼祭社冬祭雖以宗廟為主亦兼四方故互相證之耳黄氏度曰徒取禽車列陳不動雖戰亦然至此徒止遂獻禽易氏祓曰春社夏礿秋祊不言入獻禽而冬烝獨言之者以外行致禽饁郊之禮然後獻禽于宗廟故謂之入鄭氏鍔曰此戰勝而歸獻捷于廟社之意也郊言饁獸烝言獻禽豈用大于郊而用小于廟别而言之則禽獸有大小之殊合而言之獸亦可謂之禽也右冬狩天官獸人及弊田令禽注于虞中注弊仆也仆而田止鄭司農云弊田謂春火弊夏車弊秋羅弊冬徒弊虞中謂虞人萊所田之野及弊田植虞旗于其中致禽而珥焉獸人主令田衆得禽者置虞人所立虞旗之中當以給四時社廟之祭故曰春獻禽以祭社夏獻禽以享禴秋獻禽以祀祊冬獻禽以享烝人曰大獸公之小禽私之公之謂輸之于虞中珥焉者取左耳以致功若斬首折馘故春秋傳曰以數軍實也疏注猶聚春官甸祝師甸致禽于虞中乃屬禽注師甸謂起大衆以田也致禽于虞中使獲者各以其禽來致于所表之處屬禽别其種類疏獵山山虞植旗獵澤澤虞植旌是為所表之處鄭氏鍔曰田畢虞人植旌旗于所表之處令獲者各致禽其中甸祝則禽而屬之使禽獸以類相従也地官山虞及弊田植虞旗于中致禽而珥焉注弊田田者止也植猶樹也田止樹旗令獲者皆致其禽而校其耳以知獲數也山虞有旗以其主山得畫熊虎其仭數則短也鄭司農云珥者取禽左耳以効功也大司馬職曰獲者取左耳疏禮緯旌旗之杠天子九仭諸侯七仭大夫五仞士三仞山虞是士雖有熊虞為旗仞數則短宜三仞易氏祓曰弊田植旗獸人所謂令禽注于虞中是已致禽而珥之如小子珥于社稷之類田畢而祭也鄭氏謂珥當為衈取其左耳以効功故曰衈葢取字之偏旁以為左耳其説未為不善如肆師小子羊人言祈珥鄭氏亦曰珥當為衈羽牲曰衈且引禖記之言成廟則釁之與此効功之言不同人取左耳為毛牲謂羽牲曰衈其文自相背馳況大司馬言致禽以祀祊致禽饁獸于郊皆行祭禮于致禽之後不應致禽之後方取左耳以效功劉執中釋肆師之職曰珥當為弭字之誤也弭謂小祝之弭兵災葢田獵所以訓兵弭災正田獵之事肆師于狩之日涖卜來嵗之戒亦弭兵災之意蕙田案珥字之義或云取左耳効功或云祭名或云弭兵災也三説不同但取左耳與致禽事屬相聨于文義尤合祭以弭災説似迂逺且又非山虞所當掌也夏官田僕及獻比禽注田弊獲者各獻其禽比種物相従次數之鄭氏鍔曰及田者獻禽校次而比之則大小各従其類然後大獸可得而公小獸可得而私地官澤虞及弊田植虞旌以屬禽注屬禽猶致禽而珥焉澤虞有旌以其主澤澤鳥所集故得注析羽焉疏山虞致禽謂輸之于公當致之于虞旗之中而珥以効功此云屬禽謂百姓致禽訖虞人屬聚之别其等類每禽取三十焉則致與屬不同而鄭云猶致禽者欲明山虞澤虞文皆不足互見為義耳王氏昭禹曰山虞以旗致禽則熊虎乃山物也澤虞以旌屬禽則鳥羽澤物也春官小宗伯若大甸則帥有司而饁獸于郊遂頒禽注甸讀曰田有司大司馬之屬饁饋也以禽饋四方之神于郊郊有羣神之兆頒禽謂以與羣臣詩傳曰禽雖多擇取三十焉其餘以與大夫士以習射于澤宫而分之甸祝及郊饁獸舍奠于祖禰乃斂禽禂牲禂馬皆掌其祀號注饁饋也以所獲獸饋于郊薦于四方羣兆入又以奠于祖禰薦且告反也斂禽謂取三十入腊人焉杜子春云禂禱也禱爾雅曰為馬禱無疾為田禱多獲禽牲詩云既伯既既伯既禱馬祭也𤣥謂禂讀如誅今侏大字也為牲祭求肥充為馬祭求肥健疏羣神之兆皆在四郊還國過羣兆遂薦之案王制一為乾豆二為賔客三為充君之庖此入腊人者案上殺者乾之以為豆實供祭祀據重者而言劉氏彛曰禱牲禱馬者又因斂禽以祭牲牢之神求其博碩肥腯也以祭馬祖之神求其六閑四種孔阜奕奕也詩曰吉日惟戊既伯既禱其是之謂乎禮記王制天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖陳氏澔曰無事無征伐出行喪凶之事也嵗三田者謂每嵗田獵皆是為此三者之用也乾豆腊之以為祭祀之豆實也春秋桓公四年穀梁傳四時之田皆為宗廟之事也佳其所先得一為乾豆二為賔客三為充君之庖昭公八年穀梁傳禽雖多天子取三十焉其餘與士衆以習射于射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也注取三十以共乾豆賔客之庖射宫澤宫射以不争為仁揖譲為義禮經會元天子無事則嵗三田一為乾豆二為賔客三為充君之庖若然則田獵特為三事講也今觀大司馬四時之田皆因田而講武豈徒為賔客庖豆之奉而已哉葢王制特為獲禽設也非為講武言也周禮非區區於獲禽而實拳拳於講武也然知古人因田事而講武而不知古人因武事而寓田講武本非古人之得已而殺禽亦豈古人之本心哉古人不以無事而講武亦不以無事而殺獸是以因振旅茇舍治兵大閲之教而寓蒐苗獮狩之儀因蒐苗獮狩之田而為社礿祊烝之祭如此則講武為有名而殺獸為有禮也周禮天官獸人凡祭祀喪紀賔客共其死獸生獸注共其完者凡獸入于腊人注當乾之皮毛筋角入于玉府注入玉府給作器用右頒禽供祭天官掌次諸侯師田則張幕設案注謂諸侯従王師田者禮記王制天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵陳氏澔曰綏旌旗之屬也下偃仆之也佐車即周禮驅逆之車驅者逐獸使趨于田之地逆者要逆其走而不使之散亡也此言田獵之禮尊卑貴賤之次序蕙田案詩毛傳天子發然後諸侯發諸侯發然後士大夫發天子發抗大綏諸侯發抗小綏抗即下也亦即周禮大司馬之所謂弊也陳氏禮書天子諸侯發則抗大綏小綏殺之時也王制言下大綏小綏既殺之時也周禮夏官田僕凡田王提馬而走諸侯晉大夫馳鄭氏鍔曰此三者皆行馬之節然後尊卑之分定矣田獵雖従禽之樂君臣不可並驅必有先後遲速之等乃所以為田禮先儒以為提遲于馳皆取尊者體促之義深知經者也王氏曰提節之晉進之馳則亟進之尊者安舒卑者戚速蕙田案以上諸侯従天子田獵春秋桓公四年公羊傳諸侯曷為必田狩一曰乾豆二曰賔客三曰充君之庖蕙田案以上諸侯自行田獵右諸侯田獵史記孟孫獵得麑使西秦巴持之其母隨而呼之西秦巴不忍而與其母孟孫適至求麑對曰余不忍而與其母孟孫大怒逐之居三月復召為其子傅曰夫子不忍麑又且忍吾子乎陳氏祥道曰春秋傳曰惟君用鮮衆給而已是天子諸侯有四時田獵之禮大夫士不與焉故鄭豐卷将祭請田而子産止之蕙田案陳用之謂大夫無田獵之禮此説非是考賈誼新書論諸侯田獵之禮云已祭取餘獲陳於澤然後卿大夫相與射禽是大夫明有従國君田獵之事周禮田僕王提馬諸侯晉大夫馳王制天子殺下大綏諸侯殺下小綏大夫殺止佐車云云則大夫並有従天子田獵之禮矣王制又有大夫不揜羣云云則大夫又明有自行田獵之禮矣其禮錯見他門可以互考右大夫田獵詩小雅車攻徒御不驚大庖不盈朱子詩傳大庖君庖也不盈謂取之有度不極欲也葢古者田獵獲禽面傷不獻踐毛不獻不成禽不獻自左膘而射之達于右腢為上殺以為乾豆奉宗廟達右耳本者次之以為賔客射左髀達于右䯚為下殺以充君庖每禽取三十焉每等得十其餘以與士大夫習射於澤宫中者取之是以獲雖多而君庖不盈也周禮地官迹人禁麛卵者與其毒矢射者注為其夭物且害心多也麛麋鹿子圍疏案月令孟春云不麛不卵又王制云國君春田不澤大夫不掩羣士不麛不卵者彼以春時先乳特禁之其月令季春云餧獸之藥毋出九門禮記王制不麛不卵不殺胎不殀夭不覆巢天子不合圍諸侯不掩羣陳氏澔曰合圍四面圍之也掩羣者掩襲而舉羣取之也曲禮國君春田不圍澤大夫不掩羣士不取麛卵劉向説苑苗者毛也取之不圍澤不掩羣取禽不麛卵不殺孕重者春蒐不殺小麛及孕重者冬狩皆取之陳氏禮書曲禮國君春田不圍澤大夫不掩羣諸侯在國之禮也王制天子不合圍諸侯不揜羣諸侯従王蒐之禮也春秋昭公八年穀梁傳過防弗逐不従奔之道也面傷不獻不成禽不獻注過防弗逐戰不逐奔之義面傷嫌誅降不成禽惡虐幼小詩毛傳戰不出頃田不出防不逐奔走古之道也蕙田案防謂田獵之塲防限也國語韋昭註禮聖主之於禽獸也見其生不食其死聞其聲不嘗其肉隠弗忍也故逺庖厨仁之至也不合圍不掩羣不射宿不涸澤豺不祭獸不田獵獺不祭魚不設網罟鷹隼不鷙睦而不逮不出頴羅草木不零落斧斤不入山林昆蟲不蟄不以火田不麛不卵不刳胎不夭魚肉不入廟門鳥獸不成毫毛不登庖厨取之有時用之有節則物莫不多右田獵取物之仁書五子之歌太康畋於有洛之表賈誼新書商湯見祝網者置四面其祝曰従天墜者従地出者従四方來者皆離吾網湯曰嘻盡之矣非桀其孰為此湯乃解其三面置其一面更教之祝曰昔蛛蝥作網今之人循序欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者其憚害物也如是漢南之國聞之曰湯之徳及鳥獸矣四十國歸之詩豳風七月序陳王業也周公陳后稷先公風化之所由致王業之艱難也一之日于貉取彼狐狸為公子裘注于貉謂取狐狸皮也孟冬天子始裘二之日其同載纉武功言私其豵獻豜于公注纉繼功事也豕一嵗曰豵三嵗曰豜大獸公之小獸私之事疏至二之日之時君臣及其民俱出田獵則繼續武年常習之使不忘戰也戰鬬不可以不習四時而習之兵事不可以空設田獵蒐狩以閑之故因習兵而俱出田獵也美先公禮教備矣書無逸文王不敢盤于遊田以庶邦惟正之供史記西伯将出獵卜之曰所獲非熊非彲非虎非羆所獲伯王之輔于是周西伯獵果遇太公于渭之陽與語大悦曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號之曰太公望載與俱歸立為師詩召南彼茁者葭彼茁者葭壹發五豝于嗟乎騶虞彼茁者蓬壹發五豵于嗟乎騶虞朱子曰南國諸侯承文王之化修身齊家以治其國而其仁民之餘恩又有以及於庻類故其春田之際草木之茂禽獸之多至於如此而詩人述其事而美之春秋昭公四年左氏傳成王有岐陽之蒐注成王歸自奄大蒐于岐山之陽通鑑前編成王五年蒐于岐陽因盟諸侯詩小雅車攻我車既攻我馬既同四牡龎龎駕言徂東田車既好四牡孔阜東有甫草駕言行狩朱子詩傳宣王復文武之境土脩車馬備器械復會諸侯於東都因田獵而選車徒焉故詩人作此以美之詩說車攻宣王大閲于東都諸侯畢會史籀美之賦也吉日序吉日美宣王田也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜従其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之従天子之所傳漆沮之水麀鹿所生也従漆沮驅禽而致天子之所瞻彼中原其祈孔有儦儦俟俟或羣或友悉率左右以燕天子傳祈大也趨則儦儦行則俟俟獸三曰羣二曰友驅禽之左右以安待天子既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴疏虞人既驅禽待天子既以張我天子所射之弓既挾我天子所發之矢發而中彼小豝亦又殪此大兕也既殺得羣獸以給御諸侯之賔客且以酌醴與羣臣飲時為俎實也通鑑前編宣王八年巡狩東都朝會諸侯因以田獵講武鄭風叔于田序叔于田刺莊公也叔處于京繕甲治兵以出于田國人説而歸之疏國人注心于叔説之如此而公不知禁故刺之叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武大叔于田序大叔于田刺荘公也叔多材而好勇不義而得衆也叔于田乗乗馬執轡如組兩驂如舞叔在藪火烈具舉襢裼暴虎獻于公所将叔無狃戒其傷女叔于田乗乗黄兩服上襄兩驂雁行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縦送忌叔于田乗乗鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌蕙田案段不義而得衆荘公養成而後處之是弟慢其兄實兄絶其弟序言刺荘公者得之叔不足道也齊風還序還刺荒也哀公好田獵従禽獸而無厭國人化之遂成風俗子之還兮遭我乎峱之間兮並驅従兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅従兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅従兩狼兮損我謂我臧兮張氏叙曰讀此而齊之泱泱表海富強莫敵者可見而其急功利喜夸詐之習亦不掩矣詩可以觀豈不信哉盧令序盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲秦風駟驖序駟驖美襄公也始命有田狩之事園囿之樂焉駟驖孔阜六轡在手公之媚子従公于狩奉時辰牡辰牡孔碩公曰左之舍拔則獲遊于北園四馬既閑輶車鸞鑣載獫歇驕春秋桓公四年春正月公狩于郎左氏傳春正月公狩于郎書時禮也公羊傳常事不書此何以書譏何譏爾逺也莊公四年冬公及齊人狩于禚公羊傳公曷為與㣲者狩齊侯也齊侯則其稱人何諱與讎狩也前此者有事矣後此者有事矣則曷為獨于此焉譏于讎者将一譏而已故擇其重者而譏焉莫重乎其與讎狩也于讎者則曷為将一譏而已讎者無時焉可與通通則為大譏不可勝説故将一譏而已其餘従同同穀梁傳齊人者齊侯也其曰人何也卑公之敵所以卑公也何為卑公也不復讎而怨不釋刺釋怨也昭公八年秋蒐于紅注革車千乗不言大者經文闕也紅魯地沛國縣西有紅亭左氏傳秋大蒐于紅自根牟至于商衞革車千乗注大蒐數軍實簡車馬也根牟魯東界瑯琊陽都縣有牟鄉商宋地魯西竟接宋衞也言千乗明大蒐且見魯衆之大數也公羊傳蒐狩不書必違禮而後書于是蒐于紅自根牟至于商衞革車千乗皆王家之師也自是而屢蒐三家所以耀武焉爾是故桓莊之狩必言公昭定之蒐不言公矣穀梁傳蒐于紅正也因蒐狩以習用武事禮之大者也十一年五月大蒐于比蒲二十年左氏傳冬十二月齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之二十有二年春大蒐于昌間定公十有三年夏大蒐于比蒲注夏蒐非時十有四年秋大蒐于比蒲哀公十有四年春西狩獲麟注冬獵曰狩大野在魯西故言西狩左氏傳春西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之國語魯語宣公夏濫於泗淵里革斷其罟而棄之曰古者大寒降土蟄發水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也鳥獸孕水蟲成獸虞於是乎禁罝羅矠魚鼈以為夏稿助生阜也鳥獸成水蟲孕水虞於是乎禁置䍡設穽鄂以實廟庖畜功用也且夫山不槎蘖澤不伐夭魚禁鯤鮞獸長麑䴠鳥翼鷇卵蟲含蚳蝝蕃庶物也古之訓也今魚方别孕而又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也使有司藏之使吾無忘諗師存侍曰藏罟不如寘里革於側之不忘也右經傳田獵之事五禮通考卷二百四十二
