body:
  text: 五禮通考卷二十一刑部尚書秦蕙田撰吉禮二十一祈榖蕙田案祈榖之禮見於月令春秋傳郊祀上帝與冬至圜丘禮同一是正祭一是祈祭但圜丘用日至不卜日而祈榖則用辛郊特牲家語及春秋所書郊日皆有明文而春秋書魯郊者十皆言卜先儒謂卜日用辛皆魯禮魯無冬至圜丘之祭故啓蟄而郊以祈農事在建寅之月蓋即天子祈榖之禮其言是也自鄭氏合日至用辛為一而郊祭之禮及祈榖之禮俱晦故自漢以後郊必用辛而二祭不分矣梁祈榖祭先農是以人鬼為天帝唐祈榖祀感帝是以讖緯惑正經惟顯慶禮與政和禮圜丘祈榖皆祭上帝始不失古誼明祈榖禮自世宗始後間行之洪惟聖朝孟春上辛祈榖於南郊每嵗天子親行敬勤之義斯為至矣今輯經傳言祈榖之文以冠篇首繼以春秋魯郊及諸儒論魯郊者附焉庶幾先王祀天之正祭不至淆於漢儒之附會而後世祈榖之典禮其本末可具見也禮記月令孟春之月天子乃以元日祈榖於上帝注謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕疏鄭引春秋傳見襄七年左傳彼祈農事則此祈榖彼云郊而後耕此祈穀之後即躬耕帝藉是祈穀與郊一也方氏慤曰元日者善日也與王制習射上功所言同義詩言三之日于耜蓋建寅之月也故于是月始祈穀焉噫嘻言春夏祈穀于上帝正謂是矣春秋桓公五年左氏傳凡祀啓蟄而郊注啓蟄夏正建寅之月祀天南郊小疏禮諸侯不得祭天魯以周公之故得郊祀上帝夏正曰正月啓蟄其傳曰言始發蟄也故漢氏之始以啓蟄為正月中注以此句為建寅之月釋例云歷法正月節立春啓蟄為中氣者因傳有啓蟄之文故逺取漢初氣名欲令傳與厯合釋例于孟獻子曰啓蟄而郊郊而後耕耕謂春分也言得啓蟄當卜郊不應過春分也如此必是建寅之月方始郊天周之孟春未得郊也禮記明堂位曰魯君孟春乘大路載弧韣以祀帝于郊雜記云孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻于為之如彼記文則魯郊以周之孟春而傳言啓蟄而郊者禮記後人所録其言或中或否未必所言皆是正禮襄七年傳孟獻子曰啓蟄而郊禮記左傳俱稱獻子而記曰日至傳言啓蟄一人兩説必有謬者若七月而禘獻子為之時應有七月禘矣蒸嘗過則書禘過亦應書何以獻子之時不書七月禘是知獻子本無此言不得云禮記是而左傳非也明堂位後世之書其末章云魯君臣未嘗相弒也禮樂刑法政俗未嘗相變春秋之世三君見弒髽而弔士有誄俗變多矣尚云無之此言既誣則郊亦難信以此知記言孟春非正禮也鄭玄注書多用讖緯言天神有六地示有二夏正郊天祭其所感之帝焉周人本德祭靈威仰也魯無冬至之祭惟祭靈威仰耳先儒悉不然故王肅作聖證論引羣書以證之言郊即圜丘圜丘即郊天體惟一安得有六天也晉武帝王肅之外孫也泰始之初定南北郊祭一地一天用王肅之義杜君身處晉朝共遵王説不言有二天然則杜意天子冬至所祭魯人啓蟄而郊猶是一天但異時祭耳此注直云祀天南郊不言靈威仰明與鄭異也蕙田案啓蟄而郊見于此傳及襄七年孟獻子語是祈榖孟春實無疑義即呂覽月令之文所由來也自雜記有孟獻子正月日至之説鄭氏注明堂位孟春為建子而日至用辛之論始淆矣此疏釋建寅之月特為明確而辨雜記之文為誣亦最透快則孟春之説始定微特杜氏功臣抑亦為康成補過也襄公七年左氏傳孟獻子曰夫郊祀后稷以祈農事也注郊祀后稷周始祖能播殖者能疏后稷周之始祖能播殖者辨知后稷是何人不為播殖故祀以祈農事自謂郊天以祈農耳案孝經云昔者周公郊祀后稷以配天止云配天而祀之不言祈農也祭祀者為報以往非求將來之福也但祭為明神所享神以將來致福將來而獲多福乃由祭以得之禮器稱君子曰祭祀不祈祭者意雖不祈其實福以祭降以祭獲福即祈之義也宗廟之祭緣生事死盡其孝順之心非求耕稼之利少牢饋食者大夫之祭禮也其祭之末尸嘏主人使女受福于天宜稼于田彼豈為田而祭哉神以宜田福之耳郊天之義亦由是也神以人為主人以穀為命人以精意事天天以宜稼佑人以此謂之祈農本意非祈農也詩噫嘻序曰春夏祈穀于上帝禮月令孟春之月曰是月也天子乃以元日祈榖于上帝即是郊天之祭也其下即云乃擇元辰天子親載耒耜躬耕帝藉是郊而後耕也獻子此言正與禮合是故啓蟄而郊郊而後耕注啓蟄夏正建寅之月耕謂春分祈疏啓蟄為夏正建寅之月中氣也月令穀之後即擇日而耕初耕亦在正月據傳獻子此言郊天之禮必用周之三月而雜記云孟獻子曰正月日至可以有事于上帝此與禮記俱稱獻子二文不同必有一謬禮記後人所録左傳當得其真家語郊問定公問于孔子曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也大報天而主日配以月故周之始郊其月以日至其日用上辛至于啓蟄之月則又祈榖于上帝此二者天子之禮也魯無冬至大郊之事降殺于天子是以不同也王注祈求也為農求穀于上帝月令孟春之月乃以元日祈穀于上帝並無仲冬大郊之事至于祈穀與天子同故春秋傳曰夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕也而學者不知推經禮之指歸皮膚妄説至乃顛倒神祗變易時日遷改兆位良可痛心者也蕙田案周禮圜丘之祭以冬日至之日非月也家語其月以日至正與孟獻子正月日至可以有事于上帝意相同先儒以此為王肅偽撰殆不誣也在王肅意欲破鄭氏日至上辛合一之謬而不知其有語病耳周頌噫嘻序曰春夏祈榖于上帝也注祈猶禱也求也月令孟春祈榖于上帝夏則龍見而雩是與王疏噫嘻詩者春夏祈穀于上帝之樂歌也謂周公成之時春郊夏雩以禱求膏雨而成其穀實為此祭于上帝詩人述其事而作此歌焉經陳播種耕田之事是重穀為之祈禱戒使勸農業故作者因其禱祭而述其農事李氏迃仲曰凡祀啓蟄而郊龍見而雩禮記月令孟春元日祈穀於上帝仲夏之月大雩帝用盛樂祈穀實春則因民播種而以啓蟄之時而郊夏則恐旱暵為災而于龍星見之時而雩皆所以祈穀于上帝者也蕙田案祈榖在孟春祈雨在孟夏兩祈不同而時亦異噫嘻詩序謂春夏祈榖于上帝乃騎墻之見足徴小序之陋若以祈雨即為榖祈實欲牽挽為一益復支離矣鄭箋加是歟二字以疑之尚未害孔疏及李氏乃質言之非也此詩當是祈榖後祭社稷之歌且已在康王世則成王主在禰宫祈榖之郊先作龜于禰宮故承卜吉于成王廟而言噫嘻哉我皇考成王既昭格于爾大神矣今惟祈率時農夫以播百榖云云所以為祈榖後祭社稷之詩則亦非祈榖上帝之正祭也周人祈榖之郊與冬至之郊同歌思文而已子由解則專以為雩祭之詩然詩中並未有祈雨之意詩雖貴含蓄恐郊廟樂章必不作此等歇後語也或又以發端噫嘻二字為雩祭吁嗟之徴亦曲説耳臣工一篇凡兩曰嗟嗟亦將謂雩祭可乎詩周頌噫嘻成王既昭格爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦李氏曰蘇黃門民力盡矣所不足者惟雨耳此説可謂盡詩人之意也噫嘻之詩春夏祈穀于上帝之樂歌也是詩所言者播厥百榖曰十千維耦但言從事于田畝殊無祈穀之意以為人事于此盡矣若夫百榖順成非人所能為天也故于此而祈穀焉詳觀此詩經有盡而意無窮可以一唱而三嘆也嚴氏粲曰祈穀之後即躬耕帝藉故言率時農夫以張本也言駿發爾私不及公田為民祈也何氏楷世本古義卜郊則受命于祖廟而作龜于禰宮郊特牲疏曰作龜于禰宮者先告祖受命又至禰廟卜之也明堂位曰孟春乘大路祀帝于郊配以后稷左氏曰啓蟄而郊郊而後耕則魯郊固在夏之孟春矣古者一嵗郊祀凡再冬至之郊為報本也建寅之郊為祈穀也建寅之郊用卜而冬至之郊不用卜蓋以禮文徴之郊特牲云郊之用辛也周之始郊日以至家語亦云周之始郊其月以日至其日用上辛所謂始郊者對建寅之郊而言日不取至日而定用上辛此以知冬至之郊不用卜也月令云孟春之月天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜躬耕帝藉甲乙丙丁等謂之日子丑寅卯等謂之辰元之為言善也日必須卜辰必須擇據春秋言卜郊者皆祈穀之郊此以知唯建寅之郊用卜也愚所以定噫嘻之詩為咏祈穀卜郊之事者以篇中專言勸農而章首有成王昭假之語明此詩作于康王之世乃主作龜禰宮而言不然周自后稷以農事開國即欲敕農官何不于始祖之廟舉始祖為辭而顧于成王何取乎序及蔡雍獨斷亦皆云春夏祈穀于上帝之所歌也此説相傳必非無本今觀詩中雖言耕事而絶無一語及祈穀者唯章首二語以為作龜禰宮乃與孟春祈穀相涉耳然孟春仲夏雖皆有祈穀而禮各不同仲夏大雩帝用盛樂以祈穀實無作龜禰宮之事序不應兼夏而言疑傳説之悮或夏字衍也蕙田案圜丘之祭但取日至不必用辛用辛者惟祈榖之郊何氏謂冬至之郊不取至日而定用上辛蓋為家語所惑非是其謂魯郊在夏之孟春建寅之郊用卜冬至之郊不用卜及春秋言卜郊者皆祈榖之郊皆明確不可易也右經傳祈榖郊春秋僖公三十一年夏四月四卜郊不從乃免牲猶三望注不從不吉也卜郊不吉故免牲免猶縱也卜疏凡祀啓蟄而郊啓蟄周之三月也今于夏四月郊者傳舉節氣有前有却但使春分未過仍得為郊故四月得卜郊也言四卜郊者蓋三月每旬一卜至四月上旬更一卜乃成為四卜也左氏傳非禮也注諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀月疏記言正月謂周正建子之月與傳啓蟄而郊其不同禮記是後儒所作不可以雖左傳猶三望亦非禮也禮不卜常祀注必其時而卜其牲日注卜牲與日知吉凶牛卜日曰牲注既得吉日則牛改名曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也公羊傳曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮四卜何以非禮求吉之道三疏三卜禮謂是魯禮若天子之郊則不卜以其常事但以魯郊非常是以卜之吉則為之凶則己之禘嘗不卜郊何以卜卜郊非禮也注禮天子不卜郊卜郊何以非禮魯郊非禮也注以魯郊非禮故卜爾魯郊何以非禮天子祭天注郊者所以祭天也天子所祭莫重于郊諸侯祭土注土謂社也諸侯所祭莫重于社疏欲道魯郊為非禮之意也天子有方望之事無所不通諸侯山川有不在其封內者則不祭也注故魯郊非禮疏正以其所主狹是以不得祭天地也榖梁傳夏四月不時也注郊春事也四卜非禮也注郊春事四卜則入夏董氏仲舒曰魯曷為郊周公故也不於日之至避王室也比旬而卜之逺怠慢也必更三旬禮盡于三也啖氏助曰天子以冬至祭上帝又以夏之孟春祈榖于上帝于郊故謂之郊魯以周公之故特以孟春祈榖于上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也卜三旬皆不吉則不郊趙氏匡采曰郊者所以事上帝也魯曷為之周公故也不于日至避王室也卜用夏正於農耕之始也葉氏夢得曰冬至之日祭天于地上之圜丘此周之正禮不可得而易者也孟春建寅之郊蓋祈榖之祭耳魯雖得郊不得同於天子是以因周郊之日以上辛三卜不從至建寅之月而止乃不郊書于春秋者甚明則魯郊殆周祈榖之郊而已故左傳謂啓蟄而郊李氏亷曰魯郊之用孟春何也魯無冬至大郊之事特以孟春祈榖為郊以家語及明堂左氏論之則孟春為是又曰郊之用卜何也古者大事皆決于卜公羊以為天子之郊常事則不卜魯郊非常是以卜之左氏以為常禮不卜止卜牲與日案周祀五帝前期太宰帥執事而卜日則天子亦卜也但所卜者不過卜日與牲耳春秋所書亦卜日與牲也汪氏克寬曰左傳家語皆云魯以啓蟄而郊朱子謂夏正之孟春漢太初以前以啓蟄為正月中氣也然啖氏謂以周之二月卜三月且辨榖梁以周之十二月卜正月非是今考宣三年成七年定十五年哀元年之改卜牛皆在正月蓋成王所賜止是祈榖之郊乃夏之孟春啖氏所言卜起二月下旬而盡于三旬者禮之正也榖梁所言卜起十二月下旬者禮之末失也故子服惠伯云魯將以十月上辛有事于上帝孟獻子曰正月日至可以有事于上帝而明堂位注疏以孟春為周之正月郊特牲疏崔氏皇氏用王肅之説又以魯冬至郊天建寅之月又郊以祈榖皆因魯郊之非時而誤也聖證論引穀梁言魯止一郊或用子月或用寅月蓋魯郊非時或僣天子日至之期而失之太早或踰啓蟄之節失之後時也或謂卜自建子之月而始又謂郊非祈農事則與程子冬祀圜丘春祈榖之説異矣華氏泉春秋疑義天子以冬至祭上帝又以夏之孟春祈榖于上帝于郊故謂之郊魯以周公之故特以孟春祈榖于上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛卜三旬皆不吉則不郊凡牲必養二一以祀上帝一以祀后稷帝牛有變則改卜稷牛以代之而别以他牛為稷牛若卜稷牛不吉及稷牛又死亦皆不郊凡不郊皆卜免牲卜免牲吉則免之不吉則但不郊而已不敢免繫牲待明年庀牲時卜用未成牲曰牛牲傷亦曰牛又曰此記郊之始據家語郊問則成王所賜伯禽所受其為祈榖之郊在啓蟄之月明矣魯以諸侯而郊已為非禮其末流之失抑又甚焉或僣用日至之郊宣三年成七年定十五年哀元年之改卜牛皆在春正月也或踰啓蟄之節僖三十一年襄十一年及定哀之改卜皆以四月五月又其甚者成十七年之書九月辛丑用郊是也夫魯之郊久矣隱桓莊閔不書先儒謂聖人不敢無故斥言君父之過故因其變異而書不及時書過時書卜郊不從書五卜四卜以瀆書用郊以廢卜書郊牛傷鼷鼠食郊牛以紀異書不郊猶三望以可已不已書此皆直書而自見者也若夫宣三年王喪未葬而卜郊哀元年先公未小祥而郊忘哀從吉違禮褻天莫此為甚則比其事而觀之而惡著矣蕙田案董趙以下諸儒論魯孟春郊為祈榖詳矣要非始于諸儒也左氏啓蟄而郊乃其的據而公羊魯郊非禮及榖梁四月不時之説義正相合三子之言必有所傳授勝于家語戴記多矣又案魯郊始于僖公春秋雖不敢無故書郊然有故而書皆在僖公之後華氏謂魯之郊已久皆因無故不敢斥言君父之過恐未確詳見後魯僣郊條內宣公三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望注牛不稱牲未卜日左氏傳三年春不郊而望皆非禮也望郊之屬也不郊亦無望可也注例在僖三十一年復發傳者嫌牛死與卜不從異公羊傳曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在于滌三月于稷者唯具是視郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止榖梁傳之口緩辭也傷自牛作也改卜牛牛死乃不郊事之變也乃者亡乎人之辭也注牛自傷口非備災之道不王也故以緩辭言之牛無故自傷其口易牛改卜復死乃廢郊禮此事之變異譏宣公不恭致天變胡傳乃不郊者為郊牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪于魯史册已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事禮乎春秋備書其義自見張氏元德曰此因事之變以明魯郊之非禮蓋僣禮之中復有忘哀從吉之罪春秋所以特書之家氏鉉翁曰此魯宣除喪始郊而天示之譴也成公七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛夏五月不郊猶三望榖梁傳不言日急辭也過有司也郊牛日展斛角而知傷展道盡矣其所以備災之道不盡也注有司展察牛而即知傷是展察之道盡不能防災禦患致使牛傷故不書日以顯有司之過斛球球然角貌改卜牛鼷鼠又食其角又有繼之辭也其緩辭也曰亡乎人矣非人之所能也所以免有司之過也注前已食故曰繼至此復食乃知國無賢君天災之爾非有司之過也故言其以赦之乃免牛乃者亡乎人之辭也免牲者為之緇衣纁裳有司元端奉送至于南郊免牛亦然免牲不曰不郊免牛亦然注郊者用牲今言免牲則不郊顯矣若言免牛亦不郊而經復書不郊者蓋為三望起耳言時既不郊而猶三望明失禮劉氏向曰鼠小蟲性盜竊鼷又小者也牛大畜祭天尊物也角兵象在上君威也小小鼷鼠食至尊之角季氏執國命以傷君威象十年夏四月五卜郊不從乃不郊注卜常祀不郊皆非禮故書公羊傳其言乃不郊何不免牲故言乃不郊也榖梁傳夏四月不時也注郊時于三月五卜強也乃者亡乎人之辭也吳氏澄曰二月下旬初卜三月上旬再卜三月中旬三卜不從則當止而不郊矣乃于三月下旬四卜又于四月上旬五卜五卜不從而後不郊瀆神甚矣十七年九月辛丑用郊公羊傳用者何用者不宜用也九月非所用郊也郊用正月上辛或曰用然後郊注周之九月夏之七月天氣上升地氣下降又非郊時故加用之魯郊博卜春三月言正月者因見百王正所當用也三王之郊一用夏正言正月者春秋之制也正月者歲首上辛猶始新皆取其首先之意日者明用辛例不郊則不日榖梁傳夏之始可以承春以秋之末承春之始蓋不可矣注郊春事也僖三十一年夏四月四卜郊不從傳曰四月不時今言可者方明秋末之不可故以是為猶可也九月用郊用者不宜用也宮室不設不可以祭衣服不修不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也注徐邈云宮室謂郊之齋宫衣服車馬亦謂郊之所用言一事缺則不可祭何得九月用郊吳氏澄曰九月乃夏時孟秋建申之月豈郊之時乎不卜日不卜牲而強用其禮焉故曰用非時之甚不敬之大也襄公七年夏四月三卜郊不從乃免牲注稱牲既卜日也卜郊又非禮也卜疏牲既成矣而又郊與僖同譏左氏傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也榖梁傳夏四月不時也三卜禮也乃者亡乎人之辭也汪氏克寬曰公穀啖氏皆以三卜為合禮朱子亦云四卜五卜失禮然春秋四書卜郊惟此年三卜亦書之者蓋三卜雖得禮而卜郊止于三月今書四月而三卜不從則過時不敬以致龜違故書以譏非時而非譏其瀆也十一年夏四月四卜郊不從乃不郊疏此四月四卜與僖三十一年文同蓋亦三月三卜而四月又一卜也止言不郊不云免牲免牛蓋不以其禮免直使歸其本牧而已故不書也高氏曰魯不當郊郊非禮也今不郊者非知其非禮故也乃卜不從故耳直書不郊則不復免牲矣定公十五年春王正月鼷鼠食郊牛牛死改卜牛夏五月辛亥郊注五月不時也公羊傳曷為不言其所食漫也榖梁傳不敬孰大焉趙氏匡乘日余早年嘗怪鼷鼠食郊牛致死上元二年因避兵旅于會稽時有水旱疫癘之苦至明年而牛災有小鼠能噬牛才傷其皮膚乃無有不死者髙氏曰魯郊當在孟春今以改卜牛在滌三月故至五月乃郊汪氏克寬曰不書卜郊徐彥疏云言郊則知卜吉可知夫正月改卜牛若在滌三月則當以四月郊今郊以五月蓋卜以四月郊而不吉又卜五月必龜從而後郊也故但書改卜牛不書卜郊經于卜郊不從則書之以譏瀆卜卜而從則但書郊之過時以譏其慢耳嘗考史記云定公十四年魯郊不致燔爼于大夫今春秋不書十四年郊則郊之不見于經者多矣惟因其失禮之中又失禮者則書以示貶而因見魯郊之僣也哀公元年鼷鼠食郊牛角改卜牛夏四月辛巳郊榖梁傳此該郊之變而道之也于變之中又有言焉鼷鼠食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣郊自正月至于三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始益不可矣九月用郊用者不宜用也郊三卜禮也四卜非禮也五卜強也卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異有變而不郊故卜免牛也已牛矣其尚卜免之何也禮與其亡也寧有嘗置之上帝矣故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之注庀具也待其後牲然後左右前牛在我用之不復須卜已有新牲故也周禮司門掌授管鍵以啓閉國門而祭祀之牛牲繫焉然則未左右時監門者養之子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也注牲有變則改卜牛以不妨郊事故不言其變榖疏上言子者弟子問穀梁子辭而曰我者是弟子述梁子自我之意待正月然後言牲之變此乃所以該郊郊享道也貴其時大其禮其養牲雖小不備可也子不志三月卜郊何也郊自正月至於三月郊之時也我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣注意欲郊而卜不吉故曰不從郊必用上辛者取其新潔莫先也四月則不時矣李氏廉曰春秋書郊止此故穀梁于此備言之其言有得有失髙氏曰魯不當郊故天示變以警之而改卜牛是違天也况公斬然在衰絰之中輒行天子之禮以見上帝可乎林氏之奇曰春秋郊望之旨三傳諸儒之説無得之者無他知求小禮而昧于大禮故也經書郊者九皆為有故而書非因卜不吉而廢郊則因牲死傷而廢郊又有不待卜之吉而特郊者雖牛之死傷而必郊者因卜不吉而廢郊則若僖三十一年夏四月成十年夏四月襄公七年夏四月十一年夏四月是也因牲死傷而廢郊者則若宣三年正月成七年正月是也有不待卜之吉而特郊者則若成十七年九月辛丑用郊是也有牛雖死傷而必郊者則若定十五年正月哀元年夏四月是也先儒之説不過罪其屢卜與其養牲不謹爾不知聖人書郊乃惡其非禮之大者至屢卜之瀆養牲之慢非春秋所責也學者欲究聖人之旨先當斷魯郊之當否未暇及其瑣瑣也夫子傷周之衰禮樂自諸侯出其言魯之郊禘則有周公其衰之嘆豈有天子郊天諸侯亦郊天子望祀山川諸侯亦望天子禘祖之所自出諸侯亦禘使諸侯亦可行則聖人不以禮樂自諸侯出為傷自夫子沒漢儒不知道者但見春秋書魯祭祀多天子之禮始妄設周賜禮樂之説所以諸儒不以魯郊為非捨其非禮之大者求其不合禮之小者魯人既僣竊禮樂罪莫重焉就使無四卜五卜瀆禮之過則可以郊乎否乎又使養牲必謹不至死傷則亦可郊乎否乎魯人郊望無時可也何區區者之足論然周郊以冬至而魯用之于啓蟄天子四望而魯三之名為後時降殺但竊郊望之名已有罪矣譬如商賈冠師儒之冠庶人服卿相之服望其容飾已知其非分越制也豫謂春秋所書之旨正以有故而不郊者為幸無故而郊者為大罪也季氏旅於太山夫子曰曽謂太山不如林放乎太山有知必不享季氏之祭矧上帝而可諂乎宜乎至于三卜四卜五卜不從鼷鼠屢食其牛可見天心之不享也魯人曽不知得罪于天雖屢卜不從而猶三望雖牛死而改卜牛甚者至于用郊可知僣擬之心不能自己下破王制上拂天心其罪為大也聖人發憤作春秋書其因變故而不郊者僅如此其餘非卜不從牛死傷而肆意于僣者又不知其幾也深味聖師之旨曰猶三望曰乃免牲其深矣乎其微矣乎學者思之右春秋書魯祈榖郊詩魯頌閟宮乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是享是宜降福既多周公皇祖亦其福女毛傳周公之孫莊公之子謂僖公也鄭箋承祀謂視祭事也春秋猶言四時也忒變也皇皇后帝謂天也成王以周公功大命魯郊祭天亦配之以君祖后稷其牲用亦牛純色與天子同也天亦享之宜之多豫之福此皇祖謂伯禽也詩緝曹氏曰司常言日月為常王建之交龍為旗諸侯建之僖公雖僣郊天之禮而猶以龍旗承祀不建大常猶不敢全僣天子禮也而明堂位乃曰日月之章則又過矣李氏曰禮記之書如禮運以為魯不當郊禘如明堂祭統以為魯當郊禘其異如此當從禮運之説伊川嘗謂説者以周公能為人臣所不能為之功故得用人臣不得用之禮夫人臣豈有不能為之功哉使功業過于周公亦人臣所當為之天下之事非人臣為之而誰為之以此觀之則知賜魯之禮樂者非成王為之春秋書郊多矣大抵譏其僣春秋以為僣而詩乃以為美則知所美非美也左氏云皇皇后帝皇祖后稷君子曰禮謂其先帝而後稷也夫先天而後稷周足以為禮然不知諸侯而用郊禘果可以為禮乎僖公三十一年四月四卜郊不從乃免牲夫以四月之時而卜郊足以見非禮也卜至于四尤以見其非禮安在其為春秋匪解也哉安在其為享祀不忒也哉詩人之言大抵失之誇也禮記明堂位成王以周公為有勳勞于天下命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也注孟春建子之月魯之始郊日以至大輅殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月新安王氏曰周天子有日至之郊以報本有啓蟄之郊以祈榖其祭天車用玉路旗用日月之常魯僣天子禮亦不敢盡同是以有祈榖之郊無日至之郊祈榖于孟春郊而後耕則孟春乃建寅非建子也不敢乘天子玉路又不肯乘同姓金路故乘殷之大路常畫日月天子建之旗畫交龍同姓諸侯建之常十有二旒旗則九旒而已今不敢全用天子之旗故于旗上畫日月之章綴以十有二旒此皆用天子禮而不敢盡同祭統昔者周公旦有勳勞於天下周公既歿成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭外祭則郊社是也疏諸侯常祭惟社稷以下魯之祭社與郊連文則備用天子之禮也程子曰世儒有論魯祀周公以天子之禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公位則為周公之事由其位而能為者乃所當為也子道亦然惟孟子知此義也蓋子之身所能為者皆所當為也禮器魯人將有事於上帝必先有事於頖宫注魯以周公之故得郊祀上帝與周同先有事于頖宮告后稷也告之者將以配天先仁也頖郊之學也詩所謂頖宮也字或為郊宮陳氏曰言祭祀之禮有漸次由卑以達尊者頖宮諸侯之學也魯郊祀以后稷配先于頖宮告后稷然後郊也郊特牲郊之用辛也周之始郊日以至附諸儒辨鄭氏冬至郊天為魯禮郊特牲周之始郊日以至鄭注郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天子圜丘之事是以建子之月郊天示先有事也用辛口者凡為人君當齋戒自新耳周衰禮廢儒者見周禮盡在魯因推魯禮以言周事韣疏知魯禮者以明堂位云魯君孟春乘大輅載弧旗十有二旒日月之章祀帝于郊又雜記云正月日至可以有事于上帝故知冬至郊天魯禮也云三王之郊一用夏正者證明天子之郊必用夏正魯既降下天子不敢郊天與周同月故用建子之月而郊天欲示在天子之先而有事也王氏肅曰郊特牲云周之始郊日以至周禮云冬至祭天於圜丘知圜丘與郊一也言始郊者冬至陽氣初動天之始也對啓蟄又將郊祀故言始孔子家語云定公問孔子郊祀之事孔子對之與此郊特牲文同皆以為天子郊祀之事鄭玄以為迎長日謂夏正也郊天日以至玄以為冬至之日説其長日至於上而妄為之説又徙其始郊日以至於下非其義也玄又云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事若儒者愚人也則不能記斯禮也茍其不愚不得亂於周魯也葉氏夢得曰明堂位曰魯君孟春祀帝于郊配以后稷季夏六月以禘禮祀于太廟鄭氏以孟春為建子之月季夏為建巳之月蓋用周正非也郊特牲曰郊之祭也迎長至之日也又曰郊之用辛也周之始郊日以至鄭氏謂證以易説謂三王之郊一用夏正為建寅之月迎長日為建卯之月晝夜分分而日長以日至為魯禮亦非也左氏謂啓蟄而郊安得孟春為建子孟春為建寅則所謂季夏六月者建未之月也郊特牲以郊為迎長日之至下言郊之用辛周之始郊日以至正以别魯禮而鄭氏反之強以建卯為日至甚矣先儒之好誣也雜記曰孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也蓋謂魯不得郊日至故仲孫蔑欲取建未夏至而禘以配周郊祖所以記其失何與六月之禘乎凡周之政事大抵皆用夏正蓋天時有不可亂故周官每以正歲别之易説言三王之郊一用夏正為建寅亦無據鄭氏取以為證徒以成其説爾鄭氏本不曉郊禘之辨故以冬至之祭為大禘以祈榖為正郊此其言所以紛紛雖詩之雍與長發亦豈得其正也蕙田案周之始郊日以至先儒謂周之始郊冬至適以辛日故後遂用辛愚謂此正言周以别於魯也言魯郊之所以用辛者以周先王創制祀典其冬至始郊天之日適遇辛日故魯僣郊不敢同于日至而用辛日此葉石林所謂正以别魯而鄭氏反之者也附辨鄭王魯一郊二郊不同郊特牲孔疏魯之郊祭師説不同崔氏皇氏用王肅之説以魯冬至郊天至建寅之月又郊以祈榖故左傳云啓蟄而郊又云郊祀后稷以祈農事是二郊也若依鄭康成之説則異于此也魯惟一郊不與天子郊天同月轉卜三正故榖梁傳云魯以十二月下辛卜正月上辛若不從則以正月下辛卜二月上辛若不從則以二月下辛卜三月上辛若不從則止故聖證論馬昭以榖梁傳以答王肅之難是魯一郊則止或用建子之月郊則此日以至及宣三年正月郊牛之口傷是也或用建寅之月則春秋左傳云郊祀后稷以祈農事是也但春秋魯禮也無建丑之月耳若杜預不信禮記不取公羊榖梁魯惟有建寅郊天及龍見而雩蕙田案魯無冬至之郊而有祈榖之郊謂魯止一郊可也而鄭以為冬至一郊則非也魯有祈榖祭又有雩祭謂魯二祭天可也而王以為冬至既郊建寅之月又郊則非也雜記孟獻子曰正月日至可以有事於上帝注魯以周公之故得以正月日至之後郊天亦以始祖后稷配之周疏正月周正建子之月也日至冬至也有事謂南郊以十一月為正蕙田案此條與左傳獻子之言不合詳見前左傳注疏又案春秋止僖八年書七月禘至宣九年獻子始見經故云獻子之時不書七月禘要之雜記所記乃譏獻子變魯禮之由或當時暫行之而不恆行或獻子曽有是言而魯未之行未可定也存疑以俟考哀公十三年左氏傳景伯謂太宰曰魯將以十月上辛有事于上帝先王季辛而畢何世有職焉注有職于祭事疏七月辛丑盟囚景伯以還今景伯稱十月當謂周之十月周之十月非祭上帝先公之時且祭禮終朝而畢無上辛盡于季辛之事景伯以吳信鬼皆虛言以恐吳耳蕙田案十月非郊帝之時上辛季辛兼先王言之亦未是注疏已非之固不可為典要也禮記禮運孔子曰我觀周道幽厲傷之魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也注非猶失也周公道衰言魯子孫不能奉行興之也天子之事守言先祖法廣子孫所當守也孫疏杞郊禹宋郊契蓋是夏殷天子之事杞宋是其子當保守案祭法夏郊鯀殷郊冥與此異者以鯀冥德薄故更郊禹契蓋時王所命也蕙田案夏殷禘郊祖宗之制詳見祭法後世何自變更疏云時王所命蓋臆説耳玩此節文義蓋為杞宋之郊由禹契有大功而有天下二國實承其後故得修其法守以見周公雖有大功而不有天下魯不得援二王之後為比非謂杞宋之郊改用禹契配也左傳載晉侯祀鯀之事仍曰夏郊則郊鯀之制時王未之有改斯足證疏説之誤矣魏書房景先五經疑問問公羊傳王者之後郊天曰神不謬享帝無妄尊介丘偏祀猶不歆季氏之旅昊天至重豈可納廢饗之虔唐虞已往事無斯典三后已降始見其文揖讓之胄禮不上通昏愈後燼四圭是主此便至道相承乾無二統純風既詖元牡肆尊禮不虛革庶昭義問附諸儒論魯僣郊始末程子曰説者以為周公能為人臣所不能為之功故得用人臣不得用之禮夫人臣豈有不能為之功哉使功業過於周公亦人臣所當為之天下之事非人臣為之而誰為之成王之賜伯禽之受皆非也張子曰魯用天子之禮樂必是成王之意不敢臣周公即以二王之後待魯然而非周公本意也以成王尊德樂道之心則善矣伯禽不當受故曰魯之郊禘非禮也周公其衰者謂周公必不享其祀羅泌路史董子之説曰成王之使魯郊蓋報德之禮也然則仲舒亦以為成王之與之矣是不然禮之有天子諸侯自伏羲以來未之改也成王周之顯王也蓋亦謹于禮矣而且亂之則成王其惑矣此劉原父所以謂使魯郊者必非周成王蓋平王以下固亦未之悉爾始魯惠公使宰讓請郊廟之禮于天子桓王使史角往惠公止之其後在魯于是有墨翟之學魯之用郊正亦始于此矣夫魯惠公之止之則是周不與之矣不與而魯用郊自用之也昔有荆人請大號者周人不許荆人稱之然則魯之郊禘可知矣兩觀大輅萬舞冕璪有不自于兹乎使成王巳與魯則惠公不請矣陳氏曰諸侯之有郊禘東遷之僣禮也故曰秦襄王始稱諸侯作西畤祀白帝僣端見矣位在藩臣而臚于郊祀君子懼馬平王以前未之有也記禮者以為成王賜之以康周公案衛祝鮀之言曰周公相王室以尹天下于周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷民六族以昭周公之德豫之土田陪敦祝宗卜史備物典册官司彛器則成王命魯不過如此隱公考仲子之宮問羽數于衆仲周公閲來聘饗有昌歜白黑形鹽周公以為備物辭不敢受衛寧武子來聘燕之賦湛露及彤弓武子不答賦曰諸侯朝正于王于是賦湛露諸侯敵王所愾而獻其功于是乎賜之彤弓假如記禮之言得用郊禘兼四代服器官祝鮀不應不及况魯行天子之禮久矣隱公何以始問羽數閲何以辭備物之享寧武子何以致譏于湛露彤弓乎以見魯僣未久上自天子之宰至于兄弟之國之卿苟有識者皆疑怪遜謝而魯人並無一語及于成王之睗以自解文獻通考蔣氏曰魯不得用天子禮樂是成王過賜而伯禽受之非也夫以伯禽受之為非而成王之時禮典未壞固不應有是過賜之事説者又從而為之説曰賜非成王是周之末王賜之也昔者魯惠公使宰請郊廟之禮于天子天子使史角往止之使成王之世而魯巳郊則惠公奚請惠公之請殆由平王以下也是説然矣自今言之聖人觀周道而傷幽厲論郊禘而衰周公則重祭賜魯豈盛時賢君事其出于衰世天子諸侯無疑也故聖人耻魯之事而􅤾及杞宋之郊杞之郊也存禹後也宋之郊也存商後也是宜以禹契而配天周祀未絶魯以周公配天于周公能無愧于后稷太王王季文王乎馬氏端臨曰案先儒論魯郊祀之非其論正矣然遂以為非出於成王之命特漢儒見春秋所書魯祭祀多僣天子之禮始妄設周賜禮樂之説至蔣氏遂直以為出於惠公之請則愚未敢以為然蓋春秋之際雖諸侯不無上僣然苟非如楚及吳越之流介處蠻貊自放於禮義之外者則亦不敢奄然以天子之制自居雖以五伯盛時晉侯之請隧楚子之問鼎如襄王及王孫滿尚能引正義以責之不聞晉楚之君遽至於用隧而求鼎也僣郊之事大於請隧問鼎矣惠公當平王之時王室雖弱其陵夷不至於後來之甚魯又素為秉周禮之國夫子嘗稱其一變可以至道孰謂惠公於是時而敢以僣郊為請王使史角止之而不從魯由此而僣郊則惠公之暴橫無君過於晉文楚莊矣決不然也橫渠以為成王之意不敢臣周公故以二王之後待魯而命以禮樂特伯禽不當受此説得之又曰夫所謂祀周公以天子之禮樂者如樂用宮懸舞用八佾以天子所以祭其祖者用之於周公之廟謂之尊周公可也至於郊祀后稷以配天禘其祖之所自出而以其始祖配之則非諸侯之所當僣且郊禘所祀未嘗及周公則何名為報周公之勳勞而尊之乎以其祖宗之勳勞而許其子孫僣天子之禮樂以祭之已非矣况所祀者乃天子之太祖而本非有勳勞之臣乎不知成王何名而賜之伯禽又何名而受之孔子曰杞之郊也禹也宋之郊也契也是天子之事守也愚嘗因是而考論之禮制之陵夷非一朝一夕之故其所由來者漸矣蓋周之封杞宋也以其為二王之後俾之修其禮物作賔於王家以奉禹契之祀而禹契天子之祖也不可以諸侯之太祖祀之故許其用天子之禮然特許其用天子之禮祀禹契之廟未必許其郊天也夷王以下君弱臣強上陵下僣杞宋因其用天子之禮樂於禹契之廟而禹契則配天之祖也遂併僣行郊祀上帝之禮焉此夫子所以有天子之事守之嘆也至於魯則周公本非配天之祖而稷嚳之祀元未嘗廢無假於魯之郊禘也乃因其可以用天子之禮樂於周公之廟而併效杞宋之尤則不類甚矣明堂位首言命魯公世世祀周公以天子之禮樂又云季夏六月以禘禮祀周公於太廟牲用白牡犧象云云即此二言觀之可見當時止許其用郊禘之禮樂以祀周公未嘗許其遂行郊禘之祀後來乃至於禘嚳郊稷祀天配祖一一用天子之制所謂穿窬不戢遂至斬關作俑不止遂至用人亦始謀之未善有以肇之也左傳宋公享晉侯於楚丘請以桑林荀罃辭荀偃士丐曰諸侯魯宋於是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎乃知魯宋不特僣天子之禮樂以祀郊禘雖燕享賓客亦用之矣楊氏慎曰成王命君陳拳拳以遵周公之猷訓為言猷訓之大無大於上下之分豈其命伯禽而首廢之哉且襄王之世衰亦極矣猶不許晉文公之請隧而謂成王不如襄王乎况伯禽之賢雖不如周公然賢于晉文公逺矣豈肯受之哉禮又曰成王康王賜魯重祭成王既賜康王又何加焉此蓋不能自掩其偽矣然則魯之僣禮何始也曰著在春秋與魯頌春秋桓公五年書大雩雩之僣始于桓也閏二年書曰禘於莊公禘之僣始于閔也僖三十一年書曰四卜郊郊之僣始于僖也魯頌閔宮三章首言乃命魯公俾侯于東錫之山川土田附庸無異典也其下乃言周公之孫莊公之子以及于享祀不忒皇皇后帝皇祖后稷蓋魯自伯禽而下十有八世自僖公始有郊祀而詩人頌之則其不出于成王之賜益明矣魯之君臣恐天下議已乃借名于成王伯禽以掩天下之口魯之陋儒諂佞遂作明堂位以文其過甚矣其無忌憚也何氏楷世本古義愚案平王使史角如魯諭止郊廟之禮事見竹書在平王四十二年與呂氏春秋言魯惠公請郊廟之禮于周天子使史角往報之者其事相合然則在平王之世魯實未嘗郊觀夫子作春秋始于隱公歷桓莊閔三君未有以郊書者及僖三十一年始書夏四月四卜郊不從乃免牲猶三望而魯頌亦頌僖之郊然則郊之自僖始此大據也夫自惠隱而下皆未敢用郊而僖何以敢創為之蓋嘗思之而得其故駉序云僖公能遵伯禽之法魯人尊之于是季孫行父請命于周而史克作是頌孔氏但見行父于文六年始見春秋而史克于文十八年始見左傳則以為皆文公時人而不知僖文相去甚近行父之父季友卒于僖之十六年行父為魯世卿雖幼當即嗣其位且僖在位三十三年而卜郊尚在三十一年意先是行父必曽請命于周而周天子許之故僖于是始郊而史克為之作頌序所謂請命作頌者正指郊而言而左傳偶軼其事正賴有此序以補其闕亦一快也又案孔穎達著左傳正義于隱元年春王正月傳下有云魯僖公之時周王嵗二月東巡狩至于岱宗柴季孫行父為之請于周太史克為之作頌孔之此説必有所本今考僖公之時在周則惠王襄王而二王俱未嘗東巡唯僖公二十八年襄王有狩于河陽之事而僖公常朝于王所正在春秋書魯四卜郊之先乃始恍然悟曰行父之請在此時也以僖公數從伯討遂為望國又謹守臣節再朝王所當亦襄王所心嘉者故攀伯得文請隧之後因緣惠公前朝之請且小變其説曰我不敢求長至之郊以上擬于天子但期得行祈穀之郊略表異于諸國而已宜襄王之重違其意而遂曲徇之也然則謂魯郊始于僖公信矣蕙田案先儒論魯僣郊義理之正無如程子張子考訂證據以羅氏陳氏蔣氏馬氏楊氏何氏為最今以禮運之文繹之則末世僣擬之説為近何元子直始僖公之論似更直截通考馬氏尤其斟酌而當于事勢者何則成王命魯世世祀周公以天子之禮樂雖其文出於戴記先儒亦多疑之然如馬氏所云者終不敢謂事之必無蓋報功崇德之意隆非此不足以自愜而不知其為僣端之始基也自幽厲傷周道平王東遷周室衰而天下諸侯之心動矣是以惠公因魯素用天子之禮樂遂有宰讓郊廟之請然王使史角止之亦猶不許晉文請隧之意也蓋是時王室之勢雖弱故府典章未移而諸侯亦無敢有顯然上干王章者是以王朝列國之賢公卿大夫如王孫滿拒楚子之問鼎周公閲辭備物之享寧武子不答湛露彤弓蓋猶詞嚴義正其氣足以奪僣姦之魄况魯號稱秉禮周公之澤朱衰而謂惠公竟儼然用天子之郊禘尚有所不敢也此郊禘非禮所以孔子有周公其衰之嘆若謂成王之賜伯禽之受即及郊禘尤不然矣是魯之用郊馬氏謂杞宋因天子之後僣用禮樂而遂及于郊祀魯亦因其用天子之禮樂而併效杞宋之尤所謂穿窬不戢遂至斬關作俑不止遂至用人其陵夷蓋非一朝一夕之故此固事勢所必然者故桓五年而書雩矣閔二年而書禘矣至僖公數從伯討遂為望國行父請命于先史克作頌于後至三十一年而卜郊見于春秋閟宫頌及皇祖且為之微辭曰周公之孫莊公之子是明著此禮之始于僖公而僣成之一大證據也不然何以僖公之後書郊不絶而隱桓莊閔及僖三十年以前無一筆及之耶若謂魯郊之僣行之已久視為常事不書惟卜之不從牛之有變及時之大異而後書豈前此卜必獲吉而鼷鼠必不傷牛耶無是理也是魯之僣郊其作俑始于成王其見端由于魯惠其蔑禮成于僖公無可疑矣然猶不敢竟擬天子冬至之祭而用之于祈榖故左氏有啓蟄而郊詩有春秋匪懈榖梁有四月不時之語不敢用日至之日而日必用辛辛必用卜所以榖梁有轉卜三正戴記家語亦有用辛之文紛紛附會易説乃云三王之郊一用夏正而王肅遂謂魯郊有二鄭氏謂圜丘為禘祭孟春為郊祭天子郊天之大禮為魯禮所亂久在分離膠轕之中矣今從先儒之説以魯郊附入祈榖之後而復申魯僣郊之本末如此宗元案魯用天子禮樂程子論固嚴正要以張子之説為平允蓋成王之賜在周公沒身而後則生時未嘗用之也周公大聖實百世師表成王尊師崇聖之心特加隆於身後以彰其德豈不為善如孔子布衣至今得用天子禮樂咸以為宜則成王之賜不為非禮即伯禽遵君命而受之亦不為過也惟後世遍及於羣廟且魯君亦居然用之則僣越耳且所謂天子禮樂者不過如籩用十二舞用八佾之類非許其郊天大禘直齊於天子也孔子嘆周公其衰者亦專指魯之郊禘言之可知成王所賜者尚於周公之典未衰也或者并謂成王初未嘗賜乃魯人之矯托而非實事則未免臆度矣馬貴與所論極得情理之安而楊升庵何元子更證以春秋及魯頌而斷為魯之郊禘自僖始尤為今收昔遁矣乎右經傳論魯郊漢書成帝本紀建始二年正月辛巳上始郊祀長安南郊蕙田案圜丘正祭以冬至不以辛孟春郊天用辛祈榖禮也然漢止此一郊祀並不分圜丘祈榖南齊書武帝本紀永明元年春正月辛亥車駕祀南郊大赦改元禮志武帝永明元年尚書令王儉啓案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易説三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭玄云建寅之月晝夜分而日長矣王肅曰周以冬祭天子圜丘于正月又祭天以祈榖祭法稱燔柴太壇則圜丘也春秋傳云啓蟄而郊則祈榖也謹尋禮傳二文各有其義盧王兩説有若合符蕙田案此條論先郊後春已見圜丘門今取其論祈榖數語附見于此文獻通考梁武帝即位歲正月皇帝致齋于萬壽殿上辛行事隋書禮儀志梁武帝天監三年左丞吳操之啓稱傳云啓蟄而郊郊應在立春後尚書左丞何佟之議今之郊祭是報昔歲之功而祈今年之福故取嵗首上辛不拘立春先後周之冬至圜丘大報天也夏正又郊以祈農事故有啓蟄之説自晉太始二年并圜丘方澤同于二郊是知今之郊禋禮兼祈報不得限以一途也帝曰圜丘自是祭天先農即是祈榖但就陽之位故在郊也冬至之夜陽氣始于甲子既祭昊天宜在冬至祈榖時可依古必須啓蟄在一郊壇分為二祭自是冬至謂之祀天啓蟄名為祈榖蕙田案祈榖之祭三代以後不行久矣西漢五畤泰畤天帝莫分正祭尚未舉行何有于祈祭成帝雖作長安南北郊旋廢旋復卒改合祭後漢正月祭南郊時用孟春却是正祭魏氏相沿晉武帝泰始二年并圜丘方丘于南北郊二至之祀合于二郊齊王儉所云義在報天事兼祈榖既不全以祈農何必俟夫啓蟄則究為祀天之正祭特以其用正月故曰事兼祈榖耳實非祈榖也梁武帝云陽氣起于甲子既祭昊天宜在冬至祈榖必須啓蟄自是分為二祭遂為後世祈榖之始梁書武帝本紀天監四年春正月辛亥輿駕親祀南郊赦天下隋書禮儀志天監五年明山賓稱二儀並尊三朝發始同以此日二郊為允梁書武帝本紀天監八年春正月辛巳輿駕親祀南郊十年春正月辛丑輿駕親祀南郊十二年春正月辛卯車駕親祀南郊十四年春正月辛亥輿駕親祀南郊十六年正月辛未輿駕親祀南郊詔曰朕當扆思治政道未明昧旦劬勞亟移星紀今太皥御氣勾芒首節升中就陽禋敬克展務承天休布兹和澤尤貧之家勿收今年三調其無田業者所在量宜賦給若民有産子即依格優蠲孤老鰥寡不能自存咸加賑恤普通二年春正月辛巳輿駕親祀南郊詔曰春司御氣虔恭報祀陶匏克誠蒼璧禮備思隨乾覆布兹亭育夏四月乙卯改作南北郊丙辰詔曰夫欽若昊天歷象無違躬執耒耜盡力致敬上協星鳥俯訓民時平秩東作義不在南前代因襲有乖禮制可于震方簡求沃野具兹千畝庶允舊章蕙田案武帝改祈榖于孟春而本紀親郊皆以正月上辛觀天監十六年普通二年詔明以勾芒首節平秩東作為詞則其為祈榖甚明是當時分冬至孟春為二反以孟春為重也普通四年春正月辛卯親祀南郊大通元年春正月辛未親祀南郊中大通元年春正月辛酉親祀南郊三年春正月辛巳親祀南郊五年春正月辛卯親祀南郊大同三年春正月辛丑親祀南郊五年春正月辛未親祀南郊太清元年春正月辛酉輿駕祀南郊蕙田案梁武帝上辛親祀南郊凡十有五皆祈榖祭因其别無冬至之祭故圜丘門兼録之兹存其略陳代郊祀同陳書髙祖本紀永定二年春正月辛丑親祀南郊文帝本紀天嘉元年春正月辛酉親祀南郊三年春正月辛亥親祀南郊五年春正月辛巳親祀南郊廢帝本紀光大元年春正月辛卯親祀南郊宣帝本紀太建元年春正月辛丑親祀南郊三年春正月辛酉親祀南郊五年春正月辛巳親祀南郊七年春正月辛未親祀南郊蕙田案陳因梁制亦祈榖也隋書禮儀志後齊南北郊則嵗一祀皆以正月上辛南郊為壇于國南廣輪三十六尺髙九尺四面各一陛為三壝內壝去壇二十五步中壝外壝相去如內壝四面各通一門又為大營于外壝之外廣輪二百七十步營塹廣一丈深八尺四面各一門又為燎壇于中壝之外景地廣輪二十七尺髙一尺八寸四面各一陛祀所感帝靈威仰于壇以髙祖神武皇帝配禮用四圭有邸幣各如方色其上帝及配帝各用騂特牲一儀燎同圜丘北齊書武成帝本紀河清元年春正月乙亥車駕至自晉陽辛巳祀南郊北周孝閔帝本紀元年春正月辛亥祀南郊武帝本紀保定元年春正月甲寅祀感生帝于南郊大和元年三月丙午祀南郊二年春正月初立郊丘壇壝制度南郊為壇于國南五里其崇一丈二尺其廣四丈其壝方一百二十步內壝半之其祭南郊用正月上辛以始祖獻侯莫那配所感帝靈威仰于其上三年春正月辛丑祀南郊建德二年辛丑祀南郊隋書禮儀志髙祖受命議定祀典南郊為壇于國之南太陽門外道西一里去宮十里壇髙七尺廣四尺孟春上辛祀所感帝赤熛怒于其上以太祖武元皇帝配其禮四圭有邸牲用騂犢二髙祖本紀開皇四年春正月辛未有事于南郊十三年春正月壬子親祀感生帝蕙田案隋制既有圜丘復有南郊祀所感帝從鄭氏説也凡屬孟春親祀者為祈榖無疑禮儀志煬帝大業元年孟春祀感帝改以髙祖文帝配舊唐書禮儀志髙祖武德初定令孟春辛日祈榖祭感帝于南郊元帝配用蒼犢二文獻通考髙宗顯慶二年詔南郊祈榖祭昊天上帝罷感帝祠唐書禮樂志髙宗顯慶二年禮部尚書許敬宗與禮官等議曰六天出于緯書而南郊圜丘一也玄以為二物郊及明堂本以祭天而康成皆以為祭太微五帝傳曰凡祀啓蟄而郊郊而後耕故郊祀后稷以祈農事而玄謂周祭蒼帝靈威仰配以后稷因而祈榖皆繆論也由是盡黜玄説而南郊祈榖祭昊天上帝蕭德言傳子子儒字文舉議月令孟春祈榖上帝春秋啓蟄而郊郊而後耕故郊后稷以祈農事春夏祈榖于上帝皆祭天也著之感帝尤為不稽請郊明堂罷六天説止祀昊天詔曰可蕙田案顯慶罷感帝之議乃出于許敬宗是以君子不以人廢言也及閲列傳乃蕭子儒議爾唐書禮樂志乾封元年詔祈榖復祀感帝舊唐書禮儀志乾封初詔依舊祀感帝司禮少常伯郝處俊等奏曰顯慶新禮廢感帝之祀後為祈榖祀昊天上帝以髙祖太武皇帝配檢舊禮感帝以世祖元皇帝配今既奉敕依舊祭感帝今改祈榖為感帝以髙祖配者髙祖依新禮見配圜丘昊天上帝若更配感帝便恐有乖古禮案禮記周人禘嚳而郊稷之義今若禘郊一祖同配恐無所據從之蕙田案顯慶時黜康成説罷感帝祠善矣乾封時乃又復之鄭氏之學中于人心者如此唐書禮樂志開元中起居舍人王仲丘議曰案貞觀禮祈榖祀感帝而顯慶禮祀昊天上帝傳曰郊而後耕詩曰噫嘻春夏祈榖于上帝禮記亦曰上辛祈榖于上帝而鄭玄乃云天之五帝迭王王者之興必感其一因别祭尊之故夏正之月祭其所生之帝于南郊以其祖配之故周祭靈威仰以后稷配因以祈榖然則祈榖非祭之本意乃因后稷為配爾此非祈榖之本義也夫祈榖本以祭天也然五帝者五行之精所以生九榖也宜于祈榖祭昊天而兼祭五帝王仲丘傳開元中上言貞觀禮正月上辛祀感帝于南郊顯慶禮祀昊天上帝于圜丘以祈榖臣謂詩春夏祈榖于上帝禮上辛祈榖于上帝則上帝當昊天矣鄭玄曰天之五帝遞王王者必感一以興故夏正月祭所生于郊以其祖配之因以祈榖感帝之祀貞觀用之矣請因祈榖之壇偏祭五方帝五帝者五行之精九榖之宗也請二禮皆用詔可蕙田案王仲丘二禮皆用之説非是册府元龜開元八年三月敕頃嵗未登水旱不節今春事方起農桑是憂祈于上玄福兹下土或展郊禋之禮以申誠請之心宜令左常侍元行沖攝侍中祀南郊舊唐書禮儀志開元二十年改撰新禮祀天一嵗有四正月上辛祈榖祀昊天上帝于圜丘以髙祖配五方帝從祀其上帝配帝籩豆等同冬至之數五方帝太樽著樽犧樽山罍各一籩豆等亦同冬至之數蕙田案開元禮皇帝正月上辛祈榖儀附詳圜丘祀天門舊唐書玄宗紀天寶六載正月戊子親祀圜丘禮畢大赦天下唐書德宗本紀建中元年春正月辛未有事于南郊大赦憲宗本紀元和二年正月辛卯有事于南郊大赦舊唐書憲宗本紀元和二年正月巳丑朔上親獻太清宮太廟辛卯祀昊天上帝于郊丘是日還宮御丹鳳樓大赦天下先是將及大禮陰晦浹旬宰臣請改日上曰郊廟事重齋戒有日不可遽更享獻之辰景物晴霽人情欣悅禮儀志元和十五年十二月將有事于南郊穆宗問禮官南郊卜日否禮院奏伏凖禮令祠祭皆卜自天寶已後凡欲郊祀必先朝太清宮次日饗太廟又次日祀南郊相循至今並不卜日從之及明年正月南郊禮畢有司不設御榻上立受羣臣慶賀及御樓仗退百寮復不于樓前賀乃受賀于興慶宮二者闕禮有司之過也唐書穆宗本紀長慶元年正月辛丑有事于南郊大赦改元舊唐書穆宗本紀長慶元年正月巳亥朔上親薦獻太清宮太廟是日法駕赴南郊日抱珥宰臣賀于前辛丑祀昊天上帝于圜丘即日還宮御丹鳳樓大赦天下改元長慶內外文武及致仕官三品巳上賜爵一級四品巳下加一階陪位白身人賜勳兩轉應緣大禮移仗宿衛御樓兵仗將士普恩之外賜勳階有差仍準舊例賜錢物二十萬四千九百六十端匹禮畢羣臣于樓前稱賀仗退上朝太后于興慶宮唐書敬宗本紀寶歷元年春正月辛亥有事于南郊武宗本紀會昌元年春正月辛巳有事于南郊大赦改元五年正月辛亥有事于南郊大赦作仙臺于南郊宣宗本紀大中元年正月甲寅有事于南郊大赦改元七年春正月戊申有事于南郊大赦懿宗本紀咸通四年春正月庚午有事于南郊僖宗本紀乾符二年春正月辛卯有事于南郊蕙田案唐帝親郊以十一月正月相間而行十一月圜丘正月祈榖也以前諸帝十一月之祭多于正月以後諸帝則唯正月為多其亦憚寒而畏勞耶今以正月之祭入祈榖圜丘門不載舊唐書音樂志正月上辛祈榖于南郊樂章八首貞觀中褚亮作今行用降神用豫和詞同冬至圜丘皇帝行用太和詞同冬至圜丘登歌奠玉帛用肅和貞觀禮祠感帝用此詞明慶以後詞同冬至圜丘履艮斯繩居中體正龍運垂祉昭符啓聖式事嚴禋聿懷嘉慶惟帝永錫時皇休命迎爼用雍和殷薦乘春太壇臨曙八簋盈和六瑚登御嘉稷匪歆德馨斯飫祝嘏無易靈心有豫皇帝酌獻飲福酒用壽和詞同冬至圜丘送文舞出迎武舞入用舒和玉帛犧牲申敬享金絲鏚羽盛音容庶俾億齡提景福長欣萬宇洽時雍武舞用凱安詞同冬至圜丘送神用豫和詞同冬至圜丘五代史梁本紀開平三年春正月辛卯有事于南郊册府元龜乾化二年正月庚辰有司以南郊上辛祈榖命丞相趙光逢攝太尉行事宋史禮志乾德二年正月有司言上辛祀昊天上帝五方帝從祀今既奉赤帝為感生帝一日之內兩處俱祀似為煩數况同時並祀在禮非宜昊天從祀請不設赤帝坐從之雍熙四年禮儀使蘇易簡言常祀祈榖以宣祖崇配至道三年十一月有司言上辛祈榖奉太祖配上辛祀感生帝奉宣祖配蕙田案此又以祈榖與祭感帝為二蓋祈榖亦祀昊天上帝也淳化至道太宗亦以正月躬行祈榖之祀悉如圜丘之禮真宗景德三年龍圖閣待制陳彭年言伏睹畫日來年正月三日上辛祈榖至十日始立春案月令正月元日注為祈榖郊祀昊天上帝春秋傳曰啓蟄而郊郊而後耕蓋春氣初至農事方興郊祀昊天以祈嘉榖故當在建寅之月迎春之後自晉太始二年始用上辛不擇立春之先後齊永明元年立春前郊議欲遷日王儉曰宋景平元年元嘉六年並立春前郊遂不遷日吳操之云應在立春後然則左氏所記乃三代彛章王儉所言乃後世變禮來年正月十日立春三日祈榖斯則襲王儉之末議違左氏之明文望以立春後上辛行祈榖禮因詔有司詳定諸祠祭祀天禧元年十二月禮儀院言凖畫日來年正月十七日祈榖前二日奏告太祖室緣嵗以正月十五日朝拜玉清昭應宫景德四年以前祈榖止用上辛其後用立春後辛日蓋當時未有朝拜宫觀禮王儉啓云近代明例不以先郊後春為嫌又宋武朝有司奏魏代郊天值雨更用後辛或正月上辛事有相妨並許互用在于禮典固亦無嫌初祈榖皆親祀上帝由熙寧迄靖康惟有司攝事而已乾興元年禮官請孟春上辛祈榖以太祖配奏可仁宗景祐二年十一月禮院言祈榖配以太宗樂志景祐上辛祈榖仁宗御製二首太宗配位奠幣仁安天祚有開文德來逺祈榖日辛侑神禮展酌獻紹安於穆神宗惟皇求命薦醴六尊聲歌于詠禮志慶歷三年禮官余靖言祈榖祀感生帝同日其禮當異不可皆用四圭有邸色尚赤乃定祈榖蒼璧尺三寸感生帝四圭有邸文獻通考英宗治平二年正月上辛祈榖慶歷用犢一羊二豕二正配簠簋爼各增為二前一日太祝讀祝視祭玉餘如冬至攝事三獻終禮生引司天監罍洗升詣四方帝神位上香奠幣爵并行一獻冉拜復元豐中禮官言慶歷大雩宗祀之儀皆用犢羊豕各一惟祈榖均祀昊天上帝止用犢一請依雩祀大享明堂牲牢儀用犢羊豕各一宋史禮志神宗元豐四年十月詳定郊廟奉祀禮文所言近詔宗祀明堂以配上帝其餘從祀羣神悉罷今祈榖猶循舊制皆羣神從祀恐與詔旨相戾請孟春祈榖唯祀上帝以太宗皇帝配餘從祀羣神悉罷從之大觀四年二月禮局議以立春後上辛祈榖詔以今嵗孟春上辛在丑次辛在亥遇丑不祈而祈于亥非禮也乃不果行徽宗本紀大觀四年四月立感生帝壇政和祈榖儀前期降御札以來年正月上辛祈榖祀上帝前祀十日太宰讀誓于朝堂刑部尚書涖之少宰讀誓于太廟齋房刑部侍郎涖之皇帝散齋七日致齋三日前祀一日服通天冠絳紗袍乘玉輅詣青城祀日自齋殿服通天冠絳紗袍乘輿至大次服衮冕執圭入正門宮架儀安之樂作禮儀使奏請行事宮架作景安之樂帝臨降康之舞六成止太常升煙禮儀使奏請再拜盥洗升壇上登歌嘉安之樂作皇帝搢大圭執鎮圭詣上帝神位前北向奠鎮圭于繅藉執大圭俯伏興又奏請搢大圭跪受玉幣奠訖詣太宗神位前東向奠幣如上儀登歌作仁安之樂皇帝降階有司進熟禮儀使奏請執大圭升壇登歌歆安之樂作皇帝詣上帝神位前酌獻執爵祭酒讀册文訖奏請皇帝再拜詣太宗神位前酌獻並如上儀登歌紹安之樂作皇帝降階入小次文舞退武舞進宫架容安之樂作亞獻酌獻宫架作隆安之樂神保錫羡之舞終獻如之禮儀使奏請皇帝詣飲福位宫架禧安之樂作皇帝受爵又請再拜有司徹爼登歌成安之樂作送神宫架景安之樂作皇帝詣望燎位禮畢還大次圖書集成紹興十四年祈榖始具樂舞用政和儀宋史禮志南渡以後四祀二在南郊圓壇二在城西惠照院齋宫紹興十四年始具樂舞用政和儀增籩豆之數宋之祀天者凡四孟春祈榖孟夏大雩皆于圜丘或别立壇季秋大享明堂唯冬至之郊則三嵗一舉合祭天地焉樂志紹興祈榖三首降神盥洗升壇還位及上帝奠玉幣奉爼並同圜丘太宗位奠幣宗安於穆思文克配上帝涓選休成遵揚嚴衛祗薦明誠肅陳量幣享兹吉蠲申錫來裔上帝位酌獻嘉安三陽肇新萬物資始精誠祈天其聽斯邇願均雨㿩田疇之喜如坻如京以備百禮太宗位酌獻德安天錫勇智允惟太宗功隆德盛與帝比崇禮嚴陟配誠達精衷尚其錫祉嵗以屢豐明史禮志祈榖明初未嘗行世宗時更定二祖分配禮因諸臣固請乃許于大祀殿祈榖奉二祖配嘉靖十年始以孟春上辛日行祈榖禮于大祀殿禮畢帝心終以為未當諭張璁曰自古唯以祖配天今二祖並配決不可法後世嗣後大報與祈榖但奉太祖配尋親製祝文更定儀注改用驚蟄節禮視大祀少殺帛減十一不設從壇不燔柴著為定式祈榖壇大享殿即大祀殿也永樂十八年建合祀天地于此其制十二楹中四楹飾以金餘施三采正中作石臺設上帝皇地祗神座于其上殿前為東西廡三十二楹正南為大祀門六楹接以步廡與殿廡通殿後為庫六楹以貯神御之物名曰天庫皆覆以黃琉璃其後大祀殿易以青琉璃瓦壇之後樹以松柏外壝東南鑿池凡二十區冬月伐冰藏凌隂以供夏秋祭祀之用悉如太祖舊制至嘉靖二十一年撤大祀殿擬古明堂名曰大享每春行祈榖禮隆慶元年禮官言先農之祭即祈榖遺意宜罷祈榖于先農壇行事大享禮亦宜罷詔可後至崇禎朝復舉行王圻續通考嘉靖十年定祈榖禮一前期五日上詣犧牲所視牲先一日告廟及還參拜俱如大祀之儀告詞曰明日恭視祈榖牲儀參辭次日視牲還以後命大臣輪視如常儀一前期四日太常寺奏祭祀諭百官致齋三日上親填告請太祖祝版于文華殿一前期三日上詣太廟請太祖配神以脯醢酒果行再拜一獻禮祝文曰維嘉靖某年嵗某甲子某月某朔某日孝元孫嗣皇帝某敢昭告于皇祖太祖髙皇帝曰兹以今月某日啓蟄之辰恭祀上帝于圜丘為民祈榖謹請皇帝侑神伏惟鑒知一前期二日太常卿同光祿卿奏省牲如常儀一前期一日上親填祝版于文華殿遂告于廟告辭曰孝元孫嗣皇帝某明日祗詣南郊行祈榖禮謹詣祖宗列聖帝后神位前恭預告知夜二鼓禮部尚書侍郎導引太常卿捧請神版奉安于壇位俱如大祀之儀一陳設上帝位犢一玉用蒼璧一帛一青色登一簠簋各二籩十二豆十二蒼玉爵三酒尊三篚一祝案一配帝位同唯不用玉一正祭是日上常服乘輿至昭亨門右上降輿導引官導上至大次具祭服出由左門入至陛上行祭禮如大祀之儀惟不燔柴上還至廟參拜致辭曰孝元孫嗣皇帝某祇詣南郊祈榖禮成躬詣祖宗列聖帝后神位前謹用參拜畢還宮一祝文維嘉靖某年某月某日嗣天子臣某祇告于皇天上帝曰候維啓蟄農事將舉爰以兹辰敬祈洪造謹率臣僚以玉幣犧齊粢盛庶品備斯明潔恭祀上帝于圜丘仰希垂鑒錫福蒸民俾五榖以皆登普萬方之咸賴奉太祖聖神文武欽明啓運峻德成功統天大孝髙皇帝侑神尚享明史樂志嘉靖十年定祈榖樂章迎神中和之曲臣惟穹昊兮民物之初為民請命兮祀禮昭諸備筵率職兮祈洪庥臣衷微渺兮悃懇誠攄遙瞻駕降兮霽色輝歡迎鼓兮迓龍輿臣愧菲才兮后斯民願福斯民兮聖恩渠奠玉幣肅和之曲蒸民勤職兮農事顓蠶工亦慎兮固桑阡玉帛祇奉兮暨豆籩仰祈大化兮錫以豐年進爼咸和之曲鼎烹兮氣馨香羞兮旨醽帝垂享兮以歆蒸民蒙福兮以寧初獻壽和之曲禮嚴兮初獻行百職趨蹌兮珮琤鳴臣謹進兮玉觥帝心歆鑒兮嵗豐亨亞獻景和之曲二觴舉兮致虔清醴載斟兮奉前仰音容兮欣穆臣感聖恩兮實拳拳終獻永和之曲三獻兮一誠微禋禮告成兮帝鑒是依蒸民沐德兮嵗豐禨臣拜首兮竭誠祈徹饌凝和之曲三獻周兮肅乃儀爼豆敬徹兮弗敢遲願留福兮丕而曰雨曰暘兮若時送神清和之曲祀禮告備兮帝鑒彰臣情上達兮感昊蒼雲程肅駕兮返帝鄉臣荷恩眷兮何以忘祥風瑞靄兮彌壇壝蒸民率土兮悉獲豐康望燎太和之曲遙睹兮天衢長邈彼寥廓兮去上方束帛薦火兮升聞悃愊通兮沛澤長樂終九奏兮神人以和臣同率土兮感荷恩光世宗本紀嘉靖十一年春正月辛未祈榖于圜丘始命武定侯郭勛攝事禮志十一年驚蟄節帝疾不能親乃命武定侯郭勛代給事中葉洪言祈榖大報祀名不同郊天一也祖宗無不親郊成化𢎞治間或有故寧展至三月蓋以郊祀禮重不宜攝以人臣請俟聖躬痊改卜吉日行禮不從十七年春正月壬寅帝祈榖于大祀殿十八年改行于大內之元極寶殿不奉配遂為定制隆慶元年禮臣言先農親祭遂耕藉田即祈榖遺意今二祀並行于春未免煩數且元極寶殿在禁地百官陪祀出入非便宜罷祈榖止先農壇行事從之莊烈帝本紀崇禎十四年春正月辛巳祈榖于南郊春明夢餘録祈榖用孟春上辛禮也明初用二月上戊祭先農不行祈榖即嘉靖亦一再舉而罷崇禎辛巳年正月初五日上辛復舉行有旨祈榖除不散齋不出宿于郊齋宮不朝亥時正三刻止升一燈外其恭視壇位籩豆牲隻如圜丘儀行奏祭著改于正月初一日樂章奏舞命太常寺勤督樂舞生預為演習十五年正月行祈榖禮上辛即在朔日辛未禮部以朝賀不便疏請改十一日辛巳為中辛得旨改中辛日行禮崇禎壬午蔣德璟上親行祈榖禮記壬午正月初五日上常服詣太廟以親詣南郊視牲預告于太祖及列祖神御前仍欽遣禮部左侍郎王錫衮右侍郎蔣德璟詹事黃景昉充上香導引官初六日遣勛臣等恭代視牲初七日上御皇極殿太常寺奏祭祀初八日為始致齋三日初八日質明上常服乘輿詣太廟門西降輿至廟門幄次內具祭服詣太廟告請太祖配神行禮畢出至幄次易皮辨服回御皇極殿太常寺光祿寺官奏省牲初九日大雪上親享太廟禮畢臣璟即偕王黃二公冒雪出南郊宿太常别院是日午後太常官捧蒼玉帛匣香盒同神輿亭進于皇極殿內司禮監官捧帛同安設于御案之北初十日質明上御皇極殿太常卿捧祝版從中左門進安于御案上上親填御名訖太常卿捧安于輿中司禮監官進玉帛上親裝于各匣內安訖太常寺官以次奉安輿中太常卿隨捧香盒于香亭右跪上三上香行一拜三叩頭禮畢轉于東西向立錦衣衛官旗入擡輿亭從中門出太常卿隨詣大享殿神庫奉安上遂詣太廟以親詣南郊行祈榖禮預告于太祖及列祖神御前行禮畢還宮是日早璟偕王黃二公及太常少卿髙倬具吉服冒雪至大享殿皇乾殿演禮即在北天門內候駕至未時錦衣衛官備法駕設板輿于皇極門下正中上常服御皇極門太常卿奏請聖駕詣南郊行祈榖禮于大享殿上升輿掌衛官跪奏起輿從午門端門承天門大明門正陽門詣南郊壇內西天門至神路迤西臣璟偕王黃二公及髙少卿靣駕序立行叩頭禮畢分兩旁候上降輿臣璟等導上從大享南門左門入太常卿黨崇雅跪迎同導上至丹陛太常卿導上至大享殿左門入恭視神位臣璟等先詣東陛前候上視神位畢太常卿導上從東陛下臣璟等同導上至神庫視籩豆至神厨視牲太常卿逐一奏畢復同臣璟等導上仍從大享南門出迤西升輿至齋宮陪祀各官免朝參是日雪勢特猛導引往還可數千武而神庫門路甚深滑上亦徐行俯體諸臣便步趨也至一更時臣璟等三人具祭服詣皇乾殿行一拜三叩頭禮王公上香請神璟與黃公導引太常官以次捧昊天上帝正位髙皇帝配位神版詣大享殿奉安訖臣等三人即趨至大次候駕亥時一燈起萬燈齊明燦如列星上常服乘輿冒大雪從齋宮東門出至神路之西降輿導駕官導上至大次德璟三人及太常卿復命上秉圭曰朕知道了少頃具祭服出導駕官導從大享南門左門入行祈榖禮用十二拜如大祀儀祭畢上出至大次易常服不回齋宮即從西天門還至太廟參謁如前儀畢還宮孫承澤曰案月令孟春天子以元日祈榖于上帝注謂以上辛郊祭天春秋傳曰啓蟄而郊郊而後耕郊特牲曰郊用辛注凡為人君當齋戒自新盧植蔡雍曰郊天是陽故用日耕藉是陰故用辰孔頴達曰甲乙丙丁等謂之日子丑寅卯等謂之辰元者善也元日郊用辛元辰耕用亥黃道周曰春日甲乙則未知其果上辛也明初以冬至祀天圜丘夏至祀地方澤洪武十年罷之而止以正月上辛合祀天地于大祀殿并日月星辰山川等神俱在焉其禮甚省其敬甚專嘉靖九年罷之而分為圜丘方澤朝日夕月四郊其大祀殿則以孟春上辛祈榖十年又改啓蟄日祈榖二十四年又改大祀殿為大享殿然祈榖禮不復行崇禎十四年復行祈榖禮用上辛十五年用中辛云蕙田案祈榖之禮見于經傳者惟月令左氏春秋後世祀天祈榖自梁天監始卒復與圜丘之祀相混至宋始分明嘉靖舉之而未能嘗親行也莊烈帝奮然行于國勢艱難之日其亦有不得已于痌瘝者歟右歷代祈榖禮五禮通考卷二十一
