body:
  text: 五禮通考卷二百四十六刑部尚書秦蕙田撰凶禮一荒禮蕙田案隂陽之沴國家代有雖堯湯之世不能無水旱之患所恃者有荒政以濟之爾大宗伯凶禮之目以荒禮次乎䘮禮葢王者視天下猶一家四海之内有匹夫不被其澤者如疾痛疴癢之切身必求所以安全之所謂吉凶與民同患者此也然救之已荒不如備之未荒故備荒之政為先及災傷已成則有檢勘及遣使存恤之令焉大司徒以荒政十二聚萬民條目精詳鉅細畢備後代言救荒者大率不能外是今據以為綱而以史事𩔖附之他如勸分移民通財之法皆見於經傳而可行於後世者故附於十二荒政之後䘏民之要略具於此矣周禮春官大宗伯以荒禮哀凶札注荒人物有害也曲禮曰嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食梁士飲酒不樂札讀為截謂疫癘天官大宰以九式均節財用三曰䘮荒之式注荒凶年也王氏昭禹曰荒之禮有散利施惠以救貧者小宰以官府之六聨合邦治三曰䘮荒之聨事注荒謂年穀不熟王氏昭禹曰大司徒大荒則令邦國移民通財而小行人若國凶荒令賙委之若此𩔖皆荒之聨事春秋襄公二十四年穀梁傳五榖不升為大饑一榖不升謂之嗛注嗛不足貌二榖不升謂之饑三榖不升謂之饉四榖不升謂之康注康虚五榖不升謂之大侵注侵傷大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不制鬼神禱而不祀此大侵之禮也逸周書糴匡解成年年榖足賔祭祭以盛大馴鍾絶服美義淫皂畜約制餘子務藝宫室城郭修為備供有嘉萊於是日滿年儉榖不足賔祭以中盛樂唯鐘鼓不服美三牧五庫補攝凡美不修餘子務穡于是糺秩年饑則勤而不賔舉祭以薄樂無鐘鼓凡美禁書不早羣車不雕攻兵備不制民利不淫征當啇旅以救窮乏聞隨卿下鬻塾分助有匡以綏無者于是救困大荒有禱無祭國不稱樂企不滿壑刑罰不脩舎用振穹君親巡方卿恭告糴餘子倅運開口同食民不藏糧曰有匡禆民畜唯牛羊于民大疾惑殺一人無赦男守疆戎禁不出五庫不膳䘮禮無度察以薄資禮無樂宫不幃嫁娶不以時賔旅設位有賜大匡觧維周王宅程三年遭天之大荒作大匡以詔牧其方三州之侯咸率王乃召冢卿三老三吏大夫百執事之人朝于大庭問罷病之故政事之失刑罰之戾哀樂之尤賔客之盛用度之費及闗市之征山林之匱田宅之荒溝渠之害怠堕之過驕頑之虐水旱之菑曰不榖不徳政事不時國家罷病不能胥匡二三子尚助不榖官考厥職鄉問其人因其耆老及其總害慎問其故無隱乃情及某日以告于廟有不用命有常不赦王既發命入食不舉百官質方囗不食饔及期日質明王麻衣以朝朝中無采衣官考其職鄉問其利因謀其菑旁匡于衆無敢有違詰退驕頑方收不服慎惟怠墯什伍相保動勸㳺居事節時茂農夫任户户盡夫出農廪分鄉鄉命受糧程課物徴躬競比藏藏不粥糴糴不加均賦洒其弊鄉正保貸成年不償信誠匡助以輔殖財財殖足食克賦爲征數口以食食均有賦外食不瞻開闗通糧糧窮不轉孤寡不廢滯不轉留戍城不留囗足以守出旅分均馳車送逝旦夕運糧于是告四方遊旅旁生忻通津濟道宿所至如歸幣租輕乃作母以行其子易資貴賤以均遊旅使無滯無粥熟無室市權内外以立均無蚤暮閭次均行均行衆從積而勿囗以罰助均無使之窮平均無乏利民不淫無播蔬無食種以數度多少省用祈而不賔祭服潄不制車不雕飾人不食肉畜不食榖國不鄉射樂不墻合墻屋有補無作資農不敗務非公卿不賔賔不過具哭不留日登降一等庶人不獨葬伍有植送徃迎來亦如之有不用命有常不違顧氏炎武日知錄大宗伯以凶禮哀邦國之憂其别有五曰死亡凶札禍烖圍敗冦亂是古之所謂凶禮者不但于死亡而五服之外有非䘮之䘮者縁是而起也記曰年不順成天子素服乗素車食無樂又曰年不順成則衣布搢本周書曰大荒王麻衣以朝朝中無綵衣此凶札之服也司服大札大荒大烖素服注曰大烖水火爲害君臣素服縞冠若晋伯宗哭梁山之崩春秋新宫災三日哭此禍烖之服也記曰國亡大縣邑公卿大夫士厭冠哭于太廟又曰軍有憂則素服哭于庫門之外大司馬若師不功則厭而奉主車春秋傳秦穆公敗于殽素服郊次鄉師而哭此圍敗之服也若夫曲禮言大夫士去國素衣素裳素冠徹縁鞮屨素簚乗髦馬孟子言三月無君則弔而季孫之會荀躒練冠麻衣此君臣之不幸而哀之者矣秦穆姫之逆晉侯免服衰絰衛侯之念子鮮税服終身此兄弟之不幸而哀之者矣楚滅江而秦伯降服出次越圍吳而趙孟降于䘮食此與國之不幸而哀之者矣先王制服之方固非一端而已記有之曰無服之䘮以蓄萬邦右荒禮通論禮記王制冢宰制國用必於歳之杪五穀皆入然後制國用注制國用如今度支經用杪末也用地小大視年之豐耗注小國大國豐凶之年各以歳之收入制其用多少多不過禮少有所殺以三十年之通制國用量入以爲出注通三十年之率當有九年之蓄出謂所當給為國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂注菜色食菜之色民無食菜之飢色天子乃日舉以樂侑食馬氏晞孟曰國之所以為國者以有民也民之所以為民者以有財也苟無財則散而之四方矣故曰無三年之蓄非其國也三年耕必有一年之食推而至于二十七年必有九年之食以三十年言之者舉成數也説者以為三十年為一世三年耕必有一年之食至三十年之通此人力也雖有凶旱水溢此天變也人力備則可以應天變蓋王者與民同患故雖有水旱而民無菜色于下然後天子食日舉羞備禮而以樂侑之也應氏鏞曰此非謂水旱亦不廢樂也謂既有三十年通制之規模雖凶灾而民不病則常時可以日舉樂矣蓋雖一飯之頃而不忘乎民也若夫偶值凶年雖有備亦豈敢用樂乎丘氏濬曰國之所以為國者以有民也民之所以為民者以有食也耕雖出于民而食則聚于國方無事之時豊稔之歳民自食其食固無賴于國也不幸而有水旱之災凶荒之歳民之日食不繼所以繼之者國也國又無蓄焉民將何賴哉民之飢餓至于死且散則國空虛矣其何以為國哉是以國無六年九年之蓄雖非完國然猶足以為國也至于無三年之蓄則國非其國矣國非其國非謂無土地也無食以聚民云爾是以三年耕必餘一年食九年耕必餘三年食以至三十年之久其餘至于十年之多則國無不足之患民有有餘之食一遇凶荒民有所恃而不散有所食而不死而國本安固矣雖然為治者非不欲蓄積以備凶歉也然而一歳之所出僅足以給一歳之所費奈何曰數口之家十金之産苟有智慮者尚能營為以度日積聚以偹患况有天下之大四海之富者哉蕙田案荒禮救於已荒之日不若備於未荒之時備荒之法重農桑崇節儉修水利廣開墾皆其事矣而積貯者生民之大命古人設常平義倉以爲水旱災歉之備後之言備荒者莫不由此故以爲荒禮之首焉觀承案堯湯水旱聖世難免此司徒佐王安擾萬民而荒政十有二反居保息六本俗六之先也然非以三十年之通制國用雖欲有九年之蓄安可得哉若至凶荒而始行十二政亦何以爲資也故冢宰制國用量入以爲出尤爲安擾萬民之本而地官所以亦統於天官也歟漢書食貨志李悝爲魏文侯作盡地力之教又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善爲國者使民無傷而農益勸今一夫挾五口治田百畝歳收畝一石半爲粟百五十石除十一之税十五石餘百三十五石食人月一石半五人終歳爲粟九十石餘有四十五石石三十爲錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終歳用千五百不足四百五十不幸疾病死䘮之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糴至于甚貴者也是故善平糴者必謹觀歳有上中下熟上熟其收自四餘四百石中熟自三餘三百石下熟自倍餘百石小飢則收百石中飢七十石大飢三十石故大熟則上糴三而舎一中熟則糴二下熟則糴一使民適足價平則止小飢則發小熟之所斂中飢則發中熟之所斂大飢則發大熟之所斂而糶之故雖遇饑饉水旱糴不貴而人不散取有餘而補不足也行之魏國國以富强蕙田案常平之名始于漢其法則自李悝始之備荒之政莫善于此馬貴與所謂農人服田力穡之贏餘上之人爲制其輕重時其斂散使不以甚貴甚賤爲患乃仁者之用心是也宣帝本紀五鳯四年春正月大司農中丞耿夀昌奏設常平倉以給北邊省轉漕賜爵闗内侯食貨志宣帝即位大司農中丞耿夀昌以善爲算能商功利得幸于上五鳯中奏言故事歳漕闗東穀四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可以省闗東漕卒過半天子從其計夀昌遂白令邊郡皆築倉以穀賤時增其賈而糴以利農穀貴時減賈而糶名曰常平倉民便之元帝本紀初元五年四月罷常平倉後漢書劉般傳顯宗欲置常平倉公卿議者多以爲便般對以常平倉外有利民之名而内實侵刻百姓豪右因縁爲姦小民不能得其平置之不便帝乃止通典後漢明帝永平五年作常平倉蕙田案范史載明帝以劉般之言罷置常平倉而杜氏通典載作倉于永平五年蓋後來卒置之也冊府元龜以劉般之對繫于永平十一年案永平五年已置倉矣何得閲五六歳後乃云議置之疑不然也晉書食貨志泰始四年立常平倉豐則糴儉則糶以利百姓通典永明中天下米穀布帛賤上欲立常平倉市積爲儲六年詔出上庫錢五千萬于京師市米買絲綿紋絹布揚州出錢千九百一十萬南齊州二百萬各于郡所市糴南荆河州二百萬市絲綿紋絹布米大麥江州五百萬市米胡麻荆州五百萬郢州三百萬皆市絹綿布米大小豆大麥胡麻湘州二百萬市米布蠟司州二百五十萬西荆河州二百五十萬南兖州二百五十萬雍州五百萬市絹綿布米使臺傳並于所在市易魏書食貨志太和十二年詔羣臣求安民之術有司上言請析州郡常調九分之二京都度支歳用之餘各立官司豐年糴貯于倉時儉則加私之一糶之于民如此民必力田以買官絹積財以取官粟年登則常積歳凶則直給又别立農官取州郡戸十分之一以爲屯民相水陸之宜斷頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歳責六十斛甄其正課并征戍雜役行此二事數年之中則穀積而民足矣帝覽而善之尋施行焉自此公私豐贍雖時有水旱不爲災也蕙田案此祕書監李彪所上議也孝文帝本紀太和二十年十二月置常平倉通典隋文帝開皇三年陜州置常平倉京師置常平監唐武徳五年廢常平監永徽六年京東西市置常平倉冊府元龜開元二年九月詔曰天下諸州今年稍熟穀價全賤或慮傷農常平之法行自徃古苟絶欺隱利益實多宜令諸州加時價三兩錢和糴不得抑斂仍交相付領勿許懸欠蠶麥時熟穀米必貴即令減價出糶豆等堪貯者熟亦宜准此以時出入務在利人江嶺淮浙劍南地皆下濕不堪貯積不在此例其常平所須錢物宜令所司支料奏聞並委長官專知改任日遞相付受且以天灾流行國家代有若無糧儲之備必致饑饉之憂縣令親人風俗所繫隨當處豐約勸課百姓未辦三載之糧且貯一年之食每家别爲倉窖非蠶忙農要之時勿許破用仍委刺史及按察使簡較覺察不得容其矯妄蕙田案耕三餘一載于禮經小民所以乏食者多縁豐年不知愛惜任意出糶無終歳之儲一遇饑饉束手坐困民愚無識良可憫惜𤣥宗詔縣令勸課百姓家别爲倉窖貯一年之食非蠶忙農要之時勿許破用其所以爲民食計者至深逺矣此開元初政之所以善也文獻通考開元七年勅闗内隴右河南河北五道及荆揚襄䕫綿益彭蜀資漢劍茂等州並置常平倉其本上州三千貫中州二千貫下州一千貫每糴具本利與正倉帳同申舊唐書食貨志開元十六年十月敕自今歳普熟穀價至賤必恐傷農加錢收糴以實倉廪縱逢水旱不慮阻飢公私之間或亦爲便宜令所在以常平本錢及當處物各于時價上量加三錢百姓有糶易者爲收糴事須兩和不得限數配糴訖具所用錢物及所糴物數申所司仍令上佐一人專勾當冊府元龜天寳四載五月詔曰如聞今歳收麥倍勝常歳稍至豐賤即慮傷農處置之間事資通濟宜令河南河北諸郡長官取當處常平錢于時價外㪷别加三五錢量事收糴大麥貯掌其義倉亦宜准此仍委採訪使勾當便勘覆具數一時録奏諸道有糧儲少處各隨土宜如堪貯積亦准此處分舊唐書食貨志廣徳二年正月第五琦奏每州常平倉及庫使司商量置本錢隨當處米物時價賤則加價收糴貴則減價糶賣建中元年七月敕夫常平者常使穀價如一大豐不爲之減大儉不爲之加雖遇災荒人無菜色自今已後忽米價貴時宜量出官米十萬石每石量付兩市行人下價糶貨三年九月户部侍郎趙贊上言曰伏以舊制置倉儲粟名曰常平軍興已來此事闕廢或因凶荒流散餓死相食者不可勝紀古者平凖之法使萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏春以奉耕夏以奉耘雖有大賈富家不得豪奪吾人者蓋謂能行輕重之法也自陛下登極以來許京城兩市置常平官糴鹽米雖經頻年少雨米不騰貴此乃即日明騐實要推而廣之當興軍之時與承平或異事須兼儲布帛以備時須臣今商量請于兩都并江陵東都揚汴蘇洪等州府各置常平輕重本錢上至百萬貫下至數十萬貫隨其所宜量定多少惟置斛斗疋段絲麻等候物貴則下價出賣物賤則加價收糴權其輕重以利疲人從之贊于是條奏諸道要都㑹之所皆置吏閲商人財貨計錢每貫税二十天下所出竹木茶漆皆十一税之以充常平本時國用稍廣常賦不足所税亦隨時而盡終不能爲常平本蕙田案趙贊議征商税以充常平之本其後常平不能復而商税之額不可復除併且日増于前矣觀承案自古弊法多附於良法而始能行後則失其良而徒存其弊不獨趙贊議征商税一事此孔子所以惡始作俑者也元和元年正月制歳時有豐歉穀價有重輕將備水旱之虞在權聚斂之術應天下州府每年所税地丁數内宜十分取二分均充常平倉及義食仍各逐稳便收貯以時出糶務在救人賑貸所宜速奏冊府元龜後唐天成二年六月中書舎人張文寳請復常平倉四年九月左補闕張昭逺奏今秋物價絶賤百姓隨地畝細配錢物名目多般皆賤糶供輸極傷農業既未能減放貯請加估折納斛斗稍便于民又國朝已來備凶年之法州府置常平倉饑歳以賑貧民請于天下最豐熟處折納斛斗以倉貯之依常平法出納則國家常有粟而民不匱也疏奏不報宋史食貨志淳化三年京畿大穰分遣使臣于四城門置場增價以糴虛近倉貯之命曰常平歳饑即下其直予民玉海大中祥符二年二月分遣使臣出常平倉粟麥于京城開八場減價糶之以平物價六年并兩赤縣倉入在京常平倉文獻通考天禧四年詔荆湖川峽廣南並置常平倉宋史食貨志景徳三年言事者請于京東西河北河東陜西江南淮南兩浙皆立常平倉計户口多寡量留上供錢自二三千貫至一二萬貫令轉運使每州擇清幹官主之領于司農寺三司無輙移用歳夏秋視市價量增以糴糶減價亦如之所減不得過本錢而沿邊州郡不置詔三司集議請如所奏于是增置司農官吏創𪠘舎藏籍帳度支别置常平案大率萬户歳糴萬石户雖多止五萬石三年以上不糶即囬充糧廪易以新粟災傷州郡糴粟斗毋過百錢後又詔當職官于元約數外増糴及一倍已上者並與理爲勞績景祐中淮南轉運副使吳遵路言本路丁口百五十萬而常平錢粟纔四十餘萬歳饑不足以救恤願自經畫増爲二百萬他毋得移用許之後又詔天下常平錢粟三司轉運司皆毋得移用不數年間常平積有餘而兵食不足乃命司農寺出常平錢百萬緡助三司給軍費久之移用數多而蓄藏無幾矣自景祐初畿内饑詔出常平粟貸中下户户一斛慶歴中發京西常平粟振貧民而聚斂者或増舊價糴粟欲以市恩皇祐三年詔誡之淮南兩浙體量安撫陳升之等言災傷州軍乞糴常平倉粟令于元價上量添十文十五文殊非恤民之意乃詔止于元糴價出糶五年詔曰比者湖北歳儉發常平以濟饑者如聞司農寺復督取豈朝廷振恤意哉其悉除之蕙田案仁宗以常平官粟移爲濟貸之用所以拯疲氓也其後言利之徒恐官本之不敷振濟而常平之額有虧于是青苖取息之議出矣仁宗本紀嘉祐七年十月詔内藏庫三司共出緡錢一百萬助糴天下常平倉食貨志熙寧二年制置三司條例司言諸路常平廣惠倉錢穀略計貫石可及千五百萬以上斂散未得其宜故爲利未博今欲以見在斛斗遇貴量減市價糶遇賤量増市價糴可通融轉運司苖税及錢斛就便轉易者亦許兑換仍以見錢依陜西青苖錢例願預借者給之隨税輸納斛斗半爲夏料半爲秋料内有請本色或納時價貴願納錢者皆從其便如遇災傷許展至次料豐熟日納非惟足以待凶荒之患民既受貸則兼并之家不得乗新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市㳺手之人今通一路有無貴發賤斂以廣蓄積平物價使農人有以赴時趨事而兼并不得乗其急凡此皆以爲民而公家無所利其入是亦先王散惠興利以爲耕斂補助之意也欲量諸路錢穀多寡分遣官提舉每州選通判幕職官一員典幹轉移出納仍先自河北京東淮南三路施行俟有緒推之諸路其廣惠倉除量留給老疾貧窮人外餘並用常平倉轉移法詔可既而條例司又言常平廣惠倉條約先行于河北京東淮南三路訪問民間多願支貸乞遍下諸路轉運司施行當議置提舉官時天下常平錢穀見在一千四百萬貫石詔諸路各置提舉官二員以朝官爲之管勾一員京官爲之或共置二員開封府界一員凡四十一人馬氏端臨曰青苖錢所以爲人害者三曰徴錢也取息也抑配也今觀條例司所請曰隨租納斗斛如以價貴願納錢者聽則未嘗專欲徴錢也曰凡以爲民公家無利其入則未嘗取息也曰願給者聽則未嘗抑配也蓋建請之初姑爲此美言以惑上聽而厭衆論而施行之際實則不然也蕙田案常平所以平穀價使無甚賤甚貴之患俾農未不至兩病而已未嘗計其贏餘以爲利也青苖錢之名則起於唐時與周禮旅師春頒秋斂之法略相似其異者以錢而不以穀耳介甫行之於熙豐之世又傅㑹泉府國服爲息之説以爲可以抑兼并而足國用殊不知民受錢于官有守候之苦其還錢于官有徴比之煩必不如假貸于豪家之便則兼并仍未可抑也民知取債之利不知還債之害催呼既廹人戸必致逃亡逃亡既多官物必多失䧟則國用仍未能裕也假散惠之名而成厲民之舉徒使常平之良法美意一舉而蕩然是誰之咎歟神宗本紀熙寧三年正月詔諸路散青苗錢禁抑配五月詔並邊州郡毋給青苗錢食貨志三年判大名府韓琦言臣凖散青苗詔書務在惠小民不使兼并乗急以要倍息而公家無所利其入今所立條約乃自鄉戸一等而下皆立借錢貫陌三等以上更許増借坊郭戸有物業勝質當者亦依鄉戸例支借且鄉村上等戸并坊郭有物業者乃從來兼并之家今令多借之錢一千令納一千三百則是官自放錢取息與初詔絶相違戾又條約雖禁抑勒然須得上戸爲甲頭以任之民愚不慮久逺請時甚易納時甚難故自制下以來上下惶惑皆謂若不抑散則上戸必不願請近下等第與無業客戸雖或願請必難催納將來必有行刑督索及勒干係書手典押耆戸長同保均賠之患去歳河朔豐稔米斗不過七八十錢若乗時多斂俟貴而糶不惟合古制無失䧟兼民被實惠亦足收其羨贏今諸倉方糴而提舉司已亟止之意在移此糴本盡爲青苗錢則三分之息可爲已功豈暇更恤斯民久逺之患若謂陜西嘗行其法官有所得而民以爲便此乃轉運司因軍儲有闕適自冬及春雨雪及時麥苗滋盛定見成熟行于一時可也今乃建官置司以爲毎歳常行之法而取利三分豈陜西權宜之比哉兼初詔且于京東淮南河北三路試行竢有緒方推之他路今三路未集而遽盡于諸路置使非陛下憂民祖宗惠下之意乞盡罷提舉官第委提㸃刑獄官依常平舊法施行詔以琦奏付制置條例司條例司疏列琦奏而辦析其不然琦復上疏曰制置司多删去臣元奏要語惟舉大槩用偏辭曲難及引周禮國服爲息之説文其謬妄上以欺罔聖聽下以愚弄天下臣竊以爲周公立太平之法必無剥民取利之理但漢儒觧釋或有異同周禮園㕓二十而税一惟漆林之征二十而五鄭康成乃約此法謂從官貸錢若受園㕓之地貸萬錢者出息五百賈公彦廣其説謂如此則近郊十一者萬錢期出息一千逺郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千如此則須漆林之戸取貸方出息二千五百當時未必如此今放青苖錢凡春貸十千半年之内便令納利二千秋再放十千至歳終又令納利二千則是貸萬錢者不問逺近歳令出息四千周禮至逺之地止出息二千今青苖取息過周禮一倍制置司言比周禮取息已不爲多是欺罔聖聽且謂天下之人不能辨也且古今異宜周禮所載有不可施于今者其事非一若謂泉府一職今可施行則制置司何獨舉注疏貸錢取息一事以詆天下之公言哉康成又注云王莽時貸以治産業者但計所贏受息無過歳什一公彦疏云莽時雖計本多少爲定及其催科惟所贏多少假令萬錢歳贏萬錢催一千贏五千催五百餘皆據利催什一若贏錢更少則納息更薄比今青苗取利尤爲寛少而王莽之外上自兩漢下及有唐更不聞有貸錢取利之法今制置司遇堯舜之主不以二帝三王之道上禆聖政而貸錢取利更過莽時此天下不得不指以爲非而老臣不可以不辨也况今天下田税已重固非周禮什一之法更有農具牛皮鹽麴鞵錢之𩔖凡十餘目謂之雜錢每夏秋起納官中更以紬絹斛斗低估令民以此雜錢折納又歳散官鹽與民謂之蠶鹽折納絹帛更有預買和買紬絹如此之𩔖不可悉舉皆周禮田税什一之外加斂之物取利已厚傷農已深奈何又引周禮國服爲息之説謂放青苖錢取利乃周公太平已試之法此則誣汙聖典蔽惑睿明老臣得不太息而慟哭也制置司又謂常平舊法亦糶與坊郭之人坊郭有物力戸未嘗零糴常平倉斛斗此蓋欲多借錢與坊郭有業之人以望收利之多妄稱周禮以爲無都邑鄙野之限以文其曲説惟陛下詳之初羣臣進讀邇英畢帝問朝廷每更一事舉朝洶洶何也司馬光曰青苖出息平民爲之尚能以蚕食下户至飢寒流離况縣官法度之威乎吕惠卿曰青苖法願則取之不願不強也光曰愚民知取債之利不知還債之害非獨縣官不强富民亦不强也帝曰陜西行之久民不以爲病光曰臣陜西人也見其病不見其利朝廷初不許有司尚能以病民况法許之乎當是時爭青苖錢者甚衆翰林學士范鎮言陛下初詔云公家無所利其入今提舉司以戸等給錢皆令出三分之息物議紛紜皆云自古未有天子開課塲者民雖至愚不可不畏後以言不行致仕知山隂縣陳舜俞不肯奉行移狀自劾曰方今小民匱乏願貸之人徃徃有之譬如孺子見飴蜜孰不染指爭食然父母疾止之恐其積甘足以生病故耆老戒其鄉黨父兄誨其子弟未嘗不以貸貰爲不善治生今乃官自出舉誘以便利督以威刑非王道之舉也况正月放夏料五月放秋料而所斂亦在當月百姓得錢便出息輸納實無所利是使民一取青苖錢終身以及世世一歳嘗兩輸息錢乃别爲一賦以弊生民也坐謫南康軍鹽酒税蘇轍傳王安石以執政與陳升之領三司條例命轍爲之屬吕惠卿附安石轍與論多相牾安石出青苗書使轍熟議曰有不便以告勿疑轍曰以錢貸民使出息二分本以救民非爲利也然出納之際吏縁爲姦雖有法不能禁錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此則恐鞭箠必用州縣之事不勝煩矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥倖得錢非國之福使吏倚法督責非民之便吾雖未嘗假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病安用貸爲晏之所言則常平法耳今此法見在而患不修公誠能有意于民舉而行之則晏之功可立俟也安石曰君言誠有理當徐思之自此逾月不言青苖㑹河北轉運判官王廣亷奏乞度僧牒數千爲本錢于陜西漕司私行青苖法春散秋斂與安石意合于是青苖法遂行司馬光傳帝拜光樞宻副使光辭曰陛下誠能罷制置條例司追還提舉官不行青苖助役等法雖不用臣臣受賜多矣今言青苖之害者不過謂使者騷動州縣爲今日之患耳而臣之所憂乃在十年之外非今日也夫民之貧富由勤惰不同惰者常乏故必資于人今出錢貸民而斂其息富者不願取使者以多散爲功一切抑配恐其逋負必令貧富相保貧者無可償則散而之四方富者不能去必責使代償數家之負春算秋計展轉日滋貧者既盡富者亦貧十年之外百姓無復存者矣又盡散常平錢穀專行青苖它日若思復之將何所取富室既盡常平已廢加之以師旅因之以飢饉民之羸者必委死溝壑壯者必聚而爲盜賊此事之必至者也蕙田案當時言青苗法者甚衆舉其尤切于利弊者載之文獻通考熙寧七年七月帝以諸路旱災常平司未能賑濟諭輔臣曰天下常平倉若以一半散錢取息一半减價糶賣使二者如權衡之相依不得偏重民必受賜自是詔諸路州縣據已支見在錢穀通數常留一半外方得給散蕙田案是時官吏以給散取息爲功錢穀之留于官者不過什之一二尚未足減糶之用况議振濟乎故有一半散息一半減糶之詔以調停之九年詔司農寺自今兩經倚閣常平錢人户更不得支借錢斛帝謂天下常平錢穀十常七八散在民間又連歳災傷倚閣迨半止務多給計息爲功不計督索艱難豈惟虧失官物兼百姓被鞭撻必衆故也十年提舉兩浙路常平言災傷累年丁口减耗凡九年以前逃絶户已請青苗錢斛見戸有合攤填者乞需豐熟日理納外更有全甲户絶輸償不足或同甲内死絶止存一二貧户難以攤納者更乞立法從之元豐元年詔常平倉錢穀當輸錢而願入穀若金帛者官立中價示民物不盡其錢者足以錢錢不盡其物者還其餘直又聽民以金帛易穀而有司少加金帛之直况錢穀當給若糶皆用九年詔書通取留一半之餘元祐元年二月詔提舉官累年積蓄錢穀財物盡椿作常平倉錢物委提㸃刑獄交割主管依舊常平倉法左正言朱光庭言天下青苗錢除支俵外見其錢數尚多乞並用收糴可存留斛斗凡遇豐年則添價以糴遇歳饑則减價以糶大饑則貸之候豐歳輸還更不出息門下侍郎司馬光劄子言常平之法公私兩利此乃三代之良法也向者有因州縣闕常平糴本錢雖遇豐歳無錢收糴又有官吏怠慢厭糴糶之煩雖遇豐歳不肯收糴又有官吏不能察知在市斛斗實價只信憑行人與蓄積之家通同作弊當收成之時農人要錢急糶之時故意小估價例令官中收糴不得盡入蓄積之家直至過時蓄積之家倉廪盈滿方始頓添價中糶入官是以農夫糶穀止得賤價官中糴穀常用貴價厚利皆歸蓄積之家又有官吏雖欲趂時收糴而縣申州州申提㸃刑獄提㸃刑獄司申司農寺取候指揮比至囬報動渉累月已至失時穀價倍貴是故州縣常平倉斛斗有經隔多年在市價例終不及元糴之價出糶不行堆積腐爛者此乃法因人壞非法之不善也四月詔再立常平錢穀給斂出息之法限二月或正月以散及一半爲額民間絲麥豐熟隨夏税先納所輸之半願併納者止出息一分左司諫王岩叟中丞劉摯右司諫蘇轍等交章言其非右僕射司馬光剳子乞約束州縣抑配青苗錢從之錄黄過中中書舎人蘇軾奏曰臣伏見免役之法已盡革去而青苗一事乃獨因舊少加損益熙寧之法本不許抑配而其害至此今雖復禁其抑配其害猶在也昔者州縣並行倉法而受納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無狀於給散之際必令酒務設鼓樂倡優或開撲賣酒牌農民至有徒手而歸者但每散青苗即酒課暴増此臣所親見而爲流涕者也二十年間因欠青苗至賣田宅僱妻女溺水自縊者不可勝數朝廷忍復行之歟臣謂四月二十六日指揮以散及一半爲額與熙寧之法初無小異而今月二十日指揮猶許人戸情願未免於設法罔民便一時非理之私而不慮後日催納之患三者皆非良法相去無幾也今者已行常平糶糴之法惠民之外官亦稍利如此足矣何用二分之息以賈無窮之怨臣雖至愚深爲朝廷惜之欲乞特降指揮青苗錢斛後更不給散所有已請過者候豐熟日分作五年十料隨二税送納或乞聖慈念其累歳出息已多自第四等以下人戸並與放免庶使農民自此息肩亦免後世有所譏議光大悟力疾入對青苗錢遂罷不復散宋史食貨志紹聖二年戸部尚書蔡京首言承詔措置財利乞檢㑹熙豐青苗條約參酌增損立爲定制淮南轉運司副使莊公岳謂自元祐罷提舉官後錢穀爲他司侵借所存無幾欲乞追還給散隨夏秋税償納勿立定額自無抑民失財之患奉議郎鄭僅朝奉郎郭時亮承議郎許幾董遵等皆言青苗最爲便民願戒抑配止收一分之息詔並送詳定重脩勅令所三年舊欠常平錢穀人戸仍許請給文獻通考政和八年御筆常平斂散法利天下甚博而比年以來諸路欠闕至未及散而遽取之甚失神考制法之意令常平司恪遵條令斂散必時違者以大不恭論宣和五年詔州縣每歳支俵常平錢穀多是形勢戸請求及胥吏詐冐支請令天下州縣毎歳散錢穀既畢即揭示請人數目逾月斂之庶知爲偽冐者得以陳訴玉海常平之政有提舉官自熙寧始建炎元年六月併歸提刑司常平之財所存一二猶以億萬計一年八月癸丑朔復諸路常平官十月壬戌詔翰學葉夢得等討論常平法條具取㫖青苗斂散永不施行紹興八年冬李光言常平法本於耿夀昌豈可以安石而廢九年復提舉官使掌其政文獻通考紹興九年上諭宰執曰常平法不許他用惟時賑饑取於民者還以予民也王圻續通考淳熙四年尚書省言信州常平義倉米元申帳狀管九萬三千餘石今次提舉司申有六萬八千餘石及至盤糧止得一萬二千九百餘石皆是虛數提舉官李唐到任已及二年並不檢察是致闕米有誤賑濟知州趙師嚴通判李桐係乾道三年到任之人所由帳狀隱蔽虛妄詔李唐特降兩官放罷趙師嚴李桐各降兩官不得與堂除文獻通考慶元四年臣僚言州縣受納苗米於法義倉米合於當日支撥而因循於州用不復撥還人戸納苗稍及分數例多折納價錢其帶義倉錢並不許撥此因納苗而失䧟義倉也至如紹興府人戸就行在省倉送納湖田米其合納義倉多不催理此因湖田納米而失䧟也如淮浙鹽亭戸納鹽以折二税其合納義倉多是不曽拘催此因納鹽而失䧟也常平失於兑換因致陳損此倉庾陳腐之弊也常平米止許逓留一年以新納秋苗換易支遣常平專法主管官替移無拖欠失䧟方與批書離任今公然兑借陽爲自劾更不補還此州縣兑移之弊也常平和糴合專置倉厫今州縣多因受納以收到出剰撥歸常平倉贏落價錢此收糴官吏之弊也諸没官産業并戸絶僧道田賣到錢數及亡僧衣鉢錢法當拘入常平州縣侵漁鮮曽撥正此出賣官産之弊也若乃吏胥之禄合於免役錢内支給而所催役錢在州則主管官應副人情在縣佐以爲公用已催之數既不以供支遣又於坊塲錢内撥支未嘗入以爲出如公吏差出其本身初不請常平錢乃詭名借請或元非差出而妄作縁故至於吏胥自有定額今守倅視常平錢米爲他司錢物吏額日増請給日廣常平司委而不問若夫借請在法二分剋納今或一例借欠動至數百千例不除剋此其弊不一也倘不爲之隄防懲革則儲蓄日寡荒政無備乞明詔諸路提舉常平官講求措置亟去前弊責令逐州毎季以本州及屬縣收支常平義倉等錢米逐項細數申常平司不得泛言都數然後叅照條法逐一審訂稍有失收失支勒令填納或有情弊必寘于法金史食貨志常平倉世宗大定十四年嘗定制詔中外行之其法尋廢章宗明昌元年八月御史請復設敕省臣詳議以聞省臣言大定舊制豐年則増市價十之二以糴儉歳則減市價十之一以出平歳則已夫所以豐則増價以收者恐物賤傷農儉則減價以出者恐物貴傷民増之損之以平粟價故謂常平非謂使天下之民專仰給于此也今天下生齒至衆如欲計口使餘一年之儲則不惟數多難辦又慮出不以時而致腐敗也况復有司抑配之弊殊非經久之計如計諸郡縣騐户口例以月支三斗爲率每口但儲三月已及千萬數亦足以平物價救荒㐫矣若令諸處自官兵三年食外可充三月之食者免糴其不及者俟豐年糴之庶可久行也然立法之始貴在必行其令提刑司各路計司兼領之郡縣吏沮格者紏能推行者加擢用若中都路年穀不熟之所則依常平法减其價三之一以糶詔從之三年八月敕常平倉豐糴儉糶有司奉行勤惰褒罰之制其徧諭諸路其奉行滅裂者提刑司紏察以聞又謂宰臣曰隨處常平倉徃徃有名無實况逺縣人户豈肯䟦渉直就州府糶糴可各縣置倉命州府縣官兼提控管勾遂定制縣距州六十里内就州倉六十里外則特置舊擬備户口三月之糧恐數多致損改令户二萬以上備三萬石一萬以上備二萬石一萬以下五千以上備萬五千石五千户以下備五千石河南陜西屯軍貯糧之縣不在是數州縣有倉仍舊否則剏置郡縣吏受代所糴粟無壞一月内交割給由如無同管勾亦准上交割違限委州府并提刑司差官催督監交本處歳豐而收糴不及一分者本等内降提刑司體察直申尚書省至日斟酌黜陟九月敕置常平倉之地令州府官提舉之縣官兼董其事以所糴多寡約量升降爲永制五年九月尚書省奏明昌三年始設常平倉定其永制天下常平倉總五百一十九處見積粟三千七百八十六萬三千餘石可備官兵五年之食米八百一十餘萬石可備四年之用而見在錢總三千三百四十三萬貫有竒僅支二年以上見錢既少且比年稍豐而米價猶貴若復預糴恐價騰踴于民未便遂詔權罷中外常平倉和糴俟官錢羡餘日舉行元史食貨志元立常平于路府常平倉世祖至元六年始立其法豐年米賤官爲増價糴之歉年米貴官爲減價糶之於是八年以和糴粮及諸河倉所撥粮貯焉二十三年定鐡法又以鐡課糴粮貯焉武宗本紀至大二年九月詔府州縣設立常平倉以權物價豐年收糴粟麥米穀值青黄不接之時比附時估减價出糶以遏沸湧十月御史臺臣言常平倉本以益民然歳不登遽立之必反害民罷之便文宗本紀天歴二年十月命所在官司設置常平倉順帝本紀至正三年詔立常平倉明㑹典嘉靖六年令撫按二司督責有司設法多積米穀以備救荒仍倣古人平糴常平之法春間放賑貧民秋成抵斗還官不取其息如見在米穀數少將貯庫官錢并問過贖罪折紙銀兩趂秋成時委賢能官一員糴買比時估量添二三文府以一萬石州以四五千石縣以二三千石爲率明立簿籍查考歳荒減價糶與窮民仍禁姦豪不許隱情揑名多買罔利事發重治明史食貨志嘉靖初帝令有司設法多積米穀仍倣古常平法春振貧民秋成還官不取其息府積萬石州四五千石縣二三千石爲率既又定十里以下萬五千石累而上之八百里以下至十九萬石其後積粟盡平糶以濟貧民儲積漸減隆慶時劇郡無過六千石小邑止千石久之數益減科罰亦益輕神宗時上州郡至三千石止而小邑或僅百石有司沿爲具文屢下詔申飭率以虛數欺罔而已廣治平略隆慶初陜西巡按御史王君賞奏請寛積穀之例言近時有司積穀之數雖已半減然州縣大者數萬石小者數千石即日入民于罪不可得盈宜再減其額時知州尹際可等積粟不如數例當降調吏部言有司積穀備荒雖亦急務然較之正賦輕重自是不同况皆出贓罰抵贖及他設處所入之數視地方貧富獄訟繁簡爲差不可以預定也若必欲所在取盈是徒開有司作威生事之端反失濟民初意制可蕙田案此論州縣積穀之弊荒政考略萬歴五年山西巡撫靳學顔請置常平倉部覆請以防秋客兵銀并鹽課六萬發各府縣糴穀又脩復社倉王圻續通考神宗二十九年十二月戸部覆福建巡撫金學曾題鄉官陳長祚林鳴盛倡義建常平倉于官勸義倉于民又有義廪以倡縉紳之尚義者及知州車大任等官俱行紀錄長祚等量加服色以鼓尚義上是之廣治平略萬歴以後郡國之府庫盡入内帑常平之名遂廢天啟間蔡懋德議通常平遺法以廣儲蓄請發帑庫餘金爲本每歳于産米價賤時委亷幹丞簿收積至來歳照時價糶之必有㣲息逐歳漸増以備荒歉或歉官與民爲市必當減價以糶不知減價之名徒致閧爭孰若稍收㣲息多儲新米米多則價自減糶平則人不爭爲更便乎蓋貴設法使米有餘不在減省錙銖見徳也而當事以帑金告乏雖善其䇿而事不果行蕙田案以上常平倉通典北齊河清中令諸州郡皆别制富人倉初立之日准所領中下户口數得一年之糧逐當州穀價賤時斟量割當年義租充入齊制歳每人出墾租二石義租五斗墾租送臺義租納郡以備水旱穀貴下價糶之賤則還用所糴之物依價糴貯蕙田案義倉之名始于長孫平及戴胄然北齊制于墾租之外别出義租以備水旱又在隋唐以前矣義租者取之于民非公家之正賦納諸郡倉不如儲之當社其斂散尤便也隋書文帝本紀開皇五年五月甲申詔置義倉食貨志開皇五年五月工部尚書襄陽縣公長孫平奏曰古者三年耕而餘一年之積九年作而有三年之儲雖水旱爲災而人無菜色皆由勸導有方蓄積先備故也去年亢陽闗内不熟陛下哀愍黎元甚于赤子運山東之粟置常平之官開發倉廪普加賑賜少食之人莫不豐足鴻恩大徳前古未比其强宗富室家道有餘者皆競出私財逓相賙贍此乃風行草偃從化而然但經國之理須存定式于是奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥于當社造倉窖貯之即委社司執帳檢校每年收積勿使損敗若時或不熟當社有饑饉者即以此穀賑給自是諸州儲峙委積長孫平傳平拜度支尚書見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石已下貧富差等儲之閭巷以備凶年名曰義倉食貨志是時義食貯在人間多有費損十五年二月詔曰本置義倉止防水旱百姓之徒不思久計輕爾費損于後乏絶又北境諸州異于餘處雲夏長靈鹽蘭豐鄯凉甘𤓰等州所有義倉雜種並納本州若人有旱儉少糧先給雜種及逺年粟十六年正月又詔秦疊成康武文芳宕旭洮岷渭紀河廓豳隴涇寧原敷丹延綏銀扶等州社倉並于當縣安置二月又詔社倉准上中下三等税上户不過一石中戸不過七斗下戸不過四斗舊唐書食貨志武徳元年九月四日置社倉蕙田案社倉設于武徳元年則唐初沿隋制不廢矣未久而有戴胄之議蓋名存而實亡有司奉行不力故也貞觀二年四月尚書左丞戴胄上言曰水旱凶災前聖之所不免國無九年儲畜禮經之所明誡今䘮亂之後戸口凋殘每歳納租未實倉廪隨時出給纔供當年若有凶災將何賑恤故隋開皇立制天下之人節級輸粟名爲社倉終于文皇得無饑饉及大業中年國用不足並貸社倉之物以充官費故至末塗無以支給今請自王公已下爰及衆庶計所墾田稼穡頃畝至秋熟凖其見在苗以理勸課盡令出粟稻麥之鄉亦同此税各納所在爲立義倉若年穀不登百姓饑饉當所州縣隨便取給太宗曰既爲百姓預作儲貯官爲舉掌以備凶年非朕所須横生賦斂利人之事深是可喜宜下所司議立條制戸部尚書韓仲良奏王公已下墾田畝納二升其粟麥粳稻之屬各依土地貯之州縣以備凶年可之自是天下州縣始置義倉每有饑饉則開倉賑給唐書食貨志尚書左丞戴胄建議自王公以下計墾田秋熟所在爲義倉歳凶以給民太宗善之乃詔畝税二升粟麥秔稻隨土地所宜寛鄉斂以所種狹鄉據青苗簿而督之田耗十四者免其半耗十七者皆免之商賈無田者以其戸爲九等出粟自五石至于五斗爲差下下戸及夷獠不取焉歳不登則以賑民或貸爲種子則至秋而償永徽二年六月勅義倉據地收税實是勞煩宜令率戸出粟上上戸五石餘各有差冊府元龜開元四年五月勅曰天下百姓皆有正條正租州縣義倉本備饑年賑給若縁官事便用還以正倉却填近年已來每三年一度以百姓義倉造米逺送交納仍勒百姓私出脚錢即并正租一年兩度打脚雇男鬻女折舎賣田力極計窮遂即逃竄勢不獲巳情實可矜自今已後若不熟之少者任所司臨時具奏聽進止其脚並以官物充蕙田案隋義倉設于當社最爲近民其後移之州縣而官吏得以侵移他用百姓交納之苦又不待言矣貞觀初制不脩長孫之議而沿隋末故事雖于賑濟有益而累民必多此勅所載固其流弊亦縁立法未盡善也二十年二月制曰義倉元置與衆共之將以克濟斯人豈徒蓄我王府自今巳後天下諸州每置農桑令諸縣審責貧戸慮糧及種子據其口糧貸義倉至狄熟後照數征納庶耕者咸業嗇人知勸資治通鑑貞元十年陸贄上言請以税茶錢置義倉以傋水旱其略曰古稱九年六年之蓄者率土臣庶通爲之計爾固非獨豐公庾不及編氓也近者有司奏請税茶歳約得錢五十萬貫元敕令貯戸部用救百姓凶飢今以蓄糧適符前㫖舊唐書食貨志長慶四年三月制曰義倉之制其來日久近歳所在盗用没入致使小有水旱生人坐委溝壑求言其弊職此之由宜令諸州録事叅軍專主勾當苟爲長吏迫制即許驛表上聞考滿之日戸部差官交割如無欠負與減一選如欠少者量加一選欠數過多户部奏聞節級科處册府元龜太和九年二月中書門下奏常平義倉本虞水旱以時賑恤州府不詳文理或申省取裁或奏候進止自今以後應遭水旱之處先據貧下戸及鰥寡惸獨不濟者便開倉准元年勅作等第賑貸訖具數申報有司如水旱尤甚米麥翔貴亦准元年敕或減價出糶熟時糴填委諸道觀察使各下諸州共令知悉開成元年八月戸部奏應諸州府所置常平義倉伏請起今後通公私田畝别納粟一升逐年添貯義倉斂之至輕事必通濟歳月稍久自致充盈縱逢水旱之災永絶流亡之慮敕從之蕙田案此于義倉常數之外别徴每畝一升之粟名爲備災實則重斂宜其不久而停也四年七月滄景節度使劉約奏請義倉粟賑遭水百姓詔曰本置義倉只防水旱先給後奏敕有明文劉約所奏已爲遲晩宜速賑恤宣宗以㑹昌六年即位五月赦節文常平義倉斛斗已出百姓太和中又于常數外每畝計率一升稱防災沴其所徴常平義倉正數都無商量如聞此色在諸州縣皆兩徴已困之人何堪重斂自今已後宜停徴太和中每畝率配之數仍令所在長吏分明曉示以絶奸欺蕙田案此所停者即開成元年戸部所奏之議乃以爲太和中事未知孰是舊唐書食貨志大中六年四月戸部奏諸州府常平義倉斛斗本防水旱賑貸百姓其有災沴州府地逺申奏徃復已至流亡自今已後諸道遭災旱請委所在長吏差清强官審勘如實有水旱處便任先從貧下不支濟戸給貸從之冊府元龜後唐長興元年五月右司郎中盧道奏請置常平義倉以備凶歳後漢乾祐二年太子詹事曹允昇上言國以民爲本民以食爲天時或水旱爲災蟲蝗害稼既無九年之蓄寧救萬姓之饑天災流行古今代有而前代縱逢災歉免至流亡蓋以分災恤民素有儲備臣請依古法置常平倉請于天下京都州府租賦五斛斗上每斗别納一升别倉貯積若凶災之處出貸貧民豐年即納本數庶幾生聚永洽綏懷蕙田案允昇所稱常平倉即唐之義倉也宋史食貨志太祖承五季之亂海内多事義倉寖廢乾徳初詔諸州于各縣置義倉歳輸二税石别收一斗民饑欲貸充種食者縣具籍申州州長吏即計口貸訖然後奏聞文獻通考乾徳元年詔曰多事之後義倉寖廢歳或小歉失于豫備宜令諸州于所屬縣各置義倉自令官所收二税石别税一斗貯之以備凶歉給與民蕙田案本紀置義倉在乾徳三年與此不同三年詔民有欲借義倉粟充種食者令州縣即計口給計以聞勿俟報義倉不足當發公廪者奏待報四年詔曰諸州義倉用振乏絶頗聞重叠輸送未免勞煩其罷之宋史食貨志明道二年詔議復義倉不果景祐中集賢校理王琪請復置令五等已上戸隨夏秋二税二斗别輸一升水旱減税則免輸州縣擇便地置倉貯之領于轉運使計以一中郡正税歳入十萬石則義倉可得五千石推而廣之則利博矣且兼并之家占田常廣則義倉所入常多中下之家占田常狹則義倉所入常少及水旱振濟則兼并之家未必待此而濟中下之民實先受其賜矣事下有司㑹議議者異同而止慶歴初琪復上其議仁宗納之命天下立義倉詔上三等戸輸粟已而復罷其後賈黯又言願倣隋制立民社義倉詔下其説諸路以度可否以爲可行纔四路餘或謂賦税之外兩重供輸或謂恐招盜賊或謂已有常平足以振給或謂置倉煩擾于是黯復上奏曰臣嘗判尚書刑部見天下歳斷死刑多至四千餘人其間盜賊率十六七蓋愚民迫于飢寒因之水旱枉䧟重辟故臣請復民社義倉以備凶歳今諸路所陳𩔖皆妄議若謂賦税之外兩重供輸則義倉之意乃教民儲積以備水旱官爲立法非以自利行之既久民必樂輸若謂恐招盜賊盜賊利在輕貨不在粟麥今鄉村富室有貯粟數萬石者不聞有刼掠之虞且盜賊之起本由貧困臣建此議欲使民有貯積雖遇水旱不憂乏食則人人自愛而重犯法此正消除盜賊之原也若謂有常平足以振給則常平之設蓋以凖平穀價使無甚貴甚賤之傷或遇凶饑發以振捄既以失其本意而費又出公帑今國用頗乏所蓄不厚近歳非無常平小有水旱輙流離餓莩起爲盜賊則是常平果不足仰以振給也若謂置倉廪斂材木恐有煩擾則今州縣修治郵傳驛舎皆斂于民豈于義倉獨畏煩擾人情可與樂成不可與謀始願自朝廷斷而行之然當時牽于衆論終不果行通略熙寧二年正月初知齊州王廣淵唐州趙尚寛同州髙賦奏置義倉乃詔三司講求脩復社倉且圗經久之法使民樂輸而無擾至是廣淵以其法來上㑹知陳留縣蘇涓亦言臣領畿邑謹爲天下倡勸百姓置義倉以備水旱戸口第一等出粟二石二等一石三等五斗四等二斗五等一斗麥亦如之村有社社有倉倉置守者耆爲輸納縣爲籍記歳豐則量數以輸歳凶則出停藏既久又爲借貸之法使新陳相登多寡不一又爲通融之法使彼此相補上曰陳留輔邑聽行之餘訪利害玉海熙寧二年七月神宗欲復義倉㑹王安石主青苗因言人有餘粟乃使之輸官非良法也乃止熙寧末王古爲司農簿奏復行之仍聽就縣倉輸自是義倉入縣倉矣宋史食貨志熙寧十年詔開封府界先自豐稔畿縣立義倉法明年提㸃府界諸縣鎮公事蔡承禧言義倉之法以二石而輸一斗至爲輕矣乞今年夏税之始悉令舉行詔可仍以義倉隷提舉司京東西淮南河東陜西路義倉以今年秋料爲始民輸税不及斗免輸頒其法于川峽西路元豐八年罷諸路義倉紹聖元年詔除廣南東西路外並復置義倉自來歳始放税二分以上免輸所貯專充振濟輙移用者論如法先是諸路災傷截撥上供年額米斛數多致闕中都歳計令京東江南兩浙荆湖路義倉穀各留三分餘並起發赴京補還截撥之數宣和六年詔罷之蕙田案義倉之貯既云專充振濟乃復起發以補歳供缺額之數何與夫災傷截撥之米恩出自上者也義倉本非公家之物而亦取以入公家是特吝此振恤之舉巧取以罔民矣蓋自熙豐以來所謂義倉者名爲備荒實則加賦而已荒政考略紹興三年詔曰義倉之設所以備凶荒最爲良法州縣奉行不善寖失祖宗本意或遇水旱何以賑濟可令監司檢視實數補還侵失文獻通考紹興二十八年趙令詪言州縣義倉米積久陳腐乞出糶及水旱災荒不拘檢放及七分便許賑濟沈該奏在法義倉止許賑濟若出糶恐失初意乃令量糶三之一樁收價錢次年收糴撥還王圻續通考乾道八年戸部楊倓奏義倉在法惟充賑給不許他用今諸路常平義倉米斛訪聞皆是擅行侵用從來未曽稽考乞下諸路常平官限半月委逐州主管官取索五年的實放支數目仍開説逐年有無災傷檢及取給過若干并見在之數實計若干目今在甚處樁管結具保明文帳稽考施行從之林駉常平義倉論常平之法何始乎自李悝已有平糴之説至夀昌始定常平之䇿此其始也厥後罷于元帝復于顯宗隨罷隨復無有定制至于我朝淳化二年京師置塲有其法也景徳三年諸路置倉有所積也然増價以糴分命使臣減價以糶專命司農隨時遣用未有定職至熙寧以來提舉常平之官始定焉夫祖宗之始置常平也出内庫之儲以爲糴本頒三司之錢以濟常平粒米狼戾之時民艱于錢官則増價以入之菜色隱雷之日民之于食官則減價以出之夫何舉糴本而爲青苗之錢鬻廣倉以求二分之息伐桑易鏹官帑厚矣如民貧何鬻田輸官公家利矣如私害何此常平救荒之實政壞矣義倉之法何始乎自隋始置于鄉社至唐改置于州縣此其始也厥後弛于永徽壞于神龍隨罷隨復亦無定制至于我朝乾徳創之未幾而罷元豐復之未幾亦罷迨紹聖復以石輸五升大觀又以石輸一斗至于今日而義倉輸官之法始定焉夫古人始置義倉也自民而出自民而入豐凶有濟緩急有權名之以義則寓至公之用置之于社則有自便之利夫何社倉轉而縣倉民始不與而爲官吏之移用縣倉轉而郡倉民益相逺而爲軍國之資官知其斂未知其散民見其入未見其出此義倉之實政廢矣中興以來講明荒政常平錢穀專委一司而無䧟失之弊建民騷繹置倉長灘已有社倉之遺意天下豈有難革之弊今日常平義倉之儲雖有美名本無實惠惟州縣有侵借之患而支撥至有淹延之憂城邑近郊尚可少濟鄉落小民瘽身從事彼知官長皂吏爲何人一旦藜藿不繼又安能扶持百里取糴于塲以活其飢餓之莩哉是有之與無其理一也嗚呼孰知有甚者焉常平出于官義倉出于民出于官者官自斂之官自出之其弊雖不足以利民亦不至于病民出于民者民實出之官實斂之其弊不但民無給而官且病之文移星火指爲常賦籮頭斛面重斂取嬴噫可歎也愚謂民不必甚予特無取之足矣民不必甚利特無害之足矣平時奪其衣食之資一旦徒啖以濡沫之利樂歳不爲蓋藏之地凶年始思啼飢之民何益哉寧願爲不取繭絲之尹鐸毋願爲矯制擅發之汲黯寧願爲催科政拙之陽城不願爲發粟賑饑之韓韶則裕民實政隱于常平義倉之外昔邵先生有言諸賢能寛之一分則民受一分之賜有官守者其勉之蕙田案林氏論宋時常平義倉之弊最爲明切宋史食貨志淳熙八年浙東提舉朱熹言乾道四年民艱食熹請于府得常平米六百石振貸夏受粟于倉冬則加息計米以償自後隨年斂散歉蠲其息之半大饑即盡蠲之凡十有四年得息米造倉三間及以元數六百石還府見儲米三千一百石以爲社倉不復收息每石只收耗米三升以故一鄉四五十里間雖遇凶年人不闕食請以是行于倉司時陸九淵在敕令局見之歎曰社倉幾年矣有司不復舉行所以逺方無知者遂編入振恤凡借貸者十家爲甲甲推一人爲之首五十家則擇一通曉者爲社首每年正月告示社首下都結甲其有逃軍及無行之人與有税錢衣食不闕者並不入甲其應入甲者又問其願與不願願者開具一家大小口若干大口一石小口減半五歳以下不預請甲首加請一倍社首審訂虛實取人人手書持赴本倉再審無弊然後排定甲首附都簿載某人借若干石依正簿分兩時給初當下田時次當耘耨時秋成還穀不過八月三十日足濕惡不實者罰嘉定末真徳秀帥長沙行之凶年饑歳人多頼之然事久而弊或移用而無可給或拘催無異正賦良法美意胥此焉失玉海乾道四年戊子建人大饑朱熹居崇安請於郡得粟六百斛賑民是冬有年民願以償官因留里中而上其籍于府明年夏又請倣古法爲社倉以儲之歳一斂散既以紓民之急又得易新以藏俾願貸者出息什二歳小饑則弛半息大侵則盡蠲之爲倉三經始于七年五月而成于八月既成熹爲之記淳熙八年熹將詣左淛取崇安已行事宜抗奏於朝乞推而頒之諸道十一月二十八日命戸部㸔詳十二月二十二日從其請自是婺越鎮江建昌表潭諸邑多行之朱子建寧府崇安縣五夫杜倉記乾道戊子春夏之交建人大饑予居崇安之開耀鄉知縣事諸葛侯廷瑞以書來屬予及其鄉之耆艾左朝奉郎劉侯如愚曰民饑矣盍爲勸豪民發藏粟下其直以振之劉侯與予奉書從事里人方幸以不饑餓而盜發浦城距境不二十里人情大震藏粟亦且竭劉侯與予憂之不知所出則以書請于縣于府時敷文閣待制信安徐公嚞知州事即日命有司以船粟六百斛泝溪以來劉侯與予率鄉人行四十里受之黄亭歩下歸籍民口大小仰食者若干人以率受粟民得遂無饑亂以死無不悦喜歡呼聲動旁邑于是浦城之盜無復隨和而束手就擒矣及秋徐公奉祠以去而直敷文閣東陽王公淮繼之是冬有年民願以粟償官貯里中民家將輦載以歸有司而王公曰歳有凶穰不可前料後或艱食得無復有前日之勞其留里中上其籍于府劉侯與予既奉教及明年夏又請于府曰山谷細民無蓋藏之積新陳未接雖樂歳不免出倍稱之息貸食豪右而官粟積于無用之地後將紅腐不復可食願自今以來歳一斂散既以紓民之急又得易新以藏俾願貸者出息什二又可以抑僥倖廣儲蓄即不欲者勿强歳或不幸小饑則弛半息大饑則盡蠲之于以惠活鰥寡塞禍亂原甚大惠也請著爲例王公報皆施行如章既而王公又去直龍圗閣儀真沈公度繼之劉侯與予又請曰粟分貯民家于守視出納不便請放古法爲社倉以儲之不過出捐一歳之息宜可辦沈公從之且命以錢六萬助其役于是得籍坂黄氏廢地而鳩工度材焉經始于七年五月而成于八月爲倉三亭一門墻守舎無一不具司㑹計董工役者貢士劉復劉得輿里人劉瑞也既成而劉侯之官江西幕府予又請曰復與得輿皆有力于是倉而劉侯之子將仕郎琦嘗佐其父于此其族子右脩職郎玶亦亷平有謀請得與并力府以予言悉用書禮請焉四人者遂就事方且相與講求倉之利病且爲條約㑹丞相清源公出鎮兹土入境問俗予與諸君因得具以所爲條約者就正于公公以爲便則爲出教俾歸揭之楣間以示來者于是倉之庶事細大有程可久而不壞矣子惟成周之制縣都皆有委積以待凶荒而隋唐所謂社倉者亦近古之良法也今皆廢矣獨常平義倉尚有古法之遺意然皆藏于州縣所恩不過市井惰游輩至于深山長谷力穡逺輸之民則雖饑餓瀕死而不能及也又其爲法太宻使吏之避事畏法者視民之殍而不肯發徃徃全其封鐍逓相付授至或累數十年不一訾省一旦甚不獲已然後發之則已化爲浮埃聚壌而不可食矣夫以國家愛民之深其慮豈不及此然而未之有改者豈不以里社不能皆有可任之人欲一聽其所爲則懼其計私以害公欲謹其出入同于官府則鉤校彌宻上下相遁其害又必有甚于前所云者是以難之而有弗暇耳今幸數公相繼其愛民慮逺之心皆出乎法令之外又皆不鄙吾人以爲不足任故吾人得以及是數年之間左提右挈上説下教遂能爲鄉閭立此無窮之計是豈吾力之獨能哉惟後之君子視其所遭之不易者如此無計私害公以取疑于上而上之人亦毋以小文拘之如數公之心焉則是倉之利夫豈止于一時其視而傚之者亦將不止于一鄉而已也因書其本末如此刻之石以告後之君子云朱子婺州金華縣社倉記淳熙二年東萊呂伯恭父自婺州來訪予于屏山之下觀于社倉發斂之政喟然嘆曰此周官委積之法隋唐義廪之制也然子之穀取之有司而諸公之賢不易遭也吾將歸而屬諸鄉人士友相與糾合而經營之使閭里有賑恤之儲而公家無龠合之費不又愈乎然伯恭父既歸即登朝廷輿病還家又不三年而卒遂不果爲其卒之年浙東果大饑予因得備數推擇奉行荒政按行至婺則婺之人狼狽轉死者已籍籍矣予因竊嘆以爲向使伯恭父之志得行必無今日之患既而尚書下予所奏社倉事于諸道募民有欲爲者聽之民蓋多慕從者而未幾予亦罷歸又不果有所爲也是時伯恭父之門人潘君叔度感其事而深有意焉且念其家自先大夫時已務賑恤樂施予歳捐金帛不勝計矣而獨不及聞于此也于是慨然白其大人出家穀五百斛者爲之于金華縣婺女鄉安期里之四十有一都斂散以時規畫詳備一都之人頼之而其積之厚而施之廣蓋未已也一日以書來曰此吾父師之志母兄之惠而吾子之所建雖予幸克成之然世俗不能不以爲疑也子其可不爲我一言以觧之乎予惟有生之𩔖莫非同體惟君子爲無有我之私以害之故其愛人利物之心爲無窮特窮而在下則禹稷之事有非其分之所得爲者然苟其家之有餘而推之以予鄰里鄉黨則固吾聖人之所許而未有害于不出其位之戒也况叔度之爲此特因其墳廬之所在而近及乎十保之間以承先志以悦親心以順師指且前乎此者又已嘗有天子之命於四方矣而何不可之有哉抑凡世俗之所以病乎此者不過以王氏之青苗爲説耳以予觀于前賢之論而以今日之事騐之則青苗者其立法之本意固未爲不善也但其給之也以金而不以穀其處之也以縣而不以鄉其職之也以官吏而不以鄉人士君子其行之也以聚斂亟疾之意而不以慘怛惠利之心是以王氏能以行于一邑而不能以行于天下子程子嘗極論之而卒不免于悔其已甚而有激也予既得辭于叔度之請是以詳著其本末而又附以此意婺人蓋多叔度同門之士必有能觀于叔度所爲之善而無疑于青苗之説者焉則庶幾乎其有以廣夫君師之澤而使環地千里永無捐瘠之民矣豈不又甚美哉朱子建寧府建陽縣長灘社倉記建陽之南里曰招賢者三地接順昌甌寧之境甚陿多阻而俗尤勁悍徃歳兵亂之餘稂莠不盡去小遇饑饉輙復相挺羣起肆暴率不數歳一發雖尋即夷滅無噍類然愿民良族晷刻之間已不勝其驚擾矣紹興某年歳適大侵姦民處處羣聚飲博嘯呼若將以踵前事者里中大怖里之名士魏君元履爲言于常平倉使者袁侯復一得米若干斛以貸于是物情大安姦計自折及秋將斂元履又爲請得築倉長灘廐置之旁以便輸者且爲後日凶荒之備毋數以煩有司自是歳小不登即以告而發之如是數年三里之人始得飽食安居以免于震擾夷滅之禍而公私逺近無不隂受其賜蓋元履少好學有大志自爲布衣而其所以及人者已如此䝉其惠者雖知其然而未必知其所以然也其後元履既沒官吏之職其事者不能勤勞恭恪如元履之爲于是粟腐于倉而民飢于室或將發之則上下請賕爲費已不貲矣官吏來徃又不以時而出納之際隂欺顯奪無弊不有大扺人之所得糠粃居半而償以精鑿計其候伺亡失諸費徃徃有過倍者是以貸者病焉而良民凛凛于凶歳猶前日也淳熙十一年使者宋侯若水聞其事且知邑人宣教郎周君明仲之賢即以元履之事移書屬之且下本臺所被某年某月某日制書使得奉以從事蓋歳以夏貸而冬斂之且收其息什之二焉行之三年而三里之間人情復安如元履無恙時什二之收歳以益廣周君既已増葺其棟宇又將稍振其餘以漸及于傍近蓋其惠之所及且將日增月衍而未知其所極也周君以予嘗有力于此者來請文以爲記予與元履早同師門遊好甚篤既追感其陳迹又嘉周君之能繼其事而終有成也乃不辭而爲之説如此則又念昔元履既爲是役而予亦爲之于崇安其規模大略倣元履獨歳貸收息爲小異元履常病予不當祖荆舒聚斂之餘謀而予亦每憂元履之粟久儲速腐惠既狹而將不久也講論餘日盃酒從容時以相訾謷而訖不能以相詘聽者從旁抵掌觀笑而亦不能決其孰爲是非也及是宋侯周君乃卒用子所請事以成元履之志而其效果如此于是論者遂以予言爲得然不知元履之言雖疏而其忠厚懇惻之意藹然有三代王政之餘風豈予一時苟以便事之説所能及哉當時之爭蓋予之所以爲戱而後日之請所以必曰息有年數以免者則猶以不忘吾友之遺教也因并書之以示後人使于元履當日之心有以得之則于宋侯周君今日之法有以守而不壞矣朱子常州宜興縣社倉記始予居建之崇安嘗以民饑請于郡守徐公嚞得米六百斛以貸而因以爲社倉今幾三十年矣其積至五千斛而歳斂散之里中遂無凶年中間䝉恩召對輙以上聞詔施行之而諸道莫有應者獨閩帥趙公汝愚使者宋君若水爲能廣其法于數縣然亦不能逺也紹熙五年春常州宜興大夫髙君商老實始爲之于其縣善拳開寳諸鄉凡爲倉者十一合之爲米二千五百有餘斛擇邑人之賢者承議郎趙君善石周君林承直郎周君世徳以下二十有餘人以典司之而以書來屬予記予心許之而未及爲也㑹是歳淛西水旱常州民飢尤劇流殍滿道顧宜興獨得下熟而貸之所及者尤有賴焉然予猶慮夫貸者之不能償而髙君之惠將有所窮也明年春髙君將受代以去乃復與趙周諸君皆以書來趣予文且言去歳之冬民負米以輸者繦屬爭先視貸籍無龠合之不入予于是益喜髙君之惠將得以久于其民又喜其民之信愛其上而不忍欺也則爲之記其所以然者抑又慮其久而不能無弊于其間也則又因而告之曰有治人無治法此雖老生之常談然其實不可易之至論也夫先王之世使民三年耕者必有一年之蓄故積之三十年則有十年之蓄而民不病于凶饑此可謂萬世之良法矣其次則漢之所謂常平者今固行之其法亦未嘗不善也然考之于古則三登太平之世蓋不常有而騐之于今則常平者獨其法令簿書筦鑰之僅存耳是何也蓋無人以守之則法爲徒法而不能以自行也而况于所謂社倉者聚可食之物于鄉井荒閒之處而主之不以任職之吏馭之不以流徙之刑苟非常得聰明仁愛之令如髙君又得忠信明察之士如今日之數公者相與併心一力以謹其出納而杜其姦欺則其法之難守不待他日而見之矣此又予之所身試者故并書之以告後之君子云陸氏九淵曰社倉固爲農之利然年常豐田常熟則其利可久苟非常熟之田一遇歉歳則有散而無斂來歳缺種糧時乃無以賑之莫如兼置平糴一倉豐時糴之使無價賤傷農之患闕時糶之以摧富民閉糴昂價之計折所糴爲二每存其一以備歉歳代社倉之匱實爲長利也丘氏濬曰朱子社倉之法固善矣然里社不能皆得人如熹者以主之又不能皆得如劉如愚父子者以爲之助熹固自言其數年之間左提右挈上説下教爲鄉閭立此無窮之計然則其成此倉也蓋亦不易矣然則其法不可行歟曰熹固言里社不能皆有可任之人欲一聽其所爲則懼其計私以害公欲謹其出入則鈎校靡宻上下相遁其害又有甚于官府者矣蕙田案隋之義倉設于當社故亦曰社倉唐初猶沿其名史所云社倉者即義倉也熙寧以後義倉之徴於官者民既不得與由是士大夫講求社倉之遺法别立倉于里閭而社倉與義倉始判而爲二其法主之以鄉耆不以官吏儲之于里保不于郡縣其貸也無守候尅扣之弊其輸也無追呼徴比之繁可謂盡善矣然社首不皆得可任之人民間不能無侵欠之弊欲繩以官法則公私不無煩擾欲任其所爲則上下或至相䝉此朱子當日屢以有治人無治法爲言而後之踵其法者多出于一鄉一邑之善士而不得徧及于天下也觀承案常平社倉之外如韓琦之廣惠倉周忱之濟農倉亦皆有益於民可相輔而行然總之要在得人耳誠得其人雖青苗差役亦未至遽病於民不得其人雖常平義社亦何嘗不可累民哉此有治人無治法雖老生常談實千古不刋之論朱子當日故屢以爲言也乎王圻續通考淳熙十一年勘㑹諸路州縣義倉米斛在法合隨正苗交納惟乞賑糶今收成在即當議指揮詔諸路提舉常平官各行下所部州軍仰隨鄉分豐歉依條收納不得侵𨼆他用候歳終具舊管新收數目申尚書省宋史光宗本紀紹熙二年正月命兩淮行義倉法食貨志慶元元年詔戸部右曹領義倉文獻通考嘉定十一年五月臣僚言頃歳議臣有請計義倉所入之數除附郭縣就州輸納外餘令逐縣置數自行收受非惟革州郡侵移之弊抑亦省凶年轉般之勞曩時州倉隨苗帶納同輸一鈔今正苗輸之州義倉輸之縣則輸爲兩輸鈔爲二鈔矣曩時䑕雀之耗蠧吏卒之須求一切倚辦于正税而義倉不預焉今付之于縣既無正税獨有此色耗蠧須求又不能免矣於是議臣有請令人戸義倉仍舊隨正税從便就州作一鈔輸納而州縣復有侵移之弊臣聞紹興初臺臣嘗請通計一縣之數截留下戸苗米于本縣納開禧初議臣之請亦如之蓋截留下戸之税米以補一縣之義倉其餘上戸則隨正税而輸之州州得以補償其截留下戸之數則州不以爲怨縣得此米别項儲之以備賑濟使窮民不致於艱食則縣不以爲撓一舉而三利得此上䇿也唯是負郭之義倉則就州輸送自如舊制至于屬縣之義倉則令丞同主之每歳之終令丞合諸鄉所入之數上之守貳守貳合諸縣所入之數上之提舉常平提舉常平合一道之數上之朝廷令丞替移必批印紙考其盈虧以議殿最從之王圻續通考紹定六年二月郎官王定奏義倉爲官吏蠧耗上曰此自是民戸寄留于官專爲水旱之備務令覺察宋史食貨志景定五年監察御史程元岳奏隨秔帶義法也今秔糯帶義之外又有所謂外義焉者絹紬豆也豈有絹紬豆而可加之義乎縱使違法加義則絹加絹紬加紬豆加豆猶可言也州縣一意椎剥一切理苗而加一分之義甚者赦恩已蠲二税義米依舊追索貧民下戸所欠不過升合星火追呼費用不知幾百倍破家蕩産鬻妻子怨嗟之聲有不忍聞望嚴督監司止許以秔帶義其餘盡罷其有循習病民者重其罰從之蕙田案宋義倉一置于乾德再置于慶歴俱未久而廢熙寧以後始常置之雖罷于元祐之始旋復于紹聖之初沿及南渡其弊日甚民之輸于官者既爲公私蠧耗而無以爲水旱之備官之徴于民者復多違例巧取而不勝其悉索之苦於是便民之法遂成厲民之舉矣王圻續通考淳祐三年八月詔申嚴郡國社倉科配之禁黄震社倉記咸淳七年余承乏撫州適歳大饑賴撫之賢士大夫相與講求賑貸因多有以社倉事來論臨川縣李君德傑首以書來曰鄉有李令君捐粟六百石爲倡將成社倉幸因以風厲其餘余報曰社倉之法之良之可慕也亦甚矣社倉之弊之苦之可慮也余前歳負丞廣德見社倉元息二分而倉官至取倍稱之息州縣輾轉侵漁而社倉或無甔石之儲其法以十戸爲率一戸逃亡九戸賠補逃者愈衆賠者愈苦久則防其逃也或坐倉展息而竟不貸本或臨秋貸錢而白取其息民不堪命或至自經僉謂此文公法也無敢議變余謂非變其法也救其弊耳乃爲之請于朝曰法出于黄帝堯舜尚變通法立于三代盛王須損益安有法本先儒而不可爲之救弊使法本于先儒坐視其弊而不捄豈先儒所望于後之人哉朝廷可之既又念臨以官司之煩不若聽從民間之便也又爲之請于朝曰朱文公社倉法主于減息以濟民王荆公青苗法亦主于減息以濟民而利害相反者青苗行之以官司社倉主之以鄉曲耳故我孝宗皇帝頒文公法于天下令民間願從者聽官司不得與廣德社倉剏于官故其弊不一請照本法一切歸之民朝廷又可之余遂得窮年餘之力經理更革以其收息買田六百畝承貸人戸認息且使常年不貸惟荒年則貸之而不復收息凡費皆取辦于六百畝官田之租事甫集而余去官未知近何如至今猶念念不能忘此余親歴于廣德者如此若凡他州各縣之有社倉者聞其弊徃徃而然殆不勝述及來撫州社倉幸皆鄉曲之自置有如文公初立之本法然倚美名以牟厚利者亦已不少余方爲之悚然以懼何敢更以官司預社倉之事哉大抵小民假貸皆起于貧貸時則易還時則難貸時雖以爲恩索時或以爲怨倘稍從而變通之鳩錢買田豐年聚租荒年賑散不惟不取其息併亦不取其本庶乎有利而無害凡皆余答李君之説如此而未敢以爲信也未幾金谿李君沂復以社倉法來俾余爲記及閲實其始末盡一家自爲之計而依法惟取二分之息不借勢于官不鳩粟于衆故能至今無弊利民爲溥置倉如此信能以文公之濟人者濟人矣然有治人無治法良法易泯流弊難防君能如文公更望君之子孫世世如君也因録所報李君之説以遺之先是郡之新豐饒君景淵亦嘗以社倉求余爲記其法取息視文公尤輕貸而負者去其籍而不責其償事益省而民益安并書以遺之蕙田案淳祐詔書及黄東發所記社倉雖良法主之不得其人其流弊不免如此遼史食貨志統和十三年詔諸道置義倉歳秋社民隨所穫戸出粟庤倉社司籍其目歳儉發以振民元史食貨志義倉亦至元六年始立其法社置一倉以社長主之豐年毎親丁納粟五斗驅丁二斗無粟聽納雜色歉年就給社民於是二十一年新城縣水二十九年東平等處饑皆發義倉賑之皇慶二年復申其令元趙天麟復置義倉䇿隋開皇五年長孫平奏令軍民當社共立義倉收穫之日隨其所得各出粟麥儲之當社社司檢校勿使損壞當社饑饉即用賑給至于隋末公私廪積可供五十年長孫平之力也迨至元六年有㫖每社立一義倉社長主人每遇年熟毎親丁納粟五斗驅丁二斗無粟聽納雜色官司並不得拘檢借貸勒支後遇歉歳就給社民食用社長明置收支文歴無致損耗自是以來二十餘年于今矣然而社倉多有空乏之處頃來水旱相仍蝗螟蔽天饑饉荐臻四方迭苦轉互就食老弱不能逺移而殍者衆矣彼隋立義倉而富今立義倉而貧豈今民之不及隋民哉臣試陳之今條欵使義倉計丁納粟意以饑饉之時計丁出之以取均也又條欵使驅丁半之彼驅丁亦人也尊卑雖異口腹無殊至儉之日驅丁豈可獨半食哉又計丁出納則婦人不納豈不食哉又同社村居無田者豈可坐視而獨不𫉬哉樂歳粒米狼戾乞丐者踵門猶且與之况一社之人而至儉歳豈宜分彼此哉是蓋當時大臣議法者有乖陛下之本心也伏望陛下普頒明詔詳諭農民凡一社立社長社司各一人社下諸家共穿築倉窖一所爲義倉凡子粒成熟之時納則計田産頃畝之多寡而聚之凡納例常年每畝粟率一升稻率二升凡大有年聽自相勸督而増數納之凡水旱螟蝗聽自相免凡同社豐歉不均宜免其歉者所當納之數凡饑饉不得已之時出則計口數之多寡而散之凡出例每口日一升儲多毎口日二升勒爲定體凡社長社司掌管義倉不得私用凡官司不得拘檢借貸及許納雜色皆有前詔在焉如是則非惟共相賑救而義風亦行矣明史食貨志𢎞治中江西巡撫林俊嘗請建常平及社倉嘉靖八年乃令各撫按設社倉令民二三十家爲一社擇家殷實而有行義者一人爲社首處事公平者一人爲社正能書算者一人爲社副每朔望㑹集别戸上中下出米四斗至一斗有差斗加耗五合上戸主其事年饑上戸不足者量貸稔歳還倉中下戸酌量振給不還倉有司造冊送撫按歳一察覈倉虛罰社首出一歳之米其法頗善然其後無力行者廣治平略嘉靖中侍郎王廷相言備荒之政莫善于古之義倉若立倉于州縣則窮鄉就倉旬日待斃宜貯之里社定爲規式一村之間約二三百家爲一㑹每月一舉第上中下戸捐粟多寡各貯于倉而推有德者爲社長善處事能㑹計者副之若遭凶歳則計戸而散先中下者後及上戸上戸責之償中下者免之凡給貸悉聽于民第令登記冊籍以備有司稽考則既無官府編審之煩亦無奔走道路之苦從之蕙田案以上義倉宋史食貨志周顯德中置惠民倉以雜配錢分數折粟貯之歳歉減價出以惠民宋㑹要淳化五年十月令諸州惠民倉故穀遇糴稍貴減價糶與貧民人不過一斛宋史食貨志咸平中庫部員外郎成肅請福建増置惠民倉因詔諸路申淳化惠民之制嘉祐二年詔天下置廣惠倉初天下沒入戸絶田官自鬻之樞宻使韓琦請留勿鬻募人耕收其租别爲倉貯之以給州縣郭内之老㓜貧疾不能自存者領以提㸃刑獄歳終具出納之數上之三司戸不滿萬留田租千石萬戸倍之戸二萬留三千石三萬留四千石四萬留五千石五萬留六千石七萬留八千石十萬留萬石田有餘則鬻如舊四年詔改𨽻司農寺州選官二人主出納歳十月遣官騐視應受米者書名於籍自十一月始三日一給人米一升㓜者半之次年二月止有餘乃及諸縣量大小均給之其大略如此神宗本紀熙寧四年春正月王安石請鬻天下廣惠倉田爲三路及京東常平倉本從之哲宗本紀元祐三年正月復廣惠倉玉海正月二日詔復置廣惠倉從侍講范祖禹之言也二月十二日給廣惠倉錢三萬緡紹聖元年九月罷廣惠倉食貨志哲宗雖詔復廣惠倉既而章惇用事又罷之賣其田如熙寧法孝宗本紀乾道五年復置成都府廣惠倉寧宗本紀慶元元年五月詔諸路提舉司置廣惠倉廣治平略明太祖起自民間歴試艱難尤軫念民瘼洪武元年令各處番立預備倉各爲糶糶收貯以備災荒擇其地年髙篤實者管理已而命戸部運鈔二百萬貫徃各州府縣預備糧儲如一縣則于境内定爲四所于居民叢襍處置倉民家有餘粟願易鈔者許運赴倉交納依時價償其直官儲粟而扄鑰之就令富民守視若遇凶歳則開倉賑給庶幾民無饑餒之患已又令未備處皆舉行而召天下老人至京隨朝命擇其可用者使齎鈔徃各處恊同所在官司糴穀爲備杭州府志明預備倉始名老人倉洪武初令天下州縣鄉都各量置倉擇耆老一人主之故名爲老人倉其法每遇歳豐縣官勸令諸鄉足食家出米穀不等儲蓄之官籍其數凶年許其本鄉下戸借貸秋成抵斗還官著爲令有古義倉遺意王圻續通考宣德元年六月巡按湖廣御史朱鑑言洪武間各府州縣皆置東西南北四倉以貯官穀多者萬餘石少者四五千石倉設富民守之遇有水旱饑饉以貸貧民今各處有司以爲不急之務倉厫廢弛贖穀罰金掩爲已有深負朝廷仁民之意乞令府州縣脩倉厫謹貯積給貸以時仍令布按二司巡按御史巡察違者罪之上諭戸部曰此祖宗良法美意此由守令不得人遂致廢弛爾戸部亦豈能無過其如御史言違者從按察司監察御史劾奏廣治平略南直巡撫周忱奏定濟農倉之法南畿蘇州諸郡田税最重貧民輸官及耕作多舉債于富家而倍納其息至于傾家産鬻子女不足以償于是民益逃亡而租税益虧忱思所以濟之㑹朝廷許以官鈔平糴且勸借貯積以待賑忱與諸郡恊謀而力行之蘇州得米三十萬石松江常州有差分貯于各縣名其倉曰濟農先是各府秋糧當輸者糧長里胥多厚取于民而不即輸官逃負者累歳忱欲盡革其弊乃立法于水次置塲擇人總收而𤼵運焉細民徑自送塲不入里胥之手既免勞民且省費六十萬石以入濟農倉于是蘇州得米四十餘萬石益以各塲儲積之贏及前平糴所儲凡六十餘萬有竒松常二郡次之自是不獨濟農凡運輸有欠失者亦于此給借部納秋成如數還官若民夫修圩岸濬河道有乏食者計口給之擇縣官亷公有威與民之賢者掌其籍司其出納每歳插蒔之際于中下二等戸内騐其種田多寡齊分給之秋成償官明㑹典正統五年奏准各處預備倉凡侵盜私用冒借虧欠等項糧儲查追完足免治其罪其侵盜證佐明白不服賠償者准土豪及盜用官糧論罪廣治平略成化中敕藩憲言異時州縣設預備四倉所以廣儲蓄備旱澇爲民賴也比久廢弛宜覈實見在儲蓄有無多寡之數仍儘各處在官贓贖糴米爲備有不敷聽于存留糧内借撥或于各里上中戸勸助以充其㸔守倉者于附近里分僉殷實有行止者主人至通同官吏實收虛放爲侵盜者論如律衛所地亦如之明㑹典成化九年令直𨽻保定等府州縣兩考役滿吏典于預備倉納米一百石起送吏部免其辦事考試就撥京考二百五十石免其京考冠帶辦事一百七十名就于本府撥補三考滿日送部免考冠帶辦事俱挨次選用其一考三個月以裏無缺者納米八十石許于在外輳歴兩考𢎞治十年奏准凡三年一次查盤預備倉糧除義民情願納粟囚犯贖罪納米外但有空閑官地佃收租米及贓罰紙價引錢不係起觧支剰無礙官錢盡數糴米三年之内不足原數俱免住俸恭究正德二年令雲南撫按同三司掌印等官查勘各庫藏所積除軍前支用銀物外其餘堪以變賣及官地湖地等項可以召人佃種收租者儘數設法糴買米穀上倉專備賑濟又議准各司府州縣衛所問刑衙門凡有例該納米者每石折穀一石五斗收貯各預備倉明史食貨志預備倉之設也太祖選耆民運鈔糴米以備振濟即令掌之天下州縣多所儲蓄後漸廢弛于謙撫河南山西脩其政周忱撫南畿别立濟農倉他人不能也正統時重侵盜之罪至僉妻充軍且定納穀千五百石者勅奬爲義民免本戸雜役凡振饑米一石俟有年納稻穀二石五斗還官𢎞治三年限州縣十里以下積萬五千石二十里積二萬石衛千戸所萬五千石百戸所三百石考滿之日稽其多寡以爲殿最不及三分者奪俸六分以上降調十八年令贖罪贓罰皆糴穀入倉正德中令囚納紙者以其八折米入倉軍官有犯者納穀凖立功初預備倉皆設倉官至是革令州縣官及管糧食官領其事嘉靖初諭德顧鼎臣言成𢎞時每年以存留餘米入預備倉緩急有備今秋糧僅足兑運預備無粒米一遇災傷輙奏留他糧及勸富民借穀以應故事乞急復預備倉糧以裕民蕙田案明初預備倉或出于民間輸助似隋之義倉也或出于官倉盈餘似宋之廣惠倉也其後凡囚犯之贓贖吏典之捐職悉取以入預備倉宜其儲積日富無水旱饑饉之患矣嘉靖初顧鼎臣乃有預備無粒米之奏則以官司之實力奉行者少而公私之侵漁者多也又案以上惠民廣惠預備濟農諸倉右備荒之政周禮地官司稼巡野觀稼以年之上下出斂法注斂法者豐年從正凶荒則損若今十傷二三實除減半而疏謂秋熟時觀稼善惡則知年上下豐凶以此豐凶出税斂之法云若今十傷二三實除減半者鄭舉漢法以况義漢時十分之内傷二分三分餘有七分八分在則就七分八分中爲實在仍減去半不税于半内税之以凶荒故優饒民可也陳氏傅良曰預前觀其稼而後上下其出斂之法若不預前觀稼如何上下其法得劉晏正傳此法每四方水旱則先知之然後為賙救收斂之政蕙田案周禮田税之制雖有常式而又命司稼一官巡視稼之美惡以知年之上下小耗則減之大耗則除之龍子所云糞其田而不足則必取盈者此夏時衰亂之政而周初無之也後世檢勘災傷分數之法實出于此後漢書和帝本紀永元五年二月詔曰去年秋麥入少恐民倉不足其上尤貧不能自給者戸口人數徃者郡國上貧民以衣履釡鬵爲貲而豪右得其饒利詔書實覈欲有以益之而長吏不能躬親反更徴召㑹聚令失農作愁擾百姓若復有犯者二千石先坐殤帝本紀延平元年七月敕司𨽻校尉部刺史曰間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穣虛飾之譽遂覆蔽災害多張墾田不揣流亡競增戸口掩匿盜賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不媿于人假貸之恩不可數恃自今以後將糾其罰二千石長吏其各實覈所傷害爲除田租芻槀舊唐書代宗本紀大歴十二年冬十月乙巳京兆尹黎幹奏水損田三萬一千頃度支使韓滉奏所損不多兼渭南令劉藻曲附滉亦云部内田不損差御史趙計檢渭南田亦附滉云不損上曰水旱咸均不宜渭南獨免復命御史朱敖檢之渭南損田三千頃上歎息曰縣令職在字人不損亦宜稱損損而不聞豈有䘏隱之意耶劉藻趙計皆貶官冊府元龜元和六年十月制曰今年畿内田苗應水旱損處無聞至今檢覆未定又屬霖雨所損轉多有妨農收慮致勞擾其諸縣勘覆有未畢處宜令所司據元訴狀便與破損不必更令檢覆其未經申訴者亦宜與𩔖例處分燕翼貽謀錄民間訴水旱舊無限制或秋而訴夏旱或冬而訢秋旱徃徃于收割之後欺罔官吏無從覈實拒之則不可聽之則難信故太宗淳化二年正月丁酉詔荆湖江淮二浙四川嶺南管内州縣訴水旱夏以四月三十日秋以八月三十日爲限自此遂爲定制宋史食貨志天禧初詔諸路自今候登熟方奏豐稔或已奏豐稔而非時災沴者即須上聞違者重寘其罪先是民訴水旱者夏以四月秋以七月荆湖淮南江浙川峽廣南水田不得過期過期者吏勿受令佐受訴即分行檢視白州遣官覆檢三司定分數蠲税亦有朝㫖特増免數及應輸者許其倚閣京畿則特遣官覆檢太祖時亦或遣官徃外州檢視不爲常制傷甚有免覆檢者至是又以覆檢煩擾止遣官就田所閲視即定蠲數范祖禹封還臣竂論浙西賑濟事狀臣竊詳臣竂所言朝廷已賜米百萬錢二十餘萬州縣亦自依條發倉廪作粥飯救濟行將少蘇矣臣竊以作粥救饑最出下䇿夫民相聚食粥則疾疫將起饑困已甚死者必衆此乃災傷之極正當憂慮豈得便爲少蘇又言細民習爲驕虛以少爲多其弊已久臣竊謂常年小有旱澇被訴災傷僥倖之民或容有此今浙西災害甚大民已流散乞食迫于死亡方且疑其習爲驕虛而不加信何其忍哉又言乞詔監司州縣詳具災傷分數賑貸行遣次第各行申奏而懲責其尤甚者臣竊謂朝廷以侍從之臣爲一路鈐轄又選差監司以徃行未及境未及設施朝廷既不憑信鈐轄司之言又約監司州縣如此臣恐官吏手不能有所施爲上下觀望各求苟免夫奏災傷分數過實賑濟用物稍廣此乃過之小者正當闊略不問以救人命若因此懲責一人則自今官司必將坐視百姓之死而不救矣又臣竂言人言異同不可不察乞下鈐轄提轉及蘇湖等五州各令開具逐州水災所及凡幾縣幾村有無漂蕩廬舎溺死人口及髙田無水與水退可耕之地各約若干並令詣實申奏不得相闗稍渉謬妄乞重行降黜臣伏見近日浙西申奏自今年正月大雨至六月太湖泛溢蘇湖秀等州城市並遭水浸田不布種廬舎漂蕩民棄田賣牛散走乞食臣謂朝廷聞此當令官司如救焚拯溺猶恐不及今若降此指揮逐縣村須遣人抄劄廬舎人口田土數目饑荒之際此等行遣必爲煩擾一事不實即憂及罰闔境皆死未必𫉬罪如此則賑濟却爲閒慢百姓愈無救矣又言近日别遣使者支撥斛斗百萬見錢度牒約二十萬不爲不多若見今未種今秋無𫉬則向去賑濟之期甚逺所差去官當相度事體措置一有失當其害非輕今所差去官與時暫遣使不同若向去賑濟期日長逺此乃本司職事在彼自當責任當且委以措置不須約束免有疑惑觀望臣竊以今水潦方降秋田殊未有望審如臣竂所言令秋無𫉬本路必更奏請朝廷亦當接續應副則前日所賜未足爲多常平倉本無給散之法惟廣惠倉許賑濟不足方許通支常平放税及五分處仍不得過所限之數兩倍浙西鈐轄司近方奏乞不限石斗尚未降朝㫖又奏夏田元未放税以此觀之官司守法止有賑救不及之事必無過當之理臣竂又言乞令賑濟官司措置稍大事件並申取朝廷指揮其急切不可待報者雖一面施行亦須便具畫一奏知所貴朝廷察其中平緩急未便可以救止臣伏見英宗時臣叔祖鎮出知陳州辭日英宗宣諭陳州累年災傷卿到彼悉心賑撫臣鎮至州方值春種即發常平倉貸民種糧提刑司奏劾官吏詔釋不問陳州至京不數日可以徃返然猶不先奏而行恐不及于事也神宗時西京大水遣郎官一人御藥院内侍一人賑恤多方救濟北京亦然朝廷未嘗先爲條約以防之也今兩浙在二千里外事稍大者若須申奏比及得報即已後時雖急切許一面施行若官司畏避事無大小一皆奏請不敢專行則此法豈不爲害臣伏覩浙西鈐轄轉運司前後申奏累年災傷今歳大水以至結罪保明奏乞斛斗度牒又云父老言四十年無此水災近奏蘇州饑民死者日有五七百人饑疫更甚于熙寧時又湖州奏貧人入城死者相繼遺棄男女官爲收養據此則災傷輕重亦可知矣今詳臣竂所言大意唯以朝廷所賜錢斛不少恐災傷不至如所奏故欲考察虛實懲責謬妄然臣之愚慮竊謂朝廷已賜錢斛百二十萬德深澤厚又選監司以徃免更臨遣專使今監司方出國門錢斛纔至本路即降此指揮約束百姓必謂朝廷重惜錢斛輕棄人命百二十萬已厭其多將來乏食日逺復何所望所吝者財物所失者人心况本路有鈐轄司轉運提刑司發運司互相監臨而轉運司主財不欲多費故祖宗以來賑濟委提刑司蓋恐轉運司惜物也監司州縣有凶年饑饉皆不得已而上聞亦豈肯于無災之地賑不饑之民耗散倉廪坐失租税以取不辦之責哉今唯當戒飭官司多爲方略存活人命寛其約束責其成效庶幾餘民早𫉬安堵唯是給散無法枉耗官廪賑救不及貧弱出糶反利并兼措置乖方所宜約束然此乃監司使者之事朝廷亦難遥爲處畫也若監司得人此弊自少誠使有之則人言相傳亦豈可掩臺諫足以風聞彈奏朝廷足以考察案核未爲晩也今先降此指揮徒能牽制撓亂其所爲耳伏望聖慈以逺方生靈性命爲念無以官司賑濟過甚爲憂其臣寮所言伏乞更不施行蕙田案臣寮所言大略慮報災之不實欲遣申覆實數又令官司賑濟先奏後行祖禹此狀逐條分析字字皆中肯綮至云官司守法止有賑救不及之事必無過當之理誠千古名言也文獻通考淳熙十年先是戸部尚書曾懷申請妄訴災傷僥倖減免税租許人告依條斷罪仍沒其田一半充賞至是江東運副蘇諤奏詐稱災傷止是規免本年一料税租斷罪給賞已是適中難以拘沒其田從之蕙田案小民妄訴災傷固不能保其必無但懲之太重雖災傷果實誰復有陳訴者名爲杜絶僥倖其實則欲使民隱不得上聞而已馬氏詆曾懷爲刻剥小人宜哉朱子與星子諸縣議荒政書一檢放之恩著在令甲謹已遵奉施行今請同官當其任者少帶人從嚴切戒約給與糧米錢物不得縱容需索騷擾又須不憚勞苦逐一親到地頭不可端坐寛凉去處止據鄉保撰成文字又須依公檢定分數切不可將荒作熟亦不可將熟作荒其間或有疑似去處或有用力勤苦之人寧可分明過加優恤不可縱令隨行胥吏受其計囑别作情弊奏救荒畫一事件狀臣昨具奏諸州雨暘次第曾有貼黄奏禀乞詔州郡依條受理旱帳及早差官檢放事蓋爲田稻既是乾損及其未穫之際便行檢踏即荒熟之狀明白易知非惟官司不得病民亦使姦民無由僥倖所以著令訴旱自有三限夏田四月秋田七月水田八月蓋欲公私兩便近來官吏不曾考究令文但據傳聞云訴旱至八月三十日斷限遂至九月方檢早田則非惟田中無稼之可觀至于根查亦不復可得而見矣於是將旱損早田一切不復檢踏蠲放窮民受苦無所告訴而其狡猾有錢賂吏者則乗此暗昧以熟爲荒瞞官作弊皆不可得而稽考去歳本路諸州大率皆然欲乞降指揮劄下轉運司及本司遍牒諸州縣疾速受理旱狀目下差官檢踏早田荒熟分數其中晚稻田却候八月受狀節次檢踏如有奉行違慢後時失實之處許兩司按劾以聞庶幾窮民將來𫉬霑實惠金史章宗本紀明昌二年四月戊子制諸部内災傷主司應言而不言及妄言者杖七十檢視不以實者罪如之因而有傷人命者以違制論致枉有徴免者坐贓論妄告者戸長坐詐不以實罪計贓重從詐匿不輸法食貨志明昌二年二月敕自今民有訴水旱災傷者即委官按視其實申所屬州府移報提刑司同所屬檢畢始令翻耕元史世祖本記至元二十年正月諭自今管民官凡有災傷過時不申及按察司不即行視者皆罪之明㑹典凡報勘災傷洪武十八年令災傷去處有司不奏許本處耆宿連名申訴有司極刑不饒永樂二十二年令各處災傷有按察司處按察司委官直隷處巡按御史委官㑹同踏勘廣治平略永樂五年帝聞河南饑而有司匿不以聞又有言雨暘時若禾稼茂實者及遣人視之民所收有十不及五者有十不及一者亦有掇草實爲食者乃亟命發粟賑之逮其官悉寘于法仍榜諭天下有司自今民間水旱災傷不以聞者必罪不宥荒政考略洪熙元年詔曰各處遇有水旱傷災所司即便從實奏報以憑寛恤母得欺隱坐視民患明㑹典成化十二年令各處巡按御史按察司官踏勘災傷係民田者㑹同布政司官係軍田者㑹同都司官𢎞治十一年令災傷處所及時委官踏勘夏災不得過六月終秋災不得過九月終若所司報不及時風憲官狥情市恩勘有不實者聽戸部恭究神宗九年題准地方凡遇重大災傷州縣官親詣勘明申呈撫按巡撫不待勘報速行奏聞巡按不必等候部覆即將勘實分數作速具奏以憑覆請賑恤至于報災之期在腹裏地方仍照舊例夏災限五月秋災限七月内沿邊如延寧甘固宣大山西薊宻永昌遼東各地方夏災改限七月内秋災改限十月内俱要依期從實奏報如州縣衛所官申報不實聽撫按恭究如巡撫報災過期或匿災不報巡按勘災不實或具奏遲延併聽該科指名恭究又或報時有災報後無災及報時災重報後災輕報時災輕報後災重巡按疏明白從實具奏不得執泥巡撫原疏致災民不沾實惠右檢勘災傷周禮春官典瑞珍圭以䘏凶荒注珍圭王使之瑞節王使人憂凶荒之國則授之執以徃致王命焉䘏者闓府庫振救之易氏祓曰珍有貴重之義賑救執之以為信也秋官小行人若國凶荒則令賙委之疏宗伯云荒禮哀凶札此云國凶荒則賙委之者彼謂自貶損此謂令他人以財委之唐開元禮賑撫諸州水旱蟲災賑撫藩國水旱附皇帝遣使賑撫諸州水旱蟲災本司散下其禮所司隨職供辦使者未到之前所在長官先勒集所部竂佐等及正長老人本司先於廳事大門外之右設使者便次南向又於大門外之右設使者位東向大門外之左設長官以下及所部位重行北向西上於廳事之庭少北設使者位南向及於使者位之南三丈所設長官位北向其所部寮屬則位于長官之後文東武西毎等異位重行北面相對爲首正長老人則位其南重行北面西上使者到所司迎引入便次長官及所部嚴肅以待正長老人等並列于大門外之南重行北面西上至時使者以下各服其服所在長官及所部竂佐亦各服公服行恭軍引長官以下出就門外位立司功恭軍引使者出就門外位立持節者立于使者之北史二人對舉制案列于使者之南俱少退東向行恭軍贊拜長官及所部在位者皆拜拜訖行恭軍引長官等以次先入立于門内之右重行西面司功恭軍引使者入幡節前導持案者從之使者到庭中位立持節者于使者東南西面行恭軍引長官以下俱入就庭中位立定持節者脱節衣持案者以案進使者前使者取制書持案者退復位使者稱有制行恭軍贊再拜長官及諸在位者皆再拜使者宣制書訖行恭軍又贊再拜長官及諸在位者皆再拜行恭軍引長官進詣使者前受制書退復位訖功曹恭軍引使者以下出復門外位行恭軍引長官及諸在位者各出即門外位如初行恭軍引使者以下還便次長官退其正長老人等任散蕃國賑撫同諸州禮其國王供侍及出入即館饗食之属則如常但略其燕好宋政和五禮新儀遣使賑撫諸州水旱蟲災使者將至所在長官預集本州官屬及鄉老等所司先于長官廳大門外設使者次又于門外設使者位東向長官以下位北向西又于庭望闕設長官以下位重行設使者位于長官之左使者至所司引就次各服公服贊者先引長官以下立于門外位又引使者就位立史二人以案奉詔書立于使者之南贊者曰拜長官以下皆再拜贊者引長官以下以次先入就庭中位史捧詔書案前行使者從之入就庭中位贊者贊使者搢笏取詔書執笏以詔書加于笏上史以案退使者稱有詔贊者曰拜長官以下皆再拜使者宣詔書訖長官以下皆再拜贊者引使者及長官各少前相向俛伏跪搢笏使者以詔書授長官訖各執笏長官以詔書加于笏上各俛伏興贊者曰再拜長官以下皆再拜贊者引使者還次長官以下退右遣使存恤五禮通考卷二百四十六
