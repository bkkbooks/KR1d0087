body:
  text: 五禮通考卷一百九刑部尚書秦蕙田撰吉禮大夫士廟祭禮記王制大夫三廟一昭一穆與太祖之廟而三注太祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然疏此據諸侯之子始為卿大夫謂之别子者也是嫡夫人之次子或衆妾之子别異於正君繼父言之故云别子引大傳證此太祖是别子也非諸侯之子孫異姓為大夫者及它國之臣初來仕為大夫者亦得為太祖故云雖非别子始爵者亦然如鄭志答趙商此王制所論皆殷制故云雖非别子亦得立太祖之廟若其周制别子始爵其後得立别子為太祖若非别子之後雖為大夫但立父祖曾祖三廟而已隨時而遷不得立始爵者為太祖故鄭答趙商問祭法云大夫立三廟曰考廟曰王考廟曰皇考廟注非别子故知祖考無廟商按王制大夫三廟一昭一穆與太祖之廟而三注云太祖别子始爵者雖非别子始爵者亦然二者不知所定鄭答云祭法周禮王制所云或以夏殷雜不合周制是鄭以為殷周之别也鄭必知周制别子之後得立别子為太祖以大傳云别子為祖繫之以姓而弗别綴之以食而不殊雖百世而昏姻不通者周道然也故知别子百世不遷為太祖也周既如此明殷不繫姓不綴食大傳又云其庶姓别於上而戚單於下五世而昏姻可以通明五世之後不復繼於别子但始爵者則得為太祖也此大夫三廟者天子諸侯之大夫皆同卿即大夫總號故春秋經皆總號大夫其三公即與諸侯同若附庸之君亦五廟故莊三年公羊傳云紀季以酅入於齊傳曰請後五廟以存姑姊妹陳氏禮書鄭志答趙商謂王制商制故雖非諸侯之别子亦得立太祖之廟周制别子為太祖若非别子之後雖為大夫但立父祖曾祖三廟隨時而遷不得立始爵者為太祖也然左氏曰大夫有二宗荀卿曰大夫士有常宗則大夫有百世不遷之大宗有五世則遷之小宗是太祖之廟常不遷也特祭法曰大夫三廟考與王考皇考有廟顯考祖考無廟而鄭氏遂以為周大夫之制誤也孔頴逹曰大夫三廟天子諸侯之大夫同卿即大夫也故春秋殺卿皆曰大夫其三公之廟與諸侯同於理或然朱子曰大夫三廟一昭一穆與太祖之廟而三大夫亦有始封之君如魯季氏則公子友仲孫氏則公子慶父叔孫氏則公子牙是也士一廟注謂諸侯之中士下士名曰官師者上士二廟諸疏按祭法云適士二廟今此云士一廟故知是侯之中士下士祭法云官師一廟故云名曰官師者鄭既云諸侯之中士下士一廟則天子之中士下士皆二廟也朱子或問大夫士之制奈何曰大夫三廟則視諸侯而殺其二然其太祖昭穆之位猶諸侯也適士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂室寢之備猶大夫也曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻棁復廟重簷諸侯固有所不得為者矣諸侯之黝堊斫礱大夫有不得為者矣大夫之倉楹斫桷士又不得為矣曷為而不降哉獨門堂室寢之合然後可名於宮則其制有不得而殺耳蓋由命士以上父子皆異宮生也異宮而死不得異廟則有不得盡其事生事存之心者是以不得而降也祭法大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼注惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾其無祖考者庶士以下鬼其考王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂别子也凡鬼者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶人府史之屬此適士云顯考無廟非也當為皇考字之誤蕙田案注謂大夫士無主非也詳見後立主條朱子語録問官師一廟若只是一廟只祭得父母更不及祖矣母乃不近人情曰位卑則澤淺其理自當如此曰今雖士庶人家亦祭三代如此却是違禮曰雖祭三代却無廟亦不可謂之僭古之所謂廟者其體甚大皆有門堂寢室如所居之宫非如今人但以一室為之有問程子曰今人不祭髙祖如何曰髙祖自有服不祭甚非某家却祭髙祖又曰自天子至於庶人五服未嘗異皆至髙祖服既如是祭祀亦須如是其疏數之節未有可考但其理必如此七廟五廟亦只是祭及髙祖大夫士雖或三廟二廟一廟或祭寢廟則雖異亦不害祭及髙祖若止祭禰是為知母而不知父禽獸道也祭禰不及祖非人道也又曰考諸程子之言則以為髙祖有服不可不祭雖七廟五廟亦止於髙祖雖三廟一廟以至祭寢亦必及於髙祖但有疏數之不同耳疑此最為得祭祀之本意禮家言大夫有事省於其君干祫及其髙祖此則可為立三廟而祭及髙祖之驗楊氏復曰前一條謂澤有淺深則制有隆殺其分異也後二條謂七廟五廟亦止於髙祖雖三廟一廟以至祭寢亦必及髙祖其理同也文獻通考馬氏曰自天子以至於士五服之制則同而祭祀止及其立廟之親則大夫不祭其髙曾士不祭其祖非人情也程子以為有服者皆不可不祭其説當矣愚又嘗考之禮經參以諸儒注疏之説然後知古今異宜禮緣人情固當隨時為之損益不可膠於一説也人徒見適士二廟官師一廟以為所及者狹不足以伸孝子慈孫追逺之心也然古人之制則雖諸侯大夫固有拘於禮而不得祀其祖考者矣何也鄭氏注諸侯五廟云太祖始封之君王者之後不為始封之君廟疏曰凡始封之君謂王之子弟封為諸侯為後世之太祖當此君之身不得立出王之廟則全無廟也注大夫三廟云大夫太祖别子始爵者然則諸侯始封之太祖如鄭桓公友是也鄭桓公以周厲王少子而始封於鄭既為諸侯可以立五廟矣然其考則厲王祖則夷王曾祖則懿王髙祖則共王五世祖則穆王自穆至厲皆天子也諸侯不敢祖天子則此五王之廟不當立於鄭所謂此君之身全無廟也必俟桓公之子然後可立一廟以祀桓公為太祖桓公之孫然後可立二廟以祀其祖若禰必俟五世之後而鄭國之五廟始備也大夫始爵之太祖則魯季友是也季友為魯桓公之别子既為大夫可以立三廟矣然其考則桓公其祖則惠公其曾祖則孝公自孝至桓皆諸侯也大夫不敢祖諸侯則此三公之廟不當立於季氏之家所謂别子亦全無廟也必俟季友之子然後可立一廟以祀季友為太祖季友之孫然後可立二廟以祀其祖若禰必俟三世之後而季氏之三廟始備也蓋諸侯大夫雖有五廟三廟之制然方其始為諸侯大夫也苟非傳襲數世則亦不能備此五廟三廟之禮至於士庶人則古者因生賜姓受姓之後甫及一傳即有嫡有庶嫡宗子也庶支子也禮云支子不祭祭必告於宗子又云庶子不祭明其宗也蓋謂非大宗則不得祭别子之為祖者非小宗則各不得祭其四小宗所出之祖禰也先王因族以立宗敬宗以尊祖尊卑有分而不亂親疏有别而不二其法甚備而猶嚴於廟祀之際故諸侯雖曰五廟而五世之內有為天子者則不可立大夫雖曰三廟而三世之內有為諸侯者則不可立適士二廟官師一廟庶人祭於寢然苟非宗子則亦不可祭於其家必獻牲於宗子之家然後舉私祭凡為是者蓋懼上僭而不敢祭非薄其親而不祭也然諸侯不敢祖天子而天子之為祖者自有天子祭之大夫不敢祖諸侯而諸侯之為祖者自有諸侯祭之支子不敢祭大宗而大宗之為祖禰者自有宗子祭之蓋已雖拘於禮而不得祭而祖考之祭則元未嘗廢適士官師雖止於二廟一廟而祖禰以上則自有司其祭者此古人之制也後世大宗小宗之法既亡别子繼别之序已紊未嘗專有宗子以主祀事其入仕者又多崛起單寒非時王之支庶不得以不敢祖天子諸侯之説為諉也乃執大夫三廟適士二廟之制而所祭不及祖禰之上是不以學士大夫自處而孝敬之心薄矣烏得為禮乎故曰古今異宜禮緣人情當隨時為之損益不可膠於一説也或曰此為國中公族之世祿者言也若庶姓之來自它國而為諸侯大夫者則如之何愚曰古未有無宗者庶姓有庶姓之宗它國有它國之宗而宗子之制則一也曾子問曰宗子為士庶子為大夫其祭之也如之何孔子曰以上牲祭於宗子之家又問曰宗子去在它國庶子無爵而居可以祭乎孔子曰祭哉望墓而為壇以祭此二條正為起自匹庶與來自它國者言若太公東海人而仕周為諸侯孔子宋人而事魯為大夫之類是也注疏謂異姓始封為諸侯者及非别子而始爵為大夫者如他國之臣初來為大夫本身即得立五廟三廟蓋以其非天子諸侯之子孫上無所拘礙故當代即可依禮制立廟然以曾子問宗子為士一條及參以內則中所謂不敢以富貴加於宗子之説則知崛起為諸侯大夫者若身是支庶亦合尊其宗子不敢盡如禮制也蕙田案封君别子有不可立廟者而祖考之祭元未嘗廢適士官師雖止二廟一廟而祖禰以上自有司其祭者馬氏闡發至此可謂精矣其謂後世宗法既亡不得執二廟一廟之制而所祭不及祖禰古今異宜當隨時為之損益意亦甚善然此仍泥乎一廟祭禰二廟祭祖之説而不知二廟一廟者之或祭及髙祖或不及髙祖皆當以宗法而定也蓋廟數以兩而降係乎貴賤而不定宗法以五為斷不係貴賤而有定兩者並行不悖以無定之廟合有定之宗不以廟多而有加乎宗亦不以廟少而有損乎宗此古今之通義又何異宜損益之足云萬氏斯大曰大夫士皆得祭髙曾祖禰歷稽經傳以明之一徵之於祀典大傳云大夫士有大事省於其君干祫及其髙祖大夫士不得常祫祫而及於髙祖則其平時奉祀者必自髙祖而下但犆祭而不祫耳彼天子諸侯之祫皆其常祭之祖苟士大夫不得祭髙祖祫祭又何以得及之乎再徵之於祔禮小記曰大夫士之妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆夫與已同昭穆者祖也與祖同昭穆者髙祖也中一以上則髙祖姑矣祔於髙祖姑則髙祖有廟矣無廟不得祀宜也有廟而何以不得祀之乎更徵之於服制喪服為曾祖齊衰三月注為髙祖服同蓋於族祖父母有緦麻之服推而得之其言是也又父為長子三年為適孫期所以然者以其傳重也然則設不幸而子孫亡適曾玄孫承重於髙曾亦應為之服斬矣以齊斬之親死即遷之而不祀是豈禮之所安乎復徵之於廟制王制曰大夫三廟一昭一穆與太祖之廟而三夫太祖之廟以義立而百世不遷則髙祖之廟自當以恩立而親盡乃毁苟上祭始祖下祭祖禰而不及髙曾是為隆於義而薄於恩且將與知母而不知父者同類而並譏之矣本程子豈聖人之所許乎即還證之於宗法大傳曰宗其繼髙祖者五世則遷者也夫惟適玄孫之得祭髙祖而族人之不得祭者悉宗之而祭故有繼髙祖之宗苟祭止及於祖禰則惟有繼禰繼祖之宗而無繼髙祖之宗矣然則經何以言宗其繼髙祖者哉且所謂遷者謂遷廟而不祀也遷廟而始不祀則未遷而猶祀也又何疑乎先儒泥小記庶子不祭禰不祭祖之文謂大夫士祭不及髙曾唯程子謂天子至士庶五服上至於髙祖其廟祭也亦必上及於髙祖斯言深合禮意惜未能明指禮文而見其然耳然則大夫之祭與諸侯無别乎蓋諸侯廟有五而大夫廟止於三則四親有專廟合廟之分士之二廟者其昭穆如大夫而無太祖官師一廟者就中自為昭穆而追其四親此所謂别同異也大夫之祫何以不及太祖乎蓋祫於太祖則已類乎君故止及於髙祖而太祖唯行犆祭此所謂别嫌疑也蕙田案大夫士宗法立廟之禮繼禰小宗宜立一禰廟繼祖小宗宜立祖禰二廟繼曾祖小宗宜立曾祖廟為三廟繼髙祖小宗又宜立髙祖廟為四親廟繼别大宗宜立始祖廟統凡五廟然惟諸侯具五廟大夫則三廟士則二廟官師一廟而已説者謂一廟無祖廟二廟無曾祖廟三廟有太祖廟而無曾髙二祖廟則王制之廟數不與宗法相刺謬乎曰非然也程子云三廟二廟一廟雖不同皆不􅊣祭及髙祖若止祭禰而不及祖非人道也此為至論萬氏詳考而證明之為不易矣蓋廟之體制相同而貴賤之多少有等惟天子諸侯每世一廟每廟一主若大夫士不必皆一廟一主也王制大夫三廟一昭一穆與太祖之廟而三此專指繼别之大宗而為大夫者言之以發凡起例耳以義揆之繼别大宗而為大夫者得立三廟太祖廟一則一主親廟二則一昭一穆每廟二主父曾一廟祖髙一廟也若非繼别大宗不得立太祖廟繼禰小宗止得立一廟繼祖小宗止得立祖禰二廟猶皆每廟一主至繼曾祖小宗則又以父祔於第一廟繼髙祖小宗則以父祔於第二廟而每廟二主矣祭法云適士二廟以王制推之太祖廟一親廟一此惟大宗為然若小宗不立太祖廟止得立一親廟則繼禰小宗廟惟一主繼祖小宗一廟二主繼曾祖小宗一廟三主繼髙祖小宗一廟四主而廟有二主三主四主矣祭法又云官師一廟蓋無太祖如有之則一廟而五主矣其主在廟中則或以髙祖居奧而昭穆南北向倣古制也或同堂異室而自西而東鬼神尚右也别見朱子家禮如此則王制與宗法相符鄭氏不知此於不祭祖則曰宗子庶子俱為適士於不祭禰則曰宗子庶子俱為下士牽制格礙理難通矣辨郝氏敬大夫難立三廟郝氏敬曰大夫必立三廟則大家父子世官兄弟同朝廟不多於民居乎若皆設於宗子家則宗子家無地可容且父為大夫子為士則倐興倐毁祖考席不暇暖任氏啓運曰大夫之廟必立於宗子之家宗子為大夫則主其祭宗子不為大夫而庶子為大夫則宗子攝其祭禮所謂以上牲祭於宗子之家也大夫身為父之適則立禰廟於家而祖之祭猶宗子主之為祖之適則立祖禰二廟於家而曾祖之祭猶宗子主之禮所謂齊而宗敬終事而私祭也烏有父子兄弟各立三廟及皆立廟於宗子家者乎宗子去國而庶子無大夫則以廟行庶子居者為壇望墓以祭宗子去國而庶子為大夫則大夫攝其祭宗子庶子皆非大夫而曾祖為大夫則其廟未毁但薦而不祭耳烏有倐興倐毁者乎郝氏訾禮類多妄談不可不辨右大夫士廟制禮記坊記子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祀事教民追孝也以此坊民民猶忘其親注有事有所事也民疏祭祀有尸宗廟有主下示於有所尊事也郊特牲直祭祝于主注謂薦熟時也如特牲少牢饋食之為也疏言薦熟正祭之時祝官以祝辭告於主春秋哀公十六年左氏傳衛孔悝出奔宋使二車反祏於西圃注使副車還取廟主西圃孔氏廟所在祏藏主石函陳氏禮書重主道也大夫士有重尸神像也大夫士有尸孔悝大夫也去國載祏孰謂大夫士無主乎辨注疏諸家大夫士廟無主文獻通考後漢許慎五經異義或曰卿大夫士有主不答曰按公羊説卿大夫非有土之君不得祫享昭穆故無主大夫束帛依神士結苑為菆主許慎據春秋左氏傳曰衛孔悝反祏於西圃祏石也言大夫以石為主鄭駮云少牢饋食大夫祭禮也束帛依神特牲饋食士祭禮也結茅為菆鄭志張逸問許氏異義駮衛孔悝之反祏有主者何謂也答禮大夫無主而孔獨有者或時末代之君賜之使祀其所出之君也諸侯不祀天而魯郊諸侯不祖天子而鄭祖厲王皆時君之賜也春秋哀十六年左傳衛孔悝出奔宋使二車反祏於西圃孔疏少牢饋食大夫之祭禮其祭無主鄭玄祭法注云惟天子諸侯有主禘祫大夫不禘祫無主耳今孔悝得有主者當時僣為之非禮也鄭玄駮異義云大夫無主孔悝之反祏所出公之主耳按孔氏姞姓春秋時國唯南燕為姞姓耳孔氏仕於衛朝已歷多世不知本出何國安得有所出公之主也知是僣為之主耳徐邈云左傳稱孔悝反祏又公羊大夫聞君之喪攝主而往注義以為斂攝神主而已不暇待祭也皆大夫有主之文大夫以下不云尺寸雖有主無以知其形制然推義謂亦應有按喪之銘旌題别亡者設重於庭亦有所憑祭必有尸想像乎存此皆自天子及士並有其禮但制度降殺為殊何至於主唯侯王而已禮言重主道也埋重則立主今大夫士有重亦宜有主以紀别座位有尸無主何以為别將表稱號題祖考何可無主今按經傳未見大夫士無主之義有者為長北魏書禮志清河王懌議曰延業盧觀前經詳議並據許慎鄭玄之解謂天子諸侯作主大夫及士則無意謂此議雖出前儒之事實未允情理何以言之原夫作主之禮本以依神孝子之心非主莫依今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想象生存上自天子下逮於士如此四事並同其禮何至於主謂惟王侯禮云重主道也此為埋重則立主矣故王肅曰重未立主之禮也士喪禮亦設重則士有主明矣孔悝反祏載之左史饋食設主著于逸禮大夫及士既得有廟題祖題考何可無主公羊傳君有事於廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往今以為攝主者攝神斂主而已不暇待徹祭也何休云宗人攝行主事而往也意謂不然君聞臣喪尚為之不繹况臣聞君喪豈得安然待主終祭也又相國立廟設主依神主無貴賤紀座而已若位擬諸侯者則有主位為大夫者則無主便是三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位詔依懌議汪氏琬大夫士廟當有主説大夫士之廟祀也一以為有主一以為無主謂之無主者鄭玄許慎也謂之有主者徐邈清河王懌也或問宜何從豫告之曰廟所以棲主也大夫三廟士一廟使其無主則祭於寢足矣廟何為者祔之言附也以主升附也士虞禮以其班祔喪服小記祔必以昭穆亡則中一以上使其無主又何所憑以班昭穆乎許氏知其説之不可通也曲為之解曰大夫束帛依神士結苑為蕝此不根之辭以臆創之者也或問禮經無有主之文奈何豫又曰經不明言有主亦不言無主也檀弓重主道也商主綴重焉周主重徹焉並非指天子諸侯為説也則大夫士宜有主者一孔子曰祭祀之有尸也宗廟之有主也示民有事也以此坊民民猶忘其親亦非專指天子諸侯也則大夫士宜有主者二徐邈所引左氏春秋其義甚長而許氏顧駁孔悝反祏之舉以為出於時君所賜吾不知其何據也陳祥道曰重主道大夫士有重尸神象大夫士有尸大夫去國載祏孰謂大夫士無主乎斯可以闢鄭許之妄矣然則廟主之制宜何如按重鑿木為形如札士三尺卿大夫五尺諸侯七尺謂未葬未有主故以重當之是則主制雖無考其修短宜略與重仿可知也又有謂天子主長尺二寸諸侯一尺大夫士而下當以次殺云蕙田案坊記祭祀有尸宗廟有主夫尸暫也祭則有之主常也廟必有主尸與主皆所以依神祭既有尸廟必有主明矣此天子諸侯大夫士之所同不可謂非確據也張子曰有廟即當有主蓋廟者主之廟也主者廟之主也言廟則主見矣乃鄭康成許慎忽為大夫士無廟主之説徐邈清河王懌及近世汪氏辨之特詳鄭氏云然以儀禮特牲少牢未明言之故耳今考鄭注郊特牲直祭祝于主云謂薦熟時如特牲少牢之為也則鄭固已據儀禮而釋之矣少牢禮祝酌奠主人再拜稽首祝在左卒祝主人再拜稽首是時鼎爼既陳設黍稷薦鉶毛謂之隂厭尸尚未入室也西面者向奧也宗廟之主設於奧故主人向而拜之若無主則主人何所憑而西面又何所憑而拜祝又何所憑而祝乎且尸以主分廟以主别無主則一廟二廟三廟祖考何以别耶左傳云祔而作主記妾祔於妾祖姑亡則中一以上而祔中一以上則祔於髙祖之廟矣妾祔有主祖反無主耶况神之憑依也自設重而已然故曰重主道也公羊曰虞主用桑練主用栗榖梁曰喪主於虞吉主於練蓋神不可一日無依故始死依重既虞則重埋而桑主作練則桑主埋而栗主作栗主吉主也祔廟故稱吉若不祔何吉之云重與主皆神之所依豈有依在喪而不依在廟乎此皆理之所必無者夫儀禮之言尸不言主者尸動象也主靜者也動則迎之安之坐於堂入于室有獻有酢有飽有酳不得不詳若主本在廟室之奧藏之祏設之几筵拜之而已祝之而已何必明言以舉之耶况主尊尊則宜諱通典曰主在尸之南是主也尸也皆神也一言尸而主在矣又何必言觀承案禮有無廟無無主廟之有主本無可疑况以尺寸長短差次其間則公卿大夫士亦不至略無等殺固可見之施行而無嫌也右大夫士廟主詩召南采蘋于以奠之宗室牖下朱子集傳宗室大宗之廟也大夫士祭于宗室牖下室西南隅所謂奧也劉氏瑾曰諸侯之庶子為别子别子之嫡子為大宗即大夫之始祖也故祭於其廟禮記曾子問孔子曰宗子雖七十無無主婦非宗子雖無主婦可也注族人之婦不可無統程子曰宗子雖七十無無主婦此謂承祭祀也方氏慤曰為庶子之宗者謂之宗子為庶婦之主者謂之主婦宗子主祭於外主婦則助之於內者也故宗子雖七十不可以無主婦內則適子庶子祗事宗子宗婦若富則具二牲獻其賢者於宗子夫婦皆齋而宗敬焉終事而後敢私祭注夫婦皆齋當助祭於宗子之家也私祭祭其祖禰宗疏大宗子將祭之時小宗夫婦皆齋戒以助祭於大以加敬焉大宗終竟祭事而后敢私祭祖禰此文雖主事大宗子其大宗之外事小宗子亦然張子曰禮者祭畢然後敢私祭焉謂如父有二子幼子欲祭父來兄家祭之此是私祭祖有諸孫適長孫已祭諸孫來祭者祭於長孫之家此是公祭祭祖則為公祭對祖而言則祭父為私祭其他推此皆然陳氏澔曰賢猶善也齊而宗敬謂齊戒而往助祭事以致宗廟之敬也私祭祖禰則用二牲之下者曾子問曾子問曰祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也祭殤必厭蓋弗成也祭成喪而無尸是殤之也孔子曰有隂厭有陽厭曾子問曰殤不祔祭何謂陽厭隂厭孔子曰宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉肺無肵爼無玄酒不告利成是為隂厭凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭馬氏晞孟曰厭不成禮之祭也厭於隂者宗子之殤而無後者厭於陽者凡殤與無後者其異何也宗子尊矣則以特牲即於隂者幽隂之義反諸幽求神之道也凡殤卑矣其祭也則就宗子之家當室之白則所謂堂事略矣陳氏禮書夫尸所以象神也厭所以飫神也殤之有厭為其無尸故也正祭有厭為其尸不存故也上大夫而上正祭無陽厭不敢遽飫之也適殤有隂厭則其禮詳庶殤有陽厭則其禮略觀隂厭尊有玄酒陽厭納一尊而已隂厭備鼎爼陽厭爼釋三介而已則陽厭之略可知也蕙田案以上宗子常祭之法宗子兼大宗小宗言大宗百世不遷小宗五世則遷大宗主别子之祭小宗主髙祖之祭小宗宗大宗則助祭於大宗之廟宗小宗者則助祭於小宗之廟也陽厭隂厭皆宗子之祭詳見諸侯宗廟條禮記王制自天子達于庶人喪從死者祭從生者支子不祭注從生者謂祭奠之牲器者疏或云在喪中祭尚從死者爵至吉祭乃用生祿耳鄭云奠者自吉祭之奠耳喪服小記庶子不祭祖者明其宗也注明其為宗以為本也禰則不祭矣言不祭祖者凡正體在乎上者謂下正猶為庶也推疏庶適俱是人子而適子蒸嘗庶子獨不祭者正是本崇適明有所宗也此言父庶則不得祭父何假言祖故鄭云禰則不祭也正體謂祖之適也下正謂禰之適也雖正為禰適而于祖猶為庶故禰適謂之為庶也五宗悉然庶子不祭禰者明其宗也注謂宗子庶子俱為下士得立禰廟也雖庶人亦然應氏鏞曰注適士下士之説立言初意恐不在是蕙田案廟制宗法雖並行不悖却是兩事支子不祭明宗法也與廟制無涉注疏多牽涉以釋祭禮總不知廟數有定而宗法自有常耳應氏説是大傳庶子不祭明其宗也陳氏禮書喪服小記云庶子不祭祖所以明大宗不祭禰所以明小宗此又止言不祭兼大宗小宗而明之也朱子曰依大傳文直謂非大宗則不得祭别子之為祖者非小宗則各不得祭其四小宗所生之祖禰也其小記則云庶子不祭禰明其宗又云庶子不祭祖明其宗文意重復似是衍字而鄭氏曲為之説恐不如大傳語雖簡而事反該悉也小記鄭注謂不祭禰者父之庶子不祭祖者其父為庶子説得繁碎大傳只説庶子不祭則祖禰皆在其中矣蕙田案以上支子不祭之正法為小宗者不得祭别子之大宗為小宗之庶者不得祭小宗之祖禰也曲禮支子不祭祭必告於宗子注不敢自專謂宗子有故支子當攝而祭者也五宗皆然程子曰古所謂支子不祭者唯使宗子立廟主之而已支子雖不祭至於齊戒致其誠意則與主祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈于已也朱子曰支子之祭先儒雖有是言然畢竟未安向見范氏兄弟所定支子當祭旋設榜於位祭訖焚之不得已此式可采用然禮文品物亦當少損于長子但或一獻無祝可也曾子問曾子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事注上牲大夫少牢貴祿重宗也介副也不言庶使若可以祭然疏此一節論宗子祭用大夫牲之事宗子是士合用特牲今庶子身為大夫若祭祖禰當用少牢之牲就宗子之家而祭用大夫之牲是貴祿也宗廟在宗子之家是重宗也方氏慤曰宗子為之正庶子為助故庶子謂之介子內則謂衆婦為介婦亦此義大夫之牲以少牢為上故曰上牲四時之祭禮之常也故曰常事蕙田案士一廟二廟大夫當立三廟今庶子為大夫不得立廟重宗法也祭於宗子之家則宗子之廟不止祖禰矣此士廟得祭曾祖之明證也而注疏乃云寄曾祖廟於宗子之家因拘泥而生穿鑿何其舛也明文衡有云寄廟之説經無明文是崔氏臆説當矣若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配注皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且享是隂厭也尸謖之後徹薦爼敦設于西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏主人也綏周禮作墮不配者祝辭不言以某妃配某氏少疏此宗子有罪出在他國庶子為攝主不敢備禮案牢特牲禮祝酌奠于鉶南復以辭享告神是室奧隂靜之處故云隂厭尸謖之後佐食徹尸之薦爼設于西北隅門户明白之處故曰陽厭其上大夫當自賔尸故少牢禮無陽厭下大夫不賔尸者有陽厭也其天子諸侯明日乃為繹祭亦為陽厭也厭是神之厭飫今攝主謙退不為陽厭似若神未厭飫然也布奠于賔賔奠而不舉不歸肉陳氏澔集注主人酬賔之時賔在西廂東面主人布此奠爵于賔爼之北賔坐取此爵而奠于爼之南不舉之以酬兄弟此即不旅之事若宗子主祭則凡助祭之賔各歸之以爼肉今攝主故不歸爼肉于賔也其辭于賔曰宗兄宗弟宗子在他國使某辭注辭猶告也宿賔之辭與宗子為列則曰宗兄若宗弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身沒而已子遊之徒有庶子祭者以此若義也今之祭者不首其義故誣于祭也注有子孫存不可以乏先祖之祀望墓為壇謂不祭于廟無爵者賤逺避正主也宗子死言祭于家容無廟也稱名不言孝者孝宗子之稱不敢與之同但言子某薦其常事至子可以稱孝故云身沒而已子遊之徒用此禮祭也以用也若順也首本也誣猶妄也疏此論庶子代宗子祭之事陳氏澔集注宗子無罪而去國則廟主隨行矣若有罪去國廟雖存庶子卑賤無爵不得于廟行祭禮但當祭之時即望墓為壇以祭也喪服小記庶子不祭殤與無後者殤與無後者從祖祔食注不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之蕙田案以上支子祭宗廟之權法又案宗法祭禮大宗祭太祖之廟一也小宗繼髙祖者得祭髙祖之廟繼曾祖者得祭曾祖之廟繼祖者得祭祖廟繼禰者得祭禰廟二也凡支子不為後者皆不得立廟主祭三也支子助祭于宗子之家四也有故而祭必告於宗子五也宗子為士支子為大夫以上牲祭於宗子之家六也宗子去國支子攝祭不備禮七也庶子無爵則望墓為壇八也宗子有厭祭支子不祭殤與無後九也凡此皆以宗法定祭禮大夫士皆統之不關三廟二廟一廟也無一廟祭禰二廟祭祖三廟祭曾祖之異也論禮者尊經而屈注疏可也右宗法祭禮禮記大傳大夫士有大事省於其君干祫及其髙祖趙氏伯循曰有省謂有功往見省記者也干者逆上之意言逆上及髙祖也方氏慤曰大夫止于三廟士止于二廟一廟則廟祭固不及髙祖必待祫然後及之故曰干祫及其髙祖祫人君之祭非臣之常禮也特人君非常之賜而已葉氏夢得曰古者諸侯有祫而無禘大夫有時祭而無祫禘天子之事也祫諸侯之事也大夫既不得祫然有大功見察於天子則視諸侯上達而祫其毁主蕙田案此祫祭時祭之等差王制大夫士宗廟之祭有田則祭無田則薦注有田者既祭又薦新祭以首時薦以仲月士薦牲用特豚大夫以上用羔庶人無常牲取與新物相宜而已疏儀禮有地之士用特牲今無地之士宜貶降不用成牲故用特豚也諸侯大夫有地祭者用少牢其無地薦者則用羔鄭言大夫以上則包天子皆用羔也然天子諸侯不皆用羔亦用餘牲故月令以彘嘗麥以犬嘗麻方氏慤曰薦以時物而已祭則備庶物則其禮為盛非有田者不足以供之也大夫士而有無田者謂諸侯之大夫士而已蕙田案此有田無田之等差孟子前以士後以大夫前以三鼎而後以五鼎注禮士祭三鼎大夫祭五鼎爵疏如子路有列鼎之奉主父在漢有五鼎之食是其有差也孟子前以士後以大夫是其爵命貴賤之不同耳惟士無田則亦不祭牲殺器皿衣服不備不敢以祭注惟辭也言惟絀祿之士無圭田者不祭蕙田案此先後貴賤之等差春秋桓八年公羊傳春曰祠夏曰礿秋曰嘗冬曰蒸士不及前四者則冬不裘夏不葛注無牲而祭謂之薦天子四祭四薦諸侯三祭三薦大夫士再祭再薦祭於室求之於幽祭於堂求之於明祭於祊求之於逺皆孝子博求之意也大夫求諸明士求諸幽尊卑之差也殷人先求諸明周人先求諸幽質文之義也禮天子諸侯卿大夫牛羊豕凡三牲曰太牢天子元士諸侯之卿大夫羊豕凡二牲曰少牢諸侯之士特豚天子之牲角握諸侯角尺卿大夫索牛蕙田案傳云士不及前四者云云以士亦有祠礿嘗蒸四祭不幾於僭乎蓋再祭再薦亦倣是四者之義傳因上文而順言之耳何注大夫士有祭堂祭室之異案儀禮特牲少牢皆室中饋食之事無堂上朝踐之事若指儐尸於堂言則儐尸止當得繹祭並非正祭未免附會丘濬大學衍義補古之仕者有祭田今世非世家貴族而好禮者無祭田苟有祿食及有財産者皆當隨時致祭不可拘田之有無蕙田案此據公羊注有四祭三祭再祭之等差然於經無考右祭禮等差曲禮士祭其先疏以士祭先祖歲有四時更無餘神故也程子曰冬至祭始祖此厥初生民之祖也冬至一陽之始故象其類而祭之立春祭先祖初祖以下髙祖以上之祖也立春生物之始故象其類而祭之朱子語録伊川時祭止於髙祖髙祖而上則於立春設二位統祭之而不用主此説是也却又云祖又豈可厭多苟其可知者無逺近多少須當盡祭之疑是初時未曾討論故有此説余正父謂祭始祖天子諸侯之禮若士大夫當祭則自古無明文又云大夫自無太祖先生因舉春秋如單氏尹氏王朝之大夫自上世至後世皆不變其初來姓號則必有太祖又如季氏之徒世世不改其號則亦必有太祖如詩裏説南仲太祖太師皇父南仲是文王時人到宣王時為太祖不知古者世祿不世官之説如何大學衍義補丘氏濬曰程子謂冬至祭始祖立春祭先祖朱子既立為二祭載於家禮時祭之後其門人楊復乃謂朱子初年亦嘗行之後覺其似僣不敢祭然冬至之祭不祭可也而立春之祭似亦可行今擬人家同居止四代者不行亦可其有合族以居纍世共爨者生者同居而食死者異處而祭恐乖易萃合人心於孝享之義惟宜行立春一祭蕙田案程子有始祖先祖之祭朱子以其似僭而廢之是也竊嘗思之古今異宜其禮當以義起程子所云厥初生民之祖者理屬茫渺於經無據若今人家之始祖其義與宗法之别子同者固當祭也何則古之所謂始祖者在諸侯則始封者也在大夫士則别子也别子有三後世封建不行則為有國之始祖者寡矣然有大功勳爵至王公者雖無土地宜與古諸侯等則其子孫宜奉為始祖而祭之矣又後世天下一家仕宦遷徙其有子孫繁衍而成族者則始至之人宜為始遷之祖與古别子之公子自他國而來者無異是亦宜奉為祖而祭之矣若崛起而為公卿者雖不可同於諸侯亦宜與古之九命八命七命者等其子孫奉為始祖亦與古人别子之義相合朱子所云王朝之大夫自上世至後世皆不變其初來姓號者非即此類乎故或建為宗祠或合為家廟凡屬子姓羣聚萃處其中有宗法者大宗奉之因為百世不遷之祖倘宗法未立或大宗無後則諸小宗擇其長且貴與賢者祭則主其獻奠原與祭别子之義相符不可以士大夫不得祭始祖而謂之為僭也惟程子謂立春祭始祖以下之祖則不可行耳邱氏以纍世同爨者通之則庶幾乎觀承案始祖先祖之祭誠然似僭難行邱氏以纍世同居者通之今更以宗法别子之例廣之洵斟酌盡善矣愚謂更有可廣者先世有德行道藝聞於時雖爵位不顯是亦古之所謂鄉先生殁而可祭於社者而子孫豈不可以爼豆終古也耶右祭始祖先祖禮記喪服小記士大夫祔於諸祖父之為士大夫者其妻祔於諸祖姑疏諸祖姑是夫之諸祖父兄弟為士大夫者之妻也婦祔於祖姑祖姑有三人則祔於親者注舅之母死而又有繼母二人也親者謂舅所生張子曰祔葬祔祭極至理而論只合祔一人夫婦之道當其初婚未嘗約再配是夫只合一娶婦婦只合一嫁今婦人夫死而不可再嫁乃天地之大義夫豈得再娶然以重者計之養親承家繼續不可無也故有再娶之理然其葬其祔雖為同穴同几筵然譬之人情一室中豈容二妻以義斷之祔以首妻繼室别為一所可也朱子曰程氏祭儀謂凡配止用正妻一人或奉祀之人是再娶所生即以所生配謂凡配止用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配祭可乎程先生此説恐誤唐會要中有論凡是嫡母無先後皆當並祔合祭與古諸侯之禮不同又曰夫婦之義如乾大坤至自有差等故方其生存夫得有妻有妾而妻之所天不容有二况於死而配祔又非生存之比橫渠之説似亦推之有太過也只合從唐人所議為允况又有前妻無子後妻有子之礙其勢將有所杌隉而不安者唯葬則今人夫婦未必皆合葬繼室别營兆域宜亦可矣蕙田案天地之道陽竒隂偶故易稱貫魚書嬪二女古者諸侯一娶九女詩之樛木螽斯明后妃不妬忌之德禮稱宗子雖七十無無主婦蓋娶妻之道奉祭祀一也重嗣續二也成家室三也豈止一配偶之義云爾哉况記明言婦祔於祖姑祖姑有三人則祔於親者則再娶之祔廟審矣朱子以唐人之議為允豈非千古之定論哉婦之喪虞卒哭其夫若子主之陳氏澔曰虞卒哭在寢祭婦也雜記婦祔於其夫之所附之妃無妃則亦從其昭穆之妃注夫所附之妃於婦則祖姑陳氏澔曰昭穆之妃亦謂間一代而祔髙祖之妃也曲禮餕餘不祭父不祭子夫不祭妻注餕而不祭惟此類也食尊者之餘則祭盛之不疏凡食餘悉祭惟父得子餘夫得妻餘則祭言其卑故也非此二條悉祭朱子語録父不祭子夫不祭妻此承上面餕餘不祭説蓋謂餕餘之物雖父不可將去祭子夫不可將去祭妻且如孔子君賜食必正席先嘗之君賜腥必熟而薦之君賜腥則非餕餘矣雖熟之以薦祖考可也賜食則或為餕餘但可正席先嘗而已固是不可祭先祖雖妻子至卑亦不可祭也夫祭妻亦當拜學齋呫畢禮記云餕餘不祭父不祭子夫不祭妻本當三句合為一義而本注乃於餕餘不祭下作一義注云食人之餘曰餕禮輕故不敢祭於父不祭子夫不祭妻之下别作一義注云祭先也從卑處家故不祭則是以夫與父不得祭其妻子也此何義也故朱文公先生釐正之以為父不祭子夫不祭妻非此祭也但明其不可以餕餘而祭耳在禮生則婦可餕夫之餘子可餕父之餘既死矣則以鬼禮享之當用其嚴敬弗可以餕餘而祭之為褻且慢也此説明甚而世儒薄夫乃有泥古注而不祭妻子是可哀也是可鄙也故發明朱子之説而厚俗云日知録父不祭子夫不祭妻不但名分有所不當而以尊臨卑則死者之神亦必不安故其當祭則有代之者矣蕙田案父之於子夫之於妻分雖有尊卑然喪服父為長子三年夫於妻齊衰期父之斬傳重也夫之期齊體也服猶如是而况祭乎小記曰婦之喪虞卒哭其夫若子主之注在寢祭婦也的是確證寧人之説非矣當以朱子為正右夫祭妻禮記喪服小記妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆疏妾祔於妾祖姑者祔夫祖之妾也亡無也中間也若夫祖無妾則又間曾祖而祔於髙祖之妾也凡祔必昭穆同曾祖非夫同列也方氏慤曰凡祔以廟為正故言祔廟則不言廟欽定義疏又案此言妾祔於妾祖姑下又言庶母不世祭夫祔以為祭也將從其昭穆之次故先祔之妾母不世祭則妾祖姑已不祭矣祔之何為雜記云主妾之喪得自祔至練祥使其子主之則不可謂妾母無祔食之禮也榖梁傳云禮庶子為君為其母築宮使公子主其祭於子祭於孫止韋公肅云隱公母聲子不入魯惠公廟妾也胡氏安國云孟子已入惠公廟仲子祭享無所故别立一宮祀之隱公不為己母聲子立廟明已特攝耳非君也桓公未立而為其母仲子立廟明將為君也是諸侯得為其生母立廟矣春秋書初獻六羽是妾母雖立廟其祭視適母降一等其言不世祭者非必子立之而孫遂毁之或薦而不祭至親盡乃遷乎若大夫士則斷無立妾廟之理蓋祔有二有初以班祔至新主入廟而所祔之主已遷上一廟者如三昭三穆之遞遷也有祔之而即隨之食者如殤與無後之從祖祔食也妾子非君安得為妾母立廟則此祔妾祖姑者有廟即於其廟祔食無廟則為壇祔之而祭於次寢祔食與蕙田案拘廟制者謂大夫不得祭髙祖觀此則髙祖有廟祭明矣泥於子祭於孫止者謂妾母不世祭觀此則髙祖之妾曾孫猶得祔祭也祔謂祔於廟欽定義疏謂有廟即於其廟祔得經旨矣妾無妾祖姑者易牲而祔於女君可也注女君嫡祖姑也易牲而祔凡妾下女君一等陳氏澔曰妾當祔於妾祖姑上章言亡則中一以上而祔是祔髙祖之妾今又無髙祖妾則當易妾之牲而祔於嫡祖姑女君謂嫡祖姑也方氏慤曰妾祔適嫌於隆故易牲而祭示其殺焉欽定義疏喪服女君俱指適妻言祖姑及髙祖姑俱無妾可祔則遂於適妻祔之生既相依死亦相祔禮之變也鄭以適祖姑言之誤矣妾牲當下女君一等今祔於女君故易女君牲猶士祔於大夫而易大夫牲也方謂易牲示殺其説未明蕙田案祔於女君則不惟祔於妾而且祔於嫡矣嫡豈亦為壇以祭乎易牲説義疏精矣宗元案易牲説義疏之解精矣女君之説亦比鄭氏為當然或女君尚在而妾當祔食則嫡祖姑亦可以女君統之似兼此而義益備雜記主妾之喪則自祔注祔自為之者以其祭於祖廟疏妾卑賤得主之者崔氏云謂女君死攝女君也以其祔祭於祖姑尊祖故自祔也妾合祔於妾祖姑若無妾祖姑則祔於女君可也方氏慤曰妾之喪祔於妾祖姑之廟故其夫自主而祔之非尊妾也尊祖而已妾祔於妾祖姑無妾祖姑則亦從其昭穆之妾喪服小記慈母與妾母不世祭也注以其非正春秋傳曰於子祭於孫止疏祭慈母即所謂承庶母祖庶母後者也妾母謂庶子自為其母也既非其正故惟子祭之而孫則否應氏鏞曰慈母一時之恩易世可以無祭若妾母為所生則子孫皆其所自出而不世祭之可乎以上文為庶母為祖庶母之後觀之或者妾母若此之類然此更當隨宜精審未易以一槩言也彭氏汝礪曰案春秋隱五年榖梁傳曰禮庶子為君為其母築宫使公子主其祭也於子祭於孫止此謂庶子為君者為己母如此蓋謂己既為君後當奉宗廟不得自主已私祭也然亦未嘗不使公子主之若已於慈母庶母既為之後或為所生子則非特子當祭孫亦當祭以意逆之或是已於庶母慈己者有恩及庶兄庶弟之母是父之妾有子者皆當祔祭之易世之後則不世祭與質之儀禮喪服傳有君子子於庶母慈己者義服小功衆子為庶母有子者義服緦麻此二母於己祭之不世祭可蕙田案妾母與慈母並言皆非己身之母疏以妾母為庶子自為其母非也儀禮公子為其母練冠麻衣縓緣孟子王子有其母死者二經皆稱所生母曰其母而不曰妾母妾母之祔蓋從嫡子言之而非庶子所得自稱其生母也榖梁傳於子祭於孫止亦指嫡子嫡孫言若身所自出之母至孫便不祭則經亦不當有祔妾祖姑祔女君之文矣應氏彭氏説極有見春秋隱公五年榖梁傳禮庶子為君為其母築宫使公子主其祭也於子祭於孫止注公當奉宗廟故不得自主也公子者長子之弟及妾之子知疏公羊左氏妾子為君其母得同夫人之禮今穀梁不然者喪􅡘記云公子為其母練冠麻衣縓緣既葬除之傳曰何以不在五服之中也君之所不服子亦不敢服也鄭玄云公子君之庶子是貴賤之序嫡庶全别安得庶子為君即同嫡夫人乎故穀梁子以為於子祭於孫止朱氏董祥曰經言妾母不世祭者謂祀妾之禮當殺不得同於女君傳注子祭而孫不祭遂令賢者不祀其祖妾不肖者反致僣祭並於祖嫡安得謂之禮哉小記本文曰妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆又曰妾無妾祖姑者易牲而祔於女君其言祔於妾祖姑則祖妾為之祔食矣無則中一以上而祔則髙曾之妾皆祔食焉胡為子與孫有異乎曰然則稱不世祭何邪曰不世祭者非唯孫不為祭其子亦不得祭之也禮有牲曰祭無牲曰薦妾易牲則不得用牲矣不用牲則謂之薦不謂之祭豈絶之而不祀耶蕙田案於子祭於孫止即喪服小記不世祭之義此蓋嫡子指父妾之無子者言非指有子而又為君者言榖梁氏誤引耳朱氏引小記本文以破子祭孫止之説則是而以薦而不祭解不世祭則未確易牲易女君之牲耳况祭與薦雖有有牲無牲有尸無尸之别統言之俱可謂之祭也朱子語録妣者嫓也祭所生母只當稱母則略有别文集答竇文卿問子之所生母死不知題主當何稱祭於何所祔於何所曰今法五服年月篇中母字下注云謂生己者則但謂之母矣若避嫡母則止稱亡母而不稱妣以别之可也伊川先生云祭於私室又問禮記曰妾母不世祭於子祭於孫止又曰妾祔於妾祖姑既不世祭至後日子孫有妾母又安有妾祖姑之可祔耶不知合祭幾世而止曰此條未詳舊讀禮亦每疑之俟更詢考也又問妾母若世祭其孫異日祭妾祖母宜何稱自稱云何曰世祭與否未可知若祭則稱之為祖母而自稱孫無疑矣蕙田案妾母之祔廟經有明文語録載竇文卿之問題主稱母則既答之矣而祭於何所祔於何所則引程子之言注於其下者朱子蓋無以處此而姑引此以當之則亦未能信其必然也竊謂室有東西廂曰廟東西廂亦廟也既曰祔廟則不在私室明矣其或在東西廂與又問合祭幾世而止曰此條未詳疑而俟考疑者將考其世數則其有世祭明矣竊謂妾祔於妾祖姑亡則中一以上而祔則髙祖之妾猶祭也髙祖以上祧主也增一世則髙祖亦祧矣然則從食者其亦從祧乎又云孫祭妾祖母自稱孫無疑明孫當祭也妾母之祭久無定論今考之於古則有經文是禮之當然也質之儒者則有朱子之説是情之自然也欽定義疏謂祔廟而食親盡乃遷得情理之中議禮者當有所折衷矣語類問妾母之稱曰恐也只得稱母他無可稱在經只得云妾母不然無以别於他母也又問弔人妾母之死合稱云何曰恐也只得隨其子平日所稱而稱之或曰五峰稱妾母為少母南軒亦然據爾雅亦有少姑之文五峰想是本此先生又曰為人後者為其父母報本朝濮王之議欲加皇考字引此為證當時雖是衆人爭得住然至今士大夫猶以為未然蓋不知禮經中若不稱作為父母别無箇稱呼只得如此説也徐氏乾學曰妾母無廟於子祭於孫止安所得祖妾之廟而祔之祖妾且無廟安所得髙祖之妾乎凡若此者寄主之説固不可通就廟以祭亦有難行唯是即寢立尸設當祔者之主與新死者共祭之猶夫始祖所自之帝本自無主因祭則設之也孔氏疏云妾無廟今乃云祔及髙祖者為壇祔之耳斯壇也不在寢安在乎祖妾可為壇餘親視此矣蕙田案徐氏説妾母無廟非也妾母祔廟而食非謂有廟也又謂為壇於寢祭之亦非也為壇而祭亦當在廟寢安可有壇也既不本於經文又不徴之先儒之論母乃武斷耶右妾母祔祭禮記喪服小記庶子不祭殤與無後者殤與無後者從祖祔食陳氏澔曰上中下殤蓋未成人而死者也無後者謂成人未昏或已娶而無子而死者也庶子所以不得祭此二者以己是父之庶子不得立父廟故不得自祭其殤子也若己是祖之庶孫不得立祖廟故無後之兄弟已亦不得祭之也祖廟在宗子之家此殤與此無後者當祭祖之時亦與祭於祖廟也故曰從祖祔食蕙田案注疏見前宗法祭禮條曾子問凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭蕙田案注疏見前太子廟祭陳氏澔曰凡殤非宗子之殤也無後者庶子之無子孫者也此二者若是宗子大功內親則於宗子家祖廟祭之必當室中西北隅得户之明白處其尊則設於東房是謂陽厭也朱子語録黃義剛問無後祔食之位曰古人祭於東西廂今人家無東西廂只位於堂之兩邊祭食則一但正位三獻畢然後使人分獻一酌而已欽定義疏士大夫常祭之外當有殤與無後之祭喪服小記云殤與無後者從祖祔食若不祭曾祖則諸父之無後者於何祔之此亦可見士雖一廟或二廟而所祭不止於祖禰大夫三廟而所祭必及於髙曾也鄭注云共其牲物而宗子主其禮焉然則殤與無後之祭其别日與曾子問謂宗子殤其吉祭特牲不舉肺無肵爼無玄酒不告利成是謂隂厭注云是宗子殤祭之於奧之禮脫於祭祖禰時祔之則奧既為祖禰之所棲不得又為殤之所棲且同有牲爼難於陳設也若謂祭畢更行厭祭則自質明以至晏朝亦云勞矣尚堪再舉乎以此推之則宜於祭後之次日舉殤與無後之祭而所謂祔者第於其昭穆相當之廟祭之即謂之祔耳非必同時也曾子問又云凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭意其宗子殤與凡殤並有者並祭之一設於奧為隂一設於屋漏為陽如食間之頃乃徹之與攝主不厭祭則無此矣無玄酒者為隂厭又見特牲少牢之初有玄酒者之非隂厭也尊於東房者為陽厭又見特牲與大夫不賔尸之末納一尊於室中者之非陽厭也蕙田案陽厭隂厭見曾子問是專指祭宗子殤及凡殤而言至特牲少牢之未迎尸而設饌享神及佐食徹爼改設於西北隅以享神注疏亦謂之隂厭陽厭先儒多從之今於儀禮本篇亦未便輒易其説細思之曾子問但言厭祭無尸非謂尸不在而即謂之厭祭也厭祭專屬於祭殤與無後無疑欽定義疏洵足以破前人之窠臼矣右殤與無後者祔祭五禮通考卷一百九
