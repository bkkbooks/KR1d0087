body:
  text: 五禮通考卷七十六刑部尚書秦蕙田撰吉禮七十六宗廟制度書益稷搏拊琴瑟以詠周禮春官大司樂雲和之琴瑟冬日至於地上之圜丘奏之注鄭司農云雲和地名也𤣥謂雲和山名空桑之琴瑟夏日至於澤中之方丘奏之注空桑山名龍門之琴瑟於宗廟之中奏之注龍門山名瞽矇掌鼓琴瑟禮記禮運列其琴瑟疏列其琴瑟者琴瑟在堂而登歌書云搏拊琴瑟以詠是也明堂位大琴大瑟中琴小瑟四代之樂器也樂記文以琴瑟疏文飾聲音以琴瑟輔氏廣曰發之以聲音則聲之成文者也寫之琴瑟則其文益顯矣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣世本古義何氏楷曰陳𤾉云琴瑟其聲尚宫其音主絲士君子常御古人作樂聲應相保而為和細大不踰而為平故用大琴必以大瑟配之用中琴必以小瑟配之羅泌云琴統陽瑟統陰以陰佐陽不可易也瑟惟陰也故朱㐮鼓瑟而陰氣來琴惟陽也故虞氏鼔五絃之琴而南風至陰陽之應各從其類是以伯牙鼓琴而馬仰秣瓠巴鼔瑟而魚出聽魚水物而馬火物以類應也楊泉曰琴欲高張瑟欲下聲數不踰琴以佐陽也蕙田案以上琴瑟總昔者舜作五絃之琴以歌南風注案世本云神農作琴今云舜作者非謂舜始造也正用此琴特歌南風始自舜耳或五絃始舜也家語昔者舜彈五絃之琴造南風之詩其詩曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮春秋成公九年左氏傳使與之琴操南音襄公二年左氏傳穆姜使擇美檟以自為頌琴注頌琴猶言雅琴爾雅釋樂大琴謂之離注或曰琴大者二十七絃未詳長短廣雅曰琴長三尺六寸六分五絃長疏琴操曰伏羲作琴世本云神農作琴云廣雅曰琴三尺六寸六分五絃者此常用之琴也象三百六十六日五絃象五行大絃為君小絃為臣文王武王加二位以合君臣之恩也又五絃第一絃為宮其次商角徴羽文武二絃為少宮少商又琴操曰廣六寸象六合也又上曰池言其平下曰濵言其服前廣後狹象尊卑上圓下方法天地家語孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰吾未得其數也有間曰已習其數可以益矣孔子曰吾未得其志也有間曰已習其志可以益矣孔子曰吾未得其為人也有間孔子有所繆然思焉有所睪然髙望而逺眺焉曰吾迨得其為人矣黮而黑頎然長曠如望羊掩有四方非文王其孰能為此子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之域故君子之音溫柔居中以養生育之氣憂愁之感不加於心也暴厲之動不在於體也夫然者乃所謂治安之風也小人之音則不然亢麗㣲末以象殺伐之氣中和之感不載於心溫和之動不存於體夫然者乃所以為亂之風史記箕子隠而鼓琴以自悲故傳曰箕子操荀子琴静好尚書大傳大琴練絃達越白虎通琴者禁也所以禁止淫邪正人心也聶氏三禮圖禮樂記曰舜作五絃之琴以歌南風舊圖云周文王又加二絃曰少宫少商蔡伯喈復增二絃故有九絃者二絃大次三絃小次四絃尤小蔡邕本傳無文未知舊圖據何為說又桓譚新論云今琴四尺五寸法四時五行亦練朱絲為絃陳氏樂書古者造琴之法削以嶧陽之桐成以檿桑之絲徽以麗水之金軫以崑山之玉其制長三尺六寸六分象期之日也廣六寸象六合也絃有五象五行也腰廣四寸象四時也前廣後狹象尊卑也上圓下方象天地也暉十有三象十二律也餘一以象閏也其形象鳳而朱鳥南方之禽樂之主也五分其身以三為上二為下參天兩地之義也司馬遷曰其長八尺一寸正度也由是觀之則三尺六寸六分中琴之度也八尺一寸大琴之度也或以七尺二寸言之或以四尺五寸言之以為大琴則不足以為中琴則有餘要之皆不若六八之數為不失中聲也至於絃數先儒謂伏羲蔡邕以九孫登以一郭璞以二十七頌琴以十三揚雄謂陶唐氏加二絃以會君臣之恩桓譚以為文王加少宫少商二絃釋知匠以為文王武王各加一以為文絃武絃是為七絃絃有三節聲自焦尾至中暉為濁聲自中暉至第四聲為中聲上至第一暉為清聲故樂工指法案中暉第一絃黄鍾案上為大呂二絃太族案上為夾鍾第三絃姑洗案上為中呂第四絃蕤賓單彈第五絃為林鍾案上為夷則第六絃為南呂案上為無射第七絃為應鍾案上為黄鍾清又曰琴之為樂所以詠而歌之也故其别有暢有操有引有吟有弄有調堯之神人暢為和樂而作也舜之思親操為孝思而作也襄陽會稽之類夏后氏之操也訓佃之類商人之操也離夏之類周人之操也謂之引若魯有闗雎引衛有思歸引之類也謂之吟若箕子吟齊夷吟之類也謂之弄若廣陵弄之類也謂之調若子晉調之類也黄帝之清角齊桓之號鐘楚莊之繞梁相如之綠綺蔡邕之焦尾以至玉牀響泉韻磬清英怡神之類名號之别也吟木沉散抑抺剔操擽擘倫齪綽璅之類聲音之法也暢則和畼操則立操引者引說其事吟者吟咏其事弄則習弄之調則調理之其為聲之法十有三先儒之說詳矣由是觀之琴之於天下合雅之正樂治世之和音也律呂正義絲樂雖多惟重琴瑟其為樂也最古其生聲也最正然具聲變之義者尤莫如琴今欲辨琴瑟之音調必先考其法制詳其絃度徽分然後體用備而理數明焉韓詩外傳云伏羲琴長七尺二寸史記云古者琴長八尺一寸爾雅大琴謂之離注琴大者二十七絃觀此史傳所載琴制無乃太大然禮記有大琴大瑟中琴小瑟之别則此制或即上古之大琴乎七尺二寸者乃八倍黄鍾之度約以今尺止五尺八寸三分二釐八尺一寸者乃九倍黄鍾之度約以今尺止六尺五寸六分一釐通攷載孔子琴長三尺六寸四分廣雅云琴長三尺六寸六分風俗通云琴長四尺五寸此葢中琴之制也夫四尺五寸乃五倍黄鐘之度約以今尺則三尺六寸四分五釐孔子之琴三尺六寸四分約以今尺則二尺九寸四分八釐四豪而廣雅所載與之相侔及觀今時所用大者通體三尺八寸上下岳山至焦尾絃度三尺五寸上下小者通體三尺一寸上下岳山至焦尾絃度二尺九寸上下其三尺五寸上下者為今尺四倍黄鍾之度其二尺九寸上下者為古尺四倍黄鍾之度葢中琴皆以四倍黄鍾之數為凖故孔子琴度乃百世之宜也今定琴制以時用大琴之三尺八寸有餘命為古尺之度約以今尺得三尺一寸三分四釐七豪為通體之長以孔子之琴古尺三尺六寸為岳山至焦尾絃度之數約以今尺得二尺九寸一分六釐此以下皆以今尺言其岳山之度用黄鍾九十分之三為二分四釐三豪自岳山内際至額用黄鍾九十分之二十七為二寸一分八釐七豪其額廣用黄鍾九十分之六十三為五寸一分零三豪其肩闊用黄鍾九十分之七十二為五寸八分三釐二豪其腰廣用黄鍾九十分之五十四為四寸三分七釐四豪其尾濶亦如之設鴈足於絃度四分之三此琴之體制也琴絃之有巨細者所以分各絃全度之音而琴徽之有疎宻者又所以節制各絃五聲二變之分以協和其聲調者也近世相傳制琴之法大琴宫絃二百四十綸一蠒一絲以十二絲為一綸過此則粗不及則細商絃二百有六角絃一百七十有二徴與商同羽與角同文一百三十有八武一百有四自宫至羽皆依次遞降三十四綸宮商角纒過一法徴絃亦纒用文絃為胎纒絃法大絃用七綸中琴用武絃為胎其中琴宫絃一百六十綸至角遞降二十綸小琴又比中琴遞降二十綸其所謂宫絃二百四十綸者乃第一大絃之數葢以絃之大小為五音之位遵國語大不踰宫細不過羽之說而為之次第如此也案史記舜彈五絃琴以歌南風之詩乃五音之正位其宫絃居中央而徴羽商角各分兩側者也如琴之六絃七絃世傳為文武所加者乃一絃二絃之清聲也其或謂之少宫少商者又隨一絃二絃之旋宫轉調而名之者也夫絲音以徴為本白虎通曰八音法易八卦絃離音也盛德在火其音徴此大絃之所以尚徵也故大絃為倍徵二絃為倍羽三絃為宫管子所云徴數一百八羽數九十六宫數八十一是也倍徴倍羽大於宫者即下徴下羽之謂非倍絃度之長乃倍絲綸巨細之分也是故一倍徴二倍羽三宫四商五角六絃應一絃而為正徴七絃應二絃而為正羽此七絃大小之次也如以五音相生度分定其巨細則倍徴為一百零八綸倍羽為九十六綸宫絃為八十一綸商絃為七十二綸角絃為六十四綸而正徴為五十四綸正羽為四十八綸此依三分損益之法而為七絃巨細之分也若夫徽之為用則案七絃之各分與全絃互相應和而定五音之正位也葢五音之位各有其分某分所在即應某聲合七絃之五聲而各分俱全就一絃之各分而五聲已備又就各絃之全而倍半分之節節有五聲之正節節有二變之位此定徽取分之大義也是以琴之十三徽中第七徽得絃度之半謂之中徽以其平分五聲之正位也七徽既平分絃度之半復以半度平分為二則四徽與十徽之分以四徽至岳山十徽至焦尾之度平分為二則一徽與十三徽之分於是以絃之全度三分之其一分為五徽其二分為九徽復以五徽至岳山之度半之為二徽以九徽至焦尾之度半之為十二徽仍以絃度五分之其一分為三徽其二分為六徽其三分為八徽其四分為十一徽此琴徽折取之定分也至於取音於徽分間有上下者葢以五音相生之度有當徽不當徽之别也其當徽而七絃俱用者惟七徽四徽一徽皆得本絃之正聲故又謂之三凖七徽為七絃全度之半四徽為七徽之半而一徽又為四徽之半也五徽九徽十徽之音雖亦當徽然七絃之中間有不用者所以徽分與絃度不可不並舉而詳覈之也管子曰凡起五音凡首先主一而三之四開以合九九以是生黄鍾小素之首以成宫者葢以下徴一絃為起絃度之本其全度命為一分三因而四分之以合九九八十一之數以此分定黄鍾之音為他小絃之首而成宫聲之位也如一絃全度為三尺六寸以三因之得一丈零八寸四分之則為二尺七寸此二尺七寸乃三尺六寸之四分之三即下徴一百零八分之八十一分故曰合九九之數也此下徴絃之宫位即十徽之分其相對者四徽四徽又為七徽之半此二徽者適當取音之正位焉又曰三分而益之以一為百有八為徴者以宫聲之分三分之而益一分以合一百有八之數乃下徴一絃之全分也又曰不無有三分去其乘而適足以是生商者以下徴之分三分之而去其一分適足商聲之分也徴絃之商位乃九徽之分其相對者五徽五徽又為九徽之半此二徽亦當取音之正位焉又曰有三分而復於其所以是成羽者以商聲之分三分之而益一分乃得下羽之分也徴絃之羽位在十三徽外九十分之五以十三徽至龍齦之度計之十三徽之相對者為一徽一徽又為四徽之半一徽四徽俱為七徽之清聲獨十三徽不當取音之正位焉又曰有三分去其乘適足以是成角者以下羽之分三分之而去其一分適足角聲之分也徴絃之角位在八徽内一百分之七分半八徽之相對者為六徽六徽又為十一徽之半此三徽皆不當取音之正位焉其餘十二徽乃羽絃之宫位角絃之徴位而應聲在十二徽外一百分之二十四十二徽之相對者為二徽二徽又為五徽之半二徽五徽俱為九徽之清聲獨十二徽不當取音之正位焉十一徽乃宫絃之角位而應聲在十一徽内一百分之二十分十一徽之相對者為三徽三徽又為六徽之半此三徽皆不當取音之正位焉至於角絃之宫位則在八徽九徽正中而羽絃之徴位商絃之宫位角絃之商位則在八徽上一百分之三十七分半此三絃取音之正位又居無徽之分焉如或以五音相生度分為徽之位次則逺近不均且宜於此者必不能宜於彼反不若折成分數互相資借為用之簡且易也以徽之用於絃者言之十三徽下徴一絃用之為下羽位下羽二絃用之為變宫位宫聲三絃用之為商位商聲四絃用之為角位角聲五絃用之為變徴位徴聲六絃用之亦為羽位羽聲七絃用之亦為變宫位此十三徽除二絃五絃七絃為二變不用其一絃三絃四絃六絃皆用之矣十二徽下羽二絃用之為宫位角聲五絃用之為徴位羽聲七絃用之亦為宫位此十二徽二絃五絃七絃用之矣十一徽下徴一絃用之為變宫位宫聲三絃用之為角位商聲四絃用之為變徴位徴聲六絃用之亦為變宫位此十一徽除一絃四絃六絃為二變不用獨三絃用之矣十徽下徴一絃用之為宫位下羽二絃用之為商位商聲四絃用之為徴位角聲五絃用之為羽位徴聲六絃用之亦為宫位羽聲七絃用之亦為商位此十徽獨三絃不用其餘六絃皆用之矣九徽下徴一絃用之為商位下羽二絃用之為角位宫聲三絃用之為徴位商聲四絃用之為羽位角聲五絃用之為變宫位徴聲六絃用之亦為商位羽聲七絃用之亦為角位此九徽獨五絃為變宫不用其餘六絃皆用之矣八徽下徴一絃用之為角位下羽二絃用之為變徴位宫聲三絃用之為羽位商聲四絃用之為變宫位徴聲六絃用之亦為角位羽聲七絃用之亦為變徴位此八徽除二絃四絃七絃為二變不用其一絃三絃六絃用之矣七徽則平分各絃之半七絃皆用之為正聲矣六徽乃十一徽之半各絃用之與十一徽同五徽乃九徽之半各絃用之亦與九徽同至於四徽則又七徽之半為七絃各音之清聲三徽又六徽之半為十一徽六徽之清聲二徽又五徽之半為九徽五徽之清聲一徽又為四徽之半乃七絃各音之最髙聲一徽之上則無以復加矣至於定絃取聲唐宋而來皆謂隋廢旋宫以後獨存黄鍾一均唐人紀琴以管色合字定一絃而宋志燕樂譜又以管色合字為黄鍾之律故以一絃合字謂之黄鍾之宫夫黄鍾之聲實非合字而琴之一絃又非宫位其以合字定一絃者何也邇來槩以笛之四字調為正調定琴之絃者正此調之聲字今考定黄鍾之聲實為笛之四字黄鍾之宫聲四字立下羽二絃以起調則姑洗之角聲上字立宫位三絃以主調此正角宫也是以倍無射之變宫合字立徴位一絃太簇之商聲乙字無射之羽聲凡字當二變之位而不用焉且絲樂既以徴音為本故琴之一絃得徴分三絃得宮分而五音相和之位始正此絃音之正宫調也如以律呂定琴之絃其徴律所定之絃不應徴絃之分而得角絃之分羽律所定之絃不應羽絃之分而得變徴絃之分變宮律所定之絃乃得徴絃之分宫律所定之絃乃得羽絃之分宫聲之律既為四字則變宫之律為合字也明矣宫律定絃既得羽分為四字則變宫之律定絃得徴分而為合字也益明矣此所以琴之一絃實有不得不定為合字之義也宋姜䕫論樂史稱其詳其七絃琴圖說曰七絃散而扣之則間一絃於第十徽取應聲如宫調五絃十徽應七絃散聲四絃十徽應六絃散聲二絃十徽應四絃散聲大絃十徽應三絃散聲惟三絃獨退一徽於十一徽應五絃散聲古今無知之者近世定絃之法先取第七絃為凖七絃之散聲和以五絃之十徽六絃之散聲和以四絃之十徽四絃之散聲和以二絃之十徽三絃之散聲和以大絃之十徽而五絃之散聲和以三絃之十一徽凡此二音互相應者為其聲之同故以和之也古者琴止五絃故以一絃與三絃為起音之本近世因增六絃七絃故以五絃與七絃或四絃與六絃為定絃之䂓要之皆一理也今以三絃立宮則一絃十徽乃下徴之宫位故應三絃之宫聲二絃十徽乃下羽之商位故應四絃之商聲四絃十徽乃商聲之徴位故應六絃之徴聲五絃十徽乃角聲之羽位故應七絃之羽聲至於五絃散扣乃角聲而宫聲三絃之角位實在十一徽則五絃之角聲正度安得不應於三絃之十一徽耶夫一絃之十徽與三絃之散聲相應者其間有下羽二絃變宫空絃實隔二絃以應於十徽又如四絃之十徽與六絃散聲相應者其間亦有角聲五絃與變徴空絃之二絃分也惟三絃與五絃之間無二變空絃之分止隔四絃一位而十徽與十一徽止較半聲之分此所以隔二絃之分者上應於十徽隔一絃之分者下應於十一徽故三絃獨退一徽與五絃相應也要之琴絃取音以各絃各分互相應和為本用絃之散聲和以各分之五聲者葢使聲調得以髙下相宣而備一曲之用也近世惟據正宫一調為論律呂之本是以有隋廢旋宫以後止存黄鐘一均之說然琴譜中有𦂳某絃為某調者實絃音旋宮轉調之義但未明晰其故以管律絃度相和取聲而考驗之耳今以律呂定琴之法言之管律絃度之五正聲得分陰陽二均以相合者止有三調即漢志所謂三統其餘得絃度之正分者或雜入陰呂之音其得陽律之音者又或值二變之位此正管律絃度生聲取分不同之所致也如上論絃音而不較以律呂則琴之陰陽二均亦皆各為七調然立羽絃羽分之聲必定以律呂而諸調始備是故絃音轉調皆以正宮一調為凖其各絃𦂳慢轉移之際而宫調旋於其中矣如宫調以備無射之律變宫合字定一絃得下徴之分倍無射之侓實為變宫尺字因近世定琴皆取笛之聲字故凡聲字俱以笛孔名之以黄鍾之律宫聲四字定二絃得下羽之分姑洗之律角聲上字定三絃得宫聲之分蕤賓之律變徴尺字定四絃得商聲之分夷則之律徴聲工字定五絃得角聲之分仍以倍無射之律變宫合字定六絃得徴聲之分應於一絃復以黄鍾之律宫聲四字定七絃得羽聲之分應於二絃其太簇之律商聲乙字所應則為變宫之分而無射之律羽聲凡字所應則為變徴之分此二分當二變之位而不用葢黄鍾宫聲立羽位以起調姑洗角聲立宫位以主調故為琴之正宫調七絃各分皆應陽律一均之聲字焉商調則二絃四絃五絃七絃不更其散聲仍得本律之聲字而一絃三絃六絃俱慢下管律一音葢以太簇之律商聲乙字定三絃立羽位以起調蕤賓之律變徴尺字所定之四絃立宫位以主調而倍無射之律變宫合字所定之一絃六絃下為倍夷則之律下羽凡字姑洗之律角聲上字所定之三絃下為太簇之律商聲乙字其倍無射之律變宫合字更為倍應鐘之呂清變宫髙六字當變徴之分姑洗之律角聲上字更為仲呂之呂清角髙上字當變宫之分而不用此調之五正聲分皆應陽律一均獨二變轉而應於陰呂焉角調則一絃三絃六絃不更其散聲仍得本律之聲字而二絃四絃五絃七絃俱𦂳上管律半音葢以姑洗之律角聲上字所定之三絃立羽位以起調蕤賓之律變徴尺字更為林鍾之呂清變徴髙尺字定四絃立宮位以主調而黄鍾之律宫聲四字所定之二絃七絃上為大呂之呂清宮髙五字蕤賔之律變徴尺字所定之四絃上為林鍾之呂清變徴髙尺字夷則之律徴聲工字所定之五絃上為南呂之呂清徴髙工字其黄鍾之律宫聲四字所應則當變徴之分蕤賓之律變徴尺字所應則當變宮之分而不用此調之五正聲内三聲雜入陰呂而二變反得陽律之聲字焉變徴調則獨𦂳五絃管律半音其餘六絃散聲仍得本律之聲字葢以蕤賓之律變徴尺字所定之四絃立羽位以起調夷則之律徴聲工字更為南呂之呂清徴髙工字定五絃立宫位以主調其太簇之律商聲乙字所應則當變徴之分夷則之律徴聲工字所應則當變宫之分而不用此調之五正聲内獨宫聲一聲雜入陰呂而二變亦得陽律之聲字焉徴調則獨慢三絃管律一音其餘六絃散聲仍得本律之聲字葢以夷則之律徴聲工字所定之五絃立羽位以起調姑洗之律角聲上字更為太簇之律商聲乙字定三絃立宫位以主調其姑洗之律角聲上字更為仲呂之呂清角髙上字當變徵之分無射之律羽聲凡字所應則當變宮之分而不用此調五正聲分皆應陽律而二變内變宫分亦應陽律獨變徴分雜入陰呂之聲字焉羽調則二絃五絃七絃不更其散聲仍得本律之聲字而一絃三絃六絃俱慢下管律一音四絃則慢下管律半音葢以倍夷則之律羽聲凡字即正無射之聲字定一絃六絃立羽位以起調黄鍾之律宫聲四字所定之二絃立宫位以主調而倍無射之律變宫合字所定之一絃六絃下為倍夷則之律羽聲凡字姑洗之律角聲上字所定之三絃下為太簇之律商聲乙字蕤賔之律變徴尺字所定之四絃下為仲呂之呂清角髙上字其倍無射之律變宮合字更為倍應鍾之呂清變宫髙六字當變宫之分蕤賓之律變徴尺字更為林鍾之呂清變徴髙尺字當變徴之分而不用此調五正聲内一聲雜入陰呂而二變亦雜入陰呂之聲字焉變宮調則一絃三絃四絃六絃不更其散聲仍得本律之聲字而二絃五絃七絃俱緊上管律半音葢以倍無射之律變宫合字所定之一絃立羽位以起調黄鍾之律宫聲四字更為大吕之吕清宮髙五字定二絃七絃立宫位以主調而夷則之律徴聲工字所定之五絃上為南呂之呂清徴髙工字其黄鍾之律宮聲四字所應則當變宮之分夷則之律徴聲工字所應則當變徴之分而不用此調之五正聲内二聲雜入陰呂而二變反得陽律之聲字焉清聲七調亦皆以清宫一調為凖其旋宮轉調一如濁聲七調若夫各絃之五聲二變之分何以取之則以各絃總度為率其各絃之全度與各絃内五聲二變位分之比即如五聲二變之各分與五聲二變每全分内之各分之比也如下徴首音之全度一百零八分與第二音下羽九十六分之比即如一絃首音之幾何度與二音之幾何度之比也又如第三絃宫聲首音之全度八十一分與第二音商聲七十二分之比即如三絃首音之幾何度與二音之幾何度之比也案五聲二變之定分比例推之其各絃之各分自得矣五聲正分誠有一定之位而二變之分亦有一定之序總之以七聲互相應和為凖若非二變之聲字以紀五聲之正位烏能辨絃音旋宮轉調之理也哉琴㫖王氏坦以五聲數論琴說夫古人審定八音之樂各從其類匏竹以度之長短較其空竅各均土以量之多寡較其中空容受金石以權衡之輕重較其厚薄等差革木止一聲為衆樂之節奏其體制大小悉以律呂為凖則至於絲則絲綸有巨細徽柱有長短必以五聲之數較定之方不失古聖人作樂精㣲之妙後世以絲竹之樂為八音之要領竹樂以律呂相較絲樂亦以律呂相較有謂黄鍾均以仲呂為角此以律呂論琴不得其所以然之理也有謂隋廢旋宮獨存黄鍾一均此以律呂論琴並失旋宮之義也或以律呂名調以徴調為蕤賔調以商調為姑洗調是也或以律呂名絃宋姜䕫七絃琴圖說黄鍾大呂並用慢角調故于大絃十一徽應三絃散聲云云是也或以律呂名徽明張右衮太古琴經以十二徽象十二月中之第七徽象閏是也紛紛聚訟訖無定說孟子曰不以六律不能正五音葢以六律六呂三分損益隔八相生之理正此五音也何嘗以六律六呂為此調此絃此徽之本乎絲樂絃音其體本實故絲綸巨細得數之多寡徽分長短得數之疎宻兼言琴曰徽柱獨論琴故曰徽分巨絃數多者分宻細絃數少者分疎故曰得數之疎宻則必較以五聲之數以某聲之數定其絲綸多寡之數為之體以某聲某聲之數定其徽分疎宻之數為之用此以五聲之數較絃音一定之理也琴雖七絃止有宮商角徴羽五正聲得為用巨絃數多以五聲數之多者主之細絃數少以五聲數之少者主之烏可以黄鍾之九寸太簇之八寸為凖耶自古原以五聲數論絃音故相傳有宮商角徴羽少宮少商七絃之名絃數多寡既以五聲數為凖則而徽分疎宻得聲之應和亦當以五聲數較之其理自明矣蕙田案此條與正義以五聲二變定絃音之度相合乃論琴之第一指歸也一絃尚徴說一絃為宫世傳其說久矣葢縁國語大不踰宮細不過羽之論也後世以此二語推之遂謂二絃為商三絃為角四絃為徴五絃為羽六絃應一絃為少宮七絃應二絃為少商其說雖近自然而不知實失古人作樂之㫖細案五音相生之序三分損益之法而一絃尚徴焉宮生徴徴生商商生羽羽生角宮損一分上生生徴益一分下生亦生徴宮之八十一三分之而損一分則為五十四乃徴聲之數徴之五十四三分之而益一分則為七十二乃商聲之數商之七十二三分之而損一分則為四十八乃羽聲之數羽之四十八三分之而益一分則為六十四乃角聲之數又如宮之八十一三分之而益一分則為一百有八乃徴聲之倍數倍徴之一百有八三分之而損一分則仍為七十二亦是商聲之數商之七十二三分之而益一分則為九十六乃羽聲之倍數倍羽之九十六三分之而損一分則仍為六十四亦是角聲之數案相生之音五而相生之數七宮為八十一商為七十二角為六十四徴為五十四羽為四十八徴數五十四倍之為一百有八羽數四十八倍之為九十六古聖立法上下相生損益並用故琴絃一定有七也倍徴一百有八綸為一絃三蠒一絲以十二絲為一綸過此則粗不及則細倍羽九十六綸為二絃宫八十一綸為三絃商七十二綸為四絃角六十四綸為五絃徴五十四綸為六絃羽四十八綸為七絃此依絃之巨細合五聲數而為之次第者也以三絃宫益之而生一絃倍徴此隔一下生之理一絃倍徴損之而生四絃商此隔二上生之理四絃商益之而生二絃倍羽此亦隔一下生之理二絃倍羽損之而生五絃角此亦隔二上生之理生五音相生至角而終角不能正聲也故琴止得五聲為用此三絃宫聲益而下生得第一絃至第五絃又以三絃宮損之而生六絃徴此隔二上生之理六絃徴益之亦生四絃商此隔一下生之理四絃商損之而生七絃羽此亦隔二上生之理七絃羽益之亦生五絃角此亦隔一下生之理此三絃宮聲損而上生得第三絃至第七絃若三絃宫聲上下相生損益並用得第一絃至第七絃之七絃矣此五音相生得七絃之次第以合絃之巨細者也凡此乃七絃得五聲自然之至理而不可易者若以一絃為宮豈能窮律呂貫通之妙哉白虎通曰八音法易八卦絲離音也盛徳在火其音徴一絃尚徴不益信哉蕙田案此條疏通正義絲音尚徴一絃非宮之義三絃獨下一徽說宋姜䕫七絃琴圖說謂黄鍾大呂並用慢角調故於大絃十一徽應三絃散聲太蔟夾鍾並用清商調故於二絃十一徽應四絃散聲姑洗仲呂蕤賓並用宮調故於三絃十一徽應五絃散聲林鍾夷則並用慢宮調故於四絃十一徽應六絃散聲南呂無射應鍾並用蕤賔調故於五絃十一徽應七絃散聲以律長短配絃大小各有其序載宋史樂志愚謂斯言秪得乎五調下一徽之當然而未明乎宮調三絃獨下一徽之所以然何也彼泥於律呂長短之說而未以絃度之五聲數詳覈之也案管子曰凡將起五音凡首先主一而三之四開以合九九以是生黄鍾小素之首以成宮載管子地員三之三因也四開四分也九九八十一也黄鍾宮聲也素煮漚白練乃熟絲即絃也小素即小絃也謂將起五音以倍徴一絃之全度三因之得三倍復四分為八十一宫位之度其絃之小於一絃者與此度之聲相應得宮聲因宮為聲之始而以此度為起音之首耳以五聲數細較之則案一絃之十徽而應乎三絃之散聲如琴之全度三尺六寸自岳山至四徽為九寸至七徽為一尺八寸至十徽為二尺七寸至焦尾為三尺六寸以三尺六寸而三因之則為一丈零八寸以一丈零八寸而四分之則為二尺七寸適在十徽之位與一絃之一百有八三因而四分之得八十一之數正相合也十徽係常用之位得本絃相和之音與本絃與九徽相和之音同因九徽隔二和以散聲之正隔一和以散聲之倍十徽則隔一和以散聲之正隔二和以散聲之倍故也審音者知九徽乃本絃相生得我生之聲而相和若于十徽自全度損益相生皆不能及其位予細審所以與本絃相和者乃生本絃之聲故爾也十徽為全度四分之三三分益一分則為四分是十徽之位生全度散聲得生我之聲故亦相和也管子用三其實而四其法以覈之自得生我之聲即司馬氏律書四其實或倍其實而三其法以得我生之聲之理也古人審音之宻取法之簡便其妙如此葢倍徴之一絃其全度計一百有八分三因之則為三百二十四以三百二十四而四分之則為八十一一絃十徽即宮聲八十一之分而三絃全度亦宮聲八十一之分故一絃十徽應三絃散聲也夫一絃屬徴既得生徴之宮於十徽以應乎三絃之散聲則餘絃自當以五聲數用三因四分之法較之而三絃獨下一徽之理自明矣故以倍羽二絃全度九十六分而三因之則為二百八十八以二百八十八而四分之則為七十二矣二絃十徽即商聲七十二之分而四絃全度亦商聲七十二之分故二絃十徽應四絃散聲也以商聲四絃全度七十二分而三因之則為二百一十六以二百一十六而四分之則為五十四矣四絃十徽即徴聲五十四之分而六絃全度亦徴聲五十四之分故四絃十徽應六絃散聲也以角聲五絃全度六十四分而三因之則為一百九十二以一百九十二而四分之則為四十八矣五絃十徽即羽聲四十八之分而七絃全度亦羽聲四十八之分故五絃十徽應七絃散聲也以上各絃俱案十徽而與散聲應惟三絃則獨案十一徽以應五絃之散聲者非有他也亦就三絃之分數與五絃之全度相較而得之耳蓋宮聲三絃之全度本八十一分三因之則為二百四十三以二百四十三而四分之則為六十零七五夫三絃之十徽固六十零七五之分矣案六十零七五之數比變徴五十六八八則有餘比角六十四則不足比清角五十九九二雖不及一分然聲音之辨毫釐不紊又不得謂之清角葢十徽為生散聲之位如一絃徴十徽宮所生也二絃羽十徽商所生也四絃商十徽徴所生也五絃角十徽羽所生也三絃為宮無生宮之聲故三絃十徽六十零七五之分非案聲之位而五絃之全度則為角聲六十四之分必案乎三絃角聲六十四之分始克應乎五絃之全度也而三絃角聲六十四之分實在十一徽此三絃之所以獨下一徽以應五絃之散聲者也蕙田案此條於正義宮聲三絃之角位實在十一徽之義闡發最詳五絃獨上半徽說五絃獨上半徽古今未有論及者大抵調琴必於十徽九徽審音之髙下為定絃之䂓如散扣七絃有間一絃而於五絃案十徽以取應聲者有間二絃而於四絃案九徽以取應聲者一散一案次第定絃以至於一絃而絃胥定矣三絃之案十一徽常及用也五絃之案八徽半不及用也葢散扣内之細絃案彈外之巨絃五聲之數固相和三絃為八十一之分一絃十徽亦八十一之分四絃為七十二之分一絃九徽亦七十二之分而案彈内之細絃散扣外之巨絃細絃案聲適合巨絃散聲五聲之倍數亦相和也七絃十徽為三十六之分乃商聲之半應四絃七十二商聲之正七絃九徽為三十二之分乃角聲之半應五絃六十四角聲之正絲樂倍半聲相和倍律對正律言為倍正律對半律言亦為倍也試言之七絃十徽應四絃散聲六絃十徽應三絃散聲五絃十徽應二絃散聲四絃十徽應一絃散聲此十徽案絃應散聲之倍數也二絃案十一徽亦不及用矣七絃九徽應五絃散聲六絃九徽應四絃散聲四絃九徽應二絃散聲三絃九徽應一絃散聲此九徽案絃應散聲之倍數也惟五絃獨上半徽以應三絃之散聲何也三絃和五絃散聲必下一徽則五絃和三絃散聲亦必上半徽也十徽至十一徽度短九徽至八徽度長上半徽之度與下一徽之度長短適合夫十徽之分為全度四分之三以全應散聲為四分三分而益一分為四分别十徽之分生全度散聲三分而損一分則為二分則十徽之分又生七徽之分矣七徽乃全度之半其理同也獨三絃之十徽無案聲之位者即五音相生始於宮之理宮為君聲不能有生宮之聲三絃為宮故三絃之十徽無案聲之位必下一徽始應五絃散聲既用管子審音之法覈之矣若九徽之分為全度三分之二以全度散聲為三分三分而去一分為二分則全度散聲生九徽之分獨五絃之九徽無案聲之位者即五音相生終於角之理琴止用五正聲角生變聲而不能生正聲五絃為角故五絃之九徽無案聲之位必上半徽始應三絃散聲是當用五音相生之法覈之也何也九徽之五聲皆本絃相生之聲九徽為全度三分去一之位則各絃之聲不皆三分去一而得相生之聲哉即如七絃羽聲羽生角也九徽乃三十二角聲之半故應五絃角散聲六絃徴聲徴生商也九徽乃三十六商聲之半故應四絃商散聲四絃商聲商生羽也九徽乃四十八之羽位故應二絃倍羽散聲三絃宫聲宮生徴也九徽乃五十四之徴位故應一絃倍徴散聲至於五絃角聲角生變宮九徽乃四十二六六係變宮之半變宮本無散聲以相和也絲樂止用五聲之正二變雖有其位不用須知五絃既應以三絃而三絃固宮聲也宮必以宮相應而惟五絃四十零五宮聲之半位實在八徽半此五絃之所以獨上半徽以應三絃宮之散聲也蕙田案此條以五音相生始於宮宮為君聲不能有生宮之聲終於角角生變聲不能生正聲之理疏三絃宮十徽無案聲之位必下一徽始應五絃散聲五絃角九徽無按聲之位必上半徽始應三絃散聲而以五音相生之法定五絃八徽半為宮聲之半位以應三絃宮聲之全數尤為獨闢精到釋黄鍾均以仲吕為角之疑説朱子琴律曰古之為樂者通用三分損益隔八相生之法若以黄鍾為宮則姑洗之為角有不可以毫髮差者而今世琴家獨以仲呂為黄鍾之角故於衆樂常髙一律惟第三絃本是角聲乃得守其舊而不變流傳既久雖不知其所自來然聴以心耳亦知非人力所能為也昔人亦有為之說者皆無足取其曰五聲之象角實為民以民為貴故於此焉上之者則穿鑿而迂疎亦已甚矣近世惟長樂王氏之書所言禮樂最為近古然其說琴亦但以第三絃為律中仲呂而不言其所以然予用是益以為疑愚謂朱子此言亦以一絃為宮也其意曰一絃為宮則第三絃為角一絃之宮定為黄鍾則三絃之角必定為姑洗夫一絃為黄鍾其十徽乃仲呂之位案下凖焦尾至七徽之絃度合十二律呂之位如散聲為黄鍾則十三徽六分為大呂十三徽一分為太蔟十二徽二分為夾鍾十徽八分為姑洗十徽為仲呂九徽四分為蕤賔九徽為林鍾八徽半為夷則七徽九分為南呂七徽六分為無射七徽三分為應鍾七徽亦為黄鍾與散聲相同也琴止用五正聲律呂得相合為用者黄鍾太蔟姑洗林鍾南呂五聲而已其餘俱不得為用故不可較以十二律呂止以五聲之數考之最為簡便不當應第三絃姑洗之角似與律呂相生之理不能合故有此疑也夫以一絃全度散聲為黄鍾宮上生九徽之林鍾徴以應四絃散聲林鍾徴下生十三徽之太簇商以應二絃散聲太簇商上生八徽之南呂羽以應五絃散聲而南呂羽下生十一徽之姑洗角獨不應三絃散聲其應三絃散聲者乃在十徽之仲呂角是可疑矣殊不知一絃實非宮分本屬徴也三絃之為角分者乃宮也惟以一絃全度散聲為林鍾徴上生九徽之太簇商而應四絃散聲太簇商下生十三徽之南呂羽而應二絃散聲南呂羽上生八徽之姑洗角而應五絃散聲姑洗角下生十一徽之應鍾變宮為不用之位變宮無散聲相應雖有其位不用故不應三絃散聲也應夫三絃散聲者乃十徽之黄鍾宮也蓋朱子以律呂之長短用三分損益之法相較故無由得其所以然之理若以五聲之位得絃度之長短用三分損益之法相較則知一絃為徴三絃為宮而絃音與徽分皆得應和自與律呂相生之理相合矣如絃度之十徽乃全度四分之三三分益一分而為四分則十徽之位生全度之散聲也夫五音相生宮為聲之始無聲以生宮也衆絃於十徽有聲為用皆生散聲者也惟三絃於十徽無聲為用因三絃為宮故十徽無聲以生之也此三絃為宮之至理知三絃之屬宮則知一絃六絃屬徴二絃七絃屬羽四絃屬商五絃屬角矣一絃屬徴則一絃之十一徽非姑洗角位乃應鍾變宮之位也自不應三絃散聲其十徽非仲呂角位乃黄鍾之宮位也自應三絃散聲矣三絃屬宮則三絃之十徽乃仲呂角位自不應五絃散聲其十一徽乃姑洗角位自應五絃散聲矣然則論琴者惟以絃度之長短較以五聲自然得其要而有合於管子徴羽之數大於宮與白虎通一絃尚徴之說也蕙田案此條釋以仲呂為黄鍾之角由誤以一絃為宮而不知一絃十徽乃黄鐘之宮位三絃十一徽乃姑洗角位也此疑釋而三絃為宮一絃為徴之義無遺藴矣泛音四凖說泛音不假案抑得自然之聲雖與實音稍異要不外乎五聲二變之理葢實音有三凖每凖之内不拘某絃俱得五聲二變之七聲不論當徽不當徽但遇五聲二變度分俱可案其度分而得聲也至於泛音則當為四凖毎凖之内一絃四絃六絃得二正聲一變聲二絃七絃得二正聲三絃得三正聲五絃得一正聲一變聲必於徽間始有聲否則無聲葢一徽四徽七徽十徽十三徽聲相同二徽五徽九徽十二徽聲相同三徽六徽八徽十一徽聲相同故有三聲其有秪得二聲者徽不遇五聲二變之度分故也以各徽所得之五聲二變言之一徽四徽七徽十徽十三徽俱得本絃之正聲如一絃屬徴則一徽四徽七徽十徽十三徽皆屬徴二絃屬羽則一徽四徽七徽十徽十三徽皆屬羽是也餘倣此二徽五徽九徽十二徽俱得本絃正聲相生之聲如一絃六絃屬徴徴生商得商聲二絃七絃屬羽羽生角得角聲三絃屬宮宮生徴得徴聲四絃屬商商生羽得羽聲五絃屬角角生變宮得變宮聲三徽六徽八徽十一徽在三絃則得角聲角生變宮故在一絃六絃而得變宮之聲變宮生變徴故在四絃而得變徴之聲變徴生清宮故在二絃七絃而得清宮之聲有其位而不用清宮生清徴故在五絃而得清徴之聲有其位而不用此隔一下生隔二上生之理也三絃之三徽六徽八徽十一徽之角聲生一絃六絃三徽六徽八徽十一徽之變宮聲即如三絃宮聲與三絃一徽四徽七徽十徽十三徽宮聲生一絃六絃徴聲與一絃六絃一徽四徽七徽十徽十三徽徴聲之比三絃二徽五徽九徽十二徽徴聲生一絃六絃二徽五徽九徽十二徽商聲之比也此各絃泛音得各徽五聲二變之大槩也以各徽相對而音相同者言之六徽與八徽相對五徽與九徽相對四徽與十徽相對三徽與十一徽相對二徽與十二徽相對一徽與十三徽相對徽相對而所出之音必相同者無他由焦尾至七徽中間各徽之五聲二變度分與岳山至七徽中間各徽之五聲二變度分彼此相同故也大抵泛音之取音以七徽居中為界劃七徽上至岳山下至焦尾分而為二實音附木取音不論徽之逺近俱自岳山一邊而出泛音以指浮絃上徽之上下皆為震動則徽之上下皆有聲出去岳山逺則聲低而濁近則聲高而清高而清之聲既出低而濁之聲自不能出矣如六徽至一徽在七徽之上得聲之清所出五聲二變度分之聲與實音相同八徽至十三徽在七徽之下得聲之濁合諸五聲二變度分不能出聲所出之聲乃從焦尾至各徽而出故不得與實音相同也即就一絃所值之徽而論一絃七徽居全度之中上至岳山下至焦尾逺近相均同為五十四之徴其聲清濁互出得本絃之正聲六徽為四十二六六之變宮位皆五聲二變之半或半之又半俱不細註五徽為三十六之商位四徽乃七徽之半為二十七之本絃徴位三徽乃六徽之半為二十一三三之變宮位二徽乃五徽之半為十八之商位一徽乃四徽之半為十三五之本絃徴位此七徽之上六徽俱得本絃五聲二變度分由聲之清故得與實音相同八徽為六十四之角位泛音乃變宮聲葢自焦尾計至八徽乃四十二六六之變宮位也九徽為七十二之商位泛音亦得商聲此九徽適合者自焦尾計至九徽乃三十六之商位合實音七十二商聲之半倍半之聲原相同也十徽為八十一之宮位泛音乃徴聲自焦尾計至十徽乃七徽之半為二十七之本絃徴位也十一徽為八十五三三之變宮位泛音亦得變宮聲此十一徽適合者自焦尾計至十一徽乃八徽之半為二十一三三之變宮位合實音八十五三三變宮半之又半倍半而又半聲亦相同也十二徽一絃原無五聲二變之位泛音得聲為商聲自焦尾計至十二徽乃九徽之半為十八之商位也十三徽為九十六之羽位泛音乃徴聲自焦尾計至十三徽乃十徽之半為十三五之本絃徴位也此七徽之下六徽由聲之濁不與實音相同俱得焦尾至七徽五聲二變度分之清聲焉故七徽上下必判而為二七徽之上四徽至七徽為上之下凖一徽至四徽為上之上凖七徽之下十徽至七徽為下之上凖十三徽至十徽為下之下凖此泛音之四凖與實音之得聲自有分别也蕙田案按徽取音合五音相生之度其當徽而七絃俱用者惟七徽四徽一徽得本絃之正聲而名之曰三凖及各音當徽不當徽取用與不取用之義已詳見正義中兹特存王氏泛音四凖以補未備案聲散聲相和說鼓宮宮應彈角角動音相凖也故徽分之位恒與散聲相和向來註譜之家類多錯認分數斯律之能協者寡矣兹特以絃度五聲之數較定徽分於後而兩言以該之曰案彈外散扣内案彈内散扣外試以案彈外散扣内言之間四絃者案七徽間三絃者二絃則案七徽六分一絃三絃則案七徽九分間兩絃者案九徽間一絃者各絃俱案十徽惟三絃案十徽八分兩絃相連者二絃五絃則案十二徽二分一絃三絃四絃六絃則案十三徽一分此皆案彈外散扣内也皆正聲之相和者也以案彈内散扣外言之間四絃者亦案七徽兩絃相連者二絃四絃五絃七絃則案七徽六分三絃六絃則案七徽九分間一絃者惟五絃案八徽半餘絃俱案九徽間兩絃者案十徽間三絃者五絃七絃則案十二徽二分六絃則案十三徽一分此皆案彈内散扣外也皆倍聲之相和者也至七徽為正聲之半和以正聲之倍亦案彈内散扣外此則倍聲之倍之相和者也其有不相和而實可和者乃相生之聲相和亦必案彈内散扣外如案彈外散扣内雖亦得相生之位而聲音乖舛不可為用間兩絃者案七絃如按彈七絃羽聲應散扣四絃商聲商生羽而相和也案彈六絃徴聲應散扣三絃宮聲宮生徴而相和也餘可類推乖此俱散聲生案聲也若案聲生散聲音雖不舛譜亦不多用間三絃者五絃七絃則案七徽六分六絃則案七徽九分間四絃者案九徽兩絃相連者二絃四絃五絃七絃則案十徽三絃六絃則案十徽八分葢三絃十徽八分之位為角應二絃羽自當案十徽八分至於六絃原不當案十徽八分之位所以案之者因六絃十徽之位為宮不與五絃角相和惟十徽八分為變宮之位與五絃角聲相生而相和故案之耳間一絃者惟五絃案十二徽二分餘絃俱案十三徽一分夫七絃之十二徽二分亦為宮位而案十三徽一分者十三徽一分亦變宮之位應五絃角聲也故同一案彈内散扣外而此之相和有不可以倍聲例者葢相生之聲之相和者也以上乃下凖之各徽分得各絃散聲相和之大要若中凖上凖之徽分與下凖之徽分同亦得各絃散聲相和之聲焉如按一絃中凖五徽之三十六分上凖二徽之十八分六絃中凖五徽之十八分上凖二徽之九分俱應四絃散聲之七十二分葢絃音之半半而又半半之半而又半皆與倍聲相和然亦有兩絃俱散扣而相和者間四絃者本絃之聲得倍半而相和一絃為六絃之倍二絃為七絃之倍是也間兩絃者乃相生之聲相和如一絃徴生四絃商二絃羽生五絃角是也間一絃者惟五絃角不與三絃宮相和餘亦以相生之聲相和如三絃宮生一絃徴四絃商生二絃羽是也總而言之各絃相應之聲不出乎正聲倍聲與相生之聲三者之範圍故並著其同異以明之同者謂倍聲與正聲相同異者謂相生之聲與正聲較其數實異也蕙田案此篇可證明正義内案七絃之各分與全絃互相應和合七絃之五聲而各分俱全就一絃之各分而五聲已備又就各絃之全而倍半分之節節有正聲之正節節有二變之位之義而歸於正聲倍聲與相生之聲三者可謂罄其藏而無遺藴矣旋宮轉調說上古聖人心通造化黙會聲氣之元製為旋宮轉調五調相轉循環不息與五行相生之機一一脗合葢五行之於萬物一物有一物之體用五音之為五調一調有一調之體用也如宮調以宮絃為體衆絃為用商調以商絃為體衆絃為用角徴羽調莫不皆然秦火以來樂經既失旋宮之義晦而不明所以有隋廢旋宫獨存黄鍾一均之說自唐宋元明以迄於今琴家専肄聲音熟諳譜調而未嘗詳攷理學之原儒者空談理數拘守舊聞而不屑研究聲字之義若二者相兼窮其理而究其聲旋宮轉調之理豈不復明哉唐人之紀琴以管色合字定一絃則四字定二絃上字定三絃尺字定四絃工字定五絃六字定六絃五字定七絃乃管音之四字調四字調為正調而乙凡不用琴之二變亦不用故以四字調之合字定一絃其餘聲字皆與各絃相合也後世因之以管律合絃音相和取聲而𦂳某絃慢某絃得某絃之聲轉為管律之某聲某字或絃有不𦂳慢者原為管律之某聲某字立羽位以起調以原得某絃轉為宮絃立宮位以主調則定為某調於是定為宮商角變徴徴羽變宮之七調自愚論之所謂旋宮轉調者以角絃易為宮絃其宮旋也角既為宮則宮轉為徴徴轉為商商轉為羽羽轉為角五聲轉則調亦轉矣調之相轉由於聲之相轉而聲之轉必以相生之聲而相轉以相生之聲相轉則旋宮之義見矣葢五音之相生始於宮而終於角始於宮故無生宮之聲而無聲相轉以為宮終於角角不能生正聲而生變聲變聲又無散聲為用故無相轉之聲惟於角聲所值之絃𦂳一音而即為宮聲𦂳一音者乃角至清角之一音在絃度止得半分即宮至變宮徴至變徴之理此之謂旋宮也角不能生宮既𦂳一音而旋為宮則宮生徴而轉徴徴生商而轉商商生羽而轉羽羽生角而轉角也五聲既以相生之聲相轉則五調亦以相生之聲相轉也此之謂旋宮轉調也以九徽十徽相較旋宮之理甚明葢九徽案聲惟角絃在九徽上之八徽半十徽案聲惟宮絃在十徽下之十徽八分以角絃𦂳一音則八徽半之案聲移于九徽十徽之案聲移于十徽八分角絃易為宮絃也故謂旋宮聲之相轉亦易明也宮絃十徽八分之案聲移于十徽宮轉徴也羽絃九徽之案聲移于八徽半羽轉角也餘絃皆有相轉自然之理可知矣五聲既轉故謂轉調定相轉之五調必知某調以某絃為體而旋宮始有所施由是言之琴其以三絃為體矣乎就宮調而論三絃本為宮聲而宮調以三絃為宮則三絃為體也明矣若次第相轉為徴商羽角之調三絃俱次第相轉得徴商羽角之聲是宮調以三絃為宮以立體則徴商羽角調亦即以三絃為徴商羽角以立體矣則三絃之為體也益明矣琴雖有七絃而窮乎律呂之貫通五絃已備故三絃居中為體一絃二絃與四絃五絃則分兩側為用如宮調三絃為宮聲居中為體一絃二絃為徴羽四絃五絃為商角分兩側為用商調則三絃為商聲居中為體一絃二絃為羽宮四絃五絃為角徴分兩側為用角調則三絃為角聲居中為體一絃二絃為宮商四絃五絃為徴羽分兩側為用徴調則三絃為徴聲居中為體一絃二絃為商角四絃五絃為羽宮分兩側為用羽調則三絃為羽聲居中為體一絃二絃為角徴四絃五絃為宮商分兩側為用至於六絃七絃乃一絃二絃之清聲用以髙下相宣洪纎並奏為樂曲始終之節奏而聲調體用之理實則止於五所以舜有五絃琴也此五調以三絃為體衆絃為用之理也大凡諸調不拘某絃但案在十徽八分而與他絃散聲應者為宮絃案在八徽半而與他絃散聲應者為角絃其在宮調一絃六絃為徴二絃七絃為羽三絃為宮四絃為商五絃為角葢三絃於十徽八分應五絃散聲是三絃為宮五絃於八徽半應三絃散聲是五絃為角因三絃立宮位以主調故為宮調其在徴調以宮調之角聲五絃𦂳一音旋為宮聲即蕤賔調則一絃六絃徴俱轉為商二絃七絃羽俱轉為角三絃宮轉為徴四絃商轉為羽葢五絃於十徽八分應二絃七絃散聲是五絃為宮二絃七絃於八徽半應五絃散聲是二絃七絃為角因徴調之三絃宮轉為徴而三絃立徴位以主調故為徴調其在商調以徴調之角聲二絃七絃俱𦂳一音旋為宮聲即𦂳二五七絃一音之姑洗調則一絃六絃商俱轉為羽三絃徴轉為商四絃羽轉為角五絃宮轉為徴葢二絃七絃於十徽八分應四絃散聲是二絃七絃為宮四絃於八徽半應二絃七絃散聲是四絃為角因徴調之三絃徴轉為商而三絃立商位以主調故為商調其在羽調以商調之角聲四絃𦂳一音旋為宮聲即慢一三六絃一音之慢宮調則一絃六絃羽俱轉為角二絃七絃宮俱轉為徴三絃商轉為羽五絃徴轉為商葢四絃於十徽八分應一絃六絃散聲是四絃為宮一絃六絃於八徽半應四絃散聲是一絃六絃為角因商調之三絃商轉為羽而三絃立羽位以主調故為羽調其在角調以羽調之角聲一絃六絃俱𦂳一音旋為宮聲即慢三絃一音之慢角調則二絃七絃徴俱轉為商三絃羽轉為角四絃宮轉為徴五絃商轉為羽葢一絃六絃於十徽八分應三絃散聲是一絃六絃為宮三絃於八徽半應一絃六絃散聲是三絃為角因羽調之三絃羽轉為角而三絃立角位以主調故為角調若欲仍定為宮調以角調之角聲三絃𦂳一音旋為宮聲角調自宮調次第相轉各絃俱𦂳惟三絃未𦂳今三絃亦𦂳則七絃俱𦂳而仍為宮調矣則一絃六絃宮俱轉為徴二絃七絃商俱轉為羽四絃徴轉為商五絃羽轉為角是三絃仍於十徽八分應五絃散聲而三絃為宮矣五絃仍於八徽半應三絃散聲而五絃為角矣因角調之三絃角𦂳一音旋為宮而三絃仍立宮位以主調故復轉為宮調此旋宮轉調至當不易之理也蕙田案此篇以各調之角聲𦂳一音盡旋宮轉調之藴似為簡便直截又案八音樂器其古制之存於今者莫如琴自古樂既亡歴代以來說琴者多失其㫖其誤一在不明管子三因九開之法而以管音律呂定絃音一在不知以五聲二變明絃音之度分而以律呂分徽位一在泥於大不踰宮之說而以一絃為宮不知管子一百八為徴之倍數及白虎通離音尚徴之意一在不知三絃為宮而以一絃十徽為仲呂一在惟據正宮一調論律呂謂隋廢旋宮止存黄鍾一均而不知五聲旋宮轉調之全葢古器雖存而義藴久晦矣惟我聖祖御製正義一一考定詳明案之於絃度而五聲二變無有不合求之於徽位而散聲案聲靡所不通於是一絃為徴三絃為宮而取徽定分三絃獨下一徽五絃獨上半徽與夫旋宮轉調之理皆有以考其當然知其所以然而不可易洵發古人之所未發矣通州王素堂名坦精於琴著琴㫖三萬言疏通證明與正義之指多合因采其尤者附録於後千古絶業幸得復明庶幾後之審音者有所考也又案以上琴禮記樂記清廟之瑟朱絃而疏越注朱絃練朱絃練則聲濁越瑟底孔也葢疏之使聲遲也儀禮鄉飲酒禮工四人二瑟瑟先相者二人皆左何瑟後首挎越内絃右手相工入升自西階北面坐相者東面坐遂授瑟乃降鄉射禮席工於西階上少東工四人二瑟瑟先相者皆左何瑟面鼓執越内絃右手相燕禮小臣左何瑟面鼓越内絃右手相大射儀席工於西階上少東工六人四瑟相者皆左何瑟後首内絃挎越右手相爾雅大瑟謂之灑注長八尺一寸廣一尺八寸二十七絃疏世本曰庖犧氏作五十絃黄帝使素女鼓瑟哀不自勝乃破為二十五絃具二均聲禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之番番贏也頌瑟長七尺二寸廣一尺八寸二十五絃盡用之熊氏云瑟兩頭有孔其在底下者名越孫叔然云郭云二十七絃未見所出荀子瑟易良呂氏春秋古樂昔朱襄氏之治天下也多風而陽氣畜積萬物解散果實不成故士達作為五絃瑟以來陰氣以定羣生帝堯立鼓乃柈五絃之瑟作為十五絃之瑟舜立鼓延乃柈鼓之所為瑟益之八絃以為二十三絃之瑟注柈分尚書大傳大瑟朱絃達越白虎通瑟者嗇也閑也所以懲忿聶氏三禮圖舊圖云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之番番贏也頌瑟長七尺二寸廣尺八寸二十五絃盡用陳氏樂書古之論者或謂朱襄氏使士達制為五絃之瑟瞽叟又判之為十五絃舜益之為二十三絃或謂大帝使素女鼓五十絃瑟帝悲不能禁因破為二十五絃郭璞釋大瑟謂之灑又有二十七絃之說以理考之樂聲不過乎五則五絃十五絃小瑟也二十五絃中瑟也五十絃大瑟也漢武之祠太一后土作二十五絃瑟今大樂所用亦二十五絃葢得四代中瑟之制也莊周曰夫或改調一絃於五音無當也鼓之二十五絃皆動其信矣乎聶崇義禮圗亦師用郭璞二十三絃之說其常用者十九絃誤矣葢其制前其柱則清後其柱則濁有八尺一寸廣一尺八寸者有七尺二寸廣尺八寸者有五尺五寸者豈三等之制不同歟然詩曰椅桐梓漆爰伐琴瑟易通卦驗冬日至鼓黄鍾之瑟用槐八尺一寸夏日至用桑五尺七寸是不知美檟槐桑之木其中實而不虚不若桐之能發金石之聲也蕙田案郭無二十三絃之說陳氏謂聶氏師用郭說疑有悞律呂正義琴瑟雅樂古人平居不離於側近時之瑟除郊廟大樂外用之者少雖相傳有譜不過并兩絃以取聲猶笙之合兩管為一聲耳詩云鼓瑟吹笙葢二者理同而聲相和也記稱大琴大瑟中琴小瑟為四代之樂器爾雅大瑟謂之灑註長八尺一寸又鄉飲酒禮工四人二瑟瑟先相者二人皆左荷瑟後首挎越内絃右手相鄉射禮相者皆荷瑟面鼓執越内絃右手相燕禮大射儀皆同夫相者右手相工而左手荷瑟又多使童子為相使其形制過大非童子一手之力所能勝是知爾雅所載大瑟乃郊廟所用儀禮所載則古之小瑟為燕飲所用而今時之筝或即古小瑟之變制矣乎今禮部太常所用長至今尺七尺六寸有竒廣一尺八寸有竒髙一尺餘槩以時尺度古律數也夫以時尺律數推定瑟制其長短厚博必度以時尺之數而後可若以古尺律數推定瑟制其長短厚博亦必度以古尺之數而後可爾雅大瑟之八尺一寸者乃九倍黄鍾古尺之度約以今尺為六尺五寸六分一釐也以此度為瑟體通長適合古今之宜焉至於首廣則用倍黄鍾之度得今尺一尺四寸五分八釐自首至尾分為四節以首廣之倍黄鍾數分為二十分一節遞减一分每分即黄鍾之十分之一以二十分之十九分為前腰得一尺三寸八分五釐一毫二十分之十八分為後腰得一尺三寸一分二釐二毫二十分之十七分為尾廣得一尺二寸三分九釐三毫前梁至首額用黄鍾之分為七寸二分九釐後梁至尾末用倍黄鍾之分為一尺四寸五分八釐前後梁之廣髙俱用黄鍾之十分之一為七分二釐九豪除首尾共三倍黄鍾之分二梁以内絃分之長用六倍黄鍾之分為四尺三寸七分四釐至於瑟體之高則其前首面以黄鍾之分為通髙以黄鍾十分之六為額厚自邉至足以黄鍾三分之二為通髙其後尾面以黄鍾十分之八為通髙以半黄鍾為尾厚自邉面至足亦以半黄鍾為通髙以黄鍾四分之一為邉厚此瑟之體制也其全體雖為宮聲之分而絃度實得徴聲之分故為絲音之正與律呂得以相和取聲又據瑟有大小而絃無巨細總以宮聲之數為準用八十一綸三倍之乃二百四十三綸以為絃葢瑟體比琴為大故絃亦加其綸也瑟有柱而琴無柱琴絃因巨細以别聲而瑟絃一制縁設柱以别聲柱逺則絃慢而聲以濁柱近則絃緊而聲以清絃凡二十有五中央一絃用黄色以别之立宮位為衆絃之凖兩傍各朱絃一十有二此瑟之絃制也樂工定絃但酌其逺近以取聲而柱無定位大槩一絃與十四絃定合字二絃與十五絃定四字三絃與十六絃定上字四絃與十七絃定尺字五絃與十八絃定工字六絃與十九絃定六字七絃與二十絃定五字八絃與二十一絃定髙上字九絃與二十二絃定髙尺字十絃與二十三絃定髙工字十一絃與二十四絃定髙六字十二絃與二十五絃定髙五字并兩絃而取一聲此時傳瑟譜之法仍以頭管合字為最低聲而起一絃亦如琴之一絃定以合字而為宮聲者也以旋宫之理考之夫用合四上尺工之五字則乙凡不用而為四字調今所定黄鐘之宮聲實為笛之四字此即黄鐘之宫聲立下羽位以起調而姑洗之角聲立宫位以主調實絃音之正宮調也案琴與瑟皆以笛之聲字言者為頭管之聲字與笛同也瑟之用絃二十有五者葢如古之鳳簫與笙三十六管或二十四管務使備用而無更器移柱之煩也至於合二絃以取音者使其髙下相宣全半相協不偏不倚不咽不翕然得中和之聲也如果二十餘絃不分清濁同一宮調則何事乎二十五絃止用十二絃或亦如琴之七絃足矣今約為定絃施柱之法以正中黄絃為界中分二十四絃取黄鍾正宮之下徴以定中絃之散聲復以中絃全度四分之三設柱以和之為黄鍾正宮之聲為一瑟之主而他絃皆取法乎此焉於是以上十二絃為濁音一均之分散聲皆和以黄鍾宫之徴音下十二絃為清音一均之分散聲皆和以大呂宮之徴音取徴音者以絲音尚徴之義也濁音之絃為應黄鍾宮之五正聲清音之絃為應大呂宮之五正聲此二均之分已定乃隨各宮調設柱以别度分之逺近焉宫調絃則以濁音十二絃之第一絃定以倍無射之律變宮合字為下徴之分二絃定以黄鍾之律宮聲四字為下羽之分三絃定以姑洗之律角聲上字為宮絃之分四絃定以蕤賔之律變徴尺字為商絃之分五絃定以夷則之律徴聲工字為角絃之分六絃仍定以倍無射之律變宮合字應於一絃之半音為徴絃之分七絃仍定以黄鍾之律宮聲四字應於二絃之半音為羽絃之分八絃取三絃之半音仍和之姑洗之律為半宮之分九絃取四絃之半音仍和之蕤賔之律為半商之分十絃取五絃之半音仍和之夷則之律為半角之分十一絃取六絃之半音乃和之半黄鍾之律為半徴之分十二絃取七絃之半音乃和之半太蔟之律為半羽之分此宫調濁音一均之十二絃也其十三絃乃黄色之中絃十四絃則又為應清音一均十二絃内之第一絃矣爰以清音十二絃之第一絃定以倍應鐘之呂清變宫髙六字為下徴之分二絃定以大呂之呂清宮髙五字為下羽之分三絃定以仲呂之呂清角髙上字為宮絃之分四絃定以林鐘之呂清變徴髙尺字為商絃之分五絃定以南呂之呂清徴髙工字為角絃之分六絃仍定以倍應鍾之呂清變宮髙六字應於一絃之半音為徴絃之分七絃仍定以大呂之呂清宮髙五字應於二絃之半音為羽絃之分八絃取三絃之半音仍和之仲呂之呂為半宮之分九絃取四絃之半音仍和之林鍾之呂為半商之分十絃取五絃之半音仍和之南呂之呂為半角之分十一絃取六絃之半音乃和之半大呂之呂為半徴之分十二絃取七絃之半音乃和之半夾鍾之呂為半羽之分此宮調清音一均之十二絃也若定商調則以濁音均十二絃内第二絃下羽之分定以太簇之律清音均十二絃内第二絃下羽之分定以夾鍾之呂其二均之各絃皆以次遞遷而旋相為用焉要之一調之中濁音之十二絃其一絃定某律而六絃十一絃亦取某律某聲而為某字二絃定某律其七絃十二絃亦取某律某聲而為某字三絃定某律其八絃亦取某律某聲而為某字四絃定某律其九絃亦取某律某聲而為某字五絃定某律其十絃亦取某律某聲而為某字此一均内應二變之律者無其位焉清音之十二絃其一絃定為某呂其六絃十一絃亦取某呂某聲而為某字二絃定某呂其七絃十二絃亦取某呂某聲而為某字三絃定某呂其八絃亦取某呂某聲而為某字四絃定某呂其九絃亦取某呂某聲而為某字五絃定某呂其十絃亦取某呂某聲而為某字此一均内當二變之呂者亦無其位焉夫瑟之用絃最多既取聲於兩均復於各均内合兩絃以取聲者何也葢律呂管音之生聲低吹則得柔音髙吹則得剛音是能分剛柔於一管矣然雖能分剛柔於一管而不能并聲字於一音故黄鍾之律低吹之為濁音宮聲低工字而髙吹之則亦宮聲而音微剛初不可謂之髙工字也大呂之呂低吹之即為清音宮聲髙工字比之黄鍾髙吹之聲字則有上下之分若以此大呂之呂髙吹之則益髙而幾於低凡字矣是以黄鍾大呂雖同為宮聲而分清濁雖同為工字而分髙低其髙吹低吹之間又分而為二實有四音之用然則絃之一聲烏能變通之以隨此四音哉故設二十五絃立為二均仍於一均之内取髙低二音於全半長短之間乃得合律呂聲調而備於用焉如黄鍾之律低吹之則濁音十二絃内二絃應焉髙吹之則清音十二絃内七絃應焉如大呂之呂低吹之則清音十二絃内二絃應焉髙吹之則清音十二絃内七絃應焉復以姑洗之律低吹之則濁音十二絃内三絃應焉髙吹之則濁音十二絃内八絃應焉是則兩絃應於一聲者分髙低於一均之内而一律一呂各聲之分清濁者又合二均於一器上下符湊髙低應和始為一樂之大成也旋宮轉調改絃移柱之法總以二絃主調三絃立宮其二變之聲字案其清濁定於各均之内避其聲而不用則一轉移間而自生生於無窮矣是以改絃移柱得以旋宮轉調七調無不可通律呂莫不為用古之聖人制禮作樂極其精㣲體用咸得其宜者正以此也蕙田案以上瑟右絲音之屬五禮通考卷七十六
