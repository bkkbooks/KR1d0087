body:
  text: 五禮通考卷二百二十五刑部尚書秦蕙田撰賓禮六三恪二王後蕙田案禮記郊特牲云天子存二代之後猶尊賢也尊賢不過二代而春秋傳又有以備三恪之文後之説者各不同有以二王之前復立三恪并三與二為五代者鄭康成劉熹崔靈恩之説也有以二王之前止立一代二王即在三恪之內者杜預魏收杜佑之説也漢魏以前多主鄭説唐宋以後多主杜解案樂記武王克商未及下車而封黃帝堯舜之後下車而封夏殷之後則薊祝陳為三恪而先封杞宋為二王後而後封其禮蓋有别矣然二王之後得用其先代之禮樂正朔服色天子以賓禮待之爵為上公而三恪則否故孔子學夏殷之禮必徵諸杞宋又謂杞宋為天子之事守春秋傳皇武子稱宋先代之後于周為客而薊祝陳諸國不聞别有異數也三恪以代逺故先封而其禮數從殺二王後以代近故後封而其禮數從厚鄭氏之説固不可易也然後世多主三代為三恪者蓋成周之世去古尚近而始祖后稷又出自黃帝仕于堯舜之時故求其後而立之後世去古寖逺其先代之逺者又無如軒轅唐虞之功德則追三代之後而封之已足致尊崇之意三恪之封固難行之近代也而猶欲沿三恪之名此所以從杜而不從鄭也今採經傳諸書以見三代以上之禮而後世追封先代之事附焉禮記郊特牲天子存二代之後猶尊賢也尊賢不過二代注過之逺難法也二或為三無疏天子繼世而立子孫以不肖滅亡見在子孫又功德仍須存之所以存二代之後者猶尚尊其往昔之賢所取法象案異義公羊説存二王之後所以通夫三統之義引此文古春秋左氏説周家封夏殷二王之後以為上公封黃帝堯舜之後謂之三恪許慎謹按云治魯詩丞相韋元成治易施讐等説引外傳曰三王之樂可得觀乎知王者所封三代而已而與左氏説同鄭駮之云所存二王之後者命使郊天以天子之禮祭其始祖受命之王自行其正朔服色恪者敬也敬其先聖而封其後與諸侯無殊異何得比夏殷之後如鄭此言公羊自據二王之後左氏兼論三恪義不乖異也熊氏云周之三恪越少昊髙辛逺存黃帝者取其制作之人故易繫辭云神農氏沒黃帝堯舜氏作義當然也蕙田案五經異義所引左氏説與杜解不同蓋劉歆賈逵諸儒之説在杜征南以前孫氏曰立前代之後以統承先王者自古有此法也有虞氏之時棄為髙辛之後故得祭天詩所謂后稷肇祀是也丹朱為唐堯後作賓於虞書所謂虞賓在位是也至夏后時則丹朱商均之子孫皆為二王後湯為夏氏立後經傳雖不載然有商之興固當以禹之裔為二王後無疑矣仲虺之誥稱湯之德有曰兹率厥典言其能率循舊典不易故常也豈其於崇德象賢之事獨不稽古乎至周則封微子於宋至封舜後於陳封東樓公於杞亦必因成湯封舜禹之後於陳杞可以推知也周禮春官司几筵筵國賓于牖前左彤几蕙田案國賓馬融以為二王後何氏休曰王者存二王之後使統其正朔服其服色行其禮樂所以尊先聖通三統師法之義恭讓之禮於是可得而觀之通典王者立三恪二王之後者欲通師法之義其前代之後使之郊天以天子禮祭其始祖受命之王自行正朔服色此得通三正也通典三恪議三恪二王之義有三説焉一云二王之前更立三代之後為三恪此據樂記武王克商未及下車封黃帝堯舜之後及下車封夏殷之後通已用六代之樂一云二王之前但立一代通二王為三恪此據左傳但云封胡公以備三恪明王者所敬先王有二更封一代以備三恪存三恪者所敬之道不過於三以通三正三云二王之後為一恪妻之父母為二恪夷狄之君為三恪此據王有不臣者三而言之不臣二王後者尊敬先王通三正之義故書有虞賓在位詩云有客有客亦白其馬明天下非一家所有敬讓之至故封建之使得服其正色用其禮樂以事先祖故孔于云夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也不臣妻父母者妻之言齊與已齊體共承先祖故尊其父母春秋左氏傳云紀季薑歸於京師稱字者子尊不加父母妻與已齊體故夫不得臣之四夷之君不臣者尚書大傳曰越裳氏獻白雉周公辭不受曰正朔不施則君子不臣也案梁崔靈恩云三義之説以初為長何者禮記郊特牲云存二王之後尊賢不過二代又詩云二王之後來助祭又春秋公羊説曰存二王之後所以通三正以上皆無謂二王之後為三恪之文若更立一代通備三恪者則非不過二代之意左傳云封胡公以備三恪者謂上同黃帝堯舜下同殷夏為三恪也按二王三恪經無正文崔靈恩據禮記陳武王之封遂以為通存五代竊恐未安今據二代之後即謂之二王三代之後即謂之三恪且武王所封蓋以堯有則天之大人莫能名黃帝列序星辰正名百物自以功齊萬代師範百王故特封其後偶契三二之數實非厯代通法故記云尊賢不過二代示敬必由舊因取通已為三正也其二代之前第三代者雖逺難師法豈得不録其後故亦存之示敬其道而已因謂之三恪故左傳云封胡公以備三恪足知無五代也况厯代至今皆以三代為三恪焉蕙田案崔靈恩之議正矣杜君卿不從之者因唐世以周隋為二王後并後魏為三恪不用鄭氏義故也其稱武王所封非厯代通法良然右通論書益稷虞賓在位羣后德讓傳虞賓丹朱也二王後故稱賓竹書紀年帝子丹朱避舜于房陵舜讓不克遂封朱于房為虞賓三年舜即天子之位通典虞舜以堯子丹朱為賓曰虞賓而不臣之蕙田案路史炎帝參盧是曰榆罔居空桑禪于有熊氏黃帝乃封參盧于路而崇炎帝之祀于陳此追崇先代之始經傳不載附見于此右虞史記五帝本紀禹踐天子位堯子丹朱舜子商均皆有疆土以奉其祀服其服禮樂如之以客見天子天子弗臣示不敢專也集解譙周曰以唐封堯之子以虞封舜之子索隱曰漢書律厯志云封堯子于丹淵為諸侯商均封虞在梁國今虞城縣也舜正義曰括地志云定州唐縣堯後所封宋州虞城縣後所封也春秋哀公元年左氏傳少康逃奔有虞為之庖正以除其害虞思于是妻之以二姚而邑諸綸注虞舜後諸侯也梁國有虞縣思有虞君也右夏詩商頌那我有嘉客亦不夷懌朱子集傳嘉客先代之後來助祭者也春秋昭公八年左氏傳史趙對晉侯曰自幕至于瞽瞍無違命舜重之以明德置德于遂遂世守之注遂舜後蓋殷之興存舜之後而封遂言舜德乃至于遂故疏三年傳云箕伯直柄虞遂伯戲則遂在直柄之後云蓋殷興存舜之後而封之也言舜有明聖之德其德流及于遂史記夏本紀踐天子位代夏朝天下湯封夏之後正義曰括地志云夏亭故城在汝州郀城縣東北五十四里蓋夏后所封也右商禮記樂記武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後于杞投殷之後于宋注反當為及字之誤也及商謂至紂都也封謂故無土地者也投舉徙之辭也時武王封紂子武庚于殷墟所徙者微子也禮運杞之郊也禹也宋之郊也契也是天子之事守也注先祖法度子孫所當守春秋襄公二十有五年左氏傳昔虞閼父為周陶正以服事我先王注閼父舜之後為武王陶正我先王賴其利器用也與其神明之後也庸以元女大姬配胡公注庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪注周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪封疏鄭元以杞宋為二王之後薊祝陳為三恪杜以周夏殷之後為二王後又封陳并二王後為三恪杜意以此傳言以備三恪則以陳備三恪而已若逺取薊祝則陳近矣何以言備以其稱備知其通二代而備其數耳二代之後則各自行其正朔用其禮樂王者尊之深也舜在二代之前其禮轉降恪敬也封其後示敬而已故曰恪雖通二代為三其二代不假稱恪惟陳為恪耳蕙田案以二代之後為三恪起于杜預疏家雖曲為之解然云二代不假稱恪惟陳為恪則三恪與二王後究不得併而一之矣觀承案杞宋自是二王後薊祝陳當為三恪左氏云封滿於陳以備三恪者薊祝在先是二恪又封陳乃合為三故云以備似不得因此一字而生别解至云妻之父母為一恪夷狄之君為一恪與二王後為三恪者更不經之甚矣若通典所論亦是後代之法與古不同奚足以軋周人之定典乎昭公八年左氏傳及胡公不淫故周賜之姓使祀虞帝注胡公滿遂之後也事周武王賜姓曰媯封諸陳紹舜後僖公二十四年左氏傳宋先代之後也於周為客天子有事膰焉有喪拜焉注有事祭宗廟也膰祭肉尊之故賜以祭胙宋弔周喪王特拜謝之答疏禮弔喪之法皆主人拜其弔者謝其勤勞弔者不拜以其為事而來不自同于賓客此皆據敵體以上若其臣下來弔則主人不拜宋是先代之後王以敵體待之故拜其來弔其餘諸侯則否詩周頌振鷺序振鷺二王之後來助祭也振鷺于飛于彼西雍我客戾止亦有斯容傳振羣飛貌鷺白鳥雍澤也客二王之後宋箋白鳥集于西雍之澤言所集得其處也興者喻杞之君有潔白之德來助祭于周之廟得禮之宜也其至止亦有此容言威儀之善如鷺然朱子集傳此二王之後來助祭之詩在彼無惡在此無斁庶幾夙夜以永終譽朱子集傳在國無惡之者在此無厭之者如是則庶幾其能夙夜以永終此譽矣有客序有客微子來見祖廟也疏言見于祖廟必是助祭有客有客亦白其馬有萋有且敦琢其旅傳萋且敬慎貌朱子集傳客微子也周既滅商封微子于宋以祀其先王而以客禮待之不敢臣也敦琢選擇也旅其卿大夫從行者也此一節言其始至也有客宿宿有客信信言授之縶以縶其馬傳一宿曰宿再宿曰信朱子集傳此一節言其將去也薄言追之左右綏之既有淫威降福孔夷朱子集傳此一節言其留之也書序成王既黜殷命殺武庚命微子啓代殷後作微子之命書微子之命王若曰猷殷王元子惟稽古崇德象賢統承先王修其禮物作賓于王家與國咸休永世無窮嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寬除其邪虐功加于時德垂後裔爾惟踐修厥猷舊有令聞恪慎克孝肅恭神人豫嘉乃德曰篤不忘上帝時歆下民祗協庸建爾于上公尹兹東夏欽哉往敷乃訓慎乃服命率由典常以蕃王室𢎞乃列祖律乃有民永綏厥位毗豫一人世世享德萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命史記周本紀武王十一年伐紂封商紂子祿父使其弟管叔鮮蔡叔度相祿父治殷罷兵西歸武王追思先聖王乃褒封神農之後于焦黃帝之後于祝帝堯之後于薊帝舜之後于陳大禹之後于杞武王崩成王少武庚作亂畔周周公奉成王命誅武庚以微子開代殷後國于宋陳杞世家陳胡公滿者虞舜帝之後也昔舜為庶人時堯妻之二女居于媯汭其後因為氏姓姓媯氏舜已崩傳禹天下而舜子商均為封國夏后之世或失或續至周武王克殷紂乃復求舜後得媯滿封之于陳以奉舜祀是為胡公杞東樓公者夏后禹之後苖裔也殷時或封或絶周武克殷紂求禹後得東樓公封之于祀以奉夏后氏祀索隱曰杞國名也東樓公諡號也不名者並史先失耳宋忠曰今陳留雍邱縣故地理志云雍邱縣故杞國周武王封杞後為東樓公是也孔叢子陳王曰周存二代别有三恪其事云何答曰封夏殷之後以為二代紹虞帝裔備為三恪恪敬也禮之如賓客也非謂特有二代别有三恪也凡所以立二代者備王道通三統也王曰三統者何答曰各自用其正朔二代與周是謂三統蕙田案孔叢子偽書出于魏晉以後不足信右周漢書武帝本紀元鼎四年行幸滎陽還至洛陽詔曰祭地冀州瞻望河洛巡省豫州觀于周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀梅福傳元帝時尊周子南君為周承休侯位次諸侯王成帝本紀綏和元年春二月癸丑詔曰蓋聞王者必存二王之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里梅福傳成帝久無繼嗣福以為宜建三統封孔子之世以為殷後復上書曰武王克殷未下車存五帝之後封殷于宋紹夏于杞明著三統示不獨有也今成湯不祀殷人亡後春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納始元帝時使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時匡衡議以為王者存二王後所以尊先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉云平帝本紀元始四年春正月改殷紹嘉公曰宋公周承休公曰鄭公續漢書百官志光武建武二年封周後姬常為周承休公五年封殷後孔安為殷紹嘉公十三年改常為衛公安為宋公以為漢賓在三公上蕙田案兩漢以殷周後為二王後又案王莽傳以漢後定安公劉嬰位為賓周後衛公姬黨更封為章平公亦為賓殷後宋公孔宏運轉次移更封為章昭侯位為恪夏後遼西姒豐封為章功侯亦為恪莽所為僭亂不足道然其以周漢後為賓夏殷後為恪則依仿周禮而為之可見漢儒皆分三恪二王後為二也右兩漢三國志魏文帝本紀黃初元年冬十一月癸酉以河內之山陽邑萬户奉漢帝為山陽公行漢正朔以天子之禮郊祭上書不稱臣京都有事于太廟致胙封公之四子為列侯明帝本紀青龍二年山陽公薨帝素服發哀遣使持節典護喪事追諡山陽公為孝獻皇帝葬以漢禮裴松之注獻帝傳追諡山陽公曰孝獻皇帝册贈璽綬命司徒司空持節弔祭護喪光祿大夫鴻臚為副將作大匠復土將軍營成陵墓及置百官羣吏車旗服章喪葬禮儀一如漢氏故事喪葬所供羣官之費皆仰大司農立其後嗣為山陽公以通三統永為魏賓八月壬申葬于山陽國陵曰禪陵置園邑葬之日帝制錫衰辨絰哭之慟適孫桂氏鄉侯康嗣立為山陽公王肅傳青龍中山陽公薨漢主也肅上疏曰昔唐禪虞虞禪夏皆終三年之喪然後踐天子之尊是以帝號無虧君禮猶存今山陽公承順天命允答民望進禪大魏退處賓位公之奉魏不敢不盡節魏之待公優崇而不臣既至其薨襯斂之制輿徒之飾皆同之于王者是故逺近歸仁以為盛美且漢總帝皇之號號曰皇帝有别稱帝無别稱皇則皇是其差輕者也故當髙祖之時土無二王其父兄在而使稱皇明非二王之嫌也况今以贈終可使稱皇以配其諡明帝不從使稱皇乃追諡曰漢孝獻皇帝蕙田案王子雍建議奪漢獻之帝號何無舊君之思邪雖湛深經術不足多也陳留王本紀景元四年冬十一月蜀主劉禪降咸熙元年三月封劉禪為安樂公蕙田案魏以漢後為賓又案晉劉熹議稱衛公署於前代為二王後則魏蓋以周漢後為二王後也右魏通典晉武帝太始元年十二月遣太僕劉原告太廟封魏帝常道鄉公奐為陳留王詔曰明德昭融逺鑒天命欽象厯數用禪厥位敢咨詢故訓以敬授青土於東國永為晉賓載天子旌旗乘五時副車行魏正朔郊祀天地禮樂制度皆如魏舊以承王顯祖之禋祀又詔王上書不稱臣答報不為詔一如賓禮晉書武帝本紀泰始元年十二月賜山陽公劉康安樂公劉禪子弟一人為駙馬都尉二年夏五月戊辰詔曰陳留王撡尚謙沖每事輒表非所以優崇之也主者喻意非大事皆使王官表上之通典泰始三年太常上言博士祭酒劉熹等議漢魏為二王後夏殷周之後為三恪衛公署於前代為二王後於大晉在三恪之數應降稱侯祭祀制度宜與五等公侯同有司奏陳留王山陽公為二代之後衛公備三恪之禮易稱有不速之客三人來此則以三為斷不及五代也蕙田案以二王後并于三恪始于泰始之奏杜征南解左傳蓋用當時之制晉書明帝本紀太寧三年秋七月詔曰三恪二王世代之所重興滅繼絶政道之所先禋祀不傳甚用懷傷主者其詳議諸應立後者以聞成帝本紀咸康二年冬十月詔曰厯觀先代莫不褒宗明祀賓禮三恪故杞宋啓土光于周典宗姬侯衛垂美漢册自頃喪亂庶邦殄悴周漢之後絶而莫繼其詳求衛公山陽公近屬有履行修明可以繼承其祀者依舊典施行通典升平元年陳留王曹勵表稱廢疾積年不可以奉祭祀請依春秋之義求以立後大學博士曹耽議春秋之義後立子以貴不以長蓋以為宗廟主故也晉公族穆子有廢疾以讓其弟衛襄公嗣子縶足不能行立其弟晉衛皆廢嫡立庶者明臣之義終無執祭朝見之期以之居位違犯情禮故也禮有故使人攝祭非終身疾者勵為君王故事未有諸侯以疾去國成比胡訥議孟縶立弟異於陳留二王之後禮不宜廢太常王彪之奏臣按訥耽二議為許其所陳也各無明文臣以為經史所記未有南面稱孤而以疾病退為庶人者也勵纂封先代近四十年位在朝賓今以疾退既廢之後若同人庶則名賤而役厮處以朝官則職替而班下以舊禮則制重而無位量兹三義莫知其禮宗廟享祭禮有假攝古今依禮行之有由來矣孝武帝大元十二年博士庾宏之等議陳留王前代之後遇以上賓之禮皇太子雖國之儲副在人臣之位今謂班次宜在王下又按僕射王彪之以為禪讓之始王與繼嗣之末孫降殺殊矣是以春秋之會杞不異列宋不殊位今陳留王朝會自任其來則無繩墨之凖既以來朝則應有常次至於大會升殿雖在上位然無殊别之座名同朝録將事有例且朝録蓋是紀官名之簡制曰可時陳留嗣王薨王彪之議山陽公薨故事給絹二百匹山陽於今稍逺今可特給布絹二百匹錢三十萬宜小優於山陽也晉書荀奕傳奕補散騎常侍侍中時將繕宫城尚書符下陳留王使出城夫奕駁曰昔虞賓在位書稱其美詩咏有客載在雅頌今陳留王位在三公之上坐在太子之右故答表曰書賜物曰與此古今之所崇體國之髙義也謂宜除夫役時尚書張闓僕射孔愈難奕以為昔宋不城周春秋所譏特蠲非體宜應減夫奕重駁以為春秋之末文武之道將墜於地新有子朝之亂於是諸侯逋替莫率職宋之於周實有列國之權且同已勤王而主之者晉客而辭役責之可也今之陳留無列國之勢此之作否何益有無臣以為宜除於國職為全詔從之蕙田案晉以漢魏後為二王後并周後為三恪右晉宋書髙祖本紀永初元年夏六月丁卯即皇帝位封晉帝為零陵王令食一郡載天子旌旗乘五時副車行晉正朔郊祀天地禮樂制度皆用晉典上書不為表答表不稱詔二年秋九月己丑零陵王薨車駕三朝率百僚舉哀于朝堂一依魏明帝服山陽公故事太尉持節監護葬以晉禮荀伯子傳伯子遷散騎常侍本邑大中正上表曰伏見百官位次陳留王在零陵王上臣愚竊以為疑昔武王克商封神農之後于焦黃帝之後于祝帝堯之後于薊帝舜之後于陳夏後于杞殷後于宋杞陳並為列國祝薊焦無聞焉斯則褒崇所承優于逺代之顯驗也是以春秋次序諸侯宋居杞陳之上考之近世事亦有徵晉太始九年詔賜山陽公劉康子弟一人爵關內侯衛公姬署宋侯孔紹之一人駙馬都尉又太始三年太常上博士劉熹等議稱公署于大晉在三恪之數應降稱臣以零陵王位宜在陳留王之上上從之蕙田案宋以魏晉後為二王後又禮志稱元嘉十一年皇太子出會升在三恪上蓋以漢後備三恪也南齊書髙帝本紀建元元年夏四月甲午即皇帝位封宋帝為汝隂王築宮丹陽縣故治行宋正朔車旗服色一如故事上書不為表答表不稱詔五月己未汝隂王薨追諡為宋順帝終禮依魏元晉恭帝故事冬十月丙子立鼓城劉引為汝隂王奉宋帝後梁書武帝本紀天監元年夏四月丙寅即皇帝位封齊帝為巴陵王全食一郡載天子旌旗乘五時副車行齊正朔郊祀天地禮樂制度皆用齊典巴陵王薨于姑孰追諡為齊和帝終禮一依故事大同六年夏四月癸未詔曰命世興王嗣賢傳業聲稱不朽人代徂遷二賓以位三恪義在時事浸逺宿草榛蕪望古興懷言念愴然晉宋齊三代諸陵有職司者勤加守護勿令細民妄相侵作兵有少補使充足前無守視並可量給陳書髙祖本紀永定元年冬十月乙亥即皇帝位詔曰禮陳杞宋詩詠二客弗臣之重厯代斯敦梁氏欽若人祗憲章在昔濟河沈璧髙謝萬邦茅賦所加宜遵舊典其以江隂郡奉梁主為江隂王行梁正朔車旗服色一依前凖宮館資待務盡優隆蕙田案齊梁陳皆以所承之代為賓北齊書孝昭帝本紀皇建元年秋八月甲午詔曰昔武王克殷先封兩代漢魏二晉無廢兹典及元氏統歷不率舊章朕纂承大業思宏古典但二王三恪義説不同可議定是非列名條奏其禮儀體式亦仰議之魏收傳收轉中書監詔議二王三恪收執王肅杜預義以元司馬氏為二王通曹備三恪詔諸禮學之官皆執鄭元五代之議孝昭后姓元議恪不欲廣及故議從收蕙田案北齊以元氏司馬氏為二王後通曹魏為三恪周書明帝本紀二年九月甲辰封少師元羅為韓國公以紹魏後元偉傳太祖天縱寬仁性罕猜忌元氏戚屬並保全之內外任使布于列職孝閔踐祚無替前緒明武纘業亦遵先志雖天厭魏德鼎命已遷枝葉榮茂足以逾于前代矣然簡牘散亡事多湮落今録其名位可知者附于此云柱國大將軍太傅大司徒廣陵王元欣柱國大將軍特進尚書令少師義陽王元子孝尚書僕射馮翊王元季海七兵尚書陳郡王元玄大將軍淮安王元育大將軍梁王元儉大將軍尚書令少保小司徒廣平郡公元贊大將軍納言小司空荆州總管安昌郡公元則侍中驃騎大將軍開府儀同三司少師韓國公元羅侍中驃騎大將軍開府儀同三司吏部尚書魯郡公元正侍中驃騎大將軍開府儀同三司中書監洵州刺史宜都郡公元顔子侍中驃騎大將軍開府儀同三司鄯州刺史安樂縣公元夀侍中驃騎大將軍開府儀同三司武衛將軍遂州刺史房陵縣公元審右南北朝隋書髙祖本紀開皇元年春二月己巳以周帝為介國公邑五千户為隋室賓旌旗車服禮樂一如其舊上書不為表答表不稱詔周氏諸王盡降為公煬帝本紀大業四年冬十月辛亥詔曰昔周王下車首封唐虞之裔漢帝承歷亦命殷周之後皆所以褒立先代憲章在昔朕嗣膺景業旁求雅訓有一宏益欽若令典以為周兼夏殷文質大備漢有天下車書混一魏晉沿襲風流未遠並宜立後以存繼絶之義有司可求其胄緒列聞蕙田案隋以周後為賓右隋通典唐武德元年五月詔曰革命創制禮樂變于三王修廢繼絶德澤隆于二代其以莒之酅邑奉隋帝為酅國公正朔服色一如舊章唐書太宗本紀貞觀二年八月辛丑立二王後廟置國官通典二年秋八月制曰二王之後禮數宜崇寢廟不修廪餼多闕非所以追崇先代式敬國賓可令所司量置國官營立廟宇永昌元年十一月制以周漢之後為二王仍封舜禹成湯之裔為三恪神龍元年五月制宜依舊以周隋為二王後天寶八載七月封後魏孝文十代孫元伯明為韓國公以備三恪唐書元宗本紀天寶九載九月辛卯以商周漢為三恪王勃傳勃謂王者乘土王世五十數盡千年乘金王世四十九數九百年乘水王世二十數六百年乘木王世三十數八百年乘火王世二十數七百年天地之常也自黃帝至漢五運適周土復歸唐唐應繼周漢不可承隋短祚乃斥晉魏以降非真主正統皆五行沴氣遂作唐家千歲厯武后時李嗣真請以周漢為二王後而廢隋周中宗復用周隋天寶中太平久上言者多以詭異進有崔昌者采勃舊説上五行應運厯請承周漢廢周隋為閏右相李林甫亦贊佑之集公卿議可否集賢學士衛包起居舍人閻伯璵上表曰都堂集議之夕四星聚于尾天意昭然矣于是元宗下詔以唐承漢黜隋以前帝廢介酅公尊周漢為三玉後以商為三恪京城起周武王漢髙祖廟授崔昌太子贊善大夫衛包司虞員外郎十二載五月己酉復魏周隋為三恪王勃傳楊國忠為右相自稱隋宗建議復用魏為三恪周隋為二王後酅介二公復舊封貶崔昌烏雷尉衛包夜郎尉閻伯璵涪川尉蕙田案唐以周隋為二王後通後魏為三恪中間雖有更改皆不久而罷右唐五代史梁太祖本紀開平二年春二月戊寅封鴻臚卿李嵩萊國公為二王後冬十二月己亥以介國公為三恪酅國公萊國公為二王後蕙田案後梁以隋唐後為二王後通周後為三恪晉髙祖本紀天福二年春正月封唐宗室子為公及隋酅公為二王後以周介公備三恪天福四年秋九月癸未封李從益為郇國公以奉唐後蕙田案後晉亦以隋唐為二王後通周後為三恪漢髙祖本紀天福十二年夏五月甲午以郇國公李從益知南朝軍國事右五代宋史禮志太祖建隆元年正月四日詔曰封二王之後備三恪之賓所以示子傳孫興滅繼絶夏商之居杞宋周隋之啓介酅古先哲王實用兹道矧豫涼德厯試前朝雖周德下衰勉從於禪讓而虞賓在位豈忘於蒸嘗其封周帝為鄭王以奉周嗣正朔服色一如舊制又詔曰矧唯眇躬逮事周室謳歌獄訟雖歸新造之邦廟貌園陵豈忘舊君之禮其周朝嵩慶二陵及六廟宜令有司以時差官朝拜祭饗永為定式仍命周宗正卿郭玘行禮太祖本紀開寶六年三月乙卯朔周鄭王殂于房州上素服發哀輟朝十日諡曰恭帝命還葬慶陵之側陵曰順陵禮志仁宗天聖六年録故虢州防禦使柴貴子肅為三班奉職七年録故太子少傅柴守禮孫詠為三班奉職其後又録柴氏之後曰熙曰愈曰若拙曰上善並為三班奉職曰餘慶曰誠為州長史助教曰貽廓等十一人復其身仍各賜錢一萬又録世宗曽孫揆柔及貴曽孫日宣守禮曽孫若訥皆為三班奉職仁宗本紀嘉祐四年四月封柴氏後為崇義公給田四十頃以奉周室祀禮志嘉祐四年著作郎何鬲言舜受堯禹受舜之天下而封丹朱商均以為國賓周漢以降以及於唐莫不崇奉先代延及苗裔本朝受周天下而近代之盛莫如唐自梁以下皆不足以崇襲臣願考求唐周之裔以備二王之後授以爵命封縣立廟世世承襲永為國賓事下太常議曰古者立二王後不唯繼絶兼取其明德可法五代草創載祀不永文章制度一無可考上取唐室世數已逺於經不合惟周則我受禪之所自義不可廢宜訪求子孫如孔子後衍聖公授一京官爵以公號使專奉廟饗歲時存問賜之粟帛牲器祭服每遇時祀並從官給其廟宇亦加嚴飾如此則上不失繼絶之義度之於今亦簡而易行從之四月詔曰先王推紹天之序尚尊賢之義褒其後嗣賓以殊禮豈非聖人稽古報功之大典哉國家受命之元繼周而王雖民靈欣戴厯數允集而虞賓將遜德美丕顯頃者推命本始褒及支庶每遇南郊許奏白身一名充班行恩則厚矣而義未稱將上采姚姒之舊略循周漢之典詳其世嫡優以公爵異其仕進之路申以田土之錫俾廟寢有奉饗祀不輟庶幾乎春秋通三統厚先代之制矣宜令有司取柴氏譜系於諸房中推最長一人令歲時親奉周室祀事如白身即與京主簿如為班行者即比類換文資仍封崇義公與河南府鄭州合入差遣給公田十頃專管勾陵廟應緣祭饗禮料所須皆從官給如至知州資序即别與差遣却取以次近親令襲爵授官永為定式八月太常禮院定到內殿崇班相州兵馬都監柴詠於柴氏諸族最長詔換殿中丞封崇義公簽書奉寧軍節度判官事以奉周祀又以六廟在西京而歲時祭饗無器服之數令有司以三品服一四品服二及所當用祭器給之熙寧四年西京留守司御史臺司馬光言崇義公柴詠祭祀不以儀式周本郭姓世宗后姪為郭氏後今存周後則宜封郭氏子孫以奉周祀帝閲奏問王安石安石曰宋受天下於世宗柴氏也帝曰為人後者為之子安石曰為人後於異姓非禮也雖受天下於郭氏豈可以天下之故而易其姓氏所出帝然之蕙田案宋承天下于周周故郭姓世宗乃養子所承者郭氏之天下非柴氏之天下也宋立周後而不立郭氏不明傳緒之正涑水之論極為正大乃信安石之言而不用惑哉五年正月柴詠致仕詠長子早亡嫡孫夷簡當襲太常禮院言夷簡有過合以次子西頭供奉官若訥承襲詔以若訥為衛尉寺丞襲封崇義公簽書河南府判官廳公事徽宗本紀重和元年閏月丙子詔周柴氏後已封崇義公復立恭帝後以為宣義郎監周陵廟世世為國三恪禮志政和八年徽宗詔曰昔我藝祖受禪於周嘉祐中擇柴氏旁支一名封崇義公議者謂不當封周然禪國者周而三恪之封不及禮蓋未盡除崇義公依舊外擇柴氏最長見在者以其祖父為周恭帝後以其後世世為宣義郎監周陵廟與知縣請給以示繼絶之仁為國二恪永為定制蕙田案徽宗於柴氏崇義公之外復立周後為二恪然所立者仍柴氏非郭氏也蓋終宋之世未加禮于郭氏之後矣紹興五年詔周世宗元孫柴叔夏為右承奉郎襲封崇義公奉周後二十六年叔夏升知州資序别與差遣以子國器襲封令居衢州朝廷有大祀則入侍祠如故事其柴大有柴安宅亦各補官理宗本紀淳祐九年春正月庚申詔周世宗八世孫柴彥頴補承務郎襲封崇義公禮志時又求隋唐及朱氏李氏石氏劉氏郭氏之後及吳越荆南湖南蜀漢諸國之子孫皆命以官使守其祀蕙田案宋惟立周後為恪不及先代右宋金史太宗本紀天會三年八月遼主延禧入見降封海濱玉六年八月以宋二庶人入見封其父昏德公子重昏侯熙宗本紀皇統元年二月改封海濱王耶律延禧為豫王昏德公趙佶為天水郡王重昏侯趙桓為天水郡公十二月天水郡公趙桓乞本品俸詔賙濟之三年八月詔給天水郡王孫及天水郡公壻俸祿蕙田案金以遼延禧宋欽宗及偽齊劉豫為三恪豫宋之叛臣不足道也今略之右金元史世祖本紀至元十三年夏五月乙未朔巴延以宋主顯至上都制授顯開府儀同三司檢校大司徒封瀛國公右元元史順帝本紀至正二十八年明兵襲應昌府皇孫布尼雅實哩及后妃皆被獲明封布尼雅實哩為崇禮侯右明明大政記洪武七年九月丁丑上謂廷臣曰草木無心遇春而茂遇秋而零落氣之所感猶知榮悴况于人乎崇禮侯布尼雅實哩南來已五載今既長成豈無父母鄉土之思宜遣之還于是厚禮而歸之蕙田案元明封前代之後不立為恪右明五禮通考卷二百二十五
