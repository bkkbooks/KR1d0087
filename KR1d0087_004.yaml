body:
  text: 五禮通考原序少宗伯秦公味經輯五禮通考一書凡若干卷書垂成而余入京師屬為之叙余卒讀作而歎曰皇哉唐哉此數千百年來所絶無而僅有之書也顧實有先得余心者憶年二十餘讀儀禮周官戴記歎周公制禮整理天下陶成庶類逮後政衰諸侯惡其害已而皆去其籍葢典禮廢壊實自春秋戰國時始漢髙堂生僅傳士禮十七篇而周官三百六十職備陳祭祀朝覲㑹同賓客燕饗之事實為天子諸侯之禮則周官列其職事而儀禮詳其節次二書相為經緯因欲以儀禮為經周禮為傳旁及詩書大小戴以及鄭孔賈服之注疏畧仿朱子經傳通解之例名曰周官聫取聫事之義屬稿半載因攻制藝遂爾輟業中間倖成進士復家居三十餘年輯成春秋大事表及毛詩訂詁而於禮經不復措意辛未秋有詔慎簡經學余蒙恩授國子司業銜迴憶覃精三禮之時已五十餘年余髮種種且老矣欲復整理故業而畏其繁重力弗克勝今讀秦公書恍然如其意所欲出綱舉而目張州次而部居折𠂻百氏剖析同異復舉兩漢以來至前明凡郊祀禮樂輿服諸志及紀傳之闗於五禮者悉以類相附詳歴代之因革存古今之同然葢舉二十二史悉貫以周官儀禮之書細大不遺體要備舉余謂是書如女媧之補天視王通之續經束晳之補亡其大小純雜殆不可以里道計至是而成周之禮始燦然大明於世余向日所欲為而未竟者似有先告焉而毫髮無餘憾矣余垂老得睹是書因備陳向日區區之愚得附名簡末自幸竊自愧也乾隆十七年壬申顧棟高時年七十有四
