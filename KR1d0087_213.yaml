body:
  text: 五禮通考卷二百三刑部尚書秦蕙田撰嘉禮七十六體國經野書禹貢荆河惟豫州錐指傳曰西南至荆山北距河水曽氏曰臨沮之荆山其隂為豫州其陽為荆州渭案河南河也其不言南者蒙上至于南河省文也荆山主南言傳不當兼西亦猶青之岱主南言不當兼西也豫之南界亦判自南漳縣之荆山西起保康歷宜城棗陽及隨州之北境故隨縣地州之南境廢光化縣境入荆域又東為信陽羅山皆與荆接界處也豫北濵冀之南河其西與華隂接華隂雍域也案職方豫州山鎮曰華山通典云即今華隂郡山連延東出故屬豫州九域志云華山四州之際東北冀東南豫西南梁西北雍十字分之四隅為四州也豫之北界由華山而東為閿鄉靈寶陜州澠池新安洛陽孟津鞏縣汜水河隂滎陽滎澤又東北為陽武延津皆在南河之南陽武自元時河從原武決而東南流始為河北地又東北抵濬縣大伾山冀兖豫三州之交也豫東接兖徐揚三州之界自封邱而東為長垣東明又東為考城定陶曹縣城武單縣與兖接界又南為夏邑永城亳州穎州又東為穎上蒙城皆在淮北與徐接界自穎州以西為商城息縣真陽踰淮而南為信陽與揚接界豫西自閿鄉以南為盧氏鄖縣及鄖西之東境故鄖縣地與雍梁接界豫居中央為輻輳之地接界者七州唯青為兖徐所隔與豫不相接云伊洛瀍澗既入于河錐指傳曰四水合流而入河正義曰地理志云伊水出𢎞農盧氏縣熊耳山東北入洛洛水出𢎞農上洛縣冢領山東北至鞏入河瀍水出河南榖城縣潛亭北東入洛城志作成潛志作朁澗水出𢎞農新安縣東南入洛伊瀍澗三水入洛合流而入河傅氏曰導洛言東北會于澗瀍又東會于伊序水之次第此言伊洛瀍澗乃治水之先後渭案漢上洛縣即今陜西西安府商州治盧氏新安二縣今屬河南府榖城故縣在今洛陽縣西北今盧氏嵩縣伊陽伊陽屬汝州以伊水與嵩縣分界洛陽界中皆伊水之所經也商州盧氏永寧宜陽洛陽偃師鞏縣界中皆洛水之所經也近世乃過汜水縣北入河則洛口又移于東矣地理今釋伊水出今河南河南府盧氏縣熊耳山縣志謂伊水出悶頓嶺之陽者古熊耳盤基甚廣悶頓亦熊耳也至偃師縣南入洛洛水出今陜西西安府雒南縣冡嶺山至河南鞏縣東北入河瀍水出今河南府洛陽縣西北榖城山至縣東入洛澗水出今河南府澠池縣東北白石山至洛陽縣西南入洛胡氏渭曰洛誥周公曰我乃卜澗水東瀍水西惟洛食謂王城也我又卜瀍水東亦惟洛食謂下都也漢志瀍水出河南榖城縣朁亭北東南入雒後漢志瀍水出河南榖城縣劉昭引博物記曰出朁亭山括地志云故榖城在河南縣西北十八里苑中西臨榖水左傳定八年周大夫儋翩叛單子伐榖城即此漢榖城縣魏省入河南縣自故縣西北又三十二里有穀城山東連孟津縣界即博物記所謂朁亭山也水經瀍水出河南榖城縣北山東與千金渠合又東過洛陽縣南又東過偃師縣又東入于洛注云縣北有朁亭瀍水出其北梓澤中歷澤東而南水西有一原其上平敞古舊朁訛為舊亭之處潘安仁西征賦所謂越街郵者也瀍水又東南流注于榖榖水自千金堨東注謂之千金渠也渭案王城即郟邑漢為河南縣其故城在今洛陽縣西北後漢志云河南周公所城雒邑也春秋時謂之王城下都即成周漢為洛陽縣河南郡治其故城在今洛陽縣東北二十里後漢志云雒陽周時號成周二城東西相去四十里而今洛陽縣居其中隋大業初營新都始移二縣于都城內金又省河南入洛陽古時澗水經河南故城西入洛瀍水經河南故城東入洛故澗水東瀍水西為王城而瀍水東為下都洛誥之文甚明也自周靈王壅榖水使東出於王城之北則其勢必入于瀍水而合流歷王城之東以南注于洛時二水猶未經洛陽城也逮東漢建都於此自河南縣東十五里之千金堨引水繞都城南北以通漕而瀍水始與榖水俱東注矣古時瀍不合澗亦不過洛陽縣南而東至偃師也滎波既豬錐指正義曰沇水入河溢為滎滎是澤名鄭云今塞為平地滎陽民猶謂其處為滎澤在其縣東馬鄭王本皆作滎播謂此澤名滎播渭案地理志沇水出河東垣縣王屋山東南至武德入河軼出滎陽北地中蓋即滎澤經所謂溢為滎也今河南開封府滎澤縣本漢滎陽縣地隋分置滎澤縣澤在其縣南而班云出縣北鄭云在縣東者蓋滎陽故城在今縣西南班鄭據以為言澤起縣北歷其東也滎澤故城在今縣北五里隋置明洪武八年為河水所圯移今治地理今釋滎波即滎澤在今河南開封府滎陽縣南三里古城村案孔安國傳云滎澤波水已成遏豬正義曰鄭云今塞為平地滎陽民猶謂其處為滎澤在其縣東蓋濟水伏流地中絶河而南溢為巨澤禹貢錐指云閻百詩云案馬鄭王本波並作播伏生今文亦然孔安國解作一水非二水以為二水自顔師古始宋林之竒本之引周職方豫州其川滎雒其浸波溠爾雅水自洛出為波别滎波為二水蔡氏因之然案圖究義一為濟之溢流一為洛之支流以滎波為二水終無是處傅氏寅曰上文言導洛此則專主導濟言不當又泛言洛之支水職方所記山川非治水次第不必泥也山海經婁涿之山波水出於其隂北流至於榖水今本作陂郭璞云世謂之百答水非屬波水證一惟酈注引作波然亦出於山不出於洛非屬波水證二水經洛水又東門水出焉注云爾雅所謂洛别為波也惟此堪引然余考門水下流為鴻關水今謂之洪門堰在商州洛南縣東北至靈寶縣而入河何曽見水豬為澤乎非屬波水證三百詩此論精核且職方豫州之波出魯山縣鄭注謂即滎播固非而洛南之波水則與滎澤相距五六百里中隔大山豈可總撮而言之曰滎波既豬乎其説極詳引之以證林氏之失導菏澤被孟豬錐指正義曰地理志云菏澤在濟隂定陶縣東孟豬在梁國睢陽縣東北左傳爾雅作孟豬周禮作望諸聲轉字異正是一地也周禮青州澤藪曰望諸此乃屬豫者周無徐徐并於青青在豫東故得兼有孟豬定陶今屬山東兖州府之曹州其故城在今縣西北四里睢陽今為商邱縣河南歸德府治其故城在今治南二里通典云菏澤在曹州濟隂東北九十里故定陶城東北宋州虞城縣有孟豬澤元和志云孟諸澤在虞城西北十里周回五十里今在商邱東北接虞城界也地理今釋菏澤古濟水所滙當在今山東兖州府曹州東南及定陶縣界孟豬周禮作望諸史記作明都澤今河南歸德府商邱虞城二縣界有孟諸臺寰宇記云虞城孟諸澤俗呼為眉臺蓋澤中有臺也胡氏渭曰周禮青州澤藪曰望諸爾雅十藪宋有孟豬左傳僖十八年楚子玉夢河神賜以孟諸之麋文十年宋道楚子田孟諸杜預曰宋大藪也水經注云尚書曰導菏澤被孟豬孟豬在睢陽縣東北闞駰十三州記曰不言入而言被者明不常入也水盛方乃覆被矣寰宇記云虞城孟豬澤俗呼為湄臺蓋澤中有臺也渭案今虞城縣西北十里有孟諸臺接商邱縣界即此爾雅水草交曰麋麋古湄字臺蓋以孟諸之麋得名也自元至元二十三年以後歸德府城南北屢被黃河衝決禹迹不可復問然余考漢書梁孝王傳築東苑方三百里則孟諸澤皆在其中矣孝王大治宫室臺榭陂池髙髙下下澤形盡失故酈元於睢陽故城絶不言孟諸而敘臺池甚詳蓋澤之畔岸蕩夷無存久矣元和志云周回五十里亦倣佛言之耳又曰豫州有古太皥祝融之虛及帝嚳成湯所都虞舜後即少康所都戈邳封葛三鬷諸國皆在焉春秋時可考者管蔡郜曹鄭東虢西虢凡蔣祭杞宋焦申許蓼左傳哀十七年楚子榖曰武王克州蓼即此一作廖漢志南陽縣故廖國密隨厲唐戴沈息房周語內史過曰昭王娶于房後漢志汝南吳房縣故房國楚靈王所滅滑鄶鄀榖鄧賴項頓胡江黃道柏州來絞蠻陸渾凡四十一國戰國時屬宋魏韓而秦楚亦兼得其地秦并天下置三川碭郡頴川南陽東境北境是南郡北境是漢復置豫州領郡國五其今河南府陜郡𢎞農之地則屬司𨽻陳留濟隂之地則屬兖州後漢為司𨽻治河陽豫州治譙領郡國六魏因之晉分置司州領郡十一豫州領郡國十唐為都畿之河南府洛州陜郡陜南境臨汝汝滎陽鄭等郡河南道之陳留汴睢陽宋濟隂曹譙郡亳潁川許淮陽陳汝隂穎汝南豫等郡山南東道之淮安唐南陽鄧襄陽襄漢東隨武當均等郡及河東道之𢎞農郡虢案以上通典所列濟隂之乘氏當往屬兖襄陽之南漳漢東之光化當往屬荆又有當來屬者兖域靈昌之匡城梁域上洛之上津東境廢長利縣地是也以今輿地言之河南則河南開封歸德南陽汝寧五府及汝州直𨽻則大名府之東明長垣山東兖州府之定陶曹縣城武單縣江南則鳯陽府之潁州潁上太和亳州蒙城湖廣則襄陽府之襄陽光化宜城棗陽榖城均州鄖陽府之鄖縣保康及鄖西之東境德安府隨州之北境皆古豫州域也華陽黑水惟梁州錐指傳曰東據華山之南西距黑水曽氏曰華山之隂為雍州其陽為梁州則梁州之北雍州之南以華為畿周禮注畿限也而梁實在雍州之南矣薛氏曰梁州北界華山南距黑水黑水今瀘水也酈道元説黑水亦曰瀘水若水馬湖江出姚州徼外吐蕃界中東北至敘州宜賔縣入江也渭案華即西嶽華山地理志京兆華隂縣南有太華山在今陜西西安府華隂縣南八里華陽今商州之地是也黑水諸家遵孔傳謂出雍歷梁入南海為二州之西界故其説穿鑿支離不可得通唯韓汝節疑梁州自有黑水為界與導川之黑水不相涉而不謂薛士龍已先得之蓋古之若水即禹貢梁州之里水漢時名瀘水唐以後名金沙江而黑水之名遂隱然古記間有存者地理志滇池縣有黑水祠一也山海經黑水之間有若水二也水經注自朱提音殊時至僰道有黑水三也輿地志黑水至僰道入江四也今瀘水西連若水南界滇池東經朱提僰道其為梁州之黑水無疑矣故斷從薛氏以南北易孔傳之東西亦甚明確也姚州本漢弄棟青蛉遂久三縣地弄栜屬益州郡青蛉遂久屬越雋郡今為雲南之姚安府宜賔本漢僰道縣犍為郡治今為四川敘州府治孔疏云周禮職方氏華山在豫州界內此梁州境東據華山之南不得其山故言陽山之西則雍州境也竊謂職方九州之山川與禹貢不同雍既有嶽山為鎮故華屬豫今以禹貢之太華為豫州山彼兖之鎮曰岱亦將以禹貢之岱為兖州山乎其不可也明矣蓋境上之山非一州所得專青徐共是岱荆豫共是荆而太華則雍梁豫共之華北為雍華南為梁華東為豫豫雖不言西界觀雍梁可見也九域志云華山四州之際東北翼東南豫西南梁西北雍十字分之四隅為四州此言實獲我心然冀境三面距河華山在河外冀又與三州微别耳漢志若水出蜀郡旄牛縣徼外南至大莋入繩今黎大所南有旄牛故城即漢縣師古曰西南之徼猶北方塞也繩水出越雋郡遂久縣徼外東至僰道入江行千四百里嶲先蕊反今建昌衛治即漢越嶲郡卭都縣也遂久蜀漢改屬雲南水經注若水出蜀郡旄牛徼外東南至故關為若水司馬相如傳曰略定西南夷邊關益斥西至沫若水又曰關沫若是若水故有關也山海經曰南海內黑水之間有木名曰若木若水出焉若水沿流間關蜀土黃帝長子昌意降居斯水為諸侯娶蜀山氏女生顓頊於若水之野若水東南流鮮水注之一名州江大度漢志鮮水出旄牛徼外南入若水又南徑越雋卭都縣西有嶲水漢武帝置越嶲郡治卭都縣言越北水以章休盛也縣故卭都國越嶲水即繩若矣又有溫水冬夏常熱昔李􅋮敗李流于溫水是也案此溫水源流不逺非漢志牂柯鐔封縣下之溫水東至廣鬱入鬱者金吉甫謂漢志以瀘為溫字從省誤非也卭都唐為嶲州越嶲縣今建昌衛四川行都司治領營四會川鹽井冕山越嶲又南徑大莋縣入繩繩水出徼外山海經曰巴遂之山繩水出焉東南流徑髦牛道至大莋與若水合自下亦通謂之繩水又南徑會無縣元和志會川縣北至嶲州三百七十里本漢會無縣也今為會川營地與孫水合孫水出臺登縣一名白沙江南流徑卭都縣司馬相如定西夷橋孫水即此又南至會無入若水也漢志臺登縣孫水南至會無入若行七百五十里元和志嶲州臺登縣正南微西至州一百七十里念諾水本名繩水流入瀘水在縣西北七百里自羌戎界流入長江水本名孫水出縣西北胡浪山下今冕山營東北有孫水繩水南經雲南郡之遂久縣蜻蛉水入焉縣本屬越嶲蜀漢建興三年分益州永昌置雲南郡以遂久來屬蜻蛉水出蜻蛉縣西東徑其縣下又東注于繩水漢志蜻蛉縣禺同山有金馬碧雞又徑三絳縣西三絳一曰小會無又徑姑復縣北對三絳縣淹水注之淹水出遂久徼外東南至蜻蛉縣又東過姑復縣南東入于若水案漢志會無臺登遂久蜻蛉三絳姑復並屬越嶲郡又東與母血水合漢志益州郡弄棟縣東農山母血水出北至三絳南入繩行五百一十里母音無又東塗水注之漢志牧靡縣南臘塗水所出西北至越嶲入繩過郡二行千二十里又東北至犍為朱提縣西為瀘江水後漢書建武十九年武威將軍劉尚擊西夷反者棟蠶度瀘水入孟州郡注云瀘水一名若水出旄牛徼外經朱提至僰道入江在今嶲州南朱提山名應劭曰在縣西南以氏焉犍為屬國也在郡南千八百許里建安二十年立朱提郡治縣故城尋廢諸葛亮南征復置自梁陳已來不復賔屬隋開置恭州唐改為曲州元和志云曲州南北四百里東西七百里窮年密霧未嘗覩日月輝光樹木皆衣毛深厚時時多水濕晝夜沾灑上無飛鳥下絶走獸惟夏月頗有蝮蛇土人呼為漏天也郡西南二百里得所綰堂琅縣西北行上髙山羊腸繩屈八十餘里或攀木而升或繩索相牽而上緣陟者若將階天案後漢志無堂琅蓋省入朱提也劉昭曰朱提縣西南有堂琅山多毒草盛夏之月飛鳥過之不能得去有瀘津東去縣八十里水廣六七百步深十數丈晉明帝大寧二年李􅋮等侵越嶲攻臺登縣寧州刺史王遜遣將軍姚嶽擊之戰于堂琅驤軍大敗追之至瀘水赴水死者千餘人兩岸皆山髙數百丈瀘峰最為髙秀孤髙三千餘丈是山晉大康中崩震動郡邑水之左右馬步之徑裁通而時有瘴氣三月四月經之必死非此時猶令人悶吐五月以後行者差得無害故諸葛亮表言五月渡瀘也自朱提至僰道有水步道有黑水羊官水三津之阻行者苦之又有牛叩頭馬搏頰坂其艱嶮如此也若水徑越嶲之馬湖縣又謂之馬湖江馬湖縣今為四川之馬湖府繩水瀘水孫水淹水大渡水隨決入而納通稱是以諸書録記羣水或言入若又言注繩亦咸言至僰道入江華陽國志云僰道治馬湖江會水通越嶲正是異水沿注通為一津更無别川可以當之今案府縣圖志若水在建昌衛俗名打沖河自冕山營西徼外營故寧番衛在建昌衛東北東南流至衛西鹽井營東南與雲南金沙江合營在衛西元和志嶲州昆明縣東北至州三百里本漢定笮縣也出鹽鐵夷皆用之漢將張嶷殺其豪率遂獲鹽鐵之利鹽井在縣城中取鹽先積柴燒之以水洗上即成黑鹽凡言笮者夷人于大江水上置藤橋謂之笮其大笮定笮皆是近水置笮橋處笮與筰同金沙江源出吐蕃界至共龍山犛牛石下南流漸廣本名犛水後訛為麗水東南流經麗江府北又東經姚安府北即鹽井衛東南合打沖河又東合瀘水又東經衛川營南通典衛川縣有瀘水五月渡瀘即此元和志嶲州南至瀘渡四百五十里又東至東川府西折而東北經烏蒙府西北又東北經馬湖府南又東經敘州府南而北入大江雲南無水路行者以為艱惟由蜀浮金沙江可以直達南中明正統嘉靖隆慶時屢議開通而不果行至天啓時安酋倡亂貴陽道阻復議開通按察使莊祖誥議云自金沙江巡檢司開由白馬口歷普隆紅巖石刺鮓至廣翅塘皆祿勸州地其下有三灘水溢沒石乃可放舟涸則躋岸纜空舟以行又歷直勒村罵刺土色皆會禮州地其下有雞心石石如堆者三纍纍江中舟者相水勢緩急可行又歷踏照亂得頭峽刺鮓至枌壁灘甚駛皆東川地又歷驛馬河新灘至虎跳灘隂溝洞皆巧家地虎跳湍瀉陡石不可容舟隂溝二山頽集水行山腹中皆從陸過灘易舟而下又歷大小流灘為蠻夷司地又歷黃郎木鋪貴溪寨業灘至南江口為烏蒙府地始安流自廣翅塘至南江木商行之可十日又至文溪鐵索江邊數灘歷麻柳灣教化巖為馬湖府地又歷泄灘蓮花三灘會溪石角灘至敘州府其説甚詳晰鹽井營東南蓋即漢大筰縣界繩若合流處若為建昌衛西之打沖河繩則姚安府北之金沙江也此水禹無可致力不用循行故所道唯雍州之黑水瀘本作盧如盧弓盧矢盧橘之類皆訓黑劉熙釋名土黑曰盧沈括筆談云夷人謂黑為盧漢中山盧奴縣有盧水酈道元云水黑曰盧不流曰奴尤盧水為黑水之切證也牧誓八國有盧人疑即居盧水上者其字後加水作瀘章懷太子注後漢書云瀘水一名若水則瀘若似非異源而酈元引益州記曰瀘水源出曲羅舊下三百里曰瀘水兩峰有殺氣暑月舊不行故武侯以夏渡為艱瀘水又下合諸水而總其目焉故有瀘江之名矣據此則瀘水自出曲羅舊其地當在若水之東下流合若水故若水兼瀘水之目所謂隨決入而納通稱者也元和志云嶲州西瀘縣東北至州二十七里本漢卭都縣地瀘水在縣西一百十二里水峻急而多石土人以牛皮作船而渡一船勝七八人蓋即曲羅舊出之瀘水也考其源流不出漢越嶲犍為二郡界而杜氏通典云吐蕃有可跋海去赤嶺百里方圓七十里東南流入西洱河合流而東號漾濞水又東南出會川為瀘水瀘水即黑水也程大昌金履祥之説皆出於此漾濞水見唐書在今大理府西百里西洱河即葉榆河也出大理鄧川州點蒼山滙為巨湖周三百里亦曰西洱海今案水經注葉榆河出益州郡葉榆縣縣東有葉榆澤葉榆水之所鍾也其水自縣南枝分東北流徑遂久縣東姑復縣西與淹水合淹水雖合繩若入蜀江而葉榆初無黑水之名也何以知為黑水之源其經流則自邪龍縣東南流徑滇池縣南又東與盤江合又東南至交趾麋泠縣入海此與會川相去懸絶並不合繩若入蜀江安得謂樣濞水東南出會川為瀘水即滇池縣所祠之黑水哉杜説非是又案水經注永昌郡有蘭蒼水出博南縣漢武帝時通博南山道渡蘭倉津土地絶逺行者苦之歌曰漢德廣開不賔度博南越倉津其水東北流徑不韋縣與類水合又東與禁水合又北注瀘津水然則此蘭倉水仍東北合瀘水入蜀江也若今之所謂闌滄江元人指以為禹貢之黑水者則東南流至交趾入海與梁州絶無交涉影響附會之談殊不足信漢志滇池澤在滇池縣西北有黑水祠後漢志縣北有黑水祠或以為武帝開置益州郡始立之非也使帝知郡界有黑水而立此祠則班史必知其所在而能言之矣竊謂此祠蓋彼中相承已久黑水即金沙江東經會無縣南南直滇池縣縣故滇王國於其北立祠祭之宜矣自周衰以迄漢初聲教阻絶故尚書家莫能言梁州黑水之所在千載而下尚賴有此祠可以推測而得之語云天子失官學在四夷又云禮失而求之野此亦其一端也杜佑以漾濞水經會川縣者為黑水樊綽以麗水合瀰渃江者為黑水程大昌以西洱河貫葉榆澤者為黑水元人則以闌滄江至交趾入海者為黑水而明李元陽引張立道之事以為證此皆轉相附會以求合于入南海之文非實有所驗也以是為雍界之黑水吾不敢知如謂梁界之黑水亦即斯川則梁州奄有雲南極於交趾以一州而兼數州之地何至若是之廣逺此可以理斷之而信其必不然者也地理今釋梁州黑水即今雲南之金沙江其源發於西蕃諾莫渾五巴什山分支之東曰阿克逹毋必拉南流至塔城關入雲南麗江府境亦曰麗水東南流至姚安府大姚縣之左却鄉即苴却營北打沖河自鹽井衛來會之打沖河出自西蕃界在崑崙東南百里二源同發名查禇必拉蒙古謂之七察兒哈那平地水泉數十泓沮洳觱沸散若列星滙而南流有支河十二道左右流入之至占對安撫司入四川界南流東折繞鹽井衛之東北又南至烏喇猓果入金沙江又東入四川徑會川衛南又東至東川府西折而東北流徑烏蒙府西北馬湖府南又東徑敘州府南入岷江胡氏渭曰梁北自洛南商州鎮安並屬西安府以西為洋縣城固褒城鳯縣並屬漢中府兩當徽州成縣並屬鞏昌府及唐宕疉二州之地北與今岷州洮州二衛接界衛屬臨洮府又西為西傾山南唐松州徼外羈縻之地貞觀二年於松州置都督府督羈縻二十五州其後多至百有四州悉生羌都落皆與雍接界其間大山長谷逺者或數百里終南山東連二華竦峙長安之南有子午道直達漢中岡巒綿亘歷盩厔至武功郿縣為太一山亦名太白山駱谷斜谷之口皆當其地又西過寶雞訖於隴首山之深處髙而長大者曰秦嶺西京記云長安正南山名秦嶺東起商洛西盡汧隴東西八百里是也關中指此為南山漢中指此為北山斯實雍梁之大限矣寶雞西南為鳯縣即漢故道縣屬武都郡縣東北大散嶺與寶雞分界嶺上有大散關當秦隴之會扼南北之交雍梁有事在所必爭又西為徽州州東南有鐵山懸崖萬仞劉子羽曰蜀口有鐵山棧道之隘是也州西有木皮嶺甚髙險唐黃巢之亂王鐸置關於此以遮秦隴又西為成縣縣有鷲峽羊頭峽龍門戍皆在仇池山北北兵攻仇池必由此入又西為洮州衛之西傾山山東北去衛四百餘里屬雍州其南則屬梁州所謂西傾因桓是來者也以上諸山皆隴蜀厄塞西傾與華陽東西凖望相直曹彥和云梁北雍南以華為畿不兼言東最得經旨而林少頴以為華山在梁雍之東當云梁之東北雍之東南以華為畿夫兼言東則不足以該其西是謂欲密而反疏林氏蓋習聞西南距岱之説而不知其非故有此論梁東自洛南商南以南二縣並屬西安府為鄖西之西境故上津縣地上津唐屬商州其故城在今鄖西縣西北一百十里又南為房縣鄖西房縣並屬鄖陽府與豫接界又南為竹山縣屬鄖陽府又南為巫山縣屬夔州府與荆接界梁南自宜賔以西至會川諸州縣凡在瀘水馬湖江之北者皆梁域宜賔以東至巫山諸州縣凡在大江之北者皆梁域蓋大江既合瀘水亦得互受通稱故隋改江陽縣曰瀘川置瀘州治焉其縣南大江寰宇記謂之瀘江瀘水即黑水則梁左之南鄙亦當以此水表界也或曰梁州之水莫大於江經曷不界以江曰江自岷山導源大勢皆南行至敘州始折而東苟界以江則江右之地悉遺之域外矣故言黑水可以見左界而言江則不可以該右界也梁西自西傾山歷唐羈縻州以南為當州奉州柘州又西南為始陽鎮又南為雅州黎州又西南為嶲州皆與蠻夷接界今松潘衛威州天全六番招討司雅州黎大所及越嶲冕山營之北境鹽井營之西境是也唐當州在今松潘衛西南三百里州治通軌縣隋志縣有甘松山元和志云甘松嶺在嘉城縣西南十五里唐開元十九年吐蕃請互市於甘松宰相裴光庭曰甘松嶺中國之阻不如許赤嶺即此也赤嶺在今陜西西寧衛界奉柘二州在今疊溪威州之西奉州西七十里有的博嶺韋臯嘗分兵出此圍維州柘州西北百里有大雪山一名蓬婆山杜甫詩已收滴博雲間戌欲奪蓬婆雪外城是蓬婆又在滴博之西也威州北有髙碉山山上有薛城廢縣唐維州治亦曰薑維城邊略云自松達茂不三百里夷碉棊布山巖如蜂房宋史有碉門元有碉門宣撫司即今天全六番招討司也蓋夷碉起自松州訖於始陽故謂之碉門矣廣韻無碉字不知其音今案後漢書冉龐夷皆依山居止纍石為室髙者至十餘丈為卭籠注云今彼土夷人呼為雕也蓋碉本作雕後改從石作碉耳音當與雕同唐雅州治嚴道縣領羈縻吐蕃四十六州黎州治漢源縣管羈縻州五十七並蠻夷部落寰宇記云雅州西去大渡河五日程羌蠻混雜連山接野鳥路沿空不知里數黎州西至廓清縣一百八十里其城西臨大渡河河西則生羌蠻界髙山萬重更無郡縣今黎大所北有卭來山九折坂後漢永平中白狼槃木唐菆等百餘國舉種奉貢越山坂繦負而至皆旄牛徼外蠻夷也嶲州即今建昌衛通典云南至姚州界五百六十里西至磨迷生蠻六百六十里昔司馬相如略定西南夷關沫若徼牂牁鏤靈山橋孫水蓋皆在此地矣岷嶓既藝錐指傳曰岷嶓皆山名地理志云岫山在蜀郡湔氐道西徼外江水所出縣有蠻夷曰道今四川松潘衛即漢湔氐道也山在衛西北後魏地形志華陽郡嶓冢縣有嶓冢山漢水出焉括地志云嶓冢山在梁州金牛縣東二十八里今在陜西漢中府寧羌州北九十里州本漢廣漢郡葭萌縣地也地理今釋嶓冢有二一在陜西漢中府寧羌州北九十里東漢水所出即導漾之嶓冢一在鞏昌府秦州西南六十里西漢水所出二山南北相去三四百里而支脈隱然聫屬郡縣志所謂隴東之山皆嶓冢是也沱潛既道錐指正義曰鄭注梁州云二水亦謂自江漢出者郭璞爾雅音義云沱水自蜀郡都安縣湔山與江别而東流又云有水從漢沔陽縣南流至梓潼漢夀入大穴中通洞山下西南潛出一名沔水舊俗云即禹貢潛也渭案地理志禹貢江沱在蜀郡郫縣西東入大江此即今之郫江郭氏所謂沱也括地志云潛水一一名復水今名龍門水源出綿谷縣東龍門大石穴下元和志云龍門山在利州綿谷縣東北八十二里潛水所出此即郭氏所謂潛也今成都府灌縣東有都安故城漢中府沔縣東南有沔陽故城漢夀晉改曰晉夀其故城在今保寧府昭化縣東南綿谷亦晉夀地今為廣元縣河渠書蜀守冰鑿離碓辟沫水之害穿二江成都之中溝洫志同碓作􅕞注引杜預益州記云二江者郫江流江也隋經籍志有益州記三卷李氏撰而無杜預之書李氏者李膺也梁益州别駕初學記引任豫益州記曰郫江者大江之支也亦曰涪江亦曰湔水在蜀與洛水合又劉逵蜀都賦注丙穴下劉昭注補郡國志廣都縣下並引任豫益州記此杜預當是任豫豫通作預任與杜字形相似而誤揚雄蜀都賦曰兩江珥其前應劭風俗通曰李冰開成都兩江溉田萬頃左思蜀都賦曰帶二江之雙流常璩華陽國志曰李冰壅江作塴穿郫江檢江即流江别支流雙過郡下蓋自漢以來皆以郫江為沱水流江為大江水經所敘江水自都安以至成都者考其原委皆流江也然流江實非大江江原縣􅗪水江原今崇慶州應劭曰􅗪音夀近世謂之大皂江者元和志􅗪江一名皂江蓋夀音轉為皂則岷江之正流也而班氏以為首受江故鄭康成云沱之類􅗪與郫俱為沱而流江於是乎為大江矣推尋事理李冰所穿之二江一是流江乃冰所創造一是郫江即禹貢之沱時必淤淺冰復從而濬之遂并數為二江兹二江者或稱內江外江或稱南江北江彼此參錯未知誰是其湔水不經成都縣界元史河渠志以郫湔為冰所穿之二江大謬郫江之為沱水無疑矣然世皆以灌縣西南至廣都北岸合流江者為郫江之起止今成都城東南岸曲有合江亭郫江入流江處也則所行不過三百餘里今案漢志綿虒縣湔水東南至江陽入江江陽今瀘州行千八百九十里水經注云綿雒二水與湔水合亦謂之郫江郫江者沱水也既與湔水渾濤則直至瀘州入江矣安得以五城水口之枝津為沱水西合大江之正道哉水經注云湔水東絶綿洛徑五城界至廣都北岸南入于江謂之五城水口蓋禹治梁州特紀沱潛潛自廣元至巴縣入江行千餘里沱自灌縣至瀘州入江行千五百里羣流湊集源遙波濬雖江漢之别而實為州界兩大川荒度之功不遺餘力此沱潛所以與岷嶓並志也蔡蒙旅平錐指傳曰蔡蒙二山名正義曰地理志云蒙山在蜀郡青衣縣順帝改曰漢嘉縣蔡山不知所在蘇氏曰蒙山今曰蒙頂渭案今雅州北有青衣廢縣蒙山在州南地理今釋蔡山宋葉少藴謂即周公山在今四川雅州東五里蒙在今雅州名山縣西五里接雅州及蘆山縣界蕙田案蔡山正義云不知所在胡朏明謂當是今之峨嵋山以為周公山者葉少藴及明一統志也和夷底績錐指正義曰和夷平地之名蘇氏曰和夷西南夷名也渭案水經注引鄭説云和夷和上夷所居之地和水即涐水和涐聲相近字從而變地理志云青衣縣禹貢蒙山溪大渡水東南至南安入渽渽水出汶江縣徼外南至南安東入江過郡三行三千四十里渽乃涐字之誤説文涐水出蜀汶江徼外東南入江從水我聲徐鉉音五何切故知渽當作涐和夷者涐水南之夷也汶江今茂州南安今嘉定州水經江水東南過犍為武陽縣故城在今眉州北新津仁夀井研三縣皆武陽也青衣水沫水從西南來合而注之此即二水會涐水入江處也酈注云江水自武陽東至彭亡聚曰外水又東南徑南安縣西有熊耳峽連山競險接嶺爭髙縣治青衣江會襟帶二水矣縣南有峨眉山有蒙水即大渡水也水發蒙溪東南流與涐水合水出徼外徑汶江道吕忱曰涐水出蜀許慎以為涐水也從水我聲南至南安入大渡水大渡水又東入江也班固謂大渡入涐道元謂涐入大渡然涐水源長當以漢志為正道元敘涐水甚略自漢志涐誤作渽而師古曰音哉世遂不知有涐水且不知渽水之所在徒以其下流與南安之沫水號為大渡者合而入江因目涐水曰大渡河元和志云黎州西至廓清城一百八十里其城西臨大渡河河西生羌蠻界黎州本漢沈黎郡旄牛縣地唐置黎州治漢源縣今黎大所南三十里漢源廢縣是也又云通望縣北至黎州九十里大渡水經縣北二百步通望本漢旄牛縣隋為大渡戍尋置陽山縣唐改曰通望今黎大所東南通望故城是也旄牛故城在所南牧誓有髳人蓋國于此也李膺益州記云羊膊嶺水分二派一南流為大江一西南流為大渡河王應麟地理通釋云大渡河一名羊山江源出鐵豹嶺嶺即岷山羊膊嶺之異名也大渡河即涐水羊膊嶺即汶江徼外之山涐水所出以今輿地言之涐水自茂州徼外南流經黎大所西舊有黎州所大渡所本朝并并為一曰黎大所附屬雅州折而東經所南又東經建昌衛越嶲營北南去營二百二十里歷鬼皮落野夷界水勢浩大煙瘴特甚又東經峨眉縣南又東至嘉定州南合青衣沫水又東入大江此水之南蓋即經所謂和夷也禹導和水使入江而其地已底績矣或曰何以知不在山北曰古者桓有和音故鄭康成破和為桓晉地道記云梁州自桓水以南為夷書所謂和夷底績此説是也但不當破和為桓耳方輿勝覽云大渡河於黎州為南邉要害之地唐時太渡之戍一不守則黎雅卭嘉成都皆擾建隆三年王全斌平蜀以圖來上議者欲因兵威復越嶲藝祖以玉斧畫此河曰外此吾不有也於是為黎之極邉曩時河道平廣可通漕舟自玉斧畫河之後河之中流忽陷下五六十丈河流至此澎湃如瀑從空而落舂撞怒號波濤洶湧船筏不通名為噎口殆天設險以限羌蠻也政和末大理通貢有上書乞於大渡河外置城邑以便互市詔問得失知黎州宇文常言太祖觀地圖畫大渡河為境歷百五十年無恙今若於河外建城邑開邉隙非中國之福也議遂寢以是知大渡河南當為禹貢外薄之地唐韋皋拒吐蕃李德裕拒南詔皆扼此水為險要和夷在大渡河南馬湖江北為宋祖玉斧畫而棄之者無疑矣馬湖江即古若水漢瀘水禹貢梁州之黑水也地理今釋和夷案水經注引鄭説云和夷所居之地和即和川水在今四川雅州滎經縣寰宇記謂滎經縣北九十里有和川水從羅巖古蠻州來也蔡傳以夷為嚴道今滎經縣宋曰嚴道以西之夷道滎經以西無夷道非是時瀾書説云嚴道以西地名和川夷人所居乃為得之觀承案和夷之解極是與島夷萊夷淮夷一例是禹貢之書法也蔡氏以夷為嚴道以西之夷道者即令果有其地亦不足據矣西傾因桓是來錐指傳曰西傾山名桓水自西傾山南行因桓水是來浮于潛地理志云西傾山在隴西臨洮縣西南夏氏曰西傾後世所謂嵹臺山其南桓水出焉一名白水渭案今陜西洮州衛本漢臨洮縣地唐為臨潭縣屬洮州括地志云西傾山在臨潭縣西南三百三十六里西傾之戎在山之西南唐為吐蕃地北連吐谷渾西接黨項黨項故析支也山海經曰白水出蜀而東南注于江郭璞云色微白濁今在梓潼白水縣從臨洮之西西傾山來經沓中東流過隂平至漢夀縣入潛酈道元云桓水自西傾至葭萌入于西漢即鄭元之所謂潛水者也今白水自洮州衛流經文縣平武龍安府治劒州至昭化縣東入西漢水此即禹貢之桓水西傾之戎所因以來者也地理今釋西傾山一名嵹臺山在今陜西鞏昌府洮州衛西蕃界延袤千里外跨諸羌桓水一名白水出今陜西岷州衛東南分水嶺至四川保寧府昭化縣東入西漢水西漢水出秦州嶓冢山上流為犀牛江下流為嘉陵江浮于潛逾于沔入于渭亂于河錐指傳曰漢上曰沔越沔而北入渭浮東渡河正絶流曰亂正義曰下傳云泉始出山為漾水東南流為沔水至漢中東行為漢水是漢上曰沔也渭案地理志渭水出隴西首陽縣西南鳥鼠同穴山東至船司空入河河謂西河水經注云西漢即潛水自西漢遡流而屆于晉夀界阻漾枝津南歷岡穴迤邐而接漢沿此入漾書所謂浮潛而逾沔矣歷漢川至南鄭縣屬于褒水遡褒暨于衙嶺之南溪水支灌于斜川水支本作川皮字之誤也屆于武功而北達于渭水此乃水陸之相關川流之所巠復不乖禹貢入渭之宗實符尚書亂河之義也林蔡所引皆有脫誤謹依原文備録于此南鄭今為漢中府治其故城在縣東北武功故城在鳯翔府郿縣東四十里渭水之南漢志右扶風武功縣下云斜水出衙嶺山北至郿入渭褒水亦出衙嶺至南鄭入沔案衙嶺山在今郿縣西南三十里俗呼馬鞍山褒斜本谷名李善西都賦注引梁州記云萬石城泝漢上七里有褒谷萬石城在今漢中府褒城縣東南口曰褒北口曰斜長四百五十里溝洫志曰作褒斜道五百餘里曹孟德以此谷為五百里石穴孔頴達云漢在渭南五百餘里皆與梁州記合程大昌謂漢中北距斜口八九百里妄也水經注漢水自西樂城北城在今沔縣東南漢水南岸又東合褒水水東北出衙嶺山東南經大石門歷故棧道下谷又東南徑三交城城在褒城縣西北以山水之會名又東南得丙水口水上承丙穴穴出嘉魚故左思稱嘉魚出于丙穴良木攢于褒谷又東南歷小石門門穿山通道六丈有餘蜀都賦曰岨以石門即此門在漢中之西褒中之北案今褒城縣西北十五里箕谷口有石如門曰石門又東南歷褒口即褒谷之南口北口曰斜所謂北出褒又南徑褒縣故城東褒中縣也本褒國案褒中故城在褒城縣南又南流入于漢渭水自郿縣故城南城在今郿縣東北十五里渭水之北又東徑武功縣北斜水自南注之水出縣西南衙嶺山北歷五丈原東原在郿縣西三十里渭水南亦謂之武功水諸葛亮表云臣遣虎步監孟琰據武功水東是也以今輿地言之褒谷口在褒城縣北十里斜谷口在郿縣西南三十里褒水自衙嶺南流經褒城縣東又南入于漢斜水自衙嶺北流經郿縣東又東北入于渭褒之流長而斜之流短兩谷髙峻中間褒水所經皆穴山架木而行名曰連雲棧陸贄所云緣側徑於嶺嵓綴危棧於絶壁者也酈元云自西漢泝流而至晉夀阻漾枝津南枝津即郭璞所云水從沔陽縣南流至漢夀寰宇記所謂三泉故縣南大寒水西流者也歷岡穴迤邐而接漢岡穴即郭璞所謂洞山括地志所謂龍門山大石穴者也以今輿地言之浮嘉陵江至廣元縣北龍門第三洞口舍舟從陸越岡巒而北至第一洞口出谷乘舟至沔縣南經所謂浮潛而逾沔也自沔入南鄭縣界抵褒城東歷褒水斜水至郿縣東北入渭沿流而東歷武功興平盩厔鄠縣咸陽長安髙陵咸寧臨潼渭南華州朝邑至華隂縣之渭口絶河流而東抵蒲州經所謂入渭而亂河也自蒲州並東岸而行至榮河縣北泝汾水而上歷河津稷山絳州太平襄陵至臨汾縣是為平陽堯之所都此梁州入西傾之貢道也地理今釋沔水一名沮水漢書地理志武都郡沮縣沮水出東浪谷沮縣即今陜西漢中府略陽縣也東南至沔縣西南入漢水名曰沮口胡氏渭曰梁州有古蜀山氏蠶叢氏之國又元囂昌意所封及牧誓所稱庸蜀羌髳微盧彭濮諸國皆在焉春秋時可考者庸巴濮麇褒凡五國戰國時屬秦而楚亦兼得其地秦并天下置漢中巴郡蜀郡隴西南境是內史南境是漢改置益州領郡八漢志云改梁曰益魏兮置梁州晉初因之益梁二州並領郡八後又分益州南境置寧州領郡四唐為山南西道之漢中梁州洋川洋通川通潾山渠南平渝清化巴始寧壁咸安蓬符陽集巴川合河池鳯順政興益昌利等郡山南東道之房陵房南賔忠南浦萬雲安夔等郡劒南道之蜀郡益唐安蜀濛陽彭德陽漢通義眉梓潼梓巴西綿普安劍閬中閬資陽資臨卭卭通化茂交川松越嶲嶲南溪戎遂寧遂仁夀陵犍為嘉盧山雅瀘川瀘陽安簡安嶽普江源當隂平文同昌扶油江龍臨翌翌歸誠悉靜川靜蓬山柘恭化恭維川維雲山奉和義榮盛山開南充果洪源黎雲南姚等郡又京畿之上洛商安康金隴右道之武都武同谷成懷道宕合川疊黔中道之涪陵涪南川南等郡案以上通典所列雲南涪陵南川三郡乃梁南徼外蠻夷不在九州之限其雲安之建始縣當往屬荆上洛之上津東境廢長利縣地當往屬豫而黔中寧夷涪川播川夜郎義泉溱溪七郡列在荆域者雖附近蜀江之南亦係徼外蠻夷不在九州之限以今輿地言之陜西漢中府興安州及西安府之商州洛南山陽鎮安商南鞏昌府之鳯縣兩當徽州成縣階州文縣湖廣鄖陽府之房縣竹山竹溪及鄖西縣之西境四川則成都保寧順慶龍安馬湖五府潼川嘉定卭眉雅五州及敘州瀘州重慶夔州之江北諸州縣松潘衛疊溪營天全六番招討司黎大所建昌衛皆古梁州域也其遵義府永寧衛及東川烏蒙鎮雄故烏撒三府並在瀘水之外雲南郡唐於昆明之弄棟川置即今姚安府其非梁域又不待言矣黑水西河惟雍州錐指傳曰西距黑水東據河龍門之河在冀州西正義曰河在雍州之東而謂之西河者以冀州西界故王制云自東河至於西河千里而近是河相對而為東西也渭案黑水水經注云出張掖雞山南流至燉煌過三危山南流入于南海括地志云源出伊州伊吾縣北百二十里南流絶三危山在沙州燉煌縣東南四十里二説未知孰是通典云孔鄭通儒莫知其所或是年代久逺遂至湮涸無以詳焉河經龍門而南至於華隂為西河左傳昭公十三年晉叔魚謂季孫曰將為子除館于西河禮記子夏退而老于西河之上史記魏武侯浮西河而下封吳起為西河守皆此水也地理今釋雍州黑水出陜西甘肅塞外南流至河州入積石河今俗名大通河是也案括地志云黑水出伊州伊吾縣北東南流至鄯州又東南至河州入黃河今黑水上源為流沙壅塞已無遺迹可考其下流為大通河在瓜州之南歷西寧衛東南至河州入河西寧即唐之鄯州則括地志之説與今圖合又案河之積石北則大通河入之南則大夏河注之二水入河之口南北相值後人或遂指大夏為黑水絶河而南之迹不知大夏雖在黃河之南實仍在南山之北且其源自南而北與山南入海之水絶不相通胡氏渭曰黑水今不可得詳據括地志言出伊吾南流絶三危山則當自燉煌北大磧外流入郡界南經白龍堆東三危山西又南經吐谷渾界中又南經吐蕃界中繞出河源之外而入于南海梁州之黑水别是一川非為雍西界者也西河東與冀分界自今榆林衛故勝州東北折而南且西經府谷神木又西南經葭州吳堡又南經綏德清澗延川延長又東南經宜川並屬延安府又南經韓城郃陽朝邑以至于華隂並屬西安府與豫接界河行凡一千七百餘里雍之南界自華隂太華山以西為華州渭南藍田鄠縣盩厔並屬西安府郿縣寶雞並屬鳯翔府皆以南山與梁分界又西為鳯縣有大散嶺又西為徽州有鐵山木皮嶺又西為成縣有鷲峽羊頭峽龍門戍並屬鞏昌府又西為岷州衛又西為洮州衛有西傾山皆與梁分界處也詳見梁州自西傾又西歷吐谷渾南至大積石自積石又西歷吐谷渾南黨項白蘭之北至於黑水吐谷渾本遼東鮮卑種也東晉初徙居枹罕宋景平中其子孫有阿豺者升西強山觀墊江源則其地南至西傾矣又數傳為夸吕始自號可汗治伏俟城在青海西十五里據有甘松之南洮水之西南極於白蘭其地東西三千里南北千餘里黨項羌在古析支之地漢時燒當羌亦嘗居之白蘭者羌之别種也其地皆與吐谷渾接吐谷渾在河湟之間即先零燒當諸羌故地積石在其西南南枕賜支河曲禹導河自此始則湟水之南積石之北西傾之西其為雍州之域無疑矣雍之北界經無可見約略言之自今塞外東受降城之西與冀分界元和志云東受降城在勝州榆林縣東北八里又西四百里為中受降城元和志云南至麟州四百里又西四百餘里為西受降城元和志云在豐州西北八十里唐景龍二年張仁願所築南直今榆林衛黃河經三城之南謂之北河河北有隂山為華夷大限侯應曰北邊塞至遼東外有隂山東西千餘里是也又西為髙闕山戰國時趙築長城並隂山下至髙闕為塞及秦始皇斥逐丐奴城河上為塞又使蒙恬度河取髙闕陶山北假中築亭障以逐戎人是也其地又有光祿塞雞鹿塞漢受降城皆雲中五原二郡境也又西為河西四郡之北鄙漢太初中收丐奴休屠渾邪王地置武威張掖酒泉敦煌以通西域隔絶羌胡往來武威姑臧縣北三百里有白亭軍元和志云在馬城河東岸天寶十年哥舒翰置因白亭海為名也張掖東北一千五百餘里有地曰居延元狩二年霍去病出北地二千餘里過居延太初三年使路博德築居延澤上今甘州衛塞外居延故城是也亦曰居延塞元為亦集乃路地理志云在甘州北一千五百里城東北有大澤西北俱接沙磧乃漢居延故城明洪武初馮勝拔肅州進至掃林山亦集乃路是也合黎山在張掖縣西北二百里弱水由此東北入居延澤遮虜障在肅州酒泉縣北二百四十里李陵與單于戰處敦煌即今廢沙州衛衛北抵大磧磧外即古伊吾盧地唐置伊州今為廢哈密衛也自雲中至敦煌六郡皆古雍州之城後為戎翟所據至秦漢始收復者其北皆臨大磧大磧即沙幕漢人謂之幕唐人謂之磧東西數千里南北逺者千里無水草不可駐牧雖禽獸亦不能居之弱水既西錐指傳曰導之西流至于合黎渭案地理志張掖刪丹縣桑欽以為道弱水自此西至酒泉合黎今陜西行都司之山丹衛故刪丹縣也地理今釋弱水今陜西山丹衛漢刪丹縣城西有山丹河古弱水也法顯佛國記謂之流沙河出衛西南窮石山正流西至合黎山與張掖河合又東北至甘州衛北迤邐流至塞外入居延澤其餘波溢入流沙也涇屬渭汭錐指傳曰屬逮也水北曰汭言治涇水入于渭地理志云涇水出安定涇陽縣西笄頭山東南至馮翊陽陵縣入渭行千六十里渭案涇陽故城在今陜西平涼府平涼縣西南笄頭山在縣西一百里陽陵故城在今西安府髙陵縣西南二十里説文汭水相入也左傳閔公二年虢公敗犬戎于渭汭杜預曰水之隈曲曰汭地理今釋涇水出今陜西平涼府平涼縣西南笄頭山亦名崆洞山東至西安府髙陵縣西南入渭水渭水出今陜西臨洮府渭源縣西鳥鼠山東至西安府華隂縣東北入河汭水出今平涼府華亭縣有二源北源出湫頭山之朝那湫南源出齊山至縣東與北河合又東至涇州西北入涇水胡氏渭曰蔡傳云涇渭汭三水名屬連屬也涇水連屬渭汭三水也黃東發非之曰古説涇入於渭水之內而漆沮既從灃水攸同皆主渭言之文意俱協若以汭為一水而入涇則涇屬渭汭者是涇既入渭汭又入涇下文漆沮之從灃水之同孰從孰同耶職方氏其川涇汭易氏解云汭非禹貢之汭禹貢言汭皆水內此川名鄒季友亦曰涇水先會汭水後入渭水則經當言涇屬汭渭不當先渭而後汭況下文即有渭汭字不可異説一言破的蔡説可以永廢矣漆沮既從錐指傳曰漆沮之水已從入渭顔氏曰漆沮即馮翊之洛水渭案地理志沮水出北地直路縣西東入洛洛水至馮翊褱懷同德縣東南入渭直路縣自後漢已廢其故城在今延安府鄜州中部縣西北二百里褱德今西安府同州之朝邑縣也縣西南四十三里有懷德故城水經注云渭水東過華隂縣北洛水入焉闞駰以為漆沮之水華隂縣北即懷德縣南也導渭傳云漆沮二水名亦曰洛水出馮翊北正義云地理志漆水出扶風漆縣依十三州記漆水出岐山東入渭則與漆沮不同矣此云會于涇又東過漆沮是漆沮在涇水之東故孔以為洛水一名漆沮水經沮水出北地直路縣東入洛又曰鄭渠在太上皇陵東南濁水入焉俗謂之漆水又謂之漆沮其水東流注于洛水志云在馮翊懷德縣東南入渭以水土驗之與毛詩古公自土沮漆者别也彼漆即扶風漆水彼沮則未聞渭案此説是也本疏引扶風漆水蓋未定之論失於刋正耳詩大雅民之初生自土漆沮傳云沮水漆水也周頌猗與漆沮潛有多魚傳云漆沮岐周二水也此皆謂扶風之漆沮而林少穎以猗與漆沮釋漆沮既從恐非小雅瞻彼洛矣傳以為宗周溉浸之水亦不言洛即漆沮謂漆沮亦曰洛水實自安國書傳始而闞駰酈道元從之孔頴達復援以釋詩于是洛與漆沮合而為一水矣其濁水上承雲陽大黑泉名漆沮水者乃土俗之稱而洛水之為漆沮則先儒皆以為然故顔師古注漢書亦用其説然直路之沮自櫟陽縣界合蜀水分為二水一循鄭渠而東注洛其間二百餘里實鄭國之所鑿漢志云沮入洛亦據既有鄭渠後言之耳自鄭渠一廢而濁水絶于三原沮水不抵富平可見此水在古時元合濁水至櫟陽入渭而不與洛通也程大昌雍録謂禹貢漆沮惟富平石川河正當其地確不可易地理今釋漆水源出陜西西安府同官縣北髙山流經縣城東合同官水西南至耀州屬西安府與沮水合沮水出陜西延安府中部縣西南流經宜君屬延安府同官二縣境至耀州城南會漆水東流入富平縣屬西安府界名石川河又南流至臨潼縣屬西安府北交口鎮入渭水灃水攸同錐指傳曰灃水所同同之於渭地理志灃水出扶風鄠縣東南北過上林苑入渭渭案鄠縣今屬陜西西安府其故城在今縣北二里上林苑在今長安縣西南灃水至咸陽縣西南入渭詩曰豐水東注維禹之績言同於渭也灃一作豐又作酆漢志扶風鄠縣古國有扈谷亭扈夏啓所伐酆水出東南又有潏水皆北過上林苑入渭水經無灃水之目其附見渭水篇中者曰渭水自槐里縣故城南槐里今為興平縣在西安府西少北一百里又東合甘水水出南山甘谷北流至鄠縣合潦水入渭甘誓云大戰于甘即此地又東豐水從南來注之地説云渭水與豐水會于短隂山內水會無他髙山異巒所有唯原阜石激而已漢書音義張揖曰酆水出鄠縣南山酆谷北入渭長安志豐水出長安縣西南五十五里終南山豐谷其源濶一十五步其下濶六十步水深三尺自鄠縣界來終縣界由馬坊村入咸陽合渭水咸陽縣在西安府西北五十里昔文王作豐武王治鎬詩詠其事鄭康成云豐在豐水之西鎬在豐水之東地理今釋灃水源出今陜西西安府鄠縣東南終南山自柴閣而下至咸陽縣東南入渭水荆岐既旅終南惇物至于鳥鼠錐指傳曰此荆在岐東非荆州之荆終南惇物鳥鼠三山名正義曰治水從下自東而西先荆後岐荆在岐東也地理志云禹貢北條荆山在馮翊懷德縣南三山空舉山名不言治意蒙上既旅之文也地理志云扶風武功縣有太一山古文以為終南垂山古文以為惇物皆在縣東渭案鳥鼠在今陜西臨洮府渭源縣西渭水出焉地理今釋終南山在今陜西西安府長安縣南五十里東至藍田縣西至鳯翔府郿縣綿亘八百餘里惇物山漢書地理志右扶風縣武功注大一山古文以為終南垂山古文以為惇物皆在縣東武功今陜西鳯翔府郿縣考圖志不載是山胡渭禹貢錐指以為太乙之北峰在縣東四十里者是也原隰底績至于豬野錐指傳曰下隰曰隰豬野地名正義曰地理志云武威縣東北有休屠音除澤古文以為豬壄澤鄭元以為詩云度其隰原即此原隰是也原隰豳地從此致功西至豬野之澤也渭案今西安府邠州及三水縣皆豳地漢武威縣屬武威郡今為陜西行都司鎮畨衛地休屠澤在衛東北三危既宅三苗丕敘錐指傳曰西裔之山己可居三苗之族大有次敘正義曰左傳稱舜去四凶投之四裔舜典云竄三苗于三危是三危為四裔之山也地理志杜林以為敦煌郡即古瓜州昭九年左傳云先王居檮杌于四裔故允姓之姦居於瓜州杜預云允姓之祖與三苗俱放于三危瓜州今敦煌也傅氏曰三危既宅此治黑水之成功也渭案漢敦煌唐分為瓜沙二州水經注云三危山在敦煌縣南括地志云在沙州敦煌縣東南四十里山有三峰故名亦名卑羽山今為嘉峪關外廢沙州衛地衛本屬行都司後棄之化外治黑水及三危而止兼有濬畎澮之事故言山以包之自豬野至黑水中隔弱水弱水先已治故豬野功畢即繼以黑水也三苗今為湖廣嶽州府地吳起曰三苗之國左洞庭右彭蠡是也舜臣堯竄其君及民於三危至是禹安定之正義云三危山必是西裔未知山之所在鄭元引地記書曰三危之山在鳥鼠之西南當岷山則在積石之西南地記乃妄書其言未必可信要知三危之山必在河之南也渭案水經注兩引山海經以證尚書之三危一云三危之山三青鳥居之廣圓百里在鳥鼠山西見第四十卷末一云三危在燉煌南與岷山相接山南帶黑水見第三十一卷江水輿地記略同鳥鼠之西南當岷山則在今臨洮府南岷州衛北矣又云在積石之西南殊不可曉山南帶黑水蓋以扶州之黑水出素嶺山入白水者當之也妄言無疑三危山自當以在沙州者為是後魏書太平真君六年討吐谷渾杜豐追被囊度三危至雪山即沙州之三危也肅州舊志云白龍堆沙東倚三危北望蒲昌是為西極要路推其地望可以得三危之形勢矣浮于積石至于龍門西河會于渭汭錐指傳曰積石山在金城西南河所經也沿河順流而北千里而東千里而南龍門山在河東之西界正義曰地理志云積石山在金城河關縣西南羌中龍門山在馮翊夏陽縣北渭案漢河關縣在今陜西西寧衛西南塞外夏陽今西安府之韓城縣也會於渭汭今韓城縣北龍門山南是其地也地理今釋積石山在今河州北一百二十里水經注謂之唐述山括地志云山勢峭拔下臨黃河其西五十里有積石關唐置積石軍於此山海經云積石山在金城河門關西南境中漢之河關縣今之河州杜佑通典云禹施功自積石山而東今西平郡龍支縣今西寧衛地與河州接界界山是也案諸家言積石者多以此為小積石别有大積石去此尚千餘里其説蓋本於漢書西域傳謂河源出于闐北流與蔥嶺河合東注蒲昌海潛行地下南出于積石為中國河之文其實禹施功之始即此積石更無所謂大積石也歐陽忞輿地廣記云班固所載張騫窮河源事乃意度之非實見蒲昌海與積石通流其言甚正蓋河源在吐蕃境漢時吐蕃未通中國武帝以于闐山出玉案古圖書乃名河所出為崑崙後人遂并積石亦失其實耳于闐東流之水古名玉河蔥嶺之水名新頭河見法顯佛國記總與河源無涉至水經并云積石在蔥嶺之北則又失之逺矣或議杜佑主龍支之積石謂因唐置積石軍于澆河故城而誤考後漢書郡國志隴西郡河關縣積石山在西南又桓帝紀燒當羌叛段熲追擊于積石注即禹貢導河積石在鄯州龍支縣南是河州積石之名非始于唐矣蔡氏據杜氏説釋經最當龍門山在今陜西西安府韓城縣東北五十里大河之西東與壺口隔水相望織皮崑崙析支渠搜西戎即敘錐指顔氏曰崑崙析支渠搜三國名也渭案三國皆西戎而西戎不止于三國三國乃西戎之大者皆來入貢則其餘無不賔服故曰西戎即敘地理今釋崑崙西戎國蓋附近崑崙山者案鄭康成云衣皮之民居此崑崙析支渠搜三山之野者是崑崙析支渠搜皆本山名而因以為國號也析支今西蕃在陜西臨洮府河州西應劭曰禹貢析支屬雍州在河關之西東去河關千餘里羌人所居謂之河曲羌也唐書黨項傳曰黨項漢西羌别種其地古析支東距松州西葉護南舂桑迷桑等羌北吐谷渾渠搜涼土異物志云古渠搜國在大宛北界隋書西域傳云鏺汙國文獻通考云鏺汙國東去瓜州五千五百里都蔥嶺之西五百餘里古渠搜國渠搜當在西域非朔方也傅寅禹貢集解云陸氏曰漢志朔方郡有渠縣武紀云北發渠搜是也然考漢朔方之渠搜非此所謂渠搜此亦當是金城以西之戎也後世種落遷徙故漢有居朔方者當禹時渠搜居朔方則不應浮積石陸説非也胡氏渭曰雍州為奧區神臯后稷始封於邰一作駘又作斄公劉處豳太王徙岐文王作豐武王治鎬及扈崇密須之封皆在焉春秋時可考者虢文王弟所封曰西虢周召畢豐鄭初封咸林之地漢為鄭縣屬京兆今華州是秦芮梁崇密驪戎白狄晉西境是凡十四國戰國時屬秦而魏趙亦兼得其地秦并天下置內史上郡北地九原隴西雲中西南境唐榆林郡是漢以其地之西偏置涼州領郡十漢志云改雍曰涼而三輔則領於司𨽻後漢並因之魏分置秦州晉又分置雍州領郡國七治京兆涼州領郡國八治武威秦州領郡六治上邽唐為京畿之京兆府雍州華隂華馮翊同扶風岐新平邠等郡關內道之汧陽隴安定涇彭原寧安化慶平涼原靈武靈五原鹽寧朔宥洛交鄜中部坊延安延咸寧丹上郡綏銀川銀新秦麟朔方夏九原豐榆林勝安北大都護府分豐勝二州界置等郡隴右道之天水秦隴西渭金城蘭會寧會安鄉河臨洮洮和政岷寧塞廓西平鄯武威涼張掖甘酒泉肅晉昌瓜燉煌沙伊吾伊交河西北庭庭州後為都護府安西都護府等郡案以上通典所列伊吾交河北庭安西自古為戎狄不在禹貢九州之限又河湟之間吐谷渾故地未嘗為郡縣故不入雍域以今輿地言之陜西臨洮平涼慶陽延安鳯翔五府其西安則唯商州洛南山陽鎮安商南鞏昌府則唯鳯縣兩當徽州成縣階州文縣為梁域餘皆屬雍又榆林衛寧夏衛寧夏中衛又靖逺岷州洮州三衛行都司所領甘州莊浪等諸衛所其在化外者南至西傾積石西踰三危北抵沙漠皆古雍州域也右禹貢豫梁雍三州五禮通考卷二百三
