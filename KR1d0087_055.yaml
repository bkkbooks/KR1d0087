body:
  text: 五禮通考卷四十五刑部尚書秦蕙田撰吉禮四十五社稷城隍附明史太祖本紀呉元年八月社稷壇成王圻續通考先是丙午十二月定議以明年丁未為呉元年羣臣建言制度宜早定上以國之所重莫先于宗廟社稷于是令有司立宗廟社稷洪武元年二月定社稷禮嵗必親祀以為常大政紀洪武元年正月恭詣社稷壇行禮十二月己丑頒社稷壇制于天下春明夢餘録洪武元年命儒臣定諸祀典李善長等進社稷議曰周制小宗伯掌建國之神位右社稷左宗廟社稷之祀壇而不屋必受霜露風雨以達天地之氣起大事動大衆必先告于社而後出其禮可謂重矣蓋古者天子社以祭五土之祗稷以祭五穀之神其制在中門之外外門之内尊而親之與先祖等人非土不立非榖不食以其同功均利以養人故祭社必及稷所以為天下祈福報功之道也然天子有三社為羣姓而立者曰大社其自為立者曰王社有所謂勝國之社屋之不受天陽國雖亡而存之以重神也後世天子之禮惟立大社大稷以祀之社皆配以句龍稷皆配以周棄漢因髙祖除亡秦社稷立官大社大稷一嵗各再祀光武立大社大稷于雒陽在宗廟之右春秋二月及臘一嵗三祀唐因隋制並建社稷為大祀仍以四時致祭宋制每嵗以春秋二仲月及臘日祭之元世祖營社稷于和義門内少南以春秋二仲月上戊日致祭今宜祀以春秋二仲月上戊日皆從之上親祭大社大稷大社設正位在東配以后土西向大稷設正位在西配以后稷東向各用玉兩邸幣黒色牲用犢一羊一豕一籩豆各十后土后稷位並同不用玉祭畢賜羣臣享胙于奉天門明史禮志社稷之祀自京師以及王國府州縣皆有之其壇在宫城西南者曰太社稷明初建太社在東太稷在西壇皆北向洪武元年二月太祖親祀太社太稷帝服皮弁服省牲通天冠絳紗袍行三獻禮初帝命中書省翰林院議創屋備風雨學士陶安言天子太社必受風雨霜露亡國之社則屋之不受天陽也建屋非宜若遇風雨則請于齋宫望祭從之十二月頒社稷壇制于天下郡邑明集禮社稷建壇于宫城之右春用二月上戊日秋用八月上戊日致祭配位祭法厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社蔡墨曰共工氏有子曰句龍為后土后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之鄭康成以社為五土總神稷為原隰之神句龍以有平水土之功配社祀之稷有播種之功配稷祀之王肅以社祭句龍稷祭后稷皆人鬼也二家之説不同而鄭氏為優故後世並以句龍配社周棄配稷壇壝二壇坐南向北社壇在東稷壇在西各濶五丈髙五尺四出陛五級壇用五色土築各依方位上以黄土覆之二壇同一壝壝方廣三十丈髙三尺用磚砌四方開四門各濶一丈東門飾以青西門飾以白南門飾以紅北門飾以黒周圍築以牆仍開四門南為櫺星門北面㦸門五間東西㦸門各三間皆列㦸二十四瘞坎用唐制開瘞坎于稷壇西南用磚砌濶四尺深一丈降神樂止先瘞血送神樂止執事官取祝幣牲饌置瘞坎坎實半土社主社主用石髙五尺濶二尺上㣲尖半在土中近南向北祭時唯稷與二神配位用神位版神席設主于案不用席祭器社稷正配位皆用酒尊三加勺羃篚箱一籩豆各十鉶三簠簋各二俎三爵坫一沙池一盥盆一玉禮神之玉用兩圭有邸幣社稷幣以元色用黒繒四各長一丈八尺祝洪武元年八月一日祭社文曰唯神厚載功深資生徳大涵宥庶品造化斯成謹以仲秋祇率常禮敬以牲幣嘉薦醴齊備兹禋瘞用伸報本以后土句龍氏配神作主尚享后土氏文曰爰兹仲秋揆日唯吉恭修常禮薦于太社唯神水土平治永賴其功載稽典彛禮宜昭配謹以牲幣嘉薦醴齊陳于表位作主配神尚享祭稷文曰唯神嘉種生成明粢唯首帝命率育立我烝民敬以牲幣嘉薦醴齊式陳瘞祭備修常禮以后稷棄配神作主尚享后稷氏文曰爰以仲秋揆日唯吉恭修常禮薦于太稷唯神勤農務本政成稼穡生民立命百世之功謹以牲幣嘉薦醴齊陳于表位作主配神尚享牲正配四位各用犢一羊一豕一酒齊社稷正配位酒尊皆實以醍齊盎齊事酒粢盛簠二簋二實以黍稷稻粱籩豆之實籩則實以鹽藁魚棗栗榛菱芡鹿脯白黒餅豆實以韭菹醓醢菁菹鹿醢芹菹兔醢筍菹魚醢脾析豚胉簠簋實以黍稷稻粱鉶以肉羮樂舞親祀太社稷迎神奏廣和之曲奠玉幣奏肅和之曲進俎奏凝和之曲初獻奏壽和之曲武功之舞亞獻奏豫和之曲文徳之舞終獻奏熙和之曲文徳之舞徹豆奏雍和之曲送神奏安和之曲望瘞奏時和之曲盥洗升降俱不用樂祭服親祭服衮冕職掌人員親祀太社太稷設大次皇太子幙次官二人設百官幙次官四人設燎明燭官四人協律郎二人撰祝官祝官一人掃除壇場官二人掌祭官二人掌設省牲位并牽牲割牲官二人掌鼎鑊候視滌溉官一人牽牲十人贊省牲禮官一人設御位東宫位官二人設文武陪祀諸執事版位官一人捧玉幣徹豆兼捧幣饌官八人司罍洗爵洗官二人司尊官二人執爵官四人司香官二人瘞毛血官二人讀祝官一人捧祝官一人贊禮二人通贊禮生二人引文武二班陪祀官四人監禮御史二人導駕官六人導引東宫官四人奏禮官一人進福酒官一人割胙進胙官一人受胙官一人舉飲福案官二人掌瘞坎實土官二人陳設前祭二日有司掃除壇上下開瘞坎灑掃齋次饌室神厨設大次于北門内皇太子幙次于大次之右前祭一日設省牲位于北門之外設樂縣于壇下之北執事拂拭社主設后土氏配位于社壇之東西向設太稷神位于稷壇之南正中設后稷配位于稷壇之西東向正配每位各設十籩于神位之左十豆于神位之右簠簋各二登鉶各三于籩豆之間俎三于簠簋之前香燭案于俎前爵坫沙池于香案之前祝版位于神位之右正位尊四于壇之側社在東稷在西配位各四尊次之玉幣篚位于酒尊之北爵洗位于稷壇之東北御洗位于爵洗位之北御位于兩壇北之正中皇太子位于御位之右稍後文武陪祭官位于御位之後文東武西讀祝官位于神位之右導駕及奏禮官六人位于御位之左右稍前東西相向御史二人位于兩壇下之東西贊禮二人位于壇南承傳二人位于贊禮之北引班四人于陪祭官之左右俱東西相向協律郎二人于樂縣之東西樂生位于縣前舞生位于縣後司尊司洗司爵捧幣各于其所望瘞位于壇之西北齋戒齋戒之日如唐制樂協律郎一人幞頭紅羅公服荔枝帶皂靴手執麾幡樂生六十二人服緋袍展脚幞頭革帶皂靴樂器編鐘編磬琴瑟搏拊敔柷塤箎簫横笛應鼓笙舞舞士一人幞頭紅羅公服荔枝帶皂靴手執節舞生一百二十八人文舞六十四人引舞二人各執羽籥服紅袍展脚幞頭革帶皂靴舞生六十二人服紅袍展脚幞頭革帶皂靴各執羽籥武舞六十四人引舞二人各執干戚服紅袍展脚幞頭革帶皂靴舞生六十二人服紅袍展脚幞頭革帶皂靴各執干戚明史樂志洪武元年太社稷異壇同壝樂章迎神廣和之曲五土之靈百穀之英國依土而寧民以食而生基圖肇建祀禮修明神其來臨肅恭而迎奠幣肅和之曲有國有人社稷為重昭事云初玉帛䖍奉維物匪竒敬實將之以斯為禮冀達明祇奉俎凝和之曲崇壇北向明禋方闡有潔犧牲禮因物顯大房載設中情以展景運既承神貺斯衍初獻壽和之曲太社云髙為山林深為川澤崇丘廣衍亦有原隰惟神所司百靈效職清醴初陳顒然昭格句龍配云平治水土萬世神功民安物遂造化攸同嘉恵無窮報祀宜豐配食尊嚴國家所崇太稷云黍稷稻粱來牟降祥為民之天豐年穰穰其功甚大其恩甚長乃登芳齊以享以將后稷配云皇皇后稷克配于天誕降嘉種樹藝大田生民粒食功垂萬年建壇于京歆兹吉蠲亞獻豫和之曲太社云廣厚無偏其體𢎞兮徳侔坤順萬物生兮錫民地利神化行兮恭祀告䖍國之禎兮句龍配云周覽四方偉烈昭彰九州既平五行有常壇壝以妥牲醴之將是崇是嚴煥然典章太稷云億兆林林所資者穀雨𤾉應時家給人足倉庾坻京神介多福祗薦其儀昭事維肅后稷配云躬勤稼穡有相之道不稂不莠實堅實好農事開國王基永保有年自今常奉蘋藻終獻豫和之曲詞同亞獻徹豆雍和之曲禮展其勤樂奏其節庶品苾芬神明是達有嚴執事俎豆乃徹穆穆雍雍均其欣悦送神安和之曲維壇潔清維主堅貞神之所歸依兹以寧土宇靖安年穀順成祀典昭明永致昇平望瘞時和之曲晨光將發既侑既歆瘞兹牲幣達于幽隂神人和悦實獲我心永久禋祀其始于今明集禮祭太社太稷儀注齋戒皇帝散齋四日致齋三日陪祭官執事官並齋七日致齋第一日陪祭官執事官受誓戒省牲器先祭二日儀鸞司設大次于社稷北門外道西南向設皇太子幙次于大次之旁先祭二日設省牲位于北門外皇帝服皮弁服備法駕出宫詣大次導駕官同太常卿導引皇帝至省牲位南向立執事官各執事廪犧令帥其屬牽牲自東行過御前省訖牽牲詣神厨執事官以豆取毛血太常卿奏請諸神厨導駕官同太常卿導引至神厨太常卿奏請視鼎鑊請視滌溉訖遂烹牲導駕官同太常卿導引皇帝還大次陳設先祭執事官陳設如圖儀正祭享日清晨諸執事官各實尊罍簠簋籩豆登鉶實玉帛于篚置祝版于神位之右車駕至大次太常卿奏請中嚴皇帝服衮冕樂生舞生及諸執事官陪祭官入就位太常卿奏外辦導駕官同太常卿導引皇帝至御位南向立迎神贊禮唱迎神協律郎跪俯伏舉麾奏廣和之曲贊禮唱請行禮太常卿奏有司謹具請行事奏鞠躬拜興拜興平身皇帝鞠躬拜興拜興平身贊禮唱皇太子以下在位官皆再拜傳贊唱鞠躬拜興拜興平身皇太子以下在位官皆鞠躬拜興拜興平身奠玉帛贊禮唱奠玉帛太常卿奏請詣盥洗位導駕官同太常卿導引皇帝至盥洗位太常卿奏搢圭皇帝搢圭司盥洗者奉匜進巾太常卿奏盥手帨手出圭皇帝盥手帨手出圭太常卿奏請詣太社神位前導駕官同太常卿導引至神位前協律郎跪俯伏舉麾奏肅和之曲太常卿奏跪搢圭皇帝跪搢圭司香官奉香跪進于皇帝之右太常卿奏上香上香三上香皇帝上香上香三上香司玉帛者奉玉帛跪進于皇帝之右皇帝受玉帛奠于神位前太常卿奏出圭鞠躬拜興拜興平身皇帝出圭鞠躬拜興拜興平身樂止太常卿奏請詣后土句龍氏神位前導駕官同太常卿導引皇帝至神位前奠帛如前儀訖太常卿奏請詣太稷神位前導駕官同太常卿導引皇帝降自子陛詣太稷壇升自子陛行禮如前儀訖太常卿奏請詣后稷神位前如前儀訖太常卿奏請復位導駕官同太常卿導引皇帝復位進熟贊禮唱進俎協律郎跪俯伏舉麾奏凝和之曲齋郎舉俎至太社壇前進俎官以俎升自子陛太常卿奏請升壇導駕官同太常卿導引皇帝至太社神位前太常卿奏搢圭皇帝搢圭進俎官以俎進皇帝以俎奠于太社神位前太常卿奏出圭皇帝出圭奏請詣后土神位前如前儀訖進俎官降自酉陛導駕官同太常卿導引皇帝降自子陛齋郎舉俎至太稷壇前進俎官以俎升自子陛導駕官同太常卿導引皇帝至太稷神位前太常卿奏搢圭皇帝搢圭進俎官以俎進皇帝以俎奠于太稷神位前太常卿奏出圭皇帝出圭奏請詣后稷神位前如前儀訖進俎官降自酉陛導駕官同太常卿導引皇帝降自子陛復位初獻贊禮唱請行初獻禮太常卿奏行初獻禮請詣爵洗位導駕官同太常卿導引皇帝至爵洗位太常卿奏搢圭皇帝搢圭執爵