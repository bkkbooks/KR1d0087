帝稷壇壇趾髙六尺方廣二丈五尺甃以細甎實以浄土繚以土垣北為櫺星門髙六尺八寸廣五尺八寸神位以木為之各髙一尺八寸廣三寸題曰帝社之神帝稷之神俱朱漆質金書壇之南置石龕以藏神位髙六尺廣二尺壇之西為祭器庫樂器庫壇之北樹二坊以表之曰帝社街每嵗以仲春秋次戊日上躬行祈報禮如次戊在望後則以上已日臨期命文武大臣十二員陪拜一前期四日太常寺奏齋戒一前期一日太常寺奏省牲上親填祝版于文華殿一陳設帝社牛一羊一豕一登一鉶一籩豆各八簠簋各二帛一𤣥色春用告祀秋用禮神帝稷陳設同一正祭是日辰刻上具皮弁服乘版輿至豳風亭東降輿導引官導上至櫺星門内典儀唱樂舞生就位執事者各司其事上至御拜位典儀唱迎神樂作内贊導上陞壇至帝社帝稷香案前各三上香奏復位樂止奏兩拜通贊陪拜官同典儀唱奠帛行初獻禮樂作執事者捧帛爵于各神前奠訖樂暫止奏跪上跪通贊同内贊贊讀祝讀訖樂復作奏俯伏興平身通贊同樂止典儀唱行亞獻禮樂作樂止唱行終獻禮樂作樂止唱徹饌樂作樂止唱送神樂作奏兩拜通贊同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位樂作奏禮畢上至豳風亭易服還宫明史樂志嘉靖十年初立社稷樂章迎神時和之曲東風兮地脈以融首務兮稼穡之工秋祭云金風兮萬寳以充忻成兮稼穡之工祀神于此兮苑中願來格兮慰予衷初獻壽和之曲神兮臨止禮薦清醇菲幣在笥初獻式遵神其鑒兹享斯藻蘋我祀伊何祈報是因神兮錫祉則阜吾民亞獻雍和之曲二觴載舉申此殷勤神悦兮以納祥靄兮氤氲終獻寧和之曲禮終兮酒三行喜茂實兮黍稷粱農事待兮豐康予稽首兮以望徹饌保和之曲祀事告終三獻既周徹之罔遲惠注田疇迓以休貺庇兹有秋送神廣和之曲耕耨伊首秋祭云耕耨告就力事豆籩粢盛賴之于此大田予將以祀神其少延願留嘉祉副我潔䖍肅駕兮雲旋普予兮有年望瘞曲同沈徳符萬歴野獲編嘉靖十年上于西苑隙地立帝社帝稷之壇用仲春仲秋次戊日躬行祈報禮蓋以上戊為祖制社稷祭期故抑為次戊内設豳風亭無逸殿其後添設户部尚書或侍郎專督西苑農務又立恒裕倉收其所穫以備内殿及世廟薦新先蠶等禮蓋又天子之私社稷也其後日事元修即其地營永壽宫雖設官如故而上所創春祈秋報大典悉遣官代行矣世宗本紀十八年三月帝至承天秩于國社國稷禮志隆慶元年禮部言帝社稷之名自古所無嫌于煩數宜罷從之王圻續通考隆慶元年禮部會議社稷之禮國初建太社太稷異壇同壝以句芒后稷配洪武十年改建同壇同壝罷句龍后稷配以仁祖配永樂中北京壇成位置如故洪熙間又奉成祖配嘉靖九年遵復初制以句龍后稷配十年復于西苑隙地墾田樹榖麥帝社帝稷二壇每嵗以仲春秋上戊次日行祈報禮會議社祭土祗稷祭榖神宜舉太社太稷之祭其帝社帝稷宜罷二月戊子上親祭太社太稷是日鳴鐘樂設而不作餘如舊儀三年八月戊申上親祭太社太稷右明社稷城隍附蕙田案祈報之祭達于王公士庶京國郡邑而無乎不徧者在古唯社稷而後世則有城隍且其義其秩頗與社稷類而威靈赫濯奔走巫祝為民物之保障官吏之所倚庇者則更甚于社稷在易泰之上六曰城復于隍禮記天子大蜡八伊耆氏始為蜡水庸居七水隍也庸城也詩大雅曰崇墉言言墉與庸同説者謂即古祭城隍之始夫聖王之制祀也功施于民則祀之能禦災捍患則祀之况有一物則有一物之神近而居室飲食如門井户竈中霤尚皆有祀矧夫髙城深溝為一方之屏翰者哉孟子曰三里之城七里之郭環而攻之而不勝是天時不如地利又曰築斯城也鑿斯池也與民守之效死而民弗去是城隍直與地方民物相依為命誠不殊于社稷矣民為貴社稷次之其祀顧不重歟但社稷所以養人而城隍所以衛人且濬隍為城亦土之功用則社宜足以該之然而古人必别有水墉之祭而後世且盛于社稷者竊意三代時封建法行分茅胙土首重社稷即降而卿大夫莫不有采地下而農夫亦有井田衣租食力專以土榖為重故自天子諸侯而外大夫以下成羣置社祈焉報焉如是而已雖城與隍不過秩諸百神之列而索饗之亦其宜也後世易封建為郡縣而兵戈盜賊戰攻防守之事起遂專以城池為固守土之臣齋肅戰栗而嚴事之平時則水旱疾疫于以祈禳有事則衛民禦敵于焉請禱亦理勢之不得不然者故自兩漢以後廟祀見于乗志者則有吳赤烏之年號而北齊書慕容儼傳載儼守郢城禱城隍神獲祐事唐諸州長史刺史如張説張九齡杜牧軰皆有祭文傳于世逮後唐清泰中遂封以王爵宋建隆後其祀徧天下明初京都郡縣並為壇以祭加封爵府曰公州曰侯縣曰伯洪武三年去封號二十年改建廟宇俱如公廨設座判事如長吏狀迄于今牧守縣令朔望展謁文廟外則唯城隍偶有水旱鞠跽拜叩呼號祈請實唯城隍迎神賽會百姓施捨恐後亦唯城隍銜寃牒訴辨訟曲直疫癘死亡幽㝠譴謫麗法輸罪亦莫不奔走歸命于城隍至廟貌之巍峩章服之鮮華血食品饌之豐繁歲時伏臘隂晴朝莫史巫紛若殆無虚日較之社稷之春祈秋報割祠繫絲用牲伐鼓葢什百矣夫明有禮樂幽有鬼神苟可以庇民利國者揆之聖人神道設教之意列之祀典固所不廢雖古今事殊其誼一也今以義類相近附諸社稷之末云太平府志城隍廟在府治東承流坊始于吳赤烏二年創建歴代增修春明夢餘録城隍之名見于易若廟祀則莫究其始唐李陽冰謂城隍神祀典無之惟吳越有爾宋趙與時辯其非以為成都城隍祠太和中李徳裕建李白作韋鄂州碑有城隍祠又杜牧刺黄州韓愈刺潮州麴信陵刺舒州皆有城隍之祭則不獨吳越然矣而蕪湖城隍祠建于吳赤烏二年則又不獨唐而已記曰天子大蜡八伊耆氏始為蜡注曰伊耆氏堯也葢蜡祭八神水庸居七水則隍也庸則城也此正城隍之祭之始春秋傳鄭災祈于四鄘宋災用馬于四鄘皆其証也庸字不同古通用耳由是觀之城隍之祭葢始于堯矣北齊書慕容儼傳清河王岳帥師江上遣儼鎮郢城始入便為梁大都督侯瑱任約率水陸軍奄至城下儼隨方備禦瑱等不能尅又于上流鸚鵡洲上造荻葓竟數里以塞船路人信阻絶城守孤懸衆情危懼儼道以忠義又悦以安之城中先有神祠一所俗號城隍神公私每有祈禱于是順士卒之心乃相率祈請冀獲㝠祐須臾衝風欻起驚濤涌激漂斷荻葓約復以鐵鏁連緝防禦彌切儼還共祈請風浪夜驚復以斷絶如此者再三城人大喜以為神助蕙田案城隍之神見于正史自此始圖書集成城隍祀典部藝文唐張説祭城隍文維大唐開元五年歲次丁巳四月庚午朔二十日己丑荆州大都督府長史上柱國燕國公張說謹以清酌之奠敢昭告于城隍之神山澤以通氣為靈城隍以積隂為徳致和産物助天育人人之仰恩是闗禮典說恭承朝命綱紀南邦式崇薦禮以展勤敬庶降福四甿式登百榖猛獸不摶毒蠱不噬精誠感通昭鑒非逺尚享蕙田案祭城隍文始于此張九齡祭洪州城隍神祈晴文維開元十五年嵗次丁夘六月壬寅朔十日辛亥中散大夫使持節都督洪州諸軍事洪州刺史上柱國曲江縣開國男張九齡謹以清酌脯醢之奠敬祭于城隍之神恭惟明神懿此潛徳城池是保甿庶是依精靈以康正直攸好九齡忝牧兹郡敢忘在公道雖隔于幽明事或同于表裏今水潦所降亦惟其時而淫雨不止恐害嘉榖榖者人之所以為命人者神之所以有祀祀不可以為利義不可以不福闔境山川能致雲雨豈無節制預達精誠以時弭災無或失稔則理人有助是有望于神明尚享蕙田案此城隍水潦祈晴之祭杜牧祭城隍神祈雨文下土之人天實有之五榖豐實寒暑合節天實生之苗方甲而水湮之苗方秀而旱莠之饑則必死天實殺之天實有人生之孰敢言天之仁殺之孰敢言天之不仁刺史吏也三嵗一交如彼管庫敢有其寳玉如彼傳舍敢治其居室東海孝婦吏寃殺之天實寃之殺吏可也東海之人于婦何辜而三年旱之刺史性愚治或不至厲其身可也絶其命可也凶惡殃罰止當其身胡為降旱毒彼百姓謹書誠懇佈之于神神能格天為我申聞蕙田案此城隍禱水旱之祭李商隱祭桂州城隍神祝文維大中元年嵗次丁夘八月甲午朔二十七日庚申桂州管内都防禦觀察處置等使正議大夫使持節桂州諸軍事桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某謹遣直官攝功曹㕘軍文林郎守陽朔縣令莊敬質謹以㫖酒庶饈之奠祭于城隍之神濬洫崇墉所以固吾圉春祈秋報所以輔農功今白露雷收蟲坏水涸念時𤾉而時雨將乃積而乃倉敢以吉辰式陳常典神其保兹正直歆彼馨香聿念前修勿虧明鑒昔房豹變樂陵之井味任延易九真之風土豈獨人謀抑由冥助今猶古也神實聴之蕙田案此城隍報祀常祭前人為安平公兖州祭城隍文年月日致祭于城隍之神四民攸居是分都邑五兵未息爰假金湯神受命上元守職兹土擁長雲之壘提却月之弓張主威靈彈厭氛祲某方宣朝㫖永總藩條帳中之位既安幕内之籌敢失神其守同石堡䕶等玉關長令崒若岸焉無使復于隍也蕙田案此因守城祭城隍前人為懷州李使君祭城隍文某謬䝉朝奬叨領藩條熊軾初臨虎符適至敢資靈于水土冀同固于金湯况彼潞人實逆天理固承明之地以作巢窠敺庶樂之民以為蟊賊一至于此其能久乎惟神廣扇威靈劃開聲勢俾犯境者望飛鳥而自遁此滔天者聴唳鶴以虚聲崇墉載嚴巨壍無壅今來古徃永無川竭之因萬嵗千秋莫有土崩之事神其聴之無易我言蕙田案此用師祭城隍册府元龜後唐廢帝清泰元年十一月詔杭州城隍神改封順義保寧王湖州城隍神封阜俗安成王越州城隍神封興徳保闉王從兩浙節度使錢元瓘奏也蕙田案此城隍封號之始後漢隱帝乾祐三年八月以䝉州城隍神為靈感王從湖南請也時海賊攻州城州人禱于神城得不陷故有是請宋史禮志太祖建隆元年太祖平澤潞祭城隍征揚州河東並用此禮建隆四年十一月詔以郊祀前一日遣官奏告城隍如儀蕙田案城隍告祭見于正史者始此蘇緘傳緘知邕州蠻入冦城陷亟還州治殺其家三十六人縱火自焚緘没後交人謀冦桂州行數舍其衆見大兵從北來呼曰蘇城隍領兵來報怨懼而引歸邕人為緘立祠蕙田案以人鬼為城隍始見于此續文獻通考宋孝宗隆興元年上建寧府城隍為惠寧侯加號福應元史世祖本紀世祖至元五年正月庚子上都建城隍廟明集禮元封燕京城隍為䕶國王蕙田案城隍建廟封王見于正史始此至治中加封溧水城隍為靈祐廣惠侯元史文宗本紀天歴二年八月加封上都城隍神為䕶國保寧王夫人為䕶國保寧王妃蕙田案城隍封號兼及王妃始此明會典都城隍廟洪武二年封京都城隍祀之蕙田案都城隍廟始此圖書編洪武二年封京師及天下城隍明集禮國初循舊制嘗封城隍京都為承天鑒國司民統神昇福大帝各府為鑒察司民城隍威靈公各州為鑒察司民城隍靈祐侯各縣為鑒察司民城隍顯佑伯大學衍義補太祖皇帝勅封鑒察司民城隍制詞曰帝王受天明命行政教于天下必有生聖之瑞受命之符此天示不言之妙而人見聞所及者也神司淑慝為天降祥亦必受天之命所謂明有禮樂幽有鬼神天理人心其致一也朕君四方雖明知弗類代天理物之道實罄于衷思應天命此神所鑒而簡在帝心者君道之大惟典神天有其舉之承事惟謹某州城隍聰明正直聖不可知固有超于髙城深池之表者世之崇于神者則然神受命于天者蓋不知也兹于臨御之初與天下更始凡城隍之神皆新其命春明夢餘録洪武二年以城隍止合祀于城南諸神享祀之所未有壇壝非隆敬神祗之道命禮官考古制以聞禮官奏城隍之祀莫詳所始先儒謂既有社矣不應復有城隍故唐李陽冰謂城隍祀典無之惟呉越有之然成都城隍祠太和中李徳裕所建張説有祭城隍文杜牧有祭黄州城隍文則不獨呉越為然又蕪湖城隍祠建于呉赤烏二年髙齊慕容儼梁武陵王祀城隍神皆書于史又不獨唐而已宋以來其祀徧天下或賜廟額或頒封爵至或遷就附會各指一人以為神之姓名如鎮江慶元寧國太平華亭蕪湖等郡邑皆以為紀信龍且贛袁瑞吉建昌臨江南康皆以為灌嬰是也張説祭荆州城隍文曰致和産物助天育人張九齡祭洪州城隍文曰方隅是保甿庶是依則歴代崇祀之意有在也今國家開創之初嘗以京都城隍及天下城隍祀于城南享祀之所既非専祀又室而不壇非理所宜今宜以城隍及太嵗風雨等合為一壇春秋祀之詔可蕙田案此城隍之神合祭于風雲雷雨壇三年夏六月始正各城隍等稱號各處府州縣城隍稱某府城隍之神某州城隍之神某縣城隍之神未㡬復降儀注凡府州縣新官到任必先宿齋城隍廟謁神與誓在隂陽表裏以安下民明會典洪武三年正城隍號命從祀于山川壇明集禮合祭山川城隍及遣使分祀每壇各尊三籩八豆八簠二簋二登二蕙田案改祀城隍山川壇從地祗之類也明史禮志洪武六年製中都城隍神主成遣官齎香幣春安春明夢餘録洪武二十年改建城隍廟詔劉三吾曰朕設京師城隍俾統若府州縣之神以監察民之善惡而禍福之俾幽明舉不得僥倖而免其書所由于石丘氏濬曰城隍之名不經見而史亦不書惟唐李陽冰有當塗縣城隍廟記陽冰唐開元以後人則在唐已有矣因其名而求其義伏讀聖訓所謂超于髙城深池之表則是神之司乃城隍之主者夫天地間有一物則有一神山林有山林之神川谷有川谷之神聚一方之民而為髙城深池以衛之必有所以主之者此城隍之神所以神歟國初承前代之舊洪武元年皆加以封爵府曰公州曰侯縣曰伯三年詔革去封號止稱某府某州某縣城隍之神是年六月二十一日又降㫖各處城隍廟屏去閒雜神道越二日又降命各府州縣城隍廟宇俱如其公廨設公座筆硯如其守令造為木主毁其塑像舁置水中取其泥塗壁繪以雲山其在兩廡如之京師既以其神祔享于山川壇又設為廟宇命京尹主其祭府州縣者守令主之新官到任則俾其與神誓案周禮有司民之祭今國初詔封其神為鑒察司民意或有取于此歟制詞有云明有禮樂幽有鬼神蓋置守令以治民生于昭昭之際設城隍以司民命于冥冥之中而加之以鑒察之名而又俾有司到任之初特與神誓蓋又付之鑒視糾察之任使有民社者不敢以非理厲吾民也我聖祖主典神人兼用禮樂鬼神以為治幽明之間各受其職其所以克相上帝寵綏萬方者至矣明會典洪武二十一年春附祭于郊秋祭仍舊後又罷惟每嵗八月祭帝王後一日遣南京太常寺官祭明集禮王國祭城隍儀齋戒前期王散齋二日于别殿王相府官于正寢王致齋一日于正殿王相府官于公廨省牲先祭二日執事設王次于廟壇南門外道之東南向先祭一日典儀典祠導王至次執事者各執事典儀典祠導王至省牲位執事者自東牽牲西行過王前省記執事牽牲詣神厨典儀典祠導王詣神厨視鼎鑊視滌濯訖典儀典祠導王還次陳設先祭一日典祠依圖陳設正祭祭日清晨典祠率執事者各實尊罍籩豆簠簋登鉶置幣篚于案祝版于神位之右大樂入就位諸執事及陪祭官入就位典祠啟王服逺遊冠絳紗𫀆典祠典儀導王至位北向立典祠典儀分左右立于王之前迎神司禮唱迎神大樂作司禮唱請行禮典祠啟有司謹具請行事啟鞠躬平身司禮唱在位官再拜司贊唱鞠躬拜興拜興平身王鞠躬平身在位官鞠躬拜興拜興平身樂止奠幣初獻司禮唱奠弊行初獻禮典祠啟詣盥洗位大樂作典儀典祠導王至盥洗位大樂止典祠啟搢圭王搢圭典祠啟盥手司盥洗者酌水王盥手訖司巾者以巾進典祠啟帨手王帨手訖典祠啟出圭王出圭典祠啟詣爵洗位典祠典儀導王至爵洗位典祠啟搢圭王搢圭執爵官以爵進典祠啟受爵王受爵典祠啟滌爵司爵洗者酌水王滌爵訖典祠啟拭爵司巾者以巾進王拭爵典祠啟以爵授執事者王以爵授執爵官典祠啟出圭王出圭啟詣城隍神位前大樂作典儀典祠導王至神位前北向立樂止典祠啟搢圭王搢圭啟上香上香三上香王三上香訖捧幣者以幣進于王之右王受幣奠于神位前捧爵者以爵進于王之右王受爵典祠啟祭酒祭酒三祭酒奠爵王三祭酒奠爵訖典祠啟出圭王出圭讀祝官取祝讀于神位之右讀訖復以祝置于案典祠啟鞠躬王鞠躬大樂作典祠啟平身王平身典祠啟復位典祠典儀導王復位樂止亞獻司禮唱行亞獻禮典祠啟行亞獻禮典祠典儀導王至神位前掌祭官于神位前爵内斟酒典祠啟鞠躬大樂作王鞠躬啟平身王平身典祠典儀導王復位終獻如亞獻之儀飲福受胙司禮唱飲福受胙執事轝香案置于王位前執事酌福酒舉胙肉典祠啟飲福受胙大樂作典祠典儀導王至香案前位典祠啟鞠躬平身王鞠躬平身典祠啟搢圭王搢圭執事捧爵東向進于王王受爵啟飲福酒王祭酒少許飲福酒以爵置于坫執事官東向進胙于王王受胙以胙授左右左右西向受之典祠啟出圭王出圭典祠啟鞠躬平身大樂作王鞠躬平身典祠啟復位典祠典儀導王復位樂止徹豆司禮唱徹豆掌祭官徹豆司禮唱賜胙典祠啟王飲福受胙者免禮司禮唱陪祭官皆再拜司贊唱鞠躬拜興拜興平身陪祭官皆鞠躬大樂作拜興拜興平身樂止望燎司禮唱望燎讀祝官取祝捧幣者取幣掌祭官取饌詣燎所典祠啟詣望燎位大樂作典祠典儀導至望燎位樂止候燎半司禮唱可燎典祠啟禮畢導引王還次引禮引陪祭官出明史禮志永樂中建廟都城之西曰大威靈祠嘉靖九年罷山川壇從祀嵗以仲秋祭旗纛日并祭都城隍之神凡聖誕節及五月十一日神誕皆遣太常寺堂上官行禮國有大災則告廟在王國者王親祭之在各府州縣者守令主之王圻續通考國初都城隍之神嵗以五月十一日為神之誕辰及萬壽聖節各遣官致祭後倪岳上疏所有前項祭告煩瀆無據遂罷之倪岳請正祀典疏略京都城隍之神謹案易坎卦有曰王公設險以守其國蓋謂人君者觀坎之象知險之不可陵也故設為城郭溝池以守其國以保其民人傳記謂其制自黄帝始歴代建國必有髙地深隍上以保障宗社朝廷下以捍衛百官萬姓其所係甚重其為功不小故國朝之制天下府州縣皆有城隍廟之祭京都城隍廟舊順天府西南累朝皆加修葺嵗以五月十一日為神之誕辰及萬壽聖節各遣官致祭夫廟祀城隍之神本非人鬼安得誕辰可謂謬妄况每嵗南郊大祀壇八月山川壇俱有各祭之禮事體已重此于天下府州縣之祭不同前項祭告煩瀆無據俱各罷免奉㫖是日下舊聞嘉靖九年改定風雲雷雨神牌次序曰雲雨風雷上曰雲雨風雷天神也岳鎮海瀆地祗也城隍人鬼也焉可雜于一壇而祭之議以城隍之神歸之本廟于常祭外添祭一壇觀承案城隍之神不見于經説者乃推本于八蜡之水庸亦似有理其昔㣲今盛則由封建變為郡縣故城隍之保障特重洵篤論也蓋禮與時宜則神隨代立城隍固國庇民之功允宜咸秩無文以補祀典之缺其體制則洪武初年為壇立主與社稷同最得古意然尸法既亡塑像亦近尸之義愚民疑耳而信目文告不如像設之竦觀而懾志也則立廟塑像亦不可厚非者爾至如紀信灌嬰龍且蘇環之事則近乎誕矣然達觀之亦復于理可通古者五行之帝本天神而配之以五人帝佐之以五人臣則人鬼也而天神之矣社本土神稷本榖神而勾龍與柱配焉商人又以棄易柱而為稷則人鬼也而土神之榖神之矣夫生而為英者死而為靈幽明本無二理也如彼紀灌諸人雖不可與聖賢並然亦各表見于時而非碌碌者比則死為城隍亦如古之配食者然何足深怪哉昔栁子厚治栁有績死而見神于羅池韓子因碑而實之亦猶行古之道也若夫誕辰之祝夫人之封則附會太甚固不足辨耳右歴代祭城隍五禮通考卷四十五
