饌各陳于壝門外謁者引司徒出詣饌所司徒奉昊天上帝之俎初皇帝既至位樂止太官令引饌入攝事則于太祝奠毛血其太官引饌入上辛雩祀同俎初入門奏雍和之樂以黄鍾之均自後接神之樂皆奏黄鍾饌各至其陛樂止祝史俱進徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自卯陛青帝之饌升自寅陛赤帝之饌升自己陛黄帝之饌升自未陛白帝之饌升自酉陛黑帝之饌升自子陛大明之饌升自辰陛夜明之饌升自戌陛其内官中官諸饌各隨便而升上辛無大明以下饌攝事同雩祀五人帝饌各由其陛升諸太祝迎引于壇上各設于神座前籩豆蓋冪先徹乃升簠簋既奠却其蓋于下也設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還罇所又進設外官衆星之饌相次而畢上辛無外官以下饌雩祀又進設五官饌並無衆星饌也初壇上設饌訖太常卿引皇帝詣罍洗攝則謁者引太尉詣罍洗上辛雩祀同也樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤盥承水皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取匏爵于篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛訖樂止攝則太尉洗拭匏爵無樂作以下儀謁者引司徒升自東陛立于罇所齋郎奉俎從其後太常卿引皇帝詣上帝罇所執罇者舉冪侍中贊酌汎齊訖壽和之樂作皇帝每酌獻及飲福皆作夀和之樂攝則謁者引太尉升自南陛詣上帝罇所執事者舉冪太尉酌汎齊訖樂作太常卿引皇帝進昊天上帝神座前北向跪奠爵興太常卿引皇帝少退北向立樂止攝儀皆謁者引太尉太祝持版進于神座之右東向跪讀祝文維某年歲次月朔日子嗣天子臣某敢昭告于昊天上帝攝則云天子某謹遣太尉封某臣名敢昭告于昊天上帝上辛雩祀同大明南至長晷初升萬物權輿六氣資始式遵彛典慎修禮物上辛云維神化育羣生財成庶品雲雨作施普博無私爰因啟蟄式遵農事雩祀云爰兹孟夏龍見紀辰方資長育式遵常禮敬以玉帛犧牲粢盛庶品恭致燔祀表其寅肅敬以玉帛犧齊粢盛庶品備兹禋燎祗薦潔誠髙祖神堯皇帝配神作主几攝事祀版應御署訖皇帝北向再拜侍臣奉版郊社令受遂奉出皇帝再拜攝則太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還罇所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執罇者舉冪侍中取爵于坫進皇帝受爵侍中贊酌汎齊訖樂作太常卿引皇帝進髙祖神堯皇帝神座雩祀太宗東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止上辛又謁者五人各引五方上帝太祝皆取爵于坫酌汎齊各進奠于神座訖還罇所雩祀同太祝持版進于神座之左北向跪讀祝文曰維某年歲次月朔日子孝曾孫開元神武皇帝臣某攝則云皇帝臣某謹遣太尉封臣某敢昭告于髙祖神堯皇帝履長伊始肅事郊禋用致燔祀于昊天上帝伏惟慶流長發德冠思文對越昭升永言配命上辛云時惟孟春敬祈嘉穀用致禋祀昊天上帝伏惟髙祖睿哲徇齊欽明昭格祭祀之禮肅奉舊章雩祀云時惟正陽式遵恒典伏惟道叶乾元德施品物永言配命對越昭升謹以致幣犧齊粢盛庶品式陳明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神座興還罇所皇帝再拜訖樂止太常卿引皇帝進昊天上帝神座前北向立樂作太祝各以爵酌上罇福酒合置一爵太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各率齋郎進俎太祝減神前胙肉皆取前脚第二骨也加于俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進攝則言授皇帝受以授左右攝則太尉以授齋郎謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南階還版位西向立樂止文舞退鼓柷作舒和之樂退訖戛敔樂止武舞入鼔柷作舒和之樂立定戛敔樂止自此巳上凡攝皆太尉為初獻其儀依皇帝行事贊佐皆謁者太祝齊郎皇帝將復位謁者引太尉攝則太常卿為亞獻自下並改太尉為太常卿詣罍洗盥手洗拭匏爵訖謁者引太尉自階升壇詣昊天上帝著罇所執罇者舉冪太尉酌醴齊訖武舞作謁者引太尉進昊天上帝神座前北向跪奠爵興謁者引太尉少退北向拜訖謁者引太尉詣配帝犧罇所取爵于坫執罇者舉冪太尉酌醴齊訖謁者引太尉進髙祖神堯皇帝座前雩祀太宗東向跪奠爵興謁者引太尉少退東向再拜上辛五方祝各取爵酌醴齊供尊訖還罇所雩祀同訖謁者引太尉進昊天上帝神座前北向立諸太祝各以爵酌罍福酒合置一爵太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受虚爵復于坫太尉興再拜訖謁者引太尉却復位初太尉獻將畢謁者引光禄卿攝則同以光禄卿為終獻詣罍洗盥手洗拭匏爵升酌盎齊獻正座配座雩祀并獻五方帝也終獻如亞獻之儀上辛五帝祀亦各配獻之訖謁者引光禄卿降復位初太尉將升獻攝則太常卿將升獻謁者七人分引五方帝及大明夜明等獻官詣罍洗盥手洗拭匏爵訖各由其陛升雩祀太尉將升獻贊引引五帝獻官酌醴齊奠太昊氏餘座齊郎助奠五帝將畢五官獻官酌醍齊奠勾芒氏餘座祝史助奠詣第一等俱酌汎齊訖各進跪奠于神座前興各還引降還本位初第一等獻官將升謁者五人次引獻官各詣罍洗訖引各由其陛升壇詣第二等内官酒罇所俱酌醍齊各進跪奠爵于内官座首興餘座皆祝史齋郎助奠相次而畢謁者各引獻官還本位初第二等獻官將升謁者四人次引獻官俱詣罍洗盥手各由其陛升壇詣第三等中官酒罇所俱酌清酒沈齊攝儀盎齊以獻贊引四人次引獻官詣罍洗盥洗訖詣外官酒罇所俱酌清酒攝儀醍齊以獻贊引四人次引獻官詣罍洗盥洗訖詣衆星酒罇所酌昔酒攝儀沈齊以獻其祝史齋郎酌酒助奠皆如内官之儀訖謁者贊引各引獻官還本位上辛雩祀無日月以下獻儀也諸獻俱畢武舞止上下諸祝各進跪徹豆興還罇所徹者籩豆各一少移于故處也奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜元和之樂作太常卿前奏稱請再拜退復位皇帝再拜樂作一成止攝事則奉禮曰衆官再拜衆官在位者皆再拜太常卿前奏請就望燎位攝則謁者進太尉之左曰請就望燎位也太常卿引皇帝樂作皇帝就望燎位南向立樂止攝則謁者引太尉也于羣官將拜上下諸祝各執篚進神座前取玉幣祝版日月巳上齋郎以俎載牲體黍稷飯及爵酒各由其陛降壇南行經柴壇西過壇東行自南陛登柴壇以玉幣祝版饌物置于柴上户内諸祝史又以内官已下之禮幣皆從燎上辛無日月巳下牲幣雩祀有五帝幣奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢攝則謁者前曰禮畢則太尉出太常卿引皇帝還大次樂作皇帝出中壝門上辛雩祀並内壝殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華蓋侍衞如常儀皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官諸方客使以次出贊引引御史太祝已下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出鑾駕還宮上辛雩祀並同皇帝既還大次侍中版奏請解嚴將士不得輒離部位皇帝停大次一刻頃槌一鼓為一嚴轉仗衞于還塗如來儀三刻頃槌二鼔為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服乗馬者服袴褶五刻頃槌三鼓為三嚴通事舍人分引羣官客使等序立于大次之前近南文武侍臣詣大次奉迎乘黄令進金輅于大次門外南向千牛將軍立于輅左侍中版奏外辦太僕卿升執轡皇帝乘輿出次繖扇侍衞警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黄門侍郎贊者夾引千牛將軍夾輅而趍至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕進發退復位鼔傳音鑾駕動鼔吹振作而還文武羣臣導從如來儀諸方客使便還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趍駕入嘉德門太樂令令撞蕤賓之鐘左右鐘皆應鼔柷奏采茨之樂至太極門戛敔樂止入太極門鼔柷奏太和之樂駕至横街北當東上閤迴輅南向侍中進鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乘輿以入繖扇侍衛警蹕如常儀侍臣從至閤戛敔樂止初文武羣官至承天門外通事舍人承㫖勅羣官並還皇帝既入侍中版奏請解嚴扣鉦將士各還其所舊唐書𤣥宗紀天寶元年二月丁亥上加尊號辛夘親享𤣥元皇帝于新廟甲午親享太廟丙申合祭天地于南郊大學衍義補丘氏濬曰有事于郊必先告祖以配天享侑之意蓋行祭告之禮非大享也自唐人有事上帝必先親享𤣥元皇帝于太清宮親享太廟然後郊祀宋人因之乃先郊三日奉謚冊寶于太廟次日享玉清昭應宮景靈宮宿太廟既享赴青城嗚呼郊祀之禮見于經者自虞書類上帝始而尤詳載于周禮禮記此則唐虞三代報本反始之大事也未見之先詣祖廟告祭以配享之故而致齋以致其精明之德然後行事此正禮也與道家者流無涉唐宋之世乃用青詞設素饌親享太清宮玉清昭應宮然後詣郊壇行禮此何謂哉蕙田案唐人謂享太清宮享太廟合祭天地為三大禮宋人因之而郊祀之先必先親享太廟玉清昭應等宮非禮之禮可謂謬矣丘氏議之良是但謂未郊之先詣祖廟告祭斯又何禮耶古禮郊祭自郊祭廟祭自廟祭十日戒七日齋未聞祭天而先祭廟也宿于齋宮未聞宿于廟也祗因明代相沿宋制雖不如唐宋之親享而尚有告廟之文故為是調停之論耳兹因天寶元年之事為宋明作俑故載史文而辨之如此後宋代各條並從刪削因其無與于郊之大典也閱者詳之又案丘氏大學衍義補作于明代未行分祭之時故其論郊祀全主合祭之說不過囘䕶私心非有獨見也不足置辨故並黜之附識于此唐書禮樂志𤣥宗既已定開元禮天寶元年遂合祭天地于南郊其後遂以為故事終唐之世莫能改也冊府元龜天寶元年二月丙戌詔曰凡所祭享必在躬親朕不親祭禮將有闕其皇地祗宜就南郊合祭三月丙申合祭天地于南郊文獻通考天寶元年二月二十日合祭天地于南郊自後有事圜丘皆天地合祭若冊命大事告圜丘有司行事亦如之蕙田案郊祀國之大典𤣥宗甫定開元分祭之禮儀節度數稍稍合于經典乃改元之後不謀于衆輕為更改其侈心肆志之萌于是可見天寶之治所以大異于開元也歟通典天寶五載詔曰皇王之典聿修于百代郊祭之義允屬于三靈聖人既因時以制宜王者亦縁情以革禮且尊莫大于天地禮莫崇乎祖宗嚴配昭升豈宜異數今蒸嘗之獻既著于恒式南北之郊未展于時享自今以後每載四時孟月先擇吉日祭昊天上帝其以皇地祇合祭以次日祭九宮壇皆令宰臣行禮奠祭務崇蠲潔稱朕意焉蕙田案天地大神祇從無時享之禮四孟所祭但當有迎氣祀五方帝耳今乃四時合祭可謂煩數不敬蓋因辨六天者有天安得五之說遂以分祀五帝之禮移之于天又合之以地是矯康成而又失之者也冊府元龜天寶五載十二月辛酉詔曰祈穀上帝春祀先王永惟因心敢忘如在頃以詳諸舊典創以新儀清廟陳牲加特于嘗餼昊天冬祭重增以時享况履兹霜露載感惟深瞻彼郊壇有懐昭事宜以來歲正月朕親謁太廟便于南郊合祭仍令中書門下即與禮官詳定儀注六載正月戊子親祀南郊遂祀皇地祇蕙田案天寶元年改分祭為合祭詔謂祭必躬親意蓋知天地之必當親祭而以分祭為勞殺其數也又改冬夏至而用二月則無寒暑之苦矣五年又定南北郊時享于謁太廟之後從其便也至十年郊後遂專委之攝祭而心有不安以親受祝版為禮怠心滋矣自此以後遂不親郊而十三載之亂作焉舊唐書𤣥宗紀天寶九載十一月制自今告獻太清宮及太廟改為朝獻以告者臨下之義故也十載正月壬辰朝獻太清宮癸巳朝饗太廟甲午有事于南郊合祭天地禮畢大赦天下禮儀志天寶十載五月已前郊祭天地以髙祖神堯皇帝配座故將祭郊廟告神堯皇帝室冊府元龜天寶十載正月制曰自今已後攝祭南郊薦獻太清宮薦享太廟其太尉行事前一日于致齋所具羽儀鹵簿公服引入朕親受祝版乃赴清齋以展誠敬蕙田案舊唐書于天寶十三載書二月癸酉朝獻太清宮甲戌饗太廟新書作壬申癸酉下皆書受尊號大赦而未嘗言郊通考數𤣥宗為五郊而有十三載二月八日未知何據五禮通考卷十
