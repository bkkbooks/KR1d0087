body:
  text: 五禮通考巻十刑部尚書秦蕙田撰吉禮十圜丘祀天唐書張九齡傳𤣥宗即位未郊見九齡建言天百神之君王者所由受命也自古繼統之主必有郊配蓋敬天命報所受也不以德澤未洽年穀未登而闕其禮昔者周公郊祀后稷以配天謂成王幼沖周公居攝猶用其禮明不可廢也漢丞相匡衡曰帝王之事莫重乎郊祀董仲舒亦言不郊而祭山川失祭之序逆於禮故春秋非之臣謂衡仲舒古之知禮皆以郊之祭所宜先也陛下紹休聖緒于今五載而未行大報考之于經義或未通今百穀嘉生鳥獸咸若夷狄内附兵革用弭乃怠于事天恐不可以訓願以迎日之至升紫壇陳采席定天位則聖典無遺矣蕙田案本文明云紹休聖緒于今五載是非五年即四年通考作三年或是五字之誤冊府元龜開元十一年九月癸未制宜以迎日之至允備郊天之禮所司詳擇舊典以聞唐書𤣥宗本紀開元十一年十一月戊寅有事于南郊大赦通典開元十一年十一月親享圜丘中書令張說為禮儀使衞尉少卿韋縚為副說建請以髙祖配祭始罷三祖同配之禮舊唐書音樂志開元十一年𤣥宗祀昊天于圜丘樂章十一首一恐當作四降神用豫和圜鐘宮三成黄鐘角一成太蔟徵一成姑洗羽一成已上六變詞同至矣丕搆蒸哉太平授犧膺籙復禹繼明草木仁化鳬鷖頌聲祀宗陳德無媿斯誠迎神用歆和崇禋已備粢盛聿修潔誠斯展鐘石方遒皇祖光皇帝室酌獻用長發黄鐘宮詞同貞觀長發太祖景皇帝室酌獻用大基太簇宮詞同貞觀大基代祖元皇帝室酌獻用大成姑洗宮詞同貞觀大成髙祖神堯皇帝室酌獻用大明蕤賓宮詞同貞觀大明太祖文武聖皇帝室酌獻用崇德夷則宮詞同貞觀崇德髙宗天皇大帝室酌獻用鈞天黄鐘宮詞同光宅鈞天懿宗孝敬皇帝室酌獻用承和黄鐘宮金相載穆玉裕重暉養德清禁承光紫微乾宮候色震象增威監國方永賓天不歸孝友自衷溫文性與龍樓正啟鶴駕斯舉丹扆流念鴻名式序中興考室永陳彛俎皇帝飲福用延和黄鐘宮巍巍累聖穆穆重光奄有區夏祚啟隆唐百蠻飲澤萬國來王本枝億載鼎祚逾長皇帝行用大和郊壇齊帝禮樂祀天丹青寰宇宮徵山川神祇畢降行止重旋融融穆穆納祉洪延登歌奠玉用肅和止奏潛聆登儀宿轉大玉躬奉參鐘首奠簠簋聿昇犧牲遞薦昭事顒若存存以俔迎俎入用雍和爛雲普洽律風無外千品其凝九賓斯會禋樽晉燭純犧滌汰元覆攸廣鴻休汪濊皇帝酌獻天神用夀和六變爰闋八階載䖍祐我皇祚于萬斯年酌獻配座用夀和於赫聖祖龍飛晉陽底定萬國奄有四方功格上下道冠農黄郊天配享德合無疆飲福酒用夀和崇崇太畤肅肅嚴禋粢盛既潔金石畢陳上帝來享介福爰臻受釐合福寶祚惟新送文舞出迎武舞入用舒和祝史正辭人神慶叶福以德昭孚以誠接六藝云備百禮斯浹祀事孔明祚流萬葉武舞用凱安馨香惟后德明命光天保肅和崇聖靈陳信表黄道玉鏚初蹈厲金匏既靜好禮畢送神用豫和大號成命思文配天神光肹蠁龍駕言旋眇眇閶闔昭昭上𤣥俾昌而大于萬斯年皇帝還大次用太和六成既闋三薦云終神心具醉聖敬愈崇受釐皇邸迴蹕帷宮穰穰之福永永無窮舊唐書𤣥宗本紀開元二十年九月乙巳中書令蕭嵩等奏上開元新禮禮儀志開元二十年蕭嵩為中書令改撰新禮祀天一歲有四冬至祀昊天上帝于圜丘髙祖神堯皇帝配中官加為一百五十九座外官減為一百四座其昊天上帝及配帝二座每座籩豆十二簠簋㽅俎各一上帝則太樽著樽犧樽象樽壺樽各二山罍六配帝則不設太樽及壺樽減山罍之四餘同上帝五方帝座則籩豆各十簠簋㽅俎各一太樽二大明夜明籩豆各八餘同五方帝内官每座籩豆二簋俎各一内官以上設樽于十二階之間内官每道間著樽二中官犧樽二外官著樽二衆星壺樽二正月上辛祈穀祀昊天上帝于圜丘以髙祖配孟夏雩祀昊天上帝于圜丘以太宗配季秋大享于明堂祀昊天上帝以睿宗配案祈穀雩祀明堂見本條下蕙田案唐書禮樂志稱蕭嵩等撰定開元禮雖未能合古而天神之位別矣至二十年蕭嵩等定禮而祖宗之配定矣豈不信哉自漢以後千餘年間為註家所惑郊丘天帝配位乖舛互異至不可究詰即貞觀定禮以後而乾封之祀感帝垂拱之三帝並祀不旋踵而襲謬至開元禮成而大典秩如矣後世雖時有損益然大綱率不外此是古今五禮一大關鍵也通典開元禮纂類凡祀昊天上帝及配座用蒼犢各一五方上帝五人帝各用方色犢一大明青犢一夜明白犢一若冬至祀圜丘加羊九豕九凡肉皆實俎其牲皆升右胖體十一前節三肩臂臑後節二肫胳正脊一脡脊一横脊一長脅一短脅一代脅一皆二骨以並脊從首為正脅旁中為正凡供別祭用太牢者犢一羊一猪一酒二斗脯一段醢四合若供少牢去犢減酒一斗郊廟罇罍五齊三酒並見本儀中凡用籩豆各十二籩實以石鹽乾魚乾棗栗黄榛子人菱人芡人鹿脯白餅黑餅糗餌粉餈豆實以韭葅醓醢菁葅鹿醢芹葅兔醢笋葅魚醢脾析葅豚拍飴食糝食用簠簋各二簠實黍稷飯簋實稻粱飯㽅實大羮鉶實肉羮皇帝冬日至祀圜丘儀正月上辛祈穀孟夏雩祀及攝事並附卜日于太廟南門之外將卜前一日以右校掃除太廟南門之外守宮設太常卿以下次于門外之東皆西向其日平明太卜令卜正占者俱就次各服公服守宮布卜席于闑西閾外西向謁者告事具謁者引太常卿升立于門東西面贊引引太卜令卜正占者門西東面卜正先抱龜奠于席上西首灼龜之具奠于龜北執龜立于席東北面太卜令進受龜詣太常卿前示髙太常卿受視訖太卜令受龜少退俟太常卿曰皇帝來日某祗祀于某尚饗太卜令曰諾遂述命還即席西面坐命龜曰假爾太龜有常興授卜正龜負東扉卜正坐作龜訖興太卜令進受龜示太常卿卿受視反之太卜令退復位東面與衆占之訖不釋龜進告于太常卿占曰某日從授卜正龜謁者進太常卿之左白禮畢謁者引太常卿以下還次卜者徹龜守宮徹席以進若上旬不吉卜中旬中旬不吉卜下旬皆如初禮若卜吉日及非大事皆太卜令蒞卜卜正占者視髙命龜作龜齋戒前祀七日皇帝散齋四日于別殿致齋三日其二日于太極殿一日于行宮前致齋一日尚舍奉御設御幄于太極殿西序及室内俱東向尚舍直長張帷于前楹下致齋之日質明諸衞勒所部屯門列仗晝漏上水一刻侍中板奏請中嚴諸衞之屬各督其隊入陳于殿庭如常儀通事舍人引文武五品以上袴褶陪位如式諸侍衞之官各服其器服諸侍臣並結珮凡齋者則結珮俱詣閤奉迎上水二刻侍中板奏外辦上水三刻皇帝服衮冕上辛服通天冠絳紗袍結珮乗輿出自西房曲直華蓋警蹕侍衞如常儀皇帝即御座東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俛伏興還侍位皇帝降座入室文武侍臣各還本司直衞者如常通事舍人分引陪位者以次出凡應祀之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于祀所其無本司者皆于祀所焉近侍之官應從升者及從祀羣官諸方客使各于本司館清齋一宿無本司各于家正寢諸祀官致齋之日給酒食及明衣布各習禮于齋所攝事無皇帝齋儀上辛雩祠同光祿卿監取明水火太官令取水于隂鑑取火于陽燧火以供爨水以實罇焉前祀二日太尉告髙祖神堯皇帝廟如常告之儀告以配神作主雩祀侑孟夏告太宗文武皇帝廟前祀一日諸衞令其屬未後一刻各以其器服守壝每門二人每隅一人與大樂工人俱清齋一宿焉凡大祀齋官皆前七日集尚書省太尉誓曰某月日祀昊天上帝于圜丘其誓各隨祭享祀事言之各揚其職不供其事國有常刑散齋理事如舊夜宿止于家正寢唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不經穢惡致齋唯祀事得行其餘悉斷凡大祀之官散齋四日中祀三日小祀二日致齋大祀三日中祀二日小祀一日其致齋日三公于都省安置所司鋪設其餘官皇城内有本司者于本司無者于太常社郊太廟齋坊安置皆日未出前到齋所至祠前一日各從齋所晝漏上水三刻向祀所仍令平明清所行之路道次不得見諸凶穢衰絰經過訖任行其哭泣之聲聞于祭所者權斷訖事非應散齋者惟清齋一宿于本司及祀所凡大祀中祀接神齋官祀前一日皆沐浴九品以上皆官給明衣齋郎升壇行事亦權給潔服應齋官所習禮臨時闕者通攝行事致齋之日先不食公糧及無本司者大官准品給食祈告一日清齋者設食亦如之凡散齋有大功已上喪致齋有周己上喪並聽赴即居緦麻巳上喪者不得行宗廟之祭其在齋坊病者聽還死于齋所同房不得行事也陳設前祀三日尚舍直長施大次于外壝東門之内道北南面攝事守官設祀官公卿等次于東壝之外道南北向西上焉尚舍奉御座衞尉設文武侍臣次上辛雩祀守宮設文武侍臣次焉于大次之前文官在左武官在右俱相向上辛雩祀于大次之後俱南向設諸祀官次于東壝之外道南從祀文官九品以上于祀官之東東方南方朝集使于文官之東東方南方蕃客又于其東俱重行每等異位北向西上介公酅公于西壝之外道南武官九品以上于介公酅公之西西方北方朝集使于武官之西西方北方蕃客又于其西俱重行每等異位北向東上其褒聖侯若在朝位于文官三品之下攝事無大次褒聖等儀上辛雩祀同設陳饌幔于内壝東門西門之外道北南向北門之外道東西向壇上及東方南方午陛之東饌陳于東門外西方及南方午陛之西饌陳于西門外北方之饌陳于北門外上辛雩祀但有壝東方之外饌焉前祀二日大樂令設宮懸之樂于壇南内壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼔于北懸之内道之左右植建鼔于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之内外郊社令積柴于燎壇其壇于神壇之景地内壝之外方一丈髙丈二尺開上南出户方六尺前祀一日奉禮設御位于壇之東南西向設望燎位于柴壇之北南向設祀官公卿位于内壝東門之外上辛雩祀則東門内攝事亦然道南分獻之官于公卿之南上辛雩祀無分獻位以下皆然執事者位于其後每等異位俱重行西向北上設御史位于壇下一位于東南西向一位于西南東向設奉禮位于樂懸東北贊者二人在南差退俱西向又設奉禮贊者位于燎壇東北西向皆北上設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向設從祀文官九品以上位于執事之南東方南方朝集使于文官之南東方南方蕃客又于其南俱每等異位重行西向北上介公酅公位于中壝上辛雩祀内壝西門之内道南武官九品以上位于介公酅公之南西方北方朝集使于武官之南西方北方蕃客又于其南俱每等異位重行東向北上其褒聖侯于文官三品之下諸州使人各分方位于朝集使之後攝事無褒聖己上至從祀位又設祀官及從祀羣官等門外位于東西壝門之外如設次之式設牲牓于東壝之外當門西向蒼牲一又青牲一在北少退南上次赤牲一黄牲一白牲一元牲一雩祀五方色牲各二又赤牲一白牲一上辛雩祀無日月牲在南皆少退以北為上又設廩犧令位于牲西南史陪其後俱北面設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近