body:
  text: 五禮通考卷七十三刑部尚書秦蕙田撰吉禮七十三宗廟制度書益稷予欲聞六律五聲周禮春官大司樂凡六樂者文之以五聲大師文之以五聲宫商角徵羽李氏光地曰凡樂之所謂五聲者有調有音調則全樂而名之如曰宫調曰商調者是己音則逐字而命之如曰宫音曰商音者是己此節文之以五聲乃是調中之五聲凡其律雖為主以名調然中間和應之律五聲具備此凡樂之大綱也禮記月令孟春之月其音角注謂樂器之聲也三分羽益一以生角角數六十四屬木者以其清濁中民象也春氣和則角聲調凡聲尊卑取象五行數多者濁數少者清大不過宫細不過羽以疏單出曰聲雜比曰音音則樂曲也以春時調和樂角為主故云角律厯志云五聲之本生于黄鍾律之九寸為宫于管則九寸于弦則九九八十一絲也或損或益以定宫商角徵羽宫三分去一下生徵徵數五十四徵三分益一上生商商數七十二商三分去一下生羽羽數四十八羽三分益一上生角角數六十四是其損益相生之數也孟夏之月其音徵注三分宫去一以生徵徵數五十四屬火者以其㣲清事之象也夏氣和則徵聲調少疏數少為清羽數最少為極清徵數次為㣲清徴于清濁為第四中央土其音宫注聲始于宫宫數八十一屬土者以其最濁君之象也季夏之氣和則宫聲調孟秋之月其音商注三分徵益一以生商商數七十二屬金者以其濁次宫臣之象也秋氣和則商聲調孟冬之月其音羽注三分商去一以生羽羽數四十八屬水者以其最清物之象也吕氏春秋東方其音角南方其音徵西方其音商北方其音羽中央土其音宫史記生鍾分黄鍾長八寸十分一宫大吕長七寸五分三分二太簇長七寸十分二或曰商或曰角夾鍾長六寸七分三分一姑洗長六寸十分四羽仲吕長五寸九分三分二徴蕤賓長五寸六分三分二林鍾長五寸十分四角夷則長五寸三分二商南吕長四寸十分八徵無射長四寸四分三分二應鍾長四寸二分三分二羽以上皆係朱子本李氏光地曰朱子曰凡律數十誤作七者五皆因本字而誤屈其下垂之筆本司馬貞沈括之說其夾蕤夷三律誤字則今以算得之愚案史記律數下又注宫商角徴羽字者八餘四律無之其黄鍾下有宫太簇下有商有角姑洗下有羽林鍾下有角南吕下有徴字晉志以為求其理用罔見通達仲吕下有徴夷則下有商應鍾下有羽字蔡氏亦謂未詳其義疑後人誤増也愚謂此數律所注皆有闗係蓋其四以别四方之聲而其五以備黄鍾一均之聲也月令春月其音角夏月其音徴秋月其音商冬月其音羽今用春秋書首月之義以别四方之聲故于太簇曰角仲吕曰徴夷則曰商應鍾曰羽也若黄鍾一均之聲則黄鍾為宫太簇為商故于太簇之下商角並注班固亦曰寅木也為仁其聲商也為義即此意也後人不知而疑為羨其一故云或曰商或曰角非本注之舊矣姑洗當為角而曰羽林鍾當為徴而曰角南吕當為羽而曰徴此三者蓋字之誤所當與寸分譌錯一例改正者爾生鐘術上九商八羽七角六宫五徴九置一而九三之以為法實如法得長一寸凡得九寸命曰黄鐘之宫故曰音始于宫窮于角數始于一終于十成于三氣始于冬至周而復生李氏光地曰商羽角宫徴者相生之次也上九者言以九為上也必以九為上而以徴居之者欲使宫得五為中數也蓋自五至一為五聲大小之次自九至五為五聲相生之次而宫之為五不異也置一而九三之得一萬九千六百八十三算以為寸法又置十七萬七千一百四十七之實而以寸法約之則得九寸矣此黄鐘之宫上下相生之本葢音之始數之始而亦氣之始也又案人知五聲之清濁應洪範五聲之叙不知五聲之相生亦應月令四時之節葢徴生商者夏而繼以秋也商生羽者秋而繼以冬也羽生角者冬而繼以春也惟宫生徴角生宫于相生之義不合然土于四時實無位故不可以相繼論太史公言上徴而窮于角亦此意也觀承案史記此二條極精而字句有錯誤頗難讀得朱子正之於前而李氏又疏之於後乃豁然開明乃知古書之不可率讀如此樂記和五聲孟子為我作君臣相悅之樂葢徴招角招是也聖人既竭耳力焉繼之以六律正五音管子凡聽徴如負猪豕覺而駭凡聽羽如鳴馬在野凡聽宫如牛鳴窌中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清以鳴下六字疑衍蕙田案管子凡聽羽原本作鳴馬在野朱子鐘律篇曰馬疑當作鳥似不然詩蕭蕭馬鳴細案其聲輕摇上出的是羽聲在野聞之則其音細矣且與猪豕牛羊雉俱屬一物故其聲無變若作鳴鳥在樹鳥聲多矣不皆然也如唐詩歸飛啞啞枝上啼則開口吐聲近于商矣豈可以為羽耶黄氏佐曰窌深空之窖鳴窌之牛其聲厚重離羣之羊其聲敏捷登木之雉其聲堅貞駭負之豕其聲迭起鳴樹之鳥其聲輕摇李氏光地曰牛鳴窌中言其洪大而深厚也離羣羊言其激揚而凄切也雉登木言其清和而逺暢也豬豕覺而駭言其疾速而喧鳴鳥在樹言其嘈雜而細樂記以屬君臣民事物者以此蕙田案此莊子所謂天籟也黄氏李氏即以爾雅樂記釋之甚精施七尺五施三十五尺而至于泉呼音中角四施二十八尺而至于泉呼音中商三施二十一尺而至于泉呼音中宫再施十四尺而至于泉呼音中羽一施七尺而至于泉呼音中徴房氏喬曰施者大尺之名其長七尺三十五尺者謂其地深五施每施七尺故五七三十五而至于泉也呼音中角者謂此地號呼之聲其音中角也黄氏佐曰地載神氣掘地及泉而聲可審矣管子集注曰此言呼以聽土地之音呉氏鼐曰八尺曰仭七尺曰施呼音中角掘地及泉則有聲也非謂人之穴土而呼號也蕙田案此所謂地籟也爾雅宫謂之重商謂之敏角謂之經徴謂之迭羽謂之柳劉氏歆曰宫其聲厚重商其聲敏疾角其聲圓長經貫清濁徴其聲抑揚迭續羽其聲低平掩映自下而髙宗元案劉歆之解爾雅五音就字面附㑹亦似可通然終屬隨文生義耳不知此條致譌之故乃徒拘宫商角徴羽之序而以重敏經迭柳分配之宜其有顛錯也夫重之配宫不待言而敏當配徴經當配商迭當配羽柳當配角方於聲韻諧合耳蓋宫商角徴羽者髙下相次之序重敏經迭柳者先後相生之序爾雅誤以相生者配相次而劉氏不悟乃泥其文以解之也讀律吕正義當悟其非矣宋史音樂志宫聲沈厚粗大而下為君聲合口通音謂之宫其聲雄洪商聲勁凝明達上而下歸于中為臣聲開口吐聲謂之商將將倉倉然角聲長而通徹中平而正為民聲聲出齒間謂之角喔喔確確然徴聲抑揚流利從下而上歸于中為事聲齒合而唇啟謂之徴倚倚嚱嚱然羽聲喓喓而逺徹細小而髙為物聲齒間唇聚謂之羽詡雨酗芋然黄氏佐曰宫聲自脾交于心而通于舌故曰宫謂之重重則舌居中自重調之如何鳥影豫合皆始終㑹于喉分者也商聲自脾交于肝而通于口故曰商謂之敏敏則口開張自敏調之如清心審照閣皆始終㑹于齒際者也角聲自肝交于脾而通于鼻故曰角謂之經經則舌縮却自經調之如溪郡始見一皆始終㑹于舌牙者也徴聲自心交于脾而通於目故曰徴謂之迭迭則舌柱齒自迭調之如都知兩透徹皆始終㑹於齒舌者也羽聲自腎交于髓而通於耳故曰羽謂之栁栁則唇撮聚自栁調之如明知暝奉别皆始終㑹于唇吻者也商出于齒角出于牙徴出于舌羽出于唇其所由發者以漸而著獨宫聲全自喉出以其兼之也始出於喉合口而通粗大沈雄舌則居中自内直上故曰宫再出至舌齒合唇啟回縵舒遲迭振以起自斜降出故曰徴又出至齒口開齶張騰上歸中明達堅剛雖出若留故曰商又出至唇齒開吻聚清㣲逈亮飄振以舉若留而去故曰羽惟出至牙縮舌而躍張齒湧吻通圜實樸平出於前故曰角宫最沈濁羽最輕清商之大次宫徴之細次羽而角居清濁之中葢宫内開而呼商依齒而呼聲皆近而抑然喉在内齒在外故喉聲極濁為宫齒次濁為商也羽振唇而呼徴振舌而呼聲皆逺而揚然唇在外舌在内故唇聲極清為羽舌次清為徴也至角則案牙而呼半開半闔聲横出而内入故為中聲也五聲之生也循五行生數之序皆本天地之氣出於人聲樂和人聲者和此而已羽為天一水唇聲也徴為地二火舌聲也角為天三木牙聲也商為地四金齒聲也宫為天五土喉聲也蕙田案此所謂人籟也禮記樂記宫為君商為臣角為民徴為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其臣壊角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢史記樂書音樂者所以動盪血脈通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智故聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隠而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮漢書律厯志商之為言章也物成孰可章度也師古曰度音大各反角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而緐祉也羽宇也物聚藏宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也協之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物唱和有象故言君臣位事之體也五聲之本生於黄鐘之律九寸為宫或損或益以定商角徴羽九六相生隂陽之應也杜佑通典宫生徴徴生商商生羽羽生角此五聲大小之次也是黄鐘為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也律吕新書蔡氏曰黄鐘之數九九八十一是為五聲之本三分損一以下生徴徴三分益一以上生商商三分損一以下生羽羽三分益一以上生角至角聲之數六十四以三分之不盡一算數不可行也此聲之數所以止於五也或曰此黄鐘一均五聲之數他律不然曰置本律之實以九九因之三分損益以為五聲再以本律之實約之則宫固八十一商亦七十二角亦六十四徴亦五十四羽亦四十八矣又曰宫聲之數八十一商聲之數七十二角聲之數六十四徴聲之數五十四羽聲之數四十八是黄鐘一均之數而十一律於此取法焉通典所謂以下十一辰辰各五聲其為宫為商之法亦如之者是也夫以十二律之宫長短不同而其臣民事物尊卑莫不有序而不相凌犯良以是耳蕙田案此五聲相生之數與絲樂弦度合詳見後右五聲名義管子凡將起五音凡首謂音之總先也先主一而三之四開以合九九注一而三之即四也以是四開合于五音九也又九之為八十一也以是生黄鍾小素之首以成宫注素本宫八十一數生黄鍾之宫為五音之本三分而益之以一為百有八為徴注本八十一益以三分之一二十七通前百有八是為徴數朱子曰百有八半之則為五十四有三分而去其乗適足以是生商注乗亦三分之一也三分百八而去一餘七十二是商之數也有三分而復於其所以是成羽注三分七十二而益其一分二十四合為九十六是羽之數也朱子曰九十六半之則為四十八有三分而去其乗適足以是成角注三分九十六去其一分餘六十四是角之數蕙田案此條舊注多不得其解與下淮南子史記二條皆弦度也詳見後律吕正義又案國語有大不踰宫之說而管子以八十一為宫百有八為徴是徴踰乎宫矣律吕正義以弦度明之定琴律以三弦為宫初弦為倍徴二弦為倍羽則知百有八是倍徴之數而實未嘗踰乎宫也朱子半之為五十四則徴之本數也淮南子黄鍾之數八十一下生林鍾之五十四林鍾上生太簇之七十二太簇下生南吕之四十八南吕上生姑洗之六十四姑洗下生應鍾之四十二應鍾上生蕤賓之五十七蕤賓上生大吕之七十六大吕下生夷則之五十一夷則上生夾鍾之六十八夾鍾下生無射之四十五無射上生仲吕之六十極不生宫生徴徴生商商生羽羽生角角為姑洗姑洗生應鍾比於正音故為和應鍾生蕤賓不比正音故為繆蕙田案此條亦弦度也蔡氏新書採入律吕條内疑為錯亂無倫今從律吕正義改正史記律書九九八十一以為宫三分去一五十四以為徴三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角蕙田案此與管子淮南子二條俱屬弦度從来論樂者所未見及今從正義考定作弦度舊注均不列也律吕正義定絲樂絃音清濁二均之度分篇絲之為樂其器雖十餘種而弦音所應不外乎十二律吕所生五聲二變之音夫十二律吕之管既分音於長短而不在圍徑則弦音似亦宜分於長短而不在巨細矣不知弦之長短同者分音於巨細如琴有七絃是也絃之巨細同者分音於長短如瑟設柱以别其長短者是也而絲樂之中用絃之多寡又各不同故必案各器之體製而定其取分之大小焉如瑟二十五絃體為九倍黄鍾之數而絃為六倍黄鍾之數琴七絃體為四倍半黄鍾之數而絃為四倍黄鍾之數又如琵琶三絃月琴之類其體雖無一定之制而絃之取分或以商或以徴以羽亦與雅樂相為表裏總之以各絃全分之音與各絃内所分之音互相應合為凖是以不外乎十二律吕所生之七音也管子淮南子司馬氏律書此三者絲樂絃音之大本也又考之白虎通曰八音法易八卦絃離音也盛德在火其音徴蓋謂絲之屬於卦為離其德象火故其音尚徴也夫審絃音無論某絃之全分定為首音因而半之平分為二其聲既與首音相合而為第八音矣次以首音之全分因而四之去其一分而用其三分其聲應於全分首音之第四音此度乃全分首音與半分八音之間又平分為二分之度是即管子所謂凡將起五音凡首先主一而三之四開以合九九者也先主一而三之者以全分首音一分之度為主而以三因之其數大於全分度為三倍也四開以合九九者以三倍全分之數四分之而取其一以合九九八十一之度為宫聲之分也開即分也小素云者素白練乃熟絲即小絃之謂言此度之聲立為宫位其小於此絃之他絃皆以是為主故曰以是生黄鍾小素之首以成宫也以八十一三分益一為百有八為徴乃此絃首音全分之度也此宫絃上生下徴之數於是以百有八三分去一為七十二是為商商之七十二三分益一為九十六是為羽羽之九十六三分去一為六十四是為角案司馬氏律書徴羽之數小於宫而管子徴羽之數大於宫者用徴羽之倍數所謂下徴下羽者也其首絃起於下徴即白虎通絃音尚徴之義然而猶有不得不起于下徴之故焉以下徴之百有八取其四分之三為八十一所謂去其乗而適足也若以宫之八十一取其四分之三則為六十分小餘七五比宫之變徴五十六則大比宫之角六十四則小此所以絃音之度必起于下徴而理始明也今列清濁二均之絃各九皆始下徴而終正羽絃音之用不過于五今列為九者取二徴二羽共二變以列位濁音之首絃為下徴一百零八分二絃為下羽九十六分三絃為變宫八十五分小餘三三四絃為正宫八十一分五絃為正商七十二分六絃為正角六十四分七絃為變徴五十六分小餘八八八絃為正徴五十四分九絃為正羽四十八分清音之首絃為清下徴一百零一分小餘一三二絃為清下羽八十九分小餘八九三絃為清變宫七十九分小餘九一四絃為清宫七十五分小餘八五五絃為清商六十七分小餘四二六絃為清角五十九分小餘九三七絃為清變徴五十三分小餘二七八絃為清徴五十分小餘五六九絃為清羽四十四分小餘九四即二均而合言之其宫至商商至角角至變徴徴至羽羽至變宫皆得全分其變徴至徴變宫至宫則得半分如清音之宫即界于濁音宫商之間故濁宫至濁商為全分而濁宫至清宫清宫至濁商各得半分若夫濁音之商則界于清音宫商之間而清宫至清商為全分清宫至濁商濁商至清商復得半分至於角變徴徴羽諸聲莫不各有全半之分故絃音清濁二均互為全半以生聲焉夫管子起音篇司馬氏律書皆五聲之正淮南子始載二變之數但不當以十二律吕名之其猶可取者二變之度分與二變之比於正音一為和一為繆之說也所謂應鍾即絃音之變宫度也所謂蕤賓即絃音之變徴度也絃音變宫之在下徴第一絃為第三音居第三位變徴之在下徴第一絃為第七音居第七位故此徴絃之變宫第三位即如宫絃之角聲第三位音雖不同而分則恰值正聲之度故曰姑洗生應鍾比于正音為和也至于徴絃之變徴第七位即如宫絃之變宫第七位音亦不同而分則皆為變聲之度故曰應鍾生蕤賓不比正音為繆也和者非聲音之和乃與正聲之位分為和繆者非聲音之繆其分不得比于正聲之位故為繆也辨絲樂之本原參衆説之同異備載五聲二變之清濁以定絃音各分之等差案宫商而列表使分類以相從後之覽者亦將有所折衷焉耳蕙田謹案管子淮南子五聲相生之數舊説均未明確者因未嘗播之管絃而細審其所以然也正義考定發千古之未發矣其絲樂五聲二變之清濁宫商表詳見本書上編又明絲樂絃音不可以十二律吕之度取分篇律吕管音絲樂絃音所生五聲二變之度分不同如以絃音之分合之律吕之度則不可也夫以絃音合律吕而立論者始自淮南子而淮南子本之管子管子之生五音數乃以絃音叶之律吕之五聲而定為度分者也淮南子之十二律吕數直取管子絃音宫聲之分三分損益以為十二律吕管音之度也司馬氏律書又合管子淮南子而並述之者也其律數曰九九八十一以為宫生鍾分曰子一分何一黄鍾而為九寸又為子一分復為宫聲八十一分耶葢宫聲一音其于律管則為九寸其生十二律吕則為一分其于絃度則為八十一分夫絃度宫聲定為八十一分者使五音相生得數無奇零也古人定五聲二變之七音律吕管音絲樂絃音原各有其分也夫陽律之五聲二變陰吕之五聲二變自成一均乃十二律吕合一半律一半吕而為一十有四至于絲樂絃音不過用五正聲琴瑟皆用五聲不用二變其各絃應聲取分雖有七音之位而和衆絃以調音者亦止用五聲之正而當二變者不與焉如以清濁二均各絃之首音與八音間所容度分析言之其應陽律之七濁聲得五全分為正聲二半分為變聲其應陰吕之七清聲亦得五全分為正聲二半分為變聲然則七清聲七濁聲合之為一十有四而非十二也明矣若夫淮南子則取絃度宫聲八十一為黄鍾之度轉生十一律借濁宫之徴為清宫之變徴復借濁宫之半為清宫之變宫省二分以當一十有二似與十二律吕之數相符其術黄鍾之度為宫則太簇之度為商姑洗之度為角蕤賓之度為變徴林鍾之度為徴南吕之度為羽應鍾之度為變宫大吕之度為宫則夾鍾之度為商仲吕之度為角林鍾之度為變徴夷則之度為徴無射之度為羽半黄鍾之度為變宫嘗以律吕被之絃音細較之其每律每吕所定絃各成一聲之分如黄鍾之律所定得羽絃之分大吕之吕所定得清羽之分姑洗之律所定得宫絃之分仲吕之吕所定得清宫之分今依淮南子所取十二分則濁宫之分必定以姑洗之律清宫之分必定以仲吕之吕案分取聲始合是故宫聲全絃首音八十一分定以姑洗之律其四音變徴分實應于五十六分之度五音正徴應于五十四分之度七音變宫應于四十二分之度此宫聲八十一分之比變徴五十六分與徴聲之五十四分變宫之四十二分即黄鍾九寸之比蕤賓六寸三分二釐與林鍾之六寸應鍾之四寸七分四釐也若夫清宫全絃首音七十六分清宫全絃之度實七十五分小餘八五進其竒零為七十六分定以仲吕之吕則其四音清變徴之聲乃應于五十三分之度而不足五十四分五音清徴之聲固應于五十分之度而七音清變宫之聲復應三十九分之度而不足四十分零半分此清宫七十六分之比清變徴五十三分與清徴之五十分變宫之三十九分即大吕八寸四分二釐之比變林鍾五寸九分一釐與夷則之五寸六分一釐變黄鍾之半四寸四分三釐也變黄鍾變林鍾者仲吕所生為變黄鍾而變黄鍾所生復為變林鍾也此變律之説律吕新書六十調圖亦嘗有之但變律于管音實無所用而絃音之數乃或倚之是以絃音濁宫全度八十一分所生五聲二變各具七分而清宫全度七十六分所生五聲二變亦各具七分此清宫七分之中二變之位自有其分不復資之濁宫之徴數與半宫數也又案朱子琴律曰古之為樂者通用三分損益隔八相生之法若以黄鍾為宫則姑洗之為角有不可以毫髮差者而今世琴家獨以仲吕為黄鍾之角故于衆樂常必髙其一律然後和惟第三絃本是角聲乃得守其舊而不變昔人亦有為之説者皆無足取近世惟長樂王氏之書所言禮樂最為近古然其説琴亦但以第三絃為律中仲吕而不言其所以然予于是益以為疑夫朱子之琴律葢以一絃定為宫聲之分故第三音為角聲分者不應姑洗之位而應仲吕之度無怪乎與律吕新書之説究不能合而有此疑也其所謂黄鍾為宫姑洗為角其聲不應姑洗而應仲吕者即如命一絃全度為黄鍾之九寸而第三音不應于姑洗之七寸一分一釐而應于仲吕之六寸六分五釐也琴之第一絃實非宫分乃管子所謂下徴也若以第一絃全度首音定為下徴一百零八分徴聲五十四之倍除變宫不計外其第三音宫聲自為八十一分即如黄鍾之九寸比仲吕之六寸六分五釐又即倍林鍾之一十二寸比黄鍾之九寸也姑就黄鍾之度為第一絃之分者第三音不計變聲必得仲吕之度是為徴絃而非宫絃也若以黄鍾之度為第三絃之分則第三音必得姑洗之度是正所謂宫絃而非角絃也要之十二律吕其體管其音竹其數三分損益終于十二其聲陽律隂吕自成一均其度全半不相應絲樂絃音其體絃其音絲其數三分損益而極于十四正律十二合變律二故謂十四也其聲濁宫清宫亦各成一均其分全半得相應今以律吕隂陽各均之五聲二變合之絃度清濁各分之七音明之陽律宫聲黄鍾之九寸也絃度宫聲八十一分也陽律商聲太簇之八寸也絃度商聲七十二分也陽律角聲姑洗之七寸一分一釐餘也絃度角聲六十四分也陽律變徴蕤賓之六寸三分二釐餘也絃度變徴五十六分餘也陽律徴聲夷則之五寸六分一釐餘也絃度徴聲五十四分也陽律羽聲無射之四寸九分九釐餘也絃度羽聲四十八分也陽律變宫半黄鍾之四寸五分也絃度變宫四十二分餘也此陽律之五聲二變與絃度濁音之七分也至於隂吕清宫大吕八寸四分二釐餘而絃度清宫為七十五分餘矣隂吕清商夾鍾七寸四分九釐餘而絃度清商為六十七分餘矣隂吕清角仲吕六寸六分五釐餘而絃度清角為五十九分餘矣隂吕清變徴林鍾六寸而絃度清變徴為五十三分餘矣隂吕清徴南吕五寸三分三釐餘而絃度清徴為五十分餘矣隂吕清羽應鍾四寸七分四釐餘而絃度清羽為四十四分餘矣隂吕清變宫半大吕四寸二分一釐餘而絃度清變宫為三十九分餘矣此隂吕之五聲二變與絃度清音之七分也是知管與絃有可同者有不可同者其可同者五聲二變之七音其不可同者生聲取分之各異如以一絃之度强合之以十二律吕之分何若止以七聲之度明之以律吕之各成一均强同之絲樂絃音度分何若止以七聲之叶考之故曰絃音止可名以五聲二變不可以十二律吕之度取分也蕙田謹案此篇發明管音合十二律吕自成一均絲樂分清宫濁宫亦各成一均絃音止可名以五聲二調不可以十二律吕之度取分由是則絲樂之度分音聲既無疑義而管音之十二律吕亦無岐説矣右五聲絃度春秋昭公二十年左氏傳晏子曰七音音義七音宫商角徴羽變宫變徴也變疏聲之清濁數不過五而得有七音者終五以外更為之也賈逵注周語云周有七音謂七律謂七器音也黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賓為變徴是五聲以外更加變宫變徴為七音也國語景王將鑄無射問律于伶州鳩王曰七律者何對曰昔武王伐殷嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿我姬氏出于天黿嵗之所在則我有周之分野也月之所在辰馬農祥也我太祖后稷之所經緯也王欲合是五位三所而用之自鶉及駟七列也南北之揆七同也故以七同其數而以律和其聲于是乎有七律王以二月癸亥夜陳未畢而雨以夷則之上宫畢之當辰之在戍上故長夷則之上宫名之曰羽所以藩屏民則也王以黄鍾之下宫布戎于牧之野故謂之厲所以厲六師也以太簇之下宫布令于商以顯文德底紂之多辠故謂之宣所以宣三王之德也反及嬴内以無射之上宫布憲施舍于百姓故謂之嬴亂所以優柔容民也左傳七音疏是言周樂有七音之意也五位者嵗月日星辰之位也三所者星與日辰之位是一所也嵗之所在是二所也月之所在是三所也武王以殷之十二月二十八日戊午發師其年嵗星在鶉火之次也其日月合宿于房五度房即天駟之星也日在箕七度箕于次分在析木之津也日月之㑹謂之辰斗柄斗前也戊午後三日得周二月辛酉朔日月合朔于箕十度在斗前一度是為辰在斗柄也星在天黿者星于五星為水星辰星是也天黿即𤣥枵次之别名也于是辰星在婺女之宿其分在天黿之宿次也鶉是張星也駟是房星也天宿以右旋為次張翼軫角亢氐房凡七宿是自鶉火至駟為七列宿有七也鶉火在午天黿在子斗柄所建月移一次是自午至子為南北之揆七同也揆度也度量星之有七同也武王既見天時如此因此以敷比合之其數有七也以聲昭明之聲亦宜有七也故以七同其數五聲之外加以變宫變徴也此二變者舊樂無之聲或不㑹而以律和其聲調和其聲使與五音諧㑹謂之七音由此也武王始加二變周樂有七音耳以前未有七杜言武王伐紂自午及子凡七日者尚書泰誓云戊午王次于河朔又牧誓云時甲子昧爽王朝至于商郊牧野乃誓又武成云戊午師逾孟津癸亥陳于商郊甲子受率其旅若林前徒倒戈攻于後以北血流漂杵一戎衣天下大定是自戊午至甲子七日也劉炫云杜既取國語之文以七同其數以律和其聲何為又云自午及子凡七日乎是杜意以武王為七日之故而作樂用七音也違國語之文是杜説繆今知不然者以尚書國語俱有七義事得兩通故杜兼而取之劉以為杜背國語之文而規杜過非也李氏光地曰辰謂日月交㑹處也斗柄星紀之次之斗宿也天黿𤣥枵之次也星注以為辰星者周以木王受之于水故占辰星也大辰之次為天駟房星晨正而農時起故曰農祥也五位者日月嵗星辰也三所者天黿天駟鶉火也案王問七律之義而鳩以天象對其末舉夷則之四律又絶與問意不相應故此條之説莫能通曉今亦不能强為之解姑以理之可通者言之据諸家謂古惟五聲至周始加二變而七此王所以疑而問也又据史記林鍾本位在丑南吕本位在夘應鍾本位在已以居其衝故在未酉亥之位也然則黄鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓此七聲者乃自子至午之律陽氣自始生至于極之數也律紀陽氣而黄鍾一均尤為聲氣之元故其七聲之用獨與陽氣終始理既如此又伐殷之月日月星辰之躔自天黿子位至于鶉火午位是此七舍者諸曜所經復適直周家受命之符故武王欲以七律應之其言自鶉至駟七列者葢謂若止于五聲則用不及鶉而止于駟故言自鶉至駟尚有七列必兼而用之然後子午南北之揆與律同七聲合也後言四律不與七律之義應者案司馬遷云武王伐紂吹律聽聲殺氣相并而音尚宫今此所用皆宫聲與史記合矣而云以黄鍾之宫布戎則黄鍾之聲和平深厚於殺氣為不類且云辰在戍上而用夷則之宫則夷則是申非戍義亦不應故疑夷則之上宫黄鍾之下宫皆無射也葢以六陽律言之則無射在夷則之後黄鍾之前前者為下後者為上必兩名之者互發以見義也無射為窮秋之律戰乾之位故云殺氣相并又當夜陣之時日正加戍故用其律以應之及甲子昧爽㑹于牧野則夘與戍合故亦遂用無射以布戎也案周官奏無射歌夾鍾舞大武以享先祖則大武之樂葢用無射至下宗廟大祭則廢商聲而避無射之律葢武者一時之功而樂者崇德之事聖人尚德不尚功故其取舍如此及其布令施舍所謂太簇之下宫無射之上宫則皆黄鍾也克殷之後偃武修文故去殺伐之聲而用中和之樂然黄鍾一調即是自子至午七律鳩之言此葢亦隠合七律之義而又以諷鑄無射之非也凡聲髙急則功近而德微和緩則德厚而功逺若如舊説則布戎之時既以黄鍾施德之日反用無射揆以聲音之理既為難通且是贊王之鑄無射也益難通之甚矣案十二鍾獨鑄無射之指不可測知意者王以周家用大武之樂興而其律用無射故欲尊此以立威武傳言萇𢎞欲强周室之衰即此時也然其意既不明言故州鳩亦不顯對但述武王受命之始天象如此人事如此明應天運且由修德言外之意亦可推見又案七律之變如此章之説其義亦精葢自子至辰五位而陽氣畢者正也然已為純陽而午為正陽故亦必兼而用之者數之溢也舜作五絃之琴以歌南風則是時五聲而已漢志雖有七始之文亦未足據武王周公監于前代制作彌精故説者謂七律起於周家參以此篇問答之語理或然也蕙田案李氏解極精漢書律厯志書曰予欲聞六律五聲八音七始詠以出納五言汝聽李氏光地曰葢七始者宫徴商羽角變宫變徴也七音之清濁皆始于人聲故曰七始也詠即舜典所謂歌詠言者而五言即所謂詩言志之言也以其言不離乎五音故曰五言雖有七始究亦五音也葢上所謂五聲者以調言也通調而名之以宫名之以商是也下所謂七始者以音言也逐字而名之以宫名之以商是也變宫變徵不為調故聲止于五若歌奏而有清濁髙下之音則七者備焉故始究於七七始之音歌詠言者用之而八音取法焉其音有清濁髙下則有開發收閉故曰詠以出納五言也葢舜典先言志詠言而後及于五聲六律八音者以人聲為主然後被以五聲節以六律而成以八音循本以及末也此先六律五聲八音而後七始詠以出納五言者以律吕為主然後五聲應之八音和之雖人聲亦必受其均節焉制法以存神也舜典言五聲可包七始然彼以調為重故只舉五聲此以音為重則非七而音有缺矣葢二變之不為調與調之外又有音皆賴此文而可見也禮樂志七始華始肅倡和聲史記髙漸離擊筑荆軻和而歌為變徴之聲後漢志伏羲作易紀陽氣之初以為律法建日冬至之聲以黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賓為變徴此聲氣之元五音之正也隋書一十三曲變徴調蕤賓也一十三曲變宫調應鍾也唐書十二變徴調居角音之後正徴之前十二變宫調在羽音之後清宫之前呉氏鼐曰五音分配十二律商羽角各二律宫徴各三律七音以宫徴終十二律亦以宫徴終且即以七音言始于宫徴終于宫徴亦以見首尾循環之妙通典注應鍾為變宫蕤賓為變徴自殷以前但有五音自周以来加文武二聲謂之七聲正聲為正二聲為變變者和也經傳通解朱子鍾律篇二變相生之法變宫變徴四十二餘九分分之六五十六餘九分分之八羽後宫前角後徴前上生變徴朱子曰五聲相生至于角位則其數六十有四隔八下生當得宫前一位以為變宫然其數三分損一每分各得二十有一尚餘一分不可損益故五聲之正至此而窮若欲生之則須更以所餘一分析而為九損其三分之一分乃得四十二分餘九分分之六而後得成變宫之數又自變宫隔八上生當得徴前一位其數五十有六餘九分分之八以為變徴正合相生之法自此又當下生則又餘二分不可損益而其數又窮故立均之法至于是而終焉然而二變但為和繆已不得為正聲矣律吕新書蔡氏曰五聲宫與商商與角徴與羽相去各一律至角與徴羽與宫相去乃二律相去一律則音節和相去二律則音節逺故角徴之間近徴收一聲比徴少下故謂之變徴羽宫之間近宫收一聲少髙於宫故謂之變宫也角聲之實六十有四以三分之不盡一算既不可行當有以通之聲之變者二故置一而兩三之得九以九因角聲之實六十有四得五百七十六三分損益再生變宫變徴二聲以九歸之以從五聲之數存其餘數以為强弱至變徴之數五百一十二以三分之又不盡二算其數又不行此變聲所以止於二也變宫變徴宫不成宫徴不成徴古人謂之和繆又曰所以濟五聲之不及也變聲非正故不為調也考律緒言吴氏鼎曰通典曰五音相生而獨宫徴有變聲何也宫為君商為臣角為民徴為事羽為物臣有常職民有常業物有常形商羽角三聲此其無所變者也君就萬務不可執於一方事通萬務不可滯於一隅故宫徴二聲必有變也北齊鄭譯曰漢書律厯志云天地人及四時謂之七始黄鍾為天始林鍾為地始太簇為人始是謂三始姑洗為春蕤賓為夏南吕為秋應鍾為冬四時之始是以為七今若不以二變為調曲則是缺冬夏之聲四時不備是以每宫須立七調明黄佐樂典曰十二管皆有三調流轉用事律必娶妻故徴代為宫而變宫為角吕必生子故商代為宫而變徴為角合而奏之内之為夫婦母子之道也黄鍾既以宫倡太簇復以宫和分而序之外之為君臣之道也案諸家之論二變詳矣取義于君臣民事物者通典之説也取義於天地人及四時者鄭譯之説也取義於五聲之相去一律相去二律者蔡氏之説也取義於天地人三統者黄佐之説也各說不同要皆從既有二變之後旁引曲證以明二變之不可去若從未有二變之先順損益相生之序以觀聲之何以有變而變之何以止於二則諸家尚未有的解也嘗試言之審音必先分度度者何正宫之度倍宫之度半宫之度是已假如以九寸為正宫之度則由九寸以上至一十八寸皆倍宫之度由四寸半以下為半宫之度度既分矣然後凖度以生聲今且以正宫之度言之宫下生徴徴何不下生商而有不可者下生之商已入半宫之度也入半宫之度則商為半聲而非正聲矣徴上生商商何不上生羽而有不可者上生之羽已入倍宫之度也入倍宫之度則羽為倍聲而非正聲矣循此推之三分損一以上生三分益一以下生一上一下相間成聲無非欲合正宫之度唯其然故變宫縁之以起唯其然故變徴縁之以終其縁之以起者則以一下一上而角聲所生尚有其位位在正宫之度也如使不在正宫之度則先無變宫安有變徴其縁之終者則以一下一上而變徴所生已無其位位入半宫之度也如使不入半宫之度則既有變徴何妨又有變角此以知母下生者子上生母上生者子下生一下一上之交不容忽焉中斷故有可生者仍聽其生此徴商羽角之外所以有變宫變徴也一下一上之交又不容忽焉易轍故或重下生或重上生者俱不凖其生此變宫變徴之外所以無變商變羽變角也若其所以名之為變宫變徴者葢以角所生聲比於宫故名變宫變宫所生者聲比於徴故名變徴比則不能獨立故音不過乎五變則不可亂真故音不止於五也李氏光地曰律有變律聲有變聲何也曰變猶閏也十二月有十二閏日故十二律有十二變律也五嵗有二閏月故五聲有二變聲也聲陽也主氣律隂也主月律備而聲餘如月備而氣餘聲備而律餘如氣備而月餘也五嵗之中有再閏則時定而嵗成矣五聲之中有二變則聲和而氣應矣葢次三次五之嵗節氣之相距必隔越一月而病于不相及次三次五之聲則律管之相逺亦必隔越一月而病于不相及也故有閏月則氣朔均齊有變聲則音律調停宋房庶所謂閏宫閏羽亦此意也變律者設以待用而已如閏月之積以待用也辨樂書無二變之説陳暘樂書曰五聲者樂之指拇也二變者五聲之駢枝也駢拇枝指出於形而侈于形存之無益也去之可也二變出乎五聲而滛于五聲存之亦無益也削之可也葢五聲之于樂猶五星之在天五行之在地五常之在人也五聲可益為七音然則五星五行五常亦可益而七乎其説必不行矣吴氏鼎曰音有萬而統之為五者政猶五星五行五常之理不可減不可増故二變兩聲仍名之為宫徴所謂變化而不離乎五音者也若不究其理之所由然但以數相較則七較之五而多其二者將十二較之五而亦多其七是音不得有其七而律亦不得有其十二矣豈理也哉朱載堉既知二變之不可去而陳氏之説為非乃又欲諱變字之名而另以和字代變宫中字代變徴葛中選謂韋昭諸儒妄立二變之名所見已非乃又於宫商角徴羽之外别添一華音暗以華音當變宫而棄去變徴以遷就六律之説夫曰中曰和曰華乃陳氏所謂駢枝者彼豈知夫變宫變徴之義哉律吕正義審定十二律吕五聲二變篇言樂者皆知三分損益隔八相生然此二者義各有在不可一㮣而論三分損益乃制律之則也古聖人立為算術以别十二律吕相生之度凡金石之厚薄絲竹之短長皆依以定焉隔八相生乃審音之法也審音之法必取首音與第八音叶和同聲以為之準即首音八音之間區而别之以為五聲二變則清濁之相應髙下之相宣皆賴以生焉但五聲二變有施於管律者有施於絃度者其生聲取分各有不同自漢唐以後皆宗司馬氏淮南子之説以三分損益之術誤為管音五聲二變之次復執管子絃音五聲度分而牽合於十二律吕之中故管律絃度俱不可得而明如旋宫圖黄鍾為宫太簇為商姑洗為角蕤賓為變徴林鍾為徴南吕為羽應鍾為變宫至半黄鍾復為清宫大吕為宫夾鍾為商仲吕為角林鍾為變徴夷則為徴無射為羽黄鍾為變宫而半大吕復為清宫夫正律為宫至半律而仍為宫正律為商至半律而仍為商則宫商一定而旋宫之義已失且陽律而雜以隂吕隂吕而雜以陽律陰陽相雜而取聲之原亦未為得是葢各守所傳固執一理而未始備制律吕之管以審音也間嘗截竹為管詳審其音黄鍾之半律不與黄鍾合而合黄鍾者為太簇之半律則倍半相應之說在絃音而非管音也明矣又黄鍾為宫其徴聲不應於林鍾而應於夷則則三分損益宫下生徴之說在絃度而非管律也明矣是知古聖人審定律吕陰陽各六陽則為律隂則為吕意固有在也孟子曰不以六律不能正五音鄭康成大司樂注六律合陽聲六吕合隂聲國語以六吕為六間非陰陽分用之証耶吕氏春秋以三寸九分之管為聲中黄鍾之宫非半太簇合黄鍾之義耶是以即陰陽之各分者言之則陽律從陽陰吕從陰各成一均而不相紊故今所定黄鍾為首音宫聲次太簇為二音以商聲應姑洗為三音以角聲應蕤賓為四音以變徴聲應夷則為五音以徴聲應無射為六音以羽聲應半黄鍾為七音以變宫應此陽律之五聲二變也至半太簇為清宫而與黄鍾應則陽律旋宫之義見焉如定大吕為首音宫聲則夾鍾為二音以商聲應仲吕為三音以角聲應林鍾為四音以變徴聲應南吕為五音以徴聲應應鍾為六音以羽聲應半大吕為七音以變宫聲應此陰吕之五聲二變也至半夾鍾為清宫而與大吕應則隂吕旋宫之義見焉所謂隂陽以類相從而不雜者此也若夫以隂陽唱和而合用之則一律一吕折中取聲使陰陽之氣得以相兼故黄鍾之宫為濁宫大吕之宫為清宫濁者不得揚之使髙清者不得抑之使下惟定宫聲在黄鍾大吕之間而可濁可清始能兼律吕之用黄鍾大吕既合而為宫則太簇夾鍾合而為商姑洗仲吕合而為角蕤賓林鍾合而為變徴夷則南吕合而為徴無射應鍾合而為羽至半黄鍾半大吕合而為變宫是又陰陽唱和律吕合用者也騐之於樂器排簫鍾磬各一十有六正陰陽之分用者也今簫與笛一孔而兼律吕一音而能髙下正陰陽之合用者也至於簫笛之最上一孔適當出音孔上第一孔之半而聲低一字即宫聲之半不應宫聲而為變宫者也案其體推其數製以器審以音莫不確然有據而無纎毫之可疑則五聲二變運於十二律吕之中誠有一定不易之至理也蕙田謹案五聲兼二變為七音其相生之數朱子蔡氏言之其所以有二變之故吴氏言之至實騐之管音以分陽律之五聲二變隂吕之五聲二變隂陽唱和律吕合用之五聲二變運於十二律吕之中因而知絃音絃度之不同於管音管律則未有能知之者多因尋求於理數而未播之絲竹也得正義發明之七音之用始正無牽合雜錯之病矣考律緒言吴氏鼎曰音既七矣律何以不止於七律既不止於七矣又何故止於十二惟七故十二也葢五音者正宫正徴正商正羽正角之律二變者比宫比徴之律既有比宫比徴之律則必有比商比羽比角之律是故宫商之間有律焉蕤賓所以生大吕也徴羽之間有律焉大吕所以生夷則也商角之間有律焉夷則所以生夾鍾也羽宫之間有律焉夾鍾所以生無射也角徴之間有律焉無射所以生仲吕也蔡元定曰宫與商商與角徴與羽相去各一律至角與徴羽與宫相去乃二律葢由角及徴由羽及宫其相去之度最為遼闊故應鍾之律比於宫而不比於羽比於羽者乃無射也蕤賓之律比於徴而不比於角比於角者乃仲吕也若大吕之律在宫商之間其相去之度不逺故既比於宫又比於商夷夾二律亦如之故不止於七也若其所以止於十二者葢以仲吕所生之子在黄鍾大吕之間大吕為比宫之聲别無餘地可容一律且比宫比徴比商比羽比角之數至仲吕而適完故不得不止於十二也京房以仲吕所生别名執始衍為六十律殊不知聲律之用不過五音二變乃雜比之名十二律乃所以完其雜比之用若雜之又雜比之又比雖千萬律孰能究其所終極哉右七音經傳通解十二律正變倍半之法正半變變半通典曰以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如黄鍾之管正聲九寸子聲則四寸半也朱子曰十二正律各有一定之聲而旋相為宫則五聲初無定位當髙者或下當下者或髙則宫商失序而聲不諧和故取其半律以為子聲當上生而所生者短則下取此聲以為用然以三分損益之法計之則亦適合下生之數而自此律又以其正律下生則復得其本法而於半律又合上生之數此唯杜氏言之而他書不及也黄鍾當以四寸半為半律而圖以為無者以九分之寸析至初秒終無可紀之數也林南應不用者相生之不及也此又杜氏所未言故詳著之又上下相生之法者以仲吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四上生黄鍾三分益一不及正律九寸之數但得八寸五萬九千四十九分寸之五萬一千八百九十六以為黄鍾之變律半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黄鍾變律之子聲朱子曰此依本文稍加詳潤其不及至數但九字以為至之變律七字變律之子聲五字皆今所增入本數猶用十分之寸計之尚為繁冗今以九分之寸更定見於圖内而於此存其本文又上下相生以至仲吕皆以相生所得之律寸數半之以為子聲之律朱子曰蕤賔以下仲吕上生之所不及故無變律而唯黄太姑林南應有之計正變通十八律各有半聲為三十六聲其間又有八聲雖有而無所用實計二十八聲而已杜氏又言變律上下相生以至仲吕則是又當増十二聲而合為四十八聲似太過而無所用也今雅樂俗樂皆有四清聲其原葢出於此然既欠八聲且無變律則其法又太疎略而用有不周矣覽者詳之漢志曰黄鍾不復與他律為役者黄鍾至尊無與並也此言黄鍾唯於本宫用正律若他律為宫則黄鍾之為商角徴羽二變者皆但用其變律而正律不復與之為役也此與通典變律之説相發明而本志所言有未盡者故剟其大要附於此云吴氏鼎旋宫半律論朱子儀禮鍾律篇正變倍半圖内於黄鍾半律不立尺寸而以為無於林鍾南吕應鍾之半律則各立尺寸而以為不用通典曰以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如黄鍾之管正聲九寸子聲則四寸半也朱子曰黄鍾當以四寸半為半律而圖以為無者以九分之寸析至初杪終無可紀之數也林南應不用者相生之不及也案九寸者管度也管之長定於十二律相生之序管之孔定於七音相生之序未有破相生之序而另為一孔者故非獨黄鍾無半律即林南應亦非有而不用非獨林南應之半律為相生之不及即黄鍾半律亦為相生之不及由是言之圖以黄鍾半律為無則是而以林南應之半律為有而不用則非朱子以相生不及解不用二字則是而以無可紀數解無字則非葢旋宫外之尺寸正自備列不盡其為相生之所不及者闕之可也若或以為無或以為不用或以為數有可紀或以為數無可紀其參差之見於旋宫律數杳不相闗而徒足啟後世之惑則亦何取云爾乎抑更有說焉所謂黄鍾無半律者乃是截竹為管之時不得復加黄鍾半律之孔非謂黄鍾無半律之聲也嘗試吹一孔而得清濁兩聲濁為正律清即半律是黄鍾半律之聲已具於黄鍾正律之孔矣即以琴論大絃為黄鍾正律六絃即黄鍾半律散聲為黄鍾正律七徴即黄鍾半律孰謂黄鍾無半律之聲哉特以音理雖圓通而無碍而立法貴畫一而不訛故旋宫之内為正為半為變為變半皆有一定之數無庸雜取他聲以亂七音相生之序耳蕙田案吴氏以管律論黄鍾無半律與正義之說相近但不能灼知其為絃度耳觀以琴律証之而知黄鍾有半律可見為絃度無疑也律吕正義十二律吕倍半生聲應五聲二變篇史志所載言律吕者正律之外又有倍律半律變律之名夫律有倍半所以助正律而成旋宫之用至於變律乃始自京房因仲吕還生黄鍾不及原數别名執始轉生四十八律後世因之遂有變律之說嘗以京房所定律數細較之仲吕轉生之執始比黄鍾止少一分二釐有奇自執始至第三十七之質末比大吕止多九釐有奇至於謙待本蕤賔變律而數弱於林鍾未知大吕變律而數弱於太簇白吕本夷則變律而數弱於南吕南授本夾鍾變律而數弱於姑洗分烏本無射變律而數弱於應鍾南事本仲吕變律而數弱於蕤賔故其編次各遷就於相近律吕數下且黄鍾大吕同一聲字止分清濁而執始至質末總未出黄鍾大吕範圍之内豈能比黄鍾大吕别生一音耶是故案其數不得至六十之多審其音不得成六十之用苟不實被之聲律則於倍半正變之名有未詳而施之於用亦未當矣夫正律為宫至半律則為變宫而或誤以半律為與正律應是聲不應而以為應乃未達半律之為變聲也仲吕還生雖不及黄鍾原數而所差甚微故不能自成一聲又烏可自名一律乃或别名之為變黄鍾轉生十二變律合半聲而用之夫聲未變而以為變是未知變律之猶未離乎正聲也至於倍律之說古人亦嘗用之而傳記並無明文但以正律對半律言謂之倍不知倍律對正律言乃真倍律也夫始黄鍾終應鍾為十二律吕之正自黄鍾而下欲用聲之更低者則有律吕之倍體自應鍾而上欲用聲之更髙者則有律吕之半體由是而倍音半音之理生焉先審正律正吕之協於五聲二變者以為之凖然後大而推之倍律倍吕細而及於半律半吕其清濁之遞降髙低之相應正變之屢遷案之聲音字譜無一不叶此旋宫之用所以成也配以七聲則黄鍾大吕為宫聲工字而分清濁太簇夾鍾為商聲凡字而分清濁姑洗仲吕為角聲六字而分清濁蕤賓林鍾為變徴五字而分清濁夷則南吕為徴聲乙字而分清濁無射應鍾為羽聲上字而分清濁至於大而推之倍律倍吕則倍無射倍應鍾共為尺字即宫聲之右有變宫而分清濁者也倍夷則倍南吕共為上字即變宫之右有下羽而分清濁者也倍蕤賓倍林鍾共為乙字即下羽之右有下徴而分清濁者也細而推之半律半吕則半黄鍾半大吕共為尺字即羽聲之左有變宫而分清濁者也半太簇半夾鍾共為工字即變宫之左又有少宫而分清濁者也半姑洗半仲吕共為凡字即少宫之左復有少商而分清濁者也倍仲吕而上聲抑而啞半蕤賔而下聲噍而促惟有倍蕤賓倍林鍾以至半姑洗半仲吕可以相應和聲故倍體半體亦止於六此古樂之所以有起下徴而終清商者以其協聲音之正而得備於用也辨無變律半律之説葛中選曰世儒將六十聲牽就十二律於是有變律之名變半之法不知十二均之五聲以宫商角徴羽渾之而自圓以律注之而反滯為變為半皆後儒私創之名吴氏鼎曰旋宫無不用變律半律之理而葛氏甚惡其名由是執律自律聲自聲之見也夫聲與律同而異異而同假如就十二管言之此管是此律彼管是彼律管不曰聲管不止五故也就一管言之此孔是此聲彼孔是彼聲孔不曰律孔無十二故也此聲與律之同而異者也然十二之管雖配以律究竟無律外之聲管之孔雖配以聲究竟無聲外之律此聲與律之異而同者也如謂以律注聲之非而必岐而二之則離律論聲欲圓反滯且所謂變與半者固旋宫内天然自有之律葛氏既不能一旦盡去之乃徒執稱謂之末而竊竊焉議其後不亦淺之乎其論律也與蕙田案吴氏辨葛氏無變律半律甚是今案正義變半律均是絃度葛氏不知宜有六十聲牽就十二律之疑也既明為絃度自無庸牽合十二律而變半律之用明矣辨音律各異之説葛中選曰古樂有三用一主音如黄帝清角舜徴招角招師曠清徴清商後世引商刻羽雜以流徴則新聲也一主律如大司樂奏黄鍾歌大吕奏太簇歌應鍾奏姑洗歌南吕奏蕤賔歌函鍾奏夷則歌仲吕奏無射歌夾鍾每律自具五聲各自為宫不相假借一大合樂則音律並用如周禮圜丘之樂以圜鍾為宫黄鍾為角太簇為徴姑洗為羽方澤之樂函鍾為宫太簇為角姑洗為徴南吕為羽宗廟之樂黄鍾為宫大吕為角太簇為徴應鍾為羽則是各律只用一音不雜餘音五律並用五音在其中矣與主律迥别吴氏鼎曰所謂主音者非用音不用律所謂主律者非用律不用音所謂音律並用者非他樂音律分用而此樂音律合用曰音曰律不過命名之偶異而葛氏附㑹其説遂劃然分為三截倘所謂以文害辭以辭害志者與蕙田案以上變律半律周禮春官大司樂凡樂圜鍾為宫黄鍾為角太簇為徴姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宫大吕為角太簇為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣律吕新書蔡氏曰此祭祀之樂不用商聲只有宫角徴羽四聲無變宫變徴葢古人變宫變徴不為調也左氏傳曰中聲以降五降之後不容彈矣夫五降之後更有變宫變徴而曰不容彈者以二變之不可為調也蕙田案此條律吕各調旋相為宫見於經之始朱子曰先儒謂商是殺聲鬼神所畏故不用而只用四聲迭相為宫未知其五聲不備又何以為樂然也恐是無商調不是無商音他那奏起来五音依舊咸在蕙田案朱子之説是也經圜鍾為宫函鍾為宫黄鍾為宫俱指調言即禮運所謂旋相為宫也不用商調者商為西方肅殺之調軍旅用之祀天神祭地祗享人鬼乃吉禮之至大者故不用耳若五聲不可缺一况商聲即入他調則亦非肅殺之音矣先儒以為鬼神所畏及無商聲者皆泥也李氏光地曰黄鍾圜鍾兩字錯互諸儒相承遂不復正原其所以葢以黄鍾一律宫角兩用或者疑其重複而以意易之致誤之根皆縁於此不知黄鍾為宫則黄鍾宫調也其起調畢曲之律即以黄鍾黄鍾為角則黄鍾角調也其起調畢曲之律則以姑洗太簇為徴則太簇徴調也其起調畢曲之律則以南吕姑洗為羽則姑洗羽調也其起調畢曲之律則以大吕此四律者皆前所祀天神四望之樂故此大祀則合而用之至下二樂莫不皆然但祭祀之大者廢商故調止於四而地樂中有太簇本黄鍾之商聲人樂中有無射乃西方之窮律縁去商調之義故此二律有應為起調畢曲者則并去之葢蕤賓與太簇同類南吕與無射同方故其樂可以相代也至於三宫之義應乎三始子天氣之始也午地氣之始也夘人事之始也然午者正陽之位故地始於未義既如此氣亦相應冬至祀天則黄鍾之月也夏至祭地則林鍾之合也揆以春禘之文則夾鍾之月也此三宫所以為樂之本不可移易其餘三調之次乃各以六律五聲之序求之則當之者名其調也音有八而用止於革絲竹者鼓鼗以命管琴瑟以升歌皆舉其重者言六代之舞在天則統以天神之所用在地則統以地示之所用在廟則亦以古為尊故舍近而用大㲈焉其三樂之變數多寡不同者天動而地靜動者速靜者遲神示伸而人鬼屈伸者易求而屈者難致也又曰圜鍾為宫以下說異於古何也曰調與聲不同從来說者皆未别明聲調是以特就經上之律起意而不復以前文參考爾且以黄鍾之五調論則所謂黄鍾宫調者用黄鍾所生之七律而以黄鍾起調黄鍾畢曲也所謂黄鍾商調黄鍾角調黄鍾徴調黄鍾羽調者則亦用黄鍾所生之七律而或以太簇或以姑洗或以林鍾南吕起調畢曲也所以然者黄鍾以太簇為商以姑洗為角以林鍾為徴以南吕為羽如此節用黄鍾為角調則必以其所生之角聲起調畢曲自然之理也故如黄鍾之為角聲也則必曰夷則角而不曰黄鍾角如太簇之為徴聲也則必曰林鍾角而不曰太簇徴如姑洗之為羽聲也則必曰林鍾羽而不曰姑洗羽漢魏以来樂部未之有改然則黄鍾為角之為角調而用姑洗太簇為徴之為徴調而用南吕姑洗為羽之為羽調而用大吕無疑也考禮運雖有旋相為宫之言然並未著其例然則六經中大樂聲調之理惟周官此文為可据爾况其證之前文又相符合則聖人之微辭奥義殆未易以曲說通也鄭氏而下為說頗多其中亦有推論巧合如沈氏筆談之云者然終於聲調之理無當故不敢從又曰其易圜鍾黄鍾也何据曰案班氏律志黄鍾為天統林鍾為地統太簇為人統則黄鍾當為天宫林鍾當為地宫明矣故前文亦以黄鍾祀天林鍾祭地也太簇雖屬人統然前文既與應鍾合而為祭地之樂則施之宗廟之宫義有未允而夾鍾者前文所用以享於先祖者也葢天氣始於子地氣始於午人事始於夘者隂陽晝夜之正也地退一位而始於未則避南方之正陽也人退一位而始於寅則重民事之蚤作也然則宗廟之祭以圜鍾為宫既合享祖之文又著人事之始比於援引星辰捨經證緯不亦善乎漢書郊祀志葢仍此誤至唐祖孝孫以黄鍾祀天林鍾祭地乃為能復古者獨其以太簇享廟則但據三統之義而未知周官之有互文為少失爾又曰商調之避他書亦有足徴者與曰孔子謂賓牟賈曰聲滛及商何也曰非武聲也有司失其傳也孔子曰唯某之聞諸萇𢎞亦若吾子之言是也鄭康成解此為有貪商天下之心揆之文義為不類案國語武王以夷則之上宫畢陣以黄鍾之下宫布戎以太簇之下宫布令於殷以無射之上宫施舍百姓史記亦云武王伐紂吹律聽聲殺氣相并而音尚宫然則大武之樂葢尚宫聲而末流之失其音節乃有濫入於商者故曰聲滛及商猶所謂嵗在星紀滛於𤣥枵者云爾非貪商天下之謂也夫大武之樂以武功著然於商聲猶不用况此三祭所奏者雲門咸池大韶之舞則其去商調也何疑其為縁此之義於太簇無射二律有應為起調畢曲者則并去之又何据也曰國語伶州鳩謂太簇所以金奏注云正聲為商故為金奏又景王將鑄無射之鍾而州鳩以為不可是亦必有説矣葢黄鍾一律為諸聲之本而太簇為其商則是太簇之正聲商也吕令西方其音商而無射者又窮秋之律金氣之盛也三祭之樂既去商調故於此二律之起調畢曲者而并去之是亦求之聲音之理而可通者即以本經之文為据可矣蕙田案李氏之說與先儒不同附之以備考律吕源流大司樂十二調舊譜夾宫仲商林角無徴黄羽黄角夾徴仲羽夷宫無商太徴姑羽林宫南商應角姑羽林宫南商應角太徴右四調祀天神之樂林宫南商應角太徴姑羽太角仲徴林羽無宫黄商姑徴蕤羽南宫應商大角南羽黄宫大商姑角林徴右四調祭地示之樂黄宫太商姑角林徴南羽大角姑徴蕤羽南宫應商太徴姑羽林宫南商應角應羽太宫姑商蕤角南徴右四調享人鬼之樂吴氏鼐曰大司樂函鍾為宮太簇為角姑洗為徴南呂為羽隋書以為一調故其言曰此四聲非直無商又律乖管次以為樂無克諧之理今古事異不可得而行也惟唐書以為四調唐書是也其無商調何也商主西方之金金克木周以木德王故避之也不用商調仍用商聲何也無商聲則相生之序大小之論疎矣不成曲調也其用五音不用七音何也大祭祀無變聲也明太常樂譜亦用五音葢舊法也每調用大小之倫不用相生之次何也四調既以宫角徴羽為次故每調中亦以宫商角徴羽為次也其起調轉調畢曲之義何也夾宫至黄羽為一調羽生角故第二調以黄角起黄角至無商為一調徴生商故第三調以太徴起太徴至應角為一調羽生角故第四調以姑羽起自姑羽至太徴終馬宫生徴與首調夾宫相生相應故我生者與生我者皆可以轉調皆可以起調畢曲不必定用本律也祀天神用夾黄太姑祭地示用林太姑南何也曰陳氏曰圜鍾為宫黄鍾為角太簇為徴姑洗為羽此律之相次者也函鍾為宫太簇為角姑洗為徴南吕為羽此律之相生者也黄鍾為宫大吕為角太簇為徴應鍾為羽此律之相合者也王氏曰相次者天之道相生者地之功相合者人之情其說是也祀天以夾鍾起調祭地以林鍾起調享人鬼以黄鍾起調何也曰鄭氏曰夾鍾生於房心之氣星為大辰天帝之明堂林鍾生於未之氣未坤之位黄鍾生於虚危之氣虚為宗廟賈氏曰天之出日虚為明堂林鍾在未為八月卦星經虚危主宗廟其說是也蕙田案吴氏謂大祭祀不用變聲與新書異吴説當是禮記禮運五聲六律十二管還相為宫也注五聲宫商角徴羽也其管陽曰律隂曰吕布十二辰始於黄鍾管長九寸下生者三分去一上生者三分益一終於仲吕更相為宫凡六十也生疏黄鍾為第一宫下生林鍾為徴上生太簇為商下南吕為羽上生姑洗為角林鍾為第二宫上生太簇為徴下生南吕為商上生姑洗為羽下生應鍾為角太簇為第三宫下生南吕為徴上生姑洗為商下生應鍾為羽上生蕤賓為角南吕為第四宫上生姑洗為徴下生應鍾為商上生蕤賓為羽下生大吕為角姑洗為第五宫下生應鍾為徴上生蕤賔為商上生大吕為羽下生夷則為角應鍾為第六宫上生蕤賓為徴下生大吕為商下生夷則為羽上生夾鍾為角蕤賓為第七宫上生大吕為徴下生夷則為商上生夾鍾為羽下生無射為角大吕為第八宫下生夷則為徴上生夾鍾為商下生無射為羽上生仲吕為角夷則為第九宫上生夾鍾為徴下生無射為商上生仲吕為羽上生黄鍾為角夾鍾為第十宫下生無射為徴上生仲吕為商上生黄鍾為羽下生林鍾為角無射為第十一宫上生仲吕為徴上生黄鍾為商下生林鍾為羽上生太簇為角仲吕為第十二宫上生黄鍾為徴下生林鍾為商上生太簇為羽下生南吕為角是十二宫各有五聲凡六十聲蕙田案注釋十二律還宫極備李氏光地曰宫者五音之長也宫生徴徴生商商生羽羽生角每一律自為宫則以三分損益上下相生而為之商角徴羽故曰還相為宫也還宫之義施之於用有聲有調聲則一字為宫一字為商者是也調則通一曲而名之為宫名之為商者是也如黄鍾宫調則是黄鍾為宫其調中之字皆叶以黄鍾所生之五聲而以黄鍾起調黄鍾畢曲也如無射商調夷則角調仲吕徴調夾鍾羽調則以黄鍾乃無射之商夷則之角仲吕之徴夾鍾之羽其調中之字則各叶以無射夷則仲吕夾鍾所生之五聲而仍以黄鍾起調黄鍾畢曲也餘十一律悉可例推起調畢曲者曲中每叚首尾聲也西山蔡氏曰古人變宫變徴不為調後世以二變參為八十四調者非也經傳通解五音旋相為宫六十調之圖朱子曰二變二十四聲非五聲之正不可為調故止於六十也為宫為商為角為徴為羽十二管自本律之外為它律之四聲者合其律為調黄於本律於無於夷於中於夾以上黄宫五調各用本均七聲而以黄鍾起調黄鍾畢曲餘律倣此大本律應南蕤姑太本律黄無林中夾本律大應夷蕤姑本律太黄南林中本律夾大無夷蕤本律姑太應南林本律中夾黄無夷本律蕤姑大應南本律林中太黄無本律夷蕤夾大應本律南林姑太陳氏埴曰五聲大小之相次固本於黄鍾為宫若五聲旋相為宫則十二律皆可為宫非特黄鍾為宫而已如應鍾為宫則大吕為商夾鍾為角蕤賔為徴夷則為羽無不皆然朱子曰案五聲相生至於角位隔八下生當得宫前一位以為變宫五聲之正至此而窮又有變宫隔八上生當得徴前一位以為變徴餘分不可損益而其數又窮故立宫之法至於是而終焉孔氏以本文但云五聲十二管故不及二變而上為六十律増入二變二十四聲合為八十四聲自唐以来法皆如此云蕙田案以上五音旋相為宫朱子曰五聲之序宫最大而沈濁羽最細而輕清商之大次宫徴之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其每變而益上則為商為角為變徴為徴為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思葢以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徴以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是以上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沈濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之甚而不可以為樂矣葢黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也正如子時初四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前叚如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾葢不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律者又無所受以為本律之宫也律吕新書八十四聲圖第八正律墨書變律朱書半聲朱書半聲墨書十一月黄鍾宫六月林鍾宫黄鍾徵正月太簇宫林鍾徴黄鍾商八月南吕宫太簇徴林鍾商黄鍾羽三月姑洗宫南吕徴太簇商林鍾羽黄鍾角十月應鍾宫姑洗徴南吕商太簇羽林鍾角黄鍾變宫五月蕤賔宫應鍾徴姑洗商南吕羽太簇角林鍾變宫黄鍾變徴十二月大吕宫蕤賔徴應鍾商姑洗羽南吕角太簇變宫林鍾變徴七月夷則宫大吕徴蕤賔商應鍾羽姑洗角南吕變宫太簇變徴二月夾鍾宫夷則徴大吕商蕤賔羽應鍾角姑洗變宫南吕變徴九月無射宫夾鍾徴夷則商大吕羽蕤賔角應鍾變宮姑洗變徴四月仲吕宫無射徴夾鍾商夷則羽大吕角蕤賔變宫應鍾變徴黄鍾變仲吕徴無射商夾鍾羽夷則角大吕變宫蕤賔變徴林鍾變仲吕商無射羽夾鍾角夷則變宮大吕變徴太簇變仲吕羽無射角夾鍾變宫夷則變徴南吕變仲吕角無射變宫夾鍾變徴姑洗變仲吕變宮無射變徴應鍾變仲吕變徴蔡氏曰律吕之數往而不返故黄鍾不復為他律役所用