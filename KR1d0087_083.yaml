也每調又各含商角徴羽變宫變徴之六聲故曰三百六十音京房之六十律錢樂之之三百六十律皆根源於此而失之者也倍黄鍾之九寸為一尺八寸三除之得六寸為林鍾四林鍾之六寸為二尺四寸三除之得八寸為太簇餘倣此又曰五音有聲有調所謂調者但以其一聲為主用以起調畢曲而命之乎抑别有以命之乎曰如但以其一聲為主用以起調畢曲而命之也則以哀管奏樂音以急節歌漫調俱無不可矣然則調何始也始於人心者也宫調深厚於人為信之德而其發則和也角調明暢於人為仁之德而其發則喜也商調清厲於人為義之德而其發則威也徴調繁喧於人為禮之徳而其發則樂也羽調叢聚於人為智之德而其發則思也是數者生於心故形於言言之有發斂輕重長短疾徐故又寓於歌書曰詩言志歌詠言者此也聖人因是制為五者之調以倣之是故聞宫音使人和厚而忠誠聞角音使人歡喜而慈愛聞商音使人奮發而好義聞徴聲使人樂業而興功聞羽音使人節約而慮逺五者之調成矣又制六律以為其發歛輕重長短疾徐之節則調中之五音具馬書曰聲依詠律和聲者此也然則仁義禮智信者五音之本也喜怒哀樂者五音之動也調者五音之體製而聲者五音之句字也古者先定體製而以句字從之後世先設句字而以體製從之先設句字而以體製從之者性情之失也是故調之變至於六十者調隨聲而變也聲之變至於八十有四者聲隨調而變也調隨聲而變者音響髙下之間聲隨調而變則全體之節族異矣然則不知調者不可與言聲不知詩者不可與言調不知性情之德者不可與言詩可與言詩而樂思過半矣議音律而不先於此者末也律吕正義旋宫起調篇樂之節奏成於聲調而聲調之原本自旋宫旋宫之理不明則聲調之原不著聲也者五聲二變之七音而調也者所以調七音而互相為用者也旋宫乃秦漢以前諧音之法聲調為隋唐而後度曲之名稽之於古六律五聲八音肇自虞書而周官太師掌六律六同以合隂陽之聲七音之名見於左傳國語至管子淮南子始著五聲二變之數戴記禮運篇五聲六律十二管旋相為宫孟子曰不以六律不能正五音此旋宫之義所自来也迨及漢晉之世樂經殘缺律吕失度雜以鄭聲所見於經史注者類多臆見故旋宫之理晦而不明然周人遺書猶可考証如管子徴羽之數大於宫國語伶州鳩曰宫逐羽音即此二者旋宫之法可定焉隋書音樂志柱國沛公鄭譯云考尋樂府鍾石律吕皆有宫商角徴羽變宫變徴之名七聲之内三聲乖應每恒求訪終莫能通先是周武帝時有龜茲人曰蘇祗婆善胡琵琶聴其所奏一均之中間有七聲因而問之答云調有七種以其七調勘較七聲㝠若合符就此七調又有五旦之名旦作七調以華言譯之旦者則謂均也其聲亦應黄鍾太簇姑洗林鍾南吕五均已外七律更無調聲譯遂因其所捻琵琶絃柱相引為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合唐書禮樂志云自周陳以上雅鄭淆雜而無别隋文帝始分雅俗二部至唐更曰部當凡所謂俗樂者二十有八調名見下燕樂譜皆從濁至清迭更其聲其後聲器寖殊或有宫調之名或以倍四為度有與律吕同名而宫調不雅者其宫調乃應夾鍾之律燕設用之宋志載燕樂譜以夾鍾收四聲曰宫曰商曰羽曰閏閏為角其正角聲變徴聲徴聲皆不收而獨用夾鍾為律本宫聲七調曰正宫髙宫中吕宫道宫唐書為道調宫南吕宫仙吕宫黄鍾宫商聲七調曰大食調髙大食調雙調小食調歇指調商調唐書為林鍾商越調羽聲七調曰般涉調髙般涉調中吕調正平調南吕調唐書為髙平調仙吕調黄鍾調唐書為黄鍾羽角聲七調曰大食角髙大食角雙角小食角歇指角商角唐書為林鍾角越角此其四聲二十八調之略也其律本出夾鍾觀律本而其樂可知變宫變徴既非正聲而以變徴為宫以變宫為角反紊亂正聲若此夾鍾宫謂之中吕宫林鍾宫謂之南吕宫者燕樂聲髙實以夾鍾為黄鍾也此三朝史志皆以聲調明旋宫之義者也但古旋宫之法合竹與絲並著之而自隋以迄於今獨以絃音發明五聲之分律吕旋宫遂失其傳夫旋宫者十二律吕皆可為宫立一均之主各統七聲而十二律吕皆可為五聲二變也聲調者聲自為聲調自為調而又有主調起調轉調之異故以轉調合旋宫言之名為宫調五聲二變旋於清濁二均之一十四聲則成九十八聲此全音也若夫八十四聲六十調實皆生於絃度以絃音七聲之位遞配以十二律吕之分則為八十四聲除二變不用止以五聲之位遞配以十二律吕之分則為六十調此乃案分以命聲調非旋宫轉調之法也周禮大司樂未載商調先儒皆謂祭不用商聲朱子曰恐是無商調不是無商音奏樂時五音依舊皆在唐宋以来無徴調朱子亦曰不是無徴音亦恐無徴調夫以宫立羽位主調則商當變宫不用以羽立羽位主調則徴不起調所謂無商調與無徴調二者名異而理則同也主調起調皆以宫位為主故曰宫調然調雖以宫為主而宫又自為宫調又自為調如宫立一均之主而下羽之聲又大於宫故為一調之首即國語之宫逐羽音也羽主調宫立宫一均七聲之位已定則當二變者不起調而與調首音不合者亦不得起調葢以羽起調徴在其前變宫居其後二音與羽相近得聲淆雜故不相合而變徴為六音亦與羽首音淆雜不合此所以當二變之位與五正聲中當徴位者俱不得起調也至於止調亦取本調相合可以起調之聲終之當二變與徴位者亦不用焉其立羽位調首之音自本聲起者即為本調首音與五音為羽為角次相合首音與三音為羽為宫又次相合且均調相應首音與四音為羽為商轉相合可出入故本調為一調自宫位起者為一調自角位起者為一調自商位起者復為一調自羽位宫位角位起者為正自商位起者為假借故曰可出入如曲中所謂與某宫某調相出入者是也轉相合者下羽之調首至角為第五位商之第三音至正羽第八音亦五位也一均四調七均二十八調合清濁之一十四均則為五十六調矣今樂工度曲七調相轉之法四字起四為正調樂工轉調皆用四字調為凖以四乙上尺工凡合七字列位視某字當四字位者名為某調一如五聲二變遞轉旋宫之法以四字當羽位為起調處故云四字起四為四字調乙字起四為乙字調即下文宫聲立羽為宫調商聲立羽為商調之理也乙字起四為一字調上字起四為上字調尺字起四為尺字調工字起四為工字調凡字起四為凡字調合字起四為合字調此皆以笛孔言四字調乙凡不用乙字調上六不用上字調尺五不用尺字調工乙不用工字調凡上不用凡字調合尺不用合字調五工不用案近代皆以合字為黄鍾宫聲則當以某字當合為某宫今不取起合而取起四則是以四字為主而非以合字為主矣且不曰某宫而曰某調則是以四字名調而非以四字為宫矣如以四字為宫則四字調之乙字凡字適當商羽之位何故不用惟以四字為調首當羽位則乙字當變宫凡字當變徴故乙凡不用而知其為四字調也即如羽聲主調當二變聲者不用故知其為羽調宫聲主調當商位羽位者不用故知其為宫調也又四字調乙字凡字不得起調而六字亦不得起調即如羽聲當羽位主調二變不得起調而徴聲亦不得起調也此七調之七字相轉即五聲二變之旋相為宫是故宫調聲字實為一體析而言之則有四科一曰七聲定位以五聲二變立一定之位自下羽以至正羽共列為八顯明隔八相生之理欲知某宮之某調於下羽位視其聲字律吕則知其為某宫之某調矣欲知某調之某宫於宫位下視其聲字律吕則知其為某調之某宫矣欲知聲字律吕之當避者於二變位下視之即知某聲字某律吕之當避矣二曰旋宫主調以五聲二變旋於七聲定位之下亦分為八位如羽聲立下羽之下宫聲立宫位之下則為宫聲立宫而羽聲主調也如宫聲立下羽之下則商羽立二變之下乃為角聲立宫而宫聲主調也又如商聲立下羽之下則變徴立宫位之下角與變宫立二變之位則為變徴立宫而商聲主調也三曰和聲起調以十二律吕兼倍半以備用案所生之音各隨其均序於旋宫之下仍以調主相和之聲所起各調注本律本吕之下以正各調之名如黄鍾立宫則倍夷則立下羽之位以主調倍無射正蕤賔當二變之位不起調正夷則立徴位亦不起調故用倍夷則起調者為正羽調起黄鍾宫聲為正宫起太簇商聲為正商起姑洗角聲為正角此正宫之四調也如大吕立宫則倍南吕立下羽之位以主調倍應鍾正林鍾當二變之位不起調正南吕立徴位亦不起調故用倍南吕起調者為清羽調起大吕宫聲為清宫起夾鍾商聲為清商起仲吕角聲為清角此清宫之四調也如太簇立宫無射立下羽之位以主調黄鍾夷則當二變之位不起調正無射當徴位亦不起調故用倍無射起調者為變宫調起太簇商聲為商宫起姑洗角聲為姑洗商起蕤賔變徴聲為商角此商宫之四調也若夫姑洗立宫則黄鍾立下羽位以主調太簇無射當二變之位不起調半黄鍾當徴位亦不起調故用黄鍾起調者為宫調起姑洗角聲為角宫起蕤賔變徴聲為角商起夷則徴聲為夷則角此角宫之四調也其餘立宫主調皆依此例四曰樂音字色以律吕簫笛所命字色隨聲調而序其次列於律吕之下如黄鍾為工字而簫應黄鍾者為工字笛應黄鍾者為五字皆注於黄鍾本律之下大吕為髙工字而簫之髙工字笛之髙五字亦皆注於大吕本吕之下其立羽位之字即為主調其立宫位之字即為立宫其當二變之位則不用當徴位者亦不以起調焉以此四科列為圖譜則旋宫轉聲主調起調之理自顯然而無遁情矣蕙田謹案此篇發明十二律吕皆可為宫立一均之主各統七聲十二律吕皆可為五聲二變至為詳明而以管子徴羽之數大於宫國語宫逐羽音二義申明變宫不用二變不起調徴聲亦不起調以疏大司樂無商調之故尤千古定論也律吕正義絃音旋宫轉調篇絲樂絃音之旋宫轉調與竹樂管音不同亦由二者生聲取分之各異也然清濁二均各七調中有同者有可同者有不可同者其同者惟宫調一調五聲二變皆正應其可同者商調徴調五聲正應二變借用其不可同者角調變徴調羽調變宫調五聲之内清濁相淆其間變徴調與羽調五正聲内止有一聲乖應然羽調猶能自立一調而變徴調又轉入宫調聲字不能自立一調至於角調變宫調五聲之内二三乖應且與宫調聲字雷同斷不能自成一調也如但以絃音奏之而不和以管音亦止有四調其餘三調皆轉入絃音宫調案周禮大司樂三宫漢志三統皆以三調為凖所謂三統其一天統黄鍾為宫乃黄鍾宫聲位羽起調姑洗角聲立宫主調是為宫調也其一人統太簇為宫乃太簇商聲位羽起調蕤賔變徴立宫主調是為商調也其一地統林鍾為宫乃絃音徴分位羽實管音夷則徴聲位羽起調半黄鍾變宫立宫主調是為徴調也隋書音樂志柱國沛公鄭譯云考尋樂府鍾石律吕皆有宫商角徴羽變宫變徴之名七聲之内三聲乖應其所謂七聲者實七調也當其考較聲律時或以管音考核絃音或以絃音考核管音故得四調相和其餘三調乖應即二變調與角調也唐書禮樂志所載四宫二十八調率皆以絃音之分定為十二律吕之度故有正宫髙宫大食髙大食之别今即絃音管音之相和不相和以辨陽律陰吕之分用合用然後知唐書之二十八調獨取絃音不在管律而古人所用三統實取管音絃音之相和而用之者也夫絃音諸樂其要有四一定絃音應某律吕之聲字即得某絃之度分一絃音轉調不能依次遞遷故以宫調為凖有幾絃不移而他絃或𦂳一音或慢半音遂成一調而各絃七聲之分因之而變一絃音諸調雖無二變而定絃取音必審二變之聲必計二變之分始能得其條貫不然宫調無所取凖一絃音宫調惟宫與商徴得與律吕相和為用其餘四調陰陽乖應或淆入宫調聲字不得自成一調即此四則條分縷析詳細明之則絃音旋宫轉調之法庶可得而備焉定某律吕聲字即得某絃之度分者如以倍無射之律變宫合字定絃則得徴絃之分此分乃全絃散聲其一音為下羽分應黄鍾之律宫聲四字三音變宫分應太簇之律商聲乙字四音宫分應姑洗之律角聲上字五音商分應蕤賔之律變徴尺字六音角分應夷則之律徴聲工字七音變徴分應無射之律羽聲凡字以黄鍾之律宫聲四字定絃則得羽絃之分其二音為變宫分應太簇之律商聲乙字三音宫分應姑洗之律角聲上字四音商分應蕤賔之律變徴尺字五音角分應夷則之律徴聲工字六音變徴分應無射之律羽聲凡字七音徴分應倍無射之律變宫合字以太簇之律商聲乙字定絃則得變宫絃之分其二音為宫分應姑洗之律角聲上字三音商分應蕤賔之律變徴尺字四音角分應夷則之律徴聲工字五音變徴分應無射之律羽聲凡字六音徴分應倍無射之律變宫合字七音羽分應黄鍾之律宫聲四字以姑洗之律角聲上字定絃則得宫絃之分其二音為商分應蕤賔之律變徴尺字三音角分應夷則之律徴聲工字四音變徴分應無射之律羽聲凡字五音徴分應倍無射之律變宫合字六音羽分應黄鍾之律宫聲四字七音變宫分應太簇之律商聲乙字以蕤賔之律變徴尺字定絃則得商絃之分其二音為角分應夷則之律徴聲工字三音變徴分應無射之律羽聲凡字四音徴分應倍無射之律變宫合字五音羽分應黄鍾之律宫聲四字六音變宫分應太簇之律商聲乙字七音宫分應姑洗之律角聲上字以夷則之律徴聲工字定絃則得角絃之分其二音為變徴分應無射之律羽聲凡字三音徴分應倍無射之律變宫合字四音羽分應黄鍾之律宫聲四字五音變宮分應太簇之律商聲乙字六音宫分應姑洗之律角聲上字七音商分應蕤賔之律變徴尺字以無射之律羽聲凡字定絃則得變徴絃之分其二音為徴分應倍無射之律變宫合字三音羽分應黄鍾之律宫聲四字四音變宫分應太簇之律商聲乙字五音宫分應姑洗之律角聲上字六音商分應蕤賔之律變徴尺字七音角分應夷則之律徴聲工字此陽律一均七聲定絃之正分也隂吕一均七聲定絃亦隨隂吕聲字各得其分其各絃七聲之分亦如之絃音轉調不能依次遞遷一轉調而各絃七聲之分因之而變者如琴之正調為正宫其商調以七絃遞髙一音亦可但六絃七絃太急易折或變宫調以七絃遞下一音則一絃二絃太慢不成聲又如角徴羽調絃必不能及故宫調七絃立凖轉調則七絃内有更者有不更者有宜𦂳者有宜慢者絃之轉移之間而宫調旋焉各調詳正義絃音諸調雖無二變而定絃取音必審二變之聲必計二變之位者管音諸樂自下而上雖依次漸短而各分俱均如黄鍾至太簇太簇至姑洗陽律相較皆為全分或雜以隂吕則為陽律之半分如大吕之在黄鍾太簇間是已絃度則不然據五聲二變七絃之散聲猶可以管律通之至於各絃互相應和以取音則各絃七聲之分不均即旋宫轉調其各絃七聲之分不變而音律暗移於其間此所以與管律有不可同日而語者也詳正義絃音宫調惟宫與商徴得與律吕相和為用者宫調徴絃定倍無射之律變宫合字所得徴分之七聲皆應陽律一均羽絃定黄鍾之律宫聲四字應徴絃之二音所得羽分之七聲亦皆應陽律一均宫絃定姑洗之律角聲上字應徴絃之四音所得宫分之七聲亦皆應陽律一均商絃定蕤賔之律變徴尺字應徴絃之五音所得商分之七聲亦皆應陽律一均角絃定夷則之律徴聲工字應徴絃之六音所得角分之七聲亦皆應陽律一均其變宫絃分值太簇之律商聲乙字應徴絃之三音變徴絃分值無射之律羽聲凡字應徴絃之七音其各絃散聲雖無二變其本宫七聲之分依然俱在即二變七聲之分亦皆應陽律一均如清宫調定絃皆以隂吕而各絃七聲之分亦皆應陰吕一均此所以絃音宫調得與律吕相和為用故曰天正而為天統也商調徴絃定黄鍾之律宫聲四字其所得徴分七聲之内二音羽四音宫五音商六音角仍應陽律三音變宫七音變徴轉應陰吕羽絃定太簇之律商聲乙字應徴絃之二音其所得羽分七聲之内三音宫四音商五音角七音徴仍應陽律二音變宫六音變徴轉應陰吕宫絃定蕤賔之律變徴尺字應徴絃之四音其所得宫分七聲之内二音商三音角五音徴六音羽仍應陽律四音變徴七音變宫轉應隂吕商絃定夷則之律徴聲工字應徴絃之五音其所得商分七聲之内二音角四音徴五音羽七音宫仍應陽律三音變徴六音變宫轉應陰吕角絃定無射之律羽聲凡字應徴絃之六音其所得角分七聲之内三音徴四音羽六音宫七音商仍應陽律二音變徴五音變宫轉應陰吕其變宫絃分應徴絃之三音變徴絃分應徴絃之七音皆為隂吕變宫得仲吕之吕清角髙上字變徴得半大吕之吕清變宫髙六字此商調七絃五正聲得陽律二變聲轉隂吕較其聲字雖二變得清聲髙字然而七聲俱備且五正聲與陽律相和得以相應為凖清商調五正聲亦得與陰吕相和故商調得人正而為人統也角調徴絃不可定太簇之律商聲乙字而取大吕之吕清宫髙五字説見前段全絃散聲首音即雜入陰吕其所得徴分七聲之内二音羽三音變宫六音角七音變徴得應陽律四音宫五音商亦雜入陰吕故本調五正聲絃内羽絃角絃得陽律徴絃宫絃商絃皆應陰吕而變宫變徴分反得陽律至於聲字則商聲乙字羽聲凡字各絃各分皆不得用是則仍遺此二聲字與宫調相雷同清角調五聲二變陰吕陽律相雜亦然故曰不可與律吕相和為用也變徴調徴絃定姑洗之律角聲上字其所得徴分七聲之内二音羽三音變宫五音商六音角七音變徴皆應陽律獨四音宫取隂吕故本調五正聲絃内徴羽商角四絃得陽律惟宫絃應陰吕二變絃分亦得陽律至於聲字商聲乙字雖立變徴然猶得備其位而羽聲凡字各絃各分皆不得用清變徴調亦獨宫絃雜入陽律是雖不可與律吕相和為用然止借一音即與宫調聲字為同較之角調則為正也徴調徴絃定蕤賔之律變徵尺字其所得徴分七聲之内二音羽三音變宫四音宫五音商六音角俱應陽律獨七音變徴取陰吕故本調五正聲内羽絃定夷則之律徴聲工字宫絃定倍無射之律變宫合字商絃定黄鍾之律宫聲四字角絃定太簇之律商聲乙字皆為陽律而變宫分得無射之律羽聲凡字仍為陽律惟變徴分得仲吕之吕清角髙上字為陰吕較其聲字雖變徴得清角髙上字而七聲俱備不但五正聲與陽律相和且二變之中止有一聲應陰吕竟與宫調之各絃各分得應陽律者相侔其清徴調亦止有變徴一聲雜入陽律其餘五正聲變宫聲皆得與陰吕相和故徴調得地正而為地統也絃音之七調案髙下而分清濁則亦有一十四調但絲樂中有徽分品柱節之者則與竹樂諸調不能相通其無徽分品柱者或可與竹樂相次為用而絃之長短又有𦂳慢不能上下之故是以古人定為三統務取八音之克諧以宣雅樂之太和也蕙田謹案此篇發明絃音旋音轉調及宫調為天統商調為人統徴調為地統極精右五聲二變旋宫楚辭大招篇四上競氣極聲變只黄氏佐曰後世辨音以合四一上勾尺工凡六五為譜調絲則絲有其字吹竹則竹有其音據四上競氣極聲變只推之則大吕清角也然則合一其黄鍾慢角歟葢其来逺矣大吕為四仲吕為上歌者激氣使角聲轉清吴氏鼐曰宋史以大吕為四仲吕為上黄鍾為合姑洗為一黄氏以四上為大吕清角合一為黄鍾慢角者葢大吕為宫則大夷夾無仲仲當角位仲又為宫仲生黄之子聲適當徴位所謂清角流徴也若黄鍾為宫則黄林太南姑姑當角位姑又為宫生應之正聲亦當徴位所謂黄鍾慢角也律吕正義審定十二律吕髙低字譜樂莫要於定律審音定律者必先辨其孰為陰孰為陽孰為倍孰為半而後旋宫之義可明審音者必先辨其孰為正孰為變孰為濁孰為清而後取聲之法有凖乃或専肄聲音熟諳字譜而於理數之原棄而不講於聲字之義語而不詳者儒者之學也夫聲音與理數本相因以為用今之樂由古之樂苟探其本何雅樂之不可復哉古聖人制十二律吕陰陽各六其生聲之理陽律六音而繼以半律陰吕六音而繼以半吕各得七聲至八而原聲復是律吕雖有十二而用之止於七也五聲二變合而為七而正宫之半即為變宫是聲雖有七而體又止於六也每一律一吕各自為宫其相應之聲自為髙下或一律一吕合而為宫其相應之聲能兼清濁此案律取聲之定理也近代皆用工尺等字以名聲調而工尺字譜不知創自何時案楚辭大招即有四上競氣極聲變只之語則其由来舊矣今案横黍尺所制之黄鍾正應今簫之工字而今簫之制實由古排簫而作安知字譜所傳工字非即宫字之聲乎以工字為宫則凡字應商六字應角商字凡字皆平聲韻角字詩皆叶禄古多作龣與六同音至於五應變徴乙應徴上應羽五字乙字上字與徴羽二字同為上聲尺字樂工皆讀如車亦應變宫同為平聲則七字與七聲可配也審之律吕黄鍾為低工字大吕為髙工字太簇為低凡字夾鍾為髙凡字姑洗為低六字仲吕為髙六字蕤賔為低五字林鍾為髙五字夷則為低乙字南吕為髙乙字無射為低上字應鍾為髙上字半黄鍾為低尺字半大吕為髙尺字至半太簇仍為低工字與黄鍾應半夾鍾仍為髙工字與大吕應則七字與十二律吕可配也五聲二變遞用以成旋宫而字譜七字亦得遞用以成旋宫然則字譜之七字與五聲二變實相表裏者也蕙田案古樂用律吕成曲今樂用字譜分調字即律也共七字一字髙下便分律吕六字備十二律之均矣又加一字則兩變聲備矣合之五聲則喉舌牙齒唇七字正與七音相配則今之樂猶古之樂也但宋元明以来舊譜相傳不無訛舛我朝考定黄鍾真度以定律吕此字譜者兼宋元十音為七音又以髙低分為十四音由是七音既備而四清亦備至於以律為低聲吕為髙聲於天地自然之音亦無不合洵通於神明者也又案以上樂律七字譜論宋史燕樂書十字譜宋史燕樂書黄鍾用合字大吕太簇用四字夾鍾姑洗用乙字夷則南吕用工字無射應鍾用凡字各以上下分清濁其仲吕蕤賔林鍾不可以上下分仲吕用上字蕤賔用勾字林鍾用尺字黄鍾清聲用六字大吕太簇夾鍾清聲各用五字而以上下𦂳别之𦂳五者夾鍾清聲也熊氏朋来曰此十者如字韻之母宫調不同而黄鍾常為合餘律亦有常者隨五聲二變所及無不該通亦以諸調同一宫也鍾何氏瑭曰律和聲如作黄鍾宫調則衆音皆同黄為節太簇商亦然俗樂以合四工尺等字為板限如作工字則衆音皆以工為節尺亦然乃其遺法也黄氏佐曰重叶合敏叶四經叶一迭叶尺栁叶工鍾又曰喉齒牙舌有半舌半齒焉半舌聲近變宫應曰凡是已半齒聲近變徴蕤賔曰勾是已凡字半齒兼唇勾字半齒兼舌位又曰管七孔惟變徴一孔在後葢變徴稍下於徴相去不逺不可一並為孔故置之後既不失變徴之位又無碍於徴若變宫則彼自有其地也吹管之法閉五孔開第一孔則宫音出焉今謂之合閉四孔開二孔則商音出焉今謂之四閉三開三則角音出焉今謂之一閉二開四則徴音出焉今謂之尺閉上一開下五則羽音出焉今謂之工閉下五獨開上一孔則變宫之音出焉今謂之凡前孔皆閉放後一孔則變徴之音出焉今謂之勾此黄鍾也餘倣此沈氏括曰十二律并清宫當有十六聲今之燕樂止有十五聲葢今樂髙於古樂二律以下故無正黄鍾聲只以合字當大吕猶差髙當在大吕太簇之間下四字近太簇髙四字近夾鍾下一字近姑洗髙一字近仲吕上字近蕤賔勾字近林鍾尺字近夷則工字近南吕髙工字近無射六字近應鍾下凡字為黄鍾清髙凡字為大吕清下五字為太簇清髙五字為夾鍾清知聲者皆能言之朱子曰今俗樂之譜入則合之為黄也􅦦則四之為大也􅖱則四上之為太也二則一下之為夾也二則一上之為姑也乛則上之為仲也厶則勾之為蕤也􅹆則尺之為林也則工下之為夷也乛則工上之為南也􅕶則凡下之為無也則凡上之為應也􅡊則六之為黄清也丌則五下之為大清也丌則五上之為太清也口則五𦂳之為夾清也黄韓邦奇曰合尺四工一六上配林太南姑應蕤勾即低尺也律吕正義旋宫之法黄鍾為六律之首大吕為六吕之首則黄鍾大吕宜得一聲止分清濁耳而燕樂書乃以黄鍾起合字大吕太簇共為四字既失律吕相配之義且據上下𦂳别之文則又似言絃音者嘗用縱黍横黍之尺制為黄鍾之管與今現行管樂相較横黍尺所制之黄鍾於簫應工字孔於笛應四字孔簫之工字孔與笛之四字孔名雖不同而聲則一縱黍尺所制之黄鍾於簫應乙字上字之間於笛應工字凡字之間夫燕樂書以黄鍾為合字其所謂黄鍾者既非横黍尺所制之黄鍾又非縱黍尺所制之黄鍾果何代尺度之黄鍾耶察其所配律吕之字葢以琴之一絃定頭管與笛之合字得徴分者誤為黄鍾之宫其餘諸聲字遂皆以律吕之名配之故十字與十二律吕案分不能均而考聲亦不能協也然所載十字雖分配十二律吕及四半律而勾為低尺合為低六四為低五是字雖有十而音實止於七固與五聲二變有相通者矣觀承案三代以下談樂者皆成畫餅以古樂既亡而今之俗樂其所謂字譜俗名工尺者又與律吕之宫商判然不相入無怪乎五聲六律徒為紙上之空言也宋史燕樂以字譜分配七音甚妙但以意牽合則未有確據正義此論始為不刋耳其以工字應宫凡字應商既皆平聲而以六字應角則古讀角為盧谷反正與同音而五字應變徴乙字應徴上字應羽則乙讀羽已反亦皆上聲至尺讀如車亦平聲而應變宫此字譜之所以可配七音也因是知爾雅以重敏經迭栁配五音者亦當以重配宫敏配徴經配商迭讀第配羽栁配角始為各得其實惜乎爾雅本文之尚有顛錯也論明太常樂章字譜明史張鶚言於世宗曰太常十六編鍾以五凡工尺上一四六勾合譜之黄鍾為合似矣其以大吕為下四太簇為髙四夾鍾為下一姑洗為髙一夷則為下工南吕為髙工之類皆以兩律兼一字何以旋宫取律止黄鍾一均而已世宗下禮官議禮官李時覆奏曰角鶚言甚合葢黄鍾一調以黄鍾為宮太簇為商姑洗為蕤賓為變徵林鍾為徴南呂為羽應鍾為變宮舊樂章用合用四用一用尺用工去蕤賓之均而越次用再生黄鍾之六此舊樂章之失也邇者沈居敬更協樂章林鍾一調用尺用合用四用一用工用六夫合黄鍾也四太簇之正聲也一姑洗之正聲也六黄鍾之子聲也以林鍾為宫而所用角徴羽皆非其一均之聲則謬甚矣自今宜用舊協音律惟加以蕤賔勾聲去再生黄鍾之六改用應鍾之凡以成黄鍾一均於感格之義深有所補乃命鶚更定樂章而逮治沈居敬吴氏鼐曰明代太常舊譜與宋燕樂字譜同既分髙低則不可以兩律兼一字病之矣張鶚欲易譜改字李時止欲其改聲協調良有以也均去蕤賔之均均字誤此黄鍾均之蕤賔何與蕤賔事太常舊樂章未為非也舊樂章用五音李時用七音一而已矣且舊樂章黄鍾之宫黄為宫為合黄下生林鍾林為徴為尺林上生太簇太為商為四太下生南吕南為羽為上南上生姑洗姑為角為一其於相生之法既已合矣而其次第曰黄太姑林南則君臣民事物大小之倫又未嘗不合也姑固當生應矣然姑既屬角角獨不可復生宫乎其終之以黄鍾之子聲則黄鍾起調黄鍾畢曲又何得議其越次也李時改以七音固合於祖孝孫之一宫二商三角四變徴五徴六羽七變宫之舊法但以黄鍾起調未見其黄鍾畢曲此葢知其一不知其二者也若沈居敬則洵不知曲調矣右五聲七音字譜五禮通考卷七十三
