body:
  text: 五禮通考卷四刑部尚書秦蕙田撰吉禮四圜丘祀天禮記王制有虞氏皇而祭陸德明釋文作皇音皇本又作皇夏后氏收而祭殷人冔而祭周人冕而祭注皇冕屬也畫羽飾也凡冕屬其服皆玄上纁下有疏皇與下冕相對故為冕屬案周禮有設皇邸又云皇舞皆為鳯凰之字鳯羽五采故云畫羽飾之周禮天官內宰中春詔后帥外內命婦始蠶於北郊以為祭服注蠶於北郊婦人以純陰為尊郊必有公桑蠶室焉疏仲春二月告后帥領外命婦諸臣之妻內命婦三夫人已下始蠶北郊蠶事既畢遂朱緑之玄黃之以為祭服也案月令三月后妃親東鄉躬桑此二月始蠶者亦謂浴種至三月臨生蠶之時又浴種乃生之故設文有異也禮記祭統王后蠶於北郊以供純服注純服亦冕服也互言之爾純以見繒色冕以著祭服子疏天子云純諸侯云冕冕祭服故知純亦是祭服天有衣色諸侯亦有衣色是其互也鄭氏之意凡言純者其義有二一絲傍才是古之緇字一絲傍屯是純字但書文相亂雖是緇字並皆作純月令季春之月后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服無有敢惰注后妃親採桑示率先天下也東鄉者鄉時氣也孟夏之月蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服注后妃獻繭者內命婦獻繭于后妃收繭稅者收于外命婦季夏之月令婦官染采黼黻文章必以法故無或差貸以給郊廟祭祀之服注婦官染人也黑疏染五色之采白與黑謂之黼與青謂之黻青與赤謂之文赤與白謂之章然必有舊法故事無得有參差貸變周禮天官典絲凡祭祀共黼畫組就之物注以給衣服冕旒及依盥巾之屬白與黑謂之黼采色一成曰就之疏言凡祭祀天地宗廟社稷山川之等故言凡以廣云共黼畫者凡祭服皆畫衣繡裳但裳繡須絲衣畫不須絲而言共絲者大夫以上裳皆先染絲則玄衣亦須絲為之乃畫故兼衣畫而言之也組就者謂以組為冕旒之就故組就連言之云之物者謂絲之物色共之夏官辨師掌王之五冕皆玄冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘注冕服有六而言五冕者大裘之冕蓋無旒不聨數也蕙田案郊特牲王被衮以象天戴冕璪十有二旒是大裘之冕即五冕之衮冕非别有一冕也鄭氏誤謂大裘不被衮又泥于大裘而冕之文不得已為有冕無旒之説不知有冕無旒玄冕也元冕祭羣小祀之服今乃服以祀天不亦悖乎禮記玉藻天子玉藻十有二旒前後邃延龍卷以祭注祭先王之服也馬氏晞孟曰冕之為物後方而前圓後仰而前俯有延在上有旒在下視之則延長察之則深邃冕止于五則大裘而冕與衮冕一矣蓋祀昊天則大裘而加冕享先王則服衮而已周官于祀昊天不言衮則用衮可知也記于龍衮言以祭不言所祭則昊天先王可知也蕙田案馬氏謂龍卷以祭兼昊天先王極是可正鄭氏之謬周禮天官司裘掌為大裘以共王祀天之服注鄭司農云大裘黑羔裘服以祀天示質侈疏言大者以其祭天地之服故以大言之非謂裘體大則義同于大射也先鄭知大裘黑羔裘者祭服皆玄上纁下明此裘亦羔裘之黑者故知大裘黑羔裘又云服以祀天示質者以其衮已下皆有采章為此大裘更無采章故云質案鄭志大裘之上又有玄衣與裘同色亦是無文采鄭氏鍔曰掌為大裘以祀天與特牲之文不協然記禮之言衣裘皆為有衣以為裼裼覆也為其褻故必覆之其説以為表裘不入公門入公門尚不敢况敢表裘以祀天乎冬至之祀以寒故服裘于裘之上則被衮衣裘被衮則同一冕故司服掌王之服六而冕有五然則特牲言被裘周禮言大裘雖若不協其實一也記禮者有不敢服裘而被冕之義則大裘不裼之文又有大裘冕無旒之論皆不足據也方氏苞曰他職曰祀五帝旅上帝獨此云祀天者明此服本共圜丘之祭非四郊所通用也夏秋迎氣無服裘之理况方澤乎自公彥引孝經緯鈎命訣謂祭地亦服大裘歷代難之議禮者莫能辨不知此公彥之臆説耳孝經緯鈎命訣亦無是也彼稱祭地之禮與天同謂其尊同牲玉之數拜獻之節不異耳玉幣以隂陽異色則裘服亦以寒暑異施可知矣且舍大裘其餘冕服皆同亦不害其為衣服之同也屨人職凡四時之祭祀以宜服之况裘冕乎蕙田案中庸齊明盛服以承祭祀盛服謂冕服也春官司服掌五冕自衮以下公侯至卿大夫以次服之寧有助祭者服衮冕而主祭之天子服玄冕乎大裘而冕者祭莫大于昊天先王而宗廟時享在四仲之月禘以孟夏祫以孟冬大饗在季秋祈在春夏祭地在夏至祀五帝以迎氣時皆非嚴寒不必用裘惟圜丘祀昊天上帝在冬至之日詩所稱一之日觱發者也周之都在西北圜丘之壇在南郊祭之時在平旦其霜風凛冽較之祭于屋下為更甚故司裘特制大裘以為祀天之服蓋専為冬至南郊設而他祭不用也云大裘而冕見雖服大裘而必戴冕冕與衮相稱王之冕以衮為盛戴冕則被衮可知禮意甚明若冕而不衮成何體制豈所謂盛服者耶康成拘泥裘冕衮冕句法遂創為有冕無旒裘上有玄衣之説後世難以信從異説紛起踵訛襲繆至有盛暑服裘必不可行而廢親祀者惟宋陸農師謂禮不盛服不充故大裘襲可知王被衮以象天則大裘襲衮可知大裘襲衮則戴冕繅十有二旒可知説最直截而鄭剛中陳用之闡發詳盡可以正注疏之謬而為千萬世之凖繩也又案鄭氏謂大裘之上有玄衣夫玄衣乃無旒玄冕之衣康成誤看大裘而冕似裘之外更無衣而但有冕遂用無旒之玄冕以附會于尚質之説今有因無旒之冕即是玄冕遂併玄衣而附會之以加于大裘之上不知其已同于卿大夫助祭之服也夫裘之外有衣則郊特牲之説信矣既知裘之外必有衣則奚為不被衮戴冕而憑臆穿鑿至是耶春官司服祀昊天上帝則服大裘而冕注鄭司農云大裘羔裘也六服同冕者首飾尊也亦疏冕名雖同其旒數則有異蕙田案疏冕名雖同旒數有異其説甚詳見後鄭氏鍔曰羔裘無經緯之文而有純一之質無繡繪之巧而有自然之體謂之大者惟天體為甚大故以名祀天之裘惟大裘之上襲之以衮故記衮謂之被言被之于其上祀天宜尚質反被以衮者蓋陶匏稿秸圜丘掃地雖主乎質鎮圭之繅以藉龍旗之日月四圭之邸六變之樂又主乎文內盡質外盡文以盡事天之道凡冕之制版廣八寸長倍之前圓後方後仰前俯飾之布上玄下朱圓其前而俯之向明與物交之義方其後而仰之向晦與物藏之義上玄以象天道之升下纁以象地道之降名之曰冕言當俯以致敬之義蔡氏德晉曰冕冠也古者衣冠相配故衣與冕同稱也大裘而冕者服大裘衮衣襲而不裼而首則戴冕繅十有二旒也十二章者虞書日一月二星辰三山四龍五華蟲六皆繪于衣宗彛七藻八火九粉米十黼十一黻十二皆繡于裳祀天于冬至服大裘其祀五帝惟立春為然餘則但服大裘外之衮衣而已至夏秋則其衣亦當以紗為之但仍備十二章之制也禮記郊特牲王被衮以象天注謂有日月星辰之章此魯禮也周禮昊天上帝則大裘而冕戴冕璪十有二旒則數也天之大數不過十二家語郊問天子大裘以黼之被裘象天服衮戴冕璪十有二旒則天數也注大裘為黼文也言被之大裘有象天之文故被之道路至太壇而脫之陳氏禮書周官司裘掌為大裘以共王祀天之服司服祀昊天上帝則服大裘而冕禮記曰郊之祭王被衮以象天然則合周官禮記而言之王之祀天內服大裘外被龍衮龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不充故大裘不裼則襲衮可知也議者以司裘言大裘祀天而不及衮司服言大裘而冕祀昊天上帝在袞冕之上又節服氏衮冕六人維王之大常裘冕二人執戈送逆尸是衮冕與裘冕不同謂之大裘而冕則不加衮是不知先王祀天以冬至之日為正而裘又服之本也故取大裘以名之猶之朝服緇衣羔裘而詩獨稱羔裘如濡羔裘豹祛羔裘逍遙燕服元端蠟服黃衣皆狐裘而詩獨稱狐裘以朝狐裘蒙茸狐裘黃黃則裘之上未嘗無衣也裘之上未嘗無衣而衣之下有不用裘故屨人曰凡四時之祭祀以宜服之則凡春夏秋之祀不必服裘所以適時之宜而已由是觀之衮冕以維太常者不必有裘裘冕以送逆尸者必有衣也記曰尸襲而不裼送逆尸者象之則裘冕加衮又可知也古者犬羊之裘不裼必襲之也表裘不入公門必裼之也是裘有裼之而不襲有襲之而不裼未有表之而不裼襲者則徒服大裘而無襲非禮意也鄭志謂大裘之上又有玄衣此尤無據也夫先王祀天有文以示外心之勤有質以示外心之敬故因丘掃地陶匏稿鞂疏冪樿杓素杓素車之類此因其自然以示內心之敬者也執鎮圭繅藉五采五就旗龍章而設日月四圭有邸八變之音黃鐘大吕之鈞此致其文飾以示外心之勤者也然則內服大裘以因其自然外被龍衮戴冕璪以致其文飾不以內心廢外心不以自然廢文飾然後事天之禮盡矣楊氏復曰司服王祀昊天上帝則大裘而冕先鄭後鄭注皆云大裘之上又有元衣何也玉藻曰君衣狐白裘錦衣以裼之君子羔裘豹褎緇衣以裼之狐裘黃衣以裼之論語曰緇衣羔裘素衣麑裘黃衣狐裘裘之上未嘗無衣裘而無衣則近于褻矣凡衣必象裘色凡冕服皆元上纁下大裘者黑羊裘也元衣之下用黑羊裘取其同色也凡冕服皆元上纁下何也易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾為天其色元坤為地其色黃但土旺于季夏南方屬火其色赤黃而兼赤為纁故裳用纁也玉藻曰衣正色裳間色鄭注云謂冕服元上纁下是也自黃帝始備衣裳之制舜觀古人之象繪日月星辰山龍華蟲于衣繡宗彛藻火粉米黼黼于裳凡十二章歷代皆然至周而又備繅旒之數郊特牲曰祭之日王被衮以象天戴冕繅十有二旒則天數也自衮冕而下享先公則鷩冕者不敢以天子之服臨先公也祀四望山川則毳冕祭社稷五祀則絺冕不敢以至尊之服施于所卑也周禮春官司服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自絺冕而下如子男之服卿大夫之服自玄冕而下如孤之服凡大祭祀共其衣服而奉之注自公之衮冕至卿大夫之玄冕皆其朝聘天子及助祭之服雜記云大夫冕而祭于公鄭氏鍔曰上公九命服衮其章九王亦被衮何為公與王同余謂學經者當因經文求先王之制不當信傳注以害先王之制日月星辰登於旌旗王與公同服九章之衮者其説出於鄭康成六經無見也自後諸儒莫能辨正今以此經文質之其理自明且子男之服自三章之毳冕而下如侯伯則上不服鷩冕可知侯伯之服自五章之鷩冕而下如公則上不服衮服可知公之服自衮冕而下如王則其上不服日月星辰可知經文謂自衮冕而下如王之服則衮服而上之章非日月星辰而何有日月星辰則王服十二章明矣若夫同服九章非唯君臣無别又且與經文之言不合聶氏三禮圖大裘冕無旒冕廣八寸長一尺六寸上玄下纁以綎覆飾之其板側則不用金飾有紐玉簪導以組為纓色如綬衣服令云大裘以黑羔皮為之玄領褾緣朱裳白紗中單皂領青褾襈裾革帶玉鈎䚢大帶黻鹿盧玉具劍火珠鏢首白玉雙珮玄組雙大綬六采玄黃赤白縹緣純玄質長二丈四尺五寸首廣一尺朱襪赤舄祀天神地祗則服之陳氏禮書梁五經博士陸緯等大裘之制宜以黑繒為之其制或如裘其裳以纁皆無文繡冕則無旒隋始詔虞世基等憲章古制定輿乘服合八等案周禮大裘之冕無旒其服羔裘也凖禮闕以羔正黑者為之取同色繒以為領袖其裳用纁而無章飾綘襪赤舄祀圜丘感帝封禪五郊明堂雩祀皆服之今文大裘冕無旒冕廣八寸長一尺六寸深青表纁裏金飾玉簪導以組為纓色如其綬裘以黑羔皮為之黑領褾緣朱裳蕙田案自梁及隋唐後皆服黑羔裘無衣玄冕無旒仍注疏之謬也至宋神宗從陸佃之議服裘被衮而後先王之制度復明甚矣議禮之難而儒者考訂之功不可忽也附辨鄭氏王服九章周禮春官司服鄭注古天子冕服十二章至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章衮五章裳四章凡九鷩衣三章裳四章凡七毳衣三章裳二章凡五希衣一章裳二章凡三玄衣無文裳刺黼而已章禮記王制有虞氏皇而祭注有虞氏十二章周九夏殷未聞三公一命卷注虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服楊氏復曰先儒謂大裘之上有玄衣玄衣之上有十二章周止九章其説皆非是愚即司服經文孰讀而詳玩之則知有虞氏十二章周亦十二章昭然甚明公之服自衮冕而下侯伯之服自鷩冕而下夫衮冕九章鷩冕七章公之服自衮冕而下推而上之則天子之服有日月星辰之章可知公之服九章則天子之服十二章可知此不待旁引别證而知鄭説之非矣舜曰余欲觀古人之象蓋十二章自日月星辰而下從古而然矣孰謂禮樂大備於周而獨不然乎郊所以明天道取象非一端也冬至圜丘大裘而冕則天之時也席用稿秸器用陶匏則天之質也服有日月星辰之章則天之明也璪有十二旒則天之數也鄭氏乃謂有虞十二章至周而以日月星辰畫於旌旗冕服唯有九章然公自衮冕而下王又自衮冕而下君臣同冕略無區别必無是理賈公彥疏云鄭氏九章此無正文並鄭以意解之則疏家已知其非而不信之矣唯其並以意解故後世遵用其説始有悟其上下之亡等尊卑之失次者魏明帝以公卿衮衣黼黻之制疑於至尊遂制天子服繡衣公卿服織文矣唐長孫無忌以帝祭社稷服絺冕四旒三章祭日月服玄冕三旒衣無章而三公亞獻服衮孤卿服毳鷩貴賤無分而天子遂止於服衮他冕盡廢者矣先王制禮必本天理人情之公自上古至於周天子仰則天數路十二就常十二斿馬十二間圭尺二寸繅十二旒而冕服之章莫不皆然鄭氏謂周以日月星辰畫於旌旗故冕止九章不知龍登於旗山登於爼黼登於扆九章亦可損乎前乎康成如漢明帝用歐陽説義天子備十二章三公諸侯用山龍九章九卿以下用華蟲七章其説猶用周制也自鄭氏以意解經九章之説於是乎始故行之後世卒有不厭於人心并與古制而去之者可勝歎哉林氏之竒曰夫子於四代禮樂特曰服周之冕取其文之備尊卑之有辨也何得至周反去三辰之飾蓋不過據左氏三辰旗旗之文左氏謂旗有三辰何嘗謂衣無三辰耶又謂上公九章而王亦九章將何所别周公制禮防亂萬世乃至於無别與郊特牲云祭之日王被衮以象天則十二章備鄭氏謂有日月星辰之章此魯禮也夫被衮以象天周制固然也何魯之足云豈有周制止九章魯乃加以十二之理乎劉氏執中曰書稱舜曰豫欲觀古人之象日月星辰山龍華蟲作繪宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明舜而欲觀乎古則衣裳之章十有二其來逺矣周之禮樂因于虞夏者衆矣鄭康成見司常之職云日月為常則謂周人以日月星辰畫于旌旗而冕服九章登龍于山登火于宗彛非也且交蘢為旗周之衣不去其龍矣熊虎為旗周之裳不去其虎蜼矣何獨日月為常而去衣章日月星辰乎案周禮典命之職上公九命為伯其國家宮室車旗衣服禮儀皆以九為節則其衣裳九章推而上之天子袞冕十有二章明矣蕙田案諸家破鄭氏周衮九章之説當矣衮既十二章差次以降則鷩當九章毳當七章絺當五章玄當三章其諸侯于天子降殺以兩上公雖與天子同衮冕而服止九章冕止九旒以此推之則侯伯鷩冕者服七章冕七旒子男毳冕者服五章冕五旒孤絺冕者服三章冕三旒卿大夫玄冕者服一章冕無旒即辨師所謂諸侯及孤卿大夫之冕各以其等為之是也附辨注疏諸家冕旒玉數夏官辨師鄭注冕服有六而言五冕者大裘之冕蓋無旒不聨數也鄭氏鍔曰王之吉服六服每一冕則宜六冕今止五冕者禮圖以大裘之冕無旒陸佃云大裘襲衮則戴冕繅十有二旒大裘與衮同一冕故服六而冕五此説得之馬氏睎孟曰記言龍衮以祭不言所祭則昊天先王可知也先儒有云大裘無衮而其冕無旒不知何據陸氏佃曰諸侯九斿則上公十二斿可知辨師賈疏經云九就當上公以九為節故知是公蕙田案辨師諸侯之繅斿九就注云侯當為公緣下文别見諸侯故此當為公山陰乃因諸侯九斿之文謂上公應十二斿誤矣上公亦人臣何得與天子無區别耶鄭氏鍔曰凡冕天子皆十二旒諸侯皆九旒故記曰天子十有二旒諸侯九而辨師云諸侯九就諸侯蓋通稱蕙田案如鄭剛中説則五冕同旒毫無分别實止一冕耳周禮何以稱五冕耶此不足信辨師鄭注孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫繅再就用玉八王昭明冕斿命數圖曰王五冕並十二旒二王後王朝三公加為二伯九命衮冕九旒侯伯加為九州牧王朝三公八命山八旒侯伯七命鷩冕七旒王朝之卿六命火六旒子男五命毳冕五旒附庸王朝大夫及大國之孤四命藻四旒王朝上士大國次國之卿三命希冕三旒王朝中士大國次國大夫再命玄冕二旒又曰舊説鷩冕九旒毳冕七旒絺冕五旒玄冕三旒非也蔡氏德晉曰案諸侯之服其章數皆依命數而侯國諸臣之服不隨命數為章數故孤四命而希冕三章卿大夫有三命再命之異而玄冕無服則同服也再命乃受服子男之大夫一命其士不命公侯伯之士皆一命俱未受冕服而服皮辨其色如爵所謂爵辨也然則王朝諸臣之服經雖不見以義推之其出封皆加一等以四命之服而服三章之希冕例推之則王之三公八命必服七章之鷩冕卿六命服五章之毳冕大夫四命服三章之希冕士之三命再命同服無章之玄冕可知也一命之士未受服則但服爵辨矣而鄭康成王昭明乃為八旒六旒四旒二旒諸服之説不亦鑿乎蕙田案禮數降殺皆以兩則章數旒數依先儒陽數之説為是王昭明非之誤矣且如圖説有所謂山八旒火六旒藻四旒者則通大裘之冕共為九冕而周禮五冕之説亦不行矣敬齋駁之甚當其説不可易王氏應電曰經文五采繅十有二就是五冕之繅其數無不同也又云皆五采玉十有二是五冕之玉皆一百四十四枚矣諸公之繅斿九就瑉玉三采所異者此耳繼之云其餘如王之事則每旒玉十二並無九玉之説蓋冠之長尺玉之間十有二玉為尺有二寸故能垂之以蔽目少短則不足以蔽目矣此正如樂舞之數以其每佾八人故佾之字從八乃謂每佾人數如其佾數士之四人豈足以成樂舞乎故侯伯之繅斿七就其餘如公之事亦每旒玉十有二子男繅斿五就其餘如侯之事孤繅斿四就卿三就大夫再就小國之卿再就其每旒亦皆十有二旒為目而設止有前旒惟延則有前後玉藻之文可見蕙田案天子五冕旒數減而玉數不減諸侯五冕旒數減而玉數亦減天子雖有九旒七旒五旒三旒之别而每旒之玉皆十二諸侯以下之冕則九旒者九玉七旒者七玉五旒者五玉而玉又用瑉也王昭明旒必十二玉之説非是又據玉藻之文而謂旒有前無後亦拘而鑿陳用之曰漢制天子繅旒前長後短諸臣繅旒有前無後非古也右服冕周禮春官巾車一曰玉路錫樊纓十有再就建大常十有二斿以祀注王在焉曰路以玉飾諸末錫馬而當盧刻金為之所謂鏤錫樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸士喪禮下篇曰馬纓三就禮家説曰纓當胸以削革為之三就三重三匝也玄謂纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也太常九旗之畫日月者正幅為縿斿則屬焉事疏云以祀者以下諸路皆非祭祀之外內大小祭祀皆用此一路而已鄭氏鍔曰玉者陽精之純可以交三靈故以玉飾路所駕之馬錫以昭其聲樊纓十有再就以昭其文所建者太常象天之明斿十二合天之之大數祀天則乘所以極其尊也陳氏禮書司常日月為常覲禮天子乘龍載大旗象日月升龍降龍郊特牲旗十有二旒龍章而設日月左傳曰三辰旗旗昭其明也然則常有三辰升龍降龍設崇牙備弧矢飾之以旄垂之以鈴人臣有功則書于其上左傳曰錫鸞和鈴爾雅曰有鈴曰旗書曰厥有成績紀于太常觀此則太常之制可知矣方氏苞曰此職及司常大司馬皆曰王建太常則諸侯以下不得建明矣而大行人九斿七斿五斿皆曰建常何也旗常者徽幟之通稱也故司常掌九旗之物名而統之曰常春秋傳三辰旗旗昭其明也太常而外無畫三辰者而統之曰旗則知旗常可互稱而太常則唯天子建之矣蕙田案五路所建旗亦以大概差等言之其實天子五路皆得建太常也觀治兵大閲王乘戎路而建太常可見又案禮記載魯君祀帝于郊有日月之章蓋僭禮也三辰惟畫于太常又唯天子得用之耳天子五路雖俱得建太常而以祀事為重故秦以下掌祭祀者曰太常卿亦以見掌天子祀事之意禮記禮器大路繁纓一就注殷祭天之車也雕疏殷猶質以木為車無别飾乘以祭天謂之大路也繁謂馬腹帶也纓鞅也染絲而織之曰罽五色一匝曰就就成也言五色匝一成車既朴素故馬亦少飾止一就也大路素注明堂位曰大路殷路也郊特牲乘素車貴其質也旗十有二旒龍章而設日月以象天也注設日月畫于旗上素車殷路也變疏旗十有二旒象天數十二也龍為陽氣化日月以光照下皆是象天也卷冕路車可陳也而不可好也注衮冕路車尊嚴不可尋常乘服以為榮好也丹漆雕幾之美素車之乘尊其朴也注雕為刻鏤幾謂沂鄂言尋常車以丹漆雕飾之以為沂鄂而祭天以素車之乘者尊其朴素周氏諝曰乘素車者言殷之郊禮也先儒以為魯公之郊用殷禮則非也方氏慤曰此與周禮不同者容泛記前代之禮耳楊氏復曰案巾車一曰玉輅以祀郊特牲曰乘素車禮器曰大路素而越席二説不同夫子答顔淵曰乘殷之輅蓋素車者殷輅也飾以金玉者周制郊特牲禮器疏以素車為殷輅其言蓋有所據使周亦乘素車則孔子不曰乘殷之輅矣陸氏佃曰周禮祭天王乘玉輅建太常郊特牲祭天王乘素車建大旗則祭天之禮有兩旗兩車也蓋乘玉輅建太常者即道之車也祭之日馭以適郊乘素車建大旗者即事之車也祭之時馭以赴壇何以知其然也曰巾車王之玉輅錫樊纓十有再就建太常十有二斿以祀則凡王之祭祀無所不乘矣祭天者禮之至也而乘泛祭之玉輅以祭之以物則非文以志則非敬非禮意故知乘素車建大旗以祀之而玉輅者乘之以適郊固有兩車也雖然車旗之有兩非特祭天也四時之田王乘戎路建太常而巾車之職曰木路前樊鵠纓建大麾以田則田之車旗亦以兩蓋乘木路建大麾者即道之車也與王乘玉路建太常同意乘戎路建太常者即事之車也與王乘素車建大旗同意郊特牲言乘素車在被衮之後則所謂乘素車建大旗以即壇明矣凡此皆周制也陳氏禮書禮言玉路以祀又言素車之乘蓋王之祀天自國至大次則乘玉路自大次以升壇則乘素車猶之聽祭報以皮辨及祭則服大裘冕也蕙田案諸家論祭天車旗不同當以陸氏陳氏之説為是周氏楊氏以為殷禮則郊特牲上文明以周貫下何緣此處忽入殷禮云使周亦乘素車則孔子不曰乘殷之輅夫三正通於民間則周亦有夏時子在齊聞韶則周亦有韶舞特未廣於天下耳周有殷輅似不足疑况祭天尚質素車安知非陶匏稿秸之意乎至鄭氏以為魯禮則魯無稱王之事孔氏乃謂魯用王禮亦得稱王斯益悖矣右車旗禮記郊特牲卜郊受命于祖廟作龜于禰宫尊祖親考之義也注受命謂告之退而卜如疏郊祀既尊不敢専輒故先告祖後乃卜郊受命也故禮器云魯人將有事于上帝必先有事于頖宫是也作灼也禰宫禰廟也先告祖受命又至禰廟卜之也方氏慤曰卜郊蓋指用辛之郊耳以其有上辛中辛下辛故周郊以日至而大宰于祀大神示言卜日者崔氏謂卜日以至為主不吉乃用他日理或然也蕙田案郊用冬至無庸卜日此所言亦魯禮耳然告廟擇士天子亦當有之姑存其説至周禮所云卜日皆兼他祭為文原不専指郊天言周禮春官肆師凡祭祀之卜日宿為期詔相其禮注宿先卜祭之夕齊疏言凡祭祀之卜日謂天地宗廟之等將祭前有散七日致齊三日十日矣若然卜日吉則齊今云祭祀之卜日宿為期則是卜前之夕與卜者及諸執事者以明旦為期也云詔相其禮者謂肆師詔告相助其卜之威儀及齊戒之禮天官大宰前期十日帥執事而卜日注執事宗伯大卜之屬疏大宰率宗伯大卜之屬執事之人而卜日四時迎氣冬至夏至郊天等雖有常時常日猶須審慎仍卜日故表記云不犯日月不違卜筮注日月謂冬夏至正月及四時也所不違者日與牲尸也假令不吉改卜後日故針膏肓云天子郊以夏正上旬之日魯之卜三正下旬之日是雖有常時常日猶卜日也春官大宗伯凡祀大神率執事而卜日疏祭前十日大宗伯先帥執事有事于祭者共卜取吉日乃齊大史大祭祀與執事卜日注執事大卜之屬與之者當視墨大卜大祭祀則眂髙命龜注命龜告龜以下卜之事龜人祭祀先卜注祭祀先卜者卜其日與其牲元謂先卜始用卜筮者言祭言祀尊焉天地之也祭疏天稱禋祀地稱血是天地稱祭祀禮記表記昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝是故不犯日月不違卜筮注日月謂冬夏至正月及四時也所不違者日與牲尸也右告廟卜周禮天官冢宰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒祀大神示亦如之注既卜又戒百官以始齊大神示謂天地神疏遂戒者謂祭前十日遂戒百官使散齊致齊祀大謂冬至祭天于圜丘此天謂大天對五帝為小天也劉氏迎曰誓戒者誓其所當戒者也具修者特具之所當修使無闕事也如所謂視滌濯贊牲事贊玉幣爵之事皆百官所當修具方氏苞曰冡宰司徒所涖祀事皆首五帝者四時迎氣之祀且涖則昊天上帝不必言矣知然者宗伯以吉禮祀邦國之鬼神示首曰以禋祀祀昊天上帝小宗伯兆五帝於四郊司服職祀昊天上帝則服大裘而冕祀五帝亦如之參互其文則其義顯然矣蕙田案經文明言大神示亦如之大神示即圜丘方澤也秋官大司冦若禋祀則戒之日涖誓百官戒于百族疏云戒之日者謂前期十日卜吉即戒之使散齊云涖誓百官者謂餘官誓百官之時大司冦則臨之云戒于百族者大司冦親自戒之其百官所戒者當太宰為之是以太宰云祀五帝前期十日帥執事而卜日遂戒故知太宰戒百官也若然太宰云祀五帝則掌百官之誓戒太宰雖云掌百官誓戒戒則親為之誓則掌之而不親誓何者此司冦卑於太宰此云涖誓百官豈司冦得臨太宰乎故知太宰掌之餘小官誓之司冦臨之也地官遂師凡國祭祀審其戒誓春官太史戒及宿之日與羣執事讀禮書而協事秋官條狼氏凡誓執鞭以趨于前且命之禮記明堂位各揚其職百官廢職服大刑周禮秋官司士凡祭祀掌士之戒令詔相其法事禮記射義天子將祭必先習射于澤澤者所以擇士也已射于澤而後射于射宮射中者得與于祭不中者不得與于祭不得與于祭者有讓削以地得與于祭者有慶益以地進爵絀地是也古者天子諸侯歲獻貢士于天子天子試之于射宮其容體比于禮其節比于樂而中多者得與于祭其容體不比于禮其節不比于樂而中少者不得與于祭通典祭前期十日王親戒百官及族人太宰又總戒羣官乃習射于澤宮選可與祭者禮器舉賢而置之聚衆而誓之郊特牲卜之日王立于澤親聽誓命受教諫之義也注澤澤宮也所以擇賢之宫也既卜必到澤宮擇可與祭祀者同誓敕之以禮也禮器曰舉賢而置之聚衆而誓之是也呼疏澤澤宮也王在于澤宮中于其宮以射擇士故因為澤宮也王卜已吉又至澤宮射以擇賢者為助祭之人故云王立于澤也禮器云舉賢而置之是也然王者獵在囿而主皮射亦在澤故鄭注鄉射記引尚書傳主皮射陳于澤然後卿大夫相與射也又云嚮之取也于囿中勇力之取也今之取也于澤宮揖讓之取也澤習禮之處親聽誓命者因于澤宫中又使有司誓敕舊章齊戒之禮王又親聽受命故禮器云聚衆而誓之是也蕙田案澤宮陸農師以為學宮是也此王立於澤宮親聽誓命正禮器魯人將有事於上帝必先有事於頖宮之謂也獻命庫門之內戒百官也太廟之命戒百姓也注王自澤宫而還以誓命重相申敕也庫門在雉門之外入庫門則至廟門外矣太廟祖廟也百官公卿以下也百姓王之親也入廟戒親親也王自此還齊路寢之室庫或為廄百疏王自澤宮而還至欲致齊之時有司獻王所以命官之事王乃于庫門之內戒百官太廟之內戒百姓百官疏故在公朝重戒之百姓王之親屬故在太廟而重戒之又曰以上有百官之文故以百姓為王之親也王親謂之百姓也者皇氏云姓者生也並是王之先祖所生云王自此還齊路寢之室者卜法必在祭前十日祭義云散齊七日致齊三日又云七日戒三日齊鄭既云王自此還齊路寢之堂則此經戒百官百姓則祭前三日欲致齊之時以誓命重相申敕也陳氏禮書戒者敕以事誓者告以言士師五戒而誓居其一則戒之中有誓而誓則明其戒而已周禮百族郊特牲百姓儀禮所謂子姓兄弟之類是也澤郊學也誓于澤即其所擇而誓也庫門象法之所在戒百官于此所以謹之也太廟先祖之所在戒百姓于此所以親之也掌之以太宰重其事也協之以太史正其禮也涖之以司冦肅其職也然古者用刑之法常恕以寬誓人之詞常嚴以峻故軍旅之誓曰孥戮汝無餘刑祭祀之誓曰服大刑明堂位之所言者誓百官之詞也條狼氏所謂殺轘鞭墨者誓其屬之辭也凡欲齊莊謹肅而已孰謂其法太苛哉考之月令教習田獵整設于屏外司徒搢撲北面誓之聘禮誓于其境賔南面上介西面衆介北面史讀書司馬執策立于其後鄭氏曰史于衆介之前北面讀誓以敕告士衆然則祭祀之誓亦應如此古之讀誓者史官耳太史戒及宿之日讀禮書而協事是也唐制太尉讀誓非古也今猶襲之右誓戒擇士周禮天官膳夫王齊日三舉疏齊謂散齊致齊齊必變食故加牲體至三太牢史氏浩曰當不飲酒不茹葷之時懼其日力之不足則不能勝祭事故三舉以助之非謂盛殺而供也王氏應電曰齊之日宜沖淡以養其精誠故不飲酒不茹葷不聽樂舉則酒侑食故齊則不舉與下文類相從薑氏兆錫曰王齊則不舉但不殺牲盛饌用樂耳非必斷膳素食如後世之為也蕙田案疏謂日用三太牢侈靡非齊所宜王昭明薑上均移改經文終覺未安史氏之説近是玉府王齊則供食玉注玉食陽精之純者食之以禦水氣鄭司農云王齊當食玉屑春官鬯人凡王齊共其秬鬯注給洗浴浴疏鄭知王齊以鬯為洗以其鬯酒非如三酒可飲之物明此亦給王洗浴使之香美也禮記祭統及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則于物無防也耆欲無止也及其將齊也防其邪物訖其耆欲耳不聽樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不苟動必依於禮是故君子之齊也専致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也春秋成十七年穀梁傳宮室不設不可以祭疏宮室謂郊之齊宮荀子端衣玄裳絻而乘路志不在于食葷陳氏禮書周官司服其齊服有玄端記曰齊之玄也以陰幽思也又曰玄冕齊戒鬼神陰陽也又曰太古冠布齊則緇之蓋太古之齊冠以緇後世齊冠以玄天子齊則玄冕玄端所謂端衣玄裳絻而乘路是也右齊周禮春官太史大祭祀戒及宿之日與羣執事讀禮書而協事注協合也合謂習録所當共之事也之疏戒謂散齊七日宿謂致齊三日當此二日時與羣執事預祭之宫讀禮書而協事恐事有失錯物有不供故也天官小宰以法掌祭祀之戒具注法謂其禮法也戒具戒官有事者所當供宰夫以式法掌祭祀之戒具疏言式法者祭祀大小皆有舊法式依而戒飭使共具之掌次掌王次之法以待張事王大旅上帝則張氊案設皇邸注法大小丈尺大旅上帝祭天于圜丘國有故而祭亦曰旅此以旅見祀也張氊案以氊為牀于幄巾鄭司農云皇羽覆上邸後版也元謂後版屏風與染羽象鳯皇羽色以為之陳氏禮書案所據之案邸所宿之邸次氊與皇羽者皇德之象德不稱此不足以格上帝也魏氏校曰經文百職多互舉言有故祭則常祭可知也通典掌次于丘東門外道北設大次小次次謂帷幄初往所止居小幄接祭退俟之處祭義曰周人祭日以朝及暗雖有強力孰能支之是以有退俟與諸臣代有事焉幕人凡祭事共其帷幕幄帟綬注皆以布為之四合象宫室曰幄王所居之帳皆以繒為之凡四物者以綬連繫焉共之者掌次當以張疏帷在傍施之象土壁也幕則帳上張之象屋舍也幄則帷幕之內設之帟者在幄之內承塵綬絛也掌次凡祭祀張其旅幕張尸次注旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農云尸次祭祀之尸所居更衣帳疏祭祀言凡者天地宗廟外內祭祀皆有羣臣助祭其臣既多不可人人獨設故張旅幕旅衆也謂衆人共幕諸祭皆有尸尸尊故别張尸次鄭云即位所祭祀之門外以待事者若宗廟自有廟門之外若外神于郊則亦有壝宫之門門外並有立位司農云更衣帳者未祭則常衣至祭所乃更去常服服祭服也故言更衣春官大司樂大祭祀宿縣疏舉大祭祀而言其實中祭祀亦宿縣也宿縣者皆于前宿預縣之遂以聲展之注叩聽其聲以知完不大胥凡祭祀之用樂者以鼓徴學士疏祭祀言凡者則天地宗廟之祀用樂舞之處以鼓召學士選之當舞者往舞焉地官封人凡祭祀飾其牛牲設其楅衡置其絼共其水稿注飾謂刷治潔清之也鄭司農云楅衡所以楅持牛也絼著牛鼻繩所以牽牛者今時謂之雉與者名同皆謂夕牲時也杜子春云楅衡所以持牛令不得抵觸人元謂楅設于角衡設于鼻如椵狀也水稿給殺時洗薦牲也一疏言凡祭祀謂王之天地宗廟先大次小之祭祀非故云凡以廣之云飾其牛牲者祭祀尚潔淨故飾治使淨也設其楅衡者恐抵觸人故須設楅于角牽時須易制故設衡于鼻置絼當牽行故亦置之于鼻也須洗薦牲體故共其水稿也陳氏禮書封人飾牛牲小子凡沈辜侯禳飾其牲羊人凡祭祀飾羔校人飾幣馬凡將事于四海山川飾黃駒曲禮曰飾羔雁者以繢莊周曰犧牛衣以文繡漢儀夕牲被以絳然則羊人飾羔曲禮所謂飾以繢也校人飾黃駒猶傳所謂文馬也則凡牲無不飾矣鄭氏以飾為刷治潔清之然則刷治潔清之非所謂飾封人非掌牛而飾牛者牛土畜也使飾土畜因其類也又曰詩曰秋而載嘗夏而楅衡毛氏曰楅持牛也絼著牛鼻以牽者鄭康成曰楅設于角衡設于鼻又曰楅衡其牛角為其觸抵人也蓋楅衡以木為之橫設於角則楅幅其角猶射以楅幅其矢也絼則少儀祭統所謂紖也康成于詩合楅衡以為一于禮離楅衡以為二是自惑也牛人凡祭祀共其牛牲之互與其盆簝以待事注盆簝皆器名盆所以盛血簝受肉籠也互若今屠家懸肉格得疏始殺解體未薦之時且懸于互待解訖乃薦之故有互以懸肉也陳氏禮書鄭司農謂互楅衡之屬鄭康成謂互若今懸肉格楚茨詩曰或剝或亨或肆或將毛氏曰或陳于牙或齊于肉蓋互牙古字通用掌舍設梐枑條閭氏掌比國中宿互者互行馬也肉格謂之互蓋其制類此鄭司農以為楅衡之屬非是右戒具陳設周禮天官太宰及執事眂滌濯注執事初為祭事前祭日之夕滌濯謂溉祭器及甑甗之屬祭疏及猶至也謂致祭前日太宰眂滌濯案小宗伯大祀眂滌濯大宗伯亦云宿眂滌濯彼二官親眂滌濯大宰尊親往涖之蕙田案及猶與也謂祭前一夕與執事之人視滌濯耳執事指宗伯宰夫等言宰夫從大宰而眂滌濯春官大宗伯凡祀大神宿眂滌濯涖玉鬯詔大號治其大禮詔相王之大禮注滌濯溉祭器也玉禮神之玉也大號六號之大者以詔大祝以為祝辭治猶簡習也預簡習大禮至祭當以詔相王清疏云宿眂滌濯者謂祭前一宿視所滌濯祭器看潔與否詔大號者謂大宗伯告大祝出祝辭也云治其大禮者謂天地人之鬼神祭禮王親行之為大禮對下小宗伯治小禮為小也詔相王之大禮者謂未至之時詔告之及其行事則又相之云滌濯溉祭器也者此滌濯是蕩滌以少牢有溉祭器故據而言之概即拭也云玉禮神之玉也者即蒼璧黃琮青圭赤璋之等及四圭兩圭之類皆是禮神置于神坐也案九嬪職云贊玉齍注云玉齍玉敦盛黍稷與此注玉為禮神之玉齍即非玉敦所飾注不同者彼九嬪所贊贊后設之據宗廟宗廟無禮神玉則玉齍不得别解故為玉敦此據天地為主有禮神玉故與齍别釋也涖臨視也直視看而已下云奉據手執授王故云祭又奉之云大號六號之大者謂若大祝云辨六號一曰神號二曰示號三曰鬼號四曰牲號五曰齍號六曰幣號之等是六號之大者也云以詔大祝以為祝辭者經云詔大號大祝是事神之人又辨六號故知所詔是詔大祝為祝辭祝辭則祝版之辭是也小宗伯大祭祀省牲眂滌濯疏與大宗伯文同謂佐大宗伯省牲者察其不如法地官充人展牲則告牷注鄭司農云展其也具牲若今時選牲也元謂展牲若今夕牲也亦疏宗人視牲告充謂祭前之夕春官肆師凡祭祀之卜日宿為期詔相其禮視滌濯亦如之疏眂滌濯亦如之者謂祭前之夕視滌濯祭器亦詔相其禮故云亦如之右省眂五禮通考卷四
