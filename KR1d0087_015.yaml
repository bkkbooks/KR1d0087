body:
  text: 五禮通考卷五刑部尚書秦蕙田撰吉禮五圜丘祀天周禮春官雞人大祭祀夜呼旦以嘂百官注呼旦以警起百官使夙巾車大祭祀鳴鈴以應雞人注雞人主呼旦鳴鈴以和之聲旦警衆秋官銜枚氏大祭祀令禁無囂疏國之大祭祀謂天地宗廟令主祭祀之官使禁止無得歡囂歡囂則不敬鬼神故也右呼旦警戒蠟氏凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野注蠲讀如吉圭唯饎之圭圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服服衰絰也此所禁除者皆為不欲見人所薉惡也疏大祭祀謂郊祭天地禮記郊特牲喪者不哭不敢凶服泛掃反道鄉為田燭弗命而民聽上注謂郊道之民為之也反道剗令新土在上也田燭田首為燭也疏郊祭之日人之喪者不哭又不敢凶服而出以干王之吉祭也泛掃反道者泛掃廣掃也反道剗路之土反之令新土在上也郊道之民家家各當界廣掃新道也鄉為田燭者鄉謂郊內六鄉也六鄉之民各于田首設燭照路恐王嚮郊之早弗命而民聽上者合結喪者不哭以下至此並非王命而民化王嚴上故也然周禮蠟氏云凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野而此云不命者蠟氏所云有司常事至郊祭之時王不施命故云不命且作記之人盛美民之聽上之義未必實然也蠟氏云除不蠲及刑者任人等此不言者文不備也祭義郊之祭也喪者不敢哭凶服者不敢入國門敬之至也疏此一節論郊祀之禮以是吉禮大事故喪與凶服皆辟去右除道警蹕春官太史祭之日執事以次位常疏執行祭祀之禮若今儀注地官􅐪人掌凡祭祀共盛注炊而共之舍人凡祭祀共簠簋實之陳之注方曰簠圓曰簋盛黍稷稻粱器疏祭祀言凡則天地宗廟大祭小祭皆有黍稷于簠簋實之陳之故云凡以廣之也春官鬯人掌供秬鬯而飾之注秬鬯不和鬱者飾之謂設巾鬯釀秬為酒芬香條暢於上下秬如黑黍一稃二米疏此直供秬黍之酒無鬱也天官酒人掌為五齊三酒祭祀則供奉之凡祭祀以法供五齊三酒以實八尊大祭三二注大祭者王服裘冕所祭也三二者謂就三酒之尊而益之也祭祀必用五齊者至敬不尚味而貴多品疏五齊五尊三酒三尊故云以實八尊此除明水玄酒若五齊加明水三酒加玄酒八尊為十六尊不言之者舉其正尊而言也陳氏禮書酒正共五齊三酒以實八尊皆陳而弗酌所以致事養之義也非此八尊所實而皆有二者大祭所酌度用一尊則以三尊二之皆酌而獻所以致事養之用也秋官司烜氏掌以夫遂取明火於日以鑒取明水於月以共祭祀之明齍明燭共明水注夫遂陽遂也鑒鏡屬取水者世謂之方諸取日之火月之水欲得陰陽之潔氣也明燭以照饌陳明水以為玄酒鄭司農云明齍謂以明水修滌粢盛黍稷天官冪人祭祀以疏布巾冪八尊注祭天無灌唯有五齊三酒實于八尊疏布者大功布為冪覆此八尊此據正尊而言若五齊加明水三酒加玄酒則十六尊皆以疏布冪之也春官典瑞大祭祀共其玉器而奉之天官亨人掌共鼎鑊注鑊所以煮肉及魚臘之器既熟乃脀于鼎籩人凡祭祀共其籩薦修之實醢人凡祭祀共薦修之豆實春官大宗伯凡祀大神涖玉鬯省牲鑊奉玉齍注玉禮神之玉也始涖之祭又奉之鑊烹牲器也牲疏涖玉鬯者天地有禮神之玉曲禮玉曰嘉玉郊特云用玉氣是也奉玉齍者此玉還是上文所涖者齍謂黍稷天地當盛以瓦簠齍與上鬯互見為義皆始時臨之祭又奉之蕙田案禮神之玉灌地之鬯雖典瑞鬯人之事而必親臨之牲之肥瘠鑊水之多寡雖充人烹人之事而必親省之奉玉齍六宮所供宗伯親奉之也小宗伯省鑊肆師表齍盛告潔展器陳告備疏當祭之日具其黍稷等盛于簠簋又以徽識表其名又告潔淨云展器陳告備者謂祭日陳祭器實之既訖則又展省視之而告備具故云展器陳告備也方氏苞曰視滌濯涖玉鬯省牲鑊皆大宗伯親之莫重于齍盛而苐使肆師表告何也滌濯實鬯納烹皆有司之事也故親臨視若齍盛則帥宮女而為之者天官世婦也帥而共之者春官之世婦也外臣安得而視之涖之省之故待其既共然後使肆師以潔告加徽識而宗伯親奉以揭虔焉右祭日陳設省視禮記祭義郊之祭夏后氏祭其暗殷人祭其陽周人祭日以朝及暗注暗昏時也陽讀為曰雨曰暘之晹謂日中時也朝日出時也夏后氏大事以昏殷人大事以日中周人大事以日出亦謂此郊祭也以朝及暗謂終日有事疏此經止明郊祭之禮方氏慤曰暗者日既沒而黑夏后尚黑故祭其暗陽者日方中而白殷人尚白故祭其陽朝者日初出而赤周人尚赤故以朝及暗焉言暗則知陽之為明言陽則知暗之為隂言朝則知暗之為夕以朝及暗則有陰有陽陰陽雜而成文又以見其尚文歟祭日謂祭之日也必于周言日者以一日之間以朝及暗也劉清江曰周人祭日以朝及暗此言周人尚赤大事用日出先日欲出之初猶逮及暗則可行祭事矣稍後則書畫則與殷人日中相亂故季氏祭仲由為宰晏朝而退仲尼謂之知禮也若曰周人之祭自朝及暮則孔子無為多仲由仲由為不知禮馬氏晞孟曰周官掌次注云大次始往所止居小次既接祭退俟之所是與諸臣代有事也唯其與諸臣代有事故雖以朝及暗而不繼之以倦也周氏諝曰以朝及暗者猶言以朝與暗蓋或以朝或以暗蕙田案以朝及暗三説不同細案之周氏之説固無定見劉氏云日出之初猶逮及暗不及晝恐儀節不能如是之促也當以注疏及方氏之説為正馬氏亦足相發右祭時禮記郊特牲祭之日王皮辨以聽祭報注報猶白也夙興朝服以待白祭事者乃後服祭服而行事也周禮祭之日小宗伯逆粢省鑊告時于王告備于王也疏祭之日王皮辨以聽祭報者報白也郊日之朝天子早起皮辨以聽之小宗伯告日時早晚及牲事之備具也未郊故未服大裘而且服日視朝之服也引周禮者證小宗伯既有告事王皮辨聽之是也周禮小宗伯祭之日告時于王告備于王注時薦陳之晚早備謂饌具時疏陳備即告告王祭已至當行事也右聽祭報禮祀郊特牲祭之日王被衮以象天戴冕璪十有二旒注衮象天謂有日月星辰之章此魯禮也周禮王祀昊天上帝則服大裘而冕祀五帝亦如之魯侯之服自衮冕而下而疏魯用王禮作記之人既以魯禮為周郊遂以魯侯稱王也蕙田案服裘被衮周天子祀天之服非魯禮也注誤詳見上服衮條下家語郊問天子大裘以黼之被裘象天王注大裘為黼文也言被之大裘其有象天之文故被之道路至泰壇而脫之陳氏禮書禮記惟君黼裘以誓省大裘非古也則戒誓省眂用黼裘而後世大裘焉故記者譏之家語謂大裘黼文以象天王至泰壇脫裘服衮張融又易之以為王至泰壇脫衮服裘蓋王肅託孔子以信其説張融疑王肅以變其論然記曰郊之日王皮辨以聽祭報則前祭未嘗服大裘也又大裘無文與黼不同二者之説誤矣蕙田案黼裘服以誓省不聞服以祀天祀天服大裘取其質也安用黼為此蓋王肅偽造之詞陳氏非之是矣周禮春官典路大祭祀則出路贊駕説注出路王當乘之贊駕説贊僕與促馬也通典王將出大司樂令奏王夏王所過處之人各於田首設燭以照于路夏官大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之注行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也春秋傳曰跋履山川自由也王由左馭禁止馬使不得行也軷讀為别異之别謂祖道轢軷磔大也詩云載謀載惟取蕭祭脂取羝以軷詩家説曰將出祖道犯軷之祭也聘禮曰乃舍軷飲酒于其側禮家説亦謂道祭近疏此據祭天之時故有犯軷之事祭天在郊雖無險難審慎故也及祭酌僕僕左執轡右祭兩軹祭軌乃飲注軹謂兩轊也軌當作􅓶車前軾也疏此云及祭酌僕者即上文將犯軷之時當祭左右轂末及軾前及犯軷而去酌僕者使人酌酒與僕僕即大馭也大馭則左執轡右手祭兩軹并祭軌與軾前三處訖乃飲飲者若祭末飲福酒乃始轢軷而去大僕王出入則自左馭而前驅齊右掌祭祀前齊車虎賁氏掌先後王而趨以卒伍秋官條狼氏掌執鞭以趨辟王出入則八人夾道夏官節服氏六人維王之太常注維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曵地鄭司農云維持之一疏巾車云王路建大常十有二旒經云六人維之明畔有三人三人維六旒故知兩兩以縷連旁三人持之右王出郊家語郊問既至泰壇王脫裘矣服衮以臨燔柴戴冕璪十有二旒蕙田案云脫裘服衮者蓋見郊特牲之文與周禮司服不符故造此説以牽合之不知服裘而被衮固不害其為同也後世祀天之服皆因是而淆焉特其于祭日之次節有合故辨而存之周禮大宗伯以禋祀祀昊天上帝注禋之言煙周人尚臭煙氣之臭聞者積柴實牲體焉或有玉帛燔燎而升煙所以報陽也首疏案郊特牲云升首于室以報陽彼論宗廟之祭以報陽今天神是陽煙氣上聞亦是以陽報陽張子曰鄭注禋祀則變禋為煙取其尚臭據洛誥曰明禋又國語曰精意以享曰禋遍觀書傳皆言禋是精潔致祭之名凡祀天日月星辰風師雨師皆取煙燎不言可知今祀天言禋祀日月言實柴祭天禮重故取禋敬之名以别之鄭不明此意改禋為煙謬哉書曰禋于文王武王又曰禋于六宗鄭氏鍔曰謂之禋祀明在乎致其心齊精明誠一為主而已蕙田案禋祀注疏與張子鄭氏不同然升煙達氣正所以達其精意也當兩存之儀禮覲禮祭天燔柴敖氏繼公曰燔柴者謂置牲幣之屬於積柴之上而燔之禮記祭法燔柴于泰壇疏謂積薪于壇上而取玉及牲置柴上燔之使氣達于天也爾雅祭天曰燔柴郭注既祭積薪燒之體邢疏祭天之禮積柴以實牲而燔之韓詩外傳天子奉玉升柴加于牲上而燔之郊特牲孔疏祭天初有燔柴後有正祭皆須有牲故大宗伯云實柴祀日月星辰鄭司農云實牛柴上也鄭康成云實牲體焉郊唯特牲得供燔燎正祭二處所用者熊氏皇氏等以為分牲體供二處所用其實一特牲也羅泌路史祭天燔燎祀地瘞埋蓋牲幣爾先儒以為俱有玉者謂以降神出示學者承襲遂以為燔瘞皆有玉莫之察者夫古郊祀蒼璧禮天黃琮禮地四圭有邸以祀天而兩圭有邸以祀地未聞燔瘞之玉也天之常祭歲九則玉之燔者為九地之常祀歲二則玉之瘞者為二其所以用之常祀之外者又不勝計矣燔瘞之玉何其多耶以皆燔耶則玉不受火以皆瘞耶而泰壇之下泰折之側耕斸旦旦未見獲一玉者案六經緣祭祀而言玉者多矣無所謂燔瘞之玉也唯韓嬰詩傳始有天子奉玉升柴加之於牲之説而崔靈恩遂引詩之圭璧既卒以實之為燔玉且謂肆師立大祀用玉帛牲牷為論燎玉之差降而鄭注大宗伯職亦遂以為或有玉帛燔燎而升煙夫以祀而言燔瘞之玉於百氏書曾不之見大祀玉帛若圭璧既卒兩説此世以為見之經者尤不近情韓詩鄭注端未足據詳考肆師所用玉帛特禮神之用而非論燎玉之差降雲漢所言亦禮神之玉爾其説以謂宣王承厲之後遇災知懼禱祠供給靡所不至而遂至於圭玉罄盡蓋所以美之也鄭氏以為禮神之玉又已盡者斯得之矣何自而指為燔且瘞哉禮運云祭祀瘞繒是祭地不瘞玉而瘞繒然則燔於泰壇瘞於泰折無玉明矣若古輯瑞三帛二生一死贄則受而五玉之器則卒而復知此則祀大神無燔玉祭大示瘞繒而不瘞玉又可知矣曷至膠膠曲臺儀省之間哉又曰天地之祭牲各二降神之牲祀神之牲也燔柴於泰壇瘞埋于泰折或曰實牲體焉所以降之也掃地而祭羞牲體焉所以祀之也故牛人凡祭祀共其享牛求牛享牛者祀神之牛求牛者降神之牛也降神之牛於天騂犢於地黝牲從其類也牧人凡陽祀用騂牲毛之陰祀用黝牲毛之鄭以陽祀祭天陰祀祭地祀神之牲於天用蒼於地用黃象其功也大宗伯以蒼璧禮天黃琮禮地而牲幣各從其器之色本其類也天地之祭俱有兩牲其來久矣召誥云用牲于郊牛二而禮器乃云祭天特牲有以少為貴者此特謂享牛爾享牛主於祭若求牛則主在降神非所言者是故禮器言祭召誥言郊皆有所不及彼熊氏等乃以為郊唯一牲而祭有兩處分牲體以供之失所依矣切稽楚語禘郊之祭則有全蒸若分牲體豈得謂全蒸哉方唐顯慶長孫無忌等議始以蒼璧黃牲燔於泰壇加以騂犢而實之以俎四圭有邸則奠之於坐其後張説又以祭後方燔考之經乃不合蓋不知郊祀天地有禮神之玉又有祀神之玉有求神之牛而又有享神之牛也陳氏禮書燔柴以升煙瘞埋以逹氣則燔必於樂六變之前瘞必於樂八變之前又曰祭天曰燔柴祭地曰瘞埋又周人尚臭而升煙瘞埋乃臭氣也則天地之燔瘞在行事之前矣周魏之間燔柴皆於祭末郭璞云祭天既祭積柴燒之祭地既祭瘞埋藏之恐先王之時祭祀既畢亦有燔瘞之禮其詳不可考也蕙田案祭必先求神祀天之禮燔柴為重然其制不詳鄭氏韓詩外傳謂瘞有玉熊氏謂分牲體供二處所用陳氏禮書亦謂燔用牲首路史非之蓋玉無煙臭固無燔燎之理而特牲即是全脀烏得分為二耶先儒拘泥特牲之文故為此説不知雖有燔牲何害全脀之一特也詳見前犧牲條下又案陳氏禮書謂燎必於樂六變之先其義與求神合郭璞爾雅注曰既祭積薪燒之二説不同豈先燔柴降神既祭復以牲幣燔之耶禮書亦謂不可考存疑可也右燔柴易豫卦大象傳雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考本義雷出地奮和之至也先王作樂既象其聲又取其義春官大司樂凡樂圜鍾為宮黃鍾為角大蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣注先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之明堂天宮夾鍾陰聲其相生從陽數其陽無射無射上生中呂中呂與地宮同位不用也中呂上生黃鍾黃鍾下生林鍾林鍾地宫又不用林鍾上生太蔟大蔟下生南呂南呂與無射同位又不用南呂上生姑洗鄭司農云雷鼓雷鼗皆謂六而有革可擊者也雲和地名也玄謂雷鼓雷鼗八而孤竹竹特生者雲和山名凡疏云先奏是樂以致其神者致神則下神也周之禮祭祀皆先作樂下神乃薦獻薦獻訖乃合樂也云禮之以玉而祼焉乃後合樂而祭之者云禮之以玉據天地而祼焉據宗廟以小宰注天地大神至尊不祼又玉人典瑞宗伯等不見有宗廟禮神之玉是以知禮之以玉據天地則蒼璧禮天黃琮禮地是也而祼焉據宗廟肆獻祼是也云圜鍾夾鍾也者即上文夾鍾也云夾鍾生於房心之氣至明堂者案春秋緯文耀鉤及石氏星經天官之注云房心為天帝之明堂布政之所出又昭十七年冬有星孛于大辰公羊傳云大辰者何大火也大火為大辰北辰亦大辰夾鍾房心之氣為大辰天之出日之處為明堂故以圜鍾為天之宮云天宮夾鍾隂聲其相生從陽數者其夾鍾與無射配合之物夾鍾是呂陰也無射是律陽也天是陽故宮後厯八相生還從陽數也云無射上生中呂中呂與地宮同位不用也者地宫是林鍾林鍾自與蕤賔合但中呂與林鍾同在南方位故云同位以天尊地卑故嫌其同位而不用之也中呂上生黃鍾黃鍾為角也黃鍾下生林鍾林鍾地宮又不用亦嫌不用也林鍾上生太蔟太蔟為徴也太蔟下生南呂與無射同位又不用南呂上生姑洗姑洗為羽祭天四聲足矣陸氏佃曰黃鍾降神之樂也故曰天神皆降王氏安石曰此祀天下神之樂薛氏衡曰周制大祭有三一曰祭天圜丘二曰祭地方澤三曰禘祫宗廟三祭既殊其樂亦異然此是致神之樂陳氏禮書古者祀天之禮衆矣而莫盛於冬至莫大於圜丘以其祀及於昊天上帝而百神舉矣故其降神之樂宜主以帝所出之方及其格也大合六代之樂文之以五聲播之以八音而配以祖焉在易豫所謂先王作樂崇德殷薦之上帝以配祖考是也王氏安石曰圜鍾正東方之律帝與萬物相見于是出焉天無不覆求天神而禮之則其樂之宫宜以帝所出之方故致圜薛氏衡曰天道著乎東而本統起于北易曰帝出乎震東方也故祭天神用寅卯辰之律曰太蔟圜鍾姑洗是也然不可違其本統也黃鍾為天統故兼取北方之律而以黃鍾為角王氏詳説宫角徴羽以清濁為先後之序且如圜鍾為宫宫數八十一黃鍾為羽羽數六十四太蔟為徵徴數五十四姑洗為羽羽數四十八函鍾為宫太蔟為角姑洗為徴南呂為羽黃鍾為宫大呂為角太蔟為徴應鍾為羽亦如其數此所謂宫角徴羽者以清濁為先後之序也律厯志所謂宮生徴徴生商商生羽羽生角以相生為先後之序也鄭氏鍔曰不曰夾鍾曰圜鍾者以天體言也十二律旋相為宮先王用樂各以其類取聲而用之天功始于子故用黃鍾為角角言功之始天功成于寅故用太蔟為徴徴言功之成天功終于辰故用姑洗為羽羽言功之終也管用特生之竹取陽數之竒雲和先儒以為山名于此取材為琴瑟將以召乎至和故有取也六代之樂雲門為首天神最尊故用之樂用圜鍾鼓取天聲管取陽聲琴瑟取雲和舞取雲門而丘之體又象天之圓祭之日用冬至一陽始生之日以類求類所謂天神之屬乎陽者安得而不降此所以可得而禮朱子語類問宮角徴羽與七聲不合如何朱子曰此是降神之樂如黃鍾為宫大呂為角太蔟為徴應鍾為羽自是四樂各舉其一而言之大吕為角則南呂為宫太蔟為徴則林鍾為宫應鍾為羽則太蔟為宫以七聲推之合如此又曰所謂黃鍾宮大呂角便是調如頭一聲是宮聲尾後一聲亦是宫聲便是宫調但其中五音依舊都有不是全用宮蔡氏德晉曰圜鍾即夾鍾屬卯其位為震帝出乎震故致天神以為宮不曰夾而曰圜與易乾為圓同意黃鍾太蔟姑洗律之相次者也相次者天之序故祀天神取之圜鍾為宫無射為之合黃鍾為角大呂為之合太蔟為徴應鍾為之合姑洗為羽南呂為之合宫之旋而在天者其合别而為四也鼓以君樂而鼗佐之其以雷名雷為天之聲也管者中氣之所由出孤竹竹特生而堅剛者其音清越于祀天神宜也琴瑟者歌聲之所由叶雲和山名言管而堂下之樂見矣言琴瑟而堂上之樂見矣樂六變者雲門之樂六變而終也天神皆降至和感召融洽貫通上帝降鑒而百神景從猶鑾輿動而千官隨也附辨注疏天地人三宮不用之律周禮大司樂鄭注圜鍾夾鍾也夾鍾生于房心之氣房心為大辰天帝之明堂函鍾林鍾也林鍾生于未之氣未坤之位或曰天社在東井輿鬼之外天社地神也黃鍾生于虛危之氣虛危為宗廟以此三者為宮用聲類求之天宫夾鍾隂聲其相生從陽數其陽無射無射上生中吕中呂與地宮同位不用也中呂上生黃鍾黃鍾下生林鍾林鍾地宫又不用林鍾上生太蔟太蔟下生南呂南呂與無射同位又不用南呂上生姑洗地宫林鍾林鍾上生太蔟太蔟下生南呂南呂上生姑洗人宮黃鍾黃鍾下生林鍾林鍾地宮又避之林鍾上生太蔟太蔟下生南呂南呂與天宫之陽同位又避之南呂上生姑洗姑洗南呂之合又避之姑洗下生應鍾應鍾上生蕤賓蕤賓地宫林鍾之陽也又避之㽔賓上生大呂凡五聲宮之所生濁者為角清者為徴羽此樂無商者祭尚柔商堅剛也陳氏禮書大司樂所以序圜鍾為宫黃鍾為角太蔟為徴姑洗為羽此律之相次者也函鍾為宫太蔟為角姑洗為徴南吕為羽此律之相生者也黃鍾為宫太呂為角太蔟為徴應鍾為羽此律之相合者也先儒謂夾鍾生於房心之氣房心天帝之明堂故為天宮林鍾生於未之氣未坤之位故為地宫黃鍾生於虛危之氣虛危為宗廟故為人宫此説是也蓋天帝之明堂東南方也帝與萬物相見于是出焉坤之位西南方也物於是致養焉宗廟北方也物于是藏焉其為三宫宜矣然言天宮不用中呂林鍾南呂無射人宫避林鍾南吕姑洗蕤賓不用者卑之也避之者尊之也以為天宮不用地宫之律人宫避天宫之律然則人宫用黃鍾孰謂避天宫之律耶楊氏復曰陳氏禮書所謂天宮取律之相次者圜鍾為宫圜鍾為陰聲之第五陰將極而陽生矣故取黃鍾為角黃鍾陽聲之首也太蔟為徴太蔟陽聲之第二也姑洗為羽姑洗陽聲之第三也此律之相次也地宫取律之相生者函鍾為宫函鍾上生太蔟則太蔟為角大蔟下生南吕南吕上生姑洗故南呂為徴姑洗為羽此律之相生也人宫取律之相合者黃鍾子大吕丑故黃鍾為宫大呂為角子與丑合也太蔟寅應鍾亥故大蔟為徴應鍾為羽寅與亥合也此律之相合也天道有自然之秩序故取律之相次者以為音地道資生而不窮故取律之相生者以為音人道相合而相親故取律之相合者以為義以此觀之則鄭氏謂天宫不用中呂林鍾南呂無射人宫避林鍾南呂姑洗蕤賓其説鑿矣李氏光地曰黃鍾圜鍾兩字錯互諸儒相承遂不復正原其所以蓋以黃鍾一律宫角兩用或者疑其重復而以意易之致誤之根當緣于此蕙田案前漢志黃鍾統天林鍾統地太蔟統人謂之三統又為三始此大司樂天地人三宫唯地宫林鍾無異其天宫夾鍾人宫黃鍾不同者漢志言作樂之原周禮言祭祀之樂之用易帝出乎震震位夾鍾故祀天神以為宫易以坎為北方幽陰之卦凡言祭祀言宗廟多取坎象豫晉困震渙既濟坎位黃鍾故享人鬼以為宮與三統三始之義兼通無礙也禮運五聲六律十二管旋相為宫先儒説旋宫者有六十聲六十調以聲言則夾鍾為宫者林鍾為角無射為徴黃變半為羽林鍾為宫者應鍾為角太半為徴姑半為羽黃鍾為宮者姑洗為角林鍾為徴南呂為羽此以律管之長短髙下别五聲而共為六十聲也以調言則夾鍾為宫者應鍾為角夷則為徴蕤賓為羽林鍾為宫者夾鍾為角黃鍾為徴無射為羽黃鍾為宫者夷則為角仲呂為徴夾鍾為羽此以律均之起聲收聲分五調而共為六十調也此大司樂天宫夾鍾為宫黃鍾為角太蔟為徴姑洗為羽地宫林鍾為宫太蔟為角姑洗為徵南吕為羽人宫黃鍾為宫大吕為角太蔟為徴應鍾為羽此非以本管相生之五聲言而以律自為均之五調言天宫四調皆以夾鍾起調夾鍾畢曲地宫四調皆以林鍾起調林鍾畢曲人宫四調皆以黃鍾起調黃鍾畢曲鄭氏拘於損益相生之成法有不合者則以為卑之而不用尊之而避之豈其然乎商音不用亦謂不用其調耳如使每宫之中五缺其一何以使髙下清濁咸得其宜哉觀承案古樂既亡而周禮天神地示人鬼之樂各分四律者人多疑之此拘於三統而不得其解也漢志三統乃據制律之本言非用律之法也况人統乃太蔟寅非夾鍾即圜鍾卯也地統本大吕丑而林鍾即函鍾未居其衝亦非本位也則何用執之以生疑哉李氏古樂經説直以圜鍾黃鍾為錯文欲彼此互更以遷就其意此未當也唐書載祖孝孫之十二和其一曰豫和以降天神皆以圜鍾為宫三奏黃鍾為角太蔟為徴姑洗為羽各一奏文舞六成二曰順和以降地祗皆以函鍾為宫太蔟為角姑洗為徴南吕為羽各二奏文舞八成三曰永和以降人鬼皆以黃鍾為宫三奏大吕為角太蔟為徴應鍾為羽各二奏文武舞九成此能全用周禮而各依其律者也則何必互易之乎其所以分布三宫者康成謂夾鍾生於房心之氣林鍾生於未之氣未坤之位黃鍾生於虛危之氣其附會天星雖亦讖緯餘習而以林鍾為坤位則恰是後天卦象可知夾鍾邜為震位黃鍾子為坎位矣夫帝出乎震坎主祭祀後人因此而悟夾鍾之宜祀天黃鍾之宜祀先正康成之解有以啓之也惟每宫四律而於五音去商合為十二律而於陽律去三陰律去一則未明故案律相生而倡為尊之故避卑之不用之説則太鑿矣不知律有聲亦有調聲者逐字配以宫商調者每曲統以宫商歌聲則五音不可缺一調則商聲有殺氣鬼神忌之故祭祀不用商調而只有四調夾鍾為宫者用夾鍾宫調蓋以夾鍾起調夾鍾畢曲下文黃鍾角調太蔟徴調姑洗羽調亦必以起調畢曲者名其律耳推之地宫林鍾四律人宫黃鍾四律亦然此正是六十調旋相為宫之法也其不用仲蕤夷無四律者仲呂乃上生之窮蕤賓亦正均之變夷則實西方之音無射又窮秋之律故只用八律為調也其天地人各得四調者陳氏以天宫四律為律之相次地宫四律為律之相生人宮四律為律之相合似為明切然惟人宫之相合為自然而天宫之相次則夾鍾一律己錯其序地宫之相生則南姑二律亦互其文終非天然不易之法也以理言之天陽在上故夾鍾四律俱用子寅卯辰之陽位地平在下故林鍾四律分布東西南北之四方人在天地之中故黃太大合天地人三才之統而應鍾亥又應陽氣而生可以終則有始而循環不窮矣况合辰之説乃上文分樂而序之法是歌奏迭用而只以一律為調與此之每宫四調者不同亦不必牽入於此條人宫內也附辨陳暘旋宫不過三陳氏樂書周官凡樂圜鍾為宫黃鍾為角太蔟為徴姑洗為羽凡樂函鍾為宫大蔟為角姑洗為徴南吕為羽凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽蓋天五地六天地之中合也故律不過六而聲亦不過五其旋相為宫又不過三以備中聲而已樂以中聲為本而倡和清濁迭相為經故以仲春之管為天宫仲冬之管為人宮中央長夏之管為地宫國語有四宫之説不亦妄乎今夫旋宫之樂十二律以主之五聲以文之故圜鍾為宫而無射為之合黃鍾為角而大呂為之合太蔟為徴而應鍾為之合姑洗為羽而南呂為之合凡此宫之旋而在天者也函鍾為宫大蔟為角姑洗為徴南呂為羽而交相合焉凡此宮之旋而在地者也故其合降而為三黃鍾為宫大吕為角大蔟為徴應鍾為羽而兩兩合焉凡此宫之旋而在人者也故其合又降而為二在易上經言天地之道下經言人道而元亨利貞之德乾别有四坤降為二咸又降為一亦此意也蓋一陰一陽之謂道天法道其數參而竒雖主乎一陽未嘗不以一陰成之故其律先隂而後陽地法天其數兩而偶雖主乎二陰未嘗不以二陽配之故其律或上同于天而以陰先陽或下同于人而以陽先陰人法地則以同而異此其律所以一于陽先乎陰歟大抵旋宫之制與著卦六爻之數常相為表裏蓍之數分而為二以象兩儀挂一以象三才楪之以四以象四時歸竒于扐以象閏而六爻之用抑又分陰分陽迭用柔剛則知陰陽之律分而為二亦象兩儀之意也其宫則三亦象三才之意也其聲則四亦象四時之意也餘律歸竒亦象閏之意也分樂之序則奏律歌吕亦分陰分陽之意也三宫之用則三才迭旋亦迭用柔剛之意也十有二律之管禮天神以圜鍾為首禮地示以函鍾為首禮人鬼以黃鍾為首三者旋相為宫而商角徴羽之管亦隨而運焉則尊卑有常而不亂猶十二辰之位取三統三正之義亦不過子丑寅而止耳禮運曰五聲六律十二管旋相為宫如此而已先儒以十有二律均旋為宫又附益之以變宫變徴而為六十律之凖不亦失聖人取中聲寓尊卑之意耶蕙田案禮運五聲六律十二管旋相為宫十二管每管之均均具五聲為六十聲十二律自為其宫宫各五調為六十調所謂旋相為宫也若如樂書之論旋宫不過三則此三宫者執而不變滯而不通無可旋轉且止是三管為宮耳未可云十二管旋相為宫也三管之外既不為宫即不成調何以上文奏黃鍾歌大吕至奏無射歌夾鍾乃十二律並用耶合辰之説于理固然至所云四降而三三降而二則非有意義存其間擬之以易合之以蓍恐皆附會晉之泥大司樂三宫當旋宫而不信禮運十二律均旋為宫之義失之逺矣右作樂降神春官太祝凡大禋祀逆尸令鍾鼓相尸禮注延其出入詔其坐作小祝大祭祀逆尸沃尸盥夏官節服氏郊祀裘冕二人執戈逆尸從車注裘冕者亦從尸服也裘大裘也王氏應電曰舊説於經文以衮冕六人裘冕二人為句遂謂六人衮冕為服王之服二人裘冕為從尸服夫衮冕王之盛服乃衣之以維太常裘冕至尊雖祀先王猶不得服乃衣之以執戈盾何其褻瀆之甚至此耶夫所謂節者掌其服而有品節之云耳蕙田案記曰尸襲而不裼送逆尸者象之故鄭氏有從尸服之説但大裘乃王祀天之服未必即尸服也尸服既於經無見而斷以節服氏之裘為大裘鑿矣陳用之又據為裘冕加衮之證夫裘之外雖必有衣但未必即是衮也先儒以裘冕為如王之服故王昭明以為褻瀆之甚愚謂裘冕二人蓋言尸服裘故送逆尸者亦裘尸冕故送逆尸者亦冕所謂裘與冕者豈必如王之大裘衮冕耶或各如其等之服冕而加裘焉耳如此則裘冕為無可疑而王氏之説可以不論通典次乃掃於丘壇上而祭尸服裘而升丘王及牲尸入時樂章奏王夏肆夏昭夏大司樂云王出入奏王夏尸出入奏肆夏牲出入奏昭夏但用夾鐘為宫耳附諸儒論傳記祭天尸尚書大傳維十有三祀帝乃稱王而入唐郊猶以丹朱為尸國語晉語晉祀夏郊董伯為尸禮記曲禮孔疏天子祭天地社稷山川四方百物及七祖之屬皆有尸也公羊説祭天無尸左氏説晉祀夏郊以董伯為尸虞夏傳云舜入唐郊以丹朱為尸是祭天有尸許慎引魯郊祀曰祝延帝尸從左氏之説也張子曰節服氏言郊祀送逆尸從車則祀天有尸也天地山川之類非人鬼者恐皆難有尸節服氏言郊祀有尸不害后稷配天而有尸也楊氏復曰愚案宗廟祭享有尸有主者聖人原始返終而知死生之説故設主立尸為之廟貌所以萃聚祖考之精神而致其來格也若天地山川之類形氣常運而不息有形氣則有神靈祭祀感通其應如響又焉用立尸為哉周官大宰及祀之日贊玉幣爵之事謂玉幣所以禮神王親自執玉幣奠於神座又親酌以獻神如是而已曲禮疏有説祀天無尸古人蓋知祀天之不必有尸矣經傳所説宗廟有尸者多矣未有言祭天之尸者惟尚書大傳有帝入唐郊丹朱為尸之説左氏傳述晉祀夏郊之事始末為詳初無董伯為尸之説而國語乃言之其言不經難以遽信觀承案祭祀之禮無主則不依而無尸亦不享杜氏謂立尸乃上古朴陋之禮者非也古人立尸自有深意祭如在祭神如神在雖仗精心亦憑尸象方能從無形影中感召出來耳然祭則立之畢則罷之則又人鬼不瀆而民無惑志也是以祭必有尸內祭祀惟婦人不立尸以立男則不類用女則非體也外祭祀惟天地無尸天大無外地廣無垠而不可為尸也此郊祀之有尸乃配者之尸耳張子説甚是然兼山川言恐未為確儀禮周公祭太山以召公為尸周禮墓人為尸朱子亦謂惟天地不敢為尸如祀竈則膳夫為尸門行則閽人為尸山川以虞衡為尸蓋鬼神各因依其職守所在而憑之也則山川豈可無尸乎唐開元禮亦尚有尸自後尸法亡而像設盛於是梵宫道院野廟淫祠無非土木衣冠神鬼變相既立不罷終日儼然煽惑愚民無有限極以至五帝天妃亦冕旒環珮而户祝之則侮天瀆神之至矣乃知古人立尸之意固甚深逺也右迎尸春官大祝大禋祀逆牲地官封人歌舞牲注謂君牽牲入時隨歌舞之言其肥香以歆神也天官太宰贊王牲事注凡大祭祀君親牽大夫贊之通典王親牽牲而殺之夏官司弓矢凡祭祀共射牲之弓矢注射牲示親殺也殺牲非尊者所親唯射為可國語周語禘郊之事天子必自射其牲夏官射人祭祀則贊射牲注蒸嘗之禮有射豕者國語曰禘郊之祀天子必自射其牲今立秋有貙劉云似疏漢時苑中有貙劉即爾雅貙貍劉殺也右迎牲殺牲夏官小臣大祭祀沃王盥疏大祭祀天地宗廟皆是王將獻之先盥手洗爵乃酌獻故小臣為王沃水盥手也文獻通考太宗皇帝至道二年禮儀使白言請先詣罍洗後奠玉幣從之御僕大祭祀相盥注謂奉盤授巾右盥周禮春官大宗伯奉玉天官太宰贊玉幣之事注玉帛所以禮神小宰贊玉幣之事注謂小宰執以授太宰太宰執以授王右薦玉帛周禮天官籩人供其籩薦修之實醢人共薦修之豆實右薦豆籩禮記禮器郊血注至敬不享味而貴氣臭也人疏血氣也夫肉食有味味者為人道道卑近而天神尊貴事宜極敬極敬不褻近故用血也用血是貴氣而不重味故云貴氣臭也郊特牲郊血疏謂正祭之時薦于尸坐之前也春官太祝隋釁注謂薦血也凡血祭曰釁殺疏天子薦血于座前宗廟即血以告凡祭祀之法先逆牲後隋釁右薦血腥通典就坐時尸前置蒼璧又薦籩豆及血腥等為重古之薦鄭注大司樂云先作樂致神然後禮之以玉而祀之春官小祝贊奠注奠爵也天官太宰贊玉幣爵之事注爵所以獻齊酒不用玉爵尚質也執以從王而授之小宰贊玉幣爵之事春官鬯人共秬鬯通典七獻者薦血腥後王以匏爵酌泛齊以獻尸所謂朝踐是也此為一獻次大宗伯攝王后之事亦以匏爵酌醴齊亞獻亦為朝踐是二獻每獻奏樂一成蕙田案祀天獻酒之禮經無明文通典據注疏補之今仍其説以俟考右朝踐王一獻宗伯二獻秋官大司冦奉其明水火鄭氏鍔曰明者潔也言主人明潔故成此水火也刑官以清而察獄訟之辭必明而燭蔽欺之情故使奉之以明其義春官太祝掌六祝之辭以事鬼神示注六辭皆是祈禱之事皆有辭祝以告神明集禮祝用于祭祀所以交于神祗者當有其辭也如武成曰敢昭告于皇天后土唯有道曾孫周王發將有大正于商辨六號一曰神號注號謂尊其名更為美稱焉神號若云皇天上帝凡大禋祀則執明水火而號祝注明水火司烜所共日月之氣以給蒸享執之如以六號祀明此圭潔也禋祀祭天神也鄭氏鍔曰大祀執之以號祝既為之美名又從而告之蓋言主人之明潔若此水者也大戴禮公符篇古祝辭皇皇上天昭臨下土集地之靈降甘風雨庶物羣生各得其所靡今靡古維豫一人某敬拜皇天之祜維某年某月上日通考古祝詞則云嗣王某或曰一人某王者親告之辭也年謂大歲所在月正月也明集禮成王在洛邑祭歲王命作册史逸祝册此祝册之見于周者右祝號易鼎卦象傳聖人亨以享上帝周禮天官太宰及納亨贊王牲事注納亨納牲將告殺謂鄉祭之農既殺以授亨人亨人掌供鼎鑊給水火之齊右亨牲地官大司徒奉牛注奉猶進也郊疏案國語郊之事有全脀若然則祀先全脀後豚解之國語周語郊事則有全脀注脀升也全其牲體而升之蕙田案禮器一獻熟疏云楚語禘郊則有全脀是祭天有熟也皇氏曰郊天與大享三獻並有血腥爓熟雖以郊為主其祭天皆然也此為祭天薦熟之確證天官亨人共太羮鉶羮注大羮肉湆鄭司農云大羮不致五味也鉶羮加鹽菜矣禮記禮器大羮不和疏大羮肉汁也不和無鹽梅也大古初變腥但煮肉而飲其汁未知調和後人祭既重古故但盛肉汁謂之太羮不和郊特牲大羮不和貴其質也方氏慤曰味之美者莫如淡太羮則以淡為貴而已詩大雅生民卭盛于豆于豆于登其香始升上帝居歆胡臭亶時毛傳木曰豆瓦曰登于豆薦菹醢也于登薦大羮也其馨香上行上帝則安而歆之何芳臭之誠得其時乎祀天用瓦豆陶器質也文獻通考陳氏曰爾雅木豆謂之豆瓦豆謂之登先儒謂宗廟之簋豆用木天地之簋豆用瓦然詩述祀天之禮言于豆于登則祀天有木豆矣右薦熟通典次薦熟於神前薦畢王乃以匏爵酌盎齊以獻尸大宗伯以匏爵酌醍齊以亞獻所謂饋獻也通前凡四右饋獻王三獻宗伯四獻周禮春官小宗伯逆齍注逆齍受􅐪人之盛以入小祝逆齍盛大宗伯奉玉齍疏齍謂黍稷天地當盛以瓦簋右薦黍稷通典尸乃食食訖王更酌朝踐之泛齊以酳尸所謂朝獻大宗伯更酌饋獻之緹齊以亞酳所謂再獻通前凡六又有諸臣為賓長之一獻凡七其尸酢諸臣之酒皆用三酒其法如祫祭之禮畢獻之後天子舞六代之樂禮記郊特牲疏皇氏曰置蒼璧于神座次則以豆薦血腥祭天無祼故鄭注小宰云唯人道宗廟有祼天地大神至尊不祼莫稱云然則祭天唯七獻也故鄭注周禮云大事于太廟備五齊三酒則圜丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻也后無祭天之事大宗伯次酌醴齊以獻是為二獻也王進爵之時皆奏樂但不皆六變次薦熟王酌盎齊以獻是為三獻也宗伯次酌醍齊以獻是為四獻也次尸食之訖王酌朝踐之泛齊以獻是為五獻也又次宗伯酌饋食之醍齊以獻是為六獻也次諸臣為賔長酌泛齊以獻是為七獻也以外皆加爵非正獻之數其尸酢王以清酒酢宗伯以昔酒酢諸臣以事酒從上至此皆皇氏所説皇氏以圜丘之祭賔長終獻不取沈齊而取泛者以禮運約之沈齊皆在堂丘下不可用之故更上取泛齊案禮運沈齊在廟堂之下尚得酌之升堂以獻何為圜丘沈齊獨不可用乎若以圜丘髙逺不可下取沈齊凡齊泛醴為尊盎緹為卑賔長終獻祇可以次用緹亦何得反用泛齊乎今謂圜丘賔長之獻用沈齊也以其賓長是臣助祭終獻逺下于君故從丘下酌沈齊右饋食王五獻宗伯六獻諸臣七獻春官大司樂乃奏黃鍾歌大呂舞雲門以祀天神注以黃鍾之鍾大呂之聲為均者黃鍾陽聲之首大呂為之合奏之以祀天神尊之也疏以黃鍾之鍾大呂之聲者以經云奏奏者奏擊以出聲故據鍾而言大呂經云歌歌者發聲出音故據聲而説亦互相通也言均者欲作樂先擊此二者之鍾以均諸樂是以鍾師云以鍾鼓奏九夏鄭云先擊鍾次擊鼓論語亦云始作翕如也鄭云始作謂金奏是凡樂皆先奏鍾以均諸樂也鄭氏鍔曰黃鍾者建子之律一陽所起六律之根本大吕雖非六呂之首然其位在丑子與丑相合之辰也故奏黃鍾必歌大吕之調取其合也易氏祓曰雲以象天之施黃帝之樂黃帝德與天合故雲門之樂起于黃鍾之子應以大呂之丑是黃鍾為六律之首大呂為六同之首雲門為六舞之首以祀天神類也蔡氏德晉曰奏者播之于器歌者詠之于聲舞者動之于容三者作樂之大網也黃鍾屬子陽聲之首大呂屬丑陰聲之首為之合蓋取子與丑相合之辰也雲門六樂之首以斯三者求天神而祀之尊之也此祭祀薦神之樂凡祭祀始作降神次則薦神大師大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓朄大饗亦如之注登歌歌者在堂也拊形如鼓以韋為之著之以粳擊拊瞽乃歌也下管吹管者在堂下也朄小鼓鼓朄猶言擊朄鼓朄管乃作也陳氏樂書瞽矇掌九德六詩之歌以後大師小師大祭祀登歌擊拊下管擊應鼓徹歌大饗亦如之由是推之大祭祀登歌奏擊拊堂上之樂也下管播樂器奏鼓朄堂下之樂也于歌言登則知管之為降于管言下則知歌之為上堂上之樂衆矣其所待以作者在乎奏擊拊堂下之樂衆矣其所待以作者在乎奏鼓朄舜之作樂言拊詠于上言鼗鼓于下樂記亦曰會守拊鼓而已蓋拊為衆器之父鼓朄為衆聲之君以拊為父凡樂待此而作者有子道焉以鼓朄為君凡樂待此而作者有臣道焉記曰聲樂之象也金石絲竹樂之器也象形而上器形而下于下管言播樂器則登歌以詠其聲得不為樂之象乎凡此雖瞽矇小師之職其帥而歌之者大師而已非特大祭祀為然大饗亦如之文王世子曰登歌清廟下管象舞達有神興有德此祭祀之樂也髙氏愈曰登歌謂升歌堂上貴人聲也拊以韋為之擊之以為奏樂之節下堂下管如箎六空播謂播揚其聲小鼓曰朄鼓之亦所以節樂蓋太師帥瞽登歌于堂上令衆工奏樂以和之復令擊拊以節之堂上之歌既畢則堂下以管聲相繼遂乃播動其樂器令工大奏衆樂而復鼓朄以節之與虞廷所謂搏拊琴瑟以詠下管鼗鼓者亦略相似也易氏祓曰奏擊拊以道歌而後瞽者歌焉奏鼓朄以道管而後樂器播焉樂之與歌必有所道而後從必有所令而後奏此節奏之序華氏泉曰鄭仲師以擊拊為樂或當擊或當拊蓋以拊為虞書擊石拊石之拊然玩少師職登歌擊拊與下管擊應鼓對而樂記亦云弦匏笙簧會守拊鼓則拊為樂器而作樂先擊拊鼓可知蕙田案堂上堂下雖指明堂宗廟言而郊壇奏樂亦必有上下可知小師大祭祀登歌擊拊下管擊應鼓地官鼓人以靁鼓鼓神祀注靁鼓八面鼓也春官大司樂六變而致象物及天神注變猶更樂成則更奏也象物有象在天所謂四靈者天地之神四靈之知非德至和則不至禮運曰麟鳯龜龍謂之四靈詩周頌昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之疏郊祀天地之樂歌也思文后稷克配彼天立我蒸民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏疏后稷配天之樂歌也右祀神之樂周禮春官鬱人大祭祀與量人受舉斚之卒爵而飲之注斚受福之嘏聲之誤也王酳尸尸嘏王此其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯燔事相成禮記禮運祝嘏莫敢易其常古是謂大假注假亦大也不敢改其常古之法度是謂大也郊特牲嘏長也大也注主人受祭福曰嘏此訓也也疏尸嘏主人欲使長久廣大富也者福也注人君嘏辭有富此訓之也或曰福也者備也疏少牢云皇尸命工祝承致多福無疆于女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之此是大夫嘏辭也人君則福慶之辭更多故詩楚茨云永錫爾極時萬時億卜爾百福如幾如式是也右嘏周禮春官小祝送尸疏始祭迎尸而入祭末送尸而出祭義云樂以迎來哀以送往是也夏官節服氏郊祀送尸從車右送尸周禮春官大祝既祭令徹疏祭訖太祝命徹祭器楊氏復曰周禮以徹祭為重觀宗廟歌雍以徹可見矣况敬天之誠純亦不已令徹于終其禮尤嚴所以防人心之懈怠也小祝贊徹小師徹歌右徹周禮春官肆師凡祭祀禮成則告事畢右告事畢周禮春官大宗伯若王不與祭祀則攝位注王有故代行其祭事疏攝訓為代有故者謂王有疾及哀慘皆是也量人云凡宰祭與鬱人受嘏歷而皆飲之注云言宰祭者冡宰佐王祭亦容攝祭此宗伯又攝者冢宰二王治事宗伯主祭事容二官俱攝故兩言之黃氏度曰王者有三年之喪百官總己以聽于冡宰至祭祀則宗伯攝其意為可知矣夏官量人凡宰祭與鬱人受斚厯而皆飲之注言宰祭者冢宰佐王祭亦容攝祭鄭司農云斚讀如嫁娶之嫁斚器名明堂位曰爵夏后氏以盞殷人以斚周人以爵元謂斚讀嘏尸之嘏宰冢宰王疏凡宰祭者冢宰攝祭非一故云凡也鄭云冢宰佐祭亦容攝祭者義得兩含案大宗伯云若王不與祭祀則攝位注云王有故代行其祭事重掌者此據宗伯亦有故則冢宰攝之王氏詳説曰祭天大事也見于天官大宰又見于春官宗伯是以二卿皆得以攝行其事若王不與祭祀則攝位此宗伯之明文大宰攝祭不見于常職而見于量人量人云宰祭是大宰攝祭之事周書洛誥乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊彚纂王氏充耘曰郊社大事也周召以人臣行之可乎蓋因事祭告奉王册命以行事非常祭之比也右代祭禮記王制喪三年不祭惟祭天地社稷為越紼而行事注越紼行事不敢以卑廢尊越猶躐也紼輴車索也殯疏私喪者是其卑天地社稷是其尊今雖遭私喪既以後若有天地社稷之祭則行之故鄭云不敢以卑廢尊也越是踐躐之義未葬之前屬紼于輴以備火災今既祭天地社稷須越躐此紼而往祭所故云越紼六宗山川之神則否其宮中五祀在喪內則亦祭之故曾子問曰君薨五祀之祭不行既葬而祭之但祭時不須越紼蓋五祀宮中之神喪時朝夕出入所祭不為越紼也春秋繁露春秋之義國有大喪者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之喪廢祀天之禮也右喪不廢祭蕙田案天子祀天正祭冬日至以禋祀祀昊天上帝於圜丘董仲舒曰王者歲一祭天於郊蓋天者百神之君天子萬國之主父事天而享上帝所以大報本返始也其天帝之稱有該以一字者則祀天享帝之類二字者則上帝皇天昊天之類四字者則皇天上帝昊天上帝維皇上帝之類天與帝一也以體言之則曰天以主宰言之則曰帝而已其祀享之所曰南郊曰圜丘曰泰壇曰吉土蓋郊內有壇壇髙曰丘圜丘即泰壇也以形象天曰圜以天尊壇曰泰即南郊之吉土爾其正祭之日以冬日至蓋天體輕清上覆而屬陽冬至一陽生為天道之始乾元統天又為生物之始易所云見天地之心者也天子繼天立極體天之心而報祭焉所以明天道定天位事上帝而仁鬼神也其所配之帝祭法有虞氏郊嚳夏后氏郊鯀殷人郊𡨕周人郊稷家語孔子曰萬物本乎天人本乎祖郊之祭大報本返始也故以配上帝是也其從祀之神大報天而主日配以月楊信齋謂非必百神從祀理或然也其祀有正祭有告祭冬日至正祭也其曰類曰旅曰造曰昭告曰柴曰升中皆告祭也告祭之禮皆殺于正祭而旅又稍隆焉其常祀之數每歲有四而圜丘居其三冬日至一也祈穀二也雩三也明堂四也冬至之日不用卜而辛日用卜雩為百榖祈膏兩與啓蟄之郊同孝經宗祀文王于明堂以配上帝明堂亦南郊但不祭于圜丘其祀天一也其祀之禮曰禋祀禋精意以享也鄭注以禋為煙與燔柴合然日月星辰皆用煙而唯昊天稱禋祀則張子之説不可廢其粢盛秬鬯天子親耕甸師以時入之后親舂其酒醴曰五齊三酒秬鬯明水其玉幣四圭尺有二寸蒼璧為邸璧與玉非二物也幣用繒色蒼放其器之色通典云長丈八尺據曾子問鄭注制幣長丈八準之其牲用特殷玄牡周騂犢其籩豆天官籩人醢人掌之郊祭籩豆經無明文然祭必備物記云大旅具矣不足以饗帝詎饗帝而不如常祭乎其器用有越席有犧尊以疏布為巾覆之樿杓白理木器用陶匏陶瓦器匏酒爵蓋祭天尚質也其服冕內服大裘外被衮衣戴冕璪十有二旒大裘黑羔裘衮十二章以襲裘惟冬至南郊則服裘餘皆衮冕蓋適四時之宜而非謂祀天必用大裘亦非裘冕而不披衮也周禮大裘而冕與郊特牲被衮以象天互相發爾其車旗一曰玉路一曰大路玉路即道之車素車即事之車郊特牲言乘素車在被衮之後則即壇明矣其祭祀始終之序先三月滌牲滌者繫牲之所取滌蕩潔清之義帝牛即特牲也前期十日太宰率執事而卜日方性夫謂卜郊指用辛之郊言蓋郊用冬至無庸卜日周禮所云卜日皆兼他祭為文原不専謂郊天也遂誓戒散齊七日致齊三日玉府共食玉鬯人共秬鬯以浴遂戒具小宰持其法宰夫詳其式與太史相聨事前期一日遂陳設掌次張氊案設皇邸次謂幄大幄初往所止居小幄既接祭退俟之處重帟謂于幄中設承塵幄在幕中帷在旁幕上張幄在帷幕之內帟在幄之內也蓋祭臣多故張旅幕諸祭皆有尸尸尊故别張尸次蓋公卿以下即位于壝宮之門未祭則常服及祭則更祭服于幕次尸次亦更衣所也封人飾牛牲設楅衡置絼共水稿皆以待夕牲也牛人共牛牲之互與其盆簝所以待殺牲也大司樂宿縣大胥以鼓徵學士凡禮物器用咸設焉遂省視蓋祭器甑甗皆須濯溉卑者親眂之尊者往涖之所以致敬致潔而禮神之玉祀神之牲尤其重者也祭之日雞人呼旦巾車鳴鈴銜枚氏禁無囂蠟氏除不蠲禁刑者及凶服者喪者不哭不敢凶服泛掃反道鄉為田燭太史執事以次位常􅐪人供盛舍人供簠簋鬯人供秬鬯酒人共五齊三酒司烜氏取明火明水冪人以疏布巾冪八尊典瑞供玉器亨人供鼎鑊籩人醢人共籩豆之實大宗伯涖玉鬯省牲鑊肆師表粢盛展器陳王皮辨以聽祭報蓋郊日之朝天子早起皮辨以聽告日時早晚未郊故未服大裘衮冕而服日視朝之服也小宗伯告時告備典路出路贊駕説王出宮大裘衮冕乘玉路建太常大馭馭玉路犯軷太僕自左馭而前驅虎賁氏先後王條狼氏執鞭以趨辟節服氏維王之太常王至郊御大次小宗伯告備告時乘大路以赴壇遂臨燔柴作樂以降神乃迎尸太祝相尸禮小祝沃尸盥遂迎牲太祝掌之太宰贊之君親牽牲封人歌舞之天子自射其牲乃掃地而祭遂盥小臣沃王盥御僕相盥乃薦玉幣薦血腥凡血祭曰釁血氣也肉食有味味為人道人道卑近而天神尊貴事宜極敬不褻近故用血天子親薦于神座前也乃獻尊小宰贊爵授太宰太宰授王小祝贊奠鬯人供秬鬯大司冦奉明水五齊加明水三酒加玄酒杜佑通典祭天七獻薦血腥後王以匏爵酌泛齊獻尸大宗伯亦以匏爵酌醴齊亞獻所謂朝踐也是為二獻每獻奏樂一成乃祝大祝執明水火而號祝洛誥王命作册逸祝册此祝册之見于周者則祝固必有册爾祝畢王退俟小次乃亨牲大宰納亨贊王牲事亨人供鼎鑊給水火之齊遂薦熟大司徒奉牛亨人供太羮鉶羮太羮肉汁不和無鹽梅也鉶羮加鹽菜矣蓋太古初變腥但煮肉而飲其汁後人祭既重古故薦之通典薦熟于神前薦畢王乃以匏爵酌盎齊以獻尸大宗伯以匏爵酌緹齊以亞獻所謂饋獻也通前凡四遂薦黍稷小宗伯小祝逆齍盛大宗伯奉玉齍薦畢尸乃食食訖王更酌朝踐之泛齊以酳尸所謂朝獻大宗伯更酌饋獻之緹齊以亞酳所謂再獻通前凡六又有諸臣為賓長之一獻凡七皇氏謂以外皆加爵非正獻之數其尸酢王以清酒酢宗伯以昔酒酢諸臣以事酒每獻舉樂詩周頌郊祀天地之樂歌昊天有成命后稷配天之樂歌思文后稷是也獻畢天子舞六代之樂遂嘏王酳尸尸嘏王此其卒爵也遂送尸肆師禮成則告事畢蓋其制度儀文與行事始終之序大略如此馬端臨文獻通考嘗言其散見于百官之職掌錯見于禮經之總論披紛散佚未有能會通而次第之者惟杜氏通典頗有條理然禮經簡略多以注疏之意補之乖異多端惟信齋楊氏祭禮一本經文不復以注疏攙補然闊略不接續又不如通典之通暢今考通典以注疏補經惟七獻之説義可通用至其附和六天之謬則以圜丘為禘上帝祈穀為祀感生帝其惑於九祭之説則以五時迎氣為祀天故祭祀之所則分南郊與圜丘為二地蒼璧禮天四圭有邸以祀天為二物圜鍾為宮與乃奏黃鍾為兩處之樂訛舛錯雜本無義理而信齋祭禮首著古郊祀次禮物樂舞次祀禮始終之序次祝辭樂章實為疏脫既不足以貫串經文之旨而想見聖人著作之精意又不可措之儀節而見諸施行則古者祀天之禮無徵久矣為詳繹聖經折衷衆説舉其大綱詳其節目其必不可考者略取注疏之純正者以補之然後聖人制作之意可以顯白稍為損益潤色則一一可見之施行即後代制作之善如唐之開元禮宋之政和禮所定儀注皆有以統其全規而立之凖則庶不謬于觀會通以行其典禮之意云文獻志王炎郊祀儀郊祀國之重事也先王之禮猶可以考之于經而諸儒異論者經之所著不同也蓋其不同者有四郊丘之制也天帝之號也天地分合之異也春冬時日之差也郊丘之不同者有三周官謂之圜丘戴記謂之南郊又謂之泰壇鄭康成之説曰祀昊天于圜丘謂之禘祀五帝于南郊謂之郊而泰壇無説康成之言非也兆于南以就陽位于郊故謂之郊夫子嘗有是言矣王肅曰築丘以象天體是謂圜丘圜丘人所造也是謂泰壇兆于國南是謂南郊然則南郊也圜丘也泰壇也其名有三其實一也天帝之異有三曰昊天上帝曰五帝天洎五帝為上帝孔安國之説也天為昊天玄天為上帝五方之帝為五帝鄭司農之説也孔鄭之説質之于經固己不合而鄭康成則又曰昊天上帝者天皇大帝也五帝者始于青帝靈威仰終于黑帝汁光紀也以緯亂經雖不辨可以知其無稽矣於遍覆無外故以天名主宰造化故以帝名在書言類于上帝而又言告于皇天在周官以為禋祀昊天上帝知昊天上帝一而已矣是故詩書所載有皇矣上帝之言有昊天上帝之言而周官始有五帝之名夫上帝至尊無二而有五帝何也上帝天帝也五帝五人帝也何以知之以周禮而知之掌次大旅上帝則張氊案朝日祀五帝則張次上帝在朝日之先五帝在朝日之下則五帝非天帝其證一也宗伯兆五帝于四郊四類四望亦如之郊兆于四類之先則五帝非天帝其證二也司服祀昊天上帝則大裘而冕祀五帝亦如之既言上帝又言五帝則五帝非天帝其證三也吕不韋之月令嘗言五帝矣春則太皡夏則炎帝秋則少昊冬則顓帝夏秋之交則黃帝不以五帝為天也魏相之奏亦詳言五帝矣太皡乘震炎帝乘離黃帝乘坤少昊乘兑顓帝乘坎亦不以五帝為天也秦漢間言五帝者皆五人帝而已其説必有所從受也古之祭天者主于上帝其配以祖周公既成洛邑用牲于郊牛二其一帝牛其一稷牛夫禮簡則嚴嚴則敬是故祀天所以報本尊祖故以配天嚴敬之義也合上帝與五帝而謂之六天則近于誣矣天地分合之異先儒考于經者未審也春秋傳曰天子祭天諸侯祭土尊天而親地隆殺固有辨焉猶之宗子祭父支子不得祭父而可以祭母父尊故也天子祭天諸侯不得祭天而可以祭土天尊故也占之祭地者有社則必有大社大社謂之冡土未有北郊方丘之名也社祭土主陰氣也祭帝于郊以定天位祀社于國以列地利而子思曰郊社之禮以祀上帝明地不可與天相並尊天之義也周官論國之神位左祖右社此王社也澤中方丘此冢土也此古人所謂大社者也書謂冡土禮謂之方丘而戴記謂之泰折折則方矣其名有三其實亦一也至漢匡衡乃有南北郊之謂則失先王尊天親地之意矣新莽始有天地合祭祖妣並配之説則失先王之意益甚矣雖然莽之失因周頌之言而失之也周官夏日至祀地于方丘冬日至祀天于圜丘則曰此天地分祀之證也夫春夏祈榖其詩為噫嘻祈有二祭而所歌者噫嘻一詩也秋冬報其詩為豐年報有二祭而所歌者豐年一詩也昊天有成命之詩可歌以祭天豈不可歌以祭地乎以先王之行事質之武王東伐告于皇天后土矣告于皇天則類于上帝是也告于后土則宜于冡土是也是天地未嘗合祭者一也周公之祭于洛邑丁巳用牲于郊戊午社于新邑是天地未嘗合祭者二也以武王周公之行事而求其制禮之意則天地未嘗合祭無疑矣冬春時日之異則戴記之言失之也其言曰郊之祭也以迎長日之至又曰郊之用辛也周之始郊日以至而繼之以卜郊夫日至而郊周禮也卜日用辛魯禮也雜周魯之禮兼記之而郊之時日紊矣蓋周人之郊有二皆無所用卜日至而郊報本之郊也故其禮行于一陽之初復啓蟄而郊祈穀之郊也故其禮行于農事之將興制禮之意坦然明易戴記言周之始郊正月以日至其日用上辛吾是以知其合周魯之郊而紊其時日也諸儒異論為禮經之蠧者多矣去其異論之蠧而究其禮經之正經雖殘缺禮意則固可知也己蕙田案王氏郊丘之説甚是至以五帝為人帝以冢土為方丘俱誤論春冬時日得之詳見前及方丘社稷門文衡趙汸論周禮六天書鄭康成三禘五帝六天緯書之説豈特足下疑之自王肅以來莫不疑之而近代如陳陸葉諸公其攻擊亦不遺餘力矣竊嘗究觀諸名家論著於經旨似猶有未盡者於禮意似猶有弗類者經曰祀天曰祀天神曰祀昊天曰祀昊天上帝曰禋祀昊天上帝曰旅上帝曰大旅上帝曰享上帝曰類上帝曰類造上帝曰祀五帝曰禋祀五帝皆因官屬職掌器物司存言之然其間尊卑逺近親疏隆殺異同分合有序有倫聖經簡奧無費辭非後世文字比也蓋典瑞言祀天旅上帝祀地旅四望旅四望别言既非祀地則旅上帝别言非祀天明矣大宗伯國有大故則旅上帝及四望亦以上帝對四望言而小宗伯兆五帝于四郊四望四類亦如之始以五帝對四望言五帝即上帝明矣旅者會而祭之之名上帝非一帝也猶四望非一方矣大宗伯禮天地四方皆有牲幣各放其器之色而詩曰來方禋祀以其騂黑四方之神即五帝也故曰禋祀而得與天地通稱六帝日月星神四望不與焉大宗伯以禋祀實柴槱燎祀神之在天者以血祭霾沈疈辜祭神之在地者禋者升煙以祭之名三祀皆積柴實牲體玉帛燎而升煙以報陽也自非天神之尊者不得言禋祀明矣大司樂祀四望祭山川各有樂而五帝樂無文以其皆天神同變之樂也又豈但與昊天上帝同禋祀同祭服而已哉雖然五帝之非人帝可無疑矣其總言上帝與専言祀天者豈無别乎其祭曰旅曰享曰類曰類造其事曰天子將出曰帥旬曰國有大故以及曰祈穀與大司樂冬至日祀天神于圜丘夏至日祭地示于方澤孔子謂之大郊者其于尊卑逺近親疏隆殺之節亦辨而詳矣若來書所謂天與帝為一惟兼言分言有異則經中神號祭名禮物徒異同而已矣先王制為一代大典豈為是辭費以來後世之紛紛乎大宗伯禮四方主作六玉言小宗伯兆五帝主建神位言足下謂大小各從其類決五帝為人帝非經旨也夫五行之神為五帝而太皡之屬配焉亦云帝此孔子問諸老聃而告季康子者也公羊子曰自內出者無匹不行自外至者無主不止此郊之所以尚配也今將迎氣于郊而廢其所配者主其配者大皡以降雖有功德亦人鬼也人鬼豈能司天時而布五氣者乎陳祥道楊信齋之言曰天有五行四時則有五帝帝者氣之主也果以五人帝為五帝則人帝之前其無司四時者乎朱子又謂凡説上帝者總昊天上帝與五帝言之意與陳氏同諸公雖不主康成至此亦不能異也足下豈弗考乎王制祭天地之牛角繭栗宗廟之牛角握此天神人鬼之别也國語曰郊禘祭之牛角繭栗謂郊為禘而牲無異此所謂禘非人鬼之祭矣又曰凡禘郊祖宗報五者國之祀典也加之以社稷山川三辰五行而不别言祭天地則韋昭注禘為圜丘不誣也祭法以禘郊祖宗對舉言之與國語同則四者皆大祭而事體相似可知其四代配食之帝一以先後為次則四大祭者輕重必有差矣王氏謂禘者宗廟之殷祭而郊為圜丘祀天以其序言則先廟而後郊廟言人鬼而郊不及天神以其實言是重祖以配天而輕所自出之帝唯廟享也又謂祖宗乃二廟不遷之名是禘郊以祭言祖宗以廟言也太廟之不遷又非世室比顓頊之于商其廟視周文武世室亦可同倫乎二世室一曰祖一曰宗可乎此無論禮意如何古人制言有序名物以類必不如是之舛駁弗倫也六天之神隂主化育著為星象下應人事北辰中居御極而五帝隨天運轉以散精布氣于四時與開闢之初五天之精感為帝王之祖皆非有得于化原有見于古初者信不足以及之然中垣太微昭布森列不可誣也况周人立閟宫以祭薑嫄大司樂享先妣序于先祖之上則南郊祀感生帝何必異乎緯書焚于隋河圖洛書至宋始大顯使無陳邵二公亦妖妄之類耳學者初不見全書往往望風詆排黃先生嘗謂恐有如圖書蓍䇿之數在其中可謂惡而知其善者矣孫仲然逺矣安得起陳林諸君子而質之蕙田案趙氏論六天是矣乃從鄭氏以禘為郊祭南郊祀感生帝不知讖緯之當絶而反引伸其説何歟存此二條以見郊祀異説之惑人可畏至其説之所以謬已詳見前辨中矣五禮通考卷五
