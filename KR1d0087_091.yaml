body:
  text: 五禮通考卷八十一刑部尚書秦蕙田撰吉禮八十一宗廟制度宋史禮志太祖建隆元年有司請立宗廟詔下其議兵部尚書張昭等奏謹案堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建國改立六廟蓋昭穆之外祀契與湯也周立七廟蓋親廟之外祀太祖與文王武王也漢初立廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之室隋文但立髙曾祖禰四廟而已唐因隋制立四親廟梁氏而下不易其法稽古之道斯為折𠂻伏請追尊髙曾四代崇建廟室奏可判太常寺竇儼奏上皇髙祖文安府君曰文獻皇帝廟號僖祖皇曾祖中丞府君曰惠元皇帝廟號順祖皇祖驍衛府君曰簡恭皇帝廟號翌祖皇考武清府君曰昭武皇帝廟號宣祖皇髙祖妣崔氏曰文懿皇后皇曾祖妣桑氏曰惠明皇后皇祖妣京兆郡太夫人劉氏曰簡穆皇后太祖御崇元殿備禮冊四親廟奉安神主行上諡之禮太宗太平興國二年正月有司言唐制長安太廟凡九廟同殿異室其制二十一間皆四柱東西夾室各一前後面各三階東西各二側階本朝太廟四室室三間今太祖升祔共成五室請依長安之制東西留夾室外餘十間分為五室室二間從之四月己卯奉神主祔廟玉海至道三年五月有司言唐郊祀錄廟各一屋三間華飾連以罘罳同殿異室無别設庫屋明文請東西各増修一間以藏寳冊從之宋史禮志真宗咸平元年判太常禮院李宗訥等言伏見僖祖稱曾髙祖太祖稱伯文懿惠明簡穆昭憲皇后並稱祖妣孝明孝惠孝章皇后並稱伯妣案爾雅有考妣王父母曾祖王父母髙祖王父母及世父之别以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文事下尚書省議户部尚書張齊賢等言王制天子七廟謂三昭三穆與太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊本祖而重正統也又禮云天子絶朞䘮安得宗廟中有伯氏之稱乎其唐及五代有所稱者蓋禮官之失非正典也請自今有事于太廟則太祖并諸祖室稱孝孫孝曾孫嗣皇帝太宗室稱孝子嗣皇帝其爾雅考妣王父之文本不謂宗廟言也歴代既無所取于今亦不可行詔下禮官議議曰案春秋正義躋魯僖公云禮父子異昭穆兄弟昭穆同此明兄弟繼統同為一代又魯隱桓繼及皆當穆位又尚書盤庚有商及王史記云陽甲至小乙兄弟四人相承故不稱嗣子而曰及王明不繼兄之統也又唐中睿皆處昭位敬文武昭穆同為一世伏請僖祖室止稱廟號后曰祖妣順祖室曰髙祖后曰髙祖妣翌祖室曰曾祖后曰曾祖妣祝文稱孝曾孫宣祖室曰皇祖考后曰皇祖妣祝文稱孝孫太祖室曰皇伯考妣太宗室曰皇考妣毎大祭太祖太宗昭穆同位祝文並稱孝子其别廟稱謂亦請依此詔都省復集議議曰古者祖有功宗有徳皆先有其實而後正其名今太祖受命開基太宗纉承大寳則百世不祧之廟矣豈有祖宗之廟已分二世昭穆之位翻為一代如臣等議禮為人後者為之子以正父子之道以定昭穆之義則無疑也必若同為一代則太宗不得自為世數而何以得為宗乎不得為宗又何以得為百世不祧之主乎春秋正義亦不言昭穆不可異此又不可以為證也今若序為六世以一昭一穆言之則上無毁廟之嫌下有善繼之美于禮為大順于時為合宜何嫌而謂不可乎翰林學士宋湜等言三代而下兄弟相繼則多昭穆異位未之見也今詳都省所議皇帝于太祖室稱孫竊有疑焉詔令禮官再議禮官言案祭統曰祭有昭穆者所以别父子逺近長㓜親踈之序而無亂也公羊傳公孫嬰齊為兄歸父之後春秋謂之仲嬰齊何休云弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不以子為父孫晉賀循議兄弟不合繼位昭穆云商人六廟親廟四並契湯而六比有兄弟四人相襲為君者便當上毁四廟乎如此四世之親盡無復祖禰之神矣温嶠議兄弟相繼藏主室之事云若以一帝為一世則當不得祭于禰乃不及庶人之祭也夫兄弟同世于恩既順于義無否𤣥宗朝禘祫皇伯考中宗皇考睿宗同列於穆位徳宗亦以中宗為髙伯祖晉王導荀崧等議太宗無子則立支子又曰為人後者為之子無兄弟相為後之文所以舍至親取逺屬者蓋以兄弟一體無父子之道故也竊以七廟之制百王是尊至于祖有功宗有徳則百世不遷之廟也父為昭子為穆則萬世不刋之典也今議者引漢書曰為人後者為之子殊不知弟不為兄後子不為父孫春秋之深㫖父謂之昭子謂之穆禮記之明文也又案太宗享祀太祖二十有二載稱曰孝弟此不易之制又安可追改乎唐元宗謂中宗為皇伯考徳宗謂中宗為髙伯祖則伯氏之稱復何不可臣等參議自今合祭日太祖太宗依典禮同位異坐皇帝于太祖仍稱孝子餘並遵舊制蕙田案兄弟同昭穆此不易之理禮官之言是也不稱伯父齊賢之議似為近之禮兄弟之子猶子伯仲叔季皆有父道則皆有子道焉文獻通考景徳三年龍圖閣待制陳彭年言案漢書髙平侯魏洪坐酎宗廟騎至司馬門削爵一級此則騎不過廟司馬門之明文也伏見太廟别有偏門及東門祀官入齋宫去殿廷尚逺其后廟雖有一門毎遇禘祫神主由之出入兼有齋宫正與殿門相對數歩而已祀官皆乘馬而入實非恭恪望自今中書門下行事許乘馬入太廟東門自餘並不得乘入庶彰寅奉以廣孝思詔祀官遇雨許乘馬入東門導從止門外餘如所請宋史真宗本紀景徳四年二月癸酉詔西京建太祖神御殿蕙田案此宋神御殿之始禮志景徳四年奉安太祖御容應天禪院以宰臣向敏中為奉安聖容禮儀使權安於文徳殿百官班列帝行酌獻禮鹵簿導引升綵輿進發帝辭於正陽門外百官辭於瓊林苑門外遣官奏告昌陵畢羣臣稱賀蕙田案此御容安奉禪院之始文獻通考大中祥符元年六月以将封禪詔有司議加上太祖太宗尊諡後又詔太廟六室各奉上尊諡二字中書門下請加僖祖諡曰文獻睿和皇帝順祖曰惠元睿明皇帝翼祖曰簡恭睿徳皇帝宣祖曰昭武睿聖皇帝太祖曰啟運立極英武睿文神徳聖功至明大孝皇帝太宗曰至仁應道神功聖徳文武睿烈大明廣孝皇帝遣宰相王旦等奉上冊寳蕙田案此因封禪上尊號宋史真宗本紀大中祥符三年十二月乙卯告太廟詔自今謁廟入東偏門文獻通考大中祥符三年十二月詔曰朕以親祀后祗昭告祖考詳觀定儀有所未安入廟則歩武正門至庭則廻班東向且躬申祗見禮尚尊䖍當罄寅恭庶申誠慤自今謁廟朕當由東偏門入至殿庭不得令百官廻班蕙田案東偏門入有阼階之義近于禮矣宋史真宗本紀大中祥符五年閏十月己巳上聖祖尊號辛未謝太廟乙亥詔上聖祖母懿號加太廟六室尊諡十二月戊辰作景靈宫禮志景靈宫剏於大中祥符五年聖祖臨降為宫以奉之蕙田案此景靈宫之始為聖祖臨降而建誕矣真宗本紀乾興元年二月帝崩十月祔太廟禮志乾興元年十月奉真宗神主祔廟仁宗天聖五年詔修景靈宫之萬夀殿以奉真宗署曰奉真蕙田案萬壽殿奉真宗此景靈宫第二殿也仁宗本紀景祐二年五月庚子議太祖太宗真宗廟並萬世不遷玉海景祐二年五月甲申朔詔王者奉祖宗尚功徳禋天祀地則侑神作主審諦合食則百世不遷其令禮官辨崇配之序定二祧之位庚子禮院言王者建廟祏之嚴合昭穆之綴祖一而已始受命也宗無豫數待有徳也太祖誕受寳命付畀四海鋪敦爕伐潛黜不端夷澤潞之畔兼淮海之昧東焚吴輿右因蜀壘湘楚番禺請吏入朝當此之時天下去凋殘蒙更生此萬世之業也太宗提神畧席下武龔行天討底定太原由是謹九刑之辟藝四方之貢信賞類能重食勸農官無煩苛人無怨恫又引搢紳諸儒講道興學炳然與三代同風真宗乾粹日昭執競維烈遂考夏諺紹虞廵祕牒岱宗育榖兾壤翕受瑞福普浸黎元肖翹跂行民無不寧百度已備眷授明辟洪維一祖二宗之烈歴選墳誥未有髙焉者也請以太祖為定配二宗為迭配其将來皇帝親祠請以三聖皆侑上顯對越之盛次申遹追之感詔恭依蕙田案迭配從唐制也宋史禮志康定元年直祕閣趙希言奏太廟自來有寢無廟因堂為室東西十六間内十四間為七室兩首各一夾室案禮天子七廟親廟五祧廟二據古則僖順二祖當遷國家道觀佛寺並建别殿奉安神御豈若毎主為一廟一寝或前立一廟以今十六間為寝更立一祧廟逐室各題廟號釦寳神御物宜銷毁之同判太常寺宋祁言周制有廟有寝以象人君前有朝後有寝也廟藏木主寝藏衣冠至秦乃出寝於墓側故陵上更稱寝殿後世因之今宗廟無寝蓋本於兹鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之說未足援正自荀卿王肅等皆云天子七廟諸侯五大夫三士一降殺以兩則國家七世之數不用康成之說也僖祖至真宗方及六世不應便立祧廟自周漢毎帝各立廟晉宋以來多同殿異室國朝以七室代七廟相承已久不可輕改周禮天府掌祖廟之守藏寳物世傳者皆在焉其神御法物寳盝釦牀請别為庫藏之自是室題廟號而建神御庫焉蕙田案僖順有當祧之義尚非應祧之時仁宗本紀皇祐五年三月癸亥遣使奉安太祖御容於滁州太宗御容於并州真宗御容於澶州六月乙亥御紫宸殿案太安樂觀宗廟祭器十一月戊辰饗太廟奉慈廟禮志皇祐中以滁州通判王靖請滁并澶三州建殿奉神御乃宣諭曰太祖擒皇甫暉於滁州是受命之端也即大慶寺殿名曰端命以奉太祖太宗取劉繼元於并州是太平之統也即崇聖寺殿名曰統平以奉太宗真宗歸契丹於澶州是偃武之信也即舊寺殿名曰信武以奉真宗既而統平殿災諫官范鎮言并州素無火災自建神御殿未㡬而輙焚天意若曰祖宗御容非郡國所宜奉安者近聞下并州復加崇建是徒事土木重困民力非所以答天意也自并州平七十七年故城父老不入新城宜寛其賦輸緩其徭役以除其患使河東之民不忘太宗之徳則陛下孝思豈特建一神御殿比哉先是睦親廣親二宅並建神御殿翰林學士歐陽修言神御非人臣私家之禮下兩制臺諫禮官議以為漢用春秋之義罷郡國廟今睦親宅廣親宅所建神御殿不合典禮宜悉罷詔以廣親宅置已久唯罷修睦親宅蕙田案范氏歐陽氏之言甚透英宗本紀嘉祐八年十月甲午葬仁宗於永昭陵十一月丙午祔於太廟禮志仁宗将祔廟修奉太廟使蔡襄上八室圖為十八間初禮院請増廟室孫抃等以為七世之廟據父子而言兄弟則昭穆同不得以世數之廟有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父故晉之廟十一室而六世唐之廟十一室而九世國朝太祖之室太宗稱孝弟真宗稱孝子大行稱孝孫而禘祫圖太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮著之祀典大行神主祔廟請増為八室以備天子事七世之禮盧士宗司馬光以為太祖已上之主雖屬尊於太祖親盡則遷故漢元之世太上廟主瘞於寝園魏明之世處士廟主遷於園邑晉武祔廟遷征西府君惠帝祔廟遷豫章府君自是以下大抵過六世則遷蓋太祖未正東向故止祀三昭三穆已正東向則并昭穆為七世唐初祀四世太宗増祀六世及太宗祔廟則遷𢎞農府君髙宗祔廟又遷宣帝皆祀六世前世成法也𤣥宗立九室祀八世事不經見若以太祖太宗為一世則大行祔廟僖祖親盡當遷夾室祀三昭三穆於先王典禮及近世之制無不符合抃等復議曰自唐至周廟制不同而皆七世自周以上所謂太祖非始受命之主特始封之君而已今僖祖雖非始封之君要為立廟之祖方廟數未過七世遂毁其廟遷其主考之三代禮未有此漢魏及唐一時之議恐未合先王制禮之意乃存僖祖室以備七室蕙田案三議皆可行文獻通考仁宗嘉祐時集賢校理邵必言周禮小宗伯之職凡王之會同甸役禱祠肄儀為位鄭氏注云若今時肄儀司徒府今習宫廟儀而啟室登殿拜則小揖奠則虚爵樂舉柷敔舞備行綴慢䙝神靈莫斯為甚夫習儀者本以防失禮而凟神也奈何天子未行親祠而有司先凟之宜習于尚書省以比漢司徒府下禮院兩制定而從之嘉祐七年六月時英宗已即位仁宗将祔廟修奉太廟使蔡襄上八室圖廣廟室并夾室為十八間神主奉安齋殿數月而成舊廟室前楹狹隘每禘祫陳序昭穆南北不相對左右祭器填委不中儀式嘉祐親祫増築土階張幄帟乃可行禮宗正丞趙觀請廣檐陛如親祫時凡二丈七尺宋史神宗本紀治平四年正月英宗崩九月壬午祧僖祖及文懿皇后乙酉祔英宗神主於太廟禮志治平四年英宗将祔廟太常禮院請以神主祔第八室祧藏僖祖神主於西夾室自仁宗而上以次遞遷翰林承㫖張方平等議同堂八室廟制已定僖祖當祧合於典禮乃以九月奉安八室神主祧禧祖及后祔英宗罷僖祖諱及文懿皇后忌日神宗本紀熈寧二年春正月甲午奉安英宗神御於景靈宫英徳殿禮志熈寧二年奉安英宗御容景靈宫神宗本紀熈寧四年七月庚子詔宗室不得祀祖宗神御禮志知大宗正丞事李徳芻言禮法諸侯不得祖天子公廟不設於私家今宗室邸第並有帝后神御非所以明尊卑崇正統也望一切廢罷下禮官詳定請如所奏詔諸宗室宫院祖宗神御迎藏天章閣自是臣庶之家凡有御容悉取藏禁中蕙田案李徳芻此奏差強人意神宗本紀熈寧六年春正月辛亥復僖祖為太廟始祖以配感生帝祧順祖於夾室禮志熈寧五年中書門下言僖祖以上世次不可得而知則僖祖有廟與商周契稷疑無以異今毁其廟而藏主夾室替祖考之尊而下祔於子孫殆非所以順祖宗孝心事亡如存之義請以所奏付兩制議取其當者時王安石為相不主祧遷之說故復有是請翰林學士元絳等上議曰自古受命之王既以功徳享有天下皆推其本統以尊事其祖故商周以契稷有功於唐虞之際故謂之祖有功若必以有功而為祖則夏后氏不郊鯀矣今太祖受命之初立親廟自僖祖以上世次既不可知則僖祖之為始祖無疑矣儻謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也傳曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖今遷僖祖之主藏於太祖之室則是四祖祫祭之日皆降而合食也請以僖祖之廟為太祖則合於先王禮意翰林學士韓維議曰昔先王有天下迹其基業之所起奉以為太祖故子夏序詩稱文武之功起於后稷後世有天下者特起無所因故遂為一代太祖太祖皇帝功徳卓然為宋太祖無少議者僖祖雖為髙祖然仰跡功業未見所因上尋世系又不知所以始若以所事契稷奉之竊恐於古無考而於今亦所未安今之廟室與古殊制古者毎廟異宫今祖宗同處一室而西夾室在順祖之右考之尊卑之次似亦無嫌天章閣待制孫固請特為僖祖立室由太祖而上親盡迭毁之主皆藏之嘗禘祫時以僖祖權居東向之位太祖順昭穆之列而從之取毁廟之主而合食則僖祖之尊自有所申以僖祖立廟為非則周人别廟姜嫄不可謂非禮祕閣校理王介請依周官守祧之制剏祧廟以奉僖祖庶不下祔子孫夾室以替逺祖之尊帝以維之說近是而安石以維言夾室右為尊為非理帝亦然之又安石以尊僖祖為始祖則郊祀當以配天若宗祀明堂則太祖太宗當迭配帝又疑明堂以英宗配天與僖祖為非始祖之說遂下禮官詳定同判太常寺兼禮儀事張師顔等議昔商周之興本於契稷故奉之為太祖後世受命之君功業特起不因先代則親廟迭毁身自為祖鄭𤣥云夏五廟無太祖禹與二昭二穆而已張薦云夏后以禹始封遂為不遷之祖是也若始封近世上有親廟則逺祖上遷而太祖不毁魏祖武帝則處士迭毁唐祖景帝則𢎞農迭毁此前世祖其始封之君以法契稷之明例也唐韓愈有言事異商周禮從而變晉瑯琊王徳文曰七廟之義自由徳厚流光享祀及逺非是為太祖申尊祖之祀其說是也禮天子七廟而太祖之逺近不可以必但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家以僖祖親盡而祧之奉景祐之詔以太祖為帝者之祖是合於禮矣張昭任徹之徒不能逺推隆極之制因緣近比請建四廟遂使天子之禮下同諸侯若使廟數備六則更當上推兩世而僖祖次在第三亦未可謂之始祖也謹案建隆四年親郊崇配不及僖祖開國以來大祭虚其東向斯乃祖宗已行之意請畧倣周官守祧之制築别廟以藏僖祖神主大祭之歲祀於其室太廟則一依舊制虚東向之位郊配之禮則仍其舊同知太常禮院蘇稅請即景靈宫祔僖祖即與唐祔獻懿二祖於興聖明徳廟禮意無異同判禮院周孟陽等言自僖祖而上世次莫知則僖祖為始祖無疑宜以僖祖配感生帝章衡請尊僖祖為始祖而次祧順祖以合子為父屈之義推僖祖侑感生之祀而罷宣祖配位以合祖以孫尊之義餘且如舊制而馮京欲以太祖正東向之位安石力主元絳初議遂從之帝問配天孰是安石曰宣祖見配感生帝欲改以僖祖配帝然之於是請奉僖祖神主為始祖遷順祖神主夾室以僖祖配感生帝祀詔下太常禮院詳定儀注安石本議以僖祖配天帝不許故更以配感生帝焉孫固傳固領銀臺時議尊僖祖為始祖固議曰漢髙以得天下與商周異故太上皇不得為始封光武中興不敢祖舂陵而祖髙帝宋有天下傳之萬世太祖功也不當替其祀請以為始祖而為僖祖别立廟禘祫之日奉其祧主東向以申其尊合所謂祖以孫尊孫以祖屈之意韓琦見而歎曰孫公此議足以不朽矣韓維傳維判太常寺初僖祖主已遷及英宗祔廟中書以為僖祖與稷契等不應毁其廟維言太祖勘定大亂子孫遵業為宋太祖無可議者僖祖雖為髙祖然仰迹功業非有所因若以所事稷契事之懼有所未安宜如故便王安石方主初議持不行蕙田案韓維張師顔議自不可易安石堅僻之性壞及祖廟異哉文獻通考中書門下議不祧僖祖祕閣校理王介上議曰夫物有無窮而禮有有限以有限制無窮此禮之所以起而天子所以七廟也今夫自考而上何也必曰祖自祖而上何也必曰曾祖自曾祖而上何也必曰髙祖自髙祖而上又何也必曰不可及見則聞而知之者矣今欲祖其祖而追之不已祖之上又有祖則固有無窮之祖矣聖人制為之限此天子七廟所以自考廟而上至顯祖之外而必祧也自顯祖之外而祧亦猶九族至髙祖而止也皆以禮為之界也五世而斬故也䘮之三年也報罔極之恩也以罔極之恩為不足報則固有無窮之報乎何以異于是故䘮之罔極而三年也族之久逺而九也廟之無窮而七也昔先王之制弗敢過焉者也記曰品節斯斯之謂禮易于節之象曰君子以制度數議徳行蕙田案王介所言頗得禮意神宗本紀熈寧十年五月戊午詔修仁宗英宗廟元豐元年正月戊午命詳定郊廟禮儀禮志元豐元年詳定郊廟禮文所圖上八廟異宫之制以始祖居中分昭穆為左右自北而南僖祖為始祖翼祖太祖太宗仁宗為穆在右宣祖真宗英宗為昭在左皆南面北上陸佃言太祖之廟百世不遷三昭三穆親盡則迭毁如周以后稷為太祖王季為昭文王為穆武王為昭成王為穆康王為昭昭王為穆其後穆王入廟王季親盡而遷則文王宜居昭位武王宜居穆位成王昭王宜居昭位康王穆王宜居穆位所謂父昭子穆是也說者以昭常為昭穆常為穆則尊卑失序復圖上八廟昭穆之制以翼祖太祖太宗仁宗為昭在左宣祖真宗英宗為穆在右皆南面北上何洵直圖上八廟異宫引熈寧儀僖祖正東向之位順祖宣祖真宗英宗南面為昭翼祖太祖太宗仁宗北面為穆正得祖宗繼序徳厚流光之本意又以晉孫毓唐賈公彦言始祖居中三昭在左南面西上三穆在右南面東上為兩圖上之又援祭法言翼祖宣祖在二祧之位猶同祖禰之廟皆月祭之與親廟一等無親疏逺近之殺順祖實去祧之主若有四時祈禱猶當就壇受祭請自今二祧神主殺于親廟四時之祭享嘗乃止不及大烝不薦新物去祧神主有禱則為壇而祭庶合典禮又請建新廟於始祖之西畧如古方明壇制有詔俟廟制成日取㫖文獻通考馬氏曰晦菴嘗言太祖昭穆廟制一事千五六百年無人整理且以為神宗嘗討論舊典将復古制而惜其未及營建愚以為後王之失禮者豈獨廟制一事而廟制之說自漢以來諸儒講究非不詳明而卒不能復古制者蓋有由矣如天子七廟三昭三穆并太祖之廟而七太祖百世不遷一昭一穆為宗亦如之餘則親盡迭毁其制則外為都宫内各有寝廟别有門垣太祖在北東向左昭右穆以次而南夫人而能知之也然此乃殷周之制殷以契為太祖而成湯及三宗則為有功徳不毁之廟周以稷為太祖而文武則為有功徳不毁之廟其餘則親盡而毁夫契稷皆有大功于生民以此受封傳世至于湯武受命興王推其所自本于契稷故奉之以為太祖舉無異詞若後之有天下者則皆功業特起不因前代然既即帝位必以天子之禮事其祖考如漢之太公晉之征西豫章唐之獻懿景元宋之僖順翼宣皆帝者之祖宗享七廟之嚴奉可也若推以為太祖而比之稷契則固不侔矣是以韋𤣥成劉歆諸人講論廟制備矣而終不能復殷周之制者蓋太祖之位未定故也古之祫祭蓋奉太祖與毁廟未毁廟之主而合祀之其制則太祖東向左昭右穆以次為位而祭之然唐世以景帝為太祖唐公李虎髙祖之祖當中睿間則景帝世近在三昭三穆之内故禘祫則虚東向之位而太祖列於昭穆至代宗以後景帝方居第一室禘祫得以正位然獻懿二祖景帝之祖父親盡已毁而禘祫則合祭故當時建議者請景帝禘祫之時暫居昭穆屈已以奉祖宗而以獻祖東向然則唐世之祫祭如太祖東向之位其始也虚之其末也則景獻二帝迭處之矣然祭祀乃一時之禮虚其位可也迭處其位亦可也宗廟有百世之規既立太祖之廟不可復虚既入太祖之廟不可復遷姑以熈寧之事言之當時以僖祖為太祖而自翼祖以下至英宗為三昭三穆是矣然僖祖本無功徳非宋所以興而肇造區夏光啟後裔者藝祖太宗也今僖祖為百世不遷之太祖而藝祖太宗則親盡而毁之可乎藉曰以二祖同文武世室亦百世不毁然周之文武其功徳未嘗居后稷之右今以僖祖為太祖而藝祖太宗僅同世室終不足以厭人心蓋宋太祖之廟非藝祖不足以當之而神宗之世纔及五代以藝祖為太祖則七廟未可立也漢以來崛起而有天下者必合以天子之禮事其祖考于是尊為始祖或推以配天固不容論其功業之有無也逮其傳世既久子孫相承則自當以建邦啟土剏業垂統者為太祖而剏業者所祖之祖固未可以言百世不遷矣蓋後世太祖之位隨世而遷太祖之議世各異論不能如殷契周稷之定于有天下之初而後世子孫竟無以易也然則歴代所以不能復殷周七廟之制者非不知古禮也正以追尊之祖無一人可以擬稷契者是以太祖之議難决而太祖之位未定故耳蕙田案馬氏說極為明暢神宗本紀元豐三年三月乙酉祔慈聖光獻皇后神於太廟九月乙酉詔即景靈宫作十一殿以時王禮祀祖宗禮志元豐三年禮文所言古者宗廟為石室以藏主謂之宗祏夫婦一體同几共牢一室之中有左主右主之别正廟之主各藏廟室西壁之中遷廟之主藏於太祖太室北壁之中其塪去地六尺一寸今太廟藏主之室帝后異處遷主仍藏西夾室求之於禮有所未合請新廟成並遵古制從之神宗本紀元豐五年十一月壬午景靈宫成遷祖宗神御癸未初行酌獻禮乙酉以奉安神御赦天下官在京大臣子若孫一人庚寅紫宸殿宴侍祠官禮志元豐五年作景靈宫十一殿而在京宫觀寺院神御皆迎入禁中所存惟萬夀觀延聖廣愛寧華三殿而已凡七十年間神御在宫者四寓寺觀者十有一元豐五年始就宫作十一殿悉迎在京寺觀神御入内盡合帝后奉以時王之禮十一月百官班於集英殿廷帝詣蘂珠凝華等殿行告遷廟禮禮儀使奉神御升綵輿出殿明日復行薦享如禮禮儀使奉神輿行帝出幄導至宣徳門外親王使相宗室正任以上前引望參官及諸軍都虞候宗室副率以上陪位内侍省押班整儀衛以從奉安神御於十一殿明日帝詣宫朝獻先謁天興殿以次行禮並如四孟儀詔自今朝獻孟春用十一日孟夏擇日孟秋用中元日孟冬用下元日天子常服行事薦聖祖殿以素饌神御殿以膳羞器服儀物悉從今制天興殿門以奉天神不立㦸諸神御門置親事官五百人立㦸二十四累朝文武執政官武臣節度使以上並圖形於兩廡凡執政官除拜赴宫恭謝其後南郊先詣宫行薦享禮並如太廟儀文獻通考元豐時修定儀注所言先王之制設廟于前以象生之有朝設寝於後以象生之有寝廟以藏木主列昭穆之序寝有衣冠几杖象平生之居先儒謂薦其血毛腥其俎為薦上古之食退而合享體其犬豕牛羊為薦今世之食儀禮曰燕養饋羞湯沐之饌如他日者鄭氏云孝子不忍一日廢其事親之禮故也後世因之故方其薦上古之食于廟則時王之制有所不行薦今世之饌于寝則先王之禮有所不用有唐追尊老氏立太清宫于西都凡将郊祀必先朝焉嵗四孟月亦先薦焉天寳詔曰我祖淡然常在為道之宗既殊有盡之期須依事生之禮以祭用質明乃尚隂之義故改以卯初冕服策祝非事生之謂故停而不用章聖皇帝席厚徳之流光推璿源之自出乃崇琳館以事聖祖雖採太清之儀實兼原廟之制聖聖纂承益昭前烈然而如在之容或寓于浮圖之祠朝拜之日尚因于道家之禮至于儀物雜以古今義或未稱時亦有待陛下純孝自天至誠繼志肆宏屋宇裒合仙聖規摹恢廓咸出睿畫旬嵗之間其功大就将期落成之始聿嚴親享之事爰勅有司議其典式伏案原廟雖出于近世餘意乃祖乎先王夫孝子之于親也事亡如事其生思之欲見其人齋三日必見其所為齋者不敢以生事之故有廟焉示不忘古所以神之也不敢以亡事之故有寝焉以象其平生所以親之也多方以求之而其肸蠁如在左右故曰唯孝子為能享親陛下比詔禮官講明太廟之禮斷之以古其非先王之法者去而弗用則今日設原廟之禮宜酌今制猶前日之詔意也周官四時之祭春曰祠夏曰禴秋曰嘗冬曰烝皆于首時蓋君子感時物之變而思其親得疏數之中者也伏請以四孟月告廟獻景靈宫天子常服行事薦聖祖殿以素饌神御殿以饍羞器服儀物悉從今制登降薦獻參酌朝謁之儀凡古之事一切不違以合先王事亡如存之義緣享儀注乞下本所詳定從之時祖宗帝后神御皆寓于宫觀寺院在京師者十有五神宗作景靈宫而在京寺觀神御悉迎奉入内所存者唯萬夀觀延聖廣愛寧華三殿焉神宗本紀元豐八年十一月丁酉祧翼祖祔神宗於太廟廟樂曰大明之舞禮志元豐八年太常寺言詔書定七世八室之制今神宗皇帝崇祔翼祖在七世之外與簡穆皇后祧藏於兩夾室置石室中十一月丁酉祔神宗神主於第八室自英宗上至宣祖以次升遷哲宗本紀元祐元年正月丙辰立神宗原廟潛確類書元祐元年太皇太后立神宗原廟詔原廟之立所從來已久前日神宗皇帝即位祠宇並建寝殿以崇嚴祖考其孝可謂至矣今神宗既已升祔於故事當營神御以奉神靈而宫垣之東宻接民里欲加開展則懼成煩擾欲採縉紳之議皆合帝后為一殿則無以稱神宗欽奉祖考之意聞治隆殿後有園地以殿後推之本留以待未亡人也可即其地立神宗原廟吾萬嵗後當從英宗皇帝於天上以寧神明中以成吾子之志下以安居民之心不亦善乎二年三月癸酉奉安神宗神御於景靈宫宣光殿十月壬午奉安神宗御容於會聖宫及應天院徽宗本紀元符三年八月庚子作景靈西宫奉安神宗神御建哲宗神御殿於其西庚戌詔以仁宗神宗廟永世不祧癸亥祔哲宗神主於太廟樂曰大成之舞禮志元符三年禮部太常寺言哲宗升祔宜如晉成帝故事於太廟殿増一室候祔廟日神主祔第九室詔下侍從官議皆如所言蔡京議以哲宗嗣神宗大統父子相承自當為世今若不祧逺祖不以哲宗為世則三昭四穆與太祖之廟而八宜深考載籍遷祔如禮陸佃曾肇等議國朝自僖祖而下始備七廟故英宗祔廟則遷順祖神宗祔廟則遷翼祖今哲宗於神宗父子也如禮官議則廟中當有八世况唐文宗即位則遷肅宗以敬宗為一世故事不逺哲宗祔廟當以神宗為昭上遷宣祖以合古三昭三穆之義先是李清臣為禮部尚書首建增室之議侍郎趙挺之等和之會清臣為門下侍郎論者多從其議唯京佃等議異二議既上清臣辨說甚力帝迄從焉六月禮部請用太廟東夾室奉安哲宗神主太常少卿孫傑言先帝神主錯之夾室即是不得祔於正廟與前詔増建一室之議不同昨用嘉祐故事專置使修奉請以夾室奉安神主亦與元置使之意相違請如太常前議増建一室尚書省以廟室未備行禮有期權宜升祔隨即増修比之前代設幄行事者不為不至詔依初㫖行之廼祔哲宗神主於夾室徽宗即位宰臣請特建景靈西宫奉安神宗於顯承殿為神御之首昭示萬世尊異之意建哲宗神御殿於西以東偏為齋殿乃給度僧牒紫衣牒千道為營造費户牖工巧之物並置荆湖北路已而右正言陳瓘言五不可且論蔡京矯誣不從文獻通考右正言陳瓘言近修建景靈西宫拆移元豐庫大理寺軍器監儀鑾司等處以其地奉安神考哲宗神御然可得而議者有五事焉夫國之神位左宗廟右社稷今廟據社位不合經㫖此其可議者一也刑獄之地必有殺氣今乃擇此以建宫廟此其可議者二也西宫之地雖云只移官舍不動民居而一寺一庫一監一司移於他處遷此就彼亦有居民此其可議者三也昔者奉安祖宗帝后神御散於寺觀之内神考合集諸殿會於一宫今乃析而為二嵗時酌獻鑾輿分詣禮既繁矣事神則難此其可議者四也顯承殿奉安以來一祖五宗神靈協會既久何用遷徙宗廟重事豈宜輕動此其可議者五也望别行詳議瓘又言陛下所以不敢輕議者謂神考素有修西宫之意蔡京親聞先訓而實錄備載其語故不可以不恭依也以臣觀之此乃蔡京矯誣神考之訓無足信者元豐中神考於治隆殿後留基以待宣仁後因御史有請宣仁以其地為神考廟宫而紹聖大臣反謂宣仁輕蔑神考裁損廟制於是重建顯承殿以為奉安之地當哲宗之時蔡京最用事凡可以毁宣仁者無所不至豈有親聞神考之言可以證元祐之失而乃隠忍不聞於哲宗者乎臣以是知其為矯誣也不從詔仁宗神考廟永祀不祧詔曰蓋聞有天下者事七世則迭毁之制有常祖有功而宗有德則不遷之廟非一伏以藝祖應天順人肇造區夏太宗受命繼代底定寰宇真宗以聖繼聖撫全盛之運故仁祖並尊為百世不祧之廟恭惟仁宗皇帝躬天地之度以仁為治在位四十二年利澤施于四海早定大策授英宗以神器功隆徳厚孰可擬議英宗皇帝享祚日淺未究施設神宗皇帝以聖神不世出之資慨然大有為于天下政令法度莫不革而新之功業盛大謙抑不居而廟祏之制未議尊崇宜令禮官稽參故事考定仁祖神考廟制詳議以聞十一月權太常少卿盛次仲等言仁宗神考請如聖詔尊崇廟祏永祀不祧與天無極于是三省表請付外施行有詔恭依宋史禮志建中靖國元年名哲宗神御殿曰觀成尋改重光詔自景靈宫並分三日朝獻崇寧元年三月丁巳奉安哲宗神御於景靈西宫寳慶殿閏月甲寅朔更名哲宗神御曰重光徽宗本紀二年二月癸酉奉安哲宗御容於西京會聖宫及應天院十二月癸亥祧宣祖皇帝昭憲皇后禮志崇寧二年祧宣祖與昭憲皇后神主藏西夾室居翼祖簡穆皇后石室之次文獻通考崇寧二年詔祧宣祖以哲宗神主祔太廟第八室詔曰欽惟哲宗實繼神考傳序正統十有六年升祔之初朕方恭黙乃増一室於七室之外遂成四穆於三昭之間考禮與書曾靡有合比閱近疏特詔從臣并與禮官博盡衆見列奏來上援據甚明謂本朝自僖祖至仁宗始備七世當英宗祔廟上祧順祖暨神考祔廟又祧翼祖則哲宗祔廟父子相承自當為世祧遷之序典禮可稽覽之惕然敢不敬聽其合行事件令禮部太常寺詳議聞奏十二月禮部太常寺言祧遷之序當祧宣祖昭武睿聖皇帝昭獻皇后杜氏神主藏於西夾室居翼祖簡恭睿徳皇帝簡穆皇后劉氏石室之次當遷之主每遇祫享即依典禮其祧遷祭告興工擇日學士院撰祝文望依故事詔恭依宋史徽宗本紀崇寧三年十月己巳立九廟復翼祖宣祖禮志崇寧三年詔曰去古既逺諸儒之說不同鄭氏謂太祖及文武不祧之廟與親廟四為七是不祧之宗在七廟之内王氏謂非太祖而不毁不為常數是不祧之宗在七廟之外木朝今已五宗則七廟當祧者二宗而已遷毁之禮近及祖考殆非先王尊祖之意宜令有司復議禮官言先王之制廟止於七後王以義起禮乃有増置九廟者禮部尚書徐鐸又言唐之獻祖中宗代宗與本廟僖祖皆嘗祧而復今存宣祖於當祧之際復翼祖於己祧之後以備九廟禮無不稱乃命鐸為修奉使増太廟殿為十室玉海東京太廟舊十六楹為七室東西二楹為夾室康定元年冬趙希賢請倣古制每主為一廟一寝不從及元符三年哲宗祔廟七室已滿僖祖至神宗乃祔哲宗主于東夾室文獻通考崇寧三年九月詔曰有天下者事七世古之道也惟我治朝祖功宗徳賢聖之君六七作休烈之盛軼於古先尊為不祧者至於五宗遷毁之禮近及祖考永惟景祐欽崇之詔已行而不敢踰暨我元符尊奉之文既隆而不可殺雖欲如古莫可得也博考諸儒之說詳求列辟之宜顧守經無以見其全而適時當必通其變爰稽衆議肇作彛倫惟恩以稱情而為宜則禮以義起而無愧是用酌鄭氏四親之論取王肅九廟之規參合二家之言著為一代之典自我作古垂之将來庶安宗廟之靈以承邦家之福其合行典禮令禮部太常寺詳議聞奏十月詔曰仰惟翼祖在天毓璿源而濬發安陵有衍粲皇武於始基然循七世八室之規則數踰於古遵九廟五宗之法則禮未應遷是用仰奉二祧之靈復還列聖之次雖豐不昵雖逺當隆豈惟稽三代之徽猷蓋亦用本朝之故事其已祧翼祖當祧宣祖廟並復玉海崇寧四年正月奉僖祖為太廟始祖文獻通考崇寧四年三月詔以復翼祖宣祖廟增太廟殿為十室尋以吏部侍郎王寧為佇奉使六月九廟奉禮畢宰臣蔡京率百官拜表稱賀宋史禮志崇寧四年十二月復翼祖宣祖廟行奉安禮惟不用前期誓戒及亞終獻之樂舞焉蕙田案禮天子七廟本無九廟之文即周亦云文世室武世室未嘗言廟也且世室乃親盡之祖有功徳者不毁在親廟之上宋以有功德之祖居昭穆之位反以親盡之祖充九廟之數何其與古戾也徽宗本紀大觀元年九月己酉加上僖祖諡禮志政和三年奉安哲宗神御於重光殿昭懐皇后神御殿成詔名正殿曰柔儀山殿曰靈娭於是兩宫合為前殿九後殿八山殿十六閣一鐘樓一碑樓四經閣一齋殿三神厨二道院一及齋宫廊廡共為二千三百二十區文獻通考凡神御殿者古之原廟天聖初禮儀使言正月朝拜啟聖院神御在諒闇請差輔臣酌獻知制誥張師徳奉安太祖太宗御容于鴻慶宫迎景靈宫真宗御容奉安于西京應天院曲赦西京自是多以宰相若近臣為禮儀使入内都知押班御藥管勾儀衛先迎御容至文徳或會慶長春殿宿齊奉辭輔臣宗室前導既而酌獻出則百官辭于近郊景靈舊晉邸真宗所生修萬夀殿名曰奉真二年奉安塑像又建殿于上清太平宫奉安御容改玉清昭應宫集靈殿為安聖殿奉安玉石像出御容奉安洪福院四年出御容奉安鴻慶宫五年天章閣迎御容奉安慈孝寺崇真殿御飛白書額太后塑像侍側外無知者明年手詔宣示皆真宗神御也八年啟聖院太宗神御為永隆殿迎天章閣太祖御容奉安于太平興國寺開先殿九年永安縣建會聖宫奉安三聖明道二年慈孝寺荘獻神御為彰徳殿景靈宫荘懿神御為廣孝殿奉安御容恭謝禮成迎龍圖閣太宗御容奉安壽寧堂景福殿真宗御容奉安福聖殿景祐二年改長寧宫為廣聖宫前殿有道家天神之像後起觀閣奉真宗神御占宫城西北隅普安院元徳荘穆神御為重徽殿四年萬夀觀修荘惠真容殿名曰廣愛禮賔使白仲達入内東頭供奉官蘇紹榮奉安太祖御容于揚州建隆寺即南征駐蹕之地景徳中置殿繪御容而其制卑陋會占者言東南有王氣乃别構殿易以塑像為章武殿是嵗開先殿火康定初鴻慶宫神御殿又火罷修神御即舊基構齋殿每醮則旋設三聖位舊像瘞宫側慶歴六年重修開先殿御飛白書榜迎天章閣太祖御容奉安七年鴻慶宫復修三聖神御曲赦南京八年自萬夀觀奉宣祖太祖太宗御容于睦親宅真宗御容于天章閣皇祐五年會靈觀火權奉三聖于景靈宫滁州通判王靖請滁并澶三州建殿以奉神御即芳林園命工寫三聖御容車駕詣萬夀觀辭翌日奉太祖于滁州天慶觀端命殿太宗于并州資聖院統平殿真宗于澶州開福院信武殿各以輔臣為迎奉使副具儀仗導至近郊内臣管勾奉安百官辭觀門外帝謂輔臣曰并州言四月二十二日奉安太宗御容仍以平晉記來上蓋紀太平興國四年征討之事是時車駕亦以四月二十二日至太原城下何其異也葺重徽隆福殿奉安明徳元徳章穆皇后至和元年重修開先殿奉神御于天章閣萬夀觀延聖殿神御帳損權徙别殿二年帳成奉安真宗金像天章閣迎太祖孝明皇后御容奉安開先殿數日又迎太宗元徳皇后御容奉安永隆殿英宗治平初景靈宫西園作仁宗神御殿曰孝嚴别殿曰寧真齋殿曰迎釐景靈西門曰廣祐明年奉安次日太后酌獻大臣分獻天興諸殿特支在京諸軍班錢初真宗大中祥符五年以聖祖臨降作景靈宫至天聖元年二月詔修宫之萬夀殿以奉真宗皇帝殿成榜曰奉真明道二年又建廣孝殿十月二十九日奉安章懿皇后神御儀衛迎導祭告皆如天聖二年奉真殿禮治平元年三月又詔就宫之西園建殿以奉仁宗皇帝八月殿成榜曰孝嚴二年四月十七日奉安御容帝親行酌獻命大臣分詣諸神御代行禮翌日皇太后酌獻皇太后大長公主以下内外命婦陪位于廷詔每嵗下元朝謁如奉真殿儀九月詔名齋殿曰迎釐十二月名宫之西門曰廣祐凡七十年間神御在宫者四其他寓諸寺觀者十一所元豐五年神宗皇帝始就景靈宫作十一殿在京宫觀寺院神御悉皆迎奉入内盡合帝后而奉以時王之禮元祐元年作宣光殿後改為徽音殿紹聖二年作顯承殿元符三年作西宫以顯承殿為館御之首易名曰大明又作坤元殿重光殿政和四年作柔儀殿于是兩宫合為前殿九後殿八山殿十六閣一鐘樓一碑樓四經閣一齋殿三神厨二道院一東宫正南門曰景靈宫門門内有東西横門其北曰天興殿門門内曰天興殿以奉聖祖九天司命天尊大帝玉石像刻真宗皇帝聖容侍立大中祥符五年作及奉僖祖皇帝順祖皇帝翌祖皇帝版位元豐五年作東西廊門曰左右正元殿後門曰保寧以奉元天大聖后像大中祥符五年作及文懿皇后惠明皇后版位元豐五年祔閣上奉聖祖及六仙官大中祥符五年作自西横門西出凡前後殿各三曰天元殿以奉宣祖皇帝山殿曰來寧其後曰太始殿以奉昭憲皇后山殿曰宴娭次西皇武殿以奉太祖皇帝山殿曰靈游其後曰儷極殿以奉孝明皇后山殿曰凝神又西曰大定殿以奉太宗皇帝山殿曰天游其後曰輝徳殿以奉懿徳皇后明徳皇后元徳皇后山殿曰泠風自東横門東出凡前後殿各三曰熈文殿以奉真宗皇帝山殿曰太虚其後曰衍慶殿以奉孝穆皇后章獻明肅皇后章懿皇后山殿曰丹臺次西曰美成殿以奉仁宗皇帝山殿曰晨霄其後曰繼仁殿以奉慈聖光獻皇后山殿曰靈崐又西曰治隆殿以奉英宗皇帝山殿曰昭清其後曰徽音殿以奉宣仁聖烈皇后山殿曰寧真齋殿在天興殿之東曰明福西曰迎釐神厨道院皆在宫之西南西宫正南門曰燕昌門其北曰大明殿門門内曰大明殿以奉神宗皇帝山殿曰靈徳其後曰坤元殿以奉欽聖憲肅皇后欽成皇后欽慈皇后山殿曰顯光其西曰世徳門其北曰重光殿門門内曰重光殿以奉哲宗皇帝山殿曰靈臺其後曰柔儀殿以奉昭懐皇后山殿曰靈娭齋宫在宫之東偏正南曰昭徳門門内曰潔誠殿神厨正宫之東南殿閣齋宫及廊廡共為屋二千三百二十區凡累朝文臣執政官武臣節度使以上並圖形于兩廡蕙田案漢立原廟議者非之宋廼復襲其名建立神御殿至不可數而以帝王之尊雜處于浮屠道家之宇先王之禮掃地盡矣通考總叙始末最詳存之可以為戒也揮塵前録祖宗神御像設在南京則鴻慶宫西京則奉先寺之興元會聖宫之降真殿揚州曰彰武滁州曰端命河東曰統平鳯翔曰上清太平宫真宗親征北郊封泰山祀汾陰則有澶淵之信武嵩山崇福之保祥華隂雲臺之集真乾徳六年即都城南安陵之舊城建奉先資福院為慶基殿以奉宣祖藝祖則太平興國之開先太宗則啟聖之永隆至大中祥符中建景靈宫天興殿以奉聖祖其後真宗之奉真仁宗之孝嚴英宗之英徳皆在其側也又有慈孝之崇真萬夀之延聖崇先之永崇以奉真宗母后章顯明肅在崇真之旁曰章徳章懿在奉先之後曰廣孝章惠在延聖之後曰廣愛在普安者二元徳曰隆福明徳章穆曰重徽元豐中神宗以獻享先後失序地偏且逺有曠世不及親祀者廼詔有司神御之在京師寓于佛祠者皆廢撤而遷之禁中由英徳而上五世合為一宫凡十一殿以世次列東西序帝殿一門列㦸七十二殿之西廡繪畫容衛王公名将羅立左右内有燕寝温凊之室玩好畢陳而母后居其北改慶基曰天元后曰太始開先曰皇武后曰儷極永隆曰大定后曰輝徳奉真曰熈文后曰衍慶孝嚴曰美成后曰繼仁英徳曰治隆其便殿十一曰來寧曰燕娭曰靈遊曰凝神曰天遊曰泠風曰太靈曰丹臺曰靈崐曰昭清以五年十一月奉安帝后塑像于新宫大赦天下繪像侍臣于後元祐初即治隆之後宣光殿以奉神宗紹聖初闢宫之東隅為顯承殿以宣光殿故址為徽音殿以奉宣仁聖烈建中靖國元年詔以顯承介于一偏廟號未稱于是度馳道之西東直大定南北廣袤地勢併撤府寺創為西宫建大明宫以奉神宗為館御之首涓日遷奉親祠永為不祧之廟以示推崇之意曲赦四畿録功臣後如元豐故事云右宋廟制上五禮通考卷八十一
