body:
  text: 五禮通考卷一百七十六刑部尚書秦蕙田撰嘉禮四十九學禮蕙田案養老之禮自虞夏殷以來已重之至周而大備其所養之老有三曰國老曰庶老曰死政之老每嵗仲春季春仲秋之月天子親視學大合樂擇公卿大夫之致仕有賢德者以為三老五更天子袒而割牲執醬而饋執爵而酳尊之如父兄其羣老皆設席位禮之如衆賔欲陳孝弟以教天下也其餘如簡不帥教出征受成於學以訊馘告凡天子有事於學必舉養老之禮而諸侯之國及鄉遂之吏亦皆得養老於學焉若庶人之老不能遍養於學則有引年復除之令而又制民田里教之樹畜導其妻子使養其老孟子所謂善養老者是也養老之禮散見於月令王制祭義內則樂記諸篇而文王世子尤為詳備今以類編入學禮而經傳所載優老之事亦附焉後世舉視學養老之典者惟後漢及魏與後魏及周至於優禮高年之事則歷代史册皆不絶書今並搜輯以著於篇禮記祭義先王之所以治天下者五貴老為其近於親也敬長為其近於兄也是故至孝近乎王雖天子必有父至弟近乎霸雖諸侯必有兄注天子有所父事諸侯有所兄事謂養三老五更也昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒注貴謂燕賜有加於諸臣也尚謂有事尊之於其黨也臣能世祿曰富舜時多仁聖有德後德則在小官疏此論四代弟順尚齒之義虞氏帝德𢎞大故貴德德之中年高者在前是德中尚齒夏后氏尚功功高則爵高既貴其爵德雖下而爵高者則貴之於貴爵之中年高者在前故云尚齒殷家纍世有功世爵而富乃貴之亦年高者在前周人敬愛彌狹殷人疏而富者猶貴之周人於已有親乃貴之就此之中亦年高者在前輔氏廣曰有德者必有爵有爵者必有富此虞夏殷之所貴如此至於周則又厚親以反本焉此世變使然聖人因時定制也若夫年齒之尚行乎萬世而不可變者虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也注言其先老也近疏次乎事親者言貴年之次第乎事親之孝吕氏澄曰此承上文申言四代皆尚齒之義遺謂忽忘之與違其親之違同年即齒也四代之所貴雖有不同而其尊年尚齒則一蓋年齒之可貴於天下歷四代至今不變故曰久矣尚齒之弟次乎事親之孝也方氏慤曰或曰年或曰齒年以所歷言齒以所序言王制司徒養耆老以致孝注耆老所當孝養上之人養耆老則民皆知孝矣大學上老老而民興孝上長長而民興弟周禮地官大司徒以保息六養萬民二曰養老注養老七十養於鄉五十異粻之屬謂疏王制云五十養於鄉六十養於國七十養於學彼大夫士也王制又云凡三王養老皆引年注云已而引户校年當行復除也老人衆多非賢者不可皆養故食貨志云七十已上上所養也此云七十養於鄉亦謂有賢行者也五十異粻之屬者是王制文禮記常法庶人食稷士兼食黍大夫又加以粱今雖庶人至五十或與士大夫同食食黍粱故云異粻孟子伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以為已歸矣白虎通德論王者父事三老兄事五更者何欲陳孝悌之德以示天下也故雖天子必有尊也言有父也必有先也言有兄也蕙田案以上總論養老之義禮記王制有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊疏養老必於學者教孝悌之處故於中養老熊氏云國老謂卿大夫致仕者庶老謂士也皇氏云庶老兼庶人在官者其致仕之老大夫以上當養從國老之法士養從庶老之法故外饔云邦饗耆老掌其割烹鄭注引此周人養國老於東膠養庶老於虞庠是也陳氏禮書貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老國子與庶人之秀者同其學所以一道德國老與庶老異其學所以别分義蕙田案庶老謂士以下致仕者若庶人之老别有引年之法不養於學也陳氏指庶人之老言非丘氏濬曰王者之養老所以教天下之孝也而必於學者學所以明人倫也人倫莫先於孝弟老者之於君以德則君尊也以齒則老者先也人君致孝弟於其親長下之人無由以見也故於學校之中行養老之禮使得於聽聞觀感者曰上之人於夫人之老者尚致其敬如此矧其親屬乎萬乘之尊且如此吾儕小人所宜興起感發也噫老吾老以及人之老長吾長以及人之長一禮之行所費者飲食之微而所致者治效之大也君子耆老不徒行庶人耆老不徒食注徒猶空也徒行謂無車徒食謂無肉周禮地官遺人門關之委積以養老孤注委積者廩人倉人計九穀之數足國用以其餘共之所謂餘法用也少曰委多曰積門關以養老孤人所出入易以取餼廩也疏門謂十二國門關謂十二關門出入皆有稅所稅得者亦送帳多少足國用之外留之以養老孤故司門云以其財養死政之老與其孤司門以其財養死政之老與其孤注財所謂門關之委積也死政之老死國政事者之父母也禮記王制少而無父者謂之孤疏孤顧也顧望無所瞻見也老而無子者謂之獨疏獨鹿也鹿鹿無所依也老而無妻者謂之矜疏劉熙釋名曰無妻曰鰥愁悒不能寐目恆鰥鰥然其字從魚魚目恆不閉老而無夫者謂之寡疏寡倮也倮然單獨此四者天下之窮而無告者也皆有常餼注餼廩也皇氏侃曰人君養老有四種一是養三老五更二是子孫為國難而死王養死者父祖三是養致仕之老四是引户校年養庶人之老陳氏禮書天子之於老也其所養也三國老也庶老也死政者之老也羅氏獻鳩以養之者國老也司徒以保息養之者庶老也司門以其財養之者死政者之老也若夫外饔酒正稿人所謂耆老者總三者而言之也先王父事三老兄事五更則三老五更乃羣老之尤者而致仕之老者固在其間皇氏離而二之誤矣蕙田案以上論國老庶老及死政之老周禮夏官羅氏仲春養國老禮記月令仲秋之月養衰老陳氏澔曰月至四隂隂已盛矣時以陽衰隂盛為秋人以陽衰隂盛為老養衰老順時令也文王世子凡大合樂必遂養老注大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉遂養老者謂用其明日也疏月令季春大合樂亦在其中陳氏澔曰常事合樂不行養老之禮惟大合樂之時人君視學必養老也郊特牲春饗孤子秋食耆老飲養陽氣也故有樂食養隂氣也故無聲凡聲陽也疏案王制夏后氏養老以饗禮則夏家養老用春時有樂無秋食之禮殷人養老以食禮而秋時不作樂無春饗之禮周人修而兼用之則周人養老春夏用饗禮秋冬用食禮四時皆用樂故文王世子云凡大合樂必遂養老注云春合舞秋合聲下云養老之禮遂發咏焉登歌清廟是秋合聲養老亦用樂也皇氏云春是生養之時故饗孤子取長養之義秋是成熟之時故食耆老取老成之義熊氏云春饗孤子亦饗耆老秋食耆老亦食孤子大戴禮保傅篇春秋入學坐國老執醬而親饋之所以明有孝也盧辨注仲春舍菜合舞仲秋班學合聲熊氏安生曰天子視學之年養老一嵗有七謂四時皆養老凡四也又文王世子曰凡大合樂必遂養老注云大合樂謂春入學舍菜合舞秋頒學合聲通前為六又季春大合樂天子視學亦養老是總為七也陳氏禮書天子之於老也嵗養之也三仲春也季春也仲秋也周禮羅氏羅春鳥獻鳩以養國老在仲春月令養衰老授几杖在仲秋文王世子曰凡大合樂必遂養老鄭氏云大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學遂養老此養老於仲春仲秋者也月令季春之末擇吉日大合樂天子親往視之亦必養老此又養老於季春者也若夫簡不帥教出征受成以訊馘告凡天子入學莫不養老此又不在嵗養之數也月令無冬夏養老之文周禮禮記特言春養秋食而已熊氏謂養老嵗有七亦誤矣蕙田案陳氏駮熊説極是又案以上養老之時禮記王制有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人􅒐而祭縞衣而養老周人冕而祭玄衣而養老注凡養老之服皆其時與羣臣燕之服有虞氏質深衣而已夏而改之尚黑而黑衣裳殷尚白而縞衣裳周則兼用之玄衣素裳其冠則牟追章甫委貌也疏深衣謂白布衣以質用白布而已縞白色生絹馬氏晞孟曰祭所以追養繼孝而年之貴乎天下久矣次乎事親事也故先言祭而次言養老祭則言冠而不言衣養老則言衣而不言冠方氏慤曰祭非無衣也然主冠言之者蓋冠在首有尊尊之義焉而祭所以推尊尊之義故也養老非無冠也然主衣言之者蓋衣在體有親親之仁焉而養老所以明親親之仁故也蕙田案以上養老之服曲禮大夫七十而致事若不得謝則必賜之几杖月令養衰老授几杖陳氏澔曰几杖所以安其身詩大雅行葦肆筵設席授几有緝御箋緝猶續也御侍也兄弟之老者既為設重席授几又有相續代而侍者謂敦史也疏敦史主侍老人故知續代而侍者為敦史周禮秋官伊耆氏大祭祀共其杖咸注咸讀為函老臣雖杖於朝事鬼神尚敬去之有司以此函藏之既事乃去之疏謂七十有德君不許致事者也共王之齒杖注王之所以賜老者之杖王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝鄭氏鍔曰國老年齒已高在禮宜杖是之謂齒杖以齒論之雖可以杖必出於王之所賜然後杖伊耆氏之職則共之於王而王用以賜也周家之杖有五十六十七十八十在鄉在家在國在朝之異此所共者其在朝在國者乎漢之哀帝賜孔光以靈夀杖其有周舊典與禮記王制五十杖於家六十杖於鄉七十杖於國八十杖於朝陳氏曰大夫七十而後賜之杖五十而杖者蓋杖於家鄉國者不待賜杖於朝則非賜不可也祭義七十杖於朝蕙田案王制七十杖於國八十杖於朝謂已致仕者祭義七十杖於朝謂未致仕者曲禮所云七十而致事若不得謝則賜之几杖是也又案以上几杖周禮天官外饔邦饗耆老孤子則掌其割烹之事注孤子者死王事之子也王制曰周人養國老於東膠養庶老於虞庠疏邦饗耆老者謂死事者之父祖兼有國老庶老國老謂卿大夫致仕者庶老謂士之致仕者經直言耆老對孤子則耆老者死事之父祖可知但此不見饗國老庶老之文故鄭解耆老謂國老庶老程子曰外饔酒正皆言享耆老孤子則酒食未嘗偏廢也周官言享不言食亦以享未嘗無食也特以食為下爾言老足矣必曰耆老者容養之以六十而工為率與以六十養於國故也酒正饗耆老孤子皆共其酒無酌數注要以醉為度凡有秩酒者以書契授之注所秩者謂老臣王制曰七十不俟朝八十月告存九十日有秩以疏秩常也老臣年九十上常與之酒鄭氏鍔曰享禮之嚴几設而不倚爵盈而不飲所以訓恭儉而此言共酒無酌數何也蓋此所謂享非大享也耆老之子孤子之父死於王事憫其惸獨無依或用酒以飲之所以念其功其享之也不過以醉為度示恩章之厚耳地官稿人若饗耆老孤子士庶子共其食疏耆老謂死王事者之父國家春饗孤子秋食耆老則稿人共其食夏官羅氏仲春羅春鳥獻鳩以養國老行羽物注春鳥蟄而始出者是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣禮記王制凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之注凡飲養陽氣凡食養隂氣陽用春夏隂用秋冬兼用之備隂陽也燕疏有虞氏以燕禮者盧氏云燕禮脫屨升堂崔氏云者殽蒸於俎行一獻之禮坐而飲酒以至於醉有虞氏帝道宏大故養老以燕禮夏后氏以饗禮者崔氏云饗則體薦而不食爵盈而不飲依尊卑為獻取數畢而已夏貴尚以禮故養老以饗禮相養敬也殷人以食禮者崔氏云不飲酒享大牢以禮食之殷人質素威儀簡少故養老以食禮周人修而兼用之者謂周人修三代之禮春夏養老之時用虞氏燕禮夏后氏饗禮秋冬養老之時用殷人食禮周極文故兼用之也皇氏云饗有四種一是諸侯來朝天子饗之則周禮大行人職云上公之禮其饗禮九獻是也其牲則體薦體薦則房蒸故春秋宣十六年左傳云饗有體薦又國語云王公立飫則有房蒸其所云飫即謂饗也立而成禮謂之飫也其禮亦有飯食故舂人云凡饗食共其食米鄭云饗有食米則饗禮兼燕與食也二是王親戚及諸侯之臣來聘王饗之禮亦有飯食及酒其酌數亦當依命數其牲則折俎亦曰殽蒸也故國語云親戚宴享則有殽蒸謂以燕禮而享則有之也左傳云饗有體薦宴有折俎公當饗卿當宴王室之禮也時定王享士會而用折俎以國語左傳觀之則知王親戚及諸侯之大夫來聘皆折俎饗也其享朝廷之臣亦當然也三是戎狄之使來王饗之其禮則委饗也其來聘賤故王不親饗但以牲全體委與之故國語云戎狄貪而不讓坐諸門外而體委與之是也若夷狄君來則當與中國子男同故小行人職掌大賔小客所陳牲牢當不異也四是饗宿衛及耆老孤子則以醉為度故酒正云凡饗士庶子饗耆老孤子皆共其酒無酌數鄭云要以醉為度食禮者有飯有殽雖設酒而不飲其禮亦以飯為主故曰食也其禮亦有二種一是禮食故大行人云諸公三食之禮有九舉及公食大夫禮之屬是也二是燕食謂臣下自與賔客旦夕共食案鄭注曲禮酒漿處右云此大夫士與賔客燕食之禮燕禮者凡正饗食在廟燕則在寢燕以示慈惠故也燕禮則折俎有酒而無飯其牲用狗毛詩傳云燕安也其禮最輕升堂行一獻禮畢而脫屨升堂坐飲以至醉也儀禮猶有諸侯燕禮一篇凡燕禮亦有二種一是燕同姓二是燕異姓故詩湛露鄭箋云夜飲之禮同姓則成庶姓讓之則止此宴饗食致仕之老則當用正饗正食正燕之禮以其有賢德不可以褻禮待之其饗死事之老不必有德又是老人不宜久立當用折俎之饗燕食之食老人不合夜飲當用異姓之燕禮皇氏云春夏雖以飲為主亦有食先行饗次燕次食秋冬雖以食為主亦有饗先行食次燕次饗一日之中三事行畢義或然也劉氏曰以養莫善於燕莫不善於饗而食次之以養亦莫善於饗莫不善於食而燕次之周人備矣所謂養老者養其體者也故擇其柔嘉選其馨香潔其酒醴品其豆籩修其簠簋奉其犧象謹其袚除於是乎體解節折而共飲食之又為折俎加豆是以惠豐而德洽民之見者以為盡心也莫不加愛焉故莫善於燕夫饗所以訓恭儉也而養老所以充體氣也修其物篤其意而不得躬之酒盈而不飲肉乾而不食設几而不倚一獻而百拜惡在其惠也故莫不善於享是有虞氏所以不從也所謂養義養其賢者也年者天下之達尊也爵者天下之達尊也以達尊之爵養達尊之年其意猶不敢褻為之故一獻而百拜民之見者以為至恭也莫不加肅焉故莫善於饗夫養義者貴其養志也若曽子之養曽晢者也而食者無百拜之恭無一獻之節此所謂養口體也若曽元之養曽子者也民之見者可易也故曰莫不善於食是夏后氏所以不從也三聖之作非以相反也養老以彼養義以此所以尊其年尚其德也尊其年仁也尚其德義也周人通其道達其意修而兼用之仁且義是謂大備矣陳氏禮書行葦言飲射而繼之以祈黃耉此周人以燕禮養老也周官外饔言饗耆老此周人以饗禮養老也祭義曰食三老五更於大學天子袒而割牲執醬而饋執爵而酳此周人以食禮養老也月令養衰老行糜粥飲食注助老氣也行猶賜也內則淳熬煎醢加於陸稻上沃之以膏曰淳熬注淳沃也熬亦煎也沃煎成之以為名醢疏陸稻謂陸地之稻也謂以陸地稻米熟之為飯煎使熬加於飯上恐其味薄更沃之以膏使味相湛漬淳母煎醢加於黍食上沃之以膏曰淳母注母讀曰模模象也作此象淳熬皆疏法象淳熬而為之但用黍為異耳黍不言陸者黍在陸無在水之嫌炮取豚若將刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之巨鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而後調之以醯醢注炮者以塗燒之為名也將當為牂牂牝羊也刲刳博異語也謹當為墐聲之誤也墐塗塗有穰草也皽謂皮肉之上魄莫也糔溲亦博異語也糔讀與滫瀡之滫同薌脯謂煮豚若羊於小鼎中使之香美也謂之脯者既去皽則解析其肉使薄如為脯然唯豚全耳豚羊入鼎三日乃內醯醢可食也其疏炮取豚若將者言為炮之法或取豚或取牂刲刳腹實香棗於其腹中萑亂草也苴裹也編連亂草以裹匝豚牂也塗之以謹塗者以此墐塗而泥塗之擘之者謂擘去乾塗也手既擘泥不淨其肉又熱故濯手摩之去其皽莫為稻粉糔溲之以為酏者付全豚之外煎之於膏若羊則解析肉以粥和之滅沒也小鼎盛膏以膏煎豚牂膏必沒此豚牂也巨鑊湯以小鼎薌脯其中者謂以大鑊盛湯以小鼎之香脯實於大鑊湯中使其湯毋滅鼎者使鑊中之湯毋得沒此小鼎若湯滅鼎恐湯入鼎中令食壞也毋絶火者欲令用火微熱勢不絶注云惟豚全耳者案周禮封人有毛炮之豚豚形既小故知全體搗珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌孰出之去其皽柔其肉注脄脊側肉也捶搗之也餌筋腱也柔之搗為汁和也汁和亦醯醢與疏眷側肉美以為珍宜取美處故為脊側肉腱即筋之類上炮豚炮牂調以醯醢下漬亦食之以醢若醯故知搗珍和亦用醯醢漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷注湛亦漬也為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之注熬於火上為之也今之火脯似矣欲濡欲乾人自由也醢或為醯此七者周禮八珍其一肝膋是也濡疏此論作熬之法欲濡肉則釋而煎之以醢者欲得肉則以水潤釋之而煎之以醢也注云七者謂第一淳熬也第二淳模也第三第四炮取豚若牂也第五搗珍也第六漬也第七熬也云其一肝膋者則此糝下肝膋也但作記之人文不依次故在糝下陳之糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之注此周禮糝食也三如一者謂取牛羊豕之肉等分如一稻米二肉一者謂二分稻米一分肉也肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼注膋腸問脂舉或為巨皆疏舉皆也謂炙膋燋也取稻米舉糔溲之小切狼臅膏以與稻米為酏注狼臅膏臆中膏也以煎稻米則似今膏􅖸矣此周禮酏食也此酏當作餰疏此論養老須飲食如養親之事明八珍之饌并明羞豆糝􅊡之等朱子曰此即所謂養老之珍也大夫七十而有閣注有秩膳也閣以板為之庋食物也王制五十異粻六十宿肉七十二膳八十常珍九十飲食不離寢膳飲從於遊可也注粻糧也二副也遊謂出入止觀疏五十始衰粻宜自異不可與少壯者同也六十轉老故恆宿肉在帳下不使求而不得也七十恆令善食有儲副不使有闕也八十珍竒飲食尋常使有九十飲食無時或急求須得故不離於寢美善之膳水漿之飲從於所遊之處可也吳氏澄曰此當兼國老庶老而言見古人之養老年愈衰而養愈厚意每十年一變者以人之精神氣力涉世十年則天道一周而衰憊不能不異於前爾詩豳風七月為此春酒以介眉夀傳春酒凍醪也眉夀豪眉也箋介助也穫稻釀酒助其養老之具大雅行葦曽孫維主酒醴維醹酌以大斗以祈黃耉箋祈告也成王有醇厚之酒醴以大斗酌而嘗之而美故以告黃耉之人徵而養之也疏鄭以此章始告老人下章乃言其養言養老之禮亦當豫告老人矣黃耉台背以引以翼箋台之言鮐也大老則背有鮐文既告老人及其來也以禮引之以禮翼之在前曰引在旁曰翼夀考維祺以介景福箋養老人而得吉所以助大福也蕙田案以上酒食禮記王制五十養於鄉六十養於國七十養於學達於諸侯八十拜君命一坐再至瞽亦如之九十使人受注天子諸侯養老同也國國中小學在王宫之左學大學也在郊小學在國中大學在郊此殷制明矣命謂君不親饗食必以其禮致之於疏五十始衰故養於鄉學六十漸衰養禮彌厚故養國中之小學七十大衰養禮轉重故養於大學此養老之事非唯天子之法乃通逹於諸侯也至於年八十衰弱不堪來學受養君以饗食之禮使人就家致之其受君命之時理須再拜不堪為勞一坐於地而首再至於地也瞽人無目恐其傾倒拜君命亦當如此文王世子天子視學大昕鼓徴所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉疏此論天子視學必遂養老之法則養老既畢乃命諸侯羣吏令養老之事有司卒事反命始之養也注告祭畢也祭畢天子乃入又之養老之處凡大合樂必遂養老是以往焉言始始立學也疏天子視學在虞庠之中有司釋奠既畢天子乃從虞庠入反於國明日乃之東序而養老故云始之養也注云言始始立學也者為下釋奠于先老之學故云始立學也若非始立學之後則視學凡養老於東膠不釋奠于先老也陳氏禮書記言天子視學遂適東序養老則視學養老皆同日也鄭氏謂用其明日誤胡氏銓曰始初也之往也謂反命乃往養老之處鄭謂始立學非適東序釋奠於先老遂設三老五更羣老之席位焉注養老東序則是視學於上庠三老五更各一人也皆年老更事致仕者也天子以父兄養之示天下之孝悌也名以三五者取象三辰五星天所因以照明天下者羣老無數其禮亡以鄉飲酒禮言之席位之處則三老如賔五更如介羣老如衆賔必也以疏三老五更各一人蔡雍以為更字為叟叟老稱又三老為三人五更為五人非鄭義也知天子以父兄養之者以天子冕而總干執醬而饋是父兄事也云三老如賔五更如介者案鄉飲酒注敷席賔席牖前南面介席西階上東面是也云羣老如衆賔者案鄉飲酒注席衆賔於賔之西南面各特焉是也白虎通德論享三老五更於太學者所以教諸侯悌也不正言父兄言老更者何老者夀考也欲言所令者多也更者更也所更歷者衆也即如是不但言老言三何也欲言其明於天地人之道而老也五更者欲言其明於五行之道而更事也三老五更幾人乎曰各一人何以知之既以父事父一而已不宜有三應劭漢官儀三老五更三代所尊也安車軟輪送迎至家天子獨拜於屛三者道成於天地人老者久也舊也五者訓於五品更者五世長子更更相代言其能以善道改更已也三老五更皆取有首妻男女完具陳氏禮書古者建國必立三卿鄉飲酒必立三賔而養老必立三老禮曰三公在朝三老在學三公非一人則三老五更非各一人矣漢志以德行年髙老者一人為老次一人為更故永平中拜桓榮為五更建初中拜伏恭為三老而鄭氏以此為三代之制誤矣蕙田案三老五更鄭氏及白虎通漢官儀俱以為各一人惟蔡雍云三老三人五更五人而陳祥道亦宗之然記稱天子之養老更袒而割牲親執醬執爵其禮甚尊非尋常之老可以當之説者謂三老選三公之老者五更選卿大夫之老者公卿大夫其人數不多未必齒德俱尊者一時頓有八人也白虎通云父一而已不宜有三其説簡而明矣觀承案古禮已亡漢志謂三老五更止各一人亦據漢禮言之耳則蔡雍謂三老三人五更五人者亦不可厚非也如三公九卿之類皆以數稱而實人如其數豈可以一人為三老一人為五更乎但三公不必備惟其人則三老五更亦不必備有則全之無則以一人兼之亦無不可也且所謂父事者非父也父惟一而父事之者何妨有三即如白虎通之論亦思王者父事三老兄事五更則父不可以三兄獨不可以有五乎此言固未為全是當並存之耳應氏鏞曰東序夏后氏之學名也此所云序則未必自為一學也即學宫之東序焉爾始立學者既釋菜而退儐於東序諸侯學校之東序也天子亦始立學視學興秩節而始適東序天子學校之東序也鄭氏於此二者皆以為自上庠而適東序上庠在郊而東膠在國若自郊反國則驅馳甚矣以此約度之則東序亦在學中而已樂記祭義皆謂食三老五更於太學則天子之所視者即太學也大學之東序者蓋地道尊右神祀尚隂故宗廟之位皆以西為上竊意夫西者廟宫之所存所以尊先聖先師也東者黌舍之所寓所以處國子俊選也今學宫亦然故立學釋菜則退儐於此而行一獻之禮視學釋菜則退儐於此而行一獻之義視學卒事則設位於此而修教養之禮兩者皆曰退儐曰退修蓋以廟宫為尊故以黌舍為退猶朝廷之進見而曰退也適饌省醴養老之珍具遂發咏焉退修之以孝養也注親視其所有發咏謂以樂納之退修之謂既逆而入獻之以禮獻畢而樂闋疏布席既畢天子親適陳饌之處省視醴酒并省視養老之珍具省具既畢出迎三老五更將入門之時遂作樂聲發其歌咏以樂納之也三老五更入而即位於西階下天子乃退酌醴獻之以修行孝養之道也案大射賔入及庭奏肆夏此養老既尊故用兩君敵禮入門即奏肆夏故仲尼燕居曰入門而縣興是也反登歌清廟既歌而語以成之也言父子君臣長幼之道合德音之致禮之大者也注反謂獻羣老畢皆升就席也反就席乃席工於西階上歌清廟以樂之既歌謂樂正告正歌備也歌備而旅旅而説父子君臣長幼之道諸合樂之所美以成其意鄉射記曰古者於旅也語疏三老五更羣老初受獻畢皆立於西階下東面今皆反升就席乃使工登堂上西階北面歌清廟之詩以樂之既歌之後則至旅酬之節談説善道以成就天子養老之義也德音謂歌清廟之詩文王道德之音致謂致極也言説父子君臣長幼之道理會合清廟文王道德音聲理之至極也案鄉飲酒之禮告正歌備後作相為司正賔取觶酬主人主人酬衆賔是歌備而旅酬也旅酬之時則語説下管象舞大武大合衆以事逹有神興有德也注象周武王伐紂之樂也以清播其聲又為之舞皆於堂下衆所謂合學士也達有神明天授命周家之有神也興有德美文王武王有德師樂為用前歌後舞疏登歌之後笙入立於堂下管中奏此象武之曲庭中舞此大武之舞大武即象也變文耳興謂發起注云師樂為用前歌後舞者今文泰誓之文正君臣之位貴賤之等焉而上下之義行矣疏登歌清廟文王詩也君詩在上下管象是武王詩臣詩在下是止君臣之位貴賤之等也既以此教上下衆知之是上下之義行於衆庶也有司告以樂闋注此所告者謂無算樂疏闋終也謂養老之末無算樂之終也以上云登歌清廟次下管象此云告以樂闋下即云王乃命諸侯是燕末之事故知樂闋為無算樂也王乃命公侯伯子男及羣吏曰反養老幼於東序終之以仁也注羣吏鄉遂之官王於燕之末而令諸侯時朝會在此者各反養老如此禮是終其仁心老疏王家恆自養老是仁恩也又令諸侯州里而行養是終之以仁謂仁恩之心也諸侯既為畿外故知羣吏為畿內鄉遂之官也陳氏曰前言養老不及幼及命諸侯羣吏則兼幼言之者耆老孤子先王未嘗不兼養然其所重特老者而已是故聖人之記事也慮之以大疏此節是申説視學養老之義記事謂聖人親行養老之禮記序前代之事也慮謀也大謂孝第也言謀慮於養老之事是本於孝弟故也愛之以敬疏適饌省醴是愛而又敬之也行之以禮疏迎之如見父兄之禮也修之以孝養疏親獻醴薦饌是修於孝養故也紀之以義疏既歌而語是紀録德音之義亦存天下之大義也終之以仁疏命諸侯令歸國各行此禮是終之以仁心也是故古之人一舉事而衆皆知其德之備也古之君子舉大事必慎其終始而衆安得不喻焉疏此節覆説養老而在下衆庶知道德之備其在學乎一舉事而衆皆知其德之備者上慮之以大之屬是也大事謂養老初則慮之以大是慎其始末則終之以仁是慎其終既慎其本末終始一一露見盡以示衆庶而衆何得不曉喻焉説命曰念終始典於學注典常也念事之終始常于學學禮義之府蕙田案此經明養老之節文最為詳盡樂記食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也注三老五更互言耳皆老人更知三德五事者也冕而總干親在舞位也周名太學曰東膠疏此冕當鷩冕享先公以饗射養老之類祭義食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也是故鄉里有齒而老窮不遺強不犯弱衆不暴寡此由太學來者也注割牲制俎實也酳食罷飲也冕而總干親在舞位以樂侑食也教諸侯之弟次事親疏以天子敬老鄉里化之故有齒老而被養故在下年老及困窮者皆化上而養之故不見遺棄以老弱被尊養人皆化上故強不犯弱衆不暴寡方氏曰由大學來者言教化之原出自大學也內則凡養老五帝憲注憲法也養之為法其德行三王有乞言注有善為法又從之求善言以施行也五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦微其禮皆有惇史注惇史史之惇厚者也微其禮者依違言之求而不切也疏此一節論五帝三王養老之禮五帝養老法其德行三王其德漸薄非徒法其德行又從求乞善言五帝奉養老人氣息身體恐其勞動故不乞言老人有善則記録之使衆人法則為惇厚之史三王既法德行又從乞言乞言之禮亦依違求之而不逼切三代皆法其德行善言為惇厚之史吳氏澄曰三王乞言之禮亦微而不顯露謂從容乘間俟可問而後問三代皆如五帝時有惇史以記其所乞之言也吕氏祖謙曰年之貴于天下久矣五帝三王皆尊德尚齒然五帝三王養老之禮雖同憲與乞言不同蓋道有升降風氣有厚薄所以如此五帝憲則是瞻儀容視起居不曽有乞言之禮蓋當時風氣未開人情淳厚朝夕與老者親炙其仁義之容道德之光自得于觀感不言之際三王不及五帝所以有乞言之禮比之於觀瞻不言之中氣𠯑稍薄文王世子凡祭與養老乞言合語之禮皆小樂正詔之於東序大樂正學舞干戚語説命乞言皆大樂正授數詩大雅行葦序行葦忠厚也周家忠厚仁及草木故能內睦九族外尊事黃耉養老乞言以成其福祿焉箋乞從求善言可以為政者敦史受之之疏禮有內外小史大史無惇史正以待接老人擇史惇厚者掌之惇非官名也故彼注云惇史史之惇厚者也孝經鉤命決天子臨辟雍視割牲以尊三老五經通義天子臨辟雍者何所以行禮樂宣教化教導天下之人使為士君子養三老事五更與諸侯行禮之處也董氏文驥曰周人養老兼饗食燕之禮一日而相因天子袒而割牲蓋用饗禮之體薦以為折俎之實也執醬而饋執爵而酳蓋用食禮之正飯加飯正饌庶羞所謂設饌也酒正供酒無酌數蓋用燕禮一獻立而舉旅行酬脫屨安坐而無算爵以醉為度共賔客飲之外復先設醴齊所謂省醴也陳氏云設席位非立飲則食當於西階下反升就席之後饋食以醬食禮公親設醬也食畢以酒酳口食禮酳用漿而此用酒且酒與醬皆親執之蓋燕禮宰夫為主人此醬酒既親執則天子必自為主人優老也正饌之俎當兼三牲不必用狗伐木之詩有肥牡肥羜先儒謂天子燕禮本當不同於諸侯加饌之羞當無過三十豆而所謂珍具者如羅氏共鳩及內則八珍之類燕禮旅酬卿大夫而後升歌堂上笙間堂下鄉飲酒禮則歌備而旅酬此亦登歌清廟下管象而後於旅也語所謂惇史乞言也聲莫重於登歌堂上之歌必有琴瑟節之文不具也燕禮或升歌鹿鳴下管新宮遂合鄉樂舞勺陳氏云舞在諸樂之後所謂冕而就舞位朱干玉戚舞大武蓋舞莫重於武宿夜也注謂以樂侑食天子諸侯每飯有侑食之樂而他食禮則無樂然樂師饗食奏鼓鐘鐘師饗食奏燕樂籥師賔客饗食鼓羽籥之舞陳氏謂食亦有樂則此割牲饋食時豈先有樂舞以侑食而旅酬無算爵之後又樂舞無算以侑酒猶納賔用樂而旅復用樂與象舞執簫以舞不在六樂之列習之成童用之祈禱此但以管奏其詩非舞其簫也管并兩竹笙巢於匏管重於笙大射祭享用之燕不當用而此用之優老也賔入門發咏而奏肆夏天子所以享元侯兩君相見不歌文王而歌清廟為二王後諸侯之長今俱用之優老也舞者動其容而曲隨之堂下舞六代之舞則堂上亦歌賚桓勺之詩為樂歌以節之也禮既兼用饗食燕則饗有酬幣食有侑幣燕有好貨則亦有酬幣禮文不具也禮文散見於王制文王世子樂記祭義內則但各舉綱目不能貫串始末故集其略如此蕙田案以上視學養老行事之禮節禮記王制凡三王養老皆引年注已而引户校年當行復除也老人衆多非賢者不可皆養五十始衰六十非肉不飽七十非帛不暖八十非人不暖九十雖得人不暖矣注暖溫也方氏慤曰三十曰壯四十曰強壯強則盛極矣人盛之極則趨於衰而已故五十為始衰之年自此以往宜有以扶其衰九十雖得人不暖則以衰之極養之宜無不至故也孟子五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之教申之以孝弟之義頒白者不負戴于道路矣七十者衣帛食肉黎民不飢不寒然而不王者未之有也五畝之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無飢矣注五雞二彘八口之家畜之足以為畜産之本也所謂西伯善養老者制其田里教之樹畜導其妻子使養其老五十非帛不暖七十非肉不飽不暖不飽謂之凍餒文王之民無凍餒之老者此之謂也注所謂無凍餒者教導之使可以養老者耳非家賜而人益之也徐氏乾學曰孟子言五十可以衣帛七十可以食肉與王制不同王制言養血氣以食為先衣為次孟子言王政之序足衣而後足食夫王者之養老扶其衰而適其體尚如此其周備矣則為人子者事父母之年日衰一日則所以盡心於奉養者可不日慎一日乎蕙田案以上教民養老之法右養老之禮禮記曲禮五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄百年曰期頤王制五十而爵六十不親學七十致政惟衰麻為喪蕙田案此二條服官致政之期曲禮大夫七十而致事注致其所掌之事於君而告老疏白虎通云臣年七十懸車致仕者臣以執事趨走為職七十耳目不聰明是以退老去避賢也所以長廉逺恥君不使退而自去者尊賢也若不得謝注謝猶聽也君必有命勞苦辭謝之其有德尚壯則不聽耳則必賜之几杖行役以婦人適四方乘安車自稱曰老夫注几杖婦人安車所以養其身體也安車坐乘若今小車也老夫老人稱也亦明君尊賢春秋傳曰老夫耄矣疏既不聽致事則祭義云七十杖于朝是也聽致事則王制云七十杖于國八十杖于朝是也養老之具在國及出皆得用之今言行役婦人四方安車庾蔚云漢世駕一馬而則言相之互也從耳語便故離略坐説秉也熊氏云云案書傳致仕者以朝乘車輲輪鄭云乘車安車言輲輪明其小也於其國則稱名注君雖尊異之自稱猶若臣與疏於其國謂自其君言越國而問焉必告之以其制注鄰國來問必問於老者以答之制法度老疏若他國來問國君之政君雖已達其事猶宜問于賢老賢則稱國之舊制以對他國之問也祭義是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣注同爵尚齒老者在上也君問則席為之布席于堂上而與之言凡朝位于廷不俟朝君揖之即退不待朝事畢也就之就其家也老而致仕君或不許異其禮而已疏言敬老之道通逹于朝廷蕙田案此二條據大夫年老未許致仕者王制九十者天子欲有問焉則就其室以珍從注尊養之七十不俟朝注大夫士之老者君揖則退八十月告存注每月致膳九十日有秩注秩常也有常膳入疏此謂大夫士老年而聽致事者朝君之時門至朝位君出揖之即退不待朝事畢也告謂問也八十者君每月使人致膳告問存否九十年老方極君則日使人以常膳致之七十者不有大故不入朝若有大故而入君必與之揖讓而后及爵者注謂致仕在家者其入朝君先與之為禮而后揖卿大夫士蕙田案此三條據大夫士已致仕者王制嵗二月東巡狩至于岱宗問百年者就見之祭義天子巡狩諸侯待于竟天子先見百年者注問其國君以百年者所在而往見之侯疏巡守謂巡行守土諸八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也注弗敢過者謂道經之則見之徐氏乾學曰此節注疏皆云八十九十者若天子諸侯因其行次或東行西行至其閭里之旁不敢過越而去必往見之若論政雖不當道路左右君即就之可也愚謂耆老之人多矣君之所過安得一一而見之此言八十九十者東行則人之西行者不敢分道而過言必避之其西也亦然所以尊年而避道也朱子經傳通解亦採此意觀後欲言政者君就之則此屬泛指矣蕙田案此二條巡狩優禮老者王制五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也注五十力稍衰也力政城道之役與及也八十不齊則不祭也子代之祭是謂宗子不孤夫疏五十不從力政唯據庶人力政謂築城治道其大士六十未致仕若為軍將當與服戎故知此據庶人也古周禮説國中自七尺以及六十野自六尺以及六十有五皆征之者使為胥徒給公家之事如今之正衛耳力政田役為重故五十免之此五十不從力政祭義云五十不為甸徒也戎事差輕六十不與戎服又孟氏説六十還兵事也胥徒又輕故野外六十五猶征之若四郊之內以其多役胥徒之事六十則免馬氏曰力政服戎此免於公者也賔客齊喪此免於私者也蓋代之以子孫矣八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政注廢廢於人事祭義古之道五十不為甸徒頒禽隆諸長者而弟達乎獀狩矣注四井為邑四邑為丘四丘為甸甸六十四井也以為軍田出役之法五十始衰不從力役之事頒之言分也隆猶多也及田者分禽多其老者謂竭作未五十者春獵為獀冬獵為狩疏作記之人在于周末時力役煩重道周初之事故云古之道凡起徒役無過家一人唯田與追胥竭作此未五十者猶任田役故頒禽之時多此長者周禮地官鄉大夫以嵗時登其夫家之衆寡辨其可任者國中老者皆舍注舍者謂有復除舍不收役事也老者若今八十九十復羡卒也蕙田案此三條田役優老禮記祭義一命齒于鄉里再命齒于族三命不齒族有七十者弗敢先注此謂鄉射飲酒時也居鄉以齒而老窮不遺強不犯弱衆不暴寡而弟達乎州巷矣蕙田案此二條鄉黨優老王制父之齒隨行兄之齒雁行朋友不相踰輕任并重任分斑白者不提挈祭義行肩而不併不錯則隨見老者則車徒辟斑白者不以其任行乎道路而弟達乎道路矣蕙田案此二條道路優老曲禮八十九十曰耄七年曰悼悼與耄雖有罪不加刑焉周禮秋官司厲凡有爵者與七十者與未齒者皆不為奴蕙田案此二條刑罰優老孔子家語正論解哀公問于孔子曰二三大夫皆勸寡人使隆敬于高年何也孔子對曰君之及此言將天下實賴之豈惟魯哉公曰何也其義可得聞乎孔子曰昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之盛王也未有遺高年者焉年之貴于天下久矣次于事親是故朝廷同爵而尚齒七十杖于朝君問則席八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不並不錯則隨斑白者不以其任于道路而悌達乎道路矣居鄉以齒而老窮不匱強不犯弱衆不暴寡而悌達乎州巷矣古之道五十不為甸役頒禽隆之長者而悌達乎搜狩矣軍旅什伍同爵則尚齒而悌達乎軍旅矣夫聖王之教孝悌發諸朝廷行于道路至于州巷放于搜狩循于軍旅則衆感以義死而弗敢犯公曰善哉寡人雖聞之弗能成尚書大傳齊宣王問于子春曰寡人欲行孝弟之義為之有道乎子春曰昔者衛聞之樂正子曰文王之治岐也五十者杖于家六十者杖于鄉七十者杖于國見君揖杖八十者杖于朝見君揖杖君曰趣見客無俟朝以朝乘車軟輪御為僕送至于家而孝弟之義達于諸侯九十杖而朝見君建杖君曰趣見毋俟朝以朝車送之舍卜筮巫醫御于前祝噎祝哽以食乘車軟輪胥與就膳徹送至于家君如有欲問明日就其室以珍從而孝弟之義達于四海右優老之事五禮通考卷一百七十六
