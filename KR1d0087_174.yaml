body:
  text: 五禮通考卷一百六十四刑部尚書秦蕙田撰嘉禮三十七射禮詩大雅行葦敦弓既堅四鍭既鈞舍矢既均序賓以賢傳敦弓畫弓也天子敦弓鍭矢參亭已均中藝行箋舍之言釋也藝質也周之先王將養老先與羣臣射禮以擇其可與者以為賓序賓以賢謂以射中多少為次第疏敦與雕古今之異雕是畫飾之義此述天子擇士宜是天子之弓故言天子敦弓定四年公羊傳何休注云天子敦弓諸侯彤弓大夫嬰弓士盧弓鏃參停者謂三分矢一在前二在後輕重鈞停四矢皆然故言四鍭既鈞冬官矢人為鏃矢參分一在前二在後注云三訂之而平者前有鐵重也又解舍矢既均之義言已均中藝為所射之質四矢皆均中也傳言中藝故又解之云藝是質即所射之物正鵠之總名但此説大射當為鵠也以下章言養老之事而此論射則知當為養老禮稱將祭而射謂之大射養老與祭相類而亦射以擇賓則亦為大射何則禮射有三賓射在朝而射以娛賓燕射因燕而射以為樂皆無擇士之義樂記云祀於明堂以教諸侯之孝食三老五更于太學以教諸侯之悌是祭與養老為相類之事故知此射必大射也王肅以此為養老燕射案燕射於燕旅酬之後乃為之不當設文於曾孫維主之上豈先為燕射而後酌酒也以此知毛意亦為大射也言序賓以賢者投壺數算云某黨賢于某若干純為中多者為賢此射擇之為賓而云賢明以射中多少為次也朱子曰敦雕通畫也天子雕弓堅猶徑也鍭金鏃翦羽矢也鈞參亭也謂參分之一在前二在後三訂之而平者前有鐵重也舍釋也謂發矢也均皆中也賢射多中也投壺曰某賢於某若干純奇則曰奇均則曰左右均是也敦弓既句既挾四鍭四鍭如樹序賓以不侮傳天子之弓合九而成規四鍭如樹言皆中也序賓以不侮言其皆有賢才也箋射禮搢三挾一個言已挾四鍭則已遍釋之不侮者敬也其人敬于禮則射多中多疏天子至成規皆冬官弓人文也又云往體寡來體謂之王弧注云王弓合九而成規弧弓亦然則此敦弓即彼王弧也傳言此者明既句是引滿之時也以合九成規此弓體直今言既句明是挽之説文云彀張弓也二京賦曰雕弓既彀彀與句字雖異音義同射禮搢三挾一個大射禮然也搢者插也挾謂手挾之射用四矢故插三於帶間挾一以扣弦而射也射禮每挾一個今言挾四鍭故知己遍釋之也案大射禮搢三挾一個謂卿大夫若其君則使人屬矢不親挾也蕙田案周禮司弓矢鏃矢殺矢用諸近射田獵庳矢恆矢用諸散射鄭注云散射謂禮樂之射如養老而射亦禮樂之散射也養老之射亦是大射但儀節大抵相同而為禮則别今另列于此又案以上養老之前射以擇賓詩小雅車攻決拾既佽弓矢既調射夫既同助我舉柴傳決鈎弦也拾遂也佽利也柴積也既箋佽謂手指相次比也調謂弓強弱與矢輕重相得同已射同復將射之位也雖不中必助中者舉積禽也侯疏此章言諸侯從王田罷賜射餘獲之事也言時諸所有決之與拾既與手指相比而和利矣弓與矢既強弱相得而調適矣既田畢王以餘獲之禽賜之則以此射夫而取之此射夫皆已射一畨若中得禽者既同復將射之位欲更射以求禽也若以射之而不中者則又助我中者舉積禽此文承諸侯之下射夫即諸侯也其大夫亦在獲射之中則此可以兼焉諸侯而謂之射夫者夫男子之總名傳以佽為利其義不明故申而成之決著於右手大指所以鈎弦開體遂著於左臂所以遂弦手指相比次而後射得和利故毛云佽利謂相次然後射利非訓佽為利也言調謂弓強弱與矢輕重相得者弓體有強弱各其力之所便又弓矢之名有安危調之使相得田無射禮唯既田乃有班餘獲射在於澤宫言同復將射之位在澤宫之位也以言助我舉積是不得射者助他人也故射雖不中必助中者舉積禽矣鄉射禮云禮射不主皮不勝者降即此是也此謂士大夫以上有禮射者庶人則以主皮當禮射故鄉大夫以五物詢衆三曰主皮是也李氏櫄曰決以骨為之著於右巨指以鈎弦者也拾以皮為之著於左臂以逆弦者也拾亦謂之逆不失其駝舍矢如破鄭氏曰射者之工矢發則中如破碎物也蕙田案以上巡狩諸侯從王賜射餘獲周禮夏官射人祭祀則贊射牲相孤卿大夫之法儀易氏祓曰祭祀之禮以牲為重視牲分牲養牲巡牲見於未祭之先將祭之時則夕牲展牲牽牲射牲割牲無非禮者射人所掌則射牲之禮而已國語曰禘郊之事天子必自射其牲此雖天子自為之方其迎牲於門則君執紼卿大夫從士執芻至於君親射牲而孤卿大夫咸與焉此射人相孤卿大夫之儀法以其掌射法治射儀故也司弓矢凡祭祀供射牲之弓矢注射牲示親殺也殺牲非尊者所親惟射為可大戴禮禘郊之事天子必自射其牲蕙田案以上祭祀射牲之禮周禮夏官諸子凡國之政事國子存遊倅使之修德學道春合諸學秋合諸射以考其藝而進退之注遊倅倅之未仕者學太學射射宫也王制曰春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉宫疏大學在國中即夏后氏東序在王宫之左也射即國之小學在西郊則虞庠是也王氏曰國子之於政事若宿衛固守之屬也存者使之在學而養之也王氏安石曰春合諸學則修德學道也秋合諸射則以待兵甲之事也蕙田案以上遊倅合射禮記王制司徒命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒注將習禮以化之使之觀焉耆老致仕及鄉中老賢者朝猶會也此庠謂鄉學也鄉謂飲酒也庠疏命鄉簡不帥教者乃命鄉內耆老皆會于鄉學之乃擇善日於此鄉學內為不帥教之人習射禮中者在上故云上功又於鄉學習鄉飲酒之禮老者居上故曰上齒欲使不率教之人觀上功則自勵為功觀上齒則尊敬長老蕙田案以上元日習射于庠射義古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也注歲獻獻國事之書及計備物也三歲而貢士舊説云大國三人次國二人小國一人是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也注流猶放也書曰流共工于幽州蕙田案以上試貢士于射宫內則子生男子設弧于門左女子設帨于門右三日始負子男射女否注弧者示有事於武也帨事人之佩巾也表男女也負之謂抱之而使鄉前也射始有事也設疏此明大夫以下生子弧矢之法國君世子生三日卜士負之射人以桑弧蓬矢六射天地四方注桑弧蓬矢本太古也天地四方男子所有事也疏射禮惟四矢者天地非射事所及惟禦四方故止四矢蓬是禦亂之草桑衆木之本射義男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也飯食之謂也疏用六者天地四方也禮射惟四矢者示事有不用也然後敢用穀者三日射罷之後然後敢用穀以食其子也飯食之謂者射畢用穀猶事畢設飯食故也蕙田案以上始生之射內則成童舞象學射御注成童十五以上用疏舞象謂武舞也熊氏云謂干戈之小舞也以其年尚幼故習文武之小舞蕙田案以上成童學射少儀侍射則約矢侍投則擁矢勝則洗而以請客亦如之不角不擢馬注約矢不敢與之拾取也擁矢不敢釋于地也投投壺也投壺坐洗洗爵請行觴不敢直飲之客亦如之客射若投壺不勝主人亦洗而請之角謂觥罰爵也於尊長與客如獻酬之爵擢去也謂徹也已徹馬嫌勝故薄之庭疏侍射則約矢者矢箭也凡射必計耦先設楅在中楅前取兩頭為龍頭中央共一身而倚箭於楅身上上耦前取一矢下耦又進取一如是更進各得四箭而升堂插三於要而手執一隻若卑者侍射則不敢更拾進取但一時并取四矢故云則約矢也侍投則擁矢者投投壺也擁抱也矢謂投壺箭也若柘若棘為之投壺禮亦賓主各四矢從委於身前坐一一取之若卑者侍投則不敢釋置於地但手并抱投之也故鄭云不敢釋於地庾云擁抱已所當投矢也隱義云尊者委四矢於地一一取以投卑者不敢委於地悉執之也勝則洗而以請者若敵射及投壺意司射命酌而勝者當應曰諾而勝者弟子酌酒南面以置豐上豐在西階上兩楹之西而不勝者下堂揖讓升堂就西階上立北面就豐上取爵將飲之而跪之曰賜灌灌猶飲也面勝者立於不勝者東亦北面跪而曰敬養若卑者得勝則不敢直酌當前洗爵而請行觴然後乃行也客亦如之者客若不勝則主人亦洗而請如卑侍之法所以優賓也不角者角謂行罰爵用角酌之也詩云酌彼兕觥是也今飲尊者及客則不敢用角但如常獻酬之爵也不擢馬者擢去也徹也投壺立籌為馬馬有威武射者所尚也凡投壺每一勝輒立一馬至三馬而成勝但頻勝馬三難得若一朋得二馬一朋得一馬於是二馬之朋徹取一馬者足以為三馬以成定勝也今若卑者朋雖得二馬亦不敢徹尊者馬足成己勝也陳氏澔曰凡射必二人為耦楅在中庭箭倚於楅上耦前取一矢次下耦又進取一矢如是更進各得四矢若卑者侍射則不敢更迭取之但一時并取四矢故謂之約矢也射與投壺之禮勝者之弟子酌酒置於豐上其不勝者跪而飲之若卑者得勝則不敢徑酌當前洗爵而請行觴也客若不勝則主人亦洗而請所以優賓也角兕觥也今飲尊者及客不敢用角但如常獻酬之爵也馬者投壺之勝算蕙田案以上卑幼侍尊長射曲禮君使士射不能則辭以疾言曰某有負薪之憂應氏鏞曰射者男子所有事可以疾辭不可以不能辭也大戴禮士使之射不能則辭以疾懸弧之義也蕙田案此條與郊特牲文同又案以上不能射辭疾禮記樂記武王克殷散軍而郊射左射貍首右射騶虞而貫革之射息也注貫革穿革甲也蕙田案以上散軍之射右射雜儀書益稷侯以明之蔡氏沈曰侯射侯也明者欲明其果頑愚讒説與否也周禮天官司裘王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠注侯者其所射也以虎熊豹麋之皮飾其側又方制之以為謂之鵠著於侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十逺尊得伸可同耳所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯鄭司農云鵠鵠毛也方十尺曰侯四尺曰鵠二尺曰正四寸曰質玄謂侯中之大小取數於侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣文四尺五十弓者侯中廣一丈尊卑異等此數明矣考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直已志用虎熊豹麋之皮示服猛討迷惑者射者大禮故取義衆也疏以其雖有正鵠之别侯是總名故云侯者所射也云以虎熊豹糜之皮飾其側者侯中上下俱有布一幅夾之所飾者唯有兩旁之側也梓人為侯廣與崇方故云方制之質者正也所射之處故名為質三分其侯鵠著於侯中云所謂皮侯者所謂梓人張皮侯而棲鵠云王之大射虎侯王所自射者逺近三等人有尊卑分為三節尊者射逺卑者射近故知王射虎侯諸侯卑於天子其自射射熊侯明助王祭亦射熊侯卿大夫卑於諸侯以其自家射射麋侯五十步明助王亦射豹侯五十步故知射豹侯卿大夫更言已下者兼有士亦射豹侯諸侯之大射熊侯諸侯所自射豹侯羣臣所射以其唯有二侯故分為二等云卿大夫之大射麋侯若臣共射者以其唯有一侯故也云凡此侯道虎九十弓至五十弓並約鄉射記按鄉射記云鄉侯侯道五十弓案大射大侯糝侯犴侯直言九十七十五十不云弓故注鄉射記云大侯九十弓糝侯七十弓犴侯五十弓並約鄉侯有弓字則大射所云九十者九十弓七十者七十弓五十者五十弓可知也天子三侯與彼畿外諸侯同但用皮别耳故此注虎侯九十弓熊侯七十弓豹麋五十弓云列國之諸侯大射大侯亦九十糝七十犴五十者大射所云者是也鄭注大射云大侯者熊侯也糝侯者糝雜也豹鵠而麋飾下天子大夫也犴侯者犴鵠犴飾也云逺尊得伸可同耳者對此經畿內諸侯之近尊不得同於天子三侯侯中之大小取數於侯道者其侯道則去侯逺近之道故引鄉射記鄉射記曰弓二寸以為侯中者二寸據把中側骨中身也弓别取二寸以為侯身也則九十弓者侯中廣丈八尺者據虎侯也七十弓者侯中廣丈四尺者據熊侯也五十弓者侯中廣一丈也者據豹侯麋侯也云考工記曰梓人為侯廣與崇方者崇髙也上下為崇橫度為廣如鄉射侯中丈八丈四一丈皆方故云廣與崇方也云參分其廣鵠居一焉者謂三分丈八丈四一丈之侯各取一分而為鵠又云然則侯中丈八尺者鵠方六尺自此以下皆重釋鵠居一焉之義以其侯中丈八三六十八故鵠居六尺侯中丈四尺者鵠方四尺六寸大半寸者以其侯中丈四尺取丈二尺三四十二得曰尺有二尺在又取尺八寸三六十八又得六寸有二寸在寸各為三分二寸併為六分取二分名為三分寸之二即是大半寸也侯中一丈者鵠方三尺三寸少半寸者一丈取九尺三三而九得三尺一尺在又取九寸得三寸仍有一寸分為三分得一分名為少半寸正鵠相對之物若鵠為鳥正亦為鳥若鵠為直正則為正直之正故射義云射者內志正外體直是正鵠之名各有二義虎熊豹是猛獸將以為侯侯則諸侯也是示能伏得猛厲諸侯麋者迷也將以為侯示能討擊迷惑諸侯以其祭者是大事射者觀德故為大禮故於三侯之上取義衆多王氏與之曰馭民之道以正物為事正物則服猛毅為先能致猛毅莫大於虎豹熊次之能服猛毅莫大於王諸侯次之由是而得萬國之歡心以事先王者天子之德也故共虎侯熊侯豹侯得百姓之歡心以事先公者諸侯之德也故共熊侯豹侯卿大夫之德則以養人為事養人以除害為先春秋多麋害稼則卿大夫射麋侯以除害也冬官考工記梓人為侯廣與崇方參分其廣而鵠居一焉注崇髙也方猶等也髙廣等者謂侯中也天子射禮以九為節侯道九十弓弓二寸以為侯中髙廣等則天子侯中丈八尺諸侯于其國亦然鵠所射也以皮為之各如其侯也居侯中參分之一則此鵠方六尺惟大射以皮飾侯大射者將祭之射也其餘有賓射燕射射疏禮射有三有賓射燕射大射大射射鵠賓射燕射侯注亦與此同王氏曰侯以布為之以皮飾之梓人攻木之工而為侯者以侯待木而張故也鄭氏鍔曰射必用侯正名曰侯者蓋天子射之所以服諸侯臣下射之得以為諸侯也天子諸侯卿大夫各有所射之侯而侯之制則有小大之不同天子之熊虎豹侯九十弓侯中丈八尺諸侯熊侯七十弓侯中丈四尺卿大夫麋侯五十弓侯中一丈然其侯中之廣與崇方則一而已其廣與崇適相等焉謂侯之中髙廣相似也蓋偏於左右則不得其正倚於上下則不得其正惟正然後可以期於中所以欲其相等也匠人之為防亦云廣與崇方蓋非相等則其力不足以捍患故也弓二寸以為侯中虎侯之弓以九為節則侯中一丈八尺也中一丈八尺則鵠六尺也由是推之熊侯七十弓侯中丈四尺則鵠方四尺六寸有奇豹侯麋侯五十弓則侯中一丈而鵠方三尺三寸有奇鄭衆馬融皆曰十尺曰侯四尺曰鵠二尺曰正者蓋不考諸此耳王氏昭禹曰鵠棲侯以為的者鵠之為物逺舉而難中射以及逺中難為善中則告勝焉故的謂之鵠也鵠以皮為之各如其侯鵠居侯中三分之一唯大射以皮侯其餘有賓射燕射上兩個與其身三下兩個半之注鄭司農云兩個謂布可以維持侯者也上方兩枚與身三設身廣一丈兩個各一丈凡為三丈下兩個半之傳地故短也玄謂個讀為幹上個下個皆謂舌也身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌然則九節之侯身三丈六尺上個七丈二尺下個五丈四尺其制身夾中個夾身在上下各一幅此侯凡用布三十六丈言上個與其身三者明身居一分上個倍之耳亦為下個半上個出也個或謂之舌者取其出而左右也侯制上廣下狹蓋取象于人也張臂八尺張足六尺是取象率焉幅疏先鄭意身即與中為一謂方丈者其上又加布一長三丈為兩個後鄭不從者侯有中有躬有個三者今先鄭惟有身不見中故不從之也古者布幅廣二尺二寸為縫皆以二尺計之此侯是九十弓侯侯中丈八尺則九幅布布長丈八尺九幅九丈幅有八尺為七丈二尺添前為十六丈二尺上下躬各三丈六尺即上下共為七丈二尺其上個七丈二尺下個有五丈四尺添前總用布三十六丈也其七十弓侯侯中一丈四尺其五十弓侯侯中一丈皆倍中以為躬倍躬以為左右個計之皆可知也鄭氏鍔曰弓之左右出者其名曰個亦名曰舌個或音幹取其張而用力也又名曰舌者取其出而左右也侯有中又有躬有舌舌即個也與其身三者言身居一分上兩個倍之而居其三也下兩個半之者言下兩個居上兩個之半也上綱與下綱出舌尋縜寸焉注綱所以繫侯于植者也上下皆出舌一尋者亦人張手之節也鄭司農云綱連侯繩也縜籠綱者疏綱以繫侯於植者也直則在兩旁邪豎之也趙氏溥曰縜是圈子穿在個邊綱却穿過圈子以縳在植上易氏祓曰綱所以持侯而擊于植縜所以持綱而繫于侯上綱與下綱出舌皆八尺者以象人張臂之義縜寸者以象人伸指之義蓋臂為尋而指為寸皆近取諸身者也此又三射之侯與夫三侯二侯一侯之所同也張皮侯而棲鵠則春以功注皮侯以皮所飾之侯司裘職曰王大射則共虎侯熊侯豹侯設其鵠謂此侯也春讀為蠢蠢作也出也天子將祭必與諸侯羣臣射以作其容體出其合于禮樂者與之事鬼神焉皮疏張皮侯者天子三侯用虎熊豹皮飾侯之側號曰侯而棲鵠者各以其皮為鵠綴于中央似鳥之棲故云而棲鵠也王氏與之曰此大射之侯鄭氏鍔曰春以功蓋氣至于春則發生之時人至於春則立功之時大射之禮所以發動使之求為有功之事也張五采之侯則逺國屬注五采之侯謂以五采畫正之侯也射人職曰以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正下曰若王大射則以貍步張三侯明此五正之侯非大射之侯明矣其職又曰諸侯在朝則皆北面逺國屬者若諸侯朝會王張此侯與之射所謂賓射也五采者內朱白次之蒼次之黃次之黑次之其侯之飾又以五采畫雲氣焉疏此據賓射之侯言五采是九十弓之侯若七十弓者則三正五十弓者則二正也鄭氏鍔曰五采之鵠者即射人所謂五正之侯也虎侯五正熊侯三正豹侯二正用五采以畫焉中朱次白次蒼次黃而元居外以五行相克為次也以南為首故先朱以正為的故曰正畫用五采故曰采侯張五采之侯則王與來朝之諸侯行賓射之禮也惟朝會而張此侯以射此逺國所以繫心於王而不敢擕二也張獸侯則王以息燕注獸侯畫獸之侯也息者休農息老物也燕謂勞使臣若與羣臣間暇飲酒而射事疏此燕射之侯也息老物勞使臣無飲酒三者燕皆有射法鄭氏鍔曰六獸皆正面畫其正首於鵠之處張獸侯以明獸之害人者吾已射之矣此可以息燕焉祭侯之禮以酒脯醢注謂司馬實爵而獻獲者於侯薦脯醢折俎獲者執以祭侯疏謂司馬實爵已下皆依大射而言彼雖諸侯禮天子射亦然又不辨大射賓射燕射則三等射皆同王氏昭禹曰侯而祭之者神無乎不在而君子無往不用其至也其辭曰唯若寧侯毋或若女不寧侯不屬於王所故抗而射女強飲強食詒女曾孫諸侯百福注若猶汝也寧安也謂先有功德其鬼有神或有也若如也屬從朝會也抗舉也張也詒遺也曾孫諸侯謂女後世為諸侯者易氏祓曰侯之為侯非止射侯而已內能受矢外能威人者為射之侯屏蔽王室敵王所愾者亦為天子之諸侯使諸侯而安其為侯則善矣其或不安其為侯不能奉承乎王命則司馬九伐之法在所必及故托其辭於祭侯曰抗而射女爾諸侯可不知所戒乎誠能安其為後謹守臣節則富貴可以長守故曰強飲強食詒女曾孫諸侯百福雖曰詒之自上而所謂惟若寧侯者實諸侯之自求多福也吳氏澄曰寧侯謂諸侯先有功德者能安寧其國故今射者願如安寧之侯而毋得如不寧之侯言當效有道之君而勿效無道之君也不屬于王所即所謂不寧侯也以其無道而遂疾之故抗射焉抗舉也強飲強食祝頌辭也聶崇義三禮圖虎侯圖説曰司裘王大射則供虎侯言王大射者謂王將祀五帝于四郊昊天于圜丘及享先王選助祭者故于四郊小學之中王與諸侯及羣臣等行大射之法也虎侯者謂以虎皮飾其布侯之側其鵠亦以虎皮方制之著于侯中其侯道九十弓弓二寸以為侯中中亦身也侯身廣丈八尺三分其侯而鵠居其一焉則鵠方六尺矣此王之所射之侯也與梓人張皮侯而棲鵠其為一事侯制上廣下狹蓋取象于人張臂八尺張足六尺是取象率焉樂以騶虞九節熊侯圖説曰王大射司裘亦供熊侯此助祭諸侯所射之侯也亦以熊皮飾侯側兼方制其鵠侯道七十弓弓二寸以為侯中廣丈四尺亦三分其侯而鵠居其一則鵠方四尺六寸大半寸者賈釋云以侯廣丈四取丈二三分之得四尺又于四尺之內取尺八寸得六寸有二寸在寸為三分二寸總六分取二分二分于三分為三分寸之二也三分寸之二即是大半寸也故云鵠方四尺六寸大半寸又梓人為侯廣與崇方崇髙也上下為崇橫度為廣則虎侯中丈八尺熊侯中丈四尺豹麋侯中一丈皆方故云廣與崇方也又射之諸侯樂以貍首七節豹侯圖説曰王大射司裘亦供豹侯此助祭卿大夫并士所射之侯也亦以豹皮飾侯側兼以豹皮方制其鵠侯道五十弓弓二寸以為侯中廣一丈亦三分其侯而鵠居其一則鵠方三尺三寸少半寸者賈釋云以侯廣一丈內取九尺得三尺一尺取九寸一寸分為三分取一分則一分于二分為三分寸之一三分寸之一則是少半寸故云鵠方三尺三寸少半寸也謂鵠者取名于鳱鵠鳱鵠小鳥捷黠難中是以中之為雋而取鵠之言較者直也射所以直已志虎熊豹示伏猛言能伏得猛厲諸侯也麋者迷也以麋皮為侯示能討擊迷惑之諸侯也射者大禮故于三侯之上取義衆多又侯道九十七十五十弓逺近三等者以人有尊卑分為三節尊者射逺卑者射近故也射人云孤卿大夫樂以采蘋五節樂以采蘩五節熊侯圖説曰司裘云諸侯則供熊侯豹侯此謂畿內諸侯大射將祀先祖亦與羣臣射以擇士熊侯則諸侯自射者也豹侯所選助祭臣下所射者也亦以熊豹皮各飾其侯側方謂之鵠其侯道鵠居皆與王之熊侯豹侯同麋侯圖説曰司裘云卿大夫則供麋侯此謂王朝卿大夫畿內有采地者將祭先祖亦行大射之禮張麋侯君臣共射焉亦以麋皮飾侯側又以皮方制其鵠著于侯中其侯道亦五十弓侯廣鵠方丈尺之數亦與王之豹侯同大侯圖説曰畿外諸侯將祭先祖亦行大射禮而射三侯與天子同畿內諸侯近尊不得同於天子三侯但射二侯而已畿外諸侯逺尊故得申也三侯雖同而用皮别耳即大射大侯九十參侯七十干侯五十是也大射直言九十七十五十不云弓者案鄉射記注云大侯九十弓糝侯七十弓犴侯五十弓是有弓可知也又大射注云參讀曰糝糝雜也干讀曰犴犴胡犬也畿外諸侯自射大侯即熊侯也云大侯者與天子大侯同九十弓也其糝侯助祭者所射也大侯與天子雖同其糝犴二侯用皮為别糝侯圖説曰此謂畿外諸侯卿大夫助祭于君所射之糝侯也糝雜也雜侯者以豹尊于麋明以豹為鵠以麋為飾耳不純用豹麋者下天子卿大夫故也其侯道七十弓侯廣鵠方丈尺之數並與天子熊侯同犴侯圖説曰犴侯者外諸侯之士助君祭所射之侯也犴外國野犬以犴皮飾侯亦方制為鵠其侯道五十弓侯鵠方廣並與天子豹侯同五正侯圖説曰天子賓射射五正三正二正之侯若諸侯朝正于王張此三侯與之共射謂之賓射五正之侯九十弓亦三分其侯正居一焉凡畫正五正五采三正三采二正二采五采者先從中畫朱方二尺次白次蒼次黃次黑皆充尺寸使大如鵠蒼即青也以射者相刻相伐之事故還以南方為本其外白青等皆相刻為次也又畫此五色雲氣以飾其側樂以騶虞九節三正侯圖説曰此三正七十弓之侯亦三分其侯正居一焉三正之侯去玄黃餘同五正還以朱白青三色畫雲氣以飾其側此是諸侯朝王為賓所射之侯也凡畫雲氣用丹為地以丹淺于赤也故于丹上得見赤色之雲諸侯于已國射三正二正之侯樂以貍首七節二正侯圖説曰此二正五十弓之侯亦三分其侯正居一二正之侯又去白青直用朱緑而已還用朱緑二色畫雲氣以飾其側此卿大夫聘會于王共射之侯也熊首獸侯圖説曰梓人云張獸侯則王以息燕注云獸侯畫獸為侯鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質白質者謂以蜃灰塗之使白為地正面畫其熊之頭狀亦象正鵠三分其侯而處其一亦各畫雲氣飾其側燕謂王勞使臣與飲酒而射也息謂王休農息老物之後亦行此燕射之禮王自射此五十弓熊首之侯也麋首獸侯圖説曰諸侯麋侯赤質謂以赤塗之使赤為地正面畫其麋之頭狀必知然者案貍首者射不來者之首也明熊麋以下皆正面畫其頭也王燕勞之時諸侯射此五十弓麋首之侯也亦畫雲氣飾其側虎豹首獸侯圖説曰卿大夫布侯畫以虎豹言布侯者謂不采其地直于布上正面畫虎豹頭狀亦畫雲氣飾其側王燕射則卿大夫射此五十弓虎豹首之侯也燕射必射此熊虎豹之首者不忘上下相犯也言此三獸皆猛不苟相下若君臣之道獻可者替否者不苟相從輒當犯顔而諫似此獸也故用之鹿豕首獸侯圖説曰王燕射士射五十弓鹿豕之布侯者亦謂不采其地直于布上面畫鹿豕頭及畫氣以飾其側諸侯必射麋士必射鹿豕者志在君臣相養也案內則云麋鹿豕皆有軒並是可食之物故知相養也天子諸侯特射熊麋之首卿大夫士兼射虎豹鹿豕之首所謂君畫一臣畫二陽奇隂耦之數也此燕射天子已下尊卑皆用一侯其侯道又皆五十弓弓二寸以侯中同方一丈者降尊就卑之義以燕禮主于歡心故也陳氏禮書周官司裘於王共虎侯熊侯豹侯設其鵠諸侯熊侯豹侯卿大夫共麋侯皆設其鵠此大射之侯也梓人所謂張皮侯而棲鵠則春以功是也射人以射法治射儀王射三侯五正諸侯射三侯三正孤卿大夫射一侯二正士射犴侯二正此賓射之侯也梓人所謂張五采之侯則逺國屬是也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以麋豕此燕射之侯也梓人所謂張獸侯以息燕是也大射之侯用虎熊豹麋之皮飾其側而中又制皮以為鵠賓射之侯亦虎熊豹麋之皮飾其側而中畫五色朱白蒼黃玄以為正燕射之侯則畫熊麋虎豹鹿豕之形以象鵠此三射之别也然司裘諸侯熊侯豹侯則畿內諸侯大射之禮也畿外諸侯大侯參侯干侯故大射禮量人巾車張三侯大侯之崇見鵠於參參見鵠於干干不及地武是也司裘不言犴侯以士無大射故也不言參侯以畿外非司裘所共故也射人言士犴侯二正則王三侯之為虎熊豹諸侯二侯之為熊豹大夫之侯亦為麋可知也蓋大射以鵠則猶賓射之有正也賓射有皮則猶大射之飾其側也大射側中皆皮故曰皮侯賓射側皮而中五采故曰五采之侯則司裘射人之三侯二侯一侯其側則同而所異者中而已鄭司農釋射人曰三侯熊虎豹二侯熊豹是也鄭康成曰三侯五正三正二正之侯二侯三正二正之侯一侯二正而已其説非也蓋王三侯皆五正諸侯二侯皆三正經言王五正康成謂有三正二正經言諸侯三正康成謂有二正可乎夫天子諸侯所尚者威孤卿大夫所尚者才士所尚者志威以服猛為事而虎熊豹皆猛獸也故天子大射之侯以虎熊豹才以除害為職而麋害穀者也故大夫大射之侯以麋士以有事四方為能以勝夷狄之守為善而犴胡犬也故士賓射之侯以犴然燕射天子降以熊諸侯降以麋大夫止用虎豹士用鹿豕者息燕勞功則禮殺於祭祀賓客故天子諸侯殺其威然後能下下孤卿大夫隆其才然後能衛上大夫隆其才以至於威士隆其志以至於才則燕之為禮所以異乎大射賓射之嚴分守也麋鹿類也豕亦害物者也春秋以冬多麋為災詩以町疃鹿場為患禮記以食田豕為虎之功此麋鹿豕之不可不除也然則畿外諸侯大射以大侯參侯干侯何也大侯熊侯也參侯麋侯也干侯犴侯也諸侯三侯熊為上故曰大侯大夫麋侯參於天子諸侯之侯為三故曰參侯天子得以兼諸侯之侯故有熊侯諸侯得以兼大夫士之侯故有麋侯犴侯康成以參為糝謂糝侯豹鵠而麋飾以大夫用虎豹不忘上下相犯士用鹿豕不忘君臣相養非射禮之意也鵠取名於鳱鵠正取名於題肩皆鳥之捷黠難中者故以中為雋焉其義則鵠者直也正者正也直已正志然後能中故記曰不失正鵠者其惟賢者乎鄭衆馬融王肅則以正在鵠內賈逵則以鵠在正內二者之説皆無所據要之大射之侯棲鵠賓射之侯設正燕射之侯畫獸以象正鵠而已考工記梓人為侯廣與崇方三分其廣鵠居一焉由是言之則賓射之侯亦三分其廣正居一也蓋弓二寸以為中虎侯九十弓則侯中丈八尺鵠方六尺熊侯七十弓則侯中丈四尺鵠方四尺六寸有奇豹侯麋侯五十弓則侯中一丈鵠方三尺三寸有奇鄭衆馬融之徒以四尺曰鵠誤也又曰大射量人量侯道以貍步大侯九十參七十干五十鄉射記侯道五十弓弓二寸以為侯中倍中以為躬倍躬以為左右舌下舌半上舌夫王之虎侯謂之大侯諸侯熊侯亦謂之大侯諸侯大侯九十參七十干五十則天子虎九十弓熊七十弓豹五十弓可知豹五十弓則麋亦五十弓可知先儒謂弓之下制六尺則九十弓者五十四丈七十弓者四十二丈五十弓者三十丈弓二寸以為侯中則九十弓者中丈八尺七十弓者中丈四尺五十弓者中十尺侯中廣崇方則五十弓之侯用布五幅長丈則中之布方丈矣倍中以為躬則上躬下躬各二丈矣倍躬以為左右舌下舌半上舌則上左右舌布四丈而出躬各一丈下左右舌布三丈而出躬各五尺矣鄭氏謂半者半其出於躬是也鄉射記曰侯道五十弓射人若王大射則以貍步張三侯大射量人以貍步量侯道蓋貍善搏者也行則止而擬度焉其發必獲大射擇士欲其能擬度而獲也故以貍步非大射則弓而已弓之下制六尺貍再舉足亦六尺其為步同其所為異也古者制度取於身而器用生於類故侯道生於弓而侯中亦生於弓弓二寸以為侯中倍中以為躬倍躬以為左右舌下舌半上舌而侯道之逺侯中之廣者雖不止此然十弓者侯道之所始也故五十弓之侯其上則象人八尺之臂五八四十而用布四丈其下則象人六尺之足五六三十而用布三丈中其身也上下其躬也躬之左右出者舌也持舌者綱也籠綱者縜也其不及地者武而已則下綱其足也武其足迹也中人之迹長尺二寸則侯之制度取於身可謂備矣又曰司裘天子大射三侯虎侯侯道九十弓侯中丈八尺鵠方六尺熊侯侯道七十弓侯中丈四尺鵠方四尺六寸有奇豹侯侯道五十弓侯中十尺鵠方三尺三寸有奇鄭氏謂王之大射王射虎侯諸侯助祭者射熊侯卿大夫士助祭者射豹侯其説蓋以大射禮公射大侯大夫射參士射干而知之也天子諸侯與其臣大射賓射皆異侯而燕射與其臣則同侯蓋異侯所以辨其等同侯所以一其歡也凡侯面北西方謂之左其張而未射也不繫左下綱中掩束之及射則説束遂繫左下綱司裘諸侯大射共熊侯豹侯鄭康成曰諸侯謂三公及王子弟封於畿內者熊侯諸侯所自射豹侯羣臣所射是也侯步之制蓋與天子熊侯豹侯同與畿外之熊侯參侯異逺近屈伸之勢然也射人諸侯二侯四耦亦畿內諸侯耳司裘卿大夫射共麋侯侯道五十弓侯中十尺鵠三尺三寸有奇天子諸侯之射與臣異侯尊君也大夫之射與臣同侯避君也士事人非事於人者也故有僚友而無臣故無大射擇士之禮又曰詩曰大侯既抗天子之侯也大射禮大侯九十諸侯之侯也天子大侯九十步而諸侯大侯亦如之參侯以眂天子熊侯干侯以眂天子豹侯則步中躬舌之制可知大侯之崇見鵠於參參見鵠於千千不及地武鄭氏曰中人之足長尺二寸以犴侯計之參侯去地一丈五寸少半寸大侯去地二丈二尺少半寸是也何則干侯中十尺上下躬舌各二尺為八尺則丈八尺矣又下不及地尺二寸則犴侯上綱去地丈九尺二寸矣參侯中丈四尺上下躬舌八尺則二丈二尺矣鵠居侯中三分之一則參鵠之下與犴侯上綱埒此所謂見鵠於犴也大侯中丈八尺上下躬舌八尺則二丈六尺矣鵠居侯中三分之一則大鵠之下與參侯上綱埒此所謂見侯於參也諸侯如此則天子虎侯見鵠於熊熊侯見鵠於豹豹不及地武又可知也又曰司裘諸侯大射二侯射人諸侯賓射亦二侯畿內諸侯也若畿外則三侯矣二侯四耦則三侯六耦矣儀禮大射畿外諸侯之制也三耦射畢然後公射又三耦射畢然後公再射乃獲飲觶則三侯亦六耦也昔晉范獻子聘於魯魯侯享之射者三耦公臣不足取於家臣蓋方是時公室卑矣不能如禮士有賓射而不預王之賓射故射人無士之摯位士無大射而與王之大射故司裘豹侯士射焉鄉射記言鄉侯之逺近廣狹而不言其侯鄭康成謂鄉射當張麋侯二正又曰鄉射記凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕蓋白德之成赤事之著故天子之侯白質諸侯之侯赤質天子諸侯言質而不言布大夫士言布畫而不言質則大夫士其地不采可知也君陽而奇故畫一臣隂而耦故畫二畫非特其首而已鄭氏之徒謂六獸皆正面畫其首於正鵠之處猶貍首射不來者之首也然天子歌騶虞大夫歌采蘋士歌采蘩三詩皆為射節而無射事孰謂貍首必射不來者之首耶劉氏繢曰周禮王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠考工記張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕凡侯有三皮布獸雖不同而鵠則皆以皮為之加于上以有毛生皮為之則曰皮侯蓋武射専主力所謂主皮是也春以功謂凡田獵以習武也詩二之日其同載纘武功是也舉春則四時可知以布為侯各畫其獸曰五采之侯天子畫若虎若熊若豹諸侯則畫若熊若豹卿大夫則畫麋蓋文射専主禮樂試之於射宫選諸侯卿大夫士與祭者也以去毛之皮為侯如畫獸曰獸侯既燕則射詩所謂序賓以賢是也鄉射記凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質則畫地亦赤矣大夫士息燕又以布矣蕙田案以上侯周禮夏官繕人掌王之用弓弩矢箙矰弋抉拾掌詔王射贊王弓矢之事凡乘車載其弓弩注鄭司農云抉者所以縱弦也拾者所以引弦也詩曰抉拾既次詩家説或謂抉謂引弦彄也拾謂韝扞也元謂抉挾矢時所以持弦飾也著右手巨指士喪禮曰抉用正王棘若擇棘則天子用象骨與韝扞著左臂裏以韋為之詔王告王當射之節及授之受之王氏曰乘車王所乘之車載載之于車也司弓矢掌六弓四弩八矢之法仲春獻弓弩仲秋獻矢箙注弓弩成於和矢箙成於堅箙盛矢器以獸皮為之及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者注王弧夾庾唐大六者弓異體之名往體寡來體多曰王弧往體多來體寡曰夾庾往體來體若一曰唐大甲革革甲也春秋傳曰蹲甲而射之質正也樹椹以為射正也射甲與椹試弓習武也犴侯五十步及射鳥獸皆近射也近射用弱弓則射大侯者用王弧射參侯者用唐大矣學射者弓用中後習強弱則易也使者勞者弓亦用中逺近可也勞者勤勞王事若晉文侯文公受王弓矢之賜者其矢箙皆從其弓注從弓數也每弓者一箙百矢凡弩夾庾利攻守唐大利車戰野戰注攻城壘者與其自守者相迫近弱弩發疾車戰野戰進退非強則不及弩無王弧王弧恆服弦往體少者使矢不疾凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢痺矢用諸散射注此八矢者弓弩各有四焉枉矢殺矢矰矢恆矢弓所用也潔矢鍭矢茀矢痺矢弩所用也枉矢者取名變星飛行有光今之飛矛是也或謂之兵矢潔矢象焉二者皆可結火以射敵守城車戰前重於後微輕行疾也殺矢言中則死鍭矢象焉鍭之言侯也二者皆可以司候射敵之近者及禽獸前尤重中深而不可逺也結繳於矢謂之矰矰髙也茀矢象焉茀之言刜也三者皆可以弋飛鳥刜羅之也前於重又微輕行不低也詩云弋鳬與雁恆矢安居之矢也痺矢象焉二者皆可以散射也謂禮射及習射也前後訂其行平也凡矢之制枉矢之屬五分二在前三在後殺矢之屬三分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規勾者謂之弊弓注體往來之衰也往體寡來體多則合多而圜往體多來體寡則合小而圜弊猶惡也勾者惡則直者善矣冬官考工記矢人為矢鍭矢參分茀矢參分一在前二在後注參訂之而平者前有鐵重也司工矢職茀當為殺鄭司農云一在前謂箭稿中鐵莖居參分殺一以前兵矢田矢五分二在前三在後注鐵差短小也兵矢謂枉矢潔矢也此二矢亦可以田田矢謂矰矢閷矢七分三在前四在後注鐵又差短小也司弓矢職閷當為茀參分其長而殺其一注矢稿長三尺殺其前一尺令趣鏃也五分其長而羽其一注羽者六寸以其笴厚為之羽深注笴讀為稿謂矢幹水之以辨其隂陽注辨猶正也隂沉而陽浮夾其隂陽以設其比夾其比以設其羽注夾其隂陽者弓矢比在稿兩旁弩矢比在上下設羽於四角鄭司農云比謂括也參分其羽以設其刃注刃二寸則雖有疾風亦弗之能憚矣注謂風不能驚憚箭也刃長寸圍寸鋌十之重三垸前弱則俯後弱則翔中弱則紆中強則揚羽豐則遲羽殺則躁注言幹羽之病使矢行不正俯低也翔回顧也紆曲也揚飛也豐大也躁旁掉也是故夾而搖之以視其豐殺之節也注今人以指夾矢衛是也橈之以視其鴻殺之稱也注撓搦其幹凡相笴欲生而摶同摶欲重同重節欲疏同疏欲栗注相猶擇也生謂無瑕蠧也摶讀如摶黍之摶謂圜也鄭司農云欲栗欲其色如栗也弓人為弓取六材必以其時注取幹以冬取角以秋絲漆以夏筋膠未聞六材既聚巧者和之注聚猶具也幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也注六材之力相得而足凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下注此説弓幹善惡也凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則逺根注陽猶清也木之類近根者奴凡析幹射逺者用藝射深者用直注鄭司農云藝謂形藝假令木性自曲則當反其曲以為弓故曰審曲面藝元謂曲藝則宜薄薄則力少直則可厚厚則力多居幹之道災栗不迆則弓不發注鄭司農云災栗謂以鋸副析幹迆謂邪行絶理者弓發之所從起凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔注鄭司農云昔讀為錯謂牛角粗理錯也疢疾險中注牛有久病則角裏傷瘠牛之角無澤注少潤氣角欲青白而豐末注豐大也夫角之本蹙於􅑠而休于氣是故柔柔故欲其藝也白也者藝之徴也注色白則藝夫角之中恆當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也注畏讀如秦師入隈之隈疏曲隈之義夫角之末逺于􅑠而不休于氣是故脆脆故欲其柔也豐末也者柔之徴也注末之大者􅑠氣及煦之角長二尺有五寸三色不失理謂之牛戴牛注三色本白中青末豐鄭司農云牛戴牛角直一牛凡相膠欲朱色而昔昔也者深瑕而澤紾而搏亷注摶圜也亷瑕嚴利也鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃注餌色如餌凡昵之類不能方注謂膠善戾凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸注簡謂筋條也筋欲敝之敝注鄭司農云嚼之當孰漆欲測注測猶清也絲欲沈注如在水中時色得此六材之全然後可以為良注良善也凡為弓冬析幹而春液角夏治筋秋合三材注三材膠絲漆寒奠體注奠讀為定至冬膠堅內之檠中定往來體氷析灂注大寒中下于檠中復內之冬析幹則易注理滑致春液角則合注合讀為洽夏治筋則不煩注煩亂秋合三材則合注合堅密也寒奠體則張不流注流猶移也氷析灂則審環注審猶定也春被弦則一年之事注期歲乃可用析幹必倫析角無邪斫目必荼注鄭司農云荼讀為舒舒徐也目幹節目斫目不荼則及其大修也筋代之受病注修猶久也夫目也者必強強者在內而摩其筋夫筋之所由幨恆由此作注摩猶隱也幨絶起也故角三液而幹再液厚其帤則木堅薄其帤則需注需謂不充滿鄭司農云帤謂弓中裨是故厚其液而節其帤注厚猶多也節猶適也約之不皆約疏數必侔注不皆約纒之繳不相次也皆約則弓帤伴猶均也斫摯必中膠之必均注摰之言致也中猶均也斫摯不中膠之不均則及其大修也角代之受病夫懷膠于內而摩其角夫角之所由挫恆由此作注幹不均則角蹴折也凡居角長者以次需注當弓之隈也長短各稱其幹短者居簫恆角而短是謂逆橈引之則縱釋之則不校注恆讀為搄搄竟也竟其角而短於淵幹引之角縱不用力若欲反橈然校疾也既不用力放之又不疾恆角而達譬如終紲非弓之利也注達謂長于淵幹若達于簫頭紲弓䩛角過淵接則送矢太疾若見紲于䩛矣今夫茭解中有變焉故校注茭解謂接中也變謂簫臂用力異校疾也於挺臂中有柎焉故剽注挺直也柎側骨剽亦疾也恆角而達引如終紲非弓之利注重明達角之不利變譬言引字之誤嬌幹欲孰于火而無贏嬌角欲孰于火而無燂引筋欲盡而無傷其力鬻膠欲孰而水火相得然則居旱亦不動居濕亦不動注贏過孰也燂炙爛也不動者謂弓也苟有賤工必因角幹之溼以為之柔善者在外動者在內雖善于外必動于內雖善亦弗可以為良矣注濕猶生也凡為弓方其峻而髙其柎長其畏而薄其敝宛之無已應注宛謂引之也引之不休止常應弦言不罷需也峻謂簫也鄭司農云敝讀為蔽謂弓人所握持者下柎之弓末應將興注末謂蕭也弓柎卑簫應弦則柎將動為柎而發必動于閷注閷接中弓而羽閷末應將發注羽讀為扈扈緩也接中動則緩閷簫應弦則角幹將落弓有六材焉維幹強之張如流水注無難易也維體防之引之中參注體謂內之於檠中定其體防深淺所止謂體定張之弦居一尺引之又二尺維角䟫之欲宛而無負弦引之如環釋之無失體如環注負弦辟戾也負弦則不如環如環亦謂無難易材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和注有三讀為又參量其力又參均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺假令弓力勝三石引之中三尺弛其弦以繩緩擐之每加物一石則張一尺不勝無負也九和之弓角與幹權筋三侔膠三鋝絲三邸漆三庾上工以有餘下工以不足注權平也侔猶等也角幹既平筋三而又與角幹等也鋝鍰也邸庾輕重未聞為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規注材良則句少也弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之注人各以其形貌大小服此弓凡為弓各因其君之躬志慮血氣注又隨其人之性情豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿藝以奔若是者為之安弓安弓為之危矢注言損贏濟不足者奔猶疾也骨直謂強毅其人安其弓安其矢安則莫能以速中且不深注三舒不能疾而中言矢行短也中又不能深其人危其弓危其矢危則莫能以願中注願慤也三疾不能慤而中言矢行長也長謂過去往體多來體寡謂之夾臾之屬利射侯與弋注射逺者用藝夾臾之弓合五而成規侯非必逺顧藝弓者材必薄薄則弱弱則矢不深中侯不落大夫士射侯矢落不獲弋繳射也往體寡來體多謂之王弓之屬利射革與質注射深者用直此又直焉於射堅宜也王弓合九而成規弧弓亦然革謂干盾質木椹天子射侯亦用此弓往體來體若一謂之唐弓之屬利射深注射深用直唐弓合七而成規大弓亦然大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂注大和猶良者也深謂灂在中央兩邊無也角無灂謂隈裏合灂若背手文注弓表裏灂合處若人合手背文相應鄭司農云如人手背文理角環灂牛筋蕡灂麋筋斥蠖灂疏此説弓表及弓裏灂文也和弓􅌛摩注和猶調也􅌛拂也將用弓必先調之拂之摩之覆之而角至謂之句弓注句于三體材敝惡不用之弓也覆猶察也謂用射而察之至猶善也但角善則矢雖疾而不能逺覆之而幹至謂之侯弓注射侯之弓也幹又善則矢疾而逺覆之而筋至謂之深弓注射深之弓也筋又善則矢既疾而逺又深蕙田案以上弓矢爾雅容謂之防注如小曲屏唱射者所以自防隱疏容一名防一名乏聶崇義三禮圖曰舊圖云乏一名容似今之屏風其制從廣七尺以牛革鞔漆之今案大射禮謂之乏射人職謂之容鄭之兩注謂唱獲者所蔽以禦矢也賈釋云以容蔽其身故得禦矢言乏者矢至于此乏匱不去也又下文云凡用大射賓射等乏皆用革也陳氏禮書正面北乏面南故文反正為乏侯各有獲各有容故王三侯三獲三容諸侯二侯二獲二容卿大夫士一侯一獲一容容革為之鄉射乏三侯道居侯黨之一西五步大射西十北十謂之乏以矢力乏於此也謂之容以獲者所庇也爾雅曰容謂之防容與防皆乏之異名也蕙田案以上乏聶崇義三禮圖曰司弓矢云大射燕射共弓矢并夾注云并夾矢籋音聶賈釋云矢籋之言出于漢時若王射則射鳥氏主取矢其矢著侯髙人手不能及則以并夾取之蕙田案以上并夾周禮春官太史凡射事飾中舍算執其禮事注飾謂於射而飾中以待射中所以盛算者禮事升降進退之事大史守其禮節也聶崇義三禮圖鹿中圖説曰鄭注鄉射禮射于榭用鹿中有堂無室曰榭榭即州序也舊圖云士之中長尺二寸首髙七寸背上四寸穿之容算長尺二寸鄉射記曰鹿中髤前足跪鑿其背容八算注云前足跪者象教擾之獸受負也賈釋云服不氏教擾猛獸有堪受負有不合受負者若今駝受負則四足俱屈又投壺禮孔義云其中之形尅木為之狀如鹿兕而伏鑿背盛算兕中圖説曰大夫射于庠用兕中鄉射禮注云庠之制有堂有室也舊圖云兕似牛一角大小之制如鹿中皮樹中圖説曰鄉射記云君國中射則皮樹中注云國中城中也謂燕射也皮樹獸名賈釋云知城中是燕射者以下有賓射大射不在國故知城中是燕射也張鎰圖云皮樹人面獸形閭中圖説曰諸侯立大學于郊若行大射于此大學則閭中鄉射記注云閭獸名如驢一角或曰如驢歧蹄虎中圖説曰諸侯與鄰國君射于境則虎中賈釋云與鄰國君射則賓射也以其主君有送賓之事因送則射陳氏禮書君國中射則皮樹中於郊則閭中於境則虎中大夫射則兕中士則鹿中鹿中髤前足跪鑿背容八算則皮樹虎兕之制蓋亦然也惟君有射于國中而燕射大射賓射異中大夫士射必於郊而燕射賓射同中君射則始納於西堂下繼又總之以適次大夫士射則納於西堂而已此尊卑之辨也其奉之也先首其設之也必坐其位則南當楅西當西序其嚮則東面籌雖八十所容者八算而已上射之算釋於右下射之算釋於左則賓主之黨辨矣二算為純一算為奇則勝負之黨辨矣鄉射用鹿中而投壺亦鹿中者投壺輕於射禮故用中之下者而已蕙田案以上中聶崇義三禮圖説曰鄉射禮司馬命弟子説楅賈釋注云楅猶幅也所以揚笴齊矢也以楅為幅者義取若布帛有邊幅整齊之意故云承笴齊矢也下記云楅長如笴博三寸厚寸有半龍首其中蛇交幅髤注云兩端為龍首中央為蛇身相交龍蛇君子之類交者象君子取矢于楅上髤赤黑漆賈疏引鄭注易龍戰于野云聖人喻龍君子喻蛇是龍蛇總為君子之類也舊圖云楅長三尺有足置韋當于背陳氏禮書鄉射記曰楅長如笴博三寸厚半寸龍首其中蛇交韋當髹之蓋兩端龍首所以限矢也其中蛇交所以安矢也韋當所以分矢也大射三耦既拾取矢捆之所以齊矢也夫楅之楅矢蓋猶楅衡之楅牛考之於禮奉楅者坐奠委矢者坐委乘矢者坐撫取束矢者坐脫則楅卑而無足可知舊圖楅有足誤矣蕙田案以上楅聶崇義三禮圖説曰舊圖云韋當長二尺廣一尺置楅之背上藉以箭鄉射記注云直心背之衣曰當以丹韋為之司馬左右撫矢而乘之分委于當賈釋云直者通身之言其楅兩頭為龍首于背通身著當言直者當心中央也知丹韋為之者周尚赤故也蕙田案以上韋當周禮春官司常凡射共獲旌注獲旌獲者所持旌及疏言凡射則大射賓射燕射皆共之夏官服不氏射則張贊侯以旌居乏而待獲注謂待射者中而服不氏舉旌以獲也蕙田案以上旌聶崇義三禮圖説曰舊圖云算長尺二寸以實于中人四算一偶八算其數無常隨偶多少若鄉射記云籌八十謂十偶而言是數無常也又此云算長尺二寸與投壺禮同其鄉射記算長尺有握握四指也一指一寸是尺四寸也陳氏禮書鄉射記前籌八十長尺有握握素握布四指指一寸則籌尺有四寸矣公羊傳曰膚寸而合投壺曰室中布五扶先儒謂側手為膚鋪四指為扶則握與膚扶一矣握素刋其本也鄉籌八十而中實止於八者籌八十以十耦計之也一人四矢皆中則用八籌焉射未必皆中而必備八算者不敢期人之不中也每一耦射中者一箇釋一算上射於右下射於左有餘算則反之蓋釋獲者取八籌於中執之改實八算以待後中既釋獲委於其中西又取執而改實焉故中之所容常八算蕙田案以上算聶崇義三禮圖説曰鄉射記曰楚撲長如笴刋本尺又曰射者有過則撻之注云刋其可持處撲刑器司射常佩之過謂矢揚中人也凡射時矢中人當刑之今鄉會衆賢以禮樂歡民而射者中人本意在侯去傷害之心逺是以輕之撲撻于中庭而已書曰撲作教刑陳氏禮書衆之所在非威不足以制之故古者閭胥于鄉小胥于學有觥撻司市于市有撲罰司徒于誓田亦有撲書稱撲作教刑撻以記之禮稱夏楚二物收其威也則射之有撲宜矣鄉射司射升堂告賓則去撲降而反位則搢撲升而去撲所以敬尊也降而搢撲所以威重也蕙田案以上撲聶崇義三禮圖説曰案鄉射大射之義其射物在庠之楹間若丹若黑而午畫之從者長三尺橫者曰距隨長尺二寸言距隨者謂先以左足履射物東頭為距後以右足來合而南面並立曰隨陳氏禮書物者則之所自出也射之所履不過乎物故位謂之物左為下物右為上物其畫也若丹若黑其設也兩楹之間於序則當棟於堂則當楣弓長六尺而兩楹之間容弓笴長三尺而物如笴武長尺有二寸而距隨長武一縱一橫縱長而橫短此所謂度尺而午也前足至物之左端右足合而隨之此所謂距隨也凡射及物則揖履物則先左足先左足以正其位還視侯中以審其的然後俯正而俟此所謂以志正體直可以祈中矣蕙田案以上物聶崇義三禮圖説曰舊圖云決亦以朱韋為之案大射禮云設決朱極三注云猶闓音開以象骨為之著右三指所以鈎弦而闓之極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指若無決極放弦契于此指多則痛小指短不用極蕙田案以上朱極三聶崇義三禮圖説曰舊圖云遂臂捍以朱韋為之案鄉射禮注云遂射講也以韋為之所以遂弦也其非射時則謂之拾拾斂也所以蔽膚斂衣也又大射注云遂著左臂裏以遂弦也蕙田案以上遂聶崇義三禮圖説曰大射禮注云次若今更衣處即所設之帷幄也故幕人掌帷幕幄帟以供掌次若王朝日祀五帝則掌次張大次小次凡祭祀張旅幕張尸次射則張耦次後鄭以耦次在洗東大次大幄也初往所止居也小次小幄也既接祭退俟之處今又射有三位若王射設耦次亦宜有大次小次也又幕人職旁注云在傍曰帷在上曰幕或在地展陳于上帷幕皆以布為之四合象宫室曰幄即王所居之帳也帟王在幕若幄中坐上承塵也幄帟皆以繒為之賈釋云帷在下幕在上共為室幄帟又在帷幕室內設之也蕙田案以上次右射器五禮通考卷一百六十四
