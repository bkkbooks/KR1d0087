body:
  text: 五禮通考卷一百五十一刑部尚書秦蕙田撰嘉禮二十四昏禮蕙田案天地合而後萬物興焉夫昏禮萬世之始也人道之本也娶妻之禮以昏為期因名焉壻曰昏妻曰姻謂壻以昏時而來妻則因之而去也鄭氏注昏禮云女氏稱昏壻氏稱姻爾雅壻之父為姻婦之父為昏又壻之黨為姻兄弟婦之黨為昏兄弟是也易曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦遂皇立七政始有夫婦太昊制嫁娶儷皮為禮釐降之文見於尚書媒官之義具於月令周禮士昏禮備見於儀禮之經後代循而行之不廢故采自古以來昏禮咸著於篇易序卦傳有天地然後有萬物有萬物然後有男女有男女然後有夫婦注天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸恒蒙九二納婦吉本義九二以陽受隂為納婦之象咸卦咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也程傳天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恒也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恒皆二體合為夫婦之義咸感也以說為主恒常也以正為本而說之道自有正也正之道固有說焉巽而動剛柔皆應說也咸之為卦兑上艮下少女少男也男女相感之深莫如少者故二少為咸也艮體篤實止為誠慤之義男志篤實以下交女心說而上應男感之先也男先以誠感則女說而應也序卦傳夫婦之道不可以不乆也故受之以恒漸卦漸女歸吉彖曰漸之進也女歸吉也歸妹彖傳歸妹天地之大義也天地不交而萬物不興歸妹人之終始也禮記郊特牲天地合而後萬物興焉夫昏禮萬世之始也樂記昏姻冠笄所以别男女也昏義男女有别而後夫婦有義夫婦有義而後父子有親父子有親而後君臣有正故曰昏禮者禮之本也注言子受氣性純則孝孝則忠也昏疏夫婦昏姻之禮是諸禮之本所以昏禮為禮本者姻得所則受氣純和生子必孝事君必忠孝則父子有親忠則朝廷正是昏禮為諸禮之本也經解昏姻之禮所以明男女之别也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣白虎通人道所以有嫁娶何以為性情之大莫若男女男女之交人情之始莫若夫婦易曰天地絪緼萬物化醇男女搆精萬物化生人承天地施隂陽故設嫁娶之禮者重人倫廣繼嗣也禮保傅記曰謹為子嫁娶必擇世有仁義者禮男娶女嫁何隂卑不得自專就陽而成之故傳曰陽倡隂和男行女隨男不自專娶女不自專嫁必由父母須媒妁何逺恥防淫佚也史記外戚世家自古受命帝王及繼體守文之君非獨内徳茂也葢亦有外戚之助焉夏之興也以塗山而桀之放也以妺喜殷之興也以有娀紂之殺也嬖妲己周之興也以姜嫄及大任而幽王之禽也淫於褒姒故易基乾坤詩始關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用惟昏姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不慎與人能𢎞道無如命何甚哉妃匹之愛君不能得之於臣父不能得之於子况卑下乎既驩合矣或不能成子姓能成子姓矣或不能要其終豈非命也哉孔子罕稱命葢難言之也非通幽明之變惡能識乎性命哉蕙田案禮記昏義皆昏禮之義朱子謂儀禮之傳是也今以經傳言夫婦之大義者冠於篇端而昏義附於儀禮之後右昏大義禮記曲禮天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻注后之言後也夫之言扶孺之言屬婦之言服妻之言齊也疏妃邦君之合配王諸侯以下通有妃義故以妃字冠之以特牲少牢是大夫士之禮皆云某妃配某氏尊卑通稱也白虎通云后君也明配至尊為海内小君也諸侯曰夫人者夫人之名惟諸侯得稱論語云邦君之妻邦人稱之曰君夫人是也大夫曰孺人者孺屬也與人為親屬士曰婦人者婦之言服也服事其夫也其婦號亦上下通稱案春秋逆婦姜於齊是諸侯亦呼婦也穀梁傳云言婦通稱之辭言服事舅姑知通名也庶人曰妻者妻之言齊也庶人賤無别稱判合齊體而已尊卑如此若通而言之則上下通曰妻故詩曰刑于寡妻是天子曰妻也周家大夫妻曰内子趙姬以叔隗為内子是也呂氏大臨曰天子之妃所以稱后者冇繼後之辭合二姓之好以繼聖人之後以為天地社稷宗廟之主則有繼者也夫者帥人之稱也男子謂之丈夫士之貴者命為大夫稱之曰夫子則夫人者亦帥其嬪婦以事君故諸侯之妃曰夫人若邦人稱之則曰君夫人言君之夫人也大夫曰孺人士曰婦人䘮大記卿之妻曰内子春秋傳趙盾以叔隗為内子是也大夫妻曰世婦士則止曰士之妻而已未聞有孺人婦人之稱况婦人者已嫁之通稱非特士妻之名或古有之考于經傳未之有也庶人曰妻妻者貴賤同稱貴者尚文故其名異賤者尚質無所改也方氏慤曰自天子至於庶人皆有妃獨天子曰后以有君道故也諸侯之夫人一國之小君亦有君道不得謂之后者妃之有君道惟天子足以當之故也曰夫人者以其為一國之小君而人所事也故稱夫然非夫之也故稱人周南王者之風故關雎言后妃之徳召南諸侯之風故鵲巢言夫人之徳此非所辨歟大夫曰孺人者需人而有所屬謂之孺大夫能帥人而人之所屬也故其妃曰孺人凡妃皆有所屬而止大夫曰孺人者以言乎上則夫人之尊不宜以有所屬名之以言乎下則士之卑不足以人所屬名之故也婦以事人士亦以事人為事故其妃名以婦人庶人曰妻妻有二義與夫齊而莫之勝者妻之道也承夫而在下者妻之位也前言天子有妻則以天子之尊而妻之所當承故也此言庶人曰妻則以庶人之卑而妻得與之齊故也天子有后有夫人有世婦有嬪有妻有妾注王八十一御妻周禮謂之女御以其御序於王之燕寢妾賤者者疏天子冇后者天子立官則先從后妃為始所以然為治之法刑于寡妻始於家邦終于四海故刪詩則以后妃為首若論氣先隂後陽故此言天子冇后也謂之為后者后後也言其后於天子亦以廣後𦙍也冇夫人者夫扶也言扶持于王也冇世婦者婦服也言其進以服事君子也以其猶貴故加以世言之亦廣世𦙍也有嬪者嬪婦人之美稱可賓敬也冇妻者鄭注内則云妻之言齊也以禮見問得與夫敵體也案彼是判合齊體者今此言齊者以進御于王之時暫有齊同之義有妾者鄭注内則云妾之言接也聞彼有禮走而往焉以得接見於君子也周禮則嬪在世婦上又無妾之文也公侯有夫人有世婦有妻有妾注貶於天子也無后與嬪去上中疏公侯有夫人者獨言公侯舉其上者餘從可知也既下於天子不得立后故但得以一人正者為夫人有世婦者謂夫人之姪娣故公侯之夫人無子立姪娣子也質家先立姪之子文家先立娣之子二氏亦夫人姪娣貴於二媵則此世婦者謂夫人姪娣夫人自稱於天子曰老婦注謂畿内諸侯之夫人助祭若時事見自稱於諸侯曰寡小君注謂饗來朝諸侯之時自稱於其君曰小童自世婦以下自稱曰婢子注小童若云未成人也婢之言卑也於其君稱此以接見體敵嫌其當呂氏大臨曰諸侯自夫人以下如天子之制而無嬪有所殺也自稱於天子曰老婦婦事舅姑者也諸侯事天子猶子事父則夫人必稱婦也寡小君者臣下稱諸異邦之辭猶稱其君為寡君也小童之稱不見於經傳秦夫人告秦伯曰晋君朝以入則婢子夕以死雖夫人亦稱婢子自貶而就下也論語邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人注孔曰小君君夫人之稱對異邦謙故曰寡小君當此之時諸侯嫡妾不正稱號不審故孔子正言其禮也也疏此章正夫人之名稱也邦君之妻者諸侯之夫人妻者齊也言與夫齊體上下之通稱故曰邦君之妻也君稱之曰夫人者夫之言扶也能扶成人君之徳也夫人自稱曰小童者自稱謙言己小弱之童稚也邦人稱之曰君夫人者謂國中之臣民言則繫君而稱之言是君之夫人也稱諸異邦曰寡小君者諸於也謂己國臣民稱己君之夫人於他國之人則曰寡小君謙言寡徳之君夫人對君為小故曰寡小君也異邦人稱之亦曰君夫人者謂稱他國君妻亦曰君夫人也以當此之時諸侯嫡妾不正稱號不審故孔子正言其禮也春秋隠公二年公羊傳女在其國稱女在塗稱婦入國稱夫人伯姬歸於紀其言歸何婦人謂嫁曰歸爾雅母之考為外王父母之妣為外王母母之王考為外曽王父母之王妣為外曽王母注異姓故言外母之晜弟為舅母之從父晜弟為從舅母之姊妹為從母從母之男子為從母晜弟其女子子為從母姊妹蕙田案此言母黨爾雅妻之父為外舅妻之母為外姑注謂我舅者吾謂之甥然則亦宜呼壻為甥孟子曰帝館甥于貳室是也姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥注四人體敵故更相為甥甥猶生也今人相呼葢依此妻之姊妹同出為姨注同出謂俱已嫁詩曰邢侯之姨女子謂姊妹之夫為私注詩衛風碩人篇曰譚公維私疏孫炎云私無正親之言男子謂姊妹之子為出注春秋公羊傳曰葢舅出女子謂晜弟之子為姪注左傳曰姪其從姑謂出之子為離孫謂姪之子為歸孫女子子之子為外孫女子同出謂先生為姒後生為娣注同出謂俱嫁事一夫公羊傳曰諸侯娶一國二國往媵之以姪娣從娣者何弟也此即其義也女子謂兄之妻為嫂弟之妻為婦注猶今言新婦也稱疏嫂猶叟也老人之長婦謂稚婦為娣婦娣婦謂長婦為姒婦注今相呼先後或云妯娌疑疏廣雅云娣姒妯娌娣姒先後也世人多娣姒之名皆以為兄妻呼弟妻為娣弟妻呼兄妻為姒喪服娣姒婦報傳曰娣姒婦者弟長也以弟長觧娣姒言娣是弟姒是長也公羊傳亦云娣者何弟也是其以弟觧娣自然以長解姒長謂身之年長非夫之年長也此止言婦之長稚不言夫之大小左傳成公十年穆姜謂聲伯之母為姒昭公八年叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒豈計夫之長幼乎故賈逵鄭𤣥及杜預皆云兄弟之妻相謂謂長者為姒知娣姒之名不計夫之長幼也經傳通解此篇所指皆姒娣相對之定名同事一夫則以生之先後為長少各事一夫則以夫之長幼為先後所謂從夫之爵坐以夫齒者是也單舉則可通謂之姒葢相推讓之意耳疏說恐非是蕙田案朱子之說是又案此言妻黨婦稱夫之父曰舅稱夫之母曰姑舅姑在則曰君舅君姑沒則曰先舅先姑注國語魯語曰吾聞之先姑謂夫之庶母為少姑夫之兄為兄公注今俗呼兄鍾語之轉耳夫之弟為叔夫之姊為女公夫之女弟為女妹注今謂之女妹是也子之妻為婦長婦為嫡婦衆婦為庶婦女子子之夫為壻壻之父為姻婦之父為昏父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為昏姻兩壻相謂為亞注詩曰瑣瑣姻亞今江東人呼同門為僚壻婦之黨為昏兄弟壻之黨為姻兄弟注古者皆謂昏姻為兄弟嬪婦也注書曰嬪於虞謂我舅者吾謂之甥也蕙田案母黨妻黨皆從昏而有故並著焉白虎通天子妃謂之后何后君也天下尊之故謂之后春秋傳曰迎王后於紀國君之妻稱之曰夫人何明當扶進夫人謂非妾也國人尊之故稱君夫人也自稱小童者謙也言己智能寡少如童蒙也論語曰國君之妻稱之曰夫人夫人自稱曰小童國人稱之曰君夫人稱諸異邦曰寡小君謂聘問兄弟之國及臣他國稱之謙之辭也妻者何謂妻者齊也與夫齊體自天子下至庶人其義一也妾者接也以時接見也嫁娶者何謂也嫁者家也婦人外成以出適人為家娶者取也男女謂男者任也任功業也女者如也從如人也在家從父母既嫁從夫夫殁從子也傳曰婦人有三從之義也夫婦者何謂也夫者扶也扶以人道者也婦者服也服於家事事人者也配匹者何謂相與偶也謂之舅姑何舅者舊也姑者故也舊故之者老人之稱也稱夫父母謂之舅姑何尊如父而非父者舅也親如母而非母者姑也故稱夫之父母為舅姑也石林燕語帝女謂之公主葢昏禮必稱主人天子不可與羣臣敵故以同姓諸侯主之主者言主昏爾而漢又有稱翁主者諸侯之女也翁者老人之稱古人大抵謂父為翁諸侯自相主昏無嫌故稱翁者謂其父自主之也自六朝後諸王之女皆封縣主隋以後又有稱郡主者自是遂循以為故事則主非主昏之名右名稱禮記曲禮取妻不取同姓故買妾不知其姓則卜之郊特牲取於異姓所以附逺厚别也注同姓或取多相䙝也大傳其庶姓别於上而戚單於下昏姻可以通乎繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也疏作記之人以殷人五世以後可以通昏故將殷法以問姓别親盡昏姻應可以通故問其可通與否記者以周法答之周法雖庶姓别于上而冇世繫連繫之以本姓而不分别若姬氏姜氏大宗百世不改也連綴族人以飲食之禮而不殊異雖相去百世昏姻不得通周道如此異於殷也陳氏祥道曰恩出於情有時而可絶義出於理無時而可廢故六世而親屬竭者恩之可絶也百世而昏姻不通者義之不可廢也然恩之有絶其來尚矣而義之不廢特始於周故舜娶於堯而君子不以為非禮昭公娶於吴而君子以為不知禮以其時之文質不同故也坊記取妻不取同姓以厚别也注厚猶逺也故買妾不知其姓則卜之注妾言買者以其賤同之於衆物也士庶之妾恒多凡庸有不知其姓也以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒注吳太伯之後魯同姓也昭公取焉去姬曰吳而已至其死亦略云孟子卒不書夫人某氏薨孟子葢其且字疏春秋之例吳女亦當云夫人姬氏至自吳魯則諱其姬姓而不稱雜記夫人之不命於天子自魯昭公始也論語君取於吳為同姓謂之吳孟子君而知禮孰不知禮春秋哀公十二年夏五月甲辰孟子卒左氏傳昭夫人孟子卒昭公娶於吳故不書姓公羊傳孟子者何昭公之夫人也其稱孟子何諱娶同姓葢吳女也榖梁傳孟子者何也昭公夫人也其不言夫人何也諱娶同姓也僖公二十三年左氏傳鄭叔詹曰男女同姓其生不繁襄公二十八年左氏傳慶舍之士謂盧蒲癸曰男女辨姓昭公元年左氏傳子産曰僑聞之内官不及同姓其生不殖美先盡矣則相生疾是以君子惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也國語晉懷公自秦逃歸秦伯召公子於楚楚子厚幣以送公子於秦秦伯歸女五人懷嬴與焉公子使奉匜沃盥既而揮之嬴怒曰秦晉匹也何以卑我公子懼降服囚命秦伯見公子曰寡人之適此為才子圉之辱備嬪嬙焉欲以成昏而懼離其惡名非此則無故不敢以禮致之歡之故也公子有辱寡人之罪惟命是聴公子欲辭司空季子曰同姓為兄弟黄帝之子二十五人其同姓者二人而已惟青陽與夷鼔皆為已姓青陽方雷氏之甥也夷鼓彤魚氏之甥也其同生而異姓者四母之子别為十二姓凡黄帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕葴任荀僖姞儇依是也惟青陽與倉林氏同於黄帝故皆為姬姓同徳之難也如是昔少典取於有蟜氏生黄帝炎帝黄帝以姬水成炎帝以姜水成成而異徳故黄帝為姬炎帝為姜二帝用師以相濟也異徳之故也異姓則異徳異徳則異類異類雖近男女相及以生民也同姓則同徳同徳則同心同心則同志同志雖逺男女不相及畏黷敬也黷則生怨怨亂毓災災毓滅姓是故取妻避其同姓畏亂災也故異徳合姓同徳合義義以道利利以阜姓姓利相更成而不遷乃能攝固保其土房今子於子圉道路之人也取其所棄以濟大事不亦可乎公子謂子犯曰何如對曰將奪其國何有於妻惟秦所命從也謂子餘曰何如對曰禮志有之曰將有請於人必先有入焉欲人之愛己也必先愛人欲人之從己也必先從人無徳於人而求用於人罪也今將昏媾以從秦受好以愛之聴從以徳之懼其未可也又何疑焉乃歸女而納幣且逆之家語衛公使其大夫求昏於季氏桓子問禮於孔子孔子曰同姓為宗有合族之義故繫之以姓而弗别綴之以食而弗殊雖百世昏姻不得通周道然也桓子曰魯衛之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊也下治子孫以親親也旁治昆弟所以敦睦也此先王不易之教也孔叢子季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之以食序列昭穆萬世昏姻不通忠篤之道然也通典同姓昏議殷以上昏不隔同姓周制則不娶宗族許慎五經異義諸侯娶同姓今春秋公羊說魯昭公娶於吳為同姓也謂之吳孟子春秋左氏說孟子非小君也不成其䘮不當譏又案易曰同人于宗吝言同姓相娶吝道也即犯誅絶之罪言五屬之内禽獸行乃當絶漢呂后妹嫁吕平王莽取宜春侯王咸女後稱曰宜春氏頌晉劉頌為漢廣陵王後臨淮陳矯本劉氏子矯與為近親出養始改姓陳頌女適陳氏時人譏之若同姓得昏論如虞陳之類禮所不禁同姓不殖非此類也難者不能屈濮陽太守劉嘏與同姓劉疇昏司徒下太常博士議非之嘏以為同姓庶姓有正姓有複姓有單姓鍾云出於鍾離之後胡母與胡公同本複鍾單鍾複胡單胡今年共昏不以損一字為疏増一字為親不以共其本為悔取其同者為吝宜理在可通而得明始限之别故昏姻不疑耳今並時比族年齊代等至於庶姓禮記書其别於上始祖正姓明其斷於下以之通議則人倫無闕案太常縂言博士議𫐠叙姓變為始祖者始此姓為祖也此既非禮所謂始祖為正姓之義即便棄經從意謂義可通如今衆庶之家或避國諱遁讐逃罪變音易姓者便可皆言是始祖正姓為昏之斷如此禮稱附逺厚别百代不通之義復何所施乎此惑之甚者也論者又以為開通同姓昏則令小人致濫案禮自有禁限禁限之外本自禮所不責不可以禁禮所不應責者而云通禮所應責也王皆王沈魏晉名儒同周室之後共昏者二門譜地皆存昌黎張仲娶范陽張璉妹諮張公而後昏今日若考經據事足以取正惟大府裁之嘏又與卞壺疏云堯妻舜女其代不逺又春秋云畢原酆郇文之昭邗晉應韓武之穆代俗之所惑上惑堯舜之代下惑應韓之昭穆欲追過堯舜耶則輕歴聖人議者或謂巍巍蕩蕩之徳可以掩堯舜之疵或謂代近姓異可以通應韓之昏豈其然哉若代近姓異可以通應韓之昏則周公立百代之限禮記云娶於異姓附逺而厚别此二義復何所施如其不然則明始限之外堯舜可以昏禮終之後應韓可以通堯舜之昏以正姓分絶於上應韓之通庶姓理終於下也絶則無繫終則更始斷可識矣壺以嘏書示朝賢光祿大夫荀崧答卞云如嘏所執苟在限内雖逺不可苟在限外不逺可通也吾無以異之王伯輿鄭𤣥髙雋弟子也為子稚賓取王處道女也當得禮意於時清談盡無譏議今難者雖苦竟不能折其理春秋不伐有辭謂嘏不應見責庾蔚之謂嘏據王者必有始祖始祖為正姓共始祖之後則百代不得通昏故魯娶於吳為失禮嘏云堯舜之昏以正姓分絶於上者當謂各立始祖則可通昏也又云應韓之通以庶姓理終於下者當謂帝王逓代始祖既謝屬籍亦廢則為理終於下亦可通昏也嘏雖明始限之外與理終之後皆可通昏而未有親疎之斷昭穆祚𦙍無代不有若周代既遷屬籍已息應韓之昏以其昭穆乆逺今所疑雖在始限之外理終之後而親未逺者當以何斷案禮云六代親屬竭矣故當以此為斷耶若周室已遷無復后稷之始祖則當以别子及始封為判今宗譜之始亦可以為始祖也古人數易姓姓異不足明非親故昏姻必原其姓之所出末代不復易姓異姓則胡越不假復㝷其由出同姓必宜本其由是以各從首易不為同姓之昏且同姓之昏易致小人情巧又益法令滋章嘏在邊地無他昏處居今行古致斯云爾晉書劉頌傳初頌嫁女臨淮陳矯矯本劉氏子與頌近親出養於姑改姓陳氏中正劉友譏之頌曰舜後姚虞陳田本同根系而世皆為昏禮律不禁今與此同義為昏可也友方欲列上為陳騫所止故得不劾頌問明法掾陳黙蔡畿曰鄉里誰最屈二人俱云劉友屈頌作色呵之畿曰友以私議冒犯明府為非然鄊里公論稱屈通典内表不可昏議魏袁准正論曰或曰同姓不相娶何也曰逺别也曰今之人外内相昏禮歟曰中外之親近於同姓同姓且猶不可而况中外之親乎古人以為無疑故不制也今以古之不言因謂之可昏此不知禮者也或云國語云同徳則同姓同姓雖逺男女不相及異徳則異姓異姓雖近男女相及也斯言何故也曰此司空季子明有為而言也文公將求秦以反國不敢逆秦故也季子曰子於子圉道路之人也舅犯曰將奪之國而况妻乎趙衰曰有求於人必先從之此不既了乎容齋續筆姑舅兄弟為昏在禮法不禁而世俗不曉案刑統戸昏律云父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑己之堂姨及再從姨堂外甥女女壻姊妹並不得為昏姻議曰父母姑舅兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是父母大功尊若堂姨雖與父母無服亦是尊屬母之姑堂姑並是母之小功以上尊己之堂姨及再從姨堂外甥女亦謂堂姊妹所生者女壻姊妹於身雖並無服據理不可為昏並為尊卑混亂人倫失序之故然則中表兄弟姊妹正是一等其於昏娶了無所妨予記政和八年知漢陽軍王大夫申明此項勅局看詳以為如表叔娶表姪女從甥女嫁從舅之類甚為明白徽州法司編類續降有全文今州縣官書判至有將姑舅兄弟成昏而斷離之者皆失於不能細讀律令也惟西魏文帝時禁中外及從母兄弟姊妹為昏周武帝又詔不得娶母同姓以為妻妾宣帝詔母族絶服外者聴昏皆偏國之制漫附於此通典外屬無服尊卑不通昏議唐永徽元年御史大夫李乾祐奏言鄭宣道先聘少府監主簿李元義妹為婦即宣道堂姨元義先雖執迷許其姻媾後以情理不合請與罷昏宣道經省陳訴議以為法無此禁判許成親何則堂姨甥雖則無服既稱從母何得為昏又母與堂姨本是大功之服大功之上禮實同重况九月為服親亦至矣子而不子辱以為妻名教所悲人倫是棄且堂姑堂姨内外之族雖别而父黨母黨骨肉之恩是同愛敬本是天性禽獸亦猶知母豈可令母之堂妹降以為妻從母之名將何所寄古人正名逺别後代違道任意恐寖以成俗然本屬無服而尊卑不可為昏非止一條請付羣官詳議永為後法右衛大將軍紀王慎等議父之姨及堂姨母之姨父母之姑舅姊妹堂外甥並外姻無服請不為昏詔可蕙田案昏禮别姓禮之大端也殷以上尚質周道尚文其義著焉異姓主夫不主婦容齋所記足正通典之惑右取異姓周禮地官媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男子三十而娶女子二十而嫁注鄭司農云成名謂子生三月父名之二三者天地相承覆之數也易曰參天兩地而倚數焉呂氏大臨曰成名者案内則子生三月父名之宰書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯藏諸州府其制詳宻如此髙氏愈曰男娶以三十女以二十者陽貴老而隂貴少也禮記曲禮三十曰壯有室内則女子二十而嫁春秋文公十二年榖梁傳子叔姬卒其曰子叔姬貴也公之母姊妹也其一傳曰許嫁以卒之也男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁注禮二十而冠冠而在丈夫之列譙周曰國不可乆無儲貳故天子諸侯十五而冠十五而娶娶必先冠以夫婦之道王教之本不可以童子之道治之禮十五為成童以次成人欲人君之早有繼體故因以為節書稱成王十五而冠著在金縢周禮媒氏曰令男三十而娶女二十而嫁内則云女子十五而笄說曰許嫁也是故男自二十以及三十女自十五以及二十皆得以嫁娶先是則速後是則晚凡人嫁娶或以賢淑或以方類豈但年數而已若以差紀乃為夫婦是廢賢淑方類苟比年數而已禮何為然哉則三十而娶二十而嫁說嫁娶之限葢不得復過此爾故舜年三十無室書稱曰鰥周禮云女子年二十未有嫁仲春之月奔者不禁奔者不待禮聘因媒請嫁而已寗謂禮為夫之姊妹服長殤年十九至十六如此男不必三十而娶女不必二十而嫁明矣此又士大夫之禮蕙田案范註最為明顯可斷葛藤家語魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命形於一謂之性化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而㣲煦然後有見八月生齒然後能食期而生臏然後能行三年顖合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八嵗而齔二八而化女子七月生齒七嵗而齔二七而化一陽一隂奇偶相配然後道合化成性命之端形於此也公曰男子十六精通女子十四而化是則可以生民矣而禮男子三十而有室女子二十而有夫也豈不晚哉孔子曰夫禮言其極也不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自昏矣羣生閉藏乎隂而為化育之始故聖人因時以合偶男女窮天數也孔叢子子張曰女子必漸乎二十而後嫁何也孔子曰十五許嫁而後從夫是陽動而隂應男唱而女隨之義也以為繢組紃織絍者女子之所有事也黼黻文章之義婦人之所有大功也必十五以往漸乎二十然後可以通乎此事通乎此事然後乃能上以孝乎舅姑下以事夫養子也子張問曰禮丈夫三十而室昔者舜三十徴庸而書云有鰥在下曰虞舜何謂也孔子曰夫男子二十而冠冠而後娶古今通義也舜父頑母嚚莫克圖室家之端焉故逮三十而謂之鰥也詩云娶妻如之何必告父母父母在則宜圖昏若已沒則己之娶必告其廟今舜之鰥乃父母之頑嚚也雖堯為天子其如舜何白虎通男三十而娶女二十而嫁陽數奇隂數偶男長女幼者陽舒隂促男三十筋骨堅强任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也故禮内則曰男三十壯有室女二十壯而嫁七嵗之陽也八嵗之隂也七八十五隂陽之數備有相偶之志故禮記曰女子十五許嫁笄而字禮之稱字隂繫於陽所以專一之節也通典男女昏嫁年幾議太古男五十而娶女三十而嫁中古男三十而室女二十而嫁堯舉舜曰有鰥在人間以其二女妻之二十而行之周文王十五生武王地官媒氏掌萬民之判令男三十而娶女二十而嫁有故則二十三而嫁曲禮曰男子三十曰壯有室周末越王勾踐蕃育庶人欲速報吳使男二十而娶女十七而嫁議曰鄭𤣥據周禮春秋榖梁逸禮本命等篇男必三十而娶女必二十乃嫁王肅據孔子家語服經等以為男十六可以娶女十四可以嫁三十二十言其極耳又案家語魯哀公問於孔子曰男子十六而精通女子十四而化育是則可生人矣而禮必三十而室女必二十而嫁豈不晚哉孔子曰夫禮言其極耳不是過也男二十而冠有為人父之端女十五許嫁有適人之道又曰孔子年十九而娶於宋之亓官氏又曰孔子七十三而終伯魚年五十先孔子而卒而經服有為夫姊之長殤據此王鄭之說義並未明今案三十二十而嫁娶者周官云掌萬民之判即衆庶之禮也故下云於是時也奔者不禁服經為夫姊之長殤士大夫之禮也左傳十五而生子國君之禮也且冠有貴賤之異而昏得無尊卑之殊乎則卿士大夫之子十五六之後皆可嫁娶矣蕙田案男女昏年當以孔子家語之言為正王肅宗之是也鄭注太泥通典分大夫庶民亦鑿右昏年周禮地官媒氏仲春之月令㑹男女注仲春隂陽交以成昏禮順天時也於是時也奔者不禁注重天時權許之若無故而不用令者罰之司男女之無夫家者而㑹之鄭氏鍔曰康成一語之謬傷敗風教至今牢不可破周官言奔者不禁若無故而不用命與今律文言若之若同若之為言及也謂不禁男女之奔及無故不用命者俱有罰耳奈何以為重天時權許之耶熊氏經說媒氏若無故之若猶言及也顔師古注漢史以萬人若一郡降曰若豫及也刑統言某罪及某罪皆以若言周禮秋官凡封國若家即若字訓及之例鄭注乃謂不禁奔權許之不照下文若字之義仲春㑹男女之時不以禮合至淫奔而不能禁固父母之罪及有愆期不嫁别無喪故而不遵昏令者亦父母之罪似此二者皆罰之則必無過笄無嫁之女矣讀書雜鈔周官媒氏奔者不禁注云重天時權許之也愚謂此文極分明謂使媒氏㑹合昏嫁苟有奔者而不為之禁止若元無喪故而不用此令者則皆置之罰非謂權許其奔也若讀如子若孫之類史氏曰内則曰聘曰妻奔曰妾六禮不備謂之奔奔者不禁聴其殺禮而成昏也國有凶荒家有喪禍必待備禮男女失時矣此之謂故無故而不備禮其罰也宜葉氏時禮經㑹元嘗讀三山林氏辨以為仲春之月令㑹男女於是時也奔者不禁亂人倫之本開淫恣之門莫此為甚初亦竊以為疑徐而思之詩三百篇首以夫婦為本桃夭周南詩也美其男女以正昏姻以時摽有梅召南詩也美其男女得以及時野麕一詩雖當亂世而被文王之化則猶惡無禮螮蝀一詩雖以亡國而被文公之化則亦恥淫奔豈以成周盛時周公制禮而有奔者不禁事乎善說詩者不以文害辭不以辭害志讀周禮者亦然葢古者昏禮必問名必納采必請期必親迎必得六禮之備而後行誠以昏姻人倫之大嘉禮之重者也春官宗伯以昏禮親成男女地官司徒以隂禮教親則民不怨遂人以樂昏擾氓皆重昏也豈於媒氏而獨不致謹乎毎嵗仲春乃㑹男女而行昏娶之禮此常禮也然昏娶非必盡以仲春行禮葢媒氏以是月而令㑹也此正有女懷春之時也詩人三星在天之詠正是謂耳於是時也苟有故不得行昏禮則有不待禮而行者此謂之奔奔非鑽穴相窺踰牆相從之謂也特以其凶荒札喪而不得備其禮耳有不待親迎而行耳豈若桑中之所謂奔乎故下文曰若無故而不用令者罪之是其無凶荒札喪之變有不待禮而相奔者則有罰也案大司徒以荒政十有二聚萬民七曰眚禮十曰多昏葢古者國有凶荒則殺禮而多昏㑹男女之無夫家者故下文又曰司男女之無夫家者而㑹之是三十而未娶二十而未嫁者皆因其有故而㑹之矣則夫仲春之月苟有故而奔者雖不禁之不亦可乎邵氏寳曰妾之於禮乆矣有媵而妾者有卜而妾者卜而妾聞名而趨不待六禮故謂之奔傳曰疲於奔命盖言速也奔者非必淫淫而奔者謂之淫奔是故女之嫁者有二道焉有聘而嫁者有奔而嫁者慎案天文有織女主貴女須女主賤女貴則嫡也賤女則諸侯之副宫九媵大夫之側室三歸也禮之所謂買妾奔則為妾皆不備禮之謂先王制禮豈不欲六禮皆備而後歸哉禮不下庶人勢也故仲春奔者不禁恐失時也荒年殺禮多昏欲繁育也蕙田案媒氏奔者不禁後人以此疑周禮者多矣諸儒說雖不同皆有精義可從因並存之詩召南野有死麕有女懷春傳懷思也春不暇待秋也箋有貞女思仲春以禮與男㑹不疏傳以秋冬為正昏此云春者此女年二十期已盡暇待秋也此思春思仲春欲其以禮來箋以仲春為昏時故知貞女思仲春之月以禮與男㑹非謂仲春之月始思遣媒嚴氏粲曰春者天地交感萬物孶生之時聖人順天地萬物之情令媒氏以仲春㑹男女故女之懷昏姻者謂之懷春蕙田案毛以秋冬為嫁娶之期鄭以仲春大㑹男女為據二說不同嚴氏發揮鄭說最為有理毛說不可從詩邶風匏有苦葉雝雝鳴雁旭日始旦士如歸妻迨氷未泮傳迨及也泮散也月箋歸妻使之來歸於己謂請期也氷未散正中以前也二月可以昏矣白虎通嫁娶必以春者春天地交通萬物始生隂陽交接之時也詩云士如歸妻迨氷未泮豳風七月春日遲遲采蘩祁祁女心傷悲殆及公子同歸東山倉庚于飛熠燿其羽之子於歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何箋倉庚仲春而鳴嫁娶之候也之子于歸謂始嫁時也得疏鄭以仲春為昏月月令仲春倉庚鳴序云樂男女以及時故知作者以倉庚鳴為嫁娶之候歸士始行之時以仲春新合昏禮也毛以秋冬為昏此義必異於鄭宜以倉庚為興大戴禮夏小正二月綏多士女注綏安也冠子娶婦之時也禮記月令仲春之月元鳥至至之日以太牢祀於髙禖天子親徃注元鳥燕也燕以施生時來巢人堂宇而孚乳娶嫁之象也媒氏之官以為候家語霜降而婦功成嫁娶者行焉冰泮而農桑起昏禮而殺於此男子者任天道而長萬物者也束晳昏姻以時議春秋二百四十年魯女出嫁夫人來歸大夫迎女天王取后自正月至十二月悉不以得時失時為貶褒何限於仲春季秋以相非哉夫春秋舉秋毫之善貶纎介之惡故春狩於郎書時禮也夏城中丘書不時也此人間小事猶書得時失時況昏姻人倫端始禮之大者不譏得時失時不善者耶若昏姻季秋期盡仲春則隐二年冬十月夏之八月未及季秋伯姬歸於紀周之季春夏之正月也桓九年春季姜歸於京師莊二十五年六月夏之四月也已過仲春伯姬歸於紀或出盛時之前或在期盡之後而經無貶文三傳不譏何哉凡詩人之興取義繁廣或舉譬類或稱所見不必皆可以定候也又案桃夭篇叙美昏姻以時盖謂盛壯之時而非日月之時故灼灼其華喻以盛壯非謂嫁娶當用桃夭之月其次章云其葉蓁蓁有蕡其寔之子于歸此豈在仲春之月乎又摽有梅三章注曰夏之向晚迨冰未泮正月以前草蟲喓喓末秋之時或言嫁娶或美男女及時然咏各異矣周禮以仲春㑹男女之無夫家者盖一切相配合之時而非常人之節曲禮曰男女非有行媒不相知名故日月以告君齋戒以告鬼神若常人必在仲春則其日月有常不得前却何復日月以告君乎夫冠昏笄嫁男女之節冠以二十為限而無春秋之期笄以嫁而設不以日月為斷何獨嫁娶當繫於時月乎通典嫁娶時月議案鄭𤣥嫁娶必以仲春之月王肅以為秋冬嫁娶之時也仲春期盡之時矣孫卿云霜降迎女冰泮殺止孔子家語云羣生閉藏於隂而為化育之始故聖人因時以合偶男女窮天數霜降而婦功成嫁娶者行焉冰泮而農桑起昏禮殺於此焉又云冬合男女春班爵位皆謂順也王肅云昏姻始於季秋止於仲春不言春不可以嫁也而馬昭多引春秋以為之証反詩相難錯矣兩家俱失義皆不通通年聴昏盖古正禮也今案士昏禮請期之辭云惟是三族之不虞卜得吉日則可配合昏姻之義在於賢淑四時通用協於詩禮安可以秋冬之節方為好合之期先賢以時月為限恐非至當束氏之說暢於禮矣蕙田案嫁娶時月王鄭不同通典兩非之主束氏之說謂四時通用是也右昏時書益稷予創若時娶於塗山疏哀七年左氏傳云禹㑹諸侯於塗山塗山國名娶於塗山言其所娶之國耳非就妻家見妻也周禮春官大宗伯之職以嘉禮親萬民以昏冠之禮親成男女鄭氏鍔曰昏者禮之本昏以親男女之情也蕙田案昏禮掌於宗伯通上下而言之者也典瑞榖圭以聘女注榖圭亦王使之瑞節鄭氏鍔曰圭之長七寸而為文如榖粟者名曰穀圭葢與榖之文同也昏禮有六其五用雁以其束帛可執故納幣用元纁天子加以穀圭故曰以聘女冬官玉人之事榖圭七寸天子以聘女易氏祓曰榖善也聘女嘉禮之至善者也王氏曰以穀不失性生生而不窮也故天子以納徴鄭氏鍔曰七寸者少陽之數也故天子用七寸蓋男下女之義也王氏昭禹曰典瑞言以和難以聘女此不言和難葢玉人為穀圭以用於天子聘女為主竹書紀年成王三十三年命王世子釗如房逆女房伯祈歸於宗周春秋桓公八年冬祭公來遂逆王后於紀注王使魯主昏故祭公來受命而迎也天子無外故因稱王后王疏既書其來又言遂逆是先來見魯君然後向紀知使魯主昏故祭公來受魯命而往迎也凡昏姻皆賓主敵體相對行禮天子嫁女於諸侯使諸侯為主令與夫家為禮天子聘后於諸侯亦使諸侯為主令與后家為禮嫁女則送女於魯令魯嫁女與人迎后則令魯為主使魯遣使徃逆故祭公受魯命也嫁王女者王姬至魯而後至夫家其王后昏后不來至魯者以王姬至魯待夫家之逆以為禮故須至魯后則王命已成於魯無事故即歸京師於逆稱王后舉其得王之命后禮已成于歸稱季姜申父母之尊言子尊不加於父母從父母之家而將歸於王據父母之家為文故于歸申父母之尊也公羊説天子至庶人皆親迎左氏説王者至尊無敵體之義不親迎鄭康成駁之曰文王親迎於渭濱即天子親迎也天子雖尊其於后則夫婦也夫婦判合禮同一體所謂無敵豈施於此哉禮記哀公問曰冕而親迎不已重乎孔子對曰合二姓之好以繼先聖之後以為天地之主非天子則誰乎是鄭以天子當親迎也此注之意猶以為天子不親迎者以此時祭公迎后傳言禮也劉夏逆后譏卿不行皆不譏王不親行明是王不當親也文王之迎太姒身為公子迎在殷世未可據此以為天子禮也孔子之對哀公自論魯國之法魯周公之後得郊祀上帝故以先聖天地為言耳其意非說天子禮也且鄭康成注禮自以先聖為周公及駁異議則以為天子二三其説自無定矣蕙田案天子不親迎此疏最直捷左氏傳祭公來遂逆王后於紀禮也注天子娶於諸侯使同姓諸侯為之主祭公來受命於魯故曰禮公羊傳祭公者何天子之三公也何以不稱使昏禮不稱主人遂者何生事也大夫無遂事此其言遂何成使乎我也其成使乎我奈何使我為媒可則因用是徃逆矣注昏禮成於五先納采問名納吉納徴請期然後親迎時王者遣祭公來使魯為媒可則因用魯徃迎之不復成禮疾王者不重妃匹逆天下之母女在其國稱女此其稱王后何王者無外其辭成矣榖梁傳其不言使焉何也不正其以宗廟之大事即謀於我故弗與使也注時天子命祭公就魯共卜擇紀女可中后者便逆之不復反命遂紀事之辭也其曰遂逆王后故略之也故曰天子無外王命之則成矣劉氏曰為之節者王當使大夫命魯侯曰予一人不能獨任天地宗廟之事未有内主予一人將卜於紀姜氏委諸伯父伯父其以予敬若先王之禮魯侯稽首對曰天子有命敢有弗恭使者以是言也復於王魯使大夫請於紀侯曰天子使某來命我寡君曰予一人不能獨任天地宗廟之事未有内主予一人將卜於紀姜氏使某也以告主人宜固辭固辭不獲命主人曰某也固辭不獲命敢不敬從先守某公之遺女若而人夫婦所生若而人然後天子命以其吉使上大夫用王后之禮逆以歸也此豈人臣之所當遂於竟外哉胡氏寧曰或曰天子必親迎信乎太上無敵於天下雖諸父昆弟莫不臣適四方諸侯莫敢有其室若屈萬乗之尊而逺行親迎之禮即何無敵於天下之有或曰王后所與共事天地宗廟繼萬世之重者其禮當如之何使同姓諸侯主其辭命卿徃逆公監之父母之國諸卿皆送至京師舍而止然後天子親迎以入其納王后之禮乎家氏鉉翁曰昏禮不稱主人者謂天子雖尊不自為主人也左氏莊十八年虢公晉侯鄭伯使原莊公逆王后於陳陳媯歸於京師不曰王使而曰虢晉鄭使之逆此不稱主人之明證也祭公何以來乎周制天子與諸侯為昏則使同姓諸侯為之主魯以周公之從為王主禮其來舊矣穀乃云不正其以宗廟之大事即謀於我其未然與劉原父謂三公乃師傅之官以為任之重使之輕愚謂周之三公即宰相也天子不行親迎之禮而使其宰徃逆所以重大昏之始其未為失歟蕙田案家氏之言近是九年春紀季姜歸於京師公羊傳其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜注明子尊不加於父母書季姜歸者明魯為媒當有送迎之禮榖梁傳為之中者歸之也注中謂關與昏事胡傳徃逆則稱王后既歸何以書季姜自逆者而言則當尊崇其匹内主六宮之政使妃妾不得以上僣故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈逮下使夫人嬪婦皆得進御於君而無嫉妬之心故從父母所子而稱季姜化天下以婦道也莊公十八年左氏傳虢公晉侯鄭伯使原莊公逆王后於陳陳媯歸於京師實惠后注虢晉朝王鄭伯又以齊執其卿故求王為援皆在周倡義為王定昏陳人敬從得同姓宗國之禮故傳詳其事不書不告陳媯後號惠后宣公六年左氏傳夏定王使子服求后於齊注子服周大夫冬召桓公逆王后於齊襄公十二年左氏傳靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之十四年左氏傳王使劉定公賜齊侯命曰昔伯舅太公右我先王股肱周室師保萬民世胙太師以表東海王室之不壞繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命注將昏於齊故也十五年劉夏逆王后於齊左氏傳官師從單靖公逆王后於齊卿不行非禮也注官師劉夏也天子官師非卿也天子不親昏使上卿逆而公監之故曰卿不行非禮公羊傳劉夏逆王后於齊外逆女不書此何以書過我也蕙田案以上天子昏詩大雅大明天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子朱子詩傳嘉昏禮也大邦莘國也子太姒也大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光箋文王聞太姒之賢則美之曰大邦有子女可以為妃乃求昏傳俔罄也箋既使問名還則卜之又知太姒之賢尊之如天之有女弟問名之後卜而得吉則文王以禮定其吉祥謂納幣也親迎于渭賢女配聖人得其宜故備禮也可傳天子造舟諸侯維舟大夫方舟士特舟造舟然後以顯其光輝箋迎太姒而更為梁者欲其昭著示後世敬昏禮也天子造舟周制也殷時未有等制疏知太姒之賢言大邦之有子女言尊敬之罄作是天之妹然言尊重之甚也卜而得吉行納吉之禮言太姒之有文徳文王則以禮定其卜吉之善祥謂使人納幣則禮成昏定也既納幣於請期之後文王親徃迎之於渭水之傍造其舟以為橋梁敬重若此豈不明其禮之有光輝乎美大其事而造舟若禮先冇之不應特述明是文王所創制也以傳歴言舟之等級故申之云天子造舟周制也殷時未有等制知者若先有等制則下不僣上文王雖欲重昏禮豈得僣天子乎文王敬重昏事始作而用之後世以文王所用故制為天子法耳詩周南闗雎序闗雎后妃之徳也風之始也所以風天下而正夫婦也周南召南正始之道王化之基是以闗雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是闗雎之義也闗闗雎鴆在河之洲窈窕淑女君子好逑召南鵲巢序鵲巢夫人之徳也國君積行累功以致爵位夫人起家而居有之徳如鳲鳩乃可以配焉箋起家而居有之謂嫁于諸侯也夫人有均壹之徳如鳲鳩然而後可配國君維鵲有巢維鳩居之之子于歸百兩御之傳百兩百乗也諸侯之子嫁於諸侯送御皆百乗言疏士昏禮從車二乗其天子與大夫送迎則無文以夫人之嫁自乗家車故鄭箴膏肓引士昏禮曰主人爵弁纁裳從車二乗婦車亦如之有裧則士妻始嫁乗夫家之車也又引此詩乃云此國君之禮夫人自乗其家之車也然宣五年齊高固及子叔姬來反焉何彼穠矣美王姬之車故鄭箴膏肓又云禮雖散亡以詩義論之天子以至大夫皆有留車反馬之禮故泉水云還車言邁箋云還車者嫁時乗來今思乗以歸是其義也知夫人自乗家車也言迓之者夫自以其車迎之送之則其家以車送之故知壻車在百兩迎之中婦車在百兩將之中明矣維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鴆盈之之子于歸百兩成之衛風碩人碩人其頎衣錦褧衣傳夫人徳盛而尊嫁則錦衣加褧襜箋國君夫人翟衣而嫁今衣錦者在塗之所服也碩人敖敖說於農郊箋說當作襚衣服曰襚今俗語然此言莊姜始來更正衣服於衛近郊四牡有驕朱幩鑣鑣翟茀以朝傳驕壯貌幩飾也人君以朱纒鑣扇汗且以為飾鑣鑣盛貌翟翟車也夫人以翟羽飾車茀蔽也箋此言莊姜自近郊既正衣服乗是車馬以入君之朝皆用嫡夫人之正禮大雅韓奕韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光周禮冬官玉人大璋亦如之諸侯以聘女陳氏祥道曰以文考之書繼天子以聘女之後亦如之者亦如穀圭之七寸葢聘女天子以圭諸侯以璋是為降殺之等春秋隠公二年九月紀裂繻來逆女十月伯姬歸于紀左氏傳紀裂繻來逆女卿為君逆也公羊傳紀履緰者何紀大夫也何以不稱使昏禮不稱主人注為養㢘逺恥也然則曷稱稱諸父兄師友宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也注禮有母母當命諸父兄師友稱諸父兄師友以行宋公無母莫使命之辭窮故自命之自命之故不得不稱使然則紀有母乎曰有有則何以不稱母母不通也外逆女不書此何何以書譏何譏爾譏始不親迎也注禮所以必親迎者所以示男先女也於廟者告本也夏后氏逆於庭殷人逆於堂周人逆於戸始不親迎昉於此乎前此矣前此則曷為始乎此託始焉爾曷為託始焉爾春秋之始也女曷為乎或稱女或稱婦或稱夫人女在其國稱女在塗稱婦入國稱夫人伯姬者何内女也其言歸何婦人謂嫁曰歸榖梁傳逆女親者也注親者謂自逆之也使大夫非正也以國氏者謂其來交接於我故君子進之也禮婦人謂嫁曰歸反曰來歸從人者也婦人在家制於父既嫁制於夫夫死從長子婦人不專行必有從也伯姬歸於紀此其如專行之辭何也曰非專行也吾伯姬歸於紀故志之也其不言使何也逆之道微無足道焉爾注言君不親迎而大夫來迎故曰㣲也桓公三年春王正月公㑹齊侯于嬴左氏傳㑹于嬴成昏於齊也注公不由媒介自與齊侯㑹而成昏非禮也秋公子翬如齊逆女九月齊侯送姜氏于讙公㑹齊侯于讙夫人姜氏至自齊左氏傳秋公子翬如齊逆女修先君之好故曰公子齊侯送姜氏非禮也凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公羊傳九月齊侯送姜氏於讙何以書譏何譏爾諸侯越境送女非禮也注禮送女父母不下堂姑姊妹不出門此入國矣何以不稱夫人自我言齊父母之於子雖為隣國夫人猶曰吾姜氏公㑹齊侯於讙夫人姜氏至自齊翬何以不致得見於公矣榖梁傳公子翬如齊逆女逆女親者也使大夫非正也九月齊侯送姜氏於讙禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言送女踰境非禮也注祭門廟門也闕兩觀也在祭門之外疏凡親迎之禮必在廟也公㑹齊侯於讙無譏乎曰為禮也齊侯來也公之逆而㑹之可也夫人姜氏至自齊其不言翬之以來何也公親受之於齊侯也子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何謂已重乎疏引之者以齊侯送女公親受之於禮為可故發冕而親迎之問胡傳娶妻必親迎禮之正也若夫邦君以爵則有尊卑以國則有大小以道途則有逺邇或迎之於其國或迎之於境上或迎之於所館禮之節也魯侯於齊以逺邇言則親之者也而使公子翬徃是不重大昏之禮失其節矣故書古者昏禮必親迎則授受明後世親迎之禮廢於是有父母兄弟越境而送其女者以公子翬徃逆則既輕矣為齊侯來乃逆而㑹之於讙是公之行其重在齊侯而不在姜氏豈禮也哉冬齊侯使其弟年來聘左氏傳冬齊仲年來聘致夫人也注古者女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故傳以致夫人釋之莊公二十二年冬公如齊納幣公羊傳納幣不書此何以書譏何譏爾親納幣非禮也注納幣即納徴禮言納徴春秋言納幣者春秋質也凡昏皆用雁取其知時候惟納徴用元纁束帛儷皮榖梁傳納幣大夫之事也禮有納采注采擇女之徳性其禮用雁為贄有問名注問女名而卜之知吉凶也其禮如納采有納徴注徴成也納幣以成昏有告期注告迎期四者備而後娶禮也疏士昏禮有納采問名納吉納徴請期親迎六禮此傳不云納吉者直舉四者足以譏公故略納吉不言之或以為諸侯與士禮異者非也公之親納幣非禮也故譏之二十四年夏公如齊逆女公羊傳何以書親迎禮也榖梁傳親迎恒事也不志此其志何也不正其親迎於齊也秋公至自齊榖梁傳迎者行見諸舍見諸先至非正也八月丁丑夫人姜氏入公羊傳其言入何難也其言日何難也其言奈何夫人不僂不可使入與公有所約然後入注僂疾也夫人稽留不肯疾順公不可使即入公至後與公約定八月丁丑乃入故為難辭也榖梁傳入者内弗受也日入惡入者也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦舍於前其義不可受也戊寅大夫宗婦覿用幣禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔雁雉腒婦人之贄棗栗腶脩用幣非禮也大夫國體也而行婦道惡之故謹而日之也二十五年伯姬歸于杞文公二年冬公子遂如齊納幣左氏傳襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也注謂諒闇既終嘉好之事通於外内於是遣卿修好舅甥之國修禮以昏姻也元妃嫡夫人奉粢盛供祭祀公羊傳納幣不書此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶三年之内不圖昏注僖公以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣此四者皆在三年之内故云爾吉禘於莊公譏然則曷為不於祭焉譏三年之恩疾矣非虚加之也以人心為皆有之以人心為皆有之則曷為獨於娶焉譏娶者大吉也非常吉也其為吉者主於己以為有人心焉者則宜於此焉變矣四年夏逆婦姜于齊注稱婦有姑之辭左氏傳逆婦姜於齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩云畏天之威于時保之敬主之謂也公羊傳其謂之逆婦姜於齊何略之也髙子曰娶乎大夫者略之也榖梁傳其曰婦姜為其禮成乎齊也其逆者誰也親逆而成婦或者公與何其速婦之也曰公也其不言公何也非成禮於齊也曰婦有姑之辭也其不言氏何也貶之也何為貶之也夫人與有貶也注夫人能以禮自防則夫婦之禮不成於齊故譏公而夫人與焉宣公元年公子遂如齊逆女三月遂以夫人婦姜至自齊公羊傳夫人何以不稱姜氏貶曷為貶譏喪娶也喪娶者公也則曷為貶夫人夫人與公一體也其稱婦何有姑之辭也注有姑當以婦禮至無姑當以夫人禮至故分别言之榖梁傳其不言氏喪未畢故略之也其曰婦緣姑言之之辭也遂之挈繇上致之也疏昏禮遲速繇於夫家陽倡隂和固是其理而責夫人者一禮不備貞女不行夫人姜氏若其不行公得無喪娶之譏夫人無苟從之咎故責之成公八年夏宋公使公孫夀來納幣注昏聘不使卿今華元將命故特書之宋公無主昏者自命之故稱使也左氏傳宋華元來聘聘共姬也注聘不應使卿故傳發其事而已夏宋公使公孫夀來納幣禮也注納幣應使卿胡傳納幣不書此何以書公孫夀卿也納幣使卿非禮也禮不可略亦不可過惟其稱而已矣略則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女皆致其厚者也而不知越禮踰制豈所以重大昏之禮哉經悉書之為後法也九年二月伯姬歸於宋注宋不使卿逆非禮夏季孫行父如宋致女注女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好公羊傳未有言致女者此其言致女何録伯姬也注古者婦人三月而後廟見稱婦擇日而祭於禰成婦之義也父母使大夫操禮而致之必三月者取一時足以别貞信貞信著然後成婦禮書者與上納幣同義所以彰其潔且為父母安榮之言女者謙不敢自成禮婦人未廟見而死歸葬于女氏之黨榖梁傳致者不致者也婦人在家制於父既嫁制於夫如宋致女是以我盡之也注刺已嫁而猶以父制盡之不正故不與内稱也胡傳致女者何女既嫁三月而廟見則成婦矣而後父母使人安之故謂之致也常事耳何以書致女使卿非禮也十四年秋叔孫僑如如齊逆女注成公逆夫人最為得禮而經無納幣者文闕絶也左氏傳秋宣伯如齊逆女稱族尊君命也九月僑如以夫人婦姜氏至自齊左氏傳舍族尊夫人也注舍族謂不稱叔孫榖梁傳大夫不以夫人以夫人非正也刺不親迎也僑如之挈由上致之也昭公二年左氏傳夏四月韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊謂陳無宇非卿執諸中都少姜為請曰送從逆班畏大國也猶有所易是以亂作三年左氏傳齊侯使晏嬰請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦不腆先君之適以備内官焜燿寡人之望則又無禄早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於太公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之内主豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之五年左氏傳晉韓宣子如楚送女叔向為介及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他薳啓疆曰晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何楚子終厚禮之禮記祭統國君娶夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也哀公問孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰人道政為大公曰敢問為政如之何對曰夫婦别父子親君臣嚴三者正則庶物從之矣公曰願聞所以行三言之道對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本歟疏禮以敬為主若敬之至極天子諸侯之大昏又為大也國君雖尊服冕服以自迎欲親此婦也公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎疏冕則祭服也天子則衮冕諸侯以下各用助祭之服故士昏禮主人爵弁服是也春秋公羊傳説天子至庶人皆親迎左氏謂天子至尊無敵無親迎之禮諸侯有故若妃疾病則使上卿迎上公臨之許氏案髙祖時皇太子納叔孫通制禮以為天子無親迎𤣥駁之云太姒之家在渭之涘文王親迎於渭引此記為証又詩說云文王親迎之時猶為西伯鄭駁未定此以答哀公所問故解先聖為周公又魯得郊天故云天地社稷之主若異義駁所云則以先聖及天地據天子公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不合萬物不生大昏萬世之嗣也君何謂已重焉孔子遂言曰内以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮其政之本歟陳氏禮書昏有六禮納采問名納吉納徴請期親迎而納采者擇其族類問名者詢其誰氏問名然後卜之故納吉納吉則其禮成矣故納徴然則納采問名同一使納吉納徴請期皆異使納采問名納吉請期以禽贄納徴以圭璋皮帛由徴以前慮其或不受也故皆言納既納徴則聴命而已故於期言請焉曲禮曰日月以告君齋戒以告鬼神春秋之時楚公子娶於鄭曰告於莊共之廟而來鄭公子忽先配後祖君子譏之故士昏禮既納采問名然後歸卜於禰既卜然後納吉而卜常在告廟之日禮記曰卜郊受命於祖廟作龜於禰宫尊祖親考之義也鄭氏謂受命退乃卜卜昏之禮盖亦如之然則告廟始於納采問名之後矣異義云戴禮説天子親迎左氏天子不親迎上卿迎之諸侯亦不親迎使上大夫迎之鄭駁異義云文王娶太姒親迎於渭又孔子答哀公合二姓之好以繼先聖之後以為天地宗廟社稷之主冕而親迎何謂已重乎此天子諸侯有親迎也然考之於經著之詩刺不親迎而充耳以黄者人君之飾又文王迎於渭韓侯迎於蹶而春秋紀裂繻來逆女公羊曰譏不親迎也公子翬如齊逆女榖梁曰逆女親者也使大夫非正也莊公如齊逆女榖梁曰親迎常事也不志此其志何不正其親迎於齊也凡此皆言諸侯親迎之禮若天子則不然趙氏曰王者之尊海内莫敵故嫁女則使諸侯主之適諸侯諸侯莫敢有其室若屈萬乗之尊而行親迎之禮則何莫敢敵之有乎夫子對哀公曰為天地宗廟社稷之主以魯有郊祀天地之禮故云爾非為天子發也左氏謂諸侯不親迎公羊謂天子亦親迎其說不能全與經合當從趙氏之論為正蕙田案以上諸侯昏書堯典帝曰咨四岳朕在位七十載汝能庸命巽朕位岳曰否徳忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉蔡傳吳氏曰二女堯二女娥皇女英也此堯言其將試舜之意也莊子所謂二女事之以觀其内是也葢夫婦之間隠㣲之際正始之道所繫尤重故觀人者於此尤切也釐理降下也媯汭舜所居之地嬪婦也史言堯治裝下嫁二女於媯水之北使為舜婦於虞氏之家也欽哉堯戒二女之辭即禮所謂徃之女家必敬必戒者况以天子之女嫁於匹夫尤不可不深戒之也黄氏度曰降下也貴賤之勢可以言降也釐降則婦從夫理之不可易者也後世直改為下嫁孟子舜尚見帝尚猶上也雖貴而上之夫婦後先之義也後世訓其義為配皆失理易泰卦六五帝乙歸妹以祉元吉程傳史謂湯為天乙厥後有帝祖乙亦賢王也後又有帝乙多士曰自成湯至於帝乙㒺不明徳恤祀稱帝乙者未知孰是以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為禮法使降其尊貴以順從其夫也吳氏澄曰案京房傳載湯歸妹之辭曰無以天子之尊而乘諸侯無以天子之富而驕諸侯隂之從陽女之順夫天地之義也往事爾夫必以禮義其辭雖善要是後世假托為之或乃因是遂指帝乙為湯而謂非受辛之父者非矣詩序何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之徳也箋下王后一等謂車乘厭翟勒而繢總服則䄖翟何彼穠矣唐棣之華曷不肅雝王姬之車何彼穠矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫春秋莊公元年夏單伯送王姬注王將嫁女於齊既命魯為主故單伯送女不稱使也天子嫁女於諸侯使同姓諸侯主之不親昏尊卑不敵公羊傳單伯者何吾大夫之命乎天子者也何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之注大夫與諸侯同姓者不自為主者尊卑不敵其行昏姻之禮則傷君臣之義行君臣之禮則廢昏姻之好故必使同姓有血脈之屬宜為父道與所適敵體者主之禮尊者嫁女於卑者必待風㫖為卑者不敢先求亦不可斥與之者申陽倡隂和之道天子嫁女於諸侯備姪娣如諸侯之禮義不可以天子之尊絶人繼嗣之路我主書者惡天子也禮齊衰不接弁冕仇讎不交昏姻榖梁傳其不言如何也其義不可受於京師也其義不可受於京師何也曰躬君弑於齊使之主昏姻與齊為禮其義固不可受也髙氏閌曰王姬下嫁禮雖不傳而以義推之諸侯固當躬至京師天子置館命同姓之尊者行賓主之禮然後逆歸本國此亦男下女之義也今齊既不朝王又不親迎而魯之單伯反往逆之莊王不以魯之先君戕於齊命之主昏魯有大喪不因而辭之陷王於不義故不書如京師而直書逆王姬猶曰魯自逆耳秋築王姬之館於外左氏傳築王姬之館於外為外禮也注喪制未闋故異其禮得禮之變公羊傳何以書譏何譏爾築之禮也於外非禮也於外何以非禮築於外非禮也其築之何以禮主王姬者必為之改築主王姬者則曷為必為之改築於路寢則不可小寢則嫌於羣公子之舍則以卑矣其道必為之改築者也榖梁傳築禮也於外非禮也築之為禮何也主王姬者必自公門出於廟則已尊於寢則已卑為之築節矣築之外變之正也築之外變之為正何也仇讎之人非所以接昏姻也衰麻非所以接弁冕也注親迎服祭服者重昏姻也公時有桓之喪其不言齊侯之來逆何也不使齊侯得與吾為禮也冬王姬歸于齊十有一年冬王姬歸於齊注魯主昏不書齊侯逆不見公公羊傳何以書過我也胡傳案周制王姬嫁於諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁於齊侯亦執婦道成肅雝之徳其詩曰曷不肅雝王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈于婦逆隂陽之位故王陽條奏世務指此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦原其意雖欲尊君抑臣為治而使人倫悖於上風俗壞於下又豈所以為治也其流至此然後知春秋書王姬侯女同辭而不異垂訓之義大矣汪氏克寛曰後世公主出嫁無王姬執婦道之風莫不庸奴其夫雖尚公主者極有才名而勢屈於崇貴吞悲茹氣無所逃訴故晉人有無事取官府之說至六朝其失尤甚江斆尚臨海公主讓昏表有云制勒甚於僕隷則其敝可知矣春秋書王姬之歸與詩相表裏實萬世之法也蕙田案以上王姬下嫁右天子諸侯昏王姬下嫁附春秋隠公八年左氏傳四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育注鍼子陳大夫禮逆婦必先告祖廟而後行故楚公子圍稱告荘共之廟鄭忽先逆婦而後告廟故曰先配而後祖而疏先配後祖多有異説賈逵以配為成夫婦也禮齊未配三月廟見然後配案昏禮親迎之夜袵席相連是士禮不待三月也禹娶塗山四日即去而有唘生焉亦不三月乃配是賈之謬也鄭衆以配為同牢食也先食而後祭祖無敬神之心故曰誣其祖也案昏禮婦既入門即設同牢之饌其間無祭祀之事先祭乃食禮無此文是鄭之妄也鄭𤣥以祖為祓道之祭也先為配匹而後祖道言未去而行配案傳既言入于鄭乃云先配而後祖寧是未去之事也若未去先配則鍼子在陳譏之何須云送女也此三說皆滯故杜引楚公子圍告廟之事言鄭忽先逆婦而後告廟故曰先配而後祖此時忽父見在計告廟以否當是莊公之事而譏忽者楚公子圍亦人臣矣而自布几筵告於莊共之廟不言禀君之命知逆者雖受父命當自告廟且忽先為配匹而後告祖見其告祖方始譏之知忽自告祖也或可鄭伯為忽娶妻先逆而後告廟鍼子見而譏之公子圍告廟者專權自由耳非正也莊公二十七年莒慶來逆叔姬公羊傳莒慶者何莒大夫也莒無大夫此何以書譏何譏爾大夫越竟逆女非禮也注禮大夫任重為越竞逆女於政事有所捐曠故竟内乃得親逆所以屈私赴公也榖梁傳諸侯之嫁子於大夫主大夫以與之來者接内也不正其接内故不與夫婦之稱也注董仲舒曰大夫無束脩之餽無諸侯之交越竟逆女紀罪也宣公五年秋九月齊高固來逆子叔姬胡傳案左氏公如齊高固使齊侯止公請叔姬焉書夏公至自齊秋齊高固來逆子叔姬罪宣公焉其曰來者以公自為之主稱子者或謂别於先公之女也諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣夫以鄭國𥚹小楚公子圍之貴驕强大來娶於鄭子産辭而卻之使館於外欲野賜之幾不得撫有其室事見左傳昭公元年宣公以魯國周公之後逼於高固請昏其女强委禽焉而不能止惟不知以禮為守身之幹是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄說不近於禮奚足逺恥辱哉冬齊髙固及子叔姬來左氏傳冬來反馬也公羊傳何言乎髙固之來言叔姬之來而不言髙固之來則不可子公羊子曰其諸為其雙雙而俱至者與胡傳左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則高固親來非禮也又禮女子有行逺父母者嵗一歸寧今見逆逾時未易嵗也而叔姬亟來亦非禮也故書及書來以著齊罪也凡昏姻常事不書而書此者則以為非常為後世戒也孔氏曰天子諸侯嫁女留其乗車馬固反馬則大夫亦留其車妻之道也反馬壻之義也婦至質明見於舅姑若舅姑既沒則婦入三月乃祭因以三月為反馬之節舅姑存者亦當以三月反馬也法當遣使不合親行故經傳具見其事以示譏右大夫昏五禮通考卷一百五十一
