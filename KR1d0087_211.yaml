body:
  text: 五禮通考卷二百一刑部尚書秦蕙田撰嘉禮七十四體國經野蕙田案周禮六官之職皆冠以辨方正位體國經野而夏官職方氏掌天下之圖以掌天下之地著其疆域山藪川浸人民畜牧之事最詳朱子儀禮經傳王朝禮有制國建侯二篇蓋亦為國以禮之一巨典也苐古今沿革既多載籍浩衍虞書九共先儒以為九邱其篇軼矣今虞書禹貢周禮及史記河渠書班史地理志而下列代史志以及桑氏欽水經杜氏佑通典元和郡國志寰宇記鄭氏穛通志馬氏端臨通考王氏應麟通釋下至各省府州縣志書並遊覽記載之語不可勝數其言猶河漢而無極也近代為專家之學者有胡氏渭閻氏若璩黃氏儀研精地理於經皆有著述其功賢於曩哲今為舉其要領自虞十二州夏禹貢商九有周職方春秋三傳凡地之見於經者集諸賢之説略為箋疏以通古今之郵而禹貢以山川定疆界為萬世不可易之書其中如九河三江九江黑水等論議紛如有關經義而導河一節尤為列代治河之祖特詳著之秦漢而下史志無缺苐摘其統要以見於後云書舜典肇十有二州封十有二山濬川傳禹治水之後舜分冀州為幽州并州分青州為營州始置十二州封大也每州之名山殊大者以為其州之鎮有流川則深之使通利疏禹貢治水之時猶為九州今始為十二州知禹治水之後也以境界太逺始别置之周禮職方氏九州之名有幽并無徐梁幽并山川於禹貢皆冀州之域知分冀州之域為之也爾雅釋地燕曰幽州齊曰營州齊即青州之地知分青州為之於此居攝之時始置十有二州蓋終舜之世常然宣三年左傳云昔夏之方有德也貢金九牧則禹登王位還置九州其名蓋如禹貢朱子曰舜攝帝位命禹平水土以冀青地廣分冀東恆山之地為并州恆山在今直𨽻真定府定州曲陽縣西北百四十里并州直𨽻真定保定府山西太原大同府境是又東北醫無閭之地為幽州醫無閭山在盛京廣寧縣西五里幽州今直𨽻順天永平府及遼東之廣寧又分青州東北遼東之地為營州遼東地在遼水東也營州即遼東定遼等衛胡氏渭曰舜典肇十有二州傳禹治水之後舜分冀州為幽州并州分青州為營州始置十二州正義云以境界太逺始别置之馬融曰禹平水土置九州舜以冀州之北廣大分置并州燕齊遼逺分燕置幽州分齊為營州於是為十二州見史記集解鄭康成曰舜以青州越海分齊為營冀州南北太逺分衛為并燕以北為幽金氏通鑑前編曰九州之來舊矣而冀為其北自陶唐都冀其聲名文教自冀四達冀之北土所及固廣矣及水土既平人民加聚於是分冀州自衛水以北為并州醫無閭之地為幽州碣石以東接青州之北為營州是為十二州焉考詩書傳記所紀其後復為九州蓋九州為正而幽并營不過分統青冀之故地是以殷之制分并為幽合青為營分梁以入于雍荆周之制合梁為雍合徐為青而并與幽冀復三焉略見爾雅詳見職方氏所記職方幽州其山鎮曰醫無閭其川河泲并州其山鎮曰恆山其川呼池嘔夷然則營州其山碣石其川遼水與渭案呼池即衛水嘔夷即恆水也康成云分衛為并殊不分明通典指為衛水以北而金氏因之復舉恆山呼池以證尤確若以為康叔所封之衛則并冀當以衡漳為界而冀域北盡於平陽無是理也又曰日知録曰幽并營三州在禹貢九州之外先儒謂以冀青二州地廣而分之殆非也幽則今涿易以北至塞外之地并則今欣代以北至塞外之地營則今遼東大寧之地其山川皆不載之禹貢故靡得而詳然而益稷之書謂弼成五服至于五千則冀方之北不應僅數百里而止遼史地理志言幽州在渤碣之間并州北有代朔營州東暨遼海營衛志言冀州以南歷洪水之變夏后始制城郭其人土著而居并營以北徑風多寒隨陽遷徙嵗無寧居曠土萬里或其説之有所本也劉三吾書傳謂因髙山大川以為限之意蓋幽并營三州皆分冀州之地今亦未有所考渭嘗與閻百詩論及此事百詩曰寧人著書言幽在今桑乾河以北至山後諸州并在今石嶺關以北至豐勝二州營在今遼東大寧並有塞外之地舜蓋至此始有先儒謂以冀青地廣而分者殆非豫時同客太原面質之曰此不過從肇者始也臆度耳其實周禮職方氏并州其澤藪曰昭余祁在今介休縣東北二十二里俗名塢城泊吾與君所共遊歷者非石嶺關以南乎且亦知先儒之釋經苦心處乎知分冀東恆山之地為并州則以周并州鎮曰恆山故知分冀東北醫無間之地為幽州則以周幽州鎮曰醫無閭故又知分青東北遼東等處為營州則以爾雅釋地齊曰營州故也不然微周禮爾雅二書欲于禹九州外枚舉舜三州之名且不可得況疆理所至哉鄭康成云舜以青州越海分置營州晉地理志同然以青之分而為營也不獨以地廣實以吏民艱于涉海故别置一州以避其險漢光武以遼東等郡屬青州後還幽州與明嘉靖十三年改遼陽附順天鄉試者略同蓋古今情形亦不相逺云今案恆山呼池嘔夷皆并之山川而並載于禹貢安得謂其地非冀域自此以北禹功所未及故醫無閭不書非以其山在外國而略之也經紀揚州止于震澤豈可以會稽之山不載禹貢而謂浙江以南非揚域耶幽為冀之東北境也明甚後漢書及杜氏通典皆以嵎夷地在漢樂浪元菟郡界而青州首書嵎夷既略則朝鮮句麗諸國禹時實皆在青域況遼東渡海僅數百里乎堯遭洪水天下分絶謂冀之東北前閉而後通前距而後服於理亦無礙但不可謂三州之地從古所未有至舜而始開耳且禹弼成五服至于五千自堯都以北當有二千五百里之地三州非其固有冀北要荒二服將何所容哉先儒釋經未必皆是苟有確據不妨改從若此之類則又不如仍舊之為安矣蕙田案漢地理志云黃帝旁行天下方制萬里畫野分州得百里之國萬區帝王世紀云冀兖青徐荆揚豫梁雍顓帝所建帝嚳受焉通典宗其説亦謂顓帝置九州其説不見於經然祭法云共工氏之霸九州也其子曰后土能平九州則九州之名由來已久然刪書斷自唐虞故今以舜十二州為首至淮南墜形訓所稱天地之間九州東南神州曰農土正南次州曰沃土西土戎州曰滔土正西弇州曰并土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隱土正東陽州曰申土周禮疏亦云自神農以上有大九州桂州迎州神州之等至黃帝以來德不及逺惟於神州之內分為九州此與騶衍説中國名為赤縣神州赤縣神州內自有九州中國外如赤縣神州者九有裨海環之一區中為一州如此者九乃有大瀛海環其外之説相似皆儒者所弗道今西洋人所繪坤輿全圖凖南北極黃赤道度數渾圓之內海外之地正與淮南騶衍之義同莊子云存而不論可謂善於持論者矣地理通釋帝堯都世紀帝堯始封於唐今中山唐縣是也堯山在焉郡縣志定州唐縣古唐侯國堯初封於此今定州北有古唐城唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名亘山北登堯山南望都山故名縣曰望都地理志堯山在唐縣南張晏以堯山在唐東北望都北史記堯作遊成陽正義濮州雷澤縣是後又徙晉陽今太原縣是也於周在并州之域通志今平定軍有古晉陽城是其地及為天子都平陽於詩風為唐國武王子叔虞封焉季札聞唐之歌曰思深哉其有陶唐氏之遺民乎括地志今晉州所治平陽故城是也輿地廣記晉州臨汾縣本平陽隋改曰平陽河水一名晉水韋昭云陶唐皆國名或堯先居陶後居唐陶今廣濟軍定陶縣唐今中山府唐縣猶有唐城存焉或曰唐城在絳州翼城西二里括地志定州唐縣堯後所封漢書音義唐今河東永安去晉四百里即彘也詩譜曰唐帝堯舊都之地今曰太原晉陽堯始居此後遷河東平陽書惟彼陶唐有此冀方正義堯都平陽舜都蒲坂禹都安邑相去不盈二百皆在冀州通志曰自開闢以來皆河南建都雖黃帝之都堯舜禹之都於今皆為河北在昔皆為河南大河故道自碣石入海碣石今平州也所以幽薊之邦冀并之壤皆為河南地周定王五年以後河道堙塞漸移南流至漢元光三年徙從頓邱入渤海渤海今濵滄間也帝舜都史記舜耕歷山書帝初于歷山往于田郡國志河東蒲坂有雷首山注縣南二十里有歷山舜所耕處括地志蒲州河中府河東縣雷首山亦名歷山南有舜井又越州餘姚縣有歷山舜井濮州雷澤縣有歷山舜井又有姚墟云生舜處也媯州外城中有舜井城北有歷山皆云舜所耕處未詳也南豐曽氏曰鄭康成釋歷山在河東世之好事者因媯水出於雷首遷就附益謂歷山為雷首之别號不考其實矣孟子謂舜東夷之人則陶漁在濟隂作什器在魯東門就時在衛耕歷山在齊皆東方之地合於孟子圖記謂齊之南山為歷山舜所耕處故其城名歷城今濟南府漁雷澤括地志雷夏澤在濮州雷澤縣郭外西北鄭康成云在濟隂地理志禹貢雷澤在濟隂成陽縣西北墨子曰舜漁于濩澤通典澤州陽城縣有濩澤水陶河濵皇甫謐曰濟隂定陶西南陶邱亭是也今廣濟軍括地志陶城在蒲州河東縣北三十里即舜所都也南去歷山不逺何必定陶作什器於夀邱夀邱在魯東門之北今在兖州曲阜縣東北六里附寶生黃帝于夀邱就時於負夏孟子云遷於負夏鄭康成云衛地堯典釐降二女于媯汭媯水名在今河中府河東縣出厯山入河爾雅水北曰汭括地志媯州有媯水源出城中耆舊傳曰即舜媯汭水經注世本曰舜居饒內在漢中西城或言媯墟在西北舜所居也通典金州西城縣有媯墟帝王世紀謂之姚墟世本曰饒汭古文尚書周語嬴內咅媯汭括地志又云姚墟在濮州雷澤縣東十三里會稽舊記云上虞三十里有姚邱即舜所生也嬪于虞括地志故虞城在陜州河北縣東北五十里虞山之上今平陸縣皇甫謐曰堯以二女妻舜封於虞今河東大陽山西虞城是也舜居虞地以虞為氏郡國志大陽有吳山上有虞城括地志宋州虞城縣舜後所封外紀本處虞之媯汭號曰有虞氏世紀舜所營都或言蒲坂即河東縣今河中府南二里河東縣界蒲坂故城是也或言平陽今晉州城是也或言潘今上谷媯州城是也外紀都蒲坂右虞十二州書禹貢禹敷土隨山刋木奠髙山大川傳洪水泛濫禹分布治九州之土隨行山林斬木通道髙山五嶽大川四瀆定其差秩祀禮所視蔡氏集傳敷分也分别土地以為九州也奠定也定髙山大川以别州境也冀州錐指傳曰堯所都也正義曰史傳皆云堯都平陽五子之歌云惟彼陶唐有此冀方是冀州堯所都也又曰兖州云濟河自東河以東也豫州云荆河自南河以南也雍州云西河自西河以西也明東河之西西河之東南河之北是冀州之境也地理今釋冀州今山西之太原平陽汾州潞安大同五府澤遼沁三州直𨽻之順天永平保定廣平順德宣化六府及真定河間二府西北境大名府濬縣西境盛京之錦州府河南之懷慶衛輝彰德三府其北直抵塞外隂山下之北東訖於大遼水也胡氏渭曰堯都平陽今山西平陽府臨汾縣西南平陽故城是也冀西距河河自今塞外東受降城南而東至山西大同府廢東勝州界折而南經平虜衛及太原府之河曲保德興縣汾州府之臨縣永寧寧鄉石樓平陽府之永和大寧吉州鄉寧河津榮河臨晉蒲州是為西河與雍分界冀南亦距河河自蒲州過雷首山折而東經芮城平陸垣曲及河南懷慶府之濟源孟縣溫縣武陟衛輝府之獲嘉新鄉汲縣是為南河與豫分界冀東亦以河與兖分界自周定王五年河徙之後禹河故道堙廢而冀兖之界難分今案漢志魏郡鄴縣下云故大河在東句北入海故大河者即王橫所云禹之行河水本隨西山下東北去者也河自汲縣南東北流至黎陽縣西南出大伾上陽三山之間大伾山一名黎陽山今在濬縣東南二里即賈讓所謂東山也枉人山一名善化山在縣西北二十五里俗名上陽三山即賈讓所謂西山也濬縣舊志云在縣西十里蓋禹迹也河徙由縣東故稱此為西河自此而北歷蕩隂安陽鄴縣斥邱東接內黃魏縣至列人斥章之境左會衡漳經所謂北過降水也應劭曰斥章縣漳水出治北入河杜佑曰漳水橫流至肥鄉縣界入河斥章今曲周縣地肥鄉漢列人縣地蓋漳水由二縣境注於河也河自此東北入海及定王時南徙則衡漳東出循河故道而下至東光縣西與大河合王莽時河益徙而南漳水遂專達於海蓋禹河之故道也以今輿地言之濬縣屬直𨽻大名府湯隂安陽臨漳並屬河南彰德府成安肥鄉曲周並屬直隸廣平府平鄉廣宗巨鹿並屬順德府南宫新河冀州並屬真定府束鹿屬保定府深州衡水武邑武強並屬真定府阜城獻縣交河滄州青縣靜海天津並屬河間府皆禹時冀東瀕河之地中流與兖分界王制謂之東河北播為九河其經流爾雅謂之徒駭又同為逆河東至碣石入海後世謂之渤海者也蕙田案冀之東西南皆距河與雍豫兖分界處胡氏考之詳矣若冀之東北與青分界及冀之北境則傳記俱無可考胡氏謂遼東為青域遼西為冀域而北當至隂山近是既載壺口治梁及岐錐指傳曰壺口在冀州梁岐在雍州從東循山治水而西正義曰漢書地理志云壺口在河東北屈縣東南梁山在左馮翊夏陽縣西北岐山在右扶風美陽縣西北然則壺口西至梁山梁山西至岐山從東而向西言之也地理今釋壺口今山西平陽府吉州西南七十里有壺口山黃河之水注其中如壺然案孔傳梁岐在雍州今陜西西安府韓城縣西北九十里之梁山鳯翔府岐山縣東北四十里之岐山也蔡傳疑雍州之山不當載於冀州指今山西汾州府永寧州東北之吕梁山一名骨脊山者為梁山汾州府孝義縣西之狐岐山一名薛頡山者為岐山然二山去河甚逺不得謂河水所經曽􅌈云壺口梁岐一役也其施功皆同時不可分言於二州故并言於冀州得此可釋蔡氏之疑胡氏渭曰吉州漢北屈韓城則夏陽岐山則美陽也尸子吕氏春秋淮南子皆言龍門未闢吕梁未鑿河出孟門之上龍門之上口為孟門在今吉州西西直陜西延安府之宜川縣其下口即今河津縣壺口山盡處近世亦謂之龍門者西與韓城之龍門相對上口至下口約一百六十餘里三子所稱吕梁山即禹貢之梁山也春秋成公五年梁山崩公羊曰梁山河上山穀梁曰壅遏河三日不流水經河水南至龍門口注云昔大禹導河積石疏決梁山謂斯處也即經所謂龍門矣冀州有三壺口一在吉州西南禹貢之壺口也一為汾隂縣西南之平山平水所出亦名壺口山又名姑射山酈道元謬以為尚書之壺口一在長治縣東南左傳哀四年齊國夏伐晉取壺口杜注潞縣東有壺口關潞縣即今潞城縣關以山為名此二山皆非禹貢之壺口也雍州有二梁山一在韓城縣西北詩所云奕奕梁山也一在乾州西北西南接岐山縣界即孟子云太王居邠踰梁山者非禹貢之梁山也元和志誤以此山為治梁之梁壺口山漢志在北屈縣東南括地志云在吉昌縣西南五十里吉昌今吉州也後魏延興四年於此置定陽郡及縣元和志云北屈故縣在定陽郡二十里正今州直北之地山當在其西南漢志云東南誤也梁山漢志在夏陽縣西北而諸志所言皆不同蓋是山綿亘百里自今郃陽縣西北抵韓城縣西北之麻線嶺皆梁山然向南則益西而去河愈逺唯韓城西北之山首枕西河北連龍門當以是為禹鑿之迹耳蕙田案胡氏考梁岐在雍州較蔡傳為優觀承案治梁及岐仍以冀州之吕梁狐岐二山為是方序冀州不應越冀而攙入雍州之山也夫治水施功當自下流始則宜首事於兖因尊帝都故先冀而下文即次以兖可徵何得既尊帝都倐爾突入雍州上遊吾恐下流未泄而上遊之水忽來則帝都不將反為其壑乎則此亦統言壺口既載而吕梁狐岐諸山亦經略而整理之不必専以治河為言也即專主治河亦不必專以河岸之山為事也即如其説梁山枕河而岐山在鳯翔則去河亦已逺矣何獨吕梁狐岐宜以逺河為嫌耶既修太原至於嶽陽錐指傳曰髙平曰太原今以為郡名嶽太嶽在太原西南山南曰陽正義曰太原原之大者漢書以為郡名即晉陽縣是也下文導山云壺口雷首至於太嶽知此嶽即太嶽也地理志河東彘縣有霍太山周禮職方氏冀州其山鎮曰霍山即此太嶽是也地理今釋太原即晉陽縣也今山西太原縣是東北去太原府治四十里蔡傳以為今河東路太原府者亦統同言之也嶽陽太嶽一名霍太山今為中鎮在山西平陽府霍州東三十里山周二百餘里南接嶽陽趙城二縣北接靈石縣東接沁源縣界胡氏渭曰嶽陽就附近山南者言之則為今嶽陽趙城二縣蔡氏主嶽陽一縣固非然經之所指亦不止此二縣揚雄冀州牧針曰嶽陽是都則堯都平陽亦嶽陽也且如華山之陽附近者為商州而山南之地非商州所可盡衡山之陽附近者為衡陽縣而荆之南界非此縣所可盡至若岷山之陽更不知其所屆安得專指灌縣為岷陽哉夫嶽陽亦猶是也直扺南河又何疑焉閻氏若璩曰後至於太嶽專指山言此至於嶽陽陽字所包者廣蓋既修太原二句直舉一千餘里用功而言也蕙田案嶽陽胡氏閻氏之説是覃懷底績至於衡漳錐指傳曰覃懷近河地名漳水橫流入河從覃懷致功至橫漳正義曰地理志河內郡有懷縣在河之北蓋覃懷二字共為一地故云近河地名衡即古橫字漳水橫流入河故云橫漳漳在懷北五百餘里地理志清漳水出上黨沾縣濁漳水出長子縣東至鄴縣入清漳胡氏渭曰懷縣故城在今河南懷慶府武陟縣西衡漳一名降水其入河在今直𨽻廣平府肥鄉曲周二縣界經所謂北過降水者也漢志鄴縣東有故大河北入海又廣平斥章縣注應劭曰漳水出治北入河通典云衡漳入河在肥鄉縣界蓋河由鄴東而北漳從鄴北橫流至肥鄉斥章二縣界入河故酈氏以為禹貢之衡漳也以今輿地言之濁漳水出山西長子縣發鳩山縣在潞安府西少南五十里東流經長治縣西又東北經屯留潞城襄垣黎城平順又東經河南林縣至涉縣東南清漳水注之清漳出山西樂平縣沾嶺縣在太原府平定州東南五十里縣西南有沾縣故城南流經和順遼州黎城又東經河南林縣至涉縣與濁漳合流東經安陽彰德府治臨漳在府東北八十里又東北經直𨽻成安縣在廣平府西南六十里入肥鄉曲周二縣界肥鄉在府東南四十里曲周在府東北四十里禹貢之漳降盡於此矣地理今釋覃懷今河南懷慶府地通典云懷州禹貢覃懷之地是也衡漳清漳水出今山西太原府樂平縣西南三十里沾嶺水經注所謂少山大龜谷也東南至河南彰德府涉縣交漳口會濁漳水又東北流入直𨽻界至廣平縣分二支一支東行入衛河一支為經流東北行經山東邱縣界復分二支一支北行入大陸澤一支為經流東北行經直𨽻清河阜城交河至青縣合衛河北流至天津西沽合桑乾諸水東行入海所謂老漳河也其一支入大陸者亦東北行至天津西沽合諸水入海所謂新漳河也濁漳水出今山西潞安府長子縣西五十里發鳩山亦東南流至交漳口會清漳觀承案衡漳有清濁二水濁漳出山西長子縣西五十里之發鳩山清漳出山西樂平縣西南二十里之少山皆經潞安府入河南彰德府至臨漳縣合流為交彰口由磁州入直𨽻境陸清獻畿輔地圖記謂漳河自磁州三臺口為二支一支東流入成安縣徑肥鄉抵曲周合滏陽河一支北流入邯鄲縣徑永年至曲周合滏陽河歷雞澤平鄉任縣隆平寧晉至冀州滙滹沱河康熙中漳河南徙惟滹滏滙流今成安故瀆土人稱古漳河而廣平邱縣清河南宫武邑武強阜城交河皆有漳河舊瀆稱老漳河廣宗巨鹿亦有漳河舊瀆稱小漳河大抵古漳河老漳河皆當日之經流而小漳河則其支流也又大名府有新舊二漳河皆自魏縣流入新漳又舊漳之支流也又案舊時漳河自臨漳縣東北入直𨽻廣平府境歷成安廣平肥鄉曲周雞澤還平鄉合沙洺諸河過南河合灃河至任縣入大陸澤歷隆平寧晉新河南宫冀州衡水武邑武強阜城交河合滹沱河此其經流也其自臨漳縣東入直𨽻大名府境歷魏縣大名東北入山東東昌府境至館陶入衛河者其支流也今則經流幾絶支流日盛蓋自黃河南徙漳行河之故道漳復南徙以支流為經流亦古今水道一大變更也又案漳河水經注亦曰衡水今衡水縣古時為漳河下流以此得名下文導河云北過洚水水經注引地理志曰洚水發源屯留下亂章津是乃與章俱得通稱方輿紀要冀州有洚河枯瀆又漳水至寧晉縣歷南宫冀州衡水武邑武強又名胡盧河又新河縣長蘆水即漳河支流也武強縣有夾河洚水别名也括地志濁漳水亦名柳河歐陽忞曰漳河過魏縣亦謂之魏水畿輔地圖記謂衛水為直𨽻諸河之綱直𨽻西南諸水莫大於漳與滹沱而皆入衛錐指謂永濟渠即古之清河漢志之國水水經之清淇二水曹公自枋頭遏淇水為白溝一名白渠隋導為永濟渠一名御河今稱衛河者也水經注清河即淇河口也蓋互受通稱耳又云白溝又東北漳水注之謂之利漕口自下清漳白溝淇河咸得通稱也方輿紀要御河源出河南輝縣西北七里之蘇門山過衛輝府東北入直𨽻大名府濬縣境謂之白溝亦曰通濟渠一名永濟渠即隋大業中所開淇衛諸水之下流也亦曰御河又曰清河寰宇記衛河淇水合流亦曰黎水又曰濬水今全漳皆入衛至山東臨清州合會通河東北入於海恆衛既從大陸既作錐指傳曰二水已治從其故道大陸之地已可耕作正義曰地理志云恆水出常山上曲陽縣東入滱水衛水出常山靈夀縣東入滹沱大陸在巨鹿縣北釋地十藪云晉有大陸孫炎等皆云今巨鹿縣廣阿澤也胡氏渭曰上曲陽今為曲陽縣屬直𨽻真定府之定州其故城在縣西靈夀縣今屬真定府其故城在縣西北恆即滱水衛即滹沱也古今異名耳地理今釋恆水一名長溪源出恆山自直𨽻真定府阜平縣龍泉關北迤邐流經大𣲖山為大𣲖水亦曰沙水又東南至保定府祁州界合磁河入於唐水唐水即滱水也衛水今名雷溝河出真定府靈夀縣良同村南流至縣東南入滹沱河大陸一名廣阿澤跨今直𨽻保定府束鹿縣元和志大陸澤在深州鹿城縣南順德府巨鹿縣元和志大鹿澤一名巨鹿澤在邢州巨鹿縣西北五里真定府隆平縣通典趙州昭慶縣有火陸澤元和志廣阿澤在趙州昭慶縣東二十五里寧晉縣明一統志寧晉縣有葫蘆河即大陸澤深州通典深州陸澤縣禹貢大陸澤在此元和志深州陸澤縣南三里即大陸之澤上承滹沱滏陽漳唐諸河水滙為巨浸又東北流為新漳河至大城縣為子牙河至天津衛入海漢書溝洫志禹之行河水本隨西山下東北去巨鹿正在西山之下自是大河所經程大昌以為巨鹿去河絶逺未嘗徑邢以行非也當從孫炎之説為是胡氏渭曰周禮職方氏并州山鎮曰恆山其川呼池嘔夷嘔夷即後世所謂􅋤水也山海經曰髙是之山􅋤水出焉東流注於河漢志代郡靈邱縣下云􅋤河東至文安入大河文安屬勃海郡寰宇記云文安故城在今縣東北三十里過郡五行九百四十里并州川禮記晉人將有事於河必先有事於惡池注云惡當為呼字誤也山海經曰大戲之山滹池之水出焉戰國䇿蘇秦説燕曰南有呼沱易水漢志代郡鹵城縣下云呼沱河東至參合入呼沱别并州川從河東至文安入海過郡六行千三百七十里參合當作參户蓋傳寫者因郡有參合而誤參合在漢堆門郡平城縣東今大同府陽和衛北鹵城與參合大山隔絶呼沱不得至其地今河間府青縣南有參户故城應劭云平舒縣西南五十里有參户亭故縣也水經注漳水自成平縣南又東北左會呼沱别河故瀆又東北合清河又東北徑章武故城西枝瀆出為穢水又東北徑參户亭分為二瀆一水徑參户亭北又東北徑平舒縣注呼沱蓋即漢志所謂東至參户入呼沱别從河東至文安入海者也此即禹貢之恆衛也然禹主名山川曲陽以下之􅋤本名恆靈夀以下之滹沱本名衛其出髙是泰戲者則恆衛之别源也自周以呼池嘔夷為并州之川其名著而恆衛之名遂隱於是冀州二大川以恆陽溪雷溝河數十里之原委當之蔡氏因目恆衛為小水而經義不可通矣􅋤水出代郡靈邱縣西北髙氏山即嘔夷之水也以今輿地言之渾源靈邱廣昌並屬山西大同府曲陽屬直𨽻真定府唐縣定州慶都祁州博野蠡縣髙陽安州新安並屬保定府任邱屬河間府文安屬順天府諸州縣界中皆古􅋤水之所行也宋初猶未改自咸平中何承矩興塘濼以限契丹戎馬之足於是始引水歸北而文安之瀆遂空其後􅋤水仍自蠡縣改流經肅寧河間雄縣任邱以至文安而不復北行明時則又自雄縣改流入霸州保定界為玉帶河不復入文安矣此恆水下流變徙之大略也滹沱大川也水經當自為一篇頃閲寰宇記鎮州真定縣蒲澤下引水經注云滹沱河水東徑常山城北又東南為蒲澤濟水有梁焉俗謂之蒲澤口又滋水下引水經云滋水又東至新市縣入滹沱河又深州饒陽縣枯白馬渠下引水經云滹沱河又東有白馬渠出焉又瀛州河間縣大浦淀下引水經注云大浦下導陂溝競奔咸注滹沱是故人因決入之處謂之百道口此四條檢今本無之則似水經元有滹沱水篇宋初尚存而其後散逸滹沱原委不可得詳惜哉歐陽元補正水經序引崇文總目云酈注四十卷亡其五蓋涇洛滹沱等篇皆在此五卷之中今本仍為四十卷則後人析之以充其數耳漢志代郡之鹵城常山郡之蒲吾靈夀南行唐新市信都國之信都河間國之弓髙樂成勃海郡之成平東光參户東平舒文安皆有滹沱河弓髙樂成參户又有滹沱别水而發源經過之地未悉今據元和志所載以補水經之闕滹沱水出代州繁畤縣泰戲山一名武夫山在縣東南九十里繁畤本漢葰人縣屬雁門郡漢末荒廢晉改置繁畤縣周省隋復置葰音璅滹沱一名𣲖水許氏説文𣲖水出葰人縣戍夫山郭景純以為鹵城縣武夫山括地志以為孤阜山寰宇記以為平山蓋皆泰戲之别名也西南流徑唐林縣東縣東北至代州一百十里本漢廣武縣隋為五臺崞二縣地今州西有廣武廢縣蓋即唐林縣界也又西南徑崞縣東縣東北至代州五十里水去縣二百步又西南徑秀容縣東縣為欣州治水去縣三十二里東轉徑定襄縣北縣西至欣州四十五里今治即陽曲故城水去縣五里又東徑五臺縣西南縣西北至代一百二十里水去縣三十五里又東徑盂縣北縣西南至太原府二百二十里水西自五臺縣界流入南去縣百里又東南徑靈夀縣西南衛水注之縣東至恆州五十里水去縣二十里縣志云衛水在縣東十里俗名雷溝河源出縣東北十四里良同村南流至縣東南合滹沱河又東南徑真定縣北縣為恆州治水去縣一里又東南徑九門縣西縣西至恆州三十里水去縣四十九里今藁城縣西北二十五里有九門城又東南徑藁城縣東縣西北至州五十八里水去縣二十九里又東徑鼓城縣北縣西至恆州九十五里水去縣十三里寰宇記云隋開皇六年分藁城地置昔陽縣十八年改為鼓城又東徑深澤縣南縣西北至定州九十里水去縣二十五里即冰合渡光武處俗謂之危渡口又東徑無極縣北縣北至定州八十里水去縣三十里又東北徑鹿城縣西北縣東至深州二十五里水去縣四十二里與博野縣分水寰宇記滹沱河在博野縣東南三十五里又東徑安平縣南縣東南至深州五十三里水去縣二十三里𣲖水今名礓河西自定州義豐縣界流入又東北徑饒陽縣北縣西至深州三十里水去縣四十五里縣治晉魯口城也公孫淵叛司馬宣王征之鑿滹沱入𣲖水以運糧因築此城蓋滹沱有魯沱之名因號魯口後魏道武皇始三年車駕幸魯口即此地也自此以下當入瀛莫二州境而元和志亦闕案寰宇記瀛州河間縣西二十里髙陽縣東北十四里莫州鄭南二里霸州大城縣北一百三十里文安縣西北三十里皆有滹沱水此即漢志所云從河東至文安入海者以今輿地言之繁畤代州崞縣欣州定襄五臺盂縣並屬山西太原府靈夀真定藁城深澤無極並屬直𨽻真定府束鹿博野並屬保定府安平饒陽並屬真定府髙陽屬保定府任邱屬河間府大城文安並屬順天府諸州縣界中皆古滹沱水之所行也宋初猶未改自塘濼既興引水歸北而文安之瀆堙廢遂以樂成今獻縣之滹沱别水為滹沱之正流而故道不可復問明天啓後漸徙而南至本朝順治二年自束鹿南決入冀州與漳水渾濤而安平饒陽之地不復有滹沱矣滹沱在河北羣川中溢決尤甚未有數年不變而從冀州合於漳水亦猶黃河之與淮合均為古今水道之極變也觀承案恆入􅋤衛入滹沱自古而然諸書無異獨錐指謂恆即􅋤衛即滹沱蓋以今恆水由唐縣入􅋤衛水由真定縣入滹沱源流甚近不足當禹功荒度故以蔡傳稱小水者為非不知滄桑異勢泥今論古多有未合康熙二十三年陸清獻宰靈夀為衛水尋源記適嵗旱源竭以為非但無唐虞之泛濫比班孟堅酈道元之時亦逈然不侔又謂今松陽淤泥慈汊諸河皆近於衛安知禹時不同滙於此豈可據目前所見而遙斷數千年以前之形勢此真大儒之言胡氏又謂曲陽以下之􅋤本名恆靈夀以下之滹沱本名衛其出髙是泰戲者乃恆衛别源言尤鑿空考古者以清獻為法可矣又案山海經髙是之山􅋤水出焉水經注􅋤水出代郡靈邱縣正北髙是山即嘔夷之水也明史地理志渾源州南有翠屏山􅋤水出焉與嘔夷水合靈邱縣有槍峯山即髙是山嘔夷水出焉其説與二經不同讀史方輿紀要唐河在唐縣西三十里古嘔夷水也與二經合錐指引蔚州志謂州南七里有翠屏山􅋤水出其東即髙是之别名南接靈邱縣界與明史又異要當以山海經水經為正又案地理今釋謂恆水自直𨽻真定府阜平縣龍泉關北流經大𣲖山為大𣲖水亦曰沙水云云蓋本朝氏今之恆水西南流至真定府行唐縣東流入於滋之説考沙水發源山西繁畤縣白坡頭流徑直𨽻阜平曲陽行唐新樂讀史方輿紀要大𣲖山在阜平縣西北五十里稍東為小𣲖山𣲖音孤以𣲖水所徑而名是山以水為名畿輔通志沙河流徑大𣲖山又名𣲖水是水以山為名二説雖不同然恆與沙逈然兩水固不可合而為一也又案􅋤水今名唐河出山西靈邱縣入直𨽻廣昌縣徑唐縣過完縣曲陽定州至祁州合滋沙二水過博野安平蠡縣髙陽由安州入白洋淀考水經敘􅋤水所徑先曲陽後唐縣今唐河自入倒馬關由唐縣北徑完縣西又由完縣西徑唐縣南再徑曲陽縣東與昔少異當是古今疆域不同故也至山海經謂􅋤水入河水經謂􅋤水入易而今入淀蓋􅋤自合滋沙二水於祁東徑博野蠡縣又東徑肅寧髙陽自河間北流歸淀明正德中藺家圈口北決遂由玉田緒口北入髙陽是為馬家河至安州之桐口村入淀徑肅寧之河遂廢康熙四年又決布裏河北流至安州之馮村入淀馬家河上下流亦淤畿輔通志謂唐河故瀆在河間任邱二縣境此合易之故瀆也自明迄今入淀之處又凡再徙而入河故瀆不可考矣此恆水下流之變遷也又案衛水出靈夀縣良同村流四十里入滹沱滹沱出山西太原府繁畤縣泰戲山由雁門入直𨽻流徑二省幾及千里大小判别尤非恆􅋤之此故水經於恆􅋤有通稱之説而衛滹沱不聞是也陸清獻畿輔地圖記滹沱河在真定府南八里發源山西流經直𨽻靈夀平山繞真定府城南歷藁城晉州束鹿至冀州會滏漳二河過衡水武邑武強至河間府獻縣為二支一東流為鹽河一南流交河縣抵青縣岔河口入衛水經注漳水徑武邑郡南又東徑武強縣北又東北徑武隧故城南白馬河注之上承呼池東徑樂鄉縣北饒陽縣南又東南徑武邑郡北而東入衡水謂之交津口此滹沱衡漳滙流處也方輿紀要衡漳滹沱皆入大陸澤正德十年漳徙而南明年滹沱徙而北萬歷中滹沱復南徙武強合漳河後又滙漳滏於冀州今漳河南徙已不復與滹沱滙而滹沱至冀州入滏以大就小下流不暢上流之勢彌橫矣又案方輿紀要饒陽北有鐵燈竿河滹沱自此決入蠡縣與滋沙唐混流謂之鐵燈竿水是則明代滹沱不徙南滙漳且北滙唐矣所謂決入蠡縣者其支流而非經流也方輿紀要又謂晉州之鴉兒河饒陽之饒河皆滹沱支流云又案滹沱南徙滙漳河在順治初漳河南徙不復與滹沱滙在康熙中其入衛則如故故陸清獻以衛白二河為直𨽻諸河之綱百年來水道變遷不一而足然今京北諸河猶皆入白京西南諸河猶皆入衛於至變之中有不變者存豈非天地自然之道耶又曰冀州有三大陸一在巨鹿郡北班固繫諸禹貢又名巨鹿澤吕氏春秋云趙有巨鹿又名廣阿澤爾雅晉有大陸孫炎云今巨鹿縣廣阿澤是也此真禹貢之大陸也一在河內修武縣古寧邑秦置修武縣其故城在今獲嘉縣西北左傳定公元年魏獻子田於大陸還卒於寧杜預云大陸疑即吳澤陂近寧是也一在太原塢縣今為介休縣地班固云九澤在縣北是為昭餘祁并州藪酈道元云吕氏春秋謂之大陸是也斯二者皆非禹貢之大陸也觀承案大陸澤錐指考之最悉今在任縣境東北隅才八百頃耳西南受順廣二府之水北歸寧晉泊泊之大三倍於澤相去三十餘里其間村落碁布秋水時至常苦泛溢考古時大陸澤起自巨鹿訖於束鹿中跨平鄉任縣隆平寧晉冀州深州而今止任寧二邑已分為二奪澤之地以田以廬水發無所容焉得不為民患方輿紀要胡盧河在寧晉縣東南二十里即禹貢之大陸澤今乃以澤歸任縣而寧晉稱泊亦流俗之訛也又案禹時大陸為河所經故一曰大陸既作一曰至於大陸其不言澤者舉澤不足以槩大陸舉大陸則澤在其中省文也爾雅髙平曰陸河徑髙平之地瀦而為澤故又曰廣河澤是則澤以地得名胡氏釋禹貢必謂是地非澤固哉髙叟之為詩也夾右碣石入於河錐指傳曰碣石海畔山正義曰地理志碣石山在北平驪城縣西南是碣石為海畔山也蘇氏曰河自碣石山南渤海之北入海夾挾也自海入河逆流而西右顧碣石如在挾掖也地理今釋碣石案漢書地理志云大碣石山在右北平郡驪城縣西南武帝紀注文頴云碣石在遼西絫縣絫縣今罷入臨渝此石著海旁蓋驪城即今直𨽻永平府撫寧縣絫縣即今昌黎縣二縣壤地連接杳無碣石蹤迹而海水蕩滅之説又荒誕不可信考肇域志云山東濟南府海豐縣有馬谷山即古碣石劉文偉亦以馬谷山在古九河之下合於禹貢入河入海之文斷為碣石無疑近世論碣石者惟此説庶幾近之蕙田案碣石自漢志後其説不一據漢志右北平驪成縣下云大碣石山在縣西南莽曰碣石遼西郡絫縣下云有碣石水南入官不言有山及文頴注武紀始有絫縣之説與班異其地當在今昌黎縣東絫縣故城之南水經曰碣石在遼西臨渝縣南水中酈注云大禹鑿其石右夾而納河秦始皇漢武帝皆常登之海水西侵嵗月逾甚而苞其山故言水中矣又云漢司空掾王璜言碣石在海中信而有徵胡朏明宗其説辨論極詳謂今海中無此山碣石之亡當在魏齊之世此主海水蕩滅之説者也而元王充耘有合口御河入海處石山聳立俗呼為竭石明劉世偉又云海豐縣北馬谷山疑即古之碣石胡朏明皆非之至於括地志謂在盧龍縣南唐志及寰宇記則又云石城縣有碣石都無足據學者闕其疑可也觀承案碣石自當闕疑夾右亦不可強解然有一説夾即古陜字此蓋總序冀州貢道西自陜右東自碣石俱已入於河入河則達帝都矣如西河渭汭總括雍州之例耳此説固自可存胡氏渭曰冀州為中土古軒轅陶唐有虞夏后殷人所都及實沈臺駘孤竹之封皆在焉春秋時可考者晉古實沈之虛唐人是因以服事夏商及周成王滅之以封弟叔虞為唐侯至子燮改名曰晉魏霍冀黎書西伯戡黎即此今為黎城縣揚郇或作荀賈沈姒蓐黃帝封臺駘于汾川沈姒蓐黃實守其祀潞赤狄弼鄘衛始封在朝歌邢共凡原雍邘虞檀溫中山鼓肥鮮虞薊北燕韓無終山戎凡三十五國戰國時屬燕趙魏而秦衛亦兼得其地秦并天下置三十六郡此為巨鹿邯鄲上谷漁陽右北平遼西河東上黨太原代郡雁門雲中三川北境是漢武置十三州此為冀州領郡國九幽州領郡國十并州領郡九後漢魏晉並因之晉冀州領郡國十三幽州七并州六南北朝土地分裂增置漸多不可勝紀唐承隋制州即是郡貞觀初因山川形便分天下為十道開元中又析為十五道此為河北道之汲郡衛州鄴郡相廣平洺巨鹿邢信都冀趙郡趙常山鎮博陵定河間瀛文安莫饒陽深上谷易范陽幽順義順歸化分順州置歸德燕媯川媯漁陽薊密雲檀北平平柳城營等郡河東道之河東蒲州絳郡絳陜郡陜北境是平陽晉髙平澤上黨潞樂平儀陽城沁大寧隰文城慈西河汾太原并昌化石雁門代定襄欣安邊蔚馬邑朔雲中雲等郡又都畿之河內郡懷州關內道之單于大都護府案以上通典所列信都當全屬兖鄴郡之內黃堯城臨河汲郡之黎陽東境當分屬兖以今輿地言之山西太原平陽汾州潞安大同五府澤遼沁三州河南則懷慶衛輝彰德三府唯衛輝之胙城縣舊在大河之南當屬兖直𨽻則順天永平保定廣平順德五府及真定河間二府之西北境當以漢時漳水故道為界水西屬冀水東屬兖大名府濬縣之西境以宿胥故瀆為界西屬冀東屬兖又新置宣化府舊為萬全都司及故遼東都司之西境以大遼水為界西屬冀東屬青其北則踰塞直抵隂山下西起東受降城之北東訖於大遼水皆古冀州域也濟河惟兖州錐指傳曰東南據濟西北距河渭案濟自菏又東北會於汶又北東入於海此兖之東南與豫徐青分界處河自大伾北過降水至於大陸又北播為九河同為逆河入於海此兖之西北與冀分界處東南據濟與豫分界當自兖州府之曹州始何以知之案導水濟入河溢為滎東出於陶邱北又東至於菏菏澤在今定陶縣境經繫諸豫雷夏在今曹州境經繫諸兖故知二澤之間為兖豫之界也濟水至曹州西分為二水一水東南流為菏水一水東北流入巨野澤為濟瀆春秋僖公三十一年取濟西田左傳云分曹地自洮以南東傅於濟酈道元云濟水自是東北流出巨澤即此地也濟水又北過東昌府之濮州范縣東與徐分界又北為陽穀茌平東與青分界轉東為濟南府之齊河濟陽齊東青城又東為青州府之髙苑博興樂安樂安縣東北一百十里有琅槐故城漢屬千乘郡濟水入海處也南與青分界今歷城以東有小清河即濟水入海之故道其北為兖南為青也西北距河與冀分界河自今河南衛輝府胙城縣北東至直𨽻大名府濬縣大伾山西折而北經河南彰德府界中又東北經直𨽻廣平順德真定河間四府界中東入於海此禹河之故道曲周以下即漢時漳水之所行也九河既道錐指傳曰河水分為九道在此州界平原以北是正義曰河從大陸東畔北行而東北入海冀州之東境至河之西畔水分大河東為九道故知在兖州之界平原以北是也釋水載九河之名云徒駭太史馬頰覆釡胡蘇簡潔鉤盤鬲津也漢書溝洫志成帝時河隄都尉許商上書曰古記九河之名有徒駭胡蘇鬲津今見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝也許商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也爾雅九河之次從北而南既知三河之處則其餘六者太史馬頰覆釡在東光之北成平之南簡潔鉤盤在東光之南鬲縣之北也其河填塞時有故道鄭元云今河間弓髙以東至平原鬲津往往有其遺處夏氏曰九河之名出於一時之偶然初無義訓李巡孫炎郭璞皆附會曲為之説渭案漢成平東光屬勃海郡鬲縣屬平原郡弓髙屬河間國今直𨽻河間府交河縣東有成平故城東光縣東有東光故城阜城縣西南有弓髙故城山東濟南府德州北有鬲縣故城皆漢縣也蓋河自大陸以北禹疏為九道以殺其勢然後恆衛可得而治大陸盡為良田也地理今釋案孔頴達九河疏徒駭在成平胡蘇在東光鬲津在鬲縣此祖漢許商徒駭最北鬲津最南之言也其餘六者復據爾雅九河之次謂太史馬頰覆釡在東光之北成平之南簡潔鉤盤在東光之南鬲縣之北蔡傳以太史河不知所在又合簡潔為一與孔疏異今考直𨽻河間府滄州自唐迄元滄州治清池縣之西交河縣漢成平縣之東北六十里有徒駭河漢書地理志所謂滹沱河民曰徒駭河是也山東濟南府平原縣北有篤馬河東北經陵縣德平商河隋唐為滴河縣樂陵諸縣界其流或斷或續相傳即馬頰河也濟南府德州有覆釡河東北至海豐縣入海河間府東光縣東南有胡蘇河東經寧津縣唐臨津縣滄州漢饒安縣在州東南慶雲縣隋唐為無棣縣界至海豐縣入海河間府南皮縣城外有簡河潔河二河相去最近濟南府樂陵縣東南有鉤盤河自平原德平二縣界流入至海豐縣東入海德州西南有鬲津河東經吳橋寧津德平樂陵慶雲諸縣界至海豐縣大沽口入海其太史河據齊乘在清滄二州之間明一統志亦云在南皮縣北今其地雖無顯迹然以孔疏參之明一統志亦非無據蓋九河故道自春秋時已湮廢遷徙漢唐以來諸儒訪求古迹就所見之斷港絶潢指為某河某河似乎是非不可知然河自大陸以北順勢下趨禹時九河自當在德州以上河間數百里之地考之於古驗之於今是亦可信也已閻氏若璩曰余嘗往來燕齊西道河間東履清滄熟訪九河故道蓋昔北流衡漳注之河既東徙漳自入海北流之漳古徒駭河歟踰漳而南清滄二州之南有古河隄岸數重地皆沮洳沙鹵太史等河當在其地滄州之南有大連澱西踰東光東至海此非胡蘇河歟澱南至西無棣縣百餘里間有曰大河曰沙河皆瀕古隄縣北地名八會口縣城南枕無棣溝兹非簡潔等河歟東無棣縣北有陷河濶數里西通德棣東至海兹非所謂鉤盤河歟濵州北有士傷河西踰德棣東至海兹非鬲津河歟士傷河最南比他河差狹是為鬲津無疑也此本夏彛仲之言蔡氏集傳乃曰自漢以來講求九河皆無依據祖王橫之言引碣石為證謂九河已淪於海余案禹貢文北過降水至於大陸又北播為九河同為逆河入於海大陸在邢趙深三州之地爾雅之廣阿澤也去海岸已數百里又東至海中始敘九河則大陸與九河相離千里如是之逺而絶無表志不合禹貢之文其不可信一也王橫謂海溢出浸數百里而青兖營平郡邑不聞有漂沒之處而獨浸九河其不可信二也今平原迤北清滄之間雖為樹藝城邑相望而地形河勢髙隱曲折往往可尋但禹初為九厥後或三或五遷變多寡不同必欲按名而索故致後儒紛紛之論胡氏渭曰漢時言九河以為不可考者平當云九河今皆置與填同滅馮逡云九河今既滅難明王橫云九河之地已為海所漸是也然許商所言實有其地就三河推之其餘大槩可知九河豈真湮滅無遺迹邪而近世學者又患求之太詳凡後人所鑿以通水而被新河以舊號者悉據以為禹之九河杜氏通典於許商所得之外又得其三鉤盤在景城郡界馬頰覆釡在平原郡界惟太史簡潔三河未詳處所而史記正義云簡在貝州歷亭縣界輿地廣記云簡潔在臨津金地理志云南皮縣有潔河明一統志云太史河在南皮縣北則此三河者亦皆犂然有其處所矣以漢人所不能知而一一臚列如此可信乎不可信乎蔡傳云或新河而載以舊名或一地而互為兩説皆似是而非無所依據此言是也求九河者正不必尺寸皆合於禹之故道亦不必取足於九許商言自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益此真通人之見知此者可與窮經可與治水矣雷夏既澤灉沮會同錐指傳曰雷夏澤名灉沮二水會同此澤正義曰地理志云雷澤在濟隂成陽縣西北渭案今山東兖州府曹州東北六十里有成陽故城北與東昌府濮州接界雷夏在曹之東北濮之東南史記云堯作遊成陽舜漁於雷澤即此灉沮二水漢志無文括地志曰雷夏澤在濮州雷澤縣郭外西北通典雷澤縣本漢成陽縣元和志雷澤縣西北至濮州九十里案北齊廢成陽隋復以其地置雷澤縣唐宋因之金又廢今曹州東北六十里故雷澤城是灉沮二水在澤西北平地元和志曰灉水沮水二源俱出雷澤縣西北平地去縣十四里又曰雷夏澤在縣北郭外灉沮二水會同此澤與孔傳符矣地理今釋雷夏今山東東昌府濮州東南有雷澤接曹州界水經注云雷澤在大成陽故城西北十餘里其陂東西二十餘里南北十五里即舜所漁也元和志灉水沮水俱在濮州雷澤縣西北平地去縣四十里九域志濮州有沮溝即禹貢灉沮會同是也宋時河決曹濮間灉沮源適當其衝久而泥滓填淤二水遂涸蔡傳乃欲以汳睢當之非是韓汝節云汳睢在豫徐之境無與於兖州而兖州自有灉沮也浮於濟漯達於河錐指傳曰濟漯兩水名正義曰地理志云漯水出東郡東武陽縣至樂安千乘縣入海過郡三行千二十里其濟則下文具矣渭案今山東東昌府朝城縣西有東武陽故城青州府髙苑縣北有千乘故城皆漢縣河謂南河之尾漯首受河處也孟子曰禹疏九河瀹濟漯皆在兖域而經於濟漯不言施功以貢道見之曰浮於濟漯則二水之治可知矣地理今釋漯今山東東昌府朝城縣北有漯河濟南府禹城縣西二里有漯河一名源河俗又名土河東北入臨邑縣界案朝城漢之東武陽縣髙苑漢之千乘縣禹城漢之髙唐縣也蓋漯水本出髙唐至千乘入海自禹導河至大伾始分河之一支史記禹厮二渠以引其河注其一則漯川東北流首經東武陽至髙唐合漯水自合漯水則髙唐以南武陽以北之河皆被以漯名矣故漢志於平原郡髙唐注則云漯水所出於東郡東武陽則云禹治漯水東北至千乘入海疏解漯水源流固自瞭然蔡傳未究斯旨又誤解程大昌此河乃漢河元非禹河之語竟不知漯水所在善乎陳師凱書傳旁通曰程氏之意非指漯為漢河蓋指漯入河處所受河水乃漢以後所徙頓邱之河非禹時澶相以北之河其漯水仍以東武陽為是也胡氏渭曰兖州有古帝顓頊之虛杜預曰東郡濮陽縣故帝顓頊之虛故曰帝邱鬲觀有窮昆吾韋顧之封皆在焉春秋時可考者衛文公遷于楚邱成公又遷于帝邱郕胙燕南燕姞姓凡四國戰國時為衛魏宋齊趙五國地秦并天下置東郡碭郡東北境是齊郡北境是巨鹿上谷二郡東境是漢復置兖州領郡國八後漢魏晉並因之唐為河南道之靈昌滑州濮陽濮濟陽濟東平鄆等郡河北道之清河貝州魏郡魏博平博平原德樂安棣景城滄等郡案以上通典所列有當往屬者東平之須昌巨鹿宿城及夀張之東境此為東原大野之地須昌宿城夀張三縣故城並在今東平州界巨野故城在今巨野縣西魯郡之任城龔邱任城今為濟寧州及嘉祥縣之東境龔邱今為寧陽縣並在古濟水東改屬徐濟隂之南華在菏澤西今為東明縣靈昌之匡城在南華西今為長垣縣改屬豫濟陽之長清今屬濟南府及東阿之東境今東阿縣是平隂之北境改屬青其南境改屬徐也平隂側岱跨南北故分屬青徐又有當來屬者冀域信都郡及鄴郡之內黃堯城臨河內黃堯城二縣故城並在今內黃縣界臨河故城在今滑縣北汲郡之黎陽東境其豫域則濟隂之乘氏也乘氏在菏澤東今為曹州以今輿地言之河南衛輝府之胙城縣胙城本在河南自金明昌五年河徙出縣南而縣始為河北地直𨽻大名府唯濬縣之西境當屬冀長垣東明二縣當屬豫及真定河間二府之東南境當以漢時漳水故道為界東南屬兖西北屬冀山東則東昌府其兖州府則曹州陽榖夀張鄆城濟南青州二府則西北境當以漢時濟水故道為界西北屬兖東南屬豫徐青皆古兖州域也海岱惟青州錐指傳曰東北據海西南距岱顔氏師古曰岱即太山也渭案成王賜太公履曰東至於海季札聞齊音曰表東海者其太公乎齊湣王謂張儀曰齊僻陋隱居東海之上是東據海也而傳兼言北楚子謂齊侯曰君處北海蘇秦説齊王曰北有勃海蓋自今成山以至樂安者是也故云東北據海然自朝鮮以至日照皆青也所遺多矣專言東則固可該琅琊與朝鮮也地理志岱在泰山郡博縣西北今山東濟南府泰安州東南有博故城山在州北五里於故城為西北也公羊傳曰越在岱隂齊蘇秦説齊王曰南有泰山史記曰泰山之陽則魯其隂則齊岱主南言與徐分界也而傳兼言西則岱不足以表其界蓋青西以濟為兖界齊語正封疆西至於濟其明徵也北自琅槐以西亦以濟為兖界故王莽改漢齊郡曰濟南而經不言濟者蒙兖濟河之文從可知也傳兼言西則欲密而反踈甚矣説經之難也青之東境登萊二府之地斗入大海中東西長八九百里形如吐舌史記齊世家云齊自泰山屬之琅邪北被於海膏壤二千里蓋并登萊計之也海水自日照縣東與徐分界岱南與徐分界處嘗考齊長城故址而約略得之管子曰長城之陽魯也長城之隂齊也是春秋時已有長城矣竹書紀年曰梁惠成王二十年齊築防以為長城城緣河徑泰山千餘里東至琅邪臺入海齊記曰齊宣王乘山嶺之上築長城東至海西至濟州千餘里水經注云濟水自臨邑縣東又北徑平隂城西京相璠曰平隂齊地在濟北盧縣故城西南十里今長清縣西南二十五里有盧縣故城南有長城東至海西至濟河道所由名防門去平隂三里齊侯塹防門即此也其水引濟故瀆尚存又云朱虛縣泰山上有長城泰山東泰山也亦名小泰山在臨胊縣南百里朱虛故城在縣東西接岱山東連琅邪巨海千有餘里蓋田氏之所造括地志云長城西北起濟州平隂縣緣河歷泰山北岡上經齊州淄州東至密州琅邪臺入海臺在州治諸城縣東南百四十里琅邪山上元和志云故長城首起平隂北二十九里通典云盧縣有長城東至海蘇代説燕王曰齊有長城巨防巨防即防門也寰宇記云諸城縣南四十里有長城東南自海迤邐上大朱山盡州南界二百五十里大朱山南距琅邪臺六十里今案齊長城橫絶泰山綿地千餘里自平隂而東歷肥城在縣北長清在縣南泰安在州西北六十里萊蕪在縣北淄川在縣南沂水在縣北九十五里臨朐在縣南又有穆陵關在大峴山上西接沂水縣界莒州在州北以訖於諸城在縣南七十里皆有故址此雖後人所築然皆因岡阜自然之勢為之禹時青徐分界亦必以此也青西及北以濟為界鄭漁仲云不言濟者以兖州見之也案水經注濟水自臨邑過平隂盧縣歷城臺縣梁鄒臨濟安平樂安利縣至琅槐入海以今輿地言之平隂長清齊河歷城界中之大清河及章邱鄒平長山新城髙苑博興樂安界中之小清河即漢時濟水會汶入海之故道古青兖分界處也青之東北界無可考疏云越海而有遼東之地恐未盡通典云青州之界東跨海從岱山東歷密州東北經海曲萊州越海分遼東樂浪三韓之地西抵遼水此説近是然三韓地太逺而元菟不可遺竊疑漢武所開二郡皆古嵎夷之地在青州之域者而三韓不與焉蓋嵎夷羲和之所宅朝鮮箕子之所封不應在化外先儒但云有遼東非也漢書言東夷天性柔順異於三方之外故孔子悼道不行設浮於海欲居九夷後漢書言東夷率皆土著喜飲酒歌舞或冠辨衣錦器用俎豆所謂中國失禮求之四夷者也觀其土俗則青之東北界不止於遼東明矣史記秦始皇本紀云地東至海暨朝鮮北據河為塞並隂山至遼東朝鮮列傳云自始全燕時略屬真番朝鮮為置吏築鄣塞秦滅燕屬遼東外徼燕秦之所經略蓋禹貢嵎夷之地唐一行所謂北戒山河抵恆山之右乃東循塞垣至濊貊朝鮮以限戎狄者是也明遼東都指揮使司兼轄漢遼東西二郡之地都司城西四百二十里為廣寧衛本遼東無慮縣也衛西幽州域衛東營州域都司城東至鴨緑江五百六十里與髙麗分水太康地志云樂浪遂成縣有碣石長城所起通典云在今髙麗舊界蓋即蒙恬所築起臨洮至遼東者也東漢以來故址湮沒都司城北至三萬衛三百三十里古肅慎氏地衛西有開元城金置會寧府號為上京禹貢青州之北界當極於此衛東北距長白山千餘里其水北流為混同江南流為鴨緑江唐書東夷傳云髙麗馬訾水出靺鞨之白山色若鴨頭即此江也都司城南至旅順海口七百三十里去登州不逺順風揚帆信宿可達明初遼東士子附山東鄉試後以渡海之艱改附順天猶周之并營於幽也嵎夷既略錐指傳曰嵎夷地名正義曰即堯典宅嵎夷是也金氏曰青州實跨海而有東夷兼堯命羲和宅嵎夷以候正東之景故特表於前濰淄其道錐指傳曰正義曰地理志云濰水出琅邪箕屋山山見説文班志無之此誤增北至都昌縣入海過郡三行五百二十里淄水出泰山萊蕪縣原山東北至博昌縣入海今漢書本作入泲渭案都昌屬北海郡博昌屬千乘郡今山東青州府莒州東有箕縣故城益都縣西南有萊蕪故城博興縣東南有博昌故城萊州府昌邑縣西有都昌故城皆漢縣也日知録顧氏炎武曰濰水出琅邪郡箕屋山在今莒州西北九十里書禹貢濰淄其道左傳襄公十八年晉師東侵及濰是也其字或省水作維或省糸作淮又或從心作惟總是一字地理今釋淄水出今青州府益都縣西南顔神鎮東南二十五里嶽陽山即原山也其山接濟南府章邱淄川萊蕪三縣淄水出於山之東谷東北流至青州府夀光縣北由清水泊入海禹時淄水入海不入濟水經注敘述甚明史記河渠書亦云禹治水之後於齊則通災濟之間是二水不通可知蔡氏因漢書淄水入泲一語云淄水東入濟非是萊夷作牧錐指顔氏曰萊夷萊山之夷也林氏曰史記齊世家太公東就國萊夷來伐與之爭營邱左傳夾谷之會萊人欲以兵劫魯侯孔子曰兩君合好而裔夷之俘以兵亂之萊之為夷無疑矣先儒但以為地名非也渭案今萊州登州二府皆禹貢萊夷之地浮於汶達於濟錐指正義曰地理志云汶水出泰山萊蕪縣原山西南入濟渭案此經蒙兖之文曰達於濟則由漯以入河可知矣其東北境徑浮濟不必從汶也以今輿地言之汶水自萊蕪歷泰安肥城寧陽至東平入濟合流以注於海此禹迹也逮元人引汶絶濟為會通河明永樂中又築戴村壩遏汶水盡出南旺以資運而安山入濟之故道填淤久矣地理今釋汶水出今山東濟南府萊蕪縣其源非一合流於泰安州之靜安鎮謂之大汶又有小汶出新泰縣宫山之下至徂徠山南入大汶水經注有牟汶北汶柴汶汶水舊由安民亭合濟水東北入海自明永樂九年於東平州東六十里築戴村壩盡遏汶水出南旺南北分流南流達於濟寧州會沂泗諸水入淮者十之四北流達於臨清州會漳衛諸水入海者十之六矣胡氏渭曰青州有古爽鳩氏之虛為季崱有逢伯陵蒲姑氏之所因及斟灌斟尋寒過之封皆在焉春秋時可考者齊紀談州夷介萊凡七國戰國時為齊燕二國地秦并天下置齊郡琅邪東境是遼東漢復置青州領郡國六後漢魏並因之領郡國五晉分置平州青州領郡國六平州領郡國五後改曰幽州唐為河南道之北海青州濟南齊淄川淄髙密密東萊萊東牟登等郡河北道之安東都護府案以上通典所列髙密之莒縣及諸城之南境當往屬徐又有當來屬者兖域濟陽之盧縣及東阿之東境後漢榖城縣地在濟東者即今東阿縣平隂之北境徐域魯郡乾封萊蕪之北境是也以今輿地言之山東登州萊州二府其青州府則益都臨淄昌樂安邱夀光臨朐及諸城髙苑博興樂安之南境濟南府則肥城長清歷城章邱鄒平長山新城淄川及泰安萊蕪之北境兖州府則唯東阿及平隂之北境三府之地南以齊長城故址與徐分界西及北以漢時濟水故道與兖分界其東北跨海為故遼東都司之東境及朝鮮國皆古青州域也右禹貢冀兖青三州五禮通考卷二百一
