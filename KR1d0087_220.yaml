body:
  text: 五禮通考卷二百十刑部尚書秦蕙田撰嘉禮八十三體國經野顧氏棟髙春秋大事表吳都梅里今為江南常州府無錫縣吳地記奉伯築城於梅李平墟周三里二百歩外郭周三十餘里其地漢為無錫縣地劉昭曰無錫縣東皇山有泰伯冡去墓十里即舊宅井猶存杜氏通典無錫縣東南三十里有泰伯城地曰梅李鄉亦曰梅里村城東五里有皇山一名鴻山自泰伯至闔閭二十三君俱都此遷於姑蘇今為江南蘇州府治城邑考周敬王六年闔閭築大城周四十二里三十歩小城八里二百六十歩間陸門八水門八名皆子胥所制東曰婁曰匠西曰閭曰胥南曰盤曰蛇北曰平曰齊以地有姑蘇山因曰姑蘇山在府城西三十里案敬王六年為吳闔閭元年魯昭公之二十八年也韋昭國語注曰姑蘇臺名非也姑蘇為吳國都之地名越伐吳王率其賢士重祿以上姑蘇猶夫越棲㑹稽耳安有棄其國都而走保一臺乎觀後范蠡入姑蘇之宮遂滅吳則姑蘇為吳都無疑矣吳邑鳩兹襄三年楚子重伐吳克鳩兹至于衡山杜注吳邑在丹陽蕪湖縣東今太平府蕪湖縣東四十里有鳩兹港即此也漢蕪湖縣屬丹陽郡以地卑蓄水嘗生蕪藻因名孫權使陸遜屯兵于此先主嘗謂權曰江東形勝先有建業次有蕪湖古蕪湖城在今縣東三十里輿地通考今蕪湖縣德政鄉有句慈社即鳩兹之訛也衡山即横望山在當塗縣城東北六十里衡横古通用杜注云在烏程縣南太逺非是朱方襄二十八年齊慶封奔吳吳與之朱方杜注吳邑顔師古曰丹徒古朱方也秦始皇以其地有天子氣使赭衣徒三千鑿京峴以敗其勢因名丹徒漢置縣有孫氏所築子城特堅號鐵甕城汴宋改名曰鎮江府今為鎮江府附郭丹徒縣延陵襄三十一年趙文子問曰延州來季子其果立子杜注季札邑本封延陵後復封州來故曰延州來公羊傳季子去之延陵春秋時已有延陵之名其曰延州來者省文也漢改毘陵晉改晉陵尋為郡隋廢郡置常州府唐増置武進縣與晉陵俱附郭明初并晉陵入武進季札墓在今武進縣北七十里申浦之西檇李定十四年於越敗吳于檇李杜注吳郡嘉興縣南醉李城吳越春秋吳王夫差増越封西至于醉李然則與闔閭戰時檇李猶當為吳地杜氏通典吳國南百四十里與越分境吳伐越越子禦之于檇李則今嘉興縣之地也古檇李城在今浙江嘉興府嘉興縣南四十五里艾哀二十年吳公子慶忌出居于艾杜注吳邑豫章有艾縣水經注溳水出豫章艾縣桓山西南吳公子慶忌諌夫差不納居于艾是也今江西南昌府寜州西一百里龍平岡有古艾城吳地淮上襄三年晉侯使荀㑹逆吳子于淮上淮水東流由楚地入吳境入海此淮上當在臨淮泗州之境善道襄五年㑹吳于善道杜注地闕公穀皆作善稻范甯注曰吳地阮勝之南兖州記云盱眙本吳善道地秦置盱眙縣項羽尊楚懷王為義帝都盱眙許慎曰張目為盱舉目為眙城居山上可以矚逺故曰盱眙今屬江南泗州臯舟之隘襄十四年楚子囊師于棠以伐吳吳人自臯舟之隘要而擊之杜注吳險阨之道或曰水淺滯舟之處非地名也案傳云師于棠棠為今江寜府六合縣又云吳不出而還子囊殿吳人要而擊之楚人不能相救蓋從濵江水淺之處邀其惰歸使首尾斷絶也約當近六合在泗州盱眙之間房鍾昭六年楚子蕩伐吳吳人敗其師於房鍾杜注吳地或曰在今潁州府蒙城縣界案傳云子蕩師於豫章而次於乾谿乾谿在今潁州府亳州則此蒙城縣當亦相近槖臯哀十二年㑹吳於槖臯杜注在淮南逡遒縣東南孟康曰槖臯音拓姑漢置縣宋紹興十一年兀术陷廬州屯兵柘臯為劉錡等所敗槖訛為拓又訛為柘今廬州府巢縣西北六十里有柘臯鎮俗猶名㑹吳城漢逡遒故城在今廬州府治合肥縣東與巢縣相接壤鄖哀十二年公㑹衛侯宋皇瑗於鄖杜注發陽也廣陵海陵縣東南有發繇口案晉時海陵縣屬廣陵郡今為江南泰州發陽無考今通州如臯縣亦係海陵地縣南十里有㑹盟原相傳為吳楚㑹盟處考春秋之世吳楚始終無盟㑹事意必指此矣桐汭哀十五年楚伐吳及桐汭杜注宣城廣德縣西南有桐水在今江南廣德州西南二十五里良哀十五年楚伐吳陳侯使公孫貞子弔焉及良而卒杜注吳地又昭十三年晉侯㑹吳于於良水道不可辭杜注下邳有良城縣即此良也前漢於良地置良城縣屬東海郡師古曰即晉時㑹吳處後漢屬下邳國晉改曰良城縣今邳州北六十里有良城頯黄哀十六年楚白公之亂王孫燕奔頯黄氏杜注吳地在今寕國府境吳山川夫椒哀元年吳敗越于夫椒杜注吳郡吳縣西南太湖中椒山通典包山一名夫椒山即西洞庭山也在太湖中左思吳都賦指包山而為期集洞庭而淹留即此山周廽百三十五里在今江南蘓州府吳縣西南八十五里或云伍無錫縣西北與馬跡山相近似誤衡山襄三年楚子重伐吳克鳩兹至于衡山杜注在吳興烏程縣南案鳩兹在今江南太平府蕪湖而烏程乃浙江湖州府之附郭縣相去太逺不可從今太平府當塗縣東北六十里有横山横與衡古通用似為近之海哀十年吳徐承帥舟師自海入齊大江自江南通州入海淮自淮安府安東縣入海吳從此至山東登莱府界即齊地大江哀九年吳城邗溝通江淮大江自西來流入江南安慶府宿松縣界南岸為江西九江府德化縣界楚地止此從此入吳境經安慶府太平府江寕府鎮江府常州府武進江隂縣之北靖江縣之南又東至通州之狼山入海經流千五百餘里皆吳地淮水襄三年晉侯使荀㑹逆吳子於淮上淮水發源河南南陽府桐柏縣桐柏山東流至光州東北又東由固始縣入江南潁州府界又東流至潁上縣東南又東北至鳳陽府懷逺縣界自發源至此皆楚地以下入吳又東經長淮衛至五河縣又東徑泗州城南盱眙城北漫衍入洪澤湖盱眙即吳之善道地襄五年㑹吳于善道即此又東北出淮安府清河縣之清口與黄河㑹又刷河東流經山陽縣至安東縣雲梯關入海淮上當在臨淮泗州之境邗溝見上杜注於邗江築城穿溝東北通射陽湖西北至末口入淮通糧道也今為邗江亦曰漕河起揚州府城東南二里歴邵伯湖髙郵湖寶應湖北至黄浦接淮安界為山陽瀆其合淮處曰末口在淮安府北五里自江達淮南北長三百餘里淮安府志云運河古山陽瀆隋開皇六年鑿然吳王城邗溝出於末口即新城北辰方之北閘也三國時以無運而塞隋因平陳而廣之五代亦以不運而湮周以平南唐而濬之元以兵阻而廢洪永間以漕運而復之時已築新城則又倣宋轉運使喬維嶽之制自郡城西北逶迤轉於西南建閘通清河口皆平江伯陳瑄之力也又云石閘在新城北洪武十年建今廢為水関末口即北閘北閘即今新城之北水關末口在淮安北五里確有可據射陽湖在淮安府東南七十里長三百里故時邗溝由此入淮後人於此立堰曰北神堰今漕運皆由淮安城西而城東入淮之故道廢北神堰不復治而射陽湖亦僅成帶水矣禹貢錐指曰今山陽縣西有山陽瀆即古邗溝其縣北五里之北神堰即古末口也明永樂十三年平江伯陳瑄總督漕運故老為瑄言淮安城西有管家湖自湖至淮河鴨陳口僅二十里與清河口相直宜鑿河引湖水入淮以通漕瑄以聞遂發軍民開河置四以時啓閉此即今日由城西入淮之運道也笠澤哀十七年越伐吳吳子禦之笠澤今太湖也亦謂之五湖周禮職方揚州藪具區浸五湖以周行五百里故名吳志東北則有建康常潤數郡之水自百瀆注之西南則宣歙臨安苕霅諸水自七十二漊注之源多流盛東西三百餘里南北一百二十里周五百里今江南蘇州府之吳吳江二縣常州府之武進無錫宜興三縣浙江湖州府之烏程長興二縣皆其所分𨽻也桐水哀十五年楚伐吳及桐汭杜注宣城廣德縣西南有桐水桐水在今江南廣德州西北二十五里源出州南白石山西北流經建平縣界又西入宣城縣界滙于丹陽湖入大江南畿志古郡名曰桐川曰桐汭越都㑹稽今為浙江紹興府山隂縣史記帝少康之庶子封於㑹稽以奉禹祀至周初受封為不成子韋昭曰周禮諸子之國封疆方二百里越不能成子言其國小也昭五年㑹楚伐吳事始見于經是時越地南至于勾無北至于禦兒東至于鄞西至于姑蔑蓋跨有錢塘之東西至勾踐歸吳吳又増其封東至于勾甬西至于檇李南至于姑末北至于平原縱横八百餘里禦兒在今嘉興府石門縣東二十里㑹稽越王城在紹興府南十二里越地鄞今浙江寕波府治鄞縣禦兒越地一名語兒在今浙江嘉興府石門縣東二十里姑蔑哀十三年越伐吳王孫彌庸見姑蔑之旗杜注東陽大末縣案越境西至姑蔑即秦置大末縣屬㑹稽郡晉改屬東陽郡今属衢州府龍㳺縣甬東哀二十二年越使吳王居甬東杜注勾章縣東海中洲是也案越境南至于勾無即此勾無即勾章越滅吳因大城之章霸功以示子孫故曰勾章秦置縣漢武帝遣横海將軍韓說出勾章浮海擊閩越是也故城在今寜波府慈谿縣西南三十五里海中洲即舟山夲朝置定海縣屬寕波府其地在故定海縣東北故定海縣錢氏置今改為鎮海縣地㝠哀十九年楚公子慶公孫寛追越師至㝠不及杜注越地案江西饒州府之鄱陽縣為楚餘干縣為越餘干即漢時餘汗越之餘也廣信府之弋陽貴溪二縣本餘干縣地此㝠地當在饒州廣信之間越山川㑹稽哀元年吳王夫差入越越子保于㑹稽㑹稽山名史記禹㑹諸侯于江南計功而崩因葬焉命曰㑹稽㑹稽者㑹計也水經注謂之古防山周禮所謂揚州之鎮也在今浙江紹興府㑹稽縣東南十二里海哀二十二年越使吳王居甬東杜注勾章縣東海中洲也越地東至于鄞今寕波府附郭鄞縣南至干勾無寜波府定海縣東南皆邊海范蠡曰吾先君濵于東海之陂吳晉黄池之㑹范蠡舌庸帥師沿海泝淮以絶吳路大江史記越兵横行于江淮東又楚世家越匕滅吳而不能正江淮北正義曰謂廣陵縣及徐泗等州是越地僅至江也淮水史記勾踐已平乃以兵北渡淮與齊晉諸侯㑹于徐州周元王命為伯勾踐已去渡淮南以淮上地與楚邾都邾今為山東兖州府鄒縣後改國號曰鄒因山為名鄒山周四十里在縣東南今鄒治為宋時所徙古邾城在縣東南二十六里遷於繹文十三年邾文公遷于繹杜注鄒縣北有繹山徙都于彼山旁山旁尚有舊邑也邾既遷都于此境内應别有繹邑宣十年公孫歸父帥師伐邾取繹必非取其國都當是取其别邑至哀七年魯師入邾處其公宫邾衆保于繹則棄城而棲山矣疏稱繹山在鄒縣北而今之繹山在縣東南二十五里蓋古時縣治在山南而今則徙于山北也文公徙都不過稍北數里邾邑訾婁僖三十三年公伐邾取訾婁胡傳及薛氏趙氏皆以為邾邑在兖州府濟寕州界漆襄二十一年邾庶其以漆閭邱來奔杜注邾二邑在髙平南平陽縣東北有漆鄉西北有顕閭亭定十五年城漆即此今鄒縣北有漆城閭丘在鄒縣南蟲昭十九年宋公伐邾圍蟲杜注邾邑當在今兖州府濟寕州境離姑昭三十三年邾人城翼還將自離姑武城人塞其前杜注邾邑孔穎達曰邾魯境界相錯邾人從翼還先經魯之武城然後始至離姑而後至邾今其地在費縣故武城之南濫昭三十一年邾黒肱以濫來奔杜注東海昌慮縣今昌慮故城在滕縣東南六十里絞哀二年伐邾將伐絞杜注邾邑在今滕縣境茅哀七年邾茅成子以茅叛杜注髙平西南有茅鄉亭在今兖州府金鄉縣西北四十里邾地翼𨼆元年公子豫及邾人鄭人盟于翼杜注邾地在今山東沂州府費縣西南九十里偃僖元年公敗邾師于偃虚邱之戍將歸者也杜注邾地在費縣南虚丘杜注邾地邾人戍虚丘欲以侇魯公要而取之在費縣界狐駘襄四年臧孫紇侵邾敗于狐駘杜注邾地魯國番縣東南有目駘亭哀二十七年越子使后庸來聘言邾田封于駘上即此今狐駘山在兖州府滕縣東南二十里漷東哀二年魯伐邾取漷東田及沂泗田沂西小沂水也句繹及邾子盟于句繹杜注邾地當在今鄒縣東南境哀十四年小邾射以句繹來奔即此髙氏列諸小邾地邾山川繹文十三年邾文公卜遷于繹杜注魯國鄒縣北有繹山一名嶧山在今兖州府鄒縣東南二十五里郭璞曰繹山純石積搆連屬如繹絲然故名水經注嶧山東西二十里漷水哀二年取漷東田及沂西田漷水出鄒山東則流于邾魯之間今滕縣南十五里有漷水即襄十九年取邾田自漷水者前所取未盡故邾復以胳魯沂水此小沂水也出太山武陽之冠石山今兖州府費縣為邾之沂此沂西田是也出曲阜縣尼邱山西北徑魯之雩門者為魯城南之沂曹點浴沂昭二十五年季孫請待于沂上以察罪是也出沂州府沂水縣西北一百七十里者為齊之沂襄十八年晉師東侵及濰南及沂是也禹貢淮沂其又係沂水縣之沂與邾魯之沂自别紀都紀在今山東青州府夀光縣莊四年紀侯大去其國自是紀亡於齊矣杜注紀國在東莞劇縣今縣東南三十里有劇城又紀城亦在縣東南後以酅入齊在今青州府臨淄縣莊二年紀季以酅入于齊紀于是乎始判杜注齊欲滅紀故季以酅入齊為附庸也國語齊桓公初立正封域東至于紀酅蓋特存之案齊都臨淄而酅即在臨淄之境則知桓公初年齊之東向地甚狹管仲云東至于海特夸詞耳迨滅紀滅郕後復稍併莒紀之地以自益至襄六年晏弱滅萊棠則盡有登萊之地東至于海矣杜注酅紀邑在齊國東安平縣今臨淄東十九里有安平城又酅亭亦在縣東紀邑浮來隠八年公及莒人盟于浮來成紀好也杜注紀邑東莞縣北有邳鄉邳鄉西有公來山號邳來問今沂州府蒙隂縣西北有浮來山與莒州接界郱莊元年齊師遷紀郱鄑郚杜注紀邑在東莞臨朐縣東南應劭曰一作駢後為齊大夫伯氏邑管仲奪伯氏駢邑三百即此今在青州府臨朐縣東南鄑杜注紀邑都昌縣西有訾城今在萊州府昌邑縣西北三十里郚杜注紀邑朱虚縣東南有郚城今青州府安邱縣西南六十里有郚山四面險絶其上寛平約數百里有古城遺址即郚城也晉朱虚縣在臨朐縣東六十里莒都莒今為山東訁州府莒州接江南界武王初封兹輿期于不知何年徙都此戰國時楚簡王滅莒地入于齊為莒邑齊湣王走莒即此初封介根今為山東萊州府髙宻縣即計也春秋初徙于莒而介根為莒邑襄二十四年齊侯伐莒取介根即此漢置計斤縣師古曰計斤即介根今縣東南四十里有計斤城莒邑宻隱二年紀子伯莒子盟于宻杜注莒邑城陽淳于縣東北有宻郷今莱州府昌邑縣東南十五里有宻鄉故城疑此時之莒尚都介根鄢陵文七年公孫敖如莒涖盟且為仲逆己氏及鄢陵登城見之羮自為娶之杜注莒邑在今沂州府沂水縣與鄭之鄢陵有别渠丘成八年渠丘公立于池上杜注渠丘公莒子朱也渠丘邑名莒縣有蘧里漢北海安丘縣孟康曰古渠丘也伏琛齊記亦云渠丘亭在安丘東北十里但非莒縣境與杜不合然地自相鄰安丘縣今屬青州府且于襄二十三年齊侯襲莒門于莒于明日復戰期于夀舒杜注莒邑在今莒州境夀舒杜注莒邑亦屬莒州蒲侯氏杞殖華還載甲宿于莒郊明日先遇莒子于蒲侯氏杜注近莒之邑大龎昭元年莒務婁瞀胡以大龎及常儀靡奔齊常儀靡杜注莒二邑當在莒州北境防昭五年莒牟夷以牟婁及防兹來奔杜注莒邑城陽平昌縣西南有防亭今青州府安丘縣西南六十里有故平昌城防亭亦在縣西南兹杜注莒邑姑幕縣東北有兹亭今青州府諸城縣西四十里有姑幕城兹亭在其境牟婁見杞地紀鄣昭十九年齊人伐莒莒子奔紀鄣杜注莒邑東海贑榆縣東北有紀城案贑榆縣今屬江南海州縣北七十五里有古紀鄣城郠昭十年季孫意如伐莒取鄭杜注莒邑當在今沂水縣界莒地向僖二十六年公㑹莒子衛甯速盟于向杜注莒地寰宇記曰莒州南七十里有向城與沂州府治接界案向本小國隱二年莒人入向杜注龍亢縣東北有向城龍亢故城在今江南鳳陽府懷逺縣西北八十五里古向城在縣東北四十五里江南通志收入臨淮縣二縣本相接夀餘昭二十二年莒敗齊師于夀餘杜注莒地當在青州府安邱縣境虞都夏墟今為山西解州之平陸縣在河之北譜云武王封虞仲之庶孫為虞仲後處中國為吳史記武王封周章弟虞仲于周之北故夏墟與荆蠻勾吳為兄弟杜注虞在河東大陽縣唐改曰平陸今縣東北四十里有古虞城虞邑鄍僖二年晉苟息曰冀為不道入自顛軨伐鄍三門杜注虞邑今山西解州平陸縣東北二十五里有故鄍城虞地共池杜注闕今平陸縣西四十里許有共池與讓畔城相近志云虞公出奔地顛軨在平陸縣東北五十里三門在平陸縣東五十里即砥柱之三門也見山川虞山川顛軨僖二年晉伐虢假道于虞曰冀為不道入自顛軨伐鄍三門杜注大陽縣東北有顛陵坂顛軨在今山西解州平陸縣東北五十里自上及下七山相重東西絶澗至為險仄亦曰虞坂戰國䇿騏驥止于虞坂而不能進是也三門即禹貢之砥柱山在今解州平陸縣東五十里河流至此山有三門南曰鬼門中曰神門北曰人門水經注禹破山以通河謂之三門共池桓十年虞公出奔共池杜注地名闕今山西觧州平陸縣西四十里許有共池志云虞公出奔地山海經曰甘棗之山共水出焉西流至于河虢都上陽在今河南陜州東南周文王弟虢叔始封在陜西鳳翔府寳雞縣東六十里東遷後為秦之雍地漢書虢縣注云雍為西虢是也隱元年鄭人以王師伐衛杜注𢎞農陜縣東南有虢城則從平王東徙後所封矣虢邑下陽僖二年虞師晉師滅下陽杜注虢邑在河東大陽縣今大陽廢縣在今西解州平陸縣東五十里又東北三十里為故下陽城虢地玤莊二十一年王巡虢守虢公為王宫于玤杜注虢地在今河南河南府澠池縣界莘莊二十二年有神降于莘杜注虢地今河南陜州硤石鎮西十五里莘原是也渭汭閔二年虢公敗犬戎于渭汭杜注水之隈曲曰汭案渭水入河處在今陜西同州府華隂縣乃虢之西境桑田僖二年虢公敗戎于桑田杜注虢地在𢎞農陜縣東北今河南陜州靈寳縣西二十五里稠桑驛即其地虢山川虢山不見傳僖十五年晉侯許賂秦伯東盡虢略杜注從河南而東盡虢界元豐志自河南府西南抵虢州界三百二十五里稍南抵鄧州界六百里皆髙山深林古虢略也据此則晉桃林之塞以前當屬虢但傳無明文耳渭汭閔二年虢公敗犬戎于渭汭杜注渭水出隴西東入河渭水出陜西臨洮府渭源縣界鳥䑕山西北谷東流經盩厔興平咸陽渭南至華隂縣入河渭水入河處乃虢之西境也案昭二十三年萇𢎞曰周之亡也三川震杜注涇渭洛水也三川舊屬西周後涇水屬秦渭水屬虢旋屬晉惟洛水出陜西慶陽府北其入河處謂之洛汭在今河南府鞏縣東北三十里則猶為周地耳杞都淳于在今山東青州府之安邱縣案淳于本州國地桓五年冬經書州公如曹傳曰淳于公度其國危遂不復淳于本州國之都而杞居之是亡州者杞也然隠三年州未亡莒人所取之牟婁已在東土與淳于為鄰杞本弱小不應立國雍邱而遥屬小邑于千數百里之外則知春秋之前杞早居于東土矣女叔齊曰杞夏餘也而即東夷邾莒以東皆夷特未詳其何地耳今青州府安邱縣東北三十里有淳于故城遷於縁陵在今青州府之昌樂縣亦曰營陵路通登萊僖十四年諸侯城縁陵蓋是時淮夷病杞齊桓遷之稍北以自近如楚遷許於葉吳遷蔡於州來然杜注杞地則仍為杞地之錯入於齊者耳至襄二十七年杞復遷淳于案是年晉合諸侯之大夫城杞祁午數趙文子之功曰城淳于蓋城杞即城淳于是杞復遷淳于之証也今縣東南三十里有營陵故城杞邑牟婁隱三年莒人伐杞取牟婁杜注杞邑城陽諸縣東北有婁鄉自隱三年後地屬莒昭五年莒牟夷以奔魯今青州府諸城縣東北有婁鄉城與安邱縣接境無婁宣十五年仲孫蔑㑹齊髙固於無婁杜注杞邑公羊作牟婁蓋即莒人所取然此時已為莒邑杜注疑有誤庸都上庸今為湖廣鄖陽府竹山縣文十六年楚大饑戎伐其西南庸人率羣蠻以叛楚麇人率百濮聚于選楚使廬戢棃侵庸方城又與之遇七遇皆北惟禆鯈魚人逐之庸人遂不設備楚人秦人巴人滅庸楚自此益彊今縣東四十里有上庸故城庸邑禆鯈魚杜注庸三邑魚魚復也漢置魚復縣公孫述改號曰白帝城先主改曰永安蕭梁置信州唐改夔州今為四川夔州府治奉節縣庸地方城杜注庸地上庸縣東有方城亭今竹山縣東四十五里有方城山上平坦四面險固山南有城周十餘里即春秋時庸方城也麇都錫穴今為湖廣鄖陽府治鄖縣文十一年潘崇伐麇至錫穴杜注麇地蓋即麇之國都錫音陽至十六年楚伐庸麇人率百濮聚于選則麇猶存蓋庸在上庸為今竹山縣麇有錫穴及防渚為今之鄖縣房縣俱屬鄖陽府為接壤庸滅而麇亦不復存矣今與陜西四川俱接界麇地防渚文十一年楚子伐麇成大心敗麇師于防渚杜注麇地杜佑曰房陵即春秋時麇國地所謂防渚者也秦始皇徙趙王遷于房陵即此建安十四年先主遣孟達攻下房陵又使劉封自漢中乗沔水㑹達攻上庸太守申耽降後孟達據房陵降魏蓋隴蜀咽喉蜀魏所必爭之地也今為鄖陽府房縣明季流賊張獻忠居穀城羅汝才居房縣既降復叛遂潰爛天下蓋幅貟曠逺接壤四川為藏慝伏奸之地穀城屬襄陽府今有鎮臣駐劄徐都下邳在今江南泗州自兩漢迄南北朝皆曰徐縣左傳杜注徐國在下邳僮縣東南漢書志臨淮郡徐縣春秋時徐國昭三十年徐子章禹為吳所滅今泗州北八十里有古城相傳為徐偃王築地與虹縣接徐地婁林僖十五年楚敗徐于婁林杜注徐地在今江南泗州境後漢書志下邳國徐縣有樓亭或曰古蔞林伏滔北征記曰縣北有大冢徐君墓延陵觧劍之處蒲隧昭十六年齊師伐徐至于蒲隧杜注徐地取慮縣南有蒲姑陂在今鳳陽府虹縣北北燕山川濡水昭七年齊燕盟于濡上杜注濡水髙陽縣東北至河間鄚縣入易水水經注濡水出蒲隂縣南枉渚廽湍率多曲復亦曰曲逆水漢封陳平為曲逆侯即此曲逆縣章帝改曰蒲隂縣其故城在今直隷保定府完縣東南二十里是濡水之上源矣濡水在今安州任邱間右春秋列國都邑山川閻氏若璩四書釋地附康康誥大學引者四孟子引者二孔安國書傳以康誥之康為圻内國名逺勝鄭康成作謚號觧嘗證以二事一定四年命以康誥而封於殷墟當既有誥文輒有篇名豈待身後之謚取以冠其篇乎一史記衞世家康叔卒子康伯伐立父謚康子亦謚康將兩代同一易名之典乎故世本宋忠注曰封從畿内之康徙封衛衛即殷墟畿内之康不知所在也讀括地志云故康城在許州陽翟縣西北三十五里陽翟今禹州正周畿内地淇竹詩集傳淇奥篇淇上多竹漢世猶然此自謂漢武帝下淇園之竹以塞决河冦恂伐淇園之竹為矢以給軍耳酈道元云今通望淇川無復此物又可證朱子止及漢之故然未遡其所由始惟晉戴凱之言淇園衛地殷紂竹箭園也見班彪志今無此文毛詩所詠瞻彼淇澳綠竹猗猗是北土寒冰至冬地凍竹根類淺故不能植惟䈛音夬竹根深故能晚生故曰根深耐寒茂被淇苑然則毛詩之所謂綠竹者乃䈛竹非常竹也南山詩詠南山不必盡有指實而可指實者二焉一曹南之山郡縣志在曹州濟隂縣東二十里南山朝隮是也今曹縣一終南之山郡縣志在京兆府萬年縣南五十里如南山之夀幽幽南山節彼南山信彼南山是也今在長安咸寜藍田盩厔四縣秦誓秦誓篇史繋於封殽尸為𤼵䘮哭之後書序則謂敗殽還歸而作王伯厚亦莫能折衷但云二書各不同金仁山竟從史余以左氏傳考之誓當作於僖三十三年夏秦伯素服郊次鄉師而哭之日不作於文三年夏封殽尸將霸西戎之時蓋霸西戎則其志業遂矣豈復作悔痛之辭哉殽晉之南境從秦嚮鄭路必經之括地志云二殽山一名嶔崟在洛州永寜縣西北二十里即古之殽道蘇代謂之殽塞淮南王安謂之殽阪司馬遷謂之殽阨馮異謂之殽底孔穎達謂之殽關元和志謂東殽三十五里在秦關之東漢關之西是也華嶽中庸載華嶽而不重華山名嶽亦山名蓋舉二山下故對以二水在禹貢名岍在國語名西吳管子書作西虞在前漢志名吳山後漢志名吳嶽山實一山也周禮豫州山鎮曰華雍州山鎮曰嶽爾雅釋山河南曰華河西曰獄皆並配對舉則中庸可知矣杞杞不足徴此時之杞非復周武王初封東樓公之杞國也初封杞即今開封杞縣索隠曰至春秋時杞已遷東國雖未知的都何所要隠四年莒人伐杞取牟婁桓二年七月杞侯來朝九月伐杞入之與今之莒州及曲阜縣相鄰可知逮桓六年淳于公即經所稱州公者其國亡杞似并之杜元凱曰遷都於淳于僖十四年杞辟淮夷諸侯為城焉杜元凱曰又遷于緣陵襄二十九年晉合諸侯以城杞即昭元年祁午數趙文子之功云城淳于者杜元凱曰杞又遷都淳于淳于漢置縣屬北海郡其故城一名杞城在今青州安邱縣東北三十里其遺趾宛然縁陵杜止註杞邑臣瓚曰漢北海之營陵縣春秋謂之縁陵以余考殆今昌樂縣東南五十里營邱城是蓋杞當春秋去初封已千有餘里而顛沛流離賴人之力以圖存史記一則杞小微其事不足稱述再則杞微甚不足徴也鄹人之子鄹魯邑名今則在鄹縣界鄹人之子乃孔子少賤時之稱集註此蓋孔子始仕之時入而助祭也最當始仕即指孔子年二十為委吏二十一為乗田吏言方與少賤稱相關合或曰二者何等卑職敢駿奔走於廟中余曰觀祭統煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也皆以有事于宗廟尸以其餘畀之則委吏若周禮之委人共祭祀之薪蒸木材乗田吏周禮之牛人羊人牛人凡祭祀共其牛牲之互與其盆簝以待事羊人凡祭祀飾羔祭祀割羊牲祭其首者也非無與於廟事其應在羣有司之列可知獨當祭時魯君在前卿大夫侍從雝雝肅肅安得容一少且賤者呶然致辭說哉故顧瑞屏以為子入廟當是隔日宿齊始可每事問者是魯昌平鄉陬邑太史公曰孔子生魯昌平鄉陬邑是以國統鄉以鄉統邑昌平本山鄉蓋以山得名括地志云在兖州泗水縣南六十里故鄒城在泗水縣東南六十里故闕里又在縣南五十里此則以曲阜之闕里名其地非真闕里也真闕里伍緝之曰背洙面泗儀孔子時衛都濮陽為今大名府開州生平凡五至衛焉第一去魯司冦輒適衛第二將適陳過匡過蒲皆不出衛境而反衛第三過曹而宋而鄭而陳仍適衛第四將西見趙簡子未渡河而反衛第五如陳而蔡而葉復如蔡而楚仍反乎衛儀邑城在今開封府蘭陽縣西北二十里乃衛西南境距其國五百餘里不知孔子先至國而後儀邑或由儀邑而國都皆不可知要為第一次適衛時事則無疑何則封人曰二三子何患於䘮乎䘮失位去國也天將以夫子為木鐸使周流四方以行其教天生夫子豈為一魯國已乎其語與情踪正合觀承案木鐸二字下得絶竒集註原有兩說然前說颟頇儱侗反不如後說清切得此閻氏一說并失位二字亦有着落而天下二字乃非泛然更覺神理針鋒一一相對以補集註之缺可也汶沂曾氏曰汶有徐州之汶有青州之汶余謂沂亦有徐州之沂有青州之沂周禮青州其浸沂此用周禮論語在汶浴沂皆指徐州言以魯事也汶出㤗山萊蕪縣原山西南入泲與出琅邪朱虚縣東㤗山即今東鎮沂山至安邱入濰者别沂出魯魯縣尼邱山西北逕魯之雩門注於泗水與出㤗山蓋縣艾山南至下邳入泗杜預所謂大沂水者别葉葉楚縣名故城距今南陽府葉縣治二十里中有沈諸梁祠有方城山屈完曰楚國方城以為城即此越王無疆曰夏路以左劉氏注楚適諸夏路出方城人向北行以西為左故云夏路以左括地志楚嘗爭霸中國連山累石於此以為固號曰方城一謂之長城蓋春秋時楚第一重地也宜以沈諸梁鎮撫焉互鄉云互鄉所在者頗多獨王伯厚引王無咎云亳州鹿邑縣外有互鄉城邑人相傳謂童子見孔子即其處前代因立互鄉縣其城猶存余謂州縣建置事關朝廷名雖或革跡猶可尋因檢新舊唐書杜氏通典隋地理志鹿邑名縣始隋開皇十八年此後未見有析置互鄉事雖伯厚語恐未足憑荆蠻吳集注仲雍與泰伯同竄荆蠻又云仲雍居吳不達者遂以吳與荆蠻為二地實則一地寰宇記今常州無錫縣東南四十里有吳太伯城髙忠憲所謂梅里平墟為泰伯端委之地是也下逮吳王僚二十三君並都此惟闔閭元年始築吳郡城徙都之今蘇州城通典吳之都其南百四十里與越分境余謂此必指檇李賈逵曰檇李越地班固曰故就李鄉吳越戰地今嘉興府西南有檇李城越王勾踐既棲㑹稽後越語紀其地曰北至於禦兒此又指石門縣之語溪殆詩所謂今也日蹙國百里乎匡禮記檀弓疏曰陽虎嘗侵暴於匡時又孔子弟子顔刻為陽貨御車後孔子亦使刻御車從匡過孔子與陽虎相似故匡人謂孔子為陽虎因圍欲殺之與漢包咸注同足觧孔子世家顔刻為僕以䇿指匡曰昔吾入此由彼缺也一段不明處匡地名今大名府長垣縣西南一十五里有匡城川上子在川上相傳即泗水𤼵源處今之泉林寺在泗水縣東五十里陪尾山下四源並𤼵寺之左右大泉十數泓渟澄澈互相灌輸㑹而成溪是為泗水長府左傳昭二十五年公居於長府杜注長府官府名九月戊戌伐季氏遂入其門長府今不知所在意其與季氏家實近公居焉出不意而攻之論語鄭註長府藏名也藏財貨曰府又意公微弱將攻權臣必先據藏財貨之府庶可結士心亦一觧後反覆尋究始得之蓋應劭曰曲阜在魯城中委曲長七八里酈道元曰阜上有季氏宅宅有武子臺臺西北二里為周公臺周公臺南四里許為孔廟即夫子之故宅也然則今知得孔廟所在則可以知季氏宫由季氏宫又可想像而得長府地莒父莒父鄭康成謂舊說云莒父魯下邑明明見春秋定公十有四年秋經文城莒父及霄何得但云舊說杜氏注公懼而城二邑者以叛晉助范氏故是時荀寅士吉射據朝歌晉人圍之魯與齊衛謀救之朝歌在魯正西將八百里則莒父屬魯之西鄙子夏為宰邑去其家宻邇要亦約略言之爾駢邑三百集註引荀子與之書社三百而富人莫之敢距以證駢邑三百而三百字為數方明蓋孔子世家索隠曰古者二十五家為里里各立社書社者書其社之人名於籍楚以七百里書社之人封孔子也則書社三百乃七千五百家駢邑今臨朐縣是管仲所食之邑不止於此此特其一爾余因悟昭王將以書社地七百里封孔子朱子疑七百里恐無此理不知里也社也一也二十五家耳七百二十五家乃萬七千五百家非如古者路程以三百歩為里之里然孔子得之即足以王故子西以為不可今論語序說節其文為以書社地封孔子去七百字書社將何所著然則哀十五年齊與衛地書社五百晏子昔先君桓公以書社五百封管仲呂氏春秋越以書社三百封墨子苟去却五百三百字其可得通乎石門論語子路宿於石門或曰石門齊地隠公三年齊鄭㑹處即此非也讀太平寰宇記古魯城凡有七門次南第二門名石門案論語子路宿於石門註云魯城外門蓋郭門也因悟孔子轍環四方久使子路歸魯視其家甫抵城而門已闔只得宿於外之郭門次日晨興伺門入掌啟門者訝其太蚤曰汝何從來乎若城門既大啟後徃來如織焉得盡執人而問之此可想見一自孔氏言自孔氏處來也夫不曰孔某而曰孔氏以孔子為魯城中人舉其氏輒可識不如答長沮之問為孔某此可想見二是知其不可而為之者與分明是孔子正栖栖皇皇歴聘於外若已息駕乎洙泗之上不必作是語此可想見三總從魯郭門三字悟出情踪誰謂地理不有助於經學與闕黨闕里闕黨黨名亦猶達巷亦黨名也闕里里名亦猶史記孔子世家有孔里亦里名也闕黨案兖州府志在府城東北一里有泉亦以此名荀子稱仲尼居於闕黨闕黨之子弟以化是也闕里在曲阜縣城中至聖廟之東梅福稱今仲尼之廟不出闕里是也然闕里亦有二一在魯城中一在泗水縣南五十里以孔子生於此遂以闕里名之見史記索隠正義闕里家語顔繇字季路少孔子六歲孔子始教於闕里而受學焉朱子引入集注作孔子始教而受學焉削去闕里字此朱子所以為精於地理也孔子時無闕里之名闕里首僅見漢書梅福傳東漢後方盛稱之蓋縁魯恭王徙魯於孔子所居之里造宫室有雙闕焉人因名孔子居曰闕里或曰有徴乎余曰一徴於水經注孔廟東南五百歩有雙石闕即靈光之南闕一徴於史晨饗孔廟後碑以今日拜孔子望見闕觀式路䖍跽既至升堂爾時闕尚存尚可得其名里之由顧氏肇域記於曲阜縣則引魯世家煬公築茅闕門謂已有闕之名不知此自魯兩觀魯象魏在雉門之旁者春秋所謂雉門及兩觀灾是也豈孔子士庶而敢居於外朝之地哉比而同之誤矣讀集注者要須心知其意於此益悟家語果王肅私定以難鄭元而非朱子所恨不見之古文家語何則古文家語那得有闕里字而有之應出王肅手豈非知其意者由於論其世也哉朱子削而存之有以夫柳下卞今泗水縣莊子為邑大夫子路即其治民武城今在費縣子路為之宰曾晢父子澹臺滅明皆其治民展禽為魯公族居應於曲阜而食邑則在栁下柳下今不可的知所在以顔斶言秦攻齊令有敢去柳下季壟五十歩而樵採者死不赦證之古人多葬於食邑壟所在即邑所在則栁下者自當在齊之南魯之北二國壤接處方昔為魯地後為齊有也固而近於費前漢志顓臾國在泰山郡蒙隂縣蒙山下費縣為魯季氏邑則屬東海郡杜氏通典總收於沂州費縣下曰有䝉山有東䝉山有顓臾城又有子㳺所宰之武城余讀酈注沂水條云沂水從臨沂縣東流逕䝉山下又東南逕顓臾城北又東南流逕費縣故城南案其里程相距纔七十里故曰近東䝉東蒙山名即書之䝉羽其藝詩之奄有龜䝉之䝉也自元和志誤析為二謂在沂州費縣西北八十里者䝉山在費縣七十里者東蒙山相距僅五里覺論語與書詩遂各有所屬余舉漢地理志䝉隂縣注曰禹貢䝉山在西南有祠顓臾國在䝉山下證其為一山也首陽史記正義首陽山凡五所王伯厚攷曾子書以為在蒲阪舜都者得之余謂莫徴信於酈注然已兩說互存既云河北縣雷首山今在蒲州有夷齊廟闞駟十三州志曰山一名獨頭山夷齊所隠也山南有古冢陵柏蔚然攒茂邱阜俗謂之夷齊墓又云平縣故城有首陽山今在偃師縣春秋所謂首戴也夷齊之歌所矣曰登彼西山上有夷齊之廟蓋莫能定爾總之認餓為失國而餓兩地皆可遯跡認餓為恥食周粟則寜死乎唐虞揖遜區不知恥食周粟者必無之事也微箕微箕二國名鄭康成以為俱在圻内今潞安府潞城縣東北一十五里有㣲子城遼州榆社縣東南三十里有古箕城皆其所封地疑近是余獨慨有周御世文物一新㣲子國於宋箕子封於朝鮮雖各待以不臣而回首故封頓成墟里此他日微箕二子咸有麥秀之悲也河河内大師摯適齊章集注河河内漢漢中海海島也並本邢疏𦂳貼入字作解以為妙矣而河内之解則大不可蓋古所謂河内者在冀州三面距河之内非若漢郡之但以懷汲為河内史記正義曰古帝王之都多在河東河北故呼河北為河内河南為河外又曰河從龍門南至華隂東至衛州東北入海曲繞冀州故言河内豈此鼓方叔當日去魯真入冀州河之北平抑不過居於河之濵即曰入乎且認煞入字勢必如關闗雎鳩在河之洲水中可居者曰洲又必如汎彼柏舟在彼中河中河之中也然後可此豈人所居處者哉疏義至此鑿矣拘矣或來詰曰國語昔殷武丁能聳其德至於神明以入於河自河徂亳韋昭解入於河曰遷於河内入字不嘗作如是解耶余獨以為否否蓋盤庚自河北而河南都亳殷皇甫謐以為今偃師是三傳至於武丁仍都亳殷白公所謂以入於河自河徂亳者乃武丁為王子時其父小乙欲其知民之艱苦使居民閒遷徙不常故自河外入河内復自河内徃河外此入于河却確指河内言非同魯論孟子謂讀其書者當論其世余則謂并當論其地也明堂靈臺封禪書初天子封泰山泰山東北阯古時有明堂處是古明堂至漢武帝時猶有遺蹤括地志辟雍靈沼今悉無復處惟靈臺孤立髙二丈周囬一百二十歩是周靈臺至唐太宗時猶存河東河内梁河東今之安邑等縣梁亦有河西六國表魏入河西地於秦是也梁河内今之河内濟源等縣梁亦有河外蘇秦傳大王之地北有河外注云謂河南地是也河東西亦謂之河内外左傳僖十五年賂秦伯以河外列城五内及解梁城魏世家無忌曰所亡於秦者河外河内是也至河内外則梁之河北河南地蘇代曰秦正告魏我陸攻則擊河内水攻則滅大梁是然則梁之地自河西逶迤而至河南幾將二千里何以蘇秦曰魏地方千里蓋從長而横不足絶長補短算耳然已比韓猶大比趙實小是以文侯武侯用之則為天下疆惠王襄王用之則弱於天下國勢固在於主德哉文王囿七十里從來說者皆以文王七十里之囿為疑曰那得有如許地大余亦疑者久之近考得其說蓋三輔黄圖云靈囿在長安縣西四十二里王伯厚以文王之囿方七十里注於下余謂在今鄠縣東三十里正漢地理志所謂文王作酆注今長安西北界靈臺鄉酆水上是杜氏左傳注酆在鄠縣東有靈臺有鄠杜竹林南山檀柘號稱陸海為九州膏腴者文王當日弛以與民恣其芻獵以徃但有物以蕃界之遂名之曰囿云爾此實作邑於豐時事非初岐山事也豐去岐三百餘里善乎榖梁傳云山林藪澤之利所以與民共也虞之非正也注虞典禽獸之官言規固而築之又置官司以守之是不與民共同利曾謂文王當日而如是乎後漢武帝建元中舉籍盩厔鄠杜除以為上林苑屬之南山即其處但武帝為已之禽荒較文王以利民者異一武帝為已之行幸更衣較文王以講武者異二武帝周袤三百里中容千乗萬騎且較文王三倍而贏矣異三武帝時盡化為腴產其賈畆一金規以為囿殊可惜故來東方朔之諫若文王則初闢土亦猶天作高山太王荒之者縱民芻獵而不禁豈不適相宜異四說者不察乎囿之所在又不通古今情事之異徒執以岐山國僅百里不知文王由方百里起耳豈終於是者哉或曰以榖梁傳所云里數計今之六十二里遂當古之百里故左傳黄人謂自郢及我九百里今自江陵至光州僅七百里邾子謂吳二千里不三月不至今自蘇州至鄒縣僅一千五百里則周時七十里之囿今僅四十三里參以毛詩傳囿所以域養禽獸諸侯四十里恰合此四十里又與今合古書籍所云里數原具有兩說此又一說云雪宫齊宣王見孟子於雪宫解者謂雪宫孟子之館宣王就見於此因誇其禮遇之隆賢者指孟子與上文梁惠王賢者指人君言不同果爾孟子當正色而對以明不屑安得含胡曰有而即引之與民同也元和郡縣圖志齊雪宫故址在青州臨淄縣縣即其故都東北六里晏子春秋所謂齊侯見晏子於雪宫今晏子春秋無此語然則先孟子雪宫又為晏嬰館舍耶蓋齊離宫之名㳺觀勝迹宣延見孟子於其地非就見之謂又管晏孟子羞稱兹以與民樂忽詳及晏子對景公一段故實蓋亦以此地曾為先齊君臣共㳺觀以近事為鑒則言易入此又須㑹於言外轉附朝儛趙注琅邪齊東南境上邑集注因之漢郊祀志作在齊東北非也今諸城縣東南一百五十里有琅邪山山下有城即其處余曾徧考轉附朝儛二山杳不知所在惟趙氏德南宋人有轉附附作鮒屬萊州之說殊無依據妄意此二山當在海之東盡頭如成山召石山之類登之可以觀海惟至海盡頭然後回轍循海之濵西行以南至琅邪亦可觀海焉計其自齊都臨淄一千三百里抵於海復自海一千一百餘里至琅邪凡二千四五百里以春秋之侯封而騁其雄心肆其逺略如此真從前所未有後惟秦始皇二十八年並讀曰傍渤海以東徃東也過黄今黄縣蓬萊縣腄今福山縣棲霞縣窮成山在文登縣封禪書成山斗入海登之罘在福山縣蓋囬鑾也南留琅邪三月三十七年自琅邪北至榮成山正義曰即成山射巨魚之罘遂並海西至平原津今平原縣漢武帝太始三年行幸琅邪禮日成山登之罘浮大海司馬相如賦曰齊東陼鉅海南有琅邪觀乎成山射乎之罘正暗用秦皇之事或曰今青州為齊地若萊州則萊子國登州則牟子國皆非齊有景固可以任其車轍馬跡所之乎余曰萊子城在黄縣東南二十五里國已滅靈公十五年所以晏子對景公言聊今聊城縣攝今博平縣以東姑尤以西姑大沽河尤小沽河一出黄縣一出掖縣實齊之東界也指畫明析如是惟今寜海州文登縣尚屬牟子國要亦不過蕞爾附庸素服役於彊大者晏子所謂為諸侯憂正指此等何難登其山而臨其海乎水滸孟子太王去邠踰梁山邑於岐山之下居焉云山而不及水詩詠古公辟狄率西水滸至于岐下云水而不及山太史公生當後合而作周本紀曰遂去豳渡􅃮沮踰梁山止於岐山將自邠抵岐東南二百五十餘里登山渉水敘次如畫然程大昌雍録謂渭水實在梁山下之南循渭西上可以達岐則詩水字又與􅃮沮無干似益精確矣梁山雍州有二梁山一在今韓城郃陽兩縣境書治梁及岐詩奕奕梁山春秋梁山崩爾雅梁山晉望也皆是於孟子之梁山無渉孟子梁山則在今乾州西北五里其山横而長自邠抵岐二百五十餘里山適界乎一百三十里之閒太王當日必踰此山然後可遠狄患營都邑改國曰周古諸侯國名雖曰受之天子傳之祖宗而隨在易名初不以為嫌如唐叔虞一傳而子燮改國為晉魏侯罃國於梁韓哀侯國於鄭曰鄭無後代所為同家異國之說後秦始皇幸梁山宫從山上見丞相車騎甚衆弗善亦此梁山也齊滅薛余向主孟子之滕與文公言當在赧王元二間丁未戊申爾時薛滅已久非至是齊始取其地而城之也六國表田齊世家孟嘗君傳並云湣王三年庚子封田嬰於薛實通鑑顯王四十八年事薛不滅無由以薛封靖郭君嬰不封無由薛城中有靖郭君冢此事理至易明者薛滅已八九年齊方於此築城戰國策載靖郭君將城薛矣以客海大魚之諌乃輟城薛何妨至是復欲城且將之為辭事未定也孟獻城虎牢而鄭人懼晏弱城東陽而萊子服文公焉得而不恐哉微仲微畿内國名孔安國傳亦云嘗思微子既國於此其長子應曰微伯蚤卒有子名腯次子曰微仲名衍即後國於宋者以周禮適子死立適孫次子不得干焉微子則從其故殷之禮舍己之長子之子腯而立己次子衍故微仲實微子之第二子非其弟也此與子服伯子引以况公儀仲子者脗合其證一班固古今人表於微子下注曰紂兄宋微中下注曰啟子其證二啟既殷帝乙之元子衍果屬次子王畿千里豈少閒土斷無兄弟並封於一國之理其證三則知微仲也者子襲父氏上有伯兄字降而次氏者胙之土而命之氏字者五十以伯仲之字也不意包爾庚時文亦云微仲者微子之次子也無國邑而稱微從父爵也厥後襲封宋公終身止稱微仲忠孝之義也又云啟為長兄分稱元子仲為支庶屬則王孫不覺擊節如得一真珠船矣歴山河濵雷澤舜耕於歴山歴山所在多有以宋河東縣今蒲州者為是陶於河濵陶之所在何必定陶且定陶以邱名以括地志陶城在河東縣北三十里為是漁於雷澤雷澤與禹貢合即宋雷澤縣在今濮州之東南是平陸平陸為齊邊邑六國表田齊世家康公貸十五年魯敗我平陸徐廣曰東平陸縣余謂漢屬東平國為古厥國孔子時為魯中都邑地爾時屬齊即今汶上縣是又有陶平陸則梁門不開張守節曰平陸唐兖州縣即中都在大梁東界故曰平陸齊邊邑也靈邱靈邱亦屬齊邊邑趙世家敬王二年敗齊於靈邱六國表敬侯九年魏武侯九年韓文侯九年因齊䘮共伐之至靈邱又趙世家惠文王十四年樂毅將趙秦韓燕攻齊取靈邱明年燕獨深入取臨菑加以蚳鼃去王逺無以箴王闕特辭靈邱請士師足徴為邊邑但實不知其所在耳時趙别有靈邱以葬武靈王得名即今靈邱縣孝成王以靈邱封黄歇絳侯擊破陳豨於靈邱皆其地注史記者以此之靈邱為齊之靈邱無論齊境不得至代北而敬侯時安得國有靈邱胡三省注齊靈邱又以漢清河郡之靈縣當之抑出臆度母寜闕疑蓋孟子蓋大夫王驩與兄戴蓋祿之蓋同音集注於前云齊下邑後云陳氏食采邑當是二邑宋王伯厚謂漢泰山郡蓋縣故城在沂州沂水縣西北僅一處無二地頗不可解後讀左氏春秋傳趙衰為原大夫於時先軫亦稱原軫子趙同為原同於時先縠亦稱原縠唐孔氏曰蓋分原邑而共食之僖二十五年狐溱為温大夫文六年陽處父至自温故成十一年劉子單子曰襄王勞文公而賜之溫狐氏陽氏先處之亦共食一邑者因悟蓋一也以半為王朝之下邑王驩治之以半為卿族之私邑陳氏世有之然則當時蓋亦大矣嬴余嘗愛京山郝氏解孟子為行三年之䘮但以誤認邑名遂不合禮制成辨一篇曰或問孟子歸葬於魯時未幾也充虞治木言前日耳輒反於齊豈不終䘮而遂復為齊卿平案䘮禮三日成服杖拜君命及衆賔不拜棺中之賜禮凡尊者有賜則明日徃拜䘮則孝子不忍遽死其親故贈禭之賜拜於葬後孟子奉母仕於齊母卒王以卿禮含禭及歸魯三月而葬反於齊拜君賜也其止于嬴何也禮衰絰不入公門大夫去國踰竟為壇位鄉國而哭此䘮禮也故自魯越國至齊境上為壇位成禮於嬴畢將遂反也解者不悉謂孟子勸人行三年䘮而身違之又罪萬章之徒脩文不善可謂逐臭李覯左袒臧倉者矣余考或問及解者二段俱出郎瑛七修類槀亦能疑人所未疑者而特不能辨釋郝氏從而辨釋之可謂精矣少錯解止於嬴句嬴齊南邑春秋桓三年公㑹齊侯於嬴杜注云嬴今泰山嬴縣案嬴縣故城在萊蕪縣西北四十里北汶水之北去齊都臨淄尚三百餘里豈有拜君賜於三百餘里之外者乎且衰絰不入公門未聞不入國門也為壇位而哭乃出亡禮非䘮者所用蓋孟子母殁於齊及奉䘮來歸皆哀戚匆遽無暇可語惟至徃齊拜賜舍於逆旅始得以一論匠事耳以論匠事於止嬴日故繋止於嬴亦猶與公孫丑論不受祿於居休日故繫以居休豈必别有義在乎禮斬衰唯而不對齊衰對而不言孟子居母䘮正齊衰故猶答充虞以言而但不先𤼵言於人耳夫一唯一對猶致謹不失如此曾謂孟子奪䘮復仕若當時莫之行者一軰所為哉亦太誣矣郝氏之亟正也固宜又曰或問子以孟子奉母仕于齊其說亦有徴乎余曰徴之劉向列女傳傳云孟子處齊有憂色擁楹而歎孟母見之云云則知母蓋同在齊自齊葬於魯則知母即殁於齊也然則既殁而葬宜終䘮於家曷為而遽反於齊余曰此蓋終三年䘮復至齊而為卿耳非遽也果爾何以為前日解余曰孟子之書有以昔與今對言昔似在所逺而有指昨日者昔者辭以疾是也以前日與今對言前日似在所近而亦有指最逺者前日願見而不可得是也夫孟子久於齊而後去去齊之日上溯其未㳺齊之日猶目之為前日安在僅三年者而不可目以前日耶或訝曰充虞蓄一疑於心至三年始𤼵之與余曰此尤足以見孟門弟子之好問也陳臻從於齊於宋於薛辭受之後而問屋廬子從居鄒處平陸以至見季任不見儲子之後而問其事之相距誠非止一二年而歴歴記憶反覆以究其師之用心者猶一日也夫充虞亦猶是爾且尤可證者孝子之䘮親言不文今也援古論今幾於文矣三年之䘮言而不語語為人論說也後魏孝文帝以與公卿徃復追用慟絶曰朕在不言之地不應如此喋喋然則孟子反喋喋邪見顧出孝文下邪故充虞問答斷自於免䘮之後者為得其實也或又訝曰向所稱郝氏之解非與曰非也曷徴乎爾曰徴之於儀禮士䘮禮云三日成服杖拜君命及衆賔不拜棺中之賜注謂既殯之明日全三日始歠粥矣禮尊者加惠明日必徃拜謝之棺中之賜不施己也既夕記云主人乗惡車注謂拜君命拜衆賔及有故行所乗也然則當孟子母殁於齊必赴於王王使人弔與成服後徃謝所謂乗惡車者是王使人禭與則所謂棺中之賜不施己者禮明云不拜况葬後耶郝氏之誤解可足據邪總之孟子拜君命非拜君賜拜亦於殯後非葬後皆不出齊都城之事邱文莊濬家禮儀節有云世俗親友來弔其孝子必具衰絰躬造其門謂之謝孝使居䘮者纍然衰絰奔走道塗信宿旅次甚至浹旬彌月考之古禮無有也夫文莊謂無有而孟子反有之邪䘮禮至近代不講宜郝氏之說紛紛也晝晝當作畫不待言齊西南近邑集注本趙氏劉熈來但括地志以畫即㦸里城在臨淄城西北三十里一南一北殊判然余謂孟子去齊歸鄒鄒實在齊之西南上云南者是又因悟樂毅初入齊聞畫邑人王蠋賢令軍中環畫邑三十里無入則爾時齊都城西南隅無敢有闌出者矣休孟子致為臣而歸歸於鄒也中間經過地名休者少憩焉與丑論在齊事故曰居休故休城在今兖州府滕縣北一十五里距孟子家約百里路史國名紀休在潁川或云介休介在膠西並非河注海禹於帝堯八十載癸亥告成功河自右碣石入於海碣石山名在今永平府昌黎縣後一千六百七十六年為周定王五年己未周譜曰河徙水經注曰河徙故瀆並不言所在惟漢地理志魏郡鄴縣下注云故大河在東北入海此河入海之一變也鄴縣城在今彰德府臨漳縣西逮漢武帝元封二年壬申既塞宣房後宣帝地節元年壬子前此四十一年間河復北决於館陶分為屯氏河東北至章武入海章武城在今河間府鹽山縣西北此河入海又一變也宋史河渠志神宗熈寜十年丁巳七月乙丑河大決於澶州曹村澶淵北流斷絶河道南徙東匯於梁山張澤濼分為二𣲖一合南清河入於淮一合北清河入於海北清河濟水故道南清河即今泗水淮安府清河縣之清口是此又一變矣洪武二十四年辛未河全入於淮而故道遂淤雖永樂九年辛卯復疏入故道而正統十三年戊辰終合并於淮為河入海之又一變於是天壤間所謂四瀆者僅有二瀆殆非人力之所能為矣汝或謂漢賈讓言大禹治水辟伊闕與鑿龍門析厎柱破碣石同而伊闕之山禹貢不見余曰伊洛瀍澗既入於河伊水能順流非辟闕之功而何此禹貢之簡處或又謂禹厮二渠以引其河於禹貢亦不見余曰其一出貝邱即河之經流其一漯川漯即兖州之貢道也或又謂禹之行河水本隨西山下東北去又河西薄大山東薄金隄則金隄者乃禹作不謂禹復爾爾余曰九澤既陂陂亦隄也方當泛濫時鯀務多為隄防以湮之水性逆故其患不息禹導水由地中行向鯀所為隄防以障水者皆可用之以輔水事固有因敗以為功者存乎其人之善用耳故曰禹能修鯀之功惟汝水絶跡於禹貢而孟子言決汝得毋近鑿空余曰觀爾雅從釋地已下至九河皆禹所制名中有曰水自汝出為濆又曰汝有濆此豈禹一無所事於汝而被以是名與又豈汝自天然入於淮而無須禹力與故決汝二字正可補經文之不備淮注江淮水入江自孟子一時誤記朱子所謂不必曲為解說最是然鄭夾漈已曲為之說曰案左傳哀九年吳城邗溝通江淮自是江淮始相通孟子蓋據哀公後吳王夫差所掘之道以為禹迹而忘却禹貢不知亦非然也杜注明謂於邗溝築城穿溝東北通射陽湖西北至末口入淮乃引江達淮與孟子排淮入江者不合直至隋文帝開皇七年丁未開山陽瀆煬帝大業元年乙丑開邗溝皆自山陽至揚子入江水流與前相反蓋至是孟子言始驗余嘗謂孟子說錯了淮入江後九百餘嵗隋果引淮南入江若孟子預為之兆者亦屬異事濟四瀆水之易變者莫若河變而至於絶者莫若濟余討論濟瀆評以二言曰新莽後枯而復通唐髙宗前通而復枯咸出天數夫豈人謀蓋後漢郡國志曰濟水王莽時大早遂枯絶者此初絶也酈注濟水條曰其後水流逕通津渠勢改故杜釋春秋郭注山經並云今濟水至博昌入海者此復通也章懐太子賢循吏傳注曰濟水王莽末旱因枯涸但入河内而已似素不知中間有復通之事者此終絶也漯集注漯水名亦不核當云漯者河之枝流也出東郡東武陽東北至千乗入海不然止云水名安知非漢地理志髙唐之漯水乎宋滅滕漢地理志滕三十一世為齊所滅杜氏釋例文王子錯叔繡之後十七世至宣公始見春秋隱公以下春秋後六世而齊滅之水經注並同竹書紀年於越滅滕惟戰國䇿作宋滅而通鑑繫之赧王二十九年乙亥上距孟子勸行仁政甚遠集注於宋初王時即曰嘗滅滕無乃驟與只當曰宋君偃立十一年自稱王敗齊楚魏之兵欲霸天下疑即此時云莊嶽炳燭齋隨筆曰引而置之莊嶽之間注云莊嶽齊街里名疏别無一語案左傳襄二十八年得慶氏之木百車於莊昭十年又敗諸莊哀六年戰於莊即此莊也襄二十八年慶封反陳於嶽即此嶽也蓋皆齊城内街里之名此繫經典正文疏家全不引之足見其疏余謂朱子言疏乃邵武士人作不解名物制度書不似疏益為信然近刻日知録並同於陵顧野王輿地志齊城有長白山陳仲子夫妻所隠處酈注魚子溝水南出長白山東抑泉口山即陳仲子天妻之所隱志長白山者節去下山字若以抑泉口即其家於陵非也唐張說石泉驛詩目下自注於陵仲子宅漢於陵故城章懐太子賢曰在今淄州長山縣南與通典合張說詩云長白臨江上於陵入濟東我行弔遺跡感歎石泉空石泉非孟子所謂井者耶江繡江𤼵源長白山南今章邱縣淯河是計於陵仲子家離其母所居幾二百里矣滄浪集注滄浪水名殊非蓋地名也當云武當縣西北四十里漢水中有洲名曰滄浪漢水流經此地遂得名滄浪之水云善乎宋葉夢得云大抵禹貢水之正名可以單舉者若漢若濟之類是不可單舉者則以水足之若黑水弱水之類是非水之正名而因以為名則以水别之若滄浪之水者是北海東海齊世家太公望呂尚者東海上人注未悉後漢琅邪國海曲縣劉昭引博物記注云太公呂尚所出今有東吕鄉又釣於棘津其浦今存又於清河國廣川縣棘津城辯其當在琅邪海曲此城殊非余謂海曲故城通典稱在莒縣東則當日太公辟紂居東海之濵即是其家漢崔瑗晉盧無忌立齊太公碑以為汲縣人者誤伯夷孤竹國之世子也前漢遼西郡令支縣有孤竹城括地志孤竹古城盧龍縣南十二里余謂今永平府治河入海從右碣石正古之北海在今昌黎縣西北亦是當日辟紂處去其國都不逺通志以居北海為濰縣者亦誤畢郢畢郢曰畢原實有二處在渭水南之畢原一名畢郢周文王墓在焉周公薨成王葬於畢史稱畢在鎬東南杜中地廹終南韓愈南山詩前尋徑杜墅坌蔽畢原陋是在渭水北之畢原則名陌秦惠文王陵在焉悼武王陵亦在焉隔僅一里元和郡國圖志畢原即咸陽縣所理也原南北數十里東西二三百里無山川陂湖井深五十丈亦謂之畢陌漢氏諸陵在其上故劉滄咸陽懷古詩渭水故都秦二世咸原秋草漢諸陵是至文王庶子髙所封畢左氏注云在長安縣西北是畢郢通典云在咸陽縣是畢陌兩杜氏之言吾從預溱洧溱洧二水名說文引詩溱與洧作潧曰潧水出鄭國洧水出潁川陽城山東南入潁史記注引括地志以為古新鄭城南洧與溱合水經亦云余讀酈道元注於洧水相鄰者若丹水汝水潁水潩水渠水沙水皆不載有橋梁獨洧水一則曰又東逕隂坂北水有梁焉再則曰又屈而南流其水上有梁謂之相門橋則洧水之宜置有梁孟子言殊非無因竊以諸葛武侯相蜀好治官府次舍橋梁道路所至井竈藩溷皆應繩墨子產治鄭何獨不然此亦不過偶於橋有未修以車濟人而孟子遂即其事以深論之云武城曾子居武城即仲尼弟子列傳之南武城魯邊邑也在今費縣西南八十里石門山下吳未滅與吳鄰吳既滅與越鄰越王句踐嘗徙治琅邪起館臺乂嘗與魯泗東地方百里此豈待浮海入冦而後至武城邪講義為是説者總緣朱子集注不詳及地理耳然考魯哀十三年吳㑹於黄池越亦曾遣舟師浮海入淮以邀之由吳之壤隔絶也今越既并吳商魯之間可以惟兵横行寇之興也何嘗之有余因又悟春秋四書榖而一書小榖者别於榖也明其為管仲之邑也史記加南於武城上者别於魯之北有東武城也明曾子之為費邑人也幽州書孔疏云流四㓙在治水前於時未作十二州則無幽州之名而云幽州者史據後定言之非也當流共工時此地已名幽州即今宻雲縣是括地志故龔城在檀州燕樂縣界故老傳云舜流共工幽州居此城幽州其地狹及後肇十有二州取顓頊北至於幽陵帝堯北方曰幽都之幽以名所分冀州東北地即今順天府遼東廣寜衛以西是幽州其地廣大抵帝王廢置理必相沿舜立幽州合因於古矣崇山書孔疏云禹貢無崇山不知其處蓋在衡嶺之南也亦非通典澧州澧陽郡理澧陽縣本漢零陽縣地有崇山即放驩兜之所宋則在慈利縣路史以為今有驩兜墓是然又引嶺外驩州圖經合之寰宇記並以驩州為放所頗疑其去崇山逺後楊升菴引沈佺期長流驩州時嘗案九真圖崇山至越裳四十里杉谷起古崇山竹谿從道明國來於崇山北二十五里合故詩云朝𤼵崇山下暮坐越裳陰西從杉谷度北上竹谿深竹谿道明水杉谷古崇岑越裳古國名重九譯者在秦為象郡兩漢為九真郡吳分置九德郡梁曰德州隋開皇十八年改驩州煬帝改日南郡唐兩因之理九德縣佺期又有移驩州廨詩云古來堯禪舜何必罪驩兜是真以州得名由驩兜也者不知漢九真郡治胥浦縣莽曰驩成又領有咸驩縣開皇十八年改州名實本此合之唐武德曾於咸歡縣置驩州則驩與歡同乃驩喜之驩於驩兜了不相渉三苗三苗國名杜元凱闕其所在惟張守節據吳起言昔三苖氏左洞庭右彭蠡洞庭湖名在岳州巴陵縣西南一里南與青草湖連彭蠡湖名在江州潯陽縣東南五十二里以天子在北故洞庭在西為左彭蠡在東為右今江州鄂州岳州三苗之地也杜氏通典則以潭州岳州衡州皆古三苗國地三危羽山羽山見禹貢班固志載東海郡祝其縣司馬彪志亦然今贑榆縣西北八十里唐崔國輔詩羽山一點青海岸日光碎是三危山亦見禹貢班志失載司馬志未補此大闕亦直至隋地理志敦煌郡敦煌縣有三危山括地志三危山在沙州敦煌縣東南三十里舜殛鯀於此以變東夷即禹貢之東漸於海遷三苗於此以變西夷即禹貢之西被於流沙矣豈直刑加其身蔽厥辜己乎有庳有庳之在今永州府零陵縣已成千古定所而集注云未知是否此最朱子妙處蓋一以經文為案也經文欲常常而見之故源源而來不及待一年之貢期五年之朝期以伸吾親愛情豈有兄居蒲坂弟居零陵陸阻太行水絶洞庭較諸驩兜放處尤逺千里之理且果零陵之是國也比嵗一至則徃返幾將萬里其勞已甚數歲而數至勢必日奔走於道路風霜之中而不少寜息親愛弟者固如是乎蓋有庳之封必近在帝都而今不可考爾或曰然則今零陵曷為傳有是名也案括地志云鼻亭神在營道縣北六十里故老傳言舜葬九疑象來至此後人立祠名為鼻亭窮崖絶徼非人跡可歴舜封象於有庳蓋此地蓋者疑辭亦與集注或曰同咸丘古人以所居之地得姓氏不必定常於其地如咸丘魯地而䝉則齊人是咸邱二字見爾雅左髙曰咸丘見春秋桓公七年焚咸丘杜注咸丘魯地髙平國鉅野縣南有咸亭咸丘複氏自以此余最賞趙氏注此章於東字妙有體㑹曰東野東鄙田野之人所言耳咸丘䝉齊人也故聞齊野人之言書曰平秩東作謂治農事也不然何不云齊之西或北野人乎至今濟南府齊東縣則置於元憲宗三年以鎮而名於孟子無渉南河之南古帝王之都皆在冀州堯治平陽舜治蒲阪禹治安邑安邑在今夏縣西北十五里三都相去各二百餘里在大河之北其河之南則豫州地非帝畿矣舜避堯之子於南河之南得母亦如左氏所云越竟乃免乎禹避於陽城益避於箕山之隂皆此意陽城箕山之隂陽城山名漢潁川有陽城縣以山得名洧水所出唐武后改曰告成後又曰陽邑五代周省入登封故此山在今登封縣北三十八里去嵩山幾隔三十里安得即云嵩山下之深谷與箕山為嵩髙之北而張守節云箕山一名許由山在洛州陽城縣南十三里括地志遂云陽城縣在箕山北十三里守節又云陽城縣在嵩山南二十三里括地志遂云嵩山一名外方山在洛州陽城縣西北二十三里足互相證明斷斷其非一山也集注誤由趙氏只觀酈道元注先敘太室山次五渡水並屬崇高縣又敘禹避商均於此及周公測日景處次箕山及上有許由冢並屬陽城縣雖同見潁水條内而山固區以别矣桐湯墓所在殷本紀伊尹放太甲於桐宫注似引鄭康成注書序語曰桐地名也有王離宫焉初不指為湯葬地余以後漢志梁國虞縣有空桐地有桐地有桐亭太甲所放處應即在於此虞今歸德虞城縣距湯都南亳僅七十里方可伊尹旣攝國政復時時徃桐訓太甲三年不然如人言湯亳為偃師偃師去虞城八百餘里尹豈有縮地之術分身以應乎湯都仍屬榖熟鎮為是至湯墓劉向博極羣書者也告成帝云殷湯無葬處蓋直至哀帝建平元年大司空御史長卿案行水灾因行湯冢始得之於汾隂亳疑衍縣北東郭去縣三里冢四方方各十歩髙七尺上平處平地馬端臨曰今河中府是故宋太祖乾德四年著諸祀典迄今不易雖有杜預湯冢在薄城中魏王泰又在偃師縣東兩說吾未敢以為據集注云云亦偶誤本孔安國書傳莘耕於有莘之野集注莘國名未指其所在余謂元和郡縣志故莘城在汴州陳留縣東北三十五里古莘國地計其去湯都南亳今商邱縣榖熟鎮不過四百里所以湯使可三徃聘若太姒所産之莘國則在今西安府郃陽縣南三十里道遥逺矣虞虢虞虢二國杜注虞國在河東大陽縣謂山西之平陸縣也虢西虢國𢎞農陜縣東南有虢城謂河南之陜州也名雖二省而界相連莫妙於裵駰引賈逵注曰虞在晉南虢在虞南一言之下而形勢瞭然爾時為晉獻公十九年正都於絳絳在太平縣之南絳州之北土人至今呼故晉城遺址宛然余嘗怪杜於莊二十六年士蒍城絳注絳今平陽絳邑縣成六年不如新田又注新田今平陽絳邑縣竟為一地乎果為一地不應將遷新田之時名獻公所都曰故絳矣新田括地志在絳州曲沃縣南二里土呼王官城距故晉城五十里明一統志平陽府古蹟載晉城在太平縣南二十五里晉士蒍所築獻公都焉屈産之乗通典慈州文成郡理吉昌縣春秋時晉之屈邑獻公子夷吾所居漢河東北屈縣左傳云晉有屈産之乘此有駿馬與劉昭注後漢志同余謂今山西吉州是樂史傅㑹為石樓縣明一統志本之但石樓乃漢西河土軍縣非北屈地牛山牛山齊之東南山也本趙氏亦是岐在複壁中所注方向少錯無論今目驗在臨淄縣南一十里亦在唐臨菑縣南二十一里括地志所謂管仲冢與桓公冢連在牛山上是酈道元注牛山一名南郊山天齊淵出焉齊此得名梁劉昭不知引何人孟子注云南小山曰牛山晉左思齊都賦云牛嶺鎮其南列子齊景公㳺於牛山北臨其國城而流涕夫臨曰北正以山實在其南石丘集注止云石丘地名趙氏注宋牼宋人參以荀子非十二子篇宋鈃注鈃與牼同宋人與孟子尹文子彭䝉慎到同時正合孫與疏遂云石丘宋國地也蓋宋牼者宋人將欲徃楚而孟子㳺宋適相值於石丘之地又漢藝文志尹文子一篇注云說齊宣王劉向曰與宋牼俱㳺稷下宋子十八篇注云孫卿道宋子荀子宋子有見於少無見於多注宋子名鈃與孟子同時即見漢藝文志者余因悟齊宣王喜文學㳺説之士自如騶衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛孟子固嘗與宋牼有雅故於齊别去久之忽邂逅石丘呼以先生請其所之殆非未同而言者比也任任國名太皥之後風姓漢為任城縣後漢為任城國今濟寜州東任城廢縣是去古鄒城僅百二三十里宜屋廬子明日即可徃問哉淇河西王豹處淇河西善謳集注略不及趙氏注之詳明當采入注曰王豹衛之善謳者淇水名衛詩竹竿之篇泉源在左淇水在右碩人之篇河水洋洋北流活活衛地濵於淇水在北流河之西故曰處淇水而河西善謳所謂鄭衛之聲也葵丘春秋有二葵丘一齊地近在臨淄縣西連稱管至父所戍者一宋地司馬彪云陳留郡外黄縣東有葵丘聚齊桓公㑹此城中逺在齊之西南故宰孔稱齊侯西為此㑹也又曰東略之不知西則否矣後果七年㑹於淮謀鄫且東略也是孔之言騐然先未幾獻公卒晉亂齊侯以諸侯之師伐之及髙梁而還髙梁晉地又在葵丘西北幾千里是宰孔之言亦不驗南陽左傳晉於是始啟南陽杜注在晉山南河北故曰南陽余謂即今太行山之南河内濟源修武溫縣地孟子遂有南陽趙注山南曰陽岱山之南謂之南陽也余謂史稱泰山之陽則魯其隂則齊南陽屬齊必齊之地深揷入魯界中者魯故欲一戰有之二南陽所指各不同公羊傳齊桓使髙子將南陽之甲立僖公而城魯注南陽齊下邑傅巖集注說築傅巖傅氏之巖在虞虢之間今平陸縣東三十五里是俗名聖人窟為説所傭隱止息處非於此築也巖東北十餘里即左傳之巔軨坂有東西絶澗左右幽空窮深地壑中則築以成道指南北之路謂之為軨橋也説身負版築為人所執役正於此地至今澗猶呼沙澗水去傅巖一十五里墨子尸子並以傅巖在北海之洲者大非說操築於傅巖兮為騷辭則可孫叔敖海濵趙氏注孫叔敖隱處耕於海濵楚莊王舉之以為令尹此亦是隨文解之事實無所徴莊王時楚南境東境去海尚逺而史記稱孫叔敖楚之處士荀子吕氏春秋並以為期思之鄙人期思故城在今固始縣西北七十里固始本寢邱即莊王感優孟之言以封其子者傳十世不絶其得為令尹也或曰進自虞邱子史記說苑列女傳或曰沈尹莖力吕氏春秋或曰楚有善相人者招聘之新序皆無起家海濵說蓋孟子所據之書籍今不可考矣余又考孫叔敖即宣十一年楚莊王十六年令尹蒍艾獵艾獵乃蒍賈之子賈字伯嬴宣四年楚莊王九年官司馬為子越椒所惡囚而殺之意者子遂武微竄處海濵不七八年莊知其賢擢為令尹與但蒍賈乃薳吕臣之子吕臣繼子玉官令尹出自公族自應為楚郢人何得逺在期思之鄙意者叔敖子實不才襄十五年蒍子馮杜注叔敖從子徙世守封土莫顯於朝後人遂以其子孫之占籍上繫諸先人與東山集注東山蓋魯城東之髙山蓋疑詞朱子生平足未至曲阜故作此言其實曲阜縣東二十里有防山孔子父母合葬處世家所謂防山在魯東絶不髙也或曰費縣西北䝉山正居魯四境之東一名東山孟子云孔子登東山而小魯指此疑近是范今東昌府濮州范縣本春秋晉大夫士㑹邑國語是以受隨范是又半屬魯後漢志東郡范縣有秦亭即莊三十一年築臺於秦地道記在縣西北是也孟子時則屬齊趙注云范齊邑王庶子所封食也頗妙蓋齊王之子生長於深宫賜第於康衢貴仕於朝内豈容逺在七八百里之下邑而為孟子所見其在范者殆猶靖郭君孟嘗君之薛乎既思孟子書法不曰之齊見王子於范而曰自范之齊望見齊王子下一望字意者當時最多交質此以王子出質敵國路經於范遂與孟子適相值乎亦未可定垤澤之門三衢毛氏曰呼喚也凡類息招呼則平聲小爾雅烏呼吁嗟醫書一呼一吸為一息杜甫詩呼兒問煮魚之類也呌號而呼則去聲詩式號式呼左傳蒼葛呼之類也果爾魯君於垤澤之門自應如趙注云以城門不自肯夜開故君自𤼵聲之呼為平聲不應如集注音去聲為呌號之呼明矣近講義又云有作魯君自呼之聲者陋甚試㸔呼於門於字是呵䕶傳呼來於垤澤之門尤非人之聲音闗乎貴賤呵䕶傳呼乃賤者之役聲可習之而能若魯君與宋君聲為居髙養優所移豈他人能似仍屬倉卒自呼故為監門者所疑垤澤即襄十七年築者謳曰之澤門杜氏注宋東城南門是也或曰得毋以禹貢盟諸澤名其門乎案盟諸澤在故宋國微子所封之東北此自為南門耳睢陽故城在今商邱縣南東南門曰垤澤門括地志所謂宋東城南門曰澤門是棠春秋三棠邑一宋魯之界上隠公五年春矢魚於棠公羊稱為邑是也今魚臺縣一楚邑伍奢長子尚為棠君是也今六合縣一齊邑齊棠公之妻杜注棠公齊棠邑大夫不言所在余謂棠齊邑也後漢志北海即墨縣有棠鄉齊靈公十五年滅萊邑故為齊有後孟子為𤼵棠即此是也今即墨縣甘棠鄉右四書釋地附地志秦都咸陽右隴蜀隴鳳翔府隴州西北六十里隴坻是蜀四川保寜府劍州以西皆古蜀地左關坂闗函谷關古闗在河南府陜州靈寳縣南十里今曰潼關在西安府華州華隂縣東四十里坂崤坂在河南府永寜縣北六十里北有甘泉谷口甘泉山在西安府涇陽縣北百二十里谷口在西安府醴泉縣東南四十里亦曰寒門南帶涇渭韓韓武子封韓原即故韓國也宣子徙居州今懷慶府城東南五十里武德城是貞子徙平陽即堯都也哀候滅鄭徙陽翟今開封府禹州治是北有鞏洛成臯之固成臯即虎牢西有宜陽商阪之塞宜陽今河南府宜陽縣商坂即商洛山在西安府商州東南九十里東有宛穰洧水穰今南陽府鄧州洧水出禹州宻縣境至陳州西華縣北合於潁水南有陘山陘山在禹州新鄭縣南三十里亦名陘塞魏畢萬封魏城即永樂城也悼子徙霍即平陽霍州也魏絳徙安邑即禹都也惠王徙大梁遂稱曰梁即今開封府東有淮潁西有長城史記惠王十九年築長城塞固陽以偹秦及西戎又秦紀魏築長城自鄭濵洛以北有上郡固陽今陜西榆林衛北廢豐州境有稒陽古塞鄭今西安府華州上郡今延安綏德州北有古上郡城蓋魏惠王時河西之地猶為魏有南有鴻溝史記河渠書滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗㑹於楚蓋即故汴河矣汴河舊自滎陽東南至鳳陽府泗州東西両城間入於淮北有河外正義曰魏以河内為河外趙造父封趙城今平陽府趙城縣是趙夙邑耿趙衰居原簡子居晉陽今太原府太原縣也獻侯治中牟今彰德府湯隂縣西五十里中半城是敬侯始都邯鄲今北直廣平府邯鄲縣是西有常山南有河漳東有清河水經淇水東北過廣宗縣東為清河廣宗今順德府廣宗縣又漢有清河郡今為廣平府清河縣清河舊經其處云北有燕國燕都薊今順天府附郭大興縣東有朝鮮遼東朝鮮今遼東塞外國北有林胡樓煩西有雲中九原九原賈耽曰九原故城在中受降城北四十里今陜西榆林衛廢豐州東北境是南有滹沱易水齊都臨淄南有泰山東有琅邪琅邪山在青州府諸城縣東南百五十里西有清河北有渤海楚都郢西有黔中巫郡東有夏州海陽夏州車允曰夏口城北數里有洲名夏州夏口城在今武昌府城西亦曰魯口海陽劉伯荘曰楚并吳越地東至海海陽蓋謂楚之東南境南有洞庭蒼梧洞庭湖在岳州府城西南一里蒼梧山海經注云即九疑山也在今永州府道州寜逺縣南六十里北有陘塞郇陽陘塞即陘山郇陽今漢中府興安州洵陽縣縣東南有洵水流入漢曰洵口右戰國七雄五禮通考卷二百十
