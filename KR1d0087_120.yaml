body:
  text: 五禮通考卷一百十刑部尚書秦蕙田撰吉禮大夫士廟祭儀禮特牲饋食禮鄭園録云謂諸侯之士祭祖禰於五禮屬吉禮疏曲禮云大夫以索牛士以羊豕彼天子大夫士此儀禮特牲少牢故知是諸侯大夫士也祭法云適士二廟官師一廟官師謂中下之士祖禰共廟亦兼祭祖故祖禰俱言也無問一廟二廟皆先祭祖後祭禰若祭無問尊卑廟數多少皆同日而祭畢以此及少牢唯筮一日明不分日祭也敖氏繼公曰此篇言士祭其祖之禮特牲饋食之禮不諏日注祭祀自孰始曰饋食饋食者食道也諏謀也士賤職䙝時至事暇可以祭則筮其日矣不如少牢大夫先與有司於廟門諏丁巳之日疏孝子於親雖死事之若生故用生人食道饋之也天子諸侯饋孰以前仍有灌鬯朝踐饋獻之事敖氏繼公曰特牲謂豕也士祭用三鼎乃以特牲名之者主於牲也少牢放此張氏爾岐曰不諏日者不預諏前月下旬之丁巳以筮來月上旬之丁巳但可以筮則筮而已自此以下筮日筮尸宿尸宿賔視濯與牲凡五節皆祭前戒備之事蕙田案周禮司尊彞云其饋獻用兩壺尊鄭云饋獻謂薦熟時是饋獻即饋熟之事賈氏乃云天子諸侯饋熟已前仍有灌鬯朝踐饋獻之事誤也及筮日主人冠端𤣥即位於門外西靣注冠端𤣥𤣥冠𤣥端門謂廟門則疏不𤣥端則朝服然𤣥端一冠冠兩服也敖氏繼公曰士筮當朝服今乃𤣥端者不可踰其祭服也陳氏禮書郊特牲言作龜於禰宫則天子諸侯不在廟門子姓兄弟如主人之服立於主人之南西靣北上注所祭者之子孫言子姓者子之所生小宗祭而兄弟皆來與焉宗子祭則族人皆侍敖氏繼公曰是時子姓而下之服亦𤣥端統於主人也盛氏世佐曰先子姓而後兄弟者子姓據所祭者而言兄弟據主祭者而言凡同姓者曰兄弟不必與主人同昭穆欽定義疏子姓依主人之嗣子立文也尊祖故敬宗敬宗故重適觀下文嗣舉奠而兄弟不得與焉祭畢有餕嗣為上而兄弟不敢躐焉此所以退兄弟於子姓之後也歟有司羣執事如兄弟服東靣北上注士之屬吏也子疏左傳云士有隷弟謂此言為屬吏蔡氏徳晉曰東靣賔位也此時未有賔故有司羣執事皆如賔位席於門中闑西閾外注為筮人設之也饌疏士冠禮云筮與席所卦者具於西塾乃言布席於門中此省文筮人取筮於西塾執之東靣受命於主人注筮人官名筮謂蓍也宰自主人之左贊命命曰孝孫某筮來日某諏此某事適其皇祖某子尚饗注宰羣吏之長自由也贊佐也達也贊命由左者為神求變也士祭曰嵗事此言某事又不言妃者容大祥之後禪月之吉祭皇君也言君祖者尊之也某子者祖字也伯子仲子也尚庶幾也敖氏繼公曰來日某亦謂丁若己也不言以某妃配變于大夫之筮辭也若其祀辭則亦當言之筮者許諾還即席西靣坐卦者在左卒筮寫卦筮者執以示主人注士之筮者坐蓍短由便卦者主畫地識爻爻備以方寫之主人受視反之筮者還東靣長占卒告於主人占曰吉注長占以其年之長幼旅占之若不吉則筮逺日如初儀注逺日旬之外日宗人告事畢蕙田案以上筮日前期三日之朝筮尸如求日之儀命筮曰孝孫某諏此某事適其皇祖某子筮某之某為尸尚饗注三日者容宿賔視濯也某之某者字尸父而名尸連言其親庶幾其憑依之也大夫士以孫之倫為尸欽定義疏宗廟之尸必以同姓取其精氣合也必以孫之倫昭穆同也必以適不敢以賤者依吾親也必以無父者兩無所妨其尊也此數者䘮祭吉祭同者也其有不同者䘮祭不筮尸尚質也吉祭則筮尸矣練與大祥亦筮尸漸而之吉也吉祭無女尸而䘮祭有女尸何也以婦人䘮不可以男子為尸也吉祭而後同几有胖合之道焉陽統隂隂從陽斯不用女尸矣䘮祭雖用尸而尸偶不備則無尸者有之若吉祭則不可無尸無尸是殤之也子孫而殤其祖考焉可乎蕙田案以上筮尸乃宿尸注宿讀為肅肅進也進之者使知祭日當來凡宿或作速記作肅周禮亦作宿蔡氏徳晉曰宿越宿預戒也葢在祭前二日主人立於尸外門外子姓兄弟立於主人之後北面東上注不東靣者來不為賔客子姓立於主人之後上當其後疏子姓兄弟東頭為上者不得過主人故為上者當主人之後尸如主人服出門左西面注不敢南面當尊郝氏敬曰北面事神之禮出門左迎賔之禮主人辟皆東面北上注順尸主人再拜尸答拜注主人先拜尊尸今疏下文宿賔賔先拜主人乃答拜此尊尸是以主人先拜也按少牢宿尸祝先釋辭訖尸乃拜此尸荅拜後宗人乃擯辭者士尸卑大夫之尸尊宗人擯辭如初卒曰筮子為某尸占曰吉敢宿注宗人擯者釋主人之辭如初者如宰贊命筮尸之辭卒曰者著其辭所易祝許諾致命注受宗人辭許之傳命於尸始宗人祝北面至於傳命皆西面受命東面釋之尸許諾主人再拜稽首注其許亦宗人受於祝而告主人尸入主人退注相揖而去尸不拜送尸尊蕙田案以上宿尸宿賔賔如主人服出門左西面再拜主人東面答再拜宗人擯曰某薦歳事吾子將涖之敢宿注薦進也涖臨也言吾子將臨之知賔在有司中今特肅之尊賔耳也疏此宿屬吏内一人為備三獻賔之事賔曰某敢不敬從主人再拜賔答拜主人退賔拜送髙氏愈曰古人祭祀必立賔者欲其代主人而娛尸賔之來也亦若為助祭執事之意故主人獻尸而賔長以肝從主人致爵主婦而後獻於賔以其皆以養尸為主而意不重於賔故也盛氏世佐曰案以上二事皆祭前二日為之即筮尸之明日也敖云筮尸宿尸宿賔皆同日非蕙田案宿賔與宿尸同日而宿尸不與筮尸同日盛氏之説是也少牢無宿賔故筮尸宿尸得同一日有宿戒尸在前期三日故筮尸在前二日反後特牲之一日蕙田案以上宿賔厥明夕陳鼎於門外北面北上有鼏注宿賔之明日夕門外北面當門也古文鼏為宻士疏少牢陳鼎在門東此當門卑避大夫也棜在其南南順實獸於其上東首注順猶從也棜之制如今大木轝矣上有四周下無足獸腊也牲在其西北首東足注其西棜西也東足者尚右也牲不用棜以其生疏豕不可牽之縳其足陳於門外首北出棜東其足寢其左以其周人尚右將祭故也設洗於阼階東南壺禁在東序豆籩鉶在東房南上几席兩敦在西堂注東房房中之東當夾北西堂西夾室之前近南耳敖氏繼公曰豆籩鉶葢在東房之東墉下士家亦有左右房於此見之矣欽定義疏東房對西房而言謂此所陳在東房之東可也以房中之東為東房不可也東房在正室之東夾室又在東房之東若夾室之北則北堂下之東矣鄭氏以夾室之北一架通為東房非也主人及子姓兄弟即位於門東如初注初筮位也賔及衆賔即位於門西東面北上注不蒙如初者以賔在而宗人祝不在宗人祝立於賔而北東面南上注事彌至位彌異宗人祝於祭宜近廟主人再拜賔答再拜三拜衆賔衆賔答再拜注衆賔再拜者士賤旅之得備禮也主人揖入兄弟從賔及衆賔從即位於堂下如外位注為視濯也宗人升自西階視壺濯及豆籩反降東北面告濯具注濯溉也不言敦鉶者省文也東北面告縁賔意欲聞也言濯具不言絜以有几席賔出主人出皆復外位注為視牲也宗人視牲告充雍正作豕注充猶肥也雍正官名也北面以䇿動作豕視聲氣宗人舉獸尾告備舉鼎鼏告絜注備具請期曰羮飪注肉謂之羮飪熟也謂明日質明時而曰肉熟重豫勞賔宗人既得期西北面告賔有司告事畢賔出主人拜送欽定義疏助祭者統言之皆曰執事經云執事之爼陳於階間是也自子姓兄弟而外統言之皆曰賔下經獻酬諸禮長賔長兄弟以下各分兩行是也其公有司私臣亦在賔内而另分二列於下則又以貴賤殊之公有司在西繼賔黨也私臣在東則以其私也而主道統之所以主人及子姓兄弟如初而賔以下不如初也蕙田案以上陳鼎拜賔視濯視牲告期夙興主人服如初立於門外東方南面視側殺注夙早也興起也主人服如初則其餘有不𤣥端者側殺殺一牲也主婦視饎爨於西堂下注炊黍稷曰饎宗婦為之爨竈也西堂下者堂之西下也近西壁南齊於坫古文饎作糦周禮作疏主婦視饎爨明主婦自為也猶主人視殺牲亨於門外東方西面北上注亨煮也煮豕魚腊以各一爨詩云誰能亨魚溉之釡鬵羮飪實鼎陳於門外如初注初視濯也尊於户東𤣥酒在西注戸東室戸東𤣥酒在西尚之凡尊酌者在左實豆籩鉶陳於房中如初注如初者取而實之既而反之執事之爼陳於階間二列北上注執事謂有司及兄弟二列者因其位在東西祝主人主婦之爼亦存焉不升鼎者異於神盛兩敦陳於西堂藉用萑几席陳於西堂如初注盛黍稷者宗婦也萑細葦古文用為于尸盥匜水實於槃中簞巾在門内之右注設盥水及巾尸尊不就洗又不揮門内之右象洗在東統於門東西上凡鄉内以入為左右鄉外以出為左右郝氏敬曰簞竹器以盛巾在廟門内右内以西為右尸入於此盥手蕙田案門内之右註疏以為門東郝氏以為門西盛世佐云案下經云尸入門左北面盥則槃匜之屬在門内之西明矣門西曰右者從堂上視之也必在門西者取其便於尸盥且與洗位相變也郝説得之註疏非祝筵几於室中東面注為神敷席也至此使祝接神主婦纚笄宵衣立於房中南面注主婦主人之妻雖姑存猶使之主祭祀纚笄首服宵綺屬也此衣染之以黒其繒本名曰宵詩有素衣朱宵記有𤣥宵衣凡婦人助祭者同服也内則曰舅沒則姑老冢婦所祭祀賔客每事必請於姑敖氏繼公曰大夫妻祭服褖衣侈𬒮則此宵衣乃次於禒衣者耳纚笄士妻首飾之常言之者見其無異飾也凡婦人助祭者與主婦同服蕙田案内司服天子諸侯王后以下助祭不同者尊則有降卑則無降也主人及賔兄弟羣執事即位於門外如初宗人告有司具注具猶辦也主人拜賔如初揖入即位如初注初視濯也佐食北面立於中庭疏下記云佐食當事則户外南面無事則中庭北面此謂無事時蕙田案以上祭日主人主婦陳設拜賔即位主人及祝升祝先入主人從西面於户内注祝先入接神宜在前也少牢饋食禮曰祝盥於洗升自西階主人盥升自阼階祝先入南面蕙田案祝先入謂入於室主婦盥於房中薦兩豆葵菹蝸醢醢在北注主婦盥盥於内洗昏禮婦洗在北堂直室東隅宗人遣佐食及執事盥出注命之盥出當助主人及賔舉鼎主人降及賔盥出主人在右及佐食舉牲鼎賔長在右及執事舉魚腊鼎除鼏注及與也主人在右統於東主人與佐食者賔尊不載少牢饋食禮魚用鮒腊用糜士腊用兔入疏東為右人西為左人右人尊入時在鼎前左人卑時在鼎後又盡載牲體於爼又設爼於神坐前賔主當相對為左右以賔尊不載牲體故使佐食對主人使賔為右人而使執事在左而載也宗人執畢先入當阼階南面注畢狀如义葢為其似畢星取名焉主人親舉宗人則執畢導之既錯又以畢臨七載備失脱也襍記曰朼用桑長三尺畢用桑長三尺刋其本與末朼畢同材明矣今此朼用棘心則畢亦用棘心鼎西面錯右人抽扃委於鼎北注右人謂主人及二賔既錯皆西面俟也贊者錯爼加七注贊者執爼及七從鼎入者其錯爼東縮加七東柄既則退而左人北面也乃朼注右人也尊者於事指使可也左人載之佐食升肵爼鼏之設於阼階西注肵謂心舌之爼也郊特牲曰肵之為言敬也言主人之所以敬尸之爼古文鼏皆作密卒載加七於鼎注卒已也已載畢亦加焉主人升入復位爼入設於豆東魚次腊特於爼北注入設爼載者腊特饌要方也凡饌必方者明食味人之性所以正蕙田案爼入謂自阼階入陳室中無並曰特主婦設兩敦黍稷於爼南西上及兩鉶芼設於豆南南陳注宗婦不贊敦鉶者以其少可親之芼菜也祝洗酌奠奠於鉶南遂命佐食啟㑹佐食啟㑹卻於敦南出立於户西南面注酌奠奠其爵觶少牢饋食禮啟㑹乃奠之主人再拜稽首祝在左注稽首服之甚者祝在左當為主人釋辭於神也祝祝曰孝孫某敢用剛鬛嘉薦普淖用薦某事於皇祖某子尚饗卒祝主人再拜稽首陳氏禮書此未迎尸之前隂厭也隂厭西南奥奥室之闇故曰隂席東面蕙田案以上主人主婦及祝佐食陳設隂厭祝迎尸於門外注尸自外來代主人接之就其次而請不拜不敢與尊者為禮主人降立於阼階東注主人不迎尸成尸尊尸所祭者之孫也祖之尸則主人乃宗子禰之尸則主人乃父道事神之禮廟中而已出迎則為厭蕙田案注厭字是君厭臣尊厭卑之義敖氏欲改為屈其義反狹尸入門左北面盥宗人授巾注侍盥者執其噐就之執簞者不授巾賤也宗人授巾庭長尊少牢饋食禮曰祝先入門右尸入門左尸至於階祝延尸尸升入祝先主人從注延進在後詔侑曰延禮噐所謂詔侑武方者也少牢饋食禮曰尸升自西階入祝從主人升自阼階祝先入主人從在疏案士虞禮祝前鄉尸彼祝居尸前道之此則尸後詔之故云延蕙田案尸升入者升升堂入入室蕙田案以上尸入尸即席坐主人拜妥尸注妥安坐也尸答拜執奠祝饗主人拜如初注饗勸彊之也其辭取於士虞記則宜云孝孫某圭為孝薦之饗舊説云明薦之疏引舊説者證圭為潔明之義也孔氏頴達曰祝先奠爵于鉶用尸入即席而舉之祝命挼祭尸左執觶右取菹㨎於醢祭於豆間注命詔尸也挼祭祭神食也士虞禮古文曰祝命佐食墮祭周禮曰既祭則蔵其墮墮與挼讀同耳㨎醢者染於醢陳氏禮書尸墮祭猶生者之飲食必祭也欽定義疏墮祭之祭黍稷也肺也其授之則佐食也命之授則祝也祝命佐食非命尸也大約尸先祭豆而祝即命佐食取黍稷肺授祭士虞立文甚明此經祝命佐食墮祭尸於是先祭豆正欲與授祭之節相接耳鄭注命為命尸非命佐食似與前説相悖蕙田案挼或作墮或作綏皆通用敖氏以為授字之誤則非授祭事在下文佐食取黍稷肺祭授尸尸祭之祭酒啐酒告㫖主人拜尸奠觶答拜注肺祭刌肺也㫖美也祭酒榖味之芬芳者齊敬共之唯恐不美告之以美達其心明神享之祭鉶嘗之告㫖主人拜尸答拜注鉶肉味之有菜和者曲禮曰客絮羮主人辭不能亨祝命爾敦佐食爾黍稷於席上注爾近也近之便尸之食也設大羮湆於醢北注大羮湆煮肉汁也不和貴其質設之所以敬尸也不祭不嚌大羮不為神非盛者也士虞禮曰大羮湆自門入今文湆皆為汁舉肺脊以授尸尸受振祭嚌之左執之注肺氣之主也脊正體之貴者先食啗之所以導食通氣乃食食舉注舉言食者明凡解體皆連肉盛氏世佐曰乃食食黍也舉即肺脊主人羞肵爼於腊北注肵爼主於尸主人親羞敬也神爼不親設者貴得賔客以神事其先尸三飯告飽祝侑主人拜注三飯告飽禮一成也侑勸也或曰又勸之使又食少牢饋食禮侑辭曰皇尸未實侑佐食舉幹尸受振祭嚌之佐食受加於肵爼舉獸幹魚一亦如之注幹長脅也獸腊其體數與牲同尸實舉於菹豆注為將食庶羞舉謂肺脊佐食羞庶羞四豆設於左南上有醢注庶衆也衆羞以豕肉所以為異味四豆者膮炙胾醢南上者以膮炙為上以有醢不得䋫也尸又三飯告飽祝侑之如初注禮再成也舉骼及獸魚如初尸又三飯告飽祝侑之如初注禮三成獸魚如初者獸骼魚一也舉肩及獸魚如初注不復飯者三三者士之禮大成也舉先正脊後肩自上而卻下䋫而前終始之次也終疏先舉正脊自上也次舉脅即卻也後舉骼即下䋫舉肩即前也前者牲體之始後者牲體之終盛氏世佐曰注云自上而卻下者謂由脊而及脅也云䋫而前者謂由骼而及肩也卻猶退也䋫猶屈也疏分句似未審佐食盛肵爼爼釋三个注佐食取牲魚腊之餘盛於肵爼將以歸尸爼釋三个為改饌於西北隅遺之所釋者牲腊則正脊一骨長脅一骨及臑也魚則三頭而已个猶枚也今俗言物數有若干个者此讀然楊氏復曰今被前已舉四體外今宜盛臂肫横脊短脅故知所釋者惟此耳舉肺脊加於肵爼反黍稷於其所注尸授佐食佐食受而加之反之也肺脊初在菹豆敖氏繼公曰此蒙佐食之文蕙田案以上尸食九飯主人洗角升酌酳尸注酳猶衍也是獻尸也云酳者尸既卒食又却頤衍養樂之不用爵者下大夫也因父子之道質而用角角加人事略者今文酳皆為酌尸拜受主人拜送尸祭酒啐酒賔長以肝從注肝肝炙也長疏直言肝從亦當如少牢賔羞牢肝用爼縮執爼肝亦縮進末鹽在右此不言文不具也孔氏頴達曰夏官量人云凡祭祀制其從獻脯燔之數量是從獻之文也骨體陳於爼既獻酒即以燔炙從之非尸賔常爼故為從獻尸左執角右取肝擩於鹽振祭嚌之加於菹豆卒角祝受尸角曰送爵皇尸卒爵主人拜尸答拜注曰送爵者節主人拜蕙田案以上主人酳尸祝酌授尸尸以醋主人注醋報也祝酌不洗尸不親酌尊尸也古文醋作酢主人拜受角尸拜送主人退佐食授挼祭注退者進受爵反位尸將嘏主人佐食授之挼祭亦使祭尸食也其授祭亦取黍稷肺祭欽定義疏宗廟之中尸最尊主人次之主婦又次之其墮祭得如尸禮自祝而下則僅有離肺而無祭肺葢犧牲粢盛惟主祭者得與所祭者共之者也故其挼祭也同祭而攝則不敢行此禮所以重宗尊適而别乎正主也蕙田案敖氏謂此挼字因與授字相類而衍然案少牢饋食尸醋主人時上佐食以挼祭皆祭尸食此以授字代以字耳挼字非衍主人坐左執角受祭祭之祭酒啐酒進聼嘏注聼猶待也受福曰嘏嘏長也大也待尸授之以長大之福也佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人注獨用黍者食之主其辭則少牢饋食禮有焉主人左執角再拜稽首受復位詩懐之實於左袂挂於季指卒角拜尸答拜注詩猶承也謂奉納之懐中季小也實於左袂挂袪以小指者便卒角也少牢饋食曰興受黍坐振祭嚌之敖氏繼公曰詩字未詳或曰敬慎之意内則曰詩負之是也主人出寫嗇於房祝以籩受注變黍言嗇因事託戒欲其重稼嗇嗇者農力之成功蕙田案少牢言嗇黍此單言嗇語有詳略耳無異義蕙田案以上尸酢主人嘏筵祝南面注主人自房還時主人酌獻祝祝拜受角主人拜送設菹醢爼注行神惠也先獻祝以接神尊之菹醢皆主婦設之佐食設爼祝左執角祭豆興取肺坐祭嚌之興加於爼坐祭酒啐酒以肝從祝左執角右取肝㨎於鹽振祭嚌之加於爼卒角拜主人答拜受角酌獻佐食佐食北面拜受角主人拜送佐食坐祭卒角拜主人答拜受角降反於篚升入復位疏按上獻祝有爼此獻佐食不言爼者上經云執事之爼陳於階間二列北上鄭注云執事謂有司以佐食亦在有司内者下記云佐食爼觳折脊脅也又下經賔長獻節鄭注云凡獻佐食皆無從其薦爼獻兄弟以齒設之若少牢獻佐食爼即設於兩階之間西上大夫將賔尸故即設佐食爼至於賔尸時佐食無爼也蕙田案以上主人獻祝佐食主婦洗爵於房酌亞獻尸注亞次也次猶貳主婦貳獻不夾拜者士妻儀簡耳尸拜受主婦北面拜送注北面拜者辟内子也大夫之妻拜於主人北西面宗婦執兩籩户外坐主婦受設於敦南注兩籩棗栗棗在西祝贊籩祭尸受祭之祭酒啐酒注籩祭棗栗之祭其祭之亦於豆祭兄弟長以燔從尸受振祭嚌之反之注燔炙肉也於疏云反之者謂反燔長兄弟羞燔者受加於肵出注出者俟後事也羞疏謂俟主婦獻祝之時更當燔於祝尸卒爵祝受爵命送如初注送者送卒爵酢如主人儀注尸酢主婦如主人儀者自祝酌至尸拜送如酢主人也不易爵辟内子盛氏世佐曰男女不相襲爵此不言易爵文省也注云辟内子似泥主婦適房南面佐食挼祭主婦左執爵右撫祭祭酒啐酒入卒爵如主人儀注撫挼祭示親祭佐食不授而祭於地亦儀簡也入室卒爵於尊者前成禮明受惠也蕙田案以上主婦亞獻尸尸酢獻祝籩燔從如初儀及佐食如初卒以爵入於房注及佐食如初如其獻佐食則拜主人之北西面也蔡氏徳晉曰以燔從者兄弟之衆蕙田案以上主婦獻祝及佐食賔三獻如初燔從如初爵止注初亞獻也尸止爵者三獻禮成欲神惠之均於室中是以奠而待之致疏自此盡卒復位論賔長獻尸及佐食并主人主婦爵之事此一科之内乃有十一爵賔獻尸一也主婦致爵於主人二也主人酢主婦三也主人致爵於主婦四也主婦酢主人五也尸舉奠爵酢賔長六也賔長獻祝七也又獻佐食八也賔又致爵於主人九也又致爵於主婦十也賔受主人酢十一也敖氏繼公曰如初謂尸拜受主人拜送也尸於舉酌之末亦欲主人而下皆受舉爵之禮故止爵以見其意於是主人主婦交相致爵既而遂獻賔以至於私人而終尸意焉蕙田案以上賔長獻尸爵止席於户内注為主人鋪之西面席自房來主婦洗爵酌致爵於主人主人拜受爵主婦拜送爵注主婦拜拜於北面也今文曰主婦洗酌爵宗婦贊豆如初主婦受設兩豆兩籩注初贊亞獻也主婦薦兩豆籩東面也爼入設注佐食設之爵疏有司下大夫不賔尸者主婦致於主人時佐食設爼主人左執爵祭薦宗人贊祭奠爵興取肺坐絶祭嚌之興加於爼坐捝手祭酒啐酒注絶肺祭之者以離肺長也少儀曰牛羊之肺離而不提心豕亦然捝拭也捝手者為絶肺染汙也刌肺不捝手疏提猶絶也肝從左執爵取肝㨎於鹽坐振祭嚌之宗人受加於爼燔亦如之興席末坐卒爵拜注於席末坐卒爵敬也一酌而備再從而次之亦均疏上主人獻尸賔長以肝從主婦獻尸兄弟以燔從今一酌而肝燔從則與尸等故亦云均主婦答拜受爵酌醋左執爵拜主人答拜坐祭立飲卒爵拜主人答拜主婦出反於房敖氏繼公曰酢不易爵者禮婦人承男子後多不易爵則其自酢又可知矣蕙田案以上主婦致爵於主人自酢主人降洗酌致爵於主婦席於房中南面主婦拜受爵主人西面答拜宗婦薦豆爼從獻皆如主人主人更爵酌醋卒爵降實爵於篚入復位注主人更爵自酢男子不承婦人爵也祭統曰夫婦相授受不相襲處酢必易爵明夫婦之别内疏篚實二爵一尸奠之未舉一致於主婦此受者房之爵也敖氏繼公曰主人於主婦亦謂之致爵者夫妻一體也主婦席南面變於大夫不賔尸之禮也亦拜受於席豆亦兩豆兩籩爼牲爼也從獻肝燔也皆如主人謂其受爵以前之禮也所異者其不用贊與蕙田案以上主人致爵於主婦自酢三獻作止爵注賔也謂三獻者以事命之作起也舊説云賔入户北面曰皇尸請舉爵尸卒爵酢酌獻祝及佐食洗爵酌致於主人主婦燔從皆如初更爵酢於主人卒復位注洗乃致爵為異事新之燔從皆如初者如亞獻及主人主婦致爵也凡獻佐食皆無從其薦爼獻兄弟以齒設之賔更爵自酢亦不承婦人爵楊氏復曰案上文賔三獻尸止爵不舉故未得獻祝與佐食待主人主婦致爵又醋神惠已均賔乃止爵尸卒爵酢賔賔遂獻祝與佐食事之序也又案上文主婦獻皆至祝佐食而止今賔獻祝佐食畢又致爵於主人主婦故洗爵致為畢事新之也欽定義疏少牢賔尸賔酌致主人而不致主婦不賔尸則賔致爵於主婦此則主人主婦交致爵而賔又致主人致主婦皆禮之互變也善事親者能得人之歡心以事其先主人不先獻賔而賔先致主人何也以祭言之則賔在三獻之列而諸在庭中者不敢並焉以分言之則卑者也且立賔所以事尸尸方欲行室中之惠則賔之致爵亦所以善承尸意也夫而後室中之禮成而庭中之禮起矣蕙田案以上賔作止爵尸酢賔賔獻祝佐食致於主人主婦自酢主人降阼階西面拜賔如初洗注拜賔而洗爵為將獻之如初視濯時主人再拜賔答拜三拜衆賔衆賔答再拜者蕙田案敖氏謂初謂三拜衆賔衆賔皆答一拜此與註答再拜之文不同案鄭據本篇陳鼎拜賔時文敖據有司徹文彼大夫禮與士有異仍當依鄭賔辭洗卒洗揖讓升酌西階上獻賔賔北面拜受爵主人在右答拜注就賔拜者此禮不主於尊也賔卑則不專階主人在右統於其位薦脯醢設折爼注凡節解者皆曰折爼不言其體略云折爼非貴體也上賔骼衆賔儀公有司設之賔左執爵祭豆奠爵興取肺坐絶祭嚌之興加於爼坐捝手祭酒卒爵拜主人答拜受爵酌酢奠爵拜賔答拜注主人酌自酢者賔不敢敵主人主人達其意主人坐祭卒爵拜賔答拜揖執祭以降西面奠於其位位如初薦爼從設注位如初復其位東面少牢饋食禮宰夫執薦以從設於祭東司士執爼以從設於薦東是則皆公有司為之與蕙田案以上主人獻賔長自酢衆賔升拜受爵坐祭立飲薦爼設於其位辯主人備答拜焉降實爵於篚注衆賔立飲賤不備禮鄉飲酒記曰立卒爵者不拜既爵備盡盡人之答拜敖氏繼公曰辯謂皆有薦爼也其薦爼亦於每獻一人則設之備答拜謂悉答之也其拜亦在毎人受爵之後蕙田案以上主人獻衆賔尊兩壺於阼階東加勺南枋西方亦如之注為酬賔及兄弟行神惠不酌上尊卑異之就其位尊之兩壺皆酒優之先尊東方示惠由近禮運曰澄酒在下疏上文獻賔及兄弟皆酌上尊者獻是嚴正故得與神靈共尊至此旅酬禮䙝故不敢酌上尊欽定義疏加勺亦南柄北面酌也與堂上之尊同庭中凡四尊尊必朋設東西階下分賔主人黨也宗廟之禮尊者主於敬親者主於愛以敬為主故酳尸而不敢酬况於旅乎少牢不賔尸亦獻而止矣少牢賔尸而後尸舉旅行酬則殺乎正祭矣以愛為主故尸加爵而爵止亦欲與於祭者之無不醉也况主祭者乎一舉觶為旅酬始再舉觶為無算爵始而凡鄉飲射燕合情同愛之禮皆視乎此矣主人洗觶酌於西方之尊西階前北面酬賔賔在左注先酌西方者尊賔之義主人奠觶拜賔答拜主人坐祭卒觶拜賔答拜主人洗觶賔辭主人對卒洗酌西面賔北面拜注西面者鄉賔位立於西階之前賔所答拜之東北蕙田案酬賔卒觶主人酌而自飲以導賔飲也下賔取觶奠之為旅酬時取以酬長兄弟主人奠觶於薦北注奠酬於薦左非為其不舉行神惠不可同於飲酒賔坐取觶還東面拜主人答拜賔奠觶於薦南揖復位注還東面就其位薦西奠觶薦南明將舉敖氏繼公曰復位主人復阼階下西面位也張氏爾岐曰設尊酬賔以啟旅酬蕙田案復位敖説為是疏云揖復位則初奠時少南於位可知未是欽定義疏獻酢酬三者具而禮成故獻之禮成於酬賔主之正禮然也此主人酬賔所以成獻賔之禮少牢下篇亦酬尸以賔尸在堂則以賔禮事之也特牲但酬賔而已尸則不敢酬之以其在室神之也蕙田案以上主人酬賔長賔奠觶主人洗爵獻長兄弟於阼階上如賔儀注酬賔乃獻長兄弟者獻之禮成於酬先成賔禮此主人之義亦有薦脀設於位私人為之與敖氏繼公曰如賔儀兼酢言洗獻衆兄弟如衆賔儀注獻卑而必為之洗者顯神惠此言如衆賔儀則知衆賔洗明矣敖氏繼公曰以承已自酢之後故須洗之蕙田案記長兄弟及宗人折其餘如佐食爼衆兄弟若有公有司私臣皆殽脀膚一離肺一賔與長兄弟之薦自東房其餘在東堂私臣門東北面西上獻次兄弟詳見上文獻賔條此不重出蕙田案以上主人獻長兄弟自酢洗獻衆兄弟洗獻内兄弟於房中如獻衆兄弟之儀注内兄弟内賔宗婦也如衆兄弟如其拜受坐祭立飲設薦爼於其位而立内賔位在房中之尊北不殊其長畧婦人也有司徹曰主人洗獻内賔於房中南面拜受爵婦疏云内賔宗婦也者此總云内兄弟下記云内賔宗案彼注云内賔姑姊妹宗婦族人之婦若然兄弟者服名故號婦人為兄弟也主人西面答拜更爵酢卒爵降實爵於篚入復位注爵辨乃自酢以初不殊其長也内賔之長亦南面答拜蕙田案以上主人獻内兄弟自酢長兄弟洗觚為加爵如初儀不及佐食洗致如初無從注大夫士三獻而禮成多之為加也不及佐食無從殺也致致于主人主婦疏如初儀者如賔長三獻之儀但賔長獻十一爵此兄弟之長加獻唯有六爵以其闕主人主婦致爵并酢四爵及獻佐食五唯有六在者洗觚為加獻一也尸酢長兄弟二也獻祝三也致爵于主人四也致爵于主婦五也受主人酢六也敖氏繼公曰無從謂所獻所致者皆無燔也無從則不啐酒而卒爵亦其異者欽定義疏加爵之義有二一比於侑食勸飽之意一使長兄弟衆賔長得以伸其敬也及祝而不及佐食者佐食與旅而祝不與旅非但禮殺而已加爵而後致爵亦所以伸敬於主祭者也加爵用觚所以别於正獻也致爵於主婦既乃更一觚以自酢故篚實二觚焉酢訖降奠於篚蕙田案以上長兄弟為加爵衆賔長為加爵如初爵止注尸爵止者欲神惠之均于在庭疏庭賔及兄弟雖得一獻未得旅酬其尸得三獻又别受加爵故停之使庭行旅酬陳氏禮書士與下大夫無賔尸故有加爵上大夫有賔尸故無加爵士加爵三而下大夫加爵二者厭降也欽定義疏大夫賔尸尸作三獻之爵遂繼之以旅酬是尸自行其惠於廟中也士不賔尸則尸不出堂而行旅酬之禮矣故於加爵而爵止所以示致惠之意而使上下同其愛内外致其忱至於既醉而止也蓋三獻以申敬故爵止而上下内外無不獻焉斯以廣敬也加爵以盡歡故爵止而上下内外無不酬焉斯以合歡也蕙田案以上衆賔長為加爵爵止嗣舉奠盥入北面再拜稽首注嗣主人將為後者舉猶飲也使嗣子飲奠者將𫝊重累之者大夫之嗣子不舉奠辟諸侯疏奠者即上文祝奠奠于鉶南是也欽定義疏大夫辟君士卑不嫌此通例也但天子諸侯所以有上嗣受爵之禮者以天子諸侯繼世為君而卿大夫不世爵故其嗣子不遽行舉奠者不敢以卿大夫自居也士之子為士者家有之故其嗣子得行舉奠禮亦即乎人心之安焉耳尸執奠進受復位祭酒啐酒尸舉肝舉奠左執觶再拜稽首進受肝復位坐食肝卒觶拜尸備答拜焉注食肝受尊者賜不敢餘也備猶盡也毎拜答之以尊者與卑者為禮畧其文耳古文備為復疏食若不盡直云嚌之而已郝氏敬曰尸備答拜者重繼體每拜皆答舉奠洗酌入尸拜受舉奠答拜尸祭酒啐酒奠之舉奠出復位注啐之者答其欲酢已也奠之者復神之奠觶嗣齒于子姓凡非主人升降自西階敖氏繼公曰舉奠酌以進尸反尸之奠觶耳尸祭啐奠之如初禮新之欽定義疏以傳宗廟之重言之曰受重以承祖宗之貺言之曰舉奠祭祀之陳饌以奠而成嗣舉奠則雖在子弟之列而已付以他日祭祀之事矣其舉奠必在加爵爵止之後何也加爵則室中之禮將畢矣若待旅酬而後舉又無以行吾敬也惟於爵止而舉奠可以明前人之保佑其子孫焉於其舉奠而洗酌又可以眀祚𦙍之致孝其宗祖焉其序在長兄弟加爵之後而又在兄弟弟子舉觶之先情深而文美也蕙田案以上嗣舉奠兄弟弟子洗酌於東方之尊阼階前北面舉觶於長兄弟如主人酬賔儀注弟子後生也張氏爾岐曰此下言旅酬前主人酬賔已舉西階一觶此弟子復舉東階一觶皆為旅酬啟端因於此時告祭設羞先旅西階一觶加爵者即作止爵次旅東階一觶又次並旅東西二觶而神惠均於在庭矣蕙田案以上弟子舉觶於長兄弟宗人告祭脀注脀爼也所告者衆賔兄弟内賔也獻時設薦爼于其位至此禮又殺告之祭使成禮也其祭皆離肺不言祭豆可知欽定義疏注謂衆賔衆兄弟内賔則佐食亦在其中矣祭脀使之成禮又因以為羞庶羞之節也燕禮之祭薦者大夫而已既脱屨升席故先羞而後祭所以安之也此則凡在庭中者皆祭焉又不獨薦而有爼故必先祭乃羞也告必宗人何庭長也乃羞注羞庶羞也下尸胾醢豆而已此所羞者自祝主人至於内賔無内羞蔡氏徳晉曰禮庶羞不踰牲則此羞即當以豕肉為之欽定義疏天子諸侯正祭百物備故賔長受酢後薦尸以羞豆羞籩至繹祭而後及於主祭與助祭者楚茨之詩曰為豆孔庶為賔為客毛傳以為繹而賔尸及賔客是也大夫正祭羞於尸庶羞四豆至賔尸則尸侑主人主婦内羞庶羞兼有之賔兄弟内賔及私人亦有庶羞不賔尸羞於尸亦庶羞四豆致爵後尸祝主人主婦内羞庶羞兼有之賔兄弟以下則無士羞於尸亦庶羞四豆祭脀之後祝主人以下有庶羞而皆無内羞所以眀隆殺之等也祝主人以下必有庶羞何也禮無酬而不羞者雖鄉飲射一獻之禮亦有之是皆為飲酒設也蕙田案以上祭脀乃羞賔坐取觶阼階前北面酬長兄弟長兄弟在右注薦南奠觶疏自此盡實觶於篚論行族酬之間作止爵之事但此特牲之禮堂下行旅酬並無算爵在室中者不與旅酬之事賔主相酬主人常在東其同在賔中則受酬者在左賔奠觶拜長兄弟答拜賔立卒觶酌於其尊東面立長兄弟拜受觶賔北面答拜揖復位注其尊長兄弟尊也此受酬者拜亦北面時疏以其旅酬無算爵以飲者酌已尊酬人之酌彼尊是各自其酒故無算爵賔弟子及兄弟弟子舉觶于其長各酌于其尊也長兄弟西階前北面衆賔長自左受旅如初注旅行也受行酬也初賔酬長兄弟長兄弟卒觶酌於其尊西面立受旅者拜受長兄弟北面答拜揖復位衆賔及衆兄弟交錯以辨皆如初儀注交錯猶言東西敖氏繼公曰交錯謂二黨互酬也蕙田案此賔與兄弟旅酬張爾岐以為旅西階一觶是也蕙田案以上賔與兄弟旅酬為加爵者作止爵如長兄弟之儀注于旅酬之間言作止爵明禮殺並作郝氏敬曰初衆賔長繼長兄弟加爵尸飲長兄弟爵不飲衆賔長爵以己受加爵而衆賔與兄弟酬未及今既旅及衆賓與兄弟尸可飲矣故加爵之賓長作起其初止之爵請尸飲也蕙田案此尸飲衆賔長之加爵蕙田案以上衆賔長作止爵長兄弟酬賔如賔酬兄弟之儀以辨卒受者實觶於篚注長兄弟酬賔亦坐取其奠觶此不言交錯以辨賔之酬不言卒受者實觶於篚明其相報禮終於此其文省長疏奠觶者即上弟子舉觶於其長是也賔舉奠觶於兄弟行旅酬盡皆徧長兄弟舉觶於賔行旅酬亦皆徧交錯省文蕙田案此衆兄弟酬賔賔酬衆兄弟衆兄弟與賔互相酬以徧張爾岐以為旅阼階一觶是也以上為旅酬正數以下為無算爵蕙田案以上兄弟與賔旅酬賔弟子及兄弟弟子洗各酌於其尊中庭北面西上舉觶於其長奠觶拜長皆答拜舉觶者祭卒觶拜長皆答拜舉觶者洗各酌於其尊復初位長皆拜舉觶者皆奠觶於薦右注奠觶進奠之于薦右非神惠也今文曰奠于薦右疏自此盡爵無算論二觶並行無算爵之事止爵行旅酬得為神惠至别為無算爵在下自相勸故為非神惠故奠于薦右同于生人飲酒舉者奠于薦右也敖氏繼公曰奠觶薦右此為無算爵始長皆執以興舉觶者皆復位答拜長皆奠觶於其所皆揖其弟子弟子皆復其位注復其位者東西面位弟子舉觶于其長所以序長幼教孝弟凡堂下拜亦皆北面當疏上文復位復在庭初舉北面位此重言復位復東西面位可知爵皆無算注算數也賔取觶酬兄弟之黨長兄弟取觶酬賔之黨唯己所欲亦交錯以辨無次第之數因今接㑹使之交恩定好優勸之敖氏繼公曰其儀之與旅酬異者惟不拜耳張氏爾岐曰二觶並舉為無算爵蕙田案以上弟子各舉觶遂無算爵利洗散獻於尸酢及祝如初儀降實散於篚注利佐食也言利以今進酒也更言獻者以利侍尸禮將終宜一進酒嫌于加酒亦當三也不致爵禮又殺也疏利與佐食乃有二名者以上文設爼啟㑹爾敦之時以黍稷為食故名佐食今進以酒酒所以供養故名利利即養也故鄭云以今進酒也郝氏敬曰禮將終告利成故利終獻以成禮蕙田案以上佐食獻尸祝主人出立於戸外西面注事尸禮畢祝東面告利成注利猶養也供養之禮成祝疏少牢云主人出立于阼階上西面出立于西階上東面祝告曰利成此户外告利成彼階上告利成以尊者稍逺于尸若天子諸侯禮畢于堂下告利成故詩楚茨云孝孫徂位工祝致告鄭注以祭禮畢孝孫往位堂下西面位也祝于是致孝孫之意告尸以利成也尸謖祝前主人降注謖起也前猶導也少牢饋食禮曰祝入尸謖主人降立于阼階東西面祝先尸從遂出于廟門前尸之儀士虞禮備矣祝反及主人入復位命佐食徹尸爼爼出於廟門注爼所載于肵爼少牢饋食禮曰有司受歸之蕙田案以上祝告利成尸出徹庶羞設於西序下注為將餕去之庶羞主為尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗已侍於賔奠然後燕私燕私者何也已而與族人飲也此徹庶羞置西序下者為將以燕飲與然則自尸祝至于兄弟之庶羞宗子以與族人燕飲于堂内賔宗婦之庶羞主婦以燕飲于房筵對席佐食分簋鉶注為將餕分之也分敦黍于㑹為有對也敦有虞氏之器也周制士用之變敦言簋容同姓之士得從周制耳祭統曰餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣疏大夫異姓既用異代之器故少牢特牲皆用敦則同姓之士當同周制用簋敖氏繼公曰此簋即敦之異名分簋鉶者以簋分簋實以鉶分鉶羮也宗人遣舉奠及長兄弟盥立於西階下東面北上祝命嘗食𧃊者舉奠許諾升入東面長兄弟對之皆坐佐食授舉各一膚注命告也士使嗣子及兄弟𧃊其惠不過族親古文𧃊皆作餕疏此决下篇少牢二佐食及二賔長餕明惠大及異姓不止族親而已主人西面再拜祝曰𧃊有以也兩𧃊奠舉於爼許諾皆答拜注以讀如何其久也必有以也之以祝告𧃊釋辭以戒之言女𧃊此當有所以也以先祖有徳而享于此祭其坐𧃊其餘亦當以之也少牢饋食禮不戒者非親昵也舊説云主人拜下𧃊席南若是者三注丁寜戒之皆取舉祭食祭舉乃食祭鉶食舉注食乃祭鉶禮殺乃疏正祭時尸祭鉶爾黍卒食主人降洗爵宰贊一爵主人升酌酳上𧃊上𧃊拜受爵主人答拜酳下𧃊亦如之注少牢饋食禮曰贊者洗三爵主人受于户内以授次𧃊舊説云主人北面授下𧃊爵主人拜祝曰酳有與也如初儀注主人復拜為戒也與讀如諸侯以禮相與之與言女酳此當有所與也與者與兄弟也既知似先祖之徳亦當與女兄弟謂教化之疏諸侯以禮相與之與見禮記禮運言此者戒嗣子與長兄弟及衆兄弟相教化相與以尊先祖之徳也兩𧃊執爵拜注答主人也祭酒卒爵拜主人答拜兩𧃊皆降實爵於篚上𧃊洗爵升酌酢主人主人拜受爵注下𧃊復兄弟位不復升也上𧃊即位坐答拜注既授爵户内乃就坐主人坐祭卒爵拜上𧃊答拜受爵降實於篚主人出立於户外西面注事餕者禮畢陳氏禮書天子諸侯之𧃊自君以至百官而煇胞翟閽之吏皆與焉以明惠周于境内也大夫之𧃊二佐食二賔長而已以明惠及于臣也士之𧃊舉奠與長兄弟而已以明惠止于具親也羞𧃊筵于室中就神位也用尸之簋鉶施神惠也其禮則降與俟命而後升祭舉祭鉶然後食拜酳祭酒而後飲其位則上𧃊東面下𧃊不酢而先降上𧃊酢而後出𧃊之大畧也然士𧃊于其舉也戒之曰𧃊有以也于其酳也戒之曰𧃊有與也而大夫之𧃊不戒士𧃊受爵皆拜而大夫之𧃊受爵不拜大夫之上𧃊不親酢而親嘏士之上𧃊親酢而不嘏何也大夫之𧃊不戒以其非舉奠也受爵不拜以其非貴者也上𧃊不親酢以其親嘏也士之上𧃊不嘏此其降于大夫與蕙田案以上𧃊祝命徹阼爼豆籩設於東序下注命命佐食阼爼主人之爼宗婦不徹豆籩徹禮畧各有為而已設于東序下亦將燕也祝執其爼以出東面於户西注俟告利成少牢下篇曰祝告利成乃執爼以出宗婦徹祝豆籩入於房徹主婦薦爼注宗婦既並徹徹其卑者士虞禮曰祝薦席徹入于房蕙田案以上徹爼佐食徹尸薦爼敦設於西北隅几在南厞用筵納一尊佐食闔牖户降注厞隱也不知神之所在或諸逺人乎尸謖而改饌為幽閽庶其饗之所以為厭飫少牢饋食禮曰南面如饋之設此所謂當室之白陽厭也則尸未入之前為隂厭矣曾子問曰殤不備祭何謂隂厭陽厭也面疏引少牢者見彼大夫禮陽厭南面此士禮東面雖位不同當室之白則同案曽子問注云當室之白謂西北隅得户之明者也凡言厭者謂無尸直厭飫神尸未入之前為隂厭謂祭于奥中不得户明故名隂厭楊氏復曰案釋宮云西南隅謂之奥西北隅謂之屋漏注奥者隐奥屋漏者當室之白日光所漏入陳氏禮書尸謖之後陽厭西北漏漏室之白故曰陽席南面蕙田案隂厭陽厭之文見曽子問是孝子求神非一處之意敖氏以改設未即徹去重其為神之餘食葢不主陽厭之説蕙田案以上陽厭祝告利成降出主人降即位宗人告事畢賔出主人送於門外再拜注拜送賔也凡去者不答拜拜疏云凡總觧諸文主人拜送賔皆不答鄭注鄉飲酒云禮有終是也若賔更答拜是更崇新敬禮故不答也佐食徹阼爼堂下爼畢出注記爼出節兄弟及衆賔自徹而出唯賔爼有司徹歸之尊賔也疏有司徹歸尸侑之爼不儐尸歸尸爼皆不見歸賔爼鄭所以知歸賔爼者上文賔出主人送于門外再拜明賔不自徹爼主人使歸之若助君祭必自徹其爼鄭注曲禮大夫以下或使人歸之是以魯郊不致燔爼于大夫孔子不脫冕而行士大夫家尊賔則使歸之自餘亦自徹而去也蕙田案以上禮畢賔出記特牲饋食其服皆朝服𤣥冠緇帶緇韠注於祭服此也皆者謂賔及兄弟筮日筮尸視濯亦𤣥端至祭而朝服朝服者諸侯之臣與其君日視朝之服大夫以祭今賔兄弟縁孝子欲得嘉賔尊客以事其祖禰故服之緇韠者下大夫之臣夙興主人服如初則固𤣥端疏士冠禮云主人𤣥冠朝服緇帶素韠韠與裳同色大夫臣朝服素韠此緇韠故云下大夫之臣敖氏繼公曰緇韠者其别于大夫助祭之賔與朝服用𤣥冠之衣冠皮弁之裳故次于皮弁而尊于𤣥端唯尸祝佐食𤣥端𤣥裳黄裳襍裳可也皆爵韠注與主人同服周禮士之齊服有𤣥端素端然則𤣥裳上士也黄裳中士襍裳下士疏士之齊服𤣥端一而裳有三也蕙田案以上記祭服設洗南北以堂深東西當東榮注榮屋翼也水在洗東注祖天地之左海篚在洗西南順實二爵二觚四觶一角一散注順從也言南從統于堂也二爵者為賔獻爵止主婦當致也二觚長兄弟及衆賔長為加爵二人班同迎接並也四觶一酌奠其三長兄弟酬賔卒受者與賔弟子兄弟弟子舉觶於其長禮殺事相接禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角舊説云爵一升觚二升觶三升角四升散五升李氏寳之曰賔獻尸之時爵止主人當致爵于主婦故爵二敖氏繼公曰二觚者長兄弟以觚為加爵因以致于主人主婦既則更之以酢于主人也四觶者其一奠于神席前其一乃主人以奠酬于賔其一乃衆賔長加爵于尸其一乃爵止而未舉之時兄弟弟子舉觶于其長者也壺棜禁饌於東序南順覆兩壺焉葢在南明日卒奠冪用綌即位而徹之加勺注覆壺者盝瀝水且為其不宜塵冪用綌以其堅潔禁言棜者祭尚厭飫得與大夫同器不為神戒也禁疏棜之與禁因物立名大夫尊以厭飫為名士卑以戒為稱復以有足無足立名故禮記注云無足有似于棜士曰禁由有足以士虞禮云尊于室中兩甒醴酒無禁禁由足生名禮記云大夫用棜士用禁及鄉飲鄉射皆非祭禮是以雖大夫去足猶存禁名至祭則去足名為棜禁不為神戒也楊氏志仁曰奠酌奠奠于鉶南時即位尸即席坐蕙田案棜禁所以承尊不止承壺敖氏謂壺棜禁􅔑壺之棜禁也非是籩巾以綌也纁裹棗烝栗擇注籩有巾者果實之物多皮核優尊者可烝裹之也烝擇互文舊説纁裹者皆𤣥被鉶芼用苦若薇皆有滑夏葵冬荁注苦苦荼也荁菫屬乾之冬滑于葵棘心七刻注刻若龍頭敖氏繼公曰䘮祭七用桑吉祭七用棘者䘮桑音同吉棘聲近故也牲㸑在廟門外東南魚腊㸑在其南皆西面饎㸑在西壁注饎炊也西壁堂之西墻下舊説云南北直屋梠稷在南疏舊説者按爾雅釋宮曰檐謂之樀孫氏云謂屋梠周人謂之梠齊人謂之檐謂承檐行材肵爼心舌皆去本末午割之實於牲鼎載心立舌縮爼注午割縱横割之亦勿沒立縮順其性心舌知食味者欲尸之饗此祭是以進之勿疏云載心立舌縮爼者少牢云舌皆切本末亦午割沒其載于肵横之此言縮爼者彼言横据爼上為横此言縮据鄉人為縮是以少牢云皆進下是也敖氏繼公曰既實牲體于鼎乃制此而實之于其上載謂載于肵爼賔與長兄弟之薦自東房其餘在東堂注東堂東夾之前近南疏其餘謂衆賔兄弟之薦也蕙田案以上記器物陳設沃尸盥者一人奉槃者東面執匜者西面淳沃執巾者在匜北注匜北執匜之北亦西面毎事各一人淳沃稍注之今文淳作激郝氏敬曰㳘灌曰沃細濯曰淳宗人東面取巾振之三南面授尸卒執巾者受注宗人代授巾庭長尊尸入主人及賔皆辟位出亦如之注辟位逡遁蕙田案以上記尸入盥嗣舉奠佐食設豆鹽注肝宜鹽也佐食當事則户外南面無事則中庭北面注當事將有事而未至凡祝呼佐食許諾注呼猶命也蕙田案以上記執事者之節宗人獻與旅齒於衆賔注尊庭長齒從其長幼之次佐食於旅齒於兄弟敖氏繼公曰佐食已酬于室中故獻兄弟時不與而但與其旅酬也蕙田案以上記宗人佐食獻旅之次尊兩壺於房中西墉下南上注為婦人旅也其尊之節亞西方内賔立於其北東面南上宗婦北堂東面北上注二者所謂内兄弟内賔姑姊妹也宗婦族人之婦其夫屬于所祭為子孫或南上或北上宗婦宜統于主婦主婦南面北堂中房而北疏云或南上或北上者内賔如娣妹賔客之類南上自取曲禮云東鄉西鄉以南方為上宗婦雖東鄉取統于主婦故北上主婦南面故也云北堂中房而北者謂房中半已北為北堂也主婦及内賔宗婦亦旅西面注西面者異于獻也男子獻于堂上旅于堂下婦人獻于南面旅于西面内賔象衆賔宗婦象兄弟其節與其儀依男子也主婦酬内賔之長酌奠于薦左内賔之長坐取奠于右宗婦之娣婦舉觶于其姒婦亦如之内賔之長坐取奠觶酬宗婦之姒交錯以辯宗婦之姒亦取奠觶酬内賔之長交錯以辯内賓之少者宗婦之娣婦各舉奠于其長並行交錯無算其拜及飲者皆西面主婦之東南疏旅酬之法飲皆西面知在主婦之東南者以其不背主婦得邪角相向也敖氏繼公曰此旅酬之儀雖與在庭者畧同然亦不能無少異盖主人既酬内兄弟主婦則酬内賔之長酌奠于薦左内賔之長取之奠于右及兄弟舉旅之時内賔之長亦取奠觶以酬主婦主婦以酬次内賔次内賔以酬宗婦之長亦交錯以辯内賔之少者宗婦之少者又各舉觶于其長以為無算爵始内賔長之觶惟以旅主婦而已宗婦長之觶則以旅次内賔亦交錯以辯皆不拜畧如鄉射無算爵之儀也宗婦贊薦者執以坐於户外授主婦蕙田案記内賔宗婦皆殽脀膚一離肺一詳見上文獻衆賔條不重出宗婦贊薦者云云其儀已見於經而記復著之敖氏謂葢備載其所聞耳蕙田案以上記房中及宗婦贊薦之事尸卒食而祭饎㸑雍㸑注雍孰肉以尸享祭竈有功也舊説云宗婦祭饎㸑亨者祭雍㸑用黍肉而已無籩豆爼禮器曰燔燎于㸑夫㸑者老婦之祭盛于盆尊于瓶疏云亨者則周禮亨人之官其職主實鑊水㸑亨之事以供外内饔故使之祭饔㸑也云用黍肉而已無籩豆爼者亦約禮器云盆瓶知之郝氏敬曰饎㸑以炊黍稷雍㸑以烹牲魚腊蕙田案以上記祭㸑賔從尸爼出廟門乃反位注賔從尸送尸也士之助祭終其事也爼尸爼也賔既送尸復入反位者宜與主人為禮乃去之尸疏送尸為終其事則更無儐尸之禮若上大夫有儐者尸出賔不送以其事終于儐尸故也蕙田案以上記賔送尸之節尸爼右肩臂臑肫胳正脊二骨横脊長脅二骨短脅注尸爼神爼也士之正祭禮九體貶于大夫有併骨二亦得十一之名合少牢之軆數此所謂放而不致者凡爼實之數竒脊無中脅無前貶于尊者不貶正脊不奪正也正脊二骨長脅二骨者將舉于尸尸食未飽不欲空神爼不疏少牢正體之數十一若牢並骨并數則十七放而致致至也禮器注云謂若諸侯自山龍以下皆有放象諸侯山龍以下至日月星辰卿大夫又不山龍此士併骨二數乃得十一除此唯九而已亦是放而不至也凡爼實之數有九有七有五是竒數以其鼎爼竒故實數亦竒而相稱也少牢大夫禮三脊脅俱有此但有二體貶于大夫也等貶牲體不貶正脊者不奪其正長脅亦不貶者義與正脊同尸食未飽不欲空神爼此脊與脅二骨本為饌厭飫所設也膚三注為𧃊用二厭飫一也郝氏敬曰肉無骨曰膚離肺一注離猶㨒也小而長午割之亦不提心謂之舉肺刌肺三注為尸主人主婦祭今文刌為切魚十有五注魚水物以頭枚數隂中之物取數于月十有五日而盈少牢饋食禮亦云十有五而爼尊卑同此所謂經而等也而疏云魚水物以頭枚數者對三牲與腊以體數也經等禮器注云謂若天子以下至士庶人為父母三年是也引之者諸魚數亦尊卑同也腊如牲骨注不但言體以有一骨二骨者郝氏敬曰腊爼如牲骨無膚與肺也祝爼髀脡脊二骨脅二骨注凡接于神及尸者爼不過牲三體以特牲約加其可併者二亦得竒名少牢饋食禮羊豕各三體則疏云祝爼直云脅二骨謂代脅也以尸爼無脡脊祝有之尸爼無代脅祝爼有代脅可知云凡接于神及尸者祝佐食賔長長兄弟宗人之等是也知皆三體者下佐食爼觳折脊脅也賔骼長兄弟及宗人折其餘如佐食爼故知皆三體也以特牲約加其可併者二骨者是尊祝也佐食已下卑無加故下注云三體卑者從正是也云少牢饋食禮羊豕各三體者二牲各三體共六體不竒者通腊脾為七則亦竒數也以其腊既兩髀屬于尻不殊故為一體膚一離肺一阼爼臂正脊二骨横脊長脅二骨短脅注主人尊欲其體得祝之加數五體又于加其可併者二亦得竒名臂左體臂也膚一離肺一主婦爼觳折注觳後足折分後右足以為佐食爼不分左臑折辟大夫妻疏不用後左足者左足太卑其餘如阼爼注餘謂脊脅膚肺敖氏繼公曰觳非正體折骼之下而取之故云觳折凡牲固皆折也然經文之例其先言體乃言折或單言折者必非正體若全體者也葢與折爼之説不同佐食爼觳折脊脅注三體卑者從正用疏直云脊脅不定體名欲見得便之少牢佐食爼設于兩階之間其爼折一膚鄭注云折者擇取牢正體餘骨折分用之有脀而無薦亦逺下尸是無定體也膚一離肺一賔骼長兄弟及宗人折其餘如佐食爼注骼左骼也賔爼全體尊賔不用尊體為其已甚卑而全之其宜可也長兄弟及宗人折不言所分畧之敖氏繼公曰凡骼與觳連乃為全體上記兩見觳折則此骼亦非全體矣不言骼折者以其可知不必言也衆賔及衆兄弟内賔宗婦若有公有司私臣皆殽脀注又畧此所折骨直破折餘體可殽者升之爼一而已不備三者賤祭禮接神者貴凡骨有肉曰殽祭統曰凡為爼者以骨為主貴者取貴骨賤者取賤骨貴者不重賤者不虚示均也爼者所以明惠之必均也善為政者如此故曰見政事之均焉公有司亦士之屬命于君者也私臣自己所辟除者疏接神謂長兄弟及宗人已上爼皆三皆有嚌肺自衆賔已下折體而已不接神及尸賤無獻故也宗人雖不獻執巾以授尸亦名接也膚一離肺一蕙田案以上記爼實公有司門西北面東上獻次衆賔私臣門東北面西上獻次兄弟升受降飲注獻在後者賤也祭祀有上事者貴之非執事者亦皆與旅疏衆賔擇取公有司可執事者門外在有司羣執事中入門列在東面為衆賔餘者在門西位不執事者賤于執事者故曰有上事者貴之宗人獻與旅齒于衆賔則公有司為之佐食于旅齒于兄弟則私臣之中擇為賔使為佐食者也但賔爼公有司設之兄弟脀私人為之然則公有司私臣薦爼皆使徒隷為之與按祭統云凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序此不見昭穆位者主人衆兄弟非昭穆乎故彼注昭穆猶特牲少牢饋食之禮主人之衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂若酬之是也若其有爵者則以爵序之何故然也案文王世子其在外朝則以官其在宗廟之中則如外朝之位宗人授事以爵以官是不以姓其獻之亦以官故祭統云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等是也以此差之知無爵者從昭穆有爵者則以官矣蕙田案以上記公有司私臣位及受獻之次右儀禮特牲饋食禮五禮通考卷一百十
