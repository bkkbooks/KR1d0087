body:
  text: 五禮通考卷一刑部尚書秦蕙田撰吉禮一圜丘祀天蕙田案禮莫重於祭祭莫大於天天為百神之君天子為百姓之主故惟天子歲一祭天周禮冬日至祀昊天上帝於圜丘冬至取陽生南郊取陽位圜丘取象天燔柴取達氣其玉幣牲牢尊爼樂舞車旗之屬各以象類雖一名一物之微莫不有精意存於其間故曰郊所以明天道又曰明乎其義治國其如示諸掌乎自禮經不明章句之儒羣言淆亂朝堂之上議論紛拏六天始於康成合祭起於新莽排擊者不遺餘力然行之數千百載而未已大都沿注疏者失之愚因前代者失之陋樂簡便者失之怠皆非所以交於旦明之義也兹輯祀天門以經為斷以史為案經傳為之綱領疏解為之條貫正其紕繆一其異同而歷代典禮之得失廷臣建議之是非洞若觀火議禮家可考覽焉易益卦六二王用享于帝吉疏帝天也此時以享祭享于帝明靈降福朱子本義以其居下而受上之益故為卜郊之吉占渙卦象下傳風行水上渙先王以享于帝立廟疏先王以渙然無難之時享于上帝以告太平建立宗廟以祭祖考鼎卦彖下傳聖人亨以享上帝疏享帝尚質特牲而已故直言亨書經召誥用牲于郊牛二蔡傳郊祭天地也故用二牛周禮春官大宗伯之職掌建邦天神之禮注建立也禮記曲禮天子祭天地疏天地有覆載大功天子主有四海故得總祭天地以報其功王制天子祭天地集説講義謂祭天神于南郊祭地祗于北郊禮運祭帝于郊所以定天位也疏天子至尊而猶祭于郊以行臣禮而事天是欲使嚴上之禮達于下天髙在上故云定天位也禮行于郊而百神受職焉注百神列宿也郊疏百神天之羣神也王者天備禮則星辰不忒故云受職禮器有以下為貴者至敬不壇掃地而祭為髙必因丘陵為下必因川澤因天事天因地事地因吉土以饗帝于郊饗帝于郊而風雨節寒暑時祀帝于郊敬之至也郊特牲兆于南郊就陽位也于郊故謂之郊陸氏佃曰言天無所不在以我祭于郊也故謂之郊而已于國則己褻于野則已疏祭之郊節矣郊所以明天道也注明謂則之以示人郊之祭也大報本反始也疏謝其恩謂之報歸其初謂之反祭義惟聖人為能享帝注謂祭之能使之享也帝天也仲尼燕居郊社之義所以仁鬼神也注仁猶存也郊有后稷疏仁謂仁恩相存念也鬼神謂人之鬼神中庸郊社之禮所以事上帝也朱子章句郊祀天社祭地不言后土者省文也蕙田案南郊北郊分祀天地此泛言郊似不專主乎天也以其對社而言故朱子以為祭天耳然社亦非地之正祭也詳見後説詩周頌昊天有成命序曰郊祀天地也疏郊祀天地之樂歌也祭之于南郊祭之于北郊雖南北有異祭俱在郊故總言郊祀也經不言地序知其因此二祭而作故具言之漢書郊祀志云丞相衡御史大夫談奏言帝王承天之序莫重于郊祀故聖王盡心極慮以建其制祭天于南郊就陽之義也瘞地于北郊即隂之象也天之於天子也因其所都而各饗焉右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴于太壇祭天也瘞埋于泰折祭地也兆于南郊所以定天位也祭地于泰折在北郊就隂位也郊處各在聖王所都之南北書曰越三日丁巳用牲于郊牛二周公加牲告徙新邑定郊禮于洛明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必於國郊朱子曰古時天地定不是合祭日月山川百神亦無共一時祭享之禮豈有祭天便將下許多百神一齊排作一堆都祭周禮有圜丘方澤之説後來人却只説地便是后土見於書傳言郊社多矣某看來不要如此也還有方澤之祭又曰古昔聖王制為祭祀之禮必以象類故祀天于南祭地于北而其壇壝樂器幣之屬亦各不同若曰合祭天地于圜丘則古者未嘗有此瀆亂龎雜之禮禮經會元大司樂冬日至地上圜丘之制則曰禮天神夏日至澤中方丘之制則曰禮地祗圜丘禮天方丘禮地則天地分祭明矣蓋冬至陽生天屬陽故冬至于圜丘陽位以禮天神夏至隂生地屬隂故夏至於方丘隂位以祭地祗此天神地祗之祭必求諸隂陽之義亦如禮東方則以立春禮青帝於東郊禮南方則以立夏禮赤帝于南郊禮西方則以立秋禮白帝于西郊禮北方則以立冬禮黑帝于北郊此則有分祭之禮也先儒以為合祭者徒見所言昊天有成命郊祀天地也則曰郊祀無天地之分不知詩人但見郊祀天地皆歌此詩何嘗言其合祭也况周禮掌次王大旅上帝則張氊案設皇邸司裘為大裘以共王祀天之服皆言天而不及地宗伯六器則以蒼璧禮天黃琮禮地是天地之禮玉有别也典瑞則以四圭祀天兩圭祀地是天地之祀玉不同也小宗伯言五帝且兆於四郊而不言與昊天上帝同郊祀况可與后土地祗合祭乎愚故謂郊丘分合之説當以周禮為定陳氏禮書祀天于南郊而地上之圜丘者南郊之丘也丘圓而髙所以象天此所謂為髙必因丘陵也祭地于北郊而澤中之方丘者北郊之丘也丘方而下所以象地此所謂為下必因川澤也泰壇南郊之壇也以之燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圓言泰則大之至也言壇折則人為之也祭祀必於自然之丘所以致敬燎瘞必於人為之壇折所以盡文宗廟之禮瘞埋于兩階之間則壇必設于圜丘之南坎必設于方丘之北矣燔柴以升煙瘞埋以達氣則燔必于樂六變之前瘞必于樂八變之前矣先王燔瘞于郊丘其牲角繭栗其牲體全脀其羮太羮其器犧尊疏布冪樿杓豆登鼎爼簠簋匏陶之類其藉蒲越藁秸其歌樂黃鍾太蔟奏大吕應鍾其舞雲門咸池其鼓雷鼓靈鼓其車玉路素車其斾太常其服大裘袞冕其搢執大圭鎮圭其位則神南面王北面示北面王南面而日月從祀則日居東月居西古者郊祀大略如此而已羅泌路史子曰事父孝故事天明事母孝故事地察人君之事天地正如人子之事父母故知事父母則知所以事天地矣天明地察厥類惟章孰有南北郊祀之不明者乎昊天有成命郊祀天地者謂用是以郊天亦以之而祀地言郊祀天地皆用此詩章耳般之祀四嶽河海豈謂其合祭哉合祭天地此王莽之妄武后之失也而顧用之果為得耶夫聖人之為祭必求其類以為之數是必合其情而後神可交也燔柴于太壇瘞埋于太折太壇南郊之壇太折北方之坎壇于圜丘南坎于方澤北是故圜丘貴祀方澤貴祭因天事天因地事地輕重髙下隂陽清濁圜方南北判然其不同矣父天圜丘母地方澤此則事不同也南郊就陽北郊就隂此則地不同也祭日南郊祭月北郊此則配不同也圜丘以南至郊方澤以北至祀此則時不同也郊逺而尊故以郊言祀近而親故以時紀此則名不同也郊以騂犢祀以黝牲則牲不同矣壇圜中規折方中矩燔柴于太壇瘞埋于太折則制不同矣璧琮而禮蓋軫而祀則禮不同矣圜鍾為宫冬日至于地上圜丘奏之函鍾為宫夏日至于澤中方丘奏之則樂不同矣神南面君北面示北面君南面則位不同矣夫不同者顧若此而且謂其必合祭豈盡敬之道哉祭帝于郊所以定天位也祀社于國所以列地利也郊社者所以尊天而親地也故明乎郊社之禮禘嘗之義者治國其如示諸掌中庸所言郊社之禮所以事上帝若郊社可合則禘嘗亦可合矣圜鍾以禮天神函鍾以禮地示黃鍾以禮人鬼若天地可合則人鬼亦可合矣其不逹乃如此朱氏鶴齡曰周禮冬至祀昊天于圜丘夏至祀地祗于方澤禮記燔柴于太壇祭天也瘞埋于泰折祭地也天地分祭禮有明文後世人主每不克兼行蓋禮儀繁重則憚勞賞賚優渥則憚費故多主合祀南郊之説宋元祐間蘇子瞻引昊天有成命詩序以為合祀天地之證是不然夫昊天有成命乃成王即政郊見上帝之詩序言天而并及地猶言父者并及母經典多然禮記兆于南郊就陽位也器用陶匏象天地之性也亦兼地言之若如子瞻説則周人本無合祀之禮安得有合祀之詩乎祀天而詩不詳言天者以天無聲臭非形容之可既也周郊配以后稷而詩不及稷者以獻稷自有思文又受命配天始于文武則專稱二后其宜也昊天不可形容故成王不敢康以下推本文武受命對越上天之小心以形容之頌文武即以頌昊天也蕙田案南郊北郊天地分合祭千古聚訟考分祭見于周禮之圜丘方澤禮記之泰壇泰折厥有明文合祭則無之也而後人以北郊不見經傳為疑案漢書志載匡衡張談議有祭天于南郊瘞地于北郊及翟方進等引禮記南郊定天位北郊就隂位之語去古未逺其言必有所本固不特注疏為然是不得謂之無據也合祭自王莽始後之君臣圗宴安憚勞費于是曲為附會往往以召誥用牲于郊牛二謂經文無北郊及昊天有成命詩歌天不歌地為辭夫周禮稱圜丘方澤亦未嘗有南郊之名郊特牲之變圜丘為南郊亦猶祭法之言泰壇同實而異名耳且言南正以别于北而經之泛言郊者皆統天地可知何必以無北郊之文為疑也至宋蘇軾以詩序郊祀天地謂詩終篇言天而不及地未有歌其所不祭祭其所不歌者今祭地于北郊獨歌天而不歌地豈有此理是不知圓丘方澤正須兩用故言天地若合為一祭則但云郊祀足矣不必標舉天地也孔疏云經不言地序知其因此二祭而作故具言之其意甚明若謂歌天而不歌地考詩詞昊天有成命二后受之意謂我周受命而為天子當主天地之祭此猶言其命維新天作髙山云爾非專指天之功德而歌頌之也是終篇雖未嘗歌地并亦何嘗歌天蘇氏乃指一天字以為歌天不歌地過矣夫此詩唯不稱所祭之功德而成王不敢康以下但言主祭之基命宥密則用之祀天可用之祭地亦可固不得據為合祭之證也考天地之祭漢時或分或合後唯魏文帝之太和周武帝之建德隋髙祖之開皇唐玄宗之開元宋神宗之元豐元文宗之至順明世宗之嘉靖特主分祭餘皆主合祭其間廷臣建議惟宋紹聖中黃復言南郊合祭自古無有止因王莽諂事元后遂躋地位合席同牢逮乎先帝始釐正之陛下初郊大臣以宣仁同政復用王莽私意合而配之瀆亂典禮此言深悉合祭病根明嘉靖時夏言疏駁霍韜周禮莽賊偽書不足據曰合祭以后配地實自莽始莽果偽為是書何不削去圜丘方澤之制天地神祗之祭而自為一説耶此言足明分祭之確據兩議可為萬世定論矣夫自漢以來盈庭集議主合祭者往往不能奪分祭之理可見人心之不可泯而主分祭者往往不能屈合祭之勢可見人欲之不易克觀明世宗南北郊之制甫定神宗萬厯三年閣臣張居正進郊禮圗册仍以孟春合祭為説其言曰冬至極寒而祼獻於星露之下夏至盛暑而駿奔於炎歊之中時義為戾夫身為大臣不以敬天勤民相警朂而以便安逸豫為逢迎隱微深痼前後一轍良可慨也我朝定南北郊祭天子歲必親行破纍代之陋規遵古經之正禮三代之盛奚以加焉右郊名義蕙田案鄭氏注禮祭天之失曰天有六曰歲九祭曰郊丘異丘則天皇大帝郊則感生帝曰丘配嚳郊配稷曰郊丘即禘曰禘郊祖宗皆配天疏家發明皆依鄭氏為説凡祭天禮物樂舞皆分圜丘郊為二處分天皇大帝感生帝為二禮諸儒痛辨極論附載後方各條周禮春官大宗伯以禋祀祀昊天上帝陳氏汲曰祀昊天上帝總言祭天耳昊天猶言蒼天也王氏昭禹曰昊天之有上帝猶國之有君五精之君則猶四方之諸侯諸侯有君道故皆謂之君五精之君有帝之道故皆謂之帝天者帝之體帝者天之用體嫌于不能降用嫌于不能辨故言其降而與物接則以昊言天言其升而與物辨則以上言帝鄭氏鍔曰周禮有言天有言昊天上帝有言上帝有言五帝言天則百神皆預大司樂所謂天神皆降之類是也言五帝則無預乎昊天上帝司服所謂祀昊天上帝祀五帝亦如之之類是也言上帝則無預乎五帝掌次所謂旅上帝張氊案五帝則張大次之類是也言天言帝神各不同至于昊天上帝則兼舉其統天言之以其氣之浩浩故曰昊天以主位乎上故曰上帝位為最尊物無以稱其德唯致其精意可以享之故以禋祀祀昊天上帝國語所謂精意以享謂之禋是也方氏苞曰冢宰司徒所涖祀事皆首五帝者舉五帝則昊天上帝不必言矣此不及五帝者舉昊天上帝則五帝可知也司冦職禋祀五帝則戒日舉昊天上帝而不言方澤何也天地之德無物可以稱者實柴槱燎不過以氣求諸陽血祭瘞埋不過以魄歸之于隂而聖人所以昭格于皇天后土者惟在于精意故實柴槱燎乃祀天所同而以屬日月星辰以下陳血瘞埋乃祭地之所同而以屬社稷五祀以下又不言方澤以示與昊天上帝同也周官之文彼此互見昊天上帝别見于司服司裘以未見禋祀故于大宗伯職揭之五帝周用禋祀别見于大司冦故宗伯職略焉冬至圜丘夏至方澤别見于大司樂四圭祀天兩圭祀地别見于典瑞宗伯職不舉方澤義别有在而羣儒乃謂古無方澤之祭誤矣附諸儒辨鄭氏六天天帝不同郊特牲孔疏先儒説郊其義有二按聖證論以天體無二郊即圜丘圜丘即郊鄭氏以為天有六天丘郊各異今具載鄭義兼以王氏難鄭氏為天有六天天為至極之尊其體秪應是一而鄭氏以為六者指其尊極清虛之體其實是一論其五時生育之功其别有五以五配一故説文云天顛也因其生育之功謂之帝帝為德稱也故毛詩傳云審諦如帝故周禮司服云王祀昊天上帝則大裘而冕祀五帝亦如之五帝若非天何為同服大裘又小宗伯云兆五帝于四郊禮器云享帝于郊而風雨寒暑時帝若非天焉能令風雨寒暑時又春秋緯紫微宫為天帝又云北極耀魄寶又云太微宫有五帝坐星青帝曰靈威仰赤帝曰赤熛怒白帝曰白招拒黑帝曰汁光紀黃帝曰含樞紐是五帝與天帝六也又五帝亦稱上帝故孝經曰嚴父莫大于配天則周公其人也下即云宗祀文王于明堂以配上帝帝若非天何得云嚴父配天也而賈逵馬融王肅之等以五帝非天惟用家語之文謂太皡炎帝黃帝五人帝之屬其義非也又先儒以家語之文王肅私定非孔子正旨玄禋祀祀昊天上帝鄭注鄭司農云昊天天也上帝天也玄謂昊天上帝冬至於圜丘所祀天皇大帝賈疏案春秋緯運斗樞云太微宫有五帝座星即春秋緯文耀鉤云春起青受制其名靈威仰夏起赤受制其名赤熛怒秋起白受制其名白招拒冬起黑受制其名汁光紀季夏六月土受制其名含樞紐又元命包云太微為天庭五帝以合時此等是五帝之號也又案元命包云紫微宫為大帝又云天生大列為中宫大極星星其一明者大一帝居傍兩星巨辰子位故謂北辰以起節度亦為紫微宫紫之言此宫之言中天神圖法隂陽開閉皆在此中又文耀鉤云中宫大帝其北極星下一明者為大一之先含元氣以布斗常是天皇大帝之號也又案爾雅云北極謂之北辰鄭注云天皇北辰耀魄寶又云皇天上帝又名大一帝君以其尊大故有數名也其紫微宫中皇天上帝亦名昊天上帝得連上帝而言至于單名皇天單名上帝亦得故尚書君奭云公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天鄭注云皇天北極大帝又掌次云張氊案設皇邸以旅上帝上帝即大帝堯典曰欽若昊天皆是上帝單名之事月令更無祭五帝之文故季夏云以供皇天上帝鄭分之皇天北辰耀魄寶上帝大帝五帝亦是大帝單號之事若然大帝得單稱與五帝同五帝不得兼稱皇天昊天也天官掌次王大旅上帝鄭注大旅上帝祭天于圜丘賈疏知者見下文别云祀五帝則知此是昊天上帝春官大宗伯國有大故則旅上帝鄭注上帝五帝也春官典瑞旅上帝秋官職金旅于上帝注並同王制天子將出類乎上帝鄭注帝謂五德之帝所祭于南郊者郊特牲天子適四方先柴鄭注所到必先燔柴有事于上帝也孔疏此祭上帝謂當方帝皇氏云謂感生帝義非也春官典瑞賈疏易緯云三王之郊一用夏正各郊所感帝若周之靈威仰即是五帝而殊言天是尊異之以其祖感之而生也喪服小記鄭注始祖感天神靈而生蒼大傳鄭注王者之先祖皆感太微五帝之精以生則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則汁光紀孔疏案師説引河圖云慶都感赤龍而生堯又云堯赤精舜黃禹白湯黑文王蒼又元命包云夏白帝之子殷黑帝之子周蒼帝之子是其王者皆感太微五帝之精而生郊禮器饗帝於郊孔疏王者各祭感生之帝于南大旅具矣不足以饗帝鄭注大旅祭五帝饗帝祭天孔疏祭天謂郊祭天鄭直云祭天則感生之帝與圜丘俱包之也禮器魯人將有事于上帝鄭注上帝周所郊祀之帝謂蒼帝靈威仰也雜記可以有事于上帝注魯頌皇皇后帝疏並同月令孟春之月祈穀于上帝鄭注上帝大微之帝孔疏云上帝大微之帝者春秋緯文紫微宫為大帝大微為天庭中有五帝座是即靈威仰赤熛怒白招拒汁光紀含傴紐祈穀郊天之時各祭所感之帝殷人則祭汁光紀周人則祭靈威仰以其不定故總云大微之帝若迎春之時前帝後王皆祭靈威仰季夏之月以共皇天上帝鄭注皇天北辰耀魄寶冬至所祭于圜丘也上帝大微五帝也孔疏上帝太微五帝者案周禮司服云昊天上帝鄭以為昊天上帝祗是一神北極耀魄寶也知此皇天上帝不是耀魄寶上帝為大微者以周禮司服云祀昊天上帝大裘而冕祀五帝亦如之既别云五帝故知昊天上帝亦唯一神此月令皇天上帝之下更無五帝之文故分為二詩又曰皇天天皇大帝也上帝者靈威仰五帝也商頌長發帝立子生商鄭箋帝黑帝也孔疏商是水德黑帝之精故云黑帝謂汁光紀也蕙田案鄭氏注經文天帝名目錯出一天帝也曰北辰耀魄寶天皇大帝皇天上帝昊天上帝一天而數名又謂皇天北辰耀魄寶上帝太微五帝一號而二神一五帝也曰五德帝當方帝感生帝一感生帝也曰靈威仰赤熛怒含樞紐白招拒汁光紀隨時代而變其病總在謂天有六而天帝為二王氏肅曰天惟一而已安得有六五行分主四時化育萬物其神謂之五帝是上帝之佐也猶三公輔王三公可得稱王輔不得稱天王五帝可得稱天佐不得稱上天鄭以五帝為靈威仰之屬非也又曰易帝出乎震震東方生萬物之初故王者定制之初以木德王天下非謂木精之所生五帝皆黃帝之子孫各改號代變而以五行為次焉何太微之精所生乎程子曰六天之説起於讖書鄭玄之徒從而廣之甚可笑也帝者氣之主也豈有上帝而别有五帝之理此因周禮言祀昊天上帝而後又言祀五帝亦如之故諸儒附會此説正與今人説六子乾坤之外甚底是六子譬如人之四肢只是一體耳學者大惑也朱子語録問而今郊祀也都祀許多帝曰周禮説上帝是總説帝説五帝是五方帝説昊天上帝只是説天鄭氏以昊天上帝為北極看得不是恁地北極星只是言天之象且如太微是帝之庭紫微是帝之居紫微便有太子后妃許多星帝庭便有宰相執法許多星又有天市亦有帝座處便有權衡稱斗星又問今郊祀也祀太一曰而今都重了漢時太一便是帝而今添了帝多都成十帝如一國三公尚不可况天而有十帝楊氏復曰天帝一也以一字言則祀天享帝之類以二字言則格於皇天殷薦上帝之類以四字言則惟皇上帝昊天上帝皇天上帝之類以氣之所主言則隨時隨方而立名如青帝赤帝黃帝白帝黑帝之類其實則一天也前乎鄭康成如鄭衆如孔安國注書並無六天之説鄭康成後出分為六天又皆以星象名之謂昊天上帝者北辰也謂五帝者太微宫五帝座星也夫在天成象在地成形草木非地則星象非天天固不可以象求也以象求天是何異于知人之有形色貌象而不知有心君之尊也况又附以緯書如北辰曰耀魄寶之類尤為不經且鄭注周禮祀昊天上帝謂即皇天上帝已知其為一矣及月令季夏季冬兩處有皇天上帝之文鄭氏又析而為二以皇天為北辰耀魄寶以上帝為太微五帝隨意曲説前後乖違是以王肅羣儒引經傳以排之然以五人帝為五帝則非也夫有天地則有五行四時有五行四時則有五帝帝者氣之主也易所謂帝出乎震是也果以五人帝為五帝則五人帝之前其無司四時者乎鄭則失矣王亦未為得也夫祀天祀五帝皆聖人制禮之條目非分而為六也天猶性也帝猶心也五帝猶仁義禮智信之心隨感而應者也其實則一天也又曰注疏正月郊謂祭感生帝孫奭正月郊謂祈穀二説不同何也祭感生帝出於緯書正月祈榖經有明證學者以聖經為信可也陳氏禮書周禮有言祀天有言祀昊天上帝有言上帝有言五帝言天則百神皆預言昊天上帝則統乎天者言五帝則無預乎昊天上帝言上帝則五帝兼存焉周官司裘掌為大裘以共王祀天之服典瑞四圭有邸以祀天大司樂若樂六變天神皆降凡以神祀者以冬日至致天神此總天之百神言之也大宗伯以禋祀祀昊天上帝司服大裘而冕以祀昊天上帝此指統乎天者言之也司服言祀昊天上帝祀五帝亦如之則五帝異乎昊天上帝也大宰祀五帝掌百官之誓戒祀大神示亦如之則五帝異乎大神也肆師類造上帝封於大神則上帝又異乎大神也掌次大旅上帝張氊案設皇邸祀五帝張大次小次則上帝異乎五帝也典瑞四圭有邸以祀天旅上帝則上帝異乎天也上帝之文既不主於天與昊天上帝又不主於五帝而典瑞旅上帝對旅四望言之旅者會而祭之之名則上帝非一帝也上帝非一帝而周禮所稱帝者昊天上帝與五帝而已則上帝為昊天上帝及五帝明矣又曰五帝與昊天同稱帝不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周官祀五帝之禮有與天同以極其隆有與天異以致其辨故皆禋祀皆服大裘此其所同也祀帝于圜丘兆五帝于四郊此其所異也馬氏端臨曰五帝為五行之主而在天猶五嶽為五行之鎮而在地也五帝不出於天之外而謂五帝即昊天則不可五嶽不出於地之外而謂五嶽即后土亦不可李氏迃仲曰上帝即天也以其體而言之則謂之天以其主宰而言之則謂之帝帝之與天果其有異乎孔氏以郊為祭所感生之帝雩為總祭五帝是皆惑於六天之説者也觀承案天即帝也帝即天也天一而已何得有六然帝既有五天亦何嘗不可有六此如心君然心一而已本無兩心然分而言之有惻隱羞惡辭讓是非之不同豈可以惻隱羞惡辭讓是非之心不為心哉康成天神之解所以不可據者以其溺於緯書既附會星垣又強立耀魄寶及靈威仰赤熛怒含樞紐白招拒汁光紀等名目其大病尤在混禘於郊瀆祖宗於明堂所以王肅諸儒力辨其非耳若謂五帝不為帝六天不為天則分為四時何不可曰春天夏天秋天冬天列於五方何不可曰東天西天南天北天也哉然是就一時一方言之雖同曰帝同曰天而不得謂之統體之天也即如程子謂乾坤外甚的是六子誠哉六子即統於乾坤也然須知八卦成列乾坤外原有六子但既同體而異形則不得仍謂之乾坤矣故統觀諸儒之説自當以冬至元日孟夏季秋四祭為祀天之正而五帝之祀苐為四時迎氣而不混於祭天之中斯可廓清歷來之聚訟也已大司樂冬日至於地上之圜丘奏之鄭氏鍔曰樂用圜鐘鼓取天聲管取陽聲琴瑟取雲和舞取雲門而丘之體又象天之圜祭之日用冬至一陽始生之日以類求類所謂天神之屬乎陽者安得不降此所以可得而祀凡以神仕者以冬日至致天神疏十一月一陽生之月當陽氣升而祭之也言冬日至此則大司樂云冬日至于地上之圜丘奏之若樂六變天神皆降是也禮記郊特牲郊之祭也迎長日之至也王氏肅曰郊之祭迎長日之至謂周之郊祭於建子之月而迎此冬至長日之至也張子曰自奏漢而下多因怪異然後立郊如鄜畤之類大抵不明于禮非正也周之始郊日以至日至陽氣之始也四時迎氣之小者日至而郊迎氣之大者於此可以見郊之大意郊之祭迎長日之至此之謂也方氏慤曰日為陽夜為隂故陽生則日浸長而夜短隂生則夜浸長而日短郊之祭在建子之月而陽生於子故曰迎長日之至也至猶來也與月令仲夏日長至異矣故言迎焉祭天必迎長日之至者當是時陽始事矣天以始事為功也陳氏澔曰郊祭者報天之大事而主于迎長日之至郝氏敬曰每嵗祀天非一如祈年大雩明堂之類皆是唯冬至為重附諸儒辨鄭氏長日至為建卯月郊特牲迎長日之至也鄭注易説曰三王之郊一用夏正夏正建寅之月也此言迎長日者建卯而盡夜分分而日長也孔疏郊祭用夏正建寅之月意以二月建卯春分後日長今正月建寅郊祭通而迎此長日之將至案書傳云迎日謂春分迎日也即引寅賓出日皆謂春分知此迎長日非春分者此云兆於南郊就陽位若是春分朝日當在東郊故知非也馬昭曰易緯云三王之郊一用夏正則周天子不用日至郊也夏正月陽氣始升日者陽氣之主日長而陽氣盛故祭其始升而迎其盛月今天子正月迎春是也若冬至祭天隂氣始盛祭隂迎陽豈為理乎馬氏晞孟曰郊必於冬至之日所以迎長日之將至言其迎之有漸也説者謂建卯晝夜分而日長非矣蕙田案郊正祭之日建於周禮者二皆不言用辛用辛則魯之禮也魯有祈榖郊無圜丘正郊凡春秋戴記言魯郊處皆入祈榖門兹不載祭法有虞氏禘黃帝而郊嚳夏后氏亦禘黃帝而郊鯀殷人禘嚳而郊冥周人禘嚳而郊稷陳氏澔集説配天必以始祖附論注疏諸家九祭八祭七祭四祭二祭曲禮天子祭天地孔疏天神有六祭之一嵗有九昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭之於東郊二也赤帝赤熛怒立夏之日祭之於南郊三也黃帝含樞紐季夏六月土王之日亦祭於南郊四也白帝白招拒立秋之日祭之於西郊五也黑帝汁光紀立冬之日祭之於北郊六也王者各稟五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩總祭五帝於南郊八也季秋大享五帝於明堂九也皇氏侃曰天有六天嵗有八祭冬至圜丘一也夏正郊天二也五時迎氣五也通前為七也九月大享八也雩與郊禖為祈祭不入數王氏肅曰祭天嵗二冬至祭天春祈農事而已五經析疑王者一嵗七祭天仲春后妃郊禖禖亦祭天也程子曰古者一年之間祭天甚多春則因民播種而祈榖夏則恐旱暵而大雩以至秋則明堂冬則圜丘皆人君為民之心也凡人子不可一日不見父母人君不可一嵗不祭天楊氏復曰注疏言周禮一嵗九祭天孫奭亦言嵗有九祭但注疏正月郊謂祭感生帝孫奭正月郊謂祈榖二説不同何也注疏主祭感生帝出於緯書孫奭言正月祈穀經有明證學者以聖經為信可也又注疏言季秋明堂及孟夏大雩為合祭五帝以經考之孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝上帝即天也未聞有合祭五帝之説也故程子以秋明堂冬圜丘春祈榖夏大雩四者皆祭天斯言不可易矣注疏以正月郊為祭感生帝以季秋明堂孟夏大雩為合祭五帝九祭之中已失其三矣惟冬至圜丘祭昊天上帝立春祭蒼帝立夏祭赤帝季夏祭黃帝立秋祭白帝立冬祭黑帝而耀魄寶靈威仰等名又汨之以讖緯之説則六者又胥失之矣馬氏端臨曰古者一歲郊祀凡再正月郊為祈穀十一月郊為報本蕙田案古者天子一歲祭天有四而冬至為正祭春官大司樂冬日至于地上之圜丘奏之凡以神仕者以冬日至致天神郊特牲郊之祭迎長日之至此冬至郊天一也月令孟春以元日祈榖于上帝左傳郊祀后稷以祈農事是故啓蟄而郊郊而後耕此春祈榖二也二者皆以郊名而配以后稷月令仲夏大雩帝用盛樂以祈榖實左傳龍見而雩此夏大雩三也春秋書郊又書雩則雩不得名郊如有配或亦以后稷月令季秋大饗帝此秋享帝于明堂四也明堂以文王配孝經所謂宗祀文王于明堂以配上帝樂記所謂祀乎明堂而民知孝也四祭皆專祀昊天上帝而冬至陽生為正祭此不易之説也乃疏謂天神有六祭之一歲有九夫祈榖雩祀大饗所祀者上帝非五帝也五時迎氣祭五帝非祭上帝也既誤以祭上帝為祭五帝而五帝之祭有八上帝之祭止一又誤以祭五帝為祭上帝而上帝之祭一歲有九况小宗伯明言兆五帝于四郊何得以五帝之祭混于祭天皇氏又謂天有六天歲有八祭其謬與注疏同而又牽入郊禖更屬支離王氏肅曰祭天歲二冬至祭天春祈農事馬端臨從之然除去大雩大饗亦似未安惟程子謂歲之祭天有四冬至祈榖大雩明堂較為有據然祈榖大雩祈祭也季秋明堂報祭也禮皆殺于冬至而郊天正祭止冬至圜丘一祭而已右四代郊正祭虞書肆類于上帝蔡傳肆遂也類祭名周禮肆師類造于上帝注云郊祀者祭昊天之常祭非常祀而祭告于天其禮依郊祀為之故曰類如泰誓武王伐商王制言天子將出皆云類于上帝是也五經異義尚書夏侯歐陽説類祭天名也以事類祭之奈何天位在南方就南郊祭之是也朱子曰類只是祭天之名與所謂旅上帝同皆不可曉然決非是常祭朱氏祖義曰以物之類天者祀上天而告以陟位之事如天之色蒼則祀以蒼璧天之體圜則祀以圜丘蕙田案此一條陟位告也後世新天子即位告祭之禮蓋本諸此類之名義五經異義之説頗新餘諸解皆不若鄭注之確故朱子書集傳取之以授蔡氏也歲二月東巡狩至于岱宗柴疏燔柴為祭天告至也詩周頌時邁序曰巡守告祭柴望也箋巡守告祭者天子巡行邦國至于方嶽之下而封禪也禮記郊特牲天子適四方先柴注所到必先燔柴有事乎上帝也禮器因名山升中于天注名猶大也升上也中猶成也謂巡守至于方嶽燔柴祭天告以諸侯之成功也方氏慤曰名山與王制所言同義告天謂之升中與周官登中于天府同義中謂事實也事之名在外其實在中故謂之中天府謂之治中亦此意蕙田案以上四條巡狩告祭商書湯誥敢用玄牡敢昭告于上天神后蔡傳神后后土也論語堯曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朱子集注簡閲也言桀有罪已不敢赦而天下賢人皆上帝之臣已不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之辭也詩大雅皇矣是類是禡傳于內曰類于野曰禡祭也祀疏春官肆師注云類禮依郊而為之朱子集傳類將出師祭上帝也孔氏頴達曰王制言類于上帝則類祭祭天也祭天而謂之類者尚書夏侯歐陽説以事類祭之天位在南方就南郊祭之也周書泰誓受命文考類于上帝傳以事類告天武成告于皇天后土所過名山大川曰惟有道曽孫周王發將有大正于商疏欲將伐紂告天乃發周禮大祝注用祭事告行稱曽孫者曲禮説諸侯自稱之辭云臨祭祀內事曰孝子某侯某外事曰曽孫某侯某春官肆師凡師類造上帝注造猶即也為兆以類禮即祭上帝也類禮依郊祀而為之者依疏此以類造同云于上帝則造與類同屬于上帝若國四郊則是有尋常兆域今戰訖而祭故須新為壇兆此直是告祭非常非是禱祈之所祭故知依正禮郊祀而為之鄭氏鍔曰上帝至尊不可以瀆因其事類然後告祭故名曰類類者上帝之祭造者祖廟之祭此曰類造上帝何也蓋王者出征所至以事類告天故兼言之天子將出征類乎上帝疏釋天云是類是禡師祭也爾雅多為釋詩然類不皆為師祭但以事類告天若以攝位事類告天謂之類以巡守事類告天亦謂之類古尚書説非時祭天謂之類蕙田案以上七條出師告祭周書武成越三日庚戌柴傳燔柴郊天先祖後郊自近始疏告天説武功成之事也庚戌周四月二十二日也召誥云越三日者皆從前至今為三日此從丁未數之則為四日蓋史官立文不同陳氏祥道曰大傳武成或先柴祈然後率諸侯以享廟或先率諸侯以享廟然後柴蓋既事而退柴帝祈社商郊之祭也故在享廟之前柴望大告武成豐邑之祭也故在享廟之後禮記大傳牧之野武王之大事也既事而退柴于上帝陳氏祥道曰武王之出師受命文考類于上帝宜于冡土所以告其伐也既事而退柴于上帝所以告其成也出師而告其伐既事而告其成以明所以伐者天與神之命其所以成者天與神之功而已蕙田案以上二條武成告祭周書召誥丁巳用牲于郊傳用牲告立郊位于天蕙田案此一條建都告祭禮記王制天子將出類于上帝注謂五帝之帝所祭于南郊者疏類乎上帝祭告天也陳氏祥道曰天子豈特將出而有是哉于其所至未嘗不類帝書曰至于岱宗類于上帝是也蕙田案此一條將出告祭周禮春官大宗伯國有大故則旅上帝注故謂凶災也旅陳也陳其祭事以祈焉禮不如祀之備也上帝五帝也疏旅是祈禱之名鄭氏鍔曰旅非常祭也如禹貢言荆岐既旅蔡蒙旅平九江刋旅之類皆因水災之後而合祭旅不如常時之祭以事出于一時之變故不能如禮也方氏苞曰上帝而曰旅者遍用事于四郊所祭非一帝也春秋傳鄭子産禳大祈于四鄘蓋其遺制蕙田案注疏説旅義甚精訓上帝為五帝則非是下同天官掌次王大旅上帝則張氊案設皇邸注大旅上帝祭天于圜丘國有大故而祭亦曰旅春官司尊彛大喪存奠彛大旅亦如之注旅者國有大故之祭也亦存其奠彛則陳之不即徹典瑞四圭有邸以祀天旅上帝蕙田案祀天正祭也旅上帝有故而祭也天與上帝則一而已大祭祀大旅共其玉器而奉之視瞭大喪廞樂器大旅亦如之注旅非常祭乃興造其樂器笙師大喪廞其樂器大旅則陳之秋官職金旅于上帝則供其金版禮記禮器一獻之禮不足以大旅大旅具矣不足以享帝爾雅旅陳也陳氏禮書旅非常祭也國有大故然後旅其羣神而祭之則荆岐既旅蔡蒙旅平九山刋旅者以水災耳推此則所遭大故皆凶災之類也考之于禮天子所次之位則張氊案設皇邸所奠之圭則四圭有邸所用之版則金版至于司尊彛之存奠彛笙師之陳樂器視瞭之廞樂器皆如大喪之禮言奠則非純乎祭也言存則非即徹之也陳樂而不懸廞樂而不鼓則旅非以其凶災耶周官或言大旅或言旅蓋故有大小而旅亦隨異也然大旅之禮不若祀天之為至也故記曰大旅具矣不足以饗帝若夫旅四望山川則所次不以氊案皇邸所用不以金版而所奠之圭則兩圭有邸而已先儒以旅之廞樂器為明器以皇邸為後版恐不然也其言旅上帝于圜丘其義或然蕙田案以上十條凶災告祭陳氏禮書書曰類于上帝詩曰是類是禡周禮小宗伯兆五帝于四郊四望四類亦如之凡天地之大災類社稷宗廟則為位肆師類造上帝則為位大祝六祈一曰類二曰造類上帝大會同造于廟詛祝掌類造之祝號禮記曰天子將出類于上帝造于廟則類者類其神而祭之也造者即而祭之也類之所施或於上帝或於日月星辰或於社稷或於宗廟類之所因或以巡守或以大師或以大災造則或于上帝或於祖廟凡此皆有所祈也不若大旅之有所告而已故大祝六祈有類造而無旅焉鄭康成以宗伯之四類為日月星辰蓋以四類在四郊四望之下而知之也爾雅以詩之是類是禡為師祭蓋以大祝大師類上帝而知之也社稷宗廟非大災則無類祭上帝非巡守之所至則無造祭書云至於岱宗柴詩言巡守告祭柴望此蓋造上帝之禮也巡守于其將出則類上帝于其所至則造上帝大師于其將出亦類上帝于其所至特禡于所征之地而已昔武王伐紂既事而退柴于上帝成王營洛位成之後用牲于郊牛二此蓋類禮也何則書于舜之既受命則類于上帝于湯之既受命則告于上天是既事則必祭祭必以類禮也于舜之既受命言類則湯之既受命而類可知既受命而類則師之既事邑之既成又可知也類造之禮其詳不可得而知要之劣于正祭與旅也觀祀天旅上帝大宗伯掌之類造上帝小宗伯肆師掌之則禮之隆殺著矣四類日月星辰于四郊則類上帝蓋南郊乎楊氏復曰古者祭天地有正祭有告祭禮雖不同義各有當冬至一陽生此天道之始也陽一噓而萬物生此又天道生物之始也故周官大司樂以圜鍾為宫冬日至于地上之圜丘奏之六變以祀天神所以順天道之始而報天也祭天必於南郊順陽位也夏至一隂生此地道之始也隂一吸而萬物成又地道成物之始也故大司樂以函鍾為宫夏日至于澤中之方丘奏之八變以祀地示所以順地道之始而報地也祭地必於北郊順隂位也此所謂正祭也舜之嗣堯位也類于上帝望于山川歲二月東巡守則柴于岱宗望秩于山川武王之伐商也底商之罪告于皇天后土又柴望並舉大告武成成王之營洛也丁巳用牲于郊翌日戊午乃社于新邑凡因事並告天地有同日而舉有繼日而舉者此所謂告祭也然祀上帝則曰類類者謂倣郊祀之禮而為之則非正祭天也告地而舉望祭之禮或社祭之禮則非正祭地矣蓋特祭天地乃報本之正祭也故其禮一而専並祭天地因事而告祭也不必拘其時不必擇其位雖舉望祀社可以該地示故其禮要而簡所謂禮雖不同義各有當者此也或曰正祭告祭之禮不同而人主父事天母事地其心則一也告祭不拘其時不擇其位而可以對越天地則正祭不拘其時不擇其位奚為不可以對越天地乎曰因天道之始而祀天因地道之始而祀地以類求類此報本之祭也當天道之始而祀地於義何居周公制禮冬至祀天夏至祀地其義不可易矣周公豈欺我哉蕙田案詩書周禮禮記言類祭者不一然不外陟位行師巡守諸大事蓋王者事天如事父子之于父也出必告反必面王者無一息不與天合漠則無一舉動不與天昭鑒故聖人制禮俾王者有事將出必正其義類而告之于天陟位承天子民之始也出師恭行天伐也巡守大明黜陟也皆義類之正大而不可以已者然則類之為名或亦正其義類而告之之謂乎造祭之禮見于肆師大祝詛祝皆以類造並言竊以造者至也傳言公行告廟反行飲至曽子問亦云諸侯出門反必親告祖廟以是推之則天子將出而類即出必告之義既反必造上帝兼造于廟猶反面之義肆師等職所云兼行與反而言然則造之為名即以為述其既至而告之似與類更有别也大宗伯國有大故則旅上帝陳氏禮書謂大故皆凶災之類爾雅曰旅陳也或即陳其情事而告以祈之之義乎如此則三者皆為告祭而命名取義稍為親切若注疏以類為依倣郊祀則旅亦未嘗非依倣為之也以旅為陳其禮物豈正祭類祭大饗不陳禮物乎又訓造為即而以新為壇兆解之又曰造猶即也為造以類禮即祭上帝也造與類更無分別今臚載諸家之説而略推廣其義以俟後之論禮者右四代告祭羅氏路史太昊伏羲氏爰興神鼎制郊禪炎帝神農氏爰崇郊祀帝顓頊髙陽氏作五基六䪫之樂以調陰陽享上帝命曰承雲帝嚳髙辛氏以日至設丘兆于南郊以祀上帝潔其祭服備其惟帳陳之圭幣薦之黑繒命咸黑典樂為聲歌作九招制六列五罃享上帝以中罃帝堯陶唐氏制咸池之舞而為經首之詩以享上帝命之曰大咸蕙田案刪書斷自唐虞今所載皆據六經為首唐虞以上事迹見于諸子百家者附録于條末不敢信亦不敢棄也後同五禮通考卷一
