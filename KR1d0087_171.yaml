body:
  text: 五禮通考卷一百六十一刑部尚書秦蕙田撰嘉禮三十四射禮蕙田案孔氏頴達曰射禮有三一為大射是將祭擇士之射二為賓射是諸侯來朝而天子與之射或諸侯相朝而與之射三為燕射謂燕息而與之射此所論皆臨時行禮之射又有平日肄習之射則鄉射是也射以觀徳行故古聖人最重其事禮既殘缺其完善可考者獨有儀禮大射儀鄉射禮二篇又戴記射義一篇而已鄭康成注鄉射以為惟大射賓射燕射謂之禮射則其餘皆散射也又注周官云庶民無禮射今取儀禮大射鄉射二篇為首尊全經也旁采經傳分大射賓射燕射鄉射存其畧也終以諸書所論射雜儀及射器而射禮粗備矣又案劉向别録以射入吉禮唐開元禮入軍禮通典因之射為六藝之一原所以習禮樂非専尚威武至於諸經言射兼朝祭饗燕亦不得専屬吉禮鄭康成注儀禮大射鄉射皆屬嘉禮宋史亦以大射入嘉禮頗存古意今從之儀禮大射儀鄭目録云名曰大射者諸侯將有祭祀之事與其羣臣射以觀禮數中者得與於祭不數中者不得與於祭於五禮屬嘉禮敖氏繼公曰諸侯與其羣臣飲酒而習射之禮也言大射者别於賓射燕射也盛氏世佐曰射義云諸侯之射也必先行燕禮又云諸侯君臣盡志於射以習禮樂此篇所陳是也亦曰大射者别於鄉射也卿大夫與其民習射於鄉學謂之郷射諸侯與其臣習射於大學謂之大射其與賓射燕射異者彼是因賓燕而射射否惟欲主於序歡情也此則為射而燕主於習禮樂也不曰禮而曰儀以其威儀之法比郷射尤詳也大射之儀君有命戒射注將有祭祀之事當射宰告於君君乃命之宰戒百官有事於射者注宰於天子冡宰治官卿也作大事則掌以君命戒於百官射人戒諸公卿大夫射司士戒士射與賛者注射人掌以射法治射儀司士掌國中之士治凡其戒令皆司馬之屬也殊戒公卿大夫與士辨貴賤也賛佐也謂士佐執事不射者前射三日宰夫戒宰及司馬射人宿視滌注宰夫冡宰之屬掌百官之徴令者司馬於天子政官之卿凡大射則合其六耦滌謂溉器掃除射宫蕙田案以上戒百官觀承案上文射人戒是前期旬有一日此宰夫戒是前射之三日射人宿是夕宿為前一日宗伯宿視滌濯是也司馬命量人量侯道與所設乏以貍歩大侯九十參七十干五十設乏各去其侯西十北十注量人司馬之屬掌量道巷塗數者侯謂所射布也尊者射之以威不寧侯卑者射之以求為侯量侯道謂去堂逺近也容謂之乏所以為獲者之禦矢貍之伺物每舉足者正視逺近為發必中也是以量侯道取象馬鄉射記曰侯道五十弓考工記曰弓之下制六尺則此貍歩六尺明矣大侯熊侯謂之大者與天子熊侯同參讀為糁糁雜也雜侯者豹鵠而麋飾下天子大夫也干讀為豻豻侯者豻鵠豻飾也大夫將祭於已射糜侯士無臣祭不射疏熊侯而謂之大者言畿外諸侯亦得用三侯其數上同於天子而非畿内諸侯所可比故於熊侯加大以别之然不嫌於偪上者天子三侯則虎侯熊侯豹侯諸侯不得用虎侯而以熊侯參侯豻侯為三侯若畿内則但有熊侯豹侯此其所以别也云豹鵠而麋飾下天子大夫也者司裘云卿大夫則共麋侯此則豹皮為鵠以糜飾其側不用純麋是下天子大夫也豻鄭注周禮云胡犬豻侯亦取捷黠意大夫得置家臣故將祭得大射擇士士卑無臣故祭不得射也遂命量人巾車張三侯大侯之崇見鵠於參參見鵠於干干不及地武不繫左下綱設乏西十北十凡乏用革注巾車於天子宗伯之屬掌裝衣車者亦使張侯侯巾類崇髙也髙必見鵠鵲所射之主鵠之言較較直也射者所以直己志或曰鵠鳥名射之難中中之為俊是以取名淮南子曰鳱鵠如來然則所云正者正也亦鳥名齊魯之間名題肩為正正鵠皆鳥之捷黠者考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉則大侯之鵠方六尺糁侯之鵠方四尺六寸大半寸豻侯之鵠方三尺三寸少半寸及至也武迹也中人之足長尺二寸以豻侯計之參侯去地一丈五寸少半寸大侯去地二丈二尺五寸少半寸凡侯北面西方謂之左前射三日張侯設乏欲使有事者豫志焉去疏鄉射云乏参侯道居侯黨之一西五歩注云此乏侯北十丈西三丈此經云西十北十則西與北皆六丈不得為三分居侯黨之一者以其三侯入堂深故也西亦六丈者以三侯恐矢揚傷人與一侯亦異也三侯之下總云西十北十則其乏皆西十北十矣侯之廣狹取度於侯道大侯道九十弓弓取二寸二九十八侯中丈八尺三分其侯而鵠居一故知鵠六尺也参侯干侯亦以侯道弓數及弓取二寸推之大侯中丈八尺鵠方六尺参侯中丈四尺鵠方四尺六寸大半寸干侯中一丈鵠方三尺三寸少半寸凡言大半寸者二分寸之二少半寸者三分寸之一張氏爾岐曰王大射用虎侯熊侯豹侯畿内諸侯二侯以熊侯為首畿外諸侯得用三侯熊侯糁侯豻侯以熊侯同於天子故云大侯三侯共道遞近以二十歩為率尊者射逺卑者射近侯逺則鵠大侯近則鵠小大侯之鵠見参侯之上参侯之鵠見干侯之上干侯下綱則去地一尺二寸此三侯髙下之法也註知三侯之鵠廣狹之數者以侯之廣狹取則於侯道之逺近每弓取二寸九十弓者十八尺七十弓者十四尺五十弓者十尺每侯之鵠又各取其侯三分之一故推知之也設乏西十北十西與北各去侯六丈也云凡乏三侯各有乏也蕙田案此所言侯與司裘職文異註以為彼乃畿内諸侯此為畿外諸侯敖繼公謂畿内無諸侯盛世佐謂王制天子之縣内諸侯禄也故春秋有凡伯祭伯當從盛氏參侯康成以為當作糝敖繼公以為參如無徃參之參謂介於二者之間也大侯以大於二侯名則參侯以參於二侯名大侯為熊侯參侯為豹侯歟當從敖氏作如字讀但謂為豹侯亦無所據不如盛世佐謂參用豹侯麋侯為的又案以上張侯樂人宿縣於阼階東笙磬西面其南笙鐘其南鑮皆南陳注周禮曰凡縣鐘磬半為堵全為肆有鐘有磬為全鑮如鐘而大奏樂以鼓鑮為節建鼓在阼階西南鼓應鼙在其東南鼓注南鼓謂所伐面也應鼙應朔鼙也先擊朔鼙應鼙應之鼙小鼓也在東便其先擊小後擊大也鼓不在東縣南為君也西階之西頌磬東面其南鐘其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北注朔始也奏樂先擊西鼙樂為賓所由來也一建鼓在西階之東南面注言面者國君於其羣臣備三面爾無鐘磬有鼓而已其為諸侯則軒縣簜在建鼓之間注簜竹也謂笙簫之屬倚於堂鼗倚於頌磬西紘注紘編磬繩也設鼗於磬西倚於紘也王制曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之盛氏世佐曰燕禮縣與燕同日此亦於射前一日為之者大射重於燕也樂以人聲為貴故歌者在上匏竹在下上下謂堂上堂下也陳氏云頌磬歌於西是南鄉北鄉以西方為上所以貴人聲也笙磬吹於東是以東方為下所以賤匏竹也非就堂下樂中亦有差等笙管聲之發乎人者也磬鐘之屬聲之發乎器者也故有時以笙為主而磬以下應之所謂笙奏也詩云笙磬同音是也有時以管為主而磬以下應之所謂下管也詩云嘒嘒管聲既和且平依我磬聲是也下經云乃管新宫三終則大射樂以管為主矣蕙田案以上樂縣厥明司宫尊於東楹之西兩方壺膳尊兩甒在南有豐冪用錫若絺綴諸箭盖冪加勺又反之皆𤣥尊酒在北注膳尊君尊也後陳之尊之也豐以承尊也冪覆尊巾也錫細布也絺細葛也箭篠也為冪盖巻辟綴於篠横之也又反之為覆勺也皆𤣥尊二者皆有𤣥酒之尊重本也酒在北尊統於君南為上也唯君面尊言専惠也子疏唯君面尊謂君燕臣専其恩惠故尊鼻嚮君尊士旅食於西鑮之南北面兩圜壺注旅衆也士衆食未得正禄謂庶人在官者圜壺變於方也賤無𤣥酒又尊於大侯之乏東北兩壺獻酒注為𨽻僕人巾卓糁侯豻侯之獲者郊特牲曰汁獻涗於醆酒服不之尊俟時而陳於南統於侯皆東面皆疏此為𨽻僕以下卑賤之人而獻鬱鬯者此所得獻因祭侯為侯之神故用鬱鬯也設洗於阼階東南罍水在東篚在洗西南陳設膳篚在其北西面又設洗於獲者之尊西北水在洗北篚在南東陳注無爵因服不也有篚為奠虚爵也服不之洗亦俟時而陳於其南小臣設公席於阼階上西鄉司宫設賓席於户西南面有加席卿席賓東東上小卿賓西東上大夫繼而東上若有東面者則北上席工於西階之東東上諸公阼階西北面東上官饌注百官各饌其所當共之物蕙田案以上陳設羮定射人告具於公公升即位於席西鄉小臣師納諸公卿大夫諸公卿大夫皆入門右北面東上士西方東面北上太史在干侯之東北北面東上士旅食者在士南北面東上小臣師從者在東堂下南面西上注太史在干侯東北士旅食者在士南為有侯故入庭深也小臣師正之佐也正相君出入君之大命張氏爾岐曰自此至南面反奠於其所北面立皆將射先燕之事公命賓納賓以來主人獻賓賓酢主人主人獻公主人受公酢主人酬賓二人舉觶公取觶酬賓遂旅酬主人獻卿二人再舉觶公為卿舉旅酬主人獻大夫工入奏樂凡十二節公降立於阼階之東南南鄉小臣師詔揖諸公卿大夫諸公卿大夫西面北上揖大夫大夫皆少進注詔告也變爾言揖亦以其入庭深也上言大夫誤衍耳大射正擯注大射正射人之長擯者請賓公曰命某為賓注某大夫名擯者命賓賓少進禮辭注命賓者東面南顧辭辭以不敏反命注以賓之辭告於君又命之賓再拜稽首受命注又復擯者反命賓出立於門外北面公揖卿大夫升就席小臣自阼階下北面請執冪者與羞膳者注請士可使執君兩甒之冪及羞脯醢庶羞於君者方圜壺獻無冪乃命執冪者執冪者升自西階立於尊南北面東上注命者於西階前以公命命之東上執𤣥尊之冪為上羞膳者從而東由堂東升自北階立於房中西面南上不言命者不升堂畧之膳宰請羞於諸公卿者注膳宰請者異於君也擯者納賓賓及庭公降一等揖賓賓辟注及至也辟逡遁不敢當盛公升即席注以賓將與主人為禮不参之蕙田案以上即位命賓納賓奏肆夏注肆夏樂章名今亡敖氏繼公曰穆叔聘於晉晉侯享之金奏肆夏之三穆叔曰三夏天子所以享元侯也使臣不敢與聞此惟奏肆夏而不及繁遏渠其辟天子之享禮與賓升自西階主人從之賓右北面至再拜賓答再拜注主人宰夫也又掌賓客之獻飲食君於臣雖為賓不親獻以其莫敢亢禮主人降洗洗南西北面注賓將從降鄉之不於洗北辟正主賓降階西東面主人辭降賓對主人北面盥坐取觚洗賓少進辭洗主人坐奠觚於篚興對賓反位注賓少進者所辭異宜違其位也獻不用爵辟正主主人卒洗賓揖乃升注賓每先升揖之主人升賓拜洗主人賓右奠觚答拜降盥賓降主人辭降賓對卒盥賓揖升主人升坐取觚注取觚將就瓦甒酌膳執冪者舉冪主人酌膳執冪者盖冪酌者加勺又反之注反之覆勺筵前獻賓賓西階上拜受爵於筵前反位主人賓右拜送爵注賓既拜於筵前受爵退復位宰胥薦脯醢注宰胥宰官之吏也不使膳宰薦不主於飲酒變於燕賓升筵庶子設折俎注庶子司馬之屬掌正六牲之體者也鄉射記曰賓俎脊脇肩肺不使膳宰設俎為射變於燕賓坐左執觚右祭脯醢奠爵於薦右興取肺坐絶祭嚌之興加於俎坐捝手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告㫖執爵興主人答拜注降席席西也㫖美也樂闋注闋止也樂止者尊賓之禮盛於上也闋疏燕禮記云賓及庭奏肆夏賓拜酒主人答拜而樂亦據啐酒時按郊特牲賓入大門而奏肆夏卒爵而樂闋與此啐酒樂闋不同者彼謂朝聘者故卒爵而樂闋此燕已臣子法故啐酒而樂闋也賓西階上北面坐卒爵興坐奠爵拜執爵興主人答拜蕙田案以上主人獻賓賓以虚爵降主人降賓洗南西北面坐奠觚少進辭降主人西階西東面少進對賓坐取觚奠於篚下盥洗注既卒爵賓將酢主人也篚下篚南也主人辭洗賓坐奠觚於篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執冪如初以酢主人於西階上主人北面拜受爵賓主人之左拜送爵主人坐祭不啐酒不拜酒遂卒爵興坐奠爵拜執爵興賓答拜主人不崇酒以虚爵降奠於篚賓降立於西階西東面擯者以命升賓賓升立於西序東面注命公命也蕙田案以上賓酢主人主人盥洗象觚升酌膳東北面獻於公公拜受爵乃奏肆夏注言乃者其節異於賓蕙田案前賓入之時已奏肆夏故康成云其節異於賓敖繼公云此奏當以東方之縣主人降自西階阼階下北面拜送爵宰胥薦脯醢由左房庶子設折俎升自西階注鄉射記曰主人俎脊脅臂肺公祭如賓禮庶子賛授肺不拜酒立卒爵坐奠爵拜執爵興主人答拜樂闋升受爵降奠於篚蕙田案以上主人獻公更爵洗升酌散以降酢於阼階下北面坐奠爵再拜稽首公答拜主人坐祭遂卒爵興坐奠爵再拜稽首公答拜主人奠爵於篚蕙田案以上主人自酢主人盥洗升媵觚於賓酌散西階上坐奠爵拜賓西階上北面答拜主人坐祭遂飲賓辭卒爵興坐奠爵拜執爵興賓答拜主人降洗賓降主人辭降賓辭洗卒洗賓揖升不拜洗主人酌膳賓西階上拜受爵於筵前反位主人拜送爵賓升席坐祭酒遂奠於薦東主人降復位賓降筵西東南面立蕙田案以上主人酬賓又案自此以下儀節多與燕禮相為出入小臣自阼階下請媵爵者公命長小臣作下大夫二人媵爵媵爵者阼階下皆北面再拜稽首公答拜媵爵者立於洗南西面北上序進盥洗角觶升自西階序進酌散交於楹北降適阼階下皆奠觶再拜稽首執觶興公答拜媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜媵爵者執觶待於洗南小臣請致者若命皆致則序進奠觶於篚阼階下皆北面再拜稽首公答拜媵爵者洗象觶升實之序進坐奠於薦南北上降適阼階下皆再拜稽首送觶公答拜媵爵者皆退反位注反門右北面位蕙田案以上媵觶於公公坐取大夫所媵觶興以酬賓賓降西階下再拜稽首小臣正辭賓升成拜注正長也敖氏繼公曰小臣正辭亦公命之公坐奠觶答拜執觶興公卒觶賓下拜小臣正辭賓升再拜稽首公坐奠觶答拜執觶興賓進受虚觶降奠於篚易觶興洗公有命則不易不洗反升酌膳下拜小臣正辭賓升再拜稽首公答拜賓告於擯者請旅諸臣擯者告於公公許敖氏繼公曰旅旅酬之也賓因君所賜請旅諸臣所以廣君賜也公許擯者又以告賓乃旅也賓以旅大夫於西階上擯者作大夫長升受旅賓大夫之右坐奠觶拜執觶興大夫答拜賓坐祭立卒觶不拜若膳觶也則降更觶洗升實散大夫拜受賓拜送遂就席盛氏世佐曰賓初立西序東面既及於筵西東南面立至是始就席禮以漸殺也大夫辯受酬如受賓酬之禮不祭酒卒受者以虚觶降奠於篚復位蕙田案以上公為賓舉旅主人洗觚升實散獻卿於西階上司宫兼卷重席設於賓左東上卿升拜受觚主人拜送觚卿辭重席司宫徹之乃薦脯醢卿升席庶子設折俎敖氏繼公曰卿有俎大射差重於燕也盛氏世佐曰案此薦不言其人意亦宰胥也卿坐左執爵右祭脯醢奠爵於薦右興取肺坐絶祭不嚌肺興加於俎坐挩手取爵遂祭酒執爵興降席西階上北面坐卒爵興坐奠爵拜執爵興主人答拜受爵卿降復位注復西面位辯獻卿主人以虚爵降奠於篚擯者升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮席於阼階西北面東上無加席蕙田案以上主人獻諸公卿小臣又請媵爵者二大夫媵爵如初請致者若命長致則媵爵者奠觶於篚注命長致者使長者一人致也公或時未能舉自優暇一人待於洗南注不致者長致者阼階下再拜稽首公答拜注再拜稽首拜君命洗象觶升實之坐奠於薦南降與立於洗南者二人皆再拜稽首送觶公答拜注奠於薦南先媵者上觶之處也二人皆拜如初共勸君飲之蕙田案以上二人再媵觶於公公又行一爵若賓若長唯公所賜注於是言賜射禮明尊卑以旅於西階上如初注賜賓則以酬長賜長則以酬賓大夫長升受旅以辯大夫卒受者以虚觶降奠於篚蕙田案言賜敖氏云文異耳盛世佐云當從註又案以上公為卿舉旅主人洗觚升獻大夫於西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位注大夫卒爵不拜賤不備禮胥薦主人於洗北西面脯醢無脀辯獻大夫遂薦之繼賓以西東上若有東面者則北上卒擯者升大夫大夫皆升就席蕙田案以上主人獻大夫乃席工於西階上少東小臣納工工六人四瑟注工謂瞽矇善歌諷誦詩者也六人太師少師各一人上工四人四瑟者禮大樂衆也敖氏繼公曰大射差重於燕加瑟者二人然則諸侯祭饗歌與瑟各四人與以是推之天子之制其隆殺之數亦可知矣僕人正徒相大師僕人師相少師僕人士相上工注徒空手也僕人正僕人之長師其佐也士其吏也天子視瞭相工諸侯兼官是以僕人掌之大師少師工之長也凡國之瞽矇正焉杜蒯曰曠也大師也於是分别工及相者射禮明貴賤疏正為長師為衆故僕人正為長師為佐士在僕人之下故知僕人之吏相者皆左何瑟後首内弦挎越右手相注謂相上工者後首主於射略於樂也内弦挎越以右手相工由便也越瑟下孔所以發越其聲者也後者徒相入注謂相大師少師者也上列官之尊卑此言先後之位亦所以明貴賤凡相者以工出入小樂正從之注從大師也後升者變於燕也小樂正於天子樂師也疏燕禮樂正先升又不使小樂正者彼主於樂此則畧於樂也升自西階北面東上注工六人坐授瑟乃降注相降立於西縣之北小樂正立於西階東注不統於工明工雖衆位猶在此乃歌鹿鳴三終注歌鹿鳴三終而不歌四牡皇皇者華主於講道畧於勞苦與諮事主人洗升實爵獻工工不興左瑟注洗爵獻工辟正主也獻不用觚工賤異之工不興不能備禮左瑟便其右一人拜受爵注謂大師也言一人者工賤同之也工拜於席主人西階上拜送爵薦脯醢使人相祭注使人相者相其祭薦祭酒卒爵不拜主人受虚爵衆工不拜受爵坐祭遂卒爵辯有脯醢不祭主人受爵降奠於篚復位大師及少師上工皆降立於鼓北羣工陪於後注鼓北西縣之北也言鼓北者與鼓齊面餘長在後也羣公陪於後三人為列也可疏下文太師少師始遷向東明此降者在西縣之北知云鼓北者案前列樂縣之時鼓在鑮南今不言在鐘磬之北遥繼鼓而言之者欲取形大又面向東工亦面向東故遥取鼓面也乃管新宫三終注管謂吹簜以播新宫之樂其篇亡其義未聞管從工而入既管不獻畧下樂也立於東縣之中張氏爾岐曰注立於東縣句可疑愚案燕禮笙入立於縣中注云縣中縣中央也鄉飲酒禮曰磬南北面疏云諸侯軒縣闕南面而已故得言縣中鄉飲酒唯以磬縣而已不得言縣中而云磬南注引鄉飲酒者欲見此雖軒縣近北面縣之南也此經初設樂無北面縣但移東縣建鼓在阼階西又設一建鼓在西階東正當北面一縣之處簜在建鼓之間注云簜謂笙簫之屬倚於堂又與燕禮笙入所立之位同疑設之在此者亦奏之於此至此管新宫三終注乃云立於東縣之中不知於經何據若云辟射位射事未至無可辟也且上文太師等立於鼓北亦當是此建鼓之北注以為西縣之北不知西縣何以單名為鼓竊疑大師等立此或亦以將奏管故臨之非徒立也至下管三終乃相率而東耳既從工而入工升堂笙即立堂下亦其宜也姑存此疑以質知者卒管太師及少師上工皆東坫之東南西面北上坐注不言縣北統於堂也於是時大樂正還北面立於其南盛氏世佐曰管之者大師諸人也管數未聞然以郷射記三笙一和推之則管亦不止於一矣管奏則堂下諸樂並奏以應之書曰下管鞉鼓合止柷敔既管不獻者以奏管者既受獻羣工賤又不奏管故也蕙田案以上作樂娛賓射前燕禮備擯者自阼階下請立司正注三爵既備上下樂阼君將留羣臣而射宜更立師正以監之察儀法也公許擯者遂為司正注君許其請因命用之不易之者俱相禮其事同也司正適洗洗角觶南面坐奠於中庭注奠觶者著其位以顯其事威儀多也升東楹之東受命於公西階上北面命賓諸公卿大夫公曰以我安賓諸公卿大夫皆對曰諾敢不安注以我安者君意殷勤欲留之以我故安也敖氏繼公曰此中庭者亦阼階前南北之中與燕禮司正之位同以當辟射也羣臣皆為射而來時猶未射固無嫌於不安而司正乃受命以安之者縁其意君不敢必君之終行射事然也受命亦北面與請徹俎同司正降自西階南面坐取觶升酌散降南面坐奠觶注奠於中庭故也興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠於其所北面立注皆所以自昭明於衆也將於觶南北面則右還於觶北南面則左還如是得從觶西往來也必從觶西往來者為君在阼不背之也蕙田案以上將射立司正安賓察儀司射適次袒決遂執弓挾乗矢於弓外見鏃於弣右巨指鈎弦注司射射人也次若今時更衣處帳幃席為之耦次在洗東南袒左免衣也決猶闓也以象骨為之著右巨指所以鈎弦而間之遂射韝也以朱韋為之著左臂所以遂弦也方持弦矢曰挾乗矢四矢弣弓把見鏃焉順其射也右巨指右手大擘以鈎弦弦在旁挾由便也疏司射射人大射正司正擯者其實一人也張氏爾岐曰此下方及射事有三耦不釋獲之射有三耦衆耦釋獲之射有以樂射共三畨射亦畧如鄉射之節自此至左右撫之興反位皆言三耦不釋獲之射司射納器比耦司射誘射三耦乃射射已取矢凡四節自阼階前曰為政請射注為政謂司馬也司馬政官主射禮遂告曰大夫與大夫士御於大夫注因告選三耦於君御猶侍也大夫與大夫為耦不足則士侍於大夫與為耦也遂適西階前東面右顧疏司射西階前東面者君在阼宜向之右顧者以其有司是士士在西階南東面是以右顧向之命有司納射器射器皆入君之弓矢適東堂賓之弓矢與中籌豐皆止於西堂下衆弓矢不挾總衆弓矢楅皆適次而俟注中閭中算器也籌算也豐可奠射爵者衆弓矢三耦及卿大夫以下弓矢也司射矢亦止西堂下衆弓矢不挾則納公與賓弓矢者挾之楅承矢器工人士與梓人升自北階兩楹之間疏數容弓若丹若墨度尺而午射正涖之注工人士梓人皆司空之屬能正方圜者一從一横曰午謂畫物也卒畫自北階下司宫埽所畫物自北階下注埽物重射事也工人士梓人司宫位在北堂下太史俟於所設中之西東面以聴政注中未設也太史俟焉將有事也鄉射禮曰設中南當楅西當西序東面司射西面誓之曰公射大侯大夫射參士射干射者非其侯中之不獲卑者與尊者為耦不異侯太史許諾遂比三耦注比選次之也不言面者大夫在門右北面士西方東面畿疏天子大射賓射六耦三侯畿内諸侯則二侯四耦外諸侯大射賓射皆三侯三耦但諸侯畿外畿内各有一申一屈故畿外三侯逺尊得申與天子同三耦則屈畿内二侯近尊則屈四耦則申若燕射則天子諸侯例同三耦一侯而已以其燕私屈也若卿大夫士例同一侯三耦三耦俟於次北西面北上司射命上射曰某御於子命下射曰子與某子射卒遂命三耦取弓矢於次注取弓矢不拾者次中隠蔽處蕙田案鄭以次中隠蔽不拾其説欠理敖繼公云此下當有三耦袒決遂拾弓矢之事文不具耳又案以上誓太史納射器比三耦司射入於次搢三挾一个出於次西面揖當階北面揖及階揖升堂揖當物北面揖及物揖由下物少退誘射注搢捷也挾一个挾於弦也个猶枚也由下物而少退謙也誘猶教也疏射人誘射與鄉射同但鄉射往階西取弓矢此則入次取弓矢為異然此云入次搢三挾一个則已前皆挾乗矢不改鄉射亦然射三侯將乗矢始射干又射參大侯再發注將行也行四矢象有事於四方詩云四矢反兮以御亂兮卒射北面揖注揖於當物之處不南面者為不背卿疏鄉射南西揖者彼尊東或公或卿大夫位同不别故司射不特尊之此大射辨尊卑尊東唯有天子命卿其餘小卿及大夫皆賓西故特尊之不背之也郝氏敬曰卒時北面揖敬君事殊於鄉射揖南面也及階揖降如升射之儀遂適堂西改取一个挾之注改更也不射而挾矢示有事也遂取扑搢之以立於所設中之西南東面注扑所以撻犯教者也於是言立著其位也鄉射記曰司射之弓矢與扑倚於西階之西疏鄉射先立于所設中之西南乃誘射此則誘射卒始來就位蕙田案以上司射誘射司馬師命負侯者執旌以負侯注司馬師正之佐也欲令射者見侯與旌深志於侯中也負侯獲者也天子服不氏下士一人徒四人掌以旌居乏待獲析羽為旌疏引天子服不氏為獲者明諸侯亦當然也蕙田案司馬師鄭云正之佐盛世佐云軍司馬之佐軍司馬之職本闕不可知此何以知必為軍司馬佐且經文亦無軍司馬當從鄭負侯者鄭云獲者盛云在天子為射鳥氏周禮射鳥氏射則取矢矢在侯髙則以并夾取之諸侯盖以庻人在官者為之此可以補鄭之闕旌鄭云析羽敖繼公云翿旌盛云三侯之旌各不同大侯之旌以析羽為之鄉射記云於郊則以旌獲是也參侯干侯之旌以雜帛為之鄉射記云旌各以其物是也敖説偏鄭亦混惟盛氏得之負侯者皆適侯執旌負侯而俟司射適次作上耦射注作使也司射反位上耦出次西面揖進上射在左並行當階北面揖及階揖上射先升三等下射從之中等注上射在左便射位也中猶間也張氏爾岐曰發位並行及升上射皆居左履物南面上射乃在右右物為上也上射升堂少左下射升上射揖並行注並併也併東行皆當其物北面揖及物揖皆左足履物還視侯中合足而俟注視侯中各視其侯之中大夫耦則視參中参中十四尺士耦則視干中干中十尺司馬正適次袒決遂執弓右挾之出升自西階適下物立於物間左執弣右執簫南揚弓命去侯注司馬正政官之屬簫弓末揚弓者執下末揚猶舉也適下物由上射後東過也命去侯者將射當獲也鄉射禮曰西南面立於物間負侯皆許諾以宫趨直西及乏南又諾以商至乏聲止注宫為君商為臣其聲和相生也鄉射禮曰獲者執旌許諾故疏宫數八十一商數七十二彈宫則商應云聲和也蕙田案宫字絶句張爾岐以宫趨為句非是授獲者退立於西方獲者興共而俟注大侯服不氏負侯徒一人居乏相代而獲参侯干侯徒負侯居乏不相代鄉射禮曰獲者執旌許諾聲不絶以至於乏坐東面偃旌興而俟司馬正出於下射之南還其後降自西階遂適次釋弓説決拾襲反位注拾遂也鄉射禮曰司馬反位立於司射之南司射進與司馬正交於階前相左由堂下西階之東北面視上射命曰毋射獲毋獵獲上射揖司射退反位注射獲矢中乏也從旁為獵乃射上射既發挾矢而后下射射拾發以將乗矢注拾更也將行也獲者坐而獲注坐言獲也舉旌以宫偃旌以商注再言獲也獲而未釋獲注但言獲未釋算卒射右挾之北面揖如升射注右挾之右手挾弦上射降三等下射少右從之中等並行上射於左與升射者相左交於階前相揖適次釋弓説決拾襲反位注上射於左由下射階上少右乃降待之言襲者凡射皆袒三耦卒射亦如之司射去扑倚於階西適阼階下北面告於公曰三耦卒射反搢扑反位蕙田案以上三耦初射司馬正袒決遂執弓右挾之出與司射交於階前相左注出出於次也袒時亦適次升自西階自右物之後立於物間西南面揖弓命取矢注揖推之負侯許諾如初去侯皆執旌以負其侯而俟注俟小臣取矢以旌指教之司馬正降自西階北面命設楅注此出於下射之南還其後而降之小臣師設楅司馬正東面以弓為畢注畢所以教助執事者鄉射記曰乃設楅於中庭南當洗東肆既設楅司馬正適次釋弓説決拾襲反位小臣坐委矢於楅北括司馬師坐乗之注乗四四數之卒若矢不備則司馬正又袒執弓升命取矢如初曰取矢不索乃復求矢加於楅卒司馬正進坐左右撫之興反位注左右撫分上下射此坐皆北面蕙田案以上設楅取矢第一番射禮竟司射適西階西倚扑升自西階東面請射於公注倚扑者將即君前不敢佩刑器也升堂者欲諸公卿大夫辯聞也公許遂適西階上命賓御於公諸公卿則以耦告於上大夫則降即位而后告注告諸公卿於堂上尊之也司射自西階上北面告於大夫曰請降司射先降搢扑反位大夫從之降適次立於三耦之南西面北上注適次由次前而北西面立司射東面於大夫之西比耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦注衆耦士也衆耦立於大夫之南西面北上若有士與大夫為耦則以大夫之耦為上注為上居羣士之上命大夫之耦曰子與某子射告於大夫曰某御於子注士雖為上射其辭猶尊大夫命衆耦如命三耦之辭諸公卿皆未降注言未降者見其志仕降蕙田案以上請射於公及比衆耦遂命三耦各與其耦拾取矢皆袒決遂執弓右挾之注此命入次之事也司射既命而反位不言之者上射出當作取矢事未訖一耦出西面揖當楅北面揖及楅揖注三耦同入次其出也一上射出西面立司射作之乃揖行也當楅楅正南之東西上射東面下射西面上射揖進坐横弓郤手自弓下取一个兼諸弣興順羽且左還毋周反面揖注横弓者南踣弓也郤手自弓下取矢者以左手在弓表右手從裏取之便也兼并也并矢於弣當順羽既又當執弦順羽者手放而下備不整理也左還反其位毋周右還而反東面也君在阼還周則下射將背之下射進坐横弓覆手自弓上取一个兼諸弣興順羽且左還毋周反面揖注横弓亦南踣弓也人東西鄉以南北為横覆手自弓上取矢以左手在弓裏右手從表取之便也既拾取矢梱之注梱齊等之也蕙田案梱郝敬云叩也叩四矢使齊即鄭氏意張爾岐曰疑當作捆孟子注捆猶叩㭬也若梱則門橛耳監本正誤亦云梱與梱復二字皆誤盛世佐云二字通用盛氏為長楊氏脱此一節不知何故兼挾乗矢皆内還南面揖注内還者上射左下射右不皆右還亦以君在阼嫌下射故左還而背之也上以陽為内下以隂為内因其宜可也適楅南皆左還北面揖搢三挾一个注楅南鄉當楅之位也揖以耦左還上射於左注以猶與也言以者耦之事成於此意相人耦也上射轉居左便其反位也上射少北乃東面退者與進者相左相揖退釋弓矢於次説決拾襲反位二耦拾取矢亦如之後者遂取誘射之矢兼乗矢而取之以授有司於次中皆襲反位注有司納射器因留主授受之蕙田案以上三耦取夫於楅又案自司馬正袒決遂以下至此楊氏皆以為第二次射之第一節司射作射如初一耦揖升如初司馬命去侯負侯許諾如初司馬降釋弓反位司射猶挾一个去扑與司馬交於階前適阼階下北面請釋獲於公公許反搢扑遂命釋獲者設中以弓為畢北面注北面立於所設中之南當視之也鄉射禮曰設中南當楅西當西序大史釋獲小臣師執中先首坐設之東面退大史實八算於中横委其餘於中西興共而俟注先猶前也命大史而小臣師設之國君官多也小臣師退反東堂下位鄉射禮曰横委其餘於中西南末司射西面命曰中離維綱揚觸梱復公則釋獲衆則不與注離猶過也獵也侯有上下綱其邪制躬舌之角者為維或曰維當為縜縜綱耳揚觸者謂矢中他物揚而觸侯也梱復謂矢至侯不著而還復復反也公則釋獲優君也衆當中鵠而著唯公所中中三侯皆獲注值中一侯則釋獲釋獲者命小史小史命獲者注傳告服不使知此司射所命司射遂進由堂下北面視上射命曰不貫不釋上射揖司射退反位注貫猶中也射不中鵠不釋算釋獲者坐取中之八算改實八算興執而俟注執所取算乃射若中則釋獲者毎一个釋一算上射於右下射於左若有餘算則反委之注委餘算禮貴異又取中之八算改實八算於中興執而俟三耦卒射蕙田案以上三耦再射釋獲賓降取弓矢於堂西注不敢與君並俟告取之以升俟君事畢疏君待告乃取弓矢諸公卿則適次繼三耦以南注言繼三耦明在大夫北公將射則司馬師命負侯皆執其旌以負其侯而俟注君尊若始焉司馬師反位𨽻僕人埽侯道注新之司射去扑適阼階下告射於公公許適西階東告於賓注告當射也遂搢扑反位小射正一人取公之決拾於東坫上一小射正授弓拂弓皆以俟於東堂注授弓當授大射正拂弓去塵公將射則賓降適堂西袒決遂執弓搢三挾一个升自西階先待於物北北一笴東面立注不敢與君併笴矢幹東面立鄉君也司馬升命去侯如初還右乃降釋弓反位注還右還君之右也猶出下射之南還其後也公就物小射正奉決拾以笥大射正執弓皆以從於物注笥萑葦器大射正舎司正親其職小射正坐奠笥於物南遂拂以巾取決興贊設決朱極三注極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指無極放弦契於此指多則痛小指短不用小臣正賛袒公袒朱𥜗卒袒小臣正退俟於東堂小射正又坐取拾興賛設拾以笥退奠於坫上復位注既袒乃設拾拾當以韝𥜗上大射正執弓以袂順左右隈上再下壹左執弣右執簫以授公公親揉之注順放之也隈弓淵也揉宛之觀其安危也小臣師以巾内拂矢而授矢於公稍屬注内拂恐塵及君也稍屬不搢矢大射正立於公後以矢行告於公注若不中使君當知而改其度下曰留上曰揚左右曰方注留不至也揚遇去也方出旁也公既發大射正受弓而俟拾發以將乗矢注公下射也而先發不留尊也公卒射小臣師以巾退反位大射正受弓注受弓以授有司於東堂小射正以笥受決拾退奠於坫上復位大射正退反司正之位小臣正賛襲公還而后賓降釋弓於堂西反位於階西東面注階西東面賓降位公即席司正以命升賓賓升復筵而後卿大夫繼射蕙田案以上君與賓耦射諸公卿取弓矢於次中袒決遂執弓搢三挾一个出西面揖揖如三耦升射卒射降如三耦適次釋弓説決拾襲反位衆皆繼射釋獲皆如初注諸公卿言取弓矢衆言釋獲互言也卒射釋獲者遂以所執餘獲適阼階下北面告於公曰左右卒射注司射不言告者釋獲者於是有事宜終之也餘獲餘算也無餘算則無所執反位坐委餘獲於中西興共而俟蕙田案以上公卿大夫衆耦再射司馬袒執弓升命取矢如初負侯許諾以旌負侯如初司馬降釋弓如初小臣委矢於楅如初注司馬司馬正於是司馬師亦坐乗矢賓諸公卿大夫之矢皆異束之以茅卒正坐左右撫之進束反位注異束大夫矢尊殊之也正司馬正也進前也又言束整結之示親也疏公卿皆異束但大夫或與士耦則士矢不束大夫束之故注異束大夫矢尊殊之也郝氏敬曰左右撫之數衆矢也進束謂既數衆矢而后進所束之矢於楅反位反中西南東面之位賓之矢則以授矢人於西堂下注是言矢人則納射器之有司各以其器名官職不言君矢小臣以授矢人於東堂下可知司馬釋弓反位而后卿大夫升就席注此言其升前小臣委矢於楅矢疏據上文則升席當在司馬釋弓之後小臣委之前故注言其次第也司射適階西釋弓去扑襲進由中東立於中南北面視算釋獲者東面於中西坐先數右獲二算為純一純以取實於左手十純則縮而委之每委異之有餘純則横諸下一算為奇竒則又縮諸純下興自前適左東面坐坐兼歛算實於左手一純以委十則異之其餘如右獲司射復位釋獲者遂進取賢獲執之由阼階下北面告於公若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有奇者亦曰奇若左右鈞則左右各執一算以告曰左右鈞還復位坐兼歛算實八算於中委其餘於中西興共而俟蕙田案以上再射數左右獲算多少司射命設豐注當飲不勝者射爵司宫士奉豐由西階升北面坐設於西楹西降復位勝者之弟子洗觶升酌散南面坐奠於豐上降反位注弟子其少者也不授者射爵猶罰爵畧之司射遂袒執弓挾一个搢扑東面於三耦之西命三耦及衆射者勝者皆袒決遂執張弓注執張弓言能用之也右手挾弦不勝者皆襲説決拾卻左手右加弛弓於其上遂以執弣注固襲説決拾矣復言之者起勝者也不勝者執弛弓言不能用之也兩言執弣無所挾也司射先反位注居前俟所命入次而來飲三耦及衆射者皆升飲射爵於西階上注不勝之黨無不飲數疏大射者所以擇士以助祭今若在於不勝之黨雖中亦受罰及其助祭雖飲射爵亦得助祭但在勝黨雖不飲罰爵若不數中亦不得助祭飲罰據一黨而言助祭取一身之藝義固不同也小射正作升飲射爵者如作射郝氏敬曰司射但命其儀不親作與鄉射異一耦出揖如升射及階勝者先升升堂少右不勝者進北面坐取豐上之觶興少退立卒觶進坐奠於豐下興揖注右手執觶左手執弓不勝者先降注後升先降畧之不由次也降而少右復並行與升飲者相左交於階前相揖適次釋弓襲反位僕人師繼酌射爵取觶實之反奠於豐上退俟於序端注僕人師酌者君使之代弟子也自此以下辯為之酌升飲者如初三耦卒飲若賓諸公卿大夫不勝則不降不執弓耦不升注此耦謂士也僕人師洗升實觶以授賓諸公卿大夫受觶於席以降適西階上北面立飲卒觶授執爵者反就席注雖尊亦西階上立飲不可以己尊枉正罰也授爵而不奠豐尊大夫也若飲公則侍射者降洗角觶升酌散降拜注侍射賓也飲君則不敢以為罰從致爵之禮也公降一等小臣正辭賓升再拜稽首公答再拜賓坐祭卒爵再拜稽首公答再拜賓降洗象觶升酌膳以致下拜小臣正辭升再拜稽首公答再拜公卒觶賓進受觶降洗散觶升實散下拜小臣正辭升再拜稽首公答再拜注賓復酌自飲者夾爵也但如致爵則無以異於燕也夾爵亦所以恥公也所謂若飲君燕則夾爵賓坐不祭卒觶降奠於篚階西東面立注不祭象射爵擯者以命升賓賓升就席注擯者司正也若諸公卿大夫之耦不勝則亦執弛弓特升飲注此耦亦謂士也特猶獨也與卑為耦而又不勝使之獨飲若無倫匹孤賤也衆皆繼飲射爵如三耦射爵辯乃徹豐與觶蕙田案以上飲不勝者司宫尊侯於服不之東北兩獻酒東面南上皆加勺設洗於尊西北篚在南東肆實一散於篚注為大侯獲者設尊也言尊侯者獲者之功由侯也不於初設之者不敢必君射也君不射則不獻大侯之獲者散爵名容五升敖氏繼公曰為三侯之獲者及𨽻僕人巾車設尊而言尊侯者以其功皆由侯也兩兩壺也或脱一壺字耳兩壺皆酒而云南上是先酌所上者與加勺東枋此在大侯之乏東北乃云服不者見此時服不在乏也不於初設之者因事而獻故其尊亦俟時而設所以别於正獻者也此所設尊洗之類即篇首所言者也上言獲者之尊此云尊侯上言大侯之乏此云服不文互見耳又文亦有詳畧則以設與未設而異也盛氏世佐曰敖説是注以此尊専為大侯獲者設非三侯之獲者其功同其人相去亦不逺何必異尊上經云大侯之乏東北此經云服不之東北其地一也一地而兩尊或先或後亦理之所無者注又云君不射則不獻大侯之獲者尤屬飾説因燕而射君或可以不與未聞大射君不與者也君若不射射義何以言君臣盡志於射乎云南上是亦有𤣥酒矣獻獲者而有𤣥酒以祭侯故重之也蕙田案此所設尊洗在侯乏之間則必俟時而設恐早設之而妨獲者執旌之往來也與君之射不射無渉鄭云君不射固非盛説亦未盡司馬正洗散遂實爵獻服不注言服不者著其官尊大侯也服不司馬之屬掌養猛獸而教擾之者洗酌皆西面服不侯西北三歩北面拜受爵注近其所為獻司馬正西面拜送爵反位注不俟卒爵畧賤也此終言之獻服不之徒乃反位疏服不祭侯而後卒爵今司馬反位在未祭侯之前是畧賤也雖不俟卒爵然亦必兼獻其徒而後始反位宰夫有司薦庶子設折俎注宰夫有司宰夫之吏也鄉射記曰獲者之俎折脊脅肺卒錯獲者適右个薦俎從之注不言服不言獲者國君大侯服不負侯其徒居乏待獲變其文容二人也司馬正皆獻之薦俎已錯乃適右个明此獻己巳歸功於侯也適右个由侯内鄉射記曰東方謂之右个張氏爾岐曰信如注言司馬正並獻二人當用二爵經文明言實一散於篚安得有二爵乎司馬正所獻決是服不氏一人其徒則司馬師獻𨽻僕巾車後乃獻之服不本下士其徒庶人在官者故可後也獲者左執爵右祭薦俎二手祭酒注祭爼不奠爵不備禮也二手祭酒者獲者南面於俎北當為侯祭於豆間爵反注為一手不能正也此薦俎之設如於北面人焉天子祝侯曰維若寧侯無或若女不寧侯不屬於王所故抗而射女彊飲彊食貽女曾孫諸侯百福諸侯以下祝辭未聞適左个祭如右个中亦如之卒祭左个之西北三歩東面注東面受獻之位也不北面者嫌為侯卒爵設薦俎立卒爵注不言不拜既爵司馬正已反位不拜可知也鄉射禮曰獲者薦右東面立飲司馬師受虚爵洗獻𨽻僕人與巾車獲者皆如大侯之禮注𨽻僕人埽侯道巾車張大侯及參侯干侯之獲者其受獻之禮如服不也𨽻僕人巾車於服不之位受之功成於大侯也不言量人者此自後以及先可知卒司馬師受虚爵奠於篚注獲者之篚獲者皆執其薦庶子執俎從之設於乏少南注少南為復射妨旌也𨽻僕人巾車量人自服不而南服不復負侯而俟司射適階西去扑適堂西釋弓説决拾襲適洗洗觚升實之降獻釋獲者於其位少南注獻釋獲者與獲者異文武不同也去扑者扑不升堂也少南辟中薦脯醢折俎皆有祭注俎與服不同惟祭一為異釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵右祭脯醢興取肺坐祭遂祭酒注祭俎不奠爵亦賤不備禮興司射之西北面立卒爵不拜既爵司射受虚爵奠於篚釋獲者少西辟薦反位司射適堂西袒决遂取弓挾一个適階西搢扑以反位注為將復射蕙田案以上獻服不及釋獲者第二番射事竟司射倚扑於階西適阼階下北面請射於公如初注不升堂賓諸公卿大夫既射矣聞之可知反搢扑適次命三耦皆袒决遂執弓序出取矢注曏言拾是言序互言耳司射先反位注言先先三耦也司射既命三耦以入次之事即反位三耦入次袒决遂執弓挾矢乃出反次外西面位三耦拾取矢如初小射正作取矢如初注小射正司射之佐作取矢禮殺代之三耦既拾取矢諸公卿大夫皆降如初位與耦入於次皆袒决遂執弓皆進當楅進坐説矢束上射東面下射西面拾取矢如三耦注凡繼射命耦而已不作射不作取矢從初三疏言凡繼射命耦者前三耦卒射後大夫降至耦之南西面北上司射東面於大夫西比耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦云云至公即席後賓升階復位還筵而後卿大夫繼射後衆皆繼射釋獲皆如初注云諸公卿言取弓矢衆言釋獲互言也既司射所作唯上耦是此文小射正但作三耦拾取矢公以下亦無作拾文故曰不作取矢從初從三耦法也若士與大夫為耦士東面大夫西面大夫進坐説矢束退反位注説矢束自同於三耦謙也耦揖進坐兼取乗矢興順羽且左還毋周反面揖注兼取乗矢不敢與大夫拾大夫進坐亦兼取乗矢如其耦北面搢三挾一个揖進大夫與其耦皆適次釋弓説决拾襲反位諸公卿升就席注大夫反位諸公卿乃升就席大夫與已上下位反疏公卿乃上大夫雖取矢在前猶待下大夫位乃升就席衆射者繼拾取矢皆如三耦遂入於次釋弓矢説决拾襲反位蕙田案以上將以樂射射者拾取矢司射猶挾一个以作射如初一耦揖升如初司馬升命去侯負侯許諾司馬降釋弓反位司射與司馬交於階前倚扑於階西適阼階下北面請以樂於公公許注請奏樂以為節也始射獲而未釋獲復釋獲復用樂行之君子之於事也始取苟能中課有功終用成法教化之漸也射用應樂為難孔子曰射者何以聽循聲而發發而不失正鵠者其惟賢者乎司射反搢扑東面命樂正曰命用樂注言君有命用樂射也樂正在工南北面樂正曰諾司射遂適堂下北面視上射命曰不鼓不釋注不與鼓節相應不釋算也鼓亦樂之節學記曰鼓無當於五聲五聲不得不和凡射之鼓節投壺其存者也周禮射節天子九諸侯七卿大夫以下五上射揖司射退反位樂正命大師曰奏貍首間若一注樂正西向受命左還東面命太師以大射之樂章使奏之也貍首逸詩曾孫也貍之言不來也其詩有射諸侯首不朝者之言因以名篇後世失之謂之曾孫曾孫者其章頭也射義所載詩曰曾孫侯氏是也以為諸侯射節者采其既有弧矢之威又言小大莫處御於君所以燕以射則燕則譽有樂以時會君事之志也間若一者調其聲之疏數重節蕙田案貍首鄭以為即射義曾孫節劉敝以為即召南之鵲巢篆文貍似鵲首似巢鄭因下文有詒女曾孫之云而貍之言不來也詩有射諸侯首不朝之言與考工記祭侯之辭義相近故傅會其説未免牽強然劉敞鵲巢之説尤為穿鑿當以為逸詩不必求詩以實之大師不興許諾樂正反位奏貍首以射三耦卒射賓待於物如初公樂作而后就物稍屬不以樂志其他如初儀注不以樂志君之射儀遲速從心其發不必應樂辟不敏也志意所擬度也春秋傳曰吾志其目卒射如初賓就席諸公卿大夫衆射者皆繼射釋獲如初卒射降反位釋獲者執餘獲進告左右卒射如初蕙田案以上三射以樂節射司馬升命取矢負侯許諾司馬降釋弓反位小臣委矢司馬師乗之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初復位蕙田案以上取矢數獲如初司射命設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初卒退豐與觶如初蕙田案以上樂射後飲不勝者如初司射猶袒决遂左執弓右執一个兼諸弦面鏃適次命拾取矢如初注側持弦矢曰執面猶尚也兼矢於弦尚鏃將止變於射也司射反位三耦及諸公卿大夫衆射者皆袒决遂以拾取矢如初矢不挾兼諸弦面鏃退適次皆授有司弓矢襲反位注不挾亦謂執之如司射卿大夫升就席蕙田案以上樂射後拾取矢如初司射適次釋弓説决拾去扑襲反位司馬正命退楅解綱小臣師退楅巾車量人解左下綱司馬師命獲者以旌與薦俎退注解猶釋也司射命釋獲者退中與算而俟注諸所退射器皆俟備君復射釋獲者亦退其薦俎蕙田案以上三射射事終公又舉奠觶唯公所賜若賓若長以旅於西階上如初大夫卒受者以虚觶降奠於篚反位敖氏繼公曰此一舉觶當在未立司正之前乃降於此者為射故也蕙田案以上為大夫舉旅酬司馬正升自西階東楹之東北面告於公請徹俎公許注射事既畢禮殺人倦宜徹俎燕坐遂適西階上北面告於賓賓北面取俎以出諸公卿取俎如賓禮遂出授從者於門外大夫降復位注門東北面位立疏大夫雖無俎以賓及公卿皆送俎不可獨於堂故降復位云門東北面位者謂初小臣納卿大夫門東北面揖位庶子正徹公俎降自阼階以東注降自阼階若親徹也以東去藏賓諸公卿皆入門東面北上注諸公卿不入門而右以將燕亦因從賓司正升賓賓諸公卿大夫皆説屨升就席公以賓及卿大夫皆坐乃安注曏命以我安臣於君尚猶踧踖至此乃敢安羞庶羞大夫祭薦司正升受命皆命公曰衆無不醉賓及諸公卿大夫皆興對曰諾敢不醉皆反位坐蕙田案以上徹俎脱屨安坐又案以下儀節皆與燕禮相同主人洗酌獻士於西階上士長升拜受觶主人拜送注獻士用觶士賤也士坐祭立飲不拜既爵其他不拜坐祭立飲注其他謂衆士也升不拜受爵乃薦司正與射人於觶南北面東上司正為上注司正射人士也以齒受獻既乃薦之也司正大射正也射人小射正畧其佐疏案燕禮薦司正與射人一人司士一人執冪二人此不言其數又不言司士與執冪文不具辯獻士士既獻者立於東方西面北上乃薦士注士既獻易位者以卿大夫在堂臣位尊東也畢獻薦之畧賤祝史小臣師亦就其位而薦之注亦者亦士也辯獻乃薦也祝史門東北面東上敖氏繼公曰此獻史盖小史也大史釋獲曏已受獻主人就士旅食之尊而獻之旅食不拜受爵坐祭立飲主人執虚爵奠於篚復位蕙田案以上主人獻士及旅食賓降洗升媵觶於公酌散下拜公降一等小臣正辭賓升再拜稽首公答再拜賓坐祭卒爵再拜稽首公答再拜賓降洗象觚升酌膳坐奠於薦南降拜小臣正辭賓升成拜公答拜賓反位注此觚當作觶公坐取賓所媵觚興唯公所賜受者如初受酬之禮降更爵洗升酌膳下再拜稽首小臣正辭升成拜公答拜乃就席坐行之有執爵者唯受於公者拜司正命執爵者爵辯卒受者興以酬士大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜大夫立卒爵不拜實之士拜受大夫拜送士旅於西階上辯士旅酌蕙田案此篇偏字皆作辯古字同尚書徧於羣神史記作辯左傳子言辯舎爵於季氏之廟而出是也又案以上賓舉爵為士旅酬若命曰復射則不獻庶子注獻庶子則正禮畢後無事司射命射唯欲注司射命賓及諸公卿大夫射欲者則射不欲者則止可否之事從人心也卿大夫皆降再拜稽首公答拜注拜君樂與臣下執事無已不言賓賓從羣臣禮在上敖氏繼公曰拜拜君命也公不辭之而即答拜者以賓不在其中也賓不與此拜者以與君為耦射否宜由君不敢從唯欲之命也壹發中三侯皆獲敖氏繼公曰以其非正射故上下射惟拾發一矢以其壹發故雖中非其侯而亦獲是禮亦因而然也唯公則中離維綱楊觸梱復而皆獲上云退中與算而俟至是則亦設中執算而釋獲矣釋獲則有飲射爵之事也蕙田案以上坐燕時復射主人洗升自西階獻庶子於阼階下如獻士之禮辯獻降洗遂獻左右正與内小臣皆於阼階下如獻庶子之禮蕙田案以上主人獻庶子以下獻禮終無算爵注算數也爵行無次數唯意所歡醉而止士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公答再拜注席下席西受賜爵者以爵就席坐公卒爵然後飲注酬之禮爵代舉今爵並行嫌不代也並行猶代者明勸恵從尊者來執膳爵者受公爵酌反奠之注燕之歡在飲酒成其意也受賜者興授執散爵者執散爵者乃酌行之注與其所歡者唯受於公者拜卒爵者興以酬士於西階上士升大夫不拜乃飲實爵注乃猶而也士不拜受爵大夫就席士旅酌亦如之公有命徹冪則賓及諸公卿大夫皆降西階下北面東上再拜稽首公命小臣正辭公答拜大夫皆辟升反位士終旅於上如初無算樂宵則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭閽人為燭於門外蕙田案以上無算爵燕禮畢賓醉北面坐取其薦脯以降注取脯重得君之賜奏陔注陔夏樂章也其歌頌類也以鐘鼓奏之其篇今亡賓所執脯以賜鐘人於門内霤遂出注必賜鐘人鐘人以鐘鼓奏陔夏賜之脯明雖醉志禮不忘樂卿大夫皆出注從賓出公不送注臣也與之安燕交歡嫌亢禮也公入驁注驁夏亦樂章也以鐘鼓奏之其詩今亡此公出而言入者射宫在郊以將還為入燕不驁者於路寢無出入也蕙田案敖繼公云入謂降而入於内也燕禮不言公入此言公入者為奏驁而見之也案公出入奏驁夏但此奏驁尚在射所非路寢盖射所之入既已奏驁至入路寢又當奏之經文省耳又案以上賓出公入又案此篇於未射之前先行燕禮則與燕禮篇相為表裏也射之時分為三次其儀節則與鄉射禮篇相為表裏也右儀禮大射儀五禮通考卷一百六十一
