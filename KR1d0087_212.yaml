body:
  text: 五禮通考卷二百二刑部尚書秦蕙田撰嘉禮七十五體國經野書禹貢海岱及淮惟徐州錐指傳曰東至海北至岱南及淮渭案地理志桐柏大復山在南陽平氏縣東南淮水所出東南至淮陵入海陵當作隂字之誤也過郡四行三千二百四十里徐西不言所至然爾雅云濟東曰徐州則知其西亦距濟海自江南山陽縣東折而西北為淮水入海之口其北岸則安東縣也是為徐域海自縣東而北歷海州東中有鬱林山亦名鬱州北齊置東海縣元和志云本漢贑榆縣地俗謂之鬱洲亦謂之田橫島又北歷贑榆縣東又東北歷山東日照縣東又東北歷諸城縣東至琅邪臺過此則為青域矣徐北至岱岱之西南為東平其南為泰安所謂汶陽之田者也東南為萊蕪新泰沂州莒州諸城皆以長城故址與青分界淮水今自鳯陽府夀州界州在淮南東流經懷逺五河泗州南又東北經淮安府清河縣南與黃河合又東經安東縣南而東北入於海中流與揚分界故曰南及淮也岱濟之間與兖分界蓋在東平汶上巨野之西濟淮之間與豫分界蓋在金鄉碭山宿州懷逺之西淮沂其乂錐指正義曰地理志云沂水出泰山蓋縣臨樂子山南至下邳入泗過郡五行六百里淮出桐柏山發源逺矣於此州言之者淮水至此而大為害尤甚喜得其治故於此記之渭案桐柏山在南陽平氏縣東南其故城在今南陽府桐柏縣西北四十里蓋縣故城在今青州府沂水縣西北地理今釋沂水出今山東青州府沂水縣西北一百七十里雕崖山接蒙隂縣界南流至江南淮安府宿遷縣北滙為駱馬湖又南入運河胡氏渭曰蔡傳引曽氏曰徐州水以沂名者非一酈道元謂水出尼邱山西北徑魯之雩門亦謂之沂水水出太山武陽之冠石山亦謂之沂水而沂水之大則出於泰山也案水經注出尼邱之沂水流經魯縣故城南北對稷門稷門一名髙門亦曰雩門水即曽點所浴也西入泗水與經文之沂無涉水經注有小沂水者三曽僅舉其一沂水出泰山郡之蓋縣今但云出於泰山非也疑脫蓋縣二字蒙羽其藝錐指正義曰地理志云蒙山在泰山蒙隂縣西南羽山在東海祝其縣南渭案今山東青州府蒙隂縣南有蒙隂故城江南淮安府贑榆縣南有祝其故城皆漢縣也胡氏渭曰蒙山在今蒙隂縣南四十里西南接費縣界詩魯頌奄有龜蒙論語季氏將伐顓臾孔子曰昔者先王以為東蒙主邢昺疏云山在魯東故曰東蒙也漢志蒙隂縣有蒙山祠顓臾國在山下後魏志新泰縣有蒙山宋省蒙隂後魏以其地改置新泰縣劉芳徐州記蒙山髙四十里長六十九里西北接新泰縣界元和志蒙山在新泰縣東八十八里費縣西北八十里東蒙山在費縣西北七十五里是謂蒙與東蒙為二山也齊乘曰龜山在今費縣西北七十里蒙山在龜山東二山連屬長八十里禹貢之蒙羽論語之東蒙正此蒙山也後人惑於東蒙之説遂誤以龜山當蒙山蒙山為東蒙而隱沒龜山之本名故今定正之邑人公鼐論曰蒙髙峯數處俗以在東者為東蒙中央者為雲蒙在西者龜蒙其實一山龜山自在新泰其北有沃壤所謂龜隂之田亦非即龜蒙峰也參之以邢疏東蒙即蒙山非有二山明矣漢志祝其縣南有羽山杜預左傳注亦云在祝其縣西南縣之故城在今贑榆縣界而隋志朐山縣有羽山元和志云羽山在朐山縣西北一百里又云在臨沂縣東南一百十里與朐山縣分界朐山今海州臨沂今沂州也近志郯城縣東北亦有羽山接贑榆界齊乘云羽山舊在朐山縣東北九十里今屬沂州在東南一百二十里時郯城未復故在州境也諸説不同要之此山在沂州之東南海州之西北贑榆之西南郯城之東北實跨四州縣之境也明一統志云在贑榆縣西北八十里則誤矣説者皆以此山為舜殛鯀處山下有羽潭即左傳所云其神化為黃熊入于羽淵者也愚謂此地太近非荒服放流之宅孔安國舜典傳云羽山東裔在海中今登州府蓬萊縣有羽山寰宇記云在縣東十五里即殛鯀處有鯀城在縣南六十里以近殛鯀之地而名此與孔傳謂在海中者合當從之齊乘九目山東北二十里有龍山又北即羽山蓬萊新志云在縣東南三十里禹貢之羽在徐域舜典之羽在青域不可以無辨蕙田案此辨蒙羽二山是大野既豬東原底平錐指傳曰大野澤名正義曰地理志大野澤在山陽巨野縣北東原即今之東平郡蔡氏曰東原在徐之西北而謂之東者以在濟東故也漢東平國景帝亦名濟東國益知大野東原所以志濟也渭案今山東兖州府巨野縣西有巨野故城何承天曰巨野湖澤廣大南通洙泗北連清濟舊縣故城正在澤中是也漢東平國治無鹽縣其故城在今東平州東周禮兖州澤藪曰大野夏元肅云大野在徐之西兖之東周無徐州故以屬兖爾雅十藪魯有大野左傳哀十四年西狩于大野獲麟杜注云在髙平巨野縣東北大澤是也秦漢之際稱巨野澤史記彭越漁於巨野澤中後又稱巨澤水經注濟水東北出巨澤是皆大野矣元和志云大野澤在巨野縣東五里南北三百里東西百餘里近志云巨野澤在縣城北案巨野故城在今縣西而何承天云舊縣故城皆在澤中則澤必不起自今縣之東北可知也蓋此地屢遭河患漢元光三年河決濮陽瓠子注巨野通淮泗後二十餘年始塞自是之後五代晉開運初宋咸平三年天禧三年熙寧十年金明昌五年河皆決入巨野溢於淮泗或由北清河入海自漢以來衝決填淤凡四五度髙下易形久已非禹迹之舊逮元至正四年河又決入此地巨野嘉祥汶上任城等縣皆罹水患及河南徙澤遂涸為平陸而畔岸不可復識矣又曰吳氏澄曰大野澤俗稱梁山濼于欽齊乘亦云澤即梁山泊也梁山在夀張縣東南七十里東平州西南五十里東接汶上縣界汶水西南流與濟水會於山之東北回合而成濼志云大野澤之下流也水常滙於此金時河益南徙梁山濼漸淤羽畎夏翟嶧陽孤桐錐指傳曰嶧山之陽正義曰地理志云東海下邳縣西有葛嶧山即此山也渭案後漢郡國志下邳東海縣有葛嶧山本嶧陽山劉昭補注云山出名桐伏滔北征記曰今槃根往往而存山在今淮安之邳州西北六里林少頴云嶧山即詩所謂保有鳬繹非也渭案漢志東海下邳縣葛嶧山在西古文以為嶧陽魯國騶縣故邾國嶧山在北嶧繹古字通今兖州府鄒縣東南有嶧山一名邾繹亦曰鄒嶧此皆鳬繹之繹左傳邾文公卜遷于繹史記秦始皇刻石頌功德者也水經注泗水歷下邳縣徑葛嶧山東即奚仲所遷之邳繹元和志謂之嶧陽山邳州新志云俗名距山以其與沂水相距也此乃禹貢之嶧陽漢志極其分明林氏混而一之大謬蔡傳主葛嶧而黃文叔以為在鄒縣非唯不見北征記語亦不知有地理志矣泗濵浮磬錐指泗濵先儒但云泗水之涯而不言在何縣水經注泗水自彭城又東南過吕縣南水上有石梁焉故曰吕梁晉太康地記曰水出磬石書所謂泗濵浮磬者也括地志亦云泗水至彭城吕梁出磬石今徐州東南六十里有吕梁洪髙誘淮南子注云吕梁在彭城吕縣石生水中禹決而通之蓋即磬石之所出也金元以來泗殫為河明嘉靖中惡其石破害運船鑿之使平而浮磬愈不可問矣淮夷蠙珠暨魚胡氏渭曰淮南北近海之地皆為淮夷書序曰武王崩三監及淮夷叛又曰成王東伐淮夷遂踐奄費誓曰徂兹淮夷徐戎並興詩序宣王命召公平淮夷常武曰率彼淮浦省此徐土又曰截彼淮浦王師之所魯頌曰奄有龜蒙遂荒大東至于海邦淮夷來同左傳僖十三年淮夷病杞此皆淮北之夷在徐州之域者也江漢之詩曰江漢浮浮武夫滔滔匪安匪遊淮夷來求春秋昭公四年楚子召諸侯及淮夷會于申此皆淮南之夷在揚州之域者也經所稱淮夷乃淮北之夷漢臨淮郡有淮浦縣今為安東縣屬淮安府淮水從此入海即詩所謂淮浦矣淮夷蓋在東方荒服之內故亦謂之東夷今淮揚二府近海皆是也浮于淮泗達于河錐指金氏曰達于河古文尚書作達于菏説文引書亦作菏今俗本誤作河耳菏澤與濟水相通而泗水上可以通菏下可以通淮徐州浮淮入泗自泗達菏也青州書達于濟則達河可知故徐州書達于菏則達濟可知渭案菏謂菏澤在今兖州府定陶縣東北説文菏字下云禹貢浮于淮泗達于菏從水苛聲徐鉉音古俄切𨽻從草作菏俗遂訛為荷又訛為河也許慎時經猶作菏而史記漢書並作河蓋後人傳寫之誤濟水豬為菏澤此經蒙青之文曰達于菏則由濟入漯可知矣以今輿地言之泗水出泗水縣歷曲阜滋陽濟寧鄒縣魚臺滕縣並屬山東兖州府沛縣徐州沛縣屬徐州𨽻江南邳州宿遷桃源至清河縣入淮並屬淮安府此禹迹也今其故道自徐城以南悉為黃河所占而淮不得擅會泗之名矣胡氏渭曰徐州有古大庭少皥之墟左傳梓慎登大庭氏之庫注云大庭古國名在魯城內或曰大庭即炎帝也劉楨魯都賦云戢武器于有炎之庫有緡大彭奄邳之封皆在焉春秋時可考者魯滕茅薛徐邾莒蕭郯遂任宿須句顓臾鄫鄅陽鄣郳後為小邾向極牟鑄鄟邿逼陽根牟鍾吾甲父凡二十九國戰國時屬魯而宋齊楚亦兼得其地秦并天下置泗水琅邪西境是薛郡漢改置東海郡復以其地為徐州領郡國四後漢魏晉並因之魏晉領郡國七唐為河南道之彭城徐州臨淮泗魯郡兖東海海琅邪沂等郡案以上通典所列唯魯郡乾封萊蕪之北境當往屬青其當來屬者兖域東平之須昌巨野宿城及夀張之東境濟陽平隂之南境青域髙密之莒縣及諸城之南境是也以今輿地言之江南徐州及鳳陽府之懷逺五河虹縣泗州宿州靈璧淮安府之桃源清河安東邳州宿遷睢寧海州贑榆山東兖州府則滋陽曲阜寧陽鄒縣泗水滕縣嶧縣金鄉魚臺濟寧嘉祥巨野東平汶上沂州郯城費縣及平隂之南境濟南府則新泰及泰安萊蕪之南境青州府則蒙隂沂水莒州日照及諸城之南境皆古徐州域也淮海惟揚州錐指傳曰北據淮南距海渭案海岸雖自東北迤西南而經云東漸于海則青徐揚之海皆主東言可知也傳於青兼言北既為失之而於揚專言南則失之愈甚通典曰揚州北距淮東南距海舊曰南距海今改為東南自晉以後歷代史皆云五嶺之南至于海並是揚州之地案禹貢物産貢賦職方山藪川浸皆不及五嶺之外且荆州南境至衡山之陽若五嶺之南在九州封域則以鄰接宜屬荆州豈有捨荆而屬揚此近史之誤也杜氏此言良是改南為東南視傳為優其所距者即秦漢南海郡之揭陽縣唐潮陽郡今潮州府是也南海郡治番禺其極東界為揭陽縣王莽改縣曰南海亭蓋至此始為南海而揭陽以北猶為東海故知揚州之海經亦主東言也淮水自今河南汝寧府息縣南東流經光山縣北是為揚域又東經光州北又東經固始縣北又東北經江南鳳陽府頴州北又東經霍邱縣北頴上縣南又東經夀州北與豫分界又東北經五河縣東南又東經泗州南盱眙縣北又東北經淮安府清河縣南又東經山陽縣北又東經安東縣南而東北注于海與徐分界海自山陽縣東北折而東南歷鹽城興化如臯縣東又南至通州東為江水入海之口其南岸則太倉州也自州東又東南歷上海縣金山衛東又南歷浙江鎮海象山縣折而西歷寧海縣東又西南歷黃巖太平樂清瑞安平陽縣東又南歷福建福寧州東又西南歷羅源連江長樂福清縣東又西南歷莆田惠安同安縣南又西南歷海澄漳浦詔安縣東南又西歷廣東澄海縣南又西至潮陽縣南揚州之海於斯極矣昔周宣王命召公平淮夷帥師自江漢循流而下故其詩曰江漢浮浮武夫滔滔又曰于疆于理至于南海淮夷淮南之夷南海即揚東南所距之海韓退之南海神廟碑云廣州治東南海道八十里扶胥之口黃木之灣此番禺之海也潮州刺史謝上表云州南近界漲海連天此揭陽之海也詩所謂至於南海者亦至揭陽而止耳豈必踰嶺以至番禺哉左傳僖四年楚子使屈完言於齊侯曰君處北海寡人處南海注云楚界猶未至南海因齊處北海遂稱所近蓋夸大之辭其襄十三年子囊述共王之德曰撫有蠻夷奄征南海征與處不同蓋楚至悼王時吳起為楚南收揚越楚地始踰嶺而瀕南海共王則征之而已此却非夸大之辭揚之南界經無可見據通典以潮陽𨽻古揚州蓋自江西大庾嶺東南羣山綿亘以達于廣東潮州府之揭陽即揚之南界也大庾嶺在南安府大庾縣南八十里縣本漢豫章郡南壄縣地南接廣東南雄府保昌縣界縣亦南壄縣地水經注以為五嶺之最東亦名東嶠漢書謂之塞上南越相吕嘉破漢將軍韓千秋于石門送漢節至于塞上即此地也後漢志名臺領山唐以後又稱梅嶺其西為聶都山贛水所出與湖廣郴州宜章縣接界裴淵廣州記曰五嶺大庾始安臨賀桂陽揭陽也此與水經注小異桂陽即騎田而無都龎有揭陽顔師古云嶺者西自衡山之南東窮于海一山之限耳而别標名則有五蓋依裴氏五嶺訖揭陽揭陽山一名揭嶺在今揭陽縣西北百五十里南北二支直抵惠州府興寧海豐二縣界山南揭陽故城漢縣也今西自越城騎田萌渚陂陀相屬直趨大庾嶺又循脊而下東包揭陽屬之海堧與江西福建分險唐一行所謂南戒山河至衡陽東循嶺徼達東甌閩中以限蠻夷者是也揚之西界經亦無可見今據通典所𨽻郡縣約略言之蓋自河南光山縣與豫分界其南為湖廣之羅田蘄水蘄州廣濟踰江而南則為江西之瑞昌又西南為武寧寧州萬載萍鄉永新永寧又東南為龍泉崇義大庾皆與荆分界處也彭蠡既豬陽鳥攸居錐指傳曰彭蠡澤名吳氏曰彭蠡澤跨豫章鄱陽之境廣數百里受歙信饒撫之水及洪東境之水豬名鄱陽湖流出名揚瀾左蠡虔吉袁筠之水及洪西境之水皆會過南康至湖口縣入江渭案地理志豫章彭澤縣西有彭蠡澤今江西湖口彭澤都昌三縣皆漢彭澤縣地湖口彭澤屬九江府都昌屬南康府吕覽云禹為彭澤之障乾東土謂斯役也彭蠡澤後稱彭蠡湖在今江西南昌府城東北一百五十里饒州府城西四十里南康府城東五里九江府城東南九十里周回四百五十里浸四郡之境亦曰鄱陽湖以中有鄱陽山而名俗因號在都昌者為東鄱湖在南昌者為西鄱湖湖又隨地而異名其在星子縣東南接南昌界者曰宫亭湖水經注云廬山南嶺下有神廟號曰宫亭廟故彭湖亦有宫亭之稱湖有落星石周回百餘步髙五丈其在都昌縣西南者曰揚瀾湖又北曰左里湖通典云地在章江之左因名元和志云揚瀾湖北曰左里一作左蠡今縣西南九十里有左里城是也其在餘干縣西北者曰擔石湖通典云鄱陽郡西百七十里至擔石湖是也輿程記云自湖口縣入彭蠡湖經大孤山至南康府百二十里又二百五十里至南昌府自縣而東南渡湖抵饒州凡三百七十里鄱陽山本名力士山亦名石印山東南去鄱陽縣百五十里漢為歷陵縣地湖中又有康郎山在餘干縣北八十里為風帆之表幟大孤山在九江府德化縣東南四十里與南康分界水經注云有孤石界立湖中周回一里竦立百丈矗然髙峻特為瓌異疑謂此山唐顧況詩大孤山盡小孤出蓋彭澤縣之小孤山與此遙相望也鄱蠡所受有九水劉歆云湖漢等九水入彭蠡是也或曰十川酈道元云贛水總納十川漢志豫章郡贛縣下云豫章水出西南北入大江雩都縣下云湖漢水東至彭蠡入江又有鄱水餘水修水盱水蜀水南水彭水廬水皆入湖漢水湖漢水與豫章水源異而流同彭水即豫章水之上源非有二水是湖漢豫章與鄱餘修盱蜀南廬為九水也水經注則湖漢豫章總謂之贛水出豫章南野縣西一名豫章水以今輿地言之贛水自湖廣郴州宜章縣流入江西崇義縣界歷上猶南康贛縣萬安泰和廬陵吉水永豐峽江新淦清江豐城至南昌入彭蠡湖又北歷星子都昌德化湖口注于大江春夏時彭蠡浩蕩無涯霜降水涸則贛川如帶而已此水自昔有南江之稱鄭康成説三江云右會彭蠡為南江南史王僧辨傳陳霸先自嶺南起兵討侯景出南江行至湓口胡三省云贛水謂之南江唐張九齡都督洪州有望南江入始興郡路詩三江既入震澤底定錐指正義曰地理志云會稽吳縣故周泰伯所封國也具區在西古文以為震澤蘇氏曰豫章江入彭蠡而東至海為南江岷江江之經流會彭蠡以入海為中江漢自北入江會彭蠡為北江三江入海則吳越始有可宅之土而水所鍾者獨震澤而已曽氏曰具區之水多震而難定故謂之震澤震即三川震之震若今湖翻底定者言底于定而不震蕩也易氏曰三江自入于海不通震澤而經何以言震澤底定蓋江湖在今日雖無相通之勢而當時洪水實有橫流之理想其際震澤與江水莽為一壑自大禹疏導而三江入海震澤乃底於定自然之勢也見王天與尚書纂傳渭案蘇氏三江之説人或疑之及閲徐堅初學記引鄭康成書注以證三江曰左合漢為北江右會彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡與南北合始得稱中也始知蘇氏所説東漢時固已有之馬中錫云斯言也百世以俟聖人可也地理今釋三江孔安國班固鄭康成韋昭桑欽郭璞顧夷諸説不一惟鄭康成曰左合漢為北江右合彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡并與南北合始得稱中也融洽前後經文確不可易宋蘇軾實宗其説蔡傳專主庾仲初吳都賦注以松江婁江東江為三江力排蘇説且曰大江合漢與彭蠡之後又千餘里而入海不復可指為三不知三江云者因上流有中江北江南江而言之非截然指為三也蔡傳又云禹貢無施勞者雖大亦略揚州大江無俟濬治故在不書不知禹貢所紀成功而施功即在其中當洪水汜濫之後大江自彭蠡以東至入海處其間豈無泥沙壅塞謂之無施勞可乎況管子荀子淮南子皆云禹疏三江可證也胡氏渭曰禹貢三江之不明誤自班固始漢志會稽吳縣下云南江在南東入海毗陵縣下云北江在北東入海今本漢書脫上一北字此據宋本增入後漢志亦云北江丹陽蕪湖縣下云中江出西南東至陽羡入海皆揚州川也蓋北江為經流至江都入海中江由吳松入海南江合浙江入海皆北江之枝瀆也導水明言漢自彭蠡東為北江江自彭蠡東為中江誠如班氏所言則蕪湖之中江何以知為江水之所分毗陵之北江何以定為漢水之所獨乎以此當禹貢三江之二雖愚者亦知其非矣職方氏荆州曰其川江漢揚州曰其川三江此正與禹貢同蓋荆州未會彭蠡故但稱江漢及至揚州則江漢與彭蠡參會故有三江之目二經若合符節或因職方與五湖連舉又班志以蕪湖之中江吳縣之南江為揚州川遂以三江口當之大非三江孔穎達主班固陸德明兼舉韋昭顧夷而無所專主蔡沈主庾仲初歸有光主郭璞今有要言不煩可以折聚訟之紛紛者富順熊過云黃帝正名百物未嘗假借後世乃通之耳竊謂禹主名山川亦然南方流水通呼為江北方流水通呼為河故傳記多隨俗之稱而禹貢無所假借唯水之出自河者衆不可勝名則總其數而謂之河九河是也衆水之會而入於江者混為一川大小相敵則亦總其數而謂之江三江九江是也然漯亦河之别而不名河江之别曰沱漢之别曰潛則其名有所不輕與矣而況松江為震澤之下流錢唐浦陽之出自浙東者哉夫江河者百川之宗也非江而被以江名是猶吳楚僣王春秋之所誅絶也禹貢職方豈有是與總之三江紀其合不紀其分苟以派别者當之則必與導水之義有礙故或以為錯誤或以為衍文而聖經亦不足信矣諸説唯蘇軾同鄭康成為無病以其非異派也先儒曽􅌈程珌易袚夏僎程大昌黃度陳普王充耘皆主蘇説近世蔡傳單行而鄭曉周洪謨馬中錫邵寶張吉章潢郝敬袁黃亦以蘇説為是此心此理之同終不容泯也觀承案三江既入句當另為一條三江者以經證經當是北江中江九江耳禹貢諸水俱不稱江惟此三水獨有江名故至揚入海雖合流已久而尚别之為三所以存其源也舊惟連震澤底定為節故蔡氏泥之而取庾仲初婁江東江松江俱震澤下流之三水以解三江耳不知禹貢規一州全勢以立文非專作蘇州一郡志也故當逐句讀斷則先曰彭蠡既豬而揚州西偏之水寧矣次曰三江既入而揚州北偏之水順矣乃曰震澤底定而揚州東偏之水亦平矣三方循軌而其南浙江諸水則地偏勢急而本無水患而揚州全局不了然在目也耶似此説為長也孔傳云震澤吳南太湖名山海經浮玉之山北望具區注云太湖也爾雅十藪吳越之間曰具區注云具區今吳縣西南太湖即震澤也今案周禮揚州澤藪曰具區班固以為即震澤蓋澤自吳西南境東出為松江一名笠澤在今吳江縣界北去吳五十里水經注云笠澤在吳南松江左右國語越伐吳吳禦之笠澤越軍江北吳軍江南者是也孔郭指此為太湖則誤矣越絶書曰太湖周三萬六千頃水經注引韋昭曰方圓五百里盧熊蘇州府志引顔真卿石柱記曰四萬八千頃王鏊姑蘇志曰東西二百餘里南北一百二十里占蘇湖常三州今案蘇之吳吳江湖之烏程長興常之宜興武進無錫此七縣者皆瀕太湖楊修五湖賦云頭首無錫足蹄松江負烏程於背上懷大吳以當胸數言可作圖經也湖中有七十二山其最著者曰包山夫椒山胥母山大雷山小雷山三山其上源西北有宣歙金陵九陽江之水由常州之百瀆以下西南有苕霅諸水由湖州之七十二漊以入焉其下流為松江江水東北流岐分為三江口史記正義云震澤在蘇州西南四十五里三江者在蘇州東南三十里名三江口一江西南上七十里至太湖名曰松江古笠澤江一江東南上七十里至白蜆湖名曰上江亦曰東江一江東北下三百餘里入海名曰下江亦曰婁江於其分處號曰三江口松江東歷夏駕浦又東為青龍江至南蹌浦口入海而太湖枝津則有崑山之劉家河常熟之白茆港兩縣境中又有三十六浦在常熟者二十四水入揚子江在崑山者十二水入于海皆所以決壅滯而防泛濫使民田無漂沒之憂者也今東壩堅固宣歙金陵九陽江之水雖不入太湖而東江久已淤塞松江日漸淺隘諸港浦亦多堙廢湖水不能速達于海事與禹時不同此籌水利者所以汲汲於下流之疏濬與周禮揚州浸曰五湖據國語史記吳越春秋則即是太湖東通松江南通霅溪西通荆溪北通滆湖東連韭溪吳郡俗圖經云在嘉興凡有五道故名五湖韋昭曰五湖者胥湖蠡湖洮湖滆湖就太湖而五實一湖也前説較長張勃酈道元張守節陸龜蒙李宗諤諸家之説雖名稱各殊道里互别然皆在太湖上下二三百里之間唯李善以洞庭彭蠡震澤巢湖鑑湖司馬貞以具區洮滆彭蠡青草為五湖夫洞庭青草在荆域而以為五湖之一則顯與職方相背矣不可從韓非子謂洞庭為五湖猶言五渚耳此洞庭自為五湖與揚之五湖無涉具區五湖明是兩處而孔傳謂太湖名震澤正義為之辭曰餘州浸藪各異而揚州浸藪同處論其水謂之浸指其澤謂之藪此説非也葉少藴云凡言藪者皆人所資以為利故曰藪以富得民而浸則但水之所鍾也揚州之藪為震澤今平望八赤震澤之間平望鎮在吳江南四十五里八赤市在縣南二十里震澤鎮在縣西南八十五里水瀰漫而極淺其蒲魚蓮芡之利人所資者甚廣亦或可隄而為田與太湖異所以謂之澤藪然積潦暴至無以泄之則隘而為害所以謂之震澤黃子鴻申其義曰今土人自包山以西謂之西太湖水始淵深自莫釐武山以東謂之南湖水極灘淺蓋即古之震澤止以上流相通後人遂混謂之太湖誤矣渭案此辨周官之藪浸極明晰蓋自莫釐武山以東至平望八赤之間松江左右笠澤之地皆古具區禹貢謂之震澤者也鄭茝畦曰烏程有震澤上下二鄉今南潯上林軋村濵湖一帶數十里皆是亦即古具區禹貢所謂震澤者也故顔魯公作石柱記其辭甚簡必以震澤太湖兩處見之禹貢長箋朱氏長孺曰案職方具區即禹貢震澤孔氏書傳鄭氏周禮注所云在吳南者是也但以為即五湖則未然職方氏諸州皆有澤藪不應揚州水國反獨無之而與浸同處孔鄭所云吳南者漢吳縣治之南也吳縣治之南為今吳江至嘉興一帶禹時懷襄未平三吳一壑具區當於其地求之若五湖即今太湖自環吳縣境之西北豈可合之為一哉具區之源當與太湖俱來苕霅而水草所鍾淺而易溢太湖水西來汜濫則澤水奔騰震澤自底定之後始可陂障沮洳數十百里民仰其利故爾雅謂之藪職方謂之澤藪而五湖則别之曰浸逮乎日久填淤生殖漸繁遂成沃壤漢後諸儒求其地而不得遂合五湖而一之正義又曲為之説豈知三代以前固有澤浸不同者哉蕙田案黃氏朱氏胡氏具區震澤之辨確不可易島夷卉服錐指蘇氏曰島夷績草木為服如今吉貝木棉之類渭案地理志樂浪海中有倭人分為百餘國又會稽海州有東鯷人分為二十餘國皆以嵗時來獻見蓋即此之島夷已觀承案卉即花也乃木棉之正名後人知自六朝時傳種中土故所在多有不知禹時島夷已製以為服故特别之曰卉服而取其木棉之精者為織貝以入於貢篚也胡氏渭曰揚州有古汪芒氏之封春秋時可考者蓼六越楚東境是吳蔣弦黃舒宗巢舒庸舒鳩英桐鍾離濮左傳昭元年吳濮有釁杜注云吳在東濮在南今建寧郡南有濮夷凡十七國戰國時初屬越後楚滅越而有其地秦并天下置九江鄣郡會稽閩中南海東境今潮陽郡是漢復置揚州領郡國七後漢魏晉並因之晉領郡國二十二唐為淮南道之廣陵揚州淮隂楚鍾離濠夀春夀永陽滁歷陽和廬江廬同安舒蘄春蘄弋陽光等郡江南東道之丹陽潤晉陵常吳郡蘇吳興湖餘杭杭新定睦新安歙會稽越餘姚明臨海台縉雲處永嘉溫東陽婺信安衢建安建長樂福清源泉漳浦漳臨汀汀潮陽潮等郡江南西道之豫章洪鄱陽饒潯陽江臨川撫廬陵吉宜春袁南康虔等郡案以上通典所列無可更定者以今輿地言之浙江江西福建皆是江南則江寧揚州廬州安慶池州太平寧國徽州鎮江常州蘇州松江十二府滁和廣德三州其鳳陽府則鳳陽臨淮定逺夀州霍邱盱眙天長淮安府則山陽鹽城河南則汝寧府之光州光山固始湖廣則黃州府之羅田蘄水蘄州廣濟黃梅廣東則潮州府皆古揚州域也荆及衡陽惟荆州錐指傳曰北據荆山南及衡山之陽正義曰以衡之南無復有名山大川可以為記故言陽見其境過山南也渭案地理志禹貢南條荆山在南郡臨沮縣東北衡山在長沙國湘南縣東南今湖廣襄陽府南漳縣有荆山本漢臨沮地衡州府衡山縣有衡山本漢湘南地也荆之北界判自南漳縣之荆山山在縣西北八十里漳水所出其西為逺安興山北與梁接界荆山之西百餘里為景山水經沮水出漢中房陵縣注云出沮陽縣西北景山即荆山首也故淮南子曰沮出荆山元和志云沮水出房州永清縣西南景山永清本漢房陵縣地也縣南一百一十三里有建鼓馬騣二山並髙峻又竹山縣西南三十五里有白馬塞山孟達歎為金城千里蓋皆景山之餘脈矣南漳以東為荆門鍾祥京山元和志大洪山在京山縣西北二百里孤秀為衆山之傑及隨州之南境廢光化縣地光化故城在今隨州東南三十餘里唐隨州管縣四通典云唯光化為荆域餘皆屬豫又東為應山縣縣北有義陽三關一曰平靖關一曰黃峴關一曰武陽關即古之大隧直轅冥厄也左傳定四年吳伐楚自淮涉漢楚左司馬戌請還塞大隧直轅冥厄自後擊之大隧即武陽直轅即黃峴冥厄即平靖也三關又總名曰城口楚史皇所謂塞城口而入也冥亦作黽又作鄳皆讀若盲又東為黃安縣有大活關白沙關又東為麻城縣有穆陵關隂山關諸關依山為阻與荆山東西凖望相直皆荆豫接界處荆之南界越衡山之陽大抵及嶺而止史記曰秦有五嶺之戍晉地理志曰自北徂南入越之道必由嶺嶠時有五處故曰五嶺據水經注五嶺大庾最東為第一嶺在揚域餘皆屬荆第二騎田嶺在郴州南即黃岑山亦名黃箱山今謂之臘嶺郴水所出髙千餘大南接廣東陽山縣界北寒南燠氣候頓殊第三都龎嶺在衡州府藍山縣南亦稱都龎嶠即黃檗山龎音龍水經注作部龍南接廣東連州界鄧德明謂都龎在九真大謬第四萌渚嶺在永州府江華縣南亦稱萌渚嶠即古臨賀嶺又名白芒嶺今名桂嶺髙三千餘丈南接廣西平樂府賀富川二縣界第五越城嶺在桂林府興安縣北五嶺之最西嶺也亦稱越城嶠又名始安嶠嶺北一百三十里接寶慶府城步縣界經曰衡陽未知所極然酈氏有言古人云五嶺者天地以隔內外見水經溫水注韓退之曰衡之南八九百里地益髙山益峻水清而益駛其最髙而橫絶南北者嶺中州清淑之氣于是焉窮藉此表界差為近理耳荆之東界準揚約略言之蓋自麻城黃岡踰江而南為武昌縣又西南為通山咸寧崇陽通城又南為瀏陽醴陵攸縣茶陵又東南為興寧桂東桂陽又西南為宜章皆揚分界處也荆之西界經無可見今據戰國時巴楚分地約略言之蓋自巴東踰江而南為建始施州麻陽沅州又東南為黔陽靖州通道以訖於興安與貴州廣西接界江漢朝宗于海錐指傳曰二水經此州而入海渭案揚之三江入海無壅故禹於此州疏江決漢至大别合流雖去海尚逺而有朝宗之勢説者謂紀此以該彼非也江水自四川夔州府雲安縣東流經奉節巫山又東出巫峽至巴東縣入荆域又東經歸州夷陵宜都枝江松滋江陵公安澧州華容至安鄉會洞庭之水又東經巴陵沔陽臨湘嘉魚又東北至江夏西與漢陽分界漢水從西北來注之漢水自襄陽府宜城縣南流入荆域又南經鍾祥荆門又東南經潛江景陵沔陽又東經漢川又南至漢陽與江水會又東歷武昌大冶至興國其北岸為黃州府之麻城與揚接界此禹在荆時所治也九江孔殷錐指孔傳云江于此州分為九道正義曰傳以江是此水大名謂大江分而為九猶大河分為九河也潯陽記有九江之名雖名起近代義或當然陸氏釋文曰九江潯陽地記云一曰烏白江二曰蚌江三曰烏江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江張須元緣江圖云一曰三里江二曰五州江三曰嘉靡江四曰烏土江五曰白蚌江六曰白烏江七曰箘江八曰沙提江九曰廪江參差隨水長短或百里或五十里始于鄂陵終于江口會于桑落州太康地記曰九江劉歆以為湖漢九水入彭蠡澤也渭案秦始皇滅楚以其都夀春置九江郡太史公曰余南登廬山觀禹疏九江淮南子曰禹鑿江而通九路地理志廬江潯陽縣下云禹貢九江在南皆東合為大江王莽改豫章曰九江郡柴桑縣曰九江亭應劭曰江自潯陽分為九郭璞江賦曰流九派乎尋陽自西漢以迄東晉皆言大江至潯陽分為九江禹之所疏鑿而潯陽記緣江圖又備列其名元和志云江州潯陽郡禹貢揚荆二州之境揚州云彭蠡既豬今州南五十二里彭蠡湖是也荆州云九江孔殷今州西北二十五里九江是也彭蠡以東為揚州界九江以西為荆州界此亦遵舊説九江孔鄭異義而不言其處所諸家皆謂在潯陽其以洞庭為九江者自宋初胡旦始而朝以道曽彥和皆從之朱子九江辨曰九江若曰派别為九則江流上下洲渚不一今所計以為九者若必首尾短長均布如一則橫斷一節從别為九一水之間當有一洲九江之間沙水相間乃為十有七道于地將無所容若曰參差取之不必齊一則又不知斷自何許而數其九也況洲渚出沒其勢不常江陵先有九十九洲後乃復生一洲是豈可以為地理之定名乎此不可通之妄説也若曰旁計橫入小江之數則自岷山以東入于海處不知其當為幾千百江矣此又不可通之妄説也且經文言九江孔殷正以見其吐吞壯盛浩無津涯之勢決非尋常分派小江之可當又繼此而後及夫沱潛雲夢則又見其決非今日江州甚逺之下流此又可以證前二説者為不可通之妄説也九江即洞庭既有山水二經為根據而又得朱子此辨其不在尋陽亦明矣曽氏説九江一曰沅二曰漸三曰無四曰辰五曰敘六曰酉七曰湘八曰資九曰澧朱子考定九江去無澧二水而易以瀟蒸一曰瀟江二曰湘江三曰蒸江四曰澬江五曰沅江六曰漸江七曰敘江八曰辰江九曰酉江案朱子據導江文江先合澧而後過九江故不數澧然澧實會南江以東注洞庭非上流自入江也安得而不數無字誤作元朱子以為亡是水故置之古無瀟水酈道元云瀟者水清深也湘中記曰湘川清照五六丈下見底石如摴蒲是納瀟湘之名矣然則瀟湘猶言清湘非别有瀟源隋唐以後始謂瀟水出九疑山北合湘水是曰瀟湘耳武陵零陵長沙之水皆入沅湘如蒸水者頗多金吉甫云郴水亦入湘舊不列九江未知與漸敘二水大小若何然則朱子所更定亦未有以見其為必然也善乎林少頴之言曰九江之名與其地世久逺不可強通然各自别源而下流入江則可以意曉也斯真通人之見傳同叔云九江不必求其有九如太湖一湖而得名五湖昭餘祁一澤而得名九澤皆不可以數求也此説本程泰之恐又不然當時必實有九水會同故以為名但水道通塞離合古今不常自戰國時唯有湘沅資微澧而名之五渚矣況後世乎與其出此入彼不若闕疑之為得耳王氏鳴盛曰宋儒所據以辨尋陽之九江者其一則水經云江水東至長沙下雋縣北澧水沅水資水合東流注之酈道元云凡此諸水皆注于洞庭之陂然據桑酈説不足九數彥和乃益以漸無辰敘酉湘無論雜湊杜撰且道元明云是乃湘水非江川也是湘又為澧沅資等之經流今欲成九數強之使與齊列朱子又去無澧二水易以瀟蒸澧乃水經所有因與經又東至于澧過九江之文不合遂為刪去無水因其字可疑亦并遭刪至于古無瀟水瀟湘猶言清湘而蒸水金吉甫亦疑之九峰又去瀟蒸益以澧元遍檢羣書别無元水漢志武陵無陽縣無水首受故苴蘭南入沅或有作潕潕者當因無轉為旡旡轉為元是宋儒所説彼一九江此一九江迄無定論林少頴傅同叔程泰之則儱侗泛指不列九名朏明遂謂不若闕疑之為得夫因九江之無考欲舉而歸之洞庭因洞庭之九水不可定遂欲舉而歸之闕疑何如仍用注疏之為安也其一則山海經云洞庭之山帝之二女居之是常遊于江淵澧沅之風交瀟湘之淵是在九江之間似可引據然郭景純傳引地理志九江今在尋陽南江自尋陽而分為九皆東會于大江書曰九江孔殷是也景純江賦云流九派于尋陽正指此則安知所謂九江者非神女出遊所至之地而遽違景純舊説乎又彥和引楚地記巴陵瀟湘之淵在九江之間遍檢隋經籍唐藝文及鄭氏藝文略地理門如豫章記尋陽記九江新舊録洞庭譜巴陵古今記等書無不備載獨無所謂楚地記者特取山經之文隱其名别撰楚地記之目而又妄加巴陵二字耳朏明未審疑楚地記本之山經者非也是則彥和等説之所據細為紬繹皆成子虛亡是又何足依據哉導江文云過九江至于東陵案漢志廬江郡金蘭西北有東陵鄉淮當作灌水出水經江水又東徑西陵縣故城南括地志西陵故城在黃州黃岡山西二里酈注史記秦昭王遣白起伐楚取西陵者也下云又東過蘄春縣南又東過下雉縣北刋水從東陵西南注之酈注水出廬江郡東陵鄉江夏有西陵縣故是言東矣尚書云江水過九江至于東陵者也又云灌水導源廬江金蘭縣西北東陵鄉大蘇山禇先生所謂神龜出于江灌之間書九江納錫大龜謂此廬江郡常嵗生龜長尺二寸者二十枚輸太卜官朏明以蓼縣在光州固始北灌水出金蘭西北東陵鄉東北至蓼縣入決水則金蘭在固始西南直黃梅之北其説頗精乃欲從宋儒説復以三事折之東陵去江太逺一非也江自巴陵至沙羡即迤北使東陵在金蘭則是先迤北而後至東陵二非也江漢朝宗盡之矣復出九江孔殷不亦贅乎三非也案溯源而論以黃梅西北推之似東陵去江本逺然江過下雉北而刋水即從東陵西南注江則去江固不甚逺也至古人書法原無一定先言至東陵而後總之以迤北先言朝宗而繼言九江孔殷無所不可若先言入海而其下復言洞庭不更顛倒乎朏明又以九江即春秋江南之夢而下云雲土夢作乂不更復疊乎是可知廬江東陵與江夏西陵相為東西亦確有可據矣彥和云巴陵與夷陵相為東西夷陵亦曰西陵則巴陵為東陵可知案巴陵為東陵此言經史所無固不足辨況巴陵之名晉太康元年所立而沈休文宋書州郡志云夷陵漢舊縣吳改曰西陵則禹時尚不知後世有西陵巴陵之名而以此證巴陵即東陵可乎蕙田案九江有三説一以為在尋陽一以為湖漢九水一以為洞庭湖主湖漢者始於劉歆而太康地記引之夫湖漢受鄱餘修淦盱蜀南彭八水由彭蠡以入江與江之經流本不相涉且經云過九江而後云東迤北會于滙如歆所云則九江即滙矣其非禹貢之九江不待辨也主尋陽者出于漢書地理志自唐以前儒者皆從之主洞庭者出于胡旦朝説之曽􅌈而朱子蔡傳皆用其説胡朏明亦篤信之兩説相持迄無定論今以經文證之經云江漢朝宗于海九江孔殷江漢合而東流至尋陽始别為九經所云朝宗者荆江之上流所云孔殷者荆江之下流而後云沱潛既道則江漢之支流也先後次第經文歷歷不紊若洞庭又在漢口之上遊不得先云朝宗後云孔殷也經云九江納錫大龜通典云廣濟縣蔡山出大龜書云九江納錫即此禇先生亦云神龜出于江灌之間灌水出東陵鄉而南距大江故云江灌之間而洞庭不聞有之也經云過九江至于敷淺原漢志以豫章歷陵縣之傅陽山當之胡朏明引孫放廬山賦臨彭蠡之澤接平敞之原以為即廬山東南之麓瀕于彭蠡澤者其地與尋陽不逺亦當為尋陽之九江也經云過九江至于東陵考水經江水東徑下雉縣北刋水從東陵西南注之酈注云江夏有西陵縣故是言東矣尚書過九江至于東陵者也漢西陵縣在今黃州府蘄州西下雉縣在今武昌府興國州東然則東陵直蘄州之東當在今廣濟縣境而與隔江興國州東境南北相直也漢書地理志廬江郡金蘭西北有東陵鄉淮當作灌水出水經注灌水導源廬江金蘭縣西北東陵鄉大蘇山金蘭故縣今雖無考然東陵在蘄州之東而金蘭又在其東南其地當近黃梅去東陵不逺也胡朏明以金蘭在固始西南既屬臆測而又謂金蘭之東陵去江六百餘里不更誣乎宋儒主洞庭者以東陵為巴陵然巴陵之名古所未有指為東陵更屬附會且經云又東至于澧過九江澧水東注洞庭為九水之一而又别云九江不已復疊乎至于九江之名尋陽記緣江圖所載不同大率起于後代固未可盡信然緣江圖云始于鄂陵終于江口會于桑落洲鄂陵今武昌縣武昌縣非武昌府治桑落洲今在九江府城東北是則今之武昌縣以東九江以西皆古九江故道矣淮南子禹鑿江而通九路説苑禹鑿江而通九派太史公曰余登廬山觀禹疏九江而孔安國亦云江于此州分為九道在漢以前九江故道尚存故言之鑿鑿如此夫大江分而為九猶大河分為九河也九河九江其故道俱無存者論者不以疑九河而獨疑九江之難信何哉宋儒主洞庭者以山水二經為根據水經云九江地在長沙下雋縣西北東陵地在廬江金蘭縣西北今武昌府蒲圻通城二縣漢下雋縣地洞庭湖乃在其西南不得云西北也至于東陵則又不從水經而别以巴陵當之然巴陵在下雋之上遊即以東陵為巴陵當先云東陵而後云九江矣山海經之文説經者所不道其云澧沅之風交瀟湘之淵是在九江之間郭景純注云九江今在尋陽南又引禹貢九江孔殷以證之則郭亦不以洞庭為九江矣山經又云湘水出舜葬東南陬入洞庭下沅水入下雋西合洞庭中則洞庭自洞庭九江自九江在山海經亦未嘗合而為一也然則宋儒所據二經之文又惡足信哉總之以九江為洞庭於古既無可據又與導江之文不合自當從古注疏以在尋陽者為是或疑尋陽為揚州之境不屬荆州案元和志云江州尋陽郡禹貢揚荆二州之境彭蠡以東為揚州界九江以西為荆州界則二州分界固自截然況漢之尋陽本在江北蘄春郡界而九江之分始於鄂陵尚在尋陽以西其在荆州之境明甚又何疑焉胡朏明錐指于水道極為精核獨此一條尚有遺議今備載諸説復為辨正如右後之言九江者庶有考云沱潛既道錐指傳云沱江别名正義曰導江言東别為沱是沱為江之别名也釋水云水自江出為沱漢出為潛渭案詩召南曰江有沱荆州之沱也一在江北寰宇記江自枝江縣百里洲首派别北為內江者是一在江南水經注夷水出魚復縣江至夷道縣北東入江者是潛水或云在今安陸府鍾祥潛江二縣境然漢東之地津渠交通未知孰為古潛水黃文叔云自後世通渠漢川雲夢之際禹迹固多湮沒誠然水經注江水自夷道縣北今宜都縣西有夷道故城又東徑上明城北晉荆州刺史桓沖築此城移州治焉在今松滋縣界江汜枝分東入大江縣治洲上故以枝江為稱今枝江縣東北六十里有百里洲延袤百里與江陵分轄枝江故城在縣東地理志曰江沱出西南東入江是也志無南字疑此衍江水又東會沮口又南徑江陵縣南縣江有洲號曰枚回洲洲在縣西南六十里枚或作枝江水自此兩分而為南北江寰宇記云百里洲首派别南為外江北為內江王晦叔云枝江縣百里洲夾江沱二水之間其與江分處謂之上沱與江合處謂之下沱渭案南江在古時為岷江之經流北江為沱南江自枝江縣南又東徑公安縣西又東南流為涔水隋志松滋縣有涔水蓋東與公安接界九歌望涔陽兮極浦橫大江兮揚靈王逸注云涔陽江崎名附近郢即此水之北也涔水入澧州界為四水口歷州之東北又東南合澧水經華容縣南入赤沙湖又東南徑安鄉縣西而東南入洞庭湖與北江會此即禹導江東至于澧過九江至于東陵之道也北江自枝江縣北又東徑松滋縣北又東徑江陵縣南又東徑公安縣北又東徑石首縣北又東徑監利縣南夏水出焉北江又東至巴陵縣西北會洞庭之水此即江北之沱寰宇記所謂內江者也其後北江之流漸盛而南江日微世反以南為沱北為江説者遂謂東至于澧不可解以澧水北去江二百餘里故也地理今釋荆州之沱有二説漢書地理志云南郡枝江縣今屬湖廣荆州府江沱出西東入江顔師古曰沱即江别出者也水經江水東徑上明城北注云其地夷敞北據大江之汜枝分東入大江縣治洲上故以枝江為稱是古枝江縣有沱水也今不可考又孔穎達正義引鄭注云華容有夏水首出江尾入沔此所謂沱也夏水自今荆州府江陵縣東南首受江水曰中夏口經監利縣沔陽州界入漢水以其冬竭夏流故名夏水其在梁州者則今四川成都府郫縣沱江是江在縣北六里一名郫江至瀘州入大江其上流為成都府灌縣蔡傳所謂永康軍導江縣也潛水一在今安陸府潛江縣東由蘆洑腦分流繞城東南一支通順河入沔陽州境今淤一支南流至拖船埠入漢水此荆州之潛也禹貢錐指曰韻會潛水伏流也荆州之潛雖不如龍門石穴之竒亦必漢水伏流從平地涌出故謂之潛今漢水之分流者名蘆洑宜取伏流之意以為古潛水庶幾得之蓋禹時本自伏流涌出復入于漢及乎後世通渠漢川雲夢之際則開通上源以資舟楫之利禹迹遂不可知耳一在今四川保寧府廣元縣亦名龍門水自朝天驛北穿穴而出入嘉陵江此梁州之潛也郭璞爾雅音義云有水從漢中沔陽縣南流至梓潼漢夀入大穴中通洞山下西南潛出一名沔水舊俗云即禹貢潛也又四川順慶府渠縣東有潛水渠縣蔡傳所謂渠州流江縣也雲土夢作乂錐指傳曰雲夢之澤其中有平土丘水去可為耕作畎畝之治正義曰此澤既大其內平土有髙丘也渭案雲土夢漢書作雲夢土史記水經注並作雲土夢沈括筆談云石經倒土夢字唐太宗得古本尚書乃雲土夢作乂詔改從古本雲夢澤名也古八九百里之中有澤有湖有土而江沱潛漢亦灌注于其間職方主藪澤禹貢主土田雲夢經傳諸書有合稱者有單稱者周禮荆州藪澤曰雲夢爾雅十藪楚有雲夢吕覽淮南子同戰國䇿楚王遊於雲夢結駟千乘宋玉髙唐賦曰楚襄王與宋玉遊於雲夢之臺司馬相如子虛賦曰雲夢者方八九百里此合稱雲夢者也左傳定四年楚子涉睢濟江入于雲中此單稱雲者也宣四年鄖夫人棄子文于夢中昭三年楚子以鄭伯田江南之夢宋玉招魂曰與玉趨夢兮課後先此單稱夢者也單稱特省文耳雲可該夢夢亦可該雲故杜元凱注夢中云夢澤名江夏安陸縣東南有雲夢城則夢在江北注雲中云入雲夢澤中所謂江南之夢則雲在江南注江南之夢云楚之雲夢跨江南北則南雲北夢單稱合稱無所不可絶無江北為雲江南為夢之説自唐太宗詔改此經為雲土夢作乂而頴達引左傳以為之説曰此澤亦有單稱雲單稱夢經之土字在二字之間蓋史文兼上下也司馬貞史記索隱亦云雲夢本二澤人以其相近或合稱雲夢宋沈括羅泌易祓郭思鄭樵洪邁洪興祖等襲其説而為之辨曰雲在江北夢在江南而古注棄若塵羹矣蘇子瞻申疏意云雲與夢二土名也而云雲土夢者古語如此猶曰元纎縞云爾此於文義頗不順故王氏更為之解曰雲之地土見而已夢之地則非特土見草木生之人有加功乂之者矣蔡氏云雲夢之澤地勢有髙卑故水落有先後人工有早晚也自後無不遵此説今案史記賈誼傳云長沙卑濕巴陵故長沙下雋地也諸湖萃其西南安得為特髙江北雖亦有湖澤然楚都及漢東諸國皆在焉豈反卑於江南此事理之難信者若從石經本則傳云澤中有土可以耕作義其愜當愚嘗反復于斯而覺太宗此一改殊多事不若仍舊之為得也地理今釋漢書地理志云南郡華容縣見前沱水注雲夢澤在南荆州藪編縣今安陸府荆門州有雲夢宫又江夏郡西陵縣今黃州府麻城縣有雲夢宫水經注云雲杜縣今安陸府京山縣東北有雲夢城又夏水東徑監利縣今屬荆州府南縣土卑下澤多陂陀西南自州陵今安陸府沔陽州東徑于雲杜沌陽今漢陽府漢陽縣為雲夢之藪杜預云枝江縣今屬荆州府安陸縣今屬德安府有雲夢蓋跨川亘隰兼包勢廣矣元和志云雲夢澤在安陸縣南五十里又云雲夢澤在雲夢縣今屬德安府西七里然則東抵蘄州西抵枝江京山以南青草以北皆為古之雲夢正義所謂雲夢一澤而每處有名者也胡氏渭曰荆州之建國春秋時可考者楚夔聃權鄖與鄖同州左傳桓十一年州蓼伐楚師杜注云州國在南郡華容縣東南今為監利縣地羅二軫凡九國戰國時屬楚而韓秦亦少得其地秦并天下置南郡黔中長沙南陽東境是漢復置荆州領郡國八後漢魏晉並因之晉領郡十九唐為山南東道之江陵荆州竟陵復富水郢齊安黃漢陽沔夷陵峽巴東歸等郡江南西道之江夏鄂巴陵嶽長沙潭衡陽衡零陵永江華道桂陽郴邵陽邵武陵朗澧陽澧等郡黔中道之黔中黔寧夷思涪川費盧溪辰盧陽錦靈溪溪潭陽巫清江施播川播夜郎珍義泉夷龍標業溱溪溱等郡又淮南道之安陸安義陽申及嶺南道之連山連等郡案以上通典所列連山郡當出𨽻古南越騎田嶺北為桂陽嶺南為連山連山亦古南越地不當入荆域黔中寧夷涪川播川夜郎義泉溱溪七郡皆梁南徼外蠻夷非古黔中地不在九州之限元和志云黔州本漢涪陵縣理晉永嘉後地沒蠻夷經二百五十六年至周保定四年涪陵蠻帥田恩鶴以地內附因置奉州建德三年改為黔州大業三年又改為黔安郡因周隋州郡之名遂與秦漢黔中地犬牙難辨其秦黔中郡所理在今辰州西二十里黔中故郡城是漢改黔中為武陵郡移理義陵即今辰州敘浦縣是後魏移治臨沅即今州是今辰錦敘奬溪澧朗施等州實秦漢黔中之地而今黔中及夷費思播隔越峻嶺東有沅江水及諸溪並合東注洞庭湖西有延江水一名涪陵江自牂柯北歷播費思黔等州北注岷江以山川言之巴郡之涪陵與黔中古地炳然分矣然則此五州及珍臻二州皆梁南徼外蠻夷亦敘瀘重夔之江南諸縣及遵義府是也其東有峻嶺為限荆不當越此而西斗入六七百里總因黔中名亂嶺東嶺西諸州混而為一道杜氏遂有此誤敘州即巫州奬州即業州也又有當來屬者豫域襄陽之南漳漢東之光化及南越始安郡全義縣嶺北之地是也全義今為興安縣屬廣西桂林府文獻通考云自荔浦以北為楚以南為越今靜江有中州清淑之氣荔浦相距才百餘里遂入瘴鄉是天所以限楚越也此蓋就當時風氣言之近志遂以桂林平樂二府為禹貢荆州之域恐未必然杜氏以始安平樂屬古南越為是唯全義縣嶺北之地當入荆域以今輿地言之湖廣武昌漢陽安陸荆州嶽州長沙衡州常德辰州寶慶永平十一府郴靖二州施州衛其襄陽府則唯南漳縣德安府則安陸雲夢孝感應城應山及隨州之南境廢光化縣地黃州府則黃岡麻城黃陂黃安四川則夔州府之建始廣西則桂林府之全州本漢零陵縣屬零陵郡隋改置湘源縣唐屬永州五代晉改曰清湘于縣置全州明省縣入又改屬桂林及興安縣嶺北之地縣在府東北一百二十里越城嶺在縣北三里皆古荆州域也右禹貢徐揚荆三州五禮通考卷二百二
