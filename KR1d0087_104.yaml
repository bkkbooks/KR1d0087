郊將升禋廟當告虔錫鑾戾止孝實奉先祀事斯舉有序無愆祗見祖考神意歡然皇帝升殿登歌夾鍾宫昌寧之曲皇皇天子升自阼階奠見祖禰肅然有懷百禮已洽八音克諧既昌且寧萬福沓來迎神宫縣來寧之曲黃鍾宫三奏大吕角二奏太簇徴二奏應鍾羽二奏詞同以實應天報本反始潔粢豐盛禮先肆祀風馬雲車神之弔矣來止來宜而燕翼子皇帝盥洗宫縣無射宫昌寧之曲有水于罍有巾于篚帨手拭爵圭衮有煒玄酒太羮德馨惟菲萬年昌寧皇皇負扆皇帝升階宫縣無射宫昌寧之曲降階同巍巍京師有嚴神宫聖主戾止多士雲從來享來獻肅肅其容將昭大報庸示推崇司徒捧爼宫縣無射宫豐寧之曲陳其犧牲惟純與精苾芬孝思於昭克誠不疾瘯蠡或剝或烹洋洋在上以交神明始祖酌獻宫縣大元之曲猗歟初基兆我王迹其命維新貽謀丕赫綿綿瓜瓞國步日闢堂構之成焜煌今昔獻祖大昭之曲以聖繼興成王之孚民從其化咸奠攸居清廟觀德猗歟偉歟金石備樂以奉神娛昭祖大成之曲東夷不庭皇祖震怒神武削平貽厥聖緒猶室有基垣墉乃樹億萬斯年天保孔固景祖大昌之曲於皇藝祖其智如神修法施令百度維新疆宇日廣海隅咸賓功髙德厚耀耀震震世祖大武之曲於皇先王昭假于天長駕逺馭麾斥無前王業猶生孫謀有傳圎壇展禮敢先告虔肅宗大明之曲猗歟前人簡惠照融相我世祖成兹伐功敷佑來葉帝圗其隆將修熙事先欵神宫穆宗大章之曲仁慈忠信惟祖之休功光岐下迹掩商邱言瞻清廟懷想前修神其來格歆兹庶羞康宗大康之曲猗歟前王惠我無疆儀刑典法日靖四方永言孝思於乎不忘昭告大祀祗率舊章太祖大定之曲天生聰明俾乂蒸人惟此二國為我毆民撻彼威武萬邦咸賓明昭大報推而配神太宗大惠之曲維清緝熙於昭明德我其牧之駿奔萬國南郊肇修大典增飾清廟吉蠲純禧申錫睿宗大和之曲維時祖功肇開神基昭哉聖考其德增輝上動天監明命攸歸謀貽翼子無疆之辭文舞退武舞進宫縣肅寧之曲先皇開基比迹殷湯功加天下武德彌光容舞象成干戈戚揚於昭報本懷哉不忘亞終獻宫縣肅寧之曲於皇宗祊朝獻維時芬芬酒醴棣棣威儀誠則有餘神之格思神孫千億神其相之皇帝飲福登歌夾鍾福寧之曲皇皇穆穆丕承丕基躬親于禋載肅載祇對越在天神歆其誠于以飲酒如川之增徹豆登歌夾鍾宫豐寧之曲物維其時既豐且旨苾苾德馨或將或肆神之居歆洽于百禮於萬斯年穰穰介祉送神宫縣黃鍾宫來寧之曲濟濟多儀皇皇雅奏獻終反爵薦餘徹豆神監昭回有秩斯祜無疆之福神錫厥後世宗本紀大定二十六年十一月甲辰朔定閔宗陵廟薦享禮禮志大定二十六年以內外祖廟不同定擬太廟每嵗五享山陵朔望忌辰及節底祭奠並依前代典故外衍慶宮自來車駕行幸遇祖宗忌辰百官行禮并諸京祖節辰忌辰朔望拜奠雖無典故參酌擬合依舊以盡崇奉之意從之章宗承安四年七月朝獻于衍慶宫章宗本紀太和元年十二月敕改原廟春秋祭祀稱朝獻二年正月乙卯朝獻于衍慶宫五月初薦新于太廟七月乙卯朝獻于衍慶宫三年正月丁丑朝獻于衍慶宫六年七月甲申朝獻于衍慶宫七年正月甲申朝獻于衍慶宫七月庚辰朝獻于衍慶宫八年正月壬申朝獻于衍慶宫七月乙巳朝獻于衍慶宫宣宗本紀貞祐二年正月以邊事未息有司奏請權止今年朝獻原廟從之三年九月癸酉朝謁世祖太祖御容於啓慶宫行獻享禮始用樂甲戌朝謁太宗熙宗睿宗御容行獻享禮興定元年六月乙卯顯宗忌日謁奠於啓慶宫八月太祖忌日謁奠於啓慶宫二年七月以旱災享太廟四年十二月庚辰臘享于太廟五年正月丁亥世宗忌日謁奠于啓慶宫哀宗本紀正大三年四月辛卯親享於太廟禮志時享有司行事前期太常寺舉申禮部關學士院司天臺擇日以其日報太常寺前七日受誓戒於尚書省其日質明禮直官設版位於都堂之下依己定誓戒圗禮直官引三獻官并應行事執事官等各就位立定贊揖在位官皆對揖訖禮直官以誓文奉初獻官初獻官搢笏讀誓文某月某日孟春薦享太廟各揚其職不恭其事國有常刑讀訖執笏七品以下官先退餘官對拜訖乃退散齋四日治事如故宿於正寢惟不弔喪問疾作樂判署刑殺文字決罰罪人及預穢惡致齋三日於本司惟享事得行其餘悉禁一日於享所已齋而缺者通攝行事前三日兵部量設兵衛列於廟之四門前一日禁斷行人儀鑾司設饌幔十一所於南神門外西南向又設七祀司命戶二位于橫街之北道西東向又設羣官齋宿次於廟門之東西舍前二日太樂局設登歌之樂於殿上太廟令帥其屬掃除廟殿門之內外於室內鋪設神位於北牖下當尸南向設几于筵上又設三獻官拜褥位二一在室內一在室外學士院定撰祝文訖計會通進司請御署降付禮部置于祝案祠祭局濯滌祭器與尊彛訖鋪設如儀內太尊二山罍二在室犧尊五象尊五鳥彛一雞彛一在室戶外之左爐炭稍前著尊二犧尊二在殿上象尊二壺尊六在下俱北向西上加冪皆設而不酌并設獻官罍洗位禮部設祝案于室戶外之右禮直官設版位并省牲位如式前一日諸太祝與廪犧令以牲就東神門外司尊彛與禮直官及執事皆入升自西階以俟禮直官引太常卿贊者引御史自西階升遍視滌濯執尊者舉冪告潔訖引降就省牲位廪犧令稍前曰請省牲退復位太常卿省牲廪犧令及太祝巡牲告修皆如郊社儀既畢太祝與廪牲令以次牽牲詣厨授大官令贊者引光祿卿詣厨請省鼎鑊申視滌溉贊者引御史詣厨省饌俱訖與太常卿等各還齋所太官令帥宰人以鸞刀割牲祝史各取毛血每室共實一豆又取肝膋共實一豆置饌所遂烹牲光祿卿帥其屬入實祭器良醖令入實尊彛享日質明百官各服其品服禮直官贊者先引御史博士太廟令太官令諸太祝祝史司尊彛與執罍篚官等入自南門當階間北向西上立定奉禮曰再拜贊者承傳皆再拜訖贊者引太祝與宫闈令升自西階詣始祖室開祏室太祝捧出帝主宫闈令捧出后主置于座帝主在西后主在東贊者引太祝與宫闈令降自西階俱復位奉禮曰再拜贊者承傳在位官皆再拜訖俱各就執事位大樂令帥工人入禮直官贊者分引三獻官與百官俱自南東偏門入至廟庭橫街上三獻官當中北向西上應行事執事官并百官依品重行立奉禮曰拜贊者承傳應北向在位官皆再拜其先拜者不拜拜訖贊者引三獻官詣廟殿東階下西向立其餘行事執事官與百官俱各就位訖禮官詣初獻官前請行事協律郎跪俯伏興樂作禮直官引初獻詣盥洗位北向立定樂止搢笏盥手帨手執笏詣爵洗位北向立搢笏洗瓚拭瓚以瓚授執事者執笏升殿樂作至始祖室尊彛所西向立樂止執事者以瓚奉初獻官獻官搢笏執瓚執尊者舉冪大官令酌鬱鬯訖初獻以瓚授執事者執笏詣始祖室神位前樂作北向立搢笏跪執事者以瓚授初獻官初獻官執瓚以鬯祼地訖以瓚授執事者執笏俯伏興出户外北向再拜訖樂止每室行禮並如上儀禮直官引初獻降復位初獻將升祼祝史各奉毛血肝膋豆及齋郎奉爐炭蕭蒿黍稷篚各於饌幔內以俟初獻晨祼訖以次入自正門升自太階諸太祝皆迎毛血膋肝豆於階上俱入奠于神座前齋郎所奉爐炭蕭蒿篚皆置于室户外之左與祝史俱降自西階以出諸太祝取肝膋洗于鬱鬯燔於爐炭訖還尊所享日有司設羊鼎十一豕鼎十一於神厨各在鑊右初獻既升祼光祿卿帥齋郎詣厨以匕升羊於鑊實於一鼎肩臂臑肫胳正脊一橫脊一長脅一短脅一代脅一皆二骨以並次升豕如羊實于一鼎每室羊豕各一鼎皆設扃冪齋郎對舉入鑊放饌幔前齋郎抽扄委于鼎右除冪光祿卿帥大官令以匕升羊載于一俎肩臂臑在上端肫胳在下端脊脅在中次升豕如羊各載于一俎每室羊豕各一俎齋郎即以扄舉鼎先退置於神厨訖復還饌幔所禮直官引司徒出詣饌幔前以俟光祿卿帥其屬實籩以粉餈實豆以糝食實簠以粱實簋以稷俟初獻祼畢復位祝史俱進徹毛血之豆降自西階以出禮直官引司徒帥薦籩豆簠簋官奉俎齋郎各奉籩豆簠簋羊豕俎每室以序而進立于南神門之外以俟羊俎在前豕俎次之籩豆簠簋又次之入自正門樂作升自太階諸太祝迎引於階上樂止各設于神位前訖禮直官引司徒以下降自西階樂作復位樂止諸太祝各取蕭蒿黍稷擩於脂燔於爐炭還尊所禮直官引初獻詣罍洗位樂作至位北向立樂止搢笏盥手帨手執笏詣爵洗位北向立搢笏洗爵拭爵以爵授執事者執笏升殿樂作詣始祖室酌尊所西向立樂止執事者以爵授初獻初獻搢笏執爵執事者舉冪大官令酌犧尊之泛齊訖次詣第二室酌尊所如上儀詣始祖神位前樂作北向立搢笏跪執事者以爵授初獻初獻執爵三祭酒于茅苴奠爵執笏俯伏興出室戶外北向立樂止贊者引太祝詣室户外東向搢笏跪讀祝文讀訖執笏興次詣第二室次詣每室行禮並如上儀初獻降階樂作復位樂止禮直官引亞獻詣盥洗位北向立搢笏盥手帨手執笏詣爵洗位北向立搢笏洗爵拭爵以授執事官執笏升殿詣始祖酌尊所西向立執事者以爵授亞獻亞獻搢笏執爵執尊者舉冪大官令酌象尊之醴齊訖次詣第二室酌尊所如上儀詣始祖神位前樂作北向立搢笏跪執事者以爵授亞獻亞獻執爵三祭酒於茅苴奠爵執笏俯伏興出户外北向再拜訖樂止次詣每室行禮並如上儀降階樂作復位樂止禮直官次引終獻詣盥洗及升殿行禮並如亞獻之儀降復位次引太祝徹籩豆少移故處樂作卒徹樂止俱復位禮直官曰賜胙贊者承傳曰賜胙再拜在位者皆再拜禮直官引太祝宫闈令奉神主太祝搢笏納帝主於匱奉入祏室執笏退復位次引宫闈令納后主於匱奉入祏室並如上儀禮直官贊者引行事執事官各就位奉禮曰再拜贊者承傳應在位官皆再拜禮直官贊者引百官次出大樂令帥工人次出大官令帥其屬徹禮饌次引監祭御史詣殿監視卒徹訖還齋所太廟令闔户以降太常藏祝版于匱光祿以胙奉進監祭御史就位展視光祿卿望闕再拜乃退其七祀春户夏竈中霤秋門冬井鋪設祭器入實酒饌俟終獻將升獻獻官行禮并讀祝文及每嵗四孟月臘五享並如上儀樂志時享攝事登歌樂章初獻盥洗無射宫肅寧之曲酌彼行潦維挹其清潔齊以祀祀事昭明顯允辟公沃盥乃升神之至止歆于克誠初獻升殿夾鍾宫嘉寧之曲餘同親祀惟不用宫縣濟濟在庭祗薦有序雍容令儀旋規折矩爰徂于基鳴佩接武敬恭神明來寧來處右金廟享五禮通考卷九十四
