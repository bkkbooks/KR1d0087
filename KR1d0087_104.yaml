body:
  text: 五禮通考卷九十四刑部尚書秦蕙田撰吉禮九十四宗廟時享遼史太宗本紀天顯元年冬十一月壬戌即皇帝位癸亥謁太祖廟禮志謁廟儀至日昧爽南北臣僚各具朝服赴廟車駕至臣僚於門外依位序立望駕鞠躬班首不出班奏聖躬萬福舍人贊各祇候畢皇帝降車分引南北臣僚左右入至丹墀褥位合班定皇帝升露臺褥位宣徽贊皇帝再拜殿上下臣僚陪位皆再拜上香畢退復位再拜分引臣僚左右上殿位立進御容酒依常禮若即退再拜舍人贊好去引退禮畢太宗本紀天顯三年七月庚午有事于太廟十月己酉謁太祖廟四年四月壬子謁太祖廟八月辛丑至自涼陘謁太祖廟己酉謁太祖廟五年四月乙未詔人皇王先赴祖陵謁太廟五月乙酉謁太廟丁巳拜太祖御容於明殿七月戊子薦時果于太祖廟九月丁亥至自九層臺謁太祖廟十一年四月戊辰謁太祖廟穆宗本紀應厯五年十月丁亥謁太宗廟十二月乙丑朔謁太祖廟景宗本紀保寧十年七月庚戌享太祖廟聖宗本紀統和元年四月庚寅謁太祖廟壬寅致享于凝神殿九月庚申謁宣簡皇帝廟四年十一月戊寅日南至上率羣臣祭酒景宗御容太平元年十一月庚申幸通天觀翌日再幸還升玉輅自內三門入萬夀殿奠酒七廟御容道宗本紀清寧元年十一月壬申有事于太宗穆宗廟戊寅冬至有事于太祖景宗興宗廟不受羣臣賀三年十月庚申謁讓國皇帝及世宗廟太康七年六月甲子詔月祭觀德殿嵗寒食諸帝在時生辰及忌日詣景宗御容殿致奠天祚帝本紀天慶二年十一月丁卯謁太祖廟蕙田案遼諸帝于宗廟有新必薦有事必告有祭必親奉先思孝于是在矣又令羣臣勿賀何其卓也較之宋朝之煩穢瀆數奚啻徑庭禮制所係于興衰巨矣右遼廟享金史熙宗本紀天眷元年四月壬午朝享于天元殿十一月丙辰以康宗以上畫像工畢奠獻于天元殿天眷三年九月己酉親饗太祖廟皇統元年正月庚戌羣臣上尊號癸丑謝太廟海陵本紀正隆二年二月辛丑初定太廟時享牲牢禮儀世宗本紀大定三年十月甲子大享于太廟禮志大定三年有司言每嵗太廟五享若復薦新似涉繁數擬遇時享之月以所薦物附于籩豆薦之以合古者祭不欲數之義制可世宗本紀大定六年三月戊辰至西京庚午朝謁太祖廟九月至自西京十月甲申朝享于太廟禮志皇帝恭謝儀大定七年正月世宗受尊號禮畢恭謝前三日太廟令率其屬灑掃廟庭之內外及陳設尚舍于廟南門之西設饌幔一十一室殿中監帥尚舍視大次殿又設皇帝拜位于始祖神位前北向又設飲福位于版位西南少郤又設隨室奠拜褥位于神座前大樂令設登歌于殿上宫縣于殿下又設皇太子位于阼階東南又設親王位于其南稍東宗室王使相位于其後又設太尉司徒以下行事官位于殿西階之西東向每等異位又設文武羣官位于橫階之南東西向又設御洗位于阼階之東又設太尉洗位于阼階下橫階之南又設齋郎位于東班羣官之後又設盥洗等官并奉禮贊者大司樂協律郎大樂令等位各如祫享之儀又設尊彛祭器等於殿之上下如時享之儀前一日禮官御史帥其屬省牲視濯滌如常儀其日質明禮官御史帥太廟官太祝官宫闈令出神主如時享儀有司列黃麾仗二千人於應天門外尚輦進金輅于應天門內午後三刻宣徽院奏請皇帝赴齋宿殿文武羣官並齊宿于所司次日質明俟諸衛各勒所部屯門列仗導駕官分左右侍立于殿階下並朝服通事舍人引侍中詣齋殿俯伏跪稱臣某言請中嚴俯伏興凡侍中奏請準此皇帝服通天冠絳紗袍少頃侍中奏外辦皇帝出齋殿即御座羣官起居訖侍中奏請升輦皇帝升輦以出侍衛警蹕如常儀導駕官前導至應天門侍中奏請降輦升輅皇帝升輅門下侍郎俯伏跪奏請車駕進發俯伏興凡門下侍郎奏請準此車駕動警蹕如常儀至應天門外門下侍郎奏請車駕少駐敕侍臣上馬侍中前承旨退稱曰制可門下侍郎退傳制稱侍臣上馬通事舍人承傳敕侍臣上馬導駕官分左右前導門下侍郎奏請車駕進發車駕動稱警蹕不鳴鼓吹典贊儀引皇太子常服乘馬至廟中幕次更服逺遊冠朱明衣執圭通事舍人文武羣官並朝服于廟門外班迎車駕至廟門侍中于輅前奏請降輅導駕官步入廟門稍東侍中奏請升輦皇帝升輦繖扇侍衛如常儀至大次侍中奏請降輦入就大次皇帝入大次通事舍人分引文武羣官由南神東西偏門入廟庭東西相向立禮直官引太尉以下行事官詣橫街北向再拜訖禮直官引太尉詣盥洗位搢笏盥手帨手執笏詣爵位洗北向立搢笏洗瓚拭瓚以瓚授執事者執笏由西階升殿詣始祖尊彛所西向立執事者以瓚奉太尉太尉搢笏執瓚酌鬯詣神位前以鬯祼地訖以虛瓚授執事者執笏俯伏興出户外北向再拜訖次詣隨室並如上儀禮畢降自西階復位禮直官引司徒出詣饌所引薦俎齋郎奉俎并薦籩豆簠簋官奉籩豆簠簋及太官令以序入自正門宫懸樂作至太階樂止諸太祝迎于階上各設于神座前先薦牛次薦羊次薦豕訖禮直官引司徒以下降階復位典贊儀引皇太子通事舍人引親王由南神東偏門入詣褥位禮直官引中書侍郎舉册官等升自西階詣始祖室前東西立通事舍人引侍中詣大次前奏請中嚴皇帝服衮冕少頃侍中奏外辦侍中詣廟庭本位立皇帝將出大次禮儀使與太常卿贊導凡禮儀使與太常卿贊導並博士前引俯伏跪稱臣某贊導皇帝行禮俯伏興前導至東神門撤繖扇近侍者從入殿中監跪進鎮圭禮儀使奏請執圭皇帝執圭宫縣樂作奏請詣罍洗位至位樂止內侍跪取匜興沃水又內侍跪取槃承水時寒預備溫水禮儀使奏請搢鎮圭皇帝搢鎮圭盥手內侍跪取巾於篚興進皇帝洗手訖奉爵官以爵跪進皇帝受爵內侍捧匜沃水又內侍跪捧槃承水皇帝洗爵訖內侍跪奉巾以進皇帝拭爵訖內侍奠槃匜又奠巾於篚奉爵官受爵禮儀使奏請執鎮圭前導皇帝升殿左右侍從量人數升宫縣樂作皇帝止阼階下樂止皇帝升自阼階登歌樂作禮儀使前導皇帝至版位樂止奏請再拜奉禮郎贊皇太子以下在位羣臣皆再拜贊者承傳皆再拜禮儀使前導皇帝詣始祖尊彛所樂作至尊所樂止奉爵官以爵涖尊執尊者舉冪侍中跪酌犧尊之泛齊訖禮儀使導皇帝至版位再拜訖禮儀使奏請詣始祖神位前褥位登歌樂作禮儀使奏請搢圭跪奉爵官以爵授奉爵酒官以進禮儀使奏請執爵皇帝執爵三奠酒訖以虛爵授奉爵酒官禮儀使奏請執圭俯伏興樂止奉爵酒官以爵授奉爵官禮儀使奏請詣隨室並如上儀禮直官先引司徒升自西階立于飲福位之側酌獻將畢奉胙酌福酒太祝從司徒立于其側酌獻畢侍中亦立于其側禮儀使奏請皇帝詣版位北向立登歌樂作至位樂止中書侍郎跪讀册訖舉册官奠訖禮儀使奏請皇帝再拜拜訖禮儀使奏請詣飲福位登歌樂作至位太祝酌福酒于爵時寒預備溫酒以奉侍中侍中受爵奉以立禮儀使奏請搢圭跪侍中以爵北向跪以進禮儀使奏請執爵三祭酒禮儀使奏請飲福飲福訖以虛爵授侍中禮儀使奏請受胙司徒跪以黍稷飰籩進皇帝受以授左右司徒又跪以胙肉進皇帝受以授左右禮儀使請執圭興再拜訖樂止禮儀使前𨗳皇帝還版位登歌樂作至位樂止太祝各進徹籩豆登歌樂作卒徹樂止奉禮曰賜胙贊皇太子以下在位羣官皆再拜贊者承傳皆再拜宫縣作一成止禮儀使奏請皇帝再拜奉禮郎贊皇太子已下在位官皆再拜拜訖禮儀使奏禮畢前導皇帝降阼階登歌樂作至階下樂止宫縣作前導皇帝出東神門樂止繖扇侍衛如常儀禮儀使奏請釋圭殿中監跪受鎮圭至大次轉仗衛于還途如來儀禮官御史帥其屬納神主藏册如儀少頃通事舍人引侍中奏請中嚴皇帝服通天冠絳紗袍少頃侍中奏外辦俟尚輦進輦侍中奏請降座升輦皇帝升輦繖扇侍衛如常儀至南神門稍東侍中奏請降輦步出廟門皇帝步出廟門至輅侍中奏請升輅皇帝升輅門下侍郎奏請車駕少駐敕侍臣上馬侍臣前承旨退稱曰制可門下侍郎退傳制稱侍臣上馬通事舍人承傳敕侍臣上馬車駕還內鼓吹振作至應天門外百官班迎起居宫縣奏采茨之曲入應天門內侍中奏請降輅乘輦皇帝降輅乘輦以入繖扇侍衛警蹕如常儀皇帝入宫至致齋殿侍中奏解嚴通事舍人承旨敕羣臣各還次將士各還本所世宗本紀大定九年十月辛丑詔宗廟之祭以鹿代牛著為令丙午大享於太廟禮志大定十年正月詔宰臣曰古禮殺牛以祭後世有更者否其檢討典故以聞有司謂自周以來下逮唐宋祫享無不用牛者唐開元禮時享每食各用太牢一至天寶六年始減牛數太廟每享用一犢宋政和五禮新儀時享太廟親祠用牛有司行事則不用宋開寶二年詔昊天上帝皇地祗用犢餘大祀皆以羊豕代之合二羊五豕足代一犢今三年一祫乃為親祀其禮至重每室一犢恐難省減遂命時享與祭社稷如舊若親祀宗廟則共用一犢有司行事則不用世宗本紀大定十一年十一月丙戌朝享于太廟禮志大定十一年尚書省奏案唐禮四時各以孟月享于太廟年終又臘享凡五祀若依海陵時止兩享非天子禮也宜從典禮嵗五享從之享日並出神主前廊序列昭穆應圗功臣配享廟庭各配所事之廟以位次為序以太子為亞獻親王為終獻或並用親王或以太尉為亞獻光祿卿為終獻其月則停時享朝享儀享前三日太廟令帥其屬掃除廟之內外點檢司於廟之前約度設兵衛旗幟尚舍於南神門之西設饌幔十一南向以西為上殿中監帥尚舍陳設大次於殿又設小次於阼階下稍南西向又設皇帝拜褥位殿上版位稍西又設黃道褥于廟門之內外自玉輅至升輦之所又自大次至東神門又設七祀位一于殿下橫街之北西街之西東向配享功臣位于殿下道東橫街之南西向北上前二日大樂令設宫縣之樂于庭中西方各設編鐘三編磬三東方編鐘起北編磬間之東向西方編磬起北編鐘間之西向南方編磬起西編鐘間之北方編鐘起西編磬間之俱北向設特磬大鐘鎛鐘共十二於編縣之內各依神位樹路鼓路鼗於北縣之內道之左右晉鼓一在其後稍南植建鼓鞞鼓應鼓于四隅建鼓在中鞞鼓在左應鼓在右置柷敔于縣內柷一在道東敔一在道西立舞表于酇綴之間設登歌之樂于殿上前楹間金鐘一在東玉磬一在西俱北向柷一在金鐘北稍西敔一在玉磬北稍東搏拊二一在柷北一在敔北東西相向琴瑟在前其匏竹者立于階間重行北向諸工人各位於縣後前一日太廟令開室奉禮郎帥其屬設神位於每室內北墉下各設斧扆一莞席一繅席二次席二紫綾厚褥一紫綾蒙褥一曲几一直几一又設皇帝版位于殿東間門內西向又設飲福位于東序西向又設亞終獻位于殿下橫街之北稍東西向助祭親王宗室使相位在亞終獻之後助祭宗室位在橫街之南西向奉瓚官奉瓚盤官進爵酒官奉爵官等又在其南奉匜盤巾篚官位于其後七祀獻官位在奉爵官之南助奠讀祝奉罍洗爵洗等官位于其後司尊彛官位在七祀獻官之南亞終獻司罍洗爵洗奉爵酒官等又在其南並西向北上大禮使位于西階之西稍南與亞終獻相對大尉司徒助祭宰相位在大禮使之南侍中執政官又在其南禮部尚書太常卿太僕卿光祿卿功臣獻官在西舉册光祿丞太常博士又在其西功臣助奠罍洗爵洗等官位于功臣獻官之後又設監察御史位二于西階下俱東向北上奉禮郎太廟令太官令太祝宫闈令祝史位于亞獻終獻奉爵酒官之南薦籩豆簠簋官薦俎齋郎又在太祝奉禮郎之南