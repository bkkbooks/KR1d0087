嘉祐八年詔以尚書右僕射贈尚書令王曾太尉贈尚書令呂夷簡彰武軍節度使贈侍中曹瑋配享仁宗神宗本紀神宗熙寧八年六月戊午太師魏國公韓琦薨己未以琦配享英宗廟庭元豐元年閏正月己亥太傅兼侍中曾公亮薨癸卯以公亮配享英宗廟庭建炎以來朝野雜記祖宗故事大臣配享皆祔廟後議之若趙韓王曹秦王之配享太祖蓋真宗咸平時而韓魏王曾魯公之配享英宗皆其身薨日降制亦在祔廟十數年後宋史禮志熙寧末嘗詔太常禮院講求親祠太廟不及功臣禮例至是禘祫外親享太廟並以功臣與又從太常禮院請配享功臣以見贈官書板位文獻通考元豐三年詳定郊廟奉祀禮文所言謹案書盤庚曰兹豫大享于先王爾祖其從與享之周禮司勳凡有功者祭于大蒸然則書之所謂大享即禮之所謂大蒸也蒸冬祭也謂之大者物成衆多之時其祭比三時為大也方是時百物皆報焉祭有功宜矣禮記祭統衛孔悝之鼎銘曰勤大命施于蒸彛鼎後世蒸祭不及功臣既不合禮而禘祫及之事不經見梁初誤禘功臣何佟之以為夏物未成而禘功臣為非典禮唐韋挺亦云今禘祫以功臣配享而冬蒸不及與經不合蓋因仍之誤也伏請每遇冬蒸以功臣配享其禘祫配享罷之詔凡冬享禘祫及親祠功臣並配享宋史哲宗本紀元祐元年六月戊申以富弼配享神宗廟庭紹聖元年夏四月甲寅以王安石配享神宗廟庭三年二月癸酉罷富弼配享神宗廟庭禮志元祐初從吏部尚書孫永等議以故司徒贈太尉富弼配享神宗紹聖初又以守司空贈太傳王安石配三年罷富弼配謂弼得罪於先帝也蘇氏軾論周穜擅議配劄子本朝自祖宗以來推擇元勳重望始終全德之臣以配食列聖蓋自天子所不敢専必命都省集議其人非天下公議所屬不在此選奏議既上詔云恭依册告宗廟然後敢行其嚴如此豈有既行之後復使疏逺小臣各出私意以議所配若置而不問則宗廟不嚴而朝廷輕矣褻矣安石平生所為是非邪正中外具知難逃聖鑒先帝蓋亦知之故置之間散終不復用今已改青苗等法而廢退安石黨人呂惠卿李定之徒至於學校貢舉亦已罷斥佛老禁止字學大議已定行之數年而先帝配享已定用富弼天下翕然以為至當穜復何敢建此議意欲以此嘗試朝廷漸進邪説伏望聖慈重賜責降以警在位崇寧元年詔以觀文殿大學士贈太師蔡確配享哲宗廟庭政和五禮新儀配享功臣之位設于殿庭之次趙普曹彬位于橫街之南道西東向第一次薛居正石熙載潘美位于第二次李沆王旦李繼隆位于第三次俱北上王曾呂夷簡曹瑋位于橫街之南道東西向第一次韓琦曾公亮位于第二次王安石位于第三次蔡確位于第四次俱北上惟冬享祫享遍設祭位建炎初詔奪蔡確所贈太師汝南郡王追貶武泰軍節度副使更以左僕射贈太師司馬光配享哲宗既又罷王安石復以富弼配享神宗趙鼎傳髙宗即位除鼎司勳郎官久雨詔求闕政鼎言自熙寧間王安石用事變祖宗之法而民始病假闢國之謀造生邊患興理財之政窮困民力設虛無之學敗壞人才至崇寧初蔡京托紹述之名盡祖安石之政凡今日之患始於安石成於蔡京今安石猶配享廟庭而京之黨未除時政之闕莫大於是上為罷安石配享宋會要紹興四年太常少卿江端友請明堂前一日差官詣配祀功臣位行禮緣即今權于溫州真華宮奉安宗廟比在京事體不同欲依紹興元年明堂更不排辦從之宋史髙宗本紀紹興八年三月壬寅定以故相韓忠彥配享徽宗廟庭揮塵前録本朝曹武惠配享太祖武穆配享仁宗韓忠獻配享英宗文定配享徽宗父子配享自昔所無也禮志紹興十八年二月監登聞鼓院徐璉言國家原廟佐命配享當時輔弼勳勞之臣繪象廟庭以示不忘纍朝不過一十餘人今之臣僚與其家之子孫必有存其繪像者望詔有司尋訪復摹于景靈宮庭之壁非獨假寵功臣之子孫所以增重祖宗之德業以為臣子勸遂下諸路轉運司委所管州軍尋訪各家韓王趙普周王曹彬太師薛居正石熙載鄭王潘美太師李沆王旦李繼隆王曾呂夷簡侍中曹瑋司徒韓琦太師曾公亮富弼司馬光韓忠彥各令摹寫貌像投納繪于景靈宮之壁紹興二十七年六月戊午初命太廟冬享祭功臣孝宗本紀乾道五年九月甲子詔侍從臺諫集議欽宗配享功臣禮志乾道五年九月太常少卿林栗等言欽宗皇帝廟庭尚虛配享當時遭值艱難淪胥莫救罕可稱述而以身殉國名節暴著不無其人雖生前官品不應配享之科事變非常難拘定制乞特詔集議吏部尚書汪應辰奏當時死事之臣皆有次第褒贈若今配享欽廟典故所無如創行之又當訪究本末差次輕重有所取舍尤不可輕易竊謂配享功臣若依唐制各廟既無其人則當缺之乃罷集議欽宗一廟遂無配享文獻通考侍右郎官曾逮言昔元祐中神宗未有配享朝廷依例權塑二侍臣吏部尚書汪應辰言欽宗所圖共政之臣皆未有能勝其任者若應故事姑令備數上非所以尊宗廟下非所以勸有功誠如太常所言當時死事之臣非一今欲令配享考究本末差次輕重有所取捨尤不可輕易昔唐文宗武宗皆無配享功臣蓋崇奉祖宗必審其實必當于理不虛尚文飾以茍塞人情而已既無可配享者乞更不集議從之孝宗本紀淳熙十五年三月癸丑用洪邁議以呂頥浩趙鼎韓世忠張俊配享髙宗廟庭禮志淳熙中髙宗祔廟翰林學士洪邁言配食功臣先期議定臣兩蒙宣諭欲用文武臣兩人文臣故宰相贈太師秦國公諡忠穆呂頥浩特進觀文殿大學士諡忠簡趙鼎武臣太師蘄王諡忠武韓世忠太師魯王諡忠烈張俊此四人皆一時名將相合于天下公論議者皆以為宜遂從之祕書少監楊萬里獨謂丞相張浚不得配食為非爭之不得因去位焉清波雜志國朝配享功臣于太廟橫街南東西相向設位太祖室趙普曹彬太宗室薛居正石熙載真宗室李沆王旦李繼隆仁宗室王曾呂夷簡英宗室韓琦曾公亮神宗室富弼曹瑋哲宗室司馬光徽宗室韓忠彥髙宗室呂頥浩趙鼎韓世忠張俊視祖宗文武各用二人侑食蓋中興將相勳烈之盛不得而遺也紹興五年十二月以左丞相贈太師魯國公陳康伯配享孝宗廟庭建炎以來朝野雜記孝宗既祔廟詔以故相陳康伯侑食寶文閣待制吳總上疏請以其父璘配享廟庭不報宋史禮志初仁宗天聖中郊祀詔録故相李昉宋琪呂端張齊賢畢士安王旦執政李至王沔溫仲舒及陳洪進等子孫以官元豐中詔景靈宮繪像舊臣推恩本支下兩房以上取不食録者均有無取齒長者若子孫亦繪像本房不食祿更不取别房紹聖初林希請稽考慶歷以後未經編次臣僚其子孫應録用者以次編定尋詔趙普社稷殊勳其諸孤有無食祿者各官其一子以長幼為序毋過三人崇寧初詔哲宗繪像文武臣僚並與子若孫一人初品官若子孫衆多毋過家一人又録藝祖功臣呂餘慶族孫偉及司徒富弼孫直柔直道以官使奉其祀靖康初臣僚言司馬光之後再絶復立族子稹稹亦卒今雖有子而光遺表恩澤已五十年不可復奏請許移奏見存曾孫使之世祿從之寧宗本紀嘉泰元年春正月庚午以葛邲配享光宗廟庭嘉定十四年八月乙丑追封史浩為越王改諡忠定配享孝宗廟庭理宗本紀端平二年八月乙卯以太師趙汝愚配享寧宗廟庭仍圖像于昭勳崇德之閣右宋遼史興宗本紀重熙二十一年八月戊子太尉烏哲薨詔配享聖宗廟金史禮志天德二年二月太廟祫享有司擬上配享功臣詔以薩哈希卜蘇舍音斡魯鄂斯歡忠東向配太祖位以尼瑪哈斡里雅布宗望棟摩羅索尼楚赫西向配太祖位大定三年十月祫享又以舍音斡魯薩哈希卜蘇鄂斯歡配享太祖宗望棟摩宗翰羅索尼楚赫配享太宗其後次序屢有更易世宗本紀大定八年十月乙未命圖畫功臣于太祖廟其未立碑者立之禮志大定八年上命圖畫功臣于太祖廟有司第祖宗佐命之臣勳績之大小官資之崇卑以次上聞乃定左廡開府金源郡王薩哈皇伯太師右副元帥宋王宗望開府金源郡王斡魯皇伯太師梁王宗弼開府金源郡王羅索皇叔祖元帥左都監魯王棟摩開府隋國公阿里罕儀同三司兖國公劉彥宗右丞相齊國簡懿公韓企先特進宗人希卜蘇右廡太師秦王宗翰皇叔祖遼王杲開府金源郡王希卜蘇開府金源郡王完顔希尹太傅楚王宗雄開府前燕京留守金源郡王完顔尼楚赫開府金源郡王完顔忠金源郡王完顔薩里罕特進宗人斡魯右丞相金源郡王赫舍哩志寧大定十六年左廡遷梁王宗弼于斡魯上十八年黜希卜蘇而次于普嘉努阿里罕之下二十二年增皇伯太師遼王舍音薩哈宗幹宗翰宗望其下以次列章宗本紀明昌四年三月田午定配享功臣禮志明昌四年次序始定東廊皇叔祖遼智烈王舍音杲皇伯太師遼忠烈王宗幹幹布皇伯太師右副元帥宋桓肅王斡里雅布宗望開府儀同三司金源郡毅武王希卜蘇開府儀同三司金源郡貞憲王完顔古新希尹太傅楚威敏王摩囉歡宗雄開府儀同三司燕京留守金源郡襄武王完顔尼楚赫開府儀同三司金源郡明毅王完顔忠鄂斯歡金源郡莊襄王杲薩里罕特進宗人斡魯莊翼特進完顔希卜蘇威敬太師尚書令淄忠烈王圖克坦克寧太師尚書令南陽郡文康王張浩西廊開府儀同三司金源郡忠毅王薩哈太師秦桓忠王尼瑪哈宗翰皇伯太師梁忠烈王烏珠宗弼開府儀同三司金源郡剛烈王斡魯開府儀同三司金源郡莊義王完顔羅索皇叔祖元帥左都監魯莊明王棟摩開府儀同三司隋國剛憲公阿里罕開府儀同三司豫國襄毅公普嘉努昱開府儀同三司兖國英敏公劉彥宗右丞相齊國簡懿公韓企先太保尚書令廣平郡襄簡王李石開府儀同三司右丞相金源郡武定王赫舍哩志寧開府儀同三司左丞相沂國公布薩忠羲儀同三司左丞相崇國公赫舍哩良弼右丞相莘國公石琚右丞相申國公唐古安禮開府儀同三司平章政事圖克坦喀齊喀參知政事宗敘每一朝為一列著為令章宗本紀明昌五年閏十月丙寅以代國公罕都等五人配享世祖廟庭禮志明昌五年閏十月丙寅以儀同三司代國公罕都銀青光祿大夫伊克特進和卓開府儀同三司博諾儀同三司巴達配享世祖廟庭享日並出神主前廊序列昭穆應圖功臣配享廟庭各配所事之廟以位次為定王圻續通考南陽郡王完顔襄夀國公張萬公皆配享章宗廟庭平章政事延安郡王布薩端尚書右丞夀國公髙汝礪宰相福興皆配享宣宗廟庭完顔薩布傳正大三年宣宗廟成將禘祭議配享功臣論者紛紜賽不為大禮使因言丞相福興死王事齊勤謹守河南以迎大駕功宜配享議遂定元史祭祀志英宗初博士言今冬祭即蒸也天子親祼太室功臣宜配享事弗果行右遼金元明會典洪武二年孟春享太廟以功臣七人配遣官分獻讀祝王圻續通考洪武二年正月享太廟以功臣廖永忠俞通海張德勝桑世傑耿再成胡大海趙德勝配享設青布幃六間于太廟庭中內設配享功臣位籩豆各二實以栗棗牛脯葵菹鹿醢簠簋各二實以黍稷稻粱羊豕體各一遣官分獻其分獻儀皇帝行亞獻禮將畢分獻官各詣盥洗所盥手洗爵酌酒諸執事官皆酌酒于爵獻官進詣功臣第一位前上香奠爵諸執事官各進爵于各神位前讀祝官讀祝訖獻官復位其配享祝文曰朕以孟春嚴奉廟享追念忠烈輔成開基爰用牲醴陳于廟庭英靈如生尚其與享明史禮志洪武三年定配享功臣常遇春以下凡八位春夏於仁祖廟西廡秋冬於德祖廟西廡設位東向遂罷幃次之設更定三獻禮皇帝初獻時獻官即分詣行禮不拜明會典洪武三年定親王從享皆設位于東廡西向功臣配享皆設位于西廡東向明史禮志洪武三年定以皇伯考夀春王王夫人劉氏為一壇皇兄南昌王霍邱王下蔡王安豐王霍邱王夫人翟氏安豐王夫人趙氏為一壇皇兄蒙城王盱眙王臨淮王臨淮王夫人劉氏為一壇後定夫人皆改稱妃皇姪寶應王六安王來安王都梁王英山王山陽王昭信王為一壇凡一十九位春夏于仁祖廟東廡秋冬及歲除於德祖廟東廡皇帝行初獻禮時獻官詣神位分獻四年進親王於殿內東壁王圻續通考明太祖洪武三年夀春十五王進侑四祖廟案夀春於孝陵為伯南昌七王兄寶應七王從子也余從大夫後助祭太廟見廡中木主稱夀春八王為髙伯祖考寶應七王為曾伯祖考禮官誤矣四年太祖謂中書省臣太廟之祭以功臣配列廡間今既定太廟合祭禮朕以祖宗具在使功臣故舊沒者得少依神靈以同享祀不獨朝廷宗廟盛典亦以寓朕不忘功臣之心於是禮官議凡合祭時為黃布幄殿中祖考神位旁設兩壁以享親王及功臣令大臣分獻制可已而命去布幄四年罷廟庭幃設之次改設黃布幃殿于廟內併具兩廡中居祖考神位廡列親王及功臣每奠獻祖考則遣大臣各分獻不讀祝是秋又命功臣仍于廡間配享不設布殿蕙田案親王配享自太祖創也太祖本紀洪武六年録故功臣子孫未嗣者二百九人九年新太廟成增祀蒙城王妃田氏盱眙王妃唐氏以徐達常遇春李文忠鄧愈湯和沐英俞通海張德勝胡大海趙德勝耿再成桑世傑十二位配于西廡罷廖永安明會典洪武九年奉安四代神主以親王并王妃二十一位侑于殿內東壁功臣十二位配于西壁不分獻自是四時之祭皆行合享之禮明史太祖本紀洪武十年録故功臣子孫五百餘人明會典洪武二十年定凡祭功臣令軍官首領官陪明史禮志建文時禮部侍郎宋禮言功臣自有雞籠山廟請罷太廟配享帝以先帝所定不從且令候太廟享畢别遣官即其廟祭之洪熙元年以張玉朱能王真姚廣孝配享太廟遣張輔朱勇王通及尚寶少卿姚繼各祭其父王圻續通考嘉靖九年中允廖道南言廣孝髠徒不宜入廟禮官李時與張璁桂萼亦以為言遂移祀大興隆寺明史禮志嘉靖十年以刑部郎中李瑜議進劉基位次六王十六年以武定侯郭勛奏進其祖英初二廟功臣位各以爵及進基位公侯上至是復令禮官議合二廟功臣敘爵於是列英於桑世傑上張玉朱能於世傑下王圻續通考武定侯郭勛乞進其祖英侑享髙廟下廷議不可户部侍郎唐胄疏爭言廟祀諸臣位次上下且不可易况有無之額敢輒增損乎勛言往年進劉基祔享以文臣故舉朝翕然順從臣祖英武臣乃紛然阻忌上是勛言進英祀先是二廟侑享功臣位各以爵及進基伯位公侯上帝不喜曰何上基而下英也令禮官考議乃合二廟功臣敘爵于是列英永義侯上河間東平二王黔寧王下基永義侯下初郭英未進侑時禮官夏言言禮有功宗之祀漢祭功臣于廟庭魏祀尚書令荀攸于太祖廟唐髙祖至憲宗廟或六七八人或二三四人宋太祖至光宗亦然如魏徴李沆司馬光皆文臣不必皆武功也守成諸君亦各有與享者不必皆創業也我朝二祖開國靖難固有功臣仁宗以無事武功其間相與輔贊治平豈無有如魏徵李沆輩者今侑享二祖凡十七人十七人中惟基廣孝二人文臣耳自後六廟缺焉無聞乞下廷議考求六朝文武大臣有功在當時澤在後世者請上裁定進侑廟庭帝不允配享功臣十七人中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英河間忠武王張玉東平武烈王朱能虢國忠烈公俞通海蔡國忠毅公張德勝越國武莊公胡大海梁國武桓公趙德勝泗國武莊公耿再成營國威襄公郭英寧國公王真永義侯桑世傑誠意伯劉基皆左右敘二十四年進諸配位於新太廟西壁罷分獻太常紀神宗萬歷九年給事中丁汝謙言諸王世次逺宜罷祭祭於墓親王之殤無後而近者宜配凡親王功臣宜列兩廡上以汝謙議睿廟謫汝謙遂未行萬歷十四年太常卿裴應章言諸王本從祖祔食今四祖之廟已祧而諸王無所於祔宜罷享而祔之祧廟禮部言祧以藏毁廟之主為祖非為孫禮有祧不聞有配祧者請仍遵初制序列東廡為近禮報可又言廟中列后在上異姓之臣禮當别嫌且至尊拜俯於下諸臣之靈亦必不安命改復西廡遣官分獻太常紀裴應章言諸王從祖祔食四祖親盡且祧而諸王得配享百世非所以為殺也夀春等王於太祖為伯為兄太祖南面而伯若兄俯而侑于側非所以為順也列后在享諸功臣同坐一堂非所以為别也其以諸王祔祧廟歲祫則祔餘則罷功臣移之廡便上下禮官宗伯沈鯉議曰臣考儀禮諸書與前代故事無親王祔享之儀是太祖以義起者也宗廟之祭祫為重故禮稱彌逺而彌尊時享不可預而預於祫其無乃未安乎竊謂諸王墳墓近皇陵則祔皇陵之廟近祖陵則祔祖陵之廟于禮無嫌亦不失太祖遺意但考洪武四年初享十五王之文曰朕念親親之道無間存沒凡我伯考兄姪悉追封為王伯妣先嫂皆為王夫人列祀宗廟著為常典臣不敢議罷其仍遵初制序列東廡功臣列西廡惟上裁擇上曰可於是諸王功臣列兩廡遣官分獻如國初制矣天啓元年太常少卿李宗延言前代文臣皆有從祀我朝不宜獨缺下禮部議不行春明夢餘録明髙祖定鼎念諸功臣之烈建太廟首以李韓公善長等六人及胡越公大海等從享最後韓公坐嫌死而六公亦間不得與逮永樂而始定自中山開平二王而下距永義侯桑世傑凡六王五公一侯十二人從文皇祀者至洪熙而定文武臣惟河間王玉東平王能寧國公真榮國公廣孝凡二王二公至世宗首上太祖徽號後上文皇帝祖號又采禮官言進誠意伯從祀太祖位六王下而以僧故斥廣孝使祀大興隆寺尋用翊國公勛請進其祖營國公英獨仁宗而後寥寥無聞論者謂如楊文貞李文達商文毅劉文清楊文忠之賢于輔而不得從蹇忠定王忠肅王端毅馬端肅于肅愍之賢于樞而不得從張定興輔之下南交朱宣平永之八佩將印皆位太師握環衛為心膂牙瓜而不得從髙帝諸功臣而下猶有説焉若李韓公之佐開創不下酇侯雖以嫌死帝尚為之諱若馮宋公勝之佐大將軍取中原下秦隴降納哈出二十萬之衆傅頴公友德之從大將軍取山東其平蜀功冠徹侯而開滇南二百年之地惜其終于帝之末遘革除之變而未有舉也右明五禮通考卷一百二十二
