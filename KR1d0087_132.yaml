body:
  text: 五禮通考卷一百二十二刑部尚書秦蕙田撰吉禮一百二十二功臣配享蕙田案配享之典國家所以報功而勸忠也周禮祭于大蒸並及禘祫後世不廢焉書盤庚兹豫大享于先王爾祖其從與享之傳古者天子録功臣配食于廟大享蒸嘗也功疏此大享于先王謂天子祭宗廟也言古者天子録臣配食于廟故臣之先祖得與享之也古者孔氏據已而道前世也此殷時已然矣大享蒸嘗者蒸嘗是秋冬祭名謂之大享者以事各有對若蒸嘗對禘祫則禘祫為大蒸嘗為小若四時自相對則蒸嘗為大礿祠為小知蒸嘗有功臣與祭者案周禮司勳云凡有功者銘書于王之太常祭于大蒸司勳詔之是也秋冬之祭尚及功臣則禘祫可知近代以來惟禘祫乃祭功臣配食時祭不及之也近代以來功臣配食各配所事之君若所事之君其廟已毁時祭不祭毁廟其君尚不時祭其臣固當止矣禘祫則毁廟之主亦在焉其時功臣亦當在也陳氏大猷曰大勳勞之人方得配食非遍及有功者蕙田案周禮祭于大蒸之文則知大享専指蒸而不及嘗矣蓋蒸嘗同為大享而蒸尤大于嘗故報功臣焉注兼蒸嘗恐非詩商頌長發允也天子降于卿士實惟阿衡實左右商王蘇氏轍曰大禘之祭所及者逺卿士伊尹蓋與祭于禘者也商書曰兹豫大享于先王爾祖其從與享之是禮也豈其起于商之世歟孔叢子書曰兹豫大享于先王爾祖其從與享之季桓子問曰此何謂也孔子曰古者大臣有功死則必祀之于廟所以殊有績勸忠勤也盤庚舉其事以厲其世臣故稱焉桓子曰天子之臣有大功者則既然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加於民大臣死難雖食之公廟可也桓子曰其位次如何孔子曰天子諸侯之臣生則有列于朝死其有位於廟其序一也書洛誥周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼傳言王當始舉殷家祭祀以禮典祀于新邑皆次秩不在禮文者而祀之我整齊百官使從王于周行其禮典我惟曰庶幾有善政事今王就行王命于洛邑曰當記人之功尊人亦當用功大小為序有大功則列大祀謂功施于民者惟天命我周邦汝受天命厚矣當輔大天命視羣臣有功者記載之乃汝新即政其當盡自教衆官躬化之疏君知臣功則臣皆盡力蔡氏沈曰殷盛也與五年再殷祭之殷同功宗功之尊顯者蓋功臣皆祭于大蒸而勳勞之最尊顯者則為之冠故謂之元祀周公教成王即命曰記功之尊顯者以功作元祀矣又惟命之曰汝功臣受此褒賞之命當益厚輔王室蓋作元祀既以慰答功臣而又勉其左右王室益圖久大之業也蕙田案注疏以記功宗為記人之功尊人蔡氏以為記有功之尊顯者二説不同蔡義為長周禮夏官司勳王功曰勳注輔成王業若周公國功曰功注保全國家若伊尹民功曰庸注法施于民若后稷事功曰勞注以勞定國若禹治功曰力注制法成治若咎繇戰功曰多注剋敵出竒若韓信陳平司馬法曰上多前虜凡有功者銘書于王之太常祭于大蒸司勳詔之注銘之言名也生則書于王旌以識其人與功也死則于蒸先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹豫大享于先王爾祖其從與享之是也今漢祭功臣于廟庭疏必祭功臣在冬之蒸祭者蒸者衆也冬時物成者衆故祭功臣案彼書注以大享為蒸嘗者此舉冬祭物成者衆而言其嘗時亦祭之也或周時直于蒸時祭功臣殷時蒸嘗俱祭禮異故也蕙田案疏謂周於蒸祭祭功臣殷於蒸嘗皆祭功臣此亦無可考鄭氏鍔曰王功者輔成王業勤勞王室輔幼孤以嗣王者之緒明王道以成王者之治即是功而謂之勳勳有薰蒸之義謂其功之大薰蒸宇宙上達于王也周公之有大勳勞是已國功者國爾忘家盡瘁國事凡所施為無非為國計者即是功而謂之功功者事有成效之義獨此名曰功蓋人臣立功正以保全王國為主進而上名以勳功不足道也抑而下則曰勞曰力之類皆不足正名其功也惟為國而有成者正可謂之功民功者害為民除之利為民興之或便于昔而不便於今則為民革之或興于前而廢于後則為民舉之即是功而謂之庸庸者用也事功者或從王事或任國事或有所營為或有所創制黽勉從之不畏其適我也即是功而謂之勞勞有經營艱苦之意也治功者或平水土或開草萊或任土地或疏導溝洫即是功而謂之力力謂其用力以作為也戰功者戰以伐謀為上而以伐兵為下以正合以竒勝執俘折馘斬將搴旊奏凱而旋者是也即是功而謂之多多者算數過人之義又曰太常之書司常之職也大蒸之祭大宗伯之職也司勳知立功之人當銘則詔之使銘當祭則詔之使祭銘于太常使與日月同其久也祭于大蒸使與祖宗之神同享乎盛祭也可以見其報之之厚蕙田案詔字當以鄭氏鍔之説為長王氏昭禹曰必使司勳詔之則以有大功者其二藏于司勳故也王氏安石曰大蒸冬之大享當是時百物皆報焉祭有功宜矣春秋定公十四年左氏傳梁嬰父惡董安于謂知文子曰不殺安于使終為政于趙氏趙氏必得晉國盍以其先發難也討于趙氏文子使告于趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其罪矣敢以告趙孟患之安于曰我死而晉國寧趙氏定將焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟而後趙氏定祀安于於廟注趙氏廟名疏禮臣有大功配食于廟周禮司勳云凡有功者銘書于王之太常祭于大蒸司勳詔之尚書盤庚云兹豫大享于先王爾祖其從與享之孔安國云古者天子録功臣配食于廟大享蒸嘗也天子既有此禮諸侯或亦有之今趙氏祀安于於趙氏之廟其意亦如此也蕙田案觀孔叢子所載孔子與季桓子問答語則知自定公以前諸侯之國無有以臣配享者故孔頴達云諸侯或亦有之然則以家臣而祀于私廟僭禮自趙簡子始也右經傳功臣配享漢舊儀宗廟祭功臣四十人食堂下惟御僕滕公祭於廟門外孰杜佑通典漢制祭功臣于庭生時侍宴于堂死則降在庭位與士庶為列三國魏志明帝本紀青龍元年夏五月壬申詔祀故大將軍夏侯惇大司馬曹仁車騎將軍程昱于太祖廟庭注魏書載詔曰昔先王之禮於功臣存則顯其爵祿沒則祭于大蒸故漢氏功臣祀于廟庭大魏元功之臣功勳優著終始休明者其皆依禮祀之于是以惇等配享之齊王本紀正始四年秋七月詔祀故大司馬曹真曹休征南大將軍夏侯尚太常桓階司空陳羣太傅鍾繇車騎將軍張郃左將軍徐晃前將軍張遼右將軍樂進太尉華歆司徒王朗驃騎將軍曹洪征西將軍夏侯淵後將軍朱靈文聘執金吾臧霸破虜將軍李典立義將軍龎德武猛校尉典韋于太祖廟庭五年冬十一月癸卯詔祀故尚書令荀攸于太祖廟庭注臣松之以為故魏氏配享不及荀彧蓋以其末年異議又位非魏臣故也至于升程昱而遺郭嘉先鍾繇而後荀攸則未詳厥趣也徐他謀逆而許禇心動忠義之至逺同于日磾且潼關之危非褚不濟禇之功烈有過典韋今祀韋而不及禇又所未達也六年冬十一月祫祭太祖廟始祀前所論佐命臣二十一人嘉平三年十一月有司奏諸功臣應享食于太祖廟者更以官為次太傳司馬宣王功髙爵尊最在上陳留王本紀景元三年詔祀故軍咨祭酒郭嘉于太祖廟庭通典魏髙堂隆議曰案先典祭祀之禮皆依生時尊卑之敘以為位次功臣配享于先王像生時侍宴燕禮大夫以上皆升堂以下則位于庭其餘則與君同牢至於爼豆薦羞唯君備公降于君卿大夫降于公士降于大夫使功臣配食于蒸祭所以尊崇其德明其勳以勸嗣臣也議者欲從漢氏祭之于庭此為貶損非寵異之謂也貴者取貴骨賤者取賤骨今使配食者因君之牢以貴賤為爼庶合事宜周志曰勇則害上不登于明堂共用謂之勇言有勇而無義死不登堂而配食此即配食之義位在堂之明審也下為北面三公朝立之位耳燕則脫屨升堂不在庭也凡獻爵有十二九七五三之差君禮大夫三獻太祝令進三爵于配食者可也蕙田案左傳勇則害上不登于明堂杜注云明堂祖廟也所以策功序德故不義之士不得升孔疏云鄭元以為明堂在國之陽與祖廟别處左氏舊説及賈逵盧植蔡雍服虔等皆以祖廟與明堂為一故杜同之祭統云古者明君必賜爵祿于太廟傳稱公行還告廟舍爵策勳是明堂之中所以策功序德故不義之人不得升之也據注疏二家是謂生而入廟受賞耳魏髙堂隆則以為登堂配食乃指死後而言今案狼瞫前則曰吾未得死所後則曰死而不義非勇也是引周志之言明指死後審矣髙堂隆在杜預以前釋經必有所依據也右漢魏晉書武帝本紀咸寧元年八月壬寅以故太傅鄭沖太尉荀顗司徒石苞司空裴秀驃騎將軍王沈安平獻王孚等及太保何曽司空賈充太尉陳騫中書監荀朂平南將軍羊祐齊王攸等皆列于銘享文獻通考散騎常侍任茂議案魏功臣配食禮敘六功之勳祭陳五祀之品或祀之于一代或傳之于百代蓋社稷五祀所謂傳之於百代者古之王臣有明德大功若勾龍之能平水土柱之能樹百榖則祀社稷異代不廢也昔湯既勝夏欲遷其社不可乃遷稷而周棄德可代柱而勾龍莫廢也若四敘之屬分主五方則祀為貴神傳之異代載之春秋非此之類則雖明如咎繇勳如伊尹功如呂尚各於當代祀之不祭于異代也然則伊尹于殷雖有王功之茂不配食于周之清廟矣今之功臣論其勳迹比咎繇伊尹呂尚猶或未及凡云配食各配食于主也今主遷廟臣宜從享大司馬石苞等議魏代功臣宜歸之陳留國使修常祀允合事理宋書長沙景王傳太祖元嘉九年詔曰古者明王經國司勳有典平章以馭德刑班瑞以酬功烈銘徽庸于鼎彛配祫祀于清廟是以從享先王義存商誥祭于大蒸禮著周典自漢迄晉世崇其文王猷既昭幽顯咸秩先皇經緯天地撥亂受終駿命爰集光宅區宇雖聖明淵運三靈允協抑亦股肱翼亮之勤祈父宣力之效故使持節侍中都督南徐兖二州揚州之晉陵京口諸軍事太傅南徐兖二州刺史長沙景王故侍中大司馬臨川烈武王故司徒南康文宣公穆之侍中衛將軍開府儀同三司録尚書事揚州刺史華容縣開國公𢎞使持節散騎常侍都督江州豫州西陽新蔡晉熙四郡軍事征南大將軍開府儀同三司江州刺史永修縣開國公道濟故將軍青州刺史龍陽縣開國侯鎮惡或履道廣流秉德沖邈或雅景髙邵風鑒明逺或識唯知正才略開邁咸文德以熙帝載武功以隆景業固以侔蹤姬旦方軌伊召者矣朕以寡德纂成鴻緒每惟道勳思遵令典而太常未銘從祀尚闕鑒寐欽屬永言深懷便宜敬是前式憲兹嘉禮勒功天府配祭廟庭俾示徽章垂美長世茂績逺猷永傳不朽南齊書禮志永明十年詔故太宰褚淵故太尉王儉故司空柳世隆故驃騎大將軍王敬則故鎮東大將軍陳顯達故鎮東將軍李安民六人配享太祖廟庭祠部郎何諲之議功臣配享纍行宋世檢其遺事題列坐位具書贈官爵諡及名文不稱主便是設板也白虎通云祭之有主孝子以繫心也揆斯而言升配廟庭不容有主宋時板度既不復存今之所制大小厚薄如尚書召板為得其衆有司攝太廟舊人亦云見宋功臣配享坐板與尚書板相似隋書禮儀志武帝即位遷主太廟春祠夏礿秋嘗冬蒸并臘一歲凡五謂之時祭三年一禘五年一祫謂之殷祭禘以夏祫以冬皆以功臣配天監三年何佟之議曰禘於首夏物皆未成故為小祫於秋冬萬物皆成其禮尤大司勳列功臣有六皆祭于大蒸知祫尤大乃及之也近代禘祫並不及功臣有乖典制宜改詔從之自是祫祭乃及功臣陳書文帝本紀天嘉二年九月甲寅詔曰姬業方闡望載渭濱漢歷既融道通圯上若乃摛精辰宿降靈帷嶽風雲有感夢寐是求斯固舟楫鹽梅遞相表裏長世建國罔或不然至于銘德太常從祀清廟以貽厥後來垂諸不朽者也前皇經濟區宇裁成品物靈貺式甄光膺寶命雖謨明濬發幽顯協從亦文武賢能翼宣王業故大司馬驃騎大將軍瑱故司空文育故平北將軍開府儀同三司僧明故中護軍頴故領軍將軍擬或締構艱難經綸夷險或摧鋒冒刃殉義遺生或宣哲協規綢繆帷幄或披荆汗馬終始勤劬莫不罄誠悉力屯泰以之朕以寡昧嗣膺丕緒永言勳烈思𢎞典訓便可式遵故實載揚盛軌可並配食髙祖廟庭俾兹大猷永傳宗祏世祖本紀天嘉五年三月壬午詔以故護軍將軍周鐵虎配食髙祖廟庭周鐵虎傳天嘉五年世祖又詔曰漢室功臣形寫宫觀魏朝猛將名配宗祧功烈所以長存世代因之不朽故侍中護軍將軍青冀二州刺史沌陽縣開國侯鐵虎誠節鯁亮力用雄敢王業初基行間纍及垂翅賊壘正色冦庭古之遺烈有識同壯隕身不屈雖隆榮等營魂易逺言追嘉惜宜仰陪壖寢恭頒享奠可配食髙祖廟庭宣帝本紀大建四年秋九月景寅以故太尉徐度儀同杜稜儀同程靈洗配食髙祖廟庭故車騎將軍章昭達配食世祖廟庭右晉宋齊梁陳伽藍記北魏廣陵王即皇帝位爾朱世隆加儀同三司尚書令東平王餘官如故贈太原王相國晉王加九錫立廟于芒嶺首陽山上舊有周公廟世隆欲以太原王功比周公故立此廟廟成為火所災有一柱焚之不盡後三日雷雨震電霹靂擊為數假柱下石及廟瓦皆碎于山下復命百官議太原王配享司直劉季明議云不合世隆問其故季明曰若配世宗於宣武無功若配孝明親害其母若配莊帝為臣不忠為莊帝所戮以此論之無所配也世隆怒曰卿亦合死季明曰下官既為議臣依禮而言不合聖心俘翦惟命議者咸歎季明終得無恙北齊書孝昭帝本紀皇建元年十一月庚申詔以故太師尉景故太師竇泰故太師太原王婁昭故太宰章武王厙狄干故太尉假榮故太師万俟普故司徒蔡俊故太師髙乾故司徒莫多婁貸文故太保劉貴故太保封祖裔故廣州刺史王懷十二人配享太祖廟庭故太師清河王嶽故太宰安德王韓軌故太宰扶風王可朱渾道元故太師髙昻故大司馬劉豐故太師万俟受洛干故太尉慕容紹宗七人配享世宗廟庭故太尉河東王潘相樂故司空薛修義故太傅破六韓常三人配享顯祖廟庭北周書明帝本紀二年冬十二月癸亥太廟成辛巳以功臣琅琊貞獻公賀拔勝等十三人配享太祖廟庭右北魏北齊北周隋書禮儀志禘祫之月則停時饗而陳諸瑞物及伐國所獲珍竒于廟庭及以功臣配饗舊唐書太宗本紀貞觀十四年冬十月己卯詔以贈司空河間元王孝恭贈陜東道大行臺尚書右僕射鄖節公殷開山贈民部尚書渝襄公劉政會等配享髙祖廟庭通典貞觀十六年有司言禮功臣配享于廟庭禘享則不配依令禘祫之日功臣並得配享請集禮官學士等議太常卿韋挺等議曰古者臣有大功享祿其後子孫率禮潔粢豐盛礿祠蒸嘗四時不輟國家大祫又得配焉所以昭明其勳尊崇其德以勸嗣臣也其禘及時享功臣皆不應享故周禮六功之官皆配大蒸而已先儒皆以大蒸為祫祭梁初誤禘功臣左丞何佟之駁議武帝允而依行降暨周齊俱遵此義竊以五年再殷合諸天道之大小小則人臣不與大則兼及有功禮禘無配功臣誠謂理不可易從之顔師古功臣配享議曰竊以肅恭禋祀經邦彛訓追逺念功歷代鴻典於穆清廟備孝享于吉蠲股肱良哉豫銘常之配侑爰發明詔俾命率由秩宗致請博謀僚列爾雅説祀禘為大祭公羊傳義大事為祫何休所釋又異鄭元然皆一配之文曾無重祀之證是非衆論雖曰踳駮隆殺二端厥趣可覩謹案祫者合食禘乃禘祭禘小于祫理則非疑商書稱從與其大享周禮著祭于大蒸是知小祀不及功臣其事又無可惑魏晉以降莫不通行中間雖經差失梁朝又以矯正有齊立號朝宗河朔周氏命歷卜食咸陽修定禮儀皆有憑據同遵此典未嘗釐革今欲更改實謂非宜又尋古之配祭皆在于冬據其時月益明非禘况乎臣之立功各因所奉享祀之日從主升配禘之為祭自于本室廟未毁者不至太祖之庭君既不來而臣獨當祀列對揚尊極乃非所宜今請祫配功臣禘則不豫依經合義進退為允謹議蕙田案禘祭無配享其禮極是特所謂禘者非古之禘耳文獻通考唐太宗貞觀禮祫享功臣配享于廟庭禘享則不配後又令祫禘之日功臣並得配享初太常卿韋縚等議功臣祫享之日配享于廟庭禘及時享則皆不預其議遂行至開元初復令禘之日亦皆配享非舊典也配享位在各帝廟庭太階之東少南西向以北為上舊唐書髙宗本紀貞觀二十三年皇太子即位九月丙寅贈太尉梁國公玄齡贈司徒申國公士廉贈左僕射蔣國公屈突通並配食太宗廟庭顯慶五年二月甲午祀舊宅以武士彠殷開山劉政會配食中宗本紀神龍二年閏二月停許敬宗配享以贈太尉鄭公魏徵配享太宗廟玄宗本紀開元六年六月乙酉制以故侍中桓彥範敬暉故中書令兼吏部尚書張柬之故特進崔玄暐故中書令袁恕已配享中宗廟庭故司空蘇瓌故左丞相太子少保郴州刺史劉幽求配享睿宗廟庭文獻通考順宗既葬議祧遷中宗廟有司疑曰五王有安社稷功若遷中宗則配享永絶判集賢院事蔣又曰禘祫功臣乃合食太廟中宗廟雖毁而禘祫並陳太廟此則五王配食與初一也由是遷廟遂定開元禮祫禘以功臣配享享日未明一刻太廟令布功臣神座于太廟之庭吏部尚書贈司空鄖國公殷開山光祿卿渝國公