body:
  text: 五禮通考卷一百二十八刑部尚書秦蕙田撰嘉禮一即位改元蕙田案后王踐阼臨民體元居正典莫巨焉唐虞禪讓受終告廟類上帝秩百神巍乎尚已商書太甲元祀祗見厥祖周成王顧命康王即位陳設宿衛麻冕黼裳册告殯宫受同瑁臨朝見諸侯既退釋冕反喪服儀節炳然蓋損益二代而為之吉凶之際禮以義起可為軌則矣漢髙帝即位泛水之陽典禮未具光武以後創業之主往往柴燎告天即位於郊壇而繼體守文自漢文帝即阼謁髙廟後嗣因之受命几筵之前遣告天地社稷亦猶行古之道也至如唐髙祖睿宗元宗順宗宋髙宗孝宗寧宗以父子內禪則禮之變矣元祀之稱始見商書春秋嗣君即位必書元年公羊傳元者何君之始年也杜氏預謂凡人君欲其體元居正故不言一年一月胡氏大紀亦謂元者義之所存後世以元為數而不知其義如漢武之初曰建元元年既曰元年則元已建矣又曰建元豈不贅乎後又因事别建失其義也三説近之苐稱元不知何昉爾其稱後元年起於漢文而紀年之號肇於漢武本皆惑於方士之言後乃一君而數改其元一年而再更厥號甚者正偽紛雜不勝其紀詎不舛與即位受朝儀詳見元志明遂有登極儀用綜經史述其源流以為嘉禮之冠紀元則一以正統為綱而侯國及僭偽並附焉通鑑前編甲辰陶唐氏帝堯元載乃命羲和在位一百載邵子皇極經世歷係命羲和于元年又東漢志晉志皆曰唐堯即位羲和立象儀則是命羲和帝堯即位之初政也書舜典正月上日受終于文祖傳上日朔日也蔡傳堯于是終帝位之事而舜受之也月正元日舜格於文祖傳月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告子疏舜至于文祖之廟告已將即正位為天也前以攝位告今以即位告也蔡傳春秋國君皆以遭喪之明年正月即位於廟而改元孔氏云喪畢之明年不知何所據也鄒氏季友曰案孟子言堯崩三年喪畢舜避堯之子天下歸之而後踐天子位孔傳本此蔡傳豈偶未之思與通鑑前編丙戌有虞氏帝舜元載紀元表丙戌虞帝舜元載正月元日即天子位在位五十年右唐虞書大禹謨正月朔旦受命於神宗率百官若帝之初蔡傳禹受攝帝之命於神宗之廟通鑑前編丙子夏后氏大禹元嵗春正月即位會諸侯於塗山紀元表丙子夏帝禹元載正月即天子位改載曰嵗通鑑前編甲申后啓元嵗在位九嵗子太康立金氏履祥曰三代以來嗣君皆逾年而稱元與堯舜禹之間不同故胡氏大紀於甲申書元載今從之或曰是時三年之喪未畢益未有箕山之避啓未膺朝覲訟獄之歸宜未王也何以稱為元年是不然古者稱元無大意義特以其君天下之始計年耳况益之相禹異於禹之相舜禹之相舜異於舜之攝堯孟子之俱以薦言者推堯舜禹之心也其俱以避言者推禹益之心也事迹固自不同故胡氏于明年書益歸政就國而不言避是為得之紀元表癸巳太康元嵗尸位在位二十九嵗弟仲康立壬戌仲康元嵗肇位四海在位十三嵗子相踐位乙亥后相元嵗羿篡位寒浞又殺羿代之二十八嵗浞子澆弒王后緡歸有仍癸卯少康元嵗后緡生少康於有仍四十嵗始即天子位共六十一嵗子杼踐位金氏履祥曰自此以後皇極經世缺四十年不書而皇王大紀即以少康生之年為元載蓋少康既生則夏統不絶也宗元案大紀即以少康生之年為元載而皇極經世亦缺四十年不書極是後來如王莽十八年不書亦與此同義蓋光武旋即中興則漢統亦未絶也甲辰后杼元嵗在位十七嵗辛酉后槐元嵗在位二十六嵗子芒踐位丁亥后芒元嵗在位十八嵗子泄踐位乙巳后泄元嵗在位十六嵗子不降踐位辛酉后不降元嵗在位五十九嵗弟扄立庚申后扄元嵗在位二十一嵗子厪踐位辛巳后厪元嵗在位二十一嵗不降之子孔甲立壬寅后孔甲元嵗在位三十一嵗子臯立癸酉后臯元嵗在位十一嵗子發立甲申帝發元嵗在位十九嵗子癸踐位是為桀壬寅后癸元嵗戊寅商侯履元嵗五十三嵗湯放桀於南巢右夏通鑑前編乙未商王成湯十有八祀在位十三祀太子太丁早卒弟外丙立胡氏宏大紀論曰古史不載湯改元獨劉道原載之非其實也夫人君即位之一年謂之元年一定而不可易也成湯之元立于桀之三十五載矣其所以克享天心受天明命以有九有之師爰革夏正本是而為之者也又可改乎元者義之所存非若一二之為數也後世以元為數而不知其義如漢武之初年曰建元元年既曰元年則元已建矣又曰建元豈不贅乎後又因事別建年號失其義也甚矣使人君知此義而體之則元原於一豈至如是之紛紛乎觀承案胡氏以湯之元立於后癸之三十五祀考之紀元表實三十七祀也然湯以侯服之十八祀統紀於割正之十三載而不改元議者曰所以克享天心者實基於此則周以虞芮質成為文王受命之始不其然乎武王繼西伯肆伐以十三年即天子位而不改元亦一義也竊謂元者紀一君之終始崛起之聖寖昌有自而維新之命即新于厭德之年逮奄有四海告成功而已德業之丕揚何藉于改元以為重而仄微之積纍又何可因改步而頓泯耶則創業必昭乎勝國之紀而垂統乃肇興朝之盛代終之義固如此或者以統系之説為疑不知禪代推遷各有本末自堯甲辰以來興衰治亂修短之數紀於歷次者可逆覩也孰能從而矯誣之則固無害于統系也史記殷本紀帝外丙即位紀元表戊申帝外丙元祀在位二祀弟仲壬立崩書序及通鑑前編俱作湯時外丙二嵗仲壬四嵗皆以幼故不立太甲差長立之今從史記紀元蕙田案史記明據自不宜廢大紀以立嫡之義斷其不立外丙恐未確今從集成史記殷本紀帝仲壬即位紀元表庚戌帝仲壬元祀在位四祀太丁之子太甲立書伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冡宰傳此湯崩踰月太甲即位奠殯而告居位主喪湯疏伊尹祠于先王謂祭湯也奉嗣王祗見厥祖謂見也故傳解祠先王為奠殯而告見厥祖為居位主喪是言祠是奠也祠喪于殯斂祭皆名為奠虞祔卒哭始名為祭知祠非宗廟者元祀即是初喪之時未得祠廟且湯之父祖不追為王所言先王惟有湯耳故知祠實是奠非祠宗廟也蔡傳夏曰嵗商曰祀周曰年一也元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也祠者告祭於廟也古者王宅憂祠祭則冡宰攝而告廟太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也或曰孔氏言湯崩踰月太甲即位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑于序書之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣又曰孔氏意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容伊尹有之不可以不辨又案孔氏以為湯崩吳氏曰殯有朝夕之奠何為而致祠主喪者不離於殯側何待於祗見蓋太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也嗣叔父而王而為之服三年之喪為之後者為之子也太甲既即位于仲壬之柩前方居憂于仲壬之殯側伊尹乃至商之祖廟遍祠商之先王而以立太甲告之不言太甲祠而言伊尹喪三年不祭也奉太甲遍見商之先王而獨言祗見厥祖者雖遍見先王而尤致意於湯也湯既已袝於廟則是此書初不廢外丙仲壬之事但此書本為伊尹稱湯以訓太甲故不及外丙仲壬之事耳蘇氏軾曰太史公案世本湯之後二帝七年而後至太甲其迹明甚不可不信而孔安國獨據經臆度以為成湯沒而太甲立且以是嵗改元學者因謂太史公為妄初無二帝而太史公妄增之豈有此理哉安國謂湯崩之嵗而太甲改元不待明年者亦因經以臆也朱子語類伊尹祠于先王若有服不可入廟必有外丙二年仲壬四年問書序成湯既沒太甲元年玩其語意似成湯沒而太甲立或者乃曰孟子云湯崩太丁未立外丙二年仲壬四年湯沒六年西太甲立太甲服仲壬之喪伊川謂太丁未立而死外丙方二嵗仲壬方四嵗乃立太丁之子太甲而或者又謂商人以甲乙為兄弟之名則丙當為兄而壬當為弟豈有兄二嵗而弟四嵗乎案皇極經世圖紀則太甲實繼湯而立無疑曰書序恐只是經師所作然亦無證可考但決非夫子之言耳成湯太甲年次尤不可考問康節之説亦不可據耶曰也怎生便信得他又問如此則堯即位于甲辰亦未可據也曰此却據諸歷書如此説恐或有之然亦未可必問若如此則二年四年亦可推矣曰却為中間年代不可紀自共和後方可紀則湯時自無由而推胡氏一桂曰湯後有外丙仲壬二王蔡氏力主之邵子經世書又合孔注朱子孟子集注亦云二説未知孰是闕之可也王氏樵曰觀先王厥祖上下異文則先王是湯之先廟厥祖是湯可知且于先王曰祠而於厥祖為祗見祠是祭祗見非祭也祠先王曰伊尹而見厥祖曰奉嗣王是廟中之祭攝于伊尹殯前之告非伊尹所攝也又曰蔡氏云先王湯也又云遍祀商之先王蓋以外丙仲壬為先王而不知湯以上尚當有先王也如其言先祠丙壬後見烈祖無乃非序乎若以先王中有湯則下祗見為復矣既以所居為仲壬之喪則仲壬亦未在應祠之內蕙田案太甲元祀之説史記孟子皆有外丙仲壬之六年朱子蔡氏從之書序及注疏皆以為太甲繼湯而立程子邵子胡五峰大紀金仁山通鑑前編從之今據史記孟子而並載諸儒之説學者兩存而從胡雙峰闕疑之意可也紀元表甲寅帝太甲元祀在位二十七祀廟號太宗子沃丁立通鑑前編辛巳帝沃丁元祀在位二十九祀弟太庚立庚戌帝太庚元祀在位二十五祀子小甲立金氏履祥曰兄死弟及自太庚始謂為殷禮非也伊尹曰七世之廟可以觀德父子相傳為一世若兄弟則昭穆紊矣沃丁及見伊尹之典刑死而傳弟當必有故而典籍無可考後世沿襲諸弟子或爭立遂啓亂源是以聖人立法不立異以為髙蕙田案金氏之論正矣然以七世之廟為伊尹之典刑兄弟則昭穆紊非也若然則太甲繼湯昭穆先紊矣不知兄弟繼及亦同一世不害於七世之廟也夫父死子繼者至正之理兄終弟及者遇變之事天子繼統關係甚巨未可以一例執也前後皆有之矣金氏不信外丙仲壬而取胡氏之論其即此意也夫紀元表乙亥帝小甲元祀在位十有七祀弟雍已立壬辰帝雍已元祀在位十有二祀弟太戊立甲辰中宗帝太戊元祀在位七十五祀子仲丁立己未帝仲丁元祀在位十有三祀弟外壬立壬申帝外壬元祀在位十五祀弟河亶甲立丁亥帝河亶甲元祀在位九祀子祖乙立丙申帝祖乙元祀在位十九祀子祖辛立乙卯帝祖辛元祀在位十六祀弟沃甲立辛未帝沃甲元祀在位二十五祀祖辛之子祖丁立丙申帝祖丁元祀在位三十二祀沃甲之子南庚立戊辰帝南庚元祀在位二十五祀祖丁之子陽甲立癸巳帝陽甲元祀在位七祀弟盤庚立庚子帝盤庚元祀改國號曰殷在位二十八祀弟小辛立戊辰帝小辛元祀在位二十一祀弟小乙立己丑帝小乙元祀在位二十八祀子武丁立丁巳殷髙宗武丁元祀在位五十九祀子祖庚立丙辰帝祖庚元祀在位七祀弟祖甲立癸亥帝祖甲元祀在位三十三祀子廪辛立丙申帝廪辛元祀在位六祀弟庚丁立壬寅帝庚丁元祀在位二十一祀子武乙立癸亥帝武乙元祀在位四祀子太丁立丁卯帝太丁元祀在位三祀子帝乙立庚午帝乙元祀在位三十七祀于辛立是為紂丁未帝辛元祀十三祀命周侯昌為西伯二十一祀丁卯周侯發元年己卯三十三祀周侯發克商滅紂右商通鑑前編己卯周武王十有三年一月癸巳于征伐商金氏履祥曰序稱十一年書稱十三年程子謂必有一誤而伏生大傳史記太初歷邵子皇極經世皆係之十一年大衍歷謂伐商之嵗在武王十年則一與三字皆誤朱子謂泰誓稱十有三年洪範又云惟十有三祀則十三年為是廣漢張氏從之而經世紀年乃未及改每以為憾今從朱子紀元表己卯周武王十三年二月即天子位改祀曰年是年焦祝薊陳杞齊魯燕管蔡俱始封在位十九年子成王誦立丙戌成王元年是年魯公伯禽元年三年宋微子啓衛康叔封元年八年蔡仲胡元九唐侯叔虞元在位三十七子康王釗立書顧命呂氏祖謙曰天子天下之共主也成王力疾臨廟朝而命之畢召受遺率諸侯而輔之所以公天位嚴大寶世稱漢武帝拔霍光于宿衛托以幼孤為知人不知所謂大臣非可寄安危屬存亡者不在此選如周召內為師保外統諸侯君存則輔政君沒則托孤所謂受遺蓋其職也林氏之奇曰後世人主將托後嗣獨引親信入受遺詔謂之顧命之臣唐漢末雖有嫡嗣不能屬于大臣多立自戚宦之手倉卒之際廢立紛然顧命一書誠萬世之法惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事朱子語録召公冡宰畢公司馬毛公司空是三公芮伯司徒彤伯宗伯衛侯司寇是三孤孔氏以髙官兼攝下司漢世以來謂之領故召畢毛皆稱公傳皆稱領而芮彤衛則但稱本爵也林氏之奇曰此謂紀述一時所命之人而周家命官之意見于此者有四以六卿兼主三公之事一也諸侯入為公卿二也公卿皆同姓之邦三也三公九卿各以其職任為尊卑不以爵秩髙下四也潘氏遴曰敘畢公於二伯後敘毛公于衛侯後敘六卿不敘三公也王曰嗚呼疾大漸惟幾病日增既彌留恐不獲誓言嗣兹豫審訓命汝鄒氏季友曰嗣謂嗣君周禮典命云諸侯之適子誓于天子攝其君注云誓猶命也明樹子不易也告命之辭致其戒勉故曰誓蔡傳不得誓言以嗣續我志從孔傳也未當兹既受命還出綴衣於庭越翼日乙丑王崩鄒氏季友曰兹既受命句還字句還音旋孔傳羣臣既受命各還本位也屬下句非蔡傳綴衣幄帳也羣臣既退徹出幄帳於庭太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗疏將正太子之尊故出于路寢門外使更逆之蔡傳桓毛二臣名伋太公望子翼室路寢旁左右翼室也逆子釗于路寢門外引入路寢翼室為居憂宗主也呂氏祖謙曰發命者冡宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防危慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主于宫掖而外庭猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也范氏祖禹曰成王崩太子必在側當是時本在內特出而迎之所以顯之于衆也王氏樵曰初喪未為梁開故以東夾室為恤宅之地金氏履祥曰天子居喪之次曰梁暗比諸侯倚廬而加楣梁此初喪未為梁暗故以東夾室為宅宗之地此下文東夾所以不陳設也王氏安石曰王宫南鄉南門王宫之外門也葉氏時曰虎賁之士非太宰之屬而太保得發之則太宰兼總兵衛亦明矣然吕伋雖掌兵非有宰臣之命則不得以擅發召公雖制命非有二卿將命亦不得以專行兵權散主不在一人可見周人制兵之深意朱氏鶴齡曰周禮虎賁氏本下大夫齊侯領之蓋以宿衛王宫為重也後世功臣子弟為列侯入宿衛亦其意史記稱太公五世反葬于周是時伋必入為王官故虎賁百人屬其統屬蕙田案此奉迎即位之禮也南門蔡氏謂為路寢門王氏謂王宫之外門考王五門自外而入為臯庫雉應路是時康王固當侍疾但亦必别有異宫如入路門當由朝門入宫門蓋命其暫還本宫而後率虎賁迎之以備禮耳所由入者實不止一門故但稱南門又以見皆朝廷之正門平日不得行至此始行之以嗣正位也專主路寢門者似狹丁卯命作册度疏周禮內史掌䇿命既作䇿書因作受册法度下文升階即位及受同祭饗皆是法度蕙田案此即位之册命也度即如後之儀注蓋預擬之越七日癸酉伯相命士須材金氏履祥曰天子七日而殯癸酉殯之明日也既殯始傳顧命材物也朝廷所須器物如下文禮器几席車輅戈鉞之類是也自此以下皆癸酉之事舊説須材為供喪者與上下文不相入蕙田案以下即位日陳設之禮也須材金氏説是若供喪不應在既殯之後狄設黼扆綴衣牖間南向敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南向敷重筍席玄紛純漆仍几越玉五重疏上云西序東嚮東序西嚮則序旁已有王之坐矣下句陳玉復云在東序西序者明于東西序坐北也西序二重東序三重二序共為列玉五重陳寶疏陳先王所寶之器物赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兑之戈和之弓垂之竹矢在東房蕙田案此路寢堂上之陳設也大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前蕙田案此路寢庭之陳設也二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階疏立畢門及夾兩階服辨者皆士也以去殯逺故使士為之立堂上堂外服冕者皆大夫也以去殯近故使大夫為之先門次階次堂從外向內而序之也次東西垂次側階又從近向逺而序之也前陳坐位器物皆以西為上由王殯在西序故也此執兵宿衛之人則先東而後西者以新王在東故也陳氏經曰自設黼扆至此典章文物之備一以象前王平生所坐所寶所乘所衛以起嗣王之追慕而盡誠紹述也一以昭前王委重投艱之意使嗣王肅敬以祇承也一以起羣臣諸侯之尊敬想慕前王而繫心于嗣王也一以表人主之崇髙富貴尊無二上而傳授之正如此以絶天下覬覦之萌也蕙田案此路寢宿衛之執事也合前二條陳設之儀法己備後世即位儀注多本此王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位疏王麻冕者蓋衮冕也鄭云衮之衣五章裳四章以黼有文故特言之禮君升阼階此用西階升者以未受顧命不敢當主也公卿大夫及諸侯皆同服吉服如助祭各服其冕服也蟻蟲色元禮祭服皆元衣纁裳此獨云元裳者不可全與祭同改其裳以示變于常也吕氏祖謙曰儀物既備然後延嗣王受顧命而踐位自此始稱王太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王册命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓疏鎮圭圭之大者天子之所守故奉之以奠康王所位以明正位為天子也林氏之竒曰介圭以為天子之守而冒圭以合諸侯之信故當康王之受顧命皆奉而陳之夏氏僎曰圭瑁先王所執今將授嗣王若先王豫之故自阼階而升太史執書將進之嗣王故與王接武同升蔡傳成王顧命之言書之册矣此太史口陳者也蕙田案此即位授瑁授册之禮王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三吒上宗曰饗疏天子執瑁故受瑁為主同是酒器故受同以祭三祭各用一同非一同而三反也釋詁云肅進也宿即肅也三宿為三進爵從立處而三進至神所也三祭三酹酒于神坐也每一酹酒則一奠爵三奠爵于地也經典無此吒字以既祭必當奠爵既言三祭知三吒之為奠爵也王肅亦以吒為奠爵禮於祭末必飲神之酒受神之福此非大祭故上宗以同酌酒進王讃王曰饗福酒也陳氏櫟曰吒有兩説孔氏以為奠爵蘇氏以為至齒不飲與嚌同義考字書㓃與吒同祭奠酒爵也吒本㓃字傳寫訛耳孔氏音釋云説文作㓃由是觀之則吒訓奠爵不可易鄒氏季友曰吉祭尸受酒灌于地此非吉祭不迎尸故王代尸祭酒也蕙田案此即位而告奠于殯宫也太保受同降盥以異同秉璋以酢授宗人同拜王答拜疏太保更洗異同實酒乃秉璋以酢祭于上祭後復報祭猶如正祭之亞獻也陳氏櫟曰王祭告成王言己巳受顧命也太保授同而拜告成王言己巳傳顧命也陳氏師凱曰此王答召公拜也冡宰傳顧命以相授見大臣如見先王也王答召公拜敬大臣即以敬先王也太保降收諸侯出廟門俟吕氏祖謙曰太保降收者蓋百官總已以聽召公公退則有司收徹矣俟者俟見康王于門外也鄒氏季友曰爾雅室有東西廂曰廟疏凡太室有東西廟夾室及前堂有序墻者曰廟不專以神居為廟也上文東序西序即東西廂也惟路門內有之故獨稱路門為廟門禮記聘義云三讓而後傳命三讓而後入廟門所謂廟門但指路寢之門而言初非言神居亦非因有廟也周禮司儀載諸侯相見交幣之禮亦有及廟之文今人尚有廟堂廊廟之語孔氏謂殯之所處故曰廟蔡氏因之蓋泥于神居為廟也蕙田案以上即位告殯宫之事已畢下遂臨治朝而見諸侯百辟卿士也康王之誥王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜鄒氏季友曰應字平聲為正音去聲為借音故陸氏于此無音禮記疏云應當也謂南向當朝正門也治朝在路門外王日視治之朝蕙田案應門之內蓋治朝也王氏振綱曰黃朱是幣當依蔡傳後注古人以一為奇二為偶三為參四為乘布乘黃朱言所布黃朱之幣各四也故下言奉圭兼幣圭是王朝所頒信瑞也幣是諸侯所獻壤奠也非陳四黃馬而朱其鬛也蕙田案此即位受朝而諸侯執贄以見王也古人贄見之禮莫重于玉幣故祀享神祗皆獻玉幣臣之奉君猶王之奉天王氏之説不可易也若如疏説每一諸侯皆布四馬於朝非特與執贄不合且朝內何以容之人馬相雜豈復成體統乎蔡傳再拜稽首以致敬義宜也義嗣德云者史氏之辭也康王宜嗣前人之德故答拜也答拜正其為後且知其以喪見也蕙田案此即位正其為天子而兼為後之禮故答拜太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命古今考古之揖天子以待臣下以手著胸曰揖蓋雙拱手向胸也下手曰拜吕氏祖謙曰二伯率諸侯列門左右朝會分班儀也太保芮伯咸進相揖朝會合班儀也始而分班則諸侯兩列西伯與東伯之位相對今而合班則六卿前列冡宰與司徒之位相次蕙田案此即位之後既朝而更奏告也王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付卑四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞蕙田案此𥘉即位而報告諸侯也羣公既皆聽命相揖趨出王釋冕反喪服蘇氏軾曰成王崩未葬君臣皆冕服禮與曰非禮也謂之變禮可乎曰不可禮變于不得已嫂非溺終不援也三年之喪既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可也孔子曰將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉册授王于次諸侯入哭于路寢而見王于次王喪服受教戒諫哭踊答拜聖人復起不易斯言矣春秋傳曰鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著明足以為後世法孔子何為不取哉然其失禮則不可不辨朱子語類潘時舉問康王釋喪服而被衮冕受虎賁之逆于南門之外且受黃朱圭幣之獻諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十有二月朔亦是新喪伊尹已奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣王韓文外集順宗實録中有此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣葉氏夢得曰康王此舉必有大不得已而然者蓋成王初即位猶有三監殷民之變微周公天下未可知況不及成王周公者乎故召公權一時之宜而遽正君臣之分若曰三年之喪天下之通喪也亦天下之大義也通喪天下之所同大義天子諸侯之所獨故不以通喪廢大義而吉凶又不可相亂則以冕服朝諸侯以為常禮則不可以為非禮亦不可傳及後世卒不能奪康王之所為然後知此書之録於經非孔子不能權于道以盡萬世之變也吕氏祖謙曰顧命成王所以正其終康王之誥康王所以正其始也舜除堯之喪格廟而咨四嶽成王除武王之喪朝廟而訪羣臣皆百王之正禮然成湯方沒伊尹遽偕羣后侯甸陳訓太甲焉禮固有時而變矣説者不疑太甲受伊尹之訓于居憂之時乃疑康王受畢召之戒于宅恤之日甚者以晉辭諸侯為證然則隆周之元老反不若衰晉之陪臣耶朱氏鶴齡曰以上諸説當與蘇説並存胡康侯傳春秋乃云是時成王方崩就殯猶未成服故用麻冕黼裳乃受顧命誥諸侯然後成服宅憂愚謂經文明言王反喪服則先時已成服矣禮天子七日而殯自乙丑至癸酉凡九日無不殯者殯後無不成服之禮章俊卿又言古天子諸侯既殯即嗣位改元康王所行正人君即位之常禮春秋時之踰年即位及嗣君稱子乃夫子書之以著其變周制而啓亂源此説吾尤不敢信蕙田案此條尤即位禮之有關係者惟朱子為能得古聖人經權之義葉氏吕氏説足相發明禮云喪三年不祭惟祭天地社稷祭祀尚易吉服何況即位以臨天下耶又案即位之禮惟此二篇最為詳備由是而上推之文武可知也由是而更推之夏商可知也周監二代此禮必傳之典册而非倉卒舉行者後世之禮皆權輿于此矣夫子曰所損益可知也雖百世可知也豈非考禮之大法哉故備著之以為成憲之凖紀元表癸亥康王元年十七年魯考公元位二十一年魯煬公熙元在二十六年子昭王瑕立己丑昭王元年十五年魯魏公沸元滿在位五十一年于穆王立庚辰穆王元年十四年魯厲公擢元公十七年趙造父元五十一年魯獻具元在位五十五年子共王翳扈立乙亥共王元年在位十二年子懿王囏立丁亥懿王元年在位二十五年共王之弟孝王辟方立壬子孝王元年十三年甲子封非子為附庸邑之秦為在位十五年懿王子燮立是夷王丁卯夷王元年八年楚熊渠元僣稱王王在位十六年子厲胡立癸未厲王元年是年齊胡公元二年楚熊摯紅元伯三年楚熊延元十十三年衛頃侯元二十五年曹夷喜燕惠侯元六年蔡武侯元十年齊獻公山元侯二十一年晉靖侯宜臼宋僖公舉元五二十二年秦元二十四年魯直公濞元二十年衛僖侯陳幽公寧元元二十九年齊武公壽元三三十二年秦公伯楚熊勇三十五年秦仲元十九年晉僖侯司徒元元四十二年楚熊嚴蔡夷侯元四四十五年曹幽伯疆四十八年陳釐公孝元十九年宋惠公覸元三在位五十一年三十七年己未國人叛王出居彘十八年召公周公行政號共和癸酉崩于彘子宣王靖立甲戌宣王元年是年楚熊霜元三二年燕僖侯莊元年魯武公敖曹戴伯蘇元莊四年齊厲公無忌元年六年晉獻侯籍元七年秦公楚熊徇元十三魯懿公戲齊元公赤元年十六年衛武公和元十十七年晉穆侯費元十九蔡僖侯所事元二二年魯伯御元十二十五年齊成公説元三二十八年宋戴公元靈二九年楚熊咢元三十年魯孝公稱陳武公曹惠伯兕元頃三十四年齊莊公贖元叔三十八年楚若敖熊儀燕侯元四十四年晉殤元在位四十六年太子涅踐位庚申幽王元年二年晉文侯仇元元五年秦襄公陳平公燮在位十一年庚午申侯與犬戎入冦被弒太子宜臼立辛未平王元年三年魯惠公弗涅元年五年蔡哀侯元年六年秦文公宋武公司空元元七燕鄭侯元八楚熊坎元十年蔡共侯興十二年蔡戴侯曹穆公武元元十四年楚熊珣衛莊公揚元十五年曹桓公終生十七年陳文公圉元二二十一年把武公元十四年宋宣公力元二十二年蔡宣侯考父元叔二十六年晉昭侯伯元封父成師于曲沃號桓叔莊二十七年陳桓公鮑晉曲沃桓叔元二十八年鄭公寤生元三十一年楚熊通元四三十三年晉孝侯平元沃三十七年衛桓公完元十一年齊僖公祿甫曲莊伯元四十三年宋穆公和燕穆侯元春四十八年晉鄂侯郤元年四十九年魯隱公息姑元秋之始在位五十一太子泄父早卒孫林立春秋隱公元年公羊傳元年者何君之始年也注變一為元元者氣也王者當繼天奉元善成萬物杜氏預曰凡人君即位欲其體元居正故不言一年一月也蕙田案書月正元日則日亦稱元也吕氏大圭曰不書即位禮之不舉也新君踰