祠而未嘗有事天地之禮髙皇帝平秦滅項諸侯王推戴即皇帝位于泛水之陽亦不聞有燔燎告天之事于義闕矣至文帝以後則凡嗣君即位必謁見髙廟亦受命祖宗之意通鑑十六年秋九月新垣平言臣候日再中於是始更以十七年為元年蕙田案此帝王有後元年之始後世改元皆本此七年六月丁未太子即皇帝位鄭氏樵曰漢大斂畢三公奏尚書顧命太子即日即天子位于柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入會如儀太尉升自阼階當柩御坐北面稽首讀册畢以傳國玉璽綬東面跪授皇太子即皇帝位告令羣臣羣臣皆伏稱萬嵗或大赦天下羣臣百僚罷入成喪服如禮蕙田案此禮即倣尚書顧命康王之誥二篇為之後世即位禮史雖不詳大略同此紀年表乙酉景帝元年壬辰中元年戊戌後元年在位十六年太子徹立史記孝武本紀有司言元宜以天瑞命不宜以一二數一元曰建元二元以長星曰元光三元以郊得一角獸曰元狩有司言寶鼎出為元鼎以今年為元封元年改歷以正月為嵗首因為太初元年胡氏三省曰自古帝王未有年號始起于此貢父曰封禪書云其後三年有司言元宜以天瑞命不宜以一二數推所謂其後三年者蓋盡元狩六年至元鼎三年也然元鼎四年方得寶鼎又無緣先三年稱之以此而言自元鼎以前之年皆有司所追命其實年號之起在元鼎故元封改元則始有詔書也蕙田案胡氏説是紀元表辛丑武帝建元元年六丁未元光元年六癸丑元朔元年六己未元狩元年六乙丑元鼎元年六辛未元封元年六丁丑太初元年四辛巳天漢元年四乙酉太始元年四己丑征和元年四癸巳後元元年二五在位十四年改元十一太子弗陵立乙未昭帝始元元年六辛丑元鳳元年六丁未元平元年一帝在位十三年改元三武曽孫病已立更諱詢漢書宣帝本紀元平元年昭帝毋嗣大將軍霍光奏議曰禮人道親親故尊祖尊祖故敬宗大宗無嗣擇支子孫賢者為嗣孝武皇帝曽孫病已可以嗣孝昭皇帝後奏可遣宗正德至曽孫尚冠里舍洗沐賜御府衣太僕以軨獵車奉迎曽孫就齊宗正府庚申入見未央宫見皇太后封為陽武侯已而羣臣奏上璽綬即皇帝位謁髙廟紀元表戊申宣帝本始元年四壬子地節元年四丙辰元康元年四庚申神爵元年四甲子五鳳元年四戊辰甘露元年四壬申黃龍元年一元在位二十五年改七太子奭立癸酉元帝初元元年五戊寅永光元年五癸未建昭元年五戊子竟寧元年一元在位十六年改四太子驁立己丑成帝建始元年四癸巳河平元年四丁酉陽朔元年四辛丑鴻嘉元年四乙巳永始元年四己酉元延元年四癸丑綏和元年二定在位十六年改元七陶共王子欣立乙卯哀帝建平元年四己未元壽元年二中在位六年改元二山孝王子衎立辛酉平帝元始元年五曽封王莽為安漢公秉政在位五年改元一宣帝孫嬰立號曰孺子安漢公王莽居攝踐阼丙寅孺子嬰元年王莽僣稱假皇帝安衆侯劉崇起兵二年丁卯東郡太守翟義起兵戊辰初始元年王莽廢孺子嬰為定安公篡位國號新僣稱皇帝己巳新莽始建國元年徐鄉侯劉快起兵甲戌新莽天鳯元年新四年臨準瓜田儀琅琊吕母市王匡王鳯南郡馬武王常成丹南郡張霸江夏羊牧俱起兵五年赤眉樊崇東海刁子都起兵庚辰王莽地皇元年六二年南郡秦豐平原女子遲昭平起兵陵三年景帝世孫齊武王縯及弟光武帝秀起兵舂興復漢室平林陳牧廖湛起兵癸未漢兵誅新莽淮陽王劉聖公稱帝號更始元年殺齊武王縯以光武為破虜大將軍行大司馬事梁王劉永起兵睢陽稱元年王郎僣稱漢帝元年隗囂起兵成紀彭寵起兵漁陽公孫述起兵成都甲申立光武為蕭王公孫述僣稱蜀王元年張步起兵琅琊右漢後漢書世祖本紀建武元年命有司設壇場于鄗之南千秋亭五成陌注壇謂築土場謂除地秦法十里一亭南北為阡東西為陌其地在今趙州柏鄉縣六月己未即皇帝位燔燎告天禋于六宗續漢志平帝元始中謂六宗為易卦六子水火雷風山澤也光武中興未改望于羣神其祝文曰皇天上帝后土神祗眷顧降命屬秀黎元為人父母秀不敢當羣下百辟不謀同辭咸曰王莽篡位秀發憤興兵破王尋王邑于昆陽誅王郎銅馬于河北平定天下海內蒙恩上當天地之心下為元元所歸讖記曰劉秀發兵捕不道卯金修德為天子秀猶固辭至于再至于三羣下僉曰皇天大命不可稽留敢不敬承于是建元為建武大赦天下祭祀志建武元年光武即位于鄗為壇營於鄗之陽祭告天地采用元始中郊祭故事六宗羣神皆從未以祖配天地共犢餘牲尚約蕙田案即位燔燎告天禋六宗望羣神三代後始見于此蓋是時經術大明修復唐虞之迹也紀元表乙酉後漢光武帝建武元年三十一望是年春正月方以前定安公嬰稱帝于臨涇更始遣兵擊斬之九月赤眉入長安更始奔髙陵辛未詔封更始為淮陽王冬十月淮陽王降于赤眉十二月赤眉殺淮陽王梁劉永僣稱帝元年成公孫述龍興元年僣稱帝赤眉以劉盆子僣稱帝號建世元年盧芳僣稱漢帝元年河西竇融起兵王三年赤眉平梁劉永子紆僣稱王元年燕彭寵僣稱元年淮西董憲僣稱王元年齊張步僣稱王元年淮南李憲僣稱帝元帝五年彭寵奴殺寵以降禽梁王紆竇融降張步平二九年隴西隗囂子純元年十十年隴西隗純降十年成公孫述死成都平三年盧芳亡入胸奴盧十六年盧芳降十七年芳復奔胸奴丙辰中元元年二十在位三三年改元二太子莊立戊午明帝永平元年十八一在位十八年改元太子烜立丙子章帝建初元年八甲申元和元年三丁亥章和元年二元在位十四年改三太子肇立己丑和帝永元元年十六乙巳元興元年一元在位十七年改二太子隆立丙午殤帝延平元年八月崩清河孝王子祐立後漢書安帝本紀延平元年鄧太后特詔留帝清河邸八月太后與兄車騎將軍鄧隲定䇿禁中其夜使隲持節以王青蓋卓迎帝齋于殿中皇太后御崇德殿百官皆吉服羣臣陪位引拜帝為長安侯太后詔以祐為孝和皇帝嗣奉承祖宗案禮儀奏又作䇿命讀䇿畢太尉奉上璽綬即皇帝位太后猶臨朝九月庚子謁髙廟辛丑謁光武廟紀元表丁未安帝永初元年七甲寅元𥘉元年六庚申永寧元年一辛酉建光元年一壬戌延光元年四三四年月崩在位十九年改元五閻皇后臨朝立濟北惠王子北鄉侯懿為嗣十月北鄉侯薨十一月中黃門孫程等迎立安帝子濟隂王保入即帝位後漢書順帝本紀帝諱保安帝之子也母李氏為閻皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母殺之太子數為歎息王聖等懼禍搆陷太子廢為濟隂王明年三月安帝崩北鄉侯立薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后祕不發喪而更徴立諸國王子乃閉宫門屯兵自守十一月中黃門孫程等斬江京劉安陳達等迎濟隂王于德陽殿西鍾下即皇帝位年十一近臣尚書以下從輦到南宫登雲臺召百官尚書令劉光等奏言陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛藩國天命有常北鄉不永漢德盛明福祚孔章近臣建䇿左右扶翼內外同心稽合神明陛下踐阼奉遵洪業為郊廟主而即位倉卒典章多缺請條案禮儀分别具奏制曰可乃召公卿百僚使虎賁羽林士屯南北宫諸門閻顯兄弟率兵入郭鎮斬顯弟衛尉景戊午遣使者入省奪得璽綬乃幸嘉德殿收閻顯等己未開門罷屯兵壬申謁髙廟癸酉謁光武廟蕙田案順帝被讒見廢即位自屬變禮據史即位倉卒典章多闕則其餘諸帝典章無闕可知也後漢即位禮其詳不可得聞紀元表丙寅順帝永建元年六壬申陽嘉元年四丙子永和元年六壬午漢安元年二甲申建康元年一十在位九年改元五太子炳立乙酉沖帝永嘉元年正月崩渤海孝王子纘立丙戌質帝本初元年閏六月梁冀弒帝蠡吾侯冀子志立後漢書桓帝本紀帝諱志肅宗曽孫襲爵為侯本初元年梁太后徴帝到夏門亭將妻以女弟會質帝崩遂與兄冀定䇿禁中閏月庚寅使冀持節以王青蓋車迎帝入南宫其日即皇帝位秋七月乙卯葬質帝辛巳謁髙廟光武廟蕙田案桓帝閏六月庚寅即位七月乙卯葬質帝辛巳謁廟凡五十二日是後漢制以二十七日除服後既葬而謁廟也紀元表丁亥桓帝建和元年三庚寅和平元年一辛卯元嘉元年二癸巳永興元年二乙未永壽元年三戊戌延熙元年九冀二年梁伏誅丁未永康元年一改在位二十一年元七解瀆亭侯萇子宏立後漢書靈帝本紀帝諱宏襲侯爵桓帝崩無子皇太后與父城門校尉竇武定䇿使劉鯈持節左右羽林至河間奉迎建寧元年春正月帝到夏門亭使竇武持節以王青蓋車迎入殿中庚子即皇帝位二月辛酉葬桓帝庚午謁髙廟辛未謁世祖廟蕙田案靈帝即位而葬桓帝後謁廟與桓帝同紀元表戊申靈帝建寧元年四壬子熹平元年六戊午光和元年六甲子中平元年黃巾賊張角等始作亂六二年黑山張燕起兵年帝崩臨在位二十一年改元四皇子辨立是為少帝何太后朝改元光熹八月又改元昭寧九月董卓廢帝為𢎞農王弟協立是為獻帝改元永漢十二月詔除光熹昭寧永漢三號復還中平六年曹操起兵庚午獻帝初平元年是年關東州郡起兵討董卓推袁紹為盟主董卓以帝遷都于長安孫堅起兵討卓年二年孫堅卒于策嗣三董卓伏誅甲戌興平元年是年孫䇿據江南丙子建安元年是年曹操遷帝于許室二年袁術稱帝于壽春四年漢宗昭烈帝備起兵討曹操袁五年孫䇿卒弟權立為七年袁紹卒年九年曹操滅氏十八年封曹操魏公十九昭烈取成都十二十一年進封曹操為魏王二三年昭烈帝稱漢中王庚子延康元年一是年春正月魏王曹操薨太子丕立冬十月獻帝禪位于魏魏封帝為山陽公在位三十二年改元四魏文帝黃初元年代神元帝拓拔力微元年是為北魏始祖右後漢三國志蜀先主傳章武元年即皇帝位于成都武擔之南為文曰惟建安二十六年四月丙午皇帝備敢用元牡昭告皇天上帝后土神祗漢有天下歷數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復存今曹操阻兵安忍戮弒主后滔天泯夏罔顧天顯操子丕載其凶逆竊居神器羣臣將士以為社稷隳廢備宜修之嗣武二祖龔行天罰備雖否德懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天明命又懼漢邦將湮于地謹擇元日與百寮登壇受皇帝璽綬修燔瘞告類于天神惟神饗祚于漢家永綏四海蕙田案陳壽作三國志魏主稱紀而蜀主稱傳蓋典午得統于魏當時不得不以魏為正統而後之論者往往譏之今觀先主傳中詳載告天之文而魏吳即位俱從其闕蓋隱然以正統與之亦可以稍諒其心矣觀承案陳史紀魏傳蜀似乎以魏為統也然不直云魏書而曰三國志則魏一國耳何統之有先主告天文出自丹誠上規誥誓足垂不朽備載之直筆也乃隱含帝蜀倣佛春秋之旨意深哉稱為良史才信矣紀元表辛丑漢昭烈帝即皇帝位建元為章武元年是年封孫權為吳王吳黃武元年立即帝位三年崩改元一太子禪三國志蜀後主傳章武三年夏四月先主殂于永安宫五月後主襲位于成都大赦改元蕙田案繼嗣之君以即位之明年改元此古今通禮也後主以章武三年即位即改其年五月以後為建興元年先儒所謂崩年改元亂世之事蓋始于此觀承案崩年改元實乖舊典遂貽後世口實然先主既東挫於吳又即崩於永安岌岌殆哉則建號改元有萬不得已者故曰東漢人才可與立三國人才可與權紀元表癸卯漢後主建興元年四年魏文帝崩太子睿立是為明帝五年魏明帝太和元一七年吳黃龍元吳王稱帝景十年吳嘉禾元十年魏青龍元十五年魏初元戊午漢延熙元年二十子是年吳赤烏元齊二年魏明帝崩太芳立三年魏王芳正始元月十二年魏嘉平元孫十四年吳太元元建十五年二吳改元神鳳四月權薨子亮立改為興十七年魏司馬師廢其主芳為齊王迎立髙貴鄉公髦改元為正元吳五鳳元十九年魏甘露元吳太平元戊寅漢景耀元年五廢是年魏封司馬昭為晉公吳孫綝其主亮立琅琊王休改元永安立三年司馬昭弒其主髦迎常道鄉公奐改為景元癸未漢炎興元年十月為魏所滅一在位四十年改元四右蜀漢甲申魏咸熙元年進封司馬昭為晉王馬二年十二月禪位于晉王太子司炎晉封為陳留王晉書武帝本紀泰始元年冬十二月景寅設壇于南郊百僚在位及胸奴南單于四裔會者數萬人柴燎告類于上帝曰皇帝臣炎敢用玄牡明告于皇皇后帝魏帝稽協皇運紹天明命以命炎昔者唐堯熙隆大道禪位虞舜舜又以禪禹邁德垂訓多歷年載暨漢德既衰太祖武皇帝撥亂濟時扶翼劉氏又用受命于漢粵在魏室仍世多故幾于顛墜實賴有晉匡拯之德用獲保厥肆祀𢎞濟於艱難此則晉之有大造於魏也誕惟四方罔不祗順廓清梁岷包懷揚越八紘同軌祥瑞屢臻天人協應無思不服肆豫憲章三后用集大命于兹炎維德不嗣辭不獲命於是羣公卿士百辟庶僚黎獻陪𨽻暨于百蠻君長僉曰皇天鑒下求人之瘼既有成命固非克讓所得距違天序不可以無統人神不可以曠主炎虔奉皇運寅畏天威敬簡元辰升壇受禪告類上帝永答衆望禮畢即洛陽宫辛太極前殿紀元表乙酉晉武帝泰始元年十年是年吳甘露元年二吳寶鼎元五吳建衡元元八年吳鳯凰乙未咸寧元年五年是年吳天册元年二吳天璽元三吳天紀元為五年以胸奴劉淵左部帥庚子太康元年十皓是年吳主孫降吳亡晉書孝惠帝紀太熙元年四月己酉武帝崩是日皇太子即皇帝位大赦改元為永熙永平元年春正月乙酉朔臨朝不設樂詔曰朕夙遭不造淹恤在疚賴祖宗遺靈宰輔忠賢得以眇身托于羣后之上昧于大道不明於訓戰戰兢兢夕惕若厲乃者哀迷之際三事股肱惟社稷之重率遵翼室之典猶欲長奉先皇之制是以有永熙之號然日月踰邁已涉新年開元易紀禮之舊章其改永熙二年為永平元年蕙田案晉惠帝亦以武帝崩年改元旋以非禮至明年又改元故有此詔又案紀元表書庚戌惠帝永熙元年不書武帝太熙之號非也當云庚戌太熙元年四月帝崩太子即位改元為永熙元年紀元表庚戌惠帝永熙元年一二是年四月武帝崩在位十六年改元三太子衷立六月改元為永熙元年辛亥惠帝永平元年三月改元為元康元年九庚申永康元年一辛酉永寧元年一王正月趙倫篡位改為建始元年四月帝復位前涼張軌初為涼州刺史後蜀李特據蜀壬戌太安元年二二年後蜀李特建初元特死弟流自稱益州牧張昌據江夏反稱神鳯元甲子春正月改元永安秋七月改元建武十一月復改元為永安十二月改為永興元年二漢是年前趙劉淵元熙元僣稱王國號後蜀李特子雄建興元僣稱成都王丙寅光熙元年一號是年後蜀李雄太武元僣稱帝國成在位十七年太弟熾立丁卯懷帝永嘉元年六稱是年前燕慕容廆據棘城自鮮卑大單于二年代穆帝拓跋猗盧元前趙劉淵永鳯元僣稱帝前三年前趙劉淵河瑞元四年封拓跋猗盧為代公趙劉淵卒長子和立一月和弟聰弒和自立改為光興元年前涼張軌都督隴右在位六年改元一武帝孫秦王業立癸酉愍帝建興元年四子二年前涼張軌為涼州牧卒實立三年封拓跋猗盧為代王前趙劉聰建元元制四年劉曜陷長安愍帝蒙塵宣帝曽孫琅琊王睿承江東是為元帝前趙劉聰麟嘉元丁丑晉元帝建武元年四月即晉王位晉書禮志元帝為琅琊王將即極位告廟王導書問賀循云或謂宜祭壇拜受天命者或謂直當稱億兆羣情告四祖之廟而行者若爾當立行廟主今固辭尊號俯順羣情還依魏晉故事然魏晉皆稟命而行不知今進璽當云何循答曰愚謂告四祖之廟而行蜀書劉先主初封漢王時羣臣共奏上勳德承以即位今雖事不正同然議可方論導又書曰得刁僕射書曰如此京兆是宣帝祖章郡是父也至惠帝為七廟至懷德京兆府君應落想足下亦是識刁侯不欲告惠懷二帝不知於禮云何循答曰古禮及漢氏之初皆帝帝異廟即位大事謁于太祖故晉文朝于武宫漢文謁于髙廟也至光武之後惟有祖宗兩廟而已祖宗兩廟昭穆皆共堂别室魏晉依之亦惟立一廟則一廟之中茍在未毁恐有事之日不得偏有不告然人不詳太廟定議不敢必據欲依古禮惟告宣帝一廟人意以祖宗非一且太廟合共事與古異不得以古禮為斷蕙田案宗廟同堂異室遍告為是紀元表戊寅晉元帝太興元年三月即皇帝位四前是年趙劉聰子粲立改元漢昌一月為靳隼所弒淵族子曜立改元為光初二年前趙劉曜始改國號曰趙後趙石勒僣稱趙王元年四三年前涼張實弟茂立仍稱建興八年年代惠帝拓跋賀傉元壬午永昌元年一元在位六年改三子紹立癸未明帝太寧元年三涼是年前張茂仍稱建興十一年衍在位三年改元一太子立丙戌成帝咸和元年九年三後趙石勒太初元石四年代烈帝拓跋翳槐元後趙滅前趙五年後趙勒建平元年僣稱帝八年前燕慕容廆子皓立立九年後趙石勒子宏延熙元僣稱帝後蜀李特孫班五月雄子越弒之立雄第四子期僣稱帝乙未咸康元年八勒是年代焬帝紇那後元年後趙石從子虎建武元僣稱天王後蜀李期五恆元年三年代烈帝翳槐後元年前燕慕容皓僣稱工四代髙祖拓跋什翼犍建國元後蜀李特姪夀漢興元改國號漢王在位十七年改元二弟琅琊嶽立癸卯康帝建元元年二年是年前涼張駿仍稱建興三十在位二年改元一太于𣆀立晉書禮志康帝立凖禮將改元尚書下侍御史太常主者殿中屬應告廟其敕禮官并太史擇吉日撰祝文及諸應所用備辦符到奉行博士徐禪議曰案魯文公之書即位也僖公未葬蓋改元之道宜其親告不以喪闕昔代祖受終亦在諒暗既正其位於天郊必告成命于父祖事莫大于正位禮莫盛于改元傳曰元始也首也善之長也故君道重焉謂應告尚書奏案惠帝起居注改永熙二年為永平元年使持節太尉石鑒造于太廟前朝明凖不應革易如禪議蕙田案徐禪議是紀元表乙巳穆帝永和元年十二興是年前涼張駿仍稱建三十三年二年後蜀李𫝑嘉寧元前涼張駿子重華立年三年後蜀降前涼張重華仍稱建興三十五年四前燕慕容皓子雋立子五年後趙石虎大寧元正月僣稱帝夏四月虎卒幼世立一月庶長子遵弒世自立十一月冉閔弒遵立虎子鑒改元為青龍前燕慕容雋元閔六年後趙石虎族子祗僣稱帝于襄國改元永寧冉永興元僣稱帝國號魏前秦符洪僣稱三秦王子七年後趙石祗為其將劉顯所弒後趙亡前秦苻洪健皇始元僣稱天王國號秦稱八年前燕慕容雋元璽元僣稱帝滅閔前秦苻健僣帝九年前涼張重華子曜靈立二月國人廢之立駿子祚子十年前涼張祚和平元僣稱王尋為國人所殺重華元靚立十一年前秦苻健子生壽光元僣稱帝前涼張元靚復稱建興四十三年丁巳升平元年五燕是年前慕容雋光壽元前秦苻洪季子堅永興元熙三年前秦苻堅甘露元四年前燕慕容雋子暐建元在位十七年改元二成帝長子琅琊王丕立壬戌哀帝隆和元年一癸亥興寧元年三三是年前涼張元靚子天錫立廢在位年改元二弟東海王奕立後丙寅廢帝太和元年六辛未十一月帝廢元帝子會稽王昱立是為簡文帝改元為咸安元年二年簡文帝崩太子曜立癸酉孝武帝寧康元年三丙子太元元年二十一降是年前涼張天錫于前秦九年後秦姚萇白爵元僣稱王後燕慕容垂燕元元僣稱王西燕慕容泓燕興元僣稱王十年前秦苻堅子丕太安元僣稱帝右丞相竇衝叛自稱秦王改元元光西秦乞伏國仁建義元秦封為苑川王是為西秦西燕慕容暐弟沖更始元國十一年北魏道武帝拓跋圭登國元年即代王位改號魏前秦符堅族孫登太初元後秦姚萇建初元僣稱帝後燕慕容垂建興元僣稱帝西燕慕容沖為其將韓延所殺延立沖將假隨為燕王改元昌平伏誅立慕容覬為燕王改元建明慕容韜殺顗立沖子瑶為帝改元建平慕容永殺瑶立泓子忠為帝改元建武立三月武衛將軍刁雲等殺之推永為主改元中興自二月至六月凡五改元後涼吕光大安元僣稱酒泉公秦十三年後涼吕光麟嘉元僣稱三河王十九年前符堅子崇延初元國亡後秦姚萇長子興皇初元僣稱帝西燕滅于後燕子二十一年北魏皇始元始建天子旌旗後燕慕容垂寶永康元後涼吕光龍飛元僣稱天王國號涼在位二十四年太子德宗立丁酉安帝隆安元年五是年後燕慕容寶永康二年慕容皓曽孫詳自立改元建始垂少子麟殺之自立尋又立皓少子德是為南燕寶奔尚書蘭汗汗弒寶自立改元青龍南涼秃髮烏孤太初元僣稱西平王北涼假業神璽元僣稱建康公二年北魏天興元年南燕慕容德元僣稱燕王後燕慕容寶子盛建平元篡三年後秦姚興𢎞始元後涼吕光嫡子紹立五日紹庶兄篡弒紹自立改元咸寧北涼假業天璽元僣稱涼王後燕慕容盛長樂元四年南涼秃髮烏孤弟利鹿孤建和元僣稱涼王西涼李皓庚子元僣稱涼公南燕慕容德建平元僣稱帝五年後涼吕光弟隆神鼎元後燕慕容垂子熙光始元北涼沮渠蒙遜永安元殺假業僣稱張掖公壬寅元興元年三舉是年南涼秃髮烏孤第三弟傉檀𢎞昌元桓元兵反稱大亨元二年元篡位更號楚改元建始又改為永始檀三年北魏天賜元帝復位南涼秃髮傉畏秦強去𢎞昌年號乙巳義熙元年十四元是年南燕慕容德兄子超太上元西涼李皓建初三年北燕髙雲正始元僣稱天王滅後燕明四年南涼秃髮傉檀復改為嘉平元北魏道武太子元帝永興元西秦乞伏乾歸更始元北燕馮跋太平元僣稱天王元八年西秦乞伏乾歸子熾磐永康元北涼沮渠蒙遜始元僣稱河西王九年夏赫連勃勃鳯翔元長十年北魏神瑞元三十二年北魏泰常元後秦姚興子泓永和元十年西涼李皓子歆嘉興元琅在位十四年弟琊王德文立己未恭帝元熙元年二連是年夏赫勃勃真興元于二年禪位宋右晉五禮通考卷一百二十八
