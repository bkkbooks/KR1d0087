body:
  text: 五禮通考卷十二刑部尚書秦惠田撰吉禮十二圜丘祀天宋史太祖本紀乾德元年十一月甲子有事南郊大赦改元百官奉玉冊上尊號禮志乾德元年始有事於南郊自五代以來喪亂相繼典章制度多所散逸至是詔有司講求遺逸遵行典故以副寅恭之意是歳十一月十六日合祭天地于圜丘初有司議配享請以禧祖升配張昭獻議曰隋唐以前雖追立四廟或六七廟而無徧加帝號之文梁陳南郊祀天皇配以皇考北齊圜丘祀昊天以神武升配隋祀昊天於圜丘以皇考配唐貞觀初以髙祖配圜丘梁太祖郊天以皇考烈祖配恭惟宣祖皇帝積累勲伐肇基王業伏請奉以配享從之南郊壇制梁及後唐郊壇皆在洛陽宋初始作壇於東都南薰門外四成十二陛三壝設燎壇於内壇之外丙地髙一丈二尺設皇帝更衣大次於東壝東門之内道北南向乾德元年八月禮儀使陶榖言饗廟郊天兩日行禮從祀官前七日皆合於尚書省受誓戒自來一日之内受兩處誓戒有虧䖍潔今擬十一月十六日行郊禮望依禮文於八日先受從享太廟誓戒九日別受郊天誓戒其日請放朝參從之自後百官受誓戒於朝堂宗室受於太廟祭之日均用丑時秋夏以一刻春冬以七刻前二日遣官奏告配帝之室儀鸞司設大次小次及文武侍臣蕃客之次太常設樂位神位版位等事前一日司尊彛帥其屬以法陳祭器於堂東僕射禮部尚書視滌濯告潔禮部尚書侍郎省牲光禄卿奉牲告充告備禮部尚書視鼎鑊禮部侍郎視腥熟之節祭之旦光禄卿率其屬取籩豆簠簋實之及薦腥禮部尚書率其屬薦籩豆簠簋户部兵部工部尚書薦三牲之腥熟俎禮畢各徹而有司受之以出晡後郊社令帥其屬掃除御史按視之奏中嚴外辦以禮部侍郎請解嚴以禮部郎中贊者設亞終獻位於小次之南宗室位於其後設公卿位於亞終獻之南分獻官位於公卿之後執事者又在其後俱重行西向北上其致福也太牢以牛左肩臂臑折九箇少牢以羊左肩七箇犆豕以左肩五箇有司攝事進胙皆如禮太尉展視以授使者再拜稽首既享大宴號曰飲福自宰臣而下至應執事及樂工馭車馬人等並均給有差以為定式是歳十一月日至皇帝服衮冕執圭合祭天地于圜丘還御明徳門樓肆赦凡郊壇值雨雪即齋宮門望祭殿望拜祭日不設登歌祀官以公服行事中祀以上皆給明衣凡常祀天地宗廟皆内降御封香仍製漆匱付光禄司農寺每祠祭命判寺官緘署禮料送祀所凡祈告亦内出香遂為定制聶崇義傳吏部尚書張昭等奏議曰案崇義稱祭天蒼璧九寸圓好祭地黄琮八寸無好圭璋琥並長九寸自言周顯徳三年與田敏等案周官玉人之職及阮諶鄭𤣥舊圖載其制度臣等案周禮玉人之職只有璧琮九寸瑑琮八寸及璧羨度尺好三寸以為度之文即無蒼璧黄琮之制兼引注有爾雅肉倍好之說此即是注璧羨度之文又非蒼璧之制又詳鄭𤣥自注周禮不載尺寸豈復別作畫圖違經立異又配合羨度肉好之言彊為尺寸古今大禮順非改作於理未通又據尹拙所述禮神之六玉稱取梁桂州刺史崔靈恩所撰三禮義宗内昊天及五精帝圭璧琮璜皆長尺二寸以法十二時祭地之琮長十寸以傚地之數又引白虎通云方中圓外曰璧圎中方外曰琮崇義非之以為靈恩非周公之才無周公之位一朝撰述便補六玉闕文尤不合禮臣等以靈恩所撰之書聿稽古訓祭玉以十二為數者蓋天有十二次地有十二辰日有十二時封山之玉牒十二寸圜丘之籩豆十二列天子以鎮圭外守宗后以大琮内守皆長尺有二寸又祼圭尺二寸王者以祀宗廟若人君親行之郊祭登壇酌獻服大裘搢大圭行稽奠而手秉尺二之圭神獻九寸之璧不及禮宗廟祼圭之數父天母地情亦奚安則靈恩議論理未為失文獻通考先是詔以冬至有事南郊有司言冬至乃十一月晦前一日皇帝始郊不應近晦乃改用十六日甲子十三日上宿齋于崇元殿翌日服通天冠絳紗袍執鎮圭乗玉輅由明徳門出羣臣夾侍鹵簿前導赴太廟五鼓朝享禮畢質明乗輅赴南郊齊于帷宮上初詣太廟乗玉輅左諫議大夫崔頌攝太僕上問儀仗名物甚悉頌應對詳敏上大恱十六日服衮冕執圭合祭天地於圜丘以皇弟開封尹為亞獻興元尹光美為終獻將升壇有司具黄褥為道上曰朕潔誠事天不必如此命徹之還宮將駕金輅顧左右曰于典故可乗輦否對以無害乃乗輦壬申以南郊禮成大宴廣政殿號曰飲福自是為例五代以來宰相為大禮使太常卿為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使京府尹為橋道頓遞使宋制大禮頓遞如舊而大禮使或以親王為之又耑以翰林學士為禮儀使其儀仗鹵簿使或以他官充是年司徒兼侍中范質為南郊大禮使翰林學士承㫖禮部尚書陶榖禮儀使刑部尚書張昭鹵簿使御史中丞劉温叟儀仗使皇弟開封尹光義為橋道頓遞使太平興國元年始鑄五使印石林葉氏曰南郊五使唐制甚詳考於會要纔見長慶後有以太常卿為禮儀使御史中丞為大禮使者不知禮儀大禮何以為別也其以宰相為大禮使兵部尚書為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使開封尹為橋道使者蓋後唐之制故本朝用之但改太常卿為禮儀使爾太常卿既不常置而中丞兵部官或缺則例以學士及他曹尚書侍郎代之大禮掌贊相鹵簿掌儀衞橋道掌頓遞禮儀掌禮物儀仗無正所治事但督察百司不如禮者而已真宗東封西郊嘗耑用輔臣天禧後罷至元符初始詔並用執政遂著為令宋史樂志建隆郊祀八曲降神髙安在國南方時維就陽以祈帝祉式致民康豆籩鼎俎金石絲簧禮行樂奏皇祚無疆皇帝升降隆安步武舒遲陞壇肅祗其容允若于禮攸宜奠玉幣嘉安嘉玉制幣以通神明神不享物享于克誠奉俎豐安笙鏞備樂繭栗陳牲乃迎芳俎以薦髙明酌獻禧安丹雲之爵金龍之杓挹于尊罍是曰清酌飲福禧安潔兹五齊酌彼六尊致誠斯至率禮彌敦以介景福永隆後昆重熙累洽帝道攸尊亞獻終獻正安謂天蓋髙其聽孔卑聞樂歆德介以福禧送神髙安倐兮而來忽兮而迴雲馭杳邈天門洞開蕙田案親郊始于乾德而樂章製自建隆故史仍其舊且三年之中或自有遣官之祭亦須奏樂也又案宋志鼔吹樂中別有南郊導引十二時奉禋歌諸樂皆祭事前後所奏然語同詞曲音節靡曼禮無取焉故不備録和峴傳乾德元年十一月甲子有事于南郊丁丑冬至有司復請祀昊天上帝詔峴議其禮峴以祭義戒於煩數請罷之四年南郊峴建議望燎位通爟火太祖本紀開寶元年十一月癸夘日南至有事南郊改元大赦十惡殺人官吏受贓者不原十二月甲子行慶自開封興元尹宰相樞宻使及諸道蕃侯並加勲爵有差禮志開寶元年十一月郊以燎壇稍逺不聞告燎之聲始用爟火令光明逺照通于祀所梁周翰傳開寳二年將郊祀因上疏曰陛下再郊上帝必覃赦宥臣以天下至大其中有慶澤所未及節文所未該者所宜推而廣之方今賦稅所入至多加以科變之物名品非一調發供輸不無重困且西蜀淮南荆潭廣桂之地皆以為王土陛下誠能以三方所得之利減諸道租賦之入則庶乎均徳澤而寛民力矣蕙田案二年不郊當為元年或四年之誤四年十月甲申詔十月後犯强竊盜者郊赦不原十一月己未日南至有事南郊大赦十二月癸亥朔賜南郊官器幣有差丁夘行慶開封尹光義興元尹光美貴州防禦使徳昭宰相趙普並益食邑己巳内外文武官遞進勲爵玉海開寶四年七月甲子朔詔冬至郊祀十一月戊午親享太廟始用繡衣鹵簿己未合祭圜丘宋史太祖本紀開寶九年春正月庚辰詔郊西京三月庚寅大雨夏四月己亥雨霽庚子有事於圜丘迴御五鳳樓大赦長編通考曰恭考太祖南郊凡四自後宿齋朝享儀禮降赦率如初唯開寶四年始用繡衣鹵簿先是大駕鹵簿衣服旗幟止以五綵繪畫至是盡易以繡九年以江表底定方内大同用申報謝乃幸西京以四月有事於南郊先時霖雨彌旬及赴齋宮之日雲物晴霽觀者如堵咸相謂曰我輩少逢亂離不圖今日復睹太平天子儀衞皆相對感泣又考鹵簿凡四等大駕法駕鑾駕黄麾仗大駕郊祀籍田薦獻玉清昭應景靈宮用之文獻通考梁太祖始建都於汴然郊壇則在洛都開平二年十一月南郊帝自東京至洛都行禮自石橋備儀仗至郊壇三年正月以河南尹張宗奭為南郊大禮使後唐莊宗同光二年帝祀南郊初梁均王將郊祀于洛陽聞楊劉陷而止其儀物具在至是張全義請上亟幸洛陽謁廟畢即祀南郊從之然則梁唐行郊祀皆在洛陽國初始作郊壇于國城南薰門外開寶九年詔曰定鼎洛邑我之西都燔柴太壇國之大事今江表底定方内大同祗遹景靈用申報謝乃眷西顧郊兆存焉將飭駕以時巡躬展誠於陽位朕今幸西京以四月有事于南郊宜令有司各揚所職以是觀之藝祖親郊凡四獨是歲行之于洛陽然凡郊必以陽至之月獨是歲以四月乃是行大雩之禮蓋本非彛典帝以洛都元有郊兆是年又有欲徙都于洛之意故因西幸而特行其禮云太宗本紀太平興國三年十一月丙申祀天地于圜丘大赦御乾元殿受尊號丙午以郊祀中外文武加恩禮志自國初以來南郊四祭及感生帝皇地祇神州凡七祭並以四祖迭配太祖親郊者四並以宣祖配太宗即位其七祭但以宣祖太祖更配是歳親享天地始奉太祖升侑太宗本紀六年十一月辛亥祀天地于圜丘大赦受尊號内外文武加恩雍熙元年十一月丁巳祀天地于圜丘大赦改元中外文武官進秩有差禮志雍熈元年冬至親郊從禮儀使扈蒙之議復以宣祖配扈蒙傳初太祖受周禪追尊四廟親郊以宣祖配天及太宗即位禮官以為舜郊嚳商郊㝠周郊后稷王業所因也若漢髙之太公光武之南頓君雖有帝父之尊而無預配天之祭故自太平興國三年六月再郊並以太祖配於禮為允太宗將東封蒙定議曰嚴父莫大於配天請以宣祖配天自雍熙元年罷封禪為郊祀遂行其禮識者非之雍熈四年正月禮儀使蘇易簡言親祀圜丘以宣祖配此則符聖人大孝之道成嚴父配天之儀太祖皇帝光啟丕圖恭臨大寶以聖授聖傳於無窮案唐永徽中以髙祖太宗同配上帝欲望將來親祀郊丘奉宣祖太祖同配其常祀祈穀神州明堂以宣祖崇配圜丘北郊雩祀以太祖崇配奏可淳化三年將以冬至郊前十日皇子許王薨有司言王薨在未受誓戒之前準禮天地社稷之祀不廢詔下尚書省議吏部尚書宋琪等奏以許王薨謝去郊禮裁十日又詔輟十一日以後五日朝參且至尊成服百僚皆當入慰有司又以十二十三日受誓戒案令式受誓戒後不得弔喪問疾今若皇帝既輟朝而未成服則爽禮文百僚既受誓而入奉慰又違令式況許王地居藩戚望著親賢於昆仲為大宗於朝廷為冡嗣遽兹薨逝朝野同哀伏想聖情豈勝追念當愁慘之際行對越之儀臣等實慮上帝之弗歆下民之斯惑況祭天之禮嵗有四焉載於禮經非有差降請以來年正月上辛合祭天地從之文獻通考淳化三年禮儀使言皇帝親郊故事在京并去圜丘十里内神祠及所過橋道並差官致祭而獨遺太社太稷文宣武成王等廟今請自出宮前一日遣官致祭從之宋史太宗本紀淳化四年正月辛夘祀天地于圜丘以宣祖太祖配大赦真宗本紀至道二年正月辛亥祀天地于圜丘大赦中外文武加恩禮志真宗至道三年十一月有司言冬至圜丘孟夏雩祀夏至方丘請奉太宗配上辛祈榖季秋明堂奉太祖配上辛祀感生帝孟冬祭神州地祇奉宣祖配其親郊奉太祖太宗並配詔可真宗本紀咸平二年十一月丙戌祀天地于圜丘以太祖太宗配大赦受尊號五年十一月壬寅祀天地于圜丘大赦景德二年十一月丁巳祀天地于圜丘大赦樂志咸平親郊八首降神髙安圜丘何方在國之陽禮神合祭運啟無疆祖考來格籩豆成行其儀肅肅降福穰穰皇帝升降隆安禮備樂成乾健天行帝容有穆佩玉鏘鳴奠玉幣嘉安定位毖祀告于神明嘉玉量幣享于克誠奉俎豐安有牲斯純有俎斯陳進于上帝昭報深仁酌獻嘉安大報于帝盛德升聞醴齊良潔粢盛苾芬飲福禧安祀帝圜丘九州獻力禮行于郊百神受職靈祇格思享我明徳天監孔章元祉昭錫亞獻終獻正安羽籥云罷干戚載揚接神有恪錫羨無疆送神髙安神駕來思風舉雲飛神馭歸止天空露晞禮志景德三年鹵簿使王欽若言漢以五帝為天神之佐今在第一龕天皇大帝在第二龕與六甲岳瀆之類接席帝座天市之尊今與二十八宿積薪騰蛇杵臼之類同在第三龕卑主尊臣甚未便也若以北極帝座本非天帝蓋是天帝所居則北極在第二帝座在第三亦髙下未等又太微之次少左右執法子星之次少孫星望令司天監參驗乃詔禮儀使太常禮院司天監檢定之禮儀使趙安仁言案開寶通禮元氣廣大則稱昊天據逺視之蒼然則稱蒼天人之所尊莫過於帝託之於天故稱上帝天皇大帝即北辰耀魄寶也自是星中之尊易曰日月麗乎天百榖草木麗乎土又曰在天成象在地成形盖明辰象非天草木非地是則天以蒼昊為體不入星辰之列又郊祀録壇第二等祀天皇大帝北斗天一太一紫微五帝坐差在行位前餘内官諸位及五星十二辰河漢都四十九坐齊列俱在十二陛之間唐建中間司天冬官正郭獻之奏天皇北極天一太一準天寶勅並合升第一等貞元二年親郊以太常議詔復從開元禮仍為定制郊祀録又云壇第三等有中宮天市垣帝坐等十七坐並在前開元禮義羅云帝有五坐一在紫微宮一在大角一在太微宮一在心一在天市垣即帝坐者非直指天帝也又得判司天監史序狀天皇大帝一星在紫微勾陳中其神曰耀魄寶即天皇是星五帝乃天帝也北極五星在紫微垣内居中一星曰北辰第一主月為太子第二主日為帝王第三為庶子第四為嫡子第五星為天之樞葢北辰所主非一又非帝座之比太微垣十星有左右執法上將次將之名不可備陳故總名太微垣星經舊載孫星而壇圖止有子星辯其尊卑不可同位竊惟壇圖舊制悉有明據天神定位難以躋升望依星經悉以舊禮為定欽若復言舊史天文志並云北極北辰最尊者又勾陳口中一星曰天皇大帝鄭𤣥注周禮謂禮天者冬至祭天皇於北極也後魏孝文禋六宗亦升天皇五帝上案晉天文志帝坐光而潤則天子吉威令行既名帝坐則為天子所占列于下位未見其可又安仁議以子孫二星不可同位陛下方洽髙禖之慶以廣維城之基苟因前代闕文便為得禮實恐聖朝茂典尤未適中詔天皇北極特升第一龕又設孫星于子星位次帝坐如故欽若又言帝坐止三紫微太微者已列第二等唯天市一坐在第三等案晉志大角及心中星但云天王坐實與帝坐不類詔特升第二龕舊郊丘神位版皆有司題署命欽若改造之至是欽若奉版便殿壇上四位塗以朱漆金字餘皆黑漆第一等金字第二等黄字第三等以降朱字悉貯漆匣覆以黄縑帊帝降階觀之即付有司又以新定壇圖五帝五岳中鎮河漢合在第三等四年職方貟外郎判太常禮院孫奭言準禮冬至祀圜丘有司攝事以天神六百九十位從祀今唯有五方上帝及五人神十七位天皇大帝以下並不設位且太昊勾芒唯孟夏雩祀季秋大享及之今乃祀於冬至恐未叶宜翰林學士晁迥等言案開寶通禮圜丘有司攝事祀昊天配帝五方帝日月五星中外官衆星總六百八十七位雩祀大享昊天配帝五天帝五人帝五官總十七位方丘祭皇地示配帝神州岳鎮海瀆七十一位今司天監所設圜丘雩祀明堂方丘並十七位即是方丘有岳瀆從祀圜丘無星辰而反以人帝從祀望如奭請以通禮神位為定其有增益者如後勅奏可真宗本紀大中祥符七年二月丙寅詔天地壇非執事輒臨者斬壬申恭謝天地天禧元年正月辛丑朔改元詣玉清昭應宮薦獻上玉皇大天帝寶冊衮服辛亥謝天地于南郊大赦御天安殿受冊號三年十一月辛未祀天地于圜丘大赦天下禮志乾興元年真宗崩詔禮官定遷郊祀配帝乃請祈榖及祭神州地祇以太祖配雩祀及昊天上帝及皇地祇以太宗配感生帝以宣祖配明堂以真宗配親祀郊丘以太祖太宗配奏可又乾興元年九月太常丞同制禮院謝絳言伏覩本院與崇文院檢討官詳定以宣祖配感生帝竊尋宣祖非受命開統義或未安唐武徳初圜丘方丘雩祀並以景帝配祈榖大享並以元帝配太宗初奉髙祖配圜丘明堂北郊元帝配感生帝髙宗永徽二年祀髙祖於圜丘祀太宗於明堂兼感生帝作主又以景帝元帝稱祖萬代不遷停配以符古義臣以為景帝厥初受封為唐始祖葢與宣帝不侔宣祖於唐是為元帝之比唐有天下裁越三世而景元二祖已停配典有宋受命既自太祖於今四聖而宣祖侑祀未停恐非往典之意請依永徽故事停宣祖配仍用太宗故事宗祀真宗於明堂兼感生帝作主若據鄭氏說則曰五帝迭王王者因所感別祭尊於南郊以祖配之今若不用武德永徽故事請以太祖兼配正符鄭說詳鄭之意非受命始封之祖不得配故引周后稷配靈威仰之義為證唯太祖始造基業躬受符命配侑感帝處理甚明如恐祠日相妨當以太宗配祈榖太祖配雩祀亦不失尊嚴之㫖臣以為宣廟非唯不遷而迭用配帝於古為疑禮祖有功宗有徳但非受命之祖親盡必毀況配享乎翰林承㫖李維等議案禮祭法正義曰郊為夏正建寅之月祭感生帝於南郊此則崇祀之文也竊唯感帝比祈榖禮秩差輕宣祖比太祖功業有異今以太祖配祈榖宣祖配感帝稱情立文於禮斯協詔從所定其祀儀皇帝散齋七日致齋三日太史設帝位於壇上北方南向席以槀秸配帝位於壇上東方西向席以蒲越配位奠幣作皇安之樂酌獻作肅安之樂餘如祈榖祀上帝儀蕙田案鄭注以南郊祀感帝後世因之孟春上辛祭感帝以祈榖唐既祀感帝又祈穀于圜丘以祈榖與祀感帝為二祭故附于圜丘條内不入祈榖仁宗本紀天聖二年十一月丁酉祀天地于圜丘大赦上尊號賜百官諸軍加等禮志仁宗天聖二年詔加真宗謚上謂輔臣曰郊祀重事朕欲就禁中習儀其令禮官草具以聞先郊三日奉謚冊寶于太廟次日薦享玉清昭應景靈宮宿太廟既享赴青城至大次就更衣壇改服衮冕行事文獻通考故事三歲一親郊不郊輒代以他禮慶賞與郊同而五使皆輔臣不以官之髙下天聖二年翰林學士領儀仗御史中丞領鹵簿始用官次仁宗本紀天聖五年十一月癸丑祀天地于圜丘大赦賀皇太后于㑹慶殿丁巳恭謝玉清昭應宮十二月辛未加恩百官甲戌詔輔臣南郊恩例外更改一子官禮志謝玉清昭應宮禮畢賀皇太后比籍田勞酒儀略如元㑹其恭謝云臣某䖍遵舊典郊祀禮成中外協心不勝懽忭宣答曰皇帝德備孝恭禮成嚴配萬國稱頌懽豫增深帝再拜還内樞宻使以下稱賀閤門使宣答樞宻副使升殿侍立百官稱賀酒三行還内殿受命婦賀司賓自殿側幕次引内命婦於殿庭北向立尚儀奏請皇太后即御坐司賓贊再拜引班首升自西階稱封號妾某氏等言郊祀再舉福祚咸均凡在照臨不勝忻忭降再拜尚宮承㫖降自東階稱皇太后聖㫖又再拜司賓宣答曰已成鉅禮歡豫良深皆再拜次外命婦賀如内命婦儀退皆赴別殿賀皇帝惟不致詞不宣答文獻通考天聖五年十一月癸丑郊以翰林學士宋綬攝太僕陪玉輅上問儀物典故綬占對辯給因使綬集羣官撰集天聖鹵簿圖記上之禮儀使請郊後詣玉清昭應景靈宮詔郊前享景靈近臣奏告玉清昭應擇日恭謝大禮使王曾請節廟樂帝曰三年一享不敢憚勞也三獻終增禮生七人各引本寶太祝升殿徹豆三日又齋長春殿謝玉清昭應宮沈氏筆談上親郊廟冊文皆曰恭薦歳事先景靈宮謂之朝獻次太廟謂之朝享末乃事於南郊予集郊式時曾預討論常疑其次序若先為尊則郊不應在廟後若後為尊則景靈宮不應在太廟之先求其所從來盖有所因案唐故事凡有事於上帝則百神皆預遣使祭告唯太清宮太廟則皇帝親行其冊祝皆曰取某月某日有事於某所不敢不告宮廟謂之奏告餘皆謂之祭告惟有事于南郊方為正祠至天寶九載乃下詔曰告者上告下之詞今後太清宮宜稱朝獻太廟稱朝饗自此遂失奏告之名冊文皆為正祠蕙田案書湯誥云敢昭告于上天神后武成云告于皇天后土天寶詔以告為上告下之稱遂易去奏告之名抑惑矣又案筆談此條可補正史之闕楊氏復曰愚案卜郊受命于祖廟作龜於禰宮疏引禮器魯人將有事於上帝必先有事於頖宮為證禮器注云魯以周公之故得郊于上帝先有事於頖宮告后稷也夫有事謂告祭也郊事至重又尊祖以配天故先告于祖而受命焉乃卜日于禰宮自此以後散齋七日致齋三日齋戒以神明其徳將以對越上帝此則古禮然也太祖皇帝乾德六年十一月初行郊祀先是十三日宿齋于崇元殿翌日赴太廟五鼓朝享禮畢質明乗玉輅赴南郊齋於帷宮十六日行郊祀禮夫五鼓朝享于太廟質明乗輅赴南郊齋于帷宮又二日而郊祀此則不拘古禮以義起之深得古人告祭于太廟之意而又不失乎致齋之嚴也其後有司建明或失其中仁宗天聖二年八月太常禮院言南郊合行薦告之禮望降所用日詔將來玉清昭應宮景靈宮太廟同日行禮後五年禮儀使劉筠奏曰天聖二年南郊制度皇帝自大安殿一日之内數次展禮萬乗之陟降為勞百執之駿奔不暇欲乞將來南郊禮畢別定日詣玉清昭應宮景靈宮行恭謝之禮夫劉筠之請盖欲避一日頻併之勞也然薦告者郊前之禮也恭謝者郊後之禮也劉筠欲易郊前薦告之禮為郊後恭謝之禮盖亦以玉清昭應宮景靈宮非禮之正不欲指言其事故為是婉辭以達意也景祐五年十月侍講賈昌朝言朝廟之禮本告以配天享侑之意合於舊典所宜奉行其景靈宮朝謁盖沿唐世太清宮故事有違經訓固可改革欲望將來朝廟前未行此禮候郊禮畢詣景靈宮謝成如下元朝謁之儀所冀尊祖事天禮簡誠至夫賈昌朝之說即劉筠之說也然劉筠之議婉而明不若賈昌朝之言嚴而正岳氏愧郯錄珂前辯南北郊妄意以禮之大者與常禮異折衷古今以俟博識及考元豐六年十月庚辰太常丞呂升卿所奏則先廟後郊當時亦嘗有議之者反覆其論可謂至當而迄不見于用則盖有弗便乎今雖欲力行不可得也珂故因是而發其餘論焉升卿之言曰近以郊祀致齋之内不當詣景靈宮及太廟朝享遂具奏伏聞止罷景靈宮諸處朝謁而天興殿及太廟朝享如故臣伏以郊丘之祀國之大事有天下者莫重乎享帝臣歴考載籍不聞為祀天致齋乃於其間先享宗廟者也獨有唐天寶之後用田同秀之言立老子廟號曰太清宮是歳將行郊祀以二月辛夘先躬享焉祠用青詞饋用素饌甲午又親享于太廟丙申乃有事于南郊終唐之世奉而行之莫知其非雖論者以為失禮然考其初致齋之日乃辛夘享于太清宮至丙申殆且五日乃得雍容休息以見上帝也今陛下致齋三日其一日於大慶殿而用其二日三行禮焉古之大祀未有不齋三日而敢與神明交者故經曰齋三日一日用之猶恐不敬二日伐鼔何居蓋先王之於祭祀之齋如此其謹也今陛下行禮於天興殿纔齋一日爾其之太廟與郊宮也前祀之一日皆嘗用之矣謂之一日之齋尚非全也夫用一日之齋以修大祀未見其可況非全日乎於以奉宗廟則齋之日不足於以事上帝則齋之儀不專陛下恭嚴寅畏三歳一修大禮將以受無疆之休其為致齋者乃如此殆未稱昭事之意也今太廟嵗有五大享皆如古矣又于郊祀復修徧享之禮此為何名乎論者曰宗廟之禮未嘗親行故因郊祀恭展薦獻臣曰不然唐太宗時馬周言曰陛下自踐位宗廟之享未嘗親事竊唯聖情以乗輿一出所費無藝故忍孝思以便百姓遂俾唐史不書皇帝入廟何以示來葉良謂此也且人主于宗廟之享自當嵗時躬修其事其不親享者盖後世之失禮也今日必因郊禮以行之則義尤不可矣夫因者不致專之謂也七世聖神儼在清廟朝廷不特講嵗時親行之禮而因以享之此非臣之所聞也臣愚以謂今郊禮宜如故事致齋於大慶殿二日徑赴行宮其宮廟親享並乞寢罷或車駕必欲至太廟即乞止告太祖一室以侑神作主之意撤去樂舞以盡尊天致齋之義其天興朝享乞更不行請如新降朝㫖俟禮畢而恭謝伏請繼今日已往別修太廟躬祀之制嵗五大享乗輿親臨其一焉仍望自今嵗臘享為首於明年行春祠之禮禴與烝嘗自次年以叙終之每遇行廟享之時則罷景靈宮一孟朝謁之禮廟享致齋乞於内殿出入如常儀如此則祀天享親兩得其當矣珂案先廟後郊蘇文忠軾嘗引書武成證為周禮而珂固疑其即變禮以為常矣升卿謂古之大祀未有不齋三日而敢與神交者考之武成厥四月丁未祀于周廟越三日庚戌柴望大告武成雖禮之變猶必歴三日而後柴望則升卿之言豈非明據然珂謂升卿之論廟享嵗五大享而臨其一乃殺禮也非備禮也行廟享之時則罷景靈宮一孟朝謁之禮廟享既與景靈宮迭用且致齋内殿出入如常儀乃常禮也非大禮也夫天地大祭也祖宗大祭也隆禮備物不可偏廢其勢必如仁宗祫享之制始合於禮之宜夫嘉祐之行祫也以代三年之郊也輅而齋冕而事門而肆眚皆郊制也前乎元年恭謝乎大慶後乎七年大享于明堂則四年之祫適三年之中也如升卿言是以常禮享祖宗而以大禮祀天地也若每嵗而入廟又三嵗而出郊禮有隆而殺知其必不能也知乎此又益知乎南北郊之不可以兼舉也分郊而祭舍升卿之說則太廟原廟之享不知其存乎否也苟存也則先南郊祀之先北郊則祀之祖宗之祭二而天地之祭一祖宗三嵗而徧天地六嵗而徧以卑踰尊不可也苟廢也則原廟恭謝之制就可如升卿之說而太廟則不可以乏享也享不可以殺禮也是又於何時增此一郊耶其疏其數將於此乎益無統矣馬氏曰三嵗親郊而所祭者凡三一日祀原廟二日祀太廟三日詣圜丘行禮此禮始于唐而宋因之楊氏所引劉筠賈昌朝之說則以為前二日之享廟告祭也岳氏所引呂升卿之說則以為前二日之享廟正祭也然以愚觀之以為告祭則其禮太過以為正祭則其禮無名蓋登極立太子冊后上祖宗徽號之類皆典禮之重大而希罕者若三嵗一郊則事天之常禮也今登極等告祭未嘗親行而獨于三嵗郊祀則親舉告禮此所謂太過也春禴夏禘秋嘗冬烝三歲一祫五歲一禘皆歴代相承宗廟之大祭今此諸祭未嘗親行而獨于三嵗郊祀之前特剏一祭此所謂無名也盖近代以來天子親祀其禮文繁其儀衞盛其賞賚厚故必三嵗始能行之而郊祀所及者天地百神與所配之祖而已於宗廟無預故必假告祭之說就行親祀宗廟之禮焉于事則簡便矣謂之合禮則未也蕙田案賈昌朝之言簡而該楊氏稱之甚當呂升卿之說尤為詳核岳氏餘論未見明快唯謂廟享五而臨其一乃殺禮非隆禮則所據正大而可補呂氏之闕矣馬氏之說最為透闢宋史禮志天聖六年始築外壝周以短垣置櫺星門親郊則立表於青城表三壝仁宗本紀天聖八年十一月戊辰祀天地于圜丘大赦賀皇太后于㑹慶殿十二月癸未加恩百官澠水燕談錄國初南郊青城久占民土妨其耕稼又其中暖殿止是構木結綵至尊所御非所以備不虞天聖中魏餘慶上言乞優價給值收買民田除放租稅為瓦殿七間依奏景祐元年冬十月乙亥作郊廟景安興安祐安之曲景祐二年五月庚子議南郊升侑上帝以太祖定配二宗迭配十一月乙未祀天地于圜丘大赦禮志景祐二年郊詔以太祖太宗真宗三廟萬世不遷南郊以太祖定配二宗迭配親祀皆侑常祀圜丘皇地祇配以太祖祈榖雩祀神州配以太宗感生帝明堂以宣祖真宗配如舊文獻通考景祐二年十一月乙未郊三聖並侑先是上親製郊廟樂章二十一曲財成頌體告于神明詔宰臣呂夷簡等分造樂章參施羣祀禮院言周官朝日祀五帝則張大次小次說者以為祀昊天上帝亦然大次在壇壝外猶更衣幄小次在壇側今所未行案魏武帝祠廟令降神訖下階就蕞而立須奏樂畢似若不愆烈祖遲祭不速訖也故吾坐俟樂闋送神乃起耳然則武帝坐俟容須別設近次與周官義符請設小次於皇帝版位少東每獻畢降壇若殿就小次俟終獻徹豆復就版位其後有司又言郊廟罇罍數皆準古而不實三酒五齊明水明酒有司相承名為看器郊廟天地配位唯有祠祭酒分大中祠位二升小祠位一升止一罇酌獻一罇飲福宜詔酒官依法制齊酒分實罍有司取明水對明酒實於上罇禮官以為鄭氏注周禮五齊三酒唯引漢時酒名擬之而無制造法乃仍舊用祠祭酒一等壇殿上下罇罍有司毋設空器並如唐制以井水代明水明酒正配位酌獻飲福舊用酒二升者各增二升從祀神位用舊升數實諸罇罍岳氏愧郯錄珂之仕中朝屢攝官涖祠祭每見罇彛之設五齊有其名而實無之唯將事則取具天府蓋止一色公醖耳聞之容臺吏罇冪之下率多空唯一罇僅寘杯勺以共祭他日又攝光禄丞得先祭贊閱視酒饌又攝太官令躬酌酒實爵得窺其中盖皆如言則其初㸃饌之際執事者徒再倡酒齊之目而已於以驗其名殊而實一也嘗讀周禮正義頗疑醖法不明古制難復考之通鑑長編元豐六年十月甲申光祿卿呂嘉問言光祿掌酒醴祠祭罇罍相承用法酒庫三色法酒以代周禮所謂五齊三酒恐不足以上稱陛下崇祀之意近於法酒庫内酒坊以醖酒法式考之禮經五齊三酒今醅酒共齊冬以二十五日春秋十五日夏十日撥醅瓮而浮蟻湧於面今謂之撥醅豈其所謂泛齊耶接取撥醅其下齊汁與滓相將今謂之醅芽豈其所謂醴齊耶既取醅芽置篘其中其齊蔥白色入焉今謂之帶醅酒豈其所謂盎齊耶冬一月春秋二十日夏十日醅色變而微赤豈其所謂醍齊耶冬三十五日春秋二十五日夏十五日外撥開醅面觀之上清下沈豈其所謂沈齊耶今朝廷因事而醖造者盖事酒也今踰嵗成熟烝醖者盖昔酒也同天節上夀照所供臘醅酒者皆冬醅夏成盖清酒也此皆酒非所謂齊也是知齊者因自然之齊故稱名酒者成就而人功為多故享神以齊養人以酒竊恐典禮如此又司罇彛曰醖齊縮酌盎齊涗酌依經傳則泛齊醴齊以事酒和之用茅縮酌其盎齊醍齊沈齊則以清酒和之不用茅縮酌如此則所用五齊不多而供具亦甚易盖醖酒料次不一此五種者成而皆自然伏望聖斷以今之所造酒與典禮相詳審或不至差謬乞自今年郊廟共奉上批嘉問論證似有理趣今宗廟所實罇彛酒齊未備就且如其說用之於理無害然則當時盖嘗施用而又前乎慶厯後乎大觀皆經講明具珂後記彌文祲容交舉並修要必不廢特建炎南渡之後有司失其職耳非故事也祖宗毖祀存古之意最為嚴重是說其有稽焉又曰慶厯元年十月十五日同判太常寺呂公綽言案開元禮崇祀錄昊天上帝皇地祇六罇太罇為上實以汎齊著罇次之實以醴齊犧罇次之實以醍齊壺罇次之實以沈齊山罍為下實以三酒配帝著罇為上實以汎齊犧罇次之實以醴齊象罇次之實以盎齊山罍為下實以清酒皆加明水明酒實於上罇五方北極天皇大帝神州地祇大明夜明太罇實以汎齊五星十二辰河漢象罇實以醍齊中官壺罇五方山林川澤蜃罇並實以沈齊外官概罇五方丘陵墳衍原隰散罇並實以清酒衆星散罇實以㫖酒皆用明酒各實於上罇宗廟每室設斚彛黄彛著罇之上罇皆實以明水黄彛實鬱鬯著罇實以醴齊又司烜氏以鑑取明水於月鄭康成云鑑類取水者世謂之方諸取月之水欲得隂陽之潔氣也臣謹以古制考五齊三酒即非難得之物將來郊廟祭享宜詔酒官依法制齊酒分實罇罍仍命有司取明水對明酒實於上罇或隂鑒方諸之類未能猝辨請如唐制以井水代之下博士議而奏曰比郊廟祠祀壇殿上下所設罇罍唯酌獻飲福二罇實以祠祭酒餘皆徒設器而不實以五齊三酒明水明酒誠於禮為缺然五齊三酒鄭康成注周禮唯引漢時酒名擬之而無制造之法今欲仍舊用祠祭酒一等其壇殿上下罇罍有司不得更設空器其明水明酒並以井水代之其正配逐位酌獻飲福舊用酒二升者各增二升從祀神位並用舊升數實諸罍罇配以明水明酒從之既曰從其請則自慶厯以來雖欲用之而不能詳其法矣此元豐呂嘉問之請所以有為而發也還考元豐元年七月二日詳定郊廟奉祀禮文所言古之祭祀以五齊薦諸神以三酒酌諸臣其用不同今罇雖具均以法酒實之而無清濁厚薄之異是名物徒存而亡其實也再詳五齊鄭氏以為醴味與酒味異其餘四齊味皆似酒祭祀必用五齊者至恭不尚味而貴多品也若三酒則人所飲也事酒為有事而新作者即今卒造之酒昔酒久醖乃熟故名以昔二者色皆白清酒久於昔酒故色清而味厚欲令法酒庫内酒坊以見造到逐色酒實之從之則三酒當時尚未備五齊固可從而知不知公弼之奏已後復曾講明否禮文之所言乃在嘉問奏論五年之先則遐想中間酒齊醖法之不講亦云久矣珂前記空罇似出有司之吝考之宣和三年七月二十二日尚書省言潭州奏春秋上下釋奠并祭社稷風雨師等合用罇齊酒醴政和中儀曹曹洪考三禮圖罇受五斗之制遂每罇用其數以一歳計之至用酒六百六十八石委是虚費今在京釋奠正配位每罇設酒二升從祀每位五合乞下諸路州軍依此從之則在承平時罇已不盈矣慶歴公弼之言有司相承名為看器則雖盡空其罇固無怪云宣和之有司猶有取於節今祠祭迺不然罇固皆有酒可實特先期緘缾缶以均奉祠者臺皁無遺焉是上不以費靳而下迺以私取不可之大者也蕙田案岳氏論酒醴甚確勝于康成多矣宋史樂志景祐親郊三聖並侑二首奠幣廣安千齡啟運二后在天嘉壇並侑億萬斯年酌獻彰安皇基締構帝祚靈長躬薦鬱鬯子孫保昌常祀二首太祖配位奠幣定安翕受駿命震疊羣方侑祀上帝德厚流光酌獻英安誕受靈符肇基丕業配享潔尊永隆萬葉仁宗本紀寶元元年九月戊申詔應祀事已受誓戒而失䖍恭者毋以赦原十一月戊申朝享景靈宮已酉享太廟及奉慈廟庚戌祀天地於圜丘大赦寶元二年秋七月丁巳詔宗室遇南郊及乾元節恩許官一子餘五嵗授官慶厯元年十一月甲子朝享景靈宮乙丑享太廟奉慈廟丙寅祀天地於圜丘大赦改元十二月丙子加恩百官禮志慶厯元年判太常寺呂公綽言歴代郊祀配位無側向真宗示輔臣封禪圖曰嘗見郊祀昊天上帝不以正坐盖皇地祇次之今修登封上帝宜當子位太祖太宗配位宜比郊祀而斜置之其後有司不諭先帝以告成報功酌宜從變之意每郊儀範既引祥符側置之文又載西向北上之禮臨時擇一未嘗考定乃詔南郊祖宗之配並以東方西向為定呂公綽傳判太當寺兼提舉修祭器公綽以郊廟祭器未完制度多違禮請悉更造又以嵗大中小祠凡六十一禘祫二祼獻興俯玉帛尊彛菁茆醯醢鍾石歌奏集為郊祀總儀上之言古者天地宗廟日月五方百神之祀咸有尊罍五齊三酒分實其中加明水明酒以達隂陽之氣今有司徒設尊罍而酌用一尊非禮神之意宜案周禮實齊酒取火於日取水於月因天地之潔氣又言祖宗配郊當正位今側鄉之非所以示尊嚴也禮志慶厯三年禮官余靖言祈榖祀感生帝同日其禮當異不可皆用四圭有邸色尚赤乃定祈榖明堂蒼璧尺二寸感生帝四圭有邸朝日日圭夕月月圭皆五寸從祀神州無玉報社稷兩圭有邸祈不用玉仁宗本紀慶厯四年春正月辛卯太常禮儀院上新修禮書及慶厯祀儀十一月壬午冬至祀天地于圜丘大赦七年十一月戊戌冬至祀天地于圜丘大赦皇祐五年八月壬戌詔南郊以太祖太宗真宗並配十一月己巳祀天地于圜丘大赦王洙傳皇祐五年有事于南郊勸上用新樂既而議者多非之卒不復用胡宿傳皇祐五年正月㑹靈宮災是嵗冬至郊以二帝並配明年大旱宿言五行火禮也去嵗火而今又旱其應在禮此殆郊丘並配之失也即建言並配非古宜用迭配如初嘉祐七年春正月乙亥詔南郊以太祖配為定制禮志嘉祐六年諌官楊畋論水災繇郊廟未順禮院亦言對越天地神無二主唐始用三祖同配後遂罷之皇祐初三聖並侑後復迭配未㡬復並侑以為定制雖出孝思然頗違經典當時有司失於講求下兩制議翰林學士王珪等曰推尊以享帝義之至也然尊尊不可以瀆故郊無二主今三后並侑欲以致孝也而適所以瀆乎享帝非所以寧神也請如禮官議七年正月詔南郊以太祖定配王珪傳先是三聖並侑南郊珪言三后並配所以致孝而瀆乎饗帝于是專以太祖侑于郊五禮通考卷十二
