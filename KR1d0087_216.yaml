body:
  text: 五禮通考卷二百六刑部尚書秦蕙田撰嘉禮七十九體國經野書禹貢嶓冢導漾東流為漢錐指傳曰泉始出山為漾水東南流為沔水至漢中東流為漢水易氏曰漾水東流百八十里經興元之南鄭縣名漢水黄氏曰漢有沔漾之名皆東漢水也地理志西漢水出西縣嶓冢山南入廣漢白水葢潛漢也經不著其所出自古皆以為東西兩漢俱出嶓冢則或然矣而西漢固無沔漾之名地理志漾水出隴西氐道至武都為漢武都東漢水受氐道水名沔是則沔漾俱為東漢也獨氐道武都脈絡不通川渠阻隔武都受漾為不可據而桑欽遂徙氐道漾水為西漢之源由是愈紛錯酈道元委曲遷就通之以潛伏之流證之以難驗之論更覺齟齬故當盡廢諸説而一之以經文杜佑通典秦州上邽縣嶓冢山西漢水所出經嘉陵曰嘉陵江經閬中曰閬江漢中金牛縣嶓冢山禹導漾水東流為漢水亦曰沔水其説為可據渭案嶓冢見導山魏地形志華陽郡嶓冢縣有嶓冢山漢水出焉元和志嶓冢山在興元府金牛縣東二十八里漢水出焉經南鄭縣南去縣一百步禹貢嶓冢導漾東流為漢是也南鄭今陜西漢中府治其故城在今府城東北嶓冢故城在今沔縣白馬城東南五里上邽故城在今鞏昌府秦州西南金牛舊縣在今漢中府寜羌州西北其嶓冢山在今沔縣西南接寜羌州界漢郊祀志秦祠沔於漢中地理志漢中有沔陽縣武都下云東漢水一名沔則沔漢互稱其來已久而沮縣下又云沮水出東狼谷南至沙羨南入江荆州川案周禮荆州川曰江漢而無沮是沮即沔也水經注沔水出武都沮縣東狼谷中一名沮水闞駰曰以其初出沮洳然故曰沮水縣亦受名焉導源南流泉街水注之水出河池縣東南流入沮㑹于沔元和志沮水出興州順政縣東北八十二里按沮縣故城在今漢中府畧陽縣界晉永嘉後没于氐羌縣廢後魏改置武興縣又僑置畧陽縣西魏改畧陽曰漢曲隋改曰順政唐為興州治宋復改順政曰畧陽今在寜羌州北二百二十里河池今徽州屬鞏昌府泉街水在畧陽縣北東南逕沮水戍在畧陽縣東南沔縣志云沮水在縣西七十里與畧陽接界又東南流注漢所謂沔漢者也尚書曰嶓冡導漾東流為漢山海經所謂漢出鮒嵎山也東北流得獻水口庾仲雍云是水南至闗城合西漢水又東北合沮口漢水自寜羌州東北流逕沔縣故大安軍南又東北至青羊驛沮口在焉宋開禧二年金人䧟大散闗叛將吴曦退屯罝口旋還興州罝口即沮口也同為漢水之源故孔安國曰漾水東流為沔葢與沔合也至漢中為漢水是互相通稱矣班固曰東漢水一名沔鄭康成曰或謂漢為沔如淳曰北方人謂漢水為沔水以今輿地言之漾水出寜羌州北嶓冡山寜羌在漢中府西北三百八十里東北流逕沔縣西南合沔水又東逕沔縣南沔縣在府西少北九十里又東逕褒城縣南在府西北四十里沔水去縣二十四里又東逕南鄭縣南為漢水水去縣三里經所謂嶓冡導漾東流為漢者也陸氏游曰嘗登嶓冡山有泉涓涓出山間是為漢水之源此務觀入蜀塗歴金牛目驗而得之涓涓細流安國傳所謂泉始出山為漾水者也新城王尚書士禎昔典試四川撰蜀道驛程記其言嶓漢最為詳覈記曰出沔縣西門曲折行亂山中沔水流經其中畧如棧道但山庳無林木沔流舒緩不及褒水湍悍耳西涉沮水抵大安驛有土城廢址宋置大安軍沔沮之間濶者未丈許狹者才二三尺沙石磷磷深不没踝自大安西南亂山益稠至金牛驛北望見嶓冡山峩然雲表一小水自西東流即所謂嶓冡導漾者也水纔濫觴不没鳬雁合五丁峽水東流為沔其流始大金牛驛西三里稍南入五丁峽一名金牛峽在寜羌州北二十里峽口懸崖萬仭隂風颯然水自峽中噴薄而出寜羌州在亂山中無城堞本沔縣羊鹿坪地明洪武中以山冦作亂置寜羌衞于此成化中即衞建州治自州行十里渡水過百牢闗闗下有分水嶺嶺東水皆北流至五丁峽北合漾水入沔嶺西水皆南流逕七盤闗龍洞合嘉陵水為川江常璩言沔出嶓冡合白水為西漢明與導漾之文相悖按通典嶓冡山有二一在天水上邽一在漢中金牛雍大記云西漢水在西和縣源出嶓冡山西流與馬池水合此乃上邽之嶓冡在今秦州又云漢江源出沔縣嶓冡山東流入金州此乃金牛之嶓冡禹貢嶓冡導漾乃沔縣之嶓冡非秦州之嶓冡知嶓冡有二則東西二漢源流各自了然漾之與沔本為一流與隴西之嶓冡都無交涉常氏之誤可不辯而明矣公使車閲歴較陸氏所得更備且大有禆于經學故掇其要著於篇禹貢以嶓冡繫梁州而漢志嶓冡在雍域之隴西一誤也禹貢云嶓冡導漾而漢志嶓冡所出為西漢水其漾水則出氐道二誤也禹貢之潛乃漾水枝津西出為西漢水而漢志西漢水出西縣之嶓冡三誤也漢志不言漾水出何山而水經云出氐道縣嶓冡山是氐道亦有嶓冡四誤也漾者東漢之源而續水經者以西漢接漾水為一川五誤也漾沔枝津皆自東入西而酈注從舊説云西漢水至葭萌入漢六誤也川流離合地上灼然可見而酈注惑闞駰之説以為原始要終潛流或一故東西俱受漢漾之名七誤也羣言殽亂學者靡所折𠂻今説漢水當排棄諸家專主禹貢以沮沔為漢之别源以西漢為漾之枝津而氐道水則存而不論是亦理亂絲解連環之術也地理今釋漾水出今陜西漢中府寜羌州北嶓冡山東至漢中府南鄭縣南為漢水亦名東漢水東流至白河縣入湖廣界又東流經鄖縣至均州又東南流歴光化榖城二縣至襄陽縣東津灣折而南流經鍾祥縣至潛江縣大漢口復東流經漢川縣至漢陽縣漢口合岷江又東為滄浪之水錐指林氏曰張平子南都賦云流滄浪而為隍廓方城而為墉李善注引左氏傳屈完所謂楚國方城以為城漢水以為池則是滄浪即漢水也葢漢水至于楚地則其名為滄浪之水也易氏曰漢水自興元南鄭縣又七十二里至城固縣北又三百里至洋州興道縣南又五百里至金州西城縣北又六百八十里至均州武當縣西北四十里水中有滄浪洲又名滄浪水渭案武當漢屬南陽郡今為均州屬湖廣襄陽府地説曰水出荆山東南流為滄浪之水是近楚都故漁父歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足余案尚書禹貢言導漾水東流為漢又東為滄浪之水不言過而言為者明非他水決入也葢漢沔水自下有滄浪通稱耳纒絡鄢鄀地連紀郢咸楚都矣以今輿地言之漢水自南鄭縣南又東逕城固縣南城固在漢中府東少北七十里水去縣四里舊志云縣東二里有飲馬灘每子午二時潮響如雷又五里為上濤下濤龍亭廢縣在縣東龍亭山下即龍下也又東逕洋縣南洋縣在府東南一百二十里水去縣二里又東逕西鄉縣東北西鄉在府東南二百二十里又東南逕石泉縣南石泉在興安州西二百五十里水去縣五十步又東逕漢隂縣南漢隂在州西少北一百六十里水去縣八十里又東逕紫陽縣南紫陽在州西南一百八十里州志云有怯灘在縣西十五里水陡如鬬又大力灘在縣西八里兩岸夾石左右有兩石觜最為舟楫患又石梁灘在縣西當任河水口中宫灘在縣東南一里極髙險中流有柱石怒濤之聲如雷長灘在縣東四里近汝河灘不甚險商舟停集漁火絡繹皆漢水所經也又東北逕興安州北州志云州境漢江多灘麸灘串灘二郎灘為險而神灘尤甚明成化十三年知州鄭福於沍冬時用火燒石疏鑿以殺其勢舟行利焉神宗十一年漢水溢壊州城公私廬舎皆盡溺死者數千人州東一里有長春堤成化八年為水衝壊十五年鄭福増築髙堅神宗二十年復加修築又東逕洵陽縣南洵陽在州東一百二十里水在縣南門外又東逕白河縣北白河在州東南一百七十里又東逕鄖西縣南鄖西在湖廣鄖陽府西一百四十里水去縣五十里又南逕鄖縣南明成化十二年置鄖陽府治鄖縣舊志云漢江自城西遶城南寳葢天馬諸山皆錯列漢濵又東逕均州北均州在㐮陽府西北三百九十里水去州四十里經所謂又東為滄浪之水者也地理今釋滄浪水湖廣襄陽府均州北四十里過三澨至于大别南入于江錐指傳曰三澨水名入漢大别山名觸山迴南入江易氏曰漢水自滄浪洲東南流三百六十里至襄陽府襄陽縣又三百二十里至郢州長夀縣又三百里至復州景陵縣又東至漢陽縣大别山之東北入江渭按説文澨埤増水邉土人所止也大别見導山水經第四十卷末言禹貢山水澤地所在曰三澨池之南在邔縣之北池今作地為是然自酈元時已譌觀注云池流可見傳寅集解引此亦作池明地字乃近世所改之南上恐有脱文酈注云尚書曰道漢水過三澨地説曰沔水東行過三澨合流觸大别山陂故馬融鄭𤣥王肅孔安國等咸以為三澨水名也許慎言澨者埤増水邉土人所止也案春秋傳文公十六年楚軍次于句澨以伐諸庸宣公四年楚令尹子越師于漳澨定公四年左司馬戍敗吴師于雍澨昭公二十三年司馬薳越縊于蓬澨今左傳本作薳澨葢以上有薳字而誤服䖍或謂之邑或謂之地京相璠曰杜預亦云水際及邉地也今南陽淯陽二縣之間淯水之濵有南澨北澨矣而諸家之論水陸相半又無山源出處之所津途闗路惟鄭𤣥劉澄之言在竟陵縣界經云邔縣北池然池流多矣論者疑焉而不能辨其所在渭按左傳澨有五睢澨宋地故酈注不引今就其所引者論之不知何者可當禹貢三澨之目蔡傳以漳澨薳澨與㲼水為三澨而句澨雍澨其地皆有可攷却不數韓汝節宗之以㲼澨漳澨薳澨為三澨㲼澨古無此名薳澨不知所在紛紛推測終無定論所可知者三澨為漢水之三大防其地當有名川來入漢上不越滄浪下不踰大别而已愚意三澨當在淯水入漢處一在㐮城北即大隄一在樊城南一在三洲口東皆襄陽縣地在邔縣之北也言在竟陵者非是以今輿地言之漢自均州北又東南逕光化縣西南光化在襄陽府西北一百八十里水去縣十五里又東南逕榖城縣東北穀城在府西一百二十里水去縣二十五里又東南逕襄陽縣北縣為襄陽府治東南三十里漢水中有龍尾洲縣志云漢水重濁與大河相似襄陽實當其衝為患最劇自唐以來皆築隄遶城以防潰決明正統嘉靖間兩被漂溺皆以大隄廢損故也又云嘉靖四十五年漢水溢樊城城北舊冇大隄城南面江一帯皆甎城盡潰決議者謂樊城潰則襄城無患於是疏塞不蚤樊城之富庶漸衰又東南逕宜城縣東宜城在府東南一百二十里水去縣二里又南逕鍾祥縣西鍾祥為安陸府治又南逕荆門州東荆門在府西九十里水去州一百二十里又東南逕京山縣西南京山在府東一百五十里又東逕潛江縣北潛江在府南少東二百十里水去縣二十里又東逕景陵縣南景陵在府東南二百十里水去縣五十里又東逕沔陽州北沔陽在府南少東三百三十里水去縣一百里州志云漢水由荆門州界折而東大小羣川咸滙焉勢盛流濁浸淫盪決為患無已而潛江地居汙下遂為衆水之壑一望彌漫無復涯際漢水經其間重湖浩𣺌經流支川不可辨也葢漢水為湖北之害而襄郢二州為甚潛江又承襄郢之委流當漢江曲折迴合之處瀦為大澤勢不能免矣而景陵沔陽又潛江之委流也今沔陽四境唯湖陂連亘幾數百里皆為漢水所滙葢漢水性曲往往十里九灣語曰勁莫如濟曲莫如漢郢沔之間波流迴盪自必豬為藪澤小民見填淤之利復從而隄防之為民牧者又不講于節宣之宜疏瀹之理嵗月之間苟幸無事大水時至則委之洪濤中耳又東逕漢陽縣北縣為漢陽府治水去縣三里又東至大别山折而南是為漢口經所謂過三澨至大别南入于江者也隄防考云舊時漢水從黄金口入排沙口東北折抱牯牛洲至鵞公口又西南轉北至郭師口對岸曰㐮河口約長四十里然後下漢口成化初忽于排沙口下郭師口上直道一道約長十里漢水徑從此下而故道遂淤今魚利畧存不通舟楫俗呼為襄河以上流自襄陽來也按漢水本東行觸大别之陂而南回入江今則自郭師口以上決而東逕大别山復入江非復古之夏汭矣漢志云東漢水一名沔過江夏謂之夏水入江又云沮水南至沙羨南入江過郡五武都漢中南陽南郡江夏行四千里葢曲莫如漢故其所行有若是之逺也地理今釋三澨案説文云澨埤増水邉土人所止也王逸注西澨杜預注漳澨或云水涯或云水邉蔡傳以三澨為水名恐非東滙澤為彭蠡東為北江入于海錐指傳曰滙迴也以東迴為彭蠡大澤朱子曰彭蠡之為澤實在大江之南然以地勢北髙而南下故其入于江也反為江水所遏而不得遂因却而自瀦以為是瀰漫數十百里之大澤程氏曰通禹貢一書水之以小注大則為入水力稍相參配則為㑹而滙之為義唯此有之以其力大而相衝蕩其狀回復宛轉無有此受彼聴之别故與他水合併為一者不同也傅氏曰三江相㑹而南不能以敵中北西來之勢中北遏南而南相與迴旋而為一大澤者其來久矣今禹本其有澤之因故歸之于漢曰東滙澤為彭蠡而于江亦曰㑹于滙也黄氏潤玉曰叙江漢皆言東者主岷嶓居西而云非指曲折所向為文也吴氏曰漢既入江與江混為一水而又曰東為北江入于海有似别為一水然何也葢漢水源逺流大可亞于江兩相匹配與他小水入大水之例不同故於荆州言朝宗于海必以江漢並稱葢曰江之入海非獨江水實兼漢水江固為江漢亦為江也故漢得分江之名而為北江記其入海者著其為瀆也三瀆皆自為一瀆惟江與漢共為一瀆導水九條始之以二水終之以二水而中間記四瀆其一河一瀆也其二漢與江一瀆也其三濟瀆其四淮瀆河瀆非無它水入之然皆小水入大水故河得以大併小而專為瀆江漢體勢均敵二水合流所以如此其大不以漢附于江而冺其入海之實故于漢于江並言入海而同為瀆也若漢不為瀆則東為北江入于海七字衍文而其序當殿導洛之後矣傳云自彭蠡江分為三入震澤遂為北江而入海下傳又云有北有中南可知是以北江中江南江為三江也今按禹貢三江只是一江而昔之言三江者不一漢志毘陵之北江蕪湖之中江吴縣之南江皆曰揚州川葢主職方而為言然周之三江與古之三江豈容有二羣言淆亂班固襍採八志耳吴越春秋所謂三江之口者酈元言雖稱相亂不與職方同可以正班固之失夫職方之三江即禹貢之三江也既不與職方同則亦與禹貢異而蔡傳專主庾仲初之三江不已謬乎諸言北江者皆謂由毘陵縣北入海此即湔氐道下所謂東南至江都入海者也安國傳乃言江入彭蠡分為三入震澤自震澤遂為北江而入海則北江直是松江吾不知其為何説矣縂之大江與震澤本不相通説者據後世溝通江湖之遺跡命之曰中江南江而以大江為北江與此二水並列而為三班固不察遂以為職方之三江而禹貢之三江亦從此訛矣郭璞以岷江松江浙江為三江視班固差長然異源各派即與導漾導江之義有礙求合於禹貢舎康成子瞻無可從者矣李氏紱三江考三江者中江北江九江也江本水名中江是也漢水入江以後曰北江彭蠡上流九水相㑹曰滙而入江以後則曰九江皆因江得名者也故禹貢諸水皆直稱水名無稱某江某河者桑欽水經則稱某水江曰江水河曰河水各為水中之一名而他水不得而冒稱也水經所載水名百一十有九惟沿江漸江斤江三水有江字然亦稱曰某江水未嘗直以為江也孔氏頴達傅㑹鄭氏之説謂江南人呼水無大小皆曰江程氏大昌駁之云南人呼小水為江特後世語耳古何嘗有是由程氏言之是禹貢無其水者固不得列於三江禹貢雖有其水而未嘗有江名者亦不得列於三江斷然而無疑者也韋氏昭以三江為松江錢唐江浦陽江近日吴中如顧氏炎武知辯江為水名矣其釋三江亦依傍韋氏之説不知此皆禹貢所無之水又不得以江名者不當列於三江也孔氏安國謂自彭蠡江分為三以入震澤遂迤北而入海班氏固謂南江自震澤東南入海中江自蕪湖東至陽羨入海又一江自毘陵北東入海三家之説皆與今水道不合雖古今之水間有遷徙然荆揚塗泥之地與北方不同斷不至參差如是故程氏大昌譏為全不知東南地理且彭蠡無江名南江亦臆説所謂禹貢雖有其水而未嘗以江名則亦不得列於三江者也王氏安石之説誤㑹既字之義牽連震澤竊意後人有用韋氏説妄指婁淞浙三水為三江者亦由既字誤之耳不知程氏引弱水既西彭蠡既瀦二既字駁之確知下文不相聫綴此葢無庸辯者惟顔氏師古以為中江南江北江蘇氏軾因之以北江中江之文推彭蠡為南江程氏亦亟取之謂於地則有考以經則相應最為愜當然猶疑南江之説求之經文之外故學者信而不堅余直斷以九江入之則三江皆出於經文學者可以堅信而無疑矣然九江之説未定則猶恐其信而不堅也謂江至荆州而分為九渚孔氏安國之説然鄭康成已不用之矣水經注贑水下引劉氏歆謂湖漢九水入於彭蠡故言九江班氏地理志與應氏劭之釋漢志則皆謂江至廬江尋陽分為九派至張僧監尋陽記始列九名曰申曰烏蜯曰烏臼曰嘉靡曰畎曰源曰廩曰提曰菌樂史寰宇記李宗諤九江圖皆本僧監之説程氏則曰九不必實指其數如五湖實一湖也九澤實一澤也又謂班氏地理志於廬江之尋陽曰禹貢之九江在南皆東合為大江而司馬遷之觀九江亦於廬山乎求之合漢世知古者其書多同故九江之在尋陽後世主信者多衆論雖不同然皆以九江在尋陽之地故吾以為劉氏歆説可用而程氏之駁非也九江㑹於彭蠡則曰滙既入於江則曰九江猶漢水未入江則曰漢既入江則曰北江也中江北江九江三者皆見於經則三江之名可定矣而蔡傳據楚地記以洞庭為九江晁氏説之雜引山海經博物志水經地記以助之然後九江之名亂彼以經文過九江至於東陵為證然經不又云過九江至於敷淺原乎程氏謂東陵今世無有定地曽氏以巴陵為東陵絶無根據而敷淺原在今徳安按水經云江水東過下雉縣北刋水從東陵西南注之又東左得青林口注云水出廬江郡之東陵鄉尚書云江水過九江至於東陵者也東陵在廬江則九江為尋陽九江無疑矣世之左袒洞庭之説者謂九江孔殷之文在荆而不在揚廬江則屬揚不知尋陽在荆揚之交者也故晉人割廬江之尋陽武昌之柴桑合為尋陽郡是九江在荆之極東而未絶乎荆也且洞庭在漢水入江之上凡叙水者先上游而後及末故先曰江漢朝宗于海而後曰九江孔殷則九江為尋陽之九江亦明矣九江之説明然後三江之説定故因論三江而併及之張氏吉江漢辨江漢二條朱蔡皆以彭蠡乃江西湖漢所豬無仰江漢之滙江漢並持東下又不見北江中江執是以疑經之誤説其備愚嘗親歴其地以經文證之始知無誤也夫滙本訓迴乃下流汎濫他水勢不得泄于是迴旋渟蓄豬而為澤之謂也今春夏之間江漢水漲則彭蠡之水鬱不得流而逆注倒積漭為巨浸雖無仰于江漢之入然實因其下流充牣故湖水壅淤阻抑而不能出方能成其澤爾非謂江漢之水截入澤内而為滙也若其截入為澤則但如他條曰至曰入可也何必變文言滙哉此東滙澤為彭蠡東迤北㑹為滙本無悮矣漢水不言㑹者為江水所隔與彭蠡不相接也江水不言彭蠡者與漢互見也迨夫二水漸消則彭蠡之水溢出大江循南岸而行與二水頡頏趨海所謂其北則江漢之濁流其南則彭蠡之清漲是也苐江水濬發最在上流其次則漢水自北岸而入三水並持東下則江為中江漢為北江而彭蠡入江並流為南江者不言可知非判然異𣲖之謂也此東為北江東為中江入於海亦無悮朱蔡皆不能無疑于斯何歟況經文簡奥其言南入于江東滙為澤葢亦無逺不包而曰南曰東與今水道曲折迤邐勢正相符今却云經文與今水道全然不合此不可曉也又江水自東陵而下漢水自漢陽而下其勢皆漸趨東北湖口為江漢所滙之處正在東陵漢陽東北與經文亦合今却云于漢水宜改南滙彭蠡于導江宜改南㑹于滙此又不可曉也若夫所謂横截而南入于鄱陽又横截而北流為北江又謂至此而後一先一後而入彭蠡既滙之後又復循次而出以為二江此自説者之悮非經文悮也葢經意以為漢雖入江自循北岸以達于海故有東滙北江入海之文朱子偶未之思以為二水既合則有江無漢故既疑其悮而復取鄭樵之説以東滙澤為彭蠡東為北江入于海十三字為衍文蔡氏篤信朱子不復别求其説遂立論以疑經皆非也或曰南之有江猶北之有河也渭水洛水皆入河不曰中河北河安知中江北江之説不為誤乎是不然河源逺出悶磨黎山自積石龍門而下氣勢雄猛流波洶激而渭洛近出鳥䑕熊耳不數百里遂達河幾不自見安得與河為敵若漢源出嶓冡與江源既不甚相逺而其通流之地大小雖殊終不相逺則漢雖入江猶得紀其為滙為江入海之實夫豈過乎河可以包渭洛而江不得以包漢故兖州則曰九河既道不兼言渭洛荆州則曰江漢朝宗對舉二水言之經之立義精矣張氏叙九江三江辨禹貢三江九江之聚訟也久矣自朱子作九江彭蠡辨而九江之為洞庭已確乎可信惟三江之名尚未折中爾於是説者羣然争勝三江之名遂有五而九江之名亦有三夫山川名號古今每多重襲九江何妨有三然以豫章與尋陽之水為九江縱証据紛羅終是漢人之九江而非禹貢之九江也九江既非而欲以是合之江漢為三江或别援他水為三江雖其數適符亦是後人之三江而非禹貢之三江也何也禹貢九江孔殷九江納錫大龜俱在荆州則是荆州之九江矣夫荆州之九江則非洞庭之九水而有何水足當其名者哉若豫章則屬揚州尋陽雖在揚之極西亦究是揚而非荆也或乃恐其説之戾於經因并割此一隅之地强而委之於荆即如其説亦祇荆之末梢下流而已禹貢聖筆宜規全𫝑以立文豈有方序荆州置其上流莫大之水不記反記其末梢下流可荆可揚幾同甌脱之地以備數者哉且其説尋陽之九水也不過曰大江至此分而為九葢即是江漢之水也夫如是則江漢朝宗于海一語已足包之矣何煩重累其詞豈復成聖經之體耶夫江漢之水跨越三州綿歴四千餘里非荆一州之所可擅也惟洞庭九江圓周八百餘里乃一州中權絶大之水而為荆州之所獨後世荆湖南北路由之而分今之湖廣分省亦以湖而别彼震澤彭蠡之小于洞庭多矣而揚州尚兩序之而不一漏乃序荆州而反遺此水可乎哉顧朱子直以洞庭為九江則其意雖是而源流尚未分明耳洞庭者九江之委乃湖也而非江也九江應是湘江云爾湘水發源于桂林之耶薑山合辰沅澬澧溆酉蒸郴之八水而為江此余曽目騐而定者與記志所分九水小異而大同也㑹其全則曰九江統於一則曰湘江導山云岷山之陽至于衡山夫衡山去洞庭且八九百里矣以其在湘江西岸為湘所隔故東行者必須渡湘而過經乃直曰過九江而不曰湘江是九江即湘江之明証也葢言湘江不足以包洞庭言洞庭亦無以見湘江故經惟稱九江導水云又東至于澧過九江澧即今澧州之地以水名地而非水也洞庭即在澧之東故至澧而曰過九江已包洞庭在内是九江之下流也則此之衡山九江者湘江即在衡之麓故至衡而曰過九江明指湘江而言是九江之上流也由此觀之至于東陵之陵或可移至澧而過之九江不可移也至于敷淺原之原或可移至衡而過之九江不可移也苟衡澧所過之九江不可移則孔殷納錫之九江獨可移乎哉聖人若預知後世必將有迷于九江之源流者故于此兩條已舉九江之源流鑿然注明所在以示人而後來膚學尚欲曲引山經地志之雜説以汨亂聖經不亦舛乎且夫九江既失其真則南江之名先不得其實而乃别尋經外之三江固臆測而杜撰即彼自謂以經証經而引北江中江九江為三江者亦貌是而神非也彼亦知夫三江之名雖總見于揚州之川而三江之源實已並列于荆州之域耶其曰江漢朝宗于海則自西而東而中江北江兩源已合又曰九江孔殷則自南而北而南江之源亦已來同下文沱潜既道是江漢之别流俱安瀾矣雲土夢作乂是九江之餘波不旁溢矣只四語而荆之四際已周三江之源亦已了然在目此其所以為聖筆也而或者尚有所疑則更以導水之文證之夫嶓冡導漾至于大别而曰南入于江則已與江同行而東滙澤為彭蠡矣然漢自循北岸而東故為北江以入海耳不與江混也岷山導江東至于澧而曰過九江則九江亦隨之同至于東陵而東迤北㑹于滙矣然江亦不混故特東為中江以入海也既有北江中江又區彭蠡為澤則九江之為南江尚何疑哉其所以不著南江之名者九江先與岷江合流于巴陵則江水在北而九江之為南江舊矣至漢陽而漢自北來尚未名江故宜别之為北江而江乃改稱中江則九江之在南自如而不待言爾聖經簡括自可互證而得故序揚州而曰彭蠡既瀦明其瀦而為澤則非江矣下乃書三江既入則彭蠡之不得雜于其内也不從可知乎故五説之中惟漢人据北江中江者為近而配以彭蠡及尋陽則失之不知江之可並為三者必其源逺流長而大小相敵者耳漢源嶓冡江源岷山至荆已二三千里九江源出粤西亦二千餘里而與江漢㑹于岳鄂之間則畧足相當雖岷江勢雄獨据中流而二水亦非甚弱故一南一北滔滔東注不為岷江所沒而並為三江以入海也夫九江既行南岸則抵揚後即豫章尋陽諸水亦將挾之以行而同入于海耳然是乃九江之末流所㑹而非江也以是為九江已數典而忘其祖并欲以是為南江而配三江則大小長短相去遼絶不且來婢作夫人之誚乎然則紛紛旁引曲証以為之説者辨之葢不勝辨實亦不足辨已蕙田案張氏以九江為荆州之川意與朱子同然朱子直以洞庭為九江而張氏則以導江之至澧過九江即包洞庭在内而曰九江之下流導山之至于衡山過九江為湘江而為九江之上流其説又與朱子小異張氏以三江之名雖總見揚州三江之源實列荆州之域葢亦指經文中江北江九江為三江而以九江為南江其説與李氏同特李氏之南江在揚而張氏之南江在荆為小異耳古今變更名實互異未知孰是存之以備參考岷山導江東别為沱錐指林氏曰自江水溢出别為支𣲖者皆名為沱梁荆二州皆有之也渭按荀子云江出汶山其始發源可以濫觴地理志云禹貢岷山在蜀郡湔氐道西徼外江水所出沱謂梁之郫江荆之夷水也詳見梁荆二州東别為沱者謂江水東流而别為沱以大勢言之江自梁而荆皆東也傳云江東南流沱東行非是附論江源華陽國志岷山一名沃焦山其附曰羊膊江水所出李膺益州記羊膊嶺水分二𣲖一東南流為大江一西南流為大渡河太平寰宇記羊膊山在平康縣縣屬松州隋志平康縣有羊腸山腸葢膊字之誤山下有二神湫大江始發之所范成大吴船録江自西戎來由岷山澗壑中出而合于都江今世所云止自中國言耳陸游入蜀記嘗登岷山欲窮江源而不可得葢自蜀郡之西大山廣谷谽谺起伏西南走蠻箐中皆岷山也則江所從來逺矣王氏應麟通鑑地理通釋大渡河一名羊山江源出鐵豹嶺嶺即羊膊之異名也金氏履祥書注岷山數百峰大酉山為最大雪山三峰闖其後冬夏如爛銀一谷名鐵豹嶺者有西岳廟廟下名羊膊石江水正源也其西南分一源又為大渡河矣方中履古今釋疑按雲南志謂金沙江之源出於吐蕃之犁石南流漸廣至於武定之金沙廵司經麗江鶴慶又東過四川之會州建昌等衛以達於馬湖叙南然後合於大江趨於荆吳又緬甸宣慰司志謂其地勢廣衍有金沙江闊五里水𫝑甚盛緬人恃以為險其源之逺且大也明矣何為言江源者止於岷山耶葢江出犁石即崑崙之南河出朶甘思即崑崙之西二源實前人所未詳故范陸諸説俱未得其要而荒逺難知李氏紱江源攷江為南條大水與北條之河並稱河自發源至積石入中國境以今方輿路程圖考之巳七千餘里而歴來溯江源者悉本禹貢岷山導江之文止就岷山言之雖博奥如桑氏水經酈氏注精詳如程氏禹貢論亦無異辭余獨疑江水廣與河等深則數倍並横亘中國江尤有天塹之名而岷山在陜西廢叠州為中國境内何其源之近而小耶竊以為禹貢言岷山導江猶導河積石止就神禹施功之地言之江源不始於岷山猶河源不始於積石也昔人嘗有以北金沙江為江源者其源出在西番境内莫得其詳後閲方輿路程圖則北金沙江源委井然既開方以計里又測極以凖度其法為古來所未有按圖考之岷江與金沙江㑹合於四川之叙州各自叙州逆溯其源岷江源出岷山當北三十四度西十二度行五百餘里過黄勝闗至松潘衞入四川境又南行五百里至茂州之長寜堡有黒水河來㑹又南行六百里經成都府西境至嘉定州青衣嘉定二江來㑹又二百餘里至叙州與金沙江合自發源至此僅一千八百餘里若北金沙江則發源西畨之河克達毋必拉必拉者河也當北三十二度半當西二十度經毋魯斯烏蘇之拜圖都渾共南行千八百里過裏雍河屯始名金沙江又東南行九百里過塔城闗至雲南麗江府又南行四百里至陶營巡檢司又東北行千里至雪山入四川境又北行千二百里有打冲河來㑹又東行三百里至凉水井折而北行七百里又東行四百里至馬湖府又東行二百里至叙州府與岷江合自發源至此已六千九百餘里較岷江之源逺三四倍凡水以原逺者為主而原近者附之今自叙州㑹合之處逆溯二江之源修短懸殊如此乃不以行六千九百餘里者為江源而以行一千八百里者為江源此理之必不可者也按黄河發源北三十六度當西十九度與金沙江南北相距僅三度半東西則止偏西一度而河源之南金沙江源之北皆髙山聳峙葢即所謂崑崙山也河源在崑崙之隂江源在崑崙之陽而特微偏西二百餘里也又有一源名鴉礲江即所謂打冲河與金沙江㑹合於馬湖西境者也鴉礲亦發源於西番北境與青海南境接壌當北三十四度西十八度與河源南北相距僅二度東一度中阻髙山葢亦崑崙之陽而微偏東二百餘里者也其源從平地湧出源泉百十道與星宿海相同西番人名以查楚必拉蒙古人名以七察爾哈那衆泉㑹流為大川南行二千里沿途納東西大水十餘處經四川西境始名鴉礲江又南行六百里入四川境過三渡水始名打沖河又西行三百里又南行五百里與北金沙江合又一千六百里至叙州自發源計之共行五千里較岷江之源亦幾於三倍而水勢盛大亦倍於岷江以源之逺論當至金沙江以源之大論當至鴉礲江然不如金沙為確葢金沙較鴉礲又逺千九百里源逺則流無不盛者若岷江則斷斷不得指為江源也又按江河並發源於崑崙河源在其北者已東趨陜西又折而北直趨塞外鄂爾多斯又東行千餘里然後折而南由延安入陜再折而東以入於海江源在崑崙南亦東南行已與四川相近復南行直趨雲南東行千餘里然後折而北由雪山入川再折而東以入於海兩大川始而相背繼而相向有若黻文亞字亦天地之竒觀江源者亦可以無憾矣蕙田案徐李二氏論江源一得之逺遊一得之圖象其言皆信而有徵可補前人所未備惟察於地理通乎山川大原者始知之又案唐六典云江河自西極達東溟中國之大川也據此則以江源出于西極其來已久是不止范氏約畧之詞迨徐李二家昌言之而後明也古人學問深廣非後人所及特世人留心者少故其學漸微耳觀承案江源金沙徐李二説誠辨然要而論之終以岷山為江之正源金沙江特為叙江之源至叙州而亦入於江乃小水入大水之例耳葢源雖以逺者為宗而亦以大者為正江自岷山至叙行千八百里已自成江舟楫通利其為大江也無藉於金沙來入而始成故叙江之自南而北入於江亦如漢江之自北而南入於江後人斷不以漢亦入江而遂改江源於嶓冡豈可以叙亦入江而竟改江源於金沙哉葢既論正偏則不必更計其修短矣況金沙盤曲於萬山中細流斷續巨石横亘從古不通近乾隆初年雲南督臣按圖開濬董其事者云鑿山壍石不知凡幾始有逕可通今雖亦行舟楫畢竟﨑嶇屈折於側徑巉巖中危險特甚未能通行無礙也則徐李二説雖新竒可喜特足廣人聴聞終不可改為江之正源也又東至于澧過九江至于東陵錐指傳曰澧水名東陵地名地理今釋澧水出今湖廣永定衞西歴山至岳州府安鄉縣南㑹赤沙河入洞庭湖蕙田案九江東陵説見前觀承案澧乃以水名地而非水也導水文凡書過書入書㑹者皆水名書至者則係地名如至於東陵至於大别至於敷淺原之類可見東迆北㑹于滙錐指蘇氏曰迆迆邐也林氏曰迆者斜出之辭邵氏曰江漢水漲彭蠡鬱不流逆為巨波無仰其入而有賴其遏彼不遏則此不積所謂滙者如此故曰北㑹于滙葢實志也東為中江入于海錐指傳曰有北有中南可知曽氏曰豫章九江合于湖漢東至彭蠡入江此九水葢南江也南江乃江之故迹非禹所導禹導漢水入焉與舊江合流而水之𣲖分為南北故漢為北江又導岷山之江入焉其流介乎二江之中故為中江南江乃故道故經不志程氏曰經云東滙澤為彭蠡東迆北㑹于滙是二語者附著直畧切南江以槩其所不書者也彭蠡為南江無疑禹之行水嘗經疏導則雖小而見録無所致力則雖大而不書南江源𣲖誠大且長正以不經疏導故自彭蠡而上無一山一水得見於經然於其合并江漢而以滙㑹名之使天下因鼎錯之實參北中之目而南江隠然在二語中此聖經之書法也邵氏曰江水濬發最在上流其次則漢自北入其次則彭蠡自南入三江並持而東則江為中江漢為北江彭蠡所入為南江可知已非判然異𣲖之謂也且江漢之合茫然一水唯見其為江也不見其為漢也故曰中江曰北江然其勢則相敵也故曰江漢朝宗凡集傳謂經誤者非是餘干張克修云寳亦云渭按三江之説自康成子瞻以後得三氏而愈明江漢共為一瀆而其入海也則漢為北江江為中江即朝宗于海並舉二川已為之張本矣南江無所致力不用循行故導水無文蕙田案胡氏三江之説與李氏合但南江之名不見于經不如竟指九江為直截也觀承案邵氏所云江水最在上流其次則漢自北入殊謬江水固在上流而其次當曰洞庭自南入乃可云其次則漢自北入至彭蠡則已屬揚州之界又不當於荆州條内序列矣葢洞庭乃湘江之委發源嶺表自南而北行二千餘里至巴陵而先入於江其為南江也久矣漢水則在巴陵之下五百餘里始自漢口而南入於江故為北江也邵氏直以江為上流即次以漢若不知漢口上流之有洞庭者是荆州全𫝑猶未辨而欲核論三江乎地理今釋江水出今四川松潘衞北西蕃界源有三支自浪架嶺岷山之隨地異名者南流東支自弓槓口至漳臘營合正支西支自殺虎塘至黄勝闗合正支南經茂州威州汶川縣以至灌縣離堆岐為數十股滂沱南下左抱成都府西環崇慶州衆流以次㑹于新津縣南又南行逕眉州嘉定州至叙州府東南合金沙江折而東北流至重慶府嘉陵江發源陜西鳳翔府寳雞縣之大散嶺至鞏昌府徽州合西漢水入四川界涪江發源松潘衛東雪欄山東南流至合州與嘉陵江㑹自北來合流入之又東北逕䕫州府巫山縣入湖廣界東流至彛陵州東南流至枝江縣又東流至荆州府折而南流至石首縣又東流至監利縣又南流至岳州府折而東北流至武昌府與漢江合又東流至黄州府又東南流入江西界至湖口縣與南江合即贑江又東北流入江南界經江寜府通州入海范氏成大曰江出岷山其源實自西戎萬山來至嘉州而沫水合大渡河以㑹之至叙州而馬湖江出自夷中以㑹之又十五里而南廣江㑹之至瀘州而内江自資簡等州㑹之至恭州而嘉陵江自利閬果合等州㑹之至涪州而黔江又自黔州合南夷諸水㑹之至萬州而開江水自開達等州㑹之夫然後總而入于峽是江自峽而西受大水凡八及出峽而下岳陽則㑹之者洞庭湖所受湖南北諸郡水也又自是而下鄂渚則㑹之者漢口所受興元諸郡水也又自是而下黄州東四十里則㑹之者巴河也又自是而下江州則㑹之者彭蠡今名鄱陽湖所受江東西諸郡水也又自是而下則㑹之者皖水所受淮西諸水也夫然後總而入于海是江自峽而東又受大水凡五畧計天下之水㑹于江者居天地間之半其名稱之大而可考者凡十有三故曰江源其出如甕而能滔滔萬里以達海所受者衆也嗚呼問學者可以觀矣導沇水東流為濟入于河錐指傳曰泉源為沇流去為濟在温西北平地正義曰地理志云濟水出河東垣縣王屋山東南至河内武徳縣入河見今濟水所出在温之西北七十餘里渭按漢垣縣故城在今山西平陽府垣曲縣西四十里温縣故城今在河南懐慶府温縣西南武徳故城在今武陟縣東黄河在縣南與開封府河隂縣分水地理今釋沇水即濟水之上流蔡傳所謂發源為沇既東為濟是也濟水出今河南懐慶府濟源縣王屋山既見而伏至濟源縣西北五里重源顯發有東西二池合流至温縣東南入河胡氏渭曰水經注濟水故瀆即漢志所謂東南至武徳入河者葢禹迹也第五卷河水注云成皋大伾山在河内修武武徳之界濟沇之水與滎播澤出入自此即經所謂濟水從北來注之者今濟水自温縣入河不於此也所入者奉溝水耳即濟沇之故瀆矣沁水篇云沁水東過武徳縣南積為陂有朱溝水注之其水上承沁水於沁水縣西北自方口東南流奉溝水右出焉又東南流右泄為沙溝水東逕隰城北殷城南而東南注于陂陂水又東南流入河先儒亦咸謂是為泲渠故班固及闞駰並言泲水至武徳入河按沙溝即奉溝之下流古濟水由此入河故謂之泲渠沙溝當在今武陟縣界也正與此相發明濟水於武徳入河南直成皋今汜水河隂之界是也其後由温縣入河則南直鞏縣所謂津渠勢改不與昔同者也今其故道又盡陷河中濟水唯從枝津之合溴水者至孟縣東南入河見懐慶府志南直孟津縣其流益短矣由大禹而來濟水入河之道凡再變溢為滎錐指曽氏曰職方云其川滎雒者禹時為滎澤而已至周則為川穆天子傳浮于滎水乃奏廣樂是也黄氏曰經溢為滎導荷澤被孟豬皆一字之工足以觀禹迹吴氏曰濟既入河其伏者潜行地下絶河而南溢為滎澤再出于陶邱北溢者言如井泉自中而滿非有來處如菏澤被孟豬之被出者言在平地自下而涌非有上流如某水至某處之至滎澤後既填塞陶邱亦無竇濟瀆故道不可復尋矣渭按書溢書出僅一見乃禹貢特筆當與他水導源首受者不同吴氏義最精地理志云濟水自垣縣東南至武徳入河軼出滎陽北地中即經所謂溢為滎也曰軼出地中則重源顯發不與河通可知矣説者以滎播河濟往復經通為禹之舊迹非也焦弱侯云伏見不常而識其為濟此禹之所以為神㫖哉言乎滎澤至周時已導為川與陶邱復出之濟相接然河濟猶未通波及周之衰有於滎陽下引河東南為鴻溝與濟汝淮泗㑹者而河始與濟亂以今輿地言之滎澤原武陽武封邱祥符陳留蘭陽並屬河南開封府曹州屬山東兖州府諸州縣界中皆滎瀆之所經也自鴻溝既開滎瀆為河水所亂已非其舊逮東漢之世滎澤亦塞而禹迹蕩然無存矣東出于陶丘北又東至于菏錐指傳曰陶丘丘再成正義曰釋丘云再成為陶丘李巡云再成其形再重也郭璞云今濟隂定陶城中有陶丘地理志云定陶縣西脱南字有陶丘亭渭按出字義見上文今山東兖州府定陶縣西南有定陶故城漢濟隂郡治也陶丘亦在西南去縣七里菏即菏澤地理志濟隂郡下云禹貢菏澤在定陶東唐省定陶入濟隂故通典濟隂縣下云菏澤在縣東北九十里故定陶城東北今曹州東南三十里與定陶接界處是也濟水有三伏三見之説或謂出于近世之俗學殊不可信王綱振云如時以東流為濟溢為滎為見則漾東流為漢滙為彭蠡亦可為見乎又若以入于河為伏則渭入於河洛入于河亦可為伏乎況經明言浮于濟漯達于河河濟本通而此曰流曰溢曰入曰出曰至曰㑹亦並無間斷不知三伏三見何據但沿襲既久為之曲解非本注也渭按伏見之説二孔無之然有所自來泰澤一伏東邱一見本水經注武徳入河再伏滎陽軼出再見本地理志滎東又洑為三伏出曹濮為三見本唐書許敬宗傳此豈創自近世但以入河為伏義有未安耳滎澤自周以前已導為滎川與陶邱復出之濟相接故漢志于軼出滎陽地中下即繼之曰又東至琅槐入海而定陶縣下亦止云禹貢陶邱在西南不引東出之文葢三見之迹不可得見久矣鴻溝既開滎瀆為濁河所亂陶邱之竇日就填淤而滎澤之澄泓如故其後滎澤亦塞則河南由是無濟水而再見之迹亦亡水經以河濟合流分入滎瀆者為濟水京相璠謂之出河之濟酈道元宗之而班固之所謂軼出地中者絶口不談矣或以為河中截流而過孔安國或以為河底穴地而來蔡沈或以為河濟相亂南出還清孔頴達或以為適㑹河滿溢出南岸程大昌各持所見終非定論余竊謂河南之濟即奮自河南之地中未必與入河之濟為一脈譬如人之鼻息總出丹田氣海中呼者豈必其吸者之復出邪沈括云歴下凡發地皆是流水世傳濟水經過其下東阿之井乃濟水所為曽鞏云泰山諸谷之水自渴馬崖潛流地中至歴城西復出為趵突旁溢十數泉蔡傳引以證濟之伏見重源顯發所在多有元和志云鄭州管城縣京水出縣南平地新鄭縣溱水出縣西北三十里平地二處並在河南宻邇滎澤尤為明騐葢濟瀆所經之地其下皆有伏流遇空竇即便涌出故一見于滎澤再見于陶邱不必以入河之濟為上源亦不必并泰澤東邱數之為三伏三見也草廬之説雖聖人復作無以易之矣又東北㑹于汶錐指傳曰濟與汶合渭按地理志汶水出泰山萊蕪縣西南入濟詳見青州又北東入于海錐指傳曰北折而東茅氏曰秦繼宗云又東北㑹于汶當於東字一讀又北東入于海當於北字一讀渭按地理志濟水自滎陽東至琅槐入海過郡九行千八百四十里今青州府樂安縣東北一百十里有琅槐故城漢縣屬千乗郡也以今輿地言之自東平㑹汶以下東阿平隂並屬山東兖州府長清齊河歴城章邱鄒平長山新城並屬濟南府髙苑博興樂安並屬青州府諸縣界中皆禹貢濟水入海之所經也濟水自東平以下唐人謂之清河按戰國䇿燕王謂蘇代曰齊有清濟濁河以為固郭縁生曰清河首受洪水北流濟或謂清則濟也酈道元曰濟水通得清之目亦水色清深用兼厥稱矣此清河之名所自來也至宋又有南北清河之名河渠志云熈寜十年河決澶州徙而南東滙于梁山張澤濼分為二脈一合南清河入于淮一合北清河入于海南清河即泗水北清河即濟瀆也南渡後北清河又有大小之分葢自劉豫導濼東行始齊乘以大清河為古濟水小清河為豫所創志家皆沿其説黄子鴻非之曰以水經注元和志寰宇記諸書考之濟水最南漯水在中河水最北今者小清所經自歴城以東如章邱鄒平長山新城髙苑博興樂安諸縣皆古濟水所行而大清所經自歴城以上至東阿固皆濟水故道而自歴城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則故河水所經葢宋時河嘗行漯瀆及河去則大清兼行河漯二瀆其小清所行則斷為濟水故道也渭按子鴻此言正三百餘年積傳之謬葢清河所行本濟瀆不知何時從歴城東北決而北入濟陽縣界與漯水合而清河之名遂被于漯據水經漯水逕著縣故城南著即今濟陽而縣南有大清河是知大清即漯其水自歴城入濟陽乃近世之所決非唐清河入海之故道也濟陽之流日盛則章邱之流日微故劉豫堰濼水使東以益之齊乗云大清河自齊河縣又北經歴城上濼橋北濼水分響河入焉又東北逕華不注山隂又東逕下濼堰濼水舊入濟處堰南即小清河按響河即聴水也此大清河猶是濟之故瀆其所行者實濟水故道而志家反以濟陽之大清河為古濟舛錯殊甚不有子鴻其誰正之然大清自歴城入濟陽及濵州以東入海之道不知決于何年意者宋熈寜時河嘗合北清河入海始開此道其後金明昌五年河復由此入海久而後去流益深廣此大清河之所以浩浩而小清河之所以屢濬屢塞也與濟瀆之水自周以來凡數變初為濟及導滎為川則滎與濟合鴻溝既開滎瀆為河所亂及滎澤又塞則所行者唯河水矣汴渠不通則鉅野以北所行唯荷汶戴村已築則東阿以下所行唯山泉溝澤之水其號為濟者襲舊名而已濟瀆入海之道自唐以來亦數變初經髙苑縣北又東北至博昌入海其後則不由博昌通典云舊濟合在今博昌縣界今無元和志蒲臺縣下云海在縣東一百四十里海畔有一沙阜俗呼為鬭口淀是濟水入河之處海潮與濟相觸故名葢其時濟水改道從蒲臺東北與河渾濤而入海也宋南渡後劉豫導濼水東行入濟水故道為小清河仍經髙苑縣北至樂安入海及金皇統中縣令髙通改由縣南長沙溝至博興合時水又東北至樂安由馬車瀆入海瀆在縣東北五十里今為髙家港其後小清之上流堙塞鄒平長山新城界中故瀆皆為漯河所行漯河即楊渚溝水寰宇記所稱獺河者也歴城新志云小清河自明永樂以後漸至堙塞成化九年嘗濬治之嘉靖十二年又塞乃復濬博興以西達於歴城幾三百里久之復淤葢小清唯恃濼水為源堰東有阻則濼水仍自華不注東北入大清河屢濬屢塞職是故也水經所叙瀆同而水異水異故李𢎞憲云河南無濟水瀆同故黄文叔云禹迹賴此而猶存言非一端各有所當今與人論濟水苟以為無則羣指七十二泉大小清河以相難若以為有則又據杜佑之説詆水經不當襲舊名為濟明道謂與公言如扶醉人扶得一邊起又倒却一邊真可笑又可憎也導淮自桐栢錐指傳曰桐柏山在南陽之東正義曰地理志云桐柏山在南陽平氏縣東南淮水所出水經云出胎簮山東北過桐柏山胎簮葢桐柏之旁小山也傅氏曰胎簮山即桐柏也後世又别名之耳禹謂導淮自桐柏不應桐柏非淮所出今其山在唐州桐柏縣渭按桐柏見導山今河南南陽府桐柏縣西北四十里有平氏故城漢縣也胎簮山寰宇記云在桐柏縣三十里東㑹於泗沂東入于海錐指傳曰與泗沂二水合入海蔡氏曰沂入於泗泗入於淮此言㑹者以二水相敵故也入海在今淮浦吴氏曰二水均敵不以沂既入泗而沒其名如朝宗並稱江漢之例金氏曰淮出桐柏初甚湧復潛流三十里然後東馳亦尚淺其深處為十四潭至并汝潁始大汝潁禹時不費治導故不書自桐柏至海凡千七百里渭按泗沂二水並見徐州淮浦漢屬臨淮郡其故城在今江南淮安府安東縣西地理志云淮水至淮陵入海注疏本訛為睢陵唯水經云至淮浦縣入海蔡氏從之淮浦隋改曰漣水縣宋置漣水軍淮浦之名久絶今字謬當云入海在漢淮浦縣今漣水軍以今輿地言之淮水自桐柏縣南東逕信陽州北信陽在汝寧府西南二百七十里水去州四十五里又東逕羅山縣北真陽縣南羅山在州東一百二十里真陽在府南一百二十里水去縣八十里淮水舊自確山縣南流入二縣界元和志云淮水在朗山縣南一百二十里是也今不入其界又東逕息縣南息縣在光州西北九十里春秋息國地水去縣五里又東逕光山縣北光山在州西四十五里本春秋弦國水去縣八十里又東逕光州北光州在汝寜府東南二百七十里本春秋黄國水去州六十七里又東北逕固始縣北固始在州東北一百二十里水去縣七十里縣東南四十里有茹陂後漢末揚州刺史劉馥所築為耕屯之地其後鄧艾等嘗修治之今故址僅存又東北逕潁州南潁州在江南鳯陽府西四百二十里水去州一百十里又東十餘里合汝水南岸即霍邱縣界又東逕霍邱縣北霍邱在夀州西南一百二十里水去縣四十五里其渡處曰安風津又東逕潁上縣南潁上在潁州東一百二十里水去縣二十五里西南與霍邱分界又東三十五里與夀州分界潁水在縣南門外亦曰沙河東南流至正陽鎮入淮謂之潁口即春秋之潁尾也鎮在縣東南七十里淮水之西又東逕夀州西北夀州在鳯陽府西少南一百里水去州二十五里芍陂在州南亦曰期思陂淮南子曰孫叔敖決期思之水灌雩婁之野即此又東逕懐逺縣南懐逺在府西北七十里水去縣一里流至城東稍折而北渦水來注之謂之渦口又東逕鳯陽縣北縣為鳯陽府治水去城十里又東逕臨淮縣北臨淮在府北少東二十里水去縣一里又東北逕五河縣南五河在府東北九十里本漢虹縣屬沛郡咅貢後漢為虹縣淮水在縣東南二里有澮沱漴潼四水與淮㑹為五河口縣取名焉又東逕泗州南盱眙縣北泗州在府東少北二百十里水去州一里有浮橋為南北要道潘季馴曰淮挾汝潁肥濠等處七十二溪之水至泗州下流龜山横截河中故至泗則湧譬咽喉間湯飲驟下吞吐不及一時呃塞其𫝑然也明神宗十九年泗州大水淮流泛濫髙於城溺人無算浸及祖陵季馴上言水性不可拂河堤不可弛地形不可强治理不可鑿人欲棄舊以為新而臣謂故道必不可失人欲支分以殺勢而臣謂濁流必不可分霖淫水漲久當自消也盱眙在州南五里水去縣二里有長沙洲長二里淮水泛漲賴以捍禦縣西南一里有上龜山縣東北三十里有下龜山為龜山鎮其下有運河一名新河宋初發運使許元自淮隂開新河屬之洪澤避長淮之險凡四十九里久而堙澀熈寜四年發運副使皮公弼修泗州洪澤河六十里以避漕運涉淮風濤之患元豐六年發運使羅拯復欲自洪澤而上鑿龜山裏河以逹于淮㑹發運使蔣之竒入對建言上有清汴下有洪澤中問風波之險不過百里宜自龜山蛇浦下屬洪澤鑿左助為複河取淮為源不置牐堰可免風濤覆溺之虞議者以為便遂成之亘五十七里有竒廣十五丈深丈有五尺南渡後寖廢川瀆異同曰泗州與盱眙兩城相距凡七里自昔為淮流襟束之處汴水自河南界流經州城東而合於淮謂之汴口宋時以此為漕運要衝今唯涓流可辨耳由州城而東三十里龜山峙焉淮流至此乃益折而北又二十餘里而洪澤富陵泥墪萬家等湖環滙于淮之東岸淮水泛濫恒在于此州逼淮而地下故也渭按古汴水東流經彭城縣北而東入于泗唐貞元中韓愈佐徐州幕有詩云汴泗交流郡城角是其時汴水猶于州城東北隅合泗入淮也不知何年改流從夏邑永城宿州靈壁虹縣至泗州兩城間而入于淮宋時東南之漕率由北以逹京師南渡後漸堙元泰定初河行古汴渠仍于徐州合泗水至清口入淮而泗州之汴口遂廢又東北逕清河縣南與泗水合謂之清口清河在淮安府西少北五十里淮水去縣五里洪澤湖在縣南六十里洪澤鎮西長八十里接盱眙縣界新志謂之富陵湖夏允彛曰清河縣北有老黄河本沂泗東趋合淮入海故道開此則河之赴海必勇雲梯闗下淤塞葦場當自蕩滌而海口廓矣渭按此必近世決河入海之故道非淮水東會泗沂之舊迹也水經泗水注云下邳縣為沂泗之㑹沂水注云於下邳縣北西南入泗是沂泗合流入淮也今沂水挾泇武防浚諸水至邳州入黄河即古沂水入泗處黄河是泗水故道邳州本秦下邳縣新志云沂水舊在州西一里今為黄流淤塞改道自郯城入運河矣又東北逕山陽縣北山陽淮安府治射陽湖古射陂也在縣東南八十里與䀋城寳應分水髙家堰在縣西南四十里後漢建安中太守陳登防淮此其故址也明永樂初平江伯陳瑄始為築治長六十里清江浦在縣西即新運河也舊名沙河宋志楚州北有山陽灣淮流迅急每致沉溺雍熈中漕臣劉幡議開沙河避淮水之險喬維岳繼之自楚州至淮隂開導凡六十里舟行便之其後淤塞明永樂中陳瑄修治運河乃鑿清江浦引水由管家湖至鴨陳口達海又東北逕安東縣南又東北入於海安東在府東北六十里本漢淮浦縣水去縣二里海在縣東五十餘里自䀋城縣東北經山陽縣東折而西北為淮水入海之口其北岸則安東也縣志云自縣西三十里顔家河渡直下過縣南東流五十里又東北過雲梯闗折旋入海此導淮㑹泗沂東入海之故道也自元時河奪汴泗以入淮而兩瀆并為一瀆清口以東淮悉成河矣地理今釋淮水發源河南南陽府桐柏縣桐柏山山下有淮井泉源所出水經云出胎簪山者即桐柏之支峰也東流至光州東北㑹汝水出河南汝寜府遂平縣西六十