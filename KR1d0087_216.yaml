三十里與渭水合經所謂又東㑹於涇也又東過漆沮入於河錐指傳曰漆沮二水名亦曰洛水出馮翊北黄氏曰今漆沮之洛入河處與渭稍離亦水道改矣渭按漆沮見雍州地理志渭水東至船司空入河船司空縣名屬京兆尹其故城在今西安府華隂縣東北五十里以今輿地言之渭水自髙陵咸寜縣界又東逕臨潼縣北臨潼在西安府東少北六十里水去縣十五里又東逕渭南縣北渭南在府東一百四十里元和志渭水南去渭南縣四里又東逕同州南華州北同州在府東北二百八十里渭水北去州三十五里華州在府東一百九十里渭水南去州十二里又東北逕華隂縣北華隂在華州東七十里東至潼闗衞四十里渭水南去縣十五里又東入於河是曰渭口經所謂又東過漆沮入于河也先儒皆云灃涇水大故曰㑹漆沮水小故曰過由今觀之涇水則誠大矣灃水源流頗短而漆沮合洛入渭洛源甚逺似不可謂小於灃也或云灃涇大與渭相敵而實小於渭愚竊謂三水之大小即以本水論未必以渭之所受多寡相較量以為大小也嘗考渭南本周之舊都西漢因之其後隋唐復建都於此歴代相承鑿引諸川以資汲取便轉輸溉民田灌苑囿津渠交絡離合不常凡地志水經所言類非禹迹之舊詩曰豐水東注維禹之績則渭南諸川唯灃為大自漢鴻嘉中王商穿長安城引内灃水注第中而其流漸㣲逮唐貞觀中堰灃鎬入昆明池二水於是斷流又於京城西北引灃水為漕渠合鎬水北流由禁苑入渭而灃水之流愈微矣又鄭當時所開漕渠及靈軹富民昆明諸渠皆横絶灃鎬等水水脈益亂不可尋究霸滻舊合流入渭自隋堰滻水為渠而二水亦離故道澇潏舊各自入渭今澇水下流亦合潏水入渭大抵渭南六川盡失其舊亦猶洛陽為東漢魏晉相繼作都之地穿鑿滋多而西澗東瀍皆非禹迹也竊疑灃西之澇灃東之鎬潏霸滻禹時悉合灃以入渭故灃水得成其大且詩言東注而漢志云北過上林苑入渭則是北流而非東注矣禹導渭東㑹於灃當在漢霸陵縣北霸滻入渭處也若夫漆沮之為洛語出安國傳闞駰因以洛至華隂入渭者為漆沮之水而酈元從之然渭北之水為鄭白二渠所亂漆沮本不合洛亦未可知其濁水上承雲陽大黒泉者俗謂之漆水東南流合沮至櫟陽入渭俗又謂之漆沮水源流頗短禹所治者恐不過如此故漆沮視灃水為小傳曰禮失而求之野土俗所稱傳自古世未必不確於儒者之言也禹時洛水不為害未嘗施功故導渭不志導洛自熊耳錐指傳曰在宜陽之西王氏樵曰導洛自熊耳一節有兩熊耳地志謂伊水出盧氏之熊耳山海經郭璞謂伊水出上洛之熊耳地志謂洛水出上洛冡領山據經則洛出熊耳上洛亦有熊耳與冡領同在一縣則洛出熊耳明矣渭按漢志上洛縣東北有熊耳山括地志云熊耳山在商州上洛縣西詳見導山以今輿地言之洛水出陜西西安府商州西熊耳山東北流逕州東商州在府東南三百里春秋晉上洛邑漢為縣又東北逕洛南縣北洛南在州東北九十里本漢上洛縣地經所謂導洛自熊耳者也東北㑹於澗瀍錐指傳曰㑹於河南渭按河南即王城洛水至其城西南澗水側城西來注之又東至其城東南瀍水側城東來注之周公所謂澗水東瀍水西者也二水入洛處相去甚近故連言之以今輿地言之洛水自洛南縣北又東逕河南府盧氏縣南盧氏在府西南三百四十里又東北逕永寜縣南永寜在府西南二百里本漢澠池縣之南境又東北逕宜陽縣北宜陽在府西南七十里又東入洛陽縣界逕河南故城南經所謂東北㑹于澗瀍也自周靈王壅穀水使東出王城北合瀍水南入洛而城西之澗水遂為死榖及漢明帝復堨澗瀍二水使出洛陽故城北為千金渠又東過偃師縣南東入于洛偃師在府東七十里而禹貢東㑹澗瀍之舊迹無復有存焉者矣又東㑹於伊錐指傳曰㑹於洛陽之南渭按伊水見豫州洛陽謂故洛陽城周之下都也在今洛陽縣東北二十里水經注洛水自河南縣南又東逕洛陽縣南伊水從西來注之洛陽周公所營洛邑也故洛誥曰我卜瀍水東亦惟洛食其城南繋于洛水北因于郟山春秋昭公二十三年晉合諸侯大夫戍成周之城是也元和志洛水在洛陽縣西南三里西自苑内上陽之南瀰漫東流宇文愷斜堤東令東北流當衝捺堰九折形如偃月謂之月坡今雖漸壊尚有者按伊水篇云伊水自闕東北流至洛陽縣南逕員邱東又東北注于洛員邱在今洛陽縣東三十里委粟山下曹魏郊天之所以今輿地言之洛水自河南故城南又東北逕洛陽縣東南又東至洛陽故城南伊水從偃師縣西來注之經所謂又東㑹于伊也又東北入於河錐指傳曰合於鞏之東渭按鞏周邑漢置縣屬河南郡其故城在今鞏縣西南二十餘里以今輿地言之洛水自洛陽故城南㑹伊水又東逕偃師縣南北去縣五里又東逕鞏縣故城南今縣在河南府東一百二十里隋所遷也又東北至洛口入河洛口在鞏縣故城東北三十里今縣少東八里經所謂又東北入于河也今洛水自鞏界東過汜水縣北汜水故成臯西至鞏縣界十五里又二十五里為縣治又東從滿家溝入河而洛口乃移于東非復古之什谷矣漢志𢎞農上雒縣下云禹貢雒水出冡領山東北至鞏入河過郡二𢎞農河南行千七十里金吉甫曰北方諸水雖大河亦冰唯洛水不冰所以謂之温洛一是大地之中二是其北連山以障北風三則前人謂其中有礜石九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同錐指此總序水土之功而先舉其凡曰九州攸同下文四隩既宅至四海㑹同皆其目也春秋㐮公四年左氏傳芒芒禹迹畫為九州疏言畫地分之以為竟也漢書地理志堯遭洪水懐山㐮陵天下分絶為十二州使禹治之水土既平更制九州列五服任土作貢竹書紀年帝舜三十三年夏后受命於神宗遂復九州胡氏渭曰古字州與洲通爾雅水中可居者曰洲説文堯遭洪水民居水中為髙土故曰九州今按禮記祭法曰共工氏之伯九州也其子曰后土能平九州故祀以為社韋昭云共工氏伯者在戯農之間管子曰神農作殖五穀九州之民乃知穀食地理志曰黄帝畫野分州得百里之國萬區陸氏釋文引周公職録曰黄帝受命風后授圖割地布九州帝王世紀曰顓帝帝嚳建萬國而制九州杜氏通典曰顓帝置九州帝嚳受之州之為州也尚矣誠如許氏所言豈羲農之時亦嘗有洪水乎舜典疏云天地之勢四邊有水鄒衍書説九州之外有瀛海環之是九州居水内故以州為名共在一州之上分之為九耳此説近是葢自羲農以迄帝堯並為九州但其州名與疆域容有不同故黄帝顓頊亦稱建置日知録云夏商之後沿上世九州之名各就其疆理所及而分之故每代小有不同周禮量人掌建國之法以分國為九州曰分則不循於其舊可知矣洪範曰鯀則殛死禹乃嗣興而堯典殛鯀次肇十二州之下故地理志云堯遭洪水懐山㐮陵天下分絶為十二州使禹治之水土既平更置九州列五服葢漢人之説如此故王莽據之為奏帝王世紀云堯遭洪水分為十二州今虞書是也及禹平水土還為九州今禹貢是也説本班固今按禹告成在堯時堯崩三年䘮畢舜即位其命官曰咨十有二牧則九分為十二實在告成之後使先十二而後九則舜之命官不當復言十二牧肇者始也使前此已為十二州至是後分九為十二則亦不得言肇矣且因懐㐮而分絶其所蕩析者不應獨在冀青之北是皆可疑愚竊謂古史記之體有以年為經者春秋是也有以事為經者尚書是也二典所載諸事不繫年月封山與巡狩為一類四罪與恤刑為一類故相繼言之吴才老云史泛舉舜所行之大事初不計先後之序林少頴云殛鯀竄苗當在洪水未平之前肇十二州當在禹平水土之後史因言舜之恤刑遂舉四凶事繫於下耳二説允當左傳王孫滿曰昔夏之方有徳也貢金九牧杜預以為在禹之世孔頴達亦云禹登王位還置九州近是竹書紀年曰帝舜三十三年夏后受命于神宗遂復九州殆未可信地理通釋夏都皇王大紀禹都于安邑世紀鯀封崇伯國在秦晉之間左氏傳趙穿侵崇是也禹受封為夏伯在禹貢豫州外方南於秦漢屬潁川本韓地今河南陽翟是也地理志陽翟夏禹國今潁昌府陽翟縣有禹山輿地志宿州虹縣本夏邱縣堯封禹為夏伯邑於此受禪都平陽或在安邑今陜州夏縣本夏禹之都漢為安邑屬河東後魏改為夏縣郡縣志夏縣東北十五里安邑故城禹所都也或在晉陽左傳注夏虚大夏今太原晉陽世本言夏后居陽城本在大梁之南今陳留浚儀是也劉熈云潁川陽城今屬河南按經傳夏與堯舜同在河北冀州之域不在河南居陽城者自謂禹避商均時非都也外紀禹都安邑或云平陽亦云晉陽及韓啟筮享神於大陵之上是為鈞臺之享又筮於晉之墟作璿臺於水之陽寰宇記禹自安邑都晉陽桀徙安邑相徙帝邱於周為衞左傳衞遷于帝邱衞成公夢康叔曰相奪予享注相居帝邱今濮陽外紀相為羿所逐失國居商邱依夏同姓諸侯斟灌斟鄩今按商邱當作帝邱葢世紀之誤也地理志北海夀光縣注古斟灌禹後今灌亭是平夀縣注故斟尋禹後今斟城是左傳注夀光東南有灌亭平夀東南有斟亭括地志斟灌故城在青州夀光縣東五十四里斟鄩故城今青州北海縣是也水經注地理志北海有斟縣京相璠曰故斟尋國禹後西北去灌亭九十里少康中興復還舊都通典宋州虞城縣有綸城即少康邑在縣東南三十五里戰國䇿稱桀之居左天門之險上黨天井闗即天門也右天谿之陽成臯在其北伊洛出其南吴起對魏武侯亦言桀之居左河濟右太華伊闕在其南羊腸在其北羊腸坂在太原晉陽西北九十里史記正義汲冡古文云太康居斟尋羿亦居之桀又居之書云太康失邦兄弟五人湏于洛汭此即太康居近洛也臣瓚云斟尋在河南葢後遷北海也周書度邑篇武王問太公吾将因有夏之居即河南是也括地志故鄩城在洛州鞏縣西南五十八里葢桀所居夏亭故城在汝州郟城縣東北五十四里葢夏桀所封書湯誓注桀都安邑嗚條之野地在安邑之西鳴條陌服䖍曰陶唐虞夏之都大率相近不出河東之界右禹貢隨山濬川五禮通考卷二百六
