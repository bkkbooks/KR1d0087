body:
  text: 五禮通考卷一百四十一刑部尚書秦蕙田撰嘉禮十四朝禮蕙田案周禮命婦朝女君則皇后之有朝尚矣漢制自二千石夫人以上服蠶衣以朝晉宋皆然唐永徽五年命婦朝於光順門其後以朝官命婦雜處朝賀詔停開元禮載皇后正旦冬至受外命婦朝儀於肅章門外齊班然後入内殿行禮賀畢有會長慶以後則外制皇親國戚之家及臣僚命婦遇節序慶賀許入内進奉而已其朝賀太皇太后皇太后禮同至於正旦冬至朝賀行禮之詳無聞焉元正旦命婦則以常禮詣内殿行賀禮明正旦冬至皇后御坤寧殿内使監官引内外命婦入朝禮畢賜宴於後殿今具唐開元禮明禮志集禮及歴代儀注用著于篇宋書禮志自皇后至二千石命婦皆以蠶衣為朝服隋書禮儀志後齊元日中宫朝會陳樂皇后褘衣乗輿以出於昭陽殿坐定内外命婦拜皇后興妃主皆跪皇后坐妃主皆起長公主一人前跪拜賀禮畢皇后入室乃移幄坐於西廂皇后改服䄖翟以出坐定公主一人上夀訖就坐御酒食賜爵並如外朝會後周皇后之服凡十有二等朝命婦則服衣食命婦歸寕則服鴩衣臨婦學及法道門命婦有時見命婦則蒼衣隋儀如後齊制而又有皇后受羣臣賀禮則皇后御座而内侍受羣臣拜以入承令而出羣臣拜而罷皇后禕衣深青質織成領袖文以翬翟五采重行十二等素紗内單黼領羅縠褾􅙦蔽膝隨裳色用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組以青衣革帶青韈舄舄以金飾白玉佩𤣥組綬章采尺寸與乗輿同祭及朝會凡大事則服之明集禮古者后夫人有房中之樂歌周南召南而不用鐘磬所以諷誦以事其君子而朝會之樂未聞焉隋初皇后之庭但設絲管大業以後始制鐘磬而猶不設鏄鐘唐開元禮皇后正至受羣官朝賀前一日尚寢率其屬設御幄座如外命婦朝儀守宮設次於宫城門外如常儀其日未明一刻諸衛各勒所部屯門列仗及陳布於肅章門外奉禮設文武羣官諸親番客使等衛於宫城門外如廟堂之式典儀設文武羣官位於肅章門外文東武西俱重行北面相對為首諸親位於文武五品之下朝集使番客等分方位次如常設典儀贊者位於羣官東北差退西向北上又設内給事位羣官之北南向若與外命婦同時朝則典儀於肅章門外設羣官等版位文武羣官依時刻集列門外俱就次各服其服若與上臺同上朝賀則上臺禮畢羣官仍朝服典謁引從納義門西行就版位尚儀奏請中嚴六尚以下各服其服俱詣内閤奉迎典儀率贊者先入就位典謁引文武羣官入就位尚儀奏外辦皇后首飾禕衣以出即御南向坐侍御警蹕及設琮璽於御座並如常儀内謁者監引内給事出就南面典儀曰再拜贊者承傳文武羣官等俱再拜典儀引為首者一人進内給事前北面跪賀詞至正並與賀皇帝同惟伏惟殿下與時同休為異耳賀訖俛伏興典謁引退復位羣官等皆再拜内謁者監引内給事入依式奏聞内給事承令出謁者監引内給事復南面位稱令㫖羣官等皆再拜内給事宣令云履新之慶冬至云履長之慶與公等同之羣官等又再拜内謁者監引内給事入典謁引羣官等尚儀前奏禮畢皇后降座以入侍衛警蹕如常儀皇后正至受外命婦朝賀并會太皇太后皇太后受羣臣外命婦朝賀禮並同前二日本司宣攝内外各供其職前一日守宫設外命婦次如常儀尚寢率其屬設御幄於皇后正殿北壁南向又設命婦為首者脱舄席於西階前近西東向如式司樂展宮懸之樂於殿庭設麾於殿上西階之西東向内僕進重翟以下於肅章門外道東西向北上司贊設命婦版位於殿庭大長公主以下在東太夫人以下在西諸親婦女以下宗親在東異姓在西俱重行北面相對為首内謁者設外命婦等位於肅章門外大長公主以下於道東太夫人以下於道西俱重行相向北上命婦有從夫之爵無夫有從子之爵設司贊位於東階東南西向掌贊二人位於司贊之南差退俱西向受朝日依時刻諸衛勒所部屯門列仗及陳布於肅章門外如常儀外命婦等依時刻集到宮門外至下車所道西東向以車為次北上車次定命婦等皆降車内典引引之次各服其服尚儀奏請中嚴宫官侍衛者皆朝服司寶奉琮寶依式俱詣内閤奉迎司樂帥女工人入就位典樂升就舉麾位司贊先入就位内典引引命婦俱就肅章門外位尚儀奏外辦皇后首飾禕衣以出警蹕如常儀皇后出自西房典樂舉麾奏正和之樂即御座南向坐司寶奉琮寶置於御座如常偃麾樂止凡樂皆典樂舉麾工鼓柷而後作偃麾戞敔而後止司賓承引命婦以次入就位為首者初入門舒和樂作至位樂止命婦等立定司贊曰再拜掌贊承傳外命婦皆再拜司賓引為首者一人詣西階為首者初行樂作至階樂止為首者脱舄升進當御座前北面跪賀稱妾姓等言賀詞與羣官同賀訖起司賓引為首者降階納舄樂作復位立定樂止司贊者曰再拜掌贊承𫝊外命婦等皆再拜司言承前令降自西階諸命婦西北東面稱令㫖外命婦等皆再拜宣令曰履新之慶冬至云履長之慶夫人等同之司贊者曰再拜掌贊承𫝊外命婦等皆再拜司賓以次引出為首者初行樂作出閤樂止内典引承引以出尚儀前奏禮畢還侍位皇后降座樂作入自東房侍衛警蹕如來儀樂止女工人退會朝訖尚寢帥其屬鋪外命婦等之座於座上大長公主以下於御座東南重行西向太夫人以下於御座西南重行東向設升殿者座席於東西廊下皆如上儀又量設脱舄席於東西階下尚食設夀罇於殿上東序之端西向有坫爵一於罇下設升殿者酒罇於東西廊下近北設廊下者酒罇各於其座之南皆有坫冪俱障以帷設訖司樂帥諸樂人就位内典引引外命婦俱詣肅章門外位尚儀奏外辦皇后首飾禕衣以出警蹕侍衛如常儀皇后出自西房典樂舉麾正和之樂作即御座南向坐司寶奉琮寶置於御座如常儀偃麾樂止司賓承引外命婦以次入就位為首者初入門樂作至位樂止外命婦立定若朝會别日贊拜如朝禮司言前承令降諸命婦西北南向稱令㫖夫人等升席座司贊曰再拜贊者承傳外命婦等皆再拜訖司賓引外命婦應升殿者詣東西階樂作為首者至階樂止俱就席脱舄於階下以升司賓引為首者一人升階近東西面立以下各就席後立司賓引不升殿者詣東西廊下席後立上下立定司賓引為首者詣酒罇所北面立尚食酌酒一爵以授為首者司賓引為首者至御座前北向授尚食尚食受爵進置御座前司賓引為首者退北面為首者跪奏稱妾姓等言元正首祚冬至云天正長至妾等不勝大慶謹上千萬歲夀興再拜外命婦等皆再拜訖司言前承令宣令云令㫖夫人等同納景福外命婦等又再拜尚食取爵奉進皇后舉酒樂作外命婦等皆三稱萬歲皇后舉酒訖尚食受虚爵復於坫樂止司贊曰再拜掌贊承傳外命婦等皆再拜司賓引為首者就席後立司贊曰就座掌贊承𫝊外命婦等俱就位尚食進酒至階司贊曰酒至興掌贊承𫝊外命婦等俱興立席後尚儀至階省酒尚食奉酒進皇后舉酒樂作如常又行外命婦酒酒至司贊曰再拜掌贊承𫝊外命婦等俱再拜受觶司贊曰就座掌贊承𫝊外命婦等俱就座坐飲皇后舉酒訖尚食受虚爵復於坫樂止觴行三周尚食奉御食食升階司贊曰食至興掌贊承𫝊外命婦等皆起立席後尚食至階省候尚食品嘗食訖以次進置御前又行命婦案御若不食及命婦案先下訖不須興設食訖司贊曰就座掌贊承𫝊外命婦等皆就席座皇后飯樂作外命婦等俱飯御食畢樂止乃行酒遂設庻羞諸仗以次作若賜酒司言前承令詣東階上西向稱賜酒階下掌贊承𫝊外命婦等皆起再拜立受觶坐飲訖起立授虚觶又再拜就席坐酒行十二徧會畢司贊曰可起掌贊承𫝊外命婦等皆起立席後司賓引降各納舄樂作俱引復階下位樂止其廊下者仍立於席後立定司贊曰再拜掌贊承𫝊外命婦等在位者皆再拜若有束帛則尚功帥其屬以束帛先立於東西廂司言前承令降自西階詣命婦西北東面稱令㫖外命婦等皆再拜宣令訖外命婦等又再拜尚功帥其屬以次受束帛訖外命婦等又再拜司賓引命婦等以次出樂作出門樂止内典引承引次出尚儀前奏禮畢遂還侍位皇后降座樂作入自東房警蹕侍衛如來儀樂止蕙田案周官内宰掌致后之賓客之禮注謂諸侯夫人有會見王后之法故亦致禮焉然則諸侯夫人朝於王后而王后與之行宴會之禮者其來尚矣唐開元禮儀注獨詳明集禮有宴會命婦之儀葢本諸此明集禮皇太子正旦朝賀皇后儀注冬至夀誕同前期内使監於坤寧宫設皇后御座於正中設皇太子幄次於王宫門外之東近南親王幄次於王宫門外近南之東西其日設儀仗於露臺上及殿庭之東西設皇太子親王拜位於露臺上正中及殿内正中司贊二人位於露臺上拜位之北東西相向司賓二人位於司贊之南東西相向内贊二人位於殿内拜位之北東西相向樂工陳樂於王宫門外皇太子親王朝上位訖司賓引導仍具冕服至幄次内使監官啟知皇后首飾禕衣將出仗動樂作陞御座樂止司賓引導皇太子親王入就殿前拜位初行樂作至拜位樂止司賓二人分立于東西司贊唱鞠躬樂作拜興拜興拜興拜興平身樂止司賓引導皇太子親王俱進自殿東門樂作司賓伺於門外内贊接引至於殿前拜位樂止内贊唱跪皇太子跪親王皆跪皇太子稱長子某兹遇履端之節冬至則云履長之節夀旦則云茲遇母后殿下聖誕之辰謹率諸弟等恭上千歲夀謹率諸弟某王等恭詣母后殿下稱賀内贊唱俛伏興平身皇太子親王皆俛伏興平身内贊引皇太子親王自殿東門出樂作司賓引復殿前拜位樂止司贊唱鞠躬樂作拜興拜興拜興拜興平身樂止内使監官啟禮畢司贊唱禮畢皇后興樂作至内閤門司賓引皇太子親王還幄次樂止明史禮志中宫受朝儀惟唐開元禮有朝皇太后及皇后受羣臣賀皇后會外命婦諸儀明制無皇后受羣臣賀儀而皇妃以下正旦冬至朝賀儀則自洪武元年九月詔定凡中宮朝賀内使監設皇后寶座于坤寧宮丹陛儀仗内使執之殿上儀仗女使執之陳女樂於宫門外設皇貴妃幄次於宫門外之西近北設公主幄次于宫門外之東稍南設外命婦幄次于門外之南東西向皇后服禕衣出閤仗動樂作陞座樂止司賓導外命婦由東門入内道東西班侍立訖導皇貴妃衆妃由東門入至陛上拜位贊拜樂作四拜興樂止導由殿東門入樂作内贊接引至殿上拜位樂止贊跪妃皆跪皇貴妃致詞曰妾某氏等兹遇履端之節冬至則云履長恭詣皇后殿下稱賀致詞畢皆俯伏興樂作復位樂止贊拜樂作四拜興樂止降自東階出司賓導公主由東門入至陛上拜位以次立行禮如皇妃儀司賓導外命婦入殿前中道拜位贊拜如儀班首由西陛陞入殿西門樂作内贊接引至殿上拜位班首及諸命婦皆跪班首致詞曰某國夫人妾某氏等稱賀賀畢出復位司言跪承㫖由殿中門出立露臺之東南向稱有㫖命婦皆跪司言宣㫖曰履端之慶與夫人等共之贊興司言奏宣㫖畢皇后興樂作入内閤門樂止諸命婦出太皇太后皇太后朝賀儀同洪武二十六年重定中宫朝賀儀先日女官設御座香案至日内官設儀仗陳女樂於丹陛東西北向設箋案於殿東門命婦至宫門司賓引入就拜位女官具服侍班尚宫尚儀等官詣内奉迎皇后具服出作樂贊拜如前儀女官舉箋案由殿東門入樂作至殿中樂止贊跪命婦皆跪贊宣箋目女官宣訖贊展箋宣箋女官詣案前展宣訖舉案于殿東命婦皆興司賓引班首由東階陞入殿東門樂作内贊引至殿中樂止贊跪班首及諸