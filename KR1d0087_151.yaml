少前跪言具官某言元正首祚冬至云天正長至伏惟皇太子殿下與時同休俛伏興復位典儀曰再拜在位者皆再拜分東西序立左庻子少前跪言禮畢左右近侍降簾皇太子降坐宮官退左右侍衛以次出宋史禮志皇太子與百官相見至道元年有司言百官見皇太子自兩省五品尚書省御史臺四品諸司三品以上皆答拜餘悉受拜宮官自左右庻子以下悉用參見之儀其宴會位在王公上與師傅保相見政和新儀前一日所司設師傅保以下次於宮門外道西南向設軒架之樂於殿庭近南北向其日質明諸衛率各勒所部屯門列仗典謁設皇太子位于殿東階下西向設師傅保位于殿西階之西三少位於傅保之南稍却俱東向北上師傅保以下俱朝服至宮門通事舍人引就次左庻子請内嚴通事舍人引師傅保立于正殿門之西三少在其南稍却俱東向北上左庻子言外備諸侍奉之官各服其器服俱詣閤奉迎皇太子朝服以出左右侍衛如常儀軒架作翼安之樂至東階下西向立樂止通事舍人引師傅保及三少入就位軒架作正安之樂至位樂止皇太子再拜師傅保以下答拜若三少特見則三少先拜通事舍人引師傅保以下出軒架正安之樂作出門樂止左庻子前跪稱左庻子某言禮畢皇太子入左右侍衛及樂作如來儀徐氏乾學曰案周制王用宮懸諸侯用軒懸而無王世子用樂之文禮記云三王教世子必以禮樂則東宮之宜設樂明矣梁武帝天監中東宮新成皇太子宴會司馬褧請奏金石軒架之樂賀瑒請備文武二舞正旦上夀奏介雅庻幾先王之制乎隋皇太子正旦張樂受賀唐制皇太子樂用軒懸舞用六佾明東宮受賀用大樂則歴代之設樂可攷而知也金史禮志皇太子與百官相見儀三師三公欄子内北向躬揖班首稍前奉候皇太子離位稍前正南立答揖宰執及一品職事官於欄子北向躬揖答揖如前二品職事官欄子外向南躬揖皇太子起揖三品職事官露階稍南躬揖皇太子坐揖四品以下職事官宮庭下躬揖跪問候皇太子坐受太子太傅太保與隨朝三師同東宮三少與隨朝二品同詹事以下並在庭下面北毎品重行以東為上再拜稍前問候又再拜皇太子坐受七年定制皇太子赴朝許與親王宰執相見餘官宗室並迴避後亦許與樞宻使副御史大夫判宗正東宫三師相見九年定制凡皇太子出於都門三里外設褥位三公宰執以下公服重行立皇太子便服三公宰執以下鞠躬班首致辭云青宫萬福再拜皇太子答拜退迎送皆同章宗時禮部尚書張行簡言唐制僕射宰相上日百官通班致賀降階答拜國朝皇太子元正生日三師三公宰執以下須羣官同班拜賀皇太子立受再答拜今尚書省宰執上日分六品以下别為一班揖賀宰執坐舉手答揖近於坐受也宰執受賀其禮乃重於皇太子恐於義未安别嫌明㣲禮之大節伏請宰執上日令三品以下官同班賀宰執起立依見三品官儀式通答揖上曰此事何不早辨正之如都省擅行卿正之是矣行簡對曰禮部葢嘗參酌古今典禮擬定儀式省廷不敢輒改以奏下尚書省議遂用之宰執上日三品以下羣官通班賀起立答拜自此始元典章正旦於大朝㑹之明日文武羣官以常服至東宫行賀禮皇太子居偏殿南向坐羣官自丞相以下以次入北面行四跪拜禮明史禮志朝賀東宫儀漢以前無聞隋文帝時冬至百官朝太子張樂受賀唐制宫臣參賀皇太子皆舞蹈開元始罷其禮故事百官詣皇太子止稱名惟宫臣稱臣明洪武十四年給事中鄭相同請如古制詔下羣臣議編修吳沈等議曰東宫國之大本所以繼聖體而承天位也臣子尊敬之禮不得有二請凡啓事東宫者稱臣如故從之凡朝東宫前期典璽官設皇太子座於文華殿錦衣衛設儀仗於殿外教坊司陳大樂於文華門内東西北向府軍衛列甲士旗幟於門外錦衣衛設將軍十二人於殿中門外及文華門外東西向儀禮司官設箋案於殿東門外設百官拜位於殿下東西設傳令宣箋等官位於殿内東西是日百官詣文華門外導引官啓外備皇太子具冕服出樂作陞座樂止百官入贊拜樂作四拜興樂止丞相陞自西階至殿内拜位俱跪丞相致詞曰某等兹遇三陽開泰萬物維新敬惟皇太子殿下茂膺景福畢俛伏興復位舎人舉箋案入殿中其捧箋展箋宣箋傳令畧與皇后同令曰履兹三陽願同嘉慶餘俱如儀冬至致詞則易律應黄鐘日當長至傳令則易履長之節千秋節致詞則云兹遇皇太子殿下夀誕之辰謹率文武羣官敬祝千歲夀不傳令凡朔望百官朝退詣文華殿門外東西立皇太子陞殿樂作百官行一拜禮其謝恩見辭官亦行禮洪武元年十二月帝以東宫師傅皆勲舊大臣當待以殊禮命議三師朝賀東宫儀禮官議曰唐制羣臣朝賀東宫行四拜禮皇太子答後二拜三公朝賀前後俱答拜近代答拜之禮不行而三師之禮不可不重今擬凡大朝賀設皇太子座於大本堂設答拜褥位於堂中設三師賔客諭徳拜位於堂前皇太子常服陞座三師賔客常服入就位北向立皇太子起立南向贊四拜皇太子答後二拜六年詔百官朝見太子朝服去蔽膝及佩二十九年詔廷臣議親王見東宫儀禮官議諸王來見設皇太子位於正殿中設諸王拜位于殿門外及殿内設王府官拜位于庭中道上之東西設百官侍立位于庭中東西向至日列甲士陳儀仗設樂如常諸王詣東宮門外幄次皇太子常服出樂作陞座樂止引禮導諸王入就殿門外位初行樂作就位樂止導詣殿東門入樂作内贊引至位北向立樂止贊跪王與王府官皆跪致詞曰兹遇某節恭詣皇太子殿下致詞畢王與王府官皆俛伏興樂作復位樂止贊拜樂作王與王府官皆四拜興樂止禮畢王及各官以次出王至後殿叙家人禮東宮及王皆常服王由文華殿東門入至後殿王西向東宮南向相見禮畢叙坐東宮正中南面諸王列於東西嘉靖二十八年禮部奏故事皇太子受朝賀設座文華殿中今易黄瓦似應避尊帝曰東宮受賀位當設文華門之左南向然侍衛未備已之隆慶二年冊皇太子詔于文華殿門東間設座受賀右皇太子受賀宋史禮志皇太后臨朝聽政乾興元年真宗崩遺㫖以皇帝尚幼軍國事兼權取皇太后處分宰相率百官稱賀復前奉慰又慰皇太后於簾前有司詳定儀式内東門拜表合差入内都知一員跪授傳進皇太后所降批答首書覽表具之末云所請宜許或不許初丁謂定皇太后稱予中書與禮院參議每下制令稱予便殿處分稱吾皇太后詔止稱吾與皇帝並御承明殿垂簾決事百官表賀英宗即位輔臣請與皇太后權同聽政禮院議自四月内東門小殿垂簾兩府合班起居以次奏事非時召學士亦許至小殿時帝以疾權居柔儀殿東閤西室太后垂簾處分稱吾惟兩府日入候問聖體因奏政事退詣小殿簾外覆奏太后帝疾間御前後殿聽政兩府退朝猶于小殿覆奏哲宗即位皇太后權同聽政三省樞密院案儀注未釋服以前遇隻日皇帝御迎陽門日參官並赴起居依例奏事每五日遇隻日于迎陽門垂簾皇帝坐于簾内之北宰執奏事則權屏去左右侍衛事有機速許非時請對及賜召宣亦許升殿禮部御史臺閤門奏討論御殿及垂簾儀制每朔望六參皇帝御前殿百官起居三省樞密院奏事應見謝辭班退各令詣内東門進榜子皇帝雙日御延和殿垂簾日參官起居太皇太后移班少西起居皇帝並再拜三省樞宻院奏事三日以上四拜不舞蹈候祔廟畢起居如常儀簾前通事以内侍殿下以閤門吏部磨勘奉舉人垂簾日引應見謝辭臣僚遇朔望參日不坐並先詣殿門次内東門應擡賜者並門賜之於是帝御迎陽門幄殿同太皇太后垂簾宰臣親王以下合班起居常制分班十六至是合班以閤門奏請故也禮官請如有祥瑞邊捷宰臣以下紫宸殿稱賀皇帝畢赴内東門賀太皇太后從之徽宗即位皇太后權同聽政三省樞宻院聚議故事嘉祐末英宗請慈聖同聽政五月同御内東門小殿垂簾至七月十三日英宗間日御前後殿輔臣奏事退詣内東門簾前覆奏又故事惟慈聖不立生辰節名不遣使契丹若天聖元豐則御殿垂簾立生辰節名遣使與契丹往還及避家諱等曾布曰今上長君豈可垂簾聽政請如嘉祐故事蔡卞曰天聖元豐與今日皆遺制處分非嘉祐比布曰今日之事雖載遺制實出自德音又皆長君正與嘉祐事相似有㫖依嘉祐治平故事布語同列曰奏事先太后次覆奏皇帝如今日所得㫖遂為定式矣尋以哲宗靈駕𤼵引太后手書罷同聽斷焉蕙田案太后臨朝聽政非常禮也列代史傳皆不載其儀惟宋史有之今附于末右皇太后臨朝聽政五禮通考巻一百四十一
