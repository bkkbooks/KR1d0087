雅克特穆爾率文武百官及僧道耆老奉玉册玉寶上尊號曰欽天統聖至德誠功大文孝皇帝是日改元至順詔天下蕙田案元上尊號凡五太祖以登極文宗以改元餘皆不審所以大概習為常事非甚盛舉故世祖尚有大赦武宗後僅詔天下而已元史禮樂志羣臣上皇帝尊號禮成受朝賀儀前期二日儀鸞司設大次於大明門外又設進册案於殿內御座前之西進寶案於其東設受册案於御座上之西受寶案於其東侍儀司設册案於香案南寶案又於其南禮儀使位於前册使册副位於庭中北面引册奉册舉册讀册捧册官位於右引寶奉寶舉寶捧寶讀寶官位於左以北為上百官自金玉府迎册寶奉安中書省如常儀前期一日右丞相率公卿朝服儀衛音樂導册寶二案出自中書至闕前控鶴奠案方輿中道册使等奉隨入大次內方輿奠案侍儀使引册使以下由左門以出百官趨退至期大昕右丞相以下百官各公服集闕廷儀仗護尉就位侍儀使禮儀使引導從導皇帝升大明殿引進使引導從導皇后升殿尚引引殿前班入起居位起居山呼拜舞畢宣贊唱曰各恭事太子諸王后妃公主以次升殿鳴鞭三侍儀使引册引寶導册寶由正門入樂作奉册使右丞相率册官由右門入奉寶使御史大夫率寶官由左門入至殿下置册案於香案南寶案又奠於其南樂止侍儀使引册使以下就起居位典引引羣臣入就位通班舍人唱曰文武百僚具官臣某以下起居典引贊曰鞠躬曰平身引至丹墀拜位宣贊唱曰拜通贊贊拜舞蹈山呼如常儀畢承奉班都知唱曰奉册使以下進上册寶侍儀司引册使以下進就位樂作掌儀贊曰奉册寶官稍前搢笏捧册寶侍儀使前導由中道升正階立宇下俟奉册使諸册官由右階躋奉寶使諸寶官由左階躋畢俱由左門入奉册寶至御榻褥位前册西寶東樂止掌儀贊曰捧册寶官稍前以册寶跪置於案曰出笏曰就拜曰興曰平身曰復位曰奉册使以下皆跪曰舉册官興俱至案前跪曰搢笏取册於匣置於盤對舉曰讀册官興俱至案前跪曰讀册讀册官稱臣某謹讀册讀畢舉册官納册於匣興以授典瑞使出笏立於册案西南典瑞使置於受册案掌儀贊曰舉寶官興俱至案前跪曰搢笏取寶於盝對舉曰讀寶官興俱至案前跪曰讀寶讀寶官稱臣某謹讀寶讀畢舉寶官納寶於盝興以授典瑞使出笏立於寶案東南典瑞使置於受寶案掌儀贊曰奉册使以下皆就拜曰興曰平身𠫭議中書省事四人以篚奉詔書由殿左門入至御榻前跪讀詔文如常儀授典瑞使押寶畢置於篚對舉由正門出至丹墀北置於詔案册使以下由南東門出就位聽詔如儀儀鸞使四人舁進册寶案由左門出侍儀使引班首由左階躋前行樂作至宇下樂止舞旋至露階立班首入殿宣徽使奉隨班首跪宣徽使西北向立班首致詞曰册寶禮畢願上皇帝皇后萬萬嵗夀宣徽使應曰如所祝樂作通贊唱曰分班進酒畢班首由南東門出降階復位樂作通贊唱曰合班奉進表章禮物贊拜舞蹈山呼錫宴並如元正之儀右元五禮通考卷一百三十
