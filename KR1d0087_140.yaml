body:
  text: 五禮通考卷一百三十刑部尚書秦蕙田撰嘉禮三上尊號蕙田案尊號起於唐武后中宗之世始以即位繼以拜洛受圖後乃往往以符瑞行之元宗開元天寶以來殆數數矣然其儀不傳宋每遇大禮羣臣輒上表請至於再三自太祖太宗以還沿為故事宋史著其儀為嘉禮第一至神宗哲宗乃毅然止之遼始於太祖厥後相繼不絶金初猶舉之逮章宗堅却不受其事乃罷元上尊號者五帝而已自明以來蓋無聞焉今於即位儀後附及之唐書則天后本紀光宅元年二月甲子皇帝率羣臣上尊號於武成殿通鑑太后御武成殿皇帝帥王公以下上尊號蕙田案上尊號始此垂拱四年五月乙亥加尊號為聖母神皇通鑑武承嗣使鑿白石為文曰聖母臨人永昌帝業末紫石雜藥物填之使雍州人唐同泰奉表獻之稱獲之於洛水太后喜命其石曰寶圖擢同泰為遊擊將軍五月戊辰詔當親拜洛受寶圖有事南郊告謝昊天禮畢御明堂朝羣臣命諸州都督刺史及宗室外戚以拜洛前十日集神都乙亥太后加尊號為聖母神皇天授元年九月改國號周大赦改元乙酉加尊號曰聖神皇帝二年九月乙未加號金輪聖神皇帝延載元年五月甲午加越古金輪聖神皇帝天册萬嵗元年正月辛巳加號慈氏越古金輪聖神皇帝久視元年五月癸巳大赦改元罷天册金輪大聖號蕙田案罷尊號始此長安五年皇帝復於位丁未徙后於正陽宫戊申上后號曰則天大聖皇帝中宗本紀神龍元年十一月戊寅上尊號曰應天皇帝皇后曰順天皇后景龍元年八月丙戌上尊號曰應天神龍皇帝皇后曰順天翌聖皇后玄宗本紀開元元年十一月戊子羣臣上尊號曰開元神武皇帝大赦改元二十七年二月羣臣上尊號曰開元聖文神武皇帝大赦免今嵗稅賜文武官階爵版通鑑羣臣請加尊號曰聖文二月己巳許之因赦天下免百姓今年田租天寶元年正月甲寅陳王府參軍田同秀言玄元皇帝降於丹鳳門通衢二月丁亥羣臣上尊號曰開元天寶聖文神武皇帝辛卯享玄元皇帝於新廟大赦通鑑田同秀上言見玄元皇帝於丹鳳門之空中告以我藏靈符在尹喜故宅上遣使於故函谷關尹喜臺旁求得之壬辰羣臣上表以函谷靈符潛應年號先天不違請於尊號加天寶字從之十三載二月壬申朝獻太清宫加上玄元皇帝號曰大聖祖髙上大道金闕玄元天皇大帝甲戌羣臣上尊號曰開元天地大寶聖文神武證道孝德皇帝大赦至德三載上號曰太上至道聖皇天帝肅宗本紀乾元元年正月戊寅上皇天帝御宣政殿受皇帝傳國受命寶符册號曰光天文武大聖孝感皇帝通鑑上皇御宣政殿受册加上尊號上固辭大聖之號上皇不許上尊上皇曰太上至道聖皇天帝二年正月己巳羣臣上尊號曰乾元大聖光天文武孝感皇帝通鑑乾元二年二月壬子月食既先是百官請加皇后尊號曰輔聖上以問中書舍人李揆對曰自古皇后無尊號惟韋后有之豈足為法上驚曰庸人幾誤我上元二年九月壬寅大赦去乾元大聖光天文武孝感號通鑑壬寅制去尊號但稱皇帝去年號但稱元年代宗本紀廣德元年七月壬寅羣臣上尊號曰寶應元聖文武孝皇帝壬子大赦改元通鑑注以楚州所獻十三寶為上登極之符應也德宗本紀建中元年正月丁卯改元羣臣上尊號曰聖神文武皇帝興元元年正月癸酉大赦改元去聖神文武號順宗本紀永貞元年八月庚子立皇太子為皇帝自稱太上皇元和元年正月皇帝率羣臣上尊號曰應乾聖夀太上皇通鑑百官請上尊號曰文武大聖孝德皇帝上許上上皇尊號而自辭不受憲宗本紀元和三年正月癸巳羣臣上尊號曰睿聖文武皇帝十四年七月己丑羣臣上尊號曰元和聖文神武法天應道皇帝大赦穆宗本紀長慶元年七月壬子羣臣上尊號曰文武孝德皇帝敬宗本紀寶歷元年正月癸巳羣臣上尊號曰文武大聖廣孝皇帝大赦賜文武官階勳爵蕙田案敬宗弟文宗在位十四年未上尊號武宗本紀會昌二年四月丁亥羣臣上尊號曰仁聖文武至神大孝皇帝大赦賜文武官階勳爵宣宗本紀大中二年正月甲子羣臣上尊號曰聖敬文思和武光孝皇帝大赦賜文武官階勳爵懿宗本紀咸通三年正月庚午羣臣上尊號曰睿文明聖孝德皇帝大赦十一年正月甲寅羣臣上尊號曰睿文英武明德至仁大聖廣孝皇帝大赦僖宗本紀乾符元年十一月庚寅改元羣臣上尊號曰聖神聰睿仁哲明孝皇帝光啓元年五月羣臣上尊號曰至德光烈皇帝昭宗本紀大順元年正月戊子羣臣上尊號曰聖文睿德光武𢎞孝皇帝大赦改元蕙田案上尊號自武后始後遂奉為故事唐一代之君循行之其不行者一二帝而已右唐宋史太祖本紀乾德元年十一月甲子有事南郊大赦改元百官奉玉册上尊號曰應天廣運仁聖文武至德皇帝即建隆四年宋史禮志尊號之典唐始載於禮官宋每大祀羣臣詣東上閣門拜表請上尊號或三上或五上多謙抑弗許如允所請即奏命大臣撰册文及書册寶其受册多用祀禮畢日御正殿行禮禮畢有司以册寶詣閣門奉進入內建隆四年羣臣三上表上尊號詔俟郊畢受册前三日遣官奏告天地宗廟社稷遂為定制其儀有司宿設崇元殿仗衛文武百官並集朝堂之次攝太尉奉册於案吏部侍郎一員押司徒奉寶於案禮部侍郎一員押以五品六品清資官充舉册舉寶官皆承之以匣覆之以帊俱詣殿門外之東太尉之前大樂令帥工人入就位諸侍衛官及宰執兩制供奉等官立於殿階下香案前左右如常入閣儀侍中奏中嚴外辦所司承旨索扇扇上皇帝衮冕御輿出自西房樂作即御坐扇開樂止符寶郎奉寶如常儀禮直官通事舍人分引太尉以下文武羣官應北面位者各就橫行位太常卿於册案前導至丹墀西階上少東北面置訖太尉司徒吏部禮部侍郎各入本班立定典儀贊百官再拜舞蹈三稱萬嵗又再拜起居訖又再拜分班序立禮直官引太常卿隨行吏部侍郎押册案以次序行太尉從之禮部侍郎次押寶案行司徒從之詣西階至解劍褥位其讀册中書令讀寶侍中候册案將至先升於前楹間第一柱北對立太尉解劍脫舄訖吏部侍郎押册案先升太尉從升當御坐前太尉搢笏北面奉册案稍前跪置訖俯伏興少退東向立中書令進當册案前讀册訖俯伏興又搢笏奉册於褥東向册函北向進跪置御坐前與舉册官降還侍立位太尉亦降納舄帶劍禮部侍郎押寶案升司徒隨升北面跪置侍中讀寶訖置册之南俱復位其納舄帶劍俯伏一如上儀典儀贊在位官皆再拜禮直官通事舍人引太尉至西階下解劍舄升當御坐前跪賀其詞中書門下撰賀訖復位皆再拜如讀册寶儀侍中升至御坐前承旨退臨階西向稱有制典儀贊再拜訖宣曰朕以鴻儀昭舉保命會昌迫於羣情祗膺顯號退循寡昧惕懼增深所賀知宣訖復位典儀贊再拜舞蹈三稱萬嵗又再拜訖侍中升階奏禮畢降復位扇上樂作帝降坐御輿入自東房扇開樂止侍中版奏解嚴中書侍郎帥奉案官升殿跪奉册置於案次門下侍郎奉寶如奉册禮通事舍人贊引詣東上閣門狀進所司承旨放仗百官再拜訖退如常儀自後受册皆如之禮畢賜百官食於朝堂太祖本紀開寶元年十一月癸卯有事南郊改元開寶宰相普等奉玉册寶上尊號曰應天廣運大聖神武明道至德仁孝皇帝太宗本紀太平興國三年八月甲戌羣臣請上尊號曰應運統天聖明文武皇帝十一月丙申祀天地於圜丘大赦改元御乾元殿受尊號六年冬十月癸酉羣臣三奉表上尊號曰應運統天睿文英武大聖至明廣孝皇帝十一月辛亥祀天地於圜丘大赦御乾元殿受尊號內外文武加恩雍熙元年九月壬戌羣臣表三上尊號曰應運統天睿文英武大聖至仁明德廣孝皇帝不許宰相叩頭固請終不許蕙田案宋却尊號自太宗始也端拱二年十二月庚申詔令四方所上表祗稱皇帝羣臣請復尊號不許辛酉上法天崇道文武皇帝詔去文武二字許之淳化三年九月乙卯羣臣上尊號曰法天崇道明聖神孝文武皇帝凡五表終不許至道元年十二月甲戌羣臣奉表加上尊號曰法天榮道上聖至仁皇帝凡五上不許真宗本紀咸平二年八月乙卯羣臣上尊號曰崇文廣武聖明仁孝皇帝十一月丙戌祀天地於圜丘御朝元殿受尊號册丁亥賜羣臣帶服鞍馬器幣有差大中祥符元年六月天書再降於泰山醴泉北壬寅迎天書於含芳園辛亥羣臣表上尊號曰崇文廣武儀天尊道寶應章感聖明仁孝皇帝十二月辛卯御乾元殿受尊號蕙田案宋上尊號多在即位郊天之後是年十月封禪辛卯駕發京師十一月丁丑至自泰山奉天書還宫遂行受尊號之禮不關郊祀也五年冬十月丙子羣臣上尊號曰崇文廣武感天尊道應真佑德上聖欽明仁孝皇帝天禧三年七月壬申羣臣上尊號曰體仁御極感天尊道應真寶運文德武功上聖欽明仁孝皇帝十一月辛未祀天地於圜丘大赦丁丑御天安殿受尊號乾興元年正月改元二月大赦癸卯上尊號曰應天尊道欽明仁孝皇帝仁宗本紀天聖二年十二月丁酉祀天地於圜丘大赦百官上尊號曰聖文睿武仁明孝德皇帝明道二年二月丁未祀先農於東郊躬耕籍田大赦百官上尊號曰睿聖文武體天法道仁明孝德皇帝蕙田案耕籍成上尊號史所謂大禮後故事也景祐二年十一月乙未祀天地於圜丘上尊號曰景祐體天法道欽文聰武聖仁孝德皇帝四年十一月庚戌祀天地於圜丘百官上尊號曰寶元體天法道欽文聰武聖仁孝德皇帝皇祐二年三月戊子朔詔季秋有事於明堂己丑以大慶殿為明堂戊戌詔明堂禮成羣臣毋上尊號蕙田案是年九月始大享明堂三月之詔蓋預止之也嘉祐四年六月己巳羣臣請加尊號曰大仁至治表五上不許英宗本紀治平二年七月己卯羣臣五上尊號不允四年春正月羣臣上尊號曰體乾膺歷文武聖孝皇帝神宗本紀熙寧元年七月乙卯羣臣三表請上奉元憲道文武仁孝之號不許禮志熙寧元年宰臣曾公亮等上表請加尊號詔不允先是翰林學士司馬光言尊號起唐武后中宗之世遂為故事先帝治平二年辭尊號不受天下莫不稱頌聖德其後佞臣建言國家與契丹常有往來書彼有尊號而中國獨無足為深恥於是羣臣復以非時上尊號論者甚為朝廷惜之今羣臣以故事上尊號臣愚以為陛下聰明睿智雖宜享有鴻名然踐阼未久又在亮隂之中考之事體似未宜受陛下誠能斷以聖意推而不居仍令更不得上表請則頌嘆之聲將洋溢四海矣詔賜光曰覽卿來奏深諒忠誠朕方以頻日淫雨甲申地震天威彰著日虞傾禍被此鴻名有慙面目况在亮隂亦難當是盛典今已批降指揮可善為答辭使中外知朕至誠慙懼非欺衆邀名其後宰臣數上表請終不允徐氏乾學曰神宗此舉可謂賢矣然非司馬光之疏忠懇切至有以啓沃之於前則諛佞之言未有不為之動者也蓋好諛惡直人之常情倘神宗移用王安石之心以任光豈非宋室之令主哉二年四月丁酉朔羣臣再上尊號不許四年六月庚申羣臣三上尊號曰紹天法古文武仁孝皇帝不許七年七月癸卯羣臣五上尊號曰紹天憲古文武仁孝皇帝不許十年七月辛酉羣臣五上尊號曰奉天憲古文武仁孝皇帝不許元豐三年七月甲戌詔自今遇大禮罷上尊號哲宗本紀元祐四年己丑詔自今大禮毋上尊號蕙田案自神宗哲宗罷上尊號終宋之世未嘗舉行右宋遼史太祖本紀元年春正月即位羣臣上尊號曰天皇帝后曰地皇后神册元年春二月丙戌朔上在龍化州德哷勒部額爾竒木耶律赫嚕等率百僚請上尊號三表乃允丙申羣臣及諸屬國築壇州東上尊號曰大聖大明天皇