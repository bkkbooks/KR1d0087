body:
  text: 五禮通考卷十八刑部尚書秦蕙田撰吉禮十八圜丘祀天元史文宗本紀至順元年九月敕有司繕治南郊齋宫祭祀志至順元年將親郊十月辛亥太常博士言親祀儀注已具事有未盡者案前代典禮親郊前七日百官習儀于郊壇今既與受戒誓相妨合于致齋前一日告示與祭執事者各具公服赴南郊習儀親祀太廟雖有防禁然郊外尤宜嚴戒往來貴乎清肅凡與祭執事齋郎樂工舊不設盥洗之位殊非涓潔之道今合于饌殿齊班㕔前及齋宿之所隨宜設置盥洗數處俱用鍋釡温水買盆杓巾帨令人掌管省諭必盥洗然後行事違者治之祭日太常院分官提調神厨監視割烹上下燈燭籸燎已前雖有剪燭提調籸盆等官率皆虛應故事或減刻物料燈燭不明又嘗見奉禮贊賜胙之後獻官方退所司便服徹爼壇下燈燭一時俱滅因而雜人登壇攘奪不能禁止甚為䙝慢今宜禁約省牲之前凡入壝門之人皆服窄紫有官者公服禁治四壝紅門宜令所司添造闗木鎻鑰祭畢即令闗閉毋使雜人得入其藳鞂匏爵事畢合依大德九年例焚之壬子御史臺臣言祭日宜敕股肱近臣及諸執事人毋飲酒制曰卿言甚善其移文中書禁之文宗本紀十月戊午致齋于大明殿己未遣亞獻官中書右丞相雅克特穆爾終獻官特穆爾布哈率諸執事告廟請以太祖皇帝配享南郊庚申出次郊宫辛酉帝服大裘衮冕祀昊天上帝于南郊以太祖皇帝配十二月戊午以郊祀禮成御大明殿受朝賀大赦天下富珠哩翀傳文宗親祀天地社稷宗廟翀為禮儀使詳記行禮節文于笏遇至尊不敢直書必識以兩圈帝偶取笏視曰此為皇帝字乎因大笑以笏還翀竣事上天厯大慶詩三章帝命藏之奎章閣馬祖常傳陞參議中書省事參定親郊禮儀充讀冊祝官蕙田案傳文在天厯元年然紀志都無天厯郊天之事恐即至順元年之誤姑附于此祭祀志自世祖混一六合至文宗凡七世而南郊親祀之禮始克舉焉葢器物儀注至是益加詳慎矣一壇壝在麗正門外丙位凡三百八畆有奇壇三成每成髙八尺一寸上成縱横五丈中成十丈下成十五丈四陛午貫地子午卯酉四位陛十有二級外設二壝内壝去壇二十五步外壝去内壝五十四步壝各四門外垣南櫺星門三東西櫺星門各一圓壇周圍上下俱䕶以甓内外壝各髙五尺壝四面各有門三俱塗以赤至大三年冬至以三成不足以容從祀版位以青繩代一成繩二百各長二十五尺以足四成之制燎壇在外壝内丙己之位髙一丈二尺四方各一丈周圍亦䕶以甓東西南三出陛開上南出户上方六尺深可容柴香殿三間在外壝南門之外少西南向饌幕殿五間在外壝南門之外少東南向省饌殿一間在外壝東門之外少北南向外壝之東南為别院内神厨五間南向祠祭局三間北向酒庫三間西向獻官齋房二十間在神厨南垣之外西向外壝南門之外為中神門五間諸執事齋房六十間以翼之皆北向兩翼端皆有垣以抵東西周垣各為門以便出入齊班㕔五間在諸獻官齋房之前西向儀鑾局三間法物庫三間都監庫五間在外垣内之西北隅皆西向雅樂庫十間在外垣西門之内少南東向演樂堂七間在外垣内之西南隅東向獻官厨三間在外垣内之東南隅西向滌養犧牲所在外垣南門之外少東西向内犧牲房三間南向一神位昊天上帝位天壇之中少北皇地祗位次東少却皆南向神席皆縁以繒綾褥素座昊天上帝色皆用青皇地祗色皆用黄藉皆以藳秸配位居東西向神席綾褥錦方座色皆用青藉以蒲越其從祀圓壇第一等九位青帝位寅赤帝位巳黄帝位未白帝位申黒帝位亥主皆用栢素質𤣥書大明位卯夜明位丑天皇大帝位戌用神位版丹質黄書神席綾褥座各隨其方色藉皆以藳秸第二等内官位五十有四鈎星天柱𤣥枵天厨柱史位于子其數五女史星紀御女位于丑其數三自子及丑神位皆西上帝座歲星大理河漢析木尚書位于寅帝座居前行其數六南上陰德大火天搶𤣥戈天牀位于卯其數五北上太陽守相星壽星輔星三師位于辰其數五南上天一太一内厨熒惑鶉尾勢星天理位于已天一太一居前行其數七西上北斗天牢三公鶉火文昌内階位于午北斗居前行其數六填星鶉首四輔位于未其數三自午至未皆東上太白實沈位于申其數二北上八榖大梁扛星華葢位于酉其數四五帝内座降婁六甲傳舍位于戌五帝内座居前行其數四自酉至戌皆南上紫微垣辰星陬訾勾陳位于亥其數四東上神席皆藉以莞席内壝外諸神位皆同第三等中官百五十八位虛宿女宿牛宿織女人星司命司非司危司禄天津離珠羅堰天桴奚仲左旗河鼓右旗位于子虛宿女宿牛宿織女居前行其數十有七月星建星斗宿箕宿天雞輦道漸臺敗𤓰扶篚匏𤓰天弁天棓帛度屠肆宗星宗人宗正位于丑月星建星斗宿箕宿居前行其數十有七自子至丑皆西上日星心宿天紀尾宿罰星東咸列肆天市垣斛星斗星車肆天江宦星市樓候星女牀天籥位于寅日星心宿天紀尾星居前行其數十有七南上房宿七公氐宿帝席大角亢宿貫索鍵閉鈎鈐西咸天乳招揺梗河亢池周鼎位于卯房宿七公氐宿帝席大角亢宿居前行其數十有五北上太子星太微垣軫宿角宿攝提常陳幸臣謁者三公九卿五内諸侯郎位郎將進賢平道天田位于辰太子星太微垣軫宿角宿攝提居前行其數十有六南上張宿翼宿明堂四帝座黄帝座長垣少微靈臺虎賁從官内屏位于已張宿翼宿明堂居前行其數十有一西上軒轅七星三台柳宿内屏太尊積薪積水北河位于午軒轅七星三台柳宿居前行其數九鬼宿井宿參宿天尊五諸侯鉞星座旗司怪天闗位于未鬼宿井宿參宿居前行其數九自午至未皆東上畢宿五車諸王觜宿天船天街礪石天髙三柱天潢咸池位于申畢宿五車諸王觜宿居前行其數十有一北上月宿昴宿胃宿積水天讒卷舌天河積尸大陵左更天大將軍南門位于酉月宿昴宿胃宿居前行其數十有二婁宿奎宿壁宿右更附路閣道王良策星天廐土公雲雨霹靂位于戌婁宿壁宿居前行其數十有二自酉至戌皆南上危宿室宿車府墳墓虚梁葢室臼星杵星土公吏造父離宫雷電騰蛇位于亥危宿室宿居前行其數十有三東上内壝内外官一百六位天壘城離瑜代星齊星周星晉星韓星秦星魏星燕星楚星鄭星位于子其數十有二越星趙星九坎天田狗國天淵狗星鱉星農丈人杵星糠星位于丑其數十有一自子至丑皆西上車騎將軍天福從官積卒神宫傅説龜星魚星位于寅其數八南上陣車車騎騎官頡頏折威陽門五柱天門衡星庫樓位于卯其數十北上土司空長沙青丘南門平星位于辰其數五南上酒旗天廟東甌器府軍門左右轄位于巳其數六西上天相天稷爟星天紀外厨天狗南河位于午其數七天社矢星水位闗丘狼星弧星老人星四瀆野雞軍市水府孫星子星位于未其數十有三自午至未皆東上天節九州殊口附耳參旗九斿玉井軍井屏星伐星天厠天矢丈人位于申其數十有二北上天園天陰天廩天苑天囷芻藳天庾天倉鈇鑕天溷位于酉其數十外屏大司空八魁羽林位于戌其數四自酉至戌皆南上哭星泣星天錢天網北落師門敗臼斧鉞壘壁陣位于亥其數八東上内壝外衆星三百六十位每辰神位三十自第二等以下神位版皆丹質黄書内官中官外官則各題其星名内壝外三百六十位唯題曰衆星凡從祀位皆内向十二次微左旋子居子陛東午居午陛西卯居卯陛南酉居酉陛北器物之等其目有八一曰圭幣昊天上帝蒼璧一有繅藉青幣燎玉一皇地祗黄琮一有繅藉黄幣一配帝青幣一黄帝黄琮一青帝青圭一赤帝赤璋一白帝白琥一黒帝𤣥璜一幣皆如其方色大明青圭有邸夜明白圭有邸天皇大帝青圭有邸北極𤣥圭有邸幣皆如其玉色内官以下皆青幣二曰尊罍上帝太尊著尊犧尊山罍各二在壇上東南隅皆北向西上設而不酌者象尊壺尊各二山罍四在壇下午陛之東皆北向西上皇地祗亦如之在上帝酒尊之東皆北向西上配帝著尊犧尊象尊各二在地祗酒尊之東皆北向西上設而不酌者犧尊壺尊各二山罍四在壇下酉陛之北東向北上五帝日月北極天皇皆太尊一著尊二内官十二次各象尊二中官十二次各壺尊二外官十二次各槩尊二衆星十二次各散尊二凡尊各設于神座之左而右向皆有坫有勺加冪冪之繪以雲唯設而不酌者無勺三曰籩豆登爼昊天上帝皇地祗及配帝籩豆皆十二登三簠二簋二爼八皆有匕筯玉幣篚二匏爵一有坫沙池一青甆牲盤一從祀九位籩豆皆八簠一簋一登一爼一匏爵一有坫沙池一玉幣篚一内官位五十四籩豆皆二簠一簋一登一爼一匏爵一有坫沙池幣篚十二次各一中官百五十八皆籩一豆一簠一簋一爼一匏爵一有坫沙池幣篚十二次各一外官位一百六皆籩一豆一簠一簋一爼一匏爵一有坫沙池幣篚十二次各一衆星位三百六十皆籩一豆一簠一簋一爼一匏爵沙池幣篚十二次各一此籩豆簠簋登爵篚之數也凡籩之設居神位左豆居右登簠簋居中爼居後籩皆有巾巾之繪以斧四曰酒齊以太尊實泛齊著尊實醴齊犧尊實盎齊山罍實三酒皆有上尊馬湩設于尊罍之前注于器而冪之設而不酌者以象尊實醴齊壺尊實沈齊山罍二實三酒皆有上尊以祀昊天上帝皇地祗亦如之以著尊實泛齊犧尊實醴齊象尊實盎齊山罍實清酒皆有上尊馬湩如前設之設而不酌者以犧尊實醍齊壺尊實沈齊山罍三實清酒皆有上尊以祀配帝以太尊實泛齊以著尊實醍齊皆有上尊九位同以祀五帝日月北極天皇大帝以象尊實醴齊有上尊十二次同以祀内官以壺尊實沈齊有上尊十二次同以祀中官以槩尊實清酒有上尊十二次同以祀外官以散尊實昔酒有上尊十二次同以祀衆星凡五齊之上尊必皆實明水山罍之上尊必皆實𤣥酒散尊之上尊亦實明水五曰牲粢庶品昊天上帝蒼犢皇地祗黄犢配帝蒼犢大明青犢夜明白犢天皇大帝蒼犢北極𤣥犢皆一馬純色一鹿十有八羊十有八野豕十有八兎十有二葢參以國禮割牲為七體左肩臂臑兼代脅長脅為一體右肩臂臑代脅長脅為一體左髀肫胳為一體右髀肫胳為一體脊連背膚短脅為一體膺骨臍腹為一體項脊為一體馬首報陽升煙則用之毛血盛以豆或青甆盤饌未入置爼上饌入徹去之籩之實魚鱐糗餌粉餈棗乾撩形鹽鹿脯榛桃菱芡栗豆之實芹菹韭菹菁菹筍菹脾析兎醢酏食魚醢豚拍鹿臡醓醢糝食凡籩之用八者無糗餌粉餈菱栗豆之用八者無脾析菹酏食兎醢糝食用皆二者籩以鹿脯乾棗豆以鹿臡菁菹用皆一者籩以鹿脯豆以鹿臡凡簠簋用皆二者簋以黍稷簠以稻粱用皆一者簋以稷簠以黍實登以太羮六曰香祝洗位正位香鼎一香合一香案一祝案一皆有衣拜褥一盥爵洗位一罍一洗一白羅巾一親祀匜二盤二地祗配位咸如之香用龍腦沈香祝版長各二尺四寸濶一尺二寸厚三分木用楸栢從祀九位香鼎香合香案綾拜褥皆九褥各隨其方之色盥爵洗位二罍二洗二巾二第二等盥爵洗位二罍二洗二巾二第三等亦如之内壝内盥爵位一罍一洗一巾一内壝外亦如之凡巾皆有篚從祀而下香用沉檀降真鼎用陶瓦第二等十二次而下皆紫綾拜褥十有二親祀御版位一飲福位及大小次盥洗爵洗版位各一皆青質金書亞獻終獻飲福版位二黒質黄書御拜褥八亞獻終獻拜褥一黄道裀褥寶案二黄羅銷金案衣水火鑑七曰燭燎天壇椽燭四皆銷金絳紗籠自天壇至内壝外及樂縣南北通道絳燭三百五十素燭四百四