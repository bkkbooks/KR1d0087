body:
  text: 五禮通考卷一百十八刑部尚書秦蕙田撰吉禮一百十八祭先聖先師宋會要建隆元年二月太祖幸國子監詔加飾祠宇及塑繪先聖先賢先師之像宋史禮志至聖文宣王唐開元末升為中祠設從祀禮令攝三公行事朱梁喪亂從祀遂廢唐長興三年仍復從祀周顯德二年别營國子監置學舍宋因增修之塑先聖亞聖十哲像畫七十二賢及先儒二十一人像於東西廡之木壁太祖親撰先聖亞聖贊十哲以下命文臣分贊之太祖本紀建隆二年十一月己巳幸國子監三年春正月癸未幸國子監二月丙辰復幸國子監禮志其謁先師之禮建隆二年禮院凖禮部貢院移自後諸州府貢舉人十一月朔日正衙見訖擇日謁先師遂為常禮建隆中凡三幸國子監謁文宣王廟太宗本紀太平興國四年二月壬子幸國子監端拱元年八月庚辰幸太學令博士李覺講易賜帛淳化五年十一月丙寅幸國子監賜直講孫奭緋魚因幸武成王廟復幸國子監令奭講尚書賜以束帛禮志太宗亦三謁廟詔繪三禮器物制度于國學講論堂木壁又令河南府建國子監文宣王廟置官講説及賜九經書闕里志淳化四年從監庫使臣請宣聖廟六衙朔望焚香景德三年大學士王欽若奏令諸道州府軍監文宣王廟摧毁處量為修葺仍令不得占射充磨勘司推勘院及不得令使臣官員等在廟內居住其釋奠之禮景德四年同判太常禮院李維言開寶通禮諸州釋奠並刺史致齋三日從祭之官齋於公館祭日刺史為初獻上佐為亞獻博士為終獻今諸州長吏不親行禮非尊師重教之道詔太常禮院檢討以聞案五禮精義州縣釋奠刺史縣令初獻上佐縣丞亞獻主簿終獻有故以次官攝之真宗本紀大中祥符元年十一月戊午加諡孔子曰元聖文宣王大中祥符二年二月壬辰詔立曲阜縣孔子廟學舍五月乙卯追封孔子弟子七十二人秋七月戊寅詔孔子廟配享魯史左丘明等十九人加封爵禮志大中祥符二年五月乙卯詔追封十哲為公七十二弟子為侯先儒為伯或贈官親製元聖文宣王贊命宰相等撰顔子以下贊留親奠祭器於廟中從官立石刻名文獻通考詔追封孔子弟子兖公顔回兖國公費侯閔損琅琊公鄆侯冉耕東平公薛侯冉雍下邳公齊侯宰豫臨淄公黎侯端木賜黎陽公徐侯冉求彭城公衛侯仲由河內公吳侯言偃丹陽公魏侯卜商河東公郕伯曾參瑕邱侯陳伯顓孫師宛丘侯江伯淡臺滅明金鄉侯單伯宓不齊單父侯原伯原憲任城侯莒伯公冶長髙密侯郯伯南宫縚龔丘侯郳伯公晳哀北海侯宿伯曾點萊蕪侯把伯顔無繇曲阜侯蒙伯商瞿須昌侯共伯髙柴共城侯滕伯漆雕開平輿侯任伯公伯寮壽張侯向伯司馬耕楚丘侯樊伯樊須益都侯郜伯公西赤巨野侯卞伯有若平隂侯鄫伯巫馬期東阿侯潁伯陳亢南頓侯梁伯梁鱣千乘侯蕭伯顔辛陽榖侯紀伯冉孺臨沂侯東平伯冉季諸城侯聊伯伯虔沭陽侯黃伯公孫龍枝江侯彭衙伯秦寧新息侯少梁伯秦商鄄城侯武城伯漆雕哆濮陽侯琅琊伯顔驕雷澤侯須句伯漆雕徒父髙苑侯北徴伯壤駟赤上邽侯清河伯林放長山侯睢陽伯商澤鄒平侯石邑伯石作蜀成紀侯任城伯任不齊當陽侯魯伯申棖文登侯東牟伯公良孺牟平侯曹伯曹恤上蔡侯下邳伯奚容蒧濟陽侯淇陽伯句井疆滏陽侯邵陵伯申黨淄川侯期思伯公祖句兹即墨侯雩婁伯榮期猒次侯巨野伯縣成武城侯臨淄伯左人郢南華俟漁陽伯燕伋汧源侯滎陽伯鄭國朐山侯汧陽伯秦非華亭侯乘氏伯施之常臨濮侯朱虛伯顔噲濟隂侯淳于伯步叔乘博昌侯東武伯顔之僕冤句侯衛伯蘧瑗內黃侯瑕丘伯叔仲會博平侯開陽伯顔何堂邑侯臨濟伯狄黑林慮侯平陸伯邽巽髙堂侯汶陽伯孔忠鄆城侯重丘伯公西輿如臨朐侯祝阿伯公西蒧徐城侯南陵伯琴張頓邱侯又詔封元聖文宣王廟配饗先魯史左丘明瑕丘伯齊人公羊髙臨淄伯魯人榖梁赤龔丘伯秦博士伏勝乘氏伯漢博士髙堂生萊蕪伯九江太守戴聖楚丘伯河間博士毛萇樂壽伯臨淮太守孔安國曲阜伯中壘校尉劉向彭城伯後漢大司農鄭衆中牟伯河南杜子春緱氏伯南郡太守馬融扶風伯北中郎將盧植良鄉伯大司農鄭康成髙密伯九江太守服虔滎陽伯侍中賈逵岐陽伯諌議大夫何休任城伯魏衛將軍太常蘭陵亭侯王肅贈司空尚書郎王弼封偃師伯晉鎮南大將軍開府儀同三司當陽侯杜預贈司徒豫章太守范寧封巨野伯一命三司使兩制待制館閣官作贊玉海大中祥符二年三月庚辰詔文宣廟木圭易以玉賜桓圭一五月乙卯朔詔追封顔回兖國公至卜商河東公曽參瑕邱侯至琴張頓邱侯詔曰四科巨賢並超五等七十逹者俱贈列侯令中書門下及兩制館閣分撰贊命王旦撰顔子贊初帝覽崇文院檢定七十二弟子案史記唐會要凡七十七人今曲阜廟唯七十二人帝曰何故不同王旦言國學七十二弟子經太祖定議曲阜凖國學畫像七月戊寅詔封左丘明至范寧二十一人皆為伯贈王肅司空杜預司徒命羣臣為贊曲阜縣志大中祥符二年追封顔子為兖國公詔曰朕乃封巒禪社昭列聖之鴻勳崇德報功廣百王之彛制言旋於闕里遂躬謁於魯堂瞻河海之姿晬容穆若出洙泗之上髙風凛然舉茂典之有加期斯文之益振由是推恩世胄併錫寵章增其奉邑念性與天道德冠生民議兹元聖之名兾廣嚴師之禮兼朕親製以表崇儒至于四科巨賢並超五等七十逹者俱贈列侯仍命寮宷分紀遺烈式書褒揚之旨庶幾善誘之方宜令中書樞密院三司兩制承郎待制館閣直館校理分撰贊以聞宋史真宗本紀大中祥符三年六月丙辰頒天下釋奠先聖廟儀并祭器圖禮志大中祥符三年判國子監孫奭言上丁釋奠舊禮以祭酒司業博士充三獻官新禮以三公行事近嵗止命獻官兩員臨時通攝未副崇祀向學之意望自今備差太尉太常光祿卿以充三獻又命崇文院刋釋奠儀注及祭器圖頒之諸路真宗本紀大中祥符四年五月癸巳詔州城置孔子廟五年改諡元聖文宣王曰至聖文宣王禮志詔太常禮院定州縣釋奠器數先聖先師每坐酒尊一籩豆八簋二簠二爼三罍一洗一筐一尊皆加勺冪各置于坫巾共二燭二爵共四有坫從祀之處諸坐各籩二豆二簋一簠一爼一燭一爵一仁宗本紀天聖二年八月己邜幸國子監謁孔子玉海明道元年八月戊午詔國子監重修七十二賢堂左邱明而下二十一人並以本品衣冠圖之文獻通考景祐元年詔釋奠用登歌宋史樂志景祐祭文宣王廟六首迎神凝安大哉至聖文教之宗紀綱王化丕變民風常祀有秩備物有容神其格思是仰是崇初獻升降同安右文興化憲古師今明祀有典吉日惟丁豐犧在爼雅奏來庭周旋陟降福祉是膺奠幣明安一王垂法千古作程有儀可仰無得而名齊以滌志幣以逹誠禮容合度黍稷非馨酌獻成安自天生聖垂範百王恪恭明祀陟降膠庠酌彼醇旨薦以令芳三獻成禮率由舊章飲福綏安犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越兖國公配位酌獻成安哲宗朝增此一曲無疆之祀配侑可宗事舉以類與享其從嘉栗旨酒登薦惟恭降此遐福令儀肅雍送神凝安肅肅庠序祀事惟明大哉宣父將聖多能歆馨肹蠁回馭凌兢祭容斯畢百福是膺陳氏樂書成周之制大胥春入學舍菜合舞秋頒學合聲故禮記文王世子凡釋奠必有合也有國故則否凡大合樂必遂飬老又曰釋奠於先聖先師先老終之遂發咏焉登歌清廟下管象舞大武而已月令仲春上丁命樂正習舞釋菜蓋學校之於天下禮樂之所自出小有釋菜而以食為主大有釋奠而以飲為主其習舞與聲而大合六代之樂一也北齊天子講畢以太牢釋奠孔子配以顔回設軒架之樂六佾之舞唐開元中釋奠文宣王始用宫架之樂然孔子人臣也用軒架足以為禮用宫架則過矣宫架天子之制四面皆縣鐘磬備六律六吕如宫室之有墻故謂之宫架軒架諸侯之制三面縣去中吕蕤賓林鐘缺其一面如軒車之有籓故謂軒架圖見樂書聖朝春秋上丁釋奠於東序上戊釋奠於西序並設登歌之樂不用軒架而用判架判架只東西兩面縣而已南北皆缺又去黃鐘大吕應鐘也抑又不施於堂下而施於堂上於其庭又不設舞焉是有歌奏而無舞非古人習舞合樂之意釐而正之以廣禮樂之教於天下實聖朝急務也仁宗本紀慶歷四年五月壬申幸國子監謁孔子有司言舊儀止肅揖帝特再拜賜直講孫復五品服禮志仁宗再幸國子監謁文宣王廟皆再拜焉宋歐陽修襄州榖城縣夫子廟記釋奠釋菜祭之略者古者士之見師以菜為贄故始入學者必釋菜以祀其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又略也故其禮亡焉而今釋奠幸存然亦無樂又不遍舉於四時獨春秋行事而已記曰釋奠必合樂國有故則否謂凡有國各自祭其先聖先師若唐虞之夔伯夷周之周公魯之孔子其國之無焉者則必合於鄰國而祭之然自孔子沒後之學者莫不宗焉故天下皆尊為先聖而後世無以易學校廢久矣學者莫知所師又取孔子門人之髙弟曰顔回者而配焉以為先師隋唐之際天下州縣皆立學置學官生員而釋奠之禮遂以著令其後州縣學廢而釋奠之禮吏以其著令故得不廢學廢矣無所從祭則皆廟而祭之荀卿子曰仲尼聖人之不得勢者也然使其得勢則為堯舜矣不幸無時而沒特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祠而州縣莫不祭之則以為夫子之尊由此為盛甚者乃謂生雖不得位而沒有所享以為夫子榮謂有德之報雖堯舜莫若何其謬論者歟祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之略者其事有樂舞授器之禮今又廢則於其略者又不備焉然古之所謂吉凶鄉射賓燕之禮民得而見焉者今皆廢失而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之莭吏人多不能習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉因以為古禮不足復用可勝歎哉大宋之興于今八十年天下無事方修禮樂崇儒術以文太平之功以謂王爵未足以尊夫子又加至聖之號以褒崇之講正其禮下於州縣而吏或不能諭上意凡有司簿書之所不責者謂之不急非好學者莫肯盡心焉榖城令狄君栗為其邑未逾時修文宣王廟易於縣之左大其正位為學舍於其傍藏九經書率其邑之子弟興於學然後考制度為爼豆籩篚樽爵簠簋凡若干以與其邑人行事榖城縣政久廢狄君居之期月稱治又能遵國典修禮興樂急其有司所不責者諰諰然惟恐不及可謂有志之士矣愛日齋藂抄釋奠釋菜古禮僅存而行於學歐陽公記襄州榖城縣夫子廟有云釋奠釋菜祭之略者也古之見師以菜為贄故始入學者必釋菜以見其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又略也祭之之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之略者余讀其文因考之禮凡學春官釋奠於其先師秋冬亦如之凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠必有合也天子視學適東序釋奠於先聖見文王世子出征執有罪反釋奠於學以訊馘告見王制凡皆言釋奠而釋奠必於學春官大祝大會同皆造於太廟宜於社過大山川則用事焉反行舍奠甸祝掌四時之田表貉之祝號舍奠於祖禰亦如之師甸致禽於虞中乃屬禽及郊饁獸舍奠於祖禰亦云舍奠也始立學者既興器用幣然後釋菜見文王世子仲春上丁命樂正習舞釋菜見月令大學始教皮辨祭菜示敬道也見學記大胥春入學舍菜合舞見春官凡皆言釋菜也而亦莫不於學士婚禮舅姑既沒則婦入三月乃奠菜士喪禮君釋菜入門喪大記大夫士既殯而君往焉釋菜於門內春官筮人乃舍萌於四方以禳惡夢注謂猶釋菜萌菜始生則凡祭禮皆有釋菜也鄭氏以釋菜奠者設薦饌酌奠而已無迎尸以下之事又以縣釋菜奠幣孔氏以為直奠置於物方氏以為釋其所執之物而祭之故其字或作舍奠言物就可薦以菜則特用菜而已儀禮疏奠之為言停停饌具而已又案周禮注鄭司農云舍菜為舞者皆持有香之菜或曰古者士見于君以雉為贄見于師以采為贄菜直為蔬食菜羮之菜或曰學者皆人君卿大夫之子衣服采飾舍菜者減損解釋盛服以下其飭也元謂舍即釋也采讀為菜蘋菜之屬吕氏春秋注舍猶置也初入學宫必禮先師置采帛於前以贄神采菜兩音而異義其説惟議禮之家有以折𠂻也邱氏濬曰案修之記作於宋盛時而謂釋菜禮亡又謂釋奠幸存而亦無樂今制則國子監每月朔先期太常寺送兔蔬等物至日行禮其春秋上丁二祭則先期皇帝傳制遣官行禮文武官朝服侍班牲用太牢禮行三獻樂備登歌舞用八佾其禮可謂備矣説者謂釋奠釋菜二者之重輕繫乎樂之有無今世之樂襲勝國用宋人魏漢津所製大晟之故耳非古樂也吁禮廢羊存雖曰不合於古豈不勝於無哉方今聖明在上必有當制作之任者行古之禮復古之樂政有望於今日熙寧五年國子監言舊例遇貢舉嵗禮部貢院集諸州府所貢第一人謁奠先聖如春秋釋奠儀况春秋自有釋奠禮請罷貢舉人謁奠蕙田案此罷貢舉人釋奠文獻通考熙寧八年判國子監常秩等言本監宣聖神像舊用冕服九旒七十二賢二十一先儒並用朝服檢會唐開元中尊孔子為文宣王內出王者衮冕之服以衣之詳此則孔子之冕宜用天子之制十二旒孔子既用冕旒則七十二賢二十一先儒各依本爵用冕服今來所修殿屋已成見裝飾塑像欲乞改正下太常禮院詳定禮院檢會國朝文宣王廟自建隆三年詔廟門凖儀制令立戟十六枝用正一品之禮大中祥符二年賜曲阜縣文宣王廟桓圭一從上公之制冕九旒服九章按衣服今王爵之服春秋釋奠則用中祠皆今朝之制也其兖國公顔子等皆以本朝郡國縣封爵緣古今禮制不一難以追用周之冕服宜如舊制依官品衣服今文宣王冕用九旒顔子以下各依郡國縣公侯伯正一品至正四品冠服制度庶合禮令從之神宗本紀元豐六年冬十月戊子封孟軻為鄒國公禮志熙寧七年判國子監常秩等請立孟軻揚雄像於廟庭仍賜爵號又請追尊孔子以帝號下兩制禮官詳定以為非是而止京兆府學教授蔣夔請以顔回為兖國公毋稱先師而祭不讀祝儀物一切降殺而進閔子騫九人亦在祀典禮官以孔子顔子稱號歷代各有據依難輒更改儀物祝獻亦難降殺所請九人已在祀典熙寧祀儀十哲皆為從祀惟州縣釋奠未載請自今三京及諸州春秋釋奠並凖熙寧祀儀詔封孟軻為鄒國公神宗本紀元豐七年五月壬戌以孟軻配食文宣王封荀况揚雄韓愈為伯並從祀禮志晉州州學教授陸長愈請春秋釋奠孟子宜與顔子並配議者以為配享從祀皆孔子同時之人今以孟軻並配非是禮官言唐貞觀以漢伏勝髙堂生晉杜預范寧之徒與顔子俱配享至今從祀豈必同時孟子於孔門當在顔子之列至於荀况揚雄韓愈皆發明先聖之道有益學者久未配食誠闕典也請自今春秋釋奠以孟子配食荀况揚雄韓愈並加封爵以世次先後從祀於左邱明二十一賢之間自國子監及天下學廟皆塑鄒國公像冠服同兖國公仍繪荀况等像於從祀荀况左邱明下揚雄劉向下韓愈范寧下冠服各從封爵詔如禮部議荀况封蘭陵伯揚雄封成都伯韓愈封昌黎伯令學士院撰贊文又詔太常寺修四孟釋菜儀邱氏濬曰案此孟子配享孔子之始自唐以左邱明二十二人從祀之後至是始以荀况三人者從祀日知録顧氏炎武曰古人每事必祭其始之人耕之祭先農也桑之祭先蠶也學之祭先師也一也唐太宗貞觀二十一年詔以左邱明等二十二人代用其書垂於國胄自今有事於太學並令配享宣尼廟堂蓋所以報其傳注之功迄於宋之仁英未有改易可謂得古人敬學尊師之意者矣神宗元豐七年始進荀况揚雄韓愈三人此三人之書雖有合於聖人而無傳注之功不當祀也祀之者為王安石配享王雱從祀地也觀承案日知録之論雖亦有見然荀况揚雄之於韓子可若是班乎且但知貴詁經之力而不知尊任道之功所見膚矣哲宗本紀元祐六年冬十月庚午幸國子監賜祭酒豐稷三品服監學官賜帛有差禮志元祐六年幸太學先詣國子監至聖文宣王殿行釋奠禮一獻再拜徽宗本紀崇寧元年二月庚戌追封孔鯉為泗水侯孔伋為沂水侯畢仲遊傳仲遊為吏部郎中言孔子廟自顔回以降皆爵命於朝冠冕居正而子鯉孫伋乃野服幅巾以祭為不稱詔皆追侯之禮志崇寧時封孔鯉為泗水侯孔伋沂水侯詔古者學必祭先師况都城近郊大闢黌舍聚四方之士多且數千宜建文宣王廟以便薦獻文獻通考崇寧三年太常寺言國朝祀儀諸壇祠祭正位居中南面配位在正位之東南西面若兩位亦為一列以北為上其從祀之位又在其後今國子監顔子孟子配享之位即與閔子騫等從祀之位同作一列雖坐次少出而在文宣王帳座之後於配食之禮未正請改正顔子而下從享位次為圖頒示天下從之宋史徽宗本紀崇寧三年六月癸酉以王安石配享孔子廟禮志詔王安石可配孔子廟位於鄒國公之次文獻通考令國子監圖其像頒之天下崇寧三年國子監丞趙子櫟言唐封孔子為文宣王其廟像內出王者衮冕衣之今乃循五代故制服上公之服七十二子皆周人而衣冠率用漢制非是詔孔子仍舊七十二子易以周之冕服又詔辟雍文宣王殿以大成為名帝幸國子監謁文宣王殿皆再拜行酌獻禮遣官分奠兖國公而下國子司業蔣靜言先聖與門人通被冕服無别配享與從祀之人當從所封之爵服周之服公之衮冕九章侯伯之鷩冕七章衮公服也逹於上鄭氏謂公衮無升龍誤矣考周官司服所掌則公之冕與王同辨師所掌則公之冕與王異今既考正配享從祀之服則宜考正先聖之冕服於是增文宣王冕為十有二旒崇寧儀禮局言太學獻官太祝奉禮皆以法服至於郡邑則用常服望命有司降祭服於州縣凡獻官祝禮各服其服以盡事師之儀詔以衣服制度頒賜州縣自造焉邱氏濬曰案此宣聖用天子冕旒之始大觀初大司成強淵明言考之禮經士始入學有釋菜之儀請自今每嵗貢士始入辟雍並以元日釋菜於先聖其儀獻官一員以丞或博士分奠官八員以博士正録大祝一員以正録應祀官前釋菜一日赴學各宿其次至日詣文宣王殿常服行禮貢士初入學者陪位於庭他亦略倣釋奠之儀大觀二年從通侍郎侯孟請繪子思像從祀於左邱明二十四賢之間徽宗本紀大觀三年十一月丁未詔算學以黃帝為先師風后等八人配享巫咸等七十人從祀禮志時又有算學大觀三年禮部太常寺請以文宣王為先師兖鄒荆三國公配享十哲從祀自昔著名算數者畫像兩廡請加賜五等爵隨所封以定其服於是中書舍人張邦昌定算學封風后上谷公箕子遼東公周大夫商髙郁夷公大撓涿鹿公商巫咸河東公𨽻首陽城公容成平都公常儀原都公鬼俞區宣都公晉史蘇晉陽伯秦卜徒父潁陽伯晉卜偃平陽伯魯梓慎汝陽伯晉史趙髙都伯魯卜楚邱昌衍伯鄭禆竈滎陽伯趙史墨易陽伯周榮方美陽伯齊甘德災川伯魏石申隆慮伯漢鮮于妄人清泉伯耿壽昌安定伯夏侯勝任城伯京房樂平伯翼奉良城伯李尋平陵伯張衡西鄂伯周興慎陽伯單揚湖陸伯樊英魯陽伯晉郭璞聞喜伯宋何承天昌盧伯北齊宋景業廣宗伯隋蕭吉臨湘伯臨孝恭新豐伯張胄元東光伯周王朴東平伯漢鄧平新野子劉洪蒙隂子魏管輅平原子吳趙逵榖城子宋祖沖之范陽子後魏商紹長樂子北齊信都芳樂城子許遵髙陽子隋耿詢湖孰子劉焯昌亭子劉炫景城子唐傅仁均博平子王孝通介休子瞿曇羅居延子李淳風昌樂子王希明琅琊子李鼎祚贊皇子邊岡成安子漢郎顗觀陽子襄楷隰隂子司馬季主夏陽男落下閎閬中男嚴君平廣都男魏劉徽淄鄉男晉薑岌成紀男張邱建信成男夏侯陽平陸男後周甄鸞無極男隋盧大翼成平男尋詔以黃帝為先師禮部員外郎吳時言書畫之學教飬生徒使知以孔子為先師此道德之所以一也若每學建立殿宇則配享從祀難於其人請春秋釋奠止令書畫博士量率執事生員陪預執事庶使知所宗師醫學亦凖此詔皆從之蕙田案算學小道乃以歸功黃帝而報之又廣羅星卜藝術之人以為從祀而又濫加封爵濫矣樂志大觀三年釋奠六首迎神凝安仰之彌髙鑽之彌堅於昭斯文被于萬年峩峩膠庠神其來止思報無窮敢忘于始升降同安生民以來道莫與京溫良恭儉惟神惟明我潔尊罍陳兹芹藻言升言旋式崇斯教奠幣明安於論鼓鐘于兹西雍粢盛肥碩有顯其容其容洋洋咸瞻像設幣以逹誠歆我明潔酌獻成安道德淵源斯文之宗功名粳粃素王之風碩兮斯牲芬兮斯酒綏我無疆與天為久配位酌獻成安儼然冠纓崇然廟庭百王承祀涓辰惟丁于牲于醑其從豫享與聖為徒其德不爽送神凝安肅莊紳緌吉蠲牲犧於皇明祀薦登惟時神之來兮肹蠁之隨神之去兮休嘉之貽大晟府擬撰釋奠十四首迎神凝安黃鐘為宫大哉宣聖道德尊崇維持王化斯民是宗典祀有常精純並隆神其來格於昭盛容大吕為角生而知之有教無私成均之祀威儀孔時維兹初丁潔我盛粢永適其道萬世之師太簇為徴巍巍堂堂其道如天清明之象應物而然時維上丁備物薦誠維新禮典樂諧中聲應鐘為羽聖王生知闡乃儒規詩書文教萬世昭垂良日維丁靈承不爽揭此精虔神其來享初獻盥洗同安右文興化憲古師今明祀有典吉日惟丁豐犧在爼雅奏在庭周旋陟降福祉是膺升殿同安誕興斯文經天緯地功加於民實千萬世笙鏞和鳴粢盛豐備肅肅降登歆兹秩祀奠幣明安自生民來誰底其盛惟王神明度越前聖粢幣具成禮容斯稱黍稷非馨惟神之聼奉爼豐安道同乎天人倫之至有享無窮其興萬世既潔斯牲粢明醑旨不懈以忱神之來暨文宣王位酌獻成安大哉聖王實天生德作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶幾昭格兖國公位酌獻成安庶幾屢空淵源深矣亞聖宣猷百世宜祀吉蠲斯辰昭陳尊簋旨酒欣欣神其來止鄒國公位酌獻成安道之由興於皇宣聖惟公之傳人知趨正與享在堂情文實稱萬年承休假哉天命亞終獻用文安百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且旨登獻惟三於噫成禮徹豆娛安犧象在前豆籩在列以饗以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越送神凝安有嚴學宫四方來宗恪恭祀事威儀雍雍歆兹惟馨飈馭旋復明禋斯畢咸膺百福文獻通考大觀四年詔先聖廟用戟二十四文宣王執鎮圭並如王者之制議禮局言文宣王自開元追諡之初則內出王者衮冕之服以衣之樂用宫架其禮制蓋嘗增崇矣國朝會要國子監神像舊用冕九旒服九章而不載其更易之端崇寧四年八月詔從國子監司業蔣靜之請改用冕十二旒服九章而又圖繪頒之天下郡邑其執圭立戟乞並從王者制度從之宋史禮志議禮局言建隆三年詔國子監廟門立戟十六用正一品禮大中祥符二年賜曲阜廟桓圭從上公之制又史記弟子傳曰受業身通六藝者七十有七人自顔回至公孫龍三十五人頗有年名及受業見於書傳四十二人姓名僅存家語曰七十二弟子皆升堂入室者案唐會要七十七人而開元禮止七十二人又復去取不一本朝議臣斷以七十二子之説取琴張等五人而去公夏首等十人今以家語史記參定公夏首后處公肩定顔祖鄡單罕父黑秦商原抗樂咳亷潔唐會要開元禮亦互見之皆有伯爵載於祀典請追贈侯爵使預祭享詔封公夏首巨平侯后處膠東侯公肩定梁父侯顔祖富陽侯鄡單栁城侯罕父黑祈鄉侯秦商馮翊侯原抗樂平侯樂咳建成侯亷潔胙城侯又詔改封曾參武城侯顓孫師潁川侯南宫縚汶陽侯司馬耕睢陽侯琴張陽平侯左丘明中都伯榖梁赤睢陵伯戴聖考城伯以所封犯先聖諱也徽宗本紀政和三年春正月癸酉追封王安石為舒王子雱為臨川伯配享於文宣王廟禮志政和三年詔封王安石為舒王配享安石子雱臨川伯從祀新儀成以孟春元日釋菜仲春仲秋上丁日釋奠以兖國公顔回鄒國公孟軻舒王王安石配饗殿上琅琊公閔損東平公冉耕下邳公冉雍臨淄公宰豫黎陽公端木賜並西向彭城公冉求河內公仲由丹陽公言偃河東公卜商武城侯曾參並東向東廡潁川侯顓孫師以下至成都伯揚雄四十九人並西向西廡長山侯林放以下至臨川伯王雱四十八人並東向頒辟雍大成殿名於諸路州學五年太常等言兖州鄒縣孟子廟詔以樂正子配享公孫丑以下從祀皆擬定其封爵樂正子克利國侯公孫丑壽光伯萬章博興伯浩生不害東阿伯孟仲子新泰伯陳臻蓬萊伯充虞昌樂伯屋廬奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平隂伯咸丘蒙須城伯髙子泗水伯桃應膠水伯盆成括萊陽伯季孫豐城伯子叔承陽伯大晟樂成詔下國子學選諸生肄習上丁釋奠奏於堂下以祠先聖輟耕録宋黃震云往嵗顔孟配享並列先聖左近升曾子子思又並列先聖左而虗其右不以相向震聞太學博士陸鵬舉云初制顔孟配享左顔而右孟熙豐新經盛行以王安石為聖人沒而躋之配享位顔子下故左則顔子及安石右則孟子未幾安石女壻蔡卞當國謂安石不當在孟子下遷安石於右與顔子對而移孟子位第三次顔子之下遂左列顔孟而右列安石又未幾蔡卞再欲升安石厭顔子漸次而升為代先聖張本玉海政和六年閏正月二日詔髙麗受學者元日隨貢士釋菜宋史徽宗本紀宣和四年三月辛酉幸祕書省遂幸太學賜祕書少監翁彥深王時雍國子祭酒韋壽隆司業權邦彥章服館職學官諸生恩錫有差闕里志宣和四年車駕幸太學奠謁先聖宋史欽宗本紀靖康元年五月戊辰罷王安石配饗孔子廟庭禮志靖康元年右諌議大夫楊時言王安石學術之謬請追奪王爵明詔中外毁去配享之像使邪説淫辭不為學者之惑詔降安石從祀廟庭尚書傅墨卿言釋奠禮饌宜依元豐祀儀陳設其五禮新儀勿復遵用楊時傳時以諫議大夫兼國子祭酒上言蔡京用事二十餘年蠧國害民幾危宗社人所切齒而論其罪者莫知其所本也蓋京以繼述神宗為名實挾王安石以圗身利故推尊安石加以王爵配饗孔子廟庭今日之禍實安石有以啓之伏望追奪王爵明詔中外毁去配享之像使邪説淫辭不為學者之惑疏上安石遂降從祀之列揮塵前録崇寧中以王荆公配宣聖亞兖公而居鄒公之上故遷鄒於兖之次靖康初詔黜荆公但舁塑像不復移鄒公於舊位至今天下庠序悉兖鄒並列而虗右雖後來重建者舉皆沿襲而竟不能革也容齋隨筆自唐以來相傳以孔門髙弟顔淵至子夏為十哲故坐祀於廟堂上其後升顔子配享則進曾子於堂居子夏之次以補其闕然顔子之父路曾子之父點乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也又孟子配食與顔子並而其師子思子思之師曾子亦在下此兩者於禮於義實為未然特相承既久莫之敢議耳髙宗本紀紹興十年秋七月甲子以釋奠文宣王為大祀玉海紹興十年七月甲子復釋奠文宣王為大祀用王普請也祀前受誓戒加籩豆十二其禮如社稷又在京為大祀州縣為中祀宋史髙宗本紀紹興十四年三月己巳幸太學禮志紹興十三年七月國學大成殿告成奉安廟像明年二月國子司業髙閌請幸學上從之詔略曰偃革息民恢儒建學聲明丕闡輪奐一新請幸方堅理宜從欲將欵謁於先聖仍備舉於舊章三月上服鞾𫀆乘輦入監止輦於大成殿門外入幄羣臣立班於庭帝出幄升東階跪上香執爵三祭酒再拜羣臣皆再拜上降入幄分奠從祀如常儀尚舍先設次於崇化堂之後及堂上之東南向設御坐閣門設羣臣班於堂下如月朔視朝之儀宰輔從臣次於中門之外上乘輦幸太學降輦於堂入次更衣講官入就堂下講位北向執經官學生皆立於堂下東西相向帝出次升御座羣臣起居如儀乃命三公宰輔以下升堂皆就位左右史侍立講書及執經官北面起居再拜皆命之升立於御坐左右學生北面再拜分立兩廡北上內侍進書案牙籖以經授執經官賜三公宰輔以下坐講畢羣臣皆起降階東西相向立執經官降講官進前致詞乃降北面再拜左右史降乃賜茶三公以下北面再拜升各立於位後學生北面再拜分立兩廡上下就坐賜茶畢三公以下降階學生自兩廡降階北面再拜羣臣以次出上降坐還次乘輦還宫特命禮部侍郎秦熺執經司業髙閌講易之泰遂幸養正持志二齋賜閌三品服學官遷秩諸生授官免舉賜帛有差上既奠拜注視貌象翼翼欽慕覽唐明皇及太祖真宗徽宗所製贊文命有司悉取從祀諸贊皆録以進帝遂作先聖及七十二子贊冠以序文親灑翰墨以方載之五月丙辰登之綵殿備儀衛作樂命監學之臣自行宫北門迎置學宫揭之大成殿上及二廡序曰朕自睦鄰息兵首開學校教飬多士以遂忠良繼幸太學延見諸生濟濟在庭意甚嘉之因作文宣王贊機政餘間歷取顔回而下七十二人亦為製贊用廣列聖崇儒右文之聲復知師弟之間纓辨森森覃精繹思之訓其於世道人心庶幾焉蕙田案禮志云紹興十三年七月國學大成殿告成明年二月國子司業髙閌請幸學從之髙宗紀亦云十四年三月己巳幸太學而通考乃云十三年恐傳寫之誤也王圻續通考乾道八年正月丙戌宰輔請討論上丁釋奠及太子入學之儀上曰文王世子篇載此甚詳梁克家奏入學以齒則知父子君臣長幼之道虞允文奏事備於禮經上曰可令有司討論以聞玉海淳熙三年趙粹中請削去安石從祀宋史孝宗本紀淳熙四年二月乙亥幸太學祗謁先聖退御敦化堂命國子祭酒林光朝講中庸秋七月乙酉罷臨川伯王雱從祀李燾傳燾論兩學釋奠從祀孔子當升范仲淹歐陽修司馬光蘇軾黜王安石父子從祀武成王當黜李績衆議不叶止黜王雱而已王圻續通考淳熙七年二月十七日禮官言祥符間頒下州縣祭器止有散尊與新儀不同乞除去兼政和之後配位從祀神位升降及封爵不同慮州縣塑繪不一乞依國子監大成殿並兩廡從祀位數爵號姓名并尊器制度頒降從之宋史胡安國傳安國除提舉萬壽觀兼侍讀未行諫官陳公輔上疏詆假托程頥之學者安國奏曰孔孟之道不傳久矣自頤兄弟始發明之然後知其可學而至今使學者師孔孟而竟不得從頤學是入室而不由户本朝自嘉祐以來西都有邵雍程皓及其弟頤關中有張載皆以道德名世公卿大夫所欽慕而師尊之會王安石蔡京等曲加排抑故其道不行望下禮官討論故事加之封爵載在祀典比於荀揚韓氏玉海紹熙元年十月知漳州朱熹條上釋奠禮儀數事後不果行朱子乞增修禮書狀伏見本軍昨凖尚書禮部符下政和五禮祭祀儀式竊嘗參考其間頗有未詳備處方欲具狀申審今覩進奏官報近者判部侍講侍郎奏請編類州縣臣民禮儀鏤版頒降已奉聖旨依奏此誠化民善俗之本天下幸甚然熹竊慮其間未詳備處將來奉行或致抵牾今具如後須至申聞者一所凖行下釋奠禮儀熹案其神位除正配三位外有殿上兩廊從祀未見位號名數不委新儀全書有無具載欲乞討論并賜行下然案祀令二月八月上丁釋奠文宣王以兖國公鄒國公配牲共用羊一豕一白幣三而已今其所祀乃近一百餘位一羊一豕無緣可以遍及又州縣廟學窄狹祭器獻官多不及數往往不能二分獻其為欺慢莫甚於斯竊欲更乞相度申明許令州學免祭兩廊諸位縣學并免殿上十位庶幾事力相稱儀物周備可以盡其誠敬熹又案行下釋奠行事儀引三獻官詣舒王神位前一節係政和間所定後來靖康年中已有指揮追貶王安石爵秩停罷配享訖今來上件儀注尚仍舊文竊慮州縣奉行反至疑惑亦合申明改正并乞台照一所凖行下釋奠陳設儀云設著尊四犧尊四為二重在殿之東南隅北向西上配位即於正位酌尊之東著尊在前有坫加勺冪為酌尊著尊一實明水為上尊餘實泛齊初獻酌之犧尊一實明水為上尊餘實醴齊亞終獻酌之熹案後章行事儀云初獻酌犧尊之泛齊亞終獻酌象尊之醴齊與此不協竊疑兩處必有一誤尋考祭社稷祀風雨雷師陳設皆設犧尊象尊為酌尊乃知正是此章之誤其著字當作犧字犧字當作象字又既云北向則是犧尊在北象尊在南所云在前亦是重復倒置欲乞申明改正行下一所凖行下釋奠祭祀陳設章皆云又設太尊二山尊二在神位前太尊一實泛齊山尊一實醴齊各以一尊實明水著尊二犧尊二象尊二壺尊六著尊一實盎齊犧尊一實醍齊象尊一實沈齊各以一尊實明水壺尊三實元酒三實三酒明水元酒皆在上五齊三酒皆以本處酒充在殿下皆北向西上加冪五齊三酒皆設而不酌熹按此太尊山尊乃是都共設於殿之前楹壇之南面其北更容獻官拜跪酌獻非是逐位之前各設四尊所謂北向者恐是太尊二為一行其南山尊二為一行又次南階下著尊二為一行又次南犧尊二為一行又次南象尊二為一行又次南壺尊六為三行其南向者反此所謂西上者為西實元酒東實五齊三酒其東上者反此未委是否乞討論并賜行下朱子語類古人神位皆西坐東向故獻官皆西向拜而今皆南向了釋奠時獻官猶西向拜不知是如何若宣聖廟室則先聖東向先師南向今既一列皆南向到拜時亦向望西拜都是相背古人用籩豆簠簋等陳於地當時只席地而坐故如此飲食為便今塑像髙髙在上而祭饌反陳於地情文全不相稱夫子像設置於椅上已不是又復置在臺座上到春秋釋奠却乃陳簠簋籩豆於地是甚義理釋奠據開元禮只是臨時設位後來方有塑像顔孟配享始亦分位於先聖左右後來方並坐於先聖之東西向孔子居中顔孟當列東坐西向七十二人先是排東廡三十六人了却方是西頭排起當初如此自升曾子於殿上下面趲一位次序都亂了又云某經歷諸處州縣學都無一箇合禮序開寶禮只是全録開元禮易去帝號耳若政和五禮則甚錯今釋奠有伯魚而無子思又十哲亦皆差互且仲弓反在上且如紹興中作七十二子贊只據唐爵號不知後來已經加封矣近嘗申明之孟子配享乃荆公請之配享只當論傳道合以顔子曾子子思孟子配蕙田案配享之位得朱子此論始定文獻通考紹熙間項安世為越州教授告先師文曰常平使者朱熹為安世言開元禮先聖東向先師南向故三獻官皆西向則稽古尚右也今祀典正位南向配位西向三獻官猶西向則兼而用之也獨此府廟學有司以私意復古使配位皆東向此古者先聖之位也拂今之法戾古之意先師其不妥於此也安世用惕然不敢寧處謹擇日奉安先師於西向故位不敢不告惟先師鑒之朱子乞以泗水侯從祀先聖狀熹恭覩崇寧元年二月二十五日詔封孔鯉為泗水侯孔伋為沂水侯今案本部降到神位名號其泗水侯獨未得在從祀之列蓋嘗考之論語伯魚過庭親承詩禮之訓先聖又嘗使為周南召南之學其才雖曰不及顔淵然亦不應盡出七十子之下竊意當世禮官一時討論偶失編載非故有所取舍升黜於其間也熹愚欲望朝廷特賜詳酌將泗水侯列於從祀位在七十子之後沂水侯之前庶幾孔門之賢悉登祀典有以仰稱崇寧聖詔褒崇之意須至申聞者王圻續通考嘉定六年全州教授黃學行進歷代尊師本末二卷載尊崇孔氏祭祀儀注配享從祀沿革升降之因宋史理宗本紀端平二年正月甲寅詔議胡瑗孫明復邵雍歐陽修周惇頥司馬光蘇軾張載程皓程頤等十人從祀孔子廟庭升孔伋於十哲玉海禮部尚書李埴請子思升祀於堂列於十哲之間宋史理宗本紀淳祐元年春正月甲辰詔朕惟孔子之道自孟軻以後不得其傳至我朝周惇頥張載程皓程頤真見實踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨表裏渾融使大學論孟中庸之書本末洞徹孔子之道益以大明於世朕每觀五臣論著啓沃良多今視學有日其令學官列諸從祀以示崇奬之意尋以王安石謂天命不足畏祖宗不足法人言不足恤為萬世罪人豈宜從祀孔子廟庭黜之丙午封周惇頥為汝南伯張載郿伯程皓河南伯程頥伊陽伯戊申幸太學謁孔子遂御崇化堂命祭酒曹觱講禮記大學篇監學官各進一秩諸生推恩錫帛有差制道統十三贊就賜國子監宣示諸生禮志淳祐元年正月理宗幸太學詔以周惇頥張載程皓程頥朱熹從祀邱氏濬曰案此周程張朱從祀之始理宗本紀景定二年春正月丁丑命皇太子謁拜孔子於太學乙酉詔封張栻為華陽伯吕祖謙開封伯從祀孔子廟庭禮志景定二年皇太子詣學請以張栻吕祖謙從祀從之王圻續通考景定二年詔皇太子謁孔子於太學手詔略曰虎闈齒胃太子事也此禮廢久矣如釋奠舍菜之事我朝未嘗廢也然尊師敬道又不可拘舊制可令太子謁拜焉太子既謁孔子還即上奏曰臣恭逄聖旨擇用正月十五日令臣謁拜先聖文宣王於太學臣仰體聖心祗承嚴訓區區愚衷因而感發焉蓋先聖之道至我朝盛時運際文明真儒迭起而後有以續夫孟氏之傳然其時諸説並駕未知統一逮乾淳間文公臣朱熹與宣公臣張栻成公臣吕祖謙志同道合切偲講磨如義利之辨如近思録之書擇精語詳開牖後學誠有功於聖門中間邪説又幾晦蝕陛下聖德奮興罷斥詖邪表章正學然後人心一正聖道大明天下學士得沿淵源而遡洙泗實萬世無疆之休今熹已秩從祀而栻祖謙尚未奉明詔臣竊望焉從之宋史度宗本紀咸淳三年春正月戊申帝詣太學謁孔子行舍菜禮以顔淵曾參孔伋孟軻配享顓孫師升十哲邵雍司馬光升列從祀雍封新安伯禮部尚書陳宗禮國子祭酒陳宜中進讀中庸己酉執經官宗禮講經官宜中各進一秩宜中賜紫章服諸齋長諭及起居學生推恩有差禮志咸淳三年詔封曾參郕國公孔伋沂國公配享先聖封顓孫師陳國公升十哲位復以邵雍司馬光列從祀其序兖國公郕國公沂國公鄒國公居正位之東面西向北上為配位費公閔損薛公冉雍黎公端木賜衛公仲由魏公卜商居殿上東面西向北上鄆公冉耕齊公宰豫徐公冉求吳公言偃陳公顓孫師居殿上西面東向北上為從祀東廡金鄉侯淡臺滅明任城侯原憲汝陽侯南宫適萊蕪侯曾點須昌侯商瞿平輿侯漆雕開睢陽侯司馬耕平隂侯有若東阿侯巫馬施陽榖侯顔辛上蔡侯曹恤枝江侯公孫龍馮翊侯秦祖雷澤侯顔髙上邽侯壤駟赤成邑一作紀侯石作蜀巨平侯公夏首膠東侯后處濟陽侯奚容蒧富陽侯顔祖滏陽侯句井疆鄄城侯秦商即墨侯公祖句兹武城侯縣成汧源侯燕伋宛句侯顔之僕建成侯樂咳堂邑侯顔何林慮侯狄黑鄆城侯孔忠徐城侯公西點臨濮侯施之常華亭侯秦非文登侯申棖濟隂侯顔噲泗水侯孔鯉蘭陵伯荀况睢陽伯榖梁赤萊蕪伯髙堂生樂壽伯毛萇彭城伯劉向中牟伯鄭衆緱氏伯杜子春良鄉伯盧植滎陽伯服虔司空王肅司徒杜預昌黎伯韓愈河南伯程皓新安伯邵雍溫國公司馬光華陽伯張栻凡五十二人並西向西廡單父侯宓不齊髙密侯公冶長北海侯公晢哀曲阜侯顔無繇共城侯髙柴壽張侯公伯寮益都侯樊須巨野侯公西赤千乘侯梁鱣臨沂侯冉孺沭陽侯伯虔諸城侯冉季濮陽侯漆雕哆髙苑侯漆雕徒父鄒平侯商澤當陽侯任不齊牟平侯公良孺新息侯秦冉梁父侯公肩定聊城侯鄡單祁鄉侯罕父黑淄川侯申黨厭次侯榮旗南華侯左人郢朐山侯鄭國樂平侯原亢胙城侯廉潔博平侯叔仲會髙堂侯邽巽臨朐侯公西輿如內黃侯蘧瑗長山侯林放南頓侯陳亢陽平侯琴張博昌侯步叔乘中都伯左邱明臨淄伯公羊髙乘氏伯伏勝考城伯戴聖曲阜伯孔安國成都伯揚雄岐陽伯賈逵扶風伯馬融髙密伯鄭元任城伯何休偃師伯王弼新野伯范寧汝南伯周敦頤伊陽伯程頤郿伯張載徽國公朱熹開封伯吕祖謙凡五十二人並東向邱氏濬曰此顔曾思孟配享之始日知録顧氏炎武曰周程張朱四子之從祀定於理宗淳祐元年顔曽思孟四子之配享定於度宗咸淳三年自此之後國無異論俗無異習歷元至明先王之統亡而先王之道存理宗之功大矣又曰孟子言他日子夏子張子遊以有若似聖人欲以所事孔子事之強曾子曾子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已慈溪黃氏曰門人以有若之言行氣象類孔子而欲以所事孔子之禮事之有若之所學何如也曾子以孔子自生民以來未有非有若之所可繼而止之亦非貶有若也有若雖不足以比孔子而孔門之所推重一時無及有若可知咸淳三年升從祀以補十哲衆議必有若也祭酒為書力詆有若不當升而升子張不知論語一書孔子未嘗深許子張據孟子此章則子張正欲事有若者也陸象山天資髙明指心頓悟不欲人從事學問故嘗斥有子孝弟之説為支離奈何習其説者不察而創攻之於千載之下耶當時之論如此愚案論語首篇即録有子之言者三而與曽子並稱曰子門人實欲以二子接孔子之傳者傳記言孔子之卒哀公誄之有若之喪悼公弔焉其為魯人所重又可知矣十哲之祀允宜釐正觀承案咸淳之議十哲不補有子而升子張顧氏此論可備參考嶽氏愧郯録蘇文忠公集私試䇿問曰古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就食也珂案今世國學郡縣學禮殿坐像皆正席南向顔孟而下列侍所措設與前不殊私竊疑之慶元己未朱子熹始作白鹿禮殿塑像説其文曰古人之坐者兩膝著地因反其跖而坐於其上正如今之跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓手上也其為稽首則又郤其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之類凡言坐者皆謂跪也漢文帝與賈生語不覺膝之前於席管寧坐不箕股榻當膝處皆穿皆其明驗然記又云授立不跪授坐不立莊子又云跪坐而進之則跪與坐又自有少異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以尻著跖而稍安者為坐也又詩云不遑啓居而傳以啓為跪爾雅以妥為安而疏以為安定之坐夫以啓對居而訓啓為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知蓋兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春説太祝九拜處解竒拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問豫既略考禮如前云云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得已而塑像則當倣此以免於蘇子俯伏匍匐之譏子言又不謂然會豫亦辭浙東之節遂不能強然至今以為恨也其後乃聞成都府學有漢時禮殿諸像皆席地跪坐文翁猶是當時琢石所為尤足據信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且為寫倣文翁石像為土偶以來而塑手不精或者猶意其或加趺也去年又屬蜀漕楊玉休子美今乃并得先聖先師三像木刻精巧視其坐後兩跖隱然見於帷裳之下然後審其所以坐者果為跪而亡疑也惜乎白鹿塑像之時不得比證以曉子言使東南學者未得復見古人之像以革千載之謬為之喟然太息姑記本末寫寄洞學諸生使書而揭之廟門之左以俟來考焉又注其下曰老子云雖有拱璧以先駟馬不如坐進此道蓋坐即跪也進猶獻也言以重寶厚禮與人不如跪而告之以此道也今説者乃以為坐禪之意誤也然後古意遺像粲然可考而知珂按符子曰太公釣於隱溪跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處石皆若臼其跗觸崖若路此尤足以驗前説或謂國朝景靈宫設塑像之制亦坐於椅所不當輕議珂竊以為原廟用時王之禮裀席器皿皆與今同則其為像反不當以泥古矣珂在朝時以攝奉常丞奉祠太廟得立阼階見室中之用亦不以髙几蓋古今器服各適其宜以便於事是亦求神之義也右宋五禮通考卷一百十八
