body:
  text: 凡例一五禮之名肇自虞書五禮之目著于周官大宗伯曰吉凶軍賓嘉小宗伯掌五禮之禁令與其用等孔子曰周監于二代郁郁乎文哉吾従周所以經緯天地宰制萬物大矣至矣自古禮散軼漢儒掇拾於煨燼之餘其傳於今者惟儀禮十七篇周官五篇考工記一篇文多殘闕禮記四十九篇刪自小戴及所存大戴禮間有制度可考而純駁互見附以注疏及魏晉諸家人自為説益用紛岐唐宋以來惟杜氏佑通典陳氏祥道禮書朱子儀禮經傳通解馬氏端臨文獻通考言禮頗詳今案通解所纂王朝邦國諸禮合三禮諸經傳記薈萃補輯規模精宻第専録註疏亦未及史乗且屬未成之書禮書詳于名物畧于𫝊註通典通考雖網羅載籍兼收令典第五禮僅二書門類之一未克窮端竟委詳説反約宋史禮志載朱子嘗欲取儀禮周官二戴記為本編次朝廷公卿大夫士民之禮盡取漢晉而下及唐諸儒之説考訂辨正以為當代之典未及成書至近代崑山徐氏乾學著讀禮通考一百二十卷古禮則倣經𫝊通解兼採衆説詳加折衷歴代則一本正史參以通典通考廣為搜集庶幾朱子遺意所闗經國善俗厥功甚鉅惜乎吉嘉賓軍四禮屬草未就是書因其體例依通典五禮次第編輯吉禮如干卷嘉禮如干卷賓禮如干卷軍禮及凶禮之未備者如干卷而通解内之王朝禮别為條目附于嘉禮合徐書而大宗伯之五禮古今沿革本末源流異同失得之故咸有考焉一考制必従其朔法古貴知其意而議禮之家古稱聚訟權衡審度非可臆決徐本于經文缺畧𫝊注糾紛之處必詳悉考訂定厥指歸兹特兼收異説并先儒辨論附于各條之後以備參稽或並存闕疑於治經之學不無補禆一杜氏馬氏所載歴代史事大概専據志書而本紀列𫝊不加搜採然史家記事彼此互見且二十二史體例各殊有詳于志而不登紀𫝊者亦有散見紀𫝊而不登于志者舉一廢一不無掛漏又其採輯之法有時全載議論一事而辨析千言有時専提綱領千言而括成一語詳畧不均指歸無據兹特徧採紀𫝊參校志書分次時代詳加考核凡諸議禮之文務使異同並載曲直具存庶幾後之考者得以詳其本末一作者謂聖述者謂明聖則經而賢則𫝊漢藝文志言禮者十三家洎及魏晉師𫝊弟受抱殘守闕厥功偉焉至宋元諸大儒出粹義微言元宗統㑹而議禮始有歸宿兹編考訂専以經𫝊為權衡謹緝禮經源流列于首簡一歴代禮典西京賈董昌言未遑制作東都鋭意舉修多雜讖緯魏晉則僅𫝊儀注逮梁天監中五禮始有成書唐開元禮出而五禮之文大備杜氏因之參輯舊聞作為通典馬氏續加増廣纂入通考元明各有集禮及典章㑹典等書班孟堅云王者必因前王之禮順時施宜有所損益夫子亦曰百世可知述禮制因革一吉禮為五禮之冠記曰禮有五經莫重于祭唐虞伯夷典三禮周官大宗伯掌天神地祇人鬼之禮第兩郊七廟遺文缺微儀禮所𫝊特牲少牢皆大夫士之祭故漢志有推士禮而致于天子之譏矧䜟緯繁興康成雜入經註辨難滋起如天帝有六地祇為二明堂之五室九室祈榖之建子建寅禘郊不分地社莫别宗廟六祭淆于禘祫分年昭穆祧遷紊于兄弟繼序他如服冕牲牢樂舞器數岐説益紛幾千年間廢興創革往往莫之適従兹編于經𫝊搜集無遺冀以補綴萬一至先儒論説及累朝奏議亦廣為採取較之通典通考詳畧懸殊卷帙亦獨多於他禮一大宗伯三禮馬氏通考以郊社宗廟統之三者亦各自為叙然先農先蠶以人鬼而入郊社六宗四類又不能確指為何神經𫝊通解増列百神一項究不如宗伯三禮為統括今但以義類相從未敢强分名目一儀禮十七篇依鄭注嘉禮居其七通典従開元禮以大射鄉射屬軍禮宋史仍屬嘉禮夫古者射以觀徳貫革非所尚也今従鄭氏一大宗伯以賓禮親邦國是時天下封建故諸侯于天子有朝宗覲遇㑹同問視之禮諸侯鄰國亦相朝聘自罷侯置守無復古儀杜氏通典採摭古今分為四條通志但存三恪二王後一則通考竟全刪去以藩國朝貢附見于朝儀今輯經文天子諸侯覲聘之禮以存古儀録史𫝊藩國朝貢及遣使迎勞諸儀以昭近制而士庶人相見禮終焉一儀禮闕軍禮周官大宗伯以軍禮同邦國曰大師大均大田大役大封唐開元禮其儀二十有三通典綜為九條今兼通考之例為類一十有九一大宗伯以凶禮哀邦國之憂其禮之别有五論語曰所重民食喪祭喪固凶禮一大端也已詳徐氏讀禮通考兹特以賑禬補其缺云一經禮三百周官六職所掌大小戴記所載廣大悉賅通考将田賦選舉學校職官象緯封建輿地王禮各為一門不入五禮而朱子經𫝊通解俱編入王朝禮最為該洽今祖述通解稍變體例附於嘉禮之内易曰嘉㑹足以合禮葢言盛也一五禮各門經文之後二十二史紀志列𫝊搜擇頗廣今附通解王朝禮各類經則照五禮條目詳加考證史則苐載沿革大端以備參考全文槩従摘畧一徐書上自王朝下逮民俗古禮今制靡弗該載是編六籍而外後世典章始于秦漢訖于前明洪惟我朝聖聖相承制度修明日新富有至于科條所頒敬切訓行髙深莫贊蕙田叨佐秩宗疎陋是懼復理専門故業略識源流抑亦退食寝興無忘匪懈云爾
