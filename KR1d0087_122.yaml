body:
  text: 五禮通考卷一百十二刑部尚書秦蕙田撰吉禮大夫士廟祭儀禮有司徹鄭目錄云少牢之下篇也大夫既祭儐尸于堂之禮天子諸侯之祭明日而繹郝氏敬曰承上𧃊事畢有司徹室中饌儐尸于堂儐尸即繹凡大祭明日繹少牢之儐即祭日也鄭謂有司儐尸為上大夫不儐尸為下大夫儐與不儐事故適然或祭有大小禮有損益未可據此分大夫之上下也欽定義疏上篇正祭以神道事尸于室故用祝與佐食皆室事也此篇儐尸以賔禮接尸于堂故不用祝與佐食而另立侑以輔尸皆堂事也即于祭日攝酒燅爼而行之與天子諸侯明日繹祭者不同祭統云天子之祭也與天下樂之諸侯之祭也與竟内樂之然則大夫之儐尸也亦率其賔客宗族家臣以樂尸而已少牢下篇以儐尸為正禮不儐尸乃禮之殺者故另起言若不儐尸如士冠禮言若不醴則醮用酒若殺則特豚士昏記云若不親迎則婦入三月然後壻見一例敖氏以為古今文質異宜或亦五方風俗異尚是也又時祭有四或三時儐尸而一時不儐尸或秋冬儐尸而春夏不儐尸亦惟人酌而行之耳蕙田案注疏分儐尸為上大夫不儐尸為下大夫而郝仲輿則云儐與不儐事故適然或祭有大小禮有損益未可據與注疏異據春秋書猶繹説者以為繹祭禮輕宜廢而不廢故譏是諸侯有廢繹之時則上大夫容有不儐尸之事考家語公父文伯祭其祖悼子康子與焉進爼而不授徹爼而不與燕宗老不與則不繹繹不盡飫則退繹即上大夫儐尸也曰繹僣也宗老不與則不繹即所謂若不儐尸也可為確証注疏未妥有司徹注徹室中之饋及祝佐食之爼敖氏繼不曰徹室中之饌及𧃊者之豆爵與祝之薦爼也祝自執以出是未歸也其二佐食乃衆賔為之室中事畢亦反于賔位然則祝與佐食皆當與儐尸之禮矣張氏爾岐曰有司謂司馬司士宰夫之屬不儐尸者尸出之後設饌于西北隅以厭飫神謂之陽厭此既儐尸有祭象故不設饌西北隅為陽厭也埽堂注為儐尸新之少儀曰汎埽曰埽埽席前曰拚司宫攝酒注更洗益整頓之乃燅尸爼注燅温也温尸爼于㸑肵亦温焉古文燅皆作尋記或作燖春秋傳曰若可燖也亦可寒也敖氏繼公曰謂皆示新之祝佐食亦與儐尸之禮其爼不温者以無上位畧之但因其故爼而已欽定義疏自有司徹以下祝與佐食皆不見于經故注以為祝與佐食不與儐尸之禮然經不見祝與佐食出與歸爼之文則是猶在列也且事神事尸祝佐食有上事為最貴而儐尸之禮不與可乎以其儐尸不與尸相接而在堂下衆賔衆兄弟之班故經文不見之也祝佐食之爼不燅者以他人可用尸之餘不可令尸用他人之餘也是以因其故爼而設于堂下焉正祭主人主婦不設爼亦以儐尸不便于燅爼故耳上篇宗人遣賔朼而二佐食在焉故敖氏以佐食為衆賔也其祝若同姓則在兄弟之列異姓則在衆賔之列蕙田案祝佐食以神事尸者也侑以賔事尸者也幽明理殊尸賔事異自不宜相襲卒燅乃升羊豕魚三鼎無腊與膚乃設扃鼏陳鼎于門外如初注腊為庶羞膚從豕去其鼎者儐尸之禮殺于初如初者如廟門之外東方北面北上蕙田案少牢五鼎有腊與膚儐尸禮殺膚附豕爼無専鼎也蕙田案以上燅尸爼新儐禮乃議侑于賔以異姓注議猶擇也擇賔之賢者可以侑尸必用異姓廣敬也是時主人及賔有司已復内位敖氏繼公曰與賔長謀議可與為侑者此與鄉飲酒就先生而謀賔介之意相類侑之言佑也所以輔助尸者也儐尸而立侑亦示敬尸之意且貴多儀也欽定義疏主人賔有司皆未出廟門則猶在内位也何復之有上篇𧃊者三人興出注云出降反賔位是也三人中佐食在焉抑可見佐食之與于儐尸禮矣宗人戒侑注戒猶告也南面告于其位戒曰請子為侑疏知南面告于其位者以賔位在門東北面請以為侑明面向其位可知侑出俟于廟門之外注俟待也待于外當與尸更入主人興禮事尸極敬心也蕙田案以上立侑司宫筵於户西南面注為尸席也又筵于西序東面注為侑席也尸與侑北面于廟門之外西上注言與殊尊卑北面者儐尸而尸益卑西上統于賔客欽定義疏尸者神之所慿慿之則神離之則人也儐尸者處乎神與人之間始猶疑乎神之終則全乎人之者也士之尸未出廟則疑乎神未離之故尸不與于旅酬尸尊也大夫儐尸尸出廟而復入則疑乎神既離之故尸亦與乎旅酬尸卑也又案燕禮之賔出東面賔之也大射儀之賔出北面臣之也此尸與侑皆北面故注以為尸益卑而敖氏以為尊大夫也疏謂尸執臣道夫同姓之親天子諸侯盡臣之大夫則或臣或不臣矣豈可槩乎其臣者如東郭偃臣崔武子是也為尸者則不必其皆臣也主人出迎尸宗人擯注賔客尸而迎之主人益尊擯贊疏宿尸祝擯此宗人擯正祭主人不迎尸以申尸之尊至此賔客尸而迎之主人拜尸答拜主人又拜侑侑答拜主人揖先入門右注道尸敖氏繼公曰凡主人與客揖而先入皆入門右也經獨于此見之尸入門左侑從亦左揖乃讓注沒霤相揖至階又讓三疏鄉飲酒禮之等入門揖至階又讓敖氏繼公曰亦三揖至于階乃三讓也惟云揖乃讓文省主人先升自阼階尸侑升自西階西楹西北面東上注東上統于其席故疏賔席以東為上也主人東楹東北面拜至尸答拜主人又拜侑侑答拜注拜至喜之郝氏敬曰自主人出迎及拜至皆用賔禮蕙田案以上迎尸及侑乃舉注舉舉鼎也舉者不盥殺也司馬舉羊鼎司士舉豕鼎舉魚鼎以入陳鼎如初注如初如阼階下西面北上事疏如初如上經正祭時陳鼎之也雍正執一七以從雍府執二七以從司士合執二爼以從司士贊者亦合執二爼以從七皆加于鼎東枋二爼設于羊鼎西西縮二爼皆設于二鼎西亦西縮注凡三七鼎一七四爼為尸侑主人主婦其二爼設于豕鼎魚鼎之西陳之宜具也姜氏兆錫曰縮之言直猶順也凡全經言南陳南肆及南順之屬皆異名而同實肆亦陳也謂其陳之皆直而順也雍人合執二爼陳于羊爼西並皆西縮覆二疏七於其上皆縮爼西枋注並併也其南爼司馬以羞羊七湆羊肉湆其北爼司士以羞豕七湆豕肉汁豕脀湆魚疏七七柄有刻飾者中疏匕湆謂無肉直汁以其在七也肉湆直是肉從湆来實無汁案下文次賔羞羊七湆司馬羞羊肉湆此注并云司馬不云次賔其實羞羊七湆者是次賔也又案下文次賔羞豕七湆司士羞豕脀羞湆魚此并云司士者亦據上經正文司士擊豕而言實次賔羞七湆也欽定義疏羞爼者注不見次賔疏以經正之是也其二爼之設注謂南者羞羊北者羞豕魚似屬倒置然即謂北爼羞羊南爼羞豕魚猶未盡合也盖兩爼必相間用之羊七湆爼以羞于尸則羊肉湆爼亦當已載而俟則二者不可同用一爼明矣豕七湆與豕脀亦然故二爼祗可以七與肉分而不可以羊與豕異也蕙田案以上舉鼎設爼主人降受宰几尸侑降主人辭尸對注几所以坐安體周禮大宰掌贊玉几玉爵宰授几主人受二手横執几揖尸注獨揖尸几禮主于尸主人升尸侑升復位注位阼階賔階上位張氏爾岐曰即上文東楹東西楹西之位主人西面左手執几縮之以右袂推拂几三二手横執几進授尸于筵前注衣袖謂之袂推拂去塵示新敖氏繼公曰推者推手也尸進二手受于手間注受從手間謙也盛氏世佐曰手間主人二手之間主人退尸還几縮之右手執外簾北面奠于筵上左之南縮不坐注左之者異于鬼神生人陽長左鬼神隂長右不坐奠之者几輕疏尸横受之將欲縱設于席故還之使縮敖氏繼公曰几稍髙故設之不坐少儀曰取爼設爼不坐其意類此主人東楹東北面拜注拜送几也尸復位尸與侑皆北面答拜注侑拜者從于尸輔疏授几止為尸今侑亦拜以其立侑以尸故侑從尸拜也蕙田案以上授尸几主人降洗尸侑降尸辭洗主人對卒洗揖主人升尸侑升尸西楹西北面拜洗主人東楹東北面奠爵答拜降盥尸侑降主人辭尸對卒盥主人揖升尸侑升主人坐取爵酌獻尸尸北面拜受爵主人東楹東北面拜送爵注降盥者為土汚手不可酌蕙田案以上主人獻尸主婦自東房薦韭菹醢坐奠于筵前菹在西方婦贊者執昌菹醢以授主婦主婦不興受陪設于南昌在東方興取籩於房麷蕡坐設于豆西當外列麷在東方婦贊者執白黒以授主婦主婦不興受設于初籩之南白在西方興退注昌昌本也韭菹醓醢昌本麋臡麷熬麥也蕡熬枲實也白熬稻黒熬黍此皆朝事之豆籩大夫無朝事而用之儐尸亦豐大夫之禮主婦取籩興者以饌異親之當外列辟鉶也退退入房也疏正祭先薦後獻繹祭先獻後薦此儐尸禮與天子諸侯繹祭同故亦先獻後薦也蕙田案以上主婦薦豆籩乃升注升牲體于爼也歴疏自乃升盡于其上論司馬載爼因説十一爼之事司馬朼羊亦司馬載載右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一腸一胃一祭肺一載于一爼注言燅尸爼復序體者明所舉肩骼存焉亦著脊脅皆一骨也臑在下者折分之以為肉湆爼也一爼謂司士所設羊鼎西第一爼羊肉湆臑折正脊一正脅一腸一胃一嚌肺一載于南爼注肉湆肉在汁中者以増爼寔為尸加也必云臑折明為上所折分者嚌肺離肺也南爼雍人所設在南者此以下十一爼俟時而載于此歴説之爾今文湆為汁疏凡牲體皆出汁不言湆此特得湆名者正祭升牲體皆無七湆此七湆亦升焉故下注云嚌湆是也若然豕亦有七湆而名豕脀者互見為文言湆魚明魚在湆耳十一爼者即尸之羊肉湆一也豕脀爼二也侑之羊爼三也豕爼四也主人羊爼五也羊肉湆爼六也豕脀七也主婦羊爼八也尸侑主人三者皆有魚爼是其十一通尸羊正爼為十二爼其四爼尸侑主人主婦載羊體爼皆為正爼其餘八爼雍人所執二爼益送往還故有八其寔止二爼也司士朼豕亦司士載亦右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一膚五嚌肺一載于一爼注臑在下者順羊也侑爼羊左肩左肫正脊一脅一腸一胃一切肺一載于一爼侑爼豕左肩折正脊一脅一膚三切肺一載于一爼注侑爼用左體侑賤其羊爼過三體有肫尊之加也豕左肩折折分為長兄弟爼也切肺亦祭肺互言之爾無羊肉湆下尸也豕爼與尸同疏鼎爼數竒今體數四故云加欽定義疏上經司馬七羊載于一爼注云司馬所設羊鼎西第一爼尸爼第一則侑爼第二第一者在北則第二者在南無疑也此注乃云北爼殊不可曉疑北字乃次字之譌若然則注文本明而𫝊錄者輾轉迷誤遂致賈氏亦眩之耳侑之豕脀爼亦益送者則雍人所設于南者注謂豕爼與尸同是也祭肺貴于嚌肺豈其有祭肺而轉謂不備禮乎蕙田案膚三楊氏本作膚一盛世佐以為以下注考之當屬衍文未詳孰是阼爼羊肺一祭肺一載于一爼羊肉湆臂一脊一脅一腸一胃一嚌肺一載于一爼豕脀臂一脊一脅一膚三嚌肺一載于一爼注阼爼主人爼無體逺下尸也以肺代之肺尊也加羊肉湆而有體崇尸惠亦尊主人臂左臂也侑用肩主人用臂下之也不言左臂者大夫尊空其文也阼爼司士所設豕鼎西爼也其湆爼與尸爼同豕爼又與尸豕爼同主婦爼羊左臑脊一脅一腸一胃一膚一嚌羊肺一載于一爼注無豕體而有膚以主人無羊體不敢備也無祭肺有嚌肺亦下侑也祭肺尊言嚌羊肺者文承膚下嫌也膚在羊肺上則羊豕之體名同相亞也其爼司士所設在魚鼎西者張氏爾岐曰主婦有正爼無加爼司士朼魚亦司士載尸爼五魚横載之侑主人皆一魚亦横載之皆加膴祭于其上注横載之者異于牲體膴讀如殷冔之冔刳魚時割其腹以為大臠也可用祭也其爼又與尸豕爼同楊氏復曰横載則進尾也祭膴魚此所謂魚湆姜氏兆錫曰膴只是大臠注疏讀如殷冔之冔曲甚矣欽定義疏主人之與尸也爼並同後此設爼羞爼之人並同主人尊與尸為偶也侑輔尸者殺于尸則無羊七湆爼羊肉湆爼豕七湆爼矣主婦匹主人者殺于主人又殺于侑則并無豕脀爼豕燔爼湆魚爼矣且侑與主婦之爼祗令司馬設之而不以煩賔長也凡此皆尊卑降殺之差也主人與尸爼雖同而爼實大不同則亦所謂有所屈有所伸者蕙田案以上載爼之法卒升注卒已也已載尸羊爼籩疏此獻尸有五節從主人獻酒于尸并主婦設豆一也賔長設羊爼二也次賔羞羊七湆三也司馬羞肉湆四也次賔羞羊燔尸乃卒爵五也賔長設羊爼于豆南賔降尸升筵自西方坐左執爵右取韭菹㨎于三豆祭于豆間尸取麷蕡宰夫贊者取白黒以授尸尸受兼祭于豆間注賔長上賔雍人授次賔疏七與爼受于鼎西左手執爼左廉縮之卻右手執七枋縮于爼上以東面受于羊鼎之西司馬在羊鼎之東二手執挑七枋以挹湆注于疏七若是者三注挑謂之歃讀如或舂或抌之抌字或作挑者秦人語也此二七者皆有淺升状如飯摻挑長枋可以抒物于器中者注猶瀉也今文挑作抌挹皆為扱疏淺升對尋常勺升深此淺耳郝氏敬曰若是者三三挹三注尸興左執爵右取肺坐祭之祭酒興左執爵注肺羊祭肺疏上載尸羊正爼而云祭肺一是也其羊肉湆雖有嚌肺一此時未升次賔縮執七爼以升若是以授尸尸卻手受七枋坐祭嚌之興覆手以授賔賔亦覆手以受縮七于爼上以降注嚌湆者明湆肉加耳甞之以其汁尚味此疏七湆似大羹特牲大羮不祭不嚌以不為神非盛嚌者明湆肉加先進其汁而嘗之尚味故也以湆肉加在鼎有汁在爼無汁故以七進汁敖氏繼公曰若是者謂執七爼之儀無變也祭湆如祭酒然亦注于地他時湆不祭此祭者重其在爼也蕙田案尸卻手受七枋賔亦覆手以受兩受字石經監本俱誤作授今依敖本改正尸席末坐啐酒興坐奠爵拜告㫖執爵以興主人北面于東楹東答拜注㫖美也拜告酒美答主人意司馬羞羊肉湆縮執爼尸坐奠爵興取肺坐絶祭嚌之興反加于爼司馬縮奠爼于羊湆爼南乃載于羊爼卒載縮執俎以降注絶祭絶肺末以祭周禮曰絶祭湆使次賔肉使司馬大夫禮多崇敬也云疏周禮大祝職辨九祭七曰絶祭注絶末以祭引之証絶祭與此同也楊氏復曰案正爼皆横執横奠加爼皆縮執縮奠羊湆爼湆字衍觀承案卒載爼句爼字疑衍張氏本無之可從尸坐執爵以興次賔羞羊燔縮執爼縮一燔于爼上鹽在右尸左執爵受燔㨎于鹽坐振祭嚌之興加于羊爼賔縮執爼以降注燔炙盛氏世佐曰此羞燔之爼不在上所陳六爼内其先所陳處未聞士虞禮云羞燔爼在内西塾上南順尸降筵北面于西楹西坐卒爵執爵以興坐奠爵拜執爵以興主人北面于東楹東答拜主人受爵尸升筵立于筵末楊氏復曰案主人獻尸羞羊爼及主婦獻尸始羞豕脀及賔作三獻之爵始羞湆魚爼今並述于主人獻尸之時者以載爼事同一類故以類相從庶使易見也不惟此也主人獻侑羞羊爼主婦獻侑奠豕脀又尸酢主人羞羊爼主婦致爵于主人始羞豕脀又主婦羊爼亦尸酢主婦始用之今並述于主人獻尸之下者亦欲以類相從也鄭注云此以下十一爼俟時而載于此歴説之爾盖謂此也蕙田案以上主人獻尸主人酌獻侑侑西楹西北面拜受爵主人在其右北面答拜注不洗者俱獻間無事也主人就右者賤不専階疏自此盡主人答拜論主人獻侑并薦爼從獻之事此節内從獻有三事主人獻時主婦薦籩豆一也司馬羞羊爼二也次賔羞羊燔三也侑降于尸二等無羊匕湆又無肉湆凡爵行爵從尊者来向卑者獻間無事則不洗爵從卑者来向尊者雖獻間無事亦洗主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩䵄蕡以授主婦主婦不興受之奠䵄于醢南蕡在䵄東主婦入于房注醢在南方者立侑為尸使正饌統焉侑升筵自北方司馬横執羊爼以升設于豆東侑坐左執爵右取菹㨎于醢祭于豆間又取䵄蕡同祭于豆祭興左執爵右取肺坐祭之祭酒興左執爵次賔羞羊燔如尸禮侑降筵自北方北面于西楹西坐卒爵執爵以興坐奠爵拜主人答拜注答拜拜于侑之右蕙田案以上主人獻侑尸受侑爵降洗侑降立于西階西東面主人降自阼階辭洗尸坐奠爵于篚興對卒洗主人升尸升自西階主人拜洗尸北面于西楹西坐奠爵答拜降盥主人降尸辭主人對卒盥主人升尸升坐取爵酌注酌者將酢主人疏自此盡就筵論主人受尸酢并薦籩豆及爼之事就此事中亦有五節行事尊主人故與尸同也尸酢主人時主婦亦設籩豆一也賔長設羊俎二也次賓羞羊七湆三也司馬羞肉湆四也次賔羞羊燔主人乃卒爵五也特牲少牢主人獻尸尸即酢主人主人乃獻祝及佐食此尸待主人獻侑乃酢主人不同者此尸卑達主人之意欲得先進酒于侑迺自飲是以下文賔長獻尸致爵主人尸迺酢之遂賔意亦此類也敖氏繼公曰侑不升辟酢禮也與尸同升則嫌若同酢主人然司宫設席于東序西面主人東楹東北面拜受爵尸西楹西北面答拜主婦薦韭菹醢坐奠于筵前菹在北方婦贊者執二籩䵄蕡主婦不興受設䵄于菹西北蕡在䵄西主人升筵自北方主婦入于房注設籩于菹西北亦辟鉶疏凡執籩豆之法皆两雙執之此侑與主人皆二豆二籩故主婦與婦贊者各執其二于事便故主婦不興受設之長賔設羊爼于豆西主人坐左執爵祭豆籩如侑之祭興左執爵右取肺坐祭之祭酒興次賔羞七湆如尸禮席末坐啐酒執爵以興司馬羞羊肉湆縮執爼主人坐奠爵于左興受肺坐絶祭嚌之興反加于湆爼司馬縮奠湆爼于羊爼西乃載之卒載縮執虚爼以降注奠爵于左者神惠變于常也蕙田案郝仲輿謂反加于湆爼之湆衍盛世佐以為非衍今以獻尸節例之郝説恐是主人坐取爵以興次賔羞燔主人受如尸禮主人降筵自北方北面于阼階上坐卒爵執爵以興坐奠爵拜執爵以興尸西楹西答拜主人坐奠爵于東序南注不降奠爵于篚急崇酒以疏燔即羊燔以主人與尸侑皆用羊體主婦獻尸後悉用豕體賔長獻尸後悉用魚從盛氏世佐曰不奠于篚者盖為從獻衆賔用之侑升尸侑皆北面于西楹西注見主人不反位知將與已為禮蔡氏徳晉曰侑升者尸酢已終主人將拜崇酒侑乃升陪尸答拜也主人北面于東楹東再拜崇酒注崇充也拜謝尸侑以酒薄充滿尸侑皆答再拜主人及尸侑皆升就筵蕙田案以上尸酢主人司宫取爵于篚以授婦贊者于房東以授主婦注房東房户外之東上疏自此盡主婦答拜論主婦亞獻尸并見從獻之事文主人獻節凡有三爵有主人獻尸獻侑并受酢此主婦獻内凡有四爵主婦獻尸一也獻侑二也致爵于主人三也受尸酢四也獻尸一節之内從獻有五主婦設两鉶一也土婦又設糗與脩二也次賔羞豕七湆三也司士羞豕脀四也次賔羞豕燔尸乃卒爵五也主婦洗爵于房中出實爵尊南西面拜獻尸尸拜于筵上受注尊南西面拜由便也各疏筵上受者以婦人所獻不得就其階髙氏愈曰是時尸南面主婦乃西面拜獻且尸止拜受于筵上而不降楹西者以男與女不得正行賔主之禮故也主婦西面于主人之席北拜送爵入于房取一羊鉶坐奠于韭菹西主婦贊者執豕鉶以從主婦不興受設于羊鉶之西興入于房取糗與腶脩執以出坐設之糗在蕡西脩在白西興立于主人席北西面注飲酒而有鉶者祭之餘鉶無黍稷殺也糗糗餌也腶脩擣肉之脯盛氏世佐曰無黍稷儐尸主于飲也欽定義疏主婦不可拜獻尸于阼階上故為尊南之拜以獻之至拜送則就主人之席北東序之内亦主位婦人與男子為禮當依其夫也少牢主婦獻尸于主人之北西面拜送爵其所謂北在室中者也此云主婦西面于主人之席北拜送爵則在堂上者也尸坐左執爵祭糗脩同祭于豆祭以羊鉶之柶挹羊鉶遂以挹豕鉶祭于豆祭祭酒次賔羞豕七湆如羊七湆之禮尸坐啐酒左執爵嘗上鉶執爵以興坐奠爵拜主婦答拜執爵以興司士羞豕脀尸坐奠爵興受如羊肉湆之禮坐取爵興次賔羞豕燔尸左執爵受燔如羊燔之禮坐卒爵拜主婦答拜受爵蕙田案以上主婦獻尸酌獻侑侑拜受爵主婦主人之北西面答拜注酌獻者主婦疏其同于尸有三等主婦酌獻侑主婦羞糗脩一也司士羞豕脀二也次賔羞燔侑乃卒爵三也降于尸二等無鉶羹與豕匕湆也主婦羞糗脩坐奠糗于䵄南脩在蕡南侑坐左執爵取糗脩兼祭于豆祭司士縮執豕脀以升侑興取肺坐祭之司士縮奠豕脀于羊爼之東載于羊爼卒乃縮執爼以降侑興注豕脀無湆于侑禮殺敖氏繼公曰初獻無羊湆故此雖有豕脀亦不用湆次賔羞豕燔侑受如尸禮坐卒爵拜主婦答拜受爵注降于尸二等無鉶羹與豕七湆蕙田案以上主婦獻侑酌以致于主人主人筵上拜受爵主婦北面于阼階上答拜注主婦易位拜于阼階上辟併敬設疏此主婦致爵于主人時從獻亦有五節主婦二鉶一也又設糗脩二也豕七湆三也豕脀四也豕燔主人卒爵五也敖氏繼公曰筵上受因尸禮也與主人行禮故亦得獨拜于阼階上主婦設二鉶與糗脩如尸禮主人共祭糗脩祭鉶祭酒受豕七湆拜啐酒皆如尸禮嘗鉶不拜注主人如尸禮尊也其異者不告㫖嘗疏前獻尸啐酒不拜拜在鉶下或此拜字衍欽定義疏啐酒告㫖則拜此經主人初獻尸有之其獻侑及主婦獻尸侑俱啐酒而不拜為不告㫖也嘗鉶告旨則拜特牲始祭有之其少牢始祭尸嘗鉶不拜亦為不告㫖也惟主婦獻尸尸啐酒嘗鉶不告㫖亦拜此因主人獻尸尸啐酒拜告㫖而為之告㫖雖殺于主人以主婦與主人體敵故猶拜也主婦獻尸之嘗鉶與主人獻尸之啐酒其節同故一以為啐酒拜所為嘗鉶拜耳至致爵于主人承上獻侑之義嫌嘗鉶有拜故經言嘗鉶不拜以明之啐酒之不拜不待言矣疏謂啐酒之上無拜字者是也又遷就其辭以為嘗鉶之拜仍為啐酒者非也蕙田案啐酒之上不當有拜疏以為衍是也敖氏本無拜字共祭或作其盛氏世佐云猶言兼祭也坊本作其誤其受豕脀受豕燔亦如尸禮坐卒爵拜主婦北面答拜受爵盛氏世佐曰如尸禮者如其司士羞豕脀以下至受燔如羊燔之禮也蕙田案以上主婦致爵于主人尸降筵受主婦爵以降注將酢主婦酢疏此節内從酢有三主婦受時婦贊者設豆籩一也司馬設羊爼二也次賔羞羊燔主婦卒爵三也以其婦受從與侑同三主人受從與尸同五尊卑差也主人降侑降主婦入于房主人立于洗東北西面侑東面于西階西南注俟尸洗敖氏繼公曰凡婦人于丈夫之為已而降洗者無從降之禮于此篇及士昏禮見之矣尸易爵于篚盥洗爵注易爵者男女不相襲爵主人揖尸侑注將升主人升尸升自西階侑從主人北面立于東楹東侑西楹西北面立注俟尸酌尸酌主婦出于房西面拜受爵尸北面于侑東答拜主婦入于房司宮設席于房中南面主婦立于席西注設席者主婦尊今文曰南面立于席西疏賔長以下皆無設席之文敖氏繼公曰立于席西者亦西為下蕙田案主婦下應從今文有南面二字婦贊者薦韭菹醢坐奠于筵前菹在西方婦人贊者執䵄蕡以授婦贊者婦贊者不興受設䵄于菹西蕡在䵄南注婦人贊者宗婦之少者云疏大夫贊非一人贊主婦及長婦故宗婦少者蔡氏徳晉曰婦贊者及婦人贊者皆宗婦助祭者婦贊者盖長婦婦人贊者其少婦也主婦升筵司馬設羊爼于豆南主婦坐左執爵右取菹㨎于醢祭于豆間又取䵄蕡兼祭于豆祭主婦奠爵興取肺坐絶祭嚌之興加于爼坐捝手祭酒啐酒注捝手者于帨帨佩巾内則曰婦人亦左佩紛帨敖氏繼公曰凡祭離肺者必帨手經不盡見之也次賔羞羊燔主婦興受燔如主人之禮主婦執爵以出于房西面于主人席北立卒爵執爵拜尸西楹西北面答拜主婦入立于房尸主人及侑皆就筵注出房立卒爵宜鄉尊不坐者變于主人也執爵拜變于男子也疏凡男子拜卒爵皆奠爵乃拜敖氏繼公曰出房卒爵宜成禮于所酢者之前也郝氏敬曰執爵拜婦人立拜也欽定義疏特牲主人主婦交致爵皆酢賔又致爵于主人主婦皆自酢此直有主婦致爵于主人又不酢何也凡獻酢之節有主有從主獻者酢而從獻者不酢此主婦獻尸而因以致爵于主人則主人固在從獻之列無由而酢主婦矣特牲主人主婦交致交酢在三獻爵止之後自成對偶此在主婦獻尸爵内以主婦為之始終則主人又不得而致爵于主婦矣主人既不致爵于主婦則賔亦不得而致爵于主婦矣故主婦惟受尸酢而其餘則否蕙田案以上尸酢主婦上賓洗爵以升酌獻尸尸拜受爵賔西楹西北面拜送爵尸奠爵于薦左賔降注上賔賔長也謂之上賔以將獻異之或謂之長賔奠爵爵止也得疏尸不舉者以三獻訖正禮終欲使神惠均于庭徧獻乃舉之故下文主人獻及衆賔以下訖乃作止爵案特牲尸在室内始行三獻未行致爵尸奠爵欲得神惠均于室此儐尸之禮三獻訖夫婦又已行致爵訖儐尸又在堂故爵止者欲得神惠均于庭與正祭者異蕙田案以上上賔獻尸尸爵止主人降洗爵尸侑降主人奠爵于篚辭尸對卒洗揖尸升侑不升注侑不升尸禮益殺不從蕙田案尸侑皆降而對與升惟尸以主人獨酬尸不及侑故也註禮益殺對上主人獻尸之時侑從升而言主人實爵酬尸東楹東北面坐奠爵拜尸西楹西北面答拜坐祭遂飲卒爵拜尸答拜降洗尸降辭主人奠爵于篚對卒洗主人升尸升主人實爵尸拜受爵主人反位答拜尸北面坐奠爵于薦左注降洗者主人郝氏敬曰體尸止爵之意將飲賔而先自尸始然不曰獻曰酬者獻終于三酬繼之特牲尸無酬此酬者尸既為賔矣尸侑主人皆升筵敖氏繼公曰侑升堂之節其在尸奠爵之時乎蕙田案以上主人酬尸尸奠酬蕙田案前上賔獻尸而尸不舉此主人復為酬爵勸飲而尸終不舉皆欲惠均于下之意乃羞宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之注二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞内羞也内羞在右隂也庶羞在左陽也郝氏敬曰房中之羞婦工所修餅餌之類庶羞雍人所修胾醢之類蕙田案以上羞于尸侑主人主婦主人降南面拜衆賔于門東三拜衆賔門東北面皆答壹拜注拜于門東明少南就之也今文壹為一郝氏敬曰主人拜將獻也門東主位賔門東北面臣禮不敢居賔也主三拜旅拜也賔答一拜賔衆且不敢均禮也張氏爾岐曰自此至主人就筵皆主人酌獻外庭内庭之事所謂均神惠也凡七節獻長賔一也獻衆賔二也主人自酢于長賔三也酬長賔四也獻兄弟五也獻内賔六也獻私人七也主人洗爵長賔辭主人奠爵于篚興對卒洗升酌獻賔于西階上長賔升拜受爵主人在其右北面答拜宰夫自東房薦脯醢醢在西司士設爼于豆北羊骼一腸一胃一切肺一膚一注羊骼羊左骼上賔一體賤也薦與設爼者既則俟于西序端郝氏敬曰脯為籩醢為豆醢在西則脯在東一豆一籩羊骼以下五物為一爼前叙尸侑主人主婦爼不及賔于此詳之賔坐左執爵右取肺㨎于醢祭之執爵興取肺坐祭之祭酒遂飲卒爵執以興坐奠爵拜執爵以興主人答拜受爵賔坐取祭以降西面坐委于西階西南宰夫執爵以從設于祭東司士執爼以從設于薦東注成祭于上尊賔也取祭以降反下位也反下位而在西階西南已獻尊之祭脯肺敖氏繼公曰取祭以降以己所有事者也宜親執之宰夫司士大夫之私人也郝氏敬曰取祭以降不敢以賔禮終且避衆賔獻位也蕙田案右取肺之肺據注疏及楊氏敖氏本並作脯是也卒爵執以興敖氏以為執下脱爵字案此或是省文耳宰夫執爵以從爵楊氏敖氏本並作薦為是蕙田案以上主人獻長賔衆賔長升拜受爵主人答拜坐祭立飲卒爵不拜既爵注既盡也長賔升者以次第升受獻言衆賔長拜則其餘不拜蕙田案以下三節主人獻衆賔衆賔亦以長少為序長者先行禮然後徧及少者宰夫贊主人酌若是以辨注主人毎獻一人奠空爵于棜宰夫酌授于尊南今文若為如辨皆為徧敖氏繼公曰主人以虚爵授宰夫宰夫為酌之辨受爵其薦脯醢與脀設于其位其位繼上賔而南皆東面其脀體儀也注徧獻乃薦畧之亦宰夫薦司士脀儀者尊體盡儀度餘骨可用而用之尊者用尊體卑者用卑體而已亦有切肺膚今文儀皆為􅬞或為議敖氏繼公曰此薦脀亦于毎獻設之姜氏兆錫曰儀者言其微末足以備儀而已蕙田案經云其薦脯醢與脀設于其位明在徧受爵時非徧獻乃薦之謂也當以敖氏毎獻設之之義為是儀訓度訓宜皆未的當以姜氏備儀之説為是蕙田案以上主人辨獻衆賔乃升長賔主人酌酢于長賔西階上北面賔在左注言升長賔則有贊者為之主人酌自酢序賔意賔卑不敢酢疏特牲獻長賔訖即酢此主人益尊先自達其意蔡氏徳晉曰升長賔盖宗人升云欽定義疏特牲與此篇主人于賔皆自酢然則非以賔卑故也特牲承室事故獻賔長即自酢乃獻衆賔此皆堂事故辨獻乃酢與主人獻尸侑而後尸酢主人一也蕙田案此下二節主人為賔自酢敖氏以後長賔二字疑衍謂此乃主人自酢非酢于長賔而盛氏世佐則云嫌統為衆賔故復言長賔以别之非衍也盛説是主人坐奠爵拜執爵以興賔答拜坐祭遂飲卒爵執爵以興坐奠爵拜賔答拜賔降注降反位髙氏愈曰儐尸之禮主於娛尸故于獻賓之禮皆殺凡燕飲之禮專以賓為主則主人之尊賓也如尸至于祭祀之禮則上賔之在廟中若自同于百執事而已𫝊所謂享養上賔祭飬尸者此也蕙田案以上主人自酢宰夫洗觶以升主人受酌降酬長賔于西階南北面賔在左主人坐奠爵拜賔答拜坐祭遂飲卒爵拜賔答拜注宰夫授主人觶則受其虚爵奠于篚之疏上主人受賔之酢爵今宰夫既授觶訖因受取酢虚爵降奠于篚也郝氏敬曰觶在堂下酒在堂上賔位堂下故宰夫洗觶升堂授主人主人受酌酒以降酬長賔于其位主人先自飲導之主人洗賔辭主人坐奠爵于篚對卒洗升酌降復位賔拜受爵主人拜送爵賔西面坐奠爵于薦左注賔奠薦左後舉之以為無奠爵也蕙田案以上主人酬賔賔奠薦左主人洗升酌獻兄弟于阼階上兄弟之長升拜受爵主人在其右答拜坐祭立飲不拜既爵皆若是以辨注兄弟長幼立飲賤不别大夫之賔尊于兄弟宰夫不贊酌者兄弟以親昵來不以官待之疏特牲士卑長兄弟為貴故云如賔儀長賔坐飲也至于大夫貴兄弟賤兄弟長㓜皆立飲不得如賔儀兄弟是親昵雖賤于賔不得使人贊酌而親之郝氏敬曰兄弟至親同為主故獻于東階上而主人在東階東欽定義疏特牲獻賔獻兄弟各殊其長者賔在西兄弟在東其班異故兩殊之也此則賔在門東兄弟在洗東其班畧同故苐殊賔之長而已凡行禮之節始嚴而漸和始勞而漸安獻衆賔已贊酌矣則獻衆兄弟從同可知主人洗升酌特為長兄弟一人耳兄弟雖親昵宰夫私臣也贊酌何嫌焉辨受爵其位在洗東西面北上升受爵其薦脀設于其位注亦辨獻乃薦既云辨矣復言升受爵者為衆兄弟言也衆兄弟升不拜受爵先著其位于上乃後云薦脀設于其位明位初在是也位不繼主人而云洗東卑不統于尊此薦脀皆私人疏先著其位于上乃云升受爵者謂𤼵此位升堂受爵又云薦脀設于其位者謂受爵時設薦脀于洗東西面位也蔡氏徳晉曰毎人升受爵之時而薦脀設于其位盖當下而飲也欽定義疏上云皆若是以辨皆皆衆兄弟也若是謂酌獻拜受坐祭立飲不拜既爵也則衆兄弟受爵亦拜可知矣言受爵辨即當云薦脀設于其位矣乃著其位者特牲統于主人此不統于主人故須著之明位在洗東而受爵則由此位而升也其先生之脀折脅一膚一其衆儀也注先生長兄弟折豕左肩之折盛氏世佐曰折脅者折分脅骨以為爼實也舊説以折與脅為二非上賔之爼已止一體長兄弟安得有二體乎蕙田案以上主人獻兄弟于阼階主人洗獻内賔于房中南面拜受爵主人南面于其右答拜注内賔姑姊妹及宗婦獻于主婦之席東主人不西面尊不與為賔主禮也南面于其右主人之位恒左人上疏左人謂人在主人左若鄉飲酒鄉射之等于西階北面主人在東賔在西此南面則主在西賔在東故云恒左人也敖氏繼公曰獻之盖東北面坐祭立飲不拜既爵若是以辨亦有薦脀注亦設薦脀于其位特牲饋食禮記曰内賔立于房中西墉下東面南上宗婦北堂東面北上疏引特牲記者欲見内賔設薦之位處蕙田案以上主人獻内賔于房中主人降洗升獻私人于阼階上拜于下升受主人答其長拜乃降坐祭立飲不拜既爵若是以辨宰夫贊主人酌主人于其羣私人不答拜其位繼兄弟之南亦北上亦有薦脀注私人家臣已所自謁除也大夫言私人明不純臣也士言私臣明有君之道北上不敢専其位亦有薦脀初亦北面在衆賔之後爾言繼者以爵既獻為文凡獻位定疏大夫尊近于君故屈名私人士卑不嫌也未獻時在衆賔後特牲記云私臣位在門東北面是也云凡獻位定則是未獻以前非定位也敖氏繼公曰獻亦西南面而拜于其右郝氏敬曰特牲有公有司此惟私人卿大夫私人亦在公者欽定義疏國卿之尊于私人之長乃降洗以獻之而答其拜所謂治國家者不敢忽于臣妾也故平時能得人之懽心以事其親而臨難則死其長先王以祀禮教敬則民不茍當于此類求之又案私人與私臣一也但别于公家之臣耳委贄而為臣大夫之君亦君也胡云不純乎此注言士有君道可見他注謂士無臣者繆矣主人就筵注古文曰升就筵髙氏愈曰主人自酬尸之後先獻長賔次獻衆賔次酬長賔次獻兄弟次獻内賔次獻私人而其為禮也備矣故此就筵而息也蕙田案以上主人獻私人于阼階上尸作三獻之爵注上賔所獻爵不言三獻作之者儐尸而尸益卑可以自舉疏三獻是上賔不言上賔而言三獻是以事名官者也作其爵者以神惠均于庭訖欲使尸飲此酒此一節之内有四爵尸作三獻之爵一也獻侑二也致爵于主人三也受尸酢四也髙氏愈曰此時尸席前有两奠爵一為上賔所獻爵一為主人所酬爵向奠不舉故今舉之特作三獻爵者降于賔也欽定義疏上文尸奠三獻之爵者欲在庭遍得獻也自主人獻長賔衆賔及兄弟内賔至私人而獻遍矣故尸于此遂自舉三獻之爵是禮節遥相接者司士羞湆魚縮執爼以升尸取膴祭祭之祭酒卒爵注不羞魚七湆略小味也羊有正爼羞七湆肉湆豕無正爼魚無七湆隆殺之辨郝氏敬曰湆魚即前七尸爼五魚横載者也大臠曰膴即前所加膴祭于其上者也司士縮奠爼于羊爼南横載于羊爼卒乃縮執爼以降尸奠爵拜三獻北面答拜受爵敖氏繼公曰尸既卒爵乃執虚爵以待執爼者降而後奠爵拜行禮之序如此蕙田案以上尸舉三獻之爵敖氏以為即尸作止爵是也凡三獻皆指上賔下同又案以上尸作止爵酌獻侑侑拜受三獻北面答拜司馬羞湆魚一如尸禮卒爵拜三獻答拜受爵注司馬羞湆魚變于尸使疏上文尸使司士羞魚此侑司馬羞魚故云變于尸也郝氏敬曰前司士朼魚侑主人皆一魚即此蕙田案此上賔獻侑敖氏以為司馬當作司士上下皆司士為之此不宜使司馬司馬惟主羊爼羞魚湆非其事此説當是注疏變于尸之説恐未然經明言羞魚湆如尸禮並無相變之義酌致主人主人拜受爵三獻東楹東北面答拜司士羞一湆魚如尸禮卒爵拜三獻答拜受爵注賔拜于東楹東以主人拜受于席就之以疏賔于禮當在西階上今在東楹之東主人席在于阼階就之也敖氏繼公曰此與侑如尸禮皆兼祭酒而言不致爵于主婦變于不儐尸之禮欽定義疏賔三獻而尸爵止尸意欲均神惠也尸爵既止則賔不得遽行獻侑致主人之禮主人緣尸之意而逹之于是獻賔獻兄弟獻内賔獻私人既辨尸顧之樂可知也乃自作止爵與賔三獻遥接而後賔乃終獻侑及致主人之禮焉于三獻爵止之後尸作止爵之前間此許多事于其中實則猶是賔長獻尸之一節也蕙田案以上上賔獻侑致于主人尸降筵受三獻爵酌以酢之注既致主人尸乃酢之遂賔意疏賔意欲得與主人抗獻酢之禮今遂達之蕙田案此及下節尸酢上賔楊氏敖氏本三獻下並有爵字當從三獻西楹西北面拜受爵尸在其右以授之尸升筵南面答拜坐祭遂飲卒爵拜尸答拜執爵以降實于篚敖氏繼公曰尸在其右並授也並授而不同面拜逺辟主人獻賔之禮也欽定義疏尸升筵南面答拜因受爵之禮也受爵時亦于筵上南面拜尸酢主人主人拜于東楹東尸拜于西楹西尸酢主婦主婦拜于主人席北尸亦拜于西楹西此酢賔異者賔與尸為禮則皆不可以東賔受爵于西楹西則尸又不得拜于其右若拜于其右則嫌同于主人也故惟有筵上南面答拜而已蕙田案以上尸酢上賔二人洗觶升實爵西楹西北面東上坐奠爵拜執爵以興尸侑答拜坐祭遂飲卒爵執爵以興坐奠爵拜尸侑答拜皆降注三獻而禮小成使二人舉爵序殷勤于尸侑疏案郷飲酒反郷射特牲等皆一人舉觶為旅酬始二人舉觶為無算爵始今儐尸乃以二人為旅酬始者以其初時主人酬尸尸奠之侑未得酬故使二人舉觶侑乃得奠而不舉侑既奠一爵尸一爵遂酬于下是以須二人舉觶蔡氏徳晉曰二人一酬尸一酬侑也欽定義疏二人盖皆賔之弟子以舉觶于尸侑故不用兄弟之弟子而堂上位在西楹西也尸侑皆降因主人酬尸之禮但不辭洗耳于賤者舉觶亦不安于上位敬也洗升酌反位尸侑皆拜受爵舉觶者皆拜送侑奠觶于右注奠于右者不舉也神惠右不舉變于飲酒郝氏敬曰奠于右俟尸行酬而後舉以酬長賔欽定義疏神惠右不舉鄭即據此耳然上經主人酬尸尸則奠于薦左彼亦不舉何以一左一右乎又特牲主人酬賔賔取奠于薦右兄弟弟子舉觶于其長如主人酬賔儀此皆舉者也而奠于右然則神惠右不舉之云不可據也蕙田案以上二人舉觶于尸侑為旅酬之始尸遂執觶以興北面于阼階上酬主人主人在右注尸拜于阼階上酬禮殺西疏上文尸酢主人主人東楹東北面拜受爵尸西楹北面答拜是各于其階今尸酢主人同于阼階故云禮殺也坐奠爵拜主人答拜不祭立飲卒爵不拜既爵酌就于阼階上酬主人注言就者主人立待之主人拜受爵尸拜送注酬不奠者急酬侑也蕙田案以上尸酬主人而先自導飲遂酌以酬主人尸就筵主人以酬侑于西楹西侑在左坐奠爵拜執爵興侑答拜不祭立飲卒爵不拜既爵酌復位侑拜受主人拜送注言酌復位明授于西階上蔡氏徳晉曰以酬侑者以尸酬己之爵而酬侑也蕙田案此主人酬侑而先自導飲遂酌以酬侑主人復筵乃升長賔侑酬之如主人之禮注遂旅也言升長賔則有贊呼之郝氏敬曰長賔在西階下侑酬長賔舉所奠薦右之觶酬之蕙田案此侑酬長賔盛氏世佐謂酬長賔之觶即其受之于主人者郝氏奠薦右之觶非是存參至于衆賔遂及兄弟亦如之皆飲于上注上西階上蕙田案此賔及兄弟相酬姜氏云皆飲于上通承上文尸酬主人主人酬侑侑酬賔賔酬兄弟皆飲于上自此兄弟酬私人飲于下而主婦酬内賔遂及宗婦皆飲于房中矣案尸酬主人飲于阼階上主人酬侑以下飲于西階上雖是通承實有分别遂及私人拜受者升受下飲注私人之長拜于下升受兄弟之爵下飲之疏私人位在兄弟之南今言下飲之則私人之長一人在西階下飲之其餘私人皆飲于其位蔡氏徳晉曰謂先拜堂下然後升堂而受爵復下堂而飲也卒爵升酌以之其位相酬辨注其位兄弟南位亦拜受拜送升酌由西階蔡氏徳晉曰以之其位就所酬者之位也卒飲者實爵于篚注末受酬者雖無所旅猶飲人疏凡旅酬之法皆執觶酒以酬前前人領受其意乃始自飲此私人末受酬者後雖無人可旅猶自飲之訖乃實爵于篚以其酒是前人所酬不可不飲故也乃羞庶羞于賔兄弟内賔及私人注無房中之羞賤也此羞同時羞則酌房中亦旅其始主婦舉觶于内賔遂及宗婦賔疏此經論無算爵時羞庶羞于賔及兄弟之等事内羞在私人之上私人得旅酬則房中内賔亦旅可知敖氏繼公曰無房中之羞則于主婦以上也此節亦當祭薦脀文不具耳欽定義疏内外之事悉主人統之而在内之事必以主婦分主之故獻内賔宗婦之禮雖自主人而旅酬于房中則以主婦亦相配相助之義也又案特牲記云主婦及内賔宗婦亦旅則大夫儐尸房中亦旅明矣但主婦酌觶以酬内賔之長奠之及兄弟相酬時内賔乃舉奠觶以酬主婦以遂之于下耳不可云主婦舉觶于内賔以舉觶乃賤者職也蕙田案以上旅酬兄弟之後生者舉觶于其長注後生年少也古文觶皆為爵延景中詔校書定作觶酬疏尸不與無算爵故舉堂下觶為無算爵其為旅皆從上𤼵尸為首賔不舉旅酬酬皆從尸舉郝氏敬曰旅酬畢主人慇懃未巳兄弟之㓜者為主人達其意蕙田案此為無算爵之始注延景漢諸帝年號無此稱釋文作延熹係漢桓帝年號盛氏世佐以為二者皆悮據後漢書靈帝紀詔諸儒正五經文字刻石立于太學門外事在熹平中儒林傳蔡邕同當作熹平為是洗升酌降北面立于阼階南長在左坐奠爵拜執爵以興長答拜注長在左辟主人人疏凡獻酬之位主人常在左若北面則主在東今長兄弟北面云長在左則在西故辟主人也敖氏繼公曰此後生者舉觶與主人酬賔之儀畧同似有為主人酬長兄弟之意故位如主人而長在左欽定義疏上經主人獻内賔注云主人之位恒左人疏謂人在主人左也此長在左而舉觶者在其右正與主人之左人者無異何云辟之乎疏語尤不楚其云常在左盖常左人之訛坐祭遂飲卒爵執爵以興坐奠爵拜執爵以興長答拜洗升酌降長拜受于其位舉爵者東面答拜爵止注拜受答拜不北面者儐尸禮殺長賔言奠兄弟言止互相發明相待也疏上文主人酬賔賔奠爵于薦左與此爵止相待俱時舉行下文云交錯其酬爵無算是也依次第不交錯為旅酬郝氏敬曰爵止者奠于薦右待賔爵行而後交錯也蕙田案以上兄弟後生舉觶于其長賔長獻于尸如初無湆爵不止注賔長者賔之長次上賔非即上賔也如初者如其獻侑酌致主人受尸酢也無湆爵不止别不如初者不使兄弟不稱加爵大夫尊也不用觚大夫尊者也侑疏此論衆賔長為加爵數多與上賔異何者上賔獻致爵于主人時皆有湆魚從今無湆魚從上賔獻尸時亦奠爵待獻堂下畢乃舉觶今尸不止爵即飲特牲長兄弟為加爵又衆賔長為加爵不言獻此言獻者尊大夫若三獻之外更容有獻特牲長兄弟洗觚為加爵此用爵爵尊于觚故云大夫尊者也敖氏繼公曰此獻當用觚不言者文省耳上篇實觚于其篚其為此用與姜氏兆錫曰觚爵對文則異散文則通經洗觚亦稱加爵則為通稱可見非為大夫尊故用爵也不儐尸通放此欽定義疏長兄弟不為加爵者大夫之助祭者賔兄弟初皆在東方獻不殊其長故于尸亦為加爵也此獻亦加爵不稱加爵者大夫禮文故辭異也此用觚無疑勺爵觚觶實于篚于此不用觚惡乎用觚乎蕙田案此衆賔長獻尸侑致爵于主人尸酢之蕙田案以上次賔獻致賔一人舉爵于尸如初亦遂之于下注一人次賔長者如初如二人洗觶之為也遂之于下者遂及賔兄弟下至于私人故言亦遂之于下也上言無湆爵不止互相𤼵明疏此論次賔舉觶于尸更為旅酬如上旅酬之事但前二人舉觶于尸侑尸舉旅酬從上至下皆徧飲今亦從上至下故云亦遂之于下張氏爾岐曰之適也往也謂行此爵于堂下為旅酬也盛氏世佐曰無算爵之異于旅酬者三旅酬依尊卑之次自尸而主而侑而賔以至于兄弟私人秩然不紊無算爵則賔黨與主黨交錯其酬不俟賔黨酬畢而後及于主黨一也無算爵惟行于堂下在堂上者皆不與二也旅酬平行一觶無算爵二觶並行三也此皆禮之以漸而殺者又案特牲旅酬之時堂上亦不與而賔與兄弟即得交錯其酬與大夫禮異至其旅者再乃行無算爵則大夫士祭禮之所同也蕙田案以上賔一人舉爵于尸更為旅酬賔及兄弟交錯其酬皆遂及私人爵無算注算數也長賔取觶酬兄弟之黨長兄弟取觶酬賔之黨惟已所欲無有次第之數也疏長賔取觶者是主人酬賔觶長兄弟取觶者是後生者舉于其長之觶盛氏世佐曰爵自堂下始故可以逮私人而不可以凟堂上欽定義疏旅酬後兄弟之後生舉觶于其長者以下行無算爵時賔長有主人酬賔之奠觶可行長兄弟無奠觶可行故也尸既與于堂上之旅酬而賔長復加獻賔一人又舉爵于尸者以尸得與于堂上之旅酬不得與于堂下之無算爵故于未行無算爵以前為尸倍致其殷勤也旅酬時尸酬主人主人酬侑侑酬長賔遂酬衆賔兄弟至于私人酬無不辨然堂上堂下東西各自為酬不交不錯是為正酬乃直行至爵行無算乃有交酬有錯酬交酬者長賔與長兄弟次賔與次兄弟衆賔與衆兄弟東西往来所謂交也至錯酬則隨其量之能飲與情之夙好而相酬如注云惟已所欲更無次第之數者殆于不醉無歸矣故云交錯蕙田案以上堂下相酬無算爵尸出侑從主人送于廟門之外拜尸不顧注拜送之禮疏儐尸之尸侑賔也故孔子亦云賔不顧矣拜侑與長賔亦如之衆賔從注從者不拜送也司士歸尸侑之爼注尸侑尊送其家敖氏繼公曰賔長而下則自徹而授其人以歸主人退注反于寢也有司徹注徹堂上下之薦爼也外賔尸雖堂上婦人不徹蕙田案以上禮畢尸侑出欽定義疏儐尸之禮分三節主人獻尸主人獻侑尸酢主人一節也主婦獻尸主婦獻侑尸酢主婦二節也賔長三獻尸爵止尸作止爵賔長致爵于主人尸酢賔三節也三節為之經而正爼遞設又以益送之爼及燔爼絡繹轉運徃来升降為之緯以此觀之則諸爼之多少隆殺與設爼之人之長次皆秩然而有序矣若不儐尸注不儐尸其牲物則同不得備其禮耳郝氏敬曰凡饋食于室儐尸于堂少牢儐尸故室中之事比特牲為簡至儐尸而後禮備若有故不得儐尸則室事加詳矣欽定義疏正祭在室主于嚴敬儐尸在堂則有懽欣和樂之情焉踴躍鼓舞之象焉若不儐尸則尸未出室猶全乎神仍于室中行事而主人主婦與尸祝佐食賔及兄弟私人獻酬文錯禮儀卒度于和樂之中多嚴敬之意大抵與特牲後半相類惟無嗣舉奠以辟國君耳孝經所謂治家者不敢失于臣妾而况于妻子乎故得人之懽心以事其親于此乎可觀矣又案不儐尸之故非一已詳見本篇之首盖上下大夫皆有儐尸之禮亦皆有若不儐尸之禮不以爵等殊也舊説以此為攝主殺禮之祭固為失之康成辨之是已而必屬之于下大夫不亦泥乎同一大夫也舉盛祭則儐尸稍殺則不儐尸夫誰曰不可春祠夏禴秋嘗冬烝四時之祭殊名則典禮不必盡同可見矣則祝侑亦如之注謂尸七飯時主疏案上篇尸食七飯告飽祝西面于人之南獨侑不拜侑曰皇尸未實侑是也郝氏敬曰自迎尸入室以後至祝侑尸食以前禮與儐尸同故曰亦如之尸食以後其禮稍異尸食注八飯張氏爾岐曰祝既侑而尸又飯也迺盛爼臑臂肫脡脊横脊短脅代脅皆牢注盛者盛于肵爼也此七體羊豕其脊脅皆取一骨也與所舉正脊幹骼凡十矣肩未舉既舉而爼猶有六體焉疏特牲尸食訖乃盛今八飲即盛者大夫禮與士相變也先言臑見從下起不言肩肩未舉不言正脊長脅骼巳舉在爼有司徹不盛俎者更無所用全以歸尸故也三脊三脅皆取一骨盛于肵各有一骨體在爼以備陽厭故猶有六體郝氏敬曰盛爼謂佐食取衆爼之實盛于肵爼祭畢歸尸特牲尸几飯畢則盛爼少牢儐尸則爼重燅故不盛若不儐尸盛爼如特牲魚七注盛半也魚十有五而爼其一已舉必盛半者魚無足翼于牲象脊脅而已疏牲脊脅亦盛半欽定義疏魚盛七者為爼釋三个又有祝主人主婦之魚爼實必竒故盛其半而止也注以為如脊脅之二骨而各取一骨可也謂無足翼而然則迂矣腊則有足而亦盛半何以通乎腊辨無髀注亦盛半也所盛者右體也脊屬焉言無髀者云一純而爼嫌有之古文髀作脾疏腊脊不折左右三脅并脊為七通肩臂等十為十七體肩既舉俎唯有十六在言盛半明脊屬楊氏復曰辨者盖辨盛右體也盛半脊屬則存乎爼者左脛五體并三脅未舉耳郝氏敬曰腊爼左右體全而徧取其半如牢但無髀尸爼未無髀也卒盛乃舉牢肩尸受振祭嚌之佐食受加于肵注卒已郝氏敬曰體貴肩故後舉加于肵居衆體之上並前牢為八體而羊豕爼各餘三體以待陽厭此上皆盛于肵爼者也張氏爾岐曰右不儐尸時者八飯後事蕙田案卒盛謂盛畢註訓卒已是也楊氏本作舉七張爾岐作舉七皆非是今依續經傳通解本作卒已佐食取一爼于堂下以入奠于羊爼東注不言魚爼東主于尊疏少牢魚在羊東今摭魚腊宜在魚爼東敖氏繼公曰羊當作魚字之誤也郝氏敬曰佐食又取堂下一虚爼入室欽定義疏魚爼在羊爼之東又東則繼魚爼而不繼羊爼矣不必强為之辭乃摭于魚腊爼爼釋三个其餘皆取之實于一爼以出注个猶枚也魚摭四枚腊摭五枚其所釋者腊則短脅正脅代脅魚三枚而已疏魚摭去四枚釋三个腊爼猶有八體在摭去五枚釋三个楊氏復曰以上舉者先已舉在爼盛者方盛于爼未舉者卒盛乃舉摭者取為祝主人主婦之爼釋者備陽厭于西北隅郝氏敬曰摭分取也出出室也祝主人之魚腊取于是注祝主人主婦爼之魚腊取于此者大夫之禮文待神餘也三者各取一魚其腊主人臂主婦臑祝則骼也與此皆于鼎側更載焉不言主婦未聞疏案特牲主人主婦祝皆無腊上大夫儐尸腊為庶羞不載于爼此待神餘下經祝無文故云與以疑之云更載者上摭時共在一俎設時各異爼故知更載云鼎側則不復升鼎也不言主婦𫝊冩脱耳蔡氏徳晉曰祝爼之腊用髀與儐尸同不言主婦者統于主人欽定義疏特牲士禮祝主人主婦之爼皆無魚腊少牢正祭祝爼腊兩髀屬于尻此不儐尸者亦當然也主人主婦正祭時不設爼至儐尸减五鼎為三鼎則腊不用而以魚為益送之爼儐尸無祝而有侑侑主人主婦皆有魚爼為之益送焉此不儐尸則無益送之魚故于此即分尸爼之魚以入于主人主婦之爼所以見雖不儐尸而此禮實自儐尸而殺也既取魚因亦兼取腊主人主婦既有魚腊則祝爼雖已有腊亦當益之以魚以其與儐尸之侑差類也此則視儐尸之禮為殺而比特牲則隆矣祝腊骼臆説非經例尸不飯告飽主人拜侑不言尸又三飯注凡十一飯士九飯大夫十一飯其餘有十三飯十五飯飯疏士大夫既不分命數則五等諸侯同十三天子十五飯可知欽定義疏大夫十一飯既不分命數則儐尸不儐尸不分上下大夫可知佐食受牢舉如儐注舉肺脊敖氏繼公曰儐並指儐尸之禮郝氏敬曰受牢舉謂受尸所舉肺脊加于肵爼也張氏爾岐曰不儐尸者十一飯時事蕙田案以上不儐尸尸食之禮其異于儐者二事盛肵爼一也摭魚腊爼二也主人洗酌酳尸賔羞肝皆如儐禮卒爵主人拜祝受尸爵尸答拜祝酌授尸尸以醋主人亦如儐其綏祭其嘏亦如儐注肝牢肝也綏皆當作挼挼讀為藏其隋之隋疏此主人獻有五節主人獻尸一也酢主人二也獻祝三也獻上佐食四也獻下佐食五也敖氏繼公曰此所謂儐皆前篇室中之事初非儐禮乃以儐為文者以其已入儐之節内故耳蕙田案以上主人酳尸尸酢主人其獻祝與二佐食其位其薦脀皆如儐蕙田案以上主人獻祝佐食主婦其洗獻于尸亦如儐注自尸侑不飯告飽至此與儐同者在上篇疏此一節之内獻數與主人同唯不受嘏為異敖氏繼公曰此如儐謂拜送爵以上之禮主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦贊者執栗脯主婦不興受設之栗在糗東脯在棗東主婦興反位注棗饋食之籩糗羞籩之實雜用之下儐尸也栗脯加籩之實也反位反主人之北拜送爵位有疏此設籩實繼在少牢室内西南隅上儐尸主婦直脯脩二籩此有四籩者彼主人獻尸主婦設四籩麷蕡白黑故至主婦獻時直設二籩通六籩此主人初獻無籩從則主婦四籩猶少兩籩敖氏繼公曰籩位自左而右綪之變于敦位也尸左執爵取棗糗祝取栗脯以授尸尸兼祭于豆祭祭酒啐酒次賔羞牢燔用爼鹽在右尸兼取燔㨎于鹽振祭嚌之祝受加于肵卒爵主婦拜祝受尸爵尸答拜注自主婦反籩至祝受加于肵此異于儐亞疏上篇主婦但有獻而已無籩燔從之事此篇主婦獻尸乃有籩餌之事其物又異唯糗同耳故云此異于儐也蕙田案以上主婦獻尸其異于儐者二事有籩一也燔從二也祝易爵洗酌授尸尸以醋主婦主婦主人之北拜受爵尸答拜主婦反位又拜上佐食綏祭如儐卒爵拜尸答拜注主婦夾爵拜為不儐尸降崇敬為疏特牲主婦獻尸不夾爵拜上篇主婦夾爵拜此不儐尸降崇敬故夾爵拜敖氏繼公曰此夾爵拜内子正禮也儐則畧之蕙田案以上尸酢主婦其異于儐者主婦俠拜一事主婦獻祝其酌如儐拜坐受爵主婦主人之北答拜注自尸卒爵至此與儐同者亦在上篇敖氏繼公曰如儐其酌以前之禮張氏爾岐曰謂同上篇正祭亞獻之節宰夫薦棗糗坐設棗于菹西糗在棗南祝左執爵取棗糗祭于豆祭祭酒啐酒次賔羞燔如尸禮卒爵注内子不薦籩祝賤使官可也自宰夫薦至賔羞燔亦異于儐疏特牲主婦設籩少牢無籩燔從蕙田案以上主婦獻祝其異于儐者二事有籩有燔從主婦受爵酌獻二佐食亦如儐主婦受爵以入于房欽定義疏特牲夫婦交致而又自酢此惟主婦致而自酢者主人尊則主婦稍降也累而上之至于天子諸侯則夫婦之間愈尊嚴矣至若特牲主婦之爼與少牢不儐尸主婦之爼所下于主人者惟爼實不同而已儐尸主人益送之爼與尸同而主婦止羞羊燔者婦人之禮于堂事則尤殺也蕙田案此主婦獻佐食無籩燔故曰皆如儐又案以上主婦獻祝佐食賔長洗爵獻于尸尸拜受賔户西北面答拜爵止注尸止爵者以三獻禮成欲神惠之均於室中是以奠而侍之人疏此一莭之内凡有十爵獻尸一也主婦致爵于主二也主人酢主婦三也尸作止爵飲訖酢賔長四也賔獻祝五也又獻上佐食六也又獻下佐食七也賔致爵于主人八也又致爵于主婦九也賔受主人酢十也郝氏敬曰儐尸則賔長三獻尸卒爵酢賔長賔長又獻㑆而主人出尸遂起不儐尸則賔長獻尸受奠而不舉待主人主婦交錯致爵而後舉與特牲同與少牢儐尸禮異蕙田案此賔長三獻尸爵止此與特牲禮同惟受爵即止異自此以後與儐禮異與特牲禮畧同又案以上賔長獻尸爵止主婦洗於房中酌致于主人主人拜受主婦户西北面拜送爵司宫設席注拜受乃設席變于士也盛氏世佐曰此席于室户内西面與特牲禮同其設席節亦同特文有先後耳注説泥主婦薦韭菹醢坐設于席前菹在北方婦贊者執棗糗以從主婦不興受設棗於菹北糗在棗西佐食設爼臂脊脅肺皆牢膚三魚一腊臂注臂左臂也特牲五體此三者以牢與腊臂而七牢腊俱臂亦所謂腊如牲體脅疏右臂尸所用故知左臂也牢謂羊豕也羊豕臂脊俱有是六通腊臂而七是牲體惟有三也腊如牲體特牲記文盛氏世佐曰自臂脊以下諸物共一爼與少牢禮祝爼相似主人左執爵右取菹㨎於醢祭于豆間遂祭籩奠爵興取牢肺坐絶祭嚌之興加于爼坐捝手祭酒執爵以興坐卒爵拜注無從者變于士也亦所謂順而摭也疏特牲主婦致爵于主人肝燔並從敖氏繼公曰此籩祭不贊且無從與士禮異者避尊者之禮張氏爾岐曰主婦致爵于主人主婦答拜受爵酌以醋户内北面拜注自酢不更爵殺主人答拜卒爵拜主人答拜主婦以爵入於房敖氏繼公曰主婦亦坐祭立飲而卒爵此文畧也楊氏復曰自主人醋尸以後其節率與特牲禮同但主人不致爵于主婦為異張氏爾岐曰主婦自酢蕙田案以上主婦致爵于主人自酢此與特牲禮其異者三事祭籩不贊一也無肝燔從二也主人不致爵于主婦三也郝氏云自此以下之禮儐尸皆行于堂不儐尸皆行于室尸作止爵祭酒卒爵賔拜祝受爵尸答拜注作止爵乃祭酒亦變于士自爵止至作止爵亦異于賔張氏爾岐曰尸作止爵蔡氏徳晉曰尸向賔長所獻爵而未舉至是乃祭而飲之也祝酌授尸賔拜受爵尸拜送坐祭遂飲卒爵拜尸答拜敖氏繼公曰此賔受酢不夾爵拜而卒爵之儀又畧以其間有爵止之事既變于上故此儀亦不得同于主人是與儐少異者也蕙田案以上尸作止爵酢賔長此與儐禮異者一事賔受酢不夾爵拜也與特牲禮異者三事尸自作止爵一也作止爵乃祭酒二也無燔從三也獻祝及二佐食姜氏兆錫曰儐尸者不獻佐食佐食乃餕矣蕙田案此賔長獻祝佐食與儐禮異者二事祝不奠爵一也佐食亦得獻二也與特牲禮異者二事獻祝無燔從一也多一佐食二也又案以上賔長獻祝佐食洗致爵于主人注洗致爵者以承佐食賤新之主人席上拜受爵賔北面答拜坐祭遂飲卒爵拜賔答拜受爵蕙田案以上賔長致爵于主人此與特牲禮異者一事無燔從也盛氏世佐曰儐尸者室事終于賔長獻祝賔長既獻祝則三獻禮成尸出遂𧃊矣故自此以下皆無其禮于堂乃有之但不洗羞湆魚是其異者酌致爵于主婦主婦北堂司宫設席東面注東面者變于士妻儐尸不變者儐尸禮異矣内子東面則宗婦南面西上内賔自若東面南上疏特牲主婦南面宗婦東面北上郝氏敬曰堂之北即房户之外室户之東也儐尸于堂則主婦席在房中南面今尸在室則主婦席在北堂東面盛氏世佐曰郝説殊不然北堂東面非主婦之正位也席于此者辟受尊者之賜也上經云司宫設席于房中南面此主婦受尸酢之位也特牲云席于房中南面則受主人致爵之位也今惟受賓致爵宜辟之故席于北堂東面欽定義疏敖氏以宗婦不改特牲東面之位似未必然房中之深幾何既尊兩壺于西墉下内賔繼而南矣其北即北堂宗婦位于此恐不能容主婦之席矣况其北又逼設洗之所乎或席于宗婦之東為兩層則可耳注謂此宗婦南面理自可通意房中常位本與特牲無異届賔致爵時主婦乃與宗婦易處既則反之所以然者其亦辟尊者之禮與主婦席北東面拜受爵賔西面答拜注席北東面者北為下疏曲禮席東鄉西鄉以南方為上故北為下蕙田案敖氏泥北上之説而以為拜於此者由便其説非婦贊者薦韭菹醢菹在南方婦人贊者執棗糗授婦贊者婦贊者不興受設棗於菹南糗在棗東注婦人贊者宗婦之弟婦也盛氏世佐曰菹在南便其右取之佐食設爼于豆東羊臑豕折羊脊脅祭肺一膚一魚一腊臑注豕折豕折骨也不言所折畧之特牲主婦觳折豕無脊脅下主人羊豕四體與腊臑而五疏主人牢與腊臂而七此五是其畧也郝氏敬曰此肺嚌羊肺也曰祭者誤衍耳盛氏世佐曰羊臑以下亦共一爼欽定義疏上文云祝主人之魚腊取于是不言主婦疏以為𫝊冩者脱耳今此云腊臑是主婦之爼亦取于所摭者無疑矣又薦爼之設籩燔之加尸祝則于主人初獻主婦亞獻時佐食之爼設于主人初獻時亞獻無加焉賤故殺也主人則于主婦致爵時主婦則于賔致爵時皆層遞相接為之不于尸酢時者正祭嚴重不與儐尸同故皆于其専獻也主婦升筵坐左執爵右取菹㨎於醢祭之祭籩奠爵興取肺坐絶祭嚌之興加于爼坐捝手祭酒執爵興筵北東面立卒爵拜注立飲拜既爵者變于大夫賔答拜賔受爵蕙田案以上賔長致爵于主婦儐尸無此禮此與特牲禮異者三席于北堂東面一也無燔從二也有薦設三也大夫李氏紱改作丈夫易爵于篚洗酌醋於主人户西北面拜主人答拜卒爵拜主人答拜賔以爵降奠於篚注自賔獻及二佐食至此亦異于儐疏少牢賔長獻及祝而止敖氏繼公曰自是而後以至于末獻室中之事無復如儐者以内外之禮異故耳欽定義疏儐尸主人獻尸獻侑尸醋而侑不醋主人獻賔及衆賔主人醋于長賔而衆賔不醋葢醋者其主受獻者也不醋者其以次而連獻之者也賔致爵于主人主婦主人醋而主婦不醋又俟其併致于主婦而後主人醋之正同此例蕙田案此賔長自酢于主人儐尸亦無此禮特牲云更爵酢于主人卒復位葢與此同又案以上賔長致于主人主婦乃羞宰夫羞房中之羞司士羞庶羞于尸祝主人主婦内羞在右庶羞在左注不儐尸則祝猶侑耳姜氏兆錫曰内羞即房中之羞蕙田案此羞於尸祝主人主婦敖氏云自賔長洗爵至此為賔三獻又案以上羞於尸祝主人主婦主人降拜衆賔洗獻衆賔其薦脀其位其酬醋皆如儐禮敖氏繼公曰此禮長賔之爼其異于儐者無切肺耳盛氏世佐曰如儐禮者如其南面拜衆賔于門東至賔西面坐奠爵于薦左之禮也蕙田案以上主人獻賔自酢酬長賔主人洗獻兄弟與内賔與私人皆如儐禮其位其薦脀皆如儐禮盛氏世佐曰如儐禮亦謂自升酌獻兄弟于阼階上至亦有薦脀是也蕙田案以上主人獻兄弟内賔私人卒乃羞於賔兄弟内賔及私人辨注自乃羞至私人之薦脀此亦與儐同者在此篇不儐尸則祝猶侑耳卒已也乃羞者羞庶羞中疏此一經論主人獻堂下衆賔兄弟下及私人并房内賔之事敖氏繼公曰卒謂皆獻畢也獻畢即羞之亦其節之異於儐者蕙田案此羞于賔兄弟内賔及私人以上四節皆與儐禮同而其節則異蕙田案以上羞于堂下及房中賔長獻于尸尸醋獻祝致醋賔以爵降實于篚注致謂致爵于主人主婦不言如初者爵不止又不及佐食也疏上賔長已獻尸訖明此是次賔長為加爵蔡氏徳晉曰獻祝亦賔長獻也致謂致爵于主人主婦也酢酢于主人也蕙田案此衆賔長獻尸尸酢獻祝致爵主人主婦酢于主人盛氏世佐云此禮與特牲衆賔長為加爵同惟爵不止為異又案上經論儐尸于堂之禮云賔長獻于尸如初無醋爵不止與此禮相當其異者四事獻尸尸即酢之不待其獻致之異一也彼無祝此無侑二也致爵兼及主婦三也又酢于主人四也蕙田案以上次賔獻致賔兄弟交錯其酬無算爵注此亦與儐同者在此篇算疏此堂下兄弟及賔行無爵似下大夫闕旅酬直行無算爵而已李氏如圭曰此兄弟舉觶于其長亦當如儐禮在羞于私人之後賔長加獻之前文不具耳欽定義疏旅酬與無算爵分言之為二節合言之總一旅酬也此經文義甚明賔筵詩云舉酬逸逸言旅酬而自該無算爵也中庸云旅酬下為上朱子章句義畧同葢由獻而有酢由獻酢而有酬由酬而有旅由旅之爵有算以至于爵之無算若不行旅酬無由驟行無算爵也賈疏以為闕旅酬直行無算爵未必然蕙田案儐尸旅酬者再而後行無算爵尸侑在堂上與于旅酬而不與無算爵特牲與不儐尸尸祝主人皆在室中並旅酬亦不與又無侑故無二人舉觶及賔一人舉爵之事其旅也特賔與兄弟交相酬而已然亦有二番旅酬而後及無算爵特牲先旅西階一觶次旅阼階一觶是也此經云交錯其酬亦謂二番旅酬注疏無旅酬直行無算爵之説非是蕙田案以上旅酬無算爵利洗爵獻于尸尸醋獻祝祝受祭酒啐酒奠之注利獻不及主人殺也此亦異于儐異疏此佐食為加爵云殺者對上文賔長加爵及主人者少牢無利獻儐尸佐食又不與也盛氏世佐曰利謂上佐食也此與特牲禮異者祝不卒爵耳蕙田案以上上利獻尸祝主人出立於阼階上西面祝出立於西階上東面祝告於主人曰利成祝入主人降立于阼階東西面尸謖祝前尸從遂出于廟門祝反復位于室中祝命佐食徹尸爼佐食乃出尸爼于廟門外有司受歸之徹阼薦爼注自主人出至此與儐襍者也先𧃊徹主人薦爼者變于士特牲饋食曰徹阼爼豆籩設于東序下疏與儐雜謂有同有不同特牲既餕祝命佐食徹阼爼豆籩此餕前徹阼薦爼故云變于士盛氏世佐曰自主出至復位于室中與少牢同自祝命佐食至歸之與特牲同蕙田案此祝告利成獻爼歸爼徹阼爼與儐禮異者二事歸尸爼一也徹主人薦爼二也與特牲禮異者亦二事告利成于階上一也先餕徹主人薦爼二也蕙田案以上祝告利成尸出乃𧃊如儐注謂上篇自司宫設對席至上餕興出也蕙田案以上𧃊卒𧃊有司官徹饋饌於室中西北隅南面如饋之設右几厞用席注官徹饋者司馬司士舉俎宰夫取敦及豆此于尸謖改饌當室之白孝子不知神之所在庶其饗之于此所以為厭飫不令婦人改徹饌敦豆變于始也尚使官也佐食不舉羊豕爼親餕尊也厞隱也古文右作侑厞作茀明疏宰夫多主主婦之事敦豆本主婦設之今官徹宰夫為之故云變于始郝氏敬曰儐尸則禮備而神享足為無改設不儐尸于是有改設之禮納一尊于室中注陽厭殺無𤣥酒司宫埽祭注埽豆間之祭舊説云埋之西階東問疏神位在西故近西階曽子幣帛皮圭為主命埋之階間蕙田案以上陽厭主人出立于阼階上西面祝執其爼以出立於西階上東面司宫闔牖户注閉牖與户為鬼神或者欲幽闇祝告利成乃執爼以出于廟門外有司受歸之衆賔出主人拜送於廟門外乃反注拜送賔也者亦拜送其長婦人乃徹注徹祝之薦及房中薦爼徹室中之饌注有司饌之婦人徹之外内相兼禮殺敖氏繼公曰室中之饌即改設者也婦人徹此饌者謂其當以入于房與凡徹饌而以入于房者婦人乃得為之不然則否欽定義疏不儐尸之禮亦分三節主人獻尸尸酢主人主人獻祝獻佐食此一節也主婦獻尸尸酢主人主婦獻祝獻佐食二節也賔長獻尸爵止尸作止爵尸酢賔賔獻祝獻佐食致爵于主人致爵于主婦酢于主人三節也蕙田案以上爼出送賔徹饌右儀禮有司徹五禮通考卷一百十二
