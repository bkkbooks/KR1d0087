body:
  text: 五禮通考卷七十一刑部尚書秦蕙田撰吉禮七十一宗廟制度周禮春官大司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武鄭氏鍔曰國子者將使之奉祭祀以行禮故以樂而教之舞黃帝之樂名雲門大卷堯之樂名咸池大㲈舜樂大夏禹樂大濩湯樂大武武王樂以樂而教之舞形容六聖之德則舞應樂而可觀矣大祭祀率國子而舞注當用舞者帥以往大胥凡祭祀之用樂者以鼓徴學士注擊鼓以召之文王世子曰大昕鼓徴所以警衆士疏宗廟之祀用樂舞之處以鼓召學選之當舞者往舞焉樂師凡樂成則告備詔來瞽臯舞王氏昭禹曰瞽無目非可顧視故詔其來舞有節非可速故詔其緩臯緩也李氏光地曰此節先鄭以瞽為鼓謂呼擊鼓者與舞偕來也後鄭仍字謂詔視瞭扶瞽者來入也愚謂瞽工升歌樂之初事此言于告備之後則疑先鄭之説為長臯號告也使鼓來而告當舞者此鼓蓋所以節舞也案尚書簫韶九成舜樂之終記言升歌清廟下而管象然後舞作則知凡舞皆在合樂之時故於告備之後言之蕙田案李氏之説得之來鼓臯鼓與大胥之以鼓徴學士同但彼言教舞此主作樂時也陳氏禮書舞之始也發於所樂之極其用也常在諸樂之後是以周官樂師樂成告備然後詔來瞽臯舞春秋之時季札歷觀樂歌然後及於象武韶夏之舞在詩序則舞蹈後於嗟歎永歌在樂記則動容後於言志詠聲在孟子則舞蹈後於樂之實以舞者所樂之極故也夫舞有文有武有大有小司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武皆舞之大者也樂師教國子小舞有帗舞羽舞皇舞旄舞旄舞氂牛尾也傳曰葛天氏之樂三人操牛尾而歌八闋其流風與干舞人舞此舞之小者也大舞有其章而無其儀小舞有其儀而無其章大夏而上文舞也其執以羽大濩而下武舞也其執以干則大舞必用小舞之儀小舞不用大舞之章也大胥以六樂之會正舞位小胥巡舞列蓋位者酇也正之所以辨其序列者佾也巡之所以肅其慢春秋之時鄭伯享王遍及六舞王子頺享五大夫樂及遍舞則合舞之禮東西蓋有辨先後蓋有序矣考之於經舞干羽于兩階則文舞于東階武舞于西階武舞常在先文舞常在後何則書言舞干羽則先干而後羽樂記言及干戚羽旄謂之樂則先干戚而後羽旄郊特牲明堂位祭統皆言朱干玉戚冕而舞大武皮辨素積裼而舞大夏則先大武而後大夏詩簡兮碩人俁俁公庭萬舞乃言左手執籥右手秉翟則先萬舞而後籥翟漢之樂亦先武德之舞而後文始之舞唐之樂亦先七德之舞而後九功之舞然則古人之舞者皆先武而後文蓋曰武以威衆而平難文以附衆而守成平難常在先守成常在後觀此則古人舞序先後之意可見矣又曰朱干玉戚冕而舞大武皮辨素積裼而舞大夏蓋周之興也功莫大於武功樂莫重於武舞故舞大武以祭服之冕舞大夏則朝服之皮辨而已干所以自蔽戚所以待敵朱干白金以飾其背記曰朱干設錫是也玉戚剝玉以飾其柄楚工尹路曰剝圭以為鏚柲是也舞武而執干戚則舞夏執籥翟矣舞夏而裼則舞武襲蓋朱所以象事玉所以象德武以自蔽者為主而待敵者非德也故其宣布著見以為事者欲自蔽而已至於持以待敵者溫純之德爾此武舞之道也籥所以為聲翟所以為文聲由陽來故執籥於左文由陰作故秉翟於右此文武之道也蕙田案以上詔舞之事周禮夏官司兵祭祀授舞者兵注授以朱干玉戚之屬李氏嘉會曰不令樂官舞師等掌之而掌于司兵者兵器不可妄委之他人也司戈盾掌戈盾之物而頒之注分與受用祭疏分與受用者下文祀是也鄭氏鍔曰五兵之便于用者戈而已戈柲六尺有六寸其便用者柲短而易持其胡其援廣而易入可以摏可以刺可以擊可以鉤觀左傳所載富父終甥以戈摏僑如之喉狼瞫以戈斬秦囚子南以戈擊子晢長魚矯以戈殺駒伯則戈之便于用可知凡戰伐戡僇之字皆從戈謂此也盾干也用以自衛也如書曰敿乃干詩云龍盾之合蒙伐有苑伐中干也又云干戈戚揚五兵之用長以衛短則人持其一矣盾則夫人有之書云比爾干干欲其比則夫人有之可知矣司兵掌五盾又有司干盾之官者蓋司兵掌辨之司戈盾正掌其物而頒之祭祀授旅賁殳故士戈盾授舞者兵亦如之注亦頒之也故士王族故士也與旅賁當事則衛王也殳如杖長尋有四尺陳氏禮書周禮司兵掌五兵五盾以待軍事禮記曰朱干設錫詩曰龍盾之合又曰蒙伐有苑春秋傳曰狄虒彌建大車之輪以為櫓國語曰官師奉文犀之渠以為盾先儒以櫓為大盾以伐為中干則盾見於經傳者曰櫓曰干曰伐曰渠而已其他不可考也今曰旁牌盾之為物以革為之其背曰瓦左傳曰中其楯瓦其瓦設錫白金朱盾而繪以龍龍之外又繪以雜羽蒙雜羽也其繫之也以繡韋其屬繡韋也以紛書敿乃干則敿者繫以紛也國語曰輕罪贖以鞼盾則鞼者繡韋也鞼丘位反古之舞者或以干配戚禮言朱干玉戚舞大武是也或以干配戈司戈盾祭祀授舞者兵文王世子春夏學干戈是也漢迎秋樂亦用之隋初武舞三十二人執戈三十二人執戚皆配以盾而半執龍盾半執龜盾龜盾蓋惑於鄭氏錫傅其背如龜之説然也是不知所謂如龜者其背耳非其飾也又曰詩曰取彼斧斨又曰既破我斧又缺我斨又曰干戈戚揚書曰左杖黃鉞又曰一人執劉廣雅曰鉞戚斧也六韜曰大柯斧重八斤一名天鉞毛氏謂斧隋銎斨方銎戚斧也揚鉞也孔安國謂劉斧屬孔頴達曰劉鑱斧也蓋鉞也揚也戚也斨也劉也皆斧也斧莫重於鉞而揚戚戕劉皆其次者也書言黃鉞以金飾其柄也禮言玉戚以玉飾其柄也楚工尹曰君王命剝圭以為戚柲則黃與玉為柄之飾可知也考工記車人柯長三尺博三寸厚一寸有半五分其長以其一為之首則六寸矣蓋斧之為物黑所以體道白所以象義而有剛斷之材焉故軍禮與其葬皆用之觀先王繡於冕服之裳中衣之領畫於所負之扆所履之席所冪之巾則君之所以剛斷者未嘗或忽也司兵祭祀授舞者兵鄭氏曰授以朱干玉戚之屬詩周頌維清序維清奏象舞也箋象舞象用兵時刺伐之舞武王制焉文王造此征伐之法至今用之而有成功謂伐紂克勝也征伐之法乃周家得天下之吉祥疏維清詩者奏象舞之樂歌也謂文王時有擊刺之法武王作樂象而為舞號其樂曰象舞至周公成王之時用而奏之於廟詩人以今太平由彼五伐睹其奏而思其本故述之而為此歌焉象舞之樂象文王之事其大武之樂象武王之事二者俱是為象但序者於此云奏象舞於武之篇不可復言奏象故指其樂名言奏大武耳其實大武之樂亦為象也文王之樂象簫與南籥各是一舞南籥既是文舞象簫當是武舞也詩云奏象舞則此象簫之舞故鄭注云象用兵時刺伐之舞是武舞可知劉氏敞曰文王之舞謂之象武王之舞謂之武將舞象則先歌維清是以其序曰奏象舞其辭曰文王也將舞武則先歌武是以武之序曰奏大武其辭曰於皇武王也曹氏粹中曰季札觀樂見舞象簫南籥者杜預云文王樂也又見舞韶簫者杜預云舜樂也是象有簫韶亦有簫説者謂以竿擊人曰簫然則執簫以舞猶干舞也執籥而舞即籥舞也文王雖大業未究而本其功德之所起可得而形容也故作樂以象之謂之象舞祭統明堂位文王世子所謂下管象者象即象舞也維清緝熙文王之典肇禋迄用有成維周之楨何氏楷曰象簫而歌維清賈氏謂詩為樂章與舞人為節殆近之若舞籥則歌二南鼓鐘之詩所謂以籥以南是也武舞左執朱干右秉玉戚文舞則左執籥右秉翟故知象簫之舞原係武舞康成之解非無據而云然也陳氏樂書吉事有祥象事知器維周之楨則福之先見事之有祥者也象舞則王事兆見事之知器者也以吉事之祥寓於象事之器則文王之舞所以象成者孰非有天下之象耶樂記曰樂者非謂弦歌干揚也樂之末節也故童子舞之內則曰成童舞象蓋文王之時雖王事兆見而大統猶未集也以未既集之統舞之以未成人之童此所以謂之象舞歟文王世子明堂位祭統仲尼燕居皆言下而管象春秋傳亦曰象簫南籥蓋文王之樂歌維清於堂上奏鐘鼓舞象於堂下其所形容者熙邦國之典而已未及於法則肇上帝之禋而已未及於羣祀也熙邦國之典則人受之矣肇上帝之禋則天受之矣然則維周之楨豈過是哉先儒以象為武王樂誤矣蕙田案此以象舞為文王之舞先儒之説當有所受與朱子祭文王之傳異宗元案周頌清廟之三皆祭文王詩乃一時之事而有先後耳舊説以維清為象舞者亦屬牽附案之經文語氣蓋全不類但此詩既當祭畢而送神之時則合樂而即舞入亦應在此時也若以此為象舞之樂章則未可據耳或謂樂舞有行列綴兆每以一節為一成如有瞽之永觀厥成亦指舞言則迄用有成句正可為象舞之徴矣今姑並存以俟考武序武奏大武也箋大武周公作樂所為舞也者疏直言其奏不言其所奏之廟作雖因奏作歌其意不在於廟故不言廟李氏樗曰案禮記總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐以象周召之治言大武之舞始則持盾正立以待諸侯既而戰鬬既而又使行列皆坐以見其為止戈之舞也大武之舞在於止戈大武之詩在於止殺其類一也於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功朱子集傳周公象武王之功為大武之樂春秋傳以此為大武之首章也大武周公象武王武功之舞歌此詩以奏之禮曰朱干玉戚冕而舞大武然傳以此詩為武王所作則篇內已有武王之諡而其説誤矣陳氏樂書春秋傳曰於文止戈為武戈則器也所以示事止則象也所以示志序曰桓講武類禡也桓武志也言武志則講武其事也大武之所以為武不過如此周官大司樂奏無射歌夾鍾舞大武以享先祖由是觀之武奏大武則歌武詩而舞之可知矣樂師凡樂出入令奏鐘鼓鐘師凡樂事以鼓鐘奏九夏至於執競祀武王首之以鐘鼓喤喤則武奏大武豈不以鐘鼓耶禮記樂記賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也李氏光地曰孔子問大武之樂擊鼓備戒已久而後興舞何也賈對武王憂人心之未得故欲集衆而後動也詠歎之淫液之何也對曰恐不逮事也李氏光地曰詠歎淫液謂歌者咨嗟流連之聲也對言武王順天應人恐不及於事故其形於聲者如此又曰此非舞者之自歌也蓋堂下自舞而上歌以應之歌言其志舞動其容故合之而當日之事可見發揚蹈厲之已早何也對曰及時事也李氏光地曰謂初舞時手足即發揚蹈地而猛厲也對言及時成功故其見於容者如此武坐致右憲左何也對曰非武坐也李氏光地曰憲舊讀為軒言舞者之跪右足至地而左足軒仰也愚謂以下文分左右觀之疑是招右列之人如左法而皆坐耳賈以武王初得天下未敢寧居故疑其非武坐也聲淫及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣子曰唯丘之聞諸萇𢎞亦若吾子之言是也李氏光地曰聲淫及商謂歌奏之聲雜以商調也案國語引武王牧野之事音皆尚宫周官大祭祀之樂無商故大武之樂於時有濫入商聲者而賈以非武音對云若果是武音則是殺伐之心動而武王之志荒矣賈之對惟此為得故夫子亟是之賓牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語汝夫樂者象成者也總干而山立武王之事也發揚蹈厲大公之志也武亂皆坐周召之治也注成謂已成之事也總干持盾也山立猶正立也象武王持盾正立待諸侯也發揚蹈厲所以象威武時也武舞象戰鬬也亂謂失行列也失行列則皆坐象周公召公以文止武也似疏言作樂所以倣象其成功武人總持干盾以正立山而不動搖也舞人發揚蹈厲象太公威武鷹揚之志張子曰總干而山立是舞中有一人而象武王之治者然以就舞位而樂尸養老必天子有時而親為也發揚蹈厲之已蚤此則是太公之志及時事而動也武亂皆坐周召之治此象武功成周召以文治也坐者無事於武也李氏光地曰上遲字待也當舞之初備戒已久賈言之而夫子不以為非故曰既聞命矣又問其終舞者若有所待而立於綴遲而且久是何意也然賈前數對者能知其意而未能指其實又疑左右並坐之非故夫子復從初告之曰當其備戒之時舞人持干山立不動者敬天之命乃武王之事也及其發揚蹈厲之蚤救民伐暴乃太公之志也至於武樂將終左右皆坐偃武修文乃周召之治也若詠歎淫液與聲淫及商則聲歌之事非關舞節且賈對亦已得之故不復告也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也注成猶奏也每奏武曲一終為一成始奏象觀兵孟津時也再成象克殷時也三奏象克殷有餘力而反也四奏象南方荆蠻之國侵畔者服也五奏象周公召公分職而治也六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武樂也夾振之者王與大將夾舞者振鐸以為節也駟當為四聲之誤也武舞戰象也每奏四伐一擊一刺為一伐牧誓曰今日之事不過四伐五伐分夾而進者分猶部曲也事猶為也濟成也舞者各有部曲之列又夾振之者象用兵務於蚤成也久立於綴象武王伐紂待諸侯也而疏此説武樂六成之意成謂曲之終成每一曲終成更奏故云成猶奏也武始而北出者謂初舞位最在於南頭從第一位而北出次及第二位稍北出者象武王北出觀兵也復綴以崇者謂最在南第一位初舞之時從此位入此至六成還反復此位六奏其曲武樂充備是功成太平周德充滿於天下也經云天子夾振明是尊者故鄭知王與大將也武樂在庭天子尊極所以得親夾舞人為振鐸者作武樂時每一奏中而四度擊刺象武王之伐紂四伐也盛威於中國者象武王之德盛大威武於中國也振鐸夾舞者而前進象為事之蚤成也未舞前舞者久立於鄼綴象武王待諸侯之至也熊氏曰前云三步以見方此是一成也作樂一成而舞象武王北出而觀兵也作樂再成舞者從第二位至第三位象武王滅商則與前文再始以著往為一也三成謂舞者從第三位至第四位極北而南反象武王克紂而南還也四成謂武曲四成舞者從北頭第一位卻至第二位象武王伐紂之得南方之國於是疆理也五成謂從第二位至第三位分為左右象周公居左召公居右也六成復綴以崇者綴謂南頭初位舞者從第三位南至本位謂六奏充其武樂象武王之德充滿天下此執鐸為祭天時也案祭統云君執干戚就舞位冕而總干率其羣臣以樂皇尸又下云食三老五更於大學冕而總干尚得親舞何以不得親執鐸乎皇氏曰武王伐紂之時王與大將親自執鐸以夾軍衆今作舞樂之時令二人振鐸夾舞者象武王與大將伐紂之時矣王氏曰天子上屬謂作樂六成尊崇天子之德矣此家語文也張子曰綴兆綴以表行列兆者場域之限也舞以八佾佾以八人為列則六十四人也六成者六奏曲終也大凡舞者必於其中以見其象周始有雍州之地及滅商所得者又有冀青猶有六州之地既得天下必須鎮撫其諸侯故三成而南鎮撫南方諸侯也四成則見南方之國皆疆理而治也五成而分舞列皆分兩行以象周召分而治也六成復綴以崇此時必改易衣冠服飾使之充盛象治定致文也天子夾振而駟伐以舞列分為左右則總干者在中央振鐸而舞列夾而進也駟伐者必是舞列四出象兵四出也南國是疆之後亦有不服者如淮夷是也其時須當用兵故言盛威於中國大中國之威也分夾而進夾總干者也久立於綴亦是總干者立於綴也以待諸侯之至舞中亦必有此象是舞人四出後改易衣服以待其至也如言將帥之士使為諸侯必有變服為諸侯而出陳氏禮書先儒謂立四表於郊邱廟庭舞人自南表向二表為一成自二表至三表為二成自三表至北表為三成乃轉而南向自一表至二為四成自二表至三為五成自三表至南表為六成則天神皆降若八變則又自南而北為七成自二表至三為八成則地祗皆出若九變又自三表至北表為九成人鬼可得而禮焉蓋周都商之西南商都周之東北故武始而北出則至二表矣此三步以見方者也再成而滅商則至三表矣此再始以著往者也三成而南則至四表矣家語曰三成而南反四成而南國是疆則又自北而南至二表矣五成而分周公左召公右則至三表矣此復亂以飭歸者也六成復綴以崇天子家語曰以崇其天子則復初表矣此樂終而德尊也蓋武始而北出則出表之東北以商居東北故也故三成而南則入表之西南以周居西南故也疆南國然後可得而分治分治然後可得而復綴分治繫於臣故散而為二復綴統於君故合而為一樂記言復綴以崇天子繼以夾振之而駟伐者又本其始也何則武舞四表所以象司馬之四表也夾振之而四伐所以象司馬振鐸司徒皆作也夾振之而駟伐詩所謂駟騵彭彭是也復亂以飭歸國語所謂布憲施舍謂之贏亂以優柔容民是也司馬之四表三表百步一表五十步始則行而不驟趨中則趨而不馳走及四表則馳走之時也故五十步而已舞之四表蓋不必然樂書孔子語魯太師之樂以翕如為作以繹如為成是樂以始作以變成武王之樂六成則六變而已始而北出為治兵所以尚威武也終夾振之而駟伐盛威於中國則入為振旅所以反尊卑也蓋大武之舞以鼓進以金止以鼓進則分左右夾而進之所以欲事功之蚤濟也以金止則久立於綴兆之位而遲之所以待諸侯之至也其所以如此者匪棘其欲也致天討除人害以對於天下而已李氏光地曰欲答賈遲久之問故又總武樂六成而通説其意其始也舞者自南而北以象武之北出則備戒而總干山立時也再成而象武之滅商則發揚蹈厲時也三成舞者象武返南四成則象其威服南國而疆理之之事五成舞者分為左右以象周召則武亂皆坐時也六成復歸綴位以象天子尊居則所謂遲之又久者即此時矣南回之後二人振鐸以夾舞者而以干戈四外擊刺乃武既克殷而威服中國也既伐則分夾而進不復遲留乃武功早成不黷其威也至復於綴位久立不動則武王垂拱以治天下而待諸侯之自歸也此句已答賈遲久問意下文復推言之且女獨未聞牧野之語乎武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士説劒也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕藉然後諸侯知所以敬五者天下之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也若此則周道四達禮樂交通則夫武之遲久不亦宜乎李氏光地曰此復推久立於綴之意以答賈之問也言武王偃武功之速而修文德之深漸仁摩義以致太平則非遲而又久不足以形像之也合此章而觀之則其始也備戒之久以見聖人無尚武之心其終也立綴之久以見聖人惟德化之務其間所謂發揚蹈厲盛威中國者亦皆不俄頃而功成此所以商聲之淫必知其非武聲而左右皆坐正所以為武坐也又曰此章専言樂舞之理又曰六代之舞不可詳惟武舞見于賓牟賈之問者猶可追想古人遺意所謂周有六成之舞往返進退坐立步伐當日之武功文德可以觀容而知此樂舞之本意也又如大明之詩所謂上帝臨汝無二爾心者則與總干山立而相應維師尚父時維鷹揚者則與發揚蹈厲而相宣是故聽其歌觀其舞不啻睹其事遊其世焉故虞氏之亡久矣至孔子在齊聞韶三月忘味者此物此志也降及後代古法寖微然髙帝大風之詩起舞而歌之太宗破陳之樂有舞以傳之則象成之意猶有存者近世舞乃有譜則案五聲之音製為五行之象其俯仰周旋左右進退不象其事之實而逐其音之變恐非所謂盛德之形容者矣後有作者采此意而折中之用以發祖宗之功德閔臣下之勤勞道述孝友貞順之休聲移易里巷黎庶之風俗所謂君子于是語于是道古者必有取于茲焉祭統及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟內樂之冕而總干率其羣臣以樂皇尸此與竟內樂之之義也注君為東上近主位也皇君也言君尸者尊之疏此明祭時天子諸侯親在舞位以樂皇尸也陳氏樂書天子諸侯之於尸非特備禮物以薦之抑又就舞位以樂之蓋廟中在天子則天下之象也在諸侯則竟內之象也故天子冕而總干以樂皇尸非徒樂之所以與天下樂之也諸侯冕而總干亦與竟內樂之古者人君之於廟饗藉則親耕牲則親殺酒則親獻尸則親迎然則樂則親舞不為過矣方氏慤曰舞位則綴兆也君於東上則以君為祭主故也干戚武舞所執也羽籥文舞所執也止言干主武宿夜言之明堂位曰朱干玉戚冕而舞大武正謂此矣應氏鏞曰比干仗鉞乃武王臨陳之容朱干玉戚為大舞象成之樂祭而用之於宗廟既以顯先王之功舞而象其形容又欲使子孫知締創之艱難而毋忘於持守故舞佾非不廣綴兆非不備而君必親執干戚就舞位所謂總干山立武王之事也因其事而原其初豈敢憚其勞而付之有司乎先曰親執干戈而後擉云總干者以干長於戚而成列可觀也以君之尊躬執其事非樂皇尸也所以悅祖考也然食三老五更於大學亦必冕而總干者祭先聖先師而用之猶祭之因以樂皇尸也魯之有是舞以周公佐武王伐紂周旋軍旅之間因以歆其神靈也皇大也皇尸猶皇考也蕙田案以上武舞周禮春官籥師祭祀則鼓羽籥之舞注鼓之者恆為之節疏祭祀先作樂下神及合樂之時則使國子舞鼓動以羽籥之舞與樂節相應使不相奪倫故鄭云鼓之者恆為之節鄭氏鍔曰于祭祀之時鼓而作其羽籥之舞故曰鼓陳氏樂書古之舞者未嘗不節之以鼓詩曰籥舞笙鼓又曰鼓咽咽醉言舞鼓其羽籥之舞則執其羽籥習其俯仰屈伸容貌得莊焉行其綴兆要其節奏進退得齊焉夫然以事鬼神而祭祀然籥師鼓羽籥之舞則文舞而已干戚之武舞不與焉者以掌籥為主故也仲尼燕居曰夏籥序興則夏籥者用夏翟以為籥舞也周之時皆以籥羽舞文樂而文王世子使籥師學戈豈夏商之制歟司干掌舞器注舞器羽籥之屬武疏鄭知司干所掌舞器是羽籥以其文之舞所執有異則二者之器皆司干掌之言司干者周尚武故以干為職首其籥師教而不掌若然干與戈相配而不言戈者下文云祭祀授舞器則所授者授干與羽籥也案司戈盾亦云祭祀授旅賁殳故士戈盾授舞者兵云舞者兵唯謂戈其干亦于此官授之司兵云祭祀授舞者兵鄭注云授以朱干玉戚謂授大武之舞與此授小舞干戈别也鄭氏鍔曰所掌之武器即謂干楯耳干之為器有用兵之時所用者有當舞時所用者當舞時所用之干則與用兵所用者異先儒以為羽籥之屬非矣安有籥師鼓舞羽吹籥而所執之物乃掌於武舞之司干乎蕙田案司干掌文舞之器故𨽻春官司兵掌武舞之器故𨽻夏官鄭注以為羽籥之屬非無所見鄭氏以為非誤矣祭祀舞者既陳則授舞器既舞則受之注既已也受取藏之鄭氏鍔曰祭祀之時俟舞人綴兆行列已定則授之以干至于舞畢則受而藏之詩大雅賓之初筵籥舞笙鼓樂既和奏蒸衎烈祖以洽百禮傳秉籥而舞與笙鼓相應其箋籥管也殷人先求諸陽故祭祀先奏樂滌蕩聲也蒸進衎樂烈美洽合也奏樂和必進樂其先祖於是又合見天下諸侯所獻之禮疏簡兮云左手執籥右手秉翟是執籥以舞也舞在笙鼓之上明其與之相應樂器多矣燕之所用不止於此作者舉鼓舞而言耳此皆燕時樂也或以此為節射之樂案射禮主於射略於樂大射云司射命師曰請奏貍首間若一言調其疏數以節射也然則射之樂者擊鼓作歌與射者為節而已不必大作諸樂此云鼓舞相應非射樂矣且傳意以此樂和奏可以進樂先祖安得捨燕初之盛作而指節射之略者乎以此知不然矣朱子集傳籥舞文舞也何氏楷曰笙歌鐘篇大射儀所謂笙鐘笙磬皆應笙之鐘磬而周禮笙師凡祭祀饗射共其鐘笙之樂亦謂與鐘聲相應之笙也又笙有與琴瑟相應者鹿鳴所謂鼓瑟吹笙是也有與磬相應者鼓鐘所謂笙磬同音是也有與歌相應者儀禮所謂歌魚麗笙由庚是也有與鼓相應者此言笙鼓是也以其為用無所不備故特舉之鼓不獨樂以鼓為節射亦以鼓為節所謂不鼓不釋者也蕙田案賓筵籥舞笙鼓章毛傳主射言鄭箋主祭言朱子從鄭箋何元子從毛傳案如從傳則祖妣子孫之語皆無著落合依朱子從箋説為是大射儀笙鐘笙磬皆應笙之鐘磬何解最的鄭氏訓笙猶生指在東方者而言鑿矣魯頌閟宫萬舞洋洋孝孫有慶傳洋洋衆多也箋萬舞干舞也春秋隱公五年左氏傳九月考仲子之宫將萬焉注萬舞也與疏案公羊傳曰萬者何干舞也籥者何羽舞也則萬羽不同今傳云將萬焉問羽數於衆仲是萬與羽為一者萬羽之異自是公羊之説今杜直云萬舞也則萬是舞之大名也何休云所以仲子之廟唯有羽舞無干舞者婦人無武事獨奏文樂也劉炫云公羊傳曰萬者云云籥者云云羽者為文萬者為武武則左執朱干右秉玉戚文則左執籥右秉翟此傳將萬問羽即似萬羽同者以當此時萬羽俱作但將萬而問羽數非謂羽即萬也經直書羽者與傳互見之公問羽數於衆仲注問執羽人數對曰天子用八注八八六十四人諸侯用六注六六三十六人為疏何休説如此服虔以用六六八四十八大夫四為四八三十二士二為二八十六杜以舞勢宜方行列既減即每行人數亦宜減故同何説也或以襄十一年鄭人賂晉侯以女樂二八為二佾之舞知自上及下行皆八人斯不然矣彼傳見晉侯減樂之半以賜魏絳因歌鐘二肆遂言女樂二八為下半樂張本耳非以二八為二佾若二八即是二佾鄭人豈以二佾之樂賂晉侯晉侯豈以二佾之樂賜魏絳大夫四注四四十六人士二注二二四人士有功賜用樂夫舞所以節八音而行八風注八音金石絲竹匏土革木也八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而序其情故自八以下注惟天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也注魯唯文王周公廟得用八而他公遂因仍僭而用之今隱公特立此婦人之廟詳問衆仲因明大典故傳亦因言始用六佾其後季氏舞八佾於庭知唯在仲子廟用六胡氏銓曰羽翟羽舞者所執人持一羽凡舞有干舞有羽舞不曰六佾而曰六羽羽以象文德干以象武功婦人無武事故獨奏文樂也公羊傳初者何始也六羽者何舞也初獻六羽何以書譏何譏爾譏始僭諸公也六羽之為僭奈何天子八佾諸公六諸侯四榖梁傳初始也注遂以為常榖梁子曰舞夏天子八佾諸公六佾諸侯四佾初獻六羽始僭樂矣尸子舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣注言時諸侯僭侈皆用八佾魯於是能自減厲而始用六榖梁子言其始僣尸子言其始降張氏元德曰案周禮凡天子諸公諸侯之禮節度數各有等舞必有之論周室正禮當從公羊之説衆仲始欲止用八之僣故略諸公言之非周禮也曰獻者不宜獻也春秋於此書獻以見六羽不當用於仲子之廟書初以見八佾用於羣公之室一言而盡魯僭禮之本末非聖人莫能修謂此類也汪氏克寬曰春官樂師有羽舞有干舞籥師祭祀則鼓羽籥之舞司干祭祀舞者既陳則授舞器然則祭祀或文舞武舞並用或止用文舞而不用武舞也蕙田案以上文舞周禮春官旄人掌教舞夷樂注四夷之樂亦皆有聲歌及舞韎師掌教韎樂祭祀則帥其屬而舞之注舞之以東夷之舞疏知舞之以東夷之舞者以其專主夷樂則東夷之樂曰韎是也凡舞夷樂皆門外為之劉氏彛曰舞韎之位在門外祭祀大享皆用之示四夷來王也鞮鞻氏掌四夷之樂與其聲歌注王者必作四夷之樂一天下也言與其聲歌則云樂者主于舞上疏凡樂止有聲歌及舞既下别云聲歌明云樂主于舞可知也薛氏季宣曰四夷樂或以其服色名之或以其聲音名之服色韎是也聲音侏離是也餘不可考韎人之樂施于祭祀大享旄人鞮鞻氏之樂施於祭祀與燕者蓋東夷與四夷為長享於燕為重韎師曰師而序於前旄人鞮鞻氏曰人曰氏而序於後然則東夷之樂蓋聖人所重與祭祀則吹而歌之注吹之以管籥為之聲歌疏知吹之以管籥為之聲者以其者在上管籥在下既言吹之用氣明據管籥為之聲可知是以笙師教吹管籥之等禮記明堂位昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟言廣魯於天下也注周禮韎師掌教韎樂詩曰以雅以南以籥不僣廣大也詩疏鄭引周禮韎師以證經之昧樂又引小雅鼓鐘之以證南蠻之樂任即南也周公德廣非唯用四代之樂亦為蠻夷所歸或賜奏蠻夷之樂於庭也唯言夷蠻則戎狄可知或云正樂既不得六代故蠻夷唯與二方也陳氏禮書正義曰四夷樂名出於孝經緯鉤命決故彼云東夷之樂曰韎持矛助時生南夷之樂曰任持弓助時養西夷之樂曰株離持鉞助時殺北夷之樂曰禁持楯助時藏皆於四門之外右辟是也案明堂位亦有東夷之樂曰韎南夷之樂曰任又案虞傳云陽伯之樂舞株離則東夷之樂亦名株離者東夷樂有二名亦名株離鄭注云株離舞曲名言象萬物生株離若詩云彼黍離離是物生亦曰離云王者必作四夷之樂一天下也案白虎通云王者制夷狄樂不制夷狄禮禮者所以均中國不制禮恐夷人不能隨中國禮也孔頴達詩正義云昧者物生根也南者物懷任也秋物成而離其根株冬物藏而禁閉於下故以為名焉言南而得總四夷者以周之德先致南方故秋官立象胥之職以通譯四夷是言南可以兼四夷也然則舞不立南師而立昧師者以象胥曲以示法昧四夷之始故從其常而先立之也史記魯定公會齊景公於夾谷孔子攝相事齊有司趨進曰請奏四夷樂於是旌旄羽仗矛戟劒撥鼓譟而至孔子趨進歷階而登舉袂大言曰吾兩君為好會夷狄之樂何為請有司却之齊侯乃麾而去晉樂志後漢天子受朝賀舍利從西來戲於殿前擊水化成魚漱水作霧又化成龍出水遊戲以兩大繩兩頭相去數丈兩倡女對行於繩上也又曰王者舞先王之樂明有法也舞當代之樂明有制也舞四夷之樂明有懷也四夷之樂東曰韎南曰任西曰侏離北曰禁或以其服色名之或以其聲音名之服色則韎是也聲音則侏離是也漢書曰語言侏離其他不可以考鞮鞻氏掌四夷之樂旄人掌教四夷之樂韎師則掌教東夷之樂而已然韎師之樂施於祭祀大饗而旄人鞮鞻之樂施於祭祀與燕者蓋東於四夷為長饗於燕為重觀韎師曰師旄人鞮鞻曰人與氏師序於前而人與氏序於後則夷樂之别可知矣然詩曰以雅以南記曰胥鼓南而掌四夷者亦以象胥名官則周人於南夷之樂又其所樂者也先儒推四時之理以釋四樂之名以韎為晦昧任為懷任侏離為離根禁為禁閉且曰韎樂持矛助時生任樂持弓助時養侏離持鉞助時殺禁樂持盾助時藏白虎通又以侏離為東樂昧為南樂南樂持羽西樂持戟班固又以侏為兜以禁為伶以韎為佅賦曰伶侏兜離蓋各述其所傳者然也然周禮掌教夷樂者皆以所服所執所履名之鄭氏亦以韎為韎韐之韎則韎為服色明矣學者可以捨經而任傳乎先王之於夷樂雖或用之然亦後之而弗先外之而弗內也觀夾谷之會侏儒之樂奏於前而孔子誅之東漢元日撣徒丹國之樂作於庭而陳禪非之則魯納夷蠻之樂於太廟蓋陳之於門而已唐之時皆奏於四門之外豈古之遺制歟蕙田案以上夷舞右周廟享之舞詩小雅楚茨禮儀既備鐘鼓既戒鼓鐘送尸神保聿歸箋鐘鼓既戒戒諸在廟中者以祭禮畢謂疏祭祀之禮儀既畢備矣鐘鼓之音聲既告戒矣擊鐘鼓以告戒廟中之人言祭畢也祭義云樂以迎來哀以送往此鼓鐘送尸者以哀其享否不可知自孝子之心耳其送尸猶自作樂也周禮春官樂師及徹帥學士而歌徹令相注學士國子也鄭司農云謂將徹之時自有樂故帥學士而歌徹者歌雍雍在周頌臣工之什令視瞭扶工鄭司農云告當相瞽師者言當罷也瞽師盲者皆有相道之者故師冕見及階曰階也及席曰席也皆坐曰某在斯某在斯曰相師之道與小師徹歌注於有司徹而歌雍詩周頌雍有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀假哉皇考綏豫孝子宣哲維人文武維后燕及皇天克昌厥后綏我眉壽介以繁祉既右烈考亦右文母朱子集傳周禮樂師及徹帥學士而歌徹説者以為即此詩論語亦曰以雍徹然則此蓋徹祭所歌而亦名為徹也蕙田案以上徹歌小雅楚茨樂具入奏箋燕而祭時之樂復皆入奏樂疏乘前文而言入奏故知祭之復皆入也燕祭不得同樂而云皆入者歌詠雖異樂器則同故皆入也周禮春官鍾師凡祭祀奏燕樂注以鐘鼓奏之以疏知以鐘鼓奏之者其鐘師奏九夏用鐘鼓故知此燕樂亦用鐘鼓奏之可知也蕙田案此燕樂是祭畢燕于寢時所作之樂楚茨樂具入奏是也旄人凡祭祀舞其燕樂疏舞其燕樂謂作燕樂時使四方舞士舞之以夷樂黃氏度曰韎樂祭祀賔享必舞之散樂夷樂祭祀賓客則舞其燕樂不用燕舞則不舞是則韎猶近雅歟禮記禮器其出也肆夏而送之蓋重禮也注其出也謂諸侯之賓禮畢而出作樂以節之肆夏當為陔夏入疏知肆夏為陔夏者以大司樂大饗諸侯則諸侯出奏肆夏此經是助祭後無算爵禮畢客醉而出以貴重於禮猶奏陔夏而戒之故燕禮大射賓出奏陔夏明不失禮也陳氏樂書賓入奏納夏賓出奏肆夏自外入而納者物有所受之也自內出而肆者情有所放者也方其始也以入為主故納夏言其有所受此鐘師掌九夏而鄭氏以為四方賓來則奏納夏是已方其終也以出為主故肆夏言其有所放此禮器言大饗而繼之以其出也肆夏送之以重禮是也又曰明王行大饗之禮四海諸侯各以其職來祭其祭而入也各貢國之所有以修職其畢而出也王奏肆夏之樂而送之國語曰金奏肆夏天子所以享元侯也大饗之禮天子所以享元侯之樂送所以來祭之諸侯非重禮而何今夫歌皇華以送之天子所以待使臣也歌采薇以送之天子所以待帥臣也奏肆夏以送之天子所以待諸侯也於大饗言肆夏以送之則有送而無迎臣之而弗賓故也於饗燕言賓入門而奏肆夏則有迎而無送賓之而弗臣故也若夫兩君相見之禮入門而縣興客出以雍而肆夏不與此諸侯之樂所以不敢抗天子歟晉侯之享穆叔春秋罪之趙文子奏之於家禮經非之為僣天子故也新安王氏曰諸侯為賓禮畢而出作樂以節之蓋以下之事上其致貢有物所以將事上之誠待之終之以樂言始終不可失節鄭謂肆夏當作陔夏案大司樂王出入奏王夏尸出入奏肆夏而大饗諸侯則諸侯出入奏肆夏考其意饗則賓出奏肆夏重賓也燕則有無算爵恐其醉而失禮故奏陔夏戒之也然則助祭之後出廟門疑奏肆夏不奏陔夏禮為助祭之後無算爵禮畢客醉而出宜奏陔夏故燕禮大射賓出皆奏陔夏明不失禮其説不然享於廟燕於寢故曰饗以訓恭儉其禮意主於嚴燕以示慈惠其禮意主於歡為有無算爵故也廟中之饗必不至醉饗於廟燕不於廟安得陔夏以警其失禮乎蕙田案祭畢之燕止及同姓不及異姓異姓歸燔脤所以尊之同姓則留與燕所以親之楚茨言諸父兄弟備言燕私不及賓客則無異姓可知也至無算爵即旅酬後面事皆行於廟中之禮非燕於寢之時之禮王氏謂賓皆燕於寢又云燕有無算爵稽之祭禮皆不合又案以上祭畢之樂詩周頌絲衣序絲衣繹賓尸也箋繹又祭也天子諸侯也繹以祭之明日卿大夫曰賓尸與祭同日周曰繹商謂之肜也音義絲衣繹祭之服疏絲衣詩者繹賓尸之樂歌祭宗廟之明日又設祭祀以尋繹昨日之祭謂之為繹以賓事所祭之尸經之所陳皆繹祭始末之事也絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩旨酒思柔不吳不敖胡考之休蕙田案此詩已載入星辰條下今仍序説並存俟考春秋宣公八年壬午猶繹萬入去籥注萬舞名籥管也猶者可止之詞魯人知卿佐之喪不宜作樂而不知廢繹故內舞去籥惡其聲聞疏公羊傳曰萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者不廢其無聲者知其不可而為之也猶者何通可以已也是萬為舞名禮明堂位曰未干玉戚冕而舞大武干楯也戚斧也此舞者左手執楯右手執斧故謂之武舞言王者以萬人服天下故以萬為名詩言碩人之舞云左手執籥右手秉翟鄭玄云籥如管六孔何休云吹之以節舞也故吹籥而舞謂之文舞魯人知卿佐之喪不宜作樂故去其有聲而不知廢繹納舞去籥惡其聲聞也尋杜注意直云萬舞名以注隱五年亦直云萬舞也下問羽數則萬是舞之大名不取公羊萬是干舞之義則執羽吹籥是為萬舞故杜云納舞去籥惡其聲聞是無干舞籥舞之别名也吕氏祖謙曰萬舞文武二舞之總名籥舞文舞之别名文舞又謂之羽舞蓋文舞吹籥秉翟羽也萬入去籥者文武二舞俱入於二舞中去羽舞吹籥者何氏楷曰萬初學記云大舞也所以名萬者何休以為象武王以萬人定天下民樂之故名之然商頌曰萬舞有奕夏小正曰丁亥萬用入學竹書帝舜十七年春二月入學初用萬則萬之稱其來已久或但取萬物得所之義耳舞者用兩足左右相背故其字從舛山海經云帝俊八子始為舞又吕氏春秋云陰康氏之始陰夕滯伏民氣鬱閼故作舞以宣導之毛傳云以干羽為萬舞案武舞名干舞言干則有戚矣文舞名羽舞言羽則有籥矣或又以文舞為籥舞吕祖謙云鄭康成據公羊傳以萬舞為干舞蓋公羊釋經之誤也春秋書萬入去籥言文武二舞俱入以仲遂之喪於二舞之中去其有聲者故去籥焉公羊乃以萬舞為武舞與籥舞對言之失經意矣若萬舞止為武舞則此詩與商頌何為獨言萬舞而不及文舞耶左氏載考仲子之宫將萬焉婦人之廟亦不應獨用武舞也然則萬舞為二舞之總名明矣又左莊二十八年楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戒備也蓋謂萬舞之中有武舞焉非専以萬舞為武舞也公羊傳萬者何干舞也注干謂楯也能為人扞難而不使害人故聖王貴之以為武樂萬者其篇名武王以萬人服天下民樂之故名之云耳籥者何籥舞也注籥所吹以節舞也吹籥而舞文樂之長其言萬入去籥何去其有聲者注不欲令人聞之也廢其無聲者注廢置也置者不去也齊人語存其心焉爾傳説會纂杜氏預以萬為舞名無干舞籥舞之别公羊以萬為干舞籥為籥舞則文武分焉二説不同孔氏頴達詩疏從鄭箋以萬舞為干舞而此條則依違其間未有定解今觀隱五年考仲子之宫將萬焉公問羽數則萬兼文舞明矣婦人之廟豈得專用武舞乎毛氏詩傳以干羽為萬舞吕氏祖謙以萬為文武二舞之總名朱子亦用其説則公羊非也蕙田案以上繹祭之樂右周祭畢繹祭之樂蕙田案宗廟祭祀之樂自伊耆氏為土鼓蕢桴葦籥女媧為笙簧而樂肇焉黃帝樂曰咸池亦曰大咸堯曰大章亦曰大卷亦曰雲門舜曰韶亦曰九㲈夏曰大夏殷曰大濩周曰大武謂之六代之樂虞時后夔典樂垂作和鐘書云戞擊鳴球摶拊琴瑟以詠則堂上之樂也下管鼗鼓合止柷敔笙鏞以間則堂下之樂也夏后氏之鼓足龍筍虡以懸鐘磬商有楹鼓有崇牙祭祀尚聲樂三闋然後出迎牲商頌那之詩鞉鼓奏鼓管聲庸鼓皆堂下之樂惟湯孫奏假鄭氏以為奏升堂之樂弦歌依之依我磬聲即堂上之玉磬陳暘曰堂上言依我磬聲則戞擊鳴球摶拊琴瑟之類舉矣堂下言鞉鼓管庸則柷敔笙簫之類舉矣是也周之樂有堂上有堂下有登歌有下管有間歌有合樂有大合樂有分樂有文舞有武舞有夷舞在堂上者明堂位玉磬大琴大瑟中琴小瑟禮器列其琴瑟樂記清廟之瑟是也在堂下者莫詳於周頌有瞽篇曰有瞽有瞽在周之庭下所陳皆在庭之樂也設業設虡崇牙樹羽言設橫者之業又設植者之虡其上刻為崇牙因樹置五采之羽以為之飾亦謂之璧翣業又謂之筍春官典庸器冬官梓人明堂位檀弓皆言筍虡而不言業此及靈臺言虡業而不言筍互相備也應田縣鼓應小鼓即大射禮應鞞小師擊應鼓是也田毛以為大鼓鄭以為小鼓即朄鼓大師令奏鼓朄小師鼓朄是也縣鼓即商所植之楹鼓周則縣而擊之孔疏以為應田皆縣之虡業為縣鼓非也禮器縣鼓在西應鼓在東則縣與應不得為一矣禮器疏陳暘以縣鼓為大鼓是也而陳祥道以為晉鼓何楷以為路鼓一據鏄師祭祀擊晉鼓之文一據鼓人以路鼓鼓鬼享大司樂路鼓路鼗之文則何説似長也鞉磬柷圉既備乃奏簫管備舉鞉亦作鼗又作鞀月令修鞀鞞何楷以為即大司樂之路鼗是也鼗與鼓同聲相應故大司樂俱以鼓鼗相配小師亦以鼗鼓并而鼓之那言置我鞉鼓亦謂并植鞉與鼓也磬朱子以為石磬磬師掌教擊磬鄭以編磬釋之是也柷一名椌所以合樂圉亦作敔一名楬樂記聖人作為椌楬虞書合止柷敔是也奏何楷以為金奏當據鐘而言則鐘師所掌之事也簫編竹為之舜樂以簫為主故名韶簫管如箎六孔周樂以管為主故凡言堂下樂者皆云下管大司樂所云孫竹之管孤竹之管陰竹之管是也鼗柷敔簫管太師掌其教瞽矇掌其器視瞭掌其縣此詩於八音缺匏土偶未及耳其陳設之位則禮器云廟堂之下縣鼓在西應鼓在東大射儀樂人宿縣於阼階東笙磬西面其南笙鐘其南鑮一建鼓在阼階西南鼓應鼙在其東南鼓頌磬東面其南鐘其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北一建鼓在西階之東南面簜在建鼓之間鼗倚於頌磬西紘鄭注笙猶生也成功曰頌東方鐘磬謂之笙西方鐘磬謂之頌皆編而懸之鑮如鐘而大奏樂以鼓鑮為節建猶樹也應鼙應朔鼙也先擊朔鼙應鼙應之在東便其先擊小後擊大簜謂竹也謂笙簫之屬倚於堂紘編磬繩也推射樂之陳設可知祭樂之陳設笙鐘笙磬謂應笙之鐘應笙之磬頌磬即所謂歌磬鄭訓笙為生為東頌為成功為西恐不然也周禮祭祀之事有應有朄無朔大射有朔有應無朄賈氏以為凡言應者應朔鼙祭祀既有應明有朔而陳祥道黃度則云朔鼙即朄理或然也登歌在堂上春官大師登歌令奏擊拊小師登歌擊拊明堂位祭統燕居並云升歌清廟樂記清廟之瑟朱絃而疏越一唱而三歎郊特牲歌者在上貴人聲也儀禮鄉飲燕禮有升歌三終鹿鳴四牡皇皇者華亦其事也下管在堂下大師下管播樂器小師下管擊應鼓明堂位祭統燕居並云下而管象郊特牲匏竹在下鄭云特言管者貴人氣也鄉飲燕禮有笙入三終南陔白華華黍又下管新宫亦其事也間歌者間代也堂上一歌堂下一吹迭相代也鄉飲燕禮間歌三終歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀是也合樂者堂上堂下歌瑟及笙並作也鄉飲燕禮合樂三終周南關睢葛覃卷耳召南鵲巢采蘩采蘋是也大合樂者月令季春之月文王世子大合樂疏家以為合舞合吹大司樂之大合樂疏家以為遍作六代之樂是也分樂者一以合辰之樂分用之合辰者子與丑合寅與亥合戌與卯合辰與酉合申與巳合午與未合大司樂乃奏夷則歌小吕以享先妣乃奏無射歌夾鍾以享先祖是也一以六代之樂分用之大司樂九德之歌九磬之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣鄭云先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之據此則是先分樂後合樂也説恐未是案大司樂圜丘之樂六變方丘之樂八變先儒以為皆降神之樂奏黃鍾歌大吕以祀天神奏太蔟歌應鍾以祭地示先儒以為祀神之樂而鄭氏解禮謂人道宗廟有灌天地大神至尊不祼是天地無灌故作樂宗廟既有祼則不宜有九變之樂也先儒謂分樂乃將享所用九變之樂乃禘祫所作理或然也舞有文舞有武舞文舞羽籥武舞干戚文王世子春夏學干戈教武舞也秋冬學羽籥教文舞也周禮籥師鼓羽籥之舞司干掌舞器鄭以為羽籥之屬樂記羽旄羽籥旄狄皆文舞之器也司兵授舞者兵鄭以為朱干玉戚之屬司戈盾授舞者兵即戈盾樂記干戚干揚皆武舞之器也虞書舞干羽於兩階干武舞在西階羽文舞在東階左傳象簫南籥象簫文王武舞南籥文王文舞明堂位朱干玉戚冕而舞大武皮辨素積禓而舞大夏祭統朱干玉戚以舞大武八佾以舞大夏大武則武舞之樂大夏則文舞之樂也總名曰萬舞簡兮詩執籥秉翟文舞也而曰公庭萬舞左傳考仲子之宫將萬焉而所獻者六羽是文舞名萬也左傳令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人曰先君以是舞也習戎備也夏小正萬者干戚舞也是武舞名萬也公羊鄭康成並以萬為武舞籥為文舞非也四代之舞皆有萬稱竹書帝舜十七年春二月入學初用萬夏小正曰丁亥萬用入學商頌曰萬舞有奕則萬之名自古有之萬為盈數取衆多意何休以為武王以萬人得天下故名非也其文舞之容簡兮詩曰左手執籥右手秉翟樂記曰屈伸俯仰綴兆舒疾樂之文也又曰終始象四時周旋象風雨五色成文而不亂八風從律而不姦是也武舞之容則樂記總干山立發揚蹈厲武亂皆坐始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐分夾而進久立於綴又曰先鼓以警戒三步以見方再始以著往復亂以飭歸今案記云其治民勞者其舞行綴逺其治民逸者其舞行綴短則六代之舞其行列自有逺近不必盡同也武舞重於文舞故祭統曰舞莫重於武宿夜又曰及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸則是君親為舞樂記總干而山立即謂此也武舞又先於文舞陳祥道曰書言舞干羽則先干而後羽樂記言干戚羽旄謂之樂則先干戚而後羽旄郊特牲明堂位祭統皆言朱干玉戚冕而舞大武皮辨素積禓而舞大夏則先大武而後大夏蓋曰武以威衆而平難文以附衆而守成平難常在於先守成常在於後是也四夷之舞在四門之外周禮旄人掌教舞夷舞韎師掌教韎樂鞮鞻氏掌四夷之樂與其聲歌陳氏禮書曰王者舞先王之樂明有德也舞當代之樂明有制也舞四夷之樂明有懷也是也其次序之可知者先一日大胥鼓徴典庸器設筍虡大司樂宿縣樂師大師小師瞽矇視瞭磬師笙師鐘師鎛師各展其器與聲祭之日王入廟門金奏王夏迎尸金奏肆夏作樂降神祼獻迎牲金奏昭夏登歌大師帥瞽人登堂於西階之東北面相者授清廟之瑟小師擊拊下管大師播樂器奏鼓先朄後應先西後東乃間歌乃合樂大司樂帥國子舞樂師臯舞大胥正舞位小胥巡舞列司干授羽籥司兵授朱干玉戚司戈盾授戈盾大武之樂凡六成九磬之舞凡九變每樂一成樂師告備九獻酬酢之禮畢乃擊鐘鼓告利成送尸金奏肆夏徹爼樂師帥學士歌徹賓出奏陔夏而送之祭畢燕於寢則樂具入奏蓋即鍾師所掌旄人所舞之燕樂也明日繹祭亦有樂舞春秋宣八年壬午猶繹萬入去籥是繹有萬舞可知也五禮通考卷七十一
