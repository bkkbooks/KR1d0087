body:
  text: 五禮通考卷二百五十刑部尚書秦蕙田撰凶禮五荒禮周禮地官大司徒十有一曰索鬼神注鄭司農云索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡愛斯牲者也劉氏彛曰鬼神雖幽能助隂陽以為水旱札瘥者必索而祭之春官凡以神仕者以冬日至致天神人鬼以夏日至致地示物鬼以禬國之凶荒注天人陽也地物隂也陽氣升而祭鬼神隂氣升而祭地示物魅所以順其為人與物也致人鬼于祖廟致物魅于墠壇蓋用祭天地之明日杜子春云禬除也肆師若國有大故則令國人祭注大故謂水旱凶荒所令祭者社及禜酺大祝國有大故天災彌祀社稷禱祠注天災疫癘水旱也彌猶遍也遍祀杜稷及諸所禱既則祠之以報焉詩大雅雲漢靡神不舉靡愛斯牲圭璧既卒寧莫我聽箋靡莫皆無也言王為旱之故求于羣神無不祭也無所愛于三牲禮神之圭璧又已盡矣曽無聽聆我之精神而興雲雨祭疏國有凶荒則索鬼神而祭之是邅遇天災必當廣羣神神皆用牲祭之天地五帝當用特牲其餘諸神或用太牢或用少牢三牲皆用故言無所愛于三牲也祭神又用玉器禮神之玉器自有多名言圭璧為其總稱以三牲用不可盡故言無愛圭璧少而易竭故言既盡不殄禋祀自郊徂宫上下奠瘞靡神不宗傳上祭天下祭地奠其禮瘞其物宗尊也國有凶荒則索鬼神而祭之天箋宫宗廟也為旱故潔祀不絶從郊而至宗廟奠瘞地之神無不齋肅而尊敬之言遍至也羣公先正則不我助父母先祖胡寧忍豫傳先正百辟卿士也箋百辟卿士雩祀所及者今曽無肯助我憂旱先祖文武又何為施忍于我不使天雨疏月令仲夏乃命雩祀百辟卿士有益于民者注云百辟卿士古之上公以下若勾龍后稷之類彼以經無羣公之文故鄭注百辟之文兼羣公矣此則羣公與先正别文故以先正為卿士以下蕙田案二至祭神祗鬼魅常時之祭也彌祀社稷禱祠即詩所謂靡神不舉因災之祭也又案列代因災禱祈百神之禮略見吉禮大雩門可以參考今不復載右索鬼神周禮地官大司徒十有二曰除盜賊注鄭司農云除盜賊急其刑以除之飢饉則盜賊多不可不除也史氏浩曰傳曰牧民如牧羊當去其敗類者凶荒而除盜賊防其嘯聚為民害也李氏景齊曰除盜賊必見于荒政者誠以盜賊于凶年為多盜賊不可不除然使賙救撫存之責未盡而遽欲除之則是罔民而已故散利薄征弛禁去幾凡所以生養吾民無所不盡其至而彼猶為盜賊之歸則不得已而除之故荒政以除盜賊為末髙氏愈曰除盜賊謂徼循嚴警也秋官士師若邦凶荒令糾守注糾守備盜賊也文獻通考熙寧元年帝以內侍有自淮南來者言宿州民飢多盜繫囚衆本路不以聞詔遣太常博士陳充等視宿亳等州災傷河北災傷州軍劫盜罪死者並減死刺配廣南牢城年豐如舊司馬光上疏論曰臣竊聞降敕下京東京西災傷州軍如人户委是家貧偷盜斛斗因而盜財者與減等斷放未知虛的若果如此深為不便臣聞周禮荒政十有二散利薄征緩刑弛力舍禁去幾卒皆推寬大之恩以利於民獨於盜賊愈更嚴急所以然者蓋以飢饉之嵗盜賊必多殘害良民不可不除也頃年嘗見州縣官吏有不知治體務為小仁者或遇凶年有劫盜斛斗者小加寬縱則盜賊公行更相劫奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降敕文豫言偷盜斛斗因而盜財者與減等斷放是勸民為盜也百姓乏食官中當輕徭薄賦開倉賑貸以救其死不當使之相劫奪也今嵗府界京東京西水災極多嚴刑峻法以除盜賊猶恐春冬之交飢民嘯聚不可禁禦又况降敕以勸之臣恐國家始于寬仁而終于酷暴意在活人而殺人更多也馬氏端臨曰溫公此奏乃言之於英宗治平年間非此時所上今姑附此蕙田案溫公所奏深得周官除盜賊之旨其云始于寬仁終于酷暴尤切中姑息之病大學衍義補辛棄疾帥湖南賑濟榜文祗用八字曰劫禾者斬閉糴者配丘氏濬曰荒歉之年民間閉糴固是不仁然當此際米價翔踴正小人射利之時也而必閉之者蓋彼亦自量其家口之衆多恐嗣嵗之不繼耳彼有何罪而配之耶若夫劫禾之舉此盜賊之端禍亂之萌也周人荒政除盜賊正以此耳小人乏食計出無聊謂飢死與殺死等死耳與其飢而死不若殺而死况又未必殺耶聞粟所在羣趨而赴之哀告求貸苟有不從即肆劫奪自諉曰我非盜也迫于飢餓不得已耳嗚呼白晝攫人所有謂之非盜可乎漸不可長彼知其負罪于官因之鳥駭鼠竄竊弄鋤梃以扞遊徼之吏不幸而傷一人焉勢不容已遂至變亂亦或有之臣願明敕有司遇有旱災之嵗勢必至飢窘必先榜示禁其劫奪諭之不從痛懲首惡以警餘衆決不可行姑息之政此非但救飢荒乃弭禍亂之先務也朱子奏救荒畫一事件狀訪聞諸州府村落已有強借劫奪之患此在官司固當禁約然亦須先示存恤之意然後禁其為非庶幾人心懷德畏威易以彈戢若慢不加省待其生事然後誅鉏則所傷已多所費又廣况其不勝何患不生乞降指揮早撥上項錢數使如臣者得以奉承宣布遍行曉諭即德意所孚固有以銷厭禍亂之萌矣然後明詔安撫提刑兩司察其敢有作過唱亂之人及早擒捕致之典憲庶幾姦民知畏不至生事金史章宗本紀承安二年十二月諭宰臣今後水潦旱蝗盜賊竊發命提刑司預為規畫宣宗本紀興定五年九月以京東嵗飢多盜遣御史大夫赫舍哩呼實美往撫安之元史世祖本紀至元八年二月癸卯四川行省伊蘇岱爾言比因飢饉盜賊滋多宜加顯戮詔令羣臣議安圖以為強竊盜賊一皆處死恐非所宜罪至死者仍舊待命明會典正統二年令各處有司委官挨勘流民名籍男婦大小丁口排門粉壁十家編為一甲互相保識分屬當地里長帶管若團住山林湖濼或投托官豪勢要之家藏躲抗拒官司不服招撫者正犯處死户下編發邊衛充軍里老窩家知而不首及占吝不發者罪同杭州府志神宗十六年四月浙直飢民多迫脅借貸事聞命撫按嚴法懲警首惡以靖地方明史神宗本紀神宗二十二年正月詔以各省災傷山東河南徐淮尤甚盜賊四起有司玩愒朝延詔令不行自今以安民弭盜為撫按有司黜陟右除盜賊葉氏時禮經會元大司徒之于民既庶而又富之可謂得地利也既富而又教之可謂得人和矣然而天時不常水旱為沴則地利有所不能殖人和有所不足恃聖人有憂之是故為之荒政以聚萬民所以救天時之不常而濟地利人和之不及也散利貸種食也薄征輕稅賦也緩刑寬刑罰也弛力息徭役也舍禁山澤無禁也去幾關市無幾也眚禮殺吉禮也殺哀節凶禮也蕃樂徹樂而弛縣也多昏殺禮而多昏也索鬼神而為凶年禱也除盜賊而使良民安也蓋天災國家代有嵗凶年穀不登上之人苟不有以賑救之不有以存恤之則老弱轉乎溝壑壯者散而之四方矣民安得而聚哉周人以荒政十有二聚萬民又曰大荒大札則令邦國移民通財舍禁弛力薄征緩刑其拳拳于聚民可謂至矣而其存恤賑救之意又散見于六屬之中鄉師以嵗時賙萬民之艱厄以王命施惠司救凡嵗時有天患民病則以王命施惠司稼則均萬民之食而賙其急而平其興即荒政之散利也司市凶荒則市無征司關國凶荒則無關門之征即荒政之去幾也司徒救荒故言去幾司關禦暴故言猶幾均人凶札則無力征無財賦即荒政之弛力也廩人若食不能人二釜則令移民就穀詔王殺邦用膳夫大荒則不舉掌客凶荒則殺禮司服大荒則素服即荒政之眚禮也大司樂大荒大災令弛縣即荒政之蕃樂也士師若邦凶荒則令移民通財糾守緩刑朝士若邦凶荒則令邦國都縣慮刑貶即荒政之緩刑也小宗伯大災及執事禱祠于上下神示太祝天災彌祀社稷禱祠家宗人案家宗人當作凡以神仕者以至日致天神人鬼地示物魅以禬國之凶荒即荒政之索鬼神也六官之屬苟可以為荒政之助者無不致其詳焉成周聚民之意可謂仁之至義之盡矣然此十有二政曰弛力曰薄征曰舍禁曰去幾固皆有以利民矣一以散利為先則其關係民命尤急也利不散則民不聚雖有眚禮蕃樂殺哀多昏之政未必有實惠及民先王荒政以散利為急蓋古者三年耕必餘一年之食九年耕必餘三年之食預為先備以為散利之地故堯有九年之水湯有七年之旱民無菜色者備先具也是以周人有倉人掌粟入之藏有餘則藏之以待凶而頒之旅師則聚野粟平頒其興積施其惠遺人掌縣都之委積以待凶荒皆先為之條也後世如梁之移民河東漢人之就食蜀漢亦得周人移民就穀之意發倉廩以振貧民遣使以振貸無種食者亦得周人賙民施惠之意然皆可暫而不可常也獨一常平義倉之法有倉人藏粟旅師聚粟遺人委積之政誠可以為荒政散利之助而後人不能遵守其法而推廣其意常平義倉之名存而實廢卒有水旱之變國胡以相恤哉上無以散其利下無以聚其民則有去而為盜賊者矣盜賊方興乃相與講求其弭盜之䇿甚者必重法立威以求勝之不思禮義生于富足盜賊起于貧窮周人荒政以除盜賊居其末蓋亦甚不得已也鄭氏謂急其刑而除之則失之矣且周人非不除盜賊也在司稽則執市之盜賊以徇且刑之在士師則掌邦賊邦盜之成在朝士則凡盜賊殺之無罪在司厲則掌賊盜之任器貨賄在掌囚則守盜賊在掌戮則搏盜賊在司𨽻則帥其民而搏盜賊在環人則諜賊然此非凶荒之時其除之必急固宜也凶年盜賊蓋亦飢寒所迫耳何後世不求所以救凶荒之政而徒求其所以勝盜賊之術歟然則欲除盜賊者當如何曰自散利始吕氏祖謙曰荒政十有二其目須當詳講一曰散利二曰薄征此兩者荒政之始散利是發公財之已藏者薄征是減民租之未輸者已藏者既發之未輸者又薄之荒政之大綱既舉矣三曰緩刑四曰弛力緩刑謂民迫於飢寒不幸而有過失緩其辟以示哀矜之意弛力者平時用民之力嵗不過三日今則當用者亦弛之不用所以休息百姓五曰舍禁平時所謂山虞林衡皆有所掌至荒政則徹藩籬恣民取之六曰去幾平時關防皆有幾察荒嵗必要百物流通使天下商旅出於其市此救荒之要術也七曰眚禮此則専理會荒政凡禮文之可省者省之如有幣無牲之類八曰殺哀凡是喪紀之節一皆減損所謂不以死傷生専理會荒政九曰蕃樂時和嵗豐所以與民共樂樂民之樂亦當憂民之憂所以荒嵗不樂十曰多昏凶荒之年多是匹夫匹婦不能自保所以殺禮而多昏使男女自相保之義十有一曰索鬼神靡神不舉並走羣望之類是也十有二曰除盜賊前面説緩刑此説除盜賊此便是經權皆舉處既與民共憂不幸民有過固可哀矜至於姦人亦有伺變竊發者凶荒之嵗民心易動一夫呌喚萬夫皆集所以必以除盜賊終之此止亂之道大抵聖人之經蓋通萬世而可行者其條目固止於此然周禮之書六官分職合之則有總散之則有所司其關節脈理皆自相應只去大司徒上看未盡若遍考六官則荒政秩序可見且如散利須考大府天府內府凡掌財賦之官如薄征須考九職九賦九貢如緩刑須考司冦士師所掌之刑它莫不然參觀遍考然後可知古今治平略周禮大司徒以荒政十有二聚萬民一曰散財二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十一曰索鬼神十二曰除盜賊可謂仁之至義之盡矣然以治荒非待荒也古稱荒政貴不治之治而治荒尚無功之功周先王肅乂時若弭之密矣治溝浚澮禦之周矣嬰芽代犧鑒之素矣此皆未災而兢兢非必十二政而後為救也必待政而救則司徒氏之聚萬民其法亦甚疏矣故周禮春官嵗獻民穀之數冡宰以三十年之通制國用至餘十年之食此量出入也常法也遺人掌鄉關之委積以恤囏厄養孤老此待施惠也常法也廩人數邦用稽民食食不能人一釜則令邦移民就穀此待匪頒也常法也旅師泉府積三粟與斂不售者平頒而貸之此貴國服也常法也周惟先時而待法如此其詳且豫是以嵗連豐穰熯潦無侵即熯潦不為災即為災不病民也未嘗不旱而以不瘠告未嘗不飢而以不害聞語曰三代而上有荒嵗無荒民夫無荒民矣安所事荒政哉不特此也玉藻年不順成則天子素服乘素車食無樂又曰年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬穀梁赤曰五穀不升為大飢一穀不升謂之嗛二穀不升謂之飢三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛候廷道不除百官布而不制鬼神禱而不祀此大侵之禮也王制三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂古昔帝王遇災必懼凡事皆加減節貶損非獨以憂民之憂蓋亦以畏天之災故周禮大荒則不舉大札則不舉天地大災則不舉舉者殺牲盛饌也豈但飲食為然則凡所服之衣所乘之車凡百興作皆為休息此無他君臣之分雖懸絶而實相資以相成也當此凶荒之時吾民嗷嗷然以待哺垂于阽危瀕于死亡為人上者何忍獨享其奉哉至其喪荒之式見于小行人之官札喪凶荒厄窮為一書當時天下各自有廩藏之所遇凶荒則賑發濟民而已故斂散輕重之式未嘗講而候甸采衛皆有餽遺不至穀價翔踴此弛張斂散之權所以不復究也至王政既衰秦飢乞糴于晉魯飢乞糴于齊嵗一不登則乞糴于鄰國所謂九年之制已自敗壞而管子輕重諸篇不過君民互相攘奪收其權于上而已舉周官荒政一變為斂散輕重之權又豈復有及民之意哉蕙田案以上統論周官荒政周禮地官大司徒五族為黨使之相救五黨為州使之相賙疏民有凶禍者使相救助有禮物不備使賙給之陳氏傅良曰大利害大患難非百家所可禦必五百家然後足以相救水旱凶荒欲以相賙又非五百家所能辦惟二千五百家則其地必濶必無皆水皆旱之理庶幾有無可以相通春秋僖公二十一年左氏傳臧文仲曰務穡勸分注勸分有無相濟蕙田案成周盛時民有常産無甚富甚貧之家然其中有餘不足勢莫能齊故周官教六行任恤居其二又於州黨之中示以相賙相救之法以故天災流行而民不至有病飢者其厚民生而善民俗之意逺矣自任恤之教不講一有水旱賑恤所不繼不能無藉富人之捐輸不得已而勸之以賞格或行入粟納官之令亦權宜之一法也漢書武帝本紀元狩三年秋遣謁者勸有水災郡種宿麥舉吏民能假貸貧民者以名聞元鼎二年九月詔吏民有振救飢民免其厄者具舉以聞宣帝本紀本始四年正月詔曰今嵗不登已遣使者振貸困乏其令丞相以下至都官令丞上書入穀輸長安倉助貸貧民成帝本紀永始二年二月乙酉詔曰關東比嵗不登吏民以義收食貧民入穀物助縣官振贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家無出租賦三嵗萬錢以上一年蕙田案此吏民入粟助賑賜爵之始平帝本紀元始二年四月郡國大旱蝗青州尤甚安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人以口賦貧民後漢安帝本紀永初三年三月京師大飢四月三公以國用不足奏令吏人入錢穀得為關內侯虎賁羽林郎五大夫官府吏緹騎營士各有差桓帝本紀永夀元年二月司𨽻冀州飢人相食敕州郡賑給貧弱若王侯吏民有積穀者一切貸得十分之三以助稟貸其百姓吏民者以見錢雇直王侯須新租乃償宋書徐耕傳元嘉二十一年大旱民飢耕詣縣陳辭曰今年亢旱禾稼不登氓黎飢餒採掇存命聖上哀矜已垂存拯但饉罄來久困殆者衆米穀轉貴糴索無所方涉春夏日月悠長不有微救永無濟理不惟凡璅敢憂身外鹿鳴之求思同野草氣類之感能不傷心民糴得少米資供朝夕志欲自竭義存分餐今以千斛助官賑貸此境連年不熟今嵗尤甚晉陵境特為偏祐此郡雖弊猶有富室承陂之家處處而是並皆保熟所失蓋微陳積之穀皆有巨萬旱之所弊實鍾貧民溫富之家各有財寶謂此等並宜助官得過儉月所損至輕所濟甚重今敢自勵為勸造之端實願掘水揚塵崇益山海縣為言上當時議者以耕比漢卜式詔書褒美酬以縣令魏書宣武帝本紀延昌元年五月詔天下有粟之家供年之外悉貸飢民荒政考略唐肅宗時百姓殘于兵盜米斗至錢七千鬻粳為糧民行乞食者屬路乃詔能賑貧乏者寵以爵秩舊唐書憲宗本紀元和十二年七月詔以定州飢募人入粟受官及減選超資册府元龜後晉天福八年正月敕河南懷孟鄭等州管內百姓有積粟者仰均分借以濟貧下宋史太宗本紀淳化五年正月詔諸州能出粟貸飢民者賜爵真宗本紀大中祥符九年九月詔民有出私廪振貧乏者三千石至八千石第授助教文學上佐之秩仁宗本紀慶歷四年五月詔募人納粟振淮南飢至和元年四月詔京西民飢宜令所在勸富人納粟以振之文獻通考治平四年河北旱御史中丞司馬光上疏請富室有蓄積者官給印歷聽其舉貸量出利息候豐熟日官為收索示以必信不可誑誘則將來百姓爭務蓄積矣熙寧元年降空名度牒五百道付兩浙運司令分賜本路召人納米或錢賑濟紹聖元年帝以京東河九之民乏食流移未歸詔給空名假承務郎敕十太廟齋郎補牒十州助教不理選限敕三十度牒五百付河北東西路提舉司召人入錢粟充賑濟宋史食貨志紹興以來嵗有水旱當艱難之際兵食方急儲蓄有限而振給無窮復以爵賞誘富人相與補助亦權宜不得已之䇿也元年詔出粟濟糶者賞各有差糶及三千石以上與守闕進義校尉一萬五千石以上與進義校尉二萬石以上取旨優賞已有官蔭不願補授者比類施行大學衍義補隆興中中書門下省言湖南江西旱傷立賞格以勸積粟之家凡出米賑濟係崇尚義風不與進納同丘氏濬曰鬻爵非國家美事也然用之他則不可用之于救荒則是國家為民無所利之也宋人所謂崇尚義風不與進納同是也臣願遇嵗凶荒民間有積粟者輸以賑濟則定為等第授以官秩自逺而來者并計其路費授官之後給與璽書俾有司加禮優待與見任同雖有過犯亦不追奪如此則平寧之時人爭積粟荒歉之嵗民爭輸粟矣是亦救荒之一䇿也文獻通考隆興二年淮民流於江浙十數萬官司雖濟而米斛有限乃詔民間不曽經水災處占田萬𤱔者糶二千石萬𤱔以下糶一千石宋史食貨志乾道七年八月湖南江西旱立賞格以勸積粟之家無官人一千五百石補進義校尉願補不理選將仕郎者聽二千石補進武校尉進士與免文解一次四千石補承信郎進士與補上州文學五千石補承節郎進士補迪功郎文臣一千石減二年磨勘選人轉一官二千石減三年磨勘選人循一資各與占射差遣一次三千石轉一官選人循兩資各與占射差遣一次武臣一千石減二年磨勘選人轉一資二千石減三年磨勘選人循一資各與占射差遣一次三千石轉一官選人循兩資各與占射差遣一次五千石以上文武臣並取旨優與推恩孝宗本紀淳熙三年十月詔自今非歉嵗不許鬻爵八年十一月以淳熙元年減半推賞法募民振糶文獻通考淳熙十年江東憲臣尤袤言救荒之政莫急於勸分昨者朝廷立賞格以募出粟富家欣然輸納故庚子之旱不費支吾者用此䇿也自後輸納既多朝廷吝於推賞多方沮抑或恐富家以命令為不信乞詔有司施行朱子上宰相書荒政之中有兩事焉其二曰速行賞典激勵富室蓋此一䇿本以誘民事急則藉之以為一時之用事定則酬之以為後日之勸旋觀今日失信已多别有緩急何以使衆欲望明公察此事理特與敷奏照會元降即與推恩使已輸者無怨恨不滿之意未輸者有歆豔慕用之心信令既行願應者衆則緩急之間雖百萬之粟可指揮而辦况是此䇿不關經費揆時度事最為利宜而乃遷延嵗月沮抑百端使去嵗者至今未及霑賞而今嵗者方且反覆郤難未見涯際是失信天下固足以為今日之所甚憂而自壞其權宜濟事之策者亦今日之所可惜也與建寧傅守劄子糴粳之害前已陳之然千里之內户口不知其幾若必人糴米而食之恐無以濟其勢須令上户樁留禾米如前日之説儲備乃廣但所遇縣道官吏之説皆憚於此計蓋恐上户見怨又慮見欺殊不知救災之政與常日不同決無靜拱而可以獲禽之理夫富人之多粟者非能獨炊而自食之其勢必糶而取錢以給家之用今但使之存留分數以俟來嵗聽官司之命以恤鄰里之闕何所不可正使其間不無冥頑難喻之人然喻之以仁恩責之以大義其不從者俟之以刑其樂從者報之以賞何至憚其怨怒且慮其欺已而不敢為哉似聞建陽之西已有自言於官願以家資二百萬糴米以俟來嵗之荒而以本價出之若果如此則人亦豈為鬼為魅全不可化者但患上之人先以無狀期之故強者視以為深仇而肆其凌暴弱者畏之如大敵而不復能以仁能相裁二者其失均也與星子諸縣議荒政書一勸諭上户請詳本軍立去帳式令鄉衆依公推舉約定所蔭客户所糶米穀數目縣司略備酒果延請勸諭厚其禮意諭以利害不可縱令胥吏非理騷擾上户既是富足之家必能體悉此意其間恐有未能致悉之人亦當再三勸諭審其虛實量與增減如更詐欺抵拒即具姓名申軍切待别作施行文獻通考嘉定二年起居郎賈從熟言出粟賑濟賞有常典多者至命以官固足示勸然應格霑賞者未有一二偏方小郡號為上户者不過常産耳今不必盡責以賑濟但隨力所及或糶或貸廣而及於一鄉狹而及於一都有司核實量多寡與之免役一次少者一年或半年庶幾官不失信民必樂從從之蕙田案勸捐之法惟此議最為簡便易行宋史理宗本紀淳祐六年秋七月泉州嵗飢其民謝應瑞非因有司勸分自出私鈔四十餘萬糴米以振鄉井所全活甚衆詔補進義校尉遼史聖宗本紀統和十五年二月勸品部富民出錢以贍貧民金史食貨志皇統三年三月陜西旱飢詔許富民入粟補官熙宗本紀皇統四年十一月壬辰立借貸飢民酬賞格食貨志世宗大定元年以兵興嵗歉下令聽民進納補官又募能濟飢民者視其人數為補官格章宗本紀明昌二年八月敕山東河北闕食等處許納粟補官三年十一月以有司言河州定羌民張顯孝友力田焚劵已責又獻粟千石以賑飢棣州民榮楫賑米七百石錢三百貫冬月散柴薪三千束皆别無希覬特各補兩官仍正班敘胥鼎傳鼎知大興府事兼中都路兵馬都總管貞祐二年正月鼎以在京貧民缺食者衆宜立法振救乃奏曰京師官民有能贍給貧人者宜計所贍遷官升職以勸奬之遂定權宜鬻恩例格如進官升職丁憂人許應舉求仕官監户從良之類入粟草各有數全活甚衆蕙田案鬻恩之例為救荒權宜之䇿如無官者許入仕有位者許遷職所以奬其好善樂施之誼此於民有濟而於理亦無害也至如丁憂人應舉求仕之類名教所關不容假借啓一時之幸門壞百世之公義所得者少所失者多矣元史世祖本紀至元元年五月以平隂縣尹馬欽發私粟六百石贍飢民又給民粟種四百餘石詔奬諭特賜西錦五端以旌其義武宗本紀大德十一年閏七月江浙湖廣江西河南兩淮屬郡飢詔富家能以私粟賑貸者量授以官英宗本紀至治三年正月曹州禹城縣人邢著程進出粟以賑飢民命有司旌其門食貨志入粟補官之制元初未嘗舉行天歷三年內外郡縣亢旱為災於是用太師達爾罕等言舉而行之凡江南陜西河南等處定為三等令其富實民户依例出米無米者折納價鈔陜西每石八十兩河南并腹裏每石六十兩江南三省每石四十兩實授茶鹽流官如不仕讓封父母者聽錢穀官考滿依例升轉夫入粟補官雖非先王之政然荒札之餘民賴其助者多矣蕙田案入粟封贈父母之例始此文宗本紀至順二年正月大名魏縣民曹革輸粟賑陜西飢旌其門五月益都路宋德讓趙仁各輸米三百石賑膠州飢民九千户中書省臣請依輸粟補官例豫官從之順帝本紀至元二年十二月江州諸縣飢總管王大中貸富人粟以賑貧民而免富人雜徭以為息約年豐還之民不病飢慶元慈溪縣飢遣官賑之至正五年四月汴梁濟南郡邠州瑞州等處民飢賑之募富户出米五十石以上者旌以義士之號六月廬州張順興出米五百餘石賑飢旌其門紀事本末宣德五年江西淮安飢吉水民胡有初山陽民羅振出穀千餘石賑濟命行人齎璽書旌為義民復其家杭州府志景泰五年七月浙江按察司副使羅箎奏勸民出粟賑濟箎因杭州荒歉乞準照江西例勸民出穀一千六百石以上者給冠帶千石以上者旌異之百石者免役已冠帶者八品以上三百石從七品以上至正六品六百石俱升一級不支俸等事奏下户部請如其言從之成化十二年冬十二月巡按御史吕鍾定擬救事宜奏略曰一民間無礙子弟有願納米充吏者都布按三司一百石各府并運司七十石司府經歷司理問所斷事司各縣并有品級文職衙門五十石雜職衙門三十石俱先查勘考試相應于缺糧倉分納米完日零次撥充俟豐年有積則止一閩中浙江見在不係存積鹽課一十五萬引每引米三斗五升于沿海缺糧倉分上納以是嵗八月風潮雨水泛溢故有是請明會典嘉靖八年令撫按官曉諭積糧之家量其所積多寡以禮勸借若有仗義出穀二十石銀二十兩者給與冠帶三十石三十兩者授正九品散官四十石四十兩者正八品五十石五十兩者正七品俱免雜泛差役出至五百石五百兩者除給與冠帶外有司仍于本家𥪡立坊牌以彰尚義又題準災傷地方軍民人等有能收養小兒者每名日給米一升埋尸一軀者給銀四分鄰近州縣不得閉糴十年奏準陜西災傷重大令各州縣官員戒諭富室將所積粟麥先扣本家食用其餘照依時價糶與飢民若每石減價一錢至五百石以上者給與冠帶一千石以上表為義門若民家有能自收養遺棄子女至二十口以上者給與冠帶觀承案貸富人粟以賑民而免其雜徭以為息此即周官國服為息之意也豈有取利二分之説哉青苗取民正是名同而實異者不得因此以病周官也右勸分周禮地官大司徒大荒則令邦國移民通財注移民辟災就賤其有守不可移者則輸之粟春秋定五年夏歸粟于蔡是也疏移民通財此謂兩事移民謂分口往就賤財是米穀也其有留守不得去者則賤處通穀米與之王氏昭禹曰移民若梁惠王移其民於河東通財若晉飢秦輸之粟髙氏愈曰大司徒荒政惟通財之道最為廣逺或以上之財利通之民或以民間之利自相通或以逺近之利相為通得通財之術而先王救荒之道其幾矣蕙田案此止云通財不及散利去幾者言通財則散利去幾之政在其中矣廩人若食不能人二釜則令邦移民就穀注就穀就都鄙之有者鄭氏鍔曰梁惠王移民就粟孟子譏之何耶蓋周官之民有田以耕其飢偶出于天時之水旱而已惠王不能制民之産凶嵗則移民是為無政秋官士師若邦凶荒則令移民通財蕙田案移民通財不在荒政十二之內而大司徒令邦國移民通財獨居舍禁弛力薄征緩刑之先士師若邦凶荒令移民通財則居糾守緩刑之先蓋散利以下荒政經常之法也移民通財必斯地所聚之財不足以贍斯民之急而後行之則荒政權宜之法也法雖出於權宜而其為利于民則甚大故周禮屢及之荒政主于聚萬民移民而使之不失其所民雖散猶不散也自移民之法不講民之流移在外者遂以失所或致生變故列代所載安集流民之事俱附見于此春秋隱公六年左氏傳京師來告飢公為之請糴于宋衛齊鄭禮也莊公二十有八年冬大無麥禾臧孫辰告糴于齊左氏傳禮也國語魯語魯飢臧文仲言于嚴公曰夫為四鄰之援結諸侯之信重之以婚姻申之以盟誓固國之艱急是為鑄名器藏寶財固民之殄病是待今國病矣君盍以名器請糴于齊公曰誰使對曰國有飢饉卿出告糴古之制也辰也備卿辰請如齊公使往從者曰君不命吾子吾子請之其為選事乎文仲曰賢者急病而讓夷居官者當事不避難在位者恤民之患是以國家無違今我不如齊非急病也在上不恤下居官而惰非事君也文仲以鬯圭與玉磬如齊告糴曰天災流行戾于敝邑飢饉荐降民羸幾卒大懼殄周公太公之命祀職貢業事之不共而獲戾不腆先君之敝器敢告滯積以紓執事以救敝邑使能共職豈唯寡君與二三臣實受君賜其周公太公及百辟神祗實永饗而賴之齊人歸其玉而豫之糴春秋僖公十三年左氏傳晉薦飢使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦于是乎輸粟于晉自雍及絳相繼命之曰泛舟之役十四年左氏傳秦飢使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損于怨而厚于冦不如勿與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉十五年左氏傳是嵗晉又飢秦伯又餼之粟曰吾怨其君而矜其民定公五年左氏傳歸粟于蔡以周亟矜無資榖梁傳諸侯無粟諸侯相歸粟正也孰歸之諸侯也不言歸之者専辭也義邇也蕙田案齊桓葵丘之會申遏糴之禁而春秋所載告糴歸粟之事列國時或有之蓋周官通財之教猶未逺也孟子梁惠王曰寡人之於國也盡心焉耳矣河內凶則移其民于河東移其粟于河內河東凶亦然注言凶年以此救民也察鄰國之政無如寡人之用心者注言鄰國之君用心憂民無如已也朱子曰移民以就食移粟以給其老稚之不能移者惠王不能制民之産又使狗彘得以食人之食至于民飢而死猶不知發則其所移持民間之粟而已漢書髙祖本紀二年六月關中大飢米斛萬錢人相食令民就食蜀漢景帝本紀元年春正月詔曰間者嵗比不登民多乏食夭絶天年朕甚痛之郡國或磽狹無所農桑􅌛畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寬大地者聽之武帝本紀建元三年春河水溢于平原大飢人相食賜徙茂陵者户錢二十萬食貨志山東被水災民多飢乏于是天子遣使虛郡國倉稟以振貧猶不足又募豪富人相假貸尚不能相救乃徙貧民于關以西及充朔方以南新秦中七十餘萬口衣食皆仰給于縣官數嵗貸與産業使者分部護冠蓋相望費以億計武帝本紀元鼎二年夏大水關東餓死者以千數秋九月詔曰仁不異逺義不辭難今京師雖未為豐年山林池澤之饒與民共之今水潦移于江南迫隆冬至朕懼其飢寒不活江南之地火耕水耨方下巴蜀之粟致之江陵遣博士中等分循行諭告所抵無令重困元帝本紀初元元年九月關東郡國十一大水飢或人相食轉旁郡錢穀以相救平帝本紀元始二年四月郡國大旱蝗民流亡罷安定呼沱苑以為安民縣起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犁牛種食又起五里于長安城中宅二百區以居貧民後漢書章帝本紀元和元年二月甲戌詔曰自牛疫已來穀食連少其令郡國募人無田欲徙它界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種餉貰與田器勿收租五嵗除算三年其後欲還本鄉者勿禁樊準傳永元之初連年水旱災異郡國多被飢困準上疏曰伏見被災之郡百姓凋殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事遣使持節慰安尤困乏者徙置荆揚熟郡既省轉運之費且令百姓各安其所如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也願以臣言下公卿平議太后從之和帝本紀永元六年三月詔流民所過郡國皆實稟之其有販賣者勿出租稅又欲就賤還歸者復一嵗田租更賦十五年春閏月乙未詔流民欲還歸本而無糧食者過所實稟之疾病加致醫藥其不欲還歸者勿強安帝本紀永初元年九月調揚州五郡租米贍給東郡濟隂陳留梁國陳國下邳山陽七年九月調零陵桂陽丹陽豫章會稽租米賑給南陽廣陵下邳彭城山陽廬江九江飢民晉書食貨志嘉平四年關中飢宣帝表徙冀州農夫五千人佃上邽魏書明元帝本紀神瑞二年帝以飢將遷都于鄴用博士崔浩計乃止于是分簡尤貧者就食山東敕有司勸課留農者孝文帝本紀太和十一年七月詔曰今年穀不登聽民出關就食遣使者造籍分遣去留所在開倉賑恤九月詔曰去夏以嵗旱民飢須遣就食舊籍雜亂難可分簡故依局割民閲户造籍欲令去留得實賑貸平均然乃者以來猶有餓死衢路無人收識良由本部不明籍貫未實廪恤不周以至于此朕猥居民上聞用慨然可重遣精檢勿令遺漏東陽王丕傳文明太后引見公卿于皇信堂太后曰京師旱儉欲聽飢貧之人出關逐食如欲給過所恐稽延時日不救災窘若任其外出復慮姦良難辨卿等可議其所宜丕議諸曹下大夫以上人各將二吏别掌給過所州郡亦然不過三日給之便訖有何難也髙祖從之四日而訖宣武帝本紀延昌元年四月戊辰詔河北民就穀燕恆二州辛未詔飢民就穀六鎮周書武帝本紀建德三年十月詔蒲州民邅飢乏絶者令向郿城以西及荆州管內就食隋書食貨志開皇十四年關中大旱人飢上幸洛陽因令百姓就食從官並準見口賑給不以官位為限舊唐書髙宗本紀咸亨元年天下四十餘州旱及霜蟲百姓飢乏關中尤甚詔令任往諸州逐食仍轉江南租米以賑給之永隆二年是年改元開耀八月河南河北大水許邅水處往江淮已南就食册府元龜開元十四年十一月詔曰近聞河南宋沛等州百姓多有沿流逐熟去者須知所詣有以安存宜令本道勸農事與州縣檢責其所去及所到户數奏聞舊唐書玄宗本紀開元十五年河北飢轉江淮之南租米百萬石以賑給之册府元龜後周廣順元年八月契丹瀛莫幽州界大水飢饉流散襁負而歸者不可勝計比界州縣亦不禁止太祖愍之詔沿邊州郡安恤流民仍口給斗粟前後繼至數十萬口宋史太祖本紀乾德二年四月靈武飢轉涇粟以餉開寶六年二月曹州飢漕太倉米二萬石振之太宗本紀雍熙二年三月江南民飢許渡江自占王圻續通考天聖七年閏二月詔河北轉運司契丹流民其令分送唐鄧襄汝州以間田處之仍令所過人給米二升初河北轉運司言契丹大飢民流過界河上謂輔臣曰雖境外之民皆朕赤子可賑救之文獻通考慶歷八年河北大水民流就食京東者不可勝數知青州富弼擇所部豐稔者三州勸民出粟得十五萬斛益以官廪隨所在貯之擇公私廬舍十餘萬區散處其人以便薪水官吏自前資待缺寄居者皆給之祿使即民所聚選老弱者廪之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞于朝率五日輒遣人以酒肉糗飯勞之人人為盡力流民死者為大冡葬之謂之叢冡自為文祭之及流民將復其業又各以逺近受糧凡活五十餘萬人募為兵者又萬餘人前此救災者皆聚民城郭中煮粥食之飢民聚為疾疫及相蹈藉死或待次數日不食得粥皆僵仆名為救人而實殺之弼所立法簡便周至天下傳以為法富弼乞分給河北流民田土劄子臣昨在汝州竊聞河北流民來許汝唐鄧州界逐熟者甚多臣以朝廷前許請射係官田土後却不令請射盡須發遣歸還本貫臣訪聞流民必難發遣得回既已流移至此又却不得田土徒令狼狽道路轉見失所遂専牒本州通判張恂立便往州界諸縣流民聚處一一相度或發遣情願人歸還本貫或放令前去别州或相度口數給與民田土或自令樵漁採捕或計口支散官粟諸般救濟庶幾稍可存活內只有給田一項違著朝廷後來指揮比欲奏候朝旨又為流民來者日益多深恐救恤稍遲轉有死損遂且用上項條件施行去後方具奏聞尋準中書劄子奉聖旨一依奏陳事理其後來者即教不得給田候春暖勸諭令歸上路後方知其餘州軍所到流民不拘新舊並只用元降朝旨盡不許給與田土臣其時以急于赴召不及再有奏陳自襄城縣至南薰門共六程臣見緣路流民大小車乘及驢馬馱載以至擔仗等相繼不絶臣每逢見逐隊老小一一問當及令逐旋抄劄子只路上所逢者約共六百餘户四千餘口其逐州縣鎮以至道店中已安下臣不見者并臣于許州驛中住却一日路上之人臣亦不見者比臣曽見之數恐又不下一二百户二三千口都計約及八九百户七八千口其前後已過并今未來及有往唐鄧萊州等處臣所不見者又不知其數多少扶老攜幼纍纍滿道寒飢之色所不忍見亦有病而死者隨即埋于道傍骨肉相聚號泣而去臣親見而問得者多是鎮趙邢洺磁相等州下等人户以十分為率約四五分並是鎮人其餘五六分即共是趙州與邢洺磁相之人又十中約六七分是第五等人三四分是第四等人及不濟户與無土浮客即絶無第三等已上之家臣逐隊遍問因甚如此離鄉土逺來它州其間甚有垂泣告者曰本不甚拋離墳墓骨肉及破壞家産只為災傷物貴存濟不得憂慮餓殺老小所以須至趂斛斗賤處逃命又問得有全家起離來更不歸者亦有減人口暫來逐熟候彼中無災傷斛斗稍賤即却歸者亦有去年先令人來請射或買置田土稍有準備者亦有無準備望空來者大約稍有準備來無一二餘皆茫然並未有所歸只是路上逐旋問人斛斗賤處便去臣竊聞有人聞于朝廷云流民皆有車仗驢馬蓋是上等人户不是貧民致朝廷須令發遣却歸本貫此説蓋是其人只以傳聞為詞不曽親見親問但知却有車乘行李次第頗多便稱是上等之人臣每親見有七八輛大車者約及四五十家二百餘口四五輛大車者約及三四十家一百餘口一兩輛大車者約及五七家五七十口其小車子及驢馬擔仗之類大抵皆似大車並是彼中鄉村相近鄰里或出車乘或出驢牛或出繩索或出掩蓋之物遞相併合各作一隊起來所以行李次第如上等人户也今既是貧窮之家決意離去鄉土逃命逐熟而朝廷須令發遣却回必恐有傷和氣臣亦曽仔細説諭云朝廷恐你拋離鄉井欲擬發遣却歸河北不知如何其丈夫婦人皆向前對曰便是死在此處必更難歸兼一路盤纒已有次第如何歸得除是將來彼中有可看望才有歸者也此已上事便是臣親見親問所得最為詳悉與夫外面所差體究之人不同簿尉幕職官畏懼州府州府畏懼提轉提轉畏懼朝省而不敢盡理而陳述或心存諂佞不肯説盡災患之事或不切用心自作鹵莽申陳不實者萬不侔也伏望聖慈早賜指揮京西一路如流民到處且將係官荒間田土及見佃人占剩無稅地土産有心力亷公官員四散分俵各令住田更不得逼逐發遣却歸河北其餘或與人家作客或自能樵漁採捕或支官粟計口養飼之類更令中書檢詳前後條約疾速嚴行指揮約束所貴趂此日月尚淺未有大段死損之人可以救恤得及富弼支散流民斛斗畫一指揮行移當司昨為河北遭水失業流民擁併過河南于京東青淄濰登萊五州豐熟處逐處散在城郭鄉村不少當司雖已諸般擘畫採取事件指揮逐州官吏多方安泊存恤救濟施行本使體量尚恐流民失所尋出揭告諭文字送逐州給散與諸縣令逐耆長將告諭指揮鄉村等第人户并客户依所定石斗出辦米豆數內近州縣鎮只于城郭內送納其去州縣鎮城逺處只于逐耆令耆長置歷受納于逐耆第一等人户處圖那房屋盛貯收附封鎖施行去訖自後據逐州申報已告諭到斛米數目受納各有次第今體量得飢餓死損須至令上項五州一例于正月一日委官分頭支散上件勸諭到斛斗救濟飢民者一請本州才候牒到立便酌量遂縣耆分多少差官每一官令専十耆或五七耆據耆分合用員數除逐縣正官外請于見任并前資寄居及文學助教長史等官員內須是揀擇有行止清亷幹當得事不過犯官員仍勘會所差官員本貫將縣分交互差委支散免致所居縣分親故顔情不肯盡公及將封去帖牒書填定官員職位姓名所管耆分去處給與逐官收執火急發遣往差定縣分計會縣司畫時將在縣所收贓罰錢或頭子錢并檢取逺年不用故紙賣錢收買小紙依封去式樣字號空歇雕造印板酌量流民多少寬剩出給印押歷子頭各于歷子後粘連空紙三兩張便令差定官員令本縣約度逐耆流民家數分劈歷子與所差官員便令親自收執分頭下鄉勒耆壯引領排門點檢抄劄流民每見流民逐家盡底喚出本家骨肉數目當面審問的實人口填定姓名口數逐家便各給歷子一道收執照證準備請領米豆即不差委公人耆壯抄劄别致作弊虛偽重疊請却歷子一指揮差委官抄劄給歷子時仔細點檢逐處流民如內有雖是流民見今已與人家作客鋤田養種及有錢本機織販舂諸般買賣圖運過日不致失所人更不得一例劄姓名給與歷子請領米豆一應係流民雖有屋舍權時居住只是旋打刈柴草日逐求口食人等並盡底抄劄給與歷子令請領米豆一應有流民老小羸疲全然單寒及孤獨之人只是尋討乞丐安泊居止不然等人委所差官員劈畫歸著耆分或神廟寺院安泊亦便出給歷子令請米豆不得謂見難為拘管輒敢遣棄却致拋擲死損請提舉官常切覺察一應係土官貧窮年老殘患孤獨見求乞貧子等仰抄劄流民官員躬親檢點如别不是虛偽亦各依歷子令依此請領米豆一指揮差委官員須是于十二月二十五日已前抄劄集定流民家口數給散歷子一流民所支米豆十五嵗已上每人日支一升十五嵗已下每日給五合五嵗已下男女不在支給仍歷子頭上分明細算定一家口數合請米豆都數逐旋依都數支給所貴更不臨時旋計者一緣已就民抄劄見流民逐家口數及嵗數則支散日更不令全家到來只每家一名親執歷子請領一逐官如管十耆即每日支兩耆逐耆并支五日口食候五日支遍十耆即却從頭支散所貴逐耆每日有官員躬親支散如管五七耆者即將耆分大者每日支散一耆耆分小者每日支散兩耆亦須每日一次支遍逐次併支五日口食仍預先有村莊剩出曉示及令本耆壯丁四散各報流民指定支散日分去處分明開説甚字號耆分仍仰差去官員須是及早親自先到所支斛斗去處等候流民到來逐旋支散才候支絶一耆速往下次合支耆分不得自作違慢拖延過時别至流民歸家遲晚道途凍露一指揮差管官員相度逐處受納下米豆如內有在耆分遙逺第一等户人家收附恐流民所去請領遙逺即勒耆壯量事圗那車乘般赴本耆地分中心穩便人家房屋室內收附就彼便行支散貴要一耆之內流民盡得就近請領一指揮所差官員除抄劄籍定給散流民外如有逐旋新到流民並須官員親到審問仔細點檢本家的實口數安泊去處如委不是重疊虛偽立便給與歷子據所到口分起請如有已得歷子流民起移仰居停主人畫時令流民將原給歷子于監散官員毁抹若是不來申報及稱帶却歷子並仰量行科決不得鹵莽重疊印給歷子亦不得阻滯流民一逐耆盡各均勻納下斛斗切慮流民于逐耆安泊不均仰縣司勘會據流民多處耆分酌量人數發遣趲併于少處耆分安泊令逐耆均勻支散救濟若是流民安泊處穩便不願起移即趲併别耆斛斗就便支俵不得抑勒流民須令起移一州縣鎮城郭內流民若差委本處見任官員亦先且躬親排門抄劄逐户家口數依此給與歷子每一度併支五日米豆候食盡挨排日分接續支給米豆一般施行一逐州除逐處監散官員仍請委通判或選差清幹職官一員往本州界內往來都大提舉諸縣支散米豆官吏仍點檢逐耆元納并逐官支散文歷一依逐件鈐束指揮施行仍親到所支散米豆處仔細體問流民所請米豆委的均濟别無漏落如有官員弛慢不切用心信縱手下公人作弊減剋流民合請米豆不得均濟即密具事由申報本州别選差官充替訖申當司不得蓋庇一所支斛斗如州縣內支絶已納到告論斛斗外有未催到數目便宜于省倉斛斗內權時借支據見欠斛斗如未足處亦逐旋請緊切催促不得闕絶支借閃誤流民一每官一員在縣摘道手分斗子各一名隨行幹當仍給升斗各一隻乃差本縣公人三兩人當直如在縣公人數少即權差壯丁亦不得過三人一所差官員除見任官外應係權差請官如手下幹當人并耆壯等及流民內有作過者本官不得一面區分具事由押送本縣勘斷施行一權差官每月于前項贓罰錢內支給食直錢五貫文見任官不得一例支給一權差官已有當司封去帖牒若差見任官員即請本州出揭文示幹當其賞罰一依當司封去權差官帖牒內事理施行一才候起支當司必然别州差官遍詣逐州逐縣逐耆點檢如有一事一件違慢本州承牒手分并縣司官吏必然勘罪嚴斷的不虛行指揮一逐州縣鎮候差定官員將印行指揮畫一抄劄一本收逐官收執照會施行一勘會二麥將熟諸處流民盡欲歸鄉尋指揮逐州并監散官員將見今籍定流民據每人合請米豆數目自五月初一日算至五月終一併支與流民充路糧令各任便歸鄉一指揮出榜青淄等州河口曉示與免流民稅渡錢仍不得邀難住滯一指揮青淄等州曉示各道店不得要流民房宿錢右具如前事須各牒青淄濰登萊五州候到各請一依前項逐件指揮施行訖報所有當司封去帖牒如右剩數却請封送當司不得有違富弼救濟流民劄子臣復奉聖旨取索劈畫救濟過流民事件今節略編作四册具狀繳奏去訖臣部下九州軍其間近河五州頗熟遂醵于民得粟十五萬斛只令人户就本村耆隨處散納貴不傷士民又先時已于州縣城鎮及鄉村抄下舍宇十餘萬間流民來者隨其意散處民舍中逐家給一歷歷各有號使不相侵欺仍歷前計定逐家口數及合給物數令官員詣逐廂逐耆就流人所居處每人日給生豆米各半升流民至者安居而日享食物又以其散在村野薪水之利甚不難致以此直養活至去年五月終麥熟仍各給與一去路糧而遣歸而按籍總三十餘萬人此是以必死之中救得活者也與夫只于城中煮粥使四逺飢羸老弱每日奔走屯聚城下終日等候或得或不得閃誤死者大不侔也其餘未至羸病老弱稍營運自給者不預此籍然亦遍曉示五州人民應是山林河泊有利可取者其地主不得占吝一任流民採掇如此救活者甚多即不見數目山林河泊地主寧非所損然損者無大害而流民獲利者便活性命其利害皎然也又減利物廣招兵從一萬餘人有四五口及四五萬人大約通計不下四五十萬人生全傳云百萬者妄也謹具劄子奏聞蕙田案古今救濟流民之法以富鄭公為第一觀其指揮行移極簡要又極周密可云才大而心細矣宋史仁宗本紀皇祐二年三月詔兩浙流民聽人收養荒政考略滕元發知鄆州嵗方飢乞準南米二十萬石為備百姓安之次年大稔會淮南京東皆大飢元發召城中富民與約曰流民且至無以處之則疾疫起併及汝矣吾得城外廢營地欲為席屋以待之民曰諾為屋二千五百間一夕而成流民至以次授地井竈器用皆具以兵法部勒少者炊壯者樵老者休民至如歸上遣工部郎中王右按視廬舍道巷引繩綦布肅然如營陳右大驚圗上其事有詔褒美蓋活五萬人云元發為倡義富户計田百𤱔出穀十石籍得米二萬有竒為粥以濟其病弱者督令醫治強可任工役者使營舍學宫所活五六萬人四方聞風歸之如市祁氏爾光曰滕達道之處流民大類富鄭公富散而不擾滕聚而能整皆可法也宋史寧宗本紀嘉定二年六月命江西福建二廣豐稔諸州糴運以給臨安仍償其費王圻續通考嘉定十七年袁甫進區處流民故事曰臣竊為區處流民之䇿惟富弼之法最為簡要所謂簡要之策惟日散處其民於下而總提其綱於上而已竊聞金陵諸邑流民羣聚皆來自淮西荷戈持刃白晝肆掠動輒殺傷沿江出兵驅之其在句容之境者軼入金壇若宣城若池陽若當塗所在蟻聚剽劫成風逃亡之卒皆入其黨江南姦民率多附和目前勢已若此冬杪春初日月尚長蔓延不已各將潰裂四出不可收拾臣愚欲乞朝廷行下督府及諸閫與凡安撫總漕諸司作急措置自一路而推之諸路由諸路而推之諸郡每處流民隨所在分之凡贍養之費惟分則易供居止之地惟分則易足此非臣之臆説也弼擇所部五州勸民出粟得十五萬斛益以官廪隨所在貯之又擇公私廬舍十餘萬區散處其人以便薪水弼之所作可謂委曲詳盡矣今日果能推行此䇿非但勸民出粟而已或撥上供之數或撥樁管之錢或乞科降則上下當相視如一家或請團給則彼此當聨絡為一體而所謂團給者又不止一途而已能勞苦者庸其力有伎藝者食其業其間有為士者則散於庠序為商者則使之貿遷心有所繫而姦無所萌此皆分説也分之愈多則養之愈易而其要在督府制閫以及總漕諸司為之領袖而已是故民貴乎分而權貴乎合所謂散處其民而總提其綱者正謂此也臣願朝廷使長吏任責一如青州故事流民幸甚宋史理宗本紀嘉熙元年春正月詔兩淮荆襄之民避地江南沿江州縣間有招集振恤尚慮恩惠不周流離失所江隂鎮江建寧太平池江興國鄂嶽江陵境內流民其計口給米期十日竣事以聞金史世宗本紀大定三年二月上謂宰相曰灤州飢民流散逐食甚可矜恤移于山西富民贍濟仍于道路計口給食三月詔臨潢漢民逐食于會寧府濟信等州十二月詔流民未復業增限招誘二十八年十一月詔南京大名府等處避水逃移不能復業者官與津濟錢仍量地頃𤱔給以耕牛章宗本紀明昌三年七月敕尚書省曰飢民如至遼東恐難遽得食必有飢死者其令散糧官問其所欲居止給以文書命隨處官長計口分散令富者出粟養之限以兩月其粟充秋稅之數宣宗本紀貞祐三年四月諭田琢留山西流民少壯者充軍老幼者令就食于邢洺等州欲趣河南者聽興定五年八月上諭樞密河北艱食民欲南來者日益多速令渡之母致殍死元史食貨志中統二年遷伊聶濟地貧民就食河南平陽太原世祖本紀至元七年八月諸王拜達哈部曲告飢命有車馬者徙居鴻和爾玉良之地計口給糧無車馬者就食肅沙甘州二十四年閏二月以女直碩達勒達部連嵗飢荒移粟賑之二十五年七月諸王伊濟部曲飢分五千户就食濟南續文獻通考洪武七年詔各處人民流移願歸或身死拋下老幼還者聽從其便鰥寡篤廢之人貧難存活者有司勘實官給衣糧養贍通紀會纂永樂三年山西民飢流徙至南陽諸郡不下十餘萬口有司軍衛各遣人捕逐民死亡者多上諭夏原吉曰民飢流移豈其得已仁人君子所宜矜念今乃驅逐使之失所不仁甚矣其即遣官加意撫綏發倉廪給之隨所至居住有捕治者罪之先憂集成化初陜西至荆襄唐鄧一路皆長山大谷綿亘千里所至流逋藏聚為梗劉千斤因之作亂至李鬍子復亂流民慮百萬都御史項忠下令有司逐之道死者不可勝計祭酒周洪謨憫之乃著流民説略曰東晉時廬松滋之民流至荆州乃僑置松滋縣於荆江之南陜西雍州之民流聚襄陽乃僑置南雍州於襄水之側其後松滋遂𨽻于荆州南雍遂并於襄陽迄今千載寧謐如故此前代處置得宜之效今若聽其近諸縣者附籍逺諸縣者設州縣以撫之置官役編里甲寬徭役使安生理則流民皆齊民矣何以逐為李賢深然其説至成化十一年流民復集如前賢乃援洪謨説上之上命右副都御史原傑往蒞其事傑乃偏歷諸郡縣深山窮谷宣上德意延問流民父老皆欣然願附籍為良民於是大會湖陜河南三省撫按合謀僉議籍良得十二萬三千餘户皆給與間曠田𤱔令開墾以供賦役建設州縣以統治之遂割竹山之地置竹溪縣割鄖津之地置鄖西縣割漢中洵陽之地置白河縣又升西安之商縣為商州而析其地為商南山陽二縣又析唐縣南陽汝州之地為桐柏南台伊陽三縣使流寓土著參錯而居又即鄖陽城置鄖陽府以統鄖及竹山竹溪鄖西房上津六縣之地又置湖廣行都司及鄖陽衛於鄖陽以為保障之地經畫已定乃上言民猶水也水之就下猶民之秉彛而好德也曩脅從之黨豈皆盜耶設若置立州縣簡任賢能輕徭薄稅先以羈縻其心佩犢帶牛漸以化成其俗則荆榛疆土入貢於版籍之間反側蒼生安枕于閭閻之下撫安之䇿莫良於此因妙選賢能薦為郡邑守復慮新設郡縣漫無統紀薦御史吳道宏代已任總治三省上悉從之擢道宏大理少卿撫治三省八府州縣進傑右都御史尋遷南京兵部尚書漢南諸郡縣之民聞之莫不流涕皆為立祠焉泳化篇成化二十一年詔陜西山西河南災傷軍民全家逃往鄰境南山漢中徽州商洛湖廣荆襄四川利順等處趂食求活者情實可憫各該巡撫巡按司府州縣衛所官不許趕逐務要善加撫恤設法賑濟安插得所候麥熟官為應付口糧復業免其糧差三年本處不許科擾及追逼私債𢎞治十七年令撫按安嚴督所屬清察地方流民久住成家不願回籍者令附籍優免糧差三年如隻身無産并新近逃來軍匠等籍遞回原籍仍從實具奏稽考陳氏芳生曰民之得免於流與夫既流而得還其利害不啻什伯也當民之未流有以賑撫之使之得免於流與夫流之後欲以招徠之使之復還其舊其繁簡難易尤不啻什伯也然而民之不免於流當事者必待民之既流而始以勞來還定安集見功皆由於預防之道未得也古人三年耕必有一年之蓄九年耕必有三年之蓄誠得循良有司平時預為講求事事為生民計久逺不為竭澤之漁不為速化之術而上下交必不以深文為之掣肘使得専心致志如保赤子者十年二十年如此而吾境中縱或間有一二年之水旱當必不至于流亡又何必問所以撫流民哉設或未然前乎我久矣泄泄從事其為上下左右者於民生休戚皆漠然無與于已既已釀成流亡之局而忽又繼之以水旱而我適當其時不能禁民之不流又或者鄰邑鄰郡偶有一二年方數百里千餘里之飢饉彼不能使其民之不流而我又何能禁其流民之不至於此則凡所以綜理而撫綏之者不可不早為之區畫矣大學衍義補邱氏濬曰人生莫不戀土非甚不得已不肯舍而之他也苟有可以延性命度朝夕孰肯捐家業棄墳墓扶老攜幼而為流浪之人哉人而至此無聊甚矣夫有土此有民徒有土而無民亦惡用是土為哉是以知治本者恆於斯民完聚之時預為一旦流離之慮必擇守令必寬賦役必課農桑汲汲然惟民食之為急先水旱而為水旱之備未飢饉而有飢饉之儲此無他恐吾民之一旦不幸無食而至于流離也夫蓄積多而備先具則固無患矣若夫不幸蓄積無素雖蓄積而連年荒歉請之官無可發勸之民無可貸乞諸鄰無可應將視其民坐守枵腹以待斃乎無亦聽其隨處趁食以求生也然是時也赤地千里青草不生市肆無可糶之米旅店無充飢之食民之流者未必至所底止而為途中之殍多矣然則如之何而可曰國家設若不幸而有連年之水旱量其勢必至飢饉則必豫為之計通行郡縣察考有無蓄積於是量其逺近多寡或移民以就粟或轉粟以就民或髙時估以招商或發官錢以市糴不幸公私乏絶計無所出知民不免於必流則亟達朝廷豫申會府多遣官屬分送流氓縱其所如隨處安插所至之處請官庾之見儲官為給散不責其償借富民之餘積官為立券估以時值此處不足又聽之他既有底止之所苟足以自存然後校其老壯強弱老而弱者留于所止之處壯而強者量給口糧俾歸故鄉官與之牛具種子趁時耕作以為嗣嵗之計待嵗時可望然後搬挈以歸如此則民之流移者有以護送之使不至於潰散而失所有以節制之使不至於劫奪而生亂又有以還定安集之使彼之室家已破而復全我之人民已散而復集是雖所以恤民之災患亦所以弭國禍亂也臣嘗因是而論之周宣王所以中興者以萬民離散不安其居而能勞來還定安集之也晉惠帝所以分崩離析者以六郡薦飢流民入于漢川者數萬家不能撫恤之而有李特之首亂也然則流民之關係亦不小哉蕙田案明之亡亡于盜賊盜賊之興由於飢饉薦臻民流移于四方而有司莫為之區處也民莫不安土而重遷非計無所出誰肯舍其鄉井廬墓棄其親戚故舊而轉徙于外者惟其官吏無可告訴比鄰無可假貸束手待斃朝不及夕始不得已而為趁食之舉倘所在長吏有富彥國滕達道其人者為之計口而賑給分地而安插俾有更生之樂而無離散之苦則流民皆良民也不然而進無所往退無所歸弱者有轉死而已耳強者有劫奪而已耳大盜因之亡不旋踵揆厥所由固人事之失也邱瓊山生于有明全盛之時而於周宣晉惠興亡之故反覆指陳如此後百餘年其語卒驗可謂能逺慮者矣右移民通財吕氏祖謙論荒政荒政條目始于黎民阻飢舜命棄為后稷播時百穀其詳見于生民之詩到得後來如所謂禹之水湯之旱民無菜色其荒政制度不可考及至成周自大司徒以荒政十有二聚萬民其詳又始錯見于六官之書然古者之所謂荒政以三十年之通制國用則有九年之蓄遇嵗有不登為人主者則貶損減省喪荒之式見于小行人之官札喪凶荒厄窮為一書當時天下各自有廪藏所遇凶荒則賑發濟民而已當時措置與後世不同所謂移民平糴皆後世措置且自周論之太宰以九式均節財用三曰喪荒之式又遺人掌縣鄙之委積以待凶荒而大司徒又以薄征散利凡諸候莫不有委積以待凶荒凶荒之嵗為符信發粟賑飢而已當時斂散輕重之式未嘗講侯甸采衛皆有饋遺不至于穀價翔踴如弛張斂散之權亦不曽講惟到春秋戰國王政既衰秦飢乞糴于晉魯飢乞糴于齊嵗一不登則乞糴于鄰國所謂九年之制度已自敗壞見管子輕重一篇無慮百千言不過君民互相攘奪收其權于君上已非君道所謂荒政一變為斂散輕重先王之制因壞到後來斂散輕重之權又不能操所以啓姦民幸凶年以謀禍害民轉死于溝壑至此一切急迫之政五代括民粟不出粟者死與斂散輕重之法又殆數等大抵其法愈壞則其術愈粗論荒政古今不同且如移民易粟孟子特指為苟且之政已非所以為王道秦漢以下却謂之善政漢武帝詔令水潦移于江南方下巴蜀之粟致之江陵唐西都至嵗不登關中之粟不足以供萬乘荒年則幸東都自髙祖至明皇不特移民就粟其在髙宗時且有逐糧天子之語後來玄宗溺于可安不出長安以此論之時節不同孟子所謂苟且之政乃後世所謂善政且三十年之通制國用須必世百年而可行亦未易及此後之有志之士如李悝之平糴法非先王之政豐年收之甚賤凶年出之賑飢此又思其次之良規到得平糴之政不講一切趣辦之政君子不幸遇凶荒之年不得已而講要之非常行使平糴之法常行則穀價不貴四民各安其居不至于流散各有以自生養至于移民移粟不過以飢殍之養養之而已若設糜粥其䇿又其下者大抵荒政統而論之先王有預備之政上也使李悝之政修次也所在蓄積有可均處使之流通移民移粟又次也咸無焉設糜粥最下也雖然如此各有差等有志之士隨時理會便其民戰國之時要論三十年之通計此亦虛談則可以行平糴之法如漢唐坐視無策則移民通財雖不及先王亦不得不論又不得已而為糜粥之養隨所寓之時就上面措置得有法亦可大抵論荒政統體如此今則所論可行者甚多試舉六七條且如漢載粟入關中無用傳後來販粟者免稅此亦可行之法此法一行米粟流通如後世勸民出粟散在鄉里以田里之民令豪户各出穀散而與之此一條亦可行又如富鄭公在青州處流民于城外所謂室廬措置種種有法當時寄居遊士分掌其事不以吏胥與于其間又如趙清獻公在會稽不減穀價四方商賈輻輳此一條亦是可行之法凡六七條皆近時可舉而行之自此推之不止六七條亦見歷世大綱須要參酌其宜于今者大抵天下事雖古今不同可行之法古人皆施用得遍了今則但舉而措之而已今所論荒政如平糴之政條目尤須講求自李悝平糴至漢耿夀昌為常平倉元帝以後或廢或罷到宋朝遂為定制仁宗之世韓魏公請罷鬻沒官之田募人承佃為廣惠倉散與鰥寡孤獨慶歷嘉祐間既有常平倉又有廣惠廣濟倉賑恤所以仁宗德澤洽于民三倉蓋有力至王荆公用事常平廣惠量可以支給盡糶轉以為錢變而為青苗取三分之息百姓遂不聊生廣惠之田賣盡雖得一時之利要之竟無根底元祐間雖復章惇又繼之三倉又壞論荒政者不得不詳考朱子與王漕齊賢書今日救荒恤民之急則不過視部內被災之郡使之實檢放捐逋租寬今年夏秋二稅省限各展一月具以條目言之于朝而其可直行者一面行下然後謹察州縣奉行之勤惰得失而誅賞之使愁嘆無聊之民猶復有所顧藉而不忍肆其猖狂悖亂之心以全其首領保其家族靖其鄉閭此則今日救荒恤民之急務也此外則視荒損尤甚之鄉使之禾米得入而不得出有餘之處則許其通融糴販稍勸富民平價出糶勸民廣種大小蕎麥蔔芋蔬菜之屬以相接續其貧甚者更使互相保而别召稅户保之借以官本收成之後祗納元錢亦一助也此等為災傷甚處乃行之想亦不至甚多也朱子語類自古救荒自有兩説第一是感召和氣以致豐穰其次只有儲蓄之計若待他餓時理會更有何䇿或説救荒賑濟之意固善而取出之數不節不可黃直卿云制度雖只是這箇制度用之亦在其人如糴米賑飢此固是但非其人則做這事亦將有不及事之患曰然嘗謂為政者當順五行修五事以安百姓若曰賑濟于凶荒之餘縱饒措置得善所惠者淺終不濟事賑飢無竒䇿不如講求水利到賑濟時成甚事王氏廷相答李獻忠救荒書堯湯水旱民無菜色由備預有素荒無事于救也成周大司徒以荒政十二聚民其次矣以後世苟且之政視之亦邈乎不可及者故曰救荒無善政蓋民之食至于荒歉勢危迫矣安得從容和平之意行之伏承執事以救荒事宜下詢敬疏其古今所可通行者數條用備採擇惟教之當夫荒歉之時百姓乏食自活不暇矣而官司不省事者遇災不行申達既災之後猶照舊貫追徴稅糧是已病羸之人而服勞苦安得不斃故流殍載塗閭井蕭然禍民深矣停免賦稅宜為先計一也荒年不足者多係貧下之户豪族大家必有蓄藏若勸諭之法不行使官司米斛不多雖有銀錢無所糴買亦將無以受實惠矣故立勸賞約束如冠帶義民之類令之輸穀助荒以續官司不及二也穀少則價貴商賈細民貪利必輦賤處之穀以售于荒歉之鄉若官司惡其貴而減其值則商賈聞風不來穀無由至為害大矣當出榜禁諭寧許有增不許有減則諸處商穀必為輻輳價不減而自平矣三也民既流聚他所若無處置之法則止棲無依必至困極為盜豐荒之民俱斃矣富鄭公在青州河朔之民流來日衆公乃使之散入林落坊村釋寺及公私室屋各隨所宜居之得公私粟二十餘萬斛計以簿書約以日期出納之詳一如官府比麥熟遣歸得活者數百萬口此處置流民于豐稔之州四也細民豐收之年公私尚多逋欠况比飢憊焉能還償可逐處出榜禁革但係公私一切逋債俱為停止無得催逼以致流亡五也賑濟之法貴在貧者蒙惠使主者不得其人則吏胥作弊户籍無實富者有盈釡之資而貧者有赤手之嗟矣故當選委才能之官以主其事使在籍皆貧下之人而在官吏胥之徒不得以肆其姦則濟荒雖無善政而亦稍為得法六也荒嵗已矣及今田禾有望亦可安集但百姓業已缺食焉得種子可于口食之外再有牛具穀種之給使本鄉有所顧戀不至盡為溝壑之瘠七也大抵救荒之䇿先王三年九年農有餘積上也平糴常平義倉社倉預備之政次也移民就食煮哺糜粥下也今所請教雖非預備之善亦隨事措處之法救荒之論不可不講者但即今三月將屆田野之外菜芽木葉皆可採食若銀米散賑得宜再有牛具種子之給未流者必不輕離鄉土而已流亡者亦聞風而歸矣其餘後時緩不及事者不必講可也林希元荒政叢言救荒有二難曰得人難審户難有三便曰極貧民便賑米次貧民便賑錢稍貧民便賑貸有六急曰垂死貧民急飯粥疾病貧民急醫藥起病貧民急湯水既死貧民急墓瘞遺棄小兒急收養輕重繫囚急寬恤有三權曰借官錢以糶糴興工作以助賑貸牛種以通變有六禁曰禁侵漁禁攘盜禁遏糴禁抑價禁宰牛禁度僧有三戒曰戒遲緩戒拘文戒遣使晝簾緒論賑恤篇嵗獲大有家用平康不惟民之幸實令之幸一罹災歉何事不生若流離若剽奪若死者相枕藉啼飢連阡陌豈非令之責哉故不幸而疫癘倐興則當遣吏抄劄家數人口命醫給藥支錢付米其全家在寢者官為庸倩丐徒看值每日兩次點察其因病不救者官為辦給函木仍支錢與之津送或不幸而盜賊竊發則當下都申嚴保伍每五家為一甲五小甲為一大甲保長統之有警則鳴梆集衆協力勦捕捕到則官支犒賞激厲其餘若乞兵防拓若出榜撫諭皆當隨宜行之其有水火挺災人民離散者當稟白州郡借貸錢米人各以若干米給之若干錢貸之使之整理室廬興復生業不贍則咨目遍白不被害上户量物力借貸併與貸給齊民許其一月之後日償若干官却以其所償者償之上户償之州家此䇿不虧官而便民最為盡善若但知賑給則恐如曽南豐所謂相率日待二升之廪于上勢不暇乎他為吾恐官之所給無已時而民之不復業如故也其有旱潦傷稼民食用艱者當勸諭上户各自貸給其農佃直至秋成計貸過若干官為給文墨仰作三年償本主其逃遁逋負者官為追督懲治蓋田主資貸佃户此理當然不為科擾且亦免費官司區處官之所當處者只市户耳却以官錢貸米鋪户令其往外郡邑販米出糶但要有米可糴却不可限其價直米才輻輳價自亷平雖無待開廣惠倉可也徐氏乾學曰荒政之禮在備於未荒之時及其已荒而救之則有移民移粟散財止糴之術而已然猶勝于未備也天時不常水旱為沴氣數使然而君相則默有以轉移之周官大司徒以荒政十有二聚萬民皆所以賑救而存恤之者為臨事之具也至其先事而豫防者則有倉人廪人遺人旅師諸職及冡宰餘一餘三諸制猶未也明政刑以先其教薄稅斂以寬其力又有保息六以養之曰慈幼養老賑窮恤貧寬疾安富有本俗六以安之曰􅍇宫室族墳墓聨兄弟聨師儒聨朋友同衣服又以王會之法辨地之所生使民之阜其財為不匱施十有二教以順其所安曰以祀禮教敬則民不苟以陽禮教讓則民不爭以隂禮教親則民不怨以樂教和則民不乖以儀辨等則民不越以俗教安則民不偷以刑教中則民不暴以誓教恤則民不怠以度教節則民知足以世事教能則民不失職以賢制爵則民慎德以庸制祿則民興功先王所以餋之教之者如此其至也及一旦有方一二千里之水旱則臨事之備者自冡宰以下至丞簿百執事自畿輔省會以及僻壤下邑無不隨位隨地隨時隨事而一一預圗軫恤之必求至於精詳切當而無遺憾則古人之成法具在變而通之以盡利焉以吾素所善辦者應之而有餘裕矣又何荒年之足慮是在父母斯民者加之意而已右統論荒政五禮通考卷二百五十
