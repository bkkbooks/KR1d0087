body:
  text: 五禮通考卷一百刑部尚書秦蕙田撰吉禮一百禘祫金史禮志汴京之廟在宮南馳道之東殿規一屋四間限其北為神室廟端各虚一間為夾室中二十三間為十一室從西三間為一室為始祖廟祔徳帝安帝獻祖昭祖景祖祧主五餘皆兩間為一室世祖室祔肅宗穆宗室祔康宗餘皆無祔每室門一牖一門在左牖在右皆南向石室之龕於各室之西壁東向其世祖之龕六南向者五東向者一其二其三俱二龕餘皆一室一龕總八龕祭日出主於北牖下南向禘祫則並出主始祖東向羣主依昭穆南北相向東西序立世宗大定三年八月有司議祫享犧牲品物案唐開元禮宋開寳禮毎室犢一羊一猪一五禮新儀每室復加魚十有五尾天徳貞元例與唐宋同有司行事則不用太牢七祀功臣羊各二酒共二百一十瓶正隆減定通用犢一兩室共用羊一豕一酒百瓶此於禮有缺今七祀功臣牲酒請依天徳制宗廟毎室則用宋制加魚然毎室一犢後恐太豐世宗乃命毎祭共用一犢羊豕如舊又以九月五日祫享當用鹿肉五十觔獐肉三十五觔兎十四頭為臡醢以貞元正隆方禁獵皆以羊代此禮殊為未備詔從古制十年正月詔宰臣曰古禮殺牛以祭後世有更者否其檢討典故以聞有司謂自周以來下逮唐宋祫享無不用牛者唐開元禮時享毎室各用太牢一至天寳六年始減牛數太廟毎享用一犢宋政和五禮新儀時享太廟親祀用牛有司行事則不用宋開寳二年詔昊天上帝皇地祇用犢餘大祀皆以羊豕代之合二羊五豕足代一犢今三年一祫乃為親祀其禮至重毎室一犢恐難省減遂命時享與祭社稷如舊若親祀宗廟則共用一犢有司行事則不用十一年尚書省奏禘祫之儀曰禮緯三年一祫五年一禘唐開元中太常議禘祫之禮皆為殷祭祫為合食祖廟禘為禘序尊卑申先君逮下之慈成羣嗣奉親之孝自異常享有時行之祭不欲數數則黷不欲疎疎則怠是以王者法諸天道以制祀典烝嘗象時祫禘象閏五嵗再閏天道大成宗廟法之再為殷祭自周以後並用此禮自大定九年已行祫禮若議禘祭當於祫後十八月孟夏行禮詔以三年冬祫五年夏禘為常禮享日並出神主前廊序列昭穆應圗功臣配享廟庭各配所事之廟以位次為序以太子為亞獻親王為終獻或並用親王或以太尉為亞獻光禄卿為終獻其月則停時享十二年十月祫享以攝官行事詔共用三犢十七年十月祫享太廟檢討唐禮孝敬皇帝廟時享用廟舞宮縣登歌讓皇帝廟至禘祫月一祭止用登歌其禮制損益不同今武靈皇帝廟庭與太廟地歩不同難以容設宮縣樂舞并樂器亦是闕少看詳恐合依唐讓皇帝祫享典故樂用登歌所有牲牢罇俎同太廟一室行禮及契勘得自來祫享遇親祠毎室一犢攝官行禮共用三犢今添武靈皇帝别廟行禮合無依已奏定共用三犢或増添牛數奏奉勅㫖太廟别廟共用三犢武靈皇帝廟樂用登歌差官奏告並准奏十九年禘祭昭徳皇后廟不用犢世宗本紀大定二十二年十月庚戌祫享於太廟禮志詔祫禘共用三犢有司行事則以鹿代二十七年十月祫享於太廟大定二十九年章宗即位禮官言自大定二十七年十月祫享至今年正月世宗升遐故四月不行禘禮案公羊傳閔公二年吉禘於莊公言吉者未可以吉謂未三年也注謂祫禘從先君數朝聘從今君數三年䘮畢遇禘則禘遇祫則祫故事宜於辛亥嵗為大祥三月禫祭踰月則吉則四月一日為初吉適當孟夏禘祭之時可為親祠詔從之及期以孝懿皇后崩而止五月禮官言世宗陞祔已三年尚未合食於祖宗若來冬遂行祫禮伏為皇帝見居心䘮䘮中之吉春秋議其速恐冬祫未可行然周禮王有哀慘則春官攝事竊以世宗及孝懿皇后陞祔以來未曾躬謁豈可令有司先攝事哉况前代令攝事者止施於常祀今乞依故事三年䘮畢祫則祫禘則禘於明昌四年四月一日釋心䘮行禘禮上從之章宗本紀明昌四年四月戊申親禘於太廟禮志明昌三年十二月尚書省奏明年親禘室當用犢一欽懷皇后祔於明徳之廟案大定三年祫享明徳皇后室未嘗用犢勅欽懷皇后亦用之上因問拜數右丞瑋具對上曰世宗聖夀髙故殺其數亦不立於位今當從禮而已大定六年定晨祼行禮自大次至版位先見神之禮兩拜再至版位又兩拜祼鬯畢還版位再兩拜還小次酌獻時罍洗位盥訖至版位先兩拜酌獻畢還版位再兩拜止將始祖祝冊於版位西南安置讀冊訖又兩拜還小次又至飲福位先兩拜飲畢兩拜凡十六拜承安元年十月丙辰祫享於太廟泰和元年冬十月乙酉祫享於太廟泰和三年四月乙巳禘於太廟泰和八年四月戊申禘於太廟宣宗本紀貞祐二年正月癸未有司奏請權止今年禘享從之禮志貞祐二年原本二年誤命參知政事李革為修太廟使七月吉日親行祔享有司以故事用皇帝時享儀初至版位兩拜晨祼及酌獻則毎位三拜飲福五拜總七十九拜今升祔則徧及祧廟五室則為一百九拜也明昌間常減毎位酌獻奠爵後一拜則為九十二拜而已然大定六年世宗嘗令禮官通減為十六拜又皇帝當散齋四日於别殿致齋三日於大慶殿今國事方殷宜權散齋二日致齋一日上曰拜數從大定例餘准奏禮部尚書張行簡言近奉詔從世宗十六拜之禮臣與太常參定儀注竊有疑焉謹案唐宋親祠典禮皆有通拜及隨位拜禮世宗大定三年親行奉安之禮亦通七拜毎室各五拜合七十二拜逮六年禘始勅有司減為十六拜仍存七十二拜之儀其意亦可見矣蓋初年享禮以備故後從權更定通拜今陛下初廟見奉安而遽從此制是於隨室神位並無拜禮此臣之所疑一也大定間十有二室姑從十六拜猶可今十七室而拜數反不及之此臣之所疑二也况六年所定儀注惟於皇帝版位前讀始祖一室祝冊夫祭有祝辭本告神明今諸祝冊各書帝后尊謚及髙曾祖考世次不一皇帝所自稱亦自不同而乃止讀一冊餘皆虚設恐於禮未安此臣之所疑三也先王之禮順時施宜不可多寡惟稱而已今近年禮官酌古今别定四十四拜之禮初見神二拜晨祼通四拜隨室酌獻讀祝畢兩拜飲福四拜似為得中上從之乃定祔享如時享十二室之儀又以祧廟五主始祖室不能容止於室户外東西一列以西為上神主闕者以升祔前三日廟内敬造以享日丑前題寫畢以次奉陞十月已未親王百官自明俊殿奉迎祖宗神主於太廟幄次辛酉行禮用四十四拜之儀無宮縣樂犧牲從儉十七室用犢三羊豕九而已以皇太子為亞獻濮王守純為終獻皇帝權服靴袍行禮日服衮冕皇太子以下公服無鹵簿儀仗禮畢乘馬還宮宣宗本紀元光二年十月己卯祫於太廟興定四年四月禘於太廟續文獻通考哀宗釋服將禘享太廟有司奏冕服成上請仁聖慈聖兩宮太后御内殿因試衣之以見兩宮大恱上更便服奉觴為兩宮夀仁聖太后諭上曰祖宗初取天下甚不易何時使四方承平百姓安樂天子服此法服於中都祖廟行禘享乎上曰阿婆有此意臣何嘗忘慈聖太后亦曰恒有此心則見此當有期矣金史樂志禘祫親饗皇帝入門宫縣無射宮昌寧之曲出入歩武同惟時升平禮儀肇興鳴鑾至止穆穆造庭百辟卿士恪謹迎承恭𨽻祖考神宇攸寧皇帝升殿登歌夾鐘宮昌寧之曲升階及將還版位皆同登歌笙鏞既陳罍樽在户升降有容惟規惟矩恭敬神明上儀交舉永言保之承天之祜皇帝盥洗宮縣無射宮昌寧之曲惟水之功潔淨精㣲洗爵奠斚于徳有輝皇皇穆穆宗廟之威宜其感格福祉交歸皇帝降階宮縣無射宮昌寧之曲於皇神宮象天清明有來肅肅相維公卿禮儀卒度君子攸寧孔時孔恵綏我思成迎神宮縣來寧之曲黄鐘宮三奏大呂角二奏太簇徵二奏應鐘羽二奏詞同八音克諧百禮具舉明徳維清至誠永慕神之格思雲駢風馭來止來臨千祀燕處蕙田案此迎神九奏極得周禮九變之意司徒引爼宮縣無射宮豐寧之曲維牲維犠齊明致祠我將我享吉蠲奉之博碩肥腯神嗜為宜千秋歆此永綏黔黎始祖酌獻宮縣無射宮大元之曲惟酒既清惟殽既馨苾芬孝祀在廟之庭羞于皇祖來燕來寧象功昭徳先祖是聽徳皇帝大熙之曲萬方欣戴鴻業創基瑶源垂裕綿瓞重熙式崇毖祀爰考成規籩豆有楚益臻皇儀安皇帝大安之曲爰圗造邦載徳其昌皇儀允穆誕集嘉祥明誠昭格積厚流光祗嚴清廟鐘石琅琅獻祖大昭之曲惟聖興邦經始之初鳩民化俗還定攸居迪徳純儉志規逺圗時哉顯祀精誠有孚昭祖大成之曲天啟璇源貽慶定基率義為勇施徳為威耀武拓境功烈巍巍永昌皇祚均福黔黎景祖大昌之曲丕顯鴻烈基緒隆昌聖期誕集邦宇斯張尊嚴廟祏昭格休祥煌煌縟典億載彌光世祖大武之曲桓桓代功天鑑其明惟威震疊惟徳綏寧神策無遺鴻圗以興曾孫孝祀遹昭厥成肅宗大明之曲於皇神人武烈文謨左右世祖懷柔掃除威掃遐邇化漸蟲魚垂光綿永成帝之孚穆宗大章之曲烝哉文祖欽聖𢎞淵慈愛忠信典策昭然歆此明祀繁祉綿綿時純熙矣流慶萬年康宗大康之曲惟明惟聽曄曄神功儀刑世業昭格上穹持盈孝孫薦芳斯豐錫我祉福皇化益隆太祖大定之曲功超殷周徳配唐虞天人協應平統寰區開祥垂裕肇基永圗明明天子敬陳典謨太宗大惠之曲巍巍徳鴻無為端扆祚承神功究馴俗􅍇清宮緝熙孝毖時祀欽奠著誠犧樽嘉㫖熙宗大同之曲昭顯令徳神基丕承對越在天享用躋升於穆清廟來熙來寧神其醉止惟欽克誠睿宗大和之曲皇祖開基周武殷湯猗歟聖考嗣徳彌光啟祐洪緒長發其祥嚴恭廟享萬世烝嘗世宗大鈞之曲神之來思甫登於堂祼圭有瓚秬鬯芬芳巍巍先功啟祐無疆萬年肆祀孝心不忘顯宗大寧之曲於皇神宮有嚴惟清吉蠲孝祀惟神之寧對越在天綏我思成敷佑億年邦家之慶章宗大隆之曲兩紀踐祚萬方寧康文經天地武服遐荒禮備制定徳隆業昌居歆典祀億載無疆宣宗大慶之曲猗歟聖皇三代之英功光先后徳被羣生牲粢惟馨鼔鐘其鏗神兮來思歆于克誠文舞退武舞進宮縣無射宮肅寧之曲明明先王神武維揚開基垂統萬世無疆干戚象功威儀有光神保是饗昭哉降康亞終獻無射宮肅寧之曲涓辰之休昭祀惟恭威儀陟降惟禮是從籩豆静嘉於論鼔鐘惟皇受祉監斯徳容皇帝飲福登歌夾鐘宮福寧之曲犠牲充潔粢盛馨香來格來享精神用彰飲此純禧簡簡穰穰文明天子萬夀無疆徹豆登歌夾鐘宮豐寧之曲孝祀肅睦明徳以薦樂奏九成禮終三獻百辟卿士進徹以時小大稽首神保聿歸送神宮縣黄鐘宮來寧之曲潔兹牛羊清兹酒醴三獻攸終神既燕喜神之去兮載錫繁祉萬夀無疆永保禋祀禘祫有司攝事初獻盥洗宮縣無射宮肅寧之曲祀事之大齋栗為先潔清以獻沃盥于前既灌以升乃薦豆籩神其感格歆於吉蠲升自西階登歌奏夾鐘宮嘉寧之曲餘並同親祀國有太宮合食以禮躋階肅肅降陛濟濟鏘然純音節乃容止神之格思永綏福履蕙田案金制三年冬祫五年夏禘則猶張純鄭𤣥之說也右金禘祫元史禮樂志親祠禘祫樂章未詳年月太常集禮云别本所録以時考之疑至元三年以前擬用詳見制樂始末皇帝入門宮縣奏順成之曲無射宮熙熙雍雍六合大同維皇有造典禮㑹通金奏王夏祗欵神宮感格如響嘉氣來叢皇帝升殿奏順成之曲夾鐘宮皇明燭幽沿時制作宗廟之威降登時若趨以采茨聲容有恪曰藝曰文監兹衎樂皇帝詣罍洗宮縣奏順成之曲太常集禮云至元四年用此曲名曰肅成至大以後用此詞律同無射宮酌彼行潦維挹其清潔齊以祀祀事孔明肅肅辟公沃盥乃升神之至止歆于克誠皇帝詣酌尊所宮縣奏順成之曲無射宮靈庭愔愔乃神攸依文為在禮載斟匪祈皇皇穆穆玉佩聲希列侯百辟濟濟闕威迎神宫縣奏思成之曲至元四年名來成之曲詞律同司徒捧俎宫縣奏嘉成之曲至元四年詞律同酌獻始祖宫縣奏慶成之曲無射宫啓運流光幅員既長敬共祀事鬰鬯芬薌徳以舞象功以歌揚式歌且舞神享是皇諸廟奏熙成昌成鴻成樂成康成明成等曲詞闕文舞退武舞進宫縣奏肅成之曲至元四年名和成之曲詞律同亞終獻宫懸奏肅成之曲至元四年名順成之曲詞律同皇帝飲福登歌奏釐成之曲夾鐘宫誠通恩降靈兹昭宣左右明命六合大全啐飲椒馨純嘏如川皇人壽榖億萬斯年徹豆登歌奏豐成之曲夾鐘宫三獻九成禮畢樂闋于豆于登于焉靖徹多士宻勿樂且有儀能事脫頴孔惠孔時送神奏保成之曲黄鐘宫雲車之來不疾而速風馭言還閴其恍惚神心之欣孝孫之禄燕翼無疆景命有僕蕙田案元禘祫之禮未詳傳志惟禮樂志載此數章注云疑至元三年以前所擬蓋禮文散佚姑存之以見禮意右元禘祫明史禮志洪武元年祫饗太廟徳祖皇考妣居中南向懿祖皇考妣東第一位西向熙祖皇考妣西第一位東向仁祖皇考妣東第二位西向大明集禮國初以嵗除日祭太廟與四時之祭合為五享其陳設樂章並與時享同累朝因之國初嵗除祭太廟祝文維洪武年月日孝元孫皇帝某敢昭告于髙曾祖考四廟太皇太后時當嵗暮明旦新正謹率羣臣以牲醴庶品恭詣太廟用申追慕之情尚享續文獻通考太祖洪武七年御史答祿與權請舉禘祭不報時答祿與權上言古之有天下者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之故曰禘禘者大也王者之大祭也周祭太王為始祖推本后稷以為自出之帝今皇上受命已七年而禘祭未舉宜令羣臣參酌古今而行之以成一代之典下禮部太常寺翰林臣議以為虞夏商周四代世系明白其始祖所自出可得而推故禘禮可行自唐漢以來世系無考莫能明其始祖所自出當時所謂禘不過祫已祧之主序昭穆而祭之乃古人之大祫非禘也宋神宗嘗曰禘者所以審始祖之所出是則莫知始祖之所自出禮不可行也今國家既已追尊四廟而始祖所自出者未有所考則於禘祭之禮似難遽行遂寢明史禮志𢎞治元年定每嵗暮奉祧廟懿祖神主於正殿左居熙祖上行祫祭之禮明㑹典𢎞治元年建祧廟於寢殿後其制九間間各為室翼以兩廡乃奉安神主衣冠於廟正中南向國初以嵗除日祭太廟與四時之享合為五享𢎞治初既祧懿祖始以其日奉祧主至太廟行祫祭禮先期遣官祭告太廟又遣官祭告懿祖於祧廟俱用祝文酒果告畢太常寺設懿祖神座於正殿西向至日祭如儀𢎞治初祫祭祝文太廟祭告維年月日孝元孫嗣皇帝某謹遣某官敢昭告于太廟太皇太后皇考憲純皇帝兹者嵗暮特修祫祭之禮恭迎懿祖皇帝同臨享祀伏惟鑒知謹告懿祖祭告兹者嵗暮恭于太廟舉行祫祭之禮祗請聖靈詣廟享祀特申預告伏惟鑒知謹告太廟祫祭同前國初祭文明史世宗本紀嘉靖十年夏四月甲子禘於太廟禮志嘉靖十年世宗以禘祫義詢大學士張璁令與夏言議言撰禘義一篇獻之大意謂自漢以下譜牒難考欲如虞夏之禘黄帝商周之禘帝嚳不能盡合謹推明古典采酌先儒精㣲之論宜為虚位以祀帝深然之㑹中允廖道南謂朱氏為顓頊裔請以太祖實録為據禘顓頊遂詔禮部以言道南二疏㑹官詳議諸臣咸謂稱虚位者茫昧無據尊顓頊者世逺難稽廟制既定髙皇帝始祖之位當禘徳祖為正帝意主虚位令再議而言復疏論禘徳祖有四可疑且言今所定太祖為太廟中之始祖非王者立始祖廟之始祖帝併下其章諸臣乃請設虚位以禘皇初祖南向奉太祖配西向禮臣因言大祫既嵗舉大禘請三嵗一行庶䟽數適宜帝自為文告皇祖定丙辛嵗一行勅禮部具儀擇日四月禮部上大禘儀注前期告廟致齋三日備香帛牲醴如時享儀錦衣衞設儀衛太常卿奉皇初祖神牌太祖神位於太廟正殿安設如圗儀至日行禮如大祀圜丘儀及議祧徳祖罷嵗除祭以冬季中旬行大祫禮太常寺設徳祖神位於太廟正中南向懿祖而下以次東西向春明夢餘録世宗欲復古禘祭禮勅輔臣及禮官集議夏言撰禘義以進曰禮云不王不禘禘者本以審諦祖之所自出也惟王者竭四海之有以奉神明力大足以備禮故祭可以及逺有虞氏夏后氏皆禘黄帝殷人周人禘帝嚳是也我祖宗之有天下固以徳祖為始祖百六十年來居中南向享太廟嵗時之祭者徳祖也今陛下定大祫之祭而統羣廟之主者又徳祖也然則主禘之祭又不可尊徳祖乎夫既身為太祖之始祖矣而為始祖之所自出恐無是理朱熹亦曰禘自始祖之廟推所自出之帝設虚位以祀之而以始祖配夫三代而下必欲如唐虞商周之祭禘黄帝帝嚳則既無所考若強求其人如李唐之祖聃又非孝子慈孫之所忍為也臣以為宜設初祖虚位而以太祖配享蓋太祖始有天下實始祖也疏入上然之既而諭禮部祀始祖所自出之帝於太廟奉皇祖配每丙辛年舉行神牌曰皇初祖帝神位十年冬上諭禮官曰太祖以恩隆徳祖今日當以義尊太祖祫祭奉四祖同太祖皆南向庶見太廟為特尊太祖之意禮官夏言言禮合羣廟之主而祭於太祖之廟是為大祫亦以尊太祖也太廟太祖之廟不當與昭穆同序太祖太廟之祖不可與子孫並列自今大祫宜奉徳祖居中懿熙仁太祖東西序皆南向列聖左右序東西向如故不惟我太祖列羣廟之上足以伸皇上之心而懿熙仁三祖得全其尊尤足以體太祖之心上曰善明集禮大禘嘉靖十年定前期上告廟如常儀太常寺奏致齋三日備香帛牲醴如時享儀錦衣衛設儀衞侍從太常寺卿奉請皇初祖神牌太祖神位於太廟正殿安設是日早上具翼善冠黄袍御奉天門太常卿跪奏請聖駕詣太廟上至太廟門外降轎導引官導上入御幄具祭服出由殿左門入典儀唱樂舞生就位執事官各司其事内贊奏就位典儀唱迎神樂作内贊奏四拜傳贊百官同奏上香導上至皇初祖太祖前俱三上香訖奏復位樂止典儀唱奠帛行初獻禮樂作内贊導上至皇初祖前奠帛獻爵復導至太祖前儀同典儀唱讀祝畢跪傳贊衆官皆跪樂暫止内贊贊讀祝讀訖樂作内贊奏俯伏興平身傳贊百官同樂止典儀唱行亞獻禮樂作樂止復唱行終獻禮樂作樂止太常卿進立於皇初祖前西向唱賜福胙上飲福受胙興四拜傳贊百官同典儀唱徹饌唱送神内贊奏四拜傳贊百官同典儀唱捧祝捧帛詣燎位唱望燎俱如儀太常卿捧皇初祖神牌詣燎所内贊奏禮畢樂止上由殿左門出至太廟門外導引官導上入御幄易常服還宮祝文維嘉靖年月日孝元孫嗣皇帝某敢昭告于皇初祖神曰仰惟先祖肇我厥初發祥鍾靈啟我列聖追慕徳源敬兹報祭願來格斯奉皇祖太祖髙皇帝配侑尚享明史樂志大禘樂章迎神元和之曲於維皇祖肇創丕基鍾祥有自曰本先之奄有萬方作之君師追報宜隆以申孝思瞻望稽首介我休禧初獻夀和之曲木有本兮水有源人本祖兮物本天思報徳兮禮奠先仰希鍳兮敢弗䖍亞獻仁和之曲中觴載升於此瑶觥小孫奉前願歆其誠樂舞在列庶職在庭祖鍳孔昭錫佑攸亨終獻徳和之曲於維兮先祖延慶兮深髙追報兮曷能三進兮香醪徹饌太和之曲芬兮豆籩潔兮黍粢祖垂歆享徹乎敢遲禮云告備以訖陳詞永裕後人億世丕而送神永和之曲禘祀兮具張佳氣兮鬰昂皇靈錫納兮喜將一誠通兮萬載昌祈鑒佑兮天下康仰源仁浩徳兮曷以量小孫頓首兮以望遥瞻冉冉兮聖靈皇皇明史禮志十五年復定廟饗制立春犆享各出主於殿立夏立秋立冬出太祖成祖七宗主饗太祖殿為時祫季冬中旬卜日出四祖及太祖成祖七宗主饗太祖殿為大祫祭畢各歸主於其寢明㑹典九廟特饗前期太常寺奉請欽定捧主官及齋戒省牲俱如常儀一前期一日太常寺官詣各廟陳設如儀一正祭日儀同前惟祝文總一讀各廟俱捧主行禮九廟時祫儀與前時祫儀同奉懿祖熙祖仁祖太祖神座皆南向成祖而下東西向陳設樂章祝文皆更定而先期遣官祭告如前明集禮嘉靖十五年定大祫儀前期一日太常寺陳設如圖儀正祭日上至廟㦸門東帷幕具祭服出自㦸門左入率捧主官至祧廟及寢殿出主捧主官請各廟主至太廟門外候五祖主至闢殿門入上安徳祖主捧主官各安懿祖以下主訖典儀唱舞樂生就位執事官各司其事上至御拜位如常儀懿祖而下上香獻帛獻爵俱捧主官代祝文維嘉靖年月日孝𤣥孫嗣皇帝某敢昭告於徳祖元皇帝元皇后懿祖恒皇帝恒皇后熙祖裕皇帝裕皇后仁祖淳皇帝淳皇后太祖高皇帝孝慈高皇后成祖文皇帝仁孝文皇后仁宗昭皇帝誠孝昭皇后皇高祖考宣宗章皇帝皇高祖妣孝恭章皇后皇曾祖考英宗睿皇帝皇曾祖妣孝莊睿皇后皇祖考憲宗純皇帝皇祖妣孝貞純皇后皇伯考孝宗敬皇帝皇伯妣孝康敬皇后皇考睿宗獻皇帝皇妣慈孝獻皇后皇兄武宗毅皇帝孝静毅皇后曰氣序云邁嵗事將終謹率羣臣以牲帛醴齊粢盛庶品特修大祫禮於太廟用申追感之情伏惟尚享明史樂志大祫樂章迎神太和之曲仰慶源兮大發祥惟世徳兮深長時維嵗殘大祫洪張祖宗聖神明明皇皇遥瞻兮頓首世徳兮何以忘初獻夀和之曲神之格兮慰我思慰我思兮捧玉巵捧來前兮慄慄仰歆納兮是幸已而亞獻豫和之曲再舉瑶漿樂舞羣張小孫在位陪助賢良百工羅從大禮肅將惟我祖宗顯錫恩光終獻寧和之曲思祖功兮深長景宗徳兮馨香報嵗事之既成兮典則先王惟功徳之莫報兮何以量徹饌雍和之曲三酌既終一誠感通仰聖靈兮居歆萬禩是舉兮庶乎酬報之衷還宮安和之曲顯兮幽兮神運無跡神運無跡兮化無方靈返天兮主返室願神功聖徳兮啟佑無終元孫拜送兮以謝以祈禮志嘉靖十七年定大祫祝文九廟帝后諡號俱全書時祫止書某祖某宗皇帝更定大祫日奉徳懿熙仁及太祖異室皆南向成祖西向北上仁宗以下七宗東西相向禮三獻樂六奏舞八佾皇帝獻徳祖帝后大臣十二人分獻諸帝内臣十二人分獻諸后二十年十一月禮官議嵗暮大祫當陳祧主而景神殿隘請暫祭四廟於後寢用連几陳籩豆以便周旋詔可二十二年定時享大祫罷出主上香奠獻等儀臨期捧衣冠出納太常及神宮監官奉行二十四年罷季冬中旬大祫并罷告祭仍以嵗除日行大祫禮同時享二十八年復告祭儀穆宗即位禮部以大行皇帝服未除請遵𢎞治十八年例嵗暮大祫孟春時享兩祭皆遣官攝事樂設而不作帝即䘮次致齋陪祀官亦在二十七日之内宜令暫免從之續文獻通考初禮部尚書夏言請行古大禘禮下廷議皆請禘徳祖世宗皆不允有㫖稱皇初祖帝神勿主名五年一舉先是下令中書官書皇初祖帝神牌位於太廟至日設太廟殿中祭畢燎之每特享祖宗以立春于本廟夏秋冬皆合享於太廟循時祫之典季冬仍修大祫禮於太廟獻廟止修四時之祭避豐禰也穆宗隆慶元年行大祫禮於太廟命駙馬都尉謝詔代三年十二月戊辰行大祫禮於太廟右明禘祫五禮通考卷一百
