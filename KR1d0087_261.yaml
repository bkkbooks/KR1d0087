body:
  text: 五禮通考卷二百五十一刑部尚書秦蕙田撰凶禮六札禮蕙田案大宗伯以荒禮哀凶札蓋以疫癘之生多在災傷之後故以荒禮包之至如大司徒膳夫司服則以大札與大荒對言大司樂以大札與大凶對言朝士小行人凡以神仕者以札喪與凶荒對言是二禮未可合而為一今别為札禮繼荒禮之後周禮地官大司徒大札則令邦國移民通財舍禁弛力薄征緩刑注大札大疫病也秋官朝士若邦札喪則令邦國都家縣鄙慮刑貶小行人若國札喪則令賻補之疏此札喪在喪禮中宗伯荒札荒禮中者欲見札而復荒則與荒禮同科若札而不荒自從喪禮也天官膳夫大札則不舉春官司服大札素服大司樂大札令弛縣凡以神仕者以禬民之札喪漢書成帝本紀河平四年三月癸丑遣光祿大夫博士嘉等十一人行舉瀕河之郡水所毁傷困乏不能自存者財振貸其為水所流壓死不能自葬令郡國給槥櫝葬埋已葬者與錢人二千哀帝本紀綏和二年秋詔曰乃者河南潁川郡水出流殺人民敗壞廬舍已遣光祿大夫循行舉籍賜死者棺錢人三千平帝本紀元始二年四月郡國大旱蝗民疾疫者舍空邸第為置醫藥賜死者一家六户以上葬錢五千四户以上三千二户以上二千後漢書安帝本紀建光元年十一月郡國三十五地震或坼裂遣光祿大夫案行賜死者錢人二千延光元年京師及郡國二十七雨水大風殺人詔賜壓溺死者年七嵗以上錢人二千其敗壞廬舍失亡穀食粟人三斛又田被淹傷者一切勿收田租若一家皆被災害而弱小存者郡縣為收斂之桓帝本紀建和三年十一月詔曰朕攝政失中災眚連仍今京師厮舍死者相枕郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以葬者給直人三千喪主布三匹若無親屬可于官壖地葬之表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者稟穀如科蕙田案漏澤園之設蓋昉于此永夀元年六月南陽大水詔被水死流失尸骸者令郡縣鈎求收葬及所唐突壓溺物故七嵗以上賜錢人二千壞敗廬舍亡失穀食尤貧者稟人二斛永康元年秋八月六州大水勃海海溢詔州郡溺死者七嵗以上錢人二千一家皆被害者悉為收斂其亡失穀食稟人三斛晉書武帝本紀泰始七年六月大雨霖伊洛河溢流居人四千餘家殺三百餘人有詔振貸給棺唐書代宗本紀寶應元年四月即皇帝位十月詔浙江水旱百姓重困民疫死不能葬者為瘞之文宗本紀太和六年五月給民疫死者棺十嵗以下不能自存者二月糧册府元龜太和六年五月詔諸道應災荒處疾疫之家有一門盡殁者官給凶具其餘據其人口遭疫多少與減稅錢疫疾未定處官給醫藥宋史仁宗本紀天聖七年河北水瘞溺死者給其家緡錢明道二年二月詔江淮民飢死者官為之葬祭皇祐元年二月以河北疫遣使頒藥至和元年春正月詔京師大寒民多凍餒死者有司其瘞埋之壬申碎通天犀和藥以療民疫二月詔民有疫死者蠲户稅一年無户稅者給其家錢三千英宗本紀治平二年八月賜被水諸軍米遣官視軍民水死者千五百八十人賜其家緡錢葬祭其無主者曽鞏越州趙公救災記熙寧八年吳越大旱明年春大疫為病坊處疾病之無歸者募僧二人屬以視醫藥飲食令無失所凡死者使在處隨收瘞之宋史徽宗本紀崇寧三年二月丁未置漏澤園食貨志初神宗詔開封府界僧寺旅寄棺柩貧不能葬令幾縣各度官不毛地三五頃聽人安厝命僧主之葬及三千人以上度僧一人三年與紫衣有紫衣與師號更使領事三年願復領者聽之至是蔡京推廣為園置籍瘞人並深三尺母令暴露監司巡歷檢察安濟坊亦募僧主之三年醫愈千人賜紫衣祠部牒各一道醫者人給手歷以書所治瘞人嵗終考其數為殿最諸城寨鎮市户及千以上有知監者依各縣增置漏澤園蕙田案詩稱凡民有喪匍匐救之禮稱無服之喪以畜萬邦先王之於民有死喪而無告者必思所以瘞埋之故孟春有掩骼埋胔之令不獨大札為然也漏澤園之設其亦猶行古之道乎顧寧人曰漏澤園起于蔡京不可以其人而廢其法宣和二年詔參考元豐舊法漏澤園除葬埋依見行條法外應資給若齋醮等事悉罷髙宗本紀紹興十四年十二月復置漏澤園食貨志髙宗南渡民之從者如歸市既為之衣食以振其飢寒又為之醫藥以救其疾病其有隕于戈甲斃于道路者則給度牒瘞埋之若丐者育之於居養院其病也療之於安濟坊其死也葬之於漏澤園嵗以為常寧宗本紀嘉定二年三月庚申命浙西及沿江諸州給流民病者藥壬戌出內庫錢十萬緡為臨安貧民棺槥費明會典永樂六年令福建瘟疫死絶人户遺下老幼婦女兒男有司驗口給米稅鹽糧米各項暫且停徴待成丁之日自行立户當差右札禮災禮蕙田案凶禮之目自喪荒而外即云以弔禮哀禍災論災之一字所包本廣日月薄蝕天災也山川崩竭地災也水旱疾疫人災也鄭注禍災惟以水火當之以邦交相弔之禮惟遭水火則有之其餘不聞有弔也至於祈禳殺禮則凡遇災變皆當行之今輯經傳所載為災禮而救日月伐鼓之儀亦附見焉周禮春官大宗伯以弔禮哀禍災注禍災謂邅水火宋大水魯莊公使人弔焉廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道易氏祓曰神所祟謂之禍天所毁謂之災天官膳夫天地有災則不舉注天災日月晦食地災崩動也春官司服大災素服注大災水火為害君臣素服縞冠若晉伯宗哭梁山之崩大司樂凡日月食四鎮五嶽崩大傀異災令去樂注傀猶怪也去樂藏之也大災令弛縣注弛釋下之之疏上文去樂據廟中時縣之樂去而藏此文據路寢常縣之樂弛其縣而不作互文以見義也秋官掌客凡禮賔客禍災殺禮蕙田案此四條因災貶損之禮春官小宗伯大災及執事禱祠于上下神示注執事大祝及男巫女巫也求福曰禱得求曰祠讄曰禱爾于上下神祗凡王之會同軍旅甸役之禱祠肄儀為位國有禍災則亦如之注謂有所禱祈凡天地之大災類社稷宗廟則為位注禱祈禮輕類者依其正禮而為之司巫國有大災則帥巫而造巫恆注杜子春云司巫帥巫官之屬會聚常處以待命也元謂恆久也巫久者先巫之故事造之當按視所施為女巫凡邦之大災則歌哭而請注有歌者有哭者冀以悲哀動神靈也蕙田案此三條因災祈禳之禮春秋莊公二十年夏齊大災杜注來告以大故書天火曰災公羊傳大災者何大瘠也注瘠病也齊人語也以加大知非火災也大瘠者何癘也注癘者民疾疫也何以書記災也榖梁傳其志以甚也蕙田案公羊以災為瘠恐非理蓋春秋之例天火曰災其云大災者從告而書猶云宋大水也成公三年二月甲子新宫災三日哭公羊傳新宫者何宣公之宫也宣公則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也注善得禮痛傷鬼神無所依歸故君臣素縞哭之新宫災何以書記災也榖梁傳新宫者禰宫也三日哭哀也其哀禮也注宫廟親之神靈所憑居而遇災故以哀哭為禮迫近不敢稱諡恭也其辭恭且哀以成公為無譏矣襄公九年左氏傳宋災樂喜為司城以為政注樂喜子罕也使伯氏司里注伯氏宋大夫司里里宰火所未至徹小屋塗大屋注大屋難撤就塗之陳畚挶具綆缶注畚簣龍挶土舉綆汲索缶汲器備水器注盆􅧲之屬量輕重注計人力所任蓄水潦積土塗巡丈城繕守備注巡行也丈度也繕治也行度守備之處恐因災作亂表火道注火起則從其所趣標表之使華臣具正徒注華臣為司徒正徒役徒也令隧正納郊保奔火所注隧正官名也納聚郊野保守之民使隨火所起往救之使華閲討右官官庀其司注為右師討治也庀具也使具其官屬向戌討左亦如之注向戌左師使樂遄庀刑器亦如之注樂遄司冦刑器刑書使皇鄖命校正出馬工正出車備甲兵庀武守注校正主馬工正主車使各備其官疏皇鄖是司馬使西鉏吾庀府守注鉏吾大宰也府六官之典令司宫巷伯警宫注司宫奄臣巷伯寺人皆掌宫內之事二師令四鄉正敬享注二師左右師也鄉正鄉大夫享祀也祝宗用馬于四墉祀盤庚于西門之外注祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之逺祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮昭公十七年左氏傳冬有星孛于大辰西及漢鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火注瓘圭也斚玉爵也瓉勺也欲以禳火子産弗與注以為天災流行非禳所息故也十八年左氏傳夏五月火始昏見注火心星丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子太叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信注多言者或時有中遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣注子産知天災不可逃非遷所免故託以知不足及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫于東門注晉人新來未入故辭不使前也使司冦出新客注新來聘者禁舊客勿出於宫注為其知國情不欲令去使子寬子上巡羣屏攝至於大宫注巡行宗廟不得使火及之使公孫登徙大龜使祝史徙主祏于周廟告于先君注周廟厲王廟也有火災故合羣主于祖廟易救護使府人庫人各警其事注警備火也商成公警司宫出舊宫人置諸火所不及注舊宫人先公宫女司馬司寇列居火道注備非常也行火所焮城下之人伍列登城明日使野司寇各保其徴郊人助祝史除於國北注為祭處于國北者就大隂禳火禳火于玄冥回祿注玄冥水神回祿火神祈于四鄘注鄘城也城積土隂氣所聚故祈祭之以禳火之餘災書焚室而寬其征與之財注征賦稅也三日哭國不市使行人告于諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也七月鄭子産為火故大為社祓禳于四方振除火災禮也疏祭社有常而云大為社者此非常祭之月而為火特祭蓋君臣肅共禮物備異大于常祭故稱大也祓禳皆除凶之祭遍于四方之神如尚書咸秩無文苟可祭者悉皆祭之所以振訊除去火災禮也嫌多祭非禮故禮之蕙田案宋災祝宗用馬於四鄘鄭災祈于四鄘後世祀城隍之神其原出于此哀公三年左氏傳夏五月辛卯司鐸火注司鐸官名火踰公宫桓僖災注桓公僖公廟救火者皆曰顧府南宫敬叔至命周人出御書俟于宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守宫人肅給濟濡帷幕鬱攸從之蒙葺公室自太廟始外內以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立于象魏之外命救火者傷人則止財可為也命藏象魏注周禮正月縣教令之法于象魏使萬民觀之故謂其書為象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之稿道還公宫孔子在陳聞火曰其桓僖乎禮記檀弓有焚其先人之室則三日哭注謂人燒其宗廟哭者哀精神之有虧傷故曰新宫火亦三日哭注火人火也新宫火在魯成三年孔氏穎達春秋疏傳例曰天火曰災人火曰火三家經傳火字皆為災鄭元以為人火雖非其義要天火人火其哭皆當三日也春秋莊公二十五年秋大水鼓用牲于社于門左氏傳非常也凡天災有幣無牲注天災日月食大水也祈請而已不用牲也非日月之眚不鼓注眚猶災也月侵日為眚隂陽逆順之事賢聖所重故特鼓之公羊傳其言于社于門何于社禮也于門非禮也穀梁傳髙下有水災曰大水既戒鼓而駭衆用牲可以已矣救日以鼓兵救水以鼓衆昭公十九年左氏傳鄭大水龍鬭于時門之外洧淵國人請為禜焉子産弗許曰我鬭龍不我覿也龍鬭我獨何覿焉禳之則彼其室也吾無求于龍龍亦無求于我乃止也蕙田案水火為災而祈禳之周禮所載凡以為民也子産治國為政有經行已事上使民養民無一之勿盡焉其恭敬惠愛也至矣至于禳火則却禆竈之言禜龍則止國人之請而災不為害焉君子是以貴盡其在已也成公五年梁山崩左氏傳梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川注謂所主祭故山崩川竭君為之不舉注去盛饌降服注損盛服乘縵注車無文徹樂注息八音出次注舍於郊祝幣注陳玉幣史辭注自罪責以禮焉注禮山川其如此而已雖伯宗若之何伯宗請見之注見之於晉君不可注不肯見遂以告而從之榖梁傳不日何也髙者有崩道也有崩道則何以書也曰梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯尊曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何伯尊由忠問焉輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣注素衣縞冠凶服也所以凶服者山川國之鎮也山崩川塞示哀窮伯尊至君問之曰梁山崩壅遏河三日不流為之奈何伯尊曰君親素縞帥羣臣而哭之既而祠焉斯流矣孔子聞之曰伯尊其無績乎攘善也蕙田案伯宗榖梁作伯尊聲之轉也右經傳災禮周禮秋官小行人若國有禍災則令哀弔之春秋莊公十一年左氏傳宋大水公使人弔焉曰天作淫雨害于粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也浡焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭也孫達曰是宜為君有恤民之心襄公三十年左氏傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫會于澶淵既而無歸于宋禮記雜記廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道也右經傳弔災禮書胤征乃季秋月朔辰弗集于房傳辰日月所會房所舍之次集會也不會則曰蝕可知瞽奏鼓嗇夫馳庶人走傳凡日蝕天子伐鼓于社責上公瞽樂官樂官進鼓則伐之嗇夫主幣之官馳取幣禮天神庶人走供救日蝕之百役也蕙田案季秋月朔非正陽之月而用奏鼓用幣之禮與左傳不合孔穎達疏引顧氏説謂夏禮與周禮異賈公彥周禮疏亦如此説觀承案疏家分夏禮周禮之説往往附會難信此之為夏禮則本是允征自然可信故賈孔之説同周禮地官鼓人救日月則詔王鼓注救日月食王必親擊鼓者聲大異春秋傳曰非日月之眚不鼓案疏謂日月食時鼓人詔告于王擊鼓聲大異以救之太僕職云軍旅田役贊王鼓鄭注云佐擊其餘面又云救日月食亦如之太僕亦佐擊其餘面鄭既云佐擊其餘面則非止兩面之鼓按上解祭日月與天神同用雷鼓則此救日月亦宜用雷鼓八面故太僕與戎右俱云贊王鼓得佐擊餘而也救日月食王必親擊鼓者聲大異者但日月食始見其徴兆未有災驗故云異也夏官太僕凡軍旅田役贊王鼓救日月亦如之注王通鼓佐擊其餘面救日月謂日月食時春秋傳曰非日月之眚不鼓疏云亦如之者太僕亦贊王鼓佐擊其餘面但日食隂侵陽當與鼓神祀同雷鼓也若然月食當用靈鼓但春秋記日食不記月者以日食隂侵陽象臣侵君非常故記之月食陽侵隂象君侵臣故不記此云救日月月食時亦擊鼓救之可知云春秋者左氏莊二十五年日有食之鼓用牲于社彼傳鼓與牲並譏之以彼傳云惟正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝若然惟四月正陽之月乃擊鼓彼四月不合擊鼓之月天災有幣無牲故亦譏之也彼傳又云秋大水鼓用牲于門亦非常傳曰非日月之眚不鼓若然此言為秋大水而擊鼓而故引之者欲見日月食時皆合擊鼓與此文同也蕙田案鼓人疏救日月同用雷鼓此疏云救日用雷鼓救月用靈鼓兩説自相抵牾榖梁傳天子陳五兵五鼓諸家以為青赤白黑黃五色之數非鼓人六鼓之等其説又異蓋經無明文注家各以意揣之闕疑可也秋官庭氏掌射夭鳥若不見其鳥獸則以救日之弓與救月之矢射之若神也則以大隂之弓與枉矢射之注鄭司農云救日之弓救月之矢謂日月食所作弓矢元謂日月之食隂陽相勝之變也於日食則射太隂月食則射太陽與太隂之弓救月之弓枉矢救日之矢與不言救月之弓與救日之矢者互言之救日曰用枉矢則救月以恆矢可知也王氏曰司弓矢職云枉矢利火射薛氏曰枉矢狀如流星飛行有光取以陽勝隂之義觀承案日月可射亦何異於射天之不道哉然經文但云救日救月耳初無射日射月之文也且庭氏所謂射者亦但以射夭鳥與神而已未嘗云射日射月也司農注謂日月食所作弓矢則亦不必日食射月月食射日矣康成此注實為不經然尚用與字以疑之究未敢質言之也或泥是而反疑經文之不可信係後人所纂入者則亦未見其然矣春秋莊公二十五年六月辛未朔日有食之鼓用牲于社杜注鼓伐鼓也用牲以祭社傳例曰非常也月疏傳稱正月之朔正月謂周六月也此經雖書六杜以長歷校之此是七月七月用鼓非常月也鼓當于朝而此于社非其處也社應用幣而于社用牲非所用也一舉而三失故譏之左氏傳夏六月辛未朔日有食之鼓用牲于社非常也注非常鼓之月長歷推之辛未實七月朔置閏失所故致月錯疏經雖書六月實非六月故云非常鼓之月長歷推此辛未為七月之朔由不應置閏而置閏誤使七月為六月也唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝注正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣日食歷之常也然食于正陽之月則諸侯用幣于社請救于上公伐鼓于朝退而自責以明隂不宜侵陽臣不宜掩君以示大義謂疏詩云正月繁霜鄭云夏之四月建巳純陽用事是正月為正陽之月日食者數之常也古之聖王因事設戒故立求神請救之禮公羊傳日食則曷為鼓用牲于社求乎隂之道也以朱絲營社或曰脅之或曰為暗恐人犯之故營之注或曰脅之社者土地之主也月者土地之精也上繫于天而犯日故鳴鼓而攻之脅其本也朱絲營之助陽抑隂也或曰為暗者社者土地之主尊也為日光盡天暗冥恐人犯歷之故營之然此説非也記或傳者示不欲絶異説爾先言鼓後言用牲者明先以尊命責之後以臣子接之所以為順也穀梁傳鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓注麾旌幡也五兵矛戟鉞楯弓矢諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也注凡有聲皆陽事以壓隂氣柝兩木相擊充實也疏五麾者麋信云各以方色之旌置之五處也五兵者徐邈云矛在東戟在南鉞在西楯在北弓矢在中央也五鼓者糜信徐邈並云東方青鼓南方赤鼓西方白鼓北方黑鼓中央黃鼓案五兵兵有五種未審五鼓是一鼓有五色為當五種之鼓也何者周禮有六鼓雷鼓靈鼓路鼓鼖鼓鼛鼓晉鼓之等若以為五種之鼓則不知六鼓之內竟去何鼓若以為一種之鼓則不知六鼓內竟取何鼓又周禮云雷鼓鼓神祀則似救日之鼓用雷鼓但此用之于社周禮又云以靈鼓鼓社稷祭則又似救日食之鼓用靈鼓進退有疑不敢是正故直述之而已檢麋徐兩家之説則以五鼓者非六鼓之類别用方色鼓而已諸侯三者則云去黑黃二色是非六鼓之類也文公十五年六月辛丑朔日有食之鼓用牲于社左氏傳非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也注得常鼓之月而于社用牲為非禮諸侯用幣于社社尊于諸侯故請救而不敢責之疏此與莊二十五年經文正同彼傳云非常此傳云非禮者彼失常鼓之月言鼓之為非常此得常鼓之月而用牲為非禮故釋例曰文十五年與莊二十五年經文皆同而更復發傳曰非禮者明前傳欲以審正陽之月後傳發例欲以明諸侯之禮而用牲為非禮也昭公十七年夏六月甲戌朔日有食之左氏傳夏六月甲戌朔日有食之祝史請所用幣注禮正陽之月日食當用幣于社故請之昭子曰日有食之天子不舉注不舉盛饌伐鼓于社注責羣隂諸侯用幣于社注請上公伐鼓于朝注退自責禮也平子禦之曰止也惟正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也注正月謂建巳正陽之月也于周為六月于夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼓用幣之禮也平子以為六月非正月故太史答言在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭注過分未至過春分而未夏至三辰日月星也日月相侵又犯是宿故三辰皆為災降物素服辟移時辟正寢過日食時奏鼓伐鼓用辭以自責百疏降物謂減其物采也昏義曰日食則天子素服知官降物亦素服也古之素服禮無明文蓋象朝服而用素為之如今之單衣也近世儀注日食則擊鼓于大社天子單衣介幘碎正殿坐東西堂百官白服坐本司太常率官屬繞太廟過時乃罷故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏注言此六月當夏家之四月平子弗從昭子曰夫子將有異志不君君矣禮記曽子問曽子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四太廟火日食后之喪雨霑服失容則廢如諸侯皆在而日食則從天子救日各以其方色與其兵注示奉事時有所討也方色者東方衣青南方衣赤西方衣白北方衣黑兵未聞曽子問曰當祭而日食太廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢注接祭不迎尸曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六天子崩太廟火日蝕后夫人之喪雨霑服失容則廢通典漢制天子救日食素服避正殿陳五鼓五兵以朱絲縈社內外嚴警大史登靈臺候日月有變便伐鼓太僕贊祝史陳辭以責之聞鼓音侍臣皆著赤幘帶劍入侍三臺令史以上皆持劔立其户前衛尉驅馳繞縈察守備日復常皆罷此儀按晉摯虞決疑注云約魯昭公時叔孫昭子説天子救日之法後漢書禮儀志朔前後各二日牽羊酒至社下以祭日日有變割羊以祠社用救日日變執事者冠長冠衣皂單衣絳領袖緣中衣絳袴􅙋以行禮如故事宋書禮志漢建安中將正會而太史上言正旦當日蝕朝臣疑會不共詣尚書令荀文若咨之時廣平計吏劉邵在坐曰梓慎禆竈古之良史猶占水火錯失天時禮諸侯見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異豫廢朝禮者或災消異伏或推術謬誤也文若及衆入咸喜而從之遂朝會如舊日亦不蝕邵由此顯名通典魏髙貴鄉公正元二年太史奏三月一日寅時合朔去交二度恐相附近主者奏宣敕有司為救日蝕備既時過而不蝕大將軍曹爽推史官不驗之負空設合朔之期以疑上下光祿大夫領大史令雍言典歷者按歷術推交會之期候者伺遲疾之度當朔事無有違錯耳重問典歷周晃等對曰歷候所掌推步遲速可以知加時早晚度交緩急可以知薄蝕深淺合朔之時或以月掩日則蔽障日體使光景有虧故謂之日蝕或日掩月則日從月上過謂之隂不侵陽雖交無變至于日月相掩必蝕之理無術以推是以古者諸侯旅見天子日蝕則廢禮當禘郊社日蝕則接祭是以前代史官不能審日蝕之數故有不得終禮自漢故事以為日蝕必當于交每至其時申警百官以備日變甲寅詔書有備蝕之制無考負之法侍中鄭小同議官不務審察晷度謹綜疏密謬準交會以為其兆至乃虛設疑日大警外內其有不效則委於差晷度禁縱自由皆非其儀案春秋昭公三十一年十二月辛亥日蝕晉史墨以庚午之日日始有謫自庚午至辛亥四十二日日蝕之兆固形于前矣此為古有其法而今不察是守官惰職考察無效此有司之罪又答古來黃帝顓頊夏殷周魯六歷皆無推日蝕法但有考課疏密而已負坐之條由本無術可課非司事之罪乃止宋書禮志晉武帝咸寧三年四年並以正朝合朔却元會元帝大興元年四月合朔中書侍郎孔愈奏曰春秋日有蝕之天子伐鼓于社攻諸隂也諸侯伐鼓于朝臣自攻也案尚書符若日有變便伐鼓于諸門有違舊典詔曰所陳有正義輒敕外改之至康帝建元元年太史上元日合朔朝士復疑應却會與不庾冰輔政寫劉召議以示八座蔡謨著議非之曰劭論災消異伏又以竈慎猶有錯失太史上言亦必不審其理誠然也而云聖人垂制不為變異豫廢朝禮此則謬矣災祥之法所以譴告人君王者所重誡故素服廢樂退避正寢百官降服用幣伐鼓躬親救之夫警戒之事與其疑而廢之寧慎而行之故孔子老聃助葬于巷黨以喪不星行故日蝕而止柩曰安知不見星今史官言當蝕亦安知其不蝕乎夫子老聃豫行見星之防而劭廢之是棄聖賢之成規也魯桓公壬申有災而以乙亥嘗祭春秋譏之災事既過追懼未巳故廢宗廟之祭况聞天眚將至而行慶樂之會於事乖矣禮記所云諸侯入門不得終禮者謂曰官不豫言諸侯既入見蝕乃知耳非先聞當蝕而朝會不廢也引此可謂失其義旨劉劭所執者禮記也夫子老聃巷黨之事亦禮記所言復違而反之進退無據然荀令所善漢朝所從遂令此言至今見稱莫知其謬後來君子將擬以為式故正之云爾於是冰從衆議遂以却會至永和中殷浩輔政又欲從劉劭議不却會王彪之據咸寧建元故事又曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非謂先存其事而僥幸史官推術繆錯故不豫廢朝禮也于是又從彪之相承至今南齊書禮志永明元年十二月有司奏今月三日臘祠大社稷一日合朔日蝕既在致齋內未審于社祠無疑不曽檢未有前準尚書令王儉議禮記曽子問天子嘗禘郊社五祀之祭簠簋既陳唯大喪乃廢至于當祭之日火及日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齋初日乃但薄蝕則不應廢祭又漢初平四年士孫瑞議以日蝕廢冠而不廢郊朝議從之王者父天母地郊社不殊此則前準謂不宜廢詔可隋書禮儀志後齊制日蝕則太極殿西廂東向東堂東廂西向各設御座羣官公服晝漏上水一刻內外戒嚴三門者閉中門單門者掩之蝕前三刻皇帝服通天冠即御座直衛如常不省事有變聞鼓音則避正殿就東堂服白祫單衣侍臣皆赤幘帶劔升殿侍諸司各於其所赤幘持劔出户向日立有司各率官屬並行宫內諸門掖門屯衛大社鄴令以官屬圍社守四門以朱絲繩繞繫社壇三匝太祝令陳辭責社太史令二人走馬露板上尚書門司疾上之又告清都尹鳴鼓如嚴鼓法日光復乃止奏解嚴唐開元禮合朔伐鼓其日合朔前三刻郊社令及門僕各服赤幘絳衣守四門令巡門監察鼓吹令平巾幘袴褶帥工人以方色執麾旒分置四門屋下龍蛇鼓隨設于左東門者立于北孰南面南門者立于東孰西面西門者立于南孰北面北門者立于西孰東面門側堂曰孰麾制各長一丈旒以方色各長八尺隊正一人著平巾幘袴褶執刀帥衛士五人執五兵于鼓外矛處東戟在南斧鉞在西矟在北郊社令立攢于社壇四隅以朱絲繩縈之太史官一人著赤幘赤衣立于社壇北向日觀變黃麾次之龍鼓一面次之在此弓一張矢四隻次之諸工鼓靜立候日有變史官曰祥有變工人齊舉麾龍鼓齊發聲如雷史官稱止工人罷鼓其日廢務百官守本司日有變皇帝素服避正殿百官以下皆素服各於廳事前重行每等異位向日立明復而止諸州伐鼓其日見日有變則廢務所司置鼓于刺史廳事前刺史及州官九品以上俱素服立于鼓後重行每等異位向日刺史先擊鼓執事伐之明復俱止宋政和五禮新儀合朔伐鼓齋戒前一日質明行事執事官赴祠所請齋集告官齋所肄儀大祝習讀祝文視禮饌香玉幣訖退陳設前二日儀鸞司設行事執事官次于祠所告日前三刻禮直官贊者諸司職掌各服其服太常設神位席太史設神位版于壇上南方北向太常陳幣篚于神位之左禮神之玉奠于神前瘞玉加于輦玉以兩圭有邸幣以黑設祝于神位之右置于坫香爐并合置于案上以御封香次設祭器藉以席光祿實之每位各左一籩實以鹿脯右一豆實以鹿臡犧尊一置于坫加勺冪在壇上西北隅南向實以供內法酒太常設燭于神位前洗二于卯階之東北向罍在洗東加勺篚在洗西南肆實以巾若爵洗之篚則又實以爵加坫執罍篚者位于其後開瘞坎于子階之西北設望瘞位于瘞坎之南告官在南北向監察御史在東西向奉禮郎太祝太官令在東西向南上設告官席位于北墉下光祿卿位于壇之北監察御史位于告官之西奉禮郎太祝太官令位于其後俱南向東上又設監察御史位于壇上之東西向奉禮郎太祝位在東西向南上太官令于尊所南向社之四門并壇下近北各置鼓一並植以麾旒四門各依方色壇下以黃麾杠長一大旒長八尺祭告其日時前太官令帥其屬實饌具畢贊者引光祿卿入詣壇下位南向凡告官行事禮直官引餘官贊者引贊者曰再拜光祿卿再拜升自卯階凡行事執事官升降準此點視禮饌畢退餘官各服祭服次引監察御史奉禮郎太祝太官令先入就位次引告官入就位禮直官稍前贊有司謹具請行事贊者曰再拜在位者皆再拜次引監察御史奉禮郎太祝太官令升就位太官令就酌尊所立定次引告官詣盥洗位南向立搢笏盥手帨手執笏升詣太社神位前搢笏跪三上香次引奉禮郎搢笏西向跪執事者以玉幣授奉禮郎奉禮郎以玉幣授告官訖執笏興復位告官受玉幣奠訖執笏俯伏興再拜降復位少頃引告官再詣盥洗位南向立搢笏盥手帨手詣爵洗位南向立搢笏洗爵拭爵以爵授執事者執笏升詣酒尊所東向立執事者以爵授告官告官搢笏執爵執事者舉冪太官令酌酒告官以爵授執事者執笏詣太社神位前搢笏跪執事者以爵授告官告官執爵三祭酒奠爵執笏俯伏興少立引太祝詣神位前西向搢笏跪讀祝文訖執笏興復位告官再拜降復位次引告官詣望瘞位有司詣神位前取玉幣祝版置于瘞坎次引監察御史奉禮郎太祝詣望瘞位立定禮直官曰可瘞置土半坎禮直官贊禮畢引告官以下退伐鼓其日時前太史局官一員立于壇下視日鼓吹令帥工人二十人依色服分置于鼓之左右以俟日有變太史曰祥有變工人齊伐鼓明復太史稱止工人即罷其日廢物百司守職明史禮志救日伐鼓洪武六年二月定救日食禮其日皇帝常服不御正殿中書省設香案百官朝服行禮鼓人伐鼓復圓乃止月食大都督府設香案百官常服行禮不伐鼓雨雪雲翳則免二十六年三月更定禮部設香案于露臺向日設金鼓于儀門內設樂于露臺下各官拜位于露臺上至期百官朝服入班樂作四拜興樂止跪執事者捧鼓班首擊鼓三聲衆鼓齊鳴候復圓復行四拜禮月食則百官便服于都督府救護如儀在外諸司日食則于布政使司府州縣月食則于都指揮使司衛所如儀隆慶六年大喪方成服遇日食百官先哭臨後赴禮部青素衣黑角帶向日西拜不用鼓樂蕙田案合朔伐鼓之禮唐開元禮通典俱入之軍禮史家相承用之考周禮大司樂職云日月食四鎮五嶽崩大傀異災令去樂又膳夫職云天地有災則不舉鄭注天災為日月晦食則日月食亦災禮之一入之軍禮者非也郝仲輿疑救月之儀可廢按詩彼月而食則惟其常此日而食于何不臧此自因事寓刺抑揚其辭明乎日食之變較月食而尤重云爾周官左傳每以救日月並言詎容舉此廢彼耶右救日月伐鼓禬禮蕙田案大宗伯於禍災則云弔於圍敗則云禬於冦亂則云恤各舉其一而言其實則弔禬恤之禮凡遇禍災圍敗冦亂皆通行之如大行人云致禬以補諸侯之災春秋傳澶淵之會諸侯謀歸宋財是禍災之禬禮也昭公六年叔弓如楚弔敗哀公十五年楚伐吳陳侯使公孫貞子弔焉是圍敗之弔禮也衛獻公奔齊公使厚成叔弔是冦亂之弔禮也小行人國札喪則令賻補凶荒則令賙委師役則令稿禬禍災則令哀弔賈疏云凶禮有五惟不見恤禮當於師役中兼之然則圍敗冦亂二者禬禮恤禮皆有之可知矣周禮春官大宗伯以禬禮哀圍敗注同盟者會合財貨以更其所喪春秋襄三十年冬會于澶淵宋災故是其類易氏祓曰國之見圍謂之圍師之敗績謂之敗以禬禮哀之于是合財以補其乏若澶淵之會諸侯謀歸宋財是也秋官大行人致禬以補諸侯之災注致禬凶禮之弔禮禬禮也補諸侯災者若澶淵之會諸侯謀歸宋財合疏宗伯云以禬禮哀圍敗此災亦云禬者同是會財貨故災亦稱禬也小行人若國師役則令稿禬之注故書稿為稿鄭司農云稿當為稿謂稿師也元謂師役者國有兵冦以匱病者也使鄰國會合財貨以與之春秋定五年夏歸粟于蔡是也宗伯職曰以禬禮哀圍敗春秋閔公二年左氏傳狄入衛立戴公以廬于曹齊桓公使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩蕙田案是時齊桓為伯主故以禬禮哀之定公五年夏歸粟于蔡杜注蔡為楚所圍飢乏故魯歸之粟左氏傳以周亟矜無資蕙田案此二條禬禮之正昭公六年左氏傳叔弓如楚聘且弔敗也注弔為吳所敗哀公十五年左氏傳楚子西子期伐吳陳侯使公孫貞子弔焉注弔為楚所伐吳子使太宰嚭勞二十年左氏傳越圍吳趙孟降于喪食注襄子時有父簡子之喪楚隆曰三年之喪親昵之極也主又降之無乃有故乎趙孟曰黃池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之非晉之所能及也吾是以為降楚隆曰若使吳王知之若何乃往告于吳王曰寡君之老無恤使陪臣隆敢展謝其不共黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙孟曰句踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉蕙田案此三條圍敗相弔之禮文公四年左氏傳楚人滅江秦伯為之降服出次不舉過數注降服素服也出次辟正寢不舉去盛饌鄰國之禮有數今秦伯過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也蕙田案此條聞鄰國滅之禮禮記檀弓國亡大縣邑公卿大夫士皆厭冠哭于太廟三日君不舉注軍敗失禮以喪歸也厭冠今喪冠其服未聞或曰君舉而哭于后土注后土社也舉疏舉謂舉樂也臣入廟三日哭故君亦三日不樂又有或者言亦舉樂而自於社中哭之蕙田案此條國亡縣邑之禮俱屬圍敗之類故附見於此右禬禮恤禮周禮春官大宗伯以恤禮哀冦亂注恤憂也鄰國相憂兵作于外為冦作于內為亂往疏既不損財物當遣使咨問安不而已鄭氏鍔曰左傳言救邢之事曰簡書同恤禮有相救之道隱公亦云君命寡人同恤社稷之難則恤禮者問之勞之見天子憂恤之意王氏昭禹曰恤以救之若衛有狄人之難而齊威救之春秋閔公元年左氏傳狄人伐邢管敬仲言于齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也注同恤所惡請救邢以從簡書齊人救邢襄公十四年左氏傳衛獻公出奔齊公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他境若之何不弔以同盟之故使瘠敢私于執事曰有君不弔有臣不敏君不赦宥臣亦不帥職增淫發泄其若之何衛人使大叔儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺昭公二十二年左氏傳楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚其父兄以為君憂拜命之辱右恤禮唁禮蕙田案凶禮有五無唁禮之名説文云唁弔生也春秋榖梁傳詩毛傳並云弔失國曰唁失國之事比之圍敗冦亂為大而唁則恤禮之類也考春秋經傳凡書唁者皆邦交之事襄十一年齊侯使夙沙衛唁臧堅則君於他國之臣亦有唁禮矣詩鄘風載馳載馳載驅歸唁衛侯傳弔失國曰唁榖疏昭公二十五年梁傳云弔失國曰唁若對弔死曰弔則弔生曰唁春秋昭公二十五年榖梁傳弔失國曰唁何氏休公羊傳注弔亡國曰唁弔失國曰弔襄公十四年左氏傳衛侯在郲臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道孫説謂其人曰衛君必入夫二子者或挽之或推之欲無入得乎昭公二十五年公孫于齊次于陽州齊侯唁公于野井左氏傳齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待于平隂為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也將求于人則先下之禮之善物也公羊傳齊侯唁公于野井曰奈何君去魯國之社稷昭公曰喪人不佞失守魯國之社稷執事以羞再拜顙慶子家駒曰慶子免君于大難矣子家駒曰臣不佞陷君于大難君不忍加之以鈇鑕賜之以死再拜顙髙子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗于從者昭公曰君不忘我先君延及喪人錫之以大禮再拜稽首以祍受髙子曰有夫不祥君無所辱大禮昭公蓋祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰喪人其何稱景公曰孰君而無稱昭公于是噭然而哭諸大夫皆哭既哭以人為災以幦為席以鞍為几以遇禮相見孔子曰其禮與其辭足觀矣二十九年春公至自乾侯居于鄆齊侯使髙張來唁公左氏傳齊侯使髙張來唁公稱主君注比公于大夫子家子曰齊卑君矣君祗辱焉三十年左氏傳吳子滅徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之三十一年夏晉侯使荀躒唁公于乾侯左氏傳荀躒以晉侯之命唁公蕙田案以上唁鄰國之君襄公十一年左氏傳齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮于士以杙抉其傷而死蕙田案此唁鄰國之臣右唁禮問疾禮論語疾君視之東首加朝服拖紳注包曰夫子疾處南牖之下東首加其朝服拖紳紳大帶不敢不衣朝服見君北疏此明孔子有疾君來視之時也拖加也病者常居牖下為君來視則暫時遷鄉南牖下東首令君得以南面而視之以病卧不能衣朝服及大帶又不敢不衣朝服見君故但加朝服于身又加大帶于上是禮也禮記禮運諸侯非問疾弔喪而入諸臣之家是謂君臣為謔蕙田案以上君問臣疾之禮論語伯牛有疾子問之自牖執其手注包曰牛有惡疾不欲見人故孔子從牖執其手也曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也朱子曰牖南牖也禮病者居北牖下君視之則遷于南牖下使君得以南面視已時伯牛家以此禮尊孔子孔子不敢當故不入其室而自牖執其手蓋與之永訣也曽子有疾孟敬子問之疏問之者來問疾也禮記曲禮問疾弗能遺不問其所欲王氏曰辭口惠而實不至也蕙田案以上交遊問疾之禮唐開元禮勞問諸王疾苦問外祖父后父大官都督刺史及蕃國主附中宫問外祖父及諸王附東宫問外祖父諸王附其問師傅保宗戚上臺貴臣同勞問諸王之禮皇帝中宫云太皇太后皇太后皇后東宫云皇太子遣使勞問諸王疾苦外祖大臣等各隨言之本司散下其禮所司隨職供辦中宫則內給事一人為使所司先於受勞問者第大門外之右設使者便次南向於庭中近北設使者位南面皇太子儀東向又於使者位之南皇太子儀位之東三丈所設主人位北向皇太子儀西向其府國寮屬並陪列于庭中之左右國官在東府寮在西俱以北為上中宫及皇太子儀無府國官以下儀使者至受勞問者第大門外掌次者延入次使者及受勞問者皆公服贊禮者中宫則內典引下皆倣此引使者出次立於門西東向史二人中宫則內給使二人奉制書案中宫及皇太子云令案下準此立於使者之南差退贊禮者引受勞問者立於門東西向受勞問者再拜贊禮者引受勞問者先入立於門內之右西面贊禮者引使者入就庭中位立持案者立於其右贊禮者引受勞問者進就庭中位北面立持案者以案進使者前使者取制書持案者退復位使者稱有制中宫稱太皇太后等有令受勞問者再拜贊禮者引受勞問者進詣使者前受制書退復位再拜訖贊禮者引使者以下出又贊禮者引受勞問者隨出各即門外位受勞問者再拜訖贊禮者引使者以下退就次又贊禮者引受勞問者入若受勞問者疾未間不堪受制則子弟代受如上導引之官以所勞問州府有司充之其使於京師者則謁者導引勞問外祖母疾苦中宫問外祖母附其問妃主宗戚婦女同東宫問外祖母附其問妃主母疾苦同皇帝中宫云太皇太后皇太后皇后東宫即云皇太子遣使勞問外祖母疾苦本司散下其禮所司隨職供辦內給事一人皇太子則閹宫一人為使所司先於受勞問者第大門外之右設使者便次南向又於內寢庭少北皇太子儀兩階前設使者位南向皇太子儀東向又於使者位之南皇太子位東三丈所設受勞問者位北向皇太子西向使者至受勞問者大門外掌次者延入次使者服公服攝迎者亦公服使者出次立於門西東面給使二人奉制書案皇太子令書案中宫同餘倣此立於使者之南差退贊禮者引攝迎者出立於門東西向攝迎者再拜訖贊禮者引攝迎者先入立於門內之右西面內典引引使者入就內寢庭位立皇太子儀使者東向立持案者立於使者之右皇太子儀給使奉令書案隨入立位于使者之南差退受勞問者服朝服女侍者引就庭中位立持案者以案進使者前使者取制書持案者退復位使者稱有制太皇太后皇太后皇后即稱有令受勞問者再拜女侍者進詣使者前受制書退授受勞問者受勞問者又再拜內典引引使者以下出女侍者引受勞問者退贊禮者引攝迎者隨出各就門外位攝迎者再拜內典引引使者退即便次贊禮者引攝迎者入若受勞問者疾未間不堪受制則攝迎者於外堂之庭拜受制書如上禮其異者受制書詣閣授女侍者女侍者受奉入授受勞問者凡有勞問無正篇者皆臨時約準上禮而為之凡內侍之屬充使則內侍內常侍以下準所慰勞者尊卑臨時準約皇太子於諸王妃主以下疾苦其存問家人親屬之禮率爾遣近侍勞問則主人受勞問之家待之亦從家人親屬之式不拜迎拜送及不為授受之禮宋政和五禮新儀遣使問諸王以下疾前期有司於受勞問者之第大門外設使者位於受勞問者之左使者至贊者引入次使者及受勞問者皆公服贊者引使者立於門西東向引受勞問者立於門東西向史二人以案奉詔書立於使者之南贊者曰拜受勞問者再拜贊者引受勞問者入就望闕位立史捧詔書案前行使者從之入就庭中位贊者贊使者搢笏取詔書執笏加詔書于笏上史以案退使者稱有詔受勞問者再拜使者宣詔書訖受勞問者又再拜贊者引使者及受勞問者少前相向各俯伏跪搢笏使者以詔書授受勞問者訖各執笏受勞問者加詔書于笏上各俯伏興復位贊者曰拜受勞問者再拜贊者引使者歸次受勞問者乃入若受勞問者疾未間不能親受則子弟代受如上儀遣使問帝姬以下疾以內給事一人為使者前期有司于受勞問者之第大門外設使者次又于寢庭望闕設受勞問者位使者位於其前少北南向使者至內侍引入次使者服公服女侍引受勞問者朝服出詣望闕位立內侍引使者出次給使二人以案奉詔書前行使者從之入就庭中位內侍贊使者搢笏取詔書執笏加詔書于笏上給使捧案退使者稱有詔內侍曰拜受勞問者再拜宣訖又再拜女侍進詣使者前受詔書退授受勞問者訖內侍曰拜受勞問者再拜內使引使者歸次受勞問者乃入若受勞問者疾未間不能親受則以女侍逆攝受詔書如上儀以所受詔書詣寢閣授之右問疾禮五禮通考卷二百五十一
