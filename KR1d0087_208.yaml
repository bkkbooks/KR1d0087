body:
  text: 五禮通考卷一百九十八刑部尚書秦蕙田撰嘉禮七十一觀象授時書舜典協時月正日蕙田案時月正日與律度量衡對言似屬四項事竊意時四時也月十二月也正三正也日三百有六旬有六日也有正而後時可協如建子則子丑寅為春建丑則丑寅卯為春建寅則寅卯辰為春也有正而後月可協建子則子月為正建丑則丑月為正建寅則寅月為正也時與月皆以三正而協則日之協不待言矣古者三正通于民俗所以奉天道符地理授民時正字似作三正為是注疏蔡傳以正字作虚字解恐未的三正不協則萬事隳故甘誓數有扈之罪曰怠棄三正也曰知録三正之名見于甘誓蘇氏謂自舜以前必有以建子建丑為正者其來尚矣㣲子之命曰統承先王修其禮物則知杞用夏正宋用商正若朝覲會同則用周之正朔其於本國自用其先王之正朔也三正之所以異者疑古之分國各有所受故公劉當夏后之世而一之日二之日已用建子為紀舜典協時月正日即協此不齊之時月甘誓有扈氏威侮五行怠棄三正蔡氏沈曰三正子丑寅之正也夏正建寅怠棄者不用正朔也案此章則三正迭建其來久矣舜協時月正日亦所以一正朔也子丑之建唐虞之前當已有之欽定傳説彚纂三正注疏主天地人而後人以夏以前無改正朔事林之竒則謂不必求之太深但言其廢三綱五常或以為三正必有所指如三綱三事之類或以為不用夏時之正亦不用唐虞以前之正如秦用亥為正或以為三正本兼用如周禮有正月又有正嵗豳風一之日二之日是一陽二陽之月亦得為正春秋雖用周正而祭祀田獵仍用夏時紛紛之說總以蔡傳不用正朔一語概之為是而三正之說其來已久則為子丑寅之正亦不必多疑矣即注疏天地人亦三正取義之原也有扈既不遵正朔又何知三正之義乎怠棄三正兼言之宜也蕙田謹案不遵正朔何知三正之義怠棄三正宜兼言之洵不磨之論尚書大傳夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以平旦為朔殷以雞鳴為朔不以二三月為正者萬物不齊莫適所統故必以三㣲之月為嵗之三正也又曰王者存二代之後與已為三所以通三統立三正鄭注所存二王後者命使郊天以天子禮樂其始祖受命之王自行其正朔服色此謂通天三統又曰周以至動殷以萌夏以芽鄭注謂三王之政也至動冬至日物始動也物有三變故正色有三天有三生三死鄭注異時生者恒異時死是故周人以日至為正殷以日至三十日為正夏以日至六十日為正天有三統土有三王王特一生死鄭注統本也三統者所以序生也三王者所以統天下也是故三統三正也若循連環周則又始窮則反本也夏以孟春為正者貴形也蕙田案此大傳古本世多未之見今考其說則知注疏之未審矣其曰通三統若循連環極足以𤼵明三正並用精義宋書禮志髙堂隆曰自古帝王之興受禪之與干戈皆改正朔易曰革元亨利貞有孚改命吉湯武革命應乎天從乎人其義曰水火更用事猶王者必改正朔易服色也易通卦騐曰王者必改正朔易服色以應天地三氣三色書曰若稽古帝舜曰重華建皇授政改朔初髙陽氏以十一月為正薦玉以白繒尚書傳曰舜定鍾石論人聲乃及鳥獸咸變于前故定四時改堯正詩曰一之日觱𤼵二之日栗烈三之日于耜傳曰一之日周正月二之日殷正月三之日夏正月以前檢後為軒轅髙辛夏后氏漢皆以十三月為正少昊有唐有殷皆以十二月為正髙陽有虞有周皆以十一月為正禮大傳曰聖人南面而治天下必正度量考文章改正朔易服色殊徽號是以舜禹雖繼平受禪猶制禮樂改正朔以應天從民楊氏時曰三代正朔如忠質之尚循環無端不可增損也斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中其時為冬至其辰為丑三代各據一統明三統常合而迭為首周據天統以時言也商據地統以辰言也夏據人統以人事言也劉氏瑾曰夏書有怠棄三正之語則自夏以前已有子丑之正是三正通于民俗其來既逺故豳公創國偏方亦有十月改嵗之俗也呂氏祖謙曰三正通于民俗尚矣周特舉而用之耳蔡氏德晉曰九峯謂三正並建其來久矣子丑之建唐虞之前當已有之東萊詩豳風之紀曰三正通于民俗尚矣二說固然抑又有說焉昔先王創制顯庸既立為一代之法而于前代典章必兼存而不廢其焦薊英六祝陳杞宋之封皆所以使其子孫各修先代之禮物至于朝野所奉行則祭祀備六代之舞養老具三代之禮士喪兼三代之祝魯用四代之服器官蓋聖人以德化民惟欲納之于至善初不必廢棄禁絶前代之典章以自伸也故三代之時自伏羲甲律以至神農黄帝少昊顓頊帝嚳堯舜之律具存而可考觀于秦政坑焚操懿兵燹而杜預所見十律自黄帝顓頊以及夏商周魯之律猶在則其前可知也夫黄帝調律建子伏羲顓頊之律建寅若神農少昊諸律今雖不可考當必有建丑者鄭康成謂堯正建丑舜正建子其言必有所受況三正既為累代所迭用亦復為一朝所兼存故誥誓臣民並言之而不以為雜秉筆之史臣臨文之學士隨意書之而亦不以為倍今考三正之錯見于六經者周易臨之彖曰至于八月有凶用周正也説卦傳曰兊正秋也則用夏正也夏書甘誓言怠棄三正是夏並用三正也盤庚若農服田力穡乃亦有秋是商兼用夏正也金縢秋大熟君牙夏暑雨冬祁寒是周亦兼用夏正也豳風言民俗在夏商之交乃有一之日至四之日及十月改嵗之語是亦兼用周正也左傳叙事用周正而僖五年晉卜偃以童謡推虢之亡謂在九月十月之交是亦用夏正也禮記月令用夏正而季秋為來嵗受朔日亦用周正也蓋周制近者于十二月頒朔逺著于十一月頒之也雜記引孟獻子言正月日至可以有事于上帝七月日至可以有事于祖亦用周正也論語用夏正暮春者春服既成是也孟子用周正七八月旱則苗稿及徒杠輿梁成於十一月十二月是也至于春秋純用周正以史官紀事當用王朝正朔也周禮純用夏正以夏數得天百王所同逸周書云敬授民時巡狩祭享猶是夏焉者是三正並行之明徴也蕙田案自甲子作而有嵗月日時有嵗月日時即有正朔正朔者嵗月日時之首也虞書曰正月曰月正曰上日曰元日曰朔旦周禮曰正嵗曰正月以其為一嵗之首曰正嵗以其為十二月之首曰正月以其為正嵗正月之首日曰元曰上曰朔此與易稱乾元同義所為大哉乾元萬物資始聖人所以先天而不違後天而奉若也古人論三正曰三㣲成著以成三統三㣲成著即資始之意然其用各有所當焉黄鍾始于子律元始于冬至天之統也靈樞五運六氣始于大寒地之統也平秩東作以殷仲春人之統也蔡氏謂三正迭建固為得之其實不止迭建實並行而不可缺故泠倫造律則用天正岐伯論醫則用地正神農教稼則用人正三者並行是為不怠棄若建其一而棄其二何以罪有扈者曰怠棄三正哉是知迭建者止就一代之正朔而言若其奉天道修人事則非合三正用之不可故曰怠棄三正則不惟不奉正朔而已也易臨卦至于八月有凶注八月陽衰隂長故曰有凶蕙田案八月之說有三蜀才云自建丑之月至建申之月凡閱八月則成否否則天地不交萬物不通是至于八月有凶唐孔氏從之而傳義去之至何元子復用其說謂本卦傳云消不久也否泰傳皆有道消道長之文于此卦互見之文王殷人而從殷正其說可信然細觀卦義否泰消長之文乃二卦自相反對之象本卦彖云消不久則于二陽必有關會不得混為消長之說也程傳及紫岩漢上草廬孟敬俱指遯説謂天正建子之月一陽始生為復其二建丑之月二陽長而為臨其七建午之月一隂始生為姤至其八建未之月則二隂長而為遯遯者臨之正對臨卦六爻盡也自復至遯凡八月二陽消矣臨遯反對似得之然何元子謂卦主臨言自臨距遯僅七月其八月有凶應于復卦言之此其說之可疑者也其一說則謂夏正八月于卦為觀自一陽復十一月至臨十二月二陽浸長逼四隂當此之時陽勢方盛至于八月建酉卦為觀四隂浸長逼二陽則臨之二陽至觀危矣序卦相承臨觀反對王秋山謂自六三八變而至觀為八月卦臨則二陽長于下四隂剥于上觀則四隂長于下二陽剥于上矣故曰有凶聖人于此二陽長而隂消之初為二陽消而隂長之慮也蓋方盛而慮衰則盛可久若既衰而後為之慮則無及矣此八變之說于八月之數合于八月之時亦合趙汴水曰消不久之義專以二陽之消息為主以臨與觀反也臨為二陽之長觀為二陽之消少進一位即為剥而陽之消不久矣當臨之時人皆喜陽剛之浸長而聖人于此際已垂浸消之戒視剥復否泰言消長于二卦者其憂深慮逺為尤切浸長者原始有凶者要終言當制于未亂也解彖傳消不久之義于卦中二陽尤有關會朱子兼存之來矣鮮焦弱侯潘去華俱從之惟何元子謂文王彖易而從夏正朱子亦心疑焉不知古者三正並用故啟數有扈之罪曰怠棄三正而逸周書言夏數得天百王所同是以六經中皆三正錯見而用夏正居多即如易說卦云兊者正秋也亦用夏正也何獨臨之彖不可以夏正言乎説卦傳兊正秋也疏兊位是西方之卦斗柄指西是正秋八月也張氏以寜曰兊正秋夏時也夏時百王所同不曰兊正秋而曰兊孟冬于理不可也此與魯史奉周正朔而書之以紀事者自不同蕙田案文王於殷時演易而用夏正孔子於周時贊易亦用夏正此三正通用之證觀承案說卦以兊為正秋亦可見夏時之善所謂三正迭用惟夏得天凡天道春秋之序以建寅為得其正故周禮春秋不得不奉時王之正朔而詩書易象非一代之書不妨多據夏時為言所以損益百王特告顔子以行夏之時也禮記大傳立權度量考文章改正朔易服色疏改正朔者正謂年始朔謂月初周子殷丑夏寅是改正也周夜半殷雞鳴夏平旦是易朔也春秋昭公十七年左氏傳冬有星孛于大辰梓慎曰火出于夏為三月于商為四月于周為五月後漢書陳寵傳元和二年寵奏曰夫冬至之節陽氣始萌故十二月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三㣲成著以通三統周以天元殷以地元夏以人元白虎通王者受命必改朔何明易姓示不相襲也明受之于天不受之于人所以變易民心革其耳目以助化也是以舜禹雖繼太平猶宜改以應天春秋瑞應傳曰敬受瑞應而王改正朔易服色易曰湯武革命順乎天而應乎民也正朔有三何本天有三統謂三㣲之月也朔者蘇也革也言萬物革更于是故統焉三㣲者何謂也陽氣始施黄泉萬物動㣲而未著也十一月之時陽氣始養根株黄泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始芽而白白者隂氣故殷為地正色尚白也十三月之時萬物始達孚甲而出皆黒人得加功故夏為人正色尚黒也論語顔淵問為邦子曰行夏之時朱子注夏時謂以斗柄初昏建寅之月為嵗首也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則嵗月自當以人為紀故孔子嘗曰吾得夏時焉而說者以為夏小正之屬蓋取其時之正與其令之善而於此又以告顔子也孔叢子縣子問子思曰顔回問為邦孔子曰行夏之時若是殷周異政為非乎子思曰夏數得天堯舜之所同也殷周之王征伐革命以應乎天因改正朔若云天時之改耳故不相因也夫受禪於人者則襲其統受命于天者則革之所以神其事如天道之變然也三統之義夏得其正是以夫子云右三正統論書舜典正月上日受終于文祖傳上日朔日也是疏毎月皆有朔日此正月之朔故云上日言一嵗日之上也鄭元以為帝王易代莫不改正堯正建丑舜正建子此時未改堯正故云正月上日即位乃改堯正故云月正元日先儒王肅等以為殷周改正易民視聼自夏已上皆以建寅為正孔意亦然北史李業興傳天平四年使梁梁武帝問尚書正月上日受終文祖此時何正業興對曰此夏正月梁武帝問何以得知業興曰案尚書中候運衡篇云日月營始故知夏正又問堯時以前何月為正業興對曰自堯以上書典不載實所不知梁武又云寅賓出日即是正月日中星鳥以殷仲春即是二月此出堯典何得云堯時不知用何正業興對曰雖三正不同言時節者皆據夏時正月周禮仲春二月㑹男女之無夫家者雖自周書月亦夏時堯之日月亦當如此蕙田案李業興據中候之文證正月上日為建寅之月以月令孟春日在營室故也考堯時冬至日在虚則建寅之月日躔當在奎婁已過營室一次不得云營始也晉志載董巴之言云顓帝以今之孟春正月為元其時正月朔旦立春五星會于天律營室也顓頊又在唐虞之前正月日躔去營室尤逺凡為此說者皆不通於嵗差之故者也鄭氏謂堯正建丑此時未改堯正故云正月上日以中候日在營室推之則建丑為近是其云三正不同言時節者皆據夏時此誠千古定論也月正元日舜格于文祖疏王肅云月正元日猶言正月上日變文耳大禹謨正月朔旦受命于神宗蕙田案鄭康成及髙堂隆等以為堯正建丑舜正建子而堯典以二分二至正四仲之月蓋敬授人時故用人統正所謂夏數得天百王所同者也然竟謂以寅為正則夫子告顔淵不當但取韶舞而曰行夏之時矣若王肅等謂自夏以前俱以建寅為正則又不然甘誓明言怠棄三正則不待商周始創改之也觀承案唐虞建寅堯典經文自有明據二月東巡重華繼治亦别無改正之文夫子毎舉夏時為言者以三代相連對商周言之但舉夏為便亦以唐虞已逺其令或尚踈畧夏王承之而典制益詳今夏禮雖亡而尚傳小正一書可知夏時最為明備故時行夏而舞用韶蓋各舉其盛以為言也康成堯正建丑舜正建子之云洵為穿鑿無據夫三正迭建其來久矣唐虞以前豈無子丑為正者何必斷歸堯舜耶右唐虞夏正朔書伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祇見厥祖傳此湯崩踰月太甲即位奠殯而告蔡氏沈曰元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數蓋朝覲會同頒律授時則以正朔行事至于紀月之數則皆以寅為首或曰孔氏言湯崩踰月太甲即位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑于序書之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣至于改正朔而不改月數則于經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出游十一月行至雲夢繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復政厥辟亦以十二月朔奉嗣王歸于亳蓋祠告復政皆重事也故皆以正朔行之孔氏不得其説而意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容在伊尹而有之不可以不辨張氏以寜曰改正即是改月商改夏正以十二月為正月周改商正以十一月為正月子正以夜半為朔丑正以雞鳴為朔寅正以平旦為朔烏有改正朔而不改月數之理乎虞夏受禪皆以正月行事至商周革命皆改正朔以嵗首之一月為正月人君重居正也月必書正猶年必書元今于嵗首但書冬十二月而不書正則是商一代皆無正矣何以號令天下整齊萬國乎太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳傳湯以元年十一月崩至此二十五月三年服闋此疏周制君薨之年屬前君明年始為新君之元年殷法君薨而新君即位即以其年為元年湯以元年十一月崩至此年十一月為再期至十二月服闋三年之喪二十五月而畢也張氏以寜曰若以元祀為踰年即位改元之年則方其改元既已踰年矣又加以元祀至三祀之二十五月則為四年而非三祀孟子明言三年復歸于亳非四年也而況營桐之舉乃人臣之大變不得已之事伊尹固幸其君之終喪而急迎以歸故不待嵗首正月也由是以觀伊訓之元祀非踰年改元之年而十二月為商之十二月夏之十一月信矣顧氏炎武曰胡氏引伊訓太甲十有二月之文以為商人不改月之證與孔傳不合亦未有明據孔傳未嘗以十二月為嵗首蕙田案改朔不改月之說始于胡文定之春秋傳繼以蔡仲黙之書傳先儒援引經傳之文以駁之而卒未有所據以斥其秦人建亥不改月及商書十二月之說者考顧氏炎武日知錄謂胡氏引秦人以亥為正不改時月為證則不然漢書髙帝紀春正月注師古云凡此諸月號皆太初正律之後紀事者追改之非當時本稱也以十月為嵗首即謂十月為正月今此真正月當時謂之四月耳他皆類此叔孫通傳諸侯羣臣朝十月師古云漢時尚以十月為正月故行朝嵗之禮史家追書十月又曰漢元年冬十月五星聚于東井當是建申之月劉攽云案律太白辰星去日率不過一兩次今十月而從嵗星于東井無是理也然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星謂從嵗星也據此足明記事之文皆是追改惟此一事失于追改遂以秦之十月為漢之十月夫以七月誤為十月正足為秦人改月之證而胡氏非矣此說足以破其秦人不改月之謬獨商書伊訓及太甲中篇一云元祀十有二月一云三祀十有二月朔似可以為不改月之證而世之駁蔡傳者第據孔安國湯崩踰月改元之文以為殷周禮有不同或又以崩年改元亂世之事遂詆後出古文未足深信是二說者俱未能得其要領無以折九峰之辨而息後學之疑今案漢書志引伊訓篇云惟太甲元年十有二月乙丑朔伊尹祀于先王誕資有牧方明其下文又釋之曰言雖有成湯太丁外丙之喪以冬至越茀祀先王於方明以配上帝是朔旦冬至之嵗也乃知伊訓所稱十二月者正建子之月在夏為十一月在商則為十二月也禮云喪三年不祭惟天地社稷越紼而行事此所云祀于先王者乃冬至配天之祭故祭畢稱烈祖之成德克配上帝以訓戒嗣君而非正朔告廟之祭也劉歆三統術推是年商十二月乙丑朔旦冬至與伊訓正合然則伊訓之文正足為殷人改月之證尚書春秋紀事之體本自若合符節若夫桐宮之放乃聖人不得已之事一朝悔悟便當復辟何必俟嵗首之月張敷言有云放桐之事人臣大變周公之聖猶被流言阿衡之心為何如哉朝而自怨夕當復辟尤不須于正月也此足以破胡氏蔡氏據太甲以為殷人不改月之謬矣觀承案漢書元年冬十月師古注最明劉攽說亦更詳暢然實本之北史髙允傳也可知古人原無不改月之説胡氏偶不及檢耳至漢志引太甲元年十二月謂正是建子之月在夏為十一月者在商則為十二月尤足為殷人改月之證破後人不改月之疑矣右商正朔書泰誓惟十有三年春大會于孟津注此周之孟春春疏知是周之孟建子之月者案劉歆三統術以殷之十二月武王𤼵師至明年二月甲子咸劉商王紂彼十二月即周之正月夏之十一月也蔡氏沈曰春者孟春建寅之月也案漢孔氏以春為建子之月蓋謂三代改正朔必改月數改月數必以其正為四時之首序言一月戊午既以一月為建子之月而經又繫之以春故遂以建子之月為春夫改正朔不改月數于太甲辨之詳矣而四時改易尤為無藝冬不可以為春寒不可以為暖固不待辨而明也或曰鄭氏箋詩惟莫之春亦言周之季春于夏為孟春日此漢儒氶襲之誤耳且臣工詩言惟莫之春亦又何求如何新畬於皇來牟將受厥明蓋言莫春則當治其新畬矣今如何哉然牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正季春審矣鄭氏于詩且不得其義則其考之固不審也不然則商以季冬為春周以仲冬為春四時反逆皆不得其正豈三代聖人奉天之政乎朱氏鶴齡曰蔡傳解春為建寅之月又力辨商周時月俱不改愚考春秋經傳之文凡十餘條語多不錄而知其說非也蔡氏謂冬不可為春十一月不可為正月夫黄鐘初九律之首陽之變也林鐘初六呂之首隂之變也子者一陽之生于卦為復至午而陽極焉午者一隂之生于卦為姤至子而隂極焉子為星紀之次五星起其初日月起其中律紀皆以子為首則何不可以首月令乎三正迭建時無失次夏正用木之著者也殷周二正用木之㣲者也皆陽位也特孟陬之月尤切民事故夫子曰行夏之時而豈謂子丑必不可為正哉秦人改建亥月蓋自以水德代周且五行木生于亥故用之雖事不師古然改時與月必循三代之舊本紀元年冬十月顔師古謂是太初正律以後史臣追書蔡氏顧引之以為不改時月之證其亦踈矣唐順之曰考秦改正朔在始皇二十六年庚辰周之亡已三十六年矣周在時正朔已不行于天下況既亡乎秦紀所云冬十月恐是周亡之後因民間私稱夏正而書之此于周改月之説自不相礙不足以為據也蔡氏又據伊訓惟元祀十有二月乙丑與泰誓惟十有三年春以為皆不改時月而駁漢孔氏之非愚謂據此二端則時月之改尤章章也夫商人建丑十有二月夏正之十一月也下云伊尹祠于先王奉嗣王祗見厥祖先王自契元㝠以下厥祖湯也商人宗廟之禮不可詳考祭法云殷人禘嚳而郊㝠祖契而宗湯安知不以其月至日伊尹攝行郊祀配天之禮因而陳訓太甲乎班固以三統術推之湯伐桀之嵗在大火房五度故左傳曰大火閼伯之墟實配商人後十二年十二月乙丑朔旦冬至伊訓不言朔則乙丑非朔日也此恐誤其日伊尹祀先王于方明方明見儀禮以配上帝此其證也十有三年之春即春秋春王正月之春謂十一月也何以明之武成惟一月壬辰旁死魄越翌日癸巳王朝步自周于征伐商戊午師渡孟津癸亥陳于商郊牧野一月二孔氏以為周正建子之月是也師渡孟津即大㑹于孟津也癸巳至戊午凡二十六日皆在十一月癸亥則十二月之四日也國語引伶州鳩言武王克商嵗在鶉火周語注嵗嵗星也鶉火次名周分野日在析木月在天駟辰在斗柄星在天黿班固以三統術推之師方𤼵為殷十一月戊子日日在析木箕七度其夕月在房五度房天駟也後三日得正月辛卯朔合辰在斗前一度斗柄也明日壬辰晨星始見戊午渡孟津明日己未冬至晨星與婺女伏閱建星牽牛至于婺女天黿之首至庚申二月朔日也癸亥陳牧野甲子合戰與書傳無一不符者此又其證也蔡氏又引臣工詩莫春來麰語以為夏月未嘗改則愚于此有說矣古者天子受命凡改元頒律朝覲會同諸大政皆以正朔行之至于分至啟閉民事早晚所關者未嘗不遵夏小正之書東萊呂氏所云三正通于民俗周人兼而用之是也蓋史書記時事則從周正月令紀嵗功則從夏正從周正者多出于朝廷政令之施設從夏正者多出于民間士女之話言詩書三禮所舉夏正難更僕數安得援之為不改時月之證乎信如蔡說則商周正朔名改實不改夫子何必云行夏之時乎周禮天官太宰正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而歛之注正月周之正月以正月朝日布治于天下至正嵗又書而懸于象魏使萬民觀焉小宰正嵗帥治官之屬而觀治象之法狥以木鐸曰不用法者國有常刑注正嵗謂夏之正月得四時之正以出教令者審也宰夫嵗終則令羣吏正嵗會正嵗則以法警戒羣吏注嵗終謂周季冬治疏知是周之季冬者以正月之吉始和是周正月布于天下至今嵗終考之是盡一嵗十二月之事故知非夏之嵗終也後凡言嵗終倣此凌人掌氷正嵗十有二月令斬氷三其凌注正嵗季冬大寒氷方盛之時嵗疏周雖以建子為正行事則皆用夏之正若據殷周則十二月氷猶未堅也華氏學泉曰周禮正月之吉或云周正以經文凌人十二月斬氷斷之則十二月為夏正建丑之月雖鄭氏無能立異說也既十二月為夏正建丑之月而正月為周正建子之月有是理乎既正月為夏正建寅之月則嵗終為十二月建丑之月而正嵗當即正月而或言正月或言正嵗亦通稱耳蔡氏德晉曰正嵗即正月以其為十二月之首為正月以其為一嵗之首曰正嵗太宰職正月之吉懸治象法小宰職正嵗帥治官之屬而觀治象法明係一時事可見康成以布治象為建子月乃懸治象為建寅月則暗改經文乃字為正嵗二字至凌人掌氷政政字則明改為正連下嵗字讀皆徒生葛藤耳蕙田案周禮六官内宮正内宰山虞司馬司爟司烜柞氏薙氏等職凡言四時者皆用夏令則正月亦夏正也夏正建寅之月為孟春三陽漸盛東風解凍故云始和若建子正天氣閉塞而成冬豳風七月詩一之日觱𤼵是其時也安得云始和康成因此二字不協遂訓為改造之意殊屬牽強又月令在秦人未改朔之先其序十二月于季冬則曰是月也數將幾終嵗且更始天子乃與公卿大夫飭國典論時令以待來嵗之宜孟春月則曰命相布德和令與此正同地官大司徒正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而歛之注周正月朔日疏周禮凡言正嵗者則夏之建寅正月直言正月者則周之建子正月也正嵗令于教官曰各供爾職修乃事以聽王命其有不正則國有常刑注正嵗夏正月朔日小司徒正嵗則帥其屬而觀教法之象狥以木鐸曰不用法者國有常刑鄉師正嵗稽其鄉器鄉大夫正月之吉受教法于司徒退而頒之於其鄉吏使各以教其所治正嵗令羣吏考法于司徒以退各憲之于其所治州長正月之吉各屬其州之民而讀法正嵗則讀教法如初注雖以正月讀之至正嵗猶復讀之因此四時之正重申之黨正及四時之孟月吉日則屬民而讀邦法以糾戒之正嵗屬民讀法遂大夫正嵗簡稼器修稼政注稼政孟春之月令所云修封疆審端徑術善相邱陵阪險原隰土地所宜五穀所殖以教道民必躬親之春官太史正嵗年以序事頒之于官府及都鄙頒告朔于邦國注中數日嵗朔數日年中朔大小不齊正之以閏若今作律也眂祲正嵗則行事嵗終則弊其事注占夢以季冬贈惡夢此正月而行安宅之事以順民心弊斷也夏官大司馬正月之吉始和布政于邦國都鄙乃縣政象之法于象魏使萬民觀政象挾日而歛之訓方氏正嵗則布而訓四方而觀新物秋官大司冦正月之吉始和布刑于邦國都鄙乃懸刑象之法於象魏使萬民觀刑象挾日而歛之小司冦正嵗率其屬而觀刑象令以木鐸曰不用法者國有常刑士師正嵗帥其屬而憲禁令于國及郊野張氏以寜曰凌人正嵗十有二月夏季冬也遂大夫訓方氏正嵗夏正月也小司㓂士師先嵗終而後正嵗眂祲先正嵗而後嵗終考之皆夏正月夏季冬也所謂猶自夏焉者也逸周書周月解惟一月既南至昏昴畢見日短極基踐長㣲陽動于黄泉隂慘于萬物是月斗柄建子始昏北指陽氣虧草木萌蕩日月俱起于牽牛之初右回而行月周天起一次而與日合宿日行月一次周天泊舍于十有二辰終則復始是謂日月權輿周正嵗道數起於時一而成於十次一為首其義則然凡四時成嵗有春夏秋冬各有孟仲季以名十有二月中氣以著時應春三月中氣雨水春分穀雨夏三月中氣小滿夏至大暑秋三月中氣處暑秋分霜降冬三月中氣小雪冬至大寒閏無中氣斗指兩辰之間萬物春生夏長秋收冬藏天地之正四時之極不易之道夏數得天百王所共其在商湯用師于夏除民之災順天革命改正朔變服殊號一文一質示不相沿以建丑之月為正易民之視若天時大變亦一代之事亦越我周王致伐于商改正異械以垂三統至於敬授民時巡狩祭享猶自夏焉是謂周月以紀於政王氏樵曰子月為一嵗之始猶子時為一日之始安在子之不可以為春乎夫正朔者十二月之首史官紀年之所始也正月者十二月之首律官紀年之所始也正朔有改三代迭建三正以新民視聽月朔有改有不改有改于上不改于下從民間之便乃若春秋則史官之書必用時王正朔而律法要為不可亂時必與月合時月必與所書之事合或者乃必欲旁引曲證以為周不改時與月其亦踈且固矣華氏泉曰六經論孟所稱或用周正或用夏正參錯不一惟周禮則斷從夏正春秋則斷從周正汲冡周月解篇云夏數得天百王所同至于敬授人時巡狩祭享猶自夏焉故先儒謂商周革命建子建丑有改正朔之名而授時祭享有用夏時之實春秋史官紀事之體必書本朝正朔尊王也其民俗通行悉從夏令蔡氏德晉曰或問經文有正月有正嵗鄭康成以正月為周正正嵗為夏正葉秀𤼵以正月為夏正正嵗為周正吳德方以正月正嵗皆為周正王昭明以正月正嵗皆為夏正果孰為是曰昭明之說近是據逸周書授時祭享猶是夏焉周禮正授時祭享之書凡四時皆用夏令則正月用夏正可知況凌人十二月令斬氷康成亦以為用夏正矣十二月既用夏正正月安得用周正也詩唐風蟋蟀蟋蟀在堂嵗聿其莫今我不樂日月其除傳蟋蟀九月在堂聿遂也九疏小明云嵗聿云暮采蕭穫菽采穫亦是九月之事月嵗未為暮而云聿暮者言過此則嵗將暮耳謂十月以後為嵗暮也張氏以寜曰周以十一月為嵗首故此言九月以後為嵗暮周正也顧氏棟髙曰日月其除除者除舊布新今人以臘月三十日為除夕是詩明言九月為嵗將莫十月為嵗除是以十一月為嵗首之明證也豳風七月一之日觱𤼵二之日栗烈三之日于耜四之日舉趾傳一之日周正月也二之日殷正月也三之日夏正月四之日夏二月周四月也朱子曰一之日謂斗建子一陽之月二之日謂斗建丑二陽之月也蓋周之先公已用此以紀候故周有天下遂以為一代之正朔也顧氏棟髙曰據此則公劉當夏之時已自以子月起數以夏之十一月為正月以夏之正月為三月矣一之日二之日猶言一月之日二月之日不曰正而曰一者避時王之正朔也後武王伐商猶曰惟一月壬辰旁死魄蓋此時未革殷命猶從舊號實昉于此十月蟋蟀入我牀下穹窒熏䑕塞向墐户嗟我婦子曰為改嵗入此室處疏曰為改嵗者以仲冬十一月陽氣始萌可以為年之始故改正朔以建子為正嵗亦莫止謂十月為嵗莫是過十月則改嵗乃大寒故言改嵗之後觱𤼵栗烈大寒之時方始入此室而居之也顧氏棟髙曰豳風凡言月者皆夏正言日者皆周正此于十月之下即云穹窒熏䑕曰為改嵗是明言公劉當夏時已自以十一月為嵗首不待注疏而本文已是顯然小雅采薇采薇采薇薇亦作止曰歸曰歸嵗亦莫止采薇采薇薇亦剛止曰歸曰歸嵗亦陽止箋十月為陽時純坤用事嫌于無陽故名此月為陽月張氏以寜曰首章曰莫止而三章曰陽止則周十二月夏之十月也周以夏之十月為嵗莫以十一月為嵗首也出車春日遲遲卉木萋萋倉庚喈喈采蘩祁祁張氏以寜曰諸詩皆屬周正無異詞獨此一章有不合蓋周正雖改而夏正之迭用已久故民間之話言猶不能忘而稱道之呂氏曰見三正之通于民俗此皆述民俗之話言非史官之紀事也十月十月之交朔日辛卯日有食之亦孔之醜箋周之十月夏之八月也張氏以寜曰下文云燁燁震電蓋八月雷乃收聲之時而震電見焉亦為變異此時亦周正也小明我征徂西至于艽野二月初吉載離寒暑昔我徃矣日月方除曷云其還嵗聿云莫昔我徃矣日月方奥曷云其還政事愈蹙嵗聿云莫采蕭穫菽張氏以寜曰周二月夏十二月也言自我之徂西至於艽野之地其時十二月朔旦今則已離閱冬寒夏暑尚未得歸此心之所以憂而且苦也曰至者據已至彼地而言曰徃者據在家始𤼵而言二章三章乃追叙其始𤼵之時也日月方除除者除舊布新之謂日月方奥奥與厥民隩之義同周以十一月為嵗首民寒而聚居于隩我之始亦自謂其時即歸何至今嵗將莫而尚未得歸至九月采蕭穫菽以為卒嵗之用也蓋小明大夫以夏十一月始𤼵徂西以十二月至于艽野至明年之九月尚未得歸經閱踰年之久所以憂也此詩首尾相應次序甚明與周正合若以夏正二月而說則仲春非嵗首不得以為除舊而布新自二月至九月則二月氣已暖至九月肅霜而肇寒亦不得以為離閱寒暑也顧氏棟髙曰張氏此章𤼵明周正之㫖十分精當若毛傳以方奥為二月之初訓為暖則二月尚未可云煖鄭又據爾雅文四月為除尤無當上甫言二月此忽言四月且自四月至九月皆煖日無寒時又何言載離寒暑乎孔疏于蟋蟀篇引此采蕭穫菽為嵗莫九月之事明以此為周正則此二月為周二月夏之十二月信矣周頌臣工嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾箋周之莫春于夏為孟春諸侯春朝用孟月故于周之晚春遣之勅其車右保介以時事當歸勸農趨時也知疏知非夏之季春者以夏之季春非復朝王之月故此為夏之正月也夏之孟春耕期已逼故勅其車右以時事歸即耕田是也張氏以寜曰蔡氏書傳引此以為麰麥將熟其為夏之莫春三月可知今考之全篇止曰將受厥明不曰來牟將熟將之云者未至而預期之辭見于經傳甚多況其曰如何新畬命我衆人庤乃錢鎛即七月之詩言于耜舉趾周官遂大夫正嵗簡稼器修稼政之事嗟嗟保介即月令孟春祈穀天子載耒耜措之于保介之御間皆夏正孟春事也若待建辰之三月始治新畬始庤錢鎛不亦晚乎將受厥明乃期之之辭非即時賦物之比不可以文害辭也則此莫春為夏之正月信矣蕙田案詩三百篇或用夏正或用周正參差不一蓋三正通乎民俗非如史官編年紀事必遵時王之制也張氏以寜解六月棲棲四月維夏諸詩論語暮春者春服既成俱以為周正支離牽合反滋後人之惑今皆不取春秋隱公元年春王正月疏王者革前代改正朔夏以建寅之月為正殷以建丑之月為正三代異制正朔不同唯時王所建故以王字冠之言是今王之正月也王不在春上者月改則春移春非王所改故王不先春王必連月故王處春下周以楚子為正則周之二月三月皆是前世之正月也故于春每月書王王二月者言是我王之二月乃殷之正月正也王三月者言是我王之三月乃夏之正月也既有朔之異故毎月稱王以别之也左氏傳元年春王周正月注言周以别夏殷公羊傳春者何嵗之始也曷為先言王而後言正月王正月也何言乎王正月大一統也胡氏安國曰案左氏曰王周正月周人以建子為嵗首則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣乃以夏時冠周月何哉聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之騐也或曰非天子不議禮仲尼有聖德無其位而改正朔可乎曰有是言也不曰春秋天子之事乎以夏時冠月垂法後世以周正紀事示無其位不敢自專也其㫖㣲矣朱子語類問古者改正朔如以建子月為嵗首則謂之正月抑只謂之十一月曰此亦不可考如詩之月數即今之月孟子七八月之間旱乃今之五六月十一月徒杠成十二月輿梁成乃今之九十月國語夏令曰九月除道十月成梁即孟子之十一月十二月若以為改月則與孟子春秋相合而與詩書不相合若以為不改月則與詩書相合而與孟子春秋不相合如秦元年以十月為首末又有正月又似不改月蕙田案朱子注詩及孟子皆主改月此條猶屬未定之論語類某親見文定公家說文定春秋說夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月某便不敢信恁地時二百四十二年夫子只證得行夏之時四箇字據今周禮有正月有正嵗則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅蕙田案此駁胡氏夏時冠周月之說極精朱子文集與張敬夫書春秋正朔事比以書考之凡書月皆不著時疑古史記事例只如此至孔子作春秋然後以天時加王月以明上奉天時下正王朔之義而加春于建子之月則行夏時之意亦在其中觀伊川先生劉質夫之意似是如此但春秋兩字乃魯史之舊名又似有所未通蕙田案史家編年之例以日繫月以月繫時以時繫嵗書月可不書曰未有日而不月者也書時可不書月未有月而無時者也以春秋之文證之隱公元年春王正月夏五月秋七月冬十有二月皆時月並書謂春夏秋冬孔子所増加猶可通也二年春公會戎于潛三年秋武氏子來求賻皆有時而無月若元年不書春至二年始書春三年始書秋有是例乎春秋之名孔子以前已有之則春字非孔子所加審矣尚書係記言之文與編年者不同故書月書時書日恒無定例如泰誓金縢書時不書月伊訓太甲武成康誥召誥多士多方顧命畢命書月不書時或以為古史時月例不兼書果爾則泰誓中云惟戊午牧誓云時甲子昧爽洛誥云戊辰王在新邑及詩小雅吉日庚午之類皆有日無月豈得云古人日月亦不兼書乎孔穎達曰春秋主書動事編次為文於日月時年皆具尚書惟記言語不為編次故不具真通儒之論也朱子因伊川假天時立義之說故為此論而又云春秋兩字乃魯史之舊名則已知其不然矣又答吳晦叔書春秋書正據伊川說則只是周正建子之月但非春而書春則夫子有行夏時之意而假天時以立義耳文定引商書十有二月漢史冬十月為證以明周不改月此固然矣然以孟子考之則七八月乃建午建未之月暑雨苗長之時而十一月十二月乃建戌建亥之月將寒成梁之候又似并改月號此又何耶或是當時二者並行唯人所用但春秋既是國史則必用時之正其比商書不同者蓋後世之彌文而秦漢直稱十月者則其制度之濶略耳蕙田案春秋既是國史必用時之正其餘散見于他書者則三正通用此不易之論也殷及秦漢亦皆改月胡氏所引證俱未可信又前書所諭周正之說終未穩當孟子所謂七八月乃今之五六月所謂十一月十二月乃今之九月十月是周人固已改月矣但天時則不可改故書云秋大熟未穫此即止是今時之秋蓋非酉戌之月則未有以見夫嵗之大熟而未穫以此考之今春秋月數乃魯史之舊文而四時之序則孔子之㣲意伊川所謂假天時以立義者正謂此也若謂周人初不改月則未有明據故文定只以商秦二事為證以彼之博洽精勤所取猶止於此則無他可考必矣今乃欲以十月隕霜之異證之恐未足以為不改月之騐也蓋隕霜在今之十月則不足怪在周之十月則為異矣又何必史書八月然後為異哉況魯史不傳無以必知其然不若只以孟子尚書為據之明且審也若尚有疑則不若且闕之之為愈不必强為之說矣蕙田案此書疑周人改月而不改時與伊川之說略同考周時列國之史皆名春秋晉語司馬侯對晉悼公曰羊舌肸習于春秋是晉有春秋楚語申叔時論傅太子之法曰教之以春秋是楚有春秋既以春秋名其書必無書月不書時之理春秋書春無氷則周以冬為春之證也孟子稱秋陽以暴之則周以夏為秋之證也如謂月可改時不可改周人初不改時故魯史亦不書時而孔子特加以寓行夏時之意則必加冬於王正月之上加春於王三月之上然後可也以建子為春既非夏時以夏時冠周月又非所以從周湯潛菴所謂不夏不周之間孔子何以自處者其說簡而當矣金縢所云秋大熟自據夏正春秋所書春王正月自據周正三正通用由來已久不必執書以難春秋也又答林擇之書三代正朔以元祀十有二月考之則商人但以建丑之月為嵗首而不改月號以孟子七八月十一月十二月之說考之則周人以建子之月為正月而不改時以書一月戊午厥四月哉生明之類考之則古史例不書時以程子假天時以立義之云考之則是夫子作春秋時特加此四字以繫年見行夏時之意若如胡傳之說則是周亦未嘗改月而孔子特以夏正建寅之月為嵗首月下所書之事却是周正建子月事自是之後月與事常相差兩月恐聖人制作之意不如是之紛更煩擾其所制作亦不如是之錯亂無章也愚見如此而考之劉質夫說亦云先書春王正月而後書二百四十二年之事皆天理也似亦以春字為夫子所加但魯史本謂之春秋則又似元有此字而杜元凱左傳後序載汲冡竹書乃晉國之史却以夏正建寅之月為嵗首則又似胡氏之說可為據此間無竹書煩為見拙齋扣之或有此書借録一兩年示及幸甚幸甚又漢書元年冬十月注家以為武帝改用夏時之後史官追正其事亦未知是否此亦更煩子細心考也蕙田案此條辨胡氏夏時冠周月之說極明快又謂春秋二字魯史元有之皆不易之論然猶不能無疑於竹書晉正建寅之說顧氏棟髙嘗論之曰汲冢書曲沃莊伯之十一年十一月為魯隱之元年正月其紀年皆用夏正先儒謂晉封太原沿唐虞之故俗理或有之然看來成周盛時原所不禁不特周也亦通三代所不禁豳風稱一之日二之日公劉當夏之時便已自以子月起數但不曰正而曰一以避時王之尊號至武王伐商之年商命未改猶曰惟一月壬辰不敢遽用正字詩書所稱同一揆也夏殷時不禁豳周之用子正周時獨禁晉之用寅正乎若三代果有此禁則啟之罪狀有扈氏當云怠棄夏正不當云怠棄三正矣此言可以釋考亭之疑漢書注稱漢初所書冬十月皆史官追改顧炎武據以證秦漢之亦改月然朱子亦已見及之大儒讀書細心非他人所及也趙氏汸周正考春秋雖修史為經猶存其大體謂始年為元年嵗首為春一月為正月加王于正皆從史文傳獨釋王正月者見國史所書乃時王正朔月為周月則時亦周時孔氏謂月改則春移是也後于僖公五年春記正月辛亥朔日南至昭十七年夏六月記太史曰在此月也日過分而未至當夏四月是謂孟夏又記梓慎曰火出于夏為三月于商為四月于周為五月皆以周人改時改月春夏秋冬之序則循周正分至啟閉之候則仍夏時其經書冬十月雨雪春正月無氷及冬十月隕霜殺菽之類皆為記災可知矣汲冢竹書有周月解亦曰夏數得天百王所同商以建丑為正亦越我周作正以垂三統至于敬授民時巡狩烝享猶用夏焉其言損益之意甚明經書冬烝春狩夏蒐以此蓋三正之義備矣而近代說者徃徃不然夫以左氏去聖人未逺終春秋二百四十二年以及戰國之際中國無改物之變魯未滅亡傳于當時正朔豈容有差漢書志據三統術商十二月乙丑朔且冬至即書伊訓篇太甲元年十有二月乙丑朔伊尹祠于先王以冬至越茀行事其所引書辭有序又言後九十五嵗十二月甲申朔旦冬至無餘分春秋律周文王四十二年十二月丁丑朔旦冬至後八嵗為武王伐紂克殷之嵗二月己丑晦大寒閏月庚寅朔三月二日庚申驚蟄周公攝政五年正月丁巳朔旦冬至禮記孟獻子亦曰正月日至七月日至其說皆與傳合夫冬至在商之十二月在周之正月大寒在周之二月驚蟄在三月夏至在七月而太初術其在立冬小雪則曰于夏為十月商為十一月周為十二月唐人大衍術追算春秋冬至亦皆在正月孰謂殷周不改月乎陳寵曰陽氣始萌有蘭射干芸荔之應天以為正周以為春陽氣上通雉雊雞乳地以為正殷以為春陽氣已至天地已交萬物皆正蟄蟲始振人以為正夏以為春蓋天施于子地化于丑人生于寅三陽雖有㣲著三正皆可言春此亦術家相承之說所謂夏數得天以其最適四時之中爾孰謂建子非春乎乃若夫子答顔子為邦之問則與作春秋事異蓋春秋即當代之書以治當代之臣子不當易周時以惑民聽為邦為後王立法故舉四代禮樂而酌其中夫固各有攸當也如使周不改時則何必曰行夏之時使夫子果欲用夏變周則亦何以責諸侯之無王議桓文而斥吳楚哉而或者猶以為千古不決之疑則以詩書周禮論語孟子所言時月不能皆合故也夫三正通于民俗久矣春秋本侯國史記書王正以表大順與頒朔告朔為一體其所書事有當繫月者有當繫時者與他經不同詩本歌謡又多言民事故或用夏正以便文通俗周禮所書正月正嵗皆夏正也諸官制職掌實循二代而損益之其著時月者又多民事與巡狩烝享自夏者同故仍夏時以存故典見因革蓋非赴告䇿書定為一代之制者皆得通言之則又不可論於春秋矣若論語言莫春亦如詩書言春夏皆通民俗之恒辭也不可據以為周不改時孟子言七八月之間旱十一月徒杠成十二月輿梁成在左傳後則周改月猶自若竹書又記晉曲沃莊伯之十一年十一月魯隱公之元年正月也竹書乃後人用夏正追録舊史故與春秋不同然亦未嘗輒以夏正亂春秋之時月也自啖趙而後學者徃徃習攻左氏而王周正月為甚以其尤害于經特詳著焉蕙田案趙氏之論頗為貫串熊氏朋來曰孔子所謂行夏之時見于答顔淵問為邦者然也至于因魯史作春秋乃當時諸侯奉時王正朔以為國史所書之月為周正所書之時亦周正經傳日月自可互證而儒者猶欲執夏時之說以棄之譬如孔子言車豈必止言殷輅哉小戴記孟獻子之言曰正月日至可以有事于上帝七月日至可以有事于祖此言冬至在周正之春正月而夏至在周正之秋七月明堂位所言孟春即建子月所言季夏六月即建已月禮記尚然況春秋乎證于左傳可見矣若拘夏時周正之說則正月二月須書冬而三月乃可書春爾且如桓四年春正月狩于郎周人用仲冬狩田此以春正月書之即建子之月書春也哀十四年春西狩亦以周正之春行仲冬之狩桓十四年春正月無氷若夏正春正月則解凍矣惟建子之月無氷故紀異而書成元年春二月無氷襄二十八年春無氷皆可為證定元年冬十月隕霜殺菽此夏正秋八月而書冬也若建亥之月則隕霜不為異而亦無菽矣大抵周人雖以夏時並行豳詩周禮則然唯春秋魯史專主周正陽生于子即為春隂生于午即為秋學者惑夏時之說謂至朔同日僅見于傳而經無有也不思經傳所書月日參考相同僅以僖五年經傳言之正月辛亥至朔月日左氏欲以見分至之例故書春王正月辛亥朔日南至自正月以後日月可證者經書九月戊申朔日有食之傳書八月甲午晉侯圍上陽又書冬十二月丙子朔晉滅虢以六十甲子數之自隔年十二月戊申晉有申生之事越三日即正月辛亥朔魯聞晉難必在正月故經以春書也是年嵗在丙寅正月辛亥朔大二月辛巳朔大三月辛亥朔小四月庚辰朔大五月庚戌朔小六月己卯朔大七月己酉朔小八月戊寅朔大九月戊申朔小十月丁丑朔大十一月丁未朔小十二月丙子朔大閏十二月丙午朔小以八月戊寅朔至甲午晉圍上陽八月十七日也由八月甲午數至九月朔正得戊申由九月戊申朔至十二月朔除兩小月該八十八日故以十二月朔得丙子其言丙子旦日在尾以冬十二月而日在尾此時尾度多在卯且後逼閏月宜其尚以建戌中氣而合朔于卯之尾宿所謂九月十月之交者以夏正言之所謂冬十二月者以周正書之以經傳日月參考可無疑矣或謂昭二十年己卯傳亦書春王二月己丑朔日南至自僖五年至朔同日為始數至此年得第七章本注以為失閏案本年十一月乙酉朔故經于此月有辛卯乃初七日也閏當在隔年十二月而在是年八月則正月至七月皆以失閏而差一月二十一年庚辰經書秋七月壬午朔日有食之自二月己丑朔數至次年七月壬午中間為己丑者退小盡八箇月自壬午去己丑恰退八日經傳正是相同觀僖五年左氏南至之書即孟獻子所謂正月日至也觀昭二十一年梓慎日食以對孟獻子所謂七月日至也冬日至而傳稱春正月夏日至而經書秋七月則春秋所書時月皆用周正明甚王氏守仁春王正月説春秋書元年春王正月蓋仲尼作經始筆也說者或以為周雖建子而不改月或以為周改月不改時其最有據為世所宗者則以夫子嘗欲行夏之時此以夏時冠周月益見諸行事之實也紛紛之論遂使聖人明白簡實之訓反為千古不決之疑夫子嘗曰吾從周又曰非天子不議禮不制度生乎今之世反古之道災及其身者仲尼有聖德無其位而改周之正朔是議禮制度自己出矣其得為從周乎夫子患天下之諸侯强皆不復知有天王也于是乎作春秋以誅僭亂尊周室正一王之大法而已乃首改周之正朔其何以服亂臣賊子之心春秋之法變舊章者必誅若宣公之稅畝紊王制者必誅若鄭莊之歸祊無王命者必誅若莒人之入向是三者之有罪固猶未至于變易天王正朔之甚使魯宜鄭莊之徒舉是以詰夫子則將何辭以對豈春秋忠恕先自治而後治人之意乎今必泥于行夏之時一言而曲為之說以為是固見諸行事之騐又引孟子春秋天子之事罪我者其唯春秋之言而證之夫謂春秋為天子之事者謂其時天王之法不行于天下而夫子作是以明之耳其賞人之功罪人之罪誅人之惡與人之善蓋亦據事直書而褒貶自見若士師之斷獄辭具而獄成然夫子猶自嫌于侵史之職明天子之權而謂天下後世且將以是而罪我固未嘗取無罪之人而論斷之曰吾以明法于天下取時王之制而更易之曰吾以垂訓于後人法未及明訓未及垂而已自陷于殺人比于亂逆之黨矣或曰子謂周之改月與時也何據曰吾據春秋之文也夫周不改月與時也則春秋必不書曰春王正月春秋而書曰春王正月則其改月與時也何疑況禮記稱正月七月日至而前漢志武王伐紂之嵗周正月辛卯朔合辰在斗前一度戊午師度孟津明日己未冬至考之泰誓十有三年春武成一月壬辰之說皆足以相為𤼵明證周之改月與時而子意直據夫子春秋之筆有不必更援是以為證者今舍夫子明白無疑之直筆而必欲旁引曲據證之于穿鑿可疑之地是惑之甚也曰如子之言則冬可以為春乎曰何為而不可陽生于子而極于己午隂生于午而極于亥子陽生而春始盡于寅而猶夏之春也隂生而秋始盡于申而猶夏之秋也自一陽之復以極于六陽之乾而為春夏自一隂之姤以極于六隂之坤而為秋冬此文王之所演而周公之所繫武王周公其論之審矣若夫仲尼夏時之論則以其關于人事者比之建子為尤切而非謂其為不可也啟之征有扈曰怠棄三正則三正之用在夏而已然非始于周矣曰夏時冠周月此安定之論而程子亦嘗云爾曾謂程子之賢而不及是哉曰非謂其知之不及也程子蓋泥于論語行夏之時亦推求聖言之過耳夫論語者夫子議道之書而春秋者魯國記事之史議道自夫子則不可以不盡紀事在魯國則不可以不實道並行而不相悖者也且令周雖建子而不改時與月則固夏時矣而夫子又何以行夏之時云乎程子之云蓋亦推求聖言之過耳庸何傷夫子書曰君子不以人廢言使程子而猶在也其殆不廢子言矣蕙田案此據筆削大義立言極正大顧氏炎武日知録春秋時月並書于古未之見考之尚書如泰誓十有三年春大會于孟津金縢秋大熟末穫言時則不言月伊訓惟元祀十有二月乙丑太甲中惟三祀十有二月朔武成惟一月壬辰康誥惟四月哉生魄召誥惟三月丙午朏多士惟三月多方惟三月丁亥顧命惟四月哉生魄畢命惟十有二年六月庚午朏言月不言時朱文公答林擇之亦有古文例不書時之說其他鍾鼎古文多如此春秋獨並舉時月者以其為編年之史有時有月有日多是義例所存不容于缺一也或疑夫子特筆是不然舊史既以春秋為名自當書時且如隱公二年春公㑹戎于潛不容二年書春元年乃不書春是知謂以時冠月出于夫子者非也建子之月而書春此周人謂之春矣後漢書陳寵傳曰天正建子周以為春元熊朋來五經說曰陽生于子即為春隂生于午即為秋此之謂天統未為天子則雖建子而不敢謂之正武成惟一月壬辰是也巳為天子則謂之正而復加王以别于夏殷春秋王正月是也左氏傳曰元年春王周正月以一字盡之矣湯氏斌春王正月辨聖人之書明白簡易而後儒推求過甚遂成不決之疑者如春王正月之類是也注春秋者不下數十家置春王正月四字不論者固有之其以周改月兼改時者則漢孔安國鄭康成至明趙子常王陽明賀景瞻也以周改月不改時者則宋程伊川胡康侯至明劉文成也以周不改時兼不改月者則宋蔡仲黙魏華父至明章本清也諸家引經據傳自以為確不可易而予則直以春秋本文斷之而已矣春秋桓公八年冬十月雨雪十月者以周正為建酉月故雨雪為非時若夏之十月建亥雨雪亦常耳何足書成公元年二月無氷此建丑月也若建卯月無氷又何異焉莊公七年秋大水無麥苗如周不改月不改時麥苗何得至秋定公元年冬十月隕霜殺菽若夏之十月菽已穫矣隕霜亦非失時如此之類甚多更有可證者僖公五年左氏傳曰春王正月辛亥朔日南至日南至者子月也此又改月改時之的據也夫子特書曰王正月而左傳亦釋曰王周正月者蓋明其為周天子之正月非夏之正月殷之正月也而又于二月三月亦繫之王見丑月為周之二月寅月為周之三月非同于殷正同于夏正也過此前代無以之為正者則亦不必書王以别之矣胡氏泥于冬之不可以為春也故有夏時冠周月之說以為孔子告顔淵以行夏之時此為見于行事之騐則又謬甚如胡氏之說周改月不改時是雖以子月為嵗首而四時之序猶夫夏也以冬為春乃自孔子始以夏時冠周月非所以尊周以仲冬為孟春豈可謂行夏之時乎不夏不周之間孔子何以自處焉夫行夏時者師友平日論道之言所謂損益百王垂訓萬世者也春秋者聖人尊周室明王制之書也王制固未有大于正朔者孔子為當時諸侯强横大夫陪臣僭亂而作春秋乃首改周天子之正朔也恐聖人亦有所不敢矣或曰孟子不云乎春秋天子之事也庸何傷曰所謂天子之事者謂賞功討罪以明天子之法使諸侯不敢悖天子大夫不敢悖諸侯耳非必變易四時之序改本朝正朔而後為天子之事也胡氏以此為垂法後世吾恐法未可垂而先犯為下不倍之戒矣且此亦空言耳烏在其為見諸行事之騐乎故周不改月則孔子必不敢以十一月為正月以十一月為正月則周之必改月可知也周不改時則孔子必不敢以周正月為春以周正月為春則周之必改時可知也左氏公羊穀梁皆周人也于此獨不加論焉亦以為不必論也使當時以正月為冬而孔子獨書曰春三子能已于言哉蕙田案此以春秋本文證據最的確又案春王正月當以改時改月之說為正左傳曰春王周正月杜注周正建子正月子月也是明以周為改月矣公羊傳曰春者何嵗之始也何休注春者天地開闢之端養生之首是明以周為改時矣左氏言周正月而屬于春公羊言春而曰嵗之始其義互見合諸家之說參之可以袪胡氏之障矣又案史伯璿陳定宇張敷言陳廷敬蔡德晉諸家著論以證改時改月之說者甚衆其文繁多所徴引經傳大畧相同不能悉載至如魏了翁之正朔考家鉉翁之原夏正周洪謨之周正辨呂坤徐芳之春王正月論則又承胡蔡之謬强為駁辨殊足以疑誤學者概置不録春秋隱公三年左氏傳四月鄭祭足帥師取温之麥秋又取成周之禾注四月今二月也秋今之夏也麥禾皆未熟言取者盖芟踐之疏以此傳之下有八月宋公和卒則知此是七月故為今之夏謂今之五月也隱公九年三月癸酉大雨震電庚辰大雨雪漢書五行志劉向以為周三月夏正月也雷電未可以𤼵既以𤼵則雪不當復降皆失節故謂之異汪氏克寛曰或謂春秋用夏正月故建辰之月雨雪為異然茍實建辰之月則震電不必書矣桓公四年春正月公狩于郎左氏傳書時禮也注冬獵曰狩周之春夏之冬也田狩皆夏時也公羊傳冬曰狩常事不書此何以書譏逺也張氏以寜曰周春正月夏十一月也冬曰狩不以不時書以譏逺書也五年秋大雩左氏傳書不時也張氏以寜曰春秋凡書秋者周九月夏七月也七月雩故云不時六年秋八月壬午大閱六年秋八月壬午大閱張氏以寜曰周八月夏六月也故曰不時八年春正月己卯烝注左傳閉蟄而烝閉蟄係建亥之月此正月是夏之仲冬月何為不得烝非以不時書為下文五月復烝見瀆書也張氏以寜曰周正月夏十一月也故不以不時書夏五月丁丑烝穀梁傳烝冬事也春夏興之黷祀也張氏以寜曰周五月夏之春三月也穀梁皆主夏時此誤也冬十月雨雪注今八月也書失時公羊傳記異也注今八月未當雨雪此隂氣太盛兵象也張氏以寜曰案漢書五行志劉向曰周冬夏秋周十月今八月也十四年春正月無氷公羊傳記異也注周之正月夏之十一月法當堅氷無氷温也秋八月御廩災乙亥嘗胡傳春秋用周月以八月嘗不時也張氏以寜曰周八月夏六月也故曰不時莊公七年秋大水無麥苗注周之秋今五月平地出水溧殺熟麥及五稼之苗疏直言無麥苗似是麥之苗而知麥苗别者盖此秋是今之五月麥已熟矣不得方云麥苗故知熟麥及五稼之苗皆為水溧殺也十七年冬多麋注麋多則害五稼故以災書張氏以寜曰周之冬夏之秋也故麋多則稼害十八年秋有􅈮張氏以寜曰漢五行志以為􅈮盛暑所生非自越來案盛暑為夏之六月周八月也六月而生七月見異而書二十五年六月辛未朔日有食之鼓用牲于社左氏傳非常也惟正月之朔慝未作日有食之于是乎用幣于社伐鼓于廟注正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也辛未實七月朔因置閏失所誤以七月為六月故左曰非常謂非常鼓之月也二十八年冬大無麥禾注書于冬者五穀畢入計食不足而後書張氏以寜曰冬周十月也豳風十月納禾稼故曰五穀畢入計食不足湛氏若水曰周之冬乃夏之八九十月也至收成之時而後知麥禾皆無故曰大無也三十一年冬不雨張氏洽曰莊公無閔雨之志獨酉戌亥之月不雨故不得閱時而言也僖公三年春王正月不雨夏四月不雨穀梁傳一時言不雨者閔雨也有志乎民者也趙氏鵬飛曰正月今之十一月四月今之二月此時不雨無害于農而必書者又見僖公之念雨也三年六月雨髙氏䦎曰周六月夏四月建巳之月萬物始盛待雨而大古者以是月雩而祈雨則六月之雨尤為可喜僖公五年左氏傳春王正月辛亥朔日南至注周正月今之十一月月之一日冬至也張氏以寜曰周之春夏之冬也至日在夏十一月書日南至不書冬至者周十一月非冬也晉侯圍上陽卜偃曰克之公曰何時對曰其九月十月之交乎丙子旦日在尾月在策鶉火中必此時也冬十二月丙子朔晉滅虢注以星騐推之知九月十月之交謂夏九月十月也周十二月夏之十月顧氏棟髙曰卜偃對君之言乃是夏正先儒謂晉行夏時此其證也十年冬大雨雪張氏以寜曰周十月也孟冬水始氷地始凍書大雨雪寒甚過度也黄氏仲炎曰雨雪常也惟大而為害故書獨桓八年冬十月雨雪不言大者周之十月今之八月非雨雪之時故以異書也湛氏若水曰周之冬酉戌亥月夏之八九十月也是時隂結而未凝故以為異三十三年十二月隕霜不殺草李梅實公羊傳書不時也注周之十二月夏十月也張氏以寜曰漢書五行志劉向曰周十二月今十月君誅不行舒緩之應黄氏仲炎曰經書隕霜二一曰隕霜不殺草一曰隕霜殺菽蓋周之十二月夏十月也霜當殺草而不殺草異也周之十月夏八月也未當隕霜而殺菽亦異也文公二年自十有二月不雨至于秋七月注周七月今五月也不雨是為災宣公十五年秋螽冬蝝生孫氏覺曰蝝者螽之子春秋之秋夏時之夏也春秋之冬夏時之秋也螽為災于夏而蝝生于秋一嵗而再見故謹志之左氏公羊皆曰幸之以蝝生于冬物皆已收而不為災案秋乃五穀大成之時安得曰不為災乎且生而不為災亦無用書矣成公元年春二月無氷注周二月今之十二月也而無氷書冬温疏襄二十八年春無氷則是竟春無氷此亦應終一春無氷而書在二月下者以盛寒之月書之也今之十二月寒最甚此月無氷是終無氷矣七年冬大雩劉氏敞曰穀梁曰冬無為雩也非也周之十月今之八月若久不雨可得不雩乎十年左氏傳六月丙午晉侯欲麥使甸人獻麥注周六月夏四月麥始熟十六年春王正月雨水氷注記寒過節月疏正月是今之仲冬十一時猶有雨未是盛寒雨下即著樹為氷記寒甚之過其節度十七年九月辛丑用郊公羊傳用者不宜用也正月非所用郊也注周之九月夏之七月非郊時故加用之吳氏􅊹曰九月乃夏時孟秋建申之月豈郊之時乎不卜日不卜牲而强用其禮故曰用非時之甚也襄公二十七年冬十有二月乙亥朔日有食之公羊傳十一月乙亥朔日有食之辰在申司律過也再失閏矣注周十一月夏九月斗當建戍而在申故知再失閏也疏經言十二月而傳言十一月今杜以長律推之知乙亥是十一月朔非十二月也若是十二月當為辰在亥以申為亥則是三失閏不止再失矣二十八年春無氷注前年知其再失閔頓置兩閏以應天正故此年正月仍復建子得以無氷為災而書張氏以寜曰周之春夏之冬也杜氏明以建子為春矣不書正月疑脱文湛氏若水曰周之春子丑寅月也子丑之月氣方寒正鑿氷之時故以無氷見異昭公十七年夏六月甲戌朔日有食之左氏傳祝史請所用幣平子禦之曰唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏注正月謂建巳正陽之月于周為六月于夏為四月平子以為六月非正月故太史答言在此月也言此六月當春分夏至之中為夏家之四月是謂孟夏之月二十年左氏傳春王二月己丑日南至注是歳朔旦冬至之歳也當言正月己丑朔日南至時史失閏閏更在二月後傳特具于此以正律之矣顧氏棟髙曰案周若不改時月豈有春正月冬至之理乎合之僖五年春秋之用周正益信二十四年夏五月乙未朔日有食之左氏傳梓慎曰將水昭子曰旱也日過分注五月建辰故曰巳過春分之節而陽猶不克克必甚能無旱乎顧氏棟髙曰案經書夏五月而傳云日過分僅過春分之節則周之五月為夏之春三月亦周正也定公元年冬十月隕霜殺菽公羊傳記異也注周十月夏八月㣲霜用事未可殺也哀公十二年冬十有二月螽左氏傳火伏而後蟄者畢今火猶西流司厯過也注周十二月今十月是嵗失不置䦌雖書十二月實今之九月火伏在今十月九月初尚温故有螽張氏以寜曰漢五行志劉歆曰周十二月夏十月火星既伏蟄蟲皆畢天之見異也十四年春西狩獲麟注冬獵曰狩夏疏釋天云冬獵曰狩周之春之冬故稱狩也張氏叙春秋正朔辨古者三正迭用建寅建丑建子皆一代之正朔也既為正朔則各以子月丑月寅月為正月矣正者十二月之始而春者四時之始月改則春移陽生子月即為春隂生午月即為秋周之正朔在十一月一陽已復原可為春譬之夜半子初當為明日之始無可疑也而說春秋者因夫子行夏時之語而引商書元祀十有二月為不改月漢書元年冬十月為不改時顧以左氏有王周正月之文則周但改月而時不改夫旣不改時矣是舊史本据夏時而書冬正月夫子反易為春以亂之千載而下且不知周之正朔為何月何時又何自知以夏時冠周月使人欽其善而行之乎案經襄公二十八年春書無永若夏時之春則無氷不為異也僖公十年冬書大雨雪若夏時之冬則大雨雪亦非異也左傳昭十七年夏六月太史曰日過分而未至當夏四月是為孟夏梓慎曰火出于夏為三月于商為四月于周為五月是則周之正朔改月並改其時之明騐不待呂氏熊氏李氏廣引他經書傳證之而已了然也雖然正者王之正則春亦王之春若但記周之正朔何不曰王春正月乎而乃冠王於月特升春於王則先儒所謂行夏時者亦非無因矣盖王者王之事也春者天之時也系之王者王可得而改不系之王者王不可得而改故先書春而後書王正月明此之為春以其為王之正月耳三正迭用惟夏得天則行夏時之意實于是寓焉此之謂化工之筆徒以為記周之正朔則亦考之不詳矣周禮又有正月正嵗之異則何也正月即王之正月正嵗則夏正之嵗耳凌人正嵗十有二月令斬氷如周正之嵗則十二月未可斬氷矣夏時遵行已久故詩書亦兼用夏時惟春秋及周禮為一王之法則純用周正故别之為正嵗謂之正嵗則夏時之正亦可見矣若春秋而竟以夏時冠周月則是孔子本欲正諸侯之僭竊者而反敢先自變亂周之正朔也歟禮記明堂位魯君孟春乘大輅建弧韣祀帝于郊季夏六月以禘禮祀周公于太廟注孟春建子之月魯之始郊日以至季夏建已之月張氏以寜曰建子是十一月而謂之孟春建已是四月而謂之季夏六月則春秋建子之為春明矣雜記孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也注周正月建子之月七月日至夏至日也獻子欲以兩至相對建子冬至既祭上帝則建午夏至亦可禘祖非也魯之祭祀宗廟亦猶用夏家之法大祭宜用首時應禘于孟月于夏是四月于周為六月傳記禮之所由失張氏以寜曰建子之月冬至而曰正月日至不曰冬至以周十一月不為冬也建午之月夏至而曰七月日至不曰夏至以周五月不為夏也然則春秋建子之月不以為冬而以為春亦明矣顧氏棟髙曰此篇言七月而禘獻子為之為禮之所由失則禘宜在季夏六月明矣周之六月夏之孟夏四月也祭宗廟宜在首時禘應于孟月所謂祭享猶自夏焉二篇相為表裏而此篇之言證周改時改月尤明白論語莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸注包曰莫春者季春三月也孟子七八月之間旱注周七八月夏之五六月也秋陽以暴之注秋陽周之秋夏之五六月盛陽也嵗十一月徒杠成十二月輿梁成注周十一月夏九月周十二月夏十月也朱子曰夏令曰十月成梁蓋農功已畢可用民力又時將寒沍七八月之間雨集注周七八月夏五六月也公都子曰冬日則飲湯夏日則飲水顧氏棟髙曰此冬日夏日當指夏正言若周之夏日是夏之二三四月豈宜飲水乎右周正朔史記秦始皇本紀秦初并天下改年始朝賀皆自十月朔蕙田案趙氏汸萬氏斯大以殷周曰改正朔則以所改之月為正月秦改年始則仍以夏時紀月而以十月為年始是改年始與改正朔有别也此由不知史遷作本紀在太初正律以後以夏時追改其月名非秦史所紀如此故妄生分别耳右秦正朔封禪書髙祖初起禱豐枌榆社徇沛為沛公祠蚩尤釁鼓旗遂以十月至灞上與諸侯平咸陽立為漢王因以十月為年首漢書髙帝本紀元年冬十月五星聚于東井沛公至霸上春正月羽陽尊懐王為義帝顔氏師古曰凡此諸月號皆太初正律之後紀事者追改之非當時本稱也以十月為嵗首即謂十月為正月今此真正月當時謂之四月耳他皆類此天文志漢元年冬十月五星聚于東井以律推之從嵗星也劉氏攽曰案律太白辰星去日率不能一兩次耳今十月而從嵗星于東井非也然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星得從嵗星也叔孫通傳漢七年長樂宮成諸侯羣臣朝十月顔氏師古曰漢時尚以十月為正月故行朝嵗之禮史家追書十月武帝本紀太初元年夏五月正厯以正月為嵗首色上黄數用五顔氏師古曰謂以建寅之月為正也未正律之前謂建亥之月為正今此言以正月為嵗首者史追正其月名丹鉛總録文選古詩十九首非一人之作亦非一時也其曰玉衡指孟冬而上云促織下云秋蟬蓋漢之孟冬非夏之孟冬矣漢襲秦制以十月為嵗首漢之孟冬夏之七月也其曰孟冬寒氣至北風何慘慄則漢武帝已改秦朔用夏以後時也三代改朔不改月古人辨證博引經傳多矣獨未引此耳又唐儲光羲詩夏王紀冬令殷人乃正月此亦一證右漢改正朔魏志辛毘傳文帝踐祚毘遷侍中賜爵關内侯時議改正朔毘以魏氏遵舜禹之統應天順民至于湯武以戰伐定天下乃改正朔孔子曰行夏之時左氏傳曰夏數為得天正何必期于相反帝善而從之宋書禮志魏文帝雖受禪于漢而以夏數為得天故黄初元年詔曰孔子稱行夏之時乘殷之輅服周之冕樂則韶舞此聖人集羣代之美事為後王法制也傳曰夏數為得天朕承唐虞之美至于正朔當依虞夏故事若殊徽號異器械制禮樂易服色用牲幣自當隨土德之數每四時之季月服黄十八日臘以丑牲用白其餙節旄自當赤但節幡黄耳其餘郊祀天地朝會四時之服宜如漢制宗廟所服一如周禮尚書令桓階等奏據三正周復之義國家承漢氏人正之後當受之以地正犧牲宜用白今從漢十三月正則犧牲不得獨改今新建皇統宜稽古典先代以從天命而告朔犧牲一皆不改非所以明革命之義也詔曰服色如所奏其餘宜如虞承唐但臘日用丑耳此亦聖人之制也魏志明帝本紀景初元年春正月壬辰山荏縣言黄龍見于是有司奏以為魏得地統宜以建丑之月為正三月定律改年為孟夏四月服色尚黄犧牲用白戎事乘黑首白馬建大赤之旂朝會建大白之旗其春夏秋冬孟仲季月雖與正嵗不同至于郊祀迎氣礿祀蒸嘗巡狩蒐田分至啟閉班宣時令中氣早晚敬授民事皆以正嵗斗建為律數之序齊王本紀景初三年正月丁亥即皇帝位十二月詔曰烈祖明皇帝以正月棄背天下臣子永惟忌日之哀其復用夏正雖違先帝通三統之義斯亦禮志所由變改也又夏正于數為得天正其以建寅之月為正始元年正月以建丑月為後十二月右魏改正朔唐書武后本紀天授元年正月庚辰大赦改元曰載初以十一月為正月十二月為臘月來嵗正月為一月久視元年十月甲寅復唐正月大赦舊唐書武后本紀聖厯三年五月癸丑改元為久視冬十月甲寅復唐正朔改一月為正月仍以為嵗首正月依舊為十一月大赦天下唐書肅宗本紀上元二年九月壬寅以十一月為嵗首月以斗所建辰為名寶應元年建已月乙丑復以正月為嵗首建巳月為四月右唐改正朔五禮通考卷一百九十八
