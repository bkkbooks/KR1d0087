body:
  text: 五禮通考卷二百十九刑部尚書秦蕙田撰嘉禮九十二設官分職遼史百官志遼國官制分北南院北面治宫帳部族屬國之政南面治漢人州縣租賦軍馬之事初太祖分達喇額爾奇木為北南二大王謂之北南院宰相樞宻宣徽林牙下至郎君䕶衛皆分北南其實所治皆北面之事語遼官制者不可不辨凡遼朝官北樞宻視兵部南樞宻視吏部北南二王視户部額爾竒木視刑部宣徽視工部多囉倫穆騰視禮部北南府宰相縂之特哩衮治宗族林牙脩文告裕悦坐而論議以象公師朝廷之上事簡職專此遼所以興也契丹北樞宻院掌兵機武銓羣牧之政凡契丹軍馬皆屬焉以其牙帳居大内帳殿之北故名北院元好問所謂北衙不理民是也契丹南樞宻院掌文銓部族丁賦之政凡契丹人民皆屬焉以其牙帳居大内之南故名元好問所謂南衙不主兵是也北宰相府掌佐理軍國之大政皇族四帳世預其選南宰相府掌佐理軍國之大政國舅五帳世預其選北大王院南大王院分掌部族軍民之政宣徽北院宣徽南院分掌御前祗應之事大裕悦府無職掌班百僚之上非有大功德不授猶南面之有三公大特哩衮司掌皇族之政教額爾竒木院掌刑獄大林牙院掌文翰之事多囉倫穆騰司掌禮儀文班司所掌未詳額真尼郭齊喀所掌未詳後併樞院蕙田案以上皆北面朝官北面御帳官侍衛司寨北䕶衛府子南䕶衛司府硬司皇太特哩衮北面著帳官著帳郎君院君班詳衮司祗候郎君班詳衮司司左祗候郎右祗候郎君班詳衮著帳户司北面皇族帳大内特哩衮司父族帳詳衮司大横帳詳衮司司孟仲父族帳詳衮季父族帳常衮司舍利司王子院四帳都詳衮司駙馬都尉府北面諸帳官耀尼九帳大常衮司奚大國舅司實國舅别部渤海帳司王府伊王府北面宫官諸行宫都部署院押契丹行宫諸部署司司行宫諸部署司行宫輜重額爾竒木北面部族官北面坊場局冶牧廐等官北面軍官北面邉防官北面行軍官北面屬國官以上各官名煩多不具載南面朝官三師府省三公府門下六部漢人樞宻院中中書省御史臺殿司翰林院寺宣徽院寺内省正内侍省僕客省大太常寺鴻榮禄衛尉宗寺太寺理寺臚寺少司農寺将秘書監都司天監十國子監東太府監府監作監水監六衛宫三師府坊太子賔客院府太子詹事院親左春坊府右春太子諸率王傅府王内史南面宫官漢兒行宫都部署院亦曰南面行宫都部署司南面京官東京中京南京宰相府中諸京内省司京度支使司上京鹽鐵使司南京三司使司東京户部使司南京轉運使司都西京計司五五京留守司五五京都總管府五五京虞候司京警廵院京處置使司京學之諸京别置官不載南面方州官節度使司團練使司觀察使司防禦使司州刺史南面分司官按察諸道刑獄使採訪使南面財賦官錢帛司司轉運南面軍官點檢司練使司指揮使司都諸軍都團諸軍兵馬總管府南面邊防官安撫使司都總管府招安使司制廵檢使司處都管司置使司置使司蕙田案遼官制有南面北面之分名目猥多不能盡載今惟舉其大綱而已若南面朝官大率與唐制多同元人修史時已不能得其詳僅於史文散見者推而得之亦未究其然否也右遼官制金史百官志金自景祖始建官屬其官長皆稱曰貝勒故太祖以貝勒嗣位太宗以按巴貝勒居守按巴尊大之稱也其次曰固倫烏赫哩貝勒固倫言貴烏赫哩猶總師也又有固倫貝勒或左右置所謂國相也其次諸貝勒之上則有固倫伊實烏赫哩伊拉齊愛滿阿實克温徳埓之號以為陞拜宗室功臣之序焉其部長曰貝勒統數部者曰烏赫哩凡此至熈宗定官制皆廢其後惟鎮撫邉民之官曰圖埓烏赫哩國之下有索約勒圖伊達之下有默濟格實訥昆此則具于官制而不廢皆踵遼官名者也漢官之制自平州人不樂為明安穆昆之官始置長吏以下天輔七年以左企弓行樞宻院于廣寧尚踵遼南院之舊天㑹四年建尚書省遂有三省之制熈宗頒新官制大率皆循遼宋之舊海陵庶人正隆元年罷中書門下省止置尚書省而下官司之别曰院曰臺曰府曰司曰寺曰監曰局曰署曰所各統其屬以修其職職有定位員有常數終金之世守而不敢變焉三師太師太傅太保各一人三公太尉司徒司空各一人尚書省尚書令一人左右丞相各一人平章政事二人為宰相左右丞各一人恭知政事二人為執政官左司郎中員外郎各一人都事二人右司同賜祗候郎君管勾官架閣庫管勾同管勾提點嵗所堂食公使酒庫使副書直省局局長副局長管勾尚省樂工行臺尚書省天㑹十五年置于汴天眷元年改燕京樞宻為行臺尚書省三年復移于汴其官品下中臺一等吏部尚書一人侍郎一人郎中二人員外郎二人主事四人架閣庫管勾同管勾官誥院提舉户部尚書一人侍郎二人郎中二人員外郎三人主事五人架閣庫管勾同管勾檢法勾當官又有榷貨務交鈔庫印造鈔引庫抄紙坊平凖務各使副使交鈔庫物料場場官並屬焉禮部尚書一人侍郎一人郎中一人員外郎一人主事二人又惠民司令直長都監屬焉左三部檢法司司正二人檢法二十二人兵部尚書一人侍郎一人郎中一人員外郎二人主事二人又四方館使副使法物庫使副使承𤼵司管勾同管勾並屬焉刑部尚書一人侍郎一人郎中一人員外郎二人主事二人架閣庫管勾同管勾又萬寕宫慶寕宫各提舉同提舉屬焉工部尚書一人侍郎一人郎中一人員外郎一人主事二人覈實司管勾一人又修内司使副使都城所提舉同提舉祗應司提點令丞甄官署令丞上林署提點令丞花木局都監同樂園管勾並屬焉右三部檢法司司正二人檢法二十二人都元帥府掌征討之事兵罷則省都元帥一人左右副元帥各一人元帥左右監