一人所轄有審理所典膳所奉祠所典寳所紀善所良醫所典儀所工正所及伴讀教授引禮舍人倉庫大使公主府則設家令一人司丞一人録事一人洪武二十三年改家令司為中使司承宣布政使司左右布政使各一人掌一省之政左右㕘政左右㕘議無定員其屬經厯都事各一人照磨檢校各一人理問副理問提控案牘各一人司獄一人庫大使副使各一人倉大使副使各一人雜造局軍器局寳泉局織染局各大使一人副使一人太祖初置行中書省設平章政事左右丞㕘知政事等員洪武九年改浙江江西福建北平廣西四川山東廣東河南陜西湖廣山西諸行省俱為承宣布政使司罷行省平章政事左右丞等官改㕘知政事為布政使十五年置雲南布政司永樂元年以北平布政司為北京五年置交阯布政司十一年置貴州布政司宣德三年罷交阯布政司除兩京外定為十三布政司提刑按察使司按察使一人掌一省刑名按劾之事副使僉事無定員其屬經厯知事各一人照磨檢校各一人司獄一人布政司㕘政㕘議分司諸道督糧道督册道分守道皆帶布政銜按察司副使僉事分司諸道提督學道清軍道驛𫝊道分廵道整飭兵備道其外又有協堂道水利道屯田道管河道鹽法道撫治道監軍道招練道明初於直𨽻府州縣設廵按御史各布政司所屬設試僉事後罷試僉事改按察分司四十一道此分廵之始也分守起於永樂間兵道仿自洪熈間兩京不設布按二司故督學以御史後置守廵諸員無所屬則寄銜於鄰近省布按司官行太僕寺卿一人少卿一人寺丞無定員掌各邊衛所營堡之馬政其屬主簿一人洪武三十年置行太僕寺於山西北平陜西甘肅遼東永樂中以北平行寺為太僕寺苑馬寺卿一人少卿一人寺丞無定員掌六監二十四苑之馬政其屬主簿一人各牧監監正監副録事各一人各苑圉長一人永樂四年置北直𨽻遼東平涼甘肅凡四寺十八年革北京苑馬寺并入太僕正統中革甘肅苑馬寺都轉運鹽使司都轉運使一人同知一人副使一人判官無定員掌鹽盬之事其屬經厯知事各一人庫大使副使各一人所轄各場鹽課司大使副使各鹽倉大使副使各批騐所大使副使並一人都轉運司凡六曰兩淮曰兩浙曰長蘆曰河東曰山東曰福建分司十四鹽課提舉司提舉同提舉各一人副提舉無定員其屬吏目一人庫大使副使一人所轄各鹽倉大使副使各場各井鹽課司大使副使並一人提舉司凡七曰四川曰廣東海北曰黒鹽井曰白鹽井曰安寜曰五井曰察罕腦兒又有遼東煎鹽提舉司市舶提舉司提舉一人副提舉二人掌海外諸畨朝貢市易之事其屬吏目一人茶馬司大使一人副使一人掌市馬之事府知府一人同知通判無定員推官一人其屬經厯知事各一人照磨檢校各一人司獄一人儒學教授一人訓導四人税課司大使一人倉大使副使各一人織染雜造局大使副使各一人醫學正科一人隂陽學正術一人州知州一人同知判官無定員其屬吏目一人儒學學正一人訓導二人税課局大使一人庫大使一人織染雜造局大使副使各一人醫學典科一人隂陽學典術一人縣知縣一人縣丞一人主簿一人其屬典史一人儒學教諭一人訓導二人税課局大使一人庫大使一人醫學訓科隂陽學訓術各一人顧氏炎武曰唐制京郡乃稱府至宋則潛藩之地皆升為府宋初太宗眞宗皆嘗為開封尹後無繼者乃設權知府一人以待制以上充之崇寜三年蔡京乞罷權知府置牧尹各一員牧以皇子領尹以文臣充是權知府者所以避京尹之名也今則直命之為知府非也知縣者非縣令而使之知縣中之事唐人亦謂之知印其名始於貞元以後其初尚帶一權字至於普設知縣則起自宋初以州郡多闕官縣令選尤猥下乃詔吏部選幕職官為知縣自此以後遂罷令而設知縣沿其名至今宋時結銜曰以某官知某府事以某官知某州事以某官知某縣事以其本非此府此州此縣之正官而任其事故云然廵檢司廵檢副廵檢主緝捕盗賊凡闗津要害處俱設驛驛丞典郵𫝊迎送河泊所官掌收魚税閘官壩官掌啟閉蓄洩批騐所大使副使各一人掌騐茶鹽引遞運所大使副使各一人掌運逓糧物鐵冶所大使副使各一人以上皆𨽻府州縣中軍左軍右軍前軍後軍五都督府每府左名都督都督同知都督僉事無定員其屬經厯都事各一人初太祖下集慶即置行樞宻院自領之又置諸翼統軍元帥府尋罷樞宻院改置大都督府以都鎮撫司𨽻焉尋罷統軍元帥府吳元年罷大都督不設十三年改都督府為五軍都督府分領在京各衛所及在外各都司衛所永樂元年設北京留守行後軍都督府後又分五府稱行在五軍都督府十八年除行在字在應天者加南京字洪熈元年復稱行在仍設行後府宣德三年又革正統六年復除行在字京營永樂二十二年置大三營曰五軍營神機營三千營俱選勲臣二人提督之景泰元年立十團營其舊設者號為老營成化三年分團營為十二每營又各分五軍三千統騎兵神機統火器正德中又選團營精鋭置東西兩官㕔嘉靖二十九年革團營官㕔仍併三大營改三千曰神樞統以提督總兵官一員已改提督曰總督京營戎政更設侍郎一人協理京營戎政定廵視科道官嵗一代悉革内侍官隆慶初仍以總督為提督改協理為閲視尋併改閲視為提督四年三營各設提督又各設右都御史一員提督之尋罷六提督仍復總督戎政一人天啟初増設協理一人尋革崇禎初復増設京衛指揮使司指揮使一人指揮同知二人指揮僉事四人鎮撫司鎮撫二人其屬經厯知事吏目倉大使副使各一人所轄千戸所多寡不等京衛有上直衛有南北京衛品秩並同各有掌印有僉書其以恩廕寄禄無定員凡上直衛親軍指揮使司二十有六皆不𨽻都督府錦衣衛其一也其京衛𨽻都督府者三十有三不𨽻都督者十有五錦衣衛掌侍衛緝捕刑獄之事恒以勲戚都督領之恩廕寄禄無定員鎮撫司掌本衛刑名兼理軍匠洪武二十年以治錦衣衛者多非法凌虐乃焚刑具出繋囚送刑部審録詔内外獄咸歸三法司罷錦衣獄成祖時復置尋増北鎮撫司專治詔獄成化間刻印畀之獄成得專達不關白錦衣錦衣官亦不得干預而以舊所設為南鎮撫司專理軍匠南京守備協同守備各一人南京以守備及㕘賛機務為要職守備以公侯伯充兼領中軍都督府事協同守備以侯伯都督充領五府事㕘賛機務以兵部尚書領之永樂十九年遷都設守備洪熈元年以中官同守備景泰三年増設協同守備一人南京五軍都督府左右都督都督同知都督僉事不全設其掌印僉書皆以勲戚及三等都督為之其屬經厯都事各一人南京衛指揮使司設官如京衛其𨽻五都督府者三十有二又親軍衛指揮使司十有七王府䕶衛指揮使司設官如京衛又王府儀衛司儀衛正一人副二人典仗六人總兵官副總兵㕘將游擊將軍守備把總無定員凡總鎮一方者為鎮守獨鎮一路者為分守各守一城一堡者為守備與主將同守一城者為協守又有提督提調廵視備禦領班備倭等名凡總兵副總兵率以公侯伯都督充之其總兵掛印稱將軍者雲南曰征南將軍大同曰征西前將軍湖廣曰平蠻將軍兩廣曰征蠻將軍遼東曰征虜前將軍宣府曰鎮朔將軍甘肅曰平𦍑將軍寜夏曰征西將軍交阯曰副將軍延綏曰鎮西將軍其在薊鎮貴州湖廣四川及儧運淮安者不得稱將軍掛印宣德間又設山西陜西二總兵嘉靖間分設廣東廣西貴州湖廣二總兵為四改設福建保定副總兵為總兵又添設浙江總兵神宗朝又増設於臨洮山海天啟間増設登萊至崇禎時益紛不可紀而位權亦非復當日盖明初雖㕘將游擊把總亦多有充以勲戚都督等官至後則杳然矣留守司正留守一人副留守一人指揮同知二人其屬經厯都事斷事副斷事吏目各一人洪武二年詔以臨濠為中都十四年置留守司嘉靖十九年置興都留守司都指揮使司行都指揮使司都指揮使一人都指揮同知二人都指揮僉事四人掌一方之軍政其屬經厯都事斷事副斷事吏目各一人司獄倉庫草場大使副使各一人明初置各行省行都督府設官如都督府又置各都衛指揮使司洪武八年詔各都衛並改為都指揮使司凡改設都司十有三行都司三宣德以後定設都司十有六行都司五衛指揮使司設官如京衛各統於都司行都司或留守司千户所正千戸一人副千户一人鎮撫二人其屬吏目一人所轄百戸所凡十共百户十人總旗二十人小旗百人其守禦千户所軍民千户所設官並同土官洪武七年西南諸蠻朝貢多因元官授之後定為宣慰司者十一為招討司者一為宣撫司者十為安撫司者十九為長官司者百七十有三其府州縣正貳屬官或土或流皆因其俗使之守疆土脩職貢供征調又有畨夷都指揮使司三衛指揮使司三百八十五宣慰司三招討司六萬户府四千户所四十一站七地面七寨一並以附寨畨夷官其地右明官制五禮通考卷二百十九
