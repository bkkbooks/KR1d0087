body:
  text: 五禮通考卷四十刑部尚書秦蕙田撰吉禮四十方丘祭地明史太祖本紀呉三年八月癸丑方丘成春明夢餘錄太祖未即大位之先建方丘於太平門外鍾山之陰分祀地洪武元年李善長等進方丘說曰三代祭地之禮見於經傳者夏以五月商以六月周人以夏日至禮之於澤中方丘葢王者事天明事地察故冬至報天夏至報地所以順陰陽之義也祭天於南郊之圜丘祭地於北郊之方澤所以順陰陽之位也然先王親地有社存焉禮曰享帝於郊祀社於國又曰郊所以明天道社所以神地道又曰郊社所以事上帝又曰明乎郊社之禮或以社對帝或以社對郊則祭社乃所以親地也書曰敢昭告于皇天后土左氏曰戴皇天履后土則古者亦命地祗為后土矣曰地祗曰后土曰社皆祭地也此三代之正禮而釋經之正說自鄭𤣥惑於緯書而謂夏至於方丘之上祭崑崙之祗七月於泰折之壇祭神州之祗析一事為二事後世宗之一嵗二祭自漢武用祀官寛舒議立后土祠於汾陰脽上禮如祀天而後世又宗之於北郊之外仍祠后土元始間王莽奏罷甘泉太畤復長安南北郊以正月上辛若丁天子親合祀天地於南郊而後世又因之多合祭焉皆非禮經之正義矣由漢歴唐千餘年間親祀北郊者唯魏文帝之太和周武帝之建徳隋髙祖之開皇唐𤣥宗之開元四祭而已宋元豐中議專祭北郊故政和中專祭者凡四南渡以後則唯行攝祀而已元皇慶間議夏至專祭地未及施行今當以經為正夏日至親祀皇地祗於方丘以五嶽五鎮四海四瀆從祀上是之明史禮志壇壝之制明初建方丘於太平門外鍾山之陰方丘壇二成上成廣六丈四出陛南一丈東西北八尺皆八級下成四面各廣二丈四尺髙六尺四出陛南丈二尺東西北一丈皆八級壝去壇十五丈髙六尺外垣四面各六十四丈餘制同南郊有浴室瘞坎在内壝外壬地太祖本紀洪武二年五月癸卯始祀地於方丘明㑹典二年始奉仁祖淳皇帝配享明史禮志二年夏至祀皇地祗於方丘其儀並同圜丘唯迎神後瘞毛血祭畢奉牲帛祝饌而埋之與郊天異神位方丘洪武二年夏至正壇第一成皇地示南向祭器北郊同南郊玉帛牲牢皇地示黄琮郊祀制帛地示黄配位白方丘黄犢配位各純犢配位天下山川牛一羊豕各三祝册祝版長一尺一分廣八尺厚二分用楸梓木籩豆之實以下同圜丘明集禮神位版正位題曰皇地祗配帝題曰仁祖淳皇帝位版並黄質金字從祀題曰五岳之神四海之神四瀆之神五鎮之神神位版並赤質金字配位洪武三年五月二十日親祀北郊奉皇考仁祖淳皇帝配從祀以五岳五鎮四海四瀆四位從祀方丘神席用龍椅龍案錦座褥配位同從祀位並設於案不設席祝册洪武元年五月十四日夏至親祀方丘祝文曰維洪武三年五月二十四日親祀方丘正位祝文曰時當夏至萬物咸亨用遵彜典謹率臣僚以玉帛犧齊粢盛庶品奉兹瘞祀皇考仁祖淳皇帝配神作主尚享配位祝文曰時當夏至萬物咸亨謹率臣僚恭祀皇地祗奉以玉帛犧齊粢盛庶品用修典禮伏惟敬慎瞻仰永為配位尚享祭器設皇地祗太尊二著尊一犧尊一山罍一於壇上皆有勺有羃有坫設太尊一山罍一於壇下有坫有冪配帝同其從祀則設五岳四瀆著尊二犧尊二於左設五鎮四瀆著尊二犧尊二於右上帝及配帝籩豆各十二有簠簋各二豋盤篚各一牲案各一爵坫各三沙池香案各一其從祀則籩豆各十簠簋各二牲案各一爵坫沙池香案各一禮神之玉方丘正位用黄琮帛方丘正位幣仍以黄從祀幣各從方色配位帛用白牲用黄犢二從祀岳鎮海瀆各用純色犢一樂舞方丘迎神奏中和之曲奠玉幣奏肅和之曲奉俎奏凝和之曲初獻奏夀和之曲亞獻奏豫和之曲終獻奏禧和之曲徹豆奏雍和之曲送神奏安和之曲望瘞奏時和之曲其盥洗升降飲福受胙俱不奏樂祭服夏至祭地皇帝服衮冕其侍祠服亦如祀天禮酒齊正配位太尊實泛齊醴齊著尊實盎齊犧尊實醍齊山罍實昔酒在壇上太尊實沈齊山罍實事酒清酒在壇下從祀著尊實醴齊盎齊犧尊實事酒粢盛正配位從祀並簠實以黍稷簋實以稻梁籩豆之實方丘正配位籩各實以鹽藳魚棗栗榛菱芡鹿脯黒餅白餅糗餌粉餈豆各實以韭葅醓醢菁葅鹿醢芹葅兎醢筍葅魚醢脾折葅豚拍􅓞食糝食從祀籩減糗餌粉餈豆減􅓞食糝食褥位用緋同郊天禮車旂同祀天禮執事人員設皇帝大次皇太子幙次官二人掃除壇上下官一人御史監掃除二人灑掃齋舍神厨官二人設饌幔官二人設皇地祗仁祖淳皇帝龍椅龍案從祀神席官一人設御位皇太子位官二人設燔柴官二人設分獻及文武官諸執事官版位官二人設儀仗官二人設庭燎墳燭官二人設牲榜省牲位及割牲官二人宰牲十五人掌鼎鑊視滌濯官二人協律郎一人舞士一人樂生一人舞生一人撰祝書祝官各一人讀祝兼捧祝官一人導駕官奏禮官六人導引皇太子官四人分獻官執事八人引陪祭官執事四人紏儀御史四人奉爵官六人捧幣官六人司香官六人掌祭官十二人舉飲福案官二人進福酒官二人進俎官二人授胙執事官一人司御洗捧匜一人進巾一人司分獻罍洗各酌水二人進巾二人司御盥洗酌水一人進巾一人司分獻盥洗位酌水一人進巾一人司御酒尊所官一人司分獻酒尊所各二人進正配位饌官六人舉案齋郎十二人舉從祀饌案四十八人陳設設皇帝大次於外壝之東其禮亦准祀天之儀於祀前一日有司掃除壇上下開瘞坎設皇太子幕次於大次之右祭前一日設省牲位於内壝之東門外設樂縣於壇下之南設正位於壇第一層之北正中配位於壇上之東設五岳五鎮四海四瀆位於壇第二層五岳四海在東五鎮四瀆在西設正配位著尊於壇上設尊於壇下玉幣篚位次之又設五岳四海酒尊於神座之次幣篚位次之設五鎮四瀆酒尊於神座之右幣篚位次之設正配位籩十二於神位之左豆十二於神位之右簠簋各二豋一在籩豆之間俎一在簠簋之前香燭案在俎之前爵坫沙池在香案之前設五岳五鎮四海四瀆籩十在左豆十在右簠簋各二豋一在籩豆之間俎一在簠簋之前香燭案在俎之前爵坫沙池在香燭案之前又設御盥洗位於壇之東分獻官盥洗位於樂懸之東西設御褥位於壇之南設皇太子褥位於御位之右設分獻官於御位之南文武陪祭官於分獻官之南讀祝官於神之右司尊司洗捧幣捧爵各於其所設望瘞位於壇東南告天下神祗祀前十日設天下神祗位於方丘之壇東西向以酒脯祭之祝文曰某年某月某日皇帝将有事於方丘咨爾百神克相祀事北郊祀畢復以籩豆簠簋羊豕各六即壇以祭祝文曰皇帝敬遣某官某致祭於天下神祗齋戒散齋七日致齋三日致齋第一日百官朝服親受誓戒於御前如祀天禮省牲器並同祀天禮飲福方丘三獻禮畢飲福受胙儀及贊詞並同祀天禮齋宫洪武二年十二月詔太常禮部議築齋宫於方丘之側告廟同祀天篇樂協律郎一人幞頭紅羅袍荔枝帶皂靴手執麾旛樂生六十二人服緋袍展脚幞頭革帶皂靴樂器編鐘十六編磬十六琴十瑟四搏拊四敔一柷四壎四箎四簫四横笛笙八應鼓一舞舞士一人幞頭紅羅袍荔枝帶皂靴手執節舞生百二十八人文舞六十四人引舞二人各執羽籥服紅袍展脚幞頭革帶皂靴舞生六十二人服紅袍展脚幞頭革帶皂靴手執羽籥武舞六十四人引舞二人各執干戚服緋袍展脚幞頭革帶皂靴舞生六十二人服緋袍展脚幞頭革帶皂靴手執干戚方丘樂章迎神中和之曲坤徳博厚物資以生承天時行光大且寧穆穆皇祗功化順成來御方丘嚴恭奉迎奠玉幣肅和之曲地有四維大琮以方土有正色制幣以黄敬存於中是薦是将奠之几筵臨監洋洋奉俎凝和之曲奉時純牡其牡童犢烹鼎既嚴豋俎維肅升壇昭薦神光下燭眷佑邦家報效唯篤初獻夀和之曲午為盛陽陰徳和萌天地相遇品物光榮吉日令辰明祀攸行進以醇醴展其潔清亞獻豫和之曲至廣無邊道全持載山岳所慿海瀆咸賴民資水土既安且泰酌酒掲䖍功徳惟大終獻熈和之曲庸眇之資有此疆宇匪臣攸能仰承佑助恩崇父母臣歡鼓舞八音宣揚叠侑明醑徹豆雍和之曲牲牷在俎籩豆有實臨之肹蠁匪惟飲食登歌乃徹薦獻爰畢執事奉承一其嚴慄送神安和之曲神化無方妙用難量其功顯融其祀悠長飈輪云旋龍控鸞翔拜送稽首瞻禮餘光望瘞時和之曲牲體制幣餕饌唯馨瘞之于坎以逹神靈奉神于陰典禮是程企而望之厚壤寛平夏至親祀方丘儀注齋戒前期皇帝散齋四日致齋二日陪祀官執事官並齋七日告天下神祗散齋第五日於方丘壝外之東設壇置天下神祗位西向具酒脯祭告省牲先祭二日設皇帝大次於壝外東門内道北南向省牲位於内壝東門外先祭一日導駕官導引車駕詣大次太常卿奏中嚴皇帝服皮弁服太常卿奏外辦導駕官同太常卿導引皇帝詣省牲位執事者各執事廪犧令帥其屬牽牲自東西行過御前省訖牽牲詣神厨執事者取毛血實于豆太常卿奏請詣神厨導駕官同太常卿導引至神厨太常卿奏請視鼎鑊請視滌濯遂烹牲導駕官同太常卿導引皇帝還大次陳設先祭一日陳設如圜丘儀鑾駕出宫前一日太常寺告示文武官具朝服乗馬導從兵馬司洒掃御道侍衛催整班行和聲備樂金吾衛備兵仗拱衛司備儀仗車輅典牧所備仗馬至日擊鼓初嚴内使監陳御輿於謹身殿前南向拱衛司設繖扇擎執於御輿之左右設黄麾仗于丹墀中道之東西設玉輅于奉天門外正中南向和聲郎設樂于午門外金吾衛陳仗于午門外近南東西相向陳金鼓隊于雲集街橋南東西相向舍人催文武官各具朝服擊鼓二嚴侍儀版奏中嚴舍人引文武官分立于雲集街橋北文東武西擊鼓三嚴侍儀奏外辦皇帝御謹身殿御用監令跪奏服冕服興皇帝服冕服訖侍衛奏請升輿皇帝升輿侍儀同導駕官導引御輿至丹墀儀仗前導至奉天門外侍儀跪奏降輿皇帝降輿侍儀奏升輅皇帝升輅侍儀跪取㫖勅文武官上馬舍人傳㫖勅文武官上馬訖侍儀跪奏進發玉輅進發前金鼓隊分左右行次旗仗分左右行次百官前導分左右行次護衛次仗馬次儀仗次侍儀導駕官次将軍次内使擎執各分左右行次内使監拱衛司光祿寺御用監官扈從於玉輅之後次鼓吹次旗幟次兵仗各後扈從駕将至兵仗周衛於大次文武官下馬侍立於御道之左右金鼓仗馬大樂儀仗分列於大次之南東西相向駕至大次前回輅侍儀跪奏降輅皇帝降輅侍儀與導駕官導引皇帝入大次侍儀跪取㫖勅文武官各還齊次正祭祭日清晨太常少卿率執事者各實尊罍籩豆豋俎簠簋又實幣於篚加玉置於酒尊所祝版置於皇地祗配帝位之右樂生舞生入就位諸執事入就位太常卿奏請中嚴皇帝服衮冕太常卿奏外辦導駕官同太常卿導引皇帝自左南門入至位北向立迎神贊禮唱迎神協律郎跪俯伏舉麾奏中和之曲贊禮唱瘞毛血郊社令瘞毛血樂六成止贊禮唱請行禮太常卿奏有司謹具請行事奏鞠躬拜興拜興平身贊禮唱皇太子以下在位官皆再拜傳贊唱鞠躬拜興拜興平身皇太子以下皆鞠躬拜興拜興平身奠玉帛贊禮唱奠玉幣太常卿奏請詣盥洗位導駕官同太常卿導引皇帝詣盥洗位太常卿贊盥曰前期齋戒今晨奉祭加其清潔以對神明太常卿奏搢圭皇帝搢圭司執洗者奉盥進巾太常卿奏盥手􅍤手出圭皇帝盥手􅍤手出圭太常卿奏請升壇贊曰神明在上整肅威儀升自午陛太常卿奏請詣皇地祗神位前司玉幣者奉玉幣以俟協律郎跪俯伏舉