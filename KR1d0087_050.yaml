而何旅五帝獨非祭天耶周禮宗伯甸師用牲於社大祝大師大㑹同宜于社小祝寇戎之事保郊祀于社大司馬蒐田獻禽祭示大合軍以先愷樂獻功於社大司冦軍旅之事涖戮于社類皆言社而不及稷臣謂此天子大社也張載曰大社王為羣姓所立必在國外王社王所自立必在城内夫大社既在國外則小宗伯建國之神位所謂右社稷左宗廟者固王自立之社而大社無稷矣漢儒乃謂大社有稷王社無稷是無怪其以社為地别體而雜求諸泰折方丘卒起後來紛紛之議非胡宏王炎諸臣相維講正流惑可勝慨乎蕙田案潘潢以大社爲祭地於社禮之外又添一社而地無祭矣謬極編修歐陽鐸議竊惟二儀定位天髙而地下先王制禮天尊而地親故我太祖皇帝兆圜丘於鍾山之陽兆方丘於鍾山之陰用周禮也行之十年乃更為大祀之殿定合祀之儀又行之二十餘年而太宗皇帝承之百十年來論者類疑其非古然以太祖非無為而變太宗非無據而承况土木一興財費不貲事干國典不敢易言耳兹遇陛下博稽古典臣工何容異議雖然古不可悖亦不可泥參之酌之與時宜之是在陛下聖明而已况周禮固有不可知者臣請先舉其畧而後效其愚謹案周禮冬至圜丘夏至方澤可以見天地之分祀矣然未知其兆於南郊歟抑南北二郊歟不可考也及考大宗伯掌建邦禮則禋祀祀天血祭祭社而無祭地之禮小宗伯掌建神位則右社稷左宗廟五帝四郊而無地祗之位司服則祀天大裘祭社希冕而無祭地之服乃若大宗伯蒼璧禮天黄琮禮地圭璋琥璜禮四方則無禮社之玉典瑞四圭祀天兩圭祀地璋邸射祀山川則無祀社之圭何其缺畧如此耶或謂天子之社非諸侯各祭一方者比古無北郊社以祭地也故尊與郊等親與廟並故武王伐商類於上帝即宜於冢土成王遷洛用牲于郊即社于新邑周禮葢言地即不言社言社即不言地耳信斯言也則既謂右社稷又曰澤中方丘何其乖錯如此耶意者國門之内除地為澤而築丘祭社如古者壇墠之制歟或社稷在國都之右因澤為丘不必於門内歟是又未可考也臣故曰古不可悖亦不必泥得其意不踐其迹時之為貴可也蕙田案歐陽鐸之議周禮誠不知而妄為之說也曰禋祀祀天血祭祭社無祭地之禮彼黄琮禮地兩圭祀地者何禮耶曰右社稷左宗廟五帝四郊無地祗之位彼澤中方丘非地祗之位耶曰祀天大裘祭社希冕無祭地之服夫冬至寒故大裘而衮冕未有冕而不衮者祭地夏至則衮冕爾何謂無服曰黄琮禮地而無禮社之玉兩圭祀地而無祀社之圭夫周禮序官毎多互見靈鼓鼓社祭言社而不及示大司樂分樂又言示而不言社葢祭祗不可謂之祭社而祭社則可謂之祭地故其禮有異者以秩其等有同者以著其徳周禮不及者其禮同也何得謂之缺畧耶至謂國門之内除地為澤而築丘祭社意欲併而為一而不知悖於因地事地之義矣又謂社稷在國都之右因澤為丘不必於門内吾不知其何說矣又案春明夢餘錄又載姚淶一議以周人建子可以冬至郊天夏至祭地用夏正則先地後天尤為謬妄呉鼎顧我鈞痛辨之載圜丘門可參觀也王圻續通考穆宗隆慶元年㑹議典禮郊祀之禮分祀已久似難紛更宜照例於南北二郊於冬夏至日聖駕親詣致祭仍奉太祖髙皇帝配從之命夏至方澤以卯時行禮五月辛酉上親祀地于方澤先是冬至祀天孟秋享太廟春秋祭社稷先師孔子歴代帝王俱用子時祭朝日壇以卯時夕月壇以酉時孟春孟夏孟冬時享及祫享太祖俱午時惟夏至祀地未定至是太常寺以請遂定卯時二年五月丙寅上親祀地于方澤崇禎十五年五月二十六日甲午夏至先是上傳親祭地于方澤所司者皆如儀是日四鼓後鳴鐘上乘輿從午門端門承天門長安左門安定門詣北郊至行幄具祭服時曙色漸開上繙閱章䟽久之報卯時上歩出大次從内壝靈星右門歩入行大祭禮樂九奏上升壇者五而對越盡禮仍至大次易常服而還正位黒犢一黄琮黄帛黄玉爵配位同惟無玉四從位黒犢四北羊四猪四計用犢六隻北羊及猪各四隻北羊者角灣下價最髙山羊角直上價亷大祀不用山羊南郊配位藏於泰神殿北郊配位在太廟臨祭前一日請出壇祭畢仍奉入右明祭地五禮通考卷四十
