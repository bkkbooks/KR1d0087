body:
  text: 五禮通考卷二十五刑部尚書秦蕙田撰吉禮二十五明堂漢書武帝本紀建元元年秋七月議立明堂遣使者安車蒲輪束帛加璧徴魯申公郊祀志武帝初即位尤敬鬼神之祀漢興已六十餘嵗矣天下乂安縉紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改厯服色事未就竇太后不好儒術使人㣲伺趙綰等姦利事案綰臧綰臧自殺諸所興為皆廢武帝本紀元封元年夏四月癸夘登封泰山降坐明堂臣瓚曰郊祀志初天子封泰山泰山東北阯古時有明堂處則此所坐者也明年秋乃作明堂耳兒寛傳從東封泰山還登明堂寛上夀曰臣聞三代改制屬象相因間者聖統廢絶陛下發憤合指天地祖立明堂辟雍宗祀泰山六律五聲幽贊聖意神樂四合各有方象以丞嘉祀為萬世則天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅邕永享光輝充塞天文燦然見象日昭報降符應臣寛奉觴再拜上千萬嵗夀制曰敬舉君之觴史記封禪書初天子封泰山泰山東北趾古時有明堂處處險不敞師古曰言其阻阨不顯敞上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黄帝時明堂圖公玉姓帶名明堂圖中有一殿四面無壁以茅葢通水圜宫垣為複道上有樓從南入命曰昆侖天子從之入以拜祀上帝焉于是上令奉髙作明堂汶上徐廣曰在元封二年秋如帶圖及五年修封則祀太一五帝于明堂上坐令髙皇帝祠坐對之祠后土于下房以二十太牢天子從昆侖道入始拜明堂如郊禮禮畢燎堂下蕙田案明堂制度見于經傳者明矣從未有如公玉帶所圖四面無壁通水圜宫垣上有樓而命曰昆侖者也明堂之室皆有户牖夾窻無壁則安所施宫垣之外有諸侯朝位通水圜之則朝于何所明堂四阿重檐乃室與堂之棟宇分為兩層上圓下方以合崇效卑法之義非樓也方士者流以黄帝有登仙之說又有仙人好樓居之說遂附㑹穿鑿造為此圖荒誕極矣後世異議紛紜違戾經典皆作俑于此漢書武帝紀元封二年秋作明堂于泰山下五年冬行南巡狩春三月甲子祠髙祖于明堂以配上帝因朝諸侯王列侯受郡國計三輔舊事上自封禪後夢髙祖坐明堂羣臣亦夢想于是祀髙祖于明堂以配天還作髙靈館蕙田案武帝紀元封元年夏四月登封泰山降坐明堂即古明堂處二年秋作明堂于泰山下即公玉帶所上圖也云令髙皇帝祠坐對之謂以髙皇配祀對即配也服䖍謂漢是時未以髙祖配光武以来乃配之非是據元始中莽言孝文祭太一以髙皇帝配孝武祠太一亦以髙祖配又太始四年祀髙祖于明堂以配上帝非至光武始配也史記封禪書其後二嵗十一月甲子朔旦冬至祠上帝明堂其贊饗曰天増授皇帝泰元神䇿周而復始皇帝敬拜太一漢書武帝紀太初元年冬十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂蕙田案古者明堂大饗行于季秋是時萬寳告成備物以祭所以答天功也太初之元乃以冬日至祀明堂是混郊與明堂為一矣後世或于正月行禮又與祈榖之郊相混皆漢武開其端也天漢三年行幸泰山祀明堂因受計太始四年三月行幸泰山壬午祀髙祖于明堂以配上帝因受計癸未祀孝景皇帝于明堂蕙田案漢武以孝景配祀葢亦泥孝經嚴父之說而昧其㫖者也兩日之内連舉大事而異其配可謂進退失據而自陥于弗欽之過矣征和四年春三月幸泰山庚寅祀于明堂平帝紀元始四年春正月宗祀孝文以配上帝夏安漢公奏立明堂辟雍蕙田案漢書所載武帝時止有泰山明堂王莽始奏立于京師而三輔黄圖則云明堂在長安西南七里漢書曰武帝初即位立明堂于城南應劭注云武帝立明堂王莽修飾令大是長安舊有明堂也今漢書未見此注不可攷五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭禮畢皆益户賜爵及金帛増秩補吏各有差蕙田案祫者宗廟之大祭明堂乃饗帝之所天神人鬼之祀截然不可紊也漢平乃混而一之其斯為末世之制乎右西漢明堂後漢書世祖本紀中元元年是嵗初起明堂靈臺辟雍及北郊兆域宣布圖讖于天下祭祀志世祖中元元年初營明堂辟雍靈臺未用事明帝本紀帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事禮畢登靈臺使尚書令持節詔驃騎将軍三公曰今令月吉日宗祀光武皇帝于明堂以配五帝禮備法物樂和八音詠祉福舞功徳其頒時令敕羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸来助祭單于侍子骨都侯亦皆陪位斯固聖祖功徳之所致也朕以闇陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極而嗣子無成康之質羣臣無吕旦之謀盥洗進爵踧踖惟慚素性頑鄙臨事益懼故曰君子坦蕩蕩小人長戚戚其令天下自殊死以下皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人祭祀志明帝永平二年正月辛未初祀五帝于明堂光武帝配五帝坐位堂上各處其方黄帝在未皆如南郊之位光武帝位在青陽之南少退西面牲各一犢奏樂如南郊卒事遂升靈臺以望雲物班固東都賦明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴享五位時序誰其配之世祖光武普天率土各以其職猗歟緝熈允懐多福張衡東京賦複廟重屋八逹九房薛綜註八逹謂室有八窻也堂後有九室所以異于周制也王隆漢官篇曰是古者清廟茅屋胡廣曰古之清廟以茅葢屋所以示儉也今之明堂茅葢之乃加瓦其上不忘古也蕙田案西漢明堂皆以泰一為主五帝為從至此始専祀五帝而光武配之失之又甚矣章帝本紀建初三年正月己酉宗祀明堂禮畢登靈臺望雲物大赦天下元和二年二月丙辰東巡狩壬申宗祀五帝于汶上明堂癸酉告祠二祖四宗大㑹外内羣臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勲其二王之後先聖之裔東后蕃䘙伯父伯兄仲叔季弟幼子童孫百僚從臣宗室衆子要荒四裔沙漠之北蔥嶺之西冒耏之類䟦涉懸度陵踐阻絶駿奔郊畤咸来助祭祖宗功徳延及朕躬予一人空虚多疚纂承尊明盥洗享薦慙愧祗慄詩不云乎君子如祉亂庶遄已厯數既從靈耀著明亦欲與士大夫同心自新其大赦天下諸犯罪不得赦者皆除之復博奉髙嬴無出今年田租芻藁祭祀志元和二年二月上東巡狩至泰山辛未柴祭天地羣神如故事壬申宗祀五帝于孝武所作汶上明堂光武帝配如雒陽明堂祀癸酉更告祠髙祖太宗世宗中宗世祖顯宗于明堂各一太牢卒事遂覲東后饗賜王侯羣臣因行郡國四月還京師又為靈臺十二門作詩各以其月祀而奏之蕙田案人君将出必告祭宗廟其歸有飲至之禮出告反面之義也章帝于巡幸所至告祀祖宗于明堂失其意矣和帝本紀永元五年正月乙亥祀五帝于明堂遂登靈臺望雲物大赦天下安帝本紀延光三年二月壬辰宗祀五帝于汶上明堂癸已告祀二祖六宗勞賜郡縣作樂順帝本紀永和元年正月己巳宗祀明堂登靈臺改元大赦漢安元年正月癸巳宗祀明堂大赦改元宦者傳朱瑀等隂于明堂中禱皇天曰竇氏無道請皇天輔皇帝誅之令事必成天下得寜既殺武等詔大官給塞具塞報祠也賽通用蔡邕傳建寜六年七月邕上封事言明堂月令天子以四立及季夏之節迎五帝于郊所以導致神氣祈福豐年清廟祭祀追徃孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國踈䘮宫内産生及吏卒小汚屢生忌故竊見南郊齋戒未嘗有廢至于它祀輙興異議豈南郊卑而它祀尊哉孝元皇帝䇿書曰禮之至敬莫重于祭所以竭心親奉以致肅祗者也又元和故事復申先典前後制書推心懇惻而近者以来更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齊則不入側室之門無廢祭之文也謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳豈謂皇居之廣臣妾之衆哉自今齊制宜如故典庶答風霆災妖之異蕙田案明堂祀五帝者季秋大享之從祀也五郊迎五帝者四立及季夏迎氣之正祭也其時其地迥然不同伯喈乃以國外五郊亦併入明堂為説何哉亦可知辟雍清廟明堂合為一物之説其不可信愈明矣百官志明堂丞一人屬太史通典東漢明堂制上圓下方法天地八窻四闥法八風四時九室十二座法九州十二月三十六户右後漢明堂魏志文帝紀黄初二年正月郊祀天地明堂蕙田案魏晉以下皆以一日之内郊宗並舉其不成禮可知宋書禮志是時魏都洛京而神祗兆域明堂靈臺皆因漢舊事魏志明帝本紀太和元年正月宗祀文皇帝于明堂以配上帝晉書禮志魏文帝即位用漢明堂而未有配明帝太和元年始宗祀文帝于明堂齊王亦行其禮通典太和元年正月丁未宗祀明堂祝稱天子臣某右魏明堂晉書禮志泰始二年羣臣議五帝即天也王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之座五郊改五精之號皆同稱昊天上帝各設一座而已地郊又除先后配祀帝悉從之二月丁丑郊祀先皇帝以配天宗祀文皇帝于明堂以配上帝蕙田案西漢武帝建明堂祀上帝甚正也後漢明帝兼祀五帝非孝經上帝之義矣武帝初以髙祖配甚正也未幾兼以景帝配平帝又以文帝配非孝經嚴父之義矣魏承漢制配以文帝而五帝仍之迨晉泰始二年始除五帝座改五精之號除先后配地三者皆足以救弊惜其不乆而即更也樂志天地郊明堂夕牲歌傅元嗣皇矣有晉時邁其徳受終于天光濟萬國萬國既光神定厥祥䖍于郊祀祗事上皇祗事上皇百福是臻巍巍祖考克配彼天嘉牲匪歆徳馨唯饗受天之祐神化四方天地郊明堂降神歌於赫大晉應天景祥二帝邁徳宣此重光我皇受命奄有萬方郊祀配享禮樂孔章神祗嘉享祖考是皇克昌厥後保祚無疆明堂饗神歌經始明堂享祀匪懈於皇烈考光配上帝赫赫上帝既髙既崇聖考是配明徳顯融率土敬職萬方来祭常於時假保祚永世禮志太康十年十月詔曰孝經郊祀后稷以配天宗祀文王于明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望望非地則明堂上帝不得為天也徃者衆議除明堂五帝位考之禮文不正且詩序曰文武之功起于后稷故推以配天焉宣帝以神武創業既已配天復以先帝配天於義亦所不安其復明堂及南郊五帝位晉初以文帝配後復以宣帝尋復還以文帝配其餘無所變更是則郊與明堂同配異配參差不同矣摯虞議以為漢魏故事明堂祀五帝之神新禮五帝即上帝即帝天也明堂除五帝之位唯祭上帝案仲尼稱郊祀后稷以配天宗祀文王于明堂以配上帝周禮祀天旅上帝祀地旅四望望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非為尊嚴之羙三日再祀非為不瀆之義其非一神亦足明矣昔在上古生為明王沒則配五行此五帝者配天之神同兆之于四郊報之于明堂祀天大裘而冕祀五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位唯祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔以施用宜定新禮明堂及郊祀五帝如舊儀詔從之江左以後未遑修建蕙田案帝即天也孝經配天配上帝互文見義耳摯虞惑于六天之説取其君之善制而變之誤孰大焉宋書禮志元帝紹命中興依漢氏故事宜享明堂宗祀之禮江左不立明堂故闕焉孝武帝太元十二年五月壬戌詔曰昔建太廟每事從儉約思與率土致力備禮又太祖虚位明堂未建郊祀國之大事而稽古之制闕然便可詳議祠部郎徐邈議明堂方圓之制綱領已舉不宜闕配帝之祀周公宗祀文王漢明配以始祖自非維新之考孰配上帝又曰明堂所祀之神積疑莫辨案易殷薦上帝以配祖考祖考同配則上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常禮同用四圭故並言之若上帝者五帝經文何不言祀天旅五帝祀地旅四望乎人帝之與天帝雖天人之通謂然五方不可言上帝諸侯不可言大君也書無全證而義容彼此故太始太康二紀之間興廢迭用矣侍中車𦙍議又曰明堂之制既其難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣厦不一其度何必守其形範而不知𢎞本順民乎九服咸寜河朔無塵然後明堂辟雍可崇而修之吏部郎王忱議明堂則天象地儀觀之大宜俟皇居反舊然後修之驃騎將軍㑹稽王道子尚書令謝石意同忱議于是奉行一無所改通典東晉太元十三年孝武帝正月後辛祀明堂車服之儀率遵漢制出以法駕服以衮冕時孫耆之議郊以祀天故配之以后稷明堂祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟故徐邈以配之為言必有神主郊為天壇則明堂非太廟矣時議帝親奉今親祀北郊明年正月上辛祀昊天次辛祠后土後辛祀明堂蕙田案宋書所載東晉之無明堂也審矣晉書紀志亦絶無孝武祀明堂事通典此條不知何據姑存以俟考右晉明堂宋書禮志孝武大明五年四月庚子詔曰昔文徳在周明堂崇祀髙烈唯漢汶邑斯尊朕皇考太祖文皇帝功耀洞元聖靈昭俗内穆四門仁濟羣品外薄八荒威憺殊俗南腦勁越西髓剛戎裁禮興稼穡之根張樂恊四氣之紀匡飾墳序引無題之外旌延寶臣盡盛徳之範訓深劭農政髙刑厝萬物棣通百神薦祉動恊天度下沿地徳故精緯上靈動殖下瑞諸侯軌道河溓海夷朕仰憑洪烈入子萬姓皇天降祐迄將一紀思奉揚休徳永播無窮便可詳考姬典經始明堂宗祀先靈式配上帝誠敬克展幽顯咸秩惟懐永逺感慕崩心有司奏伏尋明堂辟雍制無定文經記參差傳説乖舛名儒通哲各事所見或以為名異實同或以為名實皆異自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭𤣥注禮儀生于斯諸儒又云明堂在國之陽丙已之地三里之内至于室宇堂个户牖逹向世代湮緬難得該詳晉侍中裴頠西都碩學考詳前載未能制定以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之參詳鄭𤣥之注差有凖據裴頠之奏竊謂可安國學之南地實丙巳爽塏平暢足以營建其牆宇規範宜擬則太廟唯十有二間以應朞數依漢汶上圖儀設五帝位太祖文皇帝對饗祭皇天上帝雖為差降至于三載恭祀理不容異自郊徂宫亦宜共日禮記郊以特牲詩稱明堂羊牛吉蠲雖同質文殊典且郊有燔柴堂無禋燎則鼎爼彛簋一依廟禮班行百司搜材簡工權置起部尚書将作大匠量物商程尅今秋繕立乃依頠議但作大殿屋雕畫而已無古三十六户七十二牖之制蕙田案制擬宗廟祀以五帝屋用雕畫室無户牖失其義矣九月甲子有司奏南郊祭用三牛廟四時祠六室用二牛明堂肇建祠五帝太祖文皇帝配未詳祭用幾牛太學博士司馬興之議案鄭𤣥注禮記大傳稱孝經郊祀后稷以配天配靈威仰也宗祀文王于明堂以配上帝配五帝也夫五帝司方位殊功一牲牢之用理無差降愚管所見謂宜用六牛博士虞龢議祀帝之名雖五而所生之實常一五徳之帝迭有休王各有所司故有五室宗祀所主要隨其王而饗焉主一配一合用二牛祠部郎顔奐議祀之為義並五帝以為言帝雖云五牲牢之用謂不應過郊祭廟祀宜用二牛孝武本紀大明六年正月辛夘車駕親祀南郊是日又宗祀明堂大赦天下禮志六年正月南郊還世祖親奉明堂祠祭五時之帝以文皇帝配是用鄭𤣥議也官有其注樂志明堂歌謝荘造地紐謐乾樞回華葢動紫㣲開旌蔽日車若雲駕六氣乗絪緼曄帝京煇天邑聖祖降五靈集構瑤戺聳珠簾漢拂幌月棲檐舞綴畼鐘石融駐飛景鬱行風懋粢盛潔牲牷百禮肅羣司䖍皇徳逺大孝昌貫九幽洞三光神之安解玉鑾景福至萬㝢歡右迎神歌詩句依漢郊祀迎神三言四一轉韻雝臺辨朔澤宫練辰潔火夕照明水朝陳六瑚賁室八羽華庭昭事先聖懐濡上靈肆夏戒敬升歌發徳永固鴻基以綏萬國右登歌詩舊四言維天為大惟聖祖是則辰居萬㝢綴瑬下國内靈八輔外光四瀛蒿宫仰葢日館希旌複殿留景重檐結風刮楹接緯達嚮承虹設業設虡在王庭肇禋祀克配乎靈我将我享維孟之春以孝以敬以立我烝民右歌太祖文皇帝詞依周頌體參暎夕駟照晨靈乘震司青春鴈将向桐始蕤柔風舞暄光遲萌動逹萬品新潤無際澤無垠右歌青帝詞三言依木數龍精初見大火中朱光北至圭景同帝位在離實司衡水雨方降木槿榮庶物長盛咸殷阜恩覃四溟被九有右歌赤帝詞七言依火數履建宅中㝢司繩御四方裁化徧寒燠布政周炎凉景麗條可結霜明冰可折凱風扇朱辰白雲流素節分至乗經晷啟閉集恒度帝運緝萬有皇靈澄國歩右歌黄帝詞五言依土數百川如鏡天地爽且明雲冲氣舉徳盛在素精木葉初下洞庭始揚波夜光徹地翻霜照懸河庶類收成嵗功行欲寜浹地奉渥罄宇承秋靈右歌白帝詞九言依金數嵗既晏月方馳靈乗坎徳司規𤣥雲合晦鳥蹊白雲繁亘天涯雷在地時未光飭國典閉闗梁四節徧萬物殿福九域祚八鄉晨晷促夕漏延太隂極㣲陽宣鵲将巢氷已解氣濡水風動泉右歌黒帝詞六言依水數藴禮容餘樂度靈方留景欲暮開九重肅五達鳯參差龍已沫雲既動河既梁萬里照四空香神之車歸清都琁庭寂玉殿虚睿化凝孝風熾顧靈心結皇思右送神歌詞漢郊祀送神亦三言明帝本紀泰始六年春正月初制間一年一祭明堂禮志泰始六年五月詔曰古禮王者每嵗郊享爰及明堂自晋以来間年一郊明堂同日質文詳畧踈數有分自今可間二年一郊間嵗一明堂外可詳議有司奏前兼曹郎虞愿議郊祭宗祀俱主天神而同日殷薦於義為黷明詔使圜丘報功三載一享明堂配帝間嵗昭薦詳辰酌衷實允懋典曹郎王延秀重議尋自初郊間二載明堂間一年第二郊與第三明堂還復同嵗宜各間二年以斯相推長得異嵗通闗八座同延秀議蕙田案郊與明堂天子嵗祀天之常一于冬至一于季秋不相妨也同日則已黷間年則已疏二者胥失之矣明帝泰始七年十月庚子有司奏来年正月十八日祠明堂尋舊南郊與明堂同日並告太廟未審今祀明堂復告與不祠部郎王延秀議案鄭元郊者祭天之名上帝者天之别名也神無二主故明堂異處以避后稷謹尋郊宗二祀既名殊實同至於應告不容有異守尚書令袁粲等並同延秀議後廢帝元徽二年十月丁巳有司奏郊祀明堂還復同日間年一修後廢帝紀元徽三年正月辛巳車駕親祠南郊明堂右宋明堂齊書禮志建元元年七月有司奏明堂亦應與郊同年而祭不若應祭者復有配與不祀者堂殿職僚毁置云何議曹郎中裴昭明儀曹郎中孔逷議今年七月宜殷祠来年正月宜南郊明堂並祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜應廢祀右僕射王儉議郊配之重事由王迹是故杜林議云漢業特起不因縁堯宜以髙帝配天魏髙堂隆議以舜配天蒋濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契並云明堂有五室天子每月於其室聽朔布教祭五帝之神配以有功徳之君鄭元云周人明堂五室帝一室也初不聞有文王之寝袁孝尼云明堂法天之宫本祭天帝而以文王配配其父于天位則可牽天帝而就人鬼則非義也泰元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾隂五畤即是五帝之祭亦未有郊配議者或謂南郊之日已旅上帝若又以無配而特祀明堂則一日再祭于義為黷案古者郊本不共日蔡邕獨斷曰祠南郊祀畢次北郊又次明堂髙廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合嵗功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔晁云言五帝佐天化育故有從祀之禮旅上帝是也至于四郊明堂則是本祀之所譬猶功臣從饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑于共日今何故致嫌于同辰又禮記天子祭天地四方山川五祀嵗徧尚書堯典咸秩無文詩云昭事上帝聿懐多福據此諸義則四方山川猶必享祀五帝大神義不可畧魏文帝黄初二年正月郊天地明堂明帝太和元年正月以武皇帝配天文皇帝配上帝然則黄初中南郊明堂皆無配也宜以来年正月上辛有事南郊宜以其日還祭明堂又用次辛饗祀北郊而並無配犧牲之色率由舊章詔明堂可更詳有司又奏明堂尋禮無明文唯以孝經為正竊尋設祀之意葢為文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀徐邈近代碩儒每所折衷其云郊為天壇則堂非文廟此實明據内外百司立議已定如更詢訪終無異説傍儒依史竭其管見既聖㫖唯疑羣下所未敢詳廢置之宜仰由天鑒詔依舊建元四年世祖即位其秋有司奏尋前代嗣位或仍前郊年或别始晉宋以来未有畫一未審明年應南北二郊祀明堂與不依舊通闗八座丞郎博士議尚書令王儉謂明年正月宜饗禮二郊虞祭明堂自兹厥後依舊間嵗尚書領國子祭酒張緒等十七人並同儉議詔可蕙田案武帝永明二年准蔡履議郊與明堂不同日王儉議後辛祀明堂詳見圜丘門樂志建武二年雩祭明堂謝脁造辭一依謝荘賓出入奏肅咸樂歌辭二章彛承孝典恭事嚴聖浹天奉賮罄壤齊慶司儀具序羽容夙章芬枝揚烈黼構周張助寳奠軒酎珍充庭璆縣凝㑹㻆朱竚聲先期選禮肅若有承祇對靈祉皇慶始膺尊事威儀輝容昭序迅恭明神絜盛牲爼肅肅嚴宫藹藹崇基皇靈降止百祗具司戒誠望夜端烈承朝依微照旦物色輕宵青帝歌參暎夕駟照晨靈乗震司青春雁将向桐始蕤和風舞暄光遲萌動達萬品新潤無際澤無垠赤帝歌龍精初見大火中朱光北至圭景同帝位在離實司衡兩水方降木槿榮庶物盛長咸殷阜恩覃四溟被九有黄帝歌履艮宅中宇司繩御四方裁化徧寒燠布政司炎凉此以下除四句至分乗經晷閉啟集恒度帝運緝萬有皇靈澄國歩白帝歌百川若鏡天地爽且明雲冲氣舉盛徳在素精此下除四句庶類收成嵗功行欲寜浹地奉渥罄宇承帝靈黒帝歌嵗既暮日方馳靈乗坎徳司規𤣥雲合晦鳥蹊白雲繁亘天涯此下除四句晨晷促夕漏延大隂極微陽宣此下除二句皇帝還東壁受福酒奏嘉胙樂歌辭大席同用禮薦洽福祚昌聖皇膺嘉祐帝業凝休祥居極乗景運宅徳瑞中王澄明臨四奥精華延八鄉洞海同聲憓徹宇麗乾光靈慶纒世祉鴻烈永無疆送神奏昭夏樂歌辭皆謝莊辭藴禮容餘樂度靈方留景欲暮開九重肅五達鳳參差龍已沫雲既動河既梁萬里照四空香神之車歸清都琁庭寂玉殿虚鴻化凝孝風熾顧靈心結皇思鴻慶遐鬯嘉薦令芳翊帝明徳永祚深光増四句牲出入奏引牲樂歌詩唯誠絜饗維孝尊靈敬芳黍稷敬滌犧牲騂繭在豢載溢載豐以承宗祀以肅皇衷蕭芳四舉華火周傳神鑒孔昭嘉足三牷薦豆呈毛血嘉薦樂歌詩二章肇禋戒祀禮容咸舉六典飾文九司照序牲柔既昭犧剛既陳恭滌惟清敬事惟神加籩再御兼爼兼薦節動軒越聲流金縣奕奕閟幄亹亹嚴闈絜誠夕鑒端服晨暉聖靈戾止翊我皇則上綏四㝢下洋萬國永言孝饗孝饗有容儐僚贊列肅肅雍雍迎神奏昭夏樂歌辭地紐謐乾樞回華葢動紫㣲開旌蔽日車若雲駕六氣乗烟煴燁帝景耀天邑聖祖降五靈集此下除八句懋粢盛絜牲牷百禮肅羣司䖍皇徳逺大孝昌貫九幽洞三光神之安解玉鑾景福至萬㝢歡皆謝莊辭皇帝升明堂奏登歌辭雍臺辨朔澤宫選辰絜火夕照明水朝陳六瑚賁室八羽華庭昭事先聖懐濡上靈肆夏式敬升歌發徳永固鴻基以綏萬國皆謝莊辭初獻奏凱容宣烈樂歌辭太廟同釃醴具登嘉爼咸薦饗洽誠陳禮周樂徧祝辭罷祼序容輟縣蹕動端庭鑾回嚴殿神儀駐景華漢髙虚八靈案衛三祗解途翠葢澄耀罼帟凝晨玉虚息節金輅懐音式誠達孝底心肅感追馮皇鑒思承淵範神錫懋祉四緯照明仰福帝徽俯齊庶生鬱林王本紀隆昌元年二月辛卯車駕祀明堂禮志隆昌元年有司奏參議明堂咸以世祖配國子助教謝曇濟議案祭法禘郊祖宗並立嚴祀鄭元注義亦據兼饗宜祖宗兩配文武䨇祀助教徐景嵩光禄大夫王逡之謂宜以世祖文皇帝配祠部郎何佟之議周之文武尚推后稷以配天謂文皇宜推世祖以配帝雖事施于尊祖亦義章于嚴父焉左僕射王晏議以為若用鄭元祖宗通稱則生有功徳沒垂尊稱歴代配帝何止于郊今殷薦上帝允屬世祖百代不毁其文廟乎詔可東昏侯永元二年佟之又建議曰案祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯周人禘嚳而郊稷祖文王而宗武王鄭元云禘郊祖宗謂祭祀以配食也禘謂祀昊天于圜丘也祭上帝於南郊曰祭祭當作郊祀五帝五神于明堂曰祖宗郊祭一帝而明堂祭五帝小徳配寡大徳配衆王肅云祖宗是廟不毁之名果如肅言殷有三祖三宗並應不毁何故止稱湯契且王者之後存焉舜寜立堯頊之廟傳世祀之乎漢文以髙祖配泰畤至武帝立明堂復以髙祖配食一人兩配有乖聖典自漢明以來未能反者故明堂無兼配之祀竊謂先皇宜列二帝于文祖尊新廟為髙宗並世祖而泛配以申聖主嚴父之義先皇于武皇倫則第為季義則經為臣設配饗之坐應在世祖之下並列俱西向國子博士王摛議孝經周公郊祀后稷以配天宗祀文王于明堂以配上帝不云武王又周頌思文后稷配天也我将祀文王于眀堂也武王之文唯執競云祀武王此自周廟祭武王詩彌知明堂無矣佟之又議孝經是周公居攝時禮祭法是成王反位後所行故孝經以文王為宗祭法以文王為祖又孝莫大于嚴父配天則周公其人也尋此㫖寜施成王乎若孝經所説審是成王所行則為嚴祖何得云嚴父邪且思文是周公祀后稷配天之樂歌我将是祀文王配明堂之樂歌若如摛議則此二篇皆應在復子明辟之後請問周公祀后稷文王為何所歌又國語云周人禘嚳郊稷祖文王宗武王韋昭云周公時以文王為宗其後更以文王為祖武王為宗尋文王以文治而為祖武王以武定而為宗欲明文亦有大徳武亦有大功尋文意當作文亦有大功武亦有大徳疑監本誤故鄭注祭法云祖宗通言耳是以詩云昊天有成命二后受之注云二后文王武王也且明堂之祀有單有合故鄭云四時迎氣于郊祭一帝還于明堂因祭一帝則以文王配明一賓不容兩主也享五帝于明堂則泛配文武泛之為言無的之辭其禮既盛故祖宗並配參議以佟之為允詔可蕙田案佟之謂孝經是周公居攝時禮祭法是成王反位後所行夫周公歴相武成其制明堂之禮實在武王時故孝經以嚴父配天屬之至于成王宅憂周公位冢宰正百工未嘗行天子禮也假令周公居攝致祭亦為攝事正在聽于冢宰之内豈得謂周公主祭而稱為嚴父乎右齊明堂梁書武帝本紀天監十年正月辛酉輿駕親祀明堂隋書禮儀志明堂在國之陽梁初依宋齊其祀之法猶依齊制禮有不通者武帝更與學者議之舊齊儀郊祀帝皆以衮冕至天監七年始造大裘而明堂儀注猶云衮服十年儀曹郎朱异以為禮大裘而冕祭昊天上帝五帝亦如之良由天神髙逺義須誠質今從汛祭五帝禮不容文于是改服大裘异又以為齊儀初獻樽彛明堂貴質不應三獻又不應象樽禮云朝踐用太樽鄭云太樽瓦也記又云有虞氏瓦樽此皆在廟所用猶以質素况在明堂禮不容象今請改用瓦樽庶合文質之衷又曰宗廟貴文故庶羞百品天義尊逺則須簡約今儀注所薦與廟不異即理徴事如為未允請自今明堂有膳准二郊但帝之為名夲主生育成嵗之功實為顯著非如昊天義絶言象雖曰同郊復應㣲異若水土之品蔬果之屬猶宜以薦止用梨棗橘栗四種之果薑蒲葵韭四種之葅粳稻黍粱四種之米自此之外郊所無者請並從省除初博士明山賓制儀注明堂祀五帝行禮先自赤帝始异又以為明堂既汎祭五帝不容的有先後東階而升宜先春帝請改從青帝始又以為明堂籩豆等器皆以雕飾尋郊祀貴質改用陶匏宗廟貴文誠宜雕爼明堂之禮既方郊為文則不容陶匏比廟為質又不應雕爼斟酌二途須從厥衷請改用純漆异又以舊儀明堂祀五帝先酌鬱鬯灌地求神及初獻清酒次酃終醁禮畢太祝取爼上黍肉當御前以授請依郊儀止一獻清酒且五帝天神不可求之于地二郊之祭並無黍肉之禮並請停灌及授爼法又以為舊明堂皆用太牢案記云郊用特牲又云天地之牛角繭栗五帝既曰天神理無三牲之祭而毛詩我将篇云祀文王于明堂有維羊維牛之説良由周監二代其義貴文明堂方郊未為極質故特用三牲止為一代之制今斟酌百王義存通典蔬果之屬雖符周禮而牲牢之用宜遵夏殷請自今明堂止用特牛既合質文之中又見貴誠之義帝並從之許懋傳有事明堂儀注猶云服衮冕懋駁云禮云大裘而冕祀昊天上帝亦如之良由天神尊逺須貴誠質今泛祭五帝理不容文改服大裘自此始也蕙田案朱异許懋之言過矣大裘祀天猶須被衮何乃服以祀上帝乎記云大旅具矣不足以大饗郊雖尚質而大饗則盡文天與帝不同也為壇主尊明堂主親改服大裘用瓦樽混而同之非是通典梁祀五帝于明堂服大裘冕罇以瓦俎豆以純漆牲以特牛餚膳並準二郊若水土之品蔬菜之屬宜以薦郊所無者從省除所配五帝行禮自東階升先春郊帝為始止一獻清酒並停三獻及灌事梁書武帝本紀天監十二年冬十月詔明堂地勢卑濕未稱乃心外可量就埤起以盡誠敬隋書禮儀志先是帝欲有改作乃下制㫖而與羣臣切磋其義制曰明堂準大戴禮九室八牖三十六户以茅葢屋上圓下方鄭𤣥據援神契亦云上圓下方又云八窻四闥明堂之義本是祭五帝神九室之數未見其理若五堂而言雖當五帝之數向南則背叶光紀向北則背赤熛怒東向西向又亦如此於事殊未可安且明堂之祭五帝則是總義在郊之祭五帝則是别義宗祀所配復應有室若専配一室則是義非配五若皆配五則便成五位以理而言明堂本無有室朱异以為月令天子居明堂左个右个聴朔之禮既在明堂今若無室則於義成闕制曰若如鄭𤣥之義聴朔必在明堂於此則人神混淆荘敬之道有廢春秋云介居二大國之間此言明堂左右个者謂所祀五帝堂之南又有小室亦號明堂分為三處聴朔既三處則有左右之義在營域之内明堂之外則有个名故曰明堂左右个也以此而言聴朔之處自在五帝堂之外人神有别差無相干其義是非莫定初尚未改十二年太常丞虞爵復引周禮明堂九尺之筵以為髙下修廣之數堂崇一筵故階髙九尺漢家制度猶遵此禮故張衡云度堂以筵者也鄭𤣥以廟寝三制既同俱應以九尺為度制曰可于是毁宋太極殿以其材構明堂十二間基准太廟以中央六間安六座悉南向東來第一青帝第二赤帝第三黄帝第四白帝第五黒帝配帝總配享五帝在阼階東上西向大殿後為小殿五間以為五佐室焉蕙田案明堂中一室為饗帝宗祀之所謂太廟太室也其外八室天子齊則居之大戴禮云不齊不居其室是也又其外為十二堂則居之以聴朔布令明堂總名也其中未嘗無内外之分人神之辨梁武以一宗而配五室致疑故發明堂無室之論不知古之所饗者唯上帝未嘗有五也五帝自在四郊之兆四立日迎氣祭之本與明堂無涉又以饗祀聴朔皆在明堂為人神混淆故有堂南又有小室分為三處聴朔之論而不知古之初未嘗混也音樂志明堂徧歌五帝登歌五曲四言歌青帝辭帝居在震龍徳司春開元布澤含和尚仁羣居既散嵗云陽止飭農分地人粒惟始雕梁繡栱丹楹玉墀威靈以降百福來綏歌赤帝辭炎光在離火為威徳執禮昭訓持衡受則靡草既凋温風以至嘉薦惟旅時羞孔備齊醍在堂笙鏞在下匪唯七百無絶終始歌黄帝辭鬱彼中壇含靈闡化迴環氣象輪無輟駕布徳在焉四序将收音宫數五飯稷驂駵宅屏居中旁臨外宇升為帝尊降為神主歌白帝辭神在秋方帝居西皓允兹金徳裁成萬寶鴻来雀化參見火邪幕無𤣥鳥菊有黄華載列笙磬式陳彞爼靈罔常懐惟徳是與歌黒帝辭徳盛乎水𤣥㝠紀節隂降陽騰氣凝象閉司智莅坎駕鐡衣𤣥祈寒坼地晷度迴天悠悠四海駿奔奉職祚我無疆永隆人極梁書武帝本紀普通二年二月辛丑輿駕親祠明堂四年正月丙午輿駕親祠明堂中大通元年正月辛巳輿駕親祠明堂三年二月辛丑輿駕親祠明堂五年正月辛亥輿駕親祠明堂大同元年二月辛巳輿駕親祠明堂七年正月辛丑輿駕親祠明堂太清元年正月甲子輿駕親祠明堂右梁明堂陳書髙祖本紀永定二年正月戊午輿駕親祠明堂宣帝本紀太建三年二月辛巳輿駕親祠明堂五年二月辛丑輿駕親祠明堂六月治明堂隋書禮儀志陳制明堂殿屋十二間中央六間依齊制安六座四方帝各依其方黄帝居坤維而配享坐依梁法武帝時以徳帝配文帝時以武帝配廢帝已後以文帝配牲以太牢粢盛六飯鉶羮果蔬備薦焉右陳明堂五禮通考卷二十五
