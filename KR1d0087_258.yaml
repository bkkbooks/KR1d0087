body:
  text: 五禮通考卷二百四十八刑部尚書秦蕙田撰凶禮三荒禮後漢書順帝本紀永建三年春正月丙子京師地震漢陽地陷裂甲午詔實核傷害者賜年七嵗以上錢人二千魏書宣武帝本紀延昌二年夏四月庚子以絹十五萬匹賑恤河南郡飢民册府元龜武德二年閏二月出庫物三萬段以賑窮乏永貞元年十一月以久雨京師鹽貴出庫鹽一萬石以惠飢民長慶二年十二月命以絹二百匹賑京師東市西市窮乏者荒政考略宋天聖七年詔曰河北大水壞澶州浮橋其被災之民見存三口者給錢二千不及者半之宋史仁宗本紀景祐四年八月越州水賜被溺民家錢有差慶歷四年二月出奉宸庫銀三萬兩振陜西飢民嘉祐元年七月出內藏銀絹三十萬振貸河北哲宗本紀紹聖二年二月出內庫錢帛二十萬助河北振飢孝宗本紀乾道四年七月以經總制餘剩錢二十一萬緡樁留卭蜀州以備振濟王圻續通考嘉定七年出內帑錢賑臨安府貧民紹定四年詔出封樁庫緡錢三十萬賑臨安貧民嘉熙元年五月詔出內庫緡錢二十萬給被災之家淳祐二年詔出封樁庫十七界楮幣十萬賑贍紹興處婺水潦之民宋史度宗本紀咸淳元年閏五月久雨發錢二十萬賑在京小民遼史道宗本紀大安二年七月賜興聖積慶二宫貧民錢三年四月賜中京貧民帛賜威烏爾古部貧民帛七月出雜帛賜興聖宫貧民夀隆六年二月出絹賜五院貧民金史章宗本紀泰和五年十一月山東闕食賜錢三萬貫以振之元史食貨志中統三年七月以課銀一百五十錠濟甘州貧民至元二年以鈔百定賑庫庫楚所部軍二十年以帛千匹鈔三百定賑碩達勒達地貧民二十四年鄂端民飢賑鈔萬定大德七年以鈔萬定賑歸德飢民王圻續通考洪武二十五年令山東災傷去處每戶給鈔五定明會典嘉靖元年令將太倉銀庫見貯銀兩差官稱盤二十萬兩運赴陜西蝗旱地方支用二年令將滸墅鈔關收貯嘉靖元年秋冬二季二年春夏二季共四季銀兩照數查取在官類解南直𨽻巡撫衙門相兼原查餘鹽等銀通融賑濟災傷地方又令將湖廣正德十四年起至嘉靖二年止解京銀三萬五千兩給發賑濟荆州府荆門石首等州縣旱災又令將嘉靖三年分淨樂宫庫藏查盤節年所積香錢暫支二千兩賑濟湖廣地方旱災王圻續通考嘉靖三十四年歲祲詔發內帑銀三萬兩賑濟飢民隆慶元年六月以霖雨壞民廬舍令五城御史以房號錢巡按御史以贓罰銀分賑之貧者每戶給銀五錢次三錢仍諭都察院左都御史王廷等督御史嚴加稽察使貧民得沾實惠二年七月詔戶部發太倉銀二萬兩遣于災重處亟行賑濟三年十月兩淮巡鹽御史李學詩以鹽場水災請扣留商人正鹽納銀每引一分挑河銀二萬兩賑恤竈丁從之蕙田案以上賑銀鈔絹帛諸物漢書元帝本紀初元二年七月詔曰歲比災害民有菜色慘怛于心已詔吏虛倉廪開府庫振救魏書明元帝本紀神瑞二年十月詔曰頃者以來頻遇霜旱年穀不登百姓飢寒不能自存者甚衆其出布帛倉穀以賑貧窮册府元龜唐貞觀十一年七月詔以水災其雒州諸縣百姓漂失資産乏絶糧食者宜令使人與之相知量以義倉賑給庚子賜遭水旱之家帛十五匹半毁者八匹舊唐書德宗本紀貞元十八年秋七月蔡申光三州春水夏旱賜帛五萬段米十萬石鹽三千石宋史仁宗本紀天聖五年七月振秦州水災賜被溺家錢米嘉祐元年七月賜河北流民米壓溺死者賜其家錢有差曾鞏救災議河北地震水災隳城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患于暴露非錢不可以立屋廬患于乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞于上使者旁午于下無以救其患塞其求也有司建言請發倉廪與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見于衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廪于上則其𫝑必不暇乎他為使農不復得修其畎畝商不復得治其貨賄工不復得利其器用間民不復得轉移執事一切棄百事而專意于待升合之食以偷為性命之計是直以餓殍之飬飬之而已非深思逺慮為百姓長計也以中戶計之戶為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一戶月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來歲麥熟之時未可以罷自今至于來歲麥熟凡十月一戶當受粟五十石今被災者十餘州州以二萬戶計之中戶以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬戶食之不遍則為施不均而民猶有無告者也食之遍則當用粟五百萬石而足何以辦此又非深思逺慮為公家長計也至于給授之際有淹速有均否有真偽有會集之擾有辨察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其于屋廬搆築之費將安取哉屋廬搆築之費既無所取而就食于州縣必相率而去其故居雖有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺馬牛而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如是不可止則將空近塞之地空近塞之地則失戰鬪之民此衆士大夫之所慮而不可謂無患者也空近塞之地則失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬪之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出于無聊之計有窺倉庫盜一􅌩之粟一束之帛者彼知己負有司之禁則必鳥駭鼠竄竊弄鋤梃于草茅之中以扞遊徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能宴然而已乎况夫外有夷狄之可慮內有郊社之將行安得不防之于未然銷之于未萌也然則為今之䇿下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則令被災之州為十萬戶如一戶得粟十石得錢五千下戶常産之資平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用間民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廪于上而𫝑不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石况貸之于今而收之于後足以振其艱乏而終無損于儲峙之實所實費者錢五巨萬貫而已此可為深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居苟有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失况于全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則𫝑不暇乎他為雖驅之不去誘之不為盜矣夫飢歲聚餓殍之民而與之升合之食無益于救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安于畎畝之中負錢與粟而歸與父母妻子脫于流亡轉死之禍則戴上之施而懷欲報之心豈有已哉不早出此或至于一有枹鼓之警則雖欲為之將不及矣且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望今有司于糴粟常價斗增一二十錢非獨足以利農其于增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虛估不過損茶荈香藥之類為錢數巨萬貫而其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五巨萬貫又捐茶荈香藥之類為錢數巨萬貫而足以救一時之患為天下之計利害輕重又非難明者顧吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉丘氏濬曰曽鞏此議所謂賜之錢貸之粟比之有司日逐給粟之説其為利病相去甚逺所謂深思逺慮以為百姓長計者真誠有之但飢民一戶貸之米十石一旦責其如數償之難矣不若因時量力稍有力者償其半無力者併與之或立為次第之限可也文獻通考元祐六年翰林學士承旨知杭州蘇軾言浙西二年諸郡災傷今歲大水蘇湖常三州水通為一杭州民死者五十餘萬蘇州三十萬未數他郡今既秋田不種正使來歲豐稔亦須七月方見新穀變故未易度量乞令轉運司約度諸郡合糶米斛數目下諸路封樁及年計上供赴浙西諸郡糶賣詔賜米百萬斛錢二十餘萬緡賑濟災傷宋史哲宗本紀元祐八年十二月出錢粟十萬賑流民食貨志紹興三十一年正月雪寒民多艱食詔臨安府城內外貧乏之家人給錢二百米一斗及柴炭錢並于內藏給之輔郡之民令諸州以常平錢依臨安府振之王圻續通考乾道四年降僧牒一百道付建寧府戶部降米五千石賑衢州飢荆南府僧牒二百道衢州一百道饒信米各三萬石雷州水賜十道詔諸路運司行下所屬將災傷處各選清強官遍詣地頭盡行檢放或不實不盡有虧公私被差官并所差不當官司並重作行遣其被水甚處令監司守臣條具合措置存恤事件聞奏知溫州趙與可以支常平錢五百貫并係省錢五百貫賑給被災人戶自劾上曰國家積常平米正為此也可赦罪宋史孝宗本紀淳熙十四年八月賜度牒一百道米四萬五千石備振紹興府飢王圻續通考寶慶元年滁州大水詔撥會子三千緡米千六百石賑恤被災之家紹定三年浙東大水汪綱發粟三萬八千餘緡錢五萬賑給之景定二年十月詔物價未平出封樁庫楮幣二十萬賑二衛諸軍出豐儲倉米五萬石賑都民遼史道宗本紀太康元年九月以南京飢出錢粟賑之大安三年正月出錢粟振南京貧民元史食貨志中統四年以錢糧幣帛賑東平濟河貧民鈔四千錠賑諸王濟必特穆爾部貧民大德十一年以飢賑安州髙陽等縣糧五千石漷州穀一萬石奉符等處鈔二千定兩浙江東等處鈔三萬餘定糧二十萬餘石又勸率富戶賑糶糧一百四十餘萬石凡施米者驗其數之多寡而授以院務等官是年又以鈔一十四萬七千餘定鹽引五千道糧三十萬石賑紹與慶元台州三路飢民自延祐之後腹裏江南飢民歲加賑恤其所賑或以糧或以鹽引或以鈔蕙田案元史本紀所載賑恤之事無歲無之不能悉載其大要已該于數言矣明會典成化二年奏準今後若有侵欺賑濟銀糧或將官銀假以煎銷均散為名却乃插和銅鉛給與貧民者一體解京發落王圻續通考嘉靖二年南北二京及山東河南湖廣江西俱旱災戶部孫交請留蘇松折兑銀粳白米兩浙鹽價滸墅關鈔課應天缺官薪皂贖鍰兼賑又請發太倉銀二十萬折漕米九十萬往賑從之明會典嘉靖五年奏準湖廣地方災傷將合屬各預備倉原積穀米雜糧八十二萬石銀四萬兩并太和山嘉靖四年五年分香錢銀兩見在實數十分內摘取六分酌量輕重賑濟七年奏準河南災荒將所屬庫貯各項錢糧動支及準留攺折兊軍米十萬石賑濟被災府分飢民又諭巡撫官督令司府州縣等官將極貧人戶先儘見在倉糧量為給賑若有不敷將各項官銀給發蕙田案以上銀米兼賑禮記檀弓公叔文子卒其子戍請諡於君君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎齊大飢黔敖為食於路以待餓者而食之有餓者蒙𬒮輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫惟不食嗟來之食以至于斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食後漢書獻帝本紀興平元年七月三輔大旱自四月至于是月帝避正殿請雨是歲穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作糜粥經日而死者無數帝疑賦恤有虛乃親于御座前量試作糜乃知非實使侍中劉艾出讓有司于是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟魏書孝文帝本紀太和七年三月以冀定二州民飢詔郡縣為粥于路以食之六月定州上言為粥給飢人所活九十四萬七千餘口九月冀州上言為粥給飢民所活七十五萬一千七百餘口食貨志太和十一年大旱京都民飢加以牛疫公私闕乏時有馬驢及橐駝供駕挽耕載詔聽民就豐行者十五六道路給糧稟至所在三長贍飬之遣使者時省察焉留業者皆令主司審核開倉賑貸其有特不自存者悉檢集為粥于街衢以救其困然主者不明牧察郊甸間甚多餧死者薛安都傳安都從祖弟真度為豫州刺史景明初豫州大飢真度表曰去歲不收飢饉十五今又災雪三尺民人萎餒無以濟之臣輒日别出州倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯恤陳郡儲粟雖復不多亦可分贍尚書量賑以聞册府元龜唐乾元三年二月以米貴斗至五百文多餓死令中使于西市煮粥以飼餓者後周顯德四年三月命供奉官田處嵓梁希進等于夀州城內煮粥以救飢民六年三月楚州上言詔準煮粥以救飢民宋史太祖本紀建隆元年夏四月乙酉遣使分詣京城門賜飢民粥真宗本紀大中祥符六年四月詔淮南給飢民粥麥登乃止天禧元年三月令作淖糜濟懷衛流民二年二月遣使諭京東官吏安撫飢民又命諸路振以淖糜仁宗本紀景祐元年正月詔開封府界諸縣作糜粥以濟飢民諸災傷州軍亦如之嘉祐四年正月遣官分行畿縣委令佐為糜粥濟飢神宗本紀熙寧八年正月洮西安撫司以歲旱請為粥以食羌戶飢者程頤賑濟論不制民之産無儲蓄之備飢而後發廪以食之廪有竭而飢者不可勝濟也今不暇論其本且救目前之死亡惟有節則所及者廣常見今時州縣濟飢之法或給之米豆或食之粥飯來者與之不復有辨中雖欲辨之亦不能也穀貴之時何人不願得食倉廪既竭則殍死者在前無以救之矣數年前一親戚為郡守愛恤之心可謂至矣雞鳴而起親視俵散官吏後至者必責怒之于是流民歌詠至者日衆未幾穀盡殍者滿道愚嘗憐其用心而嗤其不善處事救飢者使之免死而已非欲其豐肥也當擇寬廣之處宿戒使晨入至已則闔門不納午而後與之食申而出之給米者午即出日得一食則不死矣其力自能營一食者皆不來矣比之不擇而與者當活數倍之多也凡濟飢當分兩處擇羸弱者作稀粥早晚兩給勿使至飽俟氣稍完然後一給第一先營廣居處切不得令相枕藉如作粥須官員親嘗恐生及入石灰不給浮浪無此理也平日當禁遊惰至其飢餓哀矜之一也宋史孝宗本紀淳熙八年十一月再詔臨安府為粥食飢民金史章宗本紀承安二年冬十月大雪以米千石賜普濟院令為粥以食貧民四年冬十月敕京府州縣設普濟院每歲十月至明年四月設粥以食貧民泰和五年三月命給米諸寺自十月十五日至次年正月十五日作糜以食貧民廣治平略嘉靖元年南京兵部侍郎席書言南畿民飢殊甚考古荒政可行于今日者惟作粥一法不煩審戶不待防姦至簡至要可以舉行而世俗咸謂不便蓋緣曽有舉于一城不知散布諸縣以致四逺飢民聞風併集主者𫝑不能給致民相聚而死遂謂此法難行臣今總計南畿作粥江南北可四十二州縣大都大縣設粥十二所中縣減三之一小減十之五諸所設粥處約日並舉凡以飢來者無論本處鄰境軍民男女老幼戶口多寡均粥給濟起今十一月半抵麥熟止計用米不過十六萬石可活人二十餘萬取用有數未至太靡賑恤有等不至虛費此法一行垂死之人晨得而暮起其效甚速其功甚大戶部覆此法不特宜于南畿宜通行天下災荒處所一體施行江南通志神宗十六年吳中大荒發大僕寺馬價及南京戶部銀共三十萬兩命戶科楊文舉賑濟有司各處設厰煮粥賑飢王圻續通考賑貸羣議議煮粥蓋凶荒時人民流徙飢餒疾病扶老挈幼驅之不前緩之則斃資之錢幣則價踴而難糴散之菽粟則廪歉人衆而難遍惟煮粥庶可救燃眉然舉行固自有法蓋處之宜廣不宜隘舉之宜同不宜異令行宜嚴不宜寬食之口宜散不宜聚授之餐宜遍不宜頻是在賢守令善行之而已蕙田案以上賑粥漢書昭帝本紀始元二年三月遣使者振貸貧民毋種食者八月詔曰往年災害多今年𧖟麥傷所振貸種食勿收責宣帝本紀地節三年冬十月詔流民還歸者假公田貸種食元帝本紀初元元年三月以三輔太常郡國公田及苑可省者振業貧民資不滿千錢者賦貸種食後漢書和帝本紀永元十二年二月詔貸被災諸郡民種糧十六年正月詔貧民有田業而以匱乏不能自農者貸種糧四月遣三府掾分行四州貧民無以耕者為雇犂牛直安帝本紀永初三年七月詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉順帝本紀陽嘉二年二月詔以吳郡會稽飢荒貸人種糧宋史文帝本紀元嘉二十年諸州郡水旱傷稼民大飢遣使給賜糧種二十一年正月尤弊之處遣使就郡縣隨宜賑恤凡欲附農而種糧匱乏者並加給貸二十九年正月詔曰經寇六州居業未能仍值災潦飢困薦臻可速符諸鎮優量救恤今農事行興務盡地利若須田種隨宜給之孝武帝本紀大明二年正月詔曰去歲東土多經水災春務已及宜加優課糧種所須以時貸給七年九月詔曰近炎精亢序苗稼多傷今二麥未晚甘澤頻降可下東境郡勤課墾殖尤弊之家量貸麥種册府元龜唐貞觀二十一年十月絳陜二州旱詔令賑貸湖州給貸種食二十二年瀘州交州越州渝州徐州水戎州鼠傷稼開州萬州旱通州秋蝗損稼並賑貸種食舊唐書玄宗本紀開元二十二年正月懷衛邢相等五州乏糧遣中書舍人裴敦復巡問量給種子册府元龜天寶十四載正月以歲飢乏故詔天下府縣百姓去載有損交不支濟者仰所由審勘責除有倉糧之外仍便據籍地頃畝量與種子京兆府及華陽馮翊扶風等郡既是近輔須别優矜雖非損戶或有乏少種子者亦仰每鄉量宜準給貞元元年二月詔曰諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其産業以所進牛均平給賜其有田五十畝以下人不在給限給事中𡊮高奏曰聖慈所憂切在貧下百姓有田不滿五十畝者尤是貧人請量三兩戶共給牛一頭以濟農事從之是時蝗旱之後牛多疫死諸道節度韋臯李叔明等咸進耕牛故有是命四年正月詔曰諸州遭水旱委長吏貸種六年七月以麥不登賜京兆府種五萬石舊唐書德宗本紀貞元十九年七月貸京畿民麥種敬宗本紀寶歷元年十二月敕農功所切實在耕牛疲氓多乏須議給賜委度支往河東振武靈夏等州市耕牛一萬頭分給畿內貧下百姓册府元龜太和三年七月齊德州奏百姓自用兵已來流移十分只有二分伏乞賜麥種耕牛等敕量賜麥三千石牛五百頭共給綾一萬匹充價值仍各委本州自以側近市糴分給後唐長興三年宋亳潁三州水災尤甚樞密使范延光趙延夀從容奏曰今秋宋亳潁等州水災甚民戶流亡粟價暴貴臣等量欲與本州官倉斛斗依如今時估出糶以救貧民大水之後頗宜宿麥窮民不便種子亦望本州據民戶等第支借麥種自十石至三石候來年收麥據原借數納官從之宋史真宗本紀大中祥符元年正月幽州旱求市麥種許之五年五月江淮兩浙旱給占城稻種教民種之食貨志帝以江淮兩浙稍旱即水田不登遣使就福建取占城稻三萬斛分給三路為種擇民田髙仰者蒔之蓋早稻也內出種法命轉運使揭榜示民天禧元年諸路蝗民飢鎮戎軍風雹害稼詔貸其種糧二年三月先貸貧民糧種止勿收四年三月以淄州民飢貸牛種仁宗本紀天聖六年四月貸河北流民復業者種食皇祐元年正月詔以緡錢二十萬市穀種分給河北貧民嘉祐元年七月貸被水災民麥種髙宗本紀建炎二年正月録兩河流亡吏士沿河給流民官田牛種紹興十八年十一月借給被災農民春耕費孝宗本紀淳熙三年正月振淮東飢仍命貸貧民種八年五月以久雨貸貧民稻種錢九年正月詔江浙兩淮旱傷州縣貸民稻種計度不足者貸以樁積錢朱子乞給借稻種狀本司凖淳熙九年正月二十日尚書省劄子勘會春耕是時深慮江浙兩淮州縣去歲旱傷之後貧民下戶并流移歸業之人艱得稻種却致妨廢農務理宜措置正月十九日三省同奉聖旨令逐路轉運提舉司疾速行下去歲旱傷州縣多方措置稻種勘量給借務令及時布種候豐熟却行拘還具已借支數目聞奏仍多出文榜曉諭本司照對紹興府去歲旱傷為甚衢婺州為次遂那撥錢發下紹興府及下衢婺兩州諸縣恭稟聖旨指揮措置給借并鏤版曉諭人戶通知先據婺州申本州鄉俗體例並是田主之家給借今措置欲依鄉俗體例各請田主每一石地借與租戶種穀三升應副及時布種候收成日帶還不得因而收息如有少欠官司專與催理不同尋常債負已下諸縣從此施行蕙田案此令田主出穀種貸租戶至收成之日官為催還朱子提舉浙東日於衢婺二州行之寧宗本紀嘉定二年七月命兩淮轉運司給諸州民麥種十月命兩淮轉運司給諸路民稻種食貨志嘉定八年左司諫黃序奏雨澤愆期地多荒白知餘杭縣趙師恕請勸民雜種麻粟豆麥之屬蓋種稻則費少利多雜種則勞多獲少慮收成之日田主欲分官課責輸則非徒無益若使之從便雜種多寡皆為己有則不勸而勤民可無飢望如所陳下兩浙兩淮江東西等路凡有耕種失時者並令雜種主毋分其地利官無取其秋苗庶幾農民得以續食官免振救之費從之蕙田案水旱之後播種失時惟廣種雜糧稍可獲利而又縣官不徴其課田主不責其租庶凋瘵之民不致甚失所此當籌畫于既荒之後者也理宗本紀嘉熙二年三月詔四川帥臣招集流民復業給種與牛優與振贍遼史食貨志開泰元年詔曰朕惟百姓徭役煩重則多給工價田園蕪廢者則給牛種以助之金史宣宗本紀興定元年四月單州雨雹傷稼詔遣官勸諭農民改蒔秋田官給其種五月延州原武縣雨雹傷稼詔官貸民種改蒔元史世祖本紀至元四年七月詔額齊訥新附貧民給牛具種實及糧食二十二年十月都護府言哈喇和卓民飢戶給牛二頭種二石二十三年十二月遣布察濟貧民墾甘肅間田官給牛種農具明會典嘉靖三十八年令發太倉銀六萬兩賑薊遼飢荒另發銀五萬兩以給牛種蕙田案以上貸穀種及牛具又案説文振舉救也賑富也振賑二字義訓不同後世以賑字代振救之振失其義矣凡以物救人之急皆謂之振救災之法給以錢粟而不責其償則曰振濟先給之而後徴之則曰振貸以粟減直出糶以利民則曰振糶其濟之貸之也或以米或以銀錢或以絹帛鹽鈔諸物或以粥或以耔種牛具列代史書所載其法具在分類比附俾言荒政者有所考其但云振恤振給而不著其振之法者不能備載云通典元嘉中三吳水潦穀貴人飢彭城王義康立議以東土災荒人凋穀踊富商蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆敕使糴貨為制平價此所謂常道行于百代權宜用于一時也周書武帝本紀建德三年正月詔以往歲年穀不登民多乏絶令公卿道俗凡有貯積粟麥者皆準口聽留以外盡糶舊唐書高宗本紀永徽六年八月大雨道路不通京師米價暴貴出倉粟糶之永隆元年十一月洛州飢減價出糶以救飢人册府元龜開元二年閏二月十八日敕年歲不稔有無須通所在州縣不得閉糴各令當處長吏簡較十二年八月詔曰蒲同兩州自春偏旱慮至來歲貧下少糧宜令太原倉出十五萬石米付蒲州永豐倉出十五萬石米付同州減時價十錢糶與百姓舊唐書玄宗本紀天寶十二載八月京城霖雨米貴令出太倉米十萬石減價糶與貧人十三載秋霖雨積六十餘日京城垣屋頽壞殆盡物價暴貴人多乏食令出太倉米一百萬石開十場賤糶以濟貧民册府元龜天寶十四載正月詔曰豐熟已來歲時頗久爰自二載稍異有年粟麥之間或聞未贍此開倉賤糶以濟時須雖且得支持而價未全減今更出倉務令家給俾其樂業式副朕心宜于太倉出糶一百萬石分付京兆府與諸縣糶每斗減于時價十文河南府畿縣出三十萬石太原府出三十萬石滎陽臨汝等郡各出粟二十萬石河內郡出米十萬石陜郡出米二萬石并每斗減時價十文糶與當處百姓應緣開場差官分配多少一時各委府郡縣長官處置乃令採訪使各自勾當其太倉含嘉出粟兼令監倉使與府縣計會處分其奉先同官華原等縣與中部郡地近宜準諸縣例數便于中部請受其餘縣有司者仰準此舊唐書代宗本紀大歷四年八月丙申朔自夏四月連雨至此月京城米斗八百文官出米二萬石減估而糶以惠貧民册府元龜興元元年十月詔曰歷河朔而至太原自淮沂而被雒汭蟲螟為害雨澤愆時其宋亳淄青澤潞河東常冀幽州易定魏博等八節度管內各賜米五萬石河陽東都畿二節度管內各賜三萬石所司即搬運于楚州分付各委本道領受賑給將士百姓江淮之間連歲豐稔迫于供賦頗亦傷農收其有餘濟彼不足宜令度支于淮南浙江東西道加價和糴米三五十萬石差官搬運于諸道減價出糶貴從權便以利于人蕙田案平糴之法始于李悝蓋因穀賤而取之穀貴而出之取有餘補不足使農民交利而已軍國之用未嘗仰給于此也唐開元以後始有和糴之名大抵取以充他用不復為凶荒平糶之計矣其始也官出錢民出穀彼此交易兩得其便民無科抑之纍官有儲蓄之利故云和糴及其弊也善價不及鄉閭美利皆歸司局配戶勒限甚于稅賦此白居易有和糴有害無利之疏也宋時飬兵之費愈增備邊之計愈亟於是和糴結糴俵糴均糴博糴兊糴括糴之名目亦愈繁然穀之糴于官者多則藏于民者必少一有凶歉即無以接濟而官吏抑配括索之弊又有不可勝言者故和糴之舉特籌國用之一法而未必便于農也德宗此詔以江淮和糴之米運至諸道減價出糶得周禮通財之意故特録之而附論其利弊如此貞元九年正月詔曰分災救患法有常規通商惠人國之令典自今宜令州府不得輒有閉糴仍委鹽鐡使及觀察使訪察聞奏十四年六月詔曰訪聞蒸庶之間米價稍貴念兹貧乏每用憂懷苟利于人所宜通濟今令度支出官米十萬石于街東西各五萬石每斗賤較時價糶與百姓七月令賑給京兆府百姓麥種二萬石舊唐書德宗本紀貞元十四年十月以歲凶穀貴出太倉粟三十萬石開場糶以惠民十二月出東都含嘉倉粟七萬石開場糶以惠河南飢民十五年二月出太倉粟十八萬石糶京畿諸縣食貨志元和九年四月詔出太倉粟七十萬石開六場糶之并賑貸外縣百姓至秋熟徴納便于外縣收貯以防水旱十二年四月詔出粟二十五萬石分兩街降估出糶穆宗本紀長慶二年閏十月詔江淮諸州旱損頗多所在米價不免踴貴眷言疲困須議優矜宜委淮南浙西東宣歙江西福建等道觀察使各于當道有水旱處取常平義倉斛斗據時估減半價出糶以惠貧民册府元龜長慶四年二月詔如聞京城米穀翔貴百姓乏食者多夏麥未登須有救恤宜出太倉陳粟四十萬石委度支京兆府類會減時價于東西街置場出糶其價錢仍司府收貯至秋收糴七月敕近日訪聞京城米價稍貴須有通變以便公私宜令戶部應給百官俸料其中一半合給匹段者回給官中所糴粟每斗折錢五十文其匹段委别收貯至冬糴粟填納太倉時人以為甚便蕙田案此官俸折米之始太和六年二月戶部侍郎庾敬休奏兩州米價騰貴百姓流亡至多請糴兩州闕宫職田祿米以救貧人從之八年九月詔江淮浙西等道仍歲水潦遣殿中侍御史任畹馳往慰勞以比年賑貸多為姦吏所欺徒有其名惠不及下宜委所在長吏以軍州自貯官倉米減一半價出糶各給貧弱如無貯蓄處即以常平義倉米出糶又詔諸道有飢疫處軍糧蓄積之外其屬度支户部雜穀並令減價以出糶濟貧人開成元年十二月鹽鐡轉運使奏據江淮留後盧鋼以江淮諸州人將阻飢請于來年運米數內量留收貯至春夏百姓飢乏之際減價出糶收其直待熟償之無損于官有利于人帝嘉之詔留常運米三十萬石蕙田案此截留漕米以為平糶之用後唐同光四年正月詔曰輦轂之中郊甸之內時物踊貴人戶飢窮訪聞自陜已西遐及邠鳯積年時熟百穀價和縱未能别備于貢輸亦宜廣通于和糴近聞輒有稅索已曽降敕指揮尚恐關鎮阻滯行塗增長物價仰所在長吏切加檢御以濟往來推救災恤患之心明奉國憂人之道又京圻之內自張全義制置已數十年每聞開墾荒蕪勸課稼穡曽無歉歲甚有餘糧公私貯蓄及多收藏未肯出糶更俟厚價頗失衆情宜令中書門下條疏應在京及諸縣有貯斛斗並令減價出糶以濟公私後周廣順元年四月敕天災流行分野代有苟或閉糴豈是愛人宜令沿淮渡口鎮鋪不得止淮南人糴易三年十一月敕膳部員外郎劉表微往兖州開倉減價糶粟以水害稼救飢民也丙午單州刺吏劉禧言滄州充給歲餘軍糧外有大麥六萬石欲開倉官糶以濟貧民從之十二月以亳州潁州大水民飢所有倉儲及永城倉度支給軍食一年外遣使減價出糶顯德元年正月分命朝臣杜曄等五人往潁亳濮永城固河口開食減價出糶以濟飢民六年正月命廬州開倉出陳麥以糶之蓋克復之後民多阻飢故廉其價以惠之也二月濠州上言準宣出糶省倉陳麥以利飢民宋史太宗本紀淳化元年七月京師貴糴遣使開廪減價分糶真宗本紀大中祥符五年京城河北淮南飢減直鬻穀以濟流民玉海天禧元年詔災傷州以常平倉元糴價出糶荒政考略天禧元年濮州侯日成上言本州富民儲蓄不少近價值日增乞差使臣與通判點檢量留一年支費餘悉令糶真宗有旨勸誘出糶不得擾富民真宗本紀天禧四年閏十二月京城穀貴減直發常平倉仁宗本紀天聖四年四月詔京東西河北淮南平穀價慶歷元年十一月發廪粟減價以濟京城八年十一月出廪米減價以濟畿內貧民至和二年四月出米京城門下其價以濟流民吳及傳嘉祐四年及管勾登聞檢院上書言春秋有告糴陛下恩施動植視人如傷然州郡官司各專其民擅造閉糴之令一路飢則鄰路為之閉糴一郡飢則鄰郡為之閉糴夫二千石以上所宜同國休戚而坐視流離豈聖朝子育兆民之意哉遂詔鄰州鄰路災傷而輒閉糴論如違制律言行録熙寧中趙清獻公抃以大資政知越州兩浙旱蝗米價踴貴諸州皆榜衢路禁人增米價公獨榜衢路令有米者增價糶之於是諸州米商輻湊詣越米價更賤民無餓死者蘇頌乞糶官米濟民疏臣竊聞近日甚有近北災傷人民流移往鄰路州軍逐熟尋有旨下諸路令州縣常切存恤恭惟聖恩溥施靡所不逮然恐州縣虛文不能上副仁憫之意何則其流民所之惟是歲豐物賤便為安居之地今並淮諸郡雖稍登稔若食口既多必是物價騰踴萬一將來秋成失望漂泊之民未有歸業之期坐食貴穀便見失所彼時須煩縣官賑救為惠差遲則其無益甚矣臣以謂存恤之法莫先於平物價欲物貨之平則莫若官為糶給使之常食賤價之物則不覺轉移流徙之為患也臣欲望特降朝旨應有流民所聚州縣權將上供或軍糧米斛比見今在市實直量減分數估定價例將來更不得添長專差強幹官一員置場出糶直候流民歸業日即罷其約束事件並依昨來在京糶場施行收到價錢却委轉運司和糴斛斗充數如此擘畫比之出粟賑濟所費寡而所惠博惟朝廷垂意幸甚宋史徽宗本紀元符三年正月即皇帝位十二月出廪粟減價以濟民高宗本紀建炎二年十月禁江浙閉糴三年二月出米十萬斛即杭秀常湖州平江府損直以糶濟東北流寓之人紹興十三年三月振淮南飢民仍禁遏糴食貨志紹興三十一年正月雪寒民多艱食詔臨安府并屬縣以常平米減時之半振糶十日朱子與星子諸縣議荒政書一將來糶米亦請一面早與上戶及糴米人戶公共商議置場去處務令公私貧富逺近之人各得其便大抵官米只于縣市出糶上戶米穀即與近便鄉村置場出糶不須般載往來徒有勞費如有大段有餘不足去處及將來發糶常平米斛即具因依申來切待别行措置與建寧諸司論賑濟劄子一安撫司賑濟米合于冬前差船般運免至冬後與民間般載租米互有相妨或致延滯一廣南最係米多去處常歲商賈轉販舶在海中今欲招邀合從兩司多印文榜發下福州沿海諸縣優立價直委官收糴自然輻湊然後却用溪船節次津般前來建寧府交卸一般運米須得十餘萬石方可濟用合從使府兩司及早撥定本錢選差官員使臣或募土豪給與在路錢糧令及冬前速到地頭趂熟收糴潮惠州與本路界相近往回别無踈虞即與支賞約運到米一千石支錢三十貫充賞其糴到米數最多之人仍與别議保奏推賞施行一上件福廣米既到府城即城下居人自無闕食之理不須過有招邀上溪船米反致鄉村匱乏將來却煩官司般米賑濟勞費百端今合先次出榜曉諭諸縣産戶寺院除日逐出糶不得閉糴外每産錢一貫樁米三十石省禾亦依此紀數兩貫以下不樁委社首遍行勸諭親自封樁開具本都樁管米數及所樁去處限十一月內申縣祗備覆實不得輒徇顔情虛申數目及妄挾怨仇生事騷擾其社首家禾即委隅官封樁一鄉下有外里産户等寄莊即仰社首及本處居人指定經官陳説封樁十分之七一鄉下有産錢低小而停積禾米之家仰鄰保重立罪賞陳告亦與量數封樁十分之五並依前法一上戶有願於合樁數外别行樁糶之人許具實數經縣自陳收附出糶量行旌賞一所樁禾米更不預定價直將來隨鄉原髙下量估平價出糶不使太貴以病細民亦不使太賤以虧上戶一所樁禾米自來年正月為始以十分為率至每月終即給一分還元樁産戶自行出糶直至稍覺民飢即據見數五日一次差隅官監糶大人一斗婦人七升小兒四升如至六月中旬民間不甚告飢即盡數給還産戶自行出糶一府城縣郭及鄉村居民合糴禾米之家合預行括責取見戶口實數即見合用米數及將來分定坊保給關收糴庶免欺弊大人婦人小兒逐戶分作三項一上户自有蓄積軍人自有衣糧公吏自有廪祿市戶自有經紀工匠自有手作僧道自有常住並不在收糴之限一鰥寡孤獨老病無錢糴米之人候三四月間别議措置如是飢荒須令得所右謹具呈第一項至第三項乞使府兩司早賜詳度定議第四項以後乞使府出榜通衢恐有未盡未便之處令諸色人詳其利害疾速具狀陳述廣詢審議然後施行庶使大戶細民兩得安便伏候台旨此米須留以待來歲之用目今秋成在邇般運到人已食新切乞存留無為虛費樁米多則上戶不易少又儲蓄不足此數更乞裁酌更以戶口之數計之方見實用米數寶慶三年監察御史汪剛中言豐穰之地穀賤傷農凶歉之地濟糴無䇿惟以其所有餘濟其所不足則飢者不至于貴糴而農民亦可以得利乞申嚴遏糴之禁凡兩浙東江西湖南北州縣有米處並聽販鬻流通違許被害者越訴官按劾吏決配庶幾令出惟行不致文具從之王圻續通考紹定元年資政殿學士知潭州曽從龍奏州縣賑民之法有三曰濟曰貸曰糶濟不可常惟貸與糶為利可久今撥緡錢一千萬有竒分下潭州十縣委令佐糴米置惠民倉乞比附常平法從之六年正月監察御史何處久奏乞申飭諸道轉運司嚴飭所部州縣不許遏糴如歉郡招誘客販委官告糴仍具數上之朝廷其阻糴苛稅者令御史臺劾奏從之宋史度宗本紀咸淳元年閏五月久雨京城減直糶米三萬石自是米價高即發廪平糶以為常食貨志咸淳元年有旨豐儲倉撥公田米五十萬石付平糴倉遇米貴平價出糶二年監察御史趙順孫言今日急務莫過于平糴乾道間郡有米斗直五六百錢者孝宗聞之即罷其守更用賢守此今日所當法者今粒食翔踴未知所由市井之間見楮而不見米推原其由實富家大姓所至閉廪所以糴價愈高而楮價隂減陛下念小民之艱食為之發常平義倉然為數有限安得人人而濟之願陛下課官吏使之任牛羊芻牧之責勸富民使之無秦越肥瘠之視糴價一平則楮價不因之而輕物價不因之而重矣七年以咸淳三年以前諸路義米一百一十二萬九千餘石減價發糶薄收郡縣聽民不拘關會見錢收糶金史世宗本紀大定九年三月以大名路諸明安民戶艱食遣使發倉廪減價出之食貨志大定二十一年中都大水命都城減價以糶明昌四年七月諭旨戶部官聞通州米粟甚賤若以平價官糴之何如于是有司奏中都路去歲不熟今其價稍減者以商旅運販繼至故也若即差官爭糴切恐市價騰踴貧民愈病請俟秋收日依常平倉條理收糴詔從之五年五月上曰聞米價騰踴今官運至者有餘可減直以糶之其明告民不須貴價私糴也章宗本紀承安元年六月上以百姓艱食詔出倉粟十萬石減價以糶之高汝礪傳貞祐二年六月宣宗南遷次邯鄲拜汝礪為參知政事次湯隂上聞汴京穀價騰踴慮扈從人至則愈貴問宰臣何以處之皆請命留守司約束汝礪獨曰物價低昂朝夕或異然糴多糶少則貴蓋諸路之人輻輳河南糴者既多安得不貴若禁止之有物之家皆將閉而不出商旅轉販亦不復入城則糴者益急而貴益甚矣事有難易不可不知今少而難得者穀也多而易致者鈔也自當先其所難後其所易多方開誘務使出粟更鈔則穀價自平矣上從之蕙田案米價騰貴之時無抑之使平之理汝礪此議與趙清獻榜衢路令增價出糶之意合侯摯傳貞祐四年正月拜尚書右丞是時河北大飢摯上言曰今河朔飢甚人至相食觀滄等州斗米銀十餘兩殍殣相屬伏見沿河上下許販粟北渡然每石官糴其八彼商人非有濟物之心也所以涉河往來者特利其厚息而已利既無有誰復為之是雖有濟物之名而實無所渡之物其與不渡何異昔春秋列國各列疆界然晉飢則秦輸之粟及秦飢晉閉之糴千古譏之况今天下一家河朔之民皆陛下赤子而遭罹兵革尤為可哀其忍坐視其死而不救歟人心惟危臣恐弄兵之徒得以藉口而起也願止其糴縱民輸販為便詔尚書省行之元史食貨志京師賑糶之制至元二十二年始行其法於京城南城設鋪各三所分遣官吏發海運之糧減其市直以賑糶焉凡白米每石減鈔五兩南粳米減鈔三兩歲以為常成宗元貞元年以京師米貴益廣世祖之制設肆三十所發糧七萬餘石糶之白粳米每石中統鈔一十五兩白米每石一十二兩糙米每石六兩五錢二年減米肆為一十所其每年所糶多至四十餘萬石少亦不下二十餘萬石至大元年增兩城米肆為一十五所每肆日糶米一百石四年增所糶米價為中統鈔二十五貫自是每年所糶率五十餘萬石泰定二年減米價為二十貫致和元年又減為一十五貫云賑糶糧之外復有紅貼糧紅貼糧者成宗大德五年始行初賑糶糧多為豪強嗜利之徒用計巧取弗能周及貧民於是令有司籍兩京貧乏戶口之數置半印號簿文貼各書其姓名口數逐月對貼以給大口三斗小口半之其價視賑糶之直三分常減其一與賑糶並行每年撥米總二十萬四千九百餘石閏月不與焉其愛民之仁于此亦可見矣廣治平略周忱巡撫直𨽻初至蘇松屬大飢穀貴忱廉得江浙湖廣大稔令人槖金至其地故抑其直勿糴且紿言吳中米價髙甚用是三省大賈載米數百艘來集忱乃下令盡發官廪貸民半收其直城中米價驟減各賈懷觀望只得賤糶忱復椎牛釃酒謝之各賈悉大歡而去米價既平乃復官糴以實廪此巧行其平糴者也杭州府志正統六年二月巡按浙江監察御史康榮奏杭州府地狹人稠浮食者多仰給蘇松諸府今彼地水旱相仍穀米不至杭州遂困又湖州府比因歲凶米亦甚貴竊計二府官廪尚有二十年之積恐年久紅腐請發三十五萬糶于民間令依時值償納則朝廷不費而民受其惠矣從之荒政考略成化七年京畿飢敕戶部發太倉粟一百萬斛減價糶以利民凡糴惟以升斗計滿一石不與飢者獲濟明會典成化六年奏準將京通二倉糧米發糶五十萬石每粳米收銀六錢粟米五錢以殺京城米價騰貴王圻續通考成化十八年正月命南京糶常平倉糧時歲飢米貴南京戶部議減價糶以濟民飢秋成平糴還倉明會典嘉靖九年令天下各府州縣有積久米粟盡數平糶以濟貧窮候收成買貯新穀務足前數通紀會纂神宗十五年申時行請禁遏糴疏曰治本在使民得食頃者因荒大發帑銀遣使分賑恩至渥矣然賑銀有限而飢民無窮惟是鄰近協助市糴通行乃可延旦夕之命近訪河南等處往往閉糴彼固各愛其民然自朝廷視之莫非赤子災民既缺食于本土又絶望于他方是激之為變也乞禁止遏糴之令聽商民糴買接濟則百姓不至嗷嗷待斃洶洶思亂也上從之蕙田案以上平糶荒政考略唐高宗儀鳯間王方翼為肅州刺史蝗獨不至其境鄰郡民皆重繭走之乃出私錢作水磑薄其直以濟飢瘵起舍數十百楹居之全活甚衆古今治平略皇祐間吳中大飢范仲淹領浙西乃縱民競渡與僚佐日出燕湖上諭諸守者以荒歲價亷可大興土木于是諸寺工作鼎新又新倉厫吏舍日役千夫監司劾奏杭州不恤荒政遊宴興作傷財勞民公乃條奏所以如此正欲廢有餘之財以惠貧者使工技傭力之人皆得仰食于公私不至轉徙填壑荒政之施莫此為大是歲惟杭飢而不害文獻通考熙寧六年詔自今災傷用司農常法賑救不足者並預且當修農田水利工役募夫數及其直上聞乃發常平錢斛募飢民興修不如法賑救者委司農劾之曾鞏越州趙公救災記熙寧八年吳越大旱知越州趙公僦民完城四千一百丈為工三萬八千計其傭與錢又與粟再倍之朱子奏救荒畫一事件狀一檢凖常平免役令諸興修農田水利而募被災飢流民充役者其工直糧食以常平錢穀給臣契勘本路水利極有廢壞去處亦有全未興創去處欲俟將來給到錢物即令逐州計度合興修處雇募作役既濟飢民又成永久之利實為兩便奏救荒事宜畫一狀一臣昨所奏逐項事理並蒙開允獨有依凖舊制募飢民修水利一事未蒙施行臣竊見連年災旱國家不忍坐視夫民之死大發倉廪以拯救之其費以巨億計蓋其賑給者固不復收其賑糶者雖曰得錢而所折閲亦不勝計仁聖之心於此固無所吝然飢民百萬安坐飽食而於公私無毫髮之補則議者亦深惜之故臣嘗竊仰稽令甲私計以為若微於數外有所增加以為募民興役之資則救災興利一舉而兩得之其與見行糶給之法利害之算相去甚逺故不自揆既以奏聞而輒下諸州委是通判詢究水利合興復處以俟報可至於近日巡歷又得親見所至原野極目蕭條唯是有陂塘處則其苗之蔚茂秀實無以異於豐歲於是竊嘆益知水利之不可不修自謂若得奉承明詔悉力經營令逐村逐保各有陂塘之利如此則民間永無流離餓莩之患而國家亦永無蠲減糶濟之費矣不謂言語疏略未蒙鑒照敢竭其愚重以為請伏望聖慈深察上件事理許臣前項所請百七十萬貫者而令於內量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即令繳納糶給由歷就雇入役俟畢工日糶給如舊則所損不至甚多而可以成永久之利絶凶年之憂費短利長未為失䇿候聖旨簽黃臣又竊恐興修水利所費太多難以支給即乞且令貸與食利人戶雇工興役却候將來豐熟年分紐計米數量分料次赴官送納樁管在官尤為利便伏候聖旨宋史寧宗本紀嘉定二年十一月詔浙西監司募飢民修水利蕙田案興工代賑之法起於後代然周宣王之集流民則云百堵皆作臧文仲之述旱備則云修城郭夫非古人已行之事乎且聚數千百飢人仰首而待食于上而於縣官無絲髮之補詎若使之自食其力巧者效其技強者效其勤於小民既覺得所於公家亦為有益尤一舉而兩得也宋時又有募飢民為兵之法亦是量其才力俾得就食于官與此同意觀承案興工代賑官民俱利此法誠善他若增價來米及飢民為兵亦可參用蓋米多則價自平為兵則盜自弭惟在司牧者權其情𫝑輕重而兼行之可也蕙田案以上以工代賑金史章宗本紀明昌三年六月諭戶部可預給百官冬季俸令就倉以時直糶與貧民秋成各以其資糴之其所得必多矣而上下便之其承應人不願者聽明會典成化六年以京城米價騰貴將文武官吏俸糧預支三個月蕙田案以上預支俸米明史食貨志𢎞治五年戶部尚書葉淇言蘇松諸府連歲荒歉民買漕米每石銀二兩而北直𨽻山東河南歲供宣大二邊糧料每石亦銀一兩去歲蘇州兊運已折五十萬石每石銀一兩今請推行于諸府而稍差其直災重者石七錢稍輕者石仍一兩俱解部轉發各邊抵北直𨽻三處歲供之數而收三處本色以輸京倉則費省而事易集從之自後歲災輒權宜折銀以水次倉支運之糧充其數而折價以六七錢為率無復至一兩者蕙田案明會典成化十九年鳯陽等府被災秋糧減免三分其餘七分除存留外起運者照江南折銀則例每石徴銀二錢五分是折銀之例不始于孝宗之世王圻續通考神宗二十九年十一月戶部覆直𨽻巡按何熊祥題蘇松水災異常乞將嘉定縣永折漕糧姑準減折一年毋分正改每石折徴銀五錢以後仍照原題起解被災十分江隂一縣被災九分以上太倉州吳江崑山武進江隂宜興金壇七縣本年漕糧俱準折七分仍徴本色三分被災八分以上長洲吳縣常熟華亭上海青浦無錫丹徒丹陽九縣俱準改折五分仍徴本色五分其改折之數不分正改照例每石折銀五錢連席板耗腳輕齎在內每同本色齊徴其改折項下運軍月糧亦準扣數免編及查靖江縣被災雖止七分以上姑念疲邑準將該年應解南京光祿寺白糧每石折銀八錢四門倉糙米每石折銀六錢與别縣本色一同徴解南京戶部其正徴帶徴金花銀兩等項已經差官守催速令追完解進及南京各衛倉米已經題準改折毋容别議奉旨是蕙田案以上改折漕糧右散利下五禮通考卷二百四十八
