body:
  text: 五禮通考卷十一刑部尚書秦蕙田撰吉禮十一圜丘祀天舊唐書肅宗本紀乾元元年四月甲寅上親享九廟遂有事於圜丘翌日御丹鳳門大赦天下六月己酉初置太乙神壇于圜丘是日命宰相王璵攝行祠事唐書肅宗本紀上元二年九月去上元號稱元年以十一月為歲首月以斗所建辰為名元年建丑月辛亥有事于南郊册府元龜元年建子月詔曰皇王符瑞應協于靈祇典禮廢興式存于禋告頃以三代正朔所尚不同百王徽號無聞異稱顧兹薄德思創常規爰因行慶之日將務惟新之典而建元立制册命厯符受于天地祖宗申于百辟卿士今既循諸古法讓彼虛名革故之宜已宣于臣下昭報之旨未展于郊廟因時備禮擇日陳誠宜取來月一日祭圜丘及太乙壇建丑月辛亥朔拜南郊祭太乙壇禮畢還宮唐書代宗本紀廣德二年二月乙亥有事于南郊圖書集成代宗廣德二年有事南郊從獨孤及議卒以太祖配天舊唐書禮儀志天寶十載五月已前郊祭天地以髙祖神堯皇帝配座寶應元年杜鴻漸為太常卿禮儀使員外郎薛頎歸崇敬等議以神堯為受命之主非始封之君不得為太祖以配天地太祖景皇帝始受封于唐即殷之契周之后稷也請以太祖景皇帝郊祀配天地告請宗廟亦太祖景皇帝酌獻諫議大夫黎幹議以太祖景皇帝非受命之君不合配享天地二年五月幹進議狀為十詰十難曰歸崇敬薛頎等稱禘謂冬至祭天于圜丘周人則以逺祖帝嚳配臣幹詰曰國語曰有虞氏夏后氏俱禘黃帝商人禘舜周人禘嚳俱不言祭昊天于圜丘一也詩商頌曰長發大禘也又不言祭昊天于圜丘二也詩周頌曰雍禘太祖也又不言祭昊天于圜丘三也禮記祭法曰有虞氏夏后氏俱禘黃帝殷人周人俱禘嚳又不言祭昊天于圜丘四也禮記大傳曰不王不禘王者禘其祖之所自出以其祖配之又不言祭昊天于圜丘五也爾雅釋文曰禘大祭也又不言祭昊天于圜丘六也家語云凡四代帝王之所郊皆以配天也其所謂禘者皆五年大祭也又不言祭昊天于圜丘七也盧植云禘祭名禘者帝也事尊明禘故曰禘又不言祭昊天于圜丘八也王肅云禘謂于五年大祭之時又不言祭昊天于圜丘九也郭璞云禘五年之大祭又不言祭昊天于圜丘十也臣幹謂禘是五年宗廟之大祭詩禮經傳文義昭然臣見禮記祭法及禮記大傳商頌長發等三處鄭玄注或稱祭昊天或云祭靈威仰臣精詳典籍更無以禘為祭昊天於圜丘及郊祭天者審如禘是祭之最大則孔子説孝經為萬代百王法稱周公大孝何不言禘祀帝嚳於圜丘以配天而反言郊祀后稷以配天是以五經俱無其説聖人所以不言輕議大典亦何容易猶恐不悟今更作十難其一難曰周頌雍禘祭太祖也鄭玄箋云禘大祭太祖文王也商頌云長發大禘也玄又箋云大禘祭天也夫商周之頌其文互説或云禘太祖或云大禘俱是五年宗廟之大祭詳覽典籍更無異同惟鄭玄箋長發乃稱是郊祭天詳玄之意因此商頌禘如大傳云大祭如春秋大事于太廟爾雅禘大祭雖云大祭亦是宗廟之祭可得便稱祭天乎若如所説大禘即云郊祭天稱禘即是祭宗廟又祭法説虞夏商周禘黃帝與嚳大傳不王不禘禘上俱無大字玄何因復稱祭天乎又長發文亦不歌嚳與感生帝故知長發之禘而非禘嚳及郊祭天明矣殷周五帝之大祭羣經衆史及鴻儒碩學自古立言著論序之詳矣俱無以禘為祭天何棄周孔之法言獨取康成之小注便欲違經非聖誣亂祀典謬哉其二難曰大傳稱禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖者此説王者則當禘其謂祭法虞夏殷周禘黃帝及嚳不王則不禘所當禘其祖之所自出謂虞夏出黃帝殷周出帝嚳以近祖配而祭之自出之祖既無宗廟即是自外至者故同之天地神祇以祖配而祀之自出之説非但於父在母亦然左傳子産云陳則我周之自出此可得稱出於太微五帝乎故曰不王不禘王者禘其祖之所自出以其祖配之謂也及諸侯之禘則降於王者不得祭自出之祖只及太祖而已故曰諸侯及其太祖此之謂也鄭玄錯亂分禘為三注祭法云禘謂祭昊天於圜丘一也注左傳稱郊祭天以后稷配靈威仰箋商頌又稱郊祭天二也注周頌云禘大祭大於四時之祭而小於祫太祖謂文王三也禘是一祭元析之為三顛倒錯亂皆率胸臆曾無典據何足可憑其三難曰虞夏殷周已前禘祖之所自出其義昭然自漢魏晉已還千餘歲其禮遂闕又鄭玄所説其言不經先儒棄之未曾行用愚以為錯亂之義廢棄之注不足以正大典其四難曰所稱今三禮行於代者皆是鄭玄之學請據鄭學以明之曰雖云據鄭學今欲以景皇帝為始祖之廟以配天復與鄭議相乖何者王制云天子七廟玄云此周禮也七廟者太祖及文武之祧與親廟四也殷則六廟契及湯與二昭二穆也據鄭學夏不以鯀及顓頊昌意為始祖昭然可知也而欲引稷契為例其義又異是爰稽邃古洎今無以人臣為始祖者惟殷以契周以稷夫稷契者皆天子元妃之子感神而生昔帝嚳次妃簡狄有娀氏之女吞玄鳥之卵因生契契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封於商故詩曰天命玄鳥降而生商宅殷土芒芒此之謂也后稷者其母有邰氏之女曰薑嫄為帝嚳妃出野履巨迹歆然有孕生稷稷長而勤於稼穡堯聞舉為農師天下得其利有大功舜封於邰號曰后稷唐虞夏之際皆有令德履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比德抑其次也舜授職則播百穀敷五教禹讓功則平水土宅百揆故國語曰聖人之制祀也法施於民則祀之以死勤事則祀之契為司徒而人輯睦稷勤百榖而死皆居前代祀典子孫有天下得不尊而祖之乎其五難曰既尊鄭説小德配寡遂以后稷只配一帝尚不得全配五帝今以景皇帝特配昊天於鄭義可乎其六難曰衆難臣云上帝與五帝一也所引春官祀天旅上帝祀天旅四望旅訓衆則上帝是五帝臣曰不然旅雖訓衆出於爾雅及為祭名春官訓陳注有明文若如所言旅上帝便成五帝則季氏旅於泰山可得便是四鎮耶其七難曰所云據鄭學則景皇帝親盡廟主合祧却欲配祭天地錯亂祖宗夫始祖者經綸草昧體大則天所以正元氣廣大萬物之宗尊以長至陽氣萌動之始日俱祀於南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏性也牲用犢誠也兆於南郊就陽位也至尊至質不敢同於先祖禮也故白虎通曰祭天歲一者何天至尊至質事之不敢褻黷故因歲之陽氣始達而祭之今國家一歲四祭之黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有常聖人制禮君子不以情變易國家重光纍聖歷祀百數豈不知景皇帝始封于唐當時通儒議功度德尊神堯克配彼天崇太宗以配上帝神有定主為日已久今欲黜神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父豈禮意乎非止神祇錯位亦以祖宗乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之德格于皇天上帝臣以為郊祀宗祀無以加焉其八難曰欲以景皇帝為始祖既非造我區宇經綸草昧之主故非夏始祖禹殷始祖契周始祖稷漢始祖髙帝魏始祖武皇帝晉始祖宣帝國家始祖神堯皇帝同功比德而忽升于宗祀圜丘之上為昊天匹曾謂圜丘不如林放乎其九難曰昨所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者夫孟德仲達者皆人傑也擁天下之強兵挾漢魏之微主專制海內令行草偃服衮冕陳軒懸天子決事於私第公卿列拜於道左名雖為臣勢實凌君後主因之而業帝前王由之而禪代子孫尊而祖之不亦可乎其十難曰所引商周魏晉既不當矣則景皇帝不為始祖明矣我神堯拔出羣雄之中廓清隋室拯生人于塗炭則夏虞之勳不足多成帝業於數年之間則漢祖之功不足比夏以大禹為始祖漢以髙帝為始祖則我唐以神堯為始祖法夏則漢於義何嫌今欲革皇天之祀易太祖之廟事之大者莫大於斯曾無按據一何寡陋不愧于心不畏于天乎以前奉詔令諸司各據禮經定議者臣幹忝竊朝列官以諫為名以直見知以學見達不敢不罄竭以裨萬一昨十四日具以議狀呈宰相宰相令朝臣與臣論難所難臣者以臣所見獨異莫不騰辭飛辨競欲碎臣理鉗臣口剖析毫釐分別異同序墳典之凝滯指子傳之乖謬事皆歸根觸物不礙但臣言有宗爾豈辨者之流也又歸崇敬薛頎等援引鄭學欲蕪祀典臣為明辨迷而不復臣輒作十詰十難援據墳籍昭然可知庶郊禘事得其真嚴配不失其序皇靈降祉天下蒙賴臣亦何顧不蹈鼎鑊謹敢聞達伏增悚越議奏不報蕙田案黎幹議非受命之君不得為太祖自是三代以後可行之禮其辨禘非祭天援引發揮極為明確至答第六難旅上帝是祭五帝云若如所言季氏旅于泰山可便得是四鎮耶答第七難云歲一祭天尤見千古卓識惜時不用觀承案禮諸侯不得祖天子故商周俱以契稷為太祖而不祖帝嚳則始祖不必其為受命之王也黎幹謂景皇非受命之君不得為太祖者於理未安韓子曰國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷而以髙祖擬文王太宗擬武王此定論也況重以髙祖己有定制乎禘郊宗祖雖兼論功德然實重水源木本之義商周之契稷為始祖固是功德兼隆亦以其為始封之君也禮以時為大三代而下始祖不必皆如契稷之賢聖然天下豈有無根之木無源之水而謂創業之君可自為始祖此上不必有太祖乎朱子曰祖一名而有二廟稷為太祖始封之祖也文王亦為祖受命之祖也唐人正當準此而以景皇為始封之祖髙祖為受命之祖耳幹之餘議頗明辨此條則不可據其謂以髙祖配郊以太宗配明堂則禮以義起尚似可通蓋商人禘嚳固以始祖契配及郊則又配冥而不以契與周之禘郊皆配稷者不同此則三王不相襲禮而法周亦不妨監殷者夫二年春夏旱言事者云太祖景皇帝追封於唐髙祖實受命之祖百神受職合依髙祖今不得配享天地所以神不降福以致愆陽代宗疑之詔百寮會議太常博士獨孤及獻議曰禮王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖已下六廟則以親盡迭毁而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命于神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊冥而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝唯漢氏崛起豐沛豐公太公無位無功不可以為祖宗故漢以髙皇帝為太祖其先細微也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇啓王業建封于唐髙祖因之以為有天下之號天所命也亦如契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊祀太祖宗祀髙祖猶周之祖文王而宗武王也今若以髙祖創業當躋其祀是棄三代之令典尊漢氏之末制黜景皇帝之大業同豐公太公之不祀反古違道失孰大焉夫追尊景皇廟號太祖髙祖太宗所以崇尊之禮也若配天之位既異則太祖之號宜廢祀之不修廟亦當毀尊祖報本之道其墜於地乎漢制擅議宗廟以大不敬論今武德貞觀憲章未改國家方將敬祀事和神人禘郊之間恐非所宜臣謹稽禮文參諸往制請仍舊典竟依歸崇敬等議以太祖配享天地代宗紀廣德二年二月癸酉上親薦獻太清宮乙亥祀昊天上帝于圜丘即日還宮禮儀志廣德二年正月十六日禮儀使杜鴻漸奏郊太廟大禮其祝文自今已後請依唐禮板上墨書其玉簡金字者一切停廢如允臣所奏望編為常式敕曰宜行用竹簡通典永泰二年禮儀使太常卿杜鴻漸奏冬至祀昊天上帝夏至祀皇地祇請以太祖景皇帝配饗孟春祈榖祀昊天上帝孟冬祀神州請以髙祖配饗孟夏雩祀昊天上帝請以太宗配饗季秋大享明堂祀昊天上帝請以肅宗配饗臣與禮官學士憑據經文事皆明著德音詳定久未施行敕旨依册府元龜大厯五年冬十一月庚寅日長至命有司祀昊天上帝于南郊七年冬十一月辛卯日長至命有司祀昊天上帝于南郊不視朝八年冬十一月辛丑日長至不視朝命有司祀昊天上帝于南郊十一年冬十一月丙辰日長至命有司祀昊天上帝于南郊不受朝賀十三年冬十一月丁卯日長至命有司祀昊天上帝于南郊不視朝舊唐書代宗本紀大厯十三年十一月丁卯日長至有司祀昊天上帝于南郊上不視朝故也蕙田案自廣德二年至此中隔十三年不舉郊祭册府元龜紀有司行事者五而舊書但載此年蓋以明其有疾不視之故祀既不親故毋庸黷載也德宗本紀貞元元年十一月癸卯上親祀昊天上帝于圜丘時河中渾瑊澤潞李抱真山南嚴震同華駱元光邠寧韓遊瓌鄜坊唐朝臣奉誠康日知等大將侍祠郊壇畢還宮御丹鳳樓大赦天下崔縱傳貞元元年天子郊見為大禮使歲旱用屈縱撙裁文物儉而不陋禮儀志貞元元年十一月十一日德宗親祀南郊有司進圖敕付禮官詳酌博士栁冕奏曰開元定禮垂之不刋天寶改作起自權制此皆方士謬妄之説非禮典之文請一準開元禮從之蕙田案五禮條目儀節至唐貞觀禮漸復于古逮開元禮成郊祀之典尤善乃不久而天寶自為壞之栁冕之奏允愜人心矣德宗本紀六年九月己卯詔十一月八日有事于南郊太廟行從官吏將士等一切並令自備食物其諸司先無公厨者以本司闕職物充其王府官度支量給廩物其儀仗禮物並仰御史撙節處分十月己亥文武百寮京城道俗抗表請上徽號上曰朕以春夏亢旱粟麥不登朕精誠祈禱獲降甘雨既致豐穰告謝郊廟朕倘因禋祀而受徽號是有為為之勿煩固請也十一月庚午日南至上親祀昊天上帝于郊丘禮畢還宮御丹鳳樓宣赦見禁囚徒減罪一等立仗將士及諸軍兵賜十八萬段匹禮儀志貞元六年十一月八日有事于南郊詔以皇太子為亞獻親王為終獻上問禮官亞獻終獻合受誓戒否吏部郎中栁冕曰準開元禮獻官前七日於內受誓戒辭云各揚其職不供其事國有常刑今以皇太子為亞獻請改舊辭云各揚其職肅奉常儀從之唐書德宗本紀貞元九年十一月乙酉有事于南郊大赦册府元龜貞元九年十一月癸未帝朝獻太清宮畢事宿齋于太廟行宮甲申朝于太廟畢事齋于南郊行宮乙酉日南至帝郊祀初帝以是歲有年蠻夷朝貢思親告郊廟于祀事尤重慎及將散齋謂宰臣曰在祀散齋歸正寢攝心奉祀不可聞外事其常務勿奏乃齋于別殿及命皇太子諸王行祭者皆受誓一日命妃媵辭于別所故事祈壇宮廟內及殿庭帝步武所及皆設黃道褥壇十一位又施赤黃褥將有事皆命徹之又故事設御史版位于郊廟或藉以褥及是虔禋拜首于地有司奉祠者莫不惕勵通典貞元十三年敕郊壇時祭燔柴瘞埋並依天寶十三年制自今以後攝祭南郊太尉行事前一日于致齋所具羽儀鹵簿公服引入親受祝版乃赴親齋所唐書韋武傳是時帝以反正告郊廟大兵後典章苟完執事者時時咨武武酌宜約用得禮之衷羣司奉焉李紓傳奉詔為郊廟樂章論撰甚多蕙田案傳文在德宗時而樂志絶無其辭意志中云不知所起者或製于開元以下歟文獻通考長慶三年太常禮院奏郊壇祠祀遇大雨雪廢祭其禮物條件如後御署祝版既未行祭禮無焚毀之文請于太常寺敕庫收貯而其小祀雖非御署準此玉幣燎柴神酒燎幣醴齊並榛栗脯醢及應行事燭等請令郊社署各牒充次祭支用牲牛參牲既未行祭禮無進胙賜胙之文請比附禮記及祠令牲死則埋之例委監祭使及禮官于祠所瘞埋其小祀不全用牢牲舊例用豬羊肉亦準此粢盛瓜葅笋葅應己造成饌物請隨牲瘞埋行事官明衣絹布等準式既祭前給訖合充潔服既已經用請便收破公卿已下明房油暖幕炭應齊宿日所破用物請收破旨依永為定式舊唐書敬宗本紀寶歷元年正月乙己朔辛亥親祀昊天上帝于南郊禮畢御丹鳳樓大赦改元唐書文宗本紀太和三年十一月甲午有事南郊大赦崔寧傳子黯開成初為監察御史奏郊廟祭事不虔文宗語宰相曰郊廟之禮朕當親之但千乘萬騎國用不給故使有司侍祠然是日朕正衣冠坐以俟旦今聞主者不虔祭器敝惡豈朕事神蠲潔意耶公宜敕有司道朕斯意黯乃具條以聞舊唐書王播傳弟起太和九年判太常卿充禮儀詳定使創造禮神九玉奏議曰邦國之禮祀為大事圭璧之議經有前規謹按周禮以蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方黑璜禮北方又云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月星辰凡此九器皆祀神之玉也又云以禋祀祀昊天上帝鄭元云禋煙也為玉幣祭訖燔之而升煙以報陽也今與開元禮義同此則焚玉之驗也又周禮掌國之玉鎮大寶器若大祭既事而藏之此則收玉之證也梁代崔靈恩撰三禮義宗云凡祭天神各有二玉一以禮神一則燔之禮神者訖事却收祀神者與牲俱燎則靈恩之義合于禮經今國家郊天祀地祀神之玉常用守經據古禮神之玉則無臣等請下有司精求良玉創造蒼璧黃琮等九器祭訖則藏之其燎玉即依常制從之武宗本紀會昌元年正月辛巳有事于郊廟禮畢御丹鳳樓大赦改元五年正月辛亥有事于郊廟禮畢御承天門大赦天下舊唐書武宗本紀會昌四年十二月敕郊禮日近獄囚數多案款已成多有翻覆其兩京天下州府見繫獄囚己結正及兩度翻案伏款者並令先事結斷訖申唐書宣宗本紀大中元年正月甲寅皇帝有事于郊廟禮畢御丹鳳門大赦改元蕙田案新書作甲寅舊書作戊申據舊書云此月戊戌朔則十一為戊申通考作十七日與甲寅合不知孰是舊唐書宣宗本紀大中五年敕兩京天下州府起大中五年正月一日已後三年內不得殺牛如郊廟享祀合用者即與諸畜代蕙田案牛本不應妄殺而獨此三年何耶計此三年中亦未嘗一舉郊廟之祭則代牛之制亦不知其以何畜也舊唐書懿宗本紀咸通元年十一月丁未上有事于郊廟禮畢御丹鳳門大赦改元四年正月庚午上有事于圜丘禮畢御丹鳳樓大赦唐書昭宗本紀龍紀元年十一月丁未朝獻于太清宮戊申朝享于太廟己酉有事于南郊大赦舊唐書昭宗本紀龍紀元年十一月己丑朔將有事于圜丘辛亥上宿齋于武德殿宰相百寮朝服于位時兩軍中尉楊復恭及兩樞密皆朝服侍上太常博士錢珝李綽等奏論之曰皇帝赴齋宮內臣皆服朝服臣檢國朝故事及近代禮令並無內官朝服助祭之文伏惟皇帝陛下承天御厯聖祚中興祗見宗祧克承大禮皆稟髙祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彛憲禮院先準大禮使牒稱得內侍省牒要知內臣朝服品秩禮院己準禮令報訖今參詳近朝事例若內官及諸衛將軍必須製冠服即各依所兼正官隨資品依令式服本官之服事存傳聽且可俯從然亦不分明著在禮令乞聖慈允臣所奏狀入至晚不報錢珝又進狀曰臣今日己時進狀論內官冠服制度未奉聖旨伏以陛下虔事郊禋式遵彛範凡關典禮必守憲章今陛下行先王之大禮而內臣遂服先王之法服來日朝獻大聖祖臣贊導皇帝行事若侍臣服章有違制度是為非禮上瀆祖宗臣期不奉敕臣謬當聖代叨備禮官獲正朝儀死且不朽脂膏泥滓是所甘心狀入降朱書御札曰卿等所論至當事可從權勿以小瑕遂妨大禮于是內四臣遂以法服侍祠甲寅圜丘禮畢御承天門大赦唐書殷侑傳孫盈孫為太常博士龍紀元年昭宗郊祀兩中尉及樞密皆以宰相服侍上盈孫奏言先代令典無內官朝服侍祠必欲之當隨所攝資品雖無援據猶免僭逼詔可舊唐書孔緯傳十一月昭宗謁郊廟兩中尉內樞密請朝服緯奏曰中貴不衣朝服助祭國典也陛下欲以權道寵內臣則請依所兼之官而為之服天子召諌官謂之曰大禮日近無宜立異為朕容之于是內官以朝服助祭唐書哀帝本紀天祐二年七月卜郊九月乙酉改卜郊十一月庚午三卜郊舊唐書哀帝本紀天祐二年五月庚午敕所司定今年十月九日有事郊丘其修製禮衣祭服宜令宰臣栁璨判祭器宜令張文蔚楊涉分判儀仗車輅宜令太常卿張廷範判六月辛卯太微宮使栁璨奏前使裴樞充宮使日權奏請玄元觀為太清宮又別奏在京𢎞道觀為太清宮至今未有制置伏以今年十月九日陛下親事南禋先謁聖祖廟𢎞道觀既未修葺玄元觀又在北山若車駕出城禮非便穩今欲只留北山上老君廟一所其玄元觀請拆入都城于清化坊內建置太微宮以備車駕行事從之丙午全忠奏得宰相栁璨記事欲拆北邙山下玄元觀移入都內于清化坊取舊昭明寺基建置太微宮準備十月九日南郊行事緣延資庫鹽鐵並無物力令臣商量者臣已牒判六軍諸衛張全義指揮工作訖優詔嘉之九月乙酉敕先擇十月九日有事郊丘備物之間有所未辦宜改用十一月十九日十一月丙辰全忠自正陽渡淮而北至汝隂全忠深悔此行無益丁卯至大梁時哀帝以此月十九日親祠圜丘中外百司禮儀法物己備戊辰宰相已下于南郊壇習儀而裴迪自大梁回言全忠怒蔣元暉張廷範栁璨等謀延唐祚而欲郊天改元元暉栁璨大懼庚午敕曰先定此月十九日親禮南郊雖定吉辰改卜亦有故事宜改取來年正月上辛付所司十二月庚戌敕朕以謬荷丕圖禮合親謁郊廟先定來年正月上辛用事今以宮闈內亂播于醜聲難以慙恧之容入于祖宗之廟其明年上辛親謁郊廟宜停五代史梁本紀天子卜祀天于南郊王怒以為蔣元暉等欲祈天以延唐天子懼改卜郊十二月王遣人告樞密使蔣元暉與何太后私通殺元暉而焚之遂弒太后于積善宮天子下詔以太后故停郊孔循傳循與蔣元暉有隙哀帝即位將有事于南郊循與王殷即蔣殷冒王氏讒于太祖曰元暉私侍何太后與張廷範等奉天子郊天冀延唐祚太祖大怒時梁兵攻夀春敗歸帝遣裴迪勞軍太祖見迪怒甚迪還哀帝不敢郊蔣殷傳哀帝方卜郊殷與蔣元暉有隙因譖之太祖言元暉等教天子卜郊祈天且待諸侯助祭者以謀興復太祖大怒哀帝為改卜郊蕙田案讀舊唐書五代史所載則新唐書罷郊之原委曲折瞭然矣右唐郊禮五代史梁本紀太祖開平二年正月己亥卜郊于西都文獻通考梁太祖開平二年十一月自東京赴洛都行郊天禮自石橋備儀仗至郊壇册府元龜二年正月宰臣上表請郊天謁廟命有司擇日備儀因先布告嶽牧方伯于是太常禮院選用四月二十四日有事于南郊壬寅應郊祀大禮儀仗車輅鹵簿法物祭器樂懸各令所司修飾以河南尹張宗奭充都點集諸司法物使三月帝以魏博真定助修西都宮內工役方興禮容未備其郊天謁廟宜于秋冬別選良日七月詔曰祀典之禮有國之大事也如聞官吏慢于展敬禮容牲饌有異精虔宜令御史疏其條件以聞詳定禮儀使奏得太常禮院狀選用今年十一月己丑冬至有事于南郊敕令于來年正月內選日禮院奏選來年正月二十四日辛卯親祭南郊可之詔以左千牛衛上將軍胡規充南郊儀仗使金吾衛將軍趙麓充車輅法物使是月冬至命宰臣祀昊天上帝于圜丘蕙田案史但言卜而不言郊據通考則似十一月郊而總數梁郊處此又不列蓋是十一月赴洛而明年正月始郊也通考下文云以張宗奭為大禮使故事皆以宰相為之則本是攝祭而非親奉觀元龜紀事始曉然矣五代史梁本紀三年正月辛卯有事于南郊大赦文獻通考三年正月以河南尹張宗奭為南郊大禮使故事皆以宰相為之今用河南尹充非常例也册府元龜開平三年正月乙酉詔曰初宅雒都將行郊祀應嶽瀆名山大川及諸州有靈迹封崇聖祠各宜差官吏精虔祭告是月禮儀使奏請皇帝宿齋三日庚寅親饗太祖辛卯親祀昊天上帝于圜丘是日降雪盈尺及升壇而止册府元龜開平四年九月丁亥朔車駕幸陜府命宰臣于競赴西都祀昊天上帝于圜丘五代史梁本紀末帝貞明三年冬十二月己巳如西都卜郊四年正月不克郊己卯至自西都梁家人傳將册妃張氏為后妃請待帝郊天而帝卒不得郊趙犨傳是時梁將劉鄩等與莊宗相拒澶魏間兵數敗巖犨子曰古之王者必郊祀天地陛下即位猶未郊天議者以為朝廷無異藩鎮如此何以威重天下今河北雖失天下幸安願陛下力行之敬翔以為不可曰今府庫虛竭箕斂供軍若行郊禋則必賞賚是取虛名而受實弊也末帝不聽乃備法駕幸西京而莊宗取楊劉或傳晉兵入東都矣或曰扼汜水矣或曰下鄆濮矣京師大風拔木末帝大懼從官相顧而泣乃還東都遂不果郊蕙田案趙犨傳文詳述不郊之故與本紀互相足也朱溫忌昭宣之郊而脅之使罷及其暗姦大位僅周一紀而卜郊不果恰相對照天道好還可畏哉唐本紀莊宗同光二年二月己巳朔有事于南郊大赦張全義傳初梁末帝幸洛陽將祀天于南郊而不果其儀仗法物猶在全義因請幸洛陽曰南郊儀物已具莊宗大恱加拜太師尚書令明年十一月幸洛陽而禮物不具因改用來年二月然不以前語責全義張憲傳莊宗幸東都定州王都來朝莊宗命憲治鞠場與都擊鞠初莊宗建號東都以鞠場為即位壇于是憲言即位壇王者所以興也漢鄗南魏繁陽至今尚在不可毀乃別治鞠場未成莊宗怒命兩虞候亟毀壇以為場憲歎曰此不祥之兆也蕙田案五代史文未有言告天即位者然憲以鄗南繁陽為比則知亦有告天史文略耳唐本紀明宗長興元年二月乙卯有事于南郊大赦改元李愚傳明宗祀天南郊愚為宰相馮道趙鳳草加恩制道鄙其詞罷為太常卿蕙田案五代衰亂如此而一舉郊祀必推恩賚此宋世所以憚行而歸于合祭或終于廢祭蓋相承舊習所從來逺而不知其適為敗禮之根原也遼史太宗本紀會同三年七月晉遣使請行南郊禮許之四年三月晉以許祀南郊遣使來謝進黃金十鎰蕙田案敬瑭之立在天顯十一年至是當為六年請之未行至明年而殂矣故晉紀無郊天事册府元龜周太祖廣順三年十月戊申內出御札曰王者應運開基子民育物罔不承天事地尊祖敬宗燔柴于泰壇用昭乾德瘞玉于方澤以答坤靈朕受命上元宅心下土時己歷于三載漸至小康禮未展于二儀深虧大典宜叶蓍龜式陳籩豆庶展吉蠲之禮用傾昭事之忱朕以來年正月一日於東京有事于南郊宜令所司各備儀注務從省約無致煩勞凡有供需並用官物府縣不得因便差配諸道州府不得以進奉南郊為名輒有率斂庶禆嚴靜以奉郊禋中外臣僚當體豫意文獻通考廣順三年九月太常禮院奏準敕定郊廟制度洛陽郊壇在城南七里丙巳之地圜丘四成各髙八尺一寸下廣二十丈再成廣十五丈三成廣十丈四成廣五丈十有二陛每節十二等燎壇在泰壇之丙地方一丈髙一丈二尺開上南出户方六尺請下所司修奉從之時周太祖將拜南郊故修奉之五代史周本紀太祖顯德元年正月丙子朔有事于南郊大赦改元吳楊行密世家隆演卒乃立溥明年二月改元順義赦境內冬十一月祀天于南郊南唐徐知誥世家升元三年四月忭郊祀上帝于圜丘宋史南唐世家忭立七年卒景襲位改元保大郊祀天地五代史前蜀王建世家武成元年正月祀天南郊大赦改元宋史西蜀世家漢祖起并門中土蝗旱連歲昶益自大行郊祀禮五代史南漢劉隱世家大寶二年鋹祀天南郊宋史南漢世家劉隱卒弟陟襲位僭帝號國稱大漢改元乾亨行郊祀禮蕙田案五代十國瓜剖豆分誰當正統要以郊祀重巨真人未出則餘分閏位不容盡廢故總附唐末不復加區別云右五代郊禮五禮通考卷十一
