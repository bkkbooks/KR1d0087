手洗爵訖禮直官引太尉詣太稷壇升自北陛並如太社后土之儀樂曲同訖禮直官引太尉還本位亞終獻盥洗升獻並如太社之儀禮直官引終獻降復位樂止太祝各進徹豆樂作應鍾宫娛寧之曲還尊所樂止徹者籩豆各一少移於故處奉禮曰賜胙贊者曰衆官再拜在位者皆再拜禮直官進太尉之右請就望瘞位御史博士從南向立於衆官將拜之前太祝執篚進於神座前取玉幣齋郎以俎載牲體稷黍飯爵酒體謂牲之左髀各由其陛降壇以玉幣饌物置於坎訖奉禮曰可瘞坎東西各二人置土半坎訖禮直官進太尉之左曰禮畢遂引太尉出祭官以下以次出禮直官引御史博士以下俱復執事位立定奉禮曰再拜御史以下皆再拜訖出工人以次出祝版燔於齋坊光祿卿以胙奉進御史就位展視光祿卿望闕再拜乃退其州縣祭享一遵唐宋舊儀石琚傳大定十年二月祭社有司奏請御署祝版上問琚曰當署乎琚曰故事有之上曰祭祀典禮卿等慎之無使後世譏誚熙宗尊諡太祖宇文虛中定禮儀以常朝服行事當時朕雖童稚猶覺其非琚曰祭祀大事也非故事不敢行章宗本紀明昌四年始以春秋二仲月上戊日祭社稷五年正月甲戌祭社稷以宣獻皇后忌辰用熙寧祀儀樂懸而不作宣宗本紀貞祐四年二月甲辰命禮部尚書張行信提控修奉社稷三月己巳以將修社稷遣太子少保張行信預告冬十月丁卯以奉安社稷遣官預告戊辰命張行信攝太尉奉安社稷禮樂咸殺其數興定二年秋七月己卯遣官祭太社太稷右金社稷元史世祖本紀至元七年十二月詔嵗祀太社太稷十一年八月甲辰朔頒諸路立社稷壝儀式十六年三月甲戌中書省下太常寺講究州郡社稷制度禮官折衷前代參酌儀禮定擬祭祀儀式及壇壝祭器制度圖寫成書名曰至元州縣社稷通禮上之二十年二月戊子定以春秋仲月上戊日祭社稷二十九年秋七月壬申建社稷和義門內壇各方五丈髙五尺白石為主飾以五方色土壇南植松一株北墉瘞坎壝垣悉倣古制别為齋廬門廡三十三楹蕙田案古者立社樹以土之所宜木為依神也神無依不止樹有生意又土之所生其氣相得恐木不盛不足以久故必以所宜木聖人之意微矣後世依鄭注易以石主殊為弗類元社壇植松一株猶得古之遺意似可法也祭祀志至元七年十二月有詔嵗祀太社太稷三十年正月始用御史中丞崔彧言于和義門內少南得地四十畝為壝垣近南為二壇壇髙五尺方廣如之社東稷西相去約五丈社壇土用青赤白黑四色依方位築之中間實以常土上以黃土覆之築必堅實依方面以五色泥飾之四面當中各設一陛道其廣一丈亦各依方色稷壇一如社壇之制惟土不用五色其上四周純用一色黃土壇皆北向立北墉于社壇之北以㙛為之飾以黃泥瘞坎二于稷壇之北少西深足容物二壇周圍壝垣以磚為之髙五丈廣三十丈四隅連飾內壝垣櫺星門四所外垣櫺星門二所每所門三列戟二十有四外壝內北垣下屋七間南望二壇以備風雨曰望祀堂堂東屋五間連厦三間曰齊班廳廳之南西向屋八間曰獻官幕又南西向屋三間曰院官齋所又其南屋十間自北而南曰祠祭局曰儀鸞庫曰法物庫曰都監庫曰雅樂庫又其南北向屋三間曰百官厨外垣南門西壝垣西南北向屋三間曰大樂署其西東向屋三間曰樂工房又其北北向屋一間曰饌幕殿又北南向屋三間曰饌幕又北稍東南向門一間院內南南向屋三間曰神厨東向屋二間曰酒庫近北少却東向屋三間曰犧牲房井有亭望祀堂後自西而東南向屋九間曰執事齋郎房自北折而南西向屋九間曰監祭執事房此壇壝次舍之所也社主用白石長五尺廣二尺剡其上如鍾于社壇近南北向埋其半于土中稷不用主后土氏配社后稷氏配稷神位版二用栗素質黑書社樹以松于社稷二壇之南各一株此作主樹木之法也祝版四以楸木為之各長二尺四寸濶一尺二寸厚一分文曰維年月日嗣天子敬遣某官某敢昭告于太社之神配位曰后土之神稷曰太稷之神配位曰后稷之神玉幣社稷皆黝圭一繅藉瘞玉一以黝石代之玄幣一配位皆玄幣一各長一丈八尺此祝文玉幣之式也牛一其色黝其角握有副羊四野豕四籩之實皆十無糗餌粉餈豆之實亦十無􅓞食糝食簠簋之實皆四鉶之實和羮五齊皆以尚醖代之香用沈龍涎神席一緣以黑綾黑綾褥方七尺四寸太尊著尊犧尊山罍各二有坫加勺羃象尊壺尊山罍各二有坫羃設而不酌籩豆各十有一其一設於饌幕鉶三簠三簋三其一設於饌幕俎八其二設於饌幕盤一毛血豆一爵一有坫沙池一玉幣篚一木柶一勺一香鼎一香盒一香案一祝案一皆有衣紅髹器一以盛馬湩盥洗位二罍二洗二白羅巾四實以篚朱漆盤五已上社稷皆同配食有象尊無太尊設而不酌者無象尊餘皆與正位同此牲齊祭器之等也饌幕省饌殿香殿黃羅幕三黃羅額四黃絹帷一百九十五幅獻攝版位三十有五紫綾拜褥百蒲葦席各二百木燈籠四十絳羅燈衣百一十紅挑燈十剪燭刀二鐵籸盆三十有架黃燭二百雜用燭二百麻籸三百松明清油各百斤此饌幕版位燭燎之用也初獻官一亞獻官一終獻官一攝司徒一助奠官二太常卿一光祿卿一廪犧令一太官令一巾篚官四祝史四監祭御史二監禮博士二司天監二良醖令一奉爵官一司尊罍二盥洗官二爵洗官二太社令一太社丞一太樂令一太樂丞一協律郎二奉禮郎二讀祝官一舉祝官二奉幣官四剪燭官二太祝七齋郎四十有八贊者一禮直官三與祭官無定員此獻攝執事之人也凡祭之日以春秋二仲月上戊成宗本紀至元三十一年成宗即位八月戊子初祀社稷用堂上樂祭祀志元貞二年冬復下太常議置壇于城西南二壇方廣視太社太稷殺其半壺尊