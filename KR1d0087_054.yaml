body:
  text: 五禮通考卷四十四刑部尚書秦蕙田撰吉禮四十四社稷宋史禮志社稷自京師至州縣皆有其祀嵗以春秋二仲月及臘日祭太社太稷州縣則春秋二祭刺史縣令初獻上佐縣丞亞獻州博士縣簿尉終獻如有故以次官攝若長吏職官或少即許通攝或别差官代之牲用少牢禮行三獻致齋三日其禮器數正配坐尊各二籩豆各八簠簋各二俎三從祀籩豆各二簠簋俎各一太社壇廣五丈髙五尺五色土為之稷壇在西如其制社以石為主形如鍾長五尺方二尺剡其上培其下半四面宫垣飾以方色面各一屋三門每門二十四戟四隅連飾罘罳如廟之制中植以槐其壇三分宫之一在南無屋又大祀春秋二仲及臘日祭太社太稷州縣祭社稷如小祀太宗淳化三年十二月將郊常奏告外又告太社太稷真宗本紀咸平二月八月戊午社宴近臣於中書四年八月戊辰社宴宰相於中書文獻通考景德四年户部員外郎判太常禮院言天下祭社稷釋奠長吏多不親行事及闕三獻之禮甚非為民祈福尊師設教之意望令禮官申明舊典詔付有司宋史禮志慶歷三年定報社稷兩圭有邸祈不用玉慶歷三年定社稷牲牢籩豆之數慶歷祭社稷用羊豕各二正配位籩豆十二山罍簠簋俎二祈報象尊一仁宗本紀至和元年四月甲午朔日有食之用牲於社嘉祐四年正月丙申朔日有食之用牲於社禮志治平四年十二月詔以來嵗正旦日食命翰林學士承旨王圭祭社元豐三年詳定所言社稷祝版牲幣饌物請並瘞於坎更不設燔燎又周禮大宗伯以血祭祭社稷社為隂祀血者幽隂之物是以類求神之意郊天先薦血次薦腥次薦爓次薦熟社稷五祀先薦爓先薦熟至于羣小祀薦熟而已今社稷不用血祭又不薦爓皆違經禮請以埋血為始先薦爓次薦熟古者祭社君南向於北牖下所以答隂也今社稷壝內不設北牖而有司攝事乃設東向之位非是請設北牖以備親祀南向答隂之位有司攝事則立北牖下少西王制曰天子社稷皆太牢諸侯社稷皆少牢今一用少牢殊不應禮夫為一郡邑報功者當用少牢為天下報功者當用太牢所有春秋祈報太社太稷請于羊豕外加角握二牛又言社稷之祭有瘞玉而無禮玉開元禮奠太社太稷並以兩圭有邸請下有司造兩圭有邸二以為禮神之器仍詔于壇側建齋廳三楹以備望祭先是州縣社主不以石禮部以為社稷不屋而壇當受霜露風雨以達天地之氣故用石主取其堅久又禮諸侯之壇半天子之制請令州縣社主用石尺寸廣長亦半太社之制遂下太常修入祀儀蕙田案此議有合禮處六年詳定禮文所言太社太稷皆瘞牲之左髀以報隂文獻通考元豐七年詔諸州社稷于壇側建齋廳三楹以備望祭宋史禮志元祐中又從博士孫諤言祭太社太稷皆設登歌樂元符三年四月朔太陽虧遣官告太社徽宗本紀崇寧二年九月甲辰詔郡縣謹祀社稷禮志大觀議禮局言太社獻官太祝奉禮皆以法服至於郡邑則用常服請下祭服制度于郡縣俾其自製敝則聽敕造之文獻通考徽宗政和三年儀禮局上五禮新儀太社太稷壇四門同一壝二十五步壇飾各隨方色燾以黃土政和五年知歙州歙縣盧知原言社稷之祭郡邑以長吏及以次官充三獻官著于甲令比來州郡多委曹掾攝事請申嚴有司應奉祀官非實有疾故不得輒委他官行禮從之宋史髙宗本紀紹興元年二月壬申初定嵗祀天地社稷如奏告之禮禮志紹興元年以春秋二仲及臘前祭太社太稷于天慶觀又望祭于臨安天寧觀髙宗本紀紹興七年秋七月乙酉詔即建康權正社稷之位文獻通考紹興八年改祀于惠照齋宫以言者謂用血祭始用羊豕皆四籩豆皆十有二備三獻如祀天地之儀徙齋宫之櫺星門于南除其地以設牲器蕙田案祀社稷如祀天地之儀過矣宋史髙宗本紀紹興十三年正月甲子製郊廟社稷祭器三月乙巳建社稷壇禮志始築壇壝于觀橋之東立大主置太社令一員備牲宰器幣進熟望燎如儀文獻通考孝宗淳熙四年命臨安守臣立望祭社稷殿及庖室齋廬儀視神州惟設太社太稷位于壇之南方北向后土氏勾芒氏后稷氏位于其西東向祀社稷儀注陳設前祀二日本司修除壇之內外設祀官次于壇西門之外道北南向祀日掌事者設神位版于壇上席以莞執尊罍者設祭器掌饌者實之正配每位籩八在神位前左重三行豆八在神位前右重三行俎二在籩豆外分左右槃一在籩豆之間簠簋各一在二俎之間設尊二于壇上西北隅配位之尊在西俱南向西上尊置于坫加以勺羃設洗二各于子陛之西南向社稷各一罍在洗西加勺羃篚在洗東北肆置巾爵設三獻位于壇西北祝位二又于其西俱道北南向東上又設祝位于稷壇上東向南上設初獻飲福位于稷壇上神座之東北南向設望瘞位于瘞塪之南北向東上開瘞塪各于壇之北壬地方深取足容物南出陛置香爐合并燭于神座之前幣置篚陳于左祝版置坫陳于右行禮祀日質明諸祀官各服其服贊禮者引三獻官以下入就位立贊禮者少前初獻之左贊請行事執事者瘞血贊唱者曰拜獻官以下皆再拜訖祝詣社壇升自酉陛就位東向立俟初獻將詣罍洗祝詣社壇跪取幣于篚興立于社神座左贊禮者引初獻詣社壇罍洗北南向執罍者酌水初獻搢笏盥手執篚者取巾于篚授初獻帨手訖即受巾奠于篚初獻執笏升自子陛詣社神座前南向搢笏跪三上香祝以幣東向跪授初獻訖興詣配位前南向立初獻受幣奠于社神座前執笏俯伏興再拜訖引初獻詣后土神座前西向如上儀訖祝次詣稷神座前東向立初獻降壇詣稷壇罍洗升獻並如社壇之儀訖降還位祝復位立少頃引初獻再詣社壇罍洗南向執罍者酌水初獻搢笏盥手帨手訖又取爵以授初獻執罍者酌水初獻洗爵又授巾初獻拭爵訖巾奠于篚初獻執笏升自子陛執事者引初獻詣社神酒尊所舉羃酌酒于爵初獻詣社神座前南向搢笏跪執爵三祭酒奠爵執笏俯伏興少退南向立初獻將詣罍洗祝詣社壇持版于社神座之右西面跪讀祝訖初獻再拜祝奠版于神座右坫興次詣配位前北向立執事者引初獻詣配位酒尊所舉羃酌酒于爵初獻詣后土氏神座前西向跪執爵三祭酒奠爵初獻執笏俯伏興少退西向立祝持版于后土神座之右北面跪讀祝畢初獻再拜祝奠版于神座右坫興詣稷神座前西向立初獻降壇詣稷壇罍洗盥帨洗爵訖升自子陛執事者詣稷神酒尊所舉冪酌酒于爵初獻詣稷神座前南向搢笏跪執爵三祭酒奠爵執笏俯伏興少退南向立祝持版于稷神之右西面跪讀祝畢初獻再拜祝奠版于神座右坫興次詣配位前北向立執事者引初獻詣配位酒尊所舉羃酌酒于爵初獻詣后稷氏神座前西向跪執爵三祭酒奠爵執笏俯伏興少退西向立祝持版于后稷神座之右北面跪讀祝畢初獻再拜祝奠版于神座右坫興初獻降復位次引亞獻詣社壇罍洗北南向搢笏盥手帨手洗爵執笏升自酉陛詣社神座前南向搢笏跪執爵三祭酒奠爵執笏俯伏興再拜次詣后土氏神座前如上儀訖降壇詣稷壇罍洗升獻並如社壇之儀訖降復位次引終獻詣社稷壇罍洗升獻如亞獻之儀降復位次引初獻詣稷壇升自子陛詣飲福位南向立執事者各以爵酌酒合置一爵持爵詣初獻之左西向立初獻再拜搢笏跪受爵祭酒啐酒奠爵執饌者以俎減社稷神座前胙肉合置一俎上又以豆取稷黍飯合置一豆先以飯授初獻受訖又以俎授初獻受訖皆以授執饌者初獻取爵飲卒爵執事者受虛爵復于坫初獻執笏俯伏興再拜降復位引初獻以下詣社稷壇望瘞位北向立執事者以篚詣神位跪取祝版幣及饌物牲之左髀置于塪以火焚半贊禮者曰可瘞置土半塪訖贊禮者少前贊禮畢引初獻以下出退舊制用羊豕各一口籩十二菱芡栗鹿脯榛實乾桃乾䕩乾棗形鹽魚鱐糗餌粉餈登二大羮鉶脂鼎三鉶羮盤一毛血簋二黍稷簠二稻粱豆十二芹筍葵菁韭酏食魚醢羮醯豚胉鹿臡醓醢糝食兔俎八羊腥七體羊熟十一羊腥胃肺羊熟腸胃豚豕腥七體豕熟十一豕腥膚豕熟膚尊罍二十四實以酒並同皇地祇七年權禮部侍郎齊慶胄奏郡縣春秋祈報社稷壇壝器服之度升降跪起之節鄙野不經請以祥符所頒祭器圖制元豐郊廟祀禮政和五禮新儀與其沿革及今所用冕服壇壝之制祭祀之儀參類為書鏤版以賜禮官謂祥符祭器圖製以竹木今臨安上丁上戊及祀風雷亦用之請以祥符圖製及郡縣壇壝冕服祀儀類為一書命臨安守臣刻之摹上禮部下之四方名曰淳熙編類祀祭儀式從之朱子州縣社稷壇説州縣社壇方二丈五尺四步今每步六分之一凡言方者皆徑也此言方二丈五尺者從東至西二丈五尺從南至北二丈五尺也壝二十五步其説亦然髙三尺既言壇髙三尺又言壇分三級則是以一尺為一級也四出陛此陛之級即壇之級也但于四面陛之兩傍各以石砌作幔道隔斷使其中為陛級外為壇級可也稷壝如社壇之制社以石為主其形如鐘長二尺五寸方一尺一寸剡其上培其下半舊法唯社有主而稷無主不曉其意恐不可以己意增添其言壇上之南方非壇之中也蓋神位坐南向北而祭器設于神位之北故此石主當壇上南陛之上若在壇中央即無設祭處矣四門同一壝二十五步壝方二十五步者亦是徑二十五步謂從東至西二十五步以丈計之六尺為步則為十五丈也四角築土為壝髙三尺許使壇上與齋廳相望得見壝上不用瓦蓋以磚兩面砌使其走水尤為堅固四門當中開門古法不言濶狹恐須濶一丈餘庶幾行禮執事之人往來寬展不相妨礙兩旁各立一華表髙一丈許上以橫木貫之如門之狀華表于禮無文但見州縣有如此者或恐易得損壞不作亦得但壇面二丈五尺乃是上一級之數下面更兩級一級須展一尺即壇腳須徑二丈九尺壇飾各隨方色上蓋以黃土古者社稷不屋有明文不用磚砌無所考然亦不須磚砌者中原土密雖城壁亦不用磚今南方土疏不砌恐易壞赤土飾之又恐僭于郊壇不可用也瘞坎於壇之北壬地南出陛方深取足容物瘞坎在壇之北壬地即是合在北壝門內兩壇邊各于中央下日隔取壬地各用磚石砌作一小天井深濶三四尺許某南作踏道上下間時以土實之臨祭即令人取去土掃令潔淨祭畢即使人持幣及祝版之屬從踏道下送入坎中然後下土築實依條差人守視西又曰右出政和五禮新儀以行事儀考之二壇東相並坐南向北石主在壇上之南方北門壝外空地須令稍寬可容縣官席位空地之北乃作齋廳以備風雨設獻官位獻官南面行事社各植之以土之所宜木壇壝等當用古尺不當用大尺右宋社稷金史熙宗本紀皇統三年五月甲申初立社稷海陵本紀貞元元年閏十二月癸巳定社稷制度禮志貞元元年有司奏建社稷壇於上京世宗大定七年七月建社稷壇於中都社為制外四周為垣南向開一神門門三間內又四周為垣東西南北各開一神門門三間各列二十四戟四隅連飾罘罳無屋于中稍南為壇位令三方廣濶一級四陛以五色土各飾其方中央覆以黃土其廣五丈髙五尺其主用白石下廣二尺剡其上形如鐘埋其半壇南栽栗以表之近西為稷壇如社壇之制而無石主四壝門各五間兩孰三門門列十二戟壝有角樓樓之面皆隨方色飾之饌幔四楹在北壝門西北向神厨在西壝門外南向廨在南圍牆外東西向有望祭堂三楹在其北雨則于是堂望拜堂之南北各為屋二楹三獻官及司徒致齋幕次也堂下南北相向有齋舍二十楹外門止一間不施鴟尾祭用春秋二仲月上戊日樂用登歌遣官行事太尉