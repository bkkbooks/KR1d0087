body:
  text: 五禮通考卷二百二十四刑部尚書秦蕙田撰賓禮五會同蕙田案大宗伯以賓禮親邦國自朝宗覲遇而外即及會同會同之禮於古無見然禹貢有四海會同之文左傳稱禹會諸侯于塗山其禮殆昉于此乎周官所載會同之文不一而足天官大宰春官肆師司几筵諸職則名之為大朝覲蓋朝覲之禮行於國中所接見者不過一方一服之諸侯會同則六服偕來為壇壝宫于國外五等諸侯同時旅見又有祀方明及盟約之法皆朝覲所無故云大也若在境外則六軍之士從行馬牛輂輦糧食畢具大率如軍旅之役故周官每以會同與軍旅師田並舉誠重之也若諸侯遣使來聘天子使卿大夫與之行會同之禮則曰小會同故大司馬大祝大史小史諸職又稱大會同以别之春秋之世天子不行會同而霸國大侯假此禮以行之非周禮之舊矣今據周禮諸書以補儀禮之闕云書禹貢四海會同傳四海之內會同京師周禮春官大宗伯時見曰會殷見曰同注時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇于國外合諸侯而命事焉春秋傳曰有事而會不協而盟是也殷猶衆也十二歲王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來歲終則偏覲疏時見諸侯有不順王命者不來其順服者皆來朝天子一則顯其順服二則欲助天子征討故來也云既朝覲者若不當朝之歲則不須行朝覲于國中直壇朝而已其當朝之歲者則于國中春夏行朝宗於王朝受享於廟秋冬則一受之于廟也大行人云十二歲王乃巡守殷國若王無故則巡守王制及尚書所云者是也若王有故則此殷見曰同及大行人云殷國是也云殷同者六服衆皆同來言殷國者衆來見于王國其事一也云四方四時來朝終歲則遍者若四時服數來朝則當朝之歲大行人所云侯服年年朝甸服二年朝男服三年朝采服四年朝衛服五年朝要服六年朝各隨其年而朝若殷見春則東方六服盡來夏則南方六服盡來秋則西方六服盡來冬則北方六服盡來故云四方四時分來終嵗則遍也王氏詳説時會則事出非常故無常時殷同則有常時亦如常朝之歲但會同之禮因朝覲之時行之故又曰大朝覲鄭氏鍔曰易有殷薦禮有殷奠則殷為盛多之義殷見者合衆多之國而來見其來必同故謂之同也秋官大行人時會以發四方之禁殷同以施天下之政注時會即時見也無常期諸侯有不順服者王將有征討之事則既朝王命為壇于國外合諸侯而發禁命事焉禁謂九伐之法殷同即殷見也王十二歲一巡守若不巡守則殷同殷同者六服盡朝既朝王亦命為壇于國外合諸侯而命其政政謂邦國之九法殷同四方四時分來歲終則遍矣九伐九法皆在司馬職司馬法曰時以禮會諸侯施同政殷以禮宗諸侯發同禁明疏下文云十有二歲王巡守殷國殷國與巡守連文同是十二歲若王巡守何須殷同明不巡守乃殷同也十有二歲王巡守殷國注王巡守諸侯會者各以其時之方書曰遂覲東后是也其殷國則四方四時分來如平時夏官職方氏王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑及王之所行先道帥其屬而巡戒令王殷國亦如之注殷猶衆也十二歲王若不巡守則六服盡朝謂之殷國其戒四方諸侯與巡守同畿疏王殷國所在無常或在畿內國城外即為之或向外諸侯之國為之故有戒令之事蕙田案大宗伯之殷見職方氏之殷國其禮一也大行人云十有二歲王巡守殷國掌客亦有王巡守殷國之文蓋十二歲王不巡守則當殷國殷國之期與巡守同非巡守即是殷國也職方氏王將巡守則戒于四方王殷國亦如之可見本非一事先儒或合為一者非秋官小行人朝覲宗遇會同君之禮也疏朝覲宗遇會同即諸侯之賓故云君之禮右會同名義春官大祝大會同造于廟宜于社過大山川則用事焉反行舍奠注用事亦用祭事告行也玉人職有宗祝以黃金勺前馬之禮是謂過大山川與疏王與諸侯會同或在畿內或在畿外亦告廟而行云造者以其非時而祭造次之事也曲禮云出必告反必面據生時人子出入之法今王出行時造于廟遷廟主行反行還祭七廟非時而祭曰奠李氏嘉會曰大師先社後廟會同先廟後社大師屬隂會同屬陽故也右會同告祭地官牛人凡會同共其兵車之牛與其牽倣以載公任器注牽倣在轅外挽牛也人御之居其前曰牽居其旁曰倣任猶用也縣師若將有會同之戒則受法于司馬以作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼓兵器以帥而至稍人若有會同行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽于司馬注有軍旅會同田役之戒縣師受法於司馬邦國都鄙稍甸郊里惟司馬所調以其法作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼓兵器以帥而至是以書令之耳其所調若在家邑小都大都則稍人用縣師所受司馬之法作之帥之以致于司馬也王氏詳説曰縣師之掌遍于王畿之間稍人之掌止於三等之采地縣師受法于司馬稍人又從而受司馬之法於縣師以見小大之相維也廩人凡邦有會同則治其糧與其食注行道曰糧謂糒也止居曰食謂米也糧疏此會同師役皆有軍人給食故須治之使均給之也鄭氏鍔曰逺者治其糧莊子言適百里者宿舂糧適千里者三月聚糧蓋言逺也近者治其食詩云朝食于株左氏云食時而至蓋言近也夏官司右凡會同合其車之卒伍而比其乘屬其右注合比屬其次第相安習也車亦有卒伍蕙田案周制以會同為邦之大事與軍旅田役並稱不惟須衆庶以為用而馬牛車輦旗鼓兵器皆不得以不備其在邦國都鄙稍甸郊里則縣師以司馬之法作其衆庶及馬牛車輦其在三等采地則稍人以縣師之法作其同徒輂輦皆帥而至以聽令于司馬在途則廩人儲糧食以均給之此惟會同在境外乃有之夏官大司馬大會同則帥士庶子而掌其政令注帥師以從王黃氏曰宿衛則宫伯掌其政令扈從則司馬掌其政令前漢郎官宿衛屬光祿勳役漢又屬焉蕙田案此士庶子乃宿衛之官宫伯職云掌王宫之士庶子凡在版者若邦有大事作宫衆則令之蓋平時掌于宫伯有事總于司馬與縣師所起之衆庶不同司士凡會同作士從注作士從謂可使從于王者諸子會同賓客作羣子從注從于王從疏作使也使國子王也校人朝覲會同毛馬而頒之注毛馬齊其色也頒授當陳之司弓矢凡師役會同頒弓弩各以其物從授兵至之儀注物弓弩矢箙之屬右會同先事戒具地官遺人凡會同掌其道路之委積司市凡會同師役市司帥賈師而從治其市政掌其賣儥之事注市司司市也儥買也會同師役必有市者大衆所在來物以備之疏賈師知物價故使從王氏昭禹曰如此則師衆所聚無賤儥貴買以傷民財之患矣賈師凡國之賣儥各帥其屬而嗣掌其月凡師役會同亦如之注儥買也鄭司農云謂官有所斥令賣賈師帥其屬而更相代直月為官賣之均勞逸右會同在路委積及市政秋官掌客王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公視上公之禮卿視侯伯之禮大夫視子男之禮士視諸侯之卿禮庶子一視其大夫之禮注國君者王所過之國君也犢繭栗之犢也以膳天子貴誠也牲孕天子不食也祭帝不用也凡賓客則皆角尺令者掌客令主國也百牲皆具言無有不具備觀承案殷見與殷國是一事殷國與巡守是二事十二年王當巡守如有故不巡守則行殷國之禮是殷國乃巡守之變蓋巡守王出巡侯國殷國則諸侯來會京師也今掌客所云似殷國亦王自行者按職方氏疏殷國所在無常或向畿外侯國為之是不必専在京師則王亦有所過之國可知矣禮記禮器天子適諸侯諸侯膳以犢郊特牲天子適諸侯諸侯膳用犢貴誠之義也右會同所過供膳周禮春官典路凡會同以路從注王乘一路典路以其餘路從行亦以華國疏衣裳之會王乘金路兵車之會王乘革路王雖乘一路典路以其餘路皆從惟玉路祭祀之車尊不出其餘皆出以華國也車僕凡師共革車各以其萃會同亦如之注巡守及兵車之會則王乘戎路乘車之會王雖乘金路猶共以從不失備也司常凡祭祀各建其旗會同賓客亦如之置旌門注賓客朝覲宗遇王乘金路巡守兵車之會王乘戎路皆建其大常掌舍職曰為帷宫設旌門王氏曰會同賓客各建其旗者衆之所會使各視旗而知所從焉夏官司兵軍事建車之五兵會同亦如之注車之五兵戈殳戟酋矛夷矛也步卒之五兵則無夷矛而有弓矢司戈盾軍旅會同授二車戈盾建二車之戈盾授旅賁及虎士戈盾注乘車王所乘車也軍旅則革路會同則金路疏軍旅會同皆二車二皆有車右故授之以戈盾王所乘車有車右故建戈盾授旅賁氏及虎士戈盾者衛王故也戎右會同充革車注會同王雖乘金路猶以革路從行也充之者謂居左也曲禮曰乘君之乘車不敢曠左曲疏尊者左載王既不乘故戎右居左贊王處禮注云君在惡空其位也王氏與之曰會同雖以乘車會而革路亦為從車故充革路之右者戎右也鄭以充之者為居左殆失之齊右掌會同賓客前齊車王乘則持馬行則陪乘注齊車金路王自整齊之車也前之者已駕王未乘之時陪乘參乘謂車右也右會同車旗天官掌舍掌王之會同之舍設梐枑再重注故書枑為匱鄭司農云梐榱梐也匱受居溜水涑槖者也杜子春讀為梐枑梐枑謂行馬元謂行馬再重者以周衛有外內列設車宫轅門注謂王行止阻險之處備非常次車以為藩則仰車以其轅表門疏謂仰兩乘車轅相向以表門為壇壝宫棘門注謂王行止宿平地築壇又委壝土起楣埓以為宫鄭司農云棘門以戟為門杜子春云棘門或為材門為帷宫設旌門注謂王行晝止有所展肄若食息張帷為宫則樹旌以表門無宫則共人門注謂王行有所逄遇若住逰觀陳列周衛則立長大之人以表門幕人凡朝覲會同共其帷幕幄帟綬注共之者掌次當以張掌次諸侯朝覲會同則張大次小次注大次亦初往所止居小次即宫待事之處會疏若四時常朝在國內今言朝覲同為會同而來故在國外夏官司戈盾及舍設藩盾行則斂之注藩盾盾可以藩衛者如今之扶蘇與鄭氏鍔曰王之所舍設梐枑再重以為藩又於梐枑之外設藩盾欲以為衛故行則斂而藏之右會同次舍秋官司儀將合諸侯則令為壇三成宫旁一門注合諸侯謂有事而會也為壇于國外以命事宫謂壝土以為墻處所謂為壇壝宫也天子春帥諸侯拜日于東郊則為壇于國東夏禮日于南郊則為壇于國南秋禮山川丘陵于西郊則為壇于國西冬禮月四瀆于北郊則為壇于國北既拜禮而還加方明于壇上而杞焉所以教尊尊也王巡守殷國而同則其為宫亦如此與鄭司農云三成三重也爾雅曰丘一成為敦丘再成為陶丘三成為昆侖丘謂三重疏三成者三重重髙一尺蕙田案覲禮諸侯覲於天子為宫方三百步四門壇十有二尋深四尺與此文互相見陳氏禮書朝覲宗遇之禮行於廟朝會同之禮行於國外國外壝土為宫方三百步旁各一門中為壇而三成壇十有二尋深四尺旁一門則棘門矣壇三成則三重矣十有二尋則方九十六尺矣深四尺則一等一尺矣春宫於東夏宫於南秋宫於西冬宫於北加方明於壇上天子既拜日禮月與山川邱陵則祀方明既祀方明則見諸侯諸侯上介奉其君之旗置于宫尚左左氏曰會有表鄭氏謂諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上公侯先伯伯先子子先男而位皆上東然覲禮不言壇階而鄭氏曰前三階者以其宫四門而位尚左與明堂位相類故也不言侯氏奠玉降拜升拜而鄭氏曰公奠玉于上等降拜于中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地升成拜皆于奠玉之處者以其致命王受之玉降拜升拜與覲于廟相類故也掌次王合諸侯張大次小次設重帟重案鄭氏謂大次初往所止居小次即宫待事之處賈公彥謂大次去壝逺小次去壇近其説是也壇域君子所設以行禮者也故去祧有壇凡祭天及日月方望之類皆有壇齊侯為柯之盟有壇公羊曰莊公升壇是也諸侯適鄰國有壇左氏曰襄二十六年先君適四國未嘗不為壇是也大夫士去國為壇位鄉國而哭魯公孫歸父聘還及笙壇帷復命于介是也况王者之會諸侯乎司儀言將合諸侯令為壇則凡巡狩於方嶽之下皆有壇壝宫矣右會同壇壝宫天官太宰大朝覲會同贊玉幣玉獻玉几玉爵注助王受此四者大會同或於春朝或以秋覲舉春秋則冬夏可知玉幣諸侯享幣也其合亦如小行人所合六幣云玉獻獻國珍異亦執玉以致之玉几王所依也立而設几優尊者玉爵王禮諸侯之酢爵王朝諸侯立依前南面其禮之于阼階上侯疏諸侯四時常朝不稱大今朝覲稱大者諸為大會同而來故稱大朝覲小宰以法掌會同之戒具注法謂其禮法也地官師氏凡賓客會同王舉則從注舉猶行也保氏凡賓客會同王舉則從春官大宗伯朝覲會同則為上相注相詔王禮也出按賓曰擯入詔禮曰相肆師大朝覲佐擯注為承擯覲疏謂大會同朝時雞人大祭祀夜呼旦以嘂百官會同亦如之司几筵大朝覲王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几疏此朝覲言大因會同而行朝覲之禮大史大會同朝覲以書協禮事注先習録之也及將幣之日執書以詔王注將送也詔王告王以禮事王疏王與諸侯行禮之時大史執禮書以告使不錯誤小史大會同佐大史夏官虎賁氏掌先後王而趨以卒伍軍旅會同亦如之注虎賁氏居前後雖羣行亦有局分旅賁氏凡會同賓客則服而趨注服而趨夾王車趨也會同賓客王亦齊服服衮冕則此士之齊服服元端秋官大司冦凡朝覲會同前王疏司冦在王前為導也司儀詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓注謂王既祀方明諸侯上介皆奉其君之旗置于宫乃詔王升壇諸侯皆就其旗而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者也土揖推手小下之也異姓婚姻也時揖平推手也天揖推手小舉之也疏詔告也謂諸侯各就位立王在壇亦立司儀乃告王降壇南向見諸侯乃揖之先疏後親為次按周之宗盟異姓為後今此先庶姓後同姓者直據揖之儀容從下至髙不據盟之先後也及其擯之各以其禮公於上等侯伯於中等子男於下等注謂執玉而前見于王也擯之各以其禮者謂擯公者五人侯伯四人子男三人上等中等下等謂所奠玉處也壇三成深四尺則一等一尺也壇有十二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各于其等奠玉降拜升成拜明臣禮也既乃升堂授王玉于疏堂上二丈四尺王立之處并祀方明之所公奠玉上等降拜于中等侯伯奠玉于中等降拜于下等子男奠玉于下等降拜于地乃升成拜皆于奠玉之處知有降拜升成拜者約燕禮臣得君酬酒皆降拜君使小臣辭之乃升成拜明此王禮亦然也王既受玉約聘禮亦當側授宰玉其將幣亦如之其禮亦如之注將幣享也禮謂以鬱鬯祼之也皆于其等之上詩小雅車攻駕彼四牡四牡奕奕赤芾金舄會同有繹傳言諸侯來會也諸侯赤芾金舄舄達屨也時見曰會殷見曰同繹陳也論語宗廟之事如會同端章甫願為小相焉注鄭曰諸侯時見曰會衆類曰同端元端也衣元端冠章甫諸侯日視朝之服小相謂相君之禮右行禮之節周禮天官宰夫以牢禮之法掌其牢禮委積膳獻飲食賓賜之飱牽與其陳數注牢禮之法多少之差及其時也三牲牛羊豕具為一牢委積謂牢米薪芻給賓客道用也膳獻禽差俶獻也飲食燕饗也飱客始至所致禮凡此禮陳數存可見者惟有行人掌客及聘禮公食大夫秋官掌客王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻注饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫適用也諸侯長九命作伯者也獻公侯以下如其命數五疏如其命數者大行人云上公九獻侯伯七獻子男獻是也蔡氏德晉曰十二牢牛羊豕各十二也庶羞之具百物之品咸備即膳夫六穀六清八珍羞百有二十品醬百有二十甕也凡饗諸侯亦設王之席如燕禮設公席于阼階西向是也専饗之禮則王之獻數亦如賓之獻數記所謂降尊以就卑也合饗之禮則以諸侯長一人為賓其獻數亦如王之獻數此則以尊而從卑也蕙田案饗禮見前右會同牢禮天官外府凡會同共其財用之幣齎賜豫之財用右會同賜豫天官玉府若合諸侯則共珠槃玉敦注敦盤類珠玉以為飾古者以槃盛血以敦盛食合諸侯者必割牛耳取其血歃之以盟珠槃以盛牛耳尸盟者執之鄭司農云玉敦歃血玉器疏祭祀之時有黍稷故敦中盛黍稷今盟無黍稷敦中宜盛血牛耳宜在盤地官封人大盟則飾其牛牲注大盟會同之盟夏官戎右盟則以玉敦辟盟遂役之注鄭司農云敦器名也辟法也玄謂將歃血者先執其器為衆陳其載辭使心皆開辟也役之者傳敦血授當歃者贊牛耳桃茢注鄭司農云贊牛耳春秋傳所謂執牛耳者元謂尸盟者割牛耳取血助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執之桃鬼所畏也茢苕帚所以掃不祥射鳥氏祭祀以弓矢驅烏鳶凡賓客會同亦如之注烏鳶善鈔盜便汗人事疏會同有盟詛之禮殺牲之故須驅烏鳶秋官大司冦凡邦之大盟約涖其盟書而登之於天府注涖臨也天府祖廟之藏盟疏大盟約者謂王與諸侯因大會同而與所有約誓之辭大史內史司會及六官皆受其二而藏之注六官六卿之官也二副也鄭氏鍔曰大盟約所以結諸侯之信司盟掌其書刑官不親涖之則人無所畏大史掌邦之典法則之二以待逆者也內史掌八枋之法以詔王治者也司會掌邦之典法則之二以逆治者也六官六卿之長皆使受盟書之二重其事故藏之也謹備其失墜故二之者衆司盟掌盟載之法注載盟辭也盟者書其辭于策殺牲取血坎其牲加書于上而埋之謂之載書凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之注有疑不協也明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也詔之者讀其載書以告之也二之者寫副以授六官蕙田案明神覲禮所云方明謂上下四方之神陳氏禮書司盟曰凡邦國有疑會同則掌其盟約之載書左氏曰不協而盟又曰不協之故用昭乞盟于爾大神則凡會同不必皆盟也鄭氏以會同必盟方明之設為盟而已其説拘矣方明之制方四尺之木設上下四方之色上圭以象天神之制用下璧以象地示之居體東圭而南璋西琥而北璜各象其方而體之天子拜日禮月與四瀆山川丘陵畢則升壇以祀方明既而退方明以朝諸侯其或盟則復加方明于壇上而以載辭告之漢律厯志引書伊訓曰太甲元年伊尹祀于先王誕資有牧方明以冬至越弗祀先王于方明以配上帝其文與今書不同不可考也右會同盟約春官小宗伯凡王之會同軍旅甸役之禱祠肄儀為位注肄習也故書肄為肆儀為義杜子春讀肆當為肄義為儀若今時肄司徒府也小宗伯主其位疏禱祠須豫習威儀而為之當習威儀之時則小宗伯為位右會同禱祠夏官射人會同朝覲作大夫介凡有爵者注諸侯來至王使公卿有事焉則作大夫使之介也有爵者命士以上不使賤者疏作使也王使公卿有事于會同則射人使大夫為上介使凡有爵者命士以上為衆介也蕙田案此因會同而行賓射之禮故有介大夫為上介士為衆介禮之常也右會同而射秋官象胥凡軍旅會同受國客幣而賓禮之注謂諸侯以王有軍旅之事使臣奉幣來問欽定義疏此謂王有軍旅會同之事而諸侯不從者王或在京師或在畿外諸侯各使卿大夫勞問于王所則受其幣而賓禮之右諸侯來問春官小祝凡小會同掌事焉注小會同謂諸侯遣臣來王使卿大夫與之行會同之禮夏官小司馬凡小會同掌其事如大司馬之法疏小會同謂諸侯使卿大夫來聘王使卿大夫與之會同右小會同蕙田案會同之禮或在境內或在境外其在境外則先期職方氏戒于四方令各修其職事及將出天子造于廟宜于社大司馬帥士庶子以從王縣師以司馬之法作其衆庶馬牛車輦稍人以縣師之法作其同徒輂輦俱聽令于司馬牛人共兵車之牛以載公任器司右合車之卒伍而比屬之校人毛馬而頒之司弓矢頒弓弩各以其物王舉則師氏保氏從司士作士諸子作羣子以從過大山川宗祝以黃金勺前馬而用事焉在道則廩人治軍人之糧食遺人掌道路之委積司市及賈師治其市政所過之國膳王牲犢令百官百牲皆具王所舍設梐枑再重其外設藩盾有險則設車宫轅門平地則為壇壝宫棘門及會同之所前期度宫方三百步旁各一門中為壇三成壇十有二尋深四尺幕人共帷幕幄帟掌次張大次小次諸侯上介皆奉其君之旗置于宫尚左其日雞人夜呼旦以嘂百官司几筵設黼依莞筵左右玉几天子乘金路典路及車僕以餘路從司常建大常虎賁氏先後王而趨旅賁氏禮服以從天子冕而執鎮圭搢大圭帥諸侯朝日于東門外此謂春會同也夏則禮日于南門外秋則禮山川邱陵于西門外冬則禮月于北門外其餘並同反祀方明于壇上禮畢乃覲諸侯天子負黼依而立大司冦前王大宗伯為上擯肆師為承擯士擯三人諸侯各就其旗而立司儀詔王南鄉見諸侯土揖庶姓時揖異姓天揖同姓擯者延侯氏升侯氏升奠玉降拜升成拜其儀如覲禮三享亦如之大史執書詔王禮事小史佐之大宰贊王受玉幣玉獻王禮諸侯太宰贊玉爵事畢若有盟約之事封人飾牛牲玉府共珠槃玉敦射鳥氏以弓矢驅烏鳶乃進加方明于壇上司盟北面讀載書詔明神大司冦涖之戎右執玉敦贊牛耳桃茢諸侯既歃血畢大史內史司會及六官之長受載書之二藏之若會同在國內者則當朝之諸侯先行朝覲于朝廟已乃為壇于郊外合諸侯其儀與上同五禮通考卷二百二十四
