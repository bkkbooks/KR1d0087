body:
  text: 五禮通考卷五十八刑部尚書秦蕙田撰吉禮五十八宗廟制度蕙田案天子宗廟之制三昭三穆與太祖之廟而七蓋自虞夏以來商書云七世之廟可以觀德其明證也周監二代制度益昭凡祧遷宗祖以暨宮室服冕籩豆尊罍牲牢器數樂舞之制散見于儀禮周官戴記者雖不無闕略然皆有脈絡可尋推類以求聖人制作之精意穆然可思也今詳其條目統為制度列于時享之前各家異同之説略為考定至律呂本通貫祭祀之樂因廟享最詳並附著焉易萃卦萃亨王假有廟注假至也王以聚至有廟也民疏王假有廟者天下崩離則怨神怒雖享祀與無廟同王至大聚之時孝德乃洽始可謂之有廟矣故曰王假有廟程傳王者萃聚天下之道至于有廟極也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至于有廟則萃道之至也祭祀之報本于人心聖人制禮以成其德耳故豺獺能祭其性然也本義萃聚也廟所以聚祖考之精神又人必能聚己之精神則可以至于廟而承祖考也程子曰萃渙皆立廟因其精神之萃而形于此為其渙散立廟以收之張氏浚曰巽木在上為有廟朱氏震曰艮為門闕巽為高上為宗廟李氏過曰宗廟者人心所係武王伐商載車以行係人心也聚趙氏汝禖曰天下主王者以聚其生王者主宗廟以其民君子將營宮室宗廟為先有廟者萃人心之本龔氏煥曰假字疑當作昭假列祖之假謂感格也王者致祭于宗廟以己之精神感格祖考之精神也沈氏起元曰王假有廟玩彖辭有字最重觀渙大象先王以享于帝立廟可見有廟者立廟之謂假字訓至為是蕙田案注疏訓假為至原本渙大象立義似更平實有關係彖下傳王假有廟致孝享也陸氏希聲曰氣聚而生氣散而死魂氣遊散無所依歸故聖人于萃聚之時立宗廟以致孝享吳氏澄曰致者至其極也極盡孝享之道乃能萃已散之精神也雷氏次宗曰得萬國之歡心四海之內各以其職來祭然後可以謂之有廟而致孝享此謂天子之孝渙卦渙亨王假有廟疏王假有廟者王能渙難而亨可以至于建立宗廟故曰王假有廟也本義渙散也祖考之精神既散故王者當至于廟以聚之胡氏炳文曰萃與渙皆互艮艮為門闕一陽在上為屋二隂在下為闕高巍之象故曰有廟萃言假廟是言聚己之精神以聚祖考之精神渙言假廟是祖考之精神既散至于廟所以聚之朱氏震曰上為宗廟艮為門闕五王位九五有入自門闕至于廟之象彖下傳王假有廟王乃在中也注王乃在乎渙然之中故至有廟也疏此重明渙時可以有廟之義險難未安方勞經略今在渙然之中故至于有廟也程傳王假有廟之義在萃卦詳矣天下離散之時王者收合人心至于有廟乃是在其中也在中謂求得其中攝其心之謂也中者心之象本義中謂廟中地楊氏繪曰當渙之時何以御之王者宅中而正位託天宗廟之靈以固民之離心故曰王假有廟王乃在中也鄭氏汝諧曰方其渙也孰為君孰為臣至于有廟則王位乎中而上下定矣張氏栻曰收天下之心莫若立宗廟而正王位王乃在中所謂中天下而立定四海之民也何氏楷曰王乃在中者非在廟中之謂王者之心渾然在中則不薦之孚直有出于儀文之外者宜其精神之與祖考相為感格也蕙田案在中楊氏鄭氏為是象下傳風行水上渙先王以享于帝立廟疏先王以渙然無難之時建立宗廟以祭祖考程傳風行水上有渙散之象先王觀是象收天下之渙散至于享帝立廟也收合人心無如宗廟祭祀之報出于其心故享帝立廟人心之所歸也係人心合離散之道無大于此本義皆所以合其散項氏安世曰立廟于宫象坎之隱朱氏震曰立廟則人知反本鬼有所歸所以一天下之心合天下之渙丘氏富國曰鬼神之道幽深渺邈不可度思惟至誠貫徹潛乎冥感如水之遇風渙然相受則陰陽交通有合無間廟焉而神鬼享矣俞氏琰曰渙泮渙也風來水面而水有文故曰渙風無形無所寓則無以見之水動成文後見風之至鬼神亦無形者立廟于宫而後人鬼享有所寓故也詩小雅巧言奕奕寢廟君子作之疏連言寢廟者周禮注云前曰廟後曰寢則寢廟一物先寢後廟便文耳此自工匠所造而言君子者閟宫曰新廟奕奕奚斯所作彼奚斯君子也以教護課程必君子監之乃得依法制也春秋桓公二年左氏傳清廟茅屋周禮春官大宗伯掌建邦之人鬼之禮小宗伯掌建國之神位左宗廟注庫門內雉門外之左右王氏昭禹曰左陽也人道所尚君子于其親事死如事生故左宗廟鄭氏鍔曰匠人云左祖右社匠人所掌者營作之事小宗伯所主者辨其方位也考工記匠人營國左祖右社注左宗廟桓疏案祭義注云周尚左二年取郜大鼎納于太廟何休云質家右宗廟尚親親文家左宗廟尚尊尊陳氏禮書周官小宗伯禮記祭義皆曰建國之神位右社稷左宗廟考工記匠人營國左祖右社蓋宗廟陽也故居左陽故宗廟皆南嚮廟所以象王之朝而朝必南面則廟皆南嚮可知聘禮賔入大門內公揖入每門每曲揖然後及祖廟司儀諸公相為賔及將幣三揖三讓每門止一相然後及廟賈公彥曰入大門東行至廟考之于禮諸侯之廟左闕門內先儒皆謂在大門內其間有每門者諸侯五廟祖廟位居中東二昭廟西二穆廟各有門門之旁有牆牆之中夾通門則祖廟以西閣門者三東行而歷三門及至祖廟則廟皆南饗矣廟皆南嚮而昭南面穆北面者禘祫之位也晉孫育曰宗廟之制外為都宫內各有寢廟别為門垣太祖在北左昭右穆次而南蓋其所傳聞者異也禮記曲禮君子將營宫室宗廟為先注重先祖馬氏晞孟曰太王之遷豳也作廟奕奕然後百堵皆興宣王之考室也似續妣祖然後作室百堵則古人之營宫室者豈有不先宗廟者哉檀弓曰喪不慮居為無廟也祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服聖人以是為未足也築為宫室設為宗祧以别親疏逺邇教民反古復始不忘其所由生也衆之服自此故聽且速也疏此經明聖人為鬼神立宗廟之事聖人以尊名鬼神為未足稱其意故為宫室宗祧以别親疏逺邇教民反古復始也古謂先祖追而祭之是反古也始謂初始父母始生于已今追祭之是復始也追逺報祭是不忘其所由生也劉氏彞曰所以别其親疏者立祖禰之名也所以辨其逺邇者定宗祧之數也教民尊祖以時祭之故曰反古也教民親禰以禮敬之故曰復始也不忘其所由生者其謂此乎慕容彥逢曰親而邇者為宗疏而逺者為祧此宗祧所以别親疏逺邇也廟有寢祧無寢廟則修除祧則黝堊此宫室所以别親疏遠邇也祧則以教反本之道也祖則以教反始之道也禰則以教不忘其所由生也民德齊厚而不忘其本其服也出其中心之誠非有強之而為也祭法天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼蕙田案祭法非宗廟正禮詳見後兹取其廟名存之曲禮祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟吕氏大臨曰宗廟祭祀尊而神之有君道焉故皆曰皇也君亦曰辟則臣之所取法也陳氏祥道曰詩曰皇皇后帝又曰皇王維辟天王祔而臣子加之以帝尊之與天同故也祖父死而子孫加之以皇夫死而妻加之以辟尊之與君同故也周官大祝所謂鬼號此也陳氏澔曰曰皇曰王皆以君之稱尊之也考成妣嫓辟法也妻所法式也為之宗廟以鬼享之不得不異其稱謂也曲禮措之廟立之主曰帝注立主曰帝同之天神主疏卒哭竟而祔置于廟立使神依之崔靈思曰廟主曰帝蓋是為祀時有主入廟稱帝之義記者録以為法也呂氏大臨曰措之廟曰帝者祔于廟之詞也周人卒哭而祔殷人練而祔祔而作主始入于廟曰帝者同于天神生事畢而鬼事始也鬼神莫尊于帝以帝名之言其德足以配天也然考之禮經未見有以帝名者惟易稱帝乙亦不知其何帝獨司馬遷史記載夏殷之王皆以帝名疑殷人祔廟稱帝遷據世本而言當有所考至周有諡始不稱帝禮運祖廟所以本仁也孝經為之宗廟以鬼饗之注立廟祔廟之後則以鬼禮享之疏立廟者即禮記祭法天子至士皆有廟尚書大傳廟者貌也以其貌言之也爾雅釋名宗尊也廟貌也先祖形貌所在也寢寢也所寢息也釋宫室有東西廂曰廟無東西廂曰寢家語孔子曰吾于甘棠見宗廟之敬也甚矣思其人猶愛其樹尊其人必敬其位道也白虎通聖人所以制宗廟何生死殊路故敬鬼神而逺之所以有屋何所以象生之居王者立宗廟何緣生以事死敬亡若事存欲立宗廟而祭之此孝子之心所以追養繼孝也孝經援神契宗廟所以尊祖也右宗廟名義書舜典正月上日受終于文祖傳文祖者堯文德之祖廟正義禮有大事行之于廟況此是事之大者知文祖者堯文德之祖廟也且下云歸格于藝祖萟文義同知文祖是廟者咸有一德云七世之廟可以觀德則天子七廟其來自逺堯之文祖蓋是堯始祖之廟不知為誰也帝繫及世本皆云黃帝生元囂元囂生僑極僑極生帝嚳帝嚳生堯即如彼言黃帝為堯之高祖黃帝以上不知復祭何人充此七數況彼二書未必可信堯之文祖不可強言林氏之竒曰薛氏云受天下于人必告于其人之所從受者此論當矣然而所祖之人不可得而知也祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯舜典大禹謨皆虞書也既是虞書則所稱祖宗必自虞世言之神宗即堯也神宗為堯則文祖亦可指為顓頊然而去古逺矣不可以為必然之論歸格于藝祖用特傳告至文祖之廟藝文也言祖則考著正義以上受終在文祖之廟知此以告至文祖之廟才藝文德其義相通故藝為文也文祖藝祖史變文耳此時舜始攝位未自立廟故知告堯之文祖也月正元日舜格于文祖傳舜服堯三年喪畢將即政故復至文祖廟告疏此文又承三載之下故知舜服堯喪三年畢將欲即政復至文祖廟告前以攝位告今以即政告也此猶是堯之文祖自此以後舜當自立文祖之廟堯之文祖當遷于丹朱之國也大禹謨正月朔旦受命于神宗傳受舜終事之命神宗文祖之宗廟言神尊之受正義舜典説舜之初受終于文祖此言若舜之初知命即是舜終事之命也神宗猶彼文祖故云文祖之宗廟文祖言祖有文德神宗言神而尊之名異而實同神宗當舜之始祖案帝繫云黃帝生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生勾芒勾芒生蟜牛蟜牛生瞽瞍瞽瞍生舜即是舜有七廟黃帝為始祖則文祖為黃帝顓頊之等也蔡傳神宗堯廟也蘇氏曰堯之所從受天下者曰文祖舜之所從受天下者曰神宗受天下于人必告于其人之所從受者禮曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯則神宗為堯明矣陳氏師凱曰祭法疏云有虞氏以上尚德禘郊祖宗配用有德者而已虞氏禘郊祖宗之人皆非虞氏之親是尚德也自夏以下稍用其姓代之時氏瀾曰神宗堯也天下者堯之天下受命于神宗示不敢專也吳氏澄曰祭法必有所據舜受堯之天下今以授禹其宗堯為宜或謂舜不當立堯廟然堯與舜皆黃帝之後其宗堯何嫌益稷夔曰戞擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳皇來儀正義此舜廟堂之樂謂廟內堂上之樂言祖考來格知在廟內下云下管知此在堂上也馬融見其言祖考遂言此是舜除瞽䏂之喪祭宗廟之樂亦不知舜父之喪在何時也但此論韶樂必在即政後耳中庸舜其大孝也與宗廟饗之國語魯語有虞氏禘黃帝而祖顓頊郊堯而宗舜幕能率顓頊者也故有虞氏報焉禮記祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯疏案聖證論以此禘黃帝是宗廟五年祭之名虞氏之祖出自黃帝顓頊是虞帝七世祖以顓頊配黃帝而祭是禘其祖之所自出以其祖配之趙氏匡采曰虞氏禘黃帝蓋舜祖顓頊出于黃帝則所謂禘其祖之所自出也郊嚳者帝王郊天當以始祖配天則舜合以顓頊配天也為身繼堯緒不可捨唐之祖故推嚳以配天而舜之世系出自顓頊故以為始祖情禮之至也周氏諝曰舜之受禪止于一世故就舜之身而言之則不得不郊嚳而宗堯方氏慤曰帝公天下者也王家天下者也有虞氏所郊所祖不皆祖瞽䏂之親而祖堯之親者凡以為公而已楊氏復曰黃帝生昌意昌意生顓頊顓頊生窮蟬窮蟬至瞽瞍皆微為庶人舜嗣帝位以帝顓頊為祖廟黃帝者帝顓頊之所自出也故禘黃帝于帝顓頊之廟而以帝顓頊配之也帝嚳堯之父也顓頊舜之祖也有虞氏當以帝顓頊配天為身嗣堯位故推帝嚳以配天而以顓頊為祖仁之至義之盡也顓頊虞氏異代之祖以功德而祖之有虞氏宗堯亦以功德而宗之也國語注曰虞以上尚德是也金氏履祥曰史稱黃帝之曽孫嚳嚳之子堯則堯黃帝之元孫也又稱黃帝生昌意昌意生顓頊厯窮蟬敬康勾芒蟜牛以至瞽瞍而生舜則舜黃帝八世孫也世系之傳史記之失考也或曰世本也朱子謂世本或出于附會假托不可憑據今以其敘舜之世推之其不可憑也審矣曰然則舜果何出乎考之于書曰虞舜曰嬪于虞是虞者有國之稱也參之國語史伯之言曰成天地之大功者其子孫未嘗不章虞夏商周是也虞幕能聽協風以成樂物生者也夏禹能平水土以處庶類者也商契能和合五教以保于百姓者也周棄能播殖榖疏以衣食民人者也其後皆為王公侯伯夫以虞幕並稷契而言則幕為有功始封之君虞為有國之號而舜所自出以王天下者也考之左氏史趙之言曰自幕至瞽瞍無違命舜重之以明德夫自幕以至于瞽瞍則非黃帝昌意顓頊窮蟬敬康勾芒蟜牛以至瞽瞍也或曰然則昌意窮蟬以下之説固妄矣國語不曰幕能帥顓頊乎左氏不曰陳顓頊之族乎曰幕之出于顓頊左氏國語之説固足徴也然謂顓頊之必出于黃帝史記之説其果足徴乎黃帝氏殁則少昊氏作是為五帝之首國語稱少昊氏之衰九黎亂德顓頊受之則少昊似一代之通稱後世始衰非少昊之世即衰也而史記于黃帝之後不及少昊懸紀顓頊指為黃帝之孫隔逺無緒少昊之代何所往而黃帝之孫何其壽也莫難明者譜牒莫易知者朝代史記序朝代尚有遺則其序譜牒豈足信乎傳稱有虞氏禘黃帝而郊嚳祖顓頊而宗堯何也曰此亦小戴收國語之文而又失之者國語論禘郊祖宗皆以其有功德于民而祀之初不論其世也故説者謂虞以上尚德夏以下親親戴氏祭法易其前後故讀者不覺耳此朱子固嘗言之矣無已則又決之于書乎書稱舜格于文祖即受終于堯之廟也稱禹受命于神宗即舜宗堯之廟也其禘黃帝其郊嚳即宗堯之意云爾是以有虞子孫猶郊堯而宗舜以天下相傳則有天下之大統焉有虞氏受堯之天下則宗堯宗堯則禘郊堯之宗祖計堯以前亦或有然者矣況國語固云禘郊祖宗與報為五則禮固有並行而不相悖者近世有為之説者曰祖考來格虞賔在位此有虞祭顓頊報幕以至瞽瞍之祖考也國語所謂祖顓頊與有虞氏報焉者也禘黃帝郊嚳宗堯書所謂文祖神宗舜受堯之天下故宗堯為宗而祖堯之祖也大傳所謂帝入唐郊以丹朱為尸者也祖顓頊報幕以至瞽瞍者一家之私親也禘郊宗堯者天下之公義也然韶之為樂正以紹堯而得名則祖考來格者即文祖神宗之謂而虞賔在位安知非丹朱之在尸位乎況禘郊祖宗報五者各有所尊自不相厭而虞賔之位亦不相妨也又曰有虞氏宗堯則神宗堯廟也古史稱舜之子孫乃更郊堯而宗舜此説非也當是禹郊堯而宗舜爾三聖揖遜以天下相傳祀以為宗以有天下之大統也自夏后氏子孫繼世以有天下商周征伐以有天下固異于是而諸儒之説亦始膠矣朱氏鶴齡曰攝位受終于文祖巡守歸格于藝祖即位格于文祖此舜代堯守宗廟社稷為祭主之明文也堯祔于廟舜以大義主其祭與臣工共盡享格之義此不易之理也然則如非族何曰神不歆非類民不祀非族舜與堯雖非族也非非類也聖人之德也君臣之契也禪受之統也類莫如堯與舜也廟號神宗自官天下視之萬世之宗也堯之祀非舜主之而誰也然則于瞽瞍如何曰其生也以天下養其死也自為虞氏之祖故曰宗廟饗之子孫保之此于堯以天下相傳之義固不相妨也禹之于鯀亦然矣然則丹朱不祀堯乎曰朱子謂堯廟當立于丹朱之國修其禮物作賔王家愚謂此商周革命之禮非舜禹禪承之禮也以經考之祖考來格虞賔在位羣后德讓此非舜祭于廟而丹朱與有事之明徴乎祖考下擊虞賔則考者堯也若謂舜祭其祖考而丹朱在位是與殷之孫子侯服駿奔于周廟者同也其必不然矣吳氏棫曰祭法必有所據舜受堯之天下今以授禹禹其宗堯何疑唐孔氏以為舜始祖之廟非也王氏樵曰神宗為堯斷然不易文祖神宗其祖有功宗有德之所自始與蕙田案唐虞宗廟之祭曰文祖曰藝祖曰神宗藝祖即文祖蓋堯之始祖廟也堯之天下受于文祖今將以授舜故攝位告即位告巡狩告攝位即位告者明統緒之授受也巡狩告者攝政而代主宗廟之事也孔傳所云自屬不易至其人之或為黃帝或為顓頊史記世本所載皆不足憑故傳稱不知為誰是亦闕疑之義惟神宗之説則傳與正義謂為舜之始祖而蔡傳據蘇氏之説斷以為堯廟則蔡傳是也祭法云有虞氏祖顓頊而宗堯宗堯故不稱祖而稱宗蓋統緒者天下之統緒也受天下即受與天下者之統緒故禘郊祖宗一氣相接義之盡仁之至也祖考來格虞賔在位既稱宗即可稱考紹統者主祭來賔者助祭禮固然矣若承其統緒舍其宗廟而自立宗廟俾堯之子孫與于駿奔之列不特等于商周革命之事其與後之莽懿相去幾何孰謂大聖人而出此且豈所稱官天下者耶至中庸稱舜大孝而曰宗廟饗之子孫保之蓋舜之宗廟享舜及舜子孫之祭無非舜之大孝也夫舜以側微受命以其一身繼天下之統而又自為其祖考立宗廟為其子孫立國家俾世世享其祀而弗替非大德大孝孰克為之左傳自幕至于瞽瞍無違命國語幕能帥顓頊者也故有虞氏報焉非宗其統也報其功也此宗廟饗之也舜處其子均于商而禹復封之虞古史謂服其服禮樂如之客見天子而不臣此子孫保之也正合國語禘郊祖宗與報為五之義與祭法固並行而不悖金仁山謂祖顓頊報幕以至瞽瞍者一家之私親也禘郊祖宗者天下之公義也朱長孺謂堯祔于廟舜以大義主其祭廟號神宗自官天下視之萬世之宗也于瞽瞍其生也以天下養其死也自為虞氏之祖其説皆精當不可易矣通典唐虞立五廟蕙田案杜氏泥鄭氏所引禮緯稽命徴之説謂唐虞立廟親廟四始祖廟一故創為五廟之説非也商書七世之廟可以觀德疏謂漢氏以來論七廟者多矣其文見于記傳者禮器家語荀卿書榖梁傳皆曰天子立七廟以為天子常法舜格于文祖正義曰天子七廟其來自逺説不可易也國語魯語鯀障洪水而殛死禹能以德修鯀之功夏后氏禘黃帝而祖顓頊郊鯀而宗禹杼能率禹者也夏后氏報焉禮記祭法夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹趙氏匡曰夏后氏禘黃帝義同舜也郊鯀者禹尊父且以有水土之功故以配天祖顓頊者禹世系亦出顓頊也宗禹者當禹身亦宗舜子孫乃宗禹吕氏大臨曰瞽鯀皆有惡德虞不郊瞽而夏郊鯀以鯀有以死勤事之功也周氏諝曰有虞氏夏后氏既同一禪讓得天下則有虞氏郊嚳而宗堯夏后氏亦當郊嚳而宗舜今于夏后氏反謂祖顓頊而宗禹何也舜之受禪止于一世故就舜之身言之則不得不郊嚳而宗堯禹之受禪傳于數世故就禹之子言之則不得不郊鯀而宗禹使就舜之子言之則固當郊瞽瞍而宗舜而就禹之身言之則固當郊嚳而宗舜又曰虞夏殷之世其禮猶質而不若周之文故所謂祖者即太祖也而為太祖者其廟不毁于萬世而其祭常行于四時則尊而且親所謂郊者其廟不免于毁而又止祭及于圜丘而已則尊而不親此虞夏殷周之世所以用其先而尊者為祖後而卑者為郊蕙田案郊祀配天其禮甚大周氏以為其廟不免于毁非也張子曰夏郊鯀以其祖也杞之郊禹者必繫時王之命不使郊鯀祀私廟猶可也楊氏復曰夏后氏之祖顓頊猶有虞氏也禹啓夏祚既以顓頊為祖故夏后氏祖顓頊而宗禹至其後世子孫乃以禹為受命之祖書曰明明我祖是也金氏履祥曰古史謂舜宗祀堯至舜之子孫則更郊堯而宗舜此據國語及韋昭之説也舜郊嚳宗堯則禹固當郊堯而宗舜矣而乃以堯之祀歸之舜之子孫顧自郊鯀焉何也曰此夏之末造也夫三聖以天下為公則皆承其祀三王之子孫以天下為家則各祖其祖舜之宗堯禹之宗舜一也舜之郊嚳禹之郊堯亦一也其郊鯀也則夏之末造也祀夏配天其諸始于少康乎于是郊堯宗舜則屬之虞思之國矣孔子曰杞之郊也禹也宋之郊也契也蓋商周存二代之後猶尊賢也尊賢則杞郊禹矣杞而郊禹則虞郊舜而唐郊堯者天子之事守也蕙田案禘黃帝郊鯀之説詳見郊祀禘祫二門宗舜宗禹則金氏之説是也禹之受禪同舜則宗舜亦應如舜之宗堯國語祭法所言皆禹子孫之事耳觀承案唐虞官天下則舜受堯統自當郊嚳而宗堯矣三代家天下則禹受舜禪雖當郊堯而宗舜至其子啓賢而繼立固宜以郊堯宗舜者歸之商均之國而夏自宜郊鯀而宗禹耳金仁山之説極當但必以為祀夏配天始於少康則亦未見其果然否也然立説自穩通典夏氏五廟蕙田案通典據鄭注之説其謬與唐虞五廟同天子之制皆七廟也書咸有一德七世之廟可以觀德傳天子立七廟有德之主則為祖宗其廟不毁故可觀德雖疏天子立七廟是其常事其有德之王則列為祖宗七世親盡而其廟不毁故子七廟之外可以觀德下云萬夫之長可以觀政謂觀其萬夫之長此七世之廟可以觀德謂觀七世之外文雖同而義小異所謂辭不害意漢氏以來論七廟者多矣其文見于紀傳者禮器家語荀卿書穀梁傳皆曰天子立七廟以為天子常法不辨其廟之名王制云天子七廟三昭三穆與太祖之廟而七祭法云王立七廟考王考皇考顯考祖考廟皆月祭之逺廟為祧有二祧享嘗乃止漢書韋玄成議曰周之所以七廟者周后稷始封文武受命而王是以三廟不毁與親廟四而七也鄭玄用此為説唯周有七廟二祧為文武故鄭玄王制注云此周制七廟者太祖及文武二祧與親廟四太祖后稷也殷則六廟契及湯與二昭二穆良由不見古文故為此謬説商書已云七世之廟則天子立七廟王者常禮非獨周人始有也劉歆馬融王肅雖不見古文皆以七廟為天子常禮所言二祧者王肅以為高祖之父及祖也并高祖以下共為三昭三穆耳詩烈祖疏禮王者祖有功宗有德不毁其廟故異義詩魯説丞相匡衡以為殷中宗周成宣王皆以時毁古文尚書説經稱中宗明其廟宗而不毁謹案春秋公羊御史大夫貢禹説王者宗有德廟不毁宗而復毁非尊德之義鄭從而不駁明亦以為不毁也則非徒六廟而已鄭言殷六廟者據其正者而言也禮稽命徵曰殷五廟至于子孫六注云契為始祖湯為受命王各立其廟與親廟四故六鄭據之以為殷立六廟至于中興之主有德則宗既無常數故鄭不數二宗之廟也蔡傳天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德孫氏炎曰天子祖有功而宗有德故雖七世而其廟不毁七廟者漢世以來論之多矣鄭康成謂夏五廟無太祖禹二昭二穆殷六廟契與湯及二昭二穆周則七廟后稷為始祖文武受命而王三廟不毁與二昭二穆此説妄也天子七廟之制久矣蕙田案注疏謂天子立七廟是其常事是也鄭氏乃有殷六廟之説昔人已闢其謬但注疏七世之廟可以觀德謂觀七世之外專以有德不祧毁者言云與萬夫之長可以觀政文雖同而義小異所謂辭不害意蔡氏因之今案七世之廟可以觀德萬夫之長可以觀政文義一串謂承七世之廟而為天子有德則存無德則亡故曰可以觀德為萬夫之長而出政政善則安政壞則危故曰可以觀政緊承上文克綏先王之祿二句言似更直截且以見七廟為天子定制也蓋人君既為天子則上承七廟之重宗社所係其可懼為何如若云觀于七廟外之有德者言太祖見居七廟中寧無德可觀且詎不嫌于譏七廟為無德耶德字當主人主言不宜指祖宗言注疏似稍迂曲故又有文同義異之説國語魯語契為司徒而民輯冥勤其官而水死商人禘嚳而祖契郊冥而宗湯上甲微能帥契者也商人報焉鄭注殷宜郊契夏疏殷人宜郊契者今虞先云郊嚳後云祖顓頊先云郊鯀後云祖顓頊殷先云郊冥後云祖契是在前者居後在後者居前故云宜也趙氏匡曰殷祖契出自嚳故禘嚳冥有水功故郊冥以配天湯出契後故祖契宗湯者當湯身未嘗有宗也楊氏復曰殷祖于契契母曰簡狄有戎氏之女為帝嚳次妃吞玄鳥而生契帝嚳者契之所自出故殷人禘嚳于契之廟而以契配之也殷人郊冥者冥契六世孫也冥勤其官而水死祭法推其功烈至于先聖王並稱故殷人以冥配天也殷人祖契而宗湯者湯革夏命為殷之祖然殷之功始于契故殷人祖契而宗湯後世子孫乃以湯為受命之祖詩曰衎我烈祖是也又其後殷有三宗祖甲曰太宗太戊曰中宗武丁曰高宗亦有德而可宗周公作無逸舉殷三宗以戒成王然則三宗亦為不毁之廟也何氏楷曰孔叢子論書篇云維高宗報上甲微定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有德而不及宗故于每歲之大嘗而報祭焉案竹書夏帝茫三十三年商侯遷于殷帝泄十二年殷侯子亥賔于有易有易殺而放之十六年殷侯微以河伯之師伐有易殺其君綿臣至殷武丁十二年報祀上甲微季本云相土生昌若昌若生曹圉曹圉生冥竹書載夏少康十一年使商侯冥治河至帝杼十三年商侯冥死于河中間計三十四年魯語及祭法所謂冥勤其官而水死者冥生振竹書以為殷侯子亥蓋振名而子亥其字也實始遷殷計三十七年而為有易之君綿臣所殺國統幾絶振生微字上甲乃殺綿臣而以殷興仍居殷地是則殷之遷雖在子亥而昌殷緒以基王業者乃在上甲故殷人報之也皇甫謐謂微字上甲其母以甲日生故也商家生子以日為名蓋自微始白虎通亦云殷道尚質故直以生日名子而譙周則謂死稱廟主曰甲蓋謂生稱其名死則以其生之名為廟主也于理或然詩商頌那衎我烈祖傳烈祖湯有功烈之祖也箋烈祖湯也詩序那祀成湯也箋正義序稱祀成湯則經之所陳是祀湯之事不宜為湯之祀祖商頌烈祖嗟嗟烈祖箋我功烈之祖成湯詩序烈祖祀中宗也箋中宗殷王大戊湯之玄孫也有桑榖之異懼而修德殷道復興故表顯之號為中宗商頌玄鳥受命不殆在武丁孫子傳武丁高宗也詩序玄鳥祀高宗也箋祀當為祫祫合也高宗殷王武丁中宗玄孫之孫也有雊雉之異又懼而修德殷道復興故亦表顯之號為高宗云崩而始合祭于契之廟歌是詩焉正義知此祀當為祫者以經之所陳乃上述玄鳥生商及成湯受命若是四時常祀不應逺頌上祖殷武與此皆云祀殷武所陳高宗身祀而已則知此與彼殊宜當為祫也案殷本紀大戊生仲丁及外壬及河亶甲亶甲生祖乙祖乙生祖辛祖辛生祖丁祖丁生陽甲及盤庚及小辛及小乙小乙生武丁是武丁為大戊玄孫之孫書序云高宗祭成湯有飛雉升鼎耳而雊作高宗彤日殷本紀稱武丁見雉升鼎耳懼而修政行德天下咸歡殷道復興立其廟為高宗商頌長發玄王桓發傳玄王契也以箋契即湯之始祖故亦王言之也帝命不違至于湯齊箋帝命不違者天之所以命契之事世世行之其德寢大至于湯而當天心詩序長發大禘也朱子集傳序以此為大禘之詩蓋祭其祖之所自出而以始祖配也蘇氏曰大禘之祭所及者逺故其詩歷言商之先后又及其卿士伊尹蓋與祭于禘者也商書曰兹豫大享于先王爾祖其從與享之是禮也豈其起于商之世與今案大禘不及羣廟之主此宜為祫祭之詩然經無明文不可考也何氏楷曰此詩末章舉及阿衡正配享太廟之事固大禘之一證也書盤庚篇兹豫大享于先王爾祖其從與享之周禮司尊彞云凡四時之間祀追享朝享先儒謂禘追其所自出故為追享祫羣廟主皆朝于太廟故為朝享禘祫皆以享名而禘尤大于祫故以大享名也盤庚言功臣配享正在大享之時則序以長發為大禘信非妄矣何休亦云禘所以異于祫者功臣皆祭也蕙田案序以為大禘朱子謂禘不當及羣廟之主王安石曰雍序禘太祖周無四時之禘故也此序曰大禘則商有四時之禘故也四時之禘為小則禘其祖之所自出為大何元子曰禘之名義有三一曰時禘一曰吉禘一曰大禘時禘之名至周而改今考周宗廟之禘惟有一祭時禘的是殷禮而大禘之兼及羣廟及配享功臣亦與周不同盤庚云大享于先王爾祖其從與享者或亦殷時大禘之制與然其為宗廟之祭不可易也宗元案大禘對時禘言是也猶之大祫對時祫言也若因追享為大禘而即以大禘為大享則未確夫享莫尊于禘而莫大于祫禘惟太祖一人所以尊之又追其所自出之帝故謂之追享特以對時禘及吉禘言而謂之大禘不可因大禘而謂之大享也惟三年之祫遍及羣廟毁廟而元功之臣亦配享焉但不及所出之帝然其禮最為周遍而廣闊故對時祫言既謂之大祫又對追享言而謂之大享也亦謂之朝享者正是功臣亦在而同朝于太祖也考長發之詩中及相土毁廟之主并及伊尹之元功即所謂大享于先王爾祖其從與享者正是大祫之祭而謂之大享者也小序謂大禘者非朱子已曾駁正之集傳雖未質言要已發其疑矣何元子信序而曲證為大享即大禘者欲以強詞軋正理實不足取也夫自漢儒以來多以大禘為合祭羣廟惟趙伯循因大傳只云以其祖配之而無合食于前之文故謂禘其始祖所自出者配惟始祖一人而不及羣廟此不刋之論也蓋古祭各于其廟惟時祫大祫乃合食于大廟故謂之祫耳若禘郊宗祖之祭尤典禮之特隆者而可以羣廟之主雜于其間乎朱子獨從趙氏説洵至當不易矣説此詩者又因序有大禘之語反謂大禘原及羣廟以遷就之何其惑也又或以為商周之禮不同亦未免從而為之詞耳夫周公所損益者不過制度文為之末若禘郊宗祖之祭乃享帝享親之極盛正所謂殷因於夏禮周因於殷禮者而可假商周異制之説以巧為解乎則序説洵為無稽而不足據也審矣商頌殷武撻彼殷武傳殷武殷王武丁也詩序殷武祀高宗也正義高宗前世殷道中衰高宗伐荆楚修宫室子孫美之詩人追述其巧而歌此詩朱子曰高宗中興特為百世不遷之廟不在三昭三穆之列此詩則廟成始祔而祭之詩也劉氏瑾曰高宗七世親盡而立廟此詩其作于帝乙之世與劉氏歆曰天子七廟七者其正法數可常數者也宗不在數中宗變也于有功德則宗之不可預為設數故于殷太甲為太宗大戊為中宗武丁為高宗由是言之宗無數也或言天子五廟無見文或言中宗高宗者宗其道而毁其廟則名與實異非尊德貴功之意也朱子曰劉歆説文武為宗不在七廟數中此説是又曰商之三宗若不是别立廟只是親廟時何不胡亂將三箇來立如何恰限取祖甲太戊高宗為之那箇祖有功宗有德天下後世自有公論不以揀擇為嫌所以名之曰幽厲雖孝子慈孫百世不能改那箇好的自是合當宗祀如何毁得如今若道三宗只是親廟則是少了一箇親廟了何氏楷曰武丁雖自立廟然當世數未盡時必仍居七廟中及夫親盡應毁之日乃始遷其主于新廟與七廟同享祀為百世不遷之宗而不與羣祧等列耳又案先儒謂逺廟為祧遷主藏焉劉公瑾云三宗之廟未知立于何所竊意中宗當穆高宗祖甲當昭各隨昭穆之位特立其廟于太祖廟之兩旁三昭三穆之上如周文武世室之謂也周氏世樟曰從來稱殷有三宗而不數成湯于理未安然國語及祭法皆言殷人祖契而宗湯則湯固殷宗不獨三也據商頌則湯實稱祖故賀循云殷有二祖三宗然則殷之特廟蓋有四矣蕙田案七廟之制自虞至商已然殷之三宗百世不毁不在七世親廟之數劉歆之論不可易也故朱子亦以為是書武成丁未祀于周廟駿奔走執豆籩傳四月丁未祭告后稷以下文考文王以上七世之祖駿大也諸侯皆大奔走于廟執事疏知告后稷以下后稷則始祖以下容毁廟也天子七廟故云文考文王以上七世之見是周廟皆祭之故經總云周廟也祖禮記大傳牧之野武王之大事也既畢而退設奠于牧室遂率天下諸侯執豆籩逡奔走追王太王亶父王季厯文王昌不以卑臨尊也疏此論武王伐紂率領諸侯以祭祖廟追王太王王季上尊祖禰之事率領天下諸侯在廟祭先祖乃追王太王王季文王等為王不以諸侯之卑號臨天子之尊也書經洛誥戊辰王在新邑蒸祭歲王入太室祼疏太室室之大者故為清廟廟有五室中央曰太室王肅云太室清廟中央之室通鑑前編成王七年王至新邑十有二月蒸于文武書召誥疏洛誥云王在新邑蒸祭王入太室祼則洛邑亦立宗廟詩周頌清廟於穆清廟序清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉箋清廟者祭有清明之德者之宫也謂祭文王也天德清明文王象焉故祭之而歌此詩也廟之言貌也死者精神不可得而見但以生時之居立宫室象貌為之耳成洛邑居攝五年時疏此解文王神之所居稱為清廟之意文王之神有清明之德者文王能象天清明故謂其廟為清廟賈逵左傳注云肅然清靜謂之清廟鄭不然者以書傳説清廟之義云於穆清廟周公升歌文王之功烈德澤尊在廟中嘗見文王者愀然如復見文王説清廟而言功德則清是功德之名非清靜之義也廟者人所不居雖非文王孰不清靜何獨文王之廟顯清靜之名以此故不從賈氏之説也言祭之而歌此詩者謂周公之時詩人述之而作此清廟之詩既作之後其祭皆升堂歌之以為常曲故禮記每云升歌清廟是其事也立宫室象貌而為之者言死者之宗廟象生時之宫室容貌故冬官匠人所論宗廟及路寢皆制如明堂是死之宗廟猶生之路寢故云象貌為之由此而言自天子至于卿士得立廟者其制皆如生居之宫矣劉歆厯譜惟四月既旁生霸粵六日庚戌武王燎于周廟翼日辛亥祀于天位粵五日乙卯乃以庶國祀馘于周廟注今文尚書禮記祭法周人禘嚳而郊稷祖文王而宗武王王制天子七廟三昭三穆與太祖之廟而七注此周制七者太祖及文王武王之祧與親廟四太祖后稷殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已案正義鄭氏之意天子立七廟惟謂周也鄭必知然者禮緯稽命徴云唐虞五廟親廟四始祖廟一夏四廟至子孫五殷五廟至子孫六鉤命決云唐堯五廟親廟四與始祖五禹四廟至子孫五殷五廟至子孫六周六廟至子孫七鄭據此為説故謂七廟周制也周所以七者以文王武王受命其廟不毁以為二祧并始祖后稷及高祖以下親廟四故為七也若王肅則以為天子七廟者謂髙祖之父及高祖之祖廟為二祧并始祖及親廟四為七故聖證論肅難鄭云周之文武受命之王不遷之廟權禮所施非常廟之數殷之三宗宗其德而存其廟亦不以為數凡七廟者皆不稱周室禮器云有以多為貴者天子七廟孫卿云有天下者事七世又云自上以下降殺以兩今使天子諸侯立廟並親廟四而止則君臣同制尊卑不别名位不同禮亦異數況其君臣乎又祭法云王下祭殤五及五世來孫則下及無親之孫而祭上不及無親之祖不亦詭哉穀梁傳云天子七廟諸侯五家語云子羔問尊卑立廟制孔子云禮天子立七廟諸侯立五廟大夫立三廟又云逺廟為祧有二祧焉又儒者難鄭云祭法逺廟為祧鄭注周禮云遷主所藏曰祧違經正文鄭又云先公之遷主藏于后稷之廟先王之遷主藏于文武之廟便有三祧何得祭法云有二祧難鄭之義凡有數條大略如此不能具載鄭必謂天子七廟惟周制者馬昭難王義云案喪服小記王者立四廟又引禮緯夏無太祖宗禹而已則五廟殷人祖契而宗湯則六廟周尊后稷宗文王武王則七廟自夏及周少不減五多不過七禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉故漢侍中盧植説文云二祧謂文武曽子問當七廟無虛主禮器天子七廟堂七尺王制七廟盧植云皆據周言也穀梁傳天子七廟尹更始説天子七廟據周也漢書韋玄成四十八人議皆云周以后稷始封文武受命石渠論白虎通云周以后稷文武特七廟又張融謹案周禮守祧職奄八人女祧每廟二人自太祖以下與文武及親廟四用七人薑嫄用一人適盡若除文武則奄少二人曽子問孔子説周事而云七廟無虛主若王肅數高祖之父高祖之祖廟與文武而九主當有九孔子何云七廟無虛主乎故云以周禮孔子之言為本穀梁説及小記為枝葉韋玄成石渠論白虎通為證驗七廟斥言玄説為長是融申鄭之意且天子七廟者有其人則七無其人則五若諸侯廟制雖有其人不得過五則此天子諸侯七五之異也王肅云君臣同制尊卑不别其義非也又王下祭殤五者非是别立殤廟七廟外親盡之祖禘祫猶當祀之而王肅云下祭無親之孫上不及無親之祖又非通論且家語云先儒以為肅之所作未足可依案周禮惟存后稷之廟不毁案昭七年傳云余敢忘高圉亞圉注云周人不毁其廟報祭之似高圉亞圉廟亦不毁者此是不合鄭説故馬融説云周人所報而不立廟蕙田案天子七廟之制諸儒多言自虞夏以來惟鄭氏據禮緯有虞夏五廟殷六廟周七廟之説王肅著聖證論以非之當矣而孔疏又引馬昭難王義以附會鄭注遂啓後人之疑然王説之是後多信之至馬説之謬尚未有奪其所據而詳辨之者今案馬昭引喪服小記王者立四廟為證夫諸侯立四親廟天子無四廟之禮方性夫謂以月祭之親廟言之徐伯魯云天子七廟并二世室而九豈有止立五廟之理方氏之言理或有之而劉原父則云此一句上有脫簡吳幼清從之謂而立四廟四字無所系屬義不可通劉氏謂當曰諸侯及其太祖而立四廟案大傳以其祖配之之下有此六字劉氏所謂有闕文者是也今以大傳補之言諸侯不得如天子之追禘太祖以上所祭上及太祖而止耳而太祖之下則立二昭二穆之廟為四親廟也此説似有據而可從則喪服小記所云固不得為王者立四廟之證矣馬昭又引禮器周旅酬六尸一人發爵則七尸為證案宗廟以七為正數則七廟七尸自無疑義乃謂文武不在七數既不同祭又不享嘗為無是禮案商書云七世之廟可以觀德周因殷禮自開國已然是時文武正在七廟之數至兩世室當立在懿王孝王之世何得以祭法所云強入之懿孝之後而謂文武不在七數耶其為穿鑿附會明矣馬昭又引曾子問七廟無虛主及周禮守祧奄八人為證案七廟無虛主是孔子特明齋車必載祧主而言正足為七廟之證乃謂周以后稷文武特七廟是其説固不可通于文武見居七廟之時即懿孝以後文武有功德親盡不祧而所立者世室也非廟也不曰廟而曰世室正以廟數不能減于七亦不能加于七耳如以功德之祖而充七廟之數是仍在祧遷之列何必又創為世室之名且與不毁之義大不相符矣寧不謂之謬説乎周禮守祧奄八人鄭謂太祖之廟及三昭三穆孔疏天子七廟通薑嫄為八廟廟一人故八人乃謂若除文武則奄少二人陳祥道云是不知周公制禮之時文武尚為近廟其所以宗之之禮特起于後代也果所以宗之者在七廟內使繼世祖先功德不下文武復在可宗之列則親廟又益殺于理必不然真足以破其蔽矣馬昭又稱天子七廟有其人則七無其人則五案七廟除太祖外三昭三穆皆親也諸侯及其高祖天子益二廟以昭尊卑之分所云降殺以兩不可易也乃強以功德不遷之祖入于親廟之數而造為有其人無其人之説即無功德之祖豈無高祖之父祖耶彌見其説之誣耳又云七廟外親盡之祖禘祫猶當祀之夫禘非合食不及羣廟何有毁廟牽連言之混而無别夫七廟之議王肅為是疏既引之而又必舉馬昭之難以牽合者此疏家之陋例適足以益鄭氏之過而啓千萬世紛紛之議耳曾子問七廟五廟無虛主禮器禮有以多為貴者天子七廟春秋僖公十有五年榖梁傳天子至于士皆有廟天子七廟故德厚者流光家語衛將軍文子將立先君之廟于其家使子羔訪於孔子孔子曰公廟設于私家非古禮之所及天子七廟自虞至周所不變也荀子禮論篇有天下者事七世袁準正論禮天子七廟左昭右穆又有祖宗不在數中晉書禮志周制七廟以辨宗祧虞喜曰七廟不始于周伊尹已言矣唐會要芩文本云載籍紀七廟者多稱四廟者寡榖梁王制祭法禮器書咸有一德並云七廟荀卿孔安國劉歆班彪父子孔朝虞喜干寶之徒咸以為然祖鄭玄者陳四廟之制述王肅者引七廟之文通典杜氏曰禮有以多為貴王制云天子七廟諸侯五廟祭法云逺廟為祧有二祧焉享嘗乃止而鄭玄以文武之廟曰祧不亦疏乎若以天子之祖功德則不立二祧二祧不廟數與諸侯同何以為隆殺哉虞喜云七廟不始于周伊尹已言七世之廟矣成王六年制禮七廟亦已有見數文王為祖武王為禰祖非逺廟也周官掌宗廟而職曰守祧周公不稱祖禰為遠祧也當須逆數成然後廟得别出不可于成王之代以文武逆云為遷主所藏矣王氏應麟曰書咸有一德七世之廟可以觀德疏有德之王則列為祖宗雖七廟親盡而其廟不毁漢氏以來論七廟者多矣其文見于記傳者禮器家語荀卿書榖梁傳皆曰天子立七廟以為天子常法方氏慤曰天子之廟止于七何也太祖之廟創業之所始萬世所不遷也而昭穆則合而為六者蓋四世其服已窮矣然猶緦也五世同姓已殺矣然猶免也至于六世然後親屬絶故止于三昭三穆與太祖之廟而七也馬氏晞孟曰自上以下降殺以兩禮也故天子七廟至士一廟合于降殺以兩之意也祖以功建故無可毁之禮而有百世不遷者也昭穆以親象故有可毁之禮親盡則有祧説者以為周則七廟夏則五廟殷則六廟蓋非是也陳氏祥道曰積厚者流澤廣積薄者流澤狹故天子七廟諸侯五廟大夫三廟士一廟廟而祭之仁之至也以七以五以三以一義之盡也舜之時禋于六宗與藝祖而七商書七世之廟可以觀德則七廟之制其來尚矣先王之于死者常待之以生由士而上生而異宫死則為之立廟庶人則生非異宫死則祭于寢而已陳氏禮書廟所以象生之有朝也寢所以象生之有寢也建之觀門之內不敢遠其親也位之觀門之左不忍死其親也家語曰天子七廟諸侯五廟自虞至周之所不變也是故虞書禋于六宗以見太祖周官守祧八人以兼薑嫄之宫則虞周七廟可知矣伊尹言七世之廟商禮也禮記荀卿榖梁皆言天子七廟不特周制也則自虞至周七廟又可知矣然存親立廟親親之至恩祖功宗德尊尊之大義古之人思其人而愛其樹尊其人則敬其位況廟乎法施于民則祀之以勞定國則祀之況祖宗乎于是禮以義起而商之三宗周之文武漢之孝文孝武唐之神堯文皇其廟皆在三昭三穆之外歷世不毁此所謂不遷之廟非謂祧也鄭康成之徒以喪服小記言王者立四廟則謂周制七廟文武為二祧親廟四而已則文武不遷之廟在七廟內是臆説也王肅聖證論曰禮自上以下降殺以兩使天子諸侯皆親廟四則是君臣同等尊卑不别也又王祭殤五而下及無親之孫上不及無親之祖不亦詭哉王舜劉歆論之于漢韓退之論之于唐皆與肅同蓋理之所在者無異致也辨韋玄成天子五廟漢書韋玄成傳禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁毁廟之主藏乎太祖五年而再殷祭言一禘一祫也祫祭者殷廟與未毁之主皆合食于太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親疏之殺示有終也周之所以有七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業制禮作樂功德茂盛廟猶不世以行為諡而已又曰祖宗之廟世世不毁繼祖而下五世而迭毁劉歆議曰禮記王制及春秋榖梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也苟有功德則宗之不可預為設數故于殷太甲為太宗太戊為中宗武丁為高宗周公為毋逸之戒舉殷三宗以勸成王由是言之宗無數也然則所以勸帝者之功德博矣或説天子五廟無見文或言中宗高宗者宗其道而毁其廟則名與實異非尊德貴功之意也朱子或問天子之廟其制若何曰唐之文祖虞之神宗殷之七世三宗其詳今不可考獨周制猶有可言然而漢儒之説又有不同矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之説也謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆之説也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之説則武王初有天下之時后稷為太祖而祖紺居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而已至成王時則祖紺祧王季遷而武王祔至康王時則王季祧武王遷而康王祔自此以上亦皆且為五廟而祧者藏于太祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟于西北而謂之文世室于是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟于東北謂之武世室于是康王遷穆王祔而為七廟矣自是以後則穆之祧者藏于文世室昭之祧者藏于武世室而不復藏于太廟矣如劉歆之説則周自武王克殷即增立二廟于二昭二穆之上以祀高圉亞圉始前遞遷至于懿王而始立文世室于三穆之上至孝王時始立武世室于三昭之上此為少不同耳曰然則諸儒與劉歆之説孰為是曰前代儒者多是劉歆愚亦意其或然也祧廟議曰天子七廟宗者不在數中此為禮之正法宗者在數中禮之末失也陳氏澔曰王立七廟而以文武不遷之廟足其數則其實五廟而已若商有三宗則將為四廟乎然則朱子然劉歆之説豈無見乎蕙田案韋玄成論天子七廟實止五廟今核其説乃實止四廟耳玄成曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也此其説有數誤小記而立四廟句上有闕文劉原父吳草廬之説甚明玄成他無所據而引此闕文為據一誤指立四廟為王者之禮雖有配天之祖亦不得立廟則天子止得四廟比諸侯反殺其一二誤禮莫大于配天既祭天以祖配矣而仍不為祖立廟豈宗廟之禮反隆于配天之禮而乃靳之耶三誤配天以功德不限定五世之祖而曰不為立廟親盡也四誤小記之文本言禘祭太祖所自出而以太祖配之如商禘嚳而契配周禘嚳而稷配耳與祭天配天何與而乃以禘為祭天以配為配天五誤若夫功德之廟不可預為設數使文武而下復有可宗之人親廟慮又益殺劉歆之論足以正韋之失矣右四代七廟之制周禮考工記匠人夏后氏世室注世室者宗廟也魯廟有世室此用先王之禮用疏鄭云此用先王之禮者世室此經夏法是用先王之禮也蕙田案世室之名始此禮記明堂位魯公之廟文世室也武公之廟武世室也注此二廟象周有文王武王之廟也世室者不毁之名也疏此一經明魯有二廟不毁象周之文武二祧也任氏啓運曰文武之不遷謂之世室魯以二公比之也蕙田案文世室武世室之名見于此春秋文公十三年世室屋壞榖梁傳世室者何疏解云欲言君寢于例不書欲言宗廟未有世室之名故執不知問魯公之廟也周公稱太廟魯公稱世室羣公稱宫此魯公之廟也注魯公周公子伯禽曷為謂之世室世室猶世室也世世不毁也疏言謂之世室者猶世世室也世室屋壞何以書譏何譏爾久不修也朱子禘祫議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之宫鄭氏曰遠廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏于文武之廟羣穆于文羣昭于武明堂位有文世室武世室鄭氏曰世室者不毁之名也又曰周穆王時文王親盡當祧而以有功當宗故别立一廟于西北而謂之文世室共王時武王親盡當祧而亦以有功當宗故别立一廟于東北而謂之武世室陳氏禮書父昭子穆而有常數者禮也祖功宗德而無定法者義也故周于三昭三穆之外而有文武之廟魯于二昭二穆之外而有魯公之世室觀春秋傳稱襄王致文武胙于齊侯史記稱顯王致文武胙于秦孝公方是時文武固已遠矣襄王顯王猶且祀之則其廟不毁可知矣家語左傳稱孔子在陳聞魯廟火曰其桓僖乎以為桓僖親盡無大功德而魯不毁故天災之其言雖涉于怪而理或有焉若然則魯公之室在所不毁可知矣王舜中劉歆王肅韓退之之徒皆謂天子祖功宗德之廟不在七世之列特鄭康成以周禮守祧有八人小記王者立四廟則謂周制七廟文武為二祧親廟四而已是不知周公制禮之時文武尚為近廟其所以宗之之禮特起于後代也果所以宗之者在七廟內使繼世祖先間有豐功盛德不下文武復在可宗之列則親廟又益殺乎理必不然錢氏梅仙曰天子之廟七不可益亦不可損所謂七廟者高曾祖考親廟四五世六世祧廟二始祖之廟一孔子所謂自虞至周之所不變者此制是也獨有功德之主親盡不遷故周立文武世室不曰廟而曰世室亦以廟制不能加于七耳或謂周立九廟如九廟可立何必又為世室之名哉劉歆謂七者正數其常也宗不在此數中宗變也在殷則成湯而下為中宗高宗祖甲在周則為文武苟有功德則宗之不可預為設數也至于二祧廟為五世六世祖即王肅所謂高祖之父高祖之祖也而韋玄成之徒則云王立七廟者親四始祖一文武不遷合為七此大謬之説也蓋文武在共王時猶在七廟之內至懿王孝王别立二世室則在七廟之外左傳載景王之言曰豫敢忘高圉亞圉朱子謂武王克商增立二祧于二昭二穆之上祀高圉亞圉則七廟之立自武王時已然如合世室而始足七廟之數是周止五廟矣豈周家制禮竟下同于諸侯之制乎必不然矣辨諸家立虛廟王制孔疏天子七廟有其人則七無其人則五之任啓運曰世室二廟有其人則實之無其人則虛馬昭引禮緯云唐虞五廟夏初四廟子孫宗禹而五殷初祖契與親廟而五子孫宗湯而六周初五廟子孫宗文武而七是有虛廟之明證也如魯公始封周公尚在王季文王不得祀于諸侯之廟是五廟皆虛也烏得謂無虛廟乎孔頴達曰凡始封之君謂王之子弟封為諸侯為後世之太祖當此君之身不得立王之廟則全無廟也故諸侯不敢祖天子始封之子得立一廟始封六世之孫始五廟備也朱子曰如劉歆之説周自武王克殷即增立二廟于二昭二穆之上以祀高圉亞圉如前遞遷至于懿王而始立文世室于三穆之上至孝王時始立武世室于三昭之上辨趙德周無文武兩世室趙氏德曰文世室武世室蓋本于禮記明堂位之言魯公之廟文世室也武公之廟武世室也鄭注此二廟象周有文王武王之廟也世室者不毁之名魯公伯禽也武公伯禽之玄孫名敖疏云文世室者魯公伯禽有文德世世不毁其室故云文世室武世室者伯禽玄孫武公有武德其廟亦不毁故云武世室案記禮者之意謂周有文王世室武王世室成王賜魯以天子禮樂故魯有伯禽及武公之廟得以象文王武王不毁之廟也後儒因明堂位之文遂以為周有文世室武世室也三禮辨曰武公之廟蓋已久毁成公二年季孫宿以鞍之戰有功而立之春秋書立武宫左氏公羊並譏之謂不宜立也世室屋壞左氏謂之太室公穀謂之世室武煬皆稱宫無所謂武世室也諸儒或引此以證文王武王之廟為世室誤矣蕙田案趙氏謂武公之廟當不得武世室可也謂周并無文武兩世室可乎春秋傳史記載襄王顯王致文武胙于齊秦是世室不毁之確證明堂位侈張魯禮語雖近誣而所引四代服器官其制度名色無緣都是鑿撰古禮之亡安知不藉此反存其一二耶右世室禮記祭法天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧饗嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟饗嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟饗嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟饗嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼注廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠書曰三壇同墠王皇皆君也顯明也祖始也名先人以君明始者所以尊本之意也天子遷廟之主以昭穆合藏于二祧之中諸侯無祧藏于祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也饗嘗謂四時之祭天子諸侯為壇墠祈禱謂後遷在祧者也既事則反其主于祧鬼亦在祧顧逺之于無事祫乃祭之耳春秋文二年秋大事于太廟傳曰毁廟之主陳于太祖未毁廟之主皆升合食于太祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧明矣惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主耳其無祖考者庶士以下鬼其王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂别子也凡鬼者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶士府史之屬此適士云顯考無廟非也當為皇考字之誤方氏慤曰二祧顯考之父祖也馬氏晞孟曰説者謂七廟之中祧廟二則為文武之廟其説非也遠廟為祧而二祧之廟止于享嘗而已苟文武之廟而祭止享嘗亦非先王所以尊祖宗之意也王制所謂太祖則無可毁之理此天子諸侯大夫之廟而曰去祖為壇則祖有可毁之理何也蓋祭法為無功德者言之王制為有功德者言之此所以不同張氏融曰孝經為之宗廟以鬼享之公羊毁廟之主藏乎太祖五年而再殷祭無去祧為壇去壇為墠去墠為鬼之制祭法所言皆衰世之法楊氏復曰案祭法與王制不同王制天子七廟三昭三穆與太祖之廟而七祭法則序四親廟二祧太祖以辨昭穆王制諸侯五廟二昭二穆與太祖之廟而五祭法則三親廟月祭高太廟享嘗以見隆殺王制大夫三廟一昭一穆與太祖之廟而三祭法但有三親廟而無高太廟有二壇為請禱之祭而已王制士一廟祭法分適士二廟官師一廟又祭法有考王考皇考顯考祖考之稱王制無之祭法有壇有墠或二壇無墠或一壇無墠王制無之大抵王制略而祭法詳又案三壇同墠之説出于金縢乃因有所禱而為之非宗廟之外預為壇墠以待他日有禱也孝經為之宗廟以鬼享之非去壇為鬼也晉張融謂祭法去祧為壇去壇為墠去墠為鬼皆衰世之法則所言難以盡信陳氏澔曰案此章曰王立七廟而以文武不遷之廟為二祧以足其數則其實五廟而已若商有三宗則為四廟乎壇墠之主藏于祧而祭于壇墠猶之可也謂有禱則祭無禱則止則大祫升毁廟之文何用乎又宗廟之制先儒講之甚詳未有舉壇墠為言者周公三壇同墠非此義也又諸儒以周之七廟始于共王之時夫以周公制作如此其盛而宗廟之制顧乃下同列國吾知其必不然矣然則朱子然劉歆之説豈無見乎鄭注此章謂祫乃祭之蓋亦覺記者之失矣徐氏師曾曰去墠為鬼則王者何以有禘乎其謬甚矣郝氏敬曰案王制天子七廟三昭三穆與太祖之廟而七天子諸侯皆有太祖無祧壇墠鬼此不言太祖泛云祖考逺廟為祧則似世遠去太祖亦不免矣至使壇墠露處絶其血食故鄭有祫乃祭之之説以救之實非記本意記有禱焉祭之無禱乃止未及祫也然則祭法與王制其誰為先王之舊乎人生有貴賤孝先之情本一自官師不得與士大夫同祀其祖至于庶士庶人不幸不得為大夫士而親死即為無祀之鬼諒非先王制禮之意蕙田案祭法與王制不合諸儒多以祭法為疑今考此條蓋本于家語而汲古閣所刋家語與葛氏本其文亦有異同則係漢儒附會理或有之今并附于後以俟參考家語廟制衛將軍文子將立先君之廟于其家使子羔訪于孔子子曰公廟設于私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得而聞乎孔子曰天下有王分地建國設祖宗乃為親疏貴賤多少之數是故天子立七廟三昭三穆與太祖之廟而七近廟皆月祭之遠廟為祧有二祧焉享嘗乃止諸侯立五廟二昭二穆與太祖之廟而五祖考廟享嘗乃止大夫三廟一昭一穆與太祖之廟而三享嘗乃止士一廟曰考廟王考無廟合而享嘗乃止庶人無廟四時祭于寢此自有虞以至于周之所不變也凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也應為太祖者則其廟不毁不及太祖雖在禘郊其廟則毁矣古者祖有功而宗有德諸見祖宗者其廟皆不毁汲古閣本葛氏本衛將軍將立三軍之廟于其家使子羔訪于孔子子曰公廟設于私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得而聞乎孔子曰天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故天子立七廟三昭三穆與太祖之廟七曰太祖有一壇有一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼諸侯立五廟二昭二穆與太祖之廟五曰祖考廟有一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇有禱焉祭之無禱乃止去墠為鬼大夫立三廟一昭一穆與太祖之廟三曰皇考廟有一壇考廟月祭王考廟皇考廟為始祖廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼適士二廟曰王考廟有一壇曰考廟曰王考廟享嘗乃止皇考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶人無廟四時祭于寢此自有虞以至于周之所不變也諸見祖宗作謂之祖宗禮記喪服小記王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之鄭注四廟高祖以下與始祖而五方氏慤曰王立七廟三昭三穆與太祖之廟而七此言王止曰立四廟者據月祭之親廟言之也蓋遠廟為祧有二祧享嘗乃止既言禘其祖之所自出以其祖配之則祭及其二祧可知矣此所以不言之也徐氏師曾曰案天子七廟并二世室而九豈有止立五廟之理方氏以為此據月祭之廟言之理或然也劉氏牧曰而立四廟云天子立四廟非也此一句上有脫簡耳當曰諸侯及其太祖而立四廟吳氏澄曰而立四廟四字無所系屬義不可通劉氏曰此句上有缺文當曰諸侯及其太祖而立四廟案大傳以其祖配之之下有此六字劉氏所謂有缺文者是也今從其説而以大傳篇之文補之言諸侯不得如天子之追禘太祖以上所祭上及太祖而止耳而太祖之下則立二昭二穆之廟為四親廟也陳氏禮書庶子王亦如之者禮為人後者為父母期公子為後為其母于子祭于孫否蓋為人後者雖受重于所後而不廢父母期公子為後雖受重于君母而不廢其母祭則庶子為王雖有正統之七廟其可輒廢祖考之祭乎于是自立四廟以視始受命而王者所以著其不忘本也昔漢宣帝以從孫繼昭帝患昭穆之體一也于是立悼皇考廟以當一代之穆而王舜中劉歆以為孝宣以兄孫繼統為孝昭後考廟固不當立纍世奉之是兩統二父也然宣帝以悼皇考當一代之穆固不合禮若特立廟乃庶子王之所當立者謂不當立誤矣王舜劉歆當作王莽中字衍陸氏佃曰此言王者後世衰亂統序既絶其子孫有特起者若漢光武復有天下既復七廟則其曾祖禰當别立廟祀之故曰庶子王亦如之也若孝文繼孝惠雖非適子其承祭祀不言可知今經言此者正為庶子不祭庶子王然後祭耳蕙田案立四廟徐伯魯以月祭之廟言亦屬強解劉氏吳氏脫簡之説近是且有大傳之文亦不可為無據也附辨杜氏不毁高圉亞圉廟春秋昭七年左氏傳余敢忘高圉亞圉杜注周人不毁其廟報祭之孔穎達王制疏曰案周禮惟存后稷之廟不毁案昭七年傳注似高圉亞圉廟亦不毁者此是不合鄭説故馬融説云周人所報而不立廟辨郝敬不信七廟五廟郝氏敬曰案七廟不見于詩書孔書云七世之廟非必真伊尹語儀禮周禮榖梁家語等書大抵與記先後雜出未可相徴或稱虞夏五廟殷六廟周七廟或云九廟以至於十二廟祭法又云適士二廟官師一廟未知誰是夫尊祖敬宗人有同心天子道隆德尊何以恩窮七世諸侯五世上不得伸情大夫祭不得越祖禰士庶人則并王父母不祭豈人情乎蕙田案郝氏之意以七世五世為不足而欲軼而過之蓋以後世世世不毁之典為是而魯立煬宫以諸侯而祭二十一傳之祖亦不非也且書明言七世之廟京山自不信耳而乃以為不見於詩書不亦誣乎右經傳言廟不同五禮通考卷五十八
