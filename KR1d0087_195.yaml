是也夫月之陰陽律隨時變遷而必於春秋測之何耶凡言至者皆要其數之所極則必有中數以為之衷如日道有南至北至相差四十七度奇而其中數則赤道也月有陰律有陽律出入於黄道各六度弱而其中數則黄道也夫黄道之在冬夏既自相差四十七度竒則已無定度又何以為月道之中數乎惟春秋二分之黄道與赤道同度則其東出西没及過午之度並與赤道無殊於此測月可得陰陽律出入黄道之真度矣假如二分之望月在其衝春分之望月必在秋分之宿度秋分之望月必在春分之宿度則日沒於酉正而月出於夘正日出於夘正而月沒於酉正其出沒方位必居夘酉正中與日相等然而或等焉或不等焉或有時而出沒於酉正夘正之南則知其在陽律也有時而在夘正酉正之北則知其在陰律也又此時日之過午也必與本處之赤道同髙即冬夏二至日軌髙度折中之處則月亦宜然然而月之過午或有時而髙於日度則知其在陰律也有時而卑於日度則知其在陽律也若月之出沒在夘酉之正而不偏南北月之過午一如日軌之度而略無髙卑則為正當交道而有虧食故曰惟春秋可以測月也又曰但以日軌為主則春秋致月亦致日之餘事即於兩弦立説亦足以明若正言致月之理則必將詳考其交道出入之端與夫陰陽律逺近之距則兼望言之其理益著也問陰陽律之法於兩弦亦可用乎曰可凡冬夏至表景既有土圭之定度夏至尺五寸即土圭之定度也冬至景丈三尺葢亦以土圭之度度之而知則月亦宜然而今測月景每有不齊則交道可知假如春分日在婁而月上弦於東井秋分日在角而月下弦於東井則是月所行者夏至日道也其午景宜與土圭等又如春分日在婁而月下弦於牽牛秋分日在角而月上弦於牽牛則是月行冬至日道也其午景宜與土圭所度冬至長景等而徴之所測或等焉或不等焉其等於定度者必月交黄道之度也其短於定度者必月在日道之北而為陰律也其長於定度者必月在日道之南而為陽律也是故兩弦亦可以測陰陽律也然則陰陽律之變動若此又何以正四時之叔曰日道之出入赤道也距逺至廿四度月道之出入黄道最逺止六度距廿四度故景之進退也大夏至尺五寸冬至一丈三尺相去懸絶距止六度故景之進退也小陰律陽律之月景所差于日景者不過尺許而已假如月上下弦在東井而景更短於土圭其為夏至之陰律更無可疑即使是陽津而景長於土圭其長不過尺許無害其為夏至之黄道也又如月上下弦在牽牛景加長於土圭所定之度其為冬至之陽律已成確據即使是陰律而景短於土圭所定之度其短亦不過尺許無損其為冬至之日道也夫兩弦之月道既在二至之度則日躔必在二分而四叙不忒故曰舉弦立説亦足以明也或疑洛下閎製渾儀止知黄道至東漢永元銅儀始知月道至陰陽交道之説後代始宻周禮所言致月或未及此曰洪範言日月之行則有冬有夏是古有黄道也十月之交見於詩是古知交道也洛下閎等草創於祖龍煨燼之餘故制未備而以此疑周禮乎夫謂術屢變益精者如歲差之類必數十年始差一度故久而後覺若月之陰陽律月必一周視黄道之變尤為易見而謂古人全不之知吾不信也或又疑土圭只尺有五寸則惟北至時可用餘三時何以定之曰經固言日北景長日南景短矣其長其短亦必有數則皆以土圭之尺寸度之耳然則長日至景如土圭者冬日至景必數倍於土圭而以土圭度之無難得其丈尺故冬夏並言致日也李氏光地曰算法之要惟定二至二分為先二至定則律元正矣必也立表測晷檢驗長短之極如祖沖之及今法之宻焉此冬夏致日之説也日行有贏縮算自秋分至春分之前縮自春分至秋分之前贏若但以百八十二日中分之以求赤道之交則晷景不得矣此亦可以立表㕘求而今法更得一術用日月東西對望檢之便得二分之正葢冬行南陸則地上之天少而地下之天多夏行北陸則地上之天多而地下之天少其日月之東西相對者非望也惟春分秋分行於中道則日月對衝於地平即真望矣以其真望之在何時檢二分之所在此春秋致月之説也冬夏致日者於南北春秋致月者於東西亦各以其方位為此説者以為獨得之秘而不知古之聖人知此久矣蕙田案春秋傳日在北陸而藏氷西陸朝覿而出之爾雅北陸虚也西陸昴也推是而言東陸鳥也南陸火也四陸即天之四象唐虞時冬至日在虚行北陸夏至日在七星行南陸後漢志日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋與春秋傳同漢冬至日在斗北陸之宿也今冬至日在箕屬東北維夏至日在參屬西南維至於日道發南不可謂之行南陸日道斂北不可謂之行北陸相承誤用非也冬夏致日測黄道也春秋致月測月道也亦名白道觀承案南陸北陸之名相沿而誤解久矣榕村亦不免承訛而未覺日道發南不可謂行南陸日道斂北不可謂行北陸剖晰豁然可為燭龍矣右致日月以正節氣周禮夏官挈壺氏注壺盛水器也世主挈壺水以為漏凡軍事縣壺以序柝凡喪縣壺以代哭者皆以水火守之分以日夜注以水守壺者為沃漏也以火守壺者夜則火視刻數也分以日夜者異晝夜漏也漏之箭共百刻冬夏之間有長短焉秋官司寤氏掌夜時注夜時謂夜晚早若今甲乙至戌疏此文與下為目故注云謂夜晚早甲乙則早時戌亥則晚時也以星分夜以詔夜士夜禁注夜士主行夜徼候者如今都候之屬云疏以星分夜者若今時觀參辰知夜早晚是以書傳春昏張中可以種稷夏大火中可以種黍菽虚中可以種麥冬昴中可以収斂葢藏彼雖非分夜以詔夜士亦是以星知早晚之類也蕙田案素問曰一日一夜五分之漢書西域傳杜欽曰斥候士五分夜擊刁斗自守隋志曰晝有朝有禺有中有晡有夕夜有甲乙丙丁戊昏旦有中星顔氏家訓曰漢魏以來謂為甲夜乙夜丙夜丁夜戊夜亦云一更二更三更四更五更皆以五為節此鄭注甲乙至戊戊譌作戌賈疏遂言戌亥非也以星分夜者視星移次某星中或某星見為甲夜乙夜也隋書天文志昔黄帝創觀漏水制器取則以分晝夜其後因以命官周禮挈壺氏則其職也其法總以百刻分于晝夜冬至晝漏四十刻夜漏六十刻夏至晝漏六十刻夜漏四十刻春秋二分晝夜各五十刻日未出前二刻半而明既沒後二刻半乃昏減夜五刻以益晝漏謂之昏旦漏刻皆隨氣增損冬夏二至之間晝夜長短凡差二十刻每差一刻為一箭冬至互起其首凡有四十一箭晝有朝有禺有中有晡有夕夜有甲乙丙丁戊昏旦有星中每箭各有其數皆所以分時代守更其作役漢興張蒼因循古制猶多踈濶及孝武考成星術下漏以追天度亦未能盡其理劉向鴻範傳記武帝時所用法云冬夏二至之間一百八十餘日晝夜差二十刻大率二至之後九日而增損一刻焉至哀帝時又改用晝夜一百二十刻尋亦寢廢至王莽竊位又遵行之光武之初亦以百刻九日加減法編於甲令為常符漏品至和帝永元十四年霍融上言官術率九日增減一刻不與天相應或時差至二刻半不如夏術漏刻隨日南北為長短乃詔用夏術漏刻依日行黄道去極每差二度四分為增減一刻凡用四十八箭終於魏晉相傳不改宋何承天以月蝕所在當日之衡考驗日宿知移舊六度冬至之日其影極長測量晷度知冬至移舊四日前代諸漏春分晝長秋分晝短差過半刻皆由氣日不正所以而然遂議造漏法春秋二分昏旦晝夜漏各五十五刻齊及梁初因循不改至天監六年武帝以晝夜百刻分配十二辰辰得八刻仍有餘分乃以晝夜為九十六刻一辰有全刻八焉至大同十年又改用一百八刻依尚書考靈曜晝夜三十六頃之數因而三之冬至晝漏四十八刻夜漏六十刻夏至晝漏七十刻夜漏三十八刻春秋二分晝漏六十刻夜漏四十八刻昏旦之數各三刻先令祖暅為漏經皆依渾天黄道日行去極逺近為用箭日率陳文帝天嘉中亦命舍人朱史造漏依古百刻為法周齊因循魏漏晉宋梁大同並以百刻分於晝夜隋初用周朝尹公正馬顯所造漏經至開皇十四年鄜州司馬袁充上晷影漏刻充以短影平儀均布十二辰立表隨日影所指辰刻以驗漏刻之節十二辰刻互有多少時正前後刻亦不同袁充素不曉渾天黄道去極之數茍役私智變改舊章其於施用未為精宻開皇十七年張胄元用後魏渾天鐵儀測知春秋二分日出夘酉之北不正當中與何承天所測頗同皆日出夘三刻五十五分入酉四刻五十五分晝漏五十刻一十分夜漏四十九刻四十分晝夜差六十分刻之四十仁夀四年劉焯上皇極術有日行遲疾推二十四氣皆有盈縮定日春秋分定日去冬至各八十八日有竒去夏至各九十三日有竒二分定日晝夜各五十刻又依渾天黄道驗知冬至夜漏五十九刻一百分刻之八十六晝漏四十刻一十四分夏至晝漏五十九刻八十六分夜漏四十刻一十四分冬夏二至之間晝夜差一十九刻一百分刻之七十二胄元及焯漏刻並不施用然其法制皆著在算術推驗加時最為詳審大業初取詢作古欹器以漏水注之獻於煬帝帝善之因令與宇文愷依後魏道士李蘭所修道家上法稱漏制造稱水漏器以充行從又作候影分箭上水方器置於東都乾陽殿前鼓下司辰又作馬上漏刻以從行辨時刻揆日晷下漏刻此二者測天地正儀象之本也晷漏沿革今古大殊故列其差以補前闕困學紀聞考五代會要晉天福三年司天臺奏漏刻經云晝夜一百刻分為十二時每時有八刻三分之一六十分為一刻一時有八刻二十分四刻十分為正前十分四刻為正後二十分中心為時正上古以來皆依此法沈括晷漏議予占天候景以至驗於儀象考數下漏凡十餘年下漏家常患冬月水澀夏月水利以為水性如此又疑氷澌所壅萬方理之終不應法予以理求之冬至日行速天運已朞而日已過表故百刻而有餘夏至日行遲天運未朞而日已至表故不及百刻既得此數然後覆求晷景漏刻莫不脗合此古人之所未知也宋史志淳熈十四年國學進士會稽石萬言淳熈術立元非是氣朔多差不與天合南渡以來渾儀草創不合制度無圭表以測日景長短無機漏以定交食加時設欲考正其差而太史局官尚如去年測驗太陰虧食自一更一㸃還光一分之後或一㸃還光二分或一㸃還光三分以上或一㸃還光三分以下更㸃乍疾乍徐随影走弄以肆欺蔽然其差謬非獨此耳冬至日行極南黄道出赤道二十四度晝極短故四十刻夜極長故六十刻夏至日行極北黄道入赤道二十四度晝極長故六十刻夜極短故四十刻春秋二分黄赤二道平而晝夜等故各五十刻此地中古今不易之法至王普重定刻漏又有南北分野冬夏晝夜長短三刻之差今淳熈術皆不然冬至晝四十刻極短夜六十刻極長乃在大雪前二日所差一氣以上自冬至之後晝當漸長夜當漸短今過小雪晝猶四十刻夜猶六十刻所差七日有餘夏至晝六十刻極長夜四十刻極短乃在芒種前一日所差亦一氣以上自夏至之後晝當漸短夜當漸長今過小暑晝猶六十刻夜猶四十刻所差亦七日有餘及晝夜各五十刻又不在春分秋分之下至於日之出入人視之以為晝夜其長短有漸不可得而急與遲也今日之出入增減一刻近或五日逺或三四十日而一急一遲與日行常度無不合者請考正淳熈法之差俾之上不違於天時下不違於人事送秘書省禮部詳之明史天文志崇禎二年禮部侍郎徐光啟兼理厯法請造象限大儀六紀限大儀三平懸渾儀三交食儀一列宿經緯天球一萬國經緯地球一平面日晷三轉盤星晷三候時鍾三望逺鏡三報允已又言定時之法當議者五事一曰壺漏二曰指南鍼三曰表臬四曰儀五曰晷漏壺水有新舊滑濇則遲疾異漏管有時基時磷則緩急異正漏之初必於正午初刻此刻一誤靡所不誤故壺漏特以濟晨昏陰晦儀晷表臬所不及而非定時之本指南鍼術人用以定南北辨方正位咸取則焉然鍼非指正子午曩云多偏丙午之間以法考之各地不同在京師則偏東五度四十分若慿以造晷冬至午正先天一刻四十四分有竒夏至午正先天五十一分有竒若表臬者即考工匠人置𣙗之法識日出入之影參諸日中之影以正方位今法置小表於地平午正前後累測日影以求相等之兩長影為東西因得中間最短之影為正子午其術簡甚儀者本臺故有立運儀測驗七政髙度臣用以較定子午於午前屢測太陽髙度因最髙之度即得最短之影是為南北正線既定子午夘酉之正線因以法分布時刻加入節氣諸線即成平面日晷又今所用員石欹晷是為赤道晷亦用所得正子午線較定此二晷皆可得天之正時刻所為晝測日也若測星之晷實周禮夜考極星之法然古時北極星正當不動之處今時久漸移已去不動處三度有竒舊法不可復用故用重盤星晷上書時刻下書節氣仰測近極二星即得時刻所謂夜測星也七年督修厯法右參政李天經言輔臣光啟言定時之法古有壺漏近有輪鐘二者皆由人力遷就不如求端於日星以天合天乃為本法特請製日晷星晷望逺鏡三器臣奉命接管敢先言其略日晷者礱石為平面界節氣十三線内冬夏二至各一線其餘日行相等之節氣皆兩節氣同一線也平面之周列時刻線以各節氣太陽出入為限又依京師北極出地度範為三角銅表置其中表體之全影指時刻表中之鋭影指節氣此日晷之大略也星晷者治銅為柱上安重盤内盤鐫周天度數列十二宫以分節氣外盤鐫列時刻中横刻一縫用以窺星法將外盤子正初刻移對内盤節氣乃轉移銅盤北望帝星與勾陳大星使兩星同見縫中即視盤面鋭表所指為正時刻此星晷之大略也若夫望逺鏡亦名窺筩其製虚管層疊相套使可伸縮兩端俱用玻璃随所視物之逺近以為長短不但可以窺天象且能攝數里外物如在目前至於日晷星晷皆用措置得宜必須築臺以便安放新法算引太陽在地平上人目可得而覩謂之晝太陽漸隠地平之下人目無見則謂之夜是晝夜者全由人居以分随方極出地若干随時太陽躔某宫其晝夜刻分皆可依法推算焉然而法算與目見恒異葢太陽體大算法皆以體心出地為晝始而人目以一見日輪即為晝始又日出沒升降度有斜正不同又地平各曜出沒之界受清蒙氣有變凡此皆非人目能辨故術家立有視差法也一晝一夜平分為十二時時各八刻一日十二時共刻九十有六此恒率也其晝夜永短遞遷之故則不但日行南陸北陸不同而已亦由北極出地髙卑互異而永短因焉如赤道正過天頂之地兩極合於地平其晝夜均停絶無永短又極在天頂赤道與地平平行其下晝夜亦無長短之較但太陽百八十日恒見百八十日恒隠耳此外諸方各有永短顧其一歲之中晝夜均停者四日握算者引而伸之據四日之一日逐漸加減因得九十日之晝夜長短随可以推終歲之數也晨昏者分晝分夜之二界也太陽將出未出數刻之前其光東發星光漸為所奪是名為晨太陽已入廻光返照亦經數刻始逌然滅盡是名為昏其久暫分數亦因冬夏而分短長新法以日在地平下十八度内為晨昏之限但太陽行此十八度又各方各宫不等因有五刻七刻十刻之别若論極髙七十二度以上之度則夏月晨昏相切雖至丙夜無甚黯黑也欽定協紀辨方書日出入之早晚晝夜永短所由分也而早晚之故有二一由於日行之内外一由於人居之南北葢日行黄道與赤道斜交春秋分日行正當交㸃與地平交於夘酉也平上下之度相等故晝夜適均春分以後日行赤道内至夏至而極其距等圈與地平交於寅戊地平上下之度上多下少故晝長夜短秋分以後日行赤道外至冬至而極其距等圈與地平交於辰申地平上下之度上少下多故晝短夜長二分前後距交不逺黄道勢斜則緯行疾故數日而差一刻二至前後黄道勢平則緯行遲故半月而差一刻此由日行之内外而生者也至於人居有南北則北極出地有髙下於是見日之出入早晚随地不同中國在赤道北北極出地上南極出地下故夏晝長冬晝短自京而北北極愈髙則永短之差愈多至於北極之下則赤道當地平夏則有晝而無夜冬則有夜而無晝葢以半年為晝半年為夜矣所居之地愈南北極漸低則永短之差漸少至於赤道之下則兩極當地平而晝夜常均矣赤道以南與北相反此由人居之南北而生者也朦影者古所謂晨昏分也太陽未出之先己入之後距地平下一十八度皆有光故以十八度為朦影限然十八度同也而時刻則随時随地不同随時不同者天度使然也葢十八度者大圈之度也赤道亦為大圈其度濶自赤道而南北皆距等圈其度狹近二分者以濶度當濶度故刻分少近二至者以狹度當濶度故刻分多也随地不同者地南則赤道距天頂近太陽正升正降其度徑地北則赤道距天頂逺太陽斜升斜降其度紆故愈北則朦影之刻分愈多愈南則朦影之刻分愈少也若夫北極出地四十八度半以上則夏至之夜半猶有光愈北則愈不夜矣南至赤道下則二分之刻分極少而二至之刻分相等赤道以南反是顧氏炎武曰術家有大刻有小刻初一初二初三初四正一正二正三正四謂之大刻合一日計之得九十六刻其不盡者置一初初於初一之上置一正初於正一之上謂之小刻每刻止當大刻六分之一合一日計之為初初者十二為正初者十二又得四大刻合前為百刻宋王逵蠡海集言百刻之説每刻分為六十分百刻共得六千分散于十二時每時得五百分如此則一時占八刻零二十分将八刻截作初正各四刻却将二十分零數分作初初正初微刻各一十分也周禮挈壺氏注漏箭晝夜共百刻禮記樂記百度得數而有常注百度百刻也靈樞經漏水下百刻以分晝夜説文漏以銅受水刻節晝夜百刻五代史馬重績傳重績言漏刻之法以中星考晝夜為一百刻八刻六十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之玉海每時初行一刻至四刻六分之一為時正終八刻三分之一則交入次時國史志每時八刻二十分每刻一擊鼔八鼔後進時牌餘二十分為雞唱唱絶擊一十五鼔為時正李氏光地曰今日用九十六刻葢得易之真數八卦六爻互相乘之數也蕙田案古刻法晝夜共百刻每刻六分之為六小刻每小刻又十分之故晝夜六千刻每刻六十分也其散於十二辰每一辰四大刻二小刻共得五百分漢建平中改百刻為百二十刻若不改分則五十分為一刻十刻為一辰也梁天監中改用整刻九十六若不改分則每刻得六十二分有半二法皆不若古用八大刻二小刻之宻囘囘晝夜刻法亦用整刻九十六每一辰八整刻而以四刻為一小時猶夫古法之有初初初一初二初三初四正初正一正二正三正四也每小時六十分猶夫古法每刻六十分之意而變用之也其度法有初度有一度亦猶古法有初初初一正初正一也周天用三百六十度亦猶晝夜三十六頃之説也今歐邏巴刻法悉同囘囘右漏刻星晷五禮通考卷一百八十五
