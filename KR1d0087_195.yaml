body:
  text: 五禮通考卷一百八十五刑部尚書秦蕙田撰嘉禮五十八觀象授時書堯典日中星鳥以殷仲春傳日中謂春分之日鳥南方朱鳥七宿殷正也春分之昏鳥星畢見以正仲春之氣節轉以摧季孟則可知目水星火以正仲夏傳永長也謂夏至之日火蒼龍之中星舉中則七星見可知以正仲夏之氣節季孟亦可知宵中星虚以殷仲秋傳宵夜也春言日秋言夜互相備虚𤣥武之中星亦言七星皆以秋分日見以正三秋日短星昴以正仲冬傳日短冬至之日昴白虎之中星亦以七星並見以正冬之三節疏馬融云古制刻漏晝夜百刻晝長六十刻夜短四十刻晝短四十刻夜長六十刻晝中五十刻夜亦五十刻融之此言據日出見為説天之晝夜以日出入為分人之晝夜以昏明為限日未出前二刻半為明日入後二刻半為昏損夜五刻以禆於晝則晝多於夜復校五刻古今數術與大史所候皆云夏至之晝六十五刻夜三十五刻冬至之晝四十五刻夜五十五刻春分秋分之晝五十五刻夜四十五刻此其不易之法也然今太史細候之法則校常法半刻也從春分至於夏至晝漸長増九刻半夏至至於秋分所減亦如之從秋分至於冬至晝漸短減十刻半從冬至至於春分其増亦如之又於每氣之間増減刻數有多有少不可通而為率漢初未能審知率九日増減一刻和帝時待詔霍融始請改之曲禮説軍陳象天之行前朱雀後𤣥武左青龍右白虎雀即鳥也武謂龜甲捍禦故變文𤣥武焉是天星有龍虎鳥龜之形也四方皆有七宿各成一形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成龜形皆西首而東尾以南方之宿象鳥故言鳥謂朱鳥七宿也此經舉宿為文不類春言星鳥總舉七宿夏言星火獨指房心虚昴惟舉一宿文不同者互相通也計仲春日在奎婁而入於酉地則初昏之時井鬼在午栁星張在巳軫翼在辰是朱鳥七宿皆得見也天道左旋日體右行故星見之方與四時相逆春則南方見夏則東方見秋則北方見冬則西方見此則勢自當然馬融鄭𤣥以為星鳥星火謂正在南方春分之昏七星中仲夏之昏心星中秋分之昏虚星中冬至之昏昴星中皆舉正中之星不為一方盡見此其與孔異也至于舉仲月以統一時亦與孔同王肅亦以星鳥之屬為昏中之星其要異者以所宅為孟月日中星永為仲月星鳥星火為季月以殷以正皆總三時之月讀仲為中言各正三月之中氣也以馬融鄭𤣥之言不合天象星火之屬仲月未中故為每時皆歴陳三月言日以正仲春以正春之三月中氣若正春之三月中當言以正春中不應言以正仲春王氏之説非文勢也孔氏直取畢見稍為迂濶比諸王馬於理最優計七宿房在其中但房心連體心統其名左𫝊言火中火見詩稱七月流火皆指房心為火故曰火蒼龍之中星特舉一星與鳥不類故曰舉中則七星見可知計仲夏日在東井而入於酉地即初昏之時角亢在午氐房心在巳尾箕在辰是東方七宿皆得見也北方七宿則虚為中故虚為𤣥武之中星計仲秋日在角亢而入於酉地初昏之時斗牛在午女虚危在巳室壁在辰舉虚中星言之亦言七星皆以秋分之日昏時並見以正秋之三月齊氏召南曰孔疏于日短星昴以正仲冬似脱正義一叚堯時冬至日躔所在術家多以意説宋何承天隋袁充皆謂日在湏女十度已為近之唐一行直謂日在虛一則星火星昴皆以仲月昏中得其解矣潘氏士遴曰凡測星治地令平規而圜之徑二十步一尺七寸四分寸之二六尺為步周三百六十五寸二十五分一尺為一度以象周天之數立一表於地規之中命曰中表不動從表之北向南而望星置一表於正南之經頭命曰逰儀之表每日逐星西過以尺量其下去所表之數每一尺為一度候星以牽牛為始望星在正南之昏時為法從此以後日西過經八日昏時女星來中故牛為八度復候女星至十二日後虚星來中故為十二度復候虚星至十日後危星來故虚為十度欽定書經傳説彚纂測中星亦所以測日也恒星當午自人視之為天之中故曰中星蓋因晝有日光而不見星故於初昏測之既得中星計至日入度分加入昏刻所行而太陽之真躔乃得確據晝測日影夜考中星此觀象之要務也又中星諸方各異随時不同故分測四方參互考驗始無差忒然恒星随天左旋自東而西又有自行度分自西而東每歲所行今定為五十一秒即古之歲差也其自行分秒雖微久則自著堯時春分日躔在昴而初昏中星為鶉鳥今之春分日躔在室而初昏中星則在東井自堯至今四千餘年而相差若此是知術不可以一時為凖法不可以一隅而定惟使疇人專家明習其理随時随地實測互証常加修改協於天行斯無弊之良法也戴氏震詩補傳日中宵中日永日短此終古不變者也星鳥星火星虚星昴此列宿之舉目可見千百年乃覺其大差随時為書以示民者也二者相為經緯唐虞時孟春日在奎仲春在胃季春在參夏小正三月參則伏以日所躔故伏而不見也稽諸古籍惟夏小正與堯典多合其時未甚相逺至周則恒星東移已及一次春分日躔降婁月令仲春日在奎昏弧中周未然也今則又移一次矣據乎堯典星象為首二萬五千四百餘年乃復此象夏小正四月初昏南門正南門兩大星横亢下夀星次也南門正則夀星正值午位矣五月初昏大火中大火心也夏至日躔鶉火故房心昏中堯典夏小正其象合至周夏至日躔鶉首周初日在栁月令仲夏日在東井昏亢中周未然也豳風七月流火則因六月昏火中矣月令言於季夏與詩合夏小正八月辰則伏三月辰繫于日心為大辰秋分以後日所躔之宿也與堯典合至周秋分日躔夀星周初日在亢氐月令仲秋日在角昏牽牛中周末然也夏小正十月織女正北鄉則旦織女恒鄉降婁降婁值子星紀必值卯日所在之次也十一月則日在𤣥枵春秋傳𤣥枵虚中也唐虞時冬至日蓋在虚五六度至周冬至日躔星紀周初日在牽牛月令仲冬日在斗昏東壁中周末然也説者咸謂斗牛為列宿之首故謂之星紀言星自此紀也考周初日在牽牛至周末則在斗皆星紀之次由是觀之日月之行起于斗牛特周時之天象堯典仲冬星昴日月之行起于𤣥枵正中不以星紀序首矣十二次之名必周時始定堯典曰鳥曰火曰虛曰昴蓋據當時所有之名言之以鳥為全舉南陸之宿火為全舉大火之宿者非也猶之古人但有分至啟閉後人遂定為二十四氣而或存古名或更立名事正相類蕙田案唐虞時春分日在胃末昴初故初昏七星中七星鶉火次也鶉火值正午則鶉首值未鶉尾值巳夏至日在七星故初昏心中大火次也大火值正午則夀星值未析木之津值巳仲秋日在氐房故初昏虚中𤣥枵次也𤣥枵值正午則星紀值未娵訾之口值巳冬至日在虚五六度故初昏昴中大梁次也大梁值正午則降婁值未實沉值已馬融鄭康成之説得之凡列宿之差越二千一百餘年則東移一次孔疏不知列宿有推移據周末星象以釋堯典疎矣况巳午未為正南堯典言中星而舉偏東辰巳午三位何哉王肅以星鳥星火為季月者亦據月令釋堯典其説非也觀承案堯典中星只舉鳥火虚昴之四宿而不指天體則星自星天自天而歲差之法自在其中矣其以鳥火虚昴循序而分四仲則天左旋恒星七曜亦本左旋之理亦明矣其後人謂恒星右移者即是古人逆算之截法耳然其理只一合來無異正不必自髙其術也夏小正正月初昏參中斗柄縣在下傳言斗柄者所以著參之中也三月參則伏傳伏者非亡之辭也星無時而不見我有不見之時故曰伏云四月昴則見初昏南門正傳南門者星也歲再見一正五月參則見傳參也者牧星也初昏大火中傳大火者心也六月初昏斗柄正在上傳五月大火中六月斗柄正在上用此見斗柄之不正當心也葢當依依尾也七月漢案户傳漢也者天河也案户也者直户也言正南北也初昏織女正東鄉斗柄縣在下則旦八月辰則伏傳辰也者謂心也伏也者入而不見也參中則旦九月辰繫於日十月初昏南門見傳南門者星也及此再見也織女正北鄉則旦傳織女星名也唐書志大衍日度議曰夏小正雖頗疎簡失傳乃羲和遺跡何承天循大戴之説復用夏時更以正月甲子夜半合朔雨水為上元進乖夏紀退非周正故近代推月令小正者皆不與古合開元術推夏時立春日在營室之末昏東井二度中古法以參右肩為距方當南正故小正曰正月初昏斗杓懸在下魁枕參首所以著參中也季春在昴十一度半去參距星十八度故曰三月參則伏立夏日在井四度昏角中南門右星入角距西五度其左星入角距東六度故曰四月初昏南門正昴則見五月節日在輿鬼一度半參在日道最逺以渾儀度之參體始見肩其股猶在濁中房星正中故曰五月參則見初昏大火中八月參中則曙失傳也辰伏則參見非中也十月初昏南門見亦失傳也定星方中則南門伏非昏見也蕙田案建寅之月夏以為正月於時日躔降婁初昏參已過中猶云參中者舉大體言之非若後代求諸度分之細也斗柄縣在下者史記云杓攜龍角衡殷南斗魁枕參首參中則魁南上杓北下矣二月日躔大梁三月日躔實沈參伏者日所在之宿故伏而不見也四月日躔鶉首故昴宿朝覿南門在亢氐之南五月日躔鶉火故參宿朝覿大火中者夏以建午之月周以建未之月左傳張趯日火星中而寒暑退謂建丑之月旦中寒退建未之月昏中暑退也六月日躔鶉尾斗魁北下故杓南上也七月日躔夀星漢案户者與户南北直也織女三星恒嚮降婁夀星西入則降婁東陞故初昏織女東嚮斗柄縣在下者魁枕參首魁參相應也七月斗柄縣在下則旦八月參中則旦皆略舉大體八月日躔大火辰則伏者爾雅大火謂之大辰日所在之宿故伏也旦參中者已過中猶言之舉大體也九月日躔析木之津辰繫于日者日將出心乃見東方也十月日躔星紀南門二星朝見於東南隅非昏見也初昏二字衍文織女北嚮者星紀東陞故降婁值北織女恒嚮降婁者也十有一月日躔𤣥枵十有二月日躔娵訾之口凡夏小正星象合之堯典不殊大衍術謂小正為羲和遺跡者得之其所推日躔中星尚未盡合詩鄘風定之方中定之方中作于楚宫𫝊定營空也方中昏正四方箋定星昏中而正於是可以營制宫室故謂之營室定昏中而正謂小雪時其體與東壁連正四方疏釋天云營室謂之定孫炎曰定正也天下作宫室者皆以營室中為正釋天云娵觜之口營室東壁也孫炎曰營室東壁四方似口故因名云戴氏震詩補傳定為大水春秋傳水昏正而栽是也周時建亥之月日在尾故初昏定中唐虞建戍之月今建子之月其象如此然則土功視定中為候據周制爾營室之名或亦起於周也詩豳風七月七月流火九月授衣傳火大火也流下也九月霜始降婦功成可以授冬衣矣先箋大火者寒暑之候也火星中而寒暑退故將言寒著火所在疏昭三年左傳張趯曰火星中而寒暑退服䖍云火大火心也季冬十二月平旦正中在南方大寒退季夏六月黄昏火星中大暑退是火為寒暑之候事也知此兩月昏旦火星中者月令季夏昏火星中六月既昏中以衝反之故十二月旦而中也若然六月之昏火星始中而堯典云日永星火以正仲夏所以五月得火星中者鄭志孫皓問月令季夏火星中季夏中心也不知夏至中星名答曰日永星火此謂大火也大火次名東方之次有夀星大火析木三者大火為中故尚書舉中以言焉又每三十度有竒非特一宿者也如此言中則日永星火謂大火之次非心星也堯典四時言中星者春夏交舉其次言星鳥星火秋冬舉其宿言星虛星昴故注云星鳥鶉火之方星火大火之屬虚𤣥武中虚宿也昴白虎中昴宿也以其東方南方皆三次鶉火大火居其中西方北方俱七宿虚星昴星居其中每時總舉一方故指中宿與次而互言之耳其實仲夏之月大火之次亦未中也是鄭以日永星火大火之次與此火之心星别戴氏震詩補傳凡星每晝夜隨天左旋至正南為最髙猶日當午正為最髙也故未中以前漸陞而上既中以後漸流而下據周時季夏昏火中故孟秋之月初昏已過中但見其西流耳若堯典之日永星火以正仲夏夏小正之五月初昏大火中則流火自六月矣此虞夏至周歲差不同也以心為寒暑之候特周時為然觀承案七月乃豳風其時正在夏初故篇中月數皆用夏代之正朔七月流火乃是建申之月與堯典不為異也葢日永星火在五月午位則六月尚在未位巳午未俱屬南方直至七月而火在申位始流於西耳周公作經未必不詳考其實今欲証周時與堯典異而謂周公据當時之星宿以寫夏初之豳風恐未然也春秋桓公五年左氏傳龍見而雩注龍見建巳之月蒼龍宿之體昏見東方莊公二十九年左氏傳凡土功龍見而畢務戒事也注謂今九月周十一月龍星角亢晨見東方三務始畢戒民以土功事疏今之九月則季秋也月令季秋之月日在房漢志論星之度數云角十二亢九氐十五自角之初至房初三十六度晨謂夜之將旦於晨之時日體在房故角亢見在東方也東方之宿盡為龍星角即蒼龍角也故角亢專得龍名火見而致用注大火心星次角亢見者冬疏㐮九年傳曰心為大火星度心五尾十八月令孟之月日在尾自心初至於尾末二十三度十月之初心星次角亢之後而晨見東方也水昏正而栽注謂今十月定星昏而中之疏五行北方水故北方之宿為水星言水昏正者夜初昏水星有正中者耳非北方七宿皆正中也詩云定之方中作于楚宫釋天云營室謂之定孫炎云定正也天下作宫室者皆以營室為正周語云營室之中土功其始是定星昏而正為土功之大候故知水昏正謂十月定星昏而正中時也詩箋云定星昏中而正謂小雪時小雪十月之中氣月令仲冬之月昏束壁中室十六度日行一度是十月半而室中十一月初而壁中日至而畢注日南至微陽始動故土功息昭公三年左氏傳譬如火焉注火心星火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退日疏月令季夏之月日在栁昏心中旦奎中季冬之月在婺女昏婁中旦氐中氐後即次房心是季冬旦火中也此其極也能無退乎昭公四年左氏傳申豐曰古者日在北陸而藏氷注陸道也謂夏十二月日在虚危之疏釋天云北陸虚也西陸昴中也也孫炎云陸中也北方宿虚為中也西方之宿昴爲杜以西陸朝覿謂奎星朝見昴為西方中宿則昴未得見宿是日行之道爾雅髙平曰陸故以陸為道也漢志載劉歆三統術云𤣥枵之初日在婺女八度為小寒節在危初度為大寒中終于危十五度是夏之十二月日在虚危也以此知日在北陸謂夏之十二月也西陸朝覿而出之注春分之中奎星朝見東方四疏推法星去日半次則得朝見三統術春分日在婁度宿分奎有十六度乃次婁則春分之日奎之初度去日已二十度矣服䖍以為二月日在婁四度春分之中奎始朝見東方也火出而畢賦注火星昏見東方謂三月四月中昭公十七年左氏傳梓慎曰火出於夏為三月注謂火見於商為四月於周為五月哀公十二年左氏傳冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄畢注火心星也火伏在今十月今火猶西流司厯過也注猶西流言未盡沒知是九月官失一閏火疏月令季夏之月昏火星中詩云七月流毛傳云流下也謂昏而見于西南漸下流也周禮司爟云季秋内火是九月之昏火始入十月之昏則伏火猶西流者言其未盡沒是夏九也釋例言今推春秋此十二月乃夏之九月實周之十一月也此年當有閏而今不置閏此為失一閏月耳國語周語虢文公曰農祥晨正日月底于天廟土乃脈發注農祥房星也晨正謂立春之日晨中于午也農事之後故曰農祥底止也天廟營室也孟春之月日月皆在營室單子曰夫辰角見而雨畢注辰角大辰蒼龍之角角星名也見者朝見東方建戍之初寒露節也雨畢者殺氣日盛雨氣盡也天根見而水涸注天根亢氐之間也謂寒露雨畢之後五日天根朝見水潦盡竭也月令仲秋水始涸天根見乃盡竭也本見而草木節解注本氐也謂寒露之後十日陽氣盡草木之枝節皆理解也駟見而隕霜注駟天馬房星也謂建戍之中霜始降火見而清風戒寒注謂霜降之後清風先至所以戒人為寒備也故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁其時儆曰収而場功治而畚挶營室之中土功其始注定謂之營室謂建亥小雪之中定星昏正于午土功可以始也火之初見期于司里法期㑹也致其築作之具㑹于司里之官蕙田案左傳國語所舉數條葢周初以星象紀課候之書與詩經合月令則又周末書也若堯典夏小正星象與此差一次申豐之言古者指周初為古耳夫子亦云聞之特聞於周時有是語千載以上千載以下皆不同也單㐮公所述時儆亦當謂周初之令非夏令也禮記月令孟春之月日在營室昏參中旦尾中注孟長也日月之行一歲十二㑹聖王因其㑹而分之以為大數焉觀十所建命其四時此云孟春者日月㑹於諏訾而斗建寅之辰也凡記昏明中星者為人君南面而聼天下視時候以授民事疏此言孟春者夏正建寅之月也吕不韋在於秦世秦以十月為歲首不用秦正而用夏時者以夏數得天正故用之也周禮雖以建子為正其祭祀田獵亦用夏正也日在營室者案三統術立春日在危十六度正月中日在室十四度元嘉術立春日在危三度正月中日在室一度昏參中者案三統術立春昏畢十度中去日八十九度正月中昏井二度中去日九十三度元嘉術立春昏昴九度中月半昏觜觽一度中皆不昏參中者月令昏明中星皆大畧而言不與律正同但有一月之内有中者即得載之計正月昏參中依三統術在立春之後六日參星初度昏得中也但二十八宿其星體有廣狹相去逺近或月節月中之日昏明之時前星已過於午後星未至正南又星冇明暗見有早晚明者昏早見而旦晚沒暗者則昏晚見而旦早沒所以暗明之星不可正依律法但舉大略耳餘月昏明從此可知仲春之月日在奎昏弧中旦建星中注仲中也仲春者日月㑹於降婁而斗建夘之辰也弧在輿鬼南建星在斗上去疏案三統術二月節日在奎五度昏井二十二度中日九十七度旦斗五度中春分日在婁四度昏栁五度中去日一百二度旦斗十六度中案元嘉術二月節日在壁一度昏井十度中旦箕四度中春分日在奎七度昏東井三十度中旦斗四度中弧與建星非二十八宿而昏明舉之者由弧星近井建星近斗井有三十三度斗有二十六度其度既寛若舉井斗不知何日的至井斗之中故舉弧星建星也然春分之時日夜中計春分昏中之星去日九十一度今日在奎五度奎與鬼之初乃一百九度所以不同者鄭雖云弧在鬼南其實仍當井之分域故皇氏云從奎第五度為二月節數至井第十五度得九十一度是弧星當井之十六度也若從井星十六度至斗之初一百七十二度計昏中星與明中之星春秋分時相去分天之半應一百八十二度餘但日入以後二刻半始昏不盡二刻半為明昏明相去少晝五刻一刻有三度半强五刻有十七度餘則昏之中星去明之中星一百六十五度餘則建星不得在斗初在斗十度也此仲春之月昏弧中案尚書云日中星鳥不同者如鄭康成之意南方七宿總為鳥星井鬼則鳥星之分故云鳥星案仲夏昏亢中尚書云日永星火不同者案鄭答孫顥曰星火非謂心星也夘之三十度總為大火月令舉其月初尚書總舉一月故不同也案仲秋之月昏牽牛中尚書云宵中星虛其仲冬之月云昏東壁中尚書云日短星昴不同者亦是月令舉其初朔尚書總舉一月之中季春之月日在胃昏七星中旦牽牛中注季少也季春者日月會於大梁而斗建辰之辰去疏案三統術云三月之節日在胃七度昏張二度中日一百七度旦斗二十六度中清明日在昴八度昏翼四度中去日一百一十一度旦女二度中案元嘉術三月節日在婁六度昏栁十二度中旦斗十四度中三月中日在胃九度昏七星中者案志云胃十四度昴十一度畢十六度觜二度參九度井三十三度鬼四度栁十五度七星七度從胃七度至七星之初度有九十九度以日漸長日沒之時稍在西北去七星之初九十八度故昏時七星在南方之中旦牽牛中者從七星之初至牽牛之初孟夏之月日在畢昏翼中旦婺女中注孟夏者日月㑹於實沈而斗建巳之辰一疏三統術四月節日在畢十二度昏軫四度中去日百一十四度旦虚三度中四月中日在井初度昏角六度中去日一百一十七度旦危六度中元嘉術四月節日在畢十一度昏翼十度中旦女三度中四月中日在畢十五度昏軫十度中旦虚九度中仲夏之月日在東井昏亢中旦危中注仲夏者日月會於鶉首而斗建午之辰也日疏案三統術五月節日在井十六度昏氐二度中去一百一十九度旦室三度中五月中日在井三十一度昏房二度中去日一百一十九度旦奎十一度中元嘉術五月節日在井三度昏角十度中旦危九度中五月中日在井十八度昏氐五度中旦室五度中季夏之月日在栁昏火中旦奎中注季夏者日月㑹於鶉火而斗建未之辰也一疏案三統術六月節日在栁九度昏尾七度中去日百一十九度旦婁八度中六月中日在張三度昏箕三度中去日一百一十七度旦胃十四度中元嘉術六月節日在井三十二度昏房四度中旦東壁八度中六月中日在栁十二度昏尾八度中旦奎十二度中孟秋之月日在翼昏建星中旦畢中注孟秋者日月㑹於鶉尾而斗建申之辰也日疏案三統術七月節日在張十八度昏斗四度中去一百一十四度旦畢八度中七月中日在翼十五度昏斗十六度中去日一百一十一度旦井初度中元嘉術七月節日在張五度昏箕二度中旦胃二度中七月中日在翼十度昏斗三度中旦昴七度中仲秋之月日在角昏牽牛中旦觜觽中注仲秋者日月㑹於夀星而斗建酉之辰也去疏三統術八月節日在軫十二度昏斗二十六度中日一百六度旦井二度中八月中日在角十度昏女三度中去日一百六度旦井二十一度中元嘉術八月節日在翼十七度昏斗十四度中旦畢十六度中八月中日在軫十五度昏斗二十四度中旦井九度中季秋之月日在房昏虚中旦栁中注季秋者日月㑹於大火而斗建戍之辰也十疏三統術九月節日在氐五度昏虚二度中去日九七度旦張初度中九月中日在房五度昏危三度中去日九十三度旦張十八度中元嘉術九月節日在亢一度昏牛八度中旦井二十九度中九月中日在氐七度昏女十一度中旦栁十一度中孟冬之月日在尾昏危中旦七星中注孟冬者日月㑹於析木之津而斗建亥之辰也日疏案三統術十月節日在尾十度昏危十四度中去八十九度旦翼初度中十月中日在箕七度昏室十度中去日八十六度旦軫五度中元嘉術十月節日在心二度昏危一度中旦張八度中十月中日在尾十二度昏危十三度中旦翼八度中仲冬之月日在斗昏東壁中旦軫中注仲冬者日月㑹於星紀而斗建子之辰也也疏案律志云仲冬之初日在斗十二度故云日在斗三統術大雪日在斗十二度昏壁五度中去日八十四度旦角三度中冬至日在牛初度昏奎十度中去日八十二度旦亢七度中元嘉術大雪日在箕十度昏氐九度中旦軫八度中冬至日在斗十四度昏東壁八度中晝漏四十五刻旦角七度中季冬之月日在婺女昏婁中旦氐中注季冬者日月㑹於𤣥枵而斗建丑之辰也婺疏案律志季冬初日在婺女八度三統術小寒日在女八度昏婁十一度中去日八十四度旦氐十二度中大寒日在危初度昏昴二度中去日八十度旦心五度中元嘉術日在牛三度昏奎十五度中晝漏四十五度六分旦亢九度中大寒日在女十度昏胃四度中晝漏四十六刻七分旦氐十三度中是月也日窮于次月窮于紀星囘於天數將幾終注日月星辰運行於此月皆周匝於故處也次舍也紀㑹也每疏日窮于次者謂去年季冬日次于𤣥枵從此以來月移次他辰至此月窮盡還次𤣥枵故云日窮于次月窮于紀者紀猶㑹也去年季冬月與日相會於𤣥枵自此以來月與日相會在于他辰至此月窮盡還復會于𤣥枵故云月窮于紀星囘于天者謂二十八宿随天而行每日雖周天一匝早晚不同至于此月復其故處與去年季冬早晚相似故云星囘于天數将幾終者幾近也以去年季冬至今年季冬三百五十四日未滿三百六十五日未得正終唯近於終故云數将幾終歲且更始齊氏召南曰孔疏引三統元嘉二術以證昏旦中星不同是也但云不與律正同其説未然夫月令之中星不同堯典猶之三統元嘉不同月令矣此則歲差使然唐宋以來又去元嘉逺後漢書志元和二年二月甲寅制書曰史官用太初鄧平術冬至之日日在斗二十一度而術以為牽牛晉書志後秦姚興時當孝武太元九年歳在甲申天水姜岌造三紀甲子元術其略曰觀象之道必審日月之行然後可以上考天時下察地化殷紀斗分麤故不施於今乾象斗分細故不得通於古景初斗分雖在麤細之中而日之所在乃差四度今治新法日在斗十七度天正之首岌以月蝕撿日宿度所在為數術者宗焉宋書志宋太祖頗好歴數太子率更令何承天私撰新法元嘉二十年上表曰漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉堯典云日永星火以正仲夏今季夏則火中又宵中星虚以殷仲秋今季秋則虚中爾來二千七百餘年以中星檢之所差二十七八度則堯冬令至日在須女十度左右也漢之太初歴冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕檢之則景初今之冬至應在斗十七大明六年南徐州從事史祖沖之上表曰堯典云日短星昴以正仲冬以此推之唐代冬至日在今宿之左五十許度漢代之初即用秦歴冬至日在牽牛六度漢武改立太初歴冬至日在牛初後漢四分法冬至日在斗二十二晉時姜岌以月蝕檢日知冬至在斗十七今參以中星課以蝕望冬至之日在斗十一通而計之未盈百載所差二度舊法並令冬至日有定處天數既差則七曜宿度漸與歴舛乖謬既著輙應改制僅合一時莫能通逺遷革不已又由此條今令冬至所在歲歲微差郤檢漢注並皆審宻將來久用無煩屢改臣法興議書云日短星昴以正仲冬直以月維四仲則中宿常在衛陽羲和所以正時取其萬世不易也沖之曰書以四星昏中審分至者據人君南面而言也且南北之正其詳易准流見之勢中天為極先儒注述其義僉同而法興以為書説四星皆在衛陽之位自在已地進失向方退非始見捨午稱己午上非無星也必據中宿餘宿豈復不足以正時若謂舉中語兼七列者觜參尚隠則不得言月盈則食必在日衝以檢日則宿度可辨違衝移宿顯然易覩故知天數漸差則當式遵以為典事驗昭晳豈得信古而疑今中星見伏記籍每以審時者葢以厯數難詳而天驗易顯各據一代所合以為簡易之政也亦猶夏禮未通商典濩容豈襲韶節誠天人之道同差則蓺之興因代而推移矣唐書志日度議曰古歴日有常度天周為歲終故係星度于節氣其説似是而非故久而益差虞喜覺之使天為天歲為歲乃立差以追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年葢近之矣考古史及日官候簿以通法之三十九分太為一歲之差自帝堯演紀之端在虚一度及今開元甲子却三十六度而乾策復初矣日在虚一則鳥火昴虚皆以仲月昏中合于堯典劉炫依大明厯四十五年差一度則冬至在虚危而夏至火已過中矣梁武帝據虞􅒠厯百八十六年差一度則唐虞之際日在斗牛間而冬至昴尚未中以為皆承閏後節前月却使然而此經終始一歲之事不容頓有四閏故淳風因為之説曰若冬至昴中則夏至秋分星火星虚皆在未正之西若以夏至火中秋分虚中則冬至昴在巳正之東互有盈縮不足以為歲差證是又不然今以四象分天北正𤣥枵中虚九度東正大火中房二度南正鶉火中七星七度西正大梁中昴七度總晝夜刻以約周天命距中星則春分南正中天秋分北正中天冬至之昏西正在午東十八度夏至之昏東正在午西十八度軌漏使然也冬至日在虚一度則春分昏張一度中秋分虚九度中冬至胃二度中昴距星直午正之東十二度夏至尾十一度中心後星直午正之西十二度四序進退不逾午正間而淳風以為不叶非也又王孝通云如歲差自昴至壁則堯前七千餘載冬至日應在東井井極北故暑斗極南故寒寒暑易位必不然矣所謂歲差者日與黄道俱差也假令至日躔大火之中則春分黄道交於虚九而南至之軌更出房心外距赤道亦二十四度設在東井差亦如之若日在東井猶去極最近表景最短則是分至常居其所黄道不遷日行不退又安得謂之歲差乎孝通及淳風以為冬至日在斗十三度昏東壁中昴在巽維之左向明之位非無星也水星昏正可以為仲冬之候何必援昴於始覿之際以惑民之視聴哉古法冬至昏明中星去日九十二度春分秋分百度夏至百一十八度率一氣差三度九日差一刻宋史天文志四時中星見於堯典盖聖人南面而治天下即日行而定四時虚鳥火昴之度在天夷隩析因之候在人故書首載之以見授時為政之大也而後世考驗冬至之日堯時躔虚至於三代則躔於女春秋時在牛至後漢永元已在斗矣大略六十餘年輙差一度開禧占測已在箕宿校之堯時幾退四十餘度盖自漢太初至今已差一氣有餘而太陽之躔十二次大約中氣前後乃得本月宫次盖太陽日行一度近歲紀元術定歲差約退一分四十餘杪葢太陽日行一度而微遅緩一年周天而微差積累分杪而躔度見焉術家考之萬五千年之後所差半周天寒暑將易位世未有知其説者焉蕙田案歲差者星辰推移也寒暑者日道發斂也本屬兩事日行一周天而成歲於天無差而以星校之則歲歲有差者星自移而東也宋志所云乃求其故不得而為之辭元史志周天之度周歲之日皆三百六十有五全䇿之外又有竒分大率皆四分之一自今歲冬至距來歲冬至積三百六十五日而日行一周凡四周積千四百六十則餘一日析而四之則四分之一也然天之分常有餘歲之分常不足其數有不能齊者惟其所差至微前人初未覺知迨漢末劉洪始覺冬至後天謂歲周餘分太强乃作乾象術減歲餘分二千五百為二千四百六十二至晉虞喜宋何承天祖冲之謂歲當有差因立歲差之法其法損歲餘益天周使歲餘浸弱天周浸强强弱相減因得日躔歲退之差歲餘天周二者實相為用歲差由斯而立日躔由斯而得一或損益失當孰能與天叶哉今自劉宋大明壬寅以來凡測景驗氣得冬至時刻真數者有六取相距積日時刻以相距之年除之各得其時所用歲餘復自大明壬寅距至元戊寅積日時刻以相距之年除之得每歲三百六十五日二十四分二十五秒比大明術減去一十一秒定為方今所用歲餘餘七十五秒用益所謂四分之一共為三百六十五度二十五分七十五秒定為天周餘分强弱相減餘一分五十秒用除全度得六十六年有竒日却一度以六十六年除全度適得一分五十秒定為歲差復以堯典中星攷之其時冬至日在女虚之交及攷之前史漢元和二年冬至日在斗二十一度晉太元九年退在斗十七度宋元嘉十年在斗十四度末梁大同十年在斗十二度隋開皇十八年猶在斗十二度唐開元十二年在斗九度半今退在箕十度取其距今之年距今之度較之多者七十餘年少者不下五十年輙差一度宋慶元間改統天術取大衍歲差率八十二年及開元所距之差五十五年折取其中得六十七年為日却行一度之差施之今日質諸天道實為宻近然古今術法合於今必不能通於古宻於古必不能驗於今今授時術以之考古則增歲餘而損歲差以之推來則增歲差而損歲餘上推春秋以來冬至往往皆合下求方來可以永久而無弊日之麗天縣象星著大明一生列宿俱熄古人欲測躔度所在必以昏旦夜半中星衡考其所距從考其所當然昏旦夜半時刻未易得真時刻一差則所距所當不容無舛晉姜岌首以月食衝檢知日度所在紀元術復以太白誌其相距逺近於昏後明前驗定星度因得日躔今用至元丁丑四月癸酉望月食既推求得冬至日躔赤道箕宿十度黄道九度有竒仍自其年正月至己夘歲終三年之間日測太隂所離宿次及歲星太白相距度定驗參考共得一百三十四事皆躔箕宿適與月食所衝允合以金趙知微所修大明術法推之冬至猶躔斗初度三十六分六十四秒比新測實差七十六分六十四秒蕙田案日月五星右移術家通説也恒星亦有右移之度與七曜同法故今歲冬至日躔起某宿某度至明年即少差其差甚微幾於不覺積之七十年而差及一度此日星相較有差非日躔於天有差也損歲餘益天周謬於實理至若一歲小餘古强今弱一由日小輪徑差一由最卑動移説詳江氏歲實消長辨郭氏增損歲餘歲差乃未得其根而以法遷就似宻實疎不足為法觀承案天行萬古無差日行既一日一周天而適足於天無差則日亦無差矣其歲之有差者新法謂星自移而東其差葢在星也差在星則日本無差也然則星自移而東為右旋者可知日自隨乎天而左旋矣何必執定右旋之説以為實測也耶明史天文志古今中星不同由於歲差而歲差之説中西復異中法謂節氣差而西西法謂恒星差而東然則歸一也今將李天經湯若望等所推崇禎元年京師昏旦時刻中星列於後春分戌初二刻五分昏北河三中寅正一刻一十分旦尾中清明戌初三刻十三分昏七星偏東四度昏旦時或無正中之星則取中前中後之大星用之距中三度以内者為時不及一刻可勿論四度以上去中稍逺故紀其偏度焉寅正初刻二分旦帝座中糓雨戌正一刻七分昏翼偏東七度寅初二刻八分旦箕偏東四度立夏戌正三刻二分昏軫偏東五度寅初初刻十三分旦箕偏西四度小滿亥初初刻十二分昏角中丑正三刻三分旦箕中芒種亥初一刻十二分昏大角偏西六度丑正二刻三分旦河鼓二中夏至亥初二刻五分昏房中丑正一刻一十分旦須女中小暑亥初一刻十二分昏尾中丑正二刻三分旦危中大暑亥初初刻十二分昏箕偏東七度丑正三刻三分旦營室中立秋戌正三刻二分昏箕中寅初三刻十三分旦婁偏東六度處暑戍正一刻七分昏織女一中寅初初刻八分旦婁中白露戌初三刻十三分昏河鼔二偏東四度寅正初刻二分旦昴偏東四度秋分戍初二刻五分昏河鼔二中寅正一刻十一分旦畢偏西五度寒露戌初初刻十四分昏牽牛中寅正三刻一分旦參四中霜降酉正三刻十一分昏須女偏西五度夘初初刻四分旦南河三偏東六度立冬酉正二刻十一分昏危偏東四度夘初一刻五分旦輿